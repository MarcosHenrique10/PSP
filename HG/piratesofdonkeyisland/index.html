he money.\n         \n        \"Congratulations!\" Dan smiles, counting his money, \"Let's go out and tell everybody about your wonderful purchase!\"\n         \n        He exits the room happily.\n        *page_break You follow him outside\n        *goto buyship\n    #Let's talk about these expensive extras. I probably don't need them.\n        *temp price 10000\n        *comment *temp\n        **Ship's price: ${price}  -  Ship's safety: ${safety}%**\n        \n        \"Extras?\" Dan asks, \"You want to talk extras? Great! This baby's LOADED with valuable gadgets! Each one costs about 500 Pieces of Eight and increases the ship's safety by about 5%. For instance… The [b]porthole defoggers[/b]! You'll love them!\"\n        *choice\n            *selectable_if (Pieces_of_Eight >= 10000) #I'd rather buy the ship with full-optional. Let's stay safe.\n                *goto fullop\n            #Please, take this extra away. How much is the ship without it?\n                *set price -500\n                *set safety -5\n                *goto bargain2\n\n*label bargain2\n**Ship's price: ${price}  -  Ship's safety: ${safety}%**\n        \n\"Okay,\" Dan replies, \"But don't blame me if you run into an iceberg or something. But wait, there's more! Did I tell you about the [b]anti-lock anchor[/b]?\"\n*choice\n    *selectable_if (Pieces_of_Eight >= 10000) #I'd rather buy the ship with full-optional. Let's stay safe.\n        *goto fullop\n    *selectable_if (Pieces_of_Eight >= price) #The ship is okay now. I buy it as it is.\n        *set Pieces_of_Eight - price\n        *goto buypart\n    #Please, take this extra away. How much is the ship without it?\n        *set price -500\n        *set safety -5\n        *goto bargain3\n\n*label buypart\n\"Very well!\" Dan smiles. \"Just sign this small contract, and the ship is yours.\n\nGesticulating nervously, he produces a different contract. You read it thoroughly and find no issues, so you sign it and hand him the money.\n \n\"Congratulations!\" Dan smiles, counting his money, \"Let's go out and tell everybody about your wonderful purchase!\"\n \nHe exits the room happily.\n*page_break You follow him outside\n*goto buyship\n\n*label bargain3\n**Ship's price: ${price}  -  Ship's safety: ${safety}%**\n        \n\"Sure,\" Dan replies. \"Throw safety to the wind. But wait, there's more! Did I tell you about the [b]rack-and-pinion rudder[/b]?\"\n*choice\n    *selectable_if (Pieces_of_Eight >= 10000) #I'd rather buy the ship with full-optional. Let's stay safe.\n        *goto fullop\n    *selectable_if (Pieces_of_Eight >= price) #The ship is okay now. I buy it as it is.\n        *set Pieces_of_Eight - price\n        *goto buypart\n    #Please, take this extra away. How much is the ship without it?\n        *set price -500\n        *set safety -5\n        *goto bargain4\n\n\n*label bargain4\n**Ship's price: ${price}  -  Ship's safety: ${safety}%**\n        \n\"Well,\" Dan replies, \"I guess it'll float without it… barely. But wait, there's more! Did I tell you about the [b]velour sail covers[/b]?\"\n*choice\n    *selectable_if (Pieces_of_Eight >= 10000) #I'd rather buy the ship with full-optional. Let's stay safe.\n        *goto fullop\n    *selectable_if (Pieces_of_Eight >= price) #The ship is okay now. I buy it as it is.\n        *set Pieces_of_Eight - price\n        *goto buypart\n    #Please, take this extra away. How much is the ship without it?\n        *set price -500\n        *set safety -5\n        *goto bargain5\n\n*label bargain5\n**Ship's price: ${price}  -  Ship's safety: ${safety}%**\n        \n\"Hey,\" Dan replies. \"Travel light, I can understand that, sure. Of course, mutiny is an ugly word… But wait, there's more! Did I tell you about the [b]tack-o-meter[/b]?\"\n*choice\n    *selectable_if (Pieces_of_Eight >= 10000) #I'd rather buy the ship with full-optional. Let's stay safe.\n        *goto fullop\n    *selectable_if (Pieces_of_Eight >= price) #The ship is okay now. I buy it as it is.\n        *set Pieces_of_Eight - price\n        *goto buypart\n    #Please, take this extra away. How much is the ship without it?\n        *set price -500\n        *set safety -5\n        *goto bargain6\n    \n*label bargain6\n**Ship's price: ${price}  -  Ship's safety: ${safety}%**\n        \n\"Wow,\" Dan replies, \"Does your sweetheart know you're such a cheapskate? But wait, there's more! Did I tell you about the [b]elevator made with wood from burgundy wine casks[/b]?\"\n*choice\n    *selectable_if (Pieces_of_Eight >= 10000) #I'd rather buy the ship with full-optional. Let's stay safe.\n        *goto fullop\n    *selectable_if (Pieces_of_Eight >= price) #The ship is okay now. I buy it as it is.\n        *set Pieces_of_Eight - price\n        *goto buypart\n    #Please, take this extra away. How much is the ship without it?\n        *set price -500\n        *set safety -5\n        *goto bargain7\n\n*label bargain7\n**Ship's price: ${price}  -  Ship's safety: ${safety}%**\n        \n\"Yeah,\" Dan replies, \"I guess that IS kind of decadent, isn't it? But wait, there's more! Did I tell you about the [b]simulated wood siding[/b]?\"\n*choice\n    *selectable_if (Pieces_of_Eight >= 10000) #I'd rather buy the ship with full-optional. Let's stay safe.\n        *goto fullop\n    *selectable_if (Pieces_of_Eight >= price) #The ship is okay now. I buy it as it is.\n        *set Pieces_of_Eight - price\n        *goto buypart\n    #Please, take this extra away. How much is the ship without it?\n        *set price -500\n        *set safety -5\n        *goto bargain8\n\n*label bargain8\n*comment **Ship's price: ${price}  -  Ship's safety: ${safety}%**\n\"Okay,\" Dan replies, \"But I'm telling you: Barnacles HATE simulated wood.\"\n \nYou nod.\n\n\"Well,\" Dan taps his foot, \"You took all safety features away. I hope you like the ship now.\"\n*choice\n    *selectable_if (Pieces_of_Eight >= 10000) #I changed my mind. I'd rather buy the ship with full-optional.\n        *goto fullop\n    *selectable_if (Pieces_of_Eight >= price) #The ship is okay now. I offer you ${price} Pieces of Eight.\n        *set Pieces_of_Eight - price\n        \"Sixty-five hundred pieces of eight?!?\" Dan whitens. \"Okay! Okay! It's killing me, but okay! And I thought I was going to give my children Christmas presents this year… Just take it out of here. I'm GLAD to get rid of it. Just sign this small contract, and the ship is yours.\"\n\n        Gesticulating nervously, he produces a different contract. You read it thoroughly and find no issues, so you sign it and hand him the money.\n         \n        \"I've got to run these numbers by my boss…\" says Dan, counting his money. \"He'll think I'm nuts, but I'll talk him into it. I just want to say that I really feel like we got to know each other today. I mean, I really felt some bonding here. And I don't just say that to everybody! It's been great doing business with you. Really. Let's go out and tell everybody about your great purchase!\"\n         \n        He exits the room happily.\n        *page_break You follow him outside\n        *goto buyship\n\n*label buyship\n*set Ships \"Sea Donkey\"\nEveryone is waiting for you expectantly.\n\n\"Congratulations, ${Crew_Name},\" Dan says. \"Your captain is now the proud owner of the most fabulous previously boarded ship ever: the Sea Donkey!\"\n \nYour crew cheers.\n\n\"The ship is ready to set sails,\" Dan adds. \"It's already loaded with water, provisions for ten days, and riggings. If you want, you can weigh anchor right away!\"\n \n\"All aboard!\" you shout. Everyone boards the ship.\n*page_break Ready to go!\n\n\"I can clearly see you're in love with this ship,\" Dan says, putting an arm on your shoulder, preventing you from boarding it. \"Am I right? Of course I am! I mean, just look at her! Sleek… Aerodynamic… A buoyant, barnacle-covered beauty.\"\n\nA falling star shows behind the ship.\n\"I think we're having a real moment here.\" Dan adds, moved, \"I've changed my mind. I can't give her up. I will immediately cancel the sale. How could I sell something so dear?\"\n\nSuddenly, one of the Sea Monkey's pole breaks, dropping off to the sea.\n\"Then again,\" Dan gesticulates nervously, \"A deal is a deal, right? Right. Catch you later. Good luck. Enjoy. I'm outta here.\"\n*page_break No point in complaining.\n\nYou finally get aboard.\n\nThe Sea Donkey is a relatively small ship: the five of you should operate it without too many difficulties.\n \nYou've no sailing experience, but luckily you see Sam and Will giving everyone directions. In less than half an hour, the Sea Donkey weighs anchor, and you all set sail for the dreaded Donkey Island.\n\nSam writes on his notepad that it should take about one day to get there. As the sun starts to rise on the horizon, you leave Scuffle Island behind you.\n*page_break To Donkey Island!\n\nAs dawn breaks and the Sea Donkey smoothly sails the ocean, you breathe a sigh of relief. For the first time since this cursed adventure started, you feel you can indulge in a moment of relaxation. Of course, you know very well that the curse could strike on you any moment now. Nevertheless, you're aware that there's nothing more you can do now. You and your new crew did your best: you can be proud of yourself and enjoy this moment of peace as long as it lasts.\n\nYou inhale the fresh sea breeze and close your eyes.\n\n\"Excuse me, captain\" Will's voice spoils the magic moment.\n\n\"Sorry to bother you, captain,\" Will looks embarrassed. You see the whole crew behind him. They don't look happy. \"There's… an [i]urgent problem[/i] on this ship, and we have to solve it now.\"\n \nYou don't like everyone's expressions. Could this be…\n \n\"I hope this is not a mutiny!\" you reply, nonchalantly putting your hand on the hilt of your sword, \"Cause I won't let you get away with it!\"\n*page_break This is not good.\n\n\"Mutiny?\" Will asks, puzzled. \"No way, captain. You got it all wrong.\"\n \nEverybody laughs. You feel relieved.\n\n\"We have a new ship now,\" Slash says. \"Why don't we think of a cool name? Something that better fits us?\"\n \n\"Sea Donkey sucks,\" Laura concludes.\n \nSam nods in agreement.\n\n\"So,\" Will smiles. \"What do you think, captain? Shouldn't we find a better name for this little beauty?\"\n*choice\n    #Actually, I like its name. Let's keep it.\n        You see everyone is shocked.\n         \n        \"Are you serious?\" Laura asks.\n        \n        \"Of course.\" you reply, yawning, \"Sea Donkey is perfect!\"\n         \n        The crew members shake their heads but do not reply.\n        *goto aftername\n    #Good idea. Do you have any suggestions?\n        *goto suggestions\n\n*label suggestions\n\"Fellow crew members!\" you say, \"As we did before, we have to choose a new name for this ship. A cool name, one that reflects our awesomeness and instills fear in our enemies. Do you already have something on your mind?\"\n \n\"I say [i]Sweet Child O'Mine[/i]!\" shouts Slash, playing his guitar. \"I am already in love with this baby!\"\n \n\"What about [i]Sea Mojo[/i]?\" proposes Laura. \"Brings good omens!\"\n \nSam smiles and shows you his notepad. You read: [i]Wooden Library [/i]. So silly!\n \n\"And what about you, Will?\" you ask.\n \n\"Me?\" he giggles. \"I'd say: [i]Floating Theater[/i]. How do you like it, captain?\"\n \nEveryone awaits your answer. What name will you choose for the new ship?\n*choice\n    #I choose Sweet Child O'Mine.\n        *set Slash %+10\n        *set Ships \"Sweet Child O'Mine\"\n        \"This ship's new name will be Sweet Child O'Mine!\" you shout, rising your hands up to the sky.\n         \n        Slash smiles and keeps playing his guitar.\n        *goto oksname\n    #I like Sea Mojo.\n        *set Mama %+10\n        *set Ships \"Sea Mojo\"\n        \"This ship's new name will be Sea Mojo!\" you shout, rising your hands up to the sky.\n         \n        Laura smiles. \"The Loa will be happy,\" she adds.\n        *goto oksname\n    #Wooden Library sounds cool.\n        *set Sam %+10\n        *set Ships \"Wooden Library\"\n        \"This ship's new name will be Wooden Library!\" you shout, rising your hands up to the sky.\n         \n        Sam nods his fuzzy head and adjusts his monocle.\n        *goto oksname\n    #Floating Theater is just perfect.\n        *set Will %+10\n        *set Ships \"Floating Theater\"\n        \"This new ship's name will be Floating Theater!\" you shout, rising your hands up to the sky.\n         \n        \"Thank you, Sir.\" Will bows before you\n        *goto oksname\n    #I just thought of a name that is perfect for all of us!\n        *label input_sname\n        \"Hear me out. Here's the name I thought,\" you say.\n        *input_text Ships\n        You want to call your new ship \"The $!{Ships}\", right?\n        *choice\n           #Yes.\n               *set Ships \"$!{Ships}\"\n               \"This new ship's name will be $!{Ships}!\" you shout, rising your hands up to the sky.\n                \n               Everyone cheers.\n               *goto oksname\n           #No, I just thought of a better name.\n               *goto input_sname\n*label oksname\nThe new name actually raised up everyone's morale.\n*label aftername\n\"Well, my hearties,\" you say, yawning, \"I'm exhausted. If you excuse me, I will take a nap below deck.\"\n \n\"Aye aye!\" everyone answers, returning to their duties.\n\nYou stagger below deck. Among crates and barrels, you see five hammocks.\n \nYou collapse in the first one, exhausted.\n*page_break Let's call it a day.\n\nYou wake up with the sound of squeaking timbers. You climb on deck and realize the sun is setting.\n \n\"Rise and shine, captain!\" Will welcomes you. \"You must have been very tired: you slept all day!\"\n\nYou nod, yawning. \"Is everything okay?\" you ask, stretching your arms. \"How is our schedule?\"\n \n\"Everything proceeds smoothly.\" Will replies, \"According to the map, tomorrow morning, we should reach Donkey Island.\"\n\n\"Dinner?\" Laura approaches you, \"Here are the best hardtacks you can find on the ${Ships}.\"\n \nIn no time, you avidly eat a dozen of the hard biscuits Laura offered you. You then drink two pints of water and a glass of rum. It's probably the worst meal you've ever had, but you feel nourished and refreshed like never before.\n*page_break The harsh sailors' life.\n\nAfter your hearty meal, you assess the situation on board. Sam is looking at the map and making calculations for the route. Slash sings, checking the riggings. Laura is taking care of the provisions and the lodgings. Finally, Will is at the helm, steering the ${Ships}.\n\nYou approach Sam and ask him: \"Is there any way I can be of help?\"\n \nBlushing, the elegant gorilla writes on his notepad that you should relax and enjoy the trip.\n*fake_choice\n    *selectable_if (Charm >= 50) #It's so kind of you. I'll think of a way to be of help.\n        *set Charm %+10\n    *selectable_if (Charm \u003c 50) #I just can't stand still. I feel so energized!\n        *set Charm %-10\n    *selectable_if (Wit >= 50) #Could I perhaps help you with your calculations?\n        *set Wit %+10\n    *selectable_if (Wit \u003c 50) #I need to focus on some task, or bad thoughts will haunt me.\n        *set Wit %-10\n\n\"Relax!\" Matthew stops singing and approaches you. \"You did a lot for everyone yesterday. If I were you, I'd climb on the crow's nest.\" He points his bony finger up at the top of the mainmast. \"The view is amazing from there. And you could be of use as a lookout while you enjoy the sunset.\"\n\n\"Will do!\" you reply, \"I'll watch everyone's back from above!\".\n \nYou start climbing the mainmast.\n*page_break Upwards!\n\nThe view from the crow's nest is breathtaking: endless ocean in every direction. The setting sun and the gentle rocking of the waves makes this a perfect romantic scenario.\n\nYou think about the many crazy things that happened lately. Not only you are stuck in a [i]different[/i] body: deep inside you feel that your personal essence changed too.\n \nA tear runs down on your cheek. You are afraid that nothing will ever be the same as before.\n*page_break You silently cry.\n*if (Aristocrat >= 70)\n    *goto aristo\n*elseif (Aristocrat > 40)\n    *goto confuse\n*else\n    *goto pirate\n\n*label aristo\nYou bitterly realize that, to get back your former life, you did horrible things that you'd never do.\n \nHow could you look at yourself in the mirror without shame? How could you hope Alfred would still love the horrible person you've become?\n\nYou curse your grandfather. Deep inside, you feel that somehow this horrible situation you're in it's all his fault.\n \nYou desperately cry and sob high up on the mainmast, where nobody can hear or see you.\n*page_break What a disgrace!\n*goto down\n\n*label confuse\nYour mind is as confused as your body. You'd love to have your former, noble life back, but at the same time this new, adventurous life somehow appeals to you.\n \nThis new body is awkward, but the idea of being stuck in it doesn't suck so much after all.\n\nWhat should you do? Should you go back to your former life, or should you embrace this new, adventurous pirate life?\n*page_break What a difficult choice!\n*goto down\n\n*label pirate\nYou immediately wipe your tear away. You're captain ${Name} now, leader of the ${Crew_Name} and proud owner of the ${Ships}. You're not the spoiled damsel you were before.\n \nYou have a new body, new friends and above all, a new, adventurous life! So many things have changed, inside and outside you. But you're not afraid: you changed for good!\n\nYou just need to lift this nasty curse, then you'll be finally free to live a brand new life!\n*page_break Onward, full sail!\n*goto down\n\n*label down\nWhen you look down and see your crew in action, your heart rejoices.\n \nThey were perfect strangers, but in so little time you became so close to each other that they're undoubtedly your best friends now.\n\nYou finally realize that the best thing you can do now spending some quality time with the crew members you like best.\n \nAfter all, this could be your last peaceful moments together.\n*page_break You climb down.\n\nYou get down on the main deck.\n \nWill is still steering the ship while Sam is busy with the calculations. Matthew plays a nostalgic, romantic song while Laura predicts the future throwing little bones.\n\nYou take a deep breath.\n \nYou can feel the magic in the air. You feel this will be a moment you'll forever remember and you feel the unstoppable urge to spend it with a special person. Who will you spend this moment with?\n*choice\n    *selectable_if (Mama >= 65) #I wish to spend this special moment with Laura.\n        *set Mama %+30\n        \"Hey, Laura!\" you call, \"Come here, there's something I'd like to show you.\"\n         \n        The venerable lady smiles. She gets up with some difficulties and slowly staggers toward you. \"Here I am, captain. You have my attention.\"\n         \n        \"Follow me.\" You gently hold her wrinkly hand and lead her near the ship's prow, where you can have some privacy. \n        \n        \"Look at the sunset.\" you say, smiling \"Isn't it beautiful?\"\n         \n        \"It is, captain.\" Laura replies \"But I see something even more beautiful now.\"\n        *page_break Laura!\n        *goto mamafriend\n    *selectable_if (Sam >= 65) #I'd love to have Sam by me now.\n        *set Sam %+30\n        \"Hey, Sam!\" you say, going near him \"Come with me, there's something I'd like to show you.\"\n         \n        The big gorilla blushes. He awkwardly ignores you. \n         \n        \"Come on.\" You firmly hold his big hand \"Those calculations can wait. Follow me!\" You lead him near the ship's prow, where you can have some privacy. \n        \n        \"Look at the sunset.\" you say, smiling \"Isn't it beautiful?\"\n         \n        Sam blushes even more. With a trembling hand, he writes something on his notepad.\n         \n        *goto samfriend\n    *selectable_if (Slash >= 65) #I am looking forward to have a special moment with Matthew.\n        *set Slash %+30\n        \"Hey, Matthew!\" you say, approaching him \"Come with me, there's something I'd like to show you.\"\n         \n        \"You're always full of surprises, captain!\" Slash replies, grinning with his badass undead smile. \n         \n        He picks up his guitar and you lead him near the ship's prow, where you can have some privacy. \n        \n        \"Look at the sunset.\" you say, smiling \"Isn't it beautiful?\"\n         \n        \"I love it.\" Matthew replies, \"It inspires me so much, I'd like to dedicate you a song.\"\n        *page_break Wow!\n        *goto slashfriend\n    *selectable_if (Will >= 65) #All I want in this moment is Will.\n        *set Will %+30\n        *comment *set friend1 \"Will\"\n        \"Will!\" you step close to him by the helm \"Do you have a minute for me?\"\n         \n        \"Of course, captain!\" he replies, gesticulating as always. He then looks into your eyes and says: \"I'm so happy to see you smiling, captain.\"\n                \n        \"Look at the sunset.\" you say, blushing \"It fills my heart with hope and joy. It reminds me of someone I know. Someone I really cherish.\"\n         \n        Your glance makes Will shake. He loses his grip on the helm.\n         \n        The world stops. It's just you and him, in the endless ocean's sunset.\n        \n        \"I've been waiting forever for this moment!\" Will says, blushing.\n        *page_break Will!\n        *goto willfriend\n    #I would rather enjoy this magic moment alone.\n        Your heart is full of doubts. Better enjoying this moment alone. Better not to risk making rash moves that you will regret later.\n         \n        You go at the ship's prow, where you can have some privacy. \n        \n        The sunset is beautiful. Bittersweet memories fill your heart. You don't know what the future holds for you, but you feel that everything is going to be all right.\n        \n        After a frugal dinner with hardtacks and rum, you go on your hammock and close your eyes.\n        *page_break Waiting for tomorrow.\n        *goto endfriend\n\n*label mamafriend\n\n\"You want to know what I think?\" Laura says, shining a toothless smile. \"I think that if the Loa were trying to keep us apart, they're doing a shitty job. Because otherwise, we wouldn't be out here together.\"\n \nYour heart races in your chest. She's got a crush on you!\n\n\"I…\" you reply awkwardly \"I wish we weren't!\" You fell confused and don't know what to say.\n\n\"No, you don't,\" she says firmly, staring at you with her wrinkly eyes.\n\n\"Yes, I do.\" you reply. But you don't believe in what you say either \"I wish we all weren't cursed. I wish I didn't know you, and I wish…\"\n\nWithout warning, her dry mouth is on yours. She kisses you roughly. Completely unyielding. Her wrinkly hands are on the back of your head, holding you in place.\n \nAnd for a long, suspended moment, you're frozen, unsure of whether you want to push her away.\n\nThen, all at once, heat spreads through you, and you thaw.\n\nYou kiss her back.\n\nAnd, oh, it is good.\n*page_break Oh, Laura!\n*goto endfriend\n\n*label samfriend\n\n\"What did you write?\" you ask, smiling, \"Come on, show me!\"\n \nSam tries his best to hide his notepad, but you eventually seize it. You go to the last page and see…\n \nHe drew a heart!\n*page_break Oh my god!\n\n\"This drawing…\" you say, confused, \"You caught me off guard, so I don't know what to say. But… well, I like you too.\"\n \nIt comes out so fumbly and uncertain, and you wish you could start over and say it smoothly and confidently. You try again, louder. \"I like you, Sam.\"\n\nSam blinks, and he looks so human all of a sudden. He stands still, like a marble statue representing a mighty gorilla god.\n \n\"What now?\" You hold your breath as you wait for him to reply. You're so nervous; you keep swallowing, and it sounds loud to your ears. Even your breathing sounds loud, even your heartbeat.\n\nSam's pupils are dilated he's looking at you so hard. He's staring at you like he's never seen you before.\n\nHe writes on his notepad clumsily: '[i]I don't know[/i]'.\n*page_break What?\n\nYou think you stop breathing when you read, \"I don't know.\"\n \nDid you screw things up that badly that now he doesn't know?\n \nIt can't end this way, not when you finally found your courage. You can't let it be.\n\nYour heart is pounding like a million trillion beats a minute as you scoot closer to him. You stand on tiptoe and press your lips against his, and you feel his jolt of surprise.\n \nAnd then he's kissing you back, open-mouthed, soft-lipped kissing-me-back.\n\nAt first, you're nervous, but then he puts his big, hairy hand on the back of your head, and he reassuringly strokes your hair, and you're not so shy anymore.\n*page_break Oh, Sam!\n*goto endfriend\n\n*label slashfriend\n\nMatthew starts playing.\n\n[i]Talk to me softly[/i]\n \n[i]There's something in your eyes[/i]\n \n[i]Don't hang your head in sorrow[/i]\n \n[i]And please don't cry[/i]\n \n[i]I know how you feel inside, I've,[/i]\n \n[i]I've been there before[/i]\n \n[i]Somethin's changin' inside you[/i]\n \n[i]And don't you know[/i]\n\nHis music and lyrics touch you deeply. Matthew perfectly understands how you feel. You wish this moment never ends.\n*page_break Please, don't stop singing.\n\nSlash suddenly stops. His void eye sockets somehow narrow. Then he extends his bony hand.\n \nUnthinkingly, you reach for it.\n\nAs soon as your skin touches his cold bones, he clasps his skeletal fingers around yours and pulls.\n \nYou land on his ribcage with a thump. The coat drifts down after, settling neatly over your legs.\n\nSlash's rotten skull gives you a charming grin. You glare back at him.\n \n\"What do you want from me?\" you ask, faking innocence.\n \n\"I want to soothe your inner pain.\" he replies, holding you tight.\n \n\"Nothing can ease my pain.\" you reply, crying.\n \n\"Music works miracles.\" he whispers in your ear.\n\nYou become conscious that his empty ribcage feels very solid, and you are straddling his slim, bony waist. Your uneven breathing rocks you against each other slightly. You feel molten heat pooling into you, ebbing lower.\n\n[i]Music works miracles[/i], you think leaning down and kissing him.\n \n[i]This is a terrible decision[/i], you wonder. [i]I've gone insane, and I need to stop this instant.[/i]\nBut then Matthew parts his rotten lips beneath yours, and you're afraid that for a time, you cease listening to your brain entirely.\n*page_break Oh, Matthew!\n*goto endfriend\n\n*label willfriend\nNervously, Will rushes forward.\n \nHis lips press against your cheek, brushing it lightly—and still that light touch sent shivers through your nerves, shivers that make your whole body tremble.\n\n\"If you want me to stop, tell me now,\" he whispers awkwardly.\n \nWhen you still say nothing, he brushes his mouth against the hollow of your temple.\n \n\"Or now.\" He traces the line of your cheekbone.\n \n\"Or now.\" His lips are against yours.\n\n\"Or—\"\n\nBut you reach up and pull him down to you, and the rest of his words are lost against your mouth.\n\nHe kisses you gently, carefully, but it isn’t gentleness you want, not now, not after all this time, and you knot your fists in his shirt, pulling him harder against you.\n \nHe groans softly, low in his throat, and then his arms circle you, gathering you against him, and you roll over on the deck, tangled together, still kissing in the ocean's sunset.\n*page_break Oh, Will!\n*goto endfriend\n\n*label endfriend\nYou suddenly wake up.\n \nAlone.\n \nWhile the world spins around you under deck.\n\n\"A storm!\" you hear Will crying from the upper deck \"Batten down the hatches, everybody!\"\n\nNo time to wonder what day and what time it is: you dress as fast as you can and rush on the upper deck, avoiding the rolling barrels.\n\nHeavy rain and thunders give you a frightening welcome on the deck. You spot Slash on the main mast dropping sails while Laura and Sam secure the ballast.\n\n\"This ship is too battered, captain!\" shouts Will from the helm \"We cannot endure the storm much longer! Our only hope is that this storm ends soon!\"\n \n\"Hang in there, everybody!\" you shout \"We'll see this through.\"\n\nYou approach Sam and Laura and help them with the riggings while the ship rolls on the frightening waves.\n*page_break Curses!\n*temp storm 0\n*rand storm 1 100\n*if (storm > Mojo)\n    *goto storm\n*else\n    *goto clear\n\n*label storm\nAlas, the sky gets darker and darker.\n \nHuge waves crash on the deck and the rain is so heavy you cannot see more than ten feet away.\n\n\"The Loa are angry with us!\" Laura shouts, holding tight onto the main mast \"We gotta please them somehow!\"\n\n\"Avast ye!\" cries Will \"I cannot hold the helm anymore!\"\n \nEverybody secures at least one arm with a rope. You follow suit.\n \n\"This is the worst storm I've ever seen!\" shouts Will, gesticulating funnily while he runs away from the spinning helm \"We cannot do more than this. Only God can save us now!\"\n\n\"We could do something\" Laura shouts, holding tight to you \"If I used my powers. What do you say, captain?\"\n \nThis is a very difficult choice. Will you let Laura use her Voodoo powers, risking the immediate Loa's wrath or would you rather place all your hopes in the ${Ships}, trusting its battered frame will resist the storm?\n*choice\n    #Save us, Laura! Better cursed but alive than drowned into Davy Jones's locker.\n        *set Mojo -20\n        \"Aye aye, captain!\" shouts Laura, trying not to fall overboard. You hold her wrinkly hand as she chants: \"Cette tempête ne nous arrêtera pas, s'il vous plaît Loa être notre compas!\"\n        \n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto clear\n        \n    #The Loa are already angry. Better not make them angrier than this. All we can do now is having faith in the ${Ships}.\n        \"Avast ye!\" you shout \"Let's stay together, and we'll survive this!\"\n        \n        Everyone makes the sign of the cross.\n        \n        *temp storm2 0\n        *rand storm2 0 100\n        *if (Storm2 > safety)\n            *goto_scene drown\n        *else\n            *goto clear\n    \n*label clear\nYou all hold on to the main mast with all your strength.\n\nSam keeps you all together with his big, hairy arms while Slash sings old shanties. Laura mutters Voodoo prayers and Will cries out loud his terror.\n\nYou float this way for an infinite time, while waves crash on the deck and buckets of rain pour down on you all.\n\nEventually, a ray of light pierces the black clouds.\n \nThe waves become lower. The wind stops howling.\n\n\"Land ho!\" shouts Will.\n*page_break Could it be...\n\n*label donkey\nIn the far distance, you can see a small island.\n\n\"The island shaped like a bird of prey!\" Slash exclaims, recovering his rolling skull from the soaked deck.\n \n\"Surrounded by green water and blue-green algae!\" Laura adds, rubbing her wrinkly eyes.\n\n\"Donkey Island!\" Will exclaims, excited as always \"We did it!\"\n\nSam checks his maps and nods in agreement, adjusting his monocle.\n*finish Hooray!", "08_island": "*comment *finish\n*image 08_island.png center Chapter eight: Donkey Island\n*temp sname false\nYou all pause for a moment, admiring the savage beauty of Donkey Island.\n\n\"Finally!\" Slash exults, \"We actually made it! What are we waiting for? I'm dropping anchor!\"\n \n\"And I prepare the lifeboat!\" Laura adds, \"Who's going to help this old woman? Geez, I'm feeling three hundred years old. Every passing day, this curse is getting harder and harder.\"\n \nSam immediately helps Laura lowering the lifeboat.\n\nYou realize Will is not as happy as the others.\n*page_break What's up, Will?\n\n\"Why so serious, Will?\" you ask. \"Aren't you happy we actually made it so far? What's troubling you?\"\n \nWill sighs: \"I was wondering… If getting here was so difficult, I am afraid the last part won't be easy at all.\"\n \n\"I see,\" you reply.\n \n\"That's why I'm wondering…\" he continues with his funny voice, \"Is going onward truly the right thing to do? Shouldn't we accept our condition instead? What if solving this mystery was worse than accepting our fate?\"\n\n\"I see your point,\" you reply. \"Have no fear…\"  \n*fake_choice\n    *selectable_if (Charm >= 50) #...cause we are the ${Crew_Name}! Together, helping each other, we can overcome everything!\n        *set Charm %+20\n    *selectable_if (Charm \u003c= 50) #...we will mercilessly crush anyone who stands in the ${Crew_Name} way!!\n        *set Charm %-20\n    *selectable_if (Wit >= 50) #...we have outsmarted any problem so far, and we always will. Cause we're the ${Crew_Name}! \n        *set Wit %+20\n    *selectable_if (Wit \u003c= 50) #...whatever awaits us, it will be afraid of us as soon as it sees the ${Crew_Name} coming! \n        *set Wit %-20\n        \nEveryone hears your speech, and cheers!\n \nWill smiles and nods.\n\n\"No turning back now!\" you say, determined, \"We've arrived so far, and we're not going back without answers. Whoever did this to us shall pay! And we'll finally be free from this curse!\"\n\nEveryone goes back to his duty, attending it with more energy than before.\n\nAfter a few minutes, the lifeboat is ready, and the ${Ships} is surely anchored.\n*page_break Let's go!\n\nYou land on a sparkling white beach. A few yards away, lush tropical vegetation forms a dense jungle. In the distance, a volcano lazily puffs.\n\n\"I have to admit,\" Laura says, shuffling, \"This island looks way better than I had imagined.\"\n \n\"Captain!\" Will shouts, excited, \"Look! A banana tree!\"\n\nYou all see a giant banana tree with hundreds of ripe fruits hanging from it. You can't help but also notice the ten spears surrounding the tree. On each spearhead, a sun-dried human skull stands, watching you with empty eye sockets.\n*page_break Welcome to Donkey Island!\n\n*temp banana false\n\"Aaaaaaaaaaah!\" Will cries in terror as soon as he notices the skulls. \"Cannibals!\" he adds, trembling, \"Only cannibal tribes have these creepy and disgusting customs!\"\n \n\"I guess we're not alone on this island.\" Slash adds, looking around suspiciously, \"I hope we won't meet them. I am afraid they won't be very friendly.\"\n\nSam looks at you with a begging look. He pats his stomach and points his hairy finger toward the bananas.\n \n\"I wouldn't do that if I were you,\" Laura adds, examining the skulls. \"This is probably holy ground for the tribe. Stepping on it or picking the bananas would be blasphemy.\"\n \n\"No way.\" Will trembles in fear. \"I'd rather eat hardtacks for the rest of my life than risking meeting the cannibals. Let's hurry to the volcano!\"\n\nYou stop and wonder. Picking up some fresh fruit would be the best choice for your crew's health.\n \nYou look around: nobody's apparently in sight.\n*choice\n    #Let's pick up as many bananas as we can and then run away before anyone spots us!\n        *set banana true\n        \"We need fresh fruit. And water.\" you say firmly. \"Hurry up, me hearties! Let's pick up as many bananas as we can, and let's get the hell out of here!\"\n         \n        \"Aye aye, captain!\" everybody answers, rushing on the tree. Only Will stands still on his spot, trembling.\n        \n        \"Let's snatch the bananas and run away!\" you say, picking up a bunch.\n        \n        Suddenly, you hear a high-pitched cry and the sound of warring drums.\n         \n        You turn and see hundreds of masked people emerging from the jungle, spear in hand, rushing headlong towards you.\n        *page_break This is no good!\n        *goto cannibals\n    #Better ignore the bananas and head directly to the volcano.\n        \"Better leave the bananas on the tree,\" you say. \"We don't want to upset the natives. Let's hurry to the volcano. The sooner we lift this curse, the better.\"\n        \n        Everybody sends a last, hungry glance to the tree. You all head towards the jungle that surrounds the volcano.\n        *page_break No regrets.\n        *goto volcano\n\n*label cannibals\n\"Run for your life!\" you shout, jumping down the tree.\n\nAlas, before you can decide where to run, you bitterly realize you are surrounded. A hundred scantily clad people, wearing frightening masks and pointing sharp spears at you, start chanting a menacing war hymn: \"[i]Hoola hoola, choola choola[/i]!\"\n\n\"I told you to stay away from this tree, captain!\" cries Will, gesticulating, \"They are cursing us for daring to touch their sacred [i]Choola[/i] tree!\"\n \n\"Will, can you actually understand what they say?\" you ask, puzzled. \n \n\"I am a spokesman,\" Will proudly replies, \"Well, at least I [i]was[/i] one. I can speak every language of the Caribbean.\"\n*page_break Good to know it.\n\nA mighty warrior wearing a lemon mask steps forward. He points his spear at you and shouts: \"[i]Hoola hoola, choola hoola, hoola choola, choola hoola[/i]!\"\n \n\"He said,\" Will translates, \"[i]How dare you defying our sacred ground again, Beardless[/i]?\"\n \nYou facepalm. Again, your grandfather screwed you up with his misdeeds.\n\nThe lemon-headed warrior continues: \"[i]Choola choola choola! Hoola choola choola![/i]\"\n \n\"He says you are unworthy,\" Will translates, \"Of standing next to the big monkey god and his shaman, captain.\"\n \n\"Big monkey god?\" you ask, \"Does he mean Sam? And Laura is his shaman?\"\n \n\"So it seems,\" Will concludes, trembling.\n\nYou look at the natives again. Now you realize the only reason you're still alive is that they don't want to upset Sam, their alleged monkey-god.\n\nShoulder to shoulder with your crew, you quickly assess the situation. The slightest error could spell doom on you all: who will be the one who saves the day?\n*fake_choice\n    #Save us, Will. You're the only one who can reason with this angry mob.\n        *set Will %+20\n        *set Wit %+20\n        \"Me?\" Will shakes. \"Please, no. I am too afraid!\"\n         \n        \"We've got no choice, Will!\" you insist, sweating cold. \"You're the only one who can talk to them. Save us, Will!\"\n        \n        Sighing, he turns to face the lemon-headed warrior. Trying to gesticulate as little as possible, Will starts speaking in the natives' language.\n         \n        The angry warrior is surprised at first, but then he starts negotiating with Will.\n        \n        While they frantically exchange \"Hoolas\" and \"Choolas,\" you try to stay calm, ignoring the dozens of masked archers aiming at you.\n        *page_break We're in your hands!\n        \n        Eventually, the lemon-headed man takes his mask away and gives it to Will. He turns to all his followers and shouts an incomprehensible order. The other natives lower their weapons and bow in front of Sam.\n        \n        \"Let's go away!\" Will whispers trembling again, \"Quick!\"\n         \n        You all immediately leave the banana tree and head as fast as possible towards the jungle encircling the volcano.\n        \n        \"You deed awesome, Will!\" you cheer him. \"What did you say to save us all?\"\n         \n        \"I just told them,\" he replies awkwardly, \"That the almighty Monkey God wanted bananas. That's why we, his assistants, had to pick them for him. I then added that the Monkey God was pleased and would bestow his blessing on the village calming the angry Volcano God. But they should leave us alone, or the God would withdraw his blessing, and the volcano god would go mad too.\"\n         \n        \"Let's hope they will keep the promise,\" you add, entering the jungle. \"I don't want to end up in their cauldron.\"\n        *page_break Onwards!\n    *selectable_if (Mama >34) #Laura, pretend you're our monkey-god shaman and tell them to let us go!\n        *set Mama %+20\n        *set Wit %-20\n        \"Shaman?\" Laura asks, \"What's a shaman supposed to do?\"\n         \n        \"Who cares!\" you insist, sweating cold. \"Just scare them away with your amulets! Will will translate when necessary. Now go on and freak them out!\"\n        \n        Laura picks up her amulets. \"Woe to you, forsaken people!\" she loudly screams, \"How dare you interrupt the almighty Monkey God when he eats his bananas?\"\n         \n        The angry mob falls silent while Will translates.\n        \n        \"You defied the Monkey God!\" Laura continues, ritually waving her hands, \"Now you're going to experience his terrible wrath! Run, fools, or die on the spot!\"\n         \n        You try to stay calm, ignoring the dozens of masked archers aiming at you.\n        *page_break We're in your hands!\n        \n        Eventually, the lemon-headed man turns to all his followers and shouts an incomprehensible order. They suddenly turn heels and flee away at full speed.\n        \n        \"You did it, Laura!\" you jump, hugging her, \"Now, let's get away from here!\"\n         \n        You all immediately leave the banana tree and head as fast as possible towards the jungle encircling the volcano.\n                \n        \"Let's hope they will stay away from us,\" you add, entering the jungle. \"I don't want to end up in their cauldron.\"\n        *page_break Onwards!\n    *selectable_if (Slash >34) #Matthew, only your music can save us!\n        *set Slash %+20\n        *set Charm %+20\n        \"Ready to rock!\" Slash says, \"Which kind of song should I sing?\"\n         \n        \"Who cares!\" you reply, sweating cold. \"Just sing a song to buy us time! If possible, sing something that would persuade them into letting us go. We'll think of something in the meantime.\"\n         \n        \"Got it!\" Matthew embraces his guitar and starts singing.\n        \n        [i]Look at your young men fighting[/i]\n         \n        [i]Look at your women crying[/i]\n         \n        [i]Look at your young men dying[/i]\n         \n        [i]The way they've always done before[/i]\n        \n        [i]I don't need your civil war[/i]\n         \n        [i]It feeds the rich while it buries the poor[/i]\n         \n        [i]Your power hungry sellin' soldiers[/i]\n         \n        [i]In a human grocery store[/i]\n         \n        [i]Ain't that fresh[/i]\n         \n        [i]I don't need your civil war[/i]\n         \n        [i]No, no, no, no, no, no, no, no, no, no, no, no[/i]\n        \n        The angry mob falls silent, listening to Will's translation. You try to stay calm, ignoring the dozens of masked archers aiming at you.\n        *page_break We're in your hands!\n        \n        As soon as the concert ends, the lemon-headed man turns to all his followers and shouts an incomprehensible order. They suddenly turn their back on you and silently go away.\n        \n        \"You did it, Matthew!\" you jump, hugging his rotten body, \"Now, let's get away from here!\"\n         \n        You all immediately leave the banana tree and head as fast as possible towards the jungle encircling the volcano.\n        \n        \"Your music is powerful, indeed!\" says Will. \"I heard the lemon-headed leader say they would stop eating humans and become vegetarians instead.\"\n         \n        \"That's good news!\" you add, entering the jungle. \"Anyway, let's stay away from them. Should they change their minds again, I don't want to end up in their cauldron\".\n        *page_break Onwards!\n    *selectable_if (Sam >34) #There's only one way out. Sam, let them feel the wrath of the monkey god and crush them mercilessly!\n        *set Sam %+20\n        *set Charm %-20\n        Sam wavers. You can clearly tell he doesn't like the idea.\n         \n        \"Come on, Sam!\" you reply, sweating cold. \"It's eat or be eaten! You don't want them to eat us for dinner, do you? You don't need to kill every single one of them, just crush a couple of skulls, and the others will (hopefully) flee!\"\n         \n        Sighing, the colossal gorilla safely stores his monocle in his pocket.\n        \n        Sam emits a blood-chilling roar and flexes his powerful primate muscles.\n         \n        Fear paralyzes all the natives. You guessed right: they wouldn't dare to attack their Monkey God.\n        \n        Sam grabs two masked cannibals by the arms, twirls them in the air, and finally hurls them far away.\n        *page_break Way to go, Sam!\n        \n        Frightened by Sam's rage, the lemon-headed man turns to all his followers and shouts an incomprehensible order. They immediately turn heels and flee away at full speed.\n        \n        \"You did it, Sam!\" you jump, hugging his massive chest, \"Now, let's get away from here!\"\n         \n        You all immediately leave the banana tree and head as fast as possible towards the jungle encircling the volcano.\n                \n        \"Let's hope they will stay away from us,\" you add, entering the jungle. \"I don't want to end up in their cauldron.\"\n        *page_break Onwards!\n   \n*label volcano\nYou enter the jungle cautiously. You hear many different animal noises all around you. After a few steps, the vegetation becomes very thick.\n\n\"Where to, captain?\" Laura asks.\n \n\"To the volcano, of course!\" you reply. \"Let's climb its slopes. We'll then figure something out.\"\n \nEveryone nods.\n\nSam points his finger on the ground: he found a somehow trodden path.\n \n\"Good job!\" you say, \"Let's follow it.\"\n \n\"And hope it doesn't lead to the cannibals' village,\" Slash adds.\n*page_break Hopefully.\n\nYou hack your way through the dense vegetation, sweating and swatting obnoxious insects. You notice the terrain becomes increasingly hot and lava rocks emerge from the earth.\n\nAfter about two hours of tiring climbing, you see a large cave that seems to penetrate deep into the volcano’s bowels. A peculiar red light glows, pulsating from inside it.\n\n\"What now, captain?\" Will asks, frightened.\n\"Let's approach it cautiously,\" you reply, unsheathing your sword.\n\"I have a bad feeling about this,\" Laura adds, waddling. \"I feel my Voodoo powers waning. Time is running out!\"\n*fake_choice\n    #I know we're in a hurry, but better be cautious.\n        *set Wit %+10\n        Rushing to the cave, you suddenly have to stop when you see [b]five weird gorillas[/b] emerging from the tunnel's depths.\n    #What are we waiting for? Let's hurry it up!\n        *set Wit %-10\n        You approach the cave cautiously. You see [b]five weird gorillas[/b] emerging from the tunnel's depths.\n\nThe first one is wearing a blue pirate jacket and has a kind of ponytail hairstyle. He keeps his eyes closed.\n \nThe second one has a triangular hat and is entirely toothless.\n \nThe third gorilla has a curious dreadlocks hairstyle and never stops waving its muscular arms.\n \nThe fourth is incredibly thin, almost skeletal.\n \nThe fifth has the sweetest traits among all of them, seeming almost human.\n\nThe five gorillas solemnly sand in front of the cave entrance, preventing you from entering it. You all cautiously take a step backward.\n \n\"Weird guardian apes?\" Slash complains. \"I hope they don't like human flesh.\"\n \n\"Even if they did,\" Will replies, \"They would spare you. No one would ever eat a rotten bunch of flesh like you.\"\n\n\"Come on, let's focus.\" you stop the idle quarreling. Then you turn to Laura and ask: \"What are they? What should we do?\"\n \n\"I don't know.\" Laura sighs. \"My powers are abandoning me. The only thing I can tell is: these five gorillas are very bad Mojo.\"\n*page_break What now?\n\nDon't knowing what to do, you remain silent and still, sword in hand, watching the five weird gorilla guardians.\n\nSuddenly, Sam steps forward.\n\nFor the first time, you hear him speaking the gorillas' language! He utters squeaky sounds, growls, and gestures toward the five guardians.\n*page_break Great job, Sam!\n\nOnly the gorilla who keeps his eyes closed replies, but of course, you cannot understand.\n\nSam comes to you and writes on his notepad: '[i]They are the five Monkey Gods. They protect the Ruby Cave. Only those who pass the Trial of Memory can enter it and see its secrets. Enter the cave at your own risk.[/i]'\n\nWhile you tell the others what Sam wrote, you see the guardians stepping aside, positioning themselves on the left and on the right of the cave entrance. Looking at them, you feel a weird feeling, as if you met them before. How could this be possible?\n\n\"They cleared a path!\" Slash exults, \"Let's enter the cave!\"\n \n\"Without undergoing the Trial?\" Will objects, \"That would be suicide!\"\n*temp onlyone false\n*label trial\nThe Monkey God proudly stands guard beside the entrance, still keeping his eyes shut.\n*choice\n    *if (banana) #Sam, why don't you offer some bananas to the Monkey Gods?\n        *set banana false\n        *set onlyone true\n        Sam shows a big bunch of bananas to the guardians. The big gorillas become excited!\n        \n        After talking a little in their primate language, every gorilla starts eating bananas happily.\n         \n        They finish the bananas in no time. You see them questioning Sam, who points out the direction you all came from.\n        \n        Four gorillas rush in that directions, disappearing in the forest. Only one remains: the one who always keeps his eyes shut.\n        *page_break They enjoyed our gift.\n        \n        Sam comes back to you and writes on his notepad that the guardians are very happy and asked where we got those bananas. They're now off to get some more.\n        \n        \"Wonderful!\" Laura exclaims \"Do we still have to undergo the Trial?\"\n         \n        Sam shrugs.\n         \n        \"Anyway\" Will says \"Better having to deal with only one guardian than five.\"\n        *page_break You all agree.\n        *goto trial05\n    *disable_reuse #No time to waste! Let's ditch the Trial and enter the cave now!\n        *set Mojo -20\n        \"We cannot waste any more time!\" you say, striding forward, \"Let's enter the cave now!\"\n        \n        You cautiously approach the cave. Once you reach its entrance, your crew's courage falters. You realize they are four steps behind you.\n        \n        \"What happens?\" you ask, turning to them.\n         \n        \"We don't think that's a good idea\" Will replies, awkwardly, \"We'd rather pass the Trial before entering the cave.\"\n        \"Nonsense!\" you say, striding forward \"We've got no time! I'll go on ahead and show you there's nothing to be afraid of!\"\n        *page_break You enter alone.\n        \n        As soon as you cross the threshold, you don't see a thing. As if you fell into a pitch black pit.\n        \n        You immediately stop and turn back. Still, you can't see a thing. Terror holds your stomach in its dumbing grasp. You suddenly become blind, and you lost your sense of direction!\n        \n        \"Are you okay, captain?\" you hear Will calling you.\n         \n        You smile. \"Keep talking, Will!\" you shout.\n        \n        You follow Will's voice and after a few steps you see again! You realize you are outside the cave now. Everyone gathers around you.\n         \n        \"This is no good.\" you pant \"We cannot enter the cave this way. We gotta face the Trial first.\"\n        *page_break Everyone nods.\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial\n    #We'd better undergo the Trial of Memory.\n        *if (onlyone)\n            *goto trial05\n        *else\n            *goto firsttrial\n    \n*label firsttrial\nSam tells the Monkey Gods that you are ready to undergo the Trial. At least, that what you think he's doing.\n\nAfter exchanging roars, screeches and gestures with the other primates, Sam comes back and writes on his notepad.\n \nHe tells you that the trial works this way: the guardians will bestow their hand upon a person's head to scan its memories. Then they will ask a question. You need to provide five right answers to five different questions in order to be able to pass unscathed.\n \n\"Okay\" you nod \"What happens if we provide a wrong answer?\"\n \nSam shrugs.\n \n\"No need to waste more time.\" you say \"I am ready to undergo the trial.\"\n\n\"Wait, captain\" Laura says \"I'd like to go first. I'm used to mind-reading and I guess I could learn something useful for us all to pass the test more easily.\"\n*page_break She has a point.\n\nYou nod. \"We trust you, Laura!\" you say.\n\nSam escorts her to the monkey guardians. You see the best-looking gorilla approaching her and placing its hand over her head.\n\n\"I can hear a voice…\" Laura says \"A female voice! She's asking me [b]my cursed grandmother's full name[/b]!\"\n \n\"Awesome!\" you exult \"Go on, answer!\"\n \n\"Alas…\" Laura replies, crying \"I am not sure I can remember it correctly!\"\n*page_break How is this possible?\n\n\"Sorry, captain\" Laura cries while the gorilla holds its hand on her head \"I feel dizzy and confused. I m not sure whether my grandma's surname is [i]Capsize[/i] or [i]Cupsize[/i].\"\n \n\"This is not good!\" Slash curses.\n\n\"And…\" Laura continues, sobbing \"I don't remember if her name is [i]Carrie[/i] or [i]Cathy[/i]! Please, help me!\"\n\n*label trial01\nYou all strive to remember the names Voodoo Lady said. After consulting with your crew, you say:\n*choice\n    *disable_reuse #Carrie Capsize\n        *set Mojo -5\n        *set puzzle -1\n        \"Carrie Capsize!\" says Laura aloud.\n        \n        The guardian gorilla shakes its head.\n        \n        \"Damn!\" cries Laura \"I am so confused!\"\n this voice in their heads too.\n\n\"Easy!\" for the first time, you hear Sam's voice in your head. It's very different from what you expected. \n \n\"My favorite book is…\" Sam suddenly stops.\n \n\"Its title is…\"\n*page_break Come on, Sam!\n\n\"I know it's about maths!\" you hear Sam's confused voice in your head, \"Not ordinary algebra. Something more! A higher, advanced level!\"\n \n\"Stay calm, Sam!\" you think, \"We're all here with you!\"\n\n\"Captain!\" Sam breathes a sigh of relief. \"Help me out! I feel so confused! It's about maths, its theories, and it's written for experts.\"\n\n*label trial02sam\nYou all strive to remember Sam's favorite book's title. After consulting with your crew, you say:\n*choice\n    *disable_reuse #Advanced Math Theories.\n        *set Mojo %+5\n        *set puzzle +1\n        \"Advanced Math Theories!\" Sam exclaims, \"Yes, this is it!\"\n        \n        The guardian gorilla nods and takes its big hand away from Sam's hairy head.\n        \n        Suddenly, you don't hear voices in your head anymore. When Sam comes back, you hug him for a moment, then you turn to the others and say: \"We've seen what happens. You become confused, and even answering simple questions becomes very difficult. Don't worry and stay calm: together we'll succeed.\"\n        \n        \"Aye aye, captain!\" Slash says, \"I am going next. Wish me good luck!\"\n        *page_break Good luck, Slash!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial03\n    *disable_reuse #Math Theories for Advanced People.\n        *set Mojo -5\n        *set puzzle -1\n        \"Math Theories for Advanced People?\" whispers Sam in your head.\n        \n        The guardian gorilla shakes its head.\n        \n        \"For Newton's sake!\" curses Sam. \"This title it's far too long!\"\n        *page_break Try to remember!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial02sam\n    *disable_reuse #Advanced Theories of Mathematics.\n        *set Mojo -5\n        *set puzzle -1\n        \"Advanced Theories of Mathematics!\" shouts Sam in your head. \"No doubt about it!\"\n        \n        The guardian gorilla shakes its head.\n        \n        \"For Galileo's telescope!\" cries Sam. \"Now I remember there is no '[i]of[/i]' in the title!\"\n        *page_break Try to remember!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial02sam\n    *disable_reuse #Theories of Advanced Maths\n        *set Mojo -5\n        *set puzzle -1\n        \"Theories of Advanced Maths!\" shouts Sam in your head. \"Quite sure of it!\"\n        \n        The guardian gorilla shakes its head.\n        \n        \"Damn!\" cries Sam. \"I am so confused! But I'm sure the title is very similar to this one!\"\n        *page_break Good luck Sam!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial02sam\n        \n*label trial03\nSam escorts Matthew to the monkey guardians. You see the slim, emaciated gorilla approaching him and placing its hand over his rotten skull.\n\n\"I can hear a familiar voice in my empty head…\" Matthew says, \"He's asking me [b]my band's name[/b]!\"\n \n\"I know it!\" you exult. \"I am a big fan of yours!\"\n \nAlas, you all feel your heads fuzzy, and you cannot correctly remember the name.\n*page_break Damn Trial!\n\n\"Okay, captain\" Slash turns his skeletal body towards you. \"Let's focus. Is it [i]Guns 'n Roses[/i]?\"\n \n\"I'd say [i]Puns 'n Poses[/i],\" you reply, \"But I'm not a hundred percent sure.\"\n\n\"What about [i]Guns 'n Posers[/i]?…\" Matthew says, confused.\n \n\"I prefer [i]Puns 'n Roses[/i].\" you add.\n\n*label trial03slash\nYou all strive to remember Slash's band name. After consulting with your crew, you say:\n*choice\n    *disable_reuse #Guns 'n Roses!\n        *set Mojo -5\n        *set puzzle -1\n        \"Guns 'n Roses!\" says Matthew aloud.\n        \n        The skinny guardian gorilla shakes its head.\n        \n        \"Too bad!\" he says. \"It's a cool name, indeed! I gotta tell my buddies to change our name and use this instead.\"\n        *page_break Try to remember!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial03slash\n    *disable_reuse #Puns 'n Poses!\n        *set Mojo -5\n        *set puzzle -1\n        \"Puns 'n Poses?\" whispers Slash.\n        \n        The skinny guardian gorilla shakes its head.\n        \n        \"Damn!\" Slash replies, \"I was so sure about it!\"\n        *page_break Try to remember!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial03slash\n    *disable_reuse #Guns 'n Posers!\n        *set Mojo %+5\n        *set puzzle +1\n        \"Guns 'n Posers!\" shouts Matthew. \"The best ones all over the Caribbean!\"\n        \n        The skinny gorilla silently nods.\n        \n        Slash must try really hard to prevent his bone from collapsing. \"I feel drained,\" he says. \"My skull is even emptier than before.\"\n         \n        \"Come on; cheer up!\" you tell him, \"Your performance was great.\"\n        \n        \"I'm going next,\" Will says, \"Slash needs everyone's assistance now.\"\n        *page_break Good luck Will!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial04\n    *disable_reuse #Puns 'n Roses!\n        *set Mojo -5\n        *set puzzle -1\n        \"Puns 'n Roses?\" whispers Slash.\n        \n        The skinny guardian gorilla shakes its head.\n        \n        \"Of course not!\" Slash mutters, \"Who would use such a losers' name?\"\n        *page_break Try to remember!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial03slash\n        \n*label trial04\nSam escorts Will to the monkey guardians. You see the gorilla sporting dreadlocks approaching him and placing
