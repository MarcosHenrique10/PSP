y. \"Let's weigh anchor.\" You add, exiting the harbor.\n\nYou walk to leave the place, but suddenly you hear Dan's voice: \n\"I forgot to give you my card.\"\n \nDan catches up and hands you his business card.\n \n\"And here's something else to remember me by.\" he smiles, giving you an object.\n\n\"A compass?\" you ask, incredulous.\n \n\"An extra strong magnetic compass!\" he specifies\n \n\"With your picture on it…\" you add.\n \n\"That's right!\" Dan exclaims, waving his hands, \"It always points directly back here, so if you're looking for a good deal, you know where to go! I'll be right here when you come back, But I can't guarantee that any of these ships will!\"\n\nYou thank Dan and exit the harbor together with your crew. You can still hear Dan's voice: \"They're moving fast today! Yessiree... Can't hardly keep anything in stock.\"\n*page_break We'll be back.\n\nWhen you think you are far enough from Dan's, you stop and fill your crew in about the current situation.\n \nYou prefer not to tell them about the 'Why Buy?' implications.\n\n\"Long story short, we need at least 7000 Pieces of Eight, right?\" Slash says. \"If only we had enough time to put up a concert with my band…\"\n \n\"Alas, I'm afraid we don't have that much time.\" you sigh. \"Any more ideas?\"\n\n\"Well, we are talking about [i]previously boarded vessels[/i], right?\" asks Will. \"Why don't we board one and weigh anchor? Nobody would complain if we boarded a previously boarded ship, would they? It's like stealing from thieves.\"\n*fake_choice\n    #Nice idea! There's only one little problem...\n        *set Wit %+10\n    #No way! We would upset Davy Jones!\n        *set Wit %-10\n\"What?\" your crew is puzzled.\n \n\"How can I say it…\" you strive to find the right words \"Dan has a sort of [i]secret agreement[/i] with Davy Jones himself. I am afraid if we stole one of Dan's ships, the Flying Dutchman would hunt us down.\"\n\n\"Captain Jones is bad Mojo!\" Laura says, making the sign of the cross, \"We have enough problems of our own. Let's stay away from such troubles!\"\n \n\"I agree,\" you say. \"Any more ideas?\"\n\nYou see Sam writing on his notepad. You read: '[i]Let's go to the Circus![/i]'\n \n\"Are you nuts, Sam?\" Laura complains \"Don't you see I'm aging as fast as a mayfly? We don't have time for distractions!\"\n*fake_choice\n    #Laura is right. Any more ideas?\n        *set Mama %+10\n        *set Sam %-10\n        Sam shakes his head and gestures you to wait.\n         \n    #I think Sam has a point.\n        *set Mama %-10\n        *set Sam %+10\n        Sam nods.\n         \nThe big gorilla writes: '[i]Come to the Bucatini Brothers circus! 10,000 pieces o' eight prize for the brave![/i]'\n\n\"Now I remember!\" Will giggles. \"You're right, Sam! The ad on the bar's wall! Captain, now we know where to find the money we need!\"\n \n\"Good.\" you smile. \"To tell you the truth, I have a horrible feeling about the circus. Do we have a better option?\"\n\nSilence is the only answer.\n\n\"Well, I guess we have no choice.\" you sigh. \"Let's go talk with the Bucatini Brothers, hoping their offer still applies. Sam, so far, you've always exceeded our expectations in the field of geography. Do you know happen to know where the circus is?\"\n \nSam nods.\n \n\"I knew it! You're our number one navigator!\"\n*page_break Show us the way.\n\nYou leave the beach behind you and enter the forest. At this time of the night, it's quite a creepy scenario. Sam leads the way: you are sure most of the animals flee when they see him.\n \nThat's no wonder: you would do the same.\n\nWalking in this spooky environment, you suddenly feel the grip of fear choking your heart.\n \nWill you be able to lift your curse?\n \nWill you ever go back to your former self?\n \nBut most importantly…\n\nAre you the same person you were only one week ago?\n\nDeep inside, you feel that so much has changed in so little time. You have met many weird people, did many things you would never do, and realized that life can be different from what they always told you. But instead of feeling guilty, you are somehow starting to like the new ${Name} you're becoming. And this somehow frightens you now.\n\nYou feel on the verge of a psychological breakdown. What is right? What is wrong? Should you embrace the change, or should you stick to your former self?\n*fake_choice\n    *selectable_if (Aristocrat > 70) #No matter what happened, I'm always ${Name}, and I want my former life back.\n        *set Aristocrat %+10\n    #I am scared! I don't want to think about it now, but focus on lifting the curse instead.\n        *set Wit %-10\n    *selectable_if (Aristocrat \u003c 30) #I am captain Brushwood now, and I'm enjoying it!\n        *set Aristocrat %-10\n    #I'm so confused! I cannot make up my mind!\n\nMany questions taunt you about your future, but probably you should instead focus on solving more urgent matters.\n \nYou sigh: no matter how hard you try, worries and doubts clash in your mind while fear holds his grip on your heart.\n \nIn times like these, talking to a friend would normally help you feel better. But alas, all your friends are a hundred miles away. And they would not understand your current situation. \n\nThe only people who could understand you and give you advice are here, around you: your crew members.\n \nTalking to one of them would probably do you good. To whom will you open your heart?\n*choice\n    *selectable_if (Mama > 39) #I'm sure Laura would understand how I feel.\n        *set Mama %+20\n        *comment *set friend1 \"Mama\"\n        \"Hey, Laura!\" you call, \"Are you up for a little chat among girls?\"\n         \n        The old crone turns toward you with a smile. \"Of course, my dear… I mean, captain!\" she says, catching up with you. \"You look worried. What troubles you?\"\n         \n        \"Actually,\" you fake a smile, \"I'm anxious and afraid about my current situation. I mean, just look at me. This body is not mine, but I'm somehow starting to like it. I'm starting to like the pirate way of life. It might sound odd to you, but I'm going crazy because I don't know if liking this body and this life is right or wrong…\"\n         \n        Laura smiles. \"I can understand you very well,\" she says, \"We're in the same boat, after all.\"\n         \n        *goto mamafriend\n    *selectable_if (Sam > 39) #Sam cannot speak, but he will surely listen to my story.\n        *set Sam %+20\n        *comment *set friend1 \"Sam\"\n        \"Hey, Sam!\" you call, \"Can I talk with you for a minute?\"\n         \n        The huge gorilla turns toward you with a smile. He happily waits for you to catch up with him then you resume walking side by side in the dark forest.\n         \n        \"You know, Sam,\" you fake a smile, \"I'm anxious and afraid about my current situation. I mean, just look at me. This body is not mine, but I'm somehow starting to like it. I'm starting to like the pirate way of life. I might sound odd to you, but I'm going crazy because I don't know if liking this body and this life is right or wrong…\"\n         \n        Sam smiles. You can clearly tell he perfectly understands your situation.\n         \n        *goto samfriend\n    *selectable_if (Slash > 39) #I will ask Slash to play my favorite song to cheer me up.\n        *set Slash %+20\n        *comment *set friend1 \"Slash\"\n        \"Hey, Matthew!\" you call, \"Do you have a minute for me?\"\n         \n        \"I'm always there for you, captain!\" the rocker replies, getting close to you. He then starts singing: \"[i]When I look into your eyes… I can see something's wrong…[/i]\"\n                \n        \"Exactly.\" you smile, \"I'm anxious and afraid about my current situation. I mean, just look at me. This body is not mine, but I'm somehow starting to like it. I'm starting to like the pirate way of life. It might sound odd to you, but I'm going crazy because I don't know if liking this body and this life is right or wrong…\"\n         \n        Slash laughs. \"Are you really complaining about your situation with me…\" he says, showing you his rotten ribcage. \"You've got some nerves!\"\n         \n        *goto slashfriend\n    *selectable_if (Will > 39) #The only one who would understand how I feel is Will.\n        *set Will %+20\n        *set friend1 \"Will\"\n        \"Will!\" you call, \"Do you have a minute for me?\"\n         \n        \"Coming, captain!\" the spokesman replies, rushing towards you. He then looks into your eyes and says: \"How can I bring back a smile on your face, captain?\"\n                \n        \"That's exactly the point.\" you try to cheer you up, \"I'm anxious and afraid about my current situation. I mean, just look at me. This body is not mine, but I'm somehow starting to like it. I'm starting to like the pirate way of life. It might sound odd to you, but I'm going crazy because I don't know if liking this body and this life is right or wrong…\"\n         \n        \"I see,\" Will replies, gesticulating as always. \"It's not an easy situation at all. Just give me a minute, and I will figure something out.\"\n         \n        *goto willfriend\n    #Nobody of them could ever understand how I feel.\n        *set Charm %-5\n        You don't feel like talking to any one of them right now. You prefer to keep your distance and focus on the mission.\n         \n        *goto endfriend\n\n*label mamafriend\n\n\"I know that.\" you sigh. \"What about you? How do you feel about your current situation?\"\n \nLaura shows you her decaying smile. \"It's very kind of you, captain, to ask me how I feel.\"\n*page_break Tell me, Laura!\n\n\"When this curse started…\" Laura says, \"I was very upset. I hated everything about my [i]new[/i] situation: my clumsiness, my wrinkles, my bad breath, my ugly face…\"\n \nYou nod. Deep inside, you felt the same way too about your own situation.\n\n\"But then, I realized it!\" she adds. \"There is no use in complaining: I would try to look at the situation from a different point of view. And guess what I finally realized?\"  \n \n\"What did you realize, Laura?\" you ask, curious.\n \n\"I finally realized that time is very important,\" she answers, showing you her toothless grin. \"When I was young, beautiful, and careless, I thought I had all the time in the world. And this false belief led me to waste it on pointless activities.  If I continued that way, I would have spent my whole youth for nothing, instead of caring for the things and for the people I cherished.\"\n \nYou nod. She definitely has a point.\n\n\"Whatever happens,\" she adds, \"I will constructively use my time from now on. I will never waste a single moment again. Remember, captain: nothing, not even the Loa can give you back your wasted moments!\"\n*page_break You're right.\n\n\"That's why captain,\" Laura continues, \"Don't let this curse get you down. Use it to look at your life from a different perspective so you can become a better person!\"\n\nThese words shock you.\n \nFor the first time in your life, you look at your past life with critical eyes. You lost your parents at sea when you were very young, that's why your grandmother Helena raised you.\n \nFor the first time in your life, you realize that your grandmother made you the [i]perfect doll[/i] she always wanted. With a rigorous education, she tamed your rebel spirit and turned you into a nice, compliant, and educated puppet, programmed to marry a prince.\n\n\"Thank you very much, Laura,\" you say, while tears run down your cheeks. \"I can see things clearly now. Thanks to you, now…\" \n*fake_choice\n    #...I finally understand the importance of being kind to everyone.\n        *set Aristocrat %+10\n        *set Charm %+10\n    #...I know who's going to pay for all my sufferings.\n        *set Charm %-10\n        *set Wit %-10\n    #...I'll never look at things from a single point of view anymore.\n        *set Wit %-10\n\"I am happy I was of help!\" Laura says, walking side by side with you. \"You know, I am pleased to have you as our captain!\"\n \nHer words fill your heart with joy.\n*goto endfriend\n\n*label samfriend\n\n\"What about you?\" you ask, concerned, \"How do you feel about your current situation?\"\n \nSam's eyes shine. He's delighted to see that you care for him.\n*page_break Tell me, Sam!\n\nSam gestures you to wait a minute while he writes on his notepad. He writes that first, he deeply hated his [i]new[/i] situation: different body (not even a human one!), different language, impossibility to speak with other people.\n \nYou nod. Deep inside, you felt almost the same way too about your own situation.\n\nSam continues writing: since he was not the talkative type, he didn't care very much about his impossibility to speak with other people. But now he knows very well that reading and writing is not enough.\n \nAfter spending his best years in libraries, reading and writing, this unwanted curse suddenly showed him that the world is full of exciting people to talk to. Irony of fate, now that he'd like to talk to people, he cannot. So he's not quite sure if he should be thankful to this curse for teaching him the importance of talking to people or hate it because he cannot properly communicate with the people he now likes.\n \nYou nod. He definitely has a point. You didn't expect his situation to be so similar to yours.\n*page_break That's incredible.\n\n[i]That's why, captain[/i] Sam writes [i]Don't let this curse get you down. Talk to the people you love, tell them you cherish them![/i]\n\nThese words shock you.\n \nFor the first time in your life, you look at your past life with critical eyes. You lost your parents at sea when you were very young, that's why your grandmother Helena raised you.\n \nFor the first time in your life, you realize that your grandmother hated your grandfather Guy's pirate way of life and told you not to talk to him, or you would end up in jail.\n \nLittle by little, your silence made your grandfather think you hated him.\n \nLittle by little, he stopped telling you about his adventures.\n \nYour grandfather loved you, but you rejected his love, not talking to him.\n\n\"Thank you very much, Sam,\" you say, while tears run down your cheeks. \"I can see things clearly now. Thanks to you, now…\" \n*fake_choice\n    #...I finally understand the importance of talking to your loved ones.\n        *set Aristocrat %+10\n        *set Charm %+10\n    #...I know who's going to pay for all my sufferings.\n        *set Charm %-10\n        *set Wit %-10\n    #...I'll never look at things from a single point of view anymore.\n        *set Wit %-10\nSam suddenly lifts you up with his big, muscular arms and hugs you. He's so powerful he's about to crack your ribcage.\n \n\"Thank you, Sam…\" you say, coughing. \"But please, go easy on me. This way, you're going to kill me!\"\n\nHe puts you down, blushing. You resume walking through the dark forest.\n*goto endfriend\n\n*label slashfriend\n\n\"Don't get me wrong.\" you sigh. \"I know very well that you're the one who's suffering the most. Please tell me, how can you manage this? How can you be so happy in this terrible situation? Please, Slash, tell me how to soothe this pain I'm experiencing.\"\n \nSlash makes the sign of the horns. \"Just follow rule number 1 of showbiz: whatever happens…\"\n*page_break Show must go on.\n\n\"On that fateful day…\" Matthew starts playing his guitar. \"I freaked out. No sex, no booze, no drugs! Being undead is probably the worst curse a rockstar could even imagine to endure.\"\n \nYou nod. Deep inside, you felt the same way too about your own situation.\n\n\"But then, I realized it!\" she adds. \"I always thought that being a rockstar was all about money, parties, and ecstasy. You know what? I was wrong!\"  \n \n\"Wow! Awesome!\" you exclaim. \"Go on, tell me about your enlightenment!\".\n \n\"I finally realized that the most important thing is here,\" he answers, putting his skeletal hand through his decaying ribcage. \"Music. Inspiration. In one word: dreams!\"\n\nYou admire him, speechless.\n\n\"I thought this curse took everything away from me.\" he stops playing, \"But I was wrong. It only took away what was unnecessary for me. Not even death could take my dreams away from me. And thanks to these dreams, I never stopped singing, and I never will. Let me show you…\"\n\nHe starts singing one of his greatest hits:\n \n[i]You've got eyes of the bluest skies[/i]\n \n[i]As if they thought of rain[/i]\n \n[i]I'd hate to look into your eyes and see an ounce of pain[/i]\n \n[i]Your hair reminds me of a warm, safe place[/i]\n \n[i]Where as a child I'd hide[/i]\n \n[i]And pray for the thunder and the rain to quietly pass me by[/i]\n \n[i]Whoa, oh, oh sweet cap'n o' mine[/i]\n \n[i]Whoa whoa, oh, oh, oh sweet love of mine[/i]\n\nYou cannot believe it! Your favorite guitarist just dedicated a love song to you!\n*page_break Thank you, Matthew!.\n\n\"That's why, captain,\" Slash continues, \"Don't let this curse get you down. No matter what you are now, follow and embrace your dreams!\"\n\nThese words shock you.\n \nFor the first time in your life, you look at your past life with critical eyes. You lost your parents at sea when you were very young, that's why your grandmother Helena raised you.\n \nYou now remember what your childhood dream was: becoming a pirate like your grandfather Guy! But your grandma Helena was definitely against it. For the first time in your life, you sorely realize that your grandmother crushed all your dreams under a rigorous education.\n\n\"Thank you very much, Matthew,\" you say while tears run down your cheeks. \"I can see things clearly now. Thanks to you, now…\" \n*fake_choice\n    #...I perfectly understand the importance of childhood dreams.\n        *set Aristocrat %+10\n        *set Charm %+10\n    #...I know who's going to pay for all my sufferings.\n        *set Charm %-10\n        *set Wit %-10\n    #...I'll start chasing my childhood dreams again.\n        *set Wit %-10\n        *set Aristocrat %-10\n\"Your smile is the best possible reward,\" Slash says, wiping your tears away. \"You know, I am honored to play my guitar in your band… I mean, in your crew!\"\n \nHis words fill your heart with joy.\n*goto endfriend\n\n*label willfriend\n\n\"Thank you, Will.\" you sigh. \"What about you? How do you feel about your current situation?\"\n \nWill blushes. \"It's very kind of you, captain, to ask me how I feel, but my situation is nowhere as complicated as yours.\"\n*page_break Tell me, Will!\n\n\"Before this curse started…\" Will says, \"I was a severe and composed man. My work and my appearance were all that mattered to me.\"\n \nYou nod. Will's dedication was very similar to your own. Before all this commotion started, of course.\n\n\"Then, the curse came,\" he adds. \"Nobody trusted me anymore: I became a sort of living joke. Inside, I was the same, but people judged me only by my exterior appearance. It was very humiliating at first, but then I had enlightenment…\"  \n \n\"What did you realize, Will?\" you ask, curious.\n \n\"I finally realized that appearances don't matter,\" he answers, gesticulating as always. \"When I was the governor's spokesman, etiquette was all that mattered. But now, I know very well that you should not judge people from their exterior appearances. Prejudice is probably the worst problem of them all.\"\n \nYou nod. He definitely has a point.\n\n\"Whatever happens,\" she adds, \"I will never judge people from their appearances again. Remember, captain: no matter what people look like, it's what they do that defines them!\"\n*page_break You're right, Will.\n\n\"That's why, captain,\" Will continues, \"Don't let your outer appearances betray you. You can be whatever you want to be! And who cares what people say or think!\"\n\nThese words shock you.\n \nFor the first time in your life, you look at your past life with critical eyes. You lost your parents at sea when you were very young, that's why your grandmother Helena raised you.\n \nFor the first time in your life, you realize that you've always wanted to be like your grandfather Guy. You dressed like him, you talked like him, you behaved like him. But your grandmother Helena suppressed your spirit under the heel of a rigorous education. Against your will, she turned you into the granddaughter she always wanted.\n\n\"Thank you very much, Will,\" you say, while tears run down your cheek, \"I can see things clearly now. Thanks to you, now…\" \n*fake_choice\n    #...I will never judge anybody from their outer appearance.\n        *set Aristocrat %+10\n        *set Charm %+10\n    #...I know who's going to pay for all my sufferings.\n        *set Charm %-10\n        *set Wit %-10\n    #...I won't be afraid anymore of what I am.\n        *set Wit %-10\n\"I am pleased I was of help!\" Will says, walking side by side with you. \"Being part of your crew is both an honor and a pleasure, captain!\"\n \nHis words fill your heart with joy.\n*goto endfriend\n\n*label endfriend\n\nAfter a long walk into the dreary woods, you finally see a big tent in the distance. Many spotlights shine on it, and you hear distant, funny music playing.\n \n\"Is that the circus, Sam?\" you ask.\n \nThe colossal gorilla nods.\n \n\"It was about time,\" you add. \"Come on, ${Crew_Name}, let's kiss this creepy forest goodbye.\"\n*finish Bucatini, here we come!", "06_circus": "*comment *finish\n*image 06_circus.png center Chapter six: the circus\nYou exit the gloomy forest and arrive in a big clearing.\n \nA vast striped tent is built in its center, and you hear funny music coming from it. You see a long queue of people waiting for their turn in front of a busy ticket office.\n \nA big sign full of light bulbs reads: [i]Welcome to the Bold and Boisterous Bucatini Brothers Circus! The only circus where YOU are the star![/i]\n\n\"Wait a minute.\" Will says, \"WE are supposed to be this circus's stars? What does it mean?\"\n\"There is only one way to know,\" you say, striding towards the tent. \"Follow me.\"\n\nYou arrive near the tent, where you see two big booths. One reads \"Tickets\" and has a very long queue in front of it. The other one reads \"Stars\": there is not a single person in front of it.\n*fake_choice\n    #Let's line up at the first booth.\n        *set Mojo -5\n        You patiently reach the end of the line.\n        \n        Minutes pass, but the line stands still.\n         \n        \"This is going to take forever!\" Mama complains, \"We cannot wait so long!\"\n         \n        Everyone agrees. You nod, exit the line and lead the ${Crew_Name} to the other booth.\n        \n        *if Mojo \u003c1\n            *goto_scene gold\n    #We're superstars. Let's go to the second booth.\n        \nYou walk in front of the second booth, where you see two fancy-clothed men in the middle of a heated discussion.\n \nMan 1: \"I'd get in the cannon to do the maintenance, but the gunpowder makes me sneeze.\"\n \nMan 2: \"Well, I can't do it. I hurt my hand taming the lion last week.\"\n \nMan 1: \"I hardly think that little scratch compares to my chronic allergy. You get in the cannon.\"\n \nMan 2: \"You don't have any allergies, you faker. YOU get in the cannon.\"\n \nMan 1: \"No, YOU get in the cannon!\"\n \nMan 2: \"No, YOU get in the cannon!\"\n\nThey are so busy arguing that they didn't see you coming.\n*fake_choice\n    *selectable_if (Charm >= 50) #If I were you I'd send a gunner or a powder monkey.\n        *set Charm %+10\n    *selectable_if (Charm \u003c= 50) #Stop this stupid arguing, or I'll kick both your sorry asses!\n        *set Charm %-10\n    *selectable_if (Wit >= 50) #Hi everybody! The superstars are here! Where's the welcoming parade?\n        *set Wit %+10\n    *selectable_if (Wit \u003c= 50) #The ${Crew_Name}, scourge of the Seven Seas are here! Run for your life! \n        *set Wit %-10\n\nThe two men suddenly stop arguing. They look so much alike that they could be twins. They wear brightly-colored athlete uniforms, curly mustaches, and a retro haircut.\n \nAnd they have the annoying habit of interrupting one another while speaking.\n\nMan 1: \"Welcome, brave stars!\"\n \nMan 2: \"Welcome to our circus!\"\n \nMan 1: \"Say there, my hearties, how'd you like a chance…\"\n \nMan 2: \"A once in a lifetime chance…\"\n \nMan 1: \"To perform amazing feats…\"\n \nMan 2: \"Death-defying feats…\"\n \nMan 1: \"Well, not so death-defying, really…\"\n \nMan 2: \"Let's say [i]dangerous[/i] feats…\"\n \nMan 1: \"Well rewarded feats…\"\n \nMan 2: \"I'd say VERY well rewarded feats…\"\n \nMan 1: \"AND exciting!\"\n \nMan 2: \"With the Brave…\"\n \nMan 1: \"Blazing, Beefy…\"\n \nMan 2: \"And Exceedingly Well-Known…\"\n \nMan 1: \"Bold, Boisterous…\"\n \nMan 2: \"Bucatini Brothers!\"\n \nMan 1: \"That's us.\"\n \nMan 2: \"My brother Bernardo…\"\n \nBernardo: \"And my brother Bruno.\"\n \nBruno: \"Sounds good?\"\n*fake_choice\n    #Aye\n    #Perfect.\n    #Looking forward to it.\n\nBernardo: \"Perfect!\"\n \nBruno: \"Follow us.\"\n\nYou follow the two Bucatini brothers into the circus's backstage. You see many wild animals, a lot of gymnasts, different performers and many, many musketeers patrolling different areas.\n \n\"Where do you think they keep the money?\" Will whispers \"Asking for a friend, of course.\"\n \n\"No idea\" Laura answers \"Wherever it is, money is undoubtedly well guarded.\"\n \n\"Relax!\" Slash says \"And enjoy the show!\"\n \nSam just keeps walking and shakes his gorilla head, disapproving.\n*page_break Let's stay focused.\n\nYou finally arrive in a sort of changing room, full of brightly colored jumpsuits.\n\nBernardo: \"Here you are. As soon as each one of you wears one of these suits…\"\n \nBruno: \"You're ready for the show!\"\n\n*label beforeshow\nThe two brothers look at you, expectantly.\n*choice\n    *disable_reuse #So, what are we supposed to do?\n        Bernardo: \"You're here to entertain people…\"\n         \n        Bruno: \"Competing in the [b]Five Stars Challenge[/b]!\"\n        \n        \"The Five Stars Challenge?\" Laura says \"What's that?\"\n         \n        Bernardo: \"It's the greatest show of them all!\"\n         \n        Bruno: \"We choose randomly five specialties…\"\n         \n        Bernardo: \"And you do your best to entertain the people…\"\n         \n        Bruno: \"One specialty at a time…\"\n         \n        Bernardo: \"One challenger at a time!\"\n         \n        Bruno: \"Very easy, isn't it?\"\n        *page_break So far, so good.\n        \n        \"Let's recap…\" you say \"You choose five circus specialties randomly. We choose every time who is going to perform in the chosen specialty, right?\"\n         \n        Bernardo: \"Exactly! If our paying audience deems your performance good, you pass! This means…\"\n         \n        Bruno: \"You can face our next challenge. If not, you must send another member of your group to face the same challenge.\"\n        \n        Will rises his hand.\n         \n        Bernardo: \"Questions?\"\n         \n        Bruno: \"Go on, ask!\"\n         \n        \"I was wondering…\" he asks nervously \"What if nobody can put up a good performance?\"\n        \n        Bernardo: \"Easy. It's game over.\"\n         \n        Bruno: \"People boo at you.\"\n         \n        Bernardo: \"And of course, no prize for the losers.\"\n         \n        Bruno: \"You need to complete all five challenges to win.\"\n        *page_break Okay, got it.\n        *goto beforeshow\n    *disable_reuse #How much is the prize?\n        Bernardo: \"Didn't you see the ads?\"\n         \n        Bruno: \"Our magnificent prize is…\"\n         \n        Bernardo: \"Ten thousand Pieces Of Eight!\"\n         \n        Bruno: \"Complete all challenges and it's yours!\"\n        \n        Your crew exults.\n        *page_break Let's go!\n        *goto beforeshow\n    #Okay, ${Crew_Name}, let's put these uniforms on and let's get this show started!\n        Under the brothers' eyes, everyone gets the first jumpsuits that fits him and puts it on.\n         \n        In no time you are all wearing the same, fancy colored jumpsuits.\n        \n        Bernardo: \"Are they ready, bro?\"\n         \n        Bruno: \"They look ready to me, bro.\"\n         \n        Bernardo: \"Okay, me hearties. What's the name of your team?\"\n         \n        \"${Crew_Name}\" you reply.\n         \n        Bruno: \"Okay, ${Crew_Name}, you will be tonight's stars!\"\n        \n        \"One last question…\" Slash asks \"Who was the last team who won the challenge?\"\n         \n        Bernardo: \"Actually, nobody ever won.\"\n         \n        Bruno: \"If you won tonight, you would go straight into history books!\"\n         \n        Bernardo: \"Unlike all the others, who ended up…\"\n         \n        Bruno: \"In the graveyard or in the surgeon's office.\"\n        *fake_choice\n            *selectable_if (Pieces_of_Eight >1000) #This is suicide! Let's run away from here!\n            #Get ready to write a new page in history books!\n                *set Wit %+10\n            #As always, my bad feelings were right.\n                *set Wit %-10\n        *goto startshow\n*label startshow\nYou finally arrive in sight of the circus's central arena.\n \nBernardo: \"Wait here until your moment comes.\"\n \nBruno: \"Don't worry. It will come very soon.\"\n \nBernardo: \"Remember: only one contestant at a time…\"\n \nBruno: \"And please, do get to the last challenge…\"\n \nBernardo: \"Tonight we invited a special guest…\"\n \nBruno: \"Leaving him unchallenged would be very impolite.\"\n\nThe two brothers bow, leaving you in the custody of ten heavily armed musketeers, who immediately lever their rifles at you.\n \n\"Hey, cool down!\" Slash says, \"There's no need for this. We're not running away, right, captain?\"\n \nEveryone raises their hands, trembling.\n\nYou hear the brother's distant voices.\n \nBernardo: \"Last time's contestants shat their pants and ran away…\"\n \nBruno: \"We don't want this to happen today.\"\n*page_break No turning back now.\n\nThe show finally starts.\n\nBernardo enters the arena, and the crowd cheers him. Under the spotlight, he declaims: \"Welcome to the brave, blazing, beefy, bold, boisterous circus of the Bucatini Brothers! I am Bernardo…\"\n \n\"And I am Bruno!\" says his brother, getting a spotlight too. After a long applause, he continues: \"Tonight, as every night, five brave contestants from afar will perform our world-famous Five Stars Challenge!\"\n \nBernardo shouts: \"Let's give them a hearty welcome! Enter the ${Crew_Name}!\"\n\n\"Okay, me hearties!\" you say, \"It's our moment! Let's enter the arena…\"\n*fake_choice\n    *selectable_if ((Wit >= 50) or (Charm >= 50)) #...in a cool, charming way. As real superstars!\n        *set Charm %+20\n        *set Wit %+20\n        Your crew members nod.\n        \n        Sam goes first. He makes autographs on his notepad, turns them into paper airplanes, and sends them flying to the cheering crowd.\n         \n        Then goes Laura. She dances in a Voodoo Way, followed by a dozen Voodoo dolls. People love it.\n         \n        After her, Will enters the arena declaiming your deeds, your names, and your alleged renown.\n         \n        Then comes Slash, playing an incredibly cool solo on his guitar. The crowd explodes!\n         \n        Finally, you enter the arena waving your sword and shouting: \"I'll make you wear my sword like a shish kebab!\"\n    *selectable_if ((Wit \u003c 50) or (Charm \u003c 50)) #...in a scary, dreadful way. Let's show them who's bad!\n        *set Charm %-20\n        *set Wit %-20\n        Your crew members nod.\n        \n        Sam goes first. He stomps his feet and beats his chest, growling.\n         \n        Then goes Laura. She utters nasty curses with a low, fearful voice.\n         \n        After her, Will enters the arena declaiming your misdeeds, your cruelty, and your alleged lousy reputation.\n         \n        Then comes Slash, freaking everyone out with his undead body.\n         \n        Finally, you enter the silent arena. \"I am captain Brushwood!\" you shout, unsheathing your weapon. \"Run for your life or die by my sword!\"\n    #...and let's win this competition.\n        Your crew members nod.\n        \n        Holding your hand, you all enter the arena together.\n        \nBruno: \"Ladies and gentlemen: the ${Crew_Name}!\"\n\nThe crowd makes a big, welcoming applause for you.\n \nLooking around, you see dozens of musketeers lined up at the arena's perimeter.\n*page_break No easy way out.\n\n\"Okay, ladies and gentlemen!\" Bernardo says, getting the spotlight, \"Let our Five Stars Challenge start! Bruno, it's up to you!\"\n \n\"Thank you, Bernardo!\" the brother answers. Two valets bring him a lottery machine. He continues: \"Like every night, I'm going to draw the first challenge randomly. What specialty will be the first one?\"\n\nWhile everyone holds his breath, you can't help but notice that the two brothers lose their annoying talking habits when on stage.\n\n\"Will it be Lion Taming?\" asks Bernardo.\n \n\"I bet it will be a Fire Performance!\" Bruno replies.\n \nThe machine stops, and a ticket comes out.\n\n\"Ladies and gentlemen…\" Bernardo increases the crowd's expectations \"The first challenge will be…\"\n*page_break Suspense!\n\n\"[i][b]Clowning Art[/b][/i]!\" Bruno exclaims, showing the ticket to the crowd.\n \n\"Ladies and gentlemen!\" Bernardo shouts, \"Let's welcome our clown: the unique and only Joseph Grimaldi!\"\n \nBig applauses welcome a fancy dressed clown, who bows in front of the public from the arena's opposite side.\n \n\"Now!\" Bruno continues, \"Who's going to challenge Joseph in his clowning art?\"\n \n\"Choose your best member!\" Bernardo says, \"Our fellow Joseph is a tough nut to crack!\"\n\n\"Ridiculous!\" Laura says, spitting on the ground. \"First: I hate clowns. Second: how are we supposed to win against such a pro?\"\n \nEveryone shakes their head while valets bring you makeup, wigs, and whatever is needed to perform as a clown.\n\n*label clown\nThe vast public is waiting for you. Who is going to challenge the clown Grimaldi now?\n*choice\n    *disable_reuse #I am the captain. I will challenge the clown.\n        *set Mojo -5\n        *set puzzle -1\n        You paint your face white, wear a curly wig, and get a few funny gadgets.\n         \n        \"Good luck, captain!\" everyone says.\n        \n        You try your best telling jokes, waddling, and squirting water from a fake flower.\n         \n        People occasionally laugh, but you're obviously no match for the great clown Grimaldi.\n        \n        In the end, the crowd votes unanimously for your opponent. The Bucatini Brothers cheer their fellow member and invite a new contestant into the arena.\n        *page_break What a shame!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto clown\n    *disable_reuse #Laura, you are our best choice.\n        *set Mama %+10\n        *set puzzle -1\n        Laura doesn't seem happy at all.\n        \"As you wish, captain,\" she says, getting ready. \"Should I use my Voodoo Magic or not?\"\n        *choice\n            #Please, no magic. We don't want to anger the Loa.\n                *set Mojo -10\n                Laura picks up a few funny gadgets and enters the arena. \"I am already ridiculously old,\" she says, \"No need for makeup.\"\n\n                Laura tries her best, but she's slow, angry, and upset. Instead of making people laugh, she makes the crowd mad.\n                \n                In the end, the crowd votes unanimously for her opponent. The Bucatini Brothers cheer their fellow member and invite a new contestant into the arena.\n                *page_break What a shame!\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto clown\n            #We have to win no matter what. Use your magic.\n                *set Mojo -20\n                \"Very well!\" Laura giggles. \"I hate clowns, and now I'll kick his ass!\"\n                \n                She enters the arena without any gadgets or makeup. She holds her amulets high and recites: \"[i]Je vais me métamorphoser comme un caméléon juste pour humilier ce buffon[/i]\"\n\n                Laura transforms into a giant clown holding a massive toy hammer. The crowd is shocked initially, but when she starts beating Grimaldi with it, everyone bursts into laughter.\n                \n                The show is a very exhilarating one. When Laura goes back to her old, wrinkly shape, the crowd cheers her as the winner!\n                *page_break Way to go!\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto winclown\n    *disable_reuse #Sam, we're in your big hands.\n        *set Sam %+10\n        *set Mojo -5\n        *set puzzle -1\n        The colossal gorilla paints his face white, wears a curly wig, gets a few funny gadgets, and enters the arena.\n         \n        \"Captain,\" says Laura, \"How could he compete, when he cannot even speak?\"\n        \n        You suddenly realize Laura is right. Sam tries his best to look funny, but he's no match for the famous Grimaldi's jokes and funny gags.\n        \n        In the end, the crowd votes unanimously for his opponent. The Bucatini Brothers cheer their fellow member and invite a new contestant into the arena.\n        *page_break What a shame!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto clown\n    *disable_reuse #Slash, it's showtime!\n        *set Slash %+10\n        *set Mojo -5\n        *set puzzle -1\n        \"Leave it to me,\" says Matthew, wearing a curly blond wig, \"Let's rock!\"\n        \n        Slash puts up quite a show. He sings funny songs, juggles with his bones, but alas, he is no match for the famous clown Grimaldi.\n        \n        In the end, the crowd votes unanimously for his opponent. The Bucatini Brothers cheer their fellow member and invite a new contestant into the arena.\n        *page_break What a shame!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto clown\n    *disable_reuse #Will, you're the man!\n        *set Will %+10\n        *set Mojo +5\n        *set puzzle +1\n        \"Me?\" Will exclaims, \"Why me? I'm a statesman, not a buffoon!\"\n        \n        You gesture to the others to prepare him. They paint his face white, put a curly wig on his head, and stuff many gadgets into his pockets. Finally, Sam hurls him in the middle of the arena against his will.\n         \n        As soon as he lands, people burst into laughter.\n        \n        \"Captain, you'll pay for this!\" Will shouts at you, in his usual, ridiculous way.\n         \n        People don't stop laughing.\n        \n        Eventually, Will realizes it. His curse will be a boon in this particular situation!\n         \n        He then keeps on cursing you, telling people about his former story, stumbling every now and then in his clown trousers.\n        \n        His show is so funny that even Grimaldi applauses. Without any doubt, the crowd cheers Will as the winner!\n        *page_break Way to go, Will!\n        *goto winclown\n\n*label winclown\n\"Look, Bruno,\" Bernardo says, \"Seems like the ${Crew_Name} won their first star!\"\n \n\"Congratulations!\" Bruno smiles. \"Let's see how you will fare in the next challenge!\"\n\nYou don't have the time to celebrate: anxiety holds his grip on your hearts as soon as the lottery machine starts turning again.\n\n\"Will it be Juggling?\" asks Bernardo.\n \n\"I'd like to see some old-school Trapeze!\" Bruno replies.\n \nThe machine stops, and a ticket comes out.\n\n\"Ladies and gentlemen…\" Bernardo makes a long pause \"The second challenge will be…\"\n*page_break Suspense!\n\n\"[i][b]Sword Swallowing[/b][/i]!\" Bruno exclaims, showing the ticket to the crowd.\n \n\"Ladies and gentlemen!\" Bernardo shouts, \"Let's welcome our unique and only superstar: Fred McLone, better known to as '[i]Chevalier Cliquot[/i]'\"\n \nBig applauses welcome a man dressed in a red jumpsuit. His big mustaches barely hide a shining smile. Before you can even realize it, he unsheathes a dagger and swallows it.\n \n\"Awesome!\" Bruno applauds, \"Can our ${Crew_Name} challengers fare better than our champion?\"\n\nYou barely hold back your urge to reek. You could never stand watching such feats.\n \nValets bring you daggers, swords, sabers, and many other tools of the Sword Swallower's trade.\n\n*label swallow\nThe people loudly call you. Who is going to challenge Chevalier Cliquot now?\n*choice\n    *disable_reuse #I will overcome my disgust for this discipline and challenge him.\n        *set Mojo -10\n        *set puzzle -1\n        You resolutely pick up a dagger and walk into the center of the arena.\n         \n        \"Go for it, captain!\" everyone cheers you.\n        \n        You open your mouth and close your eyes, trying to think about something else. \n         \n        Alas, as soon as the dagger's pointy blade touches your tongue, you can't help but puke. Instead of a mighty show of prowess, you put up a pitiful display of incapacity.\n        \n        As expected, the crowd unanimously votes for your opponent. The Bucatini Brothers cheer their champion and invite a new contestant into the arena.\n        *page_break Too bad!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto swallow\n    *disable_reuse #Laura, win this competition for me.\n        *set Mama %+10\n        *set puzzle -1\n        Laura sighs.\n        \"As you wish, captain,\" she says, getting ready. \"Should I use my Voodoo Magic or not?\"\n        *choice\n            #Please, no magic. We don't want to anger the Loa.\n                *set Mojo -5\n                Laura picks up a little dirk and staggers toward the center of the arena.\n                 \n                A silence full of expectation welcomes her.\n\n                She lifts the dirk up in the air and closes her eyes. With a wrinkly, trembling hand, she brings the dirk close to her mouth.\n                 \n                Suddenly, the dirk drops from her trembling hand. \"Sorry,\" she apologizes. \"Old age is a wicked condition.\"\n                 \n                No matter how many times she tries, every time the weapon falls from the trembling hand, never going into her throat.\n\n                As expected, the crowd unanimously votes for her opponent. The Bucatini Brothers cheer their champion and invite a new contestant into the arena.\n                *page_break Too bad!\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto swallow\n            #We have to win no matter what. Use your magic.\n                *set Mojo -20\n                \"Very well!\" Laura giggles. \"I am a little hungry.\"\n                \n                She enters the arena holding several weapons in her trembling hands. She holds her amulets high and recites: \"[i]Ne vous pas du tout inquiétez, je vais manger toutes ces épées.[/i]\"\n\n                Laura holds a sword in her hand; she brings it in her mouth…\n                 \n                And bites it!\n                \n                Under the incredulous eyes of the crowd, she chews the sword piece by piece and swallows it with gusto.\n                 \n                The crowd is shocked initially, but then big applause starts. After she eats all the weapons as if they were made of candy, the crowd cheers her as the winner!\n                *page_break Way to go!\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto winswallow\n    *disable_reuse #Sam, we rely on you.\n        *set Sam %+10\n        *set Mojo -5\n        *set puzzle -1\n        Sam nods. He picks up a short sword and reaches the center of the arena.\n         \n        Everyone expects much from him.\n\n        He lifts the sword in the air and opens his wide gorilla mouth. Slowly, he inserts the short blade into his mouth.\n         \n        \"He's doing it!\" Slash shouts, excited.\n                \n        Sam swallows the sword, leaving only the handle out of his mouth.\n         \n        \"He did it!\" Laura shouts.\n        \n        Alas, Sam suddenly starts coughing and spits the sword out. The crowd unanimously votes for his opponent. The Bucatini Brothers cheer their champion and invite a new contestant into the arena.\n        *page_break Too bad!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto swallow\n    *disable_reuse #Slash, show them how it's done!\n        *set Slash %+10\n        *set Mojo %+5\n        *set puzzle +1\n        \"I won't let you down,\" Matthew says, grabbing as many weapons as he can.\n        \n        When he reaches the center of the arena, he throws a sword in the air. He opens his skull jaws and waits for the blade to effortlessly fall all the way through his bony body. \n        \n        People stand up and cheer him up!\n         \n        Bowing, Slash swallows one sword after another, and in the meantime, he sings his best hits!\n        \n        The show is so fantastic that even the world-famous Chevalier Cliquot bows in front of Slash as the crowd cheers him as the winner!\n        *page_break Way to go!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto winswallow\n    *disable_reuse #Will, you are our only hope!\n        *set Will %+10\n        *set Mojo -5\n        *set puzzle -1\n        \"Are you kidding?\" Will exclaims, \"I use swords. I don't swallow them!\"\n        \n        Seeing your determination, Will unwillingly picks up a dagger and goes towards the center of the arena.\n         \n        Under the expecting eyes of the public, he lifts the dagger and opens his mouth.\n        \n        \"No way!\" Will throws the dagger away. \"I cannot do this. I give up!\"\n         \n        People boo at him and unanimously votes for his opponent. The Bucatini Brothers cheer their champion and invite a new contestant into the arena.\n        *page_break Too bad!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto swallow\n\n*label winswallow\n\"Ladies and gentlemen!\" Bernardo says, \"The ${Crew_Name} won their second star! Let's make big applause for them!\"\n \n\"Congratulations!\" Bruno smiles. \"Can't wait to see what happens next!\"\n\nYou hold each others' hands as soon as the lottery machine starts turning again.\n\n\"What do you think about our guests, Bruno?\" asks Bernardo. \"They are not faring bad, are they?\"\n \n\"Not at all!\" Bruno replies. \"If they go on this way, I'd bet my money on them!\"\n \nThe machine stops, and a ticket comes out. Bruno laughs, and winks to his brother.\n\n\"Ladies and gentlemen…\" Bernardo looks at you with a weird smile \"The third challenge of this great show will be a very uncommon one…\"\n*page_break Suspense!\n\n\"[i][b]Insect Extravaganza[/b][/i]!\" Bruno exclaims, showing the ticket to the crowd.\n\n\"WHAT?\" you all exclaim.\n\n\"Exactly, ladies and gentlemen!\" Bernardo shouts, \"This is a unique show you can find only here, at the Bucatini Brothers circus!\"\n \n\"Well said, bro!\" Bruno adds \"My dear guests, behold how our talented artist will entertain you by interacting with the most dreaded animals ever: bugs!\"\n \n\"Ladies and gentlemen\" Bernardo declaims \"Please, make a hearty welcome for our superstar: Marina Chen a.k.a. [i]Ladybug[/i]!\"\n*page_break How appropriate!\n\nOn the opposite side of the arena four valets transport a big plate where a buzzing mass of crawling insects stands. As soon as the applause starts, the millions of insects crawl away into a big basket in the center of the arena. On the plate now only a masked girl remains, wearing a red jumpsuit with black dots.\n \n\"There she is,\" Bruno applauds, \"Our beautiful Ladybug! Our one and only mistress of the crawling mass!\"\n\n\"Gross!\" Will exclaims, barely holding back gags. \"Who on earth would ever want to deal with filthy bugs?\"\n \n\"You never practiced Voodoo, did you?\" Laura replies with a pitiful glance.\n\nUnder your amazed eyes, Ladybug walks to the big basket, plunges her hand into the crawling insects mass, grabs a giant red-headed centipede and eats it alive. The crowd makes a standing ovation.\n\n*label insect\nYou hear the crowd calling you. Who is going to challenge Ladybug now?\n*choice\n    *disable_reuse #I will challenge her. I don't feel like asking others to perform such a difficult task.\n        *set Mojo -5\n        *set puzzle -1\n        You gather all your courage and approach the big basket full of insects.\n         \n        \"We're rooting for you, captain!\" everyone cheers you.\n        \n        Ladybug steps away and bows, gesturing you to go on first. \n         \n        Alas, as soon as you touch that creeping mass of crickets, cicadas, grasshoppers, ants, scorpions, tarantulas and centipedes, your courage fails you. Dozens of oozing insects crawl all over your body, making you scream for help.\n        \n        Five valets run to your help, throwing you into a bucket full of water.  The Bucatini Brothers cheer Ladybug and invite a new contestant into the arena.\n        *page_break What a pity!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto insect\n    *disable_reuse #Laura, they're all yours.\n        *set Mama %+10\n        Laura smiles.\n        \"You know what?\" she says, \"I actually love spiders. Should I use my Voodoo powers?\"\n        *choice\n            #Please, no magic. We don't want to anger the Loa.\n                *set Mojo %+5\n                *set puzzle +1\n                Laura walks slowly towards the center of the arena.\n                 \n                Ladybug steps away and bows as she passes by.\n\n                Suddenly, Laura falls on her knees. You all run to help her, but the musketeers block you.\n                 \n                Before you can argue with the guards, you see Laura going on all fours and tapping the ground in a curious way.\n                                \n                While the musketeers bring you back to your place, you see a swarm of insects exiting the big basket and rushing toward Laura.\n                 \n                Following her tapping instructions, you see the crawling mass dividing up in many different sections, lined up in a martial way all over the arena. After a minute, you realize with great surprise that the insects piled up their tiny bodies to create a sentence that reads: [i]${Crew_Name} rule[/i]!\n\n                A great applause starts! Ladybug bows before Laura, who is immediately cheered as the winner.\n                *page_break Way to go!\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto wininsect\n            #We have to win no matter what. Use your magic.\n                *set Mojo -20\n                Laura walks slowly towards the center of the arena.\n                 \n                Ladybug steps away and bows as she passes by.\n\n                When she gets near the central basket full of insects, she holds her amulets high and recites: \"[i]Mes ordres seront directs, obéissez-moi, bande d'insectes ![/i]\"\n                \n                Following Laura's directions, the crawling mass of insects sprays up toward the ceiling like a majestic fountain.\n                 \n                People start a big applause when the vast insect mass takes the shape of a big elephant.\n                 \n                Finally, you see the crawling mass dividing up in many different sections, lined up in a martial way all over the arena. After a minute, you realize with great surprise that the insects piled up their tiny bodies to create a sentence that reads: [i]${Crew_Name} rule[/i]!\n\n                A great applause starts! Ladybug bows before Laura, who is immediately cheered as the winner.\n                *page_break Way to go!\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto wininsect\n    *disable_reuse #Sam, we rely on you.\n        *set Sam %+10\n        *set puzzle -1\n        Sam nods. He reluctantly goes to the center of the arena.\n         \n        You instinctively hold your breath.\n\n        The big gorilla plunges his arm into the crawling mass of insects. You rejoice: he doesn't seem disgusted at all! On the contrary, the big, hairy beast starts chewing some termites.\n                \n        You clearly see he's enjoying the meal: Sam plunges his arms into the oozing insect mass over and over again.\n         \n        Too bad nobody is impressed. Watching a gorilla eating bugs is not much of a show.\n        \n        The Bucatini Brothers thank Sam for trying and invite a new contestant into the arena.\n        *page_break Too bad!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto insect\n    *disable_reuse #Slash, show them how it's done!\n        *set Slash %+10\n        *set Mojo -5\n        *set puzzle -1\n        \"I'll do my best,\" Matthew says, grabbing his guitar.\n         \n        Ladybug steps away and bows as she passes by.\n        \n        When he reaches the center of the arena, he starts singing.\n        [i]La cucaracha, y machine starts turning again.\n\n\"What would you like to see now, Bruno?\" asks Bernardo. \"You know, I'd be delighted to see some juggling.\"\n \n\"No way!\" Bruno shakes his head. \"I'd rather see some human cannonball!\"\n \nThe machine stops, and a ticket comes out.\n\n\"Ladies and gentlemen…\" Bernardo looks at you. \"The fourth challenge of tonight's great show will be…\"\n*page_break Suspense!\n\n\"[i][b]Human Cannonball[/b][/i]!\" Bruno exclaims, showing the ticket to the crowd. \"I'm so happy!\"\n \n\"Lady luck always favors you!\" Bernardo complains, then with a studied, theatrical move declaims: \"Ladies and gentlemen, behold our marvelous gun: the Zamzama!\"\n\nA loud applause starts as a massive cannon enters the arena. On its opposite side, valets position three big tubs full of water and surround them with a suspended net.\n \n\"Before the show starts,\" Bruno adds, \"Our valiant clowns will make a brief demonstration on how one uses it.\"\n \n\"Come on, Bruno!\" Bernardo laughs. \"Everyone knows how to use a cannon!\"\n \n\"Not THIS cannon, bro.\" Bruno says, \"One must exactly know the person's weight, so to use the exact amount of gunpowder. After that, one must choose the exact direction and elevation…\"\n \n\"Too complicated!\" Bernardo interrupts him, \"I'd rather just light the fuse!\"\n\nYou all watch the clowns as they operate the impressive gun.\n*page_break Pay attention!\n\nThe first clown fills the cannon with gunpowder, and then the second one enters it. The first clown rotates a wheel and adjusts directions. After that, he ignites the fuse and looks at the Bucatini Brothers.\n \n\"FIRE!\" they shout, excited.\n\nA loud boom echoes in the circus. From a cloud of smoke, the crying clown flies toward the roof, making a big hole in it. Then it disappears from view.\n\n\"Is the clown dead?\" Will asks nervously.\n \nYou don't know what to say.\n\n\"Ladies and gentlemen, you saw our cannon's amazing power!\" Bruno exclaims. A funny piece of music starts when he turns to you: \"Our cannon is VERY powerful, so keep in mind: don't put too much gunpowder in it!\"\n\nYou see dread masking the face of every single member of your crew. Failing to correctly operate that gunpowder contraption spells certain doom.\n\n\"Show must go on!\" Bernardo smiles. \"Ladies and gentlemen, big applause for our great artists! Our flying fairy Rossa Matilda Richter, a.k.a. [i]Zazel[/i] and her gunpowder magician: \nMr. [i]Ildebrando Zacchini[/i]!\n\nA finely dressed man enters the arena, followed by a very young girl in a fairy costume. She seems to be about fourteen years old.\n \nAnd she doesn't look scared at all!\n*page_break She's so brave!\n\n\"Say, Bernardo…\" Bruno asks, \"Do you think our fairy will fly to the close tub, to the central one, or she'll try to reach the farthest one?\"\n \n\"Oh, I'd really like to see if reaching the farthest one is actually possible!\" Bernardo answers, \"Without breaking your neck, of course.\"\n\n\"I have an idea!\" Bruno giggles. \"Let's ask tonight's contestants!\"\n \n\"Wonderful idea, bro!\" Bernardo replies. Then he turns to you and asks: \"Where should our artists aim? At the nearest tub, at the central one, or at the farthest one?\"\n*fake_choice\n    #They should aim at the nearest, safest one. I'm very concerned about that little girl's safety.\n        *set Charm %+10\n        Zaziel's answer shock you: \"The first tub is for biscuit-eating landlubbers!\" She turns to Ildebrando and says: \"Zacchini, do your magic!\"\n        \n        \"I see sparkles tonight!\" Bruno says, \"Fire your guns!\"\n    #If I were them, I'd aim at the central tub.\n        *set Aristocrat %+10\n        \"That's why you'll lose!\" Zaziel replies sarcastically. She then turns to Ildebrando and says: \"Zacchini, do your magic!\"\n        \n        \"I see sparkles tonight!\" Bruno says, \"Fire your guns!\"\n    *selectable_if ((Aristocrat \u003c 50) and (Wit > 50)) #We are going to aim at the farthest tub. We don't really care about what they'll do.\n        *set Aristocrat %-10\n        *set Wit %+10\n        \"Nice try, scallywag!\" Zaziel replies, \"We won't fall for such a cheap trick!\" She then turns to Ildebrando and says: \"Zacchini, do your magic!\"\n        \n        \"I see sparkles tonight!\" Bruno says, \"Fire your guns!\"\n\nThe gunpowder magician adjusts the big gun and lights the fuse. With a big boom, Zaziel flies into the air.\n \nFluttering her fake wings like a pixie, she gives kisses and greetings to everyone before diving elegantly into the tub.\n\n\"Behold, ladies and gentlemen!\" Bernardo exclaims, clapping his hands. \"Our flying fairy reached the second tub. Isn't she lovely? Now it's our contestants' turn. How will they fare?\"\n \n\"We'll see very soon!\" Bruno replies. \"Come on, ${Crew_Name}, choose two members who will face our champions!\"\n\nYou're about to volunteer when you feel Sam's big, hairy hand on your shoulder, blocking you.\n \n\"Not this time, captain,\" Slash says, grinning, \"We cannot afford to break your neck. If something happens to you, we're all doomed.\"\n \nYou disagree, but you see the strong determination in everybody's eyes on this topic.\n\n*label cannon\nYou hear the crowd calling you. Who is going to challenge Zaziel and Zacchini now?\n*choice\n    *disable_reuse #I choose Will as the gunner and Sam as the human projectile.\n        *set Will %+10\n        *comment *set Sam %+10\n        *set Mojo -5\n        *set puzzle -1\n        Will and Sam look at each other and approach the enormous gun while the crowd roars.\n         \n        \"You can do it!\" your all cheer them.\n        \n        Will puts a whole barrel of gunpowder in the gun. \n         \n        Alas, when Sam tries to fit into the giant cannon's mouth, he bitterly realizes he's way too large. He tries to fit in in every possible way: head first, legs first, and arms first, but to no avail.\n        \n        \"This is not working ng their heads.\n\n                Slash decides to put half a barrel of gunpowder into the giant cannon.\n                 \n                Laura needs a lot of help to climb into the cannon's mouth, but she eventually manages to do it.\n                                \n                Hesitantly, Slash adjusts the cannon. You can hear Laura's prayers echoing from inside the big iron gun: \"[i]Je ne veux pas finir dans un mausolée, je te prie Papa Legba laisse-moi voler![/i]\"\n                 \n                Eventually, The undead rocker lights the fuse. With a big boom, Laura flies into the air.\n\n                When the smoke fades, everyone realizes that Laura has two big, scary bat wings! Ignoring the gun's thrust, she flies over the screaming crowd on the left. Then she soars over the unbelieving people sitting on the arena's right side.\n                 \n                After soaring up to the tent's roof, she finally swoops down to the farthest water tub. But she doesn't dive in it: she suddenly stops on its border and dips her toe into the cold water while her majestic wings suddenly disappear.\n                \n                The crowd explodes in a jubilating round of applause. Even Zaziel and Zacchini clap their hands.\n                *page_break Way to go!\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto wincannon\n    *disable_reuse #I choose Sam as the gunner and Will as the human projectile.\n        *comment *set Will %+10\n        *set Sam %+10\n        *set Mojo +5\n        *set puzzle +1\n        Sam picks up Will on his shoulder. Together, they approach the big gun while the crowd roars.\n         \n        \"Go for it!\" your all cheer them.\n\n        \"A gorilla as a gunner?\" Zacchini mocks you, \"How lame! How dare you insult me like this?\"\n         \n        Ignoring the crowd's laughter, Sam starts his calculations. He weighs Will in his arms and takes notes. After two pages of reckoning, he carefully pours precisely 73 pounds of gunpowder into the cannon's mouth.\n                \n        Suddenly, the crowd starts to take Sam seriously. Silence falls into the arena as Will enters the giant cannon's mouth, making the sign of the cross.\n        *page_break Fingers crossed!\n        \n        Slowly, Sam adjusts the cannon according to his calculations.\n         \n        \"Ladies and gentlemen!\" Bernardo exclaims, \"Our contestants aim at the furthest tub!\"\n         \n        \"Will the big ape succeed…\" Bruno adds. \"Where everyone else failed?\"\n        \n        Without further hesitations, Sam lights the fuse. A big explosion sends Will screaming up in the air.\n        \n        Holding your breath, you follow screaming Will's flight until he splashes into the farthest tub.\n         \n        The crowd explodes in a big round of applause as Sam closes his notepad with a satisfied expression. Even Zaziel and Zacchini clap their hands.\n        *page_break Way to go!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto wincannon\n    *disable_reuse #I choose Laura as the gunner and Slash as the human projectile.\n        *set Mama %+10\n        *comment *set Slash %+10\n        *set Mojo -5\n        *set puzzle -1\n        Laura and Slash amble towards the big gun.\n         \n        Zaziel and Zacchini laugh at them, shaking their heads.\n\n        Laura decides to put only four pounds of gunpowder into the giant cannon. \"You're all bones,\" she says, \"That will be enough!\"\n         \n        Sam leaves his guitar on the floor and quickly climbs into the cannon's mouth.\n         \n        \"Let's get this over with!\" says Laura, lighting the fuse. \"Are you ready to fly, bag of bones?\"\n\n        Suddenly, a horrible feeling overwhelms you.\n         \n        \"Stop, Laura!\" you scream, running toward the gun.\n        \n        With a mighty boom, the giant cannon scatters Slash's bones all over the arena.\n         \n        What a mess!\n         \n        Sighing, you gesture to your crew to gather every single bone and put poor Slash together again.\n        \n        \"A scattershot!\" Bernardo laughs. \"Alas, that's not quite close to matching our champions' prowess. ${Crew_Name}, choose two different members, and try again!\"\n        *page_break What a pity!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto cannon\n        \n*label wincannon\n\"Ladies and gentlemen!\" Bernardo exclaims, excited, \"For the first time in our show, a group of contestants actually managed to achieve four stars! Let's give it up for the ${Crew_Name}!\"\n\nThe hundreds of people sitting around the arena stand up and cheer for you. \n\n\"We are thrilled!\" Bruno smiles. \"I'm looking forward to see how our contestants will fare against tonight's [i]special guest[/i].\"\n \n\"Yessiree\" Bernardo nods \"Until now, they've exceeded expectations. I just can't wait for the final event to start. I'm sure our special guest feels the same.\"\n \n\"We all feel the same here, don't we?\" Bruno asks to the crowd. A big roar of approval rises from the public.\n\n\"Great!\" Bernardo smiles \"Our special guest tonight is a local superstar.\"\n \n\"She is one of those people who is best not to upset.\" Bruno adds. He then realizes: \"Ops! Did I say too much?\"\n \n\"As always, your loose lips sink ships!\" Bernardo laughs \"Well, no point in being mysterious anymore. I guess everyone here already realized who we're talking about.\"\n \n\"Ladies and gentlemen\" the two brothers shout \"Let's give a hearty welcome to our special guest. Enter now the sharp, the edgy, the one and only…\"\n*page_break Suspense!\n\n\"[i][b]Karola Zvaard[/b][/i], the Sword Mistress!\"\n\nThe spotlight shines on a white-haired, braided lady wielding two rapiers. Her blue merciless eyes shine on a scarred, wrinkly and freckled face. She looks venerable, but this doesn't mean she's not dangerous!\n \nPeople loudly shout her name, cheering her. She strides onward like she doesn't care, like a lioness hunting her prey.\n\n\"Behold!\" Bernardo says, excited \"The lioness from Amsterdam has chosen her prey!\"\n \n\"I'm so happy I'm not the one!\" Bruno replies \"Who among the ${Crew_Name} will face the rapier-tooth Dutchwoman of Scuffle Island in an Insult Sword Fighting duel?\"\n\n\"Avast!\" she shouts.\n \nSilence immediately follows.\n \n\"Only their captain would be a worthy opponent.\" Karola adds, swinging her rapiers in a menacing way \"I won't settle for less, [i]ja[/i]?\"\n \n\"A challenge, ladies and gentlemen!\" Bernardo shouts \"Will the captain accept it? I'm so thrilled!\"\n*page_break Everyone looks at you.\n\nYou clearly cannot back off now. And you clearly remember your grandfather bragging a lot about her. Mostly about her annoying Dutch accent.\n\"Here I come!\" you sigh, unsheathing your sword. Then you add:\n*fake_choice\n    *selectable_if (Charm >= 50) #It's a honor dueling with you. I am captain Brushwood, [i]en garde[/i]!\n        *set Charm %+20\n        \"So it IS you!\" the lady spits on the ground. \"Nice to meet you again! How can you look so young? After I kick your sorry ass, you gotta tell me the name of the devil you made a pact with, [i]ja[/i]?\"\n        \n        \"Awesome!\" Bruno is thrilled. \"This will be a great fight! Let's do a quick recap of the duel rules!\"\n    *selectable_if (Charm \u003c= 50) #How could such an old crone put up a decent fight? The prize is already ours, ${Crew_Name}! \n        *set Charm %-20\n        \"After I'll kick your sorry ass,\" the lady spits on the ground, \"You'll finally learn respect. If you're still alive, [i]ja[/i]?\"\n        \n        \"Awesome!\" Bruno is thrilled. \"This will be a great fight! Let's do a quick recap of the duel rules!\"\n    *selectable_if (Wit >= 50) #Go easy on me, won't you? I'm here for the ip to captain ${Name}[/i]. Gotta keep my promise'.\"\n\nYou all breathe a sigh of relief. \"Can we see the ship again?\" you ask.\n \n\"Why not?\" Dan replies, chuckling, \"I got all day! Walk this way. Hard to stay away from a good mystery, isn't it?\"\n\nYou arrive near the Sea Donkey. Luckily, it's still there.\n \n\"As I told you,\" Dan says, gesticulating nervously, \"I have two good offers for this little baby here. I hope you brought enough money with you, or I'll have no choice but to sell this ship to those people.\"\n*page_break Of course.\n\nYou open the pouch in front of Dan. \"Is ${Pieces_of_Eight} Pieces of Eight enough for this baby? If not, we could add five tickets for the Boisterous circus of the Bucatini Brothers!\"\n \n\"The money's enough…\" Dan replies, \"...to start a negotiation. Would you please follow me in my office, captain?\"\n \nYou gesture to your crew to wait for you near the ship, and you follow Dan into his red-roofed office.\n\n\"Have a seat, captain!\" he says, pouring grog into a mug. \"How about some good booze?\"\n*fake_choice\n    #Yes, please!\n        Dan hands you the mug. You thank him, but you avoid drinking it.\n    #I don't drink on duty.\n        Dan smiles.\n\n\"Now,\" Dan waves his hand hypnotically, \"Let's get down to brass tacks, shall we? I know you want it… you know you want it… and I know that you know that I want to sell it, so…\"\n \n\"Well,\" you interrupt him, \"What do you think it's worth?\"\n \n\"You could sail this puppy away TODAY...\" Dan replies, \"...for just 10000 Pieces of Eight.\"\n\nYou remain silent, wondering.\n\"I know,\" Dan continues, \"It's a lot of money. Why don't you consider our [i]Why Buy[/i] offer? If you did, you could save all your money and use it wisely. One never knows what could happen during a daring expedition: if I were you, I'd save my money and use it to solve unexpected contingencies.\"\n \n\"By the way…\" you ask. \"Is the ship safe? It won't break down if a storm comes,
