<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One Minute Mysteries — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "oneminmysteries", "title": "One Minute Mysteries", "scenes": {"bonus_puzzles": "Here are all the bonus mysteries! These were removed from the main game, for various different reasons.\n\n*goto mystery_b_main\n\n*label mystery_b_main\n\nWhat mystery would you like to solve?\n\n*choice\n #Bonus Mystery 1: The Lying Roommate\n  *goto mystery_b_1\n #Bonus Mystery 2: John's Infantile Excuse\n  *goto mystery_b_2\n #Bonus Mystery 3: Where's Nancy?\n  *goto mystery_b_3\n #Bonus Mystery 4: Radio Problems\n  *goto mystery_b_4\n #Bonus Mystery 5: The Lost Hidden Animal\n  *goto mystery_b_5\n #Go to Part 1: Getting Started\n  *goto_scene part1\n *selectable_if (part_2_unlocked = true) #Go to Part 2: Get a Clue\n  *goto_scene part2\n *selectable_if (part_3_unlocked = true) #Go to Part 3: The West Wing Game\n  *goto_scene part3\n *selectable_if (part_4_unlocked = true) #Go to Part 4: The Secret of Shady Ranch\n  *goto_scene part4\n *selectable_if (part_5_unlocked = true) #Go to Part 5: Encyclopedia Clown\n  *goto_scene part5\n\n\n\n\n*label mystery_b_1\n*if (mystery_b_1_solved)\n You have already solved this mystery. Would you like to read it again?\n\n *choice\n  #Yes\n   *goto mystery_b_1_start\n  #No\n   *goto mystery_b_main\n*else\n *goto mystery_b_1_start\n\n*label mystery_b_1_start\nBONUS MYSTERY #1: The Lying Roommate\n\n\"How did you know who my roommate is?\" Andy asked Shelly. \"I never told you his name.\"\n\n\"I had to do a bit of detective work to figure it out,\" Shelly said. \"You're not the only detective in town, you know! I knew you just started college this year, so I asked around until someone pointed me in the direction of the freshman dorm. The person at the front desk said you lived on the fourth floor.\"\n\n\"The receptionist gives out my personal information to strangers?\" Andy asked. \"I'm not sure I like the sound of that...\"\n\n\"I went to the fourth floor, where I met four different guys,\" Shelly said. \"I asked them all about you, and they had something different to say.\"\n\n\"Oh?\"\n\n\"Dan said that your roommate is Steven,\" Shelly said. \"George said either he or Dan is your roommate. Leroy said...well, Leroy said he hated you, and if you were his roommate, he'd request a single room.\"\n\n\"Ouch,\" Andy said. Leroy must still be mad, over the time Andy proved he was lying about his homework. \"What about the last one?\"\n\n\"The last one was Lewis,\" Shelly said. \"He said the other three were lying. I wasn't sure who to trust, since I never met any of them before.\"\n\nUsing the four statements, Shelly was able to determine the identity of Andy's roommate. CAN YOU DO THE SAME?\n\n*goto mystery_b_1_check\n\n*label mystery_b_1_check\n*if (mystery_b_1_answers = 0) and (mystery_b_1_solved = true)\n You have run out of chances to solve this mystery!\n\n The solution is that Lewis is Andy's roommate. The other three men lied. We know this, because Dan and George's statements contradict each other; therefore, one or both of them must be lying.\n\n This puzzle was removed from the game, because one of the testers found an alternate solution. Namely, Leroy is the only truth-teller in the group. That is still a valid solution according to the puzzle rules! This puzzle was removed because of its extra solution, and it was later rewritten as Puzzle #35.\n\n *goto check_mysteries\n*if (mystery_b_1_answers = 0) and (mystery_b_1_solved = false)\n *set mystery_b_1_solved true\n *set puzzles_failed_b + 1\n *set puzzles_solved_real_b + 1\n You have run out of chances to solve this mystery!\n\n The solution is that Lewis is Andy's roommate. The other three men lied. We know this, because Dan and George's statements contradict each other; therefore, one or both of them must be lying.\n\n This puzzle was removed from the game, because one of the testers found an alternate solution. Namely, Leroy is the only truth-teller in the group. That is still a valid solution according to the puzzle rules! This puzzle was removed because of its extra solution, and it was later rewritten as Puzzle #35.\n\n *goto check_mysteries\n*if (mystery_b_1_answers > 0)\n *goto mystery_b_1_solve\n\n*label mystery_b_1_right_answer\n*if not (mystery_b_1_solved)\n *set mystery_b_1_solved true\n *set puzzles_solved_b + 1\n *set puzzles_solved_real_b + 1\n *goto mystery_b_1_right_answer_2\n*else\n *goto mystery_b_1_right_answer_2\n\n*label mystery_b_1_right_answer_2\nThat is correct! The solution is that Lewis is Andy's roommate. The other three men lied. We know this, because Dan and George's statements contradict each other; therefore, one or both of them must be lying.\n\nThis puzzle was removed from the game, because one of the testers found an alternate solution. Namely, Leroy is the only truth-teller in the group. That is still a valid solution according to the puzzle rules! This puzzle was removed because of its extra solution, and it was later rewritten as Puzzle #35.\n\n*goto check_mysteries\n\n*label mystery_b_1_solve\n*if (enter_answer)\n *choice\n  #Input your answer\n   *input_text player_answer\n   *if (\"$!!{player_answer}\" = \"LEWIS\")\n     *goto mystery_b_1_right_answer\n     *goto check_mysteries\n   *else\n     *goto mystery_b_1_wrong_answer\n  *if (mystery_b_1_hints = 1) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 2) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 3) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 4) #See hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 5) #See hint\n   *goto mystery_b_1_hint\n  #Solve a different mystery\n   *goto mystery_b_main\n\n*else\n *choice\n  #Steven\n   *goto mystery_b_1_wrong_answer\n  #Lewis\n   *goto mystery_b_1_right_answer\n  *if (answer_3_visible) #Leroy\n   *goto mystery_b_1_wrong_answer\n  *if (answer_4_visible) #Dan\n   *goto mystery_b_1_wrong_answer\n  *if (answer_5_visible) #George\n   *goto mystery_b_1_wrong_answer\n  *if (mystery_b_1_hints = 1) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 2) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 3) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 4) #See hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 5) #See hint\n   *goto mystery_b_1_hint\n  #Solve a different mystery\n   *goto mystery_b_main\n\n*label mystery_b_1_hint\n*if (mystery_b_1_hints = 1) or (mystery_b_1_hints = 4)\n *set mystery_b_1_hints 4\n It's not Steven.\n\n *choice\n  #Try solving the mystery\n   *goto mystery_b_1\n  #Solve another mystery\n   *goto mystery_b_main\n\n*if mystery_b_1_hints = 2\n *set mystery_b_1_hints 3\n It's not Steven.\n\n *choice\n  #Use another hint\n   *goto mystery_b_1_hint\n  #Try solving the mystery\n   *goto mystery_b_1\n  #Solve another mystery\n   *goto mystery_b_main\n\n*if (mystery_b_1_hints = 3) or (mystery_b_1_hints = 5)\n *set mystery_b_1_hints 5\n It's not Steven. George and Dan are both lying, those jerks!\n\n *choice\n  #Try solving the mystery\n   *goto mystery_b_1\n  #Solve another mystery\n   *goto mystery_b_main\n\n*label mystery_b_1_wrong_answer\n*if (mystery_b_1_solved = true)\n *set wrong_answers_b + 1\n *goto mystery_b_1_wrong_answer_2\n*if (mystery_b_1_solved = false) and (mystery_b_1_answers > 1)\n *set wrong_answers_b + 1\n *set mystery_b_1_answers - 1\n *goto mystery_b_1_wrong_answer_2\n*if (mystery_b_1_solved = false) and (mystery_b_1_answers = 1)\n *set wrong_answers_b + 1\n *set mystery_b_1_answers - 1\n *goto mystery_b_1_check\n\n*label mystery_b_1_wrong_answer_2\nI'm sorry. That is not correct. You have ${mystery_b_1_answers} more chances to answer. What do you want to do?\n\n*choice\n #Try to solve the mystery again\n  *goto mystery_b_1\n  *if (mystery_b_1_hints = 2) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 1) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 3) #Use a hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 4) #See hint\n   *goto mystery_b_1_hint\n  *if (mystery_b_1_hints = 5) #See hint\n   *goto mystery_b_1_hint\n #Solve a different mystery\n  *goto mystery_b_main\n\n\n\n\n\n\n*label mystery_b_2\n*if (mystery_b_2_solved)\n You have already solved this mystery. Would you like to read it again?\n\n *choice\n  #Yes\n   *goto mystery_b_2_start\n  #No\n   *goto mystery_b_main\n*else\n *goto mystery_b_2_start\n\n*label mystery_b_2_start\nBONUS MYSTERY 2: John's Infantile Excuse\n\nJohn Jerky was a champion troublemaker. He and his friends liked to call themselves the wolves. They SHOULD have called themselves \"the whisks\". They were always stirring up trouble.\n\nAs Andy and Shelly approached, they saw John was fighting with a professor. \"I told you, the deadline was last week,\" the professor said. \"I don't care what excuse you come up with. The paper is is late.\"\n\n\"But I have a good reason for not doing the paper on time,\" John argued. \"My cousin gave birth to her first child last week. I had to leave campus in order to be there.\"\n\n\"And just why did you have to be there?\" Shelly asked loudly.\n\nJohn jumped slightly and frowned when he saw the two detectives. \"If it isn't my good friend, Shelly Kindle,\" he said. \"Sticking your nose where it doesn't belong, I see!\"\n\n\"The young woman makes a good point,\" the professor said. \"I understand the birth of a new family member can be disruptive, but as you said, this is your cousin's child, not yours. Why did you have to leave campus to be there?\"\n\n\"It's simple. They're naming the baby after me!\" John said proudly. \"I'm everyone's favorite cousin, after all.\"\n\n\"The only thing someone would name after you is a garbage dump,\" Shelly said. \"This sounds like one of your dumb excuses, so you can get an extension on your paper. I bet your cousin didn't give birth at all.\"\n\n\"I've got proof!\" John said. He produced a photograph of a smiling baby with a pink hat. Its eyes were closed, and a hand with a tube attached was placed on the baby's back.\n\n\"It looks like a newborn,\" Shelly said. \"But she can't be related to you. She's too cute.\"\n\n\"That's a boy baby. I told you, they named it after me,\" John said. \"And check out the time stamp on the picture.\"\n\n\"It says it was taken the day before the deadline,\" the professor said. \"Hmmm...I guess you're telling the truth. You did have a good excuse for not submitting your paper on time.\"\n\n\"Not so fast!\" Andy said. \"This picture is a phony! There's something in the picture which shouldn't be there!\"\n\nWHAT SHOULDN'T BE THERE?\n\n*goto mystery_b_2_check\n\n*label mystery_b_2_check\n*if (mystery_b_2_answers = 0) and (mystery_b_2_solved = true)\n You have run out of chances to solve this mystery!\n\n The solution is that newborn babies cannot smile. Since the baby in the photograph is smiling, it is not a newborn. Confronted with this fact, John admitted the photograph was a fake. The professor gave him an F, as a result.\n\n This mystery was removed from the game, when it was decided that Andy and Sandy would be detectives, not mystery-solving college students. Shelly's name was changed to \"Sandy\", too.\n\n *goto check_mysteries\n*if (mystery_b_2_answers = 0) and (mystery_b_2_solved = false)\n *set mystery_b_2_solved true\n *set puzzles_failed_b + 1\n *set puzzles_solved_real_b + 1\n You have run out of chances to solve this mystery!\n\n The solution is that newborn babies cannot smile. Since the baby in the photograph is smiling, it is not a newborn. Confronted with this fact, John admitted the photograph was a fake. The professor gave him an F, as a result.\n\n This mystery was removed from the game, when it was decided that Andy and Sandy would be detectives, not mystery-solving college students. Shelly's name was changed to \"Sandy\", too.\n\n *goto check_mysteries\n*if (mystery_b_2_answers > 0)\n *goto mystery_b_2_solve\n\n*label mystery_b_2_right_answer\n*if not (mystery_b_2_s and Sandy were about to close the detective office for the night, when a group of official-looking men in suits and sunglasses came inside.\n\n\"Are you Andy Carson and Sandy Crewe?\" the tallest one asked.\n\n\"Um...yes,\" Andy said. \"How can we help you?\"\n\n\"We're members of the Secret Service,\" the man explained. \"We need to speak with you about a matter of national security.\"\n\n\"Oh no!\" Sandy said. \"Has something happened to President Hayley?\"\n\nAlex Hayley was the youngest woman ever to be elected President of the United States. She had been in office for three and a half years, and she was currently in the middle of seeking a second term.\n\n\"Does it have anything to do with her re-election campaign?\" Andy asked.\n\n\"That is correct,\" the man said. \"She was giving a speech today, at an arena that's about an hour south of the White House.\"\n\n\"She's been travelling to a lot of different states recently,\" another agent said. \"Maryland, Georgia, East Virginia, and so on. As you'd expect, this poses a major security risk. We don't have enough time to secure every location in advance, especially when she insists on making unscheduled stops.\"\n\n\"She had us pull over at a local burger joint,\" the third agent said. \"She went in to get a large fry, a double-sized burger and a small soda. After twenty minutes, we went in to see what was taking her so long. She was nowhere to be found.\"\n\n\"The President was kidnapped?\" Sandy gasped. \n\n\"Wait,\" Andy said. \"There's something wrong with what you just said.\"\n\nWHAT IS WRONG?\n\n*goto mystery_3_1_check\n\n*label mystery_3_1_check\n*if (mystery_3_1_answers = 0) and (mystery_3_1_solved = true)\n You have run out of chances to solve this mystery!\n\n The solution is that East Virginia is not a state. Therefore, President Hayley could not have gone there. When Andy pointed this out, the secret service agents apologized. They had lied on purpose, in order to test Andy's detective skills. They w 3_8\n #Solve Mystery 29: A Robbery\n  *goto mystery_3_9\n #Solve Mystery 30: The Presidential Password\n  *goto mystery_3_10\n #Go to Part 1: Getting Started\n  *goto_scene part1\n #Go to Part 2: Get a Clue\n  *goto_scene part2\n *selectable_if (part_4_unlocked = true) #Go to Part 4: The Secret of Shady Ranch\n  *goto_scene part4\n *selectable_if (part_5_unlocked = true) #Go to Part 5: Encyclopedia Clown\n  *goto_scene part5\n *if (bonus_puzzles_unlocked = true) #Go to the bonus puzzles\n  *goto_scene bonus_puzzles\n\n\n\n", "part4": "This is Part 4: The Secret of Shady Ranch. Andy and Sandy go on vacation, where they solve a mystery involving long-lost treasure and a ghost cow!\n\n*goto mystery_4_main\n\n*label mystery_4_main\nWhat mystery would you like to solve?\n\n*choice\n #Mystery 31: A New Mystery\n  *goto mystery_4_1\n #Mystery 32: The Locked Safe\n  *goto mystery_4_2\n #Mystery 33: Murder or Suicide?\n  *goto mystery_4_3\n #Mystery 34: On the Menu\n  *goto mystery_4_4\n #Mystery 35: Oh, Brother, Where Art Cow?\n  *goto mystery_4_5\n #Mystery 36: The Cheating Gambler\n  *goto mystery_4_6\n #Mystery 37: A Locked Room Mystery\n  *goto mystery_4_7\n #Mystery 38: The Treasure Map\n  *goto mystery_4_8\n #Mystery 39: The Culprit Revealed\n  *goto mystery_4_9\n #Mystery 40: A Long-Lost Letter\n  *goto mystery_4_10\n #Go to Part 1: Getting Started\n  *goto_scene part1\n #Go to Part 2: Get a Clue\n  *goto_scene part2\n #Go to Part 3: The West Wing Game\n  *goto_scene part3\n *selectable_if (part_5_unlocked = true) #Go to Part 5: Encyclopedia Clown\n  *goto_scene part5\n *if (bonus_puzzles_unlocked = true) #Go to the bonus puzzles\n  *goto_scene bonus_puzzles\n\n\n\n\n*label mystery_4_1\n*if (mystery_4_1_solved)\n You have already solved this mystery. Would you like to read it again?\n\n *choice\n  #Yes\n   *goto mystery_4_1_start\n  #No\n   *goto mystery_4_main\n*else\n *goto mystery_4_1_start\n\n*label mystery_4_1_start\nMYSTERY #31: A New Mystery\n\n\"Hey, Detectives!\" Ralph Riddle said. \"I've got a fantastic present for you!\"\n\n\"More riddles?\" Andy asked.\n\n\"Even better!\" Ralph said. \"It's a vacation for two! Both of you are going to stay at Shady Ranch this weekend!\"\n\n\"You're giving us a free vacation?\" Sandy gasped.\n\n\"I sure am!\" Ralph said. \"Of course, you only got invited because there's a mystery to be solved, but I'm sure it won't take up much of your time.\"\n\nRalph explained that his cousin Rex works at Shady Ranch. The owner of the ranch recently found an old map, leading to a fantastic treasure. Almost immediately after, the ranch was attacked by a ghost cow.\n\n\"A ghost cow?\" Sandy asked.\n\n\"Everyone is terrified of the cow,\" Ralph said. \"Its moo will send shivers down your spine. Half of the ranch's guests have cancelled their vacations! If you don't solve the mystery right away, why, the ranch could go bankrupt!\" \n\n\"I think a free vacation, in exchange for finding a ghost cow sounds like a good idea,\" Andy said.\n\n\"I'm more interested in finding that fantastic treasure, but sure, I'm willing to go, too,\" Sandy said.\n\n\"Great! But before I give you the tickets...\" Ralph said.\n\n\"We have to solve your latest riddle?\" Andy asked.\n\n\"You sure do, partner!\" Ralph said.\n\n[i]My name means eight, but I'm not eighth.[/i]\n*line_break\n[i]I'm a month with thirty-one days.[/i]\n*line_break\n[i]As soon as I start, people want me to end,[/i]\n*line_break\n[i]So witches and goblins can play.[/i]\n\nWHAT MONTH IS HE TALKING ABOUT?\n\n*goto mystery_4_1_check\n\n*label mystery_4_1_check\n*if (mystery_4_1_answers = 0) and (mystery_4_1_solved = true)\n You have run out of chances to solve this mystery!\n\n The solution to the riddle is the month October, which has thirty-one days. At the end of October, children dress up as witches and goblins for Halloween. \"Octo\" means \"eight\", as in the words \"octopus\" and \"octagon\". As a reward for solving the riddle, Ralph gave them the tickets.\n\n *goto check_mysteries\n*if (mystery_4_1_answers = 0) and (mystery_4_1_solved = false)\n *set mystery_4_1_solved true\n *set puzzles_failed + 1\n *set puzzles_solved_real + 1\n You have run out of chances to solve this mystery!\n\n The solution to the riddle is the month October, which has thirty-one days. At the end of October, children dress up as witches and goblins for Halloween. \"Octo\" means \"eight\", as in the words \"octopus\" and \"octagon\". As a reward for solving the riddle, Ralph gave them the tickets.\n\n *goto check_mysteries\n*if (mystery_4_1_answers > 0)\n *goto mystery_4_1_solve\n\n*label mystery_4_1_solve\n*if (enter_answer)\n *choice\n  #Input your answer\n   *input_text player_answer\n   *if (\"$!!{player_answer}\" = \"OCTOBER\")\n     *goto mystery_4_1_right_answer\n     *goto check_mysteries\n   *else\n     *goto mystery_4_1_wrong_answer\n  *if (mystery_4_1_hints = 1) #Use a hint\n   *goto mystery_4_1_hint\n  *if (mystery_4_1_hints = 2) #Use a hint\n   *goto mystery_4_1_hint\n  *if (mystery_4_1_hints = 3) #Use a hint\n   *goto mystery_4_1_hint\n  *if (mystery_4_1_hints = 4) #See hint\n   *goto mystery_4_1_hint\n  *if (mystery_4_1_hints = 5) #See hint\n   *goto mystery_4_1_hint\n  #Solve a different mystery\n   *goto mystery_4_main\n\n*else\n *choice\n  *if (answer_3_visible) #August\n   *goto mystery_4_1_wrong_answer\n  *if (answer_4_visible) #January\n   *goto mystery_4_1_wrong_answer\n  #December\n   *goto mystery_4_1_wrong_answer\n  *if (answer_5_visible) #July\n   *goto mystery_4_1_wrong_answer\n  #October\n   *goto mystery_4_1_right_answer\n  *if (mystery_4_1_hints = 1) #Use a hint\n   *goto mystery_4_1_hint\n  *if (mystery_4_1_hints = 2) #Use a hint\n   *goto mystery_4_1_hint\n  *if (mystery_4_1_hints = 3) #Use a hint\n   *goto mystery_4_1_hint\n  *if (mystery_4_1_hints = 4) #See hint\n   *goto mystery_4_1_hint\n  *if (mystery_4_1_hints = 5) #See hint\n   *goto mystery_4_1_hint\n  #Solve a different mystery\n   *goto mystery_ , 'cause it was locked with an impossible puzzle.\"\n\n\"And someone finally solved the puzzle?\" Andy asked.\n\n\"Yup,\" Davis said. \"Can't believe someone solved the puzzle after a hundred and fifty years. See, a bunch of different letters were carved on the front of the safe. They gave the key to opening the safe.\"\n\nRe\n*line_break\nOr\n*line_break\nYe \n*line_break\nGr \n*line_break\nBl \n*line_break\nIn\n\nWHAT WORD UNLOCKS THE SAFE?\n\n*goto mystery_4_2_check\n\n*label mystery_4_2_check\n*if (mystery_4_2_answers = 0) and (mystery_4_2_solved = true)\n You have run out of chances to solve this mystery!\n\n \"Violet\" or \"purple\" is the word that unlocks the safe. The sequence is [b]Re[/b]d [b]Or[/b]ange [b]Ye[/b]llow [b]Gr[/b]een [b]Bl[/b]ue [b]In[/b]digo [b]Pu[/b]rple. It's all the colors of the rainbow, in order! When Sandy solved the mystery, Davis was so impressed, he insisted on carrying her luggage to her room. Seems like our handsome cowboy might be a little smitten.\n\n *goto check_mysteries\n*if (mystery_4_2_answers = 0) and (mystery_4_2_solved = false)\n *set mystery_4_2_solved true\n *set puzzles_failed + 1\n *set puzzles_solved_real + 1\n You have run out of chances to solve this mystery!\n\n \"Violet\" or \"purple\" is the word that unlocks the safe. The sequence is [b]Re[/b]d [b]Or[/b]ange [b]Ye[/b]llow [b]Gr[/b]een [b]Bl[/b]ue [b]In[/b]digo [b]Pu[/b]rple. It's all the colors of the rainbow, in order! When Sandy solved the mystery, Davis was so impressed, he insisted on carrying her luggage to her room. Seems like our handsome cowboy might be a little smitten.\n\n *goto check_mysteries\n*if (mystery_4_2_answers > 0)\n *goto mystery_4_2_solve\n\n*label mystery_4_2_solve\n*if (enter_answer)\n *choice\n  #Input your answer\n   *input_text player_answer\n   *if ((\"$!!{player_answer}\" = \"VIOLET\") or (\"$!!{player_answer}\" = \"PURPLE\")) or ((\"$!!{player_answer}\" = \"VI\") or (\"$!!{player_answer}\" = \"PU\"))\n     *goto mystery_4_2_right_a owning around,\" Andy said. \"You're too young to be a detective. I bet you aren't even in middle school yet.\"\n\n\"That doesn't matter,\" the Encyclopedia said. \"I challenge you to a detective competition! The first one to stump the other one wins!\"\n\n\"Uh...okay,\" Andy said. \"What mystery do you have for me?\"\n\n\"Here's a case I solved for the local police,\" the Encyclopedia said. \"The wealthy Mrs. Poppycock went to the grand ball, wearing her million-dollar ruby necklace.\"\n\n\"I've met Mrs. Poppycock,\" Andy said. \"She was a little strange.\"\n\n\"She certainly is,\" the Encyclopedia said. \"She showed up wearing a frilly dress with bows on the back, and she insisted on walking backwards into the event, so everyone could see her bows. There were six bows all together, in a pyramid. The top one was red. The middle row was green, and the bottom row was blue, except for the one in the middle, which was also red. It was also the largest.\n\n\"As she was going through the door, she screamed. Police Detective Brown ran up from the other side of the room and shouted that her necklace was stolen. He saw it get taken, while she was walking up. Everyone was shocked. Who could have stolen her ruby necklace, when everyone was watching her? The only person remotely close to her was her husband. Do you know who stole the necklace?\"\n\nWHO STOLE THE NECKLACE?\n\n*goto mystery_5_1_check\n\n*label mystery_5_1_check\n*if (mystery_5_1_answers = 0) and (mystery_5_1_solved = true)\n You have run out of chances to solve this mystery!\n\n The solution is that Police Detective Brown is the thief. He claimed to see her necklace get stolen, as she was walking up. Remember, Mrs. Poppycock was facing backwards the whole time. He never had an opportunity to see if her necklace was there or not! The only way he could have known for certain that her necklace was stolen is if [i]he[/i] stole it!\n\n *goto check_mysteries\n*if (mystery_5_1_answers = 0) and (mystery_5_1_solved = fal Mystery 44: Spies\n  *goto mystery_5_4\n #Solve Mystery 45: The Stolen Ring\n  *goto mystery_5_5\n #Solve Mystery 46: Who Owns What Pet?\n  *goto mystery_5_6\n #Solve Mystery 47: The Gold Detector\n  *goto mystery_5_7\n #Solve Mystery 48: Last Names\n  *goto mystery_5_8\n #Solve Mystery 49: Singing Sabotage \n  *goto mystery_5_9\n #Solve Mystery 50: The Last Riddle\n  *goto mystery_5_10\n #Go to Part 1: Getting Started\n  *goto_scene part1\n #Go to Part 2: Get a Clue\n  *goto_scene part2\n #Go to Part 3: The West Wing Game\n  *goto_scene part3\n #Go to Part 4: The Secret of Shady Ranch\n  *goto_scene part4\n *if (bonus_puzzles_unlocked = true) #Go to the bonus puzzles\n  *goto_scene bonus_puzzles\n #Finish the game\n  *page_break End\n  We hope you've enjoyed playing [i]One Minute Mysteries.[/i]\n\n  *feedback\n\n  Choice of Games releases new games like this one on a regular basis.\n  *subscribe\n  *page_break\n\n  Thanks for playing!\n\n  *ending\n\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*set final_puzzle_trick false\n*set wrong_answers 2\n*set puzzles_solved 5\n*set puzzles_failed 0\n*set part_2_unlocked true\n*set part_3_unlocked false\n*set part_4_unlocked false\n*set part_5_unlocked false\n*set bonus_puzzles_unlocked false\nMYSTERY #6: Robbery in the Dark\n\n\"Thank you so much for coming,\" George said. \"If I don't find the stolen money soon, I'm going to be fired.\"\n\n\"How much money was stolen?\" Andy asked.\n\n\"It was a check for over a million dollars,\" George said. \"I know, I could probably trace the check through the bank or something, but then I'd have to tell my boss.\"\n\n\"What were you doing with a million dollar check on your desk?\" Sandy asked.\n\n\"A client was going to come by at 7:00 to pick it up,\" George said. \"So we left the front door open. Big mistake! I was working on my computer when the electricity in the entire building went off. I bet the culprit messed with the circuit breaker on purpose, as a distraction.\"\n\n\"Where is the circuit breaker?\" Andy asked.\n\n\"It's two floors down, in the basement,\" George said. \"I know, because after the power went off, I sent my boss an email on my computer, asking where the breaker was. Another big mistake! While my back was turned, someone knocked me out from behind.\"\n\nAndy looked over George's cubicle. The desktop computer was on the right-hand side, while the computer monitor was towards the middle. If George was working on the computer, someone could easily sneak into his cubicle and attack him unseen, especially if it was dark.\n\n\"Where did they hit you, specifically?\" Sandy asked.\n\n\"They hit me on the left side of the head, so I fell to the right,\" George said. \"I'm guessing it's because the culprit was left handed. The check was on the left side of the desk, incidentally.\"\n\nAndy shook his head. \"Give the money back, George,\" he said. \"It's obvious you faked the robbery.\"\n\nWHAT GAVE GEORGE AWAY?\n*script changeBackgroundColor(\"sepia\")\n*fake_choice\n #The check's location\n #The monitor's location\n #The direction George fell\n #The email\n #The breaker\n #Use a hint\n #Solve a different mystery\n\n\n\n\n*set final_puzzle_trick false\n*set wrong_answers 7\n*set puzzles_solved 18\n*set puzzles_failed 2\n*set part_2_unlocked true\n*set part_3_unlocked true\n*set part_4_unlocked true\n*set part_5_unlocked false\n*set bonus_puzzles_unlocked false\n\"What about the fabulous treasure?\" Sandy asked.\n\nDavis flashed a gorgeous smile at Sandy. \"It belonged to the ranch's original owner. The map was locked up in a safe, in her bedroom. Everyone knew the map was there, but nobody could get inside the safe, 'cause it was locked with an impossible puzzle.\"\n\n\"And someone finally solved the puzzle?\" Andy asked.\n\n\"Yup,\" Davis said. \"Can't believe someone solved the puzzle after a hundred and fifty years. See, a bunch of different letters were carved on the front of the safe. They gave the key to opening the safe.\"\n\nRe\n*line_break\nOr\n*line_break\nYe \n*line_break\nGr \n*line_break\nBl \n*line_break\nIn\n\nWHAT WORD UNLOCKS THE SAFE?\n*script changeBackgroundColor(\"black\")\n*fake_choice\n #White\n #Potato\n #Nm\n #Tl/dr\n #Violet\n #Solve another mystery instead\n\n\n\n*set final_puzzle_trick false\n*set wrong_answers 2\n*set puzzles_solved 43\n*set puzzles_failed 1\n*set part_2_unlocked true\n*set part_3_unlocked true\n*set part_4_unlocked true\n*set part_5_unlocked true \n*set bonus_puzzles_unlocked false\n*set wrong_answers_b 0\n*set puzzles_solved_b 0\n*set puzzles_failed_b 0\nMYSTERY #44: Spies\n\n\"Give me a difficult mystery this time,\" the Encyclopedia said.\n\n\"Let's see...one time, I was spying on a thief,\" Andy said.\n\n\"What kind of thief?\" the Encyclopedia asked.\n\n\"It actually doesn't matter for this puzzle,\" Andy said. \"While I was spying on the thief, a woman spied on me. My friend Officer Don spied on her, while Sandy spied on him, while you spied on Sandy.\"\n\n\"You're a liar! I've never spied on Sandy before!\" the Encyclopedia said.\n\n\"It's just a puzzle!\" Andy said. \"Anyway, all six of us gathered in the room afterwards. In this case, the six of us means me, you, Sandy, Michael, Officer Don, and Sandy's female friend Katie.\"\n\nWHO IS THE THIEF?\n*script changeBackgroundColor(\"sepia\")\n*fake_choice\n #Officer Don\n #Katie\n #Sandy\n #Andy\n #Michael\n #See hint\n #Use another hint\n #Solve a different mystery\n\n\n\n\n*set final_puzzle_trick false\n*set wrong_answers 20\n*set puzzles_solved 4\n*set puzzles_failed 12\n*set part_2_unlocked true\n*set part_3_unlocked true\n*set part_4_unlocked false\n*set part_5_unlocked false\n*set bonus_puzzles_unlocked false\nMYSTERY #29: A Robbery\n\n\"I went to the office, in order to talk to President Hayley,\" Vice-President Gray explained. \"But when I got there, the office was dark. I groped around for the light switch for a few moments, when I heard a soft clanging sound from inside the room. I pulled out my phone and called the Secret Service, asking them what to do.\"\n\n\"What did they say?\"\n\n\"They told me to leave immediately, but I couldn't!\" Vice-President Gray said. \"My eyes were adjusting to the dark, and I saw the intruder on the other side of the room. So I walked up to them and caught them by surprise. The culprit screamed in surprise and pushed me aside. I banged my head on the filing cabinet, and by the time I recovered, the culprit had already run out of the room.\"\n\n\"I hate to call you a liar, but that's impossible,\" Sandy said.\n\nWHAT IS WRONG WITH THE STORY?\n\n*fake_choice\n #He caught the culprit by surprise\n #The phone call\n #The filing cabinet\n #How he was shoved aside\n #The light switch\n #Solve another mystery\n\n\n\n*set final_puzzle_trick false\n*set wrong_answers 3\n*set puzzles_solved 3\n*set puzzles_failed 3\n*set part_2_unlocked false\n*set part_3_unlocked false\n*set part_4_unlocked false\n*set part_5_unlocked false\n*set bonus_puzzles_unlocked false\nMYSTERY #5: Days Daze\n\nRalph Dagny came to visit the detectives on Monday. \"Hey, hey! How's the detective business coming along?\" he asked.\n\nSandy sighed to herself. Ralph was her least favorite client, mainly because he wasn't a client. He was a neighbor who regularly stopped by and tried to stump them with trick questions. And in fact, that was why Ralph had come today. \"Got a riddle for you,\" he said proudly. \"And you're never gonna be able to solve it!\"\n\n\"They should call you 'Ralph Riddle',\" Andy remarked. \"This is, what, the third riddle you've given us since we moved in?\"\n\n\"I'm gonna keep trying until I stump you,\" Ralph said. \"What day of the week has the best weather?\"\n\n\"Sun-day,\" Andy said instantly.\n\nRalph looked disappointed at how quickly Andy got it. \"You must have heard that one before,\" he said. \"How about this? What day of the week is the most delicious?\"\n\n\"Fry-day,\" Sandy said.\n\n\"I saved the hardest one for last,\" Ralph said. \"What day of the week is the longest?\"\n\nWHICH ONE?\n\n*fake_choice\n #Wednesday\n #Thursday\n #Sunday\n #Saturday\n #Tuesday\n #Use a hint\n #Solve a different mystery\n\n", "startup": "*title One Minute Mysteries\n*author Michael Gray\n*scene_list\n  startup\n  part1\n  $ part2\n  $ part3\n  $ part4\n  $ part5\n  game_over\n  $ bonus_puzzles\n\n\n*create wrong_answers 0\n*create wrong_answers_b 0\n*create puzzles_solved 0\n*create puzzles_failed 0\n*create puzzles_solved_real 0\n*create puzzles_solved_b 0\n*create puzzles_failed_b 0\n*create puzzles_solved_real_b 0\n*create player_answer \"cheeseburger\"\n*create enter_answer false\n*create mystery_1_solved false\n*create mystery_2_solved false\n*create mystery_3_solved false\n*create mystery_4_solved false\n*create mystery_5_solved false\n*create mystery_6_solved false\n*create mystery_7_solved false\n*create mystery_8_solved false\n*create mystery_9_solved false\n*create mystery_10_solved false\n*create mystery_1_answers 5\n*create mystery_2_answers 5\n*create mystery_3_answers 5\n*create mystery_4_answers 5\n*create mystery_5_answers 5\n*create mystery_6_answers 5\n*create mystery_7_answers 5\n*create mystery_8_answers 5\n*create mystery_9_answers 5\n*create mystery_10_answers 5\n*create mystery_1_hints 2\n*create mystery_2_hints 2\n*create mystery_3_hints 2\n*create mystery_4_hints 2\n*create mystery_5_hints 2\n*create mystery_6_hints 2\n*create mystery_7_hints 2\n*create mystery_8_hints 2\n*create mystery_9_hints 2\n*create mystery_10_hints 2\n*create mystery_2_1_solved false\n*create mystery_2_2_solved false\n*create mystery_2_3_solved false\n*create mystery_2_4_solved false\n*create mystery_2_5_solved false\n*create mystery_2_6_solved false\n*create mystery_2_7_solved false\n*create mystery_2_8_solved false\n*create mystery_2_9_solved false\n*create mystery_2_10_solved false\n*create mystery_2_1_answers 5\n*create mystery_2_2_answers 5\n*c <script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }

      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };

      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }

      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
