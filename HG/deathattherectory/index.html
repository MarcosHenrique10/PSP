<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Death at the Rectory — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

<script>
window.__CS_OFFLINE__ = {"game": "deathattherectory", "title": "Death at the Rectory", "scenes": {"chapter_five_mmm": "*comment -more magic usage at crucial moments??? esp lie detection (even just mentioning it in passing as not useful at this time)\n*set temp 0\nYou sleep a little, edit a little, and worry a lot.\n\nThis house is a prison. This house is a trap. This house is going to kill you.\n\nIt's a relief to wake up without more new magical manifestations. Maybe today the police will sort out who the killer is and you'll finally be safe. And then you'll finally know for certain if those you're sharing a house with are worth trusting. Or is the house the one to fear?\n\nYou stay in bed a moment longer, putting off the likely awkwardness of walking through the rear balcony to the bathroom. Ugh, human contact. It's even worse when you're house-sharing with a killer. You hear someone else's door open, and stiffen like a deer in headlights even though you're still in bed with the door closed.\n\n*if loki_saved = 0\n\tYou recognise the shuffle of Renee's ludicrously oversized bunny slippers. Then you hear her stop after just two steps, and scream at the top of her lungs.\n\t*choice\n\t\t#Don't move.\n\t\t\t*set proactive %-10\n\t\t\tYou stay exactly where you are as Max's heavy footsteps thud past you and into the rear balcony, where he shouts in shock. Others gather; enough that you can't tell who is who.\n\n\t\t\tSoon there's a knock on your door. Time to face the music. You brace yourself, and enter the rear balcony.\n\t\t\t*goto dead_cat\n\t\t#Run to her.\n\t\t\t*set trusting %+10\n\t\t\tYou race out to the rear balcony, with Max right behind you.\n\t\t\t*label dead_cat\n\n\t\t\tRenee has fallen to her knees and is sobbing in loud, gulping gasps like a child having a full-blown tantrum. You're so focused on her it takes you a moment to register the black and red shape smeared across the carpet.\n\n\t\t\tIt's Loki.\n\n\t\t\tThe killer has eviscerated the rector's cat, and left him for her to find.\n\t\t\t*choice\n\t\t\t\t#Call the police.\n\t\t\t\t\t*set honest %+10\n\t\t\t\t\tIt's 6:00am and the phone rings several times before someone answers, sounding as if they just woke up. You tell them a cat has been killed, and at first they're unimpressed. Then you describe how and where, and they snap out questions before telling you they're on their way.\n\n\t\t\t\t\tBruce hustles everyone out into the enclosed back yard and then promptly returns to his room. Hypocrite.\n\t\t\t\t\t*goto yard\n\t\t\t\t#Comfort Renee.\n\t\t\t\t\t*set empathetic %+10\n\t\t\t\t\tRenee keeps reaching out as if to cradle Loki's small head in her hand, but she remembers herself partly through the gesture and pulls back her hand. Then she reaches out again. You're watching her forget and remember that her cat is dead, over and over again.\n\n\t\t\t\t\tYou step carefully around the body and pat her gently on the back. \"Renee, get up. He's not in pain any more.\"\n\n\t\t\t\t\tShe twists to stare up at you. \"I wet myself.\"\n\n\t\t\t\t\tYou can't blame her after such a shock. \"Okay then. Let's get you changed.\"\n\n\t\t\t\t\tShe nods, and doesn't resist as you help her to her feet and steer her into her room to choose new clothes.\n\n\t\t\t\t\tAfter a few moments the glazed look in her eye goes away and she straightens. \"Er, thank you. I'll carry on from here.\"\n\n\t\t\t\t\tYou join most of the others in the enclosed back yard. As usual, Bruce has hidden himself in his room.\n\t\t\t\t\t*goto yard\n\t\t\t\t#Get everyone out of the crime scene area.\n\t\t\t\t\t*set empathetic %-10\n\t\t\t\t\t\"Come on everyone,\" you say. \"We need to get out of here. The police will want to see this without us getting in their way.\"\n\n\t\t\t\t\tRenee backs away from you, looking like she'll collapse on her bed. She reaches her room and closes the door.\n\n\t\t\t\t\tYou suggest to the others that you all go into the yard, and they are too shocked to disagree. Bruce has  list.\n\t\t*set trusting %-10\n\t\t*goto another\n\t*disable_reuse *if (other_temp != 1) #Bruce.\n\t\t*set trusting %+10\n\t\t*set bruce %+10\n\t\tBeing shy doesn't make him a villain.\n\t\t*if temp \u003c6\n\t\t\t*goto innocent\n\t\t*else\n\t\t\t*goto another\n\t*disable_reuse *if (other_temp != 2) #Eric.\n\t\t*set trusting %+10\n\t\t*set eric %+10\n\t\tBeing effusive doesn't make him a liar.\n\t\t*if temp \u003c6\n\t\t\t*goto innocent\n\t\t*else\n\t\t\t*goto another\n\t*disable_reuse *if (other_temp != 3) #Renee.\n\t\t*set trusting %+10\n\t\t*set renee %+10\n\t\tIt's not always the rector. Not in real life.\n\t\t*if temp \u003c6\n\t\t\t*goto innocent\n\t\t*else\n\t\t\t*goto another\n\t*disable_reuse *if (other_temp != 4) #Tamsin.\n\t\t*set trusting %+10\n\t\t*set tamsin %+10\n\t\tBeing emotionally intense doesn't make her violent.\n\t\t*if temp \u003c6\n\t\t\t*goto innocent\n\t\t*else\n\t\t\t*goto another\n\t*disable_reuse *if (other_temp != 5) #Lala.\n\t\t*set trusting %+10\n\t\t*set lala %+10\n\t\tBeing friendly doesn't make her a liar.\n\t\t*if temp \u003c6\n\t\t\t*goto innocent\n\t\t*else\n\t\t\t*goto another\n\t*disable_reuse *if (other_temp != 6) #Max.\n\t\t*set trusting %+10\n\t\t*set max %+10\n\t\tBeing a flirt isn't a sign of insincerity.\n\t\t*if temp \u003c6\n\t\t\t*goto innocent\n\t\t*else\n\n*label another\nWith those conflicting thoughts keeping you on your toes, it's the beginning of another day.\n*if (type = 4) and (maxmagic = true)\n\tSuddenly the penny drops. Your magic is the same as Max, and you both write romance. Therefore, the magic varies depending on the type of writing a person does—everything from fantasy to sermons. The house may be good or evil, but it's fundamentally logical. You can use that.\n\t*goto logic\n*if (type = 1) and (lalamagic = true)\n\tSuddenly the penny drops. Your magic is the same as Lala, and you both write crime. Therefore, the magic varies depending on the type of writing a person does—everything from fantasy to sermons. The house may be good or evil, but it's fundamentally logical. You can use that.\n\t*goto logic\n*if (type = 2) and (brucemagic = true)\n\tSuddenly the penny drops. Your magic is the same as Bruce, and you both write fantasy. Therefore, the magic varies depending on the type of writing a person does—everything from fantasy to sermons. The house may be good or evil, but it's fundamentally logical. You can use that.\n\t*goto logic\n*if (type = 3) and (tamsinmagic = true)\n\tSuddenly the penny drops. Your magic is the same as Tamsin, and you both write historical fiction. Therefore, the magic varies depending on the type of writing a person does—everything from fantasy to sermons. The house may be good or evil, but it's fundamentally logical. You can use that.\n\t*goto logic\n*else\n*label logic\n\n*if magic = 1\n\tYou have the strongest feeling that this day could end badly for you. Unfortunately, the instinctive fear feels just like magic. For the first time in your life, you wish you could believe you were paranoid. Or that the house was playing tricks on you.\n\t*goto dd\n*if magic = 2\n\tYou notice you're floating just above the ground, and concentrate on getting yourself back to obeying the law of gravity. If you lose control over this magic, it could be very dangerous.\n\t*goto dd\n*if (magic = 3) and (killer = 1)\n\tEric feels… different to your magical senses this morning. His usual self-loathing is an overwhelming ocean of hate. The magic could be telling you he's the killer of both Aurelia and Loki… or it could be a red herring.\n\t*goto dd\n*if (magic = 3) and (killer = 2)\n\tMax feels… different to your magical senses this morning. He feels unhappy. Aurelia's death didn't throw him so badly off his game, but today he's miserable. The magic could be telling you he's the killer of both Aurelia and Loki… or it could be a red herring.\n\t*goto dd\n*if (magic = 4) and ((loki_saved = 1) or (loki_no = 1))\n\t\"Loki's food!\" you cry out, startling yourself. \"It smells different.\"\n\n\tThe others stare at you in confusion as you rush inside and grab Loki's bowl. For some reason, the magic has led you to evidence of an attempted animal poisoning. But what does it mean? And if the killer poisoned Loki and drugged Aurelia, will they poison you next?\n\n\tYou call the police—again—and they come and clear out yet another crime scene.\n\t*goto dd\n*if (magic = 4) and ((loki_saved = 0) and (loki_no = 0))\n\tAn image of Loki's corpse flashes into your mind. You retch at the detailed view of the parallel cuts along either side of his abdomen.\n\n\tCuts. The one who killed Loki used a knife. \n\t*if (clue_three != 1) and (clue_three != 3)\n\t\tWas it the same knife that killed Aurelia?\n\t\t*goto dd\n\t*else\n\t\tThe method is similar to Aurelia's murder, but with a different knife.\n*label dd\n\nBit by bit people get their breakfast, speaking in low voices and avoiding one another's eyes. \n*if (loki_saved = 0) and (loki_no = 0)\n\tRenee can't stop staring at the carpet. You have no idea who cleaned up the body, but they couldn't get rid of all the blood. The murderer arranged Loki's body to shock and hurt everyone, and it worked. You can't think straight. It's strange that a human murder and an animal murder hurt in such different ways. \n\n\tThe first murder had a purpose, however twisted, but you feel sure that killing Loki was a panicked move. The murderer is afraid. They must think they're at risk of discovery. You wish that could cheer you up, but there are too many clues pointing in different directions.\n\n\t\"Oh no,\" says Renee. \n\t*goto ohno\n*else\n\t\"Oh no,\" says Renee. \n*label ohno\n\"It's almost time for church.\"\n\nEric jumps up as if he's been stung. \"See you in there, Renee.\"\n\n\"Ooh,\" says Tamsin. \"Can I come? I'd love to see the church in action.\"\n\n\"Of course,\" says Renee.\n*choice\n\t#\"I'll attend too.\"\n\t\t*set renee %+10\n\t\tRenee smiles at you with real delight. \"That would be lovely. You three can come through the side door with me if you like.\"\n\n\t\tEric grins with boyish delight. Once you're both dressed, he leads you out the front door and around to the garden side of the house, near Renee's external door. Here, the ground is a mere step down from the deck, and a concrete and slate path winds up through overhanging branches to a small set of gothic doors. \n\n\t\tYou walk up the path and through the short hall (Tamsin says it's called a transept) to the main sanctuary, where you sit in the first polished-wood pew to take in the ancient structure. The majority of the windows are stained glass, with peaked tops echoing the gothic doors. Above you, more dark wood crosses over itself like clasped hands across the vaulted white ceiling.\n\t\t*fake_choice\n\t\t\t#\"It's beautiful.\"\n\t\t\t\t\"Yes,\" says Eric, with comfortable pride.\n\t\t\t#\"When does the service start?\"\n\t\t\t\t\"9:30,\" says Eric. \"But Renee and a couple of others will be here sooner, to set up and prepare.\"\n\t\t\t#\"How long is the service?\"\n\t\t\t\t\"An hour,\" says Eric.\n\n\n\t\tRenee enters through the transept dressed in a floor-length white robe over her clothes. She winks at you, and takes her place at the main door to greet people as they come in.\n\n\t\tThe congregation enters bit by bit. There are a couple of teenagers and kids among the predominantly elderly crowd. They all clearly know Eric, and he introduces you and Tamsin many times over.\n\n\t\tIt's not hard to follow the service, since everything is clearly set out on the overhead projector screen including short sections for the congregation to read in unison. \n\n\t\tRenee outlines the events of the week with disarming honesty, shedding tears openly, and asks the congregation to cooperate if the police ask for their assistance. You think you're getting the hang of things, and then just as Renee is reading from John Chapter 8 two more people enter by the main doors. Even if you didn't already know them, even if they didn't have uniforms, you would recognise them by their bearing. It's the two police officers who are investigating Aurelia's murder.\n\n\t\tJeanette blanches at the sight of Renee with her congregation, and casts a desperate glance at Keichi. He catches the silent request and clears his throat.\n\n\t\t\"My apologies for the timing, Ms… Rector? Scott. But I'm afraid you need to come with us. Immediately.\"\n\t\t*choice\n\t\t\t#Watch in silence.\n\t\t\t\t*label sixty\n\t\t\t\tSixty seconds later, the congregation is short a priest. Most people sit stunned. The elegantly outlined series of words and prescribed responses on the overhead projector did not allow for this. The organ player and other church personnel are too stunned to go on with the service.\n\n\t\t\t\tEric is one of the first to slowly get up and go home, followed by Tamsin. You trail after them, wondering when the sick feeling in your gut will fade.\n\t\t\t\t*goto ohhh\n\t\t\t#\"Eric and Tamsin and I are here too. I imagine you're questioning all of us?\"\n\t\t\t\t*label sorry\n\t\t\t\t\"I'm sorry,\" says Jeanette. \"We need to take her before she has a chance to hurt anyone else.\"\n\n\t\t\t\t*goto sixty\n\t\t\t#\"Are you arresting her? You're wrong; utterly wrong!\"\n\t\t\t\t*set renee %+10\n\t\t\t\t*goto sorry\n\t#\"Break a leg, Renee. Is that what you say to a rector?\"\n\t\t*set renee %+10\n\t\tShe laughs. It's strained, but it's there. She puts her long white robe over the top of her clothes, and heads up the hill to the church. Eric and Tamsin follow her a few minutes later, and you hear the church bell ringing at 9:30.\n\n\t\tTen minutes later, you hear a car coming up the gravel drive beside the house. You assume the official church parking must be full until the doorbell rings. It's the same two police officers who've been investigating Aurelia's death.\n\t\t*label where\n\t\t\"Where's Ms Scott?\" says Jeanette.\n\t\t*choice\n\t\t\t#\"In church.\"\n\t\t\t\t*set honest %+10\n\t\t\t\t*label woman\n\t\t\t\tJeanette visibly pales, but she sets her jaw and leads Keichi around the memorial rose garden to the great gothic doors of the church.\n\n\t\t\t\tIt takes you longer than it should to realise they're going to arrest her.\n\t\t\t\t*goto ohhh\n\t\t\t#\"Shopping.\"\n\t\t\t\t*set honest %-10\n\t\t\t\t\"No she isn't,\" says Keichi, pointing at the cars lined up beside the church. \"We might be on double pay, but this is her regular work day.\"\n\t\t\t\t*set police_rapport 0\n\n\t\t\t\t*goto woman\n\t\t\t#\"Why don't you come in and wait for her?\"\n\t\t\t\t*set proactive %+10\n\t\t\t\tKeichi cocks his head, gazing at you thoughtfully. You try and fail to keep your own gaze away from the cars lined up next to the church.\n\n\t\t\t\t\"Ah,\" he says softly. \"This is unfortunate. It's Sunday. She's in church, of course.\"\n\n\t\t\t\t*goto woman\n\t#Time for some writing.\n\t\t*set word_count +1000\n\t\tThe usual horror of the blank page assaults you, but you force yourself to sit and type, feeling hollow of any ideas and disgusted with all the flaws of your writing that you can already see.\n\n\t\tYou resist the urge to edit, add a quick note on the worst plot flaws that spring to mind, and get on with things.\n\n\t\tAfter a few moments there are new words on the page. That has to be worth something. \n\t\t*if writing_sessions = 0\n\t\t\t*set writing_sessions 1\n\t\t\tWhat's more, you've finally decided on your viewpoint character.\n\t\t\t*fake_choice\n\t\t\t\t#Skye, a woman.\n\t\t\t\t#Cash, a man.\n\t\t\t\t\t*set hero_pronoun \"he\"\n\t\t\t\t\t*set hero_name \"cash\"\n\t\t\t\t#Tun, a genderfluid person.\n\t\t\t\t\t*set hero_pronoun \"they\"\n\t\t\t\t\t*set hero_name \"tun\"\n\t\t\t*goto pre_bell\n\t\t*if writing_sessions = 1\n\t\t\t*set writing_sessions 2\n\t\t\tThe inciting incident involves \n\t\t\t*fake_choice\n\t\t\t\t#Keesha, a woman.\n\t\t\t\t#Sam, who is intersex.\n\t\t\t\t\t*set pronoun \"they\"\n\t\t\t\t\t*set named \"sam\"\n\t\t\t\t#Mike, a man.\n\t\t\t\t\t*set pronoun \"he\"\n\t\t\t\t\t*set named \"mike\"\n\t\t\t*goto pre_bell\n\t\t*else\n\t\t\tAnd you've firmly decided on your ending. It'll be\n\t\t\t*fake_choice\n\t\t\t\t#Happy.\n\t\t\t\t\t*set happy %+10\n\t\t\t\t\t*set ending 1\n\t\t\t\t#Tragic.\n\t\t\t\t\t*set happy %-10\n\t\t\t\t\t*set ending 3\n\t\t\t\t#Bittersweet.\n\t\t\t\t\t*set happy %-5\n\t\t\t\t\t*set ending 2\n\t\t*label pre_bell\n\t\tBut then there's a ring on the doorbell. \n\t\t*label dingdong\n\n\t\tIt takes a moment to remember that Renee is out, and will therefore not answer the door.\n\n\t\tYou open the door to the same two police officers who've been investigating Aurelia's death: Jeanette and Keichi.\n\n\t\t*goto where\n\t*if (magic = 2) #Time for some flying practice.\n\t\t*set magic_practice + 1\n\t\tIgnoring the accompanying nausea, you practice flying until you can control height and movement. \n\n\t\t*if flaw = 1\n\t\t\tLuckily—sort of—you're used to stomach cramps, and you can endure the pain for quite a while.\n\t\t\t*goto hard\n\t\t*else\n\t\t*label hard\n\t\tIt's hard work, and you're left sweating and exhausted. But you can land without simply crashing straight down, and that has to be worth something. You're lying on the bed trying to quell the waves of retching when the doorbell rings.\n\t\t*goto dingdong\n*label ohhh\n*fake_choice\n\t#What a relief. The killer is caught.\n\t\t*set renee_killer 1\n\t\t*set renee %-10\n\t#This is wrong. Renee is innocent.\n\t\t*set trusting %+10\n\t\t*set renee %+10\n\t#I didn't expect this, but the police know their business. Maybe they're just questioning her again.\n\t\t*set trusting %+10\n\t\t*set mental_health %+10\n\n\nIt's horrible to see Renee quietly weeping as she's led away across the grass in her long white robe, like a sacrificial offering from a bad movie.\n\n*if magic = 1\n\tYour stomach cramps so hard you double over in pain. According to your magical premonitions, Renee's arrest will lead to another death. Perhaps even yours.\n\t*goto ee\n*if magic = 2\n\tYou can feel your flying ability pushing at the inside of your skin, wanting to break free. It's a fear reaction. Your magic is not relieved at Renee's arrest. It believes she is innocent.\n\t*goto ee\n*if magic = 3\n\tYour stomach cramps so hard you double over in pain. According to your magical insight, Renee is innocent. Which means the killer is still with you.\n\t*goto ee\n*if magic = 4\n\tWith an awful flash of insight, you remember Renee drinking wine the night Aurelia was drugged. The red wine. With perfect clarity, you remember the subtle dilation of her eyes.\n\n\tShe was drugged.\n\n\tShe's innocent.\n*label ee\n\nOr has the magic been fooling you all along?\n*set temp 0\n*choice\n\t#Gather everyone, and figure out how the magic works.\n\t\tYou go to Bruce first, who as usual is closeted in his room.\n\t\t*if bruce > 50\n\t\t\t*set temp 1\n\t\t\tHe answers the door and reluctantly agrees to come with you. With him on board, everyone else understands immediately that the situation is serious and you all gather in the hall so that Bruce doesn't have to risk sunlight. Eric's eyes are red with weeping.\n\t\t\t*goto group\n\t\t*else\n\t\t\t*set bruce %+10\n\t\t\tHe answers his door but refuses to come with you. When he tries to close the door, you put your foot in the gap.\n\n\t\t\t\"Let me go,\" he says, clearly distressed. \"I know exactly what you think of me, and I will not subject myself to your presence voluntarily.\"\n\n\t\t\tYou're shocked to see him show a real emotion, so you withdraw. Max, Lala, and Tamsin agree to discuss magic with you, but Eric refuses to emerge. His sobs are audible through the wall.\n\t\t\t*label group\n\n\t\t\t\"In my opinion, we need to test the magic of this house,\" you say. \"Renee suspected the house and its magic caused the murders, even though the spouse of the previous victim was convicted. Is it a coincidence or not? Is the magic benevolent or harmful?\"\n\n\t\t\t\"This house is old,\" Tamsin says slowly. \"Perhaps it has grown bitter over the long years.\"\n\n\t\t\t\"It is loved,\" says Max. \"What more could any intelligent being hope for?\"\n\t\t\t*if temp = 1\n\n\t\t\t\t\"You're assuming it's intelligent,\" says Bruce.\n\n\t\t\t\t\"Do you disagree?\" Eric asks, tracing one finger along the line of books.\n\n\t\t\t\t\"I don't have an opinion either way,\" says Bruce. \"I merely mention that there is an assumption at work that may be flawed.\"\n\t\t\t\t*goto jj\n\t\t\t*else\n\t\t\t*label jj\n\n\t\t\t\"I believe the source of the magic is the weight of history,\" says Tamsin. \"Reality and history are different, and history is darker and more dangerous, as the dramatic points of reality are so often also the worst. So I'm afraid I think Renee's theory is plausible.\"\n\t\t\t*if talking_walls = 1\n\n\t\t\t\t\"No!\"\n\n\t\t\t\tThe voice of the house is both more and less human than before. Whatever it is, it doesn't like to be cast as the villain in this story.\n\t\t\t\t*goto kk\n\t\t\t*else\n\t\t\t*label kk\n\n\t\t\tTamsin falls to her knees, covering her ears. \"I'm sorry I'm sorry!\" she says.\n\n\t\t\tAfter a moment, she looks back up at all of you. \"The house claims it is innocent.\"\n\t\t\t*choice\n\t\t\t\t#Lay out the facts to figure out whether the house is malevolent or not.\n\t\t\t\t\t*if knowledge > 50\n\t\t\t\t\t\t*label housestuff\n\t\t\t\t\t\tYou're glad you've tried to look into the history of this place as much as possible. It gives you a solid timeline of peace and prosperity. Even as repairs cost the community, they chose to open up their beautiful rectory to more people as both a fundraiser and a creative endeavour.\n\n\t\t\t\t\t\tThis is not an unhappy place, despite the murders committed here. \n\n\t\t\t\t\t\t*label benevolent\n\t\t\t\t\t\t\"I believe the house is benevolent,\" you say aloud.\n\n\t\t\t\t\t\t\"Agreed,\" says Lala.\n\t\t\t\t\t\t*set clue_four 1\n\t\t\t\t\t\t*goto honesty\n\t\t\t\t\t*else\n\t\t\t\t\t\t*label house_stuff_bad\n\t\t\t\t\t\tIn your mind, you shuffle around the few pieces of knowledge you've gathered about the place, but it's no use. There's not enough to make a meaningful pattern. \"I just don't know,\" you say aloud.\n\n\t\t\t\t\t\t\"Me neither,\" says Tamsin.\n\n\t\t\t\t\t\t\"I believe the house is friendly,\" says Lala. The others look less certain.\n\n\t\t\t\t\t\tWell, that will have to do as a working theory.\n\t\t\t\t\t\t*goto honesty\n\t\t\t\t#Use your observational skills to figure out whether the house is malevolent or not.\n\t\t\t\t\t*if observation > 50\n\t\t\t\t\t\t*goto housestuff\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto house_stuff_bad\n\t\t\t\t*if (flaw = 2) #Use your personal knowledge of mental illness to figure out the house.\n\t\t\t\t\t*if mental_health > 30\n\t\t\t\t\t\tYou work hard to keep your mind as healthy as possible, despite the way your brain fights you at every step. As a result, you have a unique set of skills that give you inside information on mental illness. As soon as you close your eyes to think, you know the answer: the house is a complicated entity and a mixture of joy and sorrow… but it's not actively harmful.\n\n\t\t\t\t\t\t*goto benevolent\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto house_stuff_bad\n\t\t\t\t*if (flaw != 2) #You're always careful to maintain your mental health. Does the house seem healthy to you?\n\t\t\t\t\t*if mental_health > 50\n\t\t\t\t\t\tYou work hard to keep your mind as healthy as possible. As a result, you have a skill set that gives you inside information on psychological well-being. As soon as you close your eyes to think, you know the answer: the house is a complicated entity and a mixture of joy and sorrow… but it's not actively harmful.\n\n\t\t\t\t\t\t*goto benevolent\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto house_stuff_bad\n\t#Take aside a single trusted individual, and figure out how the magic works.\n\t\tWho do you trust most?\n\t\t*choice\n\t\t\t#Bruce.\n\t\t\t\t*if bruce \u003c 40\n\t\t\t\t\tHe answers his door but refuses to come with you. When he tries to close the door, you put your foot in the gap.\n\n\t\t\t\t\t\"Let me go,\" he says, clearly distressed. \"I know exactly what you think of me, and I will not subject myself to your presence voluntarily.\"\n\n\t\t\t\t\tYou're shocked to see him show a real emotion, so you withdraw. \n\t\t\t\t\t*goto solo\n\t\t\t\t*else\n\t\t\t\t\t*set bruce %+10\n\t\t\t\t\tYou talk in the hall, so Bruce doesn't risk exposure to sunlight.\n\n\t\t\t\t\t\"In my opinion, we need to figure out the magic of this house,\" you say. \"Renee believed the house and its magic caused the murders, even though the spouse of the previous victim was convicted. Is it a coincidence or not? Is the magic benevolent or harmful?\"\n\n\t\t\t\t\t\"Neither,\" says Bruce—with such promptness it's clear he's been thinking about the same issue.\n\n\t\t\t\t\t\"Why do you say that?\"\n\n\t\t\t\t\t\"Because… because I can fly,\" he says, and shrugs. \n\n\t\t\t\t\t\"That doesn't prove anything!\" you say. \n\n\t\t\t\t\t\"If proves magic is as brilliant as I always dreamed,\" he says, \"no matter how dark it may appear at times. But what do you think?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Lay out the facts to figure out whether the house is malevolent or not.\n\t\t\t\t\t\t\t*if knowledge > 50\n\t\t\t\t\t\t\t\t*label housestuff_b\n\t\t\t\t\t\t\t\tYou're glad you've tried to look into the history of this place as much as possible. It gives you a solid timeline of peace and prosperity. Even as repairs cost the community, they chose to open up their beautiful rectory to more people as both a fundraiser and a creative endeavour.\n\n\t\t\t\t\t\t\t\tThis is not an unhappy place, despite the murders committed here. \n\t\t\t\t\t\t\t\t*label benevolent_b\n\t\t\t\t\t\t\t\t*set clue_four 1\n\t\t\t\t\t\t\t\t\"I believe the house is benevolent,\" you say aloud.\n\n\t\t\t\t\t\t\t\t\"All right then,\" says Bruce. \"I agree.\"\n\t\t\t\t\t\t\t\t*goto honesty\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label house_stuff_bad_b\n\t\t\t\t\t\t\t\tIn your mind, you shuffle around the few pieces of knowledge you've gathered about the place, but it's no use. There's not enough to make a meaningful pattern. \"I just don't know,\" you say aloud.\n\n\t\t\t\t\t\t\t\t\"Me neither, really,\" says Bruce. \"Do we assume it's innocent until proven guilty?\"\n\n\t\t\t\t\t\t\t\tWell, that will have to do for now. Except that it means someone in the house is the killer.\n\t\t\t\t\t\t\t\t*goto honesty\n\t\t\t\t\t\t#Use your observational skills to figure out whether the house is malevolent or not.\n\t\t\t\t\t\t\t*if observation > 50\n\t\t\t\t\t\t\t\t*goto housestuff_b\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto house_stuff_bad_b\n\t\t\t\t\t\t*if (flaw = 2) #Use your personal knowledge of mental illness to figure out the house.\n\t\t\t\t\t\t\t*if mental_health > 30\n\t\t\t\t\t\t\t\tYou work hard to keep your mind as healthy as possible, despite the way your brain fights you at every step. As a result, you have a unique set of skills that give you inside information on mental illness. As soon as you close your eyes to think, you know the answer: the house is a complicated entity and a mixture of joy and sorrow… but it's not actively harmful.\n\n\t\t\t\t\t\t\t\t*goto benevolent\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto house_stuff_bad_b\n\t\t\t\t\t\t*if ((flaw = 1) or (flaw = 3)) #You're always careful to maintain your mental health. Does the house seem healthy to you?\n\t\t\t\t\t\t\t*if mental_health > 50\n\t\t\t\t\t\t\t\tYou work hard to keep your mind as healthy as possible. As a result, you have a skill set that gives you inside information on psychological well-being. As soon as you close your eyes to think, you know the answer: the house is a complicated entity and a mixture of joy and sorrow… but it's not actively harmful.\n\n\t\t\t\t\t\t\t\t*goto benevolent_b\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto house_stuff_bad_b\n\t\t\t#Eric.\n\t\t\t\t*if ssible. As a result, you have a skill set that gives you inside information on psychological well-being. As soon as you close your eyes to think, you know the answer: the house is a complicated entity and a mixture of joy and sorrow… but it's not actively harmful.\n\t\t\t\t\t*set clue_four 1\n\n\t\t\t\t\t*goto honesty\n\t\t\t\t*else\n\t\t\t\t\t*goto house_stuff_bad_s\n*label honesty\n\nOf course, it's vital that you know if the house is honest or not. You can't shake the knowledge that the magical lie detectors questioned everyone, and everyone said, \"I did not kill Aurelia.\"\n\n*if lie_detector = 0\n\tIf only Renee was still here, with her lie detecting powers.\n\t*goto yy\n*if lie_detector = 1\n\tIf only Renee was still here, with her lie detecting powers to back up your own.\n*label yy\n*choice\n\t#You're cautious and thoughtful. You can figure this out.\n\t\t*if (proactive \u003c 50) and (lalamagic = true)\n\t\t\t*label win\n\t\t\tAt least Lala is still here—and that gives you an idea.\n\t\t\t*if temp = 0\n\t\t\t\tYou need her, so you go and find her. Fortunately she's setting out the lunch things, so it's not difficult.\n\t\t\t\t*goto query\n\t\t\t*else\n\t\t\t*label query\n\t\t\t\"Lala,\" you say. \"I ate a banana for breakfast.\"\n\n\t\t\tShe looks at you strangely. \"Why are you lying? You know I can tell.\"\n\n\t\t\tThe truth hits you with the weight of certainty. The house is honest, yes—too honest. No one killed Aurelia, because the murderer killed Annaliese. Whether they knew it or not.\n\n\t\t\tBut now you know what to do.\n\t\t\t*goto win_next\n\t\t*else\n\t\t\tIt's no use. You're used to rushing into things without thinking. It might be brave, but it's not necessarily smart. \n\n\t\t\tYou can tell there's some obvious truth waiting for you to find it… but you just can't.\n\n\t\t\tWell, who needs a magical house anyway?\n\t\t\t*goto lost_next\n\t#You don't trust easily. That will help you sense the truth.\n\t\t*if (trusting \u003c 50) and (lalamagic r? It's clear the house disagrees with you.\n\t\t*fake_choice\n\t\t\t#Yes. It's definitely Renee.\n\t\t\t#I'm fairly sure.\n\t\t\t#I've changed my mind. I think she's innocent.\n\t\t\t\t*set renee_killer 0\n\t\t*goto groceries\n\t*selectable_if (renee_killer = 0) #Tell the others you're certain Renee is innocent.\n\t\tMax is crying.\n\n\t\t\"Renee didn't do it,\" you say.\n\n\t\tMax just nods. No one speaks. They all agree, but it's too dangerous to say so out loud.\n\n\t\tWho do you think is the murderer?\n\t\t*label final_choice\n\t\tSomething tells you that this is your last chance to figure out who murdered Aurelia.\n\t\t*choice\n\t\t\t#Bruce.\n\t\t\t\t*set killer_incorrect 2\n\t\t\t\t*goto groceries\n\t\t\t#Eric.\n\t\t\t\t*if killer = 2\n\t\t\t\t\t*set killer_correct 1\n\t\t\t\t\t*if magic = 4\n\t\t\t\t\t\tYou immediately recollect Eric opening the bottle of red wine on the night Aurelia was drugged, with the certainty of your newfound magic. You're right.\n\t\t\t\t\t\t*goto groceries\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the magic settle in your stomach at once. You're right.\n\t\t\t\t\t\t*goto groceries\n\t\t\t\t*else\n\t\t\t\t\t*set killer_incorrect 1\n\t\t\t\t\t*goto groceries\n\t\t\t#Tamsin.\n\t\t\t\t*set killer_incorrect 4\n\t\t\t\t*goto groceries\n\t\t\t#Lala.\n\t\t\t\t*set killer_incorrect 3\n\t\t\t\t*goto groceries\n\t\t\t#Max.\n\t\t\t\t*if killer = 1\n\t\t\t\t\t*set killer_correct 1\n\t\t\t\t\t*if magic = 4\n\t\t\t\t\t\tYou immediately recollect Max passing around the bottle of red wine on the night Aurelia was drugged, with the certainty of your newfound magic. You're right.\n\t\t\t\t\t\t*goto groceries\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the magic settle in your stomach at once. You're right.\n\t\t\t\t\t\t*goto groceries\n\t\t\t\t*else\n\t\t\t\t\t*set killer_incorrect 1\n\t\t\t\t\t*goto groceries\n\t*selectable_if (renee_killer = 0) #Tell Lala you're certain Renee is innocent.\n\t\t*set lala %+10\n\t\tMax is crying. It's impossible to draw Lala ndering what to do, \n\t*goto stomach\n*else\n, and in the silence your mind immediately wanders, and \n*label stomach\nyour stomach makes itself known. Who will take care of groceries now that Renee is gone?\n\nMore importantly, who knew that hunger could so quickly distract you from a murder investigation?\n\nYou suppress a smile as you hear the laundry door open. Bruce has emerged. It's amazing what hunger will do. That, and the clouds coming across the sun.\n\n\"Ah,\" says Lala. \"I was hoping to see you.\"\n\n\"Not to accuse me of murder, I hope,\" he says mildly.\n\n\"Actually, that's exactly what I want to do,\" she says. \"We all know Aurelia was drugged, then killed with a knife. I was asleep, but if I'd planned to kill her I could have set an alarm to get up and murder her later. Probably for ready cash, since I'm barely scraping by and I genuinely don't know how I'll pay for next semester.\"\n*page_break\n\"Is that a confession?\" Bruce asks. Still so mild.\n\n\"No,\" says Lala with her usual bright smile. \"We've never truly talked about motives, have we? Let's accuse one another—politely—and see what motives we can come up with.\"\n\n\"All right,\" says Bruce. \"Max is an outrageous flirt, and Aurelia was beautiful. Could it be she rebuffed his advances? Or perhaps mine?\"\n\n\"Ooh, good one,\" says Max, apparently enjoying the game. \"No one likes to be rejected.\"\n\n*if clue_two = 1\n\t*choice\n\t\t#Tell the others that Max knew who Aurelia was—and hated her.\n\t\t\tLala doesn't add anything to your explanation of how Aurelia catfished and outed Max's sister. You realise belatedly that she was waiting for him to confess on his own.\n\t\t\t*goto accuse\n\t\t#Keep what you know about Max to yourself.\n\t\t\tLala exchanges a glance with you, but chooses not to speak. Max doesn't speak up either.\n\t\t\t*goto accuse\n\t\t#Name your own possible motives.\n\t\t\t*goto accuse\n*else\n\t\"Nellie certainly didn't,\" Lala says gently.\n\n\tMax's eyes widen. \"How did you know about that?\"\n\n\t\"Why don't you explain?\" she says.\n\n\tMax's usual confidence drains away. \"Annaliese liked to research her romances from real life, often by taking the stories of real people without their consent. I'm willing to bet the reason she was working as a waitress was purely to eavesdrop on customers. She would also catfish people online; pretending to fall in love just to see how they reacted. That's how she outed my sister before Nellie was ready. With a first girlfriend who didn't exist.\"\n\n\t\"That's quite a motive,\" Lala says softly. \"I was praying early in the morning when I heard you call out to Nellie in your sleep.\"\n*label accuse\n\nYou clear your throat. \"My turn?\"\n\n\"Sure,\" says Lala. \"Give us a reason for you to kill Aurelia.\"\n*fake_choice\n\t#\"Professional jealousy. If I'd known who she was.\"\n\t#\"Personal jealousy. Except she's not even the only beautiful woman in this house.\"\n\t\tLala smiles at that.\n\t#\"We had crossed paths at Tillies. Perhaps I grew to hate her there, somehow.\"\n\n\"It's not a strong motive, but it'll do. I was definitely attracted to her, so I'll jump on the 'rejected' bandwagon with Bruce.\"\n\nBruce tips an imaginary hat at her, smiling.\n\nShe turns to Eric. \"Any more creative motive for you? I'm all out of ideas.\"\n\n\"You've forgotten that she was the smallest of us, physically speaking,\" he says. \"Writing can be lonely. We all know that. Writing is almost always badly-paid, or not paid at all. People can get desperate, as time drags by and it all turns out to be harder than we thought.\"\n\n\"I'm with you so far,\" says Bruce, frowning in thought.\n*page_break\n\"Murderers are... interesting,\" says Eric, wincing as he says it. \"People hate them, but they read about them. It's probably obvious that my self esteem isn't great. Yet here I am writing a biography. I didn't even get here on my merits, but because I know Renee and she took pity on me. But with Aurelia dead, I became more interesting.\"\n\n\"You're saying you could have killed her so you had something to write about?\" Lala is struggling to keep her composure.\n\n\"All I want is to be special,\" he says. \"I spend my life on it.\"\n\n\"But would you spend hers?\" says Lala.\n\nHe doesn't answer.\n\nLala shakes herself. \"Well done, Eric. That was legitimately creepy. So we all have our possible motives. I need to go and think about all this.\"\n\nBruce leaves without another word, and everyone follows his cue and scatters.\n\n*if killer_correct = 1\n\tYou're more sure than ever that \n\t*if killer = 1\n\t\tMax \n\t\t*goto ehoh\n\t*else\n\t\tEric \n\t*label ehoh\n\tis the killer. He drugged the red wine, cut Aurelia's throat, hid the knife, and then \n\t*if (loki_no = 0) and (loki_saved = 0)\n\t\tkilled Loki.\n\t\t*goto one\n\t*else\n\t\tstuck around acting shocked and innocent.\n\t\t*goto one\n*else\n\tThis new information changes everything. Or does it? Who do you think is the killer?\n\t*choice\n\t\t#Bruce.\n\t\t\t*set killer_incorrect 2\n\t\t\t*goto one\n\t\t#Eric.\n\t\t\t*if killer = 2\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*if magic = 4\n\t\t\t\t\tYou immediately recollect Eric opening the bottle of red wine on the night Aurelia was drugged, with the certainty of your newfound magic. You're right.\n\t\t\t\t\t*goto one\n\t\t\t\t*else\n\t\t\t\t\tYou feel the magic settle in your stomach at once. You're right.\n\t\t\t\t\t*goto one\n\t\t\t*else\n\t\t\t\t*set killer_incorrect 1\n\t\t\t\t*goto one\n\t\t#Tamsin.\n\t\t\t*set killer_incorrect 4\n\t\t\t*goto one\n\t\t#Lala.\n\t\t\t*set killer_incorrect 3\n\t\t\t*goto one\n\t\t#Max.\n\t\t\t*if killer = 1\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*if magic = 4\n\t\t\t\t\tYou immediately recollect Max passing around the bottle of red wine on the night Aurelia was drugged, with the certainty of your newfound magic. You're right.\n\t\t\t\t\t*goto one\n\t\t\t\t*else\n\t\t\t\t\tYou feel the magic settle in your stomach at once. You're right.\n\t\t\t\t\t*goto one\n\t\t\t*else\n\t\t\t\t*set killer_incorrect 1\n*label one\n\nUnfortunately, your options from here are limited. It's not like you can call the police and tell them that you used magic to figure out who the murderer is. Until you decide your next move, you might as well focus on food.\n*choice\n\t#Check the kitchen for supplies.\n\t\t*label kitchen_bit\n\t\tIt feels wrong to go into one of the few areas of the house that you were not already permitted to go, but there's nothing for it. You check through the fridge, and then open drawers until you find the rest of the food. It's not a large kitchen, and even so it's not well stocked. Renee must have gone shopping daily to keep up. Which means someone needs to go shopping—today.\n\t\t*goto groceries_journey\n\t#Ask Eric about the Gundagai restaurant scene.\n\t\tEric has gone into his room and closed the door, but he responds to your knock.\n\n\t\t\"Is there a good Chinese restaurant here that delivers?\" you ask.\n\n\t\t\"Uh… there's a MacDonalds.\"\n\n\t\t\"Really?\"\n\n\t\t\"It's on the other side of town,\" he says, making it sound like a dangerous journey into no man's land. \n\n\t\t\"I see,\" you say, and head for the kitchen.\n\t\t*goto kitchen_bit\n\t#Barricade yourself in your room.\n\t\tYou go into your room and attempt to lock all the doors. One of the locks is broken, and in any case it's no fortress. \n\n\t\tAnd you're hungry.\n\n\t\tTime to brave the kitchen.\n\n\t\t*goto kitchen_bit\n*label groceries_journey\n\nLala, Max, and Tamsin are poking throught the communal food in the rear balcony and making faces.\n\n\"Hey,\" you say. \"I'm going to go get some food.\"\n\n\"Oh, thanks!\" says Tamsin. \"I have some cash in my room so I'll chip in.\"\n*set cash +70\n*page_break Next\n*if killer = 1\n\t*goto_scene chapter_six_mmm\n*else\n\t*goto_scene chapter_six_b_mmm\n", "chapter_four_mmm": "You wake before dawn, wondering what it was that woke you. Someone tiptoes to the bathroom and turns on the shower. Presumably Lala—you're vaguely aware that there's some kind of cleaning ritual before prayers. Or maybe someone was just desperate to be clean.\n\nWith that thought comes the unwelcome recollection of the previous day. It hits with a physical force, turning your stomach and clutching at your head. And when the first visceral response eases, you're left busting to go to the toilet.\n\nYou creep over the creaky floor yourself, noticing Lala's open door. Everyone's movements are suddenly suspicious, even when they are following the exact routine of the previous day. As you pass through the laundry to get to the outside bathroom, you can hear Bruce snoring. \n\nUntil this moment, you've managed to avoid using the outside bathroom. It's still hot from the previous day, and you're both grateful and uncomfortable with the large gap under the wooden door. Then you see a spider's web stretching from the toilet seat to the wall.\n*fake_choice\n\t#Brush it away and do your business. It's just a web.\n\t\t*set knowledge %+10\n\t\tYou try desperately not to feel phantom legs on your thigh as you finish your ablutions, wash your hands, and get out. \n\t#Check carefully for spiders, then do your business.\n\t\t*set observation %+10\n\t\tAs far as you can tell, the owner of this morning's web is not currently in residence. You try desperately not to feel phantom legs on your thigh as you finish your ablutions, wash your hands, and get out. \n\t#Nope. Nope. Nope.\n\t\t*set imagination %+10\n\t\tBrushing instinctively at your clothes and arms, you back away and get back to the safety of the house, pausing in the laundry as you hear someone pad out of the bathroom and return to their room. The bathroom is free, and it was worth waiting for.\nAfter all the adrenaline of the previous day, you're actually shaking. There's absolutely no way you're going to get back to sleep.\n\nYou head out onto the front balcony; the one place in the whole house that doesn't have a creaking floor. The sky is just beginning to blush with dawn, and you settle into the ugliest armchair on the basis that it's sure to be the most comfortable. There hasn't been time to do a full scientific study, but it certainly feels comfy to you.\n\nIt's hard to believe that the sun will simply rise here, as usual, after what has happened. But of course it's not the first time. Some other writer was killed here, just like Aurelia… although you've watched enough crime shows to know that it's always the spouse. Not magical 140 year-old houses.\n\nYou sift through the information you've gathered so far.\n\nAurelia wasn't Aurelia; she was Annaliese Raymen. So she had at least one secret. Perhaps there were others. She was physically smaller than anyone else, which could have motivated a coward to choose her. And she was beautiful, so perhaps someone was jealous of her beauty or angry that she was not attracted to them.\n\nShe was drugged into a stupor before being murdered with a knife. \n*if wine = 1\n\tYou felt the effects yourself, so the poisoner cast a wide net.\n\nAt the moment, you are most suspicious of…\n*fake_choice\n\t#Bruce.\n\t\t*set bruce %-10\n\t#Eric.\n\t\t*set eric %-10\n\t#Renee.\n\t\t*set renee %-10\n\t#Max.\n\t\t*set max %-10\n\t\t*if max_love = 1\n\t\t\t*fake_choice\n\t\t\t\t#Time to break up with him.\n\t\t\t\t\t*set max_love 13\n\t\t\t\t#I'll keep dating him. I'm not 100% sure either way.\n\t\t\t\t#I'll keep dating him. I don't want to risk getting murdered.\n\t\t\t\t\t*set max_love 100\n\t#Lala. \n\t\t*set lala %-10\n\t\t*if confidant = 2\n\t\t\tYou'd better not confide in Lala any more.\n\t\t*if lala_love = 1\n\t\t\t*fake_choice\n\t\t\t\t#Time to break up with her.\n\t\t\t\t\t*set lala_love 13\n\t\t\t\t#I'll keep dating her. I'm not 100% sure either way.\n\t\t\t\t#I'll keep dating her. I don't want to risk getting murdered.\n\t\t\t\t\t*set lala_love 100\n\t#Tamsin.\n\t\t*set tamsin %-10\n\nBeing in this murder house is too much to bear. All of a sudden you're exhausted, and you go back to bed.\n\n*if magic = 1\n\tYou're walking up the hill toward the house, but the house never gets closer. The sun is beating down, even though it's still so dark you can hardly see. You hear an awful scream of animal pain, and start running as fast as you can, already knowing you're too late.\n\n\tThe screaming continues as you run desperately up the steep and slippery hill, and suddenly you're looking in through the back window. The screaming is Loki, lying on the carpet, and his wails of pain are getting weaker. His blood is a bright flower around him.\n\n\tYou shout for help, and suddenly wake up tangled in your bedclothes.\n\t*label magic_one\n\t*choice\n\t\t*disable_reuse #It was just a dream.\n\t\t\tThe stress of Aurelia's murder is definitely weighing on you. You close your eyes and wait for sleep to come back.\n\n\t\t\tSomething jabs you in the leg—hard. You sit up and look, but there's nothing there. When you lie down again, it happens again.\n\n\t\t\tEventually, you have to face facts: the magic is annoyed you're not paying attention. It won't be ignored.\n\t\t\t*goto magic_one\n\t\t#Where's Loki?\n\t\t\tYou check on your bed, under your bed, in your suitcase, and everywhere else a cat could conceivably fit. He's not there. Your hands are shaking.\n\n\t\t\t\"Loki?\" you call. \"Loki, are you okay?\"\n\n\t\t\tOf course there's no answer. \n\n\t\t\tEven if Loki is close by and perfectly fine, he's a cat. He's not going to come just because you call him.\n\n\t\t\tYou go and pour extra food into his bowl, and he appears. If anything, he looks more composed and sleek than ever. You collapse onto the nearest chair and let yourself breathe again.\n\t\t\t*goto brekkie\n\t\t#Tell Renee.\n\t\t\tYou once again hear music coming from her room/office, so you knock quietly. Then you knock somewhat louder. After all, she's playing music so she probably didn't hear you the first time.\n\n\t\t\tThe music shuts off and Renee d on… I don't know what. But Bruce is surely the most cat-like person here.\"\n\n\t\t\t\t\t\t\t\"Because he hates people?\"\n\n\t\t\t\t\t\t\t\"No!\" she says. \"He came here, didn't he? So he wants to be near people, just not actually interacting with them.\"\n\n\t\t\t\t\t\t\t*label bruce_dr\n\t\t\t\t\t\t\t\"So you think Bruce can protect Loki? Or figure out why someone is going to kill him?\"\n\n\t\t\t\t\t\t\t\"Maybe. Of course, there's the possibility that Bruce is the one who's going to kill Loki. What do you think?\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"He's the murderer.\"\n\t\t\t\t\t\t\t\t\t\"Are you sure?\" she says.\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#\"Completely.\"\n\t\t\t\t\t\t\t\t\t\t\t\"Then we need to get Loki elsewhere, and fast.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\"How do we figure out what Loki supposedly knows?\" you ask.\n\n\t\t\t\t\t\t\t\t\t\t\t\"I don't know. Maybe we can bluff that one of us understands him. Let's save Loki now, and deal with that later.\" \n\t\t\t\t\t\t\t\t\t\t\t*label parishoner\n\t\t\t\t\t\t\t\t\t\t\tShe eyes Loki, who remains crouched behind the couch, his lail lashing in suspicion.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Would you mind staying here and chatting to me?\" she asks you. \"This will be a little tricky.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\"Okay.\"\n\n\t\t\t\t\t\t\t\t\t\t\tShe closes all the doors and starts boiling the kettle. Loki remains behind the couch as Renee begins a genial monologue about one of her parishoners' sheep farms. She makes a drink for you, and then sits down, still talking. \n\n\t\t\t\t\t\t\t\t\t\t\tA few minutes later, Loki emerges from the couch and jumps up next to her. She gives him a pat with one hand, carefully not looking at him but focusing on her tea; sipping at it and then placing the cup on the floor.\n\n\t\t\t\t\t\t\t\t\t\t\tThen she strikes. Fast as a snake, she grabs Loki and holds him close to her chest in what is clearly a tight and unwelcome hug.\n\n\t\t\t\t\t\t\t\t\t\t\t\"It's okay, Loki,\" she says. \"We're just going to save your life. Be a good boy.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\"$!{name}, would you be a sweetheart and help me get Loki into his carrier? It's folded up under the desk in my room.\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou help her get Loki sorted and she assures you she knows a parishoner who will take good care of him.\n\n\t\t\t\t\t\t\t\t\t\t\tSo that's one good thing.\n\t\t\t\t\t\t\t\t\t\t\t*set loki_saved 1\n\t\t\t\t\t\t\t\t\t\t\t*goto blanche\n\t\t\t\t\t\t\t\t\t\t#\"Not at all.\"\n\t\t\t\t\t\t\t\t\t\t\t*goto okay\n\t\t\t\t\t\t\t\t\t\t#\"What do you think?\"\n\t\t\t\t\t\t\t\t\t\t\t\"I think he's innocent,\" she says.\n\t\t\t\t\t\t\t\t\t\t\t*goto attack\n\t\t\t\t\t\t\t\t#\"He can help us.\"\n\t\t\t\t\t\t\t\t\t*label okay\n\t\t\t\t\t\t\t\t\t\"All right,\" says Renee. \n\t\t\t\t\t\t\t\t\t*label attack\n\t\t\t\t\t\t\t\t\t\"Let's do this.\"\n\n\t\t\t\t\t\t\t\t\tShe closes all the doors and starts boiling the kettle. Loki remains behind the couch as Renee begins a genial monologue about one of her parishoners' sheep farms. She makes a drink for you, and then sits down, still talking. \n\n\t\t\t\t\t\t\t\t\tA few minutes later, Loki emerges from the couch and jumps up next to her. She gives him a pat with one hand, carefully not looking at him but focusing on her tea; sipping at it and then placing the cup on the floor.\n\n\t\t\t\t\t\t\t\t\tThen she strikes. Fast as a snake, she grabs Loki and holds him close to her chest in what is clearly a tight and unwelcome hug.\n\n\t\t\t\t\t\t\t\t\t\"It's okay, Loki,\" she says. \"We're just going to save your life. Be a good boy.\"\n\n\t\t\t\t\t\t\t\t\t\"$!{name}, would you be a sweetheart and knock on Bruce's door? Ideally before Loki wakes up to what we're doing and starts shredding my arms?\"\n\n\t\t\t\t\t\t\t\t\tYou quickly open the laundry door, then close it after her to alleviate the noise of your pounding on Bruce's door.\n\n\t\t\t\t\t\t\t\t\tIt takes a long time for him to answer. \"What?\" he growls.\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#\"We need you to interrogate Loki.\"\n\t\t\t\t\t\t\t\t\t\t\t\"I don't know what you're talking about,\" he says, and tried to close the door.\n\n\t\t\t\t\t\t\t\t\t\t\tRenee has her foot wedged in place. \"You forget, I can tell when you're lying. Now let us in.\"\n\t\t\t\t\t\t\t\t\t\t\t*goto inside\n\t\t\t\t\t\t\t\t\t\t#\"Let us in. It's an emergency.\"\n\t\t\t\t\t\t\t\t\t\t\t*label inside\n\t\t\t\t\t\t\t\t\t\t\t\"Have the police arrested Aurelia's killer?\" he asks.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Not yet,\" says Renee, taking advantage of his relative relaxation to barge into his room. You follow her, and close and lock the door behind you.\n\t\t\t\t\t\t\t\t\t\t\t*goto cat_interrogation\n\t\t\t\t\t\t\t\t\t\t#\"Shh! You're in terrible danger.\"\n\t\t\t\t\t\t\t\t\t\t\t\"Are you going to kill me?\" he asks.\n\n\t\t\t\t\t\t\t\t\t\t\t\"No!\" says Renee. \"We're going to save you.\"\n\n\t\t\t\t\t\t\t\t\t\t\tHe steps back, and you and Renee go inside, locking the door behind you.\n\t\t\t\t\t\t\t\t\t\t\t*label cat_interrogation\n\n\t\t\t\t\t\t\t\t\t\t\t\"Check the window,\" says Renee.\n\n\t\t\t\t\t\t\t\t\t\t\tYou confirm that it's shut, and Renee lets Loki go. He immediately twists to scratch her, and then darts under the bed.\n\n\t\t\t\t\t\t\t\t\t\t\t\"I probably deserved that,\" says Renee. \"Now Bruce, please ask Loki who the murderer is.\"\n\n\t\t\t\t\t\t\t\t\t\t\tHe backs away from her, almost immediately running into the wall of the tiny room. \"Excuse me?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\"Please just do it,\" says Renee. \"I know you can understand Loki, and I know the murderer wants him dead. Therefore, we need to know what Loki knows—and you are the only one who can understand Loki.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\"This isn't funny,\" says Bruce.\n\n\t\t\t\t\t\t\t\t\t\t\t\"No,\" says Renee. There is a new edge to her voice that wasn't there before. \"No one is going to call you crazy. Just ask Loki the question, and tell us what he says. Before the murderer figures out what we're doing and decides to kill you and/or my cat.\"\n\n\t\t\t\t\t\t\t\t\t\t\tBruce runs his hands thrug his hair, and finally crouches on the ground. \"Loki?\" he says gently. \"Who killed Aurelia?\"\n\n\t\t\t\t\t\t\t\t\t\t\tHe pauses and then straightens. \"Uh… he swore at me. He's not going to tell us anything.\"\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#\"Liar!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"That's the truth,\" says Renee. \"For shame, Loki!\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"I don't think cats feel shame,\" you say, quashing an entirely inappropriate laugh.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t\t\t\t\t\t#\"Now what do we do?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t\t\t\t\t\t#\"Loki! Answer him!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe cat does not audibly response.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Ooh,\" says Bruce. \"That's definitely not something I'll repeat.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*label wait\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Very well, Loki,\" says Renee. \"You can do as you like. But Bruce, you must stay close to him. Keep him here, no matter what.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Fine,\" says Bruce with ill grace. \"As long as you never tell a soul that I'm talking to a cat.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t\t\t#\"What do you think? Should we trust him?\"\n\t\t\t\t\t\t\t\t\t\"I want to,\" she says.\n\t\t\t\t\t\t\t\t\t*goto attack\n\t\t\t\t\t\t#\"Does Gundagai have a pet sitting facility?\"\n\t\t\t\t\t\t\t\"Not as such,\" she says. \"But I have a theory that there's one person in this house who can understand what Loki has to say: Bruce.\"\n\t\t\t\t\t\t\t*goto bruce_dr\n\t\t\t\t\t\t#\"Can you keep him in your office with you?\"\n\t\t\t\t\t\t\t\"Theoretically,\" she says. \"Although I'm sure the killer could find him there. I do have a theory that there's one person in this house who may understand why Loki is a target for the murderer: Bruce.\"\n\t\t\t\t\t\t\t*goto bruce_dr\n\t\t\t\t#\"He's the only living thing in this house smaller than Aurelia.\"\n\t\t\t\t\t*goto blanche\n\t\t\t\t#\"Where is Loki right now?\"\n\t\t\t\t\t*goto blanche\n*if magic = 2\n\tYou wake up shivering and nauseous, and reach for your phone to see what time it is. It's an unfamiliar space, and your hand doesn't even hit the bedside table.\n\n\tSighing, you try again.\n\n\tThis time, your hand hits the top of the lamp.\n\n\tWith that touch, you come fully awake—and crash back down onto the bed.\n\n\tYou were floating. In your sleep.\n\t*label magic_two\n\t*choice\n\t\t*disable_reuse #It was just a dream.\n\t\t\tThe stress of Aurelia's murder is definitely weighing on you. You close your eyes and wait for sleep to come back.\n\n\t\t\tSomething jabs you in the leg—hard. You sit up and look, but there's nothing there. When you lie down again, it happens again.\n\n\t\t\tEventually, you have to face facts: the magic is annoyed you're not paying attention. It won't be ignored.\n\t\t\t*goto magic_two\n\t\t#Try and do it again.\n\t\t\tYou lie down on the bed and close your eyes, trying to recapture the feeling of being peacefully asleep. It's very hard not to focus on all your worries: who killed Aurelia? Will you be blamed for her death? Will they kill again? Are you merely going mad?\n\n\t\t\tIt might be easier to concentrate with open eyes. You stare up at the ceiling, soothed a little by the moulded cornices. There has always been beauty and craftsmanship in the world, and there always will be.\n\n\t\t\tYour legs start shaking and your heartbeat speeds up, reminding you that you were shivering when you woke up in the air. Then you realise you've done it, you're floating!\n\n\t\t\tAt the realisation, you crash back onto the bed.\n\t\t\t*label second_choice\n\t\t\t*choice\n\t\t\t\t#You need more practice.\n\t\t\t\t\tAfter a moment to catch your breath, you lie back on the bed and try again. It's not quite as hard the second time, although your stomach is deeply opposed to the whole process. \n\n\t\t\t\t\tTaking breaks to keep from actually throwing up, you keep practising. You get closer and closer to that pretty ceiling, and in the process get a measure of control over your flight. After a large amount of nausea-inducing exercise, you manage to touch some of the decorative pattern edging the ceiling, and still fall back on the bed afterwards.\n\n\t\t\t\t\tThis is it. This is real magic. And it's yours.\n\t\t\t\t\t*goto second_part\n\t\t\t\t#Tell Lala.\n\t\t\t\t\t*set lala %+10\n\t\t\t\t\tYou race through the hall and knock on Lala's door with excessive enthusiasm.\n\n\t\t\t\t\tShe throws open the door, looking terrified to hear what you have to say, and immediately ushers you inside. \"What is it? What's wrong?\"\n\n\t\t\t\t\t\"Not wrong,\" you say, and take a deep breath. \"This is going to sound like I'm making up ridiculous stories.\"\n\n\t\t\t\t\t\"Remember, I can tell that you're telling the truth,\" she says gently.\n\n\t\t\t\t\t\"I can fly.\"\n\n\t\t\t\t\tShe stares at you without blinking for a moment, and your heart sinks. Then she leaps to her feet and grabs both your hands. \"What?!? But that's wonderful! Is it like swimming? When did it happen? Do you think I can learn?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I don't know!\"\n\t\t\t\t\t\t\t*label lala_flight\n\t\t\t\t\t\t\t\"Well, try,\" she says, looking at you with an expression akin to that of a child asking Santa for a new brother or sister for Christmas. \n\n\t\t\t\t\t\t\t\"I was asleep the first time,\" you say, \"and lying down the second time.\"\n\n\t\t\t\t\t\t\t\"Okay then,\" she says. \"Lie down and relax. You won't even know I'm here.\"\n\n\t\t\t\t\t\t\tYou feel incredibly awkward all at once, but you lie down and the floaty shaking illness returns almost immediately, hurting your neck as you lift off the pillow.\n\n\t\t\t\t\t\t\tLala's squeal of delight shocks you out of your concentration and you land back on her bed.\n\n\t\t\t\t\t\t\t\"Sorry,\" she says, clearly unrepentant. \"Now do it again!\"\n\n\t\t\t\t\t\t\tYou laugh at her, wincing as your stomach protests.\n\n\t\t\t\t\t\t\t\"Don't you see?\" she says, bouncing up and down in her enthusiasm. \"This is real magic. And it's yours.\"\n\n\t\t\t\t\t\t\tYou practice more, laughing and retching by turns. But she's right of course. This is the best day of your life.\n\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t#\"I'm not sure I can control it all that well.\"\n\t\t\t\t\t\t\t*goto lala_flight\n\t\t\t\t\t\t#\"Can you stay here and help, if I hurt myself?\"\n\t\t\t\t\t\t\t\"I'd love to,\" she says.\n\n\t\t\t\t\t\t\t\"Thank you. Uh... I don't know how to start.\"\n\n\t\t\t\t\t\t\t*goto lala_flight\n\t\t\t\t#Tell Max.\n\t\t\t\t\t*set max %+10\n\t\t\t\t\t*if unlocked_door = 1\n\t\t\t\t\t\tYou pound on the door joining your room to Max's room, and he greets you at once—wearing boxers and nothing else.\n\n\t\t\t\t\t\t\"Should I put pants on?\" he asks.\n\t\t\t\t\t\t*goto bleep\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou race through the hall and pound on the door to Max's room.\n\t\t\t\t\t*label bleep\n\t\t\t\t\t*if killer = 1\n\t\t\t\t\t\tHe takes a long time to come to the door, and you feel suddenly embarassed to have woken him up, especially since he's wearing boxers and nothing else.\n\n\t\t\t\t\t\t\"Oh, it's just you,\" he says. \"I thought there was another murder.\"\n\t\t\t\t\t\t*goto bleeep\n\t\t\t\t\t*else\n\t\t\t\t\t\tHe comes to the door at once, wearing boxers and nothing else. \"Should I put pants on?\" he asks.\n\t\t\t\t\t\t*label bleeep\n\n\t\t\t\t\t\t\"Never mind that,\" you say. \"I think I can fly.\"\n\n\t\t\t\t\t\tHe blinks, and scratches his bare stomach. \"You mean, like magic?\"\n\n\t\t\t\t\t\t\"Exactly like magic.\"\n\n\t\t\t\t\t\tHis eyes light up, and he drags you inside the room. \"Show me!\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"I'm not sure I can.\"\n\t\t\t\t\t\t\t\t*label max_flight\n\t\t\t\t\t\t\t\t\"Well, try and do it again,\" he says. \"Don't be a tease.\"\n\n\t\t\t\t\t\t\t\t\"I was asleep the first time,\" you say, \"and lying down the second time.\"\n\n\t\t\t\t\t\t\t\t\"All right,\" he says. \"Lie down and relax. You won't even know I'm here.\"\n\n\t\t\t\t\t\t\t\tYou feel incredibly awkward all at once, but you lie down and the floaty shaking illness returns almost immediately, hurting your neck as you lift off the pillow.\n\n\t\t\t\t\t\t\t\t\"You can do it,\" Max says, ruining your concentration and making you fall back on the bed.\n\n\t\t\t\t\t\t\t\tEventually, he shuts up long enough that you can repeat your floating efforts. After several tries, you're getting more confident—but you need to take a break or throw up.\n\n\t\t\t\t\t\t\t\t\"You did it,\" Max says with unashamed envy. \"You really can fly.\"\n\t\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t\t#\"It's not a predictable phenomenon.\"\n\t\t\t\t\t\t\t\t*goto max_flight\n\t\t\t\t\t\t\t#\"Can you stay here and help, in case I hurt myself?\"\n\t\t\t\t\t\t\t\t\"I'd love to,\" he says.\n\n\t\t\t\t\t\t\t\t\"Thank you. Uh... I don't know how to start.\"\n\n\t\t\t\t\t\t\t\t*goto max_flight\n\t\t#Tell Renee.\n\t\t\tYou once again hear music coming from her room/office, so you knock quietly. Then you knock somewhat louder. After all, she's playing music so she probably didn't hear you the first time.\n\n\t\t\tThe music shuts off and Renee opens her door. \n\n\t\t\t\"I flew,\" you say, speaking quickly before you lose your nerve. \"In my sleep.\"\n\n\t\t\t\"Oh,\" she says. \"Oh! Really? You can fly?\"\n\n\t\t\t\"Maybe?\"\n\n\t\t\tShe grabs you by the arm and drags you into her office. \"How much?\"\n\t\t\t*fake_choice\n\t\t\t\t#\"Only a tiny bit.\"\n\t\t\t\t#\"It was probably just a dream.\"\n\t\t\t\t#\"I don't know.\"\n\t\t\t\"Well then,\" she says. \"Do it again.\"\n\n\t\t\t\"I was asleep the first time,\" you say, \"and lying down the second time.\"\n\n\t\t\t\"All right,\" she says. \"Lie down and relax. You won't even know I'm here.\"\n\n\t\t\tYou feel incredibly awkward all at once, but you lie down and the floaty shaking illness returns almost immediately, hurting your neck as you lift off the pillow.\n\n\t\t\tRenee's sharp intake of breath shocks you out of your concentration and you land back on her bed.\n\n\t\t\t\"Sorry,\" she says, unable to keep the grin off her face. \"Now do it again!\"\n\n\t\t\tYou laugh at her, wincing as your stomach protests.\n\n\t\t\t\"Don't you see?\" she says, clasping her hands as if in prayer. \"This is a kind of miracle.\"\n\n\t\t\tYou practice more, laughing and retching by turns. But she's right. This is the best day of your life.\n\t\t\t*goto part_two\n*if magic = 3\n\t\"Max!\"\n\n\tYou jerk awake, wondering what on earth you just dreamed. Even as your mind shapes the question, you know the answer: Max knew Aurelia.\n\n\tYou don't know why, you don't know how, but you feel abruptly certain that Max not only knew exactly who Aurelia was, but hated her.\n\n\tIt's as clear as your own physical body, and you can't help wondering if this is some new magical sense at work. \n\t*label magic_three\n\t*choice\n\t\t*disable_reuse #It was just a dream.\n\t\t\tThe stress of Aurelia's murder is definitely weighing on you. You close your eyes and wait for sleep to come back.\n\n\t\t\tSomething jabs you in the leg—hard. You sit up and look, but there's nothing there. When you lie down again, it happens again.\n\n\t\t\tEventually, you have to face facts: the magic is annoyed you're not paying attention. It won't be ignored.\n\t\t\t*goto magic_three\n\t\t#Question Max—with Lala as your magical lie detector.\n\t\t\t*label lala_vs_max\n\t\t\tYou'll need Lala on board first, so you go and knock on her door, surprised to find your hand is shaking.\n\n\t\t\tShe answers very quickly, looking terrified—then confused once she sees it's you. \"What's happened? Has there been another murder?\"\n\n\t\t\t\"No, it's all right. Except I need your help.\"\n\n\t\t\tYou explain your insight, and your plan to question Max in detail with Lala's assistance. She agrees to help, and the two of you go to Max's door. \n\t\t\t*if killer = 1\n\t\t\t\tHe takes a long time to answer, and is naked except for a pair of boxers. He looks relieved to see you and Lala.\n\t\t\t\t*goto gh\n\t\t\t*else\n\t\t\t\tHe answers the door at once, naked except for a pair of boxers. \n\t\t\t\t*label gh\n\t\t\t\t\"What is it? What's going on?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"I know you knew Aurelia's secret.\"\n\t\t\t\t\t\t\"That she was really Annaliese Whatsit?\" he says. His eyes flick to Lala and back to you. \"Yes. I knew.\"\n\n\t\t\t\t\t\tLala gives a tiny nod, confirming that he's being honest so far.\n\n\t\t\t\t\t\t\"And you hated her,\" you prompt him.\n\t\t\t\t\t\t*label hatred\n\t\t\t\t\t\t*set clue_two 1\n\t\t\t\t\t\tHe shrugs. \"Yes and no. She was a bundle of contradictions. Some parts of her were fun, and good, and others worthy of hate.\"\n\n\t\t\t\t\t\t\"Why did you hate her?\" you ask.\n\n\t\t\t\t\t\t\"Because she was a liar,\" he says with sudden vehemence. A moment later the relaxed and confident Max is back, but you don't need Lala to tell you that you've seen something true.\n\n\t\t\t\t\t\tMax sighs, and looks out the window as he explains. \"Annaliese liked to research her romances from real life, often by taking the stories of real people without their consent. I'm willing to bet the reason she was working as a waitress was purely to eavesdrop on customers. She would also catfish people online; pretending to fall in love just to see how they reacted. That's how she outed my sister before Nellie was ready. With a first girlfriend who didn't exist.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Oh Max. I had no idea.\"\n\t\t\t\t\t\t\t\t\"It wasn't hard to work backwards and figure out what had happened, and how,\" he says. \"I even sent her the brochure for this writing retreat, so I could confront her about what she did.\"\n\n\t\t\t\t\t\t\t\tLala takes a tiny step backwards that Max doesn't seem to register, but it reminds you abruptly that this loyal brother seems to be the one who drugged Aurelia and slashed her throat.\n\n\t\t\t\t\t\t\t\t\"Did she apologise?\" you ask.\n\t\t\t\t\t\t\t\t*label apologise\n\t\t\t\t\t\t\t\t\"Hmm?\" He looks up, as if only just remembering who you are. \"No. I never even talked to her about it. Once I met her, I realised she was—well, a person. Making good and bad decisions just like anyone else. I still hated Little Miss Aurelia, of course. But I didn't kill her.\"\n\n\t\t\t\t\t\t\t\tYou can't help looking at Lala, who is staring at Max with intense focus. \"That's the truth. You didn't kill her.\"\n\t\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t\t#\"Is Nellie okay?\"\n\t\t\t\t\t\t\t\tHe winces. \"Our grandfather still won't talk to her. He doesn't know I'm just as gay and that I fit his notions of the \"lifestyle\" far better than she does. But our parents came around after a few months.\"\n\n\t\t\t\t\t\t\t\t\"You still hate her, though,\" you say. \"Aurelia.\"\n\n\t\t\t\t\t\t\t\t\"Oh, absolutely,\" he says. \"She hurt my baby sister. If I was going to kill someone, that would be a good reason. But I didn't kill Aurelia.\"\n\n\t\t\t\t\t\t\t\tYou can't help looking at Lala, who is staring at Max with intense focus. \"That's the truth. You didn't kill her.\"\n\t\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t\t#\"Is that why you killed Aurelia?\"\n\t\t\t\t\t\t\t\t*goto apologise\n\t\t\t\t\t#\"I know you hated Aurelia.\"\n\t\t\t\t\t\t*goto hatred\n\t\t\t\t\t#\"I know your secret.\"\n\t\t\t\t\t\t\"My ripped bod is no secret,\" he grins.\n\n\t\t\t\t\t\tYou and Lala don't give him a smile in return, and the grin fades from his face. \"What's going on?\"\n\n\t\t\t\t\t\t\"You hated Aurelia.\"\n\t\t\t\t\t\t*goto hatred\n\t\t#Tell Renee.\n\t\t\tYou once again hear music coming from her room/office, so you knock quietly. Then you knock somewhat louder. After all, she's playing music so she probably didn't hear you the first time.\n\n\t\t\tThe music shuts off and Renee opens her door. \n\n\t\t\t\"I think I know something,\" you say, speaking quickly before you lose your nerve. \"About Aurelia.\"\n\n\t\t\t\"Oh,\" she says. \"Do you mean you've had some kind of magical insight?\"\n\n\t\t\t\"Maybe?\"\n\n\t\t\tShe grabs you by the arm and drags you into her office. \"Tell me everything.\"\n\t\t\t*choice\n\t\t\t\t#Leave Max's name out of it.\n\t\t\t\t\t*label anon\n\t\t\t\t\t\"Okay. One of the other writers hates Aurelia.\"\n\n\t\t\t\t\t\"Because of envy?\" Renee asks. \"She told me who she was and why she was applying under an assumed name, but I hadn't realised those lovely movies were based on her work. That's more than just successful, isn't it?\"\n\n\t\t\t\t\t\"Yes,\" you say, feeling a twinge of envy yourself. \"Yes, she was ridiculously successful. But I'm not sure that envy is the reason someone hated her. They hated her before you told us who she was.\"\n\n\t\t\t\t\t\"Enough to kill her?\" Renee asks.\n\n\t\t\t\t\t\"Maybe.\"\n\n\t\t\t\t\t\"I think you should talk to whoever-it-is,\" says Renee. \"Carefully.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Maybe another day.\"\n\t\t\t\t\t\t\t\"Very well,\" says Renee. \"Just… be careful. Keep in mind that whoever hated Aurelia may not be her killer. Not all hatred leads to violence.\"\n\n\t\t\t\t\t\t\t\"I will,\" you say.\n\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t#\"Will you come with me, as a lie detector?\"\n\t\t\t\t\t\t\t\"Of course,\" she says, \"but you'll have to tell me who it is.\"\n\n\t\t\t\t\t\t\t\"Max.\"\n\n\t\t\t\t\t\t\t\"Oh.\"\n\n\t\t\t\t\t\t\t\"You sound disappointed,\" you say.\n\n\t\t\t\t\t\t\t\"He's just so… friendly. It's sad to think that he's so angry underneath that.\"\n\n\t\t\t\t\t\t\t\"I know.\"\n\n\t\t\t\t\t\t\tThe two of you go to Max's door.\n\t\t\t\t\t\t\t*label max_door\n\t\t\t\t\t\t\t*if killer = 1\n\t\t\t\t\t\t\t\tHe takes a long time to answer, and is naked except for a pair of boxers. He looks r
