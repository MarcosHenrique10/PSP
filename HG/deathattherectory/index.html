u wish you could hold that hand for longer—but you don't.\n\t\t\t\t*set aurelia %+10\n\t\t\t\t*goto apickup\n\t\t\t*selectable_if (flaw = 2) #Ugh. Social awkwardness is distracting.\n\t\t\t\t\t*set aurelia %-10\n\t\t*label apickup\n\t\tWith someone in the passenger seat to spot Max and then Lala as you drive, the labyrinthine pathways of the Austalian National University are easy to negotiate. Lala takes the front seat, explaining without embarrassment that rear seatbelts tend not to be sufficient for her generous proportions. Then she bursts out laughing. \n\n\t\t\"What is it?\" Max asks her. \n\n\t\t\"I know you!\" she says. \"You sit with a bunch of psych nerds—the word 'nerd' is a compliment by the way—in Sullies every afternoon.\"\n\n\t\t*if killer = 1\n\t\t\t\"Guilty!\" he says.\n\t\t\t*goto vv\n\t\t*if killer = 2\n\t\t\t\"That's us,\" he says.\n\t\t*label vv\n\t\t\"Are you one of the bunch that's always hogging the couches?\"\n\n\t\t\"Yes,\" she grins. \"Maybe after this week I'll let you sit on the comfy chairs with us.\"\n\n\t\t\"What if my nerd posse takes them over?\"\n\n\t\t\"I'd like to see you try.\"\n\n\t\tWith the ice broken, the mood in the car is festive as you head out of town.\n*label driving\n\n\"Confession time,\" says Aurelia. \"I didn't read any of your profiles, because I wanted to hear it from your own lips. So tell me, $!{name}, what kind of stuff do you write?\"\n*choice\n\t*if loki_no = 0\n\t\t#\"Crime.\"\n\t\t\t*set genre \"crime\"\n\t\t\t*set type 1\n\t\t\t*set light %-10\n\t\t\t*set realism %+10\n\t\t\t*set lala %+10\n\t\t\t*set lie_detector 1\n\t\t\t*set magic 4\n\t\t\t\"Awesome!\" says Lala. \"I can definitely see you plotting the perfect murder.\"\n\t\t\t*goto genre\n\t#\"Fantasy.\"\n\t\t*set genre \"fantasy\"\n\t\t*set type 2\n\t\t*set light %+10\n\t\t*set realism %-10\n\t\t*set bruce %+10\n\t\t*set talking_cat 1\n\t\t*set magic 2\n\t\t\"Cool,\" says Lala. \"I'm so fascinated by people who can make up entire worlds and magical systems.\"\n\t\t*goto genre\n\t#\"Historical Fiction.\"\n\t\t*set genre \"historical\"\n\t\t*set type 3\n\t\t*set light %-10\n\t\t*set realism %+10\n\t\t*set tamsin %+10\n\t\t*set talking_walls 1\n\t\t*set magic 3\n\t\t\"This will be the perfect location for you then,\" says Lala.\n\t\t*goto genre\n\t#\"Romance.\"\n\t\t*set genre \"romance\"\n\t\t*set type 4\n\t\t*set light %+10\n\t\t*set realism %+10\n\t\t*set max %+10\n\t\t*set love_lines 1\n\t\t*set magic 3\n\t\t\"Of course you do,\" says Max with a sly smile.\n*label genre\n\n\"My turn,\" you say to Aurelia. \"What draws you to horror?\"\n\n\"The fictional part,\" she says. \"I'm so, so glad that I can make up this horrifying monster and then just close the book and it's all gone. Being a writer makes me a kind of god.\"\n\nLala's eyes widen in delighted awe, but she doesn't speak. \n\nAurelia stares at the calm hills out the window as she goes on. \"We're born scared of everything, and then we learn to trust our parents, our bodies, and so on. Then we're taught to fear certain things: Spiders. Strange men. Tentacled monsters. But we get things mixed up. Strange men are often the best kind.\"\n\nShe winks at Max, but he's looking out his own window and misses the chance to respond.\n\n\"Spiders really should be more scared of us than we are of them,\" Aurelia goes on. \"Rationally, at least. And tentacled monsters might just want to be friends.\"\n\n\"We'll eat you up, we love you so,\" you quote from 'Where the Wild Things Are' by Maurice Sendak.\n\n\"Fear fascinates me,\" she says. \"I play with it, like clay, in the hope I can understand it and perhaps control it.\"\n\nShe gives you a shy smile in the rear view mirror and then sits back, satisfied.\n*choice\n\t#\"Did you always know you wanted to write horror?\" I ask her.\n\t\t*set aurelia %+10\n\t\t\"My dads still have pics I drew of monsters almost as soon as I could hold a crayon—so yes! But what about you? Why do you write?\"\n\t\t*goto you\n\t#\"Max?\" I ask. \"Do you hope to befriend tentacled horrors in your romance?\"\n\t\t*set max %+10\n\t\t\"I should be so lucky,\" he says. \"So far I'm limited to humans, although I seem to have found a niche in male-male romance with at least one trans character.\"\n\n\t\t\"How did you discover that?\"\n\n\t\t\"I tried everything,\" he grinned. \"On the page and off of it. But what about you? Why do you write?\"\n\t\t*goto you\n\t#\"Lala?\" I ask. \"Do you write crime to explore your own fears?\"\n\t\t*set lala %+10\n\t\t\"Maybe?\" she says. \"I've never thought about it like that. It's funny that crime tends to be one of the most reassuring genres, on the whole. Justice almost always wins, and all the loose ends are tied up. I like that. But what about you? Why do you write?\"\n*label you\n\nA lot of non-writers ask you that question, especially when they have some idea of your incredibly tiny income. But it's different when writers ask it. They really know what they're asking. You look out the window, enjoying the gentle scenery and the sight of sheep, cows, alpacas, and the occasional horse.\n*choice\n\t#\"Imagination is magic. I can make things out of nothing.\"\n\t\t*set imagination %+10\n\t\t\"Like I said,\" says Aurelia. \"God-like powers.\"\n\t\t*goto scenery\n\t#\"I love learning new things. It's all about the research for me.\"\n\t\t*set knowledge %+10\n\t\t\"Same!\" said Lala. \"People are endlessly fascinating, whether they're fictional or not.\"\n\t\t*goto scenery\n\t#\"It makes me happy. What other reason is there for doing anything?\"\n\t\t*set mental_health %+10\n\t\t\"Agreed!\" says Lala.\n\t\t*goto scenery\n\t#\"When I worked in an office, I was depressed. So I left.\"\n\t\t*set mental_health %+10\n\t\t\"Good call,\" says Max.\n*label scenery\n\nYou drive past rolling hills, and spot enormous wind turbines spinning on the distant mountains.\n\n\"Where is this?\" says Lala. \"Where are all the people?\"\n\n\"It's just… the countryside,\" you say at last. \"Have you been out of Canberra before?\"\n\n\"This is not like the countryside back home!\" she says. \"There's just so much… space. How on earth do people get away with murder when there are so few buildings? Or people? The suspect pools out here must be tiny, and there's nowhere to hide.\"\n\nThe rest of the trip is spent in a surreal and enjoyable discussion of how to flee a crime scene in a hypothetical town the size of Gundagai. \n\nAt last you reach the correct turn-off, and from there it takes mere moments to reach St John's Anglican Church. It's situated on an enormous block of steep and grassy land, with a church hall and the two-storey restored stables (now the church office) at the lower end of the block near a purely decorative gate (decorative in the sense that there is no fence to go with it). Landscaped gardens hug the rectory and church at the top of the block.\n\nThe two main buildings are made of slate bricks, making a beautiful semi-regular puzzle of blue and grey and beige. Both buildings have corrugated iron roofs streaked with rust. The roof of the house is beautifully curved over the enormous front balcony that is as wide as a generous room and stretches around three sides of the house. It's surrounded in turn by a gorgeous wrought iron railing, with slender twirling pillars at intervals.\n*choice\n\t#Watch the faces of the others.\n\t\t*set observation %+10\n\t\tMax's eyes are shining, and his gaze softens as he sees the close clusters of over-stuffed armchairs here and there on that enormous balcony. Of course; he's picturing romantic evenings overlooking the town and hills as the sun sets.\n\n\t\tAurelia is taking deep, slow breaths, as if she's had trouble breathing and is only now finding relief. \n\n\t\tLala looks like all her delight at the old building is rising inside her, ready to explode. She races Max up the steps, and then turns around with a wordless cry of pleasure: \"There's a real physical doorbell. A bell!\"\n\t\t*goto bell\n\t#Trace the evidence of change over the decades.\n\t\t*set knowledge %+10\n\t\tTwo beautiful oak trees stand sentinel at the front of the house, with a swing hung from one of the lower branches and a lamp post beneath it that puts you in mind of 'The Chronicles of Narnia' by CS Lewis. The front stairs are concrete, presumably because any original steps—not to mention the original wraparound balcony—have long since turned to dust. One of the windows to the left of the door has the rippled effect that shows its advanced age, while most of the rest of the glass has been replaced. The slate foundations are gloriously solid and will probably outlast all of you, and the oversized front door has an enormous bronze knob right in the middle of the wooden panels, tarnished and worn with age.\n\n\t\tLala races Max up the steps, and then turns around with a wordless cry of pleasure: \"There's a real physical doorbell. A bell!\"\n\t\t*goto bell\n\t#Race up the stairs. There's no high like running, especially after being stuck in the car.\n\t\t*set fitness %+10\n\t\tYou leap out and run up the stairs, enjoying the tightness in your knees as you take on the over-high steps. Max is right behind you, laughing. He might make a great new running buddy. \n\n\t\tAt the top of the stairs, you turn back towards the others, but the view catches you before you can speak. You can see the highway, and hear the louder vehicles passing at the base of a tall hill that is perfectly placed to add an elegant background to every framed view between the balcony's green- or white-painted columns. \n\n\t\tLala arrives beside you, but she's still facing the house. She emits a wordless cry of pleasure: \"There's a real physical doorbell. A bell!\"\n\t\t*goto bell\n\t#Savour its beauty, letting the sense of peace sink into you.\n\t\t*set mental_health %+10\n\t\tTwo beautiful oak trees stand sentinel at the front of the house, with a swing hung from one of the lower branches and a lamp post beneath it that puts you in mind of 'The Chronicles of Narnia'. The front stairs are concrete, presumably because any original steps—not to mention the original wraparound balcony—has long since turned to dust. One of the windows to the left of the door has the rippled effect that shows its advanced age, while most of the rest of the glass has been replaced. The slate foundations are gloriously solid and will probably outlast all of you, and the oversized front door has an enormous bronze knob right in the middle of the wooden panels, tarnished and worn with age.\n\n\t\tLala races Max up the steps, and then turns around with a wordless cry of pleasure: \"There's a real physical doorbell. A bell!\"\n*label bell\n\nShe pulls the shiny knob and it produces a brassy clanging on the other side of the door. A few moments later, Renee Scott opens the door and introduces herself. She's barefoot and dressed in a knee-length polka-dotted dress, not much older than you are.\n*choice\n\t#\"Should we take our shoes off?\"\n\t\t*set empathetic %+10\n\t\t\"Not at all,\" she says. \"I'm only barefoot because I don't like shoes.\"\n\t\t*goto tour\n\t#\"Your house is so beautiful!\"\n\t\t*set art %+10\n\t\t\"It's hardly mine, but yes,\" she says.\n\t\t*goto tour\n\t#\"I'm $!{name}.\"\n\t\t*set proactive %+10\n\t\t\"You definitely are,\" she says, making it sound like a compliment.\n*label tour\n\nYou all file into a generous hallway lined with books. Aurelia gasps on the threshold, and you turn to share a smile with her. But her gasp isn't a gasp of delight. She looks like she's seen a ghost. For a moment you think she's going to run back down the stairs and never come back. But she recovers her composure, and comes inside. \n\nThere are a range of historical texts and a glass case with several artefacts that were once used inside the house's kitchen, but the vast majority of shelves are full of crime novels: Cadfael and Kerry Greenwood; Dick Frances and Agatha Christie. The ceiling is at least ten feet high, and the bookshelves go all the way to the top.\n\n\"The others aren't here yet,\" Renee says cheerfully, \"so let's take a tour. The two largest rooms are on your right and left. On the right is your room, Max, the Master Bedroom. Shall we?\"\n\nShe leads the way into a room with wide windows facing the nearby hills, town, and mountains. There is a king-sized bed against one wall, and an enormous mahogany desk facing the window, topped with green leather. There's a mini fridge and a 3-piece plush leather lounge suite. Topping it off is a large fireplace with a carved marble mantelpiece.\n\n\"I've actually locked the doors between here and the Dining Room, and locked the equivalent door between the Playroom and Nursery,\" says Renee, \"but I can unlock them if those who are staying in each room would prefer it. Max, your front door key can also be used on your personal balcony door if you wish.\"\n*choice\n\t#\"Do all the rooms have mini fridges?\"\n\t\t*set empathetic %-10\n\t\t\"Just this one, and the bishop's room,\" she says. \"Although there's a communal fridge on the enclosed rear balcony.\"\n\t\t*goto playroom\n\t#\"Don't feel bad Max. It's not THAT small.\"\n\t\t*set art %+10\n\t\t\"I think I'll manage,\" he grins back.\n\t\t*goto playroom\n\t#\"Keep going! I want to see my room!\"\n\t\t*set proactive %+10\n\t\t\"Same here!\" says Lala.\n*label playroom\n\nMax dumps his bag on the bed. Renee leads you back through the hall into the Playroom, which is the mirror image of the Master Bedroom except that the mantelpiece is wood, the bed is a single, and the desk has an IKEA vibe to it. There's no bar fridge, but the view is just as spectacular.\n\n*if room = 3\n\t\"Ohhh,\" you sigh, setting down your bags. \"It's perfect.\"\n\t*goto blorg\n*else\n\t\"This will be Tamsin Violi's room,\" says Renee.\n*label blorg\n\nLike the Master Bedroom, the Playroom has a door leading directly out onto the side of the balcony and another (locked) door leading deeper into the house (in this case, it leads to the Nursery). You go back into the hall and then into the Dining Room, which lies next to the Master Bedroom. It isn't quite so wide, but it also has an external door as well as an open door that gives you a glimpse of the narrow kitchen beyond it. There's another marble fireplace here, mirroring the one in Max's room. The hyper-realistic stuffed cat on the mantelpiece begins to purr loudly. Ah. It's real.\n\n\"That's Loki,\" says Renee.  \"That's my beautiful boy.\" The cat yawns elaborately, apparently unconcerned by the host of unfamiliar humans in his domain. \n\n*if room = 2\n\tAnother single bed lies ready for you, and the desk is a simple wooden frame that will be perfectly fine. Fortunately the external door has glass panels, because there are no windows. You put down your bags.\n\t*goto gh\n*else\n\tAnother single bed lies ready for Lala, and the desk is a simple wooden frame. Fortunately the external door has glass panels, because there are no windows. She puts down her bags.\n*label gh\n*choice\n\t*if (room = 2) #\"Ooh, can I light the fire?\"\n\t\t*set knowledge %+10\n\t\t\"I'm afraid not; they've all been out of commission for decades,\" says Renee. \"They were bricked up in the 80s—the 1980s, that is.\"\n\t\t*goto cube\n\t*if ((room = 1) or (room = 3))\n\t\t#\"Ooh, can she light the fire?\"\n\t\t\t*set knowledge %+10\n\t\t\t\"I'm afraid not; they've all been out of commission for decades,\" says Renee. \"They were bricked up in the 80s—the 1980s, that is.\"\n\t\t\t*goto cube\n\t#\"Do the fireplaces connect?\"\n\t\t*set knowledge %+10\n\t\t\"Sorry,\" says Renee. \"They were bricked up in the 80s—the 1980s, that is.\"\n\t\t*goto cube\n\t#\"May I have a drink, since we're near the kitchen?\"\n\t\t*set fitness %+10\n\t\t\"Of course!\" says Renee, and flits in and out of the kitchen with tall glasses in green and blue glass filled with water and ice.\n\n\t\tYou drain it gladly, and put the glass back on the bench.\n*label cube\n\nAurelia leads the way back across the hall. \"This is it, isn't it?\" she says. \"My room.\"\n\n\"That's right,\" says Renee. \"The last writer called it 'The Cube' and the name stuck.\"\n\nIt's easy to see why. The room is… well, a cube. The single bed doesn't quite fit along the wall, so it's wedged awkwardly across the narrow space. There's a pull-down shelf which is apparently Aurelia's work space, and a wheeled chair which can't get near the 'desk' unless the door is closed. The only window leads straight out into the enclosed rear balcony, and even the ceiling is a normal height. The gloom is alleviated somewhat by a skylight, but there are no other doors.\n*fake_choice\n\t#\"Cozy.\"\n\t\t*set proactive %-10\n\t#\"Yikes.\"\n\t\t*set honest %+10\n\t#Stay silent.\n\t\t*set empathetic %+10\n\"It's exactly the way I imagined it!\" says Aurelia with an ecstatic smile. \n\n\"You horror writers are all the same,\" Renee says affectionately, and leads on through the door at the end of the hall to the rear balcony. To the right is the kitchen—Renee's zone, since she'll be the only one cooking—and to the left, mirroring it, is her room. You don't go in, but the door is open and you can see more bookshelves, a narrow bed, another fold-down desk, and an external door and window.\n\nThe L-shaped rear balcony has long since been fully enclosed, although it retains large windows with a view of the small fenced-off yard and more mountains—which would be the best view in the house if the front hill wasn't so spectacular. An external door stands open at the end nearest the kitchen. There is a wood-burning stove with kindling and cat food on shelves next to it, and tea and coffee supplies next to that. On the opposite side of the stove, farther from the kitchen, the entire room is lined with tables. The first is full of supplies for a cold lunch: mountains of freshly-baked bread and buns, with several blocks of butter in a covered bowl and some basic spreads. Since Tamsin is allergic to peanuts, there is no peanut butter or Nutella although there is an array of small tuna tins, both flavoured and plain. \n*if flaw = 1\n\tYou're grateful for the tuna, since you're intolerant of nuts, most salad vegetables, and cold meats. If necessary, you can live on tuna sandwiches. \n\t*goto tuna\n*else\n*label tuna\n\nBeyond the lunch table is a fridge, which Renee opens to reveal shelves already marked out for personal or group use. There is an abundance of cold sliced ham (carefully marked so Lala doesn't eat non-halal food by mistake) and turkey, milk of various kinds including soy and almond milk, fruit juice, and several bottles of wine and blocks of chocolate. \n*choice\n\t#\"Renee, you really understand writers, don't you?\"\n\t\t*set renee %+10\n\t\t*set empathetic %+10\n\t\t\"This is not my first rodeo,\" she says modestly.\n\t\t*goto grass\n\t#Of course you already brought a secret stash of chocolate yourself.\n\t\t*set fitness %-10\n\t\t*set empathetic %-10\n\t\t*set mental_health %+10\n\t\t*goto grass\n\t#\"Are we allowed to write out on the grass?\"\n\t\t*set mental_health %+10\n\t\t*set art %-10\n\t\t\"Of course,\" says Renee. \"Anywhere on the property is fine, except the church itself, the converted stables—that's the office now, down the hill—and the hall, also down the hill, which needs some minor repairs before it's open to the public again.\"\n*label grass\n\nAround the corner of the balcony there are more tables, with office chairs ready for anyone that would rather write in the communal space than their own room. \n*if flaw = 2\n\tThe thought fills you with horror. You hope you can hide in your room and pretend no one else exists. Max appears delighted.\n\t*goto leads\n*else\n*label leads\n\nThat leads to the (relatively) new section of the house, which contains a bathroom, the Bishop's Room (much like the Master Bedroom, but with garden instead of mountain views—the biographer Eric Mitchell will stay there), and the tiny Prayer Room, accessed through the laundry, where the fantasy writer Bruce Grist will be staying.\n*if flaw = 2\n\tYou feel a tiny stab of jealousy that Bruce gets the most private room. Hopefully your social anxiety won't ruin the whole experience for you.\n\t*goto stab\n*if flaw = 3\n\tYou feel a tiny stab of regret that you didn't ask for the most private room. Even the sound of typing through the walls is sure to make you start thinking about your fellow writers rather than your book.\n\t*goto stab\n*else\n*label stab\n\nBefore going farther along the rear balcony, Renee turns back into the main house in order to show you the Nursery. \"The Nursery has three doors,\" she explains. \"This door, a locked door leading into the Playroom, and the external door.\"\n\nLike the Dining Room, the Playroom has an external door with glass panels that is the only source of natural light. The desk is a card table, the bed is a single, and the chair is plastic.\n\n*if room = 1\n\tSo this is your room. It will be fine. You put your bags on the bed.\n\t*goto yu\n*if room = 2\n\t\"This will suit me very well,\" says Lala.\n\t*goto yu\n*if room = 3\n\t\"This is Tamsin's room,\" says Renee.\n*label yu\n\nThe narrow view out the window shows the sleep upward slope of the garden leading toward the church. Slate steps begin just after the deck (which is almost level with the ground on this side of the house) and curve up to the side of the church. It is beautifully framed with sun-gilded ivy and roses, even though you can already tell the sun will never reach inside the room.\n*fake_choice\n\t#\"Is that the secret back way to the church?\"\n\t\t*set imagination %+10\n\t#\"They really liked mahogany back then, didn't they?\"\n\t\t*set observation %+10\n\t#\"There's so much slate. Is it local?\"\n\t\t*set knowledge %+10\n\n\"That's right,\" says Renee, and returns to the rear balcony before taking you past the Bishop's room (where Eric will be staying) to the laundry. \"This is where things get tricky,\" she says.\n\n\"There's only the one laundry, so you're all welcome to use it—but there's a schedule in your email pack. Ditto for the shower, of course.\" She opens the door to the Prayer Room, aka Bruce's room, which is even smaller and darker than the Nursery, and leaves it open as she leads the way into the yard. There is a very small room immediately to the left, with a rough wooden door. You can sense the spiders without even opening it.\n\n\"Spare toilet,\" Renee says, and then points a little way down the hill to a modern building you hadn't noticed before. \"There's our garage, which Bruce and Tamsin will be using for their cars. I imagine you've noticed the converted stables and the hall at the bottom of the hill. And I think that's enough of a tour for now!\"\n*choice\n\t#Take a walk around the property.\n\t\t*set fitness %+10\n\t\t*set knowledge %+10\n\t\tGood views means good cardio, and even heading downhill has your calves feeling the burn. You notice a relatively modern brick structure next to the converted stable, and confirm that yes, it is another bathroom. Good to know. There's a lock but the key is still in it. Clearly vandalism isn't a major concern here.\n\n\t\tDespite the large gardens around the house and church, most of the block is grass. The ground underneath is hard and dry, but at least it doesn't roll away underfoot. Several of the trees are simply enormous, with great big branches that look perfect for climbing. You follow the house around, noticing a patched-up wooden door leading under the house, and walk through the back gate into the enclosed yard where you can see Renee, Aurelia, and Lala through the rear balcony windows.\n\t\t*if love_lines = 1\n\n\t\t\tYou notice something like a spiderweb behind Aurelia. No; not behind her—attached to her! It runs between her and Renee as if a spider has somehow made it while they've been sitting there. Which is ridiculous. \n\n\t\t\tYou see a second line from Aurelia to Lala. And there is another glowing line running from Lala to you. There aren't any coming from Renee. You blink hard, and the lines vanish.\n\t\t\t*goto unpack\n\t\t*else\n\t\t\t*goto unpack\n\t#Grab a hot drink and see if anyone else wants to shoot the breeze for a bit.\n\t\t*set aurelia %+10\n\t\t*set renee %+10\n\t\t*set art %-10\n\t\tMax and Lala head off to unpack their stuff, while Renee and Aurelia join you. They quickly discover a shared love of Edgar Allen Poe and start reciting 'Annabel Lee' to one another. It starts off entertaining, then impressive, then uncomfortably intense.\n\n\t\t\"Are you gay?\" Aurelia asks. \"I mean, that's one reason to become a priest, isn't it?\"\n\n\t\tRenee laughs. \"You're so close and yet so far off the mark! First of all, Anglican priests are encouraged to marry. But I'm asexual, so I liked the idea of having the church as my family instead of the biological kind.\"\n\n\t\t\"That makes sense,\" says Aurelia.\n\n\t\t\"I certainly think so,\" says Renee comfortably. \"Oh I suppose I'm technically grey ace, since I do rather like Tom Hiddleston's Loki.\"\n\n\t\t\"Pfft,\" says Aurelia. \"I'm as gay as they come and I'm still attracted to that. It doesn't count.\"\n\n\t\t\"More tea?\" says Renee, and the chatter continues comfortably.\n\t\t*if love_lines = 1\n\n\t\t\tYou're looking out the window when you notice something like a spiderwen behind Aurelia. No; not behind her—attached to her! It runs between her and Renee as if a spider has somehow made it while you've been sitting there. Which is ridiculous. \n\n\t\t\tYou shift in your seat and see a second line from Aurelia that passes through you towards Lala's room. As you watch, Lala comes out, smiles at you all with a level of affection that seems impossible in a human, and puts an empty water glass on the kitchen bench before leaving again. The glowing line from Aurelia follows her, and brightens at her smile. \n\n\t\t\tThere is another glowing line running from Lala to you, but there aren't any coming from Renee. You blink hard, and the lines vanish.\n\t\t\t*goto unpack\n\t\t*else\n\t\t*goto unpack\n\t#Take another look at that bookshelf in the entrance hall.\n\t\t*set knowledge %+10\n\t\t*set observation %+10\n\t\tIt's clear that not only does Renee like classic and cozy crime, she's a completionist. Her collection is not merely large, but you're onto the third floor-to-ceiling bookshelf before you find a single missing volume. You make a note of it in case you want to get her a thank-you gift later. When you move onto the non-fiction section your eye is caught by a folder of loose papers, brochures, pictures, and diagrams.\n\n\t\tYou take it down carefully, and find a collection of documents related to the house, grounds, and church. You're lost for several minutes trying to piece together the historical jigsaw before you realise how much time has passed. With a happy sigh, you carefully replace the papers on their shelf next to the glass case with its ancient knives, can openers, and suchlike that were once used in the rectory kitchen.\n\n\t\tThrough the hall doors you can see Aurealia, Renee, and Lala chatting in the rear balcony. \n\t\t*if love_lines = 1\n\n\t\t\tYou notice something like a spiderweb behind Aurelia. No; not behind her—attached to her! It runs between her and Renee as if a spider has somehow made it while they've been sitting there. Which is ridiculous. \n\n\t\t\tYou see a second line from Aurelia to Lala. And there is another glowing line running from Lala to you. There aren't any coming from Renee. You blink hard, and the lines vanish.\n\t\t\t*goto unpack\n\t\t*else\n\t\t\t*goto unpack\n*label unpack\n\nUnfortunately you can't procrastinate any longer, and it's time to unpack. Loki does you the honour of sitting on your bed and watching you work, glaring and flicking his tail any time you put something too close to him.\n*if talking_cat = 1\n\n\tYou offer him your fingers to sniff, and he examines them carefully and then closes his eyes and says, \"You may now worship me.\"\n\n\t\"Excuse me?\" you say. \"Did you just say something?\"\n\n\tThe cat doesn't respond. Obviously. It must have been someone in another room.\n\t*goto qi\n*if talking_walls = 1\n\tYou offer him your fingers to sniff, and he glares at you before leaping off the bed and walking into the next room with his tail in the air. Apparently you didn't pass muster.\n\n\tAs you attempt to fit all of your clothes into the three drawers of the bedside table, you distinctly hear someone say, \"That's clearly not going to work. Why are authors so averse to spacial reality?\"\n\n\tYou look up, expecting to see someone in the doorway. There's no one. You turn in a slow circle, but there's absolutely no one there. Besides, it didn't sound like Renee at all. \n\n\tOh well.\n\t*goto qi\n*else\n*label qi\n\nYou're just about to attempt the notoriously patchy internet connection when you hear the distinctive clang of the brass doorbell.\n*choice \n\t#Go and open the door.\n\t\t*set proactive %+10\n\t\tRenee is a step behind you as you pull open the enormous door and welcome a dark-haired woman and an albino man with ginger hair and excitable sideburns. \n\t\t*goto porch\n\t#Shadow Renee to the door.\n\t\t*set proactive %-10\n\t\tYou follow Renee and she gives you a conspiratorial smile before hauling open the door to welcome a dark-haired woman and an albino man with ginger hair and excitable sideburns. \n\t\t*label porch\n\n\t\tThe woman must be Tamsin Violi, and the gentleman's sideburns suggest he's the fantasy writer, Bruce. They introduce themselves and exclaim over the house. Bruce is wearing sunglasses, and doesn't take them off when he comes inside.\n\t\t*goto lies\n\t#Head for the rear balcony and act casual.\n\t\t*set proactive %-10\n\t\tAurelia has left her half-finished tea on the tea table and presumably returned to her room since you don't see her in the hall, and the curtains on her internal window are closed.\n\n\t\tYou pour another cup for yourself and wait for Renee to bring the new writer through to you. She comes in with two: a dark-haired woman and an albino man with ginger hair and excitable sideburns. \n\n\t\tThe woman must be Tamsin Violi, and the gentleman's sideburns suggest he's the fantasy writer, Bruce. He's wearing sunglasses, and doesn't take them off even though they've already walked through most of the building. They introduce themselves and exclaim over the house. \n*label lies\nRenee basks in the praise. \n\n\"I can't believe we both came from Sydney and managed to arrive at the same time,\" says Bruce.\n\n*if lie_detector = 1\n\tBizarrely, there's a flash of gold from behind his sunglasses. It must have been a trick of the light since his eyes are the classic albino red.\n\t*goto ti\n*label ti\n\nAurelia pulls aside the curtain and gives a wave before closing it again and coming out her door. \"I'm Aurelia. Did you just come in? I didn't hear the bell.\"\n\n*if lie_detector = 1\n\tHer eyes also flash golden for a moment, before returning to their usual bright blue. Weird.\n\t*goto yi\n*label yi\n\nBruce declines Renee's offer of a tour and heads directly through the laundry to his tiny room. It seems he's the true introvert of the bunch.\n\nTamsin and Renee are just about to head into Tamsin's room when the doorbell rings again. This, presumably, is Eric—the final member of this year's writing retreat, and the only non-fiction writer since he's apparently working on a biography.\n\nMax emerges from the bathroom in a towel, looking rather well-formed and entirely aware of it, and joins the procession to the door.\n*fake_choice\n\t#What a jerk.\n\t\t*set max %-10\n\t#I hope we get the Max show every day.\n\t\t*set maxattraction true\n\t#I wish I had his confidence.\n\t\t*set happy %-10\nMax shoots a wink at you that makes you think he knows exactly what you're thinking.\n\nThe procession picks up Lala on the way, who immediately brightens at the prospect of yet another person to bring into the over-crowded house. Only Bruce stays in his room, so poor Eric is faced with almost everyone all at once.\n*choice\n\t#Back off.\n\t\t*set proactive %-10\n\t\t*set eric %+10\n\t\t*goto fawn\n\t#Stand in front of Max so the partial nudity isn't quite so overwhelming.\n\t\t*set empathetic %+10\n\t\t*set eric %+10\n\t\t*goto fawn\n\t#Stand behind Max so you have the best vantage point to see Eric's reaction.\n\t\t*set observation %+10\n*label fawn\nEric's look of overwhelmed terror briefly flashes into outright envy at Max's physique before switching to more general adoration.\n\n\"You're definitely Max,\" he says. \"'Falsehoods in the Forest' was simply divine, but I didn't expect you to actually look like the main character.\" He turns to Tamsin. \"It is so good to read historical fiction set in Canberra! You actually made it seem like an interesting place for a minute there. Aurelia? I read 'Little Girl Alone'. Thanks for the nightmares. I'm never reading your novel, but I'll definitely buy it for someone I hate. $!{name}, your \n*if realism > 50\n\tdescriptions make me feel like I'm reading my own memories. \n\t*goto wi\n*else\n\tdescriptions make the most amazing things seem absolutely real. \n*label wi\nThey way you \n*if observation >= imagination\n\tobserve the key details of every scene is simply perfect.\n\t*goto ei\n*else\n\tmix the mundane and the extraordinary makes me feel like anything could happen at any moment, even in real life.\n*label ei\nI intend to read every word you ever write, and plagiarise the crap out of it. And Lala! I swear reading your book made me a better person. Please tell me it's going to be a series.\"\n\n\"It already is,\" she grins, wriggling past you to give him a hug and draw him inside. \"I just need to translate the rest into English.\"\n\nHe turns back over his shoulder. \"Renee, you already know I admire your work. I certainly plan to come to church on Sunday, as always.\"\n*if lie_detector = 1\n\n\tYou carefully watch Eric's eyes as he speaks, but they remain dark brown. Something makes you believe that every word he just said was completely sincere.\n\t*choice\n\t\t#How exhausting.\n\t\t\t*set eric %-10\n\t\t\t*goto please\n\t\t#\"Eric? Shall I put you on my mailing list?\"\n\t\t\t*set eric %+10\n\t\t\t\"Oh yes please!\" he says.\n\t\t\t*goto please\n\t\t#Now I wish I'd read at least one of Max's books before coming.\n\t\t\t*set max %+10\n\t\t\t*goto please\n*else\n*label please\n\nIt's finally time to actually do some writing! \n\nOr is it? Everyone seems super friendly (other than Bruce, which probably means he'll get more writing done than anyone). There are a few hours before dinner, so you really could get some writing done—if you focus.\n*if flaw = 3\n\tMaybe you can, this time. At least a little bit.\n\t*goto arvo\n*else\n*label arvo\n*set temp + 1\n*choice\n\t*hide_reuse #Spend some time with Tamsin.\n\t\t*set tamsin %+10\n\t\t*set art %-10\n\t\tTamsin is still enjoying her tour, asking Renee dozens of questions about small details she observes in the ceiling, walls, window frames, and even the floor. She almost swoons with delight when Renee shows her the small cranks in the Playroom and Master Bedroom that were originally hooked up to bells to summon the servants. The rector grins in delight and excuses herself to prepare for dinner.\n\n\t\t\"This town had a courtroom and jail before it had much else,\" Tamsin muses. \"I bet they used convict labour here. It was probably quite a high-status job for that class at the time, although they certainly earned it when they had to bring water up that mountain.\"\n\n\t\tShe touches the crank gently, as if honouring those who lived and died long ago.\n\n\t\t*if light > 50\n\t\t\t\"There's a light in you,\" she says with disarming frankness, \"and in your writing too. It gives it a transporting quality.\"\n\t\t\t*goto hi\n\t\t*else\n\t\t\t\"There's an edginess to you,\" she says with disarming frankness, \"and in your writing too. It gives it a haunting quality, even when the story ends.\"\n\t\t\t*label hi\n\n\t\t\tYou're not sure how to handle such intelligent praise. \n\t\t\t*choice\n\t\t\t\t#\"Thank you.\"\n\t\t\t\t\t*goto cc\n\t\t\t\t#\"Your books are super good too.\"\n\t\t\t\t\t*goto cc\n\t\t\t\t#\"Tea?\"\n\t\t\t\t\t*label cc\n\t\t\t\t\t\"I'd better unpack,\" she says, tactfully letting you know she'd like some time alone.\n\n\t\t\t\t\tYou have a go at getting your email, and stare at your screen for a full ten minutes before giving up and using your phone, which graciously lets you know that you have precisely $${cash} in your account, and three emails from your sister asking for money. So life is exactly on its usual track.\n\t\t\t\t\t*if temp = 3\n\t\t\t\t\t\t*goto dinner\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto arvo\n\t*hide_reuse #Spend some time with Eric.\n\t\t*set eric %+10\n\t\t*set art %-10\n\t\tWhen you venture over to the Bishop's Room—that is, Eric's room—the door is open and Eric is sprawled back on the queen size bed, surrounded by a mountain of suitcases. As you reach to knock on the open door, he startles to attention and guiltily smooths his beard.\n\n\t\t\"I… er… just wanted to say hi,\" you say.\n\n\t\t\"Come in!\" he says, with the air of someone receiving an unexpected visit from a minor celebrity. \"I wonder if you've got any advice.\"\n\n\t\t\"About what?\" you say, taking a seat in one of the armchairs by the window.\n\n\t\tHe runs his hands through his beard, making it stick out in strange directions. \"Everything? But specifically, writing.\"\n\n\t\t\"Could you be more specific than that?\" you ask, feeling faintly overwhelmed. You weren't able to find anything by Eric Mitchell when you googled him, and you're beginning to wonder if that's because he's never written a word in his life. \n\n\t\t\"How do I… er… start?\"\n\t\t*set eric %+10\n\t\t*fake_choice\n\t\t\t#\"One word at a time.\"\n\t\t\t#\"Some kind of interesting moment.\"\n\t\t\t#\"At the beginning.\"\n\t\tHis forehead clears as if you've just solved an enormous problem, and he races to his desk and starts typing.\n\n\t\tYou back away slowly. It seems the conversation is over. \n\n\t\tUnfortunately there's a step down onto the rear balcony and you trip over backwards. You flail desperately, trying to regain your balance, and Loki squeals in complaint as he is collected by your foot on the way to grabbing the fridge as if it's a lifeguard and you're drowning.\n\n\t\t\"I'm so sorry Loki!\" you say as the cat glares at you from under one of the tables.\n\t\t*if talking_cat = 1\n\n\t\t\t\"You galumphing infant!\" he hisses back, and then races out the open back door.\n\n\t\t\tWhat just happened? Are you suffering from sunstroke or something?\n\t\t\t*if temp = 3\n\t\t\t\t*goto dinner\n\t\t\t*else\n\t\t\t\t*goto arvo\n\t\t*else\n\t\t\t*if temp = 3\n\t\t\t\t*goto dinner\n\t\t\t*else\n\t\t\t\t*goto arvo\n\t*hide_reuse #Spend some time with Lala.\n\t\t*set lala %+10\n\t\t*set art %-10\n\t\tYou head toward Lala's room, and she opens the door before you have a chance to knock on it. \n\n\t\t*if (lala > 60) and (max_love = 0)\n\t\t\t\"$!{name}!\" she says. \"I was just coming to find you.\"\n\n\t\t\t\"Really?\"\n\n\t\t\t\"Mmm-hmm,\" she says, stepping close to you and and looking up into your eyes.\n\t\t\t*if love_lines = 1\n\t\t\t\tYou can clearly see one of those glowing threads coming from her to you. It's no spiderweb. \n\t\t\t\t*goto vi\n\t\t\t*else\n\t\t\t*label vi\n\t\t\t*choice\n\t\t\t\t#Clear my throat. \"Shall we have tea and talk plot devices?\"\n\t\t\t\t\t*set lala_love 10\n\t\t\t\t\t\"Perfect,\" she says, and her smile changes ever so slightly from flirty to friendly.\n\n\t\t\t\t\tYou grab tea from the rear balcony and then return to the front of the house to drink it, where the view is the most spectacular and the couches are the most comfortable.\n\n\t\t\t\t\tAfter a while, she excuses herself and goes to plot her next murder.\n\t\t\t\t\t*if arvo = 3\n\t\t\t\t\t\t*goto dinner\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto arvo\n\t\t\t\t#Stay right where I am and see what she does.\n\t\t\t\t\t*set lala_love 5\n\t\t\t\t\tWatching your face very carefully, she trails her fingers down your arm and and then inside the palm of your hand, making you shiver deliciously from head to toe. She closes her hand around yours, and draws you out onto the balcony to sit hand in hand, barely speaking as you drink in the views of the countryside and of each other.\n\n\t\t\t\t\tAfter a while, she excuses herself and goes to plot her next murder. Did you just miss a chance at romance… or will there be another?\n\t\t\t\t\t*if arvo = 3\n\t\t\t\t\t\t*goto dinner\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto arvo\n\t\t\t\t#\"Why is it that when I want to say something intelligent and sexy I can't think of the words?\"\n\t\t\t\t\t*set lala_love 1\n\t\t\t\t\t\"Sometimes, it's best not to talk,\" she says. \n\n\t\t\t\t\tWatching your face very carefully, she trails her fingers down your arm and and then inside the palm of your hand, making you shiver deliciously from head to toe. She closes her hand around yours, and kisses your cheek so softly it's like a butterfly passing you by.\n\n\t\t\t\t\tYou're still standing, half stunned, in the doorway when Eric walks past. \"Oh hi!\" he says. \"Er… Lala. And …\n\n\t\t\t\t\t\"$!{name},\" says Lala, making it sound like the sexiest word in the English language.\n\n\t\t\t\t\tBut the moment has passed, and the three of you go your separate ways.\n\t\t\t\t\t*if temp = 3\n\t\t\t\t\t\t*goto dinner\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto arvo\n\t\t*else\n\t\t\t\"$!{name}!\" she says. \"Have you seen Aurelia? I was going to ask her about what she thinks about religious imagery in modern texts, and whether I should use more Christian imagery or stick with predominantly Muslim stuff.\"\n\t\t\t*fake_choice\n\t\t\t\t#\"Good question!\"\n\t\t\t\t#\"I'm sick of Christian imagery used for spooky effect. Be original!\"\n\t\t\t\t#\"Write what you know, right?\"\n\t\t\t\"Thanks!\" she says. \"You're absolutely right.\"\n\n\t\t\t\"I wonder if Aurelia will say precisely the opposite?\" you say with a smile. \"Do you mind if I join you two?\"\n\n\t\t\t\"Not at all!\"\n\n\t\t\tThe three of you settle into the rear balcony, but then the other two fall so deeply into esoterica that you get a little lost, and excuse yourself.\n\t\t\t*if temp = 3\n\t\t\t\t*goto dinner\n\t\t\t*else\n\t\t\t\t*goto arvo\n\t*hide_reuse #Spend some time with Max.\n\t\t*set art %-10\n\t\t*set max %+10\n\t\tYou head for Max's room, wondering if he's talked out yet. Apparently not: the door is open and he's sitting on his bed looking thoughtful. \n\n\t\tAs he notices you, his face lights up. \"The views here really are spectacular.\"\n\n\t\t\"You are such a flirt!\"\n\n\t\t\"Doesn't mean I'm not speaking God's own truth.\"\n\t\t*if love_lines = 1\n\n\t\t\tYou can clearly see one of those glowing threads coming from him to you. It's no spiderweb.\n\t\t\t*goto si\n\t\t*else\n\t\t*label si\n\t\t*choice\n\t\t\t*selectable_if (lala_love = 0) #\"In that case, carry on. But I play for keeps.\"\n\t\t\t\t*set max_love 5\n\t\t\t\t*set max %+10\n\t\t\t\tHis smile gets even wider. \"Is that so?\"\n\n\t\t\t\t\"It is.\" You keep your eyes on his, daring him to make a move.\n\n\t\t\t\tHe takes a step towards you and for a moment it looks like you'll start making out in the doorway. Then Lala walks past.\n\n\t\t\t\t\"Oh!\" she says. \"Don't mind me.\"\n\n\t\t\t\tShe walks off whistling, but you're suddenly shy.\n\n\t\t\t\t\"I… er… should be writing.\"\n\n\t\t\t\tYou curse yourself as a coward even as you walk away.\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\n\t\t\t#\"Settle down. You're definitely not my type.\"\n\t\t\t\t*set max_love 10\n\t\t\t\tHe clutches his chest. \"Oh, my heart!\"\n\n\t\t\t\t\"Are you done?\" you say.\n\n\t\t\t\t\"I am.\"\n\n\t\t\t\t\"Coffee?\"\n\n\t\t\t\t\"Sure.\"\n\n\t\t\t\tThe two of you chat fictional romance and it's clear Max isn't going to hassle you. He's actually all right despite all the annoying charm and muscles.\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\n\t\t\t*selectable_if (lala_love = 0) #\"I'm not complaining.\"\n\t\t\t\t*set max_love 5\n\t\t\t\t\"It's a nice-looking bunch here, don't you think?\" he says.\n\n\t\t\t\t\"Sure. There's nothing hotter than a great writer.\"\n\n\t\t\t\t\"Oh!\" he says. \"In that case, I'd better get back to work.\"\n\n\t\t\t\tHe gently pushes you out the door and closes it in your face.\n\n\t\t\t\tWho knew a man could be flirtatious and play hard to get at the same time? Max is something else.\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\n\t*hide_reuse #Spend some time with Aurelia.\n\t\t*set art %-10\n\t\t*set aurelia %+10\n\t\tYou glance at Aurelia's balcony-facing window but the curtain is closed. Maybe she's actually writing, like you're meant to be doing.\n\n\t\tA moment later you're startled by a knocking sound, and you turn to see Aurelia pushing aside her gauze curtain to reveal her face. Seconds later she joins you on the balcony.\n\n\t\t\"Now you know why I chose that room,\" she says. \"Other than the sensation of being enclosed safely in the world's biggest priest hole, I mean—I can see out, but you guys can't see in.\"\n\n\t\t\"You really are a creepy doll, aren't you?\"\n\n\t\tShe shines at the compliment. \"Would you consider yourself a slow or a fast zombie?\"\n\n\t\t\"I confess I haven't given the question much thought.\"\n\n\t\t\"Slow zombies are those who are automatons shuffling through life; cogs in the machine of capitalism. Fast zombies represent a revolting, insatiable hunger. Like capitalism itself, if you like.\"\n\t\t*choice\n\t\t\t#\"Definitely a fast zombie. I try to keep fit.\"\n\t\t\t\t*set fitness %+10\n\t\t\t\t\"Nice,\" she says. \"I'll be sure to stock up on cricket bats and kukri knives then.\"\n\n\t\t\t\t\"Always a good precaution at semi-social events.\"\n\n\t\t\t\t\"Want to come in and spy on the others with me?\"\n\n\t\t\t\t\"Of course. Has anyone broken open the chocolate yet?\"\n\n\t\t\t\t\"Bruce.\"\n\n\t\t\t\t\"He's definitely a fast zombie too.\"\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\n\t\t\t#\"Definitely a slow zombie. Why rush your meals, when you could savour every distinct flavour?\"\n\t\t\t\t*set observation %+10\n\t\t\t\t\"Right,\" she says. \"Because zombies are such gourmets.\"\n\n\t\t\t\t\"I would be.\"\n\n\t\t\t\t\"Want to come in and spy on the others with me?\"\n\n\t\t\t\t\"Of course. Has anyone broken open the chocolate yet?\"\n\n\t\t\t\t\"Bruce.\"\n\n\t\t\t\t\"He's definitely a fast zombie then.\"\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\n\t\t\t#\"Definitely a ninja. I like to be surprising.\"\n\t\t\t\t*set imagination %+10\n\t\t\t\t\"Good answer!\" she says. \"I'm afraid I've rather embraced the 'girl who dies screaming' trope myself by bleaching my hair. Oh well.\"\n\n\t\t\t\t\"Time to subvert that trope, don't you think?\" you say.\n\n\t\t\t\t\"I plan to,\" she says. \"It turns out it's not as easy as I expected.\"\n\n\t\t\t\t\"Writing never is.\"\n\n\t\t\t\t\"Want to come in and spy on the others with me?\"\n\n\t\t\t\t\"Of course. Has anyone broken open the chocolate yet?\"\n\n\t\t\t\t\"Bruce.\"\n\n\t\t\t\t\"He's definitely a fast zombie then.\"\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\t\t\t\t\n\t*hide_reuse #Spend some time with Renee.\n\t\t*set art %-10\n\t\t*set renee %+10\n\t\tRenee is sitting at the corner of the balcony, as if waiting to answer questions. She gives you an attentive smile. \"How's your room?\"\n\n\t\t\"It's great, thank you. May I ask, what made you decide to run a writers' retreat here?\"\n\n\t\tShe shrugs one shoulder. \"Budget, mostly. This is a small church to be looking after four beautiful historic buildings. But also because I wanted to share this place as much as possible. It's special here.\"\n\t\t*choice\n\t\t\t#\"How bad is the budget?\"\n\t\t\t\t*set knowledge %+10\n\t\t\t\tShe makes a face.\n\n\t\t\t\t\"That bad, huh?\"\n\n\t\t\t\t\"It's a lot better since we started hosting retreats. Partly because of the retreats, and partly because people who've been here tell others, and sometimes people visit and/or donate toward upkeep.\"\n\n\t\t\t\t\"The garden is lovely too.\"\n\n\t\t\t\tHer face goes the funny shape that people's faces go when they want to show off their hard work but don't want to be annoying. \"Would you like a tour of the gardens?\"\n\n\t\t\t\t\"Yes please.\"\n\n\t\t\t\tTime for another tour, although this one is a lot hillier than the first. The rememberance rose garden is especially beautiful, and the slate paths running here and there.\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\t\t\n\t\t\t#\"Does it make you happy?\"\n\t\t\t\t*set mental_health %+10\n\t\t\t\t\"What's the use of having something if you don't share it with people?\"\n\n\t\t\t\t\"You really picked the right profession.\"\n\n\t\t\t\t\"I know.\"\n\n\t\t\t\t\"The garden is lovely too.\"\n\n\t\t\t\tHer face goes the funny shape that people's faces go when they want to show off their hard work but don't want to be annoying. \"Would you like a tour of the gardens?\"\n\n\t\t\t\t\"Yes please.\"\n\n\t\t\t\tTime for another tour, although this one is a lot hillier than the first. The rememberance rose garden is especially beautiful, and the slate paths running here and there.\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\t\t\n\t\t\t#\"How long have you lived here?\"\n\t\t\t\t*set knowledge %+10\n\t\t\t\t\"Five years next month! It feels simultaneously like the shortest and the longest time.\"\n\n\t\t\t\t\"You seem to love it here.\"\n\n\t\t\t\t\"I do! Dodgy internet and all.\"\n\n\t\t\t\t\"The garden is lovely too.\"\n\n\t\t\t\tHer face goes the funny shape that people's faces go when they want to show off their hard work but don't want to be annoying. \"Would you like a tour of the gardens?\"\n\n\t\t\t\t\"Yes please.\"\n\n\t\t\t\tTime for another tour, although this one is a lot hillier than the first. The rememberance rose garden is especially beautiful, and the slate paths running here and there.\n\t\t\t\t*if temp = 3\n\t\t\t\t\t*goto dinner\n\t\t\t\t*else\n\t\t\t\t\t*goto arvo\t\t\n\t#Write.\n\t\t*label writing\n\t\t*set art %+10\n\t\t*if word_count = 0\n\t\t\t*set word_count +3000\n\t\t\t*set writing_sessions 1\n\t\t\tOkay.\n\n\t\t\tIt's just a book.\n\n\t\t\tYou can do this.\n\n\t\t\tChecking your outline, you load up your computer and open a new document.\n\n\t\t\tTHE BLANK PAGE IS STARING BACK AT YOU. \n\n\t\t\tThis book is literally nothing. It doesn't exist. You're a total fraud.\n\n\t\t\tLoki saunters past your open door and casts you a contemptuous look.\n\n\t\t\tWords. Anything. Just start! You can make it better later.\n\n\t\t\tWhen you look up, you've written three thousand words!\n\n\t\t\tWhat's more, you've finally decided on your viewpoint character.\n\t\t\t*fake_choice\n\t\t\t\t#Skye, a woman.\n\t\t\t\t#Cash, a man.\n\t\t\t\t\t*set hero_pronoun \"he\"\n\t\t\t\t\t*set hero_name \"Cash\"\n\t\t\t\t#Tun, a genderfluid person.\n\t\t\t\t\t*set hero_pronoun \"they\"\n\t\t\t\t\t*set hero_name \"tun\"\n\t\t\t*if temp = 3\n\t\t\t\t*goto dinner\n\t\t\t*else\n\t\t\t\t*goto arvo\t\n\t\t*if word_count = 3000\n\t\t\t*set word_count +2000\n\t\t\t*set writing_sessions 2\n\t\t\tYou have a book. It's really happening. You just need to keep going. One word at a time. \n\n\t\t\tActually, it doesn't suck so far.\n\n\t\t\tWell, not irretrievably. \n\n\t\t\tYou force your eyes away from the word count, the wall, and the view outside—and you write.\n\n\t\t\tTime passes, and one sentence follows another. The inciting incident involves \n\t\t\t*fake_choice\n\t\t\t\t#Keesha, a woman.\n\t\t\t\t#Sam, who is intersex.\n\t\t\t\t\t*set pronoun \"they\"\n\t\t\t\t\t*set named \"sam\"\n\t\t\t\t#Mike, a man.\n\t\t\t\t\t*set pronoun \"he\"\n\t\t\t\t\t*set named \"mike\"\n\t\t\tYour neck is starting to ache. You stand up and stretch, and wonder if you should keep going or take a break. It's not long until dinner time.\n\t\t\t*if temp = 3\n\t\t\t\t*goto dinner\n\t\t\t*else\n\t\t\t\t*goto arvo\t\n\t\t*else\n\t\t\t*set writing_sessions 3\n\t\t\t*if flaw = 3\n\t\t\t\t*set word_count 1000\n\t\t\t\tYou stare at your screen. Why are screens black on white, instead of different colours? Different colours are cool. \n\n\t\t\t\tSpeaking of which, why are black and white defined as 'tones' rather than colours. Aren't they just as good as the rest? When you were a kid, you always said white was your favourite colour.\n\n\t\t\t\tWhite is still really cool. So clean. So unlike your mind.\n\n\t\t\t\tYou're doing it again! Getting distracted. Stop that.\n\n\t\t\t\tNow where were you?\n\n\t\t\t\tOh yeah. Childhood. How strange that the child you once were is a part of you still. Or is it? Would you be annoyed by your child's daydreams if you were trying to get them to do something? Like write?\n\n\t\t\t\tArg! You're meant to be writing. Is $!{named}\n\t\t\t\t*fake_choice\n\t\t\t\t\t#A romantic interest?\n\t\t\t\t\t\t*set character 1\n\t\t\t\t\t#A villain?\n\t\t\t\t\t\t*set character 3\n\t\t\t\t\t#Both?\n\t\t\t\t\t\t*set character 2\n\t\t\t\tYour screensaver is on. But you made some important decisions today. That's got to count for something.\n\t\t\t\t*goto din\n\t\t\t*else\n\t\t\t\t*set word_count +2000\n\t\t\t\tOne thing leads to another. Your main character already has serious issues, and you can't wait to see what they do next.\n\n\t\t\t\tThey're not the only interesting character. And there are hints of setting, too, whetting the interest of both readers and yourself. Parts of the story are getting away from you already, and you can only hope your subconscious isn't ruining everything.\n\n\t\t\t\tYou had a plan, and a problem, and characters, and conflict, and you knew just how you wanted the reader to feel. Now you're all caught up, and it's almost as if you're watching it happen in front of you.\n\n\t\t\t\tThis is it. You're in the zone. Is $!{named}\n\t\t\t\t*fake_choice\n\t\t\t\t\t#A romantic interest?\n\t\t\t\t\t#A villain?\n\t\t\t\t\t#In need of help?\n\t\t\t\t*label din\n\n\t\t\t\t\"Dinner time!\"\n\n\t\t\t\tYou look up in a daze to see Renee knocking on your door, smiling. \"Going well, I take it?\"\n\n\t\t\t\t\"Uhh…\"\n\n\t\t\t\t\"I'm sorry to say it's dinner time.\"\n\n\t\t\t\t\"Oh! Yes, I'm starved. Thank you.\"\n*label dinner\n\nIt is a condition of the retreat that everyone eats dinner together at 7pm each night. Bruce is still wearing those sunglasses, even though it's dusk. Tamsin is bubbling with details about the history of Gundagai, the church, and the house. Eric is begging everyone for writing tips, and Max is turning every piece of advice into double entendres. Renee is laughing and urging people to eat more vegetables. Lala is laughing at Max, and Aurelia is quietly watching everyone with a secretive smile on her face. \n\n*if killer = 2\n\tDinner turns to after-dinner chocolate and wine. \"Red or white?\" says Max. \"There's plenty of us here if we want both.\"\n\n\t\"None for me thanks,\" says Lala, eating another chocolate instead.\n\n\t\"Lots for me,\" says Eric. \"I'll take one of those bottles for you.\"\n\n\tThe wine and chocolates continue to circulate.\n\t*goto wine_path\n*else\n\tDinner turns to after-dinner chocolate and wine. \"Red or white?\" says Eric. \"There's plenty of us here if we want both.\"\n\n\t\"None for me thanks,\" says Lala, eating another chocolate instead.\n\n\t\"Lots for me, and for everyone who's not a teetotaller,\" says Max. \"Let me take one of those bottles for you.\"\n\n\tThe wine and chocolates continue to circulate.\n*label wine_path\n*if flaw = 1\n\tYou're intolerant of all fermented foods, which unfortunately includes wine. But sometimes it's worth it.\n\t*goto huj\n*else\n*label huj\n*choice\n\t#\"Red for me, thanks.\"\n\t\t*set eric %+10\n\t\t*set wine 1\n\t\t*goto jj\n\t#\"Is that white sparkling? Yes please.\"\n\t\t*set eric %+10\n\t\t*set wine 2\n\t\t*goto jj\n\t#\"No thanks.\"\n\t\t*set fitness %+10\n*label jj\nIt's a good day. \n*if word_count = 0\n\tYou didn't start writing yet, but you got to know people. That's always worthwhile.\n\t*goto teetotal\n*else\n\tYou wrote ${word_count} words, which is not a bad start. Perhaps you really can do this.\n*label teetotal\n\nLala is first to bed, probably because she's stone cold sober. You all hear her snoring gently from her room, which everyone finds hilarious.\n\n*if wine > 0\n\tYou retire late, slightly sozzled and with the soporific addition of delicious food. \n\t*goto kick\n*else\n\tYou retire late, feeling the soporific effect of delicious food.\n*label kick\n\nKicking off your shoes, you check the shower schedule—oops, you missed your slot, although apparently 3:00am-5:00am is for anyone who's awake. Somehow, you don't think you'll be setting your alarm for that.\n\nYou change and get into bed, suppressing a shriek as your feet touch something warm under the covers. Loki emerges, looking ruffled, and walks over your stomach and then your computer keyboard before leaping to the ground and sauntering out your door.\n\n*if talking_cat = 1\n\t\"Come and check my food bowl,\" he says over his shoulder as he leaves.\n\t*fake_choice\n\t\t#\"Are you… talking to me?\"\n\t\t#Pretend you didn't hear anything.\n\t\t#\"Why me? You have an owner.\"\n\t*goto hmm\n*if talking_walls = 1\n\tOnce the cat is definitely gone and your heart stops pounding, you lie down ready to sleep.\n\n\t\"Be at peace. I will watch over you.\"\n\t*fake_choice\n\t\t#\"Who's there?\"\n\t\t#\"Creepy much.\"\n\t\t#Turn the light back on.\n\t*goto hmm\n*if lie_detector = 1\n\tAs you lie down and think over the day, you finally have a peaceful moment to consider that weird yellow glow you saw sometimes in people's eyes.\n\t*fake_choice\n\t\t#They were lying. I'm sure of it.\n\t\t#Could it be some quality of the light here?\n\t\t#How is this possible? It doesn't make sense.\n\t*goto hmm\n*else\n\tAs you lie down and think over the day, you finally have a peaceful moment to consider those weird glowing lines you saw between people.\n\t*fake_choice\n\t\t#They showed who is attracted to whom.\n\t\t#Could it be some quality of the light here?\n\t\t#Is this some kind of real-world magic?\n*label hmm\n\nNothing else happens. Perhaps nothing ever did. You're still considering the implications of your experience when you fall asleep, \n*if (room = 2) and (killer = 1)\n\tlistening to Aurelia pace back and forth in the corner of her tiny room across the hall.\n\t*goto gi\n*if ((room = 1) or (room = 3)) and (killer = 2)\n\tlistening through the wall to Aurelia mumbling quietly to herself.\n\t*goto gi\n*if (room = 2) and (killer = 2)\n\tlistening to Aurelia mumble quietly to herself in her tiny room across the hall.\n\t*goto gi\n*if ((room = 1) or (room = 3)) and (killer = 1)\n\tlistening through the wall to Aurelia pacing back and forth in the corner of her tiny room.\n*label gi\n*finish Day Two\n", "chapter_six_b_mmm": "*comment THIS IS ERIC IE KILLER = 2 ONLY!!!!!\n*temp talk 0\n*temp hide 0\n\"I'll come with you,\" says Eric.\n*if (killer_correct = 1) and (ericmagic = true)\n\n\tOh no. He has magical insight… into you. He knows that you know he's the killer.\n\t*goto oi\n*else\n*label oi\n*if killer_correct = 1\n\t*achieve figured_it_out\n\t*goto yup\n*else\n*label yup\n*choice\n\t#\"No thanks.\"\n\t\t\"I insist,\" he smiles, stepping closer to you. He's not as pliable as you thought. \n\t\t*if killer_correct = 1\n\n\t\t\tYou'll be fine in public… right?\n\t\t\t*goto car\n\t\t*else\n\n\t\t\tWell, it's no big deal.\n\t\t\t*goto car\n\t#\"Thanks.\"\n\t\t*goto car\n\t#\"Absolutely not.\"\n\t\t\"I insist,\" he smiles, stepping closer to you. He's not as pliable as you thought.\n\n\t\t\"I said, 'Absolutely not' and I meant it.\"\n\n\t\t\"And I said I would help you,\" says Eric, still smiling. \"And I meant it.\"\n\n\t\t\"No.\"\n\n\t\tHe takes your elbow and steers you towards the door.\n*label car\n\nYou could swear you feel the house sigh as you pass out of its embrace. That's probably not a good sign.\n\n*if (killer_correct = 1) and (clue_three = 3)\n\tOn the up side, the knife Eric used to kill Aurelia is underneath the driver's seat in your car.\n\t*goto uhoh\n*elseif (killer_correct = 0) and ((observation > 40) or (magic = 4))\n\tEric hesitates, just for a moment, and the realisation hits you like a punch to the gut. \n\n\tHe's the killer. It's as clear to you as the sky above.\n\t*set killer_correct 1\n\t*goto uhoh\n*else\n*label uhoh\n*if killer_correct = 1\n\n\tHow did you end up walking towards your car with a murderer? More importantly, how will you get away?\n\t*choice\n\t\t#Talk your way out of Eric's company.\n\t\t\t*set talk 1\n\t\t\t*if imagination > 40\n\t\t\t\tYou have to come up with something believable, and fast. Fortunately, you're a writer. Making stuff up is what you do.\n\t\t\t\t*if magic = 2\n\t\t\t\t\t*label magic_up\n\t\t\t\t\t\"C'mon magic,\" you whisper under your breath. \"Get me out of this.\"\n\n\t\t\t\t\tYou grit your teeth, trying to will yourself into the air.\n\n\t\t\t\t\t\"$!{name}!\" says Eric, \"you're flying!\"\n\n\t\t\t\t\tHe grabs your foot, holding you like a kite.\n\n\t\t\t\t\t\"Oops,\" you say loudly.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Uh… would you mind steering me inside?\"\n\t\t\t\t\t\t\tHe laughs delightedly, and then apologises for mocking your predicament. If he wasn't a murderer, he'd be the perfect gentleman. \"If it's okay with you, I'll just walk down and get those groceries solo.\"\n\n\t\t\t\t\t\t\t\"Yes please!\"\n\n\t\t\t\t\t\t\tHe walks you up the stairs like a novelty balloon and you climb down the wall and inside, where you once again hover at the ceiling.\n\n\t\t\t\t\t\t\t\"Are you sure you're okay?\" he says.\n\n\t\t\t\t\t\t\t\"I'm sure it'll wear off eventually.\"\n\n\t\t\t\t\t\t\t\"All right then. See you in a bit,\" he says, and heads downhill on foot.\n\n\t\t\t\t\t\t\tThe others gather in the hall, looking up at you. Without Eric there making you nervous, it's easy to get back on the ground.\n\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t#Wriggle out of his grip and take your chances with the sky.\n\t\t\t\t\t\t\tHe gasps in surprise rather than pain as you twist out his grip and float out of his reach.\n\n\t\t\t\t\t\t\t\"What are you doing?\" he shouts up at you.\n\n\t\t\t\t\t\t\t\"Can't help it,\" you say back.\n\n\t\t\t\t\t\t\t\"Do you need help?\"\n\n\t\t\t\t\t\t\t\"No, I'm fine. It'll wear off in a minute. Would you mind getting the groceries?\"\n\n\t\t\t\t\t\t\t\"If you're sure…\"\n\n\t\t\t\t\t\t\t\"I'm sure.\"\n\n\t\t\t\t\t\t\tHe frowns in thought for a moment, looking genuinely concerned for your safety, and then walks away towards the shops.\n\n\t\t\t\t\t\t\tYou continue rising upwards, quickly reaching the height of the deck, and then the roof.\n\t\t\t\t\t\t\t*goto flying_mishap\n\t\t\t\t\t\t#\"Help! Somebody help! Eric is the killer!\"\n\t\t\t\t\t\t\tHe gasps in surprise and drops your foot as if it's blazing hot.\n\n\t\t\t\t\t\t\t\"What are you doing?\" he shouts up at you.\n\n\t\t\t\t\t\t\t\"Help!\" you shout. \"Eric is the killer!\"\n\n\t\t\t\t\t\t\tLala, Max, and Tamsin rush out the front door just as you're floating by the deck.\n\n\t\t\t\t\t\t\tYou realise you're in real danger of floating away, and reach out your arms. Tamsin's eyes are on Eric and Lala is too short to reach you. This is bad. This is really bad.\n\t\t\t\t\t\t\t*if max > 50\n\n\t\t\t\t\t\t\t\tMax doesn't hesitate. He's always liked you, and he climbs up on the railing and hesitates for only a fraction of a second before leaping out into midair, grabbing you by the waist.\n\n\t\t\t\t\t\t\t\tThe magic can't quite carry two, apparently. You float down and Max wraps one arm around the railing on the steps to help anchor you.\n\n\t\t\t\t\t\t\t\t\"Are you okay?\" he asks.\n\n\t\t\t\t\t\t\t\t\"Yes—thanks to you.\"\n\n\t\t\t\t\t\t\t\tHe grins at you before remembering what he's doing and helping you inside. Everyone else comes too—including Eric.\n\n\t\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tMax climbs up on the railing and you can see him thinking about jumping off the deck to save you, risking his own life. \n\n\t\t\t\t\t\t\t\tHe doesn't jump in time, and you float higher—wishing you'd been just that little bit friendlier to Max. You're in real danger now, and not from Eric.\n\n\t\t\t\t\t\t\t\tYou continue rising upwards, quickly reaching the height of the deck, and then the roof.\n\t\t\t\t\t\t\t\t*label flying_mishap_b\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Close your eyes and gently float towards the ground.\n\t\t\t\t\t\t\t\t\t\t*if magic_practice = 1\n\t\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you crack open one eye to see that you're drifting towards the ground. Thank goodness you practiced your flying when you had the chance. You go inside at once, and the whole group quickly gathers—including Eric.\n\n\t\t\t\t\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*label death_by_flying_b\n\t\t\t\t\t\t\t\t\t\t\tNothing happens. You have an awful feeling you should have practiced your magic inside before trying it outside.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Help!\" you shout. \"I'm floating away!\"\n\n\t\t\t\t\t\t\t\t\t\t\tEric and the others look up at you, and then all around as if there might be a convenient kite or fire engine waiting around, ready to save you.\n\n\t\t\t\t\t\t\t\t\t\t\tThere isn't. In a few moments, you have a glorious view all across Gundagai and the surrounding countryside. Too bad it'll be the last thing you see.\n\n\t\t\t\t\t\t\t\t\t\t\tIt fades fast, and all you see is green. You can see the curvature of the Earth, and you find yourself wishing you could tell someone. Then white lights sparkle across your vision and you fall asleep, still floating higher.\n\n\t\t\t\t\t\t\t\t\t\t\tYou never wake up.\n\n\t\t\t\t\t\t\t\t\t\t\tOn the up side, when your tragic demise hits the news, your stories sell like hotcakes.\n\t\t\t\t\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t#Aim for the roof.\n\t\t\t\t\t\t\t\t\t\t*label abc\n\t\t\t\t\t\t\t\t\t\t*if magic_practice = 1\n\t\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you can tell you're making agonisingly slow progress towards the roof. Thank goodness you practiced your flying when you had the chance, and thank goodness the house has tall chimneys.\n\n\t\t\t\t\t\t\t\t\t\t\tYou grab a chimney and wait until the others fetch a ladder for you to climb down. Everyone gathers inside—including Eric.\n\n\t\t\t\t\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto death_by_flying\n\t\t\t\t\t\t\t\t\t#Wait patiently for the magic to cut out.\n\t\t\t\t\t\t\t\t\t\t*goto abc\n\t\t\t\t\t\t\t\t*label flying_mishap\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Close your eyes and gently float towards the ground.\n\t\t\t\t\t\t\t\t\t\t*if magic_practice = 1\n\t\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you crack open one eye to see that you're drifting towards the ground. Thank goodness you practiced your flying when you had the chance. YOu go inside and gather the others at once.\n\n\t\t\t\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*label death_by_flying\n\t\t\t\t\t\t\t\t\t\t\tNothing happens. You have an awful feeling you should have practiced your magic inside before trying it outside.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Help!\" you shout. \"I'm floating away!\"\n\n\t\t\t\t\t\t\t\t\t\t\tNo one comes to save you. \n\n\t\t\t\t\t\t\t\t\t\t\t\"Help!\" you yell with all your strength—but you're already too high.\n\n\t\t\t\t\t\t\t\t\t\t\tIn a few moments, you have a glorious view all across Gundagai and the surrounding countryside. Too bad it'll be the last thing you see.\n\n\t\t\t\t\t\t\t\t\t\t\tIt fades fast, and all you see is green. You can see the curvature of the Earth, and you find yourself wishing you could tell someone. Then white lights sparkle across your vision and you fall asleep, still floating higher.\n\n\t\t\t\t\t\t\t\t\t\t\tYou never wake up.\n\n\t\t\t\t\t\t\t\t\t\t\tOn the up side, your stories sell like hotcakes once your tragic demise hits the news.\n\t\t\t\t\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t#Aim for the roof.\n\t\t\t\t\t\t\t\t\t\t*label abcd\n\t\t\t\t\t\t\t\t\t\t*if magic_practice = 1\n\t\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you can tell you're making agonisingly slow progress towards the roof. Thank goodness you practiced your flying when you had the chance, and thank goodness the house has tall chimneys.\n\n\t\t\t\t\t\t\t\t\t\t\tYou grab a chimney and wait until the others fetch a ladder for you to climb down. For obvious reasons, you hold tightly to the ladder until you're absolutely sure gravity is working again. Once you're inside, you gather the others.\n\n\t\t\t\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto death_by_flying\n\t\t\t\t\t\t\t\t\t#Wait patiently for the magic to cut out.\n\t\t\t\t\t\t\t\t\t\t*goto abcd\n\t\t\t\t*else\n\n\t\t\t\t\tYou find yourself blathering some nonsense about an obscure medical condition that surely doesn't exist. To your surprise, Eric buys it and offers to fetch the groceries himself. He takes the cash and walks off down the hill.\n\n\t\t\t\t\tAmazed at the power of your imagination, you head inside and gather the others.\n\n\t\t\t\t\t*set cash -100\n\t\t\t\t\t*goto group_talk\n\t\t\t*elseif magic = 2\n\t\t\t\t*goto magic_up\n\t\t\t*else\n\t\t\t\tYou try desperately to think of some plausible reason that Eric needs to get the groceries solo, but absolutely nothing comes to mind. Right when you most need a great story, your imagination utterly fails you.\n\n\t\t\t\tWishing you were anywhere else, you get into the car.\n\t\t\t\t*goto bridge\n\t\t#Fight.\n\t\t\t*label fight\n\t\t\t*if clue_three = 3\n\t\t\t\tYou smile politely and open the driver's side door, bending down to retrieve the knife.\n\n\t\t\t\tThis is real. This is life and death.\n\n\t\t\t\tThis is the piece of trash that killed Aurelia. \n\t\t\t\t*if (loki_saved = 0) and (loki_no = 0)\n\t\t\t\t\tAnd Loki.\n\t\t\t\t\t*goto murderer_mid_murder_car\n\t\t\t\t*else\n\t\t\t\t*label murderer_mid_murder_car\n\n\t\t\t\tAs you straighten, holding the knife by your leg, Eric gets into his side and sits there waiting for you. Walking around the car feels like wading through quicksand. Everything is slow, and hard, and your heart feels like it's swelling up ready to explode.\n\n\t\t\t\tYou're distracted for a moment by the patchy grass under your feet. Each strand is so bright and perfect, traced with filigree lines any jeweller would envy. Even the dirt is a million tiny particles, each one perfectly formed and full of a kingdom of microscopic detail.\n\n\t\t\t\tThen you're at Eric's door, and he turns to face you.\n\t\t\t\t*choice\n\t\t\t\t\t#This is your chance. Kill him.\n\t\t\t\t\t\t*set murderer 1\n\t\t\t\t\t\t*label kill_car\n\t\t\t\t\t\tThe knife feels as heavy as life and death. A wave of excitement washes through you, hitting as hard as a gut-punch except it's delicious. You've never felt mightier.\n\n\t\t\t\t\t\tSpeed and force. That's what matters.\n\t\t\t\t\t\t*if fitness > 20\n\n\t\t\t\t\t\t\tThat, and a big knife.\n\n\t\t\t\t\t\t\tYou grab Eric's hair to keep him steady, and as he yelps in protest you stab him in the neck.\n\n\t\t\t\t\t\t\tWhy mess with a classic move? It might be a cliché, but it sure worked for him. \n\n\t\t\t\t\t\t\tHis blood gushes out, some of it flowing and some of it spraying.\n\t\t\t\t\t\t\t*if (empathetic \u003c 40) or (art > 60)\n\n\t\t\t\t\t\t\t\tExcellent. The spraying is obviously arterial. Just a little more and Eric will most definitely be dead at your hand.\n\n\t\t\t\t\t\t\t\tIt's a little creepy, how easy it is to do. You feel like you've trained for this all your life—and you stab him a second time as he screams, drooling pink froth.\n\n\t\t\t\t\t\t\t\tHe flops around like a fish on a line, thoroughly messing up the inside of your car. Since he can't stop you, you press his fingers around the knife hand where there's a blood-free gap. His fingerprints were probably already there, but it's better to be safe than sorry.\n\n\t\t\t\t\t\t\t\tIt's only been a few seconds, but he's already losing energy. He looks more and more like a rag doll slumped over itself after being tossed into a corner.\n\n\t\t\t\t\t\t\t\tYou've done it. You've killed a man. And it's the greatest rush you've ever felt.\n\n\t\t\t\t\t\t\t\t\"Thank you, Eric,\" you whisper, feeling overcome. \"I could never have done it without you.\"\n\n\t\t\t\t\t\t\t\tHis eyes swivel toward you with a visible effort, and glaze over even as you smile at him one last time.\n\n\t\t\t\t\t\t\t\t\"$!{name}! Eric!\" comes a voice from behind you.\n\n\t\t\t\t\t\t\t\tAh yes. You're not alone in this profoundly intimate moment with your victim. How irritating.\n\n\t\t\t\t\t\t\t\tTime to play the shattered innocent.\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#\"Help! Eric is the killer!\"\n\t\t\t\t\t\t\t\t\t#\"Help! Eric just attacked me!\"\n\t\t\t\t\t\t\t\t\t#\"Help! Eric is dying!\"\n\t\t\t\t\t\t\t\t*achieve murder\n\t\t\t\t\t\t\t\t*label murderer_post_murder\n\t\t\t\t\t\t\t\t*if honest \u003c 30\n\t\t\t\t\t\t\t\t\tYou can remember well enough how you acted when Aurelia was first discovered, so you go through the motions once again, but with trembling hands thrown in for good measure.\n\n\t\t\t\t\t\t\t\t\tIt's immediately clear that Tamsin doesn't believe you, and neither do the police. Luckily, none of them are the ones deciding your fate.\n\n\t\t\t\t\t\t\t\t\tYour adventures provide the media with plenty of fodder over the weeks and months to come, but you stick to your guns, saying, \"Self defence\" over and over again.\n\n\t\t\t\t\t\t\t\t\tLuckily, lying happens to be one of your many talents.\n\n\t\t\t\t\t\t\t\t\tYou star in your own courtroom drama, and the hardest lie is keeping the pleasure from your face. It works, though, and you are set free.\n\n\t\t\t\t\t\t\t\t\tCongratulations. You just got away with murder. There's a noticeable spike in your book sales, too.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*set cash +1000\n\t\t\t\t\t\t\t\t\t*achieve profit\n\t\t\t\t\t\t\t\t\tIt's been quite a year. But you survived. Altogether, you wrote ${word_count} words at the retreat, and you've written twice as much since.\n\t\t\t\t\t\t\t\t\t*if (word_count > 5000)\n\t\t\t\t\t\t\t\t\t\t*achieve words\n\t\t\t\t\t\t\t\t\t\t*goto gogoabkf\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*label gogoabkf\n\t\t\t\t\t\t\t\t\t*if lala_love = 1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tThe beautiful Lala's lie-detecting magic fades with time, and soon you don't even have to twist yourself in knots trying to keep from lying outright. She stays utterly loyal to you throughout the trial and all the days when journalists camp outside your home.\n\n\t\t\t\t\t\t\t\t\t\tWhen it's all over, she's still there. She talks you into visiting Renee often, and you don't comment as you see the rector slowly release her own sense of guilt, and relax.\n\n\t\t\t\t\t\t\t\t\t\tYou know how lucky you are, and you take care to treat Lala well. But deep down, you can't help wishing she wasn't quite so good a person. If only she'd try and kill you, so you could kill her back.\n\n\t\t\t\t\t\t\t\t\t\tIt's getting harder and harder to let her stay alive.\n\t\t\t\t\t\t\t\t\t\t*achieve murder\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tAnd you killed Eric. It's strange, though. All you can think about is how to do it again.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*achieve murder\n\t\t\t\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tIt's easy to remember how you felt when Aurelia died, so you do your best to go through the same motions as before. You can tell Tamsin doesn't believe you, and neither do the police.\n\n\t\t\t\t\t\t\t\t\tThen Lala confronts you, and you can't think of a way to wriggle out of answering her. Her face when you say, \"I didn't murder Eric on purpose\" shows immediately that you've failed. But so what? It's not like she can take her evidence to court.\n\n\t\t\t\t\t\t\t\t\tUnfortunately, all the writers band together with Renee against you. You're smart, but not smarter than all of them together.\n\n\t\t\t\t\t\t\t\t\tThey cooperate with the police, and you know you're done for before you step into a courtroom. It irks you as you see Renee letting go of her own sense of guilt, and placing it all on your shoulders.\n\n\t\t\t\t\t\t\t\t\tYou're sentenced to life in prison.\n\n\t\t\t\t\t\t\t\t\tThe worst part is, Australian law prevents you from making money off a crime, so you can't even get a decent book out of it all.\n\n\t\t\t\t\t\t\t\t\tWho knew being a convicted murderer would be such a drag?\n\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou try to tighten your hands around his neck but it hurts your arms and fingers so much you can't help thinking of how he must be feeling, and it's unbearable.\n\n\t\t\t\t\t\t\tDespite how much you try to keep killing him, your hands loosen. By the time he wriggles out of your grip, it's too late for you.\n\n\t\t\t\t\t\t\t*goto he_kills_you\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set clue_three 4\n\t\t\t\t\t\t\tYou hope the knife is sharp enough that your relatively weak body can destroy Eric. Given that he cut Aurelia's throat you aim for his neck—but you're too slow.\n\n\t\t\t\t\t\t\tHe grabs your hand just as the blade breaks his skin, and the two of you freeze in an awkward tableau with Eric half climbing out of the car and you half climbing in. Then Eric wrenches the knife from your hand.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Hide.\n\t\t\t\t\t\t\t\t\t*goto hide\n\t\t\t\t\t\t\t\t#Run.\n\t\t\t\t\t\t\t\t\tYou break and run, but he's faster than you.\n\n\t\t\t\t\t\t\t\t\t*goto he_kills_you\n\t\t\t\t\t\t\t\t#Beg for mercy\n\t\t\t\t\t\t\t\t\t*goto mercy\n\t\t\t\t\t#Put the knife to his throat and tell him not to move until the police come back.\n\t\t\t\t\t\tThe knife feels as heavy as life and death. You raise it to his throat and wait for him to notice.\n\n\t\t\t\t\t\t\"$!{name}?\" he says, half laughing.\n\n\t\t\t\t\t\tThat small movement pushes his neck against the knife, cutting him. \"What is this?\" he says, no longer laughing—or moving. \"What are you doing?\"\n\n\t\t\t\t\t\t\"Don't move,\" you say, and slowly fish your phone from your pocket to call the police.\n\n\t\t\t\t\t\tHe's not lunging at you, but he's pulled out his own phone and called the house. \"Help,\" he say. \"$!{name} has a knife and ${he} won't let me go.\"\n\n\t\t\t\t\t\tThe others come out all at once—even Bruce—and demand to know what's going on. Eric suggests going inside—and leaving the knife outside. \n\n\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t#Keep the knife hidden, and tell him you know he's the killer.\n
