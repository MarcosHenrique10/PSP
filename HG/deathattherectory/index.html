t\t\t#\"I think we just broke up.\"\n\t\t\t\t\t\"Very well,\" she says stiffly, keeping her gaze on her own clasped hands. \"Thank you for that information.\"\n\n\t\t\t\t\t\"I didn't—I don't—\"\n\n\t\t\t\t\t\"Stop,\" she says. \"Get away from me.\"\n\t\t\t\t\t*goto late\n\t\t\t\t#\"Do you want to break up?\"\n\t\t\t\t\t*goto aw\n*label late\n\nYou run through the events of the evening in your mind: Aurelia has been murdered, most likely by someone in the house with you. And you are a suspect. Your mind whirls to a wild conclusion:\n*choice\n\t#The murderer could easily frame me for this.\n\t\tYou're all stuck in Gundagai like rats in a trap. And one of the rats has already killed one person, with none of the others any the wiser. What else could the murderer do? You have to work out who it is before it's too late!\n\t\t*goto huh\n\t#If I work out who the killer is, I could kill them and claim it was self defence.\n\t\tYou sit up, exhilarated and horrified at the very thought. But it's true: right now, right here you have the ultimate chance to get away with murder. You won't even have to keep it a secret—although you will have to go through court to prove it was self defence. But that would be an interesting writing experience in its own right—as long as you don't end up in prison. You'd have to be absolutely sure you kill the right person.\n\t\t*goto huh\n\t#The murderer could kill me next.\n\t\tYou have to be careful who you trust. Renee can tell when someone is lying, so she can advise you… unless she's the murderer herself.\n*label huh\n\nYou're all too aware that a good writer requires a good editor: someone to tell you when you're missing the obvious, or pursuing a plot that makes no sense. Someone in this house is the perfect confidant and/or sidekick for you… but someone else is a killer.\n\nStill, even using a killer as your sounding board could cause them to spill crucial information that you can then use against them.\n*choice\n\t#I'll use Renee as my sounding board.\n\t\t*set renee %+10\n\t\t*set confidant 2\n\t\t*goto renee_path\n\t#I'll talk to Lala about all this. I heard her snoring before the murder happened.\n\t\t*set lala %+10\n\t\t*set confidant 1\n\t\t*goto lala_path\n\t#No. I don't trust anyone right now.\n\t\t*goto nobody_path\n*label renee_path\nYou knock on Renee's door and she lets you in. There are fresh tears on her cheek, and her knees have carpet burn from kneeling.\n\n\"Let's figure this out together,\" you say. \"I want to know who killed Aurelia.\"\n\n\"Don't you think the police will sort it out?\" she says. \n\n\"What harm can it do to put our heads together?\" you say. \"Maybe we'll be the observant amateurs who crack the case.\"\n\n\"Oh, you writers,\" she sighs—but she looks a little brighter.\n*fake_choice\n\t#\"You're smiling. You want to do this, don't you?\"\n\t#\"Us? But look how big and strong and fierce we are.\"\n\t#\"You did invite us here.\"\n\n\"Fine!\" she says at last. \"Let's do this. But we don't confront anybody. I don't want to get hurt.\"\n\n\"That's it?\" you say. \"That's your one condition?\"\n\nShe stands up, looking thoroughly galvanised. \"I can't believe this is happening.\"\n\nIt's not at all clear if you should agree or disagree, so instead you suggest having a hot drink and then making a strategy.\n\nRenee serves you, and then takes you back into her office and closes the door. It's an incredibly small space for her to live and work.\n\n\"What do you think we should do first?\" she asks.\n*choice\n\t#\"Figure out how Aurelia died.\"\n\t\tRenee digs her fingers into the bed. \"We already know. She was stabbed—a lot.\"\n\n\t\t\"But why didn't we hear anything?\" you ask. \"Could she have been that badly incapacitated from just a few glasses of wine?\"\n\n\t\t\"No!\" Renee says, but she sounds pleased. \"$!{name}, you're a genius!\"\n\n\t\t\"I am?\"\n\t\t*goto wine_r\n\t#\"Do you know who the police were most interested in?\"\n\t\t\"I saw Keichi take the recycling bin,\" says Renee.\n\n\t\t\"Is that evidence?\" you ask. \"There's nothing in there but a cracker box and the two wine bottles we drank from last night.\"\n\t\t*goto wine_r\n\t#\"We need to talk about this house, and about… well, magic.\"\n\t\t\"Agreed,\" says Renee. \"Magic. How about you go first?\"\n\t\t*if talking_walls = 1\n\t\t\t\"The house has been talking to me, but it didn't tell me about Aurelia. Do you think it knows?\"\n\n\t\t\t\"I have no idea. Do you want to ask it?\"\n\n\t\t\t\"Absolutely.\" You place your hand on the wood of the nearest door frame. \"Excuse me… er, house? Who killed Aurelia?\"\n\n\t\t\tNothing happens.\n\n\t\t\t\"Useless,\" you mutter. \"Any other ideas?\"\n\t\t\t*goto wine_r\n\t\t*if talking_cat = 1\n\t\t\t\"Loki has been talking to me, but he didn't tell me about Aurelia. Do you think he knows who killed her?\"\n\n\t\t\t\"I have no idea,\" she says. \"Just a moment and I'll fetch him.\"\n\n\t\t\tShe goes to his food and shake out more food with a clatter.\n\n\t\t\tHe zips out from under the couch, gives the food a sniff, and then races outside.\n\n\t\t\t\"Loki!\" she says.\n\n\t\t\tBut he's gone.\n\n\t\t\t\"Useless,\" you mutter. \"Any other ideas?\"\n\t\t\t*goto wine_r\n\t\t*if love_lines = 1\n\t\t\t\"I can tell who's attracted to whom,\" you say. \n\n\t\t\t\"Did someone fall for Aurelia?\" she asks. \"I imagine you noticed I'm asexual.\"\n\n\t\t\t\"Yes,\" you say. \n\n\t\t\t\"Who else was attracted to Aurelia?\" she asks. \"Is it possible the killer was angry at being rejected?\"\n\n\t\t\tYou close your eyes, picturing the whole group peacefully eating dinner the previous night. \"Yes. Bruce. Bruce was attracted to her.\"\n\n\t\t\t\"He doesn't strike me as someone who would have spoken to her openly yet,\" says Renee.\n\n\t\t\t\"Useless,\" you mutter. \"Any other ideas?\"\n\t\t\t*goto wine_r\n\t\t*if lie_detector = 1\n\t\t\t\"I'm a human lie detector,\" you say. \"I think.\"\n\n\t\t\t\"Me too,\" she says. \"Between the two of us, tShe sighs. \"Maybe Aurealia had the red. Or maybe the murderer only poisoned her glass.\"\n\t\t\t*goto post_test_r\n\t\t*else\n\t\t\t\"I didn't drink anything alcoholic.\"\n\n\t\t\t\"I had the red,\" she says, and suddenly smiles. \"I felt terrible this morning! I think I was poisoned too.\"\n\t\t\t*goto post_test_r\n\t#Focus on remembering who served the wine.\n\t\t*if (observation > 30) and (killer = 1)\n\t\t\tIt's not easy to remember details of your first night at the rectory, but after a minute you remember Max and Eric passing a glass to the person next to you. \n\n\t\t\t\"It was either Max or Eric,\" you say aloud. \"They served the wine.\"\n\n\t\t\tRenee nods. \"So if the wine was poisoned at the last minute, it was one of them.\"\n\t\t\t*goto post_test_r\n\t\t*elseif (observation > 30) and (killer = 2)\n\t\t\tIt's not easy to remember details of your first night at the rectory, but after a minute you remember Max passing a glass to the person next to you. And Eric pouring someone else's wine. \n\n\t\t\t\"It was Max and Eric,\" you say aloud. \"They served the wine together.\"\n\n\t\t\tRenee nods. \"Of course, Max was one of the first guests to arrive—along with you and Lala—so he's a suspect either way. As am I, for any number of reasons. And Eric is often here.\"\n\t\t\t*goto post_test_r\n\t\t*else\n\t\t\tIt's not easy to remember details of your first night at the rectory. You try to focus, but it's impossible.\n\n\t\t\t\"I've got no idea who served the wine,\" you admit at last.\n\t\t\t*if killer = 1\n\t\t\t\t\"I did,\" says Renee. \"But I imagine I'm a suspect either way.\"\n\t\t\t\t*goto post_test_r\n\t\t\t*else\n\t\t\t\t*goto post_test_r\n\t#Focus on remembering who had access to the wine during the day.\n\t\t*set knowledge %+10\n\t\t\"Of course you could have poisoned the wine at your leisure,\" you say. \"And Eric could have, since he's a local. Bruce and Tamsin could easily hide poison or weapons in their cars, since the garage is locked. And Lala and I and Max were the first to arrive so we all had plenty of time to poison the wine before the others arrived.\"\n\t\t*goto post_test_r\n\t#Focus on remembering what Aurelia drank.\n\t\t*if observation > 30\n\t\t\tIt's not easy to remember details of your first night at the rectory, but after a minute you remember Aurelia saying something about vampires as she drank her wine. Red wine.\n\n\t\t\t\"Aurelia drank the red wine,\" you say with confidence.\n\n\t\t\t\"So did I,\" says Renee, and suddenly smiles. \"I felt terrible this morning! I think I was poisoned too.\"\n\n\t\t\t*goto post_test_r\n\t\t*else\n\t\t\tIt's not easy to remember details of your first night at the rectory, and after a minute you have to admit you're simply not observant enough.\n*label post_test_r\n\nYou both pause for a moment, trying to fit the pieces together and failing utterly.\n\n\"Motive, means, opportunity,\" she says, and blushes. \"I read a lot of whodunnits. The means is clear: poisoned wine and a blade. Anyone in this house could have had an opportunity to get to her once the wine took effect, whether they knew about the poison or not. So that doesn't help us at all. Except, presumably, they weren't poisoned themself. And we'll need to think about where they got the knife, and where it is now. But what about motive? Why would anyone want to kill Aurelia? Or was it simply a matter of poisoning some of the wine and seeing who passed out first?\"\n*choice\n\t#\"Could it have been an act of jealousy? She was attractive enough.\"\n\t\t*set observation %+10\n\t\tRenee shrugs. \"Lots of people are attractive.\"\n\n\t\t\"Even so. She might have rejected someone's advances, or simply caused a sick mind to take offence.\"\n\n\t\t*if love_lines = 1\n\t\t\t\"You only mentioned Bruce being attracted to her.\"\n\n\t\t\t\"Oh! Yeah. Max is attracted to pretty much everyone.\"\n\n\t\t\t\"Pretty much?\" she says with a grin.\n\n\t\t\t\"Yes, including you. But not Eric.\"\n\t\t\t*goto pre_flail_r d failing utterly.\n\n\"Motive, means, opportunity,\" she says. \"The means is clear: poisoned wine and a blade. Anyone in this house could have had an opportunity to get to her once the wine took effect, whether they knew about the poison or not. So that doesn't help us at all. Except, presumably, they weren't poisoned themself. And we'll need to think about where they got the knife, and where it is now. But what about motive? Why would anyone want to kill Aurelia? Or was it simply a matter of poisoning some of the wine and seeing who passed out first?\"\n*choice\n\t#\"Could it have been an act of jealousy? She was attractive enough.\"\n\t\t*set observation %+10\n\t\tLala flicks her fingers dismissively. \"Lots of people are attractive.\"\n\n\t\t\"Even so. She might have rejected someone's advances, or simply caused a sick mind to take offence.\"\n\t\t*if love_lines = 1\n\t\t\t\"You only mentioned Bruce being attracted to her.\"\n\n\t\t\t\"Oh! Yeah. Max is attracted to pretty much everyone.\"\n\n\t\t\t\"Pretty much?\" she says, and you're so glad to see her cheekiness again you could cry.\n\n\t\t\t\"Yes, including you. But not Eric.\"\n\t\t\t*goto pre_flail\n\t\t*else\n\t\t*label pre_flail\n\t\t\"All right,\" she says. \"Now we're getting somewhere. There's also professional jealousy, of course, but I gather Aurelia hasn't even finished a novel yet.\"\n\t\t*goto flail\n\t#\"We need to know more about Aurelia.\"\n\t\t*set knowledge %+10\n\t\t\"I agree!\" says Lala. \"We all had each other's full names, pictures, and even addresses before we left Canberra.\"\n\n\t\t\"Hold on,\" you say. \"Aurelia had me pick her up from her work. I wonder why.\"\n\n\t\t\"Maybe she lives in a den of iniquity,\" Lala says wth naked longing.\n\n\t\t\"Or a mansion.\"\n\n\t\t\"Or a box.\"\n\n\t\tYou turn on your computer at once, and try to do an image search based on her photo. Of course the internet doesn't help. Not one bit. Of the few images that actually come up, none look anything like Aurelia.\n\n\t\tLala groans in frustration. \"This fits, though, with the idea that someone brought poison with them. If they googled her back in the internet-having world, they might have found some terrible secret and then prepared their poison.\"\n\n\t\t\"Except what horrible secret would be hidden online?\" you say.\n\n\t\t\"It would have to be something that personally connected her to someone here,\" Lala says thoughtfully. \"Probably me or Max, since we're Canberrans.\"\n\n\t\t\"If you're going to volunteer for the suspect list again then so should I,\" you point out. \"I live in Canberra too.\"\n\t\t*goto flail\n\t#\"None of us knew her, so it must be more about the killing experience than the victim.\"\n\t\t*set imagination %+10\n\t\t\"What could motivate someone to kill a random victim?\" Lala asks.\n\n\t\t\"Incels,\" you both say at the same time.\n\n\t\t\"Yes,\" says Lala. \"Someone who has truly fallen into the belief that women owe them sexual favours, and are deliberately destroying their life. If you fall deep enough into that hole… there's no end to it.\"\n\n\t\t\"And Aurelia was beautiful,\" you add.\n\n\t\t\"And small,\" says Lala. \"Not too threatening for a coward.\"\n*label flail\n\nYou look at one another, saddened all over again that Aurelia is gone. And that one of your group killed her.\n*goto last_bit\n*label nobody_path\nYou go to the rear balcony. Lala is there, as if the possibility of company comforts her. \n*gosub lala_cash\n\nThe boys are nowhere to be seen, but you can hear the floor creaking in Renee's room.\n*fake_choice\n\t#Perhaps Renee is pacing because she's guilty.\n\t\t*set renee %-10\n\t#It's odd that Max isn't socialising. Could he be the killer?\n\t\t*set max %-10\n\t#Why doesn't Eric just go home?\n\t\t*set eric %-10\nFrustrated at all the suspicions crowding your mind, you retreat to your room to try and think clearly.\n*choice\n\t#Figure out how Aurelia died.\n\t\tIt's clear Aurelia was killed, but why didn't she scream for help? Even a moderately-vigorous struggle would have been clearly audible from your room.\n\t\t*goto wine_n\n\t#Think about who the police were most interested in.\n\t\tThey weren't exactly communicative.\n\n\t\tYou see a bottle cap in the hall, and notice the recycling bin is missing. The police—or the murderer—must have taken it. Or perhaps Renee was simply tidying up, and forgot to bring it back in.\n\t\t*goto wine_n\n\t#TIme to think about magic.\n\t\t*if talking_walls = 1\n\t\t\tThe house has been talking to you, but it didn't tell you about Aurelia. Is it because you didn't ask?\n\n\t\t\tYou place your hand on the wood of the nearest door frame. \"Excuse me… er, house? Who killed Aurelia?\"\n\n\t\t\tNothing happens.\n\n\t\t\t\"Useless,\" you mutter. \n\t\t\t*goto wine_n\n\t\t*if talking_cat = 1\n\t\t\tLoki has been talking to you, but he didn't tell you about Aurelia. Could he know who killed her?\n\n\t\t\tYou go to his food and shake out more food with a clatter.\n\n\t\t\tHe zips out from under the couch, gives the food a sniff, and then races outside.\n\n\t\t\t\"Loki!\" you call after him.\n\n\t\t\tBut he's gone.\n\n\t\t\t\"Useless,\" you mutter. \n\t\t\t*goto wine_n\n\t\t*if love_lines = 1\n\t\t\tYou can tell who's attracted to whom, thanks to the glowing lines between people. Renee isn't attracted to anyone, but Max and Bruce were both attracted to Aurelia.\n\n\t\t\tIs it possible the killer was angry at being rejected?\n\n\t\t\tMax flirts so hard he must be used to rejection, and Bruce is too shy to have made a move so soon.\n\n\t\t\t\"Useless,\" you mutter. \n\t\t\t*goto wine_n\n\t\t*if lie_detector = 1\n\t\t\tYou're a human lie detector. If you can question the killer directly, you can confirm your suspicions. Except you don't have any suspicions yet.\n\n\t\t\t\"Useless,\" you mutter.\n*label wine_n\n\nYou have a flash of insight. The wine must have been poisoned!\n\nDoes that mean someone brought wine with them? Is it hard to poison wine?\n*choice\n\t#Could there be poisonous plants in the garden?\n\t\tYou go to the hall, and see several gardening books in the non-fiction section. There are sure to be poisonous plants around, and Renee is sure to know what they are.\n\t\t*goto poison_n\n\t#Who would know how to make a poison?\n\t\tTamsin or Bruce write history and fantasy. Any herbalist research would be handy for learning a bit of obscure and murderous know-how. And of course Lala would know plenty about poison. And stabbing. And… well, she's a crime writer. They're always full of disturbing facts.\n\t\t*goto poison_n\n\t#Renee or Eric are the locals. They'd know how and where to acquire poison.\n\t\tOf course, Lala is also a crime writer. She's know a hundred different ways to murder someone.\n*label poison_n\n\nYou sigh in frustration.\n\nDo you remember if Aurelia had red or white wine last night?\n*choice\n\t#What did you drink, and did it have an unusual effect on you?\n\t\t*if wine = 1\n\t\t\tYou had red wine, and you did feel pretty woozy in the morning.\n\n\t\t\tYou were poisoned too!\n\t\t\t*goto post_test_n\n\t\t*elseif wine = 2\n\t\t\tYou had a rather sweet chardonnay, and a perfectly normal morning headache afterwards.\n\t\t\t*goto post_test_n\n\t\t*else\n\t\t\tYou didn't drink anything alcoholic, so that's no use.\n\t\t\t*goto post_test_n\n\t#Focus on remembering who served the wine.\n\t\t*if (observation > 30) and (killer = 1)\n\t\t\tIt's not easy to remember details of your first night at the rectory, but after a minute you remember Renee passing a glass to the person next to you. \n\n\t\t\tOf course she served the wine. It's her house.\n\t\t\t*goto post_test_n\n\t\t*elseif (observation > 30) and (killer = 2)\n\t\t\tIt's not easy to remember details of your first night at the rectory, but after a minute you remember Max passing a glass to the person next to you. \n\n\t\t\tOf course he served the wine. He's a flirty drunk. Of course, he's flirty sober too.\n\t\t\t*goto post_test_n\n\t\t*else\n\t\t\tIt's not easy to remember details of your first night at the rectory. You try to focus, but it's impossible.\n\t\t\t*goto post_test_n\n\t#Focus on remembering who had access to the wine during the day.\n\t\t*set knowledge %+10\n\t\tOf course Renee could have poisoned the wine at her leisure. And so could Eric, since he's a local. Bruce and Tamsin could easily hide poison or weapons in their cars, since the garage is locked. And Lala and you and Max were the first to arrive so you all had plenty of time to poison the wine before the others arrived.\n\t\t*goto post_test_n\n\t#Focus on remembering what Aurelia drank.\n\t\t*if observation > 30\n\t\t\tIt's not easy to remember details of your first night at the rectory, but after a minute you remember Aurelia saying something about vampires as she drank her wine. Red wine.\n\t\t\t*goto post_test_n\n\t\t*else\n\t\t\tIt's not easy to remember details of your first night at the rectory, and after a minute you have to admit you're simply not observant enough.\n*label post_test_n\n\nYou pause for a moment, trying to fit the pieces together and failing utterly.\n\n\"Motive, means, opportunity,\" she recites, remembering every B-grade crime show ever. The means is clear: poisoned wine and a blade. Anyone in the house could have had an opportunity to get to her once the wine took effect, whether they knew about the poison or not. So that doesn't help you at all. Except, presumably, they weren't poisoned themself. And you'll need to think about where they got the knife, and where it is now. \n\nBut what about motive? Why would anyone want to kill Aurelia? Or was it simply a matter of poisoning some of the wine and seeing who passed out first?\n*choice\n\t#Was it an act of jealousy? She was attractive enough.\n\t\t*set observation %+10\n\t\tLots of people are attractive. Even so, she might have rejected someone's advances, or simply caused a sick mind to take offence.\n\n\t\tThere's also the possibility of professional jealousy, of course, but as far as you know Aurelia hasn't even finished a novel yet.\n\t\t*goto flail_n\n\t#You need to know more about Aurelia.\n\t\t*set knowledge %+10\n\t\tYou attempt to google her, but almost nothing comes up—and not just because the internet is slower than drying paint. She must have taken care to have a very low social media profile. That's odd, for a writer.\n\t\t*goto flail_n\n\t#Perhaps it was more to do with the killing experience than the victim.\n\t\t*set imagination %+10\n\t\tWhat could motivate someone to kill a random victim? The answer shakes you to the core. Writers, of course, sometimes get a little too close to their art. Is one of your fellow writers that desperate for a novel experience?\n*label flail_n\n\nYou're saddened all over again that Aurelia is gone. And that one of your group killed her.\n\n*label last_bit\n*page_break\nIt's not long until Renee calls a meeting, holding it in the small back yard so everyone can stand in a circle rather than in a line like in the rear balcony. Bruce hovers in the laundry doorway, too photosensitive to stand in the sun.\n\n\"Aurelia Katz did not deserve to be killed,\" says Renee. \"None of us deserve to go through any of this either. But I believe it's better to talk and include one another, and to ease our grief and anger and horror that way.\"\n\n\"Thank you,\" says Lala, and embraces her at once.\n\n\"As far as I know, none of us met Aurelia before coming here,\" Renee goes on. \"If you knew Aurelia, please let the rest of us know now. It could make a difference to our safety.\"\n*choice\n\t#Mention the café.\n\t\t\"I think I accidentally tripped her one time,\" you blurt out.\n\n\t\tThe others stare at you with expressions ranging from wariness to confusion.\n\n\t\t\"She worked at a café where I go to write,\" you explain. \"I'm not 100% sure, but I think our paths crossed. Maybe? If it was even her, I doubt she remembered me. She never mentioned it.\"\n\t\t*goto ren\n\t#Remain silent.\n\t\tIt's true that you went to Tilley's Devine café often enough that your paths probably crossed more than once, but surely that's not what Renee means. You didn't even know her name. It's not like you were a stalker who followed her from Tilley's to Gundagai.\n\n\t\tAs soon as the thought occurs to you, you're convinced that must be what the police think.\n\t\t*goto ren\n\t#Watch the other Canberrans.\n\t\tLala is looking around the circle hopefully. Of course she wants a lead for your investigation. Dead people always get their secrets exposed, and presumably Aurelia had something.\n\n\t\tIt seems a shame to dredge up whatever lies in her past, relevant or otherwise.\n\n\t\tThen your eyes land on Max, and he looks wrong. \n\n\t\tHe isn't flirting with anyone. That's probably what it is.\n*label ren\n\n\"There's something I know about Aurelia, that I kept from you,\" Renee says slowly. \"It may or may not help any of us, but when I'm not sure what to do I always choose honesty. 'Truth will set you free', and all that.\n\n\"Aurelia Katz did not exist. As part of her application process, Aurelia—that is, Annaliese, informed me that she is in fact Annaliese Raymen.\"\n\nYou can feel your jaw drop. \n\n\"I believe the name is familiar to you all,\" says Renee.\n\n\"Not me,\" says Lala. \"Who is she?\"\n*choice\n\t#Let someone else explain.\n\t\tMax blurts out the story: Annaliese Raymen is not a horror writer. She writes romance. Very, very well. \n\n\t\tYou've seen two of her movies. They're a little formulaic, perhaps, but the characters are compelling enough that you care deeply what happens to them. She's not like other writers, struggling to get published and struggling to get by. She's the Australian JK Rowling; a household name whose every tweet is treasured.\n\t\t*goto rowling\n\t#\"Rich! Apart from anything else.\"\n\t\t\"Some kind of local film star?\" Lala guesses.\n\n\t\t\"She's in movies, yes,\" you say. \"Just cameos, though, for fun. Because she writes novels. The kind that's so popular they get turned into movies.\"\n\n\t\tLala frowns in confusion. \"Is horror such a popular genre?\"\n\n\t\t\"On the contrary,\" you say. \"She's known for her romance. I suppose she was reinventing herself or something. As Aurelia Katz.\"\n\t\t*goto rowling\n\t#\"The highest-earning writer in the Southern Hemisphere.\"\n\t\t\"Oh,\" says Lala. \"Is horror very popular here?\"\n\n\t\t\"Not particularly,\" you say. \"But she didn't write horror. She wrote romance.\"\n\n\t\t\"Until recently,\" says Renee gently. \"She wanted to try something new.\"\n*label rowling\n\n\"I can't believe I went on a road trip with Annaliese Raymen!\" you say, feeling like you've been doused in cold water—but pleasantly so.\n\nIt hurts to remember all over again that she's dead. She seemed so normal and down to Earth. But you suppose she wasn't always fabulously rich and famous.\n\n\"Blonde,\" you say aloud. \"Her black hair was so iconic that all she had to do was change the colour and none of us recognised her.\"\n\n\"Indeed,\" says Renee. \"I wouldn't have recognised her myself if she hadn't told me the truth in advance.\"\n*choice\n\t#\"Why didn't she tell the rest of us?\"\n\t\tRenee clears her throat awkwardly. \"She told me that she's found from experience that her fame is too big a secret to keep, even for her closest friends. I deferred to her experience. Apart from anything else, I did not expect having paparazzi camped on the grounds would be conducive to your writing efforts.\"\n\t\t*goto hmm\n\t#\"Did she pay you extra?\"\n\t\t\"No!\" she says. \"Well… she did make a donation to the building restoration fund. We can fix the hall and start using it again thanks to her.\"\n\n\t\t\"And thanks to your willingness to take a bribe,\" Bruce points out.\n\n\t\t\"Hey!\" says Lala. \"It was just a donation.\"\n\n\t\tRenee raises her hands in a placatory gesture. \"Yes. I accepted her donation, and let her into the program despite the risk of interruption to all of you.\"\n\t\t*goto hmm\n\t#\"Did you tell the police?\"\n\t\t\"Of course,\" she says. \"As soon as the opportunity presented itself.\"\n\n\t\t\"That explains why they were so interested in who knew her before coming here,\" says Bruce. \n\n\t\t\"Indeed,\" says Renee.\n*label hmm\n\n\"That's fascinating,\" says Lala, \"but why would her career make a difference to any of us?\"\n\nEveryone stares at her a moment. \n\n\"Aren't you sweet?\" says Max. \n\n\"Aurelia had no enemies, and was at the very beginning of her career,\" says Renee. \"Annaliese was a different matter. She could have been killed for her money, by a crazed fan, or for simple professional jealousy.\"\n\n\"You mean us,\" said Bruce flatly. \"You think one of us killed her.\"\n*choice\n\t#\"How dare you!\"\n\t\t\"I'm sorry,\" says Renee. \"Like I said, I'm not sure if I should have told you.\"\n\t\t*goto hotels\n\t#\"So what do we do now?\"\n\t\t\"There's little we can do except wait for the police to solve this,\" say Renee.\n\t\t*goto hotels\n\t#\"You had just as much opportunity as any of us.\"\n\t\t\"That's true,\" Renee says evenly.\n*label hotels\n\nShe draws a deep breath. \"Gundagai has several small hotels just down the road. I'm aware you're not allowed to leave town, but I won't blame any of you for going there, and of course I'll pay for the rooms.\"\n\nYou look around the circle, wondering if sharing the company of five innocent people going through the same experience as you is worth braving the company of Aurelia's killer.\n\n\"I'm staying,\" says Bruce.\n\nThe mood changes at once. If Bruce is willing to stay, no one is willing to go. You're not 100% sure if people are staying for company, or to avoid the appearance of guilt. Either way, you're stuck with one another. \n\n\"I'm not finished,\" says Renee. She smooths down her skirt while everyone else waits for further revelations.\n\nAt last she looks up. \"I didn't kill Aurelia—and yes, I plan to continue calling her that. But I may be responsible for her death.\"\n*fake_choice\n\t#\"We're all blaming ourselves, Renee. The only responsible person is the murderer.\"\n\t#\"How?\"\n\t#\"Because you kept her secret?\"\n\nShe bites her lip. \"$!{name} and I have already spoken about this, a little. This house. It's more than any ordinary house. I believe it contains, for want of a better word, magic.\"\n\nShe pauses, looking around the circle. Bruce looks suspicious, but most of the circle looks more relieved than shocked. \n\nLala's eyes are wide with delight. \"So I'm not imagining things? I really can tell when people are lying? Is that true, $!{name}?\"\n*set lalamagic true\n*fake_choice\n\t#\"Don't drag me into this.\"\n\t\t*set renee %-10\n\t#\"It's true.\"\n\t#\"Do you think the house made someone kill Aurelia?\"\n\nRenee raises her hands for silence. \"I think there are several different forms of magic, that choose to… enliven, shall we say… different people in different ways. None of the forms are weaker or stronger, or good or evil. Except…\"\n\nYou're surprised to see her eyes fill with tears, and she never finishes the sentence.\n\n\"I've spoken to one or two brave souls about their experiences,\" she says. \"Most seem to be some kind of connection, whether to the house, to Loki, or insights into people. Others seem to know something bad is going to happen before it occurs.\"\n\nLala gasps.\n\nRenee gives her a weak smile. \"But… Oh, it's hard to say aloud.\"\n\n\"What is it?\" Bruce growls.\n\n\"Aurelia isn't the first person to die here,\" Renee chokes out.\n\n\"It's a very old house,\" says Tamsin. \"It's not surprising that someone else died here.\"\n\n\"No,\" says Renee. \"I mean, Aurelia isn't the first person to be murdered here. During a writing retreat.\"\n*choice\n\t#\"When exactly?\"\n\t\t\"Three years ago,\" says Renee. \"Almost to the day.\"\n\t\t*goto gnarl\n\t#\"How exactly?\"\n\t\t\"Gunshot,\" says Renee.\n\t\t*goto gnarl\n\t#\"Who killed the other one?\"\n\t\t\"One of the other writers,\" says Renee.\n*label gnarl\n\n\"Do you think it's because of the house?\" Max asks.\n\n\"I don't know,\" says Renee, \"but now there are two people dead in one house—one very unusual house, that defies scientific understanding.\"\n\n\"Does the house make you kill people?\"\n\n\"No,\" says Renee. \"I don't—I didn't—think that was how it worked.\"\n\n\"Until Aurelia,\" you say.\n\n\"Until Aurelia,\" she agrees.\n\n\"Does anyone else feel like killing folks?\" you ask.\n\nThere is a chorus line of shaking heads and denial.\n*choice\n\t#\"Renee, what was the motive last time?\"\n\t\t\"It was a married couple,\" she says.\n\n\t\t\"Married writers?\" you ask.\n\n\t\t\"Yeah,\" she says. \"It did seem like a tricky proposition. Turns out it was.\"\n\t\t*goto tricky\n\t#\"The magic of the house doesn't seem that strong.\"\n\t\t\"Just wait,\" says Renee. \"I don't think it's fully developed yet.\"\n\n\t\t\"There's more?\" you say faintly.\n\n\t\tShe gives you a sympathetic look.\n\t\t*goto tricky\n\t#\"This is too much.\"\n\t\t\"I agree,\" says Renee. You can tell she feels the urge to simply sit on the grass and cry.\n\n\t\t\"Please… if one of you is really the murderer, please just tell us. Make this stop.\"\n*label tricky\n\n\"Are we quite finished?\" Bruce says.\n\nShe smiles at him as if he's paid her a grand compliment. \"Nearly. You see, there's something I can do. Something magical. I can tell when someone's lying. So I'd like each one of you to look me in the eye and tell me if you killed Aurelia.\"\n\nShe turns to her left. \"Bruce?\"\n\n\"Any special reasoon you chose me first?\" he asks.\n\n\"You're on my left,\" she says mildly. \"In a full sentence, please: 'I did not kill Aurelia.'\"\n\n\"I did not kill Aurelia,\" he says. \"Can I go now?\"\n*page_break\n\"You're telling the truth,\" she says. \"But I'd rather you stayed.\" \n\nShe glances at the rest of the circle, and Bruce's eyes widen. No wonder she chose to have everyone together for this little chat.\n\nNext is Max, then Eric, then Lala, then Tamsin.\n\nSuddenly everyone is staring at you as if your hands are full of tarantulas.\n\n\"I didn't kill Aurelia!\" you say.\n\nAttention swerves to Renee.\n\n\"That's the truth,\" she says, \"which means it wasn't one of us after all!\"\n*choice\n\t#\"No one has tested you, Renee.\"\n\t\t*if lie_detector = 1\n\t\t\t\"But you can,\" she says, facing you squarely. \"I didn't kill Aurelia.\"\n\n\t\t\tThere's no flash of gold in her eyes. \n\n\t\t\t\"She's telling the truth,\" you say.\n\t\t\t*goto kilo\n\t\t*else\n\t\t\t\"Does anyone else have the same magic?\" she asks. \"If someone tells a lie, their eyes turn yellow.\"\n\n\t\t\t\"I do,\" says Lala. \"Tell me.\"\n\n\t\t\tRenee faces her. \"I didn't kill Aurelia.\"\n\n\t\t\t\"She's clear,\" says Lala. \"Unless I'm lying, or the magic isn't reliable.\"\n\t\t\t*goto kilo\n\t#\"Is the magic so reliable?\"\n\t\t\"I think so,\" says Renee. \"Yes. It has to be.\"\n\n\t\t\"If you say so,\" says Bruce.\n\n\t\t\"I liked you better when you were being the strong, silent type,\" Max says to him.\n\t\t*goto kilo\n\t#\"What a relief!\"\n\t\t\"Yes,\" says Renee. \"But I never truly thought it was any of you.\"\n\n\t\t\"She's telling the truth too,\" says Lala. \"I have the same thing—I know when someone is lying.\"\n\n\t\t\"Excellent,\" says Renee. \"I should say it too: I didn't kill Aurelia.\"\n\n\t\t\"No,\" says Lala with a smile. \"You didn't.\"\n*label kilo\n\nYou return to your room, unable to believe that this day isn't over. When you sit on your bed it moves, and you jump up with a yelp.\n\nRenee comes rushing in, brandishing a tall candlestick that stinks of polish. \"Leave ${him} alone!\"\n\nLoki pokes his head out from under your bedcovers and meows a protest.\n\n\"What happened?\" asks Renee, keeping her hold on the candlestick.\n\n\"I sat on Loki,\" you admit.\n\nShe sags against the door frame just as Eric and Max attempt to barge through it. The three of them flail wildly and fall over. \n\nOnce they've finished apologising and they're all on their feet, you confess that you were frightened by the cat.\n\n\"We're all a little jumpy,\" says Renee. \n*fake_choice\n\t#\"Yeah. Well… goodnight, everyone.\"\n\t#\"If anyone comes to murder me, I'll say, 'Help! Murderer!'\"\n\t#\"I'll sit more carefully in future.\"\nIn a few minutes you're alone again, except for Loki. He graciously accepts your apology in the form of a great deal of head-to-tail patting. You lie down awkwardly, careful not to disturb him again. Naturally, he's in the exact middle of the bed.\n\n*if talking_walls = 1\n\t\"Are you there, house?\" you say. \"Are you feeling talkative?\"\n\n\t\"I never left,\" says that strange, heavy voice.\n\n\tYou sit up in bed so abruptly your stomach muscles hurt.\n\n\t\"Who killed Aurelia?\" you ask, suddenly breathless.\n\n\t\"I don't know.\"\n\n\t\"Didn't you see?\"\n\n\t\"I see stories. This story is not yet finished.\"\n\n\t\"Aurelia would probably disagree with that,\" you mutter.\n\t*finish Day Three\n*if talking_cat = 1\n\t\"Loki?\" you say. \"You can talk, can't you?\"\n\n\tHe twists to lick his shoulder. \"Can you listen?\"\n\n\t\"You want me silent?\" you say. \"All right. I'm listening.\"\n\n\tHe continues to wash himself; paws and tail and back and face and paws again. Then he falls asleep.\n\n\t\"Seriously?\" you mutter.\n\t*finish Day Three\n*if lie_detector = 1\n\tEvery single person in the house has been tested. No one killed Aurelia. Or perhaps this magic isn't as reliable as Renee thinks it is. \n\n\t\"Ah, Loki,\" you say. \"What are we going to do?\"\n\n\tHe washes himself; paws and tail and back and face and paws again. Then he falls asleep.\n\n\tYou sigh. Well, magic and cats are not generally considered useful in murder investigations. You'll have to use your brain.\n\t*finish Day Three\n*if love_lines = 1\n\tYour magic is utterly useless. It doesn't even show who loves who, but merely who is attraced to whom. And so what? None of you have known one another long enough to fall in love.\n\n\tSure, Max and Bruce were attracted to Aurelia. That doesn't mean either of them killed her. Surely no one could have become so obsessed in half a day to kill.\n\n\tOn the other hand, any murderer is unbalanced by definition.\n\n\tUgh, this is useless.\n\n\tYou get up and place your hands on the wall closest to the room that belonged to Aurelia. \n\n\t\"I'm sorry,\" you whisper. \"I don't know how to figure out what happened to you. As far as I can tell, magic has nothing to do with it. I know so little and so much about you. Your movies are so good and so real, but when I met you I didn't even know who you were. Did anyone really know you?\"\n\t*finish Day Three\n*label lala_cash\nShe clutches her stomach, as if in pain.\n\n\"Lala, what's wrong?\" you ask.\n\n\"Just my period,\" she says. \"I forgot to bring painkillers. But it's no big deal, don't worry.\"\n\n\"I'm going to get you some right now,\" you say.\n\nShe winces, and then nods. \"Yes please. Um, could you get dark chocolate as well? It helps.\"\n\nYou drive the short distance to the shops and come back with period supplies for Lala. She is pathetically grateful.\n*set cash -40\n*return\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2019-10-07 $3.99 $2.99 purchased\n*abort\n*return", "chapter_two_mmm": "*comment -if love_lines, make sure eric is attracted to Aurealia. (and not vice versa coz she's gay)\n*set temp 0\nIt takes you a moment to remember where you are. Then it all comes back: you're in the Anglican Rectory at Gundagai along with six other writers and the rector herself.\n*if wine = 1\n\tYou shuffle out of bed, feeling like you drank a full box of wine rather than a glass. Or was it two? Ugh. If it wasn't for your bladder, you'd turn over and go back to sleep.\n\t*goto writin\n*else\n*label writin\n\nSo far, your novel is \n*if word_count = 3000\n\toff to a good start.\n\t*goto xx\n*if word_count = 5000\n\tgoing really well.\n\t*goto xx\n*if word_count = 7000\n\tgoing spectacularly.\n\t*goto xx\n*else\n\tnonexistant. Maybe you should take advantage of the early-morning quiet.\n\n*label xx\n*if max_love = 1\n\tYou have a feeling Max is going to be very distracting. At the thought of him, your stomach gives a happy somersault. \n\t*goto xi\n*if lala_love = 1\n\tYou have a feeling Lala is going to be very distracting. At the thought of her, your face gets a big dopey smile that you can't stop. But why try?\n*label xi\n\nBreakfast is available at any time of the day or night. You help yourself to some cold cereal, and notice there are two bowls already used and placed on the kitchen bench. Lala's light is on, so perhaps she's praying. Or writing. Muffled strains of music can be heard from beneath Renee's door. \n\nGiven the weirdness of the previous day, you go to Renee's door to talk and then hesitate, wondering how to begin. Just as you chicken out, the door opens.\n\n\"I've seen that look before,\" says Renee. \"What happened?\"\n\n*if talking_walls = 1\n\t\"Uh… I think the house talked to me.\"\n\n\t\"Which house? This house?\"\n\t*choice\n\t\t#\"Maybe your wine was stronger than I thought.\"\n\t\t\t*set mental_health %-10\n\t\t\t\"Maybe,\" she says, but she doesn't let it end there. \n\t\t\t*label house\n\t\t\t\"This house… it has a strange effect on people sometimes. Particularly writers. I've noticed it for a while now, and in any case in my profession it's foolish to dismiss something as impossible. There's a lot we don't understand about the universe.\"\n\n\t\t\t\"Really? You really think your house talked to me?\"\n\n\t\t\t\"Maybe?\" she reaches out a hand as if to touch you, then lets it fall. \"Just… be careful. Don't switch off your common sense.\"\n\n\t\t\t\"What do you know?\" you say suspiciously.\n\n\t\t\t\"I know that when people believe in God, they can do awful things in his name. Make sure you judge for yourselves if this mysterious conversationalist is good or evil. Because either one is possible, even from an apparently pure source.\"\n\t\t\t*goto moving_on\n\t\t#\"I heard talking, and it wasn't anything human.\"\n\t\t\t*set honest %+10\n\t\t\tShe blinks at you, presumably surprised that you didn't take the chance to pretend you hadn't said anything odd. \n\t\t\t*goto house\n\t\t#\"Metaphorically, of couse.\"\n\t\t\t*set honest %-10\n\t\t\t\"Of course,\" she says, in what is clearly sarcasm. \n\t\t\t*goto house\n*if talking_cat = 1\n\t\"Uh… does Loki seem unusual to you?\"\n\n\t\"Not particularly,\" she says, with a casual air that is devastating to your hope of finding answers. You rather hope you're not insane.\n\n\t\"Clearly something happened,\" Renee says. \"Are you going to tell me what it is? I am a priest, after all. We can keep secrets, believe me.\"\n\t*choice\n\t\t#\"I'm sure I'll work it out.\"\n\t\t\t*set mental_health %-10\n\t\t\t\"I'm sure you will,\" she says smoothly. \n\t\t\t*label cat_bit\n\t\t\t\"I should probably mention you're not the first person to ask me strange questions about Loki. Not even the first writer.\"\n\n\t\t\t\"What did they ask you?\"\n\n\t\t\t\"They asked me if he could talk,\" she says, without laughing. \"One asked me if he was a real cat, and another asked what was his favourite food. So.\"\n\n\t\t\t\"So.\"\n\n\t\t\tShe shrugs and turns back into her room, leaving you alone.\n\t\t\t*goto moving_on\n\t\t#\"Your cat talked to me. In words.\"\n\t\t\t\"Did he now?\" she says, as if you're discussing a fascinating piece of local interest news. \n\t\t\t*goto cat_bit\n\t\t#\"It's possible I drank too much last night.\"\n\t\t\t\"I doubt it,\" she says. \n\t\t\t*goto cat_bit\n*if lie_detector = 1\n\t\"Have you ever noticed an odd golden glow in people's eyes?\"\n\n\tShe stares at you. \"You too?\"\n\n\tThe rush of relief is tempered by the fear that she's having you on.\n\t*choice\n\t\t#\"Why is this happening? There has to be a reason.\"\n\t\t\t*set realism %-10\n\t\t\t\"The short answer is that I don't know,\" she says. \n\t\t\t*label theory\n\t\t\t\"I have a theory that people's eyes turn yellow when they're lying. Based on my knowledge, that holds true. However, it's not a perfect system. People are experts at evasion, both in their words and in their minds. If someone truly believes what they are saying, their eyes do not change colour.\"\n\n\t\t\t\"You're sure? I'm not seeing things?\"\n\n\t\t\t\"We are both seeing things. But the effect appears to have a consistent function. Science isn't omniscient, you know. You and I may have discovered something new.\"\n\n\t\t\t\"Or we have the same delusion.\"\n\n\t\t\tShe shrugs. \"Exactly.\"\n\t\t\t*goto moving_on\n\t\t#\"Must be a quality of the light here.\"\n\t\t\t*set honest %-10\n\t\t\t\"I don't believe so, and neither do you,\" she says. \n\t\t\t*goto theory\n\t\t#\"I think it means something. It's not all the time.\"\n\t\t\t*set honest %+10\n\t\t\t\"I agree!\" she says. \n\t\t\t*goto theory\n*if love_lines = 1\n\t\"Have you ever seen glowing lines, like spiderwebs, between people?\"\n\n\t\"Not lines,\" she says slowly. \"Have you experienced something unusual since you arrived here?\"\n\t*choice\n\t\t#\"Just a lot of spiders.\"\n\t\t\t*set honest %-10\n\t\t\t\"If you say so,\" says Renee. \n\t\t\t*label housea\n\t\t\t\"This house… there isn't anywhere like it.\"\n\n\t\t\t\"Yes,\" you say stiffly. \"It's very beautiful.\"\n\n\t\t\t\"More than that,\" says Renee. \"From the first writer retreat, it's been clear that it has an effect on people—sometimes in ways that can't be explained.\"\n\n\t\t\t\"You think there are supernatural phenomenae here?\" you say.\n\n\t\t\t\"I am a priest,\" she says gently. \"I should hope that not everything that happens here is easily explained by natural means.\"\n\t\t\t*goto moving_on\n\t\t#\"Yes. Like I said, glowing lines between people.\"\n\t\t\t*set honest %+10\n\t\t\t\"How interesting!\" she says. \n\t\t\t*goto housea\n\t\t#\"I think I know why this is happening.\"\n\t\t\t*set observation %+10\n\t\t\t\"Tell me!\" she says. \"I won't share your secret if you don't want me too, but I'd love to hear your theory.\"\n\n\t\t\t\"It's… attraction,\" you say. \"The lines are showing me who is attracted to you.\"\n\n\t\t\t\"Interesting!\" she says. \"If so, you won't have seen any lines coming from me to anyone else—I'm asexual.\"\n\n\t\t\t\"That helps, thank you. And yes, I haven't seen any lines from you to anyone else. But if that's true, why is this happening? And how?\"\n\n\t\t\t\"I am a priest,\" she says gently. \"I should hope that not everything that happens here is easily explained by natural means.\"\n*label moving_on\n\nYou let her go back to praying, just as a sweaty Max comes through the front door. He's been for a run already. In the Bishop's Room, you can hear Eric stirring.\n\n*choice\n\t#Ask Max if he's gained magical powers since arriving here.\n\t\t*set max %+10\n\t\t*set maxmagic true\n\t\tMax has a shower and once more emerges wrapped in a towel. He sees you waiting and flops down on one of the armchairs nearby. \"What's cooking Good Looking?\"\n\n\t\t\"I can't believe you said that.\"\n\n\t\t\"And yet I did,\" he grins. \"But you clearly have something to ask.\"\n\n\t\t\"I… er… well, have you experienced anything unusual since you arrived here?\"\n\n\t\tHe blinks, and you know you've struck gold. But for the first time, he looks hesitant.\n\n\t\t\"Yes,\" he says at last. \"I see these golden lines between people, showing who's attracted to who. \n\t\t*if maxattraction = true\n\t\t\tAnd yes, I've seen how you look at me. But I'm pretty sure Aurelia's gay.\"\n\t\t\t*goto maxend\n\t\t*else\n\t\t\tI'm pretty sure Aurelia's gay, and you are somehow immune to my charms.\"\n\t\t*label maxend\n\n\t\t\"Wow,\" you say. \"Just… wow.\"\n\n\t\tHe shrugs, and flashes a whole lot of leg as he gets up and heads off to his room, but he pauses in the door to the hall. \"I think there's more to come,\" he adds. \"Like I know things about people that I shouldn't know. Their emotions, I mean. It feels like magic too.\"\n\t\t*goto movingonreally\n\t#Ask Lala if she's gained magical powers since arriving here.\n\t\t*set lala %+10\n\t\t*set lalamagic true\n\t\tYou knock lightly on Lala's door, and she opens it with a smile that makes you feel like she was hoping you'd pay her a visit. Then she frowns at your expression. \"Is something wrong?\"\n\n\t\t\"Something is… unusual,\" you say. \"Renee isn't sure whether we should trust it, but I just want more data. So please don't be shy.\"\n\n\t\tShe grins. \"Do I strike you as someone who might have an issue with shyness?\"\n\n\t\t\"Not really know.\" You swallow hard, and decide to spit it out. \"Are you magical? Since we got here?\"\n\n\t\tShe gasps. \"You too?!\"\n\n\t\t\"Tell me everything,\" you say—and she does.\n\n\t\tShe says that since she arrived at the house she's been able to tell if people are lying, and to recall every detail of a room after she walks on. \n\n\t\tYou tell her your own experience, and then she hugs you and excuses herself to use the bathroom while it's free.\n\t\t*goto movingonreally\n\t#Ask Eric if he's gained magical powers since arriving here.\n\t\t*set eric %+10\n\t\t*set ericmagic true\n\t\tAs soon as Eric spots you, he stops to chat. After several minutes of small talk you blurt out: \"Are you magical?\"\n\n\t\tHis eyes widen. \"How did you know?\"\n\n\t\t\"It's the house,\" you say. \"I have something magical going on, and so does Renee.\"\n\n\t\t\"Oh!\" he says. \"I heard the walls talk to me. They've never done that before, and I've been here loads of times. And I think I know things about people that I can't explain. Like you: you didn't even remember this place existed until Renee called to congratulate you. Am I right?\"\n\n\t\t\"Yes,\" you say, and share a grin. \"This is real. Real magic.\"\n\n\t\tHe heads off to the bathroom and you're alone again.\n*label movingonreally\n\nYou've still got a bit of time to enjoy the quiet. For now, you let thoughts about magic shift onto the back burner. At some point, you're going to want to know why this is happening, and how it works. Renee seems fine with the existence of magic, but suspicious of why it exists, and what it wants. You shiver at the thought of some alien intelligence that might mean you harm. But surely it's just a bit of fun?\n\n*choice\n\t#Write.\n\t\t*if word_count = 0\n\t\t\t*set writing_sessions 1\n\t\t\t*set word_count +2000\n\t\t\tYeah, it's probably time you did some of that writing thing that you're supposedly here for. You've already wasted your first half day.\n\n\t\t\tUgh, blank screen. It's like it's looking back at you. Judging you.\n\n\t\t\tScrewing up your courage, you sit down at one of the rear balcony desks and start writing.\n\n\t\t\tYou've finally decided on your viewpoint character.\n\t\t\t*fake_choice\n\t\t\t\t#Skye, a woman.\n\t\t\t\t#Cash, a man.\n\t\t\t\t\t*set hero_pronoun \"he\"\n\t\t\t\t\t*set hero_name \"Cash\"\n\t\t\t\t#Tun, a genderfluid person.\n\t\t\t\t\t*set hero_pronoun \"they\"\n\t\t\t\t\t*set hero_name \"tun\"\n\t\t\t*goto divvy\n\t\t*else\n\t\t\t*set word_count + 2000\n\t\t\tYesterday was good. Today could be even better. You've got nothing to do but write, write, write.\n\n\t\t\tAfter a little while you notice yourself folding and re-folding your shirts.\n\n\t\t\tYou take your computer to the communal area, open your main file, and start actually working.\n\n\t\t\t\"Come on, $!{hero_name},\" you mutter. \"Be interesting.\"\n\t\t\t*goto divvy\n\t#Knock on Lala's door.\n\t\t\"I'll come out in a sec!\" she calls softly, and you have little choice but to wait.\n\n\t\tA few moments later she opens her door before rolling up her prayer mat and putting it away. \n\n\t\t\"Oh! I'm sorry,\" you say.\n\n\t\t\"It's perfectly fine. Was there anything you wanted?\"\n\n\t\t\"I just… I saw your light was on.\"\n\n\t\t\"Cool. Is it too early for morning tea? I spotted some home-made biscuits in the fridge.\"\n\n\t\t\"It's never too early. I'd love to watch the morning light spill over the hills.\"\n\n\t\tShe laughs. \"You talk like a writer.\"\n\t\t*if love_lines = 1\n\n\t\t\tIt's a very pleasant morning tea, and the golden line from her to you grows ever brighter.\n\t\t\t*goto divvy\n\t\t*else\n\n\t\t\tIt's a very pleasant morning tea.\n\t\t\t*goto divvy\n\t#Go for a run before it's too hot.\n\t\t*set fitness %+10\n\t\t*set mental_health %+10\n\t\tYou chuck on your running shoes and head downhill, curious to get a closer look at the main street that you passed so quickly on the way in. The hill is serious, but it's only a few minutes until you're passing a pleasantly eccentric collection of parks, specialty shops, and the single grocery store.\n\n\t\tYou stop for a moment to admire a copper statue of Dad, Dave, Mum, and Mabel from the Steele Rudd stories before heading back up to the church. Luckily for everyone, you arrive in time for your scheduled shower. After that you grab a cold drink from the communal fridge and let yourself sit for a minute in the rear balcony.\n*label divvy\n\nMost of the others drift in and chat a little, although you don't see Bruce, Renee, or Aurelia. \n\n*page_break\n\n\"I'm going to take a look down at the cairn,\" says Tamsin, \"and a few of the other places that relate to the big flood in 1852. I reckon I'll take my car, so anyone who wants to come is welcome. Of course I'll need to see the sculpture of Yarri and Jacky Jacky on the way back, since they're the ones who saved most of the survivors.\"\n\n\"They're well worth seeing,\" says Eric, reminding you that he's a local. \"Half of me wishes I'd been there in 1852. At least I'd have something to write about.\"\n\nThere's a horrified silence.\n\n\"I want to see the bridges,\" says Lala graciously. \"Nothing to do with writing; I just like seeing things fall apart. Renee said I could borrow her car, so I can offer lifts too. She's very trusting, isn't she?\"\n\n\"No car for me,\" says Max. \"I'm going to walk down the hill and check out the museum—of course I wouldn't say no to company either.\"\n\n\"You'll see most of Gundagai on the way to the museum,\" says Eric. \"With half a day to spare, you could see all of it.\"\n*choice\n\t#Go with Tamsin to see the memorial to the original Gundagai.\n\t\t*set tamsin %+10\n\t\t*set tamsinmagic true\n\t\t*goto tamsin_path\n\t#Go with Lala to see the ruined bridges.\n\t\t*set lala %+10\n\t\t*goto lala_path\n\t#Go with Max to see… everything else.\n\t\t*set max %+10\n\t\t*goto max_path\n*label tamsin_path\n*set tamsinmagic true\nYou and Tamsin head for the garage and then follow Renee's hand-written directions down past the main street to the part of Gundagai that abruptly changes to a completely flat, largely empty grassy area. \n\n\"The creek's over that way,\" says Tamsin, pointing to what appears to be a line of trees just beyond a playground. \"It joins the Murrumbidgee River somewhere. Want to go have a look?\"\n*choice\n\t#\"Sure. Who doesn't love a country creek?\"\n\t\t*set mental_health %+10\n\t\tShe parks the car and the pair of you walk over to the water and sit on the soft green grass. The water is too deep for a paddle, and the banks are too steep. Little wonder the main section of the playground is fenced in.\n\n\t\t\"I'm procrastinating,\" Tamsin admits.\n\n\t\t\"Don't you want to see the cairn?\"\n\n\t\t\"Of course I do, but… we always seem to remember the worst parts of history the best. It's not always easy to cope with.\"\n\t\t*goto talk\n\t#\"What happened in the flood?\"\n\t\t*set knowledge %+10\n\t\t\"I'm procrastinating,\" Tamsin admits.\n\n\t\t\"Don't you want to see the cairn?\"\n\n\t\t\"Of course I do, but… we always seem to remember the worst parts of history the best.\n\n\t\t\"Let's procrastinate then,\" you say. \"We've got all day, don't we?\"\n\n\t\t\"Sort of.\"\n\t\t*goto talk\n\t#\"Even for a small town, it's really empty here.\"\n\t\t*set observation %+10\n\t\tTamsin winces. \"No one lives on the plain. Not any more.\"\n\n\t\t\"You've already researched the flood, haven't you?\"\n\n\t\t\"Of course. It's the worst in Australian history.\"\n*label talk\n\n\"Do you want to talk about it?\" you ask. \"Er, you don't have to. No one's going to be cross if we just go home.\"\n\nShe stares away across the green and when she looks back you're surprised to see tears in her eyes. \"When Europeans first 'discovered' this area, they were warned by the Wiradjuri that it was a major flood plain. Of course they built the settlement on the oh so convenient flat land anyway.\"\n\n\"Oh,\" you breathe, feeling the awful sense of inevitability in this ancient story. \n\nTamsin doesn't speak again until she's driven under the famously ruined wooden bridge and then the pair of you have walked across the grass to the memorial cairn standing in the middle of nowhere.\n\nShe closes her eyes and recites, \"On June 24th, 1852, at night, the Murrumbidgee River broke its banks and swept through the tiny settlement of Gundagai. Seventy-one buildings were utterly destroyed. One-third of the population was killed.\"\n*choice\n\t#\"It was here?\"\n\t\tShe turns in a slow circle, and sees what she's looking for. You follow her gaze, and see the remains of foundation posts: metal lumps barely highly than the dirt. \"This was the schoolhouse. It was two storeys tall. School wasn't in session, fortunately—but the family of the schoolmaster was here. They went up to the second storey and thought they were safe.\n\n\t\t\"The building collapsed, killing them.\"\n\n\t\tAll around, there's nothing but grass and a few ancient trees.\n\t\t*goto yarri\n\t#Spend a few moments in silence.\n\t\tTamsin looks at the ground while you step forward and touch the cool slate of the cairn and its brass plaque. \n\n\t\tMore than seventy people died, and not all the bodies were recovered. Gundagai was a convenient waystation between Sydney and Melbourne, and a popular place to stay on the way to the newly discovered Victorian goldfield. An unknown number of travellers were never seen again.\n\t\t*goto yarri\n\t#\"Are you going to write about it?\"\n\t\t\"I don't know,\" she says. \"Maybe. Parts of this story deserve to be better known, but I'm not sure if I'm the right person to tell them—or if I can bear to tell them.\"\n\n\t\t\"What aren't you telling me?\" you ask.\n\n\t\t\"The heroes of that awful night were Wiradjuri men. Come on.\"\n*label Yarri\n\nTamsin leads the way back to the car, and drives back up the mountain to the town centre. She parks on the side of the road, and the pair of you walk just a few metres to a world-class copper sculpture of two Wiradjuri men hauling a narrow bark canoe. \n*choice\n\t#\"Do you want to tell me about them?\"\n\t\t*set mental_health %+10\n\t\tTamsin shoots you a grateful look. This is clearly therapeutic for her. \"That's Yarri and Jacky Jacky. They're brothers. Yarri's traditional name was Coonong Denamundinna, and he and Jacky Jacky are the most famous heroes of the flood.\n\n\t\t\"Throughout the days and nights following the flood, they went back and forth in canoes, rescuing almost seventy people.\n\n\t\t\"Other Wiradjuri men were there too, including Long Jimmy and Tommy Davis. Long Jimmy died soon after the rescue operation, probably from exposure.\"\n\n\t\t\"Oh,\" you say. What else could you say?\n\t\t*goto massacre\n\t#Read the information behind the sculpture.\n\t\t*set knowledge %+10\n\t\tBrothers Yarri and Jacky Jacky rescued almost seventy people, paddling back and forth with other Wiradjuri people in bark canoes on a single recently-repaired wooden canoe, searching for survivors on rooves and in treetops. It was cold, and dark, but they didn't give up.\n\n\t\tYou look back at the sculpture, caught between horror at the deadly European racism, and admiration of the heroes.\n\t\t*goto massacre\n\t#Look at their faces, and guess their story.\n\t\t*set imagination %+10\n\t\tBoth men have a strength that you imagine is born of hard word and a largely pre-European diet. They are not quite scowling, focused on their work and oblivious to the quiet bustle of the town around them.\n\n\t\tEven cast in brass, the canoe is barely wide enough to fit a person, but you know at once that it was a vital rescue vessel on the night of the flood: the membrane between life and death for dozens of people. It's easy to imagine these strong, stoic men as heroes. It's less easy to imagine how they were treated by non-Wiradjuri locals both before and after their heroism.\n*label massacre\n\n\"There's more history here,\" says Tamsin. \"But it gets darker, and murkier.\"\n*choice\n\t#\"Let me guess: white people don't come off well in this story either?\"\n\t\t\"I'm not sure anyone does—but yes, of course there's more racism-induced misery.\"\n\n\t\t\"All right,\" you say. \"Let's hear it.\"\n\t\t*label tale\n\n\t\t\"There was an alleged massacre near here,\" she says slowly. \"You've heard of the 'Dog on the Tuckerbox' statue, I imagine. Officially, it's a tribute to early European pioneers based on various poems about a dog causing food to spoil by sitting either on or in a tuckerbox. But there's another version of the story that isn't quite so nice.\"\n\n\t\tShe sighs, and then talks quickly, as if wanting to get it over with. \"The original monument was a dog on a stick. That much is fact. Some people say it was a totemic symbol to commemorate a massacre. Their story is that a cart was stuck in the mud. It was carrying flour, and people were stealing it. Specifically, Aboriginal people. So the owners of the flour poisoned it. They killed the locals—men, women, and children.\"\n\t\t*goto post_tale\n\t#\"Murkier how?\"\n\t\t\"In every possible way,\" she says. \n\t\t*goto tale\n\t#\"I'm listening.\"\n\t\t*goto tale\n*label post_tale\n*choice\n\t#\"Do you think it's a cover-up?\"\n\t\t\"I do,\" she says softly, \"but not in the way you mean.\"\n\t\t*goto ethics\n\t#\"Which is the true story?\"\n\t\tShe shrugs. \"They are both true.\"\n\n\t\t\"How is that possible?\"\n\t\t*label ethics\n\n\t\t\"The current statue is based on fiction, or so goes the official story. But there were certainly cases of people poisoning flour, knowing Aboriginal people would steal it.\"\n\n\t\t\"That doesn't mean it happened here.\"\n\n\t\t\"Evidence is not as simple as a photograph, or a written account,\" she says. \"We historians rely on primary sources as much as possible, considering them more reliable despite their inherant bias. But personal bias is a simple issue compared to… to… entire systems of knowledge.\"\n\n\t\t\"I don't understand.\"\n\t\t*page_break\n\t\t\"Aboriginal people possessed—and still possess—knowledge that has been passed down for thousands of years in the form of stories. Those stories advise on behaviour, on the nature of reality, and on how to live—among other things. They are not designed to distinguish whether an event happened at a specific physical location or not.\"\n\n\t\t\"Do you mean it didn't happen here? The story is based on a different massacre?\"\n\n\t\tShe shakes her head, frustrated. \"It may or may not have happened here. I suspect that it did, but those who know weren't writing an academic paper. They were mourning their dead family and friends. It is a different… format, and one that the Western World says is less valid than a set of numbers. How many dead? What longitude and latitude? What date and time? As if numbers are what matters. They're not. The Western system is, in many ways, inferior.\"\n\n\t\t\"But more factually reliable.\"\n\n\t\t\"Precisely.\"\n\n\t\t\"There's more, too: Yarri was accused of several murders, both before and after the flood.\"\n\n\t\t\"I… don't know what to make of that.\"\n\n\t\t\"Neither do I. There's precious little information of any kind. But humans tend to be a mix of good and bad, so why shouldn't a great hero also be a great villain? Or perhaps there's more to those murders, and he was saving lives then too. Different people would feel very strongly one way or the other, based on the same lack of information. History is just stories, after all.\"\n\t\t*goto lunch_time\n\t#\"What evidence is there of the so-called massacre?\"\n\t\t\"That's the wrong question.\"\n\t\t*goto ethics\n*label lunch_time\n\nIt's time for lunch, and you drive back to the main house in silence, and haul down the noisy garage door without a word.\n\n\"The question is, how do I write about history like this?\" says Tamsin. \"It doesn't even belong to me, and it's not as straightforward as people think.\"\n*choice\n\t#\"Do your best, I guess?\"\n\t\t\"I would say: 'First, do no harm.',\" she says thoughtfully. \n\t\t*goto heritage\n\t#\"I don't think we can write about any Aboriginal stories.\"\n\t\t\"On the contrary,\" she says. \"I can.\n\t\t*goto heritage\n\t#\"Aboriginal stories need to be told.\"\n\t\t\"I'm doing my best,\" she says. \n*label heritage\n\n\"My great-grandfather was an Aboriginal man who worked as a tracker. He found and saved the lives of lost children more than once.\"\n\n\"That's a good story!\" you say with slightly desperate relief. \n\n\"That part is,\" she says. \"He also helped to find Aboriginal children, in order to help the authorities take them from their parents.\" She scratches the back of one hand. \"His father was a wealthy British man, who effectively owned his mother. They were never married, of course, which is how she was able to raise her son herself. All of them are my ancestors. Good and bad and everything in between, often in the same person.\"\n\n\"I've read one of your books,\" you say.\n*choice\n\t#\"It had goodness at its heart.\"\n\t\t*set tamsin %+10\n\t\t\"Thank you,\" she says.\n\t\t*goto lunch_t\n\t#\"Is the heroic detective character based on your great-grandfather?\"\n\t\t*set observation %+10\n\t\t\"The good parts, yes,\" she said.\n\t\t*goto lunch_t\n\t#\"It wasn't as deep as this conversation.\"\n\t\t*set honest %+10\n\t\t\"Thank you for your honesty,\" she says. \"As you can tell, I haven't found a solution to these issues.\"\n*label lunch_t\n\nYou're getting hungry, so you head inside and make yourself a sandwich. \n*if talking_walls = 1\n\t\"Welcome back.\"\n\n\tThe house is talking to you again. But then you catch a glimpse of Tamsin's face, and you know she heard it too. For a moment you just look at one another, acknowledging that the house talks to both of you. Then Tamsin hurries off to write notes on the morning's research.\n\t*goto lunch\n\n*else\n\tTamsin pauses in the hallway with an odd expression on her face, as if she is hearing someone speak to her that is inaudible to you. She touches a door frame with curious tenderness before excusing herself to write notes on the morning's research. You're left wondering what magic she is experiencing. Judging by her behaviour, it's not the same as yours.\n\n*label lunch\nEric is sitting at one of the work tables with an uneaten sandwich to one side. He's staring at his laptop screen, unmoving. It's unclear whether that means his writing is going very well or very badly.\n*choice\n\t#Try not to interrupt… whatever it is.\n\t\t*set empathetic %+10\n\t\tYou're just tiptoeing away when Loki comes in, tripping you so that you shriek and grab the coffee-making table, tipping your sandwich onto the wood stove. Loki flees, making you look like you just tripped over your own feet. So much for leaving Eric to his silence.\n\t\t*goto jump\n\t#\"How's your biography, Eric? Are you still working on your childhood?\"\n\t\t*set empathetic %-10\n\t\t*goto jump\n\t#Take your sandwich to your room, and write while you eat.\n\t\t*set art %+10\n\t\t*set word_count +2000\n\t\tUgh. The words just aren't coming, and any words that you think of sound clunky and wrong. You force yourself to write a hundred words before you take a bite of your lunch, then another hundred words and another bite, and so on.\n\n\t\tIt's awful. Probably. But it's on the page, so that's something. \n\t\t*if word_count = 2000\n\t\t\t*set writing_sessions 1\n\t\t\tWhat's more, you've finally decided on your viewpoint character.\n\t\t\t*fake_choice\n\t\t\t\t#Skye, a woman.\n\t\t\t\t#Cash, a man.\n\t\t\t\t\t*set hero_pronoun \"he\"\n\t\t\t\t\t*set hero_name \"Cash\"\n\t\t\t\t#Tun, a genderfluid person.\n\t\t\t\t\t*set hero_pronoun \"they\"\n\t\t\t\t\t*set hero_name \"tun\"\n\t\t\t*goto jump\n\t\t*if writing_sessions = 1\n\t\t\t*set writing_sessions 2\n\t\t\tThe inciting incident involves \n\t\t\t*fake_choice\n\t\t\t\t#Keesha, a woman.\n\t\t\t\t#Sam, who is intersex.\n\t\t\t\t\t*set pronoun \"they\"\n\t\t\t\t\t*set named \"sam\"\n\t\t\t\t#Mike, a man.\n\t\t\t\t\t*set pronoun \"he\"\n\t\t\t\t\t*set named \"mike\"\n\t\t\t*goto jump\n\t\t*else\n\t\t\tAnd you know what your ending will be:\n\t\t\t*fake_choice\n\t\t\t\t#Happy.\n\t\t\t\t\t*set ending 1\n\t\t\t\t#Tragic.\n\t\t\t\t\t*set ending 3\n\t\t\t\t#Bittersweet.\n\t\t\t\t\t*set ending 2\n*label jump\nWhen you're finished eating, you take your plate back to the kitchen. Eric is still in the rear balcony. \n\n\nHe startles wildly as you pass, knocking over a glass of water and grabbing his laptop off the table so it doesn't get wet.\n\n\"Er… sorry,\" you say.\n\nHe blinks at you as if he's never seen something so peculiar, then gradually returns to awareness, placing his laptop on a dry spot and grabbing a teatowel to mop up his spilled drink.\n\n\"How's your writing going, $!{name}?\"\n*choice\n\t#\"Great!\"\n\t\t*set honest %-10\n\t\t*if killer = 1\n\t\t\t\"Really?\" he says, with such naked yearning you feel bad.\n\t\t\t*goto chatter\n\t\t*else\n\t\t\t\"Good for you!\" he says.\n\t\t\t*goto chatter\n\t\t*label chatter\n\n\t\t\"How's yours?\" you ask, as per mandatory social custom.\n\t\t*label query\n\t\t*if killer = 1\n\n\t\t\t\"I have a problem,\" he says. \"My life is just… boring. All that joy and pain and struggle and hope and love and hate. Boring!\"\n\n\t\t\t\"I'm sure it's all in the style,\" you say with an attempt at cheer.\n\n\t\t\t\"But I don't have style either!\" he wails, and grabs his laptop to rush off to his room.\n\t\t\t*goto post_eric\n\t\t*else\n\n\t\t\t\"I have a problem,\" he says. \"Last night, I had an epiphany. I know just where to start, and I know my theme, and where to go. It was so exciting! But now that I sit down… nothing!\"\n\n\t\t\t\"Don't worry. Every story is like that at first. I'm sure you've felt like this before.\"\n\n\t\t\t\"No!\" he wails. \"I've never tried to write a whole book before!\"\n\t\t\t*goto post_eric\n\t#\"How's yours?\"\n\t\t*set eric %+10\n\t\t*goto query\n\t#\"Can we start drinking yet?\"\n\t\t*set fitness %-10\n\t\t\"Sure,\" he says absently. \"Hemingway drank a lot, didn't he?\"\n\n\t\t\"I'm not sure that's the aspect we should be emulating,\" you say. \"But yes.\"\n\n\t\tYou pour a glass for each of you, feeling a little less wretched when you notice several empty bottles already in the recycling. They're definitely not all yours.\n\t\t*goto query\n*label post_eric\n\nBruce pokes his head out of the laundry room, sees you in the rear balcony, and retreats like a turtle into its shell. It's probably time to get some writing done, before something else distracts you.\n*choice\n\t#Write.\n\t\t*set word_count +2000\n\t\tOkay. Writing. Just a bit, and if it's not going well you can take a break. Or a nap. Or a nap break.\n\n\t\tFirst, you open your laptop and then your file.\n\n\t\tThen you read the previous couple of sentences, just to remember where you are.\n\n\t\tOh. They're terrible.\n\n\t\tSo what? Move on.\n\n\t\tThen you write the next sentence. Then the next. And for a little while, it's not so hard.\n\t\t*if writing_sessions = 0\n\t\t\t*set writing_sessions 1\n\t\t\tWhat's more, you've finally decided on your viewpoint character.\n\t\t\t*fake_choice\n\t\t\t\t#Skye, a woman.\n\t\t\t\t#Cash, a man.\n\t\t\t\t\t*set hero_pronoun \"he\"\n\t\t\t\t\t*set hero_name \"cash\"\n\t\t\t\t#Tun, a genderfluid person.\n\t\t\t\t\t*set hero_pronoun \"they\"\n\t\t\t\t\t*set hero_name \"tun\"\n\t\t\t*goto dinner\n\t\t*if writing_sessions = 1\n\t\t\t*set writing_sessions 2\n\t\t\tThe inciting incident involves \n\t\t\t*fake_choice\n\t\t\t\t#Keesha, a woman.\n\t\t\t\t#Sam, who is intersex.\n\t\t\t\t\t*set pronoun \"they\"\n\t\t\t\t\t*set named \"sam\"\n\t\t\t\t#Mike, a man.\n\t\t\t\t\t*set pronoun \"he\"\n\t\t\t\t\t*set named \"mike\"\n\t\t\t*goto dinner\n\t\t*else\n\t\t\tAnd you know what your ending will be:\n\t\t\t*fake_choice\n\t\t\t\t#Happy.\n\t\t\t\t\t*set ending 1\n\t\t\t\t#Tragic.\n\t\t\t\t\t*set ending 3\n\t\t\t\t#Bittersweet.\n\t\t\t\t\t*set ending 2\n\t\t\t*goto dinner\n\t#Loudly greet Bruce.\n\t\t*set empathetic %-10\n\t\t\"Hi there Bruce!\" you shout as loudly yet genially as possible.\n\n\t\tThe door hesitates, still slightly ajar, and then it slowly opens. Bruce looks like he wishes he could switch off his flaming red hair.\n\n\t\t\"Hi… uh… $!{name},\" he says. \n\n\t\tHe doesn't come any closer, and after an awkward silence you take pity on him.\n\n\t\t\"Well… see you around.\"\n\n\t\tHe vanishes, and you're left alone.\n\t\t*goto dinner\n\t#Procrastinate.\n\t\t*set proactive %-10\n\t\tYou poke around in your room, and spend a full hour trying to google 'Gundagai' without getting a single page to fully load.\n\n\t\tLoki wanders past at one stage and gives you a disgusted look.\n\n\t\t\"Kitty!\" you cry in desperation. \"Here, kitty kitty kitty!\"\n\n\t\tHe leaves.\n\t\t*goto dinner\n*label lala_path\nYou and Lala head for the garage and then follow hand-written directions down the main street to the fenced-off beginning of the original highway bridge across the deadly flood plain that separates North and South Gundagai.\n\n\"Come on,\" says Lala. \"Let's go take a closer look.\"\n*choice\n\t#Get out of the car and peer through the fence.\n\t\t*set observation %+10\n\t\tYou scan the impressive information board and then head over to the fence. The bridge is raised on thick wooden pillars several metres above the ground, protecting it from floods past and present. \n\n\t\tIt is a heritage ruin, protected by law. The wood is an ashy grey colour due to its age, deeply lined and pitted. You read an online account of someone who often rode across the bridge on family road trips as a child, and talked about the immense clatter and creaking.\n\n\t\tThere are enormous holes, missing boards, and at least one section has visibly collapsed between two pillars.\n\n\t\tWhen you've looked your fill, you get back into the car.\n\t\t*goto talk_l\n\t#\"Do you mean climbing the fence?\"\n\t\t*set imagination %+10\n\t\t\"Ooh, that's a great idea!\" she says.\n\n\t\t\"Is it?\" you say.\n\t\t*goto climb\n\t#\"I'm 100% at your disposal.\"\n\t\t*set mental_health %+10\n\t\t*if lala_love = 10\n\t\t\t\"Don't tempt me!\" she says. \"I'll send you hopping the fence.\"\n\n\t\t\t\"Seriously?\" you say.\n\t\t\t*label climb\n\n\t\t\t\"I am a crime writer,\" she says. \"Want to do some crime?\"\n\n\t\t\tShe gets out of the car, giggling, and glances around guiltily before inspecting the fence and choosing a section that can be lifted out of its base and pushed far enough aside to squeeze through.\n\n\t\t\tThe bridge was still being used only a few decades ago. It can't be that badly ruined. You follow her.\n\n\t\t\tShe walks up to the crumbling edge of the road surface and takes a careful step onto the disintegrating wood. It visibly moves under her weight and she jumps off again at once with a delighted shriek.\n\n\t\t\tThe two of your squeeze back through the gap and burn rubber as you drive away, hearts thumping as if the police are chasing you.\n\t\t\t*goto talk_l\n\t\t*else\n\t\t\t\"Oh really?\" she says, and it's absolutely clear she's forgotten all about the bridge.\n\n\t\t\tHer eyes linger on yours, daring you to respond in kind. You know that if you let this moment pass, she'll never look at you that way again.\n\n\t\t\tShe has an energy that makes her seem to glow from the inside out.\n\t\t\t*choice\n\t\t\t\t#\"I meant about the bridge.\"\n\t\t\t\t\t*set lala_love 10\n\t\t\t\t\t*goto climb\n\t\t\t\t#\"Go on then. Put your mouth where your mouth is.\"\n\t\t\t\t\t*label kiss\n\t\t\t\t\t*set lala %+10\n\t\t\t\t\t*set lala_love 5\n\t\t\t\t\tFor the first time, you see a tiny flash of self-doubt in her eyes. Then it's dismissed, never to be seen again.\n\n\t\t\t\t\tThen her lips are on yours, and there's no doubt left in the world. Your head spins, but in a good way. You cling to her reassuring solidity, and it's a long time before you come up for air.\n\n\t\t\t\t\tShe laughs into your mouth, warming your breath with hers, and setting off fireworks in your stomach. It's a delicious nausea.\n\n\t\t\t\t\tYou kiss her cheeks and hands. \"I can already tell you're going to be very distracting.\"\n\n\t\t\t\t\t\"Bridge!\" she says. \"We were looking at the bridge.\"\n\n\t\t\t\t\t\"We saw it,\" you say. \"It's right there, looking old and stuff. We're good.\"\n\n\t\t\t\t\t\"Agreed.\" She kisses you some more and then, with an air of catlike satisfaction, starts the car again and drives away.\n\t\t\t\t\t*goto talk_l\n\t\t\t\t#\"You are so beautiful.\"\n\t\t\t\t\t\"I know,\" she says.\n\t\t\t\t\t*goto kiss\n*label talk_l\n\nShe drives you to a spot where the road between North and South Gundagai crosses underneath the same dilapidated wooden bridge. You look up as you pass underneath, noting the ramshackle but reliable repairs: several metal grates bound together into a kind of net. One doesn't want a ruin, however historically beautiful, falling on one's head.\n\nAll around you is soft green grass with a few scattered trees. It's eerily flat, and simultaneously easy to see exactly why early Europeans chose it as an ideal site for a city, as well as why it regularly floods. The hills and mountains all around are steep and beautiful, making a natural bowl.\n\nThe old railway bridge is just as dilapidated as the original road bridge. \n*choice\n\t#\"Do the bridges make you wish you wrote historical fiction?\"\n\t\t\"Absolutely not!\" she says. \"I like facts, and science, and knowledge. History is far too slippery to work with, and too dangerous.\"\n\n\t\t\"How can it be dangerous, when it's already happened?\"\n\n\t\t\"History is meant to be pure and factual, but it isn't. There are hidden stories, and stories that aren't quite true, and all of that can hurt. You can hurt by revealing a truth as much as by hiding one.\"\n\n\t\t\"You don't want to hurt anyone,\" you say. \"That's kind.\"\n\t\t*goto l_next\n\t#\"Thank you for bringing me here.\"\n\t\t\"I was hoping you'd catch all the hints I was throwing your way,\" she says. \"You're fun. And nice to look at. And I liked your books.\"\n\n\t\t\"You read my books?\"\n\n\t\t\"Of course,\" she grins. \"And I hope you get a lot of writing done while you're here, because I want another hit.\"\n\n\t\t\"In that case, we'd better keep moving.\"\n\t\t*goto l_next\n\t#\"Do you think your book will have some ruined bridges in it now?\"\n\t\t\"I don't know,\" she says. \"Maybe. It could be a handy place to stash a murder weapon, or even hide a body.\"\n\n\t\t\"Not for long,\" you point out. \"It'd be awkward for your killer if a corpse just fell out of the bridge one day.\"\n\n\t\t\"But fun for the reader, don't you think?\"\n*label l_next\n\nLala drives around and back again to cross the river bridge that still holds the wooden skeleton of the original underneath it. She assures you it's perfectly safe, and there's something about the 100% normal-looking road surface that reassures you. There's no clanking and rattling as you cross the river and enter South Gundagai.\n\n\"Where to next?\" she says.\n*choice\n\t#\"Surprise me.\"\n\t\t\"All right,\" she says. She types in 'Dog on the Tuckerbox' and you drive out of town to a roadside gathering of tourist traps around Gundagai's most famous landmark: a not particularly large statue.\n\n\t\t\"It's a dog,\" you say.\n\n\t\t\"On a box,\" she agrees cheerfully. \"What's a tuckerbox?\"\n\n\t\t\"'Tucker' means 'food',\" you enlighten her.\n\n\t\t\"Okay. Why?\"\n\n\t\t\"There's a poem.\"\n\n\t\t\"Cool.\"\n\t\t*goto now\n\t#\"I guess I should actually do some writing today.\"\n\t\t\"Not yet!\" she says. \"There's got to be something else thrilling to do in Gundagai.\"\n\n\t\t\"You haven't spent much time in the country, have you?\"\n\n\t\t\"Which is why it's all so new and exciting,\" she retorts.\n\n\t\t\"Actually, I really like the rectory,\" you say. \"That's definitely a highlight.\"\n\n\t\tShe rolls her eyes.\n\t\t*goto now\n\t#\"I heard the lookout is nice.\"\n\t\t\"There are two,\" she says. \"Should we go North or South?\"\n\n\t\t\"Either,\" you say.\n\n\t\t\"South it is,\" she says. \"Renee said you can't see her place from the Northern lookout, because it's too close.\"\n\n\t\tShe drives up and around a winding, ragged-edged road to the top of one of Gundagai's steep hills and pulls into a conveniently-oriented parking lot.\n\n\t\tGundagai really is beautiful; a miniature town cupped by hills all around, bisected by the hourglass-shaped flood plain. The two sections of the plain clearly show the arrow-straight lines of the modern and the historical highways, both built well above the level of all but the most catastrophic floods.\n*label now\n\n\"What now?\" you say.\n\nLala leans back in her seat and closes her eyes in thought. \"Question: if you were a woman in a crime story, would you be the
