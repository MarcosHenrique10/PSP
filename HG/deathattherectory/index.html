elieved to see you and Renee.\n\t\t\t\t\t\t\t\t*goto hello\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tHe answers the door at once, naked except for a pair of boxers. \n\t\t\t\t\t\t\t*label hello\n\n\t\t\t\t\t\t\t\"What is it? What's going on?\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"I know you knew Aurelia's secret.\"\n\t\t\t\t\t\t\t\t\t\"That she was really Annaliese Whatsit?\" he says. His eyes flick to Renee and back to you. \"Yes. I knew.\"\n\n\t\t\t\t\t\t\t\t\tRenee gives a tiny nod, confirming that he's being honest so far.\n\n\t\t\t\t\t\t\t\t\t\"And you hated her,\" you prompt him.\n\t\t\t\t\t\t\t\t\t*label hatred_r\n\t\t\t\t\t\t\t\t\t*set clue_two 1\n\t\t\t\t\t\t\t\t\tHe shrugs. \"Yes and no. She was a bundle of contradictions. Some parts of her were fun, and good, and others worthy of hate.\"\n\n\t\t\t\t\t\t\t\t\t\"Why did you hate her?\" you ask.\n\n\t\t\t\t\t\t\t\t\t\"Because she was a liar,\" he says with sudden vehemence. A moment later the relaxed and confident Max is back, but you don't need Renee to tell you that you've seen something true.\n\n\t\t\t\t\t\t\t\t\tMax sighs, and looks out the window as he explains. \"Annaliese liked to research her romances from real life, often by taking the stories of real people without their consent. I'm willing to bet the reason she was working as a waitress was purely to eavesdrop on customers. She would also catfish people online; pretending to fall in love just to see how they reacted. That's how she outed my sister before Nellie was ready. With a first girlfriend who didn't exist.\"\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#\"Oh Max. I had no idea.\"\n\t\t\t\t\t\t\t\t\t\t\t\"It wasn't hard to work backwards and figure out what had happened, and how,\" he says. \"I even sent her the brochure for this writing retreat, so I could confront her about what she did.\"\n\n\t\t\t\t\t\t\t\t\t\t\tRenee takes a sharp breath, reminding you abruptly that this loyal brother seems to be the one who drugged Aurelia and slashed her throat.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Did she apologise?\" you ask.\n\t\t\t\t\t\t\t\t\t\t\t*label apologise_r\n\n\t\t\t\t\t\t\t\t\t\t\t\"Hmm?\" He looks up, as if only just remembering who you are. \"No. I never even talked to her about it. Once I met her, I realised she was—well, a person. Making good and bad decisions just like anyone else. I still hated Little Miss Aurelia, of course. But I didn't kill her.\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou can't help looking at Renee, who is staring at Max with intense focus. \"That's the truth. You didn't kill her.\"\n\t\t\t\t\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t\t\t\t\t#\"Is Nellie okay?\"\n\t\t\t\t\t\t\t\t\t\t\tHe winces. \"Our grandfather still won't talk to her. He doesn't know I'm just as gay and that I fit his notions of the \"lifestyle\" far better than she ever will. But our parents came around after a few months.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\"You still hate her, though,\" you say. \"Aurelia.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\"Oh, absolutely,\" he says. \"She hurt my baby sister. If I was going to kill someone, that would be a good reason. But I didn't kill Aurelia.\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou can't help looking at Renee, who is staring at Max with intense focus. \"That's the truth. You didn't kill her.\"\n\t\t\t\t\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t\t\t\t\t#\"Is that why you killed Aurelia?\"\n\t\t\t\t\t\t\t\t\t\t\t*goto apologise_r\n\t\t\t\t\t\t\t\t#\"I know you hated Aurelia.\"\n\t\t\t\t\t\t\t\t\t*goto hatred_r\n\t\t\t\t\t\t\t\t#\"I know your secret.\"\n\t\t\t\t\t\t\t\t\t\"My ripped bod is no secret,\" he grins.\n\n\t\t\t\t\t\t\t\t\tYou and Renee don't give him a smile in return, and the grin fades from his face. \"What's going on?\"\n\n\t\t\t\t\t\t\t\t\t\"You hated Aurelia.\"\n\t\t\t\t\t\t\t\t\t*goto hatred_r\n\t\t\t\t\t\t#\"I'll have Lala come with me, as a lie detector.\"\n\t\t\t\t\t\t\tA flash of sadness crosses Renee's face. You both know Renee is a lie detector too, and know you both know who you trust more.\n\t\t\t\t\t\t\t*set confidant 2\n\t\t\t\t\t\t\t*goto lala_vs_max\n\t\t\t\t#Tell her everything.\n\t\t\t\t\t\"Okay. Max hates Aurelia.\"\n\n\t\t\t\t\t\"Because of envy?\" Renee asks. \"She told me who she was and why she was applying under an assumed name, but I hadn't realised those lovely movies were based on her work. That's more than just successful, isn't it?\"\n\n\t\t\t\t\t\"Yes,\" you say, feeling a twinge of envy yourself. \"Yes, she was ridiculously successful. But I'm not sure that envy is the reason Max hated her. He hated her before you told us who she was, and I don't think it was envy. It was something else.\"\n\n\t\t\t\t\t\"Enough to kill her?\" Renee asks.\n\n\t\t\t\t\t\"Maybe.\"\n\n\t\t\t\t\t\"I think you should talk to him,\" she says. \"Carefully.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Maybe another day.\"\n\t\t\t\t\t\t\t\"Very well,\" says Renee. \"Just… be careful. Keep in mind that whoever hated Aurelia may not be her killer. Not all hatred leads to violence.\"\n\n\t\t\t\t\t\t\t\"I will,\" you say.\n\t\t\t\t\t\t\t*goto part_two\n\t\t\t\t\t\t#\"Will you come with me, as a lie detector?\"\n\t\t\t\t\t\t\t\"Of course,\" she says, but her apparent confidence is betrayed by the way her hands immediately start to shake.\n\t\t\t\t\t\t\t*goto max_door\n\t\t\t\t#Ask if she's ever had magical insight.\n\t\t\t\t\t\"Has the magic every made you know something about someone, without knowing why you know?\" you ask.\n\n\t\t\t\t\tRenee pauses to answer, first sorting out your garbled question and then thinking about what to say. \"I think so. Don't worry; I won't tell anyone what you tell me, or where the information comes from.\"\n\t\t\t\t\t*goto anon\n*else\n\tYou wake up staring at the ceiling. In all the chaos, it's relaxing to look at a plain white space—well, plain except for the antique moulding. But even though you will yourself to be calm, the image of Aurelia's blood-spattered room is printed on your retinas. \n\n\tThis time is different. There are details you didn't consciously notice before. There's a gap in the blood that looks almost like a knife. A long knife. Something that wouldn't be easy to hide. Yet it's no longer there.\n\n\tSince when were you so observant, even when you're not in the room?\n\t*label magic_four\n\t*choice\n\t\t*disable_reuse #It was just a dream.\n\t\t\tThe stress of Aurelia's murder is definitely weighing on you. You close your eyes and wait for sleep to come back.\n\n\t\t\tSomething jabs you in the leg—hard. You sit up and look, but there's nothing there. When you lie down again, it happens again.\n\n\t\t\tEventually, you have to face facts: the magic is annoyed you're not paying attention. It won't be ignored.\n\t\t\t*goto magic_four\n\t\t#Try to remember other details.\n\t\t\tYou force yourself to keep looking at the ceiling as the memory of Aurelia's bloody corpse becomes clearer and clearer in your mind's eye. This is unlike any memory you've had before. You can smell the slightly off scent of wine lingering in the air of her room, and the thicker, mustier smell of her drying blood. Her bleached-blonde hair still held a tiny toxic note from the chemicals she used on it, and her discarded shoes still carried a hint of her sweat.\n\n\t\t\tHer narrow desk was pinned up against the wall, but there was a corner of paper sticking out. Thirteen drops of scarlet on her curtain.\n\n\t\t\tHow on earth did you know how many drops of blood were on the fabric? Or are you imagining things?\n\n\t\t\tThe police said not to go in, but if you crack open the door you'll be able to count the drops of blood and confirm if this is magic or your overactive imagination.\n\t\t\t*choice\n\t\t\t\t#Count the blood drops.\n\t\t\t\t\tYou creep into the hallway, pathetically grateful that no one sees you. It takes a moment to realise that they wouldn't think you'd lost your mind—they'd think you're the murderer.\n\n\t\t\t\t\tBut then you're at Aurelia's door, and a new fear stops you in your tracks. It's not just that you don't want to open the door of that tiny box of death. It's the fear that you're right. The suspicion that you just had a bad dream is enough to make you wrap your shirt around your hand and turn the handle.\n\n\t\t\t\t\tYou don't look at the awful spatter and stain on the floor, but even forcing your eyes away, you cen clearly see the shape of a long knife among the blood; left there while she bled out, and then taken away. It seems she saw her killer. But you're looking at the curtain. In such a small room, you can see it clearly without stepping inside.\n\n\t\t\t\t\tYes. Thirteen drops. More on the bed, and the floor, and the walls. But thirteen on the curtain. You close the door and go back to your room, wondering if this magic can help you stop Aurelia's killer from going free.\n\t\t\t\t\t*goto part_two\n\t\t\t\t#Try to think where you've seen a long knife lately.\n\t\t\t\t\tAs soon as the thought forms in your mind, you feel an irritating tickle in your mind. \n\t\t\t\t\t*label tickle\n\n\t\t\t\t\tIt's exactly like someone drawing a feather over your skin, except it feels like it's on the inside of your skull, right at the base of your neck. You scratch, even though you know it won't help.\n\n\t\t\t\t\tClearly, some part of your mind knows something—or the magic does. Feeling like a fool, you focus once more on the white ceiling, and breathe slowly, waiting for… something.\n\n\t\t\t\t\tAnd then you see it. The curiosity case in the foyer, with old kitchen tools and such in it. There was a knife. A long knife, and sharp. You walk out of your room in a daze and go to look at the case.\n\n\t\t\t\t\tSure enough, the knife is gone.\n\t\t\t\t\t*goto part_two\n\t\t\t\t#Go back to sleep.\n\t\t\t\t\tYou lie back and close your eyes, but it's no use. There's an irritating tickle in your mind. \n\t\t\t\t\t*goto tickle\n\t\t#Tell Renee.\n\t\t\tYou once again hear music coming from her room/office, so you knock quietly. Then you knock somewhat louder. After all, she's playing music so she probably didn't hear you the first time.\n\n\t\t\tThe music shuts off and Renee opens her door. \n\n\t\t\t\"I think I know something,\" you say, speaking quickly before you lose your nerve. \"About Aurelia.\"\n\n\t\t\t\"Oh,\" she says, observing your hesitation. \"Do you mean you've received some kind of magical insight?\"\n\n\t\t\t\"Maybe?\"\n\n\t\t\tShe grabs you by the arm and drags you into her office. \"Tell me everything.\"\n\t\t\t*choice\n\t\t\t\t#\"I saw the knife.\"\n\t\t\t\t\t\"Where?\" she says.\n\t\t\t\t\t*label knife\n\n\t\t\t\t\t\"I didn't see it exactly, just the shape of where the knife had been as Aurelia died,\" you say, \"but… very clearly. If I saw it again, I would know it.\"\n\n\t\t\t\t\tShe gasps. \"I might know where it is!\"\n\n\t\t\t\t\t\"Where?\"\n\n\t\t\t\t\tYou follow her into the hall, where the glass cabinet of historical artefacts is mounted on the wall.\n\n\t\t\t\t\tShe stands and stares, and once again begins weeping. \"It's gone. The knife is gone.\"\n\n\t\t\t\t\t\"There was a knife in there?\" you ask, staring at broken crockery, small bells, and yellowed paper.\n\n\t\t\t\t\tEven as you speak, you remember it as if you'd held it in your hands. \"That's it,\" you say. \"That's the knife that killed Aurelia.\"\n\t\t\t\t\t*goto part_two\n\t\t\t\t#\"I think I have some kind of magical memory.\"\n\t\t\t\t\t\"What did you remember?\" she asks.\n\n\t\t\t\t\t*goto knife\n\t\t\t\t#\"You tell me your powers first.\"\n\t\t\t\t\t\"You already know I can tell when someone is lying,\" she says. \"I also get feelings about people.\"\n\n\t\t\t\t\t\"Like if they're the kind to kill?\" you ask.\n\n\t\t\t\t\t\"Not so specific. Other things, like if they'll be offended if I say I'm asexual, or if they're calmer after the murder than before.\"\n\n\t\t\t\t\t\"Who?\" you say at once.\n\n\t\t\t\t\tRenee pauses, and then comes to a decision. \"Eric.\"\n\n\t\t\t\t\tYou let yourself take in that information. It could make all the difference—or perhaps Eric is simply one of those people who feels better in a crisis.\n\n\t\t\t\t\t\"I remembered a knife.\"\n\n\t\t\t\t\t\"Where?\"\n\t\t\t\t\t*goto knife\n*label part_two\n*label second_part\n*label brekkie\n\nYou feel dizzy with the magic now filling your life, and realise you haven't eaten breakfast yet. It's a relief to feel the mundane sensation of hunger, and you head for the fridge at once. You can see Bruce eating his instant porridge outside, and Tamsin and Eric chatting over their cereal.\n*choice\n\t#Eat outside with Bruce.\n\t\tYou take your bowl to the wooden table and give Bruce a smile. For once, he smiles back, emboldening you to actually have a conversation. \"I thought you couldn't go outside?\"\n\n\t\t\"Not usually,\" he says. \"In the early morning, when the house casts full shade, I can give myself a few minutes without significant harm. But I am basically a vampire.\" He glances at you shyly, quickly looking away so you barely catch a glimpse of those red eyes.\n\n\t\t\"Do you drink blood?\"\n\n\t\t\"Actually I really like those bright blue vodka cruisers,\" he says, \"which somewhat diminishes my terrifying aspect.\"\n\n\t\tYou laugh, and suddenly he's looking at you properly, surprised.\n\t\t*choice\n\t\t\t#\"I don't think you're terrifying.\"\n\t\t\t\t*set bruce %+10\n\t\t\t\t\"Don't tell anyone,\" he says. \"My publisher will make me interact with the public if you let on that I'm not curmudgeonly by choice.\"\n\n\t\t\t\t\"Surely being curmudgeonly is always a choice,\" you say.\n\n\t\t\t\t\"People like sunshine,\" he says, \"and sight. I can't read faces—I recognise people by their voices—and I'm constantly scuttling away from all the nicest conversational places.\"\n\n\t\t\t\t\"Is your time up?\" you ask. \n\n\t\t\t\t\"Indeed it is,\" he says, glancing at the disappearing shadow on the grass. \"Besides which, this is more socialising than I've done in months.\"\n\n\t\t\t\t\"Would you like to stay in touch?\" you ask. \"Online, when this retreat is done?\"\n\n\t\t\t\t\"I would,\" he says, and he's actually smiling as he takes his empty bowl inside.\n\t\t\t\t*goto meeting\n\t\t\t#\"I'm still terrified of you, I promise.\"\n\t\t\t\t*set bruce %+10\n\t\t\t\t\"That's a relief,\" he says. \"For a moment there my reputation for being a vile specimen of humanity was in danger.\"\n\n\t\t\t\t\"Your eyes make me want to write a story about you,\" you say.\n\n\t\t\t\t\"Eauch,\" he says. \"I'd be a terrible character. Too boring. My idea of a life goal is owning a bigger basement so I can have bigger gaming screens.\"\n\n\t\t\t\t\"Can you play video games?\" you ask.\n\n\t\t\t\t\"Sometimes,\" he says. \"I can see shapes, light and darkness. Sometimes that's enough. Not a fan of a grimdark pallet though.\"\n\t\t\t\t\n\t\t\t\t\"Fair enough.\"\n\t\t\t\t*goto meeting\n\t\t\t#\"You're still under suspicion of murder.\"\n\t\t\t\tHe winces. \"I think Renee suspects me.\"\n\n\t\t\t\t\"Oh really? I thought she blamed herself.\"\n\n\t\t\t\t\"Both,\" he says. \"Aurelia was a classic crime fiction victim—short, blonde, beautiful. I am ugly, antisocial, and albino. The closest thing to an evil troll in this town. If this was fiction, I really would be the killer.\"\n\n\t\t\t\t\"So Renee's theory that the house is causing this would also implicate you,\" you say.\n\n\t\t\t\t\"Exactly.\" He pauses, awkwardly. \"I didn't do it, by the way.\"\n\n\t\t\t\t\"I don't believe the house's magic is that powerful,\" you say slowly. \"Whoever murdered Aurelia meant to do it.\"\n\n\t\t\t\t\"I agree.\"\n\t\t\t\t*goto meeting\n\t#Eat inside with Tamsin and Eric.\n\t\tYou fill your bowl and balance it awkwardly on your lap as you eat. Eric is sitting at one of the spare tables, turned awkwardly so that he doesn't have his back to you and Tamsin.\n\n\t\tTamsin is eating as if she's starved, digging into a bowl filled almost to overflowing with fresh berries and desiccated coconut. She grins at you and keeps eating.\n\n\t\t\"Good morning,\" says Eric. \"I mean, not good exactly. But morning. I'm glad you're not dead.\" He pauses to slap himself in the head.\n\n\t\t\"Settle down, Eric,\" you say. \"I'm also glad I'm not dead, okay? It's a positive sentiment.\"\n\n\t\tTamsin chokes on a strawberry and coughs for what feels like a very long time before recovering and indicating she agrees.\n\t\t*choice\n\t\t\t#\"How's your writing going, Eric?\"\n\t\t\t\t*set eric %+10\n\t\t\t\tHis whole body sags with relief. \"Actually, it's going well. I know it's awful, but Aurelia's death clarified things for me.\"\n\n\t\t\t\t\"I feel the same,\" says Tamsin softly. \"What if I died in the middle of this book? It's silly, but it makes me realise how much my writing means to me.\"\n\n\t\t\t\t\"Neither of you are awful,\" you say. \"We're writers, after all. It's how we cope with things like this.\"\n\n\t\t\t\t\"And with life,\" Eric says softly. \"I feel like if I don't write things down, they're not really real.\"\n\n\t\t\t\t\"Same for me,\" says Tamsin. \"Except, for me it's as if, when I don't write something in a story, it will be forgotten.\" She makes a face. \"My therapist says it's leftover egocentrism that I should have moved past as a child. Either way, it's motivating.\"\n\t\t\t\t*goto meeting\n\t\t\t#\"How's your writing going, Tamsin?\"\n\t\t\t\t*set tamsin %+10\n\t\t\t\t\"I feel sort of… scared,\" she says. \"Not of being murdered, exactly, but just the idea of leaving a book unfinished.\"\n\n\t\t\t\t\"Surely leaving your friends and family is more frightening than leaving the fictional characters hanging,\" you say.\n\n\t\t\t\t\"Nope,\" she says. \"Not for me. My friends and family would suffer, certainly, but death is part of life. An unfinished story, however, is an aberration.\"\n\n\t\t\t\t\"Your readers would certainly agree,\" says Eric.\n\t\t\t\t*goto meeting\n\t\t\t#\"I wish I could just go home.\"\n\t\t\t\t\"Me too,\" says Eric, \"except I'll come back here every Sunday.\"\n\n\t\t\t\t\"Oh,\" you say. \"I'd forgotten you were a member of Renee's congregation.\"\n\n\t\t\t\t\"Yeah,\" he says. \"She assures me it didn't give me an edge in the application, but I'm not sure I believe her. I'm definitely the least qualified writer here.\"\n\n\t\t\t\t\"It depends how you measure writing qualifications,\" says Tamsin. \"If you made it to this retreat, then you qualified to be here. Which means you're on a level with all of us by the only rational metric.\"\n\n\t\t\t\tEric laughs. \"Well argued! If it means I'm one of you I'd be a fool to disagree.\"\n\t\t\t\t*goto meeting\n\t#Eat by yourself on the front balcony.\n\t\tYou take your bowl and head out through the front door, wincing as the sun hits you.\n\n\t\t\"Hi $!{name},\" says Max.\n\n\t\t\"Oh!\" you say. \"I didn't see you there.\"\n\n\t\t\"My poor heart,\" he says over-dramatically. \"And here I was thinking you sought me out.\"\n\t\t*choice\n\t\t\t#\"I'm glad for your company, if you'll abide mine.\"\n\t\t\t\t*set max %+10\n\t\t\t\t\"Of course,\" he says, shoving one of the chairs towards you with his foot.\n\n\t\t\t\tYou take a seat and eat your breakfast, half watching Max and half watching the brightening sky.\n\n\t\t\t\tHe toys with his food, barely eating.\n\n\t\t\t\t\"Are you all right?\" you ask.\n\n\t\t\t\t\"Not really,\" he says. \"Yesterday changed things. The world doesn't work the way I thought it did.\"\n\n\t\t\t\t\"Are you afraid?\"\n\n\t\t\t\t\"Yes. And I don't think this is the kind of wound that heals with time.\"\n\t\t\t\t*goto meeting\n\t\t\t#\"Not this time.\"\n\t\t\t\t\"Will you join me, all the same?\" he asks. \"I'd rather not be alone with my thoughts right now.\"\n\n\t\t\t\tYou sit beside him, and notice that he's barely eaten a mouthful. \"Are you afraid, knowing someone in this house is a murderer?\"\n\n\t\t\t\t\"Yes,\" he says. \"It makes me wonder what everyone is capable of, given reason and opportunity. Including me.\"\n\n\t\t\t\t\"I'm just scared they'll attack me next.\"\n\n\t\t\t\t\"Oh, I hadn't really thought of that,\" he says. \"Now I'm more terrified than ever.\"\n\n\t\t\t\t\"Sorry.\"\n\t\t\t\t*goto meeting\n\t\t\t#Make your excuses and find somewhere private to sit.\n\t\t\t\t\"Actually I wanted to sit in silence this time,\" you say. \"No reflection on you.\"\n\n\t\t\t\t\"No offence taken,\" he says, but he watches as you walk around corner of the front deck to settle on a different table, facing a new direction. It's not the most spectacular view, but it's still lovely.\n\n\t\t\t\tYou barely taste your cereal, focusing on the distant mountains and wondering how much of the quiet town before you knows that a young woman was murdered so close by.\n\n\t\t\t\tYou've never been so close to a murder, and part of you is fascinated by the swirl of feelings in your own heart. Another part is angry to have your life derailed by the pain of someone you hardly knew.\n*label meeting\n*page_break\nYou finish your meal and take the bowl to the kitchen bench. Renee is in the rear balcony, clearly not eating but waiting to gather people as they pass. \n\n\"Do I have time to brush my teeth?\" you ask.\n\nShe nods, and you do so. By the time you return everyone is gathered, waiting for Renee to say her piece.\n\n\"The police believe one of us murdered Aurelia,\" she says. \"None of you seem like killers to me, but we have to face facts. We're all suspects.\"\n\n\"Get to the point,\" says Bruce.\n\n\"I think we should search the house,\" she says. \"Working in pairs, so that everyone is checking everyone else. You can choose to search your own room if you wish, or to avoid it.\"\n\nShe turns to you. \"$!{name}, would you rather…\"\n*choice\n\t#Search the Nursery with Tamsin?\"\n\t\t*set tamsin %+10\n\t\t\"Excellent,\" says Renee. \n\n\t\tTamsin shrugs and the pair of you go to the Nursery.\n\t\t*if room = 1\n\t\t\t\"Don't worry,\" says Tamsin. \"I'm not going to examine your personal stuff. Nancy Drew I'm not.\"\n\n\t\t\t\"But what if I've hidden the murder weapon in my suitcase?\" you say.\n\n\t\t\tShe just shrugs. \"Not worth it.\"\n\t\t\t*goto aa\n\t\t*else\n\t\t*label aa\n\n\t\tYou divide the small room into a grid and take turns pacing back and forth before checking the curtains, cupboard, and under the bed. You learn a little about the limits of Renee's housekeeping (clearly her arms aren't long enough to vacuum all the way to the wall under the bed) but that's it.\n\n\t\tTamsin sits on the bed. \"I have a suspect.\"\n\t\t*set tamsinmagic true\n\t\t*choice\n\t\t\t#\"Really? Who?\"\n\t\t\t\t\"Eric Mitchell,\" she says. \"I'm 90% sure.\"\n\n\t\t\t\t\"So, sure enough to tell me, but not sure enough to tell the police?\"\n\n\t\t\t\t\"Exactly.\" She sighs, glancing at the door leading outside, where Eric and Renee are conducting their own search. \n\t\t\t\t*label tambit\n\n\t\t\t\t\"When I woke up this morning, the magic kind of landed in my head.\"\n\n\t\t\t\t\"It told you he's the killer?\"\n\n\t\t\t\t\"Not quite. It told me that he's happier since Aurelia was killed.\"\n\n\t\t\t\t\"He did seem calmer today,\" you admit. \"But that doesn't mean he's a murderer. Maybe he just likes a good crisis.\"\n\n\t\t\t\t\"That's my 10% of doubt,\" she says. \"But what does the magic want? Why tell me something like that? And why didn't the house just tell me in words that he's the killer?\"\n\n\t\t\t\t\"I don't know. Renee isn't even sure the magic is benign. But I don't think it changes who we are.\"\n\n\t\t\t\t\"Neither do I,\" she says.\n\t\t\t\t*if magic = 3\n\n\t\t\t\t\t\"I also woke up knowing something,\" you say. \"Max hated Aurelia. Still does. He knew who she was all along.\"\n\n\t\t\t\t\t\"Huh,\" she says. \"I still think it was Eric, though. Maybe.\"\n\t\t\t\t\t*goto post_meeting\n\t\t\t\t*else\n\t\t\t\t*goto post_meeting\n\t\t\t#\"Based on what?\"\n\t\t\t\t\"On magic,\" she says, without a hint of shame.\n\t\t\t\t*goto tambit\n\t\t\t#\"Don't tell me. I'll be devastated if it's someone I like.\"\n\t\t\t\t\"Eric Mitchell,\" she says, without bothering to appear apologetic.\n\n\t\t\t\t\"Our one-man fan club?\" you say. \"Now I have to know why.\"\n\t\t\t\t*goto tambit\n\t#Search the Dining Room with Lala?\"\n\t\t\"Excellent,\" says Renee.\n\n\t\tLala grins at you and leads the way, cutting through the kitchen since the entry to the hall is blocked by the others.\n\n\t\tIt's a mercifully small room despite the doors on every wall. \n\t\t*if (room = 2) and (lala_love = 1)\n\t\t\t\"I'd love to look through your undies,\" she says. \"But I won't insist.\"\n\n\t\t\t\"They're not exciting, I assure you,\" you say.\n\n\t\t\t\"Not without you in them, no,\" Lala agrees.\n\t\t\t*goto ff\n\t\t*if (room = 2) and ((lala_love = 0) or (lala_love > 5))\n\t\t\t\"I'm not going near your stuff,\" she says. \"In case you were wondering.\"\n\t\t\t*goto ff\n\t\t*else\n\t\t*label ff\n\n\t\t\"You're the crime writer,\" you say. \"Where do we start?\"\n\n\t\t\"Don't pretend you've never watched CSI,\" she says. \"We walk the grid.\"\n\n\t\tYou take turns checking over every inch of the floor, walls, and carpet, but leave the fireplace until last.\n\n\t\t\"I don't suppose a stranger could have rapelled in from the roof?\" Lala says hopefully. \"Santa, perhaps?\"\n\t\t*choice\n\t\t\t#\"Let's look.\"\n\t\t\t\t*label look\n\t\t\t\tShe kneels in front of the cold grate to closely examine the ancient soot, looking at and sniffing each section before she explores it with her hands.\n\n\t\t\t\t\"Shall I get a cloth to clean you up?\" you ask.\n\n\t\t\t\t*if killer = 1\n\t\t\t\t\tShe turns up her palms, and they're barely dusty. \"It's been cleaned. I'm sure of it.\"\n\t\t\t\t\t*goto dust\n\t\t\t\t*else\n\t\t\t\t\tShe wipes her hands on her skirt. \"It's not too bad.\"\n\t\t\t\t*label dust\n\t\t\t\tYou kneel to join her, noting that the only smell is faint dust rather than any hint of smoke. \"I deduce that this hasn't been used in decades.\"\n\n\t\t\t\t\"Agreed.\"\n\n\t\t\t\tYou lean forward awkwardly and look up the chimney. There's actually a hint of reflected sunlight. \"The abseiling villain theory holds. We're looking for someone with a width slightly less than the palm of my hand.\"\n\n\t\t\t\t\"Evil trained sparrow?\" she says, still hopeful.\n\t\t\t\t*label weapon\n\n\t\t\t\t\"You could lower a weapon in,\" you point out. \"If you had the time and expertise to climb on the roof before and after the murder.\"\n\n\t\t\t\t\"Or just stick it onto the inside of the chimney somehow,\" Lala points out.\n\n\t\t\t\tYou reach up and feel all around the chimney as far as you can, twisting your shoulder uncomfortably. A few small chunks of soot fall into your hair.\n\n\t\t\t\tThe back wall of the fire slopes forward from base to top, but it does have a top.\n\t\t\t\t*choice\n\t\t\t\t\t#You could be onto something. Trust your instincts.\n\t\t\t\t\t\t*if mental_health > 50\n\t\t\t\t\t\t\tAs a rule, you're pretty smart—so you persist.\n\t\t\t\t\t\t\t*goto lala_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel a panic attack coming, so you back off.\n\t\t\t\t\t\t\t*goto lose\n\t\t\t\t\t#It's an awkward spot, but you're flexible.\n\t\t\t\t\t\t*if fitness > 50\n\t\t\t\t\t\t\tFortunately you keep yourself in shape, so you're able to persist.\n\t\t\t\t\t\t\t*goto lala_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour shoulder gives you a twinge of warning, and you back off. Physical effort isn't your thing.\n\t\t\t\t\t\t\t*goto lose\n\t\t\t\t\t#A killer would appreciate an unusual hiding spot like this.\n\t\t\t\t\t\t*if imagination > 50\n\t\t\t\t\t\t\tIf you'd just killed someone, you'd make a bit of extra effort. So you persist in the difficult search.\n\t\t\t\t\t\t\t*goto lala_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIt's too hard. You can't imagine it's worth it anyway.\n\t\t\t\t\t\t\t*goto lose\n\t\t\t\t*label lala_knife_win\n\t\t\t\t*if killer = 1\n\n\t\t\t\t\tYour finger hits something that isn't dust, soot, or brick. Instinct pulls your hand away before your brain can tell you what it was. But you realise at once what you've found: a knife. \n\n\t\t\t\t\tPresumably, this is the same knife that killed Aurelia.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Tell Lala, then take it out and call the police.\n\t\t\t\t\t\t\t*label confess_lala\n\t\t\t\t\t\t\t\"Lala,\" you say. \"I think I just found the murder weapon.\"\n\n\t\t\t\t\t\t\t\"Don't smudge it!\" she says, and runs into the kitchen, coming back with a pair of rubber kitchen gloves and a lasagna dish. \n\n\t\t\t\t\t\t\t\"Will those help?\" you ask.\n\n\t\t\t\t\t\t\t\"I don't know!\"\n\n\t\t\t\t\t\t\tYou put on the gloves and use two fingers to bring out the knife and drop it in the dish. Lala snaps on the plastic lid and then stares at you.\n\n\t\t\t\t\t\t\t\"Did we just solve this case?\" she says, losing all her calm in an instant.\n\n\t\t\t\t\t\t\t\"Maybe?\"\n\t\t\t\t\t\t\t*label call\n\n\t\t\t\t\t\t\tYou try to dial the police, but the stupid internet won't give you the non-emergency number. Eventually you simply call 000, wincing as the operator asks you which emergency service you requre. It takes a little while to convince the police you're not a prank call, but eventually they assure you they're just twenty minutes away.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t*if (room = 2) #\"Why was the knife in my room?\"\n\t\t\t\t\t\t\t\t\tLala hesitates for a long moment, so transparent that she doesn't even turn her face away from yours as she visibly considers the fact that you might be the killer.\n\n\t\t\t\t\t\t\t\t\t\"No,\" she says at last. \"Not your room. Max's room. The fireplaces connect.\"\n\t\t\t\t\t\t\t\t\t*label lala_accuse_max\n\n\t\t\t\t\t\t\t\t\t\"Not Max!\"\n\n\t\t\t\t\t\t\t\t\tShe shakes her head grimly. \"I don't like this. If only the police would hurry up!\"\n\t\t\t\t\t\t\t\t\t*if max_love = 1\n\n\t\t\t\t\t\t\t\t\t\tYou slump to the floor, remembering Max's kisses. \"Do you think he dated me so I'd be too caught up to join the dots?\"\n\n\t\t\t\t\t\t\t\t\t\tLala reaches for your hand. \"You're very attractive. I'm sure his feelings for you are genuine, even if he is the murderer.\"\n\n\t\t\t\t\t\t\t\t\t\tIt's more comforting than it should be.\n\t\t\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t\t*if ((room = 1) or (room = 3)) #\"Why was the knife in your room?\"\n\t\t\t\t\t\t\t\t\t\"Oh!\" she says, belatedly realising the implications of the knife found in her fireplace. \"Surely no one hates me so—no! Hold on. It's not my room. It's Max's room. The fireplaces connect.\"\n\t\t\t\t\t\t\t\t\t*goto lala_accuse_max\n\t\t\t\t\t\t\t\t#\"Does the fireplace connect to Max's room?\"\n\t\t\t\t\t\t\t\t\tShe places her finger on her lips and nods silently. The pair of you move to the opposite side of the room and speak in low voices.\n\n\t\t\t\t\t\t\t\t\t\"The fireplaces connect,\" she says. \"If you and I are innocent, then Max. . \"\n\t\t\t\t\t\t\t\t\t*goto lala_accuse_max\n\t\t\t\t\t\t\t\t#\"We have to act normal, or the killer will know what we found.\"\n\t\t\t\t\t\t\t\t\tLala starts to shake in fear. \"How much longer?\" she whispers.\n\n\t\t\t\t\t\t\t\t\t\"Nineteen minutes,\" you say.\n\n\t\t\t\t\t\t\t\t\tShe moans, and covers her face with her hands. \"This isn't fun at all!\"\n\n\t\t\t\t\t\t\t\t\t\"I know Lala. It's not like the stories.\"\n\n\t\t\t\t\t\t\t\t\t\"Ow, my stomach. I think I'm going to be sick.\"\n\n\t\t\t\t\t\t\t\t\t\"Not on the knife!\"\n\n\t\t\t\t\t\t\t\t\tShe laughs weakly, and pushes the container towards you.\n\t\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t#Don't tell Lala, but call the police.\n\t\t\t\t\t\t\t*if (proactive + honest) \u003c 100\n\t\t\t\t\t\t\t\tYou emerge from the fireplace and give a noncommital shrug, trusting in your past reticence and dishonesty to help you now.\n\n\t\t\t\t\t\t\t\t\"Well, that was somewhat lacking in excitement,\" says Lala, heaving herself to her feet with the aid of a nearby armchair.\n\t\t\t\t\t\t\t\t*if lalamagic = true\n\t\t\t\t\t\t\t\t\tYou know she can tell from your eyes if you're lying, so you take advantage of the moment she's turned away from you.\n\t\t\t\t\t\t\t\t\t*goto liarliar\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label liarliar\n\n\t\t\t\t\t\t\t\t\"Totally,\" you say, trying not to flinch as she turns back to face you. \"What do we do now?\"\n\n\t\t\t\t\t\t\t\t\"I'm sure Renee has other places for us to search,\" she says, \"but wouldn't you rather not?\"\n\n\t\t\t\t\t\t\t\tYou laugh, and it sounds incredibly fake to your ears. \"Shall we have some coffee?\"\n\n\t\t\t\t\t\t\t\t\"Sure.\"\n\n\t\t\t\t\t\t\t\t\"I'm just going to hop to the bathroom.\"\n\n\t\t\t\t\t\t\t\t\"Sure.\"\n\n\t\t\t\t\t\t\t\tShe follows you to the rear balcony—watching you, or just being friendly?—and you head for the bathroom without daring to turn back.\n\t\t\t\t\t\t\t\t*label call_l\n\n\t\t\t\t\t\t\t\tYou try to dial the police, but the stupid internet won't give you the non-emergency number. Eventually you simply call 000 and ask to speak to the police. It takes a little while to convince them you're not a prank call, but they assure you they're just twenty minutes away.\n\n\t\t\t\t\t\t\t\tAfter flushing and washing your hands, you return to join Lala and try to act normal for an interminable stretch of time.\n\t\t\t\t\t\t\t\t*comment have the knife vanish, coz m took it? Ditto next option\n\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*set lala %-20\n\t\t\t\t\t\t\t\t*set lalamagic true\n\t\t\t\t\t\t\t\tYou know you're not a good liar, but you have to try.\n\n\t\t\t\t\t\t\t\t\"Well, that's a bust,\" you say.\n\n\t\t\t\t\t\t\t\t\"So you found something,\" she says flatly. \"I'm a magical lie detector at present, so there's no use denying it.\"\n\n\t\t\t\t\t\t\t\t\"Uh… yes,\" you admit, seeing suspicion flare to life in her eyes.\n\t\t\t\t\t\t\t\t*goto confess_lala\n\t\t\t\t\t\t#Tell Lala, then leave it where it is and call the police.\n\t\t\t\t\t\t\t\"Lala, the knife is there. In the fireplace.\"\n\n\t\t\t\t\t\t\tYou withdraw your hand carefully. \"I touched it.\"\n\n\t\t\t\t\t\t\t\"Are you sure?\"\n\n\t\t\t\t\t\t\t\"I'm sure. We need to call the police. Now.\"\n\t\t\t\t\t\t\t*goto call_l\n\t\t\t\t\t\t#Don't tell Lala. Keep the knife for yourself.\n\t\t\t\t\t\t\t*if (proactive + honest) \u003c 100\n\t\t\t\t\t\t\t\t*set clue_three 3\n\t\t\t\t\t\t\t\tYou emerge from the fireplace and give a noncommital shrug, trusting in your past reticence and dishonesty to help you now.\n\n\t\t\t\t\t\t\t\t\"Well, that was somewhat lacking in excitement,\" says Lala, heaving herself to her feet with the aid of a nearby armchair.\n\t\t\t\t\t\t\t\t*if lalamagic = true\n\t\t\t\t\t\t\t\t\tYou know she can tell from your eyes if you're lying, so you take advantage of the moment she's turned away from you.\n\t\t\t\t\t\t\t\t\t*goto liarliarb\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label liarliarb\n\n\t\t\t\t\t\t\t\t\"Totally,\" you say, trying not to flinch as she turns back to face you. \"What do we do now?\"\n\n\t\t\t\t\t\t\t\t\"I'm sure Renee has other places for us to search,\" she says, \"but wouldn't you rather not?\"\n\n\t\t\t\t\t\t\t\tYou laugh, and it sounds incredibly fake to your ears. \"Shall we have some coffee?\"\n\n\t\t\t\t\t\t\t\t\"Sure.\"\n\n\t\t\t\t\t\t\t\t\"I'll just be a second.\"\n\n\t\t\t\t\t\t\t\t\"Sure.\"\n\n\t\t\t\t\t\t\t\tCareful not to touch the knife, you take it, wrap it in plastic, and hide it beneath your own mattress. You know for a fact the police have already looked there.\n\n\t\t\t\t\t\t\t\tYour heart is beating like crazy. If you can kill the killer with their own weapon, no one will suspect you.\n\t\t\t\t\t\t\t\t*goto post_meeting\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*set lala %-20\n\t\t\t\t\t\t\t\t*set lalamagic true\n\t\t\t\t\t\t\t\tYou know you're not a good liar, but you have to try.\n\n\t\t\t\t\t\t\t\t\"Well, that's a bust,\" you say.\n\n\t\t\t\t\t\t\t\t\"So you found something,\" she says flatly. \"I'm a magical lie detector at present, so there's no use denying it.\"\n\n\t\t\t\t\t\t\t\t\"Uh… yes,\" you admit, seeing suspicion flare to life in her eyes.\n\t\t\t\t\t\t\t\t*goto confess_lala\n\t\t\t\t*else\n\t\t\t\t\t*label lose\n\t\t\t\t\tThere's nothing there but more black dust.\n\t\t\t\t\t*goto post_meeting\n\t\t\t#\"Surely it's blocked off by now?\"\n\t\t\t\t\"Let's see,\" says Lala.\n\t\t\t\t*goto look\n\t\t\t#\"If only I could believe that.\"\n\t\t\t\t\"Same,\" says Lala. \"Oh well.\"\n\t\t\t\t*goto look\n\t\t\t*if (unlocked_door = 1) #Tell her that you unlocked the door connecting the Master and Dining Rooms.\n\t\t\t\t\"The door between my room and the Master Bedroom—Max's room—is unlocked.\"\n\n\t\t\t\t\"I assumed as much,\" she says calmly. \"Now let's look in the fireplace properly.\"\n\t\t\t\t*goto look\n\t#Search the Master Bedroom with Max?\"\n\t\t*set max %+10\n\t\t\"Excellent,\" says Renee.\n\n\t\tMax quirks an eyebrow and leads the way into his room. \"Do you prefer sorting through my dirty or clean underwear?\"\n\n\t\t\"Neither, thank you.\"\n\n\t\t\"But what if I've hidden my weapon in there?\"\n\n\t\t\"Your weapon doesn't scare me.\"\n\n\t\tHe laughs delightedly before getting down to a reasonably thorough search. The room is both large and tall, and it's not an easy job. \n\t\t*choice\n\t\t\t#Search the fireplace first.\n\t\t\t\t*label kneel\n\t\t\t\tYou kneel in front of the fireplace, noting that the only smell is faint dust rather than any hint of smoke. \n\n\t\t\t\tLeaning forward awkwardly, you look up the chimney. There's actually a hint of reflected sunlight. Even though the fireplace has been bricked up, it hasn't been fully sealed.\n\n\t\t\t\t*label weapon_m\n\t\t\t\tYou reach up and feel all around the chimney as far as you can, twisting your shoulder uncomfortably. A few small chunks of soot fall into your hair.\n\n\t\t\t\tThe back wall of the fire slopes forward from base to top, but it does have a top.\n\t\t\t\t*choice\n\t\t\t\t\t#You could be onto something. Trust your instincts.\n\t\t\t\t\t\t*if mental_health > 50\n\t\t\t\t\t\t\tAs a rule, you're pretty smart—so you persist.\n\t\t\t\t\t\t\t*goto max_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel a panic attack coming, so you back off.\n\t\t\t\t\t\t\t*goto lose\n\t\t\t\t\t#It's an awkward spot, but you're flexible.\n\t\t\t\t\t\t*if fitness > 50\n\t\t\t\t\t\t\tFortunately you keep yourself in shape, so you're able to persist.\n\t\t\t\t\t\t\t*goto max_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour shoulder gives you a twinge of warning, and you back off. Physical effort isn't your thing.\n\t\t\t\t\t\t\t*goto lose\n\t\t\t\t\t#A killer would appreciate an unusual hiding spot like this.\n\t\t\t\t\t\t*if imagination > 50\n\t\t\t\t\t\t\tIf you'd just killed someone, you'd make a bit of extra effort. So you persist in the difficult search.\n\t\t\t\t\t\t\t*goto max_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIt's too hard. You can't imagine it's worth it anyway.\n\t\t\t\t\t\t\t*goto lose\n\t\t\t\t*label max_knife_win\n\t\t\t\t*if killer = 1\n\t\t\t\t\tYour finger hits something that isn't dust, soot, or brick. Instinct pulls your hand away before your brain can tell you what it was. But you realise at once what you've found: a knife. \n\n\t\t\t\t\tPresumably, this is the same knife that killed Aurelia.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Tell Max, then take it out and call the police.\n\t\t\t\t\t\t\t*label confess_max\n\t\t\t\t\t\t\t\"Max,\" you say. \"I think I just found the murder weapon.\"\n\n\t\t\t\t\t\t\t\"What?\" he says, jumping down off the bed to reach into the fireplace after you, drawing out the knife and then dropping it on the carpet in shock.\n\n\t\t\t\t\t\t\t\"That's it. That's what killed her. We have to call the cops!\"\n\n\t\t\t\t\t\t\t*label calll\n\n\t\t\t\t\t\t\tYou try to dial the police, but the super slow internet won't give you the non-emergency number. Eventually you simply call 000 and ask to speak to the police. It takes a little while to convince them you're not a prank call, but eventually they assure you they're just twenty minutes away.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"Why was the knife in your room?\"\n\t\t\t\t\t\t\t\t\t*label guilty_act\n\n\t\t\t\t\t\t\t\t\t\"Oh!\" he says. \"This is serious. I'm going to be in real trouble, aren't I?\"\n\n\t\t\t\t\t\t\t\t\t\"What do you want me to do?\"\n\n\t\t\t\t\t\t\t\t\t\"Nothing,\" he says. \"The police are coming. They'll work it out. Just… wow. This is heavy.\"\n\t\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t\t#\"Why did you just grab it like that?\"\n\t\t\t\t\t\t\t\t\t*goto guilty_act\n\t\t\t\t\t\t\t\t#\"We have to act normal, or the killer will know what we found.\"\n\t\t\t\t\t\t\t\t\t\"It's only going to be a few minutes,\" he says. \"No one will disturb us.\"\n\n\t\t\t\t\t\t\t\t\tHe looks at you steadily, and it's you that looks away.\n\t\t\t\t\t\t\t\t\t*goto guilty_act\n\t\t\t\t\t\t#Don't tell Max, but call the police.\n\t\t\t\t\t\t\t*if (proactive + honest) \u003c 100\n\t\t\t\t\t\t\t\tYou move away from the fireplace and take all the cushions off one of the armchairs, trusting in your past reticence and dishonesty to help you now.\n\n\t\t\t\t\t\t\t\tOf course, if the knife is his then he'll have watched you very carefully as you reached into the fireplace.\n\n\t\t\t\t\t\t\t\t\"Wanna come get a coffee with me?\" you say, ashamed and terrified to hear the quaver in your voice.\n\n\t\t\t\t\t\t\t\t\"Nah, I'm good. But you go ahead, if you like.\"\n\n\t\t\t\t\t\t\t\tThe door is a million miles away, and Max is a giant with super strength. But he doesn't stop you, and you reach the relative safety of the hall without dying. You head for the bathroom without daring to turn back.\n\t\t\t\t\t\t\t\t*label calllm\n\n\t\t\t\t\t\t\t\tYou try to call the police, but the stupid internet won't give you the non-emergency number. Eventually you simply call 000 and ask to speak to the police. It takes a little while to convince them you're not a prank call, but they assure you they're just twenty minutes away.\n\n\t\t\t\t\t\t\t\tAn eternity.\n\n\t\t\t\t\t\t\t\tAfter flushing and washing your hands, you return to join Max and try to act normal for an interminable stretch of time.\n\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*set max %-20\n\t\t\t\t\t\t\t\tYou know you're not a good liar, but you have to try.\n\n\t\t\t\t\t\t\t\t\"Well, that's a bust,\" you say—and you feel yourself flush.\n\n\t\t\t\t\t\t\t\t\"So you found something,\" Max says flatly.\n\n\t\t\t\t\t\t\t\t\"Uh… yes,\" you admit, seeing suspicion flare to life in his eyes.\n\t\t\t\t\t\t\t\t*goto confess_max\n\t\t\t\t\t\t#Don't tell Max. Keep it for yourself.\n\t\t\t\t\t\t\t*if (proactive + honest) \u003c 100\n\t\t\t\t\t\t\t\t*set clue_three 3\n\t\t\t\t\t\t\t\tYou emerge from the fireplace and give a noncommital shrug, trusting in your past reticence and dishonesty to help you now.\n\n\t\t\t\t\t\t\t\t\"Ah well,\" says Max. \"What do we do now?\"\n\n\t\t\t\t\t\t\t\tYou laugh, and it sounds incredibly fake to your ears. \"Shall we have some coffee?\"\n\n\t\t\t\t\t\t\t\t\"Sure.\"\n\n\t\t\t\t\t\t\t\t\"I'll just be a second.\"\n\n\t\t\t\t\t\t\t\t\"Sure.\"\n\n\t\t\t\t\t\t\t\tCareful not to touch the knife, you take it, wrap it in plastic, and hide it beneath your own mattress. You know for a fact the police have already looked there.\n\n\t\t\t\t\t\t\t\tYour heart is beating like crazy. If you can kill the killer with their own weapon, no one will suspect you.\n\t\t\t\t\t\t\t\t*goto post_meeting\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*set max %-20\n\t\t\t\t\t\t\t\tYou know you're not a good liar, but you have to try.\n\n\t\t\t\t\t\t\t\t\"Well, that's a bust,\" you say—remembering too late that Max is no fool.\n\n\t\t\t\t\t\t\t\t\"So you found something,\" Max says flatly.\n\n\t\t\t\t\t\t\t\t\"Uh… yes,\" you admit, seeing suspicion flare to life in her eyes.\n\t\t\t\t\t\t\t\t*goto confess_max\n\t\t\t\t*else\n\t\t\t\t\tThere's nothing there but more black dust.\n\t\t\t\t\t*goto post_meeting\t\n\t\t\t#Search the curtains first.\n\t\t\t\tYou panic only a little when it occurs to you that there might be spiders lurking in the heretofore-undisturbed upper reaches.\n\n\t\t\t\tMax is thoroughly disappeared under the bed, so once you're done with the curtains you head to the fireplace. \n\t\t\t\t*goto kneel\n\t\t\t#Search through Max's things first.\n\t\t\t\tIt's certainly obvious from the stink that Max has kept up his exercise routine. You sort through his things gingerly, finding nothing that hints of murder.\n\n\t\t\t\tOnce you're done with his stuff, you turn to the fireplace.\n\t\t\t\t*goto kneel\n\t*if (loki_no = 0) #Search the Playroom with Bruce?\"\n\t\t*set bruce %+10\n\t\t*set brucemagic true\n\t\t\"Excellent,\" says Renee.\n\n\t\tBruce trails after you into the Playroom. \"You do realise I am absolutely not going to go through someone else's belongings?\"\n\n\t\t\"Fair enough,\" you say. \"Speaking of privacy… may I ask what magic you've gained through being here?\"\n\n\t\tHis eyebrows shoot up. \"You may. I'll even answer you: I can understand Loki when he talks, and I seem to be able to… well, to fly.\"\n\n\t\t\"You can fly!?!\"\n\n\t\tHe winces. \"I'm not comfortable discussing it yet, let alone actually doing it. But I'm determined to figure it out. Alone.\"\n\n\t\t\"Okay then.\"\n\n\t\tBetween the two of you, you search the entire room: curtains, floor, furniture, and cupboards. You crouch to examine the bricked-up fireplace, and reach inside to feel around in the chimney as much as you can.\n\t\t*if magic = 1\n\t\t\tThere's a little shelf inside, thick with dust bunnies. Making a face, you withdraw your hand and shake off a loose tangle of cat hair and black dirt.\n\n\t\t\t*if (loki_no = 0) and (loki_saved = 0)\n\t\t\t\tBruce laughs aloud, surprising you. \"Loki had a hiding place! I had a fireplace once, and I had to close it off because the cats loved hiding in it so much.\"\n\t\t\t\t*goto hiya\n\t\t\t*else\n\t\t\t\tBruce laughs aloud, surprising you. \"Loki has a hiding place! I had a fireplace once, and I had to close it off because the cats loved hiding in it so much.\"\n\t\t\t*label hiya\n\n\t\t\t\"Hiding place!\" you say. The pieces fall into place: the killer will realise that Loki will lead someone to their hiding place. That's why they want him dead.\n\n\t\t\t\"Oh!\" says Bruce a moment later. \"You think someone hid a murder weapon in there?\"\n\n\t\t\t\"No,\" you say. \"but this isn't the only fireplace in the house, is it?\"\n\t\t\t*label llloki\n\t\t\tBruce shakes his head. \"I'm not checking the others. What if the murderer sees us?\"\n\n\t\t\t\"I'll do it,\" you say. \n\n\t\t\t\"Suits me.\"\n\n\t\t\tYou linger in your room waiting for an opportunity to search the other two fireplaces.\n\n\t\t\tYou kneel in front of the fireplace in the Dining Room, noting that the only smell is faint dust rather than any hint of smoke. \n\n\t\t\tLeaning forward awkwardly, you look up the chimney. There's actually a hint of reflected sunlight. Even though the fireplace has been bricked up, it hasn't been fully sealed.\n\t\t\t*goto weapon_b\n\t\t*else\n\t\t\tYou touch something warm and furry, like an enormous spider, that jerks in shock under your hand.\n\t\t\t*choice\n\t\t\t\t#Scream.\n\t\t\t\t\tYou shriek in terror, making Bruce jump.\n\t\t\t\t\t*goto what\n\t\t\t\t#\"Uh… Bruce?\"\n\t\t\t\t\t*label what\n\n\t\t\t\t\t\"What is it?\" he says.\n\n\t\t\t\t\t\"It's alive,\" you say, unable to provide more information than that.\n\n\t\t\t\t\tA moment later Loki jumps down from a hidden perch inside the fireplace and calmly walks past you to accept a pat from Bruce.\n\t\t\t\t\t*goto ohh\n\t\t\t\t#Grab it and pull it out.\n\t\t\t\t\tGritting your teeth, you grab a solid handful and yank it out into the Playroom.\n\n\t\t\t\t\tLoki twists in your grip, hissing and clawing in the half second before you let go, and then darts across the room to hide behind Bruce.\n\t\t\t\t\t*label ohh\n\n\t\t\t\t\t\"You have no idea how relieved I am to see you,\" you tell the cat.\n\n\t\t\t\t\t*if talking_cat = 1\n\t\t\t\t\t\t\"The feeling is not mutual,\" Loki says.\n\n\t\t\t\t\t\tYou and Bruce exchange an exasperated glance. \n\n\t\t\t\t\t\tLoki washes himself, unimpressed.\n\n\t\t\t\t\t\t\"Wait on,\" says Bruce. \"If Loki can fit in there, so could a murder weapon.\"\n\n\t\t\t\t\t\tYou both search the space thoroughly, and find nothing. \"Okay,\" you say. \"Now for the Dining Room and Master Bedroom.\"\n\n\t\t\t\t\t\t*goto llloki\n\t\t\t\t\t*if magic = 1\n\t\t\t\t\t\t\"The feeling is not mutual,\" says Bruce.\n\n\t\t\t\t\t\tYou sigh and sit down. \"Please convery my apologies. I don't suppose Loki has given you any hint of why someone wants him dead?\"\n\n\t\t\t\t\t\tBruce's eyes widen, and he crouches to examine the fireplace. \"Who would think to look inside a fireplace for a hiding spot—other than a cat?\"\n\n\t\t\t\t\t\t\"And perhaps a killer?\" you say.\n\n\t\t\t\t\t\tHe grunts as he thoroughly checks the inside of the fireplace. \"Nothing in this one—which leaves the Dining Room and Max's room.\"\n\n\t\t\t\t\t\t\"We should—\"\n\n\t\t\t\t\t\t\"Not it!\" he says, and smiles sheepishly. \"I'll try to keep people out of the way, but I'm not going to look. I am, however, going to keep this cat safe. Come on, let's search my room together so no one else finds out where Loki is hidden.\"\n\n\t\t\t\t\t\tHe catches Loki neatly, and heads back to his room. You give it a quick search with him, and then linger in your room waiting for an opportunity to search the other two fireplaces.\n\t\t\t\t\t\t*label lloki\n\t\t\t\t\t\tYou kneel in front of the fireplace in the Dining Room, noting that the only smell is faint dust rather than any hint of smoke. \n\n\t\t\t\t\t\tLeaning forward awkwardly, you look up the chimney. There's actually a hint of reflected sunlight. Even though the fireplace has been bricked up, it hasn't been fully sealed.\n\n\t\t\t\t\t\t*label weapon_b\n\t\t\t\t\t\tYou reach up and feel all around the chimney as far as you can, twisting your shoulder uncomfortably. A few small chunks of soot fall into your hair.\n\n\t\t\t\t\t\tThe back wall of the fire slopes forward from base to top, but it does have a top.\n\t\t\t\t\t\t*if killer = 1\n\t\t\t\t\t\t\tYour finger hits something that isn't dust, soot, or brick. Instinct pulls your hand away before your brain can tell you what it was. But you realise at once what you've found: a knife. \n\n\t\t\t\t\t\t\tPresumably, this is the same knife that killed Aurelia.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Take it out and call the police.\n\t\t\t\t\t\t\t\t\tYou draw it out as gently as you can and drop it on the carpet, realising too late you probably just put your fingerprints all over it. This is why you're a writer, not a crack homicide detective.\n\n\t\t\t\t\t\t\t\t\t*label call_b\n\t\t\t\t\t\t\t\t\tYou trying to dial the police, but the stupid internet won't give you the non-emergency number. Eventually you simply call 000 and ask to speak to the police. It takes a little while to convince them you're not a prank call, but they assure you they're just twenty minutes away.\n\t\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t\t#Leave it there and call the police.\n\t\t\t\t\t\t\t\t\tYou move away from the fireplace and get out of the room before anyone notices you acting suspicious. Mercifully, the bathroom is free. You can close and lock that door without drawing attention—at least, not for a few minutes.\n\n\t\t\t\t\t\t\t\t\tYou try to dial the police, but the stupid internet won't give you the non-emergency number. Eventually you simply call 000 and ask to speak to the police. It takes a little while to convince them you're not a prank call, but they assure you they're just twenty minutes away.\n\n\t\t\t\t\t\t\t\t\tAn eternity.\n\n\t\t\t\t\t\t\t\t\tAfter flushing and washing your hands, you return to the rear balcony and try to act normal for an interminable stretch of time.\n\t\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t\t#Don't tell anyone. Keep it for yourself.\n\t\t\t\t\t\t\t\t\t*set clue_three 3\n\t\t\t\t\t\t\t\t\tCareful not to touch the knife, you take it, wrap it in plastic, and hide it beneath your own mattress. You know for a fact the police have already looked there.\n\n\t\t\t\t\t\t\t\t\tYour heart is beating like crazy. If you can kill the killer with their own weapon, no one will suspect you.\n\t\t\t\t\t\t\t\t\t*if (proactive + honest) \u003c 100\n\n\t\t\t\t\t\t\t\t\t\tBruce barely even looks at you as you join the others.\n\t\t\t\t\t\t\t\t\t\t*goto post_meeting\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*set bruce %-20\n\t\t\t\t\t\t\t\t\t\tBruce glances up at you as you join the others, and immediately stiffens before carefully returning his focus to his coffee.\n\n\t\t\t\t\t\t\t\t\t\tHe knows. But he's not saying anything—yet.\n\t\t\t\t\t\t\t\t\t\t*goto post_meeting\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThere's nothing there. Where else would only a cat—or a murderer—notice as a hiding place?\n\n\t\t\t\t\t\t\tFor the moment, you don't know.\n\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t*else\n\t\t\t\t\t\tBruce laughs, and then sees your confusion and stops. \"You can't hear Loki talking, can you?\"\n\n\t\t\t\t\t\t\"You can?\"\n\n\t\t\t\t\t\tHe winces. \"So it would seem.\"\n\n\t\t\t\t\t\t\"Do pass on my apology,\" you say stiffly. \"Shall we search your room next?\"\n\n\t\t\t\t\t\t\"Might as well.\"\n\n\t\t\t\t\t\tAt least it's small, and when you're done you leave Bruce alone and return to the rear balcony.\n\t\t\t\t\t\t*goto post_meeting\n\t#Search the ouside of the house with Eric?\"\n\t\t\"Excellent,\" says Renee.\n\n\t\tYou and Eric put shoes on and head out the front door. The enormous block looks suddenly daunting, and you're glad Renee specified that you're sticking to the external area of the house.\n\n\t\t\"Hmm,\" says Eric, looking up at the curve of the corrugated iron roof. \"I'm not sure I want to go climbing up there.\"\n\n\t\t\"Me neither.\"\n\n\t\tYou head left, searching as much of the wide balcony and external bricks as you can. Since you're leading the way, Eric checks everything behind you.\n\n\t\t\"What does a clue actually look like?\" you ask him.\n\n\t\tHe gives you a sheepish smile. \"I was hoping you knew.\"\n\n\t\t\"Ah well. I'm sure the police will check everything properly, if they haven't already.\"\n\n\t\tYou head downstairs and circle the lower part of the house, squeezing behind large bushes and stepping gingerly over plants that may or may not be weeds.\n\n\t\tThe slate bricks are gorgeous, but you're getting fairly sick of grey, blue, and beige by the time you round the first corner and come upon the wooden door leading underneath the house.\n\n\t\tEric tries the handle. \"Locked,\" he says, and leans closer. \"And it's not saying anything.\" \n\t\t*if ericmagic = false\n\t\t\t*set ericmagic true\n\t\t\tHe blushes. \"Uh… the house talks to me. A bit. Sometimes.\"\n\t\t\t*goto choi\n\t\t*else\n\t\t*label choi\n\t\t*choice\n\t\t\t#Move on.\n\t\t\t\t*set eric %+10\n\t\t\t\t*label move_on\n\t\t\t\tIt's already stinking hot, and this search is most likely a waste of time. You and Eric carry on, kicking over rocks and dodging spiderwebs as you manage almost a full circuit of the rectory.\n\n\t\t\t\t\"Ugh,\" says Eric. \"I stink. Shall we call it?\"\n\n\t\t\t\t\"Absolutely,\" you say. \"I'm done.\"\n\t\t\t\t*goto post_meeting\n\t\t\t#Reach through the rotten wood to unlatch it.\n\t\t\t\t\"Not for long,\" you say with a wicked grin, and choose your angle of attack to try to get the door open without damaging it further. The edge of one of the newer planks repairing the door scrapes your wrist, but the door opens.\n\t\t\t\t*goto roomy\n\t\t\t#\"Wait here. I'll go ask Renee for the key.\"\n\t\t\t\tYou find Renee searching Bruce's room and she gives you the key to the door under the house, which turns easily enough. It's clear the lock is a relatively recent addition.\n\t\t\t\t*label roomy\n\n\t\t\t\tEven the underside of the house has high ceilings—at first. The opening is at least eight feet high, but the slope is so steep it virtually meets the floor of the house on the other side of the storage area. \n\n\t\t\t\tUnder your feet, the dirt is perfectly dry, like sand. There are several rows of portable steel shelves used for the church's annual Flower Festival, and some regular dusty wooden shelves to your right. The external walls of the original house come straight down to the ground in front of you, blocking off most of the area, but a patch of bricks has fallen out of the wall. It's clear tradesmen have used the narrow opening to send wires into the house.\n\n\t\t\t\tYou crouch and shine your phone torch through the hole, seeing more sloping dirt, a few wires clearly added to the house long after it was originally built, and nothing else.\n\t\t\t\t*choice\n\t\t\t\t\t#You could be onto something. Trust your instincts.\n\t\t\t\t\t\t*if mental_health > 50\n\t\t\t\t\t\t\tAs a rule, you're pretty smart—so you persist.\n\t\t\t\t\t\t\t*goto eric_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel a panic attack coming, so you back off.\n\t\t\t\t\t\t\t*goto lose\n\t\t\t\t\t#It's an awkward spot, but you're flexible.\n\t\t\t\t\t\t*if fitness > 50\n\t\t\t\t\t\t\tFortunately you keep yourself in shape, so you're able to persist.\n\t\t\t\t\t\t\t*goto eric_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour shoulder gives you a twinge of warning, and you back off. Physical effort isn't your thing.\n\t\t\t\t\t\t\t*goto lose\n\t\t\t\t\t#A killer would appreciate an unusual hiding spot like this.\n\t\t\t\t\t\t*if imagination > 50\n\t\t\t\t\t\t\tIf you'd just killed someone, you'd make a bit of extra effort. So you persist in the difficult search.\n\t\t\t\t\t\t\t*goto eric_knife_win\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIt's too hard. You can't imagine it's worth it anyway.\n\t\t\t\t\t\t\t*goto lose_eric\n\t\t\t\t\t\t*label eric_knife_win\n\t\t\t\t\t\tYou poke your head through the hole and examine the shadows beside it.\n\t\t\t\t\t\t*if killer = 1\n\t\t\t\t\t\t\t*label lose_eric\n\t\t\t\t\t\t\tThere's nothing but more dirt, as far as you can tell. You'd like to feel righteous for doing a good job, but you can't help feeling like there might be spiders in your hair.\n\n\t\t\t\t\t\t\t*goto move_on\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tOh.\n\n\t\t\t\t\t\t\tYep, that's the knife that killed Aurelia. It looks like it's been sitting half-buried in the dirt for an age.\n\n\t\t\t\t\t\t\tTime to call the police.\n\n\t\t\t\t\t\t\tYou pull your head out of the darkness, banging it on the broken bricks.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Use your pain to draw away Eric's attention so he doesn't know what you saw.\n\t\t\t\t\t\t\t\t\t*if (honest + proactive) \u003c 100\n\t\t\t\t\t\t\t\t\t\tHopefully your natural caution and habit of white lies will pay off now.\n\n\t\t\t\t\t\t\t\t\t\t\"Ouch! Ow ow ow ow ow!\" you say.\n\n\t\t\t\t\t\t\t\t\t\t\"Are you all right?\" asks Eric, shining his torch right in your eyes.\n\n\t\t\t\t\t\t\t\t\t\t\"Arg, my eyes!\" you say, and Eric immediately starts apologising.\n\n\t\t\t\t\t\t\t\t\t\tThe pair of you stumble outside and continue your search. You're grateful for the excuse of your sore head so you can go inside and call the police. They say they'll be there in twenty minutes.\n\t\t\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*set eric %-20\n\t\t\t\t\t\t\t\t\t\tYou wish you weren't so habitually honest.\n\n\t\t\t\t\t\t\t\t\t\t\"Well… nothing there,\" you say.\n\n\t\t\t\t\t\t\t\t\t\tIt's obvious Eric doesn't believe you for a moment. You've just told him you suspect him. There's only one thing you can do to attempt to fix things.\n\n\t\t\t\t\t\t\t\t\t\t*goto confess_eric\n\t\t\t\t\t\t\t\t#Tell Eric what you saw.\n\t\t\t\t\t\t\t\t\t*goto look_e\n\t\t\t\t\t\t\t\t#Reach back and grab the knife to show Eric.\n\t\t\t\t\t\t\t\t\t*label confess_eric\n\t\t\t\t\t\t\t\t\tYou pull out the knife.\n\t\t\t\t\t\t\t\t\t*label look_e\n\n\t\t\t\t\t\t\t\t\t\"Eric…\" you say slowly. \"We just found the murder weapon! This is the knife that killed Aurelia.\"\n\n\t\t\t\t\t\t\t\t\tThere's an awful moment of hesitation, and your stomach drops into your shoes. Perhaps you shouldn't have trusted Eric with what you found.\n\n\t\t\t\t\t\t\t\t\t\"Are you sure?\" he says. \"This doesn't seem like an especially secure hiding spot.\"\n\n\t\t\t\t\t\t\t\t\t\"I'm sure,\" you say.\n\n\t\t\t\t\t\t\t\t\t\"Wow,\" he says, and blows out a big breath.\n\n\t\t\t\t\t\t\t\t\tHe takes the knife and carries it outside into the light, turning it from side to side. \"I think you're right. We need to call the cops.\"\n\n\t\t\t\t\t\t\t\t\tYou take out your mobile and make the call. They say they'll arrive in twenty minutes.\n\t\t\t\t\t\t\t\t\t*goto police\n\t\t\t\t\t\t\t\t#Don't tell Eric. Keep it for yourself.\n\t\t\t\t\t\t\t\t\t*if (proactive + honest) \u003c 100\n\t\t\t\t\t\t\t\t\t\t*set clue_three 3\n\t\t\t\t\t\t\t\t\t\tYou emerge from the fireplace and give a noncommital shrug, trusting in your past reticence and dishonesty to help you now.\n\n\t\t\t\t\t\t\t\t\t\t\"Ah well,\" says Eric. \"What do we do now?\"\n\n\t\t\t\t\t\t\t\t\t\tYou laugh, and it sounds incredibly fake to your ears. \"Shall we have some coffee?\"\n\n\t\t\t\t\t\t\t\t\t\t\"Sure.\"\n\n\t\t\t\t\t\t\t\t\t\t\"I'll just be a second.\"\n\n\t\t\t\t\t\t\t\t\t\t\"Sure.\"\n\n\t\t\t\t\t\t\t\t\t\tCareful not to touch the knife, you take it, wrap it in plastic, and hide it beneath your own mattress. You know for a fact the police have already looked there.\n\n\t\t\t\t\t\t\t\t\t\tYour heart is beating like crazy. If you can kill the killer with their own weapon, no one will suspect you.\n\t\t\t\t\t\t\t\t\t\t*goto post_meeting\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*set eric %-20\n\t\t\t\t\t\t\t\t\t\tYou know you're not a good liar, but you have to try.\n\n\t\t\t\t\t\t\t\t\t\t\"Well, that's a bust,\" you say—remembering too late that Eric is smarter than he seems.\n\n\t\t\t\t\t\t\t\t\t\t\"So you found something,\" he says flatly.\n\n\t\t\t\t\t\t\t\t\t\t\"Uh… yes,\" you admit, seeing suspicion flare to life in her eyes.\n\t\t\t\t\t\t\t\t\t\t*goto confess_eric\n\t\t\t\t\t#\"You want to look, Eric?\"\n\t\t\t\t\t\t\"No thanks,\" he says. \"I trust you.\"\n\t\t\t\t\t\t*goto move_on\n*label police\n\nIt's the longest twenty minutes of your life, but finally the police arrive—sirens screaming. It's the same pair of police as you met before.\n\nEveryone gathers on the front porch.\n\n\"$!{name}?\" says the tall woman. \"You discovered a knife that you believe was used to kill Miss Whatsit?\"\n\n*if killer = 1\n\t\"Yes,\" you say, feeling incredibly self-conscious. You show them the fireplace and the knife, and they take photos and notes, including questioning who was located where in the house during your discovery, and who touched the knife.\n\n\tThen they leave, arresting no one. It isn't over yet.\n\t*goto bb\n*else\n\t\"Yes,\" you say, feeling incredibly self-conscious. You show them the hole under the house and the knife, and they take photos and notes, including questioning who was located where in the house during your discovery, and who touched the knife.\n\n\tThen they leave, arresting no one. It isn't over yet.\n*label bb\n*label post_meeting\n*page_break\nNext time you think to check a clock, it's time for lunch.\n\nEveryone is exhausted; wrung out from the effort of the search as well as the emotional dissonance of sharing a home with strangers under such dire suspicion.\n\nRenee and Lala try valiantly to keep up a light and airy conversation, but it falls flat.\n\nAfter lunch, you're grateful for the opportunity to be alone in your room.\n*choice\n\t#Work on your novel.\n\t\t*set word_count +2000\n\t\tA big part of you just wants to curl up and cry, but instead you sit at your laptop. All your sweatiness and fear fades away, and your story takes over.\n\n\t\tNext time you look up, you've written another thousand words. Not bad!\n\n\t\tIt's reassuring that in this strange new world of real magic and equally real murder, you are still fundamentally yourself: a writer.\n\t\t*if writing_sessions = 0\n\t\t\t*set writing_sessions 1\n\t\t\tWhat's more, you've finally decided on your viewpoint character.\n\t\t\t*fake_choice\n\t\t\t\t#Skye, a woman.\n\t\t\t\t#Cash, a man.\n\t\t\t\t\t*set hero_pronoun \"he\"\n\t\t\t\t\t*set hero_name \"cash\"\n\t\t\t\t#Tun, a genderfluid person.\n\t\t\t\t\t*set hero_pronoun \"they\"\n\t\t\t\t\t*set hero_name \"tun\"\n\t\t\t*goto endy\n\t\t*if writing_sessions = 1\n\t\t\t*set writing_sessions 2\n\t\t\tThe inciting incident involves \n\t\t\t*fake_choice\n\t\t\t\t#Keesha, a woman.\n\t\t\t\t#Sam, who is intersex.\n\t\t\t\t\t*set pronoun \"they\"\n\t\t\t\t\t*set named \"sam\"\n\t\t\t\t#Mike, a man.\n\t\t\t\t\t*set pronoun \"he\"\n\t\t\t\t\t*set named \"mike\"\n\t\t\t*goto endy\n\t\t*else\n\t\t\tAnd you've firmly decided on your ending. It'll be\n\t\t\t*fake_choice\n\t\t\t\t#Happy.\n\t\t\t\t\t*set happy %+10\n\t\t\t\t\t*set ending 1\n\t\t\t\t#Tragic.\n\t\t\t\t\t*set happy %-10\n\t\t\t\t\t*set ending 3\n\t\t\t\t#Bittersweet.\n\t\t\t\t\t*set happy %-5\n\t\t\t\t\t*set ending 2\n\t\t\t*goto endy\n\t#Write an old-fashioned journal entry.\n\t\t*set mental_health %+10\n\t\tYour brain feels like an overstuffed suitcase, so you sit down and write; ignoring grammar and spelling and style to lose yourself in the pen-and-paper therapy session. You write about Aurelia, and Renee, and the other writers, and finish by drawing a picture of Loki.\n\n\t\tAfter you're finished, you do feel better.\n\t\t*goto endy\n\t#Sleep.\n\t\t*set fitness %+10\n\t\tYou lie down and fall asleep at once.\n*label endy\n\nSlowly but surely, the day wears away. There is another awkward dinner, and then everyone pretends they're going to sleep at 8pm.\n*finish Day Four", "chapter_one_mmm": "*rand killer 1 2\nIt's hard to kill someone you love, but that's the job. You can't deny that you enjoy the rush. The question is, how will you do the deed? Do you make them suffer? Do you make it ironic? Do you make it fast or slow? Or is it all about hurting those left alive?\n\nYou smile, enjoying the power of life and death in your fingertips. It's always about hurting those left alive. Always.\n\nNow, what manner of death will cause the most pain?\n\n*page_break\nWith a sigh, you begin typing your second-favourite character's death scene. Tears prick your eyes, and you hesitate. Still, if JK Rowlings cried over Remus Lupin then perhaps your tears are a good sign. Maybe after this short story, you'll be ready to try and write a full novel for the first time. You blow your nose and start typing an emotional farewell for poor doomed ——\n\nThe phone rings. The actual phone, in the non-fiction world you call reality.\n\n“Hello?” you say, trying not to make it too obvious that you haven’t received a real-life phone call since ‘Gangnam Style’ was a new and exciting choice of ring tone.\n\n“Congratulations! I have some wonderful news for you.”\n\nYour heart sinks. Australian phone numbers are meant to automatically be on a national ‘Do Not Call’ list. So much for that. You bite back an angry comment about how this woman has interrupted you in the middle of writing a crucial scene.\n\n“No thank you.”\n\n“But… you applied. Didn’t you? For the writers’ retreat at Gundagai?”\n\nSure. Probably. Maybe. Do you have to be such an absent-minded writer cliché?\n*fake_choice\n\t#\"Who are you? What kind of scam is this?\"\n\t\t*set trusting %-10\n\t#\"Uh…\"\n\t\t*set proactive %-10\n\t#\"Of course!\"\n\t\t*set honest %-10\n“This is Renee Scott. The rector?”\n\nA piece of mental flotsam rises to the surface of your mind. There was a writing group meeting at a bar, during which you applied for every kind of writing grant, appearance, prize, or even holiday you could find online. Followed by much communal complaining about form rejections, badly-written bestsellers, and the horrors of the blank page. Followed by a hangover. Followed by another story idea that made everything shiny and glorious once again. \n\nYou're too much of a coward to start that novel you've been planning, but at least you have an awesome writing group. That's got to count for something. Oh, and apparently one of your gently-sozzled applications paid off. “The 140 year-old rectory, with lots of rooms?”\n\n“That’s right. Just let me confirm I have the right person. You’re…\n*choice\n\t#Harriet? Harriet Stubbs?”\n\t\t*set name \"Harriet\"\n\t\t*goto christened\n\t#Bing? Bing Foster?”\n\t\t*set name \"Bing\"\n\t\t*goto christened\n\t#[Enter your name]?”\n\t\t*input_text name\n\t\t*goto christened\n*label christened\n“That’s me,” you say.\n\n“Congratulations,” she says again. “You’ll be staying in the rectory beside beautiful St John's church, along with half a dozen other very talented young people.”\n\n“That’s… wow.”\n\n\"Now, what's your preferred pronoun?\"\n*choice\n\t#They/them/their.\n\t\t*set he \"they\"\n\t\t*set his \"theie\"\n\t\t*set him \"them\"\n\t\t*goto pronoun\n\t#Zhe/zhis/zher.\n\t\t*set he \"zhe\"\n\t\t*set his \"zhis\"\n\t\t*set him \"zher\"\n\t\t*goto pronoun\n\t#He/him/his.\n\t\t*goto pronoun\n\t#She/her/hers.\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n*label pronoun\n“Now, which room would you prefer? Three of them are already spoken for, not counting my own, but you can have your pick of the other three. All of the remaining rooms have external doors leading directly onto the wraparound deck, although the views from inside the Playroom are particularly stunning—and it’s the largest remaining room. It has a bricked-up fireplace with the original mantelpiece, and one original window from one hundred and forty years ago, as well as the largest semi-private deck area.\n\n\"The original Nursery is a little small, but nice and close to the common area and bathroom. \n\n\"The original Dining Room has a bricked-up fireplace, doors on all four walls, and is the closest room to the kitchen—which is presumably why the cat tends to favour it despite the relative lack of sunlight.\"\n*choice\n\t#Nursery. $150.\n\t\t*set room 1\n\t\t*set cash -150\n\t\t*set mental_health %-20\n\t\t*goto rooms\n\t#Dining Room. $180.\n\t\t*set room 2\n\t\t*set cash -170\n\t\t*set mental_health %-10\n\t\t*goto rooms\n\t#Playroom. $200.\n\t\t*set room 3\n\t\t*set cash -200\n\t\t*set mental_health %+10\n\t\t*goto rooms\n*label rooms\n“Excellent choice,” she says, apparently with total sincerity. You wonder briefly if an ability to convincingly flatter people is a requirement for the life of a rector.\n\nShe rattles off details, but once she assures you everything important will also be sent through email you relax and let yourself daydream. You wonder if you could base a character on her without offending anyone. Changing the name from Renee Scott wouldn’t be enough. How many rectors does one meet in everyday life?\n\nOr perhaps it would count as good publicity for the church’s writer-based fundraising program. \n*choice\n\t#It’s not like your book will be accepted for publication anyway.\n\t\t*set trusting %-10\n\t\tYou hear the echo of your own sigh against the phone's plastic and realise too late that Renee must have heard it too.\n\n\t\t\"Well,\" she says. \"I'll let you get to packing.\"\n\n\t\t\"Thank you,\" you say with real sincerity, beginning to believe this is really happening. \n\t\t*goto car\n\t#Maybe you should just ask her how she feels.\n\t\t\"Will you be offended if someone resembling you ends up in one of my books?\" you blurt out.\n\n\t\tShe laughs delightedly. \"Of course not! Just please don't make me evil. It seems like all fictional rectors do is preach and murder people.\"\n\n\t\t\"And only one of those is accurate.\"\n\n\t\t\"Indeed.\"\n\t\t*set honest %+10\n\t\t*set renee %+10\n\t\t*goto car\n\t#If you don’t mention it, you can always lie about it if and when it becomes a problem.\n\t\t*set honest %-10\n\t\tThere's a pause in conversation, and you realise you're expected to say something.\n\n\t\t\"Oh yes, certainly,\" you say.\n\n\t\t\"Well, that's all right then,\" she says.\n*label car\n\n\"I'll email you the forms right now,\" Renee goes on, \"and of course the addresses for Max, Lala, and Aurelia.\"\n\n\"Uh… right. Of course,\" you say, wondering what you just agreed to.\n\nRenee says a cheery goodbye, reminds you to email her the details of any food intolerances you have before she starts preparing your meals, and hangs up. \n\nYou stare at your phone, more confused now than you were when it first rang. What have you gotten yourself into?\n*fake_choice\n\t#No one can make meals that are low in both FODMAPs and salicylates. I'll be sick for sure.\n\t\t*set fitness %-10\n\t\t*set tamsin %+10\n\t\t*set trusting %-10\n\t#My heart is already pounding with dread at the idea of being around other people.\n\t\t*set mental_health %-10\n\t\t*set empathetic %-10\n\t\t*set eric %+10\n\t#There's no way I'll be able to focus when there are other people around. ADD sucks.\n\t\t*set knowledge %-10\n\t\t*set art %-10\n\t\t*set lala %+10\nShaking off the fit of nerves, you remind yourself of all the details you can remember from that long-ago application. A gorgeous old house on a hill just a few streets away from Gundagai's main road—such as it is; the town has maybe 3000 people—with a full ten days to concentrate on your book. And other writers in the other rooms, typing their own masterpieces between communal meals. Which are included in the price.\n\nYou open your email, and manage to puzzle out the fact that you've 'volunteered' to drive all three of the other Canberra locals the two hours to Gundagai. Hopefully they're not awful. \n\nIt'll be great. They're writers, aren't they? What could possibly go wrong?\n\nThe grand day arrives rather quickly, and you stuff your last-minute items into your battered suitcase and go to fetch the others. Hopefully being around other writers will help you to finally attack that novel burning inside you.\n*page_break Day One\n\nMaxwell Black is an African American man studying psychology at the Australian National University, and living on site near the centre of town. He writes romance, apparently. You wonder silently where it sits on the scale between G-rated rom-com and hard-core erotica. Presumably the rector wouldn't have selected someone who wrote porn… would she?\n\nLala Naklon is at the same uni, studying forensics. She writes crime. Her name isn't a Teletubbies reference, it's Indonesian. When you google her, you find plenty of pictures—some with a Muslim headscarf, and some without. She's laughing in all of them, and making elaborate cakes in many of them.\n\nAurelia Katz's picture shows a pale woman with long bleached-blonde hair and eyes of such a bright blue they appear to glow from your computer screen. Somehow it makes perfect sense that she writes horror. She works in Tilley's Devine Café and lives across the road from it. You're pretty sure you tripped her over with your laptop cord while writing in the café one time, and desperately hope she doesn't remember you among all the other writers who spend their days lurking in the dark booths of Tilley's. Stupid Canberra. It might be the capital city, but with a population under half a million it's as bad as a small town sometimes. Everyone knows everyone.\n*choice\n\t#Pick up Max first.\n\t\t*set max %+10\n\t\tYou SMS Max to be sure he knows you're on your way, and then get embarrassingly lost in the labyrinthine pathways of the uni. Then you drive past him three times, thinking he looks more like a jock than a writer. But yes, Mr Tall Dark and Handsome is your romance writer.\n\t\t*fake_choice\n\t\t\t#This could be a very pleasant ten days.\n\t\t\t\t*set max %+10\n\t\t\t\t*set maxattraction true\n\t\t\t#I bet he's up himself.\n\t\t\t\t*set max %-10\n\t\t\t#Nice if you like that sort of thing.\n\t\tWith someone in the passenger seat to look for Lala while you drive, it's easy to find the Indonesian crime writer. She greets you with a huge smile and a burst of enthusiasm for P!nk's latest single. It's hard to match this vivacious beauty with the gritty crime writer you found when you read some of her short stories. She asks Max to take the back seat, since rear seat belts sometimes can't reach around her generous shape, and he acquieses with a bow.\n\n\t\tAfter a moment, she starts laughing. \"Max! I remember now. You sit with a bunch of psych nerds—the word 'nerd' is a compliment by the way—in Sullies every afternoon.\"\n\n\t\t*if killer = 1\n\t\t\t\"Guilty!\" he says.\n\t\t\t*goto ji\n\t\t*if killer = 2\n\t\t\t\"That's us,\" he says.\n\t\t*label ji\n\t\t\"Are you one of the bunch that's always hogging the couches?\"\n\n\t\t\"Yes,\" she grins. \"Maybe after this week I'll let you sit on the comfy chairs with us.\"\n\n\t\t\"What if my nerd posse takes them over?\"\n\n\t\t\"I'd like to see you try.\"\n\n\t\tThey continue chatting like old friends as the three of you fetch Aurelia from Tilley's Devine café without any issues, and head out of town.\n\t\t*goto driving\n\t#Pick up Lala first.\n\t\tYou SMS Lala to be sure she knows you're on your way, and then get embarrassingly lost in the labyrinthine pathways of the uni. Every time you see a dark-skinned woman in a headscarf you slow down, then curse yourself for probably panicking half the Muslim population of the campus. \n\n\t\tAt last you find Lala, who isn't wearing a headshawl but has been listening to her ipod, and she jumps into the front seat with a huge smile and a burst of enthusiasm for P!nk's latest single. It's impossible not to smile in return. It's hard to match this vivacious beauty with the gritty crime writer you found when you read some of her short stories. She meets your eye for just a tiny bit longer than she needs to, and smiles in a very different way as she stretches the seatbelt to its full length in order to accomodate her generous proportions.\n\t\t*choice\n\t\t\t#Oh! Suddenly I'm very pleased I met Lala first.\n\t\t\t\t*set lala %+10\n\t\t\t\t*goto lpickup\n\t\t\t#Don't say something stupid about her name. Don't say something stupid about her name.\n\t\t\t\t*set lala %-10\n\t\t\t\t*goto lpickup\n\t\t\t#She can flirt with me any time she likes.\n\t\t\t\t*set lala %+10\n\t\t*label lpickup\n\t\tWith someone in the passenger seat to look for Max while you drive, it's easy to find the surprisingly muscular romance writer. He folds his muscular frame into the back seat and Lala twists around and laughs uproariously. \n\n\t\t\"What is it?\" Max asks her. \n\n\t\t\"I know you!\" she says. \"You sit with a bunch of psych nerds—the word 'nerd' is a compliment by the way—in Sullies every afternoon.\"\n\n\t\t*if killer = 1\n\t\t\t\"Guilty,\" he says.\n\t\t\t*goto ii\n\t\t*if killer = 2\n\t\t\t\"That's us,\" he says.\n\t\t*label ii\n\n\t\t\"Are you one of the bunch that's always hogging the couches?\"\n\n\t\t\"Yes,\" she grins. \"Maybe after this week I'll let you sit on the comfy chairs with us.\"\n\n\t\t\"What if my nerd posse takes them over?\"\n\n\t\t\"I'd like to see you try.\"\n\n\t\tThe three of you fetch Aurelia from Tilley's Devine café without any issues, and head out of town.\n\t\t*goto driving\n\t#Pick up Aurelia first.\n\t\tYour car practically drives itself to Tilley's. Coffee, darkness, and public sockets for people on laptops means that Tilley's is a popular haunt for writers and students. Aurelia's hair practically glows in the darkness and you walk straight to her.\n\n\t\t\"$!{name}?\" she says, and reaches to shake your hand.\n\n\t\tYou find yourself suddenly tongue-tied, lost in those eyes and the soft warmth of her hand. \n\n\t\t\"To Gundagai, right?\" she says.\n\n\t\t\"Oh! Yep.\"\n\t\t*choice\n\t\t\t#Snap out of it.\n\t\t\t\t*goto apickup\n\t\t\t#Yo
