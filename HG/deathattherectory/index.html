 beautiful corpse, the beautiful but damaged heroine of the tale, or the femme fatale?\"\n\n\"I get to be beautiful in all those scenarios,\" you say. \"That's nice.\"\n\n\"But of course,\" she says. \"Now answer the question.\"\n*choice\n\t#\"I'd like to be the heroine, damaged or otherwise. Everyone is damaged in one way or another.\"\n\t\t*set observation %+10\n\t\tShe flashes you an unreadable look, and you wonder if you've offended her.\n\n\t\t\"I agree,\" she says softly.\n\n\t\tYou didn't offend her; you touched her deeply. Not for the first time, you wonder what made her choose crime as her primary genre, and you hope very much that it wasn't some awful life experience.\n\t\t*goto personality\n\t#\"Femme fatales have the best doomsday machines. I'll be your villain.\"\n\t\t*set knowledge %+10\n\t\tShe laughs delightedly. \"You'd be a marvellous villain: smart and complicated. I like it.\"\n\n\t\tYou get the feeling she's delighted by every possible answer, but that doesn't make her joy any less reals. The wave of positive feelings that sweeps out from her at all times is perfectly exhilarating.\n\t\t*goto personality\n\t#\"Too restrictive. Can I be myself?\"\n\t\t*set imagination %+10\n\t\t\"Of course,\" she says. \"It's not meant to make sense, though. If I had to pick one option, I think you're the corpse.\"\n\n\t\t\"Excuse me?\" you say, rather disturbed.\n\n\t\t\"You're perfect,\" she says. \"Perfect and mysterious at the same time.\"\n\n\t\t\"All right then,\" you say. \"If being perfect is what it means, I'll be the corpse.\"\n\n\t\t\"Excellent.\"\n*label personality\n\n\"What about you?\" you ask.\n\n\"I'm the heroine,\" she says. \"Naturally. I make my own story, and I look good doing it.\"\n\n*choice\n\t#\"You certainly do.\"\n\t\t\"I can't take the credit for all this,\" she says with cheerful false modesty. \"I was born pretty.\"\n\t\t*goto meh\n\t#\"Do you really think we make our own story?\"\n\t\t\"I have to,\" she says, with a smile that doesn't fit her tone.\n\t\t*goto meh\n\t#\"Was that some kind of personality test?\"\n\t\t\"Don't worry,\" she says. \"You passed.\"\n*label meh\n\n\"Good to know,\" you say.\n*if lalamagic = false\n\t\"Listen,\" she says. \"I want to ask you a question, and I really mean it. So don't laugh it off, all right?\"\n\n\t\"All right,\" you say slowly, wondering what you're getting yourself into.\n\n\t\"Have you seen anything… unusual since we arrived in Gundagai yesterday?\"\n\t*choice\n\t\t#\"Clearly you have. What was it? I won't judge, I promise.\"\n\t\t\t*set lala %+10\n\t\t\t*set lalamagic true\n\t\t\tShe sighs. \"I think I can tell when people are lying.\"\n\n\t\t\t\"Really? Since yesterday?\"\n\n\t\t\t\"Yes, and in a more or less concrete manner: their eyes turn yellow for a moment.\"\n\n\t\t\t\"That's… incredible!\"\n\n\t\t\t\"I know,\" she says. \"Please don't tell the others. Just… something odd is going on, and I hope it doesn't mean I'm losing my mind.\"\n\t\t\t*goto post_magic\n\t\t#\"I thought Muslims didn't drink?\"\n\t\t\t*set knowledge %+10\n\t\t\t\"It varies,\" she says. \"I didn't drink anything last night, but…\"\n\n\t\t\t\"What did you see that was so unusual?\"\n\n\t\t\t\"Oh, nothing really,\" she says, and you can tell the subject is closed.\n\t\t\t*goto post_magic\n\t\t#Tell her everything.\n\t\t\t*set lalamagic true\n\t\t\t*set honest %+10\n\t\t\t*if talking_walls = 1\n\t\t\t\t\"I… please don't tell the others, but I think the house can talk.\"\n\n\t\t\t\t\"What do you mean?\" She looks utterly flummoxed. Clearly, she wasn't talking about the same thing as you.\n\n\t\t\t\t\"Well, I thought I heard someone speak to me, but no one was there. And it sounded… different. Inhuman.\"\n\n\t\t\t\t\"Woah,\" she says.\n\t\t\t\t*goto post_magic\n\t\t\t*if talking_cat = 1\n\t\t\t\t\"I… please don't tell the others, but I think the cat talked to me.\"\n\n\t\t\t\t\"What do you mean?\" She looks utterly flummoxed. Clearly, she wasn't talking about the same thing as you.\n\n\t\t\t\t\"Well, I thought I heard someone speak to me, but no one was there except Loki. And it sounded… different. Inhuman.\"\n\n\t\t\t\t\"Woah,\" she says.\n\t\t\t\t*goto post_magic\n\t\t\t*if love_lines = 1\n\t\t\t\t\"I… please don't tell the others, but I think I can see lines between people, showing who is attracted to whom.\"\n\n\t\t\t\tShe blushes. \"Including me?\"\n\n\t\t\t\tYou nod, turning away to give her some measure of privacy. \"Is that what you were expecting me to say?\"\n\n\t\t\t\t\"Not even a little. I was going to tell you that I think I suddenly have an ability to tell when someone is lying.\"\n\n\t\t\t\t\"Weird. But sort of similar, in a way.\"\n\t\t\t\t*goto post_magic\n\t\t\t*if lie_detector = 1\n\t\t\t\t\"I… please don't tell the others, but I think I can tell when people are lying.\"\n\n\t\t\t\tShe emits an excited squeak. \"Me too! Their eyes turn yellow?\"\n\n\t\t\t\t\"Yes!\"\n\n\t\t\t\t\"It's not just me?\" she cries in relief.\n\n\t\t\t\t\"Thank you so much for telling me. This is… I've never experienced anything like this.\"\n\n\t\t\t\t\"Same.\"\n\n\t\t\t\t\"Wow.\"\n\t\t\t\t*goto post_magic\n\t\t\t*else\n\t\t\t\t*goto post_magic\n*else\n*label post_magic\n\nYou're getting hungry, so you head inside and make yourself a sandwich. Lala says she has a great idea for a murder and hurries off to her room, but \n*goto lunch\n*label max_path\nYou and Max get your shoes on and walk down the steep hill toward the main street, passing the mailbox of the church, which is made from a metal barrel with an open back and a slot cut into the front. \n\nThe roads are not as winding as in Canberra, which means there are a couple of four-way intersections despite the contours of the hill. Altogether, it looks like a peaceful and prosperous small town, with one or two houses that look their age and others that could have been built less than a decade ago if it wasn't for the established gardens. \n\n\"The nearest gym is in Tumut,\" he says, \"but the mountain is the next best thing.\"\n\n\"You're such a city boy,\" you say.\n\n\"If you count Canberra as a city,\" he laughs. \"My own home town is about the same size, but of course without so many government buildings.\"\n\nThere's a funny look in his eye, as if he knows exactly what you think of his flirtatious persona.\n*if love_lines = 1\n\t\n\tYou realise he must be seeing the love lines between people, just like you.\n\t*goto abd\n*else\n*label abd\n*fake_choice\n\t#I blush, hoping he doesn't mind that I find him attractive.\n\t\t*set max_love 5\n\t#I look back at him boldly, letting him see he's not my type. At all.\n\t\t*set max_love 0\n\t#I grin at him, knowing I can flirt with impunity and he won't think I'm into him.\n\t\t*set max_love 0\n\"Shall we check out the shops?\" he asks.\n*choice\n\t#\"Better not—writer's income being what it is.\"\n\t\t*set honest %+10\n\t\t\"I'm not doing too badly, actually,\" he says. \"Romance is where the money's at. Can I buy you a coffee?\"\n\n\t\t\"I never say no to free food.\"\n\n\t\t\"Oh, so you think I'll be buying you cake as well, do you?\"\n\n\t\t\"You said it, not me.\"\n\n\t\tThe pair of you enjoy a delicious chocolate cake at the local café, thoroughly destroying all the benefits of your walk. It's absolutely worth it.\n\t\t*goto two\n\t#\"Sure.\"\n\t\t*set cash -20\n\t\t*set max %+10\n\t\tMax heads right into Woolies. \n\n\t\t\"Are you aware that Woolworths also exists in Canberra?\" you say. \n\n\t\tHe flashes you a guilty grin. \"I'm something of a junk food connosoir. Every shop is slightly different, even from the same chain. Aha! Kool fruits.\"\n\n\t\t\"Really?\"\n\n\t\t\"Really really. Kool mints are common, but not many places stock the fruit. They're like mentos, but better.\"\n\n\t\t\"You're weirdly passionate about this,\" you say.\n\n\t\t\"Why do you think I go to the gym? Hey  look! Reese's pieces. And Whittakers dark chocolate blocks. Gundagai clearly has exceptional taste in junk food.\"\n\t\t*goto two\n\t#\"For coffee or curiosity?\"\n\t\t*set knowledge %+10\n\t\t\"Curiosity,\" he says. \"I like the idea of being able to walk along the whole main street of an entire town in half an hour.\"\n\n\t\t\"But of course we'll take longer than that,\" you say.\n\n\t\t\"Definitely!\"\n\n\t\tThe pair of you meander in and out of deliciously eccentric shops lined up in a row as neat and compact as any tiny section of a thriving city, but without the crowds or traffic. You can feel yourself slowing down, finding floral crockery perfectly fascinating and a \"Back in half an hour\" sign on the op shop entirely logical.\n*label two\n\nFive minutes later, you've come to the end of Gundagai's main street.\n*if max_love = 10\n\t\"It's so nice here,\" he says. \"If it had better internet, I could live here. Finish my degree and then just… write.\"\n\t*choice\n\t\t#\"Not me!\"\n\t\t\t*label gundagai\n\t\t\tHe laughs, unpeturbed. \"It's possible the night life is lacking here.\"\n\n\t\t\t\"And the range of international cuisine.\"\n\n\t\t\t\"And mobile phone coverage,\" he admits.\n\t\t\t*goto three\n\t\t#\"That's a beautiful dream.\"\n\t\t\t*goto gundagai\n\t\t#\"Same!\"\n\t\t\t\"It's so peaceful, and beautiful, and just… nice.\"\n\n\t\t\tYou sigh happily. \"Yeah. But we still managed to distract ourselves from our writing.\"\n\n\t\t\t\"I'm fairly sure we'd run out of entertainment fairly soon though. We've already run out of main street.\"\n\t\t\t*goto three\n*else\n\tMax turns to you rather than walking on. \"I have a problem,\" he says.\n\n\t\"No more Gundagai?\"\n\n\t\"My problem is that I'm such a flirt that no one knows when I want something more.\"\n\t*choice\n\t\t#\"Don't worry. I'm not interested in you. Nice and simple, right?\"\n\t\t\t*set max_love 10\n\t\t\t\"Very,\" he says, as if he already knew what your answer would be. \"You sure you don't want to think about it some more?\"\n\n\t\t\t\"Completely. Shall I try and set you up with someone else? There's no shortage of attractiveness in the rectory this week.\"\n\n\t\t\t\"That's quite an offer!\" he says. \"But sadly my pansexuality doesn't mean I actually want to date everyone I meet.\"\n\n\t\t\t\"Is there someone else you're attracted to?\" You take a guess. \"Eric?\"\n\n\t\t\t\"Definitely not Eric,\" he says. \"Too effusive. It's weird.\"\n\n\t\t\t\"Ah well. I tried.\"\n\t\t\t*goto three\n\t\t#\"You could just tell them. In words.\"\n\t\t\t*set max_love 5\n\t\t\t\"Are you going to make me work for it?\" he says.\n\n\t\t\t\"Naturally. And could you be a little more charming?\"\n\n\t\t\t\"You wound me,\" he says. \"I've been told I'm incredibly charming.\"\n\n\t\t\t\"Not by me. Confident and charming isn't the same thing.\"\n\n\t\t\t\"Consider the gauntlet thrown.\"\n\n\t\t\t\"May the best man win.\"\n\n\t\t\t\"That's me, right?\" he says. \"Right?\"\n\n\t\t\t\"We'll see.\"\n\t\t\t*goto three\n\t\t*selectable_if (max_love = 1) #Pretend you don't see where this is going.\n\t\t\t\"Poor you.\"\n\n\t\t\t*set max_love 5\n\t\t\tHe sighs dramatically, and it's hard not to embrace him even though you know his distress is comical.\n\n\t\t\t\"I wander the world, seeing such beauty wherever I go… and sometimes the most beautiful, fascinating people assume that I'm satisfied with merely gazing at them.\"\n\n\t\t\t\"Sounds tough.\"\n\n\t\t\t\"You have no idea!\" He holds up his hands. \"My eyes are perfectly content, but my poor hands want more. Beauty is not just visual, of course. Your skin, for example, has the most wonderful smell and texture.\"\n\n\t\t\tYou hold out your hand, palm upward. \"Go on then.\"\n\n\t\t\tHe takes your hand slowly, tracing the lines of your palm before wrapping his hand around yours.\n*label three\n\nTwo blocks later, you're at the Gundagai Museum. It looks like an ordinary house except for the elaborate columned portico, which looks like it has been pulled from a different building and glued onto the museum by a giant hand. \n\nYou head inside the museum, admiring the Model T Ford smack bang in the centre, and pick an aisle to wander together.\n\n\"Tell me,\" says Max. \"If you were a character in a romance novel, would you be the viewpoint character, the love interest, or the best friend?\"\n*choice\n\t#\"I'm always my own viewpoint character, aren't I?\"\n\t\t*set observation %+10\n\t\t\"Aren't we all?\" says Max. \"Funny, though. Writers think about the world differently.\"\n\n\t\t\"You're one of them, aren't you?\" you say. \"A writer who narrates their own life in their head.\"\n\n\t\t\"Absolutely!\" he says. \"How else can I justify every selfish thing I do?\"\n\n\t\t\"Are you so selfish?\"\n\n\t\t\"Not at all,\" he says. \"At least, not inside my head.\"\n\t\t*goto four\n\t#\"The love interest is the closest thing to perfect in fiction. I'll pick that.\"\n\t\t*set knowledge %+10\n\t\t\"Are you so perfect?\" he asks cheekily.\n\n\t\tYou blush automatically, even though there's no one else in the museum. \"It's all in the eye of the beholder.\"\n\n\t\t*if max_love = 5\n\t\t\t\"Then yes,\" he says with a matter-of-fact tone that makes him sound entirely genuine. \"You're the most perfect human being around.\"\n\t\t\t*goto qq\n\t\t*else\n\t\t\tHe laughs. \"I'm not going to disagree.\"\n\t\t*label qq\n\n\t\tSuddenly serious, he asks, \"Do you want to be perfect?\"\n\n\t\t\"Do you?\"\n\n\t\tThe serious moment passes, just like that. \"I'm already there. It's pretty sweet actually.\"\n\t\t*goto four\n\t#\"The best friend. The B couple always has the best and steadiest romance.\"\n\t\t*set mental_health %+10\n\t\t\"Here's to the B couple then,\" he says.\n\t\t*if max_love = 5\n\n\t\t\t\"May our problems be minor, and always resolved within twenty-two minutes.\"\n\t\t\t*goto minutes\n\t\t*else\n\t\t\t\"May my problems be minor, and always resolved within twenty-two minutes.\"\n\t\t*label minutes\n\n\t\t\"Cheers to that,\" says Max.\n*label four\n\nThe museum is small, and the majority of the exhibits feel like they could almost as easily be in antique shop. There are rotary phones, a record player, a collection of old axes, an enormous and dusty diorama of pre-flood Gundagai, and an oil painting of the man who wrote 'On the Road to Gundagai'.\n\nBeyond the main room there's a smaller section with a life-size dummy in historical garb who briefly scares the life out of you. When you finish your circuit of the room and head for the front door again, you realise that there has been a volunteer staff member in a small room at the front the whole time. \n\n\"How was your visit?\" he asks, casually resting on the sign asking for donations.\n*choice\n\t#\"Excellent, thank you.\"\n\t\t\"What was your favourite part?\" he asks.\n\n\t\t\"The diorama, definitely,\" you say, at the same time as Max says, \"The car.\"\n\n\t\t\"I feel just the same,\" he says cheerfully, and shows you out.\n\t\t*goto five\n\t#\"It's exactly what I imagined it would be.\"\n\t\t\"Thank you,\" he says, and shows you out.\n\n\t\t\"That was an excellent example of language use,\" said Max quietly.\n\n\t\t\"I notice you didn't say anything.\"\n\n\t\t\"Silence is golden,\" he says. \"But truthfully I liked it a lot, and I just wanted to see what you would say.\"\n\t\t*goto five\n\t#Make a donation while you thank him.\n\t\t*set cash -10\n\t\tYou drop a $10 note into the box and keep smiling while the volunteer shows you out.\n\n\t\tThe day is getting hotter, and you haven't forgotten the steepness of the hill.\n*label five\n\nYou head for home, pausing often to turn back around so you can admire the views from as many directions as possible.\n\n\"Can I ask you something?\" Max asks. \n\n\"What's stopping you?\" you ask, surprised at his hesitation.\n\n\"What do you think of Bruce?\"\n*choice\n\t*if max_love = 10\n\t\t#\"Do you want to date him?\"\n\t\t\t*set observation %+10\n\t\t\t\"Who wouldn't?\" he says. \n\t\t\t*label sexy\n\t\t\t\"He's the most flaming ginger I've ever seen. It's impossible to resist.\"\n\n\t\t\t\"Then why bother asking what I think?\"\n\n\t\t\t\"I'm not just an epic sex machine,\" he says. \"If he's a tool, I want to know.\"\n\n\t\t\t\"So you don't have sex with him after all?\"\n\n\t\t\t\"Let's not be so hasty.\"\n\n\t\t\t\"Right you are,\" you say. \"But I'm afraid I can't help you with that question.\"\n\t\t\t*goto nearly_there\n\t#\"He's certainly shy. I've hardly seen him.\"\n\t\t*set observation %+10\n\t\t\"Ach, too bad,\" said Max.\n\t\t*goto sexy\n\t#Shrug.\n\t\t*set mental_health %+10\n\t\t*label nice\n\t\t\"What does that mean?\" Max asks.\n\n\t\t\"I means I don't know Bruce well enough to have thoughts about him.\"\n\n\t\t\"Same here,\" Max says sadly. \"Quiet, barely present, unreadable face.\"\n\n\t\t\"That's precisely my impression,\" you say.\n\t\t*goto nearly_there\n\t#\"He seems nice, considering he probably can't see well enough to tell us apart. And so, so ginger.\"\n\t\t*set knowledge %+10\n\t\t\"So very ginger,\" Max agrees. \"Do you really think he's nice? Even though he's vision impaired and can't appreciate me like the rest of you?\"\n\n\t\t\"As a default, yes,\" you say. \"He's nice. Probably.\"\n\t\t*goto nice\n*label nearly_there\n\nBy now you're almost back at the church grounds, and even Max is a little breathless. It's time for lunch. \n*if maxmagic = false\n\t*set maxmagic true\n\tNow is your moment to ask about his magic, if you dare.\n\t*choice\n\t\t#Ask him outright.\n\t\t\t\"Max,\" you say, ignoring the crack in your voice. \"Have you experienced any magic since we arrived at the rectory?\"\n\t\t\t*goto postmaxmagic\n\t\t#Tell him about your magic first.\n\t\t\t\"Max,\" you say, ignoring the crack in your voice. \"I'm magical. As of yesterday, I can \n\t\t\t*if love_lines = 1\n\t\t\t\tsee lines of attraction between people.\"\n\n\t\t\t\t\"Hah!\" he says. \"Me too.\"\n\n\t\t\t\t\"Really?\"\n\n\t\t\t\t\"Really really.\"\n\n\t\t\t\t\"Huh.\"\n\t\t\t\t*goto postmaxmagic\n\t\t\t*if talking_walls = 1\n\t\t\t\thear the house talking to me.\"\n\n\t\t\t\t\"Wow!\" says Max. \"I'm magical too, but all I can see is lines of attraction between people. What does the house say?\"\n\n\t\t\t\t\"Not much so far.\"\n\n\t\t\t\t\"Sure,\" he says. \"I've noticed slate isn't one for chatter.\"\n\t\t\t\t*goto postmaxmagic\n\t\t\t*if talking_cat = 1\n\t\t\t\tunderstand the cat.\"\n\n\t\t\t\t\"Wow!\" says Max. \"I'm magical too, but all I can see is lines of attraction between people. What does Loki say?\"\n\n\t\t\t\t\"Not much so far.\"\n\n\t\t\t\t\"Sure,\" he says. \"Cats are notoriously unchatty.\"\n\t\t\t\t*goto postmaxmagic\n\t\t\t*if lie_detector = 1\n\t\t\t\ttell when people are lying.\"\n\n\t\t\t\t\"Wow!\" says Max. \"I'm magical too, but all I can see is lines of attraction between people. Who's been telling porkies?\"\n\n\t\t\t\t\"Only white lies so far.\"\n\n\t\t\t\t\"I confess that's duller than I hoped,\" he says. \"Ah well.\"\n\t\t\t\t*goto postmaxmagic\n\t\t\t*else\n\t\t\t\t*goto postmaxmagic\n\t\t#Observe him for signs of magic.\n\t\t\tAs you walk past Eric, you definitely see Max look at Eric's chest and smile.\n\t\t\t*if love_lines = 1\n\n\t\t\t\tHe's seeing love lines too!\n\t\t\t\t*goto postmaxmagic\n\t\t\t*else\n\t\t\t\tYou don't know what's going on, but there's definitely something happening.\n\t\t\t\t*goto postmaxmagic\n*else\n*label postmaxmagic\nMax claims that you're his muse and he therefore has to go back into his room to write down a stack of new ideas. Even when he excuses himself, he does it with flattery. You head into the rear balcony area to make yourself a sandwich.\n\n*goto lunch\n*label dinner\n*page_break Uh-oh.\n\nYou catch yourself drifting off to sleep. Mid-afternoon malaise has hit with a vengeance. There's still a few hours until the mandatory communal dinner, and you could do with a snack. Or possibly a nap. Or you could see if \n*if (max_love > 0) and (max_love \u003c 9)\n\tMax is up for some canoodling.\n\t*goto combination\n*if (lala_love > 0) and (lala_love \u003c 9) \n\tLala would care for some more private time together.\n\t*goto combination\n*else\n\tanyone's in the mood to chat.\n*label combination\n\nWhat do you do next?\n*choice\n\t*if (max_love > 0) and (max_love \u003c 9)\n\t\t*disable_reuse #Canoodling.\n\t\t\t*set temp + 1\n\t\t\t*set max %+10\n\t\t\t*set art %-10\n\t\t\t*set max_love 1\n\t\t\tYou vaguely recall hearing some typing from the Master Bedroom some time ago. It certainly isn't happening now. \n\n\t\t\t*if room = 2\n\t\t\t\t*set unlocked_door 1\n\t\t\t\tYou go to the locked door between your two rooms and press your hand flat on the ancient mahogany, willing him to sense you.\n\t\t\t\t*goto endif\n\t\t\t*else\n\t\t\t\tYou go through the shadowed hall to his door and press your hand flat on the ancient mahogany, willing him to sense you.\n\t\t\t*label endif\n\n\t\t\tTo your surprise, the door opens, and suddenly Max is looking at you.\n\t\t\t*if room = 2\n\t\t\t\tSo much for locking the doors between bedrooms.\n\t\t\t\t*goto endifa\n\t\t\t*else\n\t\t\t*label endifa\n\n\t\t\t\"How did you——\" you begin.\n\n\t\t\t\"Magic,\" he says, and pulls you into his own wide and sunlit space.\n\n\t\t\tYou blink in the bright light, half blinded. Max presses his hands to your cheeks, waiting until your vision clears completely and you can see his dark eyes fixed on yours.\n\n\t\t\tYou pull him closer, melting into his arms and chest and kisses.\n\t\t\t*if temp = 2\n\t\t\t\t*goto endy_bit\n\t\t\t*else\n\t\t\t\tMost of the afternoon slips softly away, but at last Max sighs and rests his head on your shoulder.\n\n\t\t\t\t\"What is it?\"\n\n\t\t\t\t\"You,\" he says. \"Inspiration and distraction, all in one.\"\n\n\t\t\t\t\"You're going to get back to work?\" you say.\n\n\t\t\t\t\"Only if I want to continue earning a living, so I can buy you presents.\"\n\n\t\t\t\t\"Well, if you put it like that…\"\n\t\t\t\t*goto combination\n\t*if (lala_love > 0) and (lala_love \u003c 9) \n\t\t*disable_reuse #Private time with Lala.\n\t\t\t*set art %-10\n\t\t\t*set lala %+10\n\t\t\t*set temp + 1\n\t\t\t*if lala_love = 1\n\t\t\t\tYou vaguely recall hearing some typing from the Lala's room some time ago. It certainly isn't happening now. \n\n\t\t\t\tFeeling suddenly shy of the others, you go through the hall and front door to her external door and raise your hand to gently touch the glass, hoping she sees your shadow.\n\n\t\t\t\tTo your surprise, the door opens before you get the chance to knock. \"It's you,\" she says, sounding like your existence is a source of wonder. \"I hoped you would come to me.\"\n\n\t\t\t\t\"Here I am.\"\n\n\t\t\t\tShe pulls you inside, swinging closed the door and then pressing you up against the wall beside it, kissing you with rapturous hunger.\n\n\t\t\t\tYour fingers tangle in her long black hair. It's like being wrapped in silk threads, but softer and more wonderful.\n\n\t\t\t\tShe pulls you to the bed, and you lay down like puppies curling up together at night, a tangle of limbs and skin. You nuzzle into the curve of her neck as she kisses your hair, gently now.\n\n\t\t\t\tClouds of long hair and soft lips and warm comforter surround you, pulling you into such contentment that you fall asleep.\t\t*if temp = 2\n\t\t\t\t*goto endy_bit\n\t\t\t*else\n\t\t\t\tYou wake up to the sound of typing, and open your eyes to see Lala scowling at her screen as her fingers fly over the keys.\n\n\t\t\t\tIt's funny to see how it feels from the other side. \n\n\t\t\t\tYou kiss her cheek, ignore her protestations, and creep back out onto the front balcony.\n\t\t\t\t*goto combination\n\t*disable_reuse #Have a snack.\n\t\t*set temp + 1\n\t\tYou head into the kitchen, exchanging casual greetings with Tamsin and Eric, who are tucking into some choc chip cookies that are clearly Renee's work. Renee's door is open, but she has a Bible and several other books open on her desk, and is clearly planning her sermon.\n\n\t\t\"These are so good,\" says Eric. \"I think I'm in love.\"\n\n\t\t\"It's true,\" says Tamsin. \"You've got to try one.\"\n\n\t\tThe cookies are still warm from Renee's oven, and the three types of chocolate chips haven't fully set. There's oatmeal to give it a rounded flavour and texture, and it's so moist the lines of the cooling tray are marked into the bottom.\n\n\t\t\"Mmm?\" says Eric.\n\n\t\t\"Mmm-hmm!\" you agree, and take a seat on one of the chairs.\n\n\t\tThe three of you chat for a while between mouthfuls, and lick melted chocolate off your fingers.\n\t\t*if temp = 2\n\t\t\t*goto endy_bit\n\t\t*else\n\t\t\tAt last the others drift away. Renee has packed up her books and is just going out her external door onto the balcony.\n\t\t\t*goto combination\n\t*disable_reuse #Go for a jog.\n\t\t*set temp + 1\n\t\t*set fitness %+10\n\t\tIt's uncomfortably hot and you come back inside thoroughly sticky and wishing you'd swapped your shower shift with whoever is allowed to shower in the late afternoon. Sharing a single bathroom with seven other people is no picnic.\n\n\t\tYou chuck your clothes on the floor and spray some deoderant on yourself before putting on a clean pair of shorts and a plain blue T-shirt. It's the best you can do for now. Perhaps you can sit far away from the others at dinner.\n\t\t*if temp = 2\n\t\t\t*goto endy_bit\n\t\t*else\n\t\t\tYou still have a little bit of free time.\n\t\t\t*goto combination\n\t#Write.\n\t\t*set art %+10\n\t\t*if temp = 1\n\t\t\t*set temp 5\n\t\t\tYou sit in front of your computer and place your hands on the keys. The name of your main character escapes you, so you call them Ugly Brat for the time being. Still you can't move on.\n\n\t\t\t*page_break Wake up!\n\t\t\tOh. You fell asleep. Your latest undying prose reads, \"Ugly Bat Btat BRAT sat on the mrwt''''''''''''''hbd'''''''''''''''''''''''.\"\n\n\t\t\tSo much for that.\n\t\t\t*goto combination\n\t\t*if temp = 5\n\t\t\tNope. Not happening. $!{name} needs a break and that's all there is to it.\n\n\t\t\tStupid writing. Stupid book. Stupid writer.\n\n\t\t\tYou start banging your head against the keys. It's got to be better than anything the inside of your brain is giving you.\n\t\t\t*goto combination\n\t\t*else\n\t\t\t*set word_count +1000\n\t\t\tThe writing feels like ripping chunks of mouldy cardboard away from the rubbish dump of your mind, but you manage to get words on paper. Maybe on a different day the dull nonsense you're spouting will reveal something worth saving. Today, it's incredibly tempting to just delete the whole thing.\n\n\t\t\tBut you don't. You keep going. That has to be worth something, even if it's not wise to think about how much of today's writing will be edited out of the final draft. It still counts. It has to.\n\t\t\t*goto endy_bit\n\t*disable_reuse #Ask Renee for a tour of the rest of the property.\n\t\t*set renee %+10\n\t\t*set knowledge %+10\n\t\tYou find Renee on the front balcony, drinking from a water bottle and running her fingers along the links of her silver bracelet.\n\n\t\t\"Oh, hello $!{name},\" she says. \"Is there something you need?\"\n\n\t\t\"Not really,\" you admit. \"If you're not too busy, could I see inside the other buildings? The hall, and converted stables, and the church?\"\n\n\t\t\"Not the church,\" she says. \"I want you to see it when it's fully dressed up for Sunday, with the congregation there. A church is more than a building, no matter how old and lovely the building. But I'll show you around the rest right now, if you like.\"\n\n\t\tShe slips on a pair of flip flops and you walk down the hill together toward the church hall. Unlike the house and church, it's made of red bricks instead of slate, with two chimneys, decorative buttresses, and Georgian windows that were old-fashioned when the hall was built.\n\n\t\t\"It's meant to be repaired before anyone goes in,\" says Renee, \"but I think they're being fussy. I'll let you in if you like.\"\n\t\t*choice\n\t\t\t#\"Never mind. How about the stables?\"\n\t\t\t\tShe veers obediently sideways, taking you almost as far as the gravel driveway before veering back again with the line of the hill towards the cream-coloured weatherboard. The stables are not large, but there is another Georgian window in the eaves indicating a loft.\n\n\t\t\t\tYou go inside to find a fairly ordinary office building, except the toilets are in a separate building outside (\"I never lock them,\" Renee confides), the official rector's office is crowded with the personal items Renee took out of the house during the writing retreat, and the reception desk is lined with rusty corrugated iron that must have been taken from the roof. \n\n\t\t\t\tAlso there's a thick wooden ladder beside the reception desk that leads up into a rather small hole in the ceiling.\n\n\t\t\t\t\"Go on then,\" says Renee. \"You know you want to.\"\n\n\t\t\t\tYou climb up obediently, grateful for the solid weight of the ladder, and find yourself in a triangle-shaped loft with a single tiny window over the town and hillside, and very little sign of its past as a stable. The floor is lovely polished wood, and there are a few dusty boxes that all look small enough to have fit through the hole you used to enter. Given the single mode of entry, you're not surprised that there isn't more stored there.\n\n\t\t\t\tYou climb back down, stammering a greeting to the part-time receptionist who arrived shortly before your awkward descent and watched you impassively for a good ten minutes without a word.\n\n\t\t\t\t\"We'd better head back,\" says Renee. \"I don't like to leave pressure cookers unsupervised for too long, and it's nearly time for dinner anyway.\"\n\t\t\t\t*goto endy_bit\n\t\t\t#\"Yes please.\"\n\t\t\t\t*label yes\n\t\t\t\tRenee walks you around to the official entrance where double gothic doors face the road with a self-conscious grandeur. She produces an oversized brass key and wrestles with the doors for several minutes before one of them gives in and scrapes open.\n\n\t\t\t\tThe hall is a large, open space, comfortably lit with natural light. It has a raised wooden stage at one end and a gorgeous vaulted ceiling with beams criss-crossing one another in a pattern that hits the perfect balance between simplicity and intricacy.\n\n\t\t\t\tThere are a few tables and chairs, and several garbage bags full of op shop stock, but the floor is wide and clear. It immediately makes you think of bush dances on creaking floors, or the scraping of chairs as parents gathered to watch their children perform on stage for the first time.\n\n\t\t\t\tThe floor is showing its age, pale and warped with a few long holes big enough to let in hot air from the foundations. You wouldn't want to be barefoot on those splinters. But that doesn't make it any less beautiful.\n\n\t\t\t\t\"We need a railing on the steps,\" says Renee. \"It won't pass inspections otherwise, but other than that it's perfectly fine.\"\n\n\t\t\t\t\"Sure,\" you say politely, not a hundred percent sure if the rest of the floor needs replacing. That would cost more than a few writing retreats' worth of income.\n\n\t\t\t\tThe pair of you head back to the house in comfortable silence.\n\t\t\t\t*goto endy_bit\n\t\t\t#\"Whatever you think is best.\"\n\t\t\t\t*goto yes\n\n*label endy_bit\n*page_break Dinner Time\n\nThe day has gotten away from you again, and it's time for dinner.\n\nRenee produces a sludgy but delicious-smelling repast from two large pressure cookers, pointing out that a lot of Gundagai is made up of sheep farmers, so of course she has to serve lamb at least once.\n\n\"Wait a moment,\" she says. \"Who's missing?\"\n\nBruce is perched on an office chair as close to the laundry and therefore his room as possible. Eric and Max are exchanging compliments; Tamsin and Lala are all eyes for the food, and Renee is ready to serve.\n\n\"Aurelia,\" says Eric. \"She must have lost track of time.\"\n\nYou're standing near the wood-burning stove and therefore near Aurelia's window. Her curtains are closed, as usual, and when you glance through the hall you can see her door is also closed.\n*choice\n\t#\"I'm sure she'll join us any second.\"\n\t\tSeveral awkward moments pass, and then Renee pauses in her serving to go and knock loudly on Aurelia's door.\n\t\t*goto renee\n\t#Knock on her window.\n\t\tYou knock on her window. \"Hey, Aurelia! Food's ready.\"\n\n\t\tNothing happens.\n\t\t*goto Renee\n\t#\"I'll go wake her up.\"\n\t\tYou knock on her door, but there's no response.\n\n*label renee\n\nSuddenly Renee goes horribly pale. \"Aurelia?\" she says in a hoarse whisper, and then clears her throat and yells with all the volume of a career preacher.\n\n\"AURELIA! Say something!\"\n\nHer face crumples. \n\n\"Please, Aurelia,\" she says under her breath. \"Please be all right.\"\n*finish Next", "choicescript_description": "You’re enjoying a writing retreat held in an Australian small town when one of your fellow writers is killed, and all the rest are suspects—including you. The ancient rectory grants you curious supernatural powers, and it’s not clear if the magic is benign or malevolent. Can you figure out who the killer is before they take another victim? Is the rectory the real killer? Or is this the ultimate chance to find out for yourself what it feels like to murder another person—and get away with it?\n\n•\tChoose from three genders, and whatever sexuality suits your mood.[n/]\n•\tPay attention to the clues, as the murderer is not the same in every play-through.[n/]\n•\tWho do you suspect, and who do you trust?[n/]\n•\tPick a genre, hero, and ending for your own novel outline.[n/]\n•\tGather clues to make your case to your fellow writers.[n/]\n•    Can you get away with murder?", "choicescript_stats": "Name: $!{name}\n\nGenre: $!{genre}\n\n*stat_chart\n\ttext word_count Word Count\n\n\ttext cash Cash\n\n\topposed_pair Proactive \n\t\tCautious\n\topposed_pair Trusting \n\t\tSuspicious\n\topposed_pair Honest\n\t\tNot so much\n\topposed_pair Empathetic \n\t\tDetatched\n\topposed_pair Art\n\t\tLife\n\n\ttext imagination Imagination\n\ttext knowledge Knowledge\n\ttext observation Observation\n\ttext fitness Fitness\n\ttext mental_health Mental Health\n\n\tpercent aurelia Rapport with Aurelia\n\tpercent bruce Rapport with Bruce\n\tpercent lala Rapport with Lala\n\tpercent max Rapport with Max\n\tpercent tamsin Rapport with Tamsin\n\tpercent eric Rapport with Eric\n\tpercent renee Rapport with Renee\n\n*image plan.png\n*page_break Your Book Synopsis\n\n*if word_count \u003c 50000\n\tYou have not yet written enough words in your novel to have a synopsis.\n\t*finish\n*else\n*comment type = crime, fantasy, historical, romance\n*comment hero_pronoun she\n*comment hero_name Skye\n*comment pronoun she\n*comment named Keesha\n*comment character 0\n*comment romance, both, villain\n*comment ending happy, bittersweet, tragic\n$!{hero_name} and the\n*if type = 3\n\t\u003cb>Incident at St Clementine's Monastery\u003c/b>\n\n\n\t$!{hero_name} wakes early to tend to the herb garden only to discover a mysterious stranger curled up among the rosemary: $!{named}. $!{named} begs $!{hero_name} for a place among the visitor's hall to pray and eat before ${pronoun} can continue the holy quest. \n\n\t$!{hero_name} welcomes $!{named} to St Clementine's\n\t*if character \u003c 3\n\t\t, but ${pronoun} is struggling with feelings. Distracting feelings. For $!{named}.\n\t\t*goto ending_two_z\n\t*else\n\t\t, but it soon becomes clear that $!{named} is no ordinary pilgrim.\n\t\t*label ending_two_z\n\n\t\t*if ending = 1\n\t\t\t*if character \u003c 3\n\n\t\t\t\t$!{hero_name} came to St Clementine's to obey God, but God's love has many forms, and all of them are beautiful. \n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\tWhen $!{named} attempts to poison the abbott, $!{hero_name} swaps the cups, saving St Clementine's.\n\t\t\t\t*finish\n\t\t*if ending = 2\n\t\t\t$!{named} spends a glorious few days with $!{hero_name}... and then leaves forever.\n\t\t\t*finish\n\t\t*if ending = 3\n\t\t\t*if character \u003c 3\n\t\t\t\t$!{named} is weakened by their journey, and dies before ${pronoun} can finish their quest.\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\t$!{named} poisons the abbott and vanishes, changing St Clementine's forever.\n\t\t\t\t*finish\n*if type = 1\n\t\u003cb>The Governor's Murder\u003c/b>\n\n\n\t$!{hero_name} arrives at the Governor's mansion only to discover that his Excellency is dead, discovered by the newest of the servants, $!{named}. $!{named} is promptly arrested, but $!{hero_name} is not convinced that the right person is being blamed for the murder. As the investigation reveals guilt in high places, $!{named} waits in a cell. \n\t*if character > 1\n\n\t\tAt last, ${hero_name} must face the truth: $!{named} is no servant, but the governor's killer.\n\t\t*goto ending_one\n\t*else\n\t*label ending_one\n\t*if character \u003c 3\n\n\t\t$!{hero_name} must choose between love of $!{named} and love of the law.\n\t\t*goto ending_one_b\n\t*else\n\t\t$!{hero_name} comes to realise that ${named} is exactly where ${pronoun} should be: in prison.\n\t\t*label ending_one_b\n\n\t*if ending = 1\n\t\t*if character \u003c 3\n\n\t\t\t$!{hero_name} and $!{named} run away to sea, living off the grid together.\n\t\t\t*finish\n\t\t*else\n\t\t\tAnother criminal is off the streets, and $!{hero_name} is hailed as a hero.\n\t\t\t*finish\n\t*if ending = 2\n\t\t$!{named} faces prison calmly, knowing the governor will never hurt anyone again.\n\t\t*finish\n\t*if ending = 3\n\t\t$!{hero_name} must live with the knowledge that $!{named} must be punished for the murder of an evil man.\n\t\t*finish\n*if type = 2\n\t\u003cb>Dragoness\u003c/b>\n\t\n\n\t$!{hero_name} arrives at a lovely warm castle only to discover it is besieged by a dragoness determined to protect the eggs she laid in the tallest tower. The cook, $!{named}, begs $!{hero_name} for help, since the dragoness is now requesting a human sacrifice must be prepared ready for her babies' births. \n\n\t$!{hero_name} has a little magic, but not enough to save $!{named}\n\t*if character \u003c 3\n\t\tand ${pronoun} is struggling with feelings. Distracting feelings. For $!{named}.\n\t\t*goto ending_two\n\t*else\n\t\t, but it soon becomes clear that $!{named} brought the dragoness to the castle in order to depose the rightful queen.\n\t\t*label ending_two\n\n\t\t*if ending = 1\n\t\t\t*if character \u003c 3\n\n\t\t\t\tThe dragoness is appeased, the castle saved, and $!{hero_name} and ${named} live happily ever after.\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\tThe dragoness is appeased by ${named}'s death, and the castle is saved.\n\t\t\t\t*finish\n\t\t*if ending = 2\n\t\t\t$!{named} surrenders to the dragon, leaving $!{hero_name} to mourn but saving the castle.\n\t\t\t*finish\n\t\t*if ending = 3\n\t\t\t$!{named} flees the castle, and the dragoness kills hundreds in revenge. So much for heroes.\n\t\t\t*finish\n*if type = 4\n\t\u003cb>Inconvenient Heart\u003c/b>\n\n\n\t$!{hero_name} has a full life baking cupcakes for homeless dogs, only to fall over at a train station right in front of the strangely compelling $!{named}. \n\n\t$!{hero_name} falls in love at once, but chooses to express their feelings through cupcakes... and $!{named} is gluten intolerant!\n\n\t*if character = 3\n\t\tWorst of all, $!{named} hates dogs. And homeless people. \n\n\t\t*goto ending_two_squee\n\t*else\n\t\t*label ending_two_squee\n\n\t\t*if ending = 1\n\t\t\tBut even a gluten intolerant hater can be changed by the power of love.\n\t\t\t*finish\n\t\t*if ending = 2\n\t\t\t$!{named} falls in love with $!{hero_name}, but can never eat a cupcake.\n\t\t\t*finish\n\t\t*if ending = 3\n\t\t\t$!{named} accidentally poisons a batch of $!{hero_name}'s cupcakes, killing dozens of dogs and breaking both their hearts.\n\t\t\t*finish\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\ n\n*set observation 45\n*set imagination 66\n*set knowledge 46\n*set fitness 42\n*set mental_health 33\n\n*set cash 150\n\n*set tamsin 45\n*set bruce 39\n*set eric 20\n*set lala 37\n*set aurelia 25\n*set renee 70\n*set max 43\n\n\n*set name \"Sasha\"\n*set genre \"crime\"\n*set type 1\n*comment types are crime, fantasy, historical, romance\n\n\n*set word_count 4000\n\n\n\n\n\n\n\nPolice Detective Keichi consults his device. \"What about the rector, Renee Scott? This is not the first murder to take place in her house. Can you give me any further information as to whether she is or is not the killer?\" \n*fake_choice\n\t#\"She knows something.\"\n\t#\"I don't think she's the killer.\"\n\t#\"She's kind.\"\n\n\n\n\n\n\n*set proactive 62\n*set trusting 42\n\n*set empathetic 68\n*set honest 32\n\n*set art 58\n\n*set light 30\n*set realism 62\n*set happy 62\n\n*comment STORY STATS\n*set writing_sessions 5\n*set hero_pronoun \"she\"\n*set hero_name \"Karin\"\n*set pronoun \"she\"\n*set named \"Louise\"\n*set character 1\n*comment romance, both, villain\n*set ending 1\n*comment happy, bittersweet, sad\n\n\n*set observation 44\n*set imagination 55\n*set knowledge 34\n*set fitness 20\n*set mental_health 30\n\n*set cash 350\n\n*set tamsin 40\n*set bruce 20\n*set eric 55\n*set lala 68\n*set aurelia 50\n*set renee 42\n*set max 48\n\n\n*set name \"Adaku\"\n*set genre \"historical\"\n*set type 3\n*comment types are crime, fantasy, historical, romance\n\n\n*set word_count 5500\n\n\n\n\n\n\n\n\n\n\n\n\nThis house is a prison. This house is a trap. This house is going to kill you.\n\nIt's a relief to wake up without more new magical manifestations. You stay in bed a moment longer, putting off the likely awkwardness of walking through the rear balcony to the bathroom. Ugh, human contact. It's even worse when you're house-sharing with a killer. You hear someone else's door open, and stiffen like a deer in headlights even though you're still in bed with the door closed.\n\nYou recognise  renee 50\n*set max 45\n\n\n*set name \"Bob the Magnificent\"\n*set genre \"fantasy\"\n*set type 2\n*comment types are crime, fantasy, historical, romance\n\n\n*set word_count 500\n\n\n\n\nYou didn't pass out. You didn't vomit. You're here.\n*fake_choice\n\t#This is your chance. Kill her.\n\t#Put the knife to her throat and tell her not to move until the police come back.\n\t#Keep the knife hidden, and tell her you know she's the killer.\n\n\n\n\n\n", "startup": "*title Death at the Rectory\n*comment Magical Murder Mysteries\n*author Felicity Banks\n*scene_list\n\tstartup\n\tchapter_one_mmm\n\tchapter_two_mmm\n\tchapter_three_mmm\n\t$ chapter_four_mmm\n\t$ chapter_five_mmm\n\t$ chapter_six_mmm\n\t$ ending\n\n\n*create proactive 50\n*comment cautious\n\n*create trusting 50\n*comment suspicious\n\n*create empathetic 50\n*comment detatched\n\n*create honest 50\n*comment not so much\n\n*create art 50\n*comment life\n\n*create light 50\n*comment darkness\n*create realism 50\n*comment fantasy\n*create happy 50\n*comment sad\n\n*comment STORY STATS\n*create writing_sessions 0\n*create hero_pronoun \"she\"\n*create hero_name \"Skye\"\n*create pronoun \"she\"\n*create named \"Keesha\"\n*create character 0\n*comment romance, both, villain\n*create ending 2\n*comment happy, bittersweet, sad\n\n\n\n*create murderer 0\n*create confidant 0\n*comment 1 is renee and 2 is lala\n\n*create observation 20\n*create imagination 20\n*create knowledge 20\n*create fitness 20\n*create mental_health 20\n\n*create cash 500\n\n*create tamsin 50\n*create bruce 50\n*create eric 50\n*create lala 50\n*create aurelia 50\n*create renee 50\n*create max 50\n*create police_rapport 1\n\n*create lala_love 0\n*create max_love 0\n*comment 1 means yes, 10 means PC rejected them, 5 means flirty, 12 means dumped, 13 means you dump him, 100 means scared to dump him/her\n\n*create name \"\"\n*create genre \"\"\n*create type 0\n*comment types are crime, fantasy, historical, romance\n\n*create he \"he\"\n*create his \"his\"\n*create him \"him\"\n\n\n*create room 0\n*create wine 0\n*comment rooms are nursery, dining, playroom\n\n*create talking_walls 0\n*create talking_cat 0\n*create lie_detector 0\n*create love_lines 0\n\n*create magic 0\n*comment prediction, flight, psychological insight, detailed memory\n\n*create brucemagic false\n*create ericmagic false\n*create lalamagic false\n*create maxmagic false\n*create tamsinmagic false\n\n*create maxattraction false\n\n*create magic_practice 0\n\n*create killer 1\n*comment max is killer 1; eric is 2\n\n*create word_count 0\n\n*create flaw 0\n*create arvo 0\n*create temp 0\n*create other_temp 0\n\n*create unlocked_door 0\n\n*create loki_gone 0\n*create loki_saved 0\n*create loki_no 0\n\n*create renee_killer 0\n\n*create killer_correct 0\n*create killer_knows_you_know false\n\n*create killer_incorrect 0\n*comment 1 is max/eric, 2 is bruce, 3 is lala, 4 is tamsin\n\n*create clue_one 0\n*create clue_two 0\n*create clue_three 0\n*create clue_four 0\n\n\n*comment wine was poisoned; red wine was poisoned. All discover that Aurelia was drugged.\n*comment Max knew who she was. Max hated her. Max forgave her [eric = killer only]\n*comment found knife (1) or saw but lost it (2), or kept it for yourself (3) or killer got it back (4)\n*comment knows house is honest\n\n*create justice_fail 0\n\n*achievement profit visible 5 Profit\n\tCan you make a profit from your writing retreat?\n\tYou have made a profit from your writing retreat!\n\n*achievement words visible 10 Words, Words, Words\n\tWill you actually get any writing done?\n\tYou have written over 5000 words!\n\n*achievement murder visible 5 Killer Scene\n\tHaven't you always wanted the perfect opportunity to kill someone? Is this your moment?\n\tYou really did it. You killed a man.\n\n*achievement murder_yay visible 5 Got Away With Murder\n\tHaven't you always wanted the perfect opportunity to kill someone? Is this your moment?\n\tYou did it. You killed a man, and got away with it.\n\n*achievement figured_it_out visible 10 Whodunnit\n\tWho is the killer?\n\tYou figured out the identity of the killer in a timely manner.\n\n*achievement convincing visible 5 Justice\n\tCan you see justice served?\n\tYou have played your part is seeing Aurelia's killer jailed. Well done.\n\n\n*if not(choice_is_web or choice_is_steam) and not(choice_randomtest)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tYou’re enjoying a writing retreat held in an Australian small town when one of your fellow writers is killed, and all the rest are suspects—including you. The ancient rectory grants you curious supernatural powers, and it’s not clear if the magic is benign or malevolent. Can you figure out who the killer is before they take another victim? Is the rectory the real killer? Or is this the ultimate chance to find out for yourself what it feels like to murder another person—and get away with it?\n\n\tDeath at the Rectory is a 87,000 word interactive magical murder mystery by Felicity Banks, where your choices control the story. It’s entirely text-based—without graphics or sound effects—and fuelled by the vast, unstoppable power of your imagination.\n\n\tAre you attracted to the vivacious Muslim woman or the charming American man? Do you dare to fall in love when the object of your affection might be a murderer? Will your word count survive the stress of being a murder suspect? Will you ever get a turn in the shower?\n\n\t•\tChoose from three genders, and whatever sexuality suits your mood.[n/]\n\t•\tPay attention to the clues, as the murderer is not the same in every play-through.[n/]\n\t•\tWho do you suspect, and who do you trust?[n/]\n\t•\tPick a genre, hero, and ending for your own novel outline.[n/]\n\t•\tGather clues to make your case to your fellow writers.[n/]\n\t•   Can you get away with murder?[n/]\n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t[i]You can play the first two chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first two chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2019-10-07 $3.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\nNotes: \n*line_break\nThis story usually contains a scene of briefly-described animal cruelty (committed by an evil character). It is possible (though difficult) to avoid that scene based on certain choices, but if you would like to simply remove that element from the story, you can.\n*fake_choice\n\t#Let the story happen in full.\n\t#Remove the animal cruelty.\n\t\t*set loki_no 1\n\nSince this story takes place in a real Australian small town, British/Australian spelling has been used throughout.\n\nI suffer from the food intolerances mentioned in this story, as well as social anxiety. Two members of my immediate family suffer from inattentive ADD.\n\nThe identity of the murderer changes randomly from story to story, and certain crucial clues change accordingly.\n\nI am also the writer of the award-winning piratical Hosted Game \n*link https://www.choiceofgames.com/user-contributed/scarlet-sails/#utm_medium=web&utm_source=ourgames Scarlet Sails\nand the magical steampunk Hosted Game \n*link https://www.choiceofgames.com/user-contributed/attack-of-the-clockwork-army/#utm_medium=web&utm_source=ourgames Attack of the Clockwork Army\nas well as the scifi tale THE FLOATING CITY (eta 2020). I am one of the writers for the retro scifi comedy HG \n*link https://www.choiceofgames.com/user-contributed/starship-adventures/#utm_medium=web&utm_source=ourgames Starship Adventures \nand the portal adventure HG \n*link https://www.choiceofgames.com/user-contributed/lost-in-the-pages/#utm_medium=web&utm_source=ourgames Lost in the Pages.\n\n*finish Begin"}};
