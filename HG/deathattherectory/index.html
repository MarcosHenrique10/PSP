\t\t\t\t\t\t\"I know you killed Aurelia,\" you say.\n\n\t\t\t\t\t\tHe turns to face you with a smile already in place, but you don't look away and his own smile fades in response. \"You're serious.\"\n\n\t\t\t\t\t\t\"I am.\"\n\n\t\t\t\t\t\tHe sighs. \"I had a feeling you might have figured it out. Why do you think I insisted on coming with you?\"\n\n\t\t\t\t\t\t\"Yeah.\"\n\n\t\t\t\t\t\t\"So what are you going to do?\" he says. \"Are you going to give me your keys and let me go? Because if not, things are not going to go well for you.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Let him go.\n\t\t\t\t\t\t\t\t\"Thanks muchly,\" he says, and drives away in your car.\n\t\t\t\t\t\t\t\t*set cash -5000\n\n\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t#Fight him.\n\t\t\t\t\t\t\t\t*if fitness > 40\n\t\t\t\t\t\t\t\t\t*goto fight_bit_a\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto fight_bit_b\n\t\t\t\t\t\t\t#\"I've got a knife!\"\n\t\t\t\t\t\t\t\tEric blinks, confused.\n\n\t\t\t\t\t\t\t\t*if fitness > 40\n\t\t\t\t\t\t\t\t\t*goto fight_bit_a\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto fight_bit_b\n\t\t\t*elseif fitness > 40\n\t\t\t\t*label fight_bit_a\n\t\t\t\tYou smile politely and then you strike, leaping onto his back like a child, wrapping both your hands around his neck, and your legs around his waist so he can't easily throw you off.\n\n\t\t\t\tIt's surprisingly hard to truly fight for your life, but you've always prioritised your physical fitness, and now it saves your life. He hurls himself backwards, throwing you hard against the car, but you don't let go. His breath is shortening with panic, and his skin is sweaty under your hands.\n\t\t\t\t*label murderer_mid_murder\n\n\t\t\t\tAt last he sinks to the ground, and you know you're going to live. The question is, will he?\n\t\t\t\t*choice\n\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t*if (empathetic \u003c 30) or (art > 70)\n\t\t\t\t\t\t\tIt's a little creepy, how easy it is to do. You feel like you've trained for this all your life—and you hold his life in your two hands, wishing only that you could flip him over so you could see the light fading from his eyes. Your arms tremble with the strain, but you know this is your special moment and you mustn't give up too soon.\n\n\t\t\t\t\t\t\tIt's only been a few minutes, but he's already losing energy. He looks more and more like a rag doll slumped over itself after being tossed into a corner. You keep holding on for a count of five hundred before letting go and finally looking at his face. It looks slack and wrong in death. There's certainly no pulse.\n\n\t\t\t\t\t\t\tYou've done it. You've killed a man. And it's the greatest rush you've ever felt.\n\n\t\t\t\t\t\t\t\"Thank you, Eric,\" you whisper, feeling overcome. \"I could never have done it without you.\"\n\n\t\t\t\t\t\t\t\"$!{name}! Eric!\" comes a voice from behind you.\n\n\t\t\t\t\t\t\tAh yes. You're not alone in this profoundly intimate moment with your victim. How irritating.\n\n\t\t\t\t\t\t\tTime to play the shattered innocent.\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#\"Help! Eric is the killer!\"\n\t\t\t\t\t\t\t\t#\"Help! Eric just attacked me!\"\n\t\t\t\t\t\t\t\t#\"Help! Eric is dying!\"\n\t\t\t\t\t\t\t*achieve murder\n\t\t\t\t\t\t\tIt's not at all clear if Bruce believes you or not, but he checks Eric for a pulse, and when he doesn't find one he calls the police. He asks you if you're hurt, and stays with you until the police let you both go back to the rectory.\n\t\t\t\t\t\t\t*goto murderer_post_murder\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou try to tighten your hands around his neck but it hurts your arms and fingers so much you can't help thinking of how he must be feeling, and it's unbearable.\n\n\t\t\t\t\t\t\tDespite how much you try to keep killing him, your hands loosen. By the time he wriggles out of your grip, it's too late for you.\n\n\t\t\t\t\t\t\t*goto he_kills_you\n\t\t\t\t\t#Wait until you're sure he's unconscious, then let go.\n\t\t\t\t\t\t*if observation \u003c 20\n\t\t\t\t\t\t\tYour hands ache, and you're glad to finally let him go. Too bad you're not observant enough to have timed it correctly.\n\t\t\t\t\t\t\t*label he_kills_you\n\n\t\t\t\t\t\t\tHe grabs you before you even stand up, and suddenly you're the one with hands around your neck, squeezing hard. You beat at his arms and kick at his legs, but he holds on as if his life depends on it, facing you with a terrible focus in his eyes.\n\n\t\t\t\t\t\t\tThis isn't his first kill.\n\n\t\t\t\t\t\t\tYour vision sparkles, and then turns dark. All your limbs grow too heavy to move, and you lose your fight; dying among the weedy grass and hard-packed dirt. What a stupid way to end the story of your life.\n\n\t\t\t\t\t\t\tOn the up side, your tragic end makes your stories sell like hotcakes.\n\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour hands ache, but you make yourself persist until you're absolutely sure he's unconscious, and then you release him only a millimetre at a time, checking that he doesn't spring up. It's an enormous relief to finally let him go.\n\n\t\t\t\t\t\t\tHe lies slumped on the hard-packed earth like a sleeping child.\n\n\t\t\t\t\t\t\tYou check his pulse is steady and then hurry inside to gather the others.\n\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t#Call for help.\n\t\t\t\t\t\t*label help\n\t\t\t\t\t\t\"Help!\" you yell. \"Somebody help!\"\n\n\t\t\t\t\t\tNothing happens. Your arms are aching and Eric is thrashing in your grip. You can yell once more and if no one comes you'll be out of options.\n\n\t\t\t\t\t\t\"HELP!\"\n\n\t\t\t\t\t\tBruce pushes aside the lace curtain beside the front door and sees you. He grabs the bell from the inside and rings it hard before running out to help you.\n\n\t\t\t\t\t\tFor an awful moment he's standing next to you and Eric as you grapple on the hard ground, and you realise neither of you has the breath to make a case against the other. Bruce is going to choose who to help.\n\n\t\t\t\t\t\t*if bruce > 50\n\t\t\t\t\t\t\tHe grabs Eric's arms and the two of you restrain Aurelia's killer together. Thank goodness you were friendly with Bruce.\n\n\t\t\t\t\t\t\tThe others pour out of the house, stopping short when they see Eric struggling to get up off the ground. Together, you all go into the house—including Eric.\n\n\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tHe grabs your arms and he and Eric pin you down. You should have been friendly towards Bruce when you had the chance!\n\n\t\t\t\t\t\t\t\"Thank you,\" gasps Eric. \"You're a life saver.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe others pour out of the house, stopping short when they see you struggling to get up off the ground. \n\n\t\t\t\t\t\t\t\"I can explain,\" you say.\n\n\t\t\t\t\t\t\tTamsin purses her lips, but at last she says, \"Let's hear what $!{name} has to say.\"\n\n\t\t\t\t\t\t\tTogether, you all go into the house—including Eric.\n\n\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t*else\n\t\t\t\t*label fight_bit_b\n\t\t\t\tYou smile politely. Then you strike, punching him in the nose. It breaks with a satisfying crunch, and Eric howls in pain and surprise and grabs his bleeding face. You twist around and leap onto his back like a child, wrapping both your hands around his neck, and your legs around his waist so he can't easily throw you off.\n\n\t\t\t\tExcept he absolutely can. You lie on the ground where he threw you, looking up at a blue sky as you desperately try to breathe—and fail. It's hard not to panic when it's so hard to draw breath. It's even harder knowing you're at Eric's mercy.\n\n\t\t\t\tHe might not look like a body builder, but he's more than a match for you.\n\t\t\t\t*choice\n\t\t\t\t\t*if (hide = 0)\n\t\t\t\t\t\t#Hide\n\t\t\t\t\t\t\t*goto hide\n\t\t\t\t\t#Beg for mercy.\n\t\t\t\t\t\t*label mercy\n\t\t\t\t\t\t*if imagination > 50\n\t\t\t\t\t\t\t*set cash -5000\n\t\t\t\t\t\t\tYou beg for mercy, desperately making up a story about the power of love that is so involving real tears spring into your eyes.\n\n\t\t\t\t\t\t\tTo your amazement, your feat of imagination works and Eric releases you. He steals your car, which is less than ideal, but it's a whole lot better than getting murdered.\n\n\t\t\t\t\t\t\tYou go back inside and gather the others to tell them what happened.\n\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou desperately babble apologies and promise wealth and forgiveness, but it's clear your stories aren't good enough. He kneels on your chest and wraps his fingers around your throat.\n\n\t\t\t\t\t\t\tYou beat at his arms and kick at his legs, but he holds on as if his life depends on it, facing you with a terrible focus in his eyes.\n\n\t\t\t\t\t\t\tThis isn't his first kill.\n\n\t\t\t\t\t\t\tYour vision sparkles, and then turns dark. All your limbs grow too heavy to move, and you lose your fight; dying on the hard dirt and dust of Gundagai.\n\n\t\t\t\t\t\t\tYou'll never write another story again.\n\n\t\t\t\t\t\t\tOn the up side, your tragic death makes your stories sell like hotcakes.\n\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t#Scream for help as you struggle.\n\t\t\t\t\t\t*goto help\n\t\t#Lure Eric under the house to trap him.\n\t\t\t\"Hey, have you seen under the house?\" you say.\n\n\t\t\t\"Of course.\"\n\n\t\t\t\"Well, uh, could you show me around? I never got a proper look.\"\n\n\t\t\tHe shrugs. \"Why not?\"\n\n\t\t\tIt's almost like he wants to be alone with you. Unfortunately, it's immediately obvious that the door under the house is badly damaged by age and time. The lock is modern, but Eric simply reaches his hand through a hole to unlock it.\n\n\t\t\tIt was supposed to be easy to slam and lock the door, trapping him.\n\t\t\t*choice\n\t\t\t\t#Improvise a trap using random objects around the place.\n\t\t\t\t\tThe slate outer wall of the house comes all the way down to the ground, making an L-shaped storage space under the deck and blocking off the area under the house except for a hole the width of a large dog that has clearly proven useful to electricians—there are several coloured wires going into the space beneath the house proper.\n\n\t\t\t\t\tOne side of the L-shaped space has several long metal stands used for the church's annual flower show.\n\n\t\t\t\t\tEric walks over to the hole. \"The poor tradies who pulled this house into the electrical age had to crawl through here,\" he says.\n\n\t\t\t\t\t\"It doesn't look so bad,\" you say.\n\n\t\t\t\t\t\"Go on,\" he says. \"Take a closer look.\"\n\n\t\t\t\t\t\"After you!\"\n\n\t\t\t\t\t\"I've been in there before,\" he says.\n\n\t\t\t\t\t\"Show me.\"\n\n\t\t\t\t\tYou can see he doesn't want to go in, but the urge to be impressive is too much for someone like Eric. He climbs inside and crawls deeper while you act awed and hesitant.\n\t\t\t\t\t*page_break\n\t\t\t\t\tThe second he's fully inside the hole you barricade it with metal shelves, bricks, and everything else nearby.\n\n\t\t\t\t\t\"Hey!\" he says. \"What are you doing? That's not funny.\"\n\n\t\t\t\t\tYou brace your barrier with your back and scream for help, knowing the barrier won't last long.\n\n\t\t\t\t\tTen minutes later, everyone is standing around in the living room, including a very dusty and angry Eric.\n\n\t\t\t\t\t*goto group_talk_b\n\t\t\t\t#Run to the car.\n\t\t\t\t\tYou almost make it all the way into your car, but Eric is too close.\n\t\t\t\t\t*goto fight\n\t\t\t\t#Calmly go back to the car as if nothing is wrong.\n\t\t\t\t\t*goto bridge\n\t\t#Hide.\n\t\t\t*set hide 1\n\t\t\t*label hide\n\t\t\t*if knowledge > 40\n\t\t\t\t*set cash -5000\n\t\t\t\tLuckily you paid attention every time there was an opportunity to learn more about this place. You know that the office and hall are locked… and the bathrooms beside the hall are not. There's a chance Eric could be fooled by a locked door.\n\n\t\t\t\tYou race around the back of the bathrooms before carefully circling back, going inside, and locking the door. It's not glamorous crouching on top of the toilet seat and trying to breathe quietly as Eric bangs around looking for you.\n\n\t\t\t\tHe doesn't find you.\n\n\t\t\t\tAt last you hear your own car drive away and you creep out and then go inside to talk to the others.\n\n\t\t\t\t*goto group_talk\n\t\t\t*else\n\t\t\t\tAs you break and run, you realise instantly that Eric knows more about this place (not to mention this town) than you. You keep running, sorting frantically through everything you've learned this week and realising that you're utterly screwed.\n\t\t\t\t*choice\n\t\t\t\t\t#Play it off as a joke and get into the car.\n\t\t\t\t\t\t*goto bridge\n\t\t\t\t\t#Fight him.\n\t\t\t\t\t\t*goto fight\n\t\t#Get in the car and act as if nothing is wrong.\n\t\t\t\t\t\t*goto bridge\n*else\n\t*label innocent\n\tYou can't help feeling like you're missing something important. Still, observation was never your strong suit and the feeling is familiar.\n\t*goto bridge\n*label group_talk\n\"Eric murdered Aurelia!\" you blurt out.\n\n\"That's quite a claim,\" Bruce says stiffly. \"You'd want to be very sure to make a claim like that.\"\n*label try_again\n*choice\n\t*disable_reuse #Appeal to Lala.\n\t\t\"Lala, you know I'm right,\" you say. \"Don't you?\"\n\t\t*if lala > 70\n\t\t\t\"Absolutely,\" she says, \"and not just because I like you.\"\n\n\t\t\t\"Really?\" you say.\n\n\t\t\t\"Yes,\" she says. \"I'm a lie detector, remember? All this time, I've been watching everyone closely. And sometimes the magic tells me things that haven't happened yet. Renee is going to be freed today. I've already called the police.\"\n\n\t\t\t\"Really?\" you say, shocked that your ordeal is over as easily as that.\n\n\t\t\tShe smiles. \"Yes. In a little while, we can all go home.\"\n\t\t\t*label home\n\t\t\t*page_break\n\t\t\t*achieve convincing\n\t\t\tTwo days later, you walk through the door of your home and dump your bag on the chair before falling face-first onto the bed.\n\n\t\t\tIt's been quite a week. But you survived. Altogether, you wrote ${word_count} words.\n\t\t\t*if (word_count > 5000)\n\t\t\t\t*achieve words\n\t\t\t\t*goto gogoabk\n\t\t\t*else\n\t\t\t*label gogoabk\n\t\t\t*choice\n\t\t\t\t#Write some more.\n\t\t\t\t\t*set word_count +2000\n\t\t\t\t\tIt's a funny thing. After all you've been through, the blank page is still scary. You're afraid to fail, afraid to not be as good as you like to think you are.\n\n\t\t\t\t\tBut you tell yourself that, unlike life, this is something you can rewrite until it's just the way you want it. With your perfectionism switched off, you're able to write. And it feels good.\n\n\t\t\t\t\t*if (word_count > 5000)\n\t\t\t\t\t\t*achieve words\n\t\t\t\t\t\t*goto lala_bit\n\t\t\t\t\t*else\n\t\t\t\t\t*goto lala_bit\n\t\t\t\t#Shower.\n\t\t\t\t\tOh man. This is simultaneously the greatest and the most disgusting shower you've ever had.\n\t\t\t\t\t*goto lala_bit\n\t\t\t\t#Apply for a day job.\n\t\t\t\t\tEven the greatest writers need to eat. Time to join the real world. A job will give you loads of real-world experience to use in your writing.\n\n\t\t\t\t\tOr maybe you'll just be part of the world, for its own sake.\n\n\t\t\t\t\tYou call your Aunt Bernice. She's so pleased that you're willing to babysit her brood of monsters that she pays you in advance. It's more than a little ominous, but it's also awesome to have cash in hand.\n\n\t\t\t\t\tIt might not be your dream job, but that's okay. No one is stopping you writing in your spare time, and if you don't like this job you can get another. Life is full of choices, after all.\n\t\t\t\t\t*set cash +500\n\t\t\t\t\t*achieve profit\n\t\t\t\t\t*goto lala_bit\n\t\t\t*label lala_bit\n\t\t\t*if lala_love = 1\n\n\t\t\t\tYou've just put on a load of washing when your phone rings.\n\n\t\t\t\t\"$!{name}?\" says Lala.\n\n\t\t\t\t\"Hey.\"\n\n\t\t\t\t\"I miss being around you 24-7,\" she says. \"Can I take you out for a proper date tomorrow?\"\n\n\t\t\t\t\"Of course!\"\n\n\t\t\t\tIt's good to be home.\n\t\t\t\t*goto_scene ending\n\t\t\t*if max_love = 1\n\n\t\t\t\tYou've just put on a load of washing when your phone rings.\n\n\t\t\t\t\"Hey,\" says Max.\n\n\t\t\t\t\"Hey.\"\n\n\t\t\t\t\"I miss living with you,\" he says. \"Can I take you out for a proper date tomorrow?\"\n\n\t\t\t\t\"Of course!\"\n\n\t\t\t\tIt's good to be home.\n\t\t\t\t*goto_scene ending\n\t\t\t*else\n\n\t\t\t\tIt's good to be home.\n\t\t\t\t*goto_scene ending\n\t\t*else\n\n\t\t\t\"I know you believe what you're saying,\" she says slowly. \"That doesn't mean you're right.\"\n\t\t\t*goto try_again\n\t*disable_reuse #Tell them the house told you.\n\t\t\"It was the magic,\" you say. \"I figured it out, and the house confirmed it.\"\n\n\t\tBruce shakes his head, disbelieving. \n\t\t*if tamsin > 50\n\n\t\t\t\"Hold on,\" says Tamsin, wincing. \"I think $!{name} is right—and so does the house. In fact, I've already called the police. This is over.\"\n\n\t\t\t\"Really?\" says Lala. \"This is it? We can go home?\"\n\t\t\t*goto home\n\t\t*else\n\n\t\t\tIt's definitely not the right tack for this crowd.\n\n\t\t\t*goto try_again\n\t*disable_reuse #Go through the non-magical clues you've found.\n\t\t\"We all agree it's not Renee,\" you say, and there are several nods.\n\n\t\t*if clue_one > 0\n\t\t\t\"We know the wine was drugged.\"\n\n\t\t\t\"Specifically, the red wine,\" Max agrees.\n\n\t\t\t\"Eric and Max both had the opportunity to drug it that night,\" you say. \"And Lala and I could have drugged it earlier in the day. Therefore, Tamsin and Bruce are off the hook.\"\n\n\t\t\t\"Ta so much,\" says Bruce.\n\t\t\t*page_break\n\t\t\t*goto d\n\t\t*else\n\t\t*label d\n\t\t*if clue_three > 0\n\t\t\t\"I found the murder weapon hidden under the house,\" you say. \"Other than Bruce, any of us could have easily left it there, since the door is not secure. But it's more likely that it was someone who had spent time outside. That is, Max—because he goes for a run every day—or Eric, because he knows the whole area very well. Or me, of course, since I could have planted it myself.\"\n\t\t\t*goto e\n\t\t*else\n\t\t*label e\n\n\t\t\"All very interesting,\" says Lala doubtfully.\n\t\t*if clue_two = 1\n\t\t\t\"Max hated Aurelia for catfishing his sister,\" you say. \"That motive falls flat, because once he saw her he realised she was just another flawed human. And that he was no murderer. Which counts him out.\"\n\t\t\t*goto f\n\t\t*else\n\t\t*label f\n\n\t\t\"You're assuming a great deal,\" Bruce points out, looking uneasily at Max.\n\n\t\t\"For obvious reasons, I counted myself out,\" you say, realising for the first time how guilty you must look.\n\t\t*if clue_four > 0\n\t\t\t\"But I believe the house can be trusted to assist us, as much as it is able, due to its own sense of order. Including Renee and Lala's ability to tell truth from lies—but only in the most literal sense. You all remember when we stood in a full group and stated, 'I did not Aurelia' one by one. No one was lying, as far as Renee could tell. That suggested that either the magic was unreliable, or we were all innocent. But neither of those things are true.\"\n\t\t\t*goto g\n\t\t*else\n\t\t*label g\n\n\t\tYou take a deep breath. \"I did not kill [i]Annaliese[/i]. Max, did you kill Annaliese?\"\n\n\t\tHis eyes brighten as he understands what you're doing. \"No. I did not kill Annaliese.\"\n\n\t\tLala nods her confirmation; her eyes shining.\n\n\t\tIt's a simple matter from there to go around the group. With everyone else eliminated by both logic and magic, Eric is the only suspect remaining. Tamsin calls the police and tells them where to find him.\n\t\t*goto home\n*label group_talk_b\n\"Eric murdered Aurelia!\" you blurt out.\n\n\"How dare you!\" Eric says. His eyes fill with tears, and Tamsin goes and puts a comforting hand on his shoulder.\n\n\"That's quite a claim,\" Bruce says stiffly. \"You'd want to be very sure to make a claim like that.\"\n*label try_again_b\n*choice\n\t*disable_reuse #Appeal to Lala.\n\t\t\"Lala, you know I'm right,\" you say. \"Don't you?\"\n\n\t\t*if lala > 70\n\t\t\t\"Absolutely,\" she says, gently tugging Tamsin away from Eric, \"and not just because I like you.\"\n\n\t\t\t\"Really?\" you say.\n\n\t\t\t\"Yes,\" she says. \"I'm a lie detector, remember? All this time, I've been watching everyone closely. And sometimes the magic tells me things that haven't happened yet. Renee is going to be freed today. I've already called the police.\"\n\n\t\t\t\"Really?\" you say, shocked that your ordeal is over as easily as that.\n\n\t\t\tShe smiles. \"Yes. In a little while, we can all go home.\"\n\t\t\t*label eric_panic\n\t\t\t*page_break\n\t\t\t*achieve convincing\n\t\t\t\"No,\" says Eric, backing away from all of you. \"No, no, no, no, no! I'm not ready yet.\"\n\n\t\t\t\"Was there a convenient time for you to be arrested?\" Bruce asks, moving in front of the door. \n\n\t\t\tAs if on a signal, Max and Tamsin each take one of Eric's arms.\n\n\t\t\t\"No,\" says Eric, doggedly shaking his head. \"This isn't how it's meant to go. I already wrote this scene.\"\n\n\t\t\t\"If you were a better writer, you'd be more used to rewrites,\" says Bruce, already getting out his phone to call the police. \"Well done $!{name}, by the way. I definitely underestimated your intelligence.\"\n\n\t\t\t\"Er… thank you?\"\n\t\t\t*label home_b\n\t\t\t*page_break\n\t\t\tTwo days later, you walk through the door of your home and dump your bag on the chair before falling face-first onto the bed.\n\n\t\t\tIt's been quite a week. But you survived. Altogether, you wrote ${word_count} words.\n\t\t\t*if (word_count > 5000)\n\t\t\t\t*achieve words\n\t\t\t\t*goto gogoabk\n\t\t\t*else\n\t\t\t*goto gogoabk\n\t\t*else\n\t\t\t\"I know you believe what you're saying,\" she says slowly. \"That doesn't mean you're right.\"\n\t\t\t*goto try_again_b\n\t*disable_reuse #Tell them the house told you.\n\t\t\"It was the magic,\" you say. \"I figured it out, and the house confirmed it.\"\n\n\t\tBruce shakes his head, disbelieving. \n\t\t*if tamsin > 50\n\n\t\t\t\"Hold on,\" says Tamsin, wincing. \"I think $!{name} is right—and so does the house. In fact, I've already called the police. This is over.\"\n\n\t\t\t\"Really?\" says Lala. \"This is it? We can go home?\"\n\t\t\t*goto eric_panic\n\t\t*else\n\n\t\t\tIt's definitely not the right tack for this crowd.\n\n\t\t\t*goto try_again_b\n\t*disable_reuse #Go through the non-magical clues you've found.\n\t\t\"We all agree it's not Renee,\" you say, and there are several nods.\n\n\t\tYou take a moment to gather your thoughts.\n\n\t\t*if clue_one > 0\n\t\t\t\"We know the wine was drugged.\"\n\n\t\t\t\"Specifically, the red wine,\" Max agrees.\n\n\t\t\t\"Eric and Max both had the opportunity to drug it that night,\" you say. \"And Lala and I could have drugged it earlier in the day. Therefore, Tamsin and Bruce are off the hook.\"\n\n\t\t\t\"Ta so much,\" says Bruce.\n\n\t\t\t\"I'm sure you could have poisoned the wine if you really wanted to,\" says Eric. He's visibly uncomfortable, which is more encouraging than the rapt looks of the others.\n\t\t\t*page_break\n\t\t\t*goto da\n\t\t*else\n\t\t*label da\n\t\t*if clue_three > 0\n\t\t\t\"I found the murder weapon hidden under the house,\" you say. \"Other than Bruce, any of us could have easily left it there, since the door is not secure. But it's more likely that it was someone who had spent time outside. That is, Max—because he goes for a run every day—or Eric, because he knows the whole area very well. Or me, of course, since I could have planted it myself.\"\n\n\t\t\t\"All very interesting,\" says Lala doubtfully.\n\n\t\t\t*goto eaaa\n\t\t*else\n\t\t*label eaaa\n\t\t*if clue_two = 1\n\t\t\t\"Max hated Aurelia for catfishing his sister,\" you say. \"He already told Lala and I that he planted the brochure to lure her here, but that motive falls flat, because once he saw her he realised she was just another flawed human. And that he was no murderer. Which counts him out.\"\n\n\t\t\t\"You're assuming a great deal,\" Bruce points out, looking uneasily at Max.\n\t\t\t*goto faa\n\t\t*else\n\t\t*label faa\n\n\t\t\"For obvious reasons, I wasn't counting myself as a suspect,\" you say, realising for the first time how guilty you must look.\n\t\t*if clue_four > 0\n\t\t\t\"But I believe the house can be trusted to assist us, as much as it is able, due to its own sense of order. Including Renee and Lala's ability to tell truth from lies—but only in the most literal sense. When we first met in a full group and all stated, 'I did not Aurelia' it suggested that either the magic was unreliable, or we were all innocent. But neither of those things are true.\"\n\t\t\t*goto gaa\n\t\t*else\n\t\t*label gaa\n\n\t\tYou take a deep breath. \"I did not kill [i]Annaliese[/i]. Max, did you kill Annaliese?\"\n\n\t\tHis eyes brighten as he understands what you're doing. \"No. I did not kill Annaliese.\"\n\n\t\tLala nods her confirmation; her eyes shining.\n\n\t\tIt's a simple matter from there to go around the group. With everyone else eliminated by both logic and magic, Eric is the only suspect remaining. \n\n\t\t\"I did not kill Annaliese,\" he says.\n\n\t\tLala shakes her head, stepping backwards instinctively.\n\t\t*goto eric_panic\n*label bridge\nYou drive down the hill and along the main street. Eric directs you to keep on going.\n*if killer_correct = 0\n\n\tYou suddenly realise what it is you were missing. Eric is the killer. The worst part is that he apparently thought you knew, and that's why he insisted on coming with you. And now you do know, but it's too late to do much about it.\n\n\t*goto i\n*else\n\t*label i\n\tAt last he directs you to pull over. The main street peters out suddenly, and you're utterly alone. Two roads with unfinished edges lead up the hill, and in the other direction there is a large warning sign and a temporary fence that has clearly remained in place for several years. There are weeds growing through the gaps, and it doesn't quite stand upright.\n\n\tIt's also your only plausible escape route.\n\t*choice\n\t\t#Fight.\n\t\t\t*label bridge_fight\n\t\t\t*if clue_three = 3\n\t\t\t\tYou smile politely and open the driver's side door, bending down to retrieve the knife.\n\n\t\t\t\tThis is real. This is life and death.\n\n\t\t\t\tEric is the piece of trash that killed Aurelia. \n\t\t\t\t*if (loki_saved = 0) and (loki_no = 0)\n\t\t\t\t\tAnd Loki.\n\t\t\t\t\t*goto murderer_mid_murder_bridge\n\t\t\t\t*else\n\t\t\t\t*label murderer_mid_murder_bridge\n\n\t\t\t\tAs you straighten, holding the knife by your leg, Eric is still sitting in the passenger waiting to see what you do next. Walking around the car feels like wading through quicksand. Everything is slow, and hard, and your heart feels like it's swelling up ready to explode.\n\n\t\t\t\tYou're distracted for a moment by the tragic beauty of the dying bridge. The ones who made it worked hard, putting it up on strong pillars to keep it above all possible future floods. Yet time ruined it still. Time ruins everything.\n\n\t\t\t\tThen you're at Eric's door, and he turns to face you.\n\t\t\t\t*choice\n\t\t\t\t\t#This is your chance. Kill him.\n\t\t\t\t\t\t*set murderer 1\n\t\t\t\t\t\t*label kill_bridge\n\t\t\t\t\t\tThe knife feels as heavy as life and death. A wave of excitement washes through you, hitting as hard as a gut-punch except it's delicious. You've never felt mightier.\n\n\t\t\t\t\t\tSpeed and force. That's what matters.\n\t\t\t\t\t\t*if fitness > 20\n\t\t\t\t\t\t\tThat, and a big knife.\n\n\t\t\t\t\t\t\tYou grab Eric's hair to keep him steady, and as he yelps in protest you stab him in the neck.\n\n\t\t\t\t\t\t\tWhy mess with a classic move? It might be a cliché but it sure worked for him.\n\n\t\t\t\t\t\t\tHis blood gushes out of him, some of it flowing and some of it spraying.\n\t\t\t\t\t\t\t*if (empathetic \u003c 40) or (art > 60)\n\n\t\t\t\t\t\t\t\tExcellent. The spraying is obviously arterial. Just a little more and Eric will most definitely be dead at your head.\n\n\t\t\t\t\t\t\t\tIt's a little creepy, how easy it is to do. You feel like you've trained for this all your life—and you stab him a second time as he screams, drooling pink froth.\n\n\t\t\t\t\t\t\t\tHe flops around like a fish on a line, thoroughly messing up the inside of your car. Since he can't stop you, you press his fingers around the knife handle where there's a blood-free gap. His fingerprints were probably already there, but it's better to be safe than sorry.\n\n\t\t\t\t\t\t\t\tIt's only been a few seconds, but he's already losing energy. He looks more and more like a rag doll slumped over itself after being tossed into a corner.\n\n\t\t\t\t\t\t\t\tYou've done it. You've killed a man. And it's the greatest rush you've ever felt.\n\n\t\t\t\t\t\t\t\t\"Thank you, Eric,\" you whisper, feeling overcome. \"I could never have done it without you.\"\n\n\t\t\t\t\t\t\t\tHis eyes swivel toward you with a visible effort, and glaze over even as you smile at him one last time.\n\n\t\t\t\t\t\t\t\t\"$!{name}! Eric!\" comes a voice from behind you.\n\n\t\t\t\t\t\t\t\tAh. You're not alone in this profoundly intimate moment with your victim. How irritating.\n\n\t\t\t\t\t\t\t\tBruce is jogging down the hill, sweaty and puffed from his efforts finding you. He's wearing his sunglasses, an absurdly oversized straw hat, and such thick layers of clothing you're surprised he's not just passing out in a puddle of his own sweat.\n\n\t\t\t\t\t\t\t\tTime to play the shattered innocent.\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#\"Help! Eric is the killer!\"\n\t\t\t\t\t\t\t\t\t#\"Help! Eric just attacked me!\"\n\t\t\t\t\t\t\t\t\t#\"Help! Eric is dying!\"\n\t\t\t\t\t\t\t\t*achieve murder\n\t\t\t\t\t\t\t\tIt's not at all clear if Bruce believes you or not, but he checks Eric for a pulse, and when he doesn't find one he calls the police. He asks you if you're hurt, and stays with you until the police let you both go back to the rectory.\n\t\t\t\t\t\t\t\t*goto murderer_post_murder\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou try to break his neck but it hurts your arms and fingers so much you can't help thinking of how he must be feeling, and it's unbearable.\n\n\t\t\t\t\t\t\t\tDespite how much you try to keep killing him, your hands loosen. By the time he wriggles out of your grip, it's too late for you.\n\n\t\t\t\t\t\t\t\t*goto he_kills_you_bridge\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set clue_three 4\n\t\t\t\t\t\t\tYou hope the knife is sharp enough that your relatively weak body can destroy Eric. Given that he cut Aurelia's throat you aim for his neck—but you're too slow.\n\n\t\t\t\t\t\t\tHe grabs your hand just as the blade breaks his skin, and the two of you freeze in an awkward tableau with Eric half climbing out of the car and you half climbing in. Then he wrenches the knife from your hand.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Run.\n\t\t\t\t\t\t\t\t\t*goto bridge_fight\n\t\t\t\t\t\t\t\t#Beg for mercy\n\t\t\t\t\t\t\t\t\t*goto mercy\n\t\t\t\t\t#Put the knife to his throat and tell him not to move until the police come back.\n\t\t\t\t\t\tThe knife feels as heavy as life and death. You raise it to his throat and wait for him to notice.\n\n\t\t\t\t\t\t\"$!{name}?\" he says, half laughing.\n\n\t\t\t\t\t\tThat small movement pushes his neck against the knife, cutting him. \"What is this?\" he says, no longer laughing—or moving. \"What are you doing?\"\n\n\t\t\t\t\t\t\"Don't move,\" you say, and slowly fish your phone from your pocket to call the police.\n\n\t\t\t\t\t\tHe's not lunging at you, but he's pulled out his own phone and called the house. \"Help,\" he say. \"$!{name} has a knife and ${he} won't let me go.\"\n\n\t\t\t\t\t\tThe others come immediately—even Bruce, covered in multiple layers of clothing despite the heat—and demand to know what's going on.\n\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t#Keep the knife hidden, and tell him you know he's the killer.\n\t\t\t\t\t\t\"I know you killed Aurelia,\" you say.\n\n\t\t\t\t\t\tHe turns to face you with a smile already in place, but you don't look away and his own smile fades in response. \"You're serious.\"\n\n\t\t\t\t\t\t\"I am.\"\n\n\t\t\t\t\t\tHe sighs. \"I had a feeling you might have figured it out. Why do you think I insisted on coming with you?\"\n\n\t\t\t\t\t\t\"Yeah.\"\n\n\t\t\t\t\t\t\"So what are you going to do?\" he says. \"Are you going to give me your keys and let me go? Because if not, things are not going to go well for you.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Let him go.\n\t\t\t\t\t\t\t\t*set cash -5000\n\t\t\t\t\t\t\t\t\"Thanks muchly,\" he says, and drives away in your car.\n\n\t\t\t\t\t\t\t\tYou trudge home, and gather the others to tell them you know who the killer is.\n\n\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t#Fight him.\n\t\t\t\t\t\t\t\t*goto kill_car\n\t\t\t\t\t\t\t#\"I've got a knife!\"\n\t\t\t\t\t\t\t\tEric blinks, confused.\n\n\t\t\t\t\t\t\t\t*goto kill_car\n\t\t\t*elseif fitness > 40\n\t\t\t\t*label bridge_fight_run\n\t\t\t\tYou punch Eric in the face and scramble through the fence. The bridge bends alarmingly under your feet, making you squeak in fear. For a moment, you think Eric won't risk following you. But he does.\n\n\t\t\t\tYou leap onto his back like a child, wrapping both your hands around his neck, and your legs around his waist so he can't easily throw you off.\n\n\t\t\t\tIt's hard to truly fight someone, but you've always prioritised your physical fitness, and now it saves your life. He hurls himself backwards, throwing you hard against the wooden planks of the bridge, but you don't let go. His breath is shortening with panic, and his skin is sweaty under your hands.\n\n\t\t\t\tAt last he sinks to the ground, and you know you're going to live. The question is, will he?\n\t\t\t\t*choice\n\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t*if (empathetic \u003c 30) or (art > 70)\n\t\t\t\t\t\t\tIt's a little creepy, how easy it is to do. You feel like you've trained for this all your life—and you hold his life in your two hands, wishing only that you could flip him over so you could see the light fading from his eyes. Your arms tremble with the strain, but you know this is your special moment and you mustn't give up too soon.\n\n\t\t\t\t\t\t\tIt's only been a few moments, but he's already losing energy. He looks more and more like a rag doll slumped over itself after being tossed into a corner. You keep holding on for a count of five hundred before letting go and finally looking at his face. It looks slack and wrong in death. There's certainly no pulse.\n\n\t\t\t\t\t\t\tYou've done it. You've killed a man. And it's the greatest rush you've ever felt.\n\n\t\t\t\t\t\t\t\"Thank you, Eric,\" you whisper, feeling overcome. \"I could never have done it without you.\"\n\n\t\t\t\t\t\t\t\"$!{name}! Eric!\" comes a voice from behind you.\n\n\t\t\t\t\t\t\tAh yes. You're not alone in this profoundly intimate moment with your victim. How irritating.\n\n\t\t\t\t\t\t\tTime to play the shattered innocent.\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#\"Help! Eric is the killer!\"\n\t\t\t\t\t\t\t\t#\"Help! Eric just attacked me!\"\n\t\t\t\t\t\t\t\t#\"Help! Eric is dying!\"\n\t\t\t\t\t\t\t*achieve murder\n\t\t\t\t\t\t\tIt's not at all clear if Bruce believes you or not, but he checks Eric for a pulse, and when he doesn't find one he calls the police. He asks you if you're hurt, and stays with you until the police let you both go back to the rectory.\n\t\t\t\t\t\t\t*goto murderer_post_murder\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou try to tighten your hands around his neck but it hurts your arms and fingers so much you can't help thinking of how he must be feeling, and it's unbearable.\n\n\t\t\t\t\t\t\tDespite how much you try to keep killing him, your hands loosen. By the time he wriggles out of your grip, it's too late for you.\n\n\t\t\t\t\t\t\t*goto he_kills_you_bridge\n\t\t\t\t\t#Wait until you're sure he's unconscious, then let go.\n\t\t\t\t\t\t*if observation \u003c 20\n\t\t\t\t\t\t\tYour hands ache, and you're glad to finally let him go. Too bad you're not observant enough to have timed it correctly.\n\n\t\t\t\t\t\t\tHe grabs you before you even stand up, and suddenly you're the one with strong hands around your neck, squeezing hard. \n\t\t\t\t\t\t\t*label he_kills_you_bridge\n\t\t\t\t\t\t\tYou beat at his arms and kick at his legs, but he holds on as if his life depends on it, facing you with a terrible focus.\n\n\t\t\t\t\t\t\tThis isn't his first kill.\n\n\t\t\t\t\t\t\tYour vision sparkles, and then turns dark. All your limbs grow too heavy to move, and you lose your fight; dying on the bowed and splintery wood of the ruined bridge.\n\n\t\t\t\t\t\t\tOn the up side, your stories sell like hotcakes when your tragic death hits the news.\n\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour hands ache, but you make yourself persist until you're absolutely sure he's unconscious, and then you release him only a millimetre at a time, checking that he doesn't spring up. It's an enormous relief to finally let him go.\n\n\t\t\t\t\t\t\tHe lies slumped on the hard-packed earth like a sleeping child.\n\n\t\t\t\t\t\t\tYou check his pulse is steady and then hurry back to the house to gather the others.\n\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t#Call for help.\n\t\t\t\t\t\t\"Help!\" you yell. \"Somebody help!\"\n\n\t\t\t\t\t\tNothing happens. Your arms are aching and Eric is thrashing in your grip. You can yell once more and if no one comes you'll be out of options.\n\n\t\t\t\t\t\t\"HELP!\"\n\n\t\t\t\t\t\t\"$!{name}! I'm here!\" \n\n\t\t\t\t\t\tOf all people, it's Bruce who was suspicious enough to follow you and Eric down the hill. \n\n\t\t\t\t\t\tFor an awful moment he's watching you and Eric as you roll around on the ancient wood, and you realise neither of you has the breath to make a case against the other. Bruce is going to choose who to help.\n\n\t\t\t\t\t\t*if bruce > 50\n\t\t\t\t\t\t\tHe grabs Eric's arms and the two of you restrain Aurelia's killer together. You are deeply grateful that you weren't a jerk to Bruce.\n\n\t\t\t\t\t\t\tTogether, you and Bruce escort Eric back to the rectory, and gather the others.\n\n\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tHe grabs your arms and he and Eric pin you down. You wish you hadn't thought so little of Bruce.\n\n\t\t\t\t\t\t\t\"Thank you,\" gasps Eric. \"You're a life saver.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tTogether, Eric and Bruce escort you back to the rectory, and gather the others. You still have a chance to speak for yourself.\n\n\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t*else\n\t\t\t\tYou grab for Eric's neck but he knocks your weak arms away easily. He laughs at you, and climbs out of the car. \n\n\t\t\t\tWith no other options, you flee through the ramshackle fence onto the broken bridge.\n\n\t\t\t\tThe ancient wood bends alarmingly under your feet, making you squeak in fear. For a moment, you think Eric won't risk following you. But he does. \n\n\t\t\t\tYou try to run, but he catches you easily and and throws you so hard at the weary timbers of the bridge that you're shocked you didn't go straight through to the ground several metres below.\n\n\t\t\t\tYou lie on the splintery wood, looking up at a blue sky as you desperately try to breathe—and fail. Eric stamps on your arm, making you screech in pain.\n\t\t\t\t*label bbc\n\t\t\t\t*choice\n\t\t\t\t\t*disable_reuse #Hide.\n\t\t\t\t\t\tThere's nowhere to hide.\n\t\t\t\t\t\t*goto bbc\n\t\t\t\t\t#Beg for mercy.\n\t\t\t\t\t\t*if imagination > 50\n\t\t\t\t\t\t\t*set cash -5000\n\t\t\t\t\t\t\tYou beg for mercy, desperately making up a story about the power of love that is so involving real tears spring into your eyes.\n\n\t\t\t\t\t\t\tTo your amazement, your feat of imagination works and Eric releases you. He steals your car, which is less than ideal, but it's a whole lot better than getting murdered.\n\n\t\t\t\t\t\t\tYou return to the house and gather the others to tell them what happened.\n\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou desperately babble apologies and promise wealth and forgiveness, but it's clear your stories aren't good enough. He kneels on your chest and wraps his fingers around your throat.\n\n\t\t\t\t\t\t\tYou beat at his arms and kick at his legs, but he holds on as if his life depends on it, facing you with a terrible focus.\n\n\t\t\t\t\t\t\tThis isn't his first kill.\n\n\t\t\t\t\t\t\tYour vision sparkles, and then turns dark. All your limbs grow too heavy to move, and you lose your fight; dying on the splintery and broken bridge.\n\n\t\t\t\t\t\t\tYou'll never write another story again.\n\n\t\t\t\t\t\t\tOn the up side, your tragic death sells a bunch of your books.\n\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*achieve profit\n\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t#Scream for help.\n\t\t\t\t\t\t\"Help!\" you yell. \"Somebody help!\"\n\n\t\t\t\t\t\tNothing happens. You can yell once more and if no one comes you'll be out of options.\n\n\t\t\t\t\t\t\"HELP!\"\n\n\t\t\t\t\t\tBruce comes puffing into sight, wearing multiple layers of clothing and an oversized sun hat.\n\n\t\t\t\t\t\tFor an awful moment he pauses, and you realise neither you nor Eric has the breath to make a case against the other. Bruce is going to choose who to help based on instinct.\n\n\t\t\t\t\t\t*if bruce > 50\n\t\t\t\t\t\t\tHe grabs Eric's arms and the two of you restrain Aurelia's killer together. Thank goodness you were friendly with Bruce.\n\n\t\t\t\t\t\t\tThe three of you return to the house in an awkward silence, and gather the others.\n\n\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tHe grabs your arms and he and Eric pin you down. You should have been friendly towards Bruce when you had the chance!\n\n\t\t\t\t\t\t\t\"Thank you,\" gasps Eric. \"You're a life saver.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe three of you return to the house in an awkward silence. There's still a chance for you to save the day.\n\n\t\t\t\t\t\t\t*goto group_talk_b\n\t\t#Flight.\n\t\t\t*goto bridge_fight_run\n\t\t*selectable_if (talk = 0) #Talk your way out of this.\n\t\t\t*if imagination > 40\n\t\t\t\tYou have to come up with something believable, and fast. Fortunately, you're a writer. Making stuff up is what you do.\n\t\t\t\t*if magic = 2\n\t\t\t\t\t\"C'mon magic,\" you whisper under your breath. \"Get me out of this.\"\n\n\t\t\t\t\tYou grit your teeth, trying to will yourself into the air.\n\n\t\t\t\t\t\"$!{name}!\" says Eric, \"you're flying!\"\n\n\t\t\t\t\tHe grabs your foot, holding you like a kite.\n\n\t\t\t\t\t\"Oops,\" you say.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Uh… would you mind steering me back to the car?\"\n\t\t\t\t\t\t\tHe laughs delightedly, and then apologises for mocking your predicament. If he wasn't a murderer, he'd be the perfect gentleman. And right now he doesn't see you as a threat. \n\n\t\t\t\t\t\t\tHe steers you into the car and takes you home, where the others are gathering on the rear balcony.\n\n\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t#Wriggle out of his grip and take your chances with the sky.\n\t\t\t\t\t\t\tHe gasps in surprise rather than pain as you twist out his grip and float out of his reach.\n\n\t\t\t\t\t\t\t\"What are you doing?\" he shouts up at you.\n\n\t\t\t\t\t\t\t\"Can't help it,\" you say back.\n\n\t\t\t\t\t\t\t\"Do you need help?\"\n\n\t\t\t\t\t\t\t\"No, I'm fine. It'll wear off in a minute. Meet you back at the house?\"\n\n\t\t\t\t\t\t\t\"If you're sure…\"\n\n\t\t\t\t\t\t\t\"I'm sure.\"\n\n\t\t\t\t\t\t\tHe frowns in thought for a moment, looking genuinely concerned for your safety, and then gets back in the car and drives away.\n\n\t\t\t\t\t\t\tYou continue rising upwards, quickly reaching the height of the fence, and then the tallest of the nearby trees.\n\t\t\t\t\t\t\t*goto flying_mishap_bridge\n\t\t\t\t\t\t#\"Help! Somebody help! Eric is the killer!\"\n\t\t\t\t\t\t\t*set cash -5000\n\t\t\t\t\t\t\tHe gasps in surprise and drops your foot as if it's blazing hot.\n\n\t\t\t\t\t\t\t\"What are you doing?\" he shouts up at you.\n\n\t\t\t\t\t\t\t\"Help!\" you shout. \"Eric is the killer!\"\n\n\t\t\t\t\t\t\tYou keep rising higher, and soon you're in real danger—and not from Eric.\n\n\t\t\t\t\t\t\tEric hesitates, and then takes your car and roars away. You have an excellent view of his path to the highway and far away.\n\n\t\t\t\t\t\t\t*label flying_mishap_bridge\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Close your eyes and gently float towards the ground.\n\t\t\t\t\t\t\t\t\t*if magic_practice = 1\n\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you crack open one eye to see that you're drifting back towards the bridge. Thank goodness you practiced your flying when you had the chance.\n\n\t\t\t\t\t\t\t\t\t\tYou race back up to the house to tell the others about Eric.\n\n\t\t\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*label death_by_flying_bridge\n\t\t\t\t\t\t\t\t\t\tNothing happens. You have an awful feeling you should have practiced your magic inside before trying it outside.\n\n\t\t\t\t\t\t\t\t\t\t\"Help!\" you shout. \"I'm floating away!\"\n\n\t\t\t\t\t\t\t\t\t\tEric looks up at you, and then all around as if there might be a convenient kite or fire engine waiting around, ready to save you.\n\n\t\t\t\t\t\t\t\t\t\tThere isn't. In a few moments, you have a glorious view all across Gundagai and the surrounding countryside. Too bad it'll be the last thing you see.\n\n\t\t\t\t\t\t\t\t\t\tIt fades fast, and all you see is green. You can see the curvature of the Earth, and you find yourself wishing you could tell someone. Then white lights sparkle across your vision and you fall asleep, still floating higher.\n\n\t\t\t\t\t\t\t\t\t\tYou never wake up.\n\n\t\t\t\t\t\t\t\t\t\tOn the up side, when your tragic demise hits the news, your stories sell like hotcakes.\n\t\t\t\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t#Aim for a tree.\n\t\t\t\t\t\t\t\t\t*label abctree\n\t\t\t\t\t\t\t\t\t*if magic_practice = 1\n\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you can tell you're making agonisingly slow progress towards the nearest eucalyptus. Thank goodness you practiced your flying when you had the chance, and thank goodness no one cut down this tree.\n\n\t\t\t\t\t\t\t\t\t\tYou grab a branch and gradually work your way back to the ground, where gravity seems to be working again. For obvious reasons, you keep hold of a convenient tree branch while you call the house and ask for a lift home.\n\n\t\t\t\t\t\t\t\t\t\tOnce you're back at the rectory, it's time to tell everyone who the killer is.\n\n\t\t\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto death_by_flying_bridge\n\t\t\t\t\t\t\t\t#Wait patiently for the magic to cut out.\n\t\t\t\t\t\t\t\t\t*goto abctree\n\t\t\t\t*else\n\n\t\t\t\t\tYou find yourself blathering some nonsense about an obscure medical condition that surely doesn't exist. To your surprise, Eric buys it and takes you home at once.\n\n\t\t\t\t\tThe others are in the rear balcony, and as Eric heads into the kitchen you blurt out, \"He's the killer. It's Eric.\"\n\t\t\t\t\t*set cash -100\n\n\t\t\t\t\t*goto group_talk_b\n\t\t\t*else\n\t\t\t\tYou try desperately to think of some plausible reason that Eric needs to take your car home without you, but absolutely nothing comes to mind. Right when you most need a great story, your imagination utterly fails you.\n\n\t\t\t\t*goto bridge_fight_run", "chapter_six_mmm": "*if killer_correct = 1\n\t*achieve figured_it_out\n\"I'll come with you,\" says Max. \"My shout for dinner ingredients, and I'll carry the bags too.\"\n*if (killer_correct = 1) and (maxmagic = true)\n\tOh no. He has magical insight… into you. He knows that you know he's the killer.\n\t*if (max_love = 1) and (killer = 1)\n\t\tSo much for love.\n*choice\n\t#\"No thanks.\"\n\t\t\"I insist,\" he smiles, stepping closer to you. He is very tall. And very muscular.\n\n\t\tYou'll be fine in public… right?\n\t\t*goto car\n\t#\"Thanks.\"\n\t\t*goto car\n\t#\"Absolutey not.\"\n\t\t\"I insist,\" he smiles, stepping closer to you. He is very tall. And very muscular.\n\n\t\t\"I said, 'Absolutely not' and I meant it.\"\n\n\t\t\"And I said I would help you,\" says Max, still smiling. \"And I meant it.\"\n\n\t\t\"No.\"\n\n\t\tHe takes your elbow and steers you towards the door.\n*label car\n\nYou could swear you feel the house sigh as you pass out of its embrace. That's probably not a good sign.\n\n*if clue_three = 3\n\tOn the up side, the knife Max used to kill Aurelia is underneath the driver's seat in your car.\n\t*goto uhoh\n*else\n*if (killer_correct = 0) and ((observation > 40) or (magic = 4))\n\tMax hesitates, just for a moment, and the realisation hits you like a punch to the gut. \n\n\tHe's the killer. It's as clear to you as the sky above.\n\t*set killer_correct 1\n\t*goto uhoh\n*label uhoh\n*if killer_correct = 1\n\n\tHow did you end up walking towards your car with a murderer? More importantly, how will you get away? \n\n\tAll your senses are on high alert. It's as if you can feel every blade of grass or tiny stone under your feet, through your shoes. Is this the last steps you'll ever take? Is this the last time you'll see the sun? If only you had your laptop, so you could take notes on how it feels to be so close to death. Except this isn't a story for you. It's not so fun when it's your death playing out, and you don't have the omniscient narrator's power at your command.\n\n\tThis is bad. This is really, really bad.\n\t*label really_really_bad\n\t*choice\n\t\t*selectable_if (cash > 300) #\"Let me buy dinner for everyone tonight. You can be our sugar daddy tomorrow.\"\n\t\t\t\"All right,\" he says, but he doesn't move away. \"I guess I'll go for a run instead.\"\n\n\t\t\t\"Sure,\" you say. \"Sounds fun. Well, see you soon.\"\n\n\t\t\t\"Yep.\" He goes into his room to get his joggers, leaving the door open. Watching you. Making sure you leave. making sure you don't get a chance to talk to the others without him.\n\n\t\t\tYou dawdle like you've never dawdled before. It's possible your life depends on it. You forget your wallet, your keys, your phone, and your hat. You forget your shopping list twice.\n\t\t\t*if flaw = 3\n\t\t\t\tFor once in your life, ADD is the most useful medical condition in the world.\n\t\t\t\t*goto at_last\n\t\t\t*else\n\t\t\t*label at_last\n\n\t\t\tAt last Max actually leaves, and you can go back inside and gather the others.\n\t\t\t*goto group_talk\n\t\t#Talk your way out of Max's company.\n\t\t\t*if imagination > 40\n\t\t\t\tYou have to come up with something believable, and fast. Fortunately, you're a writer. Making stuff up is what you do.\n\n\t\t\t\t*if magic = 2\n\t\t\t\t\t\"C'mon magic,\" you whisper under your breath. \"Get me out of this.\"\n\n\t\t\t\t\tYou grit your teeth, trying to will yourself into the air.\n\n\t\t\t\t\t\"$!{name}!\" says Max, \"you're flying!\"\n\n\t\t\t\t\tHe grabs your foot, holding you like a kite.\n\n\t\t\t\t\t\"Oops,\" you say.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Uh… would you mind steering me inside?\"\n\t\t\t\t\t\t\tHe laughs delightedly, and then apologises for mocking your predicament. If he wasn't a murderer, he'd be the perfect gentleman. \"If it's okay with you, I'll just walk down and get those groceries solo.\"\n\n\t\t\t\t\t\t\t\"Yes please!\"\n\n\t\t\t\t\t\t\tHe walks you up the stairs like a novelty balloon and you climb down the wall and inside, where you once again hover at the ceiling.\n\n\t\t\t\t\t\t\t\"Are you sure you're okay?\" he says.\n\n\t\t\t\t\t\t\t\"I'm sure it'll wear off eventually.\"\n\n\t\t\t\t\t\t\t\"See you in a bit then,\" he says, and heads downhill on foot.\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t#Wriggle out of his grip and take your chances with the sky.\n\t\t\t\t\t\t\tHe gasps in surprise rather than pain as you twist out his grip and float out of his reach.\n\n\t\t\t\t\t\t\t\"What are you doing?\" he shouts up at you.\n\n\t\t\t\t\t\t\t\"Can't control it,\" you say back.\n\n\t\t\t\t\t\t\t\"Do you need help?\"\n\n\t\t\t\t\t\t\t\"No, I'm fine. It'll wear off in a minute. Would you mind getting the groceries?\"\n\n\t\t\t\t\t\t\t\"If you're sure…\"\n\n\t\t\t\t\t\t\t\"I'm sure.\"\n\n\t\t\t\t\t\t\tHe frowns in thought for a moment, looking genuinely concerned for your safety, and then walks away towards the shops.\n\n\t\t\t\t\t\t\tYou continue rising upwards, quickly reaching the height of the deck, and then the roof.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Close your eyes and gently float towards the ground.\n\t\t\t\t\t\t\t\t\t\t*if magic_practice > 0\n\t\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you crack open one eye to see that you're drifting towards the ground. Thank goodness you practiced your flying when you had the chance.\n\t\t\t\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*label death_by_flying_abc\n\t\t\t\t\t\t\t\t\t\t\tNothing happens. You have an awful feeling you should have practiced your magic inside before trying it outside.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Help!\" you shout. \"I'm floating away!\"\n\n\t\t\t\t\t\t\t\t\t\t\tEric, Tamsin, and Lala come running out the front door. They race around the house, looking for a ladder, but there isn't one. \n\n\t\t\t\t\t\t\t\t\t\t\t\"$!{name}!\" Lala yells in desperation. \n\n\t\t\t\t\t\t\t\t\t\t\tEric is phoning emergency services, but you're rising too quickly. Tamsin is screaming for help, but no one is close by. What could they do, anyway? You're already too far away for any ladder. And Gundagai is far too small to have its own helicopter conveniently standing by.\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tIn a few moments, you have a glorious view all across Gundagai and the surrounding countryside. Too bad it'll be the last thing you see.\n\n\t\t\t\t\t\t\t\t\t\t\tIt fades fast, and all you see is green. You can see the curvature of the Earth, and you find yourself wishing you could tell someone. Then white lights sparkle across your vision and you fall asleep, still floating higher.\n\n\t\t\t\t\t\t\t\t\t\t\tYou never wake up.\n\n\t\t\t\t\t\t\t\t\t\t\tOn the up side, your stories sell like hotcakes once your tragic demise hits the news.\n\t\t\t\t\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t#Aim for the roof.\n\t\t\t\t\t\t\t\t\t\t*label abcdef\n\t\t\t\t\t\t\t\t\t\t*if magic_practice = 1\n\t\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you can tell you're making agonisingly slow progress towards the roof. Thank goodness you practiced your flying when you had the chance, and thank goodness the house has tall chimneys.\n\n\t\t\t\t\t\t\t\t\t\t\tYou grab a chimney and wait until the others fetch a ladder for you to climb down. Tamsin and Lala hold tight to your arms as they frog-march you inside. Your hands are blistered from holding on to the ladder so tightly.\n\t\t\t\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto death_by_flying_abc\n\t\t\t\t\t\t\t\t\t#Wait patiently for the magic to cut out.\n\t\t\t\t\t\t\t\t\t\t*goto abcdef\n\t\t\t\t\t\t#\"Help! Somebody help! Max is the killer!\"\n\t\t\t\t\t\t\tHe gasps in surprise and drops your foot as if it's blazing hot.\n\n\t\t\t\t\t\t\t\"What are you doing?\" he shouts up at you.\n\n\t\t\t\t\t\t\t\"Help!\" you shout. \"Max is the killer!\"\n\n\t\t\t\t\t\t\tLala, Eric, and Tamsin rush out the front door just as you're floating by the deck.\n\n\t\t\t\t\t\t\tYou realise you're in real danger of floating away, and reach out your arms. Tamsin's eyes are on Max and Lala is too short to reach you.\n\n\t\t\t\t\t\t\t*if eric > 50\n\t\t\t\t\t\t\t\tEric doesn't hesitate. He's always liked you, and he climbs up on the railing and stands for just a fraction of a second before leaping out into midair, grabbing you by the waist.\n\n\t\t\t\t\t\t\t\tThe magic can't quite carry two, apparently. You float down and Eric wraps one arm around the railing on the steps.\n\n\t\t\t\t\t\t\t\t\"Are you okay?\" he asks.\n\n\t\t\t\t\t\t\t\t\"Yes—thanks to you.\"\n\n\t\t\t\t\t\t\t\tHe blushes furiously before remembering what he's doing and facing Max. \"Don't come any closer!\"\n\t\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tEric climbs up on the railing and you can see him thinking about jumping off the deck to save you, risking his own life.\n\n\t\t\t\t\t\t\t\tHe hesitates too long, and you float higher—wishing you'd been just that little bit friendlier to Eric. You're in real danger now, and not from Max.\n\n\t\t\t\t\t\t\t\tYou continue rising upwards, quickly reaching the height of the deck, and then the roof.\n\t\t\t\t\t\t\t\t*label flying_mishap\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Close your eyes and gently float towards the ground.\n\t\t\t\t\t\t\t\t\t\t*if magic_practice > 0\n\t\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you crack open one eye to see that you're drifting towards the ground. Thank goodness you practiced your flying when you had the chance.\n\t\t\t\t\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*label death_by_flying\n\t\t\t\t\t\t\t\t\t\t\tNothing happens. You have an awful feeling you should have practiced your magic inside before trying it outside.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Help!\" you shout. \"I'm floating away!\"\n\n\t\t\t\t\t\t\t\t\t\t\tMax looks up at you, and then all around as if there might be a convenient kite or fire engine waiting around, ready to save you.\n\n\t\t\t\t\t\t\t\t\t\t\tThere isn't. In a few moments, you have a glorious view all across Gundagai and the surrounding countryside. Too bad it'll be the last thing you see.\n\n\t\t\t\t\t\t\t\t\t\t\tIt fades fast, and all you see is green. You can see the curvature of the Earth, and you find yourself wishing you could tell someone. Then white lights sparkle across your vision and you fall asleep, still floating higher.\n\n\t\t\t\t\t\t\t\t\t\t\tYou never wake up.\n\n\t\t\t\t\t\t\t\t\t\t\tOn the up side, your books sell like hotcakes once your tragic demise hits the news.\n\t\t\t\t\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t#Aim for the roof.\n\t\t\t\t\t\t\t\t\t\t*label abc\n\t\t\t\t\t\t\t\t\t\t*if magic_practice = 1\n\t\t\t\t\t\t\t\t\t\t\tFor a terrifying moment nothing happens. Then your stomach roils in a distinctly magical way and you can tell you're making agonisingly slow progress towards the roof. Thank goodness you practiced your flying when you had the chance, and thank goodness the house has tall chimneys.\n\n\t\t\t\t\t\t\t\t\t\t\tYou grab a chimney and wait until the others fetch a ladder for you to climb down. For obvious reasons, you keep hold of a convenient tree branch.\n\t\t\t\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto death_by_flying\n\t\t\t\t\t\t\t\t\t#Wait patiently for the magic to cut out.\n\t\t\t\t\t\t\t\t\t\t*goto abc\n\t\t\t\t*else\n\t\t\t\t\tYou find yourself blathering some nonsense about an obscure medical condition that surely doesn't exist. To your surprise, Max buys it and offers to fetch the groceries himself. He takes the cash and walks off down the hill.\n\t\t\t\t\t*set cash -100\n\t\t\t\t\t*goto group_talk\n\t\t\t*else\n\t\t\t\tYou try desperately to think of some plausible reason that Max needs to get the groceries solo, but absolutely nothing comes to mind. Right when you most need a great story, your imagination utterly fails you.\n\n\t\t\t\tWishing you were anywhere else, you get into the car.\n\t\t\t\t*goto bridge\n\t\t#Fight.\n\t\t\t*if clue_three = 3\n\t\t\t\tYou smile politely and open the driver's side door, bending down to retrieve the knife.\n\n\t\t\t\tThis is real. This is life and death.\n\n\t\t\t\tThis is the piece of trash that killed Aurelia. \n\t\t\t\t*if (loki_saved = 0) and (loki_no = 0)\n\t\t\t\t\tAnd Loki.\n\t\t\t\t\t*goto murderer_mid_murder_car\n\t\t\t\t*else\n\t\t\t\t*label murderer_mid_murder_car\n\n\t\t\t\tAs you straighten, holding the knife by your leg, Max gets into his side and sits there waiting for you. Walking around the car feels like wading through quicksand. Everything is slow, and hard, and your heart feels like it's swelling up ready to explode. It's impossible to tell if you're going to vomit or pass out, or both, but it feels like something along those lines is extremely likely right now.\n\n\t\t\t\tYou're distracted for a moment by the patchy grass under your feet. Each strand is so bright and perfect, traced with filigree lines any jeweller would envy. Even the dirt is a million tiny particles, each one perfectly formed and full of a kingdom of microscopic detail.\n\n\t\t\t\tThen you're at Max's door, and he turns to face you. You didn't pass out. You didn't vomit. You're here.\n\t\t\t\t*choice\n\t\t\t\t\t#This is your chance. Kill him.\n\t\t\t\t\t\t*set murderer 1\n\t\t\t\t\t\t*label kill_car\n\t\t\t\t\t\tThe knife feels as heavy as life and death. A wave of excitement washes through you, hitting as hard as a gut-punch except it's delicious. You've never felt mightier.\n\n\t\t\t\t\t\tSpeed and force. That's what matters.\n\t\t\t\t\t\t*if fitness > 20\n\n\t\t\t\t\t\t\tThat, and a big knife.\n\n\t\t\t\t\t\t\tYou grab Max's hair to keep him steady, and as he yelps in protest you stab him in the neck.\n\n\t\t\t\t\t\t\tWhy mess with a classic move? It worked for him, after all.\n\n\t\t\t\t\t\t\tHis blood gushes out, some of it flowing and some of it spraying.\n\t\t\t\t\t\t\t*if (empathetic \u003c 40) or (art > 60)\n\n\t\t\t\t\t\t\t\tExcellent. The spraying is obviously arterial. Just a little more and Max will most definitely be dead at your hand.\n\n\t\t\t\t\t\t\t\tIt's a little creepy, how easy it is to do. You feel like you've trained for this all your life. It has to be done right. Focus. Make sure the monster isn't coming back for a crappy sequel. You stab him a second time as he screams, drooling pink froth.\n\n\t\t\t\t\t\t\t\tHe flops around like a fish on a line, thoroughly messing up the inside of your car. Since he can't stop you, you press his fingers around the knife hand where there's a blood-free gap. His fingerprints were probably already there, but it's better to be safe than sorry.\n\n\t\t\t\t\t\t\t\tIt's only been a few seconds, but he's already losing energy. He looks more and more like a rag doll slumped over itself after being tossed into a corner.\n\n\t\t\t\t\t\t\t\tYou've done it. You've killed a man. And it's the greatest rush you've ever felt.\n\n\t\t\t\t\t\t\t\t\"Thank you, Max,\" you whisper, feeling overcome. \"I could never have done it without you.\"\n\n\t\t\t\t\t\t\t\tHis eyes swivel toward you with a visible effort, and glaze over even as you smile at him one last time.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*achieve murder\n\t\t\t\t\t\t\t\t\"$!{name}! Max!\" comes a voice from behind you.\n\n\t\t\t\t\t\t\t\tAh yes. You're not alone in this profoundly intimate moment with your victim. How irritating.\n\n\t\t\t\t\t\t\t\tTime to play the shattered innocent.\n\t\t\t\t\t\t\t\t*label murderer_post_murder\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#\"Help! Max is the killer!\"\n\t\t\t\t\t\t\t\t\t#\"Help! Max just attacked me!\"\n\t\t\t\t\t\t\t\t\t#\"Help! Max is dying!\"\n\t\t\t\t\t\t\t\t*if honest \u003c 30\n\t\t\t\t\t\t\t\t\tYou can remember well enough how you acted when Aurelia was first discovered, so you go through the motions once again, but with trembling hands thrown in for good measure.\n\n\t\t\t\t\t\t\t\t\tIt's immediately clear than Tamsin doesn't believe you, and neither do the police. Luckily, none of them are the ones deciding your fate.\n\n\t\t\t\t\t\t\t\t\tYour adventures provide the media with plenty of fodder over the weeks and months to come, but you stick to your guns, saying, \"Self defence\" over and over again.\n\n\t\t\t\t\t\t\t\t\tLuckily, lying happens to be one of your many talents.\n\n\t\t\t\t\t\t\t\t\tYou star in your own courtroom drama, and the hardest lie is keeping the pleasure from your face. It works, though, and you are set free.\n\n\t\t\t\t\t\t\t\t\tCongratulations. You just got away with murder. There's a noticeable spike in your book sales, too.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*set cash +1000\n\t\t\t\t\t\t\t\t\t*achieve profit\n\t\t\t\t\t\t\t\t\tIt's been quite a week. But you survived. Altogether, you wrote ${word_count} words.\n\t\t\t\t\t\t\t\t\t*if word_count > 4999\n\t\t\t\t\t\t\t\t\t\t*achieve words\n\t\t\t\t\t\t\t\t\t\t*goto ikl\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*label ikl\n\t\t\t\t\t\t\t\t\t*if lala_love = 1\n\t\t\t\t\t\t\t\t\t\t*achieve murder_yay\n\n\t\t\t\t\t\t\t\t\t\tThe beautiful Lala's lie-detecting magic fades with time, and soon you don't even have to twist yourself in knots trying to keep from lying outright. She stays utterly loyal to you throughout the trial and all the days when journalists camp outside your home.\n\n\t\t\t\t\t\t\t\t\t\tWhen it's all over, she's still there. She talks you into visiting Renee often, and you don't comment as you see the rector slowly release her own sense of guilt, and relax.\n\n\t\t\t\t\t\t\t\t\t\tYou know how lucky you are, and you take care to treat Lala well. But deep down, you can't help wishing she wasn't quite so good a person. If only she'd try and kill you, so you could kill her back.\n\n\t\t\t\t\t\t\t\t\t\tIt's getting harder and harder to let her stay alive.\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tAnd you killed Max. It's strange, though. All you can think about is how to do it again.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*achieve murder_yay\n\t\t\t\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tIt's easy to remember how you felt when Aurelia died, so you do your best to go through the same motions as before. You can tell Tamsin doesn't believe you, and neither do the police.\n\n\t\t\t\t\t\t\t\t\tThen Lala confronts you, and you can't think of a way to wriggle out of answering her. Her face when you say, \"I didn't kill Max\" shows immediately that you've failed. But so what? It's not like she can take her evidence to court.\n\n\t\t\t\t\t\t\t\t\tUnfortunately, all the writers band together with Renee against you. You're smart, but not smarter than all of them together.\n\n\t\t\t\t\t\t\t\t\tThey cooperate with the police, and you know you're done for before you step into a courtroom. It irks you as you see Renee letting go of her own sense of guilt, and placing it all on your shoulders.\n\n\t\t\t\t\t\t\t\t\tYou're sentenced to life in prison.\n\n\t\t\t\t\t\t\t\t\tThe worst part is, Australian law prevents you from making money off a crime, so you can't even get a decent book out of it all. No one will ever publish you.\n\n\t\t\t\t\t\t\t\t\tWho knew being a convicted murderer would be such a drag?\n\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou try to stab him a second time but he's looking right at you, his eyes wide and desperate. You can't help thinking of how he must be feeling, and it's unbearable.\n\n\t\t\t\t\t\t\tDespite how much you wanted to kill him, he's human. You can't convince yourself otherwise, and you can't go through with it. By the time he wriggles out of your grip, it's too late for you.\n\n\t\t\t\t\t\t\t*goto he_kills_you\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set clue_three 4\n\t\t\t\t\t\t\tYou hope the knife is sharp enough that your relatively weak body can destroy Max. Given that he cut Aurelia's throat you aim for his neck—but you're too slow.\n\n\t\t\t\t\t\t\tHe grabs your hand just as the blade breaks his skin, and the two of you freeze in an awkward tableau with Max half climbing out of the car and you half climbing in. Then Max knocks the knife from your hand. It falls under the car. As far as you're concerned, it might as well be in Canberra.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Hide.\n\t\t\t\t\t\t\t\t\t*goto hide\n\t\t\t\t\t\t\t\t#Run.\n\t\t\t\t\t\t\t\t\tYou break and run, but he's faster than you.\n\n\t\t\t\t\t\t\t\t\t*goto he_kills_you\n\t\t\t\t\t\t\t\t#Beg for mercy\n\t\t\t\t\t\t\t\t\t*goto mercy\n\t\t\t\t\t#Put the knife to his throat and tell him not to move until the police come back.\n\t\t\t\t\t\tThe knife feels as heavy as life and death. You raise it to his throat and wait for him to notice.\n\n\t\t\t\t\t\t\"$!{name}?\" he says, half laughing.\n\n\t\t\t\t\t\tThat small movement pushes his neck against the knife, cutting him. \"What is this?\" he says, no longer laughing—or moving. \"What are you doing?\"\n\n\t\t\t\t\t\t\"Don't move,\" you say, and slowly fish your phone from your pocket to call the police.\n\n\t\t\t\t\t\tHe's not lunging at you, but he's pulled out his own phone and called the house. \"Help,\" he say. \"$!{name} has a knife and ${he} won't let me go.\"\n\n\t\t\t\t\t\tThe others come out all at once—even Bruce—and demand to know what's going on.\n\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t#Keep the knife hidden, and tell him you know he's the killer.\n\t\t\t\t\t\t\"I know you killed Aurelia,\" you say.\n\n\t\t\t\t\t\tHe turns to face you with a smile already in place, but you don't look away and his own smile fades in response. \"You're serious.\"\n\n\t\t\t\t\t\t\"I am.\"\n\n\t\t\t\t\t\tHe sighs. \"I had a feeling you might have figured it out. Why do you think I insisted on coming with you?\"\n\n\t\t\t\t\t\t\"Yeah.\"\n\n\t\t\t\t\t\tIt feels good to just agree with him. You remind yourself that his charisma is part of his evil.\n\n\t\t\t\t\t\t\"So what are you going to do?\" he says, so calm that you know he still sees himself as being in control of the situation. You feel tiny, and foolish next to him. \"Are you going to give me your keys and let me go? Because if not, things are not going to go well for you.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Let him go.\n\t\t\t\t\t\t\t\t\"Thanks muchly,\" he says, and drives away in your car.\n\t\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t\t#Fight him.\n\t\t\t\t\t\t\t\t*goto kill_car\n\t\t\t\t\t\t\t#\"I've got a knife!\"\n\t\t\t\t\t\t\t\tMax blinks, confused.\n\n\t\t\t\t\t\t\t\t*goto kill_car\n\t\t\t*elseif fitness > 40\n\t\t\t\t*label fight\n\t\t\t\tYou smile politely and then you strike, leaping onto his back like a child, wrapping both your hands around his neck, and your legs around his waist so he can't easily throw you off.\n\n\t\t\t\tIt's hard to take on someone of his size and strength, but you've always prioritised your physical fitness, and now it saves your life.\n\t\t\t\t*label murderer_mid_murder\n\n\t\t\t\tAt last he sinks to the ground, and you know you're going to live. The question is, will he?\n\t\t\t\t*choice\n\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t*if (empathetic \u003c 30) or (art > 70)\n\t\t\t\t\t\t\tIt's a little creepy, how easy it is to do. You feel like you've trained for this all your life—and you hold his life in your two hands, wishing only that you could flip him over so you could see the light fading from his eyes. Your arms tremble with the strain, but you know this is your special moment and you mustn't give up too soon.\n\n\t\t\t\t\t\t\tIt's only been a few minutes, but he's already losing energy. He looks more and more like a rag doll slumped over itself after being tossed into a corner. You keep holding on for a count of five hundred before letting go and finally looking at his face. It looks slack and wrong in death. There's certainly no pulse.\n\n\t\t\t\t\t\t\tYou've done it. You've killed a man. And it's the greatest rush you've ever felt.\n\n\t\t\t\t\t\t\t\"Thank you, Max,\" you whisper, feeling overcome. \"I could never have done it without you.\"\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*achieve murder\n\t\t\t\t\t\t\t\"$!{name}! Max!\" comes a voice from behind you.\n\n\t\t\t\t\t\t\tAh yes. You're not alone in this profoundly intimate moment with your victim. How irritating.\n\n\t\t\t\t\t\t\tTime to play the shattered innocent.\n\t\t\t\t\t\t\t*goto murderer_post_murder\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou try to tighten your hands around his neck but it hurts your arms and fingers so much you can't help thinking of how he must be feeling, and it's unbearable.\n\n\t\t\t\t\t\t\tDespite how much you try to keep killing him, your hands loosen. By the time he wriggles out of your grip, it's too late for you.\n\n\t\t\t\t\t\t\t*goto he_kills_you\n\t\t\t\t\t#Wait until you're sure he's unconscious, then let go.\n\t\t\t\t\t\t*if observation \u003c 20\n\t\t\t\t\t\t\tYour hands ache, and you're glad to finally let him go. Too bad you're not observant enough to have timed it correctly.\n\t\t\t\t\t\t\t*label he_kills_you\n\n\t\t\t\t\t\t\tHe grabs you before you even stand up, and suddenly you're the one with strong hands around your neck, squeezing hard. You beat at his arms and kick at his legs, but he holds on as if his life depends on it, facing you with a terrible focus in his eyes.\n\n\t\t\t\t\t\t\tThis isn't his first kill.\n\n\t\t\t\t\t\t\tYour vision sparkles, and then turns dark. All your limbs grow too heavy to move, and you lose your fight; dying among the weedy grass and hard-packed dirt. Max takes your car and gets away with two murders—thanks to you. What a stupid way to end the story of your life.\n\n\t\t\t\t\t\t\tOn the up side, your tragic end makes your books sell like hotcakes.\n\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour hands ache, but you make yourself persist until you're absolutely sure he's unconscious, and then you release him only a millimetre at a time, checking that he doesn't spring up. It's an enormous relief to finally let him go.\n\n\t\t\t\t\t\t\tHe lies slumped on the hard-packed earth like a sleeping child.\n\n\t\t\t\t\t\t\tYou check his pulse is steady and then hurry inside to gather the others.\n\n\t\t\t\t\t\t\t*goto group_talk_c\n\t\t\t\t\t#Call for help.\n\t\t\t\t\t\t*label help\n\t\t\t\t\t\t\"Help!\" you yell. \"Somebody help!\"\n\n\t\t\t\t\t\tNothing happens. Your arms are aching and Max is thrashing in your grip. You can yell once more and if no one comes you'll be out of options.\n\n\t\t\t\t\t\t\"HELP!\"\n\n\t\t\t\t\t\tBruce pushes aside the lace curtain beside the front door and sees you. He grabs the bell from the inside and rings it hard before running out to help you.\n\n\t\t\t\t\t\tFor an awful moment he's standing next to you and Max as you grapple on the hard ground, and you realise neither of you has the breath to make a case against the other. Bruce is going to choose who to help.\n\n\t\t\t\t\t\t*if bruce > 50\n\t\t\t\t\t\t\tHe grabs Max's arms and the two of you restrain Aurelia's killer together. Thank goodness you were friendly with Bruce.\n\n\t\t\t\t\t\t\tThe others pour out of the house, stopping short when they see Max struggling to get up off the ground.\n\n\t\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tHe grabs your arms and he and Max pin you down. You should have been friendly towards Bruce when you had the chance!\n\n\t\t\t\t\t\t\t\"Thank you,\" gasps Max. \"You're a life saver.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe others pour out of the house, stopping short when they see you struggling to get up off the ground.\n\n\t\t\t\t\t\t\t*goto group_talk_d\n\t\t\t*else\n\t\t\t\t*label weak_fight_at_car\n\t\t\t\tYou smile politely. Then you strike, punching him in the nose. It breaks with a satisfying crunch, and Max howls in pain and surprise and grabs his bleeding face. You twist around and leap onto his back like a child, wrapping both your hands around his neck, and your arms around his waist so he can't easily throw you off.\n\n\t\t\t\tExcept he absolutely can. You lie on the ground where he threw you, looking up at a blue sky as you desperately try to breathe—and fail. \n\n\t\t\t\tIt's hard to take on someone of his size and strength, and you're simply not up to it.\n\t\t\t\t*choice\n\t\t\t\t\t#Hide\n\t\t\t\t\t\t*goto hide\n\t\t\t\t\t#Beg for mercy.\n\t\t\t\t\t\t*label mercy\n\t\t\t\t\t\t*if imagination > 50\n\t\t\t\t\t\t\tYou beg for mercy, desperately making up a story about the power of love that is so involving real tears spring into your eyes.\n\n\t\t\t\t\t\t\tTo your amazement, your feat of imagination works and Max releases you. He steals your car, which is less than ideal, but it's a whole lot better than getting murdered.\n\n\t\t\t\t\t\t\tYou go back inside and gather the others to tell them what's happened.\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou desperately babble apologies and promise wealth and forgiveness, but it's clear your stories aren't good enough. He kneels on your chest and wraps his fingers around your throat.\n\n\t\t\t\t\t\t\tYou beat at his arms and kick at his legs, but he holds on as if his life depends on it, facing you with a terrible focus in his eyes.\n\n\t\t\t\t\t\t\tThis isn't his first kill.\n\n\t\t\t\t\t\t\tYour vision sparkles, and then turns dark. All your limbs grow too heavy to move, and you lose your fight; dying among the weedy grass and hard-packed dirt. Max takes your car and gets away with two murders—thanks to you. \n\n\t\t\t\t\t\t\tYou'll never write another story again.\n\n\t\t\t\t\t\t\tOn the up side, your tragic death makes your books sell like hotcakes.\n\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t#Scream for help.\n\t\t\t\t\t\t*goto help\n\t\t*disable_reuse #Lure Max under the house to trap him.\n\t\t\t*if knowledge > 40\n\t\t\t\tJust before you speak, you remember how ramshackle the door under the house looked. It has a lock, but it definitely won't actually hold a person inside. You need a different strategy.\n\t\t\t\t*goto really_really_bad\n\t\t\t*else\n\t\t\t\t\"Hey, have you seen under the house?\" you say.\n\n\t\t\t\t\"No, why?\"\n\n\t\t\t\t\"It's super interesting.\"\n\n\t\t\t\tHe shrugs. \"Why not?\"\n\n\t\t\t\tIt's almost like he wants to be alone with you. That's not a good sign, but you can make it work for you. Unfortunately, as you round the corner of the tall slate foundation it's immediately obvious that the door under the house is badly damaged by age and time. The lock is modern, but Max simply reaches his hand through a hole to unlock it.\n\n\t\t\t\tIt was supposed to be easy to slam and lock the door, trapping him.\n\t\t\t\t*choice\n\t\t\t\t\t#Improvise a trap using random objects around the place.\n\t\t\t\t\t\tThe slate outer wall of the house comes all the way down to the ground, forming a tall storage space under the deck and blocking off the rest of the under-house area except for a small hole that has clearly proven useful to electricians who have had to wire the ancient house after the fact—there are several coloured wires going into the space beneath the house proper.\n\n\t\t\t\t\t\tOne side of the U-shaped storage space has several long metal stands used fo
