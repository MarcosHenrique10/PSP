r the church's annual flower show.\n\n\t\t\t\t\t\tMax goes at once and peers through the hole into the wider area under the main house. \n\n\t\t\t\t\t\t\"I bet you could fit in there.\"\n\n\t\t\t\t\t\t\"That must be what the tradies had to do,\" he says, and grins back at you cheerfully before climbing through.\n\t\t\t\t\t\t*label hole\n\t\t\t\t\t\t*if observation > 50\n\n\t\t\t\t\t\t\tYou drag over one of the metal stands while he crawls up the slope to the place where the dirt rises almost all the way to the floor of the house above, and shove it across the gap.\n\n\t\t\t\t\t\t\t\"Hey!\" says Max. \"What are you doing? Stop that!\"\n\n\t\t\t\t\t\t\tHe scrambles back as you tear apart the improvised shelving beside the hole, shoring up the trap with scraps of wood and bricks and rusty tools.\n\n\t\t\t\t\t\t\tMax scrabbles at it, but you're too quick. He's caught like a rat in a trap.\n\n\t\t\t\t\t\t\tTime to convince the others you've done the right thing.\n\t\t\t\t\t\t\t*goto group_talk_e\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou try to block the hole with the wooden planks from the makeshift shelves beside it, but they're no good. Max immediately sees what you're doing and bursts through, punching you in the jaw.\n\n\t\t\t\t\t\t\tThe pair of you tumble outside onto the patchy grass. Your head is spinning.\n\t\t\t\t\t\t\t*set fitness %-10\n\t\t\t\t\t\t\t*if fitness > 40\n\t\t\t\t\t\t\t\t*goto fight\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto weak_fight_at_car\n\t\t\t\t\t#Fight him.\n\t\t\t\t\t\tThe pair of you burst out the door onto the thin grass.\n\n\t\t\t\t\t\t*if fitness > 40\n\t\t\t\t\t\t\t*goto fight\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto weak_fight_at_car\n\t\t\t\t\t#Calmly go back to the car as if nothing is wrong.\n\t\t\t\t\t\t*goto bridge\n\t\t#Hide.\n\t\t\t*label hide\n\t\t\t*if knowledge > 40\n\t\t\t\tLuckily you paid attention every time there was an opportunity to learn more about this place. You know that the office and hall are locked… and the bathrooms beside the hall are not. There's an excellent chance Max could be fooled by a locked door.\n\n\t\t\t\tYou race around the back of the bathrooms before carefully circling back, going inside, and locking the door. It's not glamorous crouching on top of the toilet seat and trying to breathe quietly as Max bangs around looking for you.\n\n\t\t\t\tHe doesn't find you.\n\n\t\t\t\tAt last you hear your own car drive away and you creep out and then go inside to talk to the others.\n\t\t\t\t*goto group_talk\n\t\t\t*else\n\t\t\t\tAs you break and run, you realise instantly that Max knows more about this place (not to mention this town) than you. You keep running, sorting frantically through everything you've learned this week and realising that you're utterly screwed.\n\t\t\t\t*choice\n\t\t\t\t\t#Play it off as a joke and get into the car.\n\t\t\t\t\t\t\"Lol,\" you say, trying hard to hide your own wincing.\n\n\t\t\t\t\t\t\"Uh, sure,\" says Max.\n\n\t\t\t\t\t\tYou get in the car and buckle up, and Max follows suit.\n\n\t\t\t\t\t\t*goto bridge\n\t\t\t\t\t#Fight him.\n\t\t\t\t\t\t*if fitness > 40\n\t\t\t\t\t\t\t*goto fight\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto weak_fight_at_car\n\t\t#Get in the car and act as if nothing is wrong.\n\t\t\tYou get in the car and buckle up, and Max follows suit.\n\n\t\t\t*goto bridge\n*else\n\t*label innocent\n\tYou can't help feeling like you're missing something important. Still, observation was never your strong suit and the feeling is familiar.\n\t*choice\n\t\t#Use your magic to try and figure out what you're missing.\n\t\t\t*if talking_walls = 1\n\t\t\t\t*set killer_correct 1\n\t\t\t\t\"Er, just give me a second Max. I gotta get something.\"\n\n\t\t\t\tYou go back into your room, close the door, and lean your forehead on the wall. \"Talk to me, house, please,\" you say. \"What am I missing?\"\n\n\t\t\t\tA tiny whisper surrounds you. \"Max is the killer. Be careful.\"\n\n\t\t\t\tYou remember the way Aurelia shivered as she entered the house for the first time. It tried to save her, and now it's trying to save you.\n\t\t\t\t*goto uhoh\n\t\t\t*if (talking_cat = 1) and ((loki_no = 1) or (loki_saved = 1))\n\t\t\t\tYou spot Loki in the branches of the nearby oak tree, and walk over to him.\n\n\t\t\t\t*if loki_gone = 1\n\t\t\t\t\t\"Loki, we sent you away to keep you safe. What are you doing here?\"\n\n\t\t\t\t\tHe glares at you. So much for gratitude.\n\n\t\t\t\t\"Do you know who killed Aurelia?\" you ask him.\n\n\t\t\t\tHe licks one paw with fastidious care.\n\n\t\t\t\t\"I promise I'll get you some fancy cat food if you tell me who it is.\"\n\n\t\t\t\tHe pauses, and lets his tail drape over the branch. \"Max. Max is a mighty hunter.\"\n\n\t\t\t\tYou shudder just a little at the admiration in his voice.\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*if lie_detector = 1\n\t\t\t\t\"Hey Max,\" you say. \"Did you really just forgive Annaliese for what she did?\"\n\n\t\t\t\t\"Yes,\" he says. \"Completely.\"\n\n\t\t\t\tHis eyes glow yellow, and he goes ahead and lets you see he's lying.\n\n\n\t\t\t\tIt's him. He's the killer. And he knows you know.\n\t\t\t\t*set killer_knows_you_know true\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*if magic = 1\n\t\t\t\tYou try to tune into the magic, and you feel a rush of sensations: bright light, hot blood, hard ground.\n\n\t\t\t\tMax is the killer.\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*if magic = 3\n\t\t\t\tYou try to tune into the magic, and you feel a rush of such loathing your knees buckle. That's how Max felt about Aurelia. That is the passion at the heart of this crime.\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*if magic = 4\n\t\t\t\tYou try to tune into the magic, and suddenly you flash back to the first night in the rectory, and you remember Max encouraging Aurelia to drink up. Strange, how he barely spoke to her in the car and then was suddenly his usual garrulous self when it came to the wine.\n\n\t\t\t\tHe killed her. You're sure of it.\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*else\n\t\t\t\tUgh. Your magic is no use here, and your mind isn't much use either. You get in the car and buckle up, and Max follows suit.\n\t\t\t\t*goto bridge\n\t\t#Could Max be the killer?\n\t\t\t*label maxkiller\n\t\t\t*if talking_walls = 1\n\t\t\t\t*set killer_correct 1\n\t\t\t\t\"Yes.\"\n\n\t\t\t\tIt's the house talking to you.\n\n\t\t\t\tYou remember the way Aurelia shivered as she entered the house for the first time. It tried to save her, and now it's trying to save you.\n\t\t\t\t*goto uhoh\n\t\t\t*if (talking_cat = 1) and ((loki_no = 1) or (loki_saved = 1))\n\t\t\t\tYou spot Loki in the branches of the nearby oak tree, and walk over to him to give yourself a moment to think about Max.\n\n\t\t\t\t*if loki_gone = 1\n\t\t\t\t\t\"Loki, we sent you away to keep you safe. What are you doing here?\"\n\n\t\t\t\t\tHe glares at you. So much for gratitude.\n\n\t\t\t\t\"Do you know who killed Aurelia?\" you ask him.\n\n\t\t\t\tHe licks one paw with fastidious care.\n\n\t\t\t\t\"I promise I'll get you some fancy cat food if you tell me who it is.\"\n\n\t\t\t\tHe pauses, and lets his tail drape over the branch. \"Max. Max killed Aurelia.\"\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*if lie_detector = 1\n\t\t\t\t\"Hey Max,\" you say. \"Did you really just forgive Annaliese for what she did?\"\n\n\t\t\t\t\"Yes,\" he says. \"Completely.\"\n\n\t\t\t\tHis eyes glow yellow, and he goes ahead and lets you see he's lying.\n\n\n\t\t\t\tIt's him. He's the killer. And he knows you know.\n\t\t\t\t*set killer_knows_you_know true\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*if magic = 1\n\t\t\t\tAt the thought, you feel a rush of sensations: bright light, hot blood, hard ground.\n\n\t\t\t\tMax is the killer. You just had a premonition of your own murder.\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*if magic = 3\n\t\t\t\tAt the thought, you feel a rush of such loathing your knees buckle. That's how Max felt about Aurelia. That is the passion at the heart of this crime.\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*if magic = 4\n\t\t\t\tSuddenly you flash back to the first night in the rectory, and you remember Max encouraging Aurelia to drink up. Strange, how he barely spoke to her in the car and then was suddenly his usual garrulous self when it came to the wine.\n\n\t\t\t\tHe killed her. You're sure of it.\n\t\t\t\t*set killer_correct 1\n\t\t\t\t*goto uhoh\n\t\t\t*else\n\t\t\t\tIt's impossible to be sure one way or another. You get in the car and buckle up, and Max follows suit.\n\t\t\t\t*goto bridge\n\t\t#Is this a rational feeling, or just the stress?\n\t\t\t*if mental_health > 40\n\t\t\t\tYou work hard to be rational, and psychologically healthy. This is the moment when it matters—and you know you're right. Something is wrong.\n\n\t\t\t\t*goto maxkiller\n\t\t\t*else\n\t\t\t\tMental health isn't a clear-cut thing. You're definitely stressed, though. No need to be rude to Max over it. You get in the car and buckle up, and Max follows suit.\n\t\t\t\t*goto bridge\n*label group_talk\n\nYou race inside and gather the others, not taking no for an answer.\n\n*gosub agathabit\n*if justice_fail = 1\n\tMax is already long gone—with your car. It wasn't insured, either. But you've gained a certain notoriety by association, and you get a sales bump out of that. It doesn't actually pay for a new car.\n\t*set cash -500\n\t*goto home\n*else\n\t*goto home\n*label group_talk_b\nIt's not easy to state your case with Max watching you, but it has to be done. Bruce holds your arm in an iron grip while Lala keeps hold of Max.\n\n*label group_talk_d\n*gosub agathabit\n*if justice_fail = 1\n\tMax sees he has the floor, and manages to debate himself out of trouble. By the time he's finished, you're not 100% sure you didn't kill Aurelia yourself. And somehow, no one asks Max to say, \"I didn't kill Annaliese\". He's truly gifted.\n\n\t\"I'll go get those groceries,\" he says, and walks off down the hill.\n\n\tNo one ever sees him again.\n\t*goto home\n*else\n\tMax begs and cries and debates, but it's no use. Bruce and Lala keep him restrained until the police arrive.\n\t*goto home\n*label group_talk_c\n*gosub agathabit\n*if justice_fail = 0\n\tYou lead the others to Max's unconscious body, and Tamsin checks his pulse while the others stand guard. Soon the police arrive and take him away.\n\t*goto home\n*else\n\tYou're arrested for attacking Max, but he chooses not to press charges. A strange mercy from a murderer. \n\t*goto home\n*label group_talk_e\n*gosub agathabit\n*if justice_fail = 0\n\tYou lead the others to Max's makeshift prison, and you all stand guard together. Soon the police arrive and take him away.\n\t*goto home\n*else\n\tYou're arrested for attacking Max under the house, but he chooses not to press charges. A strange mercy from a murderer. \n\t*goto home\n*label agathabit\n\"Max murdered Aurelia!\" you blurt out.\n\n\"That's quite a claim,\" Bruce says stiffly. \"You'd want to be very sure to make a claim like that.\"\n*label try_again\n*choice\n\t*disable_reuse #Appeal to Lala.\n\t\t\"Lala, you know I'm right,\" you say. \"Don't you?\"\n\t\t*if lala > 50\n\t\t\t\"Absolutely,\" she says, \"and not just because I like you.\"\n\n\t\t\t\"Really?\" you say.\n\n\t\t\t\"Yes,\" she says. \"I'm a lie detector, remember? All this time, I've been watching everyone closely. And sometimes the magic tells me things that haven't happened yet. Renee is going to be freed shortly. I've already called the police.\"\n\n\t\t\t\"Really?\" you say, shocked that your ordeal is over as easily as that.\n\n\t\t\tShe smiles. \"Yes. In a little while, we can all go home.\"\n\t\t\t*goto talk_win\n\t\t*else\n\n\t\t\t\"I know you believe what you're saying,\" she says slowly. \"That doesn't mean you're right.\"\n\t\t\t*goto try_again\n\t*disable_reuse #Tell them the house told you.\n\t\t\"It was the magic,\" you say. \"I figured it out, and the house confirmed it.\"\n\n\t\tBruce shakes his head, disbelieving. \n\t\t*if tamsin > 50\n\n\t\t\t\"Hold on,\" says Tamsin, wincing as she listens to something you can't hear. \"I think $!{name} is right—and so does the house. In fact, I've already called the police. This is over.\"\n\n\t\t\t\"Really?\" says Lala. \"This is it? We can go home?\"\n\t\t\t*goto talk_win\n\t\t*else\n\n\t\t\tIt's definitely not the right tack for this crowd.\n\n\t\t\t*goto try_again\n\t*disable_reuse #Go through the non-magical clues you've found.\n\t\t\"We all agree it's not Renee,\" you say, and there are nods all around.\n\n\t\t*if clue_one > 0\n\t\t\t\"We know the wine was drugged.\"\n\n\t\t\t\"Specifically, the red wine,\" Bruce agrees.\n\n\t\t\t\"Eric and Max both had the opportunity to drug it that night,\" you say. \"And Lala and I could have drugged it earlier in the day. Therefore, Tamsin and Bruce are off the hook.\"\n\n\t\t\t\"Ta so much,\" says Bruce.\n\t\t\t*page_break\n\t\t\t*goto d\n\t\t*else\n\t\t*label d\n\t\t*if clue_three > 0\n\t\t\t\"I found the murder weapon in the fireplace between the Master Bedroom and the Dining Room,\" you say. \n\t\t\t*if room = 2\n\t\t\t\t\"Which means Max and I are the most likely culprits—or someone was attempting to frame one of us. So Eric and Lala are off the hook.\"\n\t\t\t\t*goto e\n\t\t\t*else\n\t\t\t\t\"Which means Max and Lala are the most likely culprits—or someone was attempting to frame one of them. And of course I'm suspicious too, since I'm the one who found it there. But that means Eric is off the hook.\"\n\t\t\t\t*goto e\n\t\t\t*label e\n\n\t\t\t\"All very interesting,\" says Lala doubtfully.\n\t\t\t*goto shwing\n\t\t*else\n\t\t\t*label shwing\n\t\t\t*if clue_two = 1\n\n\t\t\t\t\"Max hated Aurelia for catfishing his sister,\" you say. \"He already told Lala and I that he planted the brochure to lure her to the rectory.\"\n\t\t\t\t*goto f\n\t\t\t*else\n\t\t\t\t\"We know Max hated Aurelia for catfishing his sister,\" Lala volunteers.\n\t\t\t*label f\n\n\t\t\t\"He hated her, certainly,\" Bruce points out, looking uneasily at Eric for support. \"I hate a lot of people, and I haven't killed any of them yet.\"\n\n\t\t\t\"For obvious reasons, I counted myself out,\" you say, realising for the first time how guilty you must look.\n\t\t\t*page_break\n\t\t\t*if clue_four > 0\n\t\t\t\t\"But I believe the house can be trusted to assist us, as much as it is able, due to its own sense of order. When Aurelia stepped inside, it tried to warn her that she was in danger, but she didn't know enough to understand. None of us did. \n\n\t\t\t\tThat wasn't the only time we failed to understand the help the house was giving us. Renee and Lala \n\t\t\t\t*if lie_detector = 1\n\t\t\t\t\tand I \n\t\t\t\t\t*goto lieslies\n\t\t\t\t*else\n\t\t\t\t*label lieslies\n\t\t\t\thave the ability to tell truth from lies—but only in the most literal sense. No one killed Aurelia. Max killed Annaliese.\"\n\n\t\t\t\tYou take a deep breath. \"I did not kill Annaliese. Eric, did you kill Annaliese?\"\n\n\t\t\t\tHis eyes brighten. \"No. I did not kill Annaliese.\"\n\n\t\t\t\tLala nods her confirmation; her eyes shining.\n\n\t\t\t\tIt's a simple matter from there to go around the group. Then Tamsin calls the police.\n\t\t\t\t*goto talk_win\n\t\t\t*else\n\t\t\t\t\"I trust the house,\" says Bruce, \"and I believe I know why Renee's lie-detection failed us: it was too literal. No one killed Aurelia. Max killed Annaliese. Lala, I know you have the same ability. Shall we test my theory? If $!{name} is right about Max, none of our eyes will glow.\"\n\n\t\t\t\tYou face Lala. \"I did not kill Annaliese. Eric, did you kill Annaliese?\"\n\n\t\t\t\tHis eyes brighten. \"No. I did not kill Annaliese.\"\n\n\t\t\t\tLala nods her confirmation; smiling her brilliant smile.\n\n\t\t\t\tIt's a simple matter from there to go around the group. Then Tamsin calls the police.\n\t\t\t\t*if ((clue_one + clue_two) + clue_three) \u003c 2\n\t\t\t\t\t*goto talk_lose\n\t\t\t\t*else\n\t\t\t\t\t*goto talk_win\n*label talk_win\n*page_break\n*achieve convincing\nWith the others on your side, you can build a case against Max that the police will listen to. Bruce is the most articulate, so he does the honours—and it works. Three days later, Max is under arrest and Renee is free. Three months later, Max is in prison.\n*goto beep\n*label talk_lose\n*set justice_fail 1\nYou know you're right, but you can't prove it. So much for justice. Renee is going to prison, and Max is going free. It sucks, but at least no one else was killed. That has to count for something.\n*label beep\n*return\n*label bridge\nYou drive down the hill and along the main street, parking outside the Woolworths.\n\n\"I can cook lasagna,\" says Max. \"No nuts, so Tamsin won't die—and if we can find halal mince it'll be fine for Lala too.\"\n\n*if flaw = 1\n\t\"I can't eat onions,\" you say, \"but I can handle a little garlic as long as there aren't too many other vegies in there. Carrot and zucchini is okay, and I seem to be okay with tinned tomato but not fresh.\"\n\n\t\"That is truly weird,\" Max says.\n\n\t\"I know.\"\n\t*goto shopping\n*else\n*label shopping\n*if killer_correct = 1\n\tGrocery shopping with a murderer is weirder than discovering real-world magic. His usual banter and generosity just doesn't fit with what he did to Aurelia. It's hard to stay wary. Perhaps everything is going to be fine, after all.\n\t*goto trolley\n*else\n\tCooking a lasagna for a murderer feels weirder than discovering real-world magic. Max's usual banter and generosity just doesn't fit with what happened to Aurelia. It's hard to stay wary. Perhaps everything is going to be fine, after all. Or perhaps you'll arrive home to find the murderer has struck again.\n*label trolley\n*choice\n\t#\"Shall we get dessert?\"\n\t\t\"Definitely,\" he says. \"I hate to be a cliché, but... apple pie?\"\n\t\t*if flaw = 1\n\t\t\t\"Sure. I can't have apple, but there's still plenty of chocolate.\"\n\t\t\t*goto post_shopping\n\t\t*else\n\t\t\t\"Yes please!\"\n\t\t\t*goto post_shopping\n\t#\"How do you stay so calm?\"\n\t\tHe laughs outright. \"I assure you, it's all an act.\"\n\n\t\t\"I wish I could act so well.\"\n\n\t\tHe gives you a sharp look, and then pretends fascination with a selection of oils.\n\t\t*goto post_shopping\n\t#\"I'm so glad you're here, Max.\"\n\t\t\"Really?\" he says, and then catches himself. \"What I mean to say is, of course you are. I'm fantastic company.\"\n\n\t\tYou punch him lightly on the arm, and you both laugh.\n*label post_shopping\n\nMax loads the bags into the boot and you turn the car towards home. Then Max directs you to head down the main street instead. He's smiling, but you can tell he's kick up a fuss if you don't follow his suggestion.\n*if killer_correct = 0\n\n\tYou suddenly realise what it is you were missing. Max is the killer. The worst part is that he apparently thought you knew, and that's why he insisted on coming with you. And now you do know, but it's too late to do much about it.\n\t*if max_love = 1\n\t\tSo much for your blossoming romance.\n\t\t*goto i\n\t*else\n\t\t*goto i\n*else\n\t*label i\n\n\tAt last he directs you to pull over. The main street peters out suddenly, and you're utterly alone. Two roads with unfinished edges lead up the hill, and in the other direction there is a large warning sign and a temporary fence with weeds growing through the gaps. It leads onto Gundagai's famous and utterly broken bridge.\n\n\tMax is tall and muscular, which means he's heavier than you. That bridge is your only plausible escape route.\n\t*choice\n\t\t#Fight.\n\t\t\t*label bridge_fight\n\t\t\t*if clue_three = 3\n\t\t\t\tYou smile politely and open the driver's side door, bending down to retrieve the knife.\n\n\t\t\t\tThis is real. This is life and death.\n\n\t\t\t\tMax is the piece of trash that killed Aurelia. \n\t\t\t\t*if (loki_saved = 0) and (loki_no = 0)\n\t\t\t\t\tAnd Loki.\n\t\t\t\t\t*goto murderer_mid_murder_bridge\n\t\t\t\t*else\n\t\t\t\t*label murderer_mid_murder_bridge\n\n\t\t\t\tAs you straighten, holding the knife by your leg, Max just sits there waiting for you. Walking around the car feels like wading through quicksand. Everything is slow, and hard, and your heart feels like it's swelling up ready to explode.\n\n\t\t\t\tYou're distracted for a moment by the tragic beauty of the dying bridge. The ones who made it worked hard, putting it up on strong pillars to keep it above all possible future floods. Yet time ruined it still. Time ruins everything.\n\n\t\t\t\tThen you're at Max's door, and he turns to face you.\n\t\t\t\t*choice\n\t\t\t\t\t#This is your chance. Kill him.\n\t\t\t\t\t\t*set murderer 1\n\t\t\t\t\t\t*label kill_bridge\n\t\t\t\t\t\tThe knife feels as heavy as life and death. A wave of excitement washes through you, hitting as hard as a gut-punch except it's delicious. You've never felt mightier.\n\n\t\t\t\t\t\tSpeed and force. That's what matters.\n\t\t\t\t\t\t*if fitness > 20\n\t\t\t\t\t\t\tThat, and a big knife.\n\n\t\t\t\t\t\t\tYou grab Max's hair to keep him steady, and as he yelps in protest you stab him in the neck.\n\n\t\t\t\t\t\t\tWhy mess with a classic move? It worked for him, after all.\n\n\t\t\t\t\t\t\tHis blood gushes out, some of it flowing and some of it spraying.\n\t\t\t\t\t\t\t*if (empathetic \u003c 40) or (art > 60)\n\n\t\t\t\t\t\t\t\tExcellent. The spraying is obviously arterial. Just a little more and Max will most definitely be dead at your head.\n\n\t\t\t\t\t\t\t\tIt's a little creepy, how easy it is to do. You feel like you've trained for this all your life—and you stab him a second time as he tries to scream, drooling pink froth.\n\n\t\t\t\t\t\t\t\tHe flops around like a fish on a line, thoroughly messing up the inside of your car. Since he can't stop you, you press his fingers around the knife handle where there's a blood-free gap. His fingerprints were probably already there, but it's better to be safe than sorry.\n\n\t\t\t\t\t\t\t\tIt's only been a few seconds, but he's already losing energy. He looks more and more like a rag doll slumped over itself after being tossed into a corner.\n\n\t\t\t\t\t\t\t\tYou've done it. You've killed a man. And it's the greatest rush you've ever felt.\n\n\t\t\t\t\t\t\t\t\"Thank you, Max,\" you whisper, feeling overcome. \"I could never have done it without you.\"\n\n\t\t\t\t\t\t\t\tHis eyes swivel toward you with a visible effort, and glaze over even as you smile at him one last time.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\"$!{name}! Max!\" comes a voice from behind you.\n\n\t\t\t\t\t\t\t\tAh. You're not alone in this profoundly intimate moment with your victim. How irritating.\n\n\t\t\t\t\t\t\t\tBruce is there, sweaty and puffed from his efforts finding you. He's wearing his sunglasses, an absurdly-oversized straw hat, and such thick layers of clothing you're surprised he's not just passing out in a puddle of his own sweat.\n\n\t\t\t\t\t\t\t\tTime to play the shattered innocent.\n\t\t\t\t\t\t\t\t*goto murderer_post_murder\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou try to break his neck but it hurts your arms and fingers so much you can't help thinking of how he must be feeling, and it's unbearable.\n\n\t\t\t\t\t\t\t\tDespite how much you try to keep killing him, your hands loosen. By the time he wriggles out of your grip, it's too late for you.\n\n\t\t\t\t\t\t\t\t*goto he_kills_you\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set clue_three 4\n\t\t\t\t\t\t\tYou hope the knife is sharp enough that your relatively weak body can destroy Max. Given that he cut Aurelia's throat you aim for his neck—but you're too slow.\n\n\t\t\t\t\t\t\tHe grabs your hand just as the blade breaks his skin, and the two of you freeze in an awkward tableau with Max half climbing out of the car and you half climbing in. Then Max wrenches the knife from your hand.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Run.\n\t\t\t\t\t\t\t\t\tYou race out of the car, through the fence, and onto the creaking timber of the bridge, but Max runs after you, snarling in frustration.\n\t\t\t\t\t\t\t\t\t*goto bridge_fight\n\t\t\t\t\t\t\t\t#Beg for mercy\n\t\t\t\t\t\t\t\t\t*goto mercy_max\n\t\t\t\t\t#Put the knife to his throat and tell him not to move until the police come back.\n\t\t\t\t\t\t*label knife\n\t\t\t\t\t\tThe knife feels as heavy as life and death. You raise it to his throat and wait for him to notice.\n\n\t\t\t\t\t\t\"$!{name}?\" he says, half laughing.\n\n\t\t\t\t\t\tThat small movement pushes his neck against the knife, cutting him. \"What is this?\" he says, no longer laughing—or moving. \"What are you doing?\"\n\n\t\t\t\t\t\t\"Don't move,\" you say, and slowly fish your phone from your pocket to call the police.\n\n\t\t\t\t\t\tHe's not lunging at you, but he's pulled out his own phone and called the house. \"Help,\" he say. \"$!{name} has a knife and ${he} won't let me go.\"\n\n\t\t\t\t\t\tThe others come immediately—even Bruce, covered in multiple layers of clothing despite the heat—and demand to know what's going on.\n\t\t\t\t\t\t*goto group_talk_b\n\t\t\t\t\t#Keep the knife hidden, and tell him you know he's the killer.\n\t\t\t\t\t\t\"I know you killed Aurelia,\" you say.\n\n\t\t\t\t\t\tHe turns to face you with a smile already in place, but you don't look away and his own smile fades in response. \"You're serious.\"\n\n\t\t\t\t\t\t\"I am.\"\n\n\t\t\t\t\t\tHe sighs. \"I had a feeling you might have figured it out. Why do you think I insisted on coming with you?\"\n\n\t\t\t\t\t\t\"Yeah.\"\n\n\t\t\t\t\t\t\"So what are you going to do?\" he says. \"Are you going to give me your keys and let me go? Because if not, things are not going to go well for you.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Let him go.\n\t\t\t\t\t\t\t\t\"Thanks muchly,\" he says, and drives away in your car.\n\t\t\t\t\t\t\t\t*goto walk_home\n\t\t\t\t\t\t\t#Run away.\n\t\t\t\t\t\t\t\tYou let go of him and run onto the ruined bridge, feeling like his hand will grab the back of your neck at any moment. But he doesn't. You hear your car's engine and turn around. \n\n\t\t\t\t\t\t\t\tTrue to his word, Max is just stealing your car.\n\n\t\t\t\t\t\t\t\tYou loved that car, but you love being alive even more.\n\t\t\t\t\t\t\t\t*goto walk_home\n\t\t\t\t\t\t\t#\"I've got a knife!\"\n\t\t\t\t\t\t\t\tMax blinks, confused.\n\n\t\t\t\t\t\t\t\t*goto knife\n\t\t\t*elseif fitness > 40\n\t\t\t\tYou punch him in the nose and then retreat to the bridge. For a moment, you think Max won't risk following you. But he does.\n\n\t\t\t\t\"I didn't want to kill you,\" he says. \"But I think the world will be better off without you in it.\"\n\n\t\t\t\tYou race sideways and then leap onto his back like a child, wrapping both your hands around his neck, and your legs around his waist so he can't easily throw you off.\n\n\t\t\t\tIt's hard to take on someone of his size and strength, but you've always prioritised your physical fitness, and now it saves your life.\n\n\t\t\t\tAt last he sinks to the ground, and you know you're going to live. The question is, will he?\n\t\t\t\t*choice\n\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t*if (empathetic \u003c 30) or (art > 70)\n\t\t\t\t\t\t\tIt's a little creepy, how easy it is to do. You feel like you've trained for this all your life—and you hold his life in your two hands, wishing only that you could flip him over so you could see the light fading from his eyes. Your arms tremble with the strain, but you know this is your special moment and you mustn't give up too soon.\n\n\t\t\t\t\t\t\tIt's only been a few moments, but he's already losing energy. He looks more and more like a rag doll slumped over itself after being tossed into a corner. You keep holding on for a count of five hundred before letting go and finally looking at his face. It looks slack and wrong in death. There's certainly no pulse.\n\n\t\t\t\t\t\t\tYou've done it. You've killed a man. And it's the greatest rush you've ever felt.\n\n\t\t\t\t\t\t\t\"Thank you, Max,\" you whisper, feeling overcome. \"I could never have done it without you.\"\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\"$!{name}! Max!\" comes a voice from behind you.\n\n\t\t\t\t\t\t\tAh yes. You're not alone in this profoundly intimate moment with your victim. How irritating.\n\n\t\t\t\t\t\t\tTime to play the shattered innocent.\n\t\t\t\t\t\t\t*goto murderer_post_murder\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou try to tighten your hands around your neck but it hurts your arms and fingers so much you can't help thinking of how he must be feeling, and it's unbearable.\n\n\t\t\t\t\t\t\tDespite how much you try to keep killing him, your hands loosen. By the time he wriggles out of your grip, it's too late for you.\n\n\t\t\t\t\t\t\t*goto he_kills_you\n\t\t\t\t\t#Wait until you're sure he's unconscious, then let go.\n\t\t\t\t\t\t*if observation \u003c 20\n\t\t\t\t\t\t\tYour hands ache, and you're glad to finally let him go. Too bad you're not observant enough to have timed it correctly.\n\n\t\t\t\t\t\t\tHe grabs you before you even stand up, and suddenly you're the one with strong hands around your neck, squeezing hard. You beat at his arms and kick at his legs, but he holds on as if his life depends on it, facing you with a terrible focus.\n\n\t\t\t\t\t\t\tThis isn't his first kill.\n\n\t\t\t\t\t\t\tYour vision sparkles, and then turns dark. All your limbs grow too heavy to move, and you lose your fight; dying among the weedy grass and hard-packed dirt.\n\n\t\t\t\t\t\t\tOn the up side, your books sell like hotcakes when your tragic death hits the news.\n\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*achieve profit\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour hands ache, but you make yourself persist until you're absolutely sure he's unconscious, and then you release him only a millimetre at a time, checking that he doesn't spring up. It's an enormous relief to finally let him go.\n\n\t\t\t\t\t\t\tHe lies slumped on the hard-packed earth like a sleeping child.\n\n\t\t\t\t\t\t\tYou check his pulse is steady and then hurry home to gather the others.\n\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t#Call for help.\n\t\t\t\t\t\t\"Help!\" you yell. \"Somebody help!\"\n\n\t\t\t\t\t\tNothing happens. Your arms are aching and Max is thrashing in your grip. You can yell once more and if no one comes you'll be out of options.\n\n\t\t\t\t\t\t\"HELP!\"\n\n\t\t\t\t\t\t\"I'm here!\" \n\n\t\t\t\t\t\tOf all people, it's Bruce who was suspicious enough to follow you and Max down the hill. \n\n\t\t\t\t\t\tFor an awful moment he's watching you and Max as you roll around on the ancient wood, and you realise neither of you has the breath to make a case against the other. Bruce is going to choose who to help.\n\n\t\t\t\t\t\t*if bruce > 50\n\t\t\t\t\t\t\tHe grabs Max's arms and the two of you restrain Aurelia's killer together. You are deeply grateful that you weren't a jerk to Bruce.\n\n\t\t\t\t\t\t\tThe others pour out of Tamsin's car, stopping short when they see Max struggling to get up off the ground.\n\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tHe grabs your arms and he and Max pin you down. You wish you hadn't thought so little of Bruce.\n\n\t\t\t\t\t\t\t\"Thank you,\" gasps Max. \"You're a life saver.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe others pour out of Tamsin's car, stopping short when they see you struggling to get up off the ground.\n\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t*else\n\t\t\t\tYou punch him in the nose and then retreat to the bridge. For a moment, you think Max won't risk following you. But he does.\n\n\t\t\t\t\"I didn't want to kill you,\" he says. \"But I think the world will be better off without you in it.\"\n\n\t\t\t\tYou race sideways and then leap onto his back like a child, wrapping both your hands around his neck, and your legs around his waist so he can't easily throw you off.\n\n\t\t\t\tThe bridge bends alarmingly under your feet, making you squeak in fear. A few seconds later Max has wriggled out of your grip and thrown you so hard at the weary timbers of the bridge that you're shocked you didn't go straight through to the ground several metres below.\n\n\t\t\t\tYou lie on the planks where he threw you, looking up at a blue sky as you desperately try to breathe—and fail. \n\n\t\t\t\tIt's hard to take on someone of his size and strength, and you're simply not up to it.\n\t\t\t\t*label bbcd\n\t\t\t\t*choice\n\t\t\t\t\t*disable_reuse #Hide.\n\t\t\t\t\t\tThere's nowhere to hide.\n\t\t\t\t\t\t*goto bbcd\n\t\t\t\t\t#Beg for mercy.\n\t\t\t\t\t\t*if imagination > 50\n\t\t\t\t\t\t\tYou beg for mercy, desperately making up a story about the power of love that is so involving real tears spring into your eyes.\n\n\t\t\t\t\t\t\tTo your amazement, your feat of imagination works and Max releases you. He steals your car, which is less than ideal, but it's a whole lot better than getting murdered.\n\n\t\t\t\t\t\t\tYou return to the house and gather the others to tell them what's happened.\n\t\t\t\t\t\t\t*goto group_talk\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou desperately babble apologies and promise wealth and forgiveness, but it's clear your stories aren't good enough. He kneels on your chest and wraps his fingers around your throat.\n\n\t\t\t\t\t\t\tYou beat at his arms and kick at his legs, but he holds on as if his life depends on it, facing you with a terrible focus.\n\n\t\t\t\t\t\t\tThis isn't his first kill.\n\n\t\t\t\t\t\t\tYour vision sparkles, and then turns dark. All your limbs grow too heavy to move, and you lose your fight; dying among the weedy grass and hard-packed dirt.\n\n\t\t\t\t\t\t\tYou'll never write another story again.\n\n\t\t\t\t\t\t\tOn the up side, your tragic death sells a bunch of your books.\n\t\t\t\t\t\t\t*set cash +3000\n\t\t\t\t\t\t\t*achieve profit\n\n\t\t\t\t\t\t\tTHE END\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t#Scream for help.\n\t\t\t\t\t\tThere's no one to help you.\n\t\t\t\t\t\t*goto bbcd\n\t\t#Flight.\n\t\t\tYou race out of the car, through the fence, and onto the creaking timber of the bridge, but Max runs after you, snarling in frustration.\n\t\t\t*goto bridge_fight\n\t\t#Beg for mercy.\n\t\t\t*label mercy_max\n\t\t\t\"Please don't kill me,\" you blurt out.\n\n\t\t\tMax stares at you. \"You really just went and said it, didn't you?\"\n\n\t\t\t\"I... yes.\" Your whole body is tense, flooded with adrenaline telling you to fight for your life, but you can't take your focus away from Max for even an instant. The sheer physical strain is making you tremble.\n\n\t\t\t*if flaw = 2\n\t\t\t\tLuckily you have chronic anxiety. You live with fear every day. \n\t\t\t\t*goto talk_safety\n\t\t\t*elseif mental_health > 50\n\t\t\t\tLuckily you have always prioritised your mental well-being, and some of the calm of your normal self is still available to you despite your terror.\n\t\t\t\t*label talk_safety\n\t\t\t\tSo you remain in your seat, eyes on Max, and wait.\n\n\t\t\t\t\"I don't want to kill you,\" he says at last. \"Aurelia was... she was an awful person. The world is better without her. I don't regret it, and if I have to go to prison then I will go knowing I followed my own sense of right and wrong. But you... you're okay.\"\n\n\t\t\t\t\"What do you want from me?\" you whisper.\n\n\t\t\t\t\"Your car,\" he says, with a sheepish grin. \"That's all. Just your car. It's a piece of crap anyway.\"\n\n\t\t\t\t\"Uh... okay?\" you say.\n\n\t\t\t\tHe beams at you, like a parent with a rather slow child. But he doesn't move. \n\t\t\t\t*label walk_home\n\n\t\t\t\t\"Keys?\" he says at last.\n\n\t\t\t\tYou pull out the keys and give them to him, and then step out of the car. \n\n\t\t\t\tHe unloads the groceries onto the messy side of the road, and then drives away. After a long moment, you load up all the groceries and start the steep walk back to the rectory.\n\n\t\t\t\tIt seems you'll be cooking the lasagna tonight.\n\t\t\t\t*page_break\n\t\t\t\t*goto group_talk\n\t\t\t*else\n\t\t\t\tSomething in you snaps and you race out of the car, through the fence, and onto the creaking timber of the bridge. Max runs after you, snarling in frustration.\n\t\t\t\t*goto bridge_fight\n*label home\n*page_break\nTwo days later, you walk through the door of your home and dump your bag on the chair before falling face-first onto the bed.\n\nIt's been quite a week. But you survived. Altogether, you wrote ${word_count} words.\n*if word_count > 4999\n\t*achieve words\n\n*if (max_love = 1) or (max_love = 100)\n\tAnd you survived dating a murderer, which is way better than the alternative.\n\t*goto_scene ending\n*if lala_love = 1\n\n\tYou've had a shower and put on a laod of washing when your phone rings.\n\n\t\"$!{name}?\" says Lala.\n\n\t\"Hi.\"\n\n\t\"I miss being around you 24-7,\" she says. \"Can I take you out for a proper date tomorrow?\"\n\n\t\"Of course!\"\n\n\tIt's good to be home.\n*goto_scene ending", "chapter_three_mmm": "*set temp 0\n*if max_love = 5\n\t*set max_love 1\n\t*goto bro\n*elseif lala_love = 5\n\t*set lala_love 1\n\t*goto bro\n*else\n*label bro\n\"Renee?\" you say with mounting dread. \"What is it?\"\n\n\"Nothing,\" she says, but she's rooted to the spot. \"Come on out, Aurelia. It's not funny.\"\n\nShe raises her hand to knock on Aurelia's door, but she doesn't knock.\n\nLala goes and takes Renee's hand as if the rector is a frightened child. \"It's all right. I'll open the door.\"\n\n\"No,\" says Renee weakly. \"This is my responsibility.\"\n\n\"I'm not afraid,\" says Lala, and turns the knob.\n*fake_choice\n\t#\"No! Let me do it.\"\n\t\t*gosub trial_end\n\t\t*set proactive %+10\n\t\t*set empathetic %+10\n\t\t\"Really, it's fine,\" says Lala, but she's already stepping back.\n\n\t\tRenee is shaking her head and muttering some kind of prayer. She backs away until she runs up against her own bookshelves.\n\n\t\tYou open the door, automatically standing in Lala's way in order to block her view.\n\t#Watch Renee's face.\n\t\t*gosub trial_end\n\t\t*set trusting %-10\n\t\t*set proactive %-10\n\t\tRenee shakes her head, muttering some kind of prayer. She backs away until she runs up against her own bookshelves.\n\n\t\tLala opens the door too wide and too quickly, and it bangs against the wall. \n\n\t\t\"What have I done?\" whispers Renee, so quietly that you're sure no one else heard her. She slides to the floor in a dead faint, hitting her head with an audible thud.\n\t#Scan the faces of the others as the door opens.\n\t\t*gosub trial_end\n\t\t*set observation %+10\n\t\t*set trusting %-10\n\t\tBruce remains in his corner of the rear balcony, well out of the line of sight. Tamsin has the best view, and she startles forward before rearing back, covering her mouth. \n\n\t\tMax and Eric move around you to stare. Max swears, and Eric looks like he'll be sick.\n\t#Watch Lala.\n\t\t*gosub trial_end\n\t\t*set trusting %-10\n\t\t*set observation %+10\n\t\tLala opens the door too wide and too quickly, and it bangs against the wall. \n\n\t\tYou hear Renee crumple in a dead faint, but Lala simply stands still, not registering what she's seeing until she takes a step inside, crouching to touch Aurelia and confirm what her eyes have told her.\n\nAurelia is curled up on the floor like a sleeping kitten, with her head and knees tucked in. There is a brilliant modern-art spray of red paint across the curtains; so bright you wonder how you didn't see it from the other side.\n\nIt wasn't there before, and it's not paint. Aurelia isn't sleeping. She's had her throat cut.\n\nLala crouches before her, running her hand along a hot-pink streak of bloodied hair among the blonde. Her fingers come back red, and she finally realises what she's done.\n\n\"Evidence,\" she whispers. \"Oh no. I'm the jerk who messes up the crime scene.\"\n\nEric throws up.\n*if flaw = 1\n\tYour drama queen of a stomach curdles in sympathy, making you double over in pain.\n\t*goto bruce\n*else\n*label bruce\n\nBruce realises something is terribly wrong and stands up at last, but Max holds out a hand to stop him. \"Don't. You don't want to see.\"\n\n\"See what?\" he say angrily. \"You're all acting like extras in a high school play.\"\n*choice\n\t#\"Bruce, wait. It's bad.\"\n\t\t*set empathetic %-10\n\t\t\"It can't possibly be as bad as all this,\" he says, waving an arm around at the horrified tableau. \n\n\t\t\"It is,\" says Max grimly. \"There's blood.\"\n\n\t\t\"So call a doctor!\" Bruce explodes. \n\n\t\tHe pushes his way past and stands in the doorway.\n\t\t*goto doorway\n\t#Let him see.\n\t\t*set proactive %-10\n\t\tBruce pushes his way past the others and stands in the doorway.\n\t\t*goto doorway\n\t#\"Aurelia's dead. Someone killed her.\"\n\t\t*set empathetic %-10\n\t\t*set trusting %-10\n\t\t\"What?\" he says. \"No. Don't be ridiculous.\"\n\n\t\t\"She is,\" you say, feeling suddenly like you're having an argument online.\n\n\t\tHe pushes his way past the others and stands in the doorway.\n*label doorway\n\nThere's something about the way Aurelia is lying that says her life is long gone.\n\n\"You,\" snaps Bruce. \"$!{name}. Stop gaping and call an ambulance.\"\n\n\"But she's dead,\" you say, feeling as if the words are stiff and old; difficult to pull out of the place words come from.\n\n\"Probably yes. But what if she isn't?\" He crouches, careful not to go all the way into the room, and touches the side of her neck to look for a pulse.\n\nHis hand jerks away by instinct, and he shudders. \"She's like a doll.\"\n*choice\n\t#\"Do you mean she's cold?\"\n\t\t*set knowledge %+10\n\t\t*set empathetic %-10\n\t\tHe nods grimly. \"Like plastic.\"\n\n\t\tEric manages to get to the bathroom before being sick again.\n\n\t\tRenee stirs, reminding you guiltily of her existence. She's already crying, gasping out her sobs in silent shudders like an exhausted child. Her legs stick out in front of her and she leans back on the bookcase, not trying to get up. After a moment she tugs her phone from her pocket and calls the police.\n\n\t\tYou wonder why you're not crying. It's sad, isn't it? Except all you know about Aurelia is she was a waitress and a horror writer, and she didn't want to be the beautiful corpse. But she is.\n\t\t*goto realisation\n\t#Call an ambulance.\n\t\t*set honest %+10\n\t\t*set proactive %-10\n\t\t*set temp 1\n\t\tYou stumble back to your own room, unable to stop thinking about dead Aurelia so close by, and call 000.\n\n\t\t\"Fire police ambulance?\" says the kind of voice that is professionally calm.\n\n\t\t\"Ambulance,\" you say, and then stutter out answers to the questions that follow. \n\n\t\t\"Yes I'm sure. Bruce tried to take a pulse. Her skin is… she's dead.\"\n\n\t\t\"St John's Anglican Church Rectory, on the corner of Otway and Punch Street.\"\n\n\t\t\"Aurelia. Aurelia Katz.\"\n\n\t\t\"No. I don't know her emergency contacts.\"\n\n\t\tThe voice tells you not to hang up, but you hang up anyway. Why not? It's not like you can save her. No one can.\n\n\t\tYou return to the others. Eric is in the bathroom, still throwing up. Renee is conscious, but barely. She's still on the floor.\n\t\t*goto realisation\n\t#Run.\n\t\t*set fitness %-10\n\t\t*set empathetic %+10\n\t\tShe's dead.\n\n\t\tHer whole life, her novels, her waitressing. It's all gone; an awkward and unfinished ending that would never fly in a novel. Which is of course why people write novels. Because real life is stupid and pointless and random and it does things like this.\n\n\t\tYou have to get out. Now.\n\n\t\tYou race down the hall, out the oversized front door, down the concrete steps, and over the grassy hill, not stopping until you've passed through the elaborate stand-alone gate and you're racing along the peaceful street, heading towards that blue sky that is as empty and peaceful as the rectory isn't.\n\n\t\tIt's not as close as it looks, and you slow down and eventually stop, realising far too late that you just ran away from the scene of a murder. At that, you turn around and run all the way back, arriving panting in the hall to see little has changed. Aurelia is still curled up on her floor like a dead bird. Renee is sitting on the floor, crying. Eric is in the bathroom, throwing up.\n\n\t\tThe rest look up at you with blank expressions, neither wondering nor caring where you went. Presumably Bruce has called an ambulance himself by now.\n*label realisation\n\nAurelia's door hangs open, and the sight of her is no less horrid that it was at your first glimpse. But it's not the corpse that makes your breath cut out as if you've been punched in the guts. It's the knowledge that Aurelia was almost certainly killed by someone in the house.\n\nYou immediately suspect…\n*set trusting %-10\n*choice\n\t#No. It can't possibly be one of us.\n\t\t*set trusting %+20\n\t\tExcept… it has to be? Doesn't it? Does it?\n\n\t\tWho else is there?\n\t\t*goto suspicion\n\t#Bruce. He acts like he hates everyone.\n\t\t*set bruce %-10\n\t\tBruce has already retreated back to his room and closed the door.\n\t\t*choice\n\t\t\t#Confront him outright.\n\t\t\t\t*set honest %+10\n\t\t\t\t*set proactive %+10\n\t\t\t\t*set bruce %-10\n\t\t\t\tYou go and knock on his door before you lose your nerve.\n\n\t\t\t\tHe opens the door a crack, peering out at you.\n\n\t\t\t\t\"What now?\" he says, visibly swallowing ruder phrasing.\n\n\t\t\t\t\"You killed Aurelia,\" you say. \"Didn't you?\"\n\n\t\t\t\tHe slams the door in your face, and locks it.\n\t\t\t\t*goto suspicion\n\t\t\t#Make sure the rear door is locked.\n\t\t\t\t*set proactive %-10\n\t\t\t\tYou don't say a word, but you hope everyone is too distracted to care what you're doing. Your legs feel sluggish and your hands clumsy, but you manage to lock the relevant door without actually falling over.\n\n\t\t\t\tOf course Bruce has his own key, but he won't be expecting the door to be locked. Perhaps that will make a difference at a crucial moment.\n\t\t\t\t*goto suspicion\n\t\t\t#Quietly tell Renee what you think.\n\t\t\t\t*set mental_health %+10\n\t\t\t\t*set trusting %+10\n\t\t\t\t*set renee %+10\n\t\t\t\tYou sit next to Renee on the floor. It feels heartless to give her any more bad news, but it has to be done: \"I think Bruce is the killer.\"\n\n\t\t\t\tShe turns to you, looking exhausted. \"Why?\"\n\n\t\t\t\t\"He's always lurking in his room.\"\n\n\t\t\t\t\"Writing,\" she says gently. \"Being hardworking is unusual, yes, but not evidence of a crime.\"\n\t\t\t\t*goto suspicion\n\t#Eric. He's too enthusiastic to be sincere.\n\t\t*set eric %-10\n\t\tRight now, Eric is feebly cleaning up his own vomit. You help him clean up, and the pair of you take stinking plastic bags out to the rubbish. He's looking better physically, but still dazed with horror. \n\t\t*choice\n\t\t\t#Confront him.\n\t\t\t\t*set honest %+10\n\t\t\t\t*set proactive %+10\n\t\t\t\t*set eric %-10\n\t\t\t\t\"Eric,\" you say. \"I know you killed Aurelia.\"\n\n\t\t\t\t\"How?\"\n\n\t\t\t\t\"I just know,\" you say, trying to keep your voice from betraying how surprised you are that he is simply accepting that he is guilty.\n\n\t\t\t\t\"Oh!\" he says, almost laughing. \"I though you were saying I'd poisoned her or something, by accident. But you were accusing me of murder.\"\n\n\t\t\t\t\"Yes.\"\n\n\t\t\t\t\"Well, that's a relief.\"\n\n\t\t\t\t\"It is?\" you say.\n\n\t\t\t\t\"For a moment there I thought I'd done something awful without realising it. But if I'd killed Aurelia like that, I'd know.\"\n\n\t\t\t\t\"Oh.\"\n\t\t\t\t*goto suspicion\n\t\t\t#Make sure the rear doors are locked.\n\t\t\t\t*set proactive %-10\n\t\t\t\tYou don't say a word, but you hope everyone is too distracted to care what you're doing. Your legs feel sluggish and your hands clumsy, but you manage to lock the relevant doors without actually falling over.\n\n\t\t\t\tOf course Eric has his own key, but he won't be expecting the doors to be locked. Perhaps that will make a difference at a crucial moment.\n\t\t\t\t*goto suspicion\n\t\t\t#Quietly tell Renee what you think.\t\n\t\t\t\t*set mental_health %+10\n\t\t\t\t*set trusting %+10\n\t\t\t\t*set renee %+10\n\t\t\t\tYou sit next to Renee on the floor. It feels heartless to give her any more bad news, but it has to be done: \"I think Eric is the killer.\"\n\n\t\t\t\tShe turns to you, looking exhausted. \"Why?\"\n\n\t\t\t\t\"He's always flattering everyone excessively. Must be hiding something.\"\n\n\t\t\t\t\"It's true that he's rather insecure,\" she says gently, \"but that's not evidence of a crime. I've known Eric since he was a baby. He didn't do this.\"\n\t\t\t\t*goto suspicion\t\n\t#Renee. She's clearly overcome with guilt.\n\t\t*set renee %-10\n\t\tRight now, Renee is still sitting on the floor. She's stopped crying, but looks like she could start again at any moment.\n\t\t*choice\n\t\t\t#Confront her.\n\t\t\t\t*set honest %+10\n\t\t\t\t*set proactive %-10\n\t\t\t\t*set renee %-10\n\t\t\t\tYou sit beside her, and she gives you a watery smile of acknowledgement. That doesn't make it easier to accuse her of cold-blooded murder.\n\n\t\t\t\tIn the end you spit it out. \"You killed Aurelia.\"\n\n\t\t\t\t\"I know,\" she says.\n\n\t\t\t\t\"Pardon me?\"\n\n\t\t\t\t\"There's something about this house,\" she says. \"It makes everyone… more. Good or bad, happy or sad, even more flirtatious or shy or funny. Or murderous. I knew it, deep down, and I still invited you all here.\"\n\t\t\t\t*goto suspicion\n\t\t\t#Make sure the rear doors are locked.\n\t\t\t\t*set proactive %-10\n\t\t\t\tYou don't say a word, but you hope everyone is too distracted to care what you're doing. Your legs feel sluggish and your hands clumsy, but you manage to lock the relevant doors without actually falling over.\n\n\t\t\t\tOf course Renee has her own key, but she won't be expecting the doors to be locked. Perhaps that will make a difference at a crucial moment.\n\t\t\t\t*goto suspicion\n\t\t\t#Quietly tell Lala what you think.\n\t\t\t\t*set mental_health %+10\n\t\t\t\t*set trusting %+10\n\t\t\t\t*set lala %+10\n\t\t\t\tYou take Lala by the wrist, not wanting to touch Aurelia's blood, and gently drag her into the front section of the hall where it's relatively private.\n\n\t\t\t\t\"I think Renee killed Aurelia,\" you say.\n\n\t\t\t\tLala's eyes widen. \"Why? How?\"\n\n\t\t\t\t\"I don't know,\" you say. \"But look at how she's falling apart.\"\n\n\t\t\t\t\"We're all falling apart,\" she says softly.\n\t\t\t\t*goto suspicion\n\t#Tamsin. Her room is right next to Aurelia's room.\n\t\t*set tamsin %-10\n\t\tTamsin is leaning over the tea-table, scribbling furiously in a notebook.\n\t\t*choice\n\t\t\t#Confront her.\n\t\t\t\t*set honest %+10\n\t\t\t\t*set proactive %+10\n\t\t\t\t*set tamsin %-10\n\t\t\t\tYou walk up to her without making a sound, and peer over her shoulder to see what she feels the urge to write at such a time.\n\n\t\t\t\t'Eric—vomiting,' she has written. 'Renee—fainted, now crying. Bruce—vanished. Lala—touched her, then froze. $!{name}—'\n\n\t\t\t\tShe looks up, and startles as she realises you're standing right beside her.\n\n\t\t\t\t\"You killed Aurelia,\" you say abruptly. \"And you're taking notes like some kind of sick—\"\n\n\t\t\t\t\"Writer,\" she says, hollow-eyed. \"If I can write it down, it makes it less real. If it's a story, then it's going to be all right.\"\n\n\t\t\t\tShe turns away and continues her notes: '$!{name}—accusing.'\n\t\t\t\t*goto suspicion\n\t\t\t#Make sure the rear doors are locked.\n\t\t\t\t*set proactive %-10\n\t\t\t\tYou don't say a word, but you hope everyone is too distracted to care what you're doing. Your legs feel sluggish and your hands clumsy, but you manage to lock the relevant doors without actually falling over.\n\n\t\t\t\tOf course Tamsin has her own key, but she won't be expecting the doors to be locked. Perhaps that will make a difference at a crucial moment.\n\t\t\t\t*goto suspicion\n\t\t\t#Quietly tell Renee what you think.\n\t\t\t\t*set mental_health %+10\n\t\t\t\t*set trusting %+10\n\t\t\t\t*set renee %+10\n\t\t\t\tYou sit next to Renee on the floor. It feels heartless to give her any more bad news, but it has to be done: \"I think Tamsin is the killer.\"\n\n\t\t\t\tShe turns to you, looking exhausted. \"Why?\"\n\n\t\t\t\t\"Her room is right next to Aurelia's.\"\n\n\t\t\t\t\"So is yours,\" she says gently.\n\t\t\t\t*goto suspicion\t\n\t#Lala. Ditto.\n\t\t*set lala %-10\n\t\tRight now, Lala is standing in the hall, staring at a smear of Aurelia's blood on her hand.\n\t\t*if (lala_love > 0) and (lala_love \u003c 9)\n\t\t\tShe's beautiful, but that no longer means anything.\n\t\t\t*goto yow\n\t\t*else\n\t\t*label yow\n\t\t*choice\n\t\t\t#Confront her.\n\t\t\t\t*set honest %+10\n\t\t\t\t*set proactive %+10\n\t\t\t\t*set lala %-10\n\t\t\t\tYou walk up to Lala, but her gaze pins you before you can speak. \"I dreamed this,\" she said. \"Aurelia curled up like a question mark; blood on my fingers. How did I know this was going to happen?\"\n\n\t\t\t\t\"Are you confessing?\"\n\n\t\t\t\t\"I don't know,\" she says. \"No. I didn't kill her, unless… did I dream her murder into reality? What's happening?\"\n\n\t\t\t\t\"This house has a strange effect on people,\" you say slowly. \"Did you want to kill her?\"\n\n\t\t\t\t\"No!\"\n\n\t\t\t\t\"Well… then you didn't. Probably.\"\n\t\t\t\t*goto suspicion\n\t\t\t#Make sure the rear doors are locked.\n\t\t\t\t*set proactive %-10\n\t\t\t\tYou don't say a word, but you hope everyone is too distracted to care what you're doing. Your legs feel sluggish and your hands clumsy, but you manage to lock the relevant doors without actually falling over.\n\n\t\t\t\tOf course Lala has her own key, but she won't be expecting the doors to be locked. Perhaps that will make a difference at a crucial moment.\n\t\t\t\t*goto suspicion\n\t\t\t#Quietly tell Renee what you think.\n\t\t\t\t*set mental_health %+10\n\t\t\t\t*set trusting %+10\n\t\t\t\t*set renee %+10\n\t\t\t\tYou sit next to Renee on the floor. It feels heartless to give her any more bad news, but it has to be done: \"I think Lala is the killer.\"\n\n\t\t\t\tShe turns to you, looking exhausted. \"Why?\"\n\n\t\t\t\t\"Her room is right next to Aurelia's.\"\n\n\t\t\t\t\"So is yours,\" she says gently.\n\t\t\t\t*goto suspicion\t\n\t#Max. Ditto.\n\t\t*set max %-10\n\t\tRight now, Max is slumped into one of the communal office chairs, with his face buried in his arms.\n\t\t*if (max_love = 1) or (max_love = 5)\n\t\t\tEven the slumped curve of his back is gorgeous, but that no longer means anything to you.\n\t\t\t*goto bac\n\t\t*else\n\t\t*label bac\n\t\t*choice\n\t\t\t#Confront him.\n\t\t\t\t*set honest %+10\n\t\t\t\t*set proactive %+10\n\t\t\t\t*set max %-10\n\t\t\t\tYou sit in the chair next to him, and wait until he looks up.\n\n\t\t\t\t\"I know you killed Aurelia,\" you say.\n\n\t\t\t\tHe blinks. \"I didn't kill Aurelia.\"\n\t\t\t\t*if lie_detector = 1\n\t\t\t\t\tYou can see his eyes, and they don't shift colour. He's telling the truth.\n\n\t\t\t\t\t\"Okay,\" you say. \"I needed to hear you say it.\"\n\t\t\t\t\t*goto suspicion\n\t\t\t\t*else\n\t\t\t\t\t*goto suspicion\n\t\t\t#Make sure the rear doors are locked.\n\t\t\t\t*set proactive %-10\n\t\t\t\tYou don't say a word, but you hope everyone is too distracted to care what you're doing. Your legs feel sluggish and your hands clumsy, but you manage to lock the relevant doors without actually falling over.\n\n\t\t\t\tOf course Max has his own key, but he won't be expecting the doors to be locked. Perhaps that will make a difference at a crucial moment.\n\t\t\t\t*goto suspicion\n\t\t\t#Quietly tell Renee what you think.\n\t\t\t\t*set mental_health %+10\n\t\t\t\t*set trusting %+10\n\t\t\t\t*set renee %+10\n\t\t\t\tYou sit next to Renee on the floor. It feels heartless to give her any more bad news, but it has to be done: \"I think Max is the killer.\"\n\n\t\t\t\tShe turns to you, looking exhausted. \"Why?\"\n\n\t\t\t\t\"His room is so close to Aurelia's.\"\n\n\t\t\t\t\"So is yours,\" she says gently.\n*label suspicion\n\nSo much for your razor-sharp insight. You can't stop yourself looking at sweet little, dead little Aurelia. At least you'll know if someone else touches her, although it seems a bit late for that to matter. \n\nSirens sound in the distance, coming closer, and for a moment you wonder if someone in Gundagai has been in a terrible accident. But of course sirens are coming here, for Aurelia. Strange, to call for help for someone who can never be helped.\n\nSomewhere she has parents, friends, perhaps brothers or sisters or lovers. They won't know what's happened for hours to come. It's a shameful intimacy, to know someone is dead before their closest friends find out.\n*choice\n\t#Go and meet the ambulance. It's a good chance to observe emergency protocols in action.\n\t\t*set murderer %+10\n\t\t*set proactive %+10\n\t\t*set art %+10\n\t\tYou walk out the front of the house and stand on the beautiful wide deck like a queen receiving accolades. The ambulance is shockingly loud when it draws up, and then the siren mercifully cuts off. There's another siren a little farther away, and you realise the police are coming too. Of course they are.\n\n\t\tThe ambulance crew pours out: six people, all dressed in their uniforms and slightly breathless from what must be an unusual event in such a small town. Where did the ambulance even come from?\n\n\t\tThey go past you with barely a word, and gently shift the others out of the hallway and onto the rear balcony while they examine Aurelia.\n\n\t\tMoments later they step back, forming a line around the door to the Cube which says without words that yes, Aurelia was murdered.\n\t\t*goto cops\n\t#Stay where you are. The police will be suspicious if you move.\n\t\t*set knowledge %+10\n\t\t*set proactive %-10\n\t\t*set trusting %-10\n\t\t*label watch\n\t\tThe siren grows unbearably loud and then finally stops. Renee blows her nose, tucks the used tissue into her bra, and pulls herself up by the bookshelf as if she's aged twenty years. She goes and opens the door, standing back as the ambulance crew pours inside. \n\n\t\tThey barely say a word, but you find yourself herded out of the way along with the others while the medicos examine Aurelia.\n\n\t\tMoments later they step back, forming a line around the door to the Cube which says without words that yes, Aurelia was murdered.\n\t\t*goto cops\n\t#Watch the others. One of them is the killer.\n\t\t*set trusting %-10\n\t\t*set observation %+10\n\t\tAs the noise draws closer, Renee cries louder.\n\n\n\t\t*goto watch\n*label cops\n\nShortly afterwards the police arrive and the mood abruptly changes. Everyone is separated to their own rooms and ordered not to communicate with anyone else until the police have spoken to everyone. It's clear from Renee's weary expression that she was expecting this. She even tells them to help themselves to tea and coffee before returning to her study. Now that they're here, she's calm.\n\nTamsin is so shocked that it's clear she hadn't thought through the implications of staying in a house where a murder just occurred. Max looks relieved to be sent away, while Lala looks like she's frightened the killer will ambush her the second she's alone.\n\nYou feel…\n*fake_choice\n\t#Guiltily fascinated. You'll definitely get a great story out of this.\n\t\t*set murderer %+5\n\t\t*set art %+10\n\t#Terrified. What if the killer strikes again?\n\t\t*set imagination %+10\n\t\t*set trusting %-10\n\t#Anxious and fidgety. The police look ready to arrest all of you.\n\t\t*set observation %+10\n\t#Worried about your new friends. This is awful for everyone.\n\t\t*set knowledge %+10\n\t\t*set empathetic %+10\n\t#Excited. You've always wanted the chance to be close to a real murder.\n\t\t*set murderer %+10\n\t\t*set art %+10\n\t\t*set empathetic %-10\n\nYou sit in your room and wait. There are low voices coming from the hallway, but nothing you can make out. All of a sudden you desperately want a shower, but of course that can't happen now. And you're hungry, which feels far too ordinary for such a time, and disrespectful. But it's well past dinner time now.\n\n*if room = 1\n\tThe Nursery is feeling more and more like a cave. You want to open the door and maybe let some actual light inside, but you're well aware of how suspicious that would look. \n\t*goto aa\n*if room = 2\n\tThe Dining Room is feeling more and more like a cave. You want to open the external door and maybe let some actual light inside, but you're well aware of how suspicious that would look. You stand at the fireplace, wishing you could reach through to the mirroring fireplace in Max's room, and wondering if Max is standing on the other side wishing he could reach you. He's such a confident, overwhelming presence that you crave his company.\n\t*goto aa\n*if room = 3\n\tThe Playroom's gorgeous views and marble fireplace suddenly feel like they bear a sinister weight of years. It feels like all the history of this house is pressing in on you.\n*label aa\n\nHow long will you have to wait?\n*choice\n\t#Idly daydream about how you would have committed the murder.\n\t\t*set empathetic %-10\n\t\t*set art %+10\n\t\t*set imagination %+10\n\t\t*set murderer +10\n\t\tAurelia's room is at the heart of the house. Someone was very sure of their ability to kill her silently.\n\n\t\tYou'd have to be a fantastic liar to be a killer. Especially if you were on such a short list of suspects. To be able to stay in the same house, trapped with the other suspects, and not allowed to leave town? That must be stressful.\n\n\t\tThe simplest way to murder someone is to make it look like an accident. That's how you'd do it.\n\n\t\tActually, self-defence would work. No need to hide where you were or even how you did it—which is important, because of course you'd want to write about it. And killing someone in self-defence would make an amazing thinly-veiled tale.\n\n\t\tHuh. Right now you're in a house with a killer. You could literally kill them, and you'd be hailed as a hero.\n\t\t*goto questions\n\t#Do some writing.\n\t\t*set word_count +2000\n\t\t*set art %+10\n\t\tHow can you write at such a time?\n\t\t*if empathetic \u003c 50\n\n\t\t\tThe same as always. You follow a kind of muscle memory to open your computer, sit on the chair, and place your hands on the keys. Today more than ever, you remind yourself that it doesn't have to be good; it just has to be.\n\n\t\t\tAnd then you're writing, and for a little while the world is normal again.\n\t\t\t*goto questions\n\t\t*else\n\t\t\tYou can't. The narrator-voice in your head describes it as being like pulling teeth, but even that's not true. At least if you were pulling teeth you'd get something out of it.\n\n\t\t\tThis whole town just turned dark, as far as you're concerned. You're not the kind who can just switch off emotions, even if today you wish you were.\n\t\t\t*goto questions\n\t#Write a letter to Aurelia.\n\t\t*set mental_health %+10\n\t\t'Dear Aurelia,' you write.\n\t\t'I am so sorry you're dead. You deserved better. I don't know why or how this happened, but I know you were afraid and doing your best to face your fears and live.\n\n\t\tOh, this sucks!\n\n\t\tI barely knew you. You seemed nice. Curious, and funny, and kind, and a fantastic writer. I wish you were still alive.\n\n\t\tFrom $!{name}'\n\t\t*goto questions\n\t#Let yourself collapse.\n\t\t*set mental_health %+10\n\t\tYou fall back onto the bed, covering your eyes with your hands as if you can scrub away the image of Aurelia's body, and those pink streaks in her long blonde hair. How unfair and awful, that a horror writer should be killed in such a horrid, tropey way. \n\n\t\tIt feels like you should cry, or rage against such injustice, but you can't help feeling bored, and hungry, and nervous that your own writing will be derailed by this interruption. \n\n\t\tIs it better that you didn't know her?\n\n\t\tThere aren't any good answers.\n*label questions\n\n\"Hello?\" says a police woman at the door. \"$!{name}? May we come in?\"\n\n\"Of course!\" you say, immediately cursing yourself for sounding so much like a seven year-old with the answer to the teacher's question.\n\nTwo detectives come into your room; a Korean-looking man and a woman who's almost a head taller than he is.\n\n\"My name is Jeanette, and this is Keichi,\" the woman says.\n\nNeither of them sits down.\n\n\"How well did you know Aurelia Katz?\"\n*choice\n\t#\"We just met.\"\n\t\t\"Yet she rode in your vehicle to this event,\" says Jeanette.\n\n\t\t\"Lala and Max were with us,\" you protest. \"I didn't know them either.\"\n\n\t\t\"Are you aware that Aurelia was a waitress at Tilley's Devine café in Lyneham, Canberra?\"\n\n\t\t\"Yes. I think I might have seen her there.\"\n\n\t\t\"You said you just met.\"\n\n\t\tKeichi makes a note on his device.\n\n\t\t\"We didn't know one another,\" you protest, feeling your pulse skyrocket.\n\t\t*goto bruce_b\n\t#\"May I have some dinner? I'm hungry.\"\n\t\t\"In a minute,\" says Jeanette. \"Tell us about Aurelia.\"\n\n\t\t\"Uh…\" Your mind blanks out utterly, and you feel an overwhelming urge to inform these professional detectives that Aurelia Katz's hair colour wasn't really blonde. \"She wrote horror novels. Or at least, she wanted to.\"\n\n\t\t\"Yes,\" says Jeanette heavily. \"Anything else?\"\n\n\t\tYou shake your head, unable to remember a single thing about her. \"She seemed nice.\"\n\t\t*goto bruce_b\n\t#\"I liked her.\"\n\t\t\"Romantically?\" asks Jeanette.\n\n\t\t\"No!\"\n\n\t\t\"She was a very attractive young lady,\" Jeanette points out. \"Are you saying you didn't notice?\"\n\n\t\t\"I… no. Yes. No.\" You force yourself to stop babbling and take a breath. \"Yes, she was pretty. No, we were not romantically involved.\"\n\n\t\t\"Did she reject you?\" asks Jeanette.\n\n\t\tYour eyes widen at the implication. \"I never asked her for anything. I mean, except petrol money.\"\n\n\t\t\"Did she pay you the petrol money?\"\n\n\t\tThis is getting farcical. \n\n\t\t\"Technically no, but we've only just got here. There was no hurry.\"\n*label bruce_b\n\nJeanette and Keichi exchange a glance.\n\n\"What about Bruce Grist?\" Jeanette asks.\n*choice\n\t#\"He's antisocial.\"\n\t\t*set bruce %-10\n\t\t\"Go on,\" says Jeanette.\n\n\t\t\"I've seen him at dinner time—communal dinners are a condition of the writing retreat—but that's all.\"\n\n\t\t\"Aren't most writers introverted?\" Jeanette asks.\n\n\t\t\"Yes, but he's more so.\"\n\n\t\t\"Hmm,\" says Jeanette.\n\t\t*goto eric_bit\n\t#\"I don't think he killed Aurelia.\"\n\t\t*set bruce %+10\n\t\t\"Why not?\" asks Jeanette.\n\n\t\t\"I just don't,\" you say. \"He didn't really socialise, but he just doesn't seem like a murderer to me.\"\n\n\t\t\"Hmm,\" says Jeanette.\n\t\t*goto eric_bit\n\t#\"He's perfectly nice.\"\n\t\t*set bruce %+10\n\t\t\"What do you mean?\" asks Jeanette.\n\n\t\t\"Just that,\" you say, feeling your mouth going dry. \"He seems nice.\"\n\n\t\t\"Perfectly nice or merely seems nice?\" asks Jeanette.\n\n\t\t\"I don't know. Both.\"\n*label eric_bit\n\n\"What about Eric Mitchell?\" Keichi asks.\n*choice\n\t#\"He's peculiar.\"\n\t\t*set eric %-10\n\t\t\"Peculiar in what way?\" asks Jeanette.\n\n\t\t\"He just… he's too effusive. He read everything of ours that he could get his hands on before the retreat started.\"\n\n\t\t\"Sounds enthusiastic.\"\n\n\t\t\"Exactly.\"\n\n\t\t\"Is that bad?\" Jeanette asks.\n\n\t\t\"It's peculiar,\" you say. \"That's all I meant.\"\n\t\t*goto renee_bit\n\t#\"I don't think he's the killer.\"\n\t\t*set eric %+10\n\t\t\"What is your basis for defending him?\" Jeanette asks.\n\n\t\t\"Nothing,\" you say. \"I mean, he just seems too… nice… to kill someone.\"\n\n\t\t\"I see.\"\n\t\t*goto renee_bit\n\t#\"He's very encouraging.\"\n\t\t*set eric %+10\n\t\t\"Do you mean to say he might have convinced someone else to kill Aurelia?\" asks Jeanette.\n\n\t\t\"No!\" you say. \"That's not what I'm saying at all. He's encouraging. Of everyone's writing. That's all. It's a positive quality, not a murderous one.\"\n\n\t\t\"I see.\"\n*label renee_bit\n\nKeichi consults his device. \"What about Renee Scott?\" \n*choice\n\t#\"She knows something.\"\n\t\t*set renee %-10\n\t\t\"What do you mean?\" asks Jeanette.\n\n\t\t\"She was terrified to open Aurelia's door. Somehow, she knew Aurelia was dead before anyone else.\"\n\n\t\t\"Do you think Renee killed Aurelia?\"\n\n\t\t\"I'm not a detective.\"\n\n\t\t\"You just said that Renee was hiding something.\"\n\n\t\t\"No I… did I? That's not what I meant.\"\n\t\t*goto tamsin_bit\n\t#\"I don't think she's the killer.\"\n\t\t*set renee %+10\n\t\t\"Why not?\" Jeanette asks.\n\n\t\t\"She was more shaken than any of us. I just don't think she's capable of violence, at all.\"\n\n\t\t\"If you say so,\" says Jeanette.\n\n\t\t\"I do.\"\n\t\t*goto tamsin_bit\n\t#\"She's kind.\"\n\t\t*set renee %+10\n\t\t\"Many rectors are known for their people skills,\" says Jeanette.\n\n\t\t\"Are you implying something?\"\n\n\t\t\"Not at all. Are you?\"\n\n\t\t\"Yes.\" You gather your wits with an effort. \"I don't think Renee killed Aurelia. I don't think she's capable of violence.\"\n*label tamsin_bit\n\n\"What about Tamsin Violi?\" Jeanette asks.\n*choice\n\t#\"She's enjoying this.\"\n\t\t*set tamsin %-10\n\t\t\"That's an interesting claim,\" she says.\n\n\t\t\"I saw her writing things in her notebook, very quickly,\" you say. \"That's what writers do when they're happy.\"\n\n\t\t\"Is that so?\" says Jeanette. \n\n\t\tIt's impossible to tell if she already saw Tamsin's notebook or if she thinks you're frantically trying to cast blame elsewhere.\n\n\t\t\"I… yes?\" you say.\n\t\t*goto lala_bit\n\t#\"I don't think she's the killer.\"\n\t\t*set tamsin %+10\n\t\t\"Why do you say that?\" asks Jeanette.\n\n\t\t\"Because she's… Tamsin. She just doesn't seem like a killer.\"\n\n\t\t\"Is that so?\" says Jeanette.\n\n\t\t\"I… yes?\" you say.\n\t\t*goto lala_bit\n\t#\"She's too empathetic to hurt anyone.\"\n\t\t*set tamsin %+10\n\t\t\"Do you know Tamsin well?\" Jeanette asks.\n\n\t\t\"Not at all. But I know she cares about history—not the dates and fashions and so on, but the people. Heroes and villains and everything in between.\"\n\n\t\t\"Did Jeanette see Aurelia as a villain?\"\n\n\t\t\"That's not what I'm saying at all!\"\n\n\t\tKeichi nods thoughtfully, as if you've confirmed something he already knew.\n*label lala_bit\n\n\"What about Lala Naklon?\" Jeanette asks.\n*choice\n\t#\"It might be her.\"\n\t\t*set lala %-10\n\t\t\"On what basis?\" asks Jeanette.\n\n\t\t\"I know she was awake very early this morning. Is that when the murder happened?\"\n\n\t\t\"How do you know she was awake?\"\n\n\t\t\"The light was on in her room.\"\n\n\t\t\"I see,\" says Jeanette.\n\t\t*goto max_bit\n\t#\"I don't think she's the killer.\"\n\t\t*set lala %+10\n\t\t\"Why not?\" Jeanette asks.\n\n\t\t\"I just don't. She's so exhuberant and friendly it just doesn't seem like her.\"\n\n\t\t\"Do murderers need to wear black hats and size 12 shoes?\" Jeanette asks.\n\n\t\t\"Okay, I don't know her all that well. But you asked me what I think.\"\n\n\t\t\"Yes,\" says Jeanette.\n\t\t*goto max_bit\n\t#\"She's super friendly.\"\n\t\t*set lala %+10\n\t\t\"Why do you mention that?\" asks Jeanette.\n\n\t\t\"Because… she doesn't seem like a killer.\"\n\n\t\t\"So Aurelia would have trusted her.\"\n\n\t\t\"Yes, but that's not what I'm saying at all.\"\n\n\t\t\"And yet, the information could be useful. Thank you,\" says Jeanette.\n\t\t*goto max_bit\n\t*if lala_love = 1 \n\t\t#\"We're sort of dating. Maybe.\"\n\t\t\t*set lala %+10\n\t\t\t\"Go on,\" says Jeanette.\n\n\t\t\t\"Lala and I… \" You can feel your face heating up, as if you've been hauled before the school principal after being caught smoking behind the gym. \"We like each other. Romantically. That's all. I thought you'd want to know.\"\n\n\t\t\t\"Had you initiated a relationship before this writing event?\"\n\n\t\t\t\"We only met in the car,\" you say. \"On the way here. Yesterday.\"\n\n\t\t\t\"I see,\" says Jeanette. \n*label max_bit\n\n\"What about Max Black?\" Keichi asks.\n*choice\n\t#\"He's arrogant enough to kill.\"\n\t\t*set max %-10\n\t\t\"That's quite a claim,\" says Jeanette.\n\n\t\t\"He's a major flirt, a gym junkie, and he studies psychology.\"\n\n\t\t\"None of those make him a murderer,\" Jeanette points out.\n\n\t\t\"But if you're a murderer, those skills would help you.\"\n\n\t\t\"Indeed,\" she says.\n\t\t*goto post_questions\n\t#\"I don't think he's the killer.\"\n\t\t*set max %+10\n\t\t\"Is that so?\" says Jeanette. \"What brought you to this no doubt well-thought-out conclusion?\"\n\n\t\t\"He's… fun,\" you say, wincing at how lame it sounds out loud. \"He just doesn't seem like a killer.\"\n\n\t\t\"Uh-huh,\" she says.\n\t\t*goto post_questions\n\t#\"He's fun.\"\n\t\t*set max %+10\n\t\tYou wince at how lame your argument sounds when you say it out loud. \"He just doesn't seem like a killer.\"\n\n\t\t\"I see,\" says Jeanette.\n\t\t*goto post_questions\n\t*if (max_love = 1) #We are dating. Maybe.\"\n\t\t*set max %+10\n\t\tJeanette raises her eyebrows. \"When did this happen?\"\n\n\t\t\"Er… in the last day or so.\"\n\n\t\t\"When did you meet?\" she asks.\n\n\t\t\"Yesterday,\" you say, feeling your face heat up in embarrassment. \"I gave him a lift here—along with Lala and Aurelia.\"\n\n\t\t\"I see,\" she says.\n\n*label post_questions\n\nKeichi finishes typing notes into his device and slaps the lid shut with a bang.\n\n\"Thank you,\" he says. \"You've been very helpful.\"\n\n\"I have?\" you say, trying desperately to remember every word and nuance you might have emitted during the interrogation. \"Isn't there anyone else?\" you ask. \"Don't you have other suspects?\"\n\n\"Not at this time,\" says Jeanette, \"but we have everything we need.\"\n\n\"Feel free to join your… friends,\" says Keichi, leaving your door open. \"For obvious reasons, none of you are permitted to leave Gundagai at this time. \n*if temp = 1\n\tWhy did you call an ambulance first, rather than the police? Is it because you wanted to cloud the remaining evidence? \n\t*goto choi\n*if temp = 2\n\tWhy did you run away from the crime scene? Is it because you regretted killing Aurelia? \n\t*goto choi\n*else\n*label choi\nDo you have anything else to say, given that you are now a murder suspect?\"\n*choice\n\t#\"Your interrogation technique is impressive, but it's unlikely that I top your list.\"\n\t\t*if knowledge > 30\n\t\t\tKeichi flashes you a smile before quickly smoothing out his face once more. You're right! They already have someone else in mind. But who?\n\t\t\t*goto hih\n\t\t*else\n\t\t\tJeanette gives you a long, cold stare, and your confidence runs away like dirty water down a drain.\n\t\t\t*goto hih\n\t#\"I didn't kill her!\"\n\t\t*if honest > 50\n\t\t\tKeichi's face softens for just an instant before he regains control. He believes you!\n\t\t\t*goto hih\n\t\t*else\n\t\t\t*set police_rapport 0\n\t\t\t\"We took the time to peruse your social media,\" Keichi says quietly. \"We're well aware of your penchant for self-serving falsehoods.\"\n\n\t\t\tYour insides turn to water. How could your white lies have led you to this?\n\t\t\t*goto hih\n\t#\"I understand your suspicions, and I trust you'll find the real killer.\"\n\t\t*if (mental_health > 30) and ((flaw = 1) or (flaw = 3))\n\t\t\tJeanette raises an eyebrow. It's the closest thing to a smile she's ever likely to give you, and under the circumstances you know that you are safe from anything worse than sarcasm—at least, from the police.\n\t\t\t*goto hih\n\t\t*else\n\t\t\tYou hear your voice trembling with an oncoming panic attack, and tears spring to your eyes as Keichi suppresses an eye roll.\n*label hih\n\nA couple of the others are attempting to eat their cold dinner in the rear balcony. Somehow, it's dark now. You didn't notice the sun setting.\n*choice\n\t#\"Where's Aurelia?\"\n\t\t*set knowledge %+10\n\t\t\"She's gone,\" says Keichi, as if you're a small child.\n\n\t\t\"I mean, her body,\" you say. \"Is she—is it—still there?\"\n\n\t\t\"Of course not,\" says Jeanette. \"It's been taken to the hospital for an autopsy.\"\n\t\t*goto late\n\t#Eat.\n\t\t*set mental_health %+10\n\t\tYou take a bowl of sludgy food and microwave it back to a semblance of warmth. \n\n\t\tIt's good; insultingly so. Aurelia would have enjoyed it. The lamb is so tender it falls apart when you touch it with the fork.\n\n\t\tYou finish the bowl and go back for another, suddenly famished.\n\t\t*goto late\n\t#Rest.\n\t\t*set mental_health %+10\n\t\tYou change your clothes slowly, finding it incredibly difficult to remember how to dress and undress, and how to brush your teeth.\n\n\t\tAt last you've done everything. Another hour has passed. You lie on your bed, trying not to listen to the utter silence of Aurelia's room.\n\n\t\tSlowly your thoughts grow calmer.\n\t\t*goto late\n\t*if (max_love = 1) or (max_love = 5)\n\t\t#Go to Max.\n\t\t\tMax is still in his room, sitting on the bed and staring at his hands. The door is open, but he doesn't seem to hear you knocking.\n\n\t\t\t\"Max?\" you say, but your voice is hoarse. You clear your throat. \"Max?\"\n\n\t\t\tHe looks up, rubbing his eyes. \"Oh. Hey cutie.\"\n\t\t\t*choice\n\t\t\t\t#\"Don't you dare. This flirtation is over. A woman just died!\"\n\t\t\t\t\t*set max_love 12\n\t\t\t\t\t\"Does that mean we can't have fun ever again?\" he says, and you almost waver for a moment.\n\t\t\t\t\t*label woman\n\t\t\t\t\t\"We're both suspects. Don't you get it?\"\n\n\t\t\t\t\tHe shakes his head. \"No. I don't get it. Why ruin something good when none of this is our fault?\"\n\n\t\t\t\t\t\"Are you so sure I'm innocent?\"\n\n\t\t\t\t\t\"Completely.\"\n\t\t\t\t\t*if (lie_detector = 1) and (killer = 2)\n\t\t\t\t\t\tHis eyes flash briefly golden.\n\n\t\t\t\t\t\t\"Liar,\" you say, and walk away.\n\t\t\t\t\t\t*goto late\n\t\t\t\t\t*else\n\t\t\t\t\t*goto late\n\t\t\t\t#\"Hey handsome.\"\n\t\t\t\t\t*set max %+10\n\t\t\t\t\t*label other_woman\n\t\t\t\t\t*set max_love 1\n\t\t\t\t\tHis shoulders sag in relief. \"Are you all right?\"\n\n\t\t\t\t\t\"No. You?\"\n\n\t\t\t\t\t\"Well… no. But it could be worse.\" He winces suddenly, and you know he's thinking of Aurelia.\n\n\t\t\t\t\tYou sit on the bed beside him, and lean on him. He winds his arm around you as if to protect you from all the evil in the world—or perhaps to keep you close, so he doesn't feel so afraid.\n\t\t\t\t\t*goto late\n\t\t\t\t#\"I… are we still a thing?\"\n\t\t\t\t\t*set max %+10\n\t\t\t\t\t\"Yes,\" he says. \"Aren't we?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Yes. We are.\"\n\n\t\t\t\t\t\t\t*goto other_woman\n\t\t\t\t\t\t#\"No, Max,\" you say.\n\t\t\t\t\t\t\t*goto woman\n\t*if (lala_love = 1) or (lala_love = 5)\n\t\t#Go to Lala.\n\t\t\tLala's room is empty. The door stands open. Her bags are still there, so presumably she's around somewhere.\n\n\t\t\tYou walk out the front door—the ambulance is long gone now, although the police cruiser is still parked on the gravel drive beside the rose bushes, bringing the modern world painfully into relief. \n\n\t\t\t\"Hey there,\" says Lala. \n\n\t\t\tShe's sitting in an armchair, staring out at the black shadow of the hill.\n\t\t\t*choice\n\t\t\t\t#\"Hello, beautiful.\"\n\t\t\t\t\t*label aw\n\t\t\t\t\tShe turns to you and smiles, even though there are tears on her cheeks. \"Really? We're still together?\"\n\n\t\t\t\t\t\"Yes… I mean, is that all right?\" you ask, suddenly realising she may well believe you killed Aurelia.\n\n\t\t\t\t\t\"Yes! I just… you trust me? Even though I'm a Muslim?\"\n\n\t\t\t\t\t\"Oh, Lala,\" you say, remembering a thousand Muslim villains from books and TV shows and the nightly news. \"I do trust you.\"\n\n\t\t\t\t\tYou reach down to wipe the tears from her cheeks, and she catches your hand and kisses your palm so lightly you hardly feel the touch of her lips.\n\t\t\t\t\t*goto late\n\t\
