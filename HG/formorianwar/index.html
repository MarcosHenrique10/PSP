<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formorian War — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "formorianwar", "title": "Formorian War", "scenes": {"chapter_five": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Come back in a few minutes to play the next part of [i]Formorian War[/i]!\n\n    Or, you can buy the game now to skip the wait.\n\n    *purchase_discount adfree 2022-06-23 $4.99 $2.99 purchased\n    *delay_break 1200\n\n*label purchased\nWinter begins and snow starts to fall but what falls from the sky isn't regular snow, instead of white like it normally is, it's black\nYou first notice it has you wake up and are instantly concerned as anyone would be.\n\nA servant knocks, you answer the door and he tells you the council requests your presence, he also tells you that Morganna and Dagonet are also present.\n\nYou enter the throne room and join the council who appear on the verge of panic.\n\n${name}: Is this about the black snow?\n\nBefore any members answer Morganna chimes in and answers for them.\n\nMorganna: Yes, it's like nothing we have ever seen, reports started flying in saying that some animals of gotten sick and people have been dying.\n\n${name}: All because of snow? is it poisonous?\n\nDagonet: I think we should investigate that possibility, in fact the royal physician has asked me to collect a sample of the water so it can be studied.\n\nMorganna: Good I'll come with.\n\nDagonet nods and asks you if you're in.\n\nThis black snow is not natural and waiting for it to end is risky because you are not sure if it will ever end.\n\nYou don't know if it affects humans if the snow lands on you and if so then what will it do?\n\n${name}: But why the water?\n\nA council member finally speaks.\n\nCouncilman: Because the deaths have all been the result of drinking the water, autopsy confirms this every time plus I witnessed it first hand.\n\n${name}: That's awful\n\nSo with your mission in mind, the three of you set out to the nearest lake or river, Lancaster and other cities do have wells but you conclude it would be better to get the water from source.\nYou remember the stream with the fairies you met and lead Dagonet and Morganna to it but you were not prepared for what you saw.\n\nThe stream is bone dry along with a few bodies of the fairies.\n\nTears begin to flow down your face while Dagonet lowers his head in grief and respect, Morganna cups her hands over her face in shock.\n\nMorganna: Those poor little creatures, we need to stop this.\n\nDagonet rushes to the dry steam and he notices a single drop of water with a small black dot in the centre.\n\nMorganna: Dagonet there is nothing there, please lets just go.\n\nDagonet: No wait.\n\nHe carefully places the drop into a vial and closes it.\n\nDagonet: Okay now we can go, at least we know the snow can't hurt you from the outside.\n\nAs you are all walking back to your horses, your arm begins to itch, lifting your sleeve shocks you.\n\nA black cracked rash has appeared and this worries you but you keep it a secret for now.\n\nMorganna begins to cough blood and she is rushed to the physician, he examines her and explains its most likely due to the black snow, you show the rash and after a few tests he comes to the conclusion\nthat the snow effects humans and elves differently, just then Dagonet gets a rash and starts to cough, he then asks his assistant to care for them.\n\nAfter a day or two, Morganna has stopped coughing blood but she is too weak to walk, Dagonet is also too weak to walk and the colour drains from his face.\n\nYou are quickly approaching the same state.\n\nPhysician: I'm sorry, I've tried everything I can think of and all results are bad.\n\nYou struggle to talk while coughing violently.\n\n${name}: there must be something we can do.\n\nPhysician: There is one theory I have yet to test, It appears that this snow is of a magical nature so perhaps to combat it we must use magic or perhaps holy items.\n\n${name}: Where can I find those?\n\nPhysician: The Sidhe can help or the chantry head church in dragons peak but I must stress you are in no condition to travel.\n\n${name}: If I don't then we could all die, I can't just stand by and do nothing.\n\nThe physician tries to convince you but it doesn't work so he asks his assistant to fetch the sword, he does and hands it to you.\n\nOnce the sword is in your hands, you instantly feel better, the sword glows gold and surrounds you with its golden aura, the coughing stops and colour returns to your face.\n\nThe physician and the assistant stand in awe and wish you luck.\n\nTaking few supplies and a horse you have a choice to make as to who you will ask for help.\n\n\n*choice\n #Go to the Chantry\n      *set OldFaith - 20\n      *set maker + 20\n      *goto Chantry\n\n #Go to the Sidhe\n      *set maker - 20\n      *set OldFaith + 20\n      *goto Sid\n\n*label Chantry\nYou decided to head to the head church in Dragons Peak, travelling in the black snow is clearly dangerous but you have no choice\n\nSnow continues to fall with no signs of stopping, soon you and your horse are covered after another hour or so of travelling the horse lowers itself forcing you to dismount.\n\nThe horse lies down and soon gets covered head to toe in snow, it's clear and sad that your horse has accepted it's fate.\n\nYou dig out your supplies and wipe the snow off, having the sword seems to protect you from the dark magic of the snow but what's causing it?\n\nWithout a horse it is obviously going to take longer to reach dragons peak but you eventually do.\n\nThe swords power is being drained by the snow to keep you healthy, the swords glow is very dim so time is running out.\n\nWhen you finally reach the head church, you struggle to walk up the stairs, as more snow falls on you the weaker you get.\n\nAs you reach the top, you are covered in snow, pale and your rash is getting worse.\n\nChantry staff and priests gentle walk you into the building, the sword starts to glow brighter as the snow falls off your body and melts when it hits the floor.\n\nOnce you have recovered you ask to see who is in charge, after explaining your mission no one hesitates to take you to them.\n\nYou are taken to the chambers of the archbishop, leader of the chantry.\n\nThe archbishop is a thin old man with a beard that stretch's to his knees.\n\nArchbishop: Ah, how exciting that the future monarch has graced us, how may I be of service?\n\nYou explain your journey, your dying friends and how the snow could be stopped and as the archbishop listens he increasingly becomes more worried and shocked but he agrees to help you.\n\nArchbishop: Please understand young one this is an exceptional circumstance and if it not were for this evil I would of turned you away.\n\n${name}: I understand, thank you so much.\n\nThe archbishop requests you follow him and you do, he leads you down to the ground level to a prayer room with a steel gate at the end of it.\n\nHe takes a key from a string around his neck and unlocks the gate before turning to you.\n\nArchbishop: Within this vault are items and relics of holy power, it is said that the maker himself has blessed them to thwart all evil.\n\nWhether you believe this or not isn't really important, if the archbishop states this then surely there must be some truth to it.\n\nHe takes a torch and lights it, leading you down the dark, damp stairs.\n\nYou reach in the inner chamber and you see a gold cup that is within it's own locked steel cage surrounded by several other items of history.\n\nThe archbishop takes a second, smaller key from around his neck and unlocks the door before once again turning to you.\n\nArchbishop: What am I about to lend you is said to what belonged to the maker, this cup has tremendous power and we still do not know to what extent\nI would advice caution when using it, perhaps use it at the local lake or maybe the sea.\n\n${name}: Thank you, may I ask a question?\n\nArchbishop: You may.\n\n${name}: How can the water become the cause of people dying? any ideas?\n\nThe archbishop strokes his beard and states that maybe its because the snow lands in the water supplies across the land, it melts and contaminates it?\n\n${name}: That makes sense, thank you again.\n\nYou both head back to the entrance to the church but not before the gate is locked once again, you thank everyone and they wish you luck in your quest.\n\nUnfortunately the chantry can't lend you any horses as most have died, so you have no choice but to walk.\n\nAfter what seems like hours you find a lake in-between Camelot and Dragons Peak, collapsing to the ground and gasping for breath you take a moment to rest and collect your thoughts.\n\nOnce you have rested, you collect some of the water from the lake and head back to Lancaster, when you return and hand the vial to the physician you're pale and the rash has grown all across your arm.\n\nDagonet and Morganna seem lifeless apart from a few groans, you start coughing up black mucus possibly from the result of exposure.\nthe water looks crystal clear but luckily the physician is not only gifted in terms of medicine but science too, he views the water through a strange device that looks like a tiny scope, he uses different lenses too and is shocked by what he discovers.\n\nPhysician: ${name} you might want to have a look at this.\n\nYou look through the scope and see tiny black bits floating in the water, you are taken aback by this too but as you continue looking the bits begin to disappear, calling the physician over he examines it.\n\nPhysician: Extraordinary, the maker has surely blessed us.\n\nAfter a few more tests, the tears of the maker are prove that there is a cure and within a few weeks the water is clean once again and the snow stops possibly due to the Sidhe's involvement.\n\nOne more day passes and Dagonet and Morganna are back to normal and thank you for taking the huge risk to save them and the kingdom.\n\n*goto After\n\n*label Sid\nTo the Sidhe it is in benigrade forest, travelling in the black snow is clearly dangerous but you have no choice\n\nSnow continues to fall with no signs of stopping, soon you and your horse are covered after another hour or so of travelling the horse lowers itself forcing you to dismount.\n\nThe horse lies down and soon gets covered head to toe in snow, it's clear and sad that your horse has accepted it's fate.\n\nYou dig out your supplies and wipe the snow off, having the sword seems to protect you from the dark magic of the snow but what's causing it?\n\nWithout a horse it is obviously going to take longer to the forest but you eventually do.\n\nThe swords power is being drained by the snow to keep you healthy, the swords glow is very dim so time is running out as you notice the forest in the distance you also notice that the tree's aren't covered in snow, maybe it's Sidhe magic.\n\nWhen you finally reach the edge of the forest, you struggle to walk up any further, as more snow falls on you the weaker you get.\n\nYou are covered in snow, pale and your rash is getting worse.\n\nSidhe warriors notice you and gentle walk you deeper into the forest, the sword starts to glow brighter as the snow falls off your body and melts when it hits the ground.\n\nOnce you have recovered you ask to see the Queen, after explaining your mission no one hesitates to take you to her.\n\nThe warriors take you to a nearby crystal tower and let you inside, when you meet the Queen she welcomes you warmly.\n\nSidhe Queen: Ah, ${name} tis good to see you again, how may I be of service?\n\nYou explain your journey, your dying friends and how the snow could be stopped and as the Queen listens she shows no emotion but agrees to help you.\n\nSidhe Queen: Please understand young one this is an exceptional circumstance and if it not were for this evil I would not risk using this power.\n\n${name}: I understand, thank you so much.\n\nThe Queen requests you follow her and you do, she leads you down to the ground level to a dark chamber room with a circle full of symbols in the centre. \n\nShe calls to other Sidhe and several appear and gather around the circle\n\nSidhe Queen: What we are about to perform is ancient powerful magic, I need the sword for the centre.\n\nWhether you believe this or not isn't really important, if the Queen states this then surely there must be some truth to it so you willingly hand her the sword.\n\nShe places the sword at the centre of the circle and takes her place on the circles end, the Sidhe begin chanting in a language that you can't understand but you know you don't have to understand it.\nThe chanting seems to be going on for hours, the sword rises and glows so bright you look away to protect your eyes, when it ends the sword is still glowing, the Sidhe Queen hands it back to you.\n\n${name}: it's ice cold, what happened?\n\nSidhe Queen: You would not understand, place the sword within any large body of water and the water will be purified and the snow will stop.\n\n${name}: Thank you but how can the water become the cause of people dying? any ideas?\n\nThe Queen strokes her chin and states that maybe its because the snow lands in the water supplies across the land, it melts and contaminates it?\n\n${name}: That makes sense, thank you again.\n\nYou both head back to the entrance to the tower, you thank everyone and they wish you luck in your quest.\n\nUnfortunately the Sidhe do not have any horses to lend, so you have no choice but to walk.\n\nAfter what seems like hours you find the lake within hours of Lancaster , collapsing to the ground and gasping for breath you take a moment to rest and collect your thoughts.\n\nOnce you have rested, you collect a sample of water for testing then you thrust the sword into the water and it glows gold and then splits into the sky, turning the black snow to gold rain, your rash clears instantly and you return to Lancaster.\n\nDagonet and Morganna seem lifeless apart from a few groans but you are healthy and strong once again and hope they will be too\nthe water looks crystal clear but luckily the physician is not only gifted in terms of medicine but science too, he views the water through a strange device that looks like a tiny scope, he uses different lenses too and is shocked by what he discovers.\n\nPhysician: ${name} you might want to have a look at this.\n\nYou look through the scope and see tiny black bits floating in the water, you are taken aback by this too but as you continue looking the bits begin to disappear, calling the physician over he examines it.\n\nPhysician: Extraordinary, the maker has surely blessed us.\n\nYou explain that the Sidhe helped you and you direct him to the window and he sees the rain, those who were violently ill are healed, the water has been made pure again and all because of magic.\n\nAfter another day Dagonet and Morganna are back to normal and thank you for taking the huge risk to save them and the kingdom.\n*goto After\n\n*label After\n*image Albion.jpg\n\nOne year has passed since the formorians were defeated and much has changed, first of you were crowned ${Royal} due to your bloodline\nSadly you learned that Marcus perished during the battle so Morganna contacted a long distance cousin to return to Albion.\n\nHis was named Scepio and after several talks over dinner he was appointed Seneschal over Camelot since you moved into Lancaster.\n\nYou have settled into your new role well and the people seem happy with your rule, but you still have a few laws to make.\n\nYou remember the incident about the elf and solider.\n\n*choice\n    #Make racial slurs illegal \n        *goto Joy\n        \n        \n    #Do Nothing\n        *goto Damn\n        \n*label Joy\nMany are happy especially the elves, maybe things are changing.\n*goto Degree\n\n*label Damn\nDespite the kingdoms return, that's all that seems to have changed.\n*goto Degree\n\n*label Degree\nTension between those of the old faith and chantry could reach breaking point.\n\n*fake_choice\n    #Protect the old faith\n      *if (maker \u003c= 50)\n       *set maker - 5\n       *goto Faith\n\n      *if (maker > 30)\n       *goto Wrong\n      \n    #Protect the chantry\n     *if (maker >= 60)\n       *set maker + 5\n       *goto Chant\n\n     *if (maker \u003c= 50)\n       *goto Liar\n     \n*label Faith     \nDruids and followers across the country are over the moon while those of the chantry say you're a heretic.\n*goto Pro\n\n*label Wrong\nFollowers of the old ways do not want your false protection because they claim to know who you really worship.\n*goto Pro\n\n*label Chant\nYou're blessed by the maker the chantry says, the druids on the other hand are disappointed.\n*goto Pro \n\n*label Liar\nThose who follower the maker brand you a liar and a pagan.\n*goto Pro\n\n*label Pro\nYour happiness matters to.\n\n*choice\n    *selectable_if (Partner = Par ) #Ask Morganna To Marry You\n        *goto wed\n        \n\n    *selectable_if (Partner = Car ) #Ask Dagonet To Marry You\n        *goto ding\n        \n    \n    #I'm happy ruling alone.\n        *set Partner None\n        *goto Rule\n        \n*label wed\nYou ask Morganna to be your wife and she says yes within seconds.\n\nOn the day of your wedding, its quite a day to remember.\n\nThe main hall of Lancaster is much wider and larger then Camelot so that makes it easier for seating and decorations, all the guests \nare seated both sides in rows of 5 surrounded by those multi-coloured flowers you found in the forest.\n\nAmong the guests are Hera, Sidhe warriors, nobles and even the huntress.\n\nYou stand at the altar dressed in fine silk red clothing with Dagonet as your best man.\n\nMusic plays and Morganna is taken down the Isle by her cousin Scepio, she wears the traditional white dress but with a old faith symbol \nnecklace.\n\nTo avoid further problems, the Sidhe Queen is the marriage officiant.\n\nAfter an exhausting day, neither of you have the energy to consummate the marriage so you fall asleep.\n*goto Wife\n\n*label Wife\nAnd so our story comes to a close.\n\nIn the years that followed ${Royal} ${name} and Queen Morganna became very popular with the people, elves were given more rights and protections\nthen ever before even being allowed to enlist in the royal army.\n\nDagonet returns to Evergreen and is appointed Seneschal.\n\nPeace talks between the two faiths proved to a success and even though there is the occasional report of violence the followers of each\nmostly live in peace.\n\nThe Sidhe retrieve the book and leave to return home to Tir na nog but not before gifting you the sword as a sign of friendship.\n\nThe huntress returns to her swamp and Hera to the mountains with her high dragon.\n\nThe land is healed, the formorians are gone and everything is at peace.\n*goto ending\n\n*label ding\nYou ask Dagonet to be your husband and he says yes within seconds.\n\nOn the day of your wedding, its quite a day to remember.\n\nThe main hall of Lancaster is much wider and larger then Camelot so that makes it easier for seating and decorations, all the guests \nare seated both sides in rows of 5 surrounded by those multi-coloured flowers you found in the forest.\n\nAmong the guests are Hera, Sidhe warriors, nobles and even the huntress.\n\nYou stand at the altar dressed in fine silk red clothing with Dagonet as your best man.\n\nMusic plays and you are taken down the Isle by your guard captain, wearing the traditional white dress.\n\nTo avoid further problems, the Sidhe Queen is the marriage officiant.\n\nAfter an exhausting day, neither of you have the energy to consummate the marriage so you fall asleep.\n*goto Husband\n\n\n*label Husband\nIn the years that followed ${Royal} ${name} and King Dagonet became very popular with the people, elves were given more rights and protections\nthen ever before even being allowed to enlist in the royal army.\n\nMorganna rides away in the night and no one knows where.\n\nPeace talks between the two faiths proved to a success and even though there is the occasional report of violence the followers of each\nmostly live in peace.\n\nThe Sidhe retrieve the book and leave to return home to Tir na nog but not before gifting you the sword as a sign of friendship.\n\nThe huntress returns to her swamp and Hera to the mountains with her high dragon, it is later discovered that Morganna went to live in the\nswamp with the huntress.\n\nThe land is healed, the formorians are gone and everything is at peace.\n*goto ending\n\n*label Rule\nYou decide to rule alone for the future, this makes it harder for you to maintain your relationships.\n\nOne night both Dagonet and Morganna are gone.\n*goto ending2\n\n*label ending2\nAnd so our story comes to a close.\n\nIn the years that followed ${Royal} ${name} became very popular with the people.\n\nDagonet returned to Evergreen and was appointed Seneschal.\n\nPeace talks between the two faiths proved to a success and even though there is the occasional report of violence the followers of each\nmostly live in peace.\n\nThe Sidhe retrieve the book and leave to return home to Tir na nog but not before gifting you the sword as a sign of friendship.\n\nThe huntress returns to her swamp and Hera to the mountains with her high dragon, it is later discovered that Morganna went to live in the\nswamp with the huntress.\n\nThe land is healed, the formorians are gone and everything is at peace.\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Formorian War.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n\n\n\n\n\n\n", "chapter_four": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Come back in a few minutes to play the next part of [i]Formorian War[/i]!\n\n    Or, you can buy the game now to skip the wait.\n\n    *purchase_discount adfree 2022-06-23 $4.99 $2.99 purchased\n    *delay_break 1200\n\n*label purchased\nBut before work can be done, a celebration is in order.\nWord spreads of your victory and the remaining formorian forces start to groan in pain, die and wither to bone.\nWith the gate destroyed so to is the formorians link to your world and thus the nightmare is over but all is not well, the realm is\nin chaos still, people are starving and need to bury loved ones.\nNot to mention the political strife that looms.\n\nYou learn Marcus is missing, hoping he is alive as does Morganna.\n\nAfter a few days of rest a messenger arrives calling you to Lancaster for a Kings council.\n\nA kings council hasn't been summoned for hundreds of years and is only needed when the situation is dire enough.\n\nWithin a week of marching you arrive at the gates of Lancaster, the guards tells you that only you and a few others are allowed within the city,\nyou choose Dagonet and Morganna as they are a Tudor and Saxon respectively plus a few guards.\n\nThe guards at the gate arrange a escort for you and your men and lead you to the castle.\n\nWalking through the corridors and rooms you notice a large full body statue in its now room surrounded by shelves of books,\nYou break away from the group and walk closer towards it and know who it is almost immediately, It's your great great grandfather.\n\nThe statue stands tall at 6ft, wearing full plated armour with the crest of Albion on his chest, the left arm is stretched clutching a sword with a shield at the hip on the right,\nIt is all made of bronze and gold.\n\nYou wonder why the Saxons would have a statue of a ${family} King in their home and that's when Morganna notices you staring at it.\n\nShe walks up to you and explains.\n\nMorganna: Even though he was not one of the many Saxon kings and queens of those days, he was still one of the greatest rulers that Albion has ever had,\nRegardless of family my father thought it appropriate to erect a statue in the mans honour.\n\n${name}: It is quite a grand statue.\n\nDagonet then appears startling you both.\n\nDagonet: Oh there you too are, come on everyone is waiting.\n\nAll three of you walk towards towards the main hall but Dagonet stops both of you and tells you to follow him to the throne room.\n\n${name}: There's a throne room here?\n\nDagonet: Yes of course, this castle was the very heart of the kingdom and the hub of power within it, throughout the years both\nkings and queens of Albion lived here.\n\nMorganna: So what's happening?\n\nDagonet: The nobles who still live are gathering here to discuss, debate and vote on a ruler.\n\n${name}: Ruler? so the kingdom is being reborn?\n\nDagonet: In name at least, the last few decades have been chaos since the kingdoms fall so its best to have a King or Queen once again to maintain order.\n\nMorganna: I suppose that makes sense but who's eligible? \n\nDagonet: I guess we will find out soon enough.\n*goto Council\n\n\n*label Council\nTwo guards stand at attention then open the large wooden doors, you and your companions enter the throne room.\n\nThe scene before you is quite impressive, all the remaining nobles who survived are standing in three rows of five at the opposite ends of the room\nat the end of the room sits two thrones made of gold with blood red cushioning for comfort on top of three step stairs.\n\nOne guard stands at each opposite end of the thrones wearing the crest of Albion.\n\nIn the event of a kings council one noble is chosen by way of vote to be the speaker, the speakers responsibility is to maintain order \nand to enforce the rules, one of these rues is only one may speak at a time.\nIn this case an elderly man was chosen who was alive during the kingdoms final years, he stands in front of the nobles just behind the thrones.\nThe Sidhe Queen stands beside him, although the nobles say nothing they do seem uncomfortable at her presence.\n\nSpeaker: My lords and ladies we stand here to decide the fate of the realm and to determine if the kingdom of Albion should be restored.\nThe most civil way of doing this is by vote and yes the children of the families have a say and vote.\nStep forward Dagonet Tudor, Morganna Saxon and ${name} ${family}.\n\nYou all step forward, the nobles mumble to themselves but the speaker calls for silence.\n\nSpeaker: Where is Marcus.\n\nMorganna looks like she's about to cry when Dagonet replies that he is missing.\n\nSpeaker: How unfortunate, lets pray he still lives.\n\nUpon hearing this one noble speaks.\n\nNoble 1: That means we have a odd number and the votes won't be conclusive if it is evenly split so what happens then?\n\nSpeaker: You were all told the rules, in that circumstance the speaker has the final vote to break the deadlock.\n\nNoble 2: Very well, lets get this over with then.\n\nSpeaker: Over the decades since the kingdom dissolved there has been chaos provided by the families that stand before me however they also banded\ntogether to defeat a great threat to the realm, we have a choice here today and its simple.\nTo restore the kingdom and have order or go back to how things were and have chaos.\n\nNoble 3: Things were fine before the formorians.\n\nNoble 4: You only say that because the Saxons ignored the fact that you have elf slaves.\n\nNoble 3: I do not own slaves.\n\nNoble 4: You treat them like they are.\n\nSpeaker: Enough!!!!\n\nThe room falls silent.\n\nSpeaker: This is not why we are here, the council is in recess for a while so you can all make up your minds.\n\nThe recess lasted from just before till after midday sun, it is then called back into session.\n\nSpeaker: Welcome back, there is no time left we must vote.\n\nEveryone is given a piece of parchment.\n\nHow will you vote.\n\n\n\n*choice\n    #Restore the kingdom\n        *goto Vote\n        \n    #Keep things as they are\n        *goto Keep\n        \n    #Abstain\n         *goto Abstain\n        \n*label Vote\nThe council votes:\n\n20 to restore the kingdom (Including Dagonet and Morganna)\n\n8 to keep things the same \n\n6 to abstain.\n\nSpeaker: That settles the matter on this issue, the kingdom of Albion will be restored, once again may the families step forward.\n\nYou all take your original positions.\n\nCheers are heard across the room until one noblewoman puts her hands up and the speaker acknowledges it.\n\nNoblewoman: That's great and all but we need a king or queen to rule.\n\nSpeaker: The answer is right in front of us.\n\nYou all looked shocked while the nobles either protest or accept what the speaker has said.\n\n${name}: Your serious? one of us?\n\nSpeaker: Indeed I am, each of your families ancestors were king or queen at some time during the kingdom so therefore you all have a claim.\n*goto Royal\n\n*label Keep\nThe council votes:\n\n19 to restore the kingdom (Including Dagonet and Morganna)\n\n9 to keep things the same \n\n6 to abstain.\n\nSpeaker: That settles the matter on this issue, the kingdom of Albion will be restored, once again may the families step forward.\n\nYou all take your original positions.\n\nCheers are heard across the room until one noblewoman puts her hands up and the speaker acknowledges it.\n\nNoblewoman: That's great and all but we need a king or queen to rule.\n\nSpeaker: The answer is right in front of us.\n\nYou all looked shocked while the nobles either protest or accept what the speaker has said.\n\n${name}: Your serious? one of us?\n\nSpeaker: Indeed I am, each of your families ancestors were king or queen at some time during the kingdom so therefore you all have a claim.\n*goto Royal\n\n*label Abstain\nThe council votes:\n\n19 to restore the kingdom (Including Dagonet and Morganna)\n\n8 to keep things the same \n\n7 to abstain.\n\nSpeaker: That settles the matter on this issue, the kingdom of Albion will be restored, once again may the families step forward.\n\nYou all take your original positions.\n\nCheers are heard across the room until one noblewoman puts her hands up and the speaker acknowledges it.\n\nNoblewoman: That's great and all but we need a king or queen to rule.\n\nSpeaker: The answer is right in front of us.\n\nYou all looked shocked while the nobles either protest or accept what the speaker has said.\n\n${name}: Your serious? one of us?\n\nSpeaker: Indeed I am, each of your families ancestors were king or queen at some time during the kingdom so therefore you all have a claim.\n*goto Royal\n\n*label Royal\nSo its become clear that you, Dagonet and Morganna are the candidates for the crown.\n\nNoblewoman: Okay so how should we resolve this?\n\nNoble 2: Trail by combat.\n\nNoble 6: Everyone chooses sides and all out war?\n\nNoble 14: We vote.\n\nSpeaker: Enough, thankfully I had anticipated this and have a solution, we let the people decide.\n\nNoble 25: The people? are you certain, the lower class can be quite indecisive.\n\nA guard rushes in.\n\nNoble 29: How dare you interrupt this council!!!\n\nGuard: I apologize my lord but there's a huge crowd outside.\n\nSpeaker: what?! are you certain?\n\nGuard: Yes sir they keep chanting ${name}\n\n${name}: Me? why?\n\nDagonet: You're were the one to defeat Raygor and close the gate.\n\nMorganna: You're the one who has the sword of the prophecy.\n\nNoble 2: Aren't you the great great relative of a former king?\n\nDagonet: Lets be honest here buddy, you're the only one who has fulfilled even the smallest part of the prophecy plus\nthe closet relative to royalty.\n\nSpeaker: Reviewing the records previously I can confirm this to be true, the last Saxon king was one hundred years ago and the last Tudor was one hundred and fifty.\n\n${name}: Wait does that mean my father and I were supposed to be royalty?\n\nSpeaker: That was quite possible.\n\nNoble 12: That does not mean we just accept ${name} as ${Royal}.\n\nNoble 13: ${name}'s claim is much stronger then Dagonet's or Morganna's\n\nNoble 5: Says who's\n\nNoble 29: Says the official records.\n\nThe shouting gets louder.\n\nSpeaker: Enough!!!\n\nThe room falls silent.\n\nSpeaker: The people want ${name} as their ${Royal}\n*goto How\n\n*label How\nYou all re enter the throne room to a scene of chaos.\n\nAll the nobles appear to have taken sides for who they want to be the ruler of Albion, the Sidhe queen is protecting the speaker case\nanyone gets too close, but at the moment they are just shouting and the speaker has clearly lost control of the situation.\n\n${name}: What in the world is going on here?\n\nNoble 15: We want you as our ${Royal} as do the people but this lot are fools.\n\nNoble 3: we're fools? Hardly.\n\nThe arguing intensifies until swords are drawn.\n\nMorganna: This is ridiculous, the people have chosen ${name} and I support that.\n\nDagonet: As do I, none of us could free the word but ${name} therefore my ${lor} ${name} is the rightful ruler.\n\nThe nobles appear to have listened and some lower their swords however it doesn't seem to be enough, a dagger suddenly flies through the air\nand hits one nobleman in the neck.\n\nNoble 30: That does it.\n\nDagonet: No wait!!!\n\nThe nobles clash and a bloodbath ensues, a few try to kill the speaker but the Sidhe queen deflects and parries every attack on the man's life.\n\n${name}: Guards!!\n\nSeconds later many guards flood the room, unlike the nobles these men are fully armour and trained.\nUsing their shields to create a gap standing back to back, they manage to separate all the remaining nobles.\n\nThankfully not many died in the assault.\n\nSpeaker: Thank you and thank you as well my lady for saving my life.\n\nSidhe Queen: You were the only one who deserved protection.\n\nSpeaker: Guards please escort these nobles to the dungeons while this mess gets cleaned up.\n\nNoble 4: You can't do that.\n\nNoble 16: I refuse to be placed in a filthy dungeon.\n\nSpeaker: I don't care and yes I can.\n\nReinforcement for the guards arrive with the guard captain and they escort the nobles to the dungeons while the guard captain\nfetches servants to clean the blood and take the bodies away.\n\nDagonet: Guard captain how are things in the city?\n\nGuard Captain: Because of this foolishness I've had to reassign men from the streets to this council.\n\nMorganna: But how did you know?\n\nGuard Captain: There are guards within this castle who keep me informed as well as many of the servants.\n\n${name}: Fair enough, but what do we do about this?\n\nSpeaker: We go by what the people have decided as the nobles clearly are too divided to make a sensible and informed decision, they are clearly only\ninterested in advancing themselves and their own influence.\n\nGuard Captain: Indeed\n\nYou and your companions help the servants put the bodies in the infirmary and clean the blood, once that is done the news is spread across the realm.\n\nThe people are pleased that you will be the new ${Royal} of the newly born kingdom of Albion but you question whether you are ready\nfor such a huge responsibility, perhaps but perhaps not.\n*goto Doubts  \n\n\n*label Doubts\nYou are relaxing in your room when you hear a knock at the door, you answer it and Dagonet and Morganna are there.\n\nMorganna: May we come in?\n\n${name}: Of course.\n\nMorganna and Dagonet enter your room, Morganna sits at the edge of your bed while Dagonet leans against the wooden pillar that helps hold it up.\n\nDagonet: How are you feeling buddy?\n\n${name}: Honestly a little overwhelmed, this is all a lot to take on.\n\nMorganna: That's why we're here please share your thoughts and troubles, you've done the same for us now it's our turn.\n\n${name}: I just don't know if I am ready for this.\n\nDagonet: That's understandable but who is really ready for anything?\n\nMorganna: Do not worry ${name} I am sure the celebration tonight will lift your spirits.\n\n${name}: Perhaps it will, I think I will take a ride through the countryside before hand to clear my mind.\n\nDagonet: Good idea, we will help preparations.\n\nMorganna and Dagonet leave you to your thoughts but you soon make your way to the stables, borrow a horse and out of Lancaster.\n\nAs you ride through the countryside admiring the scenery, your horse stops appearing a bit spooked, you dismount to find the dead body\nof a formorian, it's wing is twisted and broken.\n\n${name}: At least it's not Marcus.\n\nYou move the body out of the way and continue the ride.\n\na few hours pass and you stop to let your horse rest and feed on the grass, you notice a small stream flowing through the woodland and you approach it to have a drink.\nYou cup your hands and drink the water it is fresh and is the best tasting water you have ever had.\n\nYou try and take another mouthful when the horse neighs in fright, you drop the water and notice that several tiny fairies have appeared around the stream.\n\nFairy: Enjoying the water?\n\n${name}: Oh my I am so sorry, I didn't know it's just that it tastes so good.\n\nFairy 2: As it should, this stream flows all the way from benigrade forest, it has magical properties.\n\n${name}: That's amazing, do you mind if I ask what kind?\n\nFairy 3: Not at all, healing mostly which is why we are hear to inform those who stumble upon it.\n\nFairy 1: Our presence is normally enough to scare people away but considering who you are we are not surprised.\n\n${name}: What do you mean? you know who I am?\n\nFairy 4: Of course we do, you are the future ${Royal} of Albion, the one who will restore the kingdom to former glory.\n\nYou shake your head in disagreement.\n\n${name}: Yes I was chosen to be the next ruler but I am not going to restore anything, I barely ruled my own territory so I can't possibly rule an entire kingdom.\n\nFairy 1: You must have faith in yourself young one, you are the one of the prophecy and as such you were born for this.\n\n${name}: I don't know, I was confident when facing the formorians but now I feel lost.\n\nFairy 2: Return to Lancaster and see how much the people are honoured to have you as their next ${Royal}\n\nYou nod and return to your horse, you ride towards Lancaster, the fairies smile before disappearing \n*goto Chase\n\n*label Chase\nReturning the horse to the stables, you make your way to the castle, only to be pickpocketed by a young boy but before you can react you are knocked down by several guards chasing him.\n\nYou rise to your feet and follow the men and the boy, the chase leads you to the marketplace where you see the boy knock over a few barrels in an attempt to slow the guards down and it seems to work as a few stumble to the ground.\n\nGuard: Stop you little brat.\n\nThief: Fat chance old man.\n\nThe child continues to run into the lower town and goes done an alleyway, the guards follow and you do the same soon after.\n\nIt appears this whole time the guards have not noticed you following them nor do they realise that the boy stole from you.\n\nAt least the guard corner the child in the alleyway that turned out to be a dead end.\n\nOne guard steps forward catching his breath before speaking.\n\nGuard: Finally we have you, there's no where to run now you little thief.\n\n${name}: So this isn't the first time then?\n\nThe guards turn around, the captain informs you that no it is not he has stolen from multiple people.\n\nThe boy pleads for mercy stating that he only steals to survive as his parents were killed during the war however the guards are quick to call him a liar.\n\nGuard Captain: I'll leave the decision up to you my ${Royal}, the law is clear however your word we shall obey.\n\nHe's right the law is clear on stealing, it's punishable by having a finger chopped off, however if repeated offences are committed then its a hand but he's just a boy, a child.\n\n*choice\n\n #Pardon the boy.\n        *goto Pardon\n        \n\n #The law is clear on stealing.\n        *goto Punish\n        \n*label Pardon\nYou know the law but you also have mercy, you can't bring yourself to punish a child.\n\n${name}: He's officially pardoned, let him go.\n\nThe guards can't believe their ears and some argue but the captain tells them to do as they are told so they release the boy.\nThe boy walks up to you, thanks you and promises to never steal again but before he leaves you stop him.\n\n${name}: Do you really have no one else to look after you?\n\nBoy: An uncle who lives in Evergreen but he might be dead.\n\nThe boy gives you a description and name, the guards and instructed to look into it.\n\n*goto Party\n\n*label Punish\nEven though he is a child, he has still broken the law and therefore must be punished but because you have mercy and can't bring yourself to harm him you think of something else.\n\n${name}: The law is clear but he's only a child and what if he says about his parents is true?\n\nCaptain: That is a possibility.\n\n${name}: Young man, do you have any other family?\n\nThe boy tells you he may have an uncle in Evergreen but he does not know if he is alive or dead, you instruct the guards to look into it.\n\nCaptain: What of his punishment?\n\n${name}: It would not be fair to punish him to the full extent so put him in the dungeons for a week.\n\nSome guards protest but the captain tells them to do as they are told.\n\n*goto Party\n\n*label Party\nYour money is returned to you and the issue is now resolved, you walk up the stone stairs to the castle and are greeted by the guards.\nThey place their free arm across their chests as a sign of respect and loyalty.\n\nUnsure of how to respond you thank them and go past them.\n\nYou walk into a scene of chaos, servants carrying table cloths, flowers, silverware and more.\n\nYou desperately try to get past while at the same time trying to be careful not to knock anyone over, thankfully you make it upstairs to your chambers.\n\nLooking out your window you several guests of noble birth arriving furthering your confusion but then it hits you.\n\nThe celebration of your victory is tonight.\n\nLater that night you enter the main hall and see it transformed into a a hall filled with council members and guards to a splendid party with many guests, wine, food, music and dancers.\n\nYou smile at the scene before you and greet many of the nobility that survived the war.\n\nDagonet spots you across the halls, greets you and walks you over the new nobleman of Dragons peak.\n\nNoble: Ah, you must be ${name} I assure you that unlike the last one I am loyal to you and the kingdom.\n\nHe bows, you tell him you appreciate it very much and with that he rises and wish's you well before he walks of to mingle.\n\n${name}: Where's Morganna?\n\nDagonet: Not entirely sure, she said she would be busy helping some dancers.\n\n${name}: Hm that is curious.\n\nDagonet: Indeed it is.\n\nA few hours pass and people are getting more drunk but with the guard presence things remain civil with the few exceptions of a drunk being thrown out.\n\nThe sun is starting to set and you start to worry but then the doors open and several dancers come out dressed in fine red silk dresses with split thighs.\nMorganna leads them in dance and the guest cheer and whistle, a few dancers tease the nobility by approaching them and stroking their faces then moving on.\n\nYour mouth is wide open in shock and only closes when Dagonet closes it for you.\n\nThe dance ends and everyone claps and cheers, Morganna sees you and Dagonet then walks over.\n\nMorganna: What did you think?\n\nDagonet: Honestly? that was superb.\n\nMorganna: Aww thank you, we all worked really hard to make it a success.\n\n${name}: It certainly showed tonight, well done.\n\nMorganna smiles at you.\n\nThe night gets late and there is time for one more dance, the last dance is a ballroom dance.\n\nSo who will you dance with?\n*choice\n    *selectable_if (Partner = Par ) #Dance With Morganna\n        *goto Dance\n       \n\n    *selectable_if (Partner = Car ) #Dance With Dagonet      \n        *goto Dan\n    #I'll call it a night\n        *goto Nope\n\n*label Dance\nYou ask Morganna if she would like to dance, she smiles and says yes.\n\nTaking her hand you lead Morganna to the dance floor, you match Morganna's pace and you compliment each other with your dancing.\n\nAt the end of the dance, you hold each other close and kiss one another.\n\nYou both look around for Dagonet only to see him leave with another woman, he sees you both and winks, you both laugh.\n*goto Revolt\n\n*label Dan\nYou ask Dagonet if he would like to dance, he smiles and says yes.\n\nTaking his hand you lead Dagonet to the dance floor, you match his pace and you compliment each other with your dancing.\n\nAt the end of the dance, you hold each other close and kiss one another.\n\nYou both look around for Morganna only to see her leave with another man, she sees you both and winks, you both laugh.\n*goto Revolt\n\n*label Nope\nAs the last dance gets underway, you tell Dagonet and Morganna that you're going to call it a night.\nThey understand and wish you a good night and you wish the same.\n*goto Revolt\n\n*label Revolt\nUnfortunately the morning is less fun and thrilling as last night, you are called to a council meeting which brings you grave news.\n\n${name}: What do you mean Evergreen has been taken? by who?\n\nDagonet: A lesser nobleman rallied the people along with his small force and took the city through peaceful means.\n\nCouncilman: Peaceful or violent, he has committed treason and must pay with his life.\n\nOther councilmen seem to agree but you notice Dagonet is getting increasingly angry.\n\nDagonet: ENOUGH!!!\n\nHis shouting echoes throughout the hall and everyone is shocked at his outburst, Morganna rushes in with a few female servants.\n\nMorganna: Dagonet are you alright? what caused you to shout so loudly?\n\nDagonet and yourself explain what has happened, Morganna asks the servants to leave and they do.\n\nMorganna: So what do you intend to do?\n\nCouncilman: Excuse me but women are forbidden from the council so your question is an insult.\n\nYou are shocked at such words, turning to the honourable member you state that Morganna is a friend and that she is still a Saxon therefore her word is just as valid.\n\nCouncilman: Yes of course\n\nHe hangs his head in shame and Dagonet turns to face Morganna.\n\nDagonet: Despite the revolt I will try diplomacy, they are still my people and may see reason.\n\n${name}: That sounds reasonable, I shall accompany you.\n\nDagonet turns to you and thanks you.\n\nA day pass before you and Dagonet receive a message from Danna saying she has placed the city under siege, you both grab your horses and ride to Evergreen.\n\nWhen you arrive, you're greeted by two guards who escort you to Danna's tent, she dismisses her war council.\n\nDanna: It is good to see you brother, as you may have been informed things are not good.\n\nDagonet: I heard.\n\n${name}: I know this is a separate issue but since you have been leading the Tudor forces since the war, you might as well be supreme commander.\n\nDanna chuckles.\n\nDanna: Basically I am in all but title.\n\nYou are told that the city has been under siege for a few days in an attempt to starve them into a surrender but it could take a few more as no one is sure how much food the rebels have.\n\nDagonet: The men's morale lowers by the day and our supplies too.\n\nDanna: I sent word to Lancaster but it could take a while, time we do not have.\n\n${name}: Then perhaps we should launch an assault on the city.\n\nDagonet: Maybe we should try a more diplomatic solution.\n\nA spy enters the tent and informs you all that the rebels are able to import food from the port.\n\nDanna: Drat that makes sense since we're near the coast.\n\n${name}: At least we have options now.\n\nDanna and Dagonet get into an argument on how to proceed, Dagonet wants diplomacy while Danna wants to blockade the ports eventually they stop and ask your opinion.\n\n*choice\n    #Assult the city\n        *goto Siege\n\n    #Blockade the port\n        *goto Port\n\n    #Try diplomacy \n        *goto Diplomacy\n\n*label Siege\n${name}: I say we attack the city, we don't have the resources or time for an extended siege.\n\nDagonet is shocked and is visibly angry.\n\nDagonet: You would risk the lives of my people in such an assault?\n\nDanna: Brother I understand your concern but people will die whatever the case.\n\nDagonet then realises his foolish statement and agrees to your plan.\n\nDanna prepares her generals and the army is also preparing to attack.\n\nMarching towards the gate with a battering ram while other soldiers move towards the walls in-between with towers, you also notice several trebuchet's.\n\nArrows start flying on the men who have the weapons but they still reach their targets respectively and despite the archers best efforts both the gate and the walls are breached.\nSoldiers pour into the city and civilians panic and flee.\n\nSwords and shields clash, the sounds of moans and screams of pain along with that of people running for their lives is almost deafening.\n\nA few hours pass and the army, yourself and your companions reach the castle, you kill the guards and men pour into the castle to clear it.\n\nYou, Dagonet and Danna take a handle of men and clear the upper floor then reach the floor with the bedrooms and begin clearing those too.\n\nYou enter one of the guest bedrooms and find the nobleman with a knight, your men charge at the knight but they underestimate his skill and his cuts them all down.\n\nThe nobleman steps forward beside the knight.\n\nNobleman: Join me.\n\n${name}: What?\n\nNobleman: You heard me.\n\n${name}: You must be mad, the city is taken and the castle is being secured.\n\nNobleman: You do not speak the truth.\n\nThe noble is clearly insane as he doesn't seem aware of the current situation.\n\nThe knight attempts to cleave your head in but you manage to block his sword, your mid section is exposed and the knight punches you hard causing your knees to buckle and drop to the floor.\nThe nobleman laughs and orders your death but the door slams open and soldiers surround everyone.\n\nBoth the knight and nobleman are arrested and executed a few days later for treason, Danna remains behind to restore order while you and Dagonet return to Lancaster.\n*goto Return\n\n*label Port\n${name}: I say we block the port, we don't have the resources or time for an extended siege and cutting off their supplies might speed things up\n\nDagonet: It might, it might not but it's worth a try.\n\nDanna: Agreed, I will send word to our admirals.\n\nHours pass, the sun is now starting to set, Danna receives a letter saying the blockade was a success and is either destroying or redirecting the supply ships.\n\nThe blockade remains in effect for a few weeks and during this time desperate scrimmage of civilians try in vein to steal supplies.\n\nOne more week pass with the cities officially surrenders and the nobleman and a knight who appears to be his second are arrested and executed for treason.\n\nDanna stays behind to restore order while you and Dagonet return to Lancaster.\n*goto Return\n\n*label Diplomacy \n${name}: Perhaps a diplomatic approach is best.\n\nDagonet: I agree, maybe we can come to a peaceful solution and avoid needless slaughter.\n\nDanna is in disbelief.\n\nDanna: You don't cuddle a revolt, you put it down and we should strike now via port or a battle to put an end to it.\n\n${name}: Many of those within the city are no doubt innocent people and this solution will avoid bloodshed.\n\nDanna: I disagree but I won't stand in your way Dagonet, if it works then great but if not then we attack.\n\nDagonet: Thank you for giving diplomacy a chance.\n\nYou volunteer to be the representative and they both agree, you receive an escort and tell the guards at the gate of your intent,\nOne guard lead you to the castle while the other informs the nobleman.\n\nYou are given permission to enter the castle and his room on the condition that you enter unarmed, you argue against this but its not negotiable.\n\nEntering the room fills you with deep fear as you could be ambushed at any moment, you notice that there is a desk by the windows with blank papers and the seal of the Tudors.\n\nThe Nobleman steps forward and greet you warmly and you do the same.\n\nNobleman: Now let us discuss the terms of your surrender.\n\nYou appear confused, you have come to negotiate not to surrender.\n\n${name}: That's not what I am here for, lets talk and see if we can find a peaceful solution to avoid blood being spilled.\n\nThe nobleman agrees and you both sit at Dagonet's old desk where he used to write up laws for the land.\n\nYou argue and talk terms for what seems like hours but eventually the nobleman writes up a treaty and hands it to you to read, he tells you this is his final offer.\n\nThe terms read as follows:\n\nEvergreen will be returned to the Tudors but I will be acquitted of all crimes and allowed to leave the city with half the army.\nAnd I demand all but Evergreen to rule over as I see fit.\n\nHe was even kind enough to draw you a map.\n\n*image BlueMap.png\n*goto Siege\n\n*label Return\nYou and Dagonet return to absolute chaos, a large crowd lets you both pass but this only makes things worse.\n\nRefugee 1: Why let them through?\n\nRefugee 2: It's because their rich and powerful isn't it.\n\nRefugee 3: How dare you ignore us like we are nothing!!!\n\nThe crowd grows increasingly more angry and starts picking up stones and sticks then starts throwing them at the guards, the men use their shields to deflect whatever the crowd threw at them\nand more guards arrived along with the guard captain to help calm things down but this only makes things worse, the refugees appear armed with knifes and farming equipment.\n\nBack in the main hall things are not much better, the council are arguing about whether to take in these refugees from the surrounding villages and that's when they notice you.\n\nCouncilman 1: Oh thank the maker ${name} what do you think we should do with these people?\n\nCouncilman 2: I'll tell you what we should do, we should send them on there way.\n\nCouncilman 3: You heartless monster, they're scared and need our help and that's what we should do.\n\nThe council continue to way in their views and thoughts about what should be done, you calm everyone down then ask Dagonet's opinion.\n\nDagonet: We need to think about this very carefully, on the one hand we can secure their safety and that they are housed and fed however this will deplete our food stores a lot faster and we may not survive the winter.\n\nIt makes sense you think to yourself but its clear that everyone wants you to make the final decision about the refugees.\n\n*choice\n    #Send them on their way\n        *goto Riot\n\n    #Allow them in the city\n        *goto Allow\n\n*label Riot\n${name}: We don't have the resources to last long term, they must be turned away.\n\nDagonet places his hand on your shoulder, he nods and sees to the order.\n\nYou walk to your room to relax and to think about recent events and decisions you have had to make, only to look out the window to see the crowd overwhelm the guards and enter the city\nwielding knifes and hoes.\n\n${name}: Oh no.\n\nYou race down the hall and stairs, narrowly avoiding servants and soldiers as you ask for a sword, which you're given without question and rush out to aid your men.\n\nSome of your men see you and warn you of the danger but you don't listen and enter the fray.\n\nThe soldiers struggle to hold back the angry mob and a farmer strikes a guard in the solider with a sickle, slicing his shoulder.\nThe mob gets increasingly more violent and the soldiers respond in kind, one farmer manages to cut your leg.\n\nHours pass, the riot has been quelled, bodies of both refugee and solider lay on the ground, the people of the city blame you for the chaos.\n*goto Black\n\n*label Allow\n${name}: We can't turn them away, they didn't ask for war, they have lost their lives and homes so we have a responsibility to care for them.\n\nDagonet: I agree but I hope we can manage.\n\nThe council send parchments to the guards and what seems like thousands flock into the city although its most likely just hundreds.\n\n*goto Black\n*label Black\n", "chapter_one": "Your family name is \n*choice\n  #Pendragon\n    *set family \"Pendragon\"\n    Your family name is ${family}.\n    *goto name\n  #Buxton\n    *set family \"Buxton\"\n    Your family name is ${family}.\n    *goto name\n  #Create your own.\n    *input_text family\n    So your family name is ${family}.\n    *goto name\n\n*label name\nWhat is your name?\n*input_text name\n\nGender?\n*fake_choice\n  #Male\n    *set Gender \"Male\"\n    *set mal \"true\"\n    *set fel \"false\"\n    My Lord \n    \n  #Female\n    *set Gender \"Female\"\n    *set fel \"true\"\n    *set mal \"false\"\n    My Lady \n\n*goto Story\n*label Story\nOur story begins in the land of Albion, once a thriving kingdom but now a blood soaked land of chaos.\n\nThree ancient families of the kingdom remain and now they compete with each other for land and power but something is coming, a foe from the realm of darkness.\n\nYour territory is the smallest of the three but you and your father are no less proud of what you have done or no less grateful for what you have.\n\nRecently bandits have become bold and attacks on caravans and people are common, you lead a patrol and ambush a band of bandits.\n*goto Crystal\n\n*label Crystal\nFYI PM Means Possessed Man\n\nYou and five soldiers deal with a small group of bandits but one of your men notice something odd, He kneels down to get a better look.\n\nSoldier 1: Hey I found something.\n\nHe tears off a strange necklace with only a black crystal from the bandits neck and is about to hand it to you but hesitates.\nfortunately for him you didn't hear him.\n\n${name}: Sorry what was that?\n\nThe man gets up and turns to you.\n\nSoldier 1: Nothing, it's nothing.\n\n${name}: Okay well our patrol isn't over.\n\nAll your men surround you and you all start discussing what to do next but the soldier who found the crystal doesn't join you, he has his back to you all.\n\nSoldier 2: Why attack us with such a small group, it's like they were possessed or something.\n\nSoldier 4: Yes it is worrying and strange indeed.\n\nSoldier 3 notices the man who didn't join your group.\n\nSoldier 3: Hey you come over here now!!!\n\nThe soldier turns around and what you see shocks you to your core, the mans eyes rolled to the back of his head and his skin is covered in large black veins, blood pours from his mouth.\nat the sight of this your men back away in fear.\n\nSoldier 2: Makers breath, what evil is this?\n\nEveryone including you draws their swords \n\nThe soldier just stands there looking up at the sky, the tension is too much.\n\n${name}: We can try to get you help.\n\nYou slowly approach the man but you quickly regret your decision as the man eyes meet yours, it feels like your soul is frozen and you can't move.\n\nYour men surround you to protect you but it wasn't needed as the possessed man turns and runs and as his eyes leave yours, you can finally move again but you all know this evil cannot be allowed to thrive, you chase after him.\n\nThe sun now starts to set, the man runs into the woods and down a narrow dirt path which leads to a forest clearing but just beyond that is an old temple like structure shrouded in darkness.\n\nYour men back away as do you but the possessed man turns to face you all and speaks in a demonic voice.\n\nPM: You mere mortals are hopeless.\n\nSwords are drawn once again and you demand to know who speaks but your question is responded with laughter before the presence answers.\n\nPM: Oh little one you have no idea of the horrors that await you and your pathetic kind.\n\nThe man laughs once more before one of your men charges at him ready to strike him down, the others warn him but its too late.\n\nThe PM grabs his sword hand and yanks his hand clean off, the patrolman dies shortly after.\n\nThe PM laughs once more before the man disappears in a thick black smoke, the door to the temple opens slowly.\n\nSoldier 1: Makers blood, we have to leave right now.\n\nThe remaining men agree but you start heading towards the temple.\n\nSoldier 3: Are you crazy? a man is dead and the other is a demon, we must leave and gather reinforcements\n\nYou turn back towards your remaining men.\n\n${name}: So more innocence can die? you lot can leave if you wish I won't blame you but I must try to defeat this evil.\n\nAfter some discussion, one man agrees to head back while the remaining two join you.\n\n\n*choice\n    #Enter the temple\n        *goto Temple\n    #Pray to the maker before entering\n      *set Maker + 5\n      *goto Temple\n        \n    #Pray to the old gods before entering\n        *set OldFaith +5\n        *goto Temple\n        \n*label Temple\nAfter all preparations are complete you and your remaining men gather yourselves and your courage and enter the temple.\nOnce you do you immediately feel a sensation of dread.\n\nThe temple is fairly small and only has two doors to choose from once you enter it.\n\nYou choose the door on the left which leads down a long tunnel that is so dark with only the outline of the walls visible at present.\n\nA solider grabs a club of wood and manages to light it so now everyone can see clearly.\n\n${name}: Stay close, we don't know what could be waiting for us.\n\nYour men nod their heads and you all make your way slowly further into the temple and after what seems like hours you finally reach a chamber room.\n\nStone walls that seem to leak black ooze, with a single wide altar in the centre.\n\nSoldier 2: Maker, what is this place?\n\nSoldier 1: It appears to be a temple dedicated to perhaps worshipping darkness and evil?\n\nLaughter appears from everywhere and you all look around desperately trying to find the source.\n\nThe PM appears from seemingly nowhere and speaks.\n\nPM: Foolish Mortals, you cling to your petty little lives fearing the darkness that will claim your very soul when death approaches.\n\nSoldier 1: Who are you? and what have you done with him?\n\nPM: HA HA this man is no more, he is merely a vessel.\n\nYou step ahead of your frightened men, fear grips you also but you manage to build up the courage to engage with this creature.\n\n${name}: You didn't answer the first question!!! who are you?\n\nThe PM laughs once more before answering.\n\nPM: Do you not know of the legends? of the war that tore this land apart? I am he who will engulf the world in darkness and death\n\none of your soldiers seems taken aback by his words, you turn to him in confusion.\n\n${name}: What is it? do you know something?\n\nSoldier 1: Yes, He's the leader of the race known as the formorians.\n\nThe other soldier looks shocked as do you but before you can ask for any more information, the PM speaks once more.\n\nPM: Clever little man. it's a shame none of you shall live to see my glorious return.\n\nShadow beings then appear out of the walls, some look human others like animals but they all have the same red glowing eyes.\n\nAll your men draw their swords and prepare to defend themselves, the shadow beings seem to be easy to beat with one hit but more keep appearing and soon you are quickly overwhelmed \nwith your two remaining men being killed, once they are dead however their bodies fade away to nothing and they also appear as shadow beings and surround you.\n\nPM: You see it now? there is nothing you can do to stop me, soon we shall return to our full physical forms.\n\nThese shadow beings must be the formorians you think to yourself but how can this be? but before you can ponder on this theory anymore you are attacked from all sides.\nyou embrace for death but death doesn't come in fact the beings fade away to nothing and as you look at the PM he appears angry.\n\nPM: WHAT!!! this is impossible.\n\nSuddenly a voice answers back.\n\n\" For one as limited as you perhaps\"\n\nYou look around but see nothing and no one.\n\nJust then multiple humanoid figures appear again out of nowhere, they are all wearing gold plated armour some hold bows and arrows and others two swords all seemingly made of gold, the ones with swords appear to be male based on their muscular build and because they are taller then the ones with bows and arrows\nthe archers and smaller in height with slimmer less built bodies.\n\nBefore you can process what is going on or who these strangers are, the archers open fire on the PM filling him with arrows, shadows once again appear and one of the archers tells you to hurry and strike the PM.\n\nWithout questioning you run towards him while the gold platted strangers defend you, the PM tries to claw you but you duck and strike his heart or at least where his heart once was.\n\nThe PM screams and falls to his knees, you lobe off his head in one swift motion and as you do the shadows disappear.\n\nThe crystal falls the ground and you crush it with your foot, its over you think to yourself.\n\nAs you turn around the strangers and also gone, who were they and why did they help you? in fact they looked familiar as if you've heard of them before perhaps in a story or legend.\n\nYou clean your sword as best you can and leave the temple, turning back to face it once more you notice that the door is sealed shut.\n\n${name}: Good.\n\nYou start walking back to Camelot.\n*if mal = \"true\"\n *goto Male\n*if fel = \"true\"\n *goto Female\n\n*label Male\nSince you were 18 you have been in charge of your families military except during times of war.\n\nYou enter the main hall where you see your father Uther talking to Lord Kalid, as they see you they stop talking to address you.\n\nUther: Ah ${name} it's good you came in, I was just talking to Lord Kalid, you remember him yes?\n\n${name}: Yes of course you're the head of Saxon house, it is an honour sir.  \n\nLord Kalid: The honour is my young ${pro} and may I say well done on your recent success with the bandits.\n\n${name}: Thank you my lord, bandit activity has been up in recent months and our borders need to be protected.\n\nYou decide not to say anything about the temple, the crystal or anything else about your journey.\n\nLord Kalid: I'm sure, if you'll excuse me I must return to Lancaster.\n\nLord Kalid thanks your father and leaves the hall, you turn to your father.\n\nUther: I know what you're going to ask ${name} but do not worry we were discussing recent events, as you may be aware its not just bandits we must be cautious of\nThe druids are sending out the message that the end is at hand and to ready ourselves when the time comes, I am just glad you made it back alive.\n\nThe man that went to get reinforcements never made it back? how dreadful\n\n${name}: What does that mean?\n\nUther: About the message? I'm not sure, what do you think it means?\n\n\n*fake_choice\n    #Secure our borders\n       *goto Secure\n        \n    #Prepare for war\n      *goto Prepare\n        \n    #Pray for forgiveness\n        *goto Religion\n\n*label Female\nYou enter the main hall where you see your father Uther talking to Lord Kalid, as they see you they stop talking to address you.\n\nUther: Ah ${name} it's good you came in, I was just talking to Lord Kalid, you remember him yes?\n\n${name}: Yes of course you're the head of Saxon house, it is an honour sir.  \n\nLord Kalid: The honour is mine young ${pre} and may I say well done on your recent success with the bandits.\n\n${name}: Thank you my lord, bandit activity has been up in recent months and our borders need to be protected.\n\nYou decide not to say anything about the temple, the crystal or anything else about your journey.\n\nLord Kalid: I'm sure, if you'll excuse me I must return to Lancaster.\n\nLord Kalid thanks your father and leaves the hall, you turn to your father.\n\nUther: I know what you're going to ask ${name} but do not worry we were discussing recent events, as you may be aware its not just bandits we must be cautious of\nThe druids are
