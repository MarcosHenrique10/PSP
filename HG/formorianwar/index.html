gins to form and another Sidhe appears and tells the group that 2 humans \nand an elf have entered the forest.\n*goto Sidhe\n\n*label Sidhe\nThe sight before you is breath taking but is quickly interrupted when a large winged beast with the head and wings of an eagle but the body of a lion.\n\nDagonet: Griffin!!!!\n\nThe Griffin lands with a huge thud knocking you all to the ground, getting back up you draw your sword and swipe at the griffin.\nDagonet rushes to aid you but you're both knocked to the ground, Morganna gets up and knocks an arrow and fires at the griffins head, in retaliation the griffin swipes it's massive claw at her but she manages to duck.\n\nDagonet strikes the griffins back leg and it cries in pain then flies away.\n\nMorganna: I think that's what the druid mean's by dangers.\n\nDagonet: I wonder what else we will see.\n\nYou hear the sword singing and this time you can understand what it's telling you \"continue east\"\n\n${name}: We should continue going east.\n\nMorganna and Dagonet don't question you as they are just as lost as you are when it comes to direction, after what seems like hours travelling you approach a lake within the forest and on the other side is a tower with floating crystal, the tower glows bright blue and you and your companions are transported within.\nYou teleport within what looks like a dinning room except its solid gold everywhere and you feel a strong sense of magic.\n\nA Sidhe warrior approaches you, the same one who visited you and your father previously.\n\nSidhe: Well met again young ${family} It's good to see you again and may I ask who are your friends?\n\n${name}: Well met, This is Dagonet and Morganna.\n\nThe Sidhe warriors welcomes them and they thank him, he then asks what is your purpose here.\nAfter you explain everything, he nods and tells you all to follow him to met their Queen.\n\nYou are taken to a throne room made of crystal but its warm like a spring morning, the Queen sits on her throne but once she sees you the stands up, grabs her golden staff and slowly walks towards you, all three of you stop and bend a knee to her.\n\nSidhe Queen: Welcome Humans and Elf, we don't get many visitors.\n\n${name}: We humbly ask for your aid against the formorians.\n\nSidhe Queen: I know why you're here, the crystal of Tir na nog revealed you to me, I may be an enchantress but even I am not as powerful.\n\nMorganna asks why they are in the forest and why it feels different to others, the Queen explains that the forest is a gateway to Tir na nog but it is closed, the Queen among with many other Sidhe decided to stay beforehand and to the second question she simply answers that the forest has always been magical.\n\nSidhe Queen: I've been informed that you found a shard of the book, may I see.\n\nYou hand the shard to the Queen, she examines it and tells you to find the others so it can be made whole again to help cure the land of the plague.\n\nShe Insists that Morganna stay behind to ensure that she is strong and healthy due to being cured recently, she then turns to you and Dagonet and tells you to return to your respective territories and reclaim the shards that are kept there, Dagonet quickly protests and explains that the Formorians have taken evergreen.\n\nThe Queen again insists and tells Dagonet that it's not an option if you want their help.\n\nA Sidhe warrior gives you both a circle stone with a blue glowing swirl, he explains that they will teleport you back to the tower once your tasks are done, you are then teleported to the border of Camelot in a flash, feeling dizzy you lean forward and vomit.\n\nMaking your way to Camelot by foot isn't easy and takes you several hours but by the time you get there you are greeted to a horrible sight.\n\nCamelot is a shadow of it's former self, people are gathered in the courtyard and many are crying but why?\n\nAlfred stands on the balcony and commands everyone to be quiet but several can't, he summons a bolt of lighting to kill them.\n\nAlfred is a sorcerer!!! \n\nAlfred: I command this land and you will all bow to me, oh have you come to join us ${name}?\n\nBefore you can act you are seized by your own men but they seem different, their eyes are blood shot red and a strange red aura surrounds them.\nYou're taken to the main hall where Alfred taunts you and spits in your face.\n\nThe soldiers try to take the sword from you but their skin burns when they touch it.\n\n*choice\n   #Use the sword.\n       *set Combat + 20\n       *goto Freedom\n        \n  #Submit\n     *goto Prison\n        \n*label Prison\nYou don't fight back and Alfred calls you weak, you are then thrown into the dungeon.\n\nYou spend two days in your cell with no food or water, a priest comes to your cell.\n\npriest: Hey ${name} take this.\n\nHe hands you the shard of the book.\n\n${name}: How did you get this?\n\npriest: I took a great risk getting this, I had overheard Alfred mention this shard and that's why you came back, we all thought you were dead and that's when he revealed his evil.\n\n${name}: Thank you very much, do you know why the soldiers work for him now?\n\npriest: Their minds are not their own, its magic and magic is always evil.\n\nYou know this isn't true but the chantry believes that all magic is evil.\n\npriest: You must kill him, I am confident it will restore order.\n\nThe priest then uses a key to free you, you still have the sword since no one could touch it without burning so the priest leads you to the main hall and Alfred is clearly angry, he conjures a fireball and kills the priest.\n\nSoldiers from all sides try and kill you, somehow you manage to dodge several before attempting to kill Alfred, he tries to block the sword with magic but clearly struggles and somehow manages to repel you.\n\nThe guards start to surround you but the sword starts singing and they all hold their heads and groin in pain.\n\nAlfred: NO!!!\n\nYour men are themselves again and seize Alfred, he is then executed publicly.\n\nYou launch a full investigation into how this happened and leave a trusted general in charge while you're away but not before you stop by the chantry and give thanks to the priest who freed you and really saved Camelot at his funeral.\n\nThe head of the chantry thanks you for your time, just then you are absorbed by a flash of light and disappear.\n\n*set Combat + 10\n*goto History\n\n*label Freedom\nYou didn't come all this way to lose, you draw the sword and rush at Alfred but he somehow blocks your assault.\n\nSoldiers from all sides try and kill you, somehow you manage to dodge several before attempting to kill Alfred but not all, he tries to block the sword again with magic but clearly struggles and somehow manages to repel you once more.\n\nThe guards start to surround you but the sword starts singing and they all hold their heads and groin in pain.\n\nAlfred: NO!!!\n\nYour men are themselves again and seize Alfred, he is then executed publicly.\n\nYou launch a full investigation into how this happened and leave a trusted general in charge while you're away but not before you stop by the chantry and attend the funerals of many people who tried to stage a rebellion.\n\nThe head of the chantry thanks you for your time, just then you are absorbed by a flash of light and disappear.\n\n*set Health - 5\n*goto History\n\n*label History\nYou are back at the Sidhe tower, Dagonet has also returned with a third shard he is bloody and bruised but alive.\n\nYou tell the Queen and your companions everything, Alfred having magic and the hostile takeover, Dagonet and Morganna listen to every word and are shocked to hear what you're telling them, the Queen however shows no emotion.\n\nMorganna: Why do people learn magic only to use it for evil?\n\nQueen: One does not learn it, you must be born with it.\n\nDagonet: So we got the shards, Camelot is reclaimed which is more then I can say for Evergreen, the formorians have it now so what do we do now?\n\nQueen: You have down as we have asked, this was a test to prove your strength and determination, for I will not ally with those who are weak and unsure.\n\n${name}: So we have your aid?\n\nQueen: You do, I will gather my army and fight to defeat these monsters, I have some advice however.\n\nThe Queen walks to her throne but doesn't sit down\n\nQueen: Seek out the Witch Queen of the Red Mountains, her aid would also be of value.\n\nYou and your friends make your way out of the forest to the red mountains to find the witch however Saxon riders approach you and ask that you come with them.\n\n${name}: Why should we?\n\nRider: Because Marcus demands it, it is of the upmost importance.\n\nMorganna takes you aside and confirms that when Marcus says something is important, it usually is.\n\nTrusting Morganna's word you agree and ride with the others to Lancaster.\n\nAfter a day or two you arrive at Lancaster and enter the castle, which is larger and more grand than yours or at Evergreens.\n\nYou and the others are lead through the halls when you reach a room called the kingdom of Albion.\n\n${name}: What's that room there?\n\nThe guards stop and answer you, they also say that if you would like to have a look you can ask Marcus.\n\nMorganna: Do I not have access? This is my home after all.\n\nThe guards look in panic and answer.\n\nGuard: Of course, sorry my lady.\n\nMorganna: Tell my brother we shall be along shortly, Dagonet would you like to join us.\n\nDagonet respectfully declines and follows the guards while you and Morganna head into the room.\n\nThe room is stacked with selves filled to the brim with books with a variety of subjects.\n\nAs you and Morganna browse you noticed a small room within the room but this one has several statues of Albion's greatest kings and queens.\n\nYou notice a statue in the centre of the room of a man who stands tall holding a sword and shield, the statue is 7tf tall and made of bronze and gold.\nThe statue reads ''King Gared III The Warrior'' that name rings a bell but you can't think of the reason why.\n\nMorganna walks in the room.\n\nMorganna: We shouldn't keep my brother waiting.\n\n${name}: You're right.\n\nWalking down the hall you question Morganna about the history of Lancaster, she tells you that this used to be the heart of the kingdom, the kings and queens ruled and lived there.\n\nYou enter the \"Throne room\" where Dagonet and Marcus are talking, they notice you, Morganna, and Marcus embrace each other.\n\nLooking around the room, you are stunned by the size alone, it's wider and larger than your main hall in Camelot.\n\nMarcus: It is quite a site, is it not?\n\n${name}: It is indeed but may I ask why you called me here, we're on an important mission.\n\nMarcus: To find the witch I know, Dagonet has told me much, that's why I called you I wanted to know what you were up to, I already have the formorians I don't need anymore problems.\n\nMorganna: Couldn't you have just trusted the word of a scout or a patrol?\n\nMarcus shakes his head no.\n\nMarcus: That did occur to me but no I could not, I needed to hear it, and again I am sorry.\n\nDagonet: It's okay I suppose, I could use a hot meal and a bath to be honest.\n\nMarcus: You may stay the night and leave in the morning if you wish.\n\nMorganna: We would be fools to turn it down, right ${name}?\n\nYou turn to Morganna.\n\n${name}: Right of course, thank you\n\n*goto Chance\n\n*label Chance\nNight falls at Lancaster and you have the chance to improve certain skills.\n\n*choice\n    #Leadership\n        *set Leadership + 20\n        *goto Witch \n    #Knowledge\n        *set Knowledge + 20\n        *goto Witch\n    #Agility\n        *set Agility + 20\n        *goto Witch\n\n*label Witch\nAll of you make your way up the mountain at day break and finally find it, a dirt pathway leads to rocky cliff edges which you slowly make your way across.\n\nYou find a cave to rest in, Morganna turns towards the entrance.\n\nMorganna: Did you guys hear that roar?\n\nYou look at Dagonet and he shakes his head no\n\n${name}: No we didn't, is everything okay?\n\nMorganna is about to answer but screams instead, a large dragon appears from the cave and grabs all three of you on it's front claws and flies to the top.\n\nOnce the dragon reaches the top which isn't a jagged point its a sizable flat surface, it then drops you all and lands next to a woman sitting on a throne made of stone.\n\nWitch: I am the Witch Queen Hera of the Red Mountains, state your purpose and I may not have my dragon eat you.\n\nDagonet steps forward.\n\nDagonet: Your majesty, we seek your aid on behalf of the Saxon, Tudor and ${family} families I am sure you know that the formorians are roaming the realm and destroying everything, if we don't defeat them they will come for you next so please lend us your aid.\n\nThe dragon roars and Dagonet steps back.\n\nWitch: Lets say I lend you my aid, how do you intend to defeat the formorians, who else have you allied with?\n\n${name}: The Sidhe and to be honest I don't know.\n\nDagonet and Morganna are unable to answer.\n\nWitch: If it weren't for you being allies with The Sidhe I would kill you right now but they must have some reason to do so, I know how the formorians keep coming, there is a nethergate on the Isle of the blessed, brought here by the Sidhe book, I've been trying to find the shards but only found one.\n\nYou show the Witch the other shards and her eyes light up.\n\nWitch: That's impressive, here is what I propose defeat one of my dragons in combat but don't kill it and I'll join your fight.\n\n*choice\n  #Agree\n   *if (Combat > 40)\n    *set Dar true\n    *goto Success\n   *else\n    *goto Fail\n  #Refuse\n    *set Dar false\n    *goto Refuse\n\n*label Success\nUsing your brawn would be pointless so instead you use your brain, the dragon breaths fire and by sheer luck you manage to evade it, you draw the sword and cut the dragons neck causing a little light bleeding, the dragon now enraged tries to bite you but since it's wounded it's slower then normal making it easier for you to duck and lightly cut its throat.\n\nWitch: ENOUGH!!\n\nThe witch casts a healing spell and the dragon is healed of all it's wounds\n\nWitch: I see you have the sword of the Sidhe, that explains how you were able to hurt my dragon so easily, if you need my aid you shall have it.\nJust send word when myself and my dragons are needed.\n\nYou bow and thank her.\n\n*set all true\n*goto Fight\n\n*label Fail\nYou try and hit the dragon but fail to even scratch it, it's too fast and you are simply not skilled enough, the dragon defeats you.\nYou walk away bleeding a little but alive.\n\nWitch: As expected, leave now unless you want to get eaten.\n\nAs you descend the mountain you hang your head in shame.\n\nDagonet: Hey don't worry about it, you still faced a dragon and lived.\n\n*set Health - 10\n*set Dar \"false\"\n*set Witch \"false\"\n*set all \"false\"\n*goto Fight\n\n*label Refuse\nWitch: Then you have just wasted my time, get off my mountain and never come back.\n\nYou and crew thank her for her time and start to walk away she then tells you good luck.\n\n*set Dar false\n*set all false\n*goto Fight\n\n*label Fight\nTime is running short, you now know about how the Formorians have entered your world but what you don't know is how to close the gate.\n\nDagonet: We must act now.\n\nMorganna: I agree.\n\nYou quickly realise that if you don't take action soon, there may not be a realm to save, you have run out of time.\n\nFirst what about the elves in your territory? will you allow them to fight in your army? you already have archers and soldiers \nbut couldn't hurt to have more.\n\n*choice\n\n   #Yes as archers\n        *set elf true\n        *set Army + 5\n        *goto Gather\n\n   #Yes as soldiers\n        *set elves true\n        *set Army + 10\n        *goto Gather\n   #No\n         \n        *goto Gather\n\n*label Gather\nOkay but what about the people, should you organize a militia?\n\n*choice\n\n   #Yes, a small one\n        *set Leadership + 5\n        *set Army + 5\n        *goto Test\n\n   #Yes, a medium sized one\n        *set Leadership + 10\n        *set Army + 10\n        *goto Test\n   #No\n        *goto Test\n\n*label Test\nNow for your potential allies (This excludes the Sidhe)\n\n*fake_choice\n     #I need all of them\n       *if all = \"true\"\n        *set Army + 60\n        *goto Final\n       *if all = \"false\"\n        *goto No\n       \n\n     #Only the Saxons \n      *if (Saxon >= 40)\n       *set Army + 20\n       *goto Marcus\n       \n      *if (Saxon \u003c 40)\n       *goto Reject\n    \n\n    #Only the Tudors\n     *if (Tudor >= 40)\n      *set Army + 10\n      *goto Danna\n\n     *if (Tudor \u003c 40)\n      *goto Rejection \n    \n       \n      \n\n   #Only the Witch Queen\n     *if (Dar = \"true\")\n      *set Army + 30\n      *goto Dragon\n        \n     *if (Dar = \"false\")\n      *goto Dare\n         \n*label Final\nAfter several days, you, your companions and your army have managed to fight your way through legions of formorians, you're just a weeks march away from the valley of the kings.\n\nMaking camp in Formorian infested land isn't ideal or even smart but you have little choice.\n\nGathering your council which consists of Dagonet, his sister Danna, Morganna, Marcus, The Sidhe Queen and The Witch Queen.\n\nDagonet and Danna share a hug before turning to you to talk.\n\n${name}: Thank you all for coming I will try and keep this short, we all have a common enemy and thanks to Hera we know how they came here but what we still don't know is how the neathergate can be closed, Sidhe Queen your people have been enemies with the Formorians for hundreds of years do you have any ideas?\n\nSidhe Queen: The gate was opened with magic and thus it must be closed by magic.\n\nMarcus gives a sceptic look\n\nMarcus: How do you know fairy?\n\nSidhe Queen: Because I fought in the last war and that's how we managed to close it, research has been done since then and I can confirm that it is the case, you don't necessarily need myself or Hera you can also use magical items as the book opened the gate.\n\nDanna: That's a good point, we have the shards but what do we do with them?\n\nMarcus then interjects\n\nMarcus: If the shards are close to one another they will merge with the pages and become the book once more.\n\nEveryone looks at Marcus with surprise.\n\nMarcus: I may follow the maker but I am not ignorant.\n\nAfter discussing the battle plan, you all leave for the night.\n\nExiting the war tent you see a variety of things going on, Dagonet and Danna are talking over a cup of wine, Morganna is helping the wounded, Marcus is speaking to some priests while the two Queens are chatting and the Sidhe Queen seems fascinated by the small dragon by Hera's side.\n\n*choice\n    #Join Marcus\n        *goto Join\n        \n\n    #Join Dagonet and Danna\n        *goto Old\n       \n\n    #Join the two Queens\n        *goto Queen\n\n    #Call it a night\n        *goto Rest\n\n*label No\nDespite your pleas, everyone ignores you.\n*goto massacre\n\n*label Marcus\nAfter several days, you, your companions and your army have managed to fight your way through legions of formorians, you're just a weeks march away from the valley of the kings.\n\nMaking camp in Formorian infested land isn't ideal or even smart but you have little choice.\n\nGathering your council which only consists of Dagonet, Marcus, Morganna and The Sidhe Queen.\n\n${name}: Thank you all for coming I will try and keep this short, we all have a common enemy and thanks to Hera we know how they came here but what we still don't know is how the neathergate can be closed, Sidhe Queen your people have been enemies with the Formorians for hundreds of years do you have any ideas?\n\nSidhe Queen: The gate was opened with magic and thus it must be closed by magic.\n\nMarcus gives a sceptic look\n\nMarcus: How do you know fairy?\n\nSidhe Queen: Because I fought in the last war and that's how we managed to close it, research has been done since then and I can confirm that it is the case, you don't necessarily need myself or Hera you can also use magical items as the book opened the gate.\n\nMorganna: That's a good point, we have the shards but what do we do with them?\n\nMarcus then interjects\n\nMarcus: If the shards are close to one another they will merge with the pages and become the book once more.\n\nEveryone looks at Marcus with surprise.\n\nMarcus: I may follow the maker but I am not ignorant.\n\nAfter discussing the battle plan, you all leave for the night.\n\nExiting the war tent you see a variety of things going on, Dagonet and a Sidhe archer are talking over a cup of wine, Morganna is helping the wounded, Marcus is speaking to some priests while the Sidhe Queen is speaking to several of her soldiers and archers.\n*choice\n    #Join Marcus\n        *goto Join\n\n    #Join the Sidhe Queen\n        *goto Queen\n\n    #Call it a night\n        *goto Rest\n\n*label Reject\nYou got handed a left by a messenger and it wasn't what you expect\n\n\" ${name} I offered you a chance and you were too stubborn to take up my offer so sort it out yourself\"\n*goto massacre\n\n*label Danna\nAfter several days, you, your companions and your army have managed to fight your way through legions of formorians, you're just a weeks march away from the valley of the kings.\n\nMaking camp in Formorian infested land isn't ideal or even smart but you have little choice.\n\nGathering your council which only consists of Dagonet, his sister Danna, Morganna and The Sidhe Queen.\n\nDagonet: I appreciate you coming Danna, I've missed you.\n\nDanna: And I you brother.\n\nDagonet and Danna share a hug.\n\n${name}: Thank you all for coming I will try and keep this short, we all have a common enemy and thanks to Hera we know how they came here but what we still don't know is how the neathergate can be closed, Sidhe Queen your people have been enemies with the Formorians for hundreds of years do you have any ideas?\n\nSidhe Queen: The gate was opened with magic and thus it must be closed by magic.\n\nSidhe Queen: I fought in the last war and that's how we managed to close it, research has been done since then and I can confirm that it is the case, you don't necessarily need myself or Hera you can also use magical items as the book opened the gate.\n\nDanna: That's a good point, we have the shards but what do we do with them?\n\nDagonet: If the shards are close to one another they will merge with the pages and become the book once more.\n\nAfter discussing the battle plan, you all leave for the night.\n\nExiting the war tent you see a variety of things going on, Dagonet and Danna are talking over a cup of wine, Morganna is helping the wounded, Marcus is speaking to some priests while the Sidhe Queen is speaking to several of her soldiers and archers.\n\n*choice\n        \n\n    #Join Dagonet and Danna\n        *goto Old\n       \n\n    #Join the Sidhe Queen\n        *goto Queen\n\n    #Call it a night\n        *goto Rest\n\n*label Rejection\nDagonet isn't confident but he knows where the survivors of Evergreen are and send a letter, you get a quick reply, Dagonet reads it then turns to face you\n\nDagonet: Good news is my little sister is alive and leads our remaining forces, bad news is she refuses to help us.\n\nYou argue with Dagonet back and forth for a while before accepting that despite Dagonet being Lord there is nothing he can do until the formorians are out of Evergreen.\n\n*label Dragon\nAfter several days, you, your companions and your army have managed to fight your way through legions of formorians, you're just a weeks march away from the valley of the kings.\n\nMaking camp in Formorian infested land isn't ideal or even smart but you have little choice.\n\nGathering your council which only consists of Dagonet, The Witch Queen, Morganna and The Sidhe Queen.\n\n${name}: Thank you all for coming I will try and keep this short, we all have a common enemy and thanks to Hera we know how they came here but what we still don't know is how the neathergate can be closed, Sidhe Queen your people have been enemies with the Formorians for hundreds of years do you have any ideas?\n\nSidhe Queen: The gate was opened with magic and thus it must be closed by magic.\n\nSidhe Queen: I fought in the last war and that's how we managed to close it, research has been done since then and I can confirm that it is the case, you don't necessarily need myself or Hera you can also use magical items as the book opened the gate.\n\nMorganna: That's a good point, we have the shards but what do we do with them?\n\nDagonet: If the shards are close to one another they will merge with the pages and become the book once more.\n\nAfter discussing the battle plan, you all leave for the night.\n\nExiting the war tent you see a variety of things going on, Dagonet and Danna are talking over a cup of wine, Morganna is helping the wounded, Marcus is speaking to some priests while the Sidhe Queen is speaking to several of her soldiers and archers.\n\n*choice\n\n    #Join the Sidhe Queen\n        *goto Queen\n\n    #Call it a night\n        *goto Rest\n      \n\n*label massacre\nYou march with all the forces you could muster but unfortunately it wasn't enough.\nIt was a massacre, The Sidhe battle till their last and Dagonet falls defending an injured solider.\nMorganna is overpowered and impaled, the last thing you see is a blade striking your neck.\n*ending\n\n*label Dare\nYou send word to the witch, hoping she has changed her mind.\nYou see a small green dragon fly towards you and it breathes fire, thankfully none of you were harmed but it sent a clear message that she has not.\n*goto massacre\n\n*label Join\nYou walk over the Marcus who is just finishing his discussion with priests of the maker.\n\nMarcus: I never thought I would find myself fighting alongside a ${family}.\n\n${name}
