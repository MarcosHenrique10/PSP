 sending out the message that the end is at hand and to ready ourselves when the time comes, I am just glad you made it back alive.\n\nThe man that went to get reinforcements never made it back? how dreadful\n\n${name}: What does that mean?\n\nUther: About the message? I'm not sure, what do you think it means?\n*fake_choice\n    #Secure our borders\n       *goto Secure\n        \n    #Prepare for war\n      *goto Prepare\n        \n    #Pray for forgiveness\n        *goto Religion\n       \n*label Secure\nUther: That certainly would be a smart move put my also attract attention from our neighbours, we have already lost so much however I trust your judgement.\nfor weeks your father works with the council and yourself to secure the borders of your land, putting more troops on patrol and increasing the watchtowers surrounding it.\nyou receive word from the druids calling yourself and your father to the Isle of the blessed, this means you may have to travel into Saxon territory and take a boat to reach it\nthe Saxons are no friends of the ${family} family so you must be cautious.\nUther: This must be urgent to have us travel a long way and into dangerous lands.\nyou wonder why the druids have summoned you and your father given that now is not the time to be away from Camelot however you could ask them for information regarding their warning.\nSo how will you set off with your father and several guards traveling to the Isle, there are a few paths you could take.\ntravelling towards the valley of the kings is the most direct but also most risky then there's going straight to Lancaster then going from there to the Isle, you would avoid bandits and cutthroats \nhowever the Saxons could see it as a threat and attack or you could avoid them both and take a boat from dragons peak.\n\n\n*choice\n    #Take the direct route\n        *goto Direct\n        \n    #Head to Lancaster\n        *goto lancaster\n        \n    #Take a boat from Dragons Peak\n        *goto boat\n        \n*label Prepare\nUther: That certainly would be a smart move put my also attract attention from our neighbours, we have already lost so much however I trust your judgement.\nFor weeks your father works with the council and yourself to strengthen your forces, recruiting and training, improving weapons and armour.\nYou receive word from the druids calling yourself and your father to the Isle of the blessed, this means you may have to travel into Saxon territory and take a boat to reach it\nthe Saxons are no friends of the ${family} family so you must be cautious.\nUther: This must be urgent to have us travel a long way and into dangerous lands.\nYou wonder why the druids have summoned you and your father given that now is not the time to be away from Camelot however you could ask them for information regarding their warning.\nSo how will you set off with your father and several guards traveling to the Isle, there are a few paths you could take.\nTravelling towards the valley of the kings is the most direct but also most risky then there's going straight to Lancaster then going from there to the Isle, you would avoid bandits and cutthroats \nhowever the Saxons could see it as a threat and attack or you could avoid them both and take a boat from dragons peak.\n\n*label Religion\nUther: What would praying do? We will secure our borders and prepare for war\nfor weeks your father works with the council and yourself to secure the borders of your land, putting more troops on patrol and increasing the watchtowers surrounding it and \nrecruiting more soldiers.\nyou receive word from the druids calling yourself and your father to the Isle of the blessed, this means you may have to travel into Saxon territory and take a boat to reach it\nthe Saxons are no friends of the ${family} family so you must be cautious.\nUther: This must be urgent to have us travel a long way and into dangerous lands.\nyou wonder why the druids have summoned you and your father given that now is not the time to be away from Camelot however you could ask them for information regarding their warning.\nSo how will you set off with your father and several guards traveling to the Isle, there are a few paths you could take.\ntravelling towards the valley of the kings is the most direct but also most risky then there's going straight to Lancaster then going from there to the Isle, you would avoid bandits and cutthroats \nhowever the Saxons could see it as a threat and attack or you could avoid them both and take a boat from dragons peak.\n\n        \n        \n*label Direct     \nYou gather the guards and the supplies in the caverns and you make your way to the Isle of the blessed with your father.\n\nThree days pass without incident and just as you let your guard down that's when you and your men are attacked by a group of bandits.\n\nYou draw your sword and join the fray, striking down one bandit only for another to attack you from behind cutting your arm.\n\nFighting through the pain you manage to fatally wound him, you then see your father struggling against several bandits, he is outnumbered and outmatched.\n\n*set Health - 10\n\n*choice\n    #Gather your men to aid your father\n        *set leadership +10\n        *goto Aid\n    #Stand and watch\n      *goto watch\n    #Aid your father alone\n        *set agility +10\n        *goto Alone\n\n*label lancaster\nThis is a really risky path you're taking but you take  it anyway, Lancaster was once the centre of power when the Kingdom was around.\n\nWithin two days, Saxon riders stop your company and ask where you are heading.\n\nYou tell then that you are heading towards Lancaster and then going to the Isle of the blessed, the riders look at each other then back to you with suspicion.\n\nUther starts to talk but one of the riders cuts him off telling you that your party can pass and tells you that their lord got the same message.\n\nYou thank the riders and make your way towards Lancaster, by the time you're within sight of the city, the sun starts to set.\n\nyou make camp several yards away from the city.\nOne of the guards comes up to you offering a cup of water, you take it and he asks you if you follow the maker.\n\n*choice\n    #I lean more towards the Old Faith\n        *set maker - 10\n        *goto Shore\n        \n    #Of course\n        *set maker +10\n        *goto Shore\n        \n*label boat\nYou decide to take a boat from Dragons Peak, you select you boat, get your supplies and men on board however it turns out to be a huge mistake.\nYour boat hits some large rocks and the boat sinks, the last thing you see is your father sinking to the bottom.\n*goto death\n\n\n*label death\nYou have died.\n*ending\n\n*label Aid\nYou lead the others to aid you father, swords clash and you manage to defeat them but your father is wounded, clutching his side he groans in pain.\n\nUther: Ahhh may the maker damn you.\n\n*set Health - 10\n\nAfter checking on the supplies (luckily nothing was stolen) and tending to wounds, you make camp several yards away from the attack site.\nOne of the guards comes up to you offering a cup of water, you take it and he asks you if you follow the maker.\n*goto Shore\n        \n*label watch\nYou stand there frozen unable to move or think, the guards rush to your fathers aid and in the confusion you don't notice the sword piercing your back\n*ending\n\n*label Alone\nIgnoring everything else around you, you rush to your father and help him take out his attackers.\nYou receive minor wounds but you feel as you have gained respect from your father and the guards however your father begins groaning in pain clutching his side.\n\nUther: Ahhh may the maker damn you.\n\nAfter checking on the supplies (luckily nothing was stolen) and tending to wounds, you make camp several yards away from the attack site.\nOne of the guards comes up to you offering a cup of water, you take it and he asks you if you follow the maker.\n*goto Shore\n\n*label Shore        \nAfter four more days of travel, you finally reach the shores to the lake of Avalon, in the middle of the lake is the Isle of the blessed.\n\nYou and company board a boat to the Isle and as you arrive, you are welcomed by the druids who have guarded this Isle for centuries.\n\nThey lead you, your father and your men to the others, the leader of the druids gathers you all around a sword surrounded by a magical circle, everyone stands in awe.\n\nAround you, you see Morganna Saxon, her father and brother surrounded by several guards and just next to them is Dagonet Tudor, his father, his sister Danna and guards. \nEveryone speaks quietly to each other until Lord Kalid speaks up.\n\nLord Kalid: I demand you tell us all why you called us all here, to be seen with the lower class is making me ill.\n\nDagonet clearly takes offence while Morganna lowers and shakes her head as if she disagrees with her fathers words and tone.\n\nDagonet: lower class? how dare you say such things you Saxon pig!!!\n\nThe Saxons and Tudors start arguing and it looks like things are getting red hot, you are unsure of what to do.\nHowever before you decide the leader shouts so loudly the Isle shakes.\n\nLead Druid: SILENCE\n\nEveryone including yourself covers their ears.\n\nLead Druid: The reason we called you here is simple but first I would like to thank all of you for coming as I know you have duties to return to,\nnow onto why you're all here.\nAs you all have noticed bandits have gotten more confident and the weather has been awful at a time where it should be lovely and sunny.\n\nDagonet: Your point is?\n\nLead Druid: That our worst fears are confirmed, these are the signs of the Formorians return to our world, it has been foretold for many decades.\n\nEveryone is shocked and talks amongst themselves until the lead druid quiets everyone down.\n\nLead Druid: There is a prophecy that states that when bandits roam the land and the weather turns at an unexpected time, the Formorians will return to destroy and kill,\nthat is also when the one worthy to wield the sword of the Sidhe will rise up, rule the realm and defeat them.\n\nLord Kalid: What a load of nonsense, the Sidhe and Formorians are nothing but fairy tales.\n\nLord Kalid believes in the maker which denounces the old ways and their legends so of course he would think that, just then Morganna turns too her father.\n\nMorganna: Father, here before us is the sword of which the prophecy speaks of, how can you deny it?\n\nLord Kalid: The druids planted it there to sell this story.\n\nDagonet: How do we prove who is worthy?\n\nLead Druid: it is simple, step into the circle and try to take the sword, if you fail the sword will reject you and expel you from the circle, but should you succeed the circle will vanish.\n\nThis seems simple enough, one by one everyone including the guards of the families tries to pull the sword but fail, when it's Morganna's turn she looks worried. \n\n*choice\n   #Encourage Morganna\n       *set Morganna + 10\n       *goto Encourage\n        \n  #Insult Morganna\n        *set Morganna - 10\n        *goto Insult\n\n*label Encourage\n\n${name}: Come on Morganna, ignore this lot and give it a go.\n\nMorganna smiles at you before turning back to the sword.\n\nMorganna enters the circle and tries her best but fails, despite your earlier comment, you feel disappointed because now it's your turn, your father and all your men have\nalready tried and failed.\n\nYou cautiously step into the circle, instantly you can feel the magical energy that surrounds you, grasping the sword you take a deep breath, before you start to pull however\nyou can hear a sweet song, similar to that of a siren singing except in steading of feeling like you're in a trace, you feel at peace.\n\nPulling hard with all your mighty trying to release the sword from its hold, the circle suddenly begins to shrink around you, being absorbed into the sword,\nThe circle is gone and you once again hear the singing, the lead druid smiles and tells you that's its the song of the Sidhe.\n\nMany stand in amazement while others can't believe what they have just seen, you manage to free the sword meaning you are the one the prophecy spoke off,\n\nYour guards kneel before you, as do all the other guards of the families, the druids including the lead druid also kneel before you.\n\nLord Kalid: What are you doing? this is blasphemy.\n\nDagonet: The sword was freed by ${name} and I for one pledge my sword to his cause.\n\nDagonet then kneels before you.\n\nLord Kalid's son and heir Marcus speaks.\n\nMarcus: of course a heathen like yourself would believe this nonsense and I for one will not allow this blasphemy to continue.\n\nMarcus then draws his sword but the druids surround you and declare that it not be wise to spill blood here.\n\nLord Kalid tells his son it would not be a wise move and all the while Morganna has not said a word.\n\nThe Saxons depart but not before Morganna looks at you one last time and performs a curtsy, you bow to her.\n\nAfter many days, you finally arrive back at Camelot, when a servant runs to you and company saying a strange being is waiting for you.\n\nYour father asks for more information but the servant stumbles over his words, you and your father enter the main hall to be greeted by a Sidhe Lord.\n\nYou and you're father are taken aback by his appearance, he stands tall with gold plated amour and helmet, carrying two swords that shine in the sunlight and look so sharp\nthat they could cut through a breastplate with ease.\n*goto Time\n\n\n*label Insult\n${name}: Seriously, she is useless.\n\nMorganna looks at you with disgust as do the druids.\n\nMorganna enters the circle and tries her best but fails, despite your earlier comment, you feel disappointed because now it's your turn, your father and all your men have\nalready tried and failed.\n\nYou cautiously step into the circle, instantly you can feel the magical energy that surrounds you, grasping the sword you take a deep breath, before you start to pull however\nyou can hear a sweet song, similar to that of a siren singing except in steading of feeling like you're in a trace, you feel at peace.\n\nPulling hard with all your mighty trying to release the sword from its hold, the circle suddenly begins to shrink around you, being absorbed into the sword, The circle is gone and you once again hear the singing, the lead druid smiles and tells you that's its the song of the Sidhe.\n\nMany stand in amazement while others can't believe what they have just seen, you manage to free the sword meaning you are the one the prophecy spoke off,\n\nyou guards kneel before you, as do all the other guards of the families, the druids including the lead druid also kneel before you.\n\nLord Kalid: What are you doing? this is blasphemy.\n\nDagonet: The sword was freed by ${name} and I for one pledge my sword to his cause.\n\nDagonet then kneels before you.\n\nLord Kalid's son and heir Marcus speaks.\n\nMarcus: of course a heathen like yourself would believe this nonsense and I for one will not allow this blasphemy to continue.\n\nMarcus then draws his sword but the druids surround you and declare that it not be wise to spill blood here.\n\nLord Kalid tells his son it would not be a wise move and all the while Morganna has not said a word.\n\nThe Saxons depart but not Morganna looks at you one last time and performs a curtsy, you bow to her.\n\nAfter many days, you finally arrive back at Camelot, when a servant runs to you and company saying a strange being is waiting for you.\n\nyour father asks for more information but the servant stumbles over his words, you and your father enter the main hall to be greeted by a Sidhe Lord.\n\nYou and you're father are taken aback by his appearance, he stands tall with gold plated amour and helmet, carrying two swords that shine in the sunlight and look so sharp\nthat they could cut through a breastplate with ease.\n*goto Time\n\n*label Time\nSidhe: Do not be afraid, I but deliver a message.\n\nUther stumbles in his words at first but collects himself.\n\nUther: State your business then.\n\nSidhe: We are returning to your world to retrieve a very powerful book so that it can be destroyed.\n\nYou recognize the figure as one of those who helped you in the temple but you do not bring it up.\n\n${name}: What does this book look like? does it have an unique features?\n \nSidhe: its made of crystal, it is highly dangerous to a human and even attempting to use it could be deadly, I must insist on searching your kingdom.\n\nUther: If this book is as dangerous as you claim then feel free to.\n\nThe Sidhe warrior leaves the hall.\n\nTwo months pass and things only get worse, the weather has turned stormy with very high winds and the occasional thunderstorm, The Sidhe report that the book was found and destroyed but it's too late to prevent the Formorians return.\n\nTaking this into consideration, what did you focus on so you are best prepared to apparently to fulfil your destiny?\n\n*choice\n    #Leadership\n        *set leadership + 20\n        *goto stat\n    #Combat\n        *set Combat + 30\n        *goto stat\n    #Agility\n         *set Agility + 30\n        *goto stat\n\n*label stat\nDuring the two months you also worked one?\n\n*choice\n\n   #Working on relationships\n        *set Tudor + 20\n        *set Dagonet + 10\n        *set Saxon + 20\n        *goto Ruin\n\n   #Knowledge\n        *set Knowledge + 20\n        *goto Ruin\n   #Agility\n         *set Agility + 20\n        *goto Ruin\n\n*label Ruin\nDuring this time you also take the time to explore the surrounding area and on one occasion you decide to head to Dragons Peak, a region in your lands.\n\nA man called Alfred is in charge of these lands but you don't need to ask permission from him to explore or even to build something here if you chose to, as the future ruler of Camelot your authority surpasses his.\n\nAs you travel you notice you start heading towards a small mountain where the region got its name, you decide to climb it and when you reach the top after a few hours a long stone plank like structure extends over the edge.\n\nCuriosity overtakes you and you carefully walk along the stone plank until you reach the edge, looking around you are awe struck by the natural beauty surrounding you.\n\nTrees as far as the eye could see, blue skies and many birds of different varieties fly in the sky however something stands out, something that you feel must be explored and or investigated.\n\nClimbing down the mountain is slightly more dangerous then climbing up but you manage without injury.\n\nAfter several hours, perhaps even a day or two, you aren't sure you finally reach what you saw and it's quite a sight.\n\nWhat stands before you is an altar with two dragon statues on either side of it, the stone building that used to surround it has fallen into disrepair, much of the stone has either been destroyed, damaged or covered in vines and leaves, you ponder how old this is.\n\nYou walk up to one of the statues which tower over you in size, you study it very closely and recognize it as one of the Gods of old.\n\n\" That is Dragous, the God of War\"\n\nYou turn around, sword drawn and demand to know who is there.\n\nA very old man steps out of the bushes, his robe is torn and dirty but what is strange is that his short beard and hair and well kept and clean.\n\n${name}: Identify yourself.\n\nKade: My name is Kade, a pleasure to meet you young ${family}.\n\nYou put your sword away sensing he won't be a threat to you, not only because of his calm and non threating manner but he appears unarmed too.\n\n${name}: I wasn't aware this was here, it is fascinating but who are you Kade?\n\nKade: I am a druid, a simple soul who loves nature and the old ways.\n\n${name}: So this here was in use before the chantry arrived?\n\nKade: Indeed it was, the old gods were worshiped all over the land.\n\nHe goes on telling you of the ruins of temples, altars and grooves that are dedicated to the old gods all over Albion in the past and present day.\n\nKade is a strange man but you can't help but appreciate his wealth of knowledge.\n\nYou talk well into the night not realising how much time has passed but the morning isn't so cheerful.\n\nYou wake up surrounded by armed men who lift you up and demand to know where Kade is, swords still pointed at you.\n\n${name}: He was here last night, what is this all about.\n\nMercenary Leader: You don't know? Kade owes us quite the sum and we intend to collect whether that be money or his head.\n\nYou're shocked by his words, druids aren't known for unlawful or dodgy dealings, perhaps Kade isn't all he said he was.\n\nHe orders his men to put away their weapons and they do so but they still surround you.\n\nMercenary Leader: Your Uther's kids right? well you would fetch a fine ransom but lucky for you we're on official business and have no time for this.\n\nYou raise your hands as a sign of surrender.\n\n${name}: Honestly I have no idea where he's gone.\n\nMercenary Leader: Well then you're coming with us.\n\nYou have your hands tied and are dragged for what seems like hours until you reach beyond the border and into Saxon lands, once you reach the grass and farmlands you can finally rest as the mercenaries set up camp.\n\nIn the dead of night you overhear the men talk about where Kade could of gone, how they have found clues to his whereabouts including a ripped piece of cloth from a tree but all you can do is try and sleep. \n\nYou are kicked awake and forced to follow without breakfast, once again you walk and walk stopping at a village.\n\nThe Mercenary Leader demands to know if someone called Kade lives here or has passed by, no one answers and he orders his men to start killing but just before someone innocent dies Kade steps out of a hut.\n\nKade: Please don't hurt anyone, these kind folk took me in when no one else would I will go quietly but please spare them and let ${name} go, I didn't mean to get anyone else involved.\n\nThe mercenary leader walks ahead of you and his men before he speaks.\n\nMercenary Leader: Tis a shame, you owe us and we intend to collect.\n\nThis fills your head with more questions and it becomes to much, you ask the Mercenary Leader what he means he turns to you and answers.\n\nMercenary Leader: Ah what's Kade told you this time? that he's a lost old man or perhaps a beggar.\n\nHe returns to facing Kade and points at him.\n\nMercenary Leader: This man has lied to us and cheated us, he hired us to take him to Lancaster however he never paid us and then ran away.\n\nYou're shocked.\n\n${name}: Is this true? so you never were a druid? you are a liar and a fraud?\n\nKade looks at you with tears in his eyes.\n\nKade: I'm sorry but all I said wasn't a complete lie, I grew up as a druid but left that life only to fall into gambling and other such nonsense, I ran because I am a coward but when I became lost in the woodlands just beyond that temple you saw I had a revelation and sought to change my ways and return to my roots.\n\nHe then starts speaking to the Leader.\n\nKade: Sir, I am so sorry for not paying you the money and I am sorry I ran away again but please can't we come to some sort of arrangement to cover my debt?\n\nThe Mercenary Leader strokes his chin for a few seconds looking Kade up and down.\n\nMercenary Leader: Hmmm Luck for you I am feeling generous so yes I believe we can come to some sort of arrangement and here it is, you work for me for 5 years and do exactly as I say any back talk you lose your tongue.\n\nKade lowers his head, you can see the defeat on his face.\n\n*fake_choice\n    #Let Kade be a slave to the mercenary company\n        *goto Slave\n        \n    #Pay his debt\n        *goto Debt\n        \n    #Be released and walk away\n        *goto Walk\n        \n*label Slave\nYou struggle against the rope that binds your hands but you're set free.\n\nWhile you rub your aching and sore wrists you see Kade walk off with the mercenaries but not before he looks at you as if to say ''I'm sorry''\n\nYou can't help but wonder if there was anything you could do, reaching into your pouch you find a sum of coins but before you can voice this it's too late, Kade is bound by the wrists and dragged away.\n\nAn elderly man rests his hand on your shoulder, you turn to him.\n\nElder: It is hard to watch a life be sold by their own hand because of their own actions.\n\n${name}: I just wish I could of done something.\n\nElder: Do not beat yourself up over it, come stay at your humble village for the night.\n\n${name}: Thanks but no disrespect who are you?\n\nElder: I am the village elder, come walk with me a moment.\n\nYou walk at the elders pace and he shows you around the village full of humble people who work to make a living, most raise animals or grow crops, others work in the village tavern or blacksmith.\n\nElder: Night is nearly here young one, perhaps the Inn has a room available.\n\nYou thank him and make your way to the Inn.\n\nWalking into a place of drink chatter and banter, you walk up to the front and ask if there are any rooms left and you're in luck because their are quite a few.\n\nYou purchase a room for the night and order a drink, turning to see a group of people of both men and women cheering, you wonder over to them and seeing that they are playing a game of dice.\n\nPatron: Ha I win again, cough up. \n\nA young man slides over a pouch of coins and the other grabs it.\n\nYou watch curiously as one of the table notices.\n\nPatron 2: Fancy a go friend?\n\n${name}: How do you play?\n\nA seat is pulled out for you and you sit down.\n\nPatron 2: Quite simple we all call out a number and if the dice roll to your number you win but if it doesn't you lose.\n\n${name}: But what if multiple people are playing?\n\nPatron 2: Well then lets say you call 5 right? well those who are closet to it stay in the game, the further away you then you are most likely kicked out of the round.\n\nThe game does sound simple and yet it doesn't but you give it a try regardless.\n\nYou get better and better as the hours pass, soon its between you and one other patron, you call a five and the dice does indeed roll a five, you win!\n\nEveryone cheers at your victory and the loser hands over your winnings.\n\nYou continue to play and chat with the locals enjoying the night away from home for the first time in days perhaps weeks.\n\nThe night draws to close and you consider your options.\n\n*choice\n     *selectable_if (mal = true) #Find a woman to sleep with.\n        *goto morningof\n\n     *selectable_if (fel = true) #Find a man to sleep with.\n        *goto morningof\n     #Call it a night.\n         *goto morningof\n\n*label Debt\nYou struggle against the rope that binds your hands but you're set free.\n\nWhile you rub your aching and sore wrists you see Kade walk off with the mercenaries but not before he looks at you as if to say ''I'm sorry''\n\nReaching into your pouch you find a sum of coins and call the the Leader.\n\n${name}: Wait!!!\n\nEveryone stops and the leaders asks what for?\n\n${name}: How much does he owe?\n\nMercenary Leader: Thirty Silver, why? if you have the coin then Kade can go free.\n\nYou hand the money over to the leader, he nods to his men and Kade is released.\n\nHe runs up and hugs you with tears of joy as the mercenaries walk away.\n\nKade: Thank you so much, surely you were sent by the Gods and I hear them no more gambling or making deals I can't fulfil, he runs off in the other direction cheering.\n\nAn elderly man rests his hand on your shoulder, you turn to him.\n\nElder: That was a noble gesture, it makes this old man proud to see such kindness.\n\n${name}: No one should be a slave to anyone.\n\nElder: I agree, come stay at your humble village for the night.\n\n${name}: Thanks but no disrespect who are you?\n\nElder: I am the village elder, come walk with me a moment.\n\nYou walk at the elders pace and he shows you around the village full of humble people who work to make a living, most raise animals or grow crops, others work in the village tavern or blacksmith.\n\nElder: Night is nearly here young one, perhaps the Inn has a room available.\n\nYou thank him and make your way to the Inn.\n\nWalking into a place of drink chatter and banter, you walk up to the front and ask if there are any rooms left and you're in luck because their are quite a few.\n\nYou purchase a room for the night and order a drink, turning to see a group of people of both men and women cheering, you wonder over to them and seeing that they are playing a game of dice.\n\nPatron: Ha I win again, cough up. \n\nA young man slides over a pouch of coins and the other grabs it.\n\nYou watch curiously as one of the table notices.\n\nPatron 2: Fancy a go friend?\n\n${name}: How do you play?\n\nA seat is pulled out for you and you sit down.\n\nPatron 2: Quite simple we all call out a number and if the dice roll to your number you win but if it doesn't you lose.\n\n${name}: But what if multiple people are playing?\n\nPatron 2: Well then lets say you call 5 right? well those who are closet to it stay in the game, the further away you then you are most likely kicked out of the round.\n\nThe game does sound simple and yet it doesn't but you give it a try regardless.\n\nYou get better and better as the hours pass, soon its between you and one other patron, you call a five and the dice does indeed roll a five, you win!\n\nEveryone cheers at your victory and the loser hands over your winnings.\n\nYou continue to play and chat with the locals enjoying the night away from home for the first time in days perhaps weeks.\n\nThe night draws to close and you consider your options.\n\n*choice\n     *selectable_if (mal = true) #Find a woman to sleep with.\n        *goto morningof\n\n     *selectable_if (fel = true) #Find a man to sleep with.\n        *goto morningof\n     #Call it a night.\n         *goto morningof\n\n\n*label Walk\nYou struggle against the rope that binds your hands but you're set free.\n\nWhile you rub your aching and sore wrists you see Kade walk off with the mercenaries but not before he looks at you as if to say ''I'm sorry''\n\nYou are relieved to be free and after what Kade pulled on you you're glad he's getting what's coming, Kade is bound by the wrists and dragged away.\n\nAn elderly man rests his hand on your shoulder, you turn to him.\n\nElder: It is hard to watch a life be sold by their own hand because of their own actions.\n\n${name}: I'm just glad that my ordeal is over.\n\nThe Elder looks at you in disappointment.\n\nElder: I disagree but I won't argue, come stay at your humble village for the night.\n\n${name}: Thanks but no disrespect who are you?\n\nElder: I am the village elder, come walk with me a moment.\n\nYou walk at the elders pace and he shows you around the village full of humble people who work to make a living, most raise animals or grow crops, others work in the village tavern or blacksmith.\n\nElder: Night is nearly here young one, perhaps the Inn has a room available.\n\nYou thank him and make your way to the Inn.\n\nWalking into a place of drink chatter and banter, you walk up to the front and ask if there are any rooms left and you're in luck because their are quite a few.\n\nYou purchase a room for the night and order a drink, turning to see a group of people of both men and women cheering, you wonder over to them and seeing that they are playing a game of dice.\n\nPatron: Ha I win again, cough up. \n\nA young man slides over a pouch of coins and the other grabs it.\n\nYou watch curiously as one of the table notices.\n\nPatron 2: Fancy a go friend?\n\n${name}: How do you play?\n\nA seat is pulled out for you and you sit down.\n\nPatron 2: Quite simple we all call out a number and if the dice roll to your number you win but if it doesn't you lose.\n\n${name}: But what if multiple people are playing?\n\nPatron 2: Well then lets say you call 5 right? well those who are closet to it stay in the game, the further away you then you are most likely kicked out of the round.\n\nThe game does sound simple and yet it doesn't but you give it a try regardless.\n\nYou get better and better as the hours pass, soon its between you and one other patron, you call a five and the dice does indeed roll a five, you win!\n\nEveryone cheers at your victory and the loser hands over your winnings.\n\nYou continue to play and chat with the locals enjoying the night away from home for the first time in days perhaps weeks.\n\nThe night draws to close and you consider your options.\n\n*choice\n     *selectable_if (mal = true) #Find a woman to sleep with.\n        *goto morningof\n\n     *selectable_if (fel = true) #Find a man to sleep with.\n        *goto morningof\n     #Call it a night.\n         *goto morningof\n\n*label morningof\n*set Health + 20\nThe sun rises and you with it, you get dressed and head down the stairs to order some breakfast.\n\nIt's not the best, a simple porridge and bread but its better then nothing you thank the Inn keeper and his staff before leaving.\n\nYou notice the village elder and thank him for his villages hospitality and he smiles as you start your long journey home.\n*goto Formorian\n*label Formorian\n\n", "chapter_three": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Come back in a few minutes to play the next part of [i]Formorian War[/i]!\n\n    Or, you can buy the game now to skip the wait.\n\n    *purchase_discount adfree 2022-06-23 $4.99 $2.99 purchased\n    *delay_break 1200\n\n*label purchased\n\nWhat of the Elves? Did you have them fight in your army? if so where would you like them?\n\n*choice\n    *selectable_if (elf = true ) #elf archers at the back\n        *goto Arrange\n    *selectable_if (elves = true ) #elf warriors at the back\n        *goto Arrange\n    #No I did not have elves\n        *goto Arrange\n\n*label Arrange\nThe time has come, its nearly winter by this point and if you don't defeat the formorians now you will have to wait till spring.\n\nSo with this in mind, how will you arrange your forces?\n\n*choice\n    *selectable_if (all = true ) #Have the Witch and Dragons at front\n        *set Army - 5\n        *goto Monster\n    *selectable_if (Tudor >= 50) #Danna and the Tudor army at front\n        *set Army - 10\n        *goto Leader\n    *selectable_if (Saxon >= 50) #Marcus and the Saxon army at front\n        *set Army - 5\n        *goto Lead\n    #You take the lead at the front\n        *set Army - 10\n        *goto Clash\n\n*label Monster\nChoosing the Dragons for the front lines proved to be quite effective, Hera loses a small dragon or two but she has made\nthe impact you needed her too.\n\nThe rest of your army charges and collides with the horde.\n\nThe high dragon that is always by her mistress side flies high and breaths fiery death, many smaller dragons fly around the formorians \nand doing battle with the winged formorians in the sky.\n\nThis allows your army to focus on the ground forces.\n\nArrows fly on both sides striking a dragons wing and they plummet to the ground, Hera rushes over and blasts the Formorians near the dragon.\n*goto Clash\n\n\n*label Leader\nDanna makes a short speech to her troops before charging into the horde, the flying formorians keep clawing and slashing which cause\na few problems despite the archers best efforts.\n*goto Clash \n\n\n*label Lead\nMarcus makes a short speech to his troops before charging into the horde, the flying formorians keep clawing and slashing which cause\na few problems despite the archers best efforts.\n*goto Clash\n\n\n*label Clash\nThe battle rages on and on, bodies drop to the ground never to rise again.\n\nYou're getting closer and closer to the lake of avalon to the Isle, the Queen along with several Sidhe warriors help clear a path for you.\n\nSidhe Queen: Take the shards and two of my warriors with you for the book is written in a language that only we and the formorians\ncan read, they will translate for you.\nNow show the sword and the path will open for you.\n\nYou thank her and do so.\n\na bridge of light emerges from the Isle allowing you and the warriors to cross safely, you can only hope that your companions are still alive\nwhen you return.\n*goto Enemy\n\n*label Enemy\nHere you are after what feels like years, you're back on the Isle but it's clearly changed since the formorians returned.\n\nWhat was once a warm and safe place is now cold, dangerous and dark, you cautiously walk towards the nethergate at the centre.\n\nIt towers you and the two warriors, surrounded by the book pages and two huge horned pillars, instead of an actually gate rather you gaze at\na blood red mist, it must act as the gateway.\n\nYou remember the Queens words, in order to close it you must use magic so with that Knowledge you take out the shards and they fly from your hands\nthe pages fly to the shards and in a flash of light, the book is restored and lands back in your hands.\n\nSidhe Warrior: Now open the pages we will translate for you.\n\nYou open the book and it's written in strange symbols but before any translation can occur you hear a deep voice.\n\n\"I can't let you do this false ${Royal}\"\n\nThe warriors draw their swords but are greeted by a giant Formorian with huge horns on his head, he must be at least 9ft tall.\n\n${name}: It can't be, you were just a nightmare.\n\nHe just laughs, the warriors attack but their swords bounce off him, he grabs them both and snaps their spines then throws them into the lake.\n\nRaygor: There now we're alone and you  may call me Raygor.\n\n${name}: How can you speak? and why did Alfred betray his own people?\n\nHe laughs at you.\n\nRaygor: He had his own ambitions and I needed someone to free us so I spoke to him through his dreams and easily managed to convince him.\nHe found the book within the temple and I translated it for him, once the nethergate was created and opened our time had come and so I allowed him to do his business but he had no idea\nthat I had intended to finish him off once his usefulness had come to an end, you destroyed my new body for before I could only interact through the crystal until you destroyed it but now you see it was all for nothing.\n\nYou notice he ignored your first question but you move past it.\n\n${name}: I will stop you.\n\nRaygor: Will you now? ask yourself this how will you do that and why.\n\n${name}: I will drive the sword of the Sidhe through your black heart, I am who the prophecy spoke of.\n\nRaygor: Are you though, think about it for a minute.\n\n${name}: What are you talking about?\n\nRaygor: I know what has been happening, who lead you to the Sidhe, who freed the minds of your men and who saved you from certain death when my kind first attacked.\nThe sword did and not you, it seems clear to me that you're are nothing more then a pawn for the Sidhe.\n\n${name}: Thats.....that's not true.\n\nRaygor: Oh but it is and you know it is, you're just too scared to admit it.\n\n*choice\n    #No you're wrong.\n        *goto Raygor\n\n    #Maybe he's right\n        *goto Lose\n        \n\n*label Lose\nYou freeze in place and throw the sword in the lake.\n\nRaygor: There now, it's okay we all make mistakes.\n\nRaygor then swats you away like a fly and you smash into a stone wall, you die shortly after.\n*goto death\n\n*label death\nYou have died.\n\n*label Raygor\n${name}: You're wrong, The sword and I are partners and together we will win.\n\nRaygor's face turns to rage he growls and then roars so strong that it knocks you to the ground.\n\nRaygor: You fool!!! If you truly wish to die then death you shall have.\n\nHis large fist swings at you and you manage to dodge just in time but you stumble and lose your balance.\n\nThe gate remains open and more formorians pour out of it and head towards the mainland.\n\nOn the mainland the reinforcements arrive and despite the best efforts, you start losing soldiers left and right.\n\nMorganna ready's another arrow but is knocked down by a flying formorian, Dagonet fighting against a a different sort, it's smaller then\nhe is but its quick and easily manages to bite down on his leg, as he screams in pain he kills it only to be swarmed by 3 more.\n\nSidhe warriors kill many by the dozen but are overwhelmed and even the Queen struggles to hold them off.\n\nBack on the Isle things are not much better.\n\nRaygor moves to punch you.\n\n*choice\n  #Duck and attack his leg\n   *if (Agility >= 50)\n    *goto Leg\n   *else \n     *set Health - 20\n    *goto whoops\n  #Block his arm and slash it\n   *if (Combat \u003c= 50)\n    *goto Block\n   *else \n    *set Health - 15\n    *goto doh\n\n*label Leg\nYou manage to duck and spin around to his back leg, cutting it deeply.\n\nRaygor grunts and is clearly even more angry now.\n\n*goto Gate\n\n*label whoops\nYou try but you're not quick enough, his fist hits you in the jaw and you fall holding it in pain.\n\n*set Health - 25\n*goto Gate\n\n*label Block\nYou block his fist with the sword, slicing his hand.\n*goto Gate\n\n*label doh\nYou try and block but fail, Raygor hits you in the face.\n\n*set Health - 5\n*goto Gate\n\n*label Gate\nRaygor: You can't win, your friends and allies will die and we will destroy this pathetic kingdom.\n\nYou quickly realise that it is useless to attack Raygor, the gate is the true target.\n\nMeanwhile on the mainland things are getting desperate, you are losing hundreds of people and will lose more the longer the \nfight goes on.\n\n*set Army - 30\n\nTo beat your enemy you must know them, you try and focus on what you know about the gate.\n\n*choice\n     *selectable_if (Knowledge > 40) #Close it by Magic\n        *goto Hope\n\n    #Screw it, Attack\n        *goto Fool\n        \n\n    #Try to slip past and hope\n        *goto Hope\n        \n*label Fool\nYou run towards the gate screaming a battle cry but before you can reach it Raygor steps in front of you.\n\nRaygor: Foolish child.\n\nHe lifts you up in one hand and you drop the sword, you struggle and struggle but it makes no difference.\n\nRaygor snaps your neck and tosses your body away.\n*goto death\n\n*label Hope\nWith tremendous speed, you get past Raygor, raise the sword and attack the gate.\n\nRaygor screams no and charges at you, he nearly impales you with his horn but before he does, a powerful force forces him back.\nThe gate starts to produce red lighting shooting everywhere in no particular direction, the gate starts to collapse in on itself.\n\nAs you try to escape the gate explodes with such forces that you are slammed into a stone pillar \n\n*set Health - 15\n\nRaygor gets up and his face is red hot with rage, he stumbles over to you and picks you up by the neck.\n\nRaygor: You have ruined everything.\n\nHe starts to say more but you manage to stab with deeply with the sword, he lets you go and screams in pain clutching his wound.\n\nIt appears that the gate kept him from harm and now that it's gone he can be killed.\n\nKnowing this you don't let up, summoning all your remaining strength you shove the sword downwards and Raygor dies in agony.\n\nExhausted you lean against the stone pillar you were before and ponder your next move.\n\nOn the mainland the formorians know that the gate and their leader are gone, they quickly become disorganized making them easy targets.\n\nA few hours pass, the edge of the valley and the surrounding area are littered with bodies, weapons and the stench of death.\n\nMorganna is bloody and out of breath when she finds the Sidhe Queen.\n\nMorganna: ${name} did it.\n\nSidhe Queen: Indeed, the only question that remains is do they live.\n\nA flash of light appears and you are back on the mainland.\n\nMorganna runs up and gives you a hug, when Dagonet finds you he does the same.\n\nSurvivors of the battle are over joyed that you were successful but there is still much to do.\n\n*goto Work\n\n*label Work\n\n\n", "chapter_two": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Come back in a few minutes to play the next part of [i]Formorian War[/i]!\n\n    Or, you can buy the game now to skip the wait.\n\n    *purchase_discount adfree 2022-06-23 $4.99 $2.99 purchased\n    *delay_break 1200\n\n*label purchased\nAnother month goes by and then it happens, a huge bolt of lighting comes from the Isle causing a massive wave to hit Albion, killing hundreds of people.\n\nYou pray that the druids made it out alive as no one has heard from them since you pulled the sword.\n\nOver the course of a week, reports fly in about winged demonic creatures start pouring into Albion, killing everyone they see, panic and chaos quickly sets in,\nthe land turns from lush and green fields and landscapes to a dark and dead wasteland, no doubt where the Formorians are based.\n\nBattles are fought and lost from all sides, it's clear that unless the families unite then it's hopeless but even then it may not be enough, you argue this case to your father.\n\nUther: ${name} this is madness they will never agree to ally with us, not even to save this land and don't forget many still don't believe in the prophecy.\n\n${name}: That does not matter Father, we need them if we even have a chance at survival.\n\nYour father ponders your words carefully.\n\nUther: Perhaps but right now we need to focus on our own survival.\n\nYou storm out of the main hall and in the courtyard where you see several riders approaching, their faces covered, the guards stop them and demand they reveal themselves which they do.\n\nIt's Morganna, what's she doing here you think to yourself.\n\nHelping her off her horse, she holds you tight, you escort her and her men to your father.\n\nUther demands an explanation and before you give him one Morganna speaks first.\n\nMorganna: I'm sorry for this my lord, I humbly ask to seek asylum in Camelot.\n\nAfter explaining that the saxons were struck first, Kalid thought it best that she seek refuge at Camelot while the saxons battle the Formorians.\n\nUther turns to you and asks your opinion.\n\n*choice\n    #Of course she can stay\n        *set Morganna + 10\n        *goto Liabury\n\n    #This isn't a good idea\n         Morganna moves in anyway\n        *set Morganna - 10\n        *goto Liabury\n\n*label Liabury\n{From Morganna's perspective}\n\nYou enter the library and are shocked to find it is bigger then you expected, there are rows and rows of shelves filled with books.\nYou notice a scholar walking to you, he looks to be a man in his 50s with a head of grey hair and beard, he introduces himself as Ralph.\n\nRalph: Ah hello my lady, how can I help?\n\nMorganna: Hello and I was just exploring, what kind of books do you have here?\n\nRalph: All kinds, any book in particular?\n\nMorganna: I've always been interested in history.\n\nRalph: Ah then may I recommend this.\n\nRalph walks over to a shelf and runs his finger across the books till he sees the one he wants and hands it to Morganna.\n\nRalph: The history of the kingdom of Albion.\n\n(Now Playing As MC)\n*goto Train\n*label Train\nYou are spending more and more time training with your men who are using a variety of methods as some attack dummies made of hay, while others fight each other with wooden weapons.\nMorganna steps out in plain clothes usually worn by servants, she grabs a wooden sword and walks towards you.\n\nMorganna: Perhaps you could use a real opponent?\n\nYou turn to face her.\n\n${name}: Perhaps.\n\nAt this time other soldiers are noticing, some laugh while others give weird looks at Morganna.\n\nSolider 1: Oh that's so cute, she thinks she can hold her own against trained warriors.\n\nSeveral murmur in agreement, you stare at the solider in disgust.\n\nMorganna: You know what, lets fight one and one and then we will see if I can hold my own.\n\nLaughter erupts but the solider accepts the challenge, grabbing his wooden sword and shield.\n\nSolider 1: You're going to regret this.\n\nMorganna: Oh I'm sure.\n\nMorganna and the solider circle each other while everyone forms a fairly sized circle around them, some cheer their fellow solider while others remain silent.\n\nYou have never seen Morganna fight before so you join your fellow men and remain silent observing the duel.\n\nThe solider charges at Morganna, grunting as he does but to everyone's surprise including yours Morganna simply moves to one side and trips him.\n\nHe gets back up quickly clearly angry at what seems to be an embarrassing moment.\n\nHe charges at Morganna again swinging his sword, she ducks he strikes again at her right arm which she dodges.\n\nSolider 1: Stop being a coward and fight me!!!\n\nMorganna: If you insist.\n\nCharging at Morganna once he raises his sword to strike but to everyone's surprise even yours once more, she blocks it.\n\nThe solider is in shock so much so that he doesn't notice Morganna punch him.\n\nHe stumbles and drops his shield, she then uses this advantage to grab it and bash him in the face, the solider falls to the ground bleeding from the nose.\n\nEveryone cheers while a few help their fellow solider up and take him to the medics.\n\nYou don't cheer, instead you smile and clap Morganna notices and winks at you.\n*goto War\n\n\n*label War\n*image Start.png\nWithin weeks the Formorians have a firm hold on a part of the Saxon lands despite their efforts, Kalid's body is brought back to Lancaster and Marcus is officially made Lord.\n*goto Lor\n\n\n*label Lor\n[From Marcus Perspective]\n\nCouncilman: Ah my lord, Tis good you have joined us.\n\nMarcus: Let's not delay, What is to be done about these monsters?\n\nCouncilman: The south-east is lost and many are dead.\n\nGeneral: However much of the army is still intact and we have had a surge of recruits as of late.\n\nMarcus: Good, we will need them for what I have planned.\n\nGeneral: And what is that my lord?\n\nMarcus: We already have Alfred on our side and now we take Camelot either through peaceful means or by force.\n\nCouncilman: Then we go through Dragons peak?\n\nMarcus: Yes, we may still get detected due to the army size but we would be easier spotted by other means.\n\nCouncilman: I'm sorry my lord but what is the reason for this?\n\nMarcus: The others are our enemy, we take them out and not only do we rule the land as the Maker intends but we also get more\nsoldiers for the army.\n\nGeneral: But should we not reserve our men for the Formorians instead of each other?\n\nMarcus; My army grows smaller with each passing week, this must be done.\n\nThe council looked at each other with worry, perhaps they are scared to question Marcus.\n\n*goto Lord\n\n*label Lord\nMarcus plans to deal with the Formorians is the same as his father, brute force however this quickly proves to be ineffective because even though the Saxons have success after success it ever seems to be enough.\n\nThings aren't going so well for the Tudors or your family either, the Tudors have suffered a plague, could the formorians be in their lands too? or is it unrelated, just then \na servant bursts into your room and tells you that your father is gravely ill.\n\nYou rush to your fathers side and are shocked by the sight, his skin very pale with small blue veins all over his face, his voice sounds rough and he is struggling to breath,  the doctors tell you that they have tried everything but nothing has worked, they also suggested magic but Uther refused.\n\nUther tries to speak but no words come out, what is this sickness? what evil is this?\n\nThe doctors direct you to the letter next to Uther's bed, Uther nods in agreement, the moment you take the sealed letter, Uther states his final words \n''I will always love you and you make me so proud''.\n\nAnd just like that, Uther ${family} is dead.\n\nOverwhelmed with emotion you kneel and cry next to your fathers body, the doctors lower their heads in sorrow, guards and servants are told the news then it's spread throughout Albion.\n\nMorganna tries to comfort you and then you receive a letter from Dagonet.\n\n''  ${name} I am so sorry for your loss, I recently lost my own father to an illness, he died from the same disease, I know how you feel my friend and I hope that our families can come together and join forces against this threat so that no one else loses a loved one the same way we did, Lord Dagonet''\n\n\n*choice\n    #Improve relationship\n        *set Dagonet + 20\n        *set Tudor + 30\n        *goto Un\n    #Turn him down\n        *set Dagonet - 5\n        *set Tudor - 10\n        *goto Un\n\n*label Un\nAnd that's that, you are official Ruler of Camelot but you're also the last of your line, the last ${family}.\n\nMany new challenges await you but for now the formorian threat must be dealt with.\n\nOne day when you're having a council meeting, a scout barges in, he quickly apologises but then reports that Marcus is marching towards Camelot with an army.\n\nYou are puzzled by this because surely he should save his resources for the formorians not you or Dagonet but that doesn't matter now.\n\nWhat's the plan?\n\n*choice\n    #Gather your forces\n        *set leadership + 10\n        *goto Battle\n    #Build up defences\n        *set Combat + 10\n        *goto Battle\n    #Do nothing \n      The council scold and convince you.\n      *set leadership - 20\n      *goto Battle\n\n*label Battle\nYou cannot ignore this threat to your land so you ride out with your men and meet the Saxons on the border of your land.\n\nAn arrow flies to you, your men hold their shields up and you do the same but it lands near your feet, it has a parchment attached, despite the tiny hole in it you are still able to read it.\n\n'' This is your last warning, join me to defeat this demonic foe or I will take your land by force''\n\nYou tell your generals to hold the line, you get on your horse and ride towards Marcus and obviously many protest even some call you insane.\n\nYou are now standing in front of Marcus, you sheathe the sword of the Side and hand it to him.\n\nMarcus looks puzzled but you explain.\n\n${name}: Marcus, we have both lost so much and I don't want to lose anymore so please if you truly believe that you are the one who will unite this kingdom again then strike me down but spare my men.\n\nYou kneel before Marcus and as expected he prepares to strike your head off your shoulders but then he hears it, the song of the Sidhe, Marcus starts to cry and looks at the sword still in his hand ready to strike.\n\nMarcus: Forgive me ${name} you truly are the one of the prophecy.\n\nMarcus hands you the sword back and declares that there will be no battle.\n\nSoldiers cheer from both sides and Marcus offers that you work together to battle the real enemy.\n\n*choice\n    #Accept help\n        *set Saxon + 20\n        *goto crowd\n    #Decline\n         *set all \"false\"\n         *set Saxon - 10\n         *goto crowd\n\n*label crowd\nYou return to cheers and praise, the people have clearly heard about what you were willing to sacrifice for them and your soldiers.\nThe guards struggle to hold the crowds back many cheer but others jeer, the reason for this is that yes you secured a temporary truce with the Saxons however things at home aren't all sunshine and rainbows, you walk your horse into the centre of the crowd so you can speak to them all.\n\nPeasant 1: My family and I are starving.\n\nPeasant 2: The formorians will kills us all and you won't even try and stop them.\n\nPeasant 3: At least Uther knew how to govern.\n\nTry as you might it's very hard to hear because so many people are speaking at once, you raise your hand signalling for everyone to be quiet and let you speak.\n\n${name}: Please everyone I implore you, now is not the time to be divided, know that I understand your fears but have faith good people because together we can win.\n\nYou hear sarcastic clapping approaching, It's Alfred, a nobleman who claims dragons peak.\n\nAlfred: A fine speech ${name} but no one hear believes you, why should we trust a man who not only turns his back on the maker but who already divides us with his lack of leadership.\n\nthe crowd begins to murmur in agreement this isn't looking good and fact he addressed you by name shows how little he respects you.\nAlfred has claimed for years that he owns dragons peak and the surrounding land therefore the villages living in the area should pay taxes to him, your father always denied his claim stating that he had no proof and now it looks like he's is trying to stage a rebellion of sorts.\n\nOnce again the question arises and people demand an answer on who you serve, the maker or the old gods.\n\nYou were never one for religion but you must look into your heart and find faith.\n\n\n*choice\n #I serve the maker\n      *set maker + 20\n      *goto oh\n\n #The old faith and gods\n      *set maker - 20\n      *goto oh\n\n*label oh\nThe crowd falls silent and then claps, perhaps to show support or are they pity claps?\n\nAlfred does not say a word but simply bows and leaves.\n\nAfter answering a few questions from the crowd, the city guards disperse them so now you can finally go about your day.\n*goto Task\n\n*label Task\nNow that's sorted you remember the letter that you're father left you before he died.\n\n'' My dearest ${name} I hope that you can forgive me for not always being there for you before this crisis but know that I love you with all my heart, being leader will not be easy but remember to trust your instincts and listen to your advisors and please follow these instructions and heed this warning before I became ill I was visited by a druid who told me that they did indeed escape the Isle but he told me that you must unite the realm in one single cause to defeat the formorians but he also said it won't be enough, you need to find the Sidhe.\nYou must make haste to benigrade forest and seek them out, I know this is a dangerous task but there is no other way\nLove always Lord Uther''\n\nYou wipe the tears from your eyes when you hear a knock at your door, you answer and it's Morganna, she asks if you're okay and obviously you're not.\nHours go by, while you're talking about your great great grandfather as told by your father, you realise that the sun is setting, have you really been talking to Morganna this whole time?.\n\nCould it be grief or more?\n\n\n*choice\n    *selectable_if (mal = true ) #I have romantic feelings\n        *set Morganna + 30\n        *goto Love\n    #No it's just grief\n        *set Morganna + 20\n        *goto Friend\n\n*label Friend        \nYou tell Morganna that you really appreciate she staying with you and listening you.\n\nshe says it's okay and you carry on talking about a variety of topics including elven history and your great great grandfather.\n\n*goto Attack\n\n*label Love\n${name}: Morganna, I really appreciate you staying with me.\n\nMorganna says it's okay but before she can say anymore you kiss her, she pulls away but quickly returns your kiss.\n \nThe kissing turns into passionate kissing then before you know it, clothes come off thus beginning a night of passion.\n\nOnce everything is uhhhh said and done Morganna hides her breasts with the covers and asks you a random but important question.\n\nWhat's your opinion on elves?\n\nA bit surprised by the question because you just made love to an elf so surely you have nothing against them right? or was it simply for pleasure and you actually don't like elves?\n\n*choice\n     #I have nothing against elves\n        She smiles then kisses you, then your neck, then chest then stomach, you know where this is going\n        *set Partner Par\n        *set Morganna + 10\n        *goto Attack\n\n  #This is akward\n      *set Morganna - 40\n      *goto akward\n\n*label akward     \n${name}: I'm sorry Morganna but\n\nBefore you could finish what you're going to say, she slaps you and as she's getting dressed she calls you a pig and tells you that if you really want to be with her you have to accept her being an elf, she then leaves your room.\n\nFeeling awful you get dressed and slam the table with your fist.\n\n*goto Attack\n\n*label Attack\n(Playing as Dagonet)\n\nYou stand with your council members discussing the recent events among other things that come with being lord.\n\nYour little sister Danna runs into the room dressed in plated armour and tells you that Evergreen is under attack.\n\nDagonet: By who? the Saxons or ${family}?\n\nDanna: Neither, its the formorians.\n\nEveryone looks at Danna in shock and disbelief.\n\nCouncilman 1: This isn't possible.\n\nCouncilman 2: We were warned and we didn't listen, the maker is punishing us.\n\nDagonet: Calm down everyone, Danna what's the situation?\n\nDanna: It's bad\n\nDagonet: How bad?\n\nA solider crashes through one of the top windows screaming as he crashes to the floor dead.\n\nDanna: That bad.\n\nYou leave your castle to see that the formorians have broken through the gate and it's a slaughter as the bulk of the army is else where.\n\nDagonet: Oh my gosh, we have to do something.\n\nYou start to walk to attack but Danna stops you.\n\nDanna: I've tried, Evergreen is lost and we must get out of here.\n\nDagonet: I won't leave our people.\n\nDanna: Brother if the formorians take over the country, it won't matter now come with me please!\n\nReluctantly you nod your head in agreement and with that Danna leads you to a horse with a saddle and bridle already on it, was she preparing for this?\n\nYou get on the horse after Danna and the horse seems to explode out of the stables, you nearly lose your balance.\n\nThe horse tramples all of the weak formorians but others were trying to kill it, you and your sister tried to stop them.\n\nWith a bit of luck you manage to break through the formorians and out of the broken gate, riding as far as possible.\n\nOnce you are just beyond seeing the castle with your own eyes, the horse stops and yourself and Danna make camp for the night,\nby the time you build a fire and take out your blankets to lie on it is already dark, Danna sit next to you and turns to face you.\n\nDanna: We shall ride on in the morning to find the army and retake Evergreen.\n\nDagonet: Sounds like a good plan but where is the army? do you know?\n\nDanna: I have a hunch but nothing more.\n\nDagonet: Oh well that's just great isn't it.\n\nDagonet say's sarcastically.\n\nDanna: Sarcasm won't help brother.\n\nYou both suddenly hear a voice from behind that said ''No it will not''\n\nSpinning around, drawing your sword you demand to know who they are.\n\nDanna also turns to see and is stunned, a Sidhe archer stands before you both.\n\nSA: I am only a messenger, my Queen has sent me. \n\nDagonet: What is this message you speak of?\n\nSA: You who are called Dagonet must find the one of the prophecy and aid them in their quest and as for you the one called\nDanna, you must ride on alone to find your army.\n\nDanna: Why?\n\nSA: The one of the prophecy is destined to defeat the formorians and reunite the kingdom of Albion, yet they can not do so without help.\n\nDagonet: I see, very well we shall do as you ask.\n\nSA: I am grateful.\n\nThe Sidhe archer bows and leaves.\n\n(The next scene you continue playing as your MC)\n\n*goto journey\n\n*label journey\nThe next day is far from relaxing, reports again start pouring in that the formorians are gaining ground and everywhere they go, death and decay follow which causes hundreds of people to flood to Camelot.\n\nAfter working with the council you manage to set up some kind of camp for these people who's number grows every day, which means more resources are needed to help them.\n\nAll this and more plague your mind but you have decisions to make, you are reminded of what your father wrote before he died, to seek out the Sidhe in the benigrade forest, perhaps it's time to try and find them because having another ally never hurts right? you meet one before all the happened.\n\nOnce the council have been informed and persuaded that this is the best course of action, you are told that they will lead in your stead.\n\nAs you put on your amour and make preparations to travel, Morganna enters your chamber.\n\nMorganna: I know this going to be dangerous but I would like to come with you.\n\n${name}: No it's too dangerous\n\nMorganna: Well I'm coming regardless of what you say, see you outside.\n\nShe leaves your chambers and you sigh.\n\nMeeting Morganna outside the gates, you get on your horse and you both make your way to the forest, she has traded her dress for light leather amour carrying a bow and arrows.\n\nNow that you think about it, it's good that Morganna is coming with you, she grew up in the Saxon lands so she could be a useful guide.\n\nYou both make camp just within the Saxon territory, Morganna catches you staring.\n\nMorganna: I imagine all the armour and horse riding isn't something you normally see women do and wear?\n\n${name}: No, not really\n\nSuddenly you both hear a rustle in the bush, preparing for an attack, a man emerges from the bush, he's alone and you know him it's Dagonet.\n\nDagonet: Relax it's just me I'm here to help you with your quest to seek the Sidhe.\n\n${name}: How do you know that?\n\nDagonet: I have my ways.\n\nOne extra sword couldn't hurt you think to yourself so you rest for the night.\n\nYou find yourself surrounded by fog, walking aimlessly trying to find your way you see a glow in the distance, running towards ithe glow it gets brighter and brighter, it's the sword of the Sidhe singing it's song, you reach for it only for the sword to stop singing and turn black, screeching at you.\n\nWaking up in a cold sweat, breathing heavily you wonder what that dream means.\n\nThe next day, you and your companions continue traveling but the peace doesn't last long, several flying formorians attack you with incredible speed.\nswinging your sword you struggle to even hit them let alone wound them, hearing a scream from behind you, you turn and Morganna has been scratched and fallen off her horse, Dagonet dismounts and runs to help her only to be knocked down by another formorian but this one runs on four legs, is as big as a bull but has a jaw like a crocodile with razor sharp teeth, you dismount and run to your companions but in the chaos the horses run away.\n\nGetting in between your companions and the beast, sword raised the formorian roars at you meanwhile the flying formorians try to attack you, swinging the sword of the Sidhe you hear the song again as do your companions, striking a formorian in it's wing makes it unable to fly, the monster crashes to the ground, the beast swings its claw at you.\n\n\n*choice\n     *selectable_if (Agility > 30) #Move out of the way\n        *set Agility + 10\n        *goto Agility\n     *selectable_if (Combat > 30) #Strike back\n        *set Combat + 10\n        *goto combat\n     #Call to the others for help\n         *goto Help\n\n*label Agility\nYou mange to successfully avoid the attack and hit back with one of your own, cutting the beast's face, screaming in pain the beast runs and the remaining flying formorians flee.\n\nMorganna is checked and asked if she's okay, her wound on her arm is cleaned and bandaged, she looks pale but may live but now you have no horses and are many days away from the forest, you all agree that it's too dangerous to stay where you are so you all keep going.\n\nAlthough without horses it will take you even longer to reach the forest and since the attack you are all on edge, more could be around, Morganna struggles to keep up having to be supported by you and Dagonet but this quickly turns to carrying her.\n\nMorganna: ${name} put me down please.\n\nYou gently rest Morganna against a tree, she looks up and you and Dagonet are shocked, her pale face has nearly lost all colour, small blue veins are appearing around her neck and she has started to cough.\n\nDagonet pulls you aside so Morganna can't hear you.\n\nDagonet: She's sick, she's got the same illness that killed our fathers.\n\n${name}: There must be something we can do, there's got to be a way to cure it\n\nDagonet shakes his head\n\nDagonet: I don't think so, look ${name} you know as well as I do that there is only one way to free her from her suffering.\n\nYour heart sinks, can you really kill someone in cold blood? wouldn't it be merciful to end her pain?\n\n*label combat\nYou mange to deflect the claw causing some discomfort to the beast and you also manage to cut the beast's face, screaming in pain the beast runs and the remaining flying formorians flee.\n\nMorganna is checked and asked if she's okay, her wound on her arm is cleaned and bandaged, she looks pale but may live but now you have no horses and are many days away from the forest, you all agree that it's too dangerous to stay where you are so you all keep going.\n\nAlthough without horses it will take you even longer to reach the forest and since the attack you are all on edge, more could be around, Morganna struggles to keep up having to be supported by you and Dagonet but this quickly turns to carrying her.\n\nMorganna: ${name} put me down please.\n\nYou gently rest Morganna against a tree, she looks up and you and Dagonet are shocked, her pale face has nearly lost all colour, small blue veins are appearing around her neck and she has started to cough.\nDagonet pulls you aside so Morganna can't hear you.\n\nDagonet: She's sick, she's got the same illness that killed our fathers.\n\n${name}: There must be something we can do, there's got to be a way to cure it\n\nDagonet shakes his head\n\nDagonet: I don't think so, look ${name} you know as well as I do that there is only one way to free her from her suffering.\n\n*choice\n     *selectable_if (Partner = Par) #But I love her, I can't\n        *goto Druid\n        \n\n    #I can't do it.\n        *goto Druid\n        \n\n    #I have no choice.\n        *goto Kill\n       \n*label Help\n${name}: Dagonet, Morganna help me please!!\n\nResponding to your call, Dagonet gets up and cuts the beast in it's face, screaming in pain the beast runs and the remaining flying formorians flee.\n\nMorganna is checked and asked if she's okay, her wound on her arm is cleaned and bandaged, she looks pale but may live but now you have no horses and are many days away from the forest, you all agree that it's too dangerous to stay where you are so you all keep going.\n\nAlthough without horses it will take you even longer to reach the forest and since the attack you are all on edge, more could be around, Morganna struggles to keep up having to be supported by you and Dagonet but this quickly turns to carrying her.\n\nMorganna: ${name} put me down please.\n\nYou gently rest Morganna against a tree, she looks up and you and Dagonet are shocked, her pale face has nearly lost all colour, small blue veins are appearing around her neck and she has started to cough.\n\nDagonet pulls you aside so Morganna can't hear you.\n\nDagonet: She's sick, she's got the same illness that killed our fathers.\n\n${name}: There must be something we can do, there's got to be a way to cure it\n\nDagonet shakes his head\n\nDagonet: I don't think so, look ${name} you know as well as I do that there is only one way to free her from her suffering. \n        \n*label Kill\nTurning to Morganna, sword in hand and tears in your eyes.\n\nMorganna: it's okay ${name}\n\nRaising your sword above your head, hesitating for only a moment and then just as you are about to strike, a voice calls out yelling at you to stop.\n\nYou jolt backwards and lose your balance, Dagonet is also shocked.\n\nYou both turn around and it's a druid.\n\nAgain this shocked the both of you while Morganna is struggling to stay awake.\n\n${name}: I thought you all died when the formorians arrived.\n\nDruid: We did not young one, now may I ask what you and your friends are doing here?\n\nDagonet: We're travelling to benigrade forest.\n\nDruid: Ah then I must tell you of the many dangers lurking there.\n\nDagonet looks confused but as he's about to question further Morganna coughs again.\n\n${name}: Please she's sick, is there anything you can do?\n\nThe druid walks over to Morganna and inspects her, he then turns to you and Dagonet.\n\nDruid: We must hurry.\n\nBefore you could ask any follow up questions, the druid instructs you and Dagonet to take Morganna  and follow him.\nThe druid leads you to a waterfall north of the forest seemingly untouched by the formorians, once again he instructs you to walk through the waterfall with Morganna.\nDagonet questions it but you don't, taking Morganna from Dagonet who by now is barely conscious.\n\nStepping through the waterfall you suddenly find yourself in a small pool within the benigrade forest, Dagonet and the druid follow shortly after.\n\n*goto Heal\n\n*label Druid\nDagonet turns to Morganna, sword in hand but it's clear he's hiding his unwillingness.\n\nMorganna: Do it.\n\nRaising his sword above his head, hesitating for only a moment and then just his sword strikes, a voice calls out yelling at him to stop.\n\nYou jolt backwards and lose your balance, Dagonet is also shocked.\n\nYou both turn around and it's a druid.\n\nAgain this shocked the both of you while Morganna is struggling to stay awake.\n\n${name}: I thought you all died when the formorians arrived.\n\nDruid: We did not young one, now may I ask what you and your friends are doing here?\n\nDagonet: We're travelling to benigrade forest.\n\nDruid: Ah then I must tell you of the many dangers lurking there.\n\nDagonet looks confused but as he's about to question further Morganna coughs again.\n\n${name}: Please she's sick, is there anything you can do?\n\nThe druid walks over to Morganna and inspects her, he then turns to you and Dagonet.\n\nDruid: We must hurry.\n\nBefore you could ask any follow up questions, the druid instructs you and Dagonet to take Morganna and follow him.\nThe druid leads you to a waterfall north of the forest seemingly untouched by the formorians, once again he instructs you to walk through the waterfall with Morganna.\nDagonet questions it but you don't, taking Morganna from Dagonet who by now is barely conscious.\n\nStepping through the waterfall you suddenly find yourself in a small pool within the benigrade forest, Dagonet and the druid follow shortly after.\n*goto Heal\n\n*label Heal\nThe Druid leads you to a cave where all the others are, you are told to place Morganna in the centre on a stone slab, its big and wide enough for a human.\nDid the druids plan this?\n\nGently placing Morganna as instructed the Druids surrounded her and begin chanting, you and Dagonet are fascinated by what you both are witnessing.\n\n${name}: What are they going to do with her, do you know?\n\nDagonet: If I had to guess, I would say they are going to try and heal her with magic.\n\nMoments passes and the chanting gets louder, the slab then radiates green fire but you feel no heat, the chanting then stops and the green fire vanishes, the Lead Druid then faces you and Dagonet.\n\nLead Druid: It is done.\n\n${name}: What is?\n\nLead Druid: The cleansing ritual, a magical spell passed down to us by our ancestors who given such power by the Sidhe.\n\nDagonet: Will she be okay?\n\nLead Druid: See for yourself.\n\nYou and Dagonet slowly walk to Morganna and it's remarkable, there are no blue veins and the colour is slowly returning to her face.\n\nLead Druid: She needs rest.\nThe night comes quickly and Morganna is asleep ,looking out of the cave entrance you're so deep in thought you don't realise that Dagonet sits next to you.\n\n*choice\n    *selectable_if (fel = true) #I have feelings\n        *set Dagonet + 30\n        *goto Tudor\n        \n\n    #He's a good man\n        *set Dagonet + 20\n        *goto new\n        \n\n    #I don't trust him\n         *set Dagonet - 30\n         *goto new\n\n*label Tudor        \nYou take Dagonet's finger and begin to suck it, he takes the hint, starts to kiss you and undo your armour, afterwards you are both sweaty and tired, you fall asleep\n*set Partner Car\n*goto new\n\n*label new\nYou find yourself once again surrounded by fog in all directions so thick you can't see two feet in front of you, the fog starts to fade in the distance revealing a large formorian with two massive horns on either side of it's face, huge muscles and razor sharp teeth.\n\nYou try to run but are frozen in place, just then it sees you and leaps towards you then you wake up screaming, waking up Dagonet\n\nDagonet: ${name} you alright, what happened?\n\n${name}: yeah it was just a bad dream.\n\nYou find the Lead Druid after eating breakfast and ask him about your dreams, you explain every detail that you can remember about them.\n\nLead Druid: hmmm perhaps the sword dream represents the light and since the formorians are pure darkness perhaps it represents them conquering or corrupting the light and as for the recent one perhaps it's a warning that the formorians will destroy the realm if you fail.\n\nThat doesn't exactly fill you with confidence however he could be wrong.\n\nYou check on Morganna and she isn't on the slab, she isn't even in the cave.\nYou ask Dagonet and the druids and they tell you the same thing that they have not seen her.\n\nRunning outside the cave you instantly feel the magic surrounding the forest, you hear water splash, following the sound down a narrow path you find Morganna trying to fish.\n\n${name}: you're alive.\n\nMorganna: shhhh\n\nShe hurls a spear tied to a rope and catches something, she pulls in a shard made of crystal.\n\nMorganna: what in the world is this?\n\n*choice\n    *selectable_if ( Knowledge = 40 ) #Let me have a look\n         It's a shard of the Sidhe book\n        *set Knowledge + 20\n        *goto flower\n\n\n  #I'm not sure\n       *goto flower\n\n*label flower\nThe druids examine what you have found and confirm its a shard of the Sidhe book that they were searching for, you are instructed to go out and find them.\nYou gather what your weapons and set off, the forest feels strange and you get the sense you're being watched, you find yourself in a large circle shaped field surrounded by forest with beautiful multicoloured flowers, Dagonet comments on their beauty and lovely scent while Morganna starts picking some and smelling them.\n\n*choice\n *selectable_if (Partner = Par ) #Pick flowers for Morganna\n  Morganna thanks you and gives you a kiss\n  *set Morganna +10\n  *goto Forest\n \n #Admire the scene.\n  *goto Forest\n\n*label Forest \nMeanwhile within the deepest parts of the forest, 2 wolves are feasting on their latest kill however it does not last long\nAs they are quickly interrupted and run in fear, birds fly away in terror as a black mist surrounds the trees and vegetation.\n\nA demon like creature appears from the mist only to stop and screech which kills the plants around it, Sidhe warriors appear shortly after\nand strike the monster, it disappears and the plants return to life.  \n\nAt the same time by a scared grove several Sidhe warriors gather in a circle with another Sidhe warrior that is slightly\ntaller and wearing slightly different armour with a crest on it, he appears to be the one in command.\n\nSidhe Leader: Report\n\nSidhe Warrior 1: His shadow appeared once again but this time much stronger.\n\nSidhe Warrior 2: We have had report that we were able to defeat it but we can't do this for much longer.\n\nSidhe Leader: Then we must do as she wishes and ally ourselves with the humans.\n\nThe Sidhe warriors mumble among themselves.\n\nSidhe Leader: The gateway to our home is sealed, we can't get back until the Formorians are defeated.\n\nSidhe Warrior 3: What about Hera? should we ally with her too?\n\nSidhe Leader: If it means we can defeat the Formorians then perhaps.\n\nAs they continue talking a small golden whirlpool be
