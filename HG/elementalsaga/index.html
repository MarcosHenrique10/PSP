out of here. Before another loser comes forth and ruins the day further for us\".\n  \n  You watch her storm away with her quite fashionable dress which stands out from the college scenario, indicating the rich affluence she holds and judging from her demeanour she probably considers herself the queen of the world. \n  \n  Never the less you are in no way letting her ruin the perfect day you have planned for yourself. The only option is to go to.\n\n  *goto depart\n\n # Cute\n  Even though a teachers' pet you find his demeanour somewhat cute with the badges and the coat. He almost looks like one of the beach boys from that TV sitcom you watch, except for the body and the looks. The way that he carries himself with authority makes you want to stay with him longer but given the stare and glares and occasional looks of disgust you are getting from others, it might not be best idea to start your new college with that. \n  \n  You slightly distance yourself from him as you move towards the rear of the pack to quietly slip away to explore the campus by yourself. With time and dedication, you finally manage to find an opening as you make a break for it, slipping around the corner just to bump into a group of giggling girls as you lose your balance and fall over her. \n  *page_break  \n  She pushes you off as she raises herself and brushes off her dress, \"Isn't it early to drink?!\" she barks at you as she turns to the rest of her group, \"Come on, let's get out of here. Before another loser comes forth and ruins the day further for us\". \n  \n  You watch her storm away with her quite fashionable dress which stands out from the college scenario, indicating the rich affluence she holds and judging from her demeanour she probably considers herself the queen of the world. \n  \n  Never the less you are in no way letting her ruin the perfect day you have planned for yourself. You decide to go to.\n  *set Matthew +10\n  *goto depart\n\n*label depart\n*choice \n # Department of Experimental Science\n  The Einherjar University is famous for its state of the art Experimental Science department fielding a wide range of apparatus and setups required for the thirteen Ph. D holder researchers staffed by the university who are competing year round for the different research competitions held throughout the world. \n\n  The department despite its hype does not let you down. You stand at the entrance of the magnificent building made from glass in an ornate fashion as it stands taller than most buildings in the campus. Awestruck by its beauty you stand there until a girl dressed in plain top and jeans with a lab coat in her hand interrupts your momentous moment. \n  *page_break\n  \"Need something?\" She asks in a rather friendly manner as you regain your posture and close your drooling jaw and stumble for words. \n    \n  \"It's okay. The first time I came here I has quite a similar experience. The great experimental science lab with all its equipment and setups.\" She gestures with her free hand towards the entrance in a grand fashion before adjusting her expression to more of sad overtone,\" Well, the novelty wears off. And pretty fast to. Once the curriculum attached to it rolls in.\".\n    \n  A slight disappointment mixes in your expressions and as she realises this she puts a hand on your shoulder before continuing, \"Don't let that discourage you. The thrill of working with the most brilliant minds that you can come across certainly makes it worth it. Trust me if you are here for the same reason I am, then you will have a great time here\". \n     \n  Managing to smile a little you introduce yourself, \"I am ${name}, by the way.\"\n     \n  \"Oh, messy me. I am Rebecca. I intern under the dreaded Dr. Miller by the way\" she snickers as you stand there unaware of the humour related to the one Dr. Miller. Judging your expressions, she simply taps your shoulder saying,\" You will know when you enrol\" with that the strange Rebecca enters the building leaving you stranded at the entrance.\n     \n  Without a I.D you have no means to enter. As such you once again have to join the dreaded group of the teachers' pet to gain an entry. \n  *set Brilliance +10\n  *set Rebecca +10\n  *goto Angrymom\n  \n # Sports Gym\n  The sports 'arena', as the name outside suggests is a grand stage with a huge pool along with an adjacent basketball court next door. A gymnastics room that could easily stage an Olympic event is the highlight of the arena. Other indoor sports like table tennis, squash and badminton also have been included in this package.\n\n  The exterior of the complex mounts a special zone for the baseball, Tennis, lacrosse and a cricket ground covering all the aspects of the sport orientation of the students.\n\n  As you continue reading the board rested outside this arena, you almost start to drool with anxiety to explore this fantastic arena for yourself. But the entry is prohibited to outsiders into the arena, leaving you dejected at the entrance.\n  *page_break    \n  The fate however, seems to be in your favour as a likeminded 'Dud' crashes into you.\n\n  \"Aw man. There goes the hotdog.\" He says staring at the hot dog juiced with mustard lying on the ground out of the bun. He looks up towards you, \"Hey Dud, sorry for that. My bad. Should have watched where I was bumping towards. Anyways...............\" He looks you up and down before continuing, \"You look like, you know, new! Prospective student, I guess?\"\n\n  \"Yea, just taking in the sights. Thought I would waltz around the gym a bit BUT looks like it is restricted to future students.\" You say.\n \n  \"That's crazy man. Know what there is no rule for Kertez, my man. I can get you in but there is charge you know.\" He says grinning like he just won the man of the year competition.\n\n  \"Yea don't got no money on me\" you say as start to turn away from the creep.\n\n  \"Didn't ask you for money. All I am asking if for the name of the pretty ${genderguy}, that's all\" he says with his arm raised to intent no harm, you suppose.\n \n  \"Oh. Its ${name}\" you say as you extend your hand to shake with me but instead he just rolls forth a gives you a bear hug.\n\n  \"Oh man. I am so thrilled a new one looking up to me\" he says beaming as he leads you into the arena past the guard. Apparently he has some repo that other don't mind cutting him some slack.\n\n  Twenty minutes in and you have surveyed inside and out of the arena. If you had any doubt about joining Einherjar they are all disappearing with every minute you spend in this made for the gods' arena. \n\n  On his way out he tells you to look him up once you are in, so that he can show you the ropes. Fine you say and look for the tour group to finalize your decision on the college.    \n\n  *set Dominance +10\n  *set Kertez +10\n  *goto Angrymom\n \n # ExtraCurricular activity dome \n  The dome is basically a smaller version of modified Sydney Opera House. With slightly different curves but still the same overall look the Dome looks very much different than the monotonous buildings around the campus. \n   \n  'Made of Aquiline glass and constructed by the famous architect Hosura from Japan, marks the only ornate structure in the state to be embedded into the World Architecture timeline has the exquisite arrangement meant for maximum utilization of the space to accommodate the Drama, Arts, and Acting and Music Departments without any compromise to their productivity',is what the plaque marks in similar ornate fashion reads.\n\n  Fortunately, due to the continues shows and the heavy interaction of the departments with the outside handlers the entry is ID free, meaning you can taste the visuals for yourself. You move in through the Glass sliding doors with added effect of flowing water on them. You watch as they slide open without dropping a single drop of water and the fresh breeze comes in from the inside.\n  *page_break\n  The interior justifies the rococo exterior. The inside walls are lined with designs ranging from modern art to the more abstract style of the mid 20th century. Despite the differences in the design they manage to blend in perfectly. Distracted by the sudden onslaught of the grand beauty, you accidently bump into another beauty, about your age, fussy with a lot of script books in her hands, and the apt retrostyled glasses, she looks to be with the Acting and Music Department,if you are to judge a book by its cover. \n\n  \"You should not be standing around staring at the ceiling\" she says as she gathers her fallen papers. You lend her a hand and as you hand her over the last piece, she looks up to you with a smile and continues, \"It can be hazardous to your health. Especially in here. You never know when someone is carrying over their script in as the semester project bumps into you and losses their precious script in the process. Such a thing may throw the person in a fit and cause him/her to strangle you.\" She says with a strange smile that makes you want to run away and hide under your bed. She catches your expression and softens a little as she takes a deep breath before saying, \"Don't mind me. The submission period always leaves me flabbergasted with the challenge they produce and often than not I will have an outburst,like this one,\" She says gesturing around you, \"But no need to worry I am not that mean all the time. By the way I am Suma\" She says extending her hand, \"And before you get any funny jokes about it I        have heard them all.\" Dragging you in as she says it.\n\n  \"${name}\" you say as you pull away from her.\n\n  \"Nice meeting you, ${name}, hope I see you around\" she says gleaming at you before she leaves in a hurry towards the Acting and Music department. \n     \n  For the rest of the time you try to find something that would take your mind off of it but the girl sure knows how to leave an impression. Without much to do you try to find the tour group to finalize your college. \n  *set Eloquence +10\n  *set Suma +10\n  *goto Angrymom\n\n*label Angrymom\n*page_break\n\"You should at least give a thought to the other colleges. I mean I know you met someone on the campus and that should not influence your judgement is all that I am saying. CAN YOU ATLEAST PAY ATTENTION WHEN I SPEAK TO YOU\", she yells taking a brief moment to take her eyes off the road and grab your phone,\n \n\"I mean seriously, we are going to be investing a lot in your future and we get as much say in this as you. So young ${gendermr} if you can't take your decision responsibly than I will take that decision for you\" she says snapping at you again.\n\nWell, this has been the situation for most of the way back home as your mom yells at you nonstop between your pit stops. You managed to ignore her by listening to your fav,boom,box playlist but even that is not possible now. Thankfully you are not far from home and soon you can lock yourself in your room. \n*page_break\nAs your mom parks the car, your dad stands at the door looking rather confused at the expression your mom bears. As she storms inside with her bags \"Talk to ${genderhim}\" she says to him.\n\nAs you near the door your dad looks at you with a look of pity saying, \"Didn't select her college, huh?\" he says giving you a hand with your bag, \"Well she will come around, eventually that is\" he says giving you a playful nudge through the door.\n*page_break\n \nOver the course of the next week as the day for finalization arrives closer you are pitted against your mom, who wants you to choose her university as hopes you to carry her legacy of some kind down there. The only way you see it, you have to play through your strengths and force her to her weakness. So as she continues to 'not' talk to you, you decide that,\n*choice \n # Two can play the game\n  You are very much the stubborn ${genderson} as your mother. If she thinks she can win this war by merely ignoring, you than you got a lot of tricks up your sleeve as you prepare for the war to come. Each day begins with her forgetting your plate in the kitchen for the breakfast followed by the silent treatment through the day and the end game of no dessert for you while your sister gets stuffed till her stomach hurts.\n  *page_break   \n  Well you have counter for every trick of hers. If she doesn't get you your plate you simply walk out of the house. Your mom thinks you are wandering like a nomad with no food in your belly, while you are eating at the pizza joint at the corner with the money your father gave you as a supporter on your side in this battle. In the day you put your head phones in and shut yourself in your room, giving your mom no chance to retaliate with the silent treatment. And finally for the dinner you just take the plate to your room. To which she occasionally breaks her silent treatment but could not protest much without breaking her stance.\n\n  Eventually she does come around and the day before you have to decide, she sits down you with one final talk to convince you. When it becomes apparent that your happiness lies with Einherjar University, she simply hugs you and promises to support you hereon.   \n  *set dominance +10\n  *goto journeytothehostel \n  \n # Convince her to come around\n  Given your incredible twisting tongue you decide to use it for the good this time around. Almost each time you two are together in a room, you start dropping hints about how it could be selfish and superficial to reinforce your ideals and wishes on someone else. Also you taunt her subtly about how a mother should always look after her child's best interest without self-prejudice.\n\n  But as stubborn as she is these are mere preparatory rounds for the further attacks. You talk to hours and an end through the day and usually bring topics like ${genderson}-mother relationship and how important their interaction plays in the formers life. \n  *page_break\n  The final blow is to bring up the discussion itself and concede you side with a little touch of drama,\n\n  \"Mom, I think, I will join your college, for you, I mean.\" You say with your eyes searching the floor and then you bring your face up to look directly in her eyes with a wide smile on your face as you continue, \"for you mom, I can do anything and this but just a college.\" You say maintaining the face straining smile.\n\n  Your mom taps your shoulder with a chiding gesture before she says, \"Always the little drama ${genderking}, well I too have made up my mind. I think you should go to where your heart is. And if that is Einherjar, then you should go there. That way, when you screw,up, I can chide you to my fullest extent.\" \n\n  She gives you the fiercest hug ever only to break it when your dad walks in clapping. \n\n  *set Eloquence +10\n  *goto journeytothehostel \n  \n #Logically present your case before her\n  Always the ${gendermr} logical, you had a flair to present your case, be what it may, in a fashion that no one could deny your opinion. Till date you have won every case be it the front seat on drives, the computer usage with your sister or the control of remote, you ${gendermr} have never lost. \n\n  Nothing is different about this case, except that it is life,deciding for you. You can either be in the Einherjar University, which is made for you by the way, or your mom's university to carry on her legacy about something with some dance and some award, which you don't remember half the time. Anyways, the preparatory rounds begin the same night when you start pulling in the statistics of both the Einherjar University and you MOM's University. You decide to use the fact that Einherjar has presented the world with many great scientists, sport personalities and leaders over the course of decade. And though new in foundation than MOM's University, it holds a better rank than the latter. Also the programme that you are enrolling for was mentioned in a magazine as the course for the future with each and every one enrolling making it big. \n  *page_break\n  The final dread meet begins and you begin pouring info like that site that got banned for pouring info. Your mom listens to your argument and counters it with something you didn't expect.\n\n  \"It is my University.\" That is all she says staring at you with intent. \n\n  Well, if she can pull the big guns, so can you. You look at your dad once and then at your mom, and then you start crying, sobbing more like with your palms covering your face. Immediately your father rushes besides you while the mom occupies the other side. Soothing you all the while.\n\n  \"Let ${genderhim} go already\" your father whispers to your mother over your head.\n\n  \"Fine. I can't beat your ${genderson}-father team.\" she says as she draws away your palms and insists you to clean yourself up and prepare for the college.\n\n  You let out a loud cheer as you stand to raise your hands in triumph, only to see your father palming his face and your mother giving you a fierce look. \n\n  \"I was crying for real back then\" you say holding an innocent expression to which only laughter is the response that they can muster.\n  *set Brilliance +10\n  *goto journeytothehostel \n\n\n*label journeytothehostel\n*page_break\n[b]The Induction[/b] \n\nThe day draws near when you are to leave for the college. The past week with the news of acceptance into the Einherjar University has left you with little time to celebrate as you spent most of the time preparing for the stay at the Einherjar Hostel. \n\nShopping for necessities ranging from your clothes to your favourite sleepers has being a bothersome. Thankfully your mom and dad ease the load with their contributions, each of whom have taken a week off to see you off. The rush has been so much that you barely messaged all your friends sharing the news with them. Many replied with their own selections, unfortunate for you though none of them got selected into the Einherjar university. A Rather mixed emotion of pride and loneliness fills you but the excitement of coming days overshadows them quickly. \n\nWith your things packed and the gas pumped you get into the car as your mom for the first time in a long time gives up the wheel to sit with you. She snuggles with you for the start and starts going through your checklist, as you continue to dream about the future to come. Your sister, as usual is a constant nag, teasing about how she will get the whole room for herself and no longer have to share the top half of the wardrobe with you. But even she can't crash your mood right now.\n*page_break\nOnce the checklist is done however, your mother begins to shift from the disciplinary mood to the emotional beyond compare mood. She begins reminiscing about the days when you were young and how you used to wear the tiny clothes, shoes and how you grew up to be such a good ${genderson} who always took care of ${genderhis} own problems and how you responsibly never drank or did any unlawful thing,to her knowledge at the least. This throws her into a mood that just manages to drag you down as well. \n\nAll the while soothing your mother that you will survive this and there are no evil cults that eat up students at night and replace them with some evil clone who in turn eats more students,apparently she read that at her dentist. \n*page_break\nAs soon as your car pulls in at the university parking you immediately ditch your family and rush at the entrance registration, only to find a hefty line consisting of more family members than students themselves. Your situation mostly will be the same. You stand in line, as right in front of you is a guy with weird hat and a shirt that is not his size by miles. He has a very interesting tattoo though with something written between the snake's tongue and the flaying man standing in front of it. \n*page_break\n\"Like it?\" he asks turning towards you, \"Got it when I was leaving. Thought about bringing something from the old times with me.\" He says with a grim expression on his face.\n\nYou look at it again only to say, \"Cool\" when suddenly an overdressed woman with jewelled purse in her hand and a balding man in suit arrive right beside you.\n\n\"Do you mind scooting a little dear fella.\" The man says and you oblige him with a little space.\n\n\"Now look at him honey, does he look like he belongs to us\" The woman says.\n\nFor a moment you stand there confused and well slightly offended but then the guy with the tattoo speaks up, \"Good. I don't like looking like you either.\" He turns towards the man in suit to beam at him and says,\" See and you thought we had nothing in common.\"\n\n\"Look now Jeffery, you two may not like me remarrying but she is your mother now and you have to respect her as one.\"\n\n\"Only have one mother and she aint here. So yea, don't care\" he says moving on with the line.\n\n\"See honey\" The overdressed women protests as the man simply raises hand and says,\" Not now dear. Let's just get this over with.\"\n\nCertainly an interesting fella with some interesting family.\n*page_break\nSpeaking of family, yours is right on schedule as your father calls out to you. You wave him over and continue to move with the line.\n\n\"Oh my\" he says, \"Quite a rush huh?\" peering over the length of the line he continues, \"where is that 'certain someone' that your mother has been yelling about? Can't you convince them to move you along?\" he asks smiling weirdly at you.\n\nYou roll your eyes with a shake of head. But apparently you can move up the line, since the basic procedure that takes most time is assignment of room partner. Since a single room contains students from every year you can use your contact to get in quickly by citing their registration. Also this will help you in adjusting quickly.\n\n*page_break \n\n*if Matthew =10\n Talking to the teachers' pet makes get you a few glares but since you are about to be one yourself, you see no point in hesitating in approaching him to speed up the process of your induction. \n  \n Not much to your surprise the one handling the process of induction is Matthew himself. As he spots you he waves you over. You approach his counter and wave a hello to him in an awkward fashion before stuffing them in your pockets in silence simply staring at him to make it even weird. \n *page_break\n \"So you selected Einherjar? I am not surprised; rarely does one deny the charm of this university. So have you registered yet?\" he says too break the silence.\n\n \"Yea, actually I wanted to talk to you about the same. Is there a way to get through it a little faster? You know like skipping the line?\" you say with a quizzical look that looks surprisingly well on you.\n\n \"Well if you can get one of the seniors to vouch their room to you, you can simply move in there. So have you any?\" He says as he peers behind you.\n\n You just shrug to let him know that he is the only person in this campus that you have talked to.\n\n He gives a bit of though and looks at you again, \"You know what, I can vouch my room for you, that is of course if you want it\" he says.\n\n \"Sure, where do I sign?\" you say with a cheer.\n\n The rest of the process is actually immensely simple as it just involves scratching Matthew's room from the list at induction and placing your name next to it.\n *set Matthew +10\n *goto intothehostel\n\n*elseif Kertez = 10\n Well the 'Dud' seemed quite friendly the last time around as he showed you the arena. The only problem is he will probably will be inside the arena and you can't enter without an ID. Nevertheless, you make your way to the arena and try talking to the guard at the door. He simply days he does not know any Kertez to which you start to describe him to which he just smirks at you saying, \"You are seriously considering staying with the \"Klutz\"\", emphasizing the remark with his hands double quoting in the air, \"Well be my guest. He is right through there, your majesty\" he says chuckling while he opens the door for you.\n *page_break\n You make your way in to find him at the swimming pool trying to remove something caught in his leg. As you near you spot it to be the lane lines or the lane dividers,white chains used to separate the swimming lanes, by the way. You move in to help him with those. As you rid him of the line he beams at you and gives you another bear hug, quite similar to the previous one.\n\n \"Thanks for the help friend. Needed an extra pair of arms I guess.\"\n\n Noticing that he is completely dry still you ask him, \"how did you manage to tangle yourself among them while you were, you know, out of the water?\" \n\n \"Ah! I can see how that is confusing but it was lying around here. I guess they forgot to put them in or something\" he says and just as he does you catch the sight of the girl who bumped into you the first day snickering in the corner along with her friends with her phone apparently recording everything.\n  \n Clearly seeing this for the prank it is, do you,\n *choice\n  # Approach her\n    You are not about to stand down and watch Kertez getting harassed cause of his naivety. You march towards her with an intent and an accusing finger. Seeing your approach, she puts her phone down and replaces her expression of laughter with that of a smug rich kid which gets kicks by torturing puppies.(more or less).\n \n    \"YOU have no right to harass him like that\" you say with fury in your eyes and determination in your voice.\n\n    \"Harass him by laying out a lane line in open for all to see?\" she says and suddenly dramatically opens her eyes and says with both her arms up, \"Are you saying he is stupid enough to tangle in that even though it is wide in the open.\" She peers over your head to look at Kertez now, \"Hear that Kertez he calls you a 'KULTZ'\" she says as the entire place goes up in laughter.\n\n    As you look at Kertez, he faces down and simply looks the pool in front of him. You turn towards the girl and this time more strength and loudness in your words, \"People like you get stronger by bullying the weaker but forget the most important thing,Eventually a bigger fish will come and you will get your share of kicks when that fish comes after you.\" \n\n    \"Ohhh.......... Leela you should be sacred. A fish is coming for you.\" the one adjacent to the girl says while Leela herself has fixed her glare with yours, signifying the traditional, IT IS ON. \n\n    On the way out you talk to Kertez about the room crisis and he beams once again helping you to the counter to cancel his room from the list and sign your name underneath.\n   *set Kertez +20\n   *goto intothehostel\n\n  # Ignore her\n    Bullies like that need the attention and you are in no mood to flatter her ego. You help Kertez up and move towards the pool as he prepares for his swim. Clearly lacking any gear you suggest against his suggestion of joining in. He continues to go back and forth and with some skill you admit only stopping at your end to talk with you.\n\n    \"So can I count that as a yes?\" you say to him as he nears once more.\n\n    \"Know what, we are heading straight away to the counter. We gonna get you a room, ${gendermyman}.\", he says in his enthusiastic usual manner getting out and stumbling slightly before reaching for his towel get a few laughs on the way out.\n\n    Apparently all it takes is to go to the counter to cancel his room from the list and sign your name underneath.\n    \n   *set Kertez +10\n   *goto intothehostel\n\n*elseif Rebecca = 10 \n With the family in toe you make for the Experimental Science Department to leave them all in awe at the spectacular building in view. Apparently the guards are allowing prospective students inside the facility today. \n\n You make your way inside to find Rebecca in a much similar stance as you were when you first met,drooling on the floor. You approach her and tap on her shoulder to break her trance. She almost jumps out and screams a little due to the sudden interaction.\n *page_break\n She turns to you sombre once more and says, \"Sorry for that. But did not expect any touch stimuli inside the lab.\"\n\n The reply makes your cheeks turn red and knowing your family just heard that make them even redder. \n\n Rebecca notices the family and the change in your expression to justify her remark, \"Not in a bad way\" she says very slowly thinking of a way to actually justify it this time, \"What I meant was that inside the lab rarely anyone interacts with anyone else outside thier group. And since my group member passed out this year with her thesis in toe, I was the only one left to study the nuclear thermosis experiment.\" \n\n You just continue to stare at her in a weird fashion to think of way to say something, but what to say, well therein lies the problem. \n *page_break\n \"Umph.\" Your mother breaks your trance as you regain your composure before saying, \"Well what came to talk about is help regarding the induction process.\"\n\n \"OH! Well the counter is on the other side of the campus. There will be a huge line in front of it though\" she says with an innocent look, so you don't doubt she meant it as a sarcasm.\n\n \"Wait a minute. I can help you! I actually have a room to in the hostel and I can get you in my room if you want to and then we can conduct the research on the nuclear thermosis together\" she says almost a breaths distance away from you.\n\n Suddenly she grabs your hand and rushes you through the door towards saying or rather screaming,\" We might be late already. Come on we must get you into my room.\" \n\n Flushed you look down as you surely are going to hear this a lot more about this incident from your mother.\n\n Apparently all it takes is to go to the counter to cancel her room from the list and sign your name underneath.\n *set Rebecca +10\n *goto intothehostel\n\n*else\n Going through your visit before this, you hardly having any worthwhile conversation with anyone apart from the weird girl with the script,Suma. As you are lost in your thoughts about how weird she was and how weird her hair was and how weird.... \n\n \"How weird to bump into you again?\" \n\n You break from your trance to spot the great weird Suma, looking at you like as if you are in a cage hooting with a banana in your hand, scratching your armpits.\n\n \"Get that BUMP. AGAIN.\" She says emphasising the two words snickering while all you can do is watch her as if she is in a cage hooting with a banana in her hand, scratching her armpits.\n *page_break\n \"Anyways I had the duty assigned to cater to the newcomers. Then I saw you there, and thought about that awesome joke, bump\" snickering a while she continues, \"I got a room too by the way. Actually that is how I got into this volunteering business in the first place-roommates,hpmh\" she says before sighing and continuing, \"As I was saying I got a room and can move you up the ranks to get you sorted quickly. And wouldn't you rather have a sexy known devil who also can dance as a roommate than some random devil as your roommate?\" She says in a playful manner to which you get the death stare from your mother as you just shrug and ask Suma to lead the way.\n\n \"Here all done\" she says as she scratches her room no. from the list with your name signed underneath.\n *set Suma +10\n *goto intothehostel\n\n*label intothehostel\n*page_break\nThe Ordeal of bagging a room behind, you finaly get some much needed time to take a breather. Your mind calm and the rush fading, you ponder upon the situation. A look around you shows an array of emotions, from angry pupils rushing to embrace thier freedom to saddned faces of the ones saying goodbyes to thier falimies before starting a new phase away from them. \n\nYou now finally asses your own emotions, you feel,\n*fake_choice\n #Sad\n  The feeling of not seeing your family, not feeling the presence of your overprotective Mom, not getting saved by your loving Dad, or even not getting annoyed by your sister. It overwhelms you. The gulp of dread of saying goodbye to all of that makes its way done your throat. Even though they are but a call away, it shall never be the same, ever again. Well, atleast until you pass out of Einherjar.\n #Free\n  The feeling of not seeing your family, not feeling the presence of your overprotective Mom, not getting saved by your loving Dad, or even not getting annoyed by your sister. It kind of elevates you. As if you are free to not only make your own mistakes but to learn from them on your own terms. Sure it will tough to let the old life go, but the prospect of the new one has you enticed even more.\n #A mix of both\n  The feeling of not seeing your family, not feeling the presence of your overprotective Mom, not getting saved by your loving Dad, or even not getting annoyed by your sister. It feels you with dread, leaving that old life. but at the same time the prospect of the new one entices you. \n\n*page_break\n\nOnce the bags have been dispatched you return to say your goodbyes to expect crying parents and a teasing sister waiting for you. But much to your surprise, your parents have maintained their composure with only slight tears in their eyes while your brat of a sister rushes to hug you sobbing all the way. \n\nYou get down to hug her fully before slight tears form in your eyes as you realise the gravity of the situation. For the next six months and possibly more you are not going to see your family, however annoying they were. \n\nAs they prepare to leave you kiss your parents on the cheeks a give a tight hug to your still sobbing sister and kiss her on the forehead before saying,\n\n\"Watch over my room.\"\n\n\"It's mine now\" she says still crying. \n\nYou pat her head and step away from the car as your mom pulls out the car and drives away with a final wave to you.\n\nYou stand there a while watching them drive away in the distance until they are nothing but blur dot. You turn to make your way to the room,room 402. Fourth floor 2nd room.\n*page_break\nThe hostel isn't much to look at,or at least that what other university students would have to say. The hostel that Einherjar has is made future ready with the architecture giving it the look of an luxury apartment rather than a hostel. The inside lobby has individual room notice,boxes as they call them to carry the notices served by the college. Currently it holds a notice for you,a Welcome Message from the Dean.\n*achieve einher\n*page_break \n[i]To the Future Einherjar[/i]\n\n[i]We present you this letter with utmost praise for seizing the fantastic opportunity and attending the nation's, nay, the world's one of the best premier educational institutes. At Einherjar as you shall observe the education surpasses class boundaries and is more focused on utilizing what is taught to you as a weapon to aid you in the coming battle.[/i]\n\n[i]The battle that you shall face is the battle for mankind, as all of you shall secure a place in the society governing different aspects of it. We shall always be at your side in this battle and aid you the best we can.[/i]\n\n[i]Hope you find our guidance to the par as you proceed in your life beyond Einherjar. [i]\n\n[i]May you rise and join us as a true Einherjar.[/i]\n\n[i]Your Mentor and friend,[/i]\n\n[i]DR. Daniel Resyubh [/i]\n\nCertainly a letter with a lot of flair, as is the need, as you are sure along with you many others are going to preserve this letter as a memory to be cherished.\nThe message certainly was, \n*fake_choice\n #Warm and Welcoming\n  You feel confident already in your decision to join Einherjar. If what the dean says can be held to be true, which it probably is, you can expect a wonderful experience ahead of you. \n # obnoxious\n  Well, you appreciate honesty more than buttered up words. The fact that the university starts with offtopic notice certainly doesn't sit well with you. You expected at least a cpoy of detailing the course work, but you guess the coming morning will be the bearer of such news. \n\n*page_break \nYou walk up the stairs and are pained to learn that despite the state of the art facilities the elevators are locked for the students and are only available to the working faculty like the house keepers, apparently to keep you healthy and on your toes. \n\nYou make the gruelling climb up the stairs to find the fourth floor with consists of 2 rooms on it. But the sheer length of the corridor tells you these rooms are big enough to house an entire family in it. \n*page_break\nYou approach the door for room 402, and as you are to open the door you hear a laughing noise from down the corridor as you spot the tattoo guy from the line at the counter and with him is another guy tattooed in a similar fashion. They are laughing at some joke they just cracked as they approach closer and the other guy whispers something about the room to the tattooed guy,well tattooed guy from the line. To which he simply says, \" Its okay.\" He points at you, \"he is cool man. A newbie like me\" he says while giving you a salute before getting dragged inside by the other guy, stumbling all the way.\n*page_break\nJust as they go in your door opens to reveal, Matthew, who simply drapes his arm around you and drags you inside where four others are present. One by one he points at each one calling out their name, \"Rebecca, the experimental science intern,Kertez, the swimmer,Suma, the writer and Leela, the evil witch from the woods near by\" to which she simply humphs and walks away into another room. \"And I am Matthew by the way, with a double 'tt', which you already knew.\"\n\nHe drags you into another room adjoining this one. Entering the room with and spreading his arms around before saying, \"This is the newcomer room. Smaller than others and hence given to the new guy.\" He turns to leave and just as he nears you, he whispers, \"No tricking Kultz into staying here.\" \n\nWell that was a start you didn't expect. And despite vouching for you, your \"vouchee\" is certainly busy with their work and hence can't talk with you right now. \n*page_break\nSurprisingly it is the rude girl who is the first guest to your new room.\n\n\"I don't know, what your problem is but you seriously need to stop stalking me.\" She says as she barges in your room, \"I mean first you bump into me than the clash and now this.\"\n\n\"Are you doing this in some elaborate scheme to get back at me. If so than you better know that others that tried are not around to talk.\" She says as she sneers at you.\n\nBefore you can retaliate or rather understand what was going on with the crazy woman, someone knocks on the door. It is Suma.\n\n\"Well look who thinks the universe revolves around them.\" She says rolling her eyes.\n\nLeela storms towards the door and pushes past Suma.\n\n\"Well don't mind her. She always thinks that everybody not in her little posse is out to get her. So yea, she is really messed up in there\" Suma says pointing to her head.\n\n\"Listen don't take shit from her. The more you give in the more she will push you down. So next time don't give her the chance to walk away.\" As she turns to leave she gives you one last piece of advice, \"get some rest, coz tomorrow gonna bring you to the dark side of Einherjar, baby.\"\n\nThe dark side, huh. Her words make you,\n*fake_choice\n # Indifferent\n  Paying no heed to her last comment, you close your eyes with a content feeling of landing the dream college,Einherjar.\n # Cautious \n  Perhaps your excitement to get in has kept the obivious looming work ahead oblivious from you. But now that she mentions it. For now you just decide to ride the train of dream college.\n  \n*page_break\n\nThe next morning you are awake not because of the alarm that will probably blare in about an hour or so, nor by the excitement of the first day at Einherjar but the bustle of the apartment as everyone is getting ready about an hour and a half early before the college even opens.\n\nCurious you step out of your room, to be almost run over by Kertez who mumbles a quick sorry before rushing out the door. He is followed by Leela and quickly by Suma who gives you an expression of pity as she moves out. \n\nSomehow you grab hold of Matthew as he is rushing off, \"Where is everybody rushing too?\" you say in a quizzical manner. \n\n\"Oh dear, I forgot to tell you.\" He says as he peers behind you before continuing, \"Rebecca cooks breakfast on Tuesdays and that is not something that you look forward to.\" \n\nNoticing some movement behind you he quickly jerks his hand off from your grip and rushes off behind the others just as Rebecca comes up behind you to yell, \"Breakfast ready in five!!\"\n*fake_choice\n # Who says no to free food\n  Even with the warning you are not going to say no to free food when your stomach is grumbling. \n # Heed to the warning and make a run for it\n  But Rebecca is quick to move in the corridor as she spots you down the length of it. You save face by changing your running for the hill stance to a more of a running to the toilet stance. Luckily she buys it. But this means no escaping her either.\n\nYou clean yourself quickly and make way to the breakfast table to notice a wide sortie of options before you from the tofu mince to the sprouting salad. Creating an all vegan breakfast. Despite the extreme reaction of others, you liked the taste when you mix all the dishes partly in your dish. \n\nRebecca just takes heart in the fact that you liked them in your own way. Which lead to the declaration of daily breakfast duty to Rebecca, self-appointed of course,giving you the glares that you deserve for complimenting her.\n \n*page_break\n[b]The First day Of College[/b]\n\nYou dress up in your Monday best,even though it is a Tuesday, as you head down to the orientation class in your dream college of Einherjar. \n\nThe orientation class will be head jointly for all courses. Entry into the class reveals another much to be liked as you look for a place to sit. Without much info you stumble around like many others looking for a place they can carve as their own. \n*page_break\nThe sight of the tattooed guy catches your eye as he sits with his legs sprawled on the adjacent seat. He waves you over as you make your way to him. He moves his feet to give you the space, which you have to wipe with your bag before you sit. \n\n\"Nice seeing you again, newbie. Name's Jeffrey by the way.\" He says flicking his hair locke out of his face. \n\n\"${name}\" you say adjusting in your seat, \"So what are you going to major in?\" you ask with an interest to keep busy till the lecture starts.\n\n\"Well, to be frank, I wasn't hoping to get into any college, given my skills you know.\" He says playing air guitar in the constricted space, \"But my father thought it was his moral responsibility to give me a better future. And I be like if I don't care, then he goes, 'don't squander this once in a lifetime opportunity' and I be like 'whoa, slow with the flow my man' then he be like 'I have high expectations from you' and I be like 'm already high dude'.\" \n*page_break\nUnsure what to make of the idiotic babbling you simply turn your attention to the newest entry in the class,DR. Daniel Resyubh, the dean himself. The hustle and bustle dies down as students around take their seats before he begins.\n\n\"This is an opportunity not only for you but for us too. Each year a fresh batch of students arrive to let in the Einherjar, each primed to showcase their brilliance and each year we guide them on this path of their path to brilliance.\"\n\nHe adjusts his suit as he steps forth to the first row, \"Now you are a part of Einherjar, its good and its bad are defined by your actions as much as it is by ours. Hope this institute gives you the impetus you need to do better than your best.\" With a quick glance around he leaves the classroom gesturing for the next in line, Mrs. Morcot the most senior faculty in the college, age-wise at least and the head of the Extra,curricular department. She steps forth and goes on with her introductory speech.\n\n*page_break\nThe Orientation doesn't count for much other than well, introductions. Speaking of which the only faculty to avoid an appearance is the fabled Dr. Miller. From what you gather he would rather work than play pretend with the new students, and after two hours into this, you are actually jealous of him. \n\nNevertheless, least you got to gauge the colleagues along with the different faculties incharge of departments. With your mind set from a long time it doesn't take long for you to fix your major into, \n*choice\n #Arts dept.\n  The head of the Arts Department, Mrs. Morcot though not on tenure is one of  the most senior faculty on campus and as such holds much respect from the students and fellow faculty member alike, excluding of course Dr. Miller , who thinks the department itself is a leech on the institutes finance.\n\n  The entry to the arts department is much contested and rightly so. The extensive curriculum of the first year is aimed at enhancing the students along the lines of all different aspects due develop them in their respective art form. \n\n  The options inside the department range from the more popular acting, dancing and painting departments to the more traditional and creatively deep departments like sculpting and literature.\n\n  Though the thought of being one of the rarity excites you, the ultimate assignment of the main department will be given by Mrs. Morton herself at the end of the year. For now you have to take all the classes for the freshman year.\n\n  *set Eloquence +10\n  *goto day \n # Sports dept.\n  Though not an exclusive sport only option, you can emphasize on sports more with a more than a little relaxation by college on the grade requirement. Also the faculty in charge, Mr. Reinheiter, an Olympic bronze medallist in swimming himself, has promised himself that exemplary performances by students will grant them favour from the faculty in terms of grades.\n\n  His definition of exemplary is rather short one and restricts to winning at any cost. The sports available for you to participate in, are enormous. But given your talent pool being restricted to swimming, you most probably land on the swimming team. For the freshman year you are supposed to attend every class ranging from advanced calculus to the Sculpting class, all on the credit system of course. But the requirement of compulsory selection forces a few classes on your schedule. \n  *set Dominance +10\n  *goto day\n # Academic section\n  The academic department has mostly equated surrounded along the experimental science department. Though other specializations are also available the lab entices almost all applicants to go for it. However, the entry is very selective and Dr. Miller himself is involved in the process, meaning a whole lot of you will be left to choose different inter,department branch. \n  \n  Since you are yet to be confronted by Dr. Miller in person, you can't gauge the pre,disposition of the man towards his candidates. If you are to believe Rebecca, he is the monster under the bed for more than half the campus students along with a few faculty members.  \n  *set Brilliance +10\n  *goto day\n\n*label day\n*page_break\nThe Timetable is given to you at the stationary counter, along with your supplies for the year to come. With your college badge, sweater and a jacket with university tagged on the pocket, you collect the papers and files required for the term work submission.\n\nThe first day at Einherjar starts at ten, with the first lecture of Advance Calculus. Many don't look forward to the class after the two,hour long orientation that they went through and voice their opinion as they look upon the schedule.\n\nThe class is conducted by Dr. Chandy, who earned his doctorate when he was quite young, and as such he joined the university also quite, well, young. Medium built, standing at 5'5\", and walking in with a brown folder that he opens to remove a thicket of paper from within.\n\n\"I am, Dr. Chandy, and I will be helping you understand the interesting subject of calculus, that is to the extent that you actually can. The welcome ceremony to calculus involves a test.\" As soon as he says this a widespread panic sets in the classroom. To be fair, a test on the first day at the first lecture is not something you expect. \n\nWithout another word he hands out the papers to the first row to pass around. You wait patiently to see the nature of this test until the paper reaches you. You analyse the paper to your fullest extent but the questions themselves are impossible to comprehend, so solving them will be well out of your league. You look around to find similar expressions painted on your colleagues. \n*page_break\nAt the conclusion of the lecture, Dr. Chandy, with a smug smile on his face tells you that the test would only be solved by you once you complete his class. The whole experiment was to show you how miserable you are. This according to him would enlighten you with the importance of attending his lectures,attentively. \n\nThough you hoped this experimentive and extreme teaching methods would be limited to him, you were sadly disappointed when your sculpting teacher Mr. Ranaian, suggested to free yourself during his lectures to the extent of shedding hindering clothes. Thankfully he regressed when nobody was interested in the idea of going nude on the first day of college.\n\nThe first day in the college ends with four lectures under your belt giving you a glance at what is about to follow. Following calculus and sculpting, you had to attend the lecture of applied physics, and then finally end it at optional language class of French with a touch of introduction to other art departments as well.\n*page_break\n\nAdjusting to the volatile classes that you hardly expected coming in, has taken a toll on you. The vigorous exercises help you gain a better grip on the subjects under study but often lead you to the brink of your capacity. \n\nThankfully your roommates have been more than helpful through this journey with the likely exemption of Leela, who has been on the case to destroy your life it seems. Though you have spent time with all your friends, you have been particularly biased towards, \n*choice  \n # Matthew\n  Matthew has been a great help to you settling in here at Einherjar. His expertise of the different teachers and problems related to them has helped you dodge any unwanted attention from any of them and at the same time have helped you to secure a place on their good side.\n  \n  However, this friendship extends beyond the classroom too, as most times you get the same slot to share a lunch, further extending the time you spend together. The time you spend is helpful to take your mind of the extreme libertarian ideas of Ranaian and the rather expermentive assignments of calculus that are aimed more to show you how dumbfounded you are when it comes to calculus.   \n\n  Your time together has not gone unnoticed as many a times the other tease you sharing everything from you time to your undies,well Suma's words. But nevertheless it feels good to rely on someone in this rat race. \n  *set Matthew +10\n  *goto arrival\n # Rebecca\n  Mostly what started as an excuse to get into the experimental science department, you have been rather fond of spending the lunch hours with Rebecca in her Nuclear thermosis lab. With her experimenting nearing completion, she mostly engages with you in long discussion regarding the same. And other times it was about Dr. Miller who with his iron fist ruled the department like a dictator. \n\n  But the other times you often explored your own lives, the trouble with adjusting to the new environment, the upcoming events on campus and the vegan foods trending {mostly in just Rebecca's circles}. Most days you ended up spending your entire free time with her in her lab and even through her explanations of complicated analysis of her experiment you never felt the need to distance yourself from her.  \n\n  Your time together has not gone unnoticed as many a times the other tease you sharing everything from you time to your undies - well Suma's words. But nevertheless it feels good to rely on someone in this rat race. \n  *set Rebecca +10\n  *goto arrival\n # Suma\n\n  Suma is the eccentric one, often seen only fleeting images of her, as she rushes from one building to the other on the campus. Rarely do you find her inside the room during the day, even on off days. She enjoys the interactions with others and often likes to engage in lengthy conversations about absolutely nothing.\n   \n  And for your that sounds perfect as you engage in her usual babble session, whenever you bump into her. Though always too busy to stay in one place she seemed to calm near you and take a breather before rushing away. Eventually you are often the rest stop for her on her rushes not that you are complaining, since chatting with her is the only reprieve that you receive from the tedious workload of yours. She too shares your opinion as she opens up more and more to you.\n  \n  The fact that she behaves different around you is so obvious that you are often teased by others.\n  *set Suma +10 \n  *goto arrival\n # Leela\n  Though not by choice you have gained a companion for yourself. Loyal to her promise to ruin you, Leela often is seen in the same vicinity as you. Even though she is a year senior to you she often stalks you to your classes waiting for an opportunity to tease and humiliate you.\n\n  At first her performance is exemplary but later her heart seems to soften on you or she simply just used up all her witty remarks. Her sheer attention towards you has caused for a lot of folks to think of some misguided feelings of her the reason for this. And whosoever is unfortunate enough to mention this around her, is soon added to her hit-list. \n\n  Though you both only manage to talk through taunts and sarcasms, you still enjoy the little talking with her. Through these little altercations you actually know more about her than about any other person on the campus. Likewise, the only person who can pass a pop,quiz about you is Leela.\n\n  Weird enough you two have gotten close and personal through this vendetta of Leela's.\n\n  *set Leela +20 \n  *goto arrival\n # Kertez \n  Kertez is a sweet and very gullible guy. He is often the centre of many pranks around the campus and even if catches someone pranking him, he goes through with it for the sheer fun of it. \n\n  The rising stress of the curricular and extra,curricular workload has pushed up your interactions with Kertez. Just being around him alleviates your mood without much effort. Through his shenanigans and sweet nature, he manages to keep you around for most of the day.\n\n  As more and more time is spent with him you gather depth about him that previously eluded you. Though a 'Kultz' by very definition he is surprisingly skilled in water. An Ace swimmer in his school days he was the star student before he shifted in your state and suddenly began drifting away from swimming. \n\n  Though he has no intention of participating in swimming team for the college, in time perhaps you can convince him to join up. In the meantime, all you can do is enjoy his companionship.\n  *set Kertez +10\n  *goto arrival\n\n*label arrival\n*page_break\n[b]Chapter : The Manifestation[/b]\n\nBreaking the monotonous schedule of your college life you all are herded by Rebecca to attend the unveiling of the latest project successfully completed by Dr. Miller.\n\n\"This was one of the most anticipated and scrutinized project in the science community. And though no one knows for sure it is surely related to his last project exploring the sethren formation\", Rebecca says and without much surprise most of just continue to stare at her dumbfounded completely oblivious to the things she just said. But, you did read about the Sethren Formation, mostly because the name of your university was associated to the article. The Sethren Formation was a formation of molecules which imparted special characteristics to the material, which when tweaked under controlled conditions would give it increased wear resistance, higher temperature tolerance, better insulating and with some changes excellent conducting properties too. \n\nIt was a great find, but the scientific community and the metallurgical institute for scientific technological applications or 'Mista' had reserved judgement until a confirmed analysis and proof was submitted to it. The eager move of sharing his discovery made Dr. Miller rush through his research apparently before the university would withdraw his tenure for such rash actions. \n\nHe has done it though, if you are to believe his words. Since the earlier incident upset the board of the University, they decided to show up to control him under the guise of supporting his research at the unveiling. \n\n*page_break\nThe event has a packed audience, thankfully the other lectures where not cancelled and only those students which had writ permission from the department of experimental science where allowed to be present at the event. The writs where easily secured by Rebecca for all of you, heck, even Leela got a writ to be here.\n\nAs you arrive at the department you spot a grand stage set before you atop which a huge sphere of some kind rests covered by a satin cloth in an ornamental fashion. You make your way away from the stage towards the back where students are allowed to stand to attend the event. The stage will be occupied by the board along with Dr. Miller and a few of his assistants. The seating arrangements are mostly reserved for press personnel apparently for the press conference to follow the unveiling. \n\nWithin a few minutes all arrive and take their seats as with two taps on the mike Mrs. Morcot takes the helm as she introduces the board and the few dignitaries before handing over the proceeding to Dr. Miller.\n\n*page_break\nDr. Miller takes the mike in all professional manner, and for once you thought he might speak something nice, even if it was about his own work, but no such luck. He simply takes the mike and in a stern voice says, \"This is the machine dedicated to resifting molecular formation to Sethren formation to impart controlled properties. Thank you\" and steps from his mike towards the machine and unveils it by pulling down the satin covering in an unceremonious fashion.\n\nUnsure of how to respond to this there is a sullen silence among the crowd until Mrs. Morcot claps to break it. The claps last for a while before Dr. Miller displays an ornate box bejewelled to increase its importance, \"In here is the product and the proof of my theory on the Sethren Formation,\" he says opening the box to reveal a small cube, which he then places on the space before the stage as the assistants clear the space around it. He claps his hands to signal an assistant who blurts something on the Walkie,Talkie. A thunderous sound breaks in the back as a road roller pf epic proportion rolls in ruining the well,kept grass under it. The roller rolls over the cube. With awes and hushes that you hear, it is clear what the result is. As you make space to spy upon the cube you find it intact, without a scratch, dent or mark of any kind. He then takes the cube with him inside the department and carries a number of tests on it which on any other material could have yielded a destructive result but somehow the cube manages to survive the ordeal. \n\nAt the end of the demonstrations the cube is placed inside the facility on display as the board and Dr. Miller engage themselves in the press conference. \n*page_break\nThe cube stands on the display almost as if recently created right before your eyes, without a scratch and without a mark to reveal the hardships it had to bear.\n\n\"Think of mble. She is maybe, in her late twenties, with skin as smooth as silk and eyes of amber. She stands taller than you but not by much, with a latex dress she looks like a domina lost on her way. Either that or Dr. Miller was planning a very different kind of celebration tonight. Ahem! Moving on.  \n\n\"Hey, I always wanted to do that.\" Suma says elbowing you playfully. \n\n\"Dress in latex?\" you ask to which she promptly replies, \n\n\"And show up at an event uninvited in middle of a thunder storm\" she says grinning at you. \n\n*page_break\nYou wince at the gesture, to fix your gaze on the woman who is now boldly moving towards the crowd blocking the doors. You back away as Suma tugs at your arm teasing you, \"Awfully interested you are in a stranger\". As soon as you turn your back you hear screams as you turn to spot the woman standing at the entrance with the crowd propelled inside the building.\n\n\"Well she could have just asked them to move.\" Kertez says as you move away from the door along with the rest of the group. The woman stands on the door with a wide grin on her face as she moves towards the cube on display. Sensing her intentions Dr. Miller rushes towards his invention as the guards charge at the woman. \n\nThe woman turns towards the guards and with a vicious smile prepares for the guards to close in. Since these are the campus guards the most deadly weapon they carry is pepper mace which fails them drastically in this case. The woman almost flows thorough their blows as she counters each one of them and makes short work of the guards. \n\nNow the only thing that stands between the woman and the cube is a frightened scientist holding on to his dear invention. Just besides you lies a broken concrete piece flung near you during her altercation at the entrance. You could use it to distract her giving your professor some much needed time to run away and hide the invention. But then again without much to fight with she might just take her frustration out on you.\n\n*fake_choice \n # Fling the thing\n  You pick up the concrete piece and take aim before flinging it at the woman whose entire focus is on the cube. Your aim is true and sure as the concrete hits her right on her head. \n  *achieve flin\n # Play the coward\n  As the thought crosses your mind something hits the woman, possibly some stone. Maybe someone else had the same idea as you. But the problem is that the woman looks at you as the stone was flinged from your general direction.\n\n\nThe grin on her face disappears as she turns towards you with anger and charges at you as she screams. Without much else to do you simply stand there like a deer caught in the headlights preparing for the unfavourable result.\n\nThe woman jumps in the air with her fist at the ready as you put your arms up defensively. The fist lands hard on your shoulder, thanks to the last minute reflex ducking otherwise your skull would have cracked under the force. Your friends rush to your aid only to falter in their steps as the woman groans at them viciously. Despite the danger your friends start to throw anything and everything at her, to draw her attention away from you. \n\nYou get up once again holding your shoulder as you look around to see those standing in your defence been thrown around effortlessly by the women. Throwing caution to the wind you rush the woman once more, which sadly to say makes for an unfortunate result of her grasping you before grabbing your head from behind and slamming it hard on the ground.\n\n*page_break\n\n*if Brilliance > 30\n Just as you face nears the floor your body jolts suddenly with a bright lightening. The grip on you loosens as you feel the woman being thrown away from you. You drag yourself back on to your feet as you feel a trembling sensation in your body. You look upon your arms to find sparks flying across it. Rather your entire body is emitting sparks all around you. \n\n You look around to see as much shocked faces as yours as they look upon your body electrified. From the crowd Kertez steps up with a piece of wood with which he strikes you hard, only to be knocked away himself. You rush to help him only to realize that it might not be wise to touch anybody for a while. \n\n Your thoughts are drawn back to the woman who now yells out her frustration as she rushes you in a wild frenzy. The cool demeanour that she had at the start of the fight is now completely gone. \n\n She jumps in the air to repeat her fist to the face move as you once again put your arms up defensively, with the only difference that this time you send forth a blast of energy directly at her. The blast slams into her carrying her literally through the roof. You just hope the department has insurance as this might be too heavy a damage on your pocket. \n\n The woman flies out of the building as you stand there still electrified and the crowd fixing their gaze on you. \n\n Matthew draws near saying, \"We could have saved on the electricity charges, you know.\" \n\n \"Oh shut it!\" Suma says as she points a finger in your direction, \"We would have bled him dry and you know it.\"\n\n Though this doesn't solve your problem you certainly appreciate the support they are giving despite themselves being in shock. \n *achieve buzz\n *set Brilliance +10\n *goto recruitment\n \n\n*elseif Dominance >  30\n Just as your face nears the floor, you feel your skin hardening as if you had applied one of those face packs on, as it slams hard on the floor. You almost expected a squish but surprisingly it is a cracking sound. \n\n The woman once again pulls your face up and continues to slam it in until you taste the foundation slab. After a while you try resisting her grip and with ease you lift your head to look at the depth at which you were hunched over. \n\n As you get up you spy upon your hands to see they are covered in a lush green climbers and beneath them you spot the hard brown skin of yours. Surprised at this new development you rush to ghts are drawn back to the woman who now yells out her frustration as she rushes you in a wild frenzy. The cool demeanour that she had at the start of the fight is now completely gone. \n\n She jumps in the air to repeat her fist to the face move as you once again put your arms up defensively, with the only difference that this time, is the gush of water that you stream towards her propelling her through the roof.\n\n You just hope the department has insurance as this might be too heavy a damage on your pocket. \n\n The thought however lost as you feel the gaze of the crowd upon you, gauging exactly what has happened before them. \n *achieve fish\n *set Eloquence +10\n *goto recruitment\n\n*else\n Strangely you think that you are still alive, still sentient, still feeling the carnage that follows around you as she begins massacring those that didn't even fight her. Somehow with a squashed skull and broken shoulder you are still holding on to the last inch of life in you. The pain is absent at least, but the will to stand and fight is still growing, growing and growing, until the feeling overwhelms you and you manage to stand realising your body healing itself.\n\n Still you have half a skull left to heal along with a broken shoulder. You look around to see the woman already making short work of Dr. Miller before grabbing the cube. You look around to find your friends beaten and broken badly. Nearest to you is Suma who despite having a broken collar and bleeding heavily manages a witty remark, \"Shouldn't have worn white today.\" \n  \n The feeling of watching her life drain from her eyes overwhelms you as you hold her head in your bosom before sobbing at the loss of a friend. The feeling of dread overwhelms you but is soon replaced by a vibrant feeling of life, of excitement, of peace and of vibrancy at the same time. You feel yourself been enveloped by a strange light and though your eyes are closed you can feel the sphere of light growing spreading, all around you Oh\" you say, not the wisest comeback, but for all the mystery you expected rarer and strong name. \"I am ${name}\" you say recovering from the earlier remark,\n\n\"Now that we have the pleasantries out of the way. Let's start with the first order of business\" barley finishing his sentence he sends a punch flying in your face knocking you out.\n*achieve kid\n*page_break\n[b] Chapter : The League Of Elementals[/b]\n*image cg.jpg\n*page_break\n'My face hurts' is the first thought that pops,up in your mind as the consciousness returns to you. You groggily open your eyes as you rub them. You open your eyes to see a strange ceiling, covered in graffiti. Suddenly the memory of last night with the woman followed by the strange boy who punched you and from the looks of it probably kidnapped you.\n\nYou rub your still groggy head as you get from the strange hard bed. Your gather your wits about you before you look around you to find a strange accommodating room with wooden flooring, wooden windows open to display the nice sun on the rise with a pair of slippers arranged for you.\n\nAs much as you hate your kidnapper, you certainly don't mind the slippers, given how cold the floor is. You check the door to find it, surprisingly unlocked. You make your way through the corridor which appears to be strangely a mix of Japanese and Arabic culture with the wooden architecture and the delicate tapestry that covers the floor along with some carvings resembling the prominence of both the cultures.\n\nAs you enter the room across the corridor you hear a few voices coming from the adjoining room. You slowly and stealthily near the door as you open it just enough to peek inside the room. To your surprise you see a large table across which at least twenty people, that you can see through the narrow slit, are milling about, belonging to different age groups and bearing almost no resemblance to each other. You back away as you hear someone nearing the door. \n\n*page_break\n\nYou hide behind the counter as the door opens to give way to a beautiful young maiden with lush Locke of black hair flowing down her shoulder, and ocean blue eyes to compliment them with a smile that could melt even the toughest of them, heck it could even melt the cube Dr. Miller made. Speaking of which, you are definitely nowhere near your university and none of these ever crossed your paths before. As the door closes a thought appears to you. Since you are alone, you can intimidate the girl into spilling the secret behind your mysterious kidnapping or it could be wise to just get away from here utilizing the Element of surprise in your benefit. \n*choice\n # Intimidate\n   You approach slowly and steadily as you ready yourself to grab her from behind as she suddenly turns around with her finger waving at you to say.\n\n   \"Hold your horses there. I have a little rule. No touching till the third date\" she says smiling at your shell shocked face. \n\n   She grabs your hand as she drags you out saying, \"Come on, you must be hungry.\" You protest but she simply chides you saying, \"Everyone here knows the hunger after the first time\". \n   \n   You don't understand what she meant by that but she is right about one thing,you are hungry to the extent you never felt before.\n  *goto hall\n # Hide \n   You hide behind the counter as the girl does her job. You stay there waiting for her to be done. Suddenly she turns in your direction with a knife in her hand and a smirk on her face before saying, \"You know by now I would have grabbed something and hit my would be captor with something. But I do admire your patience. Rob always goes on about how I should be more considerate about my actions but at least I get the job done.\" She says as she turns back to continues to carve the sandwiches. \n\n   Unsure if she was talking to you or merely suggesting you ways to escape you simply stay behind your makeshift cover behind the table.\n\n   As she prepares the last of them, she grabs the plate and lets out a big sigh before continuing, \"At least open the door. If you want, then you can go back to hiding behind the table\". \n\n   Giving up your attempt at stealth you get up and open the door as she grabs you hand and drags you into the hall saying, \"Everyone here knows the hunger after the first time\".\n  *goto hall\n\n*label hall \n*page_break\nThe hall is bustling with activity as the people present mostly ignore you going about their business either eating while reading or playing food fight in the case of a few children barely ten in age.\n\nThe girl guides you to an empty seat and offers the sandwiches to you. You take one an utter a polite, \"Thank you\" and suddenly a hush falls on the crowd around you. Unsure of what you did wrong you decide to return the sandwich to only get a chiding remark of, \"Oh, its not the sandwich it's the politeness that this whole lot is oblivious to\" the girl says pointing to the crowd and just like that they return back to their activities. \n\nYou gulp down a few more sandwiches, as your hunger gets the better of you. Once sated, you look around to spot the girl who has since finished her breakfast and is now talking to another red headed girl, a bit younger than her. Also amongst the crowd you spot the boy, Brandon, who punched you last night.\n\nYou Approach the girl in hopes to learn about your situation.\n\n*page_break\nYou get up brushing yourself. As soon as you slide your chair, and rise to leave, a hand rests on your shoulder. You turn around to find an elderly fellow in his fifties maybe, with look of an old owl about him, all wise and filled with unwanted suggestions.\n\n\"You must be ${name}.\" he says extending his hand towards you before putting his other hand over your shoulder and dragging you in, \"I must say many here have manifested under dire circumstances but you my friend have done so while fighting a Wraith!\" his expressions that of admiration, \"You know how they say, well begun is
