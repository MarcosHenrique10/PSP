now their intentions. You already faced one and certainly know what they are capable of \".\n  *goto questions\n # What is the League of Elementals\n  \"The League of Elementals is a refuge for those like you. It is where we stay, hidden from the world. It is form here that we ride forth to engage the Wraiths as and when they show up. The League was founded during the second insurgence and has been since protecting mankind against the Wraiths. We live in shadows and we leave in shadows. That is what been an Elemental is like. In time you will come to like this place and come to learn of our purpose as your purpose.\"\n  *goto questions \n # How long am I stuck here?\n  \"Well, until you learn to control how to use your powers. And don't worry about your friends and family they won't even notice that you are gone. We have very skilled Elementals who can handle manipulation of thoughts quite easily.\"\n\n  \"What about the manifestation event? Won't everybody know who I am?\" you ask.\n\n  \"No no no...... you see that is handled as well. All they remember about the night is that the thunderstorm set in then the lights went off and they all rushed in the building. After which a women walked in and tried to steal the cube.\"\n\n  \"How exactly are you going to do that?\" you ask in disbelief.\n\n  \"Well. That is a trade secret. See we must be sure that you are joining our ranks, otherwise you too won't remember much about that night.\"\n\n  \"And what happens to my powers?\"\n\n  \"If you stay here and train to use them? Then you can harness it as and when you will it. But if you leave now? Then I am afraid your powers will be muffled to prevent any future unwanted bursts, so that you can live a normal life.\"\n  *goto questions\n # You are done with the questions for now\n  You exit the room with a nod to the old man as you make your way to the hall. You decide that since you are stuck here for a while you might as well see the place. You start with the rooms on the right of the Hall which includes the room in which you woke up and a few others locked, probably because their inhabitants choose to do so but the other rooms are mostly recreational hosting a lot of activities including an arcade palace. You make your way back into the hall to explore the left side now as you spot the only two people who have talked to you in this place,the girl with the sandwiches and Brandon who punched you and kidnapped you. \n  You decide to,\n  *choice \n   # Ask the girl her name\n    The girl has done more than enough to ease you into this place and for that you feel obliged to thank her an also ask one more favour of showing you around the place. As you approach she places the plate carrying a bunch of incense sticks stuck in the mound of some kind. She smiles as you try to figure out the purpose of her deed. She notices your query and answers it without you asking it, \"It helps keep mosquitos away\" she says with a warm smile.\n\n    \"Oh\" you say, scratching your neck as you think of a way to ask her name.\n\n    \"Jessy\" she says as soon as the thought pops,up in your head. You look at her wondering if she can read your mind and suddenly she says, \"Yes\" she sighs on seeing you confused and continues to say, \"I can read minds. So can you. Well not yet but once you master the way to control your Base Element you can use that focus to develop what we call as 'the Phasal' powers.\" She grins before she asks your purpose of visiting her.\n\n    \"I thought, you know, that since I am stuck in this place, I could get to know where's what and who's who\" you say.\n\n    \"Right\" she says and points to the right \"Down there is our residential zone along with few indoor recreational. WHICH you have already seen.\" She says to which you remember to remind yourself not to think something stupid around her.  Jessy just grins at you before saying, \"Well that will not work and to the left is, well, how about I show you instead of telling you?\" \n\n    Without a chance to reply she drags you along as you pass through the door out the hall. The first thing you see is the giant mountain in the background of a playground. You are definitely not in the university. Heck you doubt if you are on the same side of the planet anymore. \n \n    \"Here is our training grounds which you will soon be participating and no you are not on the same side of the planet anymore.\" She says it almost gigging through the sentence.\n    *goto Ellie\n\n   # Tell Brandon to show you around \n\n    This guy punched you then dragged you here to this god awful place against your will, heck, against your knowledge. He definitely owes you some answers. And you are about to start with this place. \n\n    As he sees you approaching, he sighs at lets his shoulders slug a bit more before saying, \"Look, I am sorry for the punch but otherwise you wouldn't have agreed to come along\".\n\n    \"I still didn't\" you hiss at him.\n\n    \"And that just proves my point. Besides I can't just walk up to a ${genderguy} and say, 'we got this weird place with weird people somewhere and since now you are weird you can come join us'\" he says with a smirk on his face.\n\n    You barely manage to keep the chuckle inside as you continue to stare him down.\n\n    He sighs once more and slugs his shoulders further down as he puts forth an interesting proposal, 'Tell you what, since you are here because of me, I will show you what's what and who's who around here, Okay?\" \n\n    \"Okay\" you say still somehow staring through the strain on your eyes.\n    *goto EllieB\n\n*label Ellie\n*page_break\n[b]The Training[/b] \n\nJessy is respected and loved by all as you see her chiding some mischievous kids on the way to the training yard and getting the respectable nods from the others.\n\n\"Now, normally we could subject you to the basic training first. But for some reason Foyern has decided for you to be trained into the Elemental use directly. I couldn't recommend it though, given how tough the course is.\" taking a brief pause to squat away a wayward fly she continues explaining you the different aspects of training, \"The only good part is that you will be able to go back to your routine quickly. And that will mean less manipulation of the people that you know.\" \n\n*page_break\nYou follow her around a corner to reveal, what appears to be a practice ring. Inside it is a middle aged woman, skinny but commanding through her posture as she signals the other combatant to charge. With a single motion she ducks under the vines pouring through the hand of other and charges below the waist to slam the guy into the ring fence. \n\nYou overhear the remarks she imparts to the guy as you get close to the ring, \"....and that is why you never use your best offense as your first offense.\" She turns towards you noticing the pair of you moving towards her. \n\n\"That's the new one?\" she asks Jessy in a nonchalant manner.\n\n\"Yup. The one and only\" Jessy says in a dramatic fashion indicating you to step forth.\n\n\"Welcome to Ellie's training ground\" the woman says pulling you into the ring.\n\n\"Normally I would rather watch you learn to harness the powers without actually putting you through the ring but the old man has some ideas for you. So let's begin\".\n\nWithout another warning the woman charges you as you hold up your hand in defence but there is nothing strange happening to protect you this time as she slams hard into you propelling you to the other corner of the ring.\n\n*page_break\nYou get up brushing off your dress as you look back at her, \"What was that for?!\" \n\nEllie simply shrugs to say, \"Just testing if your powers are prominent or not. But it looks like little Kyle here might be better than you at using his powers\" she indicates a ten around year old kid standing near the ring forming a swan out of thin air made up of thin air. \n\nEllie helps you to your feet before starting another round. What seems like the longest morning, you are beaten around by the woman mercilessly. After two hours of getting beat up you finally give up on relying on your powers to show up and instead decide to settle this without them.\n\nEllie once again charges you but this time you move side wards to let her slam into the corner as you rush from behind to land a hard punch in back of her skull, sending her crashing into the ring. There are gasps and awes among those around as you look at them half,guilty for being so rash and hard on her but then the silence is broken by clapping from Ellie herself as she gets up. \"I must say I am impressed with your grit. NOBODY not even Brandon had the balls or the brains to beat me in the ring before. But you did so in just two hours of merciless beating that I gave you.\"\n\n\"Well that wraps up things for the morning session.\" Jessy says indicating for you get down from the ring, \"Let's get a look at the wounds shall we?\" she says leading you back to the hall, all the while you feeling smug for leaving an impression on the tough ass woman there. \n\nWalking back you ponder on whether this training was justified or just some way to vent anger for Ellie.\n \n*fake_choice\n # Totally Justified\n  Though she was hard on you, she did say it was because of the faith Foyern had in your abilites. Perhaps this is just a different kind of special treatment or just some tough love to get your invigorated.\n # Just for the fun\n  Though your training was supposedly jumpstarted, it wouldn't have hurt to have some warm-up sessions first. The beating you took today was even worse than yesterday. Perhaps there might be a silver lining to this some day, but today it makes you feel like a punching bag for the old lady.\n*set Jessy +20\n*finish \n\n\n*label EllieB\n*page_break\n[b]The Training[/b] \n\nBrandon is from what you gather, a no-bullshit kind of guy who is more focused on results than on the methods to get them. You walk besides him almost silently as he leads you out the door to reveal a playground with a mountain in the background. Wondering if you are at least in the same side of the country any more you ask him, \"Exactly where have you kidnapped me to?\"\n\nHe sighs once again, \"you are not even on the same side of the planet anymore. SO yeah, everything you see will be like a new experience for you. Meanwhile this is the foreground that we use for sparring or practicing solo. And in here..\" He says leading around a corner of the compound, \"....is where your training will begin under the legendary Ellie, who is old enough to be graveyard gatekeeper, if you ask me.\"\n\n*page_break\n\"Heard that Brandon\" says a middleaged woman standing in the ring making short work of her opponent and turning towards you, \"IS this the new one?\" she asks chinning a you.\n\n\"Yea, that's the one\" he syas shrugging before sighing once again, \"Get in the ring and let the old woman have her fun,\" he syas moving away to stand relying on a pillar in the side for support.\n\n\"Come on in now\" Ellie says giving you a hand to get in the ring as you.\n\n\"Normally I would rather watch you learn to harness the powers without actually putting you through the ring but the old man has some ideas for you. So let's begin\".\n\nWithout another warning the woman charges you as you hold up your hand in defence but there is nothing strange happening to protect you this time as she slams hard into you propelling you to the other corner of the ring.\n\nYou get up brushing off your dress as you look back at her, \"What was that for?!\" \n\nEllie simply shrugs to say, \"Just testing if your powers are prominent or not. But it looks like little Kyle here might be better than you at using his powers\" she indicates a ten around year old kid standing near the ring forming a swan out of thin air made up of thin air. \n\n*page_break\nEllie helps you to your feet before starting another round. What seems like the longest morning, you are beaten around by the woman mercilessly. After two hours of getting beat up you finally give up on relying on your powers to show up and instead decide to settle this without them.\n\nEllie once again charges you but this time you move side wards to let her slam into the corner as you rush from behind to land a hard punch in back of her skull, sending her crashing into the ring. There are gasps and awes among those around as you look at them half guilty for being so rash and hard on her but then the silence is broken by clapping from Ellie herself as she gets up. \"I must say I am impressed with your grit. NOBODY not even Brandon had the balls or the brains to beat me in the ring before. But you did so in just two hours of merciless beating that I gave you.\"\n\n\"Yea, whatever lets you sleep at night lady\" Brandon says indicating for you to follow saying, \"Let's get the wounds looked at before rid the poor woman of her delusions\".\n\nWalking back you ponder on whether this training was justified or just some way to vent anger for Ellie.\n \n*fake_choice\n # Totally Justified\n  Though she was hard on you, she did say it was because of the faith Foyern had in your abilites. Perhaps this is just a different kind of special treatment or just some tough love to get your invigorated.\n # Just for the fun\n  Though your training was supposedly jumpstarted, it wouldn't have hurt to have some warm-up sessions first. The beating you took today was even worse than yesterday. Perhaps there might be a silver lining to this some day, but today it makes you feel like a punching bag for the old lady.\n\n*set Brandon +20\n\n*finish", "cg1": "*page_break\nCollege, a place where everyone dreams of going to. For it is the best place to meet new people and party day and night with them. Or at least that was what you were told as. The reality lies a bit distant from it.\n\nThrough the high school you made up your mind to go to the college which will grant you bigger stage to display your talents. The premier institutes that you were considering to appear for, however, had incredible number of applicants each year, making it nearly impossible for a singular focus to grant an admission to you. As such you spent most of your time gearing up your profile for the institute, in order to be accepted without even a hesitation. \n\nEven with a multidisciplinary approach, you had to maintain a main area to focus upon. This was governed which college would expect you into the fold. With due deliberation you choose your core focus as\n\n*choice\n # The Swimming Team\n  A water person is what they called you since you were a kid. Once appreciated for your skills in the kid pool, you took the compliment damn seriously and pushed further and further into the deeper end of the pool ever since.\n\n  Your natural athleticism has made the job of landing a spot into the swimming team quite easy for you. Every day you start with a stretch, a jog followed by a long training session to enhance your swimming skills. Besides being the best swimmer in your school, the practice also made your body toned to the point where baring those abs was the thing for you (within limit of course). \n\n  In sixth grade you entered your first junior's pro contest and my did you leave an impression on the spectators. Though just a kid, your hard work was evident from the way you handled yourself along with the lopsided result table displaying your talent surpassing your age. This garnered more support from your family to make it possible to completely focus on your swimming. \n\n  The regulations of the school however, required certain grades to go along with it. Which you \n\n  *choice \n   # Had Surpassed Easily\n    It does help to have an engineer as a parent for your mother helped you through much of your studies excluding biology, which is not in the curriculum of an engineer. Despite the lack of spectacular performance in biology you more than made up for it in other subjects. \n\n    The teachers along with your parents were impressed with your work ethic in and outside the swimming pool too. With the Grade taken care of you could also concentrate more on the swimming lessons, enhancing your output on both ends, at least that is how your mother puts it.\n\n    This performance however did not sit well with your colleagues as most thought of you as an uptight know-it-all. The closest and probably only friend that you had was your neighbour Jack. Without much luck to talk with others, your social life suffered drastically.\n    *set Dominance +10\n    *set Brilliance +5\n    *finish\n      \n   # Had Struggled for most of it\n    The requirement of a C at an average may seem insignificant to most but the lack of any focus to studying may make it seem like an impossible target to achieve. Despite pursuing the rest of the time in studying you barely managed to push your grade average to the bare minimum. \n\n    This however meant your cool attitude from the swimming team carried you to be the most popular kid in the school. It doesn't hurt to get the heads turning every time you walk through the hall. The class also garners you with the praises and 'likes' for your slightest change in looks. For this part where you and your neighbour and best friend Jack ruled the school with your swagger.\n    *set Dominance +10\n    *set Eloquence +5\n    *finish\n\n # The Mathletes team\n  A born genius, and raised to be a better one, you always outshined everyone else when the time came for the brain-clash. Intellectual challenge always made you feel exhilarated. Always looking for the next challenge your parents found it difficult to raise you without proper guidance. When your aptitude score tested you to be exceptionally blessed with problem solving skills your parents immediately rolled you into the math camp for juniors. \n\n  This only furthered your interest as you made your way into the Mathletes team for the school. The star of the team you managed to carry the team through the toughest of competitions. This gave you lot of praise and appreciation from your parents as well as your teachers.\n\n  But being good at just the academics wasn't enough as the new curriculum also needed you to be good in your physical training programme. As such you\n  *set Brilliance +10  \n  *choice \n   # Barely Managed to Keep yourself afloat\n    With the intention of gaining an easy grade you enrolled into the wrestling team, as many students participate each year with almost no failing grades granted to any of them. You thought your probability to pass was high but the teacher in charge of wrestling knew your goal and made his goal to make your goal impossible to achieve.\n    \n    Each day he pitted you against the best of the team. Each day you were left bruised, beaten and badly hurt. And there was nowhere to complain. You gritted your teeth and continued through the course aiming at the grade at the end of it.\n   \n    However, when the time for final grading match came, the 43 years old teacher thought of making an example out of a sixth grader to make him feel better, I guess? He was the opponent that you had to face in the final ring. Within no time he pulled you up and threw you out in a single motion granting you an C for pity's sake after your gruelling requests.\n    *set Brilliance +5\n    *finish\n     \n   # Swept the rug with your opponents\n    With the intention of gaining an easy grade you enrolled into the wrestling team, as many students participate each year with almost no failing grades granted to any of them. You thought your probability to pass was high but the teacher in charge of wrestling knew your goal and made his goal to make your goal impossible to achieve.\n    \n    Each day he pitted you against the best of the team. Each day you were left bruised, beaten and badly hurt. And there was nowhere to complain. You gritted your teeth and continued through the course aiming at the grade at the end of it.\n   \n    However, when the time for final grading match came, the 43 years old teacher though of making an example out of a sixth grader to make him feel better, I guess? But apparently the hard work that he put you through paid off as you moved around to keep out of his reach further increasing his rage.\n    \n    When finally, he had enough of your insolence he moved in to tackle you only to find you missing from the intended position. The force that he put made it impossible for him to regain control as he stumbles out of the ring to resonate a large thud of your victory into the gym. With the fantastic display you also fetched yourself an A.\n   \n    This however meant an animosity with the entire popular wrestling team, for humiliating their coach. For most intent and purposes this was the bugle that ended your social life in school.\n    *set Dominance +5\n    *finish\n # Music, Arts and Drama\n  Always a free bird you found your skills to excess when you had to express yourself, be it through dancing, acting or painting. From painting house with a scenic view in the background to painting an abstract style modern painting that made waves in your school gallery. \n  \n  But just painting could not sate the art monster in you as you pursued dancing in school musicals with a few overtones of acting mixed in. Needless to say you were popular from the get go, with the guys and gals swooning over you. Soon your mere presence on the stage meant for a great show. Given this were only high school shows without much importance outside your town but still you where nothing short of a celebrity inside this little world of yours. \n \n  Eventually you even tried for plays in the local theatre, which many thought of as an eventuality. With your artistic dreams on track you had to also shift a slight focus on academics. As the new curriculum required both the academic testing and physical testing to be above C you decide to focus more on your weakness which was,\n  *set Eloquence +10\n  *choice\n   # Academics\n    Well, you are a free bird, and a free bird doesn't like to be caged especially inside a closed classroom where words beyond your comprehension fly around. You never where treated as the next Einstein, rather far from it but you at least had hoped for a better grade than you managed to scoop up. Barely floating with a C you pushed through the High school without much flair in academics.\n    \n    The sports however sung a different tune for you. You enjoyed the open air and a break from the monotonous nature of classrooms. Snatching almost any and every chance you could get to flee from the boredom you managed to outperform most when it came to sports with your sheer will. Securing an B was a child's play in your eyes. \n    *set Dominance +5\n    *finish\n   # Sports\n     Your artistic side carried further than most as you found the chemistry formulae nothing short of Picasso's creation, each one signifying a greater unknown depth that would elude the unwary. The physics intrigued you with its intricate relationship between different aspects of daily life. And biology, well let's just say that like many artists you were well versed in biology. Ahem, moving on Languages where no problem to you, given your interest in acting.\n    \n     The sports however held little interest for the artistic, fragile body of yours. You mostly avoided straining your calves, voice, fingers, eyes, skin etc. etc. in short everything of yours. This very much reflected in your grades when you received an C for your contribution as a water boy during home matches.\n     *set Brilliance +5\n     *finish \n      \n\n", "journeybackhome": "*page_break\nHalf- way through your packing, the afternoon passes slowly as you continue your preparation to head home. Given the circumstances the Dean has given permission to those that wish, to head back home. Your case was no different from the hundreds of others. The whole campus is emptying, only a few ou are family too\" you say breaking away from him.\n\n You smile and resume your packing before saying, \"And anyways, I seriously doubt that you will miss me when Dr. Chandy rolls out his Spring Break assignments.\"\n\n He snickers slightly before grabbing a sweater and folding it to place in your bag. The look you share is one of remembrance. For the entire month to come ahead, you won't be seeing him. \n *goto Train\n\n*elseif RomaSuma > 1 \n Suma, who is smiling but it is a nervous one. Out of all, she took your decision the hardest. Despite playing it off with one of her witty remarks, you know the sadness behind her words. \n\n She straddles next to you, hopping on the bed while you continue folding your clothes into your bag.\n\n \"Almost done packing, huh?\" she says peering into your bag, \"Good, Good. Don't want you missing the ride home, now do we?\"\n\n She hops back and heads for the door, you return to your work, saddened at the nonchalant behaviour. \n *page_break\n Suddenly she storms back in and pulls you in a deep kiss. Her tears stumbling down her cheek. You feel her wet kiss coupled with her tears. She locks you head with hers, placing arms around your neck. She cries with her eyes to the floor. \n\n Regaining her composure, she looks back up to meet your smiling face, \"What are you getting happy about, huh?\"\n\n She punches you playfully, \"Waited for me to break down, while all this time I expected you to at least wish me a proper farewell.\"\n\n \"I am coming back\" you say, \"It's not like my parents are withdrawing my admission. For end of the world or not, I don't think there is much scope for me without a degree in my hand.\"\n\n She snickers before wiping away her tears, \"Still there is still almost a month for the next semester to kick in. Till then who would I find to listen to my scripts?\"\n\n \"I am sure you will make do, by blackmailing some poor chum\" your reply gets you a punch once more, as Suma stands beside you, helping you pack. \n *goto Train\n\n*elseIf RomaRebecca > 1\n Rebecca, who walks towards you with a photo frame, of you and her. You cradle the frame in your hand, as you remember the day you snapped that one. It was when you choose to assist Rebecca in her research. Both of you beaming without the idea of what was to follow. It is a happy memory.\n\n You both stand leaning against the bed, relishing this memory, and the last moment probably for a forth coming month, before the college starts the next semester. \n *page_break \n \"That is my favourite\" she says, interlocking her fingers with yours. You return the grip of her hand as you turn to kiss her forehead.\n\n She rests her head on your shoulder, cherishing this moment as best she can. \n\n \"So, you will be gone, huh?\" she says.\n\n \"For a while\" you manage to gulp down the sad feeling of leaving her behind, \"In a month we will be together again.\"\n\n \"Seems like a long time.\" \n\n You sit there with Rebecca beside you, you don't know for how long, but you just wish you could for some more.  Rebecca gets up peering at her wrist to check the time, \"Looks like we need to hurry, if you re to catch the ride back home\" she says smiling nervously at you.\n *goto Train\n\n*else\n Rebecca, Suma and Matthew, standing in the door way, with a picture frame in their hand. \n\n \"We thought\" Matthew says stepping forth, \"Since this is your first spring break, you should have this, as memorabilia.\"\n\n He hands you a picture frame containing a photograph of the whole gang. You even managed to squeeze Leela in the picture. You remember that day, the day at the Experimental Science Department, the day when Miller unveiled his Sethren Formation, the day when your lives were changed forever. \n *page_break\n You cradle the frame, as the trio hops on the bed to sit beside you. Unable to control your emotions, your tear drops on the frame, looking at the gleaming faces of your friends. Rebecca standing there in an upright posture, with Suma beside her, looking for ways to ruin Matthew's expression before the camera clicks. And of course the siblings, Kertez holding a look of exasperation as his hot-dog is tipped over by Leela. There is even Jeffrey in this one, photobombing with his tongue stuck out and his hands playing an air guitar. \n\n The complete picture. \n \n \"I must say, ${name}, you did pull us together\" Suma says places a hand around you, \"I mean Matthew here, was one sorry case for a college student before you helped me introduce him to the vices of the College Life.\"\n\n \"I think that was all you, Suma\" Rebecca chips in.\n\n \"I don't think I have any vices other than friends like you\" Matthew says with a commanding voice.\n\n The room breaks into laughter, as you once again sigh and settle your gaze at the photo, of a memory of a past life.  \n *goto Train\n\n*label Train\n*page_break\nThe bus takes you to the train station where you await, the arrival of the 640, which will take you back home. There isn't much ceremony expect for the sad faces of your roommates, wishing you goodbye on your journey back home. \n\nYour arrival is marked with a bear hug from your father, and a teared up mother, with an annoying sister in tow. You smile at the grand display of affection from your family. Despite lacking the knowledge of your actual battle with the enemy, they treat you as if they knew every single detail of it. \n\n*page_break\n\nHome is more or less the same way you left it. Except the many buildings which are crumbled down and the scorched earth here and there. The marks left behind by the Wraiths no doubt. Your home also is not unscathed, there is garbage occupying the end street, showing the disarray of the public services following the attacks. But that is hardly the centre of attention. The famous Tree, which marked the end of the street of the gated community you lived in, is nothing but cinders now. The neighbourhood shows no signs of being looted, thanks to the precautions and the security of the people in the community.  \n\nYou draw away from the third hug your mother gave you since you arrived, as you head to the couch to check on any new development on the Wraith front. \n\n*page_break\n\nThe news anchor relays the news from the country, about the counter measures deployed by the government and the new effective measure taken to re-establish public services, when suddenly he taps on to his earpiece with look of shock he turns towards the screen once again. \n\n[i]\"Ladies and Gentlemen, this just in. There has been an attack in Kaeponga, the Einherjar University was the target. We head to Maurice on scene\"[/i]\n\nYou jump at the mention of the university, your ears peaked and your attention fixed. \n\n*page_break\n\n\"Maurice, what can you tell us?\"\n\n\"Well, Jim, as you can see behind me, one of those terrorists is blazing fire at the students down here. It appears as if they are herding the students. This might be a hostage situa...\"\n\nHer report is cut short as a hand probes from her body, the camera man stumbles away, trying to run from the one responsible for the murder of Maurice, but he doesn't make ten paces.\n\nSnatching the camera from the unfortunate victim, the killer adjusts the camera to face her. \n\nAs the camera settles on her, a gasp leaves you. It is the woman from the warehouse, she beams at the camera.\n\n*page_break\n\n\"For long has a pest thwarted our plans. Probing and prodding into matters ${genderhe} should not have. No longer, for now ${genderhe} shall taste the fruits of ${genderhis} actions. Whatever happens here, is your doing.\"\n\nYou feel her eyes piercing into you.\n\n\"We shall bathe in the blood of your friends here. And the blame shall rest on your head, for you dragged them into this war. Come and save them, little hero\".\n\nWith that she slams the camera on to the ground and the screen goes black.\n\nYou stumble back, unable to assess the situation. You feel your mother's presence as she drags you into another hug, probably happy at that you got home when you did. But she doesn't know that you being here is the result of the attack on the university.  \n*set family +1\n*goto_scene ending\n", "revelation": "*page_break\n[b]Chapter : Revelations [/b]\n\nYou find the morning come for you quickly as you stand in Foyern's study. He mills about in his extra,large, extra,messed,up library. Grabbing a book from the shelf about the size of a small anvil he walks towards his desk. Delicately he places down the monstrous book on the desk and wipes off the dust from it's top.\n\nHe looks at you briefly as he sighs before saying, \"You know we haven't been most forthright with you. The reason before was of course lack of trust of the council members in you. There is something you don't know about the Elementals.\" He opens the book in the middle and starts probing the pages looking for the special something, \"The League was founded by the singularity. She Granted us our powers. There were only the those she chooses to bless who became the elementals. We fought for mankind and when the wars subsided we took refuge here and thrived as a society. But our kind never mingled with the humans. We never took them in our fold nor we went in theirs. That way we could not be corrupted by the human desires. It stayed that way for a long time, of course until people, normal humans started manifesting outside the community. At first we thought of this as just a single anomaly but when more and more started changing we decided to look into THIS...\" He points towards the page he bearing a humanoid image covered within elements of all kinds, from fire for hair to the vines wrapped around its torso to the rock-like hands pointing to the sky.\n*page_break\n\"This is the prophecy which troubles Balzorin. It states that the 'outsiders', meaning those who manifest outside the community, like you will mark the time for second coming. \"He looks back to you before inst the wraiths forever.\" He says, his eyes crazy with enthusiasm as he continues, \"It is the gate to the vault of the ancients. A place filled with power enough to quell the wraith threat once and for all.\" He says before he sighs causing his excitement to dissipate with it, \"But I am afraid, I can't just waltz to the gate and open it. My old bones might not be able to bear the pressure of this task. And that is why the task falls to you.\" He says placing a hand on your shoulder.\n\nThe vault of the ancients : the name itself raises a million questions and ones which you would like to ask before making a decision are,\n*choice \n # \"What is exactly the vault?\n  \"As I said it is rimmed with power enough to defeat the wraiths forever. Imagine now more hiding in the mountains, no more secrets and more lost comrades. The vault was created as a contingency plan. They knew the declining Elements in each generation and prepared something for us to fight with. But they locked the gates with their power back then, and only a greater elemental than them could overpower the seal to open it.\" He finally takes a breather as he looks in your eyes with hope glistening from his, \"And that is where you come in.\"\n  *goto questions2\n # where is it located?\n  \"The location of the artefact was shrouded to many, including the council. The ability to locate the seal required mastery of the dark form, since it the element in which this book was written. The location would have remained hidden, if not for the dedication of Balzorin. But even he could not crack the seal once he found it.\" His expression suddenly turns grim as he continues, \"And under the guise of its safety he vowed to keep the location a secret, even from the council.\" He turns towards you once more, \"I will get the location from him in due time. Don't worry it won't be long. For once I have all the pieces I need.\" HE says with a grin plastered as that of a naughty kid about to play a prank.\n  *goto questions2\n # How to open it?\n   \"That is ever it gets tricky. The seal on the gate is more than a lock. IT is a test. A test of one's strength and skill in handling elements. Unfortunately, none born here could master all of them. But you have the necessary aptitude to do so. You can tame the elements if you put your mind to it.\"\n   \"How can I control elements outside the one I already can?\" you ask at this new revelation\n   \"With training of course\" He says \"But not just any training, I need you to work with every specialised elemental. When you understand their use, you can master them yourself.\" Spying the confusion on your face he gives you a reassuring smile saying, \"We will cross that bridge when the time comes.\" \n  *goto questions2\n # Why can't you send someone else?\n  \"Nobody else has the aptitude you have. Most of the outsiders would flee at the sight of a Wraith. But you fought them, not once but twice and yet you live to tell the tale. Let's just say that this calls for experience and attitude to see this task through. And there isn't a better candidate than you.\" \n  *goto questions2\n # Can you take someone with you?\n  \"I am afraid you can't. Just like me Balzorin has also handled training of the recruits here. We never know when someone may turn you over citing your intention to open the vault for the greater good. But this may spook him and he may try to fail you to expel you from the league and see his agenda through.\" His expression fights between anger and reason, \"and we can't allow that to happen,\"\n  *goto questions2\n # Nothing more to ask\n  \"Good then.\" He says, \"We should be able to stop the war before it even begins. And it will be possible only because of you. This will secure an entry to all the outsiders who need our help in understanding their affliction\".\n  *goto ChoiceFoyern \n\n*label questions2\n*page_break\nFollowing the last one you continue for the next question in line.\n*choice\n # where is it locat re. We never know when someone may turn you over citing your intention to open the vault for the greater good. But this may spook him and he may try to fail you to expel you from the league and see his agenda through.\" His expression fights between anger and reason, \"and we can't allow that to happen,\"\n  *goto questions2\n\n # Nothing more to ask\n  \"Good then.\" He says, \"We should be able to stop the war before it even begins. And it will be possible only because of you. This will secure an entry to all the outsiders who need our help in understanding their affliction.\"\n  *goto ChoiceFoyern\n\n*label ChoiceFoyern\n*page_break\n\"First, are you ready to do this?\" he asks you with lingering hope in his words.\n*choice\n # Yes.\n  He almost jumps as he clasps your shoulders in his palms. Beaming at your words he takes sometime before regaining his semblance as he continues, \"The first order of business is training you more in the aspects to master your elements. Don't worry, you don't have to face Ellie in the ring again for the another month. Instead I will assign you with a few chosen candidates on special missions. For others these mission will be related to the findings at the warehouse but for you these are merely to gain insight on different elements. Once you know their creation symbiosis, you can manifest them yourselves.\"\n\n  He turns towards the door as he ushers you towards the hall. \"Your first assignment will be today itself. The wraiths already have plans in motion and we cannot afford to lose any more time. The details will be relayed to you by Jessy.\"\n  *achieve cop\n  *goto nightafter  \n # Not yet\n  Saddened by your words he tries hard to hide his disappointment in them.\n\n  \"Are you sure? Cause without you we could not open the gate. When I recruited you I thought you would be perfect for this. The perfect Elemental.\" He turns to face away from you, \"Take your time, think about it. In the meantime, I will try to prepare other aspects regarding the vault.\" He says in hushed whispers.\n\n  \"I will, in time\" you say as you make your way out of the study towards the hall.\n  *goto nightafter\n\n*label nightafter\n*page_break\nYou return to the hostel garnered many questions about your disappearance last night, especially the weird hoodie guy who signed your application. But as turbulent your night was you could hardly form any valid excuses and just make do with whatever pops,up in your mind. \n\nYou grab your bag and head out to attend the remaining lectures before the day ends. The one you look forward to is the immediate next one. As you hope the one person whom you share your campus trepidations with could help you, put your mind to ease a bit. It is the one lecture you share with.\n*choice\n # Rebecca\n  She is as usual, engrossed in her research as you make your way down to the lab. As you near the experimental sciences building you spot Dr. Miller talking to some guy dressed as an old English aristocrat. \n  *page_break\n  \"But such a thing might result in great losses., Inexplicable consequences\" miller says with direness clear from his tone.\n\n  \"Then I am afraid I can't help you\" The English guy says turning away from Miller, \"The company I represent doesn't wish to hire a moral crusader. We wanted a scientist, a brilliant mind that we can employ. But it seems you are neither brilliant nor pragmatic and the world has already taken away the right from you to call yourself a scientist.\" The guy gets into his car waiting at the inner street of the campus and tips his hat at Miller before saying, \"Think about this, Dr. Miller. And when your morality doesn't shroud your intelligence, contact me.\" He rolls his windows up as the car disappears down the corner. \n\n  Dr. Miller stands there with the card from the guy in his hand looking at it with careful consideration.\n  What do you make of this conversation?\n  \n  *fake_choice\n   # A coup in planning\n    From the looks of it and the hushed tone of the two, perhaps there is more than it meets the eye. The aristocrat does have a certain aura about him that concerns you. Not that you are believe in superstition but heck, you just found you can bend an elemental to our will, don't be suprised if other such things pop up.\n   # Just another power grab \n    In today's world that is not an uncommon scene. Every time a talent sees itself facing adversity, some rich company steps forth to claim there talents for a cheap price and tons of shame to go with it. \n \n  With your mind preoccupied with other things you decide against approaching him to probe into the matter any further.\n  *page_break\n  Inside you find Rebecca milling about her workplace as she continues to rampage the desk in search of something. \n\n  \"Lost something?\" you say as you approach her.\n\n  She looks up at you briefly before sneering a comment in your direction, \"At least I didn't lose my back to the room, unlike you.\"\n\n  Taken aback by the unexpected hostility you spring back at the comment.\n\n  Catching her breath and sobering up a bit Rebecca looks at you once again, \"I am sorry I had this document that I needed to file today and I can't seem to find it now. I should have kept it pinned up on the desk.\"\n\n  \"What it looked like?\" you ask making your way behind the desk, \"May be I can help you find it?\"\n\n  \"A yellow page under with the departments letterhead stamped on the top.\" She says ravaging through the pages on her desk.\n  *page_break\n  You look at the desk once and spot the page she was talking about right on the board, pinned up there. You carefully pluck the paper and hold it in front of her. She adjusts to look at it and turns towards you, \"Where was it?\" she asks.\n\n  You shrug to say, \"I guess you did remember to pin it up so as to not forget about it. But I guess you forgot the fact that you did pin it up.\"\n\n  Smacking herself on her head she puts the document in a file lying  whole debacle helped you put the incident at the back of your mind as the thought of Rebecca returning your feelings is already making its home in your head for the foreseeable future. \n\n   *set Rebecca +10\n   *goto Nesoravisit\n\n  *else\n   She turns towards you with more of her initial anger as she smacks you hard on your shoulder.\n\n   \"What were you thinking running away from us yesterday?\" she continues smacking as she says, \"Didn't even have the courtesy to tell me. You know how worried I was. Even the guard said there was something funny about that Hooded figure.\"\n\n   \"IT was just a friend who was in town and thought we could hangout before he left.\" You say raising your arms defensively.\n\n   \"A friend huh?\" she says closing in on you, \"You mean as in a boyfriend?\" she asks with a teasing tone.\n\n   \"Nothing of the sort. Just a friend who wanted to hangout. That is all\" you say.\n\n   \"SO what did you do yesterday? Went to the club or some house party or to some late night showing. Perhaps?\" she says turning to arrange the file she pulled out.\n\n   \"Just sight-seeing\" you say.\n\n   \"IN the night?\" she says peering over her shoulder at you, \"Looks like you got some exotic tastes\" she says grinning from cheek to cheek.\n\n   The conversation goes on for the next hour or so as your assistant hours with her comes to an end and you pack up your stuff to prepare for the next lecture. The long small talk you had with her has certainly helped you recover from the last few days. \n\n   *set Rebecca+10\n   *goto Nesoravisit\n # Matthew\n  Matthew and you share the class of Dr. Miller and have since bonded on the effort to revitalise the old Dr. Miller into existence. Today as you are making the way to the class you spot Matthew standing near the experimental Science Department. You approach him and as he spots you he prompts you to look at the entrance where Dr. Miller seems to be engaged in deep conversation with a guy dressed as an En
