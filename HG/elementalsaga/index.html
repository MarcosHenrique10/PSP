<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elemental Saga: The Awakening — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>

    <button id="btn-menu" class="btn small">&larr; Games</button>

      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "elementalsaga", "title": "Elemental Saga: The Awakening", "scenes": {"backatcampus": "*page_break\n[b]Chapter III : Back at the campus[/b]\n\n\"Well, all things considered, I would say a job well done\" Balzorin sitting across you at the Einherjar, \"Wish we could wrap things in London quickly but the attack has crippled most of the country. The stranglers don't help either. Anyways debriefing can be charted for later. Take some rest. You have earned it. And don't worry I will handle the rest\".\n\nWith that he pulls his disappearing act to teleport wherever he was needed next. You peer around to see if anybody noticed that, but the empty canteen with only one server whose eyes are fixed on any news update on the wraith attacks.\n\nYour country was shaken by the attacks but the only severity of it was faced in the city of Kaeponga within which Einherjar was located. The University vacated the campus and faced a month long shut down before things resumed to normal. From what you witnessed, their purpose was to steal the machine from Miller. The corporation that he pledged his employment to was no doubt a front for the wraiths.  \n\nYou step out the canteen to see the same old campus, and take heart that not all has gone awry in your life. Suma never left the city, too attached to the campus and the college. She was not alone though. Upon hearing her decision to stay, Matthew and Rebecca joined her. Leela and Kertez on the other hand, spelled a different story. Their affluent and pompous parents made the grand display of arriving with an entourage of bodyguards to pick up their kids. Both wanted to stay but had little say in that matter. As such you have not heard from them yet. \n\n*page_break\n\nThe room has served as a great place to relax and kickback, pretending that the world is just the same that it was at the start of your college life. A few lectures do take place, but most of the faculty had evacuated and has yet to return to duty. The university's deep pockets helped it re-establish its operation quite quickly. \n\n\"Took you long enough\" Suma says opening the door for you, \"See, I made a new script\" she says handing you the ragtag bunch of papers, \"Cramped up in that motel, this was the only thing that kept me sane. Especially since we had to eat the backed up vegan food, that Rebecca has stashed.\" \n\nHer snicker is matched by the glare of Rebecca, who now steps into the hall, and joins the pair of you. \n\n\"Well, it was either my cooking or your boots for dinner. Didn't hear you complain back then\" Rebecca's stern voice gets an instant defensive gesture from Suma, \"I was appreciating it, you know. That the food helped me channel my focus on the task at hand.\" \n\nRebecca snickers, jabbing Suma playfully before turning towards you, \"Heard from your family yet?\" she asks, her tone more sombre this time, you nod turning away from her.\n\nYour family much like Kertez and Leela's decided that Kaeponga was to unstable for you to be in. The attacks on the city, the news amplifying the damage, it all compelled them to call you back home.\n\nDespite the spring break looming over the corner, your mother has been adamant towards your return. Nothing you could say swayed them otherwise. On one hand you could reunite with your family get some down time, on the other hand you will be leaving your friends who have opted to stay behind till the break. \n\nBut the decision is ultimately left for you, \n\n*choice\n # Stay and complete your semester\n  The choice is made, you are to stay and complete your semester, despite the crazy shenanigans that you pulled throughout the year. Plus, it would be wasteful to deny yourself the much needed kick back time with friends. \n\n  Though the choice does not come without its vices. Your mother will be in fury mode when she hears of your decision, not the wisest course of action ${gendermr}. But you can cross that bridge when the time comes.\n\n  For now, Suma's script, Matthew's extra credit work and Rebecca's Vegan Platter await you.\n  *achieve friends\n  *goto SpringBreak\n\n # Go home in hopes of avoiding the wrath of your mother\n  Having experienced the hellish feeling of being on the bad side of your mother all too often, you don't think you want to be there once again. This time though she cant even force you to do what she wanted, not from home she cant. But you have no doubt she will come for you if you don't go to her, and when she does you can expect nothing short of a third degree for your insolence.\n\n  It's true what they say, hell hath no fury like a mother scorned . Well at least you say that. \n  *achieve family\n  *goto Homecoming\n\n\n*label SpringBreak\n*page_break\n\"Don't worry ${name}, it took my parents weeks to get around. And given how you were stuck in the city yourself, may be they contacted here while you were out.  And that may be the reason for their reaction, you know\" Suma says reassuringly.\n\n\"Well, I am staying.\" you say beaming at the duo, \"Someone has to bear Suma's script and Rebecca's cooking.\"\n\nSuma punches you playfully while Rebecca snickers at your comment.\n\n*set Friends +1\n*goto campusfun\n*page_break\n\n*label Homecoming \n*page_break\n\"Don't worry ${name}, it took my parents weeks to get around. And given how you were stuck in the city yourself, may be they contacted here while you were out.  And that may be the reason for their reaction, you know\" Suma says reassuringly.\n\n\"I don't think my mother will come around. She will come to take me home, if I didn't leave any way. So it's not like I got a choice\" you say, your head bowed.\n\n\"Hey\" Rebecca places a hand on your shoulder before continuing, \"We get it. I mean, not every parent has given up hope like Suma's have.\"\n\nSuma snickers saying, \"Ouch, uncalled for\" she chases Rebecca around the room, you too follow them.\n*set family +1\n*goto_scene Journeybackhome \n\n*label campusfun\n*page_break\nYou head to the campus canteen to grab some brunch with the gang, planning on splurging good on the specials tonight. You called your home but no body picked up. It bothers you a little given how, they should have been home, given how the country is still recovering and offices and non-essential companies are down for business. But you guess they might have some other things to deal with.\n\n\"Don't fret, it might just be the broken service\" Suma says trotting besides you.\n\n\"I don't think so,\" you say matching her pace, \"I can get through but there is no one at the receiving end.\"\n\n\"Then they must out, you know, with the relief centre or something. My parents told me that since most of the markets are closed, along with the malls, the Government have established relief centres to hand out rations to people.\"\n\n\"May be\" your mind still at unease.\n\n\"Either way, worrying about it is not going to help. You can try again later. They have to home at night, I am sure they will pick up\" Matthew says drawing close to you. \n\nWith now news from your family, what do you do?\n\n*fake_choice\n # Use the Teleportation stone\n  You cradle the stone in your pocket, feeling the smooth surface of it, pondering whether to use it to do a quick check on your family. But then you look at your friends and decide against such a course of action. \n # Try calling them again\n  You cradle the phone in your pocket, feeling the smooth surface of it, pondering whether to use it to do a quick check on your family. But then you look at your friends and decide against such a course of action. \n\nPerhaps your mind is playing tricks on you, worrying too much. But who can blame you. You have seen the horrors the Wraiths brought in London. But for now, you push such thoughts at the back of your mind. \n\n*page_break\n\nThe server approaches your table, which is the only one occupied in the whole canteen. Perhaps as many others have already left the campus, heading home to their family. No doubt they were pressurised into coming home, just like you were. But look at you, the little rebel. You are sitting here, disobeying your family, ready to face whatever wrath your mother can conjure. \n\n\"What will be your choice today?\" the waitress asks drawing forth her notepad to note your order.\n\n\"The Vegan Platter please\" Rebecca says beaming at the waitress.\n\n\"The steak with extra juice, and a crispy side bacon\" Suma says looking intently for the look of disgust to show up on Rebecca's face.\n\n\"Just a hamburger\" Matthew says, but he quivers under Rebecca's gaze and rethinks his order, \"A Veg one please\" he says sighing as he does.\n\n\"And you?\" pointing towards you the waitress waits on you.\n*fake_choice\n # The Special Vegan Platter \n  Rebecca beams at you while Suma rolls her eyes. Matthew has no opinion as he is too distracted by his lame order. \n # The Special Healthy Platter\n  Rebecca beams at you while Suma rolls her eyes. Matthew has no opinion as he is too distracted by his lame order. \n # The Special Meat platter \n  Suma fixes her gaze on Rebecca, beaming as she does. Rebecca in turn scowls at you, for your choice. Matthew has no opinion as he is too distracted by his lame order. \n\nYou simply shrug your shoulders as you wait for the order to come. In the meantime, you turn towards the group to find.\n\n*if RomaMatthew > 1\n Matthew smiling at your nervously. He draws his chair near you, as he locks his fingers with yours, \"I am glad you choose to stay. And I know your family must be barraging you with summons from home, but I really like how you braved the decision to stay.\"\n\n You return his grip, and draw closer to whisper in his ears, \"Well, I just thought that the two weeks left of the Semester, with nothing to do, will mean more time for us to do something.\"\n\n His cheeks flush red as you grin at him coyly. Regaining some of his composure he tightens his grip on your hand, and draws you in for a kiss. \n\n It doesn't last long, as Suma screams, \"Get a room, you two\" Matthew whispers a quick sorry as he draws away from you. \n\n You still steal glances as you wait for the waitress to return.\n *goto meal \n*elseif RomaSuma > 1\n Suma beaming at you, \"You know. This empty restaurant...\"\n\n \"Canteen\" Matthew says in the background.\n\n \"Whatever.\" Suma says chiding him, \"Is giving the first time we are sharing a meal together. You know ever since we two hooked up.\"\n\n Rebecca spills the half swallowed water out on the table, spurting, \"Hooked up?! Don't tell me you 'hooked up in the room you two share with us?!\"\n\n \"No, not that hooked up\" Suma says to Rebecca, \"Though it does give me an idea for later tonight\" she says coyly, stealing glances as Rebecca goes on about how it is bad for everyone else, if you two hooked up. \n\n You just smile and wait for the waitress to roll in with your orders.\n *goto meal\n*elseif RomaRebecca > 1\n Rebecca, who scoots over to you. She drags out something from her purse. You wondered why she carried that, but when she reveals what was inside, you know why. \n\n She hands you the photo frame, which contains the photo of you two. You cradle the frame in your hand, as you remember the day you snapped that one. It was when you choose to assist Rebecca in her research. Both of you beaming without the idea of what was to follow. It is a happy memory. \n\n She leans in, relishing the memory with you. \"That is my favourite\" she says, interlocking her fingers with yours. You return the grip of her hand as you turn to kiss her forehead.\n\n She rests her shoulder on your shoulder, cherishing this moment as best she can. \n\n You sit there just relaxing feeling the weight lift from your shoulder, well, that is until Suma spots you and follows with her witty remark, \"Oh, Matthew look at them\" she says in over dramatic tone, \"They will now grow old together, hand in hand. Phish!\"\n\n You ignore her and return your attention to the one woman that matters currently. \n *goto meal\n*else\n Rebecca, Suma and Matthew, with a picture frame in their hand. \n\n \"We thought\" Matthew says stepping forth, \"Since this is your first spring break, you should have this, as memorabilia.\"\n\n He hands you a picture frame containing a photograph of the whole gang. You even managed to squeeze Leela in the picture. You remember that day, the day at the Experimental Science Department, the day when Miller unveiled his Sethren Formation, the day when your lives were changed forever. \n\n You cradle the frame, as the trio hops behind you to gaze upon it. Unable to control your emotions, your tear drops on the frame, looking at the gleaming faces of your friends. Rebecca standing there in an upright posture, with Suma beside her, looking for ways to ruin Matthew's expression before the camera clicks. And of course the siblings, Kertez holding a look of exasperation as his hot-dog is tipped over by Leela. There is even Jeffrey in this one, photobombing with his tongue stuck out and his hands playing an air guitar. \n\n The complete picture. \n\n \"I must say, ${name}, you did pull us together\" Suma says places a hand around you, \"I mean Matthew here, was one sorry case for a college student before you helped me introduce him to the vices of the College Life.\"\n\n \"I think that was all you, Suma\" Rebecca chips in.\n\n \"I don't think I have any vices other than friends like you\" Matthew says with a commanding voice.\n\n The room breaks into laughter, as you once again sigh and settle your gaze at the photo, of a memory of a past life.  \n *goto meal\n\n*page_break\n\n*label meal\n*page_break\n[b]Epilogue : The Dish Served Cold[/b]\n\nThe waitress brings forth the four large plates carefully juggled between her two hands. She places thee dishes on the table before following up, \"Anything else you might need, cause the chef thinks it is too much waste of her time, to cook for only four. \"\n\n\"Nothing else, much thank you\" Rebecca says smiling at the disinterested waitress.\n\nJust as you are about to poke at your meal, your phone vibrates indicating an incoming call. You draw out the phone and step out explaining the call from home. You get approving look than annoyed one, for disturbing their meal.\n\n*page_break\n\nYou accept the video call, as a woman comes into focus. It is your mother, tied to a chair, with a cloth stuffed in her mouth. She screams but those are muffled against the cloth. \n\nThen the camera she shifted, it settles on another woman. This one you recognize with a dread. A gasp leaves your mouth as the woman beams back at you.\n\nYour old acquaintance, the latex woman from the warehouse. Her smile enlarges on seeing the recognition and dread in your eyes.\n\n\"Missed me little ${genderhero}?\" she says in a teasing manner, \"Your family misses you too.\" She draws a knife and places it close to your Mother's neck drawing forth a slight trickle as she does. \n\n\"Don't you\" the words leave without recognition from you.\n\n\"Don't I what?\" her expression changes to one of anger now, \"You pest, you probed and prodded into matters of no concern to you. Playing the ${genderhero} saving the day, thwarting our plans, which were eons in making. Foiled all of them. Because of YOU.\" \n\nShe turns back to your family, holding her knife towards your sister, as your father and mother desperately try to struggle against their bonds, \"But now, I shall have my revenge. Your choice ${genderhero}, either I spill your blood, or that of your innocent family. The ball is in your court. Don't keep me waiting.\" \n\nThe feed cuts leaving you gasping at the screen. Your family is with a maniac, a crazy Wraith who is hell bent on getting her revenge on you.   Your mind reels, unable to comprehend the turn of events, you just witnessed.\n*set friends +1\n*goto_scene ending\n\n", "brandonalive": "*page_break\n\nWith a heavy head and an excruciating pain that still lingers in your midsection as you flutter your eyes open. The event of last night is still fresh in your mind as you try to get up. The only possible consolation of yesterday was that you saved Ellie. For now, you get your bearings, slowly moving towards the closed window. From the looks of it you are in the healing chamber. You open the window to find that the sun strikes closer to noon by now.\n\nAs you lose yourself staring out the window reminiscing about the fight the door creaks open.\n\n\"Thinking about it will help you process it.\" Jessy says entering she looks at you for a while before punching your shoulder as you ask her, \"What was that for?\"\n\n\"for disobeying a direct order\" she says plainly, \"the way you fought her, I hardly think the council will punish you for it but it doesn't mean you don't deserve to be punished.\" She sneers at you before continuing, \"Though it was nice of to help the idiot Brandon\".\n\n*if RomaJessy > 0\n\n She sits next you as you sit on the bed yourself. Slyly she reaches for your arm before turning towards you with tears down her cheeks as she tells you with a trembling voice, \"When Brandon came back yesterday and told us of you fighting the woman alone.\" She sobs a little before hugging you resting her head on your shoulder, \"I thought I lost you. And I thought I lost my chance to tell you .........\" she sobs as the wet sensation of her tears becomes prominent on your shoulder. She backs away before punching you once more, \"Never ever do that again. I have lost one too many friends and I don't want to lose another\" She says before getting up.\n\n You probe her of what she wanted to say to you but she simply avoids the topic and discusses with you the events before the last night. Apparently Brandon tricked you into helping him. His orders were clear to not try to rescue Ellie. Since you were close and unaware of the council's decision you were the perfect candidate for him. \n\n He was right abou s in your honour including the little kids who raise their collectible glasses shaped like their favourite superheroes. \n\nThe rest of the night passes in praises and compliments as one after the other the elementals come forth to thank you for saving Ellie. Through the crowd you see Brandon sulking about in the corner avoiding everyone else. When you see him you he waves you over as he once again blends into the shadows. \n\n\"You probably know about it by now. So I am not going to insult you any further by lying to you.\" He says as you approach him, \"I never meant for you to get hurt. I rather would have stayed and let you carry El. Well that is what I planned for anyway. But when I saw her like that.........\" he pauses briefly before wiping his tears away with his trembling hands, \"I could not think of anything but to get her to a healer. And I was wrong, even Ellie would not forgive me for this.\"\n\nYou place a reassuring hand on his shoulder before saying, \"It all worked out in the end. And Ellie's safe thanks to you.\"\n\nBrandon sighs before continuing, \"That is not how it works. I risked your life. You were untrained and untried. I might have just handed you a death sentence. Thank the maker though that you were skilled enough to hold her off.\"\n\n*page_break\n\nBefore you could converse anymore you feel a hand on your shoulder as you turn to find Foyern standing behind you,\n\n\"The council needs to speak with you\" he says leading you to the study. Balzorin, Mel and the beach boy are already there waiting for you and Foyern to join them. \n\nYou are allowed to take a seat citing your injuries from yesterday as Balzorin looks at you with intent, \n\n\"Did you feel anything odd in the warehouse before your fight?\" he asks, \"like a strange smell or strange sensation\".\n\n\"Apart from the pain that is still lingering?\" you ask him almost innocently. \n\n\"He means anything that stood out even in the middle of a fight?\" Mel says.\n\n\"Nope. Nothin
