me socially taboo project.\" Matthew says.\n\n  \"Like what?\" you probe.\n\n  \"Maybe something that he was working on in the past or maybe the Sethren combination perhaps? Who knows? But whatever it is, it has him worried and from the looks of it he was closer to Alfred Noble after discovery of dynamite than to Newton after gravity.\"\n\n  \"Which means what exactly?\" you ask unsure of the out of your jurisdiction reference.\n\n  \"Meaning he isn't proud of his invention with regards to its possible applications. Perhaps it has some hidden military application which might result in death and gore of many. And that Miller wants to keep his hands free from any blood.\" He says as you near the classroom itself.\n\n  \"All a mystery\" he says grabbing a front row seat.\n  *page_break\n  You seat next to him and as you reach into your bag you catch an investigative glare from him.\n\n  \"Speaking of 'mysteries'\" he says, \"What was with last night? Just decided that to run away from the hostel with a shady guy you found on the way?\" \n\n  \"IT was just a friend who was in town and thought we could hangout before he left.\" You say raising your arms defensively.\n\n  *if RomaMatthew > 0\n\n   \"And you thought you should just go out without even informing me?! You know how worried I was?! I spent the better time of last night investigating your disappearance only to be troubled more when I found that some shady hooded guy checked your application. Which resulted in the latter half of my night to be haunted by the implications.\" \n\n   \"I am sorry I should have said something but it was just that, it happened suddenly and I had to leave quickly.\" You say with an apologetic tone.\n\n   \"Next time I will be sure to give you a heads up\" you say only to get a fierce glare from him.\n   *page_break\n   \"There will be no next time! Next time I check out the person you are hanging out with before you get any ideas of going aloof with them\" he syas adjusting in his seat a bit before continuing, \"Speaking of which, who was this friend of yours?\" he says with a guarded tone.\n\n   \"Just a friend\" you say.\n\n   \"Only a friend as in as friend with whom you share no special feelings?\" he asks the inquisitive jealousy clear in his voice.\n\n   \"Nope. Nothing of the sort\" you say curious at the implication at hand.\n\n   \"Good. I mean for you, of course\" he says blushing heavily at his last words.\n\n   The rest of the lecture goes on in teasing him as you cherish the thought of Matthew returning your feelings in an earnest.\n\n   The thoughts and trepidations you faced at the warehouse are long in the back of your mind as the current development grabs your attention.\n\n   *set Matthew +10\n   *goto Nesoravisit\n\n  *else\n   \"A friend from where?\" he asks as he goes to mill about in his own bag pack.\n\n   \"From the championship. He said he was in town for a while and needed to see the sights before heading back out\", you say.\n\n   \"Seemed awful late to go for sight,seeing.\" Matthew says as Miller takes the helm at the class.\n\n   The rest of the class goes by in a blur as you once again resume in your efforts to rekindle the passion in DR. Miller along with a helping hand from Matthew.\n\n   The continuum of the regular schedule does take your mind off of things as you relax more shoving the events of days before into the back of your mind.\n\n   *set Matthew +10\n   *goto Nesoravisit\n\n # Kertez \n  The arena is mostly empty with the granted exception of Kertez and your other classmates preparing for the swimming class. Since this is an advanced swimming class this semester, you see mostly those which are pursuing swimming as a profession. Everybody embodies the professionalism as you change yourself to approach Kertez, who might be the only one to already jump in the pool to float about the edge in a carefree manner. \n\n  \"Hey my ${gendermyman} its you. Thought you would be long gone to kingdom come by now. Given how you left with the shady dude that is.\"\n \n  Before you could respond the coach yells at Kertez to get out of the water until he finishes his instructions. Kertez seems to ignore him which causes him to march to you both and fix a fierce gaze at Kertez.\n  *page_break\n  \"GET OUT OF THE POOL OR I WILL FAIL YOUR SORRY ASS ONCE MORE\" he says, his veins on the forehead budging at this point. Kertez continues to ignore him to further elevate his anger. He turns towards you now,\n\n  \"Get Kertez out of sight or I will fail you both even before the exam. GET THE INSOLENT PIECE OF CRAP OUT OF HERE\" He says marching back to the rest of the group before you can object to the ludicrous decision.\n\n  You turn towards Kertez to find him already out of the water and grabbing the towel.\n  \n  \"Come one now bud. That seemed like a punishment enough for you\" He says as he head to the changing room.\n  *page_break\n  Once changed and out you decide to probe into his sudden change in behaviour.\n\n  \"Nah. I aint pissed at the coach. I just wanted him to yell at you so that I don't have to do it.\" He says in a nonchalant way.\n\n  \"That is idiotic there is something more than you do let on. I want you to be clear about it to me now\" you say obejectively.\n\n  *if RomaKertez = true\n   \"Like you were when you turned up missing last night\" he says as you see the first time him respond with anger, \"The first day we met I thought of you as someone who could be there for me. Not like the countless others who just bolted away from me, the first chance they got. Even my own sister likes to be popular at my expense. And yes LEELA is MY SISTER\" He says almost screaming out the last part, sighing and drawing deep breaths he sits on the bench outside the tennis court as he looks at the floor beneath.\n\n   \"I am sorry\" you say, \"I didn't bolt on you. I just ran into a friend who happened to be in town. He wanted me to show him around so I left\" you say grabbing a seat next to him.\n\n   \"Without even a warning ,Hey Kertez, I am going out to town with my boy friend so don't care about me while I am out\", he says.\n\n   \"He isn't my boyfriend you know\" you say explaining to him.\n\n   \"He wasn't?\" he says with genuine surprise on his face, \"Then that's good.\" He says before blushing slightly.\n\n   \"I mean, the guy looked shady and who wears a hoodie in the middle of the summer?\" he asks.\n\n   You peer over his back to look at the hoodie of his sweat shirt to which he simply shrugs and says, \"Apart from me, I mean\".\n   *page_break\n   \"Anyways' what was the matter with the whole coach incident?\" you ask.\n\n   \"Nothing\" he says shrugging. \n\n   \"It was clearly not nothing and since I cleared your doubts I think you should return the courtesy\" you say pointedly. \n\n   He sighs before he sets his gaze at the floor, \"The thing is, the only thing I am good at is swimming. Always was, and always will be the best I am when I am in water.\"\n\n   \"Then that is a great thing. I always wondered how did you flunk when you can swim like you do.\", you say. \n\n   \"That is the thing. Outside water I am just a 'Klutz'. And I don't think I can go through with the day without the release that the swimming gives me. It sets me free, you know\" he says as he looks at you with a look of pity.\n  \n   \"There are other ways to swim than to just fail every year. We could try out for the swimming trials next week\" you say placing a reassuring hand on his shoulder.\n\n   \"Nah. I don't think I can get a place. Besides I think me fate is already sealed in the swimming class today.\"\n   *page_break\n   \"NO can do mister.\" You say standing up as you drag him up and towards the arena, \"We are both signing up for the swimming trails. And you my friend are going to mesmerize everyone.\" You say on the way.\n\n   You find the sign sheet and sign both your names on it before turning to face Kertez once more, \"There all done. Now you have reason to be in the swimming pool as much as you want\".\n\n   \"Thanks\" he says taking your hand in his and giving it a little squeeze, \"Not a lot of people would have done what you did for a 'Klutz', at least nobody I know of \"he says chuckling slightly. \n\n   \"Well there is one Klutz that I would do anything for\" you say returning the squeeze.\n\n   Kertez blushes heavily at the implication of this and starts to look around before saying, \"There is the next class I have to attend, so I should leave immediately\" he darts out the arena without another word.\n\n   The haunting thoughts of warehouse gone you are left with a feeling of warmth as you cherish the thought of Kertez returning your feelings.\n\n   *set Kertez +10\n   *goto Nesoravisit\n\n  *else\n   \"Like you were when you turned up missing last night\" he says as you see the first time him respond with anger, \"The first day we met I thought of you as someone who could be there for me. Not like the countless others who just bolted away from me, the first chance they got. Even my own sister likes to be popular at my expense. And yes LEELA is MY SISTER\" He says almost screaming out the last part, sighing and drawing deep breaths he sits on the bench outside the tennis court as he looks at the floor beneath.\n\n   \"I am sorry\" you say, \" I didn't bolt on you. I just ran into a friend who happened to be in town. He wanted me to show him around so I left\" you say grabbing a seat next to him.\n   *page_break\n   \"Anyways' what was the matter with the whole coach incident\" you ask.\n\n   \"Nothing\" he says shrugging.\n\n   \"It was clearly not nothing and since I cleared your doubts I think you should return the courtesy\" you say pointedly. \n\n   He sighs before he sets his gaze at the floor, \"The thing is, the only thing I am good at is swimming. Always was, and always will be the best I am when I am in water.\"\n\n   \"Then that is a great thing. I always wondered how did you flunk when you can swim like you do.\", you say. \n\n   \"That is the thing. Outside water I am just a 'Klutz'. And I don't think I can go through with the day without the release that the swimming gives me. It sets me free, you know\" he says as he looks at you with a look of pity.\n\n   \"There are other ways to swim than to just fail every year. We could try out for the swimming trials next week\" you say placing a reassuring hand on his shoulder.\n\n   \"Nah. I don't think I can get a place. Besides I think me fate is already sealed in the swimming class today.\"\n   *page_break\n   \"NO can do mister.\" You say standing up as you drag him up and towards the arena, \"We are both signing up for the swimming trails. And you my friend are going to mesmerize everyone.\" You say on the way.\n\n   You find the sign sheet and sign both your names on it before turning to face Kertez once more, \"There all done. Now you have reason to be in the swimming pool as much as you want\".\n\n   \"Thanks ${gendermyman}\" he says smacking your shoulder, \"Not a lot of people would go out of there way to help him, you know\".\n\n   \"Well you can always count on me\" you say.\n\n   The haunting thoughts of warehouse gone you are left with a feeling of warmth having helped Kertez overcome his low self-esteem.\n   *set Kertez +10\n   *goto Nesoravisit\n\n # Suma\n  The crazy script girl is the easiest one to find. As you enter the Arts Department you just follow the commotion to find Suma, terrorizing yet another victim. She wiggles her finger in face of a stocky guy who is wobbling under her threats that follow. He apologises repeatedly before she lets him off chiding him for being so immature.\n\n  \"What was that about?\" you ask as you approach her.\n\n  She turns around with first a look of recognition and then with a hard smack on your face,\n\n  \"OW!\" you say wincing under the blow, \"What was that about?\" you repeat.\n\n  \"The guy bumped into me and then went on about how I ruined his jacket so I decided to teach him some manners. And as for you that one was for leaving in the middle of the night without telling me\" she says almost pouncing on you for another go as you move back to create some distance between you.\n\n  \"How about I get you something to eat and then I can explain as to why and where I was\" you say raising your hands.\n  *page_break\n  \"So the shady guy was your friend from the championship, who happened to stop by and demand a tour of the city for the night?\" Suma says once you are done feeding her a cover-up story.\n\n  \"Yea\" you say nodding to emphasize your point.\n\n  \"Sounds fun. You should have invited me too though. I would have liked to meet your boyfriend.\" She says coyly.\n\n  \"Nope. Not my boyfriend\" you say drinking the coffee you ordered.\n\n  \"Then you definitely should've invited me along\" Suma says. \n\n  *if RomaSuma > 0\n   \"And why is that?\" you ask curiously to watch her lean over the table to close into your space before she says, \"Because I wanted to tap that ever since I laid my eyes in it\" She says pointing at you.\n\n   Blushing heavily you gulp another sip from your coffee as you look for a way to come back from that.\n\n   \"Come one\" she says settling back on her table, \"Its not like you could find a better girl on this campus\".\n\n   \"And besides, imagine the fun when Rebecca finds out that we have been, you know, right under her nose\" she says grinning from cheek to cheek, \"Oh! The dual pleasure that I could get just makes me tremble thinking about it\" She says in the most dramatic fashion.\n   *page_break\n   \"By the way\" She says looking at you once again, \"What sights did you guys see at such late night?\" her expression sombre once again.\n\n   \"Nothing much just you know talked about 'College' and I did manage to mention an idiotic girl that I had a huge crush on, cause you know I like girls who scream at me all the time\".\n\n   \"Ha ha\" Suma says sarcastically, \"I know having the attention of the hottest girl on campus might make you nervous but that wasn't even worth the sarcasm\". \n\n   The conversation mills about how you got out and the occasional probing and teasing from Suma. The thoughts of the aftermath of the warehouse soon fade away as the romantic feelings start to dominate your thoughts with each moment you spend with her.\n\n   *set Suma +10\n   *goto Nesoravisit\n\n  *else\n   \"And Why is that?\" you ask her to watch her roll her eyes before saying, \"Because I could have finally found someone worth looking at. Since the campus has very poor taste in company.\"\n\n   Suma raises her hands to say, \"Except those who live with me, of course.\"\n   \n   \"By the way\" She says looking at you once again, \"What sights did you guys see at such late night?\" her expression sombre once again.\n\n   \"Nothing much just you know talked about 'College' and stuff\" you say.\n   *page_break\n   \"Wait did you tell him about me?' she asks shocked.\n\n   \"NO?\" you say confused at the sudden reaction.\n\n   \"Good. I don't want another stalker incident on my list\" She says before laughing at your confused expression, \"A thing of the past you wouldn't know\" she says only to relay the whole story about this stalker.\n\n   The conversation mills about the stalker and sometimes to other events around campus. Though boring to the core it does help you take your mind off of the warehouse event.\n\n   *set Suma +10\n   *goto Nesoravisit\n\n # Leela\n  Though not the first person you would go to but don't know why your mind reels to her when you look for support. You look for in the language class. To your disappointment you are not able to find her anywhere near the class. \n\n  After the class you decide to call it a day, failing to find any motivation to continue. You reach the room to find the door ajar. You open it slowly to find Leela's hand bag lying on the floor slightly away; something Leela will never do. You approach her room and peer inside to hear soft sounds of running around followed by Leela muffled shouts calling out to something named, \"Pooch\".\n  *page_break\n  You open the door to find a small puppy run into your legs. Startled you try to jump back and loose your footing in the narrow corridor. The puppy immediately pounces on you licking at your face with horrendous amounts of saliva slobbering all of your face. You grab the puppy and raise it as you rise yourself. \n\n  Leela is standing at the doorway with a look of a thief caught in the act. Her hands covering her mouth as she stares wide eyed at you and the puppy in your hand. She tries to reach for it but you drag the pup back teasing her a bit,\n  *page_break\n  \"What's the hurry, huh?\" you ask and watch the colour fade from her face as she manages to stammer out an excuse, \n\n  \"I was just taking care of \"it\" for 'a friend of mine', Zara\".\n\n  \"But there are no pets allowed in the hostel\" you say with a coy smile forming up your face.\n\n  \"I know and that is why I need to hide it from everyone else\" she says finally returning to her normal tone.\n\n  \"Well, I don't think the rest of them will have a problem\"you say looking at the puppy then looking back at Leela to give her a stern stare saying, \"But I will. If you don't tell me the truth here\".\n\n  \"That is the truth\" she says.\n\n  \"Right\" petting the puppy you continue, \"So I am to believe that you are actually going to help someone out of the good of your heart? Fat chance of that happening\".\n  *page_break\n  She tries to find some kind of argument to counter you but instead concedes as she explains to you the situation of the little friend here.\n\n  \"He was a pup they found near the campus. Probably lost or left behind by a family. The students that found it, put up notices and searched for its owner and when they couldn't find anyone up for claims, they decided to hand it over to the authorities. And the 'authorities' have a strict policy of 'putting to sleep' any pet they found without owner, especially one without training. That is why I decided to bring him over. But it is only for the next month or so. I have these submissions and I can't go home right now. Once my work is complete, I will take him home, giving him a proper care and space he needs.\" \n\n  She turns towards you almost begging you, \"But till then can you please keep him a secret?\" she asks you, eyes pull of hope.\n  *if RomaLeela > 0\n   You shrug and let the little rascal out in to Leela's room. It finds new and better ways to spoil things around and it takes a lot of effort to create an enclosed space to contain his shenanigans. \n\n   After the gruelling process of finding something to occupy the pup's attention you slump down on the floor against the wall, Leela by you side does the same, unable to combat the exertion. \n\n   Just as you close your eyes to catch a breather you feel a slight touch to your hand as you flutter open your eyes and find Leela leaning in towards you.\n   *page_break\n   \"Thank you\" she whispers as she closes in to plant a little angelic kiss on you cheek. You don't know why but the moment has sent your heart rushing and your cheeks blushing. You turn to look at her to find her pale cheeks turned cherry red too. \n\n   The stare that lasts between you two is something worth losing yourself into. Time flies by as you both sit there in and embrace that seems to last forever. After the moment passes however, there is an awkwardness between you two over the incident.\n\n   You leave her with the promise to keep the puppy a secret and get to see for the first time Leela shy away with a slight blush on her face.\n   *achieve puppy\n   *set Leela +30  \n   *goto Nesoravisit\n\n  *else    \n\n   You shrug and let the little rascal out in to Leela's room. It finds new and better ways to spoil things around and it takes a lot of effort to create an enclosed space to contain his shenanigans. \n\n   After the gruelling process of finding something to occupy the pup's attention you slump down on the floor against the wall, Leela by you side does the same, unable to combat the exertion. \n\n   Soon Leela gets up to clean the mess before the rest of them get here. Eventually the secret will be out, for a month is a long time. But for now you just have to delay the inevitable.\n\n   You help her tidy the room and hide any evidence of the pup's presence. Once done you leave the room and head into yours with a promise to Leela to keep her secret.\n   *achieve puppy\n   *set Leela +10\n   *goto Nesoravisit\n  \n*label Nesoravisit\n*page_break\n[b]Chapter : The Western Brimbore[/b]\n\n\nThe night comes with a visit from Nesora, a strong wind elemental, who has donned a tank top to go with the jeans she is sporting. The plan isn't clear to you but neither it is to her. Foyern tasked her to escort you to an old lighthouse. Once their further instructions will be relayed to you by Foyern himself. The reason for secrecy is known to you but the fact that Nesora goes along with the plan without questioning the motives shows her unflinching loyalty to the league. \n\nThe cab drives into the broken fence surrounding the relic of a bygone era. You pay the cabbie and make your way to the lighthouse with Nesora in your tow. Suprisingly you don't see Foyern or anyone else there. \n*page_break\nA note stuck to the door catches your attention. The note reads:\n\n\"[i]The Wraiths have been planning something big tonight.[/i] [i]The nature of this plan is unknown to us.[/i] [i]As such you are to investigate the only lead we have : the loactoin of the heist, The Western Brimbore. Use whatever means necessary to foil there plans and disrupt their operations.[/i]\n,[i]Foyern\"[/i]\n\nNesora snatches the note and crushes it to throw it in the water. Her gaze now shifts towards the docks where the Western Brimbore stands. A grand freight ship which is one of the biggest ships currently docked at the port. It is not hard to spot the ship, even from this distance neither it is hard to guess the level of security even without a peep at it. \n*page_break\nThe dock fortunately is convenient to reach from the old lighthouse. Though originally planned to expand on the farther side of the lighthouse, the rising trade and shortage of space compelled dual expansion of the docks. Now the dock entrance of this side is merely a kilometre and a half from the lighthouse. \n\nNesora has a no-bullshit attitude about her and immediately transforms in her element as she takes flight. You prepare for the change, only to be chided by her, citing the need of at least one of you able to pose for a distraction. Sighing you continue on foot following her airy form closely.\n\nThe gate has two guards and a camera surveillance system, probably being monitored by other guards. One wrong move and you might set the entire dock security against you. As you approach the guards you think of a way to deal with them.\n*choice\n # Talk you way out of it\n  *if Eloquence > 50\n   You smile as you near the gates. Making eye contact with the closer guard you nod upwards resembling some kind of recognition on your face. The guard finches under the confidence on your face, straining his brain to remember you. \n\n   You quickly read of the tag and start of, \"Jose, how you doing tonight?\" you ask in a nonchalant way. The other guard turns away considering you an acquaintance of Jose. Jose, however, is still trying to figure out the truth. Not giving him chance to stumble upon the obvious you turn on the charm. Spotting the Grimers sticker stuck inside the cabin, you turn the conversation towards the daily soap opera.\n   *page_break\n   \"Missed the Grimers show again\" you say sliding your cell phone while stepping into the scanner. \n\n   \"Yea, I heard it was some kind of semi-finale tonight.\" The other guard, thankfully, pitches in.\n\n   \"Too bad we are stuck for the night in this god-awful place\" you say furthering the conversation.\n\n   Jose at this point is relaxed and simply decides to pitch in, \"Guess we just get to watch reruns on this job\" he says handing you back your cell phone.\n\n   As you get your phone you catch a glimpse of Nesora floating above you and forming again beside you. \n\n   \"Nice bluff by the way\" she says, \"And nice catch too.\" \n\n   That maybe closet you will get to impressing her on this.\n   *goto insidedocks\n\n  *else \n   You smile as you near the gates. Making eye contact with the closer guard you nod upwards resembling some kind of recognition on your face. The guard finches under the confidence on your face, straining his brain to remember you. \n\n   You stand there staring at the guard trying to think of a way to get in. But to much your disappointment, your social skills are not up to the job, as you continue the long stare before blurting out, \"HEY there!\" in the most loud and obnoxious fashion. \n   \n   The guards look at each other confused as to your reaction before one of the steps forth staring you down before asking, \"Can I help you?\"\n   *page_break\n   You scratch your neck thinking of a way to recover but no such luck today. Fortunately, you see Nesora back in her normal form rushing towards the gate. She barges from between the guards and grabs your hand pulling you in.\n\n   \"What took you so long?\" she says almost screaming in the process. \n\n   \"Mam\" The guard says tapping Nesora on the shoulder, \"We need to see some ID. On BOTH of you\" he says emphasising the point. \n\n   \"OF course\" Nesora says sarcastically as she presents a batch to the guards.\n\n   \"Sorry, mam\"The guard says reeling back saluting Nesora now.\n\n   \"And ${genderhe} is with me\" Nesora pushes past him and drags you along.\n\n   \"Whose batch did you get?\" you ask confused at the reaction of the guards.\n\n   \"Supervisor, Mrs. Condurt\" she says tossing away the ID.\n\n   Though she does not spell it out, you can feel that you are off on a wrong foot.\n   *goto insidedocks\n\n # Innovate something  \n  *if Brilliance > 50\n   This sounded easier in your head. You approach the guards at the scanning station. And as you do you reach into your pocket to look for some kind of helping prop. To your luck, the College ID is still there.\n   *page_break\n   Without thinking much, you slide the phone and the ID beneath it as you pass through the scanner. The guard at the back resumes reading his magazine while the one near you reaches for the ID and the phone.\n  \n   \"Got the night shift again, huh?\" you say as you swiftly pocket the ID and the phone as you brush your way past him almost running away from him. From the corner of your eye you spot the guard's dilemma in deciding whether to chase you or trust you. A moment later he simply resides back on his chair going with the latter. \n\n   Nesora soon reforms near you in her human form as she closes in to whisper, \"Nicely done\".\n\n   That may be closest you will get to a compliment with this fanatic. \n   *goto insidedocks\n\n  *else\n   You smile as you near the gates. Making eye contact with the closer guard you nod upwards resembling some kind of recognition on your face. The guard finches under the confidence on your face, straining his brain to remember you. \n\n   You stand there staring at the guard trying to think of a way to get in. But to much your disappointment, your social skills are not up to the job, as you continue the long stare before blurting out, \"HEY there!\" in the most loud and obnoxious fashion. \n\n   The guards look at each other confused as to your reaction before one of the steps forth staring you down before asking, \"Can I help you?\"\n   *page_break\n   You scratch your neck thinking of a way to recover but no such luck today. Fortunately you see Nesora back in her normal form rushing towards the gate. She barges from between the guards and grabs your hand pulling you in.\n\n   \"What took you so long?\" she says almost screaming in the process. \n\n   \"Mam\" The guard says tapping Nesora on the shoulder, \"We need to see some ID. On BOTH of you\" he says emphasising the point. \n\n   \"OF course\" Nesora says sarcastically as she presents a batch to the guards.\n\n   \"Sorry, mam\"The guard says reeling back saluting Nesora now.\n\n   \"And ${genderhe} is with me\" Nesora pushes past him and drags you along.\n\n   \"Whose batch did you get?\" you ask confused at the reaction of the guards.\n\n   \"Supervisor, Mrs. Condurt\" she says tossing away the ID.\n\n   Though she does not spell it out, you can feel that you are off on a wrong foot.\n   *goto insidedocks\n\n # You are an Elemental for a reason\n  *if Brilliance > 40\n   You almost unconsciously create small charges in your palms as you near the guards. Both of them look at you with some intrigue which soon turns to a look of fear as the sparks increase.\n\n   \"Get Down\" one shouts.\n\n   \"Raise your hands\" the other one goes.\n   *page_break\n   You simply oblige as you raise your hands to let go two heavy sparks one at the pair of them and the other at the camera behind them. The bolt hits them to send them flying in opposite directions. Incapacitated and potentially out for the night you can't help but smile to yourself. \n\n   The second one hits the mark as the camera shuts down with a powerful surge travelling through the lines. The surge forces a reboot of the generators giving you enough time to place the two guards inside their cabins posing them in a napping position. \n\n   When inside Nesora leans closer to compliment the display you pulled through, \"Nicely done, Newbie\" she says.\n   *goto insidedocks\n\n  *elseif Dominance > 40\n   You feel the shakes as you will your mind to control the very ground you are standing on. Certainly grown in power since the warehouse incident, it almost comes naturally to you. As you near the guards they are already in panic fearing the earth quake beneath them.\n  \n   You use the fear as you as you run inside pretending to be scared. The guards occupied with their saving themselves hardly pay you a mind. One of them actually runs away abandoning his post. \n\n   Once a safe distance from the gate you stop the quakes as Nesora quickly reforms behind you as you peer at the guards. \n\n   \"Nicely done\" she says. \n   *goto insidedocks\n\n  *elseif Eloquence> 40\n   You toy with the moisture in the air as you near the guards. The abundance of it simply gives you a lot of options to play out this encounter. You decide to try something unique as you control a stream of water and rush it through the floor. \n\n   The guards feel the rush of wet water inside their shoes as they peer down to look at it. Soon the water is inside their clothes acting like a suit. You control their movements by manipulating this suit. Another rush soon forms a small envelope of water around there mouth and nose, drowning them just enough to knock them out. Once out cold for the night you simply manipulate the suit to make them sit inside their cabins in a napping position. \n\n   You walk past through the scanner and head towards the interior of the docks as Nesora forms besides you, whispering a , \"Nice Job\" in you ear.\n   *goto insidedocks\n\n  *else\n   You fell the warm glow surrounding you, as you create a small orb in you hand and push it in the air. 'Time to pull the crazy' you say to yourself as you manipulate the orb to rush it past the guard inside the cabin reading a magazine.\n\n   \"Did you see that?!\" he says rushing out to catch the other guard.\n\n   \"See what?\" The other guard asks completely confused at the refrence.\n   *page_break\n   The guard tries to explain the orb flying past him but the other one simply chides him saying, \"Man! You need some coffee and some sleep\". \n\n   \"For now though\" he says shoving his gun in the drawer and turning towards the inside of the docks, \"Lets just settle for the coffee, come on, I will get you some\".\n\n   As the other guard leaves to get some coffee, you pull another orb and make it dance outside the window of the guard. The lone guard now distracted, you use the first orb to flash the camera giving you a clean entry inside the docks. \n\n   Once out of earshot you peek at the guard post to find the guard hiding in his cabin while the other guard tries to shake some sense in to him. \n\n   \"Nicely done\" Nesora says reforming besides you.\n   *goto insidedocks\n  \n*label insidedocks\n*page_break\n[b]The Western Brimbore[/b]\nOnce inside the docks, you just have to look at the most heavily secured ship. Though the size doesn't hide it well. You keep the ruse up of employees milling about the docks. Thankfully, docks in themselves operate with a whole lot of chaos and confusion. And often some sections are intertwined of the docking platforms of individual companies. This helps you get close enough without rousing any suspicion.\n*page_break\nThe Freighter, The Western Brimbore, is clear in your view and so is your goal. The ship has multiple platforms currently opened for the security to patrol, which gives you multiple points of access. However, each one of the planks is under heavy guard, slipping past these many guards is near to impossible. The second option, is the using the containers being loaded onto the ship by the crane. Though this entails the tedious job of manipulating the crane to position yourself for an easy drop and to avoid moving in the effective range of the spotlights roaming about and getting into position for much needed cover as soon as the container drops on the ship. The third and probably the most risky option is to go in guns blazing. You are after all nothing short of a superhero. Gun,Ho attitude will get you in quicker, that is if you can survive the onslaught of the entire guard force currently stationed. Also exposing yourself too quickly might lead to some unwanted entanglement with the local law enforcement. Another option is to stage a distraction large enough for you to sneak in.\n\nEither of the options are heavily dependent on the element you are using. Choosing the way which compliments you is the way to go.\n\nAfter careful thinking, you decide to go with.\n*choice\n # Planks \n  Getting in through the planks has the only benefit of opening up a lot of hiding places upon entry. Each plank is usually moored in places where access to ship is more facilitated and movement unrestricted. Meaning manage to avoid the guards on the plank and viola, you have access to the entire ship, undetected. \n\n  But getting spotted on the way in may spell your doom. \n\n  *if Eloquence > 50\n   You move as close as possible to the ship and find a spot to hide behind a container. Once in the clear you transform completely letting the form melt away in to water. Now you are the most common and overlooked thing at a port : water. You simply splash on the floor and travel in a stream towards the edge of the docks. Once near the planks, you start flowing beneath it as you manage to make your way up to the boat.\n\n   Just like that, you have managed to sneak past nearly a dozen guards who are none the wiser of your entry on the ship. Now remains the matter of finding the source of operations, which no doubt is easy enough to spot since all you have to do is follow the commotion from the rooms beneath the bridge.\n   *set Eloquence +10\n   *goto inroom\n\n  *else\n   You move as close as possible to the ship and find a spot to hide behind a container. Once in the clear you transform completely letting the elemental form out.\n\n   Not the wisest move, since you would stand out in a sea of freaks as your elemental form gathers attention from all around taking away your element of surprise. Soon the nearest guard investigates your last position. Try as you may, hiding in your elemental form is impossible. You quickly revert back to your human form and dart around the corner taking your clothes with you. \n\n   That attempt failed. IT seems you have to rethink your approach. \n   *goto Insidedocks\n\n # Crane\n  *if Brilliance > 50\n   Your uncanny intelligence along with a technosavy element at your disposal, you hardly need the time to think. You make your way to the containers stack and quickly blend within them. The controls of the crane can be easily manipulated by controlled bursts of electricity. \n\n   You create small trickles of charges and send them upwards towards the crane controls. Though the sudden change in path of the container noticeable, most night shift crane operations are filled with flawed operation thanks to the strain on the operator. Hence such an incident is easily overlooked with the purpose of fulfilling the assignment as per the schedule.\n\n   Once the charges are in place, all you have to do is get inside one of the containers. Doing so is much easier given the passcode electronic locks on the containers. A little controlled surge is all it takes to trigger the doors. Once inside you close the doors with the same technique. \n\n   Now was the time to deploy the charges. The charges pop,up sequentially and at specific junctions helping you to sway the arm to drop the container as close as possible to the bridge. For whatever the planning is been done has to be near there.\n\n   Your hunch is right as you step off the container once it is safely placed on the ship to be confronted with a riding commotion coming from the lower rooms just beneath the bridge.\n   *set Brilliance +10\n   *goto inroom\n  *else\n   The crane being a machine there is little you can do  to control its operation. You decide to wing the plan an approach the containers. Much to your surprise the containers are not locked with traditional dead locks but with modern electronic locks, meaning you cant open them without breaking them. Do that and the door might swing open in the air grabbing all kinds of unwanted attention. \n\n   Also without the control of the crane the plan is doomed to fail. For you know not how long it will take for your container to be picked or where it will be place on the ship. Given the limitations present even before the plans sets in, you decide to go with other option.\n   *goto Insidedocks\n # Gun,Ho \n  *if Dominance > 50\n   Well when you say guns blazing it does not necessarily mean gunning down everybody, it just means gunning down any one who gets in your way. As such, in your current situation, the only ones standing in your way are the three guard taking a smoke break on the extreme marooned plank. \n\n   You approach the far end of the ship by walking a wide berth from it to avoid any suspicion. As you near your intended targets, you change quickly and rush them with vines as you grapple them in a tight vice. The guard try to scream a warning to the others but you immediately shut their mouths by further extending the vines. Eventually the three guards faint under the rising pressure of your grip.\n\n   You neatly tie them up and hang them from the waist on the dark side of the ship, to avoid alarming the others. Once dealing with them, you simply walk aboard the ship and use the containers to hide from the other guards and the spotlights milling about.\n   *set Dominance+10\n   *goto inroom\n  *else\n   NO time to hide you think as you change into your element and prepare for the gruelling battle ahead. Readying yourself and steeling your nerves you make your way to the ship and turn to face the closest pair of guards. \n\n   However, a strong gush of winds knocks you back. As you gather yourself to stand on your feet once again, you spot Nesora standing before you with a annoyed expression of a teacher whose student failed once again. \n\n   \"We don't go fancy unless it is necessary\" She says.\n\n   Stepping back once more she glares at you before saying, \"Rethink your approach and don't think that bullets can't kill you. For eventually one of them will get lucky and manage to pierce the parts which you can't transform.\"\n\n   You chuckle at the double meaning of the statement, only to get another gush and a glare from Nesora as she chides you for your immaturity.\n   *goto Insidedocks\n # Distraction \n  *if healing > 10\n   You decide to replay the initial jig of crazy once more. Only this time it must be large enough for the guards in question to be distracted together. Hardly worth the effort of making up a plan you slowly make your way to the farthest plank and prepare a dozen white energy spheres. You form them up in a wide circular fashion and elevate them just enough to be visible by the three guards guarding the plank to create an illusion of an UFO.\n\n   The first one catches the glimpse of it and signs for the other two to follow him. You reel them in until they are on the farther side of the container you are hiding behind. Just when the three of them line up against you, a small ball shaped sphere passes through the three of them, right across their idiotic heads. You watch as all three of them slump on the ground, suddenly in a deep sleep. Certainly a new application to your powers.\n\n   For now, you make an easy entrance unto the ship. Finding the source of operation is easy as a large commotion from below the bridge beckons you.\n   *set Healing +10\n   *goto inroom\n  *else \n   Your element is too powerful as your minor distraction attracts the attention of almost all the guards in the vicinity. Soon the guards make their way to narrow on your position. Deftly you bow out and get out of the area of last contact.\n\n   But pulling another one like that is out of the option since it will only relate to more strenuous response, probably of scanning the entire area and shutting down the access to the ship from all sides.\n   *goto insidedocks\n*label inroom\n*page_break\nThe commotion leads you straight to the heart of the enemy. You feel a strange sensation tugging at the back of your mind, warning you to stay away. \n\n\"Feel that\" the airy form of Nesora whispers in your ear, \"That feeling is generated by a wraith. Probably to keep away unwanted visitors. Just ignore it and focus on your task\".\n\nThe corridor you are travelling has seven doors, three on each side and one straight ahead.\n\nThe few doors that are opened reveal bunk beds, no doubt of those working on the ship. The other closed ones probably have some occupants. You approach the door at the far end following the sounds. \n\nThe feeling is getting more and more prominent as you walk towards the door. The doors in a ship are not exactly the most silent ones you can find. You rotate the hatch to create a nerve wreaking creek. The sound is somewhat muffled by the envelope created by Nesora around it. \n*page_break\nYou peep through the door to find another corridor. The only difference is that there are only two doors and the sounds are clearly coming from the one on the farther side.\n\nAs you near to the second door the voices become more coherent giving you a glimpse of the ongoing conversation,\n\n\"Exactly the way we planned. For if there is even slight delay the pattern will break and the entire effort will be in vain.\" says a soft, perhaps a woman's voice.\n\n\"But pulling off this will require the aid of the elders themselves. Not to mention the meddling elementals, always distraught over the past.\" A more gruff voice breaks in.\n\n\"For now get them all ready. And prepare for the arrival. The elders are with us the whole way and there is no way the washed out elementals can stop us.\" the woman replies.\n\nJust as the conversation dies out you take the que to leave the corridor before you are caught with your pants down.\n*page_break\nUnfortunately the conversing couple comes from the first door to spy you standing there right in the middle of the corridor, completely human and vulnerable to anything from a knife to a bullet.\n\nThe lady, is a f energy which slams into him hard. You watch as the man flies out the door on the other end, helplessly crashing into the adjacent corridor. The stream of white light dies out as you catch glimpse of Nesora, who apparently was the one holding the big guy in place. \n\n She is crumpled on the floor, her skin still steaming from the energy blast. You rush to her aid and try to help her up.\n *set Healing +10\n *goto furtherin\n*label furtherin\n*page_break\n\"Next time\", she says grasping for air, \"Yell out a warning\". \n\nYou help her up to her feet and scan for the man. He tries to stand with his hands clutching his head, no doubt ringing from the electrifying display you put in. Nesora, to your side, despite her years of experience has been the victim of friendly fire and potentially out of the game for the night. Which means it is your job to protect both yourself and Nesora from the raging bull across the hall. \n\nThe corridor bends around the corner, and no doubt leads further inside the ship's core. No other option to choose from you rush towards the bend with Nesora leaning on your shoulder. Though the sight of the man is lost to you, the sound is not. His shouts overcome the mechanical thumping of the ship's machines. Try as you might, carrying Nesora you can never outrun the bull but neither can you abandon your colleague.\n*page_break\nYou stumble across a slightly ajar door, which you push open to reveal a light staff of engineers milling about a robust engine at the centre. At one glance the engine may seem in place in such a massive ship but on closer examination the hue which it emanates is certainly not something that belongs here. To further confirm your doubts, the engineers now look at the open door with eyes blank white and jaws slacked. Without much reaction they simply return their attention back to keeping the strange machine operational.\n\nWith the man nearing your position and sounds of footsteps emanating from the other side the only option to you is to hide in this room until they move on. You place Nesora down, hidden from a direct view from the door and go to place yourself behind the edge of the machine on the other side. This way if someone spots Nesora you can get the drop on them.\n\nThe commotion still active outside the room, you turn your attention to the strange machine in front of you. The glow it generates seems to be a by,product of the main purpose of it's operation. The engineers mount strange vials periodically into a chamber adjacent to the engine. Once the vials are loaded they push in the tray to load the machine. And once again with a silent hum the machine continues to generate the slight glow. \n*page_break\nThis machine clearly looks way beyond the conventional machines currently employed. Operating an entire ship with such small quantities of the vial of fuel is certainly something that you don't see every day. \n\nThough not entirely sure but the machine appears to be the objective of your visit. Nothing else has come close to be called as object of importance on this ship. You step closer to get slight hisses from the engineers, who seem to be protective of the strange artefact. It seems you have to deal with the engineers and the machine simultaneously. Though unsure of the consequences, a large surge of raw elemental power might do the trick for you.\n\nStepping away from the machine you prepare for the big burst of energy. Closing your eyes and curling your body you can feel the change in your body as the elemental surge grows. When sure of your gathered energy you uncurl your body to let out the raw power.\n\n*if Brilliance > 60\n The Electricity that surges forth from your body creates a large field of sparks in front of you. The energy is so immense that it elevates you as the field continues to ram everything in front of you. The machine throws itself into overdrive as the core continues to spin to the point that the chamber containing it spins out of control. The ied observing the blast and the falling ship, barely notice you. Nesora falls to a knee beside you as she regains her normal form. You help her up and carry her towards the exit. \n\nHalfway through however, a large thud breaks your revere of a job well done. You turn around to find the bear of a man grinning at you. The intention clear you immediately rush behind nearest container before he charges at you in this open ground. \n\nHiding from him might have worked if not for him tossing the containers around like play things. You find a place to settle Nesora as you prepare for a confrontation with the big guy.  Just as you settle her you feel her hand grasp your shoulder as she pulls you in to say, \"Don't fight by his strength. Make him fight by yours\".\n\nWell, specifics would have been better but the plan sounds, sound? Distraught may be the word for your current state of mind. Your opponent stands at more than eight feet of height and half the width. Shorter version, he is a tank. Fighting him head on will only result in splattering yours. But maybe you can use your surroundings to your advantage.\n*page_break\n*if Brilliance > 70\n You elevate yourself on a container using the sparks to propel you. The big guy spots your spectacular entry and once again grinning charges at you. As he nears your position, you wait for the perfect moment to electrify the entire column of containers you are standing on. The sheer volume of the energy conducted by the column creates a shielding effect surrounding it.\n\n The brute however pierces the shield and manages to ram the column off balance breaking your concentration. You level yourself with the aid of your electricity to find that the effort was not a total failure, as the guy spins about dazed by the intensity of the jolt.\n\n With the intention of pressing your advantage, you prepare a series of volleys slamming him one after the other. Each one strikes home as he falls to a knee. To prepare for the finale you reel ba ocation. You get Nesora into an ambulance and ride with her to the hospital, leaving behind the carnage of your creation. \n *set Dominance +10\n *goto phasalpower1\n*else\n The white energy that you create is certainly unique and has granted you an advantage even before the engagement begins. You step into the open with a shield formed around you. Grinning the big guy charges to hammer your shield. Such might is in his fists that each bang cracks the shield heavily. You prepare a charged energy ball to fling at the break. The plan pays off as the ball slams point blank in his chest but unfortunately his fist manages to make contact with your face, shattering each and every bone on your dear little face. \n\n You fly into the container behind you and watch as the bug guy himself fly into the wreckage. The pain sets in only to be replaced by the warm sensation of your healing energy. Soon back with a full face you spot your opponent once again on his feet. Learning your lesson and deciding to expand your horizon of application of powers you try something that you have not even thought of before. \n *page_break\n The earlier explosion in the engine room was due to the massive surge the energy provided. Now with slight modification you can use the trick on this tank of a man. As he nears you focus, concentrating on the floor ahead of you. As you open your eyes you see the fruition of your effort. The entire floor before you are coated with white hue. Your opponent falters in his steps as he takes in the view. With a sudden rush the entire white aura flows towards your opponent creating a volcano like effect creating a huge jet of white energy bursting from beneath him as he begins to lose his footing. \n\n With a final push you spurt forth the entire energy you can muster and watch as the bear goes sky high until he is nothing but a dot in the night sky. Heaving you make your way back to Nesora, for no doubt the big guy will recover even from this fall. \n *set Healing they are gearing up for the war\" Foyern looks at Ellie and nods to indicate something.\n\n\"Well enough chitchat\" Ellie says shoving you and Nesora out of the study, \"Job is done and now you both have to resume your schedules. Off you go now\" she says before giving you a light shove out of the room.\n*page_break\nGiven an off-day today you find yourself in no rush to go to college. You simply mill about the hall conversing here and there and the occasional boasting about last night's battle. Just as you run out of things to do Jessy enters the hall, in a track suit drenched with sweat.\n\n*if RomaJessy > 0 \n \"Oh\" she says closing in the distance in an almost predator like walk, \"Somebody made the news last night\". \n\n \"Well, all thanks to the big guy\" you say gleaming at the sight of your crush.\n\n Barely finishing the sentence, you feel the distance ever so closer that you can't help but move in for the kiss. A wet slobbering affair since the workout has left her still drenched from head to toe. But you don't mind for the feeling is so serene that it tends to make you forget all about the trepidations to follow.\n page_break\n \"Eww...\" she says putting some distance between your lips now, \"Anxious much? Should have at least waited till I cleaned up. I mean even I would not kiss myself in this condition\".\n\n The conversation broken by the sudden umphf from the door as you peer past Jassi to spot Balzorin.\n\n \"If I may have a moment before you leave\" He says, respectful for the first time since you arrived here.\n *goto Balz\n\n*else \n \"Oh\" she says wiping off the sweat from her brow, \"Somebody made the news last night\". \n\n \"Well, all thanks to the big guy\" you say gleaming at the sight of your friend. \n\n \"From what I heard, the big guy will certainly have some size complex next time he is up against you\" grinning Jessy responds.\n\n The conversation broken by the sudden Humph from the door as you peer past Jassi to spot Balzorin.\n\n \"If I may have a moment before you leave\" He says, respectful for the first time since you arrived here.\n *goto Balz\n\n*label Balz\n*page_break\nIn the courtyard, you find yourself walking beside Balzorin who appears to be tensed about something. \n\n\"Nesora, told me about the mission. About how you were in the line of bullet one second and out of its way the next. Super,reflexes she called them. But I know the use of Phasal powers even without seeing them.\"\n\nStopping to face you now with a grim look plastered on his face, \"I must know the truth, kid. Has Foyern talked something about the prophecy and about how you can open the seal with your Phasal powers?\" he asks, his gaze fixed on your response.\n\n\"Never heard of a seal\" you say owing to the promise of secrecy to Foyern.\n\n\"Good then. For the prophecy has muddled the mind of the old man. I fear sooner or later he will try to open the seal\" Balzorin says, more to himself than to you.\n*page_break\n\"As for your performance last night, well, consider me impressed. Thrice have you bested the wraiths now. And proven that it was your skill and not your luck to result in such an exemplary performance\" he says patting you on the shoulder.\n\nYou turn to prepare for the jump back to the college owing to the rising sun in the background, indicating an evening approach at the college. You tap the stone to hear one last advice from Balzorin.\n\n\"Remember. The right way may not be the most righteous one.\"\n\n*page_break\nThe teleportation though merely a fraction of second in transit has left you thinking about the last comment from Balzorin. Either the comment was indicating the truth in Foyern's words about Balzorin's decision to muffle the powers of all outsiders or it indicated some matter yet unknown to you. Either way your thoughts are brought to more present situation as you have managed to teleport right in the middle of the arena. Thankfully only a handful of spectators are present to notice the anomaly in a otherwise empty arena.\n\nYou make a quick exit before someone identifies you. Rushing to the Hostel under the cover of your hood, you head upstairs to your room. Once again you have to apologise to everyone for bailing out on them without notice. The approaching submission period is what saves your skin from the onslaught about to follow. \n\nWith much time wasted in you dock stunts you decide to start with your own submission work. For the course of Dr. Chandy is the only one that requires you to file in a hand written report on Advance Calculus while the rest of them require just passing the viva and a class test. Easy enough for the semester to end. \n\n*page_break\n[b] Chapter : The Gas Leak [/b]\n \nDrawing sheets of complex problem solution was never your favourite in school and the large scale assignments for the submission aren't helping it either. Sprawled on the floor against the full imperial sheet marking the points before using the complex graphical principles to map the solution, you find your brain pushed to the limits. Thankfully the League has not interfered in your schedule this time. \n\nWished too early, as soon you find Leela at the door informing you of a visitor waiting for you at the door. Wrapping your sheets up for the day, you make your way to find an unfamiliar face staring at you with a certain disgust. \n\nPausing the chewing motion the vampire look,a,like goth, punk boy standing at your door says, \"Foyern send me\". \n*page_break\nYou look around to find the others staring at you in blind surprise, fearing you might be running in wrong circles, selling your body parts for money to spend on ecstasies. Time to come up with the most ridiculous lie you can. The brain freeze you get from the stares hardly helps you as the only coherent thing you manage to spill out was, \"We have this ........ party at the comedy club........ of a few friends from back home\".\n\nThe boy from the door looks at you with further annoyed expression at your obvious failed attempt to come up with an excuse.\n\n\"What ${genderhe} means to say is that the metal band, Raging Hormones, is in the state for a tour and ${genderhe} would like to go there even though it breaks away from ${genderhis} character.\"\n\nThat gets a few nods and few even wider eyes with slight gasp from Leela.\n\nWithout much to go on to you simply grab the darkest clothes you have with you and head out with the punk-wannabe. \n\n*page_break\n\nThe job apparently is to investigate the gas lines lead. From what the League has gathered over the course of the past week is the rising interest of the wraiths in the gas line control. They have tried everything from trying to purchase the contract out to planting their own guys inside. And they have succeeded partially in doing both. So we have to get inside, nice and quiet grab the plans and escape before they notice us.\" John says, which you find the most disappointing name for the guy's personality, for you expected it to be more dark and brooding like Dracula. The car comes to a halt as you pull up at a pizza place parking lot breaking your revere of suggestions of more horrifying and scaring names for him.\n\nYou get out with a look of puzzlement on your place, unsure of why have you parked at a pizza shop parking lot. Spotting the confusion on your face John simply points towards the building across the square with a big board reading, 'City Gas Inc.' \n*page_break\nYou follow him to a sewer access not far from the parking spot. He opens it with ease as he blows cooling breeze to cover the plate. The plate compresses under the cooling effect to the point where it simply falls below with a splash. You peer down, thinking how little consideration does city authority give for extreme temperature effects on their facilities. \n\nThe journey through the sewers is nothing that the great stories are made up of. Instead it is made up of the great stories made in the bathroom as the smell almost manages to knock you out half way through. Cursing yourself for wearing black you watch as the awful coloration begins to start at the edge of your pants. \n\nHalf-an-hour in and you have arrived at your stop. The sewer exit above you should tak you inside the facility but just barely. From there you have to make your way inside the building and look for the plans, which obviously are not spilled on the floor or pinned up on the wall. Carefully you must search the entire premises and look for a way to get in and out without alerting anyone.\n*page_break\nJohn opens the lid to salvation from this smell hole, to spot a pair of shoes not far from you. You wait a few more moments for them to leave as he once again tries to open the lid. Only this time they were standing right above the lid as John dislodges the footing of one to alert them of your presence. Without much thought he lets out a sharp breeze to freeze the pair of them as you bring them down to hide them. \n\nThawing them out to grab their clothes before returning them to their semi,frozen state you crawl out the sewer exit. With the passes and the uniforms, you just might be able to pull this one through without raising any suspicion. \n*page_break\nThe facility is like any other cheap,extreme-profit facility, the security measures just enough to prevent the entire city to blow sky high. No pass,coded electronic locks or scanners inside to check employs credentials. \n\nYou make your way scanning each and every room on the ground, First and second floor only to conclude that the wraith presence, if any is definitely in the lower sections which unfortunately are off limits to you. \n\nThe only options are to either wing it on your way or take out the cameras to take a more direct and quicker route. \n\n*choice\n # Bluff your way through \n  You decide to wing it as you make your way to the only elevator leading downstairs. You engage or at least try to engage John in a conversation, who to his credit pulls off the aloof character excellently. Without making eye,contact with the guards you both had towards the elevator controls. Thankfully, there is no card swipe or biometrics lock present to block access. \n\n  Despite your dress indicating you to be an upside worker John presses the button for the lift as the pair of you enter it without drawing even a glare from the guards. Apparently the irritating and aloof combination is common around a place like this, as you had guessed. \n\n  The only other option on the elevator panel is the button for B1. Which you press promptly and wait for the silent descend.  \n  *goto basement\n\n # Take the more direct route\n  You head to the camera controls upstairs. Since you already have a pair of frozen employees resting in the sewers, a few more frozen colleagues will not make a difference. You enter the room silently as John lets a heavy breeze out freezing all in their chairs. Cutting the feed from all the cameras and erasing any evidence of your sighting you prepare for phase two of the plan. \n\n  The confident and nonchalant march of yours doesn't alert the guards. When close enough John freezes the pair leaving them none the wiser.\n  *goto basement\n\n*label basement\n*page_break\nThe Elevator door slides open to reveal the basement, which is well, a basement. Albeit with an array of machines with blinking and throbbing lights with workers maintaining and observing them.\n\nNone of the rooms in the immediate vicinity seem to hold anything worth noticing as you make your way further inside the basement facility. Towards the edge of the basement there is a room with 'Chief Engineer' plaque plastered on it. \n\nYou peer through the window, carefully not be spotted to find a man in his late forties leaning against his chair with his legs stretched on the table in front and eyes focused on an black and white comedy show from the old times. \n\nNowhere else to look, you decide to investigate the room. You open the door and head in for a quick motion from John to freeze the Chief Engineer which to your surprise back fires, quite literally as a strong fire blast catches him square in the chest. \n*page_break\n\"I could smell you from miles away. And no, I am not talking about than sewer smell. I am talking about that traitorous elemental smell.\" The fat slob says rising from his chair \"You think you can come on my turf and steal our secrets from right under our nose?!\"\n\nAnother fireball assails forth, this time aimed towards you.  You immediately bounce back out the room as the large blast follows you out the door. The other workers are still milling about without a mind to the loud blasts coming from the room. It is then that you spot the same white blank eyes staring at the machines as the ones you spotted at the ship. \n\nWhile you were lost in this though John was fighting a desperate battle against the fat man. Even his ice blasts seem to be ineffective against the rising heat that is bombarded on him. Deciding to pitch in and use the flanking advantage you turn on your elemental strengths as you aim for the big blow.\n\n*if Brilliance > 70\n You prepare a volley of electric blasts to hit him dead centre followed by the traditional knock out blow. The shots find their mark to blast the man back in his room. You run towards John you seen to be blowing off the fire around him with his cool breeze. \n \n The man once again rises from the room to reveal not an old fat man but a slob of pure fire, as if a humanoid lava character. He looks at you through glowing eyes with fire raging through them, literally. He lets out a scream before blasting another wave towards you. \n\n Immediately you and John let out a blast of your own which does little but hold his blast at bay. As the smoke clears you spot a figure rushing towards as you jump out of the way to watch the lavaman slam into an ice wall created by John.\n\n You distract your opponent just enough to buy some time for John to escape from the charge only to jeopardize your own safety as the lavaman spots you sprawled on the floor helpless as he advances on you. \n *page_break\n Regaining his footing John prepare for another bolt at the lavaman and just then an incredible idea forms itself in your head. Without much thought you hit the yet in travelling Ice blade as the electricity coats it to form a shield around it. The electric shield dissipates as it crashes into the lavaman but the ice blade intact strikes home as the lavaman cries out in pain under the blow. \n\n John realizing the revelation you just had sends forth volley after volley through a sphere of electricity that you created. Each Icicle protected by your electric shield strikes the lavaman causing him to crash into the machines destroying them in the process. To your surprise the blank eyed workers respond to a similar fashion as their kin on the ship as they leap at the lavaman to protect their machines. The workers however are nothing more than normal human under some kind of spell as you watch their skin melt away and the rest burn to ashes on contact with the lavaman. Still it serves the purpose of distracting your opponent as you prepare for a massive last charge.\n *page_break\n You focus on your fists to create another large electric burst. The concentration is however broken as a loud yell of, \"What the ?!\" from John comes. You open your eyes to find your fists enclosed in not electricity but dark energy of the kind Balzorin holds only with a slight modification of radiant purple ball rotating at its core. You watch as the sphere goes on increasing despite your will to make them dissipate. \n\n The lavaman, having now dealt with the unfortunate workers whose bodies are now mangled on the floor, burned to a char, stands again preparing for another bout. You let the dark spheres   fly towards the slob of fire. The impact is not of explosion but one of implosion as you watch the lavaman and the bodies around him get sucked
