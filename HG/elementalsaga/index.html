n squad  \n   with the known exception of Tiara. The joy is doubled as you spot incoming cheers and taunts from the gates as the rest of the Garret squad charges through the gates bringing the sentries down by the sheer numbers. \n   *set London +1\n   *goto exitfrompalace \n  *else \n   You look for a way to jump start the machine or least destroy it somehow. But the complex construction and seemingly impossible to comprehend design puts it way out of any manipulation you can come up with. \n\n   With the screams now increasing your eyes wonder over the security footage as you spot Garret getting sliced up by the wraith soldier. His people meet the same end. Towards the entrance Rage tries her best to keep the wraiths out but she is outnumbered out there. \n\n   With a last effort you produce forth a blast of raw dark energy and slam it against the machine. To your surprise the machine springs to life. But its programming still targeting you and your allies, you watch as Rage is riddled with energy projectiles before she slumps on the ground against her injuries. The other survivors also meet the same end. You try to shut the machine down but the amount of energy you put in may see the end of all out there.\n\n   Soon the wraiths clear the courtyard and come inside the barracks to finish you off. You wish you could have said that you went down fighting but the truth is the only contribution you had was to kill your own people and ultimately accept your death as a release from the guilt. The wraith who spots you, brings down his imbued axe on your torso. That was the last thing you saw before the life slipped from your body. \n   *goto Barracks\n\n*label exitfrompalace\n*page_break\n[b]The Battle for the Palace[/b]\n\nThe security footage tells you the confusion among the ranks of wraiths. Their superiority complex broken by the two pronged attack, they now start to fall back in attempts to protect the inner compound against the new wave of fighters. \n\nThe situation turning in your favour as you continue to use the mounted guns to our advantage to pick off any wraith to get in it's range. Once the wraiths travel well beyond the range you rush out to joint the assault on the Palace. The line reformed at the entrance of the Palace they return some of there confidence but the numbers they face are sure to fill them with dread. \n\n\"What are you doing here?\" Rage asks more with relief than anger over disobedience.\n\n*page_break\n\nPeace at this drifts closer in her icy form, \"Well, couldn't let you take all the glory now could I?\"with a smirk she says before adjusting her posture to face the wraiths with renewed vigor.\n\n\"But Tiara\" her voice desperate, \"who is with her?\"\n\n\"Our attack here was a part of the plan to get her and the man out to Balz. She told us about the man and no doubt he holds some very crucial knowledge about the wraiths plans, we decided to extend the distractions\"she places a reassuring hand on Rage's shoulder before continuing, \"And we got out best to protect her. Voice will see her safe and sound to Balz.\"\n\nGarret screams to get the attention of his people, encouraging them for the final skirmish before they head for a final push. \n\nYou yourself are beset by your own aura of element as you prepare for one last bout for the night. \n\n*page_break\n\nThe ragged ranks of the wraith infantry pose for quite a tempting target. Firing shots before charging at the  wraiths the vigor of the people of London does rub off on you. You feel the surge as you race forward to meet your foe. \n\nThe engagement starts in your favour as the still retreating wraiths are attacked in the rear giving little resistance to you. The newly formed line to has holes that allows Garret's people to push past it with ease. The victory withing the grasp you can hardly believe that you not only managed to investigate the facility erected by the wraiths but also manage to defeat them utterly.\n\nWell, that was what you thought, up until a giant of a man lands into your formation, propelling those around in multitudes of direction. No, not a man, a wraith, and one with whom you spend quite a memorable evening ,the big guy from Western Brimbore.\n\n*page_break\n\nWith a grin plastered on his face he matches your gaze, \"Miss me, kid\" he says with menace in his voice.\n\n\"If you are done, can we get on with the business\" Rage says as she marches towards him with the imbued weapons coated in a thick layer of her fire; a deadly combination. The grin is still present on his face when Rage leaps into air to slam the pair of axes whe held right into him. The result is a devasting blast which fills the area surrounding with smoke which obsucres the view completely. \n\nYou step forth with your hand waving the smoke out from your field of vision as you sense a moment through it. Too fast a movement as Rage flies in your direction and slams hard in you. You crumple on the floor with Rage on top of you. As you get up so does Rage still clenching to her side with one hand while the other one boasts a broken handle which all that remains of the axe she wield. \n\n\"That was disappointing\" his voice beckons through the smoke still hiding him within, \"I expected more from a leader of the elementals. But I guess I overestimated your kind. Nothing but roaches, you might pester us but make no mistake....\"the outline of his bulky form now visible through the smoke, \"....The creation can never match up to the creator\"\n\n*page_break\n\nWith that he leaps towards you with his fists coiled to land an impact on you. This split second decision offers you the opportunity to make a choice. Since Rage has already been hurt, she may not take another hit and walk it off but neither can you, judging from the impact the fist might make.\n\n*choice\n # Push Rage away\n  Without thinking you let out a blast which flies Rage away from you. But this only makes you more centred to bear the attack. Dodging the fists at the last second you still are blown into the wall behind as the force of the impact meets you. \n\n  Wincing you get up, and feel the aching joints but the pain of those is easily overshadowed by the charging bull in front of you. You are beset upon by the big guy, he jabs you across the jaw to produce a crack that certainly marks you closer to your demise. \n\n  As he raises his fist once more to put you out of your misery, a ball of fire crashes into him. You feel the burn but are mostly relieved by the intervention.\n\n  Annoyed at the interruption the big guy rams Rage crushing her against a column of the palace. As the brute moves away you see the limp form of Rage slump down. He picks up the body and slams his fist in her back. The tell,tale crunch on impact gives away the severity of the blow.\n\n  Peace rushes him and ice coats a layer to distract him while she takes Rage out of his reach. Before you could react either way you find Harmony beside you with the white aura shimmering around her and your wounds already on the mend. \n\n  She helps you up to carry you towards the gate of the Palace, where Peace along with Glamour is trying to save Rage. Your consciousness slips past as the darkness overwhelms you. \n  *set Rage 0\n  *goto BossFight\n\n # Roll away to safety \n  With much distance between you and Rage, and given her weak condition, there was no way you could have saved her from this blow. You roll away as the brute comes crashing down the floor. The floor cracks under the blow to produce forth the thick cloud of rubble smacking around. As the dust settles you spot him holding the limp body of Rage, with a wicked smile he throws her up in the air to bring her crashing down on his knee.\n\n  The impact is marked by the loud crunch of breaking bones and even broken spirit. Toying with her at this point the brute prepares to slam another barRage of fists in her. Fortunately, Peace intervenes to stop his plans, as she creates a coat of ice to distract him while she slips away with Rage. \n\n  As you spy upon the efforts of Harmony and Peace, you turn your attention back to the brute in your way. Clearly if left to his devices he will try to finish Rage off, for kicks. Your position grants you the only opportunity to intervene as others are either engaged with the now rallied wraith infantry or fleeing from the scene at the sight of their best defeated in mere seconds. \n  *set Rage +1\n  *goto BossFight \n\n*label BossFight\n*page_break\n[b]Reunion[/b]\n\nWith Peace and Harmony already engaged on escorting Rage out, you are the only one left along with Garret who stands against them. Clearly the tables do not favour you, as the near victory situation is now turned into a massacre. Rage gone, new elite wraiths, the likes of the woman from the warehouse have now appeared to save their Palace stronghold. Despite bearing the weapons Garret's men can't fight these many wraiths alone.\n\nA few floaters too have managed to recover and have joined the fray. Some are already turning against you under their influence.  If any hope of pressing your advantage is there, it lies in your efforts at the moment. Glamour stands beside you nodding to affirm her support while Harmony and Peace carry Rage out to safety.\n\nThe brute is now standing in few feet from you sniggering all the time. He waits for you to make your move. \n\n\"How long have we tried to draw out these PESTS\" he says pointing towards the ragtag bunch of Garret's people, \"Rodents all of them. Hiding, Biting, pestering. And you\" turning towards you now, \"You brought them to me. For that I gave you the opportunity to watch ever single one of them FALL before I come for you.\"\n\n*page_break\n\nBlood boiling anger coursing through your body, you don't know what you are going to do but those people out there, your allies in this skirmish, need someone to lead them. Despite Garret's best effort to organise them, he is but a human against a much more powerful foe. \n\n\"Listen\" Glamour says closing in on you, \"Clearly you two have history\" she says pointing at the brute before you, \"Use that. Keep him busy while I get them sorted\" as she starts towards the fight she stops in her steps to turn towards you, \"By the way, he is a tank. The more you throw your elements at him the stronger he gets. So be creative.\"\n\nYou nod solemnly, for it may not be the most elaborate plan you can come up with but if it saves even one of them from this debacle it might be worth a shot. \n\n*if brilliance > 80\n Keeping in mind the advice to avoid powering the brute you look for ways to draw him out long enough for the others to rally to Glamour. The brute screams and pounds his fists at Garret's bunch who wavier in his presence. Their weapons broken to splinter against his unnatural form. \n\n Just as you think you resolving to the old sway of electric barRage you ponder at the sparks form at the edge of your fingers like synapses between nerves. Your vision adjusts to reveal the nerve synapses of those around you. Among those is that of the brute which under each blow glitter like the north star among the sea of stars. You gleam at yourself as you look back at your adversary, this time he is not a brute with unnatural power but merely a machine operating on the nerve synapses. You could easily spike those sparks between his nerve endings, the only difficulty is he is too difficult to sort his impulses from the rest in fray. \n\n *page_break\n You need to draw him out into the open, where you can put your newest experiment to the test.  The remains of the Barrack engines may serve the purpose for this. You charge the engines and then fling them at the brute.  The blast stagger him but for a moment. Once he assimilates this new energy, he shifts to meet your gaze. Raging at you in blind Rage you quickly propel yourself in the air to create some distance. \n\n Now he stands below you with frustration clear on his face, he searches for someway to bring you down but you are not about to give him the time or the opportunity to do so. You track on his nerve synapses, feel the electricity trudging between them. Tweaking the flow a bit to overpower his senses, you see the fuirtion of your efforts as first he moves around in confusion, scratching against his chest then to come to realization of your work, he looks at you with confusion. \n\n You magnify the charge conducted through his nerves. He screams and trembles to his knees. Mercy is not something you will grant him today, not for all the death and destruction he brought forth just to sooth his pride. You feel the anger somehow strapping you as you increase the pain to levels which could kill a elephant let alone any ordinary human. But the wratih shows some resilience. As first the new energy is greeted by his body as a welcome addition but when the nerves themselves start firing at each other and frying them in the process the body starts deteriorating under the charge. \n\n *page_break\n You lower yourself, all the while feeling the synapses increasing to the levels that you can smell the charred flesh as his body starts to burn from the inside. His eyes bloodshot, his lips clenched shut, his body quaking. Now he doesn't look much formidable to you. The smell of burnt skin, flesh, hair assaults your senses. The view of his skin shrinking inward to stick on the bones within, the smell generated during the process, is a bad fate to wish even upon your enemy. But this moment, your judgement is too clouded by the actions of this man before you. No matter what other may think of you for this, you deserve this shot at revenge. And that is all you think of to justify the horrors you are inflicting on the man. \n\n With nothing but ashes to signify your adversary's existence, you lower your focus and look back up to find the place silent. The wraiths are wavering at the loss of their leader, scared of the display you just made. The showboating ascend, the dramatic descend to watch your foe burn to crisp from within, that is enough to make an impact on anyone. \n\n The wraiths lay their weapons down as the floaters make a run for it. Disappearing into the night the floaters manage to avoid the bullets fired on them. The infantry however have lost the nerve, they are decimated and destroyed. Their ranks in tatters and leader in ashes, you have truly secured a desperate victory here. \n *achieve big \n *goto victory\n\n*elseif Dominance > 80\n Keeping in mind the advice to avoid powering the brute you look for ways to draw him out long enough for the others to rally to Glamour. The brute screams and pounds his fists at Garret's bunch who wavier in his presence. Their weapons broken to splinter against his unnatural form. \n\n He may be a tank, feeding on the energy attacks but thankfully your element doesn't have energy base. Being earth elemental you are all about the raw use of physical powers. \n\n You grapple the brute in mid charge with vines erupting from the ground around him. It takes but a moment for him to break free from them. But they do their job. You now have exclusive attention from him. \n\n *page_break\n Well, if he wants to play it rough you would be happy to oblige. As he charges towards you like a bull towards a matador, you erect slabs of earth to stagger his charge. With each slam his resolve only strengthens as his frustration increases. As he slams down the last wall standing between you and him, you unveil the little gift you prepared for him. There you stand in front of him as he stops in his steps to look at you. Head to toe you are encased in suit of strong hard quartzite sandstones from deep within the earth's core which gives you the appearance of a rock giant. \n\n Just smiling at the gift for him he charges to slam his fist into you, which you see coming from miles away. You catch it mid,air, following the same suite for the other fist he throws at you. You extend the sandstone to clutch his wrists as you drag him in to slam your hard helmet in his face. The head,butt leaves him dazed for a few seconds but so has manged to chip of a major part of your helmet. You quickly repair yourself as you prepare for another bout with the big guy. He gets up brushing off his clothes. \n\n You rush him spearing his torso to carry him off his feet across the courtyard to slam into a wall. The charge cuts right through the ongoing skirmish around you. You look upon the fallen form of your adversary, clearly feeling drained of his energy, you try to land a punch on him but he rolls away as you fist slams into the floor. It is he who charges you this time, but the result is different. He tries to lift you, push you, even drag you. But the quartzite anchors you pulled in have placed you firm. \n\n *page_break\n You clench your fists to slam them into his back. The impact buries him beneath you. Keeping the momentum to stomp him further down before pulling him up and landing punch after punch at his slump form. He retaliates with a jab across your suit which only manages to make things worse for him. The anger taking hold of you now, you slam him into the ground. You mount yourself on his battered form to land punch after punch in him. You can feel the integrity of the bones failing under the assault, the chips falling off of your own gloves but you cannot think past the horrors this man has inflicted just to soothe his ego. You fist pound him and they pound him again. By the time you stop, only paper thin layer of quartzite remains on your hands. You look at the bloodied gloves and look at the broken in face of your adversary. The fate that you brought to him is something the horror stories are made of.\n\n You look up as you stagger to your feet to find the entire courtyard populace staring at you and the carnage you produced. The wraiths are wavering at the loss of their leader, scared of the display you just made. The showboating charge, the dramatic end to watch your foe beaten to a pulp, that is enough to make an impact on anyone. \n\n The wraiths lay their weapons down as the floaters make a run for it. Disappearing into the night the floaters manage to avoid the bullets fired on them. The infantry however has lost the nerve, they are decimated and destroyed. Their ranks in tatters and leader in ashes, you have truly secured a desperate victory here. \n *achieve big\n *goto victory\n\n*elseif Eloquence > 80\n Keeping in mind the advice to avoid powering the brute you look for ways to draw him out long enough for the others to rally to Glamour. The brute screams and pounds his fists at Garret's bunch who wavier in his presence. Their weapons broken to splinter against his unnatural form. \n\n With the tide turning with him at the centre you have little time to make your move. Repeating your trick, you try to suck him dry with the hopes of knocking him out. Unfortunately, his body is tempered to repair losses at a much faster rate than you can inflict them. The only upside to this attempt is you are his centre of attention now, giving the others some breathing space.\n\n You ponder over the options at your disposal, as the brute charges towards you. You erect walls of ice to stop him but they merely shatter on contact. Just as he breaks past the last one you created, you spring a desperate idea as you create spikes of water moisture and solidify them in air as he rushes on. Unaware of the spikes as they form before him, he marches towards you as the Ice spike him. Piercing deep owing to his momentum, he squirms and stops. He pulls them out to reveal a quick healing wound on his body and more vigour in his actions. \n\n *page_break\n He takes a jab at you as you dissipate into steam. The fist flies through you as you form behind him. You form a fist of ice and slam hard into his exposed back. The impact slams him downwards into the ground. Wincing he gets back up glaring at you. You re,shift and flank him this time n to make it taller than the brute. But the strength of the brute denies you a similar event as in the case of the machine. He stands tall now smirking in your direction as he acknowledges your failed attempt. \n\n He charges at you as a bull would to a matador. You pull everything in the path to your aid but he simply overpowers it as he makes for you. With a spine breaking crunch he slams into you, sending you flying away from him. Your fall is greeted with more broken bones and more pain but the healing aura that you encase yourself in helps you recover quickly. \n\n But the brute is not done yet. He stands looming over you as he grabs for your neck and lifts you up. You struggle against his grip feeling the pressure choking in on your windpipe. Grabbing on to his hands you try to push yourself away from him. But just as you do, you feel the tingling sensation of his energy flowing towards you. His grip falters a bit only to be reinforced by his resolve. \n\n *page_break\n Once again you grab his hands but this time with the intention of absorbing his life force. You feel the surge travelling through you accompanied by the fall in the energy of the brute. His grip lossens as he shakes his head to try to resist the weakness in him. The more energy you absorb, more he losses control and the weaker he becomes. \n\n The transfer becomes so extreme that he looses his grip and falls to his knees, his eyes scattered on the floor, exhausted. You hold on to his limp hands now drawing on to every last bit of his reserve. You feel the shrinking form of his, the dwindling life in him. He looks up for a brief moment, his eyes begging for separation from you. But the anger, the hate, the revenge is what you think of. All the pain and suffering that he bought forth with the sole purpose of soothing his ego, all the misery that has befallen those around you, all the lives lost for whatever purpose these wraiths had, it drives you now. \n\n You feel the tinge of loss, as the body of the brute lies limp, his face hanging, jaw slackened and the life receding from him. You feel the energy but you also feel the emptiness, the void where once the life of the brute was present.\n\n You let the arms drop and look up from the scene, your vision on returning to normal. You see the hush fallen on those before you, the look of surprise, fear and cheer mixed in those of the mixed ranks. The wraiths lay their weapons down as the floaters make a run for it. Disappearing into the night the floaters manage to avoid the bullets fired on them. The infantry however has lost the nerve, they are decimated and destroyed. Their ranks in tatters and leader in ashes, you have truly secured a desperate victory here. \n *achieve big\n *goto victory\n\n*label victory\n*page_break\nYou slump down amidst the cacophony of cheers and celebrations of Garret's warriors. Your mind reeling at the actions that took place mere seconds ago. You grow in power no doubt but even you have to admit the horrific results it produced. \n\nLost in your thought you fail to catch Glamour heading towards you. She sits next to you placing a soothing hand on your shoulder. \n\n\"I killed him.\" you say in a trembling voice, \"I killed him in cold blood. His eyes, his screams, his struggle...\"words fail you under the sorrow you feel at the loss of something innocent in you.\n\n*page_break\n\n\"You did what was needed\" she says in a comforting tone now holding your hand in an assuring manner, \"It is always difficult to come to terms with our actions, especially when they are driven by our emotions. You did not KILL him. You merely did your job. Without you these people would not have survived to see another day. You made that possible.\"\n\n\"It's not just him\" you say matching her gaze, \"the thrill the sense of duty it drove me to the point that I lost myself in it. All those people that came before him, the wraiths we killed in ambush, the beasts, the ones at the warehouse. Watching his a challenge for the overpowering numbers of the English army. Within a month England is whole again, with its pride and capital reclaimed. \n *set Hate +1 \n *finish", "choicescript_description": "Become an Elemental and harness your powers over Water, Earth, Electricity, or the Enchanting Light itself! Can you save the world and still make it in time for classes!?\n\n[i]Elemental Saga: The Awakening[/i] is a 100,000-word interactive fantasy novel by Mandar Deshmukh, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n• Master any one of four different elements.[n/]\n• Build your character, your relationships and guide them in the coming war.[n/]\n• Choose your stance - Fight or Retreat.[n/]\n• Rise up as a revered icon or lay down as a scapegoat.\n", "choicescript_stats": "*stat_chart\n text Name\n percent Brilliance\n percent Dominance\n percent Eloquence\n percent Healing\n percent Jessy\n percent Brandon\n percent Rebecca\n percent Matthew\n percent Suma\n percent Kertez\n percent Leela", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Elemental Saga: The Awakening.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Name \"Adalind\"\n*set Brilliance 60\n*set Eloquence 40\n*set Dominance 20\n*set Leela 20\n*set Matthew 10\n*set Kertez 20\n\nAs you enter the room across the corridor you hear a few voices coming from the adjoining room. You slowly and stealthily near the door as you open it just enough to peek inside the room. To your surprise you see a large table across which at least twenty people, that you can see through the narrow slit, are milling about, belonging to different age groups and bearing almost no resemblance to each other. You back away as you hear someone nearing the door. \n\nYou hide behind the counter as the door opens to give way to a beautiful young maiden with lush Locke of black hair flowing down her shoulder, and ocean blue eyes to compliment them with a smile that could melt even the toughest of them, heck it could even melt the cube Dr. Miller made. Speaking of which, you are definitely nowhere near your university and none of these ever crossed your paths before. As the door closes a thought appears to you. Since you are alone, you can intimidate the girl into spilling the secret behind your mysterious kidnapping or it could be wise to just get away from here utilizing the Element of surprise in your benefit. \n\n*fake_choice\n #intimidate\n\n #hide\n\n\n\n*script changeBackgroundColor(\"black\")\n\n*set Name \"George\"\n*set Brilliance 30\n*set Eloquence 20\n*set Dominance 10\n*set Leela 20\n*set Suma 50\n*set Kertez 30\n\n\n\n[b]Chapter : Revelations [/b]\n\nYou find the morning come for you quickly as you stand in Foyern's study. He mills about in his extra,large, extra,messed,up library. Grabbing a book from the shelf about the size of a small anvil he walks towards his desk. Delicately he places down the monstrous book on the desk and wipes off the dust from it's top.\n\nHe returns to his desk and starts rampaging through the book to stop on a page with a door marked with five seals on it. \"This\", he says tapping on the image, \"is the solution to our problem. And it may even save the 'outsiders' from being muffled by Balzorin.\"\n\n\"What is it?\" you ask peering over the book to look at the script below the image.\n\n\"This is the absolution for our kind, a way to secure peace against the wraiths forever.\" He says, his eyes crazy with enthusiasm as he continues, \"It is the gate to the vault of the ancients. A place filled with power enough to quell the wraith threat once and for all.\" He says before he sighs causing his excitement to dissipate with it, \"But I am afraid, I can't just waltz to the gate and open it. My old bones might not be able to bear the pressure of this task. And that is why the task falls to you.\" He says placing a hand on your shoulder.\n\nThe vault of the ancients : the name itself raises a million questions and ones which you would like to ask before making a decision are,\n*fake_choice \n # \"What is exactly the vault?\n # where is it located?\n # How to open it?\n # Why can't you send someone else?\n # Can you take someone with you?\n # Nothing more to ask\n\n\n\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Name \"Rose\"\n*set Brilliance 10\n*set Eloquence 20\n*set Dominance 30\n*set Healing 50\n*set Brandon 20\n*set Jessy 10\n*set Rebecca 20\n\nYou exchange a look with Jessy before you both head in opposite directions. The tab though with Jessy, you also carry a bag which was carrying the equipment necessary for the heist. \n\nHe looks once at you and then at Jessy as if contemplating whom to chase. But instead he decides to further roleplay into his character as he barks order to indicate your position to the guards while he rushes after Jessy. \n\nSeparated and already losing her sight you can't help but continue down your path to distract the guards long enough for Jessy to find a way to the rooftops and use the teleportation stone. As you rush into the hall you spot three guards with the tasers pointed at you ready to fire. Without thinking you,\n\n*fake_choice\n # Decide to rely on your physical prowess\n\n # Wing a plan \n\n # Bluff your way through\n\n\n\n\n*set Name \"Franco\"\n*set Brilliance 40\n*set Eloquence 50\n*set Dominance 30\n*set Healing 50\n*set Leela 60\n*set Matthew 20\n*set Kertez 30\n*set Leela 10\n*set Rebecca 40\n*set Suma 35\n*set Jessy 20\n\n\n\"You take the left, I will take the right\" Trimmer says in a hushed tone as he brings his rifle up to the point, \"Spot anything, come back and report to me. Don't play a hero\".\n\nYou unholster the Glock as you position your arms in a ready to fire state. The whole setting of the dimmed lit corridor and the retro setting of Victorian walls covered in white to barely reveal it's existence, sends chill down your spine. You slowly and quietly make your way to the receiving room, no doubt this was one of the tourist hotels cashing in the heritage. The approach isn't as quite as you want, for the wooden floor creeks under each step you take giving away your position. You try your best to make is sound out of pattern as you near the edge of the corridor. You turn around the corner with your Glock pointed straight ahead. The room appears clear with two bodies lying on the floor in a bloody heap. Gazing over the counter unveils the receptionist's condition to be no better. \n\nForcing yourself not to omit at the bloody mess in around, you make for the stairs adjoin the counter leading upstairs. The stairs are even more of disarray with occasional broken one and almost all on the edge of it.\n\nThe ground floor of the Townhouse was dimly lit; the top floor is completely dark. You take a moment before deciding your approach, clearly you have to play at your strengths here. \n\n*fake_choice\n # Improvise a lighting Source\n\n # Rely on your quick wit\n\n # March in with the confidence of bashing anyone to cross you\n\n\n\n\n*set Name \"Rambler\"\n*set Brilliance 40\n*set Eloquence 50\n*set Dominance 30\n*set Healing 50\n*set Leela 60\n*set Matthew 20\n*set Kertez 30\n*set Leela 10\n*set Rebecca 40\n*set Suma 35\n*set Jessy 20\n\n\nYour path however is cut short by a man, who stands before you with his hands raised, \"Here to talk. Nothing Funny\"he says.\n\n\"What about?\" you ask eyeing the mysterious man suspiciously.\n\n\"We know you work against those invading wankers taking a piss on our city.\" His accent giving him away as a local, \"And boy would I cherish the feeling of grabbing them by the bollocks.\"\n\n\"That is all well and good\" you found the source of the voice to be Voice, \"But what in the blazes can you do for us?\"\n\n\"Plenty uses this one has miss\" he says with a slight bow, as he whistles to reveal movement from all around you. People, no doubt criminals armed with revolvers more local than proper factory made but still the confidence and the fact they were there without your knowledge is nerving. \n\n\"Oh, goodie, you got a gang. But that still doesn't answer my question\" Voice says with disdain.\n\n\"You know something about London, miss\" He says his smile more cocky now, \"It is filled with barmy folk. And every single one of those, will like to turn this gobsmacked attack back and take the city back to ourselves.\"\n\nChipping in you\n*fake_choice\n # Urge Rage to trust them\n   \n # Suggest against such a risk\n", "startup": "*title Elemental Saga: The Awakening\n*author Mandar Deshmukh\n*scene_list\n startup\n CG1\n CG\n thefinaldayoftraining\n Revelation\n War\n Backatcampus\n\n*achievement einher visible 10 Einherjar\n Chase your Dream.\n Secure Admission in the Prestigious Einherjar University.\n\n*achievement flin visible 10 Fling \n Make the only choice.\n Attract the homicidal maniac.\n\n*achievement kid visible 10 Kidnapped \n Get Kidnapped by a hooded figure.\n\n*achievement buzz visible 50 Feel the buzz\n Buzzer!!\n Gain mastery over Electric Element.\n\n*achievement brick visible 50 Brick hard\n Indestrutible.\n Gain mastery over the Earth Element.\n\n*achievement fish visible 50 Practically a fish\n Hydrate yourself.\n Gain the mastery over water Element.\n \n*achievement mend visible 50 Mender\n Shaman.\n Gain mastery over the healing aura.\n\n*achievement mast visible 10 Master\n Beat-up your senior! \n The student has become the master.\n\n*achievement sher visible 50 Sher-unlock\n Discvoer the mole within.\n Expose the traitor in Einherjar .\n\n*achievement once visible 50 Once is a fluke\n Wraith counter.\n Defeat the Wraith in the Warehouse .\n\n*achievement cop visible 20 Plan a Coup\n Side with your mentor.\n Join Foyern in his goal to find the vault.\n\n*achievement puppy visible 50 Get a pet\n Secret pet.\n Help Leela hide her puppy.\n\n*achievement twice visible 50 Twice is a coincidence \n On a roll.\n Defeat second Wraith at the Gas Inc. \n\n*achievement date visible 30 Date at a Museum \n Steal a romantic evening.\n Share the night sky with Jessy at the Museum.\n\n*achievement thrice visible 50 Thrice is a trend\n Hatrick!!\n Defeat a three Wraiths.\n\n*achievement god visible 50 Re-incarnation \n Wake the Remener from their Slumber.\n\n*achievement sas visible 50 SAS\n Rescue on the side.\n Rescue the SAS team. \n\n*achievement lond visible 50 London has Risen\n Lead by example.\n Help the Welda Squad Fight Back.\n\n*achievement mil visible 10 Friend no more\n Find an old Friend in London.\n Find Miller in London. \n\n*achievement big visible 50 The Big one\n Goliath!!\n Kill the Big Guy.\n\n*achievement friends visible 50 Friend in need\n Commitment to end what you started.\n\n*achievement family visible 50 Family First \n Go back to your roots.\n The dread of your mother has dragged you home.\n\n \n\n\t\n*create Name\"\"\n*create Dominance 0\n*create Brilliance 0\n*create Eloquence 0\n*create Healing 0\n*create Matthew 0\n*create Leela 0\n*create Kertez 0\n*create Rebecca 0\n*create Brandon 0\n*create Jessy 0\n*create Suma 0\n*create gender 0\n*create genderhe\"\"\n*create gendermr\"\"\n*create genderson\"\"\n*create genderking\"\"\n*create genderhis\"\"\n*create genderhim\"\"\n*create genderguy\"\"\n*create genderhero \"\"\n*create gendermyman\"\"\n*create RomaRebecca 0\n*create RomaMatthew 0\n*create RomaSuma 0\n*create RomaBrandon 0\n*create RomaJessy 0\n*create RomaKertez 0\n*create RomaLeela 0\n*create Romaalone 0\n*create Brandonalive 0\n*create Rage 0\n*create London 0\n*create Hate 0\n*create sas 0\n*create gar 0\n*create family 0\n*create friends 0\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Become an Elemental and harness your powers over Water, Earth, Electricity, or the Enchanting Light itself! Can you save the world and still make it in time for classes!?\n\n  [i]Elemental Saga: The Awakening[/i] is a 100,000-word interactive fantasy novel by Mandar Deshmukh, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n  • Master any one of four different elements.[n/]\n  • Build your character, your relationships and guide them in the coming war.[n/]\n  • Choose your stance - Fight or Retreat.[n/]\n  • Rise up as a revered icon or lay down as a scapegoat.\n\n  *if choice_is_advertising_supported\n    [i]Elemental Saga: The Awakening[/i] is supported by advertisements, but you can buy the unlimited version\n    to turn off ads forever.\n    \n    *purchase adfree $4.99 purchased\n    *page_break_advertisement\n\n    *goto purchased\n  *else\n    [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n    *purchase adfree $4.99 purchased\n    *page_break Play Now for Free\n\n*label purchased\n\n\n\n*finish\n", "thefinaldayoftraining": "*page_break\n[b]The final day of training[/b] \n\nEverday follows the same pattern as you are hurled into the ring to fight Ellie who just enjoys thrashing you around as you try to defend yourself. Each day you try to fight her with your powers but nothing seems to make you turn back into the infamous version of glowing you of that fateful night. Each day you just go back to getting physical with her, relying on your insticnts and hand-to-hand skills to defend yourself without much luck. \n\nIt's has been more than 20 days since you were bought here and though you have made new friends and had some fun times around here, you do miss the life you left behind. The simplicity of the monotonous life was not something that you thought you would miss but given the recent turn of events you are desperate for things to go back the way they were. \n\nGearing up for another session with Ellie you step into the ring with once again the intention of putting yourself through the beating for today. But something is different today as you see fury in Ellie's eyes as she sees you,\n\n\"You stubborn oaf, you really thing that night was just a onetime thing?!\" she says waving her arms furiously at you, \"I tried to be patient with you, for the old man's sake but now we do things my way\" she says wiggling her fingers in your face, \"The Kidde gloves are off\" as you watch her fingers disappear into nothing. \n*page_break\nApparently her element is air, at least that is what you gather from others. But using her Elementals against you seems a bit extreme since you have not tested your powers ever since the manifestation. You watch her airy form gather at the other end of the ring as she prepares for the bout.\n\nYou look around to not find a single friendly face and then turn back to her with the determination to face her. She rushes forth to pound you with a strong gush of air that pushes you out of the ring and makes you land hard on your back. You get up gathering yourself as you look for her.\n\n\"Up here you, numbskull\" she says from above as she pours forth a heavy set of winds upon you pushing you down with a force that threatens to break your spine. You manage to roll away somehow, as you try to breathe again but without much time to recover she once again hammers you with another gush. You fall on your back only to lifted into the air as Ellie begins to circulate the winds in fashion similar to a tornado. You feel yourself fly into the air being tormented by the swing of it, thrown around like a rag doll. \n\nSuddenly the winds come to halt to let you fall from a great height as you feel yourself plummeting to your doom.\n*choice\n #The awakening\n  You close your eyes and focus with all intent as you once again feel the strange trembling sensation course through your body. The sensation lingers for a while as it begins to grow and grow. Unconsciously you are willing for it grow and protect you as you begin to feel increasing power within.\n  *if Dominance > 40\n   You open your eyes to find the ground beneath you cracked and your skull still intact. You get up to your feet as you feel another forceful wind from Ellie pound on you but this time you plant your feet on the ground and as you look at your feet, you do see vines wrapped around your body root themselves by digging into the ground holding you firm in your position. The wind is now merely cooling you as you stand tall facing the increasing pressure from Ellie. She once again tries the tornado bit but finds it wielding no result as you still stand there firm and strong. \n\n   You look at your hands and the vines coming forth from it as you will for them to be propelled towards Ellie. With Ellie distracted in pulling another gush of wind at you the vines rush her and ram her at incredible speed wrapping her in the process. You will for the vines to hold her but she merely escapes from your hold dissipating into thin air and reforming at some distance from you. She creates a huge fist of air to slam right into your body causing you to wince as you lose your rooted footing under the force. \n   *page_break\n   You get back to your feet and think of ways to use your powers to defeat Ellie as your gaze rial loaded into them. Don't know their purpose so asked the guy you mentioned and found that he was going to steal it form a co-worker's research project to supply it to the people that work with his 'girlfriend'.  A grade A Douche bag. All in all, you did stop whatever the wraiths were planning. Keep your eye open though\" he says. \n\n  \"Who was the co-worker from whom he was stealing?\" you ask curious whether Rebecca was involved.\n\n  \"Some Rebecca apparently\" he says confirming your doubts.\n  *page_break\n  Next morning you go with Rebecca under the guise of helping her and begin checking the supplies. When the nuclear material provided to her under heavy security clearance you turn shocked and look around in over-dramatic response as you call for the security. The security checks the footage and catches the guy trying to run away from the lab.\n\n  Rebecca thanks you for saving her ass. As the loss of such a nuclear material was a big enough deal to destroy one's life and of those related to them. You don't feel sorry for the guy as he is handed over to the proper authorities for stealing and attempted sale of Nuclear material. \n\n  Though the culprit is caught and the plot of the wraiths spoiled you still don't know what they needed those satchels for.\n  *achieve sher\n  *set Rebecca +10\n  *goto Brandonvisit\n*label Brandonvisit\n*page_break\nWalking towards your hostel you bump into Brandon who somehow thought walking around hooded in broad daylight was less conspicuous. You lower his hoodie and ask him why is he here. \n\nHe takes a seat on a nearby bench before continuing, \"Ellie has gone missing. She was investigating the truck lead you gave us, which lead her to a warehouse not far from here. Normally I go with her but this time there was another emergency and I got caught up in that. Needless to say we need to check the warehouse and find her.\"\n\n\"Well, I am free for the next two-three hours but we need to be back before eight : Hostel rules\" you say raising your arms. \n\n\"No can do. Let me see if I can break you out of there at night\" he says.\n\n\"OR you can check me out by signing an application for absence\" you say wishing to avoid any unwanted altercation.\n\n\"Fine.\" \n\nBrandon joins you to sign for the application to the warden before presenting an identification in form a driver's license from your state. You look at him in disbelief and remind yourself to ask me later about this.\n\nThis sudden visit from Bradon gets you thinking about the League's view of you.\n\n*fake_choice\n # As an upcoming member\n  This importance from the league has certainly been appreciated. This is not so much deviation from you daily routine but just enough to keep things intresting. Plus you get to try your powers without restrain. With an off-chance of impressing the other co-workers.\n \n # As the errand runner \n  Call what you may. But the constant paging for help has made you feel like the help for the higher ups. As if they look down upon you as a newcomer and try to take advantage of your lack of support in the league. Perhaps one day you can change things around. For now, just follow the lead guy.\n\n\nYou arrive at the motel next to the warehouse as Brandon continues to peer at it through the curtains. He notes every activity and explains and major events to you once in a while. The stakeout is boring but soon the time for action comes close. \n\nAt night when the warehouse closes and the guards change shift you make your way down to the motel entrance. The motel lies right across the warehouse and as such you need a plan before you exit the motel.\n\nDo you plan to\n*choice \n # GO in hard and fast \n  *if Dominance > 40\n   You were never the one for subtlety as you walk out the motel with readiness to turn any minute now. On your approach the guards stiffen a little and raise a hand to stop you. Just as you draw near you change in a swift motion as the guards look at each other at the scene before them. They reach for their guns but before they could aim, you ram them with your arms crossed across your chest. The force sends them flying as you produce two vines to bind them and hide them behind the dumpsters.\n\n   With the gatekeepers taken care of you move inside the warehouse with Brandon at your side, somewhat impressed by your skill.\n   *set Dominance +10\n   *set Brandon +10\n   *goto insidewarehouse\n  *else\n   You were never the one for subtlety as you walk out the motel with readiness to turn any minute now. On your approach the guards stiffen a little and raise a hand to stop you. Just as you draw near you change in a swift motion as the guards look at each other at the scene before them. You turn completely but they already have their guns drawn and aimed right at you.\n\n   Despite being an Elemental you don't think you can stop those bullets from killing.\n\n   \"What the Heck is that mate?!\" one of the guard's barks at you.\n\n   AS you are counting the seconds before the guards shoot you down, Brandon appears behind them a launches a swift kick at one them while elbowing the other. The two guards downed and dazed he immediately knocks one out with a kick to the temple and then moves to the other one before ramming the guard's own gun in his face.\n\n   You help him hide the bodies in the dumpster and move inside the warehouse. Despite dealing with the problem you think you just lost a tiny bit of respect in his eyes. \n   *set Brandon +10\n   *goto insidewarehouse\n\n # Stealth is the way to go\n  *if Eloquence > 40\n   Your water phase helps you go splash on the water as you move along the road towards the warehouse. You avoid the gaze of the guards as you move past them and reform before chocking them with spheres of water formed around their necks. Once they are knocked out you move their bodies with the water pool to the dumpsters.\n \n   Dealing with them you walk with an impressed Brandon in your tow as you make your way inside. \n\n   *set Brandon +10\n   *set Eloquence +10\n   *goto insidewarehouse  \n  \n  *else\n   The bright and seemingly flashy powers of your hardly go unnoticed as the guards spot from a distance training their guns at you. Without much knowledge of how much damage can the bullets do, you just stand there like a deer caught in the headlights. \n\n   \"What the Heck is that mate!!!\" one of the guard's barks at you.\n\n   AS you are counting the seconds before the guards shoot you down, Brandon appears behind them a launches a swift kick at one them while elbowing the other. The two guards downed and dazed he immediately knocks one out with a kick to the temple and then moves to the other one before ramming the guard's own gun in his face.\n\n   You help him hide the bodies in the dumpster and move inside the warehouse. Despite dealing with the problem you think you just lost a tiny bit of respect in his eyes. \n   *set Brandon -10\n   *goto insidewarehouse\n\n # Use the surrounding to your advantage\n  *if Brilliance > 40  \n   You peer out the door to find a transformer near the position of the two guards posted at the entrance. With right timing and right control, you can take them out without much alarm to anyone.\n\n   You move out and casually make your way to the transformer and just stand there staring at the warehouse. The guards draw near to you to investigate your purpose of standing on the property.\n\n   Once within range you change and in a swift motion send a chain lighting catching them both by surprise and sending them flying towards the dumpster. The dumpster hides their bodies perfectly.\n \n   Dealing with them you walk with an impressed Brandon in your tow as you make your way inside. \n\n   *set Brandon +10\n   *set Brilliance +10\n   *goto insidewarehouse\n\n  *else \n   You try to find anything that you can use against the guards. But seemingly at a loss you simply shrug at Brandon who storms out in anger towards the warehouse. You run after him as he is already being confronted by the guards.\n\n   Brandon launches a swift kick at one of them while elbowing the other. The two guards downed and dazed he immediately knocks one out with a kick to the temple and then moves to the other one before ramming the guard's own gun in his face.\n \n   You help him hide the bodies in the dumpster and move inside the warehouse. Despite dealing with the problem you think you just lost a tiny bit of respect in his eyes. \n\n   *set Brandon -10 \n   *goto insidewarehouse\n*label insidewarehouse\n*page_break\nThe inside of the warehouse is like any other with large rows of shelves stocked with all kinds of stuff.\n\nBrandon peer inside one of the boxes before shaking his head at you and whispering, \"All junk. If there is something in here we will find clues to it there\" he points towards a room upstairs with a light and a figure walking back and forth in it. \n\nYou cautiously make your way up the stairs avoiding the other guards to avoid spooking the person inside the room. As you near the door Brandon jiggles it lightly before turning towards you, \"Its locked. Keep an eye out while I open it.\"\n*page_break\nYou turn around and keep a look out for any guard closing up. After two long minutes Brandon finally manages to open the lock as he turns the knob on the door to let you in. Inside the room, you peer beyond the boxes stacked to find the person to be none other than the latex woman and besides her is a woman with her hands tied to the roof of the room and body limp with clear signs of bleeding on her body. The hand of the woman is branded by some strange mark.\n\nThe latex woman lifts the face of her victim to as she asks her, \"Last chance dear, tell me the location of your little warehouse or I will rip the very essence out of you\" As the victim spits on the latex woman your worst fears comes true as it is Ellie tied up before you.\n\nThe sight to unbearable for Brandon as he rushes the latex woman and produces a fire ball that's slams into her blasting her out of the room. He immediately turns to free Ellie who chides you both, \"Fools! You disobeyed a direct Order!! Walked right into a trap\" she says as you keep a look out for the latex woman before deciding to settle this later. \n\n*page_break\nBrandon grabs her hand and wraps it around him as he helps her up. HE turns towards you, \"One of us has to carry her and one of us has to fight them out there. So I give you the choice\" he says.\n\nYou look around to see the guards joining their boss as she stands rubbing the slight burn she received from the blast.\n*choice\n # Protect them\n  You decide against your better judgement to fight the woman along with her guards to buy Brandon time enough to carry Ellie out of here. You jump out of the room and ready yourself. You change once again as you prepare for the onslaught from all sides.\n  *if Dominance > 50\n   A body made from rocks really comes handy when you are under fire. The bullets chip away a few pieces from your body only for them to be replaced quickly. You produce the vines as you grab on to the nearest guard and slam him hard into the wall. The remaining quickly rearrange themselves to fight though cover against you. It is not them that you are worried about. It is their boss who is moving menacingly towards you. You quickly dart towards your left as you produce another set of vines as you grab a guard hiding behind the shelve and throw him at the woman. The woman simply slashes her hand upwards cutting the man in half. You would have thrown up if you didn't have immediate concerns. You ram the shelves to take the advantage of the guards out. A few get stuck under the shelves while others are forced to move in the open.\n   *page_break\n   Before you could use your vines again the latex woman charges at you and rams hard into you. It does little damage to you while she appears a little dazed. You immediately propel yourself upwards using the vines to create some distance between you. The guards move around to target you but with the shelves down you simply slash a large vine across to crash it into them. \n\n   The woman once again up and running comes for you head on. Without much space to dodge her you try something new as you hold your hands down fists clenched focusing on your next move. With the woman barely a foot away, you manage to erect a wall from the ground which the slams into the woman before breaking from the impact and crumbling down into nothing. Well that was fasinating but the woman maintains her charge and slams into you. \n\n   You fly through the wall of the warehouse as she falls with you at some distance from it. You gather your sense as you look for the woman to find her standing right in front of you. With a grin on her face she produces forth her arm and pierces it through your rock hard body. You cry out in pain as you feel her toying with your insides. \n\n   Lucky for you the backup arrives as a jolt of electricity fries her and separates the two of you. You fall to your knee and look up to spot Jessy, Foyern and a few others as they continue the now fleeing latex woman.\n\n   Soon you pass out as the pain becomes excruciating.\n   *achieve once\n   *set Brandon +30\n   *goto_scene Brandonalive\n   \n  *elseif Eloquence > 50\n   You let it flow as the bullets fly through he watery form of yours. You peer down at first to look at the damage but find the bullets hitting the wall behind. You look at the nearest guard and stream a strong current of water at him which slams hard into him to slam him against the wall. \n\n   The remaining quickly rearrange themselves to fight through cover against you. It is not them that you are worried about. It is their boss who is moving menacingly towards you. You quickly dart towards your left as you produce another stream to target a guard standing between you and the latex woman propelling him towards her. As the guard flies in her direction she simply slashes her hand upwards cutting the man in half. You would have thrown up if you didn't have immediate concerns. You ram the shelves with a strong stream to take the advantage of the guards out. A few get stuck under the shelves while others are forced to move in the open.\n   *page_break\n   As you prepare for another round of water sports you are suddenly charged by the woman who simply passes thorough you. She turns and tries to jab you but you manage to produce a jet strong enough to make her fly into the wall behind her. You look towards the rest of the guards and channel all the moisture that you can muster from the surrounding to create a wave large enough that it touches the ceiling of the warehouse. The guards run in horror at the sight but are not so lucky to escape from your own little Tsunami, as it slams into everyone and everything in front of you.\n\n   Feeling proud of this new move you turn towards the woman to find her standing right behind you. With a swift motion she grabs your hand and gives you a jolt as you fall to your knee. The jolt fries you as you grit your teeth through the pain. \n\n   Luckily for you the backup has arrived, as you watch a slab of rock slam into the wraith crumbling her underneath. You fall back and drag yourself away to rest on a fallen shelf as you spy on Jessy, Foyern and others standing at the entrance before you pass out from the pain.\n   *achieve Once\n   *set Brandon +30\n   *goto_scene Brandonalive\n\n  *elseif Brilliance > 50\n   The electric field around you bars the bullets outside as they are trapped in the field around you. You look at the nearest guard you is still firing bullets at you without any effect, as you send forth a jolt that sends him flying into the wall behind him.\n\n   The other guards soon wise up and find cower to hide behind. You look around to find the warehouse to be bad place for anyone to be in if they are fighting someone who can peddle electricity as you do. It is not the guards that you are worried about. It is their boss who is moving menacingly towards you. You send forth a jolt that sends the guard flying into the woman. As the guard flies in her direction she simply slashes her hand upwards cutting the man in half. You would have thrown up if you didn't have immediate concerns. You look at the metal shelves just lined up in front of you as the poor guards hide behind them to protect themselves from your electric attacks. You smile at the thought a send forth a small wave of electricity that propagates from one shelf to another jolting any guard hiding behind it. Those guards standing away from them are the only ones left.\n   *page_break \n   Just as the you turn your attention back to the woman you spot her charging towards you. With some effort and a lot of focus to create a ball of sparks as large as the doughnut above the doughnut shop and send it towards the woman. The mere force and power of it sends her flying through the wall of the warehouse and another guards still left standing meet a similar fate.\n\n   You walk out through the hole in the wall the woman left to look at your handiwork. But only one step out and you stand face to face with her. She jabs you across your face and as you fall to your knee she lifts another fist to ram into you. \n \n   Lucky for you the backup has arrived. A strong jet of water slams into her as you look sideways to spot Jessy, Foyern and others before you pass out from the punch. \n   *achieve Once \n   *set Brandon +30\n   *goto_scene Brandonalive\n \n  *else \n   You look around as a barrage of bullets hits you shredding your bodies to pieces. You fall on your back as your healing powers kick in. The guards slowly move in your direction to check you out. As they near your wounds are fully healed and you have already formed a shield in your hand. \n\n   When the guard peers over your body you send forth the shield which sends those near flying and those far under cower. You get to your feet as you y Ellie\n  With Brandon clearly far more superior and better trained at combat than you, the natural choice is to let him fight while you take Ellie out of here. Brandon nods at your decision as he transfers Ellie over to you and reaches into his pocket. \n\n  He draws out a shiny purple pebble glowing with a light purple hue and places in your hand before saying, \"This is the teleportation stone. Tap it twice and you will be back at the headquarters. But remember to use it outside in the open and in the moonlight. It doesn't work otherwise.\"\n\n  With a deep sigh he jumps down into the warehouse before looking back at you once he engages the guards beneath.\n  *page_break\n  On your way out, you see him teleporting around the guards and using fireballs to take those in distance out. The way he is fighting you think he can even defeat the woman in charge. As you come out of the warehouse you drag Ellie around the corner to stand in the moonlight and click the ston twice. A white light washes over you as you open your eyes to find yourself on the playground of the headquarters.\n\n  You call out for help, which soon arrives and watch as they lead Ellie to the healing room before you grab Foyern and tell him about the woman and Brandon. Immediately he draws his stone forth and orders a select few to follow him, including Jessy and you. You once again tap the stone and this time you are taken to the warehouse at the entrance.\n  *page_break\n  In the distance Brandon stands heavily bleeding as the woman draws closer to him with venom in her eyes. Brandon teleports behind her only to find her turned already anticipating him and her hand slashing upwards through his half teleported form. You let out a cry of pain to which the woman responds with a hearty smile. Those around you charge at her but she bolts away teleporting in short distances. \n\n  *set Brandon -100\n  *goto_scene Brandondead\n"}};

/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
