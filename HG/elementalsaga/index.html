d when I see it but it is the League itself I don't trust. I think it is time for the council to decide your fate. But come what may, know that I shall always be with you.\"\n*page_break\nUnsure at the mention of come,what,may you can't help but feel terrified of the possible consequences. Hour later you find yourself in the chamber before the council as Balzorin, Mel and the beach guy join the three of you. \n\n\"This is troubling indeed\" says the beach boy to break the silence that ensues after the account of your defeat of the wraith, \"It took Bal, a decade to get around the second one, that too under vigorous training but to do so in mere weeks?! It calls for intervention.\"\n\n\"Intervention?!\" Mel yells across the table at the mention, \"Meaning stripping ${genderhim} of the power that was bestowed upon by singularity herself?! Do you hear yourself? This council was established to guide the elementals not rule them!\" \n\n\"Let's keep our wits about ourselves. The kid certainly has potential and by rights ${genderhe} deserves our gratitude for killing the wraith.\" Balzorin steps in the conversation now, \"But the risk of the vault stands ever so present that we cannot just overlook this development. But neither can we just muffle the strongest in our ranks. It shall send a wrong message to the others.\"\n\n\"Plus the kid has given us no reason to doubt ${genderhis} intentions\" Foyern says stepping up this time, \"And he is oblivious to the prophecy itself! I hardly think he will set his mind on a task unknown to him.\" \n\n\"Let it remain that way then\" Balzorin says eyeing Foyern suspiciously, \"It seems the Phasal powers have just manifested themselves and there is still time until ${genderhe} learns to control them.\"\n\n\"It is decided then, let us keep an eye out for the third one and keep the entire matter on the down-low\" the beach boy interjects.\n\n\n*page_break\n\nJust like that the greatest day in your life turned to take a sour end. The return to your room doesn't do you any good either as you find your parents visiting you. The smell of the sewers is gone for most bits but a still pungent stink sticks closer to you. \n\nYour little sister runs to greet you only to stop mid,way to hold her nose. You explain how you fell in a puddle on your way back from concert and doubt that it was the result of natural rain. Through ews and ehs your conversation goes forth. \n\nThe occasional visit from your parents does little to cheer you up as you mop yourself in bed, tired and dejected at the events before. \n\nThe night brings little rest to you as you keep awake for the course with the thoughts about the prophecy keep popping up in your head. \n\n\n*page_break\n[b]Chapter : The night at the Museum[/b]\n\nTired after jumbling between three personas that you have to maintain, you certainly hope that the coming days will hold less excitement for you. But that was just a thing of the dreams. \n\nAlmost a week later you get called to the headquarters, whose location is yet not revealed to you. Fearing that this might be for the decision regarding the \"INTERVENTION\" they planned last time, you can't help but gulp as you make your way to the study. \n\nMaking your way up to the centre you spot The five from the council standing waiting for announcing something. Just as you take your place Jessy makes her way to next to you. \n\n*if RomaJessy > 0\n Nudging you playfully she whispers in your ear, \"Guess what, we got a date tonight\".\n\n Reeling back to look at her in surprise you spot the wide grin on her face.\n\n \"That's what the crowd as gathered to witness, actually.\" She says intertwining her arm in yours, \"Perhaps you should brush up on your proposing skills\". \n\n Still unsure if this is a joke or some kind of play by her, you can't help but blush under her words. Certainly, you didn't declare yourself as an 'item' and neither did you ever go anywhere as a couple, but things were pretty clear for those that mattered : you and her. Over the course of this relationship the most you could manage was the occasional smile when you passed each other in the hall or sat opposite at the table. \n\n Given the time, you would certainly like to make up for that loss. With immense amount of pleasure, one might add. \n\n *goto nightmuseum\n\n*else\n Nudging you playfully she whispers in your ear, \"Guess what, we got a date tonight\".\n\n Reeling back to look at her in surprise you spot the wide grin on her face.\n\n \"That's what the crowd as gathered to witness, actually.\" She says intertwining her arm in yours, \"Perhaps you should brush up on your proposing skills\". \n\n Still unsure if this is a joke or some kind of play by her, you can't help but feel the fear of breaking the news to her. Afraid that somehow your friendship may have been pursued in the wrong sense by her, you don't know how you are going to let her down gently.\n\n The concern is not for the naught at play of the arrangement being for you but for the flirting she just ensued. Hoping that it is nothing but a jest, you try to hide the strain on your face.\n\n *goto nightmuseum \n\n*label nightmuseum \n*page_break\n\"I am screwing with you\" she says as Foyern now takes the centre before beginning, \n\n\"Jessy. ${name}. I would like to first of all congratulate you on the successful completion of your respective tasks. Whatever the wraiths are planning, I am sure we have at least managed to delay its fruition. That....\" He says handing you a photograph of a museum artefact, \"brings me to the next assignment. This is one of the tablets recovered from a pyramid in Mexico. The wraiths interest in it naturally begs for a investigation. And we are sending the best we have.\" He concludes gesturing you both. \n\n\"The wraiths have already managed to use their influence to shift it to one of the big museums up north.\" Mel says looking over a file in her hand, \"Which means they plan to strike it on the move and recover the artefact for whatever menacing purpose they have planned.\"\n\n\"We would normally send you with more time to prepare but the move is scheduled to be day after tomorrow. Meaning the artefact will be in the transfer cell under lock and key the coming night. So your plan is to be executed tonight\" Ellie says in an fact-of-the-matter tone.\n*page_break\n\"The task is to infiltrate at night and avoid any possible confrontations\" Balzorin says, \"And ${name}, do remember our chat from last time\" he says conducing tremors in your body.\n\nThe task seems simple enough in grand scale : wait for the night, GO in Silent, Grab the tablet from the storage, Come out with the tab and be heroes for spoiling the wraith party. \n\n*page_break\n\nThe night comes with unease, given that for the first time you have been involved in the planning and intel phase of a mission. The museum itself is in a different country with a language beyond your comprehension. However, the tourist importance of the museum makes its' pamphlets available in a number of languages. English does good for you. Also the pamphlets come with an inlaid layout of the museum making your job easier. Jessy and you ponder over the blueprints matching it to the map on the booklets indicating the layout of the museum. At night, once the museum closes the artefacts of importance are moved to a secure place in the basement. Thankfully the artefact will breath in the night air tonight, owing its moving plans for the next. Which means you will find the artefact at its place of exhibition. Making your job much easier. \n*page_break\nGiven the popularity of the museum, it also boasts a considerable security measures. From camera to motion detectors to guards with new guard routes each day and armed with a 50K volts Taser, enough to knock you out for the night should it make contact.\n\nThe plan formulated, you find yourself on the rooftops walking towards the airconditioning systems in order to sabotage them. \n\n*if RomaJessy > 0\n \"How cool is this date\" Jessy says walking next to you, almost unfazed by the pressure of the mission, \"Out in the stars, just you and me. And on top of it, on top of a museum!\" she exclaims.\n\n \"Well, anything for you babe\" you say with a tinge of sarcasm indicating the tense situation of do or die looming over you. \n\n \"Oh, come one. Don't be a sour puss\" she says with an overdramatic flair, \"you sound just like Brandon......\" stopping mid,sentence she realises the gravity of the situation.\n *achieve date\n *goto Brandonmem\n\n*else\n \"How cool is this, huh?\" Jessy says revolving with her arms stretched, \" A museum, a cool night, sparkly cover of stars, what else one needs for a vacation?\" her tone more teasing now.\n\n You snicker, \"You got some funny ideas about vacations\".\n\n \"Oh, come one. Don't be a sour puss\" she says with an overdramatic flair, \"you sound just like Brandon......\" stopping mid,sentence she realises the gravity of the situation.\n\n *goto Brandonmem\n\n*label Brandonmem \n\n*if Brandonalive > 0\n The warehouse incident marked Brandon's downfall. Being an outsider like you, he was never much accepted into the league. Orphaned at an early age, he found Ellie to be the guiding force in his life. Though his intentions were noble, your near death experience compelled the council to take harsh measures. \n\n Despite your pleas for leniency and pardon, the Balzorin, Mel and the beach guy voted for him to be muffled and released from the league. To your surprise Ellie casted her vote in favour of the decision, though she didn't remain for the process to be undertaken. Only Foyern stood by Brandon's and your side in the proceeding. Pleading others to grant some consideration to the contributions of the boy for the league. \n\n His location unknown to many, to prevent any contact from league or the wraith to be made with him, you haven't even been able to check on him. Though from what you gather, the discharged members are often taken well care of. Also the in numerous licenses and badges of different departments help them along their way.\n\n *goto pigeons\n\n*else \n The horrific memories of the night at the warehouse pop in your head, each time you hear Brandon's name. Every time you remember the night, you think to yourself, about how you could have stayed behind to save him, how you could have helped him, how your cowardice resulted in his death.\n\n No matter of consoling, no amount of sympathies can cure the dread in your heart for the loss of your friend. Brandon too was an outsider like you. One born outside the traditional generations of the League of Elementals.  Orphaned at an early age, he found Ellie to be the guiding force in his life. And that was the reason he was ready to prefer exile over sitting idly while Ellie suffered.\n\n His passing has been hard on everyone, but Ellie and Jessy were like family to him. Probably the only ones in the league apart from you to relate with him, to form a kinship with him.\n\n *goto pigeons\n\n*label pigeons\n*page_break\nThe subject is still touchy for those close to him like you and Jessy, as you observe her steps slow and her head hung at his mention. Drawing close you place a reassuring hand on her shoulder to draw her into a hug.\n\n\"I just miss him, is all.\" She says the grief clear in her voice, \"I mean he almost got you killed and for that I am still pissed at him. That is one of the reasons why I wanted him to be here, so I could beat the shit out of him, to let all this anger flow out. But instead I feel sad at his very mention now.\"\n*page_break\nConversing about Brandon but more cheer in her voice now at the memories of old, you continue to rig the makeshift block into the outlet of the system. The system clogs with an visible halt of the rotating dissipaters. The sabotage is only confirmed by the reducing heat on the rooftop, indicating the rising temperature inside. \n\nNow, all you have to do is wait for someone to come investigate the vents and allow you to slip in while they do. Almost eight on que, the door to the rooftop clicks open as the sound of card swipe reaches your ears. \n\n\"Damn pigeons!\" the guard says taking the bait of your pillow stuffing jammed in the vents. The door on its way to close under the lock once more, you move quietly and slip inside with Jessy besides you as the guard is still occupied with the vents. \n\n*page_break\n\nNow inside, you spot the guards from the height advantage of the railing that you are perched on. Two guards patrol the main hall while one more roams in the corridor leading to other sectors. All milling about, oblivious to your presence. \n\nJotting up a plan you head downstairs carefully avoiding the guards patrolling about. Your objective lies in the next sector towards the left of the hall. You make your way to the passage to spot the lone guard walking towards the other side of it.\n\nFollowing slowly and quietly you hide into the open exhibit of a bear mauling a man apparently indicating some historic event as you wait for the guard to turn about to travel other side. Once on the other side closer to your goal of the tablet, you take a breather as you spy upon the hall before you.\n*page_break\nWedged in the walls are artefacts much similar to the tablet, some so ornate that you are tempted to take one for you. Resisting the urge, you find the artefact right where you expected it to be. The only problem persists of a glass cover, no doubt bulletproof and rigged to trigger the alarm. Not to mention you are probably in the radius of the camera scanning the perimeter. \n\n\"This spells trouble for us\" you say as you hide behind a column near the artefact. \n\n\"Oh please\" Jessy says in a chiding tone as she blasts an ice cold breeze at the camera freezing its position. Next she lets out a continuous stream of icy winds to freeze the artefact the wall around it and the nearby systems. \n\nWith slight smirk she moves forward to flick her finger at the now frozen setup. At the touch the entire arrangement cracks to reveal a clear path to the artefact, which thankfully was not frozen. \n*page_break\nAs she bags it and you continue to look at her with new found admiration another figure steps in the view. A guard who flashes his torch at you. Panicked, you let a blast directly at him catching him chest first as he falls on his back. \n\nJessy looks at you with disappointment for your harsh action only you find it replaced with one of fear, as the guard stands once again, his neck broken in a right angled position. He simply shakes it back into the position as he cracks it once to open his eyes to look at you with anger and grim clear in his posture. \n\n\n\nYou exchange a look with Jessy before you both head in opposite directions. The tab though with Jessy, you also carry a bag which was carrying the equipment necessary for the heist. \n*page_break\nHe looks once at you and then at Jessy as if contemplating whom to chase. But instead he decides to further roleplay into his character as he barks order to indicate your position to the guards while he rushes after Jessy. \n\nSeparated and already losing her sight you can't help but continue down your path to distract the guards long enough for Jessy to find a way to the rooftops and use the teleportation stone. As you rush into the hall you spot three guards with the tasers pointed at you ready to fire. Without thinking you,\n\n*choice\n # Decide to rely on your physical prowess\n  You continue your momentum to ram into the closest guard to ram him into the other two. As the guards tumble like a broken card castle you rush across the hall towards the adjoining sections. The guards quickly up are hot on your tail. With one more guard unaccounted for you warily enter the sector. Hiding behind the counter in the section you peer over the desk to spot the three guards rush in.\n\n  You wait for the them to split before leaving your cover. The first one flashing his torch on the taxidermy exhibit looks in the nooks and crannies for you, giving you the free strike to score home. Slowly making your way behind him, you slide your arm around his neck to choke him until his consciousness fade. The struggle he makes topples one of the railings netted around the exhibit, alerting the other guards of your position.\n  *page_break\n  Before you could move out the one of them has already standing in front of you. Without giving it much thought you grab the torch of the downed guard and rush the other, ducking under his blow to jab him right in the temple. Another set of footsteps follow as you hide behind a stuffed bear. As the figure draws near you prepare for the surprise hit. \n\n  Closer. Closer. A bit more. And bam you jump out to find the guard frozen misstep, his expression of a gasp half made. You look behind him to spot a gleaming Jessy waving you over. \n  *goto trap \n\n # Wing a plan \n  The three of them have already blocked your only way out. But since Jessy is running the other way with the wraith behind her, you still have the option of going back the way you came. Thought processes quickly in your mind as you start running back maintaining just enough distance to avoid being Tasered. As you re,enter the hall of your heist you run towards the icy monument Jessy left behind. Hiding behind the column you wait for the guards to rush in. \n\n  Losing sight of you the guards decide to spilt up and search for you in this vast hall. The first guard to come near you is more enticed in the icy spectacle before him than your movements behind him. With a forceful jab you strike him in the head just enough to knock him out. \n  *page_break\n  With the first one gone you look for the next in line. Exposing the unconscious body of the guard in the open you lay out a trap for your second prey. Unfortunately, both the guards spot the body and start moving to investigate it. Dodging a single pair of eyes and ears is easy enough. But four eyes and ears alerted by the knocked out colleague of theirs makes the job much difficult.\n\n  Once again you decide to just rely on your quick thinking as you step out to push the closest one on the icy floor before you and rush to tackle the other one. The first one tumbles over the body of his colleague and slams face first on the floor. The one you rammed into however has stopped your charge with his oversized stomach and elbows a fierce blow into your back. You recover hastily to counter any attack he might make, to find him frozen in his place his elbow still retreating from the blow. \n\n  The sight of Jessy waving over you clarifies the strange turn of events.\n  *goto trap\n\n # Bluff your way through\n  \"The thief is that way\" you say at which the guards almost take off towards the passage but realizing your presence at this hour inside the museum they stop in their steps to turn back at you.\n\n  Though a low level gamble, it has paid off as when the guards rushed past you, they were kind enough to brush close by for you to nab two of their tasers, which you already are aiming at them. Before they could respond you down the one reaching for his taser and threaten the other two in their places. \n  *page_break\n  The bluff however, doesn't hold long as you have only one taser loaded while two targets are about to charge at you. As they rush, you sidestep and taser one of them while the other one goes simply past you. Knowing taking down the plump guard who remains standing reaching for his baton is simply not your cup of tea, you decide to make a run for it. The though however has barely even processed in your mind as the guard before you freezes in his place with a gleaming Jessy standing in the background. \n  *goto trap\n\n*label trap\n*page_break\nYou grab a taser from the frozen guard, in case the last guard or the wraith decides to further throttle your plans. Making your way back up to the roof, you are stuck in your place as the wraith appears to be waiting for you up there. You reel back to prepare for the confrontation but nothing happens. Your elements, it seems have failed you somehow.\n\n\"He can manipulate reality\" Jessy whispers in your ears, \".... In the sense of our perception of it. What you see may not be real, what you experience may not be real\". \n*page_break\nYou turn around to find Jessy still climbing the stairs behind you. You look around you to find the wraith standing absolutely still perfect. Then once again you look at Jessy who is now walking towards you almost ignoring the wraith present. Trying to wrap your mind around the fact that she whispered into your ear and then somehow managed to spring back to the stairs that low, is befuddling you. \n\nThe warning looks genuine for you spot in the distance some weird things, A giant version of your childhood imaginary friend, your family running away from him, equally gigantic in size, and a bizarre array of people clapping at the display. Clearly the wraith is influencing your mind, but to what extent you know not.\n*page_break\nYou turn towards Jessy for advice and find her still gleaming but this time more of a predatory smile of making the kill. As she further closes the distance between you with that weird expression, you almost involuntarily squeeze your hand to see the coils of the taser unwind and slam into her. Her expression, her face, her body, her age, her background everything seems to be whirling in flickering periodic changes for a few seconds. \n\nWith a sharp pain in your head, you reel back to find yourself back into the museum, with the guard who flashed his torch at you lying on the floor with a giant hole in his torso. His body twitches a bit before finally going limp. To your side you find Jessy in no better condition. \n\n\"Thank God\" she says still gasping to regain her breath, \"You heard my warning. It was a powerful one. It froze us here and started playing tricks on our mind. Didn't work on him thanks to my Phasal powers. But it certainly did a number on you\" she says.\n*page_break\nON your way back you gather what happened exactly at the museum. The reality seized to exist at the moment the wraith in guard uniform spotted you. He started influencing your mind to freeze you in place and spin an imaginary story in your head. Buying enough time to grab the tab and end your lives. \n\nThanks to the creepy Jessy he created in the alternate reality, you managed to blast a dark energy sphere right into him, killing him in the process. This time instead of an implosion just a hole was created in his body. Yet another thing you need to figure out about these powers. \n*check_achievements \n*if(choice_achieved_once)\n *achieve thrice \n\n\n*page_break\n\nUnfortunately, when you slammed the energy in his body, the tablet he was holding was also cracked. You picked up the pieces and brought them back for analysis to Foyern. \n\nThe coming days finds Foyern pouring over the books on hieroglyphics trying to decipher the broken tablet. Though you managed to bring all the pieces back the few lost the symbols scribbled on it. You do manage to get a digital photograph of the tablet from the museum website but the photo was taken of the entire set of tablets making it difficult to cut out clearly the symbols. \n*page_break\nThe council meeting sees you and Jessy along with the five others as you wait upon Foyern to bring forth his findings. \n\n\"The tablet\" he says holding the thin sheet upon which he scribbled his translation, \"is more or less consistent with the prophecy. It appears to be just a hieroglyphic version of it. The only thing of import that I found was the mention of a certain someone. Not clear due to the partial translation at hand. But the prophecy extends here, saying that a prodigy brought forth shall haste the war impeding. That the very person appearing to be our salvation will be bringing about our end.\"\n\n\"A prodigy?\" Balzorin says with certain animosity in his voice, \"There is only one in my eyes\".\n\nThe look in his eyes is clear to mark you as the victim of this new revelation. \n*page_break\n\"It is all too vague. And once again, I mention, it is only partially translated. Maybe the middle parts are missing and hence the improper translation\" Foyern says. \n\n\"Then let's rely on the more prominent and clear source of information. The books that Foyern sleeps with.\" The beach guy says, \"Don't they specify the coming war to be marked by an outsider. How the presence of the outsider shall bring forth the third and final war? The only outsider worth consideration and that much power is right before us\".\n\n\"That is absurd. You all can't possibly think to blame ${genderhim} for the actions of the wraiths?! In case you have failed to notice but ${genderhe} is the reason you have this intel in the first place. And you still doubt ${genderhim} to be the agent of the enemy\" you find Jessy furious over the allegations made on you.\n\n\"You must understand Jessy\" Ellie says in a consolidating tone, \"${genderhe} may not do it willingly but may be a mistake or just being at the wrong place at the wrong time may lead to our downfall\".\n\n\"you know what was a mistake?\" Jessy says with venom of the kind you never expected from her, \"Brandon coming to rescue you. You were not worth the sacrifice he had to make\" she says before storming out of the study leaving silence in her wake.\n\nYou try to stop her in vain and then look at the shocked grief on Ellie's face, the look of guilt of remorse. \n\nFoyern places an understanding hand on her shoulder before saying, \"Perhaps we all need time to process this. In time we shall make a decision on the matter. Till then no word of the tablet, the prophecy leaves this room.\"\n\n*page_break\n[b]Chapter : Remener[/b]\n\nA few days after the meeting with council, Foyern comes to visit you at campus. Dressed as an English aristocrat, he looks like an wealthy old guy who maps tissues wherever he sits which suits his needs sine he is visiting as an hiring manager for some company interested in hiring you. This give you the privacy and the liberty to discuss true matters with him.\n\n\"So what more did the tablet reveal?\" you ask knowing that Foyern deftly cut the meeting short using Jessy's outburst.\n\n\"It is actually much specific and much detailed version of the prophecy. It states that the three trials for the three seals, each one granting more insight in to the vault shall bestow upon you the choice when the time comes. Now I don't know the choice they are talking about in this one but I guess it shall be revealed in time.\" He says sipping on his coffee you ordered in the diner outside the college. \n*page_break\n\"The interesting part is the pair of co-ordinates mapped on it. Hidden very intricately, only visible when you decipher it fully. And it is no fluke either for it points to a very specific place, one of significant importance to the League's very foundation. Somewhere in history its location was lost to us. Now we have it back.\" His gleaming with anticipation, \"We are very close to unveiling the vault. Once we get vault open we shall be able to end this war forever. Possibly destroy the very existence of wraiths itself. And I think the wraiths knew it. That is why they were collecting this data and experimenting with it in the first place. We have them now\" he says before settling down and regaining his composure,\n\n\"But we can't act just yet. Balzorin is trying to turn the tables against us. He has already convinced Mel to be on his side, which makes three votes against the two votes : one mine and one of Ellie. I can call him out on the veto as the handler of the league but that shall only buy us enough time to delay the inevitable by a month or so. After that I think even Ellie will side him. Making him helpless to protect you.\"\n*page_break\nYou face turns sour at the very mention of this as your mind reel to contemplate the meaning of this. If the council manages to muffle your powers, you will once again be normal, one with the dream of attending the best college in the country. But the looming threat of the wraiths and the impeding war shall never let you rest knowing you could have stopped this from happening in the first place.\n\nFoyern smiles assuring at you before saying, \"But we won't wait that long. I will find a way to give Balzorin a slip and take us to the vault. Once you unveil the vault to the league there can be no question as to consider you as one of us. Putting the question of the 'INTERVENTION' to rest.\"\n\n*page_break\n\nWeeks pass in the wake of the events at the Museum and the more dreaded submission of Dr. Chandy, as you finally prepare for the preparatory leave before the semester end examinations. The timing of Foyern could not have been worse as he drags himself in through your door with obvious haste.\n\n\"Hey, there is an old man at the door\" yells Leela, \"Did somebody forget to mention their parents were coming over for a visit?\"\n\nYou peer out to find Foyern rushing towards you with sweat dripping from his forehead.\n\n\"I know this is sudden and unexpected but we need to move now. Balzorin has convinced others to muffle you.\" The words come with an obvious dread for you, as you had expected them to move past the incident. Apparently not.\n*page_break\n\"Muffle you?! Like Kill you?!\" Leela shouts at the words of Foyern who simply waves his hands over her to freeze her like a statue.\n\n\"She won't remember a thing\" Foyern says, \"But we must move quickly if we are to open the seals\"\n\n\"But what about the third Phasal power?\" you ask. \n\n\"That is why I need to be with you.\"\n\nThe Sudden news make you, \n*fake_choice\n # Doubt Foyern\n  Sure Balzorin has it out for you, but the rush with which Foyern has moved his plans with, makes you doubt him a bit. Perhaps Balzorin was double gaming, but then would opening this said vault change his attitude towards your recruitment? \n # Anxious to visit the vault \n  The plans set in motion a long time ago are finally seeing fruition, and that is all thanks to you and Foyern. Balzorin may plot all he wants but after this one last mission you doubt they will muffle you or treat you like an outsider any more. \n\n\nYou take a cab to the airport where you board the plane for Tunisia. A sudden unprepared journey like this takes you by surprise as you probe further to learn your destination is the old dreaded site of The battle of Carthage of 149 BC. \n\n\"The site marks the first known effort of the humans to combat the wraiths. The wraiths managed to pull through during that time and decided to use the battle as a means of taking out the two strongest and most advanced factions present. Even with their powers and technological superiority the wraiths found no answer to the endless waves of opponents.\" Foyern fills you in on the flight to Tunisia.\n\n\"But eventually they did manage to sneak in one of the big guns, capable of taking out entire armies if need be. If not for the Singularitie's sacrifice, we would have been subjugated by them by now. The vault that the prophecy speaks of is located near there. The site which marks her last stand against the dreadnaught of the wraiths. Despite her sacrifice the battle continued for its original purpose sealing the warring nature of man to be his own doom. But enough about philosophies. Our goal is the ruins of Carthage for hidden within those is the vault of Singularity. \n*page_break\nThe cab gets you close to the spot marked on the relic of a map in the hand of Foyern, which turns out to be in the middle of a desert. Nothing marking any kind of vault in visible light.\n\n\"You won't find anything here\" the cabbie says in a thick accent, \"All searched and taken to the museum.\" \n\nIgnoring the comment Foyern starts walking on his own into the no,man's land with the historic tourist ruins of Carthage at your back. After a long gruelling walk and almost out of water you catch the first glimpse of ruins forming in the distance. Foyern almost runs like a little kid completely omitting the age as a factor. As you draw near you spot a single circular stone mark etched into the broken remains of a wall. \n*page_break\n\"Do your thing\" Foyern say with excitement seeping through his voice.\n\n\"What thing?\" you ask utterly confused by the demand.\n\n\"Create the dark spheres. Just focus and will it.\" He says stepping back to give you a clear view of the seal.\n\nYou close your eyes and clench your fists as you focus on them to create small spheres of dark energy. Remembering every detail of the spheres that you can muster from your memory. The effort pays off as small but sufficient ball of dark energy with a purple core forms itself in palm of your hand. \n\nYou press the ball against the seal to feel the drain as a continuous stream if dark energy flows from you into the seal. With a loud rumble and quake the sand beyond the broken wall begins to give way to a structure that was hidden layers beneath the dunes. Once the process is complete the seal stops draining you leaving you dizzy from the effort. \n\n*page_break\n\nAs you travel to the new site before you, the twenty feet wide open ditch is only less impressive than the mound formed below from the sand that slid in. The fall is far and the only way down is broken as the stairs lie in shambles from years of wear. \n\n\"Let's jump on the mounds\" Foyern says peering inside the hollow.\n\n\"Wont that bury us?\" you say unsure of the plan.\n\n\"I thought you were an elemental\" says Foyern as he jumps to dissipate into thin air.\n\n\"Here goes Nothing\" you say attempting a fall you have never tried before.\n\n*if Brilliance > 80\n You try to balance yourself using the sparks emanating from your palms but the place contains only rock and sand as you continue to fall hard. But just as much a though arises as you let out controlled blasts to form a glass slide from the sand mound as you slide downs still at a great speed, one might add. You change the directions to slow your approach as the final drops seems like stepping off a step of your dorm. \n *goto cave\n\n*elseif Eloquence > 80\n Gracefully, you jump as a swimmer in an Olympic event as you continue at high speed below. You fire streams of water to create a pool of water enclosed by the san from the mound at the centre which gently and quite spectacularly breaks your fall. \n *goto cave\n\n*elseif Dominance > 80\n You sprout two vines and tie them to the broken wall tightly as you cling to them lowering yourself. However mid,way through the descend the vines snap plummeting you down with huge force. Almost unconsciously you start shifting the sands to create a high platform to break your fall. And then it clicks to you that sand being earth element can be manipulated by you. The rest of the way is easy as you gently lower the platform to the base. \n *goto cave\n\n*else\n Enclosing yourself in a white bright shield with a rotating blade of white light above and a long tail with small rotating blade at the end you go into the void of the pit before you. Though the structure you created resembles a helicopter it does not operate as one. As the plummeting fall continues and you appear as an idiot. \n\n Rearranging everything you create a strong shield at the bottom to face the impact and tie yourself to the other side with white energy belts. The shield thankfully holds and you are out with a slight urge to puke and nothing else.\n *goto cave\n\n*label cave\n*page_break\n\nThe inside of the cavern is everything that you expect it to be, from the movies of course. Tons of dark spaces and even more critters moving in them. The light sphere of light created by Foyern barely keeps the path before you visible. The space is so immense that the only visible wall is the one you are standing next to. The wall bears the murals painted in some bygone era, definitely older than the Phoenician age. Hand painted most of them, the one before you shows a picture depicting the traditional man in the sky, his miracles and his curses. \n\nTravelling further inside the cavern turns treacherous as the critter grow in size to the point that you spot a scorpion the size of your fist only to be engulfed by even larger snake as the predator draws it's prey into the shadows. \n\n*page_break\n\"Look for anything that stands out.\" Foyern says his eyes now scanning the floor as you move further ahead, \"Any place as important as this will certainly have its share of protection measures.\"\n\n\"Like this one\" he says stepping around a tile with markings of strange origin carved in it, \"The place will be full of these\".\n\nThe trepidations increase further for you as the prominent source of light from the opening up high goes on receding reducing the field of vision barely to a foot from you. The journey leads you to a narrow passage at the end of the great hall. The mural above it indicating wide spread arms of a man wearing robes similar to the titan gods in Greek mythology. The mural too is more modern and the constructions appearing now also depict a later age. Indicating the visit to the place in a later period. The passage however comes with a slight blessing with the placements of torches on the walls that run along it. With a lighter, Foyern lights the dried oil of the torches as you progress further inside. \n\n*page_break\n\nThe twisting an occasionally caved in sections of the passage lead you to an ornate antechamber with light peering from the top to reveal the grand setting before you. A room big enough to house a column of a dozen elephants with ease. The entire space is lit not by torches or openings but by spheres of light that roan about as if having a mind of their own. Despite the large appearance there is not a single thing of import here save for rough the agony of the burned hand, \"You have to do it, for all of us\".\n\nYou turn your gaze back on the seal with more determination this time. The seal is being shined upon by the burning light from the orb. Perhaps if you try to destroy the orb you may be able to grab the seal without effort. Another option is of using surrounding to somehow deviate the light away to avoid harming whatever delicate balance this orbs have. \n\n*choice\n # Attack the orb\n  You decide to attack the orb, first with a light jab and then with full force if it fails. As you fling a lighter shot at the orb another orb near it fires a ray back at it. Cancelling each other out in a puff of smoke. \n\n  So the main one is protected by the others. That complicates matters. You decide to go for an area wide attack as you curl up feeling the increasing energy tremble on your body. This time the energy is cancelled by a coordinated effort of all the orbs who look none the weaker, while you drop to one knee catching your breath after that effort.\n  *page_break\n  It seems it is time to roll in the big guns. You concentrate once more focusing to bring forth the black energy to surge through you.  The energy encompasses you as you feel the vibrating feeling growing. With a scream you let the hold over it slip to watch it fill the entire chamber with dark purple energy crashing into the orbs, destroying them in the process. The main one still remains flicker for a second before shinning more brightly than ever. \n\n  Soon after you watch through covered eyes as more orbs come forth from the main orb to replace the losses and soon the chamber is back to normal. It seems brute force is not the answer in this case.\n\n  *goto timeslow\n # Try to turn the rays away \n  You look around for something to use to deviate the rays away, even if for just a few seconds, enough time for you to grab the seal. The chamber though gigantic in size offers little in term of objects to fling between the path of the ray. \n\n  Finally securing the piece of broken marble lying not far from the throne you fling it at the ray only to watch it disappear into thin air. One after the other the ray just burns away anything you throw in its way. \n\n  After a while you find the effort fruitless and look for other avenues to rotate the seal. \n  *goto timeslow\n\n*label timeslow\n*page_break\nAfter a gruelling effort just as you are about to give up on the seal you spot an anomaly in the light.  On careful observation, you spot a slight flicker in the light. It lasts for a fraction of second, a time with in which it is impossible to rotate it out of its socket. You look at the light carefully pouring your focus into it.\n\nThe more time you spend staring at the light the slower it gets. The flicker now lasting for almost a second still not enough you think. Some more focus results in the light to give a solid opening of a few seconds. You inch closer to the seal all the while maintaining your focus. You feel the time slow down further as you look at the light recced slowly into the seal as a gap is created. You reach in just as the last rays diminish, grab the seal and feel the slight heat that remains. You rotate the seal once, then twice all the while observing the ray coming in to incident once again on the seal. Pushing your luck and hoping it requires only three turns you make the final rotation to find the seal pop out of the socket. You immediately pull your hand back as the new rays are now incident on the surface below the seal. \n*page_break\nTime resumes its pace as the surface beneath the seal begin to burn away giving way to tremors that shake the entire cavern. For a moment you feel like the whole arrangement is going to collapse on itself but instead you observe it rising up. The whole chamber is pushing upwards ushering the sand dunes above it aside as it takes its place once more. \n\nAll the while grabbing Foyern with one hand and the handle of a chair with the other you hold against the tremors as the floor begins to cave in at spots, creating death traps in their fall. Once the structure settles with the tremors diminished, you rise and help Foyern up along with you.\n\nYou observe the throne to find a strange object hidden beneath the burned hole created under the seal socket. You reach for it to find a scroll of sorts.\n\n\"The final testament. The final test to prove our worth to the gods\" Foyern says grabbing the scroll with his one good hand. \n\nHe unfolds it with an excitement of a mad scientist. Looking over it once fully opened he lets out a grasp of rejection as he turns towards you with grief in his eyes. He throws the scroll down as he brushes past you towards the throne.\n\n*page_break\n\n\"What happened?\" you ask, \"What was in the scroll?\" you tap his shoulder only for him to shake it off as he continues to walk towards the throne.\n\nYou reach for the scroll now rolling way from you. You barely grab it before it falls into the ditch below. You are about to unfurl it just as you hear a rushing sound in front of you. Before you could react you feel a sharp kick to your face as you bounce on your back. You try to get up only to see a dark orb aimed at your face by Balzorin. Behind him you spot Ellie, Mel and The beach boy all rushing towards Foyern now. \n\n\"Don't do this Foyern!\" Ellie shouts on her way to grab him\n\n\"It is already done\" he says grief clear in his voice, \"The sacrifice is made. The gods will come for us. But I shall not be fortunate enough to see their arrival\".\n\n\"Stop him\" Balzorin yells, \"The ritual cannot be completed\".\n\n*page_break\nThe beach boy jumps in the air to fling a white orb of energy strong enough that you feel its presence even from this far. The orb flies towards Foyern who simply flings it away with ease. Mel tries a similar strategy and gets a similar result. \n\n\"Stay down\" Balzorin says as he steps back perform an exotic movement to create an orb of gigantic proportions which he throws at Foyern. \n\nFoyern slumps into the throne as the orb heads for him. But before the orb could reach him a ray of light pierces it as you observe the White orb from the chamber gleam once again to focus the ray at the throne. As the dark orb disappears the ray of light continues on to pierce Foyern's chest burning a hole in him. \n\n*page_break\n\nScreams fill the chamber as you watch your mentor your friend die with an excruciating pain as the entire body burns to a crisp to fill the air with the smell of burned flesh. Your eyes well up as you try to rush to his aid even in this late hour. Balzorin grabs you and holds you in place, resting your head on his shoulders whispering, \"He's gone. He is gone.\" More to himself than to you. \n*page_break\nYou watch over his shoulder to find Ellie grab his body as the ray of light recedes. Unable to control her grief she sobs over his body, holding it tight to her bosom. Mel and The beach guy exchange looks at each other before the guy breaks the silence saying, \"Not what do we do?\"\n\n\"Now, we wait\" Balzorin says settling you down.\n\n\"Wait for them to come?\" Mel asks anger seeping through her voice, \"You mean we there is nothing we can do to stop them?!\"  \n\n\"I am afraid not\" Balzorin says, now up on his feet as he looks over the silenced chamber.\n\n\"So all is lost?\" Ellie asks in a hushed tone\n*achieve god\n*page_break\nBack at the League\n\nThe conviction with which Foyern sacrificed himself, surely there must be some truth to his words?\" you say before the council, waiting in the study for Ellie to return.\n\nFoyern death has been tough on you, given how close you got over the course of the whole debacle of the 'gods' but it has been tougher on Ellie. Foyern was everything for her, her mentor, her friend, her rock in this world of uncertainty and his loss has shock her very foundation. \n\n\"His conviction did not account for the years of stocking vengeance that the Gods r of time before they began battling among themselves for the favour of the elementals. The elementals being creation intended to war, were most pleased by this. The godhood become their undoing. They began ruling the humans now. Completely subjugated, they started making demands, the like of which their followers would not offer willingly, most importantly brides and grooms for their pleasure. The most beautiful of the humans were taken by force as their spouses and the consequent children possessed the features of both the parents. Part elemental, part human, these marked the first ones of the League.\"\n*page_break\n\"With time their rules become more ruthless, more callous. They treated humans as playthings. Pitching them against one another, forcing them to perform feats impossible.\" Balzorin says adjusting his coat, \"To the point where their children rose against them. Sympathetic to the only parent who cared for them, they started fighting against the elementals. First as individuals then together; Thus forming the League of Elementals.\" He sighs before continuing, \"But fighting against an ageless, peerless enemy is not easy. The losses where many and success very little. When all seemed lost, the age old saying of enemy of my enemy, is my friend came to the rescue. The wraiths encouraged by the infighting among the defending champions launched the second war for earth. With the league on one side and the wraiths on the other, The Remener where caught in a vice. They managed to defeat the wraiths but the fight put them in a vulnerable position. Fearing their survival, they decided to undergo in a stasis of a kind. They planned to wake after a decade or so. But the league used their own backup against them. Aware of the surrounding still, the gods attempted to stop the league from prolonging their stasis but failed as they were imprisoned in their own creation. The league destroyed all proof of their existence and separated themselves from the humans. This _break\n[b]The decision[/b]\n\n\"So the decision is made\" Ellie says to get a sneering comment from the beach guy,\n\n\"By the kid\" he says.\n\nA glare from Ellie puts him back in his place as she continues, \"Right now we have to contact all others. Balzorin prepare a strike force, Mel get your students ready, and Mertoniumgiuds ready the scouts\" shifting her gaze to you before continuing, \" since all others will be busy, you are to be my second here.\"\n\n\"Might as well make him the handler\" says Mertoniumgiuds.\n\n\"This is the LAST TIME I shall hear you complain about ${genderhim}\" Ellie screams at him, \"The next time I will......\" before she could complete however Nesora barges in the room,\n\n*page_break\n\n\"You all should really see this\" she says flipping her smart phone  to reveal a live footage from the news channel showing a wraith, most likely, standing in front of the smouldering remains of the Buckingham Palace. Before you could register that the image changes to show an on fire White house., soon to be replaced by the wreckage of almost the entire city of Cusco, Peru as a few dozen wraiths roam the skies. Angkor Wat, Chichen Itza, Paris and Jerusalem were also attacked by similar beings, the news reads. What causes you to gasp in shock is the mention of your own country in the attacks. Seemingly peaceful and distant country of your somehow as managed to attract the attention of the wraiths. Videos pour in about attacks on different places with most concentrated in the state of your university. You feel a knot in your stomach as the news of the lost cities reaches you. Lacking any serious military power, the government was only able to hold the ruling state and the cantonment areas against the attack. \n\nThe oddity of the choice of these cities is lost to you. Why would the wraiths risk exposing themselves by attacking seemingly random targets.\n\n\"Oh no\" Mel whispers as she looks at the carnage before her.\n\n\"What purpose do they seek by attacking these cities?\" the beach boy asks swiping through the images on his own phone.\n\n\"No time to ponder on that\" Ellie says turning towards Balzorin for the next bit, \"Form up the divisions : [b]WE ARE AT WAR[/b]\".\n\n*finish\n\n\n", "war": "*page_break\n[b]Chapter: THE WAR[/b]\n\nBalzorin prepares the plans for countering the wraith attacks city by city. Leaving those unfortunate to be attacked initially under enemy control, he focuses on the adjoining targets to hold the advance of the wraiths. Much like him his students are more focused and stern than others. The no-bullshit attitude of their gives them a commanding aura. \n\nMel has brought forth her squad of soldiers, who much like her are fragile in build and long in stature. Their apparent application in field is to provide artillery like function. Each of her students is capable of producing forth a barrage of powerful blasts which can level entire buildings in a single volley. They however, shy away from physical confrontation. Fragile as they are, the wraiths may tear them apart with ease. \n\nThe beach guy is the one with the safe task. He and his team are assigned with protection details of the other safe houses like the headquarters. The presence of these safe houses was hidden from you, owing the lack of trust in you before. Not that they trust you more now. But to honour their old friend, Foyern, they look past the fact that you are an outsider. \n\nEvery single one of these new squads were unknown to you. Upon further probing, Ellie realises your lack of knowledge of the working of the League outside the headquarters. \n\n*page_break\n\n\"Each council member is assigned a role that they need to fulfil. Each one thus, traditionally is appointed from their ranks to replace the old one based upon the choice of the council member which in case of, Mertoniumgiuds also happens to be his father, hence the presence of stupid on the council. Anyways,\" Ellie says changing her tone to more sombre one, \"Balzorin trained the soldiers, the front liners, the Army of the League. He handled the military division. Mel on the other hand reformed the old ways of Lady Marge, as she turned the healer's squad into something more powerful. This might be the first time we have an artillery squad at our disposal, of course they still hone their healing powers for the need of them. Mertoniumgiuds on the other hand was handed the council seat by his father who was incharge of the defence of the facilities. Quite a good run he had, only to be ruined by assigning the chair to his one-time wonder son.\"\n\n\"You two don't get along quite that well huh?\" you ask probing the topic.\n\n\"Nobody gets along well with him. The one job he did has managed to put a thought of being the blight of wraiths in his head. And that shall be the end of him\" she says with obvious disappointment in her voice.\n\n*page_break\n\nYour job as the new council member has been to monitor the affair in the headquarters while Ellie coordinates the other divisions. The task however, has been hard on you, as most don't accept you to be a part of them being an outsider much less being one of their leaders. Jessy has done her bit to ease you into the job with attempts to sway the opinion of the crowd around. The popularity of the beach guy isn't helping either as his followers tend to bicker with you at any given opportunity. \n\nA month into your job and you find the frustration to be unbearable. The responsibility and the resentment against you has started to affect you. You barely have even managed to take in the fact that you are not only a council member but a council member in a time of war against the Wraiths. Thankfully Ellie posted someone to watch over your family and friends. You didn't even have time to visit them yet. The whole experience must have put them on edge. \n\nThe world now on the brink of collapse and despite the start of retaliation against the Wraiths, the makeshift governments find it hard to control the riots breaking out everywhere. Things back at home are also not going well. Though a small country with negligible power interms of military your country was hit by more than a few hundred wraiths. The purpose of this large scale attack has drawn attention of the League but the current priority remains to help the governments fight back against the Wraiths and protecting the people around the globe. \n\n*page_break\n\nFor the first week the wraith armies marched without resistance but then when the governing bodies rallied back with a response from their armies and started holding the advance. The fact that only a few countries where attacked meant for a larger force globally available to counter them. But the bickering and mutual hatred ensured fruition of whatever plans the Wraiths had made. \n\nOver the course of the month efforts were made by those attacked to rally global support but most just bowed out citing this an internal matter or simply condemned the actions of this terrorist organization. Those who bolstered strong armies countered the wraiths blow for blow but the others could barely manage to contain them. \n\n*page_break\n\n\"It doesn't look like they plan to expand\"  Balzorin says reporting the conditions in London, \"They are content in holding the city. Rescue operations have been successful somewhat but the rising activity is certainly of concern, especially the introduction of the airships in the battle.\"\n\nWhen the English government reformed and started operations to take the city back the forward forces managed to scurry back some of the region but soon the Wraiths responded with more powerful counterparts from their ranks and the newly engaged airships, which took away the air superiority of the army. \n\nThese airships where much like the blimps from the world war II with slight modification of an fortress like structure hooked at its bottom and huge propellers  probing from its back. The entire thing was cased in material which was unaffected by the AA guns or the anti,air missiles, Giving them complete domination of the air. It also didn't help that the fortress at the bottom hosted more than four dozen guns barrelling down heavy fire at the infantry. The weaponry too was more advanced than yours as they used raw energy compared to the primeval bullets employed by the army. \n\nIn short, the English were outgunned, out manned and out matched inn every single department. Through sheer resilience they had managed to hold their advance. But with each day the matchup became more and more lopsided.\n\n*page_break\n\n\"Well, we do have some good news\" Regina, leader of the scouting teams steps forth, \"They appear to be huddling near Buckingham Palace, protecting it with all their might. Similar situation has already been confirmed at other sites as well. They seem to be interested in something within these places.\"\n\n\"Whatever it is, we need to find it and thwart their plans for it\", Mel says.\n\n\"I have already been working on that\" Balzorin says, \"I managed to get a squad in while the Wraiths were engaged against the army, however, we lost contact with them a few days ago. The information they relayed was troubling.\"\n\n\"I take it teleportation problem is still not solved?\" Ellie says glancing at Mel,\n\n\"Unfortunately the corruption of crystals is still unknown to us. Perhaps the Remener are responsible of this or perhaps the wraiths. We managed to quell it to a certain degree but apart from the teleporting between the safe houses we cannot actually manage to go anywhere else\" the apologetic manner clear in voice of Mel.\n\n\"Very well, what do you need Balzorin?\" Ellie says shifting through the papers at her desk.\n\n\"A scout\" Looking at Regina at this Balzorin makes his point.\n\n*page_break\n\n\"I already told you. Scouts are meant to observe from afar not indulge behind enemy lines. That is your job\" Ringer says. \n\n\"Then send the whole squad in\" Ellie says pointedly to Ringer.\n\n\"No.\" Balzorin interjects, \"That won't work. When I smuggled my team in the situation was much different than it is now. The wraiths have formed a perimeter around the city barring all entries. The only hope is this suicidal SAS team which has been Going back and forth recusing survivors from within. They can get someone in but only one.\" He says.\n\n\"Ringer isn't there someone from your team who can pull this off?\" Ellie asks in a dejected tone.\n\n\"I am not sending anyone against their will. So unless you find any volunteer you are out of luck.\" Regina says. \n\n\"I'll go\" you say barely registering the words leaving your mouth.\n\n*page_break\n\nThe whole room now fixed on you for the suggestion. You yet don't know why you jumped so quickly at the opportunity but you guess the lack of respect and acceptance of everyone here and the feeling of helplessness to help your friends made the decision for you.\n\n\"Not a chance\" Ellie says.\n\n\"If ${genderhe} wants to, let ${genderhim}\"  Balzorin says. \n\n\"Look at ${genderhim}, you think ${genderhe} has any experience of fighting a war?\" Almost screaming at Balzorin Ellie emphasis the point with a stern look to which Balzorin simply responds with a calm question, \"And you do?\"\n\n*page_break\n\nEllie was caught in a vice at your determinant stand to undertake the suicidal task and Balzorin's desperation to contact his squad. When she is assured that she can't change your mind she simply sighs, \"Fine. Do it\"\n\n\"Send him to the camp at Guildford. I shall arrange for the transport to London.\" Balzorin says.\n\nWith that he teleports ahead of you to Guildford. Turning on your heels you head to suit up for the task ahead.\n\nA touch on your shoulder of Ellie stops you in your steps, \"Remember. This is a lot different than what you experienced before. Now not only the use of your elements matters but also the where and when and especially how you use them also matters. There are enough wraiths there to hold back a few dozens of our people. Do not do something to attract them all to you in some suicidal zeal.\" Her words feel more like the chiding tone of a mother than that of an commanding officer.\n\nWith a nod you exit the room with your thoughts occupied with the coming mission.\n\n*page_break\n\n[b]Quartermaster[/b]\n\nThe past week was mostly spent on arranging supplies and providing them as and when needed. Since Balzorin, Mel and the beach guy had their own safe houses to resupply from, your main task was to arm the elementals heading out on Headquarter orders, like you today. \n\nEach one was given the liberty to choose the loadout of his or her choice, though there were limitations as gauged by a newly assigned quartermaster, Jessy, with a list she formed as per the contribution of each one on the war. Since you helped arrange her the place in the first place, you are not at the bottom but neither are you to access the good stuff.\n\nThe war will not only see you fighting the wraiths but also the army they raised of mercenaries, thugs from the underbelly of every city. As such your firearms training can finally kick in as going solo means avoiding the risk of identifying yourself as an Elemental behind the Enemy lines. Every rash action can generate harsh results. \n\nFortunately, this early in the war, the wraiths are busy fighting of the main army of England which has managed to suss and harass the wraiths in their advance. That means less wraiths present within the city itself. But even so, at least a dozen will be left behind to garrison the city. \n\n*page_break\n\nAs you enter the makeshift storage space, you spot Jessy furiously going over the lists mounted on the wall behind her counter. She yells for her assistant to gather some items and then yells at someone else to bring some other. The job has been frustrating for her too as the assignments come in hourly and her job to equip and de,equip them also comes hourly. \n\nYou make your way to the table as Jessy looks you over once before ignoring you to handle the task at hand.\n\n\"Hey\" you say waving to grab her attention.\n\n\"Not now\" she cusses as she yells once again for her assistant\n\n\"I'm Heading out. Need to gear up\" trying to sound as much stern as possible to convince her but you only get a nonchalant answer as she snickers before saying, \"Yea, right.\"\n\n\"I AM serious\" you say this time more infuriated at the lack of belief.\n\n\"Wait\" She says finally pausing to face you, \"You are telling me that the council is sending a member out on an errand?!\" the disbelief clear in her voice.\n\n\"London\" you say, \"So gear me up so I can bring you back a souvenir\" smiling in most exaggeration you continue.\n\n\"Fine. But since this is your first visit to  Jessy, the quartermaster, you get the starter kit\" she says glancing at the girl behind her.\n\n*page_break\n\nAs the little girl brings forth the starter kit, you know why it is called so. It contains the basics, A backpack with some protein bars, a bottle of water, a gauze and some disinfectant, along with a Glock-19 with just one spare clip. You look at her in disbelief at the shorthanded supply you were given but find her already engaged to provide the others waiting in line. \n\nYou grab the kit and prepare for the teleportation to Guildford. \n\nDespite the high and mighty volunterring in the start, how do you feel about the decision to go behind the enemy lines?\n*fake_choice \n # Terrified\n\n  As the realization sets in of the dread ahead of you, your nerves betray you. You feel the tremors from the just imagining what horrors may await you on the otherside. \n\n # Confident\n\n  Many, in fact, have shyed away from this mission. But you have another motive than just pitching in for the League. This is an opportunity for you to break the shackles of being an outsider. Perhaps this way more can be brought on board in regards to your appointment to the council.\n\n # Anxious \n\n  You cant deny the feeling of dread over what lies in wait for you in London, But your resolve is strong to utilize this one opportunity you have to earn respect in eyes of those who deem you unworthy for being an outsider. \n\n*page_break\n\n[b]Chapter : The March to London[/b]\n\nGuildford is a big place to be visiting without a guide, as such you are escorted by a one of your colleagues who has been there. The place you are heading for is a redbrick country side mansion which will be more suited for a ball than the ragtag refugee camp setup around it. The milling about of Emergency services and military personnel takes you off,guard as you clearly remember Balzorin stressing the need for secrecy, especially now when the humans rival the ones with powers. You can be easily mistaken for a wraith and as such will mostly likely end up fighting the military also. Not a favourable solution for you. \n\nYou head towards a camp where you find Balzorin with his now removed long coat lying on the triage tray while he picks up an injured lady to help her into the tent. Once he comes out he gleams to see you armed with the backpack and the Glock-19 in your holster. \n\n*page_break\n\n\"Nice of you to join us\" he says ushering you towards the mansion. The mansion doors are open as people rush in and out. The inside is no different than the outside with the nursing equipments and saline patients lying all around the floor. Deftly dodging the doctors and paramedics to avoid impeding their work you follow Balzorin up the stairs. After crossing the corridor which follows more of the same scenes you head into an antique blistered game room, not the one with the arcade but one with the taxidermy trophies cased on the walls. \n\nClosing the door with his continued charm of the British chum, he suddenly drops the act as he becomes all business. \"So, I Have a transport arranged, a School bus is going to head to London to taxi out some of the survivors, Fool's attempt is you ask me. But I used my influence to book you a ride. You can go ahead and help them, if you think you can. But if the risk of revealing yourself presents, do us all some favour and don't. As for the squad you are supposed to contact, here is the transmitter receiver linked to their frequency. Find them, help them, and get them out of there if you can. Otherwise do return in one piece or Ellie will kill me for risking you.\"\n\n*page_break\n\nPocketing the transmitter receiver, you get up to follow him out the door just before you glance at him to ask the question that has been bugging you since you got here, \"I sincerely though we were to maintain a low profile\".\n\n\"How low can my profile be, when all I have done is hide in my mansion.\" He says as if it was an obvious fact.\n\n\"You own this mansion?\" you say in awe eyeing the intricate details carved into the ceiling and the door ahead of you.\n\n\"One of many, Yes. Now if you are done dallying, lets get you into that Bus.\" he says opening the door for you.\n\n*page_break\n\n[b]The SAS team[/b]\n\nThe school bus is well, yellow with two black stripes, with uncomfortably small seats and the open windows through which a cannonball may travel. In short not the best means of transport behind enemy lines. But the lack of any options has pressed you into this one.\n\nThe driver is one, Rango, a member of the distinguished SAS members, who experts in extraction missions. The best for the job they said as you made your way into the front seat. Accompanying him are his squaddies : Trimmer, Sallick, Anny and Princess. The last two code named not for their gender but for their distraction skills. \n\nIf you are to avoid the whole rescuing the civilians bit, you will have to hop down at a junction leaving you three kilometres from the East London where the last contact with the lost squad was made. This means getting out will be on your own basis. Even if the SAS team successfully evacuates the civilians they are surely not going to wait for you. However, helping them delays your mission and also might put you in a do or die condition where you may have to reveal your powers to not only the SAS team present but also the dozen Wraiths roaming London.\n\n\"So, mate, what's the destination?\" Sallick asks you in an obvious British tone, which since the last two hours is the only one you heard. \n\n*choice\n # Last stop\n  \"Last stop\" you say\n\n  \"Got gumption, aint he?\" he says chewing on his gum as he turns towards Anny who smiles to provide an instant retort, \"More than your sorry arse\"\n\n  The talk goes back and forth, with an occasional pitch from you as you near the line of control. The gates are quite in the distance from where you will be crossing. Your route is a secret passage into the enemy territory beyond the improvised wall that holds the wraith advance. \n\n  The talk has now mummed down as you dread deeper under the enemy's watch. The noise of the engine is immense but so is the gunfire shadowing the distance. Though the main army retreated, many newly formed militias and few trapped soldiers continue to resist the wraiths and their gangs alike.\n\n  *page_break\n\n  You gaze out the window to spy upon the destruction of the once proud and strong city. The broken buildings, the storm struck look of the surrounding and the dozens of bodies occupying the streets say it all. The struggle, the fight and the will to resist. You can never imagine facing a wraith without your powers but the people of London have weathered tough storms in the past. In its glorious history never has this country lost its capital, it has stood tall against all ailments. But now it lies in ruins.\n\n  The junction slips past you as you ponder over your choice one last time before shifting your gaze ahead. \n  *set SAS +1\n  *goto Rescue\n\n # Got my own stop\n  \"Got my own stop and my own journey, I'm afraid\" you say.\n\n  \"Got gumption, aint he\" he says chewing on his gum as he turns towards Anny who smiles to provide an instant retort, \"More than your sorry arse\".\n\n  The talk goes back and forth, with an occasional pitch from you as you near the line of control. The gates are quite in the distance from where you will be crossing. Your route is a secret passage into the enemy territory beyond the improvised wall that holds the wraith advance. \n\n  The talk has now mummed down as you dread deeper under the enemy's watch. The noise of the engine is immense but so is the gunfire shadowing the distance. Though the main army retreated, many newly formed militias and few trapped soldiers continue to resist the wraiths and their gangs alike.\n\n  *page_break\n\n  You gaze out the window to spy upon the destruction of the once proud and strong city. The broken buildings, the storm struck look of the surrounding and the dozens of bodies occupying the streets say it all. The struggle, the fight and the will to resist. You can never imagine facing a wraith without your powers but the people of London have weathered tough storms in the past. In its glorious history never has this country lost its capital, it has stood tall against all ailments. But now it lies in ruins.\n\n  The stop arrives at you hope down at the junction from where the bus will head to the General Hospital in the vicinity, to grab the refuges and make the way out of here. \n\n  Now the vast London lies before you with nothing more than a transmitter receiver beeping in your pocket.\n  *goto team\n\n\n*label rescue\n*page_break\n[b]Chapter : The RESCUE[/b]\n\nThe bus comes to stop in a calm street behind a rubble of a old townhouse. \n\n\"Come one then, Off we go\" Rango says as he gets up from the driver's seat to exit the bus. You follow the others down to scan the area around you. Isn't much activity around here for sure, the street appears to be empty on both sides. Only the occasional distant gunfire breaks the otherwise silent scene. \n\n\"Nothing like walking me dog\" Princess says clapping Sallick's back,\n\nRango gives the order for them to move out before he stops you, \"Now, now kid. I Got you here because the man told me to get you inside. For the next part here, leave it to the professional's will you?\"\n\n\"But I can help\", you protest at this idiotic assumption based on age. \n\n\"My team is a well-oiled machine you see, got no qualms with your will but your positions may mean distraction for them. Distraction which I can't afford. So if you do want to help stay with Trimmer here and guard the bus\" Patting you on the back he heads off to join the others leaving you with Trimmer on guard duty.\n\n\"Isn't that bad, you know?\" Trimmer says settling on the slab on concrete lying around, \"If it is action you crave, help me clear the house ahead. The only building holding vantage over the area.\" He says pointing to the broke townhouse you spotted on arrival. \n\n*page_break\n\nFollowing him in you step through the broken wall to find the what once must have been a fabulous retro themed Townhouse, now standing only as rubble.\n\n\"You take the left, I will take the right\" Trimmer says in a hushed tone as he brings his rifle up to the point, \"Spot anything, come back and report to me. Don't play a hero\".\n\nYou upholster the Glock as you position your arms in a ready to fire state. The whole setting if the dimmed lit corridor and the retro setting of Victorian walls covered in white to barely reveal it's existence, sends chill down your spine. You slowly and quietly make your way to the receiving room, no doubt this was one of the tourist hotels cashing in the heritage. The approach isn't as quite as you want, for the wooden floor creeks under each step you take giving away your position. You try your best to make is sound out of pattern as you near the edge of the corridor. You turn around the corner with your Glock pointed straight ahead. The room appears clear with two bodies lying on the floor in a bloody heap. Gazing over the counter unveils the receptionist's condition to be no better. \n\nForcing yourself not to vomit at the bloody mess around, you make for the stairs adjoining the counter leading upstairs. The stairs are even more of disarray with occasional broken one and almost all on the edge of it.\n\nThe ground floor of the Townhouse was dimly lit; the top floor is completely dark. You take a moment before deciding your approach, clearly you have to play at your strengths here. \n\n*choice\n # Improvise a lighting Source\n  *if Brilliance > 10\n   You search through the janitors closet downstairs in the corridor for something to help you on this project. As you shuffle the linens lined on the shelf a flat tin container falls below. A Sardine container. Perhaps the Janitors lunch before the London fell. The Sardines are still well, but that is not what you are interested in. You empty the container by picking out the Sardines and spy upon the bottom surface.\n\n   Most Sardine containers contain olive oil used in their packing. This oil is what caught your attention. Grabbing the mop standing against the wall of the closet you pick thick strand from the woollen mop. Placing the strand inside you wait for the improvised wick to absorb the oil and then reach into your backpack to drag out the lighter to light it. \n\n   A grinning satisfaction overwhelms your expression as you produce forth the lamp you just made. Coating it with your handkerchief to insulate the heat from shearing your palm you make your way back up.\n\n   *goto creature\n \n  *else \n   You search in your backpack as you look for a way to create some sort of light source from the available things. The lighter may help but you find nothing close to create a reliable source of lighting. The janitors closet gives access to an woollen mop but the thing burns much faster and with much smoke than you would like. \n\n   Well, that's put out the idea of getting some light in there. Looks like you need to rethink your approach. \n   *goto Rethink\n\n # Rely on your quick wit\n  *if Eloquence > 10\n   More often than not you are posed with situations seemingly impossible to dodge but over the course you have learnt to find the quirks in very scenario to work your way around the problem. This dark passage is no different. The dark may not offer you much vision but it also doesn't offer any to anyone within it. \n\n   You grab the lamp mounted on the wall near you and unscrew the bulb from within. Angling the throw by placing yourself around the corner you fling it in the dark passage ahead. The sound that it emanates should catch the attention of anybody in there, all you have to do is wait for a response.\n\n   Thankfully the sound doesn't get any movement from ahead of you. Which means even for the passage either is unoccupied or the occupant is under some kind of spell of a beauty sleep. Either works in your favour as you move ahead in the dark passage of the floor.\n   *goto creature\n  *else\n   You look for some aid from your surrounding. With the lights out of this region using the lamps mounted no the wall are out of question. The pressure of staring alone in the darkness ahead certainly gets to you as your mind ceases to function. \n\n   Any hope you had to improvise your way in or to find any indication of what lies within fades away as you are dejected staring into the dark ahead. Clearly not wasting any more time you need a fresh start and rethink your approach. \n   *goto Rethink \n\n # March in with the confidence of bashing anyone to cross you\n  *if Dominance > 10\n   The training time you invested is for dealing with situations like this. Ellie has helped you hone your skills to work the full extent of your individual senses. In this case the sense being that of hearing since the pitch dark offer little in terms of vision. \n\n   You prepare the Glock and wade into the dark room ahead, confident that come what may you are ready to face it. \n
