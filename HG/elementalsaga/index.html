\n\n # Rely on your quick wit\n  *if Eloquence > 10\n   More often than not you are posed with situations seemingly impossible to dodge but over the course you have learnt to find the quirks in very scenario to work your way around the problem. This dark passage is no different. The dark may not offer you much vision but it also doesn't offer any to anyone within it. \n\n   You grab the lamp mounted on the wall near you and unscrew the bulb from within. Angling the throw by placing yourself around the corner you fling it in the dark passage ahead. The sound that it emanates should catch the attention of anybody in there, all you have to do is wait for a response.\n\n   Thankfully the sound doesn't get any movement from ahead of you. Which means even for the passage either is unoccupied or the occupant is under some kind of spell of a beauty sleep. Either works in your favour as you move ahead in the dark passage of the floor.\n   *goto creature\n  *else\n   You look for some aid from your surrounding. With the lights out of this region using the lamps mounted no the wall are out of question. The pressure of staring alone in the darkness ahead certainly gets to you as your mind ceases to function. \n\n   Any hope you had to improvise your way in or to find any indication of what lies within fades away as you are dejected staring into the dark ahead. Clearly not wasting any more time you need a fresh start and rethink your approach. \n   *goto Rethink\n\n # March in with the confidence of bashing anyone to cross you\n  *if Dominance > 10\n   The training time you invested is for dealing with situations like this. Ellie has helped you hone your skills to work the full extent of your individual senses. In this case the sense being that of hearing since the pitch dark offer little in terms of vision. \n\n   You prepare the Glock and wade into the dark room ahead, confident that come what may you are ready to face it. \n   *goto creature\n\n  *else \n   Gazing into the dark corridor ahead you chide yourself thinking how you missed out on the training running back and forth between college and league. The emphasis of Ellie's sense training is now clear to you, as your vision obscures the surrounding from you in this dark corridor.\n\n   Deciding against wading into the dark, trembling and disoriented, you rethink your options.\n   *goto Rethink\n\n\n*label creature\n*page_break\n[b]The Beast[/b]\n\nThe pitch black does little to affect you, now that you have a slight advantage going in. your vision adjusts to the dark as more visibility is granted to you. You can only make the outlines of the objects within but that helps from keeping you from tripping. \n\nA bit further in, grants you light from bullet holes marking the one of the rooms. The stench is sets in, with a peculiar odour of death and decay. The more you reach in the more is the stench getting stronger. Now the urge of omitting overcomes your determination to explore the depths of this floor fully. \n*page_break\nRushing back towards the stairs gasping for air, you almost slam into the wall ahead. When the light finally returns your vision you spy upon the goo stuck to your boots. No, not goo, but blood ridden organs. The blood now coagulated, sticks to your boot like gum on street. The strands that extend as you lift your feet are enough for you to imagine the condition in the dark corridor. You turn around to face the corridor with disgust at the carnage and pity for those within. But just as you were turning your gaze away from it, you spot a glimmer of movement, a glitter travelling across the halls and into one of the room. Whatever it is, it is huge to cover the entire height of the corridor and fast to too, for it only took a fraction of a second for it to slide away into hiding. Clearly you are not armed enough to take it down with mere Glock 19 handed to you. You need something bigger and better to do so. \n\nYou reach downstairs to spot Trimmer standing near the rubble scanning the area ahead. He spots you and gives a nods saying, \"Found anything?\"\n\nYou explain the strange sighting in the corridor upstairs to which his mood turns to a grim one,\n\n\"I heard of those things. The other teams they said of these big creatures, scaled head to toe. They only spotted them from afar, though I doubt if anyone who had close counters with such a creature would be alive to tell the tale.\"\n\n*page_break\n\nBefore you could decide how to deal with the creature gunfire erupts from down the street. Both you and Trimmer head towards the bus to spot almost two dozen survivors running towards you. In the background Sallick and Anny provide cover fire while princess and Rango lead the survivors towards you. \n\n\"Head to the bus\" Trimmer says, \"If the creature wakes from his slumber someone may need to distract it. Now go\"\n\nWithout any valid argument other than revealing your secret you obey the orders as Trimmer removes a claymore and gets to work arranging trap for the creature within. You head towards the bus now visible to you the reason for the cover fire as armed thugs make their way around the corner as they fire upon the now trapped Sallick and Anny. \n\n*page_break\n\nThe civilians are loaded on the bus as Princess takes the wheel. The bus starts with a roar as Rango makes his way to you, \"Where is Trimmer?\" his voice calm despite the commotion around. \n\nYou give him a brief account of the creature sighting and the trap Trimmer was laying around for it. \n\nHe winces as bullet strikes mere inches from you, \"Can you handle that?\" he asks his gaze on your Glock. You nod to affirm as he reaches into his side to drag out a Desert Eagle .50 Caliber, one of the most powerful handguns out there. He hands over to you, \"Take this you will need it. Go to Trimmer and get him back to the bus, we will divert the others away while the bus rolls out.\"\n\nWithout another word Rango heads up to talk to Princess as you make towards the townhouse. The entire foreground of the rubble entrance into the townhouse is now armed with claymore powerful enough to blow a person sky high. Trimmer carefully dodges around the markers as he makes his way to you. \n\nRelaying Rango's orders you head back to the bus with Trimmer in the tow. Rango himself is now further down the street flanking the position of the thugs as Princess revs the bus a bit. \n\n*page_break\n\n\"What's the plan?\" Trimmer asks getting in.\n\n\"The plan is let them handle the dozen maniacs there while we turn tail and head to the old bridge. The arse prick actually thinks he can reach us there by sundown.\" Princess says already loading the bus in reverse to make the turn. \n\nKnowing that you can't just sit around with the elemental team still out there. You head out the bus with the desert eagle in one hand and the Glock in the other. Certainly feeling like a badass vigilante about to help the even more badass SAS team. \n\n\"HEY! Mate, I want to help too but I don't think that there is any profit in throwing more bodies at them\" Trimmer tries to stop you, but the screech down the alley forces Princess to drive the bus out before it attracts the source of the screech towards the survivors in the bus.\n\nTurning your attention to more immediate concerns you see the Beast, scaly nine feet tall, possibly more and wide enough to grab both ends of a tank. The giant beast wades into the open tearing through the roof of the townhouse. Amazed at the size of the thing and how it managed to cram itself in the tight confines of the townhouse you stand in the middle with your jaw slacked. \n\n*page_break\n\nThe SAS team taking in the new development has already started to reposition themselves as Sallick Anny move towards the store behind them with Rango in their tow. The beast lands on the ground thumping it with it's bulging muscles as it catches the moment on the other side of the street. It races for the thugs now on their heels, as it grabs the nearest one and rips it apart in two. The others try to run away but the size of the thing does nothing to reduce its speed. One by one it manages to tear through the dozen gangsters in matter of mere minutes.\n\nYou gather your sense as you head towards the wall for cover and hide to think of way to come up with a plan. Even if you use your elements you hardly think it will affect the big guy. You definetly need a plan to fight it. \n\n*choice\n # A brilliant idea forms in your head\n  Trimmer's trap may have gone unused due to the unexpected burst out of the roof from the creature but that does not mean for them to be wasted just yet. You draw your guns and prepare to drag the attention of the creature to you. You spin out of the cover and fire at the creature. At this distance all you can manage is to plant a few near his field of vision and that is enough for you. \n\n  The beast agitated by the display of resistance from you rams his fists in the ground to let out another bloodcurdling screech. Grinning at the successful distraction you race towards the townhouse corridor where the big surprise is waiting for the big guy. \n\n  The time it takes you to cross the street to the entrance of the townhouse is enough for it to land on the roof before you. The predatory look fixed on you only manages to get a grin in return from you. You reach inside as the creature descends to fight you. As soon as its feet touch the ground you launch a blast of elemental energy at it to propel yourself out of the corridor. \n\n  The blast causes it to slam on the ground as the beeping of the claymore turns to more loud blasts that catch the beast from all sides. The blast is so strong that rubble that flies out slams hard all,around you. Thankfully only small pieces hit you otherwise you wouldn't have seen the looks of admiration on the faces of the SAS members as they run up to you. \n  *set SAS +1\n  *goto deadbeast\n\n # You rely on your training \n  You look at the guns and then back at the beast. Clearly you are outgunned and overmatched in this contest. But you were trained for situations to go haywire, even to ones like this. You reach into your backpack remove the knife as you tear the piece of cloth from your tee.  \n\n  Just parked near you is a car much to worse to be driven but no doubt filled with gasoline. You force the lid open and peer inside to find the tank full, some good news at least, you think to yourself as you stuff the fabric inside and dip it thoroughly. You grab the rope from your backpack and tie it around the fabric to create a wick for you to light. \n\n  With the arrangements made, you look as the beast is now turning it's attention towards the store where the SAS team is making their stand. You draw out the Desert Eagle .50 and adjust it on the forearm before you pull the trigger to hit the beast right on the exposed side of it. The beast feels the prick from your bullet as it turns it's attention with ferocity claiming the better of it. The charge is certainaly scary but you need it to reach near the car to get maximum damage at the big beast. Slight miscalculation might result in your death. \n\n  The beast gallops at speed to rush at you, drawing itself near to it's own demise. You reserve the last shot to slam it home on the lid and wait for the exact moment to pull the trigger. To your reflief the beast climbs on the car to prepare for a leap attack on you, causing you to grin at the maximum efficacy of your trap being achieved. You fire the slug to find hit its mark. The next moment you slow down for your own content as you observe the sparks fly soon to be replaced by blazes erupting from the tank. The car blasts in a pyroliting display as the charred remains of the beast are propelled in all directions.\n  *set SAS +1\n  *goto deadbeast\n\n # You look for a way to coordinate with the rest of the SAS team.\n  Despite your training and your skills, you hardly think that taking on the beast alone will be wise. You head for the townhouse to reach the rooftops so as to be visible from the store. You spot he pair of Rango and Anny shore up to prepare for the beast as Sallick brings forth into view a rocket launcher as he preps it to launch at the unsuspecting beast in the back.\n\n  The rocket flies but to their disappointment it does little more than stagger the beast. Now enRaged by the attack if barges into the store and breaks apart what little defence they had setup. Then it clicks to you, the wide unscaled portion of the beast just like a crocodile right near it's front torso. The portion is such vulnerable that the bullets fired by the thugs have actually managed to wound the beast. A rocket aimed at this could tear it to sheds. \n\n  With the store in tatters the trio heads back towards you sprinting while the beast is engaged in the destruction of the store. \n\n  \"What are you doing here?\" Anny says getting behind cover near you.\n\n  \"I have plan\" you say surpassing the needless chatter, \"The beast has an exposed torso and if we manage to get a shot in there we might just take it out for the good\".\n\n  \"We noticed that, but it isn't easy. It usually tends to rip you to pieces when you get face to face with it\" Rango says as Sallick finally arrives with the heavy launcher on his back.\n\n  \"Then we improvise\" you say unfurling a plan with such intricacy that a slight mistake may doom you all. \n\n  *page_break\n\n  The first phase involves Rango and Anny to distract the beast long enough for Sallick to circumvent it and prep the rocket for another shot. While you place yourself in a place where you simply have to take a bit of elemental help to cripple the beast in it's position. \n\n  Both Anny and Rango take opposing positions hiding under cover as the beast sniffs the air for the scent of you. You see Sallick prepare for the gruelling run with the rocket launcher as you hide in the alleyway near the townhouse cradling the Desert Eagle as you focus to use your powers. \n\n  The first phase begin as directed fire from both sides finds the beast befuddled under the consistency of it. The beast jumps on the wall and rushes for Anny's position as you spot her fling a grenade before she rolled out towards the townhouse. The grenade does enough to create a cloud of concrete dust around the beast to buy the time needed by the Sallick to move across. \n\n  Now in the middle of the street sits Sallick with a loaded Rocket launcher waiting for the perfect shot. Using the chaotic situation, you manipulate the time just,in,time to see a slowly emerging beast waddle through the concrete smoke heading towards Sallick. \n\n  *page_break\n\n  You burst out and fire at the exposed fleshy legs of the beast before he brings his arms down to protect them. The time moves slow and so do your bullets as you watch each one fly and hit the target producing forth the splutter of purple blood of the beast. \n\n  Before it could even feel the pain of the stabbing bullet you have already fired the magazine at its legs. Emptying the Glock too you take position to watch your work unfurl. The bullets penetrate the beast ripping a tear in his leg as the concentrated barRage takes out a chunk of flesh out of it. \n\n  Sallick now has a clear line of sight as the soft stomach of the scaled giant. Without hesitation he pulls the trigger to send forth the death memo to the beast. The blast tatters the giant's torso into million pieces flying in all directions.\n  *set SAS +1\n  *goto deadbeast\n\n*label deadbeast \n*page_break\nWith the beast dead and the SAS team alive thanks to your effort you have actually their gratitude. \n\n\"Can't believe that actually worked\" Anny says emptying her clip in the dead beast.\n\n\"You ain't no ordinary kid are you?\" Sallick says.\n\nYou smile nervously under the acquisition unsure if your use of powers may have been visible enough to him. \n\n\"And thank god for that\" Rango says cradling his semi,auto Heckler & Koch, \"Our we would have been the feeding that digger.\"\n \nThough not much but hearing those words from the fabled SAS members means a lot more than you can even begin to explain. The whole experience of the incredible beast, it's incredible death has been, well, incredible. \n\n\"Well, I can't join you on your mission given how the bus may need protection. But for the incredible display out there, let's just say you may find a ride waiting for you when you are done yourself\" Rango says preparing to leave for the rendezvous point. \n*achieve sas\n*set sas +1\n*goto team\n\n*label team\n*page_break\n[b]Chapter : Into London[/b]\n\nThe SAS squad drops you at the somewhere in Lewisham from where you have to travel north towards Lambeth, an hour and half journey at the most. The devious part is the presence of those beasts and the goons along with their masters, the wraiths patrolling the region. \n\nThe route is direct and mostly straight as you move at a steady pace towards your target. The roads are cramped with cars fleeing the city, no doubt after the attack with some up in smokes and others splattered with the blood of the unfortunate caught in the destruction spree of the wraiths. The sight of the gore threatens to spill your breakfast out but with the task in mind you can only offer sympathies to these people this late. \n\nThe otherwise quite nature of the day compared to the morning's rustle is only intruded upon by the occasional sighting of the goons harassing citizens holed up in their homes. Though most have evacuated or became victims of the attack, some managed to hide through the overturn only to be harassed by the hired help of the wraiths. The fact that despite the destitute condition of the city these goons still continue their services to the wraiths completely baffles you. Even though you want to help these people you are bound by your service to prioritise finding the squad. And perhaps your intervention may land them in more trouble than they are in already. \n\n*page_break\n\nThe more you travel towards Lambeth the lesser is the contact with the goons. As if the inner areas were shrouded from them and tasked only with threating the spirit of those beyond the confines of Inner,London. Just as this though crosses your mind you see the ones responsible for patrolling the inner London. Peeking from the cover of a compound wall you gaze at a wraith patrol. Disciplined and marching like the line infantry, they carry with them weapons imbued with strange markings glowing in blue light. Their appearance nothing short of a parading army brandishing their deadly weapons as they do.  \n\nYou wait for them to pass along the street and watch as they turn the corner, certainly not wanting to be fighting the whole lost alone. Your thoughts of fear and appreciation of this display are broken at the beeping of the receiver in your pocket. Drawing it out you spot the tell,tale sign of a signal not far from your current position. Since you were hiding in the same position this promises to be a good sign for that means the counter of the signal was moving towards you. Following the signal now you head towards east as the intensity and the frequency of the beeps increase. Nearly there, relishing the though to turn around to find your heart skip a beat. \n\n*page_break\n\nRight in front you stand two beasts as tall as eight feet and half that wide. Muscles bulging from their hind legs as the one in the front stares at you while the other one looks up from his meal sniffing the air before fixing his gaze on you. Stuck like a deer in headlights you just stand there in front of what could be your instruments of death.\n\nAs the beast pounces on you instinct kicks in as you feel the surge of energy through your body and watch the beast writhe in pain as it passes through him. The other one now circling you in a preadatory walk prepares to rush you. Spotting the movement through corner of your eye you slow the time to spot the paw of the beast hurled at you. Moving around it you tap the reserves of your energy to let another blast knocking the beast back, slamming it in the wall behind. \n\n*page_break\n\n[b]The Welda Squad[/b]\n\nYour movement of victory is short lived as the two beasts now stand back up having shaken off the blows. On the other hand you feel the strain of too much use in too little time. Your phasal powers though powerful often leave you weak from the effort for considerable amount of time. As such their use only rewards in desperate situations, this been one of them. Unfortunately the beast seem somehow immune to your energy attacks as they are ready to make you their meal. \n\nBefore the beast could move, however, a spear much similar to the ones of the wraith parade slams down with ferocious speed piercing through the tough scaly head of the beast and passing thorugh it, pinning its head on the asphalt below. You follow the source of the attack to spot a middle,aged woman with a axe descending upon the other one. The beast barely registers the woman as she slices its head clean off. The speared beast swirms under the pain of the penetration through its skull until the woman comes back to chop its head off in a similar fashion. \n\n*page_break\n\n\"Harmony\" the woman says extending her hand towards you.\n\n\"${name}\" you say staring at her in disbelief as the purple blood of the beast trickles down her exposed curves sending chills done tour spine. In her thirties mostly, but barely visible when she carried herself like that.\n\n\"You the back-up Balz send?\" she says while tearing a chunk of meat from your dead adversary.\n\nGiven your altercation earlier it was hardly a question she needed to ask but still you nod in affirmation, \"Then you should follow me\" she says tucking the meat in her knapsack. \n\n*page_break\n\nThe follow me command seems quite hard to follow as the Harmony leaps distances with ease thanks to her Air Elemental strengths but you find it hard to keep up with your fatigue already set in from the earlier encounter. She leads you to a Shopping complex, with most of it broken in or broken down. \n\nPassing a pair of curtains you spot three women all around the same age as Harmony, sprawled on the space before you. \n\n\"We already did a refugee run today.\" The one to the left says.\n\n\"${name}\" Harmony says pointing at you as she hands her knapsack to the one on the right, \" is not a refugee. Balz send ${genderhim}\".\n\n\"Good. I was getting bored of the same faces. Now one more to stare at while we are stuck in here\" the one grabbing the knapsack pipes up.\n\n\"Now, now girls. Where are your manners?\" a chirpy voice calls from behind you, \"Tiara by the way\", as she comes to face you her sharp clear features coupled with her pale skin and hazel eyes entice you. Also the fact that she is much younger than the others, barely in her twenties. She points from left to right towards the other women before you, \"Peace, Voice and Glamour\" she says, \"And that one is the mother hen, Rage\" her finger pointing at the newest entry, straddling in with authority. \n\n*page_break\n\n\"So Balz send a kid in, huh?\" Rage says looking you over, \"Certainly hoped our words to carry more weight than that\" her comment gets a few snickers from those around. \n\n\"I jest\" she says patting your shoulder, \"We talk work after the lunch, come on now\" ushering you inwards, \"You are not vegetarian, are you?\".\n\nYou wince at the mention, adding two and two about the knapsack. \n\nAfter the funny tasting meal, you doubt you will ever repeat such a meal in your life. The desperate times inside the city made the food run out right after the water supply was cut. With no more source of reliable food around the Welda squad shifted to the more unreliable food sources like the meat of the purple blooded beasts. \n\nTowards the better time after sundown, you lean on the table on which the map of London is sprawled  as Rage goes over her discovery of the wraith workings.\n\n*page_break\n\n\"The outer boroughs are rarely visited by the wraiths. They are handed over to the scum of the city, thugs, the lowlife, you know. But the inner-London, well that is entirely another matter. They got regular patrols of whole squads of wraiths, not like the ones we usually see. These ones are more like the medieval infantry fighting close quarters with these weapons\", she says showcasing the spear bearing the markings of strange origin, \"And their armour is resilient. Very resilient. They are usually accompanied by the Trenstonts,\" spying your confusion she clarifies the term, \"The creatures you faced earlier. They are one of the ancient beings the wraiths mastered. But even this is like walk in park compared to the Westminster.\" her finger now set on the Bold lettered Buckingham Palace on the map, \"The palace is where the cream is. The most powerful of them guard it lead by a really tough fella. Whatever is they are guarding is what our objective is.\"\n\n\"How do you plan to work on that?\" you ask.\n\n*page_break\n\n\"A got a plan.\" her reply nonchalant as she highlights the route marked on map, \"This is one of the patrol routes for the wraith infantry. Thirty of them in one squad. We hit them here\", pointing at the big X marked in the middle of the street, \" Grab their gear and their clothes to get our disguises.\"\n\n\"You think just the clothes will allow you entry in the Palace?\"\n\n\"Nah. That's where the second part of the plan comes in. A second team will lead a distraction drawing out the reinforcing squads away from the palace. Naturally we batter them and sending them running back. And when they do, the infiltration team will join them. Once in, we get the info and get the heck out of this city\".\n\n\"Sounds awfully crude. I mean what if one of the wraiths show up along with the squads? What if they make you at the Palace?\" you ask clearly pointing out the faulty planning.\n\n\"Then we rely on the training and make sure that the objective is complete regardless of the cost\", her tone now seeping with anger as she glares at you.\n\n*page_break\n\nThe night grants you little sleep as you ponder over the looming decision. Clearly the plan is faulty and at best childish. The wraiths may easily make them out at the palace and the distraction team may not successfully defeat the attacking enemies. But all doubts are countered by Rage when she finally explains the extensive observations they made before formulating such a plan. As for its simplicity she simply quotes it to be need of the hour. Saying a soldier needs to adapt to the situation not plan to the situation. \n\nAnyhow the decision that you have to make now is whether to stand with them or leave this place behind as and report back as you were meant to. Clearly the intel about the internal operation of the wraith is more than enough to validate your mission as a success. But given the plan of Rage, they may need all the help they can get.\n\n*choice\n # Stay and help the ladies\n  As much as your mind tugs at you to think rationally and run away from these Kamikazes, your heart denies you that right. Owing your every breath to Harmony, the least you can do is repay the favour. Perhaps you might be the catalyst required to fulfil this mission. \n\n  The morning comes with heavy preparation, as the Harmony and Peace team up armed with the wraith infantry weapons and head out to take their positions on the rooftops from where they will strike the first blow followed by flanking attack by Rage, Glamour and Voice, while you and Rage will take the rear to slam it home. \n  *achieve lond\n  *goto ambush\n\n # Avoid the suicidal run\n  Deciding against the heroics involved in the fool's errand you look at the bigger picture. Sure, you may be painted a coward in the eyes of some but the very survival of London may depend on you relaying the news back to Balzorin. Once the tactics are revealed a planned approach, a better planned approach may see to swift end of the occupation. \n\n  The come morning you pack your supplies and gather the mapping data from Rage. The data is enormous, a twenty day and night observation data, enough to pinpoint the exact location of the units within at any given time of the day. It even involves the locations of the operational bases of the local gangs. Perhaps if Rage delays her suicidal plan, you might just save them too. But she is a stubborn woman who only glares at the mention of it. \n\n  The journey back out of the city will definitely be a tricky one. Right now you stand in Lambeth, which lies under the protection of the beasts and the wraith infantry meaning you must avoid their sight if you are to make your way out safe and sound. \n  *goto LondonAftermath \n\n*label ambush\n*page_break\nThe plan sounds solid but then again relies on the enemies playing by your rule. Trusting the years of experience the woman has over you, you get into position for the upcoming close counters. You are hiding in a shop behind the freezer as you keep a look out for the squad to kick in. Surely right on time the thumping footsteps declare their arrival as the march of thirty wraith infantry places your senses on alert.\n\nWaiting for the opportune moment you spot Harmony and Peace peering from the rooftops to descend on their unaware foe. The squad reaches the spot as Harmony and Peace hurl themselves over the edge to slam hard to disperse the squad under the blow. The first strike itself bloodies their weapons as they engage the surrounding wraiths. Before the wraiths could rally to fight them off, Rage and Glamour pop out from their position with their and engage in an intricate dance of death with the wraiths. \n\nThe whole fight is enticing, from the swift and graceful movements of Harmony as she slices up the wraiths one after the other to the raw and powerful display of element by Rage. Rage justice to her name is an fire elemental, she envelops her fists into flames as she pounds the wraiths' armour. But that is merely distraction as when the wraiths move their weapons to retaliate she manipulates the weapons to make them strike at each other. \n\n\"Come on, whatcha waiting for?\" Tiara yells at you as she starts running towards the rear of the squad. Reagining your bearing you rush forward prepared to face them.\n\n*if Brilliance > 60\n Sparks fly around you access the deep wells of reserves now at your beck and call after the much needed rest. You fire a volley into the staggered formation of the enemy in vain as it blasts off of their though armour. Clearly as resilient as Rage emphasised. \n\n You unholster your Glock hoping to try something new. Loading the gun you aim down the sight at the nearest wraith. A clear shot and pop goes the bullet. Except the bullet is now being supercharged by your electricity as it travels with exponential speed creating splutter as it penetrated through the armour of the wraith. You watch with pride at successful experiment as the wraith gargles with its own blood. \n\n Bullet after bullet of supercharged speed finds their target as the wraith squad starts to thin out. When Harmony slices open the last one you observe the look of approval on Rage.  \n *goto assault\n\n*elseif Dominance > 60\n You watch as the blasts of Tiara blast off the wraith armour rendering her powers useless at this range. You crack your neck, readying yourself for some close counter fun. Being the athelete you hardly need any set of powers to fight them but having one means you can just end it quickly. You close the gap between the staggered wraith squad, all the while changing into your rock solid form, as you slam hard into the wraith at the forefront. He flies straight ahead as you spy as huge dent formed in his chest plate. Just as you are enticed by your work a sword wooshes past you as you duck and punch in the direction. The woman wincing under the pain before crumbling to the ground. \n\n Your charge has managed to push you deep within their ragged formation as surrounding enemies now turn to you their weapons at the ready. A grin on your face and focus in your mind you will forth vines with exuberant speed as they slam hard into those around propelling them backwards making them easy pickings for the others. When Harmony slices open the last one you observe the look of approval on Rage.  \n *goto assault\n\n*elseif Eloquence > 60\n Transforming seamlessly in a flowing stream of water, you eleveate yourself to get a eagles view of the battle. Up this top, the clear confusion of the sudden attack is visible and the now ragged wraiths are somehow managing to reform to resist the attack. \n\n You watch as they form a circle at the centre slashing outwards towards any that get close. Even Harmony finds it difficult to get a shot in this circle. Still the other wraiths outside are keeping the women at bay while trying to form a second circle around the inner circle. Such a strategy make take away the advantage in form of element of surprise away from you.\n\n Closing your eyes you draw on the moisture in the air as you increase your size. With a final drag you open your eyes and propel a water gun directly at the inner circle. The force is so immense that it sweeps them off of their feet. On their backs and defenceless, they are easy pickings for the ladies. When Harmony slices open the last one you observe the look of approval on Rage.  \n *goto assault\n\n*else\n You let blast after blast of white energy into the wraith ranks. But the energy fizzles out over the armour clearly protected against elemental attacks. As you near the ragged wraith formation and idea form in your head. You push further inside and as the wraiths move in for the killing blow, you close your eyes and produce forth a large shield which knocks them back hard. Fallen on their back and defenceless they make for easy pickings for the ladies. When Harmony slices open the last one you observe the look of approval on Rage.  \n *goto assault\n\n*label assault\n*page_break\n[b]Chapter : The Assault on the Buckingham Palace[/b]\n\n\"One more mistake I will rip your throat out\" Rage hisses at Tiara, who inadvertently gave away your position to one of the goon squads nearly killing you all in the process. \n\nYou hide among the bushes near the River Thames laying traps before the big show down the day after. So far you have managed to tip off one of the goons and almost ran into another wraith infantry unpreapared. Thanks to some clever thinking and quick responses from Rage any mishap was avoided. \n\nYou grab another engraved stone from the bag and pocket it as you peep over the map to scout where to position it. Making your way there you place the stone and use your elemental acuity to activate it. Hearing the tell,tale click you gleam at your success as you get up to head back to grab more. \n\n*page_break\n\nYour path however is cut short by a man, who stands before you with his hands raised, \"Here to talk. Nothing Funny\"he says.\n\n\"What about?\" you ask eyeing the mysterious man suspiciously.\n\n\"We know you work against those invading wankers taking a piss on our city.\"His accent giving him away as a local, \"And boy would I cherish the feeling of grabbing them by the bollocks.\"\n\n\"That is all well and good\" you found the source of the voice to be Voice, \"But what in the blazes can you do for us?\"\n\n\"Plenty uses this one has miss\" he says with a slight bow, as he whistles to reveal movement from all around you. People, no doubt criminals armed with revolvers more local than proper factory made but still the confidence and the fact they were there without your knowledge is nerving. \n\n\"Oh, goodie, you got a gang. But that still doesn't answer my question\" Voice says with disdain.\n\n\"You know something about London, miss\" He says his smile more cocky now, \"It is filled with barmy folk. And every single one of those, will like to turn this gobsmacked attack back and take the city back to ourselves.\"\n\nChipping in you\n*fake_choice\n # Urge Rage to trust them\n  \"They may be under the influence of wraiths\" Voice says. You step up to cut her voicing your opinion, \"I dont think the wraith can influence them from that far, and without the tell-tale sign of indoctornation of white eyes and slacked jaws, I seriously doubt that.\"\n\n  \"Then they must be working for them\" the fustration directed towards you now. \n\n  Thankfully Tiara step up to defend you, \"Look at them. They hardly fit the part of brutes we have been fighting. Not with that posse he aint.\" \n\n  Rage seems swayed by her arugument as she relays orders to inculde them into the assault.\n  *set gar +1   \n # Suggest against such a risk\n  Despite your early assessment to help them, their eager approach is offputting. You seriously doubt that they are genuinly interested risking thier lives even at the prospect of saving London and you voice the same, \"I think we should limit thier involvement in our plans. I mean, we cant just trust anyone who claims to be on our side.\" \n\n  You catch some stink eye from the band before Tiara steps up, \"Look at them. They hardly fit the part of brutes we have been fighting. Not with that posse he aint.\" \n\n  Rage seems swayed by her arugument as she relays orders to inculde them into the assault.\n\nThe next hour or so Rage goes into discussion over inclusion of the new anomaly in your plan. Also it came to explain what a goon was doing so deep into inner London. But seeing no harm in including the extra help, Rage assigns the better fighters to the infiltration team while the rest have joined the distraction team. Certainly the new development is mind,blowing with all the assist you are getting.\n\nThe ragtag band under one Garrett Smith, is one which truly represents the nature of humans as a species. Despite seeing the devastating results of the attack this little gang held on to its territory and protected those in their neighbourhood truly paying off for all the 'protection money' they had gathered over the years. Many gang members died but the people were saved and escorted out by Ringer.   \n\n*page_break\n\nThe plan now emboldened by the local talent is set in motion the next morning. Third day in this city and you are already feeling yourself to be a part of its struggle for survival. \n\n\"They think our actions are meant to eradicate the wraiths\"Voice says, \"how can we trick them into helping us, knowing that most wont make out of it alive?!\", the sadness clear in her voice.\n\n\"The mission comes first\" Rage says in a fact of matter tone, \"And we are not tricking them. I talked with Garett, he and his 'mates' are happy just creating a dent in their system.\"\n\n\"Surely he doesn't know everything! How can you expect him to respond to half,known truths\" Voice says exasperatingly.\n\n\"Enough\" Rage shouts to quell any further arguments from Voice as she unfurls the map to go over the plan once again.\n\n\"Glamour you will lead the team, since you seem to have your head still on straight\" her glare at Voice says it all, \"You are to spring up as much trouble as possible. Draw their attention to you, give them a show they cant resist. As for the others we shall be dressed and equipped and hidden here\" she says pointing at a building marked on the map, \n\n\"Once the battered squads return we will join them and slip past the sentries at the gate. Once inside Harmony and Tiara along with Garett and his bunch will stay on the grounds. If things inside go haywire, you are to go guns blazing to provide a second distraction. So position yourselves likewise. As for you\" her gaze towards you now, \"I could use your power set to back me up on the inside.\"\n\n*page_break\n[b]The Sense[/b]\n\nThe plan in motion and you all dressed up for the ball at the passage it is only a matter of time before the big guns roll out across the district. Garett steers his lackeys as you sit here waiting for the distraction. A thud followed by a blast that lit up the night sky, the distractions begin. Soon the noise of gunshots follows indicating Garett's support kicking in. \n\nYou observe the squads rolling out, three of them, and others still out patrolling, surely enough to empty the palace you think. You peer into the compound to find naught but disappointment as more still appear to be there. Much to her credit the squads beaten and battered are returning after what appears to be a gruelling battle. The distraction by itself is to work in two ways. One will be the ambush set at different avenues and the second is the Welda,B squad which will draw out the squads into these ambushes. \n\n*page_break\n\nYou get down with the rest as you slowly move towards the retreating group, observing their tactics as they do and mimicking them yourselves. For a minute you think they might look through the ruse but luck was on your side. The gates are manned by more Wraith infantry with guns like the ones probing from the airship of theirs. The wraiths are taller than you but look more or less like humans, enough for you to pass through without suspicion anyway. \n\nInside the old grand courtyard is now replaced with cinder remains decorated with the mangled bodies of those protecting them. The sight of it sickens you, the same for Garret's people. But somehow you all manage to keep the contents of your stomach and continue to follow the other infantry squad. Marching to a structure you are certain not to be included in the previous attraction of the Palace, you spy upon the guns mounted on the thing. If the videos are to be believed these guns could shred a whale in seconds leaving naught but bones to mark its existence. \n\n\"This is where we split\" Rage whispers to Garret, \"Handle anything inside there. Tiara and ${name}, with me\".\n\nPretending to be a wraith is something you are not used to so the occasional glares from the others patrolling the palace does not come as a shocker. They seem to be more focused on the attacks on the city as more and more of the sqauds are sent out. However, this doesnot reduce their number here. \n\n*page_break\n\nThe area further in is devoid even of the wraith infantry only the wraiths with some kind of luminiscient field around them are floating inside. Beneath them are scores of engineers, fifty, possibly more you reckon, all milling about the machines, nay engines, much similar to the one you encountered on the ship, The Western Brimbore. \n\n\"Use the machines for cover and find were they lead\" Rage says before following her orders herself. Tiara follows the same suite as she moves behind a machine herself. As it stands Rage takes the left side, Tiara the right, leaving you the much exposed middle to contend with. The floating wraiths seem to be monitoring the humans below, cleasrly under their spell, with the white blank eyes and the slacked jaws. Shifting your focus back to the task at hand you spot the cables leading away from the machines through the centre. Shifting from one to next avoiding the engineers and the wraiths alike, you inch ever so closer to the source of it's power. \n\nAt the edge of the arrangement of the engines you find a machine you think you have seen before, though unable to remember where. There is only one person working there, human no doubt, and defitnetly not under wraith control as he moves around quite hastily, Jumbling papers in his hands looking over the machine again and again. His inattention to the surrounding makes sneaking up to him quite easy. Mere a foot away from him you stand as you prepare to muffle any screams that may come form him. Nabbing him from behind you cover his mouth and bring him to the ground. \n\n*page_break\n\nAnd just as you do, you see the man himself, Dr. Miller, in the flesh. You stare wide,eyed at the struggling form in your grasp. Miller, all the way from university is here? In England? Working for the wraiths? Your mind full of questions distracts you as your grip slackens and Miller manages to shake you off. He comes to face you the look of recognition on his face but not for long. He turns towards the wraiths in a premptive position to scream for help with his hands reaching to echo his voice, only to be silenced by a quick jab from Rage with the butt of her weapon. \n\nSeeing you on your knees in the middle of nowhere, Tiara tugs at you to move into cover. \"What was that?\" she whispers to you. You really wish you had an answer for that but you don't. Seeing someone from your past ordinary life should have been releaving but under the circumstances it fills you with horror. \n\nRage drags the body of now unconscious Miller near you, \"We cant take him out quietly.\" She says turning her gaze to the wraith above, \"But we need to. And we also need that machine gone. So as I see two of us are staying behind granting one of us the chance to carry this traitor to Balz. He may find some insight on this whole matter.\" Turing her gaze to study the machine once more before grabbing three sticks from the ground as she turns to you with them probing from her closed fist. \n\n\"Choose\" she says, \"Whoever gets the shortest carries the deadbeat.\"\n*achieve mil\n*choice\n # Left one\n  Dragging it out, you realise it is not the shortest one. Though for strange reason you are relived that it is. For the weight of responsibility of carrying Miller to safety has been lifted from your shoulders. Though now you feel the dread of fighting the floaters.\n\n  Tiara picks her and Rage opens her fist. \"Jolly then\" Rage says as she compares the sticks to find hers longer than Tiara's, \"Tiara get the guy to safety. IF needed ask the Englishman to lend some distraction or support.\"\n\n  \"I'm not leaving you two behind\" her voice slightly louder than the situation requires. For a moment you think the wraiths may be on to you but their concentration is clear and strong on their minions below.\n\n  \"Hush now\" Rage says, her voice more motherly than her usual tone of a stern commander, \"This isn't a death sentence, And you are not yet in the clear. So keep your head on right, and get the man out of here.\"\n\n  Tiara looks like she might protest but then swallows her objection before nodding in acknowledgement.\n\n  \"And Tiara\" Rage says cranking her neck, \"Be sure to brag for me in front of Voice.\"\n  *page_break\n  Rage and you wait as Tiara carries Miller to the edge of the labyrinth of engines. Now is your time to drag attention of the flying ones away from her. \"Care for some hot tea?\" Rage says with an English accent as she steps out to encase herself in raging flames. A well suited name you think to yourself as you turn towards the machine with an intention to wreck it.\n\n  You feel the Raging heat pondering around you as Rage turns Rampant on the fliers. They screech and flail as their focus loses its grip on those below. While she handles them you prepare for some old,school wrecking spree. \n\n  *if Brilliance > 80\n   Tracking close to the machines movement you feel the electricity flowing through it. Though it is powered by the strange engines, it still relies on the good old electricity, no doubt the reason being its human design. \n\n   The connection you feel to the electricity is more like a lost limb, something that has never happened to you before. You can not only sense the electricity but feel it. The conduction the charging, discharging of different components is all revealed to you. With a tweak of your thoughts you feel the energy changing direction to your will. Increasing your efforts, you see the entire circuit for itself. Thank goodness you are well versed in mechatronics or this may have proved disastrous. The circuit is protected against surge by a failsafe deposit of raw energy, triggering which may level the entire palace. Strange for a machine to be protected with such extreme measures. As if they wanted to erase the existence of this place with it. \n\n   Pushing the distractions out you work towards disabling the failsafe circuit. With a bit of diversion the circuit remains safe while the rest of the components are fired beyond repair. The last bits of the machine crumpled by your manipulation you turn to look at your teammate's condition.  \n   *goto Ragehead\n\n  *elseif Dominance > 80\n   The moment you change to your rocky form you feel the difference around you. You sense the wild life around you waiting at your beck and call. They seem to be anticipating an impetus from you. Never have you ever felt such a startling power surge. Even the ground seems more interact able. Though you could produce forth a rocky shield or a slab to slam your enemies but now the feeling is different you feel the very ground as if it has come alive, it too waiting for your orders. \n\n   You look towards your target and play with this new found connection. The area around the machine starts to tremble just as you will it. But this one is different from your earlier quakes, as you control it to the very core. You feel not only the ground around you but that of the entire region. You feel the people on it the Palace foundation running through it, the effect of your quake on them as they move as they grind against each other. The feeling is surreal to say the least. \n\n   The earth swallows the machine as the ground cracks and the rocks smash against it. Gone in the depth of your creation you can even feel the machine break up against the rocks, the soil filling its insides. \n\n   Gleaming with admiration of your own work you turn to gaze at your partner's condition. \n   *goto Ragehead\n\n  *elseif Eloquence > 80\n   As you prepare to slam the machine with your water jets, you feel a strong tugging sensation at the back of your mind. Ignoring the feeling you will forth the water only to see gushes of wind, no gush of steam, charging at it. The machine components hiss in the background as you gaze at your own hands. You have gotten used to seeing them in their watery form but today you are in for a surprise as they do not appear at all. You can feel them but can't see them. And then you feel it, the sensation you felt earlier, your hands once again visible except now they are of ice. \n\n   You allow the sensation to wash over you as you learn the source of it. It seems that you can now not only manipulate the water shape, but manipulate the very nature of it. Shifting your hands through a cyclic change from steam to water to ice, you get more used to this feeling. \n\n   As you once again gaze at the machine, you see not it's outer casing but rather the water inside, around and within it. You feel it in it's different forms, co,existing in some cases, battling in some others. With but a thought you rush in the moisture around to occupy the crevices inside the machine. Then with you change its phase as you feel the water solidify inside, pressing against the narrow gaps it once occupied now insufficient to hold it. The ice expands starting to clog the various parts and shutting down the machine before it propagates outside to enclose it completely.\n\n   Gleaming with admiration of your own work you turn to gaze at your partner's condition. \n   *goto Ragehead\n\n  *else\n   You turn your gaze at the machine to smash it with a blast of white. But what you see buckles your knees. A stilling dark first only to be replaced by the glimmering floor. Soon in the distance columns of white rise around you white shapes are moving. You rub your eyes to find more of the similar except now you could see them for what they are. The floor is lit by the grass that occupies it, taking shape of white blades and the distant columns are trees swaying in the night wind, while the white shapes are humans, maybe wraiths, milling inside the Palace. \n\n   You even feel their presence a strange warm, nurturing glow washes over you as you concentrate on them. Then you start toying with this sensation as you watch as the white floor flicker under you gaze. You change you focus to find them once again lit as they were before and now with some more effort you feel them increase in their form and brightness. You push forth the final surge to find them tall enough to block the sky with their white glow. Unable to bare the bright display you close your eyes and will to change back to your normal form.\n\n   As you look up once again you are surprised by the scene before you. The grass has grown to challenge the Palace's grandness and in that process has managed to propel the machine to ram into the wall behind it. You look at the hole in the wall to find the crumpled remains of it. Toying some more you manage to send it flying sky high this time around it smashes to bit under the floor.\n\n   Gleaming with admiration of your own work you turn to gaze at your partner's condition. \n   *goto Ragehead \n \n # Middle one\n  Dragging it out, you realise it is not the shortest one. Though for strange reason you are relived that it is. For the weight of responsibility of carrying Miller to safety has been lifted from your shoulders. Though now you feel the dread of fighting the floaters.\n\n  Tiara picks her and Rage opens her fist. \"Jolly then\" Rage says as she compares the sticks to find hers longer than Tiara's, \"Tiara get the guy to safety. IF needed ask the Englishman to lend some distraction or support.\"\n\n  \"I'm not leaving you two behind\" her voice slightly louder than the situation requires. For a moment you think the wraiths may be on to you but their concentration is clear and strong on their minions below.\n\n  \"Hush now\" Rage says, her voice more motherly than her usual tone of a stern commander, \"This isn't a death sentence, And you are not yet in the clear. So keep your head on right, and get the man out of here.\"\n\n  Tiara looks like she might  have you ever felt such a startling power surge. Even the ground seems more interact able. Though you could produce forth a rocky shield or a slab to slam your enemies but now the feeling is different you feel the very ground as if it has come alive, it too waiting for your orders. \n\n   You look towards your target and play with this new found connection. The area around the machine starts to tremble just as you will it. But this one is different from your earlier quakes, as you control it to the very core. You feel not only the ground around you but that of the entire region. You feel the people on it the Palace foundation running through it, the effect of your quake on them as they move as they grind against each other. The feeling is surreal to say the least. \n\n   The earth swallows the machine as the ground cracks and the rocks smash against it. Gone in the depth of your creation you can even feel the machine break up against the rocks, the soil filling its insides. \n\n   Gleaming with admiration of your own work you turn to gaze at your partner's condition. \n   *goto Ragehead\n\n  *elseif Eloquence > 80\n   As you prepare to slam the machine with your water jets, you feel a strong tugging sensation at the back of your mind. Ignoring the feeling you will forth the water only to see gushes of wind, no gush of steam, charging at it. The machine components hiss in the background as you gaze at your own hands. You have gotten used to seeing them in their watery form but today you are in for a surprise as they do not appear at all. You can feel them but can't see them. And then you feel it, the sensation you felt earlier, your hands once again visible except now they are of ice. \n\n   You allow the sensation to wash over you as you learn the source of it. It seems that you can now not only manipulate the water shape, but manipulate the very nature of it. Shifting your hands through a cyclic change from steam to water to ice, you get more used to this feeling. \n\n   As you once again gaze at the machine, you see not it's outer casing but rather the water inside, around and within it. You feel it in it's different forms, co,existing in some cases, battling in some others. With but a thought you rush in the moisture around to occupy the crevices inside the machine. Then with you change its phase as you feel the water solidify inside, pressing against the narrow gaps it once occupied now insufficient to hold it. The ice expands starting to clog the various parts and shutting down the machine before it propagates outside to enclose it completely.\n\n   Gleaming with admiration of your own work you turn to gaze at your partner's condition. \n\n   *goto Ragehead\n\n  *else\n   You turn your gaze at the machine to smash it with a blast of white. But what you see buckles your knees. A stilling dark first only to be replaced by the glimmering floor. Soon in the distance columns of white rise around you white shapes are moving. You rub your eyes to find more of the similar except now you could see them for what they are. The floor is lit by the grass that occupies it, taking shape of white blades and the distant columns are trees swaying in the night wind, while the white shapes are humans, maybe wraiths, milling inside the Palace. \n\n   You even feel their presence a strange warm, nurturing glow washes over you as you concentrate on them. Then you start toying with this sensation as you watch as the white floor flicker under you gaze. You change you focus to find them once again lit as they were before and now with some more effort you feel them increase in their form and brightness. You push forth the final surge to find them tall enough to block the sky with their white glow. Unable to bare the bright display you close your eyes and will to change back to your normal form.\n\n   As you look up once again you are surprised by the scene before you. The grass has grown to challenge the Palace's grandness and in that process has  to the courtyard. TO much your surprise it is nothing short of a battlefield as Garret's people hold the left against toppled benches and broken columns against a steady line of wraiths advancing. Their bullets bounce off the armour with little damage. \n\n   Rage let's out a scream, as she fills the region with a blazing fire. The bullets now coated with a layer of it strike the wraiths with force as a few fall while others stagger. Yet it is not enough to falter their line, as it continues advancing in Garret's direction. \n\n   \"Quickly\" Rage says pointing at the barracks before which the wraiths line advances\n   *goto barracks\n\n  *else \n   You call for your senses and feel them for a brief moment before your mind slumps to the wraiths. Grasping for the last bit of consciousness in vain, you flutter around the floor, your hands hammering against your temple. The effort however could not stop the inevitable.\n\n   That was the last time you felt any control over your actions. In the weeks that followed you caught glimpses, of people being butchered, of buildings being raised, of fighting against Ellie and watching her life slip away as Rage carves a spear of fire through her. \n\n   All hazy and least bit in terms of sense, you know not the fate of the world only that you fought the battle from the wrong side and were the villain for the most of those you seeked to protect. You were their instrument to bring forth the end as was always the prophecy. \n\n   Your suffering comes to an end as you feel strike after strike penetrating your torso and riddling it with open wounds. As the control of the wraith slips from your dying mind, you catch a glimpse of Jessy, who whisper a simple sorry before slicing your throat with the knife to plunge your mind in to the infinite abyss. \n   *goto Ragehead  \n\n # Let the nature take its course \n  *if Dominance > 60\n   You feel the earth beneath you, the motions, the twists of it as you will for it to rise. Your earth sense grants you the sight of where and how the floaters are positioned. Focusing through the excruciating pain you manage to tweak the substratum to create a loacalised seismic event. The floaters flying high will not be directly affected but you know which structures to push way to get them.\n\n   The adjoining Palace wall trembles under the quake as pieces of it lossen from the already battered wall and slams into the cluster of the wraiths. As soon as the wraiths loose their grip on you, you muster forth cages from beneath to slam them shut. The impact knocks them out giving you the much needed time to get your bearings. \n\n   \"Let's go now\" Rage says, \"Less they retaliate.\"\n\n   Deciding to follow the sound piece of advice you follow her out to the courtyard. TO much your surprise it is nothing short of a battlefield as Garret's people hold the left against toppled benches and broken columns against a steady line of wraiths advancing. Their bullets bounce off the armour with little damage. \n\n   Rage let's out a scream, as she fills the region with a blazing fire. The bullets now coated with a layer of it strike the wraiths with force as a few fall while others stagger. Yet it is not enough to falter their line, as it continues advancing in Garret's direction. \n\n   \"Quickly\" Rage says pointing at the barracks before which the wraiths line advances.\n\n   *goto barracks\n\n  *else \n   You call for your senses and feel them for a brief moment before your mind slumps to the wraiths. Grasping for the last bit of consciousness in vain, you flutter around the floor, your hands hammering against your temple. The effort however could not stop the inevitable.\n\n   That was the last time you felt any control over your actions. In the weeks that followed you caught glimpses, of people being butchered, of buildings being raised, of fighting against Ellie and watching her life slip away as Rage carves a spear of fire through her. \n\n   All hazy and least bit in ed, directly near the sentries. The broken roof slams hard on them crushing any life they had out of them. You continue you run towards the barracks as you jump over the tomb of the sentries to run inside the barracks.\n\n*page_break\n\nMuch like the rest of the Palace the guard room, which would might as well be a barracks given its size, has been heavily modified to suit the wraith needs. With glowing etched guns probing from the wall and a super computer residing in the centre certainly means bad tidings for you. Fortunately the engines you destroyed appear to be the source of power for operating these defese systems.\n\n\"We need to get them back online\" Rage says before fixing her gaze on the security cams, the ones constructed by the Palace security and still operational as they draw power from their own backup. You follow her gaze to see the exterior courtyard to be nothing short of a massacre as Garret and his people try to fight them but even with the weapons of the enemy they lack the skill to use them as efficiently as they do.\n\nAlso a short group detaches from the rear heading towards you, no doubt to investigate the commotion you created at the entrance. \n\n\"Find a way\" Rage says grabbing a nearby weapon from the rack, \"I will deal with them\"\n\nYou have no doubt in her capability but certainly doubt her judgement. For one, you don't know nothing about this new technology before you, and two, you are not sure how it will respond to anything that you do. \n\n*choice\n\n # Tinker with the circuits on the inside\n  *if Eloquence > 80\n   The water sense once again shows you the inside working of this machine the only difference being this one is of entirely another league. The engines despite their foreign origin worked to integrate themselves in the existing technology. This super computer however, has no such feature. Though the internal mechanics is revealed to you something of import. The machine is not digital but rather a series of analogue touch backs made to actuate different Reponses. Pretty primitive you think, as you press the one connecting the external gun circuits, hoping them to work in your favour. It fires blank shot as the security cams show the erratic behaviour of the gun under your influence. Once again you tinker with it to activate them briefly in a more controlled fashion before losing the influence. \n\n   After a few more failed attempts you manage to form a way to control them. Now the guns move about and fire as you will. Actuating them with slight tweaks you observe as the second line of the wraiths is taken by surprise at point blank shots. The chaos that erupts form the attacks causes them to reform to face the barracks now Thankfully an Ice beam cover the floor around them making them loose their footing. You follow your gaze to spot Peace who cleverly has managed to disengage the fighting wraiths. Soon she is joint by the rest of the distraction squad with the known exception of Tiara. The joy is doubled as you spot incoming cheers and taunts from the gates as the rest of the Garret squad charges through the gates bringing the sentries down by the sheer numbers. \n\n   The tables have turned.\n   *set London +1\n   *goto exitfrompalace\n   \n  *else \n   You look for a way to jump start the machine or least destroy it somehow. But the complex construction and seemingly impossible to comprehend design puts it way out of any manipulation you can come up with. \n\n   With the screams now increasing your eyes wonder over the security footage as you spot Garret getting sliced up by the wraith soldier. His people meet the same end. Towards the entrance Rage tries her best to keep the wraiths out but she is outnumbered out there. \n\n   With a last effort you produce forth a blast of raw dark energy and slam it against the machine. To your surprise the machine springs to life. But its programming still targeting you and your allies, you watch as Rage is riddled with energy projectiles before she slumps on the ground against her injuries. The other survivors also meet the same end. You try to shut the machine down but the amount of energy you put in may see the end of all out there.\n\n   Soon the wraiths clear the courtyard and come inside the barracks to finish you off. You wish you could have said that you went down fighting but the truth is the only contribution you had was to kill your own people and ultimately accept your death as a release from the guilt. The wraith who spots you, brings down his imbued axe on your torso. That was the last thing you saw before the life slipped from your body. \n   *goto Barracks\n\n # Try Brute force to operate it\n  *if dominance > 80\n   You send forth probing vines as they penetrate deep in the crevices of the device. The manipulation of the gears proves tad bit difficult as the entire assembly tends to work in unison and hence requiring larger force to operate it. But with some effort you manage to twist a few as you test out the outcome of your actions. Repeating the experiment for the other, you soon find the cog operating the guns mounted outside. \n\n   Controlling them precisely with thick vines proves difficult but then again you don't have to aim much harder given the populace of enemies outside. Just aiming in the crowd of wraith infantry you activate the guns to send limbs and bodies flying of the unfortunate victims caught in your attack. The second line of the wraiths is taken by surprise at point blank shots. The chaos that erupts form the attacks causes them to reform to face the barracks now Thankfully an Ice beam cover the floor around them making them loose their footing. You follow your gaze to spot Peace who cleverly has managed to disengage the fighting wraiths. Soon she is joint by the rest of the distraction squad with the known exception of Tiara. The joy is doubled as you spot incoming cheers and taunts from the gates as the rest of the Garret squad charges through the gates bri
