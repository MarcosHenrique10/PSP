ction of your mastaba, Most Imperial and Excellent Majesty,\" says Vizier ${vizier}.\n\n\"Oh… you are asking by which formal name I wish to be known in this section of wall inscriptions in my tomb?\" you ask.\n\n\"Exactly, my most Revered and Blessed Leader of Leaders, Smiter of the Sand Rebels and Interpreter of Dreams,\" says Vizier ${vizier}.  \n\n\"So… what is thy name?\"\n\n*label putty\n\n*input_text sen_name\n\n*label icedtea\n\n[b]Pharaoh ${sen_name}[/b], is that right?\" says the scribe, his teeth audibly clacking in fear of displeasing you, a most appropriate response from him, in your opinion.\n\n*fake_choice\n\t#Yes, Pharaoh ${sen_name}  is my name.  But clear the wax out of your ears at once!\"\n\t#\"You are deaf as a donkey, fool!  Only by the grace of Osiris do I let you continue to live.\"\n\t\t\"I am a miserable worm and do not deserve to live,\" says the scribe, his bony knees audibly knocking against one another.  \"Please, once again, tell me what is thy name.\"\n\t\t\n\t\t*goto putty\n\n*set sen_name \"Pharoah ${sen_name}\"\n\n*label donuts\n\nSlowly and with incredible precision, the scribe begins to stencil in the outline of your royal cartouche name onto the wall.\n\nLater, you know, artists will come in and add color and depth, transforming this simple underground space into a beautiful work of art, but only after the complex hieroglyph texts are printed onto the wall by the scribe.\n\nAnd none of that can begin until your royal name, ${sen_name}, is safe!\n\n*page_break 📿\n\nQuite simply put, that's what a cartouche is: a magic circle drawn around your name to protect it forever and ever.\n\nWhich is exactly what you deserve, of course!\n\n\"My Uplifted Eternal Commander of both Upper and Lower Egypt, would you like to know more about the mythological story that will be depicted on this wall of your glorious [i]mastaba[/i]?\" says Vizier ${vizier}.\n\n*fake_choice\n\t#\"Yes, I am always interested in learning about the Egyptian gods.\"\n\t\t*goto myth_stories\n\t#\"Perhaps another time, ${vizier}.  Now, I must return to my palace, for I require refreshment.\"\n\t\t*goto monument\n\t#\"I feel light-headed as though I am about to faint.\"\n\t\t\"Very well, mighty Pharaoh,\" says Vizier ${vizier}.  \"Get your rest, and then you will be able to smite your enemies on the Senet board and anywhere else that they challenge your blessed rule!\"\n\t\t*page_break\n\t\t*goto_scene main_menu\n\t\n*label myth_stories\n\n*gosub_scene sen_myths\n\n\"Shall we retire for your third meal of the day now, my most Excellent and Graceful ${sen_name}?\" says Vizier ${vizier}.\n\n\"Yes, we shall,\" you say, waiting impatiently for ${vizier} to lead the way.\n\n*label monument\n\n\"As you wish, most feared and respected Eternal Ruler, ${sen_name}, Champion of Egypt,\" says Vizier ${vizier}.\n\nYou follow him as he leads you down several long hallways and twisty passages, all alike, until you reach the valley entrance to your tomb.\n\nBut just as you step into the sunlight, you see your nemesis: ${sen_opponent}!\n\n*page_break 👑\n\n*label victory\n\n*if sound\n\t*sound laugh.wav\n\n\"Well, well,\" chortles ${sen_opponent}, striding over towards you.  \"Has Egypt fallen so low that now the mighty Pharaoh is visiting the simple tombs of servants?\"\n\n\"How dare you, Vulture of the ${direction}!\" shouts Vizier ${vizier}, stepping between you and ${sen_opponent}.  \"Where you stand is hallowed ground, for this is the funerary complex of the great ${sen_name}!\"\n\n*page_break 🏛️\n\n\"What, this tiny thing?\" scoffs ${sen_opponent}.  \"I built a larger funerary complex for my hunting dogs back in ${oppo_capital}!\"\n\nHearing such brazen insolence being spoken in front of my divine presence, Vizier ${vizier} begins breathing rapidly, his face reddening, and you fear that he may collapse to the ground at any moment.\n\nYour fists balled, you turn to face ${sen_opponent}.\n\n*if sen_games_won > 0\n\t\"I challenge you to a game of Senet!\" you thunder.\n\t*page_break 🎲\n\t*goto wagers\n\n*fake_choice\n\t#\"I shall feed you to the sacred crocodiles at Kom Ombo for that remark!\"\n\t#\"Mighty Osiris will strike you blind for your insolence!\"\n\t#\"One of us will be dead by the time Ra's chariot finishes crossing the heavens.\"\n\t\t\n\"In ${oppo_country}, such fiery words would be punishable by a gruesome death.  Alas, we are both divine rulers, and thus, we cannot risk spilling even a single drop of a deity's blood.  Therefore, we shall have to settle our grievances another way,\" says ${sen_opponent}.\n\n\"There is only one divine ruler here, and that is my Protector and Bringer of Peace and Serenity to Upper and Lower Egypt, ${sen_name}!\" shouts Vizier ${vizier}, lifting his mace to strike ${sen_opponent}.\n\n*page_break 🗡️\n\n\"My dear Vizier ${vizier}, stay thy arm, my faithful and loyal servant. As the divine guiding light for all the peoples of Egypt and wherever the four winds blow, I would never engage in combat with a false god,\" you say.\n\n\"Then, at the risk of offending both of your Most Worshipful Graces, may I propose that you two play a game of Senet in order to resolve this conflict?\" says Vizier ${vizier}.\n\n\"The game of kings, emperors, and rulers?  An excellent choice!  I shall enjoy trouncing you, ${sen_name},\" says ${sen_opponent}.\n\n*fake_choice\n\t#\"I am unfamiliar with this game.\"\n\t\t*goto instructions\n\t*selectable_if (wagers_won > 0) #\"We shall play Senet, and I will smite you down, jackal of the ${direction}!\"\n\t\t*goto wagers\n\t#\"I refuse to play this foolish game, for I desire to return to my palace at once.\"\n\t\t*goto_scene sen_game_over quitters\n\t\t\n*label instructions\n\n\"My most Worshipful King and Ruler of the Mightiest Empire in the world, do you remember your cousin Tutankhamen?\" says Vizier ${vizier}.\n\n\"Of course!\" you splutter.  \"Had something wrong with his foot, if I remember correctly.  Probably something he inherited from his crazy father.\"\n\n\"Exactly, Your Divine Majesty, ${sen_name}!\" cries Vizier ${vizier}.  \"He had a Senet board buried in his royal tomb to entertain him on his journeys through the afterlife.\"\n\n\"Very well, my dear ${vizier}.  I have been so busy smiting my enemies, that I temporarily forgot about the game, but I now give you permission to remind me of the rules,\" you say.\n\n*page_break 🤺\n\n\"As you command, Your Grace,\" says Vizier ${vizier}, bowing low before your divine presence.  \"The priests of Thebes say that the game originated in far-off Sumer near the Tigris River.  This may be a foul lie.  But even if it is not, we in Egypt have refined and improved the game, thus making it worthy of living gods such as your divine self.\"\n\n\"Enough with this obsequious flattery, Vizier ${vizier}!  Just tell poor old ${sen_name} how to play, and then the contest can begin!\" says ${sen_opponent} with a laugh.\n\nYou turn to face the pretender from ${oppo_country}.\n\n*fake_choice\n\t#\"Silence your blasphemous voice, ${dog} of the ${direction}!\"\n\t#\"Osiris has informed me that he is preparing a special place for you in the underworld for ${sen_opponent}.\"\n\t#\"Unlike in ${oppo_country}, we here in Egypt are taught to respect our superiors.\"\n\t\t\n\"Save that righteous anger for the Senet board!\" chortles ${sen_opponent}.\n\n\"Ignore this jackal and continue to refresh my divine memory of the rules of Senet,\" you command Vizier ${vizier}.\n\n\"Ah yes, My Most Exalted and High King,\" says Vizier ${vizier}.  \"Senet is a race game where the object is to get all of your tokens from Home Base across the board to Freedom.\"\n\n\"A race game?  Excellent!  For I am the fleetest of foot and Supreme Master of the War Chariot,\" you boast.\n\n\"Each player has seven tokens, and the game is not over until one player gets all seven of their tokens to Freedom,\" says Vizier ${vizier}. \n\n\"Senet is a game that is so simple that a child or slave may learn to play it in one minute.  But a true Expert may require a lifetime to master this sublimely wonderful game,\" says ${sen_opponent}.\n\n\"No one requires these loathsome interjections!\" cries Vizier ${vizier}, lifting his mace to strike ${sen_opponent}.\n\n*fake_choice\n\t#\"My good ${vizier}, there is no need to draw blood, yet.\"\n\t#\"Ignore that ${dog}, for I shall trounce him in the game.\"\n\t#\"Just continue with your explanations, Vizier ${vizier}.\"\n\t\t\n\"Yes, very good…\" mutters Vizier ${vizier}, giving ${sen_opponent} a dark glance.  \"The game begins with a roll of the dice, and one player will become Red, and the other Blue, with the Blue player going first.\"\n\n\"Seems simple enough,\" you say.\n\n\"Rolling the dice will result in a score from 1 to 4, and this tells you how many squares one of your pieces may move,\" says Vizier ${vizier}.  \"You cannot have two of your pieces on the same square, but if you land on a square occupied by the other player, you will capture that square and send his piece back to Home Base.\"\n\n*page_break 🎲\n\n\"Even an inbred like ${sen_name} will figure it out after just a minute or two,\" chuckles ${sen_opponent}.\n\nVizier ${vizier} raises his mace, but then he sees the stern expression on your face and slowly lowers it.\n\n\"The Red player's tokens will follow the red path on the board, naturally, while the Blue player's tokens will follow the Blue path.  The purple square are the only ones that can be captured by an opponent.  And there is one green square that cannot be captured,\" says Vizier ${vizier}.\n\n\"This might be easier if I could see the board,\" you say.\n\n\"Absolutely, my Divine Ruler and Most Blessed Majesty,\" cries Vizier ${vizier}, sinking to his knees.  \"One moment while I sketch out a Senet board for you in the dust on the floor.\"\n\n*page_break LOOK AT THE SENET BOARD\n\n*image senetmap.png\n\n\"It'll all make sense when you play,\" says ${sen_opponent}, somewhat too graciously in your opinion.\n\n\"May Horus strike you down, false god of ${oppo_country}!\" shouts Vizier ${vizier}.\n\n*fake_choice\n\t#\"Thank you for your instructions, my good vizier.  I am ready to play, now.\"\n\t\t\"At once, my most serene and perfect ${sen_name},\" says Vizier ${vizier}, running to fetch a Senet board and race tokens.\n\t#\"Explain it one more time like I am a 5-year-old Pharaoh.\"\n\t\t\"I shall endeavor to do my best,\" says Vizier ${vizier}.\n\t\t\n\t\t\"Just be quiet and proceed with it!\" you snarl in response.\n\t\t\n\t\t\"The goal is to get all seven of your pieces from one side of the board by rolling the dice and moving the corresponding amount of squares.  No square can have two pieces from the same time, but if you land on a purple square, and an opponent's token is there, you will capture the square and send his token back to Home Base,\" says Vizier ${vizier}.\n\t\t\n\t\t*fake_choice\n\t\t\t#\"I am not confident I understand, but I am ready to play, nonetheless.\"\n\t\t\t\t*goto wagers\n\t\t\t#\"Thoth has now illuminated my mind with understanding, so let play begin at once!\"\n\t\t\t\t*goto wagers\n\t\t\t#\"Let's start over from the beginning.\"\n\t\t\t\t\"As you command, my most Venerated King,\" says Vizier ${vizier}.\n\t\t\t\t*goto instructions\n\t\n*label wagers\n\n\"Now that we have agreed to play a game of Senet, let us make it interesting with a wager!\" says ${sen_opponent}, greedily rubbing his hands together. \n\n\"I pray for the poor people of ${oppo_country} who have to suffer this fool as their ruler,\" you mutter to yourself.\n\n*label icebox\n\n\"What do you have that could possibly interest someone as wealthy and powerful as I am?\" says ${sen_opponent}.\n\n*fake_choice\n\t#Wager a pyramid\n\t\t*set nonwager1 \"two hundred war chariots\"\n\t\t*set nonwager2 \"five kilograms of iron\"\n\t\t*goto pyramid\n\t#Wager 200 war chariots\n\t\t*set wager \"two hundred war chariots\"\n\t\t*set nonwager1 \"the Bent Pyramid\"\n\t\t*set nonwager2 \"five kilograms of iron\"\n\t\t*goto exchange\n\t#Wager five kilograms of meteoric iron\n\t\t*set wager \"five kilograms of iron\"\n\t\t*set nonwager1 \"the Bent Pyramid\"\n\t\t*set nonwager2 \"two hundred war chariots\"\n\t\t*goto exchange\n\t\n*label pyramid\n\n\"Why, my dear ${sen_name}, you old vulture!  You have hundreds of pyramids all over your kingdom, and most of them have already collapsed.  If we are going to make this game of Senet interesting, I want one of your better pyramids!\" chortles ${sen_opponent}.\n\n*fake_choice\n\t#Wager the Red Pyramid\n\t\t*set wager \"the Red Pyramid\"\n\t#Wager the Pyramid of Cheops\n\t\t*set wager \"the Pyramid of Cheops\"\n\t#Wager the Bent Pyramid\n\t\t*set wager \"the Bent Pyramid\"\n\t\t\n*label exchange\n\t\t\n\"$!{wager}, eh?  I think I can accept that.  Now, what can I offer in exchange that would interest a discerning pharaoh such as yourself?\" says ${sen_opponent}, rather too obsequiously for your taste.  \n\n\"Your scraps and leavings are of no interest to the mighty Pharaoh of both Upper and Lower Egypt,\" you thunder.\n\n\"Well, I have three options for you, ${sen_name}: ${obelisk}, ${non_oppo_wager1}, or ${non_oppo_wager2},\" says ${sen_opponent}.\n\n*fake_choice\n\t#Choose ${obelisk}\n\t\t*set oppo_wager \"${obelisk}\"\n\t#Choose ${non_oppo_wager1}\n\t\t*set oppo_wager non_oppo_wager1\n\t#Choose ${non_oppo_wager2}\n\t\t*set oppo_wager non_oppo_wager2\n\t\t\n\"All right,\" says Vizier ${vizier}.  \"If ${sen_opponent} wins this game of Senet, he shall win ${wager}.  But, of course, that will never happen, as ${sen_name} is a living deity.  Therefore, my master ${sen_name} will become the new owner of ${oppo_wager}.\"\n\n*fake_choice\n\t#\"That is correct, my good vizier.\"\n\t#\"Alas, you have made a terrible mistake!\"\n\t\t\"I pray to my Lady Isis to protect me!\" screams Vizier ${vizier}.\n\t\t\n\t\t\"Cease your protestations, worm!\" you shout. \"Let's just get these wagers right.\"\n\t\t\n\t\t*goto icebox\n\t\t\n\"Let this game of Senet begin!\" shouts ${sen_opponent}.\n\n*goto_scene sen_hard_reset\n\n*goto_scene ending", "sen_liberator": "\n*label 0\n\n*return\n\n*label 1\n\n*set player_square1 \"free\"\n\n*return\n\n*label 2 \n\n*set player_square2 \"free\"\n\n*return\n\n*label 3\n\n*set player_square3 \"free\"\n\n*return\n\n*label 4\n\n*set player_square4 \"free\"\n\n*return\n\n*label 5\n\n*set square5 \"free\"\n*return\n\n*label 6\n\n*set square6 \"free\"\n*return\n\n*label 7\n\n*set square7 \"free\"\n*return\n\n*label 8\n\n*set square8 \"free\"\n\n*return\n\n*label 9\n\n*set square9 \"free\"\n*return\n\n*label 10\n\n*set square10 \"free\"\n*return\n\n*label 11\n\n*set square11 \"free\"\n*return\n\n*label 12\n\n*set square12 \"free\"\n*return\n\n*label 13\n\n*set player_square13 \"free\"\n\n*return\n\n*label 14\n\n*set player_square14 \"free\"\n\n*return\n\n*label 15\n\n*return\n\n*label 16\n\n*return\n\n*label 17\n\n*return\n\n*label 18\n\n*return\n", "sen_myths": "*rand dieroll 1 3\n\n*if dieroll = 1\n\t*gosub 1\n\t*return\n\t\n*if dieroll = 2\n\t*gosub 2\n\t*return\n\t\n*if dieroll = 3\n\t*gosub 3\n\t*return\n\n\n*label 1\n\n\"A long, long time ago, just after the Primordial Mound has risen from the waters, the god Osiris came to the land of Egypt to rule as king,\" begins Vizier ${vizier}.  \"As a very wise and powerful king, Osiris was loved and respected by all of his subjects.  But this caused his brother Seth to become jealous!\"\n\n\"Interesting family dynamics,\" you say.\n\n\"One night, as Osiris slept in his royal bedroom with his wife, Isis, the dastardly Seth crept over to his sleeping king and began taking careful measurements of the king's body.\"\n\n\"Creepy!\" you declare.\n\n\"Later, Seth used the measurements to build a beautiful wooden chest, brilliantly sheathed in gold and decorated with many costly jewels.  Once the chest had been built, Seth invited his brother to a party at his house,\" says Vizier ${vizier}.\n\n\"Surely, a party will heal the rift between the two brothers!\" you say.\n\n*page_break 🐊\n\n\"For many hours, Osiris, Seth, and the people at the party ate, drank, and sang.  After all the guests were in a stupor, Seth brought out the golden chest and declared that anyone who could fit in it perfectly would take it home as their prize,\" continues Vizier ${vizier}.\n\n\"Aha!  Now, we know why Seth needed his brother's measurements,\" you declare.\n\n\"Indeed, my king,\" says Vizier ${vizier}.  \"One by one, the guests at the party all clambered inside the golden chest, but it was clear that it was not a good fit.  Finally, Osiris decided to try his luck, so he climbed inside the golden chest.\"\n\n\"Well, it's not the most amazing treasure, but [i]I[/i] wouldn't say no to a golden chest,\" you muse.\n\n\"Just then, Seth slammed down the lid of the golden chest!\" says Vizier ${vizier}.  \"A moment later, he and his friends began nailing the lid shut so that Osiris could not escape.\"\n\n*fake_choice\n\t#\"Woah, I did not see that coming!\"\n\t#\"Seth has truly shown himself to be a traitor.\"\n\t#\"I trust that Lord Osiris has an escape plan.\"\n\t\t\n\"With the help of some of his friends, Seth dragged the golden chest with Osiris inside down to the River Nile where they heaved it into the waters.  A moment later, the chest sank out of sight,\" says Vizier ${vizier}.\n\n\"What perfectly perfidious behavior,\" you declare.\n\n\"Word traveled to Isis, and she dashed down to the river to search for her beloved husband.  After several hours, she found the golden chest, and she summoned enormous strength to drag it over to the bank of the river, where she pulled his corpse onto the grass,\" says Vizier ${vizier}.\n\n\"I would've liked to see such a feat of strength from a woman,\" you say.\n\n\"Unfortunately, as Isis began to perform the funerary rites to ensure her husband's passage to the underworld, she discovered that a creature in the river had consumed his penis.  And without an intact body, she could not successfully perform the rites,\" says Vizier ${vizier}.\n\n\"That was quite an interesting development to this story,\" you opine.\n\n*page_break 🐊\n\n\"Later, Isis managed to negotiate with the creatures of the river to get her husband's lost body part.  She and her sisters the used linen bandages to make Osiris's body whole once again,\" says Vizier ${vizier}.\n\n\"I suppose that might work,\" you muse.\n\n\"Isis then performed the funerary rites, and for a moment, her magic brought Osiris back to life.  He told her that he could not remain in the world of the living, but not to mourn him, for he had decided to become the king of the afterlife and rule there for eternity,\" says Vizier ${vizier}.\n\n\"A just decision from the wisest and fairest of the gods,\" you concur.\n\n\"Furthermore, Osiris told his wife that she was pregnant and would soon give birth to a son, Horus, and Horus would grow up to defeat Seth.  Furthermore, Horus would become the great protector of the Egyptian people, starting with their Eternal and Blessed ${sen_name},\" concludes Vizier ${vizier}.\n\n\"Thank you for sharing that wonderful story with me, Vizier ${vizier},\" you say.  \"But now I am in need of refreshment.\"\n\n*page_break 🐊\n*return\n\n*label 2\n\n\"In this section of your funerary tomb, my Exalted and Glorious ${sen_name}, the scribes and artists shall depict the journey that you will take through the afterlife,\" says Vizier ${vizier}.\n\n\"There are many customs, rites, and traditions about the afterlife in our glorious society, my dear ${vizier},\" you say.  \"Which one shall be depicted in this section of my mastaba?\"\n\n\"This panel will describe the Weighing of the Heart,\" says Vizier ${vizier}.\n\n\"Ah, yes!  I will hear of this once more,\" you say.\n\n\"On a soul's journey to the afterlife, it will travel far across a strange and mysterious land until it meets with Anubis,\" says Vizier ${vizier}.\n\n\"The god with the head of a jackal, who is also the god worshiped by the priests who specialize in the embalming arts,\" you say.\n\n\"Exactly, my most educated and wise Divine King!\" says Vizier ${vizier}. \n\n*page_break 🐊\n\n\"Tell me more, ${vizier},\" you say.\n\n\"Anubis, however, is only present there to guard a set of cosmic scales,\" says Vizier ${vizier}.  \"The scales actually belong to Maat, the goddess of truth.\"\n\n\"Truth [i]and[/i] justice,\" you declare.\n\n\"Yes, that is correct, my most Worshipful Ruler,\" says Vizier ${vizier}.  \"Maat will then place your heart on the scale to weigh it against her Sacred Feather of Knowledge.\"\n\n\"The heart is where all of the good and bad deeds of a person's life are recorded, for only the righteous may dwell in the underworld with Lord Osiris,\" you say.\n\n\"Correct again, Smiter of the Sand People and Ruler of the Golden Lands,\" says Vizier ${vizier}.  \"After your heart is weighed against Maat's feather, the results are recorded by Thoth, the god of writing.\"\n\n\"Ah yes, the god with the head of an ibis, that strange bird that lives down in the swamps,\" you say.\n\n\"Your knowledge is divine and everlastingly brilliant, my ${sen_name},\" says Vizier ${vizier}.\n\n*page_break 🐊\n*return\n\n*label 3\n\n\"Many, many years ago, when a different dynasty of Pharaohs ruled Egypt, a love developed between a man and a woman that was so strong that its bonds remain unshaken to this day,\" says Vizier ${vizier}.\n\n\"Goodness!  I would hear more about this celestial union,\" you say.\n\n\"At that time, in the port town of Rhakotis in the far north of Egypt, there lived a prosperous merchant.  His ships plied the entirety of the Mediterranean Sea, bringing back luxuries and exotic spices, and it was not long until he was rich enough to upgrade his slaves,\" says Vizier ${vizier}.\n\n\"Ah yes, the port of Rhakotis.  I do believe that some of those curious foreigners called the Greeks refer to the city as Alexandria.  Indeed, the regional governor has informed me that they also wish to build a library there!\" you declare.\n\n\"It is a blessed and wondrous omen that you mentioned the Greeks, my most Holy and Powerful King,\" says Vizier ${vizier}.  \"For this story is about a Greek slave.\"\n\n\"I wish to hear more of this,\" you command your vizier.\n\n*page_break 🐊\n\n\"In order to impress his wife, the merchant of Rhakotis sent his ships north, west, and east in order to find a pretty young girl to serve as a house maid.  And it was his most trusted captain who found Rhodopis and brought her back to Egypt,\" says Vizier ${vizier}.\n\n\"The slave girl is named Rhodopis,\" you say.\n\n\"Most correct, as you always are, my Exalted and Majestic King of Kings,\" says Vizier ${vizier}.  \"And when the people of Rhakotis saw the beauty of the merchant's new maid, her fame grew until she was known throughout Egypt.\"\n\n\"With such fame, this Rhodopis girl must truly have been a sight to behold,\" you declare.\n\n\"Soon, all of the nobles in the pharaoh's court were talking about her, until the Pharaoh himself declared that he would find this Greek girl and marry her,\" says Vizier ${vizier}.\n\n\"Truly, a match made in heaven!\" you say.\n\n*page_break 🐊\n\n\"Fearing that someone would steal away Rhodopis from him, the merchant moved her to a remote farm that he owned far away from the prying eyes in the city,\" says Vizier ${vizier}.\n\n\"What kind of blackguard would deny his Divine King their wishes?\" you thunder.\n\n\"Forsooth, my ${sen_name}, you speak true, for the pharaoh at that time soon grew incensed with rage,\" says Vizier ${vizier}.  \"The Pharaoh sent out his troops with orders to find the beautiful Rhodopis.\"\n\n\"With such a decisive and righteous decision, his satisfaction is sure to be coming swiftly,\" you declare.\n\n\"Alas, my Most Blessed and High King, the pharaoh's troops searched far and wide but could find no trace of the slave girl,\" says Vizier ${vizier}.\n\n\"I cannot bear this injustice a moment longer!\" you shout.\n\n*page_break 🐊\n\n\"My most Eternally Patient and Divinely Serene King, do not doubt that the gods will see into the heart of the matter and render justice unto such a worthy subject as the pharaoh,\" says Vizier ${vizier}.\n\n\"By the Sacred Feather of Maat, you are right, my dear ${vizier},\" you declare.\n\n\"For it was Horus himself who sent an eagle down from the heavens to the isolated farm where Rhodopis lived.  The Greek girl became frightened when she saw the eagle, and as she turned to run back towards the house, she lost one of her shoes,\" says Vizier ${vizier}.\n\n\"May Horus watch over all of the divine rulers of Egypt,\" you solemnly state.\n\n\"The eagle sent by Horus then flew to the palace and delivered the shoe directly onto the pharaoh's lap while he was sitting on his throne,\" says Vizier ${vizier}.\n\n\"I find this story very pleasing,\" you say.\n\n*page_break 🐊\n\n\"Thank you, my most Triumphant Champion and Defender of Egypt, says Vizier ${vizier}.  \"After the shoe landed on his lap, the pharaoh immediately knew by its dainty size, rose-red color, and delicate odor that it could only belong to the fair Rhodopis.\"\n\n\"A shoe truly fit for a royal wife,\" you say.\n\n\"The eagle sent by Horus then led the pharaoh back to the remote farm where Rhodopis was working, and he instantly fell in love with the beautiful young Greek girl,\" says Vizier ${vizier}.\n\n\"So romantic,\" you proclaim.\n\n\"The pharaoh and Rhodopis were married at once.  And she soon grew to become his favorite royal wife and most trusted advisor.  With her support, the pharaoh ruled wisely and justly for many years.  And she bore him many royal children,\" concludes Vizier ${vizier}.\n\n\"Perhaps I should start scanning the heavens for an eagle of my own,\" you say with a laugh and an exaggerated wink.\n\nFor a long moment, Vizier ${vizier} looks at you with a fearful look on his face before breaking out into a grin.  \"Most humorous, m om15_sabotage false\n*set room16_sabotage false\n*set room17_sabotage false\n*set room18_sabotage false\n*set room19_sabotage false\n*set room20_sabotage false\n\n*return", "sta_intro": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Interactive Bonbons[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2022-02-10 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\n*if sound\n\t*sound snort.wav\n\nWith a snort, you jolt yourself into wakefulness.\n\nBlinking against the harsh glare over the overhead lighting in the spaceport's rental quarters, you slowly swivel out of your bunk and over to the metal sink embedded in the wall.\n\nGlancing down at your communicator, you see that you have just fifteen minutes left before you need to report to your new ship.\n\n\"I wonder what rusted-out mining hulk the personnel department at Zumanji Corp will send me to this time,\" you mutter to yourself.\n\n*page_break\n\n*if sound\n\t*sound bing.wav\n\nJust then, your comm system beeps with a message from the Zumanji Corporation:\n\t\n📟 [i]\"${title}, you are hereby ordered to proceed to TelPort station 5 to report for duty aboard ${spaceship}.\"[/i]\n\n*page_break Close message\n\t\nWell, that is interesting!\n\nUnlike your previous assignments, you have actually heard of ${spaceship}.\n\nIn fact, it is one of the Zumanji Corporation's newest range of spaceships.\n\nCould it be that you are being rewarded for all your decades of hard work with a promotion?\n\nIt's about time…\n\t\n*fake_choice\n\t#Proceed to TelPort station 5\n\t#Take another nap\n\t\t*goto_scene main_menu\n\t\nAfter taking the crosstube line, you arrive at TelPort station 5 only a few moments late.\n\nYou then step into the narrow metal cylinder and place your palm on the scanner.\n\nA moment later, the computer whirs to life.\n\n*if rank > 3\n\tIDENTITY CONFIRMED - $!!{title} $!!{sta_name}\n\t*page_break Engage!\n\t*if sound\n\t\t*sound teleport.wav\n\t*goto_scene sta\n\n[i]IDENTIFY YOURSELF[/i]\n\nWhat is your name, ${title}?\n\n*input_text sta_name\n\n*label smart\n*gosub_scene sta_hard_reset\n\n*temp spock \"\"\n\n*rand dieroll 1 10\n\n*if dieroll = 1\n\t*set spock npc1\n\t\n*if dieroll = 2\n\t*set spock npc2\n\t\n*if dieroll = 3\n\t*set spock npc3\n\t\n*if dieroll = 4\n\t*set spock npc4\n\n*if dieroll = 5\n\t*set spock npc5\n\t\n*if dieroll = 6\n\t*set spock npc6\n\t\n*if dieroll = 7\n\t*set spock npc7\n\t\n*if dieroll = 8\n\t*set spock npc8\n\t\n*if dieroll = 9\n\t*set spock npc9\n\t\n*if dieroll = 10\n\t*set spock npc9\n\t\nIDENTITY CONFIRMED\n\n*if sound\n\t*sound teleport.wav\n\nSTAND BY FOR TRANSFER\n\n*page_break Engage\n\t\n*if sound\n\t*sound bing.wav\n\nYou are on [b]the Bridge[/b] of ${spaceship} 🛸\n\n\"An urgent message has arrived from Zumanji Corporation Headquarters!\" reports ${spock}.\n\n\"Put it on the main screen,\" you say.\n\nA moment later, the video message begins to play.\n\n\"This message is EYES ONLY for ${title} ${sta_name}!\"\n\n\"Clear the bridge!\" you order.\n\n\"Aye-aye, ${title},\" says ${spock}, scurrying out of the room along with the other members of the Bridge crew.\n\n*page_break\n\nOnce you are completely alone on [b]the Bridge[/b], you resume playing the message.\n\n\"${title} ${sta_name}, the Zumanji Corporation has received warning from ${spaceship}'s onboard medical computer that there may be a case of Wumpus Fever aboard your ship.\"\n\n\"Gadzooks!\" you say.\n\n*page_break\n\n*if sound\n\t*sound doorclose.wav\n\n\"As such, we have sealed off your ship, ${title}.  No transports in or out without our express permission,\" continues the message.\n\n\"Lockdown!\" you exclaim.\n\n\"Unfortunately, the detected levels of Wumpus Fever aboard your ship are too low right now for our scans to be able to identify which one of your ten crew members might be infected,\" continues the message.\n\n*page_break\n\n\"Just great,\" you say, kicking the console next to you.\n\n\"If the Wumpus Fever infection develops, it may cause a wide variety of symptoms, including a dramatic change in the infected crew member's behavior. They may begin by lashing out at the ship, destroying control panels or refusing to perform their normal duties,\" continues the message.\n\n\"Sounds like someone's salary wasn't paid on time [i]again[/i],\" you say through gritted teeth.\n\n\"In some cases, the infected crew member may even become violent and began attacking their fellow employees,\" continues the message.\n\n\"That Wumpus Fever is no joke,\" you softly mutter to yourself.\n\n*page_break\n\n\"${title} ${sta_name}, the Zumanji Corporation urgently needs you to track down and eliminate the infected crew member, if you discover one. There are only twenty compartments on your ship, so it should not be too difficult,\" continues the message.\n\n\"Eliminate?\" you muse to yourself.\n\n*page_break 🔪😱\n\n\"Under the terms of your contract in Section 7, Subsection 142, Appendix B, you may be authorized and impelled to use deadly force against any crew member who exhibits signs of Wumpus Fever,\" continues the message.\n\n\"I'll prepare a quarantine section on the ship right away,\" you say.\n\n\"Once a case of Wumpus Fever has fully developed, no quarantine can contain it.  Your only option is to eliminate the host body.  Good luck, ${title}!\" concludes the message.\n\nAs the message winks off of the main screen, you realize with a gulp that it is up to you to track down the possibly infected crew member before they destroy ${spaceship} and everyone else on it!\n\n*page_break Muster Crew\n\n*goto_scene sta", "sta_retirement": "*achieve staeradicate\n\n*if sound\n\t*sound grandwinner.wav\n\n\"${title} ${sta_name}, thanks to all of your hard work, Wumpus Fever has now been completely eliminated from the corporate fleet.\" says the message.\n\n\"Finally!\" you shout.\n\n\"All of us at the Zumanji Corporation mourn the loss of ${sta_total_losses} innocent lives which were lost during the lockdown, but your elimination of the ${sta_total_wins} infected persons has ultimately saved the lives of millions of people across the galaxy,\" continues the message.\n\n\"Gosh, my parents would be so proud,\" you say in a quiet voice.\n\n*page_break\n\n*gosub_scene npc_color\n\n\"Your deeds shall forever be honored at the Zumanji Corporation, ${title} ${sta_name}, but we are hereby informing you that your employment contract with us is now terminated,\" continues the message.\n\n\"Terminated?  I'm the ${title} of the entire fleet, and I just wiped out the worst case of Wumpus Fever in the history of space travel,\" you shout at the screen.\n\n\"${npc1}, you are hereby authorized to beam away ${title} ${sta_name} and commence decontaminating the spaceship,\" concludes the message from the Zumanji Corporation.\n\n\"It was a pleasure serving with you, ${title},\" says ${npc1}, giving you a crisp salute.\n\n*fake_choice\n\t#\"You ungrateful monsters!\"\n\t#\"It was my honor to serve the Zumanji Corporation.\"\n\t#\"You can kill me, but you can't stop the truth from getting out.\"\n\t\t\n*if sound\n\t*sound teleport.wav\n\t\n${npc1} presses a button on their console, and a moment later, you feel the transport beam begin to dematerialize your body.\n\nYou close your eyes and take in one last lungful of air.\n\nA moment later, you are gripped in the icy claws of a hideous, evil, sterile nothingness.\n\nAnd that is when you say goodbye, flinging your eyes wide open as you exhale your very last breath.\n\nYour soul then begins to swim towards the stars as you answer the eternal call to return Home.\n\n*page_break 🌟\n\n*set rank 1\n*set title \"Swabby\"\n\n\n*goto_scene main_menu", "sta_splash": "*image stabby.jpg\n\n*if sound\n\t*sound girlscream.wav\n\n*page_break STAB THE ASSASSIN!\n\n*goto_scene sta_intro", "startup": "*title Interactive Bonbons 🍬\n*author Sam Urs
