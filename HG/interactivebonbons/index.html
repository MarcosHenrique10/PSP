<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Bonbons 🍬 — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "interactivebonbons", "title": "Interactive Bonbons 🍬", "scenes": {"academic": "*gosub_scene sen_soft_reset\n\n[i]The game you are about to play goes by many names, including Senet, Mehen, and the Royal Game of Ur.[/i]\n\n[i]For more than three thousand years, Senet was the most popular game in the Fertile Crescent region (today's Middle East).[/i]  \n\n[i]A Senet game board was discovered in the tomb of Pharaoh Tutankhamen to entertain him in the afterlife.[/i]\n\n[i]Peasants, nobles, and kings alike played Senet, and sometimes, vast fortunes were won or lost during a game.  [/i]\n\n[i]The board used in this game is a facsimile of the one unearthed in 1924 by Sir Charles Leonard Woolley which was some 4,500 years old.[/i]\n\n[i]The rules used in this game were elucidated by Irving Finkel, the Assistant Keeper of Ancient Mesopotamian script, languages, and cultures in the Department of the Middle East in the British Museum.[/i]\n\n[i]It only takes one minute to learn how to play Senet, but it can take a lifetime to master.[/i]\n\n*label smart\n\n*fake_choice\n\t#Begin game\n\t\t*goto_scene sen_intro\n\t#Return to main menu\n\t\t*goto_scene main_menu\n\n*label soundon\n\n*set sound true\n*sound egypt.wav\n\nSound has been [b]ACTIVATED[/b].\n\n*goto smart\n\n*label soundoff\n\n*set sound false\n\nSound has been turned [b]OFF[/b].\n\n*goto smart", "action_list": "*if choice_quicktest\n\t*set npc1_loc 1\n\t*set npc2_loc 1\n\t*set npc3_loc 1\n\t*set npc4_loc 1\n\t*set npc5_loc 1\n\t*set npc6_loc 1\n\t*set npc7_loc 1\n\t*set npc8_loc 1\n\t*set npc9_loc 1\n\t*set npc10_loc 1\n\n*label npc1\n\n*if npc1_assassin\n\t*if choice_quicktest\n\t\t*set npc1_loc 1\n\t\t*set npc2_loc 1\n\t\t*set npc3_loc 1\n\t\t*set npc4_loc 1\n\t\t*set npc5_loc 1\n\t\t*set npc6_loc 1\n\t\t*set npc7_loc 1\n\t\t*set npc8_loc 1\n\t\t*set npc9_loc 1\n\t\t*set npc10_loc 1\n\t*set target npc1\n\t*gosub_scene npc_router {npc1_loc}\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc1\n\t*gosub normal\n\t*goto ring\n\n\n*label npc2\n\n*if npc2_assassin\n\t*set target npc2\n\t*gosub_scene npc_router {npc2_loc}\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc2\n\t*gosub normal\n\t*goto ring\n\n\n*label npc3\n\n*if npc3_assassin\n\t*set target npc3\n\t*gosub_scene npc_router {npc3_loc}\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc3\n\t*gosub normal\n\t*goto ring\n\n\n*label npc4\n\n*if npc4_assassin\n\t*set target npc4\n\t*gosub_scene npc_router {npc4_loc}\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc4\n\t*gosub normal\n\t*goto ring\n\n\n*label npc5\n\n*if npc5_assassin\n\t*gosub_scene npc_router {npc5_loc}\n\t*set target npc5\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc5\n\t*gosub normal\n\t*goto ring\n\n*label npc6\n\n*if npc6_assassin\n\t*gosub_scene npc_router {npc6_loc}\n\t*set target npc6\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc6\n\t*gosub normal\n\t*goto ring\n\n*label npc7\n\n*if npc7_assassin\n\t*gosub_scene npc_router {npc7_loc}\n\t*set target npc7\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc7\n\t*gosub normal\n\t*goto ring\n\n*label npc8\n\n*if npc8_assassin\n\t*gosub_scene npc_router {npc8_loc}\n\t*set target npc8\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc8\n\t*gosub normal\n\t*goto ring\n\n*label npc9\n\n*if npc9_assassin \n\t*gosub_scene npc_router {npc9_loc}\n\t*set target npc9\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc9\n\t*gosub normal\n\t*goto ring\n\n*label npc10\n\n*if npc10_assassin\n\t*gosub_scene npc_router {npc10_loc}\n\t*set target npc10\n\t*gosub assassinate\n\t*goto ring\n*else\n\t*set target npc10\n\t*gosub normal\n\t*goto ring\n\n*label ring\n\n*return\n\n*label normal\n\n*rand dieroll 1 10\n\n*if dieroll = 1\n\t🛂- ${target} fiddles around with some controls.\n\t\n*if dieroll = 2\n\t🛂-${target} appears to be performing their normal work duties.\n\t\n*if dieroll = 3\n\t🛂-${target} seems nervous and out of breath.\n\t\n*if dieroll = 4\n\t🛂-${target} looks a bit scared but is otherwise acting normally.\n\t\n*if dieroll = 5\n\t🛂-${target} has a suspicious look on their face.\n\t\n*if dieroll = 6\n\t🛂-${target} is fidgeting with their uniform.\n\t\n*if dieroll = 7\n\t🛂-${target} is performing routine maintenance work.\n\t\n*if dieroll = 8\n\t🛂-${target}'s eyes are darting to and fro in a very odd manner.\n\t\n*if dieroll = 9\n\t🛂-${target} is smiling and whistling a happy tune.\n\t\n*if dieroll = 10\n\t🛂-${target} gives you a respectful salute.\n\n\n*if target != assassin\n\t*gosub_scene room_fix {room}\n\t\n*return\n\n*label assassinate\n\n*if victims_remaining = 0\n\t*gosub_scene duel\n\t\n*rand dieroll 1 3\n\n*if dieroll = 1\n\t${target} leaves this area and moves to ${route1description}.\n\t\t\n\t*if target = npc1\n\t\t*set npc1_loc {npcroute1}\n\t\t\n\t*if target = npc2\n\t\t*set npc2_loc {npcroute1}\n\t\t\n\t*if target = npc3\n\t\t*set npc3_loc {npcroute1}\n\t\t\n\t*if target = npc4\n\t\t*set npc4_loc {npcroute1}\n\t\t\n\t*if target = npc4\n\t\t*set npc4_loc {npcroute1}\n\t\t\n\t*if target = npc5\n\t\t*set npc5_loc {npcroute1}\n\t\t\n\t*if target = npc6\n\t\t*set npc6_loc {npcroute1}\n\t\t\n\t*if target = npc7\n\t\t*set npc7_loc {npcroute1}\n\t\t\n\t*if target = npc8\n\t\t*set npc8_loc {npcroute1}\n\t\t\n\t*if target = npc9\n\t\t*set npc9_loc {npcroute1}\n\t\t\n\t*if target = npc10\n\t\t*set npc10_loc {npcroute1}\n\t\t\n\t*goto chile\n\t\t\n*if dieroll = 2\n\t${target} leaves this area and moves to ${route2description}.\n\t\t\n\t*if assassin = npc1\n\t\t*set npc1_loc {npcroute2}\n\t\t\n\t*if assassin = npc2\n\t\t*set npc2_loc {npcroute2}\n\t\t\n\t*if assassin = npc3\n\t\t*set npc3_loc {npcroute2}\n\t\t\n\t*if target = npc4\n\t\t*set npc4_loc {npcroute3}\n\t\t\n\t*if assassin = npc4\n\t\t*set npc4_loc {npcroute2}\n\t\t\n\t*if assassin = npc5\n\t\t*set npc5_loc {npcroute2}\n\t\t\n\t*if target = npc6\n\t\t*set npc6_loc {npcroute2}\n\t\t\n\t*if target = npc7\n\t\t*set npc7_loc {npcroute2}\n\t\t\n\t*if target = npc8\n\t\t*set npc8_loc {npcroute2}\n\t\t\n\t*if target = npc9\n\t\t*set npc9_loc {npcroute2}\n\t\t\n\t*if target = npc10\n\t\t*set npc10_loc {npcroute2}\n\t\t\n\t*goto chile\n\t\n*if dieroll = 3\n\t${target} leaves this area and moves to ${route3description}.\n\t\t\n\t*if assassin = npc1\n\t\t*set npc1_loc {npcroute3}\n\t\t\n\t*if assassin = npc2\n\t\t*set npc2_loc {npcroute3}\n\t\t\n\t*if target = npc3\n\t\t*set npc3_loc {npcroute3}\n\t\t\n\t*if assassin = npc4\n\t\t*set npc4_loc {npcroute3}\n\t\t\n\t*if assassin = npc4\n\t\t*set npc4_loc {npcroute3}\n\t\t\n\t*if assassin = npc5\n\t\t*set npc5_loc {npcroute3}\n\t\t\n\t*if target = npc6\n\t\t*set npc6_loc {npcroute3}\n\t\t\n\t*if target = npc7\n\t\t*set npc7_loc {npcroute3}\n\t\t\n\t*if target = npc8\n\t\t*set npc8_loc {npcroute3}\n\t\t\n\t*if target = npc9\n\t\t*set npc9_loc {npcroute3}\n\t\t\n\t*if target = npc10\n\t\t*set npc10_loc {npcroute3}\n\t\t\n\t*goto chile\n\t\t\n*label chile\n\t\t\n*return\n\t\n", "bj_instructions": "*label instructions\n\n\"The game is sometimes known as \"21\" and is really simple to play,\" snarls the dealer.  \"I have six decks of cards here, and each card is numbered one to eleven.\"\n\n\"Okay,\" you respond.\n\n\"I will deal you two cards face-up and then deal myself two cards.  The point total of the cards determines who wins or loses, and the object of the game is to get as close to 21 as you can [i]without[/i] going over,\" says the dealer.\n\n\"I see,\" you say.\n\n\"If you get 21 points on your first two cards, you immediately win.  Otherwise, you can ask for another card, called a \"hit\", or you can \"stay\" with the cards you have,\" says the dealer.\n\n\"I understand,\" you reply.\n\n\"If you ever go over 21 points, you automatically lose.  Likewise, if I go over 21 points, you win.  And if the game ends with both of us having the same amount of points, that's a \"push\" and you neither win nor lose any money,\" says the dealer.\n\n*fake_choice\n\t#\"I'm ready to play now!\"\n\t\t\"Finally!\" says the dealer.\n\t\t\n\t\t\"Hey now,\" you protest.\n\t\t*return\n\t*disable_reuse #\"Can you explain that once again?\"\n\t\t*goto instructions\n", "bj_intro": "*if birthday = false\n\t*rand money 450 600\n\nPulling out the wad of cash in your pocket, you see that you have just $${money} left to your name.\n\n*if birthday\n\tBut just then, you look up to see the word \"CASINO\" written above the door on a nearby building.\n\t\n\t*fake_choice\n\t\t#Go into the casino and gamble\n\t\t\t*goto_scene blackjack\n\t\t#Spend your money on alcohol\n\t\t\t*set money 0\n\t\t\t*goto quitters\n\nUnfortunately, you will need at least a thousand dollars in order to surprise your mother with a special dinner for her birthday in three weeks.\n\nHow in the world are you going to double your money in such a short amount of time?\n\nBut just then, you look up to see the word \"CASINO\" written above the door on a nearby building.\n\n*fake_choice\n\t#Go into the casino and gamble\n\t\t*goto_scene blackjack\n\t#Get a job to earn the money\n\t#Spend all your money on alcohol\n\t\t*set money 0\n\t\t*goto_scene main_menu\n\t\t\n*label job\n\nYou realize that working for an hourly wage is the only safe way to earn money, so you start scouring the \"Help Wanted\" ads.\n\nUnfortunately, even though you respond to dozens of them, nobody seems interested in hiring you.\n\nSlowly, your money begins to dissipate until all you have left is the $100 that your grandmother sent you a couple of years ago for your birthday.\n\n*set money 100\n\nIf you are going to be able to treat your mother the way that she deserves, you are going to have to find a way to make some money very quickly!\n\n*fake_choice\n\t#Go back to the casino and gamble\n\t\tYou trudge back to the casino and pull open the heavy door.\n\t\t\n\t\t*goto_scene blackjack\n\t#Make your mother a homemade gift\n\t\t\n\"Oh thank you, dear,\" says your mother bravely as you hand her your simple, homemade birthday gift.  \"You didn't have to.\"\n\n\"It's all I could do for my favorite woman in the world,\" you respond.\n\n\"I love it.  But I do wish we could've gone to eat at my favorite restaurant this year.  I absolutely love some of their dishes,\" says your mother.\n\n\"Maybe next year, Mom,\" you say, balling up your fists and placing them into your pockets.\n\n\"Maybe next year,\" says your mother wistfully as a tear slowly slides down her delicate cheek.\n\n*fake_choice\n\t#Wait patiently until next year\n\t\tYou resolve that your mother will never be disappointed on her birthday again!\n\t\t*page_break Another year passes\n\t\t*goto_scene bj_intro\n\t#Forget about your mother for a while\n\t\t*goto quitters\n\n*label birthday\n\nNow that you have enough money, it's time to treat your mom right!\n\nThat's why you take her out to her favorite restaurant, where she happily eats like a pig.\n\nAfter stuffing herself silly, your mother gives out a long, loud burp, causing the two of you to break out into smiles.\n\n\"That's my Ma!\" you crow with delight.\n\n*goto_scene ending\n\n*label quitters\n\n*goto_scene main_menu", "bj_splash": "*image blackjackmama.jpg\n\n*if sound\n\t*sound shuffle2.wav\n\n*page_break Blackjack Mama\n\n*goto_scene bj_intro", "blackjack": "*if sound\n\t*sound casino.mp3\n\nYou step inside the casino and are immediately overwhelmed by flashing lights and dozens of different tables where all sorts of different games are being played.\n\n*if birthday\n\t\"Well, well, looks like you're back, ${bj_name},\" says the dealer, looking up at you with a grin.\n\t\n\t*fake_choice\n\t\t#\"I sure am, so let's play some blackjack!\"\n\t\t\t*goto play\n\t\t#\"Hey, that's not my name.\"\n\t\t\t*goto ice\n\t\t#\"I really need to quit gambling.\"\n\t\t\t*goto_scene main_menu\n\nNot being overly familiar with how casinos work, you wander over to the only table that you recognize, the one that says \"Blackjack,\" and take a seat.\n\n\"Ready to play?\" asks the dealer.  \"Or do you need instructions on how to play Blackjack?\"\n\n*fake_choice\n\t#\"Let's play!\"\n\t*selectable_if (birthday = false) #\"I need some help.\"\n\t\t*gosub_scene bj_instructions\n\t\t\n*label ice\n\n\"All right. What's your name, pal?\" says the dealer.\n\n*input_text bj_name\n\n\"${bj_name}? That's a weird name,\" grunts the dealer.\n\n\"My beloved mother chose it, so I don't want to hear any more comment about it from you.  Let's play some Blackjack!\" you exclaim.\n\n*label play\n\n*set play_pts 0\n*set deal_pts 0\n\n*rand dieroll 1 2\n\n*if dieroll = 1\n\t*if sound\n\t\t*sound shuffle1.wav\n\t\t\n*if dieroll = 2\n\t*if sound\n\t\t*sound shuffle2.wav\n\n\"All right. What's your bet?\" asks the dealer, expertly shuffling the cards in a blur of motion.\n\nYou have [b]$${money}[/b] to your name.\n\n*choice\n\t*selectable_if (money > 0) #Bet 1 dollar\n\t\t*set bet 1\n\t\t*goto check\n\t*selectable_if (money > 4) #Bet 5 dollars\n\t\t*set bet 5\n\t\t*goto check\n\t*selectable_if (money > 9) #Bet 10 dollars\n\t\t*set bet 10\n\t\t*goto check\n\t*selectable_if (money > 24) #Bet 25 dollars\n\t\t*set bet 25\n\t\t*goto check\n\t*selectable_if (money > 49) #Bet 50 dollars\n\t\t*set bet 50\n\t\t*goto check\n\t*selectable_if (money > 74) #Bet 75 dollars\n\t\t*set bet 75\n\t\t*goto check\n\t#Quit gambling\n\t\t*if birthday = true\n\t\t\t*goto_scene main_menu\n\t\t*else\n\t\t\t*goto_scene bj_intro job\n\t\t\n*label check\n\n*set bj_hands +1\n\n*if sound\n\t*sound cashregister.wav\n\n*if bet = 1\n\tYou bet one dollar on this hand.\n\t*goto deal\n*else\n\tYou bet ${bet} dollars on this hand.\n\t*goto deal\n\n*label deal\n\n*rand card1 1 11\n*rand card2 1 11\n*set play_pts (card1 + card2)\n\n*if play_pts > 21\n\t*goto deal\n\n*rand card3 1 11\n*rand card4 1 11\n*set deal_pts (card3 + card4)\n\n*if deal_pts > 21\n\t*goto deal\n\nThe dealer hands you a ${card1} and a ${card2} for a total of  [b]${play_pts}[/b] points.\n\n*if play_pts = 21\n\tAce!\n\t*if sound\n\t\t*sound hooray.wav\n\t*goto bread\n\nThe dealer gets two cards, a ${card3} and a ${card4}, for a total of [b]${deal_pts}[/b] points.\n\n*if deal_pts = 21\n\tThe dealer got an ace!\n\t*goto deal_win\n\n*choice\n\t#Take one more card (hit me)\n\t\t*if sound\n\t\t\t*sound card.wav\n\t\t*goto round2\n\t#Stay\n\t\t*goto stay\n\t\n*label stay\n\n*if deal_pts > 21\n\tThe dealer went bust!\n\t*goto win\n\n*if deal_pts > 15\n\tThe dealer stands.\n\t*goto determine\n\n*rand card3 1 11\n\n*set deal_pts + card3\n\n*if sound\n\t*sound card.wav\n\nThe dealer takes another card, a ${card3}, for a total of [b]${deal_pts}[/b] points.\n\n*if deal_pts > 21\n\tThe dealer went bust!\n\t*if sound\n\t\t*sound winner.wav\n\t*goto win\n\n*if deal_pts > play_pts\n\t*goto deal_win\n\n*if deal_pts > 15\n\tThe dealer stays.\n\t*goto determine\n\n*page_break\n\n*goto stay\n\n*label round2\n\n*rand card1 1 11\n*set play_pts + card1\n\nThe dealer deals you a ${card1}  for a total of [b]${play_pts}[/b] points.\n\nThe dealer has [b]${deal_pts}[/b] points.\n\n*if play_pts > 21\n\tYou went bust!\n\t*goto deal_win\n*if play_pts = 21\n\t*goto stay\n\n*choice\n\t#Take one more card (hit me)\n\t\t*if sound\n\t\t\t*sound card.wav\n\t\t*goto round2\n\t#Stay\n\t\t*goto stay\n\t\n*label win\n\n*set bj_wins +1\n\n*if sound\n\t*sound winner.wav\n\nYou had ${play_pts} and the dealer had ${deal_pts}.  You are the winner.\n\n*label bread\n\n*if sound\n\t*sound winner.wav\n\n*if bet = 1\n\tYou won one dollar!\n\t*goto another\n\nYou won $${bet}!\n\n*set money + bet\n\n*if (money > 999) and (birthday = false)\n\t*goto grand\n\n*page_break\n\n*goto another\n\n*label determine\n\n*if deal_pts > play_pts\n\t*goto deal_win\n*if play_pts > deal_pts\n\t*goto win\n\nYou and the dealer both had ${play_pts} points, so it's a push.  \n\n*if sound\n\t*sound pokerchips.wav\n\nYou neither won nor lost any money.\n\n*goto another\n\n*label deal_win\n\n*set bj_losses +1\n\nThe dealer won that hand.\n\n*if sound\n\t*sound loser.wav\n\n*if bet = 1\n\tYou lost one dollar.\n\t*set money - bet\n\t*goto another\n*else\n\tYou lost ${bet} dollars.\n\t*set money - bet\n\t*goto another\n\n*label another\n\n*if (money > 999) and (birthday = false)\n\t*goto grand\n\n*if money \u003c 1\n\tYou are out of money.  \n\t\n\tAs you futilely pat your pockets in a desperate attempt to locate a wayward note that somehow got lost, but you come up with nothing but some bright red fuzz.\n\t\n\t\"What are you, some kind of bum?  Get outta here!\" shouts the dealer.\n\t\n\tA moment later, two goons lift you up by your armpits and frog march you out the front door of the Casino, giving you a generous shove that nearly sends you sliding into the street.\n\t\n\t\"Don't come back heres until you got some money, okay punk?\" says one of the goons, theatrically wiping his hands clean of your presence.\n\t\n\tDoing your best to maintain what little shreds of dignity you still retain, you straighten your clothes and begin the long walk home.\n\t*page_break\n\t*goto_scene bj_intro job\n\n*page_break\n\n*goto play\n\n*label grand\n\nYou now have enough money to take your mom out for her birthday.\n\n*if sound\n\t*sound grandwinner.wav\n\n*fake_choice\n\t#Keep gambling\n\t\t\"I thought you said you were gonna quit after you made enough money for your mother's birthday, ${bj_name},\" sneers the dealer.\n\t\t\n\t\t\"Shut up and deal me some more cards,\" you retort.\n\t\t*goto play\n\t#Leave the casino\n\t\t\n*set birthday true\n\nHeading home, you find yourself whistling a jaunty tune.\n\nPopping through the front door, you see your mother, hard as work as usual.\n\n\"Oh hello, dear,\" says your mother, her eyes crinkling as she spies you still wearing your shoes.\n\n\"Isn't today such a wonderful day, Ma?\" you say.\n\n\"Take those off those at once and then wash up for dinner,\" commands your mother.\n\n\"Yes, Ma,\" you say.\n\n\"What are you smiling about, child?  Something funny happen?\" says your mom.\n\n\"It's a secret,\" you say, hastily amending it to a [i]good[/i] secret when you see her frown in disapproval.  \"But you'll have to wait until your birthday to find out what it is.\"\n\n\"I'm not sure if I like the sound of that,\" says your mother, but she goes back to her work without asking further questions.\n\n*page_break The Special Day\n\n*set money - 1000\n\nAt long last, the day of your mother's birthday has finally arrived.\n\nAs you two agreed upon, you arrive at her house promptly at 11:00 am.\n\n\"Ma, it's me!\" you say, rapping on the front door before letting yourself in.\n\n\"Oh, hello, my dear child,\" says your mother, slipping off her eyeglasses as she rises to her feet.\n\n\"Happy birthday, Mom!\" you say, revealing the bouquet of flowers that you had hidden behind your back.\n\n\"Oh my stars!\" your mom says, and you see her eyes widen with delight.\n\n*page_break\n\n\"I've got one more present for you, Ma,\" you say after she finishes unwrapping your last gift, giving the appropriate \"oohs\" and \"aahs\" over the deluxe heating pad that you bought from a boutique store online.\n\n\"Oh heavens, I think you've given me quite enough already, dear child of mine,\" says your mother, a tinge of pink rising to her cheeks.\n\n\"But it isn't in a box, Ma,\" you say, grinning with anticipation.\n\n\"What are you talking about?\" says your mother, somewhat snappishly.\n\n\"I'm taking you out for a special meal!\" you say.\n\n\"Well, it's about time!\" says your mother.  \"I was starting to get a little peckish.  Are we going to that place downtown again this year?\"\n\n\"Nope,\" you reply with a grin.\n\n\"Oh, don't tell me that new Mexican place.  I just want something simple,\" says your mother.\n\n*page_break\n\n\"Not the Mexican place either,\" you say, still grinning like a lunatic.\n\n\"Quit messing about and just tell me,\" says your mother somewhat crossly, but you also detect a gleam of excitement in her eyes.\n\n\"It's a secret,\" you say.  \"But I need you to dress nice.\"\n\n\"Oh my, I don't think I'm up for going to the Skyline.  That's way too fancy a place for a simple old gal like me.\"\n\n\"It's not the Skyline either, Ma.  In fact, it's a place you have never been before, but yet I know it will be your favorite,\" you say.\n\n\"Have you been drinking?\" says your mother, staring intently into your eyes.\n\n\"No, no!  It's nothing like that, Ma.  Come on, don't ruin the surprise.  I worked really hard on it,\" you say.\n\n\"Fine, fine,\" says your mother.  \n\n\"Now, go get dressed, Ma.  I'll meet you in the car in thirty minutes,\" you say, giddy with excitement.\n\n*page_break\n\n\"Where are we going?\" your mother says peevishly from the passenger seat.\n\n\"We're almost there, Ma.  Just a couple more minutes,\" you reply as cheerfully as you can.\n\n\"That's what you said thirty minutes ago!\" says your mother in a somewhat whiny tone of voice that you intentionally choose to ignore.\n\n\"Yeah, but this time I mean it,\" you say, turning to give her a big smile.\n\nAnd it works, at least partially, as she relaxes back into her seat, turning to stare out at the endless forest that borders each side of the road.\n\n*page_break\n\n\"Okay, we're here,\" you say with a grin as you carefully turn off the road onto a small gravel lane.\n\n\"What is this?  Why are you taking me to a barn?\" says your mother as you bring the car to a stop a few moments later in front of a large red building.\n\n\"It's not a barn, Ma.  I mean it was, but now, it's been renovated on the inside,\" you say, unfastening your seatbelt and pulling the key out of the ignition.\n\n\"Is that your plan?  To take your old Ma out behind a barn and put her out of her misery?\" says your mother.\n\n\"Ma, no!  Come on.  Don't even joke about something like that!\" you say.  \n*page_break\n\n\"Tell me what is going on!  Or I swear to God, I will get out of this car and walk back home.  It's supposed to be my birthday, and I don't understand what's going on,\" says your mom.\n\n\"No, no, Ma!  I swear, it's all good.  You'll see,\" you say, giving your mother's arm a soft squeeze.\n\n\"You promise, ${bj_name}?\" says your mother.\n\n\"Yes, of course!  I love you.  This is my present to you,\" you say, twisting to reach over and give your mother a hug.\n\n\"Well, tell me what it's about then,\" says your mother, palming away a tear from her cheek after your return to your seat.\n\n*page_break\n\n\"Okay, Ma.  My whole life, what's the first thing I saw every day when I came home from school or whatever?\" you say with a happy grin.\n\n\"I don't know.  What?\" says your mother, a hint of doubt creeping back into her eyes.\n\n\"No, Ma!  That picture of Big Papi as the bottom of the stairs,\" you say.\n\n\"Oh, he was a sweet, sweet man,\" says your mother.  \"I miss my father every single day.\"\n\n\"We all loved him, Ma.  And I love that photo of him because it's got you, and you're there on your birthday at Big Papi's restaurant, and you're wearing that ridiculous cone hat and surrounded by all your friends and family, and everyone just has these big, happy look on their faces,\" you say.\n\n*page_break\n\n\"That was my sweet sixteenth birthday,\" says your mother, a smile flitting across her face as her eyes mist over with memories.\n\n\"I know.  Which is why I thought long and hard about your birthday this year because I wanted to make it special, Ma,\" you say.\n\n\"You're a good kid,\" says your mother, reaching over to give your hand a gentle squeeze.  \n\n\"And that's when I came up with the idea of taking you to Big Papi's restaurant for your birthday,\" you say.\n\n\"But the restaurant closed down years ago,\" says your mother, furrowing her eyebrows.  \"Your uncles sold it after Big Papi died.\"\n\n\"Maybe, maybe not,\" you say with a mischievous grin.  \"Come on, it'll be easier to show you!\"\n\n*page_break\n\n\"Don't peep, Ma!  Keep your eyes closed,\" you say as you carefully guide her over the threshold.\n\n\"They're closed, they're closed,\" grumbles your mother, but you can plainly see the smile on her face.\n\n\"A few more steps… okay, here we are.  Open your eyes, Ma!\"\n\nAnd for a few, long, delicious moments, you drink in the sight of your mother as she gazes in wonder at the miracle you have produced inside the old barn thanks to all that hard-earned money that you won at the casino.\n\n*page_break\n\n\"It's incredible, my child!\" gasps your mother.  \"How did… how did you get Big Papi's restaurant and put it in this barn!?\"\n\nYou chuckle with delight as you carefully lead her over to the corner booth, the same one she was sitting at in the photograph.  \"This is why I've been coming home so late these last few weeks.  Now you know!\"\n\n\"Wow!  And what's this?  Oh, no!  Even the menu?  And those crazy old glass salt shakers? How did you… where did you find… this is incredible, simply incredible,\" says your mother, her eyes as wide as saucers.\n\n\"Wait.  It gets even better, Ma.  I managed to track down Mr. Grotzi, and he is going to prepare tonight's meal,\" you say with a huge grin.\n\n\"Big Papi's line cook?  Mr. Grotzi?  Why, he must be a hundred years old!\" says your mother.\n\n\"No, Ma.  Don't exaggerate so much.  Mr. Grotzi is only eighty-four, and he is absolutely delighted to have one more chance to cook for you,\" you say.\n\n\"And what is he going to cook?\" says your mother, pretending to frown, but the glean in her eyes gives her away.\n\n*page_break\n\n\"Well, Mr. Grotzi and I put our heads together, and we managed to discover what was on the menu at your sweet sixteen dinner,\" you say.\n\n\"Oh my goodness!\" says your mother.\n\n\"Yep.  And after that, he's also made that same lemon star cake that you had on your birthday as well.  He said it was the first recipe that Big Papi brought over from the old country,\" you say.\n\n\"Why, this is the best birthday I ever had!\" says your mother with a huge smile and a merry twinkle in her eye that you have not seen in a long time.\n\n\"I love you, Ma,\" you say, wrapping your arms around your mother in a loving hug and then planting a large kiss on her incredibly soft forehead.\n\n\"I can truly die a happy woman, knowing that I raised a good kid who remembered their old ma on her birthday,\" says your mother.\n\nAnd that is when you feel your heart melt into a puddle of joy…\n\n*page_break THE END\n\n*gosub_scene main_menu\n\n*goto_scene ending\n", "capture": "\n*label 5\n\n*if oppo_piece1_loc = 5\n\tYou have sent ${sen_opponent} and ${oppo_piece1} back to Home Base.\n\t*set oppo_piece1_loc 0\n\n*if oppo_piece2_loc = 5\n\tYou have sent ${sen_opponent} and ${oppo_piece2} back to Home Base.\n\t*set oppo_piece2_loc 0\n\n*if oppo_piece3_loc = 5\n\tYou have sent ${sen_opponent} and ${oppo_piece3} back to Home Base.\n\t*set oppo_piece3_loc 0\n\n*if oppo_piece4_loc = 5\n\tYou have sent ${sen_opponent} and ${oppo_piece4} back to Home Base.\n\t*set oppo_piece4_loc 0\n\n*if oppo_piece5_loc = 5\n\tYou have sent ${sen_opponent} and ${oppo_piece5} back to Home Base.\n\t*set oppo_piece5_loc 0\n\n*if oppo_piece6_loc = 5\n\tYou have sent ${sen_opponent} and ${oppo_piece6} back to Home Base.\n\t*set oppo_piece6_loc 0\n\n*if oppo_piece7_loc = 5\n\tYou have sent ${sen_opponent} and ${oppo_piece7} back to Home Base.\n\t*set oppo_piece7_loc 0\t\n\n*goto cactus\n\n*label 6\n\n*if oppo_piece1_loc = 6\n\tYou have sent ${sen_opponent} and ${oppo_piece1} back to Home Base.\n\t*set oppo_piece1_loc 0\n\n*if oppo_piece2_loc = 6\n\tYou have sent ${sen_opponent} and ${oppo_piece2} back to Home Base.\n\t*set oppo_piece2_loc 0\n\n*if oppo_piece3_loc = 6\n\tYou have sent ${sen_opponent} and ${oppo_piece3} back to Home Base.\n\t*set oppo_piece3_loc 0\n\n*if oppo_piece4_loc = 6\n\tYou have sent ${sen_opponent} and ${oppo_piece4} back to Home Base.\n\t*set oppo_piece4_loc 0\n\n*if oppo_piece5_loc = 6\n\tYou have sent ${sen_o to determine what color you will play.\n\n*rand dieroll 1 2\n\n*if sound\n\t\t*sound manydice.wav\n\n*if dieroll = 1\n\t*set player_color \"Blue\"\n\t*set oppo_color \"Red\"\n\tYou roll…\n\t\n\tYou will be the [b]Blue[/b] player during this game!\n\t\n\tAs such, you will go first.\n\t\n\t\"May the best living god win,\" says ${sen_opponent} in what you cannot believe is a sincere tone of voice.\n\t\n\t*page_break Roll to start\n\t*goto_scene sen your_turn\n\n*if dieroll = 2\n\t*set player_color \"Red\"\n\t*set oppo_color \"Blue\"\n\tYou roll…\n\t\n\tYou will be the [b]Red[/b] player during this game!\n\t\n\tAs such, ${sen_opponent} will go first.\n\t\n\t\"I already know where I am going to put my newest treasure, ${wager}, when I get back home to ${oppo_capital},\" chuckles ${sen_opponent}.\n\t\n\t*fake_choice\n\t\t#\"Just shut up and play!\"\n\t\t#\"You will live to regret those words, Vulture of the ${direction}.\"\n\t\t#\"May Horus guide my hand to victory.\"\n\t\t\n\t*page_break GAME ON\n\t*goto_scene sen oppo_plays\n\n*goto_scene ending", "intro_orc": "*if sound\n\t*sound droids.wav\n\nThe service droids begin chittering to themselves as they begin refueling and repairing your spaceship, so you decide to stretch your legs and head out.\n\nBut as you step out of the spaceport, you have to shield your eyes from the fierce glare of the two red suns up above.\n\n🔴 🔴\n\nYou cannot remember the name of this godforsaken rock located on the distant edge of the outer rim, but it reminds you a lot of the desert in Tunisia back on Planet Earth.\n\n*fake_choice\n\t#Find somewhere to buy a drink\n\t#Go back to your spaceship and take a nap\n\t\t*goto_scene main_menu\n\nDoing your best not to break into a jog, you speedily make your way towards a low-slung building up ahead.\n\nYes!\n\nIt seems that no matter where you go in this galaxy, there is [i]always[/i] a bar or cantina of some kind just a few steps from a spaceport.\n\n*page_break 🎷👽🍺\n\n*if sound\n\t*sound cantina.wav\n\nStepping inside, you welcome the cool darkness, but you cannot help but be somewhat annoyed by the loud music being played by a motley collection of pencil-necked alien musicians with large heads in the corner.\n\nGlancing around, you see the usual collection of thieves, rogues, bandits, smugglers, and low-level crime syndicate members that frequent spaceport bars on the outer rim.\n\n*if money = 0\n\t*goto_scene orc milky\n\n*page_break 🔫 👽 😈\n\n*if orc\n\t*goto fanta\n\n\"Gimme a drink,\" you say to the bartender, flipping an electrum credit onto the splintered wooden surface of the bar.  \"Whatever you got that isn't total rotgut.\"\n\n*set money -1\n\n\"Mrawwwgh,\" says the bartender in his strange alien dialect, which your translator informs you means \"coming right up, boss.\"\n\nA moment later, the bartender slides a foaming mug of something green in front of you, but when you take a sip, it turns out to be not completely horrible.\n\n*page_break 🍺\n\n*label fanta\n\n*if sound\n\t*sound droids2.wav\n\nJust then, your communicator beeps with a message from the service drones attending to your ship:\n\n📟 [i]Estimated price of repairs: [b]1000[/b] credits.[/i]\n\n*page_break Close message\n\n*if orc = false\n\t*rand money 450 600\n\nWhat?!\n\nA thousand credits for fuel and a few minor repairs?  \n\nWhy, that is highway robbery!\n\nEven worse, as you glance through your purse, you see that you only have ${money} credits left to your name.\n\nHow in the world are you going to get your spaceship back?\n\n*page_break 🚀\n\n*if sound\n\t*sound evillaugh.wav\n\nJust then, a rather angry looking alien with green-blue skin approaches you and warbles something in his language.\n\n\"Care to play a round or two of the Old Republic Card Game with me?  I've already cleaned out everybody else in this bar,\" comes the auto-translation in your ear.\n\n*fake_choice\n\t#\"Buzz off, pal!\"\n\t#\"I'd rather do honest work than try and gamble my way to wealth.\"\n\t\t\"Bok-beep-mwak!\" shouts Avaricio, which your translator informs you means, \"The desert is full of dried-up idiots.\"\n\t\t\n\t\t\"Whatever,\" you reply before making your way to the cantina's exit.\n\t\t*goto_scene orc milky\n\t#\"I [i]guess[/i] it might be a way to pass the time.\"\n\t\t*goto play\n\t\n\"Bzzle-beet!\" chortles the blue-green alien.\n\n\"Come on, what do you have to lose?\" comes the translation.\n\n\"You expect me to sit down to a game of cards with an alien in a sketchy bar like this on the edge of the galaxy?\" you reply.\n\n\"Bblort-blp-blog,\" says the alien, which your translator quickly deciphers as \"Sure, why not?  It's the only way to make any money on this lifeless planet other than by working on a milk ranch.\"\n\n*page_break 🍼\n\n\"Fine,\" you say, trying to hide the note of desperation in your voice.  \n\nYou have certainly heard about the milk ranches, sun-blasted wastelands in the middle of the desert where desperate people try to eke out a living by condensing a type of azure-tinted \"milk\" from the morning dew.\n\nAs much as you distrust the alien, playing a hand or two of cards is a far better option than slaving away on a ranch for months in order to make enough money to get your spaceship back from those greedy service droids.\n\n*page_break 🎴🎴\n\n*label play\n\n\"Grak-greek fit-zog,\" says the alien.  \"My name is Avaricio. Please, join me at my table.\"\n\n\"Sure thing, pal,\" you say as you casually make your way over to the alien's table.\n\nAs you sit down, you cannot help but notice that Avaricio seems to be unduly preoccupied with a young Earth human male in a black-and-white get-up who enters the bar.\n\n\"Pok-plizzt-grrbl?\" says Avaricio, which your translator informs you means \"Do you know the rules of the Old Republic Card Game?\"\n\n*fake_choice\n\t#\"Sure, tell me the rules.\"\n\t#\"Hey pal, what's up with you and that Earth guy?\"\n\t\t\"Blook-plbr-zyk!\" shouts the alien, but curiously, your translator stays stubbornly silent.\n\t\t\n\t\t\"Fine, tell me about the rules, pal,\" you tell the blue-green guy.\n\t#\"I'm an old veteran of this game, Avaricio,  so let's just play.\"\n\t\t\"Breeble-kop,\" says Avaricio, contorting his face into what you presume is a grin.\n\t\t*goto_scene orc_hard_reset\n\t\n*label fuzz\n\t\n\"It is similar to your Earth game of Blackjack, except the goal of the Old Republic Card Game is to get [b]20[/b] points without going over,\" comes the translation of Avaricio's grunts.\n\n\"Okay,\" you say.\n\n*page_break\n\n\"Before the game begins, we both make a wager.  To win that prize, you must win three hands.  If a hand ends in a tie, we keep playing and so on and so forth until one of us wins a total of three hands and thus claims the prize,\" says Avaricio.\n\n\"All right,\" you reply.\n\n*page_break\n\n\"Before the game begins, we will each draw four special cards.  These cards can each only be played once, so they have to last the entire game.  But you are never required to use them,\" says Avaricio.\n\n\"I understand,\" you say.\n\n\"During each hand, you can only play a maximum of five cards.  The normal deck of cards has point values ranging from 1 to 10, but the special cards can each be something like +5 points or -5 points, so use them wisely,\" says Avaricio.\n\n\"Got it,\" you say.\n\n*page_break\n\n\"After getting close to 20 points, you can either choose to end your turn or stand.  If you stand, this means that you cannot draw or play any more cards.  If you end your [i]turn[/i], however, and I play some cards and end my turn, and it goes back to you, you will [i]automatically[/i] draw one more normal card when it is your turn again,\" says Avaricio.\n\n\"This sounds a lot like the game Pazaak,\" you murmur.\n\n\"Blasphemer!\" hisses Avaricio.  \"That is a totally different card game!  The Old Republic Card Game is just a variant of the traditional Earth game Blackjack, so never say that P-word ever again, especially not in this cantina tha ue skin approaches you and warbles something in his language.\n\n\"Care to play a round or two of the Old Republic Card Game with me?  I've already cleaned out everybody else in this bar,\" comes the auto-translation in your ear.\n\n*fake_choice\n\t#\"Buzz off, pal!\"\n\t#\"I'd rather do honest work than try and gamble my way to wealth.\"\n\t#\"I [i]guess[/i] it might be a way to pass the time.\"\n\t\t\n*set sen_opponent \"The King of Libya\"\n*set vizier \"Khan\"\n*set sen_name \"Ramses the Magnificent\"\n*set oppo_capital \"Euryopolis\"\n*set game \"Senet - Game of Pharaohs\"\n*set pharaoh true\n*script changeBackgroundColor(\"black\")\n\nBut just as you step into the sunlight, you see your nemesis: ${sen_opponent}!\n\n\"Well, well,\" chortles ${sen_opponent}, striding over towards you.  \"Has Egypt fallen so low that now the mighty Pharaoh is visiting the simple tombs of servants?\"\n\n\"How dare you, Vulture of the East!\" shouts Vizier ${vizier}, stepping between you and ${sen_opponent}.  \"Where you stand is hallowed ground, for this is the funerary complex of the great ${sen_name}!\"\n\n\"What, this tiny thing?\" scoffs ${sen_opponent}.  \"I built a larger funerary complex for my hunting dogs back in ${oppo_capital}!\"\n\nHearing such brazen insolence being spoken in front of my divine presence, Vizier ${vizier} begins breathing rapidly, his face reddening, and you fear that he may collapse to the ground at any moment.\n\nYour fists balled, you turn to face ${sen_opponent}.\n\n*fake_choice\n\t#\"I shall feed you to the sacred crocodiles at Kom Ombo for that remark!\"\n\t#\"Mighty Osiris will strike you blind for your insolence!\"\n\t#\"One of us will be dead by the time Ra's chariot finishes crossing the heavens.\"\n\t\t\n*set hn_name \"Bobbi the Brave\"\n*set town \"Dodge City\"\n*set outlaw \"Black Bart\"\n*set outlaw_his \"his\"\n*set game \"High Noon\"\n*set sheriff true\n*set player_injury 1\n*set oppo_injury 2\n*set player_bullets 3\n*set oppo_bullets 1\n*script changeBackgroundColor(\"sepia\")\n\n\"How's that, now?\" you say, firing off another expertly aimed stream of brown juice into the spittoon.\n\n\"Uh… how can I put it?  ${town}, you see, has fallen victim to the outlaw ${outlaw}, a vicious criminal who is wanted in several states and territories on several counts of horse thieving and creating a public nuisance,\" says the mayor.\n\n\"What's the matter?  Can't you find someone in ${town} to round up a lousy horse thief?\" you growl.\n\n\"I guess I should've mentioned that ${outlaw} is also wanted for murder.  That's why there is a twenty thousand dollar bounty on ${outlaw_his} head,\" says the mayor.\n\n\"I think I understand the situation now,\" you say, picking up the sheaf of yellowed papers, which you quickly see are all \"Wanted: Dead or Alive\" warrants for different outlaws, including ${outlaw}.  \n\n\"Sheriff's job also comes with free room and board!\" says the mayor, a simpering smile spreading across his face.  \"What do you say, ${hn_name}?  Will you agree to become the Sheriff of ${town} and save this town from the Outlaw ${outlaw}?\n\n*fake_choice\n\t#Agree to become the Sheriff of ${town}\n\t#Decline the mayor's job offer\n\n*set game \"Stab the Assassin!\"\n*set rank 4\n*set sta true\n*set spaceship \"The Galaxy Explorer\"\n*set room_info \"The Bridge\"\n*set sta_name \"Captain McSherlock\"\n*set victims_remaining 7\n*set turns 11\n*set panels_damaged 15\n\nCrewperson Orange leaves this area and moves to Forward Engineering.\n\nCrewmember the Azure Collective leaves this area and moves to Port Weapons.\n\nYou are on [b]the Bridge[/b] of the Galaxy Explorer.\n\nCrewperson Yellow is here.\n\n[b]::[/b] What do you do want to do, ${sta_name}?\n\n*fake_choice\n\t#Observe\n\t#Stab!\n\t#Scan the ship (+10 turns)\n\t#Go to Port Weapons\n\t#Go to Forward Engineering\n\t#Go to Starboard Weapons\n\t\t\n*set game \"Charles & Edward Have a Fight\"\n*set hughes \"Hughes\"\n*set audra \"Audra\"\n*set blue uit playing Senet\n\t\t*goto quitters\n\t\n*if win_wager_counter = 0\n\t*goto hewagers3\n\n*if win_wager_counter = 1\n\t*goto hewagers2\n\n*if win_wager_counter = 2\n\t*goto hewagers1\n\n*label youwager3\n\n*temp holder \"\"\n\n\"You have so many fine treasures, ${sen_name}!  Which one shall you wager on our next match?\" says ${sen_opponent}.\n\n*fake_choice\n\t#Wager ${wager}\n\t#Wager ${nonwager1}\n\t\t*set holder wager\n\t\t*set nonwager1 wager\n\t\t*set nonwager1 holder\n\t#Wager ${nonwager2}\n\t\t*set holder wager\n\t\t*set wager nonwager2\n\t\t*set nonwager2 holder\n\t#Quit playing Senet\n\t\t*goto quitters\n\t\t\n*if win_wager_counter = 0\n\t*goto hewagers3\n\n*if win_wager_counter = 1\n\t*goto hewagers2\n\n*if win_wager_counter = 2\n\t*goto hewagers1\n\n*label youwager2\n\n\"If I recall, you were willing to put up ${nonwager1} and ${nonwager2} for our last game.  Care to wager one of those for our next match?\" says ${sen_opponent} far too obsequiously for your liking.\n\n*fake_choice\n\t#Wager ${nonwager1}\n\t\t*set wager nonwager1\n\t\t*set nonwager2 nonwager1\n\t#Wager ${nonwager2}\n\t\t*set wager nonwager2\n\t#Quit playing Senet\n\t\t*goto quitters\n\t\n*if win_wager_counter = 0\n\t*goto hewagers3\n\n*if win_wager_counter = 1\n\t*goto hewagers2\n\n*if win_wager_counter = 2\n\t*goto hewagers1\n\n*label hewagers3\n\n*temp holder \"\"\n\n\"I guess I could use ${wager},\" chortles ${sen_opponent}.  \"After all, when you are as rich as I am, it never hurts to get even richer.\"\n\n\"Curse you, stinking ${dog}!  Go back to ${oppo_country},\" shouts Vizier ${vizier}.\n\n\"Since you cannot match my superb Senet skills, I still have three treasures that I can wager: ${oppo_wager}, ${non_oppo_wager1}, and ${non_oppo_wager2}.  I doubt that you will win our next match, but if you do, which of my treasures catches your eye?\" says ${sen_opponent}.\n\n*fake_choice\n\t#Accept his wager of ${oppo_wager}\n\t#Accept his wager of ${non_oppo_wager1}\n\t\t*set holder oppo_wager\n\t\t*set oppo_wager non_oppo_wager1\n\t\t*set non_oppo_wager1 holder\n\t#Accept his wager of ${non_oppo_wager2}\n\t\t*set holder oppo_wager\n\t\t*set oppo_wager non_oppo_wager2\n\t\t*set non_oppo_wager2 holder\n\t#Quit playing Senet\n\t\t*goto quitters\n\t\n*goto settled\n\n*label hewagers2\n\t\n\"$!{wager}?  Fantastic!\" says ${sen_opponent}, rubbing his hands together.  \"And which of my beautiful treasures would you like to pretend that you can win from me this round, ${sen_name}?  I still have ${non_oppo_wager1} and ${non_oppo_wager2}.\n\n*fake_choice\n\t#Accept his wager of ${non_oppo_wager1}\n\t\t*set oppo_wager non_oppo_wager1\n\t\t*set non_oppo_wager2 non_oppo_wager1\n\t#Accept his wager of ${non_oppo_wager2}\n\t\t*set oppo_wager non_oppo_wager2\n\t#Quit playing Senet\n\t\t*goto quitters\n\t\n*goto settled\n\t\t\n*label settled\n\n\"It has been settled!\" shouts Vizier ${vizier}, raising his arms.  \"This time, I will guard against ${sen_opponent} using any of his evil magic.  Therefore, the path to victory is now clear for ${sen_name} to win and claim ${oppo_wager} for the glory of Egypt!\"\n\n*if (win_wager_counter = 2) and (lose_wager_counter = 2)\n\t\"Whoever wins this next game will be the grand champion,\" says ${sen_opponent}.\n\t\n\t\"The Eye of Horus shall guide my hand!\" you proclaim.\n\n*goto_scene sen_hard_reset\n\n*label hewagers1\n\n\"$!{wager}?  I promise to find a good new home for that treasure,\" laughs ${sen_opponent}.  \"Meanwhile, all I have left to tempt such a wealthy and powerful ruler such as yourself is ${non_oppo_wager1}.\"\n\n*fake_choice\n\t#Accept ${sen_opponent}'s wager of ${non_oppo_wager1}\n\t\t*set oppo_wager non_oppo_wager1\n\t#Quit playing Senet\n\t\t*goto quitters\n\t\n*goto settled\n\n*label oppo_won2\n\n\"Victory is mine once more!\" cries ${sen_opponent} with a shrill note of triumph that disgusts you.\n\n\"You… you foul bewitcher!\" says Vizier ${vizier}, his face purple with rage.  \"What stinking magic has let you steal victory away once again from the Living Child of the Sun God, ${sen_name}?\"\n\n\"It is a sign of how low Egypt's status has fallen that the pharaoh would continue to tolerate such imbecility in their servants,\" sneers ${sen_opponent}.  \"I have won both contests because I am a living god!\"\n\n\"${sen_name}, my most Worshipful Master and Eternal Grace, I beg you to smite this ${dog} of the ${direction} and use his skull as your drinking vessel.\" says Vizier ${vizier}, sinking to his knees to beseech you.\n\n*fake_choice\n\t#\"I have purposefully lulled my enemy to sleep, and now I shall sting him like a scorpion!\"\n\t#\"Have faith for my revenge will be sweet, ${vizier}.\"\n\t#\"$!{wager} was just a trifle, for I am the master of untold riches!\"\n\t\t\n\"$!{wager} will be a perfect addition to my palace back in ${oppo_capital}!\" guffaws ${sen_opponent}.  \"But I would not mind adding ${nonwager1} to my collection while I tarry in this forsaken desert land, my dear ${sen_name}.\"\n\n\"Your naked greed betrays your false claims to godhood,\" you laugh.\n\n\"Oh, my dear ${sen_name}, do not be angry with me because I outwitted you once more!  I am sure that you will rally to defeat me in the next game of Senet,\" says ${sen_opponent}.\n\n\"You continue to show what an uncouth ${dog} you are, false god of the ${direction},\" says Vizier ${vizier}.\n\n*goto youwager1\n\n*label oppo_won3\n\n*set sen_games_lost +1\n\n\"Nooooooo!  I cannot let myself live in the presence of such divine injustice,\" screams Vizier ${vizier}, pulling out a dagger from the folds of his tunic and moving to stab himself in the eye.\n\n\"Stay your hand, my good vizier,\" you say, seizing his arm.  \"For I still have much need of your wise counsel.\"\n\n\"Egypt truly is a land of fools!\" chortles ${sen_opponent}.  \"And I look forward to finding a proper home for wager back in ${oppo_capital}.\"\n\n\"Stinking carcass of the ${direction}, will you not have the basic decency to give my Most Exalter Master and Ruler of the Four Winds, ${sen_name}, a chance to win back the three treasures that you used evil magic to steal?\" says Vizier ${vizier}.\n\n\"Perhaps another time,\" chortles ${sen_opponent}.  \"For now, though, I have far better things to do than rob the people of Egypt of their dwindling resources.  But I do know that other kings in this region would be interested in playing Senet against ${sen_name}.\"\n\n*fake_choice\n\t#Play Senet against another king\n\t\t\"Good choice!\" chuckles ${sen_opponent}.  \"It will be fun to hear news of the great pharaoh losing once again.\"\n\t\t\n\t\t\"Be gone, you foul jackal!\" shouts Vizier ${vizier}, raising his mace.\n\t\t\n\t\t\"Let the false god go in peace back to oppo_capital to fool the heathens that dwell in that forsaken land,\" you say.\n\t\t\n\t\t\"And try improving that tiny mastaba of yours,\" says ${sen_opponent} as he turns and exits your funerary complex.\n\t\t\n\t\t\"Osiris will bless you with a thousand wins at Senet,\" says Vizier ${vizier}.\n\t\t\n\t\t\"You are undoubtedly correct,\" you say, as you turn back towards your tomb.  \"Come, my dear vizier, let us examine the rest of the preparations for my glorious journey to the afterlife!\"\n\t\t*page_break ENTER YOUR TOMB\n\t\t*goto_scene sen_hard_reset\n\t#Quit playing Senet\n\t\t*goto quitters\n\n*goto_scene ending\n\t\t\n*label quitters\n\n*if sound\n\t*sound laugh.wav\n\n\"My divine duties require my presence elsewhere in my kingdom, so I must decline your offer to play Senet,\" you say.\n\n\"Running like a dog with its tail behind its legs, I see!\" roars ${sen_opponent} with laughter.\n\n\"Miserable ${dog} of the ${direction}, drag your stinking carcass back to ${oppo_country} at once!\" shrieks Vizier ${vizier}, the veins bulging out in sharp relief on his forehead as he raises his mace to strike ${sen_opponent}.\n\n*page_break 🗡️\n\n\"If you ever develop the courage to challenge me again, ${sen_name}, you know where to find me!\" laughs ${sen_opponent} as he turns and begins walking out of your funerary complex.\n\n\"${sen_name}, my most Most Blessed Divine Leader, it is far better to rule Upper and Lower Egypt than to win a silly game of Senet,\" says Vizier vizier.\n\n\"My good ${vizier}, I do believe that you are right.  Come!  I want you to help me choose which type of golden furniture that I want to be buried with me,\" you say, linking your arm through your vizier's.\n\nThe two of you go striding back to your palace, and you soon forget that you ever once whiled away a sunny afternoon playing Senet with a false god from a far away, distant land.\n\n*page_break 🌴\n\n*goto_scene main_menu\n\n*label you_won\n\n*if sound\n\t*sound grandwinner.wav\n\n*gosub_scene sen_award_checker ace\n\n*set wagers_won +1\n\n*if win_wager_counter = 1\n\t*gosub_scene sen_award_checker first_wager_won\n\t*goto you_won1\n\n*if win_wager_counter = 2\n\t*goto you_won2\n\n*if win_wager_counter = 3\n\t*gosub_scene sen_award_checker first_game_won\n\t*gosub_scene sen_award_checker five_games_won\n\t*goto you_won3\n\n*label you_won1\n\n\"Yes!\" screams Vizier ${vizier}, pumping his fists.  \"Osiris has blessed you, ${sen_name}!\"\n\n\"As I am a living god, my victory was inevitable,\" you say.  \"And I look forward to finding a good home for ${oppo_wager} that ${sen_opponent} has so kindly decided to gift the people of Egypt.\"  \n\n\"Meh!  A temporary setback.  That is all this is,\" says ${sen_opponent}, looking far too confident, in your opinion.\n\n\"You ${dog}! How many times must you lose before you realize you are nothing more than a false god from the ${direction}?\" sneers Vizier ${vizier}.\n\n*if lose_wager_counter = 0\n\t*goto youwager3\n\n*if lose_wager_counter = 1\n\t*goto youwager2\n\n*if lose_wager_counter = 2\n\t*goto youwager1\n\n*label you_won2\n\n\"Whoo-hoo!\" cries Vizier ${vizier} with glee.  \"The Eye of Horus has guided your divine hand once again, ${sen_name}!\" \n\n\"Curse this dr o the foul den where you came from!\" shouts Vizier ${vizier}.\n\n*page_break\n\n\"Indeed, I shall go for now.  But do not think that you have seen the last of me,\" chuckles ${sen_opponent} in a menacing tone of voice before turning around to walk out of your funerary complex. \n\n\"This ${dog}'s yapping has left me with a most miserable headache,\" says Vizier ${vizier}.\n\n\"After such a magnificent victory bestowed upon me by Hathor, I command that we have a feast in my palace,\" you declare.\n\n\"Truly, this day gives reason for all of Egypt to celebrate, my most Divine and Blessed King,\" says Vizier ${vizier}.\n\n\"And then, after we have supped and watched a music and dance performance by the priestesses, I will sleep.  And then tomorrow, I wish to continue inspecting my tomb,\" you say.\n\n\"As you command, my ${sen_name}, my most Royal and Supreme Guide to Eternal Peace,\" says Vizier ${vizier} with a low bow.\n\n*fake_choice\n\t#Spend a day resting in your palace\n\t#Challenge your slaves to a different game\n\t\t*goto_scene main_menu\n\t\n*gosub_scene sen_soft_reset\n*if sound\n\t*sound egypt.wav\n*goto_scene sen_intro donuts\n\n", "sen_hard_reset": "\n\n*label settings\n\n*set extra_turn false\n*set spot_occupied false\n\n*set square5 \"free\"\n*set square6 \"free\"\n*set square7 \"free\"\n*set square8 \"free\"\n*set square9 \"free\"\n*set square10 \"free\"\n*set square11 \"free\"\n*set square12 \"free\"\n*set square15 \"free\"\n\n*set oppo_square1 \"free\"\n*set oppo_square2 \"free\"\n*set oppo_square3 \"free\"\n*set oppo_square4 \"free\"\n*set oppo_square13 \"free\"\n*set oppo_square14 \"free\"\n\n*set piece1_loc 0\n*set piece2_loc 0\n*set piece3_loc 0\n*set piece4_loc 0\n*set piece5_loc 0\n*set piece6_loc 0\n*set piece7_loc 0\n\n*set piece7_future 0\n*set piece6_future 0\n*set piece5_future 0\n*set piece4_future 0\n*set piece3_future 0\n*set piece2_future 0\n*set piece1_future 0\n\n*set current1_loc \"Test\"\n*set current2_loc \"Test\"\n*set current3
