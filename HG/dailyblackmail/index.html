h!\n\t\t\t\t*set goal \"get rich\"\n\t\t\t\t*set drive +25\n\t\t\t\t*set vera %-5\n\t\t#All I want is that City Desk editorship. Surely I can finagle it?\n\t\t\t*set goal \"fire Vera and get her job\"\n\t\t\t*set drive +25\n\t\t\t*set vera %-5\n\nGood luck, and onward.\n*finish Next Chapter\n*label holdoffoncuz\n*page_break \nCousin Lyman is the publisher—the buck stops with him. Cousin or not, before you take what you know to him, hadn't you better really get something solid? At least on the mayor, if not on Vera. \n\n*choice\n\t*if (jacktalk) and (cali != \"Jack\")\n\t\t#I'm going to go back to Jack for more info.\n\t\t\tThat's where the dirt is. Jack the Nose…knows.\n\t\t\t*goto jacktransition\t\t\t\n\t*if not (jacktalk) and (cali != \"Jack\")\n\t\t#I should have given Jack the Nose a call earlier. Better try now. \n\t\t\t*goto jacktransition\n\t*if cali = \"Jack\"\t\n\t\t#Cousin Lyman can wait. I'm not convinced Cal can handle Jack the Nose on his own. \t\n\t\t\tWhatever else is true, Jack is close to you, and might not take you sending your errand-boy to him very well.\n\t\t\t*goto jacktransition\n*finish", "3_jack_exposition": "CHAPTER 3: THE NEPTUNE\n\nJack the Nose. For someone who supposedly has a body count bigger than a basketball player's shoe size in his long-ago past, he's surprisingly trustworthy when it comes to hard info. You just know he's going to help you break this story wide open. \n\nYou met Jack \n*if (tradition)\n\twhen you were just a baby college newspaper reporter. You were assigned to report on the new construction taking place on the back campus. There were rumors of bid-fixing, which would have been a major story—if you'd been able to find anything but innuendo. At any rate, that's how you met Jack. You were surprised to find a shark skin-besuited older gentleman with his namesake nose, hanging around outside the foreman's trailer, alligator shoes, and a toothpick protruding from his mouth. He took a shine to you immediately.  \n*if not (tradition)\n\twhen you were still working in the printing press of the paper. He used to come down and shoot the breeze with the union shop foreman. He certainly looked out of place in a shark skin-suit and alligator shoes, but he had the common touch, that's for sure. He'd buy everyone a round when the shift ended. It was over beers in a divey pub that Jack first got to know you. He took a shine, and that hasn't changed since you've climbed the ladder all the way to the City Desk of the paper. \n\n*if not (jacktalk) \n\tNow you run down the street and grab an empty booth at the bank of payphones. \n\n\tJack picks up on the first ring and you do the dance of running through your confirmation code:\n\n\t\"Jack's Cleaners: we got the starch if you got the scratch.\"\n\n\t\"What's your rate on men's shirts?\" \n\n\t\"Gotta check with the boss. Can I call you back?\"\n\n\tYou give Jack the number of the pay phone and hang up. Now he can call you from a secure line. When he calls back, you give him the rundown.\n\t*if (cali = \"Jack\")\n\t\t\"First of all, your little friend tried to get me to talk to him, says you sent him, but I don't work with anyone except you.\"\n\n\t\t\"Gee, sorry about that, Jack. I thought it'd be ok.\" Shit. You hope this doesn't mean Jack won't still give you the goods. You wonder what Cal's doing instead. There's a pause as Jack absorbs your apology. Then he clears his throat in a phlegmmy, unpleasant cough.\n\n\t\"Well, I'll tell you, kid. I've heard on the street the mayor's in hot water. $!{mheshe} has been making very—and I mean very—regular and large payments to someone. My guy at the bank keeps an eye out for this kind of thing.\"\n\t*choice\n\t\t*if (naif) \n\t\t\t#What is going on? \"Gee, Jacky. Sounds like blackmail.\"\n\t\t\t\t*set simple %+10\n\t\t\t\t\"That's right, Sherlock.\"\n\t\t\t\t*goto trouble\n\t\t#I gotta follow the money. \"You got a line on exactly how much money these payments are for?\"\n\t\t\t*set simple %-10\n\t\t\t\"Not precise figures, but I'm sure I can find out for you.\"\n\t\t\t*goto jackon\n\t\t#I gotta get the real story. \"What kind of hot water is the mayor in?\"\n\t\t\t*set wordsmith %+10\n\t\t\t*label trouble\n\t\t\t\n\t\t\t\"Only three kinds of trouble in this world for a person like that: sex, drugs, or money,\" says Jack.\n\n\t\t\t\"Yeah, and sometimes all of the above. Right, Jack?\"\n\n\t\t\tJack chuckles darkly down the line. \"That's right, ${lingogender}.\"\n\t\t\t*goto jackon\n\t\t*if not (naif)\n\t\t\t#\"Obviously the mayor's being blackmailed, but why?\"\n\t\t\t\t*set simple %-5\n\t\t\t\t*goto trouble\t\n*if (jacktalk) \n\tYou find the nearest payphone and call Jack's cell phone. No time for anything but the risk of directly contacting him. He picks up on the third ring. You demand to know more about what he told you earlier. This must be blackmail: either the mayor's innocent and a victim, or you're going to uncover something even uglier. \n\n\tJack heaves a little sigh. \n\n\t*if cali = \"Jack\"\n\t\t\"You know kid, your little friend tried to get me to talk to him, says you sent him, but I don't work with anyone except you.\"\n\n\t\t\"Geez, I'm sorry, Jack.\" You knew trying to let Cal at one of your sources was a bad idea. You wonder what he's gotten up to instead.\n\n\t\t\"Nah, don't mention it, just don't try something like that again, ok?\"\n\n\t\tLesson learned. \"But Jack—\" you start, getting back to it. He cuts you off.\n*goto trouble\n\n*label jackon\n\n\"Listen, Jack, this is me. You know?\" Jack lets everything that's unspoken in your question linger there for a moment.\n\n\"I know, kid.\"\n\n\"Can we meet?\" \n\n\"Sure. The Neptune, the bar in the back room. I'll be there in thirty minutes.\"\n\n*page_break \nThe best way across town and to the Neptune is\n*fake_choice\n\t*if not (rich)\n\t\t#In my shit-box car. At least gas is cheap now and it only costs you a few bucks. \n\t\t\t*set transpo \"car\"\n\t\t\t*set simoleons -10\n\t\t\tYour 1989 Honda Civic features a charming silver, rust, and Bondo body filler putty motif. Clean it ain't, fast it ain't, but at least it's reliable, right? Oh…no, at least once a week it won't turn over without you whispering, pleading, begging, and pouring copious amounts of motor oil down its gullet.   \n\t#On my 10-speed bicycle, which has the added benefit of being free.\n\t\t*set transpo \"bike\"\n\t\t*set simoleons +10\n\t\tThe secret short-cuts of any city belong to the biker, and you're no exception. You can cover ground that'd take a car twice as long; cutting through parks, shooting down narrow alleys, and lanesplitting down traffic-clogged streets.\n\t\t*if (gender = \"female\") \n\t\t\tAnd here's a dirty little secret: biking in heels and a skirt is no more difficult than in tennis shoes and shorts.\n\t\t*if (gender = \"male\") \n\t\t\tAnd here's something most bikers won't tell you: biking in a light wool suit is more comfortable than biking in jeans or lycra.\n\t\t*if (gender = \"fluid\")\n\t\t\tAnd you're comfortable biking in either a suit or a skirt, depending on how you feel that day.\t\t\t \n\t#At this time of day, the rapid-transit bus—faster than a car, and cheaper than a cab.\n\t\t*set transpo \"bus\"\n\t\t*set simoleons +10\n\t\tSure, people look down on the bus. Guess what? It's got its own lane and gets you there faster (even when riders request a stop every block) than driving yourself. Besides, a reporter like you needs to mingle with the people, and keep ${hisher} ear to the ground.\n\t\t*if (gender = \"female\") \n\t\t\tOf course you do have to avoid exhibitionists and frotteurs on public transit, but the bus'll get you there.\n\t\t*if (gender = \"male\") or (gender = \"fluid\")\n\t\t\tOf course, the bus can sometimes be thronged with beefy menacing types, winos, and DUI degenerates, but you're \n\t\t\t*if (gender = \"male\") \n\t\t\t\tman\n\t\t\t*if (gender = \"fluid\")\n\t\t\t\tfriend\t\n\t\t\tof the people. \n\t*if (rich)\n\t\t#Hailing a cab. It's a splurge, but I can afford it, right?\n\t\t\tOk, you're rich, we get it.\n\t\t\t*set simoleons -10\n\n*page_break Across town…\nYou make it to the Neptune with five minutes to spare. You push back the swinging padded leatherette saloon door, and peer into the dim, cool bar. The interior is grimy when you look too closely at the floors, the chipped edges of the bar, the brightwork that hasn't been polished in forever, if ever. But the comfort of familiarity hangs around the place, and this means you're happy Jack suggested you meet here. The nautical-theme (nets and starfish, lots of brass fittings) is cheesy in a way you adore. The darkness inside is a welcome respite from the bright afternoon. A tiny blaze of white light permeates through the blue dimness. Behind the bar Jack's niece, Lucia, is playing a game on her phone. Without looking up she says, \"He's in the back. Expecting you. Hot out there, though; you want a beer?\"\n*fake_choice\n\t#\"A beer sounds nice, thanks.\"\n\t\t*set booze true\n\t#\"Nah, make it a club soda with lime.\"\n\t#\"Pour me whatever Jack is drinking.\"\n\t\t*set booze true\n\t#\"I'll take a Coke.\"\n\n\"You got it,\" she says, and now looks up at you, putting her phone down to give you a friendly smile. Lucia's about thirty-five, and one of the prettiest bar-maids you've ever seen. Or she would be, but for the long scar running straight down from her left eye all the way to her jawline, where the livid red mark disappears underneath a high-necked blouse. She keeps her right toward you. You can tell she's put in a lot of practice showing her right profile, or positioning herself in a room so that her \"good side\" is visible and her scar is hidden.\n\nThere's something sad about it. She carries herself with the kind of knowledge and the kind of strength that only broken creatures have. You want to take a moment and connect with her, somehow. \n*choice \n\t#I stuff a $5 in her tip jar when she isn't looking.\n\t\t*if generosity > 55\n\t\t\tShe turns for a moment and you slip in the sawbuck without her noticing. Something about getting away with this little gesture makes your heart feel a little lighter. When she turns back with your drink, Lucia gives you a friendly, open smile.\n\t\t\t*set simoleons -5\n\t\t\t*set heart %+5\n\t\t\t*goto backroom\n\t\t*else\n\t\t\tYou try to slide the sawbuck into her tip jar, but you rattle the change and the bottom as you're putting it in. \n\n\t\t\tLucia whips around and says, \"Hey, your money's no good here,\" but she's not being harsh, just following the kind of code her family has always lived by. \n\t\t\t*goto backroom\n\t#I slide a $5 across the bar to her to pay for my drink, even though I drink for free at the Neptune.\n\t\t*if generosity > 55\n\t\t\t*set simoleons -5\n\t\t\t*set heart %+10\n\t\t\t\"Oh come on now,\" Lucia admonishes. \"Your money's no good here.\"\"\n\n\t\t\t\"So put it in your tip jar, then,\" you suggest.\n\n\t\t\t\"You're a sweetheart, $!{first_name}. Here: take your poison.\" She hands over the drink and winks at you as she puts the money into her jeans pocket.\n\t\t\t*goto backroom\n\t\t*else\n\t\t\tLucia looks at the sawbuck as though you just dropped an dead animal on her nice clean bar.\n\n\t\t\t\"Come on, $!{first_name}, you're practically family.\" She gives you a scolding look and passes you your drink. \n\t\t\t*goto backroom\n\t#Tell her I like the blouse; she's probably self-conscious about wearing such an old-fashioned looking thing. \n\t\t*if wordsmith \u003c 55 \n\t\t\t*set generosity %+10\n\t\t\t\"That's a really beautiful blouse you have on; I love the lace details.\"\n\n\t\t\tLucia blushes, right down to the top her high-necked collar. \n\n\t\t\t\"You're a sweet kid, you know that, $!{first_name}?\" she says and passes you your drink. \n\t\t\t*goto backroom\n\t\t*else\n\t\t\t\"Aren't you an unctuous flatterer,\" Lucia shoots back. \"You think I'll give you a bigger pour if you butter me up? Go on now, shoo.\" She passes you your drink and waves like she's scooting bar-flies away. \n\t\t\t*goto backroom\n\t#I tell her to set up a couple shots just for the two of us.\n\t\t*if heart > 55\n\t\t\t*set wordsmith %-10\n\t\t\t\"It's been so long since I seen you, $!{first_name}, I hardly recognize you, you know. Big reporter at the paper and all.\" Lucia winks at you and pours out two bourbons, neat. \n\n\t\t\t\"Down the hatch,\" she toasts.\n\t\t\t*goto backroom\n\t\t*else\n\t\t\t\"Sorry, $!{first_name} I don't drink on the job. BUt come back after you're done talkin' to Jacky, and I'll be finishing my shift.\" She hands you your drink and waves you off to the back room. \n\t\t\t*goto backroom\n\n*label backroom\n*page_break In the back…\nYou smile back at Lucia, and turn away from the bar, heading to the back where Jack is waiting. A nervous, excited energy bubbles through you, as it always does when you're running down a lead.\n\nVenturing further into the gloom, you hear an old Tony Bennett song start up on the jukebox, and you turn the corner past the bathroom doors reading \"Gulls\" and \"Buoys.\" Yeah, the Neptune is like that. In the back room, the gloom alleviated only by little candles on each table, sits Jack himself. \n\n\"Glad you could make it, kid.\"\n\n\"Thanks, Jack,\" you say, sliding into the leatherette booth and facing him. A cigarette smoulders in the ashtray to your right. Before you can get started, Lucia pops her head in and gives Jack a little nod you can't quite understand. Jack gives her a nod in return, and she leaves you in privacy.\n\n*page_break \nJack takes a sip from his drink, clears his throat, and lights a fresh cigarette. You prepare by\n*fake_choice\n\t#Getting out your notebook and pencil.\n\t\t*goto notes\n\t#Taking out a minirecorder.\n\t\tSimple and discreet and getting everything right on the record, the minirecorder is a reporter's best friend. You pull yours from \n\t\t*if (gender = \"female\") \n\t\t\tyour purse\n\t\t*if (gender = \"male\") \n\t\t\tyour breast pocket\n\t\t*if gender = \"fluid\"\n\t\t\tyour messenger bag\t\n\t\tand set it on the table between you and Jack. No chance you'll get a single detail wrong. \t\t\n\n\t\t\"Nah, nah, this ain't getting recorded.\" Damn. Jack's street sense. Any other source wouldn't mind, but he's keen enough to know he can't leave evidence like a cassette tape of him singing like a canary just floating out in the breeze. You'll have to go to your fallback.\n\t\t*goto notes  \n*label notes\n\nThe classic reporter's tools—good ol' pencil and paper. You flip to a fresh page and produce a golf pencil from \n*if (gender = \"female\") \n\tyour hair, where it's holding your bun in place,  \t\n*if (gender = \"male\") \n\tyour breast pocket\n*if gender = \"fluid\"\n\tyour pocket\t\nand poise your hand above the notebook, ready to take down every word of what Jack has to tell you. \n\n\"I haven't got a lot of time, Jack.\"\n\n\"Sure, kid. Let me tell you what I know,\" Jack takes a long drag and exhales. \n\n\"I got a gal, down at First Union, teller there. Nice kid, has a father that drinks too much and likes bad horses, if you get me. She does what she can to keep her old man out of hot water with me and my associates. Whatever information might be useful to me, she makes sure I know about it.\"\n\n*if (naif)\n\tWow. Jack really knows how to twist people into doing what he wants. Who'd imagine he'd let someone pay off gambling debts by trading secret banking info.\n*if not (naif)\t\n\tYou don't bother writing this part down; you know these kind of arrangements are Jack the Nose's stock in trade. \n*if (jacktalk)\n\t\"Like I told ya,\" he continues, \n\n\"This gal told me the mayor's been making withdrawals. Regular. Large.\"\n*fake_choice\n\t#\"How large, Jack?\"\n\t#\"How often, Jack?\"\n\t#\"In cash or checks, Jack?\"\n\n\"Easy, easy, I'll get to all that.\" He very slowly, and very methodically lifts his drink, drains it, and replaces it neatly on the coaster. This little bit of business…Jack has a flair for drama and likes to make you wait. Lucky for you he doesn't want anything from you, like this poor bank teller—risking her job just to keep her dad from getting a beating from Jack or one of his goons. \n\n*temp drinks 0\n\"You want another drink, kid?\"\n\n*if booze\n\t\"Hey, Lucia,\" he calls to the front, \"'nother round for me and the kid.\"\n\n\tLucia appears and wordlessly places the fresh drinks on the table, once again exchanging a nod with Jack. \n\n\tYou give her a \"What's up with that?\" look but she pretends not to see and hurries back to the front bar. \n\t*set drinks 2\n\t*achieve drinky\n\t*goto jackspills\n*else\n\t\"And how 'bout something with a little sting in it this time, hunh, kid?\" \n\t*fake_choice\n\t\t#\"Nah, I gotta keep a clear head, Jack.\" Jack's awful keen to get me tipsy. Or maybe he just doesn't want to drink alone.\n\t\t\tJack looks a little pissed at your refusal, but you're not going to compromise. \n\t\t\t*achieve clear \t\t\n\t\t#\"Oh, alright, Jack, I'll have one of what you've got.\" Make the old man happy, keep him talking. \n\t\t\tJack gets up and returns a few moments later with two Manhattans. \n\t\t\t*set drinks 1\n\t\t*if (tradition)\n\t\t\t#\"Sure, I'll take a gin and tonic.\" Why not? It gets the juices flowing.\n\t\t\t\tJack pops into the front room and returns with a G & T for you and a Manhattan for himself.  \n\t\t\t\t*set drinks 1\t\n\t\t*if not (tradition)\n\t\t\t#\"Sure, I'll take a shot of Bulleit with a water back.\"\n\t\t\t\tJack pops into the front room and returns with Lucia, who is bearing your bevs, and Jack has a Manhattan for himself.  \n\t\t\t\t*set drinks 1\t\n*label jackspills\n\n*if drinks > 1\n\tFrankly, you're feeling a little woozy; that first drink went straight to your head. Another one is gonna knock you on your ass, but you gotta play along with Jack. You sip the fresh drink and note you're feel like you need to concentrate extra hard in order to follow what Jack is saying. \n*if drinks = 1\n\tCan't hurt, really. Maybe it'll make Jack tell you what you need to know. \n\n\tFresh drink in hand, this one with a \"sting in it,\" as Jack said you sip and wait for Jack to resume his story. \n*if drinks = 0\n\tJack can't get you drunk and expect you to write this story. You twiddle the remains of your soda and wait for Jack to light another cigarette. \n\n\"So the girl tells me these are cash withdrawals, once a week. But see you can't take that kinda cash out at the ATM, you got to go in to the bank, see? And ask the teller.\"\n\n\"Sure, that makes sense.\"\n\n\"Yeah, that makes sense, kid, but lemme ask you this. It make any sense to you that the mayor always asks for small, unmarked, new bills? You think it makes any sense ${mheshe}'s walking around with five grand in twenties? Can't put that in your wallet. Can barely fit that into a handbag\n*if (mgender = \"female\")\n\tbut I suppose ${mheshe} manages.\"\t\n*if (mgender = \"male\")  \n\tbut I suppose ${mheshe} has a briefcase.\"\n*if (mgender = \"fluid\")\n\tbut I guess you can fit it in a little bag of some kind.\"\t\n\n\"Ok, ok, Jack, but where does $!{mname} take the money? Where's the drop off? Don't tell me you didn't have ${mhimher} followed.\"\n\nJack chuckles, releasing little puffs of smoke with each \"Heh, heh, heh.\" \n\n\"You know me, $!{first_name}, don't ya?\" \n\n\"I sure like to think so, Jack.\"\n\n\"The mayor goes back to the office after each bank withdrawal. Comes out later, the \n*if (mgender = \"female\")\n\tpurse don't look so packed and heavy, see?\"\t\n*if (mgender = \"male\")\t\n\tbriefcase ain't with ${mhimher} any more.\"\n*if (mgender = \"fluid\")\t\n\tbag is empty now, see?\"\n\n\"Ok, so either the person $!{mname} is paying off comes to City Hall to get paid, or—\"\n\n\"—Or $!{mname} hands it off to someone on the staff and I ain't got any idea who. You're the reporter, ${lingogender}. You figure it.\"\n\nYou push back from the table and slump into the banquette a bit. Now what? Ok, the mayor's paying someone off, for sure. Why?\n\n*page_break Why indeed…\nYou pause, take a sip of your drink. \"Jack, you got your fingers in a lot of pies, I know,\" you trail off anf check Jack's face for any sign of hurt or indignation, hoping your phrasing hasn't offended the old gangster. The nervousness must show on your face, because Jack smiles at you and says, \"Relax. I take it as a compliment. What do you want to know?\"\n\n\"Any truth to the rumor that…\n*choice\n\t#…$!{mname} is involved with bid-fixing, getting kickbacks for ${mhimher}self?\" If that's the case, the money is just running out the other side. $!{mname} would have to keep fixing bids just to keep the blackmailer at bay. \n\t\t*if simple \u003c 45\n\t\t\t*set crime \"bids\"\n\t\t\t*set guess \"null\"\n\t\t\t*set drive +5\n\t\t\t*goto success\n\t\t*else\n\t\t\t*set guess \"bids\"\n\t\t\t*set drive -2\n\t\t\t*goto failure\t\n\t#…$!{mname} is having an affair with the chair of the City Council?\" I would feel terrible if that story got published; we can't choose who we love. But maybe I can do something about the blackmail.\n\t\t*if heart \u003c 45 \n\t\t\t*set crime \"sex\"\n\t\t\t*set guess \"null\"\n\t\t\t*set integrity +5\n\t\t\t*goto success\n\t\t*else\n\t\t\t*set guess \"sex\"\n\t\t\t*set integrity -2\n\t\t\t*goto failure\n\t#…${mname} is taking bribes in exchange for handing out no-show jobs?\" Maybe I can blackmail the mayor for one of those jobs myself, then help ${mhimher} keep the whole arrangement under wraps.\n\t\t*if cunning > 55\n\t\t\t*set crime \"bribes\"\n\t\t\t*set guess \"null\"\n\t\t\t*set drive +5\n\t\t\t*goto success\n\t\t*else\n\t\t\t*set guess \"bribes\"\n\t\t\t*set drive -2\n\t\t\t*goto failure\n\t#…$!{mname} has got the ol' monkey on their back? A drug problem of some kind?\" Honestly, that would be an amazing story to write, and I've got the solid reporting chops to do it, do a whole background on the opiate crisis. \n\t\t*if wordsmith > 55 \n\t\t\t*set crime \"drugs\"\n\t\t\t*set guess \"null\"\n\t\t\t*set pulitzer +5\n\t\t\t*goto success\n\t\t*else\n\t\t\t*set guess \"drugs\"\n\t\t\t*set pulitzer -2\t\n\t\t\t*goto failure\t\n\n*label success\n\nJack sighs. \n\n*if crime = \"bids\"\n\t\"Let me say this. Maybe my pal's construction company ain't gotten any bids with the city lately. Maybe he don't bid low enough and maybe, just maybe he don't have the scratch to make sure he got the bid in the first place.\"\n\n\t\"Wow. It's true, hunh? But if it is true, the mayor's in a real bind. $!{mheshe}'s got to keep the kickbacks flowing just to pay the price of the blackmail. What a miserable existence—hanging onto your office by a thread, and paying through the nose to do so. No wonder ${mheshe} resigned.\"\n\n\t\"Well, what kinda story you going to write about that, hunh?\"\n\n\t\"I don't know, Jack. I still can't figure out why my boss knew the mayor was resigning before anyone else did. That's gotta mean something, right?\"\n\n\tJack shrugs. \"Could be, could be not.\"\n*if crime = \"sex\"\n\t\"Ok. Everybody gets lonely. Mayor'd be no different from anyone else.\" \n\n\t\"And ${mheshe} works in close proximity to the chair of City Council. People meet people at work, why should ${mheshe} be any different?\" you offer.\n\n\tJack snorts. \"Well I tell you why: be huge—ah, what'd'ye call it?—conflict of interest, if the mayor was knocking boots with a City Council member, right?\"\n\n\t\"Well, that'd explain the blackmail, yeah.\" It would be a scandal. Obviously a big story, too. Even if the mayor's resigned, their entire legislative record would have to be re-examined.   \n*if crime = \"bribes\"\n\t\"Supposing—just supposing—there was some kind of hard evidence the mayor had done this,\" Jack muses.\n\n\t\"I mean, a blackmailer loves hard evidence, right?\" Your mind is spinning with the possibilities of such a revelation. \n\n\t\"Sure. A witness is nice, audio is good if he can get it, and of course the cream of the crop for blackmail…\" Jack trails off.\n\n\tOh god. There's a video. \n\n\t\"It's on tape, isn't it? There's a tape of the mayor taking a bribe.\"\n\n\tJack grins at you. \"I knew you was sharp, ${lingogender}.\"\t\n*if crime = \"drugs\"\n\tThen he looks at you with a trace of a smile playing around his lips. He's changed his tune, it seems. \n\n\t\"Ok, you remember the mayor's car crash, right around Christmas, couple years ago?\"\n\n\t\"Sure,\" you say, \"$!{mheshe} got t-boned by a guy who ran a red. Broke several ribs, and had a bad disc injury as well, right?\"\n\n\t\"And what do they prescribe back injuries?\"\n\n\t\"Could be anything, hydrocodone—Vicodin—or even something stronger. Shit, the mayor's got a drug problem.\"\n\n\tJack gives you a little shrug, a pursed little smile: you said it, not me.\n\n\t\"But that's hardly their fault, is it?\" \n\n\t\"Blackmail ain't about whose fault, kid, it's about who knows, and whether you care who knows.\"\n*goto wrapup\t\n\n*label failure\nJack is looking at you like you just offered him a bucket of warm spit. \n\n*if guess = \"bids\"\n\t\"That don't seem too likely to me,\" he says, with an almost cartoonish look of dubiousness on his face, his lips screwed up into a tight bow of disapproval. \n\n\t\"No? Don't you have a pal in construction that got the contract from the city to build a new annex for the high school? Maybe you can put us in touch.\"\n\n\tAt this Jack's face turns red, and it's not because he's embarrassed.\n\n\t\"You know what, I tried to help you out because I like you, but you better keep you mouth shut about what I told you and don't go poking around in my pal's business. Now take a powder, ${lingogender}.\"\n*if guess = \"sex\"\t\n\t\"Yeah, I don't think that's $!{mname}'s game, kid.\" Jack looks at you, frankly, like you're a goddamn idiot. \n\n\tYou try to recover. \"No? I thought you had some friends on City Council. Maybe you can ask around, see if there's anything to it?\"\n\n\tThis line of questioning seems to make Jack very uncomfortable. He stubs out his cigarette and shoves the ashtray away from him with enough force that it would have flown right off the table if you hadn't caught it. \n\n\t\"My friends are my business,\" he says, \"And if you want us to stay friends, you won't go poking around asking my other friends questions, not without my say-so.\"\t\n*if guess = \"bribes\"\n\t\"Look, the mayor resigned, so how's it going to matter now, anyway?\" Jack asks, and casts a frown in your direction, an expression like, he wants to say, \"You ain't too bright, ${lingogender}.\" He's right. \n\n\t\"Come on, Jack. No-show jobs and kickbacks are the oldest politician's game in the book.\"\n\n\t\"Yeah, but that book's been checked out and marked lost. You got nothing, kid. And I got nothing on a rumor like that, either.\"\n\n\tJack spares you the extra embarrassment of saying \"And, of all people, I would know.\"\n*if guess = \"drugs\"\n\t\"What? You think some doc prescribed some painkillers and then welched on the mayor?\"\n\n\t\"Well, the mayor was in a car crash a couple years ago. Maybe the injuries…it could be anyone, a doctor, a pharmacist, someone close to the mayor at City Hall, close enough to notice behavioral changes or maybe found a stash or—\"\n\n\tJack cuts you off again, this time with a little dismissive wave of his hand, too. \"Kid! You're barking up the wrong tree,\" he says with finality. And there goes your shot for a good juicy investigative series or profile.\t\n\nYou don't give up that easily, though. You pound your fist on the table. Now Jack's mug is turning dark with rage. \n*choice\n\t#\"I don't give a damn if you're protecting someone, the mayor and my story have to come first.\"\n\t\t*if wordsmith >= 65\n\t\t\t*set crime \"${guess}\"\n\t\t\t*set guess \"null\"\n\t\t\t*goto success\n\t\t*else \n\t\t\t*goto mickey\n\t#\"You would let a good ${mgen} like $!{mname} Johnson get run out of office and blackmailed to boot?\"\n\t\t*if heart >= 65\n\t\t\t*set crime \"${guess}\"\n\t\t\t*set guess \"null\"\n\t\t\t*goto success\n\t\t*else \n\t\t\t*goto mickey\t\t\n\t#\"You think you run this town, eh? You don't run me, Jack. And I won't be jerked around here.\"\n\t\t*if simple \u003c= 35\n\t\t\t*set crime \"${guess}\"\n\t\t\t*set guess \"null\"\n\t\t\t*goto success\n\t\t*else \n\t\t\t*goto mickey\n\n*label mickey\n*page_break That's odd…\n\nJack doesn't respond, but holds your gaze steadily across the table, even searching your face a bit,\n*if drinks = 1\n\tas everything begins to swim.\n\n\tYou feel strange. You're grasping for the words, when all of a sudden it hits you: you feel really, really woozy. Like you might fall over. Oh shit. You only had one drink. On an empty stomach, but still. Oh shit. There was something in that drink. You look across the table to see Jack beginning to smile at you, and you're aware that Lucia has wandered back into the room. \n\n\tEverything begins to bleed and echo together, a blur of sound and dim, candlelit flickering. Right before it all fades away, you see Jack grab your \n\t*if (gender = \"female\") \n\t\tpurse\n\t*if (gender = \"fluid\") or (gender = \"male\")  \n\t\tmessenger bag\t\n\tand begin rifling through it. You can sense Lucia behind you. Ah, that's why she and Jack kept nodding at each other—he wanted her to spike your drink. The old Mickey Finn. The last thing you hear before it all goes black is her saying, \"Ok, what do you want me to do with this carcass?\"\n\t*achieve mickey\n\t*page_break Interlude\n\t*goto_scene 3_b_Mickey_Finn \t\t\n*elseif drinks = 2\n\tas the room begins to spin around you.\n\n\tYou feel really, really off all of a sudden. You're about insist, to tell Jack you need something more from him, some piece of dirt on the mayor, when you realize there are actually two of him. You're seeing double. The room begins to spin and blur—you've had two drinks, but this is crazy. Unless…unless he had Lucia slip something in your drink. Oh damn. That's why they were doing all that nodding back and forth. Oh shit. You've been given a Mickey Finn.\n \n\t*achieve mickey\n\t*page_break Interlude\n\t*goto_scene 3_b_Mickey_Finn\n*else\n\tas though to see if your little display of righteous anger was over yet. It is. You fold your arms across your chest and wait. \n\n\tJack nonchalantly lights another cigarette, and exhales the smoke slowly, right in your face. He's clammed up, totally. Seems he thinks your guess about why the mayor was being blackmailed was pretty dumb. But you go with your gut as a reporter. After all, what else is there? \n\n\t\"Well, thanks anyway, Jack.\" \n\n\tHe nods at you and jerks his head sharply at the door, a not-so-subtle gesture which only means one thing: \"Scram.\"\n\t\n\tMaybe you should be working this from the other side: Vera knew.\n\t*choice\n\t\t*if (cali = \"Jack\")\n\t\t\t#I'll see what Cal ended up doing with his afternoon.\n\t\t\t\tYou shove off quickly, not looking back, not even to nod at Lucia on your way out. Now, what the devil has Cal gotten up to?\n\t\t\t\t*page_break Interlude\n\t\t\t\t*goto_scene 3_c_Catching_Up_Cal\n\t\t*if (cali = \"Vera\")\n\t\t\t#I'll wait and see what Cal came up with on Vera. \n\t\t\t\tSince Jack was ultimately a bust, Cal's info on Vera is your best shot now. You take your leave and hope you've preserved a modicum of friendship with Jack, despite some pretty awkward conversation this afternoon. \n\t\t\t\t*page_break Interlude\n\t\t\t\t*goto_scene 3_c_Catching_Up_Cal\n\t\t*if (cali = \"the mayor\")\n\t\t\t#I'd rather wait and see what Cal came up with from the source close to the mayor.\n\t\t\t\tUnfortunately Jack didn't help you as you'd hoped. You get up, and leave with a sheepish nod for him, a wan goodbye to Lucia. You hope Cal was able to come up with something better. You're about to find out.\n\t\t\t\t*page_break Interlude\n\t\t\t\t*goto_scene 3_c_Catching_Up_Cal\n\t\t*if (alone)\n\t\t\t#Time for me to dig up dirt on Vera.\n\t\t\t\tWhatever else is true, you're not going to make any more progress with Jack. But there are few tricks left in your bag of tricks, and one involves some unsophisticated, good old-fashioned elbow grease—to be applied liberally in the direction of Vera McDonald. You'll be getting the evidence you need, now. \n\t\t\t\t*page_break Next Chapter\n\t\t\t\t*goto_scene 4_Vera\n\t\t*if (mayoryou) and (not (alone))\n\t\t\t#I think I'll wait to do anything until my meeting with my source tonight but I need to catch up with Cal.\n\t\t\t\tThere's nothing more to do but wait for tonight's meeting with your source. You'll have to catch up with Cal, regardless, though. And, there's no time like the present.\n\t\t\t\t*page_break Interlude\n\t\t\t\t*goto_scene 3_c_Catching_Up_Cal\n\t\t#I need to catch up with Cal. \n\t\t\t*page_break Interlude\n\t\t\t*goto_scene 3_c_Catching_Up_Cal\t\t\t  \t\t\t   \t\n*label wrapup\n*page_break Holy cow!\n\"Man, I just can't believe it,\" you muse aloud.\n\n\"Come on, you're a reporter,\" Jack says, \"Ain't you seen some crazy things in your time?\"\n\n\"Honestly? No, I haven't seen anything like this. This story is huge. And it's going to break and I'm going to break it.\"\n\nJack smiles at you and your enthusiasm, an indulgent, avuncular smile. It makes you feel good to know you've got a source like him, and it sure paid off pursuing this line of investigation. \n*page_break And now…\n\nJack practically beams at you, he's so proud. \n\n*if (alone)\n\tThe next move is all up to you. Now that you know the mayor's being blackmailed for \n\t*if crime = \"drugs\"\n\t\ta drug problem,\n\t*if crime = \"sex\"\n\t\thaving an affair with the Chair of City Council, \n\t*if crime = \"bribes\"\n\t\ttaking kickbacks on handing out no-show jobs,\n\t*if crime = \"bids\"\n\t\tgetting kick-backs to fix bids,\n\tyou have to make a hard decision. Do you think the thing itself is worthy of reporting on?  \n\t\n\t*if crime = \"drugs\"\n\t\tHmm. Maybe not. After all, drug addiction is a disease, not the fault of the addict. But the blackmail—that makes it even worse. Terrible. Poor $!{mname} would rather have resigned than have this addiction come to light, and has to pay a blackmailer to boot. \n\n\t\tUnless—unless it wasn't about money. Maybe the blackmail was about ${mhimher} giving up the office of mayor! And so you think, [i]cui bono[/i]? \n\n\t\tMolly Griffith, the mayor's deputy, that's who benefits. She was next in line.     \n\t*if crime = \"sex\"\n\t\tYou can't decide. After all, private affairs are private for a reason, right? \n\n\t\tOn the other hand, the City Councilor and the mayor were both engaging in an affair that represented a huge conflict of interest. This makes both the mayor and the City Council's legislative records suspect. The mayor holds veto power over any City Council bill, and is the tie-breaking vote should the Council ever split 6 and 6.  \n\t*if (crime = \"bribes\") or (crime = \"bids\")\n\t\tThis is where the blackmail itself is really more the story. After all, the fact that ${mheshe} was being blackmailed means the kickbacks were cancelled out? And now $!{mname} probably has to keep paying the blackmailer, without that source of income, however ill-gotten, because ${mheshe} resigned. Or maybe ${mheshe} thinks they can free themselves from financial ruin by resigning.  \n\t*label story\n\n\tIt's not an easy thing to figure out. \n\t\n\tHow will you pursue this story? What's the angle?\n\t*choice\n\t\t#Blackmail is the most heinous of crimes, that's where the story is.\n\t\t\tWho was blackmailing the mayor? To you, blackmail is worse than the crime it purports to exploit. Vera knew why the mayor was resigning. She had to. Which means she also had to know about the blackmail. That's where this leads. So she's my next move. You just need the evidence, which you will get, come Hell or high water.\n\t\t\t*set story \"blackmail\"\n\t\t\t*if not (alone)\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*page_break Next Chapter\n\t\t\t\t*goto_scene 4_Vera \t\t\t\n\t\t#The story is the industry piece—a major newspaper editor, Vera, is corrupt! Or [i]something[/i]. \n\t\t\tWhich means it's time for you to investigate Vera. Your story is about her censoring you, trying to put the kibosh on an investigation. No more. You're going for it. Vera McDonald had better watch out.\n\t\t\t*set story \"industry\" \n\t\t\t*if not (alone)\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*page_break Next Chapter\n\t\t\t\t*goto_scene 4_Vera \n\t\t#I don't care so much about the story anymore, it's Mayor Johnson I'm worried about. \n\t\t\tWhatever ${mheshe} did, nothing's as bad as having to actually resign your job. To be afraid every day that whatever horrible thing you did would be revealed to all, and on top of that to have to pay someone off. Your source in the mayor's office will surely shed some light on what's been going on. You only have to wait for your meeting now.\n\t\t\t*set story \"mayor\"\n\t\t\t*if not (alone)\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set skiptofive true\n\t\t\t\t*page_break Part 2\n\t\t\t\t*goto_scene 5_Deep_Throat \n*if not (alone)\n\tYou can't wait to meet up with Cal and compare notes. Combining your new-found knowledge and\n\t*if cali = \"the mayor\"\n\t\this info from inside the mayor's office,\n\t*if cali = \"Vera\"\n\t\twhatever dirt he was able to dig up on Vera,\n\t*if cali = \"Jack\"\n\t\twhatever he ended up digging into this afternoon, since Jack was a bust for him, \n\tyou're going to blow this story wide open. \t\n\t*gosub story\n\t*page_break Interlude\n\t*goto_scene 3_c_Catching_Up_Cal\t\n*finish\t", "3_b_mickey_finn": "*page_break What on earth…\n*set mickey true\n*temp getaride false\n\nINTERLUDE: BLACKOUT\n\nDarkness. That's the first thing you see: nothing at all. You're prone on what feels like a hard, linoleum floor. You touch your face, arms, legs. Nothing hurts except your head, and it's an internal pain, a dull thud that pounds behind your eyes. Shit. Why on earth would Jack and Lucia drug you? No, first figure out where you are and what time it is and what the hell to do now. \n\nYou see a glimmer of light a little ways off from you, and get to your feet. You can see it's a door, light spilling through gaps in the frame. You walk toward it only to hit a table at thigh-height. A clinks as silverware and candle holder knock. You're still in the Neptune back room! You move slowly towards the door, hands splayed to prevent barking against anything else, and you reach your point of egress. \n\nYou can't find your\n*if (gender = \"male\") or (gender = \"fluid\")\n\tbag,\n*if (gender = \"female\")\n\tpurse, \nso your phone is gone. This is a fine mess. You scramble for the doorknob and find it's open. Stumbling forward a few steps, and you're out of the Neptune and into the fading early evening light in the alley behind it. \n*page_break Into the Light…\n\nQuestions swirl about your still spinning head. So many questions. Ok, sure, you missed the mark about why the mayor was being blackmailed, or at least Jack seemed to say so. What if he was trying to throw you off the trail because he's somehow involved in all this? Think it through. \n\nBased on the rumors, you [i]thought[/i] Mayor Johnson\n*if guess = \"drugs\"\n\thad a drug problem. Drug addiction has a stigman but it's nothing to resign over, is it? I mean, it's hardly even enough to [i]blackmail[/i] someone over, but you suppose if the mayor was embarrassed by it, that's really all the blackmailer needs. Wait a second.\n\tIf the mayor resigned, maybe they are being blackmailed, but it isn't about money. The withdrawals from the bank aren't for a blackmailer at all. There might be a perfectly innocent explanation, after all. \n*if guess = \"sex\"\n\thad an affair with a City Council member. That's embarrassing, and presents a huge conflict of interest if it were true. \n*if guess = \"bribes\"\n\thad maybe been taking bribes to hand out no-show city jobs. A scandal, for sure. But frankly, as much affection as you have—er, [i]had[/i] for Jack, that really does sound like something he'd know about and be involved in. Personally.   \n*if guess = \"bids\"\n\thad been getting kickbacks on fixing bids for city construction jobs. That's typical for a corrupt politician, and frankly, pretty typical for an underworld type like Jack.  \n*if (guess = \"bids\") or (guess = \"bribes\")\n\tJack's been a loyal source and even a fatherly type, but after he dosed you, you have to think maybe he only took this meeting to keep you from finding out the truth about him. Maybe he only talked to you to see how much you knew so far, and when he saw you only had rumors to go on, slipped you a Mickey Finn to buy himself some time—time he needed to get ahead of you, and to cover up his involvement.\n\n*if (guess = \"sex\") or (guess = \"drugs\")\n\tBut why would Jack care if you reported on that? Nothing about this makes any damn sense. \nDamn. This is a real mess. \n\n*if (alone)\n\tYou stop and lean against the back wall of the Neptune, just trying to catch your breath and sort through everything. It's after 5:00 and \n\t*if (mayoryou)\n\t\tyou still have hours until you're due to meet your source at the mayor's office. Time to lay low, right?\n\t*if not (mayoryou)\n\t\tyou're losing daylight fast. \n\t*goto choose\n*if not (alone)\n\tYou pause, un-muzzing your thoughts one by one. There's somewhere you're supposed to be. Damn it! Your meeting with Cal! By the look of things it's way past 5:00 now. You gotta call and sort things out with him. But of course, you have no phone. You try the door to the Neptune, but it locked automatically behind you.\n\t*goto callcal\n\n*label choose\nThe sensible thing to do is\n*choice\n\t*if (mayoryou)\n\t\t#Wait until midnight, then meet your source in the mayor's office.\n\t\t\t*comment TKTKTK\n\t\t\t*page_break Part 2\n\t\t\t*goto_scene 5_Deep_Throat\n\t*else\n\t\t#I'm going to try to reach that source in the mayor's office.\n\t\t\t*comment TKTKTK\n\t\t\t*page_break Part 2\n\t\t\t*goto_scene 5_Deep_Throat \t\n\t\t#I'm going to put together the Vera angle on this story.\n\t\t\t*comment TKTKTK\n\t\t\t*page_break Next Chapter\n\t\t\t*goto_scene 4_Vera\n\t*if (alone)\n\t\t#I'm going to call Cal and get a ride back to the office. My head hurts too much for anything else.\n\t\t\t*set alone false\n\t\t\t*set alonetonot true\n\t\t\t*goto callcal\n*label callcal\nYou run down the end of the block, where you find a pay phone. God knows what you're going to do without your cell. \n\nYou dial Cal's and he picks up on the first ring. \n\n\"Hello?\"\n\n\"Cal, it's me!\"\n\n*if (alonetonot)\n\t\"$!{first_name}? What's the matter?\"\n\n\t\"I don't have time to explain right now, but I need a ride. Can you come get me?\"\n\n\tCal sighs grumpily. \"Ok, sure.\"\n\n\t\"You are a peach! I won't forget this.\" \n\n\t\"Sure, just tell me where to go,\" Cal grumbles.\n\t*page_break Interlude, Continued…\n\t*goto_scene 3_c_Catching_Up_Cal\n\n\"Finally! Where are you?! What happened?\" Cal shouts.\n\n\"It's a long story,\" you groan, \"But listen, \n*if cali = \"Vera\"\n\ttell me what happened with Vera!\"\n*if cali = \"the mayor\"\n\ttell me what happened with the source at the mayor's office!\"\n*if cali = \"Jack\"\n\tI know you struck out with Jack, so I went to him myself. What did you do instead?\"\n\n\"Better if we talk about this in person,\" he says.\n\n\"Ok,\" you reply, and just then your head begins to pound again—aftereffect of the Mickey Finn. \"Er—would you mind picking me up? I've sort of been…drugged.\"\n*page_break Interlude, Continued…\n*finish\n\n", "3_c_catching_up_cal": "INTERLUDE: CATCHING UP WITH CAL\n*if (mickey)\n\tHanging out near The Neptune still feels dangerous after your unexpected dosing. \n\t*if (naif)\n\t\tYou can hardly believe a good friend like Jack would do you that-a-way. Why on earth would he and Lucia do such a thing?\n\t*if not (naif)\n\t\tWell, you expected something like this from Jack. After all: you lie down with dogs, you get up with fleas.\t\nYou walk over to the northeast corner of the public park, where you've arranged for Cal to meet you.  \n\nThe sun is getting very low, the gloaming hitting the trees and parked cars with the very end of the day's honeyed light. You're a bit lost in thought after today's revelation that\n*if (mickey)\n\t*if not (naif)\n\t\tJack (and Lucia!) would actually resort to [i]drugging[/i] you to keep you from poking around too much.\n\t*if (naif)\n\t\teven those we consider friends have their own agendas, sometimes. \n*if not (mickey)\n\tthere might be something serious afoot here.\n\nCal pulls up in a modest, no-nonsense Subaru hatchback, which he keep in meticulously clean condition. It's ten years old, but it could be in a collector's showcase if people thought Subaru hatchbacks were collectible. \n*if transpo = \"bike\"\n\tBut your bike will only fit in the back if you pop off the front wheel, which Cal \n\t*if (gender = \"female\") \t\t\n\t\toffers to help you with, in his gentlemanly way.\n\t*if (gender = \"male\")\n\t\tleaves you to take care of on your own, tapping his fingers on the steering wheel and peering at you through the rearview.\n\t*if (gender = \"fluid\")\n\t\tasks if you need help with, in his friendly way. \n*if transpo = \"car\"\n\tYour own car is parked a couple blocks over, but you're not eager to go anywhere near The Neptune. You can get it in the morning\n\t*if (mickey)\n\t\twhen your head has cleared. \n\t*if not (mickey)\t\t\t\n\t\twhen you have time for such boring details. There's a story to chase! \t\n\n*if transpo = \"bike\"\n\tBike stored safely in the wayback, you shut the trunk and \n*if (transpo = \"car\") or (transpo = \"bus\")\n\tYou \t\nslide into the passenger seat, then turn and give Cal an inquiring look. \"Let's take a little ride around, yes?\"\n\n\"Yes, let's,\" Cal agrees, putting the car into gear, and switches on his headlights. There's a beat as you two settle in. \n\n*if (alonetonot)\n\t*goto mefirst\n\n\"Shall I go first,\" he asks with an overweening politesse, \"or would you like to?\" He is going into a tight, formal role, a persona you've seen him try on when he is sitting on something big--he goes all deadpan. But you play along.\n\n*fake_choice\n\t#\"I'll go first.\"\n\t\t*set generosity %-5\n\t\t\"I suspect whatever you have found out, it will make more sense if I explain what happened with Jack.\"\n\t#\"You go first, Cal.\"\n\t\t*set generosity %+5\n\t\t\"No, I insist, you,\" replies Cal. \n\t#\"It doesn't matter.\"\n\t\t\"Ah, then you, my dear friend, you go first.\"\n\t\t*set cunning %-5\n\n*label mefirst\n\"Ok,\" you begin.\n*if (mayoryou)\n\t\"I've got a meeting set for tonight with my source at the mayor's office. Midnight. A parking garage. But this is what happened with Jack.\" You take a breath, still a little excited from everything that's happened. \n*if (mickey)\n\t\"You already know about the part where I wake up from a drug-induced stupor on the floor of The Neptune.\"\n\n\t\"Oh yes,\" says Cal, \"Do go on.\"\n\n*if crime = \"drugs\"\n\t\"I think I've got it. The whole story, straight from Jack, that the mayor was being blackmailed. $!{mheshe} was being blackmailed because of a drug problem. Addicted to opiates prescribed for ${mheshe} after ${mhisher} car crash last year.\" \n*if crime = \"bribes\"\t\n\t\"It seems the mayor had a little scheme going. Abuse of power. $!{mheshe} was taking bribes in exchange for handing out no-show city jobs. Someone found out or someone on the receiving end of one of those jobs got greedy. $!{mname} was being blackmailed, for sure. I figure once the blackmail started, the bribes didn't make much difference, income-wise. So: boom, resign. Of course if the mayor cares about ${mhisher} good name, they'll have to keep paying off whomever is blackmailing them.\"\n*if crime = \"sex\"\n\t\"The mayor got ${hisher}self into a bit of a tight spot, conflict-of-interest-wise. Turns out ${mheshe} was having an affair with the Chair of City Council. The entire legislative record of both Council and the mayor will have to be reviewed, because it's all fucking suspect now, isn't it? But anyway, someone found out what was going on and decided there was a buck to be made. Blackmail.\"\n*if crime = \"bids\"\n\t\"The mayor has been playing the oldest mayor's game in the book. $!{mheshe} has been fixing bids. A little extra cash from the companies bidding out on city jobs, and, you know, bob's-your-uncle. Unfortunately for the mayor, someone got wind of what was going on and decided that there was another buck to be made--for them. Blackmail.\"\n*if guess = \"drugs\"\n\t\"I thought that maybe there was some truth to the rumor that the mayor had a drug addiction. You know, ${mheshe} was in a car crash a year back or so; maybe the injuries ${mheshe} sustained would have required a scrip for something strong. It's really not uncommon.\"\n*if guess = \"bribes\"\t\n\t\"I guessed that the mayor might be taking bribes in exchange for handing out no-show jobs. If you think about it, that's sort of the kind of thing that, uh…Jack would know about. If you catch my drift. There's a part of me that thinks maybe I guessed a little [i]too[/i] well for Jack.\"\n*if guess = \"sex\"\n\t\"I tried to see if Jack knew if there was any truth to the gossip floating around town that $!{mname} is having an affair with someone, maybe the chair of City Council. If that were true, it would probably be the biggest scandal in city politics, ever. Stands to reason the mayor would have been blackmailed, and that ${mheshe} would resign rather than risk it coming to light while in office.\"\n*if guess = \"bids\"\n\t\"I think Jack shut me down because I got to close to the truth. I suggested that perhaps the mayor was getting kickbacks on fixing bids for city jobs. I could have been more delicate, but frankly…I probably wasn't. Not to put to fine a point on it, I think Jack may be involved in that kind of thing, or at least know people who are.\"\n\nCal has been absorbing this silently, driving at a measured pace through the city's grid. He now pulls the car over, the nearest spot being in front of a hydrant, and puts his flashers on. \n\n*if (alonetonot)\t\n\tYou continue to give Cal the whole rundown on this.\n\n\t\"I know this is a lot to think about, but I really need your help here, Cal.\"\n\n\t\"I know, ${first_name}. What are you going to do? What would you like me to do?\"\n\n\t\"I don't know,\" you groan, and turn your head to the window.\n\n\t\"Let me lay it on you, ok?\" \n\t*goto twixt\n\n\"Well then,\" Cal begins.\n\n*if cali = \"Jack\"\n\tYou think he's maybe a little angry with you. You can tell from the tightness around his mouth, the stern way he has folded his hands into his pockets. A neat, angry little package of a reporter. \n\n\t\"You know, $!{first_name}, to begin with, if you want me to run down a story using your sources, it's helpful if you send me to someone who is actually willing to talk with me.\"\n\n\t\"I'm sorry, Cal, really. I should have known Jack would be touchy. But I was so excited to have you help me and \n\t*if (jacktalk)\n\t\tI'd already talked to Jack this morning so I thought maybe it'd be cool to have you take a stab.\n\tI wanted to divide and conquer.\"\t\t\n\t\n\t\"Don't worry, I picked up where you would have: Vera.\"\t\n*if cali = \"the mayor\"\n\t\"Your source at the mayor's office was very nice, very friendly voice on the phone, but turned out not to be willing to talk to me, surprise, surprise. Says they will speak with you, alone, tonight at midnight. East side of the fourth floor of the municipal parking lot, and told me to pass the word along. Cloak and dagger stuff, hunh? I'd say they sounded nervous but also pleased that you were on the story, and maybe pleased you had a confederate in me,\" Cal tells you. \"Now, considering that left my afternoon open…\"\n\nNow his mood shifts. Cal smirks like the magnificent bastard he is.\n\n\"Oh Cal, you didn't.\"\n\n\"Heh heh heh,\" a very dry chuckle is his reply. \n\n\"You did! You found something on Vera!\" \n\nHis smile is wry, close-mouthed, because he's so happy he can't smile without bursting into fits of triumphant laughter. \"We have got her dead to rights. I hope you're ready for this.\"\n\n\"Yes, yes, lay it on me, go,\" you eagerly reply.\n\n*label twixt\n*page_break Cal lays it on you… \n\nAnd now he turns, looking at you with his contemplative, serious eyes, still shining with the thrill of the chase. \"Ok, what would you say is Vera's biggest weakness?\"\n*choice\n\t#\"Just one? She's arrogant, complacent with her powerful position, and a control freak.\"\n\t\t*set simple %-10\n\t\tWhat you wouldn't give to make her eat her words, just once. Or eat some humble pie, or crow, or something. The cliches are failing you right now.\n\t\t*if (alonetonot)\n\t\t\t*goto transition\n\t\t*else\n\t\t\t*goto finishcal\n\t#\"She's completely insecure about young up-and-comers, and is always watching for some knife she imagines is about to be thrust into her back.\"\n\t\t*set heart %-10\n\t\tYou could tell she got a distinct pleasure from shutting you down this morning. And it's always like that. \n\t\t*if not (tradition)\n\t\t\tYou've struggled so hard to get where you are, and it's like you've hit your own special Vera-ceiling sometimes. \n\t\t\t*goto finishcal\n\t\t*if (alonetonot)\n\t\t\t*goto transition\n\t\t*else\n\t\t\t*goto finishcal\t\n\t#\"She's been promoted over and over into management roles without actually getting any better at anything.\"\n\t\t*set wordsmith %+10\n\t\tWorking for a newspaper means you'd better be a damn good writer. Vera's a victim of the Peter principle and everyone knows it. Even, probably, [i]her[/i].\n\t\t*if (alonetonot)\n\t\t\t*goto transition\n\t\t*else\n\t\t\t*goto finishcal\n\n*label transition\n\nCal shakes his head. \n\n\"No,\" he smiles, \"Vera's biggest weakness? She thinks she's going to get away with it. We're going to work together to bring her down, ${first_name}.\"\n\n\"Cal, what would I do without you?\"\n*goto finishcal2\n\n*label finishcal\t\n\n\"I'm sure that's true, but really: she thinks she's smarter than you. That's what it boils down to, isn't it?\"\t\n\n\"Yes, ok. I buy that.\"\n\n\"And what do people who think they are smarter than you do?\"\n\nYou pause. Cal pulls to a stop at a red light and turns his attention to you. You give him a \"search me\" look.\n*label finishcal2\n\nHis face turns serious. \"People who think they are smarter than you make mistakes. And Vera has made a lulu of a boo-boo, $!{first_name},\" Cal's voice goes quiet, \"because Vera McDonald has been receiving large cash deposits on a regular basis in her own regular ol' bank account.\"\n\nYour jaw does not literally drop, but the words are stuck in your throat for a moment. \n\n\"How, Cal, how did you find this out?\"\n\n\"It involved some pretty underhanded, though not illegal, and pretty gross detective work. I'm not sure you want to know,\" he says, a little red in the face.\n\n\"Well?\"\n\n\"I took her garbage. She apparently doesn't bother shredding her bank statements. She just threw one in with the coffee grounds and banana peels. Lucky for us she stores her trash bins outside. And it showed $1000 deposits, one a week. It also showed her paycheck from [i]The Citizen[i]. Someone is paying her $4000 grand a month on top of that, in cash.\"\n\nAnd with that, Cal has blown everything wide open. \n*set verarevealed true\n*page_break Next Chapter\n*goto_scene 5_Deep_Throat\n\n*finish \n\n\n", "4_vera": "*advertisement\n\n*comment Two entry points—Jack Exposition or 3_b_Mickey_Finn, so if you were mickeyed/not. Also, must be working alone to hit this chapter. \nCHAPTER 4: VERACITY\n\n*if (mickey) and (alone)\n\tDespite the lingering effects of the Mickey Finn, you manage to forge ahead.\n\t*goto veraopen\n*elseif (choseverafirst)\t\n\tNow to the thing that started you down this path oh-so-many hours ago, how you had wanted to begin things, by investigating Vera and her connection to the mayor.\n\t*goto veraopen\n*else\n\tNow that you've found out what little you could about the mayor from Jack, it's time to look into Vera herself. \n\t*goto veraopen\t\n*label veraopen\n\nThe first place to investigate is indeed the newsroom. Vera has stepped away from her desk, but rummaging around [i]her[/i] office is probably not an option—too many people, and too many opportunities to get caught. \n\nYou can't just bounce into Vera's office and poke through her desk…\n*choice\n\t#Unless I'm crafty enough! I'll take a quick peek in her office, anyway. You never know what some people leave lying around.\n\t\t*if cunning > 50\n\t\t\t*set drive +10\n\t\t\t*goto office \n\t\t*else\n\t\t\t*set pulitzer -5\n\t\t\t*goto caught\t\t\n\t#I need to put in an appearance with my coworkers, then get over to Vera's house and check her trash.\n\t\t\t*if simple \u003c 45\n\t\t\t\t*set drive +10\n\t\t\t\t*goto house\n\t\t\t*else\n\t\t\t\t*set pulitzer -5\n\t\t\t\t*goto house\t\t\t\t\n\t#I'll drop some hints with co-workers to see if I can turn up some leads through gossip.\n\t\t*if wordsmith \u003c 45\n\t\t\t*set drive +10\n\t\t\t*goto coworker\n\t\t*else\n\t\t\t*set pulitzer -5\n\t\t\t*goto coworker\t\t\n\t#I'll go back to my desk, and try to find something incriminating on the office shared server. \n\t\t*if heart \u003c 40\n\t\t\t*set drive +10\n\t\t\t*goto server\t\n\t\t*else\n\t\t\t*set pulitzer -5\n\t\t\t*goto server\n\n*label office\n\nYou're not sure exactly what you're looking for, but there's likely some clue here. \n\nA quick glance at her computer screen shows Vera has it password protected. You couldn't even begin to guess what her password might be. Next, you try the the desk drawer, which is locked. You're running out of places to look, and are even shorter on time because it's now that you notice Vera's purse is sitting under her desk—meaning she could be back any minute. You quickly grab her bag and rummage through it. Inside are several items which pique your interest, but Vera may come back any minute, and if you're caught, you're toast. Any of these might have the information you need. You can steal\n*fake_choice\n\t#What looks like Vera's mail from yesterday.\n\t\t*set stole \"mail\"\n\t#Her checkbook.\n\t\t*set stole \"checkbook\"\n\t#A little black address book.\n\t\t*set stole \"address book\" \n\nYou grab the ${stole}, shove it under the front of your jacket for the moment, and sneak back out of the office, effecting a nonchalance you hope your pounding heart does not betray. \n\nJust as you shut the door, Vera herself caroms across the newsroom, her eyes locked on you. You look from side to side, just in case she might be advancing on someone else, but no, you're alone on this side of the room. You hope that the little bulge of the ${stole} under your jacket doesn't show. Please lord, let it not show, because now Vera pulls up short, right in your face. \n\n\"Hello, $!{first_name},\" Vera's smile is poisonous. \"I saw you filed the story about the resignation earlier. Good \n*if (gender = \"female\") \n\tgirl.\"\n*if (gender = \"male\") \t\t\n\tboy.\"\n*if (gender = \"fluid\")\n\tlittle reporter.\"\n\nYou half expect her to pat you on the head. Instead, she now seems to notice you're standing directly in front of her office door. A thought crosses her face—either you have come to see her, or [i]you were in her empty office a moment ago[/i].\n*choice\n\t#Pre-empt her. \"I was just coming to see you, Vera.\"\n\t\tHopefully she won't ask what you wanted to see her about.\n\t\t*if (heart \u003c 50)\n\t\t\t*set drive +5\n\t\t\t*goto narrowescape\n\t\t*else\t\n\t\t\t*set drive -5\n\t\t\t*goto narrowescape\n\t#Lie. \"I was just passing by on my way out.\"\n\t\t*if (cunning > 60)\n\t\t\t*set drive +5\n\t\t\t*goto narrowescape\n\t\t*else\n\t\t\t*set drive -5\n\t\t\t*goto narrowescape\t\n\t#The truth. \"I stuck my head in your office, but you weren't there.\"\n\t\tIt's technically true!\n\t\t*if (cunning \u003c 60)\n\t\t\t*set drive +5\n\t\t\t*goto narrowescape\n\t\t*else\n\t\t\t*set drive -5\n\t\t\t*goto narrowescape\t\n\t#Run away! \"Yep, all filed and set. I have to go, now. Time to clock out!\"\n\t\t*if (simple \u003c 50)\n\t\t\t*set drive +5\n\t\t\t*label narrowescape\n\t\t\tVera narrows her eyes as though she still suspects something is up. You try a weak smile, one even your face muscles aren't convinced by, and slowly take a step to the left of Vera's office door. Finally she breaks eye contact, grunts something valedictory at you, and sweeps through into her office, door slamming behind her. \n\n\t\t\tThank goodness. You run back to your desk, duck below, and hide the ill-gotten ${stole} into your\n\t\t\t*if (gender = \"female\")\n\t\t\t\tpurse.\n\t\t\t*if (gender = \"male\") \n\t\t\t\tovercoat pocket.\n\t\t\t*if (gender = \"fluid\")\n\t\t\t\tbag.\n\n\t\t\tYou collect the rest of your things, shut down your computer and make a hasty retreat to the fire stairs. Once you're safely hidden a few flights down, you retrieve the ${stole} and finally take a look.\t\t\t\n\t\t\t*set verayou true\t\n\t\t\t*if stole = \"address book\"\n\t\t\t\tYou flip quickly through, and find all sorts of interesting contacts. For someone as bitchy as Vera is, she has a lot of friends, or at least a lot of acquaintances. And sure enough, they all have their names and addresses duly written out in a neat, spiky hand. There's just one mystery entry.\n\t\t\t\t*gosub initial \n\t\t\t\tfollowed by a phone number you recognize—the mayor's office. It can't be a coincidence that the only listing without a full name is also the mayor's first initial. \n\t\t\t*if stole = \"checkbook\"\n\t\t\t\tYou quickly flip through to the register. It's all there in black and white. The last several months, one credit entry a month for $1000 with the note marked\n\t\t\t\t*gosub initial \n\t\t\t\tVera is receiving $1000 a month from someone or something with the same first initial as the mayor, ${mname}. This is the break you were looking for, all right. \t\t\t\t\n\t\t\t*if stole = \"mail\"\n\t\t\t\t*goto mailrifle\n\t\t\t*goto cometogether\t\n\t\t*else\n\t\t\t*set drive -5\n\t\t\t*goto narrowescape\t\n\n*label mailrifle\nThe little stack of mail contains bills, junk offers, and other odds and ends, and hmm, yes, one piece of personal mail, already opened. No return address. Inside, a small card which reads:\n\n[i]I give in. I'm done with this. I'm broke. Can't go on.[/i]\n\nIt's signed, \n*gosub initial\nThe same first initial as the mayor. Damn.\n\n*goto cometogether\t\t\n\n*label initial\n*if mname = \"Robert\"\n\t\"R.\"\n*if mname = \"Patrick\"\n\t\"P.\"\n*if mname = \"Omar\"\n\t\"O.\"\n*if mname = \"Ling\"\n\t\"L.\"\n*if mname = \"Felicia\"\n\t\"F.\"\n*if mname = \"Hanna\"\n\t\"H.\"\n*if mname = \"Max\"\n\t\"M.\"\n*if mname = \"Charley\"\n\t\"C.\"\n*if mname = \"Stacey\"\n\t\"S.\" \n*return\n\n*label house\n\nYou walk over to the watercooler where a gaggle of your colleagues are standing around and gossiping. You pointedly take a paper cup and fill it with water, nodding to the copyeditor, one of the folks from payroll, and a fellow reporter who works the crime beat. There. Appearance made. \n*goto house2\n*label house2\n\nHow can you be sure Vera isn't going to be at home when you're rifling through her trash? You look back toward her office, where the light is now on. You walk over and knock on the door. Her grating screech: \"Enter!\"\n\n\"Vera. Oh, you are here\" you begin, feigning dumb.\n\nShe shoots \"are you stupid?\" daggers with her eyes back at you. \"Did you want something?\" She has had a change of clothes since this morning: a smart black cocktail dress, studded with rhinestones, 1950s-style, and matching earrings and bracelet. A vibrant silk shawl in her signature pond scum green is resting on the back of her desk chair, waiting to be thrown around her neck and shoulders for a dramatic flair. \n\n\"No, only…\" you falter, stalling for time. \n\n\"Well, spit it out, $!{first_name}. I'm on my way out to a fundraiser for the Cancer Society.\" Perfect. The exact information you needed. You know she won't possibly catch you.\n\n\"Forget it. See you tomorrow, Vera.\"\n\nYou return to your desk, quietly gather your things and make your way to the street. \n*page_break\nVera lives several blocks from the office, in a newish apartment complex. Around the back of the building there are 16 individual trash cans, one for each unit. Thank god you don't have to dig through a dumpster, just steal a couple bags of Vera's trash. \n\nYou find the bin marked 14, her apartment number and reach in. Two big black bags, mildly smelly. You grab them and retreat to a back-alley across the way. The alley is lined with dumpsters from the shops and restaurants which front the block, and offers several attractive nooks where you can dump the contents of the bags unseen. Squatting between a pile of empty waxed produce boxes and a mound of packing material, you undo the twist ties on Vera's trash and upend the first bag onto the pavement. \n\nCoffee grounds, empty take-out boxes, assortec crumpled papers, dental floss…well, it's trash. Gross. You pick through the contents of the first bag gingerly. It's kitchen and bathroom trash, and there's nothing of interest here.\n\nScooping as much of it as you can into an adjacent dumpster, you clear a space to look through the second bag. This one is smaller, lighter. And just as you'd hoped, it's her home office and bedroom trash. You notice a small pile of mail. This could be what you're looking for. You pick up a pile of envelopes and have a look. \n*goto mailrifle \n\n*label caught\n\nYou advance toward Vera's office, but as you make your way across the newsroom, Vera herself swoops inside it, and shuts the door with a bang. You'll have to try something else—her house. There are only so many places people can hide things, after all. \n*goto house2\n\n*label server\n\nAt your computer, you open the office's shared drive and find the list of users. \n*line_break\n/W_Albert\n*line_break\n/T_Abeles\n*line_break\n/M_Bartles\n*line_break\n/N_Collyer\n*line_break\n/H_Canby\n*line_break\n/F_Delmonico\n*line_break\nyou scroll on down to \n*line_break\n/V_McDonald.\n*line_break\nYou click on Vera's drive, and magic—she never password protected it. You find her documents, browse through what's on her desktop, and look…her emails. Scrolling through the last several days worth you spot several from colleagues, and while its tempting to take time know to CRTL+F for your own name, you stick to the task at hand. Nothing of interest or out of the ordinary except…this. An email with an anonymized address. No subject. One line:\n\n[i]I can't take it anymore. I'm done. You win.[/i] \n\nand the signature is just \n*gosub initial\n\nWow. Yes. The mayor's first initial.\n*set stole \"email\"\n*set verayou true\n*goto cometogether\n\n*label coworker\n\nYou approach the office watercooler where a gaggle of coworkers are standing around. You get a paper cup, fill it with water, slowly, and back away to the communal bulletin board when you pretend to study the little cards offering babysitting and lawnmowing, by-owner cars up for sale—listening to their conversation as you do. \n\n\"There've been rumors floating around for months about the mayor…\"\n\n\"Yeah, but…such good things for the city and…\"\n\n\"…I can't believe Johnson resigned … why—\" \n\n\"And I can't believe you aren't doing more to cover the story, $!{first_name},\" a copyeditor named Holly says, suddenly calling attention to you, standing there. \n\n\"Well, uhm, Vera says there's no story there,\" you reply, lamely. \n\n\"Bullshit,\" says Greg, who covers the arts scene. \"Don't you know Vera and the mayor go way back? I'll bet she knows exactly why $!{mname} Johnson resigned. If the resignation isn't a story, it's because Vera doesn't want it to be. She knows what's up and doesn't want our paper covering it.\"\n\nVera and $!{mname} \"go way back?\" This is new. This is news. \n\n\"I didn't know that, Greg,\" you say quietly, revealing nothing. Who knew you had a source right here on the Arts Desk. \n*fake_choice\n\t#\"Want to grab a drink and tell me more about it?\"\n\t\tYou hoist your empty cup of water and gesture to your desk. Greg nods and refills your and his cup at the cooler, then walks over to your cubby with you.\n\n\t#\"What do you know about Vera and the mayor?\"\n\t\t\"Let's go sit at your desk and I'll tell you what I know,\" Greg suggests.\n\n\t#\"How long have Vera and the mayor known each other?\"\n\t\t\"A long time,\" Greg replies, and you're grateful he doesn't condescend to you for not having known. \"Let's go sit down and I'll tell you more.\"\n\nYou scoot a pile of papers off the big chair behind your desk and offer it to Greg, who sits. You take a seat opposite on a folding chair. \n\n\"You couldn't know this, $!{first_name}, but yes, Vera and $!{mname} Johnson go way back,\" he starts. You pick up your pad and pencil and start writing. \n*page_break Greg Gives You the Dirt…\n\"They first knew each other when ${mname} was running for city selectman, and Vera was still just a City Desk reporter, not the editor of the section. The selectman race was ugly. In short, ${mname}'s opponent in the selectman race had been cheating on his wife, an open secret, and Vera reported it. Because [i]The Daily Caller[/i] is a quote-un-quote family paper, they wouldn't print that kind of thing. Vera's reporting and our paper's willingness to publish scandal helped get the mayor's political career started.\"\n\nGreg pauses, waiting for you to finish taking down what he's said.\n\n\"The thing you have to understand is that Vera's an opportunist. Whatever happpened back then, I suspect she made out, somehow. It was to her benefit that ${mname} win the selectman race, and not the other guy. Truth be told, she made editor of the City Desk right after that story broke. Of course, no one said it was because of it, but we all figured as much.\"\n\nYou stop and clear your throat. Time to share a small confidence. \"This morning I had it from a source in the mayor's office that ${mheshe} was going to resign. There's been no real reason given yet, and… Vera told me this morning I wasn't to report or investigate anything about it. Which I shrugged off, of course. Because, Greg, she knew the mayor was about to resign too, and told me so.\"\n\nGreg's jaw opens slightly, and he shuts it just as quickly. He gives you a worried look. \"I hope you're getting to the bottom of this, $!{first_name}.\" Greg slurps down the rest of his water and puts the paper cup on your desk with some finality, capping the moment. \n\nYou nod, and put your notebook away. \"Thanks, Greg, I—\n*choice\n\t#…I'm going to go to Vera's and dig through her trash.\"\n\t\t\"I'm grateful I just have to watch trash and review it,\" says Greg, \"not dig around in it. But I wish you luck.\" You smile in return and sit, watching his retreating figure cross back to his own desk. \n\n\t\t*goto house2\n\t#…I hope I can find out more when I meet a special source tonight.\"\n\t\tGreg smiles and says, \"You're one of the good ones; don't give up. I think there's an important story here.\" \n\n\t\t\"I hope so,\" you reply, \"thank you for the help, and the vote of confidence.\"\n\n\t\t\"Of course, I'm rooting for you.\"\n\n\t\tNow it's just a matter of waiting. The hours until midnight would never pass as slowly as they do for you tonight. \n\t\t*set stole \"empty-handed\"\n\t\t*set verayou true\n\t\t*goto end\n\t#…I might be able to dig around on Vera's computer, using the shared server.\"\n\t\t\"That sounds like a good possibility. Not a dig on Vera, but security-savvy she ain't.\" \n\n\t\t\"Thank you, Greg. This was just the push this story needed.\"\n\n\t\t\"It's important you keep on it, $!{first_name}, who guards the guardians, and all that—Vera's maybe involved in something here…\" he trails off.\n\n\t\t\"Yeah, I can't say any more about it now, but you've added a piece to a growing puzzle.\"\n\n\t\t\"Glad to help,\" Greg says. \"Good luck to you.\" He walks back across the office, leaving you to get your hands dirty digging around on the office server. \n\t\t*goto server\n\n*label cometogether\n*page_break And now…\nThus armed, you're ready for the midnight meeting.\n\nThe day began hours and hours ago, and you're exhausted. But you're close, so close you can almost taste victory. You're going to pin down Vera's exact role in this.  \t\t\t\t\n*label end\nAnd with that, it's time to go. \n*finish Next Chapter\n", "5_deep_throat": "*advertisement\n\nPART 2, CH 1: DEEP THROAT\n\nMidnight. The parking garage is dark. The oil stained concrete is giving off a familiar smell—gasoline, dust, burnt rubber, and cold air. A few exit signs and industrial lights shine down the long rows of cars, but there are a few conveniently dim corners for meetings like this one. You don't even really know what to expect. Will you source be shrouded in a trenchcoat, stepping out of the darkness, face half-lit for a brief second by the flash of a Zippo lighting their cigarette? Will they have a briefcase full of evidence to hand over? No, that's only in the movies, surely. \n\n*if (alone)\n\tStill: a thick manila envelope full of juicy material would be a nice treat after the day you've had, \n\t*if (mickey)\n\t\tafter the indignity of being [i]roofied[/i] to keep you off this story (and still, you ask yourself, why would Jack do such a thing?) \n\tyou hope your source will shed some light on Jack and how he's wrapped up in it.\n\t*goto thoughts\n*if (skiptofive)\n\t*label thoughts\n\n\tYou've been waiting for this meeting. Nervous, excited, scared. All of the above, maybe. What thoughts cross your mind now?\n\t*choice\n\t\t#Just the thought of writing this story, and seeing my byline on the front page is enough to keep me focused. \n\t\t\t*if wordsmith > 65\n\t\t\t\tYou're a writer and you've shown that over and over, with your commitment to the written word. This story is going to make your name in journalism.\n\t\t\t\t*set pulitzer +20\n\t\t\t\t*goto furtherchecks\t\n\t\t\t*elseif (wordsmith >= 55) and (wordsmith \u003c 65)\n\t\t\t\tYou want to write and write well, but you do sometimes get distracted, or caught up in the action of things. This story is important, though.\n\t\t\t\t*set pulitzer +10\n\t\t\t\t*goto furtherchecks\t\t\t\t\t\t\n\t\t\t*else \n\t\t\t\tYou aspire to greatness in your writing, but you've been falling short on this story. Now's your chance to wrap it all up in a neat bow and re-focus on the writing. \n\t\t\t\t*set pulitzer -10\n\t\t\t\t*goto furtherchecks\t\n\t\t#The facts are the facts; it's my job to collect them, sort them, and report them. I'm close.\n\t\t\t*if heart \u003c 35\n\t\t\t\tYou're nothing if not logical, brainy, and an intellect. You use this to advantage in figuring out tricky stories like this one. \n\t\t\t\t*set pulitzer +20\n\t\t\t\t*goto furtherchecks\t\n\t\t\t*elseif (heart \u003c= 35) and (heart \u003c 54)\n\t\t\t\tYou try to listen to your head rather than your heart, but sometimes you feel caught between the two—like now.\n\t\t\t\t*set pulitzer +10\t\n\t\t\t\t*goto furtherchecks\t\n\t\t\t*else \n\t\t\t\tYou've tried to use your head, but more often than not your heart gets in the way…not that that's necessarily a bad thing. \n\t\t\t\t*set pulitzer -10\t\n\t\t\t\t*goto furtherchecks\t\n\t\t#I want the honest truth about what's been going on to come to light. That's why I'm here.\n\t\t\t*if cunning \u003c 55\n\t\t\t\tYes: the truth. That's what you seek at all times, and this story is about unleashing the truth about the mayor, and about Vera. The public deserves the truth. \n\t\t\t\t*set pulitzer +20\n\t\t\t\t*goto furtherchecks\t\n\t\t\t*elseif (cunning > 35) and (cunning >= 55)\n\t\t\t\tWell, sure, the truth is important. What else is a journalist in the profession for? But you can get distracted from it when you're on the trail of a good story. \n\t\t\t\t*set pulitzer +10\n\t\t\t\t*goto furtherchecks\n\t\t\t*else\n\t\t\t\t*goto furtherchecks\t\n\t\t*if (goal != \"help Vera\")\n\t\t\t#Vera has to be stopped-my profession, the very integrity of the press is at stake.\n\t\t\t\t*if vera \u003c 55\n\t\t\t\t\tVera absolutely must be stopped. If she's involved in this, an editor at a major daily…the press' reputation is in danger. \n\t\t\t\t\t*set pulitzer +20\n\t\t\t\t\t*goto furtherchecks\t\n\t\t\t\t*else \n\t\t\t\t\tExcept you can't help feeling sorry for Vera, a little, right?  \n\t\t\t\t\t*set pulitzer -10\n\t\t\t\t\t*goto furtherchecks\t\t\n*if not (alone)\n\n\tCal insisted on driving you and waiting in the car. After the day you've had you're\n\t*if (mickey)\t\n\t\tgrateful he's there; no chance of anything like this afternoon's drugging incident when you've got some back up, and you're\n\thappy not to be going it all on your own. \t\n\n\tWhat are you thinking now about all the players in this thing?\t\n\t*choice\n\t\t*if not (alone) \n\t\t\t#How much I like Cal.\n\t\t\t\tHe's a friend, yes.\n\t\t\t\t*if cal > 60\n\t\t\t\t\tA close one. \n\t\t\t\t\t*if (verarevealed)\n\t\t\t\t\t\tAnd he's helped you immeasurably on this story. \n\t\t\t\t\t*set integrity +5\n\t\t\t\t\t*goto furtherchecks\n\t\t\t\t*else\t\n\t\t\t\t\tBut friends are not friends in the newspaper business, not really.\n\t\t\t\t\t*set integrity -5\n\t\t\t\t\t*goto furtherchecks\t \n\t\t#I don't like Vera, that's for sure.\n\t\t\t*if vera \u003c= 55\n\t\t\t\tShe's potentially a monster who has done immeasurable damage to your profession. \n\t\t\t\t*set drive +5\n\t\t\t\t*goto furtherchecks\n\t\t\t*else\n\t\t\t\tReally? You don't seem to show that. \n\t\t\t\t*set drive -5\t\n\t\t\t\t*goto furtherchecks\t\t\n\t\t#I just care that the mayor's story gets written.\n\t\t\t*if wordsmith > 60\n\t\t\t\t*set pulitzer +5\n\t\t\t\t*goto furtherchecks\n\t\t\t*else \n\t\t\t\t*set pulitzer -5\t\n\t\t\t\t*goto furtherchecks\n\t\t*if goal = \"help Vera\"\n\t\t\t#I want to help Vera, if I can.\n\t\t\t\t*if vera >= 65\n\t\t\t\t\t*set integrity +5\n\t\t\t\t\t*goto furtherchecks\n\t\t\t\t*else\n\t\t\t\t\t*set integrity -5\n\t\t\t\t\t*goto furtherchecks\n\t\t*if goal = \"save the mayor\"\n\t\t\t#I have to restore the Mayor to power, and anyone else is a distraction.\n\t\t\t\t*if integrity > 40\n\t\t\t\t\tYour reporting could easily be the thing that brings down a corrupt editor and helps a wronged \n\t\t\t\t\t*if mgender = \"male\"\n\t\t\t\t\t\tman.\n\t\t\t\t\t*if mgender = \"female\"\n\t\t\t\t\t\twoman.\n\t\t\t\t\t*if mgender = \"fluid\"\n\t\t\t\t\t\tpolitician.\n\t\t\t\t\t*set pulitzer +5\n\t\t\t\t\t*goto furtherchecks\n\t\t\t\t*else\n\t\t\t\t\tBut you won't be able to write this killer story without whatever your source has for you tonight. \n\t\t\t\t\t*set pulitzer -5\t\t\n\t\t\t\t\t*goto furtherchecks\n*bug\n\tYou shouldn't be here!\n*label furtherchecks\t\t\n*if (verarevealed)\n\n\tThanks to Cal's handywork going through Vera's garbage, you know that she has been receiving $4000 cash every month. What do you think the money is from?\n\t*label money\n\t*fake_choice\n\t\t#Money ${mname} is paying Vera in blackmail.\n\t\t\tWhat else could it be? \n\t\t\t*if simple \u003c 50\n\t\t\t\t*set pulitzer +20 \t\n\t\t*if (naif)\n\t\t\t#Who knows who it's from; I need to know more.\n\t\t\t\tWe don't have all the facts yet, right?\n\t\t\t\t*if generosity > 50\n\t\t\t\t\t*set integrity +20\n\t\t#Could be from anyone, but it's probably not good, whatever it is.\n\t\t\tIt doesn't look good for Vera, that's for sure. \n\t\t\t*if simple \u003c 55\n\t\t\t\t*set pulitzer +20\n\t\t#I don't have all the facts yet.\t\n\t\t\tBetter that you wait until you have all
