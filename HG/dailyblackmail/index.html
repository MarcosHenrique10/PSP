<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Daily Blackmail — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>

  <div class="layout">

        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "dailyblackmail", "title": "The Daily Blackmail", "scenes": {"1_intro": "PART 1, CHAPTER 1: LOOMINGS\n\nThe phone rings, and as soon as you answer, two more lines light up. It's whack-a-mole time: call, leave a message, and then three sources call you back at once. Around and around we go. Another day, another deadline and later: another drink. It's not easy being a cub reporter at the [i]Daily Citizen[/i]. You've got to make deadlines, file copy, file it again, fend off your editor, Vera, who's demanding to know where your 800 words on the last city council meeting is, and especially fend off your better established colleagues who are just waiting to snatch your big story away. You know how it plays: \"We can't let the kid have this, Vera, it's just too big! We need experienced hands on this one …\" Vera ruefully agrees, and it's bye-bye big break. It's already happened to you once, and you're not going to let them do it again.\n\nToday you're tracking down sources inside City Hall. The mayor's holding a press conference at noon, and no one knows why. If you can figure out what's going on before the competition (that is, before your colleagues as well as the rival paper) then you'll have the copy ready to go online as soon as the conference starts, or at least as soon as it's over. Maybe even score points with Vera. \n\n*page_break\nGod, you need a scoop. A breaking story. Something. You sniffed out this press conference all by yourself, thanks to the network of sources you've built. Someone in the mayor's office, one mole in every city councilor's entourage. It hasn't helped you yet, but today feels like the day. They'll put out the call for the press conference an hour before it's held, so you're ahead of the game, no one else knows it's even happening. But you've got to know why it's happening if you're to make use of your advantage. \n\nYou've been on the phone since 7:00 am trying to find out what on earth the mayor could be up to, and rumors abound, but nothing solid comes your way. Your once source in the mayor's office itself, well, you've never actually met them. They called you with a hot tip several months ago, and have been in touch by phone and via various burner email accounts since then. The only way you know it's the same person is the secret exchange code. Each email contact or phone conversation begins with them asking you \"I'm clinging to a coffin. Whose coffin is it?\" and the correct answer, \"Queequeg.\"  \n\n*page_break \nThe road from rookie to reporter isn't always a straight one. You fought every inch of the way to get this job, especially since newspapers are practically disappearing before your very eyes—the [i]Seattle Post-Intelligencer[/i] went belly up (ok, they went online-only) in 2009. Dozens of papers are being bought up by corporate interests—Amazon owns the [i]Washington Post[/i] for goodness' sake. It's a dinosaur of an industry, and who knows when the death blow of a comet will come to finish it off. Long gone are the subscription rates of yore, advertising budgets are gutted. You've got this gig…for now. \n*fake_choice\n\t#I'm ok with the level of uncertainty that comes along with this industry. I thrive on it.\n\t\t*set cunning %+20\n\t#The lack of job security keeps things exciting, but I've got my eye on a quiet, secure editorship.\n\t\t*set heart %-20\n\t#There's no such thing as secure in the newspaper business; you're only as good as your last story.\n\t\t*set wordsmith %-20\n\n*page_break \nAs a child, you dreamed of being the next Woodward or Bernstein. You remember every Sunday your folks would spread out the big paper, and you'd work through it section by section, reading everything, even the bridge column, supplement, and classifieds. When you were older you read all the greats—Jimmy Breslin, Helen Thomas, Seymour Hersh, John Hersey, even Nellie Bly's work from the early part of the century. Now that you're the newest addition to the City Desk, you're still dreaming those dreams: maybe you'll be the one to land that story, the story that'll have readers lining up to get the latest edition. Single-handedly you'll be reinvigorating subscriptions, reaching a whole new generation. Not to mention your wildest dream—heck, every reporter's dream—a Pulitzer. \n\nFrom tiny acorns come great oaks. You made your way here the \n*choice\n\t#…Traditional way: BA in English, MA in Journalism, and all the right internships.\n\t\t*set wordsmith %+20 \n\t\t*set heart %-10\n\t\t*set pulitzer +10\n\t\t*set tradition true\n\t\t*label tradition\n\n\t\tOf course. But if you want that Pulitzer, you're going to have to climb that ladder. You picked out your undergrad coursework with this in mind. You were a solid A student, went right into a master's program at 22, and now, two years later you've got your first staff writer position. You know you've got what it takes—the smarts, the writing you've learned to hone like a knife, and the contacts in your network to give you a push when you need it.\n\n\t\tTrue, you don't have a lot of experience pounding the pavement, but you know how to write a nutgraf. You know how to sweet talk a photographer into getting you the shot your story needs. \n\t\t*achieve trad \t\n\t\t*goto genderchoice\t\n\t#…Non-traditional way: you worked your way up from the trenches with no degree and no contacts.\n\t\t*set wordsmith %-10\n\t\t*set heart %+20\n\t\t*set drive +10\n\t\tThis is the big leagues, and everyone here with their fancy degrees is looking down their nose at you. You never went to college, but you've worked your way up from Printer's Devil, starting when you were 16. You can still smell the stink of ink in your nostrils, remember the black stains on your fingers, and you'll never be rid of the callouses. Eight years you've toiled and scraped and clawed your way up. Now you're here, a staff writer. You know every inch of this newsroom, top to bottom. You're as close as you've ever been to that Section A, Page 1 story. This is your shot, and you're going to do what it takes to make it above the fold. And dare you even dream…a Pulitzer?\n\t\t*achieve nontrad\n\t\t*goto genderchoice\n\t#…To be honest—the family way: my Cousin Lyman is the publisher of the newspaper.\n\t\tOk, the publisher, Lyman Jones, is your mother's first cousin, but you haven't used it to your advantage yet. In fact no one, including your cousin, knows you're related—common last name, big family, why would he even guess the newest staff writer was a relative?\n\t\t\t\n\t\tIt's important that no one know about this, not even your cousin, who your mother insists \"will be happy to take you to lunch one day, just call his secretary…\" You already have the credentials, and you worked for those. No reason to open yourself up to accusations of nepotism. Cousin Lyman is a hands-off, dandy of a publisher, and you never would want to be classed in with him. \n\t\t*set cuz true\n\t\t*set cunning %-10\n\t\t*set simple %-20\n\t\t*set integrity +10\n\t\t*achieve cuz\n\t\t*goto tradition\n*label genderchoice\n*page_break \nA quick look at the clock. 8:45. You slurp down another glug of coffee, and hang up the phone on another dead end. You'll be at the office until 11:00 tonight, maybe midnight, whether or not this story pans out. It's a punishing schedule, and a hellish workplace (what newsroom isn't?) and even harder because\n*choice\n\t#I'm the first woman to ever get a job on the City Desk.\n\t\t*set gender \"female\"\n\t\t*set hisher \"her\"\n\t\t*set himher \"her\"\n\t\t*set heshe \"she\"\n\t\t*set lingogender \"gal\"\n\t\t*goto gendertext\n\t#I'm a man, and the entire editorial board at the [i]Citizen[/i] is made up of women.\n\t\t*set gender \"male\"\n\t\t*set hisher \"his\"\n\t\t*set himher \"him\"\n\t\t*set heshe \"he\"\n\t\t*set lingogender \"fella\"\n\t\t*goto gendertext\n\t#I'm the first genderfluid person on staff, ever.\n\t\t*set gender \"fluid\"\n\t\t*set hisher \"zir\"\n\t\t*set himher \"zir\"\n\t\t*set heshe \"ze\"\n\t\t*set lingogender \"friend\"\n\t\t*goto gendertext\n*label gendertext\n*if gender = \"male\"\n\tYou know what it must feel like to a be a woman dreaming of the C-level office…and seeing that every one of 'em is a man. You know what it must be like to look at your company's leadership and see a single, token woman sitting on the board of directors. Because at the [i]Daily Citizen[/i] each and every senior editor is a woman. It's rare, and you're proud that the newspaper you work for has a diverse staff—but the top seats are all women, and you wonder if you haven't got your own glass ceiling to break through if you're ever going to make it to editor. \n*if gender = \"female\"\n\tIf you think it's tough being a cub reporter—mopping up the police beat, taking the graveyard shifts, doing every crap story they assign you, try doing it while parrying the roaming hands and sexist jokes endemic in a male-dominated industry. It's something of a relief that the entire editorial board of your paper is women—you know your gender isn't necessarily going to stop you from succeeding here. \n\n\tBut. You're still the first woman on the City Desk and you're going to have to show them. \n*if gender = \"fluid\"\n\tIf you think it's tough being a cub reporter—mopping up the police beat, taking the graveyard shifts, doing every crap story they assign you, try doing it while being genderfluid. Sources and staff alike don't always know what to make of you, but you know who you are. It's not easy, but while you work the City Desk, you're going to show them. \nYou'll uncover corruption, root out the secrets of the city's power-elite, and bring down the pols who'd line their own pockets with the taxpayers' money. You just need one big break. \t\n\nYou've also got an ace in the hole. It doesn't hurt anything that\n*fake_choice\t\t\t\t\n\t#…I'm never short of cash, and I keep it all for myself. \n\t\t*set rich true\n\t\t*set simoleons +200\n\t\t*set generosity %-10\n\t\t*set drive +5\n\t\t*set heart %-5\n\t\tYou've still got the first nickel you ever earned. You can slip a $20 to a source who needs a little persuasion, or grab a cab when you need to dash to the scene of breaking news and that clunker of a car is broken down, giving you the edge on the rest of your poorly paid colleagues. \n\n\t\t*if (tradition) \n\t\t\tLet's be fair, you're barely out of school. Everyone thinks your folks help you, but you really have worked hard and saved. \n\t\t*if not (tradition)\n\t\t\tYou've been in the workforce since you were 16. Even with the low paid gigs, you're a demon at saving money. \n\t\t*achieve rich\t\t\n\t#…I believe people are basically good, and I'm always going out of my way to help my colleagues.\n\t\t*set naif true\n\t\t*set heart %+20\n\t\t*set simple %+10\n\t\t*set generosity %+5\n\t\t*set integrity +5\n\t\tYou wouldn't let them know, but it's you that is quietly optimizing their copy on the shared network, fixing stray typos, leaving fresh baked goods in the kitchen, and calming your editor down when she's ready to flame someone. Some might call you a bit simple, but you're pure of heart.\n\t\t\n\t\t*if (tradition) \n\t\t\tKindness is something bred in the bone for you. You've had all right moves handed to you, more or less; there is no reason not to help those who don't.\n\t\t*if not (tradition)\n\t\t\tNo one helped you on the way up, but you aren't bitter: you're going to be a beacon for those around you. \t\n\t\t*achieve nice\t\n\t*if (tradition) \n\t\t#…I won the National Student Newspaper reporter of the year award as a senior in college.\n\t\t\t*set wordsmith %+30\n\t\t\t*set drive +2\n\t\t\t*set integrity +3\n\t\t\t*achieve winner\n\t\t\tNo, you don't brag about it much, but everyone knows you've been hired because at base, you're a great writer. Do you hang the award on the wall of your cube? Of course not. Were you the envy of everyone in grad school? You bet.\t\t\t\n\t*if not (tradition) \n\t\t#…Coming up from the bottom, I have learned the newspaper business inside and out.\n\t\t\t*set simple %-10\n\t\t\t*set wordsmith %-10\n\t\t\t*set heart %-10\n\t\t\t*set drive +5\n\t\t\tYour edge? You know exactly how it all works, you know everyone on staff by name, and you can get anything done by talking to the right person.\n\t\t\t*achieve insider\n*page_break The Office\nLooking up from your mess of a desk, you drain your second mug of coffee and scan the newsroom for any competition. It's a classic set up in here: a cube farm with a bunch of glass-walled private offices on the perimeter for the senior editors. \n*if (cuz)\n\tCousin Lyman\n*if not (cuz)\n\tThe publisher, Lyman Jones,\nkeeps a lush private office upstairs on the 19th floor, you've heard. The computers are ancient, wheezing towers; the monitors are CRTs (not that you'd wanted to have kids anyway); the carpet is a worn and musty industrial, in classic 1970s HoJo's turquoise and orange. \n\n*fake_choice\n\t#I'd redecorate if I could; I'm sure my colleagues would appreciate it. \n\t\t*set generosity %+20\n\t#Who cares? The action's in the writing.\n\t\t*set wordsmith %+20\n\t#I don't mind either way, but I prefer vintage and filthy to modern and shiny.\n\t\t*set heart %+20\n\t#My eyes are so focused on the prize, I barely notice the environs.\n\t\t*set drive +10\n\t#I'm focused on uncovering injustice and corruption, not redecorating.\n\t\t*set integrity +10\t\n\nStill, there are homey touches that make the [i]Citizen[/i] a place you look forward to every day. \n\nOver in the staff kitchen, everyone's personality shines through: an electric Mrs. Tea brand kettle with a sticky note attached bearing the legend \"I also pity the fool,\" her mate, an auto-drip Mr. Coffee standing close by. A bag of decaf coffee marked \"The Devil's Own Brew,\" and printouts of internet memes modified to emphasize good communal etiquette are plastered on the fridge. \n\n*if not (tradition)\n\tOk, the cutesy pop-culture jokes are not your style, but it feels fun and fresh and you're glad to be a part of it.\n*if (tradition)\n\tYou're secretly the source of at least half the witty jokes in the staff kitchen, but you'd never say.\n*page_break This Morning\nRight now the newsroom is in quiet flux. Mostly just a few of the stringers from the night-shift are sleepily gathering their coats and clocking out, while you're one of the first in for the day-shift. Good. Fewer of your colleagues around to figure out what you're up to. The early bird and worms and all that, right?\n\nYou're familiar enough with the mayor that you think \n*fake_choice\n\t#He …\n\t\t*set mgender \"male\"\n\t\t*set mhisher \"his\"\n\t\t*set mheshe \"he\"\n\t\t*set mhimher \"him\"\n\t\t*set mgen \"man\"\n\t#She …\n\t\t*set mgender \"female\"\n\t\t*set mhisher \"her\"\n\t\t*set mheshe \"she\"\n\t\t*set mhimher \"her\"\n\t\t*set mgen \"woman\"\n\t#Ze …\n\t\t*set mgender \"fluid\"\n\t\t*set mhisher \"zir\"\n\t\t*set mheshe \"ze\"\n\t\t*set mhimher \"zir\"\n\t\t*set mgen \"person\"\n\n$!{mheshe} may have something to hide. But what? If ${mheshe} has something to hide, how on earth will you uncover it? So far your job has involved reporting on less than Pulitzer material.\n\nYou've been on the City Desk job a year, and in that time your duties have mostly included covering boring committee meetings, ribbon-cuttings, and writing up the police reports, handing off anything juicy to a crime reporter. You're keen to make your name, and make your mark. You're about to dial up the mayor's press officer, just to see if they're willing to confirm the conference is taking place at all, but just then, you hear Vera calling you into her office.\n\n\"Hey…\n*if (gender = \"female\")\n\t*choice\n\t\t#…Gina!\"\n\t\t\t*set first_name \"Gina\"\n\t\t\t*goto vera\n\t\t#…Danielle!\"\n\t\t\t*set first_name \"Danielle\"\n\t\t\t*goto vera\n\t\t#…Eiko!\"\n\t\t\t*set first_name \"Eiko\"\n\t\t\t*goto vera\n\t\t#…Krithika!\"\n\t\t\t*set first_name \"K me?\n*input_text first_name\n*goto vera\n\n*label vera\n\"$!{first_name}, get your behind in here and sit down,\" she shouts across the newsroom. Vera specializes in making sure the entire masthead knows who she's calling in. Now everyone can see you're about to get read the Riot Act. A little wave of tittering and some sarcastic applause is sent in your direction from snarky colleagues as you gather yourself.\n\nCripes. \n\nYou put down your mug, log out of your computer (no use letting any prying eyes see your notes and source-list on the mayor's press conference) and walk across the newsroom into Vera's office. Plonking down in one of the two chairs in front of her desk, you're reminded that she's a real power-mongering type. Her own chair is set a threatening five inches higher than the two guest chairs, just so you subconsciously feel intimidated when you meet with her. You figured out this little trick right away, during your interview. What on earth does she want with you before 9:00 am on a Thursday?\n\n*fake_choice\n\t*if (cuz) #I hope she hasn't found out the publisher is my cousin. \n\t\t*set cunning %+5\n\t\tObviously it wouldn't be the end of the world, but it's your secret for now. \n\t#I seriously don't know, and that's what's got me worried. I've got to think out what she might want. \n\t\t*set simple %-5\n\t\tStaying one step ahead of Vera isn't easy. \n\t#Could be she knows why I'm in the office so early and is going to snatch my exclusive story on the mayor.\n\t\t*set heart %-5\n\t\tYour suspicions are already aroused. \n\t#What does it matter? My copy is always solid, impeccable writing.\n\t\t*set integrity +5\n\t*if (naif) \n\t\t#Probably it's nothing. Vera's mean, but I try to think the best of people.\n\t\t\t*set generosity %+5\n\t\t\tVera's nice enough to call me in for a pat on the back when deserved.\n\nVera McDonald, the senior editor on the City Desk. She's pushing sixty, but you'd never guess. Her nails are varnished a deep, fashionable purple. Her hair is coiffed, not in the middle-aged lady's standard brown or ash-blonde football helmet style you'd expect, but a short, spiky, platinum pixie cut. She wears a green linen jacket the color of pond scum—a villainous-looking shade, next to those purple nails. A white silk blouse and short black leather skirt complete her look. \n\nWhen you sit down she crosses her legs up on the desk, revealing very matchy-match pale green tights and black leather boots. If it isn't already abundantly clear, Vera is…well…\n*if (gender = \"male\") \t\n\tshe's known for being a real ball-breaker.\n*if (gender = \"female\") \n\tshe just gets right on your tits about the littlest thing.\n*if (gender = \"fluid\") \n\tshe gets on your nerves like no one else can.\n*page_break\t\n\"$!{first_name}. Seems you've been busy this morning. You're in so early!\" Vera practically purrs at you. Dangerous purring, suspicious purring. \n\n\"Sure, yeah. You know what they say: the early bird gets the Pulitzer.\"  \n\n*if not (naif) \n\tDon't give away the game. She might just be fishing.\n\n\"Anything I should know about?\" she asks, all innocence. \n\n*if (naif) \n\tWhew. She doesn't know. Silly of me to be so worried.\n*if not (naif) \n\tOh man, that put-on tone in her voice can only spell trouble.\n\nYou quickly decide to \n*choice\n\t#Lie. \"I needed to catch up on returning some calls.\"\n\t\t*set cunning %+10\n\t\t*set drive +10\n\t\t*set liedonce true\n\t\t*goto lies\n\t#Tell a half-truth. \"I'm working on a pitch for a three-part investigative series about the lack of low-income housing downtown.\"\n\t\t*set pulitzer +10\n\t\t*set cunning %+10\n\t\tI mean, that's true, it's just not what you're doing this morning. \n\t\t*goto lies\n\t#Evade, but don't lie. \"I can't and won't reveal what I'm working on right now, Vera.\"\n\t\t*set cunning %-10\n\t\t*set simple %-10\n\t\t*goto lies\n\t#Tell the truth. \"The mayor is going to announce and hold an unexpected press conference this morning.\"\n\t\t*set integrity +10\n\t\t*set cunning %-10\n\t\t*goto truth\n\n*label lies\t\n\"Ah, and here I thought perhaps you'd been trying to suss out why the mayor is planning to hold a press conference at noon today. Mysterious, don't you think? I wonder what on earth it could be about.\" She seems to mock you with her put-on innocent voice. \n\nSarcasm means she knows, she must know why the mayor is holding the conference as well. She's clearly toying with you. \n\nHow do you respond?\n*fake_choice\n\t#\"You got me, Vera. I heard from a source inside City Hall it was going down, but no one seems to know why.\"\n\t\t*set cunning %-20\n\t\t\"Ha! I knew it. Well, it's your lucky day, $!{first_name}. You're the only reporter on staff who's even heard about the press conference. Now listen up.\"\n\t#\"Gee, Vera. I have no idea what you're talking about.\"\n\t\t*if (liedonce)\n\t\t\t*achieve liarliar\n\t\t*set cunning %+10\n\t\t*set heart %-10\n\t\tVera chuckles. \"Alright, $!{first_name}, whatever you say.\"\n\t\t\n\t\tVera looks at you evenly. \"I know your story,\" she continues, idly picking at a hangnail on her left thumb. \n\t\n\t\t*if (tradition) \n\t\t\t\"You came up the usual way, and have all the credentials a cub reporter could need to make a success of themselves. But let me tell you something: you've got no chance at anything without my backing. So if you lie to me again, I'll have your press pass. You got that?\n\t\t*if not (tradition)\n\t\t\t\"You worked your way up from the printing press itself, right? You've been on the [i]Citizen[/i] payroll since you were a high school dropout. But that doesn't count for a hill of beans with me. You think you can lie to me? I'm the one that your copy lives or dies by. So let's try this again, ok?\n\t#\"Whatever it is, I know we might finally get a shot at a Pulitzer with a big story like this.\"  \n\t\t*set generosity %-10\n\t\t*set heart %-10\n\t\t\"You want it so bad you can taste it, right?\" Vera says. \"Now listen up.\"\t\t\n*label truth\n\"You've got a network of sources in City Hall ready to give you the dirt, and for that I congratulate you. No one else on the City Desk has this story yet. And technically, neither do you.\"\n\nUlp. \n\n\"In fact, I'm killing it, as of right now. At noon today, the mayor is going to hold a press conference announcing ${mhisher} resignation. $!{mheshe}'s going to say it's for 'family reasons' and everyone is going to be shocked and we are going to do nothing but print the facts as ${mheshe} gives them out.\n\nIn fact, I'm not even sure we need to send someone to the conference—whatever ${mhisher} press officer emails us in terms of a press release will be fine. You could just take the release, rewrite it, quote the official statement provided, and have the copy on my desk by 12:45. But most importantly, no editorializing or speculating on what it all might mean. Get it?\"\n\n*if (cuz) \n\tYou wonder what Cousin Lyman might have to say about this. You nod, and don't allow your expression to betray your thoughts.\n*if not (cuz)\t\n\t\"Got it,\" you spit back, just barely containing how angry you are.\n\nVera smirks at you, and makes a shooing motion with her hands, the long varnished nails waving you away like an unpleasant smell. \"Bye now, $!{first_name}.\"\n\nClomping back to your desk, you attract little attention in the slowly filling newsroom. You land in your desk chair with a loud exhalation of disgust, and the crappy old foam stuffing makes a similar, audible \"poof\" sound. The gentle keyboard clacks from the neighboring cube are a counterpoint to your own drumming fingers. \n\n*page_break Now what…\nYou ask yourself all the basic questions a good reporter would: Why would Vera kill this story? Why would she want to stop you from digging around? And last, but perhaps most importantly, if rhetorically: What in hell is going on?\n*if (naif) \n\tHow can you be sure Vera even knows about why the mayor is resigning? Maybe she just has her own sources.\n*if not (naif)\n\tYou have to find out how Vera knew about all this before you. What did she know and when did she know it, right?\n\nWhatever the case, you're not skipping the press conference. No way.\t\t\n\n*if (naif)\n\tIt hasn't even sunk in yet: the mayor is actually resigning, mid-term, for no apparent reason. Nothing in ${mhisher} political record even hints at why ${mheshe}'d resign now. In fact, ${mheshe} is on top of ${mhisher} game and has a popularity rating that's through the roof. $!{mheshe} has implemented new bus routes and bike lanes, expanded the city's parks and rec department, generated over $30 million dollar from new regressive taxes aimed at fighting obesity, smoking, ending cheap parking, and environmental carbon exchanges for the city's worst polluters. That's not even counting the thousands of new jobs ${mheshe} has created by allowing a new casino onto the waterfront, and giving movie companies incentives to shoot on location here. It's not even mentioning the beautification efforts—horticulture, public art displays, benches and pedestrian-only zones—that won a visit from the First Lady. \n\n\tWe're not even talking about the national trend pieces declaring your city the newest revitalization success on the…\n\t*gosub where\n\n\tHoly cats. If a resignation is coming, someone must have some huge, major dirt the mayor can't risk coming to light. $!{mheshe} could even be being blackmailed.\n\t\n\t*if (tradition)\n\t\tThey didn't give you a class on this sort of thing back in J-school. No way is this legit. Something is very rotten in the state of Denmark.\n\t*if not (tradition) \n\t\tYou thought you'd seen every side of the newspaper business, but a senior editor quashing a story before it's even a story at all…something isn't right here. This is ugly.\n\t*goto next3\t\t\t\n*if not (naif) \n\tThe mayor's had some feel-good initiatives ${mheshe} has implemented: bike lanes, parks, planting flowers, all that nonsense broken windows-type stuff. But to be honest, ${mheshe} has done nothing with any teeth. And everyone knows ${mheshe} is in the pocket of the IATSE union, what with ${mhisher} sweetheart tax incentive deal for movie companies to shoot their low-budget disasters here on the…\n\t*gosub where\n\t*goto wrapup\n\n*label where\n*fake_choice\n\t#East Coast.\n\t#West Coast.\n\t#Midwest.\n\t#Bible Belt.\n\t#Sun Belt.\n*return\n\n*label wrapup\n*page_break\nYeah, this mayor was going nowhere, fast. But it's still a shock ${mheshe} will resign. It's obvious that whatever else is going on with Vera, the mayor is either trying to avoid a huge scandal in office or is being blackmailed. And the smart money is on the latter. \n\n*if (tradition)\n\tYou've got no guidance from your coursework, they didn't give you a manual on what to do when you're peeking 'round the edge of a big, big story.\n*if not (tradition)\n\tYou never imagined you'd climb out of the dank, inky cellar of the printing room only to face something just as dirty in the editorial office. \n\n*label next3\n\nThere's very little you can do to investigate with Vera breathing down your neck, and time is running short. (10:00 am. Less than an hour until the press conference is announced.) You could obviously do what she told you: crib the press release, turn it in, and forget all about it. You could defy her and go to the press conference, get your chance to ask the mayor some questions, or even better: buttonhole one of your sources in City Hall and figuratively beat the story out of them. Vera seemed to think you'd be able to do that, anyway, in fact. She doesn't know you've struck out all morning on the phone. \n\n*page_break\n*label phonetree\nWhom should I call?\n\n*fake_choice\n\t#No more calls. Time for the press conference.\n\t\t*goto outtatime\t\n\t*hide_reuse #I call my friend Cal, who sits on the City Desk at the rival paper, [i]The Capital Caller[/i]. He'll know what to do.\n\t\t*set cal %+20\n\t\t*set phonecalls +1\n\t\tYou could never have guessed you two would end up on the City Desk of rival papers. The thing is, you've always enjoyed a friendly—ok, sometimes [i]not[/i] so friendly—rivalry. You like Cal, of course, but you're both as cut-throat as the next reporter. \n\t\n\t\tYou've known Calvin Czarnovsky since \t\n\t\t*if (tradition)\t\n\t\t\tyour undergrad days at \n\t\t\t*fake_choice \n\t\t\t\t#Washington and Lee.\n\t\t\t\t\t*achieve shenandoah\n\t\t\t\t\t*set wordsmith %-5  \n\t\t\t\t#Vassar.\n\t\t\t\t\t*achieve seven\n\t\t\t\t\t*set heart %-5\t\t\t\t\t   \n\t\t\t\t#UCLA.\n\t\t\t\t\t*achieve bruin\n\t\t\t\t\t*set heart %+5  \n\t\t\t\t#Penn.\n\t\t\t\t\t*achieve billy\n\t\t\t\t\t*set simple %-5\n\t\t\t\t#Hampshire.\n\t\t\t\t\t*achieve hippie\n\t\t\t\t\t*set wordsmith %+5 \n\t\t\t*goto calcall\t\t \t\t\n\t\t*if not (tradition)\n\t\t\t*fake_choice\n\t\t\t\t#We met at a bar, back in my days manning the copy desk—lots of typos required lots of liquor.\n\t\t\t\t\t*achieve boozy\n\t\t\t\t\t*set simple %-5\n\t\t\t\t#We met in elementary school, and he's my oldest friend.\n\t\t\t\t\t*achieve elementary\n\t\t\t\t\t*set heart %-5\n\t\t\t\t#We met at church, where we both sang in the choir.\n\t\t\t\t\t*achieve church\n\t\t\t\t\t*set heart %+5\n\t\t\t\t#We met on the street—he nearly ran me over when I was biking.   \n\t\t\t\t\t*achieve bike\n\t\t\t\t\t*set simple %+5\n\t\t\t*goto calcall\t\t \n\t*hide_reuse #I call one of my underworld sources, Jack the Nose; for a sawbuck he'll let me know what's going on.\n\t\t*set phonecalls +1\n\t\t*set cunning %+5\n\t\tYes, good old Jack the Nose will smell a rat here, too. \n\t\t*goto jackcall\n\t*hide_reuse #Dr. Frankel—with his help I can write my way around anything.\n\t\t*set phonecalls +1\n\t\t*set frankel true \n\t\t*set heart %-5\n\t\t*if (tradition)\n\t\t\tDr. Julius Frankel was your dissertation advisor at Columbia and like a father to you. If anyone will know what to do, it's him.\n\t\t\t*goto mentorcall\n\t\t*if not (tradition)\n\t\t\tDr. Julius Frankel was your father's oldest friend, and a journalism professor at Columbia. He's supported you over the years, even when your father doubted you'd ever be anything except a Printer's Devil.\n\t\t\t*goto mentorcall\t\n\t\t\t\t\n*label calcall\n*set caltalk true\n*page_break Calling Cal…\nYou dial up [i]The Daily Caller[/i] main line. \n\n\"Calvin Czarnovsky's desk, please.\"\n\n\"Hold, please.\"\n\nCal picks up with his usual flair—you hear him in-between bites, he's got a mouth full of something, probably breakfast. \"This is Cal, what's the story?\"\n\n\"Cal, it's me,\" you answer, \"I've got something here and I don't know what it is.\"\n\n\"Spill.\"\n\n\"You can't tell a soul and you can't scoop me with what I'm about to say. I'm calling because I think I might have stumbled onto something big. Something dangerous. I can't do this alone.\"\n\n\"$!{first_name}, how long have you known me?\" Cal asks with a chuckle.\n\n\"A long, long time.\"\n\n\"So you honestly expect me to keep whatever you're going to tell me under my hat? Come on. We're pals, but I still have twenty inches to fill with news.\"\n\nCrap. You didn't even think about Cal scooping you.\n*choice\n\t#Tell him everything and hope for the best. I gotta have his help. Maybe we can even share a byline.\n\t\t*set cal %+10\n\t\t*set cunning %-10\n\t\t*set integrity +5\n\t\t*label calconvo\n\n\t\t\"The mayor's going to resign this morning.\"\n\t\t\n\t\tThere's a silence on the line as you let this percolate through the layers of Cal's disbelief. After a long pause he ventures an incredulous, \"Okay…and how did you come by this little piece of information?\"\n\n\t\t\"That's the weird part: I was only able to find out that the mayor is holding a press conference at noon; as soon as she got in, Vera bawled me out and said the mayor's resigning and I wasn't to print anything about it except the facts ma'am, which are supposedly that ${mheshe} is stepping down for family reasons.\"\n\n\t\t\"How did Vera know the big news?\" Cal wonders.\n\n\t\t\"Now you're catching on. So what do I do?\"\n\n\t\tThe sound of silence down the end of the line is the sound of Cal thinking. \n\t\t\n\t\tFinally, he says, \"It's clear the mayor's crooked, and it's clear Vera found out something about it. Could be she's in on it herself or knows all about it, but isn't going to print the real story to protect someone, likely herself. Or, could be she's planning to give the story to someone else on the City Desk, just to screw with you.\"\n\n\t\tYou heave a sigh. Cal confirmed what you already thought. Your head is still muddled, but you have time for another call. You hang up on Cal, who promises to sit tight on the story for the time being, for whatever that promise is worth.\n\t\t*goto phonetreecalc\t\t\t\t\t\n\t#Don't tell Cal anything, but see what he knows. \n\t\t*set generosity %-10\n\t\t*set cal %-5\n\t\t*set drive +10\n\t\t\"Look, I can't let you scoop me. It could be something really big I'm onto here. I can't tell you if you're going to screw me over. I need to know if you know anything about what's going on over at City Hall right now.\"\n\n\t\t\"Ok, ok, ok,\" Cal sighs. \"I'll tell you what I know: there's some word being put about that the mayor is in big trouble with the union. And trouble with the union might mean trouble with, uh, well let's say our local family organizations.\"\n\t\t*goto calconvo\n\t#Give him a little hint. \n\t\t*set simple %-10\n\t\t*set cal %+10\n\t\t*set integrity +5\n\t\t\"A little birdie told me the mayor may or may not be mayor much longer.\"\n\n\t\tA pause. Cal is playing his cards close to the vest. You try again, more bluntly:\t\n\t\t*goto calconvo \n\n*label mentorcall\n\nYou pick up the line and dial Dr. Frankel's number. He answers on the fourth ring. He's getting older now and can't get to the phone as quickly, you think. Poor old guy. It's funny, but just hearing the familiar sound of his cultured, Viennese accent makes you feel\n*fake_choice\n\t#…better.\n\t\t*set heart %+5\n\t\tDr. Frankel will know just what to do.\n\t#…nervous.\n\t\t*set cunning %-5\n\t\tWhat if he doesn't think you can handle this?\n\t#…guilty.\n\t\t*set generosity %+5\n\t\tIt's been a long time since you last spoke—you should have called after his wife passed away.\n\n\"Ah, $!{first_name}! It's been too long. How are you, my dear?\"\n\n\"Well, Dr. Frankel, I'm not sure. I'm in a bit of a quandary.\"\n\nA pause, the sound of an avuncular chuckle from the end of the line. \n\n\"Whatever it is, I'm happy to listen.\"\n\n*page_break\n\nYou quickly explain what's been going on and wait while he takes a moment to digest the facts. \n\n\"I think the only thing for you to do is…\"\n*fake_choice\n\t#\"Use your brains! Find out where there's a connection between Vera and the mayor.\"\n\t\t*set heart %-10\n\t\t*set integrity +10\n\t#\"Follow the money! Sniff out who might be wanting to blackmail the mayor.\"\n\t\t*set cunning %+10\n\t\t*set integrity +10\n\t#\"Stick to writing it as best you can! Focus on writing the story itself, the rest will follow.\"\n\t\t*set wordsmith %+10\n\t\t*set drive +10\nHe's right, of course. You thank Dr. Frankel for his supportive words. Perhaps he'll be able to help you later on. After a few more minutes catching up with him you hang up. Still, you're feeling at a loss. \n*goto phonetreecalc\n\n*label jackcall\n*set jacktalk true\nYou run down to the street and grab an empty booth at the bank of pay-phones. Never call Jack the Nose from your personal line. \n\nHe picks up on the first ring and you both do the dance of running through your confirmation code.\n\n\"Jack's Cleaners: we got the starch if you got the scratch.\"\n\n\"What's your rate on men's shirts?\" \n\n\"Gotta check with the boss. Can I call you back?\"\n\nYou give Jack the number of the pay phone and hang up. Now he can call you from a secure line. When he calls back, you give him the rundown.\n\n\"Well, I'll tell you, kid. I've heard on the street the mayor's in hot water. $!{mheshe} has been making very—and I mean very—regular and large payments to someone. My eye the bank told me all about it.\"\n\n*choice\n\t*if (naif) \n\t\t#What is going on? \"Gee, Jacky. Sounds like blackmail.\"\n\t\t\t*set simple %+10\n\t\t\t\"That's right, Sherlock.\"\n\t\t\t*goto jackwrap\n\t#I gotta follow the money. \"You got a line on exactly how much money these payments are for?\"\n\t\t*set simple %-10\n\t\t\"Not precise figures, but I'm sure I can find out for you.\"\n\t\t*goto jackwrap\n\t#I gotta get the real story. \"What kind of hot water is the mayor in?\"\n\t\t*set wordsmith %+10\n\t\t*label trouble\n\t\t\"Only four kinds of trouble in this world for a person like that: sex, power, drugs, or money.\"\n\t\t*goto jackwrap\n\t*if not (naif)\n\t\t#\"Obviously the mayor's being blackmailed but why?\"\n\t\t\t*set generosity %+10\n\t\t\t*goto trouble\t\n\n*label jackwrap\n\n\"Very interesting, Jack. Thanks for the tip.\" You hang up. Hmm. His \"eye at the bank.\" Of course Jack's got someone on the inside at the bank. Ha! You wonder if he isn't planning a heist; but no, the Mob wouldn't rob a bank. Too flashy.\n*goto phonetreecalc\n\n*label phonetreecalc\n*if phonecalls = 3\n\t*goto outtatime\n*elseif phonecalls = 2\n\t*goto outtatime\n*elseif phonecalls = 1\n\t*goto phonetree\n*else \n\t*bug \t\n*label outtatime\n\nYou're out of time to call anyone else, which means you'd better to haul your butt over to City Hall for the press conference itself.\n*finish\t\t\t\t", "2_press": "CHAPTER 2: THE FOURTH ESTATE\n\nIt's hot, sticky, and crowded in the main foyer of City Hall. The rostrum is set up with a lectern and a bouquet of microphones, standard press conference fare. The rest of the city's TV, newspaper, and radio press is milling about—burly guys are shifting cables for a live feed, while you whip out your decidedly low-tech reporter's notebook and golf pencil. \n\nThere's a nervousness in the air, you think. But no—you're projecting; no one else knows what's about to happen here. It's bustling, but the feeling is one of total routine. \n\nAcross the room you see Cal making his way into the fray. \n*if not (caltalk)\n\tHe's probably the only other reporter in town you could think of telling about all this. \n*if (caltalk)\n\tOf course he's here, just as you expected. \t\n*choice\n\t#I give him a nod, but nothing more. \n\t\t*set cal %-15\n\t\t*set integrity +10\n\t\tWe're both busy getting psyched up for the press conference. I'll get a chance to talk with him later. \n\n\t\tYou're conflicted about Cal. On the one hand, he's a good friend, but on the other, he is your competition as well. You're still not sure whether to collaborate or push him aside on this story. But the situation is so confusing, it may demand his help. But who else is here, anyway?\n\t\t*goto network\n\t#I walk over. After all, he's a friend. \n\t\t*set cal %+15 \n\t\t*set integrity +10\n\t\tI need to finish talking this out with him. And he's not just a friend, but a damn good reporter—you want his input now. \n\t\t\n\t\tYou stroll across the room, and look Cal over as you do. Whatever else is true, you guys make a funny pair. He towers over you, with long dark hair he wears tied back in a ponytail. You note his prominent Adam's apple, and blue eyes that seem all the larger focused through the thick lenses of his wireless specs.\n\t\t*goto calconvo2\n\t#I need to focus on who else is here, and leave Cal aside for the moment.\n\t\t*set cal %-15\n\t\t*set drive +10\n\t\tIf someone else is going to beat you getting this story to press, you want to know who the competition is. Right now, you're sure you have a leg up on everyone. \n\t\t*goto network\t\n\t*if (caltalk) \n\t\t#We talked already; plus I need to think about who else here can help me with the story.  \n\t\t\t*set cal %-15\n\t\t\t*set drive +10\n\t\t\t*label network\n\t\t\tYou scan the room for any potential City Hall contacts or rivals in the press corps. You spot a couple reporters from rival publications: the free weekly, the county-wide newspaper, and the local TV stations' young up-and-coming—you struggle to use the word \"journalists\"—broadcasters are setting up their live feeds. \n\n\t\t\tYep, they're all there, including Fernanda Morales, the hot-shot anchor on Channel 6 News. She's tiny in person, but you know she's a real pistol. She broke open a sanitation department corruption story two years ago, and has earned a reputation for being the hardest nosed reporter in town. If only you can keep her from scooping you. \n\t\t\t*goto makingnotes\n\t*if (caltalk) \n\t\t#We talked, sure, but I'm not eager to share anything more with him now. \n\t\t\t*set pulitzer +10\n\t\t\t*set generosity %-5\n\t\t\t*set cal %-10\n\t\t\tSee the thing is, as much as you need help with the story, you're sure as hell not eager to share all the glory. You're right to protect your turf here, because as much as it may feel like a pipe dream, the right local story reported well can open up a whole lot of doors. \n\t\t\t*goto makingnotes\t\t\n\n*label makingnotes \n\nYou turn away from the TV journos, letting your eyes glance over the room, as looking bored and casual as possible. Inside, the wheels are furiously turning. You can only hope it doesn't show on your face. If you had to bet, you'd guess you and Vera were the only members of the press who know what's about to go down. \n\nEveryone else in the room looks as bored as you are pretending you are. No one seems the least bit surprised that this press conference hasn't been [i]preceded[/i] by a press release. You suppose this is to be expected from a fourth estate that's about as twigged to what's really going on in this city as, say, an actual twig. The press corps is complacent and resting quite comfortably on whatever pathetic laurels they've got. You scribble into your classic little black notebook and are beginning to allow yourself to speculate even more wildly on the morning's events so far when Cal walks over to you.\n*goto calconvo2 \n\n*label calconvo2\n*page_break\n\"What do you hear, Cal?\" you greet him. \n\n*if not (caltalk)\n\t\"Not much. Another day, another impromptu presser. Why? You know something?\" The pit of your stomach is churning a little at his questions. \n\t\n\t*if (naif)\n\t\tMay as well tell him what you know; share and share alike.\n\t*if not (naif)\n\t\tHmm. No need to share your scoop, is there?\n\t*choice\n\t\t#I should be generous. He might help me out with some side work. Co-bylines!\n\t\t\tYou tell Cal what you know. \n\t\t\t\n\t\t\t*if (generosity > 50) or (simple > 50)\n\t\t\t\tHe takes it in with a somber look. \n\n\t\t\t\t\"How did Vera know the big news?\" Cal wonders.\n\t\t\t\t\t\n\t\t\t\tYou give him a strained smile. \"Now you're catching on. So what do I do?\"\n\n\t\t\t\t\"For now, just hush up, because it looks like the conference is about to start.\"\n\t\t\t\t*set integrity +10\n\t\t\t\t*set cal %+20\n\t\t\t\t*goto conf\n\t\t\t*else\t\n\t\t\t\tHe takes it in with a skeptical look. \n\n\t\t\t\t\"So what if Vera knew ahead of time. That doesn't mean anything; you're own your own, $!{first_name}.\"\n\n\t\t\t\t\"Really? You think it's a coincidence she knew about this and she doesn't want me to poke around in it?\"\n\n\t\t\t\t\"Well, we're about to get it from the horse's mouth; here comes the mayor now.\"\n\t\t\t\t*set cal %-20\n\t\t\t\t*set integrity -5\n\t\t\t\t*goto conf\n\t\t#I want to corral Cal into helping me investigate, then maybe I can cut him out and keep the story and the glory for myself.\n\t\t\tYou give Cal the facts, and see if he's interested in helping you.\n\t\t\t*if cunning > 60\n\t\t\t\t\"Gee, $!{first_name},\" Cal lets out a low whistle. \"This is huge. We'll have to work together on it. Who knows what the mayor's up to? Or whether someone isn't wrongfully blackmailing ${mhimher}.\"\n\t\t\t\t*set drive +10\n\t\t\t\t*set cal %+20\n\t\t\t\t*goto conf\n\t\t\t*else\t\n\t\t\t\t\"Gee, ${first_name},\" Cal lets out a low whistle. \"This is huge. But as for helping you, we'll see. I think it's usually every reporter for themself—dog eat deadline world, you know?\"\n\t\t\t\t*set drive -5\n\t\t\t\t*set cal %-20\n\t\t\t\t*goto conf\n\t\t#I do want Cal's help, but only as equal writers, dividing up the writing and investigating.\n\t\t\tYou give Cal what you've got so far. He's obviously worried about the implications—not just for the city, but for your paper, and journalism in general. Could there be a crooked editor on staff? Vera, really?\n\t\t\t\n\t\t\t*if wordsmith > 50\n\t\t\t\t\"We've gotta go in on this together, buddy,\" Cal suggests before you get a chance.\n\n\t\t\t\t\"Partners?\"\n\n\t\t\t\t\"I'll pitch in when I can. Shared byline if anything comes out of it.\"\n\t\t\t\t*set cal %+20\n\t\t\t\t*set integrity +10\n\t\t\t\t*goto conf\n\t\t\t*else \t\t\t\t\n\t\t\t\t\"Look, old friend, I appreciate the offer, but my plate is full. Plus, I think you work better solo. I'll help if I can.\"\n\t\t\t\t*set cal %-20\n\t\t\t\t*set integrity -5\n\t\t\t\t*goto conf\t\t\n*if (caltalk) \n\t\"You mean since we last talked? Not much.\"\n\n\tYou chuckle. But since your call, lo those short minutes ago, something occurs to you. Maybe you do need Cal's help. Or at least someone's help. \n\t*if not (tradition)\n\t\tYou've known Cal forever,\n\t*if (tradition)\n\t\tYou've known Cal since college days,\n\tand you also know he is always there for you in a pinch. But you know…hmm, how to put it. You can't always trust him professionally. He can get greedy with a story, even as he does help you from time to time. \n\n\tThe dilemma is, you're starting to think this might be too big for one person. You know you want to make sure you're the one who gets ahead here.\n\t*choice\t\t\t\t\n\t\t#I oughta bring Cal in on this, properly. He's a friend; I help my friends. \n\t\t\t\"What do you say, Cal? I think this story needs two reporters.\"\n\t\t\t*set cal %+20\n\t\t\t*if generosity > 55\t\t\n\t\t\t\t\"Absolutely, you can count on me for back-up.\"\n\t\t\t\t*set integrity +10\n\t\t\t\t*goto conf\n\t\t\t*else\n\t\t\t\t\"We're friends, $!{first_name}, of course. But I've got inches to fill at my paper and you do at yours.\"\n\t\t\t\t*set integrity -1\n\t\t\t\t*goto conf\n\t\t*if not (naif)\n\t\t\t#I need to be looking out for number one: maybe get Cal to do my legwork, then cut him loose. \n\t\t\t\t\"Say, Cal, what if we split up the investigation on this story. You scratch my back, I'll scratch yours?\"\n\t\t\t\t*set heart %-20\n\t\t\t\t*set cunning %+5\n\t\t\t\t*set screwcal true\n\t\t\t\t\n\t\t\t\t*if simple \u003c 50\n\t\t\t\t\t*set pulitzer +10\t\n\t\t\t\t\t\"Very intriguing proposition, $!{first_name},\" Cal replies with a smirk. \"Let's do it.\"\n\t\t\t\t\t*goto conf\t\t\t\n\t\t\t\t*else\t\t\n\t\t\t\t\t\"Oh, hell no!\" Cal chortles back. \"I've got your number, ${lingogender}.\"\n\t\t\t\t\t*set pulitzer -1\n\t\t\t\t\t*goto conf\n\t\t#Cal is a hell of a writer; but Frankel's a better one. I can do it with a little advice from my mentor. \n\t\t\tYou give Cal a tight smile and say nothing. \n\n\t\t\t\"Well, $!{first_name},\" Cal glances at his watch, \"Looks like it's almost time.\"\n\t\t\t*set cal %-20\n\t\t\t*if wordsmith > 65\n\t\t\t\t*set integrity +10\n\t\t\t\t*goto conf\n\t\t\t*else\n\t\t\t\t*set integrity -1\n\t\t\t\t*goto conf\t\n\t\t*if (cuz) \n\t\t\t#Forget about Cal! Vera being corrupt? I'm just waiting until I know more to go to Cousin Lyman with this.\n\t\t\t\tIndeed. You've never wanted to press your advantage on this, but corruption is corruption, and you smell a rat. \n\t\t\t\t*set cal %-20\n\t\t\t\t*if cunning \u003c 55\n\t\t\t\t\t*set integrity +10\n\t\t\t\t\t*goto conf\n\t\t\t\t*else \n\t\t\t\t\t*set integrity -1\t\n\t\t\t\t\t*goto conf \n\t\t#Cal's not going to be any use. I gotta go back to Jack the Nose. On my own. \n\t\t\tThe underworld is a rich source of information in this town; tap it and you'll likely strike reporting [i]gold[/i].\n\t\t\t*set cal %-20\n\t\t\t*if simple \u003c 55\n\t\t\t\t*set pulitzer +5\n\t\t\t\t*goto conf\n\t\t\t*else\n\t\t\t\t*set pulitzer -2\n\t\t\t\t*goto conf\n\n*label conf\n*page_break The Conference Begins\nAnd sure enough, here comes the mayor, stepping up onto the rostrum. There's a flurry of activity as the cameramen adjust their live shots, and print reporters like yourself jostle forward, positioning their minitape recorders as close to the mayor as they can reach. \n\nThe mayor is actually something of a mystery, on a personal level. Much like Mayor Koch, no one is sure whether ${mheshe} is straight, gay, or just too busy for romance. $!{mheshe} usually brings a cousin or an old, platonic friend to formal events. $!{mhisher} clothes are conservative and businesslike, but not boring. All in all, ${mheshe} cuts an interesting figure. \n\n*if mgender = \"male\"\n\tHis name is \n\t*choice\n\t\t#Robert.\t\n\t\t\t*set mname \"Robert\"\n\t\t\t*goto mayorfeels\n\t\t#Patrick.\n\t\t\t*set mname \"Patrick\"\n\t\t\t*goto mayorfeels\n\t\t#Omar.\n\t\t\t*set mname \"Omar\"\n\t\t\t*goto mayorfeels\n*elseif mgender = \"female\"\n\tHer name is\n\t*choice\n\t\t#Ling.\n\t\t\t*set mname \"Ling\"\n\t\t\t*goto mayorfeels\n\t\t#Felicia.\n\t\t\t*set mname \"Felicia\"\n\t\t\t*goto mayorfeels\n\t\t#Hanna.\n\t\t\t*set mname \"Hanna\"\n\t\t\t*goto mayorfeels\n*elseif mgender = \"fluid\"\n\tZir name is \n\t*choice\n\t\t#Max.\n\t\t\t*set mname \"Max\"\n\t\t\t*goto mayorfeels\n\t\t#Charley.\n\t\t\t*set mname \"Charley\"\n\t\t\t*goto mayorfeels\n\t\t#Stacey.\n\t\t\t*set mname \"Stacey\"\n\t\t\t*goto mayorfeels\n\t\t\t\t\n*label mayorfeels\n\nEven though something may be afoot, you can't help but notice that for an elected offical (after all, politics is just Hollywood for ugly people) ${mname} is not bad-looking. Those dark and deep eyes, the thick curly hair, and the little distinguished crinkles at the corner of ${mhisher} mouth makes the mayor seem\n*fake_choice\n\t#Attractive, if only there were a way to get close to ${mhimher}. \n\t\t*set mrel %+10\n\t#Not my type, but polished for the political scene. Besides, I'm taken.   \n\t\t*set mrel %-10\n\t#Good-looking, I suppose, but nothing compared to my sweetheart, $!{soname}. \n\t\t*set mrel %+5\n\t\t\nYou can't figure out if ${mname} is a crook or a victim yet. So far you're learning toward\n\n*choice\n\t#Both. $!{mname} has probably got some dirty dealings, but that doesn't mean they aren't a blackmail victim.\n\t\t*set mrel %+10\n\t\t*if simple \u003c 55\n\t\t\t*set integrity +2\n\t\t\tYou're going to break open the story and set the mayor free of a blackmailer. \n\t\t\t*goto nextsteps\n\t\t*else\n\t\t\tIf only you had any evidence of this. You don't know much yet. \n\t\t\t*goto nextsteps\n\t#Victim. $!{mheshe} could be being blackmailed. $!{mname} needs protection.\n\t\t*set mrel %+10\n\t\t*if heart > 55\n\t\t\t*set drive +2\n\t\t\tYour heart goes out to $!{mname}. There must be something you can do, in addition to just reporting the story. \n\t\t\t*if (jacktalk)\n\t\t\t\tObviously Jack was on to something when he shared that the mayor was making large, regular withdrawals from ${mhisher} bank account.\n\t\t\t*if not (jacktalk)\n\t\t\t\tWhy else would the mayor step down? Someone has got to be putting pressure on ${mhimher}.\n\t\t\t*goto nextsteps\t\t\n\t\t*else\n\t\t\tThat would make this story even juicier! What could the mayor have done that would attract a blackmailer?\n\t\t\t*goto nextsteps\n\t#Crook. Why else would ${mheshe} be stepping down in a hurry?\n\t\t*set mrel %-10\n\t\t*if simple \u003c 55\n\t\t\t*set pulitzer +2\n\t\t\tIf the mayor is stepping down, there's a reason, and the public will want to know.\n\t\t\t*goto nextsteps\n\t\t*else\n\t\t\tIf only you had any evidence of this. You don't know much yet. \n\t\t\t*goto nextsteps\n\t#Neither. I reserve judgment until I know all the facts.\n\t\t*set mrel %+5\n\t\t*set simple %-5\n\t\t*if heart \u003c 55\n\t\t\t*set drive +2\n\t\t\tMaybe ${mheshe} is neither victim or crook, but the facts will have to bear that out. \n\t\t\t*goto nextsteps\n\t\t*else\n\t\t\tWhatever the real story is, you will find the truth.\n\t\t\t*goto nextsteps\n\n*label nextsteps\n\nMayor $!{mname} Johnson steps to the podium, and clears ${mhisher} throat. Suddenly the room hushes, no sound but the click and whirr of high speed SLR cameras, capturing every flit of the mayor's worried eyes. \n\n\"Ladies and gentlemen of the press, good afternoon,\" ${mheshe} begins. \"I've called the conference to announce that as of 1 p.m. today I am resigning my position as mayor; until a special election can be held, deputy mayor Molly Griffiths will be stepping in as the acting chief. At this time I wish to sincerely thank the employees at City Hall, the members of the City Council, and the people of this City for their support, and their hard work. My reasons for resigning are my own, and I hope you will respect my privacy. Thank you. I will not be taking questions.\" \n\n*page_break …!\n\nDespite \"no questions,\" immediately a throng pushes forward, shouting a million questions at once. You back away, freeing yourself from the crowd, and run out to get some fresh air. Obviously you weren't going to learn anything here, but Vera rules with an iron fist. Time to get back to the ranch and write it up. Not that you won't be investigating further. In fact, as soon as you're done with the \"just the facts ma'am\" three hundred words on the press conference you plan to:\n\n*choice\n\t*if (jacktalk) \n\t\t#Track down Jack the Nose and follow up—he's got to know more. \n\t\t\t*gosub newsroom\n\t\t\t*goto jacktransition\n\t*if not (jacktalk) \n\t\t#Find Jack the Nose; I should have called him in the first place.\n\t\t\tThere's one person who really knows what's going on in this town. Follow the money and the evidence so far. Jack's your best source here.\n\t\t\t*gosub newsroom \n\t\t\t*set alone true\n\t\t\t*goto jacktransition\n\t*if (screwcal) \n\t\t#Seriously, I'm going to get Cal to do my legwork.\n\t\t\tWhy trouble yourself when you can get Cal to do your grunt work?\n\t\t\t*goto calcorraled \n\t#I have to see if I can't find out how Vera knew ahead of time.\n\t\tThat's the key to everything here. The mayor in trouble? Ok, but now that ${mheshe} resigned, the real investigation is all about one person: Vera. A corrupt mayor is not news to the public, but a corrupt newspaper editor? Who knows what else Vera has been keeping out of the papers, and for whom, and why. \n\t\t*goto bustvera\n\t#See if Cal can help me, at least, as equals.\n\t\t*if not (tradition)\n\t\t\tTruth be told, you're a little insecure about your background sometimes. You didn't go to journalism school, and the other staffers, and especially Vera, always find some way of letting you know you're not one of them. Cal has never been like that with you. He sees you as true equals as writers and as friends. \n\t\t*if (tradition)\t\n\t\t\tYou two are peas in a pod—same background, same alma mater. You want to count on Cal if you can. \n\t\t*goto calcorraled\n\t#Focus on $!{mname}. My source on ${mhisher} staff has to talk to me. \n\t\t*if (naif)\n\t\t\tThe mayor obviously needs help here. $!{mheshe} could be in real trouble. The source must care enough to leak the truth to you.\n\t\t*if not (naif)\n\t\t\tThe mayor's obviously in real trouble: the juicy, Page 1 above-the-fold kind. You're sure your source would love to spill the beans, and if they don't want to\n\t\t\t*if (rich)\n\t\t\t\tyou can always use some of your secret stash of cash to make sure a few simoleons make their way into the right pocket.\n\t\t\t*if not (rich)\n\t\t\t\tyou can always find some little bit of dirt to use as leverage to make them talk. \n\t\t*goto mayorstaff\n\n*label calcorraled \n\nIn the hubbub of the dispersing crowd, you meander over to Cal, hunched over his notebook in the corner. Now's your chance to pounce.\n\n\"Listen, I'm got a couple of leads I want you to run down. Help me out and we'll run co-bylines in both papers,\" you offer, oh-so-casually.\n\n\"Why should I?\" Cal asks.\n*choice\n\t#\"Because you're my friend, and friends help each other,\" I plead, a little disingenuously.\n\t\t*if cal > 60\n\t\t\t\"Ok, $!{first_name}, tell me what to do.\"\n\t\t\t*goto calsuccess\n\t\t*else\n\t\t\t\"No dice. You'll make me do the leg-work and then cut me out, I just know it.\"\t\n\t\t\t*goto calfailed\n\t#\"Because you're a great writer, just like me,\" I brag and flatter at the same time. \n\t\t*if (wordsmith > 65)\n\t\t\t\"You got me there, $!{first_name}. What's the plan?\n\t\t\t*goto calsuccess\n\t\t*else\n\t\t\t\"Flattery gets you nowhere with me.\"\n\t\t\t*goto calfailed\t\n\t#\"Because we're both going to scoop everyone else, but only if we work together,\" I strategize.\n\t\t*if simple \u003c 50\n\t\t\t\"You always were a charmer, $!{first_name}. Ok, I'm in.\"\n\t\t\t*goto calsuccess\n\t\t*else\n\t\t\t\"You mean you'll take my work and then cut me out. How do you know I'm not already doing that to you?\"\n\t\t\t*goto calfailed\n\t*if (naif) #\"Because I believe people are basically good, and I know you want to help a friend out.\"\n\t\t*if generosity > 55\n\t\t\tCal looks at you with genuine friendship. \"Alright, $!{first_name}. I'll help.\"\n\t\t\t*goto calsuccess\n\t\t*else\n\t\t\t\"You think you got me wrapped around your little finger, $!{first_name} but I'm wise to you. No dice.\"\n\t\t\t*goto calfailed\t\t\t\t\n\n*label calsuccess\t\n*set alone false\n\n*if not (tradition)\n\tWow! You've got him hook, line, and sinker. See, these are the kinds of things you have to learn to do when you come from the wrong side of the tracks. You'll step over your own grandma to get a story. But no worries, Cal knows the game—and if he doesn't know there's a chance you'll screw him over, more fool him. \n*if (tradition)\n\tYou haven't been able to pull the wool over Calvin Czarnovsky's eyes in years! Not since sophomore year with that fake story you planted about the girls' swim team that he bought hook, line, and sinker. In fact, you're a little worried he might think he's about to get the chance to play [i]you[/i], even as you're attempting to play him like a cheap fiddle. \n\n\"Ok, three points of attack here, Cal.\" He nods, listening intently. \"One, I have a mob source who may know more. Two, we need to sniff around Vera's background and see what connection she might have. Three, we can investigate the mayor a little more closely.\" \n\n\"Which do you want to handle, $!{first_name}?\" Cal asks. \n\n*choice\n\t#\"Jack, my mob source; he might not feel comfortable talking to you.\"\n\t\t*set simple %-5\n\t\t\"Sounds fine,\" Cal replies. \"I'll see what I can dig up on Vera.\"\n\n\t\t\"Great. Let's re-convene at 5pm and share info.\"\n\t\t*set cali \"Vera\"\n\t\t*gosub newsroom\n\t\t*goto jacktransition\n\t#\"Vera. She's my boss; I'll know where to look for skeletons.\"\n\t\t*set vera %-5\n\t\t\"Perfect. Maybe I can get something from your friend on the mayor's staff,\" Cal says.\n\n\t\tYou let him know he'll need a special coded exchange to talk with the source, and to let the source know you sent him.  \n\n\t\t\"We'll re-connect later today and see what we've found out.\"\n\t\t*set cali \"the mayor\"\n\t\t*goto bustvera\n\t#\"$!{mname}, because I think I'll have better luck with ${mhisher} staff. I have a source.\"\n\t\t*set mrel %+5\n\t\t\"That makes sense,\" Cal says. \"I'll take a chance looking into Vera. Maybe an outsider's eye will see something you don't.\"\n\n\t\t\"Thanks, Cal. Let's talk this evening and see what we've been able to put together.\"\n\t\t*set cali \"Vera\"\n\t\t*goto mayorstaff\n\t#I'll handle $!{mname} staff, you look into talking with Jack the Nose.\n\t\t*set vera %-5\n\t\t\"Sounds good,\" Cal replies.\n\t\t*set cali \"Jack\"\n\t\t*goto mayorstaff\t\n\t*if (cuz)\n\t\t#\"Cal, I got something to tell you: my cousin is the publisher of the paper. We should go to him.\"\n\t\t\t*set cunning %+5\n\t\t\t\"Are you kidding me?!\" Cal explodes. \"This is…this is…\"\n\t\t\n\t\t\t\"A huge secret, yeah. Even he doesn't know I'm working for him. But I think the implications of Vera being somehow involved here are too great to ignore.\"\n\n\t\t\t\"I agree. You go to your cousin, and then I can go follow up …\"\n\t\t\t*fake_choice\n\t\t\t\t#\"…your mob source, Jack.\"\n\t\t\t\t\t*set cali \"Jack\"\n\t\t\t\t#\"…your source at the mayor's office.\"\n\t\t\t\t\t*set cali \"the mayor\"\n\t\t\t\t#\"…on Vera herself.\"\n\t\t\t\t\t*set cali \"Vera\"\n\n\t\t\t\"Fine by me. Let's meet back at 5pm and share information,\" you suggest.\n\n\t\t\t\"Good luck.\" And with that, Cal whirls away, ponytail flying. \n\t\t\t*gosub newsroom\n\t\t\t*goto holdoffoncuz \t\t\n\n*label calfailed\n*set alone true\n*set cal %-20\n\n\"Well,\" you sigh, \"can't blame a ${lingogender} for trying, can you?\"\n\nCal snorts and gives a little shrug of disgust. Rats. He was on to you; your plan was never going to work. Which leaves you where?\n*label chooseagain\n*choice\n\t*if (jacktalk) \n\t\t#Track down Jack the Nose and follow up—he's got to know more. \n\t\t\t*set heart %-10\n\t\t\t*gosub newsroom\n\t\t\t*goto jacktransition\n\t*if not (jacktalk) \n\t\t#Find Jack the Nose; I should have called him in the first place.\n\t\t\t*set heart %-10\n\t\t\tThere's one person who really knows what's going on in this town. Follow the money and the evidence so far. Jack's your best source here.\n\t\t\t*set alone true\n\t\t\t*gosub newsroom\n\t\t\t*goto jacktransition\n\t#I have to see if I can't find out how Vera knew ahead of time.\n\t\t*set vera %-10\n\t\tThat's the key to everything here. The mayor in trouble? Ok, but now that ${mheshe} resigned, the real investigation is all about one person: Vera. A corrupt mayor is not news to the public, but a corrupt newspaper editor? Who knows what else Vera has been keeping out of the papers, and for whom, and why. \n\t\t*goto bustvera\n\t#I'll focus on ${mname}. My source on ${mhisher} has to talk to me. \n\t\t*set mrel %+10\n\t\t*if (naif)\n\t\t\tThe mayor obviously needs help here. $!{mheshe} could be in real trouble. The source must care enough to leak the truth to you.\n\t\t*if not (naif)\n\t\t\tThe mayor's obviously in real trouble: the juicy, Page 1 above-the-fold kind. You're sure your source would love to spill the beans, and if they don't want to\n\t\t\t*if (rich)\n\t\t\t\tyou can always use some of your secret stash of cash to make sure a few simoleons make their way into the right pocket.\n\t\t\t*if not (rich)\n\t\t\t\tyou can always find some little bit of dirt to use as leverage to make them talk. \n\t\t*goto mayorstaff\n\t\t\t\t\t\n*label newsroom\n*page_break Back at the Office\nBefore you can do anything else, you've got to get back to the [i]Citizen[/i] newsroom and pound out the copy, just like Vera demanded. No ifs, ands, or buts. You run back to the office, now full of day shift reporters, and plop down at your desk. \n\n[i]Today at noon Mayor $!{mname} Johnson announced ${mheshe} will be resigning, leaving ${mhisher} deputy mayor Molly Griffiths …[/i]\n\nBlah, blah, blah. It's all rote, and then it's all wrote, so to speak. You type away, but your mind is spinning with possibilities, questions, angles to explore. A glance across the office reveals that Vera is in, her door closed. You can see through the window of the door she has her high-heel booted feet propped up on the desk. Right. You take your story down to the copy desk and deposit it into the custody of the copy-girl on duty. She takes the paper from you without even looking up from her work, which is red-penning errors on some other poor bastard's copy. \n\nNow that that's done, on to the real business. You muse for a moment… \n\n*if cali = \"the mayor\"\n\tCal'll be trying to get in touch with your source right now.\n\t*return\n*elseif cali = \"Vera\"\n\tCal is probably rooting through Vera's garbage right this minute.\n\t*return\n*elseif cali = \"Jack\"\n\tCal is likely in a smoky back room, trying to put the squeeze on Jack the Nose right now. \n\t*return\n*else \n\tYou take a breath. You never thought this day would hold the biggest break you've gotten a chance at in your short career. You can't blow it.  \n\t*return\n\n*label bustvera \n*gosub newsroom\n*label bustvera2\n*page_break \nIndeed, the story, as you see it, is finding out more about Vera and her connection to the mayor and ${mhisher} resignation. Somehow, somewhere, she's left a trail of evidence. You're going to find it and \n*set goalchoice true\n*fake_choice\n\t#I just want to see to it that she loses her job. People like her diminish the profession.\n\t\t*set vera %-20\n\t\t*set drive +10\n\t\t*set goal \"lose her job\"\n\t#I want anything ugly like this investigated fully and published. Reporters have a sacred duty to the public.\n\t\t*set vera %-20\n\t\t*set pulitzer +10\n\t\t*set goal \"duty\"\n\t#See to it that if Vera's in any trouble herself, you can help. After all, maybe she's been trying to protect you from finding out something dangerous.\n\t\t*set vera %+20\n\t\t*set integrity +10 \n\t\t*set goal \"help Vera\"\n\t*if (cuz)\n\t\t#See to it that your cousin the publisher knows all about it. And hey, if you can rid yourself of Vera at the same time, why not?\n\t\t\tWhy not, indeed?\n\t\t\t*set goal \"fire Vera and get her job\"\n\t\t\t*set vera %-20\n\t\t\t*set drive +10\n\t#Protect the mayor—${mheshe} is the one at risk here.\n\t\t\t*set goal \"save the mayor\"\n\t\t\t*set mrel %+20\n\t\t\t*set integrity +10\n\t*if not (rich)\t\t\n\t\t#Make sure I milk the story for all it's worth; it's going to make me rich!\n\t\t\t*set goal \"get rich\"\n\t\t\t*set drive +25\n\t\t\t*set vera %-5\n\t#All I want is that City Desk editorship. Surely I can finagle it?\n\t\t*set goal \"fire Vera and get her job\"\n\t\t*set drive +25\n\t\t*set vera %-5\nBut before you can get to Vera, you \n*set choseverafirst true\n*if (cali != \"Jack\") and (jacktalk)\n\tthink you might need to talk with Jack again.\n*if (cali != \"Jack\") and (not(jacktalk))\n\tthink you might need to talk with Jack the Nose yourself. \n*goto jacktransition\n\n*label mayorstaff \n*gosub newsroom\n\nThe the story starts right where you think it does: Mayor $!{mname} Johnson's office. You take another glance at Vera's office door (still in there, you can see her feet), and quietly slip past your colleagues, who are gathering to go to lunch together. \n\nYour first stop is\n*temp officevisit false\n*fake_choice\n\t#A payphone where you can safely and privately try calling your source in the mayor's office.\n\t\t*set cunning %+5\n\t#An alcove in the east stairwell where you can call the source on your cell without anyone noticing.\n\t\t*set simple %-5\n\t#Going directly back to City Hall and calling from the lobby, in order to coax them out into the light.\n\t\t*set wordsmith %-5\n\t\t*set officevisit true\n\n*if (officevisit)\n\tRunning back and forth between the office and City Hall is getting tiresome, but you make your way back there and grab a courtesy phone in the large, marble-floored lobby. A receptionist is eyeing you a bit suspiciously, but no matter. The crowd that flooded the room just an hour ago has dispersed, and the only evidence of the press conference remaining is the big, empty podium by the grand staircase.  \n*set mayoryou true\n\nYour source picks up after 3 rings. Since you initiated contact, you begin with the code. \n\n\"I can't talk now,\" ${mheshe} says. \"It's too crazy this afternoon. There are things you need to know, though.\"\n\n\"I'll meet you any time, anywhere,\" you reply.\n\n\"Good. I'll be on the fourth floor of the municipal parking garage, tonight. I'll be standing at the back of the east side of the garage. Midnight. Be there.\"\n\nWhoa. This has taken a serious cloak and dagger turn, but you're not daunted in the least. \n\n\"I'll be there.\" You hang up, and lean back against the wall.  \n\nNow you have to decide what to do between now and midnight. \n*choice\n\t*if cali = \"Jack\"\n\t\t#Cal's following up with Jack the Nose, but I'm concerned he may not be the right man for the job. \n\t\t\tI should go in for backup.\n\t\t\t*goto jacktransition\n\t*if cali = \"Vera\"\n\t\t#Cal's looking into Vera, so I'll reach out to Jack the Nose.\n\t\t\t*goto jacktransition\t\n\t#I'm going to reach out to Jack the Nose.\n\t\t*goto jacktransition\n\t#I should think about looking into Vera.\n\t\t*goto bustvera2\t\t\t\t\n\n*label jacktransition \n\nThe thing about Jack is, you're going to have to stay on your toes to get what you need to know. You're about to find out if you'll be able to.\n*if not (goalchoice)\n\t*set goalchoice true\n\tBut before that, what do you most want?\n\t*fake_choice\n\t\t#I just want to see to it that she loses her job. People like her diminish the profession.\n\t\t\t*set vera %-20\n\t\t\t*set drive +10\n\t\t\t*set goal \"lose her job\"\n\t\t#I want anything ugly like this investigated fully and published. Reporters have a sacred duty to the public.\n\t\t\t*set vera %-20\n\t\t\t*set pulitzer +10\n\t\t\t*set goal \"duty\"\n\t\t#See to it that if Vera's in any trouble herself, you can help. After all, maybe she's been trying to protect you from finding out something dangerous.\n\t\t\t*set vera %+20\n\t\t\t*set integrity +10 \n\t\t\t*set goal \"help Vera\"\n\t\t*if (cuz)\n\t\t\t#See to it that your cousin the publisher knows all about it. And hey, if you can rid yourself of Vera at the same time, why not?\n\t\t\t\tWhy not, indeed?\n\t\t\t\t*set goal \"fire Vera and get her job\"\n\t\t\t\t*set vera %-20\n\t\t\t\t*set drive +10\n\t\t#Protect the mayor—${mheshe} is the one at risk here.\n\t\t\t\t*set goal \"save the mayor\"\n\t\t\t\t*set mrel %+20\n\t\t\t\t*set integrity +10\n\t\t*if not (rich)\t\t\n\t\t\t#Make sure I milk the story for all it's worth; it's going to make me ric
