 the information.\n\t\t\t*if heart \u003c 50\n\t\t\t\t*set drive +20\n\t*goto meet\t\t\n*if (verayou)\n\tThanks to your own hard work, and not a little care, you \n\t*if stole = \"empty-handed\"\n\t\tgot Greg to tell you about the selectman's race. If Vera and ${mname} have so much history together, it stands to reason that they'd both be tied up in this. \n\t*if stole = \"mail\"\n\t\tknow that someone with the mayor's first initial sent that incriminating note to Vera. Toss in her behavior this morning and you know you're going to make two and two equal four.\n\t*if stole = \"checkbook\"\n\t\tknow that Vera's been getting money. Cold hard cash, and lots of it. Combine that with her quashing your story this morning and it's all suspicious as hell.\n\t*if stole = \"email\"\n\t\tknow that Vera has received an incredibly suspicious and incriminating anonymous email. Whatever else, you have that handy piece of evidence in hand. \n\t*if stole = \"address book\"\n\t\thave the suspicious fact that ${mname}'s number was in her address book and listed neatly beside it, ${mhisher}'s first initial. \n\t*goto meet\t\n*if (skiptofive)\n\t*goto meet\n\n*label meet\n\t\nA figure moves in the shadows, stepping toward the light, toward you. At first all you can see is a the silhouette—someone in a long tan raincoat, belted at the waist. Do you recognize them?\n*fake_choice \n\t#Yes.\n\t#No.\n\t#Not in this light.\n\nThe contours of the  \n*if mgender = \"male\"\n\tman\n*if mgender = \"female\"\n\twoman\n*if mgender =  \"fluid\"\n\tperson\nslowly resolve, as ${mheshe} steps into the light. [i]My God[/i] you think. \n*page_break It Can't Be!\t\nIt's the mayor!\n\n\"But why?\" you ask, \"Your office-well, you-fed me information for stories…I assumed a staff person, but I never imagined it was you, yourself.\"\n*choice\n\t#\"You look very surprised, ${first_name}. As though you had no idea?\"\n\t\tTruth be told, you did have no idea. \n\t\t*set cunning %-10\n\t\t*label used\n\n\t\tBut still, wow. Do you feel used?\n\t\t*fake_choice\n\t\t\t#No. I take tips from any source I know is reliable, even when that source is \t\t\t\tanonymous. And I help those sources when they're in trouble.\n\t\t\t\t*if generosity \u003c simple\n\t\t\t\t\t*set integrity %+10 \n\t\t\t\tThe mayor being your source at City Hall doesn't change the fact that ${mheshe} is in trouble now. You're going to have to take what ${mheshe} has to say in a new light, but that's not important right now. \n\t\t\t#Yes, I do. But I don't have time for my feelings right now. The story!\n\t\t\t\t*if wordsmith > heart\n\t\t\t\t\t*set pulitzer +10 \n\t\t\t\tThat's what you're here to get—the truth! Your feelings about the mayor planting stories and leaking information to you will have to wait. \n\t\t\t#Yes, I do, a little. I won't rely so heavily on an anonymous source in the future. They can lead to rude surprises.\n\t\t\t\t*if cunning > simple\n\t\t\t\t\t*set integrity +10\n\t\t\t\tYou were a little shocked, yes. And yes, that makes you feel a little used. After all, the mayor's been the source feeding you leaks—not exactly scrupulous of ${mhimher}, was it?\n\t\t\t#No; who cares? It's a dog eat dog world and I'd do the same as the mayor.\n\t\t\t\t*if simple \u003c cunning\n\t\t\t\t\t*set drive +10 \n\t\t\t\tIf you were mayor, having young, hungry reporter for a pet…well let's just say it's better than man's best friend. You see that now, of course. The mayor was acting in ${mhimher} own interest, but that doesn't make the stories you wrote from ${mhimher} tips any less true. Right?\n\t\t\t\t \t\n\t\t\"Look, we don't have time for this now, ${mname}. May I call you, '${mname}?'\"\n\n\t\t\"Please,\" ${mheshe} replies. \n\t\t*goto meetnext\n\t#\"I know it's a shock, but you're an understanding person, and I need your help now, ${first_name}.\"\n\t\tYes, it is a shock! And sure, this was hardly the most opportune moment to find out who your secret source was. \n\t\t*set generosity %+10\n\t\t*goto used\n\t#\"Yes, your source was me all along. But you knew that already, didn't you, ${first_name}?\"\n\t\tIn your heart of hearts, you did know. OK, maybe you didn't [i]know[/i] but you knew. What reason would a source at City Hall have to be anonymous? Some functionary or staffer would probably be thrilled to meet you in smoky bars to give you dirt. \n\t\t*set simple %-10\n\t\t*goto used\n\n*label meetnext\n*page_break\nThe mayor begins rummaging in ${mhisher} bag, as if to produce that fabled manila envelope full of evidence.\n\n\"Look, before you say anything else, let me tell you what I know,\" you begin. \"I got \n*if (verayou)\n\t*if stole = \"mail\"\n\t\thold of some of Vera's mail. I found a note. A note which said,\" and you pull it from your pocket, \"'I give in. I'm done with this. I'm broke. Can't go on.' It's signed with your initial. But you already know that, don't you?\"\n\t*if stole = \"checkbook\"\n\t\ta look in Vera's checkbook. There were some very interesting entries in there. Regular cash deposits, large cash deposits. Each entry in her checkbook for one of these deposits had your first initial in the memo line.\"\n\t*if stole = \"address book\"\n\t\ta peek at Vera's address book. Inside, well…your number was in it, marked with your first initial, so there's no mistake there, is there? It was the only entry without the full name written out.\"\n\t*if stole = \"empty-handed\"\n\t\tto talking with a colleague of mine. He told me that you and Vera went way back. In fact, the way he told it, I'd be willing to bet it was you who told Vera that your opponent in the selectman's race was having an affair. You seem to have a habit of feeding pet reporters juicy stories.\" \n\t*if stole = \"email\"\n\t\tonto Vera's email. There was an email from an anonymizing service, but signed with your initial. If I'm right, then you know already what was in that email, don't you?\"\t\n*if (verarevealed)\t\n\ta friend of mine to do some checking on Vera. He discovered she's been receiving $4000 every month. I can't say with 100% certainty what that money is for, and who has been giving it to her, but I'm pretty sure I've got a good idea.\"\n\n${mname} breathes out slowly, audibly. At first you aren't sure if ${mheshe} is surpressing an angry outburst or about to launch forward and hug you, but just as ${mheshe} seems to collect ${mhimher}self, you see tears forming, then flowing. \n*fake_choice\n\t#Offer ${mname} my handkerchief.\n\t\t*if generosity > 60\n\t\t\tYou hand the mayor a clean cotton hankie and ${mheshe} dries her eyes, and catches ${mhimher} breath. When you ${mheshe} has gathered their wits, you cough politely, indicating you can move on with the conversation.\n\t\t\t*set mrel %+20\n\t\t\t*goto comfort\n\t\t*else\n\t\t\tYou offer the hanky, but ${mname} just turns away and sobs, ignoring you. \n\t\t\t*set mrel %-10\t\n\t\t\t*goto comfort\n\t#Step aside and turn your face to give ${mhimher} privacy.\n\t\t*if heart > 60\n\t\t\tThe polite thing to do is let someone who is crying in front of you just…cry it out a little. You give ${mname} a moment to ${mhimher}self, stepping away on tiptoes as ${mheshe} goes on a brief jag. \n\t\t\t*set mrel %+20\n\t\t\t*goto comfort\n\t\t*else\n\t\t\tBut as you turn away, ${mname} lets out a huge sob and says, \"Don't walk away from me, and the pain I'm in.\" You wait, to see if ${mheshe} wants you to say something, but ${mheshe} continues to cry for some minutes. \t\n\t\t\t*set mrel %-10\n\t\t\t*goto comfort\n\t#Tell ${mname} to knock it off.\n\t\t*if simple \u003c 40\n\t\t\t\"As you said, we don't have time for this; get it together,\" you say, and let ${mname} know you're eager to get on with this by roughly dropping your bag to the ground and leaning against the wall. \n\n\t\t\t\"I'm sorry, I'm sorry,\" ${mheshe} sniffles, \"It's just been so hard, keeping all this under my hat.\"\n\t\t\t*set mrel %-20\n\t\t\t*goto comfort\n\t\t*else\n\t\t\tYou try to think of some way to tell ${mhisher} to stop it already, but you're too moved by ${mhisher} pain. You respectfully wait it out. \t\n\t\t\t*set mrel %+10\n\t\t\t*goto comfort\n\t#Step forward and comfort ${mhimher} with a pat on the back. \n\t\t*if heart > 60\n\t\t\t\"There, there,\" you say—tried and true when someone's upset.\n\n\t\t\t\"It's been such a huge weight on my shoulders,\" ${mname} says, \"Not just the money, but keeping it all a secret, too.\" You nod with understading, pat ${mhimher} on the shoulder, and give the bicep a quick, friendly squeeze before stepping back again. \n\t\t\t*set mrel %+20\n\t\t\t*goto comfort\n\t\t*else\t\n\t\t\tYou move toward ${mname} and ${mheshe} flinches. \"Just leave me alone!\" ${mheshe} shouts, succeeded by a flurry of sobs. You tried, anyway. For now you step aside and wait until ${mheshe} has cried it out. \n\t\t\t*set mrel %-10\n\t\t\t*goto comfort\n\t#Show that I'm exasperated by sighing loudly.\n\t\t*if simple \u003c 40\n\t\t\t\"Oh here we go,\" you mutter, \"Here come the waterworks.\"\n\n\t\t\t${mname} responds with a flurry of hiccoughing sobs. \"I c-c-can't help it; you don't know h-how hard these last few months have b-b-been-I'm a broken \n\t\t\t*if mgender = \"female\"\n\t\t\t\twoman.\t\n\t\t\t*if mgender = \"male\"\n\t\t\t\tman.\n\t\t\t*if mgender = \"fluid\"\n\t\t\t\tperson.\t\n\t\t\t*set mrel %-20\n\t\t\t*goto comfort\n\t\t*else\n\t\t\t$!{mheshe} misinterprets your sigh as an invitation to resume the conversation, and your frustration doesn't register. Still, at least now you can get on with things. \t\n\t\t\t*goto comfort\n\n*label comfort\n$!{mheshe} collects ${mhimher}self, slowly, giving a loud sniff and exhale to indicate they've finished. Their tears were those of relief. Relief that someone else knows, that you are putting it all together. You move a step closer to ${mname} and lean against the wall next to ${mhimher}.\n\n\"I think it's time we had the whole story from you,\" you say quietly. \"Don't be afraid. I'm not here to judge, I'm here to get the facts. And as I see it, \n*if guess = \"null\"\n\t*goto right\n*else\t\n\t*goto guessing\n\n*label right\nmaybe you've been done hard by. In this whole thing, I…I just want the truth to come out.\"\n\n${mname} nods, but says nothing, leaving you space to go on. \n*label dirt\n\n*if (crime = \"sex\") or (guess = \"sex\")\n\t\"You've been having an affair with the chair of the City Council.\"\n*if (crime = \"drugs\") or (guess = \"drugs\")\n\t\"After that car crash, you became addicted to prescription painkillers; you've been running the city high, but it was the only way to manage your pain.\"\n*if (crime = \"bids\") or (guess = \"bids\")\n\t\"You accepted kickbacks for bid-fixing jobs with the city. It's an abuse of power. Somehow Vera found out and started blackmailing you; which meant you had to keep fixing bids just to pay her off. You're crooked, but now you're paying for it. But since you resigned, how on earth will you keep paying the blackmailer?\"\n*if (crime = \"bribes\") or (guess = \"bribes\")\n\t\"There's a tape out there somewhere. A tape of you accepting bribes for no-show jobs. Vera's seen it, or she maybe has a copy, even. Regardless, you're crooked, and someone has found out. You're paying the piper now. Doubly so since you resigned. What are you going to do?\"\n*goto chapterend\n\n*label guessing\nyou are being blackmailed, and I have a pretty good idea what for.\"\n\n${mname} nods at you. \"Well, tell me what you think your know about me,\" ${mheshe} says, with an air of defensiveness.\n*goto dirt\n\n*label chapterend\n*page_break And now…\n\nTo your surprise, ${mname} breaks into a smile. \n\n*if ((crime = \"bids\") or (crime = \"bribes\")) or ((guess = \"bids\") or (guess = \"bribes\"))\n\t\"You're right, I was crooked. But that doesn't mean I deserve to suffer twice over, does it? There's only one way to stop a blackmailer: come clean. I couldn't do that and remain mayor.\"\n\t*goto chapterend2\n*else\n\t\"Yes, that's exactly it. Is that so wrong? Do I deserve to be forced out of my position and have my private life dragged through the press? Do I? Vera. God, what a horrible person. I've had to pay her to keep this story buried, and I just couldn't take it anymore. I suppose now it'll all come out.\"\n\n\t\"Well,\" you begin, \"if by 'all come out' you mean I'm going to write that she's been blackmailing you.\"\n\n\t${mname}'s jaw drops. \n\t*goto chapterend2\n\n*label chapterend2\n*page_break \n*if goal = \"lose her job\"\n\t\"Absolutely,\" you reassure ${mhimher}. \"And it's my business to make sure Vera is pushed out of the press for good.\"\n*if goal = \"save the mayor\"\n\tYou smile at ${mname}, a real smile of friendship and say, \"I was only ever in this to help you, you know.\"\n*if goal = \"fire Vera and get her job\"\n\t\"A story like this means Vera will be fired and with any luck, I can take her old job,\" you say, \"Which would certainly be tit for tat here, since you were forced to resign.\" \n*if goal = \"help Vera\"\n\t\"I think this is the only way for us to help Vera—she's obviously very troubled,\" you say. The mayor looks a little shocked but nods, thinking it over. \n*if goal = \"get rich\"\n\t\"Of couse,\" you say, \"This is a huge story. I'm going to make my name with it, too, you know—offers will be pouring in from national papers. I'll be laughing all the way to the bank. And well, I hope for your legacy to be rehabilitated.\" \n\n\"What's your angle?\" ${mname} asks.\n\n*if story = \"blackmail\"\n\t\"The story of you being blackmailed, more or less. To me, blackmail is worse than whatever you're being blackmailed for. Even Sherlock Holmes hated the blackmailer more than he hated his nemesis, Moriarity. I'm the same way.\"\n\t\n\t*label equiv\n\t*if ((crime = \"bids\") or (crime = \"bribes\")) or ((guess = \"bids\") or (guess = \"bribes\"))\n\t\t\"Even though I did something appalling and illegal, out of greed?\"\n\t\t*goto wrapit\n\t*else\t\n\t\t\"Even though I have an embarrassing and legally questionable secret?\"\n\t\t*goto wrapit\n*if story = \"industry\"\n\t\"This is an industry piece: corrupt editor blackmails mayor and hounds ${himher} out of office. If we can't trust an institution like the 4th Estate, what can we trust?\"\n\t*goto equiv\n*if story = \"mayor\"\n\t\"This is a story about you, and the injustice through which you were thrown out of office by a greedy editor who stood to take advantage of you.\"\n\t*goto equiv\n*label wrapit\n\n\"Of course! No one deserves to be blackmailed—their crimes or misdeeds are punishment enough. Whatever you did, it doesn't come close to being forced to resign your job. To live with the fear that you'll be exposed, and on top of that to have to pay someone off.\"\n*goto leave\t\n\n*label leave\n*page_break You're off…\n\"But now, ${mname}, before I go, I need real confirmation from you. Will you go on the record?\"\n\n$!{mheshe} looks at you and you see reluctance in ${mhisher} face. Time to pull out the stops.\n\n*fake_choice\n\t#\"Please, say you will. I'll tell the most just version of your story that I can.\"\n\t\t\"Will you?\" ${mheshe} replies, \"Or are you just in it for yourself?\"\n\n\t\t\"Please, let's do this.\"\n\t\t*label goods\n\t\t\n\t\tIn response, ${mname} reaches into ${mhisher} bag and retrieves a folder. \n\n\t\t\"Here, take this,\" ${mheshe} says, \"It's my bank records. You'll see all the cash I took out, and how regularly. And yes, you can quote me about who that cash went to and what for.\"\n\t\t*goto end\n\t#\"I don't need you to say yes if you just hand me some hard evidence.\"\n\t\t\"Everyone will still know where that evidence came from,\" ${mheshe} says.\n\n\t\t\"True,\" you say, \"But isn't it better that this come out?\"\n\t\t*goto goods\n\t#\"I can keep you as an anonymous source; no one need know.\"\n\t\t\"Oh sure, like the readers won't know,\" ${mname} scoffs.\n\n\t\t\"Look, you got yourself into this mess, and I'm trying to help you get out of it. Do you want to be a part of that, or not?\"\n\t\t*goto goods\n\t#\"I'm going to press with or without you on this story.\"\n\t\t\"Well then, I don't have a choice, do I?\" ${mname} says bitterly. \n\n\t\t\"You do, actually,\" you say, \"I think you just don't want to do the hard thing. The right thing.\"\n\t\t*goto goods\n\n*label end\n\nYou accept the folder, not without some relief. Your evidence, your story is in hand. The mayor wraps ${mhisher} coat about themself more tightly and turns to go. You want to say something else, but the words fail you. You turn toward\n*if not (alone)\n\tthe area where Cal is parked, waiting for you.\n*if (alone)\t\t\n\tthe exit, and make your way out into the darkness of night.\n*finish\tNext Chapter\n\n\n\n", "6_cuz": "*if (cuz)\n\tPART 2, CHAPTER 2: JUST CUZ\n*if not (cuz)\n\tPART 2, CHAPTER 2: JUST DESERTS\n\nMany hours later, after\n*if (alone)\n\ta long ramble through the city streets, thinking about it all, the day's events, the way things unfolded\n*if not (alone)\n\tmany hours talking with Cal about all of it, and basically staying up all night,\n\t*if (screwcal)\n\t\tgetting him to write the lede, verify that the mayor's bank records were not fake, and in general, having Cal do all the hard work—\nyou have made your way home. You lie abed that night and dream of what the future holds, and what the morrow will bring. \n\nWhat did you dream about?\n*fake_choice\n\t#I dreamt I had won the Pulitzer for my reporting.\n\t\t*set pulitzer +20\n\t#I dreamt the mayor was back in office.\n\t\t*set mrel %+20\n\t#I dreamt Vera had seen the error of her ways.\n\t\t*set vera %+20\n\t*if not (rich)\n\t\t#I dreamt I was finally rich.\n\t\t\t*set simoleons +200\n\nA noble hope, indeed. \n\nBut when you awake, and the cold light of morning pours down into your bedroom, you're faced with an almost insurmountable problem. And why didn't you see it before? You won't be able to get this story on Page 1 unless you do an end-run around Vera. There's only one option for that: the publisher. \t\t\n*if (cuz)\n\tYour cousin, yes. The time has finally come. You actually never expected that things would come to this kind of a pass, \n*if not (cuz)\t\n\tLyman Jones, yes. An inscrutable figure if there ever was one. You wish you didn't have to do this,\nbut there's effectively no way you can break the story without alerting Vera to the fact that a) you know and b) you know everything and c) you've got it all written out and ready for the copy desk. \t\n*page_break\nYou dress, glurp down your first coffee of the day. Then you take your notes, your draft, and of course, the evidence from ${mname}, and put it in your bag. You feel as though you're heading into battle, and you have no idea how \n*if (cuz)\t\n\tCousin Lyman\n*if not (cuz)\t\n\tLyman Jones \nis going to react to the news that his City Desk Editor\twas blackmailing the mayor of this fair city and effectively forced ${mhimher} out of office. Indeed, Vera kept the mayor's indiscretion out of the paper for pure personal gain. To say nothing of the fact that Vera specifically told you not to look into it. Good thing you seldom do what you're told.\n\nBut how to approach this?\n*fake_choice\n\t*if not (cuz)\n\t\t#I'll call his secretary and make an appointment, saying nothing else.\n\t\t\t*set method \"call\"\n\t\t\t*if drive > 50\n\t\t\t\t*set pulitzer +20\t\n\t\t#I'll go right to his office and demand to see him.\n\t\t\t*set method \"go\"\n\t\t\t*if drive > 50\n\t\t\t\t*set pulitzer +20\n\t\t#I'll tell his secretary that I've got the story of the century and…our paper is in danger.\n\t\t\t*set method \"call\"\n\t\t\t*if integrity > 50\n\t\t\t\t*set pulitzer +20\n\t*if (cuz)\n\t\t#I'll be honest: call and say his cousin wants to have lunch with him today.\n\t\t\t*set method \"call\"\n\t\t\t*if cunning \u003c 50\n\t\t\t\t*set drive +20\n\t\t#I'll get my mother to call and explain everything—how I work there—and that we need to talk.\n\t\t\t*set method  \"mother call\"\n\t\t\t*if wordsmith \u003c 50\n\t\t\t\t*set pulitzer +20\n\t\t#I'll go to his office, announce myself, and demand to see him. \t\n\t\t\t*set method \"go\"\n\t\t\t*if drive > 50\n\t\t\t\t*set pulitzer +20 \n\nA bold move, for sure. \t\t\n\nYou head into the office, quiet at this early hour and \n*if method = \"call\"\n\tmake the call. It seems \n\t*if (cuz)\n\t\tLyman would be happy to see his first cousin once removed, and will take breakfast with you in his office shortly.\n\t*if not (cuz)\n\t\tMr. Jones has an empty hour for his breakfast, which he's invited you to join him for in just a few minutes. \n\tYou'd hoped you might have a little more time to get ready, but there's no time like the present, is there?\t \t\n*if method = \"mother call\"\n\tcall your mother. Within a few minutes, she calls you back to say it's all taken care of, thrilled that you've finally decided to use your family connection. Of course, that isn't it at all—you just have been forced to go over Vera's head. It seems your cousin will see you right about…now…for breakfast in his private dining room. \n*if method = \"go\"\n\tmake your way to your desk. You need a moment to marshal your strength before heading to \n\t*if (cuz)\t\n\t\tCousin Lyman's \n\t*if not (cuz)\n\t\tthe publisher's \n\toffice. \n\nYou glance over the newsroom and see that Vera's office is empty, lights out. Good. But that means you've only got a short window in which to get this meeting done. \n\n*page_break Onward \nTo the elevator you go, selecting the top floor. At this time of day, \n*if method = \"go\"\n\tas it turns out,\n\t*if (cuz)\n\t\tyour cousin \n\t*if not (cuz)\t\n\t\tMr. Jones\n\twill be taking breakfast in his private dining room, down the hall from his office. You will ambush him there.\n*if (method = \"call\") or (method = \"mother call\")\n\tyou usually cannot summon the appetite to eat anything, let alone on the kind of nervous stomach you've got. Because this kind of story takes\n\t*if gender = \"male\"\n\t\tbrass balls\n\t*if (gender = \"female\")\tor (gender = \"fluid\")\n\t\tguts\n\tto bring to the publisher. \n\nYou can't predict how he'll react to the news about Vera. Or if he'll even allow it to be printed in his paper. For one thing, he may feel the scandal tarnishes the paper more than it does the mayor, or Vera. But of course he can't stop you from taking the story to [i]The Daily Caller[/i]. Can he?\n\n*page_break At The Threshold…\n\nYou stand at the door to the private dining room. What tactic will you take here?\n*choice\n\t#Give him my honest, straight reporting. The facts are on my side.\n\t\t*if integrity > 60\n\t\t\tYour integrity as a reporter is all you have. Without that, there's nothing. And now you're about to take a leap of faith—will he be willing to see and print these terrible things?\n\t\t\t*goto cuz\n\t\t*else\n\t\t\tOk, maybe you've cut corners here and there, and maybe you've kept company with people like Jack, but it was in service to this story. He'll see that.\n\t\t\t*goto cuz\t\n\t#Make him to see that we have to print this story.\n\t\t*if drive > 60\n\t\t\tWhere there's a will, there's a way. And you surely have the will when it comes to your story, which you've pursued doggedly, and against all kinds of odds and hairy situations. Surely everything will come out right. \n\t\t\t*goto cuz\n\t\t*else\t\n\t\t\tMaybe you haven't pursued this as doggedly as you might have, and there were a few distractions along the way. But you have one more hurdle to clear, so you'd better give it your all.\n\t\t\t*goto cuz\n\t#Show him the story itself and let my writing do the work. \t\n\t\t*if pulitzer > 60\n\t\t\tIf you've done nothing else, you've shown your commitment to the written word. And it's all there in black in white, ready for him to read,\n\t\t\t*if (screwcal)\n\t\t\t\talthough you have Cal to thank for a lot of that,\n\t\t\tand it's time to let your glorious prose do the heavy lifting. \t\n\t\t\t*goto cuz\n\t\t*else\n\t\t\tYou fancy yourself a great writer, but how much have you invested in what's the page? Reporting is full of crazy adventures, but at the end of the day it comes down to what you can do with your ten little typing fingers. You hope it's enough. \n\t\t\t*goto cuz\n\n*label cuz\t\n*page_break Onward\nYou knock. \n\n\"Come in, come in!\" cries a creaky voice, with a charming mid-century, mid-atlantic accent—the kind of thing you thought only existed in Cary Grant and Katherine Hepburn movies.\n\nYou open the door, revealing a lavish private dining room. There is a Persian carpet, fine oils on the yellow silk moire-papered walls, a small round table fitted with linen tablecloth and napkins. Two places are already set and silver chafing dishes wait on a cart to the side. Lyman Jones himself is an older gentleman, about 60, and wearing a dark, conservative suit with a rep tie. His hair is grey, in a small fringe around his bald head. \n\n\"Ah, my dear \n*if gender = \"female\"\n\tgirl!\"\n*if gender = \"male\"\n\tboy!\"\n*if gender = \"fluid\"\n\tchild!\"\nis \t\n*if (cuz)\n\tyour cousin's\n*if not (cuz)\n\this \nway of greeting you.\n\nYou offer a polite hello in return and take a seat opposite him at the breakfast table.\n\n\"Welcome, welcome,\" he says, gesturing at the juice and coffee on the table. \n\nYou take none, but say, \"Thank you for seeing me on such short notice,\" a little obsequiously.\n\n\"Not at all, not at all!\" he replies, \"I don't think you'd know this, but I have deep affection for the reporters on our staff. I do believe everyone is afraid of me around here, but far from being the harsh, lion captain of industry you all make me out to be, I am, indeed, a very lonely man up here in my suites.\"\n\nYou take a second to digest this, and are agreeably surprised that he's as nice as he seems.\n\n\"Maybe I should tell you why I've come?\"\n\n\"Please, please do,\" he effuses, \"And while we talk let me serve our breakfast. What will you take?\" He moves to the chafing dishes and removes their covers revealing sausages, scrambled eggs, bacon, silver dollar pancakes, hot oatmeal with cream, and a cold fruit compote. \t\n*fake_choice\n\t#Sausage and eggs.\n\t\t*achieve break1\n\t#Bacon and eggs.\n\t\t*achieve break2\n\t#Oatmeal and bacon.\n\t\t*achieve break3\n\t#Oatmeal and sausage.\n\t\t*achieve break3\n\t#Oatmeal and eggs.\n\t\t*achieve break4\n\t#Compote and bacon.\n\t\t*achieve break5\n\t#Compote and sausage.\n\t\t*achieve break6\n\t#Compote and eggs.\n\t\t*achieve break7\n\t#Pancakes and eggs.\n\t\t*achieve break8\n\t#Pancakes and bacon.\n\t\t*achieve break9\n\t#Pancakes and sausage.\n\t\t*achieve break10\n\t#Pancakes and compote.\n\t\t*achieve break11\t\n\t#Just oatmeal.\n\t\t*achieve break12\n\t#Just compote.\n\t\t*achieve break13\n\t#Just eggs.\n\t\t*achieve break14\n\t#Just sausage.\n\t\t*achieve break15\n\t#Just pancakes.\n\t\t*achieve break16\n\t#Just bacon. \n\t\t*achieve break17\n\"Delightful choice. I adore our cafeteria, you know,\" he says, and begins making up your breakfast.\n\nYou'd thought this might have been some special breakfast just for the head man, but it's the same fare available to the staff in the basement cafeteria, served on fancy silver and china. What a charming man of the people\n*if (cuz)\n\tyour cousin \n*if not (cuz)\n\tMr. Jones \nis. \n\nAs he serves, and pours you a coffee and an orange juice without asking, you bring out your papers. You take the notes, the draft story, and the evidence, and square them all up on the table, leaving space for the breakfast he brings over. \n\n\"There,\" he says, gently placing it in front of you, \"Let us talk and let us dine.\"\t\n*page_break Yum…\n\nWhen the breakfast has been eaten, and Lyman (\"Oh, call me Lyman, won't you, ${first_name}?\" \"Alright, Lyman,\") has again cleared away the plates, and your story has been told, you both settle back in your chairs.\n\n\"You were right to bring this to me, you know. I've had my suspicions about Vera not being quite on the level for some time, but I never suspected she would resort to blackmail to solve her uh, problems. You wouldn't know this, ${first_name}, but I must tell you that Vera, or, rather…\" he trails off, thinking about whether it's judicious to share this confidence.\n\n*if (cuz)\n\t\"Lyman, it's all in the family; tell me.\"\n*if not (cuz)\n\t\"Lyman, after what I've uncovered, nothing could shock me.\"\n\n\"Well, Vera has had large gambling debts. You see, in the past she's asked me for advances on her salary in order to cover them. I indulged her. Perhaps I shouldn't have,\" he looks away, ashamed of himself, ashamed of his own generosity. \n\n\"She must have got in so deep that wouldn't work this time, I guess,\" you offer, hoping to take the dark look off his face. \n\n\"Yes, but to resort to this kind of treachery, it's unconscionable,\" he says firmly. \n\n*page_break What Is To Be Done?\t\t\nYou think about this new information, taking it in before replying. \n\n\"Lyman, let me ask: is Vera in debt to a certain person or certain uh, specific parties, powerful parties in this town?\"\n\n\"You might say that, but I couldn't possibly comment, as the saying goes,\" he answers.\n\nYou already know where this is going. You can't help blurting out, \"I would be willing to bet it's Jack the Nose that she's in deep with.\" Lyman looks at you with astonishment. \n\n\"Do you know him?!\"\n\nHa. Of course it's Jack. It all comes together. \n\n\"We go back a little ways, yes,\" you say. \n\n\"Well, if that's true—\" Lyman begins, but you cut him off before he can say what he's thinking.\n\n\"We don't have to put that in the story! It's enough what I've got. That is, if you'll print it. Will you?\" You try to hide the pleading in your voice. \n\nYou look at Lyman closely. His answer will determine everything for you. What does he say?\n\n*choice \n\t#\"My dear, I don't see why I shouldn't, except of course that it will RUIN my paper.\"\n\t\tYou were expecting this, and sure, he's not wrong. Now you must persuade Lyman that it's the right thing to do. \n\t\t*label terrible\n\t\t\n\t\t\"It's not going to look good for us, I'll give you that.\"\n\n\t\t\"I should think not. Of course, I'm horrified, but I have our reputation to think of. Will our subscribers keep buying a paper that employed someone who did what Vera did?\"\n\n\t\tYou've got to play hardball. \"Will they if they find out about this scandal in [i]The Daily Caller[/i] instead?\"\n\n\t\tLyman gives you a hard look. And then his face softens.\n\t\t*goto continue\n\t#\"I think the public has a right to know, don't you?\"\n\t\t\"I wouldn't be here if I didn't. You know that,\" you say.\n\n\t\t\"Exactly. But, well, oh—this is terrible.\"\n\t\t*goto terrible\n\t#\"I would prefer not to, actually.\"\n\t\t\"But why?\" you reply, fully knowing the answer already.\n\n\t\t\"I am…embarrassed, of course, that I continued to employ Vera, knowing she had these kinds of problems. I just never imagined it would lead to something like this,\" he says. The regret and shame on his face, even though it's not his fault, is palpable.\n\t\t*goto terrible\n\n*label continue\n\n\"I don't see that we have any choice,\" you say gently. \n\n\"You're right, ${first_name}, but now I must think of what to do about Vera.\"\n\n[i]I've got a few ideas about that! [/i] you think to yourself, and struggle to contain the smile on your face, since Lyman is obviously aggrieved at the situation. \n\n*page_break What About Vera?\n\nWhen you set out you'd hoped\n*if goal = \"lose her job\"\n\tto see that Vera was fired. \n*if goal = \"duty\"\n\tthat you would just get the story into print, bring corruption to the light of day, and sure, maybe win a Pulitzer. Vera can go hang. \n*if goal = \"fire Vera and get her job\"\n\tthat Vera would be fired and you'd be her replacement. \n*if goal = \"get rich\"\n\tthat this story would propel your career, make you rich, maybe. Vera would obviously be fired.\n*if goal = \"help Vera\"\n\tthat you'd perhaps be in a position to help Vera. She obviously needs help, maybe even professional help. \n*if goal = \"save the mayor\"\n\tthat you could do something to help $!{mname}. That's really the person who needs help in this situation. Vera can hang, for all you care. \n\nNow you see your chance to offer that to Lyman. \n\n*if goal = \"lose her job\"\n\t\"I think you have to call Vera in. You have to fire her. The evidence is all here, it only remains to confront her with it.\"\n*if goal = \"duty\"\n\t\"We have to get this printed in a extra edition; the mayor just resigned yesterday, public speculation is swirling and we've got the whole story, right here. I want page 1. And yes, I want the paper to put me up for a Pulitzer. Vera? Who cares.\" \n*if goal = \"fire Vera and get her job\"\n\t\"Since I broke the story, I think it only fair you consider me for Vera's replacement. She must not be in an position to hurt this paper any longer.\" \n*if goal = \"get rich\"\n\t\"To be honest, I'm hoping that this story would put me in line for a raise, a bonus, maybe. As for Vera, I don't care.\"\n*if goal = \"help Vera\"\n\t\"I think it's clear that Vera needs help. For one thing, treatment for gambling addiction. It's clear she has an impulsive and narcissistic personality.\"\n*if goal = \"save the mayor\"\n\t\"I want to help $!{mname} in any way that we can. Publishing the story may make things difficult for ${mhimher}, but it's the only way for ${mheshe} to regain the public's sympathy. Vera is troubled, but collateral damage.\"\n\nLyman considers this. \n\n*if goal = \"lose her job\"\n\t*if drive > 60\n\t\t*goto success\n\t*else \n\t\t*goto mediumfail\t\n*if goal = \"duty\"\n\t*if (pulitzer > 60) or (wordsmith > 65)\n\t\t*achieve nomination\n\t\t*goto success \n\t*else \n\t\t*goto mediumfail\n*if goal = \"fire Vera and get her job\"\n\t*if (drive > 60) or (cunning > 65)\n\t\t*goto success\n\t*else \n\t\t*goto mediumfail\n*if goal = \"get rich\"\n\t*if (integrity \u003c 40) or (drive > 70)\n\t\t*achieve richly\n\t\t*goto success\n\t*else \n\t\t*goto mediumfail\t\n*if goal = \"help Vera\"\n\t*if (vera > 70) or (simple > 75)\n\t\t*achieve help\n\t\t*goto success\n\t*else\n\t\t*goto mediumfail\t\n*if goal = \"save the mayor\"\n\t*if (mrel > 65) or (generosity > 65)\n\t\t*achieve save\n\t\t*goto success\n\t*else\n\t\t*goto mediumfail\n\n*label success\n\"Very well, ${first_name}, if that's what you want.\"\t\n*goto overjoyedend\n\n*label mediumfail\n*page_break Welp\nLyman stands, abruptly, angrily, throwing his napkin to the floor, making his way to the window and looking down on the city. All his avuncular politesse has been shed. \"It's all well and good to say what you want, but I'm surprised. I would think it would be enough for you to publish a well-reported story.\" He turns to you and his expression demands an answer.\t\n\nLooks like getting what you want won't be that easy. \n\n*if goal = \"lose her job\"\n\t\"Well look, you obviously can't keep Vera on after what she's done.\"\n*if goal = \"duty\"\n\t\"Do you think I haven't written an investigative story worthy of a Pulitzer?\" \n*if goal = \"fire Vera and get her job\"\n\t\"All I ask is that you think about putting me in Vera's place.\" \n*if goal = \"get rich\"\n\t\"I don't know what you know about the life of a reporter, but well-remunerated it is not. There are no silver chafing dishes in my rathole apartment.\"\n*if goal = \"help Vera\"\n\t\"Are you so lacking in sympathy that we can't do [i]something[/i] for Vera?\"\n*if goal = \"save the mayor\"\n\t\"Even after what ${mname} has done, ${mheshe} doesn't deserve our scorn; blackmail is the worst of all crimes.\"\n\n*if (drive > 50) and ((goal = \"lose her job\") or (goal = \"fire Vera and get her job\"))\n\tLyman covers his face with his hand.\n\n\t\"You're right, of course you're right,\" he moans, \"It's just that\n\t*if (cuz) \n\t\tI can't be subject to charges of nepotism if I give you her job!\"\n\t*if not (cuz)\n\t\tI blame myself! I knew all along Vera had money problems, gambling problems.\"\n\t*goto mediumend\n*elseif (integrity > 50) and ((goal = \"save the mayor\") or (goal = \"help Vera\"))\n\t\"You're a kind soul, ${first_name}; I shouldn't let my disappointment and bitterness stymie your noble intentions \n\t*if goal = \"help Vera\"\n\t\tto lend a hand to a woman brought low.\"\n\t\t*achieve help\n\t*if goal = \"save the mayor\"\n\t\tto help ${mname} in ${mhisher} hour of need.\"\n\t\t*achieve save\n\t*goto mediumend\n*elseif (pulitzer > 40) and (goal = \"duty\")\n\tLyman looks at you with sad eyes. \n\n\t\"Yes, you have. Of course. I'm just feeling bitter and sad about all of this. It's hard to celebrate your good work when at the same time I have to see my own editor fired, the integrity of my paper possibly called into question, and the mayor's misdeeds printed as well. But the quality of your work is good; I can see my way to a Pulitzer nomination.\"\n\t*achieve nomination\n\t*goto mediumend\n*elseif (drive > 60) and (goal = \"get rich\")\n\t\"I'm sorry, ${first_name}, of course you deserve to be rewarded for your efforts, I just can't reconcile how much of a zero-sum game life seems to be at times with my own beliefs about the duty of the press, and of course my duty to my employees. I hate to think that \n\t*if (cuz)\n\t\ta member of my own family only cares to enrich themselves at the expense of others' miseries. Until today I didn't even know you worked here. \n\t*if not (cuz)\n\t\tone of my employees would only wish to use such a story for fattening their own pockets. \t\n\tBut I won't paint you with such a broad brush. The life of a young reporter is not an easy one; I will see that you're rewarded in some measure.\"\n\t*achieve richly\n\t*goto mediumend\n*else\n\t*goto failtext\n\n*label failtext\n\n\"I'm sorry, ${first_name} but as impressed with this story as I am, I don't know that I can give you what you ask.\"\n\nYou hold your breath, hoping against hope that this will still come out all right. \n\n*if goal = \"lose her job\"\n\t\"You don't intend to keep Vera on staff, surely?\"\n\n\t\"I plan to demote her. Put her in the clipping morgue where she can't hurt anyone. The punishment will likely drive her out. It's for the best.\"\n\n\tYou're a little shocked, but at least Vera won't be anywhere near a reporter again. \n*if goal = \"duty\"\n\t\"But this is the biggest story the paper's ever had! And we've totally scooped the competition!\"\n\n\t\"I know, I know, but if\n\t*if (cuz)\n\t\tit comes out that you're my cousin and I've nominated you for a Pulitzer…it won't be good. Not for you, not for me, and certainly not the paper.\"\n\t*if not (cuz)\n\t\tI put you forward for this while the paper itself still has a whiff of scandal about it, thanks to Vera, then I don't see how the committee would even take such a submission seriously.\"\n\n\tYou can't help but be disappointed. \t\t  \n*if goal = \"fire Vera and get her job\"\n\t\"I've been on the City Desk for a year, I'm a natural fit for Vera's role—and for goodness' sake, I was the one to expose her!\"\n\n\t\"All the more reason not to play favorites,\" Lyman replies, and you can tell from the set of his jaw that he won't budge on the matter.\n*if goal = \"get rich\"\n\t\"I don't know what you know about the life of a reporter, but well-remunerated it is not. There are no silver chafing dishes in my rathole apartment.\"\n*if goal = \"help Vera\"\n\t\"You've helped Vera before, surely there's something we can do for her now.\"\n\n\t\"No, she's gone too far. She's abused her position. She's beyond the pale, frankly,\" Lyman shakes his head. \"I know you have a kind heart, ${first_name} but Vera must go and there will be no support, material or otherwise from this paper.\"\n\n\tHe's probably right that it's for the best.\n*if goal = \"save the mayor\"\n\t\"But surely the mayor deserves our sympathy, having been blackmailed?!\"\n\n\t\"$!{mheshe} does, certainly. But since our paper, in a roundabout way was the cause of that blackmail, we can't be seen to be interfering any further.\"\n\n\tHe's right, but you wish there were something that you could do. Lyman can see it on your face.\n\n\t\"Don't fret, ${first_name}. We publish the story and let the world rehabilitate ${mname}. Surely a savvy politician won't have any trouble painting ${mhimher}self as wronged and stepping up to the podium again.\"\n*goto mediumend\n\n*label mediumend\n*page_break And now…\nAfter all that's happened, you suppose this is the best you can hope for. It's not without some disappointment, that you shake hands with Lyman and make your way back to the bullpen to hand the story over to the copydesk. \n*goto finis\n\n*label overjoyedend\n*page_break !!!\nYou never in your wildest dreams imagined this would happen, but it's all coming true for you. \n\nYou did it, kid.\n\n*goto finis\n\n*label finis\n*page_break Last, but not least…\n\nYou have it, you have it in your hands: page 1, above the fold. Your story.\n\n*if story = \"blackmail\"\n\t\"MAYOR BLACKMAILED BY [i]DAILY CITIZEN[/i] EDITOR\"\n*if story = \"industry\"\n\t\"CORRUPT EDITOR VERA MCDONALD BLACKMAILS MAYOR\"\n*if story = \"mayor\"\n\t\"MAYOR RESIGNED OVER BLACKMAIL PLOT, VOWS TO RETAKE OFFICE\"\nWhatever else happens, you did that. You. \n*goto_scene ending\n\n\n\n", "choicescript_description": "Something is rotten in City Hall—can you uncover it and...win a Pulitzer?  When the mayor unexpectedly resigns, it's up to you, the rookie reporter on the City Desk to find out the real story and get it into print. Right away you smell a rat. As you track down sources and information, your reporter's instincts, brains, heart, or impeccable writing will lead you to the truth.\n\n[i]The Daily Blackmail[/i] is a 33,000 word interactive fantasy novel by Mary Duffy, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nIn The Daily Blackmail, you'll get all the news that is (and isn't!) fit to print.\n\n• Play as male, female, or non-binary.[n/]\n• Cross paths with an evil editor, a mobster, and even scarier: the publisher.[n/]\n• Lie, cheat, and steal to get your front page story.[n/]\n• Press your colleagues, political cronies, and underworld sources for information.[n/]\n• Reach for every reporter's dream—a Pulitzer Prize.\n", "choicescript_stats": "*stat_chart\n\topposed_pair Heart\n\t\t\tHeart\n\t\t\tBrains\n\topposed_pair Generosity\n\t\t\tGenerosity\n\t\t\tSelfishness\n\topposed_pair Cunning\n\t\t\tCunning\n\t\t\tHonesty\n\topposed_pair Wordsmith\n\t\t\tWordsmith\n\t\t\tCharmer\n\topposed_pair Simple\n\t\t\tSimple\n\t\t\tSavvy\t\n\t\n\tpercent Cal\n\tpercent Vera\n\tpercent mrel Mayor\n\ttext Simoleons\n\ttext Pulitzer\n\ttext Integrity\t\n\ttext Drive\n\n*comment heart = something like grit/determination, brains is booksmarts/thinking through problems; cunning/honesty is underhandedness vs. uh, honesty; wordsmith is your writer skill stat, charmer is your ability to manipulate; generosity/selfishness is self-explanatory. Simoleons--cash on hand; Pulitzer is 0-100 points toward getting a Pulitzer. Integrity and Drive are goal stats\n\t\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]The Daily Blackmail.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set heart 75\n*set generosity 30\n*set cunning 55\n*set wordsmith 65\n*set simple 35\n*set integrity 5\n*set simoleons 200\n*set pulitzer 15\n*set drive 10\n*set cal 60\n*set vera 30\n*set mrel 40\n\nIn the hubbub of the dispersing crowd, you meander over to Cal, hunched over his notebook in the corner. Now's your chance to pounce.\n\n\"Listen, I've got a couple of leads I want you to run down. Help me out and we'll run co-bylines in both papers,\" you offer, oh-so-casually.\n\n\"Why should I?\" Cal asks.\n*fake_choice\n\t#\"Because you're my friend, and friends help each other,\" I plead, a little disingenuously.\n\t#\"Because you're a great writer, just like me,\" I brag and flatter at the same time. \n\t#\"Because we're both going to scoop everyone else, but only if we work together,\" I strategize.\n\t#\"Because I believe people are basically good, and I know you want to help a friend out.\"\n\n*script changeBackgroundColor(\"black\")\n\n*set heart 50\n*set generosity 70\n*set cunning 45\n*set wordsmith 80\n*set simple 45\n*set integrity 20\n*set simoleons 100\n*set pulitzer 5\n*set drive 5\n*set cal 40\n*set vera 70\n*set mrel 35\n\nJack cuts you off again, this time with a little dismissive wave of his hand, too. \"Kid! You're barking up the wrong tree,\" he says with finality. And there goes your shot for a good juicy investigative series or profile.\t\n\nYou don't give up that easily, though. You pound your fist on the table. Now Jack's mug is turning dark with rage. \t\t\n*fake_choice\n\t#\"I don't give a damn if you're protecting someone, the mayor and my story have to come first.\"\n\t#\"You would let a good man like Frank Johnson get run out of office and blackmailed to boot?\"\t\n\t#\"You think you run this town, eh? You don't run me, Jack. And I won't be jerked around here.\"\n\n*script changeBackgroundColor(\"sepia\")\n\n*set heart 30\n*set generosity 40\n*set cunning 85\n*set wordsmith 60\n*set simple 75\n*set integrity 30\n*set simoleons 200\n*set pulitzer 20\n*set drive 10\n*set cal 20\n*set vera 30\n*set mrel 55\n\nMidnight. The parking garage is dark. The oil stained concrete is giving off a familiar smell—gasoline, dust, burnt rubber, and cold air. A few exit signs and industrial lights shine down the long rows of cars, but there are a few conveniently dim corners for meetings like this one. You don't even really know what to expect. Will you source be shrouded in a trenchcoat, stepping out of the darkness, face half-lit for a brief second by the flash of a Zippo lighting their cigarette? Will they have a briefcase full of evidence to hand over? No, that's only in the movies, surely. \n\nYou've been waiting for this meeting. Nervous, excited, scared. All of the above, maybe. What thoughts cross your mind now?\n*fake_choice\n\t#Just the thought of writing this story, and seeing my byline on the front page is enough to keep me focused. \n\t#The facts are the facts; it's my job to collect them, sort them, and report them. I'm close.\n\t#I want the honest truth about what's been going on to come to light. That's why I'm here.\n\t#Vera has to be stopped-my profession, the very integrity of the press is at stake.\n\n*set heart 60\n*set generosity 25\n*set cunning 35\n*set wordsmith 75\n*set simple 35\n*set integrity 10\n*set simoleons 300\n*set pulitzer 30\n*set drive 5\n*set cal 30\n*set vera 55\n*set mrel 70\n\nMany hours later, after a long ramble through the city streets, thinking about it all, the day's events, the way things unfolded, you have made your way home. You lie abed that night and dream of what the future holds, and what the morrow will bring. \n\nWhat did you dream about?\n*fake_choice\n\t#I dreamt I had won the Pulitzer for my reporting.\n\t#I dreamt the mayor was back in office.\n\t#I dreamt Vera had seen the error of her ways.\n\t#I dreamt I was finally rich.\n\n*page_break\n\nomnibus screenshots for a variety of games\n\n*page_break\n*comment Mobile Armored Marine\n\nYou leave the remains of the strangely suited Saurian and start walking. Glancing at your Oracle, you follow the path to where the Shock Troopers were supposed to infiltrate the building. \n\nWalking down several corridors, you turn a corner to see the backs of several lizard creatures.  They're taking shots into a large room, hiding behind rubble.  You can hear the Shock Trooper's rough automatic rifle fire coming from the other room.  The two groups seem to be at a stand-still.\n\nWhat would you like to do?\n*fake_choice\n\t#I leap forward, smashing the lizards!  They're no match for an Imperial Marine!\n\t#I blast them to shreds with my pistol!  \n\t#I shoot.  With everything.  I level the entire area.\n\t#I sit back and wait, letting the Shock Troopers deal with this\n\n*comment Highlands, Deep Waters\n\nThe dark and quiet streets embrace you.\n\nWalking between the Black Kirk and the Sweet Revenge, its facades only roughly sketched by the lack of light, you rewind in your mind the traces and clues you have gathered around here. Surely your investigation has led you further and deeper than—probably—any other investigator ever had in this town. But at what price?\n\nConfabulating in the darkness, you get stricken by surprise. A hand reaching out of an alley grasps your arm: a cold, bony hand. In this flash of a second, you can't fathom the features of the one holding you.\n\n*fake_choice\n\t#Jump back.\n\t#Punch the unknown figure.\n\t#Draw your weapon.\n\t#Stay still.\n\n*comment Magikiras\n\nBeasts. The word echoes in your mind as you stare at the scene going on down at the mouth of the cave where humans are battling desperately for their lives against several patches of darkness. You force your head to turn and you look at your team-mates who stare back at you.\n\nYou can hear Balogh talking on his radio, making another report to HQ. \"...peat. We have Beasts. About...\" you turn to look at him and you see him counting with his finger, pointing at the scene. \"Nine Beasts. Send lots of reinforcement,\" he says. He nods his head and turns to look at the three of you. \"Orders are for us to remain here and wait for backup,\" he says sternly and for a moment, you wonder if he was eying any of you when he said that.\n\nLuiz doesn't say anything and stands there impassively whilst Karin remains just out of your sight, not moving much. At least there doesn't seem to be any sort of hostility over the decision to wait for reinforcements in order to take on the Fiends. Balogh has turned his attention back to the battle at the mouth of the cave. There is an odd tension in his posture and you can hear him mutter under his breath, \"We have no choice in this. There's too many of them,\" like he's trying to convince himself more than anyone else.\n*fake_choice\n\t#You stand by his side, watching the one-sided battle from afar with him.\n\t#You shake your head and begin to run down towards the cove.\n\n\"I've got four mods on me right now, but your suit can only take one at the moment. The whole experimental bit can do a number on your suit if you're not careful and I don't want your possible death to be blamed on me,\" he hands the tab over to you so that you can make your selection.\n\nThe first mod on the screen is a smart-gun targeting system that allows you to be more accurate with your shots by linking up your guns to your screen's HUD, giving you a cross-hair on your HUD. The next mod catches your eye: the tab labels it as an 'experimental stealth system.'\n\n\"Oh that? There's a new stealth system that I've been working on. Theoretically, it will tap into the energy that the engine produces and deploy a refractive field onto your plating so that whatever light that shines on your suit is bent around your suit and does not make it to the viewer's eye for a very short period of time.\" So basically, rendering yourself invisible to the naked eye, you summarize. \"Yes, exactly,\" he says, pleased with your understanding of what he just said.\n\nYou move on to the next upgrade, a multipurpose tool kit. Available as both hardware and software, this mod would allow you to tamper and make any sort of adjustments to any device that you come across in the field. Finally, the last mod is an Magitek overdrive system that is installed into your suit's joints and servos, allowing you to move faster and give you the necessary physical strength when you need the extra boost.\n\n\"So, ready to pick your poison?\" Edgar asks cheerfully. You look through the list on the mod for a while before you decide to choose the\n*fake_choice\n\t#smart-gun targeting system.\n\t#experimental stealth system.\n\t#multipurpose tool kit.\n\t#Magitek overdrive system.\n\n*comment Popcorn Soda Murder\n\nWhat deduction are you going to make now?\n*fake_choice\n\t#There are more suspects than you think.\n\t#Blood has been cleaned up here.\n\t#The time it took to kill Louis could be shorter than you think.\n\t#The time it took to kill Louis is longer than you think.\n\t#There is something suspicious about the body.\n\t#There is something we are missing about how the glass weapons were used.\n\t#It's a suicide.\n\t#I'm done. I've deduced all I can.\n", "startup": "*title The Daily Blackmail\n*author Mary Duffy\n*scene_list\n\tstartup\n\t1_Intro\n\t2_Press\n\t3_Jack_Exposition\n\t3_b_Mickey_Finn\n\t3_c_Catching_Up_Cal\n\t4_Vera\n\t5_Deep_Throat\n\t6_Cuz\n\n*comment ----Stats----\n*create cal 75\n*create vera 60\n*create mrel 75\n*create simoleons 100\n*create simple 50\n*create heart 50\n*create generosity 50\n*create cunning 50\n*create wordsmith 50\n*create pulitzer 10\n*create integrity 10\n*create drive 10\n\n*comment ----Gender, Names, & Pronouns----\n*create first_name \"unknown\"\n*create gender \"unknown\"\n*create hisher \"unknown\"\n*create himher \"unknown\"\n*create heshe \"unknown\"\n*create sohisher \"unknown\"\n*crea
