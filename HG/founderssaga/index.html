can. \n\t\t\n          *goto doors_conversation_complete\n\t\t  \n        *else\n          *set charisma -medium\n          *set Cyan -medium\n          *set culling_hurt true\n\t\t\n          You make your case to them, but they don't seem to buy it. In fact, the taller man explains that if you don't scan them immediately he will do it himself.\n\t\t\n          To illustrate his capacity to do this, he lifts his stun baton and slams you across the face. \n\t\t\n          Luckily it wasn't on, but you're pretty sure that's going to leave a scar. \n\t\n          *goto doors_conversation_complete\n\t  \n      *selectable_if (Victor > 27) #You look to Victor, hoping that he'll back you up. \n        *set Victor +small\n        *set wealth +small_cash\n\t\t\n        You look to Victor pleading for him to help. He takes your cue, explaining that anti-surveillance software is a critical and standard tool of modern business, and that the Culling is the best place to learn to use that tool out in the field.\n\t  \n        You nod in agreement, letting them know that you'd be happy to check on their \"camera status\" for a nominal fee. At the word \"fee,\" Rachel and Victor look at you curiously.\n\n        You press on, making your case to them. Surprisingly, they seem to buy it. They reach into the pockets of their jumpsuits, removing their phones. An instant later, your own phone vibrates, letting you know that chits have been deposited into your account. \n\t\t\n        After dividing them between the rest of the team, you're left just a little bit richer.\n\n        With that done, the two guards stand very still, and wait for Rachel to complete her scan.        \t\t\n\t\n        *goto doors_conversation_complete\n\t\t\n    *label doors_conversation_complete \n\t\n    *page_break\n\t\n    \"Huh. They both are coming up negative. In fact, this entire room is coming up negative. I guess they aren't cameras.\" Rachel murmurs, staring intently into her mostly blank screen. \n\t\n    Victor places a hand on each of their shoulders, nodding. \n\t\t\t\n    \"Wait. We aren't cameras? They aren't watching?\" The taller man whispers.\n\t\t\t\n    You raise an eyebrow, admitting that you can only be certain that one of those things is true. Even so, they both look relieved. \n\t\t\t\n    \"You know, tomorrow, you can stand in front of the right door if you want. Life is too short to worry about being a living camera.\" The shorter guard says.\n\t\t\t\n    \"I really appreciate that, I'm sorry I've been such a jerk about it.\" The taller guard turns to look at you, \"Thanks so much for helping us out there, I wish there was some way for us to repay you.\"\n\t\t\t\n    \"Well,\" Victor steps in, \"Maybe there is.\"\n\t\t\t\n    After a few moments of convincing, the guards agree to let you pass without further incident. A few seconds after that, the two doors swing open and Sam begins towards you.\n\n    *page_break\n\t\n    *goto marketers_crisis\t\n\t\n*label marketers_crisis\n\nSam runs through the door on the right as soon as he arrives. Rachel takes the cue and steps through the one on the left soon after. You and Victor stay behind to distract the guards, who are getting increasingly agitated. \n\t\t\n\"Wait. Wasn't our job to stop people from leaving this room?\" The smaller guard says.\n\t\t\n\"It was.\" The taller guard nods.\n\t\t\n\"Then why did we just let a couple of 'em to walk right out?\" The smaller guard notes.\n\t\t\n\"Because...\" This seems to confuse the taller man, \"Uh. It had something to do with cameras, didn't it?\"\n\t\t\n\"Right. Cameras....\" The shorter man takes a deep breath, as if realizing his mistake, \"The Farm isn't going to happy. Not happy at all...\"\n\t\t\nAs you and Victor wrangle with the men, several unpleasant things are happening at once. First, the doors have started to swing closed. Second, the panel on the other side of the room has begun to spark. Third and most relevant to your current circumstances, the guards are reaching for their stun batons. \n\t\t\nVictor is trying his best to defuse the situation, but you can tell that he needs help. If you do help though, there is a good chance that you both are going to end up like Trish. \n\t\t\nFurther when you look at the clock, what you see doesn't fill you with confidence. \n\t\t\nWhat do you do?\n\n*choice\n  \n  #You decide to help Victor, together you'll figure a way out of this.  \n    *set marketing +large\n    *set Victor +large\n    *set ruthlessness -medium\n    *set Cyan -large\n\t\n    You decide to stay. Victor is a good guy, and if you're going to be trapped in a room with anyone, it might as well be him. In any case, maybe you can earn a couple of brownie points with the Founders for not abandoning a team mate. \n\t\t\t\n    \"Any bright ideas?\" Victor whispers as the two guards approach, stun batons crackling in their hands. \n\t\n    You have an idea, but you're not so certain how bright it is. \n\t\n    You reach into your pocket and take out your phone, signaling Victor to follow your lead. \n\t\t\t\n    \"I guess we can stop these two.\" The shorter man mumbles.\n\t\t\t\n    \"Two is better than none, that's what I always say.\" The taller guard replies.\n\t\t\t\n    \"You never say that!\" The shorter man steps closer.\n\t\t\t\n    \"Sure I do! You just don't listen.\" The taller responds.\n\t\t\t\n    You tap your screen a few times and your phone begins to shriek.\n\t\n    *page_break\n\t\t\t\n    \"Wait a second.\" Victor places a hand over his heart, \"Wait just one second. Is that what I think it is?\" Victor looks aghast.\n\t\t\t\n    You nod, breathing heavily. \n\t\t\t\n    \"I'm so sorry...\" He lowers his voice. The two guards freeze.\n\t\t\t\n    \"What is it?\" The shorter begins.\n\n    \"It's ${name}'s detector. While we were standing here, ${name} became a camera.\"\n\t\t\t\n    \"Really?\" The taller man gasps.\n\t\t\t\n    \"Really, really.\" Victor frowns, \"And if it could happen to ${name},\" A pregnant pause, \"it could happen to any of us!\" \n    \n    So, you're a camera now, how do you act?\n\t\n    *fake_choice\n\t  \n      #You start buzzing, low and constant, trying to make \"camera sounds.\"\n\t  \n        You \"beep\" and \"boop\" and moan as best you can, trying to keep yourself from laughing. The two guards go entirely pale. \n\t  \n      #You stare intently at the guards, \"recording\" their every move.\n\t    \n        You stare at the men, eyes dead and unblinking. The two guards go entirely pale. \n\t\t\n      #You thrash around wildly, as if you are in the middle of a transformation.\n\t  \n        You fall to the floor, flopping around like a dead fish or someone transforming into a humanoid camera. Since you've never seen either, you aren't entirely certain about the distinction. \n\t\t\n        The two guards go completely pale. \n\t  \n    \"Get him out of here right now! I don't want to become camera.\" The shorter man flails his arms. \n\t\t\t\n    \"Sure thing. We'll just be getting out of your hair then...\" Victor looks over his shoulder, the left door is already closed, and the right will be any second. \n\t\t\t\n    \"No!\" The taller man says sharply, \"You're not a camera. You have to stay.\" He waves his baton. \n\t\t\t\n    Victor looks to you, a smirk spreading across his face, \"You heard the man. Get out of here, before you infect the rest of us.\"\n\t\t\t\n    You're suddenly very concerned about what they do to people at The Farm, and very happy that thanks to Victor, you might never have to find out.\n\t\t\t\n    You open your mouth to argue, but Victor waves you on. You nod, running at full tilt, just barely making it through the door before it closes. \n\t\n    *goto poker_night\n\n  #You decide to help Victor, he doesn't deserve to be abandoned.\n    *set marketing +large\n    *set Victor +large\n    *set ruthlessness -xlarge\n    *set Cyan -large\n\t\n    You decide to stay. Victor is a good guy, and if you're going to be trapped in a room with anyone, it might as well be him. \n\t\t\t\n    \"Any bright ideas?\" Victor whispers as the two guards approach, stun batons crackling in their hands. \n\t\n    You have an idea, but you're not so certain how bright it is. \n\t\n    You reach into your pocket and take out your phone, signaling Victor to follow your lead. \n\t\t\t\n    \"I guess we can stop these two.\" The shorter man mumbles.\n\t\t\t\n    \"Two is better than none, that's what I always say.\" The taller guard replies.\n\t\t\t\n    \"You never say that!\" The shorter man steps closer.\n\t\t\t\n    \"Sure I do! You just don't listen.\" The taller responds.\n\t\t\t\n    You tap your screen a few times and your phone begins to shriek.\n\t\n    *page_break\n\t\t\t\n    \"Wait a second.\" Victor places a hand over his heart, \"Wait just one second. Is that what I think it is?\" Victor looks aghast.\n\t\t\t\n    You nod, breathing heavily. \n\t\t\t\n    \"I'm so sorry...\" He lowers his voice. The two guards freeze.\n\t\t\t\n    \"What is it?\" The shorter begins.\n\n    \"It's ${name}'s detector. While we were standing here, ${name} became a camera.\"\n\t\t\t\n    \"Really?\" The taller man gasps.\n\t\t\t\n    \"Really, really.\" Victor frowns, \"And if it could happen to ${name},\" A pregnant pause, \"it could happen to any of us!\" \n    \n    So, you're a camera now, how do you act?\n\t\n    *fake_choice\n\t  \n      #You start buzzing, low and constant, trying to make \"camera sounds.\"\n\t  \n        You \"beep\" and \"boop\" and moan as best you can, trying to keep yourself from laughing. The two guards go entirely pale. \n\t  \n      #You stare intently at the guards, \"recording\" their every move.\n\t    \n        You stare at the men, eyes dead and unblinking. The two guards go entirely pale. \n\t\t\n      #You thrash around wildly, as if you are in the middle of a transformation.\n\t  \n        You fall to the floor, flopping around like a dead fish or someone transforming into a humanoid camera. Since you've never seen either, you aren't entirely certain about the distinction. \n\t\t\n        The two guards go completely pale. \n\t  \n    \"Get ${himher_f} out of here right now! I don't want to become camera.\" The shorter man flails his arms. \n\t\t\t\n    \"Sure thing. We'll just be getting out of your hair then...\" Victor looks over his shoulder, the left door is already closed, and the right will be any second. \n\t\t\t\n    \"No!\" The taller man says sharply, \"You're not a camera. You have to stay.\" He waves his baton. \n\t\t\t\n    Victor looks to you, a smirk spreading across his face, \"You heard the man. Get out of here, before you infect the rest of us.\"\n\t\t\t\n    You're suddenly very concerned about what they do to people at The Farm, and very happy that thanks to Victor, you might never have to find out.\n\t\t\t\n    You open your mouth to argue, but Victor waves you on. You nod, running at full tilt, just barely making it through the door before it closes. \t\n\t\n    *goto poker_night\n\t\n  #You don't help Victor, talking to people isn't your thing.\n    *set marketing -medium\n    *set Victor -medium\n    *set ruthlessness +medium\n    *set Cyan +large\n    *set culling_team_player false\n\t\n    Victor is talking fast, and for the moment he has their full attention. In that moment, you realize that you aren't exactly silver tongued, and that even if you wanted to, there is little you could do to help. \n\t\t\t\n    In fact, you might just make the situation worse. In any case, you're already almost in last place, and being trapped here would assure you a one way trip to The Farm. You catch Victor's eye, and give him a thumbs up, he looks at you like you've suddenly grown a second head. \n\t\t\t\n    Ignoring him, you spin on your heels and run through the slowly closing door. \n\t\t\t\n    You wait for almost a minute on the other side, wait until the door seals itself behind you. Victor never arrives. \t\n\t\n    *goto poker_night\n\t\n  #You don't help Victor, you don't want to end up on The Farm. \n    *set Victor -xlarge\n    *set ruthlessness +xlarge\n    *set Cyan +large\n    *set culling_team_player false\n\t\t\t\n    Victor is talking fast, and for the moment he has their full attention. In that moment, you realize that if you lose anymore time, you might as well give yourself up to The Farm now. \n\t\t\t\n    Not wanting to make eye contact, you spin on your heels and step through the slowly closing door. \n\t\t\t\n    You wait for almost a minute on the other side, wait until the door seals itself behind you. Victor never arrives. \t\n\t\n    *goto poker_night\n\t\n*label poker_night\n\nThat's two friends lost, and you still have no idea how much further you have to go. \n\t\nThis doesn't look good. \n\n*page_break\n\t\nYou find yourself in a gambling hall. The room is dark, the walls are covered in ugly, green paper. Oddly, the floors and ceilings are made of glass -- odder still, behind that glass is several thousand gallons of water. You're pretty sure that's a bad sign.\n\t\nIn the center of the room is a table, surrounded by twelve chairs. Eleven other people are milling about, but these people aren't Farm conscripts. They're from other teams, other teams trying to make it through the Culling.\n\t\n\"You're alive!\" Rachel hugs you around the waist. You spin, Sam is standing beside her, looking about as dour as you've ever seen him.\n\n*page_break\n\t\n\"You need to be more careful ${name}. You're in nearly last place, if you keep this up...\" He doesn't finish his sentence, instead letting Rachel break in.\n\t\n\"We're playing Poker, isn't that wild? The thing is, we're allowed to cheat.\" Her voice takes on a conspiratorial air, \"The organizers told us that anything goes, as long as we can do it without being caught.\"\n\t\nSam sighs, looking at Rachel with barely checked disdain, \"She thinks we should play as a team. Set up our bets to maximize our 'team score', as if such a thing exists.\"\n\t\n\"You have no idea what they're looking for Sam! And even if team scores don't exist, we shouldn't be fighting each other,\" she casts her gaze towards the other teams, \"we have enough to be worry about.\"\n\t\nThey are both looking to you to settle the matter, who do you side with?\n\n*choice\n\n  #You side with Rachel, fighting with each other is a bad plan.\n    *set ruthlessness -large\n    *set Sam -large\n\t\n    You point out that playing as a team doesn't mean that you can't play for keeps. You also remind Sam that there are only three of you left, and if the rest of this event is team against team, you can't afford to lose anyone else. \n\n    Rachel is ecstatic to hear you agreeing with her, but Sam just seems angrier than usual, which is saying something. You spend the next few awkward minutes talking over strategy, before making your way to the table.\n\n    *goto poker_start\n\t\n  #You side with Sam, without knowing how you're being judged, playing as a team could hurt everyone. \n    *set ruthlessness +large\n    *set Sam +large \n\t\n    You point out that if team scores don't exist, team play might not only be unproductive, it could be counter-productive. You also remind Rachel that you have no idea what the consequences of getting caught are, and that given the rest of this event, they probably aren't worth the risk.\n\t\t\t\n    After a brief back and forth, Rachel grudgingly agrees with you. Sam seems content with your reasoning, and with the fact that you sided with him. You spend the next few minutes talking over strategy, before making your way to the table. \n\n    *goto poker_start\t\n\t\n  #You don't side with anyone, you'll do what you think is best. \n    \n    You decide not to say much. Rachel is right about the fact that team play means that it's unlikely that any of you will end up in last place, but Sam is right that it also means that you won't end up in first place -- which is still dangerous.\n\t\t\t\n    You also have to consider the consequences of getting caught. You look towards the ceiling and realize that whatever those consequences are, they won't be pretty.  \n\t\t\t\n    With neither Rachel nor Sam particularly happy, you spend the next few awkward minutes talking over strategy, before making your way to the table.\t\n   \n    *goto poker_start\n    \n*label poker_start\n\nThe game starts uneventfully enough. \n\nA few hands pass by and what's most surprising is how boringly straightforward everything is. This is the Culling and for whatever reason they've decided to insert a vanilla game of cards between killer robots, and whatever is sitting on the other side of the giant door leading out of this room.\n\t\t\nYou aren't great at Poker, but none of the people you're playing with are either. Rachel and Sam are holding their own, which is nice. By now, you've had time to feel out the other players, and time to decide on your strategy.   \n\t\t\nHow are you going to play?\n\n*choice\n\n  #You bluff your way through.\n    *set charisma +xlarge\n  \n    Some people play cards, you play players. You smile and nod and talk your way through your hands, searching for the subtle physical ticks and micro-expressions that give away opportunities.\n\n    You were born for this sort of thing, and everyone around you can tell. \n\t\t\t\n    Doing this, you manage to pull into an early lead. \n\t\n    *goto poker_team_play\n\t\t\t\n  #You use your knowledge of statistics and business savvy to play the odds.\n    *set marketing +large\n\t\n    Poker is a game of statistics. It's a game where you sometimes have to give up short term gain for a longer term opportunity. It's business wrapped up in five cards, and if you know anything, you know about business. \n\t\t\t\n    You play a tight game, betting sparingly but aggressively when you do. \n\t\t\t\n    Doing this, you manage to pull into an early lead. \n\t\n    *goto poker_team_play\n\t\n  #You use an expert system you developed on your phone to help you win.\n    *set engineering +large\n\n    You know nothing about Poker, but you do know something about code. Back in school, you developed a program to help you make a few bucks on the side. It was an expert system designed to learn and play Poker. It worked brilliantly and because you're a pack rat, it's still on your phone.\n\t\t\t\n    More fortunately still, it's disguised to look like a calendar application.\n\t\t\t\n    You manage to use it without anyone noticing, doing this, you pull into an early lead.\n\n    *goto poker_team_play\n\t\n  *selectable_if (ruthlessness > 55) #You cheat, cheat, and cheat some more.\n    *set ruthlessness +medium\n    *set charisma +xlarge\n    *set wealth +small_cash\n    *achieve pokercheater\n\t\n    You know nothing about Poker, but you do know how to cheat. You've been palming cards and doing trick shuffles since before you could walk. Cheating this bunch seems almost unfair.\n\t\t\t\n    It is unfair, but you could care less. If cheating a couple of people in a fake game of cards keeps you out of The Farm, it's a moral sacrifice you're willing to make. \n\n    You manage to cheat wildly without anyone noticing, doing this, you pull into an early lead. \t\n  \n    *goto poker_team_play\n\t\n*label poker_team_play  \n\nIt's about mid-way through the game when you notice the floor starting to get moist, then wet, then whatever it's called when it's covered in five inches of water. \n\t\t\nThe room is flooding, rapidly. Some of the players take this as a cue to leave the table. The first, a dark haired woman about your age, tries to stand. As she does, she freezes, her eyes go wide, and then she collapses back into her seat. There is sharp crackling and the distinct smell of ozone. Apparently, leaving the table is out of the question. \n\t\t\nAt about this time, one of the other players decides that if he can't leave until the game ends -- he'll just make the game end. He loses, big, big enough to wipe him out. As he tries to leave, he's met with the same jolt of electricity as the woman. The person who beat him, a tanned man with close-cropped hair, is rewarded with a SCUBA suit. \n\t\t\nTo survive this, you're going to need to win. How do you plan on making that happen?\n\n*choice \n\n  #You decide to play as a team like Rachel suggested. \n    *set ruthlessness -large\n    *set Cyan +small\n\t\n    Rachel wanted you to work as a team, and that is exactly what you do. Unfortunately, it means that you lose some hands that you might have won, and fail to maintain the lead that you held earlier.  \n\t\t\t\n    More fortunately, it means that Sam and Rachel make it out unscathed. As it turns out, you are, by far, the best Poker player left on the team, and without your help, you aren't sure what might have happened. \n\t\t\t\n    In the end, there are five people left in the room -- a room that is now completely filled with water. You watch as black-clad men and woman swim out from air-tight passageways, and drag the bodies of those less fortunate than you to wherever it is that people who fail their Culling are sent. \n\t\t\t\n    You hope that the fact that almost everyone in this room belongs to your team impresses whichever Founders are watching. \n\t\n    *goto battle_royal\n\t\n  #You decide to play as a team, but near the end win a couple of extra hands.\n    *set ruthlessness +small\n    *set Cyan +large\n    *set Sam -small\n    *set wealth +small_cash\n    *set culling_team_player false\n\t\n    Rachel wanted you to work as a team, and that is exactly what you do. Well, not exactly. As soon as you see that Sam and Rachel will be OK on their own, you start playing against them, and manage to eek out a small lead.   \n\t\t\t\n    You're not sure if Rachel notices, but as she secures her SCUBA suit, she throws you a disappointed glare. Even Sam looks hurt, but you think that's only because it turns out he is a much worse Poker player than he might have originally thought. \n\t\t\t\n    In the end, there are five people left in the room -- a room that is now completely filled with water. You watch as black-clad men and woman swim out from air-tight passageways, and drag the bodies of those less fortunate than you to wherever it is that people who fail their Culling are sent. \n\t\t\t\n    You're pretty certain that whoever is watching this will notice that your team represents the majority of the people who remain, and you know that they will notice that you were the best player on your team. \n\n    *goto battle_royal\n\t\n  #You decide to play to win, no one else matters.\n    *set ruthlessness +large\n    *set Cyan +small\n    *set wealth +medium_cash\n    *set culling_team_player false\n\t\n    Rachel wanted you to work as a team, which seemed like an OK idea until you realized that working as a team might get you electrocuted. \n\t\t\t\n    You decide that for this round, at least, it's every person for herself. \n\t\t\t\n    You ignore Rachel's signals and don't make eye contact with Sam. It's touch and go for a while, and on several occasions it looks like one or both of them will be wiped out. \n\t\t\t\n    By some miracle, the two manage to hold on until the match is called. By skill and ruthlessness, you manage to maintain a decisive lead throughout. \n\t\t\t\n    In the end, there are five people left in the room -- a room that is now completely filled with water. You watch as black-clad men and woman swim out from air-tight passageways, and drag the bodies of those less fortunate than you to wherever it is that people who fail their Culling are sent. \n\t\t\t\n    You know that whoever is watching this will see how well you did in the game, which will go a long way towards making up for any bad showings you've had up until now. \n\t\t\t\n    You hope that they didn't notice you throwing your team mates under the bus, you can't be certain how well that will go over.  \n\t\n    *goto battle_royal\n\n*label battle_royal  \n\nWith the bodies cleaned up, the large door on the other side of the room opens, sweeping you all into the middle of a giant chamber. \n\n*page_break\n\nThe first thing you hear once the sounds of rushing water die down, is the screaming. You snap to attention, stripping off your SCUBA gear. After you remove the mask, the chaos crystallizes. \n\t\t\nThere are dozens of people -- pushing and shoving and swinging stun batons. Some of them are angling for a set of doors on the other side of the room. Doors that are not so slowly closing. \n\nYou've never undressed faster in your life. After freeing yourself from your flippers you check your pack, hoping that nothing was lost, nothing was ruined. Everything is still there, and your stun baton still works. Small miracles. You unsling it and take off the safety, it crackles into life. \n\t\t\nIt's then that you notice that Victor and Trish are among the combatants. They look like they've been here for hours, and maybe they have. Maybe this is where they ended up after being trapped in the other rooms. You don't know. What you do know is that they don't seem to realize that the door is open. \n\n*page_break\n\nRachel and Sam are one step behind you. When Rachel spots Victor and Trish, she immediately runs towards them, swinging her baton through the air. She leaves so fast that you doubt she even saw the exit.  \n\nSam looks between you and the group, shaking his head.\n\t\t\n\"Let's go ${name}.\" His eyes more distant than you've ever seen them, \"Everyone's so busy trying to kill each other that they don't even notice the way out. If we stick together, we'll be fine.\"\n\t\t\nSam's right about one part, while there are a ton of people sprinting towards the exit, there are at least twice as many trapped in the pile of bodies -- kicking and punching and beating each other bloody. If you're quiet and quick, chances are you can make it out unscathed. \n\t\t\nThen again, if you do leave, the rest of your team will be trapped here on their own. \n\t\t\nSam doesn't wait for your answer, he starts running almost as soon as the words leave his mouth. You stand there, watching him go, then turn to see your friends fighting for their lives in the middle of the arena.  \n\t\t\nWhat do you do?\n\n*choice\n\n  #You follow Sam, the clock is ticking and you need to beat him to the finish. \n    *set ruthlessness +xxlarge\n    *set Sam +xlarge\n    *set culling_team_player false\n\t\n    You don't have anymore time, you don't have anymore chances, and you can't afford to get trapped here. You run as fast as your legs will carry you, fast enough to catch up with Sam. \n\t\t\t\n    He was right. The people running towards the door have absolutely no interest in fighting you, they just want to get out. \n\t\t\t\n    You shove a couple that get in your way, but mostly you're running. By the time you make it to the door, you realize that you can't see Sam anymore. You stop and count to ten, but when you're finished, he's nowhere to be seen. Feeling like you've done the best that you can, you push the final few steps out of the arena. \n\t\n    *goto you_hear_the_news\n\t\n  #You follow Sam, you're not a fighter, there is nothing you can do in this mess. \n    *set combat -large\n    *set ruthlessness +medium\n    *set Sam +xlarge\n    *set culling_team_player false\n\t\n    You don't have anymore time, you don't have anymore chances, and you can't afford to get trapped here. Moreover, you're not a fighter, so even if you wanted to help, chances are you would have been more liability than anything else. \n\t\t\t\n    So, you give one final look back to your friends, and then run as fast as your legs will carry you, fast enough to catch up with Sam. \n\t\t\t\n    He was right. The people running towards the door have absolutely no interest in fighting you, they just want to get out. \n\t\t\t\n    You shove a couple that get in your way, but mostly you're running. By the time you make it to the door, you realize that you can't see Sam anymore. You stop and count to ten, but when you're finished, he's nowhere to be seen. Feeling like you've done the best that you can, you push the final few steps out of the arena. \n\n    *goto you_hear_the_news\n\n  #You stay behind, you need to help the rest of your team. \n    *set ruthlessness -xlarge\n    *set Victor +medium\n    *set Cyan +medium\n    *set Trish +medium\n    *set Sam -xlarge\n\n    You can't leave. Your team has sacrificed time and time again on your behalf. They stayed behind, not knowing whether they would live or die, to make sure that you and Sam had a chance to escape. \n\t\t\t\n    Rachel knows this, that's why she went to help. \n\t\t\t\n    You know this, that's why you have to do the same. \n\t\t\t\n    You give one final glance towards Sam, turn and run into the throng, stun baton held high. \t\n\t\n    *goto battle_begins\n\t\n  #You stay behind, you think a little fight might be fun. \n    *set combat +medium\n    *set ruthlessness -medium\n    *set Victor +medium\n    *set Cyan +medium\n    *set Trish +medium\n\t\n    You can't leave a good fight, and you can't leave your friends to the wolves. \n\t\t\t\n    Even if it costs you some time, you know in your heart that you need to go help them.\n\t\t\t\n    You also know it will a pile of fun. \n\t\t\t\n    You give one final glance towards Sam, turn and run into the throng, stun baton held high. \n\t\n    *goto battle_begins\n\t\n*label battle_begins\n*page_break\n\n*if Trish > 27\n  \"${name} you're alive!\" Trish grins through gritted teeth, spinning on her heels and sending her stun baton across a small, blond man's cheek. \n  *goto battle_continue_trish\n*else\n  \"Oh, so you decided to help?\" Trish grumbles through gritted teeth, spinning on her heels and sending her stun baton across a small, blond man's cheek.\n  *goto battle_continue_trish\n\n*label battle_continue_trish\n\nYou nod, watching as Victor and Rachel fight off the remains of a rival team -- two women and a man -- all dressed in Hawaiian shirts and straw hats. \n\t\t\nA stocky man with shoulder-length hair leaps towards you, you duck out of the way, and tap him in the back with your baton. Electricity courses through him, and he hits the ground hard.  \n\n*if Victor > 27\n  \"It is you!\" Victor begins, \"Rachel said you and Sam ran off. I should have known that unlike some people, [i]you[/i] wouldn't leave us behind.\" He snarls, backing towards you.\n  *goto battle_continue_victor  \n*else\n  \"It is you!\" Victor begins, \"Rachel said you and Sam ran off. Which, let's be honest, seemed like something you'd do. Glad to see at least one of you has a conscience.\" He sighs, backing towards you. \n  *goto battle_continue_victor\n\n*label battle_continue_victor \n  \n\"Sam isn't a bad guy, he's just scared.\" Rachel squeaks, dodging and diving away from a flurry of baton swings. \n\t\t\n\"No, Rachel. Sam is a jerk. He has always been a jerk, and the fact that he left us here only goes to prove that.\" Trish grumbles. \n\nThe three of them are arguing back and forth, what do you think?\n\n*fake_choice\n\n  #You think Sam is scared, and that Trish and Victor are being too hard of him.\n  \n    You point out that a person would have to be crazy to stay behind in this, and that being afraid of going to The Farm or dying at the hands of psychopaths, is nothing to be ashamed of. \n\t\n    \"${name} has a point there.\" Victor spins left, avoiding a kick to the ribs, \"Maybe we're the crazy ones...\"\n\t\n    \"If you say so...\" Trish shrugs her shoulders, dancing away from a tackle.\n  \n  #You think Sam is being a jerk, and that Rachel is being too easy on him. \n  \n    You can't help but agree with Trish and Victor, you remind Rachel that Sam has been horrible to her for the entire Culling, and that while he might be scared, so is everyone else. \n\t\n    \"I get it ${name}.\" She sighs, \"I don't know, the Culling brings out the worst in everyone. Let's just try to get through this.\" Rachel slides under a woman's kick, a woman who decided to wear three inch heels to a fist fight. \n\nOver the next thirty seconds you and the team formulate a plan, and that plan is to hit things until you make it to the door. \n\nFor a while, it goes perfectly. \n\nThat is until Rachel disappears... \n\n*page_break \n\nNo one notices, not until you're already standing by the exit. Victor asks Trish where Rachel went, then Trish asks you. The background hum of screaming fighters is the only response. \n\nPanic starts to set in, then panic becomes debate. \n\t\t\nTogether you realize that Rachel must have fallen behind somewhere in the crowd. You also realize that since the exit is already half-way closed, whoever goes back to find her is probably going to end up trapped with the crazy people. \n\nThere are a lot of variables to consider, but the one thing you're absolutely certain about is that if no one goes back for Rachel, her chances of making it out of this in one piece are very low...  \n\nGiven this, how do you handle the situation?\n\n*choice\n\n  #You decide to leave her, there is nothing you can do. \n    *set ruthlessness +medium\n    *set culling_team_player false\n\t\n    You give Trish and Victor a chilly stare, one filled with sadness and purpose. You know that there is no way to find Rachel without ending up trapped, and that being trapped here is a death sentence. \n\t\t\t\n    You also know that it's pointless to get four people killed in order to save one. \n\t\t\t\n    No one is particularly happy with any of these facts, but eventually you manage to bring Victor and Trish around to your logic, and convince them that the only choice you have is to leave. \n\t\n    *if Trish > 24\t\n      \"This sucks,\" Trish takes a long breath, \"but OK ${name}, I trust you.\" Her eyes are dark and moist. \n      *goto battle_leaving_trish_one\n\t  \n    *else\n      *set Trish -small\n      \"I don't like this ${name},\" Trish grumbles, \"not one bit.\" Her eyes burn into yours, you can't help but think she blames you.\n      *goto battle_leaving_trish_one\n    \n    *label battle_leaving_trish_one\t\n\t\n    *if Victor > 24\n      \"I guess it could be worse,\" Victor's face is flat, humorless, \"Wait. No, it couldn't be.\"\n      *goto battle_leaving_victor_one\n\t  \n    *else\n      *set Victor -small\n      \"I'm done talking about this...\" Victor eyes you suspiciously, \"Let's just go.\"\n      *goto battle_leaving_victor_one\n\t\n    *label battle_leaving_victor_one\n\t\n    You can't make eye contact with them, instead you give one final, hopeful look back into the crowd. There is nothing to see, nothing you want to see, at least. With that done, you turn and push the final few steps through the exit. \n    \n    *goto you_hear_the_news\n  \n  *selectable_if (ruthlessness \u003c 41) #You decide to go back for her, you're not going to let her die here.\n    *set ruthlessness -medium\n    *set Cyan +large\n  \n    You can't leave her, but you also can't let Victor and Trish risk their lives again, so you make your decision.\n\t\t\t\n    You're going alone. \n\t\t\t\n    At first they argue, but eventually they realize that it's pointless for four people to get killed in order to save one. \n\t\t\t\n    \"OK ${name}, I get it, you're going to play hero today.\" Trish begins, \"But let me remind you, you might be able to stop us from coming,\" a smile spreads across her face, her hand grips tightly around her baton, \"but you can't stop us from helping!\"\n\t\n    *if (Victor > 24) and (Trish > 24)\n\t  \t\n      With that, they both run ahead, kicking and punching and tackling anyone who gets in their way, trying their best to clear a path for you. They put everything they have into defending you, and you manage to get through without a scratch.\n      *goto battle_leaving_two\t  \n\t\n    *else\n      *set combat -medium\n      *set culling_hurt true\n      With that, they both run ahead, kicking and punching and tackling anyone who gets in their way, trying their best to clear a path for you. They're mostly successful, you manage to collect surprisingly few bruises on the way in. \n      *goto battle_leaving_two\n\t\t\t\n    *label battle_leaving_two\n\t\n    As you push forward, disappearing into a sea of arms and legs, you hear a faint voice calling your name, \"${name}! Try not to die!\" it's Victor. You only hope that you don't disappoint him.\n\t\n    *goto battle_last_stand\n\t\n  *selectable_if ((Victor > 24) and (Trish > 24)) #You ask Victor and Rachel what they think you should do.\n    *set combat -medium  \n    *set ruthlessness -medium\n    *set Cyan +large\n    *set Trish +medium\n    *set Victor +medium\n    *set culling_hurt true\n\t\n    You ask your team, they've gotten you this far after all. \n\t\t\t\n    Victor thinks that Rachel will die if someone doesn't go back to help her. \n\t\t\t\n    Trish thinks that the \"someone\" in question is all of you, and that you need to leave right now. \n\t\t\t\n    You think that while \"someone\" does need to go back, you couldn't live with yourself if you let your friends risk their lives again. \n\t\n    You decide that this time, you're going it alone.  \n\t\t\t\n    At first they argue, but eventually they realize that it's pointless for four people to get killed in order to save one.\n\t\t\t\n    \"OK ${name}, I get it, you're going to play hero today.\" Trish begins, \"But let me remind you, you might be able to stop us from coming,\" a smile spreads across her face, her hand grips tightly around her baton, \"but you can't stop us from helping!\"\n\t\t\t\n    With that, they both run ahead, kicking and punching and tackling anyone who gets in their way, trying their best to clear a path for you. They're mostly successful, you manage to collect surprisingly few bruises on the way in. \n\t\t\t\n    As you push forward, disappearing into a sea of arms and legs, you hear a faint voice calling your name, \"${name}! Try not to die!\" it's Victor. You only hope that you don't disappoint him.\n\t\n    *goto battle_last_stand\n\n*label battle_last_stand\n*page_break\nYou find Rachel near the center of the combat zone, which is a lot thinner than it was a few minutes earlier. There are piles of people on the ground, moaning and crying. Those, however, aren't the ones who worry you, the ones who worry you are the smaller number who are stock still and silent. \n\t\t\n\"Get out of here ${name}!\" Rachel screams. She's doing her best to fight, but you can tell she's starting to slow down. \n\t\t\nThe people left standing don't seem to care about the door. All they care about is causing as much damage as possible before they're taken down. \n\t\t\nYou convince Rachel that you aren't going anywhere. \n\t\t\n\"You're an idiot,\" She is almost crying, \"but thank you...\"\n\nYou nod and start to fight beside her, shoulder to shoulder. \n\nYou're being attacked from every direction, what is your strategy?\n\n*choice\n  \n  #You decide to fight aggressively, the faster you take them out, the faster this ends. \n    *set ruthlessness +medium\n    \n    You throw yourself at anyone who comes near you, even if they aren't about to attack. \n\t\t\t\n    You're everywhere at once. As soon as a person hits the floor, you're striking at another. \n\n    *if combat > 10  \n      *set Cyan +large\n      *set combat +medium\n\t\n      You can feel your heart pounding in your ears, but your combat training keeps you stable and focused and deadly. You're glad you spent that extra time in the gym. \n\t  \n      You're managing to hold on, excel even, but you know as well as anyone that you won't be able to keep this up for long. \n      *goto battle_last_stand_one\n  \n    *else\n      *set Cyan -small\n      *set combat -small\n      *set culling_hurt true\n\t  \n      You can feel your heart pounding in your ears, and deep bruises forming around your head and shoulders. Something feels fractured, and you're pretty sure that you have a concussion. \n\t  \n      You're holding on, for now, but you know that you won't be able to keep this up for long. \n      *goto battle_last_stand_one\n\t\n    *label battle_last_stand_one\n\n    Minutes pass and while there is never any time to stop, eventually there is a moment to breath, and in that moment, Rachel looks on in awe at the nearly perfect circle of bodies around you.  \n    *goto battle_the_end\n  \n  #You decide to fight conservatively, first and foremost you're trying not to get hit. \n    *set Cyan +small\n\t\n    You feint and dodge away, waiting for attackers to get close before you strike. \n\t\t\t\n    You have no idea how long you'll be here, and you need to conserve your energy as much as possible. \n\t\t\t\n    But that's much harder than it seems, and the fight drags on. While you're mostly uninjured, you know that you won't be able to keep this up for long. \n\t\t\t\n    Rachel is even more exhausted, she swings her baton aimlessly, hoping to keep the crowds back with sheer willpower. \n    *goto battle_the_end\n\t\t\t\n  #You decide to fight cautiously, you want to inflict the fewest injuries you possibly can. \n    *set ruthlessness -large\n\t\n    You don't want to hurt these people. You know that they wouldn't be here, wouldn't be doing any of this, if they hadn't been forced into the Culling.\n\t\n    *if combat > 10\n      *set Cyan +xlarge\n      *set combat +medium\n\t  \n      You dodge away from most blows, only retaliating when absolutely necessary. Thanks to your combat training you manage to avoid most every blow that comes your way. \n\t  \n      Still, the fight drags on and you're getting exhausted. You don't think you're going to be able to keep this up for long. \n      *goto battle_last_stand_two\n\t  \n    *else\t\n      *set Cyan +small\n      *set combat -small\n      *set culling_hurt true\n\t  \n      You dodge away from most blows, only retaliating when absolutely necessary. The result is that you get hit a lot more often than you might otherwise have, but there are also a lot fewer bodies. \n\t  \n      The fight drags on and your injuries start to catch up with you, you have no idea how much more of this you're going to be able to take.\n      *goto battle_last_stand_two\t  \n\t\t\n    *label battle_last_stand_two\n\t\n    Rachel is equally exhausted, she swings her baton aimlessly, hoping to keep the crowds back with sheer willpower.\n    *goto battle_the_end\n\n*label battle_the_end  \n*page_break\n\nThe fight is endless, and you're nearly spent. \n\t\t\nThe part of your brain that can still focus see's the door is barely a third of the way open. \n\t\t\nRachel is in a heap next to you, she can barely hold her baton. Even if you had the energy to drag her, there is no way she would make it. \n\t\t\nAll around you the crowds are growing more feral, more violent. The only ones that are still left in the room are the ones who want to be here, the people whose Cullings have reduced them to blood thirsty animals, looking for a chance to hurt anyone who gets in their way.\n\t\t\nIf you run now, there is a chance you might be able to escape, at the expense of Rachel's life.\n\t\t\nIf you stay and fight, you have no idea what will happen, but one thing is for certain, you're going to fail your Culling.\n\t\t\n\"Enough is enough ${name},\" Rachel's voice is barely a whisper, \"you tried. This is my second Culling, even if I could get out of here, all I could really hope for is The Farm. You've seen those people, that's not life. Not a life that I want, at least.\"\n\t\t\nAnother group is closing in. There isn't much time. \n\t\t\nWhat do you do?\n\n*choice\n  #You stay with Rachel, knowing you will fail your Culling.\n    *set ruthlessness -large\n    *set Cyan +xlarge\n    *set charisma -small\n    *set rachel_is_safe true\n\n    You smile towards Rachel, drawing yourself up to your full height. If you're going to fail your Culling, you might as well go out in style. \n\t\t\t\n    You swing your baton, dancing between bodies and keeping your friend safe for as long as you can manage. But, that's not nearly long enough. Soon, the blows come more swiftly and you find yourself staggered. \n\t\t\t\n    You don't feel the one that strikes you across the temple. All you notice is that you're no longer standing, and the world around you is growing hazy. You crawl towards Rachel, throwing yourself on top of her. Maybe these monsters will be too busy beating you to death to notice that she's still breathing. \n\t\t\t\n    The last thing you think before everything fades to black, is that any world where you have to go through all of this to get a job, is pretty darn stupid.\n\t\n    *page_break\n\t\n    You're surprised when you wake up. You're more surprised when you find out that you aren't still in the arena. Instead, you're in an off-white room, laying on a hard mattress. Beside your bed is a note, telling you to get dressed as soon as you see it, and to make your way towards the reception hall. \n\t\t\t\n    Before you do either, you look around, hoping against hope that Rachel was as lucky as you are. \n\t\t\t\n    You're about to give up when you see a tiny figure covered in bruises and wrapped up in a blanket, laying quietly in a corner of the room.\n\t\t\t\n    You drag yourself to your feet and amble towards it. \n\t\t\t\n    When you look down, recognition strikes you immediately. \n\t\n    It's Rachel.\n\n    There she is, sleeping, badly injured but very much alive. \t\n\t\n    *page_break\n\t\n    *if rachel_is_safe = true\n      *achieve yousavedrachel\n\t\t\t\n    You can tell that she won't be waking up anytime soon, but because of your bravery, she will be waking up.  \n\n    There are a few other people scattered around, but the rest of your friends are nowhere to be seen. \n\t\n    The only thing that stands out about the people in this room is that each and every one of them looks awful, which only serves to remind you that you should probably avoid mirrors for a while.\n\t\t\t\n    With nothing left to do, you step out into the hallway. \t\n    \n    *goto you_hear_the_news\n  \n  #You run for the door, you've done everything you can.\n    *set charisma -small  \n  \n    You frown towards Rachel, slumping your shoulders. She's right, there is nothing else you can do for her except die. \n\t\t\t\n    You run as fast as your legs will carry you, swinging your baton as you go. Unfortunately, you're exhausted and there are just too many people between you and the door. Soon, the blows start coming more swiftly and you find yourself staggered.\n\t\t\t\n    You don't feel the one that strikes you across the temple. All you notice is that you're no longer standing, and the world around you is growing hazy.\n\t\t\t\n    The last thing you think before everything fades to black, is that any world where you have to go through all of this to get a job, is pretty darn stupid.\n\t\n    *page_break\n\n    You're surprised when you wake up. You're more surprised when you find out that you aren't still in the arena. Instead, you're in an off-white room, laying on a hard mattress. Beside your bed is a note, telling you to get dressed as soon as you see it, and to make your way towards the reception hall. \n\t\t\t\n    You look around, hoping against hope that Rachel was as lucky as you are.\n\t\t\t\n    You scan every inch of the room, but there is nothing to see, no one here that matters. \n\t\t\t\n    You swallow hard, eyes drifting down to your bruised arms.\n\t\t\t\n    There are a few other people scattered around, but the only thing you notice about them is that they look awful, which only serves to remind you that you should probably avoid mirrors for a while. \n         \n    With nothing left to do, you step out into the hallway. \n\n    *goto you_hear_the_news\t\n\t\t\n*label you_hear_the_news\n\n*page_break \n\n*if culling_team_player = true\n  *achieve cullingteamplayer\n*if culling_hurt = false\n  *achieve withoutascratch\n  \nFor a while, everything is a blur. \n\t\t\nFarm employees in cheap suits usher you into room after room, all in an attempt to make you look like you haven't spent the last few weeks being tortured. \n\t\t\nAfter they're done, they slap a name tag on your chest and shuffle you off into the reception hall, a hall that is so unlike the rest of the building, that it threatens to give you whiplash. \n\t\t\nHere, away from the robots and stun batons and blood, there is soft lighting and chandeliers. Here, people sit at the bar or in the small cafe and joke with one another -- hands resting on chins, faces clean and calm.  \n\nThe men and woman who walk the plush carpeting lack the hungry, glassy stares you've grown so used to in the Culling -- instead, they look bored, like people leaving a High School play.\n\t\t\nIn this sea of difference, there is still one that manages to stand head and shoulders above the rest, and that is the fact that almost every person you see has a Slowgun strapped to her hip.\n\n*page_break \n\nThe Slowgun is the Founder's symbol of office. \n\nWithout one, you can't open a business, you can't protect your Equity, you can't Negotiate -- you're an employee, ripe for the Culling, The Farm, and all the other brands of exploitation that this world has to offer. \n\t\t\nWith one, however, you can be shot to death in your bathroom over a stapler. \n\nEverything has its price. \n\t\t\nYou realize that almost everyone here is a Founder, and that this must be the place where they watched you and yours die. \n\nWhat do you think of them?\n\n*fake_choice\n\n  #You think that Founders are doing everything they can to help.\n    \n    The system might be broken, but the Founders are doing the best that they can to change it from within. They risk their lives to start and run companies, and it's those companies that keep people out of The Farm.\n\t\n    Some of them can be jerks, but at least they're making real people's live better, and for that you're grateful. \n\t\n  #You think that Founders are trying, but should be doing more.\n  \n    The system is broken, and while Founders are keeping some people out of The Farm -- with their power -- they could be doing so much more. \n\t\n    You think that too many of them are drawn to the wealth and influence that comes with founding a startup, rather than the real business of helping to build a better world for everyone.\n\t\n    They might not be part of the problem, but they aren't part of the solution either. \n\t\n  #You think that Founders are the problem. \n  \n    The system is broken, and the Founders are one of the major reasons for it. \n\t\n    They run around killing each other in Negotiations, all for the sake of wealth and power, instead of using that energy to build better businesses or fight back against The Farm. \n\t\n    If you're not a part of the solution, you're a part of the problem and the Founders are definitely not part of the solution. \n\t\t\nRegardless, you know that right now, [i]you[/i] need them. These Founders are the people who, as you stand here, will decide whether to hire you or send you out to pasture. \n\n*page_break\n\t\t\nNervous, you try to find your friends, but Trish, Sam, and Victor are nowhere to be seen. You lost sight of them somewhere between leaving the arena and making it here. \n\n*if rachel_is_safe = true\n  Rachel is still unconscious, and even if she wasn't, she didn't look like she would be wandering around the hall on her own anytime soon. \n  \nYou could probably use your phone to find them, but what's the point? There is nothing they can do to help you anyway. Right now, the only help someone could give you, is to offer you a job.\n\n*page_break \n\t\t\nUnfortunately, it's now almost an hour into the reception, and that someone has yet to arrive. \n\n*if rachel_is_safe = true\n  You knew that when you saved Rachel you were taking a big risk, but you had hoped that maybe one of the Founders would appreciate your sacrifice. It's starting to look like they don't, not even a little. \n  \n*if ruthlessness > 50\n  Still, you're content with your performance, you followed their rules and did everything that they wanted. While you might not have been the fastest, you proved that you're willing to do what it takes to win. You have to believe that there is some startup out there that respects that. \n  \n  *goto reception_hall_post_rachel\n  \n*else\n  Still, you're proud of your performance, you followed your heart and did what you thought was right. While you might not have been the fastest, you showed everyone that even in a Culling, people are more valuable than numbers. You have to believe that there is some startup out there that respects that.\n\n  *goto reception_hall_post_rachel  \n  \n*label reception_hall_post_rachel\n\nYou do still believe, but so far the facts aren't looking so good.\n\nTime to decide, what's your next move? \n\n*label reception_hall_tasks\n\n*choice\n  \n  #You find the nearest Founders and ask them how they think you did. \n    *temp cara_likes_you true\n\t\n    You decide to be proactive. \n\t\t\t\n    Near the center of the room, there is a man in his late thirties talking to a woman a few years older, they both have Slowguns. \n\t\t\t\n    You know them as Arthur Highcastle and Cara Lambert, the Founders of Ionick, a startup that makes medical diagnostic implants. You also know that they're opening a new office and are hungry for fresh talent, so talking to them should give you a good idea of where you stand.\n\t\n    How do you approach?\n\t\n    *choice\n\t\n      #You stride over, confident in your knowledge of business etiquette. \n\t  \n        *if marketing > 19\n\t\t  \n          Before you go, you take your phone out of your pocket and pull up your Culling profile. For a second, all you can do is stare at the happy, hopeful ${sex} you see reflected in it. All of that seems so long ago. \n\t\t  \n          You shake off the memory and approach, holding the phone loosely in your left hand. \n\t\t  \n          When you arrive, Cara offers you her right hand and you take it, calibrating your movements to sync with hers, firm but not overbearing. \n\t\t  \n          Arthur watches you wearily, you can tell that he is trying to figure out who you are. As if on cue, you pass him your phone, maintaining eye contact with Cara until she releases your grip.  \n\t\t  \n          They both seem impressed by this display of foresight.\n          *goto reception_founder_continue\n\t\t  \n        *else\n          *set cara_likes_you false\n\t\t  \n          Before you go, you take your phone out of your pocket and pull up your Culling profile. For a second, all you can do is stare at the happy, hopeful ${sex} you see reflected in it. All of that seems so long ago.           \n\t\t  \n          You shake off the memory and approach, turning your phone off and placing it back in your pocket. \n\n          When you arrive, Cara offers you her hand and you take it, she flinches back at your squeeze. Apparently, your attempt to exude confidence by crushing her fingers seems to have failed.  \n\t\t  \n          Arthur watches you wearily, you can tell he is trying to figure out who you are. In that moment you wish you hadn't put your phone away. Cara can tell you are distracted, and gives you a chilly glance before letting go of your hand.\n\n          Neither of them seem particularly impressed by you.\n          *goto reception_founder_continue \t\t  \n\t\t  \n      #You glide over, with a smile on your face, hoping to charm them with your wit.\n        \n        *if charisma > 10\n          Before you go, you flag down a waiter and take two cocktails from his tray. Drinks in hand, you walk over to the two. \n\n          \"Thirsty?\" Cara's head tilts to the side as you step into her orbit.\n\n          You explain that Cullings are thirsty work, but that you would be happy to share. Before she can respond, you hand her a fresh cocktail. She takes the drink, clearly appreciative. \n\n          \"Cara Lambert, pleased to meet you.\" She offers her hand and you take it, calibrating your movements to sync with hers, keeping your grip firm but not overbearing.\n\n          Arthur watches you wearily, you can tell that he is trying to figure out who you are. As if on cue, you give Cara your name, and rattle off your Culling Profile ID. The timing isn't lost on Arthur, you swear you can see him smile out of the corner of your eye.\n          *goto reception_founder_continue\n\t\t  \n        *else\n          *set cara_likes_you false\n\t\t  \n          Before you go, you flag down a waiter and take two cocktails from his tray. Drinks in hand, you walk over to the two. \n\n          \"Thirsty?\" Cara's head tilts to the side as you step into her orbit.\n\n          The question catches you by surprise, so you do the only thing you can think of in the moment and stand, completely still, staring at her for a full ten seconds before mumbling something about dehydration.  \n\n          \"You know, those won't help...right?\" \n\t\t  \n          She offers her hand and you take it, she flinches back at your squeeze. Apparently, your attempt to exude confidence by crushing her fingers seems to have failed as well. \n\n          Arthur watches you wearily, you can tell he is trying to figure out who you are. He pulls out his phone, not even trying to hide the fact that he's looking you up. Cara can tell you're distracted, and gives you a chilly glance before letting go of your hand.\n          *goto reception_founder_continue\n\t      \n      #You walk over casually, no need to put on a show. \n        *set cara_likes_you false\n\t\t\n        You gather your courage and walk over as casually as you can. You're already interrupting their conversation, no need to make it worse by trying too hard.\n\t\t\n        As you arrive, you introduce yourself. \n\t\t\n        \"Cara Lambert, pleased to meet you.\" The woman offers you her hand and you take it, as you shake, you try to keep the pressure firm and steady without breaking her fingers in the process. You think you are mostly successful.\n\n        Arthur watches you wearily, you can tell he is trying to figure out who you are. He pulls out his phone, not even trying to hide the fact that he's looking you up.\n\t  \n    *label reception_founder_continue\n\t\t\t\n    \"Nice work out there ${name}.\" Cara's voice is calm, measured, devoid of emotion.\n\t\n    How do you respond?\n\t\n    *choice\n      #You're polite, thanking her for the compliment.\n\t  \n        She stares at you as one might a particularly affectionate puppy.\n\t\t\n        You've clearly missed the joke.\n\t\t\n        You try to recover, asking her how she thinks your Culling went, this doesn't seem to help matters any. \n\t\t\n        \"Like I said, [i]nice[/i] work.\" Speaking more slowly, \"Maybe a little too nice.\" She shrugs her shoulders, \"Believe me, I understand the need for team work, but that 'niceness' of yours slowed you down. You spent more time helping than leading.\" She takes a drink from a passing waiter.\n\t\t\n        *goto reception_founder_end\n\t\t\n      *if (charisma > 13) #You catch her joke, explaining that it might have been 'too nice'.\n        *set cara_likes_you true\n\t\t\n        She smiles a little, for the first time since the conversation started. \n\t\t\n        \"Exactly ${name}, you're more clever than you look.\" She touches your shoulder, \"Believe me, I understand the need for team work, but that 'niceness' of yours slowed you down. You spent more time helping than leading.\" She takes a drink from a passing waiter.\n\t\t\n        *goto reception_founder_end\n\t\t\n      #You ask her if that means she's interested in hiring you.  \n\t\t\t  \n        Cara just stares at you.\t\t\n\t\t\n        You've clearly made a mistake.\n\t\t\n        \"No ${name}, I don't think that will be possible...\" Her voice is flat.\n\t\t\n        Arthur puts his phone away and shakes his head, \"I think you should leave now.\"\n\t\t\n        *goto reception_founder_bad_ending\n\t\t\n    *label reception_founder_end\n\t\t\t\n    \"Listen, you seem competent enough,\" Arthur interjects, \"but this is a competitive marketplace and we need more than just competence.\"\n\t\t\t\n    \"He's right,\" Cara begins, \"We need leaders.\" She lifts the glass to her lips.\n\t\t\t\n    \"We need innovators.\" Arthur piles on.\n\t\t\t\n    \"We need warriors.\" The woman ends with a flourish, finishing the drink with an audible gulp. \n\t\t\t\n    \"But,\" Arthur pauses for effect, \"we're also not your average startup.\" He stares at you, catching the disappointment in your eyes, \"Oh, don't be like that. Cheer up! I'm sure you'll come out of this just fine, the night is still young.\" He offers you a hard smile.\n\t\n    You manage to halfhearted smile of your own, before turning your attention to Cara. \n\t\n    *page_break\n\t\n    *if cara_likes_you = true\n      *achieve cullingcharmer\n      *set you_have_kiosk_key true\n\t  \n      \"Listen ${name}, you're good people, better than most.\" Cara walks to a nearby table and rummages through her bag, \"You don't have to believe me, but I really wish I could hire you.\" She returns, standing closer than before, her expression soft and sad, \"Unfortunately, even Founders don't always get what we want.\" She hands you a small, silvered card.\n\n      You take it, running it through your fingers. \n\n      \"That will give you access to the Founder's Kiosk. The Farm sells all sorts of junk at these events, all deeply discounted. It's some ridiculous effort to build 'brand loyalty,' as if any of us have a choice about who we buy from. In either case, you might find something useful there.\"\n\t  \n      You thank her profusely, she gives you a quick nod.\n\t  \n      \"No need for all that.\" She looks at you meaningfully, \"Good luck out there ${name}, I have this feeling you'll need it.\"\n\t  \n      Well, that is disconcerting.\n\n      *goto reception_founder_bad_ending\n   \t  \n    *else\n      The woman says nothing, dismissing you by way of a nod.\n      *goto reception_founder_bad_ending\t  \n\t\n    *label reception_founder_bad_ending\n\t\n    You open your mouth to respond, but neither of them seems interested in what you might have to say.  \n\n    You decide it would be best if you left.\n    *goto reception_sam_talk \t\n\n  #You look for your friends, maybe they've had better luck.\n  \n    You pull out your phone and use it to track down Victor, Trish and Sam. \n\t\t\t\n    Victor and Trish come up as unavailable, which can only mean that they're talking to a startup under a privacy screen. \n\t\t\t\n    Good for them.  \n\t\t\t\n    Sam seems to be walking around as idly as you are. You wonder whether you should go and see how he's doing, but decide to hold off for a few minutes. If he hasn't been approached either, he might need time to blow off steam. \n\n    With your phone at the ready and nothing but time on your hands, you figure it might be nice to send your friends a text message wishing them luck. \n\t\n    Then again, you remind yourself, if you're wrong about the privacy screen and they haven't found jobs yet, your little message might not go over so well.  \n\t\n    How do you handle this? \n\t\n    *choice\n      #You send all of your friends a message. \n        *set Trish +medium\n        *set Victor +medium\n        *set Sam -medium\n\t\t\n        You decide to go for it, it never hurts to be polite, even if politeness turns out to be incredibly impolite.  \n\t\t\n        You type out a text, wishing them all the best of luck and explaining that you'll do your best to find them before the end of the night. Trish and Victor are silent, but you expected that, their privacy screens are still up.\n\t\t\n        You're about to put your phone away when you get a reply from Sam, [i]Thanks for reminding me about all the jobs I'm not interviewing for...I hope your night sucks more than mine.[/i]\n\t\t\n        Uh oh, that could have gone better. \n\t\t\n        You place your phone back in your pocket, deciding to rethink your position on politeness.\n        *goto reception_text_message_end\t\t\n\t  \n      #You send Trish and Victor a message.\n        *set Trish +medium\n        *set Victor +medium\n\t\t\n        You decide to leave Sam out of your little love-fest. Caution is the better part of valor, and considering Sam's recent mood swings, caution is also a lot less likely to get you punched in the face.  \n\t\t\n        You type out a text, wishing Victor and Trish all the best of luck, and explaining that you'll do your best to find them before the end of the night. Minutes pass in silence, but you expected that, their privacy screens are still up.\n\t\t\n        Still, you have this feeling that they'll appreciate your concern. \n\t\t\n        You place your phone back in your pocket, patting yourself on the back for a job well done.\n        *goto reception_text_message_end\n\t    \n      *if (Sam > 45) #You wish Victor and Trish good luck, but send Sam something different.\n        *set Trish +medium\n        *set Victor +medium\n        *set Sam +medium\n\t    \n        You decide to go for it, it never hurts to be polite, but since Sam likely hasn't found a job yet, you decide to take a slightly different approach with him. \n\t\t\n        You type out a text, wishing Victor and Trish all the best of luck, and explaining that you'll do your best to find them before the end of the night. Minutes pass in silence, but you expected that, their privacy screens are still up.\n\t\t\n        Sam, you send an animated GIF of a cat yawning with the caption, \"I preferred the robots.\" Everyone loves cat GIFs, even when they're angry.  \n\t\t\n        You're about to put your phone away when you get a reply, [i]Ha! So did I. I'll catch up with you in a bit, OK?[/i]\n\t\t\n        You smile, glad you made someone's day a bit brighter.\n\t\t\n        You place your phone back in your pocket, patting yourself on the back for a job well done.\n        *goto reception_text_message_end\t\t\n\t\t\n      #You decide not to send any messages.\n\t  \n        You decide against it, you can always catch up with everyone later when you have more information. \n        *goto reception_text_message_end\n\n    *label reception_text_message_end\n    With that done, you continue to wait.\n    *goto reception_sam_talk\t\n\n  #You continue to stand around hoping to be approached.\n    *temp second_email false\n\t\t\t\n    You wait. \n\t\n    And wait. \n\t\n    And wait. \n\t\t\t\n    Founders from Ionick and Sensewerks and Orchid Biometrics walk past like you're a ghost.  \n\t\t\t\n    Maybe you are a ghost. Maybe you died back in the arena and this is what the afterlife is like, an endless parade of low level disappointment. \n\t\t\t\n    You take out your phone, checking your inbox, hoping against hope that there is an invitation waiting for one of the dozen or so after-parties where the more sociable Founders make their hires.\n\n    There isn't.\n\t\n    There are, however, four unread messages, and you figure you enough time to read two before you start looking pathetic. \n\t\n    Which do you look at first?\n\n    *label reception_email_start\n\n    *choice \n\n      *disable_reuse #[From - Mom] WE MISS YOU! \n\t  \n        You haven't heard from your parents in weeks, maybe a nice email from your mom can cheer you up, either that, or thrust you into an even deeper pit of depression. \n\t\t\n        There is only one way to find out, you open it.  \n\t\t\n        *page_break\n\t\t\n        [i]Hey ${name}![/i] \n\t\t\n        [i]I know you're probably busy riding motorcycles or falling out of planes or whatever, but I wanted to write to say how much dad and I miss you and love you and want you to come home SAFE![/i]\n\t\t\n        [i]I remember my Culling. Back then they got the whole thing over with in 5 days, can you imagine?[/i]\n\t\t\n        [i]I guess these days there are \"more people, fewer jobs and always more space on The Farm.\"[/i] \n\t\t\n        [i]I hate that saying.[/i] \n\t\t\n        [i]Ugh, I'm depressing myself.[/i] \n\t\t\n        [i]Anywho! How's Sam doing? He was always such a nice boy. I'm so glad you two get to do this together.[/i] \n\t\t\n        [i]Either way, I've taken up too much of your time already. I just hope everything is going well, and wanted to remind you that no matter what, we're here for you.[/i]\n\n        [i]XOXO[/i]\n        \n        *page_break\n\t\t\n        You probably have time to type up a quick response, what do you say?\n\t\t\n        *choice\n\t\t\n          #You're honest and tell her that you're afraid that you might not find a job.\n            *set ruthlessness -medium\n            *set culling_mom_wants_to_help true\n            *achieve alwayshonest\n\t\t\t\n\t\t    \n            No point in sugar-coating things. You send her message explaining that you're proud of your performance, but you think that you might have to try again next year.\n\n            You also tell her that Sam is good, but that the Culling has hit him harder than most. \t\t\t\n\t\t\t\n            The response is almost immediate.\n\t\t\t\n            [i]Don't worry one bit. We're ALWAYS proud of you, and we'll help you as much as we can. Call us as soon as you get a chance.[/i]\n\t\t\t\n            You hit send.\n\t\t\t\n            *page_break\n            \n            *if second_email = false\n              *set second_email true\n              You have time for one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\n\t\t\t  \t  \n\t\t\t\n          #You lie to her and tell her that everything is OK.\n            *set ruthlessness +medium\n\t\t\t\n            No point in worrying her. You explain that everything is just fine and that you'll be home soon. You say that you have a bunch of job prospects and that your Culling went perfectly.  \n\t\t\t\n            You also tell her that Sam is great, the same kind, gentle boy she remembers him being. \n\t\t\t\n            The response is almost immediate.\n\t\t\t\n            [i]That's so great to hear! We can't wait to see you again. Call us as soon as you can.[/i]\n\t\t\t\n            You hit send.\n\t\t\t\n            *page_break\n\t\t\t\n            *if second_email = false\n              *set second_email true\n              You have time for one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\n\t\t\t\n          #You don't bother to reply at all. \n\t\t  \n            You're not in the mood to explain your failures to your mother, you decide to talk to her later. \n\t\t\t\n            *if second_email = false\n              *set second_email true\n              You have time for one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\n\t\t\n      *disable_reuse #[From - hot_shot@thefarm.fc] Apply for an Early Extension\n\n        An email from a Farm Executive, this can't be good. You decide to open it.\n\t\t\n        *page_break\n\t\t\n        [i]Dear ${name},[/i]\n\t\t\n        [i]This message is to inform you that applications are now open for Conscription Extensions.[/i] \n\t\t\n        [i]As you might know, anyone failing to receive a job offer after their Culling is subject to a mandatory Unemployment Surcharge. This fee is due within 14 days of dismissal.[/i]\n\n        [i]Failure or inability to pay this fee will result in immediate, permanent conscription to The Farm system.[/i] \n\t\t\n        [i]Due to recent changes in legislation, we are now offering one day Conscription Extensions for qualified applicants. This Extension will give you an additional day to pay your Unemployment Surcharge.[/i]  \n\t\t\n        [i]If you are receiving this, you qualify for an extension.[/i]  \n\t\t\n        [i]Early application costs 100 chits. Reply to this email IMMEDIATELY to receive your extension. Remember, Extensions are limited, and we cannot guarantee they will be available to those who reply later.[/i]\n\t\t\n        [i]Cordially,[/i]\n\t\t\n        [i]Management[/i]\n\t\t\n        *page_break\n\t\t\n        How very nice of them. \n\t\t\n        How do you respond?\n\t\t\n        *choice\n          *if (wealth > 100) #You pay their fee, if you can't find a job, you'll need all the time you can get.\n            *set find_money_counter +small\n            *set wealth -small_cash\n            *set you_have_early_extension true\n\t\t\t\n            You send your response, agreeing to receive your Extension.\n\t\t\t\n            The reply is almost immediately.\n\t\t\t\n            [i]Thank you. Your payment has been processed and your extension is approved.[/i] \n\t\t\t\n            [i]Good luck! We're looking forward to having you as a member of The Farm family.[/i]\n\t\t\t\n            Well that's reassuring...\n\n            *if second_email = false\n              *set second_email true\n              You have time for one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\t\t\t\n\t\t\t\n          #You don't pay, you're going to find a job and The Farm doesn't deserve a dime.\n\t\t    \n            You delete the email. If The Farm wants your money, they're going to have to wait for it. \n\n            *if second_email = false\n              *set second_email true\n              You have time for one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\n\n\t\t\n      *disable_reuse #[From - recruiter@sansewrks.fc] Follow Up Interview Request \n\t  \n        This looks promising! You open it immediately. \n\t\t\n        *page_break\n\t  \n        [i]Dear Sir or Madame,[/i]\n\t  \n        [i]Have you just finished your Culling?[/i] \n\t  \n        [i]Are you ready to start an exciting career with unlimited potential for GROWTH?[/i] \n\t\t\n        [i]Do you have the WILL to make your mark on the world?[/i]\n\t  \n        [i]Then you should join Sansewrks!(1)[/i] \n\t  \n        [i]Here at Sansewrks, we believe that innovation and determination lead to GREATNESS, and that to realize your FULL POTENTIAL, all you need are the right TOOLS and OPPORTUNITIES.[/i]\n\t  \n        [i]Sansewrks provides those TOOLS![/i]\n\t  \n        [i]Sansewrks provides those OPPORTUNITIES![/i] \n\n        [i]Sansewrks can make you GREAT![/i]\t  \n\t  \n        *page_break\n\t  \n        [i]When you become a Sansewrks Associate Partner (SAP), you will gain access to world-class training and the team you'll need to SUCCEED![/i]\n\t  \n        [i]Some companies would charge thousands and thousands of chits for an OPPORTUNITY like this, but not Sansewrks! We believe that PEOPLE ARE MORE IMPORTANT THAN PROFITS.[/i] \n\n        [i]That's why if you reply to this email today, we will give you an opportunity to grasp your future and become the person you were meant to be for only 1200 chits![/i]\n\n        [i]This OPPORTUNITY won't be available for long, so act now![/i] \n\n        [i]Thank you![/i]\n\t\t\n        [i]Sansewrks Team[/i]\n\t  \n        [i](1) Sansewrks is an independent network marketing company that is in no way associated with Sensewerks Inc. Any similarity in name or branding is purely coincidental and does not represent a partnership or relationship of any kind.[/i]\n        \n        *page_break\n\t\t\n        You can't be certain, but you think that this [i]might[/i] be a scam. Then again, a job is a job, right? \n\t\t\n        What do you do?\n\t\t\n        *choice\n\n          #Immediately send them all of your money, there is no way you can pass up this opportunity.\n            *set wealth 0\n            *set you_are_a_sap true\n\t\t\t\n            *page_break\n\t\t\t\n            Scam? No way! This might just save you from The Farm!\n\t\t\t\n            You don't have 1200 chits, but you remember that the email said that Sansewrks \"believes in people, not profits.\" You hope that this philosophy extends to their membership fees. \n\t\t\n            You send a short note to that effect, transferring your entire account balance with it. \n\t\t\t\n            You receive a reply almost immediately.\n\n            *page_break\t\t\t\n\n            [i]Congratulations Sir or Madame![/i]\n\t\t\t\n            [i]You're a champ![/i] \n\t\t\t\n            [i]The kind of champ we're happy to have on our team![/i]\n            \n            [i]In the next few months we'll send you tons of USEFUL information about how YOU can ACHIEVE your POTENTIAL and MANIFEST your dreams NOW![/i]\n            \n            [i]Until then, I need to rap at you for a second, just to keep our legal beagles happy.[/i] \n\t\t\t\n            *page_break\n            *achieve youreasap\n\t\t\t\n            [i]Ahem.[/i]\n\t\t\t\n            [i]While being a SAP comes with a WORLD of benefits, currently, it is not strictly considered a job.[/i] \n\t\t\t\n            [i]As a result, additional employment is required in order to avoid conscription to The Farm.[/i]\n\t\t\t\n            [i]We know it's a bummer, but you can be sure that our lawyers are working hard to fix this! SAPs deserve to be recognized as what they are -- [/i] \n\t\t\t\n            [i]Winners.[/i] \n\t\t\t\n            [i]So, keep your chin up! Here at Sansewrks HQ, we know that YOU will find the perfect job to support your future as a SAP, and we'll be right there next to you when you do.[/i] \n\t\t\t\n            [i]Your Friend,[/i]\n\t\t\t\n            [i]SAP Team Greeter[/i]\n\t\t\t\n            *page_break\n \n            Huh. \n\t\t\t\n            You wanted to do something, so you did.  \n\t\t\t\n            That something might have been giving away all your money to some random email address, but that's your fault for not being specific!\n\t\t\t\n            At least you're a SAP now, that's something you can really be proud of. \n\n            *if second_email = false\n              *set second_email true\n              You have time for one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\n\n\t\t\t\n          #Delete the email and add Sansewrks to your SPAM filter. \n\t\t    \n            You delete the message and cringe, briefly wondering what Sensewrks legal department thinks of Sansewrks little disclaimer.\n\t\t\t\n            That was a waste a time, then again, right now you have nothing but time on your hands.\n\n            *if second_email = false\n              *set second_email true\n              You can look at one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\t\t\t\n\t\t\t\n\t    \n      *disable_reuse #[From - 2ndCulling@cmail.fc] **POTENTIAL SPAM** Failed your Culling? We can help!\n\t  \n        You're not certain you failed your Culling, but if you did, help is something you could use a lot more of. \n\t\t\n        You open the email.\n\n        *page_break\t\t\n\t\t\n        [i]Hey ${name},[/i]\n\t\t\n        [i]I'm going to keep this brief. If you're reading this, you probably failed your Culling.[/i] \n\t\t\n        [i]That sucks.[/i] \n\t\t\n        [i]Fortunately, if you manage to stay off The Farm, you have the opportunity to try again next year.[/i] \n\t\t\n        [i]Tha
