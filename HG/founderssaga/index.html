t's where we come in.[/i]\n\t\t\n        [i]We provide a comprehensive Culling training course, designed to help you improve your technical, business and combat skills.[/i] \n\t\t\n        [i]It takes only a few days to complete, and you can get the entire thing for 100 chits.[/i] \n\t\t\n        [i]Buy it or don't. I'm not here to twist your arm. What I will say is that you won't find a better deal anywhere else.[/i] \n\t\t\n        [i]Shoot me a line with your answer.[/i] \n\t\t\n        [i]All the best,[/i]\n\t\t\n        [i]Andy Sanders[/i]\n\t\t\n        [i]Account Manager, Advanced Learning Technologies[/i]\n\t\t\n        *page_break\n\t\t\n        100 chits is a lot of money, but if the course is any good at all, it's also a pretty decent deal. \n\t\t\n        What do you do?\n\t\t\n        *choice\n\t\t  \n          *selectable_if (wealth > 99) #Buy the course, every little bit helps. \n            *set wealth -small_cash\n            *set you_have_culling_course true\n\t\t\t\n            You send a response, along with 100 chits. \n\t\t\t\n            The reply is almost immediate. \n\t\t\t\n            *page_break\n\t\t\t\n            [i]Thanks for the quick follow up ${name}. As soon as I make it back home from this circus, I'll set you up with an account.[/i] \n\t\t\t\n            [i]By the way, the course really is pretty fantastic. I hope you enjoy it.[/i]\n\t\t\t\n            [i]Best,[/i]\n\t\t\t\n            [i]Andy[/i]\n\t\t\t\n            *page_break\n\t\t\t\n            You close out of the email. You have this feeling that Andy is telling the truth. \n\t\t\t\n            *if second_email = false\n              *set second_email true\n              You can look at one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n          #Delete the email, you'll do fine on your own. \n\t\t    \n            It might not be spam, but it's also not for you. You delete the email, deciding to save your money. \n\t\t\t\n            *if second_email = false\n              *set second_email true\n              You can look at one more email, what will it be?\n              *goto reception_email_start\n            *else\n              *goto reception_email_end\t\t\t\n\t    \n\t\n    *label reception_email_end\n\t\n    That's enough emails for now, it's time to get back to your real job, standing around looking depressed until they turn the lights off. \n\t\t\t\n    *goto reception_sam_talk\n      \n*label reception_sam_talk\n\n*page_break\n\nSam finds you standing by a table covered in the kinds of food that Founders like to pretend that they enjoy. You've decided that eating is your best bet, even if you can't find a job, at least you won't starve to death for a little while. \n\t\t\n\"You look awful.\" He says, lifting a toothpick from one of the trays, and placing what looks like cheese in his mouth.\n\t\t\nYou tell him that you feel worse. \n\t\t\n\"Can't say that I blame you.\" He picks up a plate, and packs it with as much food as it will hold. \n\t\t\nYou ask him whether he knows what happened to Victor and Trish, his face twists into a scowl, \"Victor got snapped up by Sensewerks almost as soon as he stepped in the room. Trish is talking to LampLight right now.\"\n\t\t\nSensewerks makes haptic sensors for video games. Their products also have some pretty cool medical applications. LampLight mostly does high-end computational and statistical analysis, the kind of mathy stuff that Trish loves. You've heard that one of their Founders is a little...difficult, but it shouldn't be anything she can't handle. \n\n\"It looks like it's just you and me,\" Sam picks from his plate, \"standing around here until they kick us out.\" He attempts a smile, but it collapses, \"this sucks...\"\n\t\t\nHow do you respond?\n\n*choice\n\n  #You tell him to be patient, there is still some time left. \n    *set Sam -medium\n\t\n    You try your best to cheer him up. There are still hours left in the event, and maybe the startups that want you are just busy...doing things. \n\t\t\t\n    \"If a company hasn't approached you in the first hour, it's because they aren't planning to.\" He takes a breath, \"No point in lying to ourselves on top of everything else.\"\n\t\t\t\n    Your optimism doesn't seem to have the desired effect. \n\t\n    *goto reception_cyan_approaches\n\t\n  #You tell him that it isn't fair, you both deserve jobs as much as anyone.\n    *set Sam +large\n\n    You agree that this sucks, that both of you worked hard and deserve jobs at least as much as Victor or Trish. \n\n    \"I couldn't agree more. We held that team together, and now we get hung out to dry. Typical.\" He grumbles into a glass of water. \n\n    You're not so sure you really held anything together, but the idea seems to have calmed Sam down, so you run with it.\n\n    *goto reception_cyan_approaches\t\n\t\t\t\n  #You ignore his complaining, you have other things to worry about. \n    *set Sam -xlarge\n\t\n    You let Sam rant for a few more minutes, staring at a point over his right shoulder. It's a little trick you picked up to make it seem like you're listening when you're doing anything but. \n\t\t\t\n    \"You know what I'm saying?\" He exhales, shoveling more food into his mouth. \n\t\t\t\n    Uh oh. \n\t\t\t\n    You have absolutely no idea what he's saying. \n\t\t\t\n    You stammer a response, but you're pretty sure that he knows you were ignoring him. \t\n  \n    *goto reception_cyan_approaches\n\t\n*label reception_cyan_approaches  \n\n*page_break\n\n\"I'll catch up with you later ${name}, I've got to go think...\"\n\nAfter filling his plate for a second time, Sam walks away, leaving you alone with the food and your thoughts. \n\t\t\nIt could be worse. \n\nNot having a job doesn't necessarily mean that you'll be conscripted to The Farm. As long as you can find some freelance work, and pay your mandatory Unemployment Surcharge, you can always try again next year. \n\t\t\nSure, freelance work is scarce and the entrance fee for a second Culling is three times higher than the first, but what's life if not filled with challenges?\n\nEither way, The Farm isn't all that bad, is it? A guaranteed job for life, right? And if you work hard, you might even be able to afford to eat...most weeks.\n\nYup! \n\t\t\nYou're totally screwed. \n\n*page_break\n\t\t\n\"${name}.\" A voice, dark and sonorous, catches you by surprise. It's neither male nor female, in fact, while quite beautiful -- its register isn't even entirely human. The voice is followed by a hand on your shoulder.\n\nHow do you react?\n\t\t\n*choice\n\n  #You spin, attempting to forcibly remove the hand.  \n  \n    Before your muscles can translate thought to action, you feel your legs slide out from under you. \n\t\n    You hit the ground, more gently than you have any right to. As you do, you hear the figure's voice. \n\t\n    *if combat > 12\n      *set Cyan +large\n\t  \n      \"Not bad, but I would appreciate it if you didn't try that again.\"\n      *goto cyan_post_strike\n\t\n    *else \n      *set Cyan -medium\n\t  \n      \"Would you mind not doing that again? We don't have nearly enough time to mess around.\"\n      *goto cyan_post_strike\t  \n\t\n    *label cyan_post_strike\n\t\n    After giving you a moment to contemplate your choices, it reaches out its hand, and helps you to your feet. \n\t\n    *goto cyan_introduction\n  \n  #You turn slowly, interested to see who is there.\n    *set Cyan +small  \n  \n    You turn, cautiously, looking for all available avenues of escape as you do. \n\t\n    Better safe than sorry. \n\t\n    \"Don't worry,\" It says in a voice you believe it finds comforting, \"I'm not going to hurt you.\" \n\t\n    When you finally see what's there, you're really not sure how much you believe it. \n\n    *goto cyan_introduction\n\t\n*label cyan_introduction\n*set knows_cyan true\n\t\n*page_break\n\nIn front of you is a shape, vaguely person-like, it's wearing a hooded shawl -- deep, luxurious blue and exquisitely tailored. It's covered from head to toe is a black, pin-stripped robe, so finely designed and cut that it seems more like a second skin than an article of clothing. \n\nThis person also lacks a face. Where a face would normally be, is a mask, stark-white and featureless. It's eyes glow a soft blue, matching the shawl perfectly. \n\nA Slowgun is strapped to each of its hips. \n\t\t\nYou can't believe what you're seeing. In front of you, as big as life, is a Veecee. \n\t\t\nIf Founders are dangerous, Veecee's are the nightmares that keep them awake. Veecee's invest in Founders, fund their businesses, and kill them mercilessly if they fail to turn a profit. \n\n*page_break\n\t\t\nIt's said that in order to become a Veecee, you have to win a dozen Slowgun battles to the death. Twelve times you kill a Founder, strip her of Equity and assets, keep the choicest cuts, and sell the bones to The Farm. \n\t\t\nAnd twelve is just the minimum, rumor has it that most Veecees have entire walls in their estates where they keep the Slowguns of fallen Founders as trophies. \n\t\t\nThese monsters have no face and no name, and are more highly trained in the Slowgun and the art of Negotiation than anyone alive. \n\t\t\nThis is the creature standing in front of you as you shovel a meatball into your mouth. \n\t\t\n\"You look awful.\" It says, taking a step back as you scramble to finish chewing. It reaches a gloved hand out, \"You can call me Cyan. I was hoping we might have a chance to talk, if you're not too busy, that is.\"\n\t\t\nHow do you respond?\n\n*choice \n\n  #You're cautious; Veecee's are dangerous, and are capable of making your day dramatically worse. \n    *set Cyan +medium\n\t\n    You reach back, tentatively, shaking its hand just long enough not to come off as a complete jerk.\n\t\t\t\n    Your eyes drift between it's mask and its weapons. You have this feeling than even as a non-Founder, immune to Slowguns, this creature could kill you five different ways by the time you realized what it was doing.  \n\t\t\t\n    After the greeting, you take a step back and wait. \n\t\t\t\n    A sound like laughter comes through the Veecee's voice modulator, maybe your terror has managed to charm it. \n\t\n    *goto cyan_post_introduction\n  \n  #You're polite; no point in wasting its time with hysterics. \n    *set Cyan +small\n\t\n    You're polite, almost casual, reaching your hand out and shaking enthusiastically.\n\t\t\t\n    If this creature wanted to hurt you, there is nothing you could do to stop it. In any case, at least this was more interesting than standing around worrying about The Farm.\n\t\t\t\n    You take a step back and wait to see what it does next. \n\t\t\t\n    The little you can tell from its body language seems positive enough. \t\n\t\n    *goto cyan_post_introduction\n  \n  #You stare, awestruck; maybe today is about to get better.\n    *set Cyan -medium\n\t\n    A Veecee is talking to you!\n\t\t\t\n    You can barely contain your enthusiasm. You grab its hand, shaking violently, completely ignoring the fact that this creature could probably have you killed. \n\t\t\t\n    Afterward, you step back, a thousand questions bubbling up at once.\n\t\t\t\n    Cyan takes a voice modulated breath, raising a finger to silence you. \n\n    You can't help but think you might have overdone it a little.\n\t\n    *goto cyan_post_introduction\n\n*label cyan_post_introduction\n\n\"No one is coming to talk to you tonight.\" Cyan says, motioning for you to follow it to a private booth on the other side of the reception hall.\n\n*page_break \n\t\t\nYou aren't surprised by this information, but you are surprised that a Veecee cared enough to notice how badly you failed. \n\t\t\nOn a whim, you ask it what it thinks you did wrong. \n\n*if ruthlessness \u003c 45\t\t\n  \"You're too nice, which isn't a bad thing, except when it slows you down. You were so focused on worrying about your team, that you forgot that hard decisions sometime need to be made.\" It points to a seat much nicer than any seat you've ever seen before. You slide into it.\n\n  *goto cyan_orders\n  \n*else\t\n  \"You're kind of a jerk. Anyone can tell that you care about your team, but you were so focused on impressing a pack of strangers, that you forgot where your true loyalties should be.\" It points to a seat much nicer than any seat you've ever seen before. You slide into it.\n  \n  *goto cyan_orders\n\n*label cyan_orders\nCyan motions to a waiter, whose face goes papery white as soon as he sees the mask. The Veecee orders two glasses of water, no food. This raises an important point, how do Veecees eat with those masks on? Do they even need to eat?\n\n*fake_choice\n\n  #Of course they do. That's a stupid question, I'm asking stupid questions now. Great.\n  \n    You know you're getting nervous when you think that a person in a mask suddenly loses the need to eat.\n\n    What was he saying about focus?\n  \n  #Maybe not. I mean, there is a lot of fancy tech in the world, and Veecees own most of it. \n\n    Between those crazy masks and all that training, for all you know, they get their nutrients from photosynthesis.\n\t\n    Now, what was it saying again? Something about focus?\n\t\t\t\n  #What am I doing? That's a ridiculous question, the Veecee probably hates me now.\n  \n    That focus thing, probably right. A Veecee is sitting across from you, and you're day dreaming. There are about fifty people in this room who would kill -- quite literally -- to be in your position. \n\t\t\t\n    Time to make the best of this. \n\t\n*page_break\n\nEventually, you stammer a response, explaining that you were trying your best to balance doing what was best for your team, with doing what was best for yourself. \n\t\t\n\"Well, you failed,\" Cyan begins, \"All you and that friend of yours,\" it must be talking about Sam, \"managed to 'balance' was mediocrity against indecision. Trust me ${name}, the room thinks you're more trouble than you're worth.\"\n\t\t\nThat...hurt. \n\nYou decide to ask Cyan what it thinks, bracing yourself for the response. \n\t\t\n\"I agree with the room, both of you are crap employees. Back when I was a Founder, I wouldn't have given you a second look.\" You watch it sip the water, it's a sort of magic trick, the liquid disappears but you aren't sure where it goes. \n\nWhat do you say?\n\n*choice\n\n  #You try to defend yourself, calmly explaining what you were trying to accomplish during the Culling.\n    *set Cyan -small\n  \n    When you try to speak, Cyan cuts you off, placing a gloved digit in front of its mask, \"Fortunately for you, I'm not a Founder anymore. You might be a crap employee, but you have talent, and you understand the importance of sacrifice. These are the qualities I look for in a Founder, the same qualities other Founders hate.\" It chuckles darkly, \"So what do you think, ever thought of starting a business of your own?\"\n\t\n    *goto cyan_post_bad_news\n  \n  #You get defensive, no one has the right to talk to you like that.\n    *set Cyan -small\n\t\n    When you try to speak, Cyan cuts you off, placing a gloved digit in front of its mask, \"Fortunately for you, I'm not a Founder anymore. You might be a crap employee, but you have talent, and you understand the importance of sacrifice. These are the qualities I look for in a Founder, the same qualities other Founders hate.\" It chuckles darkly, \"So what do you think, ever thought of starting a business of your own?\"\n\t\n    *goto cyan_post_bad_news\n  \n  #You remain silent, waiting to see where the Veecee is going with this.\n    *set Cyan +medium\n\t\n    You listen, silently, doing your best not to react to what was obviously an attempt to goad you. After a long moment, the Veecee continues, \"Fortunately for you, I'm not a Founder anymore. You might be a crap employee, but you have talent, and you understand the importance of sacrifice. These are the qualities I look for in a Founder, the same qualities other Founders hate.\" It chuckles darkly, \"So what do you think, ever thought of starting a business of your own?\"\n\n    *goto cyan_post_bad_news\t\n\n*label cyan_post_bad_news\n\t\nWell, what [i]do[/i] you think?\n\n*choice\n\t\n    #You tell it that you dream of becoming a Founder. \n      *set Cyan +medium\n\t\t\t\n      You explain that you've always hoped to become a Founder one day, that while you would be happy to work for a startup -- the thought of building something from scratch and defending it in Slowgun battles is the stuff your dreams are made of.\n\t\t\t\n      You finish by saying that you would be grateful for any advice it might have.\n\t  \n      *goto cyan_post_founder\n\t\t\t\n    #You tell it that you've never considered the option. \n      *set Cyan -medium\n\t\t\t\n      You explain that you never really saw yourself as a Founder, that you've always wanted to work for a startup -- to help build something from the inside and defend it in battle. \n\t\t\t\n      You finish by saying that while the idea of becoming a Founder has a certain allure, you would need more time to think about it.\n\t  \n      *goto cyan_post_founder\n\t\t\t\n    #You tell it that you think it's too dangerous, and would rather have a regular job. \n      *set Cyan -xlarge\n\t\t\t\n      You explain that becoming a Founder is too dangerous for you, that you don't want to risk your life over some Equity, and that most Founders end up dying in Negotiations before they ever have a chance to build anything at all. \n\t\t\t\n      You finish by saying that the life of a Founder is one you could never see for yourself.\n\n      *goto cyan_post_founder\t  \n\t\t\t\n    #You ask whether it's looking for a Founder to invest in. \n      *set Cyan +small\n\t  \t\n      You smirk, sipping at your water, and tell the Veecee that you would love to become a Founder, if it is interested in investing.\n\t\t\t\n      \"Getting a little ahead of yourself, don't you think?\" There is laughter in its voice. \n\t\t\t\n      Maybe you are, but maybe you aren't.\n\t  \n      *goto cyan_post_founder\n\t  \n*label cyan_post_founder\n\nThere is a long pause, too long, uncomfortably long before the Veecee starts again, \"The life of a Founder isn't right for everyone,\" it says, staring at you with those glowing blue eyes, \"but I think it's right for you. You and that friend of yours.\"\n\nDid you hear that right? \n\t\t\nWhere is it going with this?\n\t\t\n\"No one is hiring you today. Even the ones who might have, won't.\" \n\nYou ask why, you can feel the color draining out of your face. \n\n\"Because I told them not too.\" If a mask could smirk, \"You're smart, you're loyal, and you can be so much more than you are. If you let me, I want to help you realize some of that potential.\"\n\t\t\nRealize...potential? Did a Veecee just say you had potential? If you didn't know better, it sounds like Cyan wants to invest in the completely non-existent company that you don't really have. \n\nBefore you can stop yourself, you ask whether that's the case.  \n\t\t\nIt laughs.\n\n*page_break\n\n\"You're new to this,\" shaking its head, \"so I'll take it slow. Even if I was interested, I wouldn't tell you, that's bad for business. Even if I told you, right this second, I couldn't do anything about it. You aren't registered as a startup. You don't have a Slowgun. You're not a Founder. We can't Negotiate. So no deal can be made.\" It sees the light leave your eyes, \"Listen ${name}, I wouldn't be talking to you if I didn't think you had it in you, but before we can do anything about that, you need to decide whether you want to take the leap. Go home, think about what I've said, and talk to that friend of yours. When you've done that, when you've made your choice, I'll find you.\"\n\t\t\nYou nod, completely floored by what you're hearing. A few minutes ago you thought you were going to end up on The Farm, now a Veecee wants to get to know you better. \n\t\t\nWhile that could mean it plans to kill you during the Negotiation, you suspect that as long as you don't irritate it too much, you'll be fine.\n\nMaybe.\n\t\t\nAt least it's better than The Farm!\n\n*if Cyan > 15\n  *achieve impresstheveecee\n  *set you_impressed_cyan true\n  \n  \"Here's my number,\" your phone buzzes to notify you of the new contact information, \"You did pretty good out there ${name}.\" It pauses, considering this for a long moment, \"I'm not going to hold your hand, and I don't want to hear from you every time you get into a scrape, but I want you to know that I'm here to help. Don't be afraid to call.\"\n  \n  It places a gloved hand on your shoulder. For just an instant you can feel warmth radiating from it. You let the feeling linger even after it stiffens and leans back across the table.\n  \n  *goto cyan_reception_finale\n  \n*else  \n  \"Here's my number,\" your phone buzzes to notify you of the new contact information, \"if you need anything at all, give me a ring.\" It considers this for a long moment, \"Scratch that. If you need anything important, give me a ring. I'm not your concierge.\"\n\n  You don't know what a concierge is, but you suspect that Cyan is not one of them.\n  \n  *goto cyan_reception_finale\n  \n*label cyan_reception_finale\n\nQuiet passes between you then, the Veecee seems to be waiting on a response. \n\nWhat do you say?\n  \n*choice\n\n  #You thank it profusely, this is an amazing opportunity. \n    *set Cyan +small\n\t\n    You thank it, enthusiastically. Becoming a Founder is sounding like a better and better idea the more you think about it. \n    *goto cyan_leaves_reception\n\t\n  #You nod politely, you would much prefer a normal job, but knowing a Veecee can't be a bad thing.\n    *set Cyan +small\n\t\n    You thank it, cautiously. There is a lot still left to think about, but at least you have an option now. \n    *goto cyan_leaves_reception\n\t\n  #You shrug your shoulders, there is no way you're going to risk your life as a Founder. \n    *set Cyan -medium\n\t\n    You thank it, no point in being rude, but anyone can tell that you're not that interested in the offer.\n    *goto cyan_leaves_reception\n\t\n*label cyan_leaves_reception\n\nThe Veecee nods fractionally in response. \n\n*page_break\n\n\"OK. That's enough for one night.\" Having delivered its message, it stands. Cyan is about your height, but seems much taller -- tailored hoods and Slowguns will do that for a person. \n\t\t\nYou ask it if it plans to tell Sam what it told you. \n\t\t\n\"No, I don't.\" It shrugs its shoulders, \"I'm going home, I hate these things. You can tell him whatever you like.\" With that, it turns and walks away. \n\t\t\nNo one bothers it, no one even gets near it as it weaves its way through the halls. \n\t\t\nWell, that was something. \n\n*page_break\n\t\t\nYou look around for Sam, but he's nowhere to be found. Maybe his plan to stay until the lights went out feel apart when they ran out of food. You check your phone, it looks like he's in a taxi on his way back home. You'll have to wait to tell him what happened. \n\t\t\nYou need to tell someone though, and the rest of the gang is available. Who do you speak to?\n\n*choice\n\n  #You talk to Victor.\n    *set Victor +xlarge\n\t\n    You find Victor on the dance floor, an odd wooden square they've set up for the handful of Founders who like to dance. Currently, there are about a half-dozen people gyrating awkwardly on it, one of them is Victor, who is grinning from ear to ear, a cocktail in his hand. \n\t\t\t\n    He calls you over. \n\t\t\t\n    \"${name}!\" He gives you a high-five, \"I nailed it! You're looking at the new Senior Account Manager of Sensewerks's regional sales department.\" Even though there is almost no one here, the music is loud enough to warrant shouting.\n   \n    You congratulate Victor, who you realize might be a little more drunk than he's letting on. You put a hand on his shoulder to keep him from toppling over. \n\t\t\t\n    \"How did you make out?\" He smirks, finishing his cocktail in one, long gulp. \n\t\n    *page_break\n\t\n    First, you tell him that no one approached you, this seems to sober him up. He looks at you, grumbling --\n\t\t\t\n    \"You don't deserve that... You worked as hard as any of us. I'll talk to Lindsay,\" Lindsay was one of Sensewerk's Founders, you wonder when Victor started being on a first name basis with her, \"I'll get you set up.\"\n\t\t\t\n    You smile, knowing that nothing will come of it. After a few more moments of him being angry on your behalf, you tell him about Cyan. \n\t\t\t\n    \"You...met a Veecee?\" He seems incredulous, \"That doesn't happen.\"\n\t\t\t\n    You describe the scene from the beginning, it's only when you get to the part where Cyan basically calls you a loser that Victor starts to believe you. \n\t\t\t\n    \"I saw it wandering the hall, I thought it was here for a Negotiation -- get enough Founders in one place and there is bound to be a couple. But, you're saying, it was here for you...\" He smacks you on the shoulder, \"Lucky dog.\"\n\t\t\t\n    Victor smiles, then loses his balance, falling to the floor. \n\t\t\t\n    Whatever else you plan to tell him will have to wait for some other time.\n\n    *goto reception_end \t\n\t\n  #You talk to Trish\n    *set Trish +xlarge\n\t\n    Trish is sitting quietly in a restaurant near the back of the reception hall. She's talking to someone on the phone, but when she see's you, she waves you over. \n\t\t\t\n    \"Thanks mom. One of my team mates is here, I'll talk to you later.\"\n\t\t\t\n    She places the phone on the table and stands, giving you a quick hug. You both take a seat. You realize you haven't eaten anything but hors d'oeuvre all night, but it looks like Trish is just finishing up.\n\t\t\t\n    You ask her how her night went.\n\t\t\t\n    \"I got a job.\" She smiles, but you can tell there is something more to it. \n\t\t\t\n    You raise an eyebrow. \n\t\n    *page_break\n\t\n    She takes a breath, \"It's really not a big deal. I should feel lucky, I got an Analyst position at LampLight, it's a great opportunity.\" Her eyes narrow, \"I mean, the pay could be better, but the pay can always be better.\" \n\t\n    You tell her it sounds great and ask her what the problem is.\n\t\n    \"It's one of the Founders...\" She pauses, spending a lot more time choosing her words than she usually does, \"I don't know, he seems like a real jerk. All he did was talk about how much better we were than everyone else, and what losers all the people who couldn't find jobs were, and how they all deserved to be on The Farm.\" Her voice shook, \"It's not important, it's just that I report directly too him, and honestly he seems like a nightmare.\"\n\t\t\t\n    You try to make a joke, which falls flat. Then you mention that at least she found a job. Trish stares at you, suddenly embarrassed,\n\t\t\t\n    \"I'm so sorry ${name}. You see, that's what I mean! You're one of the best people I met during this thing, and if you didn't find a job...\" Her eyes flare, this is the Trish you remember, \"Don't worry, you can take your Culling again next year. By then I should have a little money saved up and I can help you pay for it. In the meantime, I'll help you study!\" The redness rises on her freckled face as she continues on like this.\n\t\t\t\n    You stop her after a few moments, and explain what happened with the Veecee.\n\t\t\t\n    \"Wait. You're telling me that a Veecee, the folks with the masks and the hoods, just walked up to you and told you to become a Founder?\"\n\t\t\t\n    You nod. \n\t\n    *page_break\n\t\n    \"That's absolutely incredible...You said yes, right?\" She's floored, few people have even seen a Veecee, let alone known anyone who has talked to one. \n\t\t\t\n    You explain that it told you to think it. Trish nods. \n\t\t\t\n    \"Well, you should do that. An opportunity like that...it's rare, and you'd be a fool not to take advantage of it.\" She smiles, a real smile this time, then her phone rings. \n\t\t\t\n    She looks to you, you feign disappointment and she chuckles. You tell her to take the call. \n\t\t\t\n    \"It's my dad. I probably should.\" She smirks. \n\t\t\t\n    You nod, stand and walk back into the reception hall. \n\t\t\t\n    *goto reception_end\n\t\n  *if (rachel_is_safe = true) #You talk to Rachel\n    *set ruthlessness -xlarge\n\t\n    Rachel is still in bed when you go to check on her. The nurse says that she'll be asleep for a while yet, but she tells you that she'll let Rachel know that you visited. \n\t\t\t\n    She also tells you that she saw what you did during the Culling, that a lot of people saw it, and that you should be proud of yourself. \n\n    \"Everyone is so worried about ending up on The Farm that they'll do anything to save their own skins. You took a stand out there. Even if no one else ever thanks you, thank you.\"\n\t\t\t\n    You smile and nod, while kind words won't get you a job or pay your rent, it's nice to know that someone else noticed. \n\t\t\t\n    You shake the nurses hand, turn and walk back into the reception hall.\n\n    *goto reception_end\t\n\t\n  #You talk to no one\n  \n    It's getting late, you'll catch up with your friends later. For now, it's time to go home.\n\t\n    *goto reception_end\n\n*label reception_end\n\nThe Culling ends with a speech from some Executive or another, reminding those who didn't find a job tonight about the mandatory Unemployment Surcharge that needs to be paid to avoid conscription to The Farm. \n\nYou think there is something not quite fair about having to pay for the privilege of not having a job. \n\n*page_break\n\nIn any case, you'll need to start looking for freelance work as soon as possible, if you can't find some money quickly, no Veecee in the world will be able to save you. \n\nSpeaking of money you don't have, the Executive also reminds everyone to visit the Founder's Kiosk before they leave. \n\n\"It's not just for Founders!\" Though the best stuff is, \"It's for anyone courageous enough to invest in their future! Everyone deserves to look better, to think better, to be better...\" He drones on like this for a while. \n\nYou check your chit balance and find that you have ${wealth}. \n\nWhat do you do?\n\n*choice\n  #You visit the Founder's Kiosk\n  \n    The Founder's Kiosk stands near to a private bar on the nicer side of the reception hall where Cyan had taken you earlier. \n\t\n    As you approach, a large, high-resolution monitor lights up, displaying your name along with a set of items that some algorithm or another has decided that people like you would be most interested in buying. \n\t\n    *label founders_kiosk_begin\n\t\n    What do you look at?\n\t\n    *choice\n\t  \n      *selectable_if ((wealth > 99) and (data_band = false)) #Sensewerks Data Band [Cost: 100 chits]\n\t  \n        [i]Sensewerk's classic, upgradeable Data Band is perfect for when you absolutely, positively need another computer strapped to your body.[/i] \n\t\t\n        [i]Useful for speeding up complex computing tasks (+1 Engineering), and looking pretty nice on your wrist (+1 Charisma).[/i] \n\t\t\n        *choice\n\t\t\n          #Buy for 100 chits.\n            *set wealth -small_cash\n            *set data_band true\n            *set engineering +small\n            *set charisma +small\n            *goto founders_kiosk_begin\n\t\t\t\n          #Go back.\n            *goto founders_kiosk_begin\n\t\t\n        *goto founders_kiosk_begin\n\t\t\n      *selectable_if ((wealth > 99) and (smart_eyes = false)) #Ionick eEyes [Cost: 100 chits]\n\t  \n        [i]Remember when contact lenses only improved your vision?[/i]\n\n        [i]Ionick's eEyes are upgradeable nanolenses that will give you rapid access to sports score, spreadsheets, business trend data (+1 Business Savvy), and predictive combat models (+1 Combat).[/i]\n\t\t\n        [i]They're everything you need to stay ahead of the curve.[/i]\n\t\t\n        *choice\n\t\t\n          #Buy for 100 chits.\n            *set wealth -small_cash\n            *set smart_eyes true\n            *set marketing +small\n            *set combat +small\n            *goto founders_kiosk_begin\n\t\t\t\n          #Go back.\n            *goto founders_kiosk_begin\n\t\t\n        *goto founders_kiosk_begin\n\t\t\n      *selectable_if ((wealth > 99) and (smart_cloths = false)) #Newscene CustomCloths [Cost: 100 chits]\n\t  \n        [i]Never buy a new pair of pants again. Using the latest in smartFabrics and tiny robots, Newscene's CustomCloths will give you all the comfort of buying from a boutique with none of the hassle.[/i]\n\t\t\n        [i]Need a new outfit? Just buy an upgrade.[/i] \n\t\t\n        [i]The basic CustomCloths set comes with twelve fashionable (+2 Charisma) outfits for almost any occasion.[/i]\n\n        *choice\n\t\t\n          #Buy for 100 chits.\n            *set wealth -small_cash\n            *set smart_cloths true\n            *set charisma +medium\n            *goto founders_kiosk_begin\n\t\t  \n          #Go back\n            *goto founders_kiosk_begin\n\t\t\t\n        *goto founders_kiosk_begin\n          \t\t\n\t\t\n      *selectable_if ((wealth > 99) and (smart_phone = false)) #FarmBrand Smart Phone [Cost: 100 chits]\n\t  \n        [i]A new phone that's better than your old phone. It's better, because we say so. Would we lie? You aren't calling us liars, are you?[/i]\n\t\t \n        [i]All of our phones are upgradeable and provide the latest processors (+1 Engineering) and access to a wealth of private FarmBrand information networks (+1 Business Savvy).[/i]\n\t\t\n        *choice\n\t\t \n          #Buy for 100 chits.\n            *set wealth -small_cash\n            *set smart_phone true\n            *set engineering +small\n            *set marketing +small\n            *goto founders_kiosk_begin\n\t\t\t \n          #Go back.\n            *goto founders_kiosk_begin\n\t\t\n        *goto founders_kiosk_begin\n\t\t\n      *selectable_if (you_have_kiosk_key = true) #See Founder's Options [Authorization Required]\n        *label founders_kiosk_extra_begin\n        Welcome Founder Lambert! Select an item to learn more.\n\n        *choice\n          *selectable_if (((wealth > 99) and (smart_cloths = true)) and (combat_threading = false)) #Combat Threading [Cost: 100 chits; Requires: CustomCloths]\n\t\t  \n            [i]Being a Founder can be complicated, and sometimes a good spear hand strike to the solar plexus is exactly what you need to move a Negotiation along.[/i] \n\t\t\t\n            [i]Newscene Combat Threading will make sure you're not caught unaware when someone starts a brawl at your next board meeting (+3 Combat, -1 Charisma).[/i]\n\t\t\t\n            *choice\n              #Buy for 100 chits.\n                *set wealth -small_cash\n                *set combat_threading true\n                *set combat +large\n                *set charisma -small\n                *goto founders_kiosk_extra_begin\n\t\t\t\t\n              #Go back.\n                *goto founders_kiosk_extra_begin\n\t\t\t\n          *selectable_if (((wealth > 199) and (smart_cloths = true)) and (rich_threading = false)) #Rich Threading [Cost: 200 chits; Requires: CustomCloths]\n\t\t  \n            [i]Newscene prides itself on creating fashion forward, casual attire, but sometimes what a Founder really needs to impress is to cover himself in a millimeter of pure gold.[/i]\n \n            [i]Newscene Rich Threading will give you this option, inlaying all your favorite outfits with a thin layer of precious or semi-precious metals, to show your rivals that your consumption is always conspicuous (+3 Charisma, -1 Combat).[/i] \n\t\t\t\n            *choice\n              #Buy for 200 chits.\n                *set wealth -medium_cash\n                *set rich_threading true\n                *set charisma +large\n                *set combat -small\n                *goto founders_kiosk_extra_begin\n\t\t\t\t\n              #Go back.\n                *goto founders_kiosk_extra_begin\n\t\t\t  \n          *selectable_if (((wealth > 99) and (smart_eyes = true)) and (predictive_reflexes = false)) #Predictive Reflexes [Cost: 100 chits; Requires: eEyes]\n\t\t  \n            [i]Never get caught flat footed! Ionick's Predictive Reflexes for Ionick's eEyes will help you navigate your next Slowgun battle with style and grace.[/i] \n\t\t\t\n            [i]Our custom daemon processes thousands of attack and defense patterns, ripped from classic Slowgun duels, to present you with the best angles of attack and cover locations based on your needs.[/i] \n\t\t\t\n            [i]This is the kind of edge that can save your Equity or even your life! Upgrade today (+2 Combat).[/i]\n\t\t\t\n            *choice\n              #Buy for 100 chits.\n                *set wealth -small_cash\n                *set predictive_reflexes true\n                *set combat +medium\n                *goto founders_kiosk_extra_begin\n\t\t\t\t\n              #Go back.\n                *goto founders_kiosk_extra_begin\n\t\t\t  \n          *selectable_if (((wealth > 99) and (smart_eyes = true)) and (knowhow = false)) #KnowHow [Cost: 100 chits; Requires eEyes]\n\t\t  \n            [i]Ever find yourself staring blankly into space as someone asks you a question about the latest innovations in biotech or your opinions on Baroque artwork? With KnowHow, you'll never face this embarrassment again.[/i]\n\t\t\t\n            [i]Our custom daemon will scour the Internet for clever answers to these kinds of questions and present them in an easy to plagiarize overlay on your Ionick eEyes, to use at your leisure.[/i] \n\t\t\t\n            [i]Upgrade today and never feel the pain of ignorance again! (+2 Business Savvy)[/i]\n\t\t\t\n            *choice\n              #Buy for 100 chits.\n                *set wealth -small_cash\n                *set knowhow true\n                *set marketing +medium\n                *goto founders_kiosk_extra_begin\n\t\t\t\t\n              #Go back.\n                *goto founders_kiosk_extra_begin\n\t\t\t  \n          *selectable_if (((wealth > 99) and (data_band = true)) and (quantum_coprocessor = false)) #Quantum Coprocessor [Cost: 100 chits; Requires: Data Band]\n\t\t  \n            [i]We would explain this to you, but you probably wouldn't understand. The point is that it makes our Data Bands even faster, allowing you to do whatever it is that you do even better.[/i] \n\t\t\t\n            [i]Try it out today! (+2 Engineering)[/i]\n\t\t\t\n            *choice\n              #Buy for 100 chits.\n                *set wealth -small_cash\n                *set quantum_coprocessor true\n                *set engineering +medium\n                *goto founders_kiosk_extra_begin\n\t\t\t\t\n              #Go back.\n                *goto founders_kiosk_extra_begin\t\t\t  \n\t\t\t\n          *selectable_if (((wealth > 99) and (data_band = true)) and (striking_casing = false)) #Striking Casing [Cost: 100 chits; Requires: Data Band]\n\t\t  \n            [i]Just what it says on the box. This is a much, much prettier case for your Sensewerks Data Band. You'll look better, feel better, and people will like you more.[/i] \n\t\t\t\n            [i]You should buy one today. (+2 Charisma)[/i]\n\t\t\t\n            *choice \n              #Buy for 100 chits.\n                *set wealth -small_cash\n                *set striking_casing true\n                *set charisma +medium\n                *goto founders_kiosk_extra_begin\n\t\t\t\t\n              #Go back.\n                *goto founders_kiosk_extra_begin\n\t\t\t\n          *selectable_if (((wealth > 299) and (smart_phone = true)) and (risky_groundhog = false)) #OS Upgrade \"Risky Groundhog\" [Cost: 300 chits; Requires: Smart Phone] \t\t \n            \n            [i]They told us we couldn't charge for every, single little update we made to our phones. They said that people wouldn't willingly pay for tiny, confusing changes to the way that their perfectly functional pocket computers worked.[/i] \n\t\t\t\n            [i]Well, you know what? We say that they're pretty stupid! Now, let's prove them wrong![/i]\n\n            [i]Buy \"Risky Groundhog,\" it's better! We promise. (Unknown Upgrade)[/i]\n\n            *choice\n              #Buy for 300 chits.\n                *set wealth -300\n                *set risky_groundhog true\n                *set engineering +medium\n                *set marketing +medium\n                *set combat +medium\n\t\t\t\t\n                When you look at your phone, you find that it is working better, much better. (+2 Engineering, +2 Business Savvy, +2 Combat)\n\t\t\t\t\n                *goto founders_kiosk_extra_begin\n\t\t\t\t\n              #Go back.\t\n                *goto founders_kiosk_extra_begin\t\t\t  \n\t\t\t\n          #Go back\n            *goto founders_kiosk_begin\n\t\t\t\n        *goto founders_kiosk_begin\n\t  \n      #You're finished shopping. \n        *goto first_scene_over\n\t\n  #You go straight home.\n    *goto first_scene_over\n\t\t\n*label first_scene_over\n\nIt's been a long night, and you have a lot to think about, so after making one last check of the reception hall for free food you might want to pack away for the Winter, you ask your phone to call a car to take you home.\n\n*finish\n", "thefarm": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*comment SCENE TWO: Escaping the Farm\n\nThe next few days are a blur. \n\nAfter the car brings you back to the dormitory that you've lived in for the last few weeks, you're greeted by a hard looking woman standing at the front desk.\n\n\"Your plane is leaving at 6AM, if you miss it, you'll be responsible for purchasing your own return ticket.\" She hands you a portfolio filled with papers, \"Here are your documents.\" She clears her throat, \"Congratulations on completing your Culling, we hope that you found your experience with us rewarding.\" \n\nYou don't know how many times she has said that tonight, but by the dead look in her eyes, you're pretty sure that this was not the last. You nod and take your papers, your phone sets an alarm -- not that it really matters -- it's already 1AM, you won't be sleeping tonight.\n\n*page_break\n\nIt's an eighteen hour flight back to your real home. Not because you live eighteen hours away, at least you don't think you do, but because The Farm doesn't like people knowing exactly where the Culling is held, so your itinerary is a mess of transfers and delays that take you half-way across the world before spitting you out again.\n\nThe planes are emptier than you remember them. This is partially because people like Trish and Victor, people with decent jobs, have their transportation paid for by their startups. The other reason is that the injured or the dead, people like Rachel, fly separately. \n\nYou frown and you keep frowning for a long time, but that's not all you did, how do you remember spending your time?\n\n*choice\n  *if (you_have_culling_course = true) #You listened to your Culling Course.\n    *set marketing +medium\n    *set engineering +medium\n    *set combat +medium\n\n    *page_break\n\t\n    That's right, you decided to listen to the training course you purchased at the reception. \n\n    Andy was true to his word, when you checked your phone, you found that you had access to hours and hours worth of audio, video, and text documents -- detailing everything from how to assemble a surveillance drone from items found in a hotel room, to close quarter combat techniques. \n\n    More than just being informative, it was a lot of fun. \n\n    Andy said it would take a couple of days to complete, but you managed to make it through everything by the time you made final approach.\n\n    Time well spent if you do say so yourself. \n\n    *goto scene_two_youre_home\n\t\n  #You spoke with the people seated near to you.  \n\n    *page_break\n\t\n    When trapped in a giant steel box for the better part of a day, it's best to learn a little something about the other people trapped with you, at least that's what you decided. \n\n    The plane was mostly filled with folks like yourself, Culling graduates who managed to survive but didn't manage to find jobs. \n\n    Your talks revolved around how unfair The Farm system is, and how to find freelance work -- the usual fare for a group of people terrified that in less than two weeks they might be conscripted. \n\n    One conversation stood out, it was with a woman with short, blond hair and soft, green eyes -- on a leg of the flight that took you somewhere between Central America and Maine.\n\t\n    *page_break\n\n    \"You met a Veecee? No way.\" She said, still sipping at the six ounces of orange juice the attendant had left her thirty minutes previous.\n\n    You tell the entire story, including the part where Cyan called you a waste of space.  \n\n    \"Sounds like a Veecee alright,\" she frowns an odd little frown, \"they think that just because they have the Equity, they can roll over anyone who gets in their way. They're almost as bad as the Executives if you ask me.\" She smiles, \"But you didn't ask me. I'm sorry. That's very exciting, I'm really happy for you.\"\n\n    You could tell there was something she was not saying, how did you respond?\n\n    *choice\n      *selectable_if (Cyan \u003c 10) #You agreed with her, Veecee's are at least as bad as Executives.\n        *set you_know_alyssa_mallory true\n        *achieve goodlistener\n        *page_break\n\t\t\n        The fact is Cyan was pretty awful to you. While you're sure some part of it was an act, you still felt like you deserved more. Exactly why you felt that, you're not sure, but so what! Talking a little smack about the masked weirdos would make the woman feel better, so you dove right in. \n  \n        After a few minutes of ranting about Veecee egos, the woman perked up, extending her hand from her cramped seat and shaking yours. You remember her name was Alyssa, and you remember her story.\n  \n        \"My partner, she used to have a startup...you know?\" She pauses, taking a breath, \"Nothing fancy, just this boutique bakery, 'custom cookies delivered to your door.'\" Her voice cracked around the edges, \"The Veecee she found called itself Cobalt. It said that it loved the idea, loved it enough to ask for 70% Equity upfront.\"  \n  \n        *page_break\n\t\t\n        70% Equity? That sounded...painful. You told her as much.\n  \n        \"It wasn't so bad. She didn't fight. Victoria was never great with a Slowgun. She never even came close to passing her Culling. She never cared about that stuff. She was so convinced that she could make it as a Founder, that she just...\" Alyssa's eyes glittered, \"Anyway. Everything was fine for a while, but the chits just weren't coming in fast enough. It was partially Victoria's fault, she didn't want to expand, she just wanted to bake good cookies. Cobalt told her to take on a Partner, but she didn't have enough Equity left to convince anyone to join.\" \n  \n        You watched her talk, her face was tight, her lips pursed.\n\t\t\n        *page_break\n  \n        \"About a year passed. By that time, she had lost another 10% in Slowgun battles. It doesn't sound like much, but when you have that little Equity, it hurts -- physically hurts -- each bullet is like being hit in the chest by a fast ball. The gun is warning you that if you don't fix this soon, well...\" We both knew what that final bullet felt like, \"She knew it was only a matter of time before some rival bakery showed up to take the rest. She didn't have enough employees to survive the raid if they did, and she refused to challenge a weaker Founder to a duel just to buy herself another chance. She was trapped.\"\n  \n        Her eyes were locked on yours, you lowered your head, she continued.\n  \n        \"It was in May of that year when Cobalt turned up. It had sent a warning, but she hadn't even bothered to prepare. As soon as it stepped into the garage, it gave her Terms and started firing. She didn't stand a chance. It took the last of her Equity, stripped down everything of value, and sold it off to The Farm. It probably still lost money on the deal. We buried Victoria a week before my Culling started.\"\n\n        *page_break\n\t\t\n        Alyssa wasn't crying, but her face was red and puffy. She took another breath, letting the color drain out again. \n  \n        \"Thanks for listening to me ${name}. Just know I didn't tell you that so you would start hating Veecees. I hate them, but that's my problem. Honestly, Victoria knew what she was getting into, she knew that things were going bad, but she just couldn't admit to herself that she wasn't cut out to be a Founder. It was her mistake, the only reason I told you any of that is so you don't make the same one.\" \n  \n        She placed a hand on your shoulder and squeezed. You couldn't think of anything to say.  \n  \n        \"I can't do anything to help you become a great Founder. I can't even tell you that it's a good idea to go through with it. What I can say is that if you do decide to take the leap, and you're ever looking for a garage, head over to Crystal Heights and tell them that Alyssa Mallory sent you. They're a bit stuffy and can be a real pain in the butt to newcomers, but they've got the best equipment, and if you mention my name they'll be a little nicer to you.\n  \n        How did you respond?\n\t\t\n        *choice\n          #You offered to buy her a drink.\n            \n            *page_break\n            \n            She laughed, finishing her orange juice. \n\t\n            \"Thanks but no thanks. I told you that entire thing sober, who knows what I'd get into drunk?\" She smirked, \"Have a good flight ${name}, I'm going to take a nap.\"\n\n            Afterward, she turned away from you, curled up in her seat and fell asleep.\n  \n            You don't remember too much more, until you hit the runway. \n\t\t\t\n            *goto scene_two_youre_home  \n\t\n          #You gave her a quick, awkward hug from your seat.\n\t\t  \n            *page_break\n\t\t\t\n            She laughed, the remains of her orange juice almost spilling into the aisles. \n\t\n            \"You're sweet ${name}, don't lose that. Now, I'm going to go to sleep before I bother you with anymore of my secrets. Have a good flight!\"\n\t\n            Afterward, she turned away from you, curled up in her seat and fell asleep. \t\n\n            You don't remember too much more, until you hit the runway. \n\t\t\t\n            *goto scene_two_youre_home\t\t\t\n\t\t\t \n          #You thanked her and went to sleep.\n\t\t  \n            *page_break\n\t\t\t\n            She smiled softly as you told her that you were tired. \n\t\n            \"Sleep well friend and good luck!\"\n\t\t\t\n            You don't remember too much more, until you hit the runway. \n\t\t\t\n            *goto scene_two_youre_home\n  \n      *selectable_if (ruthlessness \u003c 45) #You asked her if everything was OK, you were genuinely concerned.\n        *set you_know_alyssa_mallory true\n        *achieve goodlistener\n\t\t\n        *page_break\n\t\t\n        You realized that this woman was in pain and decided to ask her, as gently as you could, what was wrong. \n  \n        \"Nothings wrong.\" She shook her head, \"It's just a story you're not interested in hearing.\"\n  \n        You told her that you were very interested in hearing it.\n\n        \"Don't say I didn't warn you.\" She smiled again, extending her hand from her cramped seat and shaking yours. You remember her introducing herself as Alyssa, and you remember her story. \n\n        \"My partner, she used to have a startup...you know?\" She pauses, taking a breath, \"Nothing fancy, just this boutique bakery, 'custom cookies delivered to your door.'\" Her voice cracked around the edges, \"The Veecee she found called itself Cobalt. It said that it loved the idea, loved it enough to ask for 70% Equity upfront.\"  \n\t\t\n        *page_break\n  \n        70% Equity? That sounded...painful. You told her as much.\n  \n        \"It wasn't so bad. She didn't fight. Victoria was never great with a Slowgun. She never even came close to passing her Culling. She never cared about that stuff. She was so convinced that she could make it as a Founder, that she just...\" Alyssa's eyes glittered, \"Anyway. Everything was fine for a while, but the chits just weren't coming in fast enough. It was partially Victoria's fault, she didn't want to expand, she just wanted to bake good cookies. Cobalt told her to take on a Partner, but she didn't have enough Equity left to convince anyone to join.\" \n  \n        You watched her talk, her face was tight, her lips pursed.\n  \n        *page_break\n  \n        \"About a year passed. By that time, she had lost another 10% in Slowgun battles. It doesn't sound like much, but when you have that little Equity, it hurts -- physically hurts -- each bullet is like being hit in the chest by a fast ball. The gun is warning you that if you don't fix this soon, well...\" We both knew what that final bullet felt like, \"She realized it was only a matter of time before some rival bakery showed up to take the rest. She didn't have enough employees to survive the raid if they did, and she refused to challenge a weaker Founder just to buy herself another chance. She was trapped.\"\n  \n        Her eyes were locked on yours, you lowered your head, she continued.\n  \n        \"It was in May of that year when Cobalt turned up. It had sent a warning, but she hadn't even bothered to prepare. As soon as it stepped into the garage, it gave her Terms and started firing. She didn't stand a chance. It took the last of her Equity, stripped down everything of value, and sold it off to The Farm. It probably still lost money on the deal. We buried Victoria a week before my Culling started.\"\n  \n        *page_break\n\t\t\n        Alyssa wasn't crying, but her face was red and puffy. She took another breath, letting the color drain out again. \n  \n        \"Thanks for listening to me ${name}. Just know I didn't tell you that so you would start hating Veecees. I hate them, but that's my problem. Honestly, Victoria knew what she was getting into, she knew that things were going bad, but she just couldn't admit to herself that she wasn't cut out to be a Founder. It was her mistake, the only reason I told you any of that is so you don't make the same one.\" \n  \n        She placed a hand on your shoulder and squeezed. You couldn't think of anything to say.  \n  \n        \"I can't do anything to help you become a great Founder. I can't even tell you that it's a good idea to go through with it. What I can say is that if you do decide to take the leap, and you're ever looking for a garage, head over to Crystal Heights and tell them that Alyssa Mallory sent you. They're a bit stuffy and can be a real pain in the butt to newcomers, but they've got the best equipment, and if you mention my name they'll be a little nicer to you.\n  \n        How did you respond?\n\t\t\n        *choice\n          #You offered to buy her a drink.\n\t\t \n            *page_break\n\t\t\t\n            She laughed, finishing her orange juice. \n\t\n            \"Thanks but no thanks. I told you that entire thing sober, who knows what I'd get into drunk?\" She smirked, \"Have a good flight ${name}, I'm going to take a nap.\"\n\n            Afterward, she turned away from you, curled up in her seat and fell asleep. \n\t\n            You don't remember too much more, until you hit the runway.\n\n            *goto scene_two_youre_home\t\t\t\n\t\n          #You gave her a quick, awkward hug from your seat.\n\n            *page_break\n\t\t\t\n            She laughed, the remains of her orange juice almost spilling into the aisles. \n\t\n            \"You're sweet ${name}, don't lose that. Now, I'm going to go to sleep before I bother you with anymore of my secrets. Have a good flight!\"\n\t\n            Afterward, she turned away from you, curled up in her seat and fell asleep. \n\t\n            You don't remember too much more, until you hit the runway.\n\n            *goto scene_two_youre_home\n\t\n          #You thanked her and went to sleep.\n\t\t  \n            *page_break\n\t\t\t\n            She smiled softly as you told her that you were tired. \n\t\n            \"Sleep well friend and good luck!\"  \n\n            You don't remember too much more, until you hit the runway. \n\t\t\t\n            *goto scene_two_youre_home\n\t\t  \n      #You smirked, giving her a knowing look, you'd charm the story out of her.\n\t  \n        *page_break\n\t\t\n        You did your best to charm her, but she wasn't buying any of it. She watched you first with suspicion, and then with a mix of amusement and pity. \n  \n        \"OK, OK! If you don't stop it I'm going to wet myself!\" She laughed, which was not exactly the reaction you were going for. \n  \n        You asked her what she was saying about the Veecees. She said she honestly didn't remember. You decided to let it go. \n  \n        You don't remember too much after that, until you hit the runway. \n\t\t\n        *goto scene_two_youre_home\n  \n      #You let it go, moving on with the conversation.\n\n        *page_break\n\t\t\n        You told her it was OK, she nodded and moved on.  \n  \n        \"So what do you plan on doing now?\" Her tone casual, whatever she was thinking about, lost forever in a sea of freelance tips. \n\n        You don't remember too much after that, until you hit the runway.\n\n        *goto scene_two_youre_home\n\n  #You read a book.\n  \n    *page_break\n\t\n    You hadn't had a chance to read in ages, so you decided to take the opportunity to catch up. \n\n    Unfortunately, your dedicated reading device fell out of the back of a semi-truck, during your escape from an \"enhanced interrogation\" early in the Culling. All you had on you on the plane was your phone.\n\n    Not the best tool for the job, but you made due. \n\n    Which book did you choose to read? \n\n    *choice\n\t\n      #Everyone's a Charmer: 20 Ways to Become a More Confident Speaker\n        *set charisma +small\n\t  \n        *page_break\n\t\t\n        This had been sitting in your \"unread\" folder for about a year. \n   \n        It took most of the flight to finish it, not because it was any good, but because every five pages you had to stop and look up another piece of jargon. \n   \n        It did contain a lot of stuff that [i]seemed[/i] like it might work, but there was a lot more of it that no sense whatsoever, and a disturbingly large number of pages devoted to, \"grabbing the Lion by its tail.\" \n   \n        You had no idea who the \"Lion\" was supposed to be, and what its tail was meant to represent. \n   \n        You spent the rest of your flight trying to figure that out.\n\t\t\n        *goto scene_two_youre_home\n      \n      #Find Cover: A Beginners Guide to Slowgun Battles and Negotiations\n        *set combat +medium\n\t\t\n        *page_break\n\t\t\n        You had been meaning to read the book for months, and you decided that if you were truly thinking about becoming a Founder, now was the time to do it.\n\n        While it took most of the flight to finish, you were extremely pleased with how it turned out. \n\n        Not only did it go into the mechanics of Slowgun duels, how to use cover, and how to Negotiate under pressure -- it also gave a wealth of tips for designing Terms, stopping duels before they began, and strategies for recovering Equity after it had been lost. \n\n        All in all, you were happy with the read, and spent the rest of the flight thinking of ways to practice your new skills. \n\t\t\n        *goto scene_two_youre_home\n\t\t\n      #This Must End: How the Farm System is Destroying Society\n        *set ruthlessness -medium\n\t\t\n        *page_break\n\t\t\n        Trish gave you the book about a week back, and you promised her that you would read it. You decided that an 18 hour flight across the planet was as good a time as any.\n\n        You didn't finish it until the plane was making final approach. \n\n        It went into detail about how nearly 30% of all working age adults have been conscripted to The Farm, and how that number continues to grow. It deconstructed the horrible working conditions, the lack of career development, and the nonexistent retirement benefits that Farm employees suffer under. \n   \n        As you neared the end, you couldn't help but think back to all the Farm employees you met during Culling, and how dead they looked, how broken. \n\n        As you landed, you weren't sure if there was anything you could actually do to help, but you knew that if the opportunity arose, you would. \t\t\n   \n        *goto scene_two_youre_home\n\t\t\n  #You slept.   \n  \n    *page_break\n\t\n    You honestly don't remember anything after leaving the runway and before the end of the flight. \n\n    It had been weeks since you had been able to just sit down, without someone threatening to beat your skull in with a tire iron, or forcing you to disarm a satellite death laser. \n\n    As much as you would like to say that you were productive, the truth is that you spent most of the flight spectacularly unconscious. \n\n    You woke up as you were making final approach.\n    \n    *goto scene_two_youre_home\n\n*label scene_two_youre_home\n\nA couple cab rides later and you were home. \n\nAs you walked up to your apartment, you were greeted by a letter taped to your doorway. \n\n*page_break\n\n[i]\"Greetings ${name},[/i]\n\n[i]We are sorry to hear that you were unable to find a job.[/i] \n\n[i]That sucks.[/i] \n\n[i]But don't you worry Tiger, there is always next year's Culling![/i] \n\n[i]In the meantime, remember, your Unemployment Surcharge of 3500 chits is due in 14 days. If not received by the end of that period, we are empowered to take action against you, including but not limited to conscription.[/i] \n\n[i]We know that this can be a difficult time for some, and as such we have made one day Extensions available to qualified applicants. Please call us for more information.[/i] \n\n[i]Thank you![/i]\n\n[i]Farm Outreach Team\"[/i]\n\n*page_break\n\nYou weren't surprised. You weren't even that angry. You carefully removed the notice from the door, shrugged your shoulders, and stepped inside your tiny studio apartment. It was late, you were tired, and with everything that's happened this last month, you figured it would be simple to care of this in the morning. \n\nNo big deal. \n\n*page_break\n*set wealth +medium_cash\n*temp money_needed (3500-wealth)\n\nBig deal! Very big deal!\n\nYour alarm goes off at 6AM. \n\nYou look at your calendar, how did you let things get like this? You don't know, but what you do know, is that you have ${find_money_counter} days left before your Surcharge comes due, and exactly ${wealth} chits to your name. \n\nApparently, looking for freelance work right after a Culling, is a bit harder than you expected it to be. \n\nYou wonder how Sam is doing. After you told him about Cyan, he seemed uncharacteristically happy, then stopped returning your calls. You haven't heard from him since then, but you decide that he must be fine, or he would have reached out to you by now. \n\nEither way, you have more pressing matters to worry about, like how you're going to avoid being conscripted. \n\nWith sleeping and crying off the table as options, you decide that the only thing left to do, is to ask your friends and family for help. \n\nYou take out your phone. You can do one thing a day, which leaves you with ${find_money_counter} chances to earn ${money_needed} chits. \n\nSo what's first?  \n\n*label scene_two_freelance\n\n[i][You have time to do ${find_money_counter} more things.][/i]\n\n*choice\n  *disable_reuse *selectable_if (Trish > 24) #You call Trish looking for work. \n    \n    *page_break\n\t\n    The phone rings twice. \n\t\n    \"${name}! Is that you? I thought you died, I haven't heard a word from you since the Culling! How's it going?\"\n\t\n    It's not going well. You've had more doors, real and virtual, slammed in your face in the last week than the rest of your life combined. You're tired. You try to explain this to Trish without coming off as pathetic. \n\t\n    \"Oh ${name}, that's ... really horrible, now that you mention it,\" she pauses, her voice lowering to a whisper, \"but I think I might be able to help you out. Why don't you meet me at the office?\"\n\t\n    Trish has always been resourceful, but she can also be overzealous when she's trying to help. You need a lot of money, very quickly, and you have little room for error. What do you say to her offer? \n\t\n    *choice \n\t\n      #You thank her and agree to meet, you trust Trish and know she'll pull through.\n        *set Trish +medium\n        *set find_money_counter -small\n\t\t\n        You thank her, maybe more than you actually need to. She sounds a little embarrassed when she starts speaking again. \n\t  \n        \"Come on ${name}, stop that, I haven't even told you my plan.\"\n\t  \n        She's right, she hasn't, and considering how much time you have left, that's not very comforting. \n\t  \n        She senses your anxiety.\n\t\t\n        \"You aren't getting cold feet now, are you? Don't worry so much ${name}, just wait for me at the front desk, and I'll meet you with a visitor pass.\" \n\t  \n        Without a lot of other options, you decide to do just that, as soon as you hang up, you call for a car. \n\t    \n        *goto trish_scene_begin\n\t\t\n      #You ask her how she plans to help, you don't have time to waste.\n        *set find_money_counter -small\n\t  \n        \"Don't you trust me ${name}?\" She pauses, \"Don't answer that. Seriously though, I have exactly zero time to explain this to you. If you want to do this, come to the front desk, and I'll meet you there with a visitor pass.\"\n\n        Without a lot of other options, you decide to do just that, as soon as you hang up, you call for a car.\t\n\t  \n        *goto trish_scene_begin\n\t\t\n      #You politely decline her offer.\n        \t  \n        It's not that you don't trust Trish, it's just that you aren't convinced that she can help you earn a giant pile of chits in time to avoid The Farm.\n\t  \n        You thank her, telling her that you'll check back as soon as you have this figured out. \n\t  \n        \"You better ${name}. I worry about you.\" She sounds a little disappointed. \n\t  \n        With that done, you hang up. It's time to decide on your next move.\t  \n\n        *goto scene_two_freelance\n\t    \n\t\t\n    *label trish_scene_begin\n    \n    *page_break\n\t\n    LampLight is located on the 30th floor of a highrise, smack in the middle of downtown. The car drops you off in front of the building, when the driver hears that you're less than a week away from conscription, he decides to waive your fee.\n\t\n    \"You need it more than me buddy...\" \n\t\n    You thank him and step through the glass doors into the lobby. \n\t\n    A door guard meets your eyes as you enter, his yellow jumpsuit tells you that he's employed by The Farm, but works in this building. You give him your name, and he points to a bank of elevators. Your phone buzzes once as you're granted the credentials needed to use them. \n\t\n    The ride up is uneventful, and when the doors open you're greeted by a nervous looking man wearing a pin-striped suit. \n\t\n    \"Who are you?\" He almost spits the words. \n\t\n    You tell him your name.\n\t\n    \"${name}. Right. I don't know you. You're not one of ours. Why are you here?\" He's tapping his side, that's when you notice he's wearing a Slowgun. \n\t\n    Great. A Founder. \n\t\n    What do you say?\n\t\n    *choice\n\t\n      #You tell the truth, letting him know you're here to see Trish.\n\t    \n        \"Trish?\" He is either thinking it over, or checking his eEyes, you can't really tell, \"Oh yea, her.\" He seems immediately annoyed, \"She hasn't even been here a month, and she's already bringing strangers into the building?\" He glares at you, \"Not even useful looking strangers.\" Then pauses, \"You should leave...\"\n\t\t\n        How do you handle this?\n\t\t\n        *choice\n\t\t\n          *selectable_if (charisma > 16) #You try to charm him into letting you stay.\n            *set charisma +small\n\t\t  \n            *page_break\n\t\t\t\n            As he's about to continue insulting you, you ask him where he had his suit made.\n\t\t  \n            \"Oh, this?\" A trace of a smile creeps across his face, \"Hong Kong. I was on a trip there, shoring up our overseas relationships, you know how it is?\" You didn't, but you nodded anyway, \"Well, while I was there, I stopped by the nicest little tailor. Brilliant, isn't it?\"\n\t\t  \n            You agree, pointing out the elegant yet tasteful stitching, as well as how nicely it hangs on his shoulders. \n\t\t  \n            \"${name}, is it? You have a good eye. We need more people with good eyes around here. You can stay. Put up a tent for all I care!\" He slaps you hard on your shoulder, before pushing past you into the elevator. \n\t\t  \n            That was...weird. \n\t\t\t\n            *goto trish_scene_meeting\n\t\t  \n          *selectable_if (engineering > 20) #You use your programming talent to prove that you're here to make him money.\n            *set engineering +small\n\t\t\t\n            *page_break\n\t\t\t\n            As he's about to continue insulting you, you pull out your phone. Luck would have it, LampLight was one of the startups you had wanted to join, so much so that you had written some sample code for the interview.   \n\t\t  \n            It isn't anything groundbreaking, but the algorithm should be enough to convince him that you know your way around a compiler. \n\t\t  \n            The man yanks the phone out of your hand and looks at it. You can tell he's recording every line with his eEyes. \n\t\t  \n            \"Huh. Not bad. You're here to freelance?\" \n\t\t  \n            You nod. \n\t\t  \n            \"Great. Just don't break anything.\" He shrugs his shoulders, tosses your phone back, and pushes his way to the elevator.\n\t\t  \n            That was...weird. \t\t    \n\t\t  \n            *goto trish_scene_meeting\n\t\t\t\n          #You turn tail and run before you get Trish in anymore trouble.\t \n            \n            *page_break\n\t\t\t\n            You try to stammer a response, but your words are garbled and unconvincing. The way he's looking at you, you're pretty sure he's getting ready to call security. \n\t\t  \n            You start sweating, then notice you're sweating, then back into the elevator in a vain attempt to keep him from seeing you sweat. \n\t\t  \n            As you hit the button that will take you back to the lobby, you realize that you probably stole his elevator.\n\t\t  \n            Small victories. \n\t\t  \n            As soon as the door opens, you send Trish a text message warning her that her boss kicked you out, and then walk out of the building into the open air.\n\t\t  \n            That worked out poorly...            \t\t\t\n\t  \n            The rest of your afternoon is spent wallowing in self-pity, and you decide to go to bed early.\n\t\t\t\n            *if (find_money_counter = 0)\n              *goto scene_two_freelance_end\n            *else\n              You wake up at 6 AM to your alarm. \n\t\t\t \n              What's your next move? \n\t\t\t \n              *goto scene_two_freelance\n\t\t\t\n\t\t\t\n      #You lie to him, telling him that The Farm sent you over to do some temp work. \n        *if (ruthlessness > 57)\n          *set lie_count +small\n\t\t  \n          *page_break\n\t\t  \n          You remember the Farm guard from downstairs. Maybe LampLight contracts coders from them as well? It's worth a try. \n\t\t\n          You clear your throat and explain that The Farm sent you over to do some temp work, and that you'll be leaving at the end of the afternoon.\n\t\t\n          \"Is that right?\" The words leave his mouth almost before you finish, his face arcs into a frown, you don't think he's buying this. \n\t\t\n          You steel yourself. It was right, at least as far as he was concerned! You tell him again, a bit more confidently. \n\t\t  \n          *page_break\n\t\t  \n          He watches your lips move, then places a hand on your shoulder, eyes burning into yours, \"You wouldn't lie to me, would you?\"\n\t\t\n          You most certainly would lie to him, but you can't say that, so you do what any good Farm employee would and start stammering. \n\t\t\n          \"Huh.\" He relaxes, \"You must be from The Farm, either that or you're an idiot.\" He shrugs his shoulders, \"Same thing really...\" Then sighs, \"OK. I've wasted enough time with you. I'm going to go do something productive, try not to break anything.\"\n\n          Without another word, he pushes past you into the elevator. \n\n          *goto trish_scene_meeting\t\t  \n\t\t\n        *else\n\n          *page_break\n\t\t  \n          You remember the Farm guard from downstairs. Maybe LampLight contracts coders from them as well? It's worth a shot. \n\t\t\n          You clear your throat and explain that The Farm sent you over to do some temp work, and that you'll be leaving at the end of the afternoon.\n\t\t\n          \"Is that right?\" The words leave his mouth almost before you finish, his face arcs into a frown, you don't think he's buying this. \n\t\t\n          You steel yourself. It was right, at least as far as he was concerned! You tell him again, a bit more confidently. \n\t\t\n          *page_break\n\t\t  \n          He watches your lips move, then places a hand on your shoulder, eyes burning into yours, \"You're lying to me, and you're doing it badly, which is even more insulting.\"\n\t\t\n          You start to stammer, trying to recover, sweat pouring down your face. \n\t\t  \n          \"Just leave, will you? Before I have to get security to throw you out.\"\n\n          Without another word, he pushes past you into the elevator.  \n\t\t\n          You decide to take his advice. \n\t\t  \n          As you leave, you send Trish a text message warning her that her boss kicked you out, and then walk out of the building into the open air.\n\t\t  \n          That worked out poorly...            \t\t\t\n\t  \n          The rest of your afternoon is spent wallowing in self-pity, and you decide to go to bed early.\n\t\t  \n          *page_break\n\t\t  \n          *if (find_money_counter = 0)\n            *goto scene_two_freelance_end\n          *else\n             You wake up at 6 AM to your alarm. \n\t\t\t \n             What's your next move? \n\t\t\t \n             *goto scene_two_freelance\n\t\t\t \n\t\t\n    *label trish_scene_meeting\n    \n    *page_break\n\t\n    True to her word, Trish meets you at the front desk with a hug and a small, plastic card with your name, picture, and Culling ID on it.\n\n    She's wearing a surprisingly attractive collared shirt, and a freshly pressed pair of slacks, both probably CustomCloths. You don't think you've ever seen Trish this dressed up. \n\n    She also looks paler than you remember, tired... \t\n\t\n    You tell her what happened at the elevator.\n\n    \"Sounds like Darren alright.\" She shakes her head, looking at you more carefully than before, \"Are you alright?\"\n\n    What do you say?\n\t\n    *choice\n\t\n      #You tell her that you're fine.\n        *set Trish +small\n\t    \n        *page_break\n\t\t\n        \"Darren... is a big jerk. Everyone knows it, but they're just too afraid to say it to his face.\" \n\t\t\n        You can't help but believe that \"everyone\" includes her, and that she's not too proud of that fact.  \n\t\t\n        \"Don't let him bother you, it's not worth it.\" She places a hand on your shoulder. \n\t  \n        As rough around the edges as Trish can be, she's still one of your favorite people. You nod and ask her about the plan. \n\t  \n        \"Oh, that. I think it would be easier if I just showed you. Let's go!\"\n\t  \n        She grabs you by the arm and drags you into the office.\n\t\t\n        *goto trish_scene_the_job\n\t\t\n      #You tell her that you just want to get this over with.\n        *set Trish -small\n\n        *page_break\n\t\t\n        \"Good to see you too ${name}, sorry I asked.\" She plays it off as a joke, but you can tell she's a little hurt.\n\t  \n        You apologize and she shrugs her shoulders. \n\t  \n        \"No, you're probably right. We need to stay focused. Let me show you where you'll be working today.\" \n\t  \n        She leads you past security into the office. \t\t\n\t\t\n        *goto trish_scene_the_job\n\t\t\n      #You hug Trish and thank her for doing this for you. \n        *set Trish +medium\t  \n\n        *page_break\n\t\t\n        You hug her tightly. You've missed Trish, and considering everything that's happened over the last few days, it's nice to see a friendly face. \n\t  \n        \"It's really good to see you ${name}.\" Her eyes brightens, she looks a lot happier than when you first walked in the door. \n\t  \n        You nod, asking her what the plan is. \n\t  \n        \"Oh, that. I think it would be easier if I just showed you. Let's go!\"\n\t  \n        She grabs you by the arm and drags you into the office.\n        \n        *goto trish_scene_the_job\n\t\t\t\t\n    *label trish_scene_the_job\n\t\n    *page_break \n\t\n    LampLight's offices are, in a word, depressing. \n\t\n    The room is a shrine to grays and blacks, and while the desks are laid out at weird angles, covered in kitsch, and just screaming, \"we're a hip, awesome startup that you want to work for.\" The entire place comes off like a morgue. No wonder Trish looks so tired. \n\t\n    The people, however, are friendly. They greet Trish with high-fives and hugs, and greet you with pleasant smiles. \n\t\n    You amble over to Trish's desk, which is covered with a kind of art made entirely out of old electronics soldered together in odd arrangements. Once there, she taps a few buttons on her computer, which alerts the room that an impromptu meeting has been called. Within a minute, four or five engineers are gathered around to hear her speak. \n\t\n    \"Hey guys! This is ${name}. ${pronoun_c}'s pretty much a genius.\" \n\t\n    As much as you like compliments, you're not so sure you like where this is going.\n\t\n    *page_break\n\t\n    \"${pronoun_c}'s here to solve our little problem.\"\n\t\n    A tall man with caramel skin and short-cropped hair speaks up.\n\t\n    \"Well that's great, but ${pronoun} better hurry, it's only getting worse. The client sent over another terabyte of data this morning.\"\n\t\n    That's a lot of data... \n\t\n    \"Oh, he will.\" She smirks, \"But firs
