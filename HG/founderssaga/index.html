\n            You start stretching out, casually, waiting for the fight to begin. You're so distracted that you don't realize the green haired woman is still staring at you. \n\t  \n            She points in your direction, then towards the crowd, then lets out a sigh designed to be heard by everyone in the room.\n\n            You realize that you'd forgotten your introduction, the most important part of M4! You turn towards the crowd, trying desperately to come up with something clever, but by now they only look bored. After a moment you give up, shrugging your shoulders and turning back to Eggcitement. \n\n            *goto m4_fight_round_one\n\t\t  \n          #You decide to work the crowd, trying your best to pump them up. \n            *temp offense (combat + small)\n            *temp defense (charisma + medium)\n            *temp enemy_defense 18\n            *temp enemy_offense 14\n\t\t  \n            *page_break\n\t\t\t\n            You realize that you had almost forgotten your introduction, the most important part of M4! You whip around, and point the mock Slowguns on your belt buckle towards them. With a wink, you begin \"shooting\" the audience, one after another. \n\n            They're losing their minds as you start firing at them with your fingers next, giving each a precious moment of personal attention before moving on to the next. \n\t  \n            Eventually, you feel the green haired woman's hand on your shoulder. \n\t  \n            \"Save some of that for the fight.\" She says, turning you around to face Eggcitement.\n\t\t\t\n            *goto m4_fight_round_one\n\t  \n        *label m4_fight_round_one\n\t\t\n        *page_break\n\t\t\n        \"Are you ready!\" She screams, dashing towards the audience with more energy than she has mustered all afternoon, \"Good, because that means I can leave! Fight on!\" With that, she jogs towards the door and disappears.  \n\t\n        The match has officially begun. \n\t\n        Eggcitement glares at you, smiling under fading yellow face paint. It looks like he's going to give you the first move, what do you do?\n\t\t\n        [In this game your offensive power is based on your \"combat\" + modifiers. Your defensive power is based on \"charisma\" + modifiers. You win if your offensive power is better than your opponent's defensive power when you throw your Murderpunch.\n\t\t\n        You lose if your opponent throws a Murderpunch and their offensive power is greater than your defensive power.\n\t\t\n        Current offense: ${offense}\n\t\t\n        Current defense: ${defense}]\n\t\t\n        *choice\n          #Murderpunch [attempt to win, small defense penalty if it fails]\n\t\t    \n            *page_break\n\t\t\t\n            You decide to end this quickly, relying entirely on your combat skills to bring you through. \n\t  \n            You dash towards your opponent and throw a punch. \n\t\t\t\n            *if (offense > enemy_defense)\n              *set wealth +1500\n              *goto m4_fight_win\n            *else\n              *set defense -medium\n\t\t\t  \n              Unfortunately, it's not enough. \n\t\t\t  \n              *goto m4_fight_round_two\n\t\t\t  \n  \t\t\t\n          #Scream [small offense boost]\n            *page_break\n\t\t\t\n            You scream at the top of your lungs. It might sound silly, but you actually feel a bit stronger. \n\t\t\t\n            *if (charisma > 16)\n              *set offense +medium\n              *goto m4_fight_round_two\n            *else \n              *set offense +small\n              *goto m4_fight_round_two  \n\n\t\t\t\n\t\t\t\n          #Pump up the Crowd [small defense boost]\n            *page_break\n\t\t\t\n            You turn towards the crowd and stomp your feet, they do the same, matching your speed. The entire arena is shaking. Eggcitement looks considerably more distracted. \n\n            *if (charisma > 16)\n              *set defense +medium\n              *goto m4_fight_round_two\n            *else\n              *set defense +small\n              *goto m4_fight_round_two\n\t\t\t\t\t    \n          #Taunt [cause opponent to Murderpunch, large offense boost if miss]\n            *page_break\n\t\t\t\n            You point to Eggcitement, then do a chicken dance. He frowns, stepping towards you much faster than you would suspect a man in a chicken costume could, and throws a punch. \n\t\t  \n            *if (defense > enemy_offense)\n              *set offense +xlarge\n\t\t\t  \n              You only barely dodge out of the way, you're certain that if that had hit you, you would be leaving here on a stretcher.\n\t\t\t  \n              *goto m4_fight_round_two\n\t  \n            *else \n              *set wealth +500\n              *goto m4_fight_lose\n\t\t\t   \n        *label m4_fight_round_two  \n        *set enemy_offense +medium\n\t\t\n        Eggcitement screams, clucking and hooting and flapping wings that don't exist. You aren't sure how he has managed to make this display look formidable, but he's doing it. \n\t\n        He looks like he's preparing for a Murderpunch!\n\t\n        Before that though, it's your turn. \t\t\n\t\t\n        [You have two more rounds\n\t\t\n        Current offense: ${offense}\n\t\t\n        Current defense: ${defense}]\n\t\t\n        *choice\n          #Murderpunch [attempt to win, small defense penalty if it fails]\n\n            *page_break\n\t\t\t\n            The best way to stop someone from punching you in the face, is to punch them in the face. You step in as quickly as you can and launch your Murderpunch! \n\t\t\t\n            *if (offense > enemy_defense)\n              *set wealth +1500\n              *goto m4_fight_win\n            *else\n              *set defense -medium\n\t\t\t  \n              Unfortunately, it's not enough. \n\t\t\t  \n              *goto m4_fight_round_three          \n       \t\t  \n          #Scream [small offense boost]\n\n            *page_break\n\t\t\t\n            You e seen better,\" it's the green haired woman, who is sitting to your left, jotting something down on her clipboard, \"but I've seen worse. Thanks for coming out kid.\"\n\t\n        With that, she stands you up and leads you towards the door. \n\n        When you finally leave the studio, you check your phone and realize you're 500 chits richer.\n\n        *page_break\t\t\n\t\n        The rest of the afternoon disappears in a blur.\n\t\t\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n          You wake up to your alarm at 9:45 AM. \n  \n          It's time to decide how you're going to spend your day.     \n\t   \n          *goto scene_two_freelance\t\t\n\t\t\n\t\t\n\t\t\n      #You decide to look for something else.\n        *page_break\n\t\t\n        You like your brain exactly where it is, and you're pretty certain that M4 is a lot more fun on television, where you aren't being beaten to death. \n  \n        Oh well.\n  \n        You close down your computer, and decide to look elsewhere. \t    \n  \n        *goto scene_two_freelance\n\t\t\n  *disable_reuse *selectable_if (you_have_early_extension = false) #You attempt to get more time.\n    \n    *page_break\n  \n    You're running out of time.\n  \n    You need more time! \n  \n    Wait. Maybe there is a way to get more time. \n  \n    You remember hearing about the one day extensions The Farm offers to qualified losers like yourself. You have no idea what it takes to \"qualify,\" but you figure it's worth a shot.   \n  \n    You pick up the phone and dial the number.\n  \n    \"Good morning sir or madame, you have reached the office of Conscription Extension. We understand that personal responsibility can be difficult, so we offer qualified Culling under-performers a one day fee extension.\"\n\n    *page_break\n  \n    \"To find out if you're eligible, just answer the next three questions as honestly as possible. Decisions are instantaneous and completely immutable!\" \n  \n    \"Remember, by now we have your Culling ID, so honesty is not only suggested, but required if you want any help from us. Ha. Ha. Ha. Don't worry, this will be fun!\"\n  \n    You have serious doubts about that last part, but you decide to play along anyway. \n  \n    \"First question, tell us about your job prospects. What is your strongest skill or most substantial job opportunity?\"  \n  \n    *choice\n      *selectable_if (engineering > 20) #You tell them that you're an excellent Engineer.\n\n        *page_break\n\t\t\n        \"Good. Building things is useful, and you appear to be quite good at it. Moving on.\"\n\t\t\n        *goto getting_more_time_second\n\t\t\n      *selectable_if (marketing > 20) #You tell them about your Business Savvy.\n\t   \n        *page_break\n\t   \n        \"Good. Things need to be sold, and you appear to be able to sell them. Moving on.\"\t\n\n        *goto getting_more_time_second\n\t\t\n      *selectable_if (combat > 18) #You tell them about your Combat training.\n\t  \n        *page_break\n\t\t\n        \"Good. Sometimes things need to be hit, repeatedly with heavy objects. You seem like the sort of person capable of doing that. Moving on.\"\n\t\t\n        *goto getting_more_time_second\n\t\t\n      *selectable_if (you_are_a_sap = true) #You tell them that you're a SAP.\n\t  \n        *page_break\n\t\t\n        \"While we question your common sense, after a series of legal battles, we are obligated to recognize Sansewrks as a legitimate freelance employer. Moving on.\"\t\t\n\t  \n        *goto getting_more_time_second\n\t\t\n      #You tell them that you have no skills worth discussing. \n\t    \n        *page_break\n\t\t\n        \"The depths of your mediocrity are known to us. Thank you for your honesty. Moving on.\"\t\n\n        *goto getting_more_time_second\t\t\n\t\t\n    *label getting_more_time_second  \n\t\n    \"Second question, is there anyone, with a job, we could call as a reference? We do this so that welcome.\"\n\t\n        The phone clicks. \t\t\n\t  \n        *goto getting_more_time_end\n\t  \n    *label getting_more_time_end\n\t\n    *page_break\n\t\n    You're not entirely certain whether you were talking to a recording, an AI, or a real person. In any case, you have your time and you plan on spending it wisely. \n  \n    What's your next move?\n\t\n    *goto scene_two_freelance\n\t\n  #You take a break to work on your skills. \n    *set marketing +small\n    *set engineering +small\n    *set combat +small\n    *set find_money_counter -small\n    *achieve timetokill\n\t\n    Just because you're about to be forcibly recruited into an evil mega-corporation, doesn't mean that you should neglect yourself!\n\n    You spend the day soldering, reading about the latest business trends, and practicing your stun baton technique. \t\n\t\n    *if (find_money_counter = 0)\n      *goto scene_two_freelance_end\n    *else\n      You wake up at your alarm at 8:17 AM.\n\t   \n      It's time to decide how you're going to spend your day.\n\t   \n      *goto scene_two_freelance\n\t\n*label scene_two_freelance_end\n\n*page_break\n\nYou remember a time when waking up brought new, exciting possibilities. These days, it just brings you one step closer to a yellow jumpsuit. \n\nAs you roll out of bed, your phone buzzes violently. When you look at it, you see a morning marked in dark red, with a disturbingly adorable skull icon emblazoned in the center. Then you realize, today is the day your Unemployment Surcharge is due, and The Farm will be here any minute to collect.\n\nThere is a knock at your door. \n\nWhat do you do?\n\n*fake_choice\n  #You try to escape through the back, caution is the better part of valor.\n    *page_break\n\t\n    You dash around your room, wondering why you hadn't prepared for this ahead of time. If you had, you would have realized that your apartment is on the sixth floor, and the fire escape looks like it hasn't been maintained for the better of a century. \n\n    As much as you dislike the idea of facing down The Farm, you can't imagine that breaking your neck will make it any more palatable. \n\n    \"${name}, are you in there? It's me you idiot, now open up.\" \n\n    You pause, mid-way between searching for trapped doors and wishing yourself invisible. You recognize that voice, it's Sam.  \n\t\n  #You look for your stun baton, you can never be too careful.\n    *page_break\n\t\n    It's not that you plan on assaulting anyone, you just want to give yourself options. \n\n    You walk to your closet, taking out the shoebox sized, chrome box where you keep the stun baton from your Culling. You open it, removing the weapon from it's case, appreciating the healthy weight of it, wondering how likely it is that you would be able to survive a fight with The Farm.\n\n    You've heard of people trying, but the stories never turn out well. Then again, The Farm tells most of the stories.\n    \n    *page_break\n\t\n    You click the baton into it's [i]on[/i] position, waiting for the satisfying crackle you've grown so used to over the Culling, but there is only silence. You try again and again, silence. Then you look at the small, digital display on the handle, and realize you had forgotten to charge it after getting home. \n\n    Great.\n\n    \"${name}, are you in there? It's me you idiot, now open up.\" \n\n    You pause, mid-way between searching for trapped doors and wishing yourself invisible. You recognize that voice, it's Sam. \t\n  \n  #You go to the door and open it, you're going to meet this head on.\n    *page_break \n\n    You take a deep breath and walk towards the front of your apartment, trying to decide how you're going to handle the next few minutes. \n\n    It doesn't seem fair that The Farm has this kind of power, but what can you do about it?\n\n    When you arrive at the door, you call out, in your most confident, booming tone, \"Who is it?\"\n\n    \"It's me you idiot, now open up.\"\n\n    You recognize that voice, it's Sam.     \t\n\t\n*page_break\n  \n\"We're going to be Founders!\" It's the first thing he says, after calling you an idiot, and before saying hello, \"Aren't you excited?\"\n\nYou would be if you had any idea what he was talking about, you tell him as much.\n\n\"You and I are going to start a business. It's a brilliant idea, don't you think?\" Sam's face is almost as red as his hair. \n\nYou ask him how he managed to pay his Unemployment Surcharge, considering how hard you've been working over the last few weeks, you can't imagine it's been any easier on him.\n\n\"Never mind that!\" His eyes go glassy for a moment, then he's back, beet-faced, \"We're going to be Founders, real Founders with Slowguns and Equity and...\" He pauses, gaze meeting yours, waiting for some sign that you understand, \"This is what you want, right?\" \n\nWhat do you say?\n  \n*choice\n  #You tell him that of course it is. \n    *set Sam +medium\n\t\n    *page_break\n\t  \n    He's ready to launch into an argument, but when you agree, his face softens.\n  \n    \"Do you really mean that ${name}...seriously?\"\n  \n    You nod. You've been thinking about it for a while now, and maybe becoming a Founder won't be half bad. It's better than having to worry about Conscription every month. \n  \n    \"I'm so, so glad you said that.\" He smiles a sneaky, little smile, \"Then I guess I made the right decision after all.\"\n  \n    You stare at him, asking what decision he's talking about.\n\n    \"Nothing anyone wouldn't have done in our situation.\"\n\n    You let him know that isn't an answer. He takes a deep breath.\t \n\n    *goto scene_two_farm_arrives\n\t  \t  \n  #You tell him that you aren't sure.\n    *set Sam +small\n\t  \n    *page_break\n\t  \n    \"I get that. I really do.\" His voice is strained, \"it's just that...\"  \n\n    He looks at you, then at the floor. You ask him what's wrong. \n\n    \"Nothing's wrong! Why does something have to be wrong? I'm just excited, alright? Can't a guy be excited about going into business with his best friend?\" \n\n    You tell him that you would be more excited if you had some time to think. \n\n    \"Some time? You've had weeks to think! You just don't get it, do you? It's not every day that a Veecee comes around and tells us it wants us to become Founders. I'm just doing what anyone else would have.\"\n\n    You don't bother to correct the flaws in that last sentence, instead you ask him exactly what he's \"doing.\"\n  \n    \"Don't you trust me ${name}?\"\n\n    You let him know that isn't an answer. He takes a deep breath. \n\t  \n    *goto scene_two_farm_arrives\n\t\n  #You ask him why he didn't talk to you about this first. \n    *set Sam -medium\n\t  \n    *page_break\n\t  \n    \"I am talking to you! I'm talking to you right now!\" Sam snaps, angrier than you might have expected given what seemed like a reasonable question. \n\n    You ask him what's wrong, his face softens, but you can tell he's still angry. \n\n    \"I'm sorry, but I mean, what kind of question is that? You come to me and tell me that you met a Veecee, and that it wants us to become Founders, how else am I going to interpret that?\"\n\n    What did Sam [i]do[/i] with this interpretation? You ask him. \n\n    \"Nothing anyone wouldn't have done in our situation.\"\n\n    You let him know that isn't an answer. He takes a deep breath.\t  \n\t  \n    *goto scene_two_farm_arrives\n\t\n*label scene_two_farm_arrives\t\n  \n*page_break\n  \n\"I didn't pay The Farm, alright? If we're going to be Founders, what's the point? I didn't pay them, and I'm not going to pay them.\" \n\nClearly Sam has gone insane, when The Farm shows up at his door and finds out that he has skipped out on them, there is no telling what they'll do. \n\nActually, there is telling, and that's the problem -- especially because he's standing in your living room.\n\nThe doorbell rings. This time, you know exactly who it is. \n\nSam looks at you, you can tell he wants to run, but he wants your permission to do it, what do you say?\n\nWhat do you say?  \n    \n*choice\n  #You tell him to hide, that you'll handle this.\n    *set Sam +large\n    *set ruthlessness -medium\n\t  \n    You motion for him to hide. Your apartment is small, so it won't be much of a rouse, but at least it will buy you a few minutes to think.\n\n    He places a hand on your shoulder, whispering the words, \"thank you.\" Afterward, he runs off towards your bedroom, locking the door behind him.\n\t  \n    Whatever comes next, you're on your own.\t \n\t  \n    *goto scene_two_farm_enters \n\t  \n  #You tell him to stay, that you'll need his help.\n    *set Sam -large\n    *set ruthlessness +medium\n    *set sam_is_here true\n\t  \n    You scowl, motioning for him to stay put. There is no way you're going to face down The Farm alone, especially not when this is his fault to begin with. \n \n    At first he looks angry, then he looks resigned, finally he just stands there -- blank faced -- his hands in his pockets. \n \n    Whatever comes next, at least you have Sam by your side. \t \n\n    *goto scene_two_farm_enters\t  \n\t  \n  #You ask him what he wants to do.\n     \n    *if (Sam > 47)\n      *set Sam +large\n      *set ruthlessness -medium\n      *set sam_is_here true\n\t\t\n      \"What I want to do is run,\" he pauses, looking towards the floor, \"but I can't do that to you.\" He doesn't sound entirely convinced.\n  \n      You tell him that he can go hide if he wants.\n  \n      \"No, I can't.\" He grumbles, sticking his hands in his pockets.  \n  \n      Whatever comes next, at least you have Sam by your side. \t\n\n      *goto scene_two_farm_enters\t\t\n\t\t\n    *else\n      *set Sam +large\n      *set ruthlessness -medium\n\t\t\n      \"What I want to do is run.\" He pauses, waiting for your response.\n  \n      Of course.\n\t\t\n      You tell him that he can go hide if he wants. \n  \n      He places a hand on your shoulder, whispering the words, \"thank you.\" Afterward, he runs off towards your bedroom, locking the door behind him.\n\n      Whatever comes next, you're on your own. \t\n\t\t\n      *goto scene_two_farm_enters\n\t  \n*label scene_two_farm_enters  \n\n*page_break\n\nThree men push there way into the room as soon as you unlock the door. Two are wearing the yellow jumpsuits of Farm employees, stun batons at their waists, and unpleasant expressions on their faces. \n\nThe third man is dressed in an extraordinarily expensive suit. He has the kind of hair that they make photo spreads for, and a smile made entirely of glittering, white teeth. He pushes past his two bodyguards and extends his hand to you.\n\n\"${name}, it's so great to finally meet you! It's been a mess of a day, and I can't tell you how happy I am to see you here.\" By the way he's speaking, it's as if you've known each other for years. You find yourself shaking his hand before you even know what you're doing.\n \n*page_break\n  \n\"How are you?\" His handshake is a vice, \"Don't answer that! I know, I know, you're busy -- aren't we all?\" He let's go, you think he might have broken a finger. \n\n\"It's crazy, right? You wake up and think you're going to get a thousand things done, and then you look at your watch and it's already 11AM. Where does all the time go?\" He looks around the room, then back at you.\n\n\"Speaking of time, I don't want to take up too much more of yours, so if you'll just zip over the 5000 chits you owe us, we'll be out of your hair!\" He takes out a sleek, black phone. \n\nWait a second... \n\n*page_break\n\n5000 chits? But you could have sworn you owed 3500! \n  \nYou dash over to the kitchen counter, and return with the letter The Farm sent you. He looks at it briefly, then tears it in half. \n\n\"Yup. That's how much you owe, unfortunately, your friend owes us 1500 more. More unfortunately for you, he hasn't paid us, and since he put your name down on his Extension, now you owe us 1500 more.\" He never stops smiling, \"But...if you happen to know where he is, we might just be able to work something out.\"\n\nHow did Sam manage to fake your name on his Extension? Didn't they call you? You promise to have a word with him about that, but first you have to avoid being conscripted.\n\nThe man stands silently, eyes never leaving yours, plastic smile painted on, waiting for you to make a move.\n\nWhat do you do? \n\n*choice\n\n  *selectable_if (wealth > 4999) #You decide to pay.\n    *set Sam +xlarge\n    *set ruthlessness -xlarge\n    *set wealth -5000\n\t  \n    *page_break\n\t  \n    You sigh, taking out your phone and pulling up your balance. You have ${wealth} chits, so doing this will basically wipe you out, but it will also save Sam.\n\n    When he sees your phone, the Farm man's smile becomes broader and more shark-like, \"You're making the right decision. This is all for the greater good, you know. Of course you know, you're an upstanding citizen!\" He goes on like this for a while, as you transfer the funds. \n\n    His phone buzzes, and just like that, you're 5000 chits poorer. \n\n    \"Pleasure meeting you ${name}! You know, I wish I had a friend like you, or friends at all really!\" He pauses, his face darkening, \"By the way, if you do run into your [i]friend[/i] Sam, would you let him know that we were looking for him this morning?\" His eyes never leave yours, \"See you next month!\"\n\n    With that, he turns on his heels and walks out the door, bodyguards in toe. \n\n    *page_break\n\t  \n    As they step out, another man steps in saying, \"You have really bad timing friend.\" He's wearing an old-fashioned suit, and his hair is graying around the sides. He smiles a genuine smile as he walks towards you, extending his hand. You shake it, reflexively. \n\n    \"Hi, I'm Harrison. Sam called and told us about your situation, so Cyan sent me over to make sure you both don't end up in a bad way, I guess I was a little late for that.\" He looks over his shoulder at the rapidly retreating Farm men, \"Oh well, you can always make more money, do you have time to talk?\"\n\n    This was getting complicated. \t  \n\t  \n    *goto scene_two_harrison\n\n  #You decide not to pay.\n    *set Sam +xlarge\n    *set deny_the_farm +small\n    *achieve fightthepower\n\n    You tell the Executive that The Farm isn't getting a single chit from either of you.\n\n    \"That's really too bad. Unfortunately, not all of us can be quite so blase about our responsibilities! Some people have jobs to do.\" His smile never wavers.\n\n    You ask him to leave. \n\n    \"Can't do that friend. If someone is unable or unwilling to pay, they have to come with us. You know the drill.\" With that, he motions to the two guards, who unholster their stun batons and rush towards you. \n\n    *page_break\n  \n    You dodge to one side, then the other, hoping to keep the men away from your flank. \n\n    *if (combat > 18)\n      *set combat +medium\n\t  \n      Fortunately, one of them swings too recklessly, exposing his middle. You punch him in the sternum. He doubles over, dropping his baton. \n\n      You roll to retrieve it, nearly getting winged by the second man in the process. Now armed, you move gracefully, avoiding every attack that he throws. As he tires, you see an opening and swing as hard as you can, the man collapses into a heap. \n  \n      \"Well that was surprising.\" The Farm man says, unperturbed, \"It's almost too bad that there are a dozen more of them on their way.\" He pauses, \"Just how long do you think you can keep this up?\"\n\n      \"Long enough.\" A voice, calm and measured, comes from the doorway. \n\n      *page_break\n  \n      The man who enters is wearing an old fashioned suit, and his hair is graying on the sides. The first thing he does is walk towards the Farm Executive and place a card in his hands, \"You hold onto this for a second.\" Then, he moves towards you, looking down at the scene, \"Not bad kid.\"\n  \n      \"I don't know who you are, but you should leave right this second! This has nothing to do with you, and The Farm cannot be held responsible for any injuries you receive while we apprehend this...this... criminal!\"\n  \n      \"Read the card slick.\" The man says, extending his hand to you, \"Hi, I'm Harrison. Sam called and told us about your situation, so Cyan sent me to make sure you both didn't end up in a bad way.\" \n  \n      *page_break\n  \n      As the words leave his lips, the Farm Executive goes pale, \"What's your Culling ID!\" He screams, then catches himself, placing a hand over his mouth.\n\n      Harrison rattles off a series of digits, which the Farm man puts into his phone. After a few moments, he clears his throat, \"Right then, in that case, we'll just be on our way.\" He looks like an animal who has been denied a meal, \"I'm sure you can understand our confusion, and I hope that we can all just keep this to ourselves.\" \n  \n      Then he turns on his heels, ignoring his unconscious bodyguards, and walks out the door. \n  \n      Well, that was strange. \n  \n      \"Sorry I was late. Glad I got here in time to be useful. Now, do you think you might have a moment to talk?\"\t\n\t  \n      *goto scene_two_harrison\n  \n    *else\n      *set combat -medium\n      *set wealth 0\n\t  \n      Unfortunately, you step in a little too deeply and take a blow to the face, which causes you to double over, allowing the second man to strike you in the shoulder with his baton.\n\t  \n      Electricity courses through you, and you start to black out, the last thing you remember before losing consciousness is the Farm Executive saying, \"get his phone...\"\n\t  \n      *page_break\n\t  \n      When you wake up, there is another man in the room. He's wearing an old fashioned suit, and his hair is graying on the sides. You're still trying to get the taste of blood out of your mouth, so you don't hear what he's saying. Interestingly though, your new friend from The Farm doesn't look happy.\n\n      \"What's your Culling ID!\" The Farm man screams, then catches himself, placing a hand over his mouth.\n\t  \n      The older guy rattles off a series of digits, which the Executive puts into his phone. After a few moments, he clears his throat, \"Right then, in that case, we'll just be on our way.\" He looks like an animal who has been denied a meal, \"I'm sure you can understand our confusion, and I hope that we can all just keep this to ourselves.\" \t\t\n \n      Then he turns on his heels, and walks out the door, taking his two bodyguards with him.\n  \n      Well, that was strange.\n\n      *page_break\t  \n  \n      The older man walks towards you next, helping you to your feet.\n\t  \n      \"Hi, I'm Harrison. Sam called and told us about your situation, so Cyan sent me to make sure you both didn't end up in a bad way.\" He pauses, \"Sorry I was late. They managed to empty your bank account before I scared them off. Oh well, you can always make more money, do you have time to talk?\"\n\n      This was getting complicated. \t  \n\t  \n      *goto scene_two_harrison\n\n  *if ((sam_is_here = false) and (ruthlessness > 57)) #You decide to turn Sam over.\n    *set Sam -xxlarge\n    *set Cyan -medium\n    *set ruthlessness +xlarge\n    *achieve turncoat\n\t  \n    Sam got you into this, now Sam is going to have to get you out of it. \n\n    You shrug your shoulders, casually motioning to the bedroom. \n  \n    The Farm man takes your hint, and goes inside to investigate. A few seconds later, one of the bodyguards is dragging Sam out. To say that he doesn't look happy, would be an understatement. \n  \n    \"How could you do this to me!\" He screams. \n  \n    You remind him that he was the one who forged your consent on the Extension. \n  \n    *page_break\n  \n    \"I...I mean...You...Ugh.\" He seems to lose all will to argue as one of the bodyguards sits him down on your living room couch. \n\n    \"Great! We're all here! Now that we're done wasting everyone's time, can we get down to business?\"\n  \n    You say nothing.\n  \n    \"Fine, be that way, it costs nothing to be polite, you know?\" He takes out his phone, \"Let's see, we've found your friend, so it looks like you [i]actually[/i] owe us...\"\n\n    Just as he's about to finish, someone else walks into the room. \n  \n    *page_break\n\n    This man is wearing an old fashioned suit, and his hair is graying on the sides. The first thing he does is step over to the Farm Executive and place a card in his hands, \"You hold onto this for a second.\" Then, he moves towards you, with an expression that shows more than mild disapproval, \"So much for loyalty, eh?\"\n  \n    \"I don't know who you are, but you should leave right this second! This has nothing to do with you, and The Farm cannot be held responsible for any injuries you receive while we conduct our business!\"\n  \n    \"Read the card slick.\" The man says, extending his hand to you, \"Hi, I'm Harrison. The guy you just sold out told us about your situation, so Cyan sent me over to make sure you both didn't end up in a bad way.\" \n\n    *page_break\n\n    As the words leave his lips, the Farm Executive goes pale, \"What's your Culling ID!\" He screams, then catches himself, placing a hand over his mouth.\n  \n    Harrison rattles off a series of digits, which the Farm man puts into his phone. After a few moments, he clears his throat, \"Right then, in that case, we'll just be on our way.\" He looks like an animal who has been denied a meal, \"I'm sure you can understand our confusion, and I hope that we can all just keep this to ourselves.\" \t\t\n   \n    Then he turns on his heels, and walks with his bodyguards out the door. \n  \n    That was strange. \n  \n    \"Sorry I'm late. Glad I got here in time to be useful.\" He looks between you and Sam, \"Now, do you two think you might have some time to talk?\"\n\n    *goto scene_two_harrison \t  \n\t  \n  *if (sam_is_here = true) #You step back, deciding to let Sam speak for himself.\n\n    You look to Sam, who looks to you and lets out an audible sigh. He was wrong to forge your consent, but the fact that he stuck around knowing that he would get caught, must be worth something. \n  \n    What he does next, certainly doesn't hurt. \n  \n    \"As I'm sure you know, I'm Sam.\" He steps forward. \n  \n    \"Yes! I did know that!\" The Farm man beams, \"But, I thought it would be rude to tell you.\"\n  \n    Sam blinks, the Farm man continues smiling. \n  \n    \"${name} didn't underwrite Extension, I lied during the application. He shouldn't be responsible for paying for my mistake.\" Sam almost groans the words. \n      \n    *page_break\n\t  \n    \"Well, if you were lying then, how do we know you aren't lying  now?\" The Farm man seems taken by his own cleverness, \"No. I think I like things just as they are [i]Sam[/i], if that's even your name!\"\n  \n    \"It's my name, you idiot.\"\n  \n    \"Insults won't get you anywhere,\" turning to face you, \"now, do you have the 5000 chits or what?\" \n  \n    Just as you're trying to decide on an answer, someone else walks into the room.  \n  \n    *page_break\n\n    This man is wearing an old fashioned suit, and his hair is graying on the sides. The first thing he does is step towards the Farm Executive and place a card in his hands, \"You hold onto this for a second.\" Then, he moves towards you, nodding politely, \"Good work distracting them.\"\n \n    Is that what you were doing?\n  \n    \"I don't know who you are, but you should leave right this second! This has nothing to do with you, and The Farm cannot be held responsible for any injuries you receive while we conduct our business!\"\n  \n    \"Read the card slick.\" The man says, extending his hand to you, \"Hi, I'm Harrison. Your partner over there told us about your situation, so Cyan sent me to make sure you both didn't end up in a bad way.\" \n\n    *page_break\n\n    As the words leave his lips, the Farm Executive goes pale, \"What's your Culling ID!\" He screams, then catches himself, placing a hand over his mouth.\n  \n    Harrison rattles off a series of digits, which the Farm man puts into his phone. After a few moments, he clears his throat, \"Right then, in that case, we'll just be on our way.\" He looks like an animal who has been denied a meal, \"I'm sure you can understand our confusion, and I hope that we can all just keep this to ourselves.\" \t\t\n  \n    Then he turns on his heels, and walks with his bodyguards out the door. \n  \n    Well that was strange. \n  \n    \"Sorry I was late. Glad I got here in time to be useful.\" He looks between you and Sam, \"Now, let's all sit down and have a chat.\"\n\n    *goto scene_two_harrison\t  \n  \n*label scene_two_harrison\n  \n*page_break\n\nThe three of you take a seat around your cramped, kitchen table. \n\nHarrison is a bastion of calm between your anger and Sam's contrition. \n \nHe looks to you and asks, \"Are you two going to be OK? It's kind of important, considering.\"\n\nWhat do you say?  \n\n*choice\n  #You say that you'll be fine.\n    *set Sam +small\n\t  \n    *page_break\n\t  \n    \"Is that right? You're a better person than me kid.\" He glances towards Sam, shaking his head, \"I'm going to say this once, if you two are going to work together, you need to trust one another. This sort of thing just doesn't fly for Founders.\"\n   \n    You couldn't agree more. \n\t  \n    *goto scene_two_end\n  \n  #You tell him that you're still really angry.\n    *set Sam -small\n\t  \n    *page_break\n\t  \n    \"And you should be! Your friend over there nearly got you both conscripted. That's not a great foundation for a Partnership,\" Harrison says casually.\n  \n    \"I'm sorry, alright?\" Sam replies to no one in particular.\n  \n    \"Don't apologize, just don't do it again. I'm going to say this once, if you two are going to work together, you need to trust one another. This sort of thing just doesn't fly for Founders.\"\n  \n    You couldn't agree more.\n\n    *goto scene_two_end\n\t  \n  #You say nothing, waiting for Sam to speak.\n    *set Sam +large\n\t\n    *page_break\n\t  \n    After a long moment Sam begins, \"I'm really sorry.\" He says, as sincerely as you've heard him in recent history.\n  \n    You nod, smiling. \n  \n    \"You should be sorry, you almost got your friend over there conscripted.\" Harrison replies calmly. \n  \n    \"Yea, I know.\" Sam's eyes avert. \n  \n    \"Do you? Listen, I'm going to say this once, if you two are going to work together, you need to trust one another. This sort of thing just doesn't fly for Founders.\"\n\n    *goto scene_two_end     \n\t \n*label scene_two_end\n  \n*if (ruthlessness > 60) \n  *achieve prettynasty\n*if (ruthlessness \u003c 40)\n  *achieve prettynice\n*if (wealth > 3500)\n  *achieve prettyrich\n  \nSo, what Sam had said earlier is true? You're going to be a Founder, whether you like it or not. You ask Harrison.\n\n\"Yup. This morning we put a rush on the initial paperwork. As of an hour ago, you're Founders-to-be, and The Farm can't touch you.\" That explains a lot.\n\n\"Really?\" Sam's eyes light up. \n\n\"Really.\" Harrison smirks, \"Now you need a garage, a Slowgun and about a hundred more pages of paperwork. We'll take care of that last part.\"\n\nBy 'we,' he must mean Cyan. You ask him why it's doing this.\n\n\"I don't ask questions like that to the boss. It likes you, which is the important part, you should keep it that way.\"\n\nYou can't say that you disagree. \n\n*page_break\n\nHarrison stands.\n\n\"Thanks for the memories guys, if you need anything, you have our number.\" \n\n\"You're leaving just like that?\" Sam says.\n\n\"Just like that.\" Harrison shrugs, an expression you can't quite read traced across his age-worn face, \"By the way, congratulations you two, I think you're well on your way to doing something great...\"\n\nWith that, he leaves you both, sitting at your kitchen table.\n\n*finish  \n  \n"}};

<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
        this.initial_commands = saved.initial_commands;
        this.stats = saved.stats;
      }
    }

    _runUntilEnd() {
      while (true) {
        try {
          this._mainLoop();
          return;
        } catch (e) {
          if (e instanceof RestartGame) {
            this._resetAll();
            this._enterScene(this.load_scene("startup"));
            continue;
          }
          if (e instanceof LoadGame) { this._applyState(e.state); continue; }
          if (e instanceof QuitGame) {
            try { this.autosave(); } catch (_) { /* never mask quit */ }
            throw e;
          }
          throw e;
        }
      }
    }

    _mainLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          const nxt = this._nextSceneName(this.scene.name);
          if (!nxt) break;
          this.temps = this._freshTemps();
          this._enterScene(this.load_scene(nxt));
        }
      } catch (e) {
        if (e instanceof GameOver) { this._flushParagraph(); return; }
        throw e;
      }
    }

    _enterScene(scene) {
      this.scene = scene;
      this.finished = false;
      this._pending_scene = null;
      const resume = this._resume;
      if (resume !== null && resume[0] === scene.name) {
        const [, lineNum, indent] = resume;
        this.line_num = lineNum != null ? lineNum : 0;
        this.indent = indent != null ? indent : scene.lines[this.line_num].indent;
      } else {
        this.line_num = 0;
        this.indent = 0;
      }
      this._resume = null;
      if (scene.name !== "startup") this.initial_commands = false;
    }

    _nextSceneName(current) {
      const i = this.scene_list.indexOf(current);
      if (i === -1) return null;
      if (i + 1 < this.scene_list.length) return this.scene_list[i + 1];
      return null;
    }

    // ---- save / load state ---- //

    _baseState() {
      return {
        version: 1,
        scene: this.scene ? this.scene.name : null,
        line_num: this.line_num,
        indent: this.indent,
        initial_commands: this.initial_commands,
        scene_list: this.scene_list.slice(),
        stats: toJsonable(this.stats),
        temps: toJsonable(this.temps),
        unlocked: Array.from(this.unlocked).sort(),
      };
    }

    captureState() {
      const state = this._baseState();
      if (Object.keys(this.checkpoints).length) state.checkpoints = deepCopy(this.checkpoints);
      return state;
    }

    _applyState(state) {
      this.scene_list = (state.scene_list || []).slice();
      this.stats = fromJsonable(state.stats);
      this.temps = fromJsonable(state.temps);
      this.unlocked = new Set(state.unlocked || []);
      this.checkpoints = deepCopy(state.checkpoints || {});
      this.initial_commands = state.initial_commands === undefined ? false : state.initial_commands;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = state.scene ? this.load_scene(state.scene) : null;
      this.line_num = state.line_num || 0;
      this.indent = state.indent || 0;
    }

    _resetAll() {
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.unlocked = new Set();
      this.checkpoints = {};
      this.initial_commands = true;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
    }

    autosave() {
      if (this.scene === null) return;
      if (this.io.on_autosave) this.io.on_autosave(this.captureState());
    }

    requestRestart() { throw new RestartGame(); }

    // ---- main interpreter loop (mirrors Scene.prototype.printLoop) ---- //

    _printLoop() {
      const lines = this.scene.lines;
      this.finished = false;
      while (!this.finished && this.line_num < lines.length) {
        const line = lines[this.line_num];
        if (line.is_blank) { this._flushParagraph(); this.line_num += 1; continue; }

        const indent = line.indent;
        if (indent > this.indent) {
          if (line.command && line.command.toLowerCase() === "comment") { this.line_num += 1; continue; }
          throw this._err("increasing indent not allowed, expected " + this.indent + " was " + indent);
        }

        const end = this.temps._choice_ends.get(this.line_num);
        if (end !== undefined &&
            (truthy(this._safeGet("implicit_control_flow")) || this.temps._fake_choice_depth > 0)) {
          this.line_num = end + 1;
          if (this.temps._fake_choice_depth > 0) this.temps._fake_choice_depth -= 1;
          continue;
        }

        this.indent = indent;

        if (line.command == null && line.text.startsWith("#")) {
          throw this._err("It is illegal to fall out of a *choice statement; " +
            "you must *goto or *finish before the end of the indented block.");
        }

        if (line.command == null) {
          this.initial_commands = false;
          this._printText(line.text);
        } else {
          this._runCommand(line);
        }
        this.line_num += 1;
      }
      this._flushParagraph();
      if (!this.finished) this.finished = true;
    }

    _runCommand(line) {
      const cmd = line.command.toLowerCase();
      const data = line.arg.trim();
      if (INITIAL_COMMANDS.has(cmd)) {
        if (this.scene.name !== "startup" || !this.initial_commands) {
          if (cmd !== "comment")
            throw this._err("Invalid " + cmd + " instruction, only allowed at top of startup.txt");
        }
      } else {
        this.initial_commands = false;
      }
      const handler = DISPATCH[cmd];
      if (handler === undefined) {
        if (NOOP_COMMANDS.has(cmd)) return;
        throw this._err("Non-existent command '" + cmd + "'");
      }
      handler.call(this, data, line);
    }

    _printText(text) { this._para.push(stripMarkup(this.replace_variables(text))); }

    _flushParagraph() {
      if (this._para.length) {
        let joined = this._para.filter((p) => p !== "").join(" ");
        joined = joined.replace(/[ \t]+/g, " ").replace(/ *\n */g, "\n").trim();
        if (joined) this.io.text(joined);
      }
      this._para = [];
    }
  }

  // ---- command handlers (mirror engine._cmd_*) ---- //
  const E = Engine.prototype;

  E._evalLiteral = function (expr, line) {
    if (expr === "") throw this._err("no value specified: " + line.text);
    return this.evaluator.evalString(expr);
  };

  E._cmd_create = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    this.stats[variable] = this._evalLiteral(m[2].trim(), line);
    return false;
  };

  E._cmd_temp = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const rest = m[2].trim();
    this.temps[variable] = rest ? this._evalLiteral(rest, line) : null;
    return false;
  };

  E._cmd_create_array = function (data, line) { this._defineArray(data, line, false); return false; };
  E._cmd_temp_array = function (data, line) { this._defineArray(data, line, true); return false; };

  E._defineArray = function (data, line, temp) {
    const m = /^(\w+)([\s\S]*)$/.exec(data);
    if (!m) throw this._err("Invalid array instruction, no name specified: " + line.text);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const stack = tokenize(m[2].trim());
    if (!stack.length) throw this._err("Invalid array instruction, missing length: " + line.text);
    let length = Math.trunc(toNum(this.evaluator.evalValueToken(stack)));
    if (length < 1) throw this._err("Invalid array instruction, length must be a whole number > 0");
    let values = [];
    while (stack.length) values.push(this.evaluator.evalValueToken(stack));
    if (!values.length) throw this._err("Invalid array instruction, no value specified: " + line.text);
    if (values.length === 1) { const v = values[0]; values = new Array(length).fill(v); }
    else if (values.length !== length)
      throw this._err("array expected 1 or " + length + " values, got " + values.length);
    const target = temp ? this.temps : this.stats;
    for (let i = 0; i < length; i++) target[variable + "_" + (i + 1)] = values[i];
    target[variable + "_count"] = length;
  };

  E._cmd_set = function (data, line) {
    const stack = tokenize(data);
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    if (!stack.length) throw this._err("Invalid set instruction, no expression: " + line.text);
    this._applySet(variable, stack);
    return false;
  };

  E._cmd_setref = function (data, line) {
    const stack = tokenize(data);
    const variable = String(this.evaluator.evalValueToken(stack)).toLowerCase();
    this._requireVar(variable);
    this._applySet(variable, stack);
    return false;
  };

  E._applySet = function (variable, stack) {
    // Leading operator => implicitly based on the variable's current value.
    if (stack.length && (stack[0].name === "OPERATOR" || stack[0].name === "FAIRMATH")) {
      stack.unshift(new Token("VAR", variable, "(implicit)"));
    }
    this.set_var(variable, this.evaluator.evalTokens(stack));
  };

  E._cmd_delete = function (data) {
    const variable = String(this.evaluator.evaluateReference(tokenize(data)));
    delete this.temps[variable];
    delete this.stats[variable];
    return false;
  };

  E._cmd_rand = function (data) {
    const stack = tokenize(data);
    if (!stack.length) throw this._err("Invalid rand statement, expected: varname min max");
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    const minimum = this.evaluator.evalValueToken(stack);
    const maximum = this.evaluator.evalValueToken(stack);
    if (stack.length) throw this._err("Invalid rand statement, expected three args");
    const lo = toNum(minimum), hi = toNum(maximum);
    const diff = hi - lo;
    if (diff < 0) throw this._err("rand min must be <= max: " + lo + " > " + hi);
    if (diff === 0) this.set_var(variable, lo);
    else if (Number.isInteger(lo) && Number.isInteger(hi))
      this.set_var(variable, lo + Math.floor(this._rng() * (diff + 1)));
    else this.set_var(variable, lo + this._rng() * diff);
    return false;
  };

  E._requireVar = function (variable) {
    if (!(variable in this.temps) && !(variable in this.stats))
      throw this._err("Non-existent variable '" + variable + "'");
  };

  // ---- control flow ---- //

  E._cmd_goto = function (data) { this._gotoLabel(this._resolveLabelName(data)); return true; };
  E._cmd_gotoref = function (data) {
    this._gotoLabel(String(this.evaluator.evalString(data)).toLowerCase()); return true;
  };
  E._resolveLabelName = function (data) {
    if (/[\[\{]/.test(data)) return String(this.evaluator.evaluateReference(tokenize(data)));
    return String(data).toLowerCase();
  };
  E._gotoLabel = function (label) {
    if (!(label in this.scene.labels)) throw this._err("bad label " + label);
    this.line_num = this.scene.labels[label];
    this.indent = this.scene.lines[this.line_num].indent;
  };
  E._cmd_label = function () { return false; };

  E._cmd_if = function (data) {
