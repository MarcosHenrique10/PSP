<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Founders Saga: The Culling — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>

        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "founderssaga", "title": "Founders Saga: The Culling", "scenes": {"choicescript_description": "Killer robots, masked warriors in well-tailored robes, job interviews where you're judged on your skill with a stun baton -- this is all just another day in the world of The Founders -- a world where you either start a business, fight for one, or end up conscripted to The Farm.\n\n[i]Founders Saga: The Culling[/i] is a 54,000-word interactive novel by Steve Spalding. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nThis is your world and you must decide how you're going to survive in it.\n\nWill you live by your brains, your business savvy, your silver tongue, or your ability to punch people really hard in the face? Will you be ruthless, striving for wealth and glory above all else, or honorable, relying on your friends and allies to get you through tough spots?\n\nWill you fall in love?\n\nFounders Saga: The Culling is the first episode in an interactive science fiction novel by Steve Spalding. It begins your journey towards founding a startup, earning your Slowgun, and discovering who you can trust in a world where business is total war.\n\n• Purchase and equip powerful new gear to improve your Founder.\n• Every conversation matters, and can unlock brand new ways to solve problems and improve your fortunes.\n• Play as male, female, gay or straight.\n• Build complex relationships with characters over time, maybe even fall in love.\n• Discover side quests and new missions to improve your Founder.", "choicescript_stats": "[b]Your Name is:[/b] ${name}\n \n[b]Skills[/b]\n\n*stat_chart\n  percent Engineering\n  percent Marketing Business Savvy\n  percent Charisma\n  percent Combat\n  opposed_pair Ruthlessness\n    Honor\n\n*line_break\n[b]Relationships[/b]\n\n*stat_chart\n  percent Trish\n  percent Victor\n  percent Sam\n*if knows_cyan\n  *stat_chart\n    percent Cyan\n*if knows_isabel\t\n  *stat_chart\n    percent Isabel\n\n*line_break  \n*if you_have_a_startup\n  [b]Founder Stats[/b]\n\n*if you_have_a_startup\n  *stat_chart\n    percent Health Startup Health\n*if you_are_a_founder\n  *stat_chart\n    percent Equity\n\n[b]Current Equipment[/b]\n\n*if data_band\n  Sensewerk's Data Band, \n*if smart_eyes\n  Ionick eEyes, \n*if smart_cloths\n  Newscene CustomCloths, \n*if smart_phone\n  FarmBrand Smart Phone, \n*line_break\n\n[b]Upgrades[/b]\n\n*if combat_threading\n  Combat Threading (CustomCloths),\n*if rich_threading\n  Rich Threading (CustomCloths),\n*if predictive_reflexes\n  Predictive Reflexes (eEyes),\n*if knowhow\n  KnowHow (eEyes),\n*if quantum_coprocessor\n  Quantum Coprocessor (Data Band),\n*if striking_casing\n  Striking Casing (Data Band),\n*if risky_groundhog\n  Risky Groundhog (Smart Phone),\n\t\n*line_break\n*line_break\n[b]Current Wealth ($):[/b] ${wealth}\n*if you_have_a_slowgun\n  *stat_chart\n    text slowgunbattles Slowgun Battles Won\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Advertising[/b]\n  \n  Remove advertisements.\n  \n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n  *goto purchased_list\n\n*label purchased_list\n\n*if choice_purchased_adfree\n  [b]Advertising[/b]\n  \n  You've paid to remove advertisements.\n", "ending": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have arrived at the end of the first episode of Founders Saga, congratulations!\n\nThe choices you made here will effect the rest of your story, and help to determine how your adventure will ultimately end!\n\nOn the next episode, you will meet new friends, spend time with old ones, and find a place to build your startup.\n\nI doubt that last part is going to be quite so easy, but we'll just have to see.  \n\nMake sure to save your game below! You'll need your saved game to continue where you left off in the next episode.\n*save_game save1\n\nWe hope you've enjoyed playing [i]Founders Saga.[/i]\n\n*feedback\n\nThank you so much for playing!\n\nYours,\n\nSteve Spalding\n\n*delay_ending 1200 $4.99 $0.99", "save1": "*restart", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Steve\"\n*set sex \"Make\"\n*set pronoun \"he\"\n*set pronoun_c \"He\"\n*set himher \"him\"\n\n*comment Skills and Stuff\n\n*set engineering 10\n*set marketing 10\n*set charisma 10\n*set combat 10\n*set health 0\n*set equity 50\n*set wealth 200\n*set slowgunbattles 0\n*set ruthlessness 50\n\n*comment Relationships with People\n\n*set Trish 25\n*set Victor 25\n*set Sam 40\n*set Cyan 10\n*set Isabel 0\n\n*comment Flags, flags and more flags (Major)\n\n*set knows_cyan false\n*set knows_isabel false\n*set you_have_a_startup false\n*set you_have_a_slowgun false\n*set you_are_a_founder false\n*set rachel_is_safe false\n*set deny_the_farm 0\n\n*comment Equipment\n\n*set data_band false\n*set smart_eyes false\n*set smart_cloths false\n*set smart_phone false\n\n*set combat_threading false\n*set rich_threading false\n*set predictive_reflexes false\n*set knowhow false\n*set quantum_coprocessor false\n*set striking_casing false\n*set risky_groundhog false\n\n*comment Scene One Flags\n\n*set culling_team_player true\n*set culling_hurt false\n*set you_have_kiosk_key false\n*set culling_mom_wants_to_help false\n*set you_are_a_sap false\n*set you_have_culling_course false\n*set you_impressed_cyan false\n*set you_have_early_extension false\n\n*comment Scene Two Flags\n\n*set find_money_counter 3\n*set you_know_alyssa_mallory false\n*set you_know_about_r4 false\n*set m4_name \"\"\n*set m4_name_short \"\"\n*set you_owe_parents false\n*set you_owe_parents_amount 0\n*set you_are_in_the_m4 false\n*set sam_is_here false\n*set lie_count 0\nscreenshots!\n*page_break\n\nWith these final thoughts out of the way, you step inside.  \n\nAnd as you do, the door slams shut. \n\nThis wouldn't be a problem, except the first thing you see as your eyes adjust to the daylight bright floruescents, is a ten-foot-tall robot ambling towards you.  \n\nHow do you handle this?\n\n*fake_choice\n\n  #Stand firm, it's not like this is the first war robot that's tried to kill you...this week. \n  #Try to run away. \t\n  #Idly wonder what any of this has to do with getting a job.\n\n*script changeBackgroundColor(\"black\")\n\n*comment Skills and Stuff\n\n*set engineering 12\n*set marketing 7\n*set charisma 12\n*set combat 5\n*set wealth 300\n*set ruthlessness 40\n\n*comment Relationships with People\n\n*set Trish 30\n*set Victor 15\n*set Sam 30\n  \n\"Sam isn't a bad guy, he's just scared.\" Rachel squeeks, dodging and diving away from a flurry of baton swings. \n\t\t\n\"No, Rachel. Sam is a jerk. He has always been a jerk, and the fact that he left us here only goes to prove that.\" Trish grumbles. \n\nThe three of them are arguing back and forth, what do you think?\n\n*fake_choice\n\n  #You think Sam is scared, and that Trish and Victor are being too hard of him.\n  #You think Sam is being a jerk, and that Rachel is being too easy on him. \n\n*script changeBackgroundColor(\"sepia\")\n\n*comment Skills and Stuff\n\n*set engineering 17\n*set marketing 9\n*set charisma 14\n*set combat 5\n*set wealth 100\n*set ruthlessness 35\n\n*comment Relationships with People\n\n*set Trish 35\n*set Victor 20\n*set Sam 35\n\nThe Slowgun is the Founder's symbol of office. \n\nWithout one, you can't open a business, you can't protect your Equity, you can't Negotiate -- you're an employee, ripe for the Culling, The Farm, and all the other brands of exploitation that this world has to offer. \n\t\t\nWith one, however, you can be shot to death in your bathroom over a stapler. \n\nEverything has its price. \n\t\t\nYou realize that almost everyone here is a Founder, and that this must be the place where they watched you and yours die. \n\nWhat do you think of them?\n\n*fake_choice\n\n  #You think that Founders are doing everything they can to help.\n  #You think that Founders are trying, but should be doing more.\n  #You think that Founders are the problem. \n  \n*comment Skills and Stuff\n\n*set engineering 12\n*set marketing 7\n*set charisma 12\n*set combat 5\n*set wealth 300\n*set ruthlessness 40\n\n*comment Relationships with People\n\n*set Trish 30\n*set Victor 15\n*set Sam 30\n*set Cyan 10\n\nCyan motions to a waiter, whose face goes papery white as soon as he sees the mask. The Veecee orders two glasses of water, no food. This raises an important point, how do Veecees eat with those masks on? Do they even need to eat?\n\n*fake_choice\n\n  #Of course they do. That's a stupid question, I'm asking stupid questions now. Great.\n  #Maybe not. I mean, there is a lot of fancy tech in the world, and Veecees own most of it. \t\t\n  #What am I doing? That's a ridiculous question, the Veecee probably hates me now.\n\n*comment Skills and Stuff\n\n*set engineering 20\n*set marketing 7\n*set charisma 10\n*set combat 15\n*set wealth 300\n*set ruthlessness 40\n\n*comment Relationships with People\n\n*set Trish 35\n*set Victor 25\n*set Sam 35\n\nYou remember a time when waking up brought new, exciting possibilities. These days, it just brings you one step closer to a yellow jumpsuit. \n\nAs you roll out of bed, your phone buzzes violently. When you look at it, you see a morning marked in dark red, with a disturbingly adorable skull icon emblazoned in the center. Then you realize, today is the day your Unemployment Surcharge is due, and The Farm will be here any minute to collect.\n\nThere is a knock at your door. \n\nWhat do you do?\n\n*fake_choice\n\n  #You try to escape through the back, caution is the better part of valor.\n  #You look for your stun baton, you can never be too careful.\n  #You go to the door and open it, you're going to meet this head on.\n  \n*finish", "startup": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*title Founders Saga: The Culling\n*author Steve Spalding\n*scene_list\n  startup\n  thefarm\n  ending\n\n  \n*comment Personal Stuff\n\n*create name \"\"\n*create sex \"\"\n*create pronoun \"\"\n*create pronoun_c \"\"\n*create himher \"\"\n*create himher_f \"\"\n\n*comment Constants\n\n*create small 1\n*create medium 2\n*create large 3\n*create xlarge 4\n*create xxlarge 6\n*create huge 8\n*create enormous 10\n\n*create small_cash 100\n*create medium_cash 200\n*create large_cash 1000\n*create xlarge_cash 2000\n*create huge_cash 10000\n*create enormous_cash 20000\n\n*comment Skills and Stuff\n\n*create engineering 10\n*create marketing 10\n*create charisma 10\n*create combat 10\n*create health 0\n*create equity 50\n*create wealth 200\n*create slowgunbattles 0\n*create ruthlessness 50\n\n*comment Relationships with People\n\n*create Trish 25\n*create Victor 25\n*create Sam 40\n*create Cyan 10\n*create Isabel 0\n\n*comment Flags, flags and more flags (Major)\n\n*create knows_cyan false\n*create knows_isabel false\n*create you_have_a_startup false\n*create you_have_a_slowgun false\n*create you_are_a_founder false\n*create rachel_is_safe false\n*create deny_the_farm 0\n\n*comment Equipment\n\n*create data_band false\n*create smart_eyes false\n*create smart_cloths false\n*create smart_phone false\n\n*create combat_threading false\n*create rich_threading false\n*create predictive_reflexes false\n*create knowhow false\n*create quantum_coprocessor false\n*create striking_casing false\n*create risky_groundhog false\n\n*comment Scene One Flags\n\n*create culling_team_player true\n*create culling_hurt false\n*create you_have_kiosk_key false\n*create culling_mom_wants_to_help false\n*create you_are_a_sap false\n*create you_have_culling_course false\n*create you_impressed_cyan false\n*create you_have_early_extension false\n\n*comment Scene Two Flags\n\n*create find_money_counter 3\n*create you_know_alyssa_mallory false\n*create you_know_about_r4 false\n*create m4_name \"\"\n*create m4_name_short \"\"\n*create you_owe_parents false\n*create you_owe_parents_amount 0\n*create you_are_in_the_m4 false\n*create sam_is_here false\n*create lie_count 0\n\n\n\n*comment Achievements Scene One\n\n*achievement experthacker visible 5 Solo Hacker\n  Hack the organizer's hidden stash on your own.\n  You managed to hack the organizer's hidden stash, all by yourself. \n  \n*achievement cameradetector visible 5 Camera Detector\n  Convince a pair of guards to pay you. \n  You managed to convince the guards that your \"camera detector\" is worth chits. \n\n*achievement pokercheater visible 5 Cheater\n  Cheat at a game of cards.\n  You managed to get away with cheating...this time. \n  \n*achievement withoutascratch visible 10 Without a Scratch\n  Make it through the Culling without you or your equipment being damaged.\n  You managed to make it through the final stage of the Culling without a scratch.\n  \n*achievement cullingteamplayer hidden 10 Team Player\n  hidden \n  You managed to stay loyal to your team, even when it hurt.\n\n*achievement yousavedrachel hidden 10 Protector\n  hidden\n  You managed to save Rachel's life in the Culling. \n\n*achievement cullingcharmer visible 10 Culling Charmer\n  Charm a Founder at a reception.\n  You managed to make a great impression on Cara Lambert at the Culling Reception.  \n\n*achievement alwayshonest visible 10 Always Honest\n  Be honest with someone you love at a reception.\n  You told your mom about how you did at the Culling.\n  \n*achievement youreasap hidden 5 You're a SAP!\n  hidden\n  You started an exciting career as a Sansewrks Associate Partner!  \n  \n*achievement impresstheveecee visible 10 Impressive\n  Impress a Veecee during a reception.\n  You managed to impress Cyan at the Culling Reception. \n\n  \n*comment Achievements Scene Two\n\n*achievement freelanceengineer visible 10 Freelance Engineer\n  Successfully complete Trish's programming task on your own.\n  You managed to complete Trish's programming job all by yourself.\n  \n*achievement freelancemarketer visible 10 Freelance Marketer\n  Successfully negotiate the highest price for Victor's task. \n  You managed to successful negotiate the highest possible price for Ocelot whiskers.\n  \n*achievement goodlistener hidden 5 Good Listener\n  hidden\n  You listened to Alyssa's story, and received an introduction to a high-end garage.\n \n*achievement m4fighter visible 10 M4 Fighter\n  Win the first round of Mad Murphy's Murderpunch Mayhem.\n  You managed to win the first round of Mad Murphy's Murderpunch Mayhem.\n  \n*achievement prettyrich hidden 10 Pretty Rich\n  hidden\n  You've earned (and kept) a substantial sum of money.\n  \n*achievement fightthepower hidden 5 Fight the Power\n  hidden\n  You refused to give in to The Farm. \n  \n*achievement turncoat hidden 5 Turncoat\n  hidden\n  You tried to turn Sam over to The Farm.\n  \n*achievement prettynasty visible 5 Pretty Nasty\n  Start down the path of ruthlessness.\n  You were willing to do anything it took to come out ahead.\n  \n*achievement prettynice visible 5 Pretty Nice\n  Start down the path of loyalty.\n  You never put winning above your friends. \n  \n*achievement nicename hidden 5 Nice Name\n  hidden\n  You are the first and hopefully the last to choose that name. \n  \n*achievement timetokill visible 10 Time to Kill\n  Take some time off,\n  You were willing to take \"me\" time even under pressure. \n  \n  \nKiller robots, masked warriors in well-tailored robes, job interviews where you're judged on your skill with a stun baton -- this is all just another day in the world of The Founders -- a world where you either start a business, fight for one, or end up conscripted to The Farm. \n\nThis is your world and you must decide how you're going to survive in it. \n\nWill you live by your brains, your business savvy, your silver tongue, or your ability to punch people really hard in the face? Will you be ruthless, striving for wealth and glory above all else, or honorable, relying on your friends and allies to get you through tough spots?\n\nWill you fall in love?\n\n[i]Founders Saga: The Culling[/i] is the first episode in an interactive science fiction novel by Steve Spalding. It begins your journey towards founding a startup, earning your Slowgun, and discovering who you can trust in a world where business is total war. \n\n*page_break\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Killer robots, masked warriors in well-tailored robes, job interviews where you're judged on your skill with a stun baton -- this is all just another day in the world of The Founders -- a world where you either start a business, fight for one, or end up conscripted to The Farm. \n\n  This is your world and you must decide how you're going to survive in it. \n\n  Will you live by your brains, your business savvy, your silver tongue, or your ability to punch people really hard in the face? Will you be ruthless, striving for wealth and glory above all else, or honorable, relying on your friends and allies to get you through tough spots?\n\n  Will you fall in love?\n\n  Founders Saga: The Culling is the first episode in an interactive science fiction novel by Steve Spalding. It begins your journey towards founding a startup, earning your Slowgun, and discovering who you can trust in a world where business is total war. \n\n  *if choice_is_advertising_supported\n    [i]Founders Saga[/i] is supported by advertisements, but you can buy the unlimited version\n    to turn off ads forever.\n    \n    *purchase adfree $4.99 purchased\n    *page_break_advertisement\n\n    *goto purchased\n  *else\n    [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n    *purchase adfree $4.99 purchased\n    *label page_break\n    *page_break Play Now for Free\n\n*label purchased\n\nYou land, hard. Your legs buckle on impact and you struggle to your feet, grumbling as you crawl from beneath the giant nylon sac that is the only reason you're still alive. Well, that and Trish. \n\nYou blink, then blink again, your eyes clear but your head is still filled with cotton. \n\nAt least you're on the ground. \n\nThe air that whipped around you, hurricane strong and terrifying, has settled into the sounds of cicadas and night creatures. You struggle with your harness, with your parachute, with your memories. \n\t\nYour memories? You might have landed harder than you thought. \n\t\nAs you detach yourself from your gear, you run through the checklist that you prepared before the jump. If you have a concussion, it's better to know now than later. \n\n*label naming\n\nFirst things first, what's your name?\n\n*choice\n  #Wil\n    *set name \"Wil\"\n    *goto gender\n  #Alexis\n    *set name \"Alexis\"\n    *goto gender\n  #Toby\n    *set name \"Toby\"\n    *goto gender\n  #Robin\n    *set name \"Robin\"\n    *goto gender\n  #Wait, none of those are right.\n    *label input_name\n    My name is actually...\n    *input_text name\n\t\n    *comment is capitalization correct?\n    *if (\"${name}\" != \"$!{name}\")\n      Are you sure your name is $!{name}?\n     \n      *choice\n        #Yup!\n          *set name \"$!{name}\"\n          *goto gender\n        #No, my name is ${name}, that's it.\n          *goto gender\n        #Hm, let me try again.\n          *goto input_name\n\n*label gender\n\nThat's right, your name is ${name}, and it has been for pretty much ever. You repeat this four or five times as you struggle with hooks and rings and straps. Eventually, you manage to free yourself. As you do, you try to remember your gender. Forgetting your gender is pretty much a sure sign that you have a concussion. \n\t\t  \nSo, what do you identify as?\n\n*choice\n  #You identify as a man.\n    *set sex \"man\"\n    *set pronoun \"he\"\n    *set pronoun_c \"He\"\n    *set himher \"his\"\n    *set himher_f \"him\"\n    You're a man. That's right, a man.\n    *goto entering_building\n  #You identify as a woman.\n    *set sex \"woman\"\n    *set pronoun \"she\"\n    *set pronoun_c \"She\"\n    *set himher \"her\"\n    *set himher_f \"her\"\n    You're a woman. That's right, a woman. \n    *goto entering_building\n\t\n*label entering_building\n\nWith that out of the way, your mind finally clears enough for you to look around. You're in the middle of a city that seems more like a movie set than a place where real people might live. All around are low slung buildings, completely nondescript except for the bright, red numbers emblazoned on each of their sides. \n\t\t\nThere are other people scurrying about, equally dazed, ambling towards these buildings. Even in the low, yellow light of the gibbous moon, you can tell that they aren't happy. \n\t\t\nBy now you know where you are. Well, not really. You have no idea where you are. The 15,000 foot fall of out a jet liner made certain of that.  \n\nWhat you do know is why you are where you are, wherever that \"where\" happens to be. This is your Culling. This is the day that will decide the rest of your life. \n\n*page_break\n\nIt's funny. When you were very young, your great grandmother told you that there was a time, when she was very young, that people used to get jobs by applying for them and going in for \"interviews.\"  That was when there were a lot more jobs and a lot fewer people. That was before The Farm. \n\t\t\nNow jobs are bloodsport, and getting one means proving yourself ruthless and clever enough to handle the stresses of life at a startup. And for those found lacking, the only other options are to risk life and limb by becoming a Founder, or to turn their lives over to The Farm, to be spent building and selling anything the Executives deem too dangerous or boring for the robots.\n\t\t\nAfter years spent honing your abilities to a cutting edge, you're sure that you, at least, are not going to be found lacking. \n\t\t\nYou've spent your entire life preparing for this, but how did you spend the last few months leading up to the Culling?          \t\t  \t\n \n*choice\n  #You sharpened your technical skills.\n    *set engineering +huge\n    Programming, robotics, mathematics -- you're passionate about building products, and you've spent the last few months tinkering in your parent's attic, trying your best not to set too many things on fire. \n    *goto trish_intro\n\t\n  #You improved your business skills.\n    *set marketing +huge\n    Finance, marketing, sales -- you're interested in helping startups grow, you've spent the last few months reading up on the latest business trends, and building your social media presence.\n    *goto trish_intro\n  \n  #You worked on your people skills.\n    *set charisma +huge\n    Everyone knows that business is about charm and networking. You want to help build relationships, and bring in new clients with your silver tongue. You spent the last few months studying body language and learning how to dress yourself. \n    *goto trish_intro\n\t\n  #You spent your time at the local Founders gym.\n    *set combat +huge\n    Despite the dangers, you secretly dream about becoming a Founder, and have spent most of your time improving your combat and Negotiation skills. A few weeks ago, one of the Founders even let you hold her Slowgun, which basically made your month.\n    *goto trish_intro\n\t\n  #You've done a little bit of everything.\n    *set engineering +medium\n    *set marketing +medium\n    *set charisma +medium\n    *set combat +medium\n    It's always best to be versatile, and you're nothing if not versatile. Your last few months have been spent in a whirlwind of activity -- talking to, tinkering with, and beating up as many people as time would allow. \n    *goto trish_intro    \n\t\n*label trish_intro \n\nNot only have you been working on your skills, but since the Culling began a few weeks ago, you've managed to make a few friends. Friends who are now picking themselves off the floor, and trying to pretend they haven't just fallen out of a plane. \n\t\t\nFirst, there is Trish. Trish is the [i]real[/i] Engineer of the group. Real, because while everyone whose grown up since The Cullings began knows their way around a compiler and a soldering iron, Trish is something else entirely. When both engines \"accidentally\" failed over the Atlantic, it was Trish who managed to bring one of them back online, saving you and everyone else aboard. \n\t\nWith her wavy brown hair, sprinkling of freckles and uncanny ability to make overalls looks adorable, she's also not too bad on the eyes, if you're into that sort of thing. \n\t\nYou've known Trish for a couple weeks now, what do you think of her?\n\n*choice\n  #You think she's great, and that you can learn a lot from her.\n    *set engineering +small\n    *set Trish +medium\n    You hit it off with Trish immediately, and you've spent most of your free time between life and death struggles exchanging notes, talking about your favorite science fiction movies, and nerding out at every possible opportunity. \n    *goto victor_intro\n\n  #You think she's OK, but you're not really here to make friends.\n    *set Trish +small\n    You don't really have a strong opinion on her. She's definitely competent, which will be useful going into the final part of the Culling, but you don't have time to focus on anything else but what's in front of you.\n    *goto victor_intro\n\n  #You think she's beautiful, and want to get to know her better.\n    *set Trish +large\n    You think she is talented, gorgeous and one of the more amazing women you've ever met. At this point, you have no idea whether she feels the same way, but you haven't been shy in your efforts to find out. \n    *goto victor_intro\n\t\n  #You're not a big fan, she's a bit clingy and it gets on your nerves.\n    *set Trish -medium\n    Trish is extraordinarily talented, but she can also be a bit clingy... It's not really a problem, but with everything else going on, it's starting to grate on your nerves. \n    *goto victor_intro\n\t\n*label victor_intro\n\nNext is Victor. He's pretty much the best Marketer you've ever met. During the Field Trial, when a rival team kidnapped and threatened to beat you to death if you didn't give up the location of the rest of the group, it was Victor who talked his way inside and bartered a couple of days of supplies for your life. You're still not entirely certain what that says about the value of your life, but you're here now and that's what's important. \n\nVictor also has a Marketer's good looks. He's always perfectly dressed, with a perfect smile, a deep tan and brilliant green eyes. He looks like he's been genetically engineered to impress, at least if that's your thing.\n\nVictor has been on your team since the beginning, what do you think of him?\n\n*choice\n  #You think he's a fantastic Marketer, and have taken every opportunity to work with him.\n    *set marketing +small\n    *set Victor +medium\n    You spend most of your time with Victor, and most of that time talking about the latest business trends and marketing tactics. He's a real pro, and you think that he's someone you can learn a lot from. He also introduced you to a great tailor, which is another plus.\n    *goto rachel_intro\t\n\n  #You think that he's a pretty OK guy, but the Culling comes first. \n    *set Victor +small\n    Victor's not a bad guy, but the Culling is far too important to get attached. You're friendly enough when he talks to you, but overall you've been keeping your distance. \n    *goto rachel_intro\n\n  #You think he's amazing, and hope he likes you as much as you like him.\n    *set Victor +large\n    You only wish you had met somewhere other than the Culling. Victor is a fantastic guy--smart, capable and hot. You don't really know how he feels, but you're going to do everything in your power to get on his good side. \n    *goto rachel_intro\n\t\n  #You think that he's definitely a Marketer, ego and all. \n    *set Victor -medium\n    Victor means well, you're sure of that, but too often he lets his ego get the better of him. This is the Culling, so teamwork is more important than actually liking your team, but with things winding down, you won't be sad to see him go.\n    *goto rachel_intro\n\t\n*label rachel_intro\n\nStanding next to Victor is Rachel. She's a new addition to your group, who joined after your previous fifth lost control of his motorcycle while trying to escape from a pack of drones. After he was scrapped up off the highway and sent to intensive care, Rachel took his place.  \n\t\t\nShe's easily the weakest member of your team. She fancies herself an Engineer, but Trish runs circles around her. Her biggest strength is that she's pleasant to be around, which this late in the Culling is a miracle, but doesn't earn you too many points in the field.  \n\t\t\nUnfortunately, she needs all the points she can muster. This isn't her first time here. Her first attempt ended almost before it began when she froze, nearly catatonic during one of the early phases of last year's event. She didn't move, didn't say a word for nearly three days. When she stopped eating, the organizers had to send her home. \n\nFew people get a second chance at the Culling. No one gets a third. If she doesn't manage to get through it this time, you are absolutely certain that she will end up on the Farm. \n\n*page_break\n\t\t\nThe final member of your team is Sam, he's the only person you knew before the Culling began. In fact, you've known him all your life. Growing up, he was one of your best friends. Your parents fought for the same startup, and you both lived in the same neighborhood.\n\t\t\nYou did everything together that normal kids do -- climbing trees, riding bikes, administering first aid to your parents after particularly intense quarterly reviews. You were inseparable. Even after they retired, your families continued to go on joint vacations every year. You promised each other that when you grew up, you would go through the Culling together. \n\t\t\nEventually, you went off to different schools and lost contact with one another, even so, you never forgot your promise, and you never forgot your friend. When you heard that Sam had applied for a job, you put in your application the next day. \n\t\t\nBy luck and skill and a little bit of application forgery, you both ended up on the same team. While you're happy to be reunited with your friend, it has become increasingly apparent that Sam is no longer the same person. And the person that he is, you're not so sure about. \n\t\t\nHis eyes -- which were once warm and gentle -- are colder now, more focused. He's stronger, smarter, better in the ways he needs to be to get through this, but there is something about the way he treats the rest of your team that worries you. The Culling is stressful for everyone, but the Sam you knew was never mean. This Sam can be. \n\t\t\nHow do you feel about going through the Culling with Sam, changes and all? \n\n*choice\n  #He has been your best friend for years, you can't imagine doing this with anyone else. \n    *set Sam +huge\n    Sam is your friend and has seen you through more hard times than you can count. He has every right to snap at people when they aren't doing their jobs. Incompetence is not an option during the Culling.\n    *goto culling_goals\n\t\n  #You've grown apart over the years, but he is still someone you respect and care for. \n    *set Sam +xlarge\n    Sam's behavior frustrates you, but given the circumstances, it's understandable. You've asked him to be a bit more patient, and he seems to listen. You hope that after the Culling, you have a chance to sit down and really talk with him.\n    *goto culling_goals\n\n  #Sam has changed, and you're starting to wish he wasn't here with you.\n    *set Sam +medium\n    Sam's impatience and attitude are getting on your nerves. Everyone is stressed out right now, but that doesn't give him the right to take it out on the rest of the team. He's starting to become a liability, one you can't afford.\n    *goto culling_goals\t\n\t\n*label culling_goals\n\n\"So, everyone here?\" Sam casts his gaze around the moonlit drop zone. \n\t\t\n\"Looks that way.\" Victor beams, patting Rachel on the shoulder as she struggles with her harness, \"Thanks to Trish.\" \n\t\t\n\"You helped too Vic,\" Trish says, allowing herself a small smile before moving on, \"By the way, we're in Twelve.\" With that, she takes off, jogging towards a building with a giant, red twelve etched along its side.   \n\t\t\n\"If by 'help' you mean, 'started crying like a baby,' then I guess I did,\" Vic follows her, eyes darting back and forth, he's on the lookout for any surprises the organizers might have left behind, \"False modesty is the worst kind of modesty, my dear.\"\n\t\t\n\"Guys.\" Sam interrupts, \"We have work to do. Can we keep the chatter to a minimum?\" Frustrated, he walks over to Rachel and rips the harness off of her back, then flips a strand of auburn hair out of his face.\n\n\"Sam!\" Rachel squeals. You start to open your mouth, but Trish is there first. She glares at Sam, who glares back at her and then softens.\n\t\t\n\"Sorry Rachel, we just don't have much time.\" He manages a weak smile, before turning to catch up with the rest of the group. \n\n*page_break\n\t\t\nIn the beginning, there were hundreds of teams participating in the Culling. At this stage it's down to dozens. Half of the participants drop out before they make it this far, half of the ones who don't end up leaving due to injury, insanity or in much rarer cases -- death.   \n\t\t\nYou have managed to survive every test they've thrown at you, and now you're down to the final one. \n\t\t\nIt takes only a handful of minutes for everyone to assemble in front of door Twelve. The building is squat, colorless, boring in every way except for the garish lettering. \n\t\t\nWhat's inside is anyone's guess, but what's inside doesn't matter. What's important is that the next few hours will determine the course of the rest of your life, and the people standing beside you are the only ones between you and The Farm. \n\t\t\nAs the door slides open, you have a few moments to think, to clarify your goals for this last stage of the Culling. What are they? \n\n*choice\n  #You plan to do your very best, and let the chips fall where they may.\n    *set ruthlessness -large\n    That's right! You're going to do your job and get through this, that's all anyone can ask of you. You decide that if you work hard and stay focused, everything will be OK. \n    *goto giant_robot\n\t\n  #You plan to impress the Founders by any means necessary, the better you perform in their eyes, they more opportunities you'll have.\n    *set ruthlessness +large\n    *set culling_team_player false\n\t\n    That's right! You're going to make certain that every Founder in the room sees how talented you are, and if that means stealing the spotlight a little, so be it. This is your life, and you're not going to let anyone stand in your way. \n    *goto giant_robot\n\t\n  #You plan to work with your team, these people deserve no less.\n    *set ruthlessness -xxlarge\n    That's right! Your team brought you this far, and they'll bring you the rest of the way. You trust Sam and the others, and you're going to do everything in your power to make sure they all makes it through.\n    *goto giant_robot\n\t\n  #You plan to survive, whatever it takes.\n    *set ruthlessness +xxlarge\n    *set culling_team_player false\n\t\n    That's right! You're not going to to die here, even if that means everyone else has to die in your place.  \n    *goto giant_robot\n\t\n*label giant_robot\n\nWith these final thoughts out of the way, you step inside.  \n\nAnd as you do, the door slams shut. \n\nThis wouldn't be a problem, except the first thing you see as your eyes adjust to the daylight bright fluorescents, is a ten-foot-tall robot ambling towards you.  \n\nHow do you handle this?\n\n*fake_choice\n  #Stand firm, it's not like this is the first war robot that's tried to kill you...this week. \n    At this point, what's [i]another[/i] robot? The organizers are always throwing androids and drones and techno-organic viruses at you, you're starting to think The Farm is running some kind of sale.\n  \n  #Try to run away. \n    Dying is for suckers, and you're not a sucker. You turn around and run...directly into the sealed door. \n\n    \"Cute, ${name}.\" Trish says through gritted teeth, \"Whenever you're done bleeding all over yourself, we could use some help.\" She offers you a thin smile. She must have thought it was a joke, which it was...yea.  \t\n\t\n  #Idly wonder what any of this has to do with getting a job.\n    After the motorcycle chase, the island death game, the mock train robbery, and the twenty-seven medical examinations, you're starting to think this has less to do with qualifying for a job, and more to do with entertaining the Founders.    \n\nAs you collect yourself, you remember one of the rules they drilled into you during orientation, \"No guns allowed.\" This holds for both applicants and organizers, and it brings you a certain amount of peace to realize you aren't about to die in a hail of machine gun fire.\n\t\nStill, a giant, silver battle robot is a problem -- especially one carrying a baseball bat in one hand, and what looks like a pocket knife in the other. More especially because a pocket knife for a ten-foot-tall robot is the size of a machete. \n\t\nYou're running out of time, and worrying about being brutally murdered isn't helping matters any. So, after a moment's consideration, you put the killer machine out of your mind, and focus on what's happening in the rest of the room. \n\nWhere do you look first?\n\n*label robot_look_around\n\n*choice \n  *disable_reuse #Towards the far corner, where you think you see a person.\n    As it turns out, you do see a person -- a woman, nervously cradling a remote control. She's wearing the beige jumpsuit of a Farm worker, and you're pretty sure that the device she's carrying is at least partially responsible for the rampaging robot. \n\t\n    Victor bolts towards her. In the Culling, there is always a way to talk your way out of trouble, and he seems to think that this is the woman to talk to.   \n\t\n    Where do you look next?\n    *goto robot_look_around\n  \n  *disable_reuse #Towards the exit door, leading into the next chamber.\n    Directly behind the robot is the exit, and in front of that stands a man and a woman, both carrying stun batons. The same kind of baton you've been training with for the last year. \n\t\n    You've always found it funny that these three pound, titanium core, retractable batons capable of sourcing six million volts across a victim's flesh are considered \"nonlethal.\" It seems that if you hit someone hard enough or long enough with something like that, lethality is pretty much a given. \n\t\n    Surprisingly, Rachel is running towards the two guards, swinging her baton over her head. She isn't exactly the world's best fighter, but she is fast and wily and at least you can be certain she isn't about to die.\n\t\n    Where do you look next?\n    *goto robot_look_around\n  \n  *disable_reuse #Towards the robot, because robots always deserve your attention.\n    Sam and and Trish have decided to deal with the robot directly.\n\n    They have their phones out, and are deftly dodging knife swings as they enter their passwords. \n\t\n    They're trying to hack the beast, using the standard network intrusion tools that come with all modern smart phones. This should be easy for them, they're both excellent Engineers and even if they weren't, the organizers rarely secure the networks, and almost never install more than the most primitive expert systems to guard them. \n\t\n    If they can avoid getting killed in the process, they should be finished with the hack in a matter of minutes.\n\t\n    Where do you look next?\n    *goto robot_look_around\n    \n  #You're done looking around, it's time to act!\n    *goto robot_choice\n\t\n*label robot_choice\n\nThat's everything, or at least everything you care about.   \n\nYou close your eyes and take a breath, now it's time to decide where you're needed most.\n\nWho do you decide to help? \n\n*choice \n  #You help Sam and Trish hack the robot.\n    *set engineering +large\n    *set Trish +large\n    *set Sam +small\n\t\n    You might not know much about business or fighting, but if you couldn't hack a crazy android rampaging through a warehouse, you might as well go home.\n\t\t\t\n    You pull out your phone, and dash into the fray. Your fingers slide across the screen as you open a series of custom intrusion programs that you've spent the last few weeks perfecting. The robot is surprisingly quick for a half-ton of articulated titanium, and you have to be very careful not to be caught in it's wild swings. \n\t\t\t\n    Luckily, whatever Victor is doing is working, and the robot seems less interested in trying to kill you than in [i]pretending[/i] to try to kill you.  \n\t\t\t\n    In less time than it takes to realize this, Trish has burrowed her way into the network, and Sam has managed to hijack the machine's control surfaces. All they need from you is a few lines of custom code to act as a bridge. \n\t\n    *page_break\n\t\n    You get right on it, but as you dig through the machine's file system, you notice a folder in capitalized letters that reads \"OPEN ME\". Considering every other file you've come across is either completely encrypted or shot through with arcane assembly code, this comes across as the most obvious bait you've ever seen. \n\n    It doesn't take a genius to realize that it's a trap, and you know that you should just do your job, but you can't help but think that maybe you're Engineer enough to work your way around it, and to find out what kind of goodies the organizers have left you. \n \t\n    How do you proceed?\n\t\n    *choice\n      #Ignore the bait and finish doing your work.\n        *set ruthlessness -small\n        You're not stupid. Whatever is behind that folder is either designed to waste your time, or get your entire team killed. \n\t\t\n        Even if you could bypass the security, it's not worth putting Sam and Trish in danger.\n\t\t\n        You shake your head, and continue your job.\n        *goto robot_hack_complete\n\t\t\n      #Attempt to push through, relying on your technical prowess to protect you.\n        *set ruthlessness +small\n        You figure that you're clever enough to work your way around any security that the organizers could come up with, and in any case, it might be fun.  \n\t\t\n        You scrub the folder with every anti-virus, anti-malware, and anti-ai program on your phone, then dive in.  \n\t\t\n        *if engineering > 14\n          *set wealth +medium_cash\n          *achieve experthacker\n\t\t  \n          Five aggressive intrusion attempts later and folder's open. What you find inside is a text file that reads, \"Fortune Favors the Bold. Enjoy.\" \n\t\t  \n          Then you notice a sixth intrusion, this one you let through, it's 200 chits that have been transferred into your bank account. It's not even a fraction of what you paid for your Culling, but considering how broke you are, this is the best thing that has happened to you all day. \n\n          You smile to yourself, closing out of the folder and continuing your job. \n          *page_break\n          *goto robot_hack_complete\t\t  \n        *else\n          *set engineering -large\n          *set culling_hurt true\t\t  \n          You manage to dodge four hostile intrusion attempts, but a fifth sneaks through your firewall. Your screen locks, which triggers your phone to hard reboot, in an attempt to protect itself.\n\t\t  \n          It takes a full minute before you can bring it back online, and while you don't have time to be certain, you're pretty sure you picked up something nasty along the way. \n\t\t  \n          You shake your head, and continue your job.\n          *page_break\n          *goto robot_hack_complete\t\t  \n\t\t\n      *selectable_if (Trish > 27) #Ask Trish for help.\n        *set ruthlessness -small\n        *set Trish +small\n        *set Sam -small\n        *set wealth +small_cash\n        You decide that it's her neck on the line as much as yours, so you should give her a chance to weigh in before making a decision.\n\t\t\n        \"${name}, you don't have time.\" Trish sighs, diving out of the way of the bat.  \n\t\t\n        You nod, agreeing with her. That's what you figured she would say, Trish is always the sensible one. \n\t\t\n        \"No. I said [i]you[/i] don't have time, I can do it in my sleep.\" She winks towards you, \"As long as you distract the big guy.\"\n\t\t\n        That you can do! You wave towards the robot, drawing it's attention away from Trish. Sam doesn't seem too happy about the delay, but he shrugs his shoulders and helps. A few seconds pass before Trish cuts in.\n\t\t\n        \"It's chits ${name}, they left us cash! The note said something about 'fortune favoring the bold'.\"\n\n        You check your balance, Trish has already split the money with the team -- you can't believe how fast she is.\n\n        You give Trish a thumbs up, and continue your job.\n        *page_break\n        *goto robot_hack_complete  \t\t\n\t  \n    *label robot_hack_complete\n\t\n    After a moment's work, and a machete whizzing past your left shoulder, you tap out a final few commands and the robot freezes, its head slumping lifelessly. \n\t\t\t \n    \"Nice work you two. I'll take it from here.\" Trish smiles, a drop of sweat rolling down her face, fingers moving furiously across her screen. The robot jerks and writhes. \n\t\t\t\n    Sam nods, turning away from her and running towards the door. \n\t\n    *page_break\n\n    You start to move in the same direction, and notice that the two guards are groaning on the floor. Rachel has managed to take both out while you were busy with the bot. Victor nods once to the woman in the corner, shaking her hand and then moving to join Rachel.\n    *goto engineer_crisis\t\n  \n  #You help Rachel fight the guards at the door.\n    *set combat +medium\n    *set Cyan +large\n\t\n    The direct approach is the only approach, and either way Rachel could use the help. You unsling your baton, switching the safety off, and listening to the familiar sound of electricity crackling across its surface. \n\n    Rachel isn't doing half bad when you arrive, her swings are a bit wide and she's telegraphing her attacks, but the two people at the door seem much more interested in not being hit than in hitting her. Like the woman with the remote, they're from The Farm, and the only reason they're here is that the alternative is far worse.\n\n    By the way, what do you think of The Farm?\n\t\n    *choice\n      #It's great, it might not be glamorous, but at least it's work.\n        *set ruthlessness +large\n        There are too many people and not enough jobs. Everyone should be happy that The Farm provides chits, a place to live, and something to do for anyone -- even those not good enough to pass a Culling. You have no idea why so many people complain about it, when the alternative is starving to death.\n        *goto guards_complete\t\t\n\t\t\n      #It's pretty bad, no one deserves to be treated like a slave.\n        You understand why The Farm exists, there are more people than there are jobs, and if not for guaranteed work, millions would starve to death. \n\t\t\n        That being said, you think that the Executives abuse their power, and that their \"employees\" work in conditions that are, at times, little better than slavery. \n\t\t\n        You hope that some of the reforms that have been talked about for years, eventually get pushed through. \n        *goto guards_complete        \n\t\t\n      #It's a disaster, a handful of Executives are getting rich on the backs of millions and millions. \n        *set ruthlessness -large\n        The Farm only exists because it's Executives have bought and paid for the world's governments. Now, they make certain that only a tiny fraction of people ever qualify for a job at a startup, and that no startup ever gets large enough to challenge their monopolies. \n\n        You think that what they're doing is a crime, and hope that one day soon, someone takes them down.\n        *goto guards_complete\n\t\n    *label guards_complete\n    *page_break\n\t\n    The male guard steps towards you, swinging for your shoulder. You slide left, avoiding the blow and hitting him sharply across the ribs. He groans and falls into a heap. You can't tell whether he's really injured, or just decided to give up before he ended up that way. Rachel has wrapped herself around the woman, and is trying to wrestle her to the ground. \n\t\t\t\n    \"Thanks for the assist ${name}!\" She smiles a smile that would light up the room, if the room wasn't already so well lit, \"I'll take care of the rest, see if anyone else needs you!\"\n\t\t\t\n    You nod, replacing the baton and looking around. Sam is running in your direction, and Trish is standing next to the robot, which has lost the ability to move. Victor shakes the woman with the remote's hand and then jogs over to join you and Rachel by the exit.   \n\t\t\t\n    As you finish your inspection, the door swings open.\n    *goto engineer_crisis\t\n  \n  #You help Victor talk to the woman with the remote control. \n    *set marketing +medium\n    *set Victor +medium\n    \n    Killer robots and fist fights aren't your thing, your thing is convincing crazy people that they don't want to brutally murder your friends. \n\t\t\t\n    You make your way over to Victor, hoping to help him do just that. A wave of calm washes over you, despite the chaos all around. \n\t\t\t\n    \"I'm sorry. I'm so sorry. They'll kill my family if I don't...\" The woman's voice is hoarse, ragged. \n\t\t\t\n    \"No, they won't, but if you keep this up, you're going to kill us. Could you live with that?\" Victor's is like glass.  \n\t\t\t\n    \"How do you know what they'll do?\" She stutters, face hardening, \"No. I can't do it. My children. It's for my children!\" Victor breaths deep, his eyes drifting towards you. For once, he doesn't have an answer prepared.  \n\t\t\t\n    You do.\n\n    First, how do you approach the woman?\t\n\t\n    *choice\n      #You approach her carefully, deeply concerned about her well being.\n        *set charisma +small\n        *set ruthlessness -medium\n\t\t\n        You nod to Victor and step forward, placing a gentle hand on the woman's shoulder. She turns to you, searching your face. You offer her a soft smile and she relaxes.  \n\t\t\n        Now calm, she waits to hear what you have to say.\n        *goto remote_complete\n\t\t\n      #You approach her casually, aiming to defuse a tense situation.\n        *set charisma +large\n\t\t\n        You walk up to her and tell her your name. She stops mumbling to herself and turns to look at you. You wink, putting on your most charming smile. She laughs a little, wiping away her tears. \n\t\t\n        Now calm, she waits to hear what you have to say.\n        *goto remote_complete\n\t\t\n      #You approach her aggressively, you don't have time for this.\n        *set charisma +small\n        *set ruthlessness +medium\n\t\t\n        You nod to Victor and step forward, slapping her hard across the face. This shocks her back into coherence. She looks at you, fire in her eyes, but soon the fire fades and her jaw relaxes. Her chest expands and contracts as she tries to regain control over her breathing. \n\t\t\n        Now calm, she waits to hear what you have to say.\n        *goto remote_complete\n\t\t\n    *label remote_complete\n\t\n    You explain that The Farm can't hurt her children. That despite what they claim, they aren't above the law, and they have no power to conscript anyone who hasn't been through a Culling. Further, you tell her that she doesn't have to hand over the remote, she just has to avoid killing your friends with it. The distinction seems to make sense to her. \n\t\t\t\n    It makes even more sense when you tell her that Victor would be happy to provide free tutoring for her children's Culling, as long as she doesn't kill him first. \n\t\t\n    Victor looks at you, you smile back at him, he shakes his head and then grudgingly accepts the bargain. The woman's face softens, and she agrees to work a little less diligently at the controls. With that, Victor shoos you away.\n\t\n    *page_break\n\t\t\t\n    You turn and start towards the door, which is now open. The two guards are groaning on the ground, Rachel has managed to take both of them out. \n\t\t\t\n    With the woman's help, Sam and Trish finish hacking the robot. Sam is running towards you, and Trish is standing by the machine -- working to keep it on its leash.\n\n    After Victor shakes the woman's hand, he leaves her to join you by the exit.  \n    *goto engineer_crisis\n\n*label engineer_crisis  \n\nSam, Rachel and Vic are through the door in a flash. Trish, however, is still standing by the robot. She's distracted, typing furiously into her phone, trying to keep one step ahead of the machine's adaptive security system. \n\t\t\nThat's when you notice the robot's arm move, slowly. So slowly that you're sure that Trish doesn't notice it. It's the arm with the knife, the knife the size of a machete. \n\nYou notice one more thing. Across from the door, high up on the wall, is a screen. On that screen is each of your names, and next to your names is the time it's taken each of you to complete this task. Sam, Rachel and Victor's are set within fifteen seconds of one another. Yours is still ticking, along with Trish's. \n\t\t\nThe robot is preparing to swing. You pull your smart phone from your pocket. Your electronic intrusion suite flashes to life. If you act now, you might be able to disable it before it has a chance to attack, however, it will cost you time. Lots of time. Time that you don't have. \n\t\t\nWhat do you do?\n\n*choice\n  \n  #You help Trish, it's the right thing to do!\n    *set engineering +large\n    *set Trish +xlarge\n    *set ruthlessness -medium\n    *set Cyan -large\n\t\n    You decide to help, what choice do you have? Trish saved your life on the plane, and now she needs you to return the favor. \n\t\t\t\n    You bound towards her, screaming her name as you do. This is enough to snap her out of her trance, she drops to the floor and the blade goes whizzing over her head. \n\t\t\t\n    You're typing as you move, you might not be the world's best Engineer, but Trish has already done most of the work for you. In seconds, you manage to regain control of the robot and shut it down for good. \n\t\t\t\n    \"Holy crap...\" She pants, \"Holy crap!\" Her breathing is heavy enough for you to hear. She stumbles towards you, throwing her arms around your neck, \"Oh... I owe you big time ${name}.\"\n\t\t\t\n    You tell her that it's no big deal, that it was the right thing to do. She shakes her head.\n\t\t\t\n    \"The right thing to do, is to get the heck out of here before we both end up on The Farm.\" She lets go of you, squeezing your shoulder. \n\t\t\t\n    You can't help but agree. \n\t\t\t\n    You give one last look at the clock as you arrive back at the door. It doesn't look good. Trish offers to let you go first, not wanting you to be in last place on her behalf. You accept and step through, waiting for her on the other side. Before she can follow, however, the door slams shut. \n\n    *goto three_doors\n\t\n  #You decide to leave Trish behind, no point in you both failing.\n    *set Trish -xlarge\n    *set ruthlessness +xlarge\n    *set Cyan +large\n    *set culling_team_player false\n\t\n    You look between your phone and the clock, and decide to choose the clock. Trish is smart, and a much better Engineer than you, there is no way that she doesn't notice the robot's knife. \n\t\t\t\n    And if she doesn't notice it, she deserves whatever comes next. \n\t\t\t\n    You yell a warning and give one last look before stepping through the door. It slams shut behind you.\n\n    *goto three_doors\n\n  #You decide to leave Trish behind, you know absolutely nothing about robots.\n    *set Trish -medium\n    *set engineering -medium\n    *set ruthlessness +medium\n    *set Cyan +large\n    *set culling_team_player false\n\t\n    You look between your phone and the clock, and decide to choose the clock. You know little to nothing about robotics, and while you have an electronic intrusion suite, that's only because Trish made you install one last week.\n\n    You wouldn't even know where to start the hack, and as you flail around, the time would keep ticking, and whatever happens to Trish would still happen. \n\t\t\t\n    You yell a warning and give one last look before stepping through the door. It slams shut behind you.\n\t\n    *goto three_doors\n\t\n*label three_doors\n*page_break\nThe next room looks like the lobby to a fancy hotel, if that hotel were made entirely of brushed chrome. In front of you are two locked doors, and two guards arguing. You can't quite make out what they're saying, but Rachel and Victor are doing their best to sort it out. \n\t\nOn the left hand wall is a panel that looks like it was ripped open by the robot from the last room. The panel has two lights, which are blinking dully. The lights match the color of the two exit doors. Sam is puzzling over the mystery. \n\nYou look up to the clock, time is ticking away. \n\t\nWhat do you focus on?\n\n*choice\n \n  #You try to fix the control panel.\n    *set engineering +medium\n    *set Sam +large\n\t\n    You'd rather sort out a mess of wires than sort through the emotions of a couple of insane Farm employees. You walk towards Sam. \n\t\t\t\n    \"Glad you showed up, thought we'd lost you back there.\" He looks genuinely concerned, though if he was so concerned, he should have come back to help you. \n\t\n    What do you say?\n\t\n    *choice\n      #You ask him why he didn't stay behind to help. \n        *set Sam -small\n\t\t\n        \"Listen ${name}, this isn't a game, and I don't have time to pretend like it is.\" He takes a breath, \"If a door opens, I'm going through it. It's not because I don't care, it's because I want to live. Get it?\"\n\t\t\n        You're not entirely certain that you do, but you decide to move on.\n\t\t\n        *goto panel_complete\n\t\t\n      #You thank him for his concern.\n        *set Sam +small\n\t\t\n        \"Yea, no problem.\" He smirks, \"You're the only person around here I can really trust, it would be a shame to lose you.\"\n\t\t\n        You're not entirely certain how much better that makes you feel, but you decide to move on. \n\t\t\n        *goto panel_complete\n\t\t\n      #You say nothing, deciding to focus on your work.\n\t    \n        Sam looks over to you, eyes narrowing slightly, \"Is everything OK?\"\n\t\t\n        You just nod, deciding it's best to move on.  \n\t\n        *goto panel_complete\n\t\t\n    *label panel_complete\n    \"Take a look at this.\" Sam says, pointing towards the panel.\n\t\t\t\n    You don't see anything out of the ordinary, and you tell him as much.\n\t\t\t\n    \"Nailed it ${name}. This puzzles a joke. Nothing's broken, nothing's wrong.\" He shrugs his shoulders, \"It's just a mess. The only secret here is how to sort through the wires before we die of old age.\" Sam rolls his eyes, \"After the robot, I'm a little bit disappointed.\"\n\t\t\t\n    You smile, now this is the Sam you remember. \n\t\n    *page_break\t\t\n    \"Care to give me a hand?\" He says, carefully working his way through the coils. \n\t\t\t\n    You nod, taking a battery powered soldering iron from your pack, along with a coil of solder. Standard issue gear for a Culling. \n\n    \"I'll sort, you seal. We'll be done with this in no time flat.\" He smirks.\n\t\n    And he's right, the whole thing takes less than five minutes. \n\t\n    As you finish applying the last dab of the silvery substance, you turn to see that the guards are standing still, trying their best not to notice Victor and Rachel. When you connect the final wire, the doors open behind them, the guards choose to ignore this as well. \n\t\t\t\n    Work complete, you and Sam walk towards the exits. \n\n    Before you arrive, Victor intercepts you. He explains that if the guards ask, your smart phone doubles as a \"human camera detector,\" and that [i]no one[/i] is a camera. \n\t\n    You have no idea what that means, but you decide to keep it in mind. \t\n\t\n    *page_break\n\t\n    *goto marketers_crisis\n  \n  #You try to fight the people at the door.\n    *set combat +large\n    *set Cyan +large\n    \n    You decide that the people are more dangerous than the panels. You unsling your stun baton and walk towards the arguing group.\n\t\t\t\n    \"You never let me stand in front of the right door. Always the left. Left, left, left.\" Snarls the taller, stockier guard. \n\t\t\t\n    \"They told us that I need to stand right, and you need to stand left. It's the rule.\" A shorter guard with coppery hair replies. \n\t\t\t\n    \"What does it matter? We've been standing here for days! I just want to do something different. You're just doing this to spite me!\" The taller man groans.\n\t\t\t\n    \"They have cameras!\" The shorter man tries to match his friend's groan with one of his own. \n\t\t\t\n    \"You're a camera.\" The taller man stamps his feet.\n\t\n    This looks like it could go on for a while, what do you do?\n\t\n    *fake_choice\n\t\n      #Step in to interrupt.\n\t  \n        You step forward, coughing into your hand to get their attention. \n\t\t\n        The two guards turn to look at you, stun batons raised. They suddenly seem a lot more dangerous.\n\t\t\n        You start coughing wildly, hoping that they decide you're just suffering from tuberculosis or something. Fortunately, that's exactly what they do. After a few seconds, they completely forget about you, and pick up where they left off.\n\t\t\n        *page_break\n\t\t\n      #Let them keep talking.\n\t  \n        *page_break\n\t\t\n        You look to Victor who shrugs his shoulders, and decide to let this play out.  \n\t\t\t\n    \"I could be! You don't know! This is The Farm. We all could be cameras,\" he pauses, \"wait a second...\"\n\t\t\t\n    \"No, you admitted it! You're a camera!\" The taller man interrupts, \"You're a camera whose trying to spy on me!\"\n\t\t\t\n    \"That doesn't make any sense.\" The shorter man.\n\t\t\t\n    \"Says the camera...\" The taller man.\n\t\t\t\n    \"I'm just following the rules!\" The shorter man.\n\t\t\t\n    \"The rules can go jump in a lake.\" The taller man.\n\t\t\t\n    \"You can go jump in a lake!\" The shorter man.\n\t\t\t\n    \"I would but I'm stuck at this door all day because of you and your camera-rules!\" As this continues, Rachel and Victor watch on, scratching their heads. Meanwhile, the clock is ticking. \n\t\t\t\n    You've waited long enough, you clear your throat, stepping into the fray. \n\t  \n    The two men turn towards you. You smile and swing your baton twice, striking each hard on the shoulder. They howl, flail and fall into a pile at your feet.\n\n    \"Well, that's one way to do it.\" Victor snickers. As the men hit the ground, both doors open and you see Sam walking towards you. \n\t\n    *page_break\n\t\n    As the group gathers, the guards start to wake up. \n\t\n    Unsurprisingly, they don't seem happy. \n\t\n    It's time to leave. \n\t\n    *goto marketers_crisis   \n\n  #You try to resolve the conflict.\n    *set marketing +large\n    *set Victor +large\n\t\n    You decide that people are more dangerous than panels. You unsling your stun baton and walk towards the arguing group.\n\t\t\t\n    \"You never let me stand in front of the right door. Always the left. Left, left, left.\" Snarls the taller, stockier guard. \n\t\t\t\n    \"They told us that I need to stand right, and you need to stand left. It's the rule.\" A shorter guard with coppery hair replies. \n\t\t\t\n    \"What does it matter? We've been standing here for days! I just want to do something different. You're just doing this to spite me!\" The taller man groans.\n\t\t\t\n    \"They have cameras!\" The shorter man tries to match his friend's groan with one of his own. \n\t\t\t\n    \"You're a camera.\" The taller man stamps his feet.\n\t\n    *page_break\n\t\n    \"I could be! You don't know! This is The Farm. We all could be cameras,\" he pauses, \"wait a second...\"\n\t\t\t\n    \"No, you admitted it! You're a camera!\" The taller man interrupts, \"You're a camera whose trying to spy on me!\"\n\t\t\t\n    \"That doesn't make any sense.\" The shorter man.\n\t\t\t\n    \"Says the camera...\" The taller man.\n\t\t\t\n    \"I'm just following the rules!\" The shorter man.\n\t\t\t\n    \"The rules can go jump in a lake.\" The taller man.\n\t\t\t\n    \"You can go jump in a lake!\" The shorter man.\n\t\t\t\n    \"I would but I'm stuck at this door all day because of you and your camera-rules!\" At this point, you realize that if you don't do something, you'll be here all day.\n\t\n    *page_break\n\t\t\t\n    Suddenly, you have an idea. \n\t\n    You catch Rachel's eye and ask her whether she brought her \"camera detector.\" \n\t\n    She nods solemnly. One of the things you love about Rachel is that she never shies away from a good con. \n\n    \"Are we really going to help these two? I mean, what if they're cameras?\" Victor doesn't miss a beat. \n\t\t\t\n    \"We have to, it's the right thing to do, and they deserve to know.\" Rachel pulls her phone from her pocket and waves it over them.\n\t\n    At this, they both freeze.\n\t\n    \"Wait a second here,\" the shorter man breaks in, \"you can tell us whether or not people are cameras? Is that even a real thing?\" He turns to face you, his manner one part suspicion and three parts hope. \n\t\n    What do you say?\n\t\n    *choice\n\t\n      #You try to bluff, explaining that it's standard equipment on modern smart phones.\n\t  \n        *page_break\n\t  \n        You nod, crossing your arms in front of your chest and explaining that anti-surveillance software is a critical and standard tool of modern business, and that the Culling is the best place to learn to use that tool out in the field.\n\n        This is only half a bluff, anti-surveillance software [i]is[/i] standard on most smartphones, but since human beings are only rarely cameras, it's unlikely to have any effect on them.\t  \n\t  \n        Regardless, they seem to believe you. Both of them stand motionless, and wait for Rachel to finish her scan. \n\t \n        *goto doors_conversation_complete\n\t  \n      #You tell them that of course you can, and you'd be happy to help them out for a price.\n\t  \n        *page_break\n\t  \n        You nod, crossing your arms in front of your chest and explaining that anti-surveillance software is a critical and standard tool of modern business, and that the Culling is the best place to learn to use that tool out in the field.\n\t  \n        This is only half a bluff. Anti-surveillance software [i]is[/i] standard on most smartphones, but since human beings are only rarely cameras, it's unlikely to have any effect on them.\t\n\t  \n        Regardless, you let them know that you'd be happy to check on their \"camera status\" for a nominal fee. At the word \"fee,\" Rachel and Victor look at you curiously.\n\t  \n        *if marketing > 16\n          *set wealth +small_cash\n          *set ruthlessness +small\n          *set charisma +small\n          *achieve cameradetector\n\t\t\n          You press forward, making your case to them. Surprisingly, they seem to buy it. They reach into the pockets of their jumpsuits, removing their phones. An instant later, your own phone vibrates, letting you know that chits have been deposited into your account. \n\t\t\n          After dividing them between the rest of the team, you're left just a little bit richer.\n\n          With that done, the two guards stand very still, and wait for Rachel to complete her s
