t, what's the bounty up to?\"\n\t\n    \"2000 chits for a complete solution.\" The tall man responds.\n\t\n    That's a lot of money...\n\t\n    *page_break\n\t\n    \"Great! Well ${name} will be working from the empty desk over in the corner. If ${pronoun} needs anything, be sure to help out.\"\n\t\n    The group smiles and nods, but you're fairly certain that none of them believe you can do it. \n\t\n    Once they're gone, you turn to Trish and ask her what you're actually supposed to be working on.\n\t\n    \"Cats, ${name}. A whole lot of cats.\" She grins.\t\n\t\n    *page_break\n\t\n    You spend the next several hours staring at cats.\n\t\n    The client, you discover, runs a service that can identify a cat's breed instantly from any Smart Phone or pair of eEyes. Apparently, this is part of some larger system to help people find lost pets.\n\t\n    Unfortunately, as it stands, \"instantly\" takes about thirty seconds. The company contracted LampLight to fix that, which means coming up with a fast way to make sense of millions and millions of pictures of cats sleeping, eating, walking around, and batting at flies. \n\n    So far, everything they've come up with has lead to nothing but server fires. \n\n    So far, you haven't done much better. \n\t\n    *page_break\n\n    Somewhere between beating your head against your desk and playing solitaire, you come up with the idea that you might be able to rig up a weakly intelligent AI to sift through the images for you. It makes sense, but would probably take two days to finish, and that's not necessarily time you have. There is also a chance that you're wrong, and if you are, all that work would be for nothing.\n\n    A much faster option would be to get someone else to build it for you. You came up with the idea, and now if you could only convince someone to do the actual work, it would save a lot of time. That being said, you doubt Trish would appreciate you pawning your job off on someone else. \n\t\n    Finally, you realize that this is a great opportunity to talk to Trish one on one. So much has changed since the Culling, it might be nice to just sit and chat. Nice, but unlikely to keep you from conscription.\n\t\n    What do you do?\n\t\n    *choice\n      *selectable_if (charisma > 20) #You attempt to charm someone into doing your work for you.\n        *set wealth +large_cash\n\t\t\n        *page_break \n\t\t\n        Startups are about collaboration, right? \n\t\t\n        Sometime after lunch, you walk over to the tall man who had spoken up during the meeting. You tell him about your idea, and ask if he would be interested in helping you put together a prototype.\n\t\t\n        \"That's not half bad...\" He looks between you and his computer screen, you can't imagine how much work he still has to do. \n\t\t\n        You smile your best smile.\n\t\t\n        \"I mean, I don't know, I'm really busy...\" He taps his desk lightly. \n\t\t\n        You sigh, offering him half the bounty, it's only fair. His face lights up.\n\t\t\n        \"I'm in. Let's get started!\"\n\t\t\n        You both laugh.\n\t\t\n        *page_break\n\t\t\n        It turns out that the man's name is Eric, and with his help, you manage to finish a prototype by the end of the day. \n\t\t\n        It's not perfect, but with a little bit of tweaking, it should work just fine. \n\t\t\n        More importantly, it's good enough to earn you both the bounty! Once the code is submitted, an automated system credits your account with 2000 chits. You immediately transfer half that sum to Eric.\n\t\t\n        \"Pleasure doing business with you ${name}. Good luck!\" He whistles as he walks back to his desk. \n\t\t\n        *goto trish_scene_end\n\t\t\n      #You try to force Trish to help you, knowing she has other work to do.\n        *set Trish -xlarge\n        *set wealth +xlarge_cash\n        *set ruthlessness +large\n\t\t\n        *page_break\n\t\t\n        You've spent the last twenty minutes staring at the screen, wondering what you'll look like in a yellow jumpsuit. \n\t\t\n        There is just no way you're going to get this done in time. Not alone, at least. \n\t\t\n        Worse, there is no one in the office that you think you could strong arm into working with you. \n\t\t\n        No one, except...\n\t\t\n        *page_break\n\t\t\n        \"No ${name}, I can't.\" Trish's voice is calm, confident. \n\t\t\n        You ask again.\n\t\t\n        \"Seriously ${name}, I just can't do it. I've got my own work and it's piling up, not to mention the fact that Darren hates me... Why do you think I asked you to do this in the first place?\"\n\t\t\n        That's a good point. Trish is a much better Engineer than you, there is no other reason she couldn't have finished this herself.\n\n        You ask again, reminding her that if you don't get this money, you're getting sent off to The Farm. You also remind her how much she hates The Farm, and how bad she'll feel knowing she was responsible for your conscription.\n\t\t\n        \"That isn't fair ${name}...\" She's wavering.\n\t\t\n        You're silent. \n\t\t\n        \"Fine... Let's do this.\"\n\t\t\n        *page_break\n\t\t\n        Trish is visibly irritated the entire afternoon, but that doesn't stop her from writing some of the best code you've ever seen. With her help, you manage to finish a prototype by the end of the day. \n\t\t\n        It's not perfect, but with a little bit of tweaking, it should work just fine. \n\t\t\n        More importantly, it's good enough to earn you both the bounty! Once the code is submitted, an automated system credits your account with 2000 chits. You look to Trish, who shrugs her shoulders.\n\t\t\n        \"Keep it ${name}, you need it more than I do...\" \n\t\t\n        You're not entirely certain that's true.\n\t\t\n        *goto trish_scene_end\n\t    \n      *selectable_if (engineering > 20) #You complete the task yourself.\n        *set wealth +xlarge_cash\n        *set Trish +medium\n        *achieve freelanceengineer\n\t\t\n        *page_break\n\t\t\n        This isn't going to be easy, but if you want to keep out of The Farm, you're going to have to try.\n\t\t\n        You spend the rest of the day, and most of the night, writing code. Fortunately, LampLight has a policy that engineers are allowed to sleep over if they're actively working on projects. \n\t\t\n        Trish seems impressed by your dedication, even though you never see her leave her desk, except to get coffee and to roll over into a nearby cot for a power nap. \n\t\t\n        There is a part of you that thought that working for a startup would be a little more glamorous. \n\t\t\n        *page_break\n\t\t\n        By 3AM, you manage to scratch together a prototype -- hours earlier than you expected. \n\n        It might not be perfect, but with a little bit of tweaking, it should work just fine. \n\t\t\n        More importantly, it's good enough to earn you the bounty! Once the code is submitted, an automated system credits your account with 2000 chits.\t\t\t\t\n\t  \n        *goto trish_scene_end\n\t\t\n      #You spend your time talking to Trish.\n        *set Trish +xlarge\n        *set wealth +large_cash\n\t\t\n        *page_break\n\t\t\n        After a few hours of painful coding, you realize that there is no way you're finishing this. \n\t\t\n        Equally important, the longer you sit here, the more you notice how sad Trish looks. \n\t\t\n        As lunch rolls around, you push yourself from your desk and walk over to her. \n\t\t\n        \"Need something ${name}?\" She stops typing, looking up to you with a forced smile. \n\t\t\n        You remind her that it's lunch time, and that most people have already left.  \n\t\t\n        \"Yea, sorry. I've just been distracted.\" She looks around the room, like she has just now realized where she is. \n\t\t\n        You ask her what's wrong.\n\t\t\n        *page_break\n\t\t\n        \"Nothing ${name}.\" She takes a breath, \"Nothing I should be complaining to you about.\" She pauses, \"It's just that all of this,\" She waves one hand around the room, \"it's not what I expected.\"\n\t\t\n        You take a moment to really look at the office, with it's off-gray walls and bizarrely giddy desk kitsch. You can't imagine anyone could have expected this.\n\t\t\n        \"I thought that working for a startup would be exciting...challenging...new. But really, it's just...work.\" She lowers her voice so that only you can hear, \"Darren is totally insane and Roland, his Partner, barely leaves his office. The people are all incredibly nice, don't get me wrong, but I just don't know if I'd be willing to fight and die for this place.\"\n\t\t\n        While corporate raids have become less frequent in recent years, certainly less frequent than when your parents were working, with a Founder like Darren, it was inevitable that one day Trish would be asked to defend this office against a rival startup.\n\n        \"I don't know.\" She points to a nearby seat, which you take, \"I'm just glad you decided to visit. I really needed to see a friendly face.\"\t\t\n\t    \n        *page_break\n\t\t\n        You spend the rest of the afternoon chatting with Trish. You talk about the Culling, you talk about work, you talk about family. When you do, you learn that her parents were actually conscripted to The Farm before she was born, that she grew up watching them work 18 hour days with nothing to show for it but a few yellow jumpsuit. \n\t\t\n        \"I hated it. For a long time I hated them. I blamed them for not working hard enough, for not being good enough to give us a better life.\" She sighs, \"What I didn't realize was that every chit they made went into sending me to the best schools, providing me with the best Culling tutors.\" She grimaces, \"They sacrificed what little they had to make sure I had a better life...\" She smiles a crooked, little smile, \"Now look at me. I'm complaining because I don't like my boss.\"\n\t\t\n        What do you say?\n\n        *choice\n\n          #You tell her that it wasn't her fault, she was a kid and couldn't have known any better.\n            *set ruthlessness -medium\n\t\t\t\n            *page_break\n\t\t\t\n            \"I know, I know. I don't really blame myself -- not anymore. I just wish I hadn't been so awful to them.\" She lifts one shoulder, looking down at her computer.\n\n            A moment later, her eyes go wide. \t\n\t\t\t\n            *goto trish_talk_end\n\t\t\t\n          #You tell her that her parent's were brave, and that they must be proud of her.\n            *set ruthlessness -medium\n\t\t\t\n            *page_break\n\t\t\t\n            \"'Were?' They still are.\" It sounds like a joke, but you know that it isn't, \"They have a decade left in their contract. Even after that, The Farm isn't exactly known for their retirement benefits. I need to make this work. They supported me for years, now it's my turn.\"\n\t\t  \n            She looks down to her computer, and then her eyes go wide. \t\t\t\n\t\t\t\n            *goto trish_talk_end\n\t\t\t\n          #You remind her that there is still the matter of keeping you off the Farm. \t\t \n            *set ruthlessness +medium\t\t  \n\t\n            *page_break\n\t\t\t\n            \"Right as always ${name}. This is exactly why I didn't want to get into this. Now, let's see what we can do about...\" She looks down at her computer, and then her eyes go wide.\t       \n\n            *goto trish_talk_end\n\t\t\n        *label trish_talk_end\t\n\t\n        *page_break\n\t\t\n        \"${name}, it's 7 o'clock.\"\n\t    \n        You check your phone. It is, in fact, seven. You've used an entire day and you haven't earned a single chit. \n\n        \"Oh no, this is my fault... I'm so, so sorry...\" She thinks about this for a moment, \"Actually, I'm not sorry at all, it was really nice spending time with you,\" then winks, a soft smile spreading across her face, \"that's not going keep you off The Farm though, now is it?\" \t\t\n\t\t\n        As fun as it was spending the afternoon with Trish, she's right, you're running out of time.  \n\t\t\n        \"Wait, I have a thought!\" Her face lights up, \"Your idea for the AI was pretty good, the only problem is, you're not good enough to code it,\" another wink, \"I am. Since I know you don't have much time, I'll just give you 1000 chits now, and spend the rest of the night putting together the prototype. In the morning, I'll submit it and collect the bounty. 1000 for you, 1000 for me, fair and square.\"\n\t\t\n        You decide that this is the best deal you're going to get and agree.\n\n        \"Wonderful!\" She's beaming.\n\t\t\n        You find that you are as well.\n\n        *goto trish_scene_end\t\t\n\t\n    *label trish_scene_end\n\t\n    *page_break \n\t\n    It's time to go home. \n\t\n    As fun as hanging around LampLight is, you have a lot more work to do if you're going to avoid The Farm. \n\t\n    You wave goodbye to Trish, who gives you a friendly nod before returning to her work. \n\t\n    With that out of the way, you head for the elevator, and take it down to a waiting car. \n\t\n    When you arrive back home, you fall asleep almost immediately.  \n\t\n    *if (find_money_counter = 0)\n      *goto scene_two_freelance_end\n    *else\n       You wake up at 10 AM to your alarm clock.\n\t   \n       What is your next move? \n\t   \n       *goto scene_two_freelance\n\t\n\t\n\t\n  *disable_reuse *selectable_if (Victor > 24) #You call Victor looking for work.\n  \n    *page_break\n\t\n    Your phone rings and rings and rings before he answers... \n\n    \"Victor here.\" Victor's voice is a dried husk of what you remember. You blink. There's silence before he starts again, a little more annoyed this time, \"Who is this? I don't have all day.\"\n\n    You tell him, wondering why he doesn't just look at your name on his phone. As the words leave your mouth, he cuts you off -- \n  \n    \"${name}!\" Immediately he sounds like Victor again, \"Great to hear from you buddy. What's shaking?\" From the engine noise in the background, you realize that he must be driving. That's why he didn't know who you were. \n  \n    You ask him how things are going. \n  \n    *page_break\n\t\n    \"Going? I'm killing it over here! Lindsay says that if I keep it up, I'll be running this place in six months.\" You doubt that Victor is on a first name basis with the Sensewerks Founder, but maybe he is. And even if he isn't, it doesn't hurt to let him pretend -- especially when you're about to ask for a favor. \n  \n    You explain your situation.\n\n    \"Done. And as luck would have it, I have just the right thing for you. Meet me downtown.\" He gives you an address, but not for the Sensewerks office, it's to a set of expensive sounding condominiums called Rainier Plaza. \n  \n    You don't have a lot of time left, and this seems like an odd detour. What do you do?\n    \n    *choice\n\n      #You agree to meet him, whatever he's up to, you trust Victor completely.\n        *set Victor +medium\n        *set find_money_counter -small\n\t\t\n        *page_break\n\t\t\n        You tell him that you will, even though this entire thing seems a little weird.\n\t\n        \"Can't wait to show you what's on the menu!\" The phone clicks. Victor is gone. \n\t\n        You can't wait either, this should be interesting. You quickly call for a car to take you downtown. \n\n        *goto victor_outside_the_building\n\t\t\n\t \n      #You ask him why you aren't meeting in his office. \n        *set Victor -small\n        *set find_money_counter -small\n\t\t\n        *page_break\n\t\t\n        You tell him that Sensewerk's office is on the other side of town, and ask him why you can't just meet there.\n\t\n        \"Are you the one asking for the favor or am I?\" He chuckles, then clears his throat, \"They're painting the building, you can smell it from across town. We're all working out of office today.\" When you don't answer, he takes a breath, \"Come on, would you just trust me for half a second? Have I ever let you down?\"\n\t\n        Victor was right. He has never let you down. Lied, exaggerated and completely misrepresented the facts of a situation, yes, but he's [i]always[/i] helped you come out on top.\n\n        You tell him you'll be right there, and then call for a car.\n\n        *goto victor_outside_the_building \t\t\n\t\t\n\t  \n      #You decline the offer, you don't have time for this.\n        *set Victor -large\n\t\t\n        *page_break\n\t\t\n        It's not that you don't trust Victor, it's just that you don't trust Victor to think of your well being over his ego.\n\t\n        You thank him for the offer, but tell him that you're going to try a few other options. \n\t\n        \"Whatever you want ${name}. Never say I didn't try to help.\" He sounds more disappointed than upset. You thank him again and then hang up the phone.\n\t\n        It's time to try something else. \n\t\n        *goto scene_two_freelance\n\t\n\t\n    *label victor_outside_the_building\n\t\n    *page_break\n\t\n    You find yourself in front of the Rainier Plaza. \n  \n    It's a massive steel and glass building with condominiums designed for extremely wealthy Founders, and Veecee's who can't quite afford estates. As such, security is tight. A pair of yellow clad Farm guards stand at the door. They're carrying stun batons and look like they know how to use them. \n  \n    It reminds you a little of the Culling, except these two are definitely professionals. \n  \n    *page_break\n\t\n    \"Move along.\" The female guard says. Her hair is tied back into a tight bun, and her steely eyes are locked onto yours.\n\n    \"Just get out of here kid. If you don't live here, you're not welcome.\" The man, whose face is covered in decades old acne scars, chimes in -- his gaze is softer but no less pointed. \n\n    You still haven't seen Victor.\n\n    You try to tell them that you're waiting for someone, they both look at you incredulously. Clearly, this is a line they've heard before. \n\n    \"Oh yea? Who exactly are you waiting for?\" The woman asks, tapping her hand against the baton at her hip. \n\n    Who do you say you're here to meet?\t\n  \n    *choice\n      #You tell the truth, explaining that your friend, Victor, is meeting you here.\n        *set ruthlessness -medium\n\t\t\n        *page_break\n\t\t\n        You explain the situation from the beginning. They watch you with hard stares, you can't be certain, but you think they might be scanning you. The woman's eyes glint, which could be a trick of the light, but is more likely a pair of eEyes.  \n\t\n        These guys are serious business. \n\t\n        \"The name sounds familiar.\" The man frowns, he's paid to remember names, and the fact that this one has slipped his mind seems to bother him.\n\t\n        \"Of course it does, do you know how many 'Victors' there are in this city?\" The woman takes a step towards you. You hear a click as she unholsters her baton, \"Just leave...please. I promise it'll be much easier.\"\n\t\n        The man is still lost in thought, it doesn't look like he's going to be much help. \n\t\n        Still, there is a small chance that you can take her down before she turns on her baton, the only problem is that if you fail, it's going to hurt. \n\t\n        What do you do?\n\t   \n        *choice\n\t\t\n          #You attack the woman, hoping to stop her before she can turn on the baton.\n\t\t    \n            *if (combat > 12)\n              *set combat +medium\n\t\t\t  \n              *page_break\n\t\t\t  \n              She's faster than you expect, and you just barely dodge her initial blow. Before she can follow up, you dance away, deciding to stay on the defense. \n\t\t\t  \n              She looks at you, sighing, \"Leave. Please don't make me call the cops.\"\n\t\t\t\n              You shake your head, digging your heels in and hoping that Victor gets here soon.\n\t\t\t  \n              *goto miss_lefay_entrance\n\t\t\t  \n            *else\n              *set combat -medium\n\t\t\t  \n              *page_break\n\t\t\t\n              You start moving, but she's faster than you expect and punches you in the jaw. Before you can regain composure, she hits you with the stun baton and you're writhing on the floor. The fight ends quicker than it began.\n\t\n              \"Get out of here before I call the cops.\" The woman watches you wearily as you crawl to your knees. The man just looks annoyed. \n\t\n              With your day completely ruined, you decide to head back home. You remind yourself to call Victor, and explain the importance of being on time. \n\n              You spend the rest of the afternoon fuming over Victor's lack of responsibility and icing your face. When night falls, you turn in early.\n\t\t\t\n              *if (find_money_counter = 0)\n                *goto scene_two_freelance_end\n              *else\n                You wake up at 6:30 AM to your alarm clock.\n\t   \n                What is your next move? \n\t   \n                *goto scene_two_freelance\n            \t\t\t\n\t\t  \n          #You stand there, hoping that she's just bluffing.\n            *page_break\n\t\t\t\n            She stops about two steps away from you and waits. It looks like she has decided that rather than beating you senseless, she'll just stare you down. \n\t\n            You dig in your heels and hope that Victor shows up soon. \n\t\t    \n            *goto miss_lefay_entrance\n\t\t\t\n          #You walk away, this isn't worth the trouble.\n            *page_break\n    \n            Victor isn't showing up, and you aren't about to get into a fight just to buy him more time. \n\n            You thank the guards for their patience, and they respond by shrugging their shoulders. \n\n            A car arrives in less than five minutes to take you home.\t\n\t\t  \n            You spend the rest of the afternoon fuming over Victor's lack of responsibility. When night falls, you turn in early.\n\t\t\t\n            *if (find_money_counter = 0)\n              *goto scene_two_freelance_end\n            *else\n              You wake up at 6:30 AM to your alarm clock.\n\t   \n              What is your next move? \n\t   \n              *goto scene_two_freelance\n       \t  \n        *label miss_lefay_entrance\t\n\n        *page_break\n\n        It's just then that a young woman with short, red hair and an extremely nice suit walks up to the door, \"Victor's that new guy from Sensewerks, isn't he?\" She looks towards you, flashing a winning smile, \"Big mouth, nice hair?\"\n\t\n        That's Victor alright, but who is she? \n\n        The Farm woman raises an eyebrow, \"You know ${himher_f} Miss LaFey?\" Her gaze has softened, but not by much.   \n\n        The woman thinks on this for a long while, \"I don't know. Maybe.\" She shrugs, she doesn't seem all that concerned, \"What's your name?\" Instead she turns to you, looking you up and down. \n\t\n        You tell her.\n\t\t\n        *page_break \n\t\n        \"Well, ${name}. I think you've been standing out here long enough. If you'd like, you can wait inside with me.\" She nods to the guards, who relax at her words.\n\n        \"Are you sure about that, Miss LaFey?\" The Farm man finally speaks. \n\n        \"I'm sure Keith. Thank you both.\" They nod, standing aside. \n\n        With that, the woman leads you into the building. \t\n  \n        *goto victor_miss_lefay  \n\t\n      #You lie, relying on charm to convince them that you have business here.\n        *set ruthlessness +medium\n        *set lie_count +small\n\t\t\n        *if (charisma > 20)\n          *set charisma +medium\n          *page_break\n\t\t\n          You decide to tell them that you work for Sensewerks, which isn't entirely untrue, Victor works for Sensewerks, and you kind of work for Victor today. \n\t\n          This shouldn't be a problem, unless they ask for your Culling ID, in which case, you're glad you're wearing your running shoes. \n\t\n          At the word \"Sensewerks,\" the Farm man steps forward, \"Victor you say? I think I remember him.\" He scratches his head, \"New Account Something-or-Another, right? Real proud? Real green? Can't stop talking about...\" He pauses, \"Well, just can't stop talking...\" \n\t\n          Yup, that's Victor alright. You nod.\n\t\n          *page_break\n\t\t  \n          \"You folks sure were giving him Hell the last time you were here. I kind of felt bad for the guy.\" The man looks at you disapprovingly, before you can respond, the woman takes over. \n\t\n          \"OK, OK. Let's say you are who you say you are, that still doesn't answer who you're here to see.\" Her flinty stare never wavers.\n\t\n          That's a good point. Unfortunately, you're fresh out of answers.\n\t\n          \"He's here to see me.\" A voice from behind you rings out.\n\t\n          *page_break\n\t\t  \n          When you turn, a young woman with short, red hair and an extremely nice suit greets you with a smile. \n\t\n          \"Is that right Miss LaFey?\" Says the man. Both guards look confused.\n\t\n          Miss LaFey shrugs her shoulders, \"Sure, why not?\" She looks towards you, \"What's your name, anyway?\"\n\t\n          You give it to her. \n\t\n          *page_break\n\t\t  \n          \"Well, ${name}. I think you've been standing out here long enough. If you'd like, you can wait inside with me.\" She nods to the guards, who relax at her words.\n\n          \"Are you sure Miss LaFey? We can send ${himher_f} up when this Victor character arrives.\" The Farm man offers. \n\n          \"I'm sure you could Keith, but that won't be necessary. Thank you both.\" They nod, standing aside. \n\n          With that, the woman leads you into the building.\n\n          *goto victor_miss_lefay\n\t\t  \n        *else\n          You decide to tell them that you work for Sensewerks, which isn't entirely untrue, Victor works for Sensewerks, and you kind of work for Victor today. \n\t\n          This should work out just fine, unless they ask for your Culling ID, in which case, you're glad you're wearing your running shoes. \n\t\n          At the word \"Sensewerks,\" the Farm man steps forward, \"Is that right? Mind if we look at your ID? Just to verify, of course.\"\n\t\t  \n          Of course. \n\t\t  \n          *page_break\n\t\t  \n          The rest plays out as you might expect.  \n\t\n          Because it's a nice complex, they only threaten to call the cops rather than beating you senseless. \n\t\n          You take that as a win. \n\t\n          Five, awkward minutes pass before a car arrives to take you home.\n\t\t  \n          You spend the rest of the afternoon fuming over Victor's lack of responsibility. When night falls, you turn in early.\n\t\t\t\n          *if (find_money_counter = 0)\n            *goto scene_two_freelance_end\n          *else\n            You wake up at 6:30 AM to your alarm clock.\n\t   \n            What is your next move? \n\t   \n            *goto scene_two_freelance\n\t\t\n      #You try to convince them that you live here.\t\n\t    \n        *page_break\n\n        You tell them that you live here. \n\t\n        They ask you for your Culling ID. \n\t\n        The rest plays out as you would expect. \n\t\n        Because it's a nice complex, they only threaten to call the cops rather than beating you senseless. \n\t\n        You take that as a win. \n\t\n        Five, awkward minutes pass before a car arrives to take you home.\n\t\t  \n        You spend the rest of the afternoon fuming over Victor's lack of responsibility. When night falls, you turn in early.\n\t\t\t\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n          You wake up at 6:30 AM to your alarm clock.\n\t   \n          What is your next move? \n\t   \n          *goto scene_two_freelance\n\t\n\t\n    *label victor_miss_lefay\n\t\n    *page_break\n\t\n    The woman takes you to a nearby elevator. As you step inside, you ask her why she decided to help.  \n  \n    \"My name is Morgan by the way.\" She shakes your hand, then clears her throat, \"As for why I helped, there are two reasons: the first is that I like Vic, and you don't seem like the kind of jerk that Sensewerks usually sends to watch over him.\" \n  \n    You want to ask her exactly what kind of jerk Sensewerks usually sends, but you still don't know who you're supposed to be, or what you're supposed to know, so instead, you ask her for the second reason. \n  \n    She offers you a conspiratorial smile in exchange, just as the elevator dings, opening onto one of the largest condominiums you have ever seen, \"Oh, I thought you would have guessed that by now...\"\n  \n    You can't help but laugh as you see Victor sitting cross-legged on a gorgeous, white couch. \n  \n    \"Glad you made it ${name}, now take a seat.\"\n  \n    *page_break\n  \n    \"Sorry for the smoke and mirrors friend. I meant to call you, I really did, but I was a little... distracted.\" \n\n    Distracted... You sigh. \n  \n    A few minutes ago, Morgan excused herself to take a call, apparently there is still one more guest missing. That leaves you and Victor alone, with enough time to talk about why you're here, and how any of this will keep you out of The Farm.   \n  \n    You ask him what the plan is. \n  \n    \"Great question. It's pretty simple really. Sensewerks wants to do business with Miss LeFey's startup. There is a challenger coming to try to outbid us. Our job is to get the best possible price out of her. I've already laid some of that ground work,\" he smirks, \"all I need from you is to do your magic.\"\n  \n    You aren't sure how magical you're feeling today, but at least the plan made sense. You ask him what's in it for you. \n  \n    \"1% commission. Not a bad deal, right?\" He looks around the room, a frown forming on his lips, \"This is a really nice place, must be great living here...\"   \n  \n    You still have time to ask one more question, what do you say?\n\t\n    *choice\n      #You ask him what exactly you're trying to sell.\n        *set you_know_about_r4 true\n\t    \n        *page_break\n\t\t\n        \"Does it really matter?\" \n  \n        You nod, he smirks. \n   \n        \"Fine... You know that show [i]Oscar the Ocelot[/i]?\"\n  \n        You did. It was a children's show about an Ocelot puppet that looked a lot like a cat and went around solving mysteries in the Outback. It was pretty cute. \n  \n        \"Great. You see, Morgan's company manufacturers tens of thousands of these very expensive, semi-autonomous Oscar toys for children across the world. We want to supply her with robotic cat whiskers. Well, one whisker in particular, L3.\" He takes a breath, releasing it slowly, \"They tell me it's the most important one, that and R4...\" \n  \n        He doesn't seem convinced, he looks stiff, tired. \n  \n        \"You know what? It doesn't matter what we're selling ${name}, all that matters is that we bring home the chits, right?\" \n  \n        Right. Still, you file those bits of information away -- they might come in handy later.   \n  \n        Just then, there is a knock at the door, and Morgan appears from around whatever corner she has been hiding in for the last few minutes. \n\t\t\n        *goto victor_cyan_enters\n\t\n      #You yell at him for leaving you downstairs with the guards.\n        *set Victor -medium\n        *set ruthlessness +small\n\t\t\n        *page_break\n\t\t\n        \"I said I was sorry ${name}.\" He frowns. \n  \n        You explain that sorry wouldn't have kept those guards from beating you to death, nor will it keep you off The Farm if this entire thing falls apart.  \n  \n        \"I know! Don't you think I know that?\" He looks stiff, tired, he buries his face in his hands, \"Look, it's been a long couple of weeks, and I'm really not myself right now. Let's just get through this, OK?\" \n  \n        There is something else happening here, but at the moment you're too annoyed to press deeper. \n\n        Just then, there is a knock at the door, and Morgan appears from around whatever corner she has been hiding in for the last few minutes.  \n\t\t\n        *goto victor_cyan_enters\n  \n      #You ask him if everything is OK at Sensewerks.\n        *set Victor +medium\n        *set ruthlessness -small\n\t\t\n        \"It's still...new.\" He locks eyes with you, \"I'm still new and my coworkers like nothing more than reminding me of that fact.\" \n  \n        In that moment he looks tired, nothing like the cool, confident Victor who you're used to. \n  \n        \"It's no big thing ${name},\" flashing a practiced smile, \"All it means is that this deal is as important to me as it is to you.\" He leans in closer, \"You know, I'm really glad you decided to turn up today.\"\n  \n        Just then, there is a knock at the door, and Morgan appears from around whatever corner she has been hiding in for the last few minutes.  \n \n        *goto victor_cyan_enters \n\t  \n    *label victor_cyan_enters\n\t\n    *page_break\n\t\n    \"Our guest of honor is here.\" Morgan says, gliding towards the door and swinging it open with a flourish. \n  \n    When you see who is on the other side, you almost pass out. \n  \n    The creature wears a beautiful, pin-striped robe and a mask with brilliant, blue eyes. At it's waist are two Slowguns that make the one Morgan wears look like a toy. \n  \n    It's Cyan. \n  \n    No recognition passes between you as it steps inside, it doesn't even acknowledge that you're there, instead nodding once to Morgan before leading her towards a large, wooden table across from the kitchenette. \n  \n    *page_break\n\t\n    Victor makes his way over. He has no way of knowing who Cyan is. You wonder whether you might be able to use your relationship with the Veecee to get a better deal for your friend. \n  \n    You have no idea how that would play out, or whether it would even work, but you do know Cyan wouldn't be happy. \n  \n    For now, you do nothing, taking a seat with the group. \n  \n    \"Victor, ${name}, this is a Veecee who works with our current supplier. It's here to discuss the deal on their behalf, I hope that's OK with the both of you.\" Morgan is clearly amused by this turn of events.\n\t\n    Victor is clearly shaken, meeting a Veecee in person is rare enough, trying to outbid one...\n\t\n    *page_break\n  \n    \"450,000 chits is our offer for the L3. I don't have to remind you that our designs are the best in the industry.\" Cyan's words are sharp, deliberate, even through the voice modulator. \n  \n    \"They're very good, there is no doubt,\" Morgan looks between Cyan and Victor, \"but I've had my team look at Sensewerk's product, and its good as well, it's also far less expensive. 100,000, wasn't it darling?\" There is threat in her voice. \n  \n    \"No, no...I don't think.\" Victor looks scared. You know that if you let him speak, nothing good will come of it. It's time to make a move.\n\n    What do you do?\t\n\t\n    *choice \n      #Rely on your business skills, giving Morgan a competitive counter-offer. \n\t  \n        You tell her that the home office has no record of that number, and that the last authorized bid you saw was 300,000 chits which -- you point out -- is still a steal. \n  \n        Morgan smiles, looking first at you and then at Cyan, \"300,000, eh? What do you say to that my hooded friend?\" \n\n        The color returns to Victor's face. You haven't won anything yet, but at least you're still in the game. \t \n\n        *page_break\n\n        The bidding war goes back and forth for a while, Victor has returned to form but Cyan is brutally aggressive, and has pushed the bid down to 200,000 chits. \n\t\n        You have a feeling that if you go just a little lower, you might be able to force it out of contention, but you know that the lower the bid, the less money you'll get at the end.  \n\t\n        You've also had some time to look over Sensewerk's operations manual while Victor and Cyan have been going back and forth, and you think there might be a few other strategies available to you -- if you're savvy enough.\n\t\n        What do you do?        \t\t\n\t\t\n        *choice\n          #Match the bid, but explain that Sensewerks service agreements far exceed industry standards. \n\t\t\t\n            *if (marketing > 20)\n              *set Cyan +medium\n              *set Victor +medium\n              *set wealth +xlarge_cash\n\t\t\t  \n              *page_break\n\t\t\t\n              Between volleys you decide to interrupt, launching into a brilliantly crafted lecture on the merits of long-term service agreements. \n\t  \n              You explain that 200,000 is the lowest bid that you're authorized to offer, but considering the quality of Sensewerk's service, going any lower would be all but criminal.\n\t  \n              When you finish speaking, Morgan and Victor are smiling, and even Cyan looks impressed. At least as impressed as someone wearing a faceless, ceramic mask can.\n\t  \n              \"Not bad at all ${name}. You know what, I think you're right. What do you think, Cyan?\"\n\t  \n              The Veecee lifts one shoulder, \"I think we're done here. It was a pleasure, as always, Morgan.\" With that, it stands, pushing itself away from the table, \"Thank you for the opportunity to discuss this.\" \n\t  \n              As it moves to the door, it offers you the briefest nod of its head, as if to say, \"Not bad.\" \n\t\t\t  \n              It looks like you won.\n\t\t\t  \n              *goto negotiation_end\n\t        \n            *else\n              *set wealth +1500\n\t\t\t  \n              Between volleys you decide to interrupt, lecturing everyone on the merits of long-term service agreements. \n\t\t\t  \n              You try to convince them that given the quality of Sensewerk's service, 200,000 is as low as you can reasonably go.\n\t\t\t  \n              Neither Morgan nor Cyan seem to be buying it, even Victor is looking at you like you've grown a second head. \n\t\t\t  \n              The silence builds until Victor jumps in to save you, \"150,000 chits. Take it or leave it, Morgan.\" Victor looks from you to her, smiling an impish smile. \n\n              Morgan perks up at the sound of his voice.  \n\t          \n              \"It's really not my call, now is it?\" She smirks, \"What do you think, Cyan?\"\n\t  \n              The Veecee lifts one shoulder, \"I think we're done here. It was a pleasure, as always, Morgan.\" With that, it stands, pushing itself away from the table, \"Thank you for the opportunity to discuss this.\" \n\t  \n              As it moves to the door, it offers you no sign of its feelings. \n\t\t\t  \n              That could have gone better.\n\t\t\t  \n              *goto negotiation_end\n\t\t  \n          *selectable_if (you_know_about_r4 = true) #Offer a counter of 300,000, but tell Morgan that Sensewerks is willing to include the R4 whiskers.\n            *set Cyan +medium\n            *set Victor +medium\n            *set wealth +3000\n            *achieve freelancemarketer\n\t\t\t\n            *page_break\n\t\t\t\n            Between volleys you decide to interrupt. You explain that you're actually raising your bid to 300,000 chits. \t\n\t  \n            \"${name}, traditionally we try to go in the other direction with this sort of thing.\" Morgan smiles, \"Why in the world do you think I should be paying you more?\"\n\t  \n            You go on to explain that if she takes your bid, in addition to the L3 whiskers, Sensewerks would be willing to include the R4s. \n\t  \n            \"Would you now?\" Morgan's interest is peaked.\n\t  \n            Victor jumps in, \"Of course we would, but only if we end this here. No more games.\"\n\t       \n            *page_break\n\t\t\t\n            She watches you like, well, like a Ocelot might a groovy mystery. After a few moments of this, she nods. You've won. \n\t  \n            The Veecee lifts one shoulder, \"I think we're done here. It was a pleasure, as always, Morgan.\" With that, it stands, pushing itself away from the table, \"Thank you for the opportunity to discuss this.\" \n\t  \n            \"Thank you Cyan, for taking the time.\" She replies. \n\t  \n            As it moves to the door, it offers you the briefest nod of its head, as if to say, \"Not bad.\" \n\t\t    \n            *goto negotiation_end\n\t\t\t\n          *selectable_if (you_impressed_cyan = true) #Send a text message to Cyan, explaining the situation, and asking it to back down.\n            *set Cyan -medium\n            *set marketing +medium\n            *set wealth +xlarge_cash\n\t\t\t\n            *page_break\n\t\t\t\n            Between volleys, you decide to take a gamble, sending Cyan a text message. \n\t  \n            [i]If you don't want me to end up on The Farm, you'll let me have this one.[/i] You hit send, and wait. \n\t  \n            Nothing happens for a while, and the battle continues. \n\t  \n            Victor is clever but Cyan is smarter, and in the end it looks like he's going to have to offer a lower price. \n\t  \n            Just as he's about to, the Veecee lifts one finger to where it's lips should be, \"I retract my bid.\" It says, flatly.\n\t  \n            Morgan lifts an eyebrow, \"Are you sure about that?\"\n\t  \n            *page_break\n\t\t\t\n            A sound like a laugh comes through Cyan's voice modulator, \"Yea. I think I am. They fought hard, and deserve the victory. In any case, I own 10% Equity in Sensewerks, so I win either way -- why waste the rest of my lunch break quibbling over a few chits?\"\n\t\t\t\n            \"200,000 it is then.\" Morgan's eyes are wide. \n\t  \n            None of us can help from laughing.\n\t  \n            The Veecee lifts one shoulder, \"I think we're done here. It was a pleasure, as always, Morgan.\" With that, it stands, pushing itself away from the table, \"Thank you for the opportunity to discuss this.\" \n\t  \n            \"Thank you Cyan, for taking the time.\" She replies. \n\t  \n            As it moves to the door, it offers you the briefest shake of its head, as if to say, \"Don't try that again.\" \n\t      \n            *goto negotiation_end\n\t\t\t\n          #Let Victor finish this, and accept whatever offer he comes to.\n            *set Victor +medium\n\t\t\t\n            *page_break\n\t\t\t\n            You decide to sit back and let this play out.\t\n\t  \n            You watch as Victor and Cyan volley back and forth. \n\t  \n            Your friend is clever, but Cyan is smarter, and in the end it looks like he's going to be forced into a lower price.\n\n            \"150,000 chits. Take it or leave it, Morgan.\" Victor looks to her, smiling an impish smile. \n\n            \"It's really not my call, now is it?\" She smirks, \"What do you think, Cyan?\"\n\t  \n            The Veecee lifts one shoulder, \"I think we're done here. It was a pleasure, as always, Morgan.\" With that, it stands, pushing itself away from the table, \"Thank you for the opportunity to discuss this.\" \n\t  \n            It looks like you won...sort of.\n            \n            As it moves to the door, it offers you no sign of its feelings. \n\t  \n            *goto negotiation_end\n\t\t\t\n        *label negotiation_end\n\t\t\n        *page_break\n\t\t\n        Morgan excuses herself after telling Victor that she'll have the chits transferred by weeks end. You know by the body language that passes between them, that whatever relationship he might have thought they had, ended when the ink dried. \n  \n        After almost a minute spent gawking at a ceramic bust of Alexander the Great sitting above Morgan's fireplace, Victor walks towards you.\n  \n        \"So that's Cyan, eh?\" He squeezes your shoulder, \"Morgan knew it would be coming the entire time, and never said a word. I guess that's why she's the Founder and we're not.\" He smirks, \"Still, can't beat the chits.\"\n\t\n        You thank him, telling him that this will go a long way towards keeping you off The Farm. \n\t\n        \"You're very welcome, though, I wish I could have done more.\" He looks to his watch, and then to you, \"Well, maybe I can. The office doesn't expect me back for an hour. Why don't you let me buy you a drink?\"\n\t   \n        This is the Victor you remember. \n\t\n        You agree immediately.\n\t\t\n        *goto victor_scene_end\n\t\t\n      #Rely on Victor, hoping he can pull himself together.\n        *set Victor -large\n        *set Cyan -large\n        *set wealth +large_cash\n\t\t\n        *page_break\n\t\t\n        Victor stutters, his fingers tapping loudly on the table. He looks to you, eyes begging for help. When it doesn't come, he opens his mouth, the words barely above a whisper, \"Yes.\"\n\n        Morgan looks like she's doing everything in her power to keep from laughing, \"You heard it straight from the horses mouth, can your people beat that, my hooded friend?\"   \n  \n        Cyan lifts a robed shoulder, \"My people wouldn't want to.\" With that, it stands, pushing away from the table, \"We appreciate the opportunity to discuss this with you, Miss LeFey.\"\n  \n        As it moves to the door, it offers you the briefest shake of its head, as if to say, \"That could have gone better.\" \n\t\n        *page_break\n\n        Morgan excuses herself after telling Victor that she'll have the chits transferred by weeks end. You know by the body language that passes between them that the news is even worse than it sounds, Victor has been played twice. \n  \n        After almost a minute spent gawking at a ceramic bust of Alexander the Great sitting above Morgan's fireplace, Victor walks towards you.\n  \n        \"Sorry about that ${name}. I didn't think we would be up against a Veecee.\" He squeezes your shoulder, \"Morgan knew though and never said a word, I guess that's why she's the Founder and we're not.\" He forces a smile, \"1000 chits is better than nothing though, yea?\" \n\n        What do you say?\n\t\t\n        *choice\n\t\t\n          #You tell him about Cyan.\n            *set Victor +large\n            *set ruthlessness -small\n\t\t\t\n            *page_break\n\t\t\t\n            You tell him there is nothing to be sorry about, explaining that the Veecee was Cyan, and that you should have found a way to let him know. \n\t   \n            \"That was your pet Veecee? What the hell were you think..\" He's at the edge of screaming when he deflates, \"OK. That's not fair of me, this isn't your fault. I should be happy that you still trust me enough to be honest. This was my job, and I was the one who messed it up.\" He shakes his head, \"They're going to have a good laugh at this back at the office.\" Then chuckles darkly, \"It's funny though, all this mess, over an Ocelot.\"\n\t   \n            You laugh and Victor pulls you into a hug, \"Let's just get out of here. The only good thing about today is that I got a chance to see you, want to grab a drink then?\"\n       \n            You agree.\n\t\t\t\n            *goto victor_scene_end\n\t   \n          #You tell him that it'll be OK.\n            *set Victor +small\n            *set ruthlessness +small\n\t\t\t\n            *page_break\n\t\t\t\n            You tell him that it's not his fault, that no one could have expected to deal with a Veecee in a situation like this. You leave out the fact that you knew who that particular Veecee was, deciding it's not really worth starting a fight over. \n\t   \n            \"You're probably right,\" He says, shaking his head, \"Live and learn, I guess.\" His eyes grow distant, \"One things for sure, I'm not looking forward to going back to the office.\" He chuckles darkly, \"It's funny though, all this mess, over an Ocelot.\"\n\t   \n            You laugh and Victor claps you on the back, \"Well ${name}, they don't expect me back for an hour. Why don't you and I grab a drink, yea?\"\n\t   \n            You agree. \n\t\t\t\n            *goto victor_scene_end\n\t\t\t\n          #You tell him that it's just barely better than nothing.\n            *set Victor -large\n            *set ruthlessness +medium\n\t\t\t\n            *page_break\n\t\t\t\n            You tell him that this was a waste of time, time you don't have to waste. You also explain that you're getting a little tired of him never taking anything seriously. \n\t   \n            \"This isn't entirely my fault, you know? You could have chimed in back there.\" He says, a trace of anger rising in his voice. \n\t   \n            You respond that you could have, if he had given you more than five minutes to prepare.  \n\t   \n            *page_break\n\t\t\t\n            He sighs.\n\t   \n            \"OK, you got me there. I wanted to play hero, and just ended up looking like a jerk.\" He rubs his temples, \"I feel awful about this ${name}, but there's nothing to do about it now -- other than trying to do better next go around.\"\n\t   \n            He's not wrong, but you're still angry. \n\t   \n            \"Look, they don't expect me back for an hour. Why don't you let me buy you a drink?\"\n\t   \n            You hesitate, but then agree.\n\t\t\t\n            *goto victor_scene_end\n\t\t\t\n    *label victor_scene_end\n\t\n    *page_break \n\t\n    It's late when you make it back home. Exhausted from the day's adventures, you go straight to bed.\n\n    *if (find_money_counter = 0)\n      *goto scene_two_freelance_end\n    *else\n  \n      You wake up to your alarm at 7AM. \n  \n      It's time to decide how you're going to spend your day. \n\t\n      *goto scene_two_freelance\n\t\n\t  \n\t\n  *disable_reuse *selectable_if (rachel_is_safe = true) #You call Rachel looking for work.\n    \n    *page_break\n\t\n    It's late afternoon, and the day is going nowhere. \n  \n    As you pace back and forth, trying to figure out how you'll look in a yellow jumpsuit, you realize you haven't spoken to Rachel since the Culling. \n  \n    It's not her fault. She left you a message days ago, but you've been so busy trying not to be conscripted, that you haven't called her back. \n  \n    With your options running dry, however, you decide that this is as good a time as any. \n  \n    The phone rings. \n\t\n    \"${name}, I'm so glad to hear from you!\" Rachel is as cheerful as ever, at least some things never change. \n  \n    You ask her how she has been.\n\t\n    *page_break\n  \n    \"As good as anyone who spent two days unconscious could be, better in fact!\" She laughs, only Rachel could laugh at nearly being beaten to death, \"I got a job ${name}.\"\n\n    Now that, is a surprise, from where you were standing, Rachel failed her Culling. \n  \n    \"Volunteers from Medical Dynamics were the ones who put me back together. When they heard my story, and heard that I was an Engineer, their Founder made a special exception to get me an interview!\" You can hear her voice wavering, \"They liked me... They hired me... I didn't have to go to The Farm.\" She pauses, breathless, \"All thanks to you.\"\n\n    By some twist of fate, Rachel managed to get a job, even while you sit here waiting to be conscripted. \n  \n    What do you think?    \n\n    *choice\n      #You're angry. You saved her life, shouldn't that count for something?\n        *set ruthlessness +large\n        \n        *page_break\n\t\t\n        You can't believe that she has some cushy job, while you have to run around begging for chits, just to keep yourself off The Farm. You saved her life, it's not fair!\t\t\n\t\t\n        *goto rachel_scene_begin\n\t\t\t\n      #You're happy. Rachel deserves a chance like this.\n        *set ruthlessness -large\n\t\t\n        *page_break\n\t\t\n        You're just glad that she's safe, Rachel was always so nice to you, and even if she wasn't, no one deserves to be dragged to The Farm after all that. \n\t\t\n        *goto rachel_scene_begin\n\t\t\n      #You don't know what to think, you're too surprised to think.\n\t  \n        *page_break\n\t\t\n        You just can't believe that she managed to beat the system... again. Whatever lucky stars are looking down on her, you want to find yourself a couple. \t    \n\t\t\n        *goto rachel_scene_begin\n      \n    *label rachel_scene_begin\n\t\n    Despite what you think, you congratulate her and then explain your situation. \n  \n    \"Say no more ${name}. How much do you need?\" She says, without an instant of deliberation.\n  \n    You start to argue, but she cuts you off, \"Don't you get it? I owe you everything... Without you I'd be dead, or worse, I'd be on The Farm. If there is anything I can do for you, I will.\" You can hear her smiling through the receiver, \"Now. How much do you need? I have about 2000 chits in savings.\"\n  \n    You know that while Rachel has a job, Medical Dynamics is small, and her Culling fees and surgical bills are probably huge.\n\n    Given that, how much do you ask for?\n\t\n    *choice\n      #1000 chits. You don't want to take anymore money than you absolutely have to.\n        *set ruthlessness -medium\n        *set wealth +large_cash\n        *set find_money_counter -small\n\t\t\n        *page_break\n\n        \"That's ... it? Are you sure ${name}?\" She asks.\n  \n        You tell her that you are. \n  \n        \"Of course you are, you're one of the good ones, you know that?\" She laughs, \"Of course you don't know that, people like you never do.\" \n  \n        Your phone buzzes once, as you receive the transfer. You thank her again.\n  \n        \"If you don't stop thanking me, I'm sending you more money...\" She snarks, then the receiver goes silent, she returns after a handful of seconds, \"Listen ${name}, I'm at work right now, so I need to go. I want you to promise me though, that if you ever need anything, that you'll come to me for help. You promise?\"\n  \n        *page_break\n\t\t\n        You do promise, if only because you know it's the only way to get her to stop asking. \n  \n        \"Good luck ${name}, I know you'll pull through!\" \n  \n        With that, your phone clicks.\n\n        Begging for money is exhausting work. You decide to pick it up again in the morning. \n\t\t\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n  \n           You wake up to your alarm at 7AM. \n  \n           It's time to decide how you're going to spend your day. \n\t\n           *goto scene_two_freelance\n\t\t\n      #1500 chits. You might be in bad shape, but you aren't willing to wipe her out.\n        *set wealth +1500\n        *set find_money_counter -small\n\t\t\n        *page_break\n\t\t\n        \"Done.\" She says as you tell her the number.\n\t\n        You ask her if it's OK, the last thing you want is to make her life more difficult.  \n\t\n        \"It's more than OK ${name}. It makes me really happy. I'm glad that I get to do something for you, for once.\" \n\t\n        Your phone buzzes as you receive the transfer. You thank her again.\n  \n        \"If you don't stop thanking me, I'm sending you more money...\" She snarks, then the receiver goes silent, she returns after a handful of seconds, \"Listen ${name}, I'm at work right now, so I need to go. I want you to promise me though, that if you ever need anything, that you'll come to me for help. You promise?\"\n  \n        *page_break\n\t\t\n        You do promise, if only because you know it's the only way to get her to stop asking. \n  \n        \"Good luck ${name}, I know you'll pull through!\" \n  \n        With that, your phone clicks. \n\n        Begging for money is exhausting work. You decide to pick it up again in the morning. \n\t\t\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n  \n           You wake up to your alarm at 7AM. \n  \n           It's time to decide how you're going to spend your day. \n\t\n           *goto scene_two_freelance\n\t\t\n      *selectable_if (ruthlessness > 57) #2000 chits. She did say \"anything\" after all.\n        *set ruthlessness +xlarge\n        *set wealth +xlarge_cash\n        *set find_money_counter -small\n\t\t\n        *page_break\n\t\t\n        \"I can...do that.\" She says, you can tell by the sound of her voice that she's a little surprised. \n\t\n        You ask her if everything is OK. \n\t\n        \"Yea. Of course it is ${name}. You saved my life, I owe you much more than a couple thousand chits.\"\n\t\n        You can't argue with that kind of logic. \n\t\n        Your phone buzzes as you receive the transfer. You thank her again.\n\t\n        There is silence on the other side of the line. \n\t\n        *page_break\n\t\n        \"Listen ${name}, I'm at work right now, so I need to go. I want you to promise me though, that if you ever need anything, that you'll come to me for help. You promise?\"\n  \n        You do promise, which seems to make her happier.  \n  \n        \"Good luck ${name}, I know you'll figure this out!\" \n  \n        With that, your phone clicks. \t\t\n\n        Begging for money is exhausting work. You decide to pick it up again in the morning. \n\t\t\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n  \n           You wake up to your alarm at 8:30 AM. \n  \n           It's time to decide how you're going to spend your day. \n\t\n           *goto scene_two_freelance\t\t\n\t\t\n\t\t\n      #You don't ask for any money. \n        *set ruthlessness -xlarge\n        *set wealth +1500\n        *set find_money_counter -small\n\t\t\n        *page_break\n\t\t\n        You tell her that you can't take her money. \n\t\n        \"Oh yes you can ${name}. Nobility is one thing, but I've been where you are, and I'm not going to let them drag you off to The Farm. Not after what you did for me!\" By the sound of her voice, you can tell there will be no arguing with her. \n\t\n        You mutter a weak protest. \n\t\n        \"1500. That's what I'm sending. What you do with it after that is up to you.\"\n\n        *page_break\n\t\t\n        Your phone buzzes as you receive the transfer. You thank her, then thank her again.\n  \n        \"If you don't stop thanking me, I'm sending you more money...\" She snarks, then the receiver goes silent, she returns after a handful of seconds, \"Listen, I'm at work right now, so I need to go. I want you to promise me though, that if you ever need anything, that you'll come to me for help. You promise?\"\n  \n        You do promise, if only because you know it's the only way to get her to stop asking. \n  \n        \"Good luck ${name}, I know you'll pull through!\" \n  \n        With that, your phone clicks.\n\n        Begging for money is exhausting work. You decide to pick it up again in the morning. \n\t\t\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n  \n           You wake up to your alarm at 8:30 AM. \n  \n           It's time to decide how you're going to spend your day. \n\t\n           *goto scene_two_freelance\t\t\t\t\n  \n  *disable_reuse #You call your parents.\n    *temp parents_cash 1000\n    *set find_money_counter -small\n  \n    You have been trying to avoid this call for a week now, the last thing you want to do is worry your parents, but with almost no time left before The Farm, a little worry is the least of your concerns. \n  \n    The phone rings twice before a woman's voice greets you.\n  \n    \"${name}!\" She nearly screams, \"I'm so happy to hear from you! Your father and I have been worried sick. You've been back from your Culling for a week now, and you didn't even call!\" She leaves no space for you to speak, \"I know, I know, you didn't want to worry us, but we're your parents, and we want to know that you're OK! You are OK, aren't you?\"\n  \n    That's your mom in a nutshell. You try to calm her before explaining the situation. \n  \n    *if (culling_mom_wants_to_help = true)\n      *set parents_cash 1500\n\t  \n      *page_break\n\t  \n      \"No child of ours is going to end up on The Farm!\" She pauses, you can almost hear the frown in her voice, \"Thank you for warning us about this earlier, now we can really help!\"\n\t  \n      You start to speak, but she cuts you off before you can get very far.\n    \n      \"No, no. Don't argue! Your dad and I are sending you ${parents_cash} chits right now. That should be enough to get you started.\"\n\t  \n      *goto parents_loan\n\t\n    *else\n\t  \n      *page_break\n\t  \n      \"No child of ours is going to end up on The Farm!\" She pauses, you can almost hear the frown in her voice, \"But that's not a lot of time ${name}, you really should have called us earlier.\" There is more concern than reprimand in her tone. \n  \n      You start to apologize, but she cuts you off before you can get very far. \n  \n      \"You have nothing to be sorry for! I'm just being silly. Your dad and I are sending you ${parents_cash} chits right now. All I'm saying is that if we had a bit more notice, we could have scraped more together. Hopefully, this is enough to get you started.\"\n\n      *goto parents_loan\n\t  \n    *label parents_loan\n\t\n    *page_break\n\t\n    Considering your parents retired years ago, this was more than generous. \n\n    You start to wonder whether it's fair to rely on them to bail you out of a situation that you put yourself into. You also have no idea what giving you all this money will cost them in the long run, their retirement packages were generous, but they're mostly living off savings. \n\n    What do you decide to do?  \n\t\n    *choice\n      #You accept the money, thanking your parents for their generosity.\n        *set ruthlessness +small\n        *set wealth +parents_cash\n\t\t\n        *page_break\n\t\t\n        You need this money or you're going to end up on The Farm, there is no question about that. You'll figure out some way to pay them back once you're back on your feet. \n  \n        You thank your mom, telling her that this will more than get you started, this just might save you. \n  \n        \"We would do anything for you ${name}!\" And you know that they would. \n  \n        After the money is transferred, you spend the rest of the afternoon telling your parents all about your Culling. \t\t\t\t\n  \n        *page_break \n\t\t\n        By the end of the conversation you're drained, before you hang up, you thank them one more time. After you hang up, you decide to turn in early.\n\t\t\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n  \n           You wake up to your alarm at 6 AM. \n  \n           It's time to decide how you're going to spend your day. \n\t\n           *goto scene_two_freelance\n\t\t\n      #You accept the money, promising that you will pay them back.\n        *set ruthlessness -medium\n        *set wealth +parents_cash\n        *set you_owe_parents true\n        *set you_owe_parents_amount +parents_cash\n\t\t\n        *page_break\n\t\t\n        You need this money or you're going to end up on The Farm, there is no question about that. Even so, you promise yourself that you will pay them back -- every last chit -- as soon as you have it.  \n  \n        You thank your mom, telling her just that. \n  \n        \"We appreciate the offer ${name}, but we don't want you to feel obligated. We would do anything for you!\" And you know that they would, that's exactly why you have to pay them back.  \n  \n        After the money is transferred, you spend the rest of the afternoon telling your parents all about your Culling. \n  \n        *page_break\n\t\t\n        By the end of the conversation you're drained, before you hang up, you thank them one more time. After you hang up, you decide to turn in early.\n\t\t\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n  \n           You wake up to your alarm at 6 AM. \n  \n           It's time to decide how you're going to spend your day. \n\t\n           *goto scene_two_freelance\t\t\n\t\t\n      #You refuse the money, thanking them but explaining that you'll be OK.\n        *set ruthlessness -xlarge\n\t    \n        You know that you need the money, but you know that they need it too. \n  \n        You decide that you can't do this to them, and that you'll find another way. \n  \n        \"Are you absolutely sure ${name}?\" Your mom says, even more worried than before. \n  \n        You are. \n  \n        After a few more minutes of arguing, she reluctantly agrees.\n\n        You spend the rest of the afternoon telling your parents all about your Culling. \n  \n        *page_break\n\t\t\n        By the end of the conversation you're drained, before you hang up, you thank them one more time. After you hang up, you decide to turn in early.\n\n        *if (find_money_counter = 0)\n          *goto scene_two_freelance_end\n        *else\n  \n           You wake up to your alarm at 6 AM. \n  \n           It's time to decide how you're going to spend your day. \n\t\n           *goto scene_two_freelance\t\t\n\t\t   \n  \n  *disable_reuse #You check the classifieds.\n    Hours go by as you check every job board and help wanted ad that you can find.\n  \n    Apparently, you're not the only person looking for freelance work this week, go figure. \n  \n    You're moments away from giving up when an ad catches your eye:\n\t\n    *page_break\n  \n    [i]About to be conscripted? Need chits fast? Don't mind inflicting grievous, bodily injury on other people like yourself?[/i]\n  \n    [i]If you answered yes to all of these questions, Mad Murphy is looking for you! Mad Murphy's Murderpunch Mayhem is currently holding open auditions for this season's fights.[/i]\n  \n    [i]You can win chits! Lots of chits! Along with enough fame and adoration to fill the gaping hole in your empty life.[/i]\n  \n    [i]Still interested? If so, just come downtown ready to fight! All participants in today's audition will receive 500 chits, with the potential for even greater rewards if you make it to the next round.[/i]\n  \n    *page_break\n  \n    Growing up, you used to love M4 (as Mad Murphy's Murderpunch Mayhem is sometimes called). The game is simple, two people stand in a circle with one of their legs chained to the floor. \n  \n    For the next three minutes, they scream and taunt each other until one of them throws a punch. The goal is to tire your opponent out without getting pummeled into the dirt in the process, and give yourself the opportunity to throw your \"Murderpunch,\" when your opponent is too worn down to defend himself.\n  \n    It can be a lot of fun, but it's also a great way to end up with serious brain damage. \n  \n    Then again, you're guaranteed at least 500 chits that you don't currently have.\n  \n    What do you do?    \n\t  \n    *choice \n      #You decide to go to the audition.\n\t\t\n        *page_break\n\t    \n        When the choice is between brain damage and The Farm, brain damage wins every time.\n\t\t\n        You hire a car to take you to a building downtown. A building not dissimilar from the squat, gray warehouse where the last part of your Culling took place. \n  \n        The only real difference is that it's surrounded by a forest of sparkling, glass skyscrapers and ringed by hundreds of screaming fans in gaudy costumes. \n  \n        A costume. That's right. You completely forgot. \n  \n        Half the point of M4 is the ridiculous costumes that fighters wear into the ring. As you look around, you notice that you're the only one who looks like a normal human being.\n\n        Huh. Maybe no one will notice.   \n\t\t\n        *page_break\n\n        As you approach the line, a man with slicked back hair and dark sunglasses steps towards you. He's carrying a very official looking clipboard. He looks you up and down.\n  \n        \"Where's your costume?\" He says with a voice that's silky and smooth and awful all at once.\n\n        You tell him that you forgot it at home. \n \n        He sighs.\n\n        \"No costume, no audition.\" He shrugs his shoulders, \"We have some rentals in the back if you want, but they're 200 chits and you have to pay for the dry cleaning if you get them bloody.\"\n\n        200 chits is almost half of what you were planning on making today, and who knows how much dry cleaning a latex body suit costs? \n\t\n        \"Well? Are you in or out?\" He says, starting to look bored. \n\t\n        What do you do?\t\n    \n        *choice\n          #You decide to rent a costume.\n            *set find_money_counter -small\n            *set wealth -medium_cash\n\n            *page_break\n\n            You decide to rent a costume. \n\t  \n            The man with the clipboard nods. \n\t  \n            As if on cue, a pair of people wearing very fine hats and kabuki mask's come out from around the corner. \n\t  \n            They hand you a stack of clothing and point to a dressing room on the far side of the building. \n\t  \n            When you return, you're wearing a shirt that's much too tight and made of a silvery-blue spandex material. Your pants are black leather and embossed with lightning bolts on the side. Your belt has tripled in size, and the buckle is a pair of tiny, black Slowguns staring out towards the crowd. \n\t  \n            \"Not bad.\" The man says, pointing his clipboard at you, \"Now, what's your name?\"\n\t  \t\t\n            *goto m4_picking_a_name\n\t\t\t\n          #You decide to go home.\n            You're supposed to be making money today, not losing it. You decide to cut your losses and go back home. \n\t  \n            In either case, you've had your share of concussions for a lifetime at the Culling.  \n\n            *goto scene_two_freelance\t\t\t\n\t\t  \n          *selectable_if (smart_cloths = true) #You use your CustomCloths to create a costume on the spot. \t\t\n            *set find_money_counter -small\t\t \n\n            You take your phone out of your pocket and pull up the Newscene app. Moments later, your shirt tightens around your chest and transforms into a silvery-blue spandex material. Your pants become black leather, embossed with lightning bolts on the side, and your belt buckle turns into a pair of tiny, black Slowguns pointing out towards the crowd. \t\n\t  \n            Oddly, all of these options were a part of the basic CustomCloths package. \n\t  \n            \"Good trick.\" The man with the clipboard says, \"Now what's your name?\"             \t\t\n\n            *goto m4_picking_a_name\t\t\t\n\t    \n        *label m4_picking_a_name\n\t\t\n        He hands you a form to fill out. \n\t\n        For branding and licensing reasons, M4 doesn't allow its participants to choose their own names, instead everyone is given a handful of options to pick from -- scientifically selected for maximum screaming potential.\n\t\n        Which do you pick?\n\t\t\n        *choice\n          #Linedrive\n            *set m4_name \"Linedrive\"\n            *set m4_name_short \"Linedrive\"\n\t\t\t\n            *page_break\n\t\t\t\n            \"Good choice ${m4_name_short}. Now, wait over there...\" He points to a line that seems even longer than when you first arrived.\n\t\t\t\n            *goto m4_inside\n\t\t\t\n          #The Mechanic\n            *set m4_name \"The Mechanic\"\n            *set m4_name_short \"Mechanic\"\n\n            *page_break\n\t\t\t\n            \"Good choice ${m4_name_short}. Now, wait over there...\" He points to a line that seems even longer than when you first arrived.\t\t\t\n\t\t\t\n            *goto m4_inside\n\t\t\t\n          #The Sparrow\n            *set m4_name \"The Sparrow\"\n            *set m4_name_short \"Sparrow\"\n\n            *page_break\n\t\t\t\n            \"Good choice ${m4_name_short}. Now, wait over there...\" He points to a line that seems even longer than when you first arrived.\n\n            *goto m4_inside\n\t\t\t\n          #Punch the Conqueror\n            *set m4_name \"Punch the Conqueror\"\n            *set m4_name_short \"Punch\"\n\n            *page_break\n\t\t\t\n            \"Good choice ${m4_name_short}. Now, wait over there...\" He points to a line that seems even longer than when you first arrived.\n\n            *goto m4_inside\n\t\t\t\n          #Lightninghawk Sunstriker the Unglowing\n            *set m4_name \"Lightninghawk Sunstriker the Unglowing\"\n            *set m4_name_short \"Lightninghawk\"\n            *set wealth +medium_cash\n            *achieve nicename\n\n            *page_break\n\t\t\t\n            \"You know, you're the first person in the history of M4 to pick that one. I've been betting for years that someone would, and thanks to you, there are now a lot of people who owe me money.\" He pauses, looking back and forth for a moment, \"I really appreciate it kid.\" \n\t  \n            He claps you on the back, and points to a line that seems even longer than when you arrived. As you walk towards it, your phone buzzes once. When you look down, you see that the man with the clipboard has transferred 200 chits into your account. \t\t\t\n\t\t\n            *goto m4_inside\n\t\t\t\n        *label m4_inside\t\n\t\t\n        *page_break\n\t\t\n        You lose the better part of the afternoon waiting, but eventually you make it inside. A man in an Owl mask and glowing, green cape meets you at the door, and asks for your Culling ID. \n\t\n        You give it to him and he points towards one of the dozen glass doors that line the inside of the warehouse. On the walls you see posters of former M4 Champions like Grass Cutter and The Red Mask. \n\t\n        When you arrive at your assigned place, you're met by a thin woman with green hair pulled back into a ponytail. She has a clipboard even more official looking than the man outside.\n\n        \"Do you know how this works?\" She asks, wasting no time with pleasantries. \n\n        What do you say?\n\t\n        *choice\n\t\t\n          #You tell her that of course you do.\n            *page_break\n\t\t\t\n            \"Fantastic. Saves me about three minutes of talking.\" She shrugs, \"Remember, today is just an audition. You're going to be facing one of our trainers. The audience is real, for what that's worth.\" She looks you up and down, \"Three minutes, nothing fancy. You get 500 chits just for being here. If you manage not to get knocked out, we'll give you another 1000.\"\n\t  \n            1500 chits for three minutes work. You could get used to this. You nod, she shrugs again.\n\t  \n            \"Alright killer, get out there and good luck!\"\n\t  \n            The door opens and you step inside. \n\t\t\t\n            *goto m4_fight_begins\n\t  \n          #You ask her to explain it to you just in case.\n\t\t  \n            *page_break\n\t\t\t\n            \"Right. Here is how it works. The both of you will take turns. Every turn you can taunt your opponent, scream in her face, pump up the crowd, or try to Murderpunch.\" She takes a breath.\n\t  \n            You nod.\n\t  \n            \"The science is pretty complicated but from what we have been able to tell, taunting usually draws a Murderpunch attempt; screaming helps you hit harder; pumping up the crowd distracts your opponent, and landing a Murderpunch wins you the match.\" She has clearly said this a thousand times today.\n\t  \n            You nod again. \n\t  \n            \"If you're strong enough, the faster you throw your punch, the less chance you'll have of getting hit. If you're charming enough, you can use your taunts and screams to help turn the fight in your favor and avoid getting hit. Find your balance, and you'll win every time.\" She shrugs.\n\t  \n            *page_break\n\t  \n            \"Remember, today is just an audition. You're going to be facing one of our trainers. The audience is real, for what that's worth.\" She looks you up and down, \"Three minutes, nothing fancy. You get 500 chits just for being here. If you manage not to get knocked out, we'll give you another 1000.\"\n\t  \n            1500 chits for three minutes work. You could get used to this. You nod, she shrugs again.\n\t  \n            \"Alright killer, get out there and good luck!\"\n\t  \n            The door opens and you step inside.\t\n\t\t  \n            *goto m4_fight_begins\n\t\t\t\n        *label m4_fight_begins\n\t\t\n        *page_break\n\t\t\n        As you enter, the crowd, a few dozen M4 diehards seated in uncomfortable looking lawn chairs around the edge of the ring, begins to cheer.  \n\t\n        You look to them and nod once, confidence oozing from your pores. You've watched enough M4 to know that the most confident fighter almost always wins. \n\t\n        You realize that you haven't seen your opponent yet, so you turn away from the audience and look towards the circle.\n\t\n        In front of you is a man wearing a chicken costume, feathers and all. The only thing uncovered is his face, and even that has chicken makeup. \n\t\n        He looks calm, perhaps even bored. If your little show with the audience was supposed to have an effect, it obviously had not. \n\t\n        He motions for you to enter the circle. \n\t\n        *page_break\n\t\n        The woman with the green hair walks in behind you. As soon you step into the circle, she hits a button on the wall and two large, heavy looking chains appear from beneath the arena. They are anchored into the floor and about three feet long. \n\t \n        The green haired woman glides towards you and attaches one of the chains to your ankle, and the other to the chicken man. \n\n        The audience goes wild at this. \n\t\n        With that done, she stands between the two of you and looks towards the audience, \"Two fighters enter and one of them goes home on a stretcher, welcome to Mad Murphy's Murderpunch Mayhem!\" She says with all the enthusiasm of a dentist's appointment. \n\t\n        \"On my left is our trainer-and-chief, none other than, Eggcitement! He will be putting the new kid through ${himher} paces today,\" She turns to you, \"On my right is,\" she looks down at her clipboard, \"${m4_name}, ${pronoun} will be unconscious in about three minutes.\" She smiles at you, the unexpression isn't unfriendly. \n\t\n        Eggcitement hops on one leg and begins clucking, when he does, the audience loses it. They're hooting and hollering and stomping their feet. As they quiet down, you realize that both the green haired woman and the chicken man are looking at you, waiting for something.\n\t\n        What do you do?\n\t\t\n        *choice\n          #You decide to stand there and wait for your cue.\n            *temp offense combat\n            *temp defense charisma\n            *temp enemy_defense 18\n            *temp enemy_offense 14\n\t\t\t\n            *page_break\n\t\t\t\n            You stand there for a long time, in silence. The green haired woman points to you, then to the crowd, then lets out a sigh designed to be heard by everyone in the room. \n\t  \n            You realize that you'd forgotten your introduction, the most important part of M4! You turn towards the crowd, trying desperately to come up with something clever, but by now they only look bored. After a moment you give up, shrugging your shoulders and turning back to Eggcitement.  \n\t\t\t\n            *goto m4_fight_round_one\n\t\t  \n          #You start stretching out, preparing for the fight.\n            *temp offense (combat + small)\n            *temp defense charisma\n            *temp enemy_defense 18\n            *temp enemy_offense 14\n\t\t\t\n            *page_break\n\t\t\t
