<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fatehaven — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "fatehaven", "title": "Fatehaven", "scenes": {"chapter1": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 1\n\n——————————————\n*line_break\n—————————— Chapter 1: Wounded Royalty\n*line_break\n——————————————\n\n\"${name}!  Your father's yellin' for yeh!  Stop playin with yeself and git to it!\"  Your mother calls out to you in the endearing way only a wingless siren could.  \n*if (whichChild = \"only\")\n  You reluctantly leave the sweet yet short moment of privacy you…what were you doing again?\n  *goto c1Child1\n*else\n  Curse the stars!  Your siblings were all out of the house for once, and your precious teenage free time was cut short…what were you up to, anyway?\n  *goto c1Child1\n*label c1Child1\n\n*choice\n  #Book learning.\n    *set logical %+10\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    Right, and there's just so much educational value to be learned from those ${femalemale} anatomy books, isn't there?  Even so, did you know that 80% of the human brain is water?  Fascinating!\n    *goto c1IdleChoice\n  #It's personal…ahem.\n    *set suave %-10\n    *set logical %-10\n    [i]Direct has increased[/i]\n    *line_break\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    *if (gender = \"male\")\n      Personal, indeed…well, it's perfectly healthy for a growing fellow such as yourself.  \n      *goto afterBate\n    *else\n      Personal, indeed…well, it's perfectly healthy for a budding flower such as yourself.  \n      *goto afterBate\n    *label afterBate\n    You've got a lot of stress on your mind, what with the long days at the mill, tending the farm, mining the—oh, who am I kidding, you were just feeling frisky.\n    *goto c1IdleChoice\n  #Snoozing.\n    *set vigilant %-10\n    [i]Carefree has increased[/i]\n    *line_break\n    *line_break\n    Blasted human society and its unnatural sleep schedule!  The Industrial Revolution may have brought us the printing press, but the cost of naps is too high a price.  The gnomes had it right all along: 'Two naps before dinner, else you're a mule skinner!'\n    *goto c1IdleChoice\n*label c1IdleChoice\n\nYou head out into the nearby woods where your father should be out hunting.\n*if (whichTown = \"hamlet\")\n  There's always good game to be found when your glorified village is this deep in the middle of nowhere.  It wasn't even a month ago when you tracked down an elk that would tower over even a large orc.\n  *goto c1Town1\n*elseif (whichTown = \"town\")\n  While most of the men in town prefer to dig for shiny rocks miles underground, your old man is far more accustomed to working above sea level.  How he doesn't recognize the appeal of black lung and mine collapses is beyond you.\n  *goto c1Town1\n*else\n  But when you're this close to the city, a rabbit and a couple squirrels would be considered a good hunt.  Bigger game is near extinct, though you aren't going to cry over it like some tree-hugging Druid.\n  *goto c1Town1\n*label c1Town1\n\nYou've just about given up hope of locating your parental figure when a ${womanman}'s screams send your feet into a sprint.  Wolves wouldn't dare get this close…but there were rumors of a bear prowling around last week.  Dodging tree roots and potential twisted ankles, you arrive upon a horrendous scene.  Your father is attending to a young ${womanman}'s leg…or at least, what's left of it.\n\nBlood, flailing tendons, and a flash of bone…it's enough to make you toss up your lunch.  But you're no pushover yourself, and after regathering your wits, you jump to help your father detach the bear trap.  Your father's mutters help keep your mind away from the liquids oozing over your fingers.  \n*if (whichRace = \"elves\")\n  \"Frakkin' new-fangled traps, bet one of 'em fancy elves thought himself clever…impossible to get the damn things off…\"\n  *goto c1Race1\n*elseif (whichRace = \"dwarves\")\n  \"Frakkin' new-fangled traps, bet one of 'em drunk dwarves thought himself clever…impossible to get the damn things off…\"\n  *goto c1Race1\n*elseif (whichRace = \"orcs\")\n  \"Frakkin' new-fangled traps, bet one of 'em stupid orcs thought himself clever…impossible to get the damn things off…\"\n  *goto c1Race1\n*else\n  \"Frakkin' new-fangled traps, bet one of 'em sneaky halfmen thought himself clever…impossible to get the damn things off…\"\n  *goto c1Race1\n*label c1Race1\n\nIt is only after you manage to get the trap off that you realize the ${girlboy} has passed out from the pain.  $!{shehe} isn't a bad looker.  A bit on the skinny side, with pale porcelain skin that had hardly dealt with the sun's rays (recent blood loss notwithstanding).  $!{herhis} long, dark hair, while in a mess on the forest floor, still manages to look better than yours even on a good day.  And ${herhis} figure is…wait, what are you thinking?  You've got to get ${herhim} back to town as soon as possible!\n\nAs gently yet swiftly as you are able, you and your father carry the wounded stranger to the hut of the medicine man who lives nearby.  Even if you hadn't passed it a thousand times before, the powerful…incense makes it very easy to find.\n\n*if (whichRace = \"elves\")\n  The healer and supposed spiritual guide of the community is a very odd and reclusive elf.  He is an ex-Druid, though why he was kicked out of the tree-hugging circle, you couldn't guess.  Your father hails him out of a plant-induced coma.\n  \n  \"Interesting…this one's skin has kissed a ghost, and so too will its spirit.  Set ${herhim} down there.\"  The elf hums oddly as you do as he asks.  Anger rises inside you; the nonchalant healer doesn't seem to grasp the graveness of the situation.  You always knew there was a reason the elvish community never spoke of him.  Finally, he sets off to work.\n  *goto c1Race2\n*elseif (whichRace = \"orcs\")\n  The healer and spiritual guide of the community is one of the jolliest orcs you've ever met.  Also, one of the fattest.  He's an ex-Druid and never hid the fact that the 'ex' came from drifting away from their vegan lifestyle choices.  He's in the middle of a second lunch when your father hails him.\n  \n  \"Heavens be d-cHR-uRr—\" The orc nearly chokes on a chicken wing but still manages to usher you into setting the ${girlboy} down on the table.  Burping loudly, he gets to work immediately on ${herhis} leg.  Or at least…what remains of it.\n  *goto c1Race2\n*else \n  Did I say man?  I meant to say woman.  The healer and spiritual guide of the community is a surprisingly down-to-earth old lady.  That is to say, she isn't high half the time like most folks in her profession are.  Rumor has it that she's an ex-Druid, though to ask her why seems far too rude.  \"Goodness me, no time to get the apron on this time.  Be a couple of dears and set ${herhim} on the table.\"  You make room for the little lady to get to work and stand idly beside your father.\n  *goto c1Race2\n*label c1Race2\n\n*if (attractedTo = \"female\")\n  While waiting, your father gives details on how he came across the poor dying lass.  \n  *goto c1Attracted1\n*else\n  While waiting, your father gives details on how he came across the poor dying sap.  \n  *goto c1Attracted1\n*label c1Attracted1\n\"Was out on my usual path when I heard a metal snatch, then a crunch and scream.  Knew no animal made that noise.  We been hearing of bears about lately, some spooked goon started sprinkling them fancy new traps all over the place.  Ain't think this'll be the last you'll have, healer.\"\n\nYour eyes fixate upon the deeply heaving figure on the table.  Primarily, you focus on ${herhis}:\n\n*choice\n  #Body.\n    *set sly %+10\n    [i]Sly has increased[/i]\n    *line_break\n    *line_break\n    Clothes mostly off, you can't help but notice the firm yet smooth skin that lays underneath.  Glowing as bright as the moon, you'd wager a month of chores that this is a nobleman's ${girlboy}, though how ${shehe} got into your backyard is anybody's guess.  While ${herhis} lower half is worrisome, the top half is in very fine condition.  Very fine.\n    *goto c1FocusChoice\n  #Face.\n    *set logical %-10\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    Dark brown eyes you could sink yourself into, firm cheeks with the slightest hint of dimples…it would have been even more ${beautifulhandsome} were it not screaming in agony.  While stereotypically noblefolk are blonde, this young ${ladygentleman} has upper-class just about written on ${herhis} forehead.\n    *goto c1FocusChoice\n  #Legs.\n    *set vigilant %+10\n    [i]Vigilant has increased[/i]\n    *line_break\n    *line_break\n    With the lower half of the body mostly exposed, you take a moment to admire a very nice pair of legs.  Well, very nice except for the lack of a right foot, anyway.  They're thin yet taut, with strong muscles hiding beneath the silky-smooth pale skin.  Hairless as well; always a pleasant surprise in the 14th century.  They are noble dancer's legs, though for this ${ladygentleman}, they will dance no more.\n    *goto c1FocusChoice\n*label c1FocusChoice\n\nYour father sends you back home to tell your mother of the incident and to ask around town if anyone might be missing a pale, black-haired ${girlboy}.  You're reluctant to leave, but it's not like you could do anything to help at this point anyway.  After resolving to check up on ${herhim} tomorrow, you return home.\n\nIt is almost impossible to get back to the usual toils of the day after that sort of excitement.  The hours go by slower than ever.\n*if (whichChild = \"only\")\n  There is no rest for an only child, and you have to scramble to make up for the time you lost on that little adventure.  With your mother out and about spreading gossip—she's a professional at that—it's up to you to make dinner.  A shame that the gas stove hasn't been invented yet.\n  *goto c1Child2\n*elseif (whichChild = \"oldest\")\n  Your younger siblings flock you with questions about the stranger.  $!{herhis} name and where ${shehe} came from were the only two valid questions.  The brats seem to care more about ${herhis} favorite color or mythological creature than whether or not ${shehe} was going to survive the night.  Then again, that was a bit too grimdark for youngins to think about.\n  *goto c1Child2\n*elseif (whichChild = \"middle\")\n  Your older sisters are far more concerned about you getting out of chores for a few hours than the fate of 'some prissy runaway.'  Your younger siblings, on the other hand, can't seem to get enough information out of you.  They had already assumed ${shehe} has ownership of a castle and are more than anxious to be adopted into knighthood.\n  *goto c1Child2\n*else\n  *if (attractedTo = \"female\")\n    Aside from the obligatory questions from your brothers as to how ${cutehandsome} ${shehe} was, there wasn't really much interest.  It was an oddity, to be sure, but it wasn't their problem.  With a sigh, you get started on your chores.\n    *goto c1Child2\n  *else\n    Aside from the obligatory questions from your sisters as to how ${cutehandsome} ${shehe} was, there wasn't really much interest.  It was an oddity, to be sure, but it wasn't their problem.  With a sigh, you get started on your chores.\n    *goto c1Child2\n  *goto c1Child2\n*label c1Child2\n\nNight falls, but before dinner you decide to take a short walk to get some air.  There is really only one thing on your mind…\n\n*choice\n  #The wounded stranger.\n    *set logical %-10\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    For multiple reasons, you just can't get ${herhim} out of your head.  Would ${shehe} be okay?  Who is ${shehe}?  You picture ${herhim} lying on a potential deathbed at this very moment—there has to be something you could do.  Being under the ex-Druid's care is no doubt the best chance for ${herhim} to survive, but even so…you're certain that you could try—\n\n    \"For Delmacia!\"  An equally redheaded and bullheaded ${girlguy} you know far too well jumps out of the bushes, and by trained instinct you slug ${herhim} a good one to the jaw.\n    *goto c1ThinkingChoice\n  #The rustling sound from a nearby shrub.\n    *set logical %+10\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    While the rich ${girlboy} is a certain concern, you have an idiot to contend with at the moment.  Sneak attacks were never this one's strength.  \"For Delmacia!\"  $!{shehe} cries, while you easily sidestep a poorly executed pouncing grapple.  $!{shehe} ends up with ${herhis} face on the ground, not that it isn't dirty most of the time anyway.\n    *goto c1ThinkingChoice\n  #Dinner.\n    *set vigilant %-10\n    [i]Carefree has increased[/i]\n    *line_break\n    *line_break\n    Your stomach roars.  And why shouldn't it?  You've been lugging around most of a person for hours today.  Just the thought of potatoes is making you salivate, not to mention the roast!  But your stomach's growl is rudely interrupted by a roaring shout.  \"For Delmacia!\"  The booming voice comes from out of the nearby bushes as an all-too familiar redhead pounces at you.  I say 'pounce,' but after you solidify your footing, ${shehe} practically bounces off you and hits the ground with a loud thump.\n    *goto c1ThinkingChoice\n*label c1ThinkingChoice\n\n\"Ow-ow-ow-ow-ow!  That hurt, you know?!  Jeez, what's your deal ${name}?  First you skip out of ceremony rehearsal, and now you're beating up a ${cutehandsome} ${girlguy} who throws ${herhim}self at you!\"  Your would-be attacker grows sullen, somehow feeling offended.\n\nYou don't buy that pout for a second, regardless of how cute it might seem.  This is ${Brigid}, your childhood friend and oftentimes enemy.  $!{shehe} is a true believer in the Church's teachings and rules, but isn't quite smart enough to remember what half of them are.  Next year, ${shehe} plans to enlist in the military and can't ever seem to stop talking about it.  As far as your opinion on the matter goes…\n\n*choice\n  #Being a soldier is a noble aspiration.\n    *set sly %-10\n    *set resourceful %-10\n    [i]Powerful has increased[/i]\n    *line_break\n    [i]Faithful has increased[/i]\n    *line_break\n    *line_break\n    Protecting your borders from invaders, your people from bandits…there are monsters and who knows what else out there.  If you have the talent for it, joining the Delmacian Knights is a good and noble cause.\n    *goto c1MilitaryChoice\n  #Being a soldier sounds interesting.\n    *set resourceful %+20\n    *set logical %+10\n    [i]Resourceful has greatly increased[/i]\n    *line_break\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    Farming turnips, hunting squirrels, mining shiny stones…is that really what you were meant for?  Were you to be born and die in the same village?  The Delmacian Knights…might be your ticket out of this place.\n    *goto c1MilitaryChoice\n  #Being a soldier sounds okay.\n    *set vigilant %-20\n    *set loner %+10\n    [i]Carefree has greatly increased[/i]\n    *line_break\n    [i]Loner has increased[/i]\n    *line_break\n    *line_break\n    You suppose it isn't terrible, but you're not buying this soldier glorification thing one bit.  Getting barked at by your 'superiors' all day and breaking your back digging moats?  Nothing honorable about working your butt off in heavy armor and losing toes from infectious diseases.  The Delmacian Knights are very overrated.\n    *goto c1MilitaryChoice\n  #Being a soldier sounds like suicide.\n    *set sly %+10\n    *set resourceful %-10\n    [i]Sly has increased[/i]\n    *line_break\n    [i]Faithful has increased[/i]\n    *line_break\n    *line_break\n    Getting shipped off to who knows where in an almost uninhabitable desert or swamp somewhere…if the humidity doesn't kill you, the inhabitants will!  If there ever was a cause worth dying for, it sure wasn't found with the Delmacian Knights.\n    *goto c1MilitaryChoice\n  #Being a soldier sounds like slavery.\n    *set suave %-20\n    *set logical %+10\n    [i]Direct has greatly increased[/i]\n    *line_break\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    Servitude, voluntary or not, is still servitude.  You were born free, and you'll be damned if you don't die free as well.  Fighting enemies who are not your own, dying for causes that don't exist…no, you think not!\n    *goto c1MilitaryChoice\n*label c1MilitaryChoice\n\n\"Hey, just 'cause you can read fancy books don't mean you get to zone out all the time!  What's on your mind, anyway?\"  ${Brigid} chides you for thinking before speaking—a skill ${shehe} may never learn.\n\nYou explain to ${herhim} about the wounded stranger you (hopefully) helped save today.  Definitely need to check up on ${herhis} condition tomorrow.  ${Brigid}'s condition grows rather much more stern, unless you're just imagining things.  \"Oh, your mother told me of ${herhim}.  I suppose you'll want to check up on 'em tomorrow right?  I think I will too, we don't get odd strangers like that one 'round here often.\"\n\nWell, ${Brigid} is right about that much, at least.  You two make plans to meet up in the morning, but before you leave…\n\n*choice\n  #Ask about the ceremony.\n    *set suave %-10\n    [i]Direct has increased[/i]\n    *line_break\n    *line_break\n    You ask ${herhim} about how the plans for the ceremony tomorrow are going.  While ${Brigid}'s family is far from rich, it's not every day one's oldest daughter gets married.  ${Brigid} might try to hide it, but ${shehe}'s quite excited for ${herhis} older sister's big day.\n    *goto c1AskChoice\n  #Ask about ${herhis} family.\n    *set suave %+10\n    [i]Suave has increased[/i]\n    *line_break\n    *line_break\n    You ask ${herhim} about how ${herhis} family is handling the uneasiness of the big day tomorrow.  It's not every day one's oldest daughter gets married.  And while ${Brigid}'s family is far from rich, it is going to be a big event.  ${Brigid} might try to hide it, but ${shehe}'s quite excited for ${herhis} older sister's big day.\n    *goto c1AskChoice\n*label c1AskChoice\n\n\"Hmph!  If you care so much, you should've shown up to the recital!\"  Your red-haired friend retorts with a biting remark, failing to recall that you had been busy hauling a half-dead person at the time.  And it isn't like you don't have the dull ceremony memorized at this point anyway.  This will be the third wedding you'll have attended in as many years.\n\n\"T-there's been a change in the plans, I mean the…er, opener.  Apparently, I need a ${MC_guygirl} to walk down the aisle with.  It'd be weird if, you know, someone got the wrong idea, I mean…\"  ${Brigid} trails off, cheeks growing the shade of ${herhis} hair.  This cute side of ${hershis} doesn't show itself often, so you take a moment to savor it.  How should you reply?\n\n*choice\n  #Graciously.\n    *set suave %-10\n    *set sly %-10\n    [i]Direct has increased[/i]\n    *line_break\n    [i]Powerful has increased[/i]\n    *line_break\n    *line_break\n    You say that you would be honored to walk down the aisle with ${herhim}.  $!{herhis} face brightens immediately with an audible sigh of relief.  \"W-well, now that that's settled…hahaha…\"  You're a bit surprised ${shehe}'s this happy over such a little thing…unless ${shehe}…nah, that couldn't be it.\n    *goto c1AisleChoice\n  #Teasingly.\n    *set suave %+10\n    *set sly %+10\n    [i]Suave has increased[/i]\n    *line_break\n    [i]Sly has increased[/i]\n    *line_break\n    *line_break\n    This is just too easy.  You ask ${herhim} if ${shehe} needs any help with a possible after-wedding activity as well, causing ${herhis} face to go full flush.  \"I-idiot!  Just show up and shut up!  I'm not sure why I put up with you…\"  You might have made ${herhim} mad at you, but you don't mind giving ${herhim} something to think about tonight.\n    *goto c1AisleChoice\n*label c1AisleChoice\n\nNot a moment passes after you exchange goodbyes before you go into a brisk jog back home for dinner.  There's not as much left on the table as you would prefer; your extended encounter with ${Brigid} is likely the cause.  Still, a lackluster supper is worth getting to see that rare side of ${herhim}.  Night comes and goes in a flash, and before you know it, a chorus of chirping finches arrives to welcome in the new day.  Today's duties are lighter than ever; your folks are too busy preparing for the wedding to be effective taskmasters.\n\nWhich is perfect, since you're off to the healer's hut anyway.  You don't get very far before you spot ${Brigid} on the road, waiting impatiently.  Right, you were going to go together.  Still, it is odd that ${shehe}'d forgo ${herhis} usual morning 'sword-fighting' training for something like this.  $!{shehe}'s religious about smacking that dull sword against whatever ${shehe} can find.  But no matter how hard ${shehe}'d polish it off, that blade's edge is…this sounds a bit dirty, doesn't it?\n\n\"About time you got here, now let's go see how your ${princessprince} is doing.\"  You follow ${herhim} in a fast-paced march, speculating aloud as to what the rush is.  \"What?  I've got things to do is all, and this is such a waste of time!\"  \n\nYou then speculate aloud as to whose idea it was to bring ${herhim} along on this trip in the first place.  That keeps ${herhim} quiet, at least for a moment, anyway.\n\n\"My parents are trying to marry us all off now, it's crazy.  Dusty old people don't know anything,\" ${shehe} mutters as your march slows down to more of a brisk walk.  You suppose this isn't completely unexpected; there was always a more-than-healthy bit of tension between ${Brigid} and ${herhis} folks.  Heck, you're even starting to get pressured into marriage as of late.  What are your thoughts on marriage?\n\n*choice\n  #Marriage is for some, but not me.\n    *set marriage \"no\"\n    *set loner %+10\n    [i]Loner has increased[/i]\n    *line_break\n    *line_break\n    Marriage means settling down.  It means kids, it means a regular job, it means a regular…well, life.  While that does hold some appeal, you're out for something else, aren't you?  That gets a laugh out of your companion.\n    \n    \"Typical ${name}.  Think you're the main character of one of them stories!\"\n    *goto c1MarriageChoice\n  #I'd like to get married someday, but not anytime soon.\n    *set marriage \"later\"\n    *set vigilant %+10\n    [i]Vigilant has increased[/i]\n    *line_break\n    *line_break\n    While it's hard to imagine wanting to settle down right now, there's a reason why the vast majority of the adult populace ends up getting hitched.  Having a warm home and a warmer bed to come home to each night…it sounds nice.  Your companion nods, albeit reluctantly.\n\n    \"There's so much I want to get done before I even…I mean, I know what you mean, ${name}.\"\n    *goto c1MarriageChoice\n  #Sure, if I found the right person for myself.\n    *set marriage \"sure\"\n    *set loner %-10\n    [i]Leader has increased[/i]\n    *line_break\n    *line_break\n    *if ((gender = \"male\") and (attractedTo = \"male\"))\n      Life is short enough as it is in this time period, so there's no reason to slow yourself down.  Finding a ${girlguy}, owning a house, raising a bunch of kids…doesn't seem like such a bad life.  A blush appears on your companion's face while ${shehe} shakes ${herhis} head at the very thought.\n      *goto c1MarriageGender1\n    *elseif ((gender = \"female\") and (attractedTo = \"female\"))\n      Life is short enough as it is in this time period, so there's no reason to slow yourself down.  Finding a ${girlguy}, owning a house, raising a bunch of kids…doesn't seem like such a bad life.  A blush appears on your companion's face while ${shehe} shakes ${herhis} head at the very thought.\n      *goto c1MarriageGender1\n    *else\n      Life is short enough as it is in this time period, so there's no reason to slow yourself down.  Finding a ${girlguy}, owning a house, making a bunch of babies…doesn't seem like such a bad life.  A blush appears on your companion's face while ${shehe} shakes ${herhis} head at the very thought.\n      *goto c1MarriageGender1\n    *label c1MarriageGender1\n\n    \"M-maybe it doesn't to you, ${name}, but there's tons of stuff I want to do first!\"\n    *goto c1MarriageChoice\n*label c1MarriageChoice\n\nYou can tell by ${Brigid}'s expression what ${shehe} is going to ask you next.  $!{shehe} isn't the hardest ${girlguy} in the kingdom to read.\n\n\"You should join up with the Delmacian Knights next summer!  I mean, obviously you'd need some serious training to get in shape, and it would be a huge pain for me, but I guess I could help you pass basic recruitment.\"  What a gracious invitation…but wasting your precious mornings 'training' just so you have the privilege of getting yelled at by a drill sergeant?  You get enough of that from your mother already.  How do you feel about ${Brigid} joining up, anyway?\n\n*choice\n  #Dissuade ${herhim} from joining the Delmacian Knights.\n    *set sly %+10\n    [i]Sly has increased[/i]\n    *line_break\n    *line_break\n    You do your best to paint the reality of what a soldier-grunt's day in the life really is.  Even the ones with horses and shiny armor don't have it so great.  If you did get to see some fighting, even if you managed to make it out without a scratch…there were wounds in the mind that could never heal.  Nightmares so real they might as well have been.\n\n    \"You think so little of me?!\" ${Brigid} slams you hard up against a nearby tree.  You've seen ${herhim} get angry on a regular basis for years, but never quite this angry.  You can't see ${herhis} face, but are those tears?  \"I'm not as clever as you, ${name}, but I know what I'm getting into.  I'm not a little ${girlboy} thinking war is like those bedtime stories, so stop treating me like one!\"\n\n    $!{herhis} words sting more than you were expecting, but your stance on the matter remains firm.  A soldier's life isn't what's best for ${Brigid}, even if ${shehe} can't admit it to ${herhim}self.\n    *goto c1JoinKnightsChoice\n  #Encourage ${herhim} to join the Delmacian Knights.\n    *set sly %-10\n    *set loner %-10\n    [i]Powerful has increased[/i]\n    *line_break\n    [i]Leader has increased[/i]\n    *line_break\n    *line_break\n    To ${herhis} surprise, you're actually very receptive about the idea.  ${Brigid} has a certain discipline that'll carry ${herhim} far in the ranks, not to mention ${herhis} authoritative tone, which even has the adults paying ${herhim} notice.  Becoming a soldier isn't just physical pain, however…you can't help but worry about what toll it might have on ${herhis} psyche.\n\n    \"Y-you're weird today, ${name}.  Usually you just make fun of me, not compliment me…\" You notice the distance between the two of you on the dirt path close, ever so slightly.  \"I'm not clever like you, but I wasn' born yesterday, neither.  It'll be hard…but I can take it.\"\n    *goto c1JoinKnightsChoice\n  #Neither.\n    *set suave %+10\n    [i]Suave has increased[/i]\n    *line_break\n    *line_break\n    Honestly?  It's ${herhis} life, and you have no right to control that.  It isn't that you don't care what ${shehe} does…just that you would respect ${herhis} own decision on the matter.  To your dismay, that's not quite what the red-haired swords${womanman} was looking for.\n    \n    \"Argh!  You're so…I don't know the word!  Why can't you ever take sides on anything?  You've been like this since we were little—would it kill you to take a stand somewhere?\"  The last bit is a whisper you nearly couldn't hear.  It's a criticism you face regularly with ${herhim}, but you can't help but see that the world isn't just black or white.\n    *goto c1JoinKnightsChoice\n*label c1JoinKnightsChoice\n\nThe two of you carry on the rest of the trip in silence.  Within minutes, you find yourself in front of the healer's hut.\n\n*if (whichRace = \"elves\")\n  \"This elf Druid is one weird fig.  I'd have to be downright desperate to go to him for help,\" ${Brigid} blurts out at the front door, a very bad habit that rightfully gets ${herhim} smacked more often than not.  With your luck, the elf answers immediately, his gaze piercing down at ${Brigid}.\n  \n  \"Speaking of figs, I've acquired a very peculiar [i]Ficas carica[/i] that expands when exposed to saliva.  Just imagining one of those going down your throat…quite sensuous!\"\n\n  While ${Brigid} is gagging at the thought of it, you're quick to make amends for your foolhardy friend and make your way inside.\n  *goto c1Race3\n*elseif (whichRace = \"orcs\")\n  \"Let's hope the big 'ol shaman hasn't got a taste for ${princessesprinces}, ay?\"  ${Brigid} blurts out an insensitive comment at the orc's front door.  It's a very bad habit that rightfully gets ${herhim} smacked more often than not.  And a smack from an orc dislocates things.  With your luck, the huge orc answers immediately, menacing eyes pointing straight at ${Brigid}.  Then he cracks a huge smile.\n  \n  \"Orc prefer ugly red-haired human ${bridesmaidgroomsman}!  WHARRAAAGAAAAAAA!\"  The Druid's howl rivals most barbarians, but it's good to see him in high spirits.  He's a close friend of ${Brigid}'s family and hurries you inside.\n  *goto c1Race3\n*else\n  \"Wonder if this old windbag's nasty potions managed to save your ${princessprince}.\"  ${Brigid} has this horrible habit of blurting out whatever ${shehe} is thinking, even if it means offending someone at their own front door.\n  \n  A shrillish sound cracks up from inside.  \"Need I remind you, ${Brigid}, of a little ${girlboy} covered head to toe in red beady poxes not six summers ago?  You'd still have them if it weren't for one of those 'nasty' brews.  My my, how soon we forget.\"\n  \n  The tone of the little lady that emerges from the hut is downright scary.  While ${Brigid} is paralyzed with fear, you take the opportunity to make amends and your way inside.\n  *goto c1Race3\n*label c1Race3\n\n\"So, this is my champion.\"  A delicate voice—one more elegant than yours could ever hope to be—greets you with pleasant courtesy.  It is such a foreign tone, you nearly doubt the language as one you share, though you've never been this compelled to listen further.\n\nAny doubt that the mysterious stranger is upper-class is good and gone now.  Even in a roughspun tunic, everything from the stance ${shehe} takes lying down to the tone ${shehe} uses in ${herhis} voice gives it away.  While you are certainly happy to see ${herhim} doing well, you can't help but feel at unease.  As you hesitate, ${Brigid} decides to make introductions for you.\n\n\"Welcome to our humble village, your highness.  This here's ${name}, your knight in woolen trousers.  You can call me ${Brigid}.\"\n\nThe noble${womanman} introduces ${herhim}self as ${Silvana}.  Gathering up your words, you ask about ${herhis} condition.  While ${Brigid}'s concern is far from genuine, yours is quite real.\n\n\"I have no feeling in my right foot…but that may change.  My worries are for my father and uncles, however…\"  A foot that mangled is never going to work again, but you keep that thought to yourself.  You inquire about ${herhis} relatives and how ${shehe} got into this mess to begin with.\n\n\"My father's a merchant for Greyfinch Trading; he was appointed a new position in the capital…though now I fear that the bandits…he…\"  Tears threaten to fall down ${herhis} porcelain face, and even ${Brigid} fidgets with sympathy.  \"Our caravan with all our belongings was attacked by a gruesome lot of them, and I…escaped as soon as I could.  I ran for days before—\"\n\nYour emotional companion sees fit to interrupt ${Silvana}'s ill-fated tale.  \"Escaped?!  You coward, you left your family to die!\"  ${Brigid} is about to approach ${Silvana} in a rather aggressive manner.  What do you do?\n\n*choice\n  #Tell ${Brigid} to back off, harshly.\n    *set suave %-10\n    *set logical %-10\n    [i]Direct has increased[/i]\n    *line_break\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    Anger sometimes must be met with anger.  ${Silvana}'s family might be dead, and ${shehe}'ll probably be on crutches for the rest of ${herhis} life.  The last thing ${shehe} needs now is to feel like a cowardly villain for trying to survive.  You impart those words onto ${Brigid}, though with far more colorful language.  $!{shehe} immediately steps back and stares down at the floor.  An apology is muttered, which is more than you expected from ${herhim}.  Perhaps you're getting better at yelling sense into people?\n    *goto c1ApproachChoice\n  #Calm ${Brigid} down.\n    *set suave %+20\n    *set logical %+10\n    [i]Suave has greatly increased[/i]\n    *line_break\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    This is your typical stage routine with ${Brigid}.  $!{shehe} acts on ${herhis} emotions (the angry ones), while you go in afterwards to patch things up.  It's tiresome, to be sure…you sometimes wonder how the redhead would manage without you around to fix all of ${herhis} mistakes.  You explain the severity of the situation and how the last thing ${Silvana} needs is to feel bad for trying ${herhis} best to survive such a desperate situation.\n    *goto c1ApproachChoice\n  #Do nothing.\n    *set vigilant %-20\n    [i]Carefree has greatly increased[/i]\n    *line_break\n    *line_break\n    Usually, this is your cue to step in, apologize, and smooth things over.  But today…maybe it's curiosity, maybe you want to see how ${Silvana} handles ${herhim}self.  Abandoning your family in a situation like that…bonds of blood should be tighter than that.  $!{shehe} might call ${herhim}self a noble${womanman}, but what ${shehe} did was far from noble.  ${Brigid} says about the same, though with notably less eloquence.\n    *goto c1ApproachChoice\n*label c1ApproachChoice\n\n\"I deserve all your words and then some, ${Brigid}.  I am truly ashamed, and I am truly weak.  How did I not realize this until now?  I…\"  ${Silvana}'s words trail off, grief and uncertainty for ${herhis} future read plainly across ${herhis} features.  You're sympathetic, even if the two of you grew up in very different worlds.\n\nAnd so you couldn't let ${herhim} depress ${herhim}self further.  Having a plan means having some hope, and luckily, you're a natural planner.  What advice do you offer ${Silvana}?\n\n*choice\n  #Become stronger.\n    *set loner %-10\n    *set sly %-10\n    *set resourceful %-10\n    [i]Leader has increased[/i]\n    *line_break\n    [i]Powerful has increased[/i]\n    *line_break\n    [i]Faithful has increased[/i]\n    *line_break\n    *line_break\n    This is what they call tough love.  You don't mince words; ${Silvana}'s life is going to be very different now.  $!{shehe} will need to get stronger or ${shehe} won't make it long.  It'll take hard work and then some, especially with a bad foot.  It's possible other members of ${herhis} family made it out alive, but the chances aren't great.\n\n    ${Silvana} nods grimly and straightens ${herhis} back from its previously slouching position.  \"You've told me what I needed to hear, ${name}.  For that, I thank you.  I shall try my hardest to never have to feel such helplessness again.\"\n    *goto c1AdviceChoice\n  #Write letters.\n    *set resourceful %+20\n    [i]Resourceful has greatly increased[/i]\n    *line_break\n    *line_break\n    Really, this is the most commonsensical option ${Silvana} has.  Write letters back home, tell them immediately what happened.  If the worst did occur, ${shehe} would be entitled to some compensation from Greyfinch.  You surprise even yourself by your practicalness, and catch yourself before starting to think about what work would be suitable for ${herhim} around town.\n    \n    ${Silvana} smiles warmly, ${herhis} eyes denoting a bit of hopefulness where there was once none.  \"A voice of reason in the midst of all this…I am both impressed and in your debt, ${name}.\"\n    *goto c1AdviceChoice\n  #Plot your revenge.\n    *set loner %+10\n    *set logical %-10\n    *set resourceful %-10\n    [i]Loner has increased[/i]\n    *line_break\n    [i]Emotional has increased[/i]\n    *line_break\n    [i]Faithful has increased[/i]\n    *line_break\n    *line_break\n    You tell ${Silvana} to keep all the details of the bandit attack memorized.  Be it by ${herhis} own hand or the local militia's, these bandits need to be brought to justice.  No one else should have to suffer like ${shehe} has.  That should be the first priority…channel that anger into change, don't give in to despair.  Only in ending their lives can ${shehe} go on with ${hershis}.\n    \n    ${Silvana} nods grimly and straightens ${herhis} back from its previously slouching position.  \"I may have mistook you, ${name}.  You are perhaps…you are right.  I will not let my family's deaths be rendered pointless.  I will enact revenge.\"\n    *goto c1AdviceChoice\n*label c1AdviceChoice\n\n\"Well, now that that's settled,\" ${Brigid} pipes in, ready to get a move on, \"${name} and I best be heading off.  Good luck on the…er, recovery.\"  You're far more reluctant to go, but you do have a wedding to prepare for.  You only hope the food will be worth the long, drawn-out ordeal.  Right as you're about to leave, however…\n\nA muttered whisper, spoken like it was meant only for your ears to hear: \"Protations four, chapter seven, sentence ten.\"\n\nUnfortunately, before you can even begin to make out whatever the heck ${Silvana} is talking about, ${Brigid} yanks you out of the healer's abode.  The two of you briskly walk away in temporary quiet.  It isn't much of a guess what's going to happen next, but you take solace in at least being out of ${Silvana}'s hearing distance.  The redhead—as always—lets you know exactly how ${shehe} feels about ${herhim}.\n\n\"Talk about weird, poor ${lasssap} though.  Gives off a strange vibe, and I'm not sure it's the good kind.  What's your call on '${erem}?\"  ${Brigid} asks like ${shehe} couldn't care less, though you know your old friend well enough to know that ${shehe} doesn't do anything without caring.  What is your call, by the way?\n\n*choice\n  #Too early to say.\n    *set logical %+10\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    Honestly, you have no idea.  You can't help but feel an aura from ${herhim} as well, though whether it is a 'bad vibe' or something else, you really aren't sure.  There's also the matter of those names and numbers ${shehe} spoke of right as you were leaving…what was up with that?  ${Brigid} elbows you after you find yourself deep in your thoughts.\n    *goto c1CallChoice\n  #$!{shehe}'s cute.\n    *set sly %+10\n    *set logical %-10\n    [i]Sly has increased[/i]\n    *line_break\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    Who knew nobles were so cute?  Must have something to do with regularly bathing, but you're not afraid to admit ${shehe}'s a decent catch in the sea.  Very decent.  ${Brigid} is far less entertained by your fascination and lands a sharp elbow to your stomach, bringing you back to reality.\n    *goto c1CallChoice\n  #$!{shehe} needs our help.\n    *set loner %-10\n    *set vigilant %+10\n    [i]Leader has increased[/i]\n    *line_break\n    [i]Vigilant has increased[/i]\n    *line_break\n    *line_break\n    What does it matter what you thought of ${herhim}?  Family killed by bandits…${herhis} once happy world had flipped upside down.  It doesn't matter how well-off ${shehe} may have been, you're sympathetic to ${herhis} losses.  ${Silvana} needs people to rely upon now more than ever, and you intend to be one of them.  ${Brigid} rolls ${herhis} eyes in the face of your determination, muttering about your over-dramatics.\n    *goto c1CallChoice\n*label c1CallChoice\n\nThe sun is already high up in the sky by the time you make it back home.  It is time to dust off your midsummer's best.  Even a demon can attend a service if he dresses sharply enough, though you'd like to think it would have better ways of spending its time.\n\n*if (whichChild = \"only\")\n  To say your mother is flustered would be an understatement; it will always be strange to see her in a fancy dress fit for a rich merchant's second wife.\n  *goto c1Child3\n*else\n  To say your mother is flustered would be an understatement, and it will always be strange to see your sisters with powdered-up faces.\n  *goto c1Child3\n*label c1Child3\n\nIt's also weird to see your father wearing something that didn't come off an animal he skinned himself.  Of course, you're going to dress up nicely as well, and though you don't have many options, you still need to choose.  What are you going to wear?\n\n*if (gender = \"male\")\n  *choice\n    #Your usual clean, blue tunic.\n      *set whichClothes \"normal\"\n      *set suave %-10\n      [i]Direct has increased[/i]\n      *line_break\n      *line_break\n      Men don't really dress up so much as clean up.  You wear tunics all the time when you're not doing manual labor.  It's just a matter of finding one that doesn't smell like two rats getting busy in the rafters.  Blue is the most colorful of your typically brown and off-brown wardrobe, so why not go with it?\n      *goto c1ClothesChoice\n    #Traditional church attire.\n      *set whichClothes \"traditional\"\n      *set resourceful %-20\n      *set vigilant %+10\n      [i]Faithful has greatly increased[/i]\n      *line_break\n      [i]Vigilant has increased[/i]\n      *line_break\n      *line_break\n      'Traditional' by fashion standards is usually just a nicer word for humble, which is just another word for ugly.  Still, this event isn't about you; standing out more than the groom is hardly respectful.  It's what's on the inside that counts, anyway.  You don a very long, belted tunic.  It could very well be mistaken for a gown with its length, but what does that matter?\n      *goto c1ClothesChoice\n    #A tight-fitting gold doublet—if you've got it, flaunt it!\n      *set whichClothes \"sexy\"\n      *set suave %+10\n      [i]Suave has increased[/i]\n      *line_break\n      *line_break\n      Ah, your own secret weapon that cost four month's wages doing odd jobs in your free time.  Ringing it out of that sleazy gnomish merchant was difficult, but it's all about to pay off.  The tunic is hardly a remarkable fashion choice; chances are, every other fellow there will be in one.  But the devil's in the details.  Form-fitting silk from the Far West, gilded with gold in an elaborate baroque design.  You're going to turn more than a few fair maiden's heads (as fair as they get around these parts, anyway).  Every guy there is going to want to bust your head in, but let them be jealous.\n      *goto c1ClothesChoice\n*else\n  *choice\n    #Your usual black-and-silver gown.\n      *set whichClothes \"normal\"\n      *set suave %-10\n      [i]Direct has increased[/i]\n      *line_break\n      *line_break\n      Long, black-trimmed sleeves and a more than respectable neckline; it's a bit big on you, but that's because it used to be your mother's.  On the plus side, a corset isn't really necessary…breathing really is underrated in women's fashion these days.  You still manage to show your figure with a bit of adjustment…it's a crime to hide all those perfect curves!\n      *goto c1ClothesChoice\n    #Traditional church attire.\n      *set whichClothes \"traditional\"\n      *set resourceful %-20\n      *set vigilant %+10\n      [i]Faithful has greatly increased[/i]\n      *line_break\n      [i]Vigilant has increased[/i]\n      *line_break\n      *line_break\n      'Traditional' by fashion standards is usually just a nicer word for humble, which is just another word for ugly.  Still, this event isn't about you; standing out more than the bride is hardly respectful.  It's what's on the inside that counts, anyway.  You don what is basically a shapeless gown with a cyclas (a tunic) over the top.\n      *goto c1ClothesChoice\n    #A sexy silk open-front bodice with laces—if you've got it, flaunt it!\n      *set whichClothes \"sexy\"\n      *set suave %+10\n      [i]Suave has increased[/i]\n      *line_break\n      *line_break\n      Ah, your own secret weapon that cost four month's wages doing odd jobs in your free time.  Ringing it out of that sleazy gnomish merchant was difficult, but it's all about to pay off.  Your healthy bosom looks even healthier with the bodice's push-up effect, and those puffy smock sleeves scream high fashion.  Truly, you'll look decades ahead of everyone else at the ceremony.  And the women will certainly hate you for it, but let them!\n      *goto c1ClothesChoice\n*label c1ClothesChoice\n\n*if (whichChild = \"only\")\n  By the time you've gotten yourself into a presentable shape, your mother and father have already made their way to the chapel.\n  *goto c1Child4\n*elseif (whichChild = \"oldest\")\n  By the time you've gotten yourself into a presentable shape, your younger siblings have already raced their way to the chapel, no doubt dirtying their (relatively) expensive clothes in the process.\n  *goto c1Child4\n*else\n  By the time you've gotten yourself into a presentable shape, your siblings have already made their way to the chapel.  You aren't quite sure what the rush is—especially since food and drink aren't served until afterwards.\n  *goto c1Child4\n*label c1Child4\n\nYou make your way to the chapel on a warm summer's afternoon in late June.  While the cold winter months lie ahead menacingly, you can't help but be optimistic.  Nothing in your future is written down, and change is in the air.  You find yourself jealous of ${Brigid} (of all people), who seems to be dead set on joining the Knights.  Or even ${Silvana}…while ${shehe} has been through so much, the path ahead of ${herhim} is a clear one.  So where does that put you?\n\n*finish Next Chapter\n", "chapter10": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 10\n\n——————————————\n*line_break\n—————————— Chapter 10: The Calmest Wind\n*line_break\n——————————————\n\n[i]*ahem*[/i]\n\n[i]*AHEM*[/i]\n\nIt takes several throat-clears to gather the attention of all the lords and ladies at the table.  The minstrel halts midway through a ballad, thankful to give his lungs a rest.  You gaze upon their watchful faces, knowing an announcement is sure to come.  These are experienced diners, but you doubt that they could even begin to guess what is going to happen next.\n\n\"My lords and my ladies, if I may have a moment…I would like to give a toast.\"  Aphid rewards you with a smile and even has the audacity to have a look of surprise on her face.  No worries.  Soon, it will be a sincere one.  You raise the goblet you were given.  The contents are dark red, like ordinary wine but with an unpleasant aroma.\n\nIt is only now that you notice ${Brigid} is so close by, standing as a guard would at the rear wall.  $!{shehe} must have been there for some time…passing up meals to be closer to you?  No, that's…that probably isn't it.  Focus, ${name}.\n\n\"May we all give a round of applause to the Lady Aphid Almondvale, who has done so very much to make tonight a wondrous occasion?\"  Applause erupts as the woman of the hour's smile begins to fade.  You don't hesitate.  \"You may find it hard to believe, but she found me half-drunk in Pauper's Alley this morning.  I was a ${MC_manwoman} down in both luck and spirit.  Now look at me.  She gave me the opportunity to meet and mingle with all you lovely people, and I found it to be a great pleasure.\"\n\nThose words earn yet more applause, this one directed towards you.  Servao isn't amongst those clapping as he looks to be suffering from a heart attack.  He just realized he's been whispering slanderous gossip to a member of the working poor.  It's time to wrap this speech up in the traditional manner.\n\n\"And so, I offer the first cup to you, Lady Almondvale.  May your health and well-being be as strong as your character.\"  There's a handful of faces you'll never forget, at least not in this life.  Your mother's face as you stood over the bloodied corpse of that crazed bandit in your living room.  Patch's face after ${shehe} caught you with a mostly naked Maeben in a very compromising position.  And now, Aphid's face after you just offered her a taste of her own poison.\n\n*if (whichElement = \"air\")\n  You feel it before it happens.  It's a familiar sensation, the same buzzing in your ears you would get when you conjured up wind magic.  The problem is…you aren't the one casting this time.  The blue woman's eyes light up, those purple amethysts dilating with tremendous rage.  It's as if the illusion of regality is torn asunder, and in its place a raging barbarian of the winds!  How the air swerves, gusts knocking down plates and goblets every which way.  The floor has grown red from the spattered wine!\n  *goto c10WhichElement1\n*else\n  What is this feeling?  The blue woman's eyes light up, those purple amethysts dilating with tremendous rage.  It's as if the illusion of regality is torn asunder, and in its place a raging barbarian of the winds!  She's a mage!  How the air swerves, gusts knocking down plates and goblets every which way.  The floor has grown red from the spattered wine!\n  *goto c10WhichElement1\n*label c10WhichElement1\n\nA chorus of cries and yells comes from the dinner guests, who are getting pummeled by a tornado that has appeared from out of nowhere.  You grit your teeth.  This isn't part of the plan!  What the heck should you do now?\n\n*temp wife_safe false\n\n*choice\n  #Get Kerlton to help.\n    *set wife_safe false\n    The gnome keeps bragging about how good a shot he is with a crossbow—now is a perfectly good time to prove it!  You yell for him, but your voice escapes you…air escapes you!  You clutch at your neck as you struggle in vain to fill your lungs!\n    *goto c10FightAphidChoice\n  #Get ${Brigid} to help.\n    *if (loner \u003c= 50)\n      *set wife_safe true\n      *set renown +1\n      [i][Check versus Leader: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      ${Brigid} certainly looks the part of a knight in shining armor—now is a perfectly good time to prove it! \"${Brigid}, protect McDohl at all costs!\"  You yank the woman from her chair and quite literally toss her into ${Brigid}'s armored cuirass.  You say something else to your old friend as well, or at least you try to.  You yell out, but your voice escapes you…air escapes you!  You clutch at your neck as you struggle in vain to fill your lungs!\n      *goto c10FightAphidChoice\n    *else\n      *set wife_safe false\n      [i][Check versus Leader: fail][/i]\n      *line_break\n      *line_break\n      ${Brigid} certainly looks the part of a knight in shining armor—now is a perfectly good time to prove it!  As you turn to speak with ${Brigid}, you find ${herhim} running towards you against a torrent of wind.  $!{herhis} footing fails ${herhim}; the knight slips back and makes a tremendous 'CLANK!' against the wall.  You yell out, but your voice escapes you…air escapes you!  You clutch at your neck as you struggle in vain to fill your lungs!\n      *goto c10FightAphidChoice\n  #Rush her.\n    *if (loner >= 50)\n      *set wife_safe false\n      *set renown +1\n      [i][Check versus Loner: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You don't have time to get anyone else involved.  You toss the goblet of poison at Aphid, who attempts to swat it away with a gust but can't quite control the winds fast enough.  The liquid dirties her blouse, but for her sake at least, it isn't lich's blood.  You rush, the distraction giving you just enough time to get in close.  Your sudden attack nearly works, too, until you can't fill your lungs with air anymore.  You clutch at your neck, vainly trying to capture air that just isn't there!\n      *goto c10FightAphidChoice\n    *else\n      *set wife_safe false\n      [i][Check versus Loner: fail][/i]\n      *line_break\n      *line_break\n      You don't have time to get anyone else involved.  No, you don't want anyone else getting hurt.  You're the closest, so—ergh!  While you're plotting your next move, a gust of wind knocks the air out of your lungs.  And…you can't fill them back up!  This is bad!\n      *goto c10FightAphidChoice\n    *goto c10FightAphidChoice\n  #Fight magic with magic.\n    *set wife_safe false\n    *if (loner >= 50)\n      *set renown +1\n      [i][Check versus Loner: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You don't have time to get anyone else involved.  You toss the goblet of poison at Aphid, who attempts to swat it away with a gust but can't quite control the winds fast enough.  The liquid dirties her blouse, but for her sake at least, it isn't lich's blood.\n      *goto c10FightMagicWithMagic\n    *else\n      *goto c10FightMagicWithMagic\n    *label c10FightMagicWithMagic\n    \n    Fighting magic through regular means rarely ends well.  No, it's time to fight fire with fire.  Or, well…\n    *if (whichElement = \"fire\")\n      wind with fire, in any case.\n      *goto c10WhichElement2\n    *elseif (whichElement = \"water\")\n      wind with water, in any case.\n      *goto c10WhichElement2\n    *elseif (whichElement = \"earth\")\n      wind with earth, in any case.\n      *goto c10WhichElement2\n    *else\n      wind with wind.  Same difference.\n      *goto c10WhichElement2\n    *label c10WhichElement2\n\n    At least that's what you intended to do.  You've entered complete focus countless times before, so why can't you do so now?!  After one last gasp for air that just isn't there, your mind finds what it's been desperately searching for!\n    *goto c10FightAphidChoice\n*label c10FightAphidChoice\n\nComplete focus envelops you as your knees start to buckle, as the lashes of air start to sting into your body, drawing out sprays of blood.\n\n*if (whichElement = \"fire\")\n  Your attention shifts to the grand fireplace against the main wall.  It's lit but ever so faintly, these winds threatening to snuff the paltry flames out altogether.  Fire is fueled by air, so you put everything you have into that fireplace.  Those faint sparks draw out into an inferno, sucking in the wind around it like a sponge.  In a flash, the tornado calms into nothing more than an odd indoor breeze.  You're finally able to catch your breath again.\n  *goto c10WhichElement3\n*elseif (whichElement = \"water\")\n  The air is dry and easily twisted, warped, and controlled.  But could this novice wind magician handle a bit of humidity?  You concentrate upon the air around you, saturating the smallest amount of liquid you can imagine.  Fog emits from your mouth and eyes as a weird sort of smoke, allowing you to drink the gasps of air you so desperately require.  The fog is tossed about for a short while until finally settling.  The tornado is now no more than an odd indoor breeze.\n  *goto c10WhichElement3\n*elseif (whichElement = \"earth\")\n  As you place your hands on the ground to halt your fall, you feel the room in its entirety.  Everything from the stone foundation to the wooden floors and brick walls.  Brick is notoriously expensive, but also very flat and smooth.  It's no wonder how even a novice wind magician could turn this hall into a wind tunnel.  You feel the smooth texture against your fingertips, then grip it tightly.  Dust shoots out from the walls, walls now decorated with more wrinkles than the most gnarled ancient oak.  The winds slow to a crawl, the tornado no more than an odd indoor breeze.\n  *goto c10WhichElement3\n*else\n  This is downright insulting.  This amateur, knocking the air right out of you?  You'll make her pay for that.  It's a technique you never took seriously until now—you start whistling.  The winds fly inside you, filling you with the air your body so desperately requires.  Stopping this tornado is a simple matter of changing half the air's direction from clockwise to counterclockwise.  The gusts collide, fading harmlessly into the ceiling.  This tornado is now no more than an odd indoor breeze.\n  *goto c10WhichElement3\n*label c10WhichElement3\n\n\"How did…no, that's…my magic can't…!  Why did the winds stop?!\"  It takes her a moment, but she catches on quickly.  Her piercing gaze is enough to shatter stone, and it's directed right at you. \"You!  Filthy human trash, you've ruined everything!  YOU WERE SUPPOSED TO BE MY PUPPET!\"  Foam leaks from the sides of her mouth, outrage resounding throughout her very core.  The sound beats against your eardrums.\n\n*choice\n  #Attack her.\n    *if (suave \u003c= 50)\n      *set renown +1\n      [i][Check versus Direct: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *goto c10Direct1\n    *else\n      *goto c10Direct1\n    *label c10Direct1\n    *goto c10AttackDistractChoice\n  #Distract her.\n    You want to distract her first and foremost, so the other guests have more time to escape.  This dining hall is already looking rough, and the battle has just begun!  Now to say something that'll get her attention…\n    \n    *if (suave >= 50)\n      *set renown +1\n      [i][Check versus Suave: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      \"Listen, lady, if you're trying to blow me, you'll have to give it more effort!  Perhaps a visit to the pleasure houses might—\"  You sidestep to dodge a concentrated arrow of air.  To those who don't think a projectile made out of wind would be particularly dangerous, imagine getting a dozen papercuts at once.  Owie.  Looks like you'll have to go on the offensive after all!\n      *goto c10AttackDistractChoice\n    *else\n      [i][Check versus Suave: fail][/i]\n      *line_break\n      *line_break\n      \"Listen, lady, we don't have to resort to magic, do we?  Let's settle this matter like well-adjusted and civilized—UmPH!\"  It's a long-range punch to the gut made from (literally) thin air.  So that's how it's going to be.  Looks like you'll have to go on the offensive after all!\n      *goto c10AttackDistractChoice\n*label c10AttackDistractChoice\n\n*if (whichElement = \"fire\")\n  Your footsteps make the carpets beneath your shoes smolder.  The area around you blurs like a mirage in the desert sun.  And this wannabe sylph dares to try and snuff you out?\n  *goto c10WhichElement4\n*elseif (whichElement = \"water\")\n  The wine on the ground flows in front of you like some sort of personal red carpet.  Each exhale you take emits a mist that wraps around you like a viper, coiled and ready to strike.  And this wannabe sylph dares to try and wither your resolve?\n  *goto c10WhichElement4\n*elseif (whichElement = \"earth\")\n  The floor moves like a wave around your feet.  You don't walk—the floor moves for you.  You could skate your way around like a tremor and hit ten times as hard.  And this wannabe sylph dares to try and erode your life away?\n  *goto c10WhichElement4\n*elseif (whichElement = \"air\")\n  Your footsteps don't make a sound, because your feet aren't touching the floor.  You hover perfectly, even going into several flips to show off your prowess.  These winds are yours now.  This wannabe sylph is about to figure out what happens when you…throw caution to the wind!\n  *goto c10WhichElement4\n*label c10WhichElement4\n\nAphid trembles with fear, but to her credit is already attempting to conjure up another gust.  Fruitless effort, she's not even going to hit you with it!  Wait—\n\n*if (wife_safe = true)\n  \"Y-you'll…need more than that, blue demon!\" ${Brigid} yells out, holding Lady McDohl in a deathgrip as the air itself attempts to wrestle the petite woman from the knight's protection.  It's a blessing from the Fates themselves that ${shehe}'s clad in armor—those lashes of air would've ripped bare skin to pieces.\n  *goto c10WifeSafe1\n*else\n  \"WhUahAHH!\"  Lady McDohl cries out as she is pulled, no, yanked into the air towards Aphid.  Why didn't she leave with the others?  The woman is petite, but even still, she flies across the room like a rag doll, although landing like a rock right in front of the crazed faerie magician.  A dinner knife appears in Almondvale's hand, which then rests precariously close to the neck of her victim.\n\n  \"Are you watching, mother?!  They all look up to me now!  Aren't you proud?!\"  Aphid holds the collapsed woman by the hair, who has gone unconscious from the shock.  The faerie erupts in a horrific bellow of laughter. \"Look at what your little girl has become!  Aren't you proud?!\"  She beckons like a woman gone mad, for her mother and for the world.\n  *goto c10WifeSafe1\n*label c10WifeSafe1\n\n\"Everyone loves me…I just need to kill this tiresome woman!\"  She has to be completely crazy at this point, which worries you.  Dark magic can certainly twist the soul—it did with Maeben—but Aphid is an air magician.  If elemental magic could turn her into something like this…then what about you?  Are you losing control?  Power…\n\n*choice\n  #Fates know I want it.\n    *if (vigilant >= 50)\n      [i][Check versus Vigilant: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *goto c10Vigilant1\n    *else\n      *goto c10Vigilant1\n    *label c10Vigilant1\n    *set corruption +10\n    [i]Your corruption increases[/i]\n\n    Of course you do.  The burning houses of southside, the screams of the baker's wife for mercy.  Those people back home weren't powerful.  And because of it, their story ended right then and there.  Now look at you.  Your actions shake the kingdom off its very foundations!  Stories and songs will be written in your wake.  As for Aphid Almondvale, she made the mistake of dueling a superior wizard.  You're hurriedly plotting your next move when it happens.\n    *goto c10PowerChoice\n  #I don't want it.\n    *if (vigilant \u003c= 50)\n      [i][Check versus Carefree: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *goto c10Carefree1\n    *else\n      *goto c10Carefree1\n    *label c10Carefree1\n    *set corruption -10\n    [i]Your corruption decreases[/i]\n\n    *if (attractedTo = \"female\")\n      Let's see here…Maeben wanted beauty and became a ${succubusincubus} for it.  Aphid Almondvale wanted control and ended up as this uncontrollable wind monster.  ${name} wanted nothing in particular and lived happily ever after.  At least, that's how you're choosing to interpret this.  But on to the matter at hand: your opponent has just made the fatal mistake of dueling a superior wizard!  You're hurriedly plotting your next move when it happens.\n      *goto c10PowerChoice\n    *else\n      Let's see here…Maeben wanted beauty and became an ${succubusincubus} for it.  Aphid Almondvale wanted control and ended up as this uncontrollable wind monster.  ${name} wanted nothing in particular and lived happily ever after.  At least, that's how you're choosing to interpret this.  But on to the matter at hand: your opponent has just made the fatal mistake of dueling a superior wizard!  You're hurriedly plotting your next move when it happens.\n      *goto c10PowerChoice\n    *goto c10PowerChoice\n*label c10PowerChoice\n\n*page_break\n\n[i]Pwah-CHUNK![/i]\n\nThe air is still, the room deadly quiet.  You leave your focused state behind without consciously doing so.  The immediate threat lays slumped against the wall, a silver bolt sticking out of her side.  It's a good shot, but still…did it have to end this way?\n\n*if (corruption >= 40)\n  [i][Check versus Corruption: pass][/i]\n  *line_break\n  *line_break\n  This was supposed to be a duel between mages…your blood is still boiling from the thought of it.  Fighting against one such as yourself brings an exhilarating sensation you've never felt before.  The intensity was there, but now it's gone…\n  *goto c10Corruption1\n*else\n  [i][Check versus Corruption: fail][/i]\n  *line_break\n  *line_break\n  You hardly know anything about her; the two of you belong to entirely different social classes, but there's one thing you share: magic.  You might have been able to help her out, steer her towards a better course…\n  *goto c10Corruption1\n*label c10Corruption1\n\nKerlton appears at her side faster than you can blink.  Scattered plates and half-eaten chicken, spilled broth and wine litter the once-regal dining hall.  You approach Aphid as well, though with a healthy amount of caution.  The blue woman coughs up blood as the bard cups her head in his hand to keep it raised.\n\n\"Y-you stupid girl…Uncle Kerly is here, I'll make it all better with a song.\"  You've never heard this voice come from your companion before.  He's like a distraught father, talking to his dying little girl.  It's a heartbreaking scene…Fates damn it, you just want to feel like the good guy for once.\n\nAphid smiles, not the fake smile of a dignitary trying to court her way to the top, but a genuine smile from a little girl to her favorite uncle. \"Do you think she would be proud?  So many of them said they loved me!  T-they could be lying, though…\"  It's messed up to see such an intelligent person reverting to what seems to be a child's mentality.  Just what sort of childhood did she go through?\n\n\"Everyone loves you, Aphy.  The only one who doesn't…is you.\"  Kerlton pulls out a handkerchief to wipe away the blood from her mouth, but it's a fruitless endeavor.  Breathing becomes more and more difficult…she hasn't much time left.  This is a touching scene, but you still have something you need to ask.\n\nYou squat down next to her so she can hear your question clearly.  You pity this woman and what she has become, but that doesn't matter now. \"I need to know how you got your magic.  Where's ${Silvana}?!\"  Keeping calm is impossible with the adrenaline from that battle still pumping through your veins.  Kerlton shoots you a nasty look, but this is something you have to know.\n\nBlood spits out as Aphid coughs once more, though it may have been a deliberate attempt to dirty your face. \"I thought I was special…Kaine said I was, that pet of his—\" [i]*cough*[/i] \"—touched my forehead, and I felt this ringing in my ears…\"  She turns her face with great pain and difficulty towards you. \"$!{shehe} said I'd live to regret this gift.  The castle's observatory tower…go there, Quel-Edan.\"  A bout of coughs indicate that she is finished dealing with you.\n\nA bashing down of the front door indicates that phase number…which number are we on again?  It doesn't matter; a jolly old dwarf comes rushing in with a platoon of guardsmen in tow.  On his shoulders rests a frail-looking boy no older than five.  Lady McDohl's ecstatic cry gives his identity away; the young master has returned safe and sound.\n\n\"Ye run ta ya mother now, lad.  Don't be forgettin': Redwater don't falter!\"  It's yet another terrible attempt at a company catchphrase, but that can't dampen your high spirits.  The boy was rescued safely after all, and the plan has been a complete success!  Binyo and Genock were tasked with scouting out and interrogating one of Aphid's thugs.  They only had a hunch to go on, but it paid off.  Apparently, the boy had been tied up in an attic somewhere, no doubt to be timely rescued by Almondvale upon the Stormwarden's return.\n\n*page_break\n\nWords are whispered behind you in a tone of pained cheerfulness.  A nursery rhyme, a silly song:\n\n[i]\"Oh faerie of blue with violets for eyes;[/i]\n\n[i]Wilt thou be mine, said a sad-lookin
