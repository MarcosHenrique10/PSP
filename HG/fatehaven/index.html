're confident in your reconnaissance; while the offices are a clustered maze, it wouldn't be too hard to convince a scribe to lead you to where the kitchens are.  After you got him alone…then you'd have to decide the next step.\n  *goto c6ChoiceRecon2\n*label c6ChoiceRecon2\n\n\"Patch will be disappointed when ${shehe} findsss out you didn't need ${herhisss} help after all, haha.\"  The one-eyed cat${girlboy}.  Two months ago, you'd never have imagined such a creature even exists in this world…not to mention the giant lizard you're passing the time with right now.  It amazes you, but mostly because it causes you to realize just how small your world has been for most of your life.  Those stories ${Silvana} spoke of with faeries and dragons and giants…they don't seem as far-fetched as they once did.\n\nThere's still at least half an hour to kill, so you indulge your fellow Redwater Salvage Consultant in the details of how this job had come about.  Patch is the last person who'd help you out now after that debacle.  Taking a dangerous job without even asking for a price, you didn't even consider taking ${herhis} opinion on the matter.  You'll have to figure out some way to make it up to ${herhim}, especially if the two of you are going to work together in the future…\n\nGenock considers the tale thoughtfully, then waits to find the words he's searching for prior to giving a reply.  \"We are outsidersss, you and I.  In my clan, we had no need for coin.  We traded goodsss and were content with that.  When I left and became a mercenary, I held a gold Delmacian ducat for the first time.  I traced the ridgesss with my finger a thousand times.  Every detail from the face to the emblem, memorized.  Were it not for Tei, I'd…hmm, I've gotten off track.\"\n\nWhile Genock fumbles for the right words, you understand his point.  A gold Demacian ducat; honestly, you've never handled such a valuable coin yourself.  You're more of a copper-and-silver ${MC_manwoman}.  The sort of job he must have done to earn one of those…would require blood be spilled and nothing less.  It's certainly true that you and he haven't been in this world as long as Patch and Kerlton have.\n\n\"You do not know about the cat'sss history…so please don't judge ${herhim} harshly if ${shehe} seemsss obsessed with money.  To ${herhim}, coin representsss much.  Self-value, self-worth…validation for being?  I am unsure if I can describe it in your human tongue, ${name}.\"\n\nSo that's why Patch turns scarily serious when it comes to coin…it's still difficult for you to imagine.  To you, a pouch full of silver means pastries from the bakery and a nice-looking ${MC_tunicdress} from the next merchant's caravan to pass by.  It certainly doesn't mean validation for being alive!  But you find a new respect for the cat regardless, and for Genock as well.  He is a good friend, and you now see that Binyo's greatest—and perhaps only—asset is his ability to find quality people to work for him.  \n\nNow it's time to prove that you're among them.\n\n*page_break\n\nAfter obtaining a crate, some cheap odds and ends to fill it with, and some mackerel to top it off, you're good to go.  That last bit takes longer than it should have, as Genock got impassioned while bargaining with a fishmonger who he felt overstated the freshness of the fish.  Apparently, a lizard's sense of smell is very good; also apparent is that he has no intention of letting these fish go to waste.  With that matter settled, you make for a side entrance to the Bishop's house and the biggest chapel in the kingdom.\n\nThe flock of carriages ahead of you are a sure sign on Friar Street that someone is either getting hitched or getting buried.  Someone with money, anyway.  It is oddly late for a wedding; the sun is showing signs of setting before the ceremony has even started.  It will be midnight before the poor saps have a chance to wine and dine on exotic octopus and roasted peacock.  Just imagining how hungry those fattened nobles will be before they get to stuff themselves with pork and rabbit and figs…you think your eyes might start watering.\n\nThe first obstacle that presents itself is an older woman with glasses and a large scroll that reaches well onto the floor.  Her ever-present frown and scrutinizing gaze would intimidate even the most veteran of wedding caterer.  The line moves slowly, your arms wishing those 'odds and ends' you filled the crate with were significantly lighter.  If only straw weren't such a luxury item in the city…\n\n\"Name and item.\"  Fates save you, the line has moved up without you noticing!  What should your approach be?\n\n*choice\n  #No nonsense.\n    Now isn't the time to play games or mess around.\n\n    *if (vigilant >= 50)\n      *set renown +1\n      [i][Check versus Vigilant: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      Bluewater Trawlers are here with a fresh catch of mackerel.  What?  Not on the list?  It's a supplementary last-minute order by the Lady's family.  Guaranteed fresh, just ask the lizard.  The woman gives you a drawn-out look and sighs before caving in to your persistence. \"This is why I prefer organizing funerals instead of weddings.  Very well, put it in the kitchens with the other seafood.\"\n      *goto c6ApproachChoice\n    *else\n      [i][Check versus Vigilant: fail][/i]\n      *line_break\n      *line_break\n      You try to assure her that you have to be on the list there somewhere, but she won't budge.  Darn it, you aren't going to fail this rescue mission because of some old coot at the front door!  Luckily, Genock pipes in, mentioning that it's a supplementary order added at the last minute.  That seems to convince her, and the two of you are finally inside.\n      *goto c6ApproachChoice\n  #Laid-back.\n    You're just a regular Joe making minimum wage carrying a crate full of fish.  Now to act like it.\n\n    *if (vigilant \u003c= 50)\n      *set renown +1\n      [i][Check versus Carefree: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You play up your country accent a bit.  It's not terribly difficult: use 'ah' instead of 'i' and really swoop the 'oo's.  What?  You ain't on the list?  Ain't a thing, one of them lordfolk has a special order.  Just smell how fresh that mackerel is.  Why, just ask the lizard, they have a nose for this sort of thang.  The organizer rolls her eyes but nods, motioning you towards the kitchens.\n      *goto c6ApproachChoice\n    *else\n      [i][Check versus Carefree: fail][/i]\n      *line_break\n      *line_break\n      Unfortunately, this woman is all business. \"You're not on the list.  We can't receive your order.\"  Carp!  Or rather, crap!  Luckily, Genock pipes up, saying it's a special last-minute order by the Lady's family.  That seems to cause her to falter. \"This is why I prefer organizing funerals instead of weddings.  Very well, put it in the kitchens with the other seafood.\"\n      *goto c6ApproachChoice\n*label c6ApproachChoice\n\n*if (choiceRecon = false)\n  While a trip to the kitchens would be beneficial for your stomach, you have a more important goal in mind.  Thanks to Genock's instructions, the two of you make your way to the scriveners' offices while managing to avoid the influx of minor nobility.\n  *goto c6ChoiceRecon3\n*else\n  While a trip to the kitchens would be beneficial for your stomach, you have a more important goal in mind.  You follow the mental map you crafted earlier, and the two of you make your way to the scriveners' offices while managing to avoid the influx of minor nobility.\n  *goto c6ChoiceRecon3\n*label c6ChoiceRecon3\n\nCompared to the bustling activity in the main hall, the rest of the grand cathedral is dark, damp, and eerie.  It's a creepy sort of atmosphere intensified by the task laid before you.  A few candles sitting precariously close to piles of parchment give away the positions of the clerks who'll be working the nightshift.  It's time to put the plan to work.\n\nYou and your partner head into the offices, looking quite lost.  It's not terribly hard to do.  The closest scribe has his head deep in a tome, until you interrupt his reading.  He's an older man displaying more forehead than head hair with a close-shaven beard.  And it looks as if he has just seen a ghost, though you suppose a seven-foot muscular lizardman often provokes such a reaction.  It's up to you to smooth things in your favor.\n\nFirstly, you apologize for the interruption, stating that the two of you are horribly lost and that the wedding has made a whole mess of things.  You're relieved when he nods, so you go into the next phase of your plan.  You have a special order of mackerel for…\n\n*choice\n  #Disciple Kaine.\n    Disciple Kaine.  You still imagine him sitting in a chair in your father's living room…and how he murdered him shortly afterwards…revenge pumps through your heart just the same as blood.  You will find that fake priest and show him what true magic feels like.  The scribe's reaction is one of uncertainty, however.  \n\n    \"Kaine…there's a name you hardly hear 'round here.  Thought he was with the Pals of Light group, re-educating captured Nanchoans the Cossack Order way.\"\n\n    Re-educating…is that what they're calling torture these days?  You hesitate to think of the war crimes being committed on the behest of this unjustifiable war.  But civil rights aren't high on your list of concerns at the moment. \"He was a peculiar and mysterious fellow, so it's not too strange to have something special-ordered.  Give me a moment.\"\n    *goto c6DiscipleChoice\n  #Disciple Arlindir.\n    Disciple Arlindir.  The man responsible for Maeben's capture.  You don't know the guy personally, but you know he's a devil in priest's clothing.  An assassin with an affable smile who'd drink tea in your living room and kill your family shortly afterwards…you'll have your revenge on each and every one of them.  You'll show them what true magic feels like in the most painful way imaginable.  The scribe's reaction is one of annoyance, however.\n\n    \"Fates, not again…hey Ervic, Arlindir's got himself another special order!  Mister Big Time since he got reassigned, isn't he?\"  It's awkward standing there with a crate full of fish while disgruntled employees complain to one another, but it seems like this sort of situation isn't out of the ordinary. \"All right, well give me a moment.\"\n    *goto c6DiscipleChoice\n*label c6DiscipleChoice\n\nThe clerk maneuvers his way through desk chairs and piles of books with practiced ease.  From a seemingly random cabinet, he produces a key, causing your heart to skip.  This whole mission is going exceedingly well!  You'll be in and out with a cute wood elf in tow just like that.  Yep, nothing could go wrong now!\n\n*if (gender = \"male\")\n  \"Oh, Disciple Conia.  Wonderful timing, these two gents have a special order of fish for downstairs.  I was about to take them myself, but if you're headed there…\"\n  *goto c6GenderGent1\n*else\n  \"Oh, Disciple Conia.  Wonderful timing, this lady and gent have a special order of fish for downstairs.  I was about to take them myself, but if you're headed there…\"\n*label c6GenderGent1\n\n…\n\nWell, I guess you asked for it.  Behind you stands a woman who is fully hooded; the only bit of her face you can see is covered in scars.  Her lips aren't where they should be…in fact, they aren't there at all!  So basically, she's a warrior monk that came straight out of your nightmares.  The hood nods slowly and turns away. \"Disciple Conia's a mute, but she'll take you where you need to go.  Try and sneak something out of the kitchens on your way out; it's the only upside to weddings!\"\n\nThe scribe's cheerful tip forces you to fake a smile when what you really want to do is vomit everywhere.  You try to indicate to Genock with your eyes just how bad the situation is, but he remains blissfully unaware.  And why shouldn't he be?  A girl, probably your age, is going to lead you straight to your objective.  Heck, she couldn't even yell for reinforcements if she wanted to.  But that's a mistake.  Underestimate these killers, and you'll beg for death before the end.\n\nYou realize that you should be making some sort of small talk to bury this tense silence, but your heart is caught in your throat.  What would you talk about?  [i]\"Oh yeah, about that time you guys slaughtered that town of farmers.  You missed one!  Hahaha…\"[/i]  Then again, it would be strange chatting with someone unable to chat back, right?  Right.  You are being courteous, not frightened.\n\n*if (choiceRecon = false)\n  An iron-reinforced door stands before you, no doubt the one Genock had spoken about earlier.  Good to know that you'll at least die after you get to where you need to be, hahaha…\n  *goto c6ChoiceRecon4\n*else\n  An iron-reinforced door stands before you, the same one you scouted out earlier.  Good to know that you'll at least die after you get to where you need to be, hahaha…\n  *goto c6ChoiceRecon4\n*label c6ChoiceRecon4\n\nIt takes a moment, but you're able to interpret her finger gesture as an order to put the crate down and take off the lid.  You're glad that Genock bought a healthy amount of mackerel to pack the top with.  The priestess picks one up and stares at it for a rather lengthy period of time.  You're about to ask if there's something wrong with the fish when she stuffs the whole thing in her mouth, raw!  If that isn't disgusting enough, those teeth of hers are painted black!  Just what kind of monster are you dealing with?\n\nGenock perks up, proving to be far more accustomed to raw fish than you are. \"Forgive my friend, ${MC_heshe} isss obliviousss to Nanchoan practicesss.  Rest assured, we are not insulted that you test the quality of our catch.\"  Leave it to the follower of Tei to make sense of a scene out of some horror story.  But Conia is just as surprised as you are, not expecting a giant lizard to be fluent in fish customs from the Far West.  Genock might just have gotten us into a dangerous situation; after all, he did just call her out on something that the 'Western demons' we're crusading against did.\n\nTo your relief, the disciple unlocks the door and ushers you inside, though you can't help but notice she looks more spooked than she had before.  Hard to tell when you can only see her lips, though, or whatever that mess of scars on the bottom half of her face is.  Genock's knowledge won't be the only surprise Little Miss Blackteeth will have before tonight is over.  You try to formulate a plan on how to deal with her, but really it takes everything you have to maneuver this—now extremely heavy—crate down a winding set of stairs.\n\n*if (sly \u003c= 50)\n  [i][Check versus Powerful: pass][/i]\n  *line_break\n  *line_break\n  But compared to your work at the blacksmith, a few fish are nothing.  You might not look as intimidating as your partner does, but you can carry your own weight in stone.\n  *goto c6Powerful1\n*else\n  [i][Check versus Powerful: fail][/i]\n  *line_break\n  *line_break\n  You let out a grunt and ask Genock to hold up for a moment.  A moment's rest is just what your shoulders require, though it earns you a black-toothed smirk from the hooded priestess.  Whatever, you'll deal with her later.  Getting a better grip on the crate, you continue your way downward.\n  *goto c6Powerful1\n*label c6Powerful1\n\nYou had been expecting to see a dungeon, but it still surprises you when you do.  The metal cages and dark decor don't make for much of a happy atmosphere down here.  It's good that most of the cages are empty; even if this job went sour, you and Genock could have your own cells.  Hahaha…come on, ${name}, stay positive!  You've gotten this far.  Now if only one of these prisoners was an elf.\n\nA glance and a headshake from Genock confirms that the target has yet to be sighted.  One detail that sticks out is that while it is certainly a dungeon, it smells and appears extremely clean.  Tavern floors are less hygienic than these torture chambers.  Leave it to the Cossack Order to sanitize misery…there's also something else you can't help but notice.\n\nMaybe it's the way Disciple Conia walks or the lack of definition in her arms…but you have the feeling this division is more accustomed to attacking opponents bound by chains.  They've never faced an attack down here at their headquarters—no.  The true killers like Kaine are out and about doing what they do best.  What are you doing down here, really?\n\n*choice\n  #I'm here to save Maeben.\n    *set corruption -10\n    [i]Your corruption decreases[/i]\n\n    As much as you would like to personally crush each and every one of these fake priests into the Fate-forsaken oblivion, Maeben comes first.  Saving one life is worth more than killing a dozen others.  But apart from that…let's get realistic.  Could you really take on a group of self-proclaimed mage hunters in their own base of operations?  Not likely.\n    *goto c6SaveRevengeChoice\n  #I'm here to take revenge.\n    *set corruption +10\n    [i]Your corruption grows[/i]\n\n    Who are you trying to fool?  The whole reason you took this job was to take revenge on the organization that systematically killed everyone you knew and cared about.  If you can save an elf in the process, great.  You'll burn this whole cathedral to the ground if that's what it takes to get vengeance.  Just like how a much smaller chapel back home burned, the one where ${Brigid}'s sister got married back in a summer that feels like a lifetime ago.\n    *goto c6SaveRevengeChoice\n*label c6SaveRevengeChoice\n\n*if (attractedTo = \"female\")\n  A voice hollers further ahead, out of sight. \"Conia, that you?  You know I can't risk dealing with that elf anymore, she's way too much.  You'll need to inject the lich blood sample.\"\n  *goto c6AttractedTo1\n*else\n  A voice hollers further ahead, out of sight. \"Oh Conia, is that you?  I'm about to give the elf his next serving of the lichblood sample.\"\n  *goto c6AttractedTo1\n*label c6AttractedTo1\n\nYou look over at Genock, but one look couldn't express a fraction of what you want to tell him.  The elf is one thing, but lich blood?!  There's only one lich in the world, and ${shehe} is a good friend of yours.  The priestess leading you doesn't reply, obviously because she can't.  You want to hear as much as you can.\n\n*if (attractedTo = \"female\")\n  \"I know she's the only one who's adapted to the blood…but to think she'd turn this beautiful!  We'd make a fortune selling this stuff to rich old hags, if only the application wasn't so mind-crushingly painful…remember how that one dwarf tore his face off?  Oh, did you manage to get any cake from upstairs?\"\n  *goto c6AttractedTo2\n*else\n  \"I know he's the only one who's adapted to the blood…but to think he'd turn this handsome…I'm starting to get a bit uneasy.  I don't know.  We'd make a fortune selling this to rich old barons, if only the application wasn't so mind-crushingly painful…remember how that one dwarf tore his face off?  Oh, did you manage to get any cake from upstairs?\"\n  *goto c6AttractedTo2\n*label c6AttractedTo2\n\nThe prisoner's hall opens up into a small study, though it looks as if the hall continues further ahead.  The layout appears to be built in a circular pattern, which makes some manner of sense.  Your guess is that Maeben is in one of the cells ahead.  But your concern is the pale-skinned fellow with well-maintained blonde hair who stands in shock upon the sight of guests.  The two of you have no doubt heard more than you ought have, and the atmosphere grows decidedly tense.\n\n\"V-visitors?!  Fates damn it, Conia, are you going to have to force us to silence another two?  The scriveners upstairs are still trying to find that dull-witted boy!  Fracken 'take your child to work day'…\"  The priest is a talkative fellow and maybe even affable if he wasn't so sick and twisted, but it's the miniature hand crossbow he has pointed at Genock's face that really makes you sour.  To your partner's credit, he doesn't even flinch, though fearlessness isn't a quality a caterer ought to have.  You'll have to remind him of that if you ever make it out of this alive.\n\nThe little priestess stands in front of the shot, shaking her hooded head.  She seems to want to spare your lives…had Genock's gamble with the fish factored in?  Any bonds you can build with an enemy makes it that much more difficult for them to stab you in the back.  Or shoot you through the neck with a bolt, in this case.  It's time to let your voice do some work to smooth over yet another precarious situation.  \n\nThe objective now is to ascertain just how many of these warrior-monks are on duty tonight.  You need to appear pious, or failing that, to appear friendly, good-natured, and above all, stupid.\n\n*choice\n  #Appear pious and devout.\n    *if (resourceful \u003c= 50)\n      *set renown +1\n      [i][Check versus Faithful: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You apologize profusely, adding that you yourself are a tremendous fan of the Cossack Order; you volunteered for this delivery particularly so you could meet with some.  There is a relevant verse in Protations, at the start of the twelfth chapter of which this holy order is founded around.\n\n      [b]\"And be that the shadows hide thine foes, let it be shadows that hide thine friends.  For to combat creatures of shadow, just men and righteous women must cloak in night.\"[/b]\n\n      Just as it was written.  The priest rewards you with a gentleman's clap. \"Well said, I daresay this delivery ${MC_boygirl} is better read in scripture than I am!  Now I feel rather silly for pointing a weapon at you.  And who knew Conia had a thing for scalykind?\"  He pockets his crossbow and introduces himself.\n      *goto c6AppearChoice\n    *else\n      [i][Check versus Faithful: fail][/i]\n      *line_break\n      *line_break\n      You apologize profusely, adding that you yourself are a tremendous fan of the Cossack Order; you volunteered for this delivery particularly so you could meet with some.  There is a relevant verse in Municipalities, at the start of the…third chapter of which this holy order is founded around.  You think.\n\n      [b]\"And on stallions that ride atop the sun, beholden by the Fates, born of light.  Valkyries of justice and truth set force onto the forces of darkness!\"[/b]\n\n      Just as it was written.  You're proud of yourself for remembering the verse, but you're rewarded with a snort and a fit of laughter. \"Bwahaha!  Oh, Fates help me, imagine Arlindir in breastplate and a winged helmet!  Oh man…that's a good one, and here I'm supposed to be the joker!\"  It takes a few more moments for him to recover from his fit, but at least the crossbow is back in his pocket.\n\n      \"I daresay you've mistaken the Cossack Order for Saint Freylae's Cavalry.  Not an easy mistake to make, I grant you, but we can probably both agree on something.  Much rather be in those warrior women's changing rooms than in this dark, dank place, am I right?  Heheh.\"  Honestly, being caught in their changing room is probably safer than where you are now.  What with this being a den of mage assassins and all.  The priest proceeds to introduce himself.\n      *goto c6AppearChoice\n  #Appear friendly and dumb.\n    *if (suave >= 50)\n      *set renown +1\n      [i][Check versus Suave: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You apologize, saying that this is your first time in such a big fancy church.  The one back in your hometown is smaller than this study and only has three pews.  Boy, were you packed tighter than sausages during those hot summer weddings.  Had to get real comfortable with your neighbors then!  Haha…good times.  Did you see that statue of the woman riding that horse with wings up front?  Amazing.\n\n      \"Ah, you've a keen eye for a…${MC_manwoman} of the country.  That would be Saint Freylae herself, though the sculptor took some artistic liberties on her bust line.  That, and she didn't go into battle topless…not that I'm complaining!  I'd buy him an ale if he hadn't fled the kingdom.\"\n\n      The priest sighs and pockets his miniature crossbow. \"Apologies for the precaution, we live in dangerous times, after all.  And who knew Conia had a thing for scalykind?\"  Regardless of what the priestess favors, you're just glad the immediate danger of a bolt through your throat is gone.  The man is of the talkative sort and proceeds to introduce himself.\n      *goto c6AppearChoice\n    *else\n      [i][Check versus Suave: fail][/i]\n      *line_break\n      *line_break\n      You apologize and try going into detail about how much bigger this church is than the one back home.  The only thing that really comes to mind is how clean this place is for a dungeon.  Prisoners, particular tortured prisoners, tend to emit lots of fluids, don't they?  Though you probably shouldn't have mentioned it, gauging from the reaction of the priest.\n\n      \"Argh, now even the delivery ${MC_boygirl} won't let me live it down!  Yes yes, Kylas is the best cell-sweeper in the Order.  The halfling is closer to the ground than I am; it's not my fault if I miss a bit of blood or gestational juices here and there!  I'm not supposed to be a janitor!\"\n\n      The priest sighs but more importantly pockets his miniature crossbow. \"I oughta zing ya just for pressing my sore spot, but it seems Conia has a thing for your scalykind friend.  Weird tastes, that one.\"  Regardless of what the priestess favors, you're just glad the immediate danger of a bolt through your throat is gone.  The man is of the talkative sort and proceeds to introduce himself.\n      *goto c6AppearChoice\n*label c6AppearChoice\n\n\"I am Disciple Jorne.  And—hey, Iorlan!  Stop beating up on that dummy and get out here!  We have guests!\"  You look in the direction Jorne yells at and notice a ladder leading up to some sort of loft.  The boards creak above your head as an intimidating orcish figure makes his way down.  He's shirtless, scarred, and glistening in sweat from head to toe.  He's also staring you down like a bug that needs to be squashed.\n\n\"What are they doing here?  What do they know?\"  A gruff no-nonsense tone contrasts Jorne's snarks extremely well.  It's odd to think that the two of them are in the same Order.\n\n\"Calm down there, killer, these two are here to deliver some fish, from the smell of it.  Conia brought them down, and I think she fancies the one with the extra-long tongue.  Heh.\"  It's a testament to the blond priest's confidence or stupidity to speak so freely in front of a deadly serious orc.  They're famous for their rages, not their hospitality.\n\n\"Six months to the day that Idricsa died.  I'm headed to the cemetery.  Oh, and you two…\"  Iorlan turns to address the two of you, but you're in the midst of remembering a name that is all-too familiar.  The name of the orc you killed.  No, the orc you destroyed.\n\n\"Let me make one thing undoubtedly clear.  Demons and dark magic exist in this world, and they are closer than you may realize.  Ignorance is not only sin, but it will get you killed.\"  Those haunting words, that absolute certainty…they were the words of a comrade who has lost someone dear to him.  Unlike the others, he has a personal score to settle that drives him relentlessly onward.  There's one question on your mind, above all others.\n\n[b]\"How does it feel to talk with a demon?!\"[/b]\n\n*page_break\n\nYour heart stops.  Did you just say that?  Did you just seal yours and Genock's fates with a blurted sentence?  Are you insane?  Do you have a death wish?!  No, that isn't your voice!\n\nJorne gives an exasperated sigh. \"Darn elf is having fits again.  Go on and get outta here, Iorlan.  I think our guests are sufficiently spooked.\"  Your heart beats again, and the giant breath you've held in finally releases.  The tension is still there, of course, but shrinks considerably after the orc with a vendetta against you leaves.  You and Genock place the crate down in the storage area/glorified cabinet and awkwardly wait around while screams erupt in the background.\n\nYou're given instructions to leave the way you came but find yourselves left to your own devices.  Apparently, they've given you some degree of trust, perhaps assuming that a dungeon is no place civilians would care to stay for long.  But you are no civilian, and that horrific scream that drums against your ears isn't going to make you run away in cowardly fear.\n\nIt is a distinctly ${femalemale} scream that twists into a moan, then into a cry.  $!{shehe} is begging to be released, saying that ${shehe} is a demon and a monster—whatever they want ${herhim} to be.  Just please, no more blood.  No more blood.  But the words ${shehe} says next are what springs you into action:\n\n\"Papa…I'm not a mage…papa, please don't let them take me!  Papa!\"\n\nAnd that confirms it.  You rush in and spot a young ${womanman} strapped to an iron chair.  $!{herhis} face is covered, but the ears give ${herhis} race away.  Wild golden locks of hair shoot out from the gaps in the mask ${shehe} wears, a white mask with holes around where the mouth and nose should be.\n\n[i]\"I am a mage, father.  A devil turned me into a demon, and I never even questioned it.  Please forgive me…\"[/i]\n\nYou wondered half a hundred times what your old man would have to say about you.  Would you still be his ${MC_sondaughter}, or would you be a monster?  That accident in the forest…where your own powers nearly consumed you…would your family still be alive today?  Would these monks have left your town in peace?  Are the deaths of your family, Gundrik, and everyone else on your hands?!\n\nDisciple Jorne is caught more than a little off-guard by your sudden charge. \"Whoa, you two aren't supposed to—\"\n\n[i]WHACK![/i]\n\nThe club at your hip appears in your hand and then across Disciple Jorne's face in under a second.  He's out cold, maybe permanently.  Not missing a beat, Genock grabs the man's crossbow.  The danger now resides in the cloaked woman across the cell.  Or at least, she was cloaked.  She tosses it aside and confirms your suspicions: she is Nanchoan.  But what really catches your eye are the hundreds of tiny metal spikes that run up and down her skin-tight armor.\n\nJust how in the hell do you put something like that on?\n\nYour thoughts betray you; she's dashing your way!  What do you do?\n\n*choice\n  #Convince her to back off.\n    You're just trying to rescue the elf; you don't want to kill anybody!  But your yell goes completely ignored. She drives a spiked boot right into your side that tosses you across the room like a ragdoll.  You are now behind the masked and tied Maeben.  Curse it all…trying to reason with assassins is hopeless.  All they know how to do is kill…well, [i]\"LET'S TEACH THEM A THING OR TWO!\"[/i]\n    *goto c6ConiaChoice\n  #Move aside and let Genock have space.\n    These are trained killers, and there's no way you're going to be able to reason with them.  If you're going to make it out alive, you'd better be prepared to kill.  You lunge and essentially tumble over to behind where a bound and masked Maeben sits.\n    *goto c6ConiaChoice\n*label c6ConiaChoice\n\n\"W-whats going on?  Who are you people?!\"  The elf yells in fear, ${herhis} throat dry from all the screaming.  You'll have to answer ${herhim} later.\n\n[i]PA-SHU![/i]\n\nThat is the sound of Genock's shot missing well high.  As renowned as his combat skills may be, archery apparently isn't one of them.  The priestess answers with a flail of punches that makes the usually stoic lizardman yell out in pain.  You have to do something!  But Maeben's bindings are right there, so you could cut ${herhim} loose right now.\n\n*choice\n  #Help Genock.\n    This isn't even a choice!  You have to help your friend, ${Brigid} needs you!  Wait no, that was then…this is…why is your mind so foggy?  You have to hurry…so why…\n    *if (attractedTo = \"female\")\n      [i]\"Why don't you be a dear, handsome, and take off these bindings?  You can take the rest of it off later, if you so desire…\"[/i]\n      *goto c6AttractedTo3\n    *else\n      [i]\"Why don't you be a dear, love, and take off these bindings?  You can take the rest of it off later, if you so desire…\"[/i]\n      *goto c6AttractedTo3\n    *label c6AttractedTo3\n\n    Your hands move to untie the straps without you even realizing it.  It seems as if your body isn't obeying the commands your mind is giving it…not a pleasant sensation.  Regardless, you put your dextrous hands to good use and untie Maeben's bonds.\n    *goto c6HelpGenockChoice\n  #Release Maeben.\n    Genock can probably hold his own.  Your mission is to rescue this elf and return ${herhim} to ${herhis} father.\n\n    [i]\"Yes…release me and I will release you in more ways than you could imagine…\"[/i]\n\n    Hmm?  You could've sworn that you heard someone speaking in a whisper, right behind your ears…but it must have been nothing.  You put your dextrous hands to good use and untie Maeben's bonds.\n    *goto c6HelpGenockChoice\n*label c6HelpGenockChoice\n\nThe duel in front of you is as odd as it is savage.  A seven-foot lizard with a two-hundred pound weight advantage versus a foreign woman dressed as a porcupine.  It's a brutal exchange of blows in vicious hand-to-hand combat.  If you had to wager on who's winning, well…Genock is starting to show his Redwater, all right.  Especially troubling considering the man has an outer layer of scales as a sort of natural armor.  You motion to join the fray when a pair of elvish arms latch onto you, ever so gently.\n\n\"Does my hero mean to part with me?  My heart and yours are one, my ${MC_handsomebeautiful} ${MC_gentlemanmaiden}.\"\n\n*if (attractedTo = \"female\")\n  Those thin arms gracefully caress your chest, and your dirtied tunic might as well not be there at all.  It is a sensation you'd love to lose yourself in…the fighting now looks like a silly dance that no longer holds your interest.  You are her hero, after all.  You are…\n  *goto c6AttractedTo4\n*else\n  Those masculine arms gracefully caress your stomach, moving upwards and around your more sensitive areas with practiced ease.  Your dirtied tunic might as well not be there at all.  It is a sensation you'd love to lose yourself in…the fighting now looks like a silly dance that no longer holds your interest.  You are his hero, after all.  You are…\n  *goto c6AttractedTo4\n*label c6AttractedTo4\n\n[b]My champion.[/b]\n\nComplete focus envelops you like a dry sponge taking in watered-down wine.  A clarity, a certainty makes itself apparent to every fiber of your being.  It is a familiar sensation, but at the same time an odd and perplexing one; it's magic.\n\n*if (whichElement = \"fire\")\n  And it is cold.  Ironic as it may seem, for a fire mage to project flames, the heat must be taken from another source.  You don't mind that source being yourself, particularly since the chills running down your hands and feet mean it's working.  You haven't practiced the art since you arrived in the city.  You don't intend to burn a forest down this time; instead, you try to focus upon a spiraling ball of fire in the palm of your right hand.\n\n  The elvish hands release you; your body emits too much heat to touch in its current state.  The spiked monk's eyes captivate themselves with the flames you now hold with practiced ease.  That look of surprise…well, you did say she was in for a night of them.\n\n  You waste no time and let loose the fire with a push from your fingers.  It flies as fast as an arrow would and goes exactly where you intend it to.  Unfortunately, that's not where Conia is anymore, after an acrobatic flip that would make any circus performer jealous.  But she made a mistake, dodging into the corner of the cell furthest from the opening.  The fire returns to your hand.  After you're done, this will make two disciples burned alive.\n  *goto c6WhichElement2\n*elseif (whichElement = \"water\")\n  And Fates, is it dry.  The parchedness that starts at your tongue and runs down your throat; moisture has to be taken from a source in order for it to be manipulated.  You don't mind that source being yourself, particularly since the headache and dried skin means it's working.  You haven't practiced the art since you arrived in the city.  You don't intend to send an iceberg down upon a forest this time; instead, you try to focus upon a shard of ice building in the palm of your right hand.\n\n  The elvish hands release you; your body emits too much coldness to touch in its current state.  The spiked monk's eyes captivate themselves with the frigid water you now hold with practiced ease.  That look of surprise…well, you did say she was in for a night of them.\n\n  You waste no time and let loose the ice shard with a push from your fingers.  It flies as fast as an arrow would and goes exactly where you intend it to.  Unfortunately, that's not where Conia is anymore, after an acrobatic flip that would make any circus performer jealous.  But she made a mistake, dodging into the corner of the cell furthest from the opening.  The ice reforms in your hand.  After you're done, this will make two disciples frozen alive.\n  *goto c6WhichElement2\n*elseif (whichElement = \"earth\")\n  And it's heavy.  The weight of the world feels as if it were a cloak draped upon your shoulders, back, and legs.  A heavier burden than that presses against your mind, but this doesn't bother you—that means it's working.  You haven't practiced the art since you arrived in the city.  You don't intend to create an earthquake to bury half the forest this time; instead, you try to focus upon the bits and pieces of the dungeon floor that swirl around in the palm of your right hand.\n\n  The elvish hands release you; a force that pushes your feet up from the ground emits from every inch of you in this current state.  The spiked monk's eyes captivate themselves with the sharpened fragments of rock dancing around your arm with practiced ease.  That look of surprise…well, you did say she was in for a night of them.\n\n  You waste no time and let loose the rocks with a push from your fingers.  They fly as fast as arrows would and go exactly where you intend them to.  Unfortunately, that's not where Conia is anymore, after an acrobatic flip that would make any circus performer jealous.  But she made a mistake, dodging into the corner of the cell furthest from the opening.  The razor-sharp stones return to your hand.  After you're done, this will make two disciples buried alive.\n  *goto c6WhichElement2\n*else\n  And it buzzes.  The sounds of combat die off in an instant, the quiet then replaced with a high-pitched buzz.  You can feel the breath from Maeben run down your neck, but not just ${hershis}.  Everyone's breath touches against your skin, the stale dungeon air mixing in with it.  The droning starts to pain your eardrums—that means it's working.  You haven't practiced the art since you arrived in the city.  You don't intend to shoot out a hurricane in the middle of a forest this time; instead, you try to focus the ever-growing breeze into the palm of your right hand.\n\n  The elvish hands release you; the whipping air stings everyone other than you as it makes for its goal.  The spiked monk's eyes captivate themselves with the blurred cyclone that speeds around your arm with practiced ease.  That look of surprise…well, you did say she was in for a night of them.\n\n  You waste no time and let loose the twister with a push from your fingers.  It flies as fast as an arrow would and goes exactly where you intend it to.  Unfortunately, that's not where Conia is anymore, after an acrobatic flip that would make any circus performer jealous.  But she made a mistake, dodging into the corner of the cell furthest from the opening.  The wind returns to your hand.  After you're done, this will make two disciples cut into pieces.\n  *goto c6WhichElement2\n*label c6WhichElement2\n\nAt least, that's what your plan is.  It certainly doesn't involve the gong she pounds upon with all her might, and certainly not the vials of black liquid that appear from her fingertips.  There is no laughter, yet Conia looks estatic.  Her face pulses back and forth, her black-toothed smile reaching from ear to ear.\n\n[i]\"Otito idan, ni akoko ti wa!\"[/i]  A foreign phrase croaks out of the priestess, who doesn't appear to be mute, after all.  These will be the last words she ever speaks, in any case, though not by your doing.  The vials break, shards of glass doing some very painful work on those clenched hands.  But even more painful, the liquid burns through the skin forming a gas—it's some sort of acid!  The look of pure terror and unknowable pain stares you straight in the eyes, forcing you out of whatever focus you held.  The reverberations of the bell still echo through the dungeon walls.  \n\nThis whole scene will take some serious cider to wash out.  \n\n\"${name}!  Grab the elf before more come!\"  Genock must have seen some serious crap during his time as a mercenary; he just saw his co-worker pop out magic and a woman getting actively devoured by some black goo.  It is a testament to the lizard's resolve, and you're glad at least one of you still has your wits intact.  You grab ahold of Maeben, who struggles just to keep ${herhis} legs straight.  Luckily, ${shehe} weighs even less than you expected a malnourished elf to weigh, and dragging ${herhim} is not a difficult matter.\n\n*if (logical >= 50)\n  [i][Check versus Logical: pass][/i]\n  *line_break\n  *line_break\n  While your emotions are all over the place, you manage to calm down enough to notice something missing.  A blonde priest you smacked upside the head earlier.  Not good.\n  *goto c6Logical2\n*else\n  *goto c6Logical2\n*label c6Logical2\n\nThe reptile leads you through the circular prison, his giant steps difficult enough to catch up to even without an elf in tow.  You don't dare look back at Maeben, not after that weirdness you felt earlier.  Just what in the heck was that about, anyway?  Genock needed your help in battle, but you froze, fantasizing about things that were entirely inappropriate given the situation.  Or any situation, for that matter!\n\nFootsteps emerge from behind as the three of you sprint up the spiral staircase.  As the air grows less damp and the torches more frequent, you can't help but get your hopes up.  The end is in sight, right through this reinforced door!  A shame that this particular door is sealed shut with Disciple Jorne standing in front of it.\n\n\"Bastards!  You have no idea who you're messing with!  We're the Cossack Order, and—H-hey!  STOP!  Wr-UARGGGGGGGGGGGGH!!\"\n\nGenock doesn't stop for a second and couldn't care less about a speech from his opponent.  The result is what happens when three hundred pounds of pissed-off lizard charges: broken bones and property damage.  The door bursts open, Jorne's body slumping against the now-broken exit.  \n\n\"You and your friend have many talents,\" whispers Maeben in a heated voice.  Just why does everything that comes out of ${herhis} mouth have to be laced with desire?!  You tighten your grip and rush on out.  No doubt, the commotion has alerted the paladins and night duty all over the cathedral, not to mention—the wedding!  The wedding guests should still be in the main mass hall…you have a plan.  A suicidal plan, but it's still a plan.\n\nBut for this plan, you'll need some sort of diversion for the guards, otherwise you'll be pelted by crossbowmen before the swordsmen even get a swing in.  No, you'll need Genock to draw them away…but how?\n\n*choice\n  #Run over some more people.\n    You let your co-worker in on the plan you just made up a moment ago.  It's desperate and dangerous, but if it works…\n    \n    \"A sure way to get yourself killed, human.  But if you pull it off…everything changesss.  Too much blood hasss already been spilled thisss day, and I will not harm an innocent.  I do have another idea…now go.  May your Fatesss watch over you—you'll need them.\"\n    *goto c6DistractionChoice\n  #Start a fire.\n    You let your co-worker in on the plan you just made up a moment ago.  It's desperate and dangerous, but if it works…\n    \n    \"A sure way to get yourself killed, human.  But if you pull it off…everything changesss.  You want me to light up some booksss over at the clerksss…I can do that.  ${name}, may your Fatess watch over you—you'll need them.\"\n    *goto c6DistractionChoice\n*label c6DistractionChoice\n\nIt is only after he leaves that you realize how nice it is to have a giant lizardman by your side when you're this deep in enemy territory.  You feel a bit naked in that regard—or is that the sensation pressing up against you from behind? \n\n\"You'll need your reward for rescuing me…we're all alone now.\"  F-focus!  No, you have a plan of action.  First move is to…strip a man of the cloth of his cloth.  Oh boy.\n\nTime is of the essence, so you don't exact much grace while prying the robe from Jorne's body.  It doesn't need to be a perfect fit; you just need to be dressed like one of them for this to have its full effect.  Maeben doesn't even know what the plan is, but actively does ${herhis} part to undo your belt and pull down your pan—what?!\n\n\"Fufu, you're quite the exhibitionist, love.  But why play with his body when—\" Maeben places your hand up and down the curve of ${herhis} hip. \"—when you can play with mine?\"\n\nThe plan, ${name}.  Stick to the plan.  Not to the elf, to the plan.  With the black ankle-length robe finally on, it's time for phase two.  Hide and don't get killed.  The question is, where do you go?\n\n*if (sly >= 50)\n  [i][Check versus Sly: pass][/i]\n  *line_break\n  *line_break\n  You had noticed the giant curtains and tapestries that adorn the major halls when you first came in here.  Great place to wait out guard patrols until Genock makes his move.  The only unforeseen downside is just how handsy your companion is being.  You have to put a hand over ${herhis} mouth to keep ${herhim} from giving away your position, but you're afraid that might have sent some wrong ideas.  Just what sort of crazy stuff are elves into these days?!\n  *goto c6Sly1\n*else\n  [i][Check versus Sly: fail][/i]\n  *line_break\n  *line_break\n  As far as places to hide two people in a church, you haven't a clue.  But standing around here is a death sentence.  You find a small door off to the side and push the elf and yourself inside.  It's probably a closet of some sort…except for that smell.  You look at the bucket in the corner of the room, which is more filled than empty with…something that draws the attention of several flies.  Great.  This will be the part of the story you skip over in the retelling.\n  *goto c6Sly1\n*label c6Sly1\n\nYells of fire and smells of smoke fill the air, followed shortly thereafter by a stampede of plated greaves and metal boots clinging and clanging throughout the hallway.  They're headed to where the scribes work and where ample amounts of makeshift kindling is stored.  You can hear an uneasy murmur from the wedding crowd even from way back here.  Perhaps the greatest crime you'll commit tonight is forcing them to sit through hours of boring marriage liturgy and then robbing them of their feast.\n\nYour stomach growls; no matter what amount of adrenaline you might have been riding on these past few hours, your scarce noontime meal was over ten hours ago.  Maybe a stop by the kitchens before you crash this wedding…no, your fellow Redwater Salvage Consultant is risking life and limb to buy you this precious time.  And it's time to cash out.\n\n*page_break\n*temp maeben_helps false\n\n*if (loner \u003c= 50)\n  *set maeben_helps true\n  [i][Check versus Leader: pass][/i]\n  *line_break\n  *line_break\n  Maeben is likely more screwed up in the head than a sailor's first knot.  But ${shehe} seems more than happy to please you, so getting ${herhim} to help you out might just work.  It also helps that ${shehe}'s sporting a crazy-looking mask.\n  *goto c6Leader1\n*else\n  *set maeben_helps false\n  You thought about trying to get Maeben to help you out with your little act, but think better of it.  $!{shehe}'s more screwed up in the head than a sailor's first knot.  That's fine; you're confident you can put on quite the show regardless.\n  *goto c6Leader1\n*label c6Leader1\n\nAfter you're sure the coast is clear of any armored knights, you hurry to the main hall.  It's nearing the final part of the ceremony, right before blessings are given.  The first blessing is always given by the highest-standing member of the clergy present, which means…the Bishop himself is in attendance!  With a golden rod and tall ceremonial headdress, the single most holy figure gazes upon the crowd with a practiced smile.\n\n*if (resourceful >= 50)\n  [i][Check versus Resourceful: pass][/i]\n  *line_break\n  *line_break\n  You hesitate for a moment, but not any longer than that.  He might omit a holier-than-thou presence, he might be worth millions in gold ducats, but…Gundrik and his family…this whole crusade is built on death and lies!  You might not be able to unravel all the shadows, but you can at least bring this one to light!\n  *goto c6Resourceful1\n*else\n  [i][Check versus Resourceful: fail][/i]\n  *line_break\n  *line_break\n  You hesitate.  Just what by the Fates are you doing here?  That man sitting there pretending not to be on the verge of sleep is the greatest holier-than-thou presence in the kingdom and worth millions in gold ducats.  You're just a helpless country ${MC_boygirl} who's way too far from home.  But you don't have a home anymore, do you?  Everything, including this crusade of his, is built upon death and lies!  You might not be able to bring everything to light, but you can at least do this much!\n  *goto c6Resourceful1\n*label c6Resourceful1\n\n[b]\"Ahem.\"[/b]  Your voice permeates across the room, a large authoritative tone you did not think you possessed.\n\n[b]\"As a Disciple of the Cossack Order, I can hold back no longer!  Your very lives are in danger—demons kept beneath this cathedral have escaped!  That's right, this very place of refuge and sanctity houses devils!  BEHOLD!\"[/b]\n\n*if (maeben_helps = true)\n  Your elven companion starts contorting ${herhis} body in all manner of unnatural positions.  A low-pitched shrieking sound erupts from ${herhis} mouth, yelling, \"HehaWhAAHAwhaHEh!  MaGIc LIveS, YoU DiE!\"  Maeben's demonic accent is so convincing, even you give pause.  It's almost as if ${shehe} [i]is[/i] a demon ${herhim}self, ha!  Ha, ha…\n  \n  The audience is fully enraptured in the play you have orchestrated, and even those who were fully asleep have roused to see what's going on.  The rumors of fire had already unnerved them, and the elf's demonic display pushed them even further.  Now for the grand finale!\n  *goto c6MaebenHelps1\n*else\n  A roughed-up-looking, only partially clothed elf in a weird mask is certainly more interesting than the passage being read off.  It isn't difficult to get the entire audience's attention.  The sounds of fire had already unnerved them; now for the finale!\n  *goto c6MaebenHelps1\n*label c6MaebenHelps1\n\n*if (whichElement = \"fire\")\n  Fire erupts from each of the torches in the grand room, bellowing out and blackening the stone walls they rested upon.  The candles at the altar burn down to their wicks, forcing grey smoke upwards in a stream.  On top of that, you shoot lines of fire up into the air from your palms, even managing to get a small puff of fire to emit from your mouth.  It's surprisingly easy to turn this wedding into a scene from one of the five hells.\n  \n  And how they run!  Many of their silk dresses and ornate tunics are now charred, some even catching fire themselves!  A lady's large hairdo has far too many oils in it—and she's paying the price in full!  These minor lordlings are trampling over each other to reach the main exit.\n  *goto c6WhichElement3\n*elseif (whichElement = \"water\")\n  The pools of water used to purify the married couple start shaking, along with the hundreds of wine glasses and goblets prepared for toasts.  The liquid raises in droplets like a reverse rain, emitting a light reddish fog which grows rapidly in depth.  The wine then sprays down like a sprinkler, yourself adding to the effect by emitting it from your palms.  You even manage to get a spray to emit from your mouth—it is a horrific sight.  It's surprisingly easy to turn this wedding into a scene from one of the five hells.\n  \n  And how they run!  Drenched in red wine, screaming for mercy, this group of minor lordlings trample over each other to reach the main exit.  It's as if they just witnessed a bloodbath.\n  *goto c6WhichElement3\n*elseif (whichElement = \"earth\")\n  The ground beneath the countless pews the crowd is kneeling upon shakes wildly.  The walls follow suit, paintings and tapestries and candles falling over haphazardly.  A thought crosses your mind—why not make these minor lordlings, in their finest dresses and tunics, crawl about in the mud?  The stone floor beneath your feet ceases to hold you steady, ceases to hold rigid form.  In a rapidly expanding radius, the ground transforms into a greyish brown clay.  Boots and shoes struggle to pull out of the muddied mixture, their fears no doubt intensified by the ${MC_priestpriestess} spouting mud from the palms of ${MC_hisher} hands!\n  \n  And how they run!  Starved pigs chasing after corn in a sty hold more grace than this stampede.  Everyone is climbing atop of everyone; no quarter is spared, and no outfit is left clean.  They look dirtier than farmers' boys after a summer rain, and the earthquake's rumble creates fear that the whole cathedral will collapse on top of them.  And it just might!\n  *goto c6WhichElement3\n*else\n  You can always tell how wealthy a wedding is by the amount of incense in the air.  And this air reeks of it.  It is child's play to draw more air into the incense burners in order to make even a ballroom-sized room such as this become permeated with the smell.  And it isn't much more difficult to alter the smell, to sour it into something spoiled and rotten…like weeks-old milk, for instance.  The winds pick up; pages on books and ladies' wigs fly every which way, then the books start shuffling about, with candles and torches getting snuffed out.\n  \n  It's difficult to concentrate with that buzzing in your ear, but you manage to focus a large amount of air beneath your feet.  You are growing taller.  Wait, no, you've managed to levitate!  The tricky part is getting your balance, you're flailing all over the place.  But it doesn't matter: the crowd runs, no, stampedes their way over each other to reach the exit.  This wedding has turned into a scene from one of the five hells, and they aren't sticking around to figure out which one!\n  *goto c6WhichElement3\n*label c6WhichElement3\n\n*page_break\n\nMaeben's touch brings you back to reality, or at least, out of your magically-induced stupor.  You have no intention of overstaying your welcome; it's only a matter of time before the paladins and city guards come to their senses and try to get this disaster under control.  The cleanup crew would feast well tonight, at least, what with all the leftovers.  You turn towards the exit as well—but damn!  A squad of knights standing in equal parts shock and awe are standing in your way.\n\nA s hat's who it is, decked out in a recruit's chain armor with a familiar sword at ${herhis} side.  You turn away quickly, though; it isn't safe for ${herhim} to have anything at all to do with you.  Not…anymore.\n    \n    After what you just did, there can't be any more doubt about your insanity.  You might as well be a demon poisoned by a lich's dark magic.  Oh, and the masked elf ${girlboy} straddling you like a newlywed on the way to the bedroom…not high on the list of things you wanted ${Brigid} to see.\n    *goto c6AddressChoice\n  #Continue on.\n    You know it's ${Brigid}…and it's better for ${herhim} if ${shehe} isn't sure it's you.  You want ${herhim} to be able to deny this part of who you are.  After what you just did, there can't be any more doubt about your insanity.  You might as well be a demon poisoned by a lich's dark magic.  Oh, and the masked elf ${girlboy} straddling you like a newlywed on the way to the bedroom…not high on the list of things you wanted ${Brigid} to see.\n    *goto c6AddressChoice\n*label c6AddressChoice\n\nYou are able to get out one line, at least. [b]\"We of the Cossack Order sought to tame devils, and became them ourselves.\"[/b]\n\nIf that doesn't seal the public opinion on this evil guild of warrior monks, nothing will.  You rush into the crowd, which has decided to make Friar's Street the start of their marathon run.  They have quite the head start, to be sure, but overstuffed nobles in shoes made for looking pretty are easy to catch up to.\n\nIt's been a long night, and it's only going to get longer.\n\n*finish Next Chapter\n", "chapter7": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 7\n\n——————————————\n*line_break\n—————————— Chapter 7: Love and Change\n*line_break\n——————————————\n\nWhy did you even bother spending extra silver on a room with two beds?  \n\nAn even greater question is why you aren't back at your employer's headquarters, relaxing by the fireplace after a job well done.  And as you sat reclining, sipping on buttermilk and munching down a pigeon pie, a gnomish bard would beseech you with questions about your fantastic adventure.  What a verse it would make in the epic that is your life, would it not?\n\nThe verse you are actually living out deals with a lot more hunger pangs and a far more questionable atmosphere.  Genock had the right idea, however; you only wish he hadn't punched you so hard in that back alley behind the butcher's place.  Being new to the city means that routes which don't involve the main roads are limited—luckily, the lizardman had guessed your exit plan correctly.  Then he mistook you for an enemy, what with the black priest robes and all.  Acknowledging the misunderstanding doesn't lessen the pain in your left shoulder any.\n\n\"Thingsss are too hectic right now.  They know a lizardman isss involved, have to lay low outside the city for a bit.  You should find a place to keep the elf for the night…meet with the othersss tomorrow.  Be careful of your cargo, ${name}.\"  Neither Genock nor the other Redwater members have any idea of what transpired in that church just an hour ago, but soon word will spread across the city.  In a week's time, the whole Kingdom will know.  The Cossack Order's reputation is destroyed.  You don't realize that you're thinking aloud.\n\n\"And they'll all have you to thank, isn't that right, ${name}?  But I get to thank you personally…\"  Your cargo speaks in heated whispers while you pretend not to notice ${herhim} rubbing against you.  A knock on the door jolts you out of bed; your mind illustrates a group of paladins with swords raised while you have nothing more than your shorts and undershirt.  You hesitantly twist the knob and pull it towards you.\n\nThe portly and mustachioed greeter who led you to this room stands before you.  A far less intimidating sight than a paladin, though with a disapproving scowl nonetheless.  He coughs to clear his throat before speaking, the way you imagine all 'royal' servants do. \"The madam of this establishment has graciously sent loaves of bread and cheese, noting that newlyweds ought not look so…gaunt.\"  Fates be praised, there's good in this world after all!  And it came in the form of aged Gouda.  You thank the man graciously, though are less gracious when he points out that there's a washbasin and soap also available for use.\n\nDoor shut and re-locked, you marvel at the spread before you.  And no, not the ${beautifulhandsome} elf laying on your bed.  $!{herhis} stomach growls just as much as yours does upon the sight of bread and cheese.  Hungry enough to give you the upper hand…\n\n*choice\n  #Use food to get information.\n    *if (vigilant >= 50)\n      *set renown +1\n      [i][Check versus Vigilant: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      Food could be your key to getting some serious answers.  First, something simple…a confirmation that this is in fact the target you've been after all along.  You ask questions regarding ${herhis} homeland and family, how ${shehe} came to be captured, the bread roll in your hand displayed as the reward.\n      \n      \"I can be anyone you choose…but cannot do anything with this mask on.  If you take it off, I'll let you know everything and more.\"\n      *goto c7FoodChoice\n    *else\n      [i][Check versus Vigilant: fail][/i]\n      *line_break\n      *line_break\n      You feel bad enough for the victims of those mage hunters…denying ${herhim} food ${shehe} desperately needs just seems too harsh.  Cuteness has nothing to do with it!  You hand ${herhim} the bread roll you're holding, only to realize the mask is still on.\n      \n      \"You want to know more about me, yes?  If you take off my mask…I'll let you know everything and more.\"\n      *goto c7FoodChoice\n  #Let Maeben eat.\n    *set renown +1\n    [i]You have gained renown[/i]\n    *line_break\n    *line_break\n    You feel bad enough for the victims of t of complete focus.  This feeling is foreign…and there's only one other mage you've ever known.\n    *goto c7RecallChoice\n  #Gundrik the Blacksmith's death.\n    As you stood over the body of Gundrik—a dwarf who you respected both as a mentor and close friend—you felt chills crawling down your spine.  But that was the eeriness of death, an absence of life from not only him but his…entire family, as well.  That feeling held a sort of deathly guise mixed with your state of complete focus.  This feeling now is foreign, and there's only one other mage you've ever known.\n    *goto c7RecallChoice\n  #${Silvana} the Dark Magician's demonstration.\n    *set renown +1\n    [i]You have gained renown[/i]\n    *goto c7RecallChoice\n*label c7RecallChoice\n\nThat's right.  ${Silvana}'s ghostly figure, those deadened eyes, those pale, petite hands placed together in prayer, the chant flowing from ${herhis} lips.  The chant spoken in a tongue no human could make, your perfect reflection revealing itself in ${herhis} eyes.  The one with no mouth.  Suffocating under a dark spell.  That's what this feels like!\n\n*temp safe_from_death false\n\nYour body has moved without you noticing, Maeben's slender yet ${supplemuscular} frame pressing down against you.  A chant erupts inside your mind—no, it's from the outside.  It is ${Silvana}'s chant, the same dark magic that nearly killed you before!  If you succumb to these temptatious kisses, this soft embrace…you won't make it out of this inn alive!\n\n*choice\n  #Force yourself on top.\n    *if (sly \u003c= 50)\n      *set safe_from_death true\n      [i][Check versus Powerful: pass][/i]\n      *line_break\n      *line_break\n      Years of hard living in the country, months of relentless work at a dwarven forge, and an extensive training regimen means you have a physical edge.  Your toned arms grab the surprisingly thin waist of the elf straddling you, who mistakes it for a passionate gesture.  In a single fluid motion, you twist, your elbows now squeezing against ${herhis} ${bustchest}.  Your lips are still enraptured, but you feel at least some degree of control.\n      *goto c7EmbraceChoice\n    *else\n      [i][Check versus Powerful: fail][/i]\n      *line_break\n      *line_break\n      Your arms grab the surprisingly thin waist of the elf straddling you, who mistakes it for a passionate gesture.  Unfortunately, as you try to twist, a strong resistance stops you.  Maeben has no intention of giving up a dominant position in this intimate and dangerous dance.  Your lips are still enraptured, your arms now content to squeeze up against ${herhis} ${bustchest}.\n      *goto c7EmbraceChoice\n  #Undress ${herhim}.\n    *if (sly >= 50)\n      *set safe_from_death true\n      [i][Check versus Sly: pass][/i]\n      *line_break\n      *line_break\n      While undressing the ${beautifulhandsome} elf might seem counter-intuitive as far as resisting temptations go, there are benefits to this situation.  Your dextrous hands unbelt and unravel Maeben's top with expert ease, almost as if you had done this before!  But as you pull it up and over ${herhis} head, you take a moment to breathe.  The kissing has stopped for obvious reasons, which allows you a precious moment to gather your thoughts.  Those eyes that held you captive are gone for a blissfully short moment, and while they now return in full force, you at least feel some degree of control over your mind.\n      *goto c7EmbraceChoice\n    *else\n      [i][Check versus Sly: fail][/i]\n      *line_break\n      *line_break\n      While undressing the ${beautifulhandsome} elf might seem counter-intuitive as far as resisting temptations go, there are benefits to this situation.  While pulling ${herhis} shirt off, you get a chance to breathe and look away from those eyes that hold you captive.  Your hands attempt to unbelt and unravel Maeben's top, but to your dismay, you fumble helplessly at the seams.  It turns out to be a fruitless endeavor, entwining your body ever closer with your elven partner.\n      *goto c7EmbraceChoice\n*label c7EmbraceChoice\n\n\"The energy inside your soul…let me taste it!\"  If you thought you were in a passionate makeout session before, now it's a heated exchange where ${herhis} mouth ravages yours in the most pleasant manner possible.  You feel your mind start to numb as the warmth between your two mouths intensifies.\n\n*if (whichElement = \"fire\")\n  A reddish gas flows out from your mouth and into ${hershis}, which ${shehe} takes in like some sort of vacuum.  You aren't a medical professional, but you're fairly certain this isn't a good sign.  Before your mind goes completely dull, you have to think of something!\n  *goto c7WhichElement2\n*elseif (whichElement = \"water\")\n  A bluish gas flows out from your mouth and into ${hershis}, which ${shehe} takes in like some sort of vacuum.  You aren't a medical professional, but you're fairly certain this isn't a good sign.  Before your mind goes completely dull, you have to think of something!\n  *goto c7WhichElement2\n*elseif (whichElement = \"earth\")\n  A greenish gas flows out from your mouth and into ${hershis}, which ${shehe} takes in like some sort of vacuum.  You aren't a medical professional, but you're fairly certain this isn't a good sign.  Before your mind goes completely dull, you have to think of something!\n  *goto c7WhichElement2\n*else\n  A silvery gas flows out from your mouth and into ${hershis}, which ${shehe} takes in like some sort of vacuum.  You aren't a medical professional, but you're fairly certain this isn't a good sign.  Before your mind goes completely dull, you have to think of something!\n  *goto c7WhichElement2\n*label c7WhichElement2\n\n*choice\n  #Complete focus.\n    Magic has solved your problems every time in the past, so why not now?  With your power, you could send this elf to oblivion!  You attempt to focus, finding it easier than ever before.  The world around you ignored, you now only need a point on which to focus.  And yet you have no conscious control over where, and the colored gas flowing now erupts into a stream!  This is just what ${shehe} wanted!  Every second that passes feels like a lifetime—your lifetime, which now feels as if it's being sucked right out of you!\n\n    *if (safe_from_death = true)\n      No, you aren't going to die peacefully in bed with a beautiful elf—though the thought has its appeal.  Maybe in fifty years or so, sure, but you have a whole lot of living left to do.  This crazy city with all its exotic creatures is filled with wonder, and it never ceases to surprise you on a daily basis.  Are you going to toss away the ink and quill when there's still so much yet to be written down?  No, this is your story, and it isn't over yet.\n      *goto c7FocusFunnyChoice\n    *else\n      Those lazy days back home, getting yelled at by your mother…sneaking off to fish with ${Brigid} or playing with the other kids, whose names you can't remember anymore.  Silvanus resting so gracefully in the smoke-filled healer's den, full of praise for ${herhis} champion.  And the crisp-apple taste of halfling cider, shared with a fur-covered cat with only one eye.  Those are your thoughts as the last of your life escapes from the confines of the flesh.\n      \n      *goto_scene ending\n  #Something funny.\n    *set renown +1\n    [i]You have gained renown[/i]\n    *line_break\n    *line_break\n    You imagine Patch's reaction if—after this job is done—you told ${herhim} that you had declined any sort of monetary reward.  It was your honor, no, your duty to reunite father and ${daughterson}!  Seeing the two of them back together was reward enough.  Sure, ${shehe}'d tear into your back like nails to a plank, but it would make for a heck of a laugh afterwards.  Kerlton would chuckle and recount the incident many times in the future, never letting the one-eyed cat${girlboy} forget it.\n    \n    Yes, that's right!  You aren't going to die peacefully in bed with a beautiful elf—though the thought has its appeal.  Maybe in fifty years or so, sure, but you have a whole lot of living left to do.  This crazy city with all of its exotic creatures is filled with wonder, and it never ceases to surprise you on a daily basis.  Are you going to toss away the ink and quill when there's still so much yet to be written down?  No, this is your story, and it isn't over yet.\n    *goto c7FocusFunnyChoice\n*label c7FocusFunnyChoice\n\nThere's only one move left in your repertoire in situations like these, when a gorgeous elf is smooching the life out of you.  And it involves teeth.  You clamp down your chompers upon those luscious lips and mentally apologize.  The taste of iron reaches your tongue as ${herhis} blood flows out.  It's actually not just the taste of iron, but a tangy flavor as well.  You take a while to register that what's flowing into your mouth isn't red blood but black as night!  This citrus-tasting liquid is acid, and it'll burn your throat out!\n\nWhen it doesn't, you find yourself ushered into a complete focus state without conscious control.  Is the ${succubusincubus} trying to put you under ${herhis} spell again?  No, this voice isn't chanting but instead is speaking to you!  It's ${Silvana}, you're sure of it!\n\n[i]\"…the barriers of your mind must be naturally weak.  It is a rarity, but some individuals have this affluence for magic.  My blood contains a dark mana that feeds off this particular reservoir inside your mind; it will be painful, but if you've gotten this far into my message, you will likely survive…\"[/i]\n\nThe voice pauses, and for a moment you fear it will stop.  It seemed from the tone of voice ${shehe} used as if ${Silvana} was in some sort of pain ${herhim}self.\n\n[i]\"Unfortunately, you will have wished you hadn't.  Dark magic by its very nature is addictive and seductive for those who don't hold mastery over it.  It will grant to you your deepest desires, be they wealth, love, or power.  But it will twist you, contort your soul into something only marginally resembling who you once were.  And I do not know if a tainted soul can be cleansed.\"[/i]\n\n${Silvana}'s tone then shifts from grim to almost optimistic, though you know ${herhim} well enough to know that it's more than a little forced.\n\n[i]\"I don't have much time left in this message.  It was inscribed through blood magic, though I have had limited experience with its use.  Do not give into despair.  As for who I am, it is not important.  Blood goes bad within a week's time, so I likely am not far from you.  Magic is not evil…it is the actions of the magician that determine that.  I know of one such magician who proves that this power can make our world better—though I won't go into detail.  Your torturers will know all of what I have said in this message soon, from your own lips.  And that is fine.  It is my sincere hope that you may someday find peace.  This is farewell.\"[/i]\n\nAnd the message ends.  You toss the liquid—now mixed fully with saliva—into your mouth, wishing for more.  You want to hear those elegant words again, but more than that, you want to speak back to them.  You want to tell ${herhim} that you also know of one such magician, one who made an oath to rescue you and failed that fateful day half a year ago.  You want to retake that oath, assure ${herhim} to hold on just a little while longer.\n\nTears stream down from your face, even as the elf once again jumps atop you, this time with a face filled with rage.  This is not a flirtatious affair anymore; your hands are pinned with what might as well have been claws.  Interrupting ${herhis} meal has made the elf furious, though you are too beset with guilt to care.  Your life is about to leave from out of your lips again…but who's pounding on the door at this hour?\n\n*page_break\n\n\"Fricken making me bring out my lockpicks, huh?  You'll buy me a new set after this, ${name}, or Fates help me!\"  A familiar bout of curses erupts from outside the door, followed by a metallic bit of scratching.  A rogue of expert talent can pick a lock in thirty seconds.  Patch does it in five.\n\nYou don't think you'll ever forget that look of equal parts shock and disgust as ${shehe} sees a breathtakingly ${beautifulhandsome} and mostly naked elf laying predatorily over you.  You think ${herhis} head might explode, or at least cause a death ray to shoot out from ${herhis} patched eye.  Instead, you see a crouch become a pounce that scales the entirety of the room.\n\n\"HISSSSSsssssSsSS!!\" An inhuman hiss sounds as Patch jumps onto Maeben.  Unfortunately, you're at the bottom of this little pile!  Your co-worker's maneuver knocks the air out of your lungs, causing your head to spin and black out for just a moment.  Claws spring out, followed by a yell of pain from your would-be seducer.  The elf tumbles off you, and you stumble to regain your footing.\n\nBig mistake.  You're light-headed, to put it lightly, and fall unceremoniously onto the ground.  The cat${girlboy} wastes no time pounding ${herhis} enemy's head against the floor, knocking the beauty out cold.  You try to say something (or anything, for that matter), but your words don't seem to be able to leave your thoughts.  Your throat is dry, and you feel terrible.\n\n\"${name}!  Are you…how…damn, why wasn't Genock here?!  Why didn't you take me along on your job, you know I would've!  Fracken shouldn't have left the rookie out of my sight, hells was I thinking?!\"  You've seen Patch get angry plenty of times, but you've never seen ${herhim} get upset like this.  You must have looked far worse than you imagined to get that sort of reaction.  Thankfully, your words return to you, and you use them to alleviate your friend's concerns.\n\nRelief reads plainly upon ${herhis} face, but there's a lasting concern. \"Genock stopped back at base before heading for the hills.  Must've been some serious stuff for him to have to lay low like this…I'm just glad you're in one piece.  Fates!  You owe me gold, though, I mean I only came to check up on you…th-that is, couldn't have you spoiling the merchandise!\"\n\nYou look over at Maeben's unconscious body, the unclothed back revealing trails of blood running down ${herhis} shoulders.  Spoiling the merchandise, right.\n\n\"N-not my fault ${shehe} was trying to eat your face off!  Hmph!  Now I'm sorry to have helped you in the first place, you grey-haired country buffoon!\"  Patch crosses ${herhis} arms tightly, with no intention of helping you up on your feet anymore.  Which is fine, as your light-headedness has faded to the point where you can stand on your own.\n\nBut…'grey-haired'?  That's a new insult coming from Patch, but it's weird since it doesn't even make sense in the first place.  Just what in the world is this crazy cat going on about?  You check the small vanity mirror in the room to make sure everything is where it ought to be.\n\nSure enough, a large, curving streak of grey runs from the front of your head to the back.  It's as if you purposefully dyed it in some sort of weird fashion statement.  As far as how you feel about it, well…\n\n*choice\n  #It's kind of cool.\n    It kind of gives you a mysterious sort of edge, like you aren't afraid to stand out from the crowd and be noticed.  A bit of grey makes you appear slightly older, making you out to be more mature and refined than you actually are.  And that's a good thing!\n    *goto c7HairChoice\n  #You don't like it.\n    You don't like it; sticks out too much and is far too noticeable.  Sure, you were rather plainish-looking before, but weird hair-dying has never been your style.  Come to think of it, do you even have a style?  Well…guess you do now.\n    *goto c7HairChoice\n*label c7HairChoice\n\nPatch gives the name some more thought. \"Hmm…Greyhair isn't a bad name for you now, don't ya think?  Yeah, not fair I'm the only one who gets a nickname.  Silverhair isn't bad, neither…I'll have to give this some thought.  Now, as for your elven lover${girlboy} over there, what should we do?\"\n\nHold on a moment there.  Maeben is many things, but not your lover.  Do you want to clarify this or let ${herhis} imagination do as it pleases?\n\n*choice\n  #Clarify.\n    *set patchRelationshipPoints +1\n    [i]Your relationship with Patch grows[/i]\n    *line_break\n    *line_break\n    You don't want Patch to get the wrong idea!  Who knows what sort of perversions the cat-brained rogue would come up with?  But besides all that, you aren't the sort of ${MC_guygirl} to get into that sort of relationship so quickly!  You attempt to enlighten Patch to this fact, but ${herhis} mind stays in the gutter.  You do catch what might pass for a sincere smile before the onset of teases and lewd joking begins, however.\n    *goto c7ClarifyChoice\n  #Don't.\n    Let Patch think what ${shehe} wants to think.  It comes as no surprise just what sort of jokes and teases commence—the cat's mind does after all reside deeply in the gutter.  You do catch what might pass for a sincere frown, however.\n    *goto c7ClarifyChoice\n*label c7ClarifyChoice\n\nRedressing your body gives your mind time to readdress the situation.  The question is what to do with Maeben, who went from flirty elf ${girlboy} to evil ${succubusincubus} in the span of five minutes.  The black blood inside of ${herhim} has tainted and twisted ${herhis} soul to the very core…this creature is no longer the Maeben ${herhis} father knew, in both body and spirit.  You…you have to…\n\n*choice\n  #Kill Maeben.\n    *set corruption +10\n    [i]Your corruption increases[/i]\n\n    You can't allow this monster to be freed.  It isn't ${herhis} fault, not in the slightest, for turning out this way.  The temptations of dark magic would make even the most pious turn astray.  But you don't want ${herhis} father to see his ${daughterson} like this.  Not like this.\n\n    The body lays there as if in a peaceful slumber as you approach.  You won
