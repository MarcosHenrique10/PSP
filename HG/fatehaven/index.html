to die a warrior's death.\"\n  *goto c12Logical1\n*else\n  *goto c12Logical1\n*label c12Logical1\n\nYou aren't quite sure when you were able to pick up on this ability, but you're starting to notice the magical energy that spellcasters emit.  Aphid had this aura around her that you only now recall.  You had mistaken it for her being majestic and wealthy at the time, but now you can identify it clearly.  And Iorlan has no such quality.  \n\n*if (whichElement = \"fire\")\n  This orc doesn't have magical powers—you could end this battle with a single fireball!\n  *goto c12WhichElement1\n*elseif (whichElement = \"water\")\n  This orc doesn't have magical powers—you could end this battle with a single glacial spike!\n  *goto c12WhichElement1\n*elseif (whichElement = \"earth\")\n  This orc doesn't have magical powers—you could end this battle with a single spike of stone!\n  *goto c12WhichElement1\n*else\n  This orc doesn't have magical powers—you could end this battle with whips of air before he can even get close!\n  *goto c12WhichElement1\n*label c12WhichElement1\n\n*if (acceptedBrigidOath = true)\n  \"${name}, please allow me to fight this man.  I am your knight.  I also carry the burden of ending the life of the woman he loved.  Let me prove myself in honorable combat.\"\n  *goto c12AcceptedBrigidOath1\n*else\n  \"${name}, please allow me to fight this man.  I also carry the burden of ending the life of the woman he loved.  Let me prove myself in honorable combat.\"\n  *goto c12AcceptedBrigidOath1\n*label c12AcceptedBrigidOath1\n\nWhile you've been busy being intimidated and combating a nasty glare, ${Brigid} has been eyeing both Iorlan and the room itself from head to toe.  You feel happy that your friend wants to fight on your behalf, but…this man is a trained killer.  The Cossack Order is an elite group of monks, and this one is second only to Vaine.  Should you allow ${Brigid} to put ${herhis} life in danger like this when you could end it in a second?\n\n*temp letBrigidFight true\n\n*choice\n  #Let ${Brigid} fight.\n    *set letBrigidFight true\n    *if (myRouteBrigid = true)\n      \"Are you…sure you want this?  We've been through so much together as a team…and I don't want to see you get hurt.  I love you, ${Brigid}.  You don't need to prove anything to me!\"  You love ${herhim} more than anything else in the world, but you respect ${herhim} enough to do as ${shehe} requests.  You need to know that it isn't for the wrong reasons.  That conversation about magic on the way upstairs is still fresh in your mind.  You don't want your love to die just to save face!\n      \n      The redhead in plate armor raises the golden-colored sword, forged by the greatest (and only) blacksmith back home, and nods with absolute confidence.  Before combat begins, ${shehe} says something that will stick with you for as long as you live.  You thought you knew your old friend better than ${shehe} knew ${herhim}self.  You always did, but it turns out you've been wrong all this time.\n      \n      \"Idiot…I love you too…but this isn't about you.  I'm proving myself to no one but me.  All my life, I wanted to fight for my ideals, the Church, the Kingdom; and when they betrayed me, I chose to devote myself to you.  But I'm not that weak, not anymore.  I've decided to fight for no one but me!\"\n      *goto c12LetBrigidFightChoice\n    *else\n      \"Are you…sure you want this?  We've been through so much together, always have.  You don't need to prove yourself to me.\"  You respect your friend enough to do as ${shehe} requests, but you need to know that it isn't for the wrong reasons.  That conversation about magic on the way upstairs is still fresh in your mind.  You don't want your friend to die just to save face!\n      \n      The redhead in plate armor raises the golden-colored sword, forged by the greatest (and only) blacksmith back home, and nods with absolute confidence.  Before combat begins, ${shehe} says something that will stick with you for as long as you live.  You thought you knew your old friend better than ${shehe} knew ${herhim}self.  You always did, but it turns out you've been wrong all this time.\n      \n      \"Idiot…this isn't about you.  I'm proving myself to no one but me.  All my life, I wanted to fight for my ideals, the Church, the Kingdom; and when they betrayed me, I chose to devote myself to you.  But I'm not that weak, not anymore.  I've decided to fight for no one but me!\"\n      *goto c12LetBrigidFightChoice\n  #Don't let ${herhim} fight.\n    *set letBrigidFight false\n    *if (myRouteBrigid = true)\n      \"${Brigid} I…can't let you put yourself in danger, not someone I want to spend the rest of my life with!  Let me at least help, together we can—\"\n      *goto c12DontLetBrigidFight1\n    *else\n      \"${Brigid} I…can't let you put yourself in danger, not my best friend!  We've done everything together, so let me at least help.  Together we can—\"\n      *goto c12DontLetBrigidFight1\n    *label c12DontLetBrigidFight1\n\n    [i]ShWAcK![/i]\n\n    Your jaw might have been cracked by the force of that gauntleted slap.  Your head is still ringing in pain.  Anger bubbles inside you—you're only trying to save this thankless ${womanman}'s life!  \"What?!  If you want to throw your life away so badly, then…go ahead!  Go and prove to me just what a wonderful knight you are!\"  You spit red as you say those spiteful words, words both angry and honest.  ${Brigid} is going to die just to save face!\n\n    The redhead in plate armor raises the golden-colored sword, forged by the greatest (and only) blacksmith back home, and nods with absolute confidence.  Before combat begins, ${shehe} says something that will stick with you for as long as you live.  You thought you knew your old friend better than ${shehe} knew ${herhim}self.  You always did, but it turns out you've been wrong all this time.\n    \n    *if (myRouteBrigid = true)\n      \"Idiot…I love you too…but this isn't about you.  I'm proving myself to no one but me.  All my life, I wanted to fight for my ideals, the Church, the Kingdom; and when they betrayed me, I chose to devote myself to you.  But I'm not that weak, not anymore.  I've decided to fight for no one but me!\"\n      *goto c12LetBrigidFightChoice\n    *else\n      \"Idiot…this isn't about you.  I'm proving myself to no one but me.  All my life, I wanted to fight for my ideals, the Church, the Kingdom; and when they betrayed me, I chose to devote myself to you.  But I'm not that weak, not anymore.  I've decided to fight for no one but me!\"\n      *goto c12LetBrigidFightChoice\n*label c12LetBrigidFightChoice\n\n*page_break\n\nWith that declaration, the battle begins.\n\nWhile you've certainly been in your fair share of fights recently, you've never actually spectated one.  This swordfight is a surreal experience, like the most brutal and engaging piece of theatre a playwright could ever hope to bring to an audience.  You feel the force of every parry, every riposte and side-step.  This dance is beautiful and loud, and both dancers seem to know each and every step to take.\n\n*if (whichWeapon = \"sword\")\n  Your hand hovers over the hilt of your sword, shaking.  It isn't a sort of anxiousness there—no, if you're honest…it's fear.  This duel makes it painfully evident that you aren't a swordsman, you just play at being one.  While ideas for magical attacks come to you like second nature, you don't know any greater technique than to swing left or right with a blade.\n  *goto c12WhichWeapon1\n*elseif (whichWeapon = \"axe\")\n  Your hand hovers over the pommel of your axe, shaking.  It isn't a sort of anxiousness there—no, if you're honest…it's fear.  This duel makes it painfully evident that you aren't a warrior, you just play at being one.  While ideas for magical attacks come to you like second nature, you don't know any greater technique than to hurl yourself left or right with an axe.\n  *goto c12WhichWeapon1\n*elseif (whichWeapon = \"dagger\")\n  Your hand hovers over the hilt of your dagger, shaking.  It isn't a sort of anxiousness there—no, if you're honest…it's fear.  This duel makes it painfully evident that you aren't a fighter, you just play at being one.  While ideas for magical attacks come to you like second nature, you don't know any greater technique than to stab and slash with your oversized knife.\n  *goto c12WhichWeapon1\n*else\n  Your hand shakes.  It isn't a sort of anxiousness there—no, if you're honest…it's fear.  This duel makes it painfully evident that you aren't a warrior, you just play at being one.  While ideas for magical attacks come to you like second nature, you don't know any greater technique than to stab and swing your pointed stick around.\n  *goto c12WhichWeapon1\n*label c12WhichWeapon1\n\nThe display these two are putting on is both impressive and humbling.  What's worse, you think that jumping into the fray could do more harm than good.  ${Brigid} would have to worry about protecting you and end up leaving ${herhis} guard down.  This inability to do anything…is this the frustration your friend was feeling earlier?  This powerless sensation reminds you of the time you watched your village and everyone in it burn to the ground.\n\nThe single greatest difference isn't their arm length, or body weight, or even their fighting style.  It's what they're wearing.  Iorlan is used to fighting with no armor at all, which certainly makes him faster and more agile.  He could out-dodge ${Brigid} all night long, but that's the thing: the knight isn't even trying to evade attacks, at least, not really.  The scimitar's deadly edge slides off ${herhis} plate armor harmlessly; ${shehe} just needs to protect a few key areas.\n\nThe face, the armpits, and the inside of the elbows.  It doesn't matter how much pressure the orc comes at ${herhim} with, so long as ${shehe} can guard those spots.  The scimitar seems particularly ill-suited for fighting against an armored combatant—it can't poke at those tiny areas like a traditional longsword could. \n\nBut speaking of traditional, the style ${Brigid} is using isn't at all what you imagined it would be.  $!{shehe} has ${herhis} left hand on the blade itself more often than not!  After a while, you realize that it aids in accuracy and levering, particularly against a faster opponent.  And then, in a flash, one second that left hand is on the blade, and the next it's clenched across Iorlan's face.  $!{shehe} has scored a clean punch against ${herhis} opponent!\n\nUnfortunately, this does more to anger than actually hurt the warrior monk.  He jumps back half a dozen feet, tossing his weapon aside and unhooking a foreign-looking spear.  Its shaft is made of bamboo, a plant popular in the Far West.  The tip is certainly steel, though, and looks razor-sharp.  \"You've got talent, ${girlboy}.  I was expecting to do battle with a mage, not a true warrior.  But this yari will put your swordsmanship to the test.\"\n\nA question pops into your head, but talking now might interrupt ${Brigid}'s focus.  What do you do?\n\n*if (resourceful >= 50)\n  [i][Check versus Resourceful: pass][/i]\n  *line_break\n  *line_break\n  You notice ${Brigid} heaving ${herhis} chest up and down, breathing with a great deal more difficulty than ${herhis} opponent.  It makes sense; fighting in that heavy armor, after all.  But if you could give ${herhim} a moment's rest…\n  *goto c12Resourceful1\n*else\n  *goto c12Resourceful1\n*label c12Resourceful1\n\n*choice\n  #Ask about the Cossack Order's weapons.\n    *set renown +1\n    [i]You have gained renown[/i]\n    *line_break\n    *line_break\n    You can't hold back your curiosity on this one.  \"Why does the Cossack Order use so many Nanchoan weapons?  Disciple Conia herself was one of them…and yet you helped provoke a holy war against them?!\"  Your pent-up nerves show themselves in the form of frustration.  None of this makes any sense, and it's time to get some and elegant words, spoken in that smooth, unmistakable tone.  $!{herhis} ${femininemasculine} undertone ever-present and always pleasing to the ears.  ${Silvana}.\n\n*if (attractedTo = \"female\")\n  You almost don't recognize her there, sitting across a small circular table in an outfit made for a princess.  A red corset and outer surcoat match perfectly with a golden underdress, which somehow manages to reveal a healthy amount of cleavage.  Her skin is just as pale as you recall, though with a healthier hue than before.  The tiny leather boots on her feet look too regal to have ever touched the city streets, and any hint of bear-trap injuries are well and gone.\n  \n  In short, she's even more beautiful than you remember.\n  *goto c13AttractedTo1\n*else\n  You almost don't recognize him there, sitting across a small circular table in an outfit made for a prince.  A red surcoat with a golden tunic underneath match perfectly, yet also manage to display a good deal of his slender form.  His skin is just as pale as you recall, though with a healthier hue than before.  The leather boots on his feet look too regal to have ever touched the city streets, and any hint of bear-trap injuries are well and gone.\n  \n  In short, he's even more handsome than you remember.\n  *goto c13AttractedTo1\n*label c13AttractedTo1\n\nThose dark brown eyes and long lashes bat at you before those firm and dimpled cheeks start turning a shade of red.  \"If you keep staring at me like that, I'll start getting embarrassed.  I do like to think I clean up rather well.  Come now, take a seat; you no doubt have questions.\"  $!{shehe}'s right about that.  What do you ask first?\n\n*choice\n  #Where's Kaine?\n    *if (suave \u003c= 50)\n      *set renown +1\n      [i][Check versus Direct: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *goto c13FirstQuestionChoice\n    *else\n      *goto c13FirstQuestionChoice\n  #Why are you so relaxed?\n    \"Why are you so relaxed?  I heard you screaming seconds ago!\"  It doesn't make any sense, and neither does the polite ${gigglechuckle} ${Silvana} tries to hide fruitlessly with ${herhis} hand.  You'd be getting angry right about now if you were any more certain of what was going on.\n\n    *if (myRouteBrigid = true)\n      \"Did I interrupt your moment with your friend ${Brigid}?  Though I suppose you're far more than simply friends now…the truth is, we haven't much time.  Kaine—\"  That's right!  You don't have time to ask how ${shehe} knows about you and ${Brigid}, not when your sworn enemy is around!\n      *goto c13FirstQuestionChoice\n    *else\n      \"Did I interrupt your touching moment with your friend ${Brigid}?  The truth is…we haven't much time.  Kaine—\"  That's right!  You don't have time to ask how ${shehe} knows about you and ${Brigid}, not when your sworn enemy is around!\n      *goto c13FirstQuestionChoice\n  #How's the foot?\n    *if (suave >= 50)\n      *set renown +1\n      [i][Check versus Suave: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      *goto c13HowsTheFoot1\n    *else\n      *goto c13HowsTheFoot1\n    *label c13HowsTheFoot1\n    \"How's the foot?\"  You're not above starting this long-awaited reunion with a bit of small talk.  The atmosphere has grown so tense as of late, and nothing quite settles the mood like shooting the breeze. ${Silvana} bubbles into a polite ${gigglechuckle} that ${shehe} tries to hide fruitlessly with ${herhis} hand.  You're not sure what to make of that reaction, so you wait for the fit to subside.\n    \n    \"I never grow tired of speaking to this variant of yours, ${name}.  My foot has recovered quite nicely, though I try not to put too much pressure on it.  Kaine—\"  That's right!  You don't have time to talk about feet, not when your sworn enemy is around!\n    *goto c13FirstQuestionChoice\n*label c13FirstQuestionChoice\n\n\"Where's Kaine?\"  You look around the room anxiously, trying to spot an attacker from the shadows.  You can faintly feel magic being worked, but its source is from the ${womanman} sitting at the table with a teacup in ${herhis} hand.  ${Silvana} slowly places the cup down, then proceeds to snap ${herhis} fingers.  The darkness in the room disappears completely, revealing the complex machinery and telescopes one would expect of an observation tower.\n\nThere's also a tall man in black priest's robes standing against the wall with his arms crossed.  Your reflexes tighten as you enter complete focus and prepare for combat.  Elegant words from your magic instructor caution against it, however.  \"There he is.  I know you hate this man, ${name}, but try to control yourself.  Disciple Kaine is my trusted colleague, and none of this would be possible without his aid.\"\n\nYour heart sinks and your mind with it.  What in the five hells—${Silvana} has been in cahoots with the Cossack Order this whole time?!  No…this has to be a trick, an illusion of dark magic!  Your magic is ready to strike Kaine at a moment's notice.\n\n*temp attackHim true\n\n*choice\n  #Attack him.\n    *set attackHim true\n    *set corruption +10\n    [i]Your corruption increases[/i]\n    *line_break\n    *line_break\n    None of this would have been possible without his aid.  Almost makes it seem like any of this was a good thing.  Whatever plot, whatever scheme Kaine has cooked up…he'll pay for it with his life!\n    *goto c13AttackChoice\n  #Don't attack.\n    *set attackHim false\n    Something is holding you back.  You aren't sure what, but you want this foul monster in human flesh to speak before you end his life.  It's a courtesy his victims didn't have, but you aren't going to sink to his level.  Kaine smiles and uncrosses his arms.\n\n    \"You didn't strike me down where I stand.  Interesting.  You are here for a purpose you cannot hope to understand.\"\n    \n    *if (saidStargazing = true)\n      He chuckles as he reminisces to that day a for all the lives he crushed back home.  The ceiling roars as you etch out over a ton of stone directly over the Disciple.  There's fear on his face, which gives you more excitement than you could ever imagine.  How does it feel to be the victim for once?!\n\n  [i]CRuMP-SHSssssss![/i]\n\n  The giant slab of rock crushes the man utterly, a wave of red splattering across the room, staining everything.  ${Silvana} stares at the wet, red rock in shock.  $!{shehe} nods gravely, whispering a farewell.  \"I'll see you in the next life, old friend.\"\n\n  The dark magician turns toward you with a calm indifference that tries to hide ${herhis} earlier unease.  \"You've become a more powerful mage than I could have hoped for.  To cut stone at such a distance and with such precision…and in such a way that doesn't bring the entire ceiling down upon us…is more than impressive.  You have reached the level of the elven masters.\"\n  *goto c13WhichElement1\n*else\n  You can feel every breath of Kaine's as if they were your own.  You could knock the air out of him and rush him, to be sure, but why not opt for something more painful instead?  The man who slaughtered an entire village of innocents…he deserves that much and more.  You force as much air as you can imagine into those lungs of his.  He closes his mouth shut, but that's no matter; you force the wind through his nose.  His chest balloons until you hear a 'pop' come from inside of him.  When you release your focus, his body collapses to the ground in a graceless thud.\n\n  In shock, ${Silvana} stares at the body of a man who has breathed his last.  $!{shehe} nods gravely, whispering a farewell.  \"I'll see you in the next life, old friend.\"\n\n  The dark magician turns toward you with a calm indifference that tries to hide ${herhis} earlier unease.  \"You've become a more powerful mage than I could have hoped for.  To direct flows of air with such ease inside a human body…to be able to gather that much from this stale room without so much as a breeze…is more than impressive.  You have reached the level of the elven masters.\"\n  *goto c13WhichElement1\n*label c13WhichElement1\n\n*if (attackHim = true)\n  You're getting unimaginably sick and tired of not knowing what the hell is going on.  ${Silvana} knows, and one way or another, you'll get the explanation you require.  \"What's going on, ${Silvana}?!  Why are you two working together?  I thought we were…\"  You don't want to finish that thought.  Because it ends with your ${princessprince} (as ${Brigid} would put it) as your enemy.  And that's the last thing you want.\n  *goto c13AttackHim1\n*else\n  *if (saidStargazing = true)\n    You're getting unimaginably sick and tired of not knowing what the hell is going on.  ${Silvana} knows, and one way or another, you'll get the explanation you require.  \"What's going on, ${Silvana}?!  Stargazing?  And why are you two working together…I thought we were…\"  You don't want to finish that thought.  Because it ends with your ${princessprince} (as ${Brigid} would put it) as your enemy.  And that's the last thing you want.\n    *goto c13AttackHim1\n  *else\n    You're getting unimaginably sick and tired of not knowing what the hell is going on.  ${Silvana} knows, and one way or another, you'll get the explanation you require.  \"What's going on, ${Silvana}?!  I'm a valuable asset?  And why are you two working together…I thought we were…\"  You don't want to finish that thought.  Because it ends with your ${princessprince} (as ${Brigid} would put it) as your enemy.  And that's the last thing you want.\n    *goto c13AttackHim1\n*label c13AttackHim1\n\n*page_break\n\n\"No more secrets.\"  The finely dressed ${ladygentleman} places ${herhis} teacup down and rises from the table.  There's a plate filled with lemon cakes, you notice, but after that gruesome display, no one could have an appetite.  $!{shehe} gestures you to walk with ${herhim}.  \"Follow me.  This machine here is a telescope.\"  It is  *line_break\n  *line_break\n  \"Not ready?!  Fates damn it, so what are we going to do?  Have a tea party while the entire world blows up?!  Eat some lemon cakes before it all ends?!\"  Your arms grab ahold of ${herhis} slender frame, shaking it in what is a mix of anger and fear.\n  *goto c13Emotional1\n*else\n  [i][Check versus Logical: pass][/i]\n  *line_break\n  *line_break\n  \"Not ready?  So that's it, then?  Are we going to have a tea party while the world ends?  Shouldn't we at least attempt to stop it?\"  You're both angry and afraid, but now isn't the time to give in to your emotions.  Too much is at stake for that.\n  *goto c13Emotional1\n*label c13Emotional1\n\n${Silvana}'s eyes start to grow watery.  Is ${shehe} on the verge of tears?  \"${name}…I'm sorry.  I'm sorry I have to do this to you again.  This is the fifth time we've had this conversation.  You've died countless times before, and you will die countless times again.  I've been training you over and over—your mind forgets, but you become a stronger mage after each iteration.\"\n\nE-each iteration?  Fifth time you've had this conversation?  Your head struggles to wrap around it, but if what ${Silvana} says is true…just how many times have you been through this ordeal?  \"Don't you see, ${name}?  Magic came to you so naturally because you've reached the innate level of skill that would take decades upon decades of training to reach.  I've put you through the five hells again and again…but I fear that…\"\n\n*choice\n  #Embrace ${herhim},\n    *if ((myRouteBrigid = false) and (myRoutePatch = false))\n      The smell of citrus from ${herhis} tea mixes with the ${MC_muskyfruity} ${MC_cologneperfume} that has remained on you since Aphid's dinner party.  Holding ${herhis} slender frame in your arms reminds you of feelings you had locked away long ago.  All those summer evenings, chatting about anything and nothing in particular.  Those days blur together like a dream, but it turned out to be a fake dream.  Could you…love a person like this?\n\n      *choice\n        #I love ${Silvana}.\n          *set myRouteSilvana true\n          You force your lips upon ${hershis}, overpowering that delicate mouth with sheer emotion.  You don't care what ${shehe} has done, you don't care if the world is about to end; you care about the ${womanman} in your arms, and you aren't about to let ${herhim} go.  But the kissing stops as the pale magician pushes you away.  $!{herhis} mask is one of regret and sadness, the likes of which you've never seen on such a pretty face.\n          \n          \"My champion…please don't.  I am unworthy.  I have spent countless summers with you.  I know every detail about your life, and every…inch, as well.  I have lain with you, and…\"  ${Silvana}'s body flickers and twists, a distortion that is no doubt that of black magic.  $!{herhis} face and features morph, slowly turning into an impossibly gorgeous elf: Maeben.  \"…and I have manipulated you as well.\"\n          \n          The flickering reforms ${herhim} to ${herhis} proper form, less curvaceous but more regal and ${charminghandsome}.  So the ${succubusincubus} who seduced you had been ${Silvana} the whole time…what in the five hells?\n          *goto c13EmbraceDontChoice\n        #I don't.\n          *set myRouteSilvana false\n          You couldn't love ${herhim}; not after all the killing and lies, no matter how justified the cause might be.  Even if the world is about to end, you couldn't ever bridge the gap that now lays between the two of you.  ${Silvana}'s mask becomes one of regret and sadness, the likes of which you've never seen on such a pretty face.\n          \n          \"I have spent countless summers with you.  I know every detail about your life, and every…inch, as well.  I am unworthy to even look upon you.\"  $!{shehe} turns around, head hanging in shame.\n          *goto c13EmbraceDontChoice\n    *else\n      *set myRouteSilvana false\n      The smell of citrus from ${herhis} tea mixes with the ${MC_muskyfruity} ${MC_cologneperfume} that has remained on you since Aphid's dinner party.  Holding ${herhis} slender frame in your arms reminds you of feelings you had locked away long ago.  All those summer evenings, chatting about anything and nothing in particular.  Those days blur together like a dream, but it turned out to be a fake dream.  There might have been a time when your heart ached to see ${herhim}, but now your heart belongs to another.  Someone who isn't filled with as many lies.\n      \n      The pale magician pushes you away.  $!{herhis} mask is one of regret and sadness, the likes of which you've never seen on such a pretty face.  \"My champion…please don't.  I am unworthy.  I have spent countless summers with you.  I know every detail about your life, and every…inch, as well.  I have lain with you, and…\"  ${Silvana}'s body flickers and twists, a distortion that is no doubt that of black magic.  $!{herhis} face and features morph, slowly turning into an impossibly gorgeous elf: Maeben.  \"…and I have manipulated you as well.\"\n      \n      The flickering reforms ${herhim} to ${herhis} proper form, less curvaceous but more regal.  So the ${succubusincubus} who seduced you had been ${Silvana} the whole time…what in the five hells?\n      *goto c13EmbraceDontChoice\n  #Don't.\n    *set myRouteSilvana false\n    After all the killing and lies, no matter how justified the cause might be…even if the world is about to end, you couldn't ever bridge the gap that now lays between the two of you.  ${Silvana}'s mask becomes one of regret and sadness, the likes of which you've never seen on such a pretty face.\n    \n    \"I have spent countless summers with you.  I know every detail about your life, and every…inch, as well.  I am unworthy to even look upon you.\"  $!{shehe} turns around, head hanging in shame.\n    *goto c13EmbraceDontChoice\n*label c13EmbraceDontChoice\n\n*page_break\n\nThe two of you stand there in uneasy silence.  Weariness from all the fighting and emotions finally starts to hit you as the adrenaline fades from your bones.  You are exhausted, to say the least.  The elegant voice speaks so smoothly, it almost puts you to sleep.  \"I've seen your mind degrade, ${name}.  As your magical power grows, your memory and soul weaken.  I fear you will lose entire sight of your being before too many more iterations.\"\n\nYou jolt awake in shock.  Your memory and soul are weakening?!  That isn't true at all.  You don't believe the words your fellow mage is speaking.  \"Even now, ${name}.  Don't you feel outside of yourself?  As if you aren't in direct control of your thoughts, but merely a guide?\"\n\nYou don't believe that.\n\nNow, of course you don't.\n\nHow could you?\n\nYou know it.\n\nYou know.\n\nYou.\n\nYou.\n\nY\n\nO\n\nU\n\nYour hands brace against your skull as it pulsates louder and louder; each throb a dagger through the membrane, harder and faster than the last.  There's no set pace for the stabs—each one is an agonizing surprise.  Waiting for the next hammering grows more dreadful than the pounding itself.  And again and again!  Will this end?!  A voice, ${Silvana}'s voice, breaks through this throbbing pain just before it takes over completely.\n\n\"${name}.  Do you even remember the name of your home?\"\n\nEverything goes white, then fades to black.  The pain is over.\n\n*finish Begin Story\n", "chapter14": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 14\n\n——————————————\n*line_break\n—————————— Prologue\n*line_break\n——————————————\n\nNo good tale starts off without exposition!  I need to establish the setting of our young hero, that is to say, you.  Unfortunately, the village you grew up in is no longer in existence…and I wasn't able to find much in the public records, either.  What can you tell me about it?\n\n*choice\n  #Hamlet in the woodlands.\n    Fresh air, weeks away from civilization (those hippie Druid circles don't count), and tons of wildlife to shoot arrows at.  Can't beat that, can you?  Granted, any news of importance only came from the occasional traveling merchant, lost on his way to somewhere important…but who cares who the king is, really?\n    *goto c14Choice1\n  #Frontier town in the country.\n    There's no place like the wild frontier; these types of towns really are like military outposts in unknown territory, except without all the…er, defenses.  But the ores in those veins weren't going to mine themselves, and the atmosphere of ambition is quite contagious.  Lots of investors equates to new taverns and shops and inns every month or so.  Change is good, right?\n    *goto c14Choice1\n  #I'm no hero.\n    O-of course you are!  You're the greatest hero that ever lived, quite so.  I am not wrong about this.  Let's just say…hmm, your village was on the outskirts of a city.  A glorified pitstop for merchant caravans and all that.  You'd be surprised how low even the greediest of them will go to clear out their stock.  Not to mention you were only ever a day or two behind whatever news was happening in our fair kingdom.  It's like getting all the benefits of the city without all the sewage and diseases!\n    *goto c14Choice1\n*label c14Choice1\n\nAll good heroes come from humble beginnings, of course, but just how humble were yours?  Were you going to bed hungry and consistently covered in dirt, or did you have it easy?\n\n*choice\n  #We were actually financially well off.\n    I see…so each day wasn't a struggle for survival, was it?  Certainly allows time for more intellectual pursuits, one would imagine; book learning never took precedence to food on the table, after all.  Not having to work as hard as other children perhaps hampered your work ethic, but you always knew you were meant for something more than they were, didn't you?\n    \n    So your house was actually quite nice; not a palace by any means, but you had two floors and a cellar that was actually stocked more often than not.\n    *goto c14Choice2\n  #Not rich, but we got by well enough.\n    There's literary value to the everyday ${MC_fellowlass} making ${MC_hisher} own way in this world.  Money never really factored into your life or the relationships you had with others; such is a blessing only those with moderate wealth are able to enjoy.  Too much wealth and your friends all come with strings, too little and you'd string up your friends if there was money in it.  'Tis a narrow path.  Your house was a small but clean cabin with a single floor and an unfortunate lack of privacy, but hey, it's better than dirt.\n    *goto c14Choice2\n  #Shut up.\n    Sh-shut up?  You're telling me to shut up?  That's not how this goes!  I'm trying to write your story here, and I require details!  You just sit back and relax.  I'll give you some options and you can decide from there, okay?  [b]I[/b] will make life so much easier for you.  You understand this, don't you?\n    \n    [i]*Ahem*[/i]  You had it rough; the blissful times when you weren't at work doing errands and chores were spent playing with the other children, who never let you forget how poor you were.  You started growing detached and learned how to blend into the background when things got even hairier than you were.\n    \n    Your house was a glorified hut that had two rooms and leaked every time it rained.  Those memories of you huddled together with your family beside the fire during the winter season aren't ones you'll ever forget.\n    *goto c14Choice2\n*label c14Choice2\n\nNow let's move on.  While your mother did a fine job of getting you out of her nether regions, were you the only one?\n\n*choice\n  #They\n    *goto c14Choice3\n  #all die\n    *goto c14Choice3\n  #in the\n    *goto c14Choice3\n  #end\n    *goto c14Choice3\n*label c14Choice3\n\nW-well that's a bit grimdark.  But those weren't the options I had provided for you.  You're not supposed to be able to conceptualize your own answers!  [b]I[/b] am the thinker here!  Just who do you think you are?!\n\n*choice\n  #I think I am myself.  And I'm done being 'you.'\n    *goto c14Choice4\n*label c14Choice4\n\n*finish Next Chapter\n", "chapter15": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 15\n\n——————————————\n*line_break\n—————————— Chapter 15: I think, therefore\n*line_break\n——————————————\n\n\"${name}!  Your father's yellin' for yeh!  Stop playin' with yeself and git to it!\"  My mother calls out to me in the endearing way only a wingless siren could.  \n\nWait just a second.  My mother?  [b]My[/b] mother?!  I race down the stairs in all haste, nearly tripping down the stairs to gaze upon the woman who birthed me.  She nearly screams as I hug her tightly, something I haven't done since I was shorter than a dwarf.  \"Wha' in tha' Fates has gottin' inta you, ${MC_boygirl}?  Git on now, ya father's yellin'.\"  Mother harasses me again but this time with a budding smile.  I want to say something but can't think up the words, so I rush out into the woods.\n\nI know the whereabouts where Father would be like the back of my hand.  Going into a sprint, I nimbly dodge tree roots and potential twisted ankles before I arrive at a horrendous yet familiar scene.  My father is attending to a young ${womanman}'s leg…or at least, what's left of it.  Even if it's the second time I've seen this, blood and flailing tendons and a flash of bone…it's enough to make me toss up my lunch.  \n \n*if (whichRace = \"elves\")\n  \"Frakkin' new-fangled traps, bet one of 'em fancy elves thought himself clever…impossible to get the damn things off…\"\n  *goto c15Race1\n*elseif (whichRace = \"dwarves\")\n  \"Frakkin' new-fangled traps, bet one of 'em drunk dwarves thought himself clever…impossible to get the damn things off…\"\n  *goto c15Race1\n*elseif (whichRace = \"orcs\")\n  \"Frakkin' new-fangled traps, bet one of 'em stupid orcs thought himself clever…impossible to get the damn things off…\"\n  *goto c15Race1\n*else\n  \"Frakkin' new-fangled traps, bet one of 'em sneaky halfmen thought himself clever…impossible to get the damn things off…\"\n  *goto c15Race1\n*label c15Race1\n\nI help detach the trap while he mutters to himself, blood oozing over our fingers.  ${Silvana} is in extreme pain…just how many times has ${shehe} subjected ${herhim}self to this sort of injury?  No doubt, a countless number…I need to get my father away from this.\n\n\"Father, I'll wrap up ${herhis} injury.  Please go rush for the Druid, I don't think we want to move ${herhim} in this condition.\"  He tosses an uncertain glance towards you, but your calm and confidence win him over.  He nods and heads off.  It isn't until he's a safe distance away that you work your magic.\n\nIn the literal sense.\n\n*if (whichElement = \"water\")\n  You feel the complete focus fill you to the brim.  No, -[b]I[/b]- feel the complete focus fill -[b]me[/b]- to the brim.  Sorry, old habits.  I can feel the blood inside and outside of ${Silvana}'s leg.  Cleaning and patching up a wound like this is within my abilities.  I am a water mage with the skill of an elven master, after all!\n  *goto c15WhichElement1\n*else\n  You feel the complete focus fill you to the brim.  No, -[b]I[/b]- feel the complete focus fill -[b]me[/b]- to the brim.  Sorry, old habits.  In a previous life, I was a water mage—I'm sure of it—and cleaning up a wound like this would be within my abilities.  Well then, it's now or never!\n  *goto c15WhichElement1\n*label c15WhichElement1\n\nThe surprise in the dark mage's face far outweighs the pain and agony.  Right before ${herhis} eyes, the leg once torn to pieces is sealing itself back up.  Blood is holding steady inside the skin, and I waste no time wrapping it up with makeshift bandages.  Once content with the job I've done, I release focus and smile.\n\n\"Welcome back, ${Silvana}.  Welcome to Fatehaven.\"\n\n*finish The End\n", "chapter16": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 16\n\n*if (myRouteSilvana = true)\n  ——————————————\n  *line_break\n  —————————— Ending: Two Mages in Time\n  *line_break\n  ——————————————\n  \n  I jerk back in distaste of the orangish-brown brew ${Silvana} has all but forced me to drink.  It feels like I'm drinking an orange peel…perhaps the upper-class lifestyle just isn't for me, after all.  My drinking partner ${gigglechuckle}s in that cute manner that I've grown so accustomed to as of late.  \"Bergamot oranges not to your liking, my champion?\"\n\n  My determination is in full force as I take in another gulp, this one larger than the last.  I manage to get it down all right, but the face I make induces a fit of laughter.  But that only makes me smile—${Silvana} is in high spirits, and so am I.  Honestly, my intention had been to take ${herhim} to an upscale tavern for some wine to celebrate, but that was before I realized just how poor I am.  $!{shehe} isn't the sort of ${girlguy} you want to take to the seedier, more cost-effective places.\n\n  \"It's difficult to believe that it's finally done.  You were able to alter the course of the asteroid, after all…\"  The refined magician stares at me as if trying to get lost in my eyes.  My cheeks redden without my permission.  I could never take compliments very well, especially not from my teacher.  And lover.\n\n  I plant the nasty blend back onto the table.  We're at the top room of the observatory tower, and while summer has begun, the cold drafts still chill me to the bones.  I require some external body heat to keep me warm.  That's my excuse, anyway, and so I pull my chair around to ${Silvana}'s side and lean my body against ${herhim}.  Now it's ${herhis} turn to be embarrassed.\n\n  I stroke ${herhis} ear with the breath of my whisper.  \"It wasn't just me who saved the world, you know.  But now that I think about it…why did you pick me, of all people?\"  The slender form presses up against me, and then an arm wraps behind my back and squeezes.  For a moment, I think ${shehe} might have fallen asleep, but eventually that delicate voice breaks the silence.\n\n  \"You weren't my first choice…Jorne and Aphid were.  The former had limited potential when it came to power, and the latter lost her mind in the process.  What sort of ingenious demon must I be, to send my prior test subjects at you in order to gauge your progress?\"  That delicate voice starts to break apart towards the end there.  The guilt and pain that tears at ${Silvana}'s heart is deeper than any wound has the right to be.\n\n  Worst of all, I can't do anything but strengthen my embrace.  There's a more elegant way of saying it, but I accepted all of it.  Everything ${Silvana} has done, in this life or the previous hundreds, to save the world.  My memory of losing my family and friends is just one memory, while ${shehe} has taken their lives countless times.  \"You may never be able to forgive yourself, my love, but I forgive you.  Even if you think of yourself as a demon, I'd tunnel through the five hells to—\"\n  \n  *if (gender = \"male\")\n    Right when I'm in the middle of romantic dialogue, ${Silvana} has the audacity to interrupt me with kisses!  How very ${unladylikeungentlemanly}.  Not that I mind one bit, of course; ${herhis} arms wrap around my neck to get in closer.  It's a cold evening outside, but warmer than ever between the two of us.  If words aren't enough to express how I feel about ${herhim}, actions will have to take over.  And my mind is already filling with what actions I intend to take tonight.\n    *goto c16Silvana1\n  *else\n    Right when I'm in the middle of romantic dialogue, ${Silvana} has the audacity to interrupt me with kisses!  How very ${unladylikeungentlemanly}.  Not that I mind one bit, of course; my arms wrap around ${herhis} neck to get in closer.  It's a cold evening outside, but warmer than ever between the two of us.  If words aren't enough to express how I feel about ${herhim}, actions will have to take over.  And my mind is already filling with what actions I intend to take tonight.\n    *goto c16Silvana1\n  *label c16Silvana1\n\n  \"There's—\" [i]*smooch*[/i] \"—something else—\" [i]*smooch*[/i] \"—${name}!\"  ${Silvana} tries futilely to talk against my assault of kisses, though I let up eventually.  With great self-restraint, I might add.  Both of us are breathing heavily, heated gasps as our chests heave in unison.  What does ${shehe} want to say?\n\n  \"${name}, when I first visited Fatehaven…I tried to educate your father in the art.  After three iterations, I gave up on training him, but I noticed his ${MC_sondaughter} had changed ${MC_hisher} personality drastically each time.\"  My breathing slows while my mind races.  $!{shehe} had tried to teach my backwoods, rustic old man fancy elvish magic?  I hold in a laugh, but only because ${herhis} tone has grown serious.\n\n  A different personality?  Well, you're accustomed to that at this point.  I mean, -[b]I[/b]- am accustomed to…whatever.  \"You've been an assassin of air, a bloodthirsty ${MC_baronbaroness} of fire, an earth magician who joined the paladins, a merchant lord of the seas…and everything in between.\"\n\n  Whoa, was I really that cool in my previous lives?  Almost makes this version of me sound a bit tame in comparison…but what's ${Silvana} getting at?\n\n  *if (whichElement = \"fire\")\n    \"I don't know how to explain it properly, but the threads of fate hold no power over you.  Your soul is unstrung and not set to a definite course like everyone else's.  I said it before when you nearly set the forest ablaze with your inferno.\"  $!{shehe} pauses, staring me straight in the eyes.  I can see my reflection in those dark brown pools, but thankfully, this isn't a magic trick like last time.\n    *goto c16Silvana2\n  *elseif (whichElement = \"water\")\n    \"I don't know how to explain it properly, but the threads of fate hold no power over you.  Your soul is unstrung and not set to a definite course like everyone else's.  I said it before when you nearly set the forest frigid with your glacier.\"  $!{shehe} pauses, staring me straight in the eyes.  I can see my reflection in those dark brown pools, but thankfully, this isn't a magic trick like last time.\n    *goto c16Silvana2\n  *elseif (whichElement = \"earth\")\n    \"I don't know how to explain it properly, but the threads of fate hold no power over you.  Your soul is unstrung and not set to a definite course like everyone else's.  I said it before when you nearly broke the forest asunder with your mountain.\"  $!{shehe} pauses, staring me straight in the eyes.  I can see my reflection in those dark brown pools, but thankfully, this isn't a magic trick like last time.\n    *goto c16Silvana2\n  *else\n    \"I don't know how to explain it properly, but the threads of fate hold no power over you.  Your soul is unstrung and not set to a definite course like everyone else's.  I said it before when you nearly tore the forest asunder with your tornado.\"  $!{shehe} pauses, staring me straight in the eyes.  I can see my reflection in those dark brown pools, but thankfully, this isn't a magic trick like last time.\n    *goto c16Silvana2\n  *label c16Silvana2\n\n  \"There is more to you than I first imagined, ${name}.\"\n\n  The Fates had written this story with an ending.  One in the form of a giant hunk of burning rock dooming us all.  It was a bit anticlimactic, really.  But what they didn't account for was a couple of mages with all the time in the world.  I don't know how much time I have left in this life, but I know I want to spend it with this ${womanman} by my side.\n  \n  *finish Conclusion\n*elseif (myRouteBrigid = true)\n  ——————————————\n  *line_break\n  —————————— Ending: Down the Wedding Aisle\n  *line_break\n  ——————————————\n\n  \"You're late, ${name}!  Hurry up and walk down the aisle with me!\"  The wrist strength on my companion is just as immense as I remembered—${shehe} practically drags me into the church.  Of course, I do notice that ${shehe} gives my outfit a lingering once-over, though.  My excuse for being late for ${herhis} older sister's wedding twice in a row is simple: ${Silvana}.  We're planning out a schedule of training exercises, all geared towards shifting the course of a giant flaming rock.\n\n  It never fails to impress me just how much effort ${Brigid}'s family put into this wedding.  The chapel is lit up brighter than the stars through a gnomish looking-glass…I could really use a different bit of imagery for that.  Banners and sigils paired with countless flowers adorn the walls and pews where everyone I know and a few I don't are kneeling.  It's always awkward, because I feel like I ought to know their names but can't ask because we're already familiar with each other.\n\n  Younglings wailing and acting out as they usually do, organs playing—oh yeah, and even a harp!  What sort of dusty old attic did ${Brigid}'s family pull that one out of?  And whose grandmother did they wake up to play it?  But it sounds beautiful, even if there are missing chords and jumbled notes.  This is nothing compared to the Lady Mempere's Cathedral Wedding Extravaganza, but it's certain to have a better ending.  And besides, Mempere didn't have a cute ${lassguy} to walk down the aisle with, arm in arm.\n\n  It's a firm lock, not unlike one you would use to choke-hold an assailant.  I didn't notice it at first, but ${Brigid} is extraordinarily nervous as we walk down the aisle together.  No one is particularly paying attention to us anyway, though who cares if they were?  My heart starts to race as I gently lean against my wedding partner.  I tilt my head to whisper and try to calm ${herhis} nerves.  \"Relax…we aren't the ones getting married.  Not yet, anyway.\"\n\n  $!{herhis} arms tighten even more after that tease, but it isn't a tease.  I love this red-haired and wool-brained ${girlguy} more than I can soberly admit.  I'm not quite sure when our friendship turned into something more, but it did.  We reach the altar and curtsy in unison to the new couple, who of course hardly pay us any notice.  A combination of wedding jitters and being the focus of so much attention can make the whole experience surreal for any newlywed.\n\n  ${Brigid} and I then split apart, though I do so with some reluctance.  We walk to join our respective families, and the sermon begins.  I must have overdid it with my wedding companion, as I feel ${herhis} stare from across a couple pews.  When I turn to look, ${shehe} suddenly becomes preoccupied with reading scriptures.  It's so cute, I can't help but crack a smile.\n\n  I grant my blessing to the married couple and make a silent promise to them, as well.  To each and everyone here.  To my family and to my friends, I'll use this gift or curse or whatever it is to protect each and every one of you.  I'll cheat the Fates themselves if I have to.  My hands move themselves to open the book to a particular chapter.  Maybe I just need to confirm the words.  Just to make sure they haven't changed.  Protations IV, chapter seven, sentence ten:\n\n  [i]\"And it was then known that which was spoken is falsehood; let truth then be revealed under the moon's light whence paths first crossed.\"[/i]\n\n  I let out a deep sigh.  This time around, I have no intention of arriving late to the after-ceremony feast and dart straight out to get in line.  Somehow, the burly Gundrik is even quicker than I am to get out of there.  The two of us had spoken on the way here, just as we had in a past life, but I have a question that I'm still curious about.\n\n  \"Eh?!  Why in tha five hells do ye be wantin' to be know of that fat city dwarf?\"\n\n  It takes Gundrik a solid ten minutes of explaining what a lazy, good for nothing, and generally poor excuse of a dwarf that Binyo is before he finally starts to settle down.  It seems that the blacksmith really doesn't hold a high opinion of his cousin!  I can attest for Binyo being lazy and wider in the stomach than in the shoulders, but the Redwater Salvage Consultant's employer always came through when it counted.  I'll have to buy him a halfling cider one day.\n\n  As night begins to fall, I find myself fully engaged in the stories and merriment of my fellow Fatehaven folk.  These aren't tales a bard would dare sing of, but after a bellyful of ale, they're downright hilarious.  Farmer Welch's old mule was always itching its private area, and after he turned it into a pair of leather trousers, he started itching down there too.  Pure comedic gold!  A slap on the lower-back area breaks me out of my thoughts.  A drunk ${Brigid} is to blame.\n\n  \"Aha!  ${name}!  Ah been lookin' for yaaaaaa…hahaha…\"  My personal space is invaded; my childhood friend's face is but inches away from mine.  I'd have it no other way.  It's brimming with ${girlboy}ish ${gigglechuckle}s, no doubt the effects of merriment.  One too many ales yet again.  [i]*hiccup*[/i] \"Ah heard from tha smithy what ya offered for my—[i]*hic*[/i]—birthday.  And here ah thought you'd forgotten 'bout me, hehe…\"\n\n  I know Gundrik couldn't keep a secret if his life depended on it, so I didn't even try to get him to keep silent over ${Brigid}'s birthday surprise.  The redhead wraps a friendly arm around me, perhaps more than a little friendly.  Or at least, I hope so.  Night is already falling, and it's time to head home.  ${Brigid} doesn't like the idea of me bailing out early yet again.  \"Y-you can't leave yet!  Have some more ta drink, have some fun!\"\n\n  I grab ahold of ${herhis} hand and yank ${herhim} up from ${herhis} seat.  The tipsy ${Brigid} loses ${herhis} balance and uses me to steady ${herhim}self—not that I mind.  While ${shehe}'s busy being embarrassed, I pull ${herhim} away from the party and onto southside's main road.  At night like this, I can all too well picture these buildings on fire, screams everywhere as bandits butcher everyone…\n\n  \"Whatss wrong, ${name}?  Why do you—*hiccup*—look so sad?\"  The haunting memories of my previous life are trying to stain my current one.  I relax my face and smile, not wanting to ruin this moment we have together.  \"Nothing's wrong.  I just hope…\"  I pause, depressed that my depression is ruining what ought to be a good mood.  \"I just hope it stays this way, is all.\"\n\n  We take our time in a leisurely stroll back to ${Brigid}'s house.  $!{shehe}'s managed to sober up by then.  \"${name}…when we walked down the aisle, that wasn't funny, you know?  Saying something like that, when ye don't mean it…\"  The redhead tries ${herhis} best to be angry, but that's only to cover ${herhis} self-doubt.  I don't intend to leave any doubts in ${herhis} mind after tonight.\n\n  *page_break\n\n  It is our first kiss in this life, but hardly our last.  Over the next few weeks, our relationship heats to a boil, and I find myself yearning for ${herhis} ${softfirm} embrace each day.  While ${Silvana} cautioned against it, I decided to keep no secrets from the ${womanman} I loved.  The magic, the burning of our homes…life in the city, the Cossack Order, and even the impending asteroid.\n\n  Of course, ${Brigid} can't get over how badass of a knight ${shehe} was.  \"Tell it again, ${name}!  Just once more.\"  I sigh for what is probably the hundredth time.  I clear my throat and attempt to do my best ${Brigid} impersonation.\n\n  [i]*ahem*[/i]\n\n  \"Idiot…this isn't about you!  I'm proving myself to no one but me.  All my life, I wanted to fight for my ideals, the Church, the Kingdom; and when they betrayed me, I chose to devote myself to you.  But I'm not that weak, not anymore.  I've decided to fight for no one but me!\"\n  \n  *if (gender = \"male\")\n    It was angsty, overly dramatic, and maybe even a bit cheesy.  But as I gaze upon the stars, as I lean against an oak and hold my lover in my arms, it's perfect.  My knight is cute but strong, brave but insecure, and most importantly: mine.\n\n    *finish Conclusion\n  *else\n    It was angsty, overly dramatic, and maybe even a bit cheesy.  But as I gaze upon the stars, as I lay inside my lover's arms beneath a giant oak, it's perfect.  My knight is cute but strong, brave but insecure, and most importantly: mine.\n\n    *finish Conclusion\n*elseif (myRoutePatch = true)\n  ——————————————\n  *line_break\n  —————————— Ending: Punishment\n  *line_break\n  ——————————————\n  \n  The capital city of the kingdom is aptly named Delmacia City.  No one calls it that, though.  Outsiders refer to it as 'the capital,' while insiders need no more than 'the city.'  I could probably qualify for using both.  It's at the same time familiar and different than I remember—the war we managed to avoid with Nanchou this time around means the city has swelled to its regular, overcrowded capacity.\n\n  Another difference is that this time, ${Brigid} and ${Silvana} are accompanying me.  Instead of half-starved and smelly, I'm a semi-respectable country${MC_manwoman} with a rucksack filled with goodies.  My more delicate, raven-haired companion bows curtly to me before taking off.  \"${name}, I'm off to calculate the optimal time for the asteroid's trajectory to be altered.  Please take care.  And ${Brigid}…\"\n\n  I'm a bit surprised ${shehe} bothers to give the knight a farewell.  It had become increasingly obvious on our travels that the two of them will never get along.  In any lifetime.  \"Do be careful.  The shogunate ruling over the Nanchou empire will certainly attack in three months' time.  I'd rather a friend of ${name}'s not be at the vanguard.\"  ${Silvana} is sympathetic; a rarity in any conversation in which ${Brigid} is involved.\n\n  Even more to my surprise, the redhead and soon-to-be knight offers a handshake to the elegant dark mage.  \"You've lived a thousand lives or so, ${Silvana}.  But 'ah only got this one.  Fates be damned if I'm going to let it go to waste.\"  Mutual respect takes the form of a handshake, both leaving on a higher note than I could have hoped for.  While I'm worried about the impending invasion as much as the next time traveler, saving the world from a burning rock of doom is more important.\n\n  And even more important than that?\n\n  [i]*knock*[/i]\n  [i]*knock*[/i]\n\n  Wedged between two storehouses lays an abandoned office made of redwood that is in dire need of some polish.  Except the office isn't abandoned, it only looks as if it is from the outside.  None of these lazy wannabe mercenaries can be bothered with maintenance.  They can't be bothered with opening the door either, it turns out.  A loud thumping on those creaking wooden floors means either Binyo or Genock is headed my way, and the latter ought to still be on his pilgrimage.\n\n  [i]*creeEAK*[/i]\n\n  Binyo Brighthammer isn't taller than me, but his wide girth almost makes him seem that way.  He bellows out a greeting, as friendly as if he were my grandfather.  \"Ahello an' welcome!  Ye look like yer from outta town, come on in!  Lookin' fer a missing person, er lose a valuable?\"  I walk inside and am immediately brought back to my previous life.  Kerlton rocking in his chair and smoking his pipe, half-speculating and half-asleep.  Patch is laid out on the couch, of course, pretending to be taking a nap.  I say 'pretending' because I catch that cat eye inspecting every inch of me.\n\n  \"Actually, I'm looking for work.  Gundrik Brighthammer is a friend of mine and—\"  The dwarf stops in his tracks and turns on the balls of his feet.  Surprisingly nimble for such a stout man.  I must have caught the attention of Kerlton, as well—his rocker has momentarily stopped its squeak.  Binyo looks at me like he's seen a ghost, and his voice suddenly goes from a low-pitched bellow to a high-frequency whimper.\n\n  \"What be he wantin' with me?  Ain't sent word fer years, and now he sends 'ah young ${MC_fellerlass} at me fer employment?\"  I had a feeling I'd get this sort of reaction.  Binyo respects but distrusts his cousin after being pretty much disowned by that branch of his family.  But Binyo is also a sucker when it comes to dwarven weapons.  I pull out the heavy metal weight I've been keeping in my knapsack all this time: a dwarven warhammer.\n\n  It may have nearly broken my back carrying it all this way, but his reaction is worth it.  I know hammers are the man's specialty, but I also know that he's in dire need of a new one.  And using one forged from a fellow Brighthammer means a lot.  Almost makes all the effort it took to convince Gundrik worthwhile.  Almost.\n\n  \"Ye hired!  Ah be gettin' tha paperwork!  Kerlton, Patch, introduce yahselves to the newest Redwater Salvage Consultant!\"  The fat dwarf giddily hops off into the office, swinging his new toy around haphazardly.  I just hope this won't incur any property damage…that isn't the sort of redecorating this place so desperately needs.  The gnome pops out of his chair, but he looks none too happy to see me.\n\n  After blowing a bit of smoke precariously close to my face, he introduces himself.  \"I'm Kerlton.  Seems a wee bit strange to me, ${MC_boygirl}, how easily you got into the dwarf's good graces.  We've been losing out on jobs lately, and I can't help but be wonderin'…\"  The bard takes another puff, taking his sweet time to continue as he always does.  \"…that some rival company sent you to drive us under.  Finish the deed.\"\n\n  I recall that Redwater had been losing out on jobs around this time due to a corrupt leak in their contracting agency.  But he would figure out how to solve that dilemma soon enough by himself.  I have far more pressing matters to discuss with him.  \"Kerlton, I can't quite explain it just now, but…Aphid Almondvale needs you.  She's about to do something she'll regret.\"\n\n  It isn't until now that I realize just how good of a poker face the gnome possesses.  A skill any bard should know, I suppose, but his eyes light up for only half an instant before settling back down.  \"Ah'vent heard that name before, I'm afraid.  Not sure what an old minstrel can do, besides.\"  He forces out a chuckle, but his expression is gravely serious.  And so is mine.  It's a testament to how convincing he is that I almost believe the lie.\n\n  But I have an ace up my sleeve.  \"Please, I'm being serious.  [i]Even a pig makes a prize, when put in a pie.[/i]\"  The pipe in the gnome's mouth drops as his brain struggles to reason out how a strange country ${MC_boygirl} would know such an intimate detail.  The final line of a nursery rhyme.  Words only he and the blue faerie girl he sang it to would know.  There's going to be a lengthy explanation required afterwards, but I intended to come clean all along.  Kerlton stares at me with a blank expression, for the first time completely unsure what to think.  He rushes out the door, crushing his precious pipe underfoot.\n\n  Cold iron at the back of my neck jerks my back upright, sending shivers down my spine.  A whisper that sounds almost like a purr reaches my ears as I notice the couch is no longer occupied.  \"Been here fer a few years, dirt farmer.  Kerly don't get spooked like that—not by no one.  So you better start explaining what just happened.\"\n\n  *page_break\n\n  Over the span of the next couple weeks, I manage to explain my tale, and before I know it, I'm back to being a \"stupid rookie.\"  My furry rogue and I are back at The Staggering Bard, at an all too familiar scene.  We're supposed to meet with our contact about a silk retrieval job that isn't going to happen.\n\n  \"Well, ${name}.  Said I'd punish you, least in a previous life, anyways.  Barkeep!  My tab's on the rookie tonight!  Get us a round of halfling cider—quick!\"  I pretend to sigh, but really I'm all smiles.  Our relationship was weird at first, and it was difficult for me not to rush into things.  Luckily, Patch keeps a quick pace.\n\n  Or should I say, ${Lillian}.\n  \n  *finish Conclusion\n*else\n  ——————————————\n  *line_break\n  —————————— Ending: Gone Fishing\n  *line_break\n  ——————————————\n\n  The cicadas are out in full force this morning, even with winter looming.  The sun has only started to rise, and the cool breeze forces me to regret not bringing my cloak.  Father and I walk the trail to a nearby stream, down a path I memorized ages ago.  \"Surprised ye' aren't busy with that merchant's ${girlboy}.  What made you want to go fishing?\"\n\n  He's asking about ${Silvana}, of course, who has been training me relentlessly these past few weeks.  Altering the course of a giant flaming rock will be difficult, but it's possible.  Of course, as parents are apt to do, my folks assume the two of us are up to no good.  Though if they knew what we were really doing…well, better to let them come to their own conclusions.\n\n  \"Just wanted to relax for a change.  It's been awhile since we last fished together.  Still no sign of that bear?\"  I make some small talk just to pass the time.  Honestly, I could care less about the bear.  There are plenty of other things for me to worry about, like the upcoming asteroid collision and the impending Nanchou invasion, to name a couple.  But right here and right now…I'm content.  \n\n  For the first time in any lifetime, I know that there's no place I'd rather be.  Just my old man and I, enjoying a blissfully boring day.\n  \n  *finish Conclusion\n*finish Conclusion\n", "chapter17": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 17\n\n*temp isCorrupted false\n*temp renownLevel \"low\"\n\n*if (corruption >= 50)\n  *set isCorrupted true\n  *goto conclusion1\n*else\n  *set isCorrupted false\n  *goto conclusion1\n*label conclusion1\n\n*if (renown >= 20)\n  *set renownLevel \"high\"\n  *goto conclusion2\n*elseif (renown >= 14)\n  *set renownLevel \"medium\"\n  *goto conclusion2\n*else\n  *set renownLevel \"low\"\n  *goto conclusion2\n*label conclusion2\n\n[b]Your renown is: ${renown}[/b]\n*if (renown >= 20)\n  (Fantastic!)\n  *goto c17RenownText\n*elseif (renown >= 14)\n  (Great!)\n  *goto c17RenownText\n*else\n  (Good!)\n  *goto c17RenownText\n*label c17RenownText\n\n*if (myRouteSilvana = true)\n  *if (renownLevel = \"high\")\n    *if (isCorrupted = false)\n      ${name} was eventually canonized as a saint, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Together with the Cossack Order, the mage was able to put the war to a swift end with minimal casualties.  ${name} was granted the title of Royal Magician, as well as numerous lands.  The King even offered his ${OP_daughterson} in marriage, to which ${name} politely declined.  ${Silvana} would found an academy of the magical arts, and together the two worked towards returning magic to the world.\n      \n      It took decades of hard effort, but the public's opinion changed, and magic was once again seen as a force of good in the world.  It was often thankless work, but the mages ushered in a new era of rediscovery and free thinking.  Tales of the romance between the two magicians were spread throughout the Kingdom, as the two remained passionately in love to the very end.  They could have repeated their lives over a million times, but instead chose to move on together into the afterlife.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage single-handedly obliterated the foreign forces, causing a panic that forced them to surrender.  The Delmacian King granted ${MC_himher} the title of Royal Magician, along with plentiful lands.  It was a tribute, but hardly enough to satisfy ${name} for long.\n      \n      When it became apparent that magic was never going to gain public appeal in this Kingdom, the two mages left for the Western colonies, where they founded an academy for the magical arts.  Fear alone of such a powerful faction of mages granted them enough tribute and influence to carve out a new era—one of rediscovery and free thinking.  ${name} became the de facto ruler of what was once Nanchou, whose people both feared and adored ${MC_himher}.\n      \n      Tales of the romance between the two magicians were spread throughout the Kingdom, as the two remained passionately in love to the very end.  They chose to repeat their lives over a hundred times, some say, before they decided to move on together into the afterlife.\n      *goto conclusionEnd\n  *elseif (renownLevel = \"medium\")\n    *if (isCorrupted = false)\n      ${name} was eventually regarded as a hero, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Together with the Cossack Order, the mage was able to put the war to a swift end with minimal casualties.  ${name} was granted the title of Royal Magician, as well as numerous lands.  Unfortunately, it was more out of fear than respect.  ${Silvana} would found an academy of the magical arts, and together the two worked towards returning magic to the world.\n      \n      It took decades of hard effort, but the public's opinion changed, and magic was once again seen as a force of good in the world.  It was often thankless work, but the mages ushered in a new era of rediscovery and free thinking.  The lived a long and happy life together.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage single-handedly obliterated the foreign forces, causing a panic that forced them to surrender.  The Delmacian King granted ${MC_himher} the title of Royal Magician, along with plentiful lands.  It was a tribute, but hardly enough to satisfy ${name} for long.\n      \n      When it became apparent that magic was never going to gain public appeal in this Kingdom, the two mages left for the Western colonies, where they founded an academy for the magical arts.  Fear alone of such a powerful faction of mages granted them enough tribute and influence to carve out a new era—one of rediscovery and free thinking.  The two of them lived a long, healthy, and wealthy life together.\n      *goto conclusionEnd\n  *else\n    *if (isCorrupted = false)\n      ${name} was eventually forgotten to time, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Unwilling to use ${MC_hisher} powers for such an affair, ${name} stayed out of the matter completely.  $!{MC_heshe} and ${Silvana} settled down in Fatehaven, where they enjoyed a long and happy life.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage joined the war effort to obliterate the foreign forces, displaying a show of force that caused them to quickly surrender.  Unfortunately, ${MC_hisher} power was so great, Delmacians feared ${MC_himher} as a demon and not a savior.  ${name}, along with ${MC_hisher} teacher and lover, ${Silvana}, would travel the world, and few books would even speculate what became of them.\n      *goto conclusionEnd\n*elseif (myRouteBrigid = true)\n  *if (renownLevel = \"high\")\n    *if (isCorrupted = false)\n      ${name} was eventually canonized as a saint, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Together with the Cossack Order, the mage was able to put the war to a swift end with minimal casualties.  ${Brigid}'s bravery and leadership in battle propelled ${herhis} military career, which would not stop until ${shehe} became General after the Stormwarden stepped down.  ${name} was granted the title of Royal Magician, as well as numerous lands.\n      \n      The two were undoubtedly the most powerful couple in the Kingdom, and countless tales were written of the mage and knight's romance.  ${name} and ${Brigid} would eventually retire from public life and enjoy the rest of their days in Fatehaven.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage single-handedly obliterated the foreign forces, causing a panic that forced them to surrender.  The Delmacian King granted ${MC_himher} the title of Royal Magician, along with plentiful lands.  It was a tribute, but not nearly enough to satisfy the most powerful mage in recorded history.\n      \n      With ${MC_hisher} knight by ${MC_hisher} side, ${name} set off to colonize the Western colonies and became their de facto ruler.  Countless tales were told of the romance between the mage and the knight, each of whose prowess in battle was both feared and adored.  The passionate lovers enjoyed a long, happy, and wealthy life together.\n      *goto conclusionEnd\n  *elseif (renownLevel = \"medium\")\n    *if (isCorrupted = false)\n      ${name} was eventually regarded as a hero, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Together with the Cossack Order, the mage was able to put the war to a swift end with minimal casualties.  ${Brigid}'s bravery and leadership in battle propelled ${herhis} military career, which wouldn't stop until ${shehe} became a colonel.  ${name} was granted the title of Royal Magician, as well as numerous lands.\n      \n      Countless tales were written of the mage and knight's romance.  ${name} and ${Brigid} would eventually retire from public life and enjoy the rest of their days in Fatehaven.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage single-handedly obliterated the foreign forces, causing a panic that forced them to surrender.  The Delmacian King granted ${MC_himher} the title of Royal Magician, along with plentiful lands.  It was a tribute, and it sufficed.\n      \n      With ${MC_hisher} knight by ${MC_hisher} side, ${name} set off to help colonize the Western colonies.  Countless tales were told of the romance between the mage and the knight, each of whose prowess in battle was both feared and adored.  The passionate lovers enjoyed a long, happy, and wealthy life together.\n      *goto conclusionEnd\n  *else\n    *if (isCorrupted = false)\n      ${name} was eventually forgotten to time, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Unwilling to use ${MC_hisher} powers for such an affair, ${name} stayed out of the matter completely.  $!{MC_heshe} and ${Brigid} settled down in Fatehaven, where they enjoyed a long and happy life.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage joined the war effort to obliterate the foreign forces, displaying a show of force that caused them to quickly surrender.  Unfortunately, ${MC_hisher} power was so great, Delmacians feared ${MC_himher} as a demon and not a savior.  ${name}, along with ${MC_hisher} knight and lover, ${Brigid}, would travel the world, and few books would even speculate what became of them.\n      *goto conclusionEnd\n*elseif (myRoutePatch = true)\n  *if (renownLevel = \"high\")\n    *if (isCorrupted = false)\n      ${name} was eventually canonized as a saint, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Together with the Cossack Order, the mage was able to put the war to a swift end with minimal casualties.  More importantly, ${MC_heshe} was able to keep ${MC_hisher} identity secret and live an ordinary life with ${MC_hisher} fervent lover, Patch.  \n      \n      Or at least, as ordinary as life could be after taking over the Redwater Salvage Consultants upon Binyo's retirement.  ${name} would build Redwater into a Kingdom-wide agency which took on a variety of tasks, including charity work for the city's less fortunate.  Patch—who later went by ${herhis} true name, ${Lillian}—would fund an outreach program for ${herhis} fellow catfolk who had suffered as indentured servants.  Together, they lived a long and happy life.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage single-handedly obliterated the foreign forces, causing a panic that forced them to surrender.  The Delmacian King granted ${MC_himher} the title of Royal Magician, along with plentiful lands.  But ${name} declined the offer, saying it was an honor to serve as ${MC_heshe} could.  This only increased ${MC_hisher} public acclaim.\n      \n      Together with Patch—who later went by ${herhis} true name, ${Lillian}—${name} would turn Redwater into a Kingdom-wide agency with enormous influence.  The once-deteriorating office turned into a palace in its own right, where ${name} and ${MC_hisher} fervent lover enjoyed a long, healthy, and wealthy life together. \n      *goto conclusionEnd\n  *elseif (renownLevel = \"medium\")\n    *if (isCorrupted = false)\n      ${name} was eventually regarded as a hero, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Together with the Cossack Order, the mage was able to put the war to a swift end with minimal casualties.  More importantly, ${MC_heshe} was able to keep ${MC_hisher} identity secret and live an ordinary life with ${MC_hisher} fervent lover, Patch.  \n      \n      Or at least, as ordinary as life could be after taking over the Redwater Salvage Consultants upon Binyo's retirement.  ${name} would build Redwater into the largest mercenary guild in the city.  Patch—who later went by ${herhis} true name, ${Lillian}—would fund an outreach program for ${herhis} fellow catfolk who had suffered as indentured servants.  Together, they lived a long and happy life.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage single-handedly obliterated the foreign forces, causing a panic that forced them to surrender.  The Delmacian King granted ${MC_himher} the title of Royal Magician, along with plentiful lands.  But ${name} declined the offer, saying it was an honor to serve as ${MC_heshe} could.  This only increased ${MC_hisher} public acclaim.\n      \n      Together with Patch—who later went by ${herhis} true name, ${Lillian}—${name} would turn Redwater into the largest mercenary guild in the city.  The once-deteriorating office was turned into a modestly sized mansion where ${name} and ${MC_hisher} fervent lover enjoyed a long, healthy, and wealthy life together. \n      *goto conclusionEnd\n  *else\n    *if (isCorrupted = false)\n      ${name} was eventually forgotten to time, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Unwilling to use ${MC_hisher} powers for such an affair, ${name} stayed out of the matter completely.  Delmacia eventually fought off the invasion, and life returned to normal again.  Upon Binyo's retirement, ${name} would take over the company and continue doing mercenary work with ${MC_hisher} fervent lover, Patch.  Together, they lived a long and happy life.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage joined the war effort to obliterate the foreign forces, displaying a show of force that caused them to quickly surrender.  Unfortunately, ${MC_hisher} power was so great, Delmacians feared ${MC_himher} as a demon and not a savior.  ${name}, along with ${MC_hisher} rogue and lover, Patch, would travel the world, and few books would even speculate what became of them.\n      *goto conclusionEnd\n*else\n  *if (renownLevel = \"high\")\n    *if (isCorrupted = false)\n      ${name} was eventually canonized as a saint, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Together with the Cossack Order, the mage was able to put the war to a swift end with minimal casualties.  ${name} was forced to leave Fatehaven for a time afterwards, a lone wanderer with a power everyone feared.  $!{MC_heshe} traveled all across the globe, visiting the lizardpeople of the eastern deserts and faefolk of the southern jungles.  ${name} eventually returned home and settled down to a happy, peaceful life.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage single-handedly obliterated the foreign forces, causing a panic that forced them to surrender.  The Delmacian King granted ${MC_himher} the title of Royal Magician, along with plentiful lands.  It was a tribute, but not nearly enough to satisfy the most powerful mage in recorded history.  ${name} would later marry the ${princessprince} and proceed to reign over the newly formed Western colonies.\n      \n      Countless books have been written on the most prominent harbinger of the new era
