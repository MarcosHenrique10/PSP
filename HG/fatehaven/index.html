ity without all the sewage and diseases!\n    *goto afterTownChoice\n*label afterTownChoice\n\nAll good heroes come from humble beginnings, of course, but just how humble were yours?  Were you going to bed hungry and consistently covered in dirt, or did you have it easy?\n\n*choice\n  #We were actually financially well off.\n    *set vigilant %-10\n    *set logical %+10\n    *set resourceful %-10\n    [i]Carefree has increased[/i]\n    *line_break\n    [i]Logical has increased[/i]\n    *line_break\n    [i]Faithful has increased[/i]\n    *line_break\n    *line_break\n    I see…so each day wasn't a struggle for survival, was it?  Certainly allows time for more intellectual pursuits, one would imagine; book learning never took precedence pver food on the table, after all.  Not having to work as hard as other children perhaps hampered your work ethic, but you always knew you were meant for something more than they were, didn't you?\n\n    So your house was actually quite nice: not a palace by any means, but you had two floors and a cellar that was actually stocked more often than not.\n    *goto afterWealthChoice\n  #Not rich, but we got by well enough.\n    *set suave %-10\n    *set logical %-10\n    [i]Direct has increased[/i]\n    *line_break\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    *if (gender = \"male\")\n      There's literary value to the everyday fellow making his own way in this world.  \n      *goto pGender1\n    *else\n      There's literary value to the everyday lass making her own way in this world.  \n    *label pGender1\n    Money never really factored into your life or the relationships you had with others; such is a blessing only those with moderate wealth are able to enjoy.  Too much wealth and your friends all come with strings, too little and you'd string up your friends if there was money in it.  'Tis a narrow path.  Your house was a small but clean cabin with a single floor and an unfortunate lack of privacy, but hey, it's better than dirt.\n    *goto afterWealthChoice\n  #You forgot to mention the smell.\n    *set loner %+10\n    *set sly %+10\n    *set resourceful %+10\n    [i]Loner has increased[/i]\n    *line_break\n    [i]Sly has increased[/i]\n    *line_break\n    [i]Resourceful has increased[/i]\n    *line_break\n    *line_break\n    Right, the smell.  Of course, your nose had long since grown used to it, but that didn't stop you from seeing the disapproving gazes the other townsfolk would give you and your family.  You had it rough; the blissful times when you weren't at work doing errands and chores were spent playing with the other children, who never let you forget how poor you were.  You started growing detached and learned how to blend into the background when things got even hairier than you were.\n\n    Your house was a glorified hut that had two rooms and leaked every time it rained.  Those memories of you huddled together with your family beside the fire during the winter season aren't ones you'll ever forget.\n    *goto afterWealthChoice\n*label afterWealthChoice\n\nNow let's move on.  While your mother did a fine job of getting you out of her nether regions, were you the only one?\n\n*choice\n  #That's right, only child.\n    *set loner %+20\n    *set whichChild \"only\"\n    [i]Loner has greatly increased[/i]\n    *line_break\n    *line_break\n    Being the only child certainly has its benefits.  Even a humble family can spoil one of those.  A calm and quiet household was a bastion of peace in a very chaotic world.  Though having free time for yourself wasn't bad, it was kind of lonely.  Sure, brothers and sisters were often pests at the best of times, but try playing a game of hopscotch or marbles by yourself.  Lame!\n    *goto afterSiblingChoice\n  #Nope, I was the oldest.  Still am, actually.\n    *set loner %-20\n    *set whichChild \"oldest\"\n    [i]Leader has greatly increased[/i]\n    *line_break\n    *line_break\n    Ah, that's right.  You were one ${MC_sondaughter} of many; there were only so many sheepskin…er, gloves, to go around back then.  Not to mention the Church frowning on any and all sorts of contraception.  And by 'frowning,' what I really mean is 'flogging.'  Ouch.\n    *line_break\n    Being the oldest equates to a ton of responsibility, most of which goes unrewarded, as little brothers and sisters are notorious for being selfish pricks.  But it gave you the makings of a leader, barking out orders and such.  You might not have been ordering troops to war, but getting your little brother to clean the outhouse?  Just as difficult.\n    *goto afterSiblingChoice\n  #Nah, I was somewhere in the middle, probably.\n    *set sly %-10\n    *set resourceful %+10\n    *set whichChild \"middle\"\n    [i]Powerful has increased[/i]\n    *line_break\n    [i]Resourceful has increased[/i]\n    *line_break\n    *line_break\n    Ah, that's right.  You were one ${MC_sondaughter} of many; there were only so many sheepskin…er, gloves, to go around back then.  Not to mention the Church frowning on any and all sorts of contraception.  And by 'frowning,' what I really mean is 'flogging.'  Ouch.\n    *line_break\n    Just another one of the bunch, huh?  Low expectations, easily forgotten by the parents, and every item you possessed was 'shared' (and I use the term lightly) with the rest of the flock.  But in a way, this only pushed you further.  You acted out with pranks until your father beat some sense into you, rather quite literally.  Luckily, you found other ways to get attention.  You worked harder around the house and fished in that pond over and over again, until you rivaled even your old man's fishermanship.  You could chop firewood like it was nobody's business.  Never too early to learn a work ethic!\n    *goto afterSiblingChoice\n  #No, I'm the youngest.\n    *set sly %+20\n    *set suave %+10\n    *set whichChild \"youngest\"\n    [i]Sly has greatly increased[/i]\n    *line_break\n    [i]Suave has increased[/i]\n    *line_break\n    *line_break\n    Ah, that's right.  You were one ${MC_sondaughter} of many; there were only so many sheepskin…er, gloves, to go around back then.  Not to mention the Church frowning on any and all sorts of contraception.  And by 'frowning,' what I really mean is 'flogging.'  Ouch.\n    *line_break\n    The perpetual baby of the family, huh?  Cons: all the clothes you wore had been worn by at least two of your older siblings, minimum.  Pros: you'll likely live slightly longer than each of them, living through the trauma of each of their deaths and funeral fees.  Wait, that's not a good thing at all!  Being the youngest isn't fun, but you were often able to exploit your youth in order to get out of doing chores and stay on mother's good side.  Nature may have shut her ovaries down, but she could still show off her baby to the other housewives.  And you hammed it up so well, didn't you!\n    *goto afterSiblingChoice\n*label afterSiblingChoice\n\nWhat was I talking about again?  Ah yes, the ever-present source of religious authority.  Love it or hate it, the Church holds a lot of power in this country.  But how do you feel about them?\n\n*choice\n  #I was a choir ${MC_boygirl} and loved it!\n    *set resourceful %-20\n    *set vigilant %+10\n    [i]Faithful has greatly increased[/i]\n    *line_break\n    [i]Vigilant has increased[/i]\n    *line_break\n    *line_break\n    *if (gender = \"male\")\n      Your voice and devotion to God was the envy of the hamlet.  The elderly showered you with praise, wanting you as their grandson just to show off your high sense of character and righteousness.  While the tone of your voice may have changed after your balls dropped, you still retain a great set of vocals.\n      *goto pGender2\n    *else\n      Your voice and devotion to God was the envy of the hamlet.  The elderly showered you with praise, wanting you as their granddaughter just to show off your high sense of character and righteousness.  While the tone of your voice may have changed after your chest blossomed, you still retain a great set of vocals.\n      *goto pGender2\n    *label pGender2\n    *goto choiceAfterReligion\n  #They serve an important purpose in guiding morality.\n    *set suave %-10\n    *set vigilant %+10\n    *set logical %+10\n    [i]Direct has increased[/i]\n    *line_break\n    [i]Vigilant has increased[/i]\n    *line_break\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    You're right, of course; mankind is bound to show its worst side if the good words aren't there to force it out of them.  The lectures and sermons often held your interest, and you took some joy in engaging in the discussions afterwards.  Since you were the only kid there not bored out of their mind, you became the congregation's version of a teacher's pet.  So I guess that meant you were like the priest's pet? Uh…moving on!\n    *goto choiceAfterReligion\n  #Surprised no one ever caught me sleeping through the sermons.\n    *set vigilant %-20\n    *set suave %+10\n    *set resourceful %+10\n    [i]Carefree has greatly increased[/i]\n    *line_break\n    [i]Suave has increased[/i]\n    *line_break\n    [i]Resourceful has increased[/i]\n    *line_break\n    *line_break\n    From kneeling on a hard wooden pew to standing to sitting back down to kneeling again; you had it all memorized.  Each mass held a very similar pattern, after all, and once you figured it out, you could make it through half-asleep easy.  There's no underestimating the ability to sleep standing up, perhaps you were destined to be a guardsman?\n    *goto choiceAfterReligion\n  #They're just a means of control!\n    *set logical %-20\n    *set suave %-10\n    [i]Emotional has greatly increased[/i]\n    *line_break\n    [i]Direct has increased[/i]\n    *line_break\n    *line_break\n    Forced donations?  Tax exemptions?  Acres and acres of land?  There's a reason why the high bishops use golden altars, is all I'm saying.  The Book may teach humility, but there seems to be way too much profit involved that points to a very different reality.  Questioning a few things might lead to change, were it not punishable by hanging, aye?\n    *goto choiceAfterReligion\n  #I worship demons.\n    *set loner %+10\n    *set suave %-10\n    [i]Loner has increased[/i]\n    *line_break\n    [i]Direct has increased[/i]\n    *line_break\n    *line_break\n    Demons?  Seriously?  Well, as long as you aren't sacrificing any sheeps to Belial or drinking the blood of a virgin (that is to say, sipping at one of your own wounds)! I suppose I can let that go.  Dark Arts are often the subject matter of tales told to children by their ill-intentioned parents, but perhaps there's something to it after all…\n    *goto choiceAfterReligion\n*label choiceAfterReligion\n\nWhile humans are unmatched for their overpopulation powers, they weren't the only race around during your childhood years.  The small town was home to a decent amount of beings far different than you or I.  Growing up alongside them has no doubt influenced you in various ways…what race were they again?\n\n*choice\n  #Elves.\n    *set logical %+10\n    *set whichRace \"elves\"\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    Ah, the elves.  Fine, graceful beings with the wisdom only centuries of age brings.  A shame about the terrible superiority complex that goes with it, though.  The elvish children you played with inspired your love for nature and sparked an interest in history, as well.  But since they aged so slowly…looking back, it was pretty creepy playing with children who were decades older than you, wasn't it?\n    *goto choiceAfterRace\n  #Dwarves.\n    *set sly %-10\n    *set vigilant %+10\n    *set whichRace \"dwarves\"\n    [i]Powerful has increased[/i]\n    *line_break\n    [i]Vigilant has increased[/i]\n    *line_break\n    *line_break\n    That's right, the village had sprung up in the first place because of a seam of copper ore nearby.  They're a tough lot, and any time you spent with them typically involved manual labor with the smithies or other craftsmen.  Unlike your parents, at least they paid you for your work.  You also had your first experience with dwarvish ale, though it was far from a pleasant experience.  I imagine you have a stronger stomach now, though.\n    *goto choiceAfterRace\n  #Orcs.\n    *set sly %-20\n    *set logical %-10\n    *set whichRace \"orcs\"\n    [i]Powerful has greatly increased[/i]\n    *line_break\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    Orcs get such a bad reputation from the barbarian tribes that pillage the countryside, don't they?  This batch was considerably less savage, but they still liked to roughhouse.  You grew considerably stronger wrestling around with that bunch and were one of the few humans who they spoke about their rich oral history to.  The stories made human wars look like tea parties in comparison.  Who knew scalps made such effective napkins!\n    *goto choiceAfterRace\n  #Gnomes.\n    *set sly %+20\n    *set whichRace \"gnomes\"\n    [i]Sly has greatly increased[/i]\n    *line_break\n    *line_break\n    When it comes to curiosity (intellectual or otherwise), social gatherings, and elaborate pranks, gnomes are in a league of their own.  \n    *if (gender = \"male\")\n      The ones you hung around with called you tallboy, and while you were constantly the victim of their pranks, eventually you became quite the trickster yourself.  \n      *goto pGender3\n    *else\n      The ones you hung around with called you tallgirl, and while you were constantly the victim of their pranks, eventually you became quite the trickster yourself.  \n      *goto pGender3\n    *label pGender3\n    Getting out of trouble has become second nature to you, though I'd say getting into trouble is your first!\n    *goto choiceAfterRace\n*label choiceAfterRace\n\n*label input_name\nGoodness, I almost forgot the most important detail!  What's your name, hero?\n*input_text name\n\n*comment check capitalization\n*if (\"${name}\" != \"$!{name}\")\n\n    Your name is $!{name}, is that right?\n\n    *choice\n        #Yes.\n            *set name \"$!{name}\"\n            *goto choiceAfterName\n        #No, my name is ${name}, just as I said.\n            *goto choiceAfterName\n        #Er…wait, let me try that again.\n            *goto input_name\n*label choiceAfterName\n\nSo, you're ${name}.  Did you spell it correctly?\n*choice\n  #Yes, I did.\n    *goto choiceAfterName2 \n  #No, I didn't.  Spelling is hard, okay?\n    *goto input_name\n*label choiceAfterName2\n\nLet's move on to your teenage years.  Before the horrific event occurred that changed your life forever, what was life like during the awkward stages of becoming a full-fledged ${MC_manwoman}?  Any good fights?  Romance?  Drama?\n\n*choice\n  #Reply earnestly.\n    *set sly %-10\n    *set suave %-10\n    [i]Powerful has increased[/i]\n    *line_break\n    [i]Direct has increased[/i]\n    *line_break\n    *line_break\n    \"That and then some: it was an entirely different life back then, before-that-happened.  Let's see how much I can remember…\"\n    *goto choiceAfterReply\n  #Reply jokingly.\n    *set sly %+10\n    *set vigilant %-10\n    [i]Sly has increased[/i]\n    *line_break\n    [i]Carefree has increased[/i]\n    *line_break\n    *line_break\n    \"All of the above.  Get your quill and parchment ready, because this won't be a short story…\"\n    *goto choiceAfterReply\n  #Reply harshly.\n    *set logical %-10\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    \"It's a waste of time recalling those memories; none of it matters anymore anyway.  But if it gets you to shut up…\"\n    *goto choiceAfterReply\n*label choiceAfterReply\n\n*finish Next Chapter\n\n\n*comment Loner : Leader //Loner vs Leadership\n*comment Sly : Powerful //Slyness vs Power\n*comment Suave : Direct //Suaveness vs Directness\n*comment Vigilant : Carefree //Vigilance vs Carefree\n*comment Logical : Emotional //Logical vs \n*comment Resourceful : Faithful\n\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set loner 60\n*set sly 30\n*set suave 35\n*set vigilant 55\n*set logical 45\n*set resourceful 40\n*set corruption 0\n\n*set name \"Leon\"\n*set whichElementName \"Fire\"\n*set whichElement \"fire\"\n*set renown 0\n\n[i]Powerful has increased[/i]\n*line_break\n*line_break\nBrigid was going to be joining the military and needed a sword that actually fit her hands and cut the air instead of swatting it.  This required a new blade, but it wouldn't be cheap.  You're going out of your way for this one, but Brigid is an old friend.  And maybe…never mind.\n\n\"Ah new blade fer ah new knight…ah could forge it, but it would cost ye.  It takes longer then ye'd have thought.\"  You've got a portion of the payment now, the rest you can work off helping at the forge this autumn.\n\nUsually, you'd have made it to the church and halfway back by now, but you keep to the dwarf's slow pace.  It's rare to be able to speak with him without having sweat sting your eyes from the heat of the forge's fires.  But aside from that, you're genuinely enjoying the conversation.  \n\n\"Speakin' oh weapons, ye can tell alot about ah man by his weapon o' choice.  So what do ye fancy?\"\n\n*fake_choice\n  #Dagger.\n  #Axe.\n  #Sword.\n  #Spear.\n\n*script changeBackgroundColor(\"black\")\n\n*set loner 30\n*set sly 50\n*set suave 40\n*set vigilant 65\n*set logical 70\n*set resourceful 30\n*set corruption 10\n\n*set name \"Alice\"\n*set whichElementName \"Water\"\n*set whichElement \"water\"\n*set renown 2\n\n[i]Your relationship with Bregan grows[/i]\n*line_break\n[i]Carefree has increased[/i]\n*line_break\n*line_break\nMidnight is still a ways off yet, and you owe it to your friend to enjoy yourself at the party.  Not that it's difficult with all that free food and drink!  Everyone from town is pulling out their best stories, and they just keep getting better as more drinks get brought around.  You feel a warmth press against your breast, only to realize Bregan has passed out beside you.  Cute as the sight is, it reminds you that you have to be off at once.\n\nThis summer's night, while warm, draws in a cool breeze that buffets you on your way back home.  The cryptic message from Silvanus lingers in your mind.  The 'paths' where the two of you first crossed were out in the forest that is your backyard.  You can retrace the exact spot in your mind vividly: it was where you and your father tried your hardest to save the life of a nobleman.  Or maybe that was a lie, too.  What sort of emotion are you feeling the strongest?\n\n*fake_choice\n  #Anger.\n  #Curiousity.\n  #Uncertainty.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set loner 20\n*set sly 50\n*set suave 35\n*set vigilant 70\n*set logical 75\n*set resourceful 30\n*set corruption 10\n\n*set name \"Alice\"\n*set whichElementName \"Water\"\n*set whichElement \"water\"\n*set renown 4\n\nA pair of bandits lay strewn across the fenced-in yard, their torsos sporting a fistful of arrows apiece.  They are surely dead, but that doesn't stop the hounds from barking at them as if they're faking it.  When an arrow rizzes over your head, it registers how much of a bandit you appear at the moment.  You shout to identify yourself, and the mutts chase you down to be petted as they are apt to do.\n\nYou hope dogs don't mind blood-stained hands.  Out from the house pops Bregan, sword out and charging.  Fates above, is he going to run you down?!  Are you going to die like a dog while in the middle of petting them?  So much for a hero's death!\n\n\"Alice!\"\n\nInstead of a sword through your chest, you find arms wrapped tightly around it.  Squeezing you with all the strength he can muster, it is undoubtedly a hug.  When was the last time the two of you hugged?  Not since you were as tall as gnomes, is your guess.  \"I was so worried…you're stained in blood!  Are you injured?\"\n\nYou explain everything as your old friend takes you inside.  His family consists of a potbellied old bloke, his heavily freckled wife, and three boys of varying sizes.  They are all in their young teenage years and look as if their bowels had emptied just moments before.  The whole lot of them are terrified, save for the balding one with a beer gut.  He used to be a knight and is damn well proud of it.  Proud enough to not let you hear the end of it.  And a remarkably good shot too, apparently.\n\n\"Ah, we's got the missus to thank fer that,\" Bregan's father embarrassedly reveals.  That petite freckled woman used to train with the King's Rangers?  Who knew?  Before you realize it, everyone in the room has their attention set on you, waiting.  After awhile, it comes to you.  They are waiting for orders.  Even Bregan waits in silence, though he pretends to be focusing on sharpening his sword with a wetstone.\n\n*fake_choice\n  #Inspire them.\n  #Tell it how it is.\n\n\n*set loner 55\n*set sly 80\n*set suave 70\n*set vigilant 40\n*set logical 55\n*set resourceful 60\n*set corruption 20\n\n*set name \"James\"\n*set whichElementName \"Wind\"\n*set whichElement \"wind\"\n*set renown 17\n\nAnd so the odd trio of you leave the Redwater offices together: a knight, a thief, and a mage.  On paper, you'd make a formidable team, but reality involves far more bickering and insults.  While you're intent on a serious discussion of strategy and tactics, your companions…\n\n\"James!  This cat-person, can we even trust it?  Sneak-thieves like her would stab their mothers in the back if there was coin in it.\"  Never afraid to speak her mind, Brigid opens up a discussion on how she feels about your fellow Redwater Salvage Consultant.  It becomes a heated exchange.\n\n\"Pig-fricken freckled farmer wants a fight, is it?  You've found one—can't believe James isn't tired of seein' that ugly mug of yours.\"  She spits those words like a hairball, causing Brigid's right hand to rest dangerously close to her sword hilt.  It's good that her knight training thus far kept the blade in its scabbard, but knowing her temper…\n\nYou need to get these two under control, and fast.\n\n*fake_choice\n  #Appeal to honor.\n  #Appeal to logic.\n  #Appeal to emotion.\n\n\n*finish\n\n\n\n\n\n*comment UNUSED\n\n*set loner 65\n*set sly 55\n*set suave 70\n*set vigilant 40\n*set logical 30\n*set resourceful 50\n*set corruption 0\n\n*set name \"Rachel\"\n*set whichElementName \"\"\n*set whichElement \"\"\n*set renown 0\n\n[i]Suave has increased[/i]\n*line_break\n*line_break\nAll right, so what if your village was a glorified pitstop for merchant caravans going in and out of the city?  You'd be surprised how low even the greediest of them will go to clear out their stock.  Not to mention you were only ever a day or two behind whatever news was happening in our fair kingdom.  It's like getting all the benefits of the city without all the sewage and diseases!\n\nAll good heroes come from humble beginnings, of course, but just how humble were yours?  Were you going to bed hungry and consistently covered in dirt, or did you have it easy?\n\n*choice\n  #We were actually financially well off.\n    *goto afterScreenshot1\n  #Not rich, but we got by well enough.\n    *goto afterScreenshot1\n  #You forgot to mention the smell.\n    *goto afterScreenshot1\n*label afterScreenshot1\n\n\n\n\n\n*set loner 55\n*set sly 30\n*set suave 35\n*set vigilant 55\n*set logical 35\n*set resourceful 40\n*set corruption 20\n\n*set name \"Leon\"\n*set whichElementName \"\"\n*set whichElement \"\"\n*set renown 0\n\n\"Each soul has a color, representative of the element of magic it's most strongly attuned to.  There were once mages who could identify yours with just a passing glance, but unfortunately they are long since gone.  The color of my soul is black, though little surprise in that; I have a dark soul fragment residing within me.\"\n\nYou fail in hiding your anxiousness.  Well, what color is it?!\n\n\"The color of your soul is…\"  Silvana gives pause, forcing anxiety to build upwards inside your stomach.  Just what sort of shade does your spirit take, just what sort of essence does it hold?  You know yourself—or at least think you do—but as for the ethereal being inside your body…you can't help but wonder.\n\nAfter what feels like an eternity, she proceeds.\n\n*page_break\n\n\n*set loner 60\n*set sly 25\n*set suave 35\n*set vigilant 55\n*set logical 30\n*set resourceful 40\n*set corruption 40\n\n*set name \"Leon\"\n*set whichElementName \"Fire\"\n*set whichElement \"fire\"\n*set renown 6\n\n[i][Check versus Direct: pass][/i]\n  *line_break\n  *line_break\n  Five cups of halfling cider and a man can say anything with a straight face.  The 'potion' was to help with blood flow.  Blood flow towards a particular area in the body.  Yes, that's right, as you lay near-dying after that gruesome confrontation, you were getting flustered for very different reasons.  You were raised right, so you can't go into detail.  Patch, on the other hand, was raised wrong.  Very wrong.\n\n\"HAHAHAHAHA!  Oh Fates, that's—\"  The blonde has to bend over and grasp hold of her legs to keep herself upright.  \"—that's the best part of the whole story!  Comedy gold!  Haha, on yer deathbed and ye feelin stiff down in yer trousers?  Bahaha!  Wait 'til the guys hear about this!\"\n\nGreat, that cat will tell half the city before she's done.  There goes whatever sort of reputation you might have been able to build, cut to pieces all because of a stupid stamina potion.  The two of you head into the maze of alleyways that would take you back to Redwater Headquarters, the offices doubling as a place to sleep.  Darkness has crept up over the city, though you've come to realize that it never gets too dark or cold here.  Too many people buzzing about, too many lanterns lighting businesses and walkways.\n\nThat elf back at the tavern has you a bit unnerved.  Maybe you're getting paranoid, but paranoia can save your life around these parts.  You pause for a moment.  Just as you feared, footsteps coming from behind you are trying to keep at your pace…probably something to look into.  You whisper to your companion to give her an idea of the situation.\n\n\"So boss, whatcha think we should do?\"  Your blonde companion teases, all too happy to play the clueless subordinate.  In her case, it isn't very hard.  But on a more serious note, this is a sort of test: to see if you really are Redwater Salvage material.  You don't want to mess this up—you just wish you weren't hammered.  When it doubt, remember to play to your strengths…\n\n*choice\n  #Instruct Patch to flank him.\n    *goto afterScreenshot6\n  #Catch him at a dead end.\n    *goto afterScreenshot6\n*label afterScreenshot6\n\n\n[i]Your relationship with Bregan grows[/i]\n*line_break\n[i]Carefree has increased[/i]\n*line_break\n*line_break\nMidnight is still a ways off yet, and you owe it to your friend to enjoy yourself at the party.  Not that it's difficult with all that free food and drink!  Everyone from town is pulling out their best stories, and they just keep getting better as more drinks get brought around.  You feel a warmth press against your breast, only to realize Bregan has passed out beside you.  Cute as the sight is, it reminds you that you have to be off at once.\n\nThis summer's night, while warm, draws in a cool breeze that buffets you on your way back home.  The cryptic message from Silvanus lingers in your mind.  The 'paths' where the two of you first crossed were out in the forest that is your backyard.  You can retrace the exact spot in your mind vividly: it was where you and your father tried your hardest to save the life of a nobleman.  Or maybe that was a lie, too.  What sort of emotion are you feeling the strongest?\n\n*choice\n  #Anger.\n    *goto afterScreenshot3\n  #Curiousity.\n    *goto afterScreenshot3\n  #Uncertainty.\n    *goto afterScreenshot3", "startup": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*title Fatehaven\n*author Devon Connell\n*scene_list\n  startup\n  prologue\n  chapter1\n  chapter2\n  chapter3\n  chapter4\n  chapter5\n  $ chapter6\n  $ chapter7\n  $ chapter8\n  $ chapter9\n  $ chapter10\n  $ chapter11\n  $ chapter12\n  $ chapter13\n  $ chapter14\n  $ chapter15\n  $ chapter16\n  $ chapter17\n\n*create loner 50\n*create sly 50\n*create suave 50\n*create vigilant 50\n*create logical 50\n*create resourceful 50\n*create corruption 0\n\n*create name \"\"\n*create gender \"Unknown\"\n*create renown 0\n*create attractedTo \"Unknown\"\n*create brigidRelationshipPoints 0\n*create patchRelationshipPoints 0\n*create silvanaRelationshipPoints 0\n*create myRouteBrigid false\n*create myRoutePatch false\n*create myRouteSilvana false\n\n*create MC_hisher \"his\"\n*create MC_heshe \"he\"\n*create MC_himher \"him\"\n*create MC_sondaughter \"son\"\n*create MC_boygirl \"boy\"\n*create MC_manwoman \"man\"\n*create MC_guygirl \"guy\"\n*create MC_chestbreast \"chest\"\n*create MC_sirrahmilady \"sirrah\"\n*create MC_boylass \"boy\"\n*create MC_brothersister \"brother\"\n*create MC_handsomebeautiful \"handsome\"\n*create MC_stifftingly \"stiff\"\n*create MC_menwomen \"men\"\n*create MC_tunicsdresses \"tunics\"\n*create MC_tunicdress \"tunic\"\n*create MC_gentlemanmaiden \"gentleman\"\n*create MC_priestpriestess \"priest\"\n*create MC_gentlemanlady \"gentleman\"\n*create MC_handsomepretty \"handsome\"\n*create MC_lordlady \"lord\"\n*create MC_cologneperfume \"cologne\"\n*create MC_muskyfruity \"musky\"\n*create MC_bowcurtsey \"bow\"\n*create MC_sirlady \"sir\"\n*create MC_goodsirmylady \"good sir\"\n*create MC_heroesheroines \"heroes\"\n*create MC_chestbosom \"chest\"\n*create MC_fellowlass \"fellow\"\n*create MC_baronbaroness \"baron\"\n*create MC_fellerlass \"feller\"\n*create OP_daughterson \"daughter\"\n*create MC_princeprincess \"prince\"\n\n*create herhis \"her\"\n*create shehe \"she\"\n*create herhim \"her\"\n*create hershis \"hers\"\n*create womanman \"woman\"\n*create girlboy \"girl\"\n*create girlguy \"girl\"\n*create ladygentleman \"lady\"\n*create beautifulhandsome \"beautiful\"\n*create princessprince \"princess\"\n*create princessesprinces \"princesses\"\n*create bridesmaidgroomsman \"bridesmaid\"\n*create lasssap \"lass\"\n*create erem \"er\"\n*create cutehandsome \"cute\"\n*create femalemale \"female\"\n*create gowntunic \"gown\"\n*create gigglechuckle \"giggle\"\n*create Brigid \"Brigid\"\n*create Silvana \"Silvana\"\n*create Lillian \"Lillian\"\n*create daughterson \"daughter\"\n*create bitchbastard \"bitch\"\n*create wifehusband \"wife\"\n*create misssir \"miss\"\n*create blondeblond \"blonde\"\n*create herhisss \"her\"\n*create temptresstempter \"temptress\"\n*create fairhandsome \"fair\"\n*create lassstud \"lass\"\n*create slimbroad \"slim\"\n*create supplemuscular \"supple\"\n*create bustchest \"bust\"\n*create succubusincubus \"succubus\"\n*create missmister \"miss\"\n*create herchesthiswaist \"her chest\"\n*create lionesslion \"lioness\"\n*create maidbutler \"maid\"\n*create ladysir \"lady\"\n*create femininemasculine \"feminine\"\n*create unladylikeungentlemanly \"unladylike\"\n*create charminghandsome \"charming\"\n*create lassguy \"lass\"\n*create softfirm \"soft\"\n\n*create whichChild \"only\"\n*create whichRace \"elves\"\n*create whichTown \"hamlet\"\n*create whichClothes \"normal\"\n*create whichElement \"\"\n*create whichElementName \"\"\n*create whichBrigidSword \"remade\"\n*create whichWeapon \"\"\n*create whichBlessing \"\"\n*create saidStargazing true\n*create marriage \"\"\n*create choiceRecon true\n*create acceptedBrigidOath false\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n\nCombat, romance, adventure, and of course—magic!  Master the four elements and take on fate itself in this four-hour epic fantasy tale!\n\n*image fatehaven480.png\n\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  [i]You can play the first four chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase adfree $4.99 purchased\n  *label page_break\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n*finish Begin Story\n\n\n*comment Loner : Leader //Loner vs Leadership\n*comment Sly : Powerful //Slyness vs Power\n*comment Suave : Direct //Suaveness vs Directness\n*comment Vigilant : Carefree //Vigilance vs Carefree\n*comment Logical : Emotional //Logical vs \n*comment Resourceful : Faithful\n"}};
