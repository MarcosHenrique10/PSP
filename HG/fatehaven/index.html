der if you'll ever be able to think of an elf as pretty again, after having known the most beautiful on such intimate terms.  Maeben had all the grace in the Kingdom, but the cost for ${herhis} mind…it wasn't worth the price.  No matter how plain or ugly ${shehe} might have looked…it didn't have to come to this!\n\n    With determination, you raise your bloodied club up high to deliver the finishing blow.  Rest easy now, elven ${princessprince}, for your soul will be set free once more!  HeeeeYah!\n\n    [b]\"Ah?!\"[/b]\n\n    You exclaim your surprise as the arm you swing with such force pauses in midair.  It isn't some magic trick, but a furry catfolk whose arms cross to stop the blow.  How Patch has gotten into position in half an instant still amazes you; the look ${shehe} gives still scares you.  The force you put into your shoulders dissipates.  No doubt, Patch is worried about not getting the reward for this job…doesn't ${shehe} know that—\n\n    \"${name}!  I…fricken stuff your ducats for once!  Pack 'em tighter than a lordling's ass-kissin' cheeks!  You hearin' me, ${name}?  You kill this elf, and it will…\"  Patch pauses in ${herhis} uncharacteristic outburst to turn away.  With ${herhis} one good eye looking down over Maeben, ${shehe} finishes the sentence.\n\n    \"A weakling like you, you'd never forgive yourself.  And no amount of self-righteous horseshit will make that any better.\"  Your co-worker spits out those last words like a hairball.  In that moment, you realize you've horribly misjudged your companion.  It isn't the coin but a comrade's well-being that worries ${herhim}.  Maybe…something even more than a comrade?\n    *goto c7KillMaebenChoice\n  #Return Maeben.\n    *set corruption -10\n    [i]Your corruption decreases[/i]\n\n    Your hand reaches to the club at your hip, now bloodied from that surprise attack on the blonde disciple.  You aren't quite sure what would become of him, but after a smack across the face and being run over by Genock, you imagine his warrior monk days are over.  The look you give as you gaze down upon the elf's body must be intense.  A soft hand covered in light fur holds your right hand in place.\n\n    [b]\"Ah!\"[/b]\n\n    You exclaim your sense of surprise from Patch's touch.  This is the first time you've felt the softness of fur grabbing ahold of you, but besides that…just what is ${shehe} doing in the first place?  Your puzzlement forces Patch's face to go from one of concern to embarrassment.  And then anger.\n\n    \"Fates!  Fricken…thought you were going to do ${herhim} in!  I know ${MC_menwomen} like you…full of self-righteous horseshit…I just didn't want you doing anything you'd regret—er, I mean…we don't get any coin if ${shehe}'s dead!  Stupid arse!\"  $!{herhis} claws don't bother retracting as ${shehe} quickly releases the grip on your hand, causing a lingering pain.  Patch turns away, avoiding you with ${herhis} one good eye.\n\n    In that moment, you realize you have horribly misjudged your companion.  It isn't the coin but a comrade's well-being that worries ${herhim}.  Maybe…something even more than a comrade?\n    *goto c7KillMaebenChoice\n*label c7KillMaebenChoice\n\nIt may have been a silly thought, but it occupies you well into the trek to The Staggering Bard.  Maeben has regained consciousness since then but is blissfully silent and compliant the whole time.  Patch leaves to find the client inside, while you keep the elf safely tucked away in the back alley where this all started in the first place.  With the cat gone, the elf grows more talkative.  The flirtatious tone you've grown accustomed to isn't there.\n\n\"It spoke to you, didn't it?  Over and over, I had memorized every detail of that ${womanman}'s message.  The voice gave me comfort…even on the darkest and most bleak days in that dungeon.  Just to see these stars again, to breathe in air from the outside after all that…\"  The elf trails off with a forlorn expression.  You expected ${herhim} to be elated at this freedom, though the grim reality of ${herhis} situation is perhaps not entirely lost on ${herhim} after all.\n\n\"And you, ${name}. [i]'One such magician who proves this power can make our world better.'[/i]  You are ${MC_heshe} of whom the blood spoke.  I was earnest when I tried to give myself to you, but I ended up harming you instead…\"  Red lights up your cheeks; you can't lie and say you didn't enjoy being seduced like that.  You wonder if you'll ever be enchanted like that again.\n\n$!{herhis} voice wavers but manages to continue. \"The chant returns to me, but I will hold on long enough for my father to recognize who I am.  I know I am a demon…without more of the black blood, who knows what will become of me?  Haha…that kitten doesn't know how lucky ${shehe} is.\"\n\nPatch returns with an elf drunk on happiness and brimming with ecstasy.  After the initial confusion from the (much improved) appearance of his ${daughterson}, Maeben is able to give enough details of ${herhis} upbringing to convince him of ${herhis} identity.  He thanks you, afterwards inquiring as to what difficulties you encountered.  A pair of cat-ears also poke up in attention.\n\nIt seems as if you have quite the tale to tell, but now is not the time.  You don't want to endanger these elves further, and you advise them to leave shortly after returning home, as the Church will look for them there.  You aren't sure what sort of life Maeben will lead from this point onward, but just being alive is enough for now.  Patch jingles a large pouch of silver on the trip home after a series of goodbyes.\n\n\"Pfft, should've gotten this much in gold.  Who risks their neck for a wood elf when lords and ladies catch such a nicer price?\"\n\nA magician who plans to change the world, that's who.\n\n*finish Next Chapter\n", "chapter8": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 8\n\n——————————————\n*line_break\n—————————— Chapter 8: Exotic Clientele\n*line_break\n——————————————\n\n\"Hmph!\" \n\nThere it is again. The pout that hasn't stopped for two weeks now. \n\nThat upturned cat nose of ${hershis} flares whenever ${shehe} enters a room with you now. Does its best to make you feel unwelcome after that last job. But it's not working—the beer your employer brought back to the Redwater offices is too good. You take another swig.\n\nBinyo knows how to keep his employees' morale high: providing enough drink to keep your mind dulled to the grander tragedies of life; enough fancy tea to keep the gnome feeling like royalty; and enough silver to keep Patch's good eye gleaming.  Wonder what kind of vice our patron lizardman has?  Fresh mackerel, you'd wager.\n\nYou take another swig for thinking too hard. Thinking too much will just give you a headache, especially since there's so much to think about.  After your stunt at the city cathedral where you played dress-up as a crazed, demonic ${MC_priestpriestess}, everything has changed.  The Cossack Order was forcibly disbanded, and the entire cathedral itself is nearly abandoned these days for fear of more demons.  The Crown has taken over a significant portion of the Church's dealings, using this as an opportunity to retake the power it had lost over the past century.  Unemployment is at an all-time high, what with the Bishop's Garrison and paladin groups downsizing dramatically.\n\nMore significantly, the holy war in the Far West has grown drastically unpopular.  In its place, the desire for domestic defense is on the tip of everyone's lips.  Fear of magic and the unknown will do that to a people, you suppose.  It'll likely be due to reduced donations and tributes, but one way or another, this unjust war will soon come to an end.  So why are you drinking until you need three legs to stand upright?\n\nYou ought to be ecstatic!  You've dealt your mortal enemy a tremendous blow, ended an unjust war, and saved a beautiful elf all in the span of half a day.  Kerlton has only recently stopped interrogating you on each and every minor detail of your escapade.  His intention is to recount the profound incident in the most dramatic yet accurate way possible.  You only hoped he'd give you a running start out of the city before telling it.  While it's true that commonfolk are starting to come to terms with the idea of magic being real, coming out as a mage would get you burned and flogged.  At the same time.\n\nYou place a hand over your left shoulder—it's bruised from how often Binyo pats it as of late.  He doesn't know about the magic, but he does know that the job was a complete success.  He is undoubtedly your biggest fan, and it feels good to know that your co-workers no longer see you as a rookie.  Well, all of them except one, anyway.\n\nA lazy tail twitches as Patch rises from the sofa.  \"I'm taking a bath. You've got front door duty. Try not to sell our souls to the first ${girlguy} who knocks.\"\n\nYou can't make any promises to $!{missmister} Kitty—they're just moths to the flame these days. But having learned to pick your battles, you keep that quip to yourself.  You are well and prepared for a very easygoing afternoon, and you slip yourself snugly across the couch as if to confirm it.  The fireplace isn't lit due to the early onset of summer, but even so, the living room of the Redwater Salvage Consultants has a very homey feel.  And it is your home now, you suppose.  It's funny, if you—\n\n[i]*knock* *knock*[/i]\n\n*page_break\n\nA pair of knocks on the door ruin the moment of relaxation you've been trying so hard to create.  With Binyo and Genock out and about on errands, Kerlton betting his coins with loaded dice, and Patch bathing…it's up to you to answer it.  You aren't as smooth as the gnome, as affable as the dwarf, or as intimidating as the lizard—so you have your work cut out for you when it comes to dealing with clients.\n\nYou muster up the willpower to get yourself out of the confines of the comfortable couch and over to the door. Must be Kerlton, back from his gambling proclivities. As you open the door, your downward gaze—expecting a grumpy gnome—lands on a girl's bosom instead. \n*if (attractedTo = \"female\")\n  Patch needs to find work as a fortune teller.\n  *goto c8AfterPatchNeeds1\n*else\n  *goto c8AfterPatchNeeds1\n*label c8AfterPatchNeeds1\n\n\"Hello, is this the office of the Redwater Salvage Consultants?\"\n\nHer voice is as wispy as her features. A nicely framed womanly waist and feminine shoulders. Is it telling that you noticed that before the blue skin?  It looks like it's as smooth as the moon, fitting because she looks like an alien!  Her lips are colored a shade of purple, though lip-coloring is a popular trend amongst wealthy women. The scent of a rich perfume tries in vain to cover up her natural exotic aroma. \n\n*if (attractedTo = \"female\")\n  You thought you'd built up a resistance to mesmerizing women, but boy, were you wrong.\n  *goto c8AttractedTo1\n*else\n  *goto c8AttractedTo1\n*label c8AttractedTo1\n\nUnlike you—staring at her with wide eyes and a blank expression—she is trying to maintain an aura of professionalism. You gather up your wits and lead her to the client room.  It is the fanciest (and dustiest) room the headquarters has, packed with shiny trophies and rewards from Binyo Brighthammer's younger days.  The chairs are large, wooden, and uncomfortable. You never want a client getting too comfortable, after all.  But you almost want to apologize, because that derriere deserves better.\n\n\"Aphid Almondvale.\" She extends her hand as you introduce yourself. Her grip is so light, you fear you might crush her if you squeeze too hard. \n\n*if (resourceful >= 50)\n  [i][Check versus Resourceful: pass][/i]\n  *line_break\n  *line_break\n  You've read up on the more exotic races of the Southern lands before, recently in fact. Her wispy features, blue skin, and light weight are trademarks of the faerie race. How much of her blood is faerie and how much is human is still up for interpretation. \n  \n  Your awareness does not go unnoticed. \"Ah, I'm impressed. My bloodline is usually a mystery to people. Perhaps my intel misjudged you.\" Her brow raises approvingly.\n  *goto c8Resourceful1\n*else\n  You soften your grip while shaking her hand. Although she is of normal height, she couldn't weigh more than a child. You feel yourself fumbling for words, unsure of any customs you might be violating.\n  \n  Your perplexion prompts an explanation. \"I am one-quarter faerie. Don't worry, I won't steal the sugar in your cupboard or turn you into a frog,\" she says with a well-rehearsed smirk. You must not have been the only one befuddled by her lineage.\n  *goto c8Resourceful1\n*label c8Resourceful1\n\nYou offer her tea, but she's all business.  You exaggerate your slouch in order to make her feel at ease, though the effort isn't very effective.  Just what job does this faerie-human have in store for you?\n\n\"I come on behalf of General Reaver McDohl's estate.  The matter is very delicate.  There has been a kidnapping.  My sources tell me that a young ${MC_manwoman} named ${name} is an expert in such cases.\"  Her look tells you that an introduction on your part won't be necessary.\n\nIf you were slouching before, you aren't now.  Just when did you become an expert in handling kidnappers?  The plan coming into this city was to keep a low profile; now, you're on a first-name basis with a military commander!  This is getting out of hand.  You shake your head at your own situation.  What she says next, however, alleviates some of your fears and then adds a few more.\n\n\"You are 'Quel-Edan', are you not?  It is elvish for [i]'a human whose kindness far exceeds ${MC_hisher} years,'[/i] and it is a title not freely given.  You earned it by rescuing a very high-profile young elf, as I understand.\"  You aren't so sure about being a 'quail edict' or whatever that is, but you're certain Maeben's father is to blame.  Just how popular have you become with the elvish community?\n\nJust then, a certain cat${girlboy} waltzes through the doorway.  Still dripping wet from the bath, ${shehe} freezes at the sight of unexpected company. The towel wrapped around ${herchesthiswaist} is a very immodest sight to behold. While you're used to Patch's exhibitionist behavior, it's far too unprofessional to be seen by a client. $!{herhis} blush of embarrassment shows as ${shehe} retreats back behind the door.\n\n*if (attractedTo = \"female\")\n  Without missing a beat, Aphid quips, \"I was unaware that I interrupted a personal meeting with your housemaid.\"\n  *goto c8AphidQuip1\n*else\n  Without missing a beat, Aphid quips, \"I was unaware that I interrupted a personal meeting with your manservant.\"\n  *goto c8AphidQuip1\n*label c8AphidQuip1\n\n*choice\n  #Respond inquisitively.\n    *if (resourceful >= 50)\n      *set renown +1\n      [i][Check versus Resourceful: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      *goto c8RespondInquisitively\n    *else\n      *goto c8RespondInquisitively\n    *label c8RespondInquisitively\n    You are far too curious to be embarrassed. It's true that catfolk are a subjugated species for the most part, yet for someone as well-researched about you and the Redwater Consultants, she should know of the renowned cat${girlboy} mercenary in your employ. \n    \n    \"You're right. It's my job at the estate to plan ahead. I have researched your company thoroughly. Yet it would seem I was wrong to write you off as a country bumpkin.\" She submits defeat to your detective act.\n    *goto c8RespondChoice\n  #Respond teasingly. \n    *if (suave \u003c= 50)\n      *set renown +1\n      [i][Check versus Suave: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      *goto c8RespondTeasingly\n    *else\n      *goto c8RespondTeasingly\n    *label c8RespondTeasingly\n    You can't pass up the perfect opportunity to make a joke at Patch's expense. It's the perfect revenge for the silent treatment ${shehe}'s been giving you lately. \n    *if (attractedTo = \"female\")\n      You jest that ${shehe} wishes ${shehe} could be your housemaid.\n      *goto c8housemaidmanservant\n    *else\n      You jest that ${shehe} wishes ${shehe} could be your manservant.\n      *goto c8housemaidmanservant\n    *label c8housemaidmanservant\n\n    Aphid's smile matches the slyness of yours—perhaps this has been her intention the whole time?  Her tone grows almost playful, perhaps even flirty. \"It seems like you've become the leader of this company in such a short time.  Already bossing people around like that…\"  Her blue hand brushes up against yours, and you're not naive enough to think it's by accident. \"…if all ${MC_menwomen} of the countryside are as strong and bold as you are, I ought to do some sightseeing.\"\n    \n    Your ego is stroked to full mast at this point.  But you know what?  You do deserve more praise.  What you've managed to accomplish is no small feat, no footnote or minor victory.  Were you a lesser ${MC_manwoman}, you'd never have been able to fight, bleed and succeed like you have.  Badass warrior monks were no match for your untamed potential.  You instinctively flex your muscles.\n    *goto c8RespondChoice\n*label c8RespondChoice\n\nAhem. Back to business.  Who, what, when, why, and how much?\n\nThe playful hand and voice disappear as quickly as they came.  Back to business, indeed.  \"The General's only son, Pietro McDohl.  He's been missing for four days.  A group of beastmen led by one called Narcissus has taken responsibility.\"  Beastmen?  If they're anything like lizardmen, they're going to be a large and fearsome sort to deal with. \"They raised their asking price tremendously last night—we suspect they've identified Pietro.  They want a hundred gold ducats.\"\n\nYou can't wrap your head around that number. How many deadbeat mercs wouldn't shed blood for a fraction of that?  No, you can deal with that sort of riffraff.  A bounty that high would bring out the professional killers.  You shudder as an image flashes in your mind.\n\n*choice\n  #An image of Patch.\n    *set patchRelationshipPoints +1\n    [i]Your relationship with Patch grows[/i]\n    *line_break\n    *line_break\n    With Binyo taking you under his wing, you've been given a (sort of) leadership position around here.  Whether you like to admit it or not, you've already put Genock's life in danger.  It's becoming more apparent that every action has a consequence, and the stakes are higher than ever.  You're risking the lives of your comrades, your only family.  Your mind tortures you with a vision of Patch fighting valiantly and slowly succumbing to ${herhis} wounds.  $!{shehe}'s covered in blood, ${herhis} once rosy cheeks pale.  With a pained smile, ${shehe} mutters the word [i]\"Idiot.\"[/i]\n\n    You grip your hand into a fist and swear never to let that happen.\n    *goto c8ImageChoice\n  #An image of ${Silvana}.\n    *set silvanaRelationshipPoints +1\n    [i]Your relationship with ${Silvana} grows[/i]\n    *line_break\n    *line_break\n    The word 'kidnapping' doesn't conjure up a rousing success in your mind.  It brings you back to the struggling burlap sack of ${Silvana} on that fateful night, ${herhis} only crime being the blood flowing through ${herhis} veins.  Blood, power, and money are all that matters in this forsaken world.  That's probably why the General came to you.  You can relate to having the innocent stolen from you.\n\n    You grip your hand into a fist and swear never to let that happen again.\n    *goto c8ImageChoice\n*label c8ImageChoice\n\nA powerful sneeze breaks you from your introspection.  Aphid apologizes profusely—you wave it off and ask for more details.  The Redwater Salvage Consultants are great at repossessions and the like but are ill-fitted to take on armed mercenaries.  You've had enough suicide missions for one lifetime.  \"The General cares very deeply for his son, and doesn't intend to risk the boy's life under any circumstances.  We intend to organize the exchange…but they've requested an outside party handle the negotiations.  That's where you come in.\"\n\nNegotiate with a group of half-beast mercenaries for the well-being of the General's son?  The General also known as the Stormwarden, a feared and powerful military genius who kneels only to the King?  And this faerie is trying to tell you that this powerful man is trusting you with this?  His kid aside, this is a hundred gold ducats we're talking about.  More than enough to drown yourself in the finest elven wine, centuries old.  What's really going on?\n\nAphid smiles. \"If you did not question that, I wouldn't have picked you.  But you've exceeded my expectations in several ways.  Please come to the McDohl estate tonight as a dinner guest; you may even bring along your kitten if you wish.\"  With that oddly cryptic remark, the two of you shake hands as if you've formed some sort of agreement.  But it seems you'll have to wait until tonight to know what's really going on…at least you won't have to worry about making supper.\n\nBeing the ${MC_gentlemanlady} that you are (or at least pretend to be), you accompany the faerie on her way out.  Just as you're leaving, a familiar gnome makes his way in.  His face goes from one of surprise to an unusually wide smirk.  As Aphid passes by, Kerlton whispers a short rhyme you nearly don't catch. \"Wilt thou be mine, said a sad-looking swine?\"  That phrase stops your client dead in her tracks.  You really hope the bard's jibes aren't going to cost you a potential job, especially one from the Stormwarden, of all people!\n\n\"That was…I'm not…\"  The perpetually calm and confident woman struggles with the right words.  You help usher her outside, offering apologies on behalf of your rude companion.  Whatever Kerlton said really played on her nerves—do they know each other?  You see her off and proceed to interrogate the bard on his questionable behavior.\n\nHe's already on his rocker with a pipe lit when you return.  \"Almondvale's daughter turned into quite the woman, don't ye think?\"  A deep inhale and exhale later, his expression grows forlorn. \"Perhaps it was too much to ask for her to remember a gnomish minstrel, no matter how many nursery rhymes he spun her.  Two decades, aye…\"  There's a story here, or you aren't ${MC_handsomepretty}.  Apart from your curiosity, any knowledge about your client would make tonight's encounter less daunting.\n\n\"It was my misfortune in knowing the girl's mother on familiar terms, back then.  I…regret not playing a greater role in her daughter's upbringing.  You may be in over your head on this one, ${MC_boygirl}.  No, you most certainly are.\"  This cryptic warning from a mysterious aged bard doesn't do well for your resolve or spirits.  The rescue of the Stormwarden's son would be the greatest job Redwater has ever taken on.  No pressure, ${name}.\n\nA hiss announces the presence of Patch, hair still in a mangled mess from ${herhis} recent bath.  $!{shehe} sniffs the air, face contorted in utter disgust. \"That foul blue woman is finally gone?  Fates be praised.  Oh, and ${name}…\"  The cat${girlboy} darts in front of you with…cat-like agility.  A sharpened fingernail glides gently across your upper chest.  \n*if (attractedTo = \"female\")\n  \"Just 'cuz you're a fricken elf-tramp rescuer don't make me your housemaid.  You hearin' me, rookie?\"\n  *goto c8HearinMeRookie1\n*else\n  \"Just 'cuz you're a fricken elf-tramp rescuer don't make me your manservant.  You hearin' me, rookie?\"\n  *goto c8HearinMeRookie1\n*label c8HearinMeRookie1\n\nYou're hearing ${herhim} loud and clear, but Maeben isn't an elf-tramp.  $!{shehe}'s just misunderstood and a victim of bad blood infusions.  $!{shehe} is also in your head more nights than not, though you won't dwell on those particular thoughts right now.  You need to change the subject matter to the job at hand: the dinner party.  There are a hundred matters to address with Patch, but what should be the first order of business?\n\n*choice\n  #Discuss attire.\n    *if (suave \u003c= 50)\n      *set renown +1\n      [i][Check versus Direct: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      *goto c8DiscussAttire\n    *else\n      *goto c8DiscussAttire\n    *label c8DiscussAttire\n    *if (attractedTo = \"female\")\n      \"H-hold on a fricken horse-eatin' minute!  You want me to wear an underskirt and gown?!  And go ho-hum at a fancy lordly dinner party?!  How daft can you be, you country lout?\"  Patch isn't taking to your plan quite as aptly as you'd hoped.  Granted, there are certain problems with your scheme.  Neither of you have anything to wear, nor the decorum to allow a dinner party to run smoothly.  While you're far from unrefined, you are from the country.  And Patch is, well…from the inner city.  You doubt a duchess or a councilor's wife would be able to appreciate ${herhis} deteriorating linen garbs as much as ${shehe} does.\n      *goto c8DiscussChoice\n    *else\n      \"H-hold on a fricken horse-eatin' minute!  You want me to wear a surcoat with puffy sleeves?!  And go ho-hum at a fancy lordly dinner party?!  How daft can you be, you country lout?\"  Patch isn't taking to your plan quite as aptly as you'd hoped.  Granted, there are certain problems with your scheme.  Neither of you have anything to wear, nor the decorum to allow a dinner party to run smoothly.  While you're far from unrefined, you are from the country.  And Patch is, well…from the inner city.  You doubt a duchess or a councilor's wife would be able to appreciate ${herhis} deteriorating linen garbs as much as ${shehe} does.\n    *goto c8DiscussChoice\n  #Discuss manners.\n    *if (suave >= 50)\n      *set renown +1\n      [i][Check versus Suave: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      *goto c8DiscussManners\n    *else\n      *goto c8DiscussManners\n    *label c8DiscussManners\n    \"H-hold on a fricken horse-eatin' minute!  You want me to curtsy and stick a napkin on my collar like an old biddy?!  And go ho-hum at a fancy lordly dinner party?!  How daft can you be, you country lout!\"  Patch isn't taking to your plan quite as aptly as you'd hoped.  Granted, there are certain problems with your scheme.  Neither of you have anything to wear, nor the decorum to allow a dinner party to run smoothly.  While you're far from unrefined, you are from the country.  And Patch is, well…from the inner city.  You doubt a duchess or a councilor's wife would be able to appreciate ${herhis} crude humor like more common folk do.\n    *goto c8DiscussChoice\n*label c8DiscussChoice\n\nThe imagery gets a chuckle out of the gnome, who seems to have snapped out of his sour mood for the moment.  If anyone knows how to court with courtesans and rub shoulders with regals, it's him. \"A dinner party over at the Stormwarden's…how to not make complete fools of yourself is the question.  The General himself won't be in attendance, you know, still out on the Western front.\"  You didn't know about that at all!  Kerlton sighs at your surprise, questioning just how much you know about the man.\n\nLittle and less, but a job is a job.\n\nThe rocker creaks as it speeds up in its movements.  That means the one sitting in it is thinking, especially when he takes pause from his pipe for once. \"You'll both need new clothes.  Patch, you're exotic, to put it kindly—prepare for an onslaught of questions about catfolk.  Like be they've never seen one before, much less shared wine with one.  Don't curse.\"  Kerlton's instructions couldn't be more difficult for your furry comrade.  Curses encapsulate a large portion of ${herhis} vocabulary.\n\nAnger is the expected response. \"What, ya want me to keep my flamin' mouth shut, is it?!\"  \n\nAfter thinking upon it, the bard gives a nod. \"You might be considered ${name}'s servant, though try not to consider it a personal offense.  That's actually not a bad approach…\"  Patch is practically fuming at this point but keeps silent nonetheless.  Servants rarely speak; ${shehe} could even pass as not being a native speaker of the language.  You won't be so lucky.  It will be daunting, but you're confident you can pass yourself off as a semi-respectable young ${MC_lordlady}.  \n\n\"But before I lecture you two on decorum and light conversation, I need to ask you something.\"  Kerlton puts away his pipe entirely as he stares you down.  You don't recall him ever looking this serious, even counting the times before he's had his morning tea. \"No helping it, I have to ask.  Did the faerie cough on you?\"  \n\nW-wait, what?  He built up this serious atmosphere just to ask a pointless little question like that?  Sure, he has a tendency towards pointless presentations to make himself seem more profound, but really now.  Aphid didn't cough on you, but she did have one nasty sneeze.  You're not afraid of catching sickness, however you are surprised at the blank look you get in return for your reply.\n\n\"Like mother…like daughter.\"  Kerlton looks into the unlit fireplace as if suddenly enamored with the half-burnt logs.  The rocking chair resumes its swing, but this time it's different.  It's angry, the creaking noise not stopping until another takes its place.  Just what is going through that little head of his?\n\n*page_break\n\n\"${name}, grab some lemons and some ginger from the cupboard.  Take a bath, hot as you can stand—and scrub every inch.  Keep at it 'til your skin wrinkles.  Fates help us, how did faeries ever get a reputation for bringing good luck?\"  The gnome's mind and tongue run at a mile a minute, and you find it difficult to follow.  You were planning to take a bath before dinner, of course, but with lemons and ginger?  Why does he want you to cook yourself in a pot of tea?\n\nYou never get an answer; heck, you can hardly get a word in! \"…elbows, of course, stay off the table when eating.  If anyone who seems important enters the room, make sure to stand.  Just do as the other guests there do.  The matter of the Church—\" Kerlton pauses to give you a quick glance.  Needless to say, you'll be careful with your words around that subject.  \"—will no doubt be the conversation of the day.  I will accompany Patch to the tailors to get fitted while you bathe.  Any questions?\"\n\nYes, a few.  First of which…won't you need to get fitted as well?  You aren't exactly going to represent Redwater well with any of the beaten-up ${MC_tunicsdresses} you regularly wear and less regularly clean.  \"I already know your measurements.  And Patch's as well, but ${shehe}'ll require a seam retouched for the tail.\"  Hold on a second, you don't even know what your sizes are!  Is he just guessing, or has he been measuring you in your sleep?\n\n\"Mother was a seamstress.  Enough questions, get to scrubbing.\"  Another little tidbit of his past revealed, the plan is rushed into action.  You're glad it isn't your plan, for once—each member of the Redwater Salvage Consultants has their strengths.  Binyo is personable, Genock is strong, Patch is sneaky, and Kerlton knows high society.  As for you, well…\n\n*if (whichElement = \"fire\")\n  You can make fireballs pop out of nowhere.\n  *goto c8WhichElement1\n*elseif (whichElement = \"water\")\n  You can make snowballs in the midst of summer.\n  *goto c8WhichElement1\n*elseif (whichElement = \"earth\")\n  You can stomp up an earthquake.\n  *goto c8WhichElement1\n*else\n  You can swirl up a tornado.\n  *goto c8WhichElement1\n*label c8WhichElement1\n\nThe debt you owe Genock for keeping silent about your…magical proclivities is vast.  In all honesty, he doesn't seem to mind—it did save his life back in that dungeon, after all.  He encouraged you to come clean to the others, but it was just too great a risk with not enough gain.  You're like a ${MC_sondaughter} to Binyo, and as for Patch, you…\n\nYou don't want that one good eye to look at you any differently.\n\n*finish Next Chapter\n", "chapter9": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 9\n\n——————————————\n*line_break\n—————————— Chapter 9: Fine Dining\n*line_break\n——————————————\n\nThe oil in your hair makes your scalp itch.  The ${MC_cologneperfume} lathered under your arms makes you emit a ${MC_muskyfruity} scent that feels completely foreign.  As you gaze upon the person staring back at you from the mirror, you can't help but feel that it isn't actually you.  Just what have you allowed Kerlton to turn you into?\n\n\"A painted ${MC_princeprincess}, if I do say so myself!  They'll ask about your hair, of course—just play it off as an Eastern trend you decided to have a go at.\"  You don't share his enthusiasm, but it could be worse.  As your eyes drift towards Patch's 'royal servant' outfit…they can't help but stay there.\n\n*if (attractedTo = \"female\")\n  A frilly short skirt that pulls up dangerously high, along with white stockings paired with an apron too small to be practical.  Sleeveless, with an immodest amount of cleavage showing—there's a ribbon where her bust meets, but that hardly hides anything.  And to top it all off, she wears a collar around her neck with a silver bell.  She looks sexy, ridiculous, and…dare you say it, submissive?\n  *goto c9AttractedTo1\n*else\n  A single suspender runs vertically down his bare chest.  It attaches below to a pair of shortened trousers, and up top to a collar around his neck.  He isn't completely bare-chested, you suppose, as a white vest which is entirely unbuttoned does provide minimal modesty.  Black gloves finish the outfit.  He looks sexy, ridiculous, and…dare you say it, submissive?\n  *goto c9AttractedTo1\n*label c9AttractedTo1\n\n\"Don't…you…dare…${name}.\"  Patch turns away, causing ${herhis} bell to jingle.  This in turn causes ${herhim} to get angry, which makes the bell jingle even more.  It's a cycle that isn't going to end well.  The outfit ${shehe}'s wearing…you should say something.  You shoo the gnome out of the room.  He's done enough damage.  Now you have to salvage and consult your companion if tonight is going to be anything other than a complete failure.\n\n*choice\n  #\"You look hot.\"\n    *set patchRelationshipPoints +1\n    [i]Your relationship with Patch grows[/i]\n    *line_break\n    *line_break\n    \"You look hot.\"\n\n    Furry cheeks can't hide the blush.  You mean it, though, ${shehe}'s cleaned up very nicely.  You've never seen this well-groomed side of your companion before, even if the outfit is a tad crazy.  This isn't a city cat but a beautiful ${lionesslion}, whom none would think to be a rogue with a penchant for crass jokes.  But on a serious note, if Patch took better care of ${herhis} appearance…folks wouldn't look down on ${herhim} like they do on most catfolk in the city.\n\n    \"Y-you think I look good?  Parts of me feel naked, other parts feel tighter than a nun's…er, guess I need to clean up my words.  But this collar sucks harder than an orc babe at teats!\"  You laugh, because ${shehe}'s funny and to help calm ${herhis} nerves down as well.  Being a servant isn't going to be easy; there are customs and gestures ${shehe}'ll have to master—\n    *goto c9ConsultChoice\n  #\"This is silly, isn't it?\"\n    \"This is silly, isn't it?\"\n\n    Patch nods with a sigh.  You mean it, though, this whole situation is so weird and crazy—you aren't even sure what the job is supposed to be yet!  Why does a company as plain as Redwater get invited to such a ritzy event?  And where is Binyo…he should be going, not you.\n\n    \"Binyo would bore 'em with his stories.  You're more interesting—\" The cat${girlboy} hesitates, quickly adding, \"—to them nobles, I mean.  The…er, country is…I don't know, okay?!\"  You smile at your companion's frustrations.  $!{shehe} can pick a lock or infiltrate a mansion with the greatest of ease, but when it comes to giving or receiving compliments…\n\n    Acting like a servant won't be easy; there are customs and gestures ${shehe}'ll have to master—\n    *goto c9ConsultChoice\n*label c9ConsultChoice\n\n\"I know 'em.  I mean, don't worry about me, rookie.  You'll be the one rubbing shoulders with robber barons.\"  Patch seems almost confident; you only wish you were, as well. \"That blue woman expects to see ya squirm like a backwards worm.  Don't.  I can't say what pile you've stepped into this time, but it stinks.\"  You nod at the wise piece of advice.  The sun has started to set dreadfully fast for your liking, and before you know it, the time to set off is upon you.\n\nYou spend the majority of the journey to the McDohl estate getting an earful from Kerlton.  He's trying to get you to memorize the names of people you don't care to know and events that you don't care happened.  Affairs both of the personal and business kind, what subjects to avoid, how to be prideful and humble at the same time—being a lordling isn't all it's cut out to be!  Even this fit of nerves can't hold back your stomach's anticipation, however, and you'll have plenty of roasted pig glazed in caraway and nutmeg to reward yourself with later.\n\nAt the back of your mind, something is bugging you.  Why serve a dinner party when you've just heard that your son has been kidnapped?  That's ill-tasting even for noble folk.  But before you can speculate further, you find yourself at the estate's greeting room and facing a ridiculous-looking man.  Hair in a ponytail, except it stems from the top.  His goatee—painted purple—points down at a sharpened edge.  The man could puncture his own throat if he looked down quickly enough!  You're just glad you aren't the only one looking silly tonight.\n\n\"Aha?!  What have we here?  Did no one inform me we would be receiving such a ${MC_handsomebeautiful} ${MC_lordlady} this night?  I am humbly called Servao JoNaris, at your service.\"  The fashionable man bows deeply, or at least as deep as his plentiful gut allows.  Now is the time to decide: who are you going to be at this dinner party?\n\n*temp be_fancy true\n\n*choice\n  #Play the game.  Be extravagant and illustrious.\n    Your ${MC_bowcurtsey} rivals his own, and you waste no time introducing yourself.\n    \n    *if (suave >= 50)\n      *set renown +1\n      [i][Check versus Suave: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      *goto c9A1\n    *else\n      [i][Check versus Suave: fail][/i]\n      *line_break\n      *line_break\n      \"You do me a good hon—no, a great honor…\"  You start out strong but end up mumbling.  You look the part, even smell the part—but this isn't who you are.  You'll have to be yourself if you want to have any chance of making it through this dinner.\n\n      *goto c9B1\n  #Stern and all about business.  You have a job to do.\n    You curtly bow to the man, wasting no time with your reply.\n\n    *if (suave \u003c= 50)\n      *set renown +1\n      [i][Check versus Direct: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      *goto c9B1\n    *else\n      [i][Check versus Direct: fail][/i]\n      *line_break\n      *line_break\n      \"You may address me as—\"  You stop yourself mid-sentence.  This guy, with his painted facial hair and over-the-top gestures, it's enough to break you out into a laugh.  You can't play this with a straight face.  If you're going to make it through the night with these clowns, you're going to have to become one yourself.\n\n      *goto c9A1\n\n*label c9A1\n*set be_fancy true\n\"You do me a great honor, Lord JoNaris.  I am $!{MC_sirlady} ${name}.  I fear I have need of your service, good sir, as I find myself a foreigner to both this city and our fellow invitees.\"  You speak in a voice that sounds like it's accustomed to giving commands.  You also employ a tactic you recall the old blacksmith Gundrik teaching you when it came to dealing with customers.  It went something like, [i]\"Ye got tah get 'em on ye side by gettin' em doing yeself a favor first.  Folks only do favors fer people they like, so they've got no choice but tah like ya, ${MC_boygirl}!\"[/i]\n\nThanks, old friend.  The dwarf's words aren't false; Servao's eyes light up at the opportunity to show you around and greet the other guests.\n*goto c9AfterAB\n\n*label c9B1\n*set be_fancy false\n\"You may address me as $!{MC_sirlady} ${name}.  I apologize if I am curt, Lord JoNaris, but I come here under ill circumstances.  The General has employed my service, and I find it necessary to…familiarize myself with all the dinner guests in attendance.\"  You pause for a moment, gauging Servao's reaction.  It's one of uncertainty, though not because he doubts your words.  Good, now to reel him in under your wing.\n\n\"You strike me as an upstanding gentleman—could I have your discretion regarding our fellow invitees?\"  Your voice speaks like it's accustomed to giving orders.  You've said enough to make him think you a sort of fearsome inquisitor, but most importantly, you're a fearsome inquisitor who sees him as an ally.  Upon reaching this conclusion, Servao's eyes light up, anxious to show you around and greet the other guests.\n*goto c9AfterAB\n\n*label c9AfterAB\n\nAs the pudgy lordling with a purple beard gives you a tour of the place, you feel the need to address his repeated leering at your cat-servant.  Patch is trying hard to appear docile, but you don't want your perverted tour guide making things any more difficult.  He profusely apologizes.\n\n\"Hundred apologies, ${MC_goodsirmylady}.  It is only that it is a rare spectacle to see catfolk servants in Delmacia—to have one as beautiful and as well-trained as yours is a certain sign of wealth!\"  Patch smiles the fakest smile you've ever seen, but somehow Servao is buying it.  You feel the need to apologize to your companion…the guests here see ${herhim} as no more than an object, an exquisite piece of furniture.\n\n*if (gender = \"male\")\n  As far as your idle conversation, it typically revolves around you explaining your hair and accent to ladies old enough to be your grandmother.  This makes it all the more disturbing when they obsessively flirt with you, each one asking in her own discreet way if you are a taken man.  Trying not to throw up, you apologize and say that arrangements have already been made.\n  *goto c9Gender1\n*else\n  As far as your idle conversation, it typically revolves around you explaining your hair and accent to men old enough to be your grandfather.  This makes it all the more disturbing when they obsessively flirt with you, each one asking in his own discreet way if you are a taken woman.  Trying not to throw up, you apologize and say that arrangements have already been made.\n  *goto c9Gender1\n*label c9Gender1\n\nA metallic sound rings against a wine glass and catches the audience's attention.  Atop the stairs in the main hall stands none other than Aphid Almondvale in an exquisite black gown.  The slit through the middle runs down to just below her navel, her features moving in a rapturous sequence with every step she takes.  A sharp elbow lands against your shoulder.  There's little doubt who that elbow belongs to.  You only hope Patch's claws will stay retracted when she approaches.\n\n*page_break\n\n\"Good evening, ladies and gentlemen.  We have several new and lovely faces in attendance, as you've no doubt already seen.  Allow me to introduce a few more.  I implore you all to join me in welcoming the 54th Central Squadron of His Majesty's Royal Knights!\"  It's odd seeing a group of soldiers emerge from the balcony and wave like heroes, but you applaud them all the same.  A small group of seven cloaked in the Delmacian blue and bronze, their armor glistens like silverware and doesn't look a thing like what they usually wear.\n\nAphid continues, motioning for the clapping to end. \"These heroes were the first to arrive at that horrific scene at the city chapel, and through their excellent training vanquished the demon of the Cossack Order!  Hurrah!\"  Eruptions of hoots and hollers and celebratory cheers shoot from everywhere.  But not from you.  What is going on here?\n\n*if (logical >= 50)\n  [i][Check versus Logical: pass][/i]\n  *line_break\n  *line_break\n  This is obviously a lie, though you do recall encountering a group of knights upon fleeing the scene.  It makes sense, though; this is an opportunity to ease the public's fears about a runaway devil while glorifying the military at the same time!  A good ploy by the Crown, though it doesn't matter to you.  Oh Fates, wait…\n  *goto c9Logical1\n*else\n  [i][Check versus Logical: fail][/i]\n  *line_break\n  *line_break\n  These nobles can shove it if they think you're going to cheer on a group of draftees who didn't actually do anything.  These guys aren't heroes, so why give them a hero's welcome?  Is everything and everyone in this city fake?  You do recall encountering a group of knights when you fled the scene back then, but the…oh, by the Fates…\n  *goto c9Logical1\n*label c9Logical1\n\nEven from across the hall, you recognize that redhead.  Even decked out in plate and emblems and signets and whatever else is shiny—you know it's ${Brigid}.  Your hands start to shake.  You were prepared for many things tonight, but a reunion with your childhood friend wasn't one of them.  The soldiers march down the stairs in loud plated thumps, each one feeling like a hammer to your gut.  There are so many feelings swirling inside you right now.  Last time ${Brigid} saw you, an elf was straddling you while you ran about like a ${MC_manwoman} possessed.\n\nThe group of nobility swarms the heroes for handshakes and pandering, each one plotting ways to make themselves appear more appreciative than the other.  If you want to leave, now would be the time.\n\n*choice\n  #Time to go.\n    You don't like this situation.  Not a single person here even mentioned the kidnapping that your job is supposedly about.  Even if the General wants to keep it a secret, why trust you of all people?  You tell Patch it's time to make for the exit, but before you can make a move, a slender blue hand appears over your shoulder.\n    *goto c9GoStayChoice\n  #Stick around longer.\n    *set brigidRelationshipPoints +1\n    [i]Your relationship with ${Brigid} grows[/i]\n    *line_break\n    *line_break\n    You don't understand this situation at all.  Not a single person here even mentioned the kidnapping that your job is supposedly about.  Even if the General wants to keep it a secret, why trust you of all people?  But that doesn't matter at the moment.  ${Brigid} is right there, and you want to see ${herhim} badly.  You want ${herhim} to know that you haven't gone crazy, that you're still the ${name} ${shehe} played pranks with.  You want…not to be face-to-face with Aphid Almondvale.\n    *goto c9GoStayChoice\n*label c9GoStayChoice\n\nThe faerie's voice is sweeter than ever.  \"I nearly didn't recognize you, sweetie.  You're even more enchanting than when we first met, though I didn't think it possible.\"  The flattery is practiced and would even have been effective had it not been so absurd.  When you met with her earlier today, you were half drunk and a week away from your last bath.  Not what you'd consider enchanting.\n\nWhen you ask about the matter of the kidnapping, you find a long finger pressed up against your lips. \"Shhh.  Just enjoy yourself for now.  Business will wait until after the meals are served.  There are some real power players here, ${name}.  A good impression or two might mean big things for you and Redwater.\"\n\n*if (resourceful >= 50)\n  [i][Check versus Resourceful: pass][/i]\n  *line_break\n  *line_break\n  The thought has passed your mind.  A contract with any of these prospective clients would secure a sizable sum.  If you manage to form the right connections, it might even be the Company's ticket to leaving those offices in that glorified ghetto.  However…while the work you've been up to thus far has hardly been honest, you'd hate to think of what a character like Servao JoNaris would have you doing.\n  *goto c9Resourceful1\n*else\n  [i][Check versus Resourceful: fail][/i]\n  *line_break\n  *line_break\n  Right…the idea of taking jobs from a character like Servao JoNaris doesn't do much for your appetite.\n  *goto c9Resourceful1\n*label c9Resourceful1\n\nAphid politely excuses herself, sauntering over to pester the other guests.  While the General's wife is supposedly the head of the household in her husband's absence, you haven't seen hide nor hair of her all night.  If her son was kidnapped, you could certainly understand her reluctance to wine and dine…but why have the party at all, in that case?  Things are only going to get less sensical, you conclude, as Patch grabs at your sleeve.\n\n\"Don't look now, [i]master[/i]—\" ${shehe} says the word spitefully, \"—but there's a knight making a beeline straight towards you.  I don't like the look in ${herhis} eyes.\"  Your servant whispers a warning, but it's too late to escape even if you wanted to.  You turn to face ${Brigid}, and it confirms everything.  That's ${herhim} all right, down to each and every freckle.  $!{shehe} has fleshed out a bit, which is reassuring; both of you had looked like skeletons after months on the road.  \n\n\"${Brigid}—\"\n*line_break\n\"${name}—\"\n\nA warm metal vise takes hold of you, the plate armor of the knight poking the sensitive areas of your torso in its embrace.  It is a hug that brings you in close, close enough to smell ${herhis} scent—the scent of home.  You want to stay like that for moments more, minutes more, but you find yourself the first to break away.\n\nYour old friend speaks in a heated whisper, trying to hold back from making a scene.  The words come out so fast, you almost can't keep up. \"${name}, I can't believe…I'm so glad ye're all right!  How my family treated you, it wasn't right.  Ye—what's this getup?  I hardly recognized you, but ye look class—Fates, am I makin' ye look worse by speaking so informal?  I'm sorry, I just…\"\n\nThe only time you've seen ${Brigid} try to speak so many words in such little time is after ${shehe}'s had a few too many dwarven ales.  You're genuinely happy that ${shehe}'s doing well, and perhaps more selfishly…you're glad ${shehe} still cares so much for you.  But before you're able to express that in words, your ${maidbutler} interrupts you.\n\n\"My humblest apologies, Master, but it seems as if the guests are about to be seated.  Fates bless you, $!{ladysir} Knight, your efforts are so very appreciated.  Farewell.\"  That isn't Patch.  Well, the sounds do technically emit from ${herhis} mouth, but there is no hint of 'street' accents or vulgarity.  $!{shehe} sounds downright proper, though you're fairly certain it's less proper for a ${maidbutler} to forcibly escort ${herhis} master, arm in arm.  Just what is this about?\n\n\"Focus, ${name}.  Talk to your flamin' knight in shinin' armor later.  We've got a job, remember?\"  The squeeze on your arm indicates emphasis, but even still…how do you feel?\n\n*choice\n  #Focus on the task at hand.\n    *set patchRelationshipPoints +1\n    [i]Your relationship with Patch grows[/i]\n    *line_break\n    *line_break\n    You unlock yourself from your cat-${maidbutler}'s arms.  $!{shehe} has a point you can't ignore.  You want nothing more than to spend the whole night chatting with your old friend, asking how life is and reminiscing about times long gone.  It's been…too long since you've had that opportunity. \"So that's ${Brigid}, the childhood friend from that story of yours…fracken Fates.  How am I supposed ta…of course ${shehe}'s a knight too.  Swear by…\"\n\n    You aren't quite sure what Patch is going on about, though ${shehe} wasn't lying, as the guests are starting to sit in their assigned seats.  Phase one of the plan has just been completed.\n    *goto c9FeelChoice\n  #${Brigid} is more important.\n    *set brigidRelationshipPoints +1\n    [i]Your relationship with ${Brigid} grows[/i]\n    *line_break\n    *line_break\n    You unlock yourself from your cat-${maidbutler}'s arms.\n\n    *if (logical \u003c= 50)\n      [i][Check versus Emotional: pass][/i]\n      *line_break\n      *line_break\n      And find your hand grabbing ahold of ${herhis} collar.  You don't have hostile intent, you just want ${herhis} attention—and you certainly get it.  You don't care two copper pence about this job compared to your friend's well-being.  Fates, ${Brigid} is the only friend you have left.  Your home and all your memories are burnt to ashes!  $!{shehe} is all you have left to remember those days…do you understand, Patch?  Could you?!\n      \n      You release your hold on the collar.  This is when you expected ${herhim} to go into one of ${herhis} typical outbursts, but instead ${shehe} does the very opposite. \"Y-you're right on this one, rookie.  I was just…childhood friend and a fracken knight to boot.  How am I supposed ta…\"\n      *goto c9BrigidIsMoreImportant\n    *else\n      [i][Check versus Logical: pass][/i]\n      *line_break\n      *line_break\n      You put it in very logical terms for your co-worker.  You don't care two copper pence about this job compared to your friend's well-being.  Fates know it, ${Brigid} is the only friend you have left.  Your home and all the memories with it are burnt to ashes.  $!{shehe} is all you have left to remember those days…do you understand, Patch?\n      \n      Your tone comes across as cold and harsh, which leads you to expect another one of the cat${girlboy}'s outbursts in response.  What you get instead, however, is the very opposite. \"Y-you're right on this one, rookie.  I wasn't thinkin' straight.  Fates a joke, had ta be a childhood friend and a frackin knight to boot.  How am I supposed ta…\"\n      *goto c9BrigidIsMoreImportant\n    *label c9BrigidIsMoreImportant\n\n    You aren't quite sure what Patch is going on about.  Though ${shehe} wasn't lying before, as the guests are starting to sit in their assigned seats.  You want nothing more than to find ${Brigid} and tell ${herhim} everything, but that will have to wait until after supper, it seems.  Phase one of the plan has just been completed.\n    *goto c9FeelChoice\n*label c9FeelChoice\n\nAnd as for phase two? \"Wondrous, musical accompaniment as we enjoy this bountiful feast!  Minstrel, do you know [i]'The Charming Lass of Hightown'[/i]?\"  Servao's exclamation signals that phase two of the plan is well underway.  A greying gnomish bard dances about gingerly, playing the lute as if he'd been born to it.  He begins to sing the cheerful, silly song as if he were the jolliest man in the city.  It's impressive.\n\nEspecially for an old gnome who spends most of his time smoking on his rocking chair.  That's right, it's Kerlton putting on the show.  You give your confused servant a reassuring glance—all is going according to plan.  Patch spits a nasty look in return, hating to be kept out of the loop like this.  $!{shehe} isn't the only one.\n\n\"Never thought we'd get ta see Kerly sing again,\" your cat-${maidbutler} whispers, exhaling.  $!{shehe}'s playing it off as if ${shehe} doesn't much care for the performance, but you know better.  That cat eye hardly leaves the gnome during the entirety of Kerlton's jig.  Patch is proud of the old gnome, even if ${shehe}'d never admit it.  And you are, too—how could someone smoke that much and still have a pair of lungs like that?\n\nYou can't lose yourself in the moment, not now.  Aphid looks at Kerlton with uncertainty that even a cool blue face can't hide.  She hadn't scheduled musical entertainment.  That won't be the only thing that isn't going to go according to script tonight.\n\nThe lady of the house, the Stormwarden's wife, sits at the head of the table.  She's such a dainty little thing, and it's painfully obvious that she doesn't wish to be there.  In contrast, to her right sits Almondvale, who has since perked up and is proving to be quite the capable hostess.  You can hear the high-pitched laughter and giggling even from here.  The guests seated back here often strain their ears to hear what she's talking about—the woman has a powerful presence at this table.\n\nPhase three of the plan is the unknown.  It's what worried you the most on your way to the estate.  Even Kerlton—the mastermind behind this scheme—wasn't sure what would happen, which is why he decided to attend in the guise of a bard in the first place.  In that miniature rucksack on his back isn't a flute and juggling balls but a crossbow Genock pocketed during your last adventure.  You hope it won't have to come to that.\n\nThe first course arrives, your stomach growling as if it has never had a meal before.  But to be fair, it's never had a meal like this: pastries filled with cod liver, beef marrow fritters, eels in a spicy puree, loach in chilled sauce with sage!  You only know a fraction of the dishes by sight, with the chef's explanation filling in the rest.  You promptly begin to dig in.  But what first?\n\n*if (resourceful \u003c= 50)\n  [i][Check versus Faithful: pass][/i]\n  *line_break\n  *line_break\n  You should pass on the eel.  It's probably in season and likely delicious, but if you recall correctly, the Church is observing Saint Harsiger this week.  He was a brilliant, selfless monk who was sentenced to death on a bed of snakes.  The eating of snakes is expressly forbidden, and eels are snake-like enough for most.\n  *goto c9Religious1\n*else\n  *goto c9Religious1\n*label c9Religious1\n\n*choice\n  #The cod liver.\n    You've often heard of the health benefits of cod liver oil, preventing rickets in children and helping the hearts of old or obese people.  Or both, you speculate as you glance over the rest of the dinner guests.  There's little doubt that this is an older crowd for the most part, though a few of the younger wives look little more than teenagers.  Anyway, it tastes great.  Genock had told you once before that the eyes are the tastiest part of the fish, but…you think you'll be fine settling for just the liver.\n    \n    *if (resourceful \u003c= 50)\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      When the dish of eels in puree arrives, you politely refuse it, citing that you're observing Saint Harsiger's holiday.  Little did you realize that your gesture would spark such a chain of events; suddenly, every nobleman and woman around you won't be caught dead with an eel in their mouth.  Those that do offer their dubiously sincere apologies and nearly spit the fish back up.  You are applauded for your piety, even getting a look from across the hall from Aphid.  Though it's far from friendly.\n      *goto c9FoodChoice\n    *else\n      *goto c9FoodChoice\n  #The eel.\n    You've had a fair amount of cod before, so why not try something more exotic?  This is likely the only time you'll ever get to eat eel, so why not dig in?  After some hesitation—for childish fear of getting shocked—you start eating.  It's chewy but slender, and tastes almost exactly as chicken does.  Which is fine, of course, but you can't help but feel a bit let down.  Your famished stomach is in no position to be picky, however.\n    *goto c9FoodChoice\n*label c9FoodChoice\n\nIt is only after you've engorged yourself on the first course that you notice your servant starting to fidget.  Patch has been standing behind you in complete silence, as proper servants do.  But ${shehe} has to be starving…you feel guilty gobbling down dish after dish with those sad, hungry eyes on your back.  $!{shehe}'d have ${herhis} revenge later, no doubt forcing you to pay for ${herhis} pub fare after this is all over.  That's if everything goes according to plan, anyway.\n\n\"Excuse me, $!{MC_lordlady} ${name}.  The Lady Almondvale requests your presence at the head table.\"  The head butler of the estate—you can tell because he doesn't wear gloves, according to Kerlton—gives you an invitation you have no intention of turning down.  It is the third phase of this operation.\n\nYou take your time strolling up the table, pretending to take interest in passing conversations and the like.  It's more for Kerlton's sake; he finally notices your movement and gives you a curt nod while in the middle of another jig.  Hopping around as he does in his gnomish style, his legs will no doubt be sore for days after this ordeal.  You steel your courage and fake a smile, earnest puzzlement displayed on your face.\n\n\"To what do I owe this honor, my ladies McDohl and Almondvale?\"  You make a point of including the lady of the house in this conversation, though she seems in a haze.  The smile she gives you is a sad one, with poorly hidden pain behind it.  It is a smile of someone in mourning…not someone who's supposed to be hosting a feast.  After that awkward exchange, the fae woman proceeds:\n\n\"Dearest ${name}, please take a seat.  It seems as if Lord Elmin had pressing matters to attend to, and I do detest chatting with empty seats!  Haha…\"  She puts her hand against her mouth as she laughs—that alone explains a very good deal about who Aphid is.  You and she are worlds apart, but here you are sitting across from her at the head of the grandest table outside the Castle.\n\nTime to prove that you're worthy of the honor.\n\n*choice\n  #Speak with Lady Almondvale.\n    As broth with bacon is carried out, you decide to initiate a conversation with the de facto hostess.\n\n    *if (be_fancy = true)\n      *if (gender = \"male\")\n        You do as you have all night thus far: put on false airs and give praise where it likely isn't due.  A country bumpkin could go toe to toe with dignitaries on their own terms, and win.  \"It heartens me to be on a first-name basis with such a lovely lady.  I've found the staff of this estate to be top notch; never have I felt more welcomed in another's home.  Ah, but my memory escapes me…what is your occupation here, Aphid?\"\n        *goto c9SpeakWithLadyAlmondvale\n      *else\n        You do as you have all night thus far: put on false airs and give praise where it likely isn't due.  A country bumpkin could go toe to toe with dignitaries on their own terms, and win.  \"It heartens me to be on a first-name basis with such a lovely lady.  My hope is that one day, as I grow [b]older[/b] and wiser, I will turn out just as you have!  Wouldn't that be wondrous?\"  You give a wide smile after the insult about her age.  But you aren't here just to make snide remarks. \"I've found the staff of this estate to be top notch; never have I felt more welcomed in another's home.  Ah, but my memory escapes me…what is your occupation here, Aphid?\"\n        *goto c9SpeakWithLadyAlmondvale\n    *else\n      You do as you have all night thus far: cut through the bullcrap and falsities to get to the heart of the matter.  What of the kidnapped son you are supposed to be negotiating for?  But just before you blurt that out, you hesitate.  Lady McDohl looks to be on the edge of tears, and a direct question might set her off.  This might have been Aphid's ploy all along…well, you have no intention of falling face-first into her schemes.\n      \n      \"I've found myself very welcomed at this estate.  The servants do an exceptionally good job.  I wonder what your occupation is precisely, Lady Almondvale.  I regret not asking earlier.\"\n      *goto c9SpeakWithLadyAlmondvale\n    *label c9SpeakWithLadyAlmondvale\n\n    The quarter-faerie hesitates before explaining. \"Oh, a little of this and a little of that.  I am General McDohl's secretary, attending to his meetings, financials, and his…other needs.\"  Other needs, indeed.  You aren't sure what the proper female equivalent is, but it takes serious balls to insinuate an affair right next to the man's wife like that.  Luckily, the woman in question isn't paying much attention to the conversation at hand.\n    *goto c9SpeakWithChoice\n  #Speak with Lady McDohl.\n    Aphid is an obstacle at best—you're more interested in what the General's wife is going through.  As broth with bacon is carried out, you decide to initiate a conversation with the hostess.  Something to raise her spirits, if possible.\n\n    *if (be_fancy = true)\n      You continue your overexaggerated routine as you have all night, only this time with sincerity mixed in. \"My Lady McDohl, whatever small comfort it may be, I and the Redwater Salvage Consultants are at your service.  If I hear it true, the war in the West is winding down.  I think I speak for all of us in saying that I look forward to your husband's swift and safe return.\"\n      *goto c9SpeakWithLadyMcDohl\n    *else\n      You've been no-nonsense throughout the night thus far and have little intention of changing now.  You're here representing your company, after all. \"Lady McDohl, I would like to reassure you that the Redwater Salvage Consultants are at your service.  We will settle matters and return peace of mind to both you and your husband.\"  After stating that, you find yourself coming across too cold.  So you add, \"As I hear, the war in the West is winding down.  It is a small blessing, but may your husband return safely and swiftly to you, my lady.\"\n      *goto c9SpeakWithLadyMcDohl\n    *label c9SpeakWithLadyMcDohl\n    \n    The matter of her son is too delicate to approach directly.  You can't risk her breaking down into tears, so her husband's return from the war front is the safer topic. \"Thank you…I am anxious for his return as well.  There is much I wish to speak to him about—\"  It's a soft voice spoken in just above a whisper.  Easily interrupted by a far more boisterous and lively exclamation.\n\n    \"I pray each and every night for my lord's safe return.  If only the Fates saw fit to bring him to me—all of us faster, but alas…I shall have to be patient, won't I?\"  Aphid sighs deeply, making it far too easy to insinuate a relationship between her and the General.  Luckily, his wife isn't paying much attention to the conversation.\n    *goto c9SpeakWithChoice\n*label c9SpeakWithChoice\n\nThe awkward exchange is interrupted by the last dish in the second course, something the chef calls 'blang mang.'  It sounds unappetizing, but you have a personal goal of trying out as many dishes as you can.  You're trying to train your palate, or at least that's the excuse your stomach offers.  Thankfully, it's just chicken with a weird taste you just can't place.\n\nAphid happily provides the answer. \"It's been boiled in almond milk.  Is it not a common dish where you're from, ${name}?\"  \n\n\"No.  No, my lady, we didn't have 'blang mang' back home.  We had porridge and beans, some rye bread from the baker's, and whatever Father had caught the day before.\"  You'd rather be eating a mouthful of dried turnips if it meant just one more supper with your family.  There's so much you wanted to say…\n\n*page_break\n\n[i]*ah-CHU!*[/i]\n\nThe blue woman sneezes again, directing it right at you.  Doesn't even bother to cover her mouth, very unladylike.  You hang your head like that of a puppet whose strings have yet to be pulled.  Phase four has just begun.  Aphid sends your cat-servant on a meaningless errand.  You can feel Patch's hesitation as ${shehe} takes ${herhis} time leaving, but ${shehe} eventually does as ${shehe}'s told.  The faerie casually strolls around the table, resting her head on your right shoulder.\n\nSweet whispers. \"Listen to my commands, ${name}.  Exclaim a toast to Lady McDohl, complimenting her feast.  Bless her in her health and well-being.  Give her this goblet to drink from, then laugh rancorously as she rolls about on the ground in agony.  Do you understand?\"\n\nSo that's it.  Poisoned at the dinner table by a maniac, a false ${MC_lordlady} with no ties or influence.  It's certainly an easy way to get the wife out of the picture, especially when you have a magical aptitude for mind-control spells.  Time to play along.\n\n*if (suave \u003c= 50)\n  \"Your command is my will.  I will do as you have told.\"\n  *goto c9Direct1\n*else\n  \"I am yours to command.  I will do what you have ordered of me.\"\n  *goto c9Direct1\n*label c9Direct1\n\nThat lemon-and-ginger bath really did the trick.  You nearly boiled yourself in the pleasant-smelling brew and nearly ripped your skin off with how hard you scrubbed.  Kerlton had been right all along…you'll owe him more than a few halfling ciders after this is over.  You have to trust that Binyo and Genock have completed their objectives by now.  And you do.  \n\nThey are Redwater Salvage Consultants, after all.\n\n*finish Next Chapter\n", "choicescript_description": "Combat, romance, adventure, and of course—magic! Master four elements and take on fate itself in this epic, interactive fantasy tale! Six possible endings.  Four hours for a single play-through.  Three love interests.  Countless choices.  Male or female? Leader or Loner?  Good or evil? What kind of mage will you be?\n\n[i]Fatehaven[/i] is a 111,000-word interactive novel by Devon Connell. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "*stat_chart\n  text name Name\n  text renown Renown\n*if whichElement != \"\"\n  *stat_chart\n    text whichElementName Element\n*stat_chart\n  opposed_pair Loner\n    Leader\n  opposed_pair Sly\n    Powerful\n  opposed_pair Suave\n    Direct\n  opposed_pair Vigilant\n    Carefree\n  opposed_pair Logical\n    Emotional\n  opposed_pair Resourceful\n    Faithful\n  percent Corruption\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Fatehaven.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "prologue": "*comment Devon Connell 2014\n*comment Fatehaven Prologue\n\nYour heart is pounding as you sprint down the never-ending spiral stone steps.  A large dragon hellbent on your destruction is playing peek-a-boo through the arrow-slit windows.  Torrents of fire singe your neck and all but strip the oxygen out of your lungs.\n\nHow did it all get to this point? \n\nIn one hand, you hold a giant rucksack full of who knows what.  It had better be valuable for you to keep lugging it around in what might become your funeral pyre.  What do you have in your other hand?\n\n*choice\n  #A damsel in distress, of course!\n    *set attractedTo \"female\"\n    *set herhis \"her\"\n    *set shehe \"she\"\n    *set herhim \"her\"\n    *set hershis \"hers\"\n    *set Brigid \"Brigid\"\n    *set Silvana \"Silvana\"\n    *set Lillian \"Lillian\"\n    *set womanman \"woman\"\n    *set girlboy \"girl\"\n    *set girlguy \"girl\"\n    *set ladygentleman \"lady\"\n    *set princessprince \"princess\"\n    *set princessesprinces \"princesses\"\n    *set bridesmaidgroomsman \"bridesmaid\"\n    *set beautifulhandsome \"beautiful\"\n    *set cutehandsome \"cute\"\n    *set femalemale \"female\"\n    *set lasssap \"lass\"\n    *set erem \"er\"\n    *set gowntunic \"gown\"\n    *set gigglechuckle \"giggle\"\n    *set bitchbastard \"bitch\"\n    *set daughterson \"daughter\"\n    *set wifehusband \"wife\"\n    *set misssir \"miss\"\n    *set blondeblond \"blonde\"\n    *set herhisss \"her\"\n    *set temptresstempter \"temptress\"\n    *set fairhandsome \"fair\"\n    *set lassstud \"lass\"\n    *set slimbroad \"slim\"\n    *set supplemuscular \"supple\"\n    *set bustchest \"bust\"\n    *set succubusincubus \"succubus\"\n    *set missmister \"miss\"\n    *set herchesthiswaist \"her chest\"\n    *set lionesslion \"lioness\"\n    *set maidbutler \"maid\"\n    *set ladysir \"lady\"\n    *set femininemasculine \"feminine\"\n    *set unladylikeungentlemanly \"unladylike\"\n    *set charminghandsome \"charming\"\n    *set lassguy \"lass\"\n    *set softfirm \"soft\"\n    [i]You are attracted to females.[/i]\n\n    Why yes, this has all the classic hallmarks of a classic princess rescue.  You're a bit too busy to appreciate her no doubt fairest-in-the-land features at the moment.\n    *goto afterAttractionChoice\n  #A Prince Charming, of course!\n    *set attractedTo \"male\"\n    *set herhis \"his\"\n    *set shehe \"he\"\n    *set herhim \"him\"\n    *set hershis \"his\"\n    *set Brigid \"Bregan\"\n    *set Silvana \"Silvanus\"\n    *set Lillian \"Lowell\"\n    *set womanman \"man\"\n    *set girlboy \"boy\"\n    *set girlguy \"guy\"\n    *set ladygentleman \"gentleman\"\n    *set princessprince \"prince\"\n    *set princessesprinces \"princes\"\n    *set bridesmaidgroomsman \"groomsman\"\n    *set beautifulhandsome \"handsome\"\n    *set cutehandsome \"handsome\"\n    *set femalemale \"male\"\n    *set lasssap \"sap\"\n    *set erem \"em\"\n    *set gowntunic \"tunic\"\n    *set gigglechuckle \"chuckle\"\n    *set bitchbastard \"bastard\"\n    *set daughterson \"son\"\n    *set wifehusband \"husband\"\n    *set misssir \"sir\"\n    *set blondeblond \"blond\"\n    *set herhisss \"hisss\"\n    *set temptresstempter \"tempter\"\n    *set fairhandsome \"handsome\"\n    *set lassstud \"stud\"\n    *set slimbroad \"broad\"\n    *set supplemuscular \"muscular\"\n    *set bustchest \"chest\"\n    *set succubusincubus \"incubus\"\n    *set missmister \"mister\"\n    *set herchesthiswaist \"his waist\"\n    *set lionesslion \"lion\"\n    *set maidbutler \"butler\"\n    *set ladysir \"sir\"\n    *set femininemasculine \"masculine\"\n    *set unladylikeungentlemanly \"ungentlemanly\"\n    *set charminghandsome \"handsome\"\n    *set lassguy \"guy\"\n    *set softfirm \"firm\"\n    [i]You are attracted to males.[/i]\n\n    Get with the 14th century already! Cute guys need saving too.  He'll have to forgive you for forgetting his name at the moment.\n    *goto afterAttractionChoice\n*label afterAttractionChoice\n\n$!{shehe} must have spent too much time tucked away in this tower.  You're practically dragging ${herhim} with all your might so you both don't end up barbecued. \n\nYour vision starts to fade.  You pull behind a column and afford yourself precious seconds to check yourself.  The large breath you take turns out to be a mistake.  You feel like keeling over, your eyebrow furrows.  This aftershock is familiar.  It honestly felt like you just got…\n\n*choice \n  #Kicked in the balls.\n    *set gender \"male\"\n    *set MC_hisher \"his\"\n    *set MC_heshe \"he\"\n    *set MC_himher \"him\"\n    *set MC_sondaughter \"son\"\n    *set MC_boygirl \"boy\"\n    *set MC_manwoman \"man\"\n    *set MC_guygirl \"guy\"\n    *set MC_chestbreast \"chest\"\n    *set MC_sirrahmilady \"sirrah\"\n    *set MC_boylass \"boy\"\n    *set MC_brothersister \"brother\"\n    *set MC_handsomebeautiful \"handsome\"\n    *set MC_stifftingly \"stiff\"\n    *set MC_menwomen \"men\"\n    *set MC_tunicsdresses \"tunics\"\n    *set MC_tunicdress \"tunic\"\n    *set MC_gentlemanmaiden \"gentleman\"\n    *set MC_priestpriestess \"priest\"\n    *set MC_gentlemanlady \"gentleman\"\n    *set MC_handsomepretty \"handsome\"\n    *set MC_lordlady \"lord\"\n    *set MC_cologneperfume \"cologne\"\n    *set MC_muskyfruity \"musky\"\n    *set MC_bowcurtsey \"bow\"\n    *set MC_sirlady \"sir\"\n    *set MC_goodsirmylady \"good sir\"\n    *set MC_heroesheroines \"heroes\"\n    *set MC_chestbosom \"chest\"\n    *set MC_fellowlass \"fellow\"\n    *set MC_baronbaroness \"baron\"\n    *set MC_fellerlass \"feller\"\n    *set OP_daughterson \"daughter\"\n    *set MC_princeprincess \"prince\"\n    [i]You are a man.[/i]\n\n    Oomph, this narrator shudders in empathy for you.  Unfortunately, that does nothing to stop the numbing pain emanating from the family jewels.  You fall on your knees.\n    *goto afterGenderChoice\n  #Smacked in the breasts.\n    *set gender \"female\"\n    *set MC_hisher \"her\"\n    *set MC_heshe \"she\"\n    *set MC_himher \"her\"\n    *set MC_sondaughter \"daughter\"\n    *set MC_boygirl \"girl\"\n    *set MC_manwoman \"woman\"\n    *set MC_guygirl \"girl\"\n    *set MC_chestbreast \"breast\"\n    *set MC_sirrahmilady \"milady\"\n    *set MC_boylass \"lass\"\n    *set MC_brothersister \"sister\"\n    *set MC_handsomebeautiful \"beautiful\"\n    *set MC_stifftingly \"tingly\"\n    *set MC_menwomen \"women\"\n    *set MC_tunicsdresses \"dresses\"\n    *set MC_tunicdress \"dress\"\n    *set MC_gentlemanmaiden \"maiden\"\n    *set MC_priestpriestess \"priestess\"\n    *set MC_gentlemanlady \"lady\"\n    *set MC_handsomepretty \"pretty\"\n    *set MC_lordlady \"lady\"\n    *set MC_cologneperfume \"perfume\"\n    *set MC_muskyfruity \"fruity\"\n    *set MC_bowcurtsey \"curtsey\"\n    *set MC_sirlady \"lady\"\n    *set MC_goodsirmylady \"my lady\"\n    *set MC_heroesheroines \"heroines\"\n    *set MC_chestbosom \"bosom\"\n    *set MC_fellowlass \"lass\"\n    *set MC_baronbaroness \"baroness\"\n    *set MC_fellerlass \"lass\"\n    *set OP_daughterson \"son\"\n    *set MC_princeprincess \"princess\"\n    [i]You are a woman.[/i]\n\n    Why yes, I'll try to be modest here.  But your sensitive teats are stinging in pain that shoots through your entire nervous system.  You brace your arms over your chest instinctively.\n    *goto afterGenderChoice\n*label afterGenderChoice\n\n\"Hurry up! We don't have time for this!\"\n\n———\n\nWe'll get back to that part later.  First things first.\n*page_break\n\nNo good tale starts off without exposition!  I need to establish the setting of our young hero, that is to say, you.  Unfortunately, the village you grew up in is no longer in existence…and I wasn't able to find much in the public records, either.  What can you tell me about it?\n\n*choice\n  #A hamlet in the woodlands.\n    *set resourceful -10\n    *set whichTown \"hamlet\"\n    [i]Faithful has increased[/i]\n    *line_break\n    *line_break\n    Fresh air, weeks away from civilization (those hippie Druid circles don't count), and tons of wildlife to shoot arrows at.  Can't beat that, can you?  Granted, any news of importance only came from the occasional traveling merchant, lost on his way to somewhere important…but who cares who the king is, really?\n    *goto afterTownChoice\n  #A frontier town in the country.\n    *set resourceful +10\n    *set whichTown \"town\"\n    [i]Resourceful has increased[/i]\n    *line_break\n    *line_break\n    There's no place like the wild frontier; these types of towns really are like military outposts in unknown territory, except without all the…er, defenses.  But the ores in those veins weren't going to mine themselves, and the atmosphere of ambition is quite contagious.  Lots of investors equates to new taverns and shops and inns every month or so.  Change is good, right?\n    *goto afterTownChoice\n  #A village on the outskirts of a city.\n    *set suave +10\n    *set whichTown \"village\"\n    [i]Suave has increased[/i]\n    *line_break\n    *line_break\n    All right, so what if your village was a glorified pitstop for merchant caravans going in and out of the city?  You'd be surprised how low even the greediest of them will go to clear out their stock.  Not to mention you were only ever a day or two behind whatever news was happening in our fair kingdom.  It's like getting all the benefits of the c
