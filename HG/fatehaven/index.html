laces before ${Brigid} chases her off with ${herhis} sword.  That sword, you helped pay for that blade.  It's red now, that's good.  Your old friend gets to feel what it is to thirst for blood before ${shehe} dies.\n\nThe haze swells in the back of your head, acidic liquid building up inside your mouth.  As your eyes watch your friend get beaten up, your mind thinks back to a time three months ago.  It feels like a lifetime and a half has passed since that lazy afternoon in late summer.  We were talking about marriage, of all things!  What was it that you said again?\n\n*if (marriage = \"no\")\n  [i]Marriage is for some, but not me.[/i]  Yeah, that's right.  Typical ${name}.  But who can blame you?  Settling down is sort of like dying, right?  You notice yourself settling down on the ground right now.  Funny how that sort of…never mind.\n  *goto c4Marriage1\n*elseif (marriage = \"later\")\n  *if (gender = \"male\")\n    [i]I'd like to get married someday, but not anytime soon.[/i]  Marriage is an older ${MC_manwoman}'s game.  As long as you don't knock someone up, might as well enjoy the taste of freedom.  Freedom tastes like blood at the moment.  It's a shame you'll never be old, isn't it?\n    *goto c4Marriage1\n  *else\n    [i]I'd like to get married someday, but not anytime soon.[/i]  Marriage is an older ${MC_manwoman}'s game.  As long as you don't get knocked up, might as well enjoy the taste of freedom.  Freedom tastes like blood at the moment.  It's a shame you'll never be old, isn't it?\n    *goto c4Marriage1\n  *goto c4Marriage1\n*else\n  [i]Sure, if I found the right person for me.[/i]  You don't want to be alone.  Sure, you're bleeding to death on the paved dirt streets you've walked countless times, but hey, ${Brigid} is going to die with you soon enough, right?  In that aspect, you won't be alone.\n  *goto c4Marriage1\n*label c4Marriage1\n\nUsually, you can't stay in the focused state for this long, especially without some specific point of focus.  But unlike the time when you nearly took out half the forest, you feel rather quite fine.  Apart from all the cuts, I mean.  Oh wow, check out ${Brigid}.  Taking those punches and kicks.  What a trooper.  Why is ${shehe} trying so…\n\n[i]\"Ow-ow-ow-ow-ow!  That hurt, you know!  Jeez, what's your deal, ${name}?  First you skip out of ceremony rehearsal, and now you're beating up a ${cutehandsome} ${girlguy} who throws ${herhim}self at you!\"[/i]\n\nYou rise to your feet, slowly making your way forward.  Why is she beating up a ${cutehandsome} ${girlguy} who throws ${herhim}self at you?\n\n[i]\"Talk about weird, poor ${lasssap} though.  Gives off a strange vibe, and I'm not sure it's the good kind.  What's your call on '${erem}?\"[/i]\n\nYour right hand is covered all in red by this point.  You raise it up—well, you hold it up with the help of your left hand.  What is your call?\n\n[i]\"The opportunities to serve the justice of the Fates are countless, but I'm surprised you've taken an interest in them, ${name}.  I've dreamed of becoming a paladin, after proving my service to our King with the knights, of course.\"[/i]\n\nOf course.  It is a straightforward dream.  A matter-of-fact dream, spoken as if it were factual and already true.  But in a few seconds, that dream will no longer be possible.  That dream will be as dead as its owner.  You don't have dreams of your own, not yet anyway.  But with this right hand—your right hand, you could keep ${herhis} dream alive.  And that has to count for something.\n\n*if (whichElement = \"fire\")\n  [b]\"Hey, orc priestess.  This fire mage's flame isn't quite out yet.\"[/b]\n\n  *page_break\n\n  You light up like a torch; no, a bonfire.  You should be in the process of burning alive right now, but instead, you feel amazing.  Usually, when you cast magic your insides want to shrivel up and die from the chills, but not this time.  If you're being honest, though, your initial intention had been to set your opponent on fire…\n  \n  Even the calm and confident warrior monk can't hope to hide her shock at a sight like this.  \"H-how is this?!  How can a backwoods dirt farmer be…\"\n  \n  Dirt farmer?  Woman, I'm a blacksmith's apprentice.  Day in and day out at the forge on a hot summer's day, when you'd only stop sweating because there was nothing left in you…a smile from an old dwarf for a good day's work.  You can handle this heat and then some, but can she?  A powerful ray of blue flame shoots out from your palms, burning the ground it touches a charred black.\n\n  Disciple Idricsa has some fancy weapons, but they aren't nearly as hot as yours.  She adopts a battle stance, but fear can be read all across her face.  She might belong to a group of badass mage hunters, but just how many mages have they come across in the last century?  She's better off killing innocent dwarf kids instead!\n  \n  The legendary fire bird is called a phoenix.  You imagine the mythological creature diving upon its prey much like you do.  Wings of fire propel you forward faster than you could imagine, faster than your victim has time to react to.  You plunge your talons of fire into her chest, digging around in there as she screams in agony.  \n\n  *set corruption +10\n  [i]Your corruption grows[/i]\n  \n  When your talons dissipate, you catch yourself with your hand up against the orc's face.  A smelly gas fumes off of it; you figure it to be the smell flesh makes as it boils.  You also imagine that you could grow fond of it.  When your fingers feel nothing but hard bone, you toss the faceless corpse away.  It hits the ground in an ungraceful heap, too burnt for even the wolves to enjoy.\n  \n  Snow is falling.  You know that this fire will soon leave you, and soon all will return to this frigid and unrelenting reality.  Your family is dead…but you, like the phoenix, are reborn.  This fire is raging inside of you, this hatred and passion that burns so brightly is stronger than ever before.\n  *goto c4WhichElement1\n*elseif (whichElement = \"earth\")\n  [b]\"Hey, orc priestess.  This earth mage is done getting stepped on.\"[/b]\n\n  *page_break\n\n  At first, you think the stones around you are trying to swallow you whole.  But as they interlock and meld themselves around your body perfectly, you realize that isn't the case at all.  You can't see anything with your eyes anymore, but you don't need to.  Your ears can sense tremors with every snowflake that touches the ground.  It's weird, but these sounds make for their own sort of 'seeing.'\n  \n  Even the calm and confident warrior monk can't hope to hide her shock at a sight like this.  \"H-how is this?!  How can a backwoods dirt farmer be…\"\n  \n  Dirt farmer?  Woman, I'm a dark wizard's apprentice.  Night after night, working my mind to exhaustion just to get another migraine…and a smile from a pale, pretty face.  You can handle this weight that encases you and then some, but can she?  Your granite, oversized hand looks to weigh half a horse, but you move it with ease.\n  \n  Disciple Idricsa has some fancy weapons, but they aren't nearly as big as yours.  She adopts a battle stance, but fear can be read all across her face.  She might belong to a group of badass mage hunters, but just how many mages have they come across in the last century?  She's better off killing innocent dwarf kids instead! \n\n  The legendary rock creature is called a golem.  You imagine your charge being not unlike that of a golem's charge down a mountain.  The earth quakes with each step, your body moving with an incredible sort of momentum.  There's no chance for your victim to react.  There also isn't a chance she's going to be able to breathe again after your fist snaps every bone in her chest.\n  \n  *set corruption +10\n  [i]Your corruption grows[/i]\n\n  The orc screams in agony, or rather, she tries to.  The corpse flies several stories into the air, a huge depression in its chest where your awesome impact occurred.  You feel the body hit the ground—every inch of it—and know at that moment that she is dead.  There's a part of you that wishes she hadn't died with just one punch, a part of you that wants to pummel her face into the ground over and over again.\n  \n  Snow is falling.  You know that this earthly embrace will soon leave you, and taking its place will be this naked and unrelenting reality.  Your family is dead…but you, like the golem, are made of tougher stuff.  The earth itself resides within you, and it cannot be moved, and it will never be broken.\n  *goto c4WhichElement1\n*elseif (whichElement = \"water\")\n  [b]\"Hey, orc priestess.  This water mage still has something in reserve.\"[/b]\n\n  *page_break\n\n  At first, you think the snow that starts to pour down from the sky is going to bury you alive.  But as it condenses and melds itself around your body perfectly, you realize that isn't the case at all.  The clear ice that tightly wraps about your frame emits a cold gas, just as your glacier spike did.  It is a dry coldness that should have frozen you in a flash—instead, it makes you feel a strange sort of peace and comfort inside.\n  \n  Even the calm and confident warrior monk can't hope to hide her shock at a sight like this.  \"H-how is this?!  How can a backwoods dirt farmer be…\"\n  \n  Dirt farmer?  Woman, I'm a dark wizard's apprentice.  Night after night, working my mind to exhaustion just to get another migraine…and a smile from a pale, pretty face.  You can handle this coldness that freezes the very air around you, but can she?  On your hands, the ice has grown into razor-sharp points.  You can't help but crack a smile.\n  \n  Disciple Idricsa has some fancy weapons, but they aren't nearly as cool as yours.  She adopts a battle stance, but fear can be read all across her face.  She might belong to a group of badass mage hunters, but just how many mages have they come across in the last century?  She's better off killing innocent dwarf kids instead!\n  \n  The legendary snow woman is from the Western lands and called Yuki-Onna.  You imagine yourself slowly approaching your victim much like she would, the storm of snow and sleet and rain thundering down everywhere except in your path.  And then, a burst slides you across a sudden path of ice!  There's no time for your enemy to react, no time for anything except screams of agony as you drill your hand-spikes into her body.\n  \n  *set corruption +10\n  [i]Your corruption grows[/i]\n\n  This isn't enough, not yet.  Her fresh, hot blood gasses your hands, which you now focus upon.  The blood freezes solid, following a trail back into its source.  You watch the orc's body expand as all of her liquids freeze, ceasing only when the screams have ended.  You've never seen anyone freeze from the inside out before; what remains of the body, you doubt even the wolves would touch.\n  \n  The snow lets up, no longer the storm it was but moments ago.  You know that this cold embrace will soon leave you, to be replaced by a stifling and unrelenting reality.  Your family is dead…but you, like the Yuki-Onna, are made to wander this cold world still.  Water takes many forms; it can be shaped and reformed, but it can never be broken.\n  *goto c4WhichElement1\n*else\n  [b]\"Hey, orc priestess.  Don't you know it's rude to blow off an air mage like that?\"[/b]\n\n  *page_break\n\n  At first, you think the wind around you is going to send you up through a twister, but as the swirls bend and interlock around your body perfectly, you realize this isn't the case.  You are (in some fashion) wearing a tornado, and either you've grown several inches or you're hovering just over the ground.  You reach out to maintain your balance, but you don't need to.  The air itself keeps you stabilized, like a cushion tailored to your every movement.\n  \n  Even the calm and confident warrior monk can't hope to hide her shock at a sight like this.  \"H-how is this?!  How can a backwoods dirt farmer be…\"\n  \n  Dirt farmer?  Woman, I'm a dark wizard's apprentice.  Night after night, working my mind to exhaustion just to get another migraine…and a smile from a pale, pretty face.  You can handle this twister like a warm summer's breeze, but can she?  The winds your hands grasp feel like whips, just begging to lash out.\n  \n  Disciple Idricsa has some fancy weapons, but they don't quite cut through the air like yours do.  She adopts a battle stance, but fear can be read all across her face.  She might belong to a group of badass mage hunters, but just how many mages have they come across in the last century?  She's better off killing innocent dwarf kids instead!\n  \n  The legendary air being is called a sylph.  Granted, while a beautiful little fairy inspires fear in no one, you imagine its grace as you sweep down onto your prey.  You are on top of her in the blink of an eye.  You spin—no, it's more like a dance as your lashes of air flow around you.  Blood splatters through the gust as you carve out your own statue.  Over and over again, faster and faster, you dance.  The embrace of wind is warm—warmer still when it's drenched in blood.\n  \n  *set corruption +10\n  [i]Your corruption grows[/i]\n\n  The orc screams in agony, as would anyone who looks as if they just went through a cheese grater.  To your dismay, the weight of the redness slows your cyclone down.  Your whips shrink and then dissipate harmlessly up into the early morning sky.\n  \n  Snow is falling.  You know that the air's embrace will soon leave you, and taking its place will be the stagnant and unrelenting chains of reality.  Your family is dead…but you, like the sylph, will fly on as you please.  The wind cannot be tamed, and it can never be restrained.\n  *goto c4WhichElement1\n*label c4WhichElement1\n\n*page_break\n\n\"Your…your p-${princessprince} taught you…pretty well…huh?\"  A groan from your companion brings ${herhim} back to your attention.  While you were in some sort of cathartic magical trance, ${Brigid} had been busy getting the crap beaten out of ${herhim}.  $!{shehe}'s leaning against a house, a small pool of blood puddling underneath ${herhim}.  You start moving towards ${herhim}, but your legs don't seem to want to cooperate.  You stumble instead.\n\nPlacing your hand against your chest, the wetness leads you to conclude that you've suffered several stab wounds.  That explains where the lightheadedness is coming from.  You cough up blood, your throat burning in pain.  Are you really going to die after all that?  Seeing your sorry state, ${Brigid} rushes to your side.\n\nFear runs rampant in ${herhis} voice.  \"${name}!  You'll bleed out if we don't get help!  Hold on!\"\n\nYou hear cloth tearing; ${Brigid} is ripping apart ${herhis} best tunic into pieces in order to create bandages for you.  What a waste of a good outfit…\n\n\"I-idiot!  It's not a waste if it saves you life!\"  It's so typical of ${herhim} to yell at a dying ${MC_manwoman}.\n\nYou're at the point of tiredness where you can't tell your thoughts from your words.  It's sort of an intoxicating state.  ${Brigid} wraps the makeshift bandages around your chest tightly, with an even tighter look of total concentration on ${herhis} face.  You find yourself surprisingly at peace, resting in ${herhis} arms.  [i]\"This wouldn't be the worst way to die\"[/i]—a contented thought.  It's snowing, but heavy raindrops fall against your face.  They run down your cheek and into your mouth.\n\nTastes like salt water.\n\n*if (loner >= 50)\n  You pride yourself in being more independent than most, so being helpless in your old friend's arms while ${shehe}'s crying over you…well, it leaves a bad taste in your mouth.\n  *goto c4LonerFaithful1\n*elseif (resourceful \u003c= 50)\n  The people of this town…their hopes and dreams all rest upon you now.  Maybe that's an overly romantic thought, but that sappy line just sparked an idea.\n  *goto c4LonerFaithful1\n*else\n  How in the world is ${shehe} going to join the knights if ${shehe}'s crying all the time?  How are you going to go into the afterlife with a clear conscious now?  Guess there's still something…\n  *goto c4LonerFaithful1\n*label c4LonerFaithful1\n\n[b]\"My pocket…vial…healer's…\"[/b]\n\nHow that vial hasn't been crushed after all you've been through is nothing short of a miracle; how you only now just remembered it seems like some sort of bad plot device.  But whatever it is, you're already in the process of chugging the nasty stuff down.  ${Brigid} even holds your nose closed to help you out.  How thoughtful…now your last sensation will be one of getting waterboarded.\n\nTime passes as you rest your head on the redhead's lap.  $!{shehe} tries to stay on the lookout for bandits, but with those droopy eyes, ${shehe} isn't fooling anybody.  Fatigue is hitting you both, and hard.  It isn't safe to sleep here, though, and you need the one of you who can still walk to remain conscious.  How is ${herhis} hand?\n\n${Brigid} pops out of ${herhis} daze to inspect the hand in question.  \"My hand…hurts like hell.  But I'll manage.  ${name}, what that priest said about your father…y-you shouldn't believe him!  Don't give up, your family is safe—I know they are!\"\n\nNo, ${shehe} doesn't know that.  You do believe Kaine, as much as it pains you to.  And worse still, a part of you has already given up on the idea of your old man popping out and making everything better.  The world doesn't work that way; you doubt your story is going to have a happy ending.  There isn't going to be the sound of dogs barking, nor is there going to be ${Brigid}'s family yelling their lungs out for their little ${girlboy}.\n\n\"Arr-Wruff!  Wruff wruff!\"\n\nMaybe you don't have the world figured out, after all.\n\n*finish Next Chapter\n", "chapter5": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 5\n\n——————————————\n*line_break\n—————————— Chapter 5: Redwater Salvage Consultants\n*line_break\n——————————————\n\n\"W-well?!  You can't stop the story there!  What else happened, did ${Brigid} make it out okay?  Barkeep, go get the rookie another halfling cider—quick!\"  A young ${womanman} pleads for more of the fantastical tale from you, shaking you physically to add to your already shaken mental state.  Your greatest concern is trying not to fall off your stool; The Staggering Bard isn't known for its cleanliness.  Isn't known for anything, really…\n\n*gosub end_trial\n*if false\n  *label end_trial\n  *check_purchase adfree\n  *if choice_purchased_adfree or not(choice_purchase_supported)\n    *label purchased\n    *return\n  *page_break\n  *check_purchase adfree\n  *if choice_purchased_adfree or not(choice_purchase_supported)\n    *return\n  Remember earlier how we told you that the first four chapters are available for free? This is the end of the free content.\n\n  [b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n  *purchase adfree $4.99 purchased\n  *abort\n\nIt has been six months since the day your hometown was ransacked and pillaged.  Half a year on the road, unsure of when your next meal would be or even if you'd live to eat it.  And while you wandered about, Delmacia had changed.  It is a kingdom more drunk on holy righteous war than you are on fermented apple juice.  Apparently, the official word is that demons from the western Nanchou Empire have struck, prompting a full-scale and justified crusade against them.\n\nNeedless to say, the whole thing smells fouler than a beggar's feet after trailing behind horses for a day.  That is to say, it's full of shit.\n\n\"Here ya go!\"  Your drinking companion thrusts your beverage at you with the gleeful enthusiasm ${shehe} is known for.  Blonde hair tied up in some sort of bun with bangs framing ${herhis} face, apparently the latest fashion.  The feline ears popping out of the top of ${herhis} head, however…that's more than just the latest trend.  You've heard stories of catfolk who originated in the far east deserts, you just never imagined you'd be sipping cider with one.\n\nAs if the tail weren't enough, there's another detail that makes your partner so memorable.  It's not ${herhis} golden locks or cute button nose, but the eyepatch that covers ${herhis} left eye.  You have no clue as to what ${herhis} real name is, but a nickname suffices: Patch.\n\n\"Waitwaitwaitwait!  First you've got to tell me what that potion did!  You know, the one you took from the deathgrip of the exiled Druid!\"  It's obvious that Patch cares much more to hear the story than you do to tell it.  Granted, even after your fifth cup, you keep most of the important details out.  You know, the bits about the Church being behind the attack, your magical powers, being trained in your element under a dark wizard who (oh yeah) is the ${daughterson} of a lich.\n\nJust thinking of ${Silvana} requires another swig from your goblet.  The sweet and tart beverage goes down smoothly, much gentler than the dwarvish ales Gundrik tried to force upon you.  But you wouldn't mind being forced to drink all the dark stouts in the city if it meant bringing your old employer back from the dead.\n\nSeeing Patch's patience wane, you begrudgingly go into detail about what happened next.  It isn't all that interesting, really.  You and ${Brigid}'s family had disagreements about what to do next, and it became apparent that you had to leave them.  That's what you tell Patch, anyway.  The truth is that ${Brigid}'s folks intended to take you in as their own ${MC_sondaughter}, but one day in late winter they came to discover your…special abilities.  The fear in their eyes…well, you knew you had to go.\n\nYou smile to yourself as you recall the furious defense ${Brigid} gave on your behalf.  But you knew it was best for you to leave, best for ${herhim} and ${herhis} family that you parted ways.  Eventually, you made it to the city, where you most certainly would've ended up doing unsavory things were it not for the shield you had on your back.  Less savory than the work you're doing now, anyway.\n\n\"Ah!  I get it, that was a Brighthammer ancestral shield!  It's no wonder that grumpy old Binyo took to you like a battle brother!  And to make use of it in combat against his cousin's killer…\"  Patch is a romantic with a tendency towards the overdramatic, but you aren't sure if it isn't just an excuse to borderline flirt with you every chance ${shehe} gets.  This city and its diverse array of crazies are difficult enough for a country ${MC_boygirl} to take in, let alone a cat${girlboy} who goes out of ${herhis} way to tease you.\n\nThe aforementioned cat takes offense when you doubt the candor of ${herhis} curiousity.  \"Hey!  I'm being sincere, ${name}.  It's compelling!  I was gripping the edge of my seat all through those fights!  You should tell me another tale next time we're out on lookout duty, all right?\"\n\nYeah, it's just another tale.  Patch can't see it, but behind your eyes is a cynical survivor of a travesty the rest of the world doesn't even know about.  And even if they did, would they care?  Probably not.\n\n*page_break\n\n*if (whichWeapon = \"sword\")\n  You feel for the club attached to the side of your hip to make sure it's still there.  Would that it was the dwarvish longsword that had kept you safe when nothing else could.  You have each detail of the hilt engraved into your memory.\n  *goto c5WhichWeapon1\n*elseif (whichWeapon = \"dagger\")\n  You feel for the club attached to the side of your hip to make sure it's still there.  Would that it was the dwarvish dagger that had kept you safe when nothing else could.  Each detail of its hilt has been etched into your memory.\n  *goto c5WhichWeapon1\n*elseif (whichWeapon = \"axe\")\n  You feel for the club attached to the side of your hip to make sure it's still there.  Would that it was the dwarvish axe that had kept you safe when nothing else could.  Every detail, from its grip to its shaft to its killer edge, has been etched into your memory.\n  *goto c5WhichWeapon1\n*else\n  You feel for the club attached to the side of your hip to make sure it's still there.  Would that it was the dwarvish glaive that had kept you safe when nothing else could.  It's more than just a walking stick—every detail, from the inscriptions on the shaft to the killing spearpoint, has been etched into your memory.\n  *goto c5WhichWeapon1\n*label c5WhichWeapon1\n\nIt's the last weapon Gundrik ever made, and for that reason it holds great value for his cousin and your current employer, Binyo.  Steel and iron weapons have been outlawed for non-military personnel; even running around with a kitchen knife would get you heavily fined or even jailed.  It is a fair trade, though.\n\nIn exchange for your dwarvish steel, Binyo procured you a ticket to freedom.  Or at least, the papers that let you dodge the draft without having to be old or disfigured.  Dying for a kingdom that lies to its citizens, for a war that is in no way justifiable…no, you'd take the glorified stick poking at your hip over that any day.  Speaking of getting poked, Patch has a tiresome habit of doing just that.\n\n*if (whichRace = \"gnomes\")\n  \"That's our gnome target, right?  Well, messenger or whatever.\"\n  \n  You're already starting to shake your head before ${shehe} finishes ${herhis} sentence.  You grew up around gnomes, and that one there—while balding—is no more than thirty.  Your messenger is supposed to be twenty years older than that.  The size of the ears gives it away.\n  *goto c5WhichRace1\n*elseif (whichRace = \"orcs\")\n  \"That's our orc target, right?  Well, messenger or whatever.\"\n  \n  You're already starting to shake your head before ${shehe} finishes ${herhis} sentence.  You grew up around orcs, and that one there—while balding—is no more than thirty.  Your messenger is supposed to be twenty years older than that.  The skin shading gives it away.\n  *goto c5WhichRace1\n*elseif (whichRace = \"elves\")\n  \"That's our elf target, right?  Well, messenger or whatever.\"\n  \n  You're already starting to shake your head before ${shehe} finishes ${herhis} sentence.  You grew up around elves, and that one there—while balding—is no more than a hundred years old.  Your messenger is supposed to be twice that.  The pitch of the voice gives it away.\n  *goto c5WhichRace1\n*else\n  \"That's our dwarf target, right?  Well, messenger or whatever.\"\n  \n  You're already starting to shake your head before ${shehe} finishes ${herhis} sentence.  You grew up around dwarves, and that one there—while balding—is no more than thirty.  Your messenger is supposed to be twenty years older than that.  The beard gives it away.\n  *goto c5WhichRace1\n*label c5WhichRace1\n\n\"Hmph, rookie thinks ${MC_heshe}'s so smart…just remember, I'm the one in charge of this little operation.  I'll have you know that I've got a perfect success rate for repossessions in the East Hightown district, along with sev—\"  Patch's speech on humility is interrupted by the bartender.  You're just happy someone is able to shut ${herhim} up.\n\n\"Pardon me, ${misssir}.  A gentleman left this message for you.\"  Patch grabs it excitedly and proceeds to read it hurriedly.  There's only one problem, however.\n\n\"…I can't read.\"  You snatch the piece of parchment out of your (at the moment useless) coworker's hands and decipher the text.  It seems as if the client has in fact decided against repossessing her Nanchoan silk robes, adding that no further contact needs to be made.  We are to keep the ten percent down payment.  And that's it.\n\n\"What the heck?  When Kerlton spoke with her last week, he said she was a woman possessed!  She'd sell off her second husband if he wasn't dead already!  What gives?\"  The spunky cat${girlboy} pouts, and it looks as if this is yet another lost job.  You have only been with Redwater Salvage Consultants for a week and a half, but there hasn't been much for you to do.  There was that time you ran down that pickpocket and helped a guardsman vacate a half-giant from his apartment, but those don't really count.\n\nA jolt from your bottom runs up your spine.  Another one of Patch's bad habits…but you can't help but notice that only you are getting this special slap treatment from ${herhim}.  \"Now, how's are we gonna break you in, rookie?\"  As you stand up from your seat, you are again reminded of just how much you drank.\n\n*temp suspicion 0\n\n*if (vigilant >= 50)\n  You curse at yourself for letting yourself off guard like that.  The city is a dangerous place, even if most of the men and women with weapons are off in the West.  No, that just makes things even hairier.  You might not technically be working, but you shouldn't allow yourself to indulge like you just did.  Ironically, you're too busy scolding yourself for not being attentive to notice an elf staring over at you from across the tavern.\n  *goto c5Vigilant1\n*else\n  *set suspicion +1\n  You're feeling a warm, buzzing sensation inside, and suddenly the grim unknown city seems softer and brighter.  It's probably just the cider, but The Staggering Bard has its own style: it's homely but in a comely way.  You aren't sure, but you think you might have caught an elf staring at you from across the room.  As soon as your eyes meet, he turns away.  Awkward.\n  *goto c5Vigilant1\n*label c5Vigilant1\n\nAs the two of you make your way out of one of the capital's countless drinkeries, the question once again pops out of Patch's mouth.  It is an inquiry you've been purposefully trying to avoid.  \"So tell me!  The potion, what did it do?\"\n\n*page_break\n\n*if (suave \u003c= 50)\n  [i][Check versus Direct: pass][/i]\n  *line_break\n  *line_break\n  Five cups of halfling cider and a ${MC_manwoman} can say anything with a straight face.  The potion was to help with blood flow.  Blood flow towards a particular area in the body.  Yes, that's right, as you laid near dying after that gruesome confrontation, you were getting flustered for very different reasons.  You were raised right, so you can't go into detail.  Patch, on the other hand, was raised wrong.  Very wrong.\n  *goto c5Direct1\n*else\n  [i][Check versus Direct: fail][/i]\n  *line_break\n  *line_break\n  Redness streaks across your face, and it isn't just because you've had five cups of halfling cider, either.  You're usually suave and able to misdirect embarrassing details, but all that wittiness has left you.  The potion was to help with blood flow, all right, blood flow to a very particular area!  You were down on the ground, near dying after that gruesome confrontation, and you were getting flustered for all the wrong reasons.  You were raised right, so you don't want to go into detail.  Patch, on the other hand, was raised wrong.  Very wrong!\n  *goto c5Direct1\n*label c5Direct1\n\n\"HAHAHAHAHA!  Oh Fates, that's—\"  The ${blondeblond} has to bend over and grasp ahold of ${herhis} legs to keep ${herhim}self upright.  \"—that's the best part of the whole story!  Comedy gold!  Haha, on yer deathbed and ye feelin ${MC_stifftingly} down in yer trousers?  Bahaha!  Wait 'til the guys hear about this!\"\n\nGreat, that cat will tell half the city before ${shehe}'s done.  There goes whatever sort of reputation you might have been able to build, cut to pieces all because of a stupid stamina potion.  The two of you head into the maze of alleyways that will take you back to Redwater Headquarters, the offices doubling as a place to sleep.  Darkness has crept up over the city, though you've come to realize that it never gets too dark or cold here.  Too many people buzzing about, too many lanterns lighting businesses and walkways.\n\n*if (resourceful >= 50)\n  [i][Check versus Resourceful: pass][/i]\n  *line_break\n  *line_break\n  The back alleys are an exception to that, however.  Each is its own little world, packed with ins and outs you couldn't expect unless you knew what to look for.  It's quieter back here too, which means you can hear the footsteps of someone trailing you.  Like right now, for example.  You whisper to your companion to give ${herhim} an idea of the situation.\n  *goto c5Resourceful1\n*else\n  *if (suspicion > 0)\n    That elf back at the tavern has you a bit unnerved.  Maybe you're getting paranoid, but paranoia can save your life around these parts.  You pause for a moment.  Just as you feared, the footsteps coming from behind you are trying to keep at your pace…probably something to look into.  You whisper to your companion to give ${herhim} an idea of the situation.\n    *goto c5Resourceful1\n  *else\n    \"Pst.  ${name}.  Act cool, but I think we've got a tail.  And not the furry kind,\" Patch whispers in your ear, and fear rears its ugly head back into your psyche.  It is impossible to act relaxed after realizing you have a stalker a couple blocks behind you.\n    *goto c5Resourceful1\n*label c5Resourceful1\n\n\"So boss, whatcha think we should do?\" your blonde companion teases, all too happy to play the clueless subordinate.  In ${herhis} case, it isn't very hard.  But on a more serious note, this is a sort of test, to see if you really are Redwater Salvage material.  You don't want to mess this up—you just wish you weren't hammered.  When in doubt, remember to play to your strengths…\n\n*choice\n  #Instruct Patch to flank him.\n    *if (loner \u003c= 50)\n      *set patchRelationshipPoints +1\n      [i][Check versus Leader: pass][/i]\n      *line_break\n      [i]Your relationship with Patch grows[/i]\n      *line_break\n      *line_break\n      You instruct Patch on the path ${shehe} should take that would end up with ${herhim} several blocks between you and your pursuer.  Right before you reach the main street, you'll about-face and have him in a pinsir strike he'd have no chance of getting away from.\n      \n      \"Big ${MC_guygirl} getting all authoritative…just so we understand each other…\"  Patch wraps an arm around your shoulder to bring you in close.  $!{herhis} thin, pursed lips dip into the largest grin you've ever seen, sharpened canines showing.  \"I like getting ordered around.\"  And with that remark, ${shehe} proceeds to prance off into a side alley.  Trying to stay focused after something like that…why is everyone in this city a lunatic?\n      *goto c5InstructPatch\n    *else\n      You try to instruct Patch on the path ${shehe} ought to take, but between your lack of knowledge about the nearby area and ${herhis} complete lack of an attention span…the plan is really starting to fall to pieces.  \"Wonder if all country bumpkins jumble up their words, hehe.\"\n\n      *if (logical \u003c= 50)\n        *set patchRelationshipPoints +1\n        [i][Check versus Emotional: pass][/i]\n        *line_break\n        [i]Your relationship with Patch grows[/i]\n        *line_break\n        *line_break\n        Patch's remark is the last straw.  This is a serious situation, and you aren't about to put both your lives in jeopardy just so ${shehe} can make a snide remark.  Some folks have to be made to listen the hard way.  With alcohol fresh in your stomach, you grab ${herhim} by the arm and bring ${herhim} face to face.  After explaining the plan again, Patch cracks a very wide grin.  \"So, ${MC_heshe} has claws after all.  Oh, and just so you know…I like getting ordered around.\"  $!{shehe} proceeds to prance off into a side alley.  Trying to stay focused after something like that…why is everyone in this city a lunatic?\n        *goto c5InstructPatch\n      *else\n        [i][Check versus Emotional: fail][/i]\n        *line_break\n        *line_break\n        This is a serious situation, with both of your lives in jeopardy.  You don't care that this city-cat-human-thing called you a bumpkin—you've grown accustomed to much worse since you got here.  You'll get ${herhim} to cooperate even if it means a club to the face.  Patch understands the seriousness in your voice and eventually goes along with your plan.  That doesn't mean ${shehe} likes it, though.  \"Hmph!  You're not any fun…\"\n        *goto c5InstructPatch\n    *label c5InstructPatch\n    \n    The maneuver works out perfectly, and the elf who eyed you in the tavern is now between you and your partner.  The stalker shakes in fright, raising his hands and proclaiming that he just wants to speak with you.\n    *goto c5StalkerChoice\n  #Catch him at a dead end.\n    *if (sly >= 50)\n      *set patchRelationshipPoints +1\n      [i][Check versus Sly: pass][/i]\n      *line_break\n      [i]Your relationship with Patch grows[/i]\n      *line_break\n      *line_break\n      You don't mean to brag, but even with your limited knowledge of these alleys, you reckon you could turn enough corners and take the right alleys to not only make him lose your trail but also to pin him against a dead end.  Patch chuckles.  \"Who knew you were such a sneak…you might have more than just looks, after all.\"  With a wink, your partner prances off.  While it is a compliment of sorts, now is certainly not the time to speculate further.\n      *goto c5CatchHim\n    *else\n      You decide that you'll lose your stalker in these alleyways and catch them at a dead end.  It's a good idea, in theory, but you aren't sure you can pull it off.  And neither does Patch, for the matter.  \"You're cute when you're in over your head.\"  $!{shehe} pats you as if you were a kid.  \"But hows about I do the misleading, I know these streets better 'an you do.\"  You can't help but agree.\n      *goto c5CatchHim\n    *label c5CatchHim\n\n    The maneuver works out perfectly, and the elf who eyed you in the tavern is now between the wall and two scrungy-looking rogues.  The stalker shakes in fright, raising his hands and proclaiming that he just wants to speak with you.\n    *goto c5StalkerChoice\n*label c5StalkerChoice\n\n\"P-please, I beg you!  Don't hurt me, I've got a job!  There's good coin in it too—by the Fates, I'm desperate!\"  You have always thought of elves as a prideful and arrogant sort, so the sight of this one on his knees begging in a back alley takes you by surprise.  Just what has forced him into this?\n\n*if (logical >= 50)\n  [i][Check versus Logical: pass][/i]\n  *line_break\n  *line_break\n  But first, why couldn't he have spoken to you in the tavern?  There's something he's hiding, something he couldn't risk being overheard by others.  But what?\n  *goto c5Logical1\n*else\n  [i][Check versus Logical: fail][/i]\n  *line_break\n  *line_break\n  The one-eyed cat${girlboy} pipes up.  \"Just what's so important that ya had to ask us out here?  Some big secret or somethin'?\"  A good point; what is he hiding?\n  *goto c5Logical1\n*label c5Logical1\n\nYour stalker stutters before getting to the point.  \"T-that is…to speak out against the Church is dangerous, you know?  I'd get worse than my ears snipped if the wrong people caught wind of what I need to ask you.  But you…you hate them, don't you?\"  The elf points at you, making an accusation that—while entirely accurate—isn't something he ought to know about.  So you have to ask him how he came to that conclusion.\n\n\"Well, in your story, those black-robed monks who kill with their hands…assassins who hunt mages.  I'm not sure if you know, but those had to be members of the Cossack Order you were fighting!\"  The elf proclaims it proudly.  \n\nPatch is not quite as pleased.  Your roguish companion has ${herhis} hands crossed, blaming you with ${herhis} eyes at what a waste of time this has been.  You shouldn't have described your enemy so vividly in your story…if you were in a more sober state, you'd never have let your guard down like that.\n\nThe client then begins to describe the job itself.  \"A-anyway, my ${daughterson}, ${shehe}…${shehe} was accepted as a new recruit with the Bishop's Garrison here three months ago.  It was just supposed to be scribe work mostly, writing papers and speeches and such.  I've heard no word from ${herhim} since, and we wrote each other regularly.  There are rumors of new trainees going missing, and I've tried to reach the recruiter…er, discipline Arlindir?\" \n\n[b]\"Disciple.\"[/b]\n\nYou know little of the Bishop's Garrison, only that it is a formidable-sounding name for what amounts to a bunch of desk jobs.  The Church has financial affairs throughout the kingdom, and as such requires a significant number of scriveners and lawyers to keep things running smoothly.  On paper, at least.  But why does this Disciple Arlindir have anything to do with recruiting new bookkeepers?\n\n\"I knew I had found the right ${MC_manwoman} for the job!  I want you to find my Maeben and bring ${herhim} back.  We're forest-born, and it was my mistake to ever let ${herhim} go into the city.  I'll be at The Staggering each night until then!\"  The elf nearly hops with glee, and you smile at helping a father reunite with his kid.  Especially if the Church is involved.  You even feel a bit of kinship; both of you aren't from this Fate-forsaken city.\n\n*page_break\n\nPatch's clawed fingers rise, ${herhis} right thumb scratching against the middle and pointer fingers.  It is the universal gesture for 'how much,' which you learned rather quickly after a trip through the shadier districts.  \"Infiltration into a secured area owned by none other than the Church.  Acquisition of information you obviously couldn't obtain through regular means.  Acquisition of a person whom we can believe is being held under some sort of guard.\"\n\nEven with only one eye, Patch can pull off a darn good scowl.  Which is what ${shehe} is doing now, in full force.  You're just worried that it's directed towards you as much as it is your potential client.  \"The fact that my friend here fights holy monks for fun sparked your interest in the first place.  Which means you expect combat.  With agents of the Church.  That's a very hefty surcharge, sirrah.\"\n\nYou weren't expecting to hear that out of the usually scatterbrained city rogue.  It is almost as if ${shehe}'s an entirely different person when it comes to money.  Why, if ${shehe} was half this serious all the time, ${shehe} might even be able to make an honest living!  You hadn't even begun to think of putting a price on helping a decent man in need.  The father is visibly taken aback, lowering his head in shame.  If you have to guess, he has details that he's been holding back.\n\nThe elf replies to the ground, fearfully avoiding Patch's icy one-eyed gaze.  \"Y-you're right, cat-human.  Maeben wasn't recruited from our village, ${shehe} was taken.  They suspected ${herhim} of some sort of witchcraft—but it's all lies!  A jilted suitor of ${hershis} spread the rumor after Maeben refused to marry, and now ${shehe}'s in mortal danger!  Please, Redwater, please return my ${girlboy} to me!\"\n\nThe story hits home.  It's very doubtful that Maeben knows magic, even if ${shehe} is an elf.  ${Silvana} said that while the greatest wizards were usually elves, that's only because they had decades and decades longer to train and perfect their art.  A significant part of you had given up any chance of revenge against the Church for what they did.  But here, in this random back alley, you've been offered that chance.  And you are going to take it.\n\n\"Not gonna happ—\"\n\n[b]\"I'll do it.\"[/b]\n\nThe two of you speak in unison.  You can't meet your partner in the eyes, or rather, eye.  You know it's a stupid business mistake, but this isn't business.  This is personal.  The elf crosses his arms and bows deeply—an older custom that elves in the city don't follow because it looks rather silly.  What do you do?\n\n*choice\n  #Bow as well.\n    *if (whichRace = \"elves\")\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      It might be an old gesture, but it holds significant meaning.  You know it well from having grown up around elves all your life.  The 'X' you form with your hands is the elvish symbol for ego and pride.  The gesture of lowering it signifies that you are humbled and in the debt of whom you are bowing to.  A respectful elf would then bow and cross ${MC_hisher} arms similarly, rising up so as to signify that you have accepted the other's pride.\n\n      After having done so, you rise up to see the man in tears.  Elves are hardly the most emotional race, but your gesture has a profound effect upon a father who has lost his ${daughterson} in a foreign land.\n      *goto c5CustomChoice\n    *else\n      It's a silly little bow, to be sure, but you're able to respect the customs of others.  You imitate the gesture and see him smiling gratefully.\n      *goto c5CustomChoice\n  #Handshake.\n    An elegant bow works fine for nobles and folks that don't use their hands for a living, but down here in the real world, we shake hands.  There is power in physical contact; weird as it may seem, just touching someone makes them far less likely to betray you.  Not that you think this wood elf would double-cross you, you just want to maintain some sort of business-like professionalism.\n\n    You shake his hand firmly.\n    *goto c5CustomChoice\n*label c5CustomChoice\n\nAs soon as he's out of earshot, you get an earful.  \"The flaming baseborn half-horse utter drinkin' Fate-frackin piece of shit was that?!  How much we gettin' for this job?  Oh, wait!  Ya never negotiated a bleakin' price!  What's the name of our client?  Oh, wait!  Ya never even asked!  Ya backwood pigfrickin' loon!  I'm done with ye!\"\n\nPatch, put nicely, does not agree with your business transaction.  The trip back to headquarters is one of grave silence.  You feel as if you have failed your coworker, but…there are some things more important than coin.  At least, you hope so.\n\nWedged between two storehouses lays an abandoned office made of redwood that is in dire need of some polish.  Except that the office isn't abandoned, it only looks it from the outside.  None of the other Redwater Salvage Consultants could be bothered with maintenance, and Binyo is very defensive about those dead white marigolds out front.  For some reason, he insists that they are just 'dormant' for the season…dwarves would never make good gardeners.\n\nA puff of smoke hits your face as soon as you open the creaky door.  Beside the fireplace in his usual rocking chair is a grey-haired, bearded gnome with a propensity for the pipe.  His name is Kerlton, and he is perhaps the most jaded and depressing ex-bard you'll find in the city.  Or anywhere, for that matter.  Say what you will about him, the little guy is perceptive.  \"Ye go out ta get ${MC_himher} drunk, and ye come back fuming out yer wee nose.  There's a story there, or I ain't handsome.\"\n\n*if (whichRace = \"gnomes\")\n  You recognize the phrase, [i]\"…or I'm not handsome.\"[/i]  Gnomish men in your town often make that remark, likewise the women would say [i]\"…or I'm not pretty.\"[/i]  You aren't sure where it originated exactly, but it befits the race who values appearances so highly.\n  *goto c5WhichRace2\n*else\n  *goto c5WhichRace2\n*label c5WhichRace2\n\n\"Rookie fracked up harder than a boy's prick at a pleasure house!  Signed us up for a suicidal rescue mission against the Church!  No price, might as well be Fate-freaking volunteer work!\"  Patch takes ${herhis} rage out with a series of punches directed towards the couch.  The poor piece of furniture looks broken enough as it is…you begin to wonder how often it's been the victim of the cat${girlboy}'s abuse.  You're just lucky it's the cushion absorbing the blows and not your face.\n\nYou wait for Kerlton's opinion on the matter, but the gnome is in no hurry.  Never is.  He takes in a giant puff, exhaling it over the span of nearly half a minute.  Those are the lungs of a singer's, no doubt about that.\n\n\"$!{MC_boygirl} came with baggage, from what Bin was sayin'.  Price you pay for damaged goods.  How about my silk?\"  Being called damaged goods is tame by Kerlton standards, but it still stings.  Are you really broken?  Not physically, but…are you mentally all there?  You've gone through more than most ${MC_menwomen} have; perhaps it left marks upon your psyche that you haven't even noticed.  You've grown accustomed to hearing comments about your eyes looking empty or scary.\n\n\"It's a fracken wash, Kerly.  You made it out like she'd suck goat teats to get that silk back, now we're up a freakin' river!\"  You expected to see the gnome get angry for the first time since you arrived here, but you did not expect to see him laugh.  Patch is far less amused.  \"What?!  Out with it, ye pint-sized old weasel!\"\n\nAnother inhale followed by a dreadfully long exhale.  You daresay he's enjoying this.\n\n\"I'd wager a guess you never saw the informant.  You received a note, and that note mentioned that no further communication was needed.  Right?\"  You nod, adding that the note said we were to keep the ten percent down payment.  The gnome nods and sighs, leaning back in his rocker.\n\n\"There be three clerks Redwater works with for makin' contracts.  I had three of them made: one for five, one for ten, and one for fifteen.\"  Kerlton smirks as his chair rocks back and forth with a loud, rickety wail.\n\nThe rogue doesn't give it any thought before replying with harsh words.  \"Yeah, so?  Each contract is ten silver pence each!  Ya just wasted good coin we don't have to spare.\"  As you noted before, money is a serious issue for Patch.  It's a valid point, though…why write up three different contracts?  Unless…aha!\n\n\"Think about it, cat.  Rookie looks to have figured it out.  There was no down payment made.  We've a leak within our contracting agency, someone's cuttin us out.  A fat little halfling who's about to get even smaller after I'm done with him.\"  It is a cunning plan: Redwater has been losing jobs as of late and gaining a poor reputation for not finishing jobs we thought were closed.  This has been going on for weeks, likely caused by a competitor.\n\nPatch gives a loud 'hmph!' after piecing it together, but we're all in debt to the bard on this one.  A loud yawn comes from the other room, footsteps creaking the floorboards signaling his approach.  It is the leader of this mismatched crew, Binyo Brighthammer.  Unlike his cousin Gundrik, who was broad from his blacksmith shoulders, Binyo is broad from his monster of a belly.\n\n\"Ah, what be the commotion 'round here?  Good timin' though, ah stayed way past a closin'!  Oh ${name}, how was ye outing with Patch?  Ah told ye you'd take to that sweet halfman cider, didn't ah?\"  Binyo scratches his beard as is his habit to do, while the cat${girlboy} struggles with the right words to reply with.  After giving you an evil bit of side-eyeing, ${shehe} smiles brightly.\n\n\"$!{MC_heshe}'s a fine chap, quite the storyteller.  Likes to rouse up trouble after a few too many drinks, though.  Found us a job, of sorts.  Or rather, the job found ${MC_himher}.\"  There's some hidden meaning under that tone, but luckily your dwarf employer is completely oblivious to it.\n\n\"Oh ho!  Ah reckoned ye was ah tavern brawler, ${name}.  Ye dwarf blood in ye, swear it by tha' Fates!  But it be against the rules ta work when ye be drinking, ${MC_boygirl}!\"  Kerlton chirps in afterwards about discovering who's taking Redwater's work away, and Binyo gets giddy like a girl at her first dance.  The moment is interrupted by a heavy knocking on the door.\n\n*page_break\n\nBinyo motions to open it.  Odd that we should be having a visitor this late.  Odd that we should be having visitors at all, actually.  A shadow towers over the burly dwarf—you worry that you're in for a fight.  But that's before a celebratory outburst occurs.\n\n\"Genock, ye bleamin' scaly green bastahd, we missed ye!\"\n\nThe Redwater office is in an uproar, or at least, as much of an uproar as an odd bunch of five could cause.  And you all are indeed odd, not the least of which being the lizardman Genock, who embodies the whole 'gentle giant' trope rather well.  Apparently, he has been out on a pilgrimage into the mountains for training or religious reasons.  You aren't quite sure which, even after he explains it to you.\n\n\"Master dwarf hasss brought in new blood.  In peace I welcome you, in peace I—\"  Genock pauses mid-sentence and mid-kneel.  It is a gesture popular in Nanchou, and if you had to guess, it isn't just the lizard's mannerisms that stem from there.  \"My apologiesss, human.  I see eyesss that have seen true terror, eyesss of a veteran warrior.  Preconceived notions now swept aside, I again welcome you in peace.  My name is Genock, follower of Tei, son of Varguk, and member of the Redwater Sssalvage Consultants.\"\n\nYou exchange greetings, and not a moment later, Binyo assigns the duties for tomorrow.  Originally, you and Patch were to investigate the elf matter, but after an outright refusal from ${herhim}, that plan had to be altered.  So instead, you and Genock will work together on this job while Patch obtains the silk and Kerlton does a number on that clerk.  You aren't sure of Genock's skills, aside from being an intimidating mass of chiseled, scaly muscle, but unlike the cat${girlboy}, he seems open to your cause.\n\n*if (vigilant \u003c= 50)\n  [i][Check versus Carefree: pass][/i]\n  *line_break\n  *line_break\n  You have a natural knack for falling asleep, which comes in handy tonight more than most nights.  Partly due to a bellyful of cider, your nerves are calm, even though in your mind you know how important tomorrow will be.  It's your first real job at Redwater, a rescue mission for someone likely to be inside the deepest and darkest dungeon within the Bishop's base of operations.\n  *goto c5Carefree1\n*else\n  [i][Check versus Carefree: fail][/i]\n  *line_break\n  *line_break\n  Sleep comes uneasily, as it seems not even a bellyful of cider can calm your nerves about your first real job at Redwater.  And on top of that, it's a rescue mission for someone likely to be inside the deepest and darkest dungeon within the Bishop's base of operations.  \n  *goto c5Carefree1\n*label c5Carefree1\n\n*finish Next Chapter\n", "chapter6": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 6\n\n——————————————\n*line_break\n—————————— Chapter 6: Wedding Caterers and Crashers\n*line_break\n——————————————\n\nYou're up before the sun, drawn to a low humming noise in the main room.  Next to the fireplace, Genock sits with his legs crossed and hands raised in a peculiar fashion.  He said he's a follower of 'Tei.' Perhaps this is a regular morning ceremony for him?\n\n*if (resourceful \u003c= 50)\n  [i][Check versus Faithful: pass][/i]\n  *line_break\n  *line_break\n  Your studies back at the chapel all those years ago had precious little information about Tei, aside from it being a heretical Fate-less religion from the Western lands.  They did mention, however, that followers were prohibited from eating pork, so you decide against grilling up some bacon and opt instead for some bread and herring.\n  *goto c6Faithful1\n*else\n  [i][Check versus Faithful: fail][/i]\n  *line_break\n  *line_break\n  While wandering about in the past few months, you have experienced many things, most of them unpleasant.  However, you also experienced cured pork belly, more commonly known as bacon.  It's a big day, so why not splurge a bit?  The scent is heavenly, and you offer some to your coworker after his meditation concludes.\n\n  \"Tempting offer, ${name}…but I am unable.  Pork isss prohibited by followersss of Tei.\"  You feel guilty about subjecting Genock to the temptation that is bacon and find yourself unable to enjoy the meal as much as you would have liked.\n  *goto c6Faithful1\n*label c6Faithful1\n\nThe gnome is next to arrive; he ignores your tidings and makes a beeline towards the kitchen.  A kettle of water and a handful of seeds are brought to a boil, then a bit of milk and honey is mixed in.  It's a peculiar concoction, but as a retired bard, Kerlton is no stranger to peculiar things.\n\nEventually, he sees fit to enlighten you.  \"Barley tea.  You don't need to sleep in satin sheets to enjoy it, if you know whom to buy from.\"  The gnome takes a slow gulp from a small, delicately designed white cup.  Probably elvish in origin.  \"Don't talk to me before I've had my first cup, ${name}.\"\n\nYou're accustomed to grumpy morning people by now.  Even though you spent the better part of last night drinking, you still feel more chipper than the rest of Redwater does before noon.  Particularly more chipper than the death-walker who stumbles in from ${herhis} chambers.  Patch's blonde hair looks like a ball of yarn after a cat has had its way with it.  $!{herhis} clothes are barely on ${herhim}, really, and those that are have dire need of ironing.  \n\nThe usually graceful cat${girlboy} flops onto the couch with a graceless 'plump,' and proceeds to moan in a way that seems awfully familiar to a cat's meow.  It's cute in a way, but you keep that thought to yourself.  After yesterday, you're lucky ${shehe} isn't using your back as a scratching post.\n\nBreaking out of his meditation, the monk seems ready to get the labors of the day started.  \"${name}.  Let usss go over the detailsss of the plan.\"  You aren't comfortable enough discussing your ideas with Kerlton and Patch around to toss out one-liners and snide remarks, but now is as good a time as any.  The plan is multifaceted, which is just a fancy way of saying that it's complicated.  What's the first part?\n\n*choice\n  #You'll scope out the area, and Genock will gather details about the captured mages.\n    *set choiceRecon true\n    You think you can handle a bit of reconnaissance.  Knowing the lay of the land can help you make your next move, while Genock should be able to find some rumors.  There's no guarantee he'll come up with anything, but he does have a name to work with: Disciple Arlindir.  You aren't entirely sure what phase two of the plan will be, but it's better to wait until you know more before planning it out yet.\n    *goto c6ReconChoice\n  #Genock will scope out the area, and you'll gather details about the captured mages.\n    *set choiceRecon false\n    It shouldn't be too difficult to get some information about what the Church did with the captured mages.  You aren't familiar with the city, so Genock would be better at  reconnaissance.  He'll help give you the lay of the land, while you'll find out where the two of you will have to strike.  You do have a name to work with: Disciple Arlindir.  You aren't entirely sure what phase two of the plan will be, but it's better to wait until you know more before planning it out yet.\n    *goto c6ReconChoice\n*label c6ReconChoice\n\nA 'hmph' sounds off from the direction of the couch.  It seems that Patch has seen fit to join the land of the living.  \"Country ${MC_boygirl}, better watch what ya put your nose into, else ya gonna lose it.\"  The one-eyed rogue doesn't spare you even a one-eyed glance as ${shehe} exhibits a vast array of stretches.  Is one's back supposed to be able to bend that way?\n\n\"That'sss catfolk for saying ${shehe}'sss worried about you.\"\n\nGenock's translation sparks Patch right out of ${herhis} morning daze.  \"Shut it!  Never asked for a frickin' greenscaled interpreter!  Get on your Fates-forsaking quest already, wool-brained wannabe heroes…\"\n\nForced out into a cool spring breeze, you and your lizard friend make your way through to what's known as Friar Street.  It's probably the widest lane in the city, its great girth matching the stereotypical image of a fattened friar.  Its primary destination is the Bishop's Garrison main offices, making it one of the more aptly and sensible street names around.  Though in some of the shadier districts…well, those streets have unofficial names that would never show up on any printed map!\n\nBefore the two of you have to split up, now is as good a time as any to get to know more about Genock.  You've never met a lizardman before; in fact, you haven't even seen a regular lizard.  What is he doing so far from the Eastern deserts?\n\n\"Isss a long tale, but also short.  When my older brother became head of our clan, I left to avoid…complicationsss.  In my travelss asss a mercenary, I did many thingss I now regret.\"  The lizardman pauses, a strong show of guilt (or what you imagine is guilt) displaying on his snout.  You realize that you aren't the only one who's had it tough out there.  \"The Path of Tei saved me, and gave thisss warrior a code to fight under.  You should consider it, human.  Peace of mind and spirit in thisss life, rare but possible.\"\n\n*if (whichElement = \"fire\")\n  Peace in mind and spirit…it seems nice.  You're happy for Genock to have been able to reach that level of enlightenment.  But inside of you, the only light comes from fire, a flame that threatens to scorch you inside-out.\n  *goto c6WhichElement1\n*elseif (whichElement = \"earth\")\n  Peace in mind and spirit…you know how it feels, at least temporarily.  You're happy for Genock to have been able to reach that level of enlightenment.  The only time you are able to truly be at peace is when you are in complete focus, where the earth itself bends to your will.\n  *goto c6WhichElement1\n*elseif (whichElement = \"water\") \n  Peace in mind and spirit…never lasts long enough for you.  You're happy for Genock to have been able to reach that level of enlightenment.  But inside of you, peace and chaos swirl about in a whirlpool of feelings, and you never know one to last for more than just a fleeting moment.\n  *goto c6WhichElement1\n*else\n  Peace in mind and spirit…like this cool spring breeze, here one moment and gone the next.  You're happy for Genock to have been able to reach that level of enlightenment.  As the wind rises, so does your spirit and state of being.  But for every upward draft, there's a downward gust.\n  *goto c6WhichElement1\n*label c6WhichElement1\n\n*if (choiceRecon = true)\n  Your coworker leaves towards one of the nearby pubs often frequented by church workers.  Vows of sobriety—while mandatory for the military branch of the Church—are blissfully optional for the number-crunching and quill-pushing employees.  You're confident that Genock should be able to squeeze out a rumor as juicy as a captured elf mage.\n\n  As for you, the focus is literally on the path ahead.  It will take a ways longer to reach the main cathedral.  There are always masses being held, weddings to attend, and funerals to observe at such a huge, kingdom-renowned mega-cathedral.  You'll visit as many areas as you can in order to create a mental map of the place.\n\n  As a human ${MC_manwoman} in full bloom with no obvious disfigurements, you've noticed that you get special privileges in the upper districts.  So long as you're wearing one of your nicer ${MC_tunicsdresses}, you could pass (in appearance anyway) as a lordling who can afford to dodge the draft.  The cudgel at your hip is a bit out of place…but one can never be too careful in these troubling times, can they?\n\n  The ornate white steps at your feet—you can't help but hold your breath in amazement.  It is a spectacular sight, displaying lavish monuments of famous paladins and saints in all manner of stones that glisten in the raising sun.  Behind them, the brightly colored stained-glass windows depict scenes from every chapter in the good book.  It is in many ways a trip down memory lane.  The fact that you're reminiscing about those boring Sunday morning masses just goes to show how chaotic your life has been since then.\n\n  And when you think about the people in those pews…those good and decent folk who'd open the scriptures and read along, even when they couldn't tell one word from the other…\n\n  *if (logical >= 50)\n    [i][Check versus Logical: pass][/i]\n    *line_break\n    *line_break\n    Calm down, ${name}.  This isn't about you or them, it's about an innocent elf ${girlboy} who's lucky to still be alive after being accused of using magic.  It's a good thing you're able to keep your cool, what with the arrival of a gregarious gnome sporting an all-too familiar black robe!  Though he's also wearing a white collar…could that signify his station?  None of the warrior monks you dealt with before wore those.  He's shaking the hands of attendees, giving his greetings and acting as if he knows each one of them personally.  \n\n    Maybe he does.  But he wouldn't know you, that's for sure.\n\n    \"Welcome, welcome!  Is this your first time attending?  I am Disciple Bilburry, enjoy your stay.\"  You shake the monk's hand and thank him awkwardly.  You had been expecting to deal with guardsmen, not greeters.  Regardless, you've arrived at the main mass hall.\n    *goto c6Logical1\n  *else\n    [i][Check versus Logical: fail][/i]\n    *line_break\n    *line_break\n    …it makes you furious!  If only each of those warrior monks were these marble stone steps, would that you could crush them under your feet!  To use the slaughter of all your friends, of your whole family as an excuse for a crusade…you'll make them all pay!  Unfortunately for you, a gregarious gnome who had been shaking hands with the attendees takes notice of your outburst.\n\n    This gnome is sporting an all-too familiar black robe.  Except he has a white collar on as well…does that signify his station?  He approaches you with an open yet worried expression.  It doesn't look like the little holy man is looking for a fight, at least.\n\n    \"Dear ${MC_sondaughter}, what ails you so?  Did you come here seeking solace from your troubles?  The Fates hold answers for us all.\"  \n\n    You mutter apologies, saying the uncertainties of your friend's well-being has been on your mind lately.  You ought to be thinking of your objective—a wood elf named Maeben, but instead ${Brigid} of all people comes to mind.  Now there's a face you haven't seen in awhile.  How is ${shehe}?  You hope the manner in which you left didn't strain ${herhis} already tense relationship with ${herhis} parents.  While being a roguish wanderer fits you rather well, it wouldn't suit ${Brigid} at all.\n\n    With a pat on the shoulder, you finally make your way into the main mass hall.\n    *goto c6Logical1\n  *label c6Logical1\n\n  Luckily, you have half an hour before service begins, giving you ample time to scout out the place.  There's a museum in here!  Private areas restricted to employees are marked on signs, but there are next to no guards or security to be found.  You're able to look into some of the offices; scribes running around with piles of books and scrolls and inkwells.  It looks like a holy war requires more legal documentation than you realized.\n\n  Aside from the entrance to a neighboring barracks, there are only two areas heavily occupied by paladins: the non-public library and the uppermost floor, where the Bishop himself lives.  There's a downstairs, but it is barred by lock and key.  With no one around, you're able to give the lock a once-over, but from your limited knowledge, it looks impossible to pick without the proper key.\n\n  You hastily retreat to report to Genock and learn his findings, meeting him over at the Gilded Vestment Drinkery.  It's weird that a clothier would have its own pub next door, but you suppose noblemen have to wait somewhere while their wives and courtesans try on the newest and most lavish dresses.  Fine wine helps facilitate coin purses, too.\n  *goto c6AfterReconIntel\n*else\n  While your coworker continues down the path ahead to the mega-cathedral, you dart off to one of the nearby pubs often frequented by church workers.  Vows of sobriety—while mandatory for the military branch of the Church—are blissfully optional for the number-crunching and quill-pushing employees.  You're confident that Genock will give an accurate detailing of the premises; it is a building open to the public, after all.\n\n  As for you, your objective is to squeeze out a juicy rumor or two about a captured elf mage.  You aren't expecting loose lips out of friars on their off-hours, but these holy men could sink the King's Navy.  Without their robes on, anything seems to be fair game, especially the games in which gambling is involved!  The rattling of dice in cups and shuffling of playing cards can be heard well outside the bar room of The Jovial Hunter Guesthouse.\n\n  A tavern maid smiles at you broadly as you take a seat with folk more interested in words than dice.  Not that you mind a little gamble—you're gambling with your life for this job!  You get a quick glance from a few fellows, who nod and carry on as they were.  Usually, someone as poor as you would be treated as a pariah in a nicer alehouse such as this, but times have indeed changed.\n\n  As a human ${MC_manwoman} in full bloom with no obvious disfigurements, you've noticed that you get special privileges in the upper districts.  So long as you're wearing one of your nicer ${MC_tunicsdresses}, you can pass (in appearance anyway) as a lordling who can afford to dodge the draft.  The cudgel at your hip is a bit out of place…but one can never be too careful in these troubling times, can they?\n\n  After ordering a brew, you take a listen to the conversation at hand.  \"…and so's ah tell em, oi!  Ah've been here fer thirteen years, and I'm the fastest copier on the floor.  Where's my window office, ay?\"  It seems as if a drunken disgruntled coworker is leading the conversation.  The others are egging him on to give his candid opinions towards other things.  Now might be your chance; what subject do you bring up?\n\n  *choice\n    #Mages.\n      You toss out the subject of mages but are met with awkward murmurs.  It seems as if the Church is good at keeping secrets from itself.  That, or these gentlemen just care more about how much deskspace they're given.  You need to wait it out until your chance to direct this conversation opens up once more.  This mead you ordered is overpriced but tasty.  Sipping it down slowly would be the wisest course of action, for both your head and your coin purse.\n      *goto c6SubjectChoice\n    #Disciples.\n      You might as well have thrown a torch into a casket of lamp oil.  It doesn't matter how sober they are, each man here has an opinion or two about the \"no-collars.\"  Apparently, some wear collars and some don't.  You try thinking back to months before…did Kaine wear one?  You don't think so.\n\n      \"If'n I gets a no-collar one more time orderin' me around, tellin' me ta repair the binding of his wee secret book, Fates hold me, I'll slug him!  How can I mend a book if I ain't allowed to read past the title!\"  The others grunt in agreement.  From the jist of the complaints, you can picture that the Disciples boss these guys around, but aside from that are shrouded in secrecy.  But no matter how much they keep to themselves, rumors will always flow from the upstairs offices.  And only half of them came from a horse's rear end.\n      *goto c6SubjectChoice\n  *label c6SubjectChoice\n\n  The most intoxicated member of the table goes into just the sort of ramble you were listening for.  \"You wanna know what's weird?  I see that no-collared recruiter Arlindir bringin' all sorts of young folk in, guessin' they get a lot of wanna-be monks, what with the war an' all.  But once I see 'em, I ain't ever see 'em again.\"  Disciple Arlindir!  Bringing in recruits?  Maybe in chains…\n\n  *if (suave >= 50)\n    [i][Check versus Suave: pass][/i]\n    *line_break\n    *line_break\n    You jest that it might be that he just has very particular tastes, suggesting that perhaps the Vow of Chastity is not quite all that it seems.  Could be a clause in there for pointy-ears, am I right?  That gets a laugh around the table, but more importantly…\n\n    \"Ah know what you mean!  I saw a drop-dead gorgeous elf come in with 'em couple of months ago…prettiest thing, would that I could see it around the office instead of these blokes all day!\"\n\n    As the table erupts into laughter and the topics take a rather indecent turn towards fantasies of and regarding elves, you excuse yourself.  You've learned more than you hoped: Disciple Arlindir did indeed bring an elf (presumably Maeben) here a couple months ago.  The 'no-collars' operate downstairs in complete secrecy.  And the target is apparently quite the looker…all right, maybe that last bit isn't quite relevant.  Focus, ${name}!\n    *goto c6Suave1\n  *else\n    [i][Check versus Suave: fail][/i]\n    *line_break\n    *line_break\n    You ask what kind of kids sign up for the Cossack Order.  Maybe they just can't cut it, especially those…elves.\n\n    \"Ah, speakin' 'bout elves…it's the darndest Fate-forsakin' shame.  I saw a drop-dead gorgeous elf come in with 'em couple of months ago…prettiest thing, would that I could see it around the office instead of these blokes all day!\"\n    \n    As the table erupts into laughter and the topics take a rather indecent turn towards fantasies of and regarding elves, you excuse yourself.  You've learned more than you hoped: Disciple Arlindir did indeed bring an elf (presumably Maeben) here a couple months ago.  The 'no-collars' operate downstairs in complete secrecy.  And the target is apparently quite the looker…all right, maybe that last bit isn't quite relevant.  Focus, ${name}!\n    *goto c6Suave1\n  *label c6Suave1\n  \n  On the way out, you can't help but notice that you are being followed.  It doesn't look as if he has hostile intent…do you chance a talk or lose him in the crowd?\n\n  *choice\n    #Talk.\n      You address the fellow obviously trailing you out of The Jovial Hunter.  \"Ah, beg your pardon, ${MC_sirrahmilady}.  It's just that…you seemed a fairly serious sort and I…er, I just hoped you weren't going to report anything that…might get my friend fired.  He just got passed up by a young upstart and is rightfully sore over it, we decided to go out for drinks early to smooth it over.\"\n\n      So that's the situation.  Well, no harm then, and you have no intention of reporting anyone for anything.  What's said in a tavern stays in the tavern, after all.  The man thanks you graciously, and you go about your way.\n      *goto c6TalkLoseChoice\n    #Lose him.\n      The afternoon has snuck up on you, but with it is a flood of street traffic that'0s more than sufficient to lose yourself in.  Within seconds, you are sure that you have lost him; it never hurts to be too careful.\n      *goto c6TalkLoseChoice\n  *label c6TalkLoseChoice\n\n  Your next move is to meet up with Genock and discuss the subsequent course of action over at the Gilded Vestment Drinkery.  It is weird that a clothier would have its own pub next door, but you suppose noblemen have to wait somewhere while their wives and courtesans try on the newest and most lavish dresses.  Fine wine helps facilitate coin purses, too.\n  *goto c6AfterReconIntel\n*label c6AfterReconIntel\n\n*page_break\n\n*if (choiceRecon = false)\n  Genock is already there when you arrive.  You waste no time detailing the important bits of the conversations you overheard at The Jovial Hunter.  In essence, it's mostly a confirmation that the information given by your client is accurate.  And while that might seem like a small thing, reassurance of information is very important in this sort of business.\n  \n  The lizardman in turn gives a layout of the huge chapel.  It's simply too large an establishment for you to map out in your mind completely, but you can imagine it to some extent.  Most importantly, however: \"Guardsss are nonexistent in all but two areasss…the private library and the uppermost floor.  The bottom floor isss locked by a large door of complete iron.  We'll need a key.\"\n  *goto c6ChoiceRecon1\n*else\n  Genock is already there when you arrive.  You waste no time detailing the rooms and hallways of the mega-cathedral.  Guards aren't likely to be an issue, but obtaining that key to get downstairs would be.  You imagine that's where the Cossack Order holds their operations in secret, but you can't be sure.  Luckily, Genock has some good information on that matter.\n  \n  \"These friarsss have loose lipsss…your priestss bring in recruitsss that are never seen again.  One of which, a beautiful elf from monthsss ago.  Still can't stop talking about it.  Might be our Maeben.\"  Might be is right.  At least we know that this isn't a wild goose chase—our target is almost certainly down there.  The tricky part is getting that key.\n  *goto c6ChoiceRecon1\n*label c6ChoiceRecon1\n\nA whiff of fermented grapes blows past your table as you take a moment to appreciate the orchard theme that this miniature drinkery favors.  Your eyes trace over the vines that spiral across the columns and tables.  Flowers of every shape and size hang in baskets wherever space is available, much to the chagrin of your large reptilian comrade.  The vibrant greens, the spatter of fresh air down your lungs…it's making you homesick.  All those hunting trips with your father or fishing with ${Brigid} just to pass a lazy afternoon.  Chatting with ${Silvana} atop tree stumps…\n\n\"You look unwell, ${name}.  Perhapsss we retire on thisss endeavor for the time being?\"  You aren't sure how lizardmen give worried expressions or even if they're in their repertoire, but it seems as if your reminiscing gave cause for concern.  But on the contrary—it steels your resolve and bolsters your courage.  Maeben is waiting in a dungeon somewhere without any hope of seeing the sun and trees again.  $!{shehe} will never get another chance to breathe in the fresh air that revitalizes even the most tired soul.  You aren't a Druid, nor do you have any intention of hugging trees, but there's something you know more than most:\n\nWhat it feels like to have your home taken from you.\n\nThe plan is already coming together in your mind.  Weddings happen on a near daily basis at the city chapel, and today is no exception.  If the word on the street is true, anyway.  It seems as if Lady Mempere has sufficiently mourned her late second husband and has promptly moved to a third.  She's not much of a looker, but with her marriage comes some titles and lands that apparently bring all the wealthy merchant boys to her court.  Regardless of either party's intentions, the two of you will also be in attendance.\n\nYour partner expresses his doubts. \"The Mempere wedding…isss to start in an hour.  We're not suited to go as guestss.  And I tend to stick out in crowdsss for some reason.\"\n\nGood point, but these ceremonies always have folk of the more common sort buzzing about.  Servants, musicians, florists, even painters.  But above all, those are the people behind the most important part of the celebration—the feast!  You'll go as caterers; grab a crate and you'll have full run of the place.  If someone asks, you're lost and you get them to point you to the kitchens.  Foolproof!\n\nThe lizardman's tongue slips in and out of his front-most teeth…you aren't sure what flossing indicates quite yet. \"Good.  We should throw some mackerel on top in case they check the contentsss…\"  Fancy weddings always have a course or two of something fishy.  But you heard a story from Kerlton weeks ago about how he once witnessed a lizard guzzle down a barrel full of tuna on a bet.  Allegedly, his breath rank of watery death for weeks to come…it is a risk you'll have to take.  Getting that key, though, is still an issue.\n\n*if (choiceRecon = false)\n  If you learned anything over at the Jovial Hunter, it's that these scribes have very loose lips.  You aren't sure if you'll get it out by force or by wit, but with enough convincing, you figure you can find out where that key is.\n  *goto c6ChoiceRecon2\n*else\n  There aren't likely to be more than a handful of workers in their offices as the sun starts to set.  You
