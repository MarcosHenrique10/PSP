 every inch of you.  You know there is a name for this ankle-length robe, but you can't quite recall…too busy being afraid for your life.  Beads of sweat slip down your forehead, and you can't move your mouth to speak.  It's up to the clergyman to make his introduction first.\n\n\"It is a late evening to be about, ${MC_sondaughter}.  Do not be so afraid, I am a warrior of the Fates.  I am Disciple Kaine, head of the Delmacian Central Division for the Cossack Order.\"  Cossack Order?  Your mind flips back to ${Brigid} boasting about holy warrior guilds.  This is not good at all!  ${Silvana} is in serious danger, but ${shehe} isn't the only one! \n\nYour familiarity does not go unnoticed.  \"Oh, it looks as if you've heard of us already.  Splendid, please take a seat and I'll ask you some questions.  Your family was worried for you, but there isn't any reason to ruin a good night's rest.  This will only be a moment, and I'll soon be off to the other households.\"  That's your family's cue to leave the main room, which they do with as much grace as possible while trying to leave as quickly as possible.  You expect to get a tongue-lashing tomorrow for keeping them awake this long; that is, if you aren't getting a real lashing from this holy warrior.\n\nIn all honesty, he doesn't look like much of a fighter.  Kaine looks more accustomed to praying and giving sermons than slaying demons, is all you're trying to say.  \"Let's see…we have here on our records that you are ${name}, age seventeen.  Tell me, has anything odd occurred around here lately?  Anything unusual?\"\n\nSomething unusual happened just half an hour ago in your backyard, but you wisely keep that to yourself.  Unfortunately, besides ${Silvana} there really isn't anything of note going on in this town.  You depict a typical boring day, make note of any of the new merchants who've passed through, and generally try to make your hometown out to be the most boring place in the kingdom.  It's not very difficult.\n\nAs you speak, Disciple Kaine stares at you intently with weird, unblinking eyes.  It's the first time you've seen glasses on a person before—they would have looked almost silly if they were on anyone less ominous.  \"I see…your family tells me you work at the forge under a…Gundrik Brighthammer?\"  That's right, let's talk about my duties at the blacksmith.  Easy questions, no magic here!  Hahaha…\n\n\"Smithing is a noble profession.  But my curiosity must know where it is you go at night.  Your mother says it is a regular occurrence for you to leave after supper and return in the early morn.\"  So much for the softball questions, then.  This one is going to be tricky…\n\n*choice\n  #You've taken on the hobby of stargazing.\n    *set saidStargazing true\n    This guy is a church official and could lock you up for years for committing any act that goes against the teachings of the Fates.  Stargazing is the lazy man's sport, which fits you just fine anyway.  You only hope your straightforwardness puts the issue to rest.\n    \n    *if (vigilant \u003c= 50)\n      *set renown +1\n      [i][Check versus Carefree: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      The matter-of-fact tone of yours leaves little room for doubt.  You almost believe it yourself: you're just a hobbyist astronomer.  \"I see.  There is much one can learn from the stars, but I do not think losing so much sleep as a growing ${MC_boygirl} is wise.\"  You of course agree, happy you're able to dodge that line of questioning.\n      *goto c3NightActivityChoice\n    *elseif (suave \u003c= 50)\n      *set renown +1\n      [i][Check versus Direct: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      The matter-of-fact tone of yours leaves little room for doubt.  You almost believe it yourself: you're just a hobbyist astronomer.  \"I see.  There is much one can learn from the stars, but I do not think losing so much sleep as a growing ${MC_boygirl} is wise.\"  You of course agree, happy you're able to dodge that line of questioning.\n      *goto c3NightActivityChoice\n    *else\n      [i][Check versus Carefree: fail][/i]\n      *line_break\n      Unfortunately, you hesitate, causing Kaine to follow up.  \"Hmm…the constellation that includes both the Midsummer and Great White star, what is it called?\"  Curse the stars, you can't even identify the Midsummer star most of the time!  You know a few of the common constellation names…you'll just have to guess.\n\n      *choice\n        #The bear.\n          *set renown +1\n          [i]You have gained renown[/i]\n          *line_break\n          *line_break\n          \"That's correct.  The bear hibernates during the winter months, as does the Midsummer Star.  My apologies for having doubted you.\"  You had deduced the same, which is why you responded with this answer.  Who are you kidding?  It was a lucky guess, and you sigh with relief.\n          *goto c3NightActivityChoice\n        #The tree.\n          \"That's incorrect…for one who gazes upon the stars so often, you ought to be more knowledgeable.  Comprehension makes it possible to appreciate any art on a higher level.\"  You manage to nod while hanging your head in shame.  Well, at least your head is still on your shoulders, right?  Right?!\n          *goto c3NightActivityChoice\n        #The abbey.\n          \"That's incorrect…for one who gazes upon the stars so often, you ought to be more knowledgeable.  Comprehension makes it possible to appreciate any art on a higher level.\"  You manage to nod while hanging your head in shame.  Well, at least your head is still on your shoulders, right?  Right?!\n          *goto c3NightActivityChoice\n        #The poet.\n          \"That's incorrect…for one who gazes upon the stars so often, you ought to be more knowledgeable.  Comprehension makes it possible to appreciate any art on a higher level.\"  You manage to nod while hanging your head in shame.  Well, at least your head is still on your shoulders, right?  Right?!\n          *goto c3NightActivityChoice\n      *goto c3NightActivityChoice\n  \n  #You're having…relations before marriage.\n    *set saidStargazing false\n    There's only one way to hide a sin that'll get you hanged, and that's to reveal a sin that'll get you whipped.  A young ${MC_manwoman} sneaking out at night, returning hours later…come on, everyone assumes the worst from your age group, so why not use that to your advantage?\n\n    \"It is as I feared, but that is not why I am here.  Still, your local Church authority and parents need to know of this.  You have your whole future ahead of you, and the choices you make now decide which path leads to that future.\"  Disciple Kaine waits for you to reply…you could try to spin things as positive if you're smooth enough.\n\n    *if (suave >= 50)\n      *set renown +1\n      [i][Check versus Suave: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You passionately yet politely declare your love for ${herhim}, of your hopes and dreams together, and of getting married after this winter has passed.  You had to throw a name out there, so why not ${Brigid}'s?  The two of you did talk about marriage before, though not in the sense that you're describing it to the clergyman.  It feels odd describing the redhead of all people as proper ${wifehusband} material, but Kaine seems to be buying it.\n\n      \"To be young and in love.  While I can't say the Church permits it, perhaps I will let you tell your parents of this ${Brigid} in your own time.  I wish you and ${herhim} the best of luck together.\"\n      *goto c3NightActivityChoice\n    *else\n      [i][Check versus Suave: fail][/i]\n      *line_break\n      *line_break\n      You try to describe a very stale and platonic relationship that, let's face it, nobody was buying.  You don't stay out past midnight with a ${girlguy} to talk criticism of modern literature.  Kaine isn't believing a bit of it, so you stop talking in the middle of your story to cut your losses.\n\n      \"A lie to cover a sin is no small matter, ${name}.  I will report what you're doing to the local Church authority, as well as your parents.  Fates willing, they will set you on a better course.\"\n      *goto c3NightActivityChoice\n*label c3NightActivityChoice\n\nAfter that bit of questioning is over, the conversation grows considerably lighter.  It seems as if Disciple Kaine is in no great haste to leave your living room, so you have to oblige the warrior-priest a while longer.  You are rudely interrupted by an orc who nearly breaks down your front door.  It is soon to be a common occurrence.\n\n\"Sir, you're going to want to take a look at this.\"  She speaks with a tight urgency that fuels nightmarish possibilities inside your head.  A female orc in black priestly robes is a weird sight, to be sure; most orcs you know shy away from the Church, opting to sleep in on Sundays.  Kaine rises calmly, though you can see a sudden anticipation light up his eyes.  \"It would seem I must bring our talk to an end.  Fates go with you, ${name}.\"\n\nThe two wearing cossacks head outside to discuss matters in private.  Little do they know how well one can hear through these flimsy wooden planks.\n*if (whichElement = \"fire\")\n  \"…charred about a quarter of an acre.  Brushfire doesn't happen just like that, especially not this time of year.  Still smoke in the air, had to be recent.\"\n  *goto c3WhichElement4\n*elseif (whichElement = \"earth\")\n  \"…it towers over the oaks around it, a rock monument shaped like a grasping fist.  Looks like it was shifted recently, too.\"\n  *goto c3WhichElement4\n*elseif (whichElement = \"water\")\n  \"…wedged right into a giant oak, an icicle that had to be twenty foot in diameter at the base.  Just started to melt, had to be recent.\"\n  *goto c3WhichElement4\n*else\n  \"…uprooted trees, all in a circular formation.  It was a tornado that started and stopped on a single spot.  Wind still feels like it's been worked, had to be recent.\"\n  *goto c3WhichElement4\n*label c3WhichElement4\n\nYour heart is still beating—you know this because it feels as if it's lodged up in your throat.  But it's the words Kaine replies with that make you feel as if you're choking on it.  \"So this is where the lichborn ran off to.  Send word to the…boys, orders from the Golden Throne itself.  I do believe we're about to start a war.\"\n\n*finish Next Chapter\n", "chapter4": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 4\n\n——————————————\n*line_break\n—————————— Chapter 4: The Coldest Winter\n*line_break\n——————————————\n\nWar?  No, that doesn't make sense, nor does it matter.  Lichborn does, because there's only one person with a lich for their daddy in town, and that's ${Silvana}.  You can't believe your own stupid overblown magic trick might just get ${herhim} killed!  And those 'boys,' the way he said it didn't make them out to be chums you'd shoot the breeze at the tavern with.  You need…\n\n*choice\n  #To get your family up.\n    *set loner %-10\n    [i]Leader has increased[/i]\n    *line_break\n    *line_break\n    *if (whichChild = \"only\")\n      Your first worry is for your family.  Rushing to your parents' bedroom, you find them dead, asleep.  I meant dead asleep; they're still breathing!\n      *goto c4WhichChild1\n    *else\n      Your first worry is for your family.  Rushing to your parents' bedroom, you find them and your siblings dead, asleep.  I meant dead asleep; they're still breathing!\n      *goto c4WhichChild1\n    *label c4WhichChild1\n    \n    Waking them up proves a harder matter entirely.  You have to scream at them as if their lives depended on it (which they possibly might), only to have them return with curses of their own.  You try to describe to them the danger you overheard, but without being able to drop the bomb that \"magic is real,\" the whole story doesn't make much sense.  \n    *goto c4NeedChoice\n  #To get your weapon.\n    *set loner %+10\n    [i]Loner has increased[/i]\n    *line_break\n    *line_break\n    It isn't that you don't care about your family, it's just that you know they would never believe you.  Nor would they take your word over a fancy priest from an even fancier holy order.  There is also that whole matter of magic you'd have to let them in on, which is fairy-tale level stuff that would get you put into a sanitorium.\n    *goto c4NeedChoice\n*label c4NeedChoice\n\n*if (whichWeapon = \"sword\")\n  When it becomes evident that they won't do anything, you realize it's time for you to do something.  Whatever that something is, you feel safer with a sword by your side.  After picking up your blade, you whisper a prayer for safety and head out into the living room.\n  *goto c4WhichWeapon1\n*elseif (whichWeapon = \"axe\")\n  When it becomes evident that they won't do anything, you realize it's time for you to do something.  Whatever that something is, you feel safer with an axe by your side.  After picking up your dwarvish weapon, you whisper a prayer for safety and head out into the living room.\n  *goto c4WhichWeapon1\n*elseif (whichWeapon = \"dagger\")\n  When it becomes evident that they won't do anything, you realize it's time for you to do something.  Whatever that something is, you feel safer with a dagger at your hip.  After picking up your short blade, you whisper a prayer for safety and head out into the living room.\n  *goto c4WhichWeapon1\n*else\n  When it becomes evident that they won't do anything, you realize it's time for you to do something.  Whatever that something is, you feel safer with a spear pressed against your back.  After picking up your pointed weapon, you whisper a prayer for safety and head out into the living room.\n  *goto c4WhichWeapon1\n*label c4WhichWeapon1\n\nAll right, ${name}.  You've gotten this far, but where do you go from here?  The adrenaline pumps through your arms and legs, but you need to be thinking right now.  You're supposed to be notorious for your plans—sure, they've gotten you and ${Brigid} into deep trouble before, but maybe they can get ${Silvana} out of this one.\n\nNothing comes up.  No scenario, nothing.  There is one chance, if you're desperate enough for it.  You could enter that 'complete focus' state you do for casting magic.  Clarity and a certain wisdom are sure to come to you, allowing you to find a solution.  But it isn't exactly a…safe state of mind to be in.  Especially not for the house's resale value.\n\n*choice\n  #Enter the 'complete focus' state.\n    *set logical %-10\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    If you have the tool at your disposal, you'd be a fool not to make use of it.  The world around you fades away, your eyes close, and your mind drifts.  With no clear point or objective to focus upon, your mind struggles in the form of a massive headache.  You forcibly steer it to thoughts about ${herhim}, ${Silvana}.  $!{herhis} beautiful porcelain face and that long flowing black hair.  How can you save ${herhim} with the powers at your disposal?  How can you defeat these warrior monks and save the day?\n    \n    How can you become a hero?\n\n    …\n\n    …\n\n    You can't.  You can't save ${Silvana}.  You are not a hero.  You're a commoner who thinks ${MC_himher}self special just because ${MC_heshe} knows a few old tricks.  It isn't enough; it will just end up with you getting killed.  Speaking of getting killed…\n\n    A raggedy man of the barbaric sort charges at you in the comfort of your own living room, a spiked club raised menacingly over his head.  His wild howl rings in your ears, but you react on instinct.  You are already in focus.\n\n    *if (whichElement = \"fire\")\n      A flicker of flame sparks in front of you, just where you imagine it would.  It grows into the size of a man's skull, which is precisely where you make it go.  The howl turns into a scream, and you take no wasted opportunity to run him through with your steel.  The scream is horrific.\n      *goto c4CompleteFocusChoice\n    *elseif (whichElement = \"earth\")\n      A shaking beneath your feet, the timing would have to be perfect…NOW!  A square of dirt beneath the house, no more than thumb's length, pokes out of the floor right as the enraged bandit is about to step on it.  He falls forward, right where your steel happens to be.  The scream is horrific.\n      *goto c4CompleteFocusChoice\n    *elseif (whichElement = \"water\")\n      The kitchen is just a stride from where you stand, and inside it you can sense the dirtied water your mother had used to clean the dishes after dinner.  That would work.  Its contents appear before you, splattering on the wooden living room floor.  The enraged bandit slips and slides over it, all the way to where your steel happens to be.  The scream is horrific.\n      *goto c4CompleteFocusChoice\n    *else\n      You take a deep breath, then an even deeper one.  But when you exhale, so does the air around you.  The enraged bandit is pushed backwards, losing the grip on his club and his senses.  Without being able to see properly, he fumbles around for the piece of wood.  What he finds, however, is a piece of your steel.  The scream is horrific.\n      *goto c4CompleteFocusChoice\n\n  #It's too great a risk.\n    Yeah, last time you entered that state, you almost took half the forest down with you.  You don't need a fancy magical meditation technique, you just need common sense.  You…you can't…\n\n    You can't save ${Silvana}.  You are not a hero.  You're a commoner who thinks ${MC_himher}self special just because ${MC_heshe} knows a few old tricks.  It isn't enough, it would just end up with you getting killed.  These are trained warrior monks whose sole purpose is to kill mages, what can you do against that?  But your attention narrows to the sounds coming from outside.  A yell erupts and amplifies in a savage, throaty voice.  The howling feels like that of a beast, but sounds far too human to be anything else—it's a screaming wildman!\n\n    A feral monster—or what might as well have been—is about to charge through your (very unfortunate) front door.  Readying your weapon, there are two different approaches you could take to this.\n\n    *choice\n      #Meet its charge with your own.\n        There isn't time to think up any complicated maneuvers!  No, the last thing a charging wildman expects is to be greeted by another one charging straight at him!  You get your feet and hands into the proper position and…NOW!\n\n        *if (sly \u003c= 50)\n          *set renown +1\n          [i][Check versus Powerful: pass][/i]\n          *line_break\n          [i]You have gained renown[/i]\n          *line_break\n          *line_break\n          His howl breaks the door down well before he does, or at least that's how it seems.  But that howl turns into a whimper when he realizes you are but an arm's length away.  Then it turns into a bloodcurdling cry.\n          *goto c4CompleteFocusChoice\n        *else\n          [i][Check versus Powerful: fail][/i]\n          *line_break\n          *line_break\n          His howl breaks the door down before he does, or at least that's how it seems.  You hesitate, you're scared (and rightfully so!), but it might just cost you your life!  You're unable to gather enough speed for a clean strike, but as luck would have it, your poor old door trips him up for you!  You take your chance and turn that howl into a bloodcurdling cry!\n          *goto c4CompleteFocusChoice\n        *goto c4CompleteFocusChoice\n      #Stand aside the door and flank.\n        The last thing a raider expects is to be sneak-attacked inside the house he's raiding.  With that thought in mind, you place yourself beside the door, gripping your weapon tightly.  You are coiled and ready to strike!\n        \n        *if (sly >= 50)\n          *set renown +1\n          [i][Check versus Sly: pass][/i]\n          *line_break\n          [i]You have gained renown[/i]\n          *line_break\n          *line_break\n          The howl grows louder and louder until finally making its way to you.  Your unfortunate front door meets its untimely end after being bashed in by a wildman, but it had done its duty.  A huge flash of skin from the bandit's bare back reveals itself, and you let your sword arm do the rest.  It's amazing how quickly that howl turns into a bloodcurdling cry.\n          *goto c4CompleteFocusChoice\n        *else\n          [i][Check versus Sly: fail][/i]\n          *line_break\n          *line_break\n          The howl grows louder and louder until finally making its way to you.  Unfortunately…as nervous as you are, you mistook which way the door opens.  That is to say, the front door flies open and smacks you, causing your vision to go white even if only for a second.  The wildman enters the living room, knowing that someone was here but couldn't figure out where.  That's when you jump in, turning that annoying howl into something more resembling a cry.\n          *goto c4CompleteFocusChoice\n        *goto c4CompleteFocusChoice\n*label c4CompleteFocusChoice\n\n*if (whichWeapon = \"sword\")\n  It isn't much of a cry, though, with your sword lodged where his lungs should be.  While you know that swords are more for hacking and slashing, with its sharp edge…pushing it through unarmored opponents works just as well.  The problem—as you yank your blade out of the dead man—is having to clean it off all the time.\n  *goto c4WhichWeapon2\n*elseif (whichWeapon = \"axe\")\n  The cry turns into blood spurts, what with your axe cutting the bandit's upper torso clean through.  From underneath his left arm through to the top of his right shoulder, your cleaver of flesh and bone has done well.  You're rewarded with an eruption of blood, great…\n  *goto c4WhichWeapon2\n*elseif (whichWeapon = \"dagger\")\n  The cry is getting on your nerves, so you keep digging around in those innards until you cut something loose that shuts him up.  He ends up dying from a broken heart, usually romantic but…not quite so in this one's case.\n  *goto c4WhichWeapon2\n*else\n  You'd be crying too if you had the business-end of a spear in your back with the tip showing through the front.  He flails like a fish out of water, so you put in a good twist to carve up something that will put him out of his misery.\n  *goto c4WhichWeapon2\n\n*label c4WhichWeapon2\nYou don't know how much time you spend staring at the mangled mess in front of you.  It was once a human, you're pretty sure.  Not just a human but a person, as well.  He had a name, grew up as a little boy, had a past, a present and…he doesn't have a future.  You have taken that from him; you ended his life.  You just ended a man's life.\n\nYou're a killer.  A murderer.  It was just!  You are just!  It was self-defense, no one could blame you!  And of course, they wouldn't, but that doesn't stop you from seeing those shaking bloodied hands in front of you as those of a killer.  Your soul has just been stained, you've just committed an act that can never be undone.  But what has you shaking isn't regret but fear…fear that when you cut him to pieces, you enjoyed it.\n\n*set corruption +10\n[i]Your corruption grows[/i]\n\n\"${name}!  Are you al'rit?!\"  If your father hadn't snapped you out of it, you'd have lost more than just your lunch.  Your sanity has been put to the test for the first time in your young life—you only hope it manages to pass.  Are you going to go insane?  \"Fates…\" Your old man is at a loss for words as he pieces together the scene.  \n\n*if (whichChild = \"only\")\n  Your mother is gibbering in her near incomprehensible dialect, asking what that noise was.  The look you see in her eyes, staring at her blood-soaked ${MC_sondaughter} like you're some sort of monster…is a look you will never forget.  If only you had known then that it would be your last memory of her…\n  *goto c4WhichChild2\n*elseif (whichChild = \"oldest\")\n  Your mother is gibbering in her near incomprehensible dialect, asking what that noise was.  Then the little ones enter the room, groggy from lack of sleep but interested nonetheless.  The look you see in their eyes, staring at their blood-soaked big ${MC_brothersister} like you're some sort of monster…is a look you will never forget.  If only you had known then that it would be your last memory of them…\n  *goto c4WhichChild2\n*elseif (whichChild = \"middle\")\n  Your mother is gibbering in her near incomprehensible dialect, asking what that noise was.  Then the little ones enter the room, groggy from lack of sleep but interested nonetheless.  The older ones file in reluctantly after that.  The look you see in their eyes, staring at their blood-soaked ${MC_brothersister} like you're some sort of monster…is a look you will never forget.  If only you had known then that it would be your last memory of them…\n  *goto c4WhichChild2\n*else\n  Your mother is gibbering in her near incomprehensible dialect, asking what that noise was.  The older ones file in reluctantly, groggy from lack of sleep.  The look you see in their eyes, staring at their blood-soaked younger ${MC_brothersister} like you're some sort of monster…is a look you will never forget.  If only you had known then that it would be your last memory of them…\n  *goto c4WhichChild2\n*label c4WhichChild2\n\n\"Quit starin'!  Git packed, the town's under attack!\"  Your father's words disperse the living room; it's only you and him.  Well, and a dead brigand.  Your dad hastens to grab his hunting bow and quiver, along with a pair of skinning knives.  He speaks to you hastily in an impromptu heart-to-heart.\n\n\"You did good, ${name}.  Ain't nothin' wrong with killin' a man if'n it's for the right reasons.  Ah don't know what them holy men wanted, but if they're together with these bandits…I need to go warn the other families.\"\n\n[b]\"No.\"[/b]\n\nYour father is taken aback, not expecting such an abrupt answer from you.  Truth be told, you weren't expecting it yourself.  You don't feel like yourself; in fact, it's been like that since you left the grocer's with ${Brigid}.  But you know you aren't wrong.  Your father is strong but getting older and wouldn't be able to outpace them if it came down to it.  You only wish your last words to him had mentioned how much you loved him.\n\n*if (whichChild = \"only\")\n  [b]\"Take mother and escape.  Leave through the forest, but avoid the woods behind the house at all costs.  I'll warn the other families.\"[/b]\n  *goto c4WhichChild3\n*elseif (whichChild = \"oldest\")\n  [b]\"Take mother and the young ones and escape.  Leave through the forest, but avoid the woods behind the house at all costs.  I'll warn the other families.\"[/b]\n  *goto c4WhichChild3\n*elseif (whichChild = \"middle\")\n  [b]\"Take mother and the rest of them and escape.  Leave through the forest, but avoid the woods behind the house at all costs.  I'll warn the other families.\"[/b]\n  *goto c4WhichChild3\n*else\n  [b]\"Take mother and the rest of them and escape.  Leave through the forest, but avoid the woods behind the house at all costs.  I'll warn the other families.\"[/b]\n  *goto c4WhichChild3\n*label c4WhichChild3\n\nUsually, when you speak out like that, you end up with a firm hand flying across your face.  You have no idea what he's thinking, but his features grow gravely serious.  You brace for the worst.  But instead of curses, you hear your father say something he's never said to you before.  \"$!{MC_sondaughter}, I'm proud of you.\"\n\nYou run out of the house in a hurry.  You don't want your old man to see his proud ${MC_sondaughter} start to cry.\n\n*page_break\n\nIt's so late in the evening that you could almost call it early morning.  And it is a cold one, at that.  A clouded sky pairs with chilling breezes that jolt you awake.  You hurry to the center of town, on the lookout for bandits and priests.  You aren't quite sure which one scares you more.  The healer's hut comes into view ahead, but even from this distance, you know something is amiss.\n\nUsually, it isn't lit up like a torch.\n\nYou feet race forward onto the scene, your nose smelling the most potent mixture of incense and leaves it has ever smelt before.  There's a very real possibility that you might just pass out before reaching it.  Holding your shirt's collar over the bottom half of your face suffices for now.  Once you arrive, however, you start regretting not passing out from the smell moments ago.\n\n*if (whichRace = \"elves\")\n  The elf ex-Druid who serves as the local healer is laid face up with his legs sticking out of the hut's opening.  Being the oddball that he is, it might have been possible that this is simply the method in which he prefers to sleep.  But catching a cold was the least of this elf's worries, what with a neck twisted at that impossible angle.  You cringe at the sight of it; his eyes wide open with shock from the moment it had been snapped.\n  \n  You look away, but before you do, you notice he's holding a closed vial of something in his left hand.  You aren't sure what compels you to take it, but you do so and leave this smoke-filled hell in a hurry.\n  *goto c4WhichRace1\n*elseif (whichRace = \"orcs\")\n  The orc ex-Druid who serves as the local healer and heavyweight wrestling champ is laid face up with his legs sticking out of the hut's opening.  Orcs don't care for the cold, so that seems odd.  Odder still is his neck, which is twisted at an impossible angle.  You cringe at the sight of it; this once joyful orc, who was always full of smiles, now shows a perpetual state of shock from the moment his neck had been snapped.\n  \n  You look away, but before you do, you notice he's holding a closed vial of something in his left hand.  You aren't sure what compels you to take it, but you do so and leave this smoke-filled hell in a hurry.\n  *goto c4WhichRace1\n*else\n  The old lady ex-Druid who serves as the local healer and ill-spirited wisecracker is laid face up with her legs sticking out of the hut's opening.  Old ladies are notorious for not handling the cold well, but you soon realize that the night's chill is the least of her worries.  Her neck is twisted in an impossible, unsightly angle.  You cringe at the sight of it; her face is contorted into one of pure shock, just as it was the moment it had been snapped.\n  \n  You look away, but before you do, you notice she's holding a closed vial of something in her left hand.  You aren't sure what compels you to take it, but you do so and leave this smoke-filled hell in a hurry.\n  *goto c4WhichRace1\n*label c4WhichRace1\n\nThe powerful fumes numb the world around you, which—for a moment—is just what you require.  It allows you to think quite clearly, without feeling ill to your stomach from what you just witnessed.  This wasn't a bandit attack.  There was no blood or violence, no signs of looting either.  With the victim in that position, you could imagine that they heard someone knocking at the front step and answered it.  This was the work of a trained killer.\n\nThe black dress-like garment of the Cossack Order comes to mind.  They are monks with extreme skill and talent…they make for pretty talented assassins too, it turns out.  Just thinking about how you were awkwardly chit-chatting with one in your living room not even an hour ago…it's just too weird.  You realize that if you ever come up against one, you'd need more than just the Fates behind you to survive.\n\nOne fact is clear: both these holy warriors and the unholy barbarians are killing people in your town.  Worse still, you have no idea why.\n\nIt isn't just that it's the next closest household before reaching the more populated residential area.  ${Brigid}'s house is large and stands on a bit of a hill.  It's fairly defendable, actually, but it isn't like they have guardsmen attending their fences.  But they do have the next best thing.\n\n\"Wrrrrraugh!  Wruff wruff!  Ah-uewwwwww!\"  ${Brigid}'s family houses half a dozen mutts, and no, that isn't meant as an insult on your dog-brained friend's account.  You think of them as mutts, but they're really hounds who love to bark loudly, if only to make you miserable.  But this time, you can think of no better sound in the world.  You race up the hill and take note of the situation.\n\n*page_break\n\nA pair of bandits lays strewn across the fenced-in yard, their torsos sporting a fistful of arrows apiece.  They are surely dead, but that doesn't stop the hounds from barking at them as if they're faking it.  When an arrow rizzes over your head, it registers how much of a bandit you appear at the moment.  You shout to identify yourself, and the mutts chase you down to be petted, as they're apt to do.\n\nYou hope dogs don't mind blood-stained hands.  Out from the house pops ${Brigid}, sword out and charging.  Fates above, is ${shehe} going to run you down?!  Are you going to die like a dog while in the middle of petting them?  So much for a hero's death!\n\n\"${name}!\"\n\nInstead of a sword through your chest, you find arms wrapped tightly around it.  Squeezing you with all the strength ${shehe} can muster, it is undoubtedly a hug.  When was the last time the two of you hugged?  Not since you were as tall as gnomes, is your guess.  \"I was so worried…you're stained in blood!  Are you injured?\"\n\nYou explain everything as your old friend takes you inside.  $!{herhis} family consists of a potbellied old bloke, his heavily freckled wife, and three boys of varying sizes.  They are all in their young teenage years and look as if their bowels had emptied just moments before.  The whole lot of them are terrified, save for the balding one with a beer gut.  He used to be a knight and is damn well proud of it.  Proud enough to not let you hear the end of it.  And a remarkably good shot too, apparently.\n\n\"Ah, we's got the missus to thank fer that.\"  ${Brigid}'s father embarrassedly reveals.  That petite freckled woman used to train with the King's Rangers?  Who knew?  Before you realize it, everyone in the room has their attention set on you, waiting.  After awhile, it comes to you.  They are waiting for orders.  Even ${Brigid} waits in silence, though ${shehe} pretends to be focusing on sharpening ${herhis} sword with a wetstone.\n\n*choice\n  #Inspire them.\n    *if (loner \u003c= 50)\n      *set renown +1\n      [i][Check versus Leader: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      There aren't many times in a young ${MC_manwoman}'s life where ${MC_heshe} is taken seriously.  Without responsibility, there can be no authority.  So the whole idea of you issuing commands just feels weird, like you're some sort of military sergeant.  But you take to it like a natural.\n  \n      You congratulate them on their work so far, but describe the very real possibility of the raiders striking en masse next time.  This house is just too great a target to pass up.  You go into detail about how you found the healer in order to put a face on just how serious the situation is.  While you wouldn't mind having ${Brigid}'s sword arm and ${herhis} mother's bow at your side when you head to the center of town…the family should leave as soon as possible, and together.\n  \n      The proud soldier argues with you passionately, remarking that you kids need to escape while he holds down his fort.  The thing is, you aren't a kid anymore.\n      *goto c4AfterSpeechChoice\n    *else\n      [i][Check versus Leader: fail][/i]\n      *line_break\n      *line_break\n      *goto c4ImNotALeader\n  #Tell it how it is.\n    *if (loner >= 50)\n      *set renown +1\n      [i][Check versus Loner: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      *label c4ImNotALeader\n      You are sorry to disappoint them, but you aren't a leader.  Overblown speeches with dramatics and fanfare will never be your style.  Your current goal is quite simple: help as many folks survive as possible, the most important of which being yourself.  You find yourself describing the bandit who charged into your house, the violence that ensued…and after that, the face of the ex-Druid you found lounging on the front stairs, their place turned into some sort of hell.\n      \n      There's only one command you can give at this point as you gaze over their grim freckled faces. \"Run.\"\n      \n      The proud soldier gulps audibly, perhaps not realizing until now just how dire the situation is.  The family moves as if in a daze to pack their things.  He wants you to escape with the rest of the kids while he holds down the fort.  The thing is, you aren't a kid anymore.\n      *goto c4AfterSpeechChoice\n    *else\n      [i][Check versus Loner: fail][/i]\n      *line_break\n      *line_break\n      *goto c4ImNotALeader\n*label c4AfterSpeechChoice\n\n\"Ah…Fates watch you, ye puttin' yer life on the line like this. Ah knew we had trouble, what with what that priest man said.\"  The veteran knight laments, and—wait a moment, 'priest man?'  Your interest piques, and you inquire further.  \"Aye, ${Brigid}, ye told him ye said ye had seen somethin back of them woods, didn't ye?  Help us, wouldn't mind a priest or two to help us against these outlaws!\"\n\n$!{shehe} doesn't look you in the eye.  There is a scene to be made, but not in ${herhis} family's living room with all of them around.  This is a more personal affair.  ${Brigid} heads out back in silence, prompting you to follow suit.  Silence is good, because you aren't quite sure what to say.  Your family wasn't the only one with a midnight visitor from the Order, it seems.  ${Silvana}'s snapped neck flashes through your mind.\n\n*if (logical \u003c= 50)\n  [i][Check versus Emotional: pass][/i]\n  *line_break\n  *line_break\n  The emotions you had locked away inside, the pent-up fear and bloodlust that keeps your psyche atop a razor's edge—it has just been waiting for an excuse to be let out.  The mental image of ${Brigid} squeezing ${Silvana}'s neck flashes inside your eyes, and turnabout is fair play.  Your whitened knuckles close in on ${herhis} collar.\n\n  How many people are going to die because ${shehe} couldn't keep ${herhis} Fate-forsaken mouth shut?!  It isn't just ${Silvana} who's going to die…for some reason, these monks brought savage bandits along with them.  All the people you've known since you can remember.  Their faces flow vividly through your head, the good kind folk kneeling at wedding pews and sharing cheap mead like it was the finest wine.  THEY'RE DEAD BECAUSE OF YOU!\n\n  ${Brigid} gasps, desperate for breath, in serious pain.  What do you do?\n\n  *choice\n    #Release ${herhim}.\n      You look into your best friend's watery eyes.  They are a dullish gray hue, but now that you think of it, they aren't dull at all.  The strength in your hands give way, drops of water dripping onto ${Brigid}'s face.  Is it raining?  Your vision is blurred, so you can't tell.  Is it raining?\n\n      A desperate gasp for air precedes a resolute statement.  \"${name}.  I…know you despise me.  I won't ask for forgiveness.  But I'm not letting you go into town alone.\"  The redhead stands up, hefting ${herhis} longsword over ${herhis} shoulders.  You could almost say ${shehe} looks rather gallant in that stance.\n      *goto c4AfterEmotion1\n    #Don't release ${herhim}.\n      No, your life and everyone else's is ruined!  Ruined because of this ${bitchbastard}!  You funnel all your rage, your hate, and your anger into your fingers.  Until the gasping stops.  It all stops.  There's a prick that pops into your back.  You put your hand back there and feel a wooden shaft sticking out.  That's odd.  You look back down at ${Brigid}, your old friend.  $!{shehe} is looking back at you too, though ${herhis} gaze seems empty somehow.\n\n      More pricks occur, and your vision fades.  As you fall on top of the expressionless redhead, your only thought is that you hope others won't mistake this for a lover's embrace.  That would be especially embarrassing with ${herhis} family nearby.  But then thinking itself starts getting harder, so you decide to stop thinking.  The pain grows dull, until there is none.\n      \n      *goto_scene ending\n  *goto c4AfterEmotion1\n*else\n  [i][Check versus Logical: pass][/i]\n  *line_break\n  *line_break\n  You want to strangle ${herhim}, right then and there.  You want a fight, to beat the living crap out of this betrayer.  It isn't just ${Silvana}'s life on the line.  How many of the innocent people that you've known for your entire life are going to die today?!  Your fist is raised and ready to strike until…\n  \n  ${Brigid}'s watery dull-grey eyes turn towards you.  The strength you put into your fist fades away.  Your friends are dying all around you, but they aren't just your friends.  You reason it through in your head.  When ${shehe} returned home, no doubt a member of the Cossack Order was waiting for ${herhim}.  To not tell about ${Silvana} would be like lying to the Fates themselves…and ${Brigid} is a horrendous liar.\n  \n  $!{shehe} reluctantly confirms your suspicions.  \"I…I told 'em, aye.  But what have these marauders got to do with anything?!\"  It is a good question: what do they have to do with anything?  Since when do mage hunters pal around with thugs?  You give it some serious thought but come up empty.\n  \n  A resoluteness builds inside your companion that you can't help but admire.  \"${name}.  I…know you despise me.  I won't ask for forgiveness.  But I'm not letting you go into town alone.\"  The redhead stands straight, hefting ${herhis} longsword over ${herhis} shoulders.  You could almost say ${shehe} looks rather gallant in that stance.\n  *goto c4AfterEmotion1\n*label c4AfterEmotion1\n\nAgainst the pleas of ${herhis} father and against your better judgement, your friend will be accompanying you.  While your feelings towards ${herhim} are strained, to say the least, you have a mission.  You're just not sure why you signed up for it in the first place.\n\nThe two of you must make for a very odd-looking couple.  ${Brigid}—in one of ${herhis} more expensive tunics—is as clean as if ${shehe} had just come out from a bath.  $!{shehe} might even pass for a duchess's ${daughterson}, in no small part because of you.  You stand aside ${herhim} in a raggedy woolen shirt and breeches that are as dirty as they are bloodstained.  Your hair is matted with sweat, and blood that isn't your own has splattered and dried across your face.\n\nWhen the dirt road ahead of you splits into two, a choice has to be made.  While it is far from a large area to cover, there are still two districts: a north side and a south side.  The former lays atop a sizable hill overlooking the latter.  The south side contains more residential houses, along with our one and only tavern.  But most importantly, it's where the church is.  In the north, you have more shops, the marketplace, the smithy's, the carpenter's, even a small stable.\n\n\"We should head through Southside, then.  There's more folk we could get to that way.\"  The redhead blurts out a proposal, but it has some merit.  It looks as if it's going to be your call as to where the two of you go, however.  Splitting up is just too dangerous.\n\n*if (resourceful >= 50)\n  [i][Check versus Resourceful: pass][/i]\n  *line_break\n  *line_break\n  There are more people down in Southside, to be sure, but no doubt more foes, as well.  It seems as if your enemies are intent upon slaughtering everyone, and there's no doubt that area would be locked down tight.  It is perhaps not the best idea to go there first.\n  *goto c4Resourceful1\n*else\n  *goto c4Resourceful1\n*label c4Resourceful1\n\n*choice\n  #Go south.\n    ${Brigid} has the right of it—you could foreseeably save more people by heading south.  The two of you make your way down until loud shouting ahead gives you pause.  Without giving it a second thought, you push your companion off the road and ungraciously into the nearby shrubbery.  You jump in quickly after spotting two figures in the distance, hoping that neither of these bandits can see as dwarves do in the dark.\n\n    \"Et ain't fair, I tells ye!  Ah gut each 'of em right and proper, an' ah can't even look fer jewels afore I gotta torch it?\"  The raspy voice complains in a dialect that makes even your own mother sound cultured.  No doubt a savage.\n\n    Another voice responds, deeper and with a sluggish pace.  \"Knew we wus gettin the shortend workin' wit them black robes.  Reckon if we—\"  The footsteps pause right as they ought to be passing your bush.  You cease to breathe, praying it doesn't become a newfound hobby.\n\n    …\n\n    …\n\n    \"Guess it ain't nuffin.  Anyways, let's loot sum 'o dem houses this way afore the rest of the gang follows.\"  The grunts carry on their way, but it isn't until you can no longer hear their footsteps that you dare to breathe again.  ${Brigid} makes it out of the shrub first, with a worried but determined gaze.\n\n    \"They were headed to my place.  We need to go back.\"  $!{herhis} voice wavers with concern for ${herhis} family.  You feel a pang of guilt, as this is the first moment that you take to think about yours.\n\n    But you can't go back now, as much as you want to.  A pair of vagabonds aren't anything ${Brigid}'s mother couldn't handle with arrows, it seems.  If the family was smart, though, they'd already be up and gone.  No, you have to go north.  If what you overheard is accurate, a moderately sized gang is already tearing up the south side.\n    *goto c4SouthNorthChoice\n  #Go north.\n    *set renown +1\n    [i]You have gained renown[/i]\n    *line_break\n    *line_break\n    You don't trust the Church, no matter how much it advertises itself as a refuge of safety.  There is nothing safe about those mage-hunting monks.  It is also the likely location where folks would gather at any hint of danger…Fates help them.  But you and ${Brigid} need to go north.\n\n    \"North?!  Isn't anything there but a bunch of empty shops, ${name}.  What in the worlds are ye thinking?\"  Unfortunately, the redhead doesn't prescribe the sort of danger to the affable priest warriors that you do.  But that aside, you have other reasons to go north.  You could gather up some much-needed supplies there, and the families of the shop owners would be there too.  Gundrik has a few older weapons you could pass out, but most importantly, the blacksmith is a stout warrior when it comes to a fight.\n\n    Or at least, you hope he'd be.  All you've had to go on so far are tavern brawls. \n    *goto c4SouthNorthChoice\n*label c4SouthNorthChoice\n\nThe northern part of town is a bit of an uphill climb and decidedly more sparse.  Especially in the dead of night like this.  You rub your hands for some heat—the cold has crept up on you.  And is that…great, it has started snowing.  The first snow of the season, on a night like tonight.\n\n\"We need to get you into some decent clothes, you can't fight if you can't feel your fingers,\" ${Brigid} remarks, openly showing ${herhis} worry.  People are dying, and ${shehe}'s worried that you'll catch a cold?  \"It's just…${name}, your eyes seem different somehow.  Like that look ye get after seeing a ghost, but not really a ghost, I mean…\"  Your friend stumbles around looking for the right words.\n\nYou know what ${shehe}'s asking; ${Brigid} is terrible at beating around the bush.\n\n\"I-I mean…killing that barbarian, what did…I guess I shouldn't ask.  Sorry for bringing it up, ${name}.\"  $!{shehe} looks ashamed of ${herhis} own curiosity.  But that's right, for all that practice in swordplay, ${Brigid} has never seen actual combat.\n\n*if (vigilant >= 50)\n  [i][Check versus Vigilant: pass][/i]\n  *line_break\n  *line_break\n  What did it feel like?  A blood rush, bundled-up nerves coiled so tightly you could feel them.  Adrenaline pumping through your veins, time itself slowed down.  Frightening, and yet…intoxicating.  Does that answer your question, ${Brigid}?\n  \n  You aren't sure how ${shehe} takes your grim explanation, with ${herhis} face still turned away.  But eventually, the reply comes, though with less certainty than the speaker intended.  \"I see…I'll know what to expect now.  Don't worry about me when it comes to a fight, I can hold my own.\"\n  \n  When it comes to a fight, worrying about anyone but your opponents would get you killed.\n  *goto c4Vigilant1\n*else\n  What did it feel like?  Geez, thanks ${Brigid}, you've been going out of your way to try and forget that particular traumatizing experience.  You laugh it off, hoping that taking that particularly gruesome moment lightly would reduce your memory of it.\n\n  Your companion eventually replies, though praise is the last thing you expected to hear from ${herhim}.  \"I see…you're strong, ${name}.  I mean, mentally or whatever.  Most would still be shaking from something like that.\"\n\n  $!{shehe} must not have been paying close attention—your right hand has been twitching all this time.\n  *goto c4Vigilant1\n*label c4Vigilant1\n\nThe marketplace is ahead, and you find it blissfully empty.  From the look of the counters and stalls, this place has yet to be touched.  Or should you say torched?  If the healer's hut was any indication, the whole town will be set ablaze before morning comes.  On that note, you make for the smithy.  \n\nYou find the door ajar and its opening emitting a darkness from within.  No candles or lanterns are lit; no moonlight able to reach the innards of this foreboding abode.  Truth be told, it is not a particularly eerie sight, but you find yourself growing nervous nonetheless.  As a result, Disciple Kaine's words begin to flow about inside your head: [i]\"I see…your family tells me you work at the forge under a…Gundrik Brighthammer?\"[/i]\n\n[i]He was an old drunk.[/i]\n\nAfter regaining a bit of nerve, you burst through and inspect each of the rooms.  You're familiar with the layout due to the times his wife invited you to eat with them, every midweek.  Your eyes are used to the darkness by now, but even still, it's difficult to make the furniture out.  Calling out to them crosses your mind, but you decide against it.  It isn't that you're too afraid to speak!\n\n[i]He was stingy and never paid you well.[/i]\n\nNo one is on the base floor, so you go downstairs.  Dwarves prefer to sleep underground, though you never asked why.  It's damp and gloomy down there, to be sure, but at least it's warm.  Your voice returns, and you yell out for your employer, his wife, and their two daughters.  As you feel your way across the room, an altogether too-familiar smell rises upon you: metallic copper.\n\n[i]He was a taskmaster who never complimented your crafts.[/i]\n\nYou stumble over something soft.  You wish it was a footstool or a nightstand, but neither of those had beards.  Dammit Gundrik, why?!  Wake up, you old buffoon!  We've got some fresh steel that needs to be worked, and you know that you won't let me touch anything better than cheap pig iron.  Wake up!\n\nWords from behind are spoken softly, but in this noxiously quiet den, they drum against your ears.  \"${name}, I'm sorry…but we need to go.  None of them are breathing…\"\n\n${Brigid}'s hand on your shoulder jolts you awake—just how long have you been kneeling there, shaking the stout body of the blacksmith you used to work with?  Your eyes adapt to the complete blackness enough to make you wish they hadn't.  Gundrik's face…you'd puke at the sight of it if you had anything left in your stomach.  He might never have been handsome, even by dwarf standards, but the bruises and bleeding he has taken…\n\n*page_break\n\n[b]\"He didn't go down without a fight.\"[/b]\n\nThat is your conclusion.  You whisper a prayer for each of the four lumps on the ground.  You couldn't bear to check on the others—the family of Brighthammer has met its untimely end.  A guilt rises deep in your soul that even ${Brigid}'s words and logic couldn't extinguish.  You are conceding, abandoning them to rot down here for the maggots and worms.  And worst of all, you want nothing more than to escape from here, to never see them again.\n\nBefore leaving, a circular object mounted upon the wall catches your eye.  Above the bed rests a shield, and not just any shield.  Every dwarven family has an ancestral shield to watch over them.  It is a tradition held since before anyone could remember, or at least cared to.  And it turns out to be a superstition with no real merit…\n\nThe least you can do is to return it to a fellow Brighthammer.  You leave the blacksmith's house in silence, the new weight on your left arm a firm reminder of the family you are leaving behind.  Gundrik's battered face doesn't leave your mind.  Bruises like that came from blows to the head, blunt trauma.  Nothing in the house looked stolen…you have your ideas as to who the killer is, but choose to keep them to yourself.\n\n${Brigid}'s yell catches your attention before the smoke does.  \"${name}!  Down the hill!  Everything…is on…\"\n\nIt isn't hard to finish the redhead's sentence.  The black cloud of smoke turns the sky starless, and the screams and cries can be heard vividly even from up here.  It is a slaughter.  A distinctive woman's voice cries out desperately for mercy—it's the baker's wife begging for her life to be spared.  Her wails are abruptly silenced; the kind woman who offered you day-old quince bread at a discount is dead.\n\nThere is no militia to rally, guards to call in, or troops to summon.  You look at the fear in ${Brigid}'s face, unsure of what to do or if ${shehe}'ll live long enough to do it.  The Fates themselves are laughing at us, making sure we know just how powerless we are.  How futile it all is in the grand scheme of events.  It takes a pounding of horses coming your way to jolt you out of this hellish dream and into a real one.\n\nYou clench your shield and ${whichWeapon} until your knuckles go white.  Your comrade is still in shock, and the sounds of their approach don't seem to meet ${herhis} ears.  You try to shout at ${herhim}, but your voice just isn't there.  The only option left is to turn towards the horsemen and prepare for the worst.\n\nThe worst comes in the form of six large brown destriers carrying figures in black clerical robes.\n\nAll thought of hiding ends as the lead rider raises his hand to halt the others.  It is Disciple Kaine, who leads the horses into a slow trot through the marketplace right where you stand.  You'd have gulped your spit in fear if your throat wasn't so dry.  His robes are black, to be sure, but they glisten in the moon's fading light as they're soaked in blood.\n\n\"It seems as if you missed a couple in this district, Disciple Idricsa.\"  The tall, emotionless man points at you with a finger that might as well be holding a crossbow.  In a flash, one of the mounted riders drops to a kneel.  It is the female orc who had interrupted your conversation with Kaine hours ago.  How much saner the world was, back then.\n\n\"My sincerest apologies.  I will take care of this matter quickly.\"  The orc lifts her head, eyes cutting through you like a warm knife through butter.  It seems as if she intends to take you both by herself, and there is little doubt in your mind that she could.\n\n\"See that you do.  We've attained what we came here for.\"  When Kaine mentions it, your eyes draw towards the human-shaped bundle strapped to the back of his horse.  You had mistaken it for supplies, but…since when do supplies sport a head of long black hair?!  They had gotten to ${Silvana} after all, shattering all hope of any sort of victory.  If this group could take down such a powerful dark mage, what the hell are the chances you and ${Brigid} have?\n\nRefusing to grasp the futility of the situation, your friend plans out tactics in a hurried whisper.  \"${name}.  We have a chance if we both rush her at the same time.  If she's dodging us both…she shouldn't be able to attack.  All right?\"  You mutter a curse directed at yourself, as you're too focused on ${Silvana} to prepare for the very real danger approaching.  But it's a solid plan that might actually work, so you nod in agreement.\n\nKaine continues even as the two of you conspire on your desperate strategy.  \"We'll meet you on the road, then…but do be careful, Idricsa.  The one who fashions ${MC_himher}self as a dwarf is the ${MC_sondaughter} of a very troublesome hunter.  He gave me several scars before I crushed his ribs.\"  With that remark, Kaine takes one last look at you and rides off with ${Silvana} literally in tow.\n\nYour mind takes awhile to register the man's words.  It isn't that you're dumb, just that the safeguards residing within your brain try to delay them.  Your sanity has been pushed to the brim from the killing, not to mention the death and destruction that lay waste to the place you once called home.  And now Father is dead?  Ha, ha, ha…\n\n*set corruption +10\n[i]Your corruption grows[/i]\n\n*page_break\n\n[b]\"Ha, ha, ha!\"[/b]\n\nThat's it!  This is a dream, a nightmare that has finally showed its hand.  The story has just gotten sillier and sillier—why haven't you noticed it up until now?  Oh, but it all seemed so real!  How blissful it will be when you awaken and struggle to recall any of this!  To think your mind so lucid, so imaginative to create such a dreamscape…it's impressive.\n\n${Brigid} punches your shoulder, pain providing prudent evidence that this isn't just a nightmare after all.  \"P-please, ${name}, get ahold of yourself!  She's coming!\"\n\nYou have been laughing hysterically for who knows how long.  Well, long enough to make breathing hurt, at least.  This all is still a dream—it has to be—but it isn't over yet.  There's a black-robed orc standing in your way.\n\n*if (whichWeapon = \"sword\")\n  You clench your sword with all your might, hefting it in what you figure to be a ready position.  To your dismay, you realize how heavy it is to hold with only a single hand.  You could still swing it all right, but not with the sort of force you'd like.\n  *goto c4WhichWeapon3\n*elseif (whichWeapon = \"axe\")\n  You clench your axe with all your might, hefting it in what you figure to be a ready position.  But it comes to your attention just how heavy a dwarven waraxe is to hold with only a single hand.  You could still swing it all right, but not with the sort of force you'd like.\n  *goto c4WhichWeapon3\n*elseif (whichWeapon = \"dagger\")\n  You clench your dagger with all your might, hefting it in what you figure to be a ready position.  There is a bit of unease when you realize that you'd have to get in close-quarters combat for the short blade to be effective.  At the very least, however, your shield will provide you some cover and much-needed defense.\n  *goto c4WhichWeapon3\n*else\n  You clench your spear with all your might, hefting it in what you figure to be a ready position.  Except that feels awkward with only one hand; you can't put any power into the thrusts.  So instead of an underhand grip, you twist the spear so it's over your shoulder.  It looks as if you're tossing a javelin, but it allows you to put more of your back into it.\n  *goto c4WhichWeapon3\n*label c4WhichWeapon3\n\n\"${name}!  Lead with the shield, but don't lose sight of her!  I'll go right side!\"  ${Brigid} barks an order out, and it sounds almost like a legitimate tactic would.  But unfortunately for both of you, instead of charging mindlessly into your shield, Idricsa turns on a heel and beelines it to ${Brigid}.  Taken off guard, ${shehe} is nearly taken out by a snap kick to the stomach.  The orc's agility and speed hold nothing back.\n\nBut quick!  You have to get her focus off of your friend, or ${shehe}'s dead meat!\n\n*if (whichRace = \"orcs\")\n  You aren't sure what to say to draw her attention, so you say nothing.  Instead, you bang your weapon against your shield.  The noise echoes across the empty market, a noise you imagine those gladiator warriors make in the fighting pits.\n\n  [b]\"Loc'tur, Ugar!\"[/b]\n\n  A shout escapes your lips.  It's an orcish war cry, which you think means 'Victory or Death.'  Fates know why you said it or how you even recalled the phrase, but it felt right to say.  You heard the orcs of this village yell it out right before a vicious fight broke out, so why not do the same?  It does in fact catch your opponent's attention, as she charges straight at you.  Just what you…wanted?\n  *goto c4WhichRace2\n*else\n  You're no stranger to ill-spirited jokes and taunts.  Orcs are rather notorious for their lack of anger management, though throwing one into a rage is hardly a sound strategy.  Even still, if it means saving ${Brigid}…\n\n  Green-skinned, long-toothed, daughter of a pig#@%&*#.  Standard insults, along with a quip about how easy the vow of chastity must have been to take for someone with a face that looks more inbred than sandwich filler.  You chuckle at that last one—though the chuckles end as the target of your jibes charges straight at you.  Mission…accomplished?\n  *goto c4WhichRace2\n*label c4WhichRace2\n\nYou then realize your stance is completely out of whack.  There isn't time to correct it; screw it!  It's time for a good old-fashioned shield bash!  You reel in your left shoulder as you prepare your strike.  Timing would be everything and then some.  A little closer, yes…the pace of the light-footed warrior monk will never cease to amaze you.  Now!  Hur-ARH!\n\nYou feel nothing.  Your shield slams into the air, now serving no purpose other than to obstruct your view.  It's time to guess…did she dodge to your left or to your right?\n\n*temp combatMistake 0\n\n*choice\n  #My left.\n    *set renown +1\n    [i]You have gained renown[/i]\n    *line_break\n    *line_break\n    That's right!  I mean, left.  ${Brigid}—while winded—is off to your right side, so it would have been foolish of her to evade in that direction.  You bring your weapon down hard with a left downward swing.  As your shield moves with the rest of your body, it reveals your opponent to be right where you expected her.  But moments before your attack lands, she pops backward like a corn kernel in the summer sun.\n    *goto c4LeftRightChoice\n  #My right.\n    *set combatMistake +1\n    You bring your right arm down with a powerful vertical slash!  But as your shield moves away, you see nothing but air.  Your slice cuts the air with a swish.  You feel a heavy weight on your shield; the orc yanks it down with one hand while sending a clenched fist your way with the other.  The hardened knuckles make contact with the side of your face, though it's not a knockout, since you're already stumbling backwards when it lands.\n    *goto c4LeftRightChoice\n*label c4LeftRightChoice\n\nYou pull backwards to create some much-needed distance between you and your opponent.  It would seem that shield-bashing such a quick opponent will take skill you just don't have.  What you do have, though, is sharpened dwarven steel against a virtually unarmored opponent.  You'd be a fool not to use it!\n\n*if (whichWeapon = \"sword\")\n  A longsword affords you some good range against an unarmed opponent.\n  *goto c4WhichWeapon4\n*elseif (whichWeapon = \"axe\")\n  An axe affords you some decent range against an unarmed opponent, but considering its weight, you'll need all that and more.\n  *goto c4WhichWeapon4\n*elseif (whichWeapon = \"dagger\")\n  A dagger doesn't really give you much of a range advantage over a fisted opponent, but ask any guy—every inch matters.\n  *goto c4WhichWeapon4\n*else\n  A spear gives you range superiority over an unarmed opponent, the question is about missing your initial thrust.  There's too much at stake if she gets inside your range.\n  *goto c4WhichWeapon4\n*label c4WhichWeapon4\n\nYou have already determined that you're going to use a horizontal swing—much higher chance of landing against such a nimble opponent.  The question is, do you lunge into your swing or step back?\n\n*choice\n  #Lunge.\n    The orc priestess probably isn't expecting you to close ground on her.  If you can catch her before her initial dodge attempt, you're probably going to land a clean blow.\n\n    *if (whichWeapon = \"sword\")\n      *set combatMistake +1\n      You underestimate the length of your pounce, but your longsword is already on its way across.  There is no doubt in your mind that you're going to connect, which adds to the surprise when your opponent rolls like a barrel downhill to your left.\n      *goto c4LungeChoice\n    *elseif (whichWeapon = \"axe\")\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      For a split-second, you're worried that you pounced too soon, but by the time your heavy axe swings across, she's right where you want her.  You feel a resistance as your axeblade most certainly meets flesh, but it is the low and guttural yell that lets you know your strike has landed cleanly.  Your opponent rolls like a barrel downhill to your left, though more as an evasion than as a result of your strike.  The fresh red on your axe confirms it: even holy warrior monks can bleed.\n      *goto c4LungeChoice\n    *elseif (whichWeapon = \"dagger\")\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      At first, you're worried you pounced too soon, but by the time you bring your dagger across, she's right where you want her.  You feel a resistance as your shortblade most certainly meets flesh, but even more surprising is how your opponent rolls like a barrel downhill to your left.  The fresh red on your dagger confirms it: even holy warrior monks can bleed.\n      *goto c4LungeChoice\n    *else\n      *set combatMistake +1\n      You underestimate the length of your pounce, but your spear is already on its way across.  By the time you bring it around, she's already inside the tip's range.  To your surprise, she rolls like a barrel downhill to your left.  It's a lucky break that she didn't close in on you!\n      *goto c4LungeChoice\n  #Step back\n    The orc priestess is closing in distance fast, but you know she'll be even faster once she gets into range of your weapon.  A quick step back might get her in range.\n    \n    *if (whichWeapon = \"sword\")\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You surprise yourself at how well you judge the distance.  As you expected, she lunges right as she gets in range of the tip of your sword.  Too bad for her; that tip is now a foot back and on its way down for a devastating swing.  You feel a resistance as your blade most certainly meets flesh, but it is the low and guttural yell that lets you know your strike has landed cleanly.  Your opponent rolls like a barrel downhill to your left, though more as an evasion than as a result of your strike.  The fresh red on your sword confirms it: even holy warrior monks can bleed.\n      *goto c4LungeChoice\n    *elseif (whichWeapon = \"axe\")\n      *set combatMistake +1\n      You overestimate the length of your backstep, and you look as if you're about to swing and miss right before she's going to get in range.  To your surprise, she rolls like a barrel downhill to your left.  It's a lucky break that she didn't close in on you!\n      *goto c4LungeChoice\n    *elseif (whichWeapon = \"dagger\")\n      *set combatMistake +1\n      You overestimate the length of your backstep, and you look as if you're about to swing and miss right before she's going to get in range.  To your surprise, she rolls like a barrel downhill to your left.  It's a lucky break that she didn't close in on you!\n      *goto c4LungeChoice\n    *else\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You surprise yourself at how well you judge the distance.  As you expected, she lunges right as she gets in range of the tip of your spear.  Too bad for her; that tip is now a foot back and on its way down for a powerful swing.  You feel a resistance as the spear's edge most certainly meets flesh!  Your opponent rolls like a barrel downhill to your left, though more as an evasion than as a result of your strike.  The fresh red on your spear confirms it: even holy warrior monks can bleed.\n      *goto c4LungeChoice\n*label c4LungeChoice\n\nIdricsa yells curses no one wearing priest robes ought to be saying.  It is the orcish sort of foul language one is better off never understanding.  \"I can't believe a kid like you is forcing me to use these.\"  Out from her sleeves slide two sharpened steel batons with…hooks on either side?  It is an exotic weapon you have never seen before.  \"My shame will be cleansed with your blood, ${MC_boygirl}.\"\n\n${Brigid} pipes up, causing you to remember that ${shehe}'s still part of this battle.  \"$!{name}, those are sais.  They're from the Western lands and good for trapping blades in their hooks!\"  Both an interesting and useful piece of advice…you'll have to factor in the possibility of them catching your weapon's swing attacks.  You release a breath you didn't realize you were holding in.  Though it feels like combat has lasted hours, only a handful of seconds has passed.  The orc approaches you, more methodically this time.\n\nWith a sai in each hand, you aren't sure where it's safe to strike.  ${Brigid} joins your side as you prepare to engage her together.  You're all out of ideas as far as strategy goes, but if those weird-looking weapons work like you think they do…\n\n*choice\n  #Attack with my weapon.\n    *if (whichWeapon = \"sword\")\n      *set combatMistake +1\n      It is impossible to dodge two sword swings at once, right?  That is your logic as you and ${Brigid} swing in unison against your foe.  Yes!  She doesn't dodge your attack in time!  No!  She's blocking both blades with a sai each?!  You didn't expect this sort of strength, nor did you expect her to slide them down the blades.  They slide down with sparks marking their path, and there's nothing you can do.\n      \n      With a flip of the wrist, the hook drives into your right hand, and from ${Brigid}'s yell, you know ${shehe} has suffered the same injury.  The sharp pain is enough to drive you mad, but you're already there.  You push your attacker back with your shield.\n      *goto c4WeaponShieldChoice\n    *elseif (whichWeapon = \"axe\")\n      *set combatMistake +1\n      It is impossible to dodge a sword and an axe swing at the same time, right?  That is your logic as you and ${Brigid} swing in unison against your foe.  Yes!  She doesn't dodge your attack in time!  No!  She's blocking both weapons with a sai each?!  You didn't expect this sort of strength, nor did you expect her to slide it down your axe's edge.  It slides down with sparks marking its path, and there's nothing you can do.\n      \n      With a flip of the wrist, the hook drives into your right hand, and from ${Brigid}'s yell, you know ${shehe} has suffered the same injury.  The sharp pain is enough to drive you mad, but you're already there.  You push your attacker back with your shield.\n      *goto c4WeaponShieldChoice\n    *elseif (whichWeapon = \"dagger\")\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      It's true, she could use those fancy weapons to grab ahold of a slashing weapon, but daggers have a different means of dealing damage.  Right as ${Brigid} swings ${herhis} sword down, you thrust your oversized knife right into your attacker's stomach.  The sai comes down to intercept, but the tip of your dagger makes contact before she can deflect it.\n      \n      But somehow…you see the orc's wrist twist in a nearly unnatural fashion.  The sai's hook digs into your palm.  ${Brigid}'s yell lets you know ${shehe} has suffered the same injury.  The monk retreats before you're able to react with your shield.\n      *goto c4WeaponShieldChoice\n    *else\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      It's true, she could use those fancy weapons to grab ahold of a slashing weapon, but spears have a different means of dealing damage.  Right as ${Brigid} swings ${herhis} sword down, you thrust your dwarven spear right into your attacker's stomach.  The sai comes down to intercept, but the tip of your glaive makes contact before she can deflect it.\n      \n      But somehow…you see the orc's wrist twist in a nearly unnatural fashion.  The sai's hook suddenly glides across the shaft of your spear, stopping only after digging into your palm.  ${Brigid}'s yell lets you know ${shehe} has suffered the same injury.  The monk retreats before you're able to react with your shield.\n      *goto c4WeaponShieldChoice\n  #Attack with my shield.\n    *if (whichWeapon = \"sword\")\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      Swinging a sword against one of those exotic dagger-things is asking for a bad time.  The safer play is to use the circular sheet of iron you're holding in your left hand instead.  If you're lucky, you might even be able to get her off-balanced enough for ${Brigid}'s strike to land.  A loud 'thump' lets you know your shield has landed, pushing Idricsa right into your ally's sword.\n      \n      Or at least, that was the idea.  The orc manages to block the sword's blade with one sai and strike at ${Brigid}'s sword arm with the other.  Her body then twists, and before you realize it, a sharp pain replaces the tight grip you had on your longsword.\n      *goto c4WeaponShieldChoice\n    *elseif (whichWeapon = \"axe\")\n      *set renown +1\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      Swinging an axe against one of those exotic dagger-things is asking for a bad time.  The safer play is to use the circular sheet of iron you're holding in your left hand instead.  If you're lucky, you might even be able to get her off-balanced enough for ${Brigid}'s strike to land.  A loud 'thump' lets you know your shield has landed, pushing Idricsa right into your ally's sword.\n      \n      Or at least, that was the idea.  The orc manages to block the sword's blade with one sai and strike at ${Brigid}'s sword arm with the other.  Her body then twists, and before you realize it, a sharp pain replaces the tight grip you had on your axe.\n      *goto c4WeaponShieldChoice\n    *elseif (whichWeapon = \"dagger\")\n      *set combatMistake +1\n      You decide against using your dagger against hers, opting instead for the safer play, to make use of the circular sheet of iron you're holding in your left hand.  If you're lucky, you might even be able to get her off-balanced enough for ${Brigid}'s strike to land.  A loud 'thump' lets you know your shield has landed, pushing Idricsa right into your ally's sword.\n      \n      Or at least, that was the idea.  The orc manages to block the sword's blade with one sai and strike at ${Brigid}'s sword arm with the other.  Her body then twists, and before you realize it, a sharp pain replaces the tight grip you had on your dagger.\n      *goto c4WeaponShieldChoice\n    *elseif (whichWeapon = \"spear\")\n      *set combatMistake +1\n      You decide against using your spear against her weird-looking daggers, opting instead for the safer play, to make use of the circular sheet of iron you're holding in your left hand.  If you're lucky, you might even be able to get her off-balanced enough for ${Brigid}'s strike to land.  A loud 'thump' lets you know your shield has landed, pushing Idricsa right into your ally's sword.\n      \n      Or at least, that was the idea.  The orc manages to block the sword's blade with one sai and strike at ${Brigid}'s sword arm with the other.  Her body then twists, and before you realize it, a sharp pain replaces the tight grip you had on your spear.\n      *goto c4WeaponShieldChoice\n*label c4WeaponShieldChoice\n\nThe pain in your right hand becomes the center of your focus, blood filling the cracks of your palm and leaking down your arm.  Just what sort of move was that?  You try to tighten your grip—big mistake.  You can't even attempt to suppress a cry of pain.  That hand isn't going to help you anymore in this battle.  ${Brigid} picks up ${herhis} longsword with ${herhis} left hand, adjusting ${herhis} stance.  You didn't know ${shehe} was ambidextrous.\n\n\"Idiot, I'm not!  But Fates burn me alive if I go down without cutting this green bitch down first!\"  $!{shehe} is outbursting ${herhis} frustrations upon you, just as ${shehe} so often did in the past.\n\nHa!  The redhead hasn't changed, even in the heat of this desperate battle.  If it wasn't for the pulsating pain in your hand, you might even have cracked a smile.  You take a momentary pause to ask your attacker a question.  You need to know what they're planning to do with ${Silvana}.\n\nDisciple Idricsa is almost visibly taken aback at your knowledge.  \"$!{herhim}?  So you're familiar with the lichspawn?  Interesting…not that it matters to a dead ${MC_manwoman}, but we have plans to make use of what's inside of ${herhim}.  Powers a peasant dirt farmer like you could never imagine.\"\n\n[b]\"Try me.\"[/b]\n\nYour shield hits the ground with a loud 'clank' as you take a note from ${Brigid}'s playbook by becoming a lefty.  Except you can hardly raise your weapon, much less use it with any accuracy.  The member of the Cossack Order grins, knowing just how weak and pathetic the two of you are now.\n\n*if (whichRace = \"orcs\")\n  Her voice contorts into a snarl.  \"[i]Loc'tur, Ugar.[/i]  Hearing human filth like you butcher those words, just as you butchered my tribe…I have gone through more than you can imagine to become a Disciple of the Cossack Order.  I serve a purpose you cannot ever understand.  The Fates work through me!  ME!\"\n  *goto c4WhichRace3\n*else\n  Her voice contorts into a snarl.  \"Green-skinned, long-toothed.  Pig%&@#$#.  I know those words in Elvish, Gnome-speak, even Dwarvish.  You have no idea what I've gone through to become a Disciple of the Cossack Order.  I serve a purpose you cannot ever understand.  The Fates work through me!  ME!\"\n  *goto c4WhichRace3\n*label c4WhichRace3\n\nIt is a touching backstory, to be sure, but you find it hard to sympathize with a murderer.  Their faces show up in your mind.  So this is her 'district,' huh?  Gundrik, his wife and two daughters…a purpose you could never understand, huh?  The work of the Fates, huh?\n\nA memory from months ago surfaces.  Your magic instructor was trying to get ${herhis} stubborn student to learn how to concentrate for the very first time.  $!{herhis} calm yet encouraging words held complete confidence in you, even after the hundredth failed attempt.  [i]\"Focus, ${name}.  There are no separations.  We are all one spirit with many forms, pushing and pulling against each other with this free-flowing energy.  Understand this energy, visualize and manifest it inside yourself.  You can do this, ${name}.\"[/i]\n\n${Silvana}.  Just thinking of ${herhis} name is enough to fill you with guilt.  You couldn't save ${herhim}.  Did you even try?  What a waste of time, trying to teach a dirt farmer like you magic tricks.\n\nIn complete focus, pain itself is something off in the distance.  Like your hand…oh, and your stomach too.  The orc…Idricsa is her name.  Idricsa jumps on top of you like a cat does a mouse, making your stomach hurt in several p
