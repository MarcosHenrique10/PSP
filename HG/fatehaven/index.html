 to this day.\n      *goto conclusionEnd\n  *elseif (renownLevel = \"medium\")\n    *if (isCorrupted = false)\n      ${name} was eventually regarded as a hero, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Together with the Cossack Order, the mage was able to put the war to a swift end with minimal casualties.  ${name} was forced to leave Fatehaven for a time afterwards, a lone wanderer with a power everyone feared.  $!{MC_heshe} traveled all across the globe, visiting the lizardpeople of the eastern deserts and faefolk of the southern jungles.  ${name} eventually returned home and settled down to a happy, peaceful life.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage joined the war effort to obliterate the foreign forces, displaying a show of force that caused them to quickly surrender.  The Delmacian King granted ${MC_himher} the title of Royal Magician, along with plentiful lands.  It was a fine tribute.  ${name} enjoyed the rest of ${MC_hisher} days in wealth.  $!{MC_heshe} took no ${wifehusband} but was hardly lonely.\n      \n      Many books have been written of ${MC_himher} since, and most regard ${MC_himher} as the most prominent harbinger of the new era to this day.\n      *goto conclusionEnd\n  *else\n    *if (isCorrupted = false)\n      ${name} was eventually forgotten to time, years after ${MC_hisher} death.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  Unwilling to use ${MC_hisher} powers for such an affair, ${name} stayed out of the matter completely.  Instead, ${MC_heshe} opted to settle down in Fatehaven for a happy and peaceful life.\n      *goto conclusionEnd\n    *else\n      ${name}'s ambitions grew along with ${MC_hisher} powers.  After successfully altering the course of the impending asteroid, Nanchou invaded Delmacia.  The powerful mage joined the war effort to obliterate the foreign forces, displaying a show of force that caused them to quickly surrender.  Unfortunately, ${MC_hisher} power was so great, Delmacians feared ${MC_himher} as a demon and not a savior.  ${name} would wander the land alone, and few books would even speculate what became of ${MC_himher}.\n      *goto conclusionEnd\n*label conclusionEnd\n*goto_scene ending", "chapter2": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 2\n\n——————————————\n*line_break\n—————————— Chapter 2: The Shade of Your Soul\n*line_break\n——————————————\n\nIt puts you behind the very slow-mannered and slower-paced dwarven blacksmith, Gundrik.  You hail him down, quickly matching the shorter man's pace.\n\n*if (whichClothes = \"sexy\")\n  *if (gender = \"male\")\n    \"M-mah ahpologies, sir, ain't knew we 'ad cityfolk attendin.  I am but uh-wait!  ${name}?  Ye look sharper than a day-old dagger!\"  While Gundrik is hardly a tailor by any means, he is a craftsman and can recognize fine work when he sees it.\n    *goto c2MeetGundrik\n  *else\n    \"M-mah ahpologies milady, ain't knew we 'ad cityfolk attendin.  I am but uh-wait!  ${name}?  Ye look sharper than a day-old dagger!\"  While Gundrik is hardly a tailor by any means, he is a craftsman and can recognize fine work when he sees it.  And that includes your cleavage, it seems.\n    *goto c2MeetGundrik\n*elseif (whichClothes = \"traditional\")\n  \"Hm?  Didn't know monks could be so youn-oh wait, is that ye, ${name}?  Thought humans your age were all 'bout bright clothes, shows how much ah know.\"\n  *goto c2MeetGundrik\n*else\n  \"Ah, ${name}!  Lookin' like yer best ah see.\"\n  *goto c2MeetGundrik\n*label c2MeetGundrik\n\nThe dwarf is a talker and then some; you realized that from helping out at the forge two summers ago.  \"—'fraid mah wife will have me throat slit afta gettin' coal from tha forge on me tunic.  Ah been finishin' up retouchin' tha new-weds sword.\"  You had completely failed to notice the blanketed bundle on Gundrik's back.  The blacksmith has been longtime friends with ${Brigid}'s father and grandfather, so a ceremonial blade is the perfect gift.\n\nWait a second.  The Gundrik you know only makes gates, nails, and farming equipment.  \"Ah, that be true, 'ah don't usually make weapons.  Just ain't the demand for 'em.  But I'll be darned if a dwarf works ah forge who don't know how'ta make a straight edge!\"  Speaking of straight edges, ${Brigid}'s makeshift sword needs some serious work done on it.  And not just a new coat of golden paint or whatever it is that ${shehe}'s so intent on it having.\n\n\"$!{shehe} asked me before, aye.  Tha golden one.  O'course it ain't be real gold—tha'd be a laugh—just colored with plated brass that be well-polished.\"  The blacksmith pauses, visualizing the weapon as if he is holding it in his hand.  \"Edge needs work…but ta sharpen steel that damaged, ye be lucky to get 'ah shiv after I was done with it.\"  \n\nWith ${Brigid}'s birthday coming up in a few weeks, you figure that the perfect opportunity has presented itself.  It's not that you care that much about it…just that you can't help but plan ahead, is all.  What do you ask of Gundrik?\n\n*choice\n  #Melt it down into a new blade.\n    *set whichBrigidSword \"remade\"\n    *set resourceful %+10\n    [i]Resourceful has increased[/i]\n    *line_break\n    *line_break\n    ${Brigid} is attached to that sword, and having part of it in a new one would likely help with that.  On the more practical side of things…steel isn't cheap nor readily available around these parts.  You want to give ${herhim} a meaningful gift, but you don't want to have to pay an arm and a leg for it!\n    \n    \"Ye might have an idea thar…aye, ah could do that for ye at a fair price.\"\n    *goto c2ForgeChoice\n  #Forge a new and better blade.\n    *set whichBrigidSword \"new\"\n    *set sly %-10\n    [i]Powerful has increased[/i]\n    *line_break\n    *line_break\n    ${Brigid} is going to be joining the military and needs a sword that actually fits ${herhis} hands and cuts the air instead of swatting it.  This requires a new blade, but it won't be cheap.  You're going out of your way for this one, but ${Brigid} is an old friend.  And maybe…never mind.\n    \n    \"Ah new blade fer ah new knight…ah could forge it, but it would cost ye.  It takes longer then ye'd have thought.\"  You've got a portion of the payment now, the rest you can work off helping at the forge this autumn.\n    *goto c2ForgeChoice\n*label c2ForgeChoice\n\nUsually, you'd have made it to the church and halfway back by now, but you keep to the dwarf's slow pace.  It's rare to be able to speak with him without having sweat sting your eyes from the heat of the forge's fires.  But aside from that, you're genuinely enjoying the conversation.  \n\n\"Speakin' oh weapons, ye can tell alot about ah ${MC_manwoman} by ${MC_hisher} weapon o' choice.  So what do ye fancy?\"\n\n*choice\n  #Dagger.\n    *set whichWeapon \"dagger\"\n    *set sly %+20\n    *set loner %+10\n    [i]Sly has greatly increased[/i]\n    *line_break\n    [i]Loner has increased[/i]\n    *line_break\n    *line_break\n    Unlike other weapons, the dagger is something you can carry on your person without there being a big fuss about it.  The sword comes from its scabbard, but the dagger?  It comes from anywhere, and its bite is just as sharp.\n\n    \"A dagger, aye?  Ye gotta be quick 'n nimble leik ah gnome ta use it well, but I reckon ye can too.  Always nice ta have a bit o' steel in your pocket!\"\n    *goto c2WeaponChoice\n  #Axe.\n    *set whichWeapon \"axe\"\n    *set sly %-20\n    *set suave %-10\n    [i]Powerful has greatly increased[/i]\n    *line_break\n    [i]Direct has increased[/i]\n    *line_break\n    *line_break\n    No weapon lets you put your muscles to work like an axe-swing does.  It might not have the elegance a fancy blade has, but it more than makes up for it in sheer power.  People fall down far easier than trees do.\n    \n    \"Aha!  Ah human after me old 'wee dwarven heart!  Ain't nothin' like ah good battle axe by ye side, choppin' ye foe limbs left an' right, howling like tha madman that ye are!  Ah, good times that was.\"\n    *goto c2WeaponChoice\n  #Sword.\n    *set whichWeapon \"sword\"\n    *set loner %-10\n    *set logical %-10\n    *set suave %-10\n    [i]Leader has increased[/i]\n    *line_break\n    [i]Emotional has increased[/i]\n    *line_break\n    [i]Direct has increased[/i]\n    *line_break\n    *line_break\n    If you want a weapon that commands the esteem of the people, look no further than the true symbol of the knight.  Unlike other weapons used in war, the sword serves no purpose aside from killing.  A good swords${MC_manwoman} cuts ${MC_hisher} own way in the world.\n    \n    \"Ah figured ye would say that.  Ye humans can't get ahnough of em, but I will say there's no prettier weapon ye'll like to find.  A none prettier than tha one I've got on me back, ha-har!\"\n    *goto c2WeaponChoice\n  #Spear.\n    *set whichWeapon \"spear\"\n    *set logical %+20\n    *set sly %+10\n    [i]Logical has greatly increased[/i]\n    *line_break\n    [i]Sly has increased[/i]\n    *line_break\n    *line_break\n    Imagine yourself in a life-or-death duel to the death.  What do you choose?  It's obvious, you pick what gives you the most reach and killing potential.  A good spear${MC_manwoman} can hold off half a dozen swordsmen, if ${MC_heshe} had to.\n    \n    \"Now there be somethin' I won't be expectin'!  Ye know, most folks think us dwarves only use axes n' hammers, but 'twant true at'all.  Ye get yeself into formation, ye can take calvary charges and ah whole lot more!\"\n    *goto c2WeaponChoice\n*label c2WeaponChoice\n\nAt long last, you make your way to the chapel.  Apparently, the proceedings are already underway, and pairs are walking down the lane!  You spot ${Brigid} looking around frantically and prepare yourself for a mouthful of colorful curses.  $!{shehe} is dressed in a conservative green ${gowntunic}, which while old and slightly faded, does match well with ${herhis} auburn locks.\n\n*if (whichClothes = \"sexy\")\n  You expect a tongue-lashing, but what you get is a bunch of awkward mumbling as the redhead is at a complete loss for words.  It must be your fetching attire that caught ${herhim} off guard.  You decide to kneel over-dramatically, the way you imagine nobles at royal balls would.  ${Brigid} hurries you inside, unamused.\n  *goto c2Clothes1\n*elseif (whichClothes = \"traditional\")\n  \"You're late, ${name}!  Hurry up and walk down the aisle with me!\"  The wrist strength on your companion is immense as ${shehe} practically drags you into the church with ${herhim}.\n  *goto c2Clothes1\n*else\n  \"You're late, ${name}!  Hurry up and walk down the aisle with me!\"  The wrist strength on your companion is immense as ${shehe} practically drags you into the church with ${herhim}.  You notice that ${shehe} does give your outfit a lingering once-over, though.\n  *goto c2Clothes1\n*label c2Clothes1\n\nThe chapel is lit up brighter than the stars through a gnomish looking-glass.  Banners and sigils paired with countless flowers adorn the walls and pews, where everyone you know and a few you don't are kneeling.  Younglings wailing and acting out as they usually do, organs playing, even a harp!  ${Brigid}'s family truly spared no expense.  $!{shehe} locks ${herhis} arm into yours firmly as you make your way down.  It is impossible not to imagine this wedding as your own in the future; would everyone make such a fuss over your marriage like this?  Would you even want them to?\n\nAs the two of you reach the altar, you curtsy in unison to the new couple, who smile but with eyes in a place worlds apart.  It must be so surreal for them, to be the beacons of so much celebration and joy.  ${Brigid} and you then split apart to join up with your respective families.  The priest starts the sermon, and a series of kneeling and standing begins.  The one interactive part is coming up shortly, however.\n\nA member of each family present has to say a blessing.  You grew up with ${Brigid}'s older sister often as your babysitter when your folks couldn't be bothered, and you feel the blessing should come from you.  But what sort of blessing should it be?\n\n*choice\n  #Wealth.\n    *set whichBlessing \"wealth\"\n    *set resourceful %+10\n    [i]Resourceful has increased[/i]\n    *line_break\n    *line_break\n    Health, happiness, and getting knocked up are the three most common blessings everyone uses at a wedding.  But let's be a bit more practical.  A happy and healthy family is first a wealthy one, plain and simple.  You bestow the rarely used blessing for wealth upon their family, earning a sharp look from the priest but smiles from the happy couple all the same.\n    *goto c2BlessingChoice\n  #Fertility.\n    *set whichBlessing \"fertility\"\n    *set resourceful %-10\n    [i]Faithful has increased[/i]\n    *line_break\n    *line_break\n    Blessings for fertility always seem a bit strange to you, seeing as the couple is sure to try their darndest regardless of your intentions.  But you never knew.  A wife who couldn't bear children in these days was not looked highly upon by herself nor the community.  You don't want her to go through something like that, and you recite the prayer as they smile.\n    *goto c2BlessingChoice\n  #Health.\n    *set whichBlessing \"health\"\n    *set resourceful %-10\n    *set suave %-10\n    [i]Faithful has increased[/i]\n    *line_break\n    [i]Direct has increased[/i]\n    *line_break\n    *line_break\n    You'd be surprised at the number of women who don't make it through childbirth in this day and age.  Having kids is a certain danger, not to mention that the kids themselves can turn out sickly and…no, there's nothing to jest about.  You give an elaborate blessing of health upon the two of them and their future children, even getting a nod of approval from the priest out of it.\n    *goto c2BlessingChoice\n*label c2BlessingChoice\n\nYour stomach growls as the rest of the families carry on with their blessings.  A feast the likes of which your stomach has never digested awaits you just several lengths away, but this ceremony is barely half over.  \"To those who wish to read along, open to Municipalities five, chapter fourteen.\"  Ah yes, the reading section of this ordeal.  You grab one of the books from the back of the pew in front of you, as do many others in attendance.  For the majority of them, it is just for appearances sake; the ability to read is not terribly common as of yet.  You should count yourself lucky!\n\nLet's see…Municipalities…you flip through pages quickly until your eyes freeze.\n\nProtations IV.\n\n${Silvana}'s words—whispered just as soon as you had left ${herhim}—resound within your mind.  This morning seems like forever ago, with all the fuss about wedding preparations.  $!{shehe} was trying to tell you something, something written on chapter seven in sentence ten!  Your eyes scour the pages until you come across the correct set of words.\n\n[i]\"And it was then known that which was spoken is falsehood; let truth then be revealed under the moon's light whence paths first crossed.\"[/i]\n\nYou aren't sure how many times you read and re-read that phrase.  Falsehoods and moonlight…if your interpretation is correct, something isn't right, and ${Silvana} wants to meet you at midnight where 'paths first crossed.'  So that means…\n\n\"${name}!  Git yer head out of the book, I swear.  A growin' ${MC_boygirl} who'd rather read scribbles then eat a feast…\"  Your mother snaps you back into reality, and you notice that the chapel is now mostly empty.\n\nThe ceremony has ended, and a far more joyous and drunken celebration has taken its place.  You enjoy the food and drink as best you can, but that passage remains stuck in your head.  Why did ${Silvana} have to lie?  What was ${shehe} hiding?  A slap on the lower-back area breaks you out of your thoughts.  A drunk ${Brigid} is to blame.\n\n\"Aha!  ${name}!  Ah been lookin' for yaaaaaa…hahaha…\"  You find your personal space to be invaded; your childhood friend's face now hangs but inches from yours.  It is brimming with ${girlboy}ish ${gigglechuckle}s, no doubt the effects of merriment.  It is safe to say ${shehe} has had one too many ales to drink.  \"[i]*hiccup*[/i] Ah heard from tha smithy what ya offered for my—[i]*hic*[/i]—birthday.  And here ah thought you'd forgotten 'bout me, hehe…\"  Curse that Gundrik, couldn't keep a secret if his life depended on it.\n\nThe redhead wraps a friendly arm around you, perhaps more than a little friendly.  Night is falling quickly, and your head is in a completely different place.  It is probably best you start heading home.  ${Brigid} doesn't quite like the idea of you bailing out early, however.  \"Y-you can't leave yet!  Have some more ta drink, have some fun!\"\n\n*temp stayedLonger \"true\"\n\n*choice\n  #I guess I can stay a bit longer.\n    *set stayedLonger \"true\"\n    *set brigidRelationshipPoints +1\n    *set vigilant %-10\n    [i]Your relationship with ${Brigid} grows[/i]\n    *line_break\n    [i]Carefree has increased[/i]\n    *line_break\n    *line_break\n    Midnight is still a ways off yet, and you owe it to your friend to enjoy yourself at the party.  Not that it's difficult with all that free food and drink!  Everyone from town is pulling out their best stories, and they just keep getting better as more drinks get brought around.  You feel a warmth press against your ${MC_chestbreast}, only to realize ${Brigid} has passed out beside you.  Cute as the sight is, it reminds you that you have to be off at once.\n    *goto c2LeaveChoice\n  #I should get going now.\n    *set stayedLonger \"false\"\n    *set vigilant %+10\n    [i]Vigilant has increased[/i]\n    *line_break\n    *line_break\n    Try as you might, you just can't find yourself able to enjoy this party.  It's good to see the usuals in town in such high spirits, and you do wish you could listen in on some of their stories…but ${Silvana} is your primary concern at the moment.\n    *goto c2LeaveChoice\n*label c2LeaveChoice\n\nThis summer's night, while warm, draws in a cool breeze that buffets you on your way back home.  The 'paths' where the two of you first crossed were out in the forest that is your backyard.  You can retrace the exact spot in your mind vividly: it was where you and your father tried your hardest to save the life of a noble${womanman}.  Or maybe that was a lie, too.  What sort of emotion are you feeling the strongest?\n\n*temp strongestEmotion \"anger\"\n\n*choice\n  #Anger.\n    *set strongestEmotion \"anger\"\n    *set logical %-10\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    And rightfully so!  $!{shehe} had lied to ${herhis} own rescuer?  Who does such a thing, unless there's something that needs to be kept private?  But if ${herhis} story of bandits attacking ${herhis} family is false, then your sympathies were wasted.  And that pisses you off.\n    *goto c2FeelingChoice\n  #Curiousity.\n    *set strongestEmotion \"curiosity\"\n    *set suave %+10\n    [i]Suave has increased[/i]\n    *line_break\n    *line_break\n    This mystery is just getting more and more interesting.  The tale of the merchant caravan raid was exciting enough, but if that was just a cover for something even more intriguing, then all the better!  It's as if a character from a story just fell into your lap.  Ahem.\n    *goto c2FeelingChoice\n  #Uncertainty.\n    *set strongestEmotion \"uncertainty\"\n    *set vigilant %+10\n    [i]Vigilant has increased[/i]\n    *line_break\n    *line_break\n    There aren't many folks in these parts that have reason to keep secrets from anybody, and those that do aren't likely the sort you'd want to find yourself around.  This whole situation smells of trouble, and it feels as if you're about to take a dive straight into it.\n    *goto c2FeelingChoice\n*label c2FeelingChoice\n\nYou arrive at the spot where you found ${Silvana} yesterday.  The patch of ground is still red with blood, and the smell is nearly as crisp as it was during that horrific scene.  Not the imagery you'd want to have after a bellyful of the wedding's feast.\n\n*if (stayedLonger = \"true\")\n  \"It's a bit uncouth to leave a ${ladygentleman} waiting, you know.\"\n  *goto c2StayedLonger1\n*else\n  \"You're early, ${name}.  How very prudent.\"\n  *goto c2StayedLonger1\n*label c2StayedLonger1\n\n${Silvana} slips out of the shadows and melds into reality like some sort of illusion.  $!{herhis} expression paints a very sly smile underneath black opal eyes.  A pressure swells within your chest, and your mind knows one thing as fact: this ${womanman} is dangerous.\n\n\"It pleases me immensely that you deciphered my message, and even more so that you didn't bring that…lout along with you.  There are some words that less sophisticated sorts are better off not hearing.\"  $!{shehe} stares intently upon your face before nodding.\n\n*if (strongestEmotion = \"anger\")\n  \"You are mad at me, but try not to think me foul…I will answer any and all of your questions, ${name}.\"\n  *goto c2StrongestEmotion1\n*elseif (strongestEmotion = \"curiosity\")\n  \"You have a mind full of questions; allow me to ease that burden.  I will answer any and all of your questions, ${name}.\"\n  *goto c2StrongestEmotion1\n*else\n  \"You are cautious, trying to puzzle out who I am and whether you should have brought steel with you.  Be at ease, I will answer any and all of your questions, ${name}.\"\n  *goto c2StrongestEmotion1\n*label c2StrongestEmotion1\n\nAll your questions, aye?  You don't want to look afraid, so you have to ask something.  But what?\n\n*choice\n  #The bandit story.\n    *set logical %-10\n    [i]Emotional has increased[/i]\n    *line_break\n    *line_break\n    You have to know if that story of ${hershis} was full of more crap than a constipated workhorse.  It takes a good liar to come up with a story like that on the spot, and good liars tend to be bad people.  Why lie to the person who helped save your life?\n    \n    \"Indeed…it was a lie.  While I am certainly on the run and in a troublesome state, bandits had naught to do with it.  To think that someone with my powers has to run like a hunted three-legged fawn…\"\n    *goto c2QuestionChoice\n  #Your injury.\n    *set suave %+10\n    [i]Suave has increased[/i]\n    *line_break\n    *line_break\n    As a personal motto of yours, you never start a conversation (serious or otherwise) on the wrong foot.  So to break the air of tension, you ask about ${hershis} in the literal sense.  Should ${shehe} really be out here on a bad foot like that?\n    \n    \"I am being sincere when I say that your concern heartens me.  I feel nothing but sharp pins as I step, so you needn't fear me in a footrace.  To think, an individual with my powers, hardly able to walk unaided…\"\n    *goto c2QuestionChoice\n  #Why I'm here.\n    *set logical %+10\n    [i]Logical has increased[/i]\n    *line_break\n    *line_break\n    Before you get to anything else, you need to know the motivation behind cryptically bringing you out into the middle of the woods.  Granted, you know the area like your own backyard (because it is), but this is a weird custom even for nobility.\n    \n    \"Your pertinence shan't cease to amaze me.  I've brought you here because I require your aid, and fear I might not survive without it.  To think, one with my powers who must be so reliant upon others, there simply is no greater shame…\"\n    *goto c2QuestionChoice\n*label c2QuestionChoice\n\nHold on a moment; 'powers?'  You aren't quite sure about members of the upper class, but down here you don't describe your remarkable sewing abilities or wood-chopping skills as powers.  Your puzzlement at ${herhis} terminology prompts a demonstration, the display of which you will never forget.\n\nA chant of words in a language you don't know, sounds you didn't know a human could make, dance out of ${Silvana}'s lips with the greatest of ease.  An elvish minstrel would be envious of that soft, melodic tone.  $!{shehe} places ${herhis} hands together as if in prayer, eyes shut tightly as a chill around you gathers.  Shivers run down your spine as you notice the world around you start to fade.  The colors of the forest go from greens and browns to hues of gray.\n\nYour eyes return to ${Silvana}'s ghostly figure, which looks both the same and completely different than ${shehe} did before.  You see yourself inside ${herhis} eyes; with vivid clarity beyond any mirror, you see a ${MC_boygirl} staring back at you.  There's no expression on ${MC_hisher} face. In fact…there's no mouth at all!  You instinctively try to open your lips only to find them sealed tight, groaning and gasping for air that isn't there.  The figure inside ${Silvana}'s eyes grins menacingly, a mouthless smirk as its eyes roll backward and pupils turn inwards.\n\nThe world turns upside down as your vision follows, and realizing that your body is not your own to control—you panic!  Flailing like a mad${MC_manwoman}, begging for it all just to end—and it does.\n\n\"You'll have to forgive me, I did not intend to put that much force behind the illusion.  Consider yourself lucky, weaker-minded men have died from less.\"  Dazed would be putting your present condition mildly.  You take the magician's outstretched hand instinctively, only realizing afterwards that ${shehe} was the reason you were flat on the ground in the first place.\n\nA polite smile emerges from ${Silvana}'s pale face, ${herhis} following words those of one who has just found ${herhim}self happily impressed.  It's unfortunate that they make entirely no sense to you.  \"Magic is a rarity on this plane; only a handful of elves centuries old hold any sort of mastery over it.  After the Magi Wars 300 years ago nearly ripped the world apart, the Church of Fates was created to enforce complete ignorance of this innate power.  Needless to say, they've succeeded quite profoundly.\"\n\n${Silvana} sighs from ${herhis} own history lesson, but your head is still bursting at the seams with questions.  It is completely in character for the Church to strongly discourage anything fun, but they never even mentioned the existence of magic being real!  How does ${shehe} know about this?\n\nNoticing your skepticism, ${shehe} casually comments upon the source of this knowledge.  \"My father would speak of it in length—he was the apprentice to the Necrolord, after all.  Why, I recall, rather humorously, this one time when he…what's wrong?  ${name}?\"\n\nYour suspension of disbelief has just passed its limit.  The Necrolord—who goes by the Shadowmaker, the Destroyer of Dawn, and the Gatekeeper of Death—is a scary and nearly comically evil character from children's stories.  You're supposed to believe that he's real and that ${Silvana}'s dad trained under him?  No way.\n\n\"Hahaha!\"  ${Silvana} breaks into a laugh, one of those polite ones noblefolk do.  \"Y-you'll have to forgive my outburst.  It's true that his exploits have been twisted into far more imaginative tales, but the Necrolord was really just a studious professor of dark magic.  He was a recluse with odd habits, to be sure, but little more than that.\"  Laughter ensues for a time afterwards; at least someone's spirits are high.\n\nYour mind sits a bit more at ease then.  If the root of all evil in the modern era was actually an awkward nerd pent up in his solitary wizard's tower, then things can't be all that bad, right?  Let's change focus, though.  The timeline just doesn't add up!  The Necrolord was destroyed well over 250 years ago, but ${Silvana} looks like a teenager.  What gives?\n\n\"Oh, right.  My father's a lich, his life force magically prolonged through use of phylacteries.  I have had one such phylactery inside my body since birth.  Does that provide a sufficient clarification?\"\n\nRight, silly you.  $!{herhis} father is a member of the undead; I mean, why wouldn't he be?  So that means his ${daughterson} is a half-zombie?  ${Silvana}'s mother must have had a thing for (very) older men, but you won't begrudge her for that.  There's certainly no accounting for taste!  Oh, and there's a piece of his soul residing within his ${daughterson}'s body…if that's not a close-knit family, you don't know what is!\n\nHahaha…ha…\n\nThe situation is ludicrous and surreal, just as it was a moment ago when you were under that illusion spell.  What isn't an illusion is ${Silvana}'s delicate, emotionless face, now inches away from yours.\n\n\"The phylactery inside of me is all that remains of my father, and I've spent the last year on the run.  A religious sect of demon slayers will stop at nothing to see me skewed in half and burnt to ashes.  I need to hide for awhile, but I have no money and nowhere to go.  I need…you, ${name}.\"\n\nThose dark brown eyes, so talented for being empty pools, are now alive and several shades brighter.  You really don't think ${Silvana} is lying about this one.  It all starts to make sense: ${shehe} needs to lay low but couldn't exactly afford a room at an inn for an extended stay.  You feel like you're about to harbor a villain from a story, but since when do villains have such cute, rosy lips?\n\n*choice\n  #All right, I'll help you.\n    *set suave %-10\n    *set logical %-10\n    *set resourceful %-10\n    [i]Direct has increased[/i]\n    *line_break\n    [i]Emotional has increased[/i]\n    *line_break\n    [i]Faithful has increased[/i]\n    *line_break\n    *line_break\n    Regardless of your intentions or ideas about ${herhim}, ${Silvana} and the world ${shehe}'s introducing to you is far and away more interesting than what your life was before.  To keep ${herhim} from being a source of gossip all about town means ${shehe}'d have to rough it out in the woods.  Which means you have to provide the food required, which means money, which means hard work.  But it just might be worth it.\n    *goto c2HelpChoice\n  #What can you do for me?\n    *set suave %+10\n    *set logical %+10\n    *set resourceful %+10\n    [i]Suave has increased[/i]\n    *line_break\n    [i]Logical has increased[/i]\n    *line_break\n    [i]Resourceful has increased[/i]\n    *line_break\n    *line_break\n    To keep ${herhim} from being a source of gossip all about town means ${shehe}'d have to rough it out in the woods.  Which means you have to provide the food required, which means money, which means hard work.  You are too flustered at the moment to run the numbers, but that means a full-time job and an end to the leisurely days of your childhood.  And that has a price.\n    *goto c2HelpChoice\n*label c2HelpChoice\n\nAfter explaining the complications, ${Silvana} kneels gracefully.  The forest floor of twigs, leaves, and deadened grass might as well be center court at the castle.  It is far too grand a gesture for this locale.\n\nThe noble-born says gracefully what would sound as complete and utter lunacy from anyone else's lips.  \"I would be forever in your debt, ${MC_sirrahmilady}.  But I also have something I can offer you that no one else alive can.  I can teach you control over magic.\"\n\nYou're not going to lie—you become lightheaded from the excitement now pent-up inside of you.  Magical powers?  You?  This is going to change your life forever.  And for the better, or at least…you hope.\n\nA delicate white finger presses against your forehead, swirling about in a strange but rhythmic fashion.  While it doesn't feel bad, you still feel the need to address the odd situation.\n\n\"I am unlocking a few barriers of your mind so that your innate magical aptitude can be set free.  That doesn't mean you'll be able to use it immediately, and it will be some time before you have control over it…but it does mean that you can tap into it.  Think of it as a reservoir of mental energy you never knew you had.  And the smarter you are, the more of that energy you have.  There's a reason wizards tended to be the bookish type.\"\n\nWhile ${Silvana} explains about barriers and mental energy pools, you feel some urges of your own.  Like the urge to throw up some of that wedding feast, which is especially bad since a member of magical royalty is standing inches in front of you.  The acid slowly climbs its way up your throat, your eyes hastening your companion to be as quick as possible.\n\n\"And it is done…fascinating, so that is the color of your soul.\"\n\nYou push ${Silvana} out of the way and turn to let the contents of your stomach go.  The color of your soul is the least of your concerns as your throat feels as if it's on fire.  You know it's bad when you find yourself wishing for a dark dwarven stout to wash the flavor out.  To your dismay, your new magical tutor is examining you with great curiosity.\n\n\"What a peculiar reaction!  I admit I have never done such a thing to a person before, so I wasn't quite sure what would happen.  Fascinating!\"  That ${girlboy}ish charm permeates through ${herhis} genuine curiosity.\n\nBeing a test subject for a dark magician is hardly your idea of a good time.  But the 'color of your soul?'  Whatchu talkin' bout, ${Silvana}?\n\n\"Each soul has a color, representative of the element of magic it's most strongly attuned to.  There were once mages who could identify yours with just a passing glance, but unfortunately, they are long since gone.  The color of my soul is black, though little surprise in that; I have a dark soul fragment residing within me.\"\n\nYou fail in hiding your anxiousness.  Well, what color is it?!\n\n\"The color of your soul is…\"  ${Silvana} gives pause, forcing anxiety to build upwards inside your stomach.  Just what sort of shade does your spirit take, what sort of essence does it hold?  You know yourself—or at least you think you do—but as for the ethereal being inside your body…you can't help but wonder.\n\nAfter what feels like an eternity, ${shehe} proceeds.\n\n*page_break\n\n*temp lonerTEMP 0\n*temp leaderTEMP 0\n*temp slyTEMP 0\n*temp powerfulTEMP 0\n*temp suaveTEMP 0\n*temp directTEMP 0\n*temp vigilantTEMP 0\n*temp carefreeTEMP 0\n*temp logicalTEMP 0\n*temp emotionalTEMP 0\n*temp resourcefulTEMP 0\n*temp faithfulTEMP 0\n\n*set lonerTEMP loner-50\n*set leaderTEMP 50-loner\n*set slyTEMP sly-50\n*set powerfulTEMP 50-sly\n*set suaveTEMP suave-50\n*set directTEMP 50-suave\n*set vigilantTEMP vigilant-50\n*set carefreeTEMP 50-vigilant\n*set logicalTEMP logical-50\n*set emotionalTEMP 50-logical\n*set resourcefulTEMP resourceful-50\n*set faithfulTEMP 50-resourceful\n\n*temp red 0\n*temp blue 0\n*temp green 0\n*temp silver 0\n\n*set red (faithfulTEMP + directTEMP)\n*set red (red + emotionalTEMP)\n*set blue (logicalTEMP + suaveTEMP)\n*set blue (blue + faithfulTEMP)\n*set green (vigilantTEMP + directTEMP)\n*set green (green + logicalTEMP)\n*set silver (emotionalTEMP + suaveTEMP)\n*set silver (silver + carefreeTEMP)\n\n*comment //calculation for red, FIRE (Faithful, Direct, Emotional)/3 //playtest all these\n*comment //calculation for blue, WATER (Logical, Suave, Faithful*)/3\n*comment //calculation for green, EARTH (Vigilant, Direct, Logical)/3\n*comment //calculation for silver, AIR (Emotional, Suave, Carefree*)/3\n\n*if ((red >= blue) and (red >= green)) and (red >= silver)\n  *set whichElement \"fire\"\n  *set whichElementName \"Fire\"\n  \"Red.  The element of fire burns brightly inside of you, ${name}.  You wear your emotions on your sleeve and prefer direct confrontation to solve your problems.  The only way to tame fire is to extinguish it; the same goes for your spirit.  To control fire completely is impossible, but the fire Magi were the strongest warmages you'd find.  I think I shall enjoy your heated company henceforth, my champion.\"\n  *goto c2Element\n*elseif ((blue >= red) and (blue >= green)) and (blue >= silver)\n  *set whichElement \"water\"\n  *set whichElementName \"Water\"\n  \"Blue.  The element of water flows easily inside of you, ${name}.  You don't engage in direct confrontation, instead opting to smooth matters over for a more positive outcome.  When a new idea or train of thought emerges, you don't hesitate in shedding long-held beliefs if they prove no longer valid.  You adapt to the world around you and thrive, no matter what shape or adversity presents itself.  The water Magi were the most affable sort and made great leaders, always questioning the world as it was.  I find myself lucky to enjoy your company henceforth, my champion.\"\n  *goto c2Element\n*elseif ((green >= red) and (green >= blue)) and (green >= silver)\n  *set whichElement \"earth\"\n  *set whichElementName \"Earth\"\n  \"Green.  The element of earth is rooted firmly inside of you, ${name}.  Unchangeable and unbreakable, you don't bend in the face of obstacles but instead make them bend to you.  You aren't without emotion, but you don't let your feelings get in the way of your judgment.  You honor your word and expect others to do the same.  The earth Magi solidified many of the systems current civilizations take for granted.  I hope to make our friendship one of mutual respect and honor henceforth, my champion.\"\n  *goto c2Element\n*else\n  *set whichElement \"air\"\n  *set whichElementName \"Air\"\n  \"Silver.  The element of air flies freely inside of you, ${name}.  Impossible to tie down, you prefer to slip and maneuver your way through the obstacles in your path.  You're not the most responsible person around, preferring to act on whims and never taking anything too seriously.  The world holds as many possibilities as you allow it, and nothing can slow you down for long.  The air Magi opted out of war as much as they were able, seeing death as not in their best interest.  I cannot wait to enjoy your amusing company henceforth, my champion.\"\n  *goto c2Element\n*label c2Element\n\nIt is cool for a summer's night in late June.  Perhaps that is a tiding of what is to come; a sharp, biting reminder that the good times never last long.  You can feel a newfound power inside of you, and with that, a hope for a future you never knew existed.\n\nLittle do you know the horrors that winter will bring.\n\n*finish Next Chapter\n", "chapter3": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 3\n\n——————————————\n*line_break\n—————————— Chapter 3: New Tricks\n*line_break\n——————————————\n\nMonths have passed since then; the autumn breeze, while frigid, is a breath of fresh air from your daily labors and the heat at Gundrik's forge.\n\n*if (whichBrigidSword = \"new\")\n  There is that matter of ${Brigid}'s new fancy sword you have to pay off, but in all honesty, you already earned that much weeks ago.  No, your biggest problem is that you have another mouth to feed, the one that belongs to your friendly neighborhood necromancer.\n  *goto c3WhichBrigidSword1\n*else\n  The biggest and ever-present problem that you're faced with is that you have another mouth to feed, the one that belongs to your friendly neighborhood necromancer.\n  *goto c3WhichBrigidSword1\n*label c3WhichBrigidSword1\n\nIt is both a blessing and a curse that Gundrik's usual underling has taken ill, as it allows you a full day's wage working under the dwarven blacksmith.  It also makes you perpetually sore and covered in charcoal dust from head to toe.  Your scent is not unlike a hairy dwarf who never feels the need to bathe.  Your social life has turned over and died, though you just can't seem to figure out why.  There has to be a reason why the ${girlboy}s don't seem so keen to flirt with you anymore.\n\n\"Ah reckon tha'd be ah good day's haul, ${name}.  Might be mah dwarven eyes 'ah goin, but I do think ye be gettin' tha hang o' this.\"  You wipe the sweaty grime off your face with the sleeve of your woolen tunic.  Gundrik might have it right—you are becoming quite the talented nail-maker.  You even have the blistered hands to prove it.  But nothing numbs the pain of workplace injuries quite like payday does.  \"Here ye go, an ah added ah somethin' extra for good behavior!\"\n\nYou weigh the pouch of silver in your hands.  Something extra?  It's the same weight as all the previous pouches…is he drunk on the job again?  Last time he was, you ended up making a dozen gardening hoes for an order that didn't exist.  You're still trying to clear them out of your inventory.\n\n\"Do ya 'member when we was talkin' ahbout ye favorite weapon weeks 'n weeks ago?  Well, ye are in fer a surprise!\"  The dwarf bellows in excitement.  But as far as surprises go, you're just astonished that he recalls that conversation.\n\n*if (whichWeapon = \"sword\")\n  Gundrik pulls out a sword that glistens in the light of the firepit.  It is in this moment, covered in soot and barely able to keep your shoulders raised, that you know you've crossed a chapter.  Figuratively speaking, of course.  \"Go ahead, ${MC_boylass}, take it.\"  You eagerly comply, finding it quite a bit lighter than you'd have thought by the look of it.\n  \n  Unlike ${Brigid}'s blade, this one is no doubt of dwarven make.  The squared bottom and short hilt gives that away.  In length, it is slightly shorter than a typical longsword, but broader.  More chopping power behind the swings.  You give it a few just to verify its balance.  It glides through the air just like you imagined it would.\n  *goto c3WhichWeapon1\n*elseif (whichWeapon = \"dagger\")\n  Gundrik pulls out a dagger that glistens in the light of the firepit.  It is in this moment, covered in soot and barely able to keep your shoulders raised, that you know you've crossed a chapter.  Figuratively speaking, of course.  \"Go ahead, ${MC_boylass}, take it.\"  You eagerly comply, finding it much heftier than any hunting knife you've used.\n  \n  There's no doubt that this is of dwarven make.  The squared bottom and short hilt gives that away.  It's actually wider at the base than most swords are and carries that width to nearly a foot.  Hiding that sort of blade isn't going to be easy, but it makes up for that with its ability to thrust itself into one end and out the other.\n  *goto c3WhichWeapon1\n*elseif (whichWeapon = \"axe\")\n  Gundrik pulls out something that every dwarf that ever grew a beard values above darn near everything else.  It is unmistakably a dwarven axe, glistening in the light of the firepit.  It is in this moment, covered in soot and barely able to keep your shoulders raised, that you know you've crossed a chapter.  Figuratively speaking, of course.  \"Go ahead, ${MC_boylass}, take it.\"  You eagerly comply, finding out quickly just how different an axe made for wood and an axe made for war is.\n\n  Everything about this axe screams dwarvish.  The square button base, the axe blade—only on a single side, firmly connected to a rod wrapped in tight, hardened leather.  \"Ye only want double-bladed axes in stories.  Ah true warrior uses a single, fer cuttin' balance.  Less likely ta turn on impact against plate, too.\"\n  *goto c3WhichWeapon1\n*else\n  Gundrik pulls out a spear, whose tip glistens in the light of the firepit.  It is in this moment, covered in soot and barely able to keep your shoulders raised, that you know you've crossed a chapter.  Figuratively speaking, of course.  \"Go ahead, ${MC_boylass}, take it.\"  You eagerly comply, finding it much heftier than any hunting spear you've ever used.\n\n  There's no doubt that this spear is of dwarven make.  And while it's technically a glaive, it's hardly the delicate and beautiful polearm that elves favor.  This one's tip is wide and broad, with a sinister edge that narrows to a hair's width.  At the base where the tip and shaft connect, there is a notch where you can tie some fabric—helpful in distracting enemies.\n  *goto c3WhichWeapon1\n*label c3WhichWeapon1\n\nYou thank your employer graciously and head to the grocer with a skip in your step.  With all this energy, you might be able to make it through another of ${Silvana}'s magic lessons without passing out!  At this point in your magic training, it's the small victories that count.  But dang, you feel like a badass walking around with some steel on your back.  It's no wonder ${Brigid} is never more than an arm's length from that sword of ${hershis}.\n\nA figure enters the path ahead of you and turns squarely in your direction.  Speak of the devil.\n\n*if (whichWeapon = \"sword\")\n  \"${name}.  We need to tal—is that a new sword?!\"  ${Brigid}'s lecture—no doubt well prepared and rehearsed—is cut short upon the sight of shiny new steel.  You see ${herhis} grubby fingers tingle, and you reluctantly hand over the sword.  The ${girlboy}ish excitement doesn't fit a knight-in-training, but you wouldn't want to spoil the moment.\n  \n  \"This is a good sword…Gundrik ought to be proud.  A shame its wielder isn't trained to use it!  I've got some techniques and exercises, it'll be a cinch to get you up to speed.\"  ${Brigid} nods to ${herhim}self as if it were all decided.\n  *goto c3WhichWeapon2\n*elseif (whichWeapon = \"dagger\")\n  \"${name}.  We need to tal—is that a new dagger?!\"  ${Brigid}'s lecture—no doubt well prepared and rehearsed—is cut short upon the sight of shiny new steel.  You see ${herhis} grubby fingers tingle, and you reluctantly hand over the oversized knife.  The ${girlboy}ish excitement doesn't fit a knight-in-training, but you wouldn't want to spoil the moment.\n  \n  \"What a sidearm, gotta say I'm jealous…Gundrik ought to be proud.  A shame its wielder isn't trained to use it!  It might be shorter than a sword, but I've got some techniques and exercises…it'll be a cinch to get you up to speed!\"  ${Brigid} nods to ${herhim}self as if it were all decided.\n  *goto c3WhichWeapon2\n*elseif (whichWeapon = \"axe\")\n  \"${name}.  We need to tal—is that a new axe?!\"  ${Brigid}'s lecture—no doubt well prepared and rehearsed—is cut short upon the sight of shiny new steel.  You see ${herhis} grubby fingers tingle, and you reluctantly hand over the axe.  The ${girlboy}ish excitement doesn't fit a knight-in-training, but you wouldn't want to spoil the moment.\n  \n  \"I'm starting to see why dwarves prefer these…Gundrik ought to be proud.  A shame its wielder isn't trained to use it!  It might not be a sword, but I've got some techniques and exercises…it'll be a cinch to get you up to speed!\"  ${Brigid} nods to ${herhim}self as if it were all decided.\n  *goto c3WhichWeapon2\n*else\n  \"${name}.  We need to tal—is that a new spear?!\"  ${Brigid}'s lecture—no doubt well prepared and rehearsed—is cut short upon the sight of shiny new steel.  You see ${herhis} grubby fingers tingle, and you reluctantly hand over the glaive.  The ${girlboy}ish excitement doesn't fit a knight-in-training, but you wouldn't want to spoil the moment.\n\n  \"A dwarvish spear…can't say I've ever seen them before.  Gundrik ought to be proud.  A shame its wielder isn't trained to use it!  Its certainly not a sword, but I've got some techniques and exercises…it'll be a cinch to get you up to speed!\"  ${Brigid} nods to ${herhim}self as if it were all decided. \n  *goto c3WhichWeapon2\n*label c3WhichWeapon2\n\nIt takes a good manner of self-restraint to hold in a groan.  When you aren't working as the reluctant apprentice of smithing, you're struggling as a magician's apprentice under ${Silvana}.  The very idea of being the apprentice of anything else makes you want to turn over in a fetal position and cry.  You try to explain to ${Brigid} the severe lack of free time your life holds at the moment, but the redhead doesn't budge an inch.\n\n\"You work way too hard, ${name}.  I hardly see you around town, except when you head to the grocers, which is what I bet you're doing now.  You think with all that food you'd bulk up, but you look gaunt and sickly…I'm just worried…\"  ${Brigid} trails off at the end there, but you know keeping up this charade is taking its toll.  \n\nYou are getting stronger from the hard work with the smithy and smarter from all of ${Silvana}'s lectures.  Well, the ones you manage to stay awake through, anyway.  But exhausting your body and mind day in and day out…you're bound to look the worse for wear.\n\nAn accusatory finger points at you.  \"There's something you haven't been telling me.  You can't keep a lie from me for long, ${name}.\"  Well actually, you can.  It has been over three months since that fateful day in the forest when your father found a dark mage stuck in a beartrap.  Three months of hiding ${herhim} from the entire town, who all think the lordling had been picked up by ${herhis} relatives and is currently sipping tea with barons and duchesses.  The reality involves far less tea, unfortunately.\n\nWithout your consent, ${Brigid} decides to accompany you on your shopping trip.  This will prove troublesome, especially since you're hoping to ask around about rumors of demon hunters about.  The trick is to bring up demon slaying in casual conversation…\n\nAs ${Silvana}'s sole source of information on current events, you've started to make it a habit to pay attention to what's going on in the world.  You can't say you've made much progress, but seeing as how slow news travels as of late, who can really blame you?  Under the redhead's scrutiny, you purchase your usual fare from the shopkeeper.  It is good that ${Silvana}'s tastes are more tame than most nobility; you doubt your wallet could stomach peacock and oysters every week.\n\nNow that you think about it, a religious group of warriors seems like just the sort of thing ${Brigid} would fan${girlboy} over.  Maybe ${shehe} knows something.\n\nA radiant sort of euphoria erupts from your companion's features.  \"The Paladins of Light!  Saint Freylae's Calvary, the Bishop's Garrison, even the Cossack Order!  The opportunities to serve the justice of the Fates are countless, but I'm surprised you've taken an interest in them, ${name}.  I've dreamed of becoming a paladin, after proving my service to our King with the knights, of course.\"\n\nGreat…while the redhead would-be fighter fantasizes about holy warrior guilds, you've just learned the names of groups who'd like nothing more than to see a mage like yourself on the pointy ends of their swords.  Bet they'd get a lordship for it, too.\n\nOn the way back home, the prolonged awkward silence eats at your nerves, so you decide to make some small talk.  That, and you're earnestly curious about how the newlywed couple is faring.\n\n*if (whichBlessing = \"health\")\n  \"It's like their honeymoon ain't got an end.  They've been travelin' all over the kingdom, not sure if they'll ever be home.  From the letters, they seem to be having a good time of it, anyway.\"  You're a bit jealous of them now, if you weren't already.\n  *goto c3WhichBlessing1\n*elseif (whichBlessing = \"wealth\")\n  \"Lucky blokes struck it rich!  Just discovered that the mister's land had a small salt mine underneath of it.  Set fer life, I'd say.\"  A salt mine…pound for pound, the fine white grains are worth more than gold.  Good for them.\n  *goto c3WhichBlessing1\n*else\n  \"You haven't seen big sis around, but she's already starting to blow up like a bullfrog.  Hate seein' her let herself go like that.\"  It's quite possible that she's pregnant, but you decide to let ${Brigid} believe what ${shehe} wants to believe.\n  *goto c3WhichBlessing1\n*label c3WhichBlessing1\n\n*if (whichChild = \"only\")\n  Another benefit of being an only child means you have less fear of your food getting devoured on a quick detour to the outhouse.  You set the results of your shopping down in your room.\n  *goto c3WhichChild1\n*else\n  Being as your home is the regular stomping grounds of many hungry little monsters (siblings), you have to get a bit creative as to where you store the food.  You manage to hide it under several other crates in the main room.\n  *goto c3WhichChild1\n*label c3WhichChild1\n\n\"Well, guess that's that, then.  I've got a few errands to run before dinner.  Good night, ${name}.\"  In a surprisingly unstubborn fashion, ${Brigid} leaves you be.  A good thing too, as you need to sneak these supplies out shortly after dinner.\n\n*if (whichChild = \"only\")\n  It's weird, but you rarely see your family much anymore these days.  The hair on your parents' heads is starting to grey, your father showing skin at his crown.  There is the ever-present matter of making you a sibling, but it seems your mother has finally given up the battle.  That time has passed, and you find yourself a poor replacement for the pitter-patter of little feet she so dearly wants.\n  *goto c3WhichChild2\n*elseif (whichChild = \"oldest\")\n  It's weird, but you rarely see your family much anymore these days.  All the little ones are getting bigger, developing personalities (of the annoying sort, mostly) and really just acting like little people.  You feel a pang of guilt when you realize that their big ${MC_brothersister} hasn't been around to help them much.  A game of horseshoes or a hunting trip, you think you can manage to work in something on the weekends.\n  *goto c3WhichChild2\n*elseif (whichChild = \"middle\")\n  It's weird, but you rarely see your family much anymore these days.  Your older siblings, well they're the same—into their own ordeals with their own friends.  All the little ones are getting bigger, developing personalities (of the annoying sort, mostly) and really just acting like little people.  You feel a pang of guilt when you realize that their big ${MC_brothersister} hasn't been around to help them much.  A game of horseshoes or a hunting trip, you think you can manage to work in something on the weekends.\n  *goto c3WhichChild2\n*else\n  It's weird, but you rarely see your family much anymore these days.  While you are the youngest at the dinner table, the events over these past three months make you feel like the oldest.  Your older siblings have it so easy, worrying about what dress to wear or the current gossip around town…they almost seem as if they're growing up differently than you are.  It is difficult to explain, but it's apparent that this disparity grows greater with each passing month.  And while that is probably a good thing, you can't help but feel a bit sad.\n  *goto c3WhichChild2\n*label c3WhichChild2\n\nDuring the meal, your father mentions something that catches your attention.  \"Think we gots a Druid or somethin' way out back.  Been seein' campfires fer the past few days up around the creek.\"  You don't intend to correct your father, in that it's actually a hunted dark mage out back, not some hermit fond of mushrooms.  But this is troublesome; ${Silvana} will have to move to a different location, and soon.\n\nWith all the food gone, dinner is promptly adjourned and you slip out with a week's worth of cheese, hard bread, and salmon.  The path into the forest is one you know quite well by this point, and you could probably navigate it blindfolded.  The return trip back is often a walk through pitch darkness, though your eyes will be well-adjusted by then.\n\n\"${name}, welcome back.\"  You catch ${Silvana} leaning up against a tree, quickly jotting down notes on a piece of parchment in the fading rays of the setting sun.  Noticing what you are carrying, ${shehe} pockets the paper and approaches you.  Giving a gracious bow, the magician thanks you.  \"You are too kind, my champion.  I feel as if I am a heavy burden, but allow me to reward you with a special lesson tonight.\"  S-special lesson?  What exactly does ${Silvana} have in mind?\n\n*page_break\n\n$!{shehe} catches on to your puzzled expression with an embarrassed one of ${herhis} own.  \"G-goodness me, I keep forgetting your spirited imagination.  I intend to teach you your first attack spell.\"  Attack spell?  This is even better than what your dirty mind was thinking!  You've been waiting for months to learn something that can give you an edge where it really counts.  Granted, combat isn't exactly crucial for your stereotypically commoner lifestyle…\n\n*if (whichElement = \"fire\")\n  \"As I've taught you before, inciting or snuffing out pre-existing flames is rather much child's play.  You've also caught on to control over your body heat, allowing you to ignore cold temperatures.\"  That trick about not feeling cold anymore?  Best trick in the book, as far as you're concerned.  At least until we get to fireballs, that is!\n\n  ${Silvana} continues, trying to ignore your enthusiasm.  \"I would prefer waiting until you had some more control over fire before teaching you this, but I think you'll manage.  To create flame from nothing, you must focus and center the heat around a spot in the air around you.  You will know you have succeeded when you see a flicker of light from that general direction.\"\n\n  You stare down an invisible part of the air.  But just as you find one, a breeze falls into your eyes, and it takes another minute to regain complete focus.  'Complete focus' is your own way of describing the sort of trance-like state your mind has to be in.  Beings are horrible at multi-tasking, ${Silvana} often remarks, but if one is able to eliminate all mental processes save for one…\n\n  Coldness sets in, deep inside of you.  Fates above, it's cold!  Perhaps you're spoiled as of late—what with using magic to maintain a comfortable body heat—but even still!  You could hardly feel your fingers…but you maintain focus.  And then, a flicker of light!\n\n  \"${name}!  Break focus!\"  A yell from your tutor snaps you back to the realm of reality, heat returning to your body.  But it's your nose that senses something out of place.  The smell of burning wood and underbrush…not unpleasant, but—\n\n  Your eyes have taken this long to realize the scene in front of you: blackened bushes and trees white with ash.  The bare forest floor is devoid of any sort of bug or plant it might once have hidden.  And this lack of flora, this grand deforestation goes on for a ways.  You look towards ${Silvana}, whose eyes go black and return to you, a featureless glare.  You know what that means—${shehe} is prepared to toss a javelin of dark energy right through you!\n\n  $!{herhis} voice pipes up once the tension subsides.  \"I…that power…ahem.  Forgive my moment of unease, I just did not expect such a display of force…a novice magician of fire such as yourself…you shouldn't have been able to handle the coldness for that long.  There is more to you than I first imagined, ${name}.\"\n  *goto c3WhichElement1\n*elseif (whichElement = \"earth\")\n  \"As I've taught you before, shaking the ground around you is rather much child's play.  You've also caught on to the creation of shields from the ground around you to protect you from incoming projectiles.  Granted, you'll get faster at making them in time, until it becomes second nature.\"  It's pretty nifty to be able to raise a pillar of dirt out of the ground.  But it's not much of an attack, really.\n\n  ${Silvana} continues, trying to ignore your enthusiasm.  \"I would prefer waiting until you had more experience melding before teaching you this, but I think you'll manage.  To control earth from afar, you need to imagine and focus on a part of your body going through the earth.  For this exercise, try using your right hand.  You will know you have succeeded if your hand breaks through the ground with ease.\"\n\n  You go down on one knee and stare at the ground beneath you.  You don't much care for the idea of your hands going in one end of the earth and out somewhere else, but whatever.  You're an earth mage; getting your hands dirty in the literal sense is part of the job.  Placing your right hand softly against the forest floor, you spend a minute getting into complete focus.  'Complete focus' is your own way of describing the sort of trance-like state your mind has to be in.  Beings are horrible at multi-tasking, ${Silvana} often remarks, but if one is able to eliminate all mental processes save for one…\n\n  Your hand feels numb after a while.  It feels a sort of outer shell, hard at some points but perhaps softer at others…you feel around it, searching for something, anything you could push through.  Your fingers pause and feel around a particular spot, and you push against it as hard as you can.  No, harder!  It's going to break, it just needs more…more…more!\n\n  \"${name}!  Break focus!\"  A yell from your tutor snaps you back to the realm of reality, and the huge force you put into your right hand dissipates.  You examine the appendage thoroughly, but notice nothing out of place.  Thank the Fates.  Hmm, but since when are you sitting upon an incline?  \n\n  Your eyes have taken this long to realize the scene in front of you.  A giant mound, nay, a statue of a giant clenched hand towers before you!  In it, a tree uprooted and squeezed, its branches broken every which way.  The hand—upon closer examination—bares an uncanny resemblance to your own.  You look towards ${Silvana}, whose eyes go black and return to you, a featureless glare.  You know what that means—${shehe} is prepared to toss a javelin of dark energy right through you!\n\n  $!{herhis} voice pipes up once the tension subsides.  \"I…that power…ahem.  Forgive my moment of unease, I just did not expect such a display of force…a novice magician of earth such as yourself…you shouldn't have been able to admit that amount of force.  There is more to you than I first imagined, ${name}.\"\n  *goto c3WhichElement1\n*elseif (whichElement = \"water\")\n  \"As I've taught you before, shifting water from liquid to a solid or gaseous state is rather much child's play.  You've also gotten talented at healing cuts and bruises and are able to regenerate from bloodloss.\"  Argh, ${Silvana} doesn't need to remind you of that.  You can't count how many times you've passed out from lightheadedness in the past couple months.  Until you got the hang of healing, you looked as if you had taken to sleeping atop of porcupines.  Felt like it, too.\n\n  ${Silvana} continues, trying to ignore your enthusiasm.  \"I would prefer waiting until you had more experience gathering moisture before teaching you this, but I think you'll manage.  To create water from nothing, you must focus and center the wetness or dampness around a spot in the air around you.  You will know you have succeeded when some sort of raindrop falls from that general location.\"\n\n  You stare down an invisible part of the air.  But just as you find one, a breeze falls into your eyes, and it takes another minute to regain complete focus.  'Complete focus' is your own way of describing the sort of trance-like state your mind has to be in.  Beings are horrible at multi-tasking, ${Silvana} often remarks, but if one is able to eliminate all mental processes save for one…\n\n  Your throat goes dry; in fact, everything does.  It feels like you're in the middle of a desert—though you've never actually been in one.  The sun seems to make the world around you sparkle, or is that just your eyes playing tricks on you?  Those eyes start to sting after awhile, but you remain focused upon that one particular spot.  Pouring more and more into it, compacting it over and over again.  Compress, like heated iron folded over and over and—\n\n  \"${name}!  Break focus!\"  A yell from your tutor snaps you back to the realm of reality, and the huge compression releases.  Your body instantly feels more hydrated, and the aches in your head and eyes start to fade away.  Tears trickle down your face, and you wipe them away before focusing upon the scene in front of you.\n\n  In a giant radius centered around you, the bright greens of the forest are instead a deathly shade of yellow.  Dead from a drought that came in the blink of an eye.  But what really causes your heart to skip a beat is the horse-sized spike of glacier embedded through a nearby oak.  It emits a cold gas around it, a dry chill that you can feel from here.  You look towards ${Silvana}, whose eyes go black and return to you, a featureless glare.  You know what that means—${shehe} is prepared to toss a javelin of dark energy right through you!\n\n  $!{herhis} voice pipes up once the tension subsides.  \"I…that power…ahem.  Forgive my moment of unease, I just did not expect such a display of force…a novice magician of water such as yourself…you shouldn't have been able to draw so much moisture from your surroundings.  There is more to you than I first imagined, ${name}.\"\n  *goto c3WhichElement1\n*else\n  \"As I've taught you before, shifting the direction of the wind to help your movement and hinder your foes is rather much child's play.  Whistling, while it took you rather too much time to take the training seriously, was also an important step in sound control.\"  You're sorry, but spending hours trying to blow out air in a specific way well into the night is not magical.  It's silly, and it makes your throat sore something awful.\n\n  ${Silvana} continues, trying to ignore your enthusiasm.  \"I would prefer waiting until you had more precise control over wind rotation before teaching you this, but I think you'll manage.  To warp air into something more than a breeze, it must be spun.  Picture a mental image of yourself twirling and impart that onto the air around you.  You will know you have succeeded when you feel the wind rotate whilst it rises into the sky.\"\n\n  You close your eyes and imagine a very ${MC_handsomebeautiful} ${MC_manwoman} twirling about.  Instead of your raggedy woolen attire, you're sporting the long, flowing silk the Westerners wear.  The bright yellow fabric dances as if with a mind of its own, but eventually starts to bend the way you will it to.  You are in a state of 'complete focus'—this is your own way of describing the sort of trance-like state your mind has to be in.  Beings are horrible at multi-tasking, ${Silvana} often remarks, but if one is able to eliminate all mental processes save for one…\n\n  Air leaves your lungs, or rather, it pours out in a sudden rush.  In your ears, all sound fades away until it's just one high-pitched buzz.  The buzzing builds and builds until it replaces your ability to hear yourself think.  To say you feel lightheaded is a vast understatement; how are you even standing?  You scream, but nothing emits from your mouth.  The buzzing will break your mind, but you continue spinning.  Over and over and—\n\n  \"${name}!  Break focus!\"  A yell from your tutor snaps you back to the realm of reality; the buzzing ceases, and you breathe in a drowned man's share of fresh air.  Your body instantly feels less empty, and the aches in your head and ears start to fade away.  You clear the sand from your dried eyes before beholding the scene in front of you.\n\n  A hurricane has just landed, or at least that's what any reasonable person would deduce from this wreckage that was once a section of forest.  Now it's an empty pasture, with uprooted trees tossed about as if they were sticks.  The dust from the ground fogs the air, making visibility poor, but you manage to spot your instructor a safe distance away.  You look towards ${Silvana}, whose eyes go black and return to you, a featureless glare.  You know what that means—${shehe} is prepared to toss a javelin of dark energy right through you!\n\n  $!{herhis} voice pipes up once the tension subsides.  \"I…that power…ahem.  Forgive my moment of unease, I just did not expect such a display of force…a novice magician of air such as yourself…you shouldn't have been able to gather so much wind from your surroundings.  There is more to you than I first imagined, ${name}.\"\n  *goto c3WhichElement1\n*label c3WhichElement1\n\n${Silvana} is not an easy teacher to impress, so you're happy to have been able to surprise ${herhim}.  But to be honest, you're even more uneasy; what the heck did you just do?  It sure as hell isn't something normal teenagers do, that's for sure!  Your body aches all over, only now realizing just how tired you are.  Which is why you can't move a muscle when a familiar wannabe knight comes charging in, sword raised.\n\n\"M-monster!  What did you do to ${MC_himher}?!  $!{bitchbastard}, I'll run you through for this!\"  You spot ${Brigid} atop of ${Silvana}, who ${shehe} easily pins on the ground.  $!{herhis} sword is out and placed dangerously close to the nape of the magician's neck.  It doesn't matter how powerful a dark mage ${shehe} is, this is dangerous!\n\n\"I-I see we have company.  You are ${name}'s friend…${Brigid}, was it?\"  To ${Silvana}'s credit, ${shehe} is able to stay remarkably calm, even with a shaky sword pointed right at ${herhim}.  But it's your turn to calm things down—you don't want either of your friends to get hurt.  You encourage ${Brigid} to put ${herhis} sword away, saying that you'll explain everything.  But ${herhis} words are directed solely at ${Silvana}.\n\n\"Everything was fine until you came along.  I had thought we were rid of you, but curse the Fates, I was wrong!  What corruption have you spread onto ${name}…what heresies have you been telling ${MC_himher}?!\"  ${Brigid}'s hand grips itself effortlessly around ${Silvana}'s thin neck and tightens.  The dark mage couldn't respond even if ${shehe} wanted to, and when you see ${herhis} eyes go black, you know you have to intervene.\n\n*choice\n  #Push ${Brigid} off ${herhim}.\n    *if (whichElement = \"fire\")\n      ${Brigid} isn't responding to reason at this point, but who can blame ${herhim}?  Magic isn't supposed to be real, and yet ${herhis} childhood friend is out here casting fireballs that threaten to set the entire forest aflame!\n      *goto c3WhichElement2\n    *elseif (whichElement = \"earth\")\n      ${Brigid} isn't responding to reason at this point, but who can blame ${herhim}?  Magic isn't supposed to be real, and yet ${herhis} childhood friend is out here literally making a mountain out of a molehill!\n      *goto c3WhichElement2\n    *elseif (whichElement = \"water\")\n      ${Brigid} isn't responding to reason at this point, but who can blame ${herhim}?  Magic isn't supposed to be real, and yet ${herhis} childhood friend is out here making ice sculptures of the iceberg sort!\n      *goto c3WhichElement2\n    *else\n      ${Brigid} isn't responding to reason at this point, but who can blame ${herhim}?  Magic isn't supposed to be real, and yet ${herhis} childhood friend is out here in the eye of a hurricane ${MC_heshe} had made ${MC_himher}self!\n      *goto c3WhichElement2\n    *label c3WhichElement2\n\n    You push the redhead off ${Silvana} and wrestle ${herhim} to the ground.  It's just like old times, except with a sword involved.  Getting ${herhim} into a pin, however, is going to take a good deal of strength.\n\n    *if (sly \u003c= 50)\n      *set renown +1\n      [i][Check versus Powerful: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      You're surprised at how light ${Brigid} is; compared to hauling around bars of iron at the forge all day, ${shehe}'s a featherweight.  Even ${shehe} is surprised at how easy you are able to overpower ${herhim}, letting you know through colorful language.\n      *goto c3InterveneChoice\n    *else\n      [i][Check versus Powerful: fail][/i]\n      *line_break\n      *line_break\n      Darn, you suppose all that knight training has counted for something, after all.  That, or ${Brigid} has put on some serious weight as of late.  You'd tease ${herhim} about it, but not while you're pinned beneath ${herhim}.\n      *goto c3InterveneChoice\n  #Talk ${Brigid} down.\n    Talking reason to ${Brigid} at this point is next to impossible, but you think you might be able to appeal to ${herhis} emotions to cool ${herhim} down.  You explain how you're still you and how the world as ${shehe} knows it hasn't just toppled over.  You're still the ${MC_guygirl} who snoozes during church lectures and daydreams of riding dragons, whose feet are both left-sided as far as dancing is concerned, who likes to prank the old wives with made-up rumors…\n\n    You had almost forgotten just what sort of trouble the two of you used to cause together, provoking a reaction out of those old hens just to get their feathers rustled.  There was nothing like telling one that her grandson shaved his head and was thinking of joining an elvish boy-gang.  Good times…but on to the matter of the sword pressed against ${Silvana}'s throat.\n\n    *if (sly >= 50)\n      *set renown +1\n      [i][Check versus Sly: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *line_break\n      *line_break\n      \"Heh…I remember, elvish boy-gangs, aye?  You never told me if they were real.\"  Your shoulders ease up when ${Brigid}'s longsword pulls away.  It would seem as if you may be able to diffuse this situation without bloodshed, after all.\n      *goto c3InterveneChoice\n    *else\n      [i][Check versus Sly: fail][/i]\n      *line_break\n      *line_break\n      \"Shut it, ${name}!  I miss those days, but they're dead and gone now because of this ${princessprince} ${bitchbastard}!  I'll…I'll…\"  $!{herhis} words pause, as would most upon sight of a black ball of energy floating and pulsating precariously in front of one's face.  ${Brigid} jumps back and off of ${Silvana}, a wise move indeed.\n\n      \"You seem to believe you are in some position of strength here, Brigand.\"\n      *goto c3InterveneChoice\n*label c3InterveneChoice\n\n*if (whichElement = \"fire\")\n  Your old friend is still in a state of shock from what ${shehe} just witnessed.  \"C-curse the Fates, magic isn't real!  So how in blazes did you…make all that fire?  You looked like you were going to torch the whole fracking forest!\"\n  *goto c3WhichElement3\n*elseif (whichElement = \"earth\")\n  Your old friend is still in a state of shock from what ${shehe} just witnessed.  \"C-curse the Fates, magic isn't real!  So how on earth did you…create a giant freaking hand of dirt erupting out of the ground?!\"\n  *goto c3WhichElement3\n*elseif (whichElement = \"water\")\n  Your old friend is still in a state of shock from what ${shehe} just witnessed.  \"C-curse the Fates, magic isn't real!  So how is it there's an…an icicle the size of a freaking boulder pinned through a giant oak?!\"\n  *goto c3WhichElement3\n*else\n  Your old friend is still in a state of shock from what ${shehe} just witnessed.  \"C-curse the Fates, magic isn't real!  So then why does this clearing…not have any trees anymore?!  They're tossed around like a freaking salad!\"\n  *goto c3WhichElement3\n*label c3WhichElement3\n\nYou owe it to the redhead to tell ${herhim} everything.  Well, most things.  You think you might leave the Necrolord bit out.  And the Lich, and the phylactery inside of ${Silvana} quite possibly corrupting ${herhis} soul.  You know—the small stuff.  Upon telling of how ${Silvana} unlocked your power, ${Brigid} covers ${herhis} forehead as if the pale magician would at any moment jump up and make ${herhim} an initiate against ${herhis} will.\n\nAs the redhead's shock subsides, a strangely sober and serious attitude takes its place.  $!{herhis} eyes hold a sternness you do not often see.  \"${Silvana}, if you value your life and ${name}'s, you'll leave immediately.  Magic has no place in this world…not anymore.  Whatever you think you might have given ${MC_himher}, it isn't a blessing but a curse.  Now let's go home, ${name}.\"\n\nThe rare seriousness that your childhood friend spoke with has commanded your attention.  You don't want ${Silvana} to leave, but is it for the best?  There's so much more to learn!  You feel as if you have just grasped how to read and are being stopped at the preface of a pulse-pounding novel.  The magician's eyes stare into yours, waiting for you to make a decision.\n\n*choice\n  #${Silvana} should stay.\n    *set silvanaRelationshipPoints +1\n    [i]Your relationship with ${Silvana} grows[/i]\n    *line_break\n    *line_break\n    \"Your words are as kind to me as always, my champion.  But your…friend has it right.  I have overstayed my welcome.  It isn't good for a being such as I to get too…attached.  The nights we shared together, ${name}, they were some of my fondest—\"\n    *goto c3SilvanaGoChoice\n  #${Silvana} should go.\n    \"Your words sadden me, but that is only a credit to how much I value them.  You are right, of course; each day we're together is another chance for my foes.  But they aren't just my foes anymore…forgive me, my champion, but I do not regret the nights we shared together, ${name}, they were some of my fondest—\"\n    *goto c3SilvanaGoChoice\n*label c3SilvanaGoChoice\n\nA forced cough breaks ${Silvana}'s farewell short.  The guilty party wastes no time wrapping up this encounter.  \"All right, well, that settles it.  See ya—[i]*mutters*[/i] burning on a stake [i]*mutters*[/i]—later, dark wizard.\"  With that snide remark, ${Brigid} pulls you away before you're able to give a proper goodbye. \n\nBut this isn't goodbye…not yet, not so suddenly!  Darn it, this redhead is ruining everything.  You feel like you're chasing your favorite teacher out of your own house.  But ${Silvana} is so much more than that, ${shehe}'s…\n\nThe trek back home is wrought with a heavy silence.  You can taste the tension, and it is sour.  There isn't anything to say, really, which means ${Brigid} is sure to open ${herhis} mouth any moment now.\n\n\"So that bad aura I felt way back at the healer's when I first saw ${herhim}…guess I was right. I also knew you were different somehow, these past few months.  Sure didn't think it was something like this…\"  What hurts you more than anything is the pang of disappointment that laces your old friend's lips.  Could the two of you ever be the inseparable, infamous duo you once were?  Unfortunately, those days are long gone.\n\nYou part upon making it back to your humble abode, and to your surprise the candles resting upon the window sills are still lit.  Mother is a hawk about wasting wax, so that means something is about.  This is odd; you've been staying out late each night for weeks now, and they never made a fuss about it before…\n\nWith more than a little unease, you open the door.  It's not the typical scene in the ${name} family household, that's for sure.\n\n*page_break\n\n*if (whichChild = \"only\")\n  Your mother and father sit straight up on the couch, dressed as nicely as you've ever seen them.  That by itself is odd enough, but an hour after midnight?  What the heck is going on?\n  *goto c3WhichChild3\n*elseif (whichChild = \"oldest\")\n  Your parents and younger siblings sit up straight on the couch (the littlest ones on their laps), dressed as nicely as you've ever seen them.  That by itself is odd enough, but an hour after midnight?  What the heck is going on?\n  *goto c3WhichChild3\n*elseif (whichChild = \"middle\")\n  Your parents and older siblings sit straight up on the couch, dressed as nicely as you've ever seen them.  On their laps are your younger siblings, who have fallen asleep at such a late hour.  What the heck is going on?\n  *goto c3WhichChild3\n*else\n  Your parents and siblings either sit upon or stand around the couch, dressed up as nicely as you've ever seen them.  That by itself is odd enough, but an hour after midnight?  What the heck is going on?\n  *goto c3WhichChild3\n*label c3WhichChild3\n\n\"H-here ${MC_heshe} 'iz!  Staying 'ougt this late, ye ought 'ta be ashamed!\"  Your mother's scolding is more of relief than of anger, which frightens you all the more.  Your eyes turn to the figure emitting a powerful, authoritative presence.\n\nA tall man in a black clerical robe and glasses examines
