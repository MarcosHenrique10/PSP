g swine?[/i]\n\n[i]She had to decline, but thought for a time;[/i]\n\n[i]Scrub off the dirt, the rust and the grime,[/i]\n\n[i]Even a pig makes a prize, when put in a pie…\"[/i]\n\nTears come down in a torrent as the gnomish bard looks down upon the empty expression gazing back at him.  There's nothing.  No breath, no pulse, and no pain.  This was your enemy that you knew for no more than a day, a wretched woman who tried to control you and have you poison a mourning mother.  She kidnapped her son and used magic to try and kill you and your friends.  So why is your heart aching?\n\nA gauntleted hand gently grabs hold of your shoulder.  ${Brigid}. \"${name}…there's so much I want to say, but right now…let's go get your ${princessprince} back.\"\n\n*finish Next Chapter\n", "chapter11": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 11\n\n——————————————\n*line_break\n—————————— Chapter 11: Tower of Terror\n*line_break\n——————————————\n\n*if (whichWeapon = \"sword\")\n  You trace your fingers against the hilt of your old sword.  Its blade is still as sharp as ever—that's dwarven craftsmanship for you.\n  *goto c11WhichWeapon1\n*elseif (whichWeapon = \"axe\")\n  You trace your fingers against the handle of your old axe.  Its edge is still as sharp as ever—that's dwarven craftsmanship for you.\n  *goto c11WhichWeapon1\n*elseif (whichWeapon = \"dagger\")\n  You trace your fingers against the hilt of your old dagger.  Its blade is still as sharp as ever—that's dwarven craftsmanship for you.\n  *goto c11WhichWeapon1\n*else\n  You trace your fingers against the stem of your old spear.  Its point is still as sharp as ever—that's dwarven craftsmanship for you.\n  *goto c11WhichWeapon1\n*label c11WhichWeapon1\n\nGundrik's last weapon now back by your side, you feel a familiar sensation you had given up on ever having again.  It isn't that steel weapons are now permitted to be carried with the war waning down, it's just that you don't care anymore.  Before this night is done, the guardsmen will have far greater concerns than your weapon.  You're just glad Binyo didn't decide to stash it away in the Brighthammer family crypt somewhere.\n\n\"Civilians haven't been able to handle weapons for awhile…you still remember how to use it?\" ${Brigid} teases, though it's a good question.  You suppose you'll have to find out the hard way.  You're making your last bit of preparations back at the Redwater offices.  Patch is locked away in ${herhis} room, angry from having been kept out of the plan back at the McDohl estate.  Sorry Patch, we needed you to be a convincing servant who wasn't going to attack Aphid when the first opportunity arose.\n\nThe plan to rescue ${Silvana} isn't yours but ${Brigid}'s, which certainly surprises you.  Apparently, ${shehe}'s been up to more than just soldier's drills back at the barracks.  $!{shehe} has the place memorized.  \"When I saw you at the wedding, I was so confused and angry…it took me a night's rest to realize what you were doing.  I owe you, ${name}.\"  To your surprise, ${Brigid} goes down on a knee, kneeling right in front of you!  This is weird, especially coming from the ${girlboy} who used to jump out at you from the shrubbery.\n\n\"You single-handedly destroyed the group behind our village's destruction.  You took revenge for everyone we lost…while I stood aside and did nothing.  That's why…\"  The redhead faces the floor, unable to reach your eyes.  You don't want ${herhim} to feel ashamed or indebted to you, but knowing that stubborn brat like you do, well…\n\n\"I swear an oath to serve as your knight henceforth.  I forsake my pledge to my king and my country and will stand as your shield and sword as long as you will have me.  D-do you accept my oath, ${name}?\"\n\n*choice\n  #Accept.\n    *set acceptedBrigidOath true\n    *if (vigilant >= 50)\n      *if (whichWeapon = \"sword\")\n        You unsheathe your sword and plant it atop ${Brigid}'s shoulder.  Just like in all those stories you read when you were young.  Though you're far from being anybody's liege lord, you feel like one now.\n        *goto c11WhichWeapon2\n      *elseif (whichWeapon = \"axe\")\n        You place the non-bladed side of the axe atop ${Brigid}'s shoulder.  It's an awkward gesture with the chopping weapon, but otherwise it's just like those stories you read when you were young.  Though you're far from being anybody's liege lord, you feel like one now.\n        *goto c11WhichWeapon2\n      *elseif (whichWeapon = \"dagger\")\n        You pull out your dagger and plant it atop ${Brigid}'s shoulder.  It's a bit short, but otherwise it's just like all those stories you read when you were young.  Though you're far from being anybody's liege lord, you feel like one now.\n        *goto c11WhichWeapon2\n      *else\n        You take your spear off your back and plant it atop ${Brigid}'s shoulder.  Sure, technically they used swords instead, but otherwise it's just like all those stories you read when you were young.  Though you're far from being anybody's liege lord, you feel like one now.\n        *goto c11WhichWeapon2\n      *label c11WhichWeapon2\n\n      \"${Brigid}…${daughterson} of Sir Odrick, survivor of—\" your head pulsates for a moment, but you promptly continue, \"—knight of Delmacia, and most of all, my greatest friend.  I humbly accept your oath; now rise.\"  You aren't sure if that's a proper enough acceptance for such a knightly oath, but you tried.  ${Brigid} certainly enjoys it—you're met with a broad smile that you haven't seen in ages.\n      *goto c11AcceptDeclineChoice\n    *else\n      \"${Brigid} I…I don't know what words to say.  But I know I want you by my side.  So…er, you may rise?\"  You aren't able to match the officialness of such a knightly oath, but you manage to get the point across.  ${Brigid} appreciates it—you're met with a broad smile that you haven't seen in ages.\n      *goto c11AcceptDeclineChoice\n  #Decline.\n    *set acceptedBrigidOath false\n    ${Brigid} is the greatest friend you have, and true friends don't kneel for each other or give fancy oaths.  You don't want ${herhim} to change from the rough-housing brat you grew up with all these years.  \"${Brigid}…you don't owe me anything.  You're my friend, and friends don't bow and say 'sir' or 'milady.'  Now get your knees off the floor, all right?\"\n\n    The head doesn't rise, instead sinking even lower.  Eventually, it shakes into what appears to be a nod.  \"Same old ${name}.  You never change.\"  $!{shehe} sighs but smiles all the same.\n    *goto c11AcceptDeclineChoice\n*label c11AcceptDeclineChoice\n\n*if (brigidRelationshipPoints >= 1)\n  [i][${Brigid} Relationship: pass][/i]\n  *line_break\n  *line_break\n  You help pull ${herhim} back to ${herhis} feet but end up putting too much weight into it.  You fall backwards, ${Brigid} following right on top of you.  Thank the Fates ${shehe} had taken off ${herhis} armor; ${MC_heroesheroines} such as yourself deserve a far more climactic end!  With that freckled face and those grey-blue eyes you've known forever, just inches away from you…how do you feel towards ${Brigid}?  Do you love ${herhim} more than anyone else?\n\n  *choice\n    #I love ${herhim}.\n      *set myRouteBrigid true\n      You know your old friend well enough to know how ${shehe} feels, but you also know that ${shehe} would never make the first move.  That's why you purposefully pulled ${herhim} down with you!  \"${name}?  What are—\"  Your arms wrap around ${herhis} muscled torso as you drag ${herhim} within range of your lips.  The kiss the two of you share isn't that of friends, nor one of a knight and ${herhis} ${MC_lordlady}, but of lovers.  You don't know what will happen after tonight, but you want ${herhim} to know how you feel.\n    \n      Your two hearts race as they rest against each other in heated silence.  You want nothing more than to lay there for minutes more, hours more in ${herhis} knightly embrace. But you have a job to do, an oath of your own.  It's time to go save ${Silvana}.  ${Brigid} reluctantly stands up, embarrassedly scratching the back of ${herhis} head as is ${herhis} habit in uncomfortable situations.  \"I'm…so happy, ${name}.  Can't hardly think straight…you should go get ready while I put on my armor.\"\n    \n      All right, but ${shehe} can leave the disrobing process to you later on.\n      *goto c11BrigidRelationship1\n    #We're friends.\n      *set myRouteBrigid false\n      ${Brigid} reluctantly stands up, embarrassedly scratching the back of ${herhis} head as is ${herhis} habit in uncomfortable situations.  As for you, you need to focus on saving ${Silvana}.  The knight excuses ${herhim}self to go equip ${herhis} suit of armor.  You have already made all the preparations you require—mages don't really need much gear.\n      *goto c11BrigidRelationship1\n*else\n  *goto c11BrigidRelationship1\n*label c11BrigidRelationship1\n\n*page_break\n\nThe next order of business is the one-eyed cat${girlboy}.  You aren't sure what you want to say to ${herhim}, it's just that you don't want to depart with feelings this sour between you.  After knocking on the door and getting no response, you start getting worried.  Usually, you'd at least get a \"Frack off!\" or something.  It's probably best to check and see if ${shehe}'s okay; at least, that's what you tell yourself.\n\nThe door creaks open to reveal what is hardly more than a closet.  So this is Patch's room?  You've worked for Redwater for weeks now but never dared investigate it before.  Fear of scratches to the face, you might say.  While it's a small room, it does have a sizable cushion and a window that illuminates the area with faint moonlight.  Your fellow consultant is idly toying with the collar ${shehe} wore during the dinner debacle.\n\n\"Do you know what catfolk are called in our native tongue?\"  The bell attached to the collar jingles.  You're trying to gauge what sort of mood ${shehe}'s in and what the best way to respond would be.  But all you come up with is \"No.\"  That causes Patch to chuckle, then ${shehe} proceeds to tear the bell off.  \"That makes two of us, rookie.  Frack me sideways, I never cared.  Did I make a good servant, ${name}?\"\n\nYou're taken aback by such an odd question.  That cat eye stares straight into your soul with a sadness you've never felt before.  Patch performed ${herhis} task better than you thought ${shehe} ever could have and was a major part of keeping things running smoothly.  The willpower it took to not go off on all those leering nobles was very impressive.  You say as much, causing the chuckles to return.\n\n\"Didn't know I was so…what?  Domesticated?  Tamed?  Housebroken?!\"  The bell jingles for its last time, crushed in ${herhis} clenched fist.  That thing is made of glass…which has to be painful.  What's going through that head of ${hershis}?  Whatever it is pushes ${herhim} into a fury.  \"What if I fracking liked it?!  What if I…\"  Tears fall from ${herhis} face.  What do you do?\n\n*choice\n  #Embrace ${herhim}.\n    Patch has a bad temper at the best of times, but this time ${herhis} anger is directed at no one other than ${herhim}self.  And there's no one coming to ${herhis} defense on this one.  $!{shehe} needs support, needs someone to be there.  You would gladly be that someone.  You sweep the rogue into a hug, for however long ${shehe} needs it.  After a minute, the emotions seem to settle down.\n\n    \"Thanks…I feel lamer than a one-legged donkey.  What an ass…hey, rookie.\"  Patch squeezes you tight, though grabs a tad lower than your waist.  That cheshire grin means ${shehe} knows exactly what ${shehe}'s doing.  Typical cat, turning an emotional moment into…er…\n\n    *if (myRouteBrigid = true)\n      \"Don't think I didn't catch you and your knight out there.  Quite the fracken scene, a ${MC_lordlady} and ${MC_hisher} knight in shining armor, having a go on the floor like that.  Fates, you should know we never wash that carpet.  Friggin' rookie…so stupid…\"  You take a punch to the shoulder, but that can't hide the sadness those playful words are laced with.  Sorry Patch, you didn't consider how ${shehe} would feel.  You play along, this crazy game of love, so that you and your friend can get along as you once did.\n      *goto c11EmbraceWaitChoice\n    *else\n      *if (patchRelationshipPoints >= 2)\n        \"That knight of yours…${shehe} wasn't just lookin' for a new lordling to grovel over.  $!{shehe}'s the same ${Brigid} as in that story you told me…no, it ain't just a story, is it?  Sorry for blowin' ya the bad way back then, should've known you're too dim to lie!\"  Patch elbows you playfully, and you feel your mood improving by the second.  You didn't realize it before, but this is the effect your co-worker has on you; you're never in a bad mood when ${shehe}'s around.\n\n        There's an awkward silence before Patch asks the almighty question.  You don't want to run away from it, not now.  \"Why…why'd you refuse ${herhim}, ${name}?  Anyone could see it was a good match, Fates be damned, it could—\"\n\n        *choice\n          #\"Because I love you, Patch.\"\n            *set myRoutePatch true\n            \"Because I love you, Patch.\"\n\n            Your vision goes white and the back of your head hurts something awful.  The cat${girlboy} has pounced on you, not unlike when Maeben was literally sucking the life out of you.  But ${shehe} has left ${herhis} claws retracted this time, and—wait, is that purring?  The unmistakable sound emits from deep in your chest, where Patch's face now is.  You didn't even know catfolk could do that!  Those vibrations make for a remarkably pleasant and calming sensation, but you feel your heart racing nonetheless.\n\n            Eventually, ${shehe} digs ${herhis} face out of your ${MC_chestbosom} with an uncertain look on it.  \"Y-you're not pulling my leg, right?  I mean…you really lo…lo…you know?!\"  You didn't realize Patch could be this cute, struggling to get a word like 'love' out.  But you have no such difficulties, so you say it again.  And again.  You repeat it more, but supple lips latch onto yours.  Between the kisses and the purring, you feel enraptured.  The soft fur pressing against your skin is almost like a blanket, and you never want to let go.\n\n            But of course, you have to.  Patch isn't about to make it easy, however.  \"Hmph!  Giving me a tease and leaving me like that…hehe…I'll make you pay, after this is all over.\"  With a sly wink, you're left to your own imagination as to what punishment you'll receive.\n            *goto c11EmbraceWaitChoice\n          #\"Because…we're friends, nothing more.\"\n            *set myRoutePatch false\n            \"Because…we're friends, nothing more.\"\n\n            Patch heaves ${herhis} shoulders and sighs.  $!{shehe} looks disappointed and isn't trying to hide it at all.  \"Well, this sucks harder than an orc babe at—wait, fracken used that one already.\"  The rogue is trying to play it off like a bad joke, and maybe it is.  This game of love is a bad joke, filled with disappointment at every turn.  You mentally apologize to Patch.  $!{shehe}'s no kitten and won't be down for long.\n            *goto c11EmbraceWaitChoice\n      *else\n        *set myRoutePatch false\n        \"You know rookie, that knight of yours out there…${shehe} wasn't lookin' for some new lordling to bow and kneel ta.\"  Patch elbows your shoulder, which confirms what the one-eyed cat is implying.  \"$!{shehe} was looking to do more than just protect you, but I s'pose ya had your reasons.  Heh.\"\n        *goto c11EmbraceWaitChoice\n  #Wait for ${herhim} to calm down.\n    *set myRoutePatch false\n    You don't truly know what Patch is going through, so you have no idea what to do.  $!{shehe}'s in an erratic state, but it'll pass.  After ${herhis} nerves settle down, you can offer your support.  \"Well, I feel lamer than a one-legged donkey…what an ass.\"\n    *goto c11EmbraceWaitChoice\n*label c11EmbraceWaitChoice\n\n*if (whichElement = \"fire\")\n  You're about to leave when a hand on your shoulder halts you.  \"Why didn't you tell me, rookie?  You can shoot fire out ya friggin' hands like a cannon!\"  It's understandable that ${shehe}'s upset…you're just glad ${shehe} hasn't forsaken you for some sort of demon, at least.  \"That lizard kept his tongue twisted tight to keep it a secret, but I got it out of him eventually.  Now spill it.\"\n  *goto c11WhichElement1\n*elseif (whichElement = \"water\")\n  You're about to leave when a hand on your shoulder halts you.  \"Why didn't you tell me, rookie?  You can spout water out ya friggin' hands like a geyser!\"  It's understandable that ${shehe}'s upset…you're just glad ${shehe} hasn't forsaken you for some sort of demon, at least.  \"That lizard kept his tongue twisted tight to keep it a secret, but I got it out of him eventually.  Now spill it.\"\n  *goto c11WhichElement1\n*elseif (whichElement = \"earth\")\n  You're about to leave when a hand on your shoulder halts you.  \"Why didn't you tell me, rookie?  You can cause a friggin' earthquake just by takin' a step!\"  It's understandable that ${shehe}'s upset…you're just glad ${shehe} hasn't forsaken you for some sort of demon, at least.  \"That lizard kept his tongue twisted tight to keep it a secret, but I got it out of him eventually.  Now spill it.\"\n  *goto c11WhichElement1\n*else\n  You're about to leave when a hand on your shoulder halts you.  \"Why didn't you tell me, rookie?  You can shoot twisters out ya friggin' hands like it's nothin'!\"  It's understandable that ${shehe}'s upset…you're just glad ${shehe} hasn't forsaken you for some sort of demon, at least.  \"That lizard kept his tongue twisted tight to keep it a secret, but I got it out of him eventually.  Now spill it.\"\n  *goto c11WhichElement1\n*label c11WhichElement1\n\nSo that's it.  $!{shehe}'s been waiting for you to come clean, but you never did.  Rumors of what happened at the chapel that day vary, but one thing is certain: magic was involved.  Does the rest of Redwater know about what you are?  \n\n\"Of course we do!  We're not dirt-farmin' nitwits, after all.  We didn't want to make an issue out of it…\"  Binyo, Genock, Kerlton, Patch…they had all known, but they hadn't treated you any different.\n\nTo be accepted as who you are by those you care about…is a blessing few can boast of.  But you can, and it feels like the closest thing to a family you've had in a long time.  And this family is almost complete, just missing a particular dark mage who's locked away at the top of a tower.  You're surprised when Patch starts packing up ${herhis} knives and lockpicks.\n\n\"What?  This ${Silvana} seems loaded, just thinkin' of the reward ${shehe}'ll give us makes me wanna purr!  Let's get going, rookie.\"  You don't want to ruin the mood—it might be best to let Patch believe what ${shehe} wants to believe on this one.  No need to tell ${herhim} that this ${princessprince} is the same one that lived out in a forest for months eating nothing but stale bread and goat cheese.\n\n*page_break\n\nAnd so, the odd trio of you leave the Redwater offices together: a knight, a thief, and a mage.  On paper, you'd make a formidable team, but reality involves far more bickering and insults.  While you're intent on a serious discussion of strategy and tactics, your companions…\n\n\"${name}!  This cat-person, can we even trust it?  Sneak-thieves like ${herhim} would stab their mothers in the back if there was coin in it.\"  Never afraid to speak ${herhis} mind, ${Brigid} opens up a discussion on how ${shehe} feels about your fellow Redwater Salvage Consultant.  It becomes a heated exchange.\n\n\"Pig-fracken freckled farmer wants a fight, is it?  You've found one—can't believe ${name} isn't tired of seein' that ugly mug of yours.\"  $!{shehe} spits those words like a hairball, causing ${Brigid}'s right hand to rest dangerously close to ${herhis} sword hilt.  It's good that ${herhis} knight training thus far kept the blade in its scabbard, but knowing ${herhis} temper…\n\nYou need to get these two under control, and fast.\n\n*choice\n  #Appeal to honor.\n    *if (vigilant >= 50)\n      *set renown +1\n      [i][Check versus Vigilant: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *goto c11Vigilant1\n    *else\n      *goto c11Vigilant1\n    *label c11Vigilant1\n\n    *if (acceptedBrigidOath = true)\n      \"${Brigid}, you made an oath to be my knight just minutes ago.  And I accepted it.  I won't force you to accept Patch, but I need you to trust ${herhim} as I have.  We're about to risk our lives here, and if we can't count on each other…Kaine will kill us as he has so many others.\"\n      *goto c11AppealChoice\n    *else\n      \"${Brigid}, you made an oath to be my knight just minutes ago.  I couldn't accept it because I see you as my equal.  I feel the same way towards Patch.  I won't force you to accept ${herhim}, but I need you to trust ${herhim} as I have.  We're about to risk our lives here, and if we can't count on each other…Kaine will kill us as he has so many others.\"\n      *goto c11AppealChoice\n  #Appeal to logic.\n    *if (logical >= 50)\n      *set renown +1\n      [i][Check versus Logical: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *goto c11Logical1\n    *else\n      *goto c11Logical1\n    *label c11Logical1\n    \n    \"${Brigid}, we're up against Disciple Kaine.  This will be a far more difficult fight than before, especially since…he'll likely have magic.  If ${Silvana} was forced to unlock the ability in a creature like Aphid Almondvale, there's little doubt that Kaine also has mastery over it.  We need all the help we can get.\"\n    *goto c11AppealChoice\n  #Appeal to emotion.\n    *if (logical \u003c= 50)\n      *set renown +1\n      [i][Check versus Emotional: pass][/i]\n      *line_break\n      [i]You have gained renown[/i]\n      *goto c11Emotional1\n    *else\n      *goto c11Emotional1\n    *label c11Emotional1\n    \n    \"${Brigid}, we're going to fight Disciple Kaine.  No, we're going to kill him.  My family died at his hands…I can't sleep soundly knowing that he still draws breath!  ${Silvana} has been his captive for almost a year!  Don't you want to slay this monster, once and for all?!\"\n    *goto c11AppealChoice\n*label c11AppealChoice\n\nThe knight looks to the ground like a beaten dog.  $!{shehe} apologizes, even to the cat${girlboy} that ${shehe}'d previously offended.  It seems as if your words did exactly as you hoped.  Unfortunately, the person who you just finished standing up for takes this opportunity to be a pain in the ass.  Patch goes into a grin, ${herhis} sharpened canine teeth showing.  \"But if you happen tah trip and fall to your death, I'm sure that armor will fetch a fine price!\"\n\n*if (logical \u003c= 50)\n  [i][Check versus Emotional: pass][/i]\n  *line_break\n  *line_break\n  *if (whichWeapon = \"sword\")\n    This crap isn't going to stop unless you take serious measures.  You draw your blade and point it straight at the one-eyed rogue.  $!{shehe} jumps back in fear of your sudden move.  You have no intention of striking ${herhim}, of course, but you've learned from your time in the city that you have to be willing to get rough in order to get what you want.\n    *goto c11Logical2\n  *elseif (whichWeapon = \"axe\")\n    This crap isn't going to stop unless you take serious measures.  You pull your axe out, pointing it straight at the one-eyed rogue.  $!{shehe} jumps back in fear of your sudden move.  You have no intention of striking ${herhim}, of course, but you've learned from your time in the city that you have to be willing to get rough in order to get what you want.\n    *goto c11Logical2\n  *elseif (whichWeapon = \"dagger\")\n    This crap isn't going to stop unless you take serious measures.  You draw your dagger out and point it straight at the one-eyed rogue.  $!{shehe} jumps back in fear of your sudden move.  You have no intention of stabbing ${herhim}, of course, but you've learned from your time in the city that you have to be willing to get rough in order to get what you want.\n    *goto c11Logical2\n  *else\n    This crap isn't going to stop unless you take serious measures.  You pull your spear out, pointing it straight at the one-eyed rogue.  The tip lays dangerously close to ${herhis} face.  $!{shehe} jumps back in fear of your sudden move.  You have no intention of striking ${herhim}, of course, but you've learned from your time in the city that you have to be willing to get rough in order to get what you want.\n    *goto c11Logical2\n  *label c11Logical2\n\n  \"Okay, okay!  I get it, point taken…jeez, rookie, always anxious to get your weapon out when I'm around.\"  Humor always present, you allow Patch to diffuse the situation you've created.  Placing your weapon back where it belongs, you reply, \"Good.  You're a Redwater Salvage Consultant.  Just because the paperwork hasn't been filed doesn't mean this isn't a job.  Take it seriously, or our enemies will make violin strings out of you.\"\n  *goto c11LogicalAfter\n*else\n  [i][Check versus Logical: pass][/i]\n  *line_break\n  *line_break\n  You're growing increasingly tired with the one-eyed rogue's quips and jokes.  They have a time and a place, but not now and not here.  Too much is at stake.  \"A fine price?  How much is your life worth, Patch?  A silver pence?  A gold ducat?\"  You pull out a handful of coins from your pouch and toss them into a nearby gutter.  It's mostly bronze, so it isn't a huge financial loss, but it's enough to get your point across.  \"Unless you want to throw your life away, you'd better start getting serious.  Understood?\"\n  *goto c11LogicalAfter\n*label c11LogicalAfter\n\nPatch gulps and nods, deciding to keep ${herhis} witticisms to ${herhim}self for the moment.  As the castle's observatory tower looms near, it's time to discuss strategy.  Or tactics, rather, as ${Brigid} corrects, given the small size of our team.  The premise is simple: find a way to get in, then climb to the top.  \"The observatory has a recent stigma around it since before I joined with the knights, guess I know why now.  Rumor spreads like a bad cough in the barracks, and there was one about a blue woman visiting occasionally.  Obviously, the rumor was…er, crass.\"\n\nYou don't care what those trench-digging recruits spread as long as it helps get you closer to ${Silvana}.  ${Brigid} proceeds to flesh out the plan with a serious tone that almost makes it seem like ${shehe} knows what ${shehe}'s doing.  \"I'll say I'm escorting a couple acquaintances of Lady Almondvale's for questioning.  The man who resides in the tower—they only refer to him as the Observer—has got to be that Disciple.\"  Observer?  'Butcher' fits much better in your opinion.  But it makes a strange sort of sense, what with Kaine's villainous group now shunned and disbanded.  He has to keep a low profile, locked away in his own little tower.\n\nYou're about to turn a corner to get onto Squire's Square when a paw yanks your cloak into a back alley.  \"Shh…\" Patch whispers for you to keep silent.  ${Brigid} rolls ${herhis} eyes but complies all the same.  A good thing, too; a dozen men clad in chainmail and black hoods sprint across right where you once stood.  With that pace and efficiency, they certainly aren't the kind of guardsmen you know.\n\n\"T-those were Vanguard Light Infantry…\" The knight's voice shakes, no longer holding the confidence it had just moments earlier.  \"All squads should still be deep in Nanchou, they aren't even based in the capital city to begin with!\"  It's a puzzle that you don't have the luxury of figuring out, but at least it's a crisis avoided.  For now, anyway.  You thank the cat and ${herhis} ears for saving your skin.\n\n\"Seems to me like soldier-${girlboy}'s plan of walking up to the front gate and introducing ourselves won't cut it.\"  $!{shehe} smirks, obviously enjoying one-upping your fellow companion.  Patch has an alternative plan.  \"I know a back alley and some flat rooftops we can use to jump the fence.  Less chance of getting murdered by elite commandos that way, don'tcha think?\"\n\nThere's a soundness to the rogue's plan; you only hope it isn't just a chance to knock ${Brigid} down a peg.  If there exists a side alley that would get you close enough to scale the barricade, Patch would certainly be the one to know.  Predictable disagreement arises.  \"Right, just throw ourselves over twelve feet of spiked fence.  Brilliant.  What do you think, ${name}?\"\n\nYou had a feeling you'd be put on the spot again.\n\n*choice\n  #Go with ${Brigid}'s plan.\n    \"We'll go with ${Brigid}'s plan.  It's a good excuse to get inside…the McDohl estate is another catastrophe that the Crown will want to keep locked down.\"  You nod to yourself to confirm the logic behind it.  The only possible problem is that your old friend is a horrible liar.  Honesty is never a helpful virtue when it comes to subterfuge.\n\n    *if (myRouteBrigid = true)\n      ${Brigid} responds with a relieved smile, happy to know you have faith in ${herhis} plan.  You're happy that ${shehe}'s happy, and as sappy as it sounds, your heart starts feeling lighter.  It's a warm fuzzy sensation not unlike the effect of halfling cider.  The one good eye of Patch looks from ${Brigid}'s pair of eyes to yours before ${shehe} spits on the ground in disgust.  \"I get it, I'm outnumbered here.  Save it for a room—makin' me toss up hairballs here.\"\n      \n      R-right.  Back to the matter at hand, ${name}.\n      *goto c11BrigidPlan1\n    *elseif (myRoutePatch = true)\n      ${Brigid} responds with a relieved smile, happy to know you have faith in ${herhis} plan.  It's quickly covered up by Patch's angry pout, now just inches away from your face.  $!{shehe} isn't bad at staring people down, even with only one eye.  \"Adding this to your punishment, rookie.\"  Even though ${shehe} tried to say it all stern and serious, you know ${shehe}'s holding back a playful laugh.  As to what your cat${girlboy} has in mind…\n      \n      R-right.  Back to the matter at hand, ${name}.\n      *goto c11BrigidPlan1\n    *else\n      ${Brigid} responds with a relieved smile, happy to know you have faith in ${herhis} plan.  It's quickly covered up by Patch's angry pout, now just inches away from your face.  \"Hmph.  Dirt farmers gotta stick together, I s'pose.\"  With the decision settled, it's time to get to the matter at hand.\n      *goto c11BrigidPlan1\n    *label c11BrigidPlan1\n\n    The matter at hand comes in the form of two overweight guards who are masters at working the night shift.  They're asleep while standing up, a talent that takes both years of practice and a very sturdy polearm to master.  These two aren't the Vanguard of anything, except maybe the lunch line.  Even still, you can't exactly walk past them.  ${Brigid} makes introductions in military fashion.\n\n    [i]*clears throat*[/i]  \"I am ${Brigid} of the Royal Knights 54th Central Squadron.  I come upon the request of Lady Almondvale to deliver these two with me for questioning by the Observer.\"  It certainly sounds official.  Waking up from their slumber would make any minimum-wage doorpost angry, but to your surprise, ${Brigid} is treated with handshakes and acclaim.\n\n    \"The 54th!  Heard y'all are mage killers now, ain't it?  How a'come they got you running errands like a half-bit recruit?\"  The redhead never handles praise well, especially if ${shehe} doesn't deserve it.  $!{herhis} face lights up red, and ${shehe} proceeds to scratch the back of ${herhis} head.  This is going wonderfully smooth, at least until a crippled man with a pair of crutches emerges from the street behind you.\n\n    His movements are slow, but his tongue is quick.  \"Goodness me, visitors at this hour?  Bergus better not be trying to hire streetwalkers again.\"  That voice sounds far too familiar.  But whose voice is it?\n\n    *if (resourceful >= 50)\n      [i][Check versus Resourceful: pass][/i]\n      *line_break\n      *line_break\n      A clever wit yet a sadistic mind, a blonde torturer in the robes of a priest.  You thought you'd dealt with him already!\n      *goto c11BrigidPlan2\n    *else\n      *goto c11BrigidPlan2\n    *label c11BrigidPlan2\n\n    *choice\n      #Conia.\n        Disciple Conia.  Wait…wasn't she that Westerner covered in spiked armor?  Right, and she had those black teeth…ugh, you've been trying to forget about that nightmare.  No, this is her fellow monk, Jorne.\n        *goto c11BrigidPlan3\n      #Iorlan.\n        Disciple Iorlan.  Wait…wasn't he that orc who wanted your head on a stake for what you did to Idricsa?  He's certainly the last person you'd want to bump into again.  But this is his fellow monk, Jorne.\n        *goto c11BrigidPlan3\n      #Kaine.\n        Disciple Kaine.  Wait, Kaine is tall and has black hair.  Not to mention his cold gaze that could cut you to pieces even from here.  No, this is his fellow monk and underling, Jorne.\n        *goto c11BrigidPlan3\n      #Jorne.\n        [i]You have gained renown[/i]\n        *line_break\n        *line_break\n        Disciple Jorne.  The man you clubbed across the face during that Maeben rescue, and the man whose robes you stripped to pull off that stunt at the wedding.\n        *goto c11BrigidPlan3\n    *label c11BrigidPlan3 \n\n    Jorne makes some small talk with the hired help before offering to escort you to the Observer himself.  ${Brigid} complies, not knowing any better.  You keep your hood over your face as best you can…this isn't good at all!  There's no way to warn your companions about who this guy is, either.  So you walk in awkward silence behind the crippled monk.\n\n    \"So…${Brigid}, was it?  How'd that battle against that Cossack Order demon go?  I've just got to get a first-hand account!\"  The words are laced with deep resentment, but it's so well-hidden that your friend has no chance of catching it.  This isn't good at all—${shehe}'ll have to learn how to lie, and quick!\n\n    *if (whichElement = \"fire\")\n      \"I, uh…it was a horrific ordeal.  The fire was everywhere, tapestries set ablaze, torches setting the walls to ash.  The demon ${MC_himher}self…my fellow squadmate delivered the blow, not I.\"\n      *goto c11BrigidPlan4\n    *elseif (whichElement = \"water\")\n      \"I, uh…it was a horrific ordeal.  The red fog and rain of blood…I mostly helped evacuate those who were trampled by the fleeing crowd.  The demon ${MC_himher}self…my fellow squadmate delivered the blow, not I.\"\n      *goto c11BrigidPlan4\n    *elseif (whichElement = \"earth\")\n      \"I uh…it was a horrific ordeal.  The tremors shook the floor, except the floor had changed into mud…we were all afraid the chapel was going to collapse on top of us.  The demon ${MC_himher}self…my fellow squadmate delivered the blow, not I.\"\n      *goto c11BrigidPlan4 \n    *else\n      \"I, uh…it was a horrific ordeal.  The smell was rancid, and books and paintings flew about like we were in a tornado.  I mostly helped evacuate those who'd been trampled by the fleeing crowd.  The demon ${MC_himher}self…my fellow squadmate delivered the blow, not I.\"\n      *goto c11BrigidPlan4\n    *label c11BrigidPlan4\n    \n    You aren't entirely comfortable with ${Brigid} talking about you like that, even indirectly, but it's a solid lie.  Unfortunately for the knight, Jorne knows the truth about what happened.  \"Oh, you're so modest!  Truth be told…I caught a glimpse of this demon.\"  The four of you slowly make your way up a spiral staircase and into a large room stacked to the ceiling with barrels.  It almost looks like a warehouse for a winery…what is all this doing in an observation tower?\n\n    \"Hold here for a moment, Sir Demonslayer.\"  Jorne hobbles over to a chair that sits directly under the only source of light in the room—a large candelabra.  He thanks you for waiting.  \"Appreciate you staying still for me.  I wanted to keep some distance…it seems as if one of you smells rather…\"  A smile creeps up his face, the smile of a man on the verge of revenge.\n\n    \"Fishy.  Yes, like mackerel!\"\n\n    *page_break\n    *goto c11BrigidPatchPlanChoice\n  #Go with Patch's plan.\n    \"We'll go with Patch's plan.  With what happened at the McDohl estate, the Crown is sure to be on high alert.  Best to avoid the guards as much as we can.\"  You nod to yourself to confirm the logic behind it.  The only possible problem is ${Brigid}'s plate armor…not something ${shehe}'ll be able to jump long distances with.  But you're confident you'll find a way to manage.\n\n    *if (myRouteBrigid = true)\n      ${Brigid} frowns, distraught that you don't have faith in ${herhis} plan.  It pains your heart to see ${herhis} like this, and you want nothing more than to scoop ${herhim} up in your arms and apologize.  But this is the right choice to make, and eventually the knight agrees.  \"Whatever you think is best, ${name}.  I will follow you anywhere.\"\n      \n      A line like that causes you to grow embarrassed.  Patch makes over-exaggerated choking sounds, mocking the sappy exchange.  \"You two are gonna make me cough up a hairball.  Let's just get going already, frickin' dirt farmers…\"\n      *goto c11PatchPlan1\n    *elseif (myRoutePatch = true)\n      ${Brigid} frowns, distraught that you don't have faith in ${herhis} plan.  In contrast, Patch has the widest grin you've ever seen on ${herhis} face.  \"Us salvage consultants gotta stick together, don't we rookie?\"  $!{shehe} is now at your side, hand on your shoulder in some sort of campy display of camaraderie.  At least, it's camaraderie until that hand drifts towards your butt and squeezes.  You elbow ${herhim} away…though secretly, you don't mind it one bit.  Keep focus!\n      *goto c11PatchPlan1\n    *else\n      ${Brigid} frowns, distraught that you don't have faith in ${herhis} plan.  In contrast, Patch is all smiles.  \"Us salvage consultants gotta stick together, don't we rookie?\"  You suppose you do.  You don't want to hurt your knight's feelings, but this sort of thing is what your co-worker does for a living.  Granted, ${shehe} isn't exactly rich…\n      *goto c11PatchPlan1\n    *label c11PatchPlan1\n\n    The series of twists and turns in these tiny back alleys are enough to make anyone dizzy.  Worse yet, a perpetual wetness that sure isn't purified water lays nearly ankle-deep.  No good hero ever died from a toe infection.  Thankfully the smaller-sized abode that fit Patch's specifications appears, though with no ladder in sight, it's going to take some muscle to push each other up there.\n\n    *if (sly \u003c= 50)\n      [i][Check versus Powerful: pass][/i]\n      *line_break\n      *line_break\n      You loosen up your toned shoulders.  Time to put that perfect physique to good use.  You kneel and offer a leg up for the cat${girlboy}.  $!{shehe}'s lighter than you expected; the only issue now is that your hands are damp with whatever the three of you have just dredged through.  Lovely.  ${Brigid} is up next but doesn't seem willing.  \"You're made of strong stuff, ${name}, but this is sixty pounds of armor.\"\n\n      *if (gender = \"male\")\n        What kind of man would you be if you couldn't handle lifting a bit of weight?  You tighten up your stance, keeping a low center of balance.  The pain of a metal boot against your hands and gauntlets on your shoulders is worse than the weight itself.  You can't afford to be noisy, so you slowly lift ${herhim} up.  A sharp sensation in your back is your reward, but at least that matter is settled.  Your companions pull you up, and now it's time to face the jump.\n        *goto c11PatchPlan2\n      *else\n        You sigh, knowing that your knight is underestimating just how strong your stuff is.  But you don't want to shame your friend's ego, so you allow ${herhim} to prop you up.  To ${herhis} credit, ${shehe} doesn't seem to have much difficulty with it.  You and Patch work together to pull ${Brigid} up, which is especially painful since you're trying to be sneaky about it.  A sharp sensation in your back is your reward, but at least that matter is settled.  It's now time to face the jump.\n        *goto c11PatchPlan2\n    *else\n      [i][Check versus Powerful: fail][/i]\n      *line_break\n      *line_break\n      You aren't exactly going to win any medals for lifting, especially not knights decked out in full plate armor!  ${Brigid} props you up with relative ease, Patch following right after.  The two of you are able to heave and ho your heaviest member up, but not without cost.  The painful sensation in your back will be with you for a few days, you estimate, but at least that matter is settled.  It's now time to face the jump.\n      *goto c11PatchPlan2\n    *label c11PatchPlan2\n\n    \"What'd I tell ya?  Perfect success rate in the East Hightown district for a reason, rookie.\"  $!{shehe} has every right to boast—the fence is several feet smaller in this section and even sports a pair of generous shrubbery to cushion the fall.  It's still going to be a decent-sized jump, however.  You ask ${Brigid} if ${shehe} can make it and are met with a confident nod.\n\n    *if (myRouteBrigid = true)\n      \"I'll need you to hold onto my sword.  You two jump in first.  If I can't make it…at least I can draw away the attention of the guards.\"  You don't like how that sounds, not one bit.  $!{shehe} is far too willing to sacrifice ${herhim}self for your sake…doesn't ${shehe} know that's the last thing you want?  Patch jumps with an acrobatic grace but manages to miss the bushes entirely, which is fine since ${shehe} lands completely silent on all fours.  Catfolk have it nice.\n      \n      You grab ahold of ${Brigid}'s sword, but that doesn't mean you're willing to part with ${herhim} here.  \"I'll be giving this back to you in a second, okay?  I paid Gundrik way too much for it to go to waste.\"  It's amazing how much a name brings back memories.  Those boring, sluggish days at the blacksmith making gardening hoes…what you wouldn't give to have those days back.  $!{shehe} looks at your lips longingly like ${shehe} wants to smother them with kisses, but ${shehe} resists.  It's a shame.\n      *goto c11PatchPlan3\n    *else\n      \"I'll need you to hold onto my sword.  You two jump in first.  If I can't make it…at least I can draw away the attention of the guards.\"  You don't like the 'noble sacrifice' theme ${herhis} logic is using, but you grab ahold of ${Brigid}'s sword nonetheless.\n      \n      This doesn't mean you're okay with ${herhim} throwing ${herhis} life away.  \"I'll be giving this back to you in a second, okay?  I paid Gundrik way too much for it to go to waste.\"  It's amazing how much a name brings back memories.  Those boring, sluggish days at the blacksmith making gardening hoes…what you wouldn't give to have those days back.  \"${name}…\"\n      *goto c11PatchPlan3\n    *label c11PatchPlan3\n\n    *if (sly >= 50)\n      [i][Check versus Sly: pass][/i]\n      *line_break\n      *line_break\n      The jump itself is child's play.  You may lack the inherent grace of a catperson, but you are far more agile than most.  You manage to flip in mid-air so that you land comfortably on your back against the shrub, which cushions you quite well.  Patch is no doubt impressed, grunting a \"Hmph.\"\n      *goto c11PatchPlan4\n    *else\n      [i][Check versus Sly: fail][/i]\n      *line_break\n      *line_break\n      With a running start, you aren't afraid of failing to jump the gap, you're afraid of the landing.  And rightfully so, as you land belly-first onto the shrubbery.  Your face snaps a few branches, but aside from a few stings, you make it out okay.  That doesn't stop Patch from giving you a sly smile, however.\n      *goto c11PatchPlan4\n    *label c11PatchPlan4\n    \n    You hold your breath as you watch your knight in shining armor take the leap of faith.  The crunching noise of the bush is far from stealthy, but you're just glad ${shehe} ends up on this side of the fence.  You hand ${herhim} back ${herhis} golden blade.  Well, technically it's steel with plated brass, but whatever.  With the guardhouse a fair distance away from the observatory's main entrance, skulking across undetected is easy.\n\n    Almost too easy.\n\n    Patch pulls out a lockpick from ${herhis} hair and has ${herhis} way at the door.  There's no better thief in the city when it comes to locks, but even you could've opened this door.  \n\n    \"Can't even show off my skills, blasted thing's unlocked.\"  \n\n    That's odd…${Silvana}'s the greatest secret in the Kingdom, and the front door is wide open?  Whatever.\n\n    You are met with a spiral staircase.  There are a pair of doors to either side of it, but this Observer is most likely to be at the top.  With that in mind, you proceed up the stone set of stairs.  Patch jumps ahead to take point, with the excuse that ${shehe} will be \"looking for traps, and not the girly kind.\"  ${Brigid} wants to protect your flank, so ${shehe} takes the rear.  The trio slowly make their way upstairs into a large room packed to the ceiling with gigantic barrels.\n\n    It looks like a warehouse for a winery, but what is it doing midway up an observation tower?  What draws your attention is the blonde-haired man slouching in a chair at the center of the room.  With the candelabra and the only source of light right above him, he certainly stands out from his surroundings.  Why does he look so familiar?\n\n    [i]*clap*[/i]\n    [i]*clap*[/i]\n    [i]*clap*[/i]\n\n    His slow clap echoes throughout the expanse of the room.  \"Congratulations, ${name}.  You made it here at last.\"  He pulls out a couple of crutches and stands, nearly tripping over as he does so.  \"Sorry if I don't curtsy, sorta paralyzed from the waist down.  Getting run over by a giant Fates-be-damned lizard can do that to ya.  Who knew?\"\n    \n    This person…what's his name?\n\n    *choice\n      #Conia.\n        Disciple Conia.  Wait…wasn't she that Westerner covered in spiked armor?  Right, and she had those black teeth…ugh, you've been trying to forget about that nightmare.  No, this is her fellow monk,Jorne.\n        *goto c11PatchPlan5\n      #Iorlan,\n        Disciple Iorlan.  Wait…wasn't he that orc who wanted your head on a stake for what you did to Idricsa?  He's certainly the last person you'd want to bump into again.  But this is his fellow monk, Jorne.\n        *goto c11PatchPlan5\n      #Kaine.\n        Disciple Kaine.  Wait, Kaine is tall and has black hair.  Not to mention his cold gaze that could cut you to pieces even from here.  No, this is his fellow monk and underling, Jorne.\n        *goto c11PatchPlan5\n      #Jorne.\n        [i]You have gained renown[/i]\n        *line_break\n        *line_break\n        Disciple Jorne.  The man you clubbed across the face during that Maeben rescue, and the man whose robes you stripped to pull off that stunt at the wedding.\n        *goto c11PatchPlan5\n    *label c11PatchPlan5 \n    *goto c11BrigidPatchPlanChoice\n*label c11BrigidPatchPlanChoice\n\nHigh-pitched cackles pour from the man's mouth.  You yell at your companions to draw their weapons.  It's only a cripple, so why are you so tense?  This has all the makings of a trap, that's why.\n\n\"Dearest ${name}…do you want to know what happened to me—to my family when I was caught butt-naked after that wedding fiasco?\"  Jorne's voice thunders at you, but you give no reply.  You have nothing to say to someone who poured acid down the throats of innocents.  It's called karma.  \"I used to be a respected man; I was getting married in a month!  I had a freaking retirement plan, for crying out loud!\"\n\nThe barrels start to rumble as if there were creatures inside fighting to break free.  Just what the heck is going on?\n\n*if (whichElement = \"water\")\n  No, you know what's going on.  Something you're all too familiar with: water magic.  Could it be that ${Silvana} unlocked this Disciple's magic, just as ${shehe} had done with Aphid?  Whatever the case, a barrel is flying straight towards you!  The liquid inside gives him complete control over it!\n  *goto c11WhichElement2\n*else\n  Whatever's going on comes in the form of a barrel flying straight towards you!  This has to be magic!\n  *goto c11WhichElement2\n*label c11WhichElement2\n\n*if (sly >= 50)\n  [i][Check versus Sly: pass][/i]\n  *line_break\n  *line_break\n  You only have an instant to react, but luckily, that's all you need.  Bending your back and lowering your knees, you manage to duck right under the possessed keg.  The barrel busts open against the rear wall, splashing you with lukewarm wine.\n  \n  \"All right, I admit that was a neat move, kid…but how about some of this?!\"\n  *goto c11Sly1\n*else\n  [i][Check versus Sly: fail][/i]\n  *line_break\n  *line_break\n  You don't have time to react, so you have to face it head on.  HrrrnGH!  You lose your breath as the possessed keg rams against your chest, but you manage to hold it steady.  The smell is definitely that of fermented grapes.\n  \n  \"You're one tough kid, I'll give you that…but how about some of this?!\"\n  *goto c11Sly1\n*label c11Sly1\n\nMore barrels fly, not just towards you but your companions as well.  You need to close in on him—but how?  Going straight at him would be painful, and there are barrels touching the ceiling on the left side of this circular level.  The right side looks to have more mundane items like furniture and rolls of carpet.\n\nWhat's the plan?\n\n*temp yourPosition \"\"\n\n*choice\n  #Me on the left, ${Brigid} in the center, Patch on the right.\n    *set yourPosition \"left\"\n    You'll take the path through the barrels while ${Brigid} plugs up the middle.  $!{shehe}'ll take some bruises but should be okay if that armor isn't just for show.  The right side is a more open area where Patch can make use of those feline reflexes of ${hershis}.  The two agree, and you each spring into action.\n\n    While most would think of wading through and over dozens of potentially large and dangerous projectiles as a bad thing, there are certain benefits.  The first of which is vision.  Jorne can't see where you are, especially not in this darkness.\n\n    *if (whichElement = \"water\")\n      As a water mage, you know it's possible to detect people from the blood inside their bodies.  You've done it before—mostly subconsciously—but at the moment, there's essentially a wall of liquid between you and your fellow magician.  There's no chance he'd be able to see you through that.\n      *goto c11LeftYou1\n    *else\n      Would a water mage be able to detect you from the blood inside your body?  You aren't sure, but there's essentially a wall of liquid between you and him right now.  Not much of a chance he'll see you through that.\n      *goto c11LeftYou1\n    *label c11LeftYou1\n\n    Sounds of barrels breaking spur you forward.  You need to climb these barrels if you're going to reach his flank and finish him once and for all.  Unfortunately for you, the kegs beneath you start rumbling.  \"I know you're in there somewhereeeeee!  Why not try your magic against mine, demon?  Getting tired of clobbering your friend here!\"\n\n    *if (whichElement = \"fire\")\n      A cry from ${Brigid} is all you need to hear.  Complete focus blankets you like a fitted glove.  You latch your hands onto the barrel you're currently standing on and focus an intense amount of heat against it.  This is a stupid thing to even attempt, but there's no way you're going to make it through that wall of barrels otherwise.  With enough pressure inside…if you could direct the heat in just such a way…\n  \n      [b]KrUh-bLAM![/b] \n  \n      You wouldn't say you fly into the air; no, that makes it seem like there's some sort of grace to it.  You are jettisoned through it like a cannonball made out of flesh!  Your body topples over the tower of barrels, and you ride the wave crashing down.  Thousands of pounds of wine erupt onto the floor; you just pray neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *elseif (whichElement = \"water\")\n      A cry from ${Brigid} is all you need to hear.  Complete focus blankets you like a fitted glove.  Calming the barrels beneath you is simple, but you need to get to Jorne, and quick.  Then you get an idea.  You can manipulate water through the air, so with that logic…you latch your hands onto the keg you're currently standing on and focus.  You're not quite sure when you left the ground, but now you and your wooden vessel are hovering over a dozen feet in the air.\n  \n      You can't afford to leisurely fly your way around the long path to reach Jorne, however; not while your friends are in danger.  This wall of barrels blocking your path…you're going to have to knock it down!  Your magic propels you forward in a torrent—you're like a cannonball made out of flesh!  You topple over the barrels, riding the wave as it comes crashing down.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *elseif (whichElement = \"earth\")\n      A cry from ${Brigid} is all you need to hear.  Complete focus blankets you like a fitted glove.  You're an earth mage—and you aren't going to waste any more time bumbling around on top of wine casks like an idiot.  You're going to topple that tower over, you decide as you direct tremors on the stone floor beneath you.  The floor itself slants, and the barrels under you start moving along with you.  Keeping your balance atop moving cylinders is a circus act you aren't prepared for, but you manage it well.  Another yell hurries you forward.  \n  \n      Focusing upon the ground beneath your keg, you push outward with a tremendous amount of force, a protruding stone slab propelling you into the air and…into the barrels like a cannonball made out of flesh!  Your body topples over the tower of barrels, and you ride the wave crashing down.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *else\n      A cry from ${Brigid} is all you need to hear.  Complete focus blankets you like a fitted glove.  What's a talented air mage like you doing wasting ${MC_hisher} time bumbling around on top of wine casks like an idiot?  You're going to knock this tower of fermented juice down!  Buzzing whispers through your ears as you direct it towards your feet.  Your balance has gotten much better these past weeks.  You're now floating a dozen feet in the air!\n  \n      You can't afford to leisurely fly your way around the long path to reach Jorne, however.  Not while your friends are in danger.  This wall of barrels blocking your path…you're going to have to knock it down!  Your magic propels you forward in a torrent—you're like a cannonball made out of flesh!  You topple over the barrels, riding the wave as it comes crashing down.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n\n  #${Brigid} on the left, me in the center, Patch on the right.\n    *set yourPosition \"center\"\n    You'll take the path of most resistance: the center.  ${Brigid} will work ${herhis} way through the barrels, while Patch takes the right side.  $!{herhis} feline reflexes should work best in a more open area.  The two agree, and you each spring into action.\n\n    *if (attractedTo = \"female\")\n      It seems as if your opponent is pleased to face you head on.  \"How'd that elf taste, ${name}?  You know the one.  Fates, should've taken a bite while I had the chance!\"  Yelling out his frustrations, Jorne conjures up a formation.  Barrels join together, crafting a rolling wall that dashes straight towards you!\n      *goto c11CenterYou1\n    *else\n      It seems as if your opponent is pleased to face you head on.  \"How'd that elf taste, ${name}?  You know the one.  Fates, never thought I'd be jealous of another man's body.  Seriously made me uncomfortable!\"  Yelling out his frustrations, Jorne conjures up a formation.  Barrels join together, crafting a rolling wall that dashes straight towards you!\n      *goto c11CenterYou1\n    *label c11CenterYou1\n\n    *if (whichElement = \"fire\")\n      Complete focus envelops you like a glove, the coldness evident as you focus upon the flames in the candelabra.  The flames on those candles grow in intensity, becoming the equivalent of medieval blowtorches.  The iron hinges that hold them up melt apart in a matter of seconds.  Its only downside is the smoke it creates, which catches your opponent's attention.\n      \n      [i]Kru-ASH![/i]\n      \n      Jorne dodges by essentially flopping away like a fish out of water.  \"Nice try, champ, why don't you…Fates…\"  A shadow covers him.  The tower of barrels topples, pushed over by ${Brigid}.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *elseif (whichElement = \"water\")\n      Complete focus envelops you like a glove, allowing you to sense each and every drop of wine in this room.  Your mind feels drenched in it, and you fear for a moment that you've grown drunk just thinking about it.  The barrels tumbling toward you freeze in place.  Literally.  The ice expands and conjoins the kegs together, slowing their path completely.\n      \n      But then a patch of frozen wine appears in the lane between you and hundreds of pounds of ice.  You don't like where this is headed; your enemy water mage regains control of the red glacier, now sliding at an extreme speed right in your direction!\n      \n      \"Nice try, champ, why don't you…Fates no!\"  A shadow covers him.  The tower of barrels topples, pushed over by ${Brigid}.  Thousands of pounds of wine erupts onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *elseif (whichElement = \"earth\")\n      Complete focus envelops you like a glove, and the weight of tons upon tons of fermented grape juice weighs heavily upon your mind.  There's little doubt that Jorne is at the advantage here as a water mage, but when it comes to stopping a dozen barrels from tumbling over, you…well, you just have to alter their direction.\n      \n      You could've just risen up a wall for the kegs to break against, but wine on the floor could also be used as a weapon.  No, you think you'll use his attack against him.  In your mind, you picture a sculpture—a curved ramp—that is perfectly smooth and curved backwards like a half-circle.  You pound the ground with the palms of your hands, a replication of your mind now made into reality before you.\n      \n      \"W-what in the…?!  Fates no!\"  The barrels fly back at their controller with extreme momentum, hundreds of pounds of wine erupting onto the floor.  Not only that, the tower of barrels topples, pushed over by ${Brigid}.  You just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *else\n      Complete focus envelops you like a glove.  The smell of fermented grapes is almost enough to make you drunk just thinking about it.  Your wind magic, while a force to be reckoned with, is pretty darn limited in this windowless room.  There isn't so much as a draft you can work with, which makes stopping those barrels flying towards you quite the conundrum, indeed.  You won't be able to push them away, but…\n      \n      You grow a bit lightheaded from rising into the air so quickly, but that's a small price to pay compared to getting a thousand pounds of aged juice rammed down your gullet.  Your balance has improved tremendously these past few weeks—you glide across the air like you were born to it.  Even your magician rival is impressed.\n      \n      \"You can fly?  Damn, that's convenient.  If I—what the…?!  Fates no!\"  A shadow covers him.  The tower of barrels topples, pushed over by ${Brigid}.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n  #Patch on the left, me in the center, ${Brigid} on the right.\n    *set yourPosition \"right\"\n    Patch will squeeze through those barrels, while ${Brigid} plugs up the middle.  You'll take the path of least resistance, the right, and use that extra space to dodge whatever Jorne throws at you.  The two agree, and you each spring into action.\n\n    You go into a sprint, wanting to cover as much distance as possible while you make for your opponent's flank.  Unfortunately, the terrain isn't quite what you expected.  Carpets are everywhere, but upon getting closer, your nose indicates that they're completely drenched with fermented juice.  The danger of the situation becomes apparent when the carpet beneath you springs to life!\n\n    *if (attractedTo = \"female\")\n      \"Never gotten a carpet this drenched before, am I right?\"  Jorne cracks a joke of questionable content, while you're trying your best not to get strangled by this possessed piece of tapestry.\n      *goto c11RightYou1\n    *else\n      \"Never had your carpets this drenched?  A shame!\"  Jorne cracks a joke of questionable content, while you're trying your best not to get strangled by this possessed piece of tapestry.\n      *goto c11RightYou1\n    *label c11RightYou1\n\n    *if (whichElement = \"fire\")\n      Your arm is caught in the rug's clutches, but that's just what you intended.  You focus all your body's heat into your right hand, resulting in the scent of burning wine and smoke.  Unfortunately, burning through it will take a bit of time, and you find dodging carpets even more difficult with one hand tied down.\n  \n      Your left leg gets wrapped, followed by your right.  Your left hand struggles in vain but is held captive as well.  Your body is stretched into a painful 'X' that you can't break free from.  \"Looks like rugburn is the least of your worries!  Bwhahaha!\"\n  \n      This is a well-crafted trap, you'll admit, but he has forgotten to take into account one detail.  You inhale deeply, heat burning through your nostrils.  Your lungs burn, but you can take it.  You exhale in a mighty blast, sending a gigantic fireball right at the enemy mage.  He flops like a fish out of water to dodge, but more importantly, he loses the focus required to keep you tied down.  Your hands and feet are drenched with wine, but you're finally free.\n  \n      \"Great, now ${MC_heshe}'s a dragon, why don't you blow…Fates no!\"  A shadow covers him.  The tower of barrels topples, pushed over by Patch.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *elseif (whichElement = \"water\")\n      Your arm is caught in the rug's clutches, but that's just what you intended.  You're honestly impressed with Jorne's ingenuity; as a fellow water mage, you would never have thought to use your powers in such a fashion.  Unfortunately for him, you're more experienced in the art, and you had an incredible teacher.  The carpet dries as you grip it, as do the ones now trapping your legs and left arm.\n  \n      As they lose moisture, they also lose strength, no longer able to be controlled by your rival magician.  \"Where did you put all that wine?  You soaked it up like a Fates-forsaken sponge…what kind of spell is that?!\"  What kind of spell is it?  You have absolutely no idea; everything is just coming naturally.  As does this!  A jet of wine streams out of your right hand with enough force that you need your left out there just to stabilize it.  Unfortunately, Jorne flops like a fish to dodge your attack, but at least his guard is down.\n  \n      \"Being a cripple isn't doing me any favors—Fates no!\"  A shadow covers him.  The tower of barrels topples, pushed over by Patch.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *elseif (whichElement = \"earth\")\n      Your arm is caught in the rug's clutches, but that doesn't matter.  With a twist of your feet, the stone floor starts climbing up your legs like an ooze.  Carpets can't do much against a golem.  Unfortunately, your left arm is also tied down, and you find yourself stretched into a 'T'.  You could use your magic to propel you across the floor, but you might snap your arms off with that sort of force.\n  \n      So you're caught in this clever trap, allowing Jorne an opportunity to boast.  \"Looks like rugburn is the least of your worries!  Bwhahaha!\"  He isn't as powerful a mage as Aphid was, but he more than makes up for it with sheer ingenuity.  It's his mistake to make, however, when he assumes you can only strike at close range.  Your complete focus feels each and every inch of this floor, and that includes the spot Jorne is standing upon.\n  \n      You stomp the heel of your right foot down, creating a stalagmite that rises from the ground right underneath him.  Unfortunately, Jorne flops like a fish to dodge your attack, but at least his guard is down.  \n  \n      \"Being a cripple isn't doing me any favors—Fates no!\"  A shadow covers him.  The tower of barrels topples, pushed over by Patch.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n    *else\n      Your arm is caught in the rug's clutches—not good.  You find out the hard way that dodging carpets is even more difficult with one hand tied down.  Your legs and left arm are soon tangled as well, stretching out your body to form a painful 'X'.\n  \n      \"Looks like rugburn is the least of your worries!  Bwhahaha!\" Jorne boasts for having bested you so quickly.  This is a well-crafted trap, you'll admit, but it forgets to take into account one detail.  You inhale deeply, the buzzing flying in through your nostrils.  Thanks to ${Silvana}'s teachings, you can whistle.  But not just whistle; you can direct the most shrill sound imaginable into a tiny area.  Like the hinge that holds the chandelier attached to the ceiling.\n  \n      You aim it upwards, and the metal shakes in a horrific chorus before plummeting down.  Unfortunately, Jorne flops like a fish to dodge your attack, but at least his guard is down. \n  \n      \"Being a cripple isn't doing me any favors—Fates no!\"  A shadow covers him.  The tower of barrels topples, pushed over by Patch.  Thousands of pounds of wine erupt onto the floor; you just pray that neither of your friends were caught underneath.  A wailing cry breaches your eardrums.\n      *goto c11PlanChoice\n*label c11PlanChoice\n\nThe cry ceases shortly after it began.  You approach the scene cautiously, calling out to your companions.  You're well past ankle-deep in wine, though staining your trousers is the least of your concerns.  When ${Brigid} and Patch hail you, the weight against your heart lightens considerably.  The three of you unite where Jorne is, or at least…where part of him is.\n\n*if (yourPosition = \"left\")\n  You feel a bundle of guilt build up inside you that you have to address.  \"${Brigid}…I'm sorry, it was a stupid stunt to even attempt.  You could've been crushed to death…\"  You weren't thinking at all, just going in for the kill like a wild barbarian.  When it comes to fighting as a group, you don't know a thing.  And your best friend almost paid for it with ${herhis} life!\n  \n  *if (acceptedBrigidOath = true)\n    \"Hold, ${name}.  I took an oath to protect you.  I am your knight, and if this was my fate…I would have been at peace with it.  You did well.\"  Yeah, well…it certainly doesn't feel like an accomplishment.\n    *goto c11YourPosition1\n  *else\n    \"Hold, ${name}.  I took an oath to protect you.  I-I know you didn't accept it, but…if this was my fate…I would have been at peace with it.  You did well.\"  Yeah, well…it certainly doesn't feel like an accomplishment.\n    *goto c11YourPosition1\n*elseif (yourPosition = \"center\")\n  The rogue doesn't wait a second before going off on ${Brigid}.  \"Horsefrickin' idiot, you nearly crushed ${name} to death with that stunt!  It might require too much brainpower ta think that far in advance, but—\"  You stop ${herhim} from going any further.  Anger and then apology shows over your old friend's face, but you'll accept neither.  As you stand over the mangled upper body of Jorne, the half that isn't smashed to mush, you can only say one thing.  \"You did well.\"\n  *goto c11YourPosition1\n*else\n  The knight doesn't wait a second before going off on Patch.  \"How dare you!  ${name} was nearly crushed to death with that stunt!  You've the brain the size of a cat, you sewage-drinking—\"  You stop ${herhim} from going any further.  Anger and then apology shows over your co-worker's face, but you'll accept neither.  As you stand over the mangled upper body of Jorne, the half that isn't smashed to mush, you can only say one thing.  \"You did well.\"\n  *goto c11YourPosition1\n*label c11YourPosition1\n\n*page_break\n\nCoughing coming from what you previously thought was a corpse interrupts the moment.  The three of you jerk backwards in shock—Jorne is still alive?!\n\n[i]*cough*[/i] \"Benefit of not feeling my—\" [i]*cough*[/i] \"—legs…don't hurt too much when—\" [i]*cough*[/i] \"—they're crushed under ten tons of grape juice.\"  You can't help but feel a weird sort of sympathy for this man who has suffered so greatly by your hand.  Directly or indirectly, you have ruined this foul creature's life, and you're about to end it, as well.\n\n*if (whichElement = \"water\")\n  Or at least ${Brigid} is going to.  Unsheathing ${herhis} sword, ${shehe} intends to dislocate the monk's head and end his agony.  \"Hey, kid…you're a water mage, so pay attention to my last trick.  Might—\" [i]*cough*[/i] \"—learn somethin'.\"  Blood spews from his mouth and onto the knight's blade.  Jorne convulses, in the process of suffocating.\n  *goto c11WhichElement3\n*else\n  Or at least ${Brigid} is going to.  Unsheathing ${herhis} sword, ${shehe} intends to dislocate the monk's head and end his agony.  \"Hey, kid…us water mages have this neat little trick you might not—\" [i]*cough*[/i] \"—know about.  Check it out.\"  Blood spews from his mouth and onto the knight's blade.  Jorne convulses, in the process of suffocating.\n  *goto c11WhichElement3\n*label c11WhichElement3\n\nIt looks like a scene from a nightmare, but what's worse—that bloodied blade is no longer in ${Brigid}'s control!  The golden sword gleams in a dark redness and turns itself, pointing straight at you and lunging without a second thought!  You're going to be skewed asunder!\n\n[b]\"GrAAwwH!\"[/b]\n\nYou feel yourself falling, not backwards but to the side.  You've been pushed out of the way, out of reach of the enchanted weapon.  In your place stands…oh no, Patch!\n\nIt's a clean strike, but nothing is clean about it.  The tip of the sword pokes out of the cat${girlboy}'s back, the horrific look on the sword's wielder matching your own.  ${Brigid} pulls it out slowly; you instinctively take Patch into your arms and out of the wine that pools on the floor.  You press your hand against the entry wound, which is bleeding profusely.\n\n*if (myRoutePatch = true)\n  The ${womanman} you love is dying.  And there isn't anything you can do about it.\n  *goto c11MyRoutePatch1\n*else\n  $!{shehe}…is dying.  And there isn't anything you can do about it.\n  *goto c11MyRoutePatch1\n*label c11MyRoutePatch1\n\n\"What's that look, rookie?  Think I'll keel over from a dirt farmer's toothpick?  Fates, give me more credit than that…\"  Tears well up in your eyes without you knowing as your grip against the warm, furry body intensifies.  How ${shehe} could still joke around at a time like this…that's Patch for you.  $!{shehe} motions for ${herhis} pouch, which contains ${herhis} thieves' tools and the like.\n\nYou hand it to ${herhim}, not wanting to release your hold, as if that were all that anchors ${herhim} to this mortal world.  \"Stop being dramatic…though I don't mind a hug like this every now and then.\"  Patch turns toward the redhead, whose head is down in shame at what has just happened.  It wasn't ${herhis} fault, but it was ${herhis} blade.  No doubt that's reason enough to feel at fault.  Jorne is finally dead, and his magic with him.\n\n\"Hey farmer in shining armor, tear my top off and rub some of this disinfectant in there.  Try not ta cop a feel, would ya?\"  Your grip lightens.  Just what in the five hells are you doing, leaving ${herhim} for dead like that?  You curse at yourself and get to work, though you leave the more delicate parts to ${Brigid}, who actually has training in dressing wounds.  That, and you can't help but feel embarrassed.\n\nThe two of them whisper something, but it's such a quiet exchange that you don't catch it.  ${Brigid}'s face grows deathly serious but more determined than ever before.  Patch is able to stand, after a fashion, but is woozy and understandably lightheaded.  \"It'll…take more then a frickin' liver shot to put this cat to sleep!\"\n\n$!{shehe}'s ready to go ahead to the next floor, but that's something you just can't allow.  \"Get back to Binyo, Patch.  You need rest and a doctor to look at that wound…\"\n\n*if (myRoutePatch = true)\n  \"…and…\"  You're about to say, \"and don't worry about the money,\" but you hesitate.  Sure, ${shehe} likes to pretend ${shehe}'s a money-hungry rogue at times, but you know ${herhim} better than that.  Your arms wrap around ${herhis} body.  $!{shehe} returns the hug but with hardly any strength…\n  \n  \"And I love you, Patch.  I'll be back for my punishment later, okay?\"  You whisper as your face rubs against ${hershis}.  You can't see ${herhis} expression, but ${shehe} replies. \"Gotta make this into a scene…jeez…\"  Everything is going to be okay, so why is your shoulder getting wet?\n  *goto c11MyRoutePatch2\n*else\n  \"…and don't worry about the money.  We're going an even three-way split on this.\"\n  \n  A sad look flashes before ${herhis} typical grin returns.  \"I'd expect nothin' less.  Though we gotta talk about worker's compensation when ya get back, you hear?\"\n  *goto c11MyRoutePatch2\n*label c11MyRoutePatch2\n\nWith one final nod to your fellow Redwater Salvage Consultant, you and your knight make your way upstairs and onto the next level.  It's a long climb, and a dreadfully quiet one.  What trial awaits you next?  \"${Silvana}…I'm coming.\"\n\n*page_break\n\n———\n\nA cat crawls into a corner, well-hidden by the barrels of wine that have managed to survive the battle.  $!{herhis} greatest worry is to keep ${herhim}self hidden, so that the one ${shehe} cares about most won't have to look at a wine-stained pelt on the way back down.\n\n$!{shehe} places a paw over the entry wound, the bandages long-since dyed red.  Not with wine, but with blood.  The sword ripped right through ${herhis} kidney, causing excruciating and nearly unbearable pain.  $!{herhis} co-worker doesn't have a clue that it's a fatal wound.  $!{shehe}'s proud of being able to keep the act up as well as ${shehe} did—even Kerlton would've been proud of that performance.  $!{shehe} may have been sold into slavery for a single gold coin, but even a gutter kitten can exit the stage with some sort of grace, you know?\n\nA sly smile appears on ${herhis} face.  \"My name is ${Lillian}, by the way.  Stupid rookie…\"\n\n*finish Next Chapter\n", "chapter12": "*comment Devon Connell 2014\n*comment Fatehaven Chapter 12\n\n——————————————\n*line_break\n—————————— Chapter 12: True Warriors\n*line_break\n——————————————\n\n\"${name}…do you think ${Silvana} would teach me magic?\"\n\nThat question causes you to stop mid-step.  You might have even tripped if your hand wasn't grabbing ahold of the railing.  Are these words really coming out of ${Brigid}'s mouth?  Isn't magic one of the greatest heresies?  Isn't it the work of demons?  Now that you think about it…we've already dealt with two monsters today.\n\n$!{shehe} puts a gauntlet on your shoulder.  \"You're not a demon nor a monster.  That time in the woods…back then, I was just scared…I didn't want to lose you to ${herhim}.\"  By '${herhim},' ${shehe} means ${Silvana}, but you already forgave ${Brigid} for that incident long ago.  It's a reaction anyone would have had after witnessing that magical catastrophe.  But the question remains: what's with the sudden interest in sorcery?\n\n\"There's only so much I can do to protect you with a sword…I couldn't even control it when…damn.  Fates, I feel so weak!  I can't do anything against magic!\"  ${Brigid} rams a gauntleted fist against the wall in frustration.  Even with a metal glove, that has to hurt.  $!{shehe} isn't weak and isn't helpless.  Magic is powerful, sure, but mages are just people.  A well-aimed crossbow bolt was all it took for Almondvale to die.\n\nYou try to bolster your friend's spirits but aren't sure if you manage it well.  Regardless, the two of you continue your climb up this spiral staircase.  A large room opens up.  It isn't stacked to the ceiling with kegs; instead, it's nearly completely empty except for the vast array of weapons attached to the circular wall.  Oh, and the giant shirtless orc who stands menacingly at the center!  In his hand is a giant curved blade that slants inward at the tip—a sabre called a scimitar.  Lizardmen often favor it, according to Genock.\n\n\"We meet again.  I have cursed myself each day from our first meeting for not having seen you for what you were.\"  He snarls at you, just barely containing a rage that's been boiling for weeks now.  There's reason for him to despise you, but you can't bring yourself to meet his rage with your own.  \"Allow me to reintroduce myself.  I am Iorlan, second-in-command of the Delmacian Central Division for the Cossack Order.  Or at least, I used to be.\"\n\nThat's right; thanks to you, he's unemployed now.  But you know the disbandment of his employer isn't what generated this amount of hatred.  No man loves his job that much.  But when it comes to a woman…he continues. \"My beloved Idricsa will be avenged.  She will finally be able to rest in peace after I spray your innards across the floor, devil!\"  His blade moves about in a circular pattern, thirsty for blood.\n\n*if (logical >= 50)\n  [i][Check versus Logical: pass][/i]\n  *line_break\n  *line_break\n  Hold on just a minute there.  Something doesn't quite add up.  \"You had to have been able to hear it from here, Disciple.  Your own brother in cloth used magic just as I have.  Is he a devil as well?\"  A silence follows, uncertain if in the next moment he'll charge at you or not.  Needless to say, your heart beats against your throat until he finally replies.\n  \n  \"Jorne was a desperate and pathetic man who died the day he accepted that pale ${womanman}'s gift.  I won't stain my soul; I choose
