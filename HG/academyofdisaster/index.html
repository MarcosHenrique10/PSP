o idea how to even approach it.\n\nI wasn’t sure what to do with my time so I…\n\n*choice\n #Went exploring. It was called reconnaissance in some of the books I’d read. \n  *set Strategic + 5\n  *set Comprehension + 5\n  So, what could I find that was the truth, rather than a half-formed concern? The school was old, that much was clear, and old places had plenty of hiding spots. If I could acquaint myself with the campus early on, perhaps it would give me an advantage in discerning what was actually happening. That was probably both sensible and respectable. With that thought in mind, I marched right back out of the dormitory, down two flights of winding stairs, and into the cool night air. Above my head, the stars were bright, brighter than they had ever been in the city, brighter than I had ever seen them in my life, blocked only by the brick clocktower and the high parts of the fence on the wall. I reconsidered the notion of solitude. One was never fully alone in a city, because there were always sounds from the street, from other apartments, from somewhere far away where people were playing music or crashing cars. Even when I was alone there, alone at home, I could listen to something other than my own breath and my own thoughts, but the way it was, the campus was silent and my thoughts echoed in my head as though I was yelling nonsense into a cavern beneath the world.\n\n  The empty campus under the empty sky was built halfway between a grid and a mansion, everything set in its proper place. The gardens were in neat, orderly rows, with perfectly trimmed shrubs. There were class buildings and a chapel and a dining hall, all built from perfectly identical red bricks in perfectly identical ways. Even all the windows were the same. The teachers lived beyond a neat gate that I couldn’t get through. I stood on my toes to look over it and caught a glimpse of a ${woman} silhouetted against the light in a window. Were ${she} a storybook character ${she} would be awaiting someone, but as I watched ${she} turned and closed ${hers} curtains, hiding ${her}self from view.\n  *goto AnneArrival\n #Stayed in the dorm and read.\n  *set Brash - 5\n  *if terror > 9\n   *set terror - 1\n  I did what I always did if I was mildly upset– I put everything else from my mind and picked up a book.Reading was always a pleasure, and I was always at my most comfortable with my mind being escorted somewhere else. Books were a gateway into another world, or the most simple way to learn about this one. \n\n  I curled up on my bed and read. And read. And read. I didn’t know how much time passed. No one was around to tell me, and I didn’t pull myself out of my books for long enough to check the time. It was dark when I started, anyway, and it kept right on being dark each time I glanced up.\n  *goto AnneArrival \n #Decided to look for $!{sister} ${Eurydice} \n  *set Empathetic +5\n  *set Comprehension + 5\n  $!{sister} ${Eurydice} was the only person here I actually knew, and I did not want to sit around. At home, I could always go crying to ${Gail} if I needed, if the shadows on the walls seemed to grow fingers and if laughing at my fears couldn’t make them go away. Here I was alone with my thoughts in an unfamiliar place, which was not something I wanted to be. With that thought in mind, I set out.\n\n  The empty campus under the empty sky was built halfway between a grid and a mansion, everything set in its proper place. The gardens were in neat, orderly rows, with perfectly trimmed shrubs. There were class buildings and a chapel and a dining hall, all built from perfectly identical red bricks in perfectly identical ways. Even all the windows were the same. The teachers lived beyond a neat gate on the far side of campus. I stood on my toes to look over it and caught a glimpse of a ${woman} silhouetted against the light in a window. Were ${she} a storybook character ${she} would be awaiting someone, but as I watched ${she} turned and closed ${hers} curtains, hiding ${her}self from view.\n\n  $!{sister} ${Eurydice} was probably in that building too, but I couldn’t get through. Maybe that was for the best. Maybe – or rather, probably – ${she} did not want to be bothered by a student while ${she} was unpacking…\n  *goto AnneArrival\n\n*label AnneArrival\n\nI didn’t really know what I wanted at that point.\n*page_break\nI didn’t sleep well that night. It felt as though every time I shut my eyes and tried to relax, something else would jolt me awake, so I wound up writing letters. I wrote at least three and a half to ${Gail} before I decided on what I wanted to say to ${her} and in the end it seemed very dull. Yes, of course I was settling in. Everything was alright. I wasn’t scared. It was a beautiful school and the teachers were all very nice, and I was excited to meet my classmates. I missed ${her} just enough– terribly, terribly, no, don’t worry, not that much– and I hoped ${she} did not miss me too much too. I littered my bed with crumpled papers, and at half-past-nine, the first of my roommates arrived, carting with ${her} six different suitcases, ${hers} mother, and a little brother who looked more like a muffin than a human being.\n\n“You’re new!” my roommate announced rather joyously. “I’m ${Anne}! $!{Anne} Dalton!”\n\n“Oh,” I said, feeling as though I was saying oh a lot more than I was saying anything sensible recently. “Hello.” It took me a moment to process that there was an implied question in the greeting. “My name is ${name} von Steuben.” I so rarely said my full name that I almost choked on it, but ${Anne} Dalton didn’t seem to notice as ${she} took my hand and shook it vigorously. “You aren’t new,” I added after a moment’s contemplation.\n\n“Nope!” declared ${Anne}. “It’s my fifth year here. \n*if gender = 0\n Mom wants me finished to a full shine and all that.”\n*if gender = 1\n Mom wants me to be a proper gentleman and all that.”\n$!{hers} mother made an expression that looked like she was sucking on something sour, and the boy who looked like a muffin made an unpleasant noise. “I’ll show you the ropes and all that,” ${she} said cheerily. \n*choice\n #That seemed like a good idea. $!{Anne} seemed nice.\n  *set empathetic + 5\n  I grinned carefully back at ${her}.\n  *goto Annechat\n #That seemed like a good plan. I did need to learn the metaphorical ropes, yes. \n  *set strategic + 5\n  I grinned carefully back at ${her}.\n  *goto Annechat\n #I wasn’t sure that was a good idea.\n  *set empathetic - 5\n  I looked down uncertainly, and $!{Anne} fell into an uncomfortable almost-silence. It seemed like I’d put ${her} off. The muffin-child kept squalling, Mrs. Dalton was moving very quickly, and only ${Anne} seemed even remotely happy. $!{She} tossed a plush bear with a blue shirt onto ${hers} bed, then bounced in my general direction anyway. \n  *goto Annechat2\n*label Annechat\n“It would be, um, nice,” I replied. $!{Hers} eyes didn’t induce headaches like $!{madame} Morgan’s did, but I was still fighting the urge to bolt for the door. $!{She} \n*if gender = 0\n patted my hand, \n*if gender = 1\n clapped me on the shoulder, \nconcurred, and returned ${hers} attention to unpacking, chatting happily about classes and teachers and ${hers} summer and ${hers} family. I smiled and nodded, because ${she} did not give me the chance to answer ${her} at any point, and watched ${her} and ${hers} family. The muffin-child kept squalling, Mrs. Dalton was moving very quickly, and only ${Anne} seemed even remotely happy. $!{She} tossed a plush bear with a blue shirt onto ${hers} bed, then bounced in my general direction. \n*label Annechat2\n\n*if gender = 0\n “Hey– there’s a rose garden. Have you seen it?” ${she} asked. I shook my head. “Oh, you absolutely have to– it’s the second-best thing here!”\n*if gender = 1\n “Hey, you know what’s pretty?” ${she} asked. I shook my head. “The garden here. It’s full of roses– really, it’s the second-best thing here.”\n\n“What’s the best thing  did not seem to agree. \n\n   “What happened with the Head${mistress}?” ${she} pressed. “If something’s gone wrong again, that would…” $!{she} trailed off uncomfortably. \n\n   “$!{she}’s dead,” I mumbled finally. \n\n   “That’s… that’s terrible,” ${Anne} whispered. \n \n   “We really are closing, then,” said ${Mary} very quietly. “It’s all over.”\n\n   “I’m sorry,” I said, because I really was sorry. Not, I thought, for ${Victoria} Garthside, marked as a traitor, but for all the people who would be cut adrift without Saint ${Beatrice}’s Academy.\n   *goto ponderingme\n #I made something up.\n  *set strategic + 5\n  *gosub cap_stats\n  *set empathetic - 5\n  “We were just comparing notes about… about what had happened.” That wasn’t entirely a lie. ${Mary} stared at me for a long moment and scowled. \n\n  “About the killer?” ${she} asked shortly. I nodded. “I can’t imagine you know much.”\n\n  “It’s… I can’t just sit by and not think about it,” I said. “Do you know what I mean?”\n\n  “Sure,” said ${Mary}.\n\n  “Did you learn anything new?” ${Anne} asked, and I shook my head again. \n\n  “I’m sorry,” I said, because I really was sorry. Not, I thought, for ${Victoria} Garthside, marked as a traitor, but for all the people who would be cut adrift without Saint ${Beatrice}’s Academy.\n  *goto ponderingme\n\n*label ponderingme\n*page_break\nI put my head on the table and sat there, because there was nothing else I could do.\n\nWhat did I know? \n*page_break\n*if comprehension > 9\n Four people were dead: ${Pearl}, ${Majorie}, Tiger Collins, and $!{madame} Garthside. \n\n*if comprehension > 19\n $!{Kitty} had recognized the House of the Ibis before the deaths had begun. \n\n*if comprehension > 34\n $!{Madame} Garthside had let the killer in, somehow. $!{She} had betrayed someone– either the families or the killer. \n\n*if comprehension > 29\n $!{Sister} ${Eurydice} was not a ${nun}, and ${she} was probably a criminal. $!{Lise} was with ${her},  was like ${her}. \n\n The killer had targeted the Collins family first, probably because of family business. \n*page_break\n*if comprehension > 34\n Between that and the death of ${Anne}’s father, it looked like a power grab by $!{Madame} Morgan and ${her} associates. \n\n*if comprehension > 29\n $!{Majorie}. $!{Majorie} had thought ${she} knew something about ${hers} parents’ deaths, had thought the Collins family was involved, but ${she} had been killed too– probably for getting in the killer’s way during Tiger Collins’s murder. That meant the killer was not on ${hers} side, not seeking revenge for the Blake family. \n\n*if comprehension > 19\n The House of the Ibis was pursuing an external organization that sought influence among the families. Was that organization here? \n *if strategic > 54 \n  I had to assume so, unless I were to consider the entirety of ${Ms} Jenkins’s operation a complicated false flag.\n *if strategic \u003c 55\n  I had to believe that it was. There wasn’t any proof that it wasn’t.\n*page_break \n\nSo, there was some external force acting on the web of family alliances and grievances– if this force was not aligned with the Collins family, it was likely to be aligned with the Morgans. Special Agent Eriman had worked with \n*if gender = 0\n $!{Madame} Morgan’s husband, and worked with ${hers} brother-in-law.\n*if gender = 1\n one of Sir Morgan’s brothers and now worked with another. \n\n*if strategic \u003c 55\n *goto notstrategic\n*if strategic \u003c empathetic\n *goto notstrategic\n*if strategic > 54\n *page_break\n I sighed. The more I thought about it, the more things kept pointing to $!{Madame} Morgan. I did not want them to. It… made little sense for them to. \n\n $!{She} had sent me here. $!{She} had asked me to find the truth, to be objective, to act like a camera. \n\n Only a fool would do that and then start sowing chaos like this. So it had to be a set-up, then.\n\n Who would benefit, if this all was assumed to be $!{Madame} Morgan’s doing? Someone had to benefit, someone always benefited, even indirectly. Someone benefited from the chaos and from the set up.\n\n But when it came to figuring out who, I could come up with nothing.\n\n Another family? I could ask ${Mary}, but there didn’t seem to be many that could really rival the Morgans and the Collinses in strength.\n\n The organization? If it meant to create and fill a power vacuum, killing off the Collinses and turning everyone against $!{Madame} Morgan was a reasonable first step, true, but the entire point of the organization as described by ${Ms} Jenkins had been alliances. This way, it wasn’t gaining any alliances at all, so that was all wrong.\n *if strategic \u003c 60\n  *goto mwaha?\n *if strategic > 59\n  *if comprehension > 44\n   *page_break\n   *achieve masterstrategist\n   All of it was all wrong. The House of the Ibis was so insistent about the existence of that organization, and there was clearly an outside power pulling strings, but the story ${Ms} Jenkins had given me didn’t work out right no matter how much I thought about it. \n\n   So, what did that mean? $!{she} was wrong – half wrong? $!{she} was lying? If it was the former, I could probably convince ${her} and the House of the Ibis of the truth, but… But ${she} had known, or at least guessed, that I was working for $!{Madame} Morgan, hadn’t ${she}? \n\n   If ${she} knew $!{Madame} Morgan had to spy on the school to find out what was happening, had to use me, useless as I had been, ${she} had to know or have guessed that $!{Madame} Morgan wasn’t in on it. One thing followed the other. So it was more likely that ${she} was lying– to ${hers} own students. And Agent Eriman had let ${her} in, had probably vouched for ${her} like ${she} had vouched for us…! The thought made me sit up sharply.\n   *goto mwahaha\n\n \n*label notstrategic\n*if empathetic > 54\n *page_break\n I sighed. The more I thought about it, the more things kept pointing to $!{Madame} Morgan. I did not want them to. It… it just did not seem like ${her}. \n\n $!{she} had sent me here, had insisted I find out the truth, had put so much value on the simple thing that was the truth…! That was not the sort of person who would sow chaos in this way! It had to be someone else, and that meant that it had to be a set up. \n\n What sort of person would do that? There was something called a psychological motive, wasn’t there? It certainly exited in the books I had read, and the idea that people acted in keeping with their characters seemed sensible. \n\n But when it came to figuring out who was to blame, I came up empty. \n\n Another family head? I could ask ${Mary}, but there didn’t seem to be many that could really pull this off, as far as I knew. Admittedly, I didn’t know any of them, but they all had been willing to defer to the Morgans and the Collinses for a long time.\n\n The organization? If the House of the Ibis was to be believed, that organization was the sort that pushed and pulled and manipulated, true, and drawing the families together against the Morgans could be beneficial to its goals, but this wasn’t that, was it? No one was drawing together– things were more falling part. It was all wrong.\n *if empathetic \u003c 60\n  *goto mwaha? \n *if empathetic > 59\n  *if comprehension > 44\n   *page_break\n   *achieve psychologicaldetective\n   All of it was all wrong. The House of the Ibis was so insistent about the existence of that organization, and there was clearly an outside power pulling strings, but the story ${Ms} Jenkins had given me didn’t work out right no matter how much I thought about it. \n\n   So, what did that mean? $!{she} was wrong – half wrong? $!{she} was lying? If it was the former, I could probably convince ${her} and the House of the Ibis of the truth, but… But hadn’t ${she} known, hadn’t ${she} said that $!{Madame} Morgan had sent me here? I remembered that perfectly.  \n\n   That meant ${she} knew as much as I did, at the very least, in this sense. $!{she} knew what $!{Madame} Morgan wanted from me, so why would ${she} assume $!{Madame} Morgan was not being set up…? So it was more likely that ${she} was lying– to ${hers} own students. And Agent Eriman had let ${her} in, had probably vouched for ${her} like ${she} had vouched for us…! The thought made me sit up sharply.\n   *goto mwahaha\n*if empathetic \u003c 55\n *page_break\n I sighed. The more I thought about it, the more things kept pointing to $!{Madame} Morgan. I did not want them to. I just… ${she}’d hired me. Surely that meant something…?\n\n I had facts, but I had no idea how to combine them to reach a coherent deduction. Still, I couldn’t accept the idea that $!{Madame} Morgan was behind this. I couldn’t. \n *if Eurydice_faith = 0\n  I’d given up on $!{sister} ${Eurydice}, though… No, this was different. $!{Madame} Morgan was my employer, had given me reasons and directions and something solid to work with, not like $!{sister} ${Eurydice}’s light and color and lies. I had to… It had to be a setup. \n *if Eurydice_faith = 1\n  I trusted ${her}. I trusted $!{Madame} Morgan, I trusted $!{Sister} ${Eurydice}, I trusted ${Gail}…! That was what adults were for, I thought. No matter what happened, those were people I could trust, I chose to trust. I had to… This had to be a setup. \n\n And if it was a set up, if everything did not lead to $!{Madame} Morgan, then everything led at least tangentially to ${Ms} Jenkins. And Special Agent Eriman had let ${her} in…! With that thought in mind I sat up straighter and pushed  my hair out of my face. $!{Mary} leaned away from me, seeming somewhat concerned. $!{Anne} looked at me.\n\n “What?” ${she} asked a bit warily. \n\n “Oh, um.” I paused. “Sorry. I … I thought of something. I have to go.” However little of the truth I had, I had to tell $!{Madame} Morgan. This was something ${she} had to know, wasn’t it? \n *goto stage_left \n\n\n\n*label mwahaha\n*page_break\n“Ha!” That made my throat hurt. $!{Mary} leaned away from me, seeming somewhat concerned. $!{Anne} looked at me.\n\n“Ha, what?\" ${she} asked a bit warily. \n\n“Oh, um.” I paused. “Ha, I figured something out. Sorry.\" $!{Anne} did not seem any less worried. \n\n“Something to do with murder?\" ${she} asked, sotto voice. I nodded. “You won’t listen to me if I tell you to keep out of it, will you?\" ${she} added after a moment. \n\n“I will,” I said. Telling $!{Madame} Morgan didn’t qualify as getting into something, and that was really all that I planned to do. I had a part of the truth! “Sorry,” I repeated. “I need to – I should probably go.\" $!{Madame} Morgan had said not to write to ${her} but I had to communicate this somehow.\n*goto stage_left \n\n*label mwaha?\n“Oh!” I whispered sharply. $!{Mary} leaned away from me, seeming rather concerned. $!{Anne} looked at me.\n\n“Oh, what?\" ${she} asked a bit warily. \n\n“Oh, um.” I paused. “I think I figured something out. Sorry.\" $!{Anne} did not seem any less worried. \n\n“Something to do with murder?\" ${she} asked, sotto voice. I nodded. “You won’t listen to me if I tell you to keep out of it, will you?\" ${she} added after a moment. \n\n“I will,” I said. Telling $!{Madame} Morgan didn’t qualify as getting into something, and that was really all that I planned to do. I had a part of the truth, however small, and I had a contractual obligation to tell my employer. “Sorry,” I repeated. “I need to – I should probably go.\" $!{Madame} Morgan had said not to write to ${her} but I had to communicate this somehow.\n*goto stage_left\n\n——————\n*label stage_left\n*page_break\nThey let me leave the dining hall early, which I hadn’t expected, but I supposed was due to the fact that I wasn’t exactly unsupervised outside. The guards waved back when I waved at them, and I realized they were all ones I’d seen before. Apparently we’d gone through a full rotation.\n*if terror > 54\n\n The sun was beginning to set, and I realized I was cheerful. Giddy, that was the word I’d seen used before, the one ${Gail} described as being lightheaded and lighthearted at the same time. It was a suitable descriptor, and I was entirely too giddy to be concerned about whether or not it was appropriate, and certainly too giddy to realize this was my second day without any food, which was also probably not make making me any less giddy. \n\n I took the scenic route back to the dormitory, planning my letter in my head. This one would be coherent! This one would possibly be a telegram, even! Or a message by telephone! I could get creative! I practically skipped past a group of guards who were probably going to relieve those stationed by the dining hall, and noticed there was an unfamiliar pair of figures by the school gates, which were closed. I detoured to investigate, which was probably not the cleverest thing I had ever done.\n*if terror \u003c 55\n\n The sun was beginning to set, and I realized I was more cheerful than I had been in a long time. I had something. I had something. It repeated like a mantra in my mind. Actually, I couldn’t make it stop, which was a little off-putting. Just a little. I hadn’t eaten in two days and I was walking to the rhythm of the words in my mind, so I was probably not in a very good state to be put off by anything.\n\n I took the scenic route back to the dormitory, planning my letter in my head. This one would be coherent! This one would possibly be a telegram, even! Or a message by telephone! I could get creative! The more I thought about it, the more giddy I became. I practically skipped past a group of guards who were probably going to relieve those stationed by the dining hall, and noticed there was an unfamiliar pair of figures by the school gates, which were closed. I detoured to investigate, which was probably not the cleverest thing I had ever done.\n\n\n\n*finish"}};
