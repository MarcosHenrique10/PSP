<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Academy of Disaster — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "academyofdisaster", "title": "Academy of Disaster", "scenes": {"choicescript_description": "Take the role of an amnesiac student and probe the mysteries of an isolated private school—one favored by the local crime families at that! Will you solve the murders of your classmates and make good on your family debts?\n\n\"Academy of Disaster\" is an interactive novel by Maxine Janerka where your choices control the story. It's entirely text-based--200,000 words, without graphics or sound-effects--and fueled by the vast, unstoppable power of your imagination.\n\n• Enjoy a tale of murder and conspiracy set in a secluded boarding school.[n/]\n• Choose how you investigate—are you a people person or a strategic thinker? There are many paths to a solution.[n/]\n• Solve the murder of your classmate, fall in with the mob, and dig through your family’s shadowy past.[n/]\n• Play as male or female, and enjoy a break from romance options.\n", "choicescript_stats": "*stat_chart\n text Name\n text Nickname\n opposed_pair Strategic\n   Impulsive\n opposed_pair Empathetic\n   Cold\n opposed_pair Brash\n   Shy\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2016-01-01 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.", "murder_1": "I couldn’t \n\nforg\n\net thi\n\nngs. . .\n\n!\n*page_break\n*set terror + 20\n*set comprehension - 15\nI couldn’t forget things, I never forget anymore, so I would never forget what I saw, never forget the red fading to rusty brown and almost blending into the brickwork, the body sprawled in a way living people didn’t sprawl, the glassiness of ${hers} once bright green eyes, the expression of shock and pain on ${hers} face, the twisting, blackened skin on ${hers} hands and the wounds through ${hers} chest. I’d never forget the sight of ${Pearl} Collins’s body there on the soggy ground, or ${Genevieve} kneeling over it– ${her}– it , tears streaming down ${hers} face, screaming a dirge for the dead.\n*page_break\n*set comprehension + 5\nThe teachers said  ${she}'d been shot. $!{Sister} ${Eurydice} rocked ${Genevieve} in ${hers} arms and promised over and over again that ${Pearl} had felt no pain, but ${she} was lying. The bullets had come in low, ${she} had had to breathe to die, and ${hers} killer had just left ${her} there– no, ${hers} killer hadn’t just left, ${hers} hands had been burned, \n*if gender = 0\n so had ${hers} skirt, \n*if gender = 1\n so had the edge of his jacket, \nas if the killer had tried to burn the body to hide it but failed because of the rain – leaning against the wall. I don’t know who called up the police. I never asked. They came some time later, after the whispers in the air made it clear that people thought it was going to be hushed up. I wasn’t sure how one could hush up the bloody death of a ${girl} most people liked that everyone in the school had seen. \n\nBefore the police came, though there was just all of us standing there, most of us, I thought, unable to grasp what had happened. $!{Kitty} had drawn most of the Collins court to ${her} all of them except ${Genevieve}, who was still curled in $!{sister} ${Eurydice} ’s arms, and ${Opal}, who was standing very still off to the side. \n\nSuddenly the muted whispers were interrupted. \n*page_break\n“You,” ${Opal} hissed, emerging from ${hers} trance, emerald eyes focusing unexpectedly and fixing on ${Majorie}. “You!” ${she} repeated. \n\nIt sounded less like a word and more like a snarl, and when ${she} began to move ${hers} gestures seemed like they weren’t ${hers} own. I’d read half of one book where someone had been possessed by a demon, before ${Gail} had figured out what I was reading and confiscated it, and I recalled the descriptions now. $!{Hers} limbs moved with a disco-ordinated jerkiness, but ${she} was still quick, because before I could finish the thought ${she} had launched ${her}self across the last five feet of space and closed ${hers} hands around ${Majorie}’s throat. \n\n$!{Majorie} struggled, ${Mary} leapt to ${hers} defense. In moments, ${Majorie} was on the ground gasping for air and ${Opal} was reeling, clutching ${hers} bleeding nose and cursing.\n*choice\n *if empathetic > 49\n  #I ran to ${Majorie}’s side.\n   *gosub trial_end\n   *set empathetic + 5\n   I had an obligation to my roommates, at the very least. ${Hers} choking lessened somewhat as I helped ${her} sit up, but ${she} pulled away from me and waved me off.\n   *goto policearrived\n *if brash > 54\n  #I had to make sure ${Mary} and ${Opal} didn’t do any more damage. \n   *gosub trial_end\n   *set brash + 5\n   *set strategic + 5\n   ${Opal} didn’t look like ${she} could do much in the next few moments, but I grabbed ${Mary} by the arms to prevent ${her} from pressing the advantage ${she} had. It worked, in that in the time it took ${her} to punch me and yank ${her}self free, ${Kitty} had seized ${Opal} and hauled ${her} back to the relative safety of the Collins court. \n   *goto policearrived\n *if strategic > 54\n  #${Ruby} was unaccounted for, wasn’t ${she}? I looked around.\n   *gosub trial_end\n   *set comprehension + 5\n   *set strategic + 5\n   Behind them ${Ruby} drew back from the conflict, looking this way and that. What was ${she} looking for? ${she} drifted closer to ${hers} ${sister}’s body and knelt beside it, much closer than ${Genevieve} had been, bowing ${hers} head. $!{hers} body  language seemed to indicate that ${she} was saying goodbye, but ${hers} hands were quickly going through ${hers} ${sister}’s pockets. My understanding of the situation ground to a halt. Going through ${hers} pockets? No one else was looking at ${her} I realized, and ${she} hadn’t noticed me. With a soft choking sound ${she} pulled a folded paper – a letter? – from ${hers} ${sister}’s bloodied vest, slipped the big emerald ring from ${hers} finger, and withdrew. I lowered my gaze quickly, and as soon as ${she} decided ${she} hadn’t been seen, ${she} turned and ran away.\n   *goto policearrived\n #I couldn’t tear my eyes away from the body.\n  *gosub trial_end\n  *set terror + 5\n  It was too horrible. My legs gave out beneath me and I collapsed to the ground, shaking helplessly. I couldn’t breathe…!\n  *goto policearrived\n\n*label policearrived\n*page_break\nI saw the police arrive, anyway. The  Head${mistress}, ${Madame} Garthside was with them, and ${she} kept stepping in front of the officer in the lead as though to slow or stop him. It had no effect. They came and took ${Pearl}’s body away, and some of them went around taking statements from people, about ${Pearl}. $!{Genevieve} tried to leave with them, with ${Pearl}’s body, but they wouldn’t let ${her}. The one who took ${hers} statement looked like he didn’t know what to do with ${her} or with himself. \n*page_break\nI told the one who talked to me all I had seen and all I knew. He said I was a good witness because I remembered details, and I didn’t want to tell him that I was basically just reciting things that were seared into my mind, details and all. He seemed curious about why I had found ${Pearl}’s body, so I did my best to explain, even though I felt like I was babbling. \n\nEventually he sent me on my way, after I’d more or less convinced him that my connection to ${Pearl} Collins was that  ${she}'d been shot leaning against my building and I really did not know anything else, since I had only been in the school for a week. I’d bitten my lip bloody somewhere along the way. When I asked, the mathematics ${mistress} told me that no one would be able to enter or leave campus except for the police, and that we couldn’t write letters. I very much wanted to write letters, though I was sure that $!{Madame} Morgan already knew what was happening one way or another. \n*page_break\nWith the police leaving and ${Pearl}’s body taken away – the bloodstain stayed, red-brown on red brick but somehow extremely noticeable – chaos redescended. It wasn’t the screaming and yelling from before, but a constant buzz of speculation and distress. I couldn’t see ${Ruby} anywhere, but then again I couldn’t see the majority of the Collins court. $!{Kitty} was tall enough to be visible over people’s heads and seemed to be giving instructions to the huddle of ${girl}s around ${her} and I though I caught a flash of green eyes beside ${her} but I didn’t know if it was one twin or the other or a memory of ${Pearl}. \n*if terror = 50\n I couldn’t think. I felt like there were ashes in my mouth and I was choking on them. My hands were clammy and I was dizzy. Dead, dead, dead– what was I supposed to do? I wanted to block out thoughts of what had happened, to wrap myself in something familiar, but I couldn’t. The images felt as though they were seared into my brain, and I clamped my hands over my mouth to keep from crying out or gagging. \n\n*fake_choice\n *if brash > 59\n  *if empathetic > 59\n   #I had to do something. Maybe I could help…?\n    If I could help with something, anything, maybe it would banish the image of ${Pearl}’s body from my mind. It would at least keep me from sitting around and thinking about it.\n\n    I went to help direct the younger students away from the body. They would know anyway, and they’d probably see it anyway, but it was something.\n *if terror > 44\n  #I couldn’t do anything.\n   I sat on the ground and buried my face in my knees, shaking.\n *if terror \u003c 45\n  *if strategic > 54\n   #I kept an eye on the people I knew.\n    For lack of anything else, I parked myself in a spot where I could see both ${Mary} and ${Anne}. At least if I could watch them, I could be sure they were still there. That was… probably something. I could know what they were doing, too. \n  *if strategic \u003c 55\n   #I stayed where I was. \n    I had no idea what I was supposed to do, so I stood still as things happened around me. \n\nCloser by than the Collins court, ${Mary} paced back and forth, eyes flashing over the crowd with intention of picking out ${hers} group, probably. Teachers were trying to herd us this way and that, but I wasn’t sure they were all on the same page. The House of the Ibis was sticking together. $!{Anne} had already been directed to three different dormitories, the chapel, and the sports pavilion, yet somehow had not budged more than three feet in total. $!{Lise} had sat down with ${hers} face in ${hers} hands. $!{Sister} ${Eurydice} coaxed ${her} back onto ${hers} feet and sent the four of us in the right direction – towards the chapel, since our building was a crime scene. \n*page_break\nThe four of us. Four of us. Where was ${Majorie}? \n*page_break\nI whirled around to look for ${her} but I couldn’t see ${her} even with the crowds beginning to disperse. $!{She} was ${Mary}’s friend, so I \n*if brash > 59\n grabbed ${Mary}’s wrist. $!{She} jumped at the contact, so I let go quickly.\n*if brash \u003c 60\n called out to ${Mary}.\n\n“What?” \n\n\"${Majorie},” I said breathlessly. “Where’s ${Majorie}? Is ${she} with us?” I’d lost track of ${her} after ${Opal} Collins and ${Mary} had come to blows. Stupid, stupid, stupid! I had to see everyone, everything, not get distracted like that! I saw ${Mary}’s eyes widen and ${hers} fair skin go paler still. \n\n“No,” ${she} said. “$!{She} isn’t.” \n\n“I haven’t seen ${her} either,” I said. $!{Mary} seemed to ponder for a moment, then grabbed my hand. \n\n“Let’s go,” ${she} ordered. And we took a sharp left with no further ado.\n*page_break\nApparently ${Majorie} had some usual haunts. $!{She} wasn’t by the sports pavilion, which was locked, so ${Mary} hauled me away. “$!{She} liked– ${she} likes to swim. Likes to swim. $!{She}'s probably by the lake.”\n*page_break\n$!{She} was. \n\nWe did find ${her}. $!{She} lay facedown in the water, limp and still, and ${Mary} dropped me to rush to ${hers} side. We pulled ${her} from the water– ${Mary} tried to make ${her} breathe again while I yelled for a teacher, an adult, anyone– I almost yelled for ${Gail}, honestly. \n\n$!{Jennifer} came running, and the Sports${mistress} was hot on ${hers} heels. $!{She}, at least, got ${Majorie} breathing again, choking and coughing while ${Mary} kicked trees and yelled incoherently and ${Jennifer} tried to calm ${her} down. I sat down on the ground, my legs shaking. We’d almost not made it, I thought. $!{She} almost died. We almost had two dead ${girl}s on campus. \n\nEventually we were dragged back to the right place. $!{Majorie} was taken to the infirmary. I walked in a haze, cataloguing but unable to process. I was only distantly aware of the fact that it was raining again, pouring down, and I was walking through mud. They were probably going to have to call the police back again. \n*page_break\nThe police did come back, and they asked everyone questions again. The same one had to talk to me, and he patted me on the head and said I had bad luck but not to worry. I told him I barely knew ${Majorie}. He agreed that I was unlikely to know ${her} well, but required me to go over what little contact I had had with ${her} anyway. \n\nThey went and talked to ${Majorie} ${her}self too, but as to what ${she} had said, the rumors were inconsistent. $!{She} had killed ${her}self or tried to, or ${she} had been attacked by some outsider, or ${she} had seen who had killed ${Pearl} and tried to blackmail the killer, or ${she} had been chased from the scene of the crime and had fled to the water for sanctuary, or ${she} had seen a ghost. I couldn’t believe any of them. $!{Mary} threw things. \n*if gender = 0\n $!{Lise} seized my hand and refused to let me go. \n*if gender = 1\n $!{Lise} grabbed my arm and refused to let me go.\n\nThe rain poured down in earnest, flooding the sidewalks, and after some time we were herded back to our dormitories and told not to leave for anything. I doubted rain could do more damage to us than murder could, and I doubted the dormitories could really keep us safe, if push came to shove. Supposedly there were police officers who were going to stay on campus to keep us safe, but they seemed more like an idea than a presence. \n*page_break\nWhen we returned to our room, we were given no further instructions. So we sat. $!{Mary} buried ${hers} face in ${hers} pillows and silently beat ${hers} fists against the bed. $!{Lise} got ${hers} flute out, but ended up staring at it blankly instead of playing. One needed to sing with passion, I thought vaguely, so maybe one needed passion for that, too. $!{Anne} sat with ${hers} face in ${hers} hands. Out of the four of us,  ${she}'d probably known ${Pearl} best, and  ${she}'d been roommates with ${Mary} for years – and that meant with ${Majorie}, too, after all. \n*fake_choice\n #I tried to read.\n  I failed to read. Shakespeare took concentration, which I couldn’t muster at that point. I stared at the page and counted letters, words, syllables, punctuation marks, speakers. That was easier. We passed silent hours, until I couldn’t stare at pages any longer.\n #I closed my eyes\n  That didn’t help, no matter how hard I tried to think of other things. I couldn’t concentrate; my thoughts flew this way and that, and kept coming back to death and blood on brickwork. I tried to count bricks, instead, or count my heartbeats, my breaths. That was easier. We passed silent hours, until I couldn’t lie there any longer.\n *selectable_if (strategic > 69) #I tried to write.\n  I’d have to inform $!{Madame} Morgan of what had happened, regardless of whether to not ${she} already knew. And I’d have to tell ${Gail}. Writing was a sensible thing to do. Still, I found myself staring at a blank paper, my hand cramping around the pen. I didn’t kn e infirmary. \n*page_break\nWhen the sun rose on Sunday, the rain was gone and it was abundantly clear that the campus was locked down.\n\nThe guards that had seemed unlikely and unrealistic the previous day were standing in front of every building and every gate, a mixture of soaked, sleepless, and holding umbrellas. They were all in uniform, too. I wasn’t as glad to see them as I had hoped to be.\n\nWe were rounded up for Sunday morning prayers anyway, even though ${Anne} had to be dragged out of bed and ${Mary} had spent the last half hour \n*if gender = 0\n sharpening ${hers} fingernails to points. \n*if gender = 1\n trying to hide a pocketknife in his uniform pocket without it showing. \n\nI didn’t bother going through the motions that time, and ${Mary} didn’t throw paper at ${Lise}’s head. We even all sat together. They didn’t bring ${Majorie} up from the infirmary, and ${Ruby} Collins wasn’t there either. \n*if gender = 0\n $!{Opal} was, though, clutching ${Genevieve}’s hand as if for dear life and looking around in a daze. \n*if gender = 1\n $!{Opal} was, though, one arm around ${Genevieve}’s shoulders as if he were a life raft. They both looked dazed.\nI frowned. $!{Kitty} seemed to be looking for someone too– probably ${Ruby}. Now that I thought about it, I hadn’t seen ${her} since the previous morning…\n*page_break\n${Mary}’s hand closed on mine again, and I shifted closer to ${her}. $!{Anne} had said ${she} had minions. It struck me that ${Majorie} was probably one of ${hers} very few friends. $!{Lise} had ${hers} head bowed, but ${hers} eyes were narrow and alert. $!{Anne} was staring blankly into space. At this distance, I could tell ${Mary}’s breathing was shaky and out of rhythm. Either crying or trying not to cry. \n\n“There’s two people missing,” I said quietly. $!{Lise}’s head jerked up.\n\n“What?\" $!{she} whispered. $!{Mary} leaned even closer to me.\n\n\"${Majorie} and…?\" $!{she} prompted. I tried to lower my voice even further.\n\n“${Ruby} Co \n*set comprehension + 5\nThe point remained: ${Lise} and $!{sister} ${Eurydice} were having some sort of secret conversation that involved sneaking around after multiple murders had been committed, and the part of my mind that was doubting, doubting doubting went into overdrive. \n\nI desperately wanted to march out and ask what they were doing, but my mind and body did not seem to be cooperating with one another. I tripped twice more, almost fell in a rosebush, and eventually ran in the wrong direction entirely and didn’t stop until I’d run headfirst into ${Prudence} and ${Charity}, who were missing the other two members of their unit and seemed very surprised to see me. \n*page_break\n“I’m sorry,” said ${Prudence}, even though I was the one who had run into ${her} almost knocking ${her} into a wall. $!{Charity} raised an eyebrow.\n\n“Don’t tell me something else’s happened,” ${she} said cooly. \n*if terror > 59\n I shook my head, because I wasn’t sure I could talk at the moment. \n*if terror \u003c 60 \n *choice\n  *if empathetic > 59\n   #I tried to smile.\n    “Sorry,” I said, on about my third attempt to say something. “I mean, nothing– nothing happened.” My voice sounded higher pitched than normal.\n    *goto shutupcharity \n\n  *if brash > 59\n   #”Nothing happened.”\n    *set empathetic - 5\n    “I just…” I didn’t want to tell them anything. “Nothing happened.”\n    *goto shutupcharity \n\n  #I fumbled for words.\n   *set brash - 5\n   “Sorry,” I managed to mumble. “Really, um, sorry.”\n   *goto shutupcharity \n\n*label shutupcharity\n\n“Hush, ${Charity},” said ${Prudence}. “The poor thing’s upset, and you’re making it worse.”\n\n“You mean antagonizing ${her}?\" $!{Charity} asked with a smirk. $!{Prudence} rolled ${hers} eyes.\n\n“Shut up,” ${she} ordered firmly. “… ${name}? We’re supposed to be on lockdown. Why are you wandering around like this?\" $!{hers} voice was steady, and I was grateful for that. \n\n“Couldn’t sit,” I mumbled after a few tries. $!{C ll the suitcases and tickets I could see. I had other things to count as well.\nTwo weeks, I thought, was fourteen days.\n*page_break\nWhen ${Gail} and I arrived back in our home city and got back to our apartment on the familiar street with the familiar people and the same three enforcers who sometimes walked under my familiar window, we had twelve days remaining. \n\nWhen we had ten, I found a map of all the streets in the city and walked to the library alone and spent all day reading every book I could find, everything I could learn. \n\nWhen we had nine, I convinced a librarian to let me go through ${hers} old newspapers, and I read about things I had never paid attention to before, even as I listened to the radio and heard Special Agent Morgan be hailed as a lone hero battling corruption at every turn. \n\nWhen we had seven days, one week, I picked ${Gail} up from work and talked to ${hers} coworkers, and learned that most of them did not know they were technically working for the Morgan family, even though there was talk of $!{Madame} Morgan too, wherever one turned, because suddenly there were very few people who could or wanted to oppose ${her}. \n\nWhen we had five days, I realized I didn't know where anyone lived, not ${Anne} or ${Mary} or ${Lise} or anyone, even though I desperately wanted to write to them. \n*page_break\nWhen we had three days remaining, I was pulled away from my books by the sound of a knock at the door. $!{Gail} beat me to opening the door, but only just, and for the second time we found ourselves with a family head in our sitting room. $!{Madame} Morgan smiled at us thinly.\n*page_break\n“I was told,” ${she} said, “that there may be a discrepancy in that contract you signed.\" $!{hers} eyes fixed on me. “I’m sure you have brushed up on contract law since the last time I was here.” I had.\n*fake_choice\n #I just nodded.\n  There was a lot I had learned, not just about contract law. I was pretty sure ${she} knew that. \n #I recited what ar zone.” $!{she} smiled slightly, and the expression warmed ${hers} eyes – I hadn’t known that that shade of silver could be warm.\n\n“Oh,” I said. I’d rather expected threats again, and talk of the so-called unpleasant way of going about things, but $!{Madame} Morgan showed no signs of anger. If anything, the expression on ${hers} face was one of pity. After a long moment, ${she} drew an envelope from the pocket of ${hers} coat and handed it to me.  \n\n“Here,” ${she} said. “Payment as due, little\n*if gender = 0\n Miss Schlusser.”\n*if gender = 1\n Mr Schlusser.” \nI took the envelope awkwardly, and shook ${hers} hand all the more awkwardly, but it really was quick and painless. ${Gail} clutched my shoulders as $!{Madame} Morgan left, but but there were no last-second changed of plan.\n\nThe door clicked shut behind ${her}, and finally, finally, it was quiet again. \n*page_break\nI couldn’t go back to Saint ${Beatrice}’s Academy after that. Without the contract, there was no way we could pay for it. The allotted two weeks passed without further incident, and eventually my time there really did feel like a strange nightmare. \n\nThat wasn’t a world I belonged in. The one I belonged in was the one outside my window and inside my books, and I’d make something of myself there, but I promised ${Gail} and I promised myself that I would have nothing more to do with the families, nothing more to do with the world that had gotten my parents killed, gotten my onetime classmates killed.\n\nThat was the only way we’d both be safe.\n*goto fin\n\n*label familyfriendend\n\n“I have not,” said $!{Madame} Morgan. “After all, I too believe it would not be necessary.\" $!{hers} smile warmed ${hers} eyes – I hadn’t known that that shade of silver could be warm.\n\n“Oh,” I said. $!{She} stood up gracefully and gestured for me to follow suit, which I did rather less gracefully, and then ${she} held out a hand. \n*if gender = 0\n\n “It is a pleasure to continue to work with both Miss Von Steubenses,”\n*if gender = 1\n “It is a pleasure to continue to work with both Mr Von Steubenses,”\n${she} said pleasantly. “I am sure we can accomplish great things.” We both shook hands with ${her}. \n*page_break\nThat was anticlimactic too, because there were no rumbles of thunder and my hand didn’t come away bleeding or numb, and $!{Madame} Morgan’s quicksilver eyes didn’t turn blood red or even gold. \n\nSome people would have said we sold our souls. I don’t think souls can be quantified like that, though. At the end of the two weeks, we – ${Gail} and I, because ${Gail} had gotten two days off from work – stood before Saint ${Beatrice}’s Academy again. It looked the opposite of unfamiliar this time, and it wasn't empty either.\n*goto fin\n\n*label\n\n*label fin\n*page_break End\nWe hope you've enjoyed playing [i]Academy of Disaster.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Strategic 45\n*set Brash 60\n*set Comprehension 15\n*set Empathetic 45\n*set gender 0\n*set female \"female\"\n*set woman \"woman\"\n*set women \"women\"\n*set girl \"girl\"\n*set hers \"her\"\n*set Beatrice \"Beatrice\"\n*set mother \"mother\"\n*set sister \"sister\"\n*set husband \"husband\"\n*set she \"she\"\n*set her \"her\"\n*set daughter \"daughter\"\n*set Agathe \"Agathe\"\n*set Eurydice \"Eurydice\"\n*set Lise \"Lise\"\n*set Gail \"Gail\"\n*set nun \"nun\"\n*set name \"Charlotte\"\n*set mc_nickname 1\n*set nickname \"Charlie\"\n\n\n$!{She} met $!{sister} ${Eurydice} at the entrance to the rose garden, and the two walked arm in arm, speaking in low voices. I crept closer to them – crept as much as I could, anyway, I tripped once or twice – and tried to listen in, only to find I couldn’t understand a word they were saying, even from close by.\n\nI grappled with the idea. \n*fake_choice\n #French?\n #Italian…?\n #This wasn’t any language I knew. \n\n*script changeBackgroundColor(\"black\")\n*set Strategic 50\n*set Brash 30\n*set Comprehension 15\n*set Empathetic 60\n*set hers \"his\"\n*set Mary \"Peter\"\n*set Anne \"James\"\n*set Gail \"David\"\n*set her \"him\"\n*set she \"he\"\n*set name \"Charles\"\n*set mc_nickname 1\n*set nickname \"Charlie\"\n\n\n“And how do you propose to get past the guards?\" $!{Mary} asked. \n\n“You may have gotten lucky in the past, but they’re starting to get to know you,” ${Anne} added. “I think you’re on an escape risk list.” \n\nThat was troubling. I hoped ${she} was just joking. There was little I could do if I couldn’t go out. It crossed my mind that I had thought the exact opposite while at home, and I had to bite back a laugh. \n\nWhat a difference a few weeks made! A difference in everything, really. I’d gone from not knowing anyone but ${Gail} to knowing two people who were dead and a possible foreign spy, among a crowd of others. It was ridiculous. I didn’t say any of that out loud.\n\nInstead I…\n*fake_choice\n #… tried to appeal to their better natures. At the very least I could do that better than the House of the Ibis at that. \n #… tried to appeal to reason. Doing nothing wasn’t sensible.\n #… tried to appeal to the urge to make me shut up. It was as good an option as the others.\n\n*script changeBackgroundColor(\"sepia\")\n*set Strategic 50\n*set Brash 60\n*set Comprehension 10\n*set Empathetic 40\n*set female \"female\"\n*set woman \"woman\"\n*set women \"women\"\n*set girl \"girl\"\n*set hers \"her\"\n*set Beatrice \"Beatrice\"\n*set mother \"mother\"\n*set sister \"sister\"\n*set husband \"husband\"\n*set she \"she\"\n*set her \"her\"\n*set daughter \"daughter\"\n*set Agathe \"Agathe\"\n*set Eurydice \"Eurydice\"\n*set Lise \"Lise\"\n*set Gail \"Gail\"\n*set nun \"nun\"\n*set Lise \"Lise\"\n*set Gail \"Gail\"\n*set Majorie \"Majorie\"\n*set nun \"nun\"\n*set et Pearl \"Pearl\"\n*set Jennifer \"Jennifer\"\n*set Lucy \"Lucy\"\n*set Sarah \"Sarah\"\n*set Patience \"Patience\"\n*set Prudence \"Prudence\"\n*set Charity \"Charity\"\n*set Constance \"Constance\"\n*set name \"Charlotte\"\n*set mc_nickname 1\n*set nickname \"Charlie\"\n\n“That  ${nun} is ${Lise}’s cousin,” said ${Mary}. “Maybe  ${she}'d know.\" $!{Prudence} and ${Patience} had found us by that point, and for once they seemed to want to be there.\n\n“$!{sister} ${Eurydice},” said ${Patience} with a small smile. “I’m sure ${she} knows something about this.”\n\nI did not like ${Patience}’s smile. Whatever it was, ${Mary} didn’t seem to notice it, because ${she} gave a curt order to find $!{sister} ${Eurydice} and we went off.\n*page_break\n$!{sister} ${Eurydice} was not in ${hers} classroom. $!{She} had been last seen returning to ${hers} office in a rush, so we followed suit, but the office was empty too. The sort of empty that suggested that someone had left in a hurry or was hiding in a closet somewhere. That’s how it was in books I’d read, anyway. $!{Sister} ${Eurydice}’s office didn’t have a closet. It did have a desk, with the drawers yanked out and papers littering the floor in messy piles. It had part of ${hers} habit, draped over a chair. A  ${nun} wouldn’t have left it, according to ${Prudence}. \n\n“Bad form, that,” ${Charity} agreed. \n\n$!{She} and ${Patience} were looking over some of the papers already. Aside from the habit, there seemed to be no personal effects – that was what one called them, right? no pictures, no notes, the papers all seemed to be for classes, and I could see my own handwriting on one – and no damage that would indicate ${she} had been taken by force. \n*fake_choice\n #I wanted to see those papers ${she} had left. \n #The habit…?\n #There had to be something in the desk drawers.\n\n*set Strategic 45\n*set Brash 55\n*set Comprehension 10\n*set Empathetic 55\n*set hers \"his\"\n*set Mary \"Peter\"\n*set Anne \"James\"\n*set Gail \"David\"\n*set her \"him\"\n*set Majorie \"William\"\n*set she \"he\"\n*set name \"Charles\"\n*set mc_nickname 1\n*set nickname \"Charlie\"\n\nBoth ${Mary} and ${Majorie} seemed to be sleeping now, and ${Lise}’s music wound to a close. $!{She} sighed softly as ${she} set aside the flute, and the part of me that was half-asleep wanted to sit up and tell ${her} ${she} was the Pied Piper– but that wasn’t a compliment, and we were neither children nor rats to be led to the water and drowned. $!{She} hummed the tune’s refrain to ${her}self, and I wondered what it was. It wasn’t anything I’d heard before, but it sounded like a lullaby. \n\n“For the best,” ${she} murmured. Did ${she} think we were all sleeping? It sounded like ${she} was talking to ${her}self. “I hope it isn’t late.” Late for what? It was late at night, certainly, but I was sure that wasn’t what ${she} meant. I stayed still, hoping  ${she}'d say more, but instead ${she} tucked the flute back whence it had come, pulled on a coat and ${hers} shoes, and slipped out the door into the night. Well. That would go in my report. \n*fake_choice\n #I wanted to follow ${her}.\n #It wasn’t any of my business.", "startup": "*title Academy of Disaster\n*author Maxine Janerka\n*scene_list\n  startup\n  murder_1\n  $ vanishingact\n  $ part_3\n  \n*create gender 0\n*create Eurydice_faith 0\n*create mc_nickname 0\n*create Strategic 50\n*create Brash 50\n*create Comprehension 0\n*create Empathetic 50\n*create Terror 0\n*create female \"\"\n*create woman \"\"\n*create women \"\"\n*create daughter \"\"\n*create girl \"\"\n*create mistress \"\"\n*create nun \"\"\n*create mother \"\"\n*create sister \"\"\n*create husband \"\"\n*create she \"\"\n*create her \"\"\n*create madame \"\"\n*create Mrs \"\"\n*create Mary \"\"\n*create Anne \"\"\n*create Majorie \"\"\n*create maam \"\"\n*create Dora \"\"\n*create Violet \"\"\n*create hers \"\"\n*create Patience \"\"\n*create Prudence \"\"\n*create Prudie \"\"\n*create Charity \"\"\n*creat kid?\n*achievement gohome visible 50 No More Strings\n Void the contract.\n Well, you were offered a way out. You’d have to be an idiot not to take it, right? \n \n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Take the role of an amnesiac student and probe the mysteries of an isolated private school—one favored by the local crime families at that! Will you solve the murders of your classmates and make good on your family debts?\n\n  \"Academy of Disaster\" is an interactive novel by Maxine Janerka where your choices control the story. It's entirely text-based--200,000 words, without graphics or sound-effects--and fueled by the vast, unstoppable power of your imagination.\n\n  • Enjoy a tale of murder and conspiracy set in a secluded boarding school.[n/]\n  • Choose how you investigate—are you a people person or a strategic thinker? There are many paths to a solution.[n/]\n  • Solve the murder of your classmate, fall in with the mob, and dig through your family’s shadowy past.[n/]\n  • Play as male or female, and enjoy a break from romance options.\n\n  [i]You can play the first part of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n  *comment endif\n\n  *purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n\nIt wasn’t that I was afraid of leaving the house. That part they were getting wrong pretty consistently while talking about me. It made me almost want to march out of my room and explain it to them instead of peering awkwardly around a mostly-shut door. \n\nThe area we lived in was perfectly safe, by virtue of being utterly undisputed territory. That is to say, I rarely saw enforcers or other armed and dangerous types from my window, even though the radio said they patrolled the streets night and day, and the ones I did see were the same ones, over and over again. Everyone out there knew them. Even I knew them, and I didn't go outside. \n\nCrime rates in the area were the lowest in my lifetime. There was nothing out there to be frightened of. The trouble was, really, that in a way there was nothing at all out there. Everything that existed outside my window had an equivalent – or, often, something greater than an equivalent – buried in a book or newspaper somewhere, or at least would be reported on sooner or later. Leaving the house limited what I could learn, and really, wasn’t learning the whole point?\n\n\n*choice\n #What more could a boy like me need?\n   That’s right. While men were generally expected to go out and work, I was still fifteen. I had time before those sorts of obligations descend on me.\n  *set female \"male\"\n  *set gender 1\n  *set woman \"man\"\n  *set women \"men\"\n  *set girl \"boy\"\n  *set mother \"father\"\n  *set sister \"brother\"\n  *set husband \"wife\"\n  *set she \"he\"\n  *set daughter \"son\"\n  *set her \"him\"\n  *set madame \"sir\"\n  *set Mrs \"Mr\"\n  *set Richard \"Marcus\" \n  *set Beatrice \"Dominic\"\n  *set hers \"his\"\n  *set Mary \"Peter\"\n  *set Anne \"James\"\n  *set Majorie \"William\"\n  *set Dora \"Seamus\"\n  *set Violet \"Adam\"\n  *set nun \"monk\"\n  *set mistress \"master\"\n  *set Patience \"Gabriel\"\n  *set Prudence \"Michael\"\n  *set Prudie \"Mickey\"\n  *set Charity \"Raphael\"\n  *set Constance \"Remiel\"\n  *set Alice \"Alan\"\n  *set Elisabet \"Constantine\"\n  *set Ms \"Mr\"\n  *set Eurydice \"Orpheus\"\n  *set Lise \"Alphonse\"\n  *set Gail \"David\"\n  *set Rebecca \"Robert\"\n  *set Kitty \"Leo\"\n  *set Opal \"Onyx\"\n  *set Ruby \"Jasper\"\n  *s hy this is the first solution you think of, $!{madame} Morgan!” my ${sister} continued stubbornly. “My ${sister} barely leaves ${hers} room, for mercy’s sake! I have been the one to teach ${her} since... since... well, since the beginning, I suppose.”\n\n“If that’s the case, the academics at least won’t pose a problem,” said $!{madame} Morgan reasonably. “You do always tell me ${she}’s terribly clever.” \n\n*page_break\nTo go back a little, I started paying attention to their conversation when I heard my name through the door. Usually, when I heard my ${sister} say my name, it means ${she} needs me for something. \n*input_text name \n*if \"$!!{name}\" = \"RATING\"\n  *feedback\n${name}! Mind the kitchen! Or something like that. So it made sense that I got interested this time, especially when an unfamiliar voice answered ${her}. \n*choice\n #It wasn’t just my inherent nosiness.\n  Not that I was particularly nosy, I thought.\n  *page_break\n  *goto genius\n #It wasn’t just my inherent nosiness, especially because ${she} rarely called me by my given name.\n  *set mc_nickname true\n  I was used to being called \n  *input_text nickname \n  *set mc_nickname 1\n  *page_break\n  *goto genius\n*label genius\n“Oh, ${name} is a genius!” my ${sister} retorted. I grinned to myself. Yes, yes I was a genius. But really, I would have done better to have started eavesdropping earlier; I really had no idea what it was that my ${sister} didn’t think I was up to doing. I was sure ${she} was wrong, of course, but I had no idea what ${she} was wrong about.\n\n“A genius?” said $!{madame} Morgan flatly. “That’s even better. I daresay we could use a genius.” Whatever $!{madame} Morgan wanted couldn’t possibly be that bad if ${she} appreciated talent, I thought. My ${sister} apparently thought otherwise. \n\n“$!{madame} Morgan –“ ${she} began, but the ${woman} cut ${her} off.\n\n“The contract is for four years. Have ${her} sign it, or I will go about this the unpleasant way.” That sounded like a cue to enter. Contracts were interesting; I had read all about contract law a few weeks prior, after all, reading through a dozen library books and some papers ${Gail} had gotten me from work. $!{She} had said I’d devoured them.\n\n*choice\n #With those thoughts in mind, I opened the door and stuck my head into the room where my ${sister} and $!{madame} Morgan sat. \n  “A contract signed under duress can be deemed invalid by the courts,” I announced. My ${sister} nearly jumped out of ${hers} skin – and that was a kind of gross idiom, really – and $!{madame} Morgan turned around. It was the first proper look I had gotten of ${her}, and it made me glad I had spoken before looking.\n  *page_break\n  *set brash +5\n  *goto descriptionofGail \n #I mentally rehashed what I knew about contract law, but stayed put. There was no point in disturbing them now.\n  *set brash -5\n  “Call ${her} in,” ordered $!{madame} Morgan, and after a long moment my ${sister} obeyed. It looked like I had no excuse not to go now…\n  *page_break\n  *goto descriptionofGail\n\n*label descriptionofGail\n\n${Gail} resembled me– fair hair and dark eyes, only ${she} was quite tall while I wasn’t – and ${she} was what I was used to. $!{Madame} Morgan was nearly a full head shorter than ${her}, but ${she} seemed to take up more space, as though ${she} was towering over everyone in the whole city despite sitting very politely in one of ${Gail}’s ugly chairs.\n\nOh.\n\n$!{She} was probably that $!{madame} Morgan, the one people apparently talked about in lowered voices, the one who commanded the enforcers who did not go around on our street. Courts couldn’t really do anything to that $!{madame} Morgan. That was probably why ${she} was laughing– at the courts, or the idea, or at me. But in that case, what in the world was a ${woman} like that doing discussing geniuses and contracts in my ${sister}’s living room? Surely ${she} would be discussing such things in ${hers} office, or a vast meeting hall while. \n*if gender = 1\n\n $!{madame} Morgan’s smile widened, enough so I could see his even white teeth.\n *goto contractlaw2\n*else\n\n $!{madame} Morgan’s smile widened, enough so I could see even white teeth between ${hers} painted lips.\n *goto contractlaw2\n*label contractlaw2\n\n“Indeed,” ${she} said, and gracefully pulled an envelope full of papers from ${hers} bag. $!{She} threw it gracefully too, since I was standing too far away for ${her} to hand it to me without getting up, but I only barely caught it. Grace was not one of my many talents, especially not when I was supposed to be looking someone in the eye. Presumably, I was supposed to read the envelope’s contents. Reading was an excuse to break eye contact, right? I did so anyway.\n*page_break\n$!{Madame} Morgan cleared ${hers} throat and continued to speak as I read. “It is the first step in an on-site information gathering process. You are aware, perhaps, of Saint ${Beatrice}’s Academy?” That name was written in big type on the first page I had glanced at, so I deemed myself aware and nodded. “I need someone who can pose as a student there and deliver any information about teachers and fellow students to me. Do you understand?” \n\nAmong the papers was something that looked like a contract, so I hurried to read that instead of background information. I could do the background later. As far as I could tell, $!{madame} Morgan and the contract were saying the same things, though the latter went into far more detail and filled in every possible loophole. It made me think $!{madame} Morgan was a lawyer, by education if not by trade, but it was more likely ${she} just had a lawyer on staff. That was not what being a devil’s advocate was, but those who opposed $!{madame} Morgan did think of ${her} as a devil. \n\n*if mc_nickname = 1\n “${nickname},” my ${sister} began cautiously. I chewed on my lip– a bad habit, ${she} always said, but one I didn’t notice I was doing until someone pointed it out to me, at which point I was already doing it. \n*if mc_nickname = 0\n “${name},” my ${sister} began cautiously. I chewed on my lip– a bad habit, ${she} always said, but one I didn’t notice I was doing until someone pointed it out to me, at which point I was already doing it. \n*choice\n #Why me? I didn’t understand.\n  *set strategic -5\n  “Why?” I asked. $!{Madame} Morgan quirked an eyebrow, so I elaborated. “I understand what you want me to do, but not why you want me to do it. You have…” I wasn’t sure of the right word. “… people, I mean.”\n\n  “Yes, I have people,” ${she} agreed pleasantly. “However, the trouble is that they are clearly and explicitly my people, and that would draw attention. We had struck a bargain.” $!{she} sighed, and when ${she} spoke again ${hers} voice was softer. “Saint $!{Beatrice}’s Academy is neutral territory in this little war of ours. No one wishes to be the monster who would do harm to a child for the sake of an old grudge. I cannot send my people in there without appearing to violate that bargain. But you, child, are not one of my people. And I need to know the truth.” The truth. Sometimes, in books, people spoke about Truth and Liberty, but $!{madame} Morgan said the word very plainly, in much the same way ${Gail} would have mentioned\n  *if gender = 0\n   needing to mend a winter coat or buy eggs. \n  *if gender = 1\n   needing to fix a drafty door or buy eggs.\n  *goto lowercasetruth\n\n #That… $!{Hers} logic made some sense, actually.\n  *set strategic +5\n  “You can’t send your own people there, can you?” I asked slowly. Being an outsider was my value, wasn’t it? “Is it … against the rules or something?”\n\n  “Something like that,” ${she} agreed pleasantly. “We had struck a bargain.” $!{she} sighed, and when ${she} spoke again ${hers} voice was softer. “Saint $!{Beatrice}’s Academy is neutral territory in this little war of ours. No one wishes to be the monster who would do harm to a child for the sake of an old grudge. I cannot send my people in there without appearing to violate that bargain. But you, child, are not one of my people. And I need to know the truth.” The truth. Sometimes, in books, people spoke about Truth and Liberty, but $!{madame} Morgan said the word very plainly, in much the same way ${Gail} would have mentioned needing to mend a winter coat or buy eggs. \n  *goto lowercasetruth\n\n*label lowercasetruth\n\n“… You don’t think your people would tell you the truth,” I said slowly. “They’d tell you what they think you want to hear, right? So you need someone from the outside, someone who would… would not have biases or preconceptions.” $!{she} made a vaguely approving noise.\n\n“And that is that. You will tell me what you learn of the people there, and keep what you learn as a student for yourself. That is, if you do sign the contract.” \n\n*choice\n #So I agreed to sign the contract without thinking twice.\n  *set Strategic -10\n  It was long, and I had only skimmed it, but that didn’t really matter, did it? Signing was signing. $!{Gail} had ${hers} head down, and I almost regretted my action. Almost. There was not much point in regretting things like that, especially when they were already done. Besides, we could always use money. I kept the books, being at home alone most of the day, and I would have to be a complete fool to not realize we had less and less money every day and more debts to pay. And I was not a fool, complete or otherwise. Like ${Gail} had said, I was a genius.\n\n  “Nothing to be scared of,” I said. As I started to stand, something occurred to me.\n  *goto paperworkdone\n *selectable_if (Brash > 50) #“If I refuse, you will do this the unpleasant way,” I said.\n  ${Gail} flinched. One did not refuse people like $!{madame} Morgan, not even in a place that was safe and patrolled by the same three enforcers all the time. The idea that ${Gail} could not refuse ${her} drifted through my mind. $!{Gail} was an adult, a real, reasonable, respectable person, and ${she} could not refuse an offer from $!{madame} Morgan. Certainly neither could I.\n\n  “Yes, I shall,” said $!{madame} Morgan. “But I would rather not. The unpleasant way is unpleasant for all involved.” $!{she} said that very politely, as though ${she} was talking about the weather, and I revisited the thought that there was nothing to fear outside. No, there was nothing to fear outside, because the most frightful thing, the most frightful person in the city, in the country, was sitting in my ${sister}’s chair and smiling. There was nothing out there. \n  *set Terror +5\n  “I see,” I said quietly.\n\n  *gosub Terroroutline\n\n  $!{madame} Morgan, at least, wasn’t boring. Rationally speaking, ${she} was scary, but the part of me that laughed at the wrong things wanted to laugh in ${hers} face. I bit my lip raw and finished reading the contract instead.\n  *gosub MorganContract\n\n  *if mc_nickname = 1\n    “${nickname}…” I looked up. \n\n  *if mc_nickname = 0\n   “${name}…” I looked up.\n\n  “You don’t have to do this. I promise. If you want to stay here...” $!{Gail} ’s voice was gentle, as gentle as it always was, ever since I had been a little kid afraid of shadows of leaves on the wall. \n\n  “I’m not scared,” I said. I wasn’t scared, it was true. It felt like a dream, the sort I’d recognize as a nightmare as soon as I woke, but for now I was just there. The contract said nothing about what would happen were I to break it, but I’d read things, in the papers or in books. I knew what happened when people crossed the likes of $!{madame} Morgan, when people crossed the families. Those people vanished, or died, or were tortured. $!{Madame} Morgan’s hands were hidden in black gloves. Black was fashionable, I’d read, but it also hid bloodstains well enough. \n  *goto paperworkdone\n #I bit my lip raw and finished reading the contract instead.\n  *set Strategic +5\n  *set Brash -5 \n  “I see,” I said quietly.\n  *gosub MorganContract\n  *if mc_nickname = 1\n   “${nickname}…” I looked up. \n  *if mc_nickname = 0\n   “${name}…” I looked up.\n\n  “You don’t have to do this. I promise. If you want to stay here...” $!{Gail} ’s voice was gentle, as gentle as it always was, ever since I had been a little kid afraid of shadows of leaves on the wall. \n\n  “I’m not scared,” I said. I wasn’t scared, it was true. It felt like a dream, the sort I’d recognize as a nightmare as soon as I woke, but for now I was just there. The contract said nothing about what would happen were I to break it, but I’d read things, in the papers or in books. I knew what happened when people crossed the likes of $!{madame} Morgan, when people crossed the families. Those people vanished, or died, or were tortured. $!{Madame} Morgan’s hands were hidden in black gloves. Black was fashionable, I’d read, but it also hid bloodstains well enough. \n  *goto paperworkdone\n\n*label paperworkdone\n*page_break\n“I just have to go to school and report things to $!{madame} Morgan. That’s hardly complicated.” It was the sort of thing that should have been complicated, but wasn’t, I thought, like the best way to storm a castle or make a cake. The fewest possible steps yield the greatest reward. I fumbled mentally for a metaphor about information and cakes but gave up after a few moments. I would find it eventually, if it was important. “… $!{madame} Morgan? I suppose there is a lot of paperwork I need to do, to sign up for the school?”\n\n“Hardly,” said $!{madame} Morgan with a smile. “Everything is taken care of. All I need of you is your presence and your reports. Weekly, by the way, would be best. You shall have an address to write to.” $!{she} was, I thought, a very efficient ${woman}. I liked efficient things and efficient actions. Maybe I would like efficient people as well. Besides, there was nothing to fear. A school like that was closed off and closed up, even if one disregarded the statement that it was neutral ground. It would simply be a different routine, but it would be traveled. Well, I supposed I was going to travel now, inevitably, because Saint ${Beatrice}’s Academy was nowhere near our city. It was probably for the best that the neutral ground was far away, though– neutral ground in the middle of $!{madame} Morgan’s territory would have not been that neutral, after all.\n\n*if gender = 0\n ${Gail} and I packed all my dresses, and a package arrived containing what I assumed to be the uniform for students at Saint ${Beatrice}’s. It was neat and plaid and involved starching, and truth be told I had little idea what to do with it, but there it was. At ${Gail} ’s insistence, I tried it on, then stood awkwardly trying to think of an appropriate motion. When ${she} got me new dresses, I’d twirl in them, and trousers called for strutting like a gentleman, but I didn’t know the right thing to do in a uniform. What did one generally do in uniforms? Schoolgirls in books tittered and gossiped and batted their eyelashes at young soldiers, but I did not know how to do any of those things. Were there young soldiers anymore? Maybe $!{madame} Morgan had some young enforcers that could fit the role.\n*if gender = 1\n ${Gail} and I packed all my clothes, at least all those that fit me still, and a package arrived containing what I assumed to be the uniform for students at Saint ${Beatrice}’s. It was neat and involved starching and creased trousers, and truth be told I had little idea what to do with it, but there it was. At ${Gail} ’s insistence, I tried it on, then stood awkwardly trying to think of an appropriate motion. New clothes merited motion of some sort, didn’t they? Men in military uniform marched in orderly rows, and gentlemen in dapper suits swaggered and strutted, but I could think of no appropriate motion for a school uniform. \n*page_break\n“You look uncomfortable.” My ${sister}’s voice drew me back to reality. $!{She} was folding shirts and looked like ${she} would have liked to fold ${her}self as well. \n\n“I look foolish,” I replied. $!{She} clicked ${hers} tongue and said something comforting as ${she} directed me towards the mirror. $!{Hers} mirror, really. A ${girl} who never left the house had little use for a mirror, so I had rarely looked into it. “Now I look foolish in a mirror,” I added grumpily. $!{Gail}, at least, looked like a real person. I was a good foot shorter than ${her} and somehow I was the one who looked disproportionate– too much of arms and legs and too little clarity, lank hair and slouched shoulders and lips that were somehow the wrong shape and eyes that stared into space. On ${Gail}, the features that we shared seemed to pull together and coordinate. On me, they sprawled.\n\n*if gender = 0\n “Oh, hush,” ${she} said, gently brushing my hair off of my face and tying it back with a thick ribbon. “You make a perfectly respectable young lady. I promise.” I got the vague impression that despite ${Gail} ’s best efforts, I would never make a respectable anything. Besides, respectability was not what $!{madame} Morgan wanted from me. $!{She} wanted information. $!{She} wanted the truth, without capital letters or anything else.\n\n “$!{She} needs a camera, not a lady,” I grumbled, tugging at my skirt. Honestly, I made a better camera than I did a lady anyway. While my memories of my childhood were distant and fuzzy, I could remember anything that had happened in the last five years with perfect clarity: every sound, every word, every color. $!{Gail} thought it was a delightful gift, not to mention one that increased my intellect. $!{She} told everyone ${she} spoke to about it, as far as I could tell, so it was small wonder the rumor had reached $!{madame} Morgan. $!{Gail} huffed.\n “You can be both, you know,” ${she} said, and tied the ribbon in a neat bow.\n*if gender = 1\n “Hush up,” ${she} said, gently brushing my hair off of my face before digging up a tie. “You make a perfectly proper gentleman, I promise.” I got the vague impression that despite ${Gail} ’s best efforts, I would never make a proper anything. Besides, proper gentlemen didn’t do work for the families. Sir Morgan didn’t want a proper gentleman, he wanted information. He wanted the truth, without capital letters or anything else.\n\n “He needs a camera, not a gentleman,” I grumbled, leaning away uncomfortably while ${Gail} tied the tie in a perfectly symmetrical knot. While my memories of my childhood were distant and fuzzy, I could remember anything that had happened in the last five years with perfect clarity: every sound, every word, every color. $!{Gail} thought it was a delightful gift, not to mention one that increased my intellect. $!{She} told everyone ${she} spoke to about it, as far as I could tell, so it was small wonder the rumor had reached $!{madame} Morgan. $!{Gail} huffed.\n\n “You can be both, you know,” ${she} said grumpily as he stepped away. \n“They don’t contradict one another. Just because what $!{madame} Morgan needs is your mind doesn’t mean everything else falls to the wayside.” I chanced another look at the ${girl} in the mirror and wondered what else there was.\n*page_break\n\nI would have remembered riding on a train, even as a child. That was something I would swear to. $!{Gail} took me to the station, holding my hand as though I was a child and leaving me with the distant impression that we ought have been running, the trunk making a racket as it clunked behind us, moving faster than it had any right to and filled with a world of things, but we had time to spare so we walked and I memorized the layout of the train station and the number on my ticket. \n*if gender = 0\n\n $!{She} cried when ${she} put me on the train and made me promise to write to ${her} every week too, and that was the moment I realized it was a nightmare after all. $!{Gail} was all I had in the world, and ${she} was crying on a platform with ${hers} hair coming undone, and really it was all my fault and I could do nothing, because I had to take the train and meet a car and be a camera. \n*if gender = 1\n\n He almost cried when he put me on the train and made me promise to write to ${her} every week too, and that was the moment I realized it was a nightmare after all. $!{Gail} was all I had in the world, and ${she} was tearing up on a platform twisting ${hers} hat in his hands, and really it was all my fault and I could do nothing, because I had to take the train and meet a car and be a camera.\nMy throat closed up and my hands went numb, and I couldn’t even say goodbye properly as the train began to move and carry me away from everything I knew, away from the only person I knew. I had half a mind to throw myself from the train and run all the way back home, but I could barely move my legs. A conductor had to lead me to my seat, where I sat shaking for the better part of an hour before I could even begin to calm myself.\n*set Terror +5\n*if Terror = 5\n *gosub Terroroutline\n*page_break\nAs we traveled, I counted trees rushing by, and stations, and street signs, and when there was nothing to see outside the window I read the names on the suitcases stashed around the cabin, and when I had run out of those I closed my eyes and pretended I was sleeping as I went over and over $!{madame} Morgan’s contract and instructions in my mind. Nothing to be afraid of. I just had to tell the truth, and then I would come back to a safe home. Come back safely home. That was how one said it.\n*page_break \n\nI must have actually fallen asleep, somewhere along the way, because I woke to the conductor telling me I had reached my stop and had to get out. He helped me move my trunk, too, set it and me firmly on the platform at Prentiss Carr Station, and pointed me in the direction I was probably supposed to go in before he left. \n\nI just stood there, clutching my trunk by the handle. The trip had basically already exhausted me, and there was still a car to find and school to reach. This was the tormenting sort of contract, wasn’t it? Well, I certainly wouldn’t let $!{madame} Morgan or anyone else know I was suffering for it. The idea that ${she} was laughing at me crossed my mind, and I wavered between being angry and being amused, because I was well past being scared by then. And my ${sister} wasn’t there to hush me if I laughed too loudly, either, so I went ahead and laughed too loudly about nothing in particular. While walking. I stopped laughing abruptly when someone caught my coat by the collar hard enough to make me jerk back in my tracks. \n\n“Happiness is a beautiful thing, but do watch where you’re going,” said a voice from both behind and significantly above me. I looked forward, noticed a poorly placed lamp post, looked up, and found myself staring up at ... someone. \n*if gender = 0\n A ${woman} in a dark floor-length dress, a pale face framed by black and white, with warm, hazel eyes. A nun? “Are you alright?” my rescuer asked. I turned around carefully, gathered my wits, and got a right-side-up look at her. $!{She} really was a nun, and looked very nun-like, save for the shining pin secured to ${hers} coif. \n*if gender = 1\n A man in a plain, somehow familiar dark outfit, hair cropped close and hazel eyes that warmed his pale face. “Are you alright?” my rescuer asked. I turned around carefully, gathered my wits, and got a right-side-up look at him. The familiarity solidified. Was that a monk’s habit? It looked like a monk’s habit and he looked very monk-like, save for the shining pin secured to his cloth belt.\n\n“Oh,” I mumbled, suddenly aware of the fact that gathering my wits and gathering my words were two different things. “Er, yes. Hello. Thank you.” I had said most of that in the right order. My rescuer laughed and the sound was soft and gentle, like something that merited metaphors, but I could not pull up a single one. \n\n“It strikes me,” ${she} said, “that you may well be the one I seek. What is your name, dear ${girl}?”\n\n*choice\n #I introduced myself. Clumsily.\n  *if mc_nickname ds.”\n\n“Oh,” I said. “That’s very efficient.”\n\n“The Head${mistress}, I am told, is that sort of  ${woman},” said the  ${nun}. I wondered if it was impolite to ask a  ${nun}’s name. Or a teacher’s name. Was there some particular rule about a teacher that was a  ${nun}? Everything had been so much easier when I had just had to talk to ${Gail} . “Come along, my dear, and tell me about yourself,” said the  ${nun}, collecting ${hers} things and heading in what was almost certainly the direction in which we were supposed to go. \n\n“This is… I’ve never been to a school like this before,” I said, because I couldn’t think of much else to say. The  ${nun} smiled brightly.\n\n“Truth be told, neither have I. It’s rather grand, isn’t it? The last place I taught was tiny, but the  Head${mistress} wanted some new blood, I suppose. It’s for the best.” \n\n“It is?” I asked before I could stop myself. It was quickly becoming clear to me that I had no ability to talk in a particularly intelligent or coherent manner. I could think and I could write, but that would not save me from the need to communicate in other forms. The  ${nun} probably thought me a complete moron– if  ${nun}s were allowed to think of people in that way, and if they were not ${she} probably thought me the nearest thing to that that was permitted – but at least ${she} didn’t mention it.\n\n“Yes, it is,” ${she} said. “I get to keep an eye on my cousin, you see. $!{She} will be attending as well. I– How old are you?”\n\n“Fifteen,” I said. The  ${nun}’s face lit up– I had never seen anyone suit action to that phrase before, but ${hers} face lit up.\n\n“So is ${she}! Perhaps you will be classmates! You and my dear little ${Lise}…” Something caught ${hers} eye and ${she} quickened ${hers} pace. “Come along, ${name}! I can see our car– it would be graceless to keep the poor driver waiting!”\n*page_break\nApparently I was early. There was a whole week during which students could arrive and get settled, and it was still
