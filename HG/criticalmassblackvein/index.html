and stand not far before you, standing idly before a pneumatic metal door. They do not stand far apart or at regular intervals are guards should, but close together so they can have someone to chat with. \n\n    The sounds of gunfire shatter your eardrums as the assault team makes its move, opening fire on the Bronze Bullets. The Bronze Bullets don't see their deaths coming as hundreds of bullets lay into them, deafening gunfire causing chaos in their ranks.\n\n    More highwaymen emerge from the open mouth of the bunker. They climb from the darkness and into the harsh sun, guns blazing. Some die before they ever step onto the sand while others make it within feet of the Eagles, seemingly without rhyme or reason.\n    *page_break\n    *if Stealth > 65\n      You and the Eagles slip through the bunker's mouth unnoticed by the highwaymen dying outside. In the limited light of the bunker's first floor, you help the Eagles deliver a righteous slaughter. Bullets fly wildly across the metal chamber, striking down highwaymen before they even know what is upon them.\n\n      Walls of books rest on either side of the door serving as barricades for highwaymen to hide behind. They fail to seek cover before you strike, however, and both they and their books are peppered with bullets.\n\n      You are so stealthy, so unseen, that you doubt any of your victims could even know that you were there. They simply fall dead, bleeding rust onto the steel floors, breathing their last.\n\n      The Eagles are quick to seize control of the level. Guns trained on the entrance and guns trained on the gaping stairwell leading to the darkness below.\n\n      *goto cs2\n\n      *label cs2\n      Then the rest of the Eagles come down, drenched in the blood of the highwaymen they massacred above. The slaughter was instant and without mercy.\n\n      Corvalla emerges from the mass of armored militia. She examines you for a moment, considering you, then says, \"Looks like you make a good ally after all.\"\n\n      She turns to her soldiers and says, \"My foolish sister Ambula is hiding somewhere in this bunker, likely behind her precious Bronze Bullets. Seek her out and bring me her head.\" No hesitation in her eyes. No regret. Simple orders.\n      *goto bunker3\n\n    *elseif Stealth > 35\n      *set Health %-12\n      You slip through the bunker's mouth but attract the attention of the highwaymen dying outside. A few take potshots at you and one bullet strikes your shoulder, leaving a trail of blood as you enter the bunker. In the limited light of the bunker's first floor, you help the Eagles deliver a righteous slaughter. Bullets fly wildly across the metal chamber, striking down highwaymen before they even know what is upon them.\n\n      Walls of books rest on either side of the door serving as barricades for highwaymen to hide behind. They fail to seek cover before you strike, however, and both they and their books are peppered with bullets.\n\n      You are little help in such a stealth-based situation. In fact, you seem to get in the way of the Eagles' gun barrels more than you actually kill. Perhaps it's the panic of injury or the confusion of such violence. Either way, you are in the way, and then it is over.\n\n      The Eagles are quick to seize control of the level. Guns trained on the entrance and guns trained on the gaping stairwell leading to the darkness below.\n\n      *goto cs2\n\n    *else\n      *set Health %-28\n      You slip through the bunker's mouth but attract the attention of the highwaymen dying outside. A few take potshots at you and one bullet strikes your shoulder, leaving a trail of blood as you enter the bunker. In the limited light of the bunker's first floor, you help the Eagles deliver a righteous slaughter. Bullets fly wildly across the metal chamber, striking down highwaymen before they even know what is upon them.\n\n      Walls of books rest on either side of the door serving as barricades for highwaymen to hide behind. They fail to seek cover before you strike, however, and both they and their books are peppered with bullets.\n\n      You are little help in such a stealth-based situation. In fact, you seem to get in the way of the Eagles' gun barrels more than you actually kill. Perhaps it's the panic of injury or the confusion of such violence. Either way, you are in the way, and then it is over.\n\n      The Eagles are quick to seize control of the level. Guns trained on the entrance and guns trained on the gaping stairwell leading to the darkness below.\n\n      *goto cs2\n\n  *disable_reuse #\"Wait. I want to try and talk to the highwaymen.\"\n    *set Deception %-9\n    *set Sadism %-9\n    *set Cruelty %-8\n    *set Caution %+9\n    *if Persuasion > 35\n      \"I dealt with highwaymen just like these in Franklin,\" you explain. \"Let me try and talk them down before we do anything too rash.\"\n\n      \"Hey, it's your funeral,\" she says with a smirk. \"But if they cut your corpse open and start playing with the guts, don't expect me to give ya a proper burial.\"\n\n      With that blessing, you head off toward the bunker. Nobody but the bookseller follows you toward what is certainly a painful death. She clutches a book titled \"Persuasion, Influence, and Seduction,\" as if that will somehow help her convince barbarians to be civilized. \n      *page_break\n      \"I'm pretty nervous,\" confesses Bookworm as you walk toward the bunker. \"Been trying to get in here for months. Never thought the merc I hired would try to talk their way in.\"\n\n      \"Talking is safe,\" you say. \"But it's also hard. Killing people is easy.\"\n\n      The sillhouettes of highwaymen are now fully flesh and stand not far before you, standing idly before a pneumatic metal door. They do not stand far apart or at regular intervals are guards should, but close together so they can have someone to chat with. \n\n      \"Stop!\" one of them shouts upon spotting you. He raises his rifle and rushes toward you and Bookworm, followed by his fellow highwaymen. \"This is Bronze Bullets territory!\"\n\n      He's clad in armor made of scrapped tires and salvaged metal. His fellow highwaymen are clad just the same. They're all covered in dirt and dust and scars and a few are missing fingers or eyes or even arms. They're all battle-hardened but thin - starving, most likely. \n\n      \"Whattaya think yer doing here?\" asks the highwayman as his warriors surround you.\n\n      \"We're here to treat with your boss,\" says Bookworm.\n\n      He snickers at that, as do his men. \"Why would I bother the boss for someone as small as you?\"\n\n      Bookworm smiles back at him, not letting her anxieties show. \"Because we have information about an imminent Eagle attack.\"\n\n      \"Why don't you tell me and I'll tell her?\" asks the highwayman skeptically. \n\n      \"Look, you can either play ball or get slaughtered by some Eagles. Doesn't make much difference to me.\"\n\n      \"Hmph, fine,\" says the warriors. \"Follow me.\"\n\n      Bookworm smirks at you, satisfied with her skills in persuasion. But there's a fear behind the glow of her eyes. She knows that she's walking into the mouth of a beast and that she may not walk back out.\n      *page_break\n      You only make it to the \"lobby\" of the bunker, just beyond the pneumatic door. It's a sweltering compound built of metal walls, metal floor, and even metal ceiling. Dead electric lights rest above you, not glowing and not buzzing. Walls of books rest on either side of the door serving as barricades for highwaymen to hide behind in case of a firefight. A single staircase resides at the end of the room, made of the same steal as the walls. It leads down into the foreboding darkness, but the threat is not below. The threat is with you.\n\n      A dozen highwaymen keep watch over you and Bookworm. They reek of sweat, standing in the boiling bunker. The metal roof only magnifies the sun's horrible heat. \"We got guests!\" shouts the highwayman who let you in. His call reverberates off the metal walls. Other voices echo down the stairs, relating the message downward.\n\n      Bookworm stares enviously at the barricades made of books. Their yellow pages mock her as her eyes scan the spines, looking for unknown titles among the bullet-riddled texts. The pain in her eyes is visible as she contemplates the kind of monsters that would use ancient books as gun fodder.\n\n      \"The boss'll be with you in a moment,\" says the highwayman.\n\n      The silence is almost as palpable as the humidity. You can feel the eyes of the Bronze Bullets upon you, searing into your flesh, likely wondering how you taste or how loud you'll scream once they cut into you. You can only wonder how this poor bookseller feels, surrounded by characters she's more used to reading about.\n\n      Then she emerges from the darkened steel stairwell. A surprisingly small woman with wrinkles on her cheeks and deep, dark brown eyes. She's every bit as scarred and wartorn as the other highwaymen and every wasteland warriors you've ever seen, but she holds herself with a more confident attitude. Back straight, eyes narrowed, lips pursed. She is a woman of rare purpose.\n\n      \"What do you want?\" she asks. No nuance or subtlety. She is simple.\n      *choice\n        #\"We came to warn you. Eagles are coming - their whole army, likely. You should leave before they arrive.\"\n          *set Deception %-6\n          *if Persuasion > 65\n            \"How many?\" she asks. No genuine concern or even worry rings in her voice. You can see the gears turning in her head. It's a matter of math to her.\n\n            \"Dozens,\" you say, keeping your numbers conservative. Large, but conservative. \"Maybe a hundred. But those are just the ones I saw.\"\n\n            \"Shit,\" she mutters under her breath. Finger and thumb on her chin, she considers her options silently. The other highwaymen remain silent, staring at her, awaiting orders. Then she says, \"Alright, we're evacuating. Round up the rest of the boys, strip this place of everything it's worth.\"\n\n            \"What about the guests?\" asks one highwayman as his brothers scurry to action.\n\n            She considers you for a moment then says, \"Let them go. They've done us a service today.\"\n            *label bunker2\n            *page_break\n            *set Notoriety %-8\n            You watch from the near-empty bunker, cleared out of everything valuable aside from the ancient texts. The Bronze Bullets clear out with surprising speed, carrying everything they can in sacks over their shoulders. \n\n            Bookworm leaves you to the darkness of the bunker below, searching for the book while you keep watch over the entrance, just in case the highwaymen return. They march into the wasteland, a disorderly mob, guns and voices raised. \n\n            The gunshots are so faint when they start. The Eagles surround them instantly, cutting through their forces like a knife through sand. Bullets fly between the factions, but for every fallen Eagle, five Bronze Bullets crash limply into the dust. Their screams echo across the landscape, twisted and sad and broken in every way.\n\n            It takes only a few minutes for the highwaymen to be slaughtered, and you didn't even have to raise a gun. \n\n            That brief time was, evidently, all Bookworm needed to find the text. She returns and hands you a thick tome of yellow pages with a faded cover depicting a crown. The title reads \"The Crown of the Queens.\"\n\n            \"Was this ever about the book for you,\" you ask, holding the heavy text under your arm. \n\n            \"Nope,\" she confesses. \"It was always about merchandise. With all these books and a bunker to stay safe in, I'll never have to wander the wastes again. I might even be able to hire traders to transport books for me.\"\n\n            Corvalla returns before you can offer Bookworm another comment. She's covered in dirt and dust and blood that's not her own. She and her men step through the ajar pneumatic door, grinning oddly despite the recent bloodshed. Or perhaps because of it.\n\n            \"I don't know how you talked those bastards into leaving, but it made my job real easy,\" she says. \"Consider me in your debt. You ever need help from the Eagles, come find me.\"\n\n            You leave after a few more minutes and pass the twisted, mangled bodies of highwaymen on your way back to Fulfillment. Such an odd experience. You're just glad that it was brief.\n            *goto return-ful\n\n            *label return-ful\n            *page_break\n            Once again you stand before Queen Echo, and once again her titles are declared for you. The Eagle and the Daughter and her bald seneschal watch as you draw the yellowing book, \"The Crown of Queens,\" and toss it at her feet.\n\n            She rushes toward it as if it were sacred medicine to cure a poison in her veins. She stares at its tattered cover, nearly foaming at the mouth, eyes twinkling with lust. \"This is the first printing. Only a few came into existence before the author's untimely death, gifts for his friends. His will demanded that it never be printed again, leaving these histories lost,\" she says, not to you but to herself, or to the book. Then she snaps to attention, still on her knees. \"Ithoba'al, give our guest the promised prize.\"\n\n            The seneschal steps forward and pulls an old cardboard box out of nowhere. Perhaps it was hidden in their robes. Inside the box is a black gas mask with odd reflective eye glass and an antennae poking out the side. \n\n            \"A rare artifact,\" Ithoba'al explains, his speech more like a hiss. \"Night vision enabled. Built-in Geiger counter. Filters out most gasses and toxins.\"\n\n            \"Thank you,\" you say, taking it quickly, for fear that it may yet be stolen from you.\n\n            \"Return soon,\" says the Queen. She's already begun reading the book, biting her lip as she knees on the hard floor. \"I'll tell you all about the text.\"\n            *page_break One Day Later\n            The road back to Black Vein is as uneventful as it was to Fulfillment. Only when the town comes in sight do you note anything strange.\n\n            A flag now rizes above the once-ghost town. Half black, half gold, with a red heart down the middle. When you pass the town walls you see something even stranger: people. The dead Buzzers have all be cleared away and the smell of cooking meat hangs in the air, smoke rising from a bonfire at the town center. Dozens of people, mostly armed, between the bonfire and the newly erected flagpole. At their center - Olivia Buckshot.\n\n            \"You're back!\" she shouts with a genuine smile. The settlers look to you, smiling too but clearly suspicious. Most are filthy and many have scars. They must have come from someplace far away.\n            *choice\n              #\"Who are these people?\"\n                \"These are settlers from Allen's Republic,\" she says. \"I was hired to bring them here, get a new start and all that. Sorry I couldn't tell ya sooner, I had orders.\"\n                *label allen1\n                *choice\n                  #\"I want them gone. This is Daughter territory.\"\n                    \"Sorry, we were here first,\" she says with a forced smile. \"Allen's Republic is a great place to live, but it's crowded. Most of these folks were squatters in the Old Allentown, and they need a place to spread out. Anyway, you should head into those mines like you're supposed to. Got a contract to fulfill, right?\"\n                    *goto allen2\n\n                  #\"I'm glad they found their place in this world.\"\n                    \"Me too,\" she says with a smile. \"Allen's Republic is a great place to live, but it's crowded. Most of these folks were squatters in the Old Allentown, and they need a place to spread out. Anyway, you should head into those mines like you're supposed to. Got a contract to fulfill, right?\"\n                    *goto allen2\n\n                  #\"Who's Allen?\"\n                    \"Allen's not a person,\" she says with a sideways smile. \"It's the name of an old town where our capital is. Anyway, you should head into those mines like you're supposed to. Got a contract to fulfill, right?\"\n                    *label allen2\n\n                    You go to the mines, knowing that she's right and knowing that you shouldn't trust a mob of wastelanders you'd never met before. If they see the ammo in your belt or the gas mask you just got, there could be violence. So you head over to the mine shaft, go right passed the sign, and equip your fancy new mask.\n\n                    The whole world is green through the odd lenses and there's an odd buzzing in your ear. The caves are empty and silence aside from the steps of your feet. You cannot smell much through the harsh plastic scent of the gas mask, nor can you see anything of value. Just rock. Nothing that looks like coal. So, you press deeper into the cave, its ceiling only held up by ancient steel beams built into the walls.\n\n                    Your travels last only a few minutes before something in your mask starts to beep shrilly. The Geiger counter, you assume. But coal does not trigger counters, does it?\n\n                    Then you see the odd veins of shining steel in the walls. The deeper you go, the thicker they get, glinting oddly in the green hue of your mask. The deeper you get, the louder and more consistent the beeps get. There's something valuable in this mine alright, and it's a lot more dangerous than coal.\n                    *finish\n\n              #\"Whose flag is this?\"\n                \"Allen's Republic. That's where these settlers are from,\" she says. \"I was hired to bring them here, get a new start and all that. Sorry I couldn't tell ya sooner, I had orders.\"\n                *goto allen1\n\n              #\"You lied to me.\"\n                \"Not true at all,\" she says. I just never said that I was clearing the town out for settlers. They're from Allen's Republic, so they're civilized, if that matters to you. Sorry I couldn't tell ya sooner, I had orders.\"\n                *goto allen1\n\n          *else\n            \"How many?\" she asks. No genuine concern or even worry rings in her voice. You can see the gears turning in her head. It's a matter of math to her.\n\n            \"Hundreds,\" you say, trying to frighten her with large numbers. \"Legions of them, you don't stand a chance.\"\n\n            \"Bullshit,\" she says. \"Eagles wouldn't spend their whole army on us, and we'd have seen them anyway.\"\n\n            Your plan failed. Your lie was too big. She raises her rifle to meet your face, followed by her highwaymen. A shot rings out, echoing in the metal-walled room. \n            *label bunker1\n            *page_break\n            *set Health %-12\n            You fall back onto the warm metal floor, pain emanating from your shoulder. Blood seeps down your side as you instinctively reach for your gun. Then you watch, the world upside down, as the pneumatic door swings open and light pours through. Then Eagles enter.\n\n            You rise as they run into the bunker and open fire as they do, missing more than you would like in your daze, but managing to shuffle away toward the safety of the armored mass. Many highwaymen fall in that deafening instant and many more retreat to the dark, underground levels of the bunker. The Eagles scour the bodies, executing the survivors in cold blood and peeling anything of value from them.\n\n            The slaughter was instant and without mercy.\n\n            Corvalla emerges from the mass of armored militia. She examines the wound on your shoulder, considering it for a moment, then says, \"You're lucky we didn't trust you. If we did, you'd be dead.\"\n\n            She turns to her soldiers and says, \"My foolish sister Ambula is hiding somewhere in this bunker, likely behind her precious Bronze Bullets. Seek her out and bring me her head.\" No hesitation in her eyes. No regret. Simple orders.\n            *label bunker3\n            *page_break\n            You rush down the metal steps, the only lights coming from the torches held by the Eagles at your back. Bookworm stays close behind you, not content to hide upstairs during the coming battle. \n\n            The first level is nearly empty, aside from stray books strewn across the floor and highwaymen scattering for cover. You don't even get the chance to open fire on them. The Eagles do that for you, hammering away at the foe with automatic weapons. Bullets fly and embed themselves in the steel walls of the bunker and in the bodies of highwaymen who did not yet escape.\n\n            Corvalla steps to the front of the party and says, \"I'll take the lead.\" There's a certain determination in her eyes that you don't see in many wastelanders. The same was present in Buckshot's eyes.\n\n            The Eagles commander leads you down a second staircase and into further darkness, the only lights coming from the torches of her men. But this final floor is not a floor at all - just a storage room filled with crates containing yet more books, and some empty ammo cartridges.\n\n            Then a sharp gust of wind blow the torches out, casting darkness and the sweet smell of smoke over you all. You watch as the shadows of highwaymen emerge from behind cover, sillhouetted guns at the ready.\n\n            Panic and chaos ensue. Terrible gunshots ring out, striking flesh and steel alike. The only lights come from the barrels of guns being fired.\n\n            *if Stealth > 65\n              Unknown to the Bronze Bullets, the darkness is your friend. You've mastered the skill of remaining unsensed, but sensing those who assail you in the shadows. So you take cover behind one of the book crates, letting them pepper it with bullets before you return fire.\n\n              You're skilled enough to know to aim at the flashes of lights emitted by the barrels of you foes. Each time you see one, you spray as many bullets as your trigger finger will allow, hoping to get at least a few of them.\n\n              The sounds of chaos are all around you. Gunshots and screaming and the choking of dying warriors as they bleed into their lungs. Such a veteran are you that you battle undisturbed. Minutes or hours pass before the gunshots simmer down to a near halt and silence returns to the bunker. Then a bright orange light casts its glow across the steel, lighting crimson blood and twisted, mangled bodies. \n\n              Corvalla is the one holding it. She looks down at the bodies, eyes scanning until she locates the one belonging to her sister. Her men, mostly alive and well, look at the terrible mess they've made.\n\n              They cheer like wild animals, thrilled by the death they've dealt, eyes bulging with childlike excitement. Even Corvalla cannot help a smile, looking down upon the twisted body of the warlord.\n              *goto end-combat\n\n              *label end-combat \n              *page_break\n              *set Notoriety %+11\n              Eagles spend the next few hours clearing out the bodies of dead highwaymen, tearing away anything valuable they might be leaving behind. Bullets, food, armor, raw materials for what you assume are drugs. Anything that isn't a book leaves in their hands.\n\n              Bookworm scours the bunker for the text, eventually returning it to you. It's a yellow, tattered old tome depicting a crown on its cover, underneath the title, \"The Crown of Queens.\"\n\n              \"Was this ever about the book for you,\" you ask, holding the heavy text under your arm. \n\n              \"Nope,\" she confesses. \"It was always about merchandise. With all these books and a bunker to stay safe in, I'll never have to wander the wastes again. I might even be able to hire traders to transport books for me.\"\n\n              Corvalla returns before you can offer Bookworm another comment. She's covered in dirt and dust and blood that's not her own. She and her men grin oddly despite the recent bloodshed. Or perhaps because of it.\n\n              \"I don't know if this op went better or worse thanks to you,\" she says. \"But consider me in your debt. You ever need help from the Eagles, come find me.\"\n\n              You leave after a few more minutes and pass the twisted, mangled bodies of highwaymen on your way back to Fulfillment. Such an odd experience. You're just glad that it was brief.\n              *goto return-ful\n\n            *elseif Combat > 65\n              Recalling your experiences in similar situations, you seek cover behind one of the book crates, letting the highwaymen pepper it with bullets before you return fire.\n\n              You're skilled enough to know to aim at the flashes of lights emitted by the barrels of you foes. Each time you see one, you spray as many bullets as your trigger finger will allow, hoping to get at least a few of them.\n\n              The sounds of chaos are all around you. Gunshots and screaming and the choking of dying warriors as they bleed into their lungs. Such a veteran are you that you battle undisturbed. Minutes or hours pass before the gunshots simmer down to a near halt and silence returns to the bunker. Then a bright orange light casts its glow across the steel, lighting crimson blood and twisted, mangled bodies. \n\n              Corvalla is the one holding it. She looks down at the bodies, eyes scanning until she locates the one belonging to her sister. Her men, mostly alive and well, look at the terrible mess they've made.\n\n              They cheer like wild animals, thrilled by the death they've dealt, eyes bulging with childlike excitement. Even Corvalla cannot help a smile, looking down upon the twisted body of the warlord.\n              *goto end-combat\n\n            *else\n              *set Health %-28\n              You don't make it to cover in time. At least three bullets tear through your leg and you fall to the ground, pain surging through your body as you give the floor a fresh coat of blood. \n\n              Crawling on your belly, you make it to cover behind one of the book crates. Highwaymen bullets pepper its wood and paper and you barely get the chance to return fire, spraying wildly when you do, panicked by the darkness and noise suddenly thrust upony you and paired with an injured leg.\n\n              Minutes or hours pass before the gunshots simmer down to a near halt and silence returns to the bunker. Then a bright orange light casts its glow across the steel, lighting crimson blood and twisted, mangled bodies. \n\n              Corvalla is the one holding it. She looks down at the bodies, eyes scanning until she locates the one belonging to her sister. Her men, mostly alive and well, look at the terrible mess they've made.\n\n              They cheer like wild animals, thrilled by the death they've dealt, eyes bulging with childlike excitement. Even Corvalla cannot help a smile, looking down upon the twisted body of the warlord.\n              *goto end-combat\n\n        #\"We're looking for a book on behalf of Queen Echo. Mind if we look for it?\"\n          *set Deception %-5\n          *if Persuasion > 65\n            \"What kinda book?\" she asks. You can see the gears turning in her head.\n\n            \"I don't know,\" you say with a shrug. \"But the Queen wants it, the Eagles want it, and I suspect the Daughters want it, and it's in here somewhere.\"\n\n            \"Shit,\" she spits. \"Shit. We aren't ready for a fight like that yet. This is the last thing we need.\"\n\n            \"Whatta we gonna do boss?\" asks one of the highwaymen.\n\n            \"We're gonna leave,\" she says, steel in her voice. \"This plan's gone to shit, no point in waiting around to die.\"\n\n            \"What about the guests?\" asks one highwayman as his brothers scurry to action.\n\n            She considers you for a moment then says, \"Let them go. They've done us a service today.\"\n            *goto bunker2\n\n          *else\n            \"Bullshit,\" she spits. You can see the gears turning in her head. \"That rat queen doesn't have any right to anything in our base.\"\n\n            Your plan failed with surprising ease. Perhaps hoping for the kindness of highwaymen was simply too unwise. She raises her rifle to meet your face, followed by her highwaymen. A shot rings out, echoing in the metal-walled room. \n            *goto bunker1\n\n        #\"Bunker Brothers sent me to inspect your bomb shelter. Ma'am, do you know how much asbestos is in this ceiling?\"\n          *set Deception %+12\n          *if Persuasion > 75\n            You look up at the ceiling. \"Yeah, this is a real mess. Tell me, have any of your men been feeling light-headed lately? Little agitated, violent.\"\n\n            \"I suppose,\" she says, looking up at the ceiling to try and discern your meaning. You can see the gears turning in her head, but she cannot understand what you mean.\n\n            \"Yep, you've got asbestos alright. Quite a mess too. I'm gonna need at least three days to make sure this place is up to code.\"\n\n            \"You're kidding,\" she says, genuine worry in her voice. \n\n            You purse your lips and nod, \"Sorry ma'am, but this has to get done ASAP. Otherwise you're putting everyone here at risk.\"\n\n            \"Shit,\" she spits. \"Shit. This is the last thing we need.\"\n\n            \"Whatta we gonna do boss?\" asks one of the highwaymen.\n\n            \"We're gonna leave,\" she says, steel in her voice. \"This plan's gone to shit, no point in waiting around to die.\"\n\n            \"What about the guests?\" asks one highwayman as his brothers scurry to action.\n\n            She considers you for a moment then says, \"Let them go. They've done us a service today.\"\n            *goto bunker2\n\n          *else\n            \"Bullshit,\" she spits. You can see the gears turning in her head. \"You wastelanders think we're dumb enough to fall for made up words.\"\n\n            Your plan failed with surprising ease. Perhaps hoping for the gullibility of highwaymen was simply too unwise. She raises her rifle to meet your face, followed by her highwaymen. A shot rings out, echoing in the metal-walled room. \n            *goto bunker1\n\n        *if (Villain > 0) #\"Honestly, I love this whole highwayman thing you got going on. But I'm just trying to make my way in this shit world. Mind helping out another wasteland asshole?\"\n          She sighs. \"If you're half as dangerous as I've heard, this is gonna end badly for my crew. Truth be told, this base is kinda shit anyway. You can have it.\"\n\n          The other highwaymen look to her like wide-eyed children, indignant at this injustice. A single glare from her makes that rage fade away. They stow it someplace dark, knowing that it wouldn't be worth it to anger her.\n\n          A surprising resolution, surely, but an effective one. You wonder how badly this could have gone if you reputation did not precede you.\n          *goto bunker2\n\n        *if (Notoriety > 30) #\"Look, I know you've heard of me and what I did at Franklin, so I'll cut to the chase.\"\n          She sighs. \"If you're half as dangerous as I've heard, this is gonna end badly for my crew. Truth be told, this base is kinda shit anyway. You can have it.\"\n\n          The other highwaymen look to her like wide-eyed children, indignant at this injustice. A single glare from her makes that rage fade away. They stow it someplace dark, knowing that it wouldn't be worth it to anger her.\n\n          A surprising resolution, surely, but an effective one. You wonder how badly this could have gone if you reputation did not precede you.\n          *goto bunker2\n\n    *else\n      \"I bet I can talk them down,\" you say.\n\n      Corvalla looks you up and down and says, \"I bet you can't. Just tell me which team you wanna go in with.\"\n      *goto c5\n\n", "5-reward": "*set Health 100\n[i]Uranium is the most accursed metal to ever lay waste to this earth. For centuries bronze was the high killer, then iron, then steel. Then lead, in tiny, terrible bullets. Then uranium scorched the earth, and most folks are back to iron.[/i]\n\n-the Elder Linus, [i]A Catalogue of Evil Metals[/i]\n\nSitting in the dark, dank basement is the first moment of relaxation you can recall in some time. Just you, ReVivienne, and the Lady Columbia's sacred bell. A moment of peace, even though you were tied to this very chair not too long ago.\n\n\"I assume you've returned because your mission was a success,\" she says, fiddling with one of the many knives strapped to her torso. \"Did you find the uranium?\"\n\n\"So you knew it was uranium?\" you ask, eyebrow raised.\n\n\"Shit, I wasn't supposed to tell you that,\" she says, slapping the knife into its sheath. \"Doesn't matter now, I guess, since you found it. Any trouble along the way?\"\n*fake_choice\n  #\"The usual.\"\n  #\"Don't worry about it.\"\n  #\"Too much.\"\n\n\"So highwaymen, mutants, and queens with strange requests,\" she says. \"Artoria sent word when you made contact with the Fulfillment queen. Courier got here not long before you. Wanna see what else he brought?\"\n\nYou don't say a word and she doesn't wait for you to. Just hands you a scrap of paper marred with black and gold ink - the same flag you saw above Black Vein. Below the flag reads a summons. \"The might of Allen's Republic is here to provide safety to the people of Philly. We have positioned our forces in Fort Washington and request local wastelanders to aid in our humanitarian efforts. Compensation provided based on merit.\"\n\n\"We know they sent settlers to Black Vein, so Artoria tells us,\" she says. \"We also know they recently conquered Scranton, which means they probaly have the same plans for us. Your next job is to infiltrate them, rise through the ranks, and bring us useful intel.\"\n*label c1\n*choice\n  #\"Their fort has the same name as you. Why?\"\n    \"I'm descended from the man it's named after. George Washington. He was a demigod who fought foreign oppressors, just like we're about to do,\" she says. \"Come now, time to collect your reward for the Black Vein op.\"\n\n    *goto c2\n\n  #\"They seem peaceful enough.\"\n    \"People who are peaceful enough don't bring armies - they bring missionaries, food, water. Make no mistake, this is an invasion. Come now, time to collect your reward for the Black Vein op.\"\n\n    *goto c2\n\n  #\"What if I don't want to work for you?\"\n    She shrugs. \"They I guess you won't leave here alive. Come now, time to collect your reward for the Black Vein op.\"\n\n    *goto c2\n\n  #\"I'm on it.\"\n    \"Glad to see someone with a little enthusiasm around here,\" she says. \"Come now, time to collect your reward for the Black Vein op.\"\n\n    *goto c2\n\n*label c2\nShe leads you through the compound, passing dozens of Daughters prepped for war. They carry themselves with purpose you had not seen before, crisp steps carrying them throughout the base. The smell of adrenaline and gunpowder are heavy in the air. Women sketch salutes toward ReVivienne but glare at you, a pest scurried in from the outside.\n\n\"Been a while since we had a good fight,\" says one woman to her friend. She cleans her rifle, leaning against the hallway's wall, black grease on her hands and cheek. \"This Allen business is real exciting.\"\n\n*if FGFranklin = 1\n  \"I just hope that warlord in Franklin doesn't make any trouble,\" says her friend.\n\n  *goto c3\n\n*else\n  \"Good thing that warlord near Franklin got himself killed,\" says her friend.\n\n  *goto c3\n\n*label c3\nYou pass them by before you can hear the rest of their conversation. Other Daughters of Liberty glare at you, perhaps not realizing that you were responsible for what happened in Franklin. So odd that word of those events would travel so quickly, but nobody seems aware of your involvement. \n\nReVivienne leads you to an armory. It's a great metal chamber wall-to-wall with weapons and ammunition and provisions, sealed behind a barred gate. One woman stands outside the gate, armed to the teeth with rifles of all sizes and even a grenade hanging from her waist.\n\n\"Ma'am,\" she says, standing at attention, hands behind her back. She glares at you despite the respect she is showing her leader.\n\n\"I've come to give the outsider their reward,\" says ReVivienne. \n\nThe woman scoffs under her breath just loudly enough to voice her discontent. This does not stop her from opening the gate and allowing you into the armory. Still, she stares at you, hand on the butt of her rifle, ready to fire the moment you pose a threat.\n\nThe armory is a treasure trove you could only imagine the value of. If you owned all of these weapons, you would never go hungry again.\n\n\"In addition to your continued contract with us, and basic resources like food and water, I'm granting you a new weapon to add to your arsenal. To help you on future missions for us, I hope.\"\n\nShe leads you to a metal crate at the far end of the room. You surmise that it's filled with the garbage that they award to contractors, rather than the powerful weapons given to Daughters. Your suspicions are only confirmed when she opens it, revealing a pile of scavenged tools of little use to anyone.\n\n\"Pick one,\" she says, smiling as though she'd offered you something truly valuable.\n*choice\n  #An extended magazine that fits your gun\n    *set Combat %+10\n    Now you'll be able to fit more bullets in your gun, which means you'll be able to kill people more efficiently. And isn't that the dream? \n\n    \"Good choice,\" says ReVivienne, and you think you catch the guard smiling. \"More bullets means more dead highwaymen.\"\n    *goto c5\n\n  #A rusty old suppressor that may make you a bit stealthier\n    *set Stealth %+10\n    Now you'll make less noise, which means you'll be able to kill people more efficiently. And isn't that the dream? \n\n    \"Good choice,\" says ReVivienne, and you think you catch the guard smiling. \"Those damn highwaymen will never see you coming.\"\n    *goto c5\n\n  #A top hat\n    *set Persuasion %+10\n    Now you'll look dapper as a dandy, which means you'll be more easily trusted. At least, that's what you tell yourself.\n\n    \"Uh, good choice I guess,\" says ReVivienne. \"At least you'll look fancy when you're pumped full of lead.\"\n    *goto c5\n\n*label c5\n\nYou leave the armory behind, and then the compound altogether. Outside in the wasteland heat once again, you see the Daughters' flag flying high - a bell on a square of blue beside thirteen stripes. It reminds you of the flag of Allen's Republic, not that they look the same. Just that they're an odd sight in such an anarchic world. Beside the flag pole is a more familiar sight - crosses. Some hold skeletons and some are empty, but you expect that will change before all this is over.\n\n\"Remember your mission: go to Fort Washington and earn the trust of this shanty republic. When you've uncovered their plans for Philly, report back to me.\"\n\nYou leave the Daughter compound once again, wishing that this break from wandering had been a bit more substantial. No rest for the weary, not as long as there's asphalt to be treaded beneath your feet.\n*finish\n", "6-ft-wash": "[i]Many of you remember the old days. Allen's Republic was just a city-state. Not even that. We were a village on the edge of darkness. Monsters on two feed raided our homes. The lucky ones were killed. The unlucky became slaves. Then something remarkable happened. Fear became anger. The people of our great nation no longer lamented the trials of the wasteland. They sought them. We had a few losses at first, but victories were not far off. We went from a village to a dozen in just a few years. Now look at us. We live at the precipice of a golden age, thanks to the colonies in Scranton. Some have asked me what I plan to do with this success, and now I will tell you. I plan on riding it. Our victories will carry our flag across the wasteland, and soon there will not be a city in sight that doesn't fly it. Of this much, you may rest assured, my sweet citizens.[/i]\n\n-President Ellen Burrows, [i]State of Allen Address[/i]\n\nIt occurs to you, as you wander northward toward Fort Washington, that the armies of Allen's Republic must be what terrified Gizmo and his Lead Saints enough to attack Franklin.\n\nShould you be afraid of them too?\n\nTheir fort is in what was once a proud forest, now devoid of any green. You're told that leaves once hung off the branches, like the scales of a lizard, but that is no longer so. The forest is nothing but grey skeletons over black, bitter soil. \n\nEach step you take crunches the debris below, branches that once etched across the tree canopy above but now lie below you, fallen. You constantly turn on your heels, gun drawn, startled at the slightest noise. Highwaymen could be in these woods, hiding behind thick trunks and waiting for you to make some tragic misstep.\n\nYou follow the scattered remains of a path, grown over by root systems that died long ago. Dark mulch is organized into fragmented roads leading roughly through the forest, disappearing in some places and turning sharply in others.\n\nThe forest smells strange. Not as stale as the desert but sweet, and it only grows sweeter with each step upon the soil. Such an alien area. Most wastelanders avoid the forests. There's nothing to eat or to scavenge and nobody to rob, so why bother? Allen's Republic could have had its forces here the whole time and nobody would have noticed.\n\nThen you spot the column of smoke rising in the distance, taller than the highest trees or even the distant hills. At first it seems very close, then you keep walking and find that it grows no larger and seems no closer. Minutes turn to near an hour before you start to smell the crisp smoke, black and grey and touching the heavens.\n\nSoon you spot walls beyond the thick of trees. Wooden in some spots, rusted metal in others. Some areas are even made of the thin planks of grey wood that would come from this forest. Guards in military camouflage man the wall, pacing back and forth with large rifles. \n\nThe flag of the shanty republic rises behind them, red heart on gold and black. \n\nThe paper informing you of the invitation weighs oddly heavy in your hand. You grip it tightly and walk forward, toward the edge of the path and the fortress ahead. It doesn't measure much larger than the Daughters' compound and the pre-war construction is minimal. They've been here a while. \n\n\"Stop!\" shouts a voice. You scan the walls and see where it comes from. A group of soldiers on the ground in those olive army uniforms, rushing from a wooden gate.\n\nYou stop and wait for them, knowing that they outgun you and could easily end your life if you move an inch.\n\n\"What are you doing here?\" he asks, fellow guards flanking him.\n\nYou hand him the sheet providing instructions, tell him you're here to help.\n\nHe looks over the page, struggling to make sense of the letters, then he seems to recall what the flyer is. \"Right. General Tappon's gonna want to see you.\"\n\nAnd just like that, you enter the base of a foreign army.\n*page_break\nA great bonfire stands at the center of the courtyard, makeshift and pre-war walls on all sides. The flagpole is not more than a few feet from it and the entrance to the compound is on the far side of the base, though the soldiers do not take you that far. \n\nA woman, short of hair and fair of skin stands before the bonfire, hands resting over its crisp warmth. It crackles loudly and rises nearly to her height.\n\n\"General Tappon,\" says the man who found you. \"Contractor from Philly.\"\n\nShe turns to face you, giving you a full look at her features. A small nose and tight jaw, pale eyes and short hair tied under a golden beret. The heart of her nation's flag is sewn into it, proudly proclaiming her allegiance. That is the only way her uniform varies from those of her soldiers. \"Thank you,\" she says with a rehearsed smile. \"You may return to duty.\"\n\nThey salute the general and turn back to the gate, leaving you with her.\n\n\"So, you saw our message. Good, that means you can read well-enough. Not that reading's a requirement for this job,\" says General Tappon.\n\n\"And what is this job?\"\n\n\"Recon. We've got a location that, rumor has it, houses a powerful militia. It's called the Linc. Ever heard of it?\"\n*choice\n  #\"Yes. It's where the Eagles operate out of.\"\n    \"Good. From what we understand, the Eagles are part of the Trading Triangle. We're still scouting out the other members, but it seems safer for a local to head into South Philly.\"\n\n    *goto c1\n\n  #\"Nope. Never.\"\n    \"I somehow doubt that, but never mind. It's where the Eagles call home. We're still scouting out the other members of the Trading Triangle, but it seems safer for a local to head into South Philly.\"\n\n    *goto c1\n\n*label c1\nShe goes on to say, \"It may seem inconvenient that I ask you to go so far south, after you've traveled so far north. Trust me when I say it will be worth your while.\"\n\n\"I'm listening.\"\n\n\"You do good by us and we'll do good by you - ask any soldier here. Here's the lecture I'm supposed to give: Allen's Republic has something nobody else does, and that's a lawful government. As such, it's our duty to share it with places that don't, like Philly. Even when they don't quite want the gift. If you help us colonize Philly then you'll be looking at the President herself shaking your hand. And if patriotism doesn't do it for you, imagine never having to wander the wastes again. Food and water and anything you need, ready and waiting at Fort Washington.\"\n*label c31\n*choice\n  *disable_reuse #\"What's a president?\"\n    \"The president is the ruler of our grand republic,\" says Tappon. \"Elected by the people and confirmed by the senate, our great leader Ellen Burrows will carry us across the wastes.\"\n    *goto c31\n\n  *disable_reuse #\"Tell me about Allen's Republic.\"\n    \"We were founded in the ruins of old Allentown. Took a lot of hard work and pain, and a lot of lives lost, but now we're the greatest nation in the wasteland. And when we're done with it, there won't be a wasteland left. But to bring civilization to Philly, we'll need your help.\n    *goto c31\n\n  *disable_reuse #\"Tell me about yourself.\"\n    \"I was young when the army recruited me,\" she says in certainly rehearsed lines. \"Highwaymen raided my village, enslaved my sister, killed my parents. The army gave me a way to get revenge. At first we were just playing at war, killing a few highwaymen and then running back to the safety of our villages. Then Ellen Burrows was elected president. After that, there was no more playing and no more running. Now we actually have the teeth we need to bring civilization to the wasteland. And you get to help us.\n    *goto c31\n\n  #\"I've gotten offers like this before. They don't usually pan out.\"\n    \"If you really felt that way then you wouldn't be here,\" she says. \"Go to the Linc and find out if the Eagles would be receptive to an alliance. If not, find someone in their leadership who will be.\"\n\n    *goto c2\n\n  #\"I can't be your patriot, Allen isn't my country.\"\n    \"Then be our contactor,\" she says. \"Go to the Linc and find out if the Eagles would be receptive to an alliance. If not, find someone in their leadership who will be.\"\n\n    *goto c2\n\n  #\"I'd be honored to serve your President.\"\n    \"You'll be honored for generations,\" she says. \"Go to the Linc and find out if the Eagles would be receptive to an alliance. If not, find someone in their leadership who will be.\"\n\n    *goto c2\n*label c2\n*fake_choice\n  #\"Yes, ma'am.\"\n  #\"Guess I'll get on that.\"\n  #\"I'm too tired for this shit.\"\n\n\"Feel free to rest the night in our barracks,\" she says with the false smile of a true leader. \"You've done a lot of walking and have a lot more to do, and it's getting dark out.\"\n\nShe leads you into the barracks. One room is filled with bunk beds running parallel to one another, rusty bodies and decaying mattresses. The other room is a kitchen. Some soldiers cook dried vegetables and salted meats over an oil fire. Others sit around an old wooden table and play a card game. The cards move quickly and they don't seem to follow any playing patterns that you recognize.\n\nThey quickly stand to attention when the General enters the room. You don't recall seeing such staunch discipline anywhere else in the wasteland. Not in any village or militia or gang. \"At ease,\" says Tappon, giving her men permission to sit back down and return to their leisure. \"Our new contractor is spending the night with us. Don't get them killed.\"\n\nWith that, she leaves, returning into the cool wasteland night to interrogate a prisoner or discipline a soldier or draw up battle plans, or whatever it is a general does.\n\nYou stand there awkwardly for a few moments, then sit at the table. The warm scent of cooking meat wafts into the air, heavy and savory. Your mouth waters as you wait.\n\n\"So, where you from?\" asks one of the card players. She's a surprisingly old woman for a grunt soldier. Not old, exactly, but older than the others by at least a decayed, shocks of grey hair under her helmet.\n\n\"What?\"\n\n\"What part of Philly?\" she asks. \"Or are you from Philly at all?\"\n*choice\n  #A fishing village on the water\n    \"I was raised by fishers out by the water,\" you explain. \"But now I'm a wastelander.\"\n\n    \"What happened to your people?\" asks one of the soldiers.\n    *goto c3\n\n  *if (Survivalist = 1) #A survivalist compound\n    \"I was raised at a survivalist compound,\" you explain. \"But now I'm a wastelander.\"\n\n    \"What happened to your people?\" asks one of the soldiers.\n    *goto c3\n\n  *if (Wanderer = 1) #Born and raised on the road, not really from anywhere\n    \"I grew up on the road,\" you explain. \"Always been a wastelander, always will be.\"\n\n    *goto c4\n\n  *if (Scavenger = 1) #A little scavenger town out in the ruins\n    \"I was raised in a scavenger town in the ruins,\" you explain. \"But now I'm a wastelander.\"\n\n    \"What happened to your people?\" asks one of the soldiers.\n    *goto c3\n\n  #A military base run by mercenaries\n    \"I was raised by mercenaries on a military base,\" you explain. \"But now I'm a wastelander.\"\n\n    \"What happened to your people?\" asks one of the soldiers.\n    *goto c3\n\n  #A monastery way up in the mountains\n    \"I was raised by monks,\" you explain. \"But now I'm a wastelander.\"\n\n    \"What happened to your people?\" asks one of the soldiers.\n    *label c3\n    *fake_choice\n      #\"I left them.\"\n      #\"They were wiped out.\"\n      #\"They exiled me.\"\n\n    *label c4\n    One of the soldiers raises his cup and says, \"Here's to you. Takes a lot of grit to make it on your own.\"\n\n    The other soldiers raise their cups and mutter similar praises, then one of them places a glass in front of you. Clear booze swims within. It smells sharp. Moonshine, most likely. You take a sip with them, letting it burn your throat as tears well in your eyes. The soldiers laugh when they see your reaction.\n\n    \"Yeah, it's a bit strong,\" says the woman next to you.\n\n    \"The trick is to hold your nose shut,\" says the youngest soldier, a scrawny boy with gaunt features and a clear complexion. He demonstrates, holding his nostrils closed and tips his glass back, filling his throat with moonshine.\n\n    Then the woman says, \"If you stop tasting it, you've gone too far.\"\n\n    The boy smacks his lips and says, \"That's the coward's way out.\" Then he turns to you. \"Don't mind Duchess here, she thinks she's our mom.\"\n\n    \"Someone has to be responsible,\" she says.\n\n    Another soldier speaks up, \"I thought we had a general for that.\" He's much younger than Helen, but older still than the boy. He smirks sideways, sipping moonshine, pleased with his remark.\n\n    \"Don't let Tappon hear that or you'll be on latrine duty again,\" says the boy.\n\n    Supper is served before the conversation can continue. Platters of vegetables and odd meats that you don't recognize. Smells, sweet and savory, fill the air. For the second time in recent history, you dine with a family and enjoy bounties without fear.\n    *page_break\n    You sleep fitfully on a squeaky top bunk, comforted only by the snoring of the soldiers. They could kill you if they wanted. You're vastly outnumbered and there are certainly soldiers outside this one barrack. That kind of thought makes it hard to sleep, and for good reason. That distrust is what keeps people alive in a treacherous wasteland.\n\n    But it's keeping you up when you'd rather be asleep, so you climb off the bed, quietly as possible, and step outside. The nighttime air is cool and crisp, not at all the harsh heat of the wasteland day. You breathe it in, letting it chill your lungs\n\n    \"You must get so bored,\" says a voice.\n\n    You turn on your heel, a flash of cool sweat upon your brow, heart racing. It's just the General.\n\n    \"Didn't mean to scare you,\" she says. She's still wearing her military fatigues, a cigarette in her fingers. \"I couldn't sleep either. It gets boring after a while. What's keeping you up?\"\n    *choice\n      #\"Paranoia.\"\n        It's an honest enough answer. One that most wastelanders can appreciate. \n\n        \"Well you shouldn't be,\" she says. \"Allen's Republic bears no ill will toward the people of this wasteland.\"\n        *goto c5\n\n      #\"Stomach aches.\"\n        Probaly all that food you ate, not to mention the moonshine.\n\n        \"Guess you aren't used to a full belly,\" she says. \"Allen's Republic tries to keep all its people fed. We bear no ill will toward the people of this wasteland.\"\n        *goto c5\n\n      #\"I don't sleep around strangers.\"\n        It's an honest enough answer. One that most wastelanders can appreciate. \n\n        \"I can respect that, but you shouldn't be so paranoid,\" she says. \"Allen's Republic bears no ill will toward the people of this wasteland.\"\n        *label c5\n        *choice\n          #\"I believe that.\"\n            \"Thank you, not everyone is so eager to see our banners,\" she says. \"You should get some sleep. Lot of walking tomorrow.\"\n            *goto c6\n\n          #\"Then why bring an army?\"\n            \"I should correct myself,\" she says. \"We bear no ill will toward good people. Evil people, however, will be felled beneath our boots. You should get some sleep. Lot of walking tomorrow.\"\n            *goto c6\n\n*label c6\n*page_break The Next Morning\nTappon wishes you luck before you set out, sun rising over the horizon, far beyond the edge of the forest. The evening was a nice break from constant walking and constant shooting. And it gave you insight into this shanty republic and its army. But you cannot use it now - not until you meet with the Eagles at the Linc.\n*finish", "7-linc": "[i]It seems that the sudden burst of radiation killed them all. Those poor winged fellows, eagles and hawks and even the oddlly frightening geese. Most or all of them were killed when the bombs fell. Crows still live, as do pigeons and even doves. But the rarer, much more interesting birds are all but extinct. The only great winged beasts left in this wasteland are mutant insects, which are both disgusting and disappointing.[/i]\n\n-An Anonymous Archivist, [i]Astounding Avianonics[/i]\n\nIt takes a full day of walking and then some before the faded grey walls of the Linc come into view, still distant beyond the shattered rows of buildings. As you come closer, you spot the eagle's head painted onto the wall in green, letting all before it know who resides inside.\n\nAs if the painted insignia is not message enough, a row of crosses surrounds the edge of the Linc. Many of them are empty or hold skeletons, but some are loaded with the weight of dying prisoners. Their horrible screams echo across the ruins, warning the wasteland not to defy the might of the Eagles. \n\nYou follow the road toward the entrance, guards standing on both sides. This portion of the wall is covered with metal - possibly repairs - and the entrance is wide enough for six men walking shoulder-to-shoulder. Yet only two guards stand before it. Above them is an electric sign composed on many letters, but only four are lit: LINC.\n\nThe crucified man across the road from them is writhing in agony. Nails shatter his wrists and blood seeps down his arms as his ash-covered body slinks down. His weight pulls down onto his nailed wrists, causing even more pain. To worsen his execution, he must pull himself up in order to breathe. Daughter reserve this punishment for only the worst warlords, knowing that they will die in pain and agony. The Eagles seem to use it more freely.\n\n\"Stop!\" says one of the Eagles, pointing his gun at you. You're real tired of people pointing guns at you. \"Hands where we can see 'em.\"\n\nYou raise your hands in compliance as they approach you. The other one asks, \"What business ya got here?\"\n*fake_choice\n  #\"Just passing through.\"\n  #\"Wanted to make new friends.\"\n  #\"None of your business.\"\n\n\"Hm, guess the QB's gonna have a word with ya then,\" he says. \"We don't like visitors very much. Might end up like one of them.\" He nods to the soot-covered man hanging from the cross. \n\n\"Let me guess, you're gonna steal my shit,\" you say.\n\nThe Eagle scoffs. \"We aren't highwaymen. We only take shit when it comes from dead bodies.\"\n\nThey lead you into the Linc, one showing the way and the other prodding the barrel of his gun into your back, pushing you along. The concrete walls give way to a field of dead yellow grass, crushed beneath the weight of rubble and the feet of soldiers. Graffiti marrs the walls saying things like, \"No rules. Just Right. Outback.\"\n\nA terrible scream looses from behind you. Someone in one of the many rows of plastic seats, far behind you. It's a woman, you know that much. Instinct draws your gun into your hands and a cool shock of sweat flashes over you. You scan the bleachers and spot the screamer. Her horrible howls do not stop. The Eagles do not mind.\n\n\"That's just Cicada, she screams,\" says one. Her screams do not echo, they just screech across the sky and into your ears. She stops to breathe once in a while, then screams again.\n\n\"Why?\"\n\nHe shrugs. \"I don't know. She always says that someone's gotta do it.\"\n\nHe leads you along the massive rectangle of dead grass, and Cicada's screams fade into the distance. Such a massive field. Surely it could be used for farming, but these are not farmers. Other Eagle soldiers walk along it, heading to missions or patrols or other duties. Some sit in the bleachers, looking out over the wasteland or lying down, enjoying a short break. Some drink moonshine or even smoke ancient cigarettes.\n\nShacks have been constructed along the bleachers, made from salvaged wood and steel and even plastic. A small shanty town rises at the far end of the field. A few pillories stand on the dead grass before it. Prisoner are locked into them, hunched over, dirty and bloodied and gagged so their cries do not disturb their captors. One of the guards spits on a prisoner as you pass them, then leads you up the steps to the wooden shacks along the bleachers. Cicada's screech is now a distant whine in the background.\n*page_break\nCorvalla greets you before you enter the shack. She stands outside as if she was awaiting you. \"Good to see you again,\" she says.\n\n\"You know the visitor, ma'am?\" asks the guard.\n\n\"Leave us,\" she says.\n\n\"Yes, QB.\" And like that, they head back to their duties. \n\n\"Come on in,\" she says, leading you into her shack. It's arranged like an office - a desk, chairs, some torches for light, and a flag on the wall depicting their sigil. She leans against the desk and crosses her arms. \"So, what brings you by?\"\n*label c1\n*choice\n  *hide_reuse #\"So you're in charge of the Eagles?\"\n    \"That's right,\" she says with a mischievous smile. \"I'm the QB.\"\n\n    \"Why didn't you say anything?\" you ask.\n\n    She shrugs. \"No need to advertise how important you are, right. So, what can I do for you?\"\n    *goto c1\n\n  *hide_reuse #\"What's with all the crosses?\"\n    \"They're for wasteland assholes,\" she says. \"Highwaymen, thieves, rapists. Y'know, the usual. It's a painful death, keeps people in line. Pretty sure the Daughters use it too, but I'm trying to phase it out.\"\n\n    \"Why?\"\n\n    \"Eh, it's not too effective at deterring crime,\" she says. \"Otherwise I wouldn't have had to deal with that bunker full of highwaymen. So, what can I do for you?\"\n    *goto c1\n\n  #\"I'm looking for work.\"\n    She smiles. \"Usually we send new contractors on a really easy mission first, to prove themselves. But you proved yourself at the bunker.\"\n\n    \"So what's the job?\"\n\n    \"Pretty simple,\" Corvalla says, pointing to a corkboard on the wall. Flyers and drawings mark it. They depict and describe wanted highwyamen. \"These are warlords, highwwaymen, criminals, etc. They've escaped the Eagles' justice. Pick one, kill 'em, bring me their head.\"\n\n    You look over the list of highwaymen, only three without their names crossed out. \n    *goto c2\n\n*label c2\n*choice\n  *hide_reuse #\"Why not send your soldiers to do this?\"\n    \"Because these are low priority targets,\" she says. \"Pretty sure one of them is crippled. Should be an easy enough task for someone like you.\"\n    *goto c2\n\n  #Alan the Annihilator\n    \"Interesting choice,\" says Corvalla. \"Used to be a merc, but he went too far. Killed some woman's baby about a month ago on what should have been a routine caravan transport. We might've been able to open a proper investigation, but he ran.\"\n    *choice\n      #\"Why'd he kill the baby?\"\n        \"They say it was an accident. Doesn't matter though. He ran, now he has to pay,\" she says. \"He was last seen at the village Penrose. Start there.\"\n\n        *goto c3\n\n      #\"Why is this the Eagles' problem?\"\n        \"The village the child was from is under our protection. If we can't protect them, they'll stop feeding us,\" she says. \"He was last seen at the village Penrose. Start there.\"\n\n        *goto c3\n\n      #\"Why did the caravan need to hire a merc?\"\n        \"Some traders don't trust us or the Daughters, so they outsource to mercs. Now you see why that's a bad idea,\" she says. \"He was last seen at the village Penrose. Start there.\"\n\n        *goto c3\n\n      #\"Where do I start?\"\n        \"He was last seen at the village Penrose,\" she says. \"Start there.\"\n\n        *label c3\n        You leave the shack office and Corvalla behind and head across the field, toward the exit of the Linc from which you game, contemplating these odd circumstances. Employed by the Eagles on behalf of Allen's Republic, as a double agent for the Daughters of Liberty. It's a bit much.\n\n        \"Hey,\" calls out a voice, disturbing your contemplation. You turn and see a woman standing there. Cicada. She wears rags rather than a jersey and holds the corpse of soemthing winged in one hand. It's a buzzer, you realize. Tiny, dead, limp, it buzzes no more. Then she speaks, her voice cracked and craggy from her morning screams. \"Do you like murder?\"\n        *fake_choice\n          #\"Yes.\"\n          #\"No.\"\n\n        \"Hmm, well I don't believe that,\" she says. \"But you definitely enjoy righteousness. I can see it in your eyes. Something is off about the Eagles, right?\"\n\n        \"Uh, I guess.\"\n\n        \"Corvalla is taking us down the wrong path. Bounties instead of manhunts, decapitations instead of crucifixions. She's turning us into an ineffectual militia of pansies. You were there on that bunker raid. You saw those merciful kills - no torture, no punishment.\"\n\n        \"What do you want?\" you ask. Something sinister twists behind her blank, pallid eyes. \n\n        \"Reformation,\" she says. \"Abandon this erroneous quest and help me kill Corvalla.\"\n        *label c4\n        *choice\n          *hide_reuse #\"What's in it for me?\"\n            \"The eternal loyalty the Eagles. What more could you want?\"\n            *goto c4\n\n          #\"No thanks.\"\n            *set Deception %-8\n            *set Sadism %-9\n            *set Cruelty %-3\n            Cicada sighs and pets the buzzer corpse and says, \"Aww, we'll neve find someone to kill her for us.\"\n\n            You put the strangeness of Cicada's request behind you and focus on the task at hand. The village Penrose is to the north of the Linc, you recall. So, you put the rising sun on your right and follow the roads toward your target.\n\n            It's not as much walking as the travel from Fort Washington. In fact, it isn't even comparable. That trek took a few hours and was riddled with the danger of stumbling upon highwyamen territory. This is a mere twenty minutes.\n            *page_break\n            Similar to Franklin, Penrose is built out of an old tower. Unlike Franklin, Penrose sucks. It's a dilapidated old building, windows shattered and concrete collapsing, shanty and grey. Whereas Franklin has been maintained and rehabilitated, Penrose has not survived the decades of ravage. It is not blessed enough to be near any farmland or on a trade route. In fact, its only blessing is that the Linc's proximity prevents highwaymen attacks. Unfortunately, it also serves battlefield for the attacks of the Eagles' enemies.\n\n            As such, it is sparsely populated. A few civilians laze about, knives strapped to their hips but no real alertness or fear in their eyes. They lie in rubble besides their shacks made of wood and steel and stone, although some are missing walls and even roofs. Their faces are all gaunt with hunger, nothing but skin and bones. \n\n            One man seems a bit hardier and heavier than the others, so you address him. \"I'm looking for Alan the Annihilator.\"\n\n            \"Hmph, 'bout time,\" says the man. He pulls a scrap of paper from his pocket. A bounty. Alan's name is scribbled on the bottom with a description of his crime. His face is plastered on top - hairy and scarred. \"The name's Rosy Pete. I been lookin' for this Annihilator. Was hoping the Eagles would send reinforcements. Guess you'll do.\"\n            *label c5\n            *choice\n              *hide_reuse #\"Are you collecting the bounty?\"\n                \"Nope. It's personal.\"\n                *goto c5\n\n              *hide_reuse #\"Why do you wanna kill him?\"\n                \"He killed some of mine. Now I get to return the favor.\"\n                *goto c5\n\n              #\"Got any leads?\"\n                Rosy Pete flashes a toothy smile. \"Oh boy, I sure do. Follow me.\"\n\n                You follow him, perhaps foolishly, away from Penrose, leaving the crippling poverty and its ruins behind. It might be dangerous to follow a stranger around the wasteland, but you've done more dangerous things lately. Besides, he might be well-fed, but he's a wrinkled guy, no real spring in his step.\n\n                \"Where are we going?\" you ask.\n\n                \"Don't worry about it.\"\n\n                \"I'm worried.\"\n\n                He sighs. You're deeper into the ruins now. Ravaged ruins rest on either side of the street, uninhabited. \"Alan's got a shack a way's away. He's a scavenger now, hides his face so the Eagles don't kill him on sight. We're gonna kill him.\"\n\n                With that, he leads you further along into the ruins. You keep your eyes peeled for the highwaymen who may hide away in them. Downtown Philly fluctuates between being a warzone and a ghost town, and there's very little in-between. It seems that now it's a ghost town.\n\n                \"We're getting close,\" says Pete. \n\n                He stops you beside a row of cars - their hides had been salvaged by highwaymen and traders, leaving their bodies to rot and rust. He points over them, gesturing to an old wooden shack. No, the shack is new, the wood is old. A figure moves within it. \n\n                \"How do you wanna do this?\" asks Pete.\n                *choice\n                  #\"Let's just shoot him.\"\n                    *set Deception %-8\n                    *set Sadism %+8\n                    *set Cruelty %+7\n                    *set Caution %-9\n                    \"I like you,\" says Pete with a smile. He doesn't miss a beat, just gets up and starts marching, revolver cocked and aimed at the shack.\n\n                    You follow, raising your gun and taking aim as well. A figure moves inside, but you cannot tell if it's Alan. You cannot tell anything. It's too dark and dusty and far away. It might be wise to wait a moment and see if he truly is the Annihilator. Pete is not wise.\n\n                    He wordlessly opens fire on the shack. His bullets split the wood and shatter the window. You follow his lead, firing on the shack and hoping to hit the figure inside. You both step closer as you shoot, and by the time you need to reload, you're at its wall.\n\n                    The ruins are silent, save the sound of splinters falling into the dust. The wood sets itself, relaxing a creaking in the wind. Glass flakes off the broken windows and onto the floorboards behind the wall. \n\n                    Pete turns the corner, without warning, and bursts into the house. You follow.\n\n                    \"We did it,\" he calls out, before you've managed to turn into the house.\n\n                    Then you step into the barren shack and see what you did. The man lies dead, gun in his hand, bullets riddling his now bloodied body. A black bandana covers his face. Pete rips it off and places the bounty poster next to him.\n\n                    \"See? It's totally him.\"\n\n                    This man is much scrawnier and not quite as hairy as the man in the drawing, and their noses are rather different. That may be a result of someone drawing from memory, but the difference is still notable. \n\n                    Pete draws a knife before you can say anything, and embeds it in the dead man's neck. In a shockingly quick but still disgusting process, he cuts off the head. Black blood spills onto the ground, loosed by the cut arteries. The stench is ridiculous and it takes every bit of self-control for you not to vomit.\n\n                    He places the head in a sack, hands the dripping thing to you, and says, \"Tell Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose. Assuming this is actually Alan's head.\n                    *goto c6\n\n                  #\"He's dangerous, we should be sneaky.\"\n                    *set Deception %+8\n                    *set Sadism %-2\n                    *set Cruelty %-1\n                    *set Caution %+6\n                    \"Eh, I guess,\" he says. \n\n                    You crouch low to the ground and head toward the shack, gun raised and ready, Pete not far behind you. A figure moves inside, but you cannot tell if it's Alan. You cannot tell anything. It's too dark and dusty and far away. It might be wise to wait a moment and see if he truly is the Annihilator. Pete is not wise.\n\n                    Pete gestures for you to circle around the one side of the shack as he goes along the other. He turns the corner and the sound of gunfire fills the air. Glass and splintered wood fly from the walls and windows and you rush toward the door, but Pete does not need your help.\n\n                    \"We did it,\" he calls out, before you've managed to turn into the house.\n\n                    Then you step into the barren shack and see what you did. The man lies dead, gun in his hand, bullets riddling his now bloodied body. A black bandana covers his face. Pete rips it off and places the bounty poster next to him.\n\n                    \"See? It's totally him.\"\n\n                    This man is much scrawnier and not quite as hairy as the man in the drawing, and their noses are rather different. That may be a result of someone drawing from memory, but the difference is still notable. \n\n                    Pete draws a knife before you can say anything, and embeds it in the dead man's neck. In a shockingly quick but still disgusting process, he cuts off the head. Black blood spills onto the ground, loosed by the cut arteries. The stench is ridiculous and it takes every bit of self-control for you not to vomit.\n\n                    He places the head in a sack, hands the dripping thing to you, and says, \"Tell that Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose. Assuming this is actually Alan's head.\n                    *goto c6\n\n                  #\"I'll distract him, you kill him.\"\n                    *set Deception %+7\n                    *set Sadism %+2\n                    *set Cruelty %+3\n                    *set Caution %-6\n                    \"Eh, I guess,\" he says.\n\n                    You crouch low to the ground and head toward the shack, gun raised and ready. A figure moves inside, but you cannot tell if it's Alan. You cannot tell anything. It's too dark and dusty and far away.\n\n                    You toss a stone through the window to distract him, sending glass shattering. You don't see what happens, but gunshots ring out. Pete runs from cover, still shooting, sniping despite the use of a pistol. Glass and splintered wood fly from the walls and windows and you rush toward the door, but Pete does not need your help.\n\n                    \"We did it,\" he calls out, before you've managed to turn into the house.\n\n                    Then you step into the barren shack and see what you did. The man lies dead, gun in his hand, bullets riddling his now bloodied body. A black bandana covers his face. Pete runs into the shack right behind you and rips off the bandana, places the bounty poster next to him.\n\n                    \"See? It's totally him.\"\n\n                    This man is much scrawnier and not quite as hairy as the man in the drawing, and their noses are rather different. That may be a result of someone drawing from memory, but the difference is still notable. \n\n                    Pete draws a knife before you can say anything, and embeds it in the dead man's neck. In a shockingly quick but still disgusting process, he cuts off the head. Black blood spills onto the ground, loosed by the cut arteries. The stench is ridiculous and it takes every bit of self-control for you not to vomit.\n\n                    He places the head in a sack, hands the dripping thing to you, and says, \"Tell that Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose. Assuming this is actually Alan's head.\n                    *goto c6\n\n                  #\"I bet I can talk to him.\"\n                    *set Deception %+3\n                    *set Sadism %-8\n                    *set Cruelty %-7\n                    *set Caution %+6\n                    \"That's dumb,\" he says. \"Fine. I'll stay back here and keep watch. He makes a stupid move, I'll put a bullet in him for ya.\"\n\n                    You holster your gun and pace toward the shack, slowly as to not startle Alan. A figure moves inside, but you cannot tell if it's Alan. You cannot tell anything. It's too dark and dusty and far away.\n\n                    \"Alan,\" you call out. Your call echoes across the ruins. The man inside the shack stirs, then rushes in a blur, then he's outside. \n\n                    \"Who the hell are you?\" he asks, pointing a pistol at you. His face is hidden by a black bandana. \n\n                    \"I'm just here to talk,\" you say, holding your hands up.\n\n                    A shot rings out and he falls to the ground. He scrambles, bleeding, but another shot puts an end to that. You turn back, drawing your gun instinctively, but it's just Pete.\n\n                    \"We did it!\" he says with a smile. The man lies dead, gun in his hand, bullets riddling his now bloodied body. Pete runs up and rips off the bandana, places the bounty poster next to him. \"See? It's totally him.\"\n\n                    This man is much scrawnier and not quite as hairy as the man in the drawing, and their noses are rather different. That may be a result of someone drawing from memory, but the difference is still notable. \n\n                    Pete draws a knife before you can say anything, and embeds it in the dead man's neck. In a shockingly quick but still disgusting process, he cuts off the head. Black blood spills onto the ground, loosed by the cut arteries. The stench is ridiculous and it takes every bit of self-control for you not to vomit.\n\n                    He places the head in a sack, hands the dripping thing to you, and says, \"Tell Corvalla that Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose. Assuming this is actually Alan's head.\n                    *goto c6\n\n                    *label c6\n                    *page_break\n                    You toss the sack at Corvalla's feet. She peels it off the head and the stink of dark blood fills the air. She suppresses a gag and examines it beside the wanted poster on her corkboard. \"Yeah, that's Alan alright. I think. You did good, contractor.\"\n\n                    \"I try,\" you say.\n                    *label cic-att\n\n                    A gunshot rings out before you can say anything else. Then more, accompanied by Cicada's screaming, so close - just behind the door.\n\n                    \"It's Cicada,\" you mutter under your breath.\n\n                    \"Damnit is she trying to overthrow me?\" asks Corvalla. She pushes a desk in front of the door and draws the pistol from her hip. \"Bitch's always talking about it. Glad she's finally doing something.\"\n                    *choice\n                      #\"Yeah she tried recruiting me.\"\n                        \"Hey, thanks for letting me know,\" she says with a scowl.\n\n                        *goto c7\n\n\n                      #\"This happens a lot?\"\n                        \"How else do you decide who's in charge?\" she asks with a sideways smile.\n\n                        *goto c7\n\n                      #\"More shooty, less talky.\"\n                        *label c7\n                        *set Corv 1\n                        Corvalla opens fire on the door itself, pumping deafening bullets through the splintered wood. You join in her efforts and the sound is deafening. Your ears ring in protest after each gunshot. \n\n                        The world goes silent for a moment, the only sound that of reloading guns, yours and
