 Corvalla's. Then the door slides open. A dozen dead Eagles litter the field before the shack. Among them stands Cicada. Blood covers her body, seeping from a dying warriors she holds up. Bullets pierce his chest. She pushes him to the ground and draws her own rifle.\n\n                        \"You're too weak,\" she says, stepping over bodies. \"Hiring an outsider to kill a criminal. And then what? Not hanging them on a cross? Pathetic.\"\n\n                        A shot rings out. Cicada falls dead. \n\n                        It was over as quickly as it had begun. Corvalla returns her gun to its holster and watches as her warriors flood from the far corners of the Linc, poised and ready for combat. \n\n                        \"You stood with me during an attempted coup,\" she says to you. The dead body of Cicada is being dragged away by angry Eagles. They tear at it, spreading blood and gore across the dead grass. \"Should you ever need our aid, know that the Eagles are in your debt. But you must go now. We have bodies to burn and dead to mourn.\"\n                        *goto end\n                        *label end\n                        *page_break\n                        *set Eagles true\n                        You return to the road, putting the bloody events of the Linc behind you. It was just one step in this coming war. A new ally. [i]Your[/i] ally. But will you bring them to the side of the Daughters? Or to Allen's Republic?\n                        *finish \n\n          #\"I'll do it.\"\n            *label kill-corv\n            *set Deception %+8\n            *set Sadism %+9\n            *set Cruelty %+3\n            *set Villain +1\n            *set Cic 1\n            Cicada asks you to meet her outside the Linc, away from prying eyes. Out in the ruins, near the village Penrose, she meets you with an ally named Rosy Pete. He's a hardy man compared to the scrawny, starving villagers who hide in their shacks and tower and have nothing of value to farm or sell. Still, he's a wrinkled man with leathery skin, long passed his prime.\n\n            \"Cicada says you're helpin' with the coup,\" says Rosy Pete with a goofy, toothy smile plastered on his face. Cicada glares at him, certainly wondering how drunk he is. \"We're quite a trio then.\"\n\n            \"Here's the plan,\" she says. \"Pete, you're gonna distract the guards. Don't kill too many, they're my people too. All you gotta do is keep them out of the Linc.\"\n\n            \"Leg shots. Got it,\" he says.\n\n            \"Contractor, you're with me. We're gonna storm the castle.\"\n\n            You nod in agreement, and the plan goes into action.\n            *page_break\n            The gunshots are deafening, but seem mere music compared to the unearthly screeches loosed by Cicada. Your skin prickles as she howls. When she opens fire, you follow. Those few Eagles who had not gone to stop Pete are still on the field, in between you and your target. Cicada does not hesitate to attack them all.\n\n            The Eagles come at you, confused and frightened, and this is your advantage.\n            *choice\n              #Aim for their legs\n                *set Sadism %-3\n                *set Cruelty %-3\n                *set Caution %-1\n                Whether out of respect for the Eagles or respect for Cicada's wishes, you aim only at the legs of your attackers. They fall to the ground, flailing in pools of their own blood, crawling after you.\n\n                *if Combat > 45\n                  You run, unwounded and unmarred, toward Corvalla's shack at the edge of the Linc.\n\n                  *goto c8\n\n                *else\n                  *set Health %-17\n                  A bullet pierces your thigh and sends shocks of pain through your body, but you push through and run, unwounded and unmarred, toward Corvalla's shack at the edge of the Linc.\n\n                  *goto c8\n\n              #Aim for their faces\n                *set Sadism %+3\n                *set Cruelty %+3\n                *set Caution %+1\n                No mercy for people who shoot at you. You pump lead into their faces, into their chests, slaughtering them and pouring blood onto the dead grass. They fall into the field, choking on their blood, and the smell of gore hangs in the air.\n\n                *if Combat > 45\n                  You run, unwounded and unmarred, toward Corvalla's shack at the edge of the Linc.\n\n                  *goto c8\n\n                *else\n                  *set Health %-17\n                  A bullet pierces your thigh and sends shocks of pain through your body, but you push through and run, unwounded and unmarred, toward Corvalla's shack at the edge of the Linc.\n\n                  *goto c8\n                  *label c8\n                  Corvalla does not hide in her shack. She runs forward, pistol in hand, taking a few final shots. Her time has ended.\n\n                  You open fire, but your bullets are not the ones that fall her. Cicada's do. This is her story, not yours. You just came along for the ride.\n\n                  Corvalla falls into a bloody heap like so many of her men. Bodies all around. Some bleeding still and some bled dry. You have to step over them to reach Cicada. She stands triumpantly amid the gore, foot resting on the hip of her foe. You notice that the screeching has stopped, as have the bullets. A few Eagles stand idly around, only vaguely aware of what has happened.\n\n                  \"You stood with me during an attempted coup,\" she says to you. The dead body of Corvalla is being dragged away by angry Eagles. They tear at it, spreading blood and gore across the dead grass. \"Should you ever need our aid, know that the Eagles are in your debt. But you must go now. We have bodies to burn and dead to mourn.\"\n                  *goto end\n\n  #Angie the Angry\n    \"Interesting choice,\" says Corvalla. \"She used to be a warlord. Took over a few villages and tried to start a little empire. The Daughters made sure that didn't work out.\"\n    *choice\n      #\"How did the Daughters get involved?\"\n        \"Rumor has it she's a former member,\" she says. \"Then she went the way of the warlord, as violent souls like the Daughters a prone to do. She was last seen at the village Penrose. Start there.\"\n\n        *goto c13\n\n      #\"Why is this the Eagles' problem?\"\n        \"Some of the villages she attacked were our subjects,\" she says. \"If we can't protect them, they'll start wondering why they feed us, and that's not good for anyone. So now we have to show that we can kill our enemies. She was last seen at the village Penrose. Start there.\"\n\n        *goto c13\n\n      #\"Do warlords pop up often?\"\n        She shrugs. \"Every once in a while some highwaymen get cocky, try to start their lil empire. But we make sure that doesn't come to fruition. Angie was just the latest wannabe warlord in Philly. She was last seen at the village Penrose. Start there.\"\n\n        *goto c13\n\n      #\"Where do I find her?\"\n        \"She was last seen at the village Penrose. Start there.\"\n\n        *goto c13\n\n        *label c13\n        You leave the shack office and Corvalla behind and head across the field, toward the exit of the Linc from which you game, contemplating these odd circumstances. Employed by the Eagles on behalf of Allen's Republic, as a double agent for the Daughters of Liberty. It's a bit much.\n\n        \"Hey,\" calls out a voice, disturbing your contemplation. You turn and see a woman standing there. Cicada. She wears rags rather than a jersey and holds the corpse of soemthing winged in one hand. It's a buzzer, you realize. Tiny, dead, limp, it buzzes no more. Then she speaks, her voice cracked and craggy from her morning screams. \"Do you like murder?\"\n        *fake_choice\n          #\"Yes.\"\n          #\"No.\"\n\n        \"Hmm, well I don't believe that,\" she says. \"But you definitely enjoy righteousness. I can see it in your eyes. Something is off about the Eagles, right?\"\n\n        \"Uh, I guess.\"\n\n        \"Corvalla is taking us down the wrong path. Bounties instead of manhunts, decapitations instead of crucifixions. She's turning us into an ineffectual militia of pansies. You were there on that bunker raid. You saw those merciful kills - no torture, no punishment.\"\n\n        \"What do you want?\" you ask. Something sinister twists behind her blank, pallid eyes. \n\n        \"Reformation,\" she says. \"Abandon this erroneous quest and help me kill Corvalla.\"\n        *label c14\n        *choice\n          *hide_reuse #\"What's in it for me?\"\n            \"The eternal loyalty the Eagles. What more could you want?\"\n            *goto c14\n\n          #\"No thanks.\"\n            *set Deception %-8\n            *set Sadism %+9\n            *set Cruelty %+3\n            Cicada sighs and pets the buzzer corpse and says, \"Aww, we'll neve find someone to kill her for us.\"\n\n            You put the strangeness of Cicada's request behind you and focus on the task at hand. The village Penrose is to the north of the Linc, you recall. So, you put the rising sun on your right and follow the roads toward your target.\n\n            It's not as much walking as the travel from Fort Washington. In fact, it isn't even comparable. That trek took a few hours and was riddled with the danger of stumbling upon highwyamen territory. This is a mere twenty minutes.\n            *page_break\n            Similar to Franklin, Penrose is built out of an old tower. Unlike Franklin, Penrose sucks. It's a dilapidated old building, windows shattered and concrete collapsing, shanty and grey. Whereas Franklin has been maintained and rehabilitated, Penrose has not survived the decades of ravage. It is not blessed enough to be near any farmland or on a trade route. In fact, its only blessing is that the Linc's proximity prevents highwaymen attacks. Unfortunately, it also serves battlefield for the attacks of the Eagles' enemies.\n\n            As such, it is sparsely populated. A few civilians laze about, knives strapped to their hips but no real alertness or fear in their eyes. They lie in rubble besides their shacks made of wood and steel and stone, although some are missing walls and even roofs. Their faces are all gaunt with hunger, nothing but skin and bones. \n\n            One man seems a bit hardier and heavier than the others, so you address him. \"I'm looking for Angie the Angry.\"\n\n            \"Hmph, good for you,\" says the man. He pulls a scrap of paper from his pocket. A bounty. Angies face is drawn along it - below, a description of her crimes. \"She's got a little gang west of here. You wanna put a bullet in her, head out that way.\"\n            *label c15\n            *choice\n              *hide_reuse #\"You got beef any beef with her?\"\n                \"Angie? Nope,\" he says.\n                *goto c15\n\n              *hide_reuse #\"Is her gang a threat?\"\n                \"Can't imagine it's more than three or four people.\"\n                *goto c15\n\n              #\"What, you don't wanna help?\"\n                He shrugs. \"Might as well. Not much else to do. Name's Rosy Pete by the by. Come along, stranger.\"\n\n                You follow him, perhaps foolishly, away from Penrose, leaving the crippling poverty and its ruins behind. It might be dangerous to follow a stranger around the wasteland, but you've done more dangerous things lately. Besides, he might be well-fed, but he's a wrinkled guy, no real spring in his step.\n\n                \"Where are we going?\" you ask.\n\n                \"Don't worry about it.\"\n\n                \"I'm worried.\"\n\n                He sighs. You're deeper into the ruins now. Ravaged ruins rest on either side of the street, uninhabited. \"Angie's putting together her new lil gang, maybe hoping to take Penrose or something. They make base out this way.\"\n\n                With that, he leads you further along into the ruins. You keep your eyes peeled for the highwaymen who may hide away in them. Downtown Philly fluctuates between being a warzone and a ghost town, and there's very little in-between. It seems that now it's a ghost town.\n\n                \"We're getting close,\" says Pete.\n\n                You catch sight of a group of tents amid the ruins, resting on the corner of what seems to be an old apartment building. They run flush against it. A trashcan fire burns amid them. Figures rest inside the tents. One moves between them. \n\n                \"How do you wanna do this?\"\n                *choice\n                  #\"Let's just shoot them.\"\n                    *set Deception %-8\n                    *set Sadism %+8\n                    *set Cruelty %+7\n                    *set Caution %-9\n                    \"I like you,\" says Pete with a toothy smile. He doesn't miss a beat, just gets up and starts marching, revolver cocked and aimed at the tents.\n\n                    You follow, raising your gun and taking aim as well. A figure moves in the camp, clad in leather and brandishing a machete. \n\n                    Pete does not hesitate nor does he wait for you to strike first. He squeezes off shot after shot toward the camp. They echoe off the ruins and spray into the tents, into the figures. You follow suit, pumping lead into them all. Adrenaline takes over and your eyes dilate, widening with focus and intent. Bullets fly freely, punching holes in the tents and bloody gaps into the highwaymen.\n\n                    It's over in an instant. The highwaymen didn't even get the chance to draw their weapons. You stay on edge a while, eyes peeled and scanning for other threats, but none come. You had the element of surprise, and sometimes that's all you need.\n\n                    Rosy Pete draws the bounty poster from his pocket and looks over the bleeding warriors. He compares each of the stench-ridden, armor-clad corpses to his picture of Angie and then declares, \"I found her.\"\n\n                    He doesn't hesitate as he plunges the knife into her lifeless neck, doesn't flinch as dark blood reeking of copper spills onto his hands. The head is separated in a moment and you have to suppress the urge to vomit. \n\n                    He dumps the head into a rattan sack and hands it to you, damp and heavy. \"Tell that Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose.\n                    *goto c16\n\n                  #\"They're dangerous, we should be sneaky.\"\n                    *set Deception %+8\n                    *set Sadism %-2\n                    *set Cruelty %-1\n                    *set Caution %+6\n                    \"Eh, I guess,\" he says. \"As long as I get to shoot someone, I'm good.\"\n\n                    He crouches low to the ground and you follow, guns raised and ready to fire. You take aim as you walk. A figure moves in the camp clad in leather and brandishing a machete. \n\n                    Pete gestures for you to go around one side of the tents while he goes around the other. You've barely taken a step when gunshots ring out. Pete did not hestitate, he simply opened fire. He squeezes off shot after shot toward the camp. They echoe off the ruins and spray into the tents, into the figures. You follow suit, pumping lead into them all. Adrenaline takes over and your eyes dilate, widening with focus and intent. Bullets fly freely, punching holes in the tents and bloody gaps into the highwaymen.\n\n                    It's over in an instant. The highwaymen didn't even get the chance to draw their weapons. You stay on edge a while, eyes peeled and scanning for other threats, but none come. You had the element of surprise, and sometimes that's all you need.\n\n                    Rosy Pete draws the bounty poster from his pocket and looks over the bleeding warriors. He compares each of the stench-ridden, armor-clad corpses to his picture of Angie and then declares, \"I found her.\"\n\n                    He doesn't hesitate as he plunges the knife into her lifeless neck, doesn't flinch as dark blood reeking of copper spills onto his hands. The head is separated in a moment and you have to suppress the urge to vomit. \n\n                    He dumps the head into a rattan sack and hands it to you, damp and heavy. \"Tell that Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose.\n                    *goto c16\n\n                  #\"I bet I can talk to them.\"\n                    *set Deception %+3\n                    *set Sadism %-8\n                    *set Cruelty %-7\n                    *set Caution %+6\n                    \"That's dumb,\" he says with a sigh. \"Fine. I'll stay back here and keep watch. They do anything stupid, I'll drop 'em dead.\"\n\n                    You holster your gun and pace toward the camp, slowly as to not startle Angie or her warriors. A figure moves toward the trashcan fire, stench of smoke in the air. She's clad in leather and brandishing a machete.\n\n                    \"Angie,\" you call out. This gets her attention.\n\n                    She instinctively draws the blade and glares at you. \"Who the hell's asking?\"\n\n                    A gunshot rings out before you can say anything else. Her warriors flock to action but the hail of bullets has already descended, knocking her into a bloody puddle. Pete did not hesitate, so neither can you. You follow suit, pumping lead into them all. Adrenaline takes over and your eyes dilate, widening with focus and intent. Bullets fly freely, punching holes in the tents and bloody gaps into the highwaymen.\n\n                    It's over in an instant. The highwaymen didn't even get the chance to draw their weapons. You stay on edge a while, eyes peeled and scanning for other threats, but none come. You had the element of surprise, and sometimes that's all you need.\n\n                    Rosy Pete draws the bounty poster from his pocket and looks over the bleeding warriors. He compares each of the stench-ridden, armor-clad corpses to his picture of Angie and then declares, \"I found her.\"\n\n                    He doesn't hesitate as he plunges the knife into her lifeless neck, doesn't flinch as dark blood reeking of copper spills onto his hands. The head is separated in a moment and you have to suppress the urge to vomit. \n\n                    He dumps the head into a rattan sack and hands it to you, damp and heavy. \"Tell that Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose.\n                    *goto c16\n\n                    *label c16\n                    *page_break\n                    You toss the sack at Corvalla's feet. She peels it off the head and the stink of dark blood fills the air. She suppresses a gag and examines it beside the wanted poster on her corkboard. \"Yeah, that's Angie alright. I think. You did good, contractor.\"\n\n                    \"I try,\" you say.\n                    *goto cic-att\n\n          #\"I'll do it.\"\n            *goto kill-corv\n\n  #Laserface\n    \"Interesting choice,\" says Corvalla. \"They're an assassin. Their job is to do as much damage to a town's population as possible in preparation for an assault. In return they get whatever they want from the gang that hired them.\n    *choice\n      #\"Why do gangs need this kind of help?\"\n        She shrugs. \"Makes it easier for a little gang to do a lot of damage. Villages get weakened and they're in no position to fight back. Your job is to make sure it doesn't happen again. They were last seen at the village Penrose. Start there.\"\n\n        *goto c23\n\n      #\"Why is this the Eagles' problem?\"\n        \"Some of the villages they've attacked are our subjects,\" she says. \"If we can't protect them, they'll start wondering why they feed us, and that's not good for anyone. So now we have to show that we can kill our enemies. They were last seen at the village Penrose. Start there.\"\n\n        *goto c23\n\n      #\"What gang are they a part of?\"\n        \"None,\" she says. \"They're a lone contractor. If they were in a gang, it would probably be the most powerful in the wastes. But it would also be a big target. So, they stick to contracting, and your job is to put a stop to that. They were last seen at the village Penrose. Start there.\"\n\n        *goto c23\n\n      #\"Where can I find them?\"\n        \"They were last seen at the village Penrose. Start there.\"\n\n        *goto c23\n\n        *label c23\n        You leave the shack office and Corvalla behind and head across the field, toward the exit of the Linc from which you game, contemplating these odd circumstances. Employed by the Eagles on behalf of Allen's Republic, as a double agent for the Daughters of Liberty. It's a bit much.\n\n        \"Hey,\" calls out a voice, disturbing your contemplation. You turn and see a woman standing there. Cicada. She wears rags rather than a jersey and holds the corpse of soemthing winged in one hand. It's a buzzer, you realize. Tiny, dead, limp, it buzzes no more. Then she speaks, her voice cracked and craggy from her morning screams. \"Do you like murder?\"\n        *fake_choice\n          #\"Yes.\"\n          #\"No.\"\n\n        \"Hmm, well I don't believe that,\" she says. \"But you definitely enjoy righteousness. I can see it in your eyes. Something is off about the Eagles, right?\"\n\n        \"Uh, I guess.\"\n\n        \"Corvalla is taking us down the wrong path. Bounties instead of manhunts, decapitations instead of crucifixions. She's turning us into an ineffectual militia of pansies. You were there on that bunker raid. You saw those merciful kills - no torture, no punishment.\"\n\n        \"What do you want?\" you ask. Something sinister twists behind her blank, pallid eyes. \n\n        \"Reformation,\" she says. \"Abandon this erroneous quest and help me kill Corvalla.\"\n        *label c24\n        *choice\n          *hide_reuse #\"What's in it for me?\"\n            \"The eternal loyalty the Eagles. What more could you want?\"\n            *goto c24\n\n          #\"No thanks.\"\n            *set Deception %-8\n            *set Sadism %+9\n            *set Cruelty %+3\n            Cicada sighs and pets the buzzer corpse and says, \"Aww, we'll neve find someone to kill her for us.\"\n\n            You put the strangeness of Cicada's request behind you and focus on the task at hand. The village Penrose is to the north of the Linc, you recall. So, you put the rising sun on your right and follow the roads toward your target.\n\n            It's not as much walking as the travel from Fort Washington. In fact, it isn't even comparable. That trek took a few hours and was riddled with the danger of stumbling upon highwyamen territory. This is a mere twenty minutes.\n            *page_break\n            Similar to Franklin, Penrose is built out of an old tower. Unlike Franklin, Penrose sucks. It's a dilapidated old building, windows shattered and concrete collapsing, shanty and grey. Whereas Franklin has been maintained and rehabilitated, Penrose has not survived the decades of ravage. It is not blessed enough to be near any farmland or on a trade route. In fact, its only blessing is that the Linc's proximity prevents highwaymen attacks. Unfortunately, it also serves battlefield for the attacks of the Eagles' enemies.\n\n            As such, it is sparsely populated. A few civilians laze about, knives strapped to their hips but no real alertness or fear in their eyes. They lie in rubble besides their shacks made of wood and steel and stone, although some are missing walls and even roofs. Their faces are all gaunt with hunger, nothing but skin and bones. \n\n            One man seems a bit hardier and heavier than the others, so you address him. \"I'm looking for Laserface.\"\n\n            He shrugs. \"You and just about everyone else in these ruins.\"\n\n            \"What do you know?\"\n\n            \"Name's Rosy Pete. I'm a purveyor of destruction, as it were. Last I saw them, Laserface was on the run from a gang they betrayed. I take it you wanna kill 'em first.\"\n            *label c25\n            *choice\n              *hide_reuse #\"What do you care?\"\n                He shrugs. \"I like killing criminals. Whats your business?\"\n                *goto c25\n\n              *hide_reuse #\"Why are they being attacked?\"\n                \"Laserface has a habit of playing both sides of gang wars. Guess it finally caught up with 'em.\"\n                *goto c25\n\n              #\"I've been sent by the Eagles.\"\n                He stands himself up straight, cracks his back, and says, \"Well, guess I'll be joining you.\" He slides a few bullets into the chamber of his revolver. \"They've been hiding in the sewers. The sewers for shit's sake.\"\n\n                \"Why the sewers?\" you ask.\n\n                \"Nobody's gonna look for 'em there.\"\n\n                You follow him, perhaps foolishly, away from Penrose, leaving the crippling poverty and its ruins behind. It might be dangerous to follow a stranger around the wasteland, but you've done more dangerous things lately. Besides, he might be well-fed, but he's a wrinkled guy, no real spring in his step.\n\n                Then he brings you to what appears to be a large metal pipe jutting out from between two buildings. It's large enough for you both to climb inside and is more hallway than pipe. The water inside is stilk, brown and filthy and smelling of things you'd rather think too much about.\n\n                \"How do you know where you're going?\" you ask.\n\n                Rosy Pete shrugs. \"I do this kinda stuff all the time.\" He does not go into more detail. \n\n                The sewer is dark and winding and reeks of shit - ancient shit, from a time before the bombs fell. It's solid but still squelches beneath your boots. Each step causes the noxious odor to rise and meet your nostrils, forcing you to suppress a gag.\n\n                \"Gettin' close,\" says Pete, though you're unsure how he can tell.\n\n                Then you see a light dancing at a corner ahead, where the tunnel turns to the right. The flame's light flickers and shimmer, casting orange onto the metal around you. A shadow moves too - a person's, no doubt.\n\n                \"How do you wanna do this?\" asks Pete.\n                *choice\n                  #\"Spray and pray.\"\n                    *set Deception %-8\n                    *set Sadism %+8\n                    *set Cruelty %+7\n                    *set Caution %-9\n                    \"I like you,\" says Pete with a smile. He doesn't miss a beat, just gets up and starts marching, revolver cocked and aimed down the tunnel.\n\n                    You follow, raising your gun and taking aim as well. A few treacherous steps and soon you've turned the corner. Pete does not hesitate - his bullets fire freely, embedding themselves in the steel of the tunnel with a heavy cacophany. You fire too, barely aiming, not even seeing the target until your finger has squeezed the trigger.\n\n                    The fight only lasts a second. Laserface never even got to shoot back. They lay dead beneath an oil lantern and a tent: a makeshift home in this strange place. Blood seeps into the stagnant water and their respective odors mix terribly.\n\n                    \"We did it,\" says Pete with an ecstatic grin. He doesn't hesitate as he plunges the knife into their lifeless neck, doesn't flinch as dark blood reeking of copper spills onto his hands. The head is separated in a moment and you have to suppress the urge to vomit. \n\n                    He dumps the head into a rattan sack and hands it to you, damp and heavy. \"Tell that Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose.\n                    *goto c26\n\n                    *label c26\n                    *page_break\n                    You toss the sack at Corvalla's feet. She peels it off the head and the stink of dark blood fills the air. She suppresses a gag and examines it beside the wanted poster on her corkboard. \"Yeah, that's Laserface alright. I think. You did good, contractor.\"\n\n                    \"I try,\" you say.\n                    *goto cic-att\n\n                  #\"They're dangerous, we should be sneaky.\"\n                    *set Deception %+8\n                    *set Sadism %-2\n                    *set Cruelty %-1\n                    *set Caution %+6\n                    \"Eh, I guess,\" he says. \"As long as I get to shoot someone, I'm good.\"\n\n                    He crouches low to the ground and you follow, guns raised and ready to fire. You take aim as you walk. A few treacherous steps and soon you've turned the corner. \n\n                    Pete does not hesitate - he abandons the idea of stealth immediately. His bullets fire freely, embedding themselves in the steel of the tunnel with a heavy cacophany. You fire too, barely aiming, not even seeing the target until your finger has squeezed the trigger.\n\n                    The fight only lasts a second. Laserface never even got to shoot back. They lay dead beneath an oil lantern and a tent: a makeshift home in this strange place. Blood seeps into the stagnant water and their respective odors mix terribly.\n\n                    \"We did it,\" says Pete with an ecstatic grin. He doesn't hesitate as he plunges the knife into their lifeless neck, doesn't flinch as dark blood reeking of copper spills onto his hands. The head is separated in a moment and you have to suppress the urge to vomit. \n\n                    He dumps the head into a rattan sack and hands it to you, damp and heavy. \"Tell that Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose.\n                    *goto c26\n\n                  #\"I bet I can talk to them.\"\n                    *set Deception %+3\n                    *set Sadism %-8\n                    *set Cruelty %-7\n                    *set Caution %+6\n                    \"That's dumb,\" he says with a sigh. \"Fine. I'll follow you. They do anything stupid, I'll drop 'em dead.\"\n\n                    You lower your gun and step forward. Pete follows right behind you. A few treacherous steps and soon you've turned the corner. Laserface sits there alone, rises as soon as they notice you, but they never get the chance to ask what you're doing there.\n\n                    Pete does not hesitate - he abandons the idea of stealth immediately. His bullets fire freely, embedding themselves in the steel of the tunnel with a heavy cacophany. You fire too, barely aiming, not even seeing the target until your finger has squeezed the trigger.\n\n                    The fight only lasts a second. Laserface never even got to shoot back. They lay dead beneath an oil lantern and a tent: a makeshift home in this strange place. Blood seeps into the stagnant water and their respective odors mix terribly.\n\n                    \"We did it,\" says Pete with an ecstatic grin. He doesn't hesitate as he plunges the knife into their lifeless neck, doesn't flinch as dark blood reeking of copper spills onto his hands. The head is separated in a moment and you have to suppress the urge to vomit. \n\n                    He dumps the head into a rattan sack and hands it to you, damp and heavy. \"Tell that Corvalla Pete says hi.\"\n\n                    Then he walks away, into the ruins, leaving you with a headless body and a bleeding sack, and a great deal of confusion. At least the job was quick, you suppose.\n                    *goto c26\n\n\n          #\"I'll do it.\"\n            *goto kill-corv\n\n", "8-rodin": "[i]I'm dying. I've known for a while. Those bastards gave me some disease. Wonder if they even know. Doesn't matter, I guess. They'll know when they find my cage empty.[/i]\n\n[i]I'm coming home. I want to die in my village. In your arms. Buried next to our daughter. If I'm lucky maybe I'll become a ghost. Then I'll get to haunt those slaver assholes. But that probably isn't going to happen.[/i]\n\n-An unknown slave who died free, [i]Letters from Rodin[/i]\n\n*set Health 100\nYou wish to head straight back to Fort Washington, but Philly is a big place and it is easy to become sidetracked. This happens when a woman dressed in rags, chafed skin flaking off her wrists and neck, runs up to you. Tears stream down her reddened cheeks, along brown bruises ages old and into stray strands of her dirt-mixed hair.\n\n\"Help!\" she calls out. She runs with surprising speed and is soon upon you, hands gripping your arms as tight as a vise. \"They have my daughter!\" Her eyes are wide with panic, bloodshot and dark.\n*label c1\n*choice\n  *disable_reuse #\"Who has your daughter?\"\n    \"Slavers from Rodin,\" she spits. \"Please, I can't get her back on my own.\"\n    *goto c1\n\n  #\"Sorry, not my problem.\"\n    \"Please!\" she cries, digging her fingers into your arm. \"I barely got out alive. Ineed anyone who can help. Anyone at all.\"\n\n    *goto c2\n\n  #\"I'd be happy to help.\"\n    She releases her clutch on your arms and says, \"Thank you so much. The slavers took her back to their base, Rodin. I barely got out alive. Do you know anyone who could help us?\"\n\n    *goto c2\n\n*label c2\nThis is your first real chance to put these allegiances to the test. Plus, who wouldn't want to slaughter some slavers?\n*choice\n  #Reach out to the Daughters of Liberty\n    *set Cruelty %-12\n    *set Sadism %-12\n    *set Deception %-9\n    *set DoL 1\n    It's not a very long walk back to the Daughters' base. They look at you and your new companion with the same scorn they do all outsiders, but you've grown used to it.\n\n    ReVivienne must have caught word of your return, because she waits for you outside rather than have you dragged down into her basement. She stands before the base's gates, flag flying high, hand on her pistol. She looks at the weepy woman like a threat, as if she could be some kind of spy from Allen.\n\n    \"Who's this?\" she asks.\n\n    She speaks up before you can say anything. \"Angela. My daughter Auria is trapped in Rodin. Your contractor brought me here to ask for your help.\"\n\n    \"If you've been to Rodin you know that we've been fighting them for a long damn time,\" says ReVivienne. \"If we could wipe them out, we would have by now.\" The weight of shame hangs in her voice. Her words tremble with their impotency.\n\n    \"I've spent months inside their base,\" says Angela. Her voice is rigid with steely determination. \"I know their weaknesses.\"\n\n    ReVivienne's eyes perk up at that statement. \"Well, that changes things. That changes everything.\" She turns to some of her warriors and says, \"Ladies, may Columbia bless us all because we're going to war.\"\n    *page_break\n    The Daughters amass their forces in the ruins not far from Rodin. You can see the building from where they make camp, which means the slavers can see your army. It's a somewhat large building made so solid white stone, carved in more ornate ways than many other ancient buildings. A flag rises above it - red, with a spiked black circle in the center.\n\n    ReVivienne brings you and Angela into her tent. You and some of her more experience warriors stand around a folding table where a map of the ruins is displayed. \n\n    \"Angela, you've spent time in Rodin,\" she says. \"What are some of its weaknesses?\"\n\n    She gestures to locations on the map but they mean nothing to you, as you've never been inside Rodin to understand their correlaries. \"The front gate is well defended, but you can overwhelm them if they send out a raiding party or distract their forces. Attack from the rear and draw out their army, then send the rest of you girls in through the front. Or, you could send in a small team. I escaped through a sewer tunnel that runs underneath the sub-basement.\"\n\n    ReVivienne looks to you and says, \"You're on point with this operation. I'll trust your judgment.\"\n    *choice\n      #Knock on the front door\n        *set Caution %-9\n        *set Deception %-8\n        *set Notoriety %+5\n        \"A small group attacks from the rear, then the bulk of our forces break down the front gate,\" you say. \"Direct, effective, tried and true.\"\n\n        \"You heard 'em,\" she says to her warriors. \"Get ready, because it's time to put some slavers in the ground.\"\n\n        Preparations are swift and immediate. The warriors all know what they are doing, having spent years engaging in similar such operations. They hustle around the camp with purpose, leaving you with little to do. So you rest for the first time since you went to the Linc, not more than a few days ago. For once, you get to simply watch, but still you know that you'll be on the front lines.\n\n        Angela comes to you, similarly disposed, and says, \"Thank you,\" with an earnest smile. \"Most people wouldn't have helped me. Some might have even sold me back to the slavers.\"\n        *fake_choice\n          #\"Don't mention it.\"\n          #\"Yeah, I'm pretty great.\"\n          #\"I'm starting to regret my choice.\"\n\n        ReVivienne's voice interrupts before Angela can say anything. \"Time for action,\" she says. \n\n        And with that, the action begins. \n\n        ReVivienne is no armchair leader. In her blatant efforts to increase her prestige among those Daughters who may yet doubt her skill, she leads the assault party herself. You join her, hiding in the ruins with dozens of armed women.\n\n        The world is tense for a while, like the hours leading up to a dust storm. Then the first crack of thunder comes in the form of gunshots. They echo across the ruins, sending your team into action.\n\n        You follow the Daughters, all armed to the teeth and prepared to slaughter slavers. The gate is a few blocks away. No guards are posted along the walls or out front. A few scurry beyond the metal fence, heading toward the rising column of smoke in the distance. They abandon their posts, leaving their front door exposed. \n\n        ReVivienne leads the way and she does not hesitate. Bullets fly free from her rifle as she runs forward, striking nothing but air and metal fencing. A few nearly hit the slavers. They turn to face their new attackers, but some continue rushing toward the attack at the rear.\n        *page_break\n        *if Combat > 55\n          The heat of battle is soon upon you, as are slavers clad in leather and rust. You pump bullet after bullet toward the scattered slavers, putting them down before they ever get the chance to shoot at you. \n\n          The Daughters fire without mercy or hesitation, using their sheer numbers to their advantage. They stand tall like a wall, pressing slowly around the slavers. They crowd around the front steps of the white building, knocking over trashcan fires and stumbling over one another. A few raise their hands in surrender, already injured and out of ammo.\n\n          By ReVivienne's command, the Daughters hold their fire. \"Take them into custody,\" she says. \"I want one team sweeping the rest of the area with the secondary strike team. The rest are with me and the contractor. We've made it to their front door. Now we have to find the slaves.\"\n          *goto inside1\n\n        *elseif Combat > 35\n          *set Health %-15\n          The heat of battle is soon upon you, as are slavers clad in leather and rust. You pump bullet after bullet toward the scattered slavers, but your inexperience causes you to miss. Slavers return fire and a bullet skims your thigh. Just a flesh wound.\n\n          The Daughters fire without mercy or hesitation, using their sheer numbers to their advantage. They stand tall like a wall, pressing slowly around the slavers. They crowd around the front steps of the white building, knocking over trashcan fires and stumbling over one another. A few raise their hands in surrender, already injured and out of ammo.\n\n          By ReVivienne's command, the Daughters hold their fire. \"Take them into custody,\" she says. \"I want one team sweeping the rest of the area with the secondary strike team. The rest are with me and the contractor. We've made it to their front door. Now we have to find the slaves.\"\n          *goto inside1\n\n        *else\n          *set Health %-25\n          The heat of battle is soon upon you, as are slavers clad in leather and rust. You pump bullet after bullet toward the scattered slavers, but your inexperience causes you to miss. Slavers return fire and a bullet skims your thigh. Just a flesh wound.\n\n          The Daughters fire without mercy or hesitation, using their sheer numbers to their advantage. They stand tall like a wall, pressing slowly around the slavers. They crowd around the front steps of the white building, knocking over trashcan fires and stumbling over one another. A few raise their hands in surrender, already injured and out of ammo.\n\n          By ReVivienne's command, the Daughters hold their fire. \"Take them into custody,\" she says. \"I want one team sweeping the rest of the area with the secondary strike team. The rest are with me and the contractor. We've made it to their front door. Now we have to find the slaves.\"\n          *goto inside1\n\n          *label inside1\n          *page_break\n          The first floor is mostly clear. Rodin seems to be empty. It used to be a museum, based on the signs advertising exhibits. Colorful art hangs from the walls. Paintings, mostly, and a lot of them are red. The scent of copper is heavy in the air, so you assume that red paint is some poor slave's blood. Some white statues are splattered with the same red, and many of them have lost limbs. \n\n          Soon you find a back room filled with old, white statues, candles casting light all around it. Chained to them are slaves wearing rags, shackles on their wrists and necks, covered in dirt. There are men, women, and children among them, bruised, huddling together, wide-eyed and trembling.\n\n          \"We're the Daughters of Liberty,\" declares ReVivienne with a smiling face. \"We're here to help.\"\n\n          Fire burns alight in the eyes of those poor slaves, hope they surely had not known in a long while. \n\n          \"Get them out,\" she orders, and they flock to obey.\n\n          Some of the slaves put up a fight, somehow not understanding your purpose there, or fearing reprisals from the slavers. They are the ones who have to held up at the point of a gun, or else they won't move. The rest run with enthusiasm. You think you spot a little dark-skinned girl in the mob of people, shackles clanging heavily, and wonder if it's Aurea.\n\n          They rush into the sunlight, smiling with joy but with panic in their eyes. But the job is not yet done.\n          *goto c4\n\n      #Infiltrate from the sewers\n        *set Caution %+9\n        *set Deception %+8\n        \"A group goes through the sewers and attacks from inside their base,\" you say. \"Once the shooting starts, the rest of your soldiers attack.\"\n\n        \"You heard 'em,\" she says to her warriors. \"Get ready, because it's time to put some slavers in the ground.\"\n\n        Preparations are swift and immediate. The warriors all know what they are doing, having spent years engaging in similar such operations. They hustle around the camp with purpose, leaving you with little to do. So you rest for the first time since you went to the Linc, not more than a few days ago. For once, you get to simply watch, but still you know that you'll be on the front lines.\n\n        Angela comes to you, similarly disposed, and says, \"Thank you,\" with an earnest smile. \"Most people wouldn't have helped me. Some might have even sold me back to the slavers.\"\n        *fake_choice\n          #\"Don't mention it.\"\n          #\"Yeah, I'm pretty great.\"\n          #\"I'm starting to regret my choice.\"\n\n        ReVivienne's voice interrupts before Angela can say anything. \"Time for action,\" she says. \n\n        And with that, the action begins. \n\n        ReVivienne is no armchair leader. In her blatant efforts to increase her prestige among those Daughters who may yet doubt her skill, she leads the stealth party herself. You join her, hiding in the ruins with dozens of armed women.\n\n        She leads you to a manhole cover just as Angela had pointed out on the map. With a strained heave, the warriors lift it. A terrible stench rises from within and it takes all you have not to vomit. One of the younger looking Daughters gets sick. Her vomit pools beside the manhole, but its stench is masked by that other the stagnant shit below.\n\n        One by one they leap into the sewers. You're last to tumble down into the darkness. Black water swirls around your ankles, but your nose is slowly adapting to the sickening stench. \n\n        You wander through the dark tunnels following paths explained to you by Angela. The same paths she used to escape. Soon you see a light quite literally at the end of the tunnel. It comes from a metal grate of thick bars, locked from the outside. \n\n        Beyond the bars is a basement empty of everything but chains, whipping posts, and cages meant for dogs. Some of them even have spikes facing the inside. There's some kind of furnace in the corner, but it doesn't seem like it's burned in a long while.\n\n        ReVivienne doesn't hesitate to shoot the lock. The gate swings open and the Daughters pour in.\n\n        \"This is still a stealth op,\" she reminds everyone. \"We go in quiet, get the slaves someplace safe, kill as many as we can before the assault team. You fuck up, a lot of innocent people die.\"\n\n        And with those inspiring words, you begin the trek up the concrete stairs and into the mouth of the beast.\n        *page_break\n        Your team sneaks silently through the darkened first floor of Rodin. It used to be a museum, based on the signs advertising exhibits. Colorful art hangs from the walls. Paintings, mostly, and a lot of them are red. The scent of copper is heavy in the air, so you assume that red paint is some poor slave's blood. Some white statues are splattered with the same red, and many of them have lost limbs. \n\n        The team disperses throughout the floor, silently knifing patrolling slavers. They fall one by one, totally unaware of the soldiers among them. A few make noise as they fall onto the ground, and some cry out in pain as life slips away, but their compatriots are killed as quickly as they can notice.\n\n        *if Stealth > 45\n\n          *goto c3\n\n        *else\n          *set Health %-10\n          One of the slavers spots you and manages to put a knife in your arm, but the Daughters put him down as soon as they notice. They silently patch the flesh wound, making you wince with each stitch, but you don't make a noise.\n\n          *goto c3\n          *label c3\n          Soon you find a back room filled with old, white statues, candles casting light all around it. Chained to them are slaves wearing rags, shackles on their wrists and necks, covered in dirt. There are men, women, and children among them, bruised, huddling together, wide-eyed and trembling.\n\n          \"We're the Daughters of Liberty,\" declares ReVivienne with a smiling face. \"We're here to help.\"\n\n          Fire burns alight in the eyes of those poor slaves, hope they surely had not known in a long while. \n\n          \"Get them out through the sewers,\" she orders, and they flock to obey.\n\n          Some of the slaves put up a fight, somehow not understanding your purpose there, or fearing reprisals from the slavers. They are the ones who have to held up at the point of a gun, or else they won't move. The rest run with enthusiasm. You think you spot a little dark-skinned girl in the mob of people, shackles clanging heavily, and wonder if it's Aurea.\n\n          They rush into the sewers, smiling with joy but with panic in their eyes. But the job is not yet done.\n          *goto c4\n\n        *label c4\n        *page_break\n        There are two staircases leading up toward the second floor. One of two things have happened, according to ReVivienne: the slavers upstairs have managed to not notice what happened on the their brothers, or they heard everything and fortified their position. Smart money is on the latter.\n        *choice\n          #Run in and open fire\n            *set Caution %-8\n            *set Sadism %+6\n            You rush up one staircase and ReVivienne ascends another, followed by Daughters. \n\n            The slavers are waiting in the wide, opened room of the third floor. Fallen statues become makeshift barricades where walls had been torn down in the decades since the slavers occupied Rodin. Chains lie on the floor, as does rotten food and a mess of empty bullet shells.\n\n            *label f1\n            The fighting starts immediately. Slavers fire from cover and the Daughters fire back, volley after volley, inch by inch. \n\n            *if Combat > 55\n              You pump lead at them, firing with precision despite the ear-shattering cacophony of their gunfire. Blood soaks the floor and splatters across the statues being used as cover, and coats the walls. You take shelter behind a strange abstract piece made of twisted steel, shapeless but thick. Bullets riddle it and you return fire, killing and injuring slavers.\n\n              Slavers fall like flies, unable to reply to your gunshots with any ease or effectiveness. You step over their armored bodies and press forward, blood sticking to your boot. The floor is cleared in mere moments. \n\n              *goto c5\n\n              *label c5\n              The Daughters round up the injured slavers, clearing out every section of the floor and piling up bodies. The whole place stinks of blood. The bound slavers shout curses at the Daughters. Some struggle impotently against their bonds.\n\n              \"Hmm, how should we put 'em down?\" asks ReVivienne.\n\n              \"Wait!\" one of them shouts. \"Allen's Republic hired us! They wanted us to stir up trouble in Philly!\"\n\n              ReVivienne shoots him in the head. He falls dead. \"No shit,\" she says to the others. Then she turns to you. \"How should we execute them?\"\n              *choice\n                #Hanging\n                  ReVivienne takes your advice with a closed-lip smile. \"Efficient.\" \n\n                  Her warriors tie nooses from thick hemp ropes and tie them to the columns on the third floor. The slavers try to fight against their captors, but their hands are bound and eyes are blindfolded. The nooses go around their necks and they are kicked unceremoniously out the window.\n\n                  They dance a while on nothing but air, in full view the slaves they had so long oppressed. \n\n                  *label b1\n                  \"We're gonna burn this place,\" says ReVivienne as you and her Daughters watch from the execution rooftop. \"Then we're going to rehabilitate the freed prisoners and find villages to take them in. In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n                  *choice\n                    #\"Yes, ma'am.\"\n                      She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                      *goto ending1\n                    #\"What's the big deal with the shipment?\"\n                      \"We don't know yet, but we're gonna find out,\" she says. \"Now get to work.\"\n                      *goto ending1\n\n                    #\"No, don't thank me or anything.\"\n                      \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                      *goto ending1\n\n                #Crucifixion\n                  *set Cruelty %+20\n                  ReVivienne takes your advice with a closed-lip smile. \"A punishment fitting their evil.\"\n\n                  Her warriors craft mighty crosses from stray planks of wood, then force the slavers onto them. They are nailed mercilessly to the arms of the cross. Their screams echo across the desert and their former-captives cheer at their pain. They are then pulled upward and made to hang from their nailed hands, choking on their own breath. They will not die for many hours, and they will suffer all the while.\n\n                  *goto b1\n\n                #Firing squad\n                  ReVivienne takes your advice with a closed-lip smile. \"Efficient.\"\n\n                  The slavers are lined up in front of Rodin, blindfolded and protesting helplessly. A mere volley is all it takes, and they all fall down. Some are not yet quite dead, but nearly there. They are left to bleed out, cold and alone amid the bodies of their brothers, in full view of those they had oppressed so long.\n\n                  *goto b1\n\n                #Lock them away, but let them live\n                  \"I don't like that,\" says ReVivienne. \"I don't like that one bit.\"\n\n                  *if Persuasion > 55\n                    \"You want to show Philly that you're powerful, don't you? What's more powerful that imprisoning your enemies, locking them away to be mocked and detested, not even allowed the mercy of death?\"\n\n                    She mulls this over for a moment, then decides she likes it.\n\n                    \"Fine,\" she says. \"We'll lock them up someplace. Maybe build a dungeon somewhere. We could always use a dungeon. But we're gonna burn this place down. Then we're going to rehabilitate the freed prisoners and find villages to take them in. In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n                    *choice\n                      #\"Yes, ma'am.\"\n                        She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                        *goto ending1\n                      #\"What's the big deal with the shipment?\"\n                        \"We don't know yet, but we're gonna find out,\" she says. \"Now get to work.\"\n                        *goto ending1\n\n                      #\"No, don't thank me or anything.\"\n                        \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                        *goto ending1\n\n                  *else\n                    \"Come on, show some mercy.\"\n\n                    \"Slavers don't get mercy. And just for making the suggestion, you don't get to watch the execution. And you don't get to watch us burn this place down, or help us rehabilitate the freed prisoners and find villages to take them in. In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n                    *choice\n                      #\"Yes, ma'am.\"\n                        She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                        *goto ending1\n                      #\"What's the big deal with the shipment?\"\n                        \"We don't know yet, but we're gonna find out,\" she says. \"Now get to work.\"\n                        *goto ending1\n\n                      #\"No, don't thank me or anything.\"\n                        \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                        *goto ending1\n\n            *elseif Combat > 35\n              *set Health %-15\n              You fire wildly at them, panicked by the noise and confusion. Blood soaks the floor and splatters across the statues being used as cover, and coats the walls. You take shelter behind a strange abstract piece made of twisted steel, shapeless but thick. Bullets riddle it and you return fire, killing and injuring slavers.\n\n              Your cover does little to protect you, however, and a bullet strikes your foot. You press on in spite of the pain, step over the slavers' armored bodies and press forward, blood sticking to your boot. The floor is cleared in mere moments. \n\n              *goto c5\n\n            *else\n              *set Health %-25\n              You fire wildly at them, panicked by the noise and confusion. Blood soaks the floor and splatters across the statues being used as cover, and coats the walls. You take shelter behind a strange abstract piece made of twisted steel, shapeless but thick. Bullets riddle it and you return fire, killing and injuring slavers.\n\n              Your cover does little to protect you, however, and a bullet strikes your foot. You press on in spite of the pain, step over the slavers' armored bodies and press forward, blood sticking to your boot. The floor is cleared in mere moments. \n\n              *goto c5\n\n          #Sneak up the steps and hope they don't notice you\n            *set Caution %+2\n            *set Sadism %+3\n            You take slow steps up the stairs and draw the knife from your boot. The Daughters all draw blades and step quietly behind you, escept those who follow ReVivienne up the other staircase.\n\n            The slavers are waiting in the wide, opened room of the third floor. Fallen statues become makeshift barricades where walls had been torn down in the decades since the slavers occupied Rodin. Chains lie on the floor, as does rotten food and a mess of empty bullet shells.\n\n            *if Stealth > 55\n              You move silently through the floor, hiding behind cover and timing your movements so that you remain unseen. The Daughters do the same, slitting throats and slicing up chests, and hiding those bodies where they will not be seen.\n\n              \"Slit?\" calls out one of the slavers, having lost track of one of his friends. He raises his rifle and turns around, suddenly suspicious.\n\n              You put a knife in his back before he can make another move, then drag his body behind a decapitated statue.\n\n              The other slavers huddle together, realizing they are the last. This is when ReVivienne steps out into the light. The Daughters follow, rifles raised. You step forward over the slavers' armored bodies, blood sticking to your boot. The floor is cleared in mere moments. \n\n              *goto c5\n\n            *elseif Stealth > 35\n              *set Health %-15\n              A single misstep is all it takes. Your heavy foot causes the wood beneath you to creak, and suddenly the highwaymen spot you. \n\n              *goto f1\n\n            *else\n              *set Health %-25\n              A single misstep is all it takes. Your heavy foot causes the wood beneath you to creak, and suddenly the highwaymen spot you. \n\n              *goto f1\n\n          #Convince them to surrender\n            *set Caution %+8\n            *set Sadism %-6\n            You walk up the steps alone. Nobody else is foolish enough to follow you, and you can hardly blame them. ReVivienne takes your arm before you make it up the staircase and asks, \"What's your endgame here?\"\n            *choice\n              #\"I tell them to leave, you let them go. They won't be Philly's problem anymore.\"\n                *set Cruelty %-10\n                *set Sadism %-8\n                *set Deception %-10\n                *set c1 1\n                *goto con1\n\n              #\"I tell them to leave, you kill them on their way out.\"\n                *set Cruelty %+10\n                *set Sadism %+8\n                *set Deception %+10\n                *label con1\n                She nods and let's go of your arm, and you climb the rest of those stairs to face your fate, hands above your head and gun holstered. \n\n                The slavers are waiting in the wide, opened room of the third floor. Fallen statues become makeshift barricades where walls had been torn down in the decades since the slavers occupied Rodin. Chains lie on the floor, as does rotten food and a mess of empty bullet shells.\n\n                \"Don't shoot!\" you shout. \"I'm here to negotiate.\"\n\n                \"You got thirty seconds before we shoot,\" calls out a voice, but you cannot see where it comes from.\n                *choice\n                  #\"You might as well surrender now and keep your lives. Leave Philly and we won't follow you.\"\n                    *if Persuasion > 55\n                      *goto per-work\n\n                    *elseif Deception \u003c 50\n                      *goto per-work\n\n                    *else\n                      *goto per-fail\n\n                  #\"You can either come out willingly, or I can drag you out. If I have to exert myself, you're going to die.\"\n                    *if Persuasion > 55\n                      *goto per-work\n\n                    *elseif Deception > 50\n                      *goto per-work\n\n                    *elseif Villain > 1\n                      *goto per-work\n\n                    *else\n                      *goto per-fail\n\n                  #\"Your product has been liberated. Even if you beat us back, how long do you think you'll last with nothing to sell? Leave now and we won't chase you.\"\n                    *if Persuasion > 55\n                      *goto per-work\n\n                    *elseif Scavenger > 0\n                      *goto per-work\n\n                    *elseif Notoriety > 30\n                      *label per-work\n                      There's a long silence for a while, and it's eventually broken by the slaver saying, \"Damnit, fine. Come on boys, we'll go make a profit elsewhere.\"\n\n                      The slavers emerge from cover, slowly, placing their weapons on the floor. They're a dirty bunch wearing the same rusty armor that highwaymen do, and they glare at you with hatred in their eyes.\n\n                      Their apparent leader steps forward - the man you had spoken to. His eyes burn red and his teeth are twisted and yellow. \"You should know, we were getting payments from Allen's Republic. They wanted us to mess up Philly for 'em. When it comes to war, kill a wole lotta them for me.\"\n\n                      *if c1 = 1\n                        *set Notoriety %-4\n                        To your surprise, ReVivienne allows the slavers to leave. The Daughters don't seem very happy about it, but they don't speak up. They simply keep watch over the retreating slavers as they flee south, and wonder aloud if they'll make it passed Eagle territory alive.\n\n                        *label a1\n                        From there, they empty the building of any valuable loot and douse it in gasoline. You and your army and the slaves, including Angela and her daughter Aurea, watch as Rodin burns down to the foundation.\n\n                        \"We'll help them build new lives in villages around Philly,\" says ReVivienne. \"In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n                        *choice\n                          #\"Yes, ma'am.\"\n                            She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                            *goto ending1\n                          #\"What's the big deal with the shipment?\"\n                            \"We don't know yet, but we're gonna find out,\" she says. \"Now get to work.\"\n                            *goto ending1\n\n                          #\"No, don't thank me or anything.\"\n                            \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                            *goto ending1\n                            *label ending1\n                            *page_break\n                            \"Wait!\" shouts a familiar feminine voice. Angela. She's followed you down the road, holding her little girl with curly hair by the hand. \"I just wanted to thank you. Aurea and I are going to be in Black Vein for a while, since they're looking for settlers. If you're ever in the area, stop by so I can repay you for everything you've done.\"\n\n                            You cannot shake the feeling that in these last few hours, you did something meaningful. When was the last time that happened? Then you realized that it has been happening a lot recently, and increasingly. How many more meaningful things will you do?\n                            *finish\n\n                      *else\n                        *set Notoriety %+9\n                        The slaves are slaugtered as soon as they step downstairs. Blood runs down the steps and bodies pile at the bottom. A few try and fight back, but they're unarmed and unable to repel bullets with mere fists.\n\n                        *goto a1\n\n                    *else\n                      *goto per-fail\n\n                      *label per-fail\n                      *set Notoriety %-4\n                      \"Yeah, on behalf of Rodin I'd like to thank you for the offer,\" says the voice, stilling hidden behind cover. \"Unfortunately it just isn't in our favor, and we would prefer violence.\"\n\n                      They open fire on you, forcing you to retreat back down the stairs. The gunshots fade as soon as they realize you're no longer there. The Daughters glare at you for wasting their element of surprise, but hold their tongues.\n\n                      \"Now we do things the right way,\" says ReVivienne.\n\n                      You rush up one staircase and ReVivienne ascends another, followed by Daughters. \n\n                      *goto f1\n\n          *if (Bomber > 0) #Head down to the basement and detonate the furnace\n            *set Cruelty %+2\n            *set Sadism %+6\n            *set Caution %-6\n            You and the Daughters work fast, streaming a trail of gasoline from the furnace all the way outside. You coat it extra thick along the stairs to make sure the flame can travel down it, then leave before the smell becomes too thick. \n\n            Standing outside of Rodin at the edge of the gas trail, ReVivienne smiles and drops an open lighter on the trail.\n\n            Rodin explodes in a burst of flame and smoke, firing upward them collapsing in on itself. The slaves cheer. Some of them weep with joy and curse the slavers whose bodies fall from the burning ruins.\n\n            *label o1\n            \"We actually have intel indicating that Allen's Republic has been fueling the slavers lately, trying to cause some chaos even if that means ruining people's live,\" says ReVivienne. She looks over the crowd of rescued slaves and smiles softly. \"We'll help them build new lives in villages around Philly. In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n            *choice\n              #\"Yes, ma'am.\"\n                She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                *goto ending1\n              #\"What's the big deal with the shipment?\"\n                \"We don't know yet, but we're gonna find out,\" she says. \"Now get to work.\"\n                *goto ending1\n\n              #\"No, don't thank me or anything.\"\n                \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                *goto ending1\n\n          *if (Poisoner > 0) #Head down to the basement and rig the furnace to expel toxic gas\n            *set Cruelty %+8\n            *set Sadism %+6\n            *set Deception %+4\n            Furnaces make smoke. Smoke cannot be breathed. So, you toss some gas onto the coal in the furnace and rig the vents as open as they go. Then, in a fit of pure inspiration, you link the furnace vents to those in the wall using some old tubing.\n\n            \"We should get out of here,\" says one of the Daughters.\n\n            You rush out of Rodin as smoke starts to pour out the windows in thick, black columns. The slaves cheer. Some of them weep with joy and curse the slavers whose screams fill the air. They die, no doubt, in a choking, fitfull panic. \n            *goto o1\n\n          *if (Mechanic > 0) #Destroy the stairs leading up to the third floor - they'll starve or surrender\n            *set Cruelty %+8\n            *set Sadism %+6\n            *set Caution %+6\n            All it takes is a few swings of an axe, and the stairs are unusable. For safe measure, the Daughters tear up the wooden floors below so that any jump would end with a splintery death. Then they take up position around Rodin, just in case some of the slavers manage to escape. \n\n            ReVivienne ensures the freed slaves that their oppressors will have a slow, painful death, and they would eventually burn the building. They seem content with this, though a few call for their heads. Either way, your job is done.\n\n            *goto o1\n\n  #Reach out to Allen's Republic\n    *set Cruelty %-12\n    *set Sadism %-12\n    *set Deception %-9\n    *set Allen 1\n    You do not make it back to Fort Washington until the next day. Traveling with an injured and exhausted woman takes longer than you would have hoped, but it does not matter once you get there.\n\n    General Tappon oversees drills in the center of the fort. Soldiers march in formation while others patrol and still others practice firing on targets. There are far more soldiers than you met before. Easily more than the Daughters have. \n\n    Tappon turns and faces you, a practiced smile on her face. \"Who's this?\" she asks.\n\n    She speaks up before you can say anything. \"Angela. My daughter Auria is trapped in Rodin. Your contractor brought me here to ask for your help.\"\n\n    She seems to mull this over for a moment, then says, \"We haven't got all our eggs in the basket yet. Still haven't made regional allies or begun goodwill missions. We might not be able to attack such a fortified base. Even if we did, my orders are to hold this base.\" The weight of shame hangs in her voice. Her words tremble with their impotency.\n\n    \"I've spent months inside their base,\" says Angela. Her voice is rigid with steely determination. \"I know their weaknesses. You have a real chance to free slaves and kill monsters. Isn't that what you want?\"\n\n    Tappon's eyes perk up. \"Well, you've made some good points.\" She turns to the soldiers doing drills and shouts, \"Line up. We've got ourselves a mission.\"\n    *page_break\n    The Republic amasses its forces in the ruins not far from Rodin. You can see the building from where they make camp, which means the slavers can see your army. It's a somewhat large building made so solid white stone, carved in more ornate ways than many other ancient buildings. A flag rises above it - red, with a spiked black circle in the center.\n\n    General Tappon brings you and Angela into her tent. You and some of her more experience soldiers stand around a folding table where a map of the ruins is displayed. \n\n    \"Angela, you've spent time in Rodin,\" she says. \"What are some of its weaknesses?\"\n\n    She gestures to locations on the map but they mean nothing to you, as you've never been inside Rodin to understand their correlaries. \"The front gate is well defended, but you can overwhelm them if they send out a raiding party or distract their forces. Attack from the rear and draw out their army, then send the rest of you girls in through the front. Or, you could send in a small team. I escaped through a sewer tunnel that runs underneath the sub-basement.\"\n\n    Tappon looks to you and says, \"You're on point with this operation. I'll trust your judgment.\"\n    *choice\n      #Knock on the front door\n        *set Caution %-9\n        *set Deception %-8\n        *set Notoriety %+5\n        \"A small group attacks from the rear, then the bulk of our forces break down the front gate,\" you say. \"Direct, effective, tried and true.\"\n\n        \"You heard 'em,\" she says to her soldiers. \"Get ready, because it's time to put some slavers in the ground.\"\n\n        Preparations are swift and immediate. The soldiers all know what they are doing, having spent years engaging in similar such operations. They hustle around the camp with purpose, leaving you with little to do. So you rest for the first time since you went to the Linc, not more than a few days ago. For once, you get to simply watch, but still you know that you'll be on the front lines.\n\n        Angela comes to you, similarly disposed, and says, \"Thank you,\" with an earnest smile. \"Most people wouldn't have helped me. Some might have even sold me back to the slavers.\"\n        *fake_choice\n          #\"Don't mention it.\"\n          #\"Yeah, I'm pretty great.\"\n          #\"I'm starting to regret my choice.\"\n\n        The General's voice interrupts before Angela can say anything. \"Time for action,\" she says. \n\n        And with that, the action begins. \n\n        Tappon is no armchair general - she leads the assault party herself. You join her, hiding in the ruins with dozens of armed women.\n\n        The world is tense for a while, like the hours leading up to a dust storm. Then the first crack of thunder comes in the form of gunshots. They echo across the ruins, sending your team into action.\n\n        You follow the troops, all armed to the teeth and prepared to slaughter slavers. The gate is a few blocks away. No guards are posted along the walls or out front. A few scurry beyond the metal fence, heading toward the rising column of smoke in the distance. They abandon their posts, leaving their front door exposed. \n\n        Tappon leads the way and she does not hesitate. Bullets fly free from her rifle as she runs forward, striking nothing but air and metal fencing. A few nearly hit the slavers. They turn to face their new attackers, but some continue rushing toward the attack at the rear.\n        *page_break\n        *if Combat > 55\n          The heat of battle is soon upon you, as are slavers clad in leather and rust. You pump bullet after bullet toward the scattered slavers, putting them down before they ever get the chance to shoot at you. \n\n          The soldiers fire without mercy or hesitation, using their sheer numbers to their advantage. They stand tall like a wall, pressing slowly around the slavers. They crowd around the front steps of the white building, knocking over trashcan fires and stumbling over one another. A few raise their hands in surrender, already injured and out of ammo.\n\n          By Tappon's command, the troops hold their fire. \"Take them into custody,\" she says. \"I want one team sweeping the rest of the area with the secondary strike team. The rest are with me and the contractor. We've made it to their front door. Now we have to find the slaves.\"\n          *goto inside2\n\n        *elseif Combat > 35\n          *set Health %-15\n          The heat of battle is soon upon you, as are slavers clad in leather and rust. You pump bullet after bullet toward the scattered slavers, but your inexperience causes you to miss. Slavers return fire and a bullet skims your thigh. Just a flesh wound.\n\n          The troops fire without mercy or hesitation, using their sheer numbers to their advantage. They stand tall like a wall, pressing slowly around the slavers. They crowd around the front steps of the white building, knocking over trashcan fires and stumbling over one another. A few raise their hands in surrender, already injured and out of ammo.\n\n          By Tappon's command, the troops hold their fire. \"Take them into custody,\" she says. \"I want one team sweeping the rest of the area with the secondary strike team. The rest are with me and the contractor. We've made it to their front door. Now we have to find the slaves.\"\n          *goto inside2\n\n        *else\n          *set Health %-25\n          The heat of battle is soon upon you, as are slavers clad in leather and rust. You pump bullet after bullet toward the scattered slavers, but your inexperience causes you to miss. Slavers return fire and a bullet skims your thigh. Just a flesh wound.\n\n          The troops fire without mercy or hesitation, using their sheer numbers to their advantage. They stand tall like a wall, pressing slowly around the slavers. They crowd around the front steps of the white building, knocking over trashcan fires and stumbling over one another. A few raise their hands in surrender, already injured and out of ammo.\n\n          By Tappon's command, the soldiers hold their fire. \"Take them into custody,\" she says. \"I want one team sweeping the rest of the area with the secondary strike team. The rest are with me and the contractor. We've made it to their front door. Now we have to find the slaves.\"\n          *goto inside2\n\n          *label inside2\n          *page_break\n          The first floor is mostly clear. Rodin seems to be empty. It used to be a museum, based on the signs advertising exhibits. Colorful art hangs from the walls. Paintings, mostly, and a lot of them are red. The scent of copper is heavy in the air, so you assume that red paint is some poor slave's blood. Some white statues are splattered with the same red, and many of them have lost limbs. \n\n          Soon you find a back room filled with old, white statues, candles casting light all around it. Chained to them are slaves wearing rags, shackles on their wrists and necks, covered in dirt. There are men, women, and children among them, bruised, huddling together, wide-eyed and trembling.\n\n          \"We're Allen's Republic,\" declares Tappon with a smiling face. \"We're here to help.\"\n\n          Fire burns alight in the eyes of those poor slaves, hope they surely had not known in a long while. \n\n          \"Get them out,\" she orders, and they flock to obey.\n\n          Some of the slaves put up a fight, somehow not understanding your purpose there, or fearing reprisals from the slavers. They are the ones who have to held up at the point of a gun, or else they won't move. The rest run with enthusiasm. You think you spot a little dark-skinned girl in the mob of people, shackles clanging heavily, and wonder if it's Aurea.\n\n          They rush into the sunlight, smiling with joy but with panic in their eyes. But the job is not yet done.\n          *goto c44\n\n      #Infiltrate from the sewers\n        *set Caution %+9\n        *set Deception %+8\n        \"A group goes through the sewers and attacks from inside their base,\" you say. \"Once the sho
