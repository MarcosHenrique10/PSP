ment, though not the chamber you were held in some weeks ago. Otherwise there would be a massive, cracked bell waiting for you. Instead, you see a number of steel doors, lining the walls in each direction.\n\n                \"Which one is it?\" asks one of the warriors. \n\n                \"Just pick one,\" says another. \n\n                A few more warriors voice their opinions before silence overcomes them. Then the sound of gunfire echoes out, a buzzer rings, and the door to the stairs closes of its own force, somehow drawn shut electronically.\n\n                \"Shit,\" whispers Olivia, raising her rifle. \"It's a damn trap.\"\n\n                One of the doors slides open. The entire army, twenty or so soldiers, turns as one to face it. They're calm enough to hold their fire as members of the secondary assault team pour through, recognized by their jerseys and the green Eagle sigil. They rush into the room, just as surprised as you were, cursing when they realize that they too have fallen into a trap.\n\n                *goto bc\n\n  *disable_reuse #\"Hold off on that. I still want to give diplomacy a chance.\"\n    *set Cruelty %-10\n    *set Sadism %-10\n    Tappon shrugs. \"That's your mistake, I guess. Walk on up to the front gate, see if they have anything to say.\"\n\n    That's exactly what you do. You head on up to the front gate, Olivia by your side, along with a dozen Republic. There are warriors patrolling the perimeter of the fence. They yelp and raise their rifles when they notice you.\n\n    \"We've come to talk!\" you shout, loudly enough for them to hear, careful to keep a fair distance. \"Send out Washington.\"\n\n    \"Not a chance,\" spits one of the warriors. \"Now back up before we shoot.\" There's something odd in her voice. It trembles with fear.\n    *choice\n      #\"There's still a chance for peace.\"\n        *if Persuasion > 35\n          *goto pers-win1\n        *else\n          *goto pers-fail\n\n      #\"Peace can no longer be found, but that doesn't mean you have to die.\"\n        *if Persuasion > 35\n          *goto pers-win1\n        *else\n          *goto pers-fail\n\n      #\"Are these assholes really worth dying for?\"\n        *if Persuasion > 35\n          *goto pers-win1\n        *else\n          *goto pers-fail\n\n      #\"Here's the deal. Whoever brings me Washington gets to live.\"\n        *if Persuasion > 35\n          *label pers-win1\n          \"What the hell is this?\" asks a voice you recognize. Then she appears. ReVivienne. Her armor is rusty and her braids are loose, tangled. \"Goddamnit,\" she says upon seeing you.\n\n          \"We need to talk,\" you say, abandoning the lie you were feeding to the warriors.\n\n          \"You sided with foreign invaders,\" she spits. \"What do we have to talk about?\"\n\n          You choose your next words carefully, knowing that they will determine the fate of the Daughters, and of Philly.\n          *choice\n            #Peace accords\n              *if Persuasion > 85\n                \"All we want is peace,\" you say. \"No more highwaymen and slavers and militias hanging people on crosses. No more random violence claiming hundreds of lives, making people too afraid to leave their villages. Imagine it. But you're standing in the way of it. Why? Because you're too proud. Too proud to recognize that the entire wasteland is united against you. So, here's my proposal. Lay down your arms, agree to join Allen's Republic, and continue to protect your people.\"\n\n                You can see it in her eyes. She knows that you're right. She knows that this is a losing fight. \"And what's the alternative?\"\n\n                \"War. The exact thing we're trying to prevent.\"\n\n                *label dip-win\n                *set Notoriety %+12\n                She looks around at her compound, at the guards at her sides, at the fence dividing you two. \"Not a very climactic battle.\"\n\n                \"Should I take that to mean you'll join us in the sun?\" you ask.\n\n                ReVivienne nods, unmistakeable tears in her eyes. \"Yes,\" she says, at the edge of her base, with no more than a dozen witnesses. \"The Daughters of Liberty surrender.\"\n\n                You've won. Philly is yours.\n                *label peace-win\n                *page_break Epilogue \n                *set peace 1\n                It's strange to see peace in your time, but you get to watch as Tappon runs Allen's Republic's flag up the Temple Bell's pole. And then you get to see the Daughters saluting it, before being carted off to be imprisoned, for a time. \n\n                As it turns out, civilization does not come overnight, and it would be years before all the highwaymen and slavers and mutant monsters are finally rooted out of the ruins. But Philly perseveres, and it is not long before the elected Governor Echo uses her keen skill in diplomacy to bring it into Allen's national politics.\n\n                It will take her entire lifetime, but she is instrumental in the promotion of Philly from colony, to state, complete with voting rights for all its citizens. \n\n                This is how your people joins a Table of Nations as great as those before the world collapsed on itself. Peoples such as Metropotamia, the Great Tribes of the Plain, the Republic of Kwik-Stop, and the Crescent Republic would rise from the ashes, proving that civilization, in its many forms, had not died when the world did.\n                *page_break\n                Congratulations on completing \"The Black Vein\" and changing the face of the wasteland forever!\n\n                You met many fascinating factions on your quest. Please feel free to take one final look at their fate before you conclude this playthrough.\n                *goto final-sum1\n\n              *else\n                *goto fail2\n\n            #Your surrender\n              *if Persuasion > 85\n                \"All we want is for you to join us, and for peace to rule Philly,\" you say. \"No more highwaymen and slavers and militias hanging people on crosses. No more random violence claiming hundreds of lives, making people too afraid to leave their villages. Imagine it. But you're standing in the way of it. Why? Because you're too proud. Too proud to recognize that the entire wasteland is united against you. So, here's my proposal. Lay down your arms, agree to join Allen's Republic, and continue to protect your people.\"\n\n                You can see it in her eyes. She knows that you're right. She knows that this is a losing fight. \"And what's the alternative?\"\n\n                \"War. The exact thing we're trying to prevent.\"\n\n                *goto dip-win\n\n              *else\n                *goto fail2\n\n            #Your extinction \n              *if Persuasion > 85\n                \"All we want is peace,\" you say. \"No more highwaymen and slavers and militias hanging people on crosses. No more random violence claiming hundreds of lives, making people too afraid to leave their villages. Imagine it. But you're standing in the way of it. Why? Because you're too proud. Too proud to recognize that the entire wasteland is united against you. So, here's my proposal. Lay down your arms, agree to join Allen's Republic, and continue to protect your people.\"\n\n                You can see it in her eyes. She knows that you're right. She knows that this is a losing fight. \"And what's the alternative?\"\n\n                \"Your complete and utter extinction. The exact thing we're trying to prevent.\"\n\n                *goto dip-win\n\n              *else\n                *label fail2\n                ReVivienne breathes in sharply and then says, \"Fuck off.\" Without another word, she turns away, and her guards raise their rifles.\n\n                \"Come on, this clearly isn't working,\" says Olivia, taking your arm. \"Let's head back to camp.\n                *page_break\n                \"Didn't work, huh?\" asks ReVivienne. \"Oh well. Now tell me, do you wanna run with the Eagles on the secondary position, or the the civilian militias with the infiltration units.\"\n                *goto a6\n        *else\n          *label pers-fail\n          \"How about this,\" says the warrior. \"You go to hell.\"\n\n          \"That the best comeback you got?\" snaps one of your soldiers.\n\n          \"Come on, this clearly isn't working,\" says Olivia, taking your arm. \"Let's head back to camp.\n          *page_break\n          \"Didn't work, huh?\" asks ReVivienne. \"Oh well. Now tell me, do you wanna run with the Eagles on the secondary position, or the the civilian militias with the infiltration units.\"\n          *goto a6", "2-dutchmill": "*set Health 100\n[i]Of the many peoples who inherited the post-nuclear world, the most readily equipped for it were the Amish. Most historians are in agreement that the apocalypse had little to no effect on their secluded, technophobic communities. Their lack of reliance of modern technology, their sense of community, and their steadfast faith in a higher power is what allowed them to maintain such stable villages while the rest of the world fell apart. In fact, it appears that there was only one major change to their culture: they got guns.[/i]\n\n-Olivia Buckshot, [i]The New Dutch[/i]\n\nThe road and buildings deteriorate as you find yourself farther west. The ruins of the city and its redbrick give way to the ruins of suburbs. Destroyed homes rest separate from one another, though some still stand. It was not the bombs that destroyed these, but the fall of society and the rise of highwaymen that came immediately after.\n\nYou keep your eyes peeled for any highwaymen who might be calling this neighborhood their home, but there's no sign of them. No smoke, no fire, no banners, no bodies. Nothing to indicate a highwaymen presence.\n\nThen a sharp howl rips across the ruins, followed by the distant noise of padding feet. You turn back and see them coming - a horde of four-footed beasts, some the size of men, covered in fur. Perhaps they were once dogs, but are now hardly recognizeable. They've been twisted and warped by generations of radiation. Many have patches in their fur or extra ears, and some even have additional eyes growing from the sides of their snouts.\n\nAnd they're rushing toward you, fueled by the smell of fresh meat.\n*choice\n  #Slay them\n    *set Cruelty %+5\n    *set Sadism %+5\n    *set Caution %-8\n    *if Combat > 65\n      You open fire on the wolves, using your distinct skills in battle to target the largest wolves, which also tend to be the ones with the most distinct mutations. The worst have multiple vestigial limbs and even facial features like eyes and teeth jutting out.\n\n      They rush toward you, falling over their wounded brothers and sisters, and you stand your ground. The wave of wolves turns into a trickle as your ears ring and your shoulder rattles from the gun's recoil. Then you realize that you aren't the only one shooting. \n\n      As the wolves get closer, you step back, firing all the while. Then they're upon you - snapping jaws and vicious claws. \n\n      *goto run1\n\n    *else\n       You fire wildly into the mob of wolves, knowing that you don't need to aim to hit them. Unfortunately, those hits are not lethal and hardly damaging, and few of them are impeded. You try to target the largest wolves, which also tend to be the ones with the most distinct mutations. The worst have multiple vestigial limbs and even facial features like eyes and teeth jutting out.\n\n      They rush toward you, falling over their wounded brothers and sisters, and you stand your ground. The wave of wolves turns into a trickle as your ears ring and your shoulder rattles from the gun's recoil. Then you realize that you aren't the only one shooting. \n\n      As the wolves get closer, you step back, firing all the while. Then they're upon you - snapping jaws and vicious claws. \n\n      *goto run1\n\n  #Run away\n    *set Cruelty %-5\n    *set Sadism %-5\n    *set Caution %+8\n    *label run1\n    The ground flies beneath your feet as they propel you away from the rabid wolves with their snapping jaws and fierce claws. The whole world seems to fade away as the wind brushes you face. The only thing that exists is you, and that damned pack of wolves. \n\n    Then you spot a makeshift fence, wood and steel, barbed to keep out intruders. Your heart feels like it's going to burst and sweat drips down your arms as cool breathes sting your lungs, but that fence remains a clear fixture in your mind, because a fence means a town, and a town is safe.\n\n    A shot rings out and you instinctively duck and cover your face, but don't stop running. You can't stop running. The fence is so close. There are houses behind it.\n\n    Another shot rings in your ear, followed by the pitiful wail of a downed wolf. You don't dare glance back. \n\n    A group of men appears before the fence, clad in black, with thick beards. They fire their rifles at the wolves at your heels, trying to protect you for some reason.\n\n    You're out of breath by the time you make it to the gate, and you nearly keel over in exhaustion as those men fire at the wolves. The wolves are wise enough to turn back, carrying their limping injured and abandoning their dead.\n\n*label c1\nThe bearded men look at you like a father looks at a child. That's when you notice the children - and the women - by the homes and barns, going about their day as if nothing is happening. They all wear black clothing, dresses for women and slacks for men, as if they have somewhere formal to be.\n\n\"You must be more careful of the wolves,\" says one of the men. \"Welcome to Dutch Mill. Would ya stay a while?\"\n*choice\n  #Yes\n    \"Glad to hear it!\" he says in a thick, peculiar accent. Then he says something to his fellows in a harsh, angry-sounding language. They run off to obey, but the smile never leaves his face. He turns back to you and says, \"The name's Dwide Shrude. My dearest Noel is making supper now, you'll join us!\"\n    *goto c2\n  #No\n    \"Nonsense!\" he says in a thick, peculiar accent. Then he says something to his fellows in a harsh, angry-sounding language. They run off to obey, but the smile never leaves his face. He turns back to you and says, \"The name's Dwide Shrude. My dearest Noel is making supper now, you'll join us!\"\n    *goto c2\n*label c2\n\nThe village is surprisingly large, and there isn't a mill in sight despite the name. The homes and barns and ample farmland are all fenced in, with a well at the center of the town. Aside from the sheer size of the village, the first thing you notice is the clothing. Clearly post-war crafts, but decidedly ancient looking. You don't recall ever seeing women wearing dresses elsewhere in the wasteland.\n\nDwide leads you to the his house, not far from the center of the village. It's not one of those ramshackle one-room homes that most wastelanders put together. It's two stories, almost all wood, yet lacks the pre-war trademarks of brick and drywall.\n\nSuch a strange place.\n\nDwide's home is lit by candles and torches, much like any other home in the wasteland. Unlike the typical shacks of a waster, this home is spilt into clearly defined rooms, with different furniture in them. The furniture itself is clealy handmaid and artfully crafted with long, sloping legs and fanciful carvings, much more elegant than the rude makeshift stools of the wasteland. It seems odd that he has so much space. Then you see why.\n\nChildren rush down the crickety steps, all wearing those strange outfits. \"Papa,\" they shout, running to hug him.\n\nSo short and wild and ruddy and big in the eyes, each hollering over the other to tell their father about their day. So full of energy, and so rare in this world of hazard.\n\nHe picks up the smallest of the four, a little girl, and she hugs him tight. \"Are the monsters gone?\" she asks. Her yellow curls jiggle as she turns her head.\n\n\"You know Papa hates to fight,\" says Dwide. \"But yes, the monsters are gone.\"\n\nThen a woman steps into the room. She's shorter than you by a head and has blonde hair, and wears an apron covered in the stains of whatever she was cooking.\n\n\"Who's this?\" asks the woman.\n\n\"Our guest. The other men and I had to help 'em with the Furies,\" says Dwide. Then he looks to you and says, \"This is my lovely wife, Noel.\"\n\n\"Well, you're here just in time for dinner,\" she says with a smile.\n*page_break\nYou sit around a large, handmade table with more food than you ever recall seeing in one place. The savory smell of freshly cooked poultry is overwhelming. \n\n\"It's turkey,\" says Noel, when she notices the way you quizzically look at it. \"It's a bird.\"\n\nIt's bigger than any bird you recall ever seeing, and is now without feathers or anything that makes it recognizeably a bird. Surrounding it is an assortment of colorful vegetables and breads and gravies.\n\n\"Dear Lord,\" starts Dwide, \"We thank you for the harvest bounty you provide us, for my loving wife's skill in cooking, and for the village that we call home. We thank you for the guest you've brought into our home, and the grace that allowed us to protect them. Amen.\"\n\n\"Amen,\" says the rest of the family in unison.\n\n\"Amen,\" you mutter, out of respect for their odd tradition.\n\nFists of flavor - salty, sweet, savory - they pummel you and roll across your tongue. Far are they from the typical sours and bitters that the wasteland's tainted soil gifts to you. Odd textures and flavors mix with each bite, and you aren't quite sure why you've wasted so much of your life on lesser foods.\n\nThere was a time when there was bounty. Some preachers called it Eden. They said that it was destroyed by humans and by bombs. You don't know if such a thing ever existed, but the closest to it rests on your tongue, and on this homemade table, in Dutch Mill.\n*page_break\nAfter dinner is finished and Noel and the girls begin washing the dishes, Dwide brings you to his den. It's a small, stuffy room in the back of the house where he stores his weapons and a few books written in some language you cannot recognize.\n\n\"You can stay the night,\" he says, resting in an old leather chair. \"After that, I'm afraid you'll have to go.\"\n\nThen Noel enters the den with a man you don't recognize, and leaves without a word. Like Dwide and all the other men, he dresses strangely and has a thick beard. He glares at you like you're no better than some rabid wolf, but he doesn't say a thing to you.\n\n\"Amos,\" says Dwide, rising from his seat. \"What brings you over so late?\"\n\n\"The outsider,\" says Amos in a stern, harsh tone. \"Your actions threaten the village. They brought the Furies and forced us to kill. What if highwaymen come next.\"\n\n\"They needed help,\" Dwide insists.\n\n\"They're a threat to the community.\"\n*choice\n  #\"I'm standing right here.\"\n    \"And you should be standing outside our gates,\" says Amos. He stares you down so closely you're worried his thick, bushy beard might reach out and grab you. \"You're a threat to the village. The longer you stay, the worse it'll get.\"\n    *goto c3\n\n  #\"You got a problem?\"\n    *set Sadism %+3\n    *set Cruelty %+3\n    \"Aye, you're my problem,\" says Amos. He stares you down so closely you're worried his thick, bushy beard might reach out and grab you. \"You're a threat to the village. The longer you stay, the worse it'll get.\"\n    *goto c3\n\n  #\"I don't wanna cause any problems.\"\n    *set Sadism %-3\n    \"And yet, here you are,\" says Amos. He stares you down so closely you're worried his thick, bushy beard might reach out and grab you. \"You're a threat to the village. The longer you stay, the worse it'll get.\"\n    *goto c3\n\n*label c3\n\n\"You always do this,\" says Dwide. \"There's no reason to be afraid of the outside.\"\n\n\"Tell that to Noel's sister,\" he says. \"Tell that to my mama and papa.\"\n\nAmos storms out after that. It's strange. Most villagers either let you in or don't - you've never had them let you in, then argue about after the fact. Such a strange community.\n\n\"Sorry 'bout him. Amos doesn't much care for outsiders,\" says Dwide. \"Come now, I'll show ya your room.\"\n*page_break\nSleeping in a new place is always a challenge. The way a house or shack or even cave seems to settle at night, the noises it makes, there's something frightening about it. You never know if those noises might actually be the footsteps of mutants or highwaymen or something equally sinister.\n\nSo, when your door creaks open and candlelight washes over you, you're wide awake. Bearded men with guns fill the room, and you are wise enough to keep your eyes closed to maintain the element of surprise.\n*choice\n  #Attack them\n    *set Sadism %+8\n    *set Cruelty %+8\n    *set Caution %-8\n    *if Combat \u003c 65\n      You rush up, pulling your gun out from underneath your pillow. Rolling to the side to avoid the deafening gunfire, you return fire from behind the cover of an old dresser. Their bullets spray through it and luckily miss you, but pepper the air with wood shavings.\n\n      Then the shooting stops. You wait a moment, ears ringing, before looking over the edge of the dresser to see what's happening.\n\n      Dwide holds a gun up to Amos's head. \"Get out of my damned house,\" he says through clenched teeth.\n\n      Amos lifts his hands and the other men lower their rifles. \"You can't protect the outsider,\" he says. \"They don't belong here.\"\n\n      \"They're a guest in my home. You don't belong here.\"\n\n      And like that, Dwide removes the intruders at gunpoint and bars the door.\n      *goto safe\n\n    *else\n      *set Health %-18\n      You rush up, pulling your gun out from underneath your pillow. But the butt of a rifle strikes you face before you can take aim, sending you sprawling back onto the bed. Head in a daze, you're unable to resist Amos's men.\n\n      The bearded men come at you with coarse hands and taut rope, and for the first time since you met ReVivienne you find yourself bound with a bag over your head. They drag you from Dwide's home under the cover of night, carrying you as if you're light as a feather.\n      *goto capture\n\n  #Run away\n    *set Sadism %-8\n    *set Cruelty %-8\n    *set Caution %+8\n    *if Stealth > 65\n      You make a bee line for the door before they even realize you're awake. Calloused hands reach out, trying to grasp you, but slip off you with ease. \n\n      \"Get 'em,\" shouts Amos.\n\n      You rush down the stairs, floorboards creaking with each heavy step. The men follow closely behind, but they don't seem willing to open fire on you in such an enclosed space. \n\n      Then Dwide appears, rifle in hand, and points it at the men pursuing you. \"Get out of my damned house,\" he says through clenched teeth.\n\n      Amos lifts his hands and the other men lower their rifles. \"You can't protect the outsider,\" he says. \"They don't belong here.\"\n\n      \"They're a guest in my home. You don't belong here.\"\n\n      And like that, Dwide removes the intruders at gunpoint and bars the door.\n      *goto safe\n\n    *else\n      *set Health %-18\n      You rush up, pulling your gun out from underneath your pillow. But the butt of a rifle strikes you face before you can move, sending you sprawling back onto the bed. Head in a daze, you're unable to resist Amos's men.\n\n      The bearded men come at you with coarse hands and taut rope, and for the first time since you met ReVivienne you find yourself bound with a bag over your head. They drag you from Dwide's home under the cover of night, carrying you as if you're light as a feather.\n      *goto capture\n\n  #Talk to them\n    *set Sadism %-8\n    *set Cruelty %-8\n    *set Caution %+8\n    *set Deception %-8\n    *if Persuasion > 65\n      \"Disturbing someone while they sleep is considered rude in the wasteland,\" you say. \"Is there something you boys wanted to talk about?\"\n\n      They level their guns at you as Amos steps toward the foot of your bed. \"You're a threat to this village,\" he says. \"You're coming with us.\"\n\n      \"I'm leaving tomorrow. This is pointless,\" you reply.\n\n      \"I did not come to argue.\"\n\n      \"You told Dwide that you didn't want to kill those wolves. The Furies. How is that any worse than attacking me in the middle of the night?\" Every word you say is a gamble, but you don't have to persuade them. You have to delay them.\n\n      Dwide appears behind Amos, silent as a ghost, and points his rifle at the back of his head. \"Get out of my damned house,\" he says through clenched teeth.\n\n      Amos lifts his hands and the other men lower their rifles. \"You can't protect the outsider,\" he says. \"They don't belong here.\"\n\n      \"They're a guest in my home. You don't belong here.\"\n\n      And like that, Dwide removes the intruders at gunpoint and bars the door.\n      *goto safe\n    *else\n      \"I'm trying to sleep,\" you say, once again demonstrating your lack of persuasive skills. \"Wanna clear out?\"\n\n      They level their guns at you as Amos steps toward the foot of your bed. \"Such rudeness,\" he says with a sigh. \"You're coming with us.\"\n\n      The bearded men come at you with coarse hands and taut rope, and for the first time since you met ReVivienne you find yourself bound with a bag over your head. They drag you from Dwide's home under the cover of night, carrying you as if you're light as a feather.\n      *goto capture\n\n*label safe\n*page_break\nYou return to the den once again with Dwide, and are greeted by Noel and the children. Noel brandishes a rifle of her very own, ready to protect her children should need arise. The kids wipe sleepers from their eyes and laze about on the leather chairs, waiting to be allowed back to their rooms.\n\n\"Go back to sleep now, children,\" says Dwide. \"Amos and his men have left.\"\n\nAfter a few minutes of them saying good night to their mama and their papa, you are left alone with Dwide and Noel.\n\n\"I am truly sorry for Amos's behavior,\" says Dwide. \"It would appear you are the straw that broke the camel's back.\"\n\n\"Don't blame the guest,\" Noel snaps. \n\nYou don't expect Dwide to take such a response from his wife, but he just smiles.\n\n\"Of course, dear. My apologies.\"\n*choice\n  #\"What the hell is going on?\"\n    \"Here at Dutch Mill, we've got a different way of life,\" he explains. \"The sort technology that killed the world? Electricity? Radios? We don't use that. Outsiders too. We keep 'em out to keep the community safe. But we're good Christian folk too. If someone needs it, we gotta help 'em. But some don't take kindly to that.\"\n\n    \"Amos isn't wrong when he says outsiders are dangerous. They've killed plenty of our kin,\" says Noel. \n\n    \"Look, between you and me, I think we need to get along better with outsiders. The Mill can't last forever if we don't have any friends. So, if you'd be so kind, I'd like you to help out around town tomorrow. There's pests need killin' and the well's got a leak. It'll show a lotta close-minded folk how valuable outsiders can be to us.\"\n    *goto c4\n  #\"Why does Amos want to kill me?\"\n    \"Because he's a wrong-headed fool. Look, here at Dutch Mill, we've got a different way of life,\" he explains. \"The sort technology that killed the world? Electricity? Radios? We don't use that. Outsiders too. We keep 'em out to keep the community safe. But we're good Christian folk too. If someone needs it, we gotta help 'em. But some don't take kindly to that.\"\n\n    \"Amos isn't wrong when he says outsiders are dangerous. They've killed plenty of our kin,\" says Noel. \n\n    \"Look, between you and me, I think we need to get along better with outsiders. The Mill can't last forever if we don't have any friends. So, if you'd be so kind, I'd like you to help out around town tomorrow. There's pests need killin' and the well's got a leak. It'll show a lotta close-minded folk how valuable outsiders can be to us.\"\n    *goto c4\n\n  #\"Why are you protecting me?\"\n    \"Because I like to believe in people. Look, here at Dutch Mill, we've got a different way of life,\" he explains. \"The sort technology that killed the world? Electricity? Radios? We don't use that. Outsiders too. We keep 'em out to keep the community safe. But we're good Christian folk too. If someone needs it, we gotta help 'em. But some don't take kindly to that.\"\n\n    \"Amos isn't wrong when he says outsiders are dangerous. They've killed plenty of our kin,\" says Noel. \n\n    \"Look, between you and me, I think we need to get along better with outsiders. The Mill can't last forever if we don't have any friends. So, if you'd be so kind, I'd like you to help out around town tomorrow. There's pests need killin' and the well's got a leak. It'll show a lotta close-minded folk how valuable outsiders can be to us.\"\n    *goto c4\n\n  #\"I'm gonna kill that moron.\"\n    \"Now, I wouldn't wanna go about it quite like that. Here at Dutch Mill, we've got a different way of life,\" he explains. \"The sort technology that killed the world? Electricity? Radios? We don't use that. Outsiders too. We keep 'em out to keep the community safe. But we're good Christian folk too. If someone needs it, we gotta help 'em. But some don't take kindly to that.\"\n\n    \"Amos isn't wrong when he says outsiders are dangerous. They've killed plenty of our kin,\" says Noel. \n\n    \"Look, between you and me, I think we need to get along better with outsiders. The Mill can't last forever if we don't have any friends. So, if you'd be so kind, I'd like you to help out around town tomorrow. There's pests need killin' and the fence needs a patch. It'll show a lotta close-minded folk how valuable outsiders can be to us.\"\n    *goto c4\n\n*label c4\n*choice\n  #\"I'd love to be of help.\"\n    \"Great,\" he says with a toothy, beet-stained grin. \"We can get started tomorrow morning.\"\n    *goto c5\n\n  #\"What are you gonna pay me?\"\n    \"Way I see it, you've already been paid. Saved your life from those Furies, so I'd say your in my debt,\" he says with a toothy, beet-stained grin. \"We can get started tomorrow morning.\"\n    *goto c5\n\n  #\"Why would I do that?\"\n    \"Way I see it, you owe me. Saved your life from those Furies, so I'd say your in my debt,\" he says with a toothy, beet-stained grin. \"We can get started tomorrow morning.\"\n    *goto c5\n\n  #\"Why can't someone else do it?\"\n    \"Everyone's already got work to do. Besides, I saved your life from those Furies, so I'd say your in my debt,\" he says with a toothy, beet-stained grin. \"We can get started tomorrow morning.\"\n    *goto c5\n\n*label c5\n*page_break\n\"Come now,\" says Dwide after you share a hearty breakfast with his family. \"We got work to do.\"\n\n\"What's first on this list?\"\n\n\"We can go in whatever order you'd like,\" he assures you. \"Miriam's got pests in her basement, Gideon needs help findin' his daddy's gun, and the fence needs a patch. Whattaya wanna do first?\"\n*label dc1\n*choice\n  *hide_reuse #\"Let's exterminate the pests.\"\n    *set dutch +1\n    Miriam opens the door and flashes a pleasant smile. Her son stands beside her, BB gun in hand, and says, \"Mama said yer gonna help us get ridda the rats.\"\n\n    \"That's right,\" says Dwide. \"I brought the outsider the help us out.\"\n\n    The boy looks at you like you have two heads. \"I thought outsiders're bad.\"\n\n    Dwide just chuckles, as does Miriam. \"Come on, boy, let's see about those rodents.\"\n\n    You figure rats will be easy to handle, since they're so tiny. Probably just need to set some traps, maybe leave fruit as bait. Then it's just about waiting.\n\n    Then you see the dresser pushed in front of the basement door. Dwide pushes it out of the way, revealing claw marks that cut clear through the wood. You can see into the darkness of the basement, and that's when you hear the sounds of vicious scratching.\n\n    \"Uh, how big are these rats?\" you ask.\n\n    Miriam shrugs. \"Smaller than the ones Silo Abram gets in the grain store.\"\n\n    That isn't a helpful metric, so you drop the question entirely. Then the boy speaks up.\n\n    \"Pa used to just go down and shoot all the rats, but we got some traps too,\" he says.\n\n    \"Oh, I really don't wanna clean up all that mess,\" says Miriam. \"Maybe you could lure 'em outside and let the Furies deal with them.\"\n    *choice\n      #Slaughter them\n        *set Sadism %+9\n        *set Caution %-7\n        *set Cruelty %+5\n        \"They're just rats,\" you reason. \"Nothing a few bullets can't handle.\"\n\n        Then Dwide takes a knee in front of the boy and says, \"Now, you know as well as I do that killin' is wrong, right?\"\n\n        The boy nods, so he continues. \n\n        \"But sometimes, in this wasted land, killing is what we have to do. So, when we're finished with those rats downstairs, I want you to head upstairs and say a prayer to the Lord, alright?\"\n\n        \"Yes, sir,\" says the boy, with a smile. \n\n        You don't recall anyone ever expressing such a reaction to the prospect of killing, but this is a strange community. \n        *page_break\n        Dwide swings the door open and casts his candle into the darkness, shedding warm, orange light over the basement below. At first, you don't see the rats. There are logs and tools and even a few pieces of furniture scattered throughout the basement, with large animal pelts mixed among them. Then the pelts begin to move, and you wish you'd taken your chances with the Furies.\n\n        These rats, if you can call them that, are twisted mutants with deep green eyes and patchy fur. Each one is easily the size of a small dog. They hiss rabidly with their sharp teeth jutting out, balking at the sudden presence of light. The largest of the rodents are also the ugliest. Much like the furies they have vestigial limbs and extra facial features wrought by the curse of radiation.\n\n        There are probably a dozen rats in total, and you've earned their attention. They swarm toward you, squeaking and nipping, their feet padding against the stone floor of the cellar.\n        *choice\n          #Lead the charge\n            *set Caution %-3\n            It seems strange to lead a charge against giant mutant rodents, but you do it all the same. \n\n            *if Combat > 65\n              You fire in bursts of three or four rounds, targetting the larger and fiercer rats of the horde. You stand your ground at the base of the wooden steps, with Dwide and the child standing close behind you. \n\n              Soon  the entire basement smells of dead rat. Their blood runs thickly along their furry hides. A few cling to life, squeaking oddly until they find their place under your boot.\n              *goto deadrat1\n\n              *label deadrat1\n              *page_break\n              \"Tsk, such a mess,\" says Miriam, stepping down into the candlelit basement. \n\n              \"Now head upstairs and say some prayers, boy,\" says Dwide to the child. \"The Lord'll be awful pleased to hear from ya.\"\n\n              He scampers upstairs, BB gun in hand, while his mother thanks Dwide profusely.\n\n              \"All in a day's work, Miriam,\" he says with that beet-stained smile. \"But don't forget to help our dear outsider for all their assistance.\"\n\n              She placed a gentle, cold hand on yours and looks earnestly into your eyes. \"This is the first kindness I recall getting from an outsider. Thank you. May the Lord bless you.\"\n\n              \"Come on now,\" says Dwide. \"More work to do.\"\n              *goto dc1\n\n            *else\n              *set Health
