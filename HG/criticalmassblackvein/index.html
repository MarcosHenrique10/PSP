<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Critical Mass: The Black Vein — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>

        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "criticalmassblackvein", "title": "Critical Mass: The Black Vein", "scenes": {"1-franklin": "[i]Of all the assholes one may find in the wasteland, highwaymen are the most vicious. Their minds have been demented by radiation and genetic disease and they're no better than animals. They live in ruinous squalor, not seeing fit to use their man-power to construct new societies or at least new buildings. Were it not for their raiding, reaving, and raping, the world may have recovered some sense of civilization by now. If you ever meet a highwayman gang (and you will) do us all a favor and kill as many as you can.[/i]\n\n-An Anonymous Archivist, [i]How to Kill Wasteland Assholes[/i]\n\nYou follow the rubble-strewn asphalt through the city, heading west purely by memory. The ever-shifting boundaries of highwaymen territories pose a potential threat as you make your way passed the red-bricks and disheveled cathedrals, so you stay vigilant and seek familiar ground.\n\nThere are many villages tucked away in the ruins of Philly, some of which manage greenhouses, some of which trade to get by. Every once in a while they'll be taken over by some highwaymen gang, forcing a militia like the Daughters of Liberty to intervene.\n\nThe only village on your way to your ghost town target is a little walled place called Franklin. Odds are it'll be the safest place to stop along your journey, so that's where you head.\n*page_break\nThe village is positioned below a sign that reads the word \"FRANKLIN\" in bold red letters. The sign is mounted on a disheveled building, and the other words on the sign are shrouded in darkness. You spot a few panels on the rooftop which you understand to be some sort of ancient electric technology. These folks are lucky they're so well armed, otherwise the Daughters might come for them.\n\nFranklin is not a traditional village of shacks built in a circle. It is actually a single building with a series of walls around it. Green gardens hang off the sides of every balcony and great funnels collect rainwater on those few days that rain actually comes, and a few snipers take position in several windows. \n\n\"Who goes there?\" asks a voice as you approach the wall.\n\nYou soon make out a few figures on top of the scrap-metal structure, pointing their guns at you. They wear simple clothes with shoulder pads and vambraces made of scrap metal, and one seems to have a shield made out of an old traffic signs.\n\n\"Well? Who are you?\" he shouts.\n*choice\n  #\"A simple traveler.\"\n    *set Caution %+12\n    The man snickers and says, \"Well, you don't look too threatening. Keep your hands up and come on in.\"\n    *goto c1\n\n  #\"Your new best friend.\"\n    *set Sadism %-12\n    The man snickers and says, \"Well, no highwayman would say somethin' that stupid. Keep your hands up and come on in.\"\n    *goto c1\n\n  #\"The most badass wastelander you've ever met.\"\n    *set Caution %-12\n    The man snickers and says, \"Well, no highwayman would say somethin' that stupid. Keep your hands up and come on in.\"\n    *goto c1\n\n*label c1\n\nThe great metal gate creaks open and the sound of steel on asphalt is deafening. You walk forward with your hands above your head. It's not uncommon to see a dozen guns in your face when you first come across a village. That's when you notice the bullets in the wall, as well as the broken off bits of metal. There must have been a recent attack.\n\n\"I've been here before,\" you say as the guards come out to greet you, in their makeshift armor.\n\nOne man with a scar on his eye leads them. The one you just spoke to. \"We get a lot of visitors,\" he says. \"You know the drill. Guns, knives, in the locker.\"\n\nYou step into the walled compound and hand off your gun and your knife to one of the guards. He stows them in a locker without a word and gives you a handwritten receipt. \"Voss, right?\" you ask their leader. \"Head of security?\" Most villages have a sheriff and a mayor, and they keep their jobs separate. As far as you know, Franklin never had a mayor. Just the security team. As long as nobody died, there was no reason to pass any laws.\n\n\"That's right,\" he says. \n\n\"I'm tracking down a ghost town west of here. It's supposed to have a coal mine. Any idea where that is?\"\n\nVoss smiles. \"Tell ya what. You do me a lil favor and I'll draw you a map?\"\n\n\"What kind of favor?\"\n\n\"The kind where you help us deal with some highwaymen. A little talkin', maybe a little shootin'. Whattaya say?\"\n\nHighwaymen are vile creatures whose minds have been warped by social breakdown, radiation, and generations of birth defects. Without them, the wasteland would likely have rebuilt already. They're beings deserving no more than scorn and bullets, but are also dangerous in numbers. Both of these factors weigh on your mind as you consider Voss's offer.\n*choice\n  *hide_reuse #\"Why do you need me to do it?\"\n    \"That's information for Franklin Security only,\" he says. \"So, will you do it?\"\n    *label c2\n    *choice\n      *hide_reuse #Press him for the truth\n        *if Persuasion > 65\n          \"Look, I hate highwaymen as much as the next wastelander, but I'm not running into a fight unless I know exactly why you hired me.\"\n\n          \"Fine,\" he says with a scowl. \"The Lead Saints've been taking potshots at us for a month and they're leader, Gizmo, says that he wants to find his people a new home. Our forces are fine for taking out small groups of highwaymen, but this ones a big gang and I hate relying on those damned Daughters of Liberty. I'd rather hire an outside contractor than some cult nut to take care of this. You in or what?\"\n          *goto c2\n        *else\n          \"Just tell me the truth, damnit,\" you say.\n\n          \"Need to know basis,\" he says. \"Now make your choice.\"\n          *goto c2\n\n      #Reject his offer\n        *goto c4reject\n\n      #Accept his offer\n        *goto c4accept\n\n  #\"Not gonna happen.\"\n    *label c4reject\n    \"I don't have time to fight a gang for you. Odds are I'll end up dead anyway.\"\n\n    \"That's a shame,\" says Voss with a frown. \"Well, enjoy your time in town anyway, and remember not to start any trouble.\"\n\n    You leave behind the twisted fortifications of the security forces and head into Franklin's tower. The lobby is a candlelit bazaar filled with shops and barterers. Anything except weapons could be bought or sold here, including ammo, exotic mutant fruits, clothing from both before and an after the war, and ancient texts such as 'Harry Potter and the Sorcerer's Stone.' Security officers with pistols and rusty armor patrol the market for any thieves or conflicts in need of resolution.\n\n    You still need to find information about the ghost town, but the market's closing soon. Which vendor will you ask for information from?\n    *choice\n      #The ammo dealer\n        *set Cruelty %+8\n        *set Sadism %+8\n        The woman at the stall shows off her wares, displaying a wide range of bullets of various types and shapes. They rest in baskets of hundreds like one my display fruit or grains. \"In three days I'll be moving on to Fulfillment. There, I can sell guns and knives and even swords and bombs,\" she says. Her thin teeth bend every which way and her gaunt body seems to shake with each passing wind. \"Until then, I can only sell munitions.\"\n\n        \"Actually, I'm looking for information,\" you say.\n\n        \"Well, working in the market does help you overhear certain things,\" she says, polishing bullets and placing them in baskets. \"But I'm not a dealer of secrets. For that, you'll have to go to Flora. She lives in the Franklin Presidential Suite, just below Voss's Penthouse. She loves visitors.\"\n\n        You'd heard of Flora before but never had the need to reach out to her. This is as good a time as ever, you suppose. So, you head up the stairs and begin the long ascent to Flora's apartment.\n        *goto flora1\n\n      #The clothing salesman\n        *set Cruelty %-8\n        *set Sadism %-8\n        The man stands amid all sorts of outfits, from old-fashioned suits to post-war armors made from steel and leather and even scrapped tires. He wears a suit himself, tattered and somewhat dirty, with a dark red tie around his neck. \"Ah, I see you're in need of a fashion update,\" he says, noting your ratty clothes.\n\n        \"Actually, I'm looking for information,\" you say.\n\n        \"Well, working in the market does help you overhear certain things,\" he says, examining your clothes from behind. \"But I don't sell information. You'll have to ask Flora for your help. You'll find her in the Franklin Presidential Suite, just below Voss's Penthouse. She loves visitors.\"\n\n        You'd heard of Flora before but never had the need to reach out to her. This is as good a time as ever, you suppose. So, you head up the stairs and begin the long ascent to Flora's apartment.\n        *goto flora1\n\n      #The book seller\n        *set Cruelty %-8\n        *set Caution %+8\n        The woman at the stall is surrounded by dog-eared books, pages yellowing with age and fringed with mold. She's a kind looking old lady with deep wrinkles and thin smile-lines, and she looks at her books the way she would look at her grandchildren. \"You look like you need a challenging read,\" she says with a smile. \"There's some good wisdom hidden in 'Twilight' if you think you can handle that old style of prose.\"\n\n        \"Actually, I'm looking for information,\" you say.\n\n        \"Ah, and not the kind that these books can provide,\" she says, looking over her ancient texts. \"I can't help you with that, but Flora can. She lives in the Franklin Presidential Suite, just below Voss's Penthouse. She loves visitors.\"\n\n        You'd heard of Flora before but never had the need to reach out to her. This is as good a time as ever, you suppose. So, you head up the stairs and begin the long ascent to Flora's apartment.\n        *goto flora1\n\n      #The fruit vendor\n        *set Sadism %-8\n        *set Caution %+8\n        The man at the stall is surrounded by a colorful variety of fruits of all shapes and sizes. You don't recognize most of them, especially not the blue and purple ones, though the red breeds seem familiar. \"Care for a sample?\" asks the large man, whose white smock is smeared wih a colorful assortment of stains.\n\n        \"Actually, I'm looking for information,\" you say.\n\n        \"Well, working in the market does help you overhear certain things,\" he says, dicing up a soft fruit with a plastic knife. \"But I don't sell information. You'll have to ask Flora for your help. You'll find her in the Franklin Presidential Suite, just below Voss's Penthouse. She loves visitors.\"\n\n        You'd heard of Flora before but never had the need to reach out to her. This is as good a time as ever, you suppose. So, you head up the stairs and begin the long ascent to Flora's apartment.\n        *goto flora1\n\n        *label flora1\n        *page_break\n        The soldiers guarding the double doors to Flora's apartment are clearly not security guards, but they're just as well armed. \"Don't step any closer,\" says one of them, pointing his pistol at you.\n\n        You raise your hands, mostly because you don't have a gun of your own to draw, and say, \"I heard Flora like visitors.\"\n\n        The guard sighs and lowers his gun. \"We're keeping a close eye on you,\" he says before opening the double doors.\n\n        Flora sits on her couch and sips what appears to be tea, as if she was simply waiting for you to show up. Six more guards are positioned around the lavishly furnished suite - behind the bar, near the bedroom, beside the other couch, at the top of the stairs, by the dirty windows that show the desert below. The whole space is clearly furnished to resemble the old days, including a TV that certainly does not work. The lights, however, flicker with electricity. A floor below there are people getting by on candlelight, but this woman is permitted the privilege of electric lighting.\n\n        Flora herself seems far too dainty for the wasteland. Her torso and hips are thin and without muscle, but she doesn't look starved either. Generally, the wasteland only breeds the emaciated or the muscular, but she seems simply lean. Her wine-dark skin is without blemish or injury, and her hair's curls are organized by coloful pins. \n\n        The guard behind the bar nods to you so you nod back. He stares boredly at the counter, running his fingers through a wet ring of condensation left by the sweat of a glass. Then he nods toward the guards who let you in, and they close the door behind you, leaving you alone with Flora and her small army.\n\n        \"You're the outsider Voss tried to hire for the highwaymen job,\" she says after sipping from her mug. Not a question: a statement. \n\n        \"How did you know that?\" you ask.\n\n        \"I have eyes and ears everywhere. Like the vendor you spoke to. But they cannot tell me what you're doing here, so why don't you?\"\n\n        \"There's a ghost town west of here,\" you explain. \"I've been hired to find it.\"\n\n        \"The one with the abandoned coal mine?\" she asks. She smiles when she spots the look of recognition on your face. \"I'll tell you where it is, but only on one condition.\"\n\n        \"And that is?\" \n\n        \"Assassinate Voss.\"\n        *label c5\n        *choice\n          *disable_reuse #\"Why not have one of your guards do it?\"\n            \"Because then everyone will know I ordered it,\" she says, speaking slowly as if you're a child. \"I'm barely allowed to have them armed as it is. If anyone finds out I ordered an assassination, we'll have a civil war brewing. But if you get caught, everyone will just think you were a disgruntled outsider. Now, are you going to help me out?\"\n            *goto c5\n\n          *disable_reuse #\"Why do you want him dead?\"\n            \"He's my upstairs neighbor,\" she says. \"Do you have any idea how loud he and his officers get? It's ridiculous. Now, are you going to help me out?\"\n            *goto c5\n          #\"I'd love to.\"\n            *set Sadism %+9\n            *set Cruelty %+9\n            \"Yeah, he's a bit of a tool,\" she says with a smile. Then she pulls a key out of her pocket and places it in your hand. \"He should be back in his Penthouse around midnight.\"\n\n            \"How am I supposed to kill him?\" you ask. \"My weapons were all taken.\"\n\n            One of her guards wordlessly offers you a knife. It's a black metal with a serrated edge. \n\n            \"Come back once the deed is done,\" she says.\n            *goto Voss-assassinate\n\n          #\"I mean, if I have to.\"\n            *set Sadism %+3\n            *set Cruelty %+3\n            \"I can't say I like the lack of enthusiasm, but I'm sure that won't get in the way of your duty,\" she says with a frown. Then she pulls a key out of her pocket and places it in your hand. \"He should be back in his Penthouse around midnight.\"\n\n            \"How am I supposed to kill him?\" you ask. \"My weapons were all taken.\"\n\n            One of her guards wordlessly offers you a knife. It's a black metal with a serrated edge. \n\n            \"Come back once the deed is done,\" she says.\n            *goto Voss-assassinate\n          #\"Any chance you'll tell me anyway?\"\n            *set Sadism %-3\n            *set Cruelty %-3\n            \"Not a one,\" she says with a smile. Then she pulls a key out of her pocket and places it in your hand. \"He should be back in his Penthouse around midnight.\"\n\n            \"How am I supposed to kill him?\" you ask. \"My weapons were all taken.\"\n\n            One of her guards wordlessly offers you a knife. It's a black metal with a serrated edge. \n\n            \"Come back once the deed is done,\" she says.\n            *goto Voss-assassinate\n\n          #\"Can I try and convince him to leave?\"\n            *set Sadism %-7\n            *set Cruelty %-7\n            \"I suppose that will work, but you have to convince him not to come back,\" she says with a smile. Then she pulls a key out of her pocket and places it in your hand. \"He should be back in his Penthouse around midnight.\"\n\n            \"How am I supposed to kill him?\" you ask. \"My weapons were all taken.\"\n\n            One of her guards wordlessly offers you a knife. It's a black metal with a serrated edge. \n\n            \"Come back once the deed is done,\" she says.\n            *goto Voss-assassinate\n\n            *label Voss-assassinate\n            *page_break\n            You slip into Voss's penthouse in the dead of night. For a head of security, he has an oddly small number of guards watching his door. That number is zero. Perhaps he thinks he's too powerful to need guards. Perhaps there are too few guards to waste on him. Perhaps he just didn't expect Flora to have a copy of his key.\n\n            Whatever, the case, the penthouse is just as empty as the hallway was. The lights are out but your eyes soon adjust, and you find a room decorated similarly to Flora's, but much larger. \n\n            Voss snores on the couch, half naked, with an empty bottle of vodka on the floor beside him. He doesn't stir as you step closer, but then you step on a piece of broken glass.\n\n            *if Stealth > 65\n              He stirs awake and begins to look around the room, barely awake. Your skill in stealth ensures that you manage to hide from his gaze by ducking behind the very couch that he lies on.\n              *choice\n                #Attack him while you still have the element of surprise\n                  *set Sadism %+9\n                  *set Caution %-9\n                  He never sees you coming. Your blade glides across his throat with ease and blood spills onto the couch. It fills his lungs and he chokes on it, trying desperately to cover the wound. The last thing he sees is your face. He cannot possibly understand what is happening, but it happens all the same.\n\n                  You stand over his body, his blood quite literally on your hands. Then the sound of gunfire fills the air. You see flashes from the window and fires on the ground below, making you wonder just what you've gotten yourself into.\n                  *goto Flora-win\n                #Try to talk to him\n                  *set Sadism %-9\n                  *set Caution %+9\n                  You step out from behind cover and reveal yourself to him. He suddenly jolts awake and breaks the bottle of vodka against the table, and then points the jagged end at you.\n\n                  *goto c6\n\n            *else\n              You aren't stealthy enough to hide, and he spots you immediately. He smashes the vodka bottle against the table and points the jagged end at you, wobbling uneasily as he tries to maintain his balance.\n              *choice\n                #Attack him and hope for the best\n                  *set Sadism %+9\n                  *set Caution %-9\n                  *label c7\n                  *if Combat > 65\n                    He tries to strike out at you, but you're the stronger one in this fight. You quickly overpower him and lash out with your knife, hacking until he falls back.\n\n                    Your blade slips into his chest as you knock him to the floor. The bottle flies from his hands as he tries to fight back, but his efforts are fruitless. His fingers wrap around your neck but then go limp as his heart beats its last and as blood pours out onto the ground.\n\n                    You stand over his body, his blood quite literally on your hands. Then the sound of gunfire fills the air. You see flashes from the window and fires on the ground below, making you wonder just what you've gotten yourself into.\n                    *goto Flora-win\n\n                  *else\n                    *set Health %-30\n                    You rush in with your knife, but Voss is faster. His bottle breaks against your skin and pain floods your body as blood seeps into the carpet. You strike back with vigor and rage against the pain. \n\n                    Your blade slips into his chest as you knock him to the floor. The bottle flies from his hands as he tries to fight back, but his efforts are fruitless. His fingers wrap around your neck but then go limp as his heart beats its last and as blood pours out onto the ground.\n\n                    You stand over his body, his blood quite literally on your hands. Then the sound of gunfire fills the air. You see flashes from the window and fires on the ground below, making you wonder just what you've gotten yourself into.\n                    *label Flora-win\n                    *set FGFranklin 1\n                    *set Villain 1\n                    *set Deception %+30\n                    *set Sadism %+30\n                    *set Cruelty %+30\n                    *set Notoriety %+20\n                    *page_break\n                    Screaming. Blood. Running. It's like the world is ending all over again. You watch from above as highwaymen flood the village that you'd arrived at just hours ago, and you cannot help but feel like the angel of death. They fire bullets and lob molotov cocktails at the pitifully outgunned security forces. They're already in the tower, so you're not quite sure what the guards think they're fighting for.\n\n                    \"They're called the Lead Saints,\" says Flora. You aren't sure when she arrived at the penthouse, but she's guarded by plenty of soldiers. Too many for you to attack her, if that's what you wanted.\n\n                    \"They're attacking your people,\" you point out.\n\n                    \"No, they're just attacking people,\" she corrects, looking down with you. \"Which is exactly what I told them to do. They're leader, Gizmo, seems to think his days are numbered out in the wasteland, so he's looking for a more sustainable home.\"\n\n                    \"And what are you looking for?\" you ask.\n\n                    \"Regime change. I'd offer to let you stay so you could meet him, but you're busy. We're so fortunate that you stumbled by when you did. We've been waiting for someone to remove Voss for so long. He's the only one who would be able to lead a resistance. But you did that for us, so thank you. All the same, I'm going to have to ask you to leave when morning comes. It wouldn't do to parade Voss's assassin around during such a turbulent time.\"\n\n                    But, true to her word, she hands you a map. It's an old scrap of paper marking all the roads and towns near Philly, but it's called Philadelphia. Someone wrote over it with the name's of other towns like Fulfillment and the Dutch Mill. The large X near a nameless town is the place you're meant to go.\n                    *page_break\n                    The Lead Saints let you leave in peace. They're a scarred, mutilated, dirty crew with more guns than teeth between them, and armor far rustier and heavier than one would expect. Their armored trucks and cars form a barricade around the gate, just in case they should suffer an attack.\n\n                    Before you step out the gate, a large man approaches you. He's taller than you by a head and is heavily scarred and tattooed. \"It is my understanding that you brought us this victory,\" he says in a surprisingly soft voice. \"My name is Gizmo. I am sorry to see such a staunch ally go, but the people of Franklin may see fit to resist if they se such a horrid assassin in their midst. Give it a few weeks, and I would be happy to welcome you back into the fold. I owe you quite a lot.\"\n                    *choice\n                      #\"I'll take you up on that favor.\"\n                        \"Then I'll see you soon,\" he says with an odd, somewhat frightening smile.\n                        *goto franklinend\n\n                      #\"You can rot in hell.\"\n                        \"I'm sorry to hear that,\" he says with what seems like a genuinely sad frown. \"My offer of friendship remains open, but I must insist that you go.\"\n                        *goto franklinend\n\n                      #\"What's gonna happen to these people?\"\n                        \"Rebels will be enslaved,\" he says. \"The rest will be allowed to live freely, under our protection. Now, I must insist that you go.\"\n                        *goto franklinend\n\n                #Try to talk to him\n                  *set Sadism %-9\n                  *set Caution %+9\n                  *label c6\n                  \"What the hell are you doing here?!\" he shouts. His face turns red and veins pop out of his forehead.\n                  *choice\n                    #\"Flora sent me to kill you.\"\n                      \"That bitch!\" he says. But he doesn't attack you. \"If she hired you, why am I still alive?\"\n\n                      \"I'm not a hired gun,\" you say. \n\n                      \"So what is this? A warning?\"\n                      *choice\n                        #\"You need to leave Franklin.\"\n                          *set Deception %+15\n                          *if Persuasion > 65\n                            \"There are lives at stake, and not just yours,\" you say, not even knowing if your words are true. \"If you leave now, you might be able to make your way through the wasteland. If you stay or if you come back. Flora will kill you.\"\n\n                            \"That's not possible,\" he spits. \"I have a whole security force.\"\n\n                            \"Where are they now?\" you ask. \"Who gave me this key? They're bought and paid for by Flora. Run now, be some other town's sheriff.\"\n\n                            He gives you one last glare, then makes his way toward the door. He makes his escape half naked the way you found him, but grabs a rifle from his footlocker before he goes. You share one final look, and then he disappears into the hallway.\n\n                            You stare out the window for a while, looking at nothing in particular, just enjoying a moment of stillness in all the chaos. Then the sound of gunfire fills the air. You see flashes from the window and fires on the ground below, making you wonder just what you've gotten yourself into.\n                            *goto Flora-win\n\n                          *else\n                            \"No, I need to kill you,\" he says. \n\n                            *goto c7\n\n                        #\"We need to take her down.\"\n                          *set Deception %-15\n                          \"Truer words have never been spoken,\" he says with a sinister smile. \n\n                          Then the sound of gunfire fills the air. You see flashes from the window and fires on the ground below, making you wonder just what you've gotten yourself into.\n                          *goto Flora-lose\n\n                          *label Flora-lose\n                          *page_break\n                          *set Deception %-30\n                          *set VFranklin 1\n                          When the highwaymen broke through the gates, Franklin's overwhelmed security forces fled to the penthouse where they knew their valiant leader would be. \n\n                          \"Flora's tossed in with the Lead Saints and their psycho boss, Gizmo,\" Voss explains to them. \"She let them into the tower and tried to have me killed.\"\n\n                          \"Why would she do that?\" asks one of them.\n\n                          \"From what I hear, Gizmo's trying to escape the wasteland. Someone's gunning for him, or the Daughters are amping up their game, or the Eagles have put out a bounty, or something like that. Doesn't matter. What matters is mounting Flora's head on a spike.\"\n\n                          \"So, how do we kill her?\" asks another, as if that's a normal thing to ask. \n\n                          \"Billy, open that cabinet,\" Voss says. The metal cabinet is revealed to be filled to the tipping point with all sorts of weapons. Large rifles, tiny pistols, a curved sword or two, and massive bricks labeled \"C4\" cooking timers strapped to the side.\n\n                          \"Holy shit, you been stockpiling this?\" asks Billy. \n\n                          \"That's right,\" he says, marching over to the cabinet. That's when you notice your own gun strapped to its metal wall. Voss hands it to you without skipping a beat. \"Half of you are gonna storm her suite from the front door. The rest are gonna follow me down after I blow a whole in the ground. Any questions?\"\n\n                          Nobody offers him one. You can see the fear and the anger in their eyes. Surely they had husbands and wives and childen down below, suffering at the hands of the highwaymen.\n\n                          \"Good,\" he says. Then he looks to you. \"You gonna follow my boys through the front door? Or join me when we fall in from above?\"\n                          *choice\n                            #Barge in the front door\n                              *set Caution %-3\n                              \"A classic,\" he says. \"Now get in position.\"\n\n                              You follow the squad of security officers down the stairs. A hail of gunfire shatters your ears before you even turn the corner. Your eyes widen and your tongue goes dry as you battle against vicious highwaymen. The hallway between youand Flora is stained with blood as security officers and rabid highwaymen empty their clips at one another.\n\n                              You're lucky to be at the back of the herd during this battle of wills. You watch dozens of Voss's men fall, not dead perhaps, but deathly injured. The Lead Saints scarcely seem to notice their fallen, and don't even seem to mind the bullets flying toward them. They push forward despite the death before them, and soon you see why.\n\n                              He stands a head taller than you, clad in rusty armor and tattoos all over his body. His whole body is a series of scars and tattoos, a testament to the amount of pain he is willing to endure. You assume this is Gizmo.\n\n                              Your bullets barely seem to faze him as they break against his armor, and for a moment you suspect that he's about to lead his Saints to victory.\n\n                              Then the ceiling behind him collapses, flames lick the walls, and a small army comes crashing down.\n\n                              Gizmo turns to see what the noise was, and ends up with a bullet in his head before he can. You aren't sure if it flew from your gun or someone else's, but the battle is too chaotic for you to really give a damn.\n                              *label Voss-win\n                              *page_break\n                              *set Notoriety %+20\n                              Dozens of highwaymen lie dead at your feet, Gizmo among them. The hallway reeks of blood and death, and a few of the younger security guards get sick from the stench.\n\n                              The surviving highwaymen, as well as Flora and her bodyguards, are bound by the window. Voss stands before them, soaked in the blood of others and awaiting confirmation that the rest of Franklin is clear.\n\n                              \"Do you have any idea how many people died?\" he asks Flora. She just stares at him. \"Twenty-six. At least. We're expecting over forty by the time the tower's cleared. Forty citizens, dead, and you didn't even win. Only someone like you could fail so utterly. What do you have to say for yourself?\"\n\n                              She doesn't respond to him. She just looks at you and says, \"You chose the wrong side. You have no idea what's coming.\"\n\n                              Voss nods to one of his men and he opens the window, letting sharp gusts of wind fill the room.\n\n                              \"Anything ya wanna say?\" he asks you. \"This'll be your last chance to get a few jabs in.\"\n                              *choice\n                                #\"Just drop her.\"\n                                  *set Sadism %+20\n                                  *set Cruelty %+20\n                                  \"Gladly,\" he says with a sickening smile.\n\n                                  She doesn't even scream on the way down. Her guards and highwaymen, on the other hand, loose terrible howls between the window and the floor, ending with a sickening crack and the cheers of the civilians below.\n                                  *goto voss-resolve\n\n                                  *label voss-resolve\n\n                                  When it's over and the people of Franklin are digging graves, Voss comes to you with a scrap of paper. It's a map marking all the roads and towns near Philly, but it's called Philadelphia. Someone wrote over it with the name's of other towns like Fulfillment and the Dutch Mill. The large X near a nameless town is the place you're meant to go.\n\n                                  \"I'd offer to let you stay, but we need time to mourn the dead, and your presence would keep a lot of wounds open,\" Voss explains. \"Feel free to come back in a few weeks and we'd be happy to have our hero in town.\" \n                                  *goto franklinend\n                                #\"Her bodyguards were just following orders. Let them live, but don't let them stay in Franklin.\"\n                                  *set Sadism %-8\n                                  *set Cruelty %-8\n                                  \"Fine,\" he says with a scowl. \"But they're gonna rot in the basement for the rest of their lives.\"\n\n                                  \"I wouldn't have it any other way,\" you say.\n\n                                  She doesn't even scream on the way down. Her highwaymen, on the other hand, loose terrible howls between the window and the floor, ending with a sickening crack and the cheers of the civilians below.\n                                  *goto voss-resolve\n\n                                #\"Spare her. You're supposed to be civilized. Act like it.\"\n                                  *set Sadism %+20\n                                  *set Cruelty %+20\n                                  He sighs and glares at her, but concedes. \"Fine, but she's gonna rot in the basement for the rest of her life.\"\n\n                                  \"I wouldn't have it any other way,\" you say.\n\n                                  Her bodyguards are spared, but the surviving highwaymen are tossed over the edge. Barbarians are not afforded the same luxuries that the civilized are.\n                                  *goto voss-resolve\n\n                            #Rain down from above\n                              *set Caution %-18\n                              \"A true daredevil,\" he says. \"Now let's get in position.\"\n\n                              The sounds of muted gunfire ring out like terrible music from below. The security guards hastily tie wires to the various blocks of C4 and set cooking timers. The explosives are set up in a circle where the couch and tables once were, but they are now barricading the door just in case. \n\n                              \"You sure about this, boss?\" asks one of the guards.\n\n                              Voss twists the knob of the timer and says, \"Too late for hesitation now. Get to cover.\"\n\n                              The explosion rocks the entire penthouse, sending you flying despite your distance from the explosives. Luckily you land on the couch and your only injury is the ringing in your ears.\n\n                              Voss is the first one to jump down into the suite below, and you follow him with his soldiers. The battle is a haze of bullets and dust, and is almost over by the time you land. All you really get to do is watch Voss take on the tattooed hulk who surely leads the Lead Saints. It's mere moments before he falls into the same bloody pile as his highwaymen.\n                              *goto Voss-win\n                    #\"It's not safe in Franklin. You need to leave.\"\n                      *set Deception %+15\n                      *if Persuasion > 65\n                        \"There are lives at stake, and not just yours,\" you say, not even knowing if your words are true. \"If you leave now, you might be able to make your way through the wasteland. If you stay or if you come back. Flora will kill you.\"\n\n                        \"That's not possible,\" he spits. \"I have a whole security force.\"\n\n                        \"Where are they now?\" you ask. \"Who gave me this key? They're bought and paid for by Flora. Run now, be some other town's sheriff.\"\n\n                        He gives you one last glare, then makes his way toward the door. He makes his escape half naked the way you found him, but grabs a rifle from his footlocker before he goes. You share one final look, and then he disappears into the hallway.\n\n                        You stare out the window for a while, looking at nothing in particular, just enjoying a moment of stillness in all the chaos. Then the sound of gunfire fills the air. You see flashes from the window and fires on the ground below, making you wonder just what you've gotten yourself into.\n                        *goto Flora-win\n                      \n                      *else\n                        \"No, I need to kill you,\" he says. \n\n                        *goto c7\n\n  #\"Sure, I'll do it.\"\n    *label c4accept\n    \"That's the enthusiasm I like to hear,\" he says with a grin. \"Follow me to the penthouse and I'll give you a run-down of the plan.\"\n\n    You leave behind the twisted fortifications of the security forces and head into Franklin's tower. The lobby is a candlelit bazaar filled with shops and barterers. Anything except weapons could be bought or sold here, including ammo, excotic mutant fruits, clothing from both before and an after the war, and ancient texts such as 'Harry Potter and the Sorcerer's Stone.' Security officers with pistols and rusty armor patrol the market for any thieves or conflicts in need of resolution.\n\n    Voss leads you up a long set of stairs to the very top of the tower. The penthouse is lavishly decorated with pre-war furniture such as couches, tables, and even a bar. There are also metal cabinets and footlockers which surely hold all sorts of weapons.\n    *label c8\n    *choice\n      *disable_reuse #\"How does the head of security end up in the penthouse?\"\n        He shrugs. \"We don't have a mayor, so I'm really the only one in charge 'round here. So, it's mine.\"\n        *goto c8\n      *disable_reuse #\"How did you end up as head of security?\"\n        \"Last guy died. Nobody else wanted the job, except for people who weren't good at the ones they had.\"\n        *goto c8\n      #\"So, what's this job involve?\"\n        \"Like I said, you're helping with a highwaymen problem,\" he says. \"They want to take Franklin over, I don't wanna let that happen. Y'know, the usual.\"\n\n        \"I know that. You still haven't said what I'm doing.\"\n\n        \"Well, that's kinda tough to explain. Basically, you're bait,\" he says.\n\n        \"Bait?\" you ask.\n\n        \"Bait.\"\n        *choice\n          #\"That's ridiculous.\"\n            \"You're not wrong, but we're out of ideas,\" he says. \n            *goto c9\n\n          #\"Why not have one of your men do it?\"\n            \"Because they're smart enough to know when to say no,\" he says. \n            *goto c9\n\n          #\"As long as I don't have to kill people.\"\n            \"They aren't people, they're feral highwaymen. It's no different than putting down a rabid dog, even for a bleeding heart like you,\" he says with a snicker. \n            *goto c9\n\n          #\"Sounds fun.\"\n            \"That's the kind of enthusiasm I like,\" he says. \n            *goto c9\n            *label c9\n            \"So, I've got three ideas. You can pick your favorite. First, you could take some shots at the gang's base. The Lead Saints, they're a little antsy, and so is their leader Gizmo, since he's been trying to escape some enemy in the wasteland. This would draw him out and let our sharpshooters take him down. The second idea is you taking him out with a sniper rifle, which removes the whole 'bait' aspect of the plan. Once Gizmo's gone, they're probably fall apart like all gangs do.\"\n\n            \"And what's the third plan?\" you ask.\n\n            \"Asking him nicely to please leave us alone. So, what's your favorite?\"\n            *choice\n              #Drawing him out\n                *set Caution %-10\n                *set Sadism %+10\n                You walk back into the wasteland, gun in your hands and Franklin at your back. You can feel the eyes of Voss and his security guards on your back as you head toward the ruins. Gizmo and his Lead Saints are said to have set up a base there, in an old disheveled cathedral.\n\n                The cathedral is a massive grey structure decorated with ornate symbols that certainly made more sense to the ancients. You aren't quite sure what the \"t\"s and colorful glass are supposed to mean, but it probably doesn't matter. A tattered flag rises above its towers, depicting a bullet with wings. A bullet. With wings. Creative.\n\n                You're too far from Franklin for Voss and his men to be of any help, and you're starting to wonder if this bait plan was a good idea, but it's too late. The catherdral is in sight now, as are the makeshift defenses that the Lead Saints set up. A few highwaymen clad in leather and rusted steel stand guard, too close to one another to effectively keep watch over their perimeter.\n                *choice\n                  #Spray and pray\n                    *if Combat > 70\n                      You open fire before the highwaymen even spot you. They fall into bloody piles, writhing on top of one another. Some manage to return fire, but they're too startled by your presence to land a hit.\n\n                      *goto c10\n                    *else\n                      *set Health %-22\n                      The highwaymen spot you before you even open fire. A bullet pierces your shoulder and pain tears across your body as you shoot at them. They fall into bloody piles, writhing on top of one another, choking on their own blood.\n\n                      *goto c10\n                  #Take cover and open fire\n                    *if Combat > 70\n                      You take cover behind some grey rubble that chipped off the cathedral long ago and open fire before the highwaymen even spot you. They fall into bloody piles, writhing on top of one another. Some manage to return fire, but they're too startled by your presence to land a hit.\n\n                      *goto c10\n\n                    *else\n                      *set Health %-12\n                      You take cover behind some grey rubble that chipped off the cathedral long ago. The highwaymen spot you before you even open fire. A bullet pierces your shoulder and pain tears across your body as you shoot at them, despite your cover. They fall into bloody piles, writhing on top of one another, choking on their own blood.\n\n                      *goto c10\n\n                  #Taunt the highwaymen to draw them out\n                    *if Combat > 70\n                      \"Dead Saints, come out and pla-a-a-a-ay,\" you shout, hands cupped around your mouth. \n\n                      You open fire on the highwaymen who come to investigate your taunts. They fall into bloody piles, writhing on top of one another. Some manage to return fire, but they're too startled by your presence to land a hit.\n\n                      *goto c10\n\n                    *else\n                      *set Health %-26\n                      \"Dead Saints, come out and pla-a-a-a-ay,\" you shout, hands cupped around your mouth. \n\n                      You try to open fire on the highwaymen who come to investigate your taunts, but they aren't playing around. A bullet pierces your shoulder and pain tears across your body as you shoot at them. They fall into bloody piles, writhing on top of one another, choking on their own blood.\n\n                      *goto c10\n\n                      *label c10\n                      The sound of gunfire and dying highwaymen draws the attention of the other Lead Saints inside the cathedral. The first to burst through its great double doors is a hulking man covered in tattoos and scars, clad in metal armor. Surely this is Gizmo, ruler of this gang.\n                      *choice\n                        #Run, like you planned\n                          *set Caution %+8\n                          *set Sadism %-9\n                          *label c12\n                          The ground flies beneath your feet as your rush, wind in your face, back toward the safety of Franklin's shadow. The highwaymen follow at your heels like a pack of rabid dogs, firing at you but missing as you navigate the ruins.\n\n                          Your face goes flush and your heart is about to burst as you reach Franklin, and Gizmo is right behind you.\n\n                          Then an eardrum-shattering series of shots rings out and the highwaymen behind you fall to the ground. You look over your shoulder, just for a second, and watch them flailing in their own blood. Even Gizmo, the towering tyrant, is felled by the many bullets that fire on him.\n\n                          The plan worked flawlessly and you expect to find a welcoming party when you return to Franklin. Instead, you find bodies.\n                          *label c14\n                          *page_break\n                          *set VFranklin 1\n                          You're ready for violence, but the battle has already ended. A dozen or so lie dead between the tower and the gate - both civilian and security. Voss is there to greet you, blood on his cheek and a smile beside it.\n\n                          \"Glad you made it back in one piece,\" he says. \n\n                          \"What the hell happened here?\"\n\n                          Then some of the guards drag prisoners from the building. Most are bloody and beaten. One is a young woman with thin hips and dark skin. She's the only one who doesn't put up a fight against her captors.\n\n                          \"This is Flora,\" says Voss. \"Our resident information dealer. She's the one who tried to get Gizmo to invade. I take it he's been dealt with?\"\n\n                          \"He won't be a problem,\" you confirm. \n\n                          \"Then we've won,\" he says with a smile. Then he hands you a scrap of paper. It's a map marking all the roads and towns near Philly, but it's called Philadelphia. Someone wrote over it with the name's of other towns like Fulfillment and the Dutch Mill. The large X near a nameless town is the place you're meant to go. \"I believe this is the map you asked for.\"\n\n                          \"What happens now?\" you ask.\n\n                          \"I'd offer to let you stay, but we need time to mourn the dead and execute the prisoners, and your presence would keep a lot of wounds open,\" Voss explains. \"Feel free to come back in a few weeks and we'd be happy to have our hero in town.\" \n                          *goto franklinend\n\n                        #Kill the warlord\n                          *label c17\n                          *set Caution %-8\n                          *set Sadism %+9\n                          *set Deception %-10\n                          *if Combat > 65\n                            *set Notoriety %+20\n                            The sound of screaming fills your ears and you soon realize that it's coming from you. Your bullets fly toward Gizmo, the towering tyrant, and glide smoothly through the breaks in his armor. To your surprise, he falls before ever reaching you, dead or almost.\n\n                            But the rest of the Lead Saints don't stop. If anything, they start running faster.\n\n                            The ground flies beneath your feet as your rush, wind in your face, back toward the safety of Franklin's shadow. The highwaymen follow at your heels like a pack of rabid dogs, firing at you but missing as you navigate the ruins.\n\n                            Then an eardrum-shattering series of shots rings out and the highwaymen behind you fall to the ground. You look over your shoulder, just for a second, and watch them flailing in their own blood. Even Gizmo, the towering tyrant, is felled by the many bullets that fire on him.\n\n                            The plan didn't go exactly as you'd wanted, but the job got done. You expect to find a welcoming party when you return to Franklin. Instead, you find bodies.\n                            *goto c14\n\n                          *else\n                            *set Health %-19\n                            The sound of screaming fills your ears and you soon realize that it's coming from you. Your bullets fly toward Gizmo as he rushes toward you, but bounce impotently off his metal armor. A stray bullet finds its way into your arm, and the pain forces youto make the only logical decision: you run, like you were supposed to.\n\n                            *goto c12\n\n                        #Talk it out\n                          *set Caution %+8\n                          *set Sadism %-9\n                          *if Persuasion > 65\n                            *set Notoriety %+5\n                            \"Gizmo, right?\" you ask, holstering your gun.\n\n                            He holds up a hand when his men take aim at you. \"What's it to you?\"\n\n                            \"Sorry about your boys,\" you say. \"I didn't want to kill them, but things aren't always under my control.\"\n\n                            *label c20\n                            \"Tell me what you want before I tear your spine out through your throat.\"\n                            *choice\n                              #\"I want you to leave Franklin alone.\"\n                                \"Why?\" he asks. \"Why would I do that?\"\n                                *choice\n                                  #\"You think I'm the only merc Voss hired?\"\n                                    \"There Eagles are on their way, and you know how they feel about highwaymen,\" you lie.\n\n                                    Gizmo just smirks. \"Enemies in the north and enemies on the way. Guess we'll have to head south. But let me give you some advice: get out of Philly while you still can.\"\n\n                                    He walks away before you can ask what he means, so you turn back to Franklin.\n\n                                    The plan didn't go exactly as you'd wanted, but the job got done. You expect to find a welcoming party when you return to Franklin. Instead, you find bodies.\n                                    *goto c14\n\n                                  #\"I work for the Daughters of Liberty.\"\n                                    \"My job was to scout out Franklin for potential threats. As soon as Voss told me about you boys, I sent a letter back to ReVivienne,\" you lie. \"Your days are officially numbered.\"\n\n                                    Gizmo just smirks. \"Enemies in the north, enemies in the east. Guess we'll have to head south. But let me give you some advice: get out of Philly while you still can.\"\n\n                                    He walks away before you can ask what he means, so you turn back to Franklin.\n\n                                    The plan didn't go exactly as you'd wanted, but the job got done. You expect to find a welcoming party when you return to Franklin. Instead, you find bodies.\n                                    *goto c14\n\n                                  #\"Voss has rigged the tower to explode.\"\n                                    \"He's willing to destroy Franklin if it means spiting the Lead Saints,\" you lie. \"You won't even notice the C4 until it's too late. Find another village to bully.\"\n\n                                    Gizmo just smirks. \"Maybe you're right, merc. We'll look for something easier to take, something up north. But let me give you some advice: get out of Philly while you still can.\"\n\n                                    He walks away before you can ask what he means, so you turn back to Franklin.\n\n                                    The plan didn't go exactly as you'd wanted, but the job got done. You expect to find a welcoming party when you return to Franklin. Instead, you find bodies.\n                                    *goto c14\n\n                              #\"I want to help you conquer Franklin.\"\n                                \"Why?\" he asks. \"What's in it for you?\"\n                                *choice\n                                  #\"Franklin needs an army worthy of protecting it.\"\n                                    Gizmo just smirks. \"It's nice to see someone respects us for what we do.\"\n\n                                    \"So, how can I help?\" you ask.\n\n                                    \"Go back to Franklin and open the gates. We'll take care of the rest.\"\n                                    *goto betray1\n                                  #\"I wanna see Voss die.\"\n                                    Gizmo just smirks. \"It's nice to see someone who shares my views.\"\n\n                                    \"So, how can I help?\" you ask.\n\n                                    \"Go back to Franklin and open the gates. We'll take care of the rest.\"\n                                    *goto betray1\n\n                                  #\"My reasons don't matter.\"\n                                    Gizmo just smirks. \"It's nice to see someone who enjoys violence for its own sake..\"\n\n                                    \"So, how can I help?\" you ask.\n\n                                    \"Go back to Franklin and open the gates. We'll take care of the rest.\"\n                                    *goto betray1\n\n                                    *label betray1\n                                    *page_break\n                                    *set Notoriety %+8\n                                    *set Deception %+20\n                                    *set Sadism %+20\n                                    *set Cruelty %+20\n                                    *set Caution %-10\n                                    *set FGFranklin 1\n                                    *set Villain 1\n                                    \"He's dead,\" you say as Voss opens the gate for you. \n\n                                    The security team erupts in cheers and you have expect them to try and carry you on their shoulders. You laugh and cheer with them, and then Voss pulls out some bottles of moonshine, likely distilled locally.\n\n                                    You drink with them, though not nearly as much as some of them, and enjoy the tower-wide party. It's not every day a warlord dies.\n\n                                    Then they all pass out. Some make it back to their barracks while others sleep besides their vomit buckets. That's when you sneak over to the pulley system that controls the gate. You pull down on the levers with all your might, and the gate lifts with a metallic screech.\n\n                                    Then the world ends all over again.\n                                    *page_break\n                                    You get a front-row view of the conquest of Franklin. It's a terrible, violent massacre. The drunk security officers utterly fail to fight back against their invaders, and you wonder if their screams will ever stop.\n\n                                    To your surprise, a group of citizens also fights alongside the highwaymen. Their leader, a dark-skinned woman with a dainty figure steps forward and addresses you over the noise of gunshots and screams.\n\n                                    \"The name's Flora,\" she says. \"I hear you're the one we have to thank for this change in management. I've been looking to oust Voss for some time.\" Then she hands you a scrap of paper. \"That's the map you've been looking for, no?\"\n\n                                    The map marks all the roads and towns near Philly, but it's called Philadelphia. Someone wrote over it with the name's of other towns like Fulfillment and the Dutch Mill. The large X near a nameless town is the place you're meant to go. \"How did you know that?\"\n\n                                    \"It's my job to know everything,\" she says. \"I'm sorry to say that, during this time of transition, I cannot allow an outsider to remain. I'm sure you'd wish to see Voss's execution, but frankly we haven't even captured him yet. Don't worry, we will, and you should feel free to come back in a few weeks when things have calmed down.\"\n                                    *choice\n                                      #\"Did this whole plan really rely on me showing up?\"\n                                        \"Of course not,\" she says. \"You merely gave us the chance to act earlier. Bye-bye now.\"\n                                        *goto franklinend\n\n                                      #\"What's gonna happen to the people here?\"\n                                        She shrugs. \"Most will live their lives just as they had before. The rebels will probably be sold as slaves. Bye-bye now.\"\n                                        *goto franklinend\n\n                                      #\"Tell Gizmo he owes me one.\"\n                                        \"I'm sure he already knows that,\" she says. \"Bye-bye now.\"\n                                        *goto franklinend\n\n\n                          *else\n                            \"I think we can talk this out and overcome our distances,\" you offer.\n\n                            \"You think wrong,\" Gizmo says. Then he starts running toward you.\n\n                            *goto c12\n\n              #Sniping him from a distance\n                *set Caution %+10\n                *set Sadism %+3\n                If nothing else, this stealthier method ensures that you'll be able to escape after putting a bullet in Gizmo's head. So, Voss hands you a high-caliper scoped rifle and wishes you luck.\n\n                \"How will I know which one's Gizmo?\" you ask.\n\n                He chuckles. \"You'll know him when you see him.\"\n\n                You walk back into the wasteland, gun in your hands and Franklin at your back. You can feel the eyes of Voss and his security guards on your back as you head toward the ruins. Gizmo and his Lead Saints are said to have set up a base there, in an old disheveled cathedral.\n\n                The cathedral is a massive grey structure decorated with ornate symbols that certainly made more sense to the ancients. You aren't quite sure what the \"t\"s and colorful class is supposed to mean, but it probably doesn't matter. A tattered flag rises above its towers, depicting a bullet with wings. A bullet. With wings. Creative.\n\n                You're too far from Franklin for Voss and his men to be of any help, so you're all alone in the wasteland.\n\n                Since you're sniping, you'll need to find a good vantage point where you can take position. Whichever one you pick should give you a nice clean shot, straight into the cathedral. Lucky for you, there are three spots that work.\n                *choice\n                  #A nearby apartment building\n                    This building, like many, was once home to all sorts of people. You see signs of those inhabitants everywhere as you ascend the stairs and rush down hallways. Old cloth animals, paper with faces on them, and even some rotted, worn clothing. The rats picked this place over of food long ago, leaving only artifacts and a few skeletons. They rest in chairs or on the floor or on beds - the skeletons - as if they died instantly, before they could even rise or take cover.\n\n                    You leave the artifacts and skeletons behind and head up to the roof, back in the crisp wasteland air and away from unimportant histories.\n\n                    *goto c15\n\n                  #The roof of a Wawa\n                    Wawas decorate the landscape of the Philly wasteland, though they have long since been raided of all their gas and food. You've been told they were once religious sites where the faithful would break bread on their pilgrimages. Now they rest in shambles, just like the cathedral and every other building in the world.\n\n                    You take position atop the rickety roof that once overshadowed gasoline pumps. Somehow, the stench of gas is still there, fresh and sour as ever. The roof creaks beneath your weight and the metal groans, but it seems like it will hold.\n\n                    *label c15\n                    You close one eye and press the other to the scope of the rifle Voss had given you. It gives you a clear view of the cathedral, including its colorful glass windows. Highwaymen patrol the outside, chatting idly behind makeshift barriers. Others still wait inside, colored by the glass.\n\n                    Gizmo doesn't appear to be among them. You can either wait for him to make his way outside, or shoot at his men until he shows up. Maybe you could even cause a distraction by shooting out those windows.\n                    *choice\n                      #Wait for him\n                        *set Caution %+8\n                        Patience is a virtue, or so you tell yourself while you peer through the scope of the rifle. There's some movement inside the cathedral, but it's hard to make out through the stained glass.\n\n                        Then he appears. Tattoos, scars, and fierce metal armor, he stands at least a head taller than the rest of his men. Surely this is Gizmo.\n\n                        *label c16\n                        *if Stealth > 65\n                          *set Notoriety %+7\n                          One squeeze of the trigger is all it takes. The rifle pushes back, violently, against your shoulder. The sound echoes across the ruins and he drops dead, blood spilling onto the dust, with his armor-clad highwaymen staring dumbly at his corpse.\n\n                          The ground flies beneath your feet as your rush, wind in your face, back toward the safety of Franklin's shadow. The Lead Saints never even spotted you.\n\n                          The job was completed pefectly. You expect to find a welcoming party when you return to Franklin. Instead, you find bodies.\n                          *goto c14\n\n                        *else\n                          *set Health %-18\n                          They spot you before you take him out. It must have been the glare from the scope or something. \n\n                          The next few minutes are a rushed panic as you try to snipe as many of them as possible, all while retreating from your cover. By sheer luck, one of your bullets finds Gizmo's head, and he falls back in the dust, certainly dead.\n\n                          The ground flies beneath your feet as your rush, wind in your face, back toward the safety of Franklin's shadow. The highwaymen follow at your heels like a pack of rabid dogs, firing at you but missing as you navigate the ruins.\n\n                          Then an eardrum-shattering series of shots rings out and the highwaymen behind you fall to the ground. You look over your shoulder, just for a second, and watch them flailing in their own blood. Even Gizmo, the towering tyrant, is felled by the many bullets that fire on him.\n\n                          The plan didn't go exactly as you'd wanted, but the job got done. You expect to find a welcoming party when you return to Franklin. Instead, you find bodies.\n                          *goto c14\n\n                      #Kill his men to lure him out\n                        *set Caution %-5\n                        Your bullets find their way into the bodies of your targets. Mostly chest shots, mostly non-lethal. The highwaymen frenzy and shout, searching for the source of the gunshots as they brothers in arms fall dead.\n\n                        Then he bursts through the cathedral doors. Tattoos, scars, and fierce metal armor, he stands at least a head taller than the rest of his men. Surely this is Gizmo.\n\n                        *goto c16\n\n                      #Cause a distraction\n                        *set Caution %+5\n                        Your bullets find their way crashing through the colorful windows of the cathedral. Their depictions of ancient figures and symbols shatter and fall away, causing the highwaymen to search that area frantically. \n\n                        Another man soon joins them, looking around for the culprit. Tattoos, scars, and fierce metal armor, he stands at least a head taller than the rest of his men. Surely this is Gizmo.\n\n                        *goto c16\n\n                  #A rusty water tower\n                    This water tower, like all others in the area, ran dry long ago. Perhaps it was in the chaos that came after the bombs, or before when resources were scarce. Now they're parched as bones.\n\n                    You take position atop it, making sure not to get cut on the rust. The stench of dead iron fills the air like rot from a corpse. Ths structure echoes hollowly beneath your feet, and you can hardly believe that there was a time when this whole thing could be filled with water.\n\n                    *goto c15\n\n              #Talking to him politely\n                *set Caution %+10\n                *set Sadism %-10\n                You walk back into the wasteland, gun in your hands and Franklin at your back. You can feel the eyes of Voss and his security guards on your back as you head toward the ruins. Gizmo and his Lead Saints are said to have set up a base there, in an old disheveled cathedral.\n\n                The cathedral is a massive grey structure decorated with ornate symbols that certainly made more sense to the ancients. You aren't quite sure what the \"t\"s and colorful class is supposed to mean, but it probably doesn't matter. A tattered flag rises above its towers, depicting a bullet with wings. A bullet. With wings. Creative.\n\n                You're too far from Franklin for Voss and his men to be of any help, and you're starting to wonder if this plan is too idiotic to work. But the highwaymen have spotted you, so it's too late to turn back. \n\n                You raise your hands and hope that they take some mercy on you, and don't open fire. And lucky for you, they're feeling merciful.\n\n                \"You're in the wrong neighborhood,\" says one of them. They're all clad in that strange mix of leather and metal that highwaymen seem to love so much.\n\n                \"I'm here to meet with Gizmo,\" you say.\n\n                Then he emerges from the double doors of the cathedral. Tattoos, scars, and fierce metal armor, he stands at least a head t
