white bile. It reeks unmistakeably of death - an odor made common in this savage world. Then you notice the skeletons around them. As if piled together, or herded by someone, dozens of human skeletons lie in a mound, blackened and broken, some small and some large.\n\n\t\t\t\t\t\"My guess is highwaymen slaughtered the settlers,\" says Olivia. Her silvery smile is gone, replaced by a look of pure, genuine grief. \"Then the bastards found out there was nothing here to steal, so they left. That's when the Buzzers came along, looking for food.\"\n\n\t\t\t\t\tThe bones had been picked clean, certainly long ago. Buzzers have no customs for burying the dead - they're insects, after all. Highwaymen too lack those social customs. Makes you wonder if they're any different than animals and mutant monsters.\n\n\t\t\t\t\tOlivia sighs at the sight of so many lights snuffed out. \"Come on, let's see if there's any decent loot before we make a move for the nest.\"\n\n\t\t\t\t\tThe large barracks building is clearly the nest. It's where the Buzzers congregated and it's where they seemingly defended. So, you follow Olivia to a row of houses on the far side of the town.\n\n\t\t\t\t\tShe leads the way, gun cocked just in case, into an old house that appears mostly intact. It's a messy, sparsely furnished two story. The foods all rotted and tiny bugs rush away from you with each step. The only noteworthy part of the house is the set of two suitcases, one large and one small. The large one has clothing, a book without a cover or most of the pages, and some odds and ends. The smaller one has a teddy bear and some dresses.\n\n\t\t\t\t\t\"Found some stuff you might like!\" Olivia calls out from upstairs.\n\n\t\t\t\t\tYou meet her at the top of the rickety wooden steps. In her hands are three items. A rusty iron sight that could fit onto your gun, a book titled \"How to Talk Dirty and Influence People,\" and a pair of new boots, much smaller and lighter than yours. \"Pick one,\" she says. \"Whoever owned them doesn't need 'em now.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the sights\n\t\t\t\t\t\t\t*set Combat +10\n\t\t\t\t\t\t\tA good sight, carefully balanced and well maintained, is worth more than even ammunition in the wasteland. All you have to do is wipe away some of the rust, and soon you'll be shooting with pinpoint accuracy.\n\n\t\t\t\t\t\t\tThe sight has a metal ring that connects easily to the top of your gun with a metal [i]clack[/i], as if they were made to be together. The ways of the ancients are still a mystery to most, but their genius can be seen in so many ways. It takes true intuition to create a modification that can fit multiple weapons, and it takes even greater industry to create enough for everyone.\n\n\t\t\t\t\t\t\tThen again, if there was enough for everyone then you'd likely live in a very different world. You relate this feeling to Olivia, and she simply says, \"It's best not to dwell on the could-be's in life. There are a million could-be's and all we got are never-were's. I prefer to look to what we can make instead of what we lost. Guess I was never the nostalgic type.\"\n\n\t\t\t\t\t\t\tThat was the most talking you did before getting ready for the next fight. The Buzzers were not yet down, and the job was not yet done.\n\t\t\t\t\t\t\t*goto buzzers2\n\n\t\t\t\t\t\t#Take the book\n\t\t\t\t\t\t\t*set Persuasion +10\n\t\t\t\t\t\t\tThe pages smell sharp, yet stale and ancient with mold. Someone once told you that the smell of new books was magical, but you don't recall ever seeing a new book, just old ones. This one in particular, \"How to Talk Dirty and Influence People,\" is an instructional guide on befriending and persuading others. There also appear to be tips about having sex, though you feel you're fine in that department.\n\n\t\t\t\t\t\t\tThe sight of a book bound with such expertise that it outlived the apocalypse is inspiring. The ways of the ancients are still a mystery to most, but their genius can be seen in so many ways. It takes true intuition to find such insight into human behavior. It takes even greater industry to make that knowledge readily available to everyone.\n\n\t\t\t\t\t\t\tThen again, if that knowledge was so easily accessible then you'd likely live in a very different world. You relate this feeling to Olivia, and she simply says, \"It's best not to dwell on the could-be's in life. There are a million could-be's and all we got are never-were's. I prefer to look to what we can make instead of what we lost. Guess I was never the nostalgic type.\"\n\n\t\t\t\t\t\t\tThat was the most talking you did before getting ready for the next fight. The Buzzers were not yet down, and the job was not yet done.\n\t\t\t\t\t\t\t*goto buzzers2\n\n\t\t\t\t\t\t#Take the boots\n\t\t\t\t\t\t\t*set Stealth +10\n\t\t\t\t\t\t\tA good pair of boots, unmarred by age and wear, are a rare and valuable commodity in the wasteland. These soft-soled boots will keep your footprints light and your steps silent, allowing you to more easily move without being noticed. \n\n\t\t\t\t\t\t\tYou cannot help but admire the craftsmanship of the boots. The leather has hardly flaked in the ages since the apocalypse, and this truly speaks to the greatness of its creators. The ways of the ancients are still a mystery to most, but their genius can be seen in so many ways. It takes true intuition to turn cattle hide into a durable material. It takes even greater industry to make that material readily available to everyone.\n\n\t\t\t\t\t\t\tThen again, if there was enough for everyone then you'd likely live in a very different world. You relate this feeling to Olivia, and she simply says, \"It's best not to dwell on the could-be's in life. There are a million could-be's and all we got are never-were's. I prefer to look to what we can make instead of what we lost. Guess I was never the nostalgic type.\"\n\n\t\t\t\t\t\t\tThat was the most talking you did before getting ready for the next fight. The Buzzers were not yet down, and the job was not yet done.\n\t\t\t\t\t\t\t*goto buzzers2\n\n\t\t\t\t\t\t\t*label buzzers2\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tOlivia brings you to the wide, three-story building you assume to be the barracks. It's where the human skeletons are most concentrated, and where the smaller of the Buzzers seem to have died. As you approach the building, that terrible buzzing sound returns to your ears, just as obnoxious and frightening as it was the first time.\n\n\t\t\t\t\t\t\t\"Well, what's the plan?\" she asks.\n\t\t\t\t\t\t\t*label c3\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"Storm the castle.\"\n\t\t\t\t\t\t\t\t\t*set Caution %-12\n\t\t\t\t\t\t\t\t\t\"I like the way you think,\" she says. \"Let's go.\"\n\n\t\t\t\t\t\t\t\t\tYou plunge into the building, adrenaline pumping through your veins, guns leveled and the sound of buzzing in your ears. You and Olivia silently work your way down a hallway, investigating each room of the barracks for the noisy Buzzers. You find bunk beds and empty footlockers and even a few charred black skeletons, but no moths.\n\n\t\t\t\t\t\t\t\t\t\"We should spit up,\" she says. \"You check upstairs and I'll head to the basement. If you find anything, call me. Don't engage alone.\"\n\n\t\t\t\t\t\t\t\t\tYou lose sight of her as you work your way up the stairs, finding another level just like the first. More barracks. More bunk beds and footlockers and abandoned skeletons who have been cleaned by the teeth of scavenging monsters. \n\n\t\t\t\t\t\t\t\t\tThe entire search is a daze of boredom and repetition, as many days in the wasteland are. Then a scream rings out. Not one of pain or fear, but of frustration. It's followed by the beat of bullets and intense buzzing. You don't even think before you start moving. The floorboards fly beneath your feet as you rush down the stairs, toward the angry howls of Olivia Buckshot.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tYou follow the sound of enraged screaming down a rickety set of steps, barely remembering to breathe as you rush toward your endangered ally in the darkness of the basement.\n\n\t\t\t\t\t\t\t\t\t*goto c5\n\n\t\t\t\t\t\t\t\t#\"Let's find a back entrance and clear it out.\"\n\t\t\t\t\t\t\t\t\t*set Caution %+12\n\t\t\t\t\t\t\t\t\t\"I like the way you think,\" she says. \"Let's go.\"\n\n\t\t\t\t\t\t\t\t\tYou slink cautiously into the building, adrenaline pumping through your veins, guns leveled and the sound of buzzing in your ears. You and Olivia silently work your way down a hallway, investigating each room of the barracks for the noisy Buzzers. You find bunk beds and empty footlockers and even a few charred black skeletons, but no moths.\n\n\t\t\t\t\t\t\t\t\t\"We should spit up,\" she says. \"You check upstairs and I'll head to the basement. If you find anything, call me. Don't engage alone.\"\n\n\t\t\t\t\t\t\t\t\tYou lose sight of her as you work your way up the stairs, finding another level just like the first. More barracks. More bunk beds and footlockers and abandoned skeletons who have been cleaned by the teeth of scavenging monsters. \n\n\t\t\t\t\t\t\t\t\tThe entire search is a daze of boredom and repetition, as many days in the wasteland are. Then a scream rings out. Not one of pain or fear, but of frustration. It's followed by the beat of bullets and intense buzzing. You don't even think before you start moving. The floorboards fly beneath your feet as you rush down the stairs, toward the angry howls of Olivia Buckshot.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tYou follow the sound of enraged screaming down a rickety set of steps, barely remembering to breathe as you rush toward your endangered ally in the darkness of the basement.\n\n\t\t\t\t\t\t\t\t\t*goto c5\n\n\t\t\t\t\t\t\t\t*hide_reuse #\"You should go in first. Make sure it's safe.\"\n\t\t\t\t\t\t\t\t\t\"Why would I do something dumb like that?\" she asks with an odd mix between a glare and a smirk.\n\t\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t\t#\"Because you're the tough one here.\"\n\t\t\t\t\t\t\t\t\t\t#\"Because I'll have your back. I wouldn't let anything hurt you.\"\n\t\t\t\t\t\t\t\t\t\t#\"Because you're a daredevil, right?\"\n\n\t\t\t\t\t\t\t\t\t*if Persuasion > 35\n\t\t\t\t\t\t\t\t\t\tShe chuckles and says, \"Fine. If you hear me dying, you better get your butt in there.\"\n\n\t\t\t\t\t\t\t\t\t\t\"Yes ma'am,\" you say. \n\n\t\t\t\t\t\t\t\t\t\tShe slinks through one of the broken windows and into the barracks. After a few minutes you lose sight of her in the darkness. She seems to have gone downstairs, perhaps into the basement. That seems like the most logical place for an evil bug nest.\n\n\t\t\t\t\t\t\t\t\t\tYou wait for what seems like forever, until the sound of gunshots rattles you out of your daze. They ring out like a scream. No, that's an actual scream. Olivia is screaming, and it rattles you down to your core.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Go help her\n\t\t\t\t\t\t\t\t\t\t\t\t*set Sadism %-14\n\t\t\t\t\t\t\t\t\t\t\t\t*set Cruelty %-16\n\t\t\t\t\t\t\t\t\t\t\t\t*set Deception %-20\n\t\t\t\t\t\t\t\t\t\t\t\t*set Caution %-14\n\t\t\t\t\t\t\t\t\t\t\t\tYou plunge into the building, adrenaline pumping through your veins. You run without a thought and without hesitation, passing room after room of bunk beds and footlockers, following the sounds of tragic gunfire and horrific buzzing down a rickety set of wooden steps. \n\n\t\t\t\t\t\t\t\t\t\t\t\t*label c5\n\t\t\t\t\t\t\t\t\t\t\t\tThere you find Olivia, gun toted and bullets flying as dozens of Buzzers flit toward her. The whole basement smells stale and each wall is covered with some kind of thick material made of a tightly packed dirt and some kind of webbing. Pores in the material host translucent eggs and some even hold more Buzzers, who compactly fit themselves in before flitting toward their targets.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Shoot them!\" she shouts, barely turning to note your presence.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Spray and pray\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Caution %-8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if Combat > 35\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou open fire on the Buzzers, unleashing lead with your usual skill. The adrenaline in your blood looses a feeling of detatchment as you shoot. It is not you who does the fighting. You simply watch as your hands go through the motions. Squeezing the trigger, accounting for recoil, keeping the sights trained on the flitting moths, and reloading. Rinse, repeat. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou step back carefully when the Buzzers make progress, and when new ones from the hive join their brothers and sisters. Each time their numbers dwindle, more come to replace them. This is why Buzzers were so quick to terrorize the wastes. So, you keep shooting.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt seems like hours or maybe minutes since you arrived, but the Buzzers fall dead. Their hard exoskeletons fall to the ground in pools of noxious bile. Your ears ring as the sounds of gunfire fade, but the sound of buzzing remains, coming from deeper in the basement.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto c4\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label c4\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Quite the exterminator,\" says Olivia, stepping over the twisted carcasses of the Buzzers. They crumble into dust and bile all around you. Pink meat slips out from their hard shelling, unappetizing and sickening to look at. There are many disgusting meats you've eaten in the wasteland, out of desire to try something new or out of sheer hunger. You could never imagine yourself eating Buzzer.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Now what?\" you ask. The buzzing still emerges from somewhere else in the basement.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Now we kill the queen,\" she says with her silvery smile.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tMost unusually, there is a basement beneath this one. A sub-basement, Olivia calls it. They must have been somewhat common among the ancients, especially in large buildings with much to store. The sub-basement is a mess of web and nesting material and all sorts of ancient tools hidden in crates and wrapped beneathed the webbed layers.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAt the edge of the sub-basement, beyond the webs and nesting and crates, is the Buzzer queen, lying flush against the wall. She's easily twice as big as the largest of her kind, but she does not move or flit or even buzz. She simply rests, watching over her cocooned children, not even noting the humans in her presence. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Poor thing probably just laid some eggs,\" says Olivia, cooing over the beast as if it were a child or a non-feral puppy. \"Such a shame she has to die. How do you wanna do this?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou look over the room, noting the supplies that the townsfolk and highwaymen did not scavenge - or perhaps stored.  Rusty tanks of gasoline. Ancient rat poison. Ammo. So many options.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Burn it all.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Bomber +1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Notoriety %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Caution %-8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Sadism %+8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Cruelty %+8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou douse the floors and the webs and even the crates of ammo and gunpowder with gasoline. The stale, sour smell inflames your nose, making your eyes water. Then you place the last cannister before the queen, who rests unflinchingly on the wall. Were it not for the slight movements of her thorax, you might suspect her to be dead.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOlivia takes a shot at the gas on the floor, igniting it instantly. It burns in slow arcs at first, then all at once, as if the fire had to consider its options before setting the sub-basement aflame.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou both rush from the building, barely conscious off your own movements, following Buckshot out the back door of the barracks. It only takes a moment for the smoke to start rising through the windows. Then the flames come. Then an explosion tears out, deafening and bright, and the splintered wood falls apart from the sheer collapsing impact. You watch from a distance as the roof and most of the walls cave in.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe sound of squeaking and buzzing fills the air in between collapsing portions of the building, surely crushing Buzzers trapped inside. A mushroom cloud of dust shoots up into the sky, just like in the old days when atomic hellfire fell on buildings. But those were filled with people. Only monsters live in this one.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You did good,\" she says, patting you gently on the back. The ruins of the barracks stand before you and the sounds of buzzing have faded. \"I think it's safe to assume the nest and the queen are all gone.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt's strange to see such vivid destruction. Most buildings in the wasteland are this sort of fragmented, splintered ruin, but you never actually saw the events that made them so. You never were responsible for them. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tBut the cost doesn't matter, you suppose. Black Vein is now officially Buzzer free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto dead-bugs\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Set poison traps.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Poisoner +1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Caution %+8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Deception %+8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Cruelty %+8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou cover your mouth and douse the floors and even the crates of supplies in the noxious, toxic liquid. It spills freely out of the old rusty container, making your eyes water. Then you douse the queen herself, who rests unflinchingly on the wall. Were it not for the slight movements of her thorax, you might suspect her to be dead.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOlivia leads you out of the building. The poison's made you dizzy, so you stumble a bit following her out of the barracks. Then you snap awake, in the faint sunshine behind the building.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You did good,\" she says, patting you gently on the back. For the first time since your arrival here, you don't hear buzzing.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt's strange to know yourself responsible for such vivid destruction. A few breathes in that toxic sub-basement and generations could be destroyed. Just like the effects of radiation in the old days, but you never actually saw the events that made them when they were fresh. You never were responsible for them. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tBut the cost doesn't matter, you suppose. Black Vein is now officially Buzzer free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto dead-bugs\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Shoot it. Nice and simple.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Caution %-8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Deception %-8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Sadism %+8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAll it takes is one righteous shot, and the queen falls dead. She slips down from he position mounted on the wall as bile spills from her body. She hits the ground with a loud thud and does not move, does not writhe in pain.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOlivia leads you up the stairs, muttering something about how boring this fight had been for her. Never mind the fight just before it. It's only a moment before you're back outside, at the rear end of the barracks.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You did good,\" she says, patting you gently on the back. For the first time since your arrival here, you don't hear buzzing.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt's strange to know yourself responsible for such vivid destruction. A few bullets and generations could be destroyed. Just like the conventional wars of the old days, the ones that lead to these days. But you never saw their horrors. You never were responsible for them. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tBut the cost doesn't matter, you suppose. Black Vein is now officially Buzzer free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto dead-bugs\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Health %-12\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou fire clumsily at the Buzzers. Some of your bullets hit the their skeletal exteriors, but most fly far of their targets. The adrenaline and fear in your blood scatter your mind, sending you into a blind panic as you shoot at everything that moves.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe world becomes a haze of stingers and buzzing.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Hey!\" shouts a voice. \"Stay with me!\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOlivia's voice brings you back to the present and refocuses your mind, like a gun being reloaded. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou step back when the Buzzers make progress, and when new ones from the hive join their brothers and sisters. Each time their numbers dwindle, more come to replace them. This is why Buzzers were so quick to terrorize the wastes. So, you keep shooting.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt seems like hours or maybe minutes since you arrived, but the Buzzers fall dead. Their hard exoskeletons fall to the ground in pools of noxious bile. Your ears ring as the sounds of gunfire fade, but the sound of buzzing remains, coming from deeper in the basement.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto c4\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Find cover\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Caution %+8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou rush to cover behind a web-covered locker strewn across the ground. The thick, white material clings to your skin and clothes as you look over the locker's edge. Cool steel beneath the webbing digs into your arms, stable enough for you to use as cover, if a bit shorter than you'd prefer.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if Stealth > 35\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou fire with precision refined by years of wasteland combat. Firing from behind cover is a necessity in the wastes. Too many people. Too many guns. While some might think of hiding behind cover as cowardice, those who do so tend to live a lot longer.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe battle is upon you and you unleash lead with your usual skill. The adrenaline in your blood looses a feeling of detatchment as you shoot. It is not you who does the fighting. You simply watch as your hands go through the motions. Squeezing the trigger, accounting for recoil, keeping the sights trained on the flitting moths, and reloading. Rinse, repeat. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou step back when the Buzzers make progress and find better cover, and when new ones from the hive join their brothers and sisters. Each time their numbers dwindle, more come to replace them. This is why Buzzers were so quick to terrorize the wastes. So, you keep shooting.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt seems like hours or maybe minutes since you arrived, but the Buzzers fall dead. Their hard exoskeletons fall to the ground in pools of noxious bile. Your ears ring as the sounds of gunfire fade, but the sound of buzzing remains, coming from deeper in the basement.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto c4\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Health %-8\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tFiring from behind cover is a necessity in the wastes. Too many people. Too many guns. While some might think of hiding behind cover as cowardice, those who do so tend to live a lot longer. Even with this experience, you fire like a clumsy child who's never picked up a gun before.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou fire at the Buzzers. Some of your bullets hit the their skeletal exteriors, but most fly far of their targets. The adrenaline and fear in your blood scatter your mind, sending you into a blind panic as you shoot at everything that moves.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe world becomes a haze of stingers and buzzing.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Hey!\" shouts a voice. \"Stay with me!\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOlivia's voice brings you back to the present and refocuses your mind, like a gun being reloaded. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou step back when the Buzzers make progress and find better cover, and when new ones from the hive join their brothers and sisters. Each time their numbers dwindle, more come to replace them. This is why Buzzers were so quick to terrorize the wastes. So, you keep shooting.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt seems like hours or maybe minutes since you arrived, but the Buzzers fall dead. Their hard exoskeletons fall to the ground in pools of noxious bile. Your ears ring as the sounds of gunfire fade, but the sound of buzzing remains, coming from deeper in the basement.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto c4\n\n\t\t\t\t\t\t\t\t\t\t\t#Let her fend for herself\n\t\t\t\t\t\t\t\t\t\t\t\t*set Sadism %+14\n\t\t\t\t\t\t\t\t\t\t\t\t*set Cruelty %+16\n\t\t\t\t\t\t\t\t\t\t\t\t*set Deception %+20\n\t\t\t\t\t\t\t\t\t\t\t\t*set Caution %+14\n\t\t\t\t\t\t\t\t\t\t\t\tShe's a big girl. She can handle herself. Right?\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou wait outside and listen as gunshots ring out, interrupted by her cries of anger and anguish. You can only imagine the pain she's in, the wounds she's suffering, the monsters she's battling. It's a nest, after all. There could be dozens of those beasts in there.\n\n\t\t\t\t\t\t\t\t\t\t\t\tTo your surprise, the shots grow no less consistent as the hour wears on. There are a few minutes where nothing seems to happen, but then the gunfire returns as clear as ever, though you still cannot see anything from outside the building.\n\n\t\t\t\t\t\t\t\t\t\t\t\tOlivia Buckshot, you realize, must be a woman of true determination and steel to go so long against such a staunch threat and still live. Perhaps if the battle had taken a mere ten minutes then her survival would be understandable. But this has been at least an hour and she is not dead, nor is she out of ammo. Is she finding more down there? Or does she carry hundreds of bullets in that old SWAT uniform?\n\n\t\t\t\t\t\t\t\t\t\t\t\tThen the ringing sounds of gunfire stop. In the empty silence you also notice that the noise of buzzing has stopped too. \n\n\t\t\t\t\t\t\t\t\t\t\t\tShe returns from the shadows, armor intact but covered in the sickening white bile that so many injured Buzzers must have spilled onto her. A few new bleeding wounds scrape across the side of her face, and one gash bleeds through the polymer plates of her armor. \n\n\t\t\t\t\t\t\t\t\t\t\t\tHer eyes appear empty at first, then widen as her eyebrows narrow at the sight of you. \"Queen's dead. Where the hell were you?\" she asks in between ragged breaths.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Had to run off some scavengers.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*gosub trial_end\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tLying seems like the only way out of this one. She just spent an hour slaughtering some of the most dangerous monsters the wasteland ever produced, and you doubt she'd have any mercy on you for not coming to her aid.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Scavengers?\" she asks with a raised eyebrow.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"They saw that the Buzzers were gone and wanted to make a move on the town. Too many for me to fight myself, but I managed to dissaude them from coming back.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe gives you a side eye but is clearly too tired to try and prove what a liar you are. So she says, \"I need to lie down.\" And that's the end of that. She seems worse for the wear, and certianly less than happy with you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBut the cost doesn't matter, you suppose. Black Vein is now officially Buzzer free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto dead-bugs\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Had to defend some travelers.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*gosub trial_end\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tLying seems like the only way out of this one. She just spent an hour slaughtering some of the most dangerous monsters the wasteland ever produced, and you doubt she'd have any mercy on you for not coming to her aid.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Travelers?\" she asks with a raised eyebrow.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"They were heading to Franklin but some wolves were on their tail. Took me the better part of an hour to help their asses. Lucky they had some guns, otherwise it might have gone the other way.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe gives you a side eye but is clearly too tired to try and prove what a liar you are. So she says, \"I need to lie down.\" And that's the end of that. She seems worse for the wear, and certianly less than happy with you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBut the cost doesn't matter, you suppose. Black Vein is now officially Buzzer free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto dead-bugs\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Had to hide from a band of highwaymen.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*gosub trial_end\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tLying seems like the only way out of this one. She just spent an hour slaughtering some of the most dangerous monsters the wasteland ever produced, and you doubt she'd have any mercy on you for not coming to her aid.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Highwaymen?\" she asks with a raised eyebrow.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"Looked like a whole army. Probably going to Franklin, but I didn't ask.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"What were they doing here?\" she asks. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Looked like maintenence on their cars,\" you say. \"Seemed like they'd rode a while and needed to top off their tanks, not to mention replace the broken parts. Didn't have any interest in the town though.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe gives you a side eye but is clearly too tired to try and prove what a liar you are. So she says, \"I need to lie down.\" And that's the end of that. She seems worse for the wear, and certianly less than happy with you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBut the cost doesn't matter, you suppose. Black Vein is now officially Buzzer free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto dead-bugs\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label dead-bugs\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*gosub trial_end\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Notoriety %+15\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"The rest of the Buzzers should clear out in the next few days,\" says Olivia as you walk toward the rear end of the village. It's where the small, sloping mountains reach the ground. Where you're most likely to find the mine. \"They'll need a new queen. Hopefully one that'll put up more of a fight.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe goes on about the nuances of exterminating large insects while you keep your eyes on the beaten path before you. It leads passed some ancient equipment cast in yellow paint, meant for lifting or crushing, likely related to the mines. Then you see a sign and beside it, a rectangle of blackness supported by wooden poles on each side. As you get closer you see that the blackness is actually darkness - the mouth of a cave, held open by those wooden poles. The sign reads \"FLAMMABLE DEBRIS INSIDE - MASKS REQUIRED - NO FLAMES WHATSOEVER.\" It then goes on, in smaller print, to explain the legal punishments for offenders, though it seems like being burned alive is its own punishment.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Ouch,\" she says. \"Guess you'll have to get some supplies. Gas mask, flashlight. Your best bet is probably Fulfillment, northeast of here.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Will you be here when I get back?\" you ask.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe shrugs. \"Hoepfully not, this place is pretty lame. But there's a chance.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThat is the closest you get to exchanging good-byes before you find yourself back on the road, heading back east, so close to your goal yet so far. A small part of you feels that if only you could do this task, complete this quest, hold victory in your hand, then the whole world will skew itself back on course.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tSo returning to the wasteland feels as if charred fingers wrap around your heart, squeezing in mockery of your ceaseless wanderings, jeering at your wish for fulfillment.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label trial_end\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*check_purchase adfree\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if choice_purchased_adfree or not(choice_purchase_supported)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label purchased\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tRemember earlier how we told you that the first 3 chapters are available for free? This is the end of the free content.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if choice_prerelease and choice_is_web\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*subscribe {\"allowContinue\": false}\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*purchase_discount adfree 2020-02-11 $4.99 $2.99 purchased\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*abort\n\n\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\"Nice try,\" she says with a scowl. \"Let's maybe go with a different plan.\"\n\t\t\t\t\t\t\t\t\t\t*goto c3\n\n\t\t\t\t\t\t\t\t*if (Bomber > 0) #\"We should bomb it.\"\n\t\t\t\t\t\t\t\t\t*set Caution %-20\n\t\t\t\t\t\t\t\t\t\"This is a mining town,\" you say with an excited smile. \"We're bound to find some dynamite somewhere around here.\"\n\n\t\t\t\t\t\t\t\t\tShe looks at you with a raised eyebrow. \"You're a little nuts, you know that, right?\" she says.\n\t\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t\t#\"I just wanna make things explode.\"\n\t\t\t\t\t\t\t\t\t\t#\"You say that like it's a bad thing.\"\n\t\t\t\t\t\t\t\t\t\t#\"It's poetic justice. Bombs made the Buzzers, now bombs will unmake them.\"\n\n\t\t\t\t\t\t\t\t\tShe rolls her eyes and smiles reluctantly. \"Whatever you say, weirdo. Let's just find that dynamite.\"\n\n\t\t\t\t\t\t\t\t\tSo you wander back into town, toward those homes on the side of the road and their counterparts on the other. \"So, which one of these looks the most dynamite-y?\" you ask, examining the assortment of two-story buildings in various degrees of collapse.\n\n\t\t\t\t\t\t\t\t\tOlivia points to one store with a ramshackle sign falling apart above its door. The letters have mostly fallen, but there's a distinct \"GEN\". \"Looks like a general store,\" she says. \"Let's check it out.\"\n\n\t\t\t\t\t\t\t\t\tEven when villages lack large markets, like the one you saw in Franklin, they usually have at least one or two vendors. Typically they inhabit a general goods store, where they sell anything of value, often just scraping by in spite of how essential they are to their little towns.\n\n\t\t\t\t\t\t\t\t\tThis general store has been mostly cleaned out, presumably by the highwaymen who pillaged Black Vein. The second floor seems to have been burned away or blown up, and the first floor is a mess of rotted food and discarded bullet shells. The shelves that line the walls are empty, and the bins that once held fruit are full of rot. You and Olivia abandon them and their foul stench and slink passed the counter where one would have paid, toward an ajar door to the storeroom. Along the way you pass a staircase that leads to what was once a second floor, but is now nothing but splintered wood.\n\n\t\t\t\t\t\t\t\t\t\"Found something!\" shouts Olivia from the storeroom in the back.\n\n\t\t\t\t\t\t\t\t\tYou follow her to find dozens of empty crates lining the walls. They hang open, stacked haphazardly onto one another revealing nothing of value, nothing at all. Perhaps they once held great riches, or at least tradeable goods of some value. No longer. But they are not what draws Olivia's attention.\n\n\t\t\t\t\t\t\t\t\t\"It's a safe,\" she says.\n\n\t\t\t\t\t\t\t\t\tIt's a small cube of steel with what appears to be an electronic lock on one side, accessed by a keypad. She presses a few of the buttons but to no avail. No chimes ring from inside and no numbers light up.\n\n\t\t\t\t\t\t\t\t\t\"Damnit, its battery died,\" she says with a huff.\n\n\t\t\t\t\t\t\t\t\t\"What makes you even think there's dynamite in there?\" you ask.\n\n\t\t\t\t\t\t\t\t\tShe shrugs. \"Safes are for valuable things. Dynamite would be real valuable in a mining town, wouldn't ya think? I mean, that's gotta be the hot commodity. So, any ideas for breaking in?\"\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Use your gun\n\t\t\t\t\t\t\t\t\t\t\t*set Caution %-10\n\t\t\t\t\t\t\t\t\t\t\t\"No no no,\" says Olivia. \"I'll shoot it. Your puny gun won't do jack against steel.\"\n\n\t\t\t\t\t\t\t\t\t\t\tShe pushes you back and levels her shotgun at the electronic lock of the safe. She fires without hesitation. One two three shots, lead pellets embedding themselves in the thick black steel of the safe. \n\n\t\t\t\t\t\t\t\t\t\t\tThe door swings limply open. Beyond the heavy steel is a stack of ancient green papers, a few bullets, a few empty syringes, and three red cylinders with braided strings at the end.\n\t\t\t\t\t\t\t\t\t\t\t*goto dyn1\n\n\t\t\t\t\t\t\t\t\t\t#Power it to trigger a reset\n\t\t\t\t\t\t\t\t\t\t\t*set Mechanic +1\n\t\t\t\t\t\t\t\t\t\t\tA clever survivor once showed you that most ancient tech like smartphones and computers go through a hard reset when brought back to life after so many years. So, you get to work.\n\n\t\t\t\t\t\t\t\t\t\t\t\"We need a battery,\" you say.\n\n\t\t\t\t\t\t\t\t\t\t\tOlivia's eyes alight with realization. \"Smart,\" she says through a smile. \"And here I was gonna just shoot it.\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou rummage through the storeroom, tossing empty crates across the room in your search for anything useful. This is the state of the wasteland: empty crates displaying the wealth and plenty of the old world, mocking those who scavenge to survive. You stumble upon a few treasures missed by the highwaymen such as a jar of corrosive acid, ammunition, and copper wiring. \n\n\t\t\t\t\t\t\t\t\t\t\tIt's a few minutes and some chance before you find the right wooden crate. It was hidden beneath many others, some empty and some not, but all useless. \n\n\t\t\t\t\t\t\t\t\t\t\tInside lies a palm-sized flat rectangle with ancient words inscribed on the side, far too worn and tiny to be read. \n\n\t\t\t\t\t\t\t\t\t\t\t\"Hope it has juice,\" says Olivia. \"And that it fits. And that we don't blow up.\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou jimmy the back panelling off the safe, revealing a worn, heavily deteriorated rectangle identical to the one in your hand. Acid has leaked out along the sides and turned to a thick orange crust, caking the inside and flaking off. The smell emerges as you pull the battery out. Thick and sour and noxious, it reeks of bile.\n\n\t\t\t\t\t\t\t\t\t\t\tThe new battery slips in seamlessly and elicits a beep from the safe. You turn it around to find the word \"RESET\" on the tiny screen above the keypad. \n\n\t\t\t\t\t\t\t\t\t\t\t\"We did it,\" you announce proudly.\n\n\t\t\t\t\t\t\t\t\t\t\tThe door swings limply open. Beyond the heavy steel is a stack of ancient green papers, a few bullets, a few empty syringes, and three red cylinders with braided strings at the end.\n\t\t\t\t\t\t\t\t\t\t\t*goto dyn1\n\n\t\t\t\t\t\t\t\t\t\t#Use a magnet to turn the tumblers\n\t\t\t\t\t\t\t\t\t\t\t*set Mechanic +1\n\t\t\t\t\t\t\t\t\t\t\tA clever survivor once showed you what magnets can do to old electronics, even if they no longer work. You have no way of knowing if this will do the trick, but it's worth a shot.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Help me find a magnet,\" you say.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Why?\" Olivia asks, raising an eyebrow.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Because I have an idea.\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou rummage through the storeroom, tossing empty crates across the room in your search for anything useful. This is the state of the wasteland: empty crates displaying the wealth and plenty of the old world, mocking those who scavenge to survive. You stumble upon a few treasures missed by the highwaymen such as a jar of corrosive acid, ammunition, and copper wiring. \n\n\t\t\t\t\t\t\t\t\t\t\tIt's a few minutes and some chance before you find the right wooden crate. It was hidden beneath many others, some empty and some not, but all useless. \n\n\t\t\t\t\t\t\t\t\t\t\tThe magnet hidden within points toward you, its two metal bars facing your bullets, making them jingle in your pocket. It's the size and shape of a horseshoe, and far heavier than expected.\n\n\t\t\t\t\t\t\t\t\t\t\t\"So what do we do with it?\" asks Olivia.\n\n\t\t\t\t\t\t\t\t\t\t\tRemembering what that survivor once did, you show her.\n\n\t\t\t\t\t\t\t\t\t\t\tIt is a crude method that you do not fully understand. You place the magnet by the safe and it draws forward, tugging against your fingers until it strikes the safe with a satisfying clank. Then you drag it along the side of the safe, twisting it randomly in hopes of triggering something. It fights you every centimeter of the way, trying to cling to the steel like a babe to his mother.\n\n\t\t\t\t\t\t\t\t\t\t\t\"Are you sure this is gonna work?\" she asks.\n\n\t\t\t\t\t\t\t\t\t\t\t\"No,\" you confess. \n\n\t\t\t\t\t\t\t\t\t\t\tThen something clicks inside the safe. You test the handle and it slides to the side, and the heavy metal door hangs open. Inside is a stack of ancient green papers, a few bullets, a few empty syringes, and three red cylinders with braided strings at the end.\n\t\t\t\t\t\t\t\t\t\t\t*label dyn1\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\"Only three,\" she says, taking the dynamite out of the safe.\n\n\t\t\t\t\t\t\t\t\t\t\t\"'Gee, thanks for opening that safe,'\" you say. \"No problem Olivia, it was my pleasure.\"\n\n\t\t\t\t\t\t\t\t\t\t\tShe playfully punches your arm and leads you back to the barracks. Back to the sinister sounds of buzzing. It seems stronger than last time, as if you're hearing it for the first time, and you only wish for it to end.\n\n\t\t\t\t\t\t\t\t\t\t\t\"So, let's set these around the outside of the building,\" she says. \"But we gotta be fast, otherwise we might blow ourselves up.\"\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t\t\t\t\t\t*if (Combat > 35) or (Stealth > 35)\n\t\t\t\t\t\t\t\t\t\t\t\t*set Notoriety %+20\n\t\t\t\t\t\t\t\t\t\t\t\tYou deploy the explosives with speed and grace that would make even the fastest hound green with envy, and not with radiation sickness. Your feet barely touch the ground as you rush from one end of the building to another, only catching passing glances into the seemingly abandoned barracks. \n\n\t\t\t\t\t\t\t\t\t\t\t\tThe dynamite, lit and burning at the string, falls behind you into the dirt. A gentle hiss of sparks fades as you sprint away. \n\n\t\t\t\t\t\t\t\t\t\t\t\tThen three massive bangs ring out, sending dirt and splinters flying. You turn around just in time to see the wall of the barracks collapse. It falls in on itself with a splintering crash. Bricks and wood and drywall fall and smoke rises as the roof slips down, sending dust high into the air.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe sound of squeaking and buzzing fills the air in between collapsing portions of the building, surely crushing Buzzers trapped inside. A mushroom cloud of dust shoots up into the sky, just like in the old days when atomic hellfire fell on buildings. But those were filled with people. Only monsters live in this one.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"You did good,\" she says, patting you gently on the back. The ruins of the barracks stand before you and the sounds of buzzing have faded. \"I think it's safe to assume the nest and the queen are all gone.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\tIt's strange to see such vivid destruction. Most buildings in the wasteland are this sort of fragmented, splintered ruin, but you never actually saw the events that made them so. You never were responsible for them. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto dead-bugs\n\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*set Notoriety %+16\n\t\t\t\t\t\t\t\t\t\t\t\t*set Health %-12\n\t\t\t\t\t\t\t\t\t\t\t\tYou rush around the barracks, clumsy and awkward, dropping dynamite as quickly as you can and hoping that it's enough to destroy the building. The wind beats against your skin as you rush by the broken windows, only catching passing glances into the seemingly abandoned barracks. \n\n\t\t\t\t\t\t\t\t\t\t\t\tThe dynamite, lit and burning at the string, falls behind you into the dirt. A gentle hiss of sparks fades as you sprint away. \n\n\t\t\t\t\t\t\t\t\t\t\t\tThen three massive bangs ring out, sending dirt and splinters flying. You fly into the dirt, tossed like a paper doll by the explosive powerof the dynamite. Shaking the dizziness from your head, you get up and turn around in time to see the building collapse. It falls in on itself with a splintering crash. Bricks and wood and drywall fall and smoke rises as the roof slips down, sending dust high into the air.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe sound of squeaking and buzzing fills the air in between collapsing portions of the building, surely crushing Buzzers trapped inside. A mushroom cloud of dust shoots up into the sky, just like in the old days when atomic hellfire fell on buildings. But those were filled with people. Only monsters live in this one.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"You did good,\" she says, patting you gently on the back. The ruins of the barracks stand before you and the sounds of buzzing have faded. \"I think it's safe to assume the nest and the queen are all gone.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\tIt's strange to see such vivid destruction. Most buildings in the wasteland are this sort of fragmented, splintered ruin, but you never actually saw the events that made them so. You never were responsible for them. \n\n\t\t\t\t\t\t\t\t\t\t\t\tBut the cost doesn't matter, you suppose. Black Vein is now officially Buzzer free.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto dead-bugs\n\n\t#Sneak attack\n\t\t*set Sadism %-6\n\t\t\"The stealthy method,\" she says with a smirk. \"Respectable. Alright, way I see it we've got a couple things to do before we can call this a wrap.\"\n\n\t\t\"Well, let's hear them,\" you say.\n\n\t\t\"First, we gotta find a safe way into the village. Then we have to take out the queen and the nest. With those gone, the rest of the Buzzers'll go someplace else, to find a new place to breed. But before we do any of that, I wanna resupply.\"\n\t\t*choice\n\t\t\t#\"Where can we resupply?\"\n\t\t\t\t\"Follow me,\" she says. \"Lots of these houses weren't fully looted. I mean, they were looted to shit, but highwaymen are dumb and miss things.\"\n\t\t\t\t*goto c6\n\n\t\t\t#\"How do you know so much about Buzzers?\"\n\t\t\t\t\"I'm a pretty reputable merc,\" she says. \"It's my job to know all about the things I'm hired to kill. For the Buzzers, I got in touch with a physician up in Scranton who studies bugs. Etymology? Something like that. Now come on, let's go resupply.\"\n\t\t\t\t*goto c6\n\n\t\t\t#\"Are you certain that killing the queen is enough?\"\n\t\t\t\t\"Absolutely,\" she says. \"The queen is the only breeding female in a group of Buzzers. It's really incesty. We kill her, the rest will move on to find a new one. They're loyal lovers like that. Come on, let's go resupply.\"\n\t\t\t\t*goto c6\n\n\t\t\t\t\t*label c6\n\t\t\t\t\t*page_break\n\t\t\t\t\tThe Buzzers congregate around a large three-story building in the distance, so Olivia brings you to a two-story building home on the far side of town, hopefully a long enough distance from the swarm that you'll be safe.\n\n\t\t\t\t\tShe leads the way, gun cocked just in case, into the old, mostly intact. It's a messy, sparsely furnished two story. The foods all rotted and tiny bugs rush away from you with each step. So nice seeing small bugs, tiny enough to be crushed by your foot. The only noteworthy part of the house is the set of two suitcases, one large and one small. The large one has clothing, a book without a cover or most of the pages, and some odds and ends. The smaller one has a teddy bear and some dresses.\n\n\t\t\t\t\t\"Found some stuff you might like!\" Olivia calls out from upstairs.\n\n\t\t\t\t\tYou meet her at the top of the rickety wooden steps. In her hands are three items. A rusty iron sight that could fit onto your gun, a book titled \"How to Talk Dirty and Influence People,\" and a pair of new boots, much smaller and lighter than yours. \"Pick one,\" she says. \"Whoever owned them doesn't need 'em now.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the sights\n\t\t\t\t\t\t\t*set Combat +10\n\t\t\t\t\t\t\tA good sight, carefully balanced and well maintained, is worth more than even ammunition in the wasteland. All you have to do is wipe away some of the rust, and soon you'll be shooting with pinpoint accuracy.\n\n\t\t\t\t\t\t\tThe sight has a metal ring that connects easily to the top of your gun with a metal [i]clack[/i], as if they were made to be together. The ways of the ancients are still a mystery to most, but their genius can be seen in so many ways. It takes true intuition to create a modification that can fit multiple weapons, and it takes even greater industry to create enough for everyone.\n\n\t\t\t\t\t\t\tThen again, if there was enough for everyone then you'd likely live in a very different world. You relate this feeling to Olivia, and she simply says, \"It's best not to dwell on the could-be's in life. There are a million could-be's and all we got are never-were's. I prefer to look to what we can make instead of what we lost. Guess I was never the nostalgic type.\"\n\n\t\t\t\t\t\t\tThat was the most talking you did before getting ready for the fight. The queen was not yet slain, and the job was not yet done.\n\t\t\t\t\t\t\t*goto buzzers5\n\n\t\t\t\t\t\t#Take the book\n\t\t\t\t\t\t\t*set Persuasion +10\n\t\t\t\t\t\t\tThe pages smell sharp, yet stale and ancient with mold. Someone once told you that the smell of new books was magical, but you don't recall ever seeing a new book, just old ones. This one in particular, \"How to Talk Dirty and Influence People,\" is an instructional guide on befriending and persuading others. There also appear to be tips about having sex, though you feel you're fine in that department.\n\n\t\t\t\t\t\t\tThe sight of a book bound with such expertise that it outlived the apocalypse is inspiring. The ways of the ancients are still a mystery to most, but their genius can be seen in so many ways. It takes true intuition to find such insight into human behavior. It takes even greater industry to make that knowledge readily available to everyone.\n\n\t\t\t\t\t\t\tThen again, if that knowledge was so easily accessible then you'd likely live in a very different world. You relate this feeling to Olivia, and she simply says, \"It's best not to dwell on the could-be's in life. There are a million could-be's and all we got are never-were's. I prefer to look to what we can make instead of what we lost. Guess I was never the nostalgic type.\"\n\n\t\t\t\t\t\t\tThat was the most talking you did before getting ready for the fight. The queen was not yet slain, and the job was not yet done.\n\t\t\t\t\t\t\t*goto buzzers5\n\n\t\t\t\t\t\t#Take the boots\n\t\t\t\t\t\t\t*set Stealth +10\n\t\t\t\t\t\t\tA good pair of boots, unmarred by age and wear, are a rare and valuable commodity in the wasteland. These soft-soled boots will keep your footprints light and your steps silent, allowing you to more easily move without being noticed. \n\n\t\t\t\t\t\t\tYou cannot help but admire the craftsmanship of the boots. The leather has hardly flaked in the ages since the apocalypse, and this truly speaks to the greatness of its creators. The ways of the ancients are still a mystery to most, but their genius can be seen in so many ways. It takes true intuition to turn cattle hide into a durable material. It takes even greater industry to make that material readily available to everyone.\n\n\t\t\t\t\t\t\tThen again, if there was enough for everyone then you'd likely live in a very different world. You relate this feeling to Olivia, and she simply says, \"It's best not to dwell on the could-be's in life. There are a million could-be's and all we got are never-were's. I prefer to look to what we can make instead of what we lost. Guess I was never the nostalgic type.\"\n\n\t\t\t\t\t\t\tThat was the most talking you did before getting ready for the fight. The queen was not yet slain, and the job was not yet done.\n\t\t\t\t\t\t\t*goto buzzers5\n\n\t\t\t\t*label buzzers5\n\t\t\t\t*page_break\n\t\t\t\tNerves tie a bundle in your belly as you walk down the shattered grey road, gun cocked and aimed straight forward. Olivia Buckshot betrays none of that nervousness, but you suspect her anxieties are just the same as yours. \n\n\t\t\t\tThe wasteland has taught you how to hide your fear - especially your pre-battle fear. Even as a loner, you spend a good amount of time fighting with or near other people. If they sense your fear or even your vague worries, they may not see fit to help you when you need it. After all, would some coward help them?\n\n\t\t\t\tBut Olivia doesn't seem like that type of person. Since you've met her she's been nothing but kind, and kindness in this world is the result of fearlessness. Even the way she walks betrays that confidence. Her wide, lazy gait and the loose grip she holds on her gun, and the way her head gently bobs with each step. She might be walking to her bed for a well-deserved nap, not preparing to fight deadly beasts.\n\n\t\t\t\t\"You ready for this?\" she asks, and you can tell she means it. She's not asking because she feels obliged to, but because this is your last chance to express any concerns about the plan.\n\n\t\t\t\tYou nod agreeingly.\n\n\t\t\t\t\"Good,\" she says with a smirk. \"I'm trying to think of a pun involving Buzzers but it's not going great. You think of one after, you let me know, alright?\"\n\t\t\t\t*page_break\n\t\t\t\tThe sound of buzzing intensifies as you get closer to Black Vein. The fence circles widely around it, leaving long empty spaces between shattered wooden homes. Even amid the destruction, you can see why someone might want to settle down here. Sure, the ground is craggy and unfit for crops, and there are mutant bugs flying around, but there's so much space to grow.\n\n\t\t\t\tYou're still a fair distance away from the Buzzers. They cluster around a large building which you assume was once a barracks of some sort. It's the largest of the wooden structures by far, and the only one that's more than two stories. The windows are mostly blown out or boarded up and the roof has collapsed in some places. Wooden siding falls off the walls in thick boards after decades of neglect.\n\n\t\t\t\tBuzzers rest on the ground around the barracks. Some cling oddly to the buildings, hanging sideways off the walls or resting on the rooftops.\n\n\t\t\t\tThe sight of them - their antennae and their many eyes and their grey wings who flit too fast to even see - sends chills up your spine. The hairs on your neck stand at attention, as if they are trying to sneak away before the fight. Such disgusting monsters, the Buzzers. No wonder they inspire such fear.\n\n\t\t\t\t\"Such a shame,\" says Olivia. \"They're kind of cute. Now remember. The queen's gonna be someplace in the nest and she's gonna be protected. So don't die until we get there.\"\n\n\t\t\t\tThen she crouches down and takes cover behind the free-standing wall of what was once a shack, and you follow her.\n\t\t\t\t*page_break\n\t\t\t\tOlivia leads you around the side of the village, far from the sinister buzzing of the monstrous moths.\n\n\t\t\t\t*if Stealth > 35\n\t\t\t\t\tYou experience in stealth makes this an easy task. Staying low to the ground and stepping softly, the Buzzers never notice you in your prowl around their swarm. They flit about randomly amid a pile of human skeletons, oblivious to the living humans in their presence.\n\n\t\t\t\t\t\"Almost there,\" Olivia whispers.\n\t\t\t\t\t*goto c8\n\t\t\t\t*else\n\t\t\t\t\tBut you are not accustomed to stealth. Staying low to the ground and stepping softly in imitation of Olivia, the Buzzers never notice you in your prowl around their swarm The Buzzers flit about randomly amid a pile of human skeletons, oblivious to the living humans in their presence. Then a crisp, black wooden branch cracks beneath your weight.\n\n\t\t\t\t\t\"Are you kidding me?\" Olivia whispers in a harsh tone. \"You're the one who wanted to be sneaky in the first place!\"\n\n\t\t\t\t\tA Buzzer is upon you before you can respond.\n\n\t\t\t\t\t*if Combat > 35\n\t\t\t\t\t\tYou roll onto your side and open fire at the monstrosity. Your bullets pepper the grey flitting beast and white bile seeps from its crisp exoskeleton as it falls to the ground just in front of you.\n\n\t\t\t\t\t\t*goto c7\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set Health %-18\n\t\t\t\t\t\tYou roll onto your side but the Buzzer is too quick or you are too slow. Its bladed stinger pierces your hip and you loose a muffled yelp. Then Olivia's bullets popper the grey flitting beast and white bile seeps from its crisp exoskeleton as it falls to the ground just in front of you.\n\n\t\t\t\t\t\t*label c7\n\t\t\t\t\t\t\"Come on,\" she says, pulling you to your feet. \"Before more come.\" So remarkable that even as you accidentally endanger her, she seeks to help you. Most warriors would have simply abandoned you, citing you a weakling unfit for like in the wastes. Not her.\n\t\t\t\t\t\t*goto c8\n\n\t\t\t\t\t\t*label c8\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tOlivia leads you to the barracks building, giving you a clear sight of the flitting Buzzers at the center of town and the crisp, blackened skeletons around them. \n\n\t\t\t\t\t\t\"My guess is highwaymen slaughtered the settlers,\" says Olivia. Her silvery smile is gone, replaced by a look of pure, genuine grief. \"Then the bastards found out there was nothing here to steal, so they left. That's when the Buzzers came along, looking for food.\"\n\n\t\t\t\t\t\tThe bones had been picked clean, certainly long ago. Buzzers have no customs for burying the dead - they're insects, after all. Highwaymen too lack those social customs. Makes you wonder if they're any different than animals and mutant monsters.\n\n\t\t\t\t\t\tOlivia sighs at the sight of so many lights snuffed out. \"Come on, this is the nest. Let's get to work.\"\n\n\t\t\t\t\t\tAlthough there's nothing of note beyond the broken windows, the barracks building is clearly the nest in question. The sound of buzzing has grown intensely since you've arrived at its door. Surely the queen lies somewhere beyond there, breeding countless monstrosities that will terrorize the wasteland for decades to come.\n\n\t\t\t\t\t\t\"How do you wanna approach this?\"\n\t\t\t\t\t\t*goto c3", "4-fulfillment": "*set Health 100\n[i]The lights went out and the world scrambled. Everyone tried desperately - foolishly! - to cling to their status, but the dark cares not. It comes without mercy and confounds the weak and strong alike, tipping the world and watching its sands settle. This is how the merchant becomes a pandhandler and a whore becomes the empress. And now, whenever the lights flicker, this chaos emerges once again, waiting for someone to scale its dusty dunes or else fall into them, fated to drown.[/i]\n\n-The Historian Pygmy, [i]A Treatise on Chaos[/i]\n\nThe familiar walls of Fulfillment rise at the end of the road. Anyone who's anyone in Philly has been to Fulfillment, for business or for pleasure. If this corner of the wasteland is a person, this city is its beating heart. Every trader comes through it, every miltia bleeds to defend it, and every highwayman wants to own it. You slip almost unnoticed through the gates, save the approving nod of an armored gate guard. Most communities would be hesitant to let just anyone inside their walls, but they are so heavily armed and thoroughly protected that any attack, no matter how stealthy, would end in success.\n\nYou mesh into a thick and filthy crowd of wastelanders, their sweaty stench filling your nostrils. Dozens, maybe hundreds, in dirty rags, armed to the teeth. The guards stand apart from them, all given a wide berth. They are armored in metal and leather as any highwayman would be, but themselves apart as civilized, unlike the commoners who swarm their streets.\n\nThe city is composed of pre-war buildings with wooden and steel extensions turning them from single-stories to two or three floor homes. These scattered homes do not form neat, uniform steets like the ruins of Philly, and they circle around a single massive building - some kind of enormous warehouse easily the size of every other construction in Fulfillment.\n\n\"Ay, I recognize you!\" shouts a voice. It takes you a moment to realize it's directed at you.\n\nYou turn a few times to identify the owner of the voice. Then you spot her. The old bookseller from Franklin. She carries a stack of books and stands in the midst of the crowd as wastelanders shuffle around her.\n\n\"You were in Franklin, right?\" she asks, stepping through the crowd. \"Yes, it is you. What brings you to Fulfillment?\"\n*choice\n  #\"None of your business.\"\n    \"Fine, but if you're looking for electronics you'll have to ask for an audience with the Queen,\" she says. \"Just so you know.\"\n\n    *goto c1\n\n  #\"Just passing through.\"\n    \"I very much doubt someone like you is just passing through, but if you're looking for electronics you'll have to ask for an audience with the Queen,\" she says. \"Just so you know.\"\n\n    *goto c1\n\n  #\"Purchasing some old electronics.\"\n    \"Ah. For that you'll have to ask for an audience with the Queen,\" she says. \"Just so you know.\"\n\n    *goto c1\n*label c1\nAh yes, the queen. You'd never been important enough to meet her before. Typically only those affiliated with the Daughters of Eagles - or important merchants - are allowed to meet with her. For the first time in your life you have one of those connections. Best not to squander it.\n\nYou head toward the warehouse around which Fulfillment is built, leaving the shanty town and filthy wastelanders behind. The Center, it's called. All trade in the city takes place inside its walls. Every tradeable good in the wasteland, ancient or modern, flows through the Center and goes from one hand to another before coming back out again. Everything you saw in Franklin, everything that may have been scavenged from Black Vein, it all comes through here sooner or later.\n\nThe inside is sweltering with the humidity of hundreds of traders. It's like the Franklin market but a thousand times bigger. The cieling rises above and sunlight slips in through slanted windows, and you can't even see the other side of the bazaar. Dozens of traders keep careful watch over their aisles and guards patrol the crowds, keeping watch for thieves. \n\nYou pay no heed to the merchants, many of whom you'd seen before in this or other markets. You pass by the ancient gadgets and weapons and texts, and the modern fruits and meats and armors available for your purchase. You go straight to the back, toward an innocuous looking door labeled \"MANAGEMENT.\" A dozen guards stand at attention outside of it.\n\nThe guards perk up when they see you coming. One of them says, \"Turn back around wastelander. The queen has no business with you.\"\n\n\"I've come on behalf of ReVivienne Washington of the Daughters,\" you say. \"The queen being called upon to aid in a mutually beneficial quest.\"\n\nThe guard frowns, looks to his fellow warriors and says, \"Fine. But we've got an eye on you.\"\n\nAnother guard opens the door while the first one searches you. He pulls all the weapons off your body, even the knife you so carefully hid in your boot. \"You'll get those back later,\" says a guard. \"Unless the queen has you killed. Then I guess you won't.\"\n*page_break\nYou're led through the door and up a flight of hard concrete stairs, not ornate or deserving of a queen at all. The flight of stairs ends at what was surely once an office, but is now a throne room. A dozen guards stand before you, with two ambassadors on either side. One is a woman in highwayman armor, certainly a Daughter of Liberty. The other is a militiaman in an odd green uniform with a helmet depicting a bird on the side - one of the infamous Eagles.\n\nThe queen herself sits upon a throne made of books. The throne is easily twice your height and wide enough for two or three people to sit comfortable. The spines of the books mostly read \"Queen of Thrones\" with a few \"Sword of Spring\" and \"Quest of Kings\" in there. They're all yellowed and tattered and bent beneath the weight of being used as a seat, which seems like a waste.\n\nAnd the queen is an illustrious being. Thin but not malnourished. Tan but not burnt. Battleworn but not disfigured. She wears robes clearly crafted after the war, deep violet fabrics layered onto one another. A pendant hangs from her neck depicting a two headed wolf, a Fury surely. She stars daggers at you, her eyes a crystalline glass. A crown of twisted iron adorns her head, likely heavy enough to weigh down upon her neck.\n\nShe does not speak to you. Instead, a thin person with oddly cropped hair and grey robes steps forward. The ambassadors look on boredly as the seneschal addresses you. \"You stand in the presence of Queen Echo of Fulfillment, Last of the Amazons, Distributer of Goods and Defender of the Trading Triange. What is your business with our fair queen?\"\n\n\"Like I told your guards, I come on behalf of ReVivienne Washington. My quest for her has met a roadblock and I need tech to advance.\"\n\nQueen Echo sits up and looks to the ambassador of the Daughters. \"Artoria, what do you know of this?\"\n\nArtoria shrugs. \"Washington mentioned plans to send a contractor out. Don't know much more than that.\"\n\n\"What is your quest?\" asks the queen.\n\nYou explain your mission in Black Vein, the Buzzers, the flammable materials in the mine, all with the understanding that this alliance is transparent. If not, then why would there be a Daughter and an Eagle here? So you tell her everything and hope that allegiance holds true.\n\n\"Hmm, it sounds like you need a credit loan,\" says Queen Echo. \"I'd be happy to give you a night-vision equipped gas mask, but I'm sure you're aware of how rare this sort of equipment is. In exchange, I'll need you to do something for me. There's a merchant here, she sells books. She has been searching for an artifact on my behalf for some time and needs help. Place that artifact in my hands and you shall be handsomely rewarded by the Realm. Any questions?\"\n*label c2\n*choice\n  *disable_reuse #\"What's the Trading Triagle?\"\n    \"Our happy little alliance. You see, Fulfillment does a great deal of trade with the rest of the wasteland. Dozens of villages depend on our traders, as do the militias pledged to protect them. The Daughters of Liberty, who you are familiar with, and the Eagles of the Linc. They defend our traders and their routes, we provide essential goods. The Trading Triangle. Now, did you have any other questions?\"\n    *goto c2\n\n  *disable_reuse #\"Who were the Amazons?\"\n    \"The Amazons, much like the Americans, are an ancient race who once spread across this land. They were traders of tech and knowledge and any number of lesser goods. This city was once one of theirs, built solely for the purpose of trade. I am the last Amazons - the last one who matters, anyway. Now, did you have any other questions?\"\n    *goto c2\n\n  *disable_reuse #\"How did you become a queen?\"\n    \"It was my mother Alexa, the last Amazon in her time, who conceived a nation built upon trade. It was she who liberated this stockpile of ancient goods from monstrous highwaymen, she who invited the traders of her time to parlay, and she who built the Trading Triangle. When she passed, the queendom was left to my rule. Now, did you have any other questions?\"\n    *goto c2\n\n  *disable_reuse #\"What's the artifact you're after?\"\n    \"An ancient text I've been pursuing for some time. Like those that I sit upon, it tells the tale of the world as it was long ago. Kings and queens and savages once roamed this land, much as they do now, and I find the knowledge of these ancient peoples useful in solving the same problems they faced. Now, did you have any other questions?\"\n    *goto c2\n\n  #\"No questions. I'll get going.\"\n    \"May the gods smile on your journey,\" says Queen Echo as he guards escort you from the room. Another quest, another distraction, another stream of nonsense for you to occupy yourself with.\n\n    *goto c3\n\n*label c3\nArtoria follows you outside as the guards escort you back to the marketplace. \"Wait up,\" she says. She looks just as barbaric and dangerous as any other Daughter. Tattoos, scars, a few missing fingers, heavy armor, and more than a few guns strapped to her muscular form. \"Just a piece of advice. If the Queen's seneschal, that fella in grey bothers you, you let me know.\"\n*choice\n  #\"Uh, thanks.\"\n\n    *goto c4\n\n  #\"Why's that?\"\n    \"They've never been fond of the Daughters,\" she explains. \"We only let women in our ranks and they're not a woman, so they hold a grudge, always trying to undermine us. Anyway,if they cause any trouble, let me know.\"\n\n    *goto c4\n\n*label c4\nAnd with that, Artoria leaves you, returning to the throne room.\n\nYou return to the marketplace and slip through the throngs of wasters as they trade bullets for food and food for knives and knives for clothes and even clothes for more bullets. It all circles back around within the Center walls of Fulfillment. Everything except slaves, of course.\n\nThen the bookseller spots you again. \"Hey,\" she says, yellowing books filling her hands. \"The guards said you're helping me out.\"\n*fake_choice\n  #\"If I have to.\"\n  #\"That's right, can't wait.\"\n  #\"So what do I have to do?\"\n\n\"Here's the plan,\" she says, pulling you aside so as not to stand in the path of traffic. \"There's an old bunker not too far away. The ancient Americans used it to store knowledge when they realized their world was close to ending.\"\n\n\"Sounds simple enough,\" you say.\n\n\"That's the enthusiasm I like to hear,\" she says with what appear to be genuine stars in her eyes. \"Oh, and it's infested. Just so you know.\"\n\nYou groan loudly and ask, \"Infested with what?\"\n\n\"Highwaymen. It's infested with highwaymen.\"\n*page_break\n\"Mission creep,\" says the bookseller. You've left Fulfillment behind and begun the trek toward the bunker. \"I learned that phrase in an old war book. It's what happens when a soldier picks up a second mission during their first, then they end up with new priorities and obligations. I'm getting the feeling that's what's happening with you. Am I right?\"\n*fake_choice\n  #\"Don't worry about it.\"\n  #\"That's exactly right.\"\n  #\"Sorry, you're mistaken.\"\n\n\"Huh, so getting political in Franklin and hunting down an ancient text were all a part of your plan?\" she asks. Not sardonically or sarcastically, just curiously. \n\n\"Apparently.\"\n\nShe's sweltering in the desert heat, though the grey leafless trees tell you this was not always a desert. She carries a knapsack full of books, their yellowing papers spilling out the zipper. You'd expect a wasteland merchant to be more equipped for long-distance travel. \"Wait, we're almost there.\"\n\nAt first you don't see it. Then the mound emerges from beneath the sand. A slight hill. Then you notice the figures in the sunlight. The hot air wraps around them and shimmers, and you can only make out their sillhouettes. Beyond them is some reflective surface, perhaps a metal door providing access to the bunker. \n\n\"Stop!\" shouts someone. Not one of the distant sillhouettes. The voice comes from behind you.\n\nYour turn around, gun leveled at the speaker. It's an Eagle. You recognize her by the uniform. The green jersey with a number on the back. The helmet. Then you see her allies. Another dozen Eagles hiding in the twisted, skeletal trees. All armed, all ready for war. So strange to not notice an army just behind you.\n\n\"You're not going to pick a fight with those highwaymen, are ya?\" asks the Eagle. Not just a question - a concern.\n\n\"Yes, we are,\" says the bookseller. \"We're on a mission for the queen.\"\n\n\"We can't have you disrupting our extermination,\" says the Eagle. She lowers her weapon and her soldiers follow suit. \"The name's Corvalla, I'm the QB of this squad.\"\n\n\"My name's Bookworm,\" she says. \"We need to get into that bunker. Any chance you'd be willing to accept our help?\"\n\nCorvalla turns back to her soldiers as if seeking approval, then turns back to Bookworm. \"Only because you work for the queen.\"\n\n\"What's the plan?\" you ask. Your mind involuntarily rolls over the concept Bookworm mentioned to you. Mission creep.\n\nCorvalla slings her rifle over her shoulder and motions with her hands as she speaks. So strange that just moments ago you'd never even heard of her, and now she was seeking your help. Perhaps that's just the confidence of an Eagle. \"First wave is a strike from the west. Concentrated fire, shoot to kill. Second wave is a stealth unit from the east. They'll infiltrate while the first unit keeps the highwaymen busy. So, which team do you wanna go in with?\"\n*label c5\n*choice\n  *hide_reuse #\"Why trust me so quickly?\"\n    Corvalla shrugs. \"Way I see it, you're gonna go after those highwaymen anyway. Might as well put you to work for the good guys. So, any other questions?\"\n    *goto c5\n\n  *hide_reuse #\"Tell me about the Eagles.\"\n    \"We're the best damned militia in all of Philly,\" she says with pride in her eyes. \"Our ancestors were warriors who slaughtered the enemies of this city in great Linc, where we live to this day. We are the defenders of the people, not those damned Daughters of Liberty. So, any other questions?\"\n    *goto c5\n\n  *hide_reuse #\"Tell me about these highwaymen.\"\n    \"Call themselves the Bronze Bullets. They're your run-of-the-mill wasteland assholes. You know the type. Murder, kidnapping, rape. We're pretty sure they're making a move on Fulfillment, which is why we've been deployed. So, any other questions?\"\n    *goto c5\n\n  *hide_reuse #\"Tell me about yourself.\"\n    \"I'm a soldier. There's nothing else to tell. So, any other questions?\"\n    *goto c5\n\n  #\"I'll go with the assault unit.\"\n    *set Sadism %+9\n    *set Cruelty %+8\n    *set Caution %-9\n    \"Your job is to hit them fast and hit them hard,\" she explains. \"Kill as many as you can, but keep them facing west. You have to make sure they can't stop the stealth team from getting into the bunker.\"\n\n    \"Got it.\"\n\n    You follow the Eagles into battle, Bookworm at your back not because of her skills in battle but because of her interest in this affair. The soldiers chat amongst one another as they position themselves near the bunker.\n\n    \"God I hate the Bronze Bullets,\" says one. \"How long we been chasing them?\"\n\n    Another Eagle shrugs. \"Us? Two years. Corvalla?\"\n\n    \"Shut up,\" a third one hisses. \"It's time to kill a few highwaymen.\"\n\n    The sillhouettes of highwaymen are now fully flesh and stand not far before you, standing idly before a pneumatic metal door. They do not stand far apart or at regular intervals are guards should, but close together so they can have someone to chat with. \n\n    They barely miss a beat as they emerge from the cover of displaced boulders and open fire on the highwaymen keeping guard. The Bronze Bullets don't see their deaths coming as hundreds of bullets lay into them, deafening gunfire causing chaos in their ranks.\n\n    You open fire as more highwaymen emerge from the open mouth of the bunker. They climb from the darkness and into the harsh sun, guns blazing. Some die before they ever step onto the sand while others make it within feet of the Eagles, seemingly without rhyme or reason.\n\n    *if Combat > 65\n      Your bullets fly true and you make good use of cover, never keeping your head high for too long. Highwaymen fall by the weight of your concrentrated bursts, their chests filling with heavy lead that drags them to the deathly hot sand. \n\n      All the while, your focus does not break. \n      *goto cs1\n\n      *label cs1\n\n      The stealth team inflitrates the bunker while you exchange fire with the highwaymen. They slip passed the pneumatic door, unnoticed by the few Bronze Bullets that remain.\n\n      A few moments later, all the highwaymen outside are either dead or dying. \n\n      You follow the rest of the Eagles into the bunker. The stealth team made quick work of the gunners stationed inside. Another dozen corpses at your feet that Eagles quickly scour for any ammo and weapons they might find value in. Some of the dead highwaymen were taking cover behind high stacks of stockpiled books meant to serve as cover. They did not serve well enough and are now peppered with bullets.\n\n      The slaughter was instant and without mercy.\n\n      Corvalla emerges from the mass of armored militia. She examines you for a moment, considering you, then says, \"Looks like you make a good ally after all.\"\n\n      She turns to her soldiers and says, \"My foolish sister Ambula is hiding somewhere in this bunker, likely behind her precious Bronze Bullets. Seek her out and bring me her head.\" No hesitation in her eyes. No regret. Simple orders.\n      *goto bunker3\n    *elseif Combat > 35\n      *set Health %-12\n      An angry bullet pierces your shoulder, brought by the mistake of keeping your head too high for too long. You fall back behind cover and take potshots at the enemy, lost in the chaos of gunshots and screaming.\n\n      All you can do is watch as highwaymen fall by the weight of Eagle bullets, their chests filling with heavy lead that drags them to the deathly hot sand. \n      *goto cs1\n    *else\n      *set Health %-22\n      An angry bullet pierces your shoulder, brought by the mistake of keeping your head too high for too long. You fall back behind cover and take potshots at the enemy, lost in the chaos of gunshots and screaming.\n\n      All you can do is watch as highwaymen fall by the weight of Eagle bullets, their chests filling with heavy lead that drags them to the deathly hot sand.y ever step onto the sand while others make it within feet of the Eagles, seemingly without rhyme or reason.\n      *goto cs1\n\n  #\"I'll go with the stealth unit.\"\n    *set Deception %+9\n    *set Caution %+9\n    \"Your job is to get into the bunker,\" she says. \"We're attacking hard from the west, so you're coming from the east. The first floor of that bunker is basically a lobby: take control of it while we take the outside.\"\n\n    \"Got it.\"\n\n    You follow the Eagles into battle, Bookworm at your back not because of her skills in battle but because of her interest in this affair. The soldiers chat amongst one another as they position themselves near the bunker.\n\n    \"God I hate the Bronze Bullets,\" says one. \"How long we been chasing them?\"\n\n    Another Eagle shrugs. \"Us? Two years. Corvalla?\"\n\n    \"Shut up,\" a third one hisses. \"It's time to kill a few highwaymen.\"\n\n    The sillhouettes of highwaymen are now fully flesh
