y savages, how do you expect to conquer the rest of 'em? You played the long game and you lost. It's time to head home.\"\n\n                          *goto dip1\n\n                        *else\n                          \"You're down a fortress and the whole wasteland hates you. So, we're not gonna, like, be your friend anymore. Understand?\"\n\n                          *goto dip-fail\n\n                      #\"Look at what you had to do just to survive this attack. You just blew up your only defense.\"\n                        *if Persuasion > 65\n                          \"I know how war works,\" you go on. \"You need forts like this to survive. We have them in the form of every damn village, city, and ruin in Philly. You just sacrificed your last one. If you were defending territory, that move might have saved you the day. But you're not. You're an invading army, and  you just lost your only piece of land. So, General, my question is pretty straightforward. Even if you win the day, even if you vanquish us filthy savages, how do you expect to conquer the rest of 'em? You played the long game and you lost. It's time to head home.\"\n\n                          *label dip1\n                          \"You'd like that, wouldn't you?\" she asks. \"You'd like me to run home, tail between my legs. But the way I see it, all the most dangerous people in Philly are rats in a trap. Why would I give up when I'm so close to victory?\"\n                          *choice\n                            #\"Because it's not a victory you can hold.\"\n                              *if Persuasion > 85\n                                \"Conspiring with slavers, blowing up militias. You're not making the people of Philly love you. It'll take your entire army to hold this place. And then, even if you pull that off, what happens to the land you already have? You can't have Allen and Philly. And I think you know that, since your only shot at survival here required blowing your only base to kingdom come. So, here's my proposal. You go home and build up your army, maybe recruit some volunteers or whatever it is you do, and try again in the future. Or, better yet, don't.\"\n\n                                *goto dip-win\n\n                              *else\n                                \"Your army just isn't good enough for this much land. Make a bigger one then try again.\"\n\n                                *goto dip-fail\n\n                            #\"Because it took decades of planning to get this far, and you're still losing.\"\n                              *if Persuasion > 85\n                                \"The conspiracy with Rodin, the seneschal in Fulfillment, the uranium under Black Vein. Your people have planned this for years, noticing every detail and exploiting it. But you're still losing. Go home. Plan a new strategy. One that will work, this time.\"\n\n                                *goto dip-win\n                              *else\n                                \"If you can't plan a war properly, you should give it another shot. Go back to Allen and give it another go.\"\n\n                                *goto dip-fail\n                            #\"Because you have a duty to bring your soldiers home.\"\n                              *if Persuasion > 85\n                                \"You're their General. I've seen the way they look at you. Are you really willing to throw their lives away for, at best a hollow victory, at worst a total defeat. Is this the rock you want to die on? Go home, General. Philly doesn't want to take any more of your soldiers.\"\n\n                                *label dip-win\n                                *set Notoriety %+12\n                                She sighs. You can see the exhaustion on her face. How many times had she done this? \"I can't promise we won't just get redeployed in a few years.\"\n\n                                \"When you do, we'll be waiting,\" you say, barely loud enough for her to hear. But she does hear, and she nods her head, and walks away.\n\n                                Her whole army walks away. They march north, back to their shanty republic. And for the first time in a long while, you feel the weight of the world lift off your back. Your heart beats easily now, softened as the pains of responsibility ebb from you. You barely even hear the cheers of victory, barely feel Olivia's warm hand slap your back. You're not jostled from this odd, dizzy state until ReVivienne wraps her arms around you, crushing you chest and lifting you from the ground.\n\n                                You've won. Philly is yours.\n                                *label peace-win\n                                *page_break Epilogue \n                                In the years that follow, the fledgling Philly Republic will know its first true peace. Trade routes are protected, highwaymen are on the run, and villagers can sleep at night. Hardships remain, of course, but newfound cooperation has spurred a peace yet unseen.\n\n                                The peace you showed Allen's Republic would eventually blossom into an uneasy alliance - both sides too frightened of the other to be violent or even rude. And while those relations are chilly, many have hope that they will soften.\n\n                                *if Villain > 1\n                                  *goto cruel1\n\n                                *if Cruelty > 50\n                                  *label cruel1\n                                  Your violent, warmongering ways do little to ease this tension, and some wonder why you sought peace in the first place. \n\n                                  *if Caution > 50\n                                    But any ill-will you possess is hidden beneath a safe layer of caution, and your malcontent is little more than rumor. After all, the savior of Philly is bound to be subject to idle gossip.\n\n                                    *label table\n                                    This is how your people joins a Table of Nations as great as those before the world collapsed on itself. Peoples such as Metropotamia, the Great Tribes of the Plain, the Republic of Kwik-Stop, and the Crescent Republic would rise from the ashes, proving that civilization, in its many forms, had not died when the world did.\n                                    *page_break\n                                    Congratulations on completing \"The Black Vein\" and changing the face of the wasteland forever!\n\n                                    You met many fascinating factions on your quest. Please feel free to take one final look at their fate before you conclude this playthrough.\n                                    *label final-sum1\n                                    *choice\n                                      #Franklin\n                                        *if FGFranklin = 1\n                                          Under Gizmo's strict military control, Franklin soon becomes one of the most powerful cities in all of the Philly Republic. While cruelty and sadism are second-nature to him, Flora serves as a peaceful and charming ambassador to the rest of the wastes, and often as a mediator in local affairs. Together, they might one day extend their reach far beyond the walls of Franklin, and choke the life out of the wasteland.\n                                          *goto final-sum1\n\n                                        *else\n                                          Voss may be a bit tempermental, but he is a far better option than a savage highwayman. His assurance of protection and peace don't mean as much as they did back before the Philly Republic. While this is certainly good for the common people, it is not great for Franklin, which only prospered by the height of its walls. Soon, markets begin opening up in the now-safe villages that were once considered no-man's-lands. It hurts Voss each time he sees one of his people go find new oppurtunity, and it kills him that he cannot offer it.\n                                          *goto final-sum1\n\n                                      #Dutch Mill\n                                        *if Amos = 1\n                                          Under the rule of Amos, the people of Dutch Mill would spend years without contact with the outside. This would eventually evolve into fear and hatred, as it so often has in other isolated cultures. Wastelanders of all walks of life would warn their children not to misbehave, or they'll be sent to live with the Dutch. This would never really happen, of course, because the Dutch would kill anybody who came too close to their gate.\n                                          *goto final-sum1\n                                        *else\n                                          Dwide's kind ways were already common among the Dutch, and soon would spread to the rest of the wasteland. As trade between Dutch Mill and the rest of Philly grew, missionaries spread forth to deliver the word of their God, and his kind words. While the Daughters were not fond of a competing deity in Philly, they did little to oppose the Dutch in their attempts to spread his glorious name. In this time, they would found two more villages, and many would come to enjoy their lifestyle. \n                                          *goto final-sum1\n\n                                      #Fulfillment\n                                        As punishment for her crimes against the now-defunct Trading Triangle, Queen Echo was deposed and elections were held. The people, not knowing any other way, voted their queen back into power again and again. The Daughters monitored every election, trying to manipulate them or at least ensure their authenticity. But Echo has learned her lesson, and now knows better than to conspire with foreign polities. \n                                        *goto final-sum1\n\n                                      #The Eagles\n                                        *if Cic = 1\n                                          Under Cicada's leadership, the Eagles become critical in the final extermination of highwaymen, slavers, and other filth hiding in the ruins. But when those enemies fade away, replacements are found in the form of innocents. Belligerent Eagles pick fights with Daughters, traders, and the civilians they are meant to protect, purely out of the boredom of peace. It is not long before a coup returns them to their normal, slightly less violent ways, though countless were crucified along the way.\n                                          *goto final-sum1\n\n                                        *else\n                                          Under Corvalla's continued leadership, the Eagles become critical in the final extermination of highwaymen, slavers, and other filth hiding in the ruins. When those enemies are finally brought to justice, new enemies are found. Soon much of the wasteland knows the name of the Eagles, and highwaymen far beyond Philly learn to fear their sigil.\n                                          *goto final-sum1\n\n                                      #The Daughters of Liberty\n                                        *if woman = 1\n                                          Under the leadership of ReVivienne Washington, the first President of Philly, the Daughters of Liberty would come to change form. As the Grand Army of Liberty took shape, the Daughters ceased to serve as a militia. Some warriors went on to become soldiers in the Army, but most simply held onto the affiliation. Against her wishes, they would go on to form the first political party, aligning their votes in Congress in support of war, justice, and the elevation of womanhood, and always considering you a sainted member. The Goddess Columbia would be proud.\n                                          *goto final-sum1\n\n                                        *else\n                                          Under the leadership of ReVivienne Washington, the first President of Philly, the Daughters of Liberty would come to change form. As the Grand Army of Liberty took shape, the Daughters ceased to serve as a militia. Some warriors went on to become soldiers in the Army, but most simply held onto the affiliation. Against her wishes, they would go on to form the first political party, aligning their votes in Congress in support of war, justice, and the elevation of womanhood. The Goddess Columbia would be proud.\n                                          *goto final-sum1\n\n                                      #Black Vein\n                                        Olivia Buckshot would come to be a great leader, as the elected governor of Black Vein. Her fierce independence kept even the worst of Philly's greed out of her city, and it would soon come to rival Fulfillment in size, thanks to its favorable location. The uranium, however, would remain buried. And that is okay with even the most militant of the watseland, because they all know exactly what such fuel could cause. Her many books about philosophy and history will come to circulate the wasteland, inspiring critical thought and patient leadership for years to come.\n                                        *goto final-sum1\n\n                                      #Finish\n                                        Once again, congratulations on completing \"The Black Vein\" and changing the face of the wasteland forever!\n\n                                        We hope you enjoyed this playthrough of The Black Vein. If you found this ending less than satisfactory, feel free to restart the game and make other choices. There's more to do in the wasteland than found a new nation.\n                                        *goto_scene ending\n\n                                  *else\n                                    And while you can be boisterous and confrontational at times, your malcontent is little more than rumor. After all, the savior of Philly is bound to be subject to idle gossip.\n\n                                    *goto table\n\n                                *elseif Sadism > 50\n                                  *goto cruel1\n\n                                *else\n                                  In fact, your peaceful ways are all that allow this tension to be eased. As the only person in the wastes thoroughly familiar with the needs and wants of both parties, you soon become a powerful figure among those interested in an alliance.\n\n                                  *goto table\n\n                              *else\n                                \"You're in charge. You get to decide when you leave. So, decide.\"\n\n                                *goto dip-fail\n\n                        *else\n                          \"You're down a fortress and the whole wasteland hates you. So, we're not gonna, like, be your friend anymore. Understand?\"\n\n                          *label dip-fail\n                          *set Notoriety %-30\n                          Tappon rubs her temples and lowers her head, sighing loudly. \"I'm not even going to try and parse what you wanted to say there.\" And without another word, she steps back into the forest.\n\n                          You step down from the wall, somewhat annoyed and somewhat angry. Olivia and ReVivienne wait for you.\n\n                          \"It was a good attempt,\" says Olivia, forcing a sympathetic smile.\n\n                          \"Not good enough,\" says ReVivienne. \"What's our next plan?\"\n                          *goto d1\n\n                  *else\n                    \"You got a better plan?\" you ask.\n\n                    \"Any plan is better than diplomacy,\" she spits. \"Name literally any other plan and I'd prefer it. Go ahead. Name one.\"\n                    *goto d1\n\n  #\"We'll go with the infilitration units.\"\n    *set Caution %+10\n    *set Deception %+10\n    \"I can't say I appreciate the stealthy route, but it's a job that's gotta get done,\" says ReVivienne.\n\n    The infiltration team meets at an old run-off where sewage used to fall into a creak, now dried up. They mass around the sewer entrance, a wide tube large enough that they can all pour through like flood waters. \n\n    *if Dwide = 1\n      You spot Dwide among the civilian volunteers, wearing his strange, tan garb. A few other Dutch stand beside him, heading toward another part of camp. He's too far to greet you, but nods in your direction. It's a respectful nod, more of a bow, as if he's thankful that his people have been drawn into this conflict. Maybe he's just glad to get out of the village for a while.\n\n      *goto c1\n    *else \n      *goto c1\n      *label c1\n      *if VFranklin = 1\n        Voss stands before the warriors, head held high. The people look to him with admiration in their eyes. And why wouldn't they? He's a simple man like any of them, just trying to protect those he loves. No nation-building aspirations, nor dreams of colonization. Just a man doing his duty.\n\n        \"The plan is simple,\" he says to the two dozen or so volunteers, most of whom have already served under him at Franklin. \"The Daughters are knocking on the front door, the Eagles are striking at the rear. Our job is to sneak in through these shitty sewers and help them as best we can from the inside. Scouts have already confirmed that we can access the courtyard of their compound from here. Now, I'm not one for big speeches, so I'm not gonna tell you why this battle is so important. You all trust me, I just ask that you trust me again.\"\n\n        A roar of applause. Some warriors even shoot into the air, adding their gunshots to the cheers. \n\n        Voss scans his warriors, a hint of pride in his eyes. He smiles when his eyes meet yours, as if you both know something they don't.\n\n        \"One last thing,\" he says. \"We're gonna take as many prisoners as we can. Now get ready. We move when at the flare's mark.\"\n        *goto c2\n\n      *else\n        Gizmo stands proudly before the warriors, a head taller than any of them. The people look to him with fear in their eyes. And why wouldn't they? He's a conquerer absolved of all sin by virtue of attendance in the Congress. Half the people serving him are \"reformed\" highwaymen, and the other half are militia who didn't realize who would be leading them.\n\n        \"The plan is simple,\" he says to the two dozen or so volunteers, most of whom have already served under him at Franklin. \"The Daughters are knocking on the front door, the Eagles are striking at the rear. Our job is to sneak in through these shitty sewers and help them as best we can from the inside. Scouts have already confirmed that we can access the courtyard of their compound from here. Now, I'm not one for big speeches, so I'm not gonna tell you why this battle is so important. You all trust me, I just ask that you trust me again.\"\n\n        A roar of applause. Some warriors even shoot into the air, adding their gunshots to the cheers. \n\n        Gizmo scans his warriors, a hint of pride in his eyes. He smiles when his eyes meet yours, as if you both know something they don't. So strange that he was once terrified of Allen's Republic.\n\n        \"One last thing,\" he says. \"We take no prisoners. This is a message we're sending to the Republic: Philly shows no mercy.\n        *goto c2\n        *label c2\n        *page_break\n        The infiltration team has assembled far enough into the forest that you cannot be seen from the walls of the Fort. You think you can make out the weakness you're exploiting - a deep tunnel of shit that leads into the bowels of the Fort.\n\n        You stand amid the militia and their allies, shoulder to shoulder, sweaty palms on your gun. Olivia is right beside you. The quiet is absolute and all you can hear is your breathing. The near-silence is only broken by Buckshot.\n\n        \"I always get the shits before a big battle,\" she says, as if that is something you want to hear. \"It's the thought of killing that does it. Just makes me sick in all the worst ways. I still haven't decided if I wanna follow the boss's orders to the letter. Prisoners, or no prisoners?\"\n        *choice\n          #\"I say we kill them all.\"\n            *set kill 1\n            *set Cruelty %+10\n            *set Sadism %+10\n            *goto c3\n\n          #\"Taking prisoners is only what's right.\"\n            *set Cruelty %-10\n            *set Sadism %-10\n            *label c3\n            She shrugs. \"I'll follow your lead.\"\n\n            Just then, a red light floats into the air, then bursts. The flare. The signal.\n\n            \"March!\" shouts someone. And so you do, pressed by the men and women behind you, a wave of leather and steel and jerseys and guns. A wave of death.\n\n            The sewer encloses around you and your stomach grows tense. Torches held by the first row of warriors light the darkness and the stench of shit fills the air. Sunlight fades and soon you can barely see back to the pinprick of light at the entrance. \n\n            There is nobody waiting for you and the line to your exit is straight as an arrow.\n            *page_break\n            Climbing out of the sewers is a long, dull process. You expected at least the excitement of doing so under fire, but there are no Republican soldiers waiting for you in Fort Washington. You and your forces emerge from the underground and scurry about. A few soldiers lie dead along the wall, and you spot the Eagles climbing over it. The sound of gunfire rings out from a distance, no doubt coming from the Daughters.\n\n            \"Looks abandoned,\" says a Daughter warrior who rushed to meet you.\n\n            \"Then what's all that?\" asks Olivia. She points to conflict at the far end of the Fort - gunfire and smoke.\n\n            \"A few holdouts,\" says the warrior. \"We think they left anyone who couldn't run. Anyway, ReVivienne wants you to clear out this half of the base for any stragglers while our team keeps an eye on the sewers.\"\n\n            \"Got it,\" says Olivia.\n            *goto bc\n\n  *disable_reuse #\"Hold off on that. I still want to give diplomacy a chance.\"\n    *set Cruelty %-10\n    *set Sadism %-10\n    ReVivienne shrugs. \"That's your mistake, I guess. Walk on up to the front gate, see if they have anything to say.\"\n\n    That's exactly what you do. You head on up to the front gate, Olivia by your side, along with a dozen Daughters warriors. There are soldiers patrolling at the top of the wall. They yelp and raise their rifles when they notice you.\n\n    \"We've come to talk!\" you shout, loudly enough for them to hear. \"Send out your General.\"\n\n    \"Not a chance, savage,\" spits one of the soldiers. \"Now back up before we shoot.\" There's something odd in his voice. It trembles with fear, yet you've made no threats.\n    *fake_choice\n      #\"There's still a chance for peace.\"\n      #\"Peace can no longer be found, but that doesn't mean you have to die.\"\n      #\"Are these assholes really worth dying for?\"\n      #\"Here's the deal. Whoever brings me the General's head gets to live.\"\n\n    \"How about this,\" says the soldier. \"You go to hell.\"\n\n    \"That the best comeback you got?\" snaps one of your warriors.\n\n    \"Come on, this clearly isn't working,\" says Olivia, taking your arm. \"Let's head back to camp.\n    *page_break\n    \"Didn't work, huh?\" asks ReVivienne. \"Oh well. Now tell me, do you wanna run with the Eagles on the secondary position, or the the civilian militias with the infiltration units.\"\n    *goto a6\n", "12b-republic_win": "*set Health 100\n[i]There is a theory in history which claims that the world is shaped not by nations and creeds, but by great men who arise within them. The great man theory is perhaps even more true in the wasteland, where a single person can shape the balance of life and death. For that reason, I believe that our new histories will be built upon the choices of a few, rather than the hearts of thousands. I have seen some of these heroes, poets, and supermen in my time. It is upon their backs that a Table of Nations was born.[/i]\n\n-The Historian Pygmy, [i]A Treatise on Chaos[/i]\n\nLeaders and represenatives of all the great towns of Philly sit around a long table. The table itself is composed of several, but the cloth atop it creates a sense of unity. A lie. Perhaps a symbol.\n\nThe representatives are armed to the teeth and have brought protection, you notice, no doubt in case this congress goes terrible awry. Most have even gone so far as to leave their guns on the table - easier to grab if a fight starts.\n\n*if VFranklin = 1\n  You spot Voss of Franklin amid other village leaders, listening patiently as they discuss local matters. He nods his head and strokes his chin, too involved to notice you\n\n  *goto a1\n*else\n  You spot Gizmo, warlord of Franklin, alone in a corner. Village leaders keep their distance and he is surprisingly non-verbal. He simply looks over the other represenatives as a Fury would sheep.\n\n  *goto a1\n*label a1\n*if Corv = 1\n  Not too far from him sits Corvalla of the Eagles. Dozens of her soldiers fill the room, just as well-armed as everyone else combined, keeping the peace as is expected of militia. She chats with her soldiers, and with local represenatives, eagerly paying attention to all who voice concerns.\n\n  *goto a2\n*else\n  Not too far from him sits Cicada of the Eagles. Dozens of her soldiers fill the room, just as well-armed as everyone else combined, keeping the peace as is expected of militia. She stares emptily around the table, a hand on her pistol at all times. \n\n  *goto a2\n\n*label a2\nOlivia works her way in eventually, pushing through the thick crowds of armed villagers to find her seat at the table. She joins you in the corner, not bold enough to take the head, which remains empty.\n\n\"I'm a little disappointed,\" she whispers over the dull roar. \"I expected to see some Dutch Mill reps here.\"\n*fake_choice\n  #\"Me too.\"\n  #\"I don't know why you'd expect that. They don't like outsiders.\"\n\nShe interrupts you before you can discuss the Dutch at length. \"So can we talk about that bear girl?\" she asks, eyes going wide. \"Where do you get a pet bear? Did it raise her? Is she from a pack of bears?\"\n\n\"I don't know,\" you say.\n\nThe far doors open before you can continue this very important discussion. General Tappon enters, flanked by dozens of Allen soldiers, armed with heavy rifles. She herself is dressed in a freshly pressed uniform, her hair is done up under her beret, and a dozen pins hang from her breast. A hush falls over the crowd as she stands before them. Her glare is critical and analyzing. She's certainly done research on all of them, even the few wildcards such as yourself.\n\n\"Welcome, good people of Philly,\" she says, standing while they all sit. Her presence commands attention and respect despite her foreign status. \"Firstly, I would like to thank you all for agreeing to this Congress. It was actually a Congress like this that formed our great Republic, and brought each of our colonies into the fold. Ideally, Philly will be next. I'm sure many of you have reservations about such an impromptu meeting, and many of you have not yet truly gotten to know the people of Allen. All the same, I will keep my pitch brief. This land, as it stands now, is uncivilized. Slavers, highwaymen, not to mention that cult, the Daughters, who are less than a mile from this very Hall. For those reasons, my government has seen fit to offer you our protection. No more crucifixions and witch hunts, no more highwaymen raiding villages. Peace, in your lifetime.\"\n\nShe does not mention the uranium deposit under Black Vein, the alliance with Fulfillment, the battle with the Daughters - all of which are great talking points that could be used to sway those who are not yet committed one way or the other. This tells you two things: First, Tappon is no great orator. Second, she has bribed most of these represenatives, and does not actually need to give a real address.\n\nHer words, despite their weakness, elicit murmurs from the crowd. They whisper about slavers and cults and the people they've seen hanging on crosses. How would it feel to have real justice, they wonder?\n\nThe General goes on. \"For those unaware, the Trading Triangle has fallen into schism of late. Fulfillment has made pacts with our Republic without the consent of the Daughters. War is coming, my friends. The difference is that one side has a nation at its back. I implore you, please take the right side.\"\n\nMore murmurs. Then, something strangely unrehearsed happens. A woman you do not recognize stands up. She is near the head of the table, to the side somewhat. \n\n\"On behalf of Queen Echo of Fulfillment, I pledge our loyalty to his grand republic,\" she proclaims. The whole room goes silent.\n\nThen the delegate to her side rises, does the same on behalf of her village. Then the next, then the next. \n\n*if VFranklin = 1\n  Voss rises and says, \"The City of Franklin welcomes this new nation and will serve as a member. Let's take the fight to those Daughter dogs.\" Villagers cheer at his inciting words.\n\n  *goto a3\n*else\n  Gizmo rises and says, \"You all know that I take great pleasure in killing. As a member this nation, I swear to pleasure myself a great deal on these Daughter dogs.\" Villagers cringe uncomfortably, perhaps knowing better than to trust a highwayman.\n\n  *goto a3\n*label a3\nOlivia Buckshot is next. She stands tall and says, \"As the delegate from Black Vein - the center of this crisis - I swear to uphold the laws of this nation, just as you all swear to protect my people.\"\n\n*if Corv = 1\n  A few more villagers proclaim their allegience, including Penrose. Then, Corvalla of the Eagles speaks. \"As leader of the Eagles and a member of the Trading Triangle, I have been more involved in this Congress's planning than most of you. That in mind, I never really believed anything could make so many different people unite under a single flag.\" She points to you. All eyes follow the length of her finger, right toward you. \"It was this wastelander who showed me different.\"\n\n  *goto a4\n*else\n  A few more villagers proclaim their allegience, including Penrose. Then, Cicada of the Eagles speaks. \"Most of your don't know me, but you should know that I never supported the idea of this Congress. I never really believed anything could make so many different people unite under a single flag.\" She points to you. All eyes follow the length of her finger, right toward you. \"It was this wastelander who showed me different.\"\n\n  *goto a4\n*label a4\nAll eyes on you, you suppose it is your turn to make a statement. They all look to you, expectant, excited. Once again, you find yourself caught in a place you do not wish to be.\n*choice\n  #Tell them about the failures of the Daughters\n    \"It was not recently that the Daughters failed Philly,\" you say. \"For decades they have claimed to be our protectors. All the while they drained our resources in the name of battling highwaymen and slavers. And yet, both those threats continue to plague us. Allen's Republic, on the other hand, has cleansed itself of such impurities. By joining with them, we have cleanse our home of those very same threats, including the manipulative Daughters.\n\n    *goto a5\n\n  #Tell them about the virtues of nations\n    \"A people divided can never stand,\" you say, quoting someone from a book you once read. \"Allen's Republic is united, and has graciously welcomed us into their fold. If we are to stand a chance at surviving this coming war with the Daughters, we must do so together, as one nation. One nation, without the Daughters.\"\n\n    *goto a5\n  #Tell them about the trials of war ahead\n    \"War is never easy. For most of us, it's all we've ever known,\" you say. \"But this enemy is not stranger. For decades we've relied on them for our own protection. But now that protection has turned into a noose. The Daughters would sooner see us die than stand opposed to them. And so, that is exactly what we must do. Make no mistake, this will be the most treacherous war we've ever faced. But we will face it together, or die trying.\"\n\n    *goto a5\n\n*label a5\nThunderous applause deafens you, almost as loud as gunfire. It's so strange to stand before these people - your peers - and watch them praise you. Olivia cheers louder than any of them, a wicked smile on her face. You wonder if they realize that they are applauding a war.\n*page_break\nSome skirmishes here. A little raiding there. War is fairly boring. Most villages that declared for Allen have remained firmly under its control. For this reason, the Daughters have scarcely left their Temple Bell.\n\nYou stand beside Tappon and Buckshot, in the empty wastes near Temple Bell, not too far from the crosses where dead prisoners hang. Camp was made yesterday. Tents surround you, as do trucks and guns and soldiers, not to mention supplies. You don't recall ever seeing such forces mobilized, all at once. Maybe two hundred soldiers total, prepared for a terrible seige. Some are young boys, not yet able to grow a beard, acne on their cheeks. Some are old women missing all their teeth and wrinkled like canyons. They all stand here because of your actions, and they will either win or die by them.\n\n\"I wanna keep you two together,\" says Tappon.\n\nOlivia nods. \"Where are you going to be?\"\n\n\"Frontal assault,\" she says. \"I'll give you a choice. You can run with the Eagles on the secondary position - the distraction. Or you can join the civilian militias with the infiltration units.\"\n*label a6\n*choice\n  #\"We'll go with the secondary assault team.\"\n    *set Caution %-10\n    *set Deception %-10\n    \"Everyone appreciates the violent route,\" she says, mostly to herself. \"Report to the Eagles, they know their orders.\"\n\n    The Eagles are positioned on the far side of the encampment. Some of the tents have helmets and even red, wet skulls piked above their folds, taken as trophies from dead Daughters. The soldiers themselves are concentrated in a mass, wearing their strange uniforms, flanked by a handful civilian warriors.\n\n    *if Dwide = 1\n      You spot Dwide among the civilian volunteers, wearing his strange, tan garb. A few other Dutch stand beside him. He's too far to greet you, but nods in your direction. It's a respectful nod, more of a bow, as if he's thankful that his people have been drawn into this conflict. Maybe he's just glad to get out of the village for a while.\n\n      *goto b1\n    *else \n      *goto b1\n      *label b1\n      *if Corv = 1\n        Corvalla stands at the center of the mob - fifty warriors between you and her - and you hear here before you see her.\n\n        \"... and so we stand at the precipice of glory,\" she goes on. \"These so-called Daughters of Liberty have come to conquer us. They believe we can be subjugated. Today we show them just how wrong they are. Today we show all the wasteland, every wretch out there, that Philly belongs to us!\"\n\n        A roar of applause. Some warriors even shoot into the air, adding their gunshots to the cheers. \n\n        Corvalla smirks, looking at her devout warriors. Then she spots you in the crowd, lifts a finger to single you out. \"You! Our great ally!\" she shouts, loudly enough that they all turn to see you. \"I'm glad to see that you're joining our assault team.\"\n\n        Buckshot speaks up before you do, perhaps sparing you a ridiculous speech. \"We're just excited to be here,\" she says. \n\n        \"Perfect,\" Corvalla purrs. \"So, here's the plan. The soldiers from Allen are leading the siege from the front while we strike from a weak point at the rear. Civilian militias are already infilitrating the base through under-defended sewers. Ideally, I'd like to take some captives. Hostages will serve as incentive for the rest of the Daughters to surrender. All clear?\"\n\n        A chorus rings through the crowd: \"Yes ma'am.\" It sounds like the roll of thunder.\n\n        \"Very well,\" she says. \"Get in position and attack at the flare's mark.\"\n        *goto b2\n\n      *else\n        Cicada stands on a podium high above the mob - fifty warriors between you and her. You see her, then hear her.\n\n        \"... and so we stand at the precipice of slaughter,\" she goes on. \"These so-called Daughters of Liberty have come to conquer us, believing we can be enslaved. Today we show them quite the opposite. Today we show them that it is not we who shall be the slaves, but them. Today we show all the wasteland, every wretch out there, that their lives belongs to us! And so we get to take them.\"\n\n        A roar of applause. Some warriors even shoot into the air, adding their gunshots to the cheers. \n\n        Cicada smirks, looking at her devout warriors. Then she spots you in the crowd, lifts a finger to single you out. \"You! Our great ally!\" she shouts, loudly enough that they all turn to see you. \"I'm glad to see that you're joining our assault team.\"\n\n        Buckshot speaks up before you do, perhaps sparing you a ridiculous speech. \"We're just excited to be here,\" she says. \n\n        \"Perfect,\" Cicada purrs. \"So, here's the plan. The Republicans are leading the siege from the front while we strike from a weak point at the rear. Our job is to get in there and kill as many of them as possible. If you can cripple them, I want you to kill them. If they kill you, at least take a few with you. All clear?\"\n\n        A chorus rings through the crowd: \"Yes ma'am.\" It sounds like the roll of thunder.\n\n        \"Very well,\" she says. \"Get in position and attack at the flare's mark.\"\n        *goto b2\n\n        *label b2\n        *page_break\n        The assault team has assembled far along a distant road, in the midst of the shattered ruins of a Wawa. You can make out the fortified walls of the Temple Bell in the distance - barbed wire, guards on walkways, but not a true wall. A fence, marred by decades of rust. \n\n        You stand amid the Eagles and their allies, shoulder to shoulder, sweaty palms on your gun. Olivia is right beside you. The silence is absolute and all you can hear is your breathing. The silence is only broken by Buckshot.\n\n        \"I always get the shits before a big battle,\" she says, as if that is something you want to hear. \"It's the thought of killing that does it. Just makes me sick in all the worst ways. I still haven't decided if I wanna follow the boss's orders to the letter. Prisoners, or no prisoners?\"\n        *choice\n          #\"I say we kill them all.\"\n            *set kill 1\n            *set Cruelty %+10\n            *set Sadism %+10\n            *goto b3\n\n          #\"Taking prisoners is only what's right.\"\n            *set Cruelty %-10\n            *set Sadism %-10\n            *label b3\n            She shrugs. \"I'll follow your lead.\"\n\n            Just then, a red light floats into the air, then bursts. The flare. The signal.\n\n            \"March!\" shouts one of the Eagles. And so you do, pressed by the men and women behind you, a wave of leather and steel and jerseys and guns. A wave of death.\n\n            You press forward as one force, along a shattered grey road. Crosses line each side of the road, holding skeletons or half-decomposed bodies. Highwaymen, slavers, and the like. You wonder if the Republic is as vicious in their pursuit of such depravities.\n\n            The Temple Bell grows larger as you walk. It's a twisted metal thing, fenced off, with concrete walls. You recall walking down this road before, then being ambushed and blindfolded and bound to a chair, for no actual reason. That memory makes this whole thing much easier to justify.\n\n            This section of the compound is sparesely defended, far from the guard towers, far from the flag waving in the wind. A few warriors call out to one another, brandish their rifles, and open fire in the shadow of their temple.\n\n            They are felled in an instant by a hailstorm of bullets. Then the fence falls. Then, you're in.\n            *page_break\n            Gunfire fills the air - tension released in thick bolts of thunder. You see smoke rising on the far side of the compound, black as night. The Republic soldiers must be moving quickly.\n\n            *if kill = 1\n              *if Combat > 55\n                You open fire on the enemy, striking them down as swiftly as they rise. They crumble like pitiful ash beneath the weight of your lead, soaking the ground crimson. Not the first time you've killed. Not the last. Just another idle Tuesday.\n\n                *goto b4\n              *else\n                *set Health %-30\n                You open fire on the enemy, striking them down as swiftly as they rise. They crumble like pitiful ash beneath the weight of your lead, soaking the ground crimson. Not the first time you've killed. Not the last. Just another idle Tuesday.\n\n                One bullet strikes your thigh. You fall to a knee, grit your teeth through the waves of pain, and turn to face the attacker. A Daughter, already lying on the floor. You spit \"fuck off,\" through bared teeth as you pump another round of lead between her eyes.\n\n                *goto b4\n\n            *else\n              *if Combat > 55\n                You open fire on the enemy but are sure to aim for their arms and legs, careful not to kill them. They crumble to the ground like ash, soaking the ground crimson. A few are bound by kindhearted Eagles, but most are executed by stray bullets.\n\n                *goto b4\n              *else\n                *set Health %-30\n                You open fire on the enemy but are sure to aim for their arms and legs, careful not to kill them. They crumble to the ground like ash, soaking the ground crimson. A few are bound by kindhearted Eagles, but most are executed by stray bullets.\n\n                One bullet strikes your thigh. You fall to a knee, grit your teeth through the waves of pain, and turn to face the attacker. A Daughter, already lying on the floor. You spit \"fuck off,\" through bared teeth as you pump another round of lead between her eyes.\n\n                *goto b4\n\n                *label b4\n                \"This way,\" shouts Buckshot, leading your group toward the rear entrance of the Temple. Your soldiers move as one unit, rifles raised and eyes peeled, shooting at stray Daughter warriors. A few Eagles pick over the dead bodies, cleansing them of everything of value like insects cleaning bones. \n\n                The Eagles move without hesitation. Without discussion or discourse, one warrior takes it upon himself to fire his shotgun into the knob of the steel door. The warrior to his left kicks it in. She then leads the way, down a set of damp, concrete stairs, into the darkness.\n\n                You file down in rows of two while a portion of the warriors stay back at the door, to ensure that nobody follows you, or locks you in, or throws a grenade, or does any of the other horrible things you imagine happening.\n\n                The stairs lead into a basement, though not the chamber you were held in some weeks ago. Otherwise there would be a massive, cracked bell waiting for you. Instead, you see a number of steel doors, lining the walls in each direction.\n\n                \"Which one is it?\" asks one of the Eagles. \n\n                \"Just pick one,\" says another. \n\n                A few more warriors voice their opinions before silence overcomes them. Then the sound of gunfire echoes out, a buzzer rings, and the door to the stairs closes of its own force, somehow drawn shut electronically.\n\n                \"Shit,\" whispers Olivia, raising her rifle. \"It's a damn trap.\"\n\n                One of the doors slides open. The entire army, forty or so Eagles, turns as one to face it. They're calm enough to hold their fire as members of the infiltration team pour through. They rush into the room, just as surprised as you were, cursing when they realize that they too have fallen into a trap.\n\n                *goto bc\n                *label bc\n                Then a voice echoes out. ReVivienne's. \"Welcome, honored guests and members of this illegal Congress.\" You cannot spot where the voice is coming from. Must be some kind of ancient technology. \"After consulting with my fellow Daughters of Liberty, it has been decided that the first to suffer must be the contractor who organized your forces. You have ten minutes to place them before the left-most door, unarmed. If not, we'll have no choice but to open the doors and start shooting.\"\n\n                Eyes upon you, a terrible silence in the air, your mouth goes dry. Even Olivia stares at you with glazed eyes, making the same mental calculations that everyone else in the room is. She turns, back to you, and raises her gun, steely eyed and determined. \"You want them, you have to go through me.\"\n\n                Disappointingly, a few of the warriors raise their rifles, content to take that risk.\n                *choice\n                  #Accept this fate\n                    *set Cruelty %-8\n                    *set Sadism %-8\n                    *set Caution %+3\n                    *set Deception %-12\n                    \"Stand down, Olivia,\" you say, unstrapping your gun and placing it on the floor. She lowers hers. The crowd looks wild, on the verge of explosion, eyes going red, fingers itching triggers.\n\n                    \"What the hell?\" she whispers. \n\n                    You're already stepping back, slowly, toward the leftmost door. \"It's what has to be done.\"\n\n                    She takes your hand. At first you think it might be a romantic gesture, then you feel something cold and hard. A knife. You slip it into your sleeve. \"Don't die,\" she says.\n\n                    \"No promises,\" you say.\n\n                    The door opens with a mechanical whir and you step in. It slams closed behind you. You're beyond it now. Alone. Concrete walls on either side, a idle noise from beyond the metal door, a cold dagger up your sleeve.\n\n                    You could stay here forever, you think. Hide from your fate. But that's just a lie you're telling yourself. So, you start walking.\n                    *goto confront\n\n                  #Go out with a blaze\n                    *set Cruelty %+8\n                    *set Sadism %+8\n                    *set Caution %-3\n                    *set Deception %+12\n                    *set Health %-30\n                    *set Villain +1\n                    You open fire on the mob, and they do not hesitate to fire back. The close quarters make the gunshots deafening. You fire with gritted teeth, hoping at least take a few of them with you. Rage blinds you. You barely know where you're shooting.\n\n                    Then a sharp pain overcomes you. It spreads from your shoulder, then falls over your entire body. It feels like a knife. You fall to your knees, the screams of soldiers molest your eardrums. Then you reach up and wrap your fingers around the handle jutting from the wound. Damnit, it actually is a knife.\n\n                    A thousand hands grab at you, drag you, strip you of your gun, yank at your boot. You kick and writhe, but to no avail. And where is Olivia? You cannot see.\n\n                    Then you hear a mechanical whir. Another hand grabs you. The door slams. You're beyond it now. Alone. Concrete walls on either side, a clamor from beyond the metal door from which you came. Pain in your shoulder. You grit your teeth and tear the knife out, slip it up your sleeve.\n\n                    You could stay here forever, you think. Hide from your fate. But that's just a lie you're telling yourself. So, you start walking.\n                    *label confront\n                    *page_break\n                    The hallway widens to a familiar chamber. The orange glow of candlelight is cast on a large bell, the size of a person, with a thin crack along the side. Beside it stands ReVivienne, flanked by other Daughters. Their skin is darkened by dirt and dried blood, faces marked by oily war paints. There's exhaustion in their eyes. \n\n                    \"Hello, contractor,\" says ReVivienne. She forces a snake's smile onto her face, but you can see the pain in her eyes. She's done, even if she doesn't know it yet. The wall shatters as something explodes above. Dust falls from the ceiling. ReVivienne does not seem disturbed by this. \"Welcome to the end of the world. My sisters and I have come to an interesting conclusion. Would you like to know what it is?\"\n                    *fake_choice\n                      #\"I'd love to.\"\n                      #\"Not really.\"\n\n                    She smiles. The women at her side do not. \"With a little more time and maybe some uranium, we might have been able to turn this around. Or we might have blown Philly straight to hell. But it's only a matter of time before the Republic troops storm this place, free the militias below, kill us all. So, as the leader whose actions sentenced this militia to death, I've decided that we all deserve a little catharsis before we die.\"\n\n                    \"We're gonna torture you,\" says one of the women, brandishing a sword, a glare etched into her face. \"It'll be a nice send-off, since this is the end of our era.\"\n\n                    \"Any last words?\" asks ReVivienne, drawing a blade from her belt. You feel your own inside your sleeve, and wonder if you can take so many warriors at once.\n                    *choice\n                      #\"Nope. I'm just here for the violence.\"\n                        *set Sadism %+2\n                        *set Caution %-4\n                        *set Cruelty %+1\n                        \"Very well,\" says ReVivienne. \"Let's begin.\"\n                        *label f2\n\n                        They rush at you, blades in hand, steel flashing in the orange light.\n\n                        *if Combat > 85\n                          *label f4\n                          You draw your own knife and follow the instinct you've ever had: run toward the biggest and stab her. The world blurs into a mess of steel flesh as you bolt across the room. Then you're on top of her. It's not ReVivienne, but some other woman whose head is covered in braids. She barely even gets to gasp before you plunge your knife into her chest.\n\n                          Then the other Daughters are upon you. They're quick, but you're quicker, fueled by adrenaline. You dodge each strike as it comes toward you, stepping back and turning, and even twisting so that they manage to strike each other. The floor is soon soaked in blood, but none your own.\n\n                          You're covered in sweat and so are they, panting heavily, your heart pounding in your ears. How long has it been? A few minutes, maybe. \n\n                          Then you hear the sound of gunshots. It grows nearer. Then the steel door you can through is shot off its hinges. Then Republic soldiers, flood the chamber. Lead fills the air. The Daughters fall. Blood is everywhere, with its terrible, bitter stench. ReVivienne is amoung the dead, and it's hard for you to understand that, after all this time, she's finally dead.\n\n                          You barely notice all the death until your ears stop ringing, and you see so many familiar faces standing before you, speaking. Cluney's young face, a bit of stubble finally on his chin. Duchess beside him, smiling with a few missing teeth. And Olivia, a proud grin on her face. \n\n                          \"We did it,\" she says. \"We've won. Philly is ours.\"\n                          *goto kill-win\n\n                        *elseif Stealth > 85\n                          *goto f4\n\n                        *elseif Combat > 65\n                          *label f5\n                          *set Health %-15\n                          You draw your own knife and follow the instinct you've ever had: run toward the biggest and stab her. The world blurs into a mess of steel flesh as you bolt across the room. Then you're on top of her. It's not ReVivienne, but some other woman whose head is covered in braids. She barely even gets to gasp before you plunge your knife into her chest.\n\n                          Then the other Daughters are upon you. They're quick, but you're quicker, fueled by adrenaline. You dodge each strike as it comes toward you, stepping back and turning, and even twisting so that they manage to strike each other. The floor is soon soaked in blood, but none your own.\n\n                          You're covered in sweat and so are they, panting heavily, your heart pounding in your ears. How long has it been? A few minutes, maybe. \n\n                          That's when you notice the wound in your side, your blood seeping down, mingling with theirs below. The pain is numbed by your sense of danger. \n\n                          Then you hear the sound of gunshots. It grows nearer. Then the steel door you can through is shot off its hinges. Then Republic soldiers, flood the chamber. Lead fills the air. The Daughters fall. Blood is everywhere, with its terrible, bitter stench. ReVivienne is amoung the dead, and it's hard for you to understand that, after all this time, she's finally dead.\n\n                          You barely notice all the death until your ears stop ringing, and you see so many familiar faces standing before you, speaking. Cluney's young face, a bit of stubble finally on his chin. Duchess beside him, smiling with a few missing teeth. And Olivia, a proud grin on her face. \n\n                          \"We did it,\" she says. \"We've won. Philly is ours.\"\n                          *goto kill-win\n\n                        *elseif Stealth > 65\n                          *goto f5\n\n                        *else\n                          *set Health %-30\n                          *if Health > 40\n                            You draw your own knife and follow the instinct you've ever had: run toward the biggest and stab her. The world blurs into a mess of steel flesh as you bolt across the room. Then you're on top of her. It's not ReVivienne, but some other woman whose head is covered in braids. She barely even gets to gasp before you plunge your knife into her chest.\n\n                            Then the other Daughters are upon you. They're quick, but you're quicker, fueled by adrenaline. You dodge each strike as it comes toward you, stepping back and turning, and even twisting so that they manage to strike each other. The floor is soon soaked in blood, but none your own.\n\n                            You're covered in sweat and so are they, panting heavily, your heart pounding in your ears. How long has it been? A few minutes, maybe. \n\n                            That's when you notice the wound in your side, your blood seeping down, mingling with theirs below. The pain is numbed by your sense of danger. \n\n                            Then you hear the sound of gunshots. It grows nearer. Then the steel door you can through is shot off its hinges. Then Republic soldiers, flood the chamber. Lead fills the air. The Daughters fall. Blood is everywhere, with its terrible, bitter stench. ReVivienne is amoung the dead, and it's hard for you to understand that, after all this time, she's finally dead.\n\n                            You barely notice all the death until your ears stop ringing, and you see so many familiar faces standing before you, speaking. Cluney's young face, a bit of stubble finally on his chin. Duchess beside him, smiling with a few missing teeth. And Olivia, a proud grin on her face. \n\n                            \"We did it,\" she says. \"We've won. Philly is ours.\"\n                            *goto kill-win\n                          *else\n                            You draw your own knife and follow the instinct you've ever had: run toward the biggest and stab her. The world blurs into a mess of steel flesh as you bolt across the room. Then you're on top of her. It's not ReVivienne, but some other woman whose head is covered in braids. She barely even gets to gasp before you plunge your knife into her chest.\n\n                            Then the other Daughters are upon you. They're quick, but you're quicker, fueled by adrenaline. You dodge each strike as it comes toward you, stepping back and turning, and even twisting so that they manage to strike each other. The floor is soon soaked in blood, but none your own.\n\n                            You're covered in sweat and so are they, panting heavily, your heart pounding in your ears. How long has it been? A few minutes, maybe. \n\n                            That's when you notice the wound in your side, your blood seeping down, mingling with theirs below. The pain is numbed by your sense of danger. \n\n                            Then you hear the sound of gunshots. It grows nearer. You're suddenly struck with unimagineable dizziness as your wound stretches, pain wrapping around your torso. You fall to the ground, into the mud, and can only stare as boots fill your vision and lead fills the air. Then, your eyes close, and you don't see anything anymore.\n\n                            You'd been through so much. It seems such a shame that this end would be like so much of your life - pointless.\n                            *page_break Epilogue\n                            *set Health 0\n                            As it would turn out, the mighty Allen's Republic does not actually need you. No, you merely ran a few errands, and they will push onward without you.\n\n                            Soon all of Philly would know the meaning of civilization, under the boot and protection of an elected government. The wasteland would be cleansed of all highwaymen, slavers, and even mutant monsters that harrass its people. And at first, this seems well.\n\n                            But the people would come to chafe under the Republic's weight. Philly will be forced to serve as a staging ground for even more expansion, as its neighbors are colonized, one at a time. Even the harsh words of the elected Governor Echo are not enough to keep war from your people. Soon, as soldiers in the Republic's army, your people will wish for something as sweet as true civilization.\n                            *page_break\n                            Congratulations on completing \"The Black Vein\" and changing the face of the wasteland forever!\n\n                            We hope you enjoyed this playthrough of The Black Vein. If you found this ending less than satisfactory, feel free to restart the game and make other choices. There's more to do in the wasteland than die in battle.\n                            *goto_scene ending\n\n                      #\"You ladies obviously don't know who I am. I'm the one who kills you.\"\n                        *if Villain > 2\n                          *label f1\n                          *set Sadism %+2\n                          *set Caution %-4\n                          *set Cruelty %+1\n                          \"I've installed dictators,\" you say, straightening your back, raising your chin, wrapping your hands behind your back, and exaggerate somewhat. \"I've slaughtered entire villages. Scores of soldiers have died beneath my heel. Do you think this is the first time I've done this? No, this is just another Tuesday afternoon for me. So, after considering your offer, I'd like to make a counter offer. You all kill ReVivienne for me, then deliver me back to my forces unmolested. In return, you will continue to serve as soldiers under Allen's Republic. Sound fair?\"\n\n                          The women look at you, then at each other. ReVivienne smirks confidently. Then, the smile fades. A gunshot goes off. You instinctively cover your chest, then see the blood seeping on ReVivienne's. She stares back at you, mouth agape. A gasp slips from her lips. And then she falls.\n\n                          You stare at her in silence for a while, and the women don't say anything. A few minutes go by in that terrible quiet. Just you, some cultists, and a corpse.\n\n                          Then you hear the sound of gunshots. It grows nearer. Then the steel door you can through is shot off its hinges. Then Republic soldiers, flood the chamber. Lead fills the air. The Daughters fall. Blood is everywhere, with its terrible, bitter stench. \n\n                          You barely notice all the death until your ears stop ringing, and you see so many familiar faces standing before you, speaking. Cluney's young face, a bit of stubble finally on his chin. Duchess beside him, smiling with a few missing teeth. And Olivia, a proud grin on her face. \n\n                          \"We did it,\" she says. \"We've won. Philly is ours.\"\n                          *label kill-win\n                          *page_break Epilogue\n                          It's strange to see peace in your time, but you get to watch as Tappon runs Allen's Republic's flag up the Temple Bell's pole. And then you get to see the Daughters saluting it, before being carted off for executions, after a time imprisoned.\n\n                          As it turns out, civilization does not come overnight, and it would be years before all the highwaymen and slavers and mutant monsters are finally rooted out of the ruins. But Philly perseveres, and it is not long before the elected Governor Echo uses her keen skill in diplomacy to bring it into Allen's national politics.\n\n                          It will take her entire lifetime, but she is instrumental in the promotion of Philly from colony, to state, complete with voting rights for all its citizens. \n\n                          This is how your people joins a Table of Nations as great as those before the world collapsed on itself. Peoples such as Metropotamia, the Great Tribes of the Plain, the Republic of Kwik-Stop, and the Crescent Republic would rise from the ashes, proving that civilization, in its many forms, had not died when the world did.\n                          *page_break\n                          Congratulations on completing \"The Black Vein\" and changing the face of the wasteland forever!\n\n                          You met many fascinating factions on your quest. Please feel free to take one final look at their fate before you conclude this playthrough.\n                          *label final-sum1\n                          *choice\n                            #Franklin\n                              *if FGFranklin = 1\n                                Under Gizmo's strict military control, Franklin soon becomes one of the most powerful cities in all of the Philly Colonu. While cruelty and sadism are second-nature to him, Flora serves as a peaceful and charming ambassador to the rest of the wastes, and often as a mediator in local affairs. Together, they might one day extend their reach far beyond the walls of Franklin, and choke the life out of the wasteland.\n                                *goto final-sum1\n\n                              *else\n                                Voss may be a bit tempermental, but he is a far better option than a savage highwayman. His assurance of protection and peace don't mean as much as they did back before the Philly Colony. While this is certainly good for the common people, it is not great for Franklin, which only prospered by the height of its walls. Soon, markets begin opening up in the now-safe villages that were once considered no-man's-lands. It hurts Voss each time he sees one of his people go find new oppurtunity, and it kills him that he cannot offer it.\n                                *goto final-sum1\n\n                            #Dutch Mill\n                              *if Amos = 1\n                                Under the rule of Amos, the people of Dutch Mill would spend years without contact with the outside. This would eventually evolve into fear and hatred, as it so often has in other isolated cultures. Wastelanders of all walks of life would warn their children not to misbehave, or they'll be sent to live with the Dutch. This would never really happen, of course, because the Dutch would kill anybody who came too close to their gate.\n                                *goto final-sum1\n                              *else\n                                Dwide's kind ways were already common among the Dutch, and soon would spread to the rest of the wasteland. As trade between Dutch Mill and the rest of Philly grew, missionaries spread forth to deliver the word of their God, and his kind words. In this time, they would found two more villages, and many would come to enjoy their lifestyle. \n                                *goto final-sum1\n\n                            #Fulfillment\n                              As reward for her assistance in the colonization of Philly, Allen's Republic made Fulfillment the capital of the new colony. As such, she was a fierce contender for the role of regional Governor, and won the election in what Republican natives refer to as a \"landslide.\" Though it would take half her life, she would eventually spearhead the movement for Philly to abandon its colonial status and become a bonafide state.\n                              *goto final-sum1\n\n                            #The Eagles\n                              *if Cic = 1\n                                Under Cicada's leadership, the Eagles become critical in the final extermination of highwaymen, slavers, and other filth hiding in the ruins. But when those enemies fade away, replacements are found in the form of innocents. Belligerent Eagles pick fights with Republic soldiers, traders, and the civilians they are meant to protect, purely out of the boredom of peace. It is not long before a coup returns them to their normal, slightly less violent ways, though countless were crucified along the way.\n                                *goto final-sum1\n\n                              *else\n                                Under Corvalla's continued leadership, the Eagles become critical in the final extermination of highwaymen, slavers, and other filth hiding in the ruins. When those enemies are finally brought to justice, new enemies are found. Soon much of the wasteland knows the name of the Eagles, and highwaymen far beyond Philly learn to fear their sigil.\n                                *goto final-sum1\n\n                            #The Daughters of Liberty\n                              *if peace = 1\n                                Under the leadership of ReVivienne Washington, who served as a moderator in Philly in exchange for her freedom, the Daughters of Liberty would come to change form. As the army of Allen's Republic entered Philly in force, the Daughters ceased to serve as a militia, mostly due to remaining hostilities between the two factions. Some warriors went on to become soldiers in the Army, but most simply held onto the affiliation. Against her wishes, they would go on to form the first political party, aligning their votes in Congress in support of war, justice, and the elevation of womanhood. The Goddess Columbia would be proud.\n                                *goto final-sum1\n\n                              *else\n                                In the wake of the Temple Battle, Allen's Republic would spend half a decade locating and exterminating Daughters and sympathizers all around Philly. Many cities because warzones after attacks committed by so-called \"terrorists\" and the mythical ReVivienne Washington is credited with them all, despite her apparent death at the Temple Bell. The Goddess Columbia would be proud.\n                                *goto final-sum1\n\n                            #Black Vein\n                              Olivia Buckshot would come to be a great leader, as the elected mayor of Black Vein. Her fierce independence kept even the worst of Allen's greed out of her city, and it would soon come to rival Fulfillment in size, thanks to its favorable location. The uranium, however, would remain buried. And that is okay with even the most militant of the watseland, because they all know exactly what such fuel could cause. While many in the Republic wish to access it, their better angels and long memories often prevail. Her many books about philosophy and history will come to circulate the wasteland, inspiring critical thought and patient leadership for years to come.\n                              *goto final-sum1\n\n                            #Finish\n                              Once again, congratulations on completing \"The Black Vein\" and changing the face of the wasteland forever!\n\n                              We hope you enjoyed this playthrough of The Black Vein. If you found this ending less than satisfactory, feel free to restart the game and make other choices. There's more to do in the wasteland than colonize Philly.\n                              *goto_scene ending\n\n                        *elseif Cruelty > 55\n                          *goto f1\n\n                        *elseif Sadism > 55\n                          *goto f1\n\n                        *else\n                          \"I've killed before. You think I won't kill again?\" you ask, hoping to sound intimidating.\n\n                          \"You're a pissant contractor who's gotten lucky a few times,\" spits one of the women.\n\n                          \"And on that note,\" says ReVivienne. \"Let's begin.\"\n                          *goto f2\n\n                      #\"You don't have to do this. We can have peace.\"\n                        *set Sadism %-2\n                        *set Caution %+1\n                        *set Cruelty %-1\n                        *if Persuasion > 85\n                          \"This doesn't have to be the end of the world,\" you say, not quite sure where you're going with this. \"The last thing anyone wants is more death, but the Republic's expansion cannot be stopped. All we can do is shift the battlefield. The Daughters have this power to mobilize the people of Philly, but you have to change your perspective. The Republic is just that - a government by the people. If you surrender, you can join it. You can fight this war with peace, making sure that Allen never makes our home just like them. You can't stop colonization, but you can keep Philly whole.\"\n\n                          One by one, the women lower their weapons, swayed either by your word or the realization that they might die. ReVivienne looks to her warriors, then finally lowers her blade. \"Maybe we were a bit rash,\" she says, almost silently.\n\n                          \"It's not too late,\" you say, reaching out a hand and flashing a smile. \"It's not the end of the world, it's just a changed one.\"\n\n                          ReVivienne steps forward, glances back at her girls, and swallows her pride. Her hand is cold and clammy in yours, but her smile is warm.\n\n                          You did it. Philly is yours\n                          *goto kill-win\n                        *else\n                          \"You misunderstand,\" says one of the women. \"We don't want peace, we want you to suffer.\"\n\n                          \"Exactly,\" says ReVivienne. \"Let's begin.\"\n                          *goto f2\n\n\n  #\"We'll go with the infilitration units.\"\n    *set Caution %+10\n    *set Deception %+10\n    \"I appreciate the stealthy route,\" says Tappon. \"Spares a lot of blood.\"\n\n    The infiltration team meets at an old ruin where a building once stood. They assemble at a basement, which you understand connects to the Temple through some underground network of ancient tunnels, for reasons you do not fully understand. Those damn ancients and their complex buildings.\n\n    *if Dwide = 1\n      You spot Dwide among the civilian volunteers, wearing his strange, tan garb. A few other Dutch stand beside him, heading toward another part of camp. He's too far to greet you, but nods in your direction. It's a respectful nod, more of a bow, as if he's thankful that his people have been drawn into this conflict. Maybe he's just glad to get out of the village for a while.\n\n      *goto c1\n    *else \n      *goto c1\n      *label c1\n      *if VFranklin = 1\n        Voss stands before the warriors, head held high. The people look to him with admiration in their eyes. And why wouldn't they? He's a simple man like any of them, just trying to protect those he loves. No nation-building aspirations, nor dreams of colonization. Just a man doing his duty.\n\n        \"The plan is simple,\" he says to the two dozen or so volunteers, most of whom have already served under him at Franklin. \"The Republic's soldiers are knocking on the front door, the Eagles are striking at the rear. Our job is to sneak in through these shitty tunnels and help them as best we can from the inside. Scouts have already confirmed that we can access the basement of their compound from here. Now, I'm not one for big speeches, so I'm not gonna tell you why this battle is so important. You all trust me, I just ask that you trust me again.\"\n\n        A roar of applause. Some warriors even shoot into the air, adding their gunshots to the cheers. \n\n        Voss scans his warriors, a hint of pride in his eyes. He smiles when his eyes meet yours, as if you both know something they don't.\n\n        \"One last thing,\" he says. \"We're gonna take as many prisoners as we can. Now get ready. We move when at the flare's mark.\"\n        *goto c2\n\n      *else\n        Gizmo stands proudly before the warriors, a head taller than any of them. The people look to him with fear in their eyes. And why wouldn't they? He's a conquerer absolved of all sin by virtue of attendance in the Congress. Half the people serving him are \"reformed\" highwaymen, and the other half are militia who didn't realize who would be leading them.\n\n        \"The plan is simple,\" he says to the two dozen or so volunteers, most of whom have already served under him at Franklin. \"The Republic's soldiers are knocking on the front door, the Eagles are striking at the rear. Our job is to sneak in through these shitty tunnels and help them as best we can from the inside. Scouts have already confirmed that we can access the basement of their compound from here. Now, I'm not one for big speeches, so I'm not gonna tell you why this battle is so important. You all trust me, I just ask that you trust me again.\"\n\n        A roar of applause. Some warriors even shoot into the air, adding their gunshots to the cheers. \n\n        Gizmo scans his warriors, a hint of pride in his eyes. He smiles when his eyes meet yours, as if you both know something they don't. So strange that he was once terrified of Allen's Republic.\n\n        \"One last thing,\" he says. \"We take no prisoners. This is a message we're sending to the Daughters: Allen's Republic shows no mercy.\n        *goto c2\n        *label c2\n        *page_break\n        The infiltration team has assembled far enough from the Temple Bell that you can just barely make out the crosses that line its external fence. \n\n        You stand amid the militia and their allies, shoulder to shoulder, sweaty palms on your gun. Olivia is right beside you. The quiet is absolute and all you can hear is your breathing. The near-silence is only broken by Buckshot.\n\n        \"I always get the shits before a big battle,\" she says, as if that is something you want to hear. \"It's the thought of killing that does it. Just makes me sick in all the worst ways. I still haven't decided if I wanna follow the boss's orders to the letter. Prisoners, or no prisoners?\"\n        *choice\n          #\"I say we kill them all.\"\n            *set kill 1\n            *set Cruelty %+10\n            *set Sadism %+10\n            *goto c3\n\n          #\"Taking prisoners is only what's right.\"\n            *set Cruelty %-10\n            *set Sadism %-10\n            *label c3\n            She shrugs. \"I'll follow your lead.\"\n\n            Just then, a red light floats into the air, then bursts. The flare. The signal.\n\n            \"March!\" shouts someone. And so you do, pressed by the men and women behind you, a wave of leather and steel and jerseys and guns. A wave of death.\n\n            The dark tunnel encloses around you and your stomach grows tense. Torches held by the first row of warriors light the darkness and the stench of staleness fills the air. Sunlight fades and soon you can barely see back to the pinprick of light at the entrance. \n\n            There is nobody waiting for you and the line to your exit is straight as a bullet's path.\n            *page_break\n            They are upon you before you exit the tunnel. A dozen Daughters, armed to the teeth, cast in shadows. Gunfire lights up like stars.\n\n            *if kill = 1\n              *if Stealth > 55\n                You open fire on the enemy, striking them down as swiftly as they rise. They crumble like pitiful ash beneath the weight of your lead, soaking the ground crimson. Not the first time you've killed. Not the last. Just another idle Tuesday.\n\n                *goto c4\n              *else\n                *set Health %-30\n                You open fire on the enemy, striking them down as swiftly as they rise. They crumble like pitiful ash beneath the weight of your lead, soaking the ground crimson. Not the first time you've killed. Not the last. Just another idle Tuesday.\n\n                One bullet strikes your thigh. You fall to a knee, grit your teeth through the waves of pain, and turn to face the attacker. A Daughter, already lying on the floor. You spit \"fuck off,\" through bared teeth as you pump another round of lead between her eyes.\n\n                *goto c4\n            *else\n              *if Stealth > 55\n                You open fire on the enemy but are sure to aim for their arms and legs, careful not to kill them. They crumble to the ground like ash, soaking the ground crimson. A few are bound by kindhearted Eagles, but most are executed by stray bullets.\n\n                *goto c4\n              *else\n                *set Health %-30\n                You open fire on the enemy but are sure to aim for their arms and legs, careful not to kill them. They crumble to the ground like ash, soaking the ground crimson. A few are bound by kindhearted Eagles, but most are executed by stray bullets.\n\n                One bullet strikes your thigh. You fall to a knee, grit your teeth through the waves of pain, and turn to face the attacker. A Daughter, already lying on the floor. You spit \"fuck off,\" through bared teeth as you pump another round of lead between her eyes.\n\n                *goto c4\n\n                *label c4\n                \"This way,\" shouts Buckshot, leading your group toward the end of the tunnel. The militiamen are quick to pick over the bodies of dead Daughters, leaving them stripped of ammo, weaponry, and armor. Like bones cleaned by ants. \n\n                The tunnel leads into a base
