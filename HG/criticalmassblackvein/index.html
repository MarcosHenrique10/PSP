aller than the rest of his men. Surely this is Gizmo.\n\n                \"You work fo Voss,\" he presumes in a thick, venomous, voice. \"What does he want?\"\n\n                *if Persuasion > 65 \n                  *set Deception %+10\n                  \"I don't work for anyone,\" you lie. \"I'm just a concerned citizen.\"\n\n                  *goto c20\n\n                *else\n                  \"Yeah, I work for Voss,\" you admit.\n\n                  \"Then he hired you to die.\"\n                  *choice\n                    #Attack Gizmo\n                      *goto c17\n\n                    #Run like hell\n                      *goto c12\n\n    *label franklinend\n    *page_break\n    *set Franklin true\n    And so continue your quest for the ghost town, map in hand, putting the violent incidents in Franklin behind you. Still, you cannot help but wonder why Gizmo was so eager to leave the wasteland, or what that danger might mean for you.\n    *finish\n", "10a-fulfillment": "*set Health 100\n[i]Diplomacy is at the core of any Republican society. When possible, we make friends. Unfortunately for us peaceable people of the wasteland, this is not always possible. And so, we go to war. But simple violence is not something to which we are accustomed. So, we send scouts first to do what they do best: undermine the enemy, weaken them, so that we can civilize them with less bloodshed. It's really the kindest thing we can do.[/i]\n\n-President Ellen Burrows, [i]Reflections on the Republic: History in the Making[/i]\n\nFulfillment is much the same as when you left it. Captain Horan elected to leave his soldiers at Black Vein in order to watch over it, and seems to consider you an ally enough in this case. Olivia Buckshot joins you as well, for reasons you don't quite understand. Perhaps she is simply that confident in the Republic's ability to protect her people. Perhaps she simply wishes to visit Fulfillment.\n\n\"So, they're a kingdom?\" she asks as you all wait before the throne room.\n\n\"Queendom, actually,\" says Horan. \"They're sort of like the Daughters, from what our intel has gathered. Female-dominated.\"\n\nBuckshot smiles. \"Sweet.\"\n\nCaptain Horan shrugs. \"Can't really blame them. Last I checked, men are the ones who burned the world in the first place.\" A tinge of guilt stains his voice, as if he himself were somehow responsile for the actions of those from ancient days.\n\nThe comment hangs in the air, practically begging for a response. Then the doors to the throne room slide open, ending the conversation.\n*page_break\nQueen Echo sits atop her paper throne, flipping through the yellowed pages of the book you went to so much trouble in retrieving. She does not look up for some time, and so you stand there, being stared at by the seneschal and the Eagles representative. The room seems oddly empty without Artoria's harsh glare.\n\nThen the Queen places a strip of leather between the pages and closes the book. \"Good people of Allen's Republic,\" she starts, clearing her throat. \"My seneschal has brought the assault by the Daughters to my attention. It seems Artoria caught word of our new alliance. Luckily, the Eagles stand with us.\"\n\nHoran points a finger at her. \"You let this happen,\" he spits. \"It was your duty to keep our negotiations private and you failed. How do we know that we cna trust you to maintain this alliance? My President won't be happy.\"\n\n\"I don't care what your President wants,\" says the Queen, now standing, raising her voice. \"You stand in my court.\"\n\n\"My soldiers died,\" he says, spittle flying from his lips. \"Three good men had to be buried. Because you couldn't keep your lips shut.\"\n\nThe Queen sighs. \"I'm sorry for your loss, Captain. But you should know better than most that secrets this big cannot be kept. I propose we move to the next phase.\"\n\n\"We aren't ready,\" he says.\n\n\"Wait, what's the next phase?\" asks Buckshot. The very same question you wish to ask. \n\n\"There's no more time,\" says Echo. \"We have to move now.\"\n\n\"Someone wanna clue me in?\" asks Buckshot.\n\nHoran looks to the Queen, to the Eagles ambassador, then looks to Olivia. \"The next phase is a congress.\"\n\n\"Contact your General, Captain Horan,\" says the Queen, sitting back upon her throne. \"We must make haste for Independence Hall.\"\n*set Fulfillment true\n*set BlackVein true\n*goto_scene 11-independence_hall", "10b-fulfillment": "*set Health 100\n[i]Diplomacy is at the core of any Republican society. When possible, we make friends. Unfortunately for us peaceable people of the wasteland, this is not always possible. And so, we go to war. But simple violence is not something to which we are accustomed. So, we send scouts first to do what they do best: undermine the enemy, weaken them, so that we can civilize them with less bloodshed. It's really the kindest thing we can do.[/i]\n\n-President Ellen Burrows, [i]Reflections on the Republic: History in the Making[/i]\n\nFulfillment is much the same as when you left it. Artoria elected to leave her warriors behind at Black Vein, so that they might watch over the populace. She allowed Olivia Buckshot to join you on this mission, for reasons you don't quite understand. Perhaps Olivia really just wishes to make a good impression on her new overlords. Perhaps Artoria wishes to keep the deadliest villager close, far from any possible fighting.\n\n\"So, they're a kingdom?\" she asks as you all wait before the throne room.\n\n\"Queendom, actually,\" says Artoria. \"They're like us, in that way. Very progressive, very advanced. For traders.\"\n\nBuckshot smiles. \"Sweet.\"\n\nArtoria smiles back, a twinge of pride in her eyes. Maybe she'll get along with this girl. \"The Daughters hold it to be true that men are the ones who damned this world. It only makes sense that women now get to rule it.\n\nThe comment hangs in the air, practically begging for a response. Then the doors to the throne room slide open, ending the conversation.\n*page_break\nQueen Echo sits atop her paper throne, flipping through the yellowed pages of the book you went to so much trouble in retrieving. She does not look up for some time, and so you stand there, being stared at by the seneschal and the Eagles representative. Artoria glares harshly at the bald seneschal, hate in her eyes.\n\nThen the Queen places a strip of leather between the pages and closes the book. \"Good people, my fellow representatives of the Trading Triangle, what is this I hear of a battle by Black Vein?\" she asks, clearly feigning her ignorance.\n\n\"You made a pact with Allen's Republic,\" spits Artoria, pointing a finger at the Queen. \"You are a traitor to the Trading Triangle.\"\n\nThe Queen stands, eyes wide. \"This is my throne room,\" she says, spittle flying from her lips. \"I demand your respect in my own lands.\"\n\n\"My warriors are dead,\" she says. \"Three good women had to be buried. Because you betrayed your people.\"\n\nThe Queen sighs. \"I'm sorry for your loss, Artoria, but you know that I've had no contact with these enemies you speak of. You witness all of my comings and goings. I could not have done this.\"\n\nArtoria smirks. \"Of course you didn't,\" she says. She looks to the bald seneschal. \"Your seneschal did. They've been trying to undermine the Daughters for years.\"\n\nThe Eagles ambassador draws a pistol, places it against the seneschal's bald head. \n\n\"Hold your fire, ambassador,\" says the Queen. She sits upon her throne again, pinches her brow. \"We will investigate this matter internally. Until then, I invite your Daughters to come enjoy Fulfillment, if only to serve as outside observers. However, if the threat you've described is true, then we must move onto the next phase.\"\n\n\"We aren't ready,\" she says.\n\n\"Wait, what's the next phase?\" asks Buckshot. The very same question you wish to ask. \"Since when are there phases?\"\n\n\"There's no more time,\" says Echo. \"We have to move now.\"\n\n\"Someone wanna clue me in?\" asks Buckshot.\n\nArtoria looks to the Queen, to the Eagles ambassador, then looks to Olivia. \"The first phase was the founding of the Trading Triangle. The second was the extermination of highwaymen, which is not quite complete. The next phase is a congress.\"\n\n\"Contact ReVivienne Washington, Artoria,\" says the Queen. \"We must make haste for Independence Hall.\"\n*set Fulfillment true\n*set BlackVein true\n*goto_scene 11-independence_hall\n", "11-independence_hall": "[i]Perhaps the most curious aspect of the ancients is their architecture. Each city seems to have its own distinct style, yet places of worship such as Wawas and Chick-Fil-As have a particular style that is consistent regardless of location. One must then wonder: When will we learn to build like they did?[/i]\n\n-An Anonymous Archivist, [i]Architecture of the Ancients[/i]\n\nYou stare up at the broken brick of what was once Independence Hall.\n*fake_choice\n  #\"Remind me again why we're the ones clearing out this shit hole?\"\n  #\"God, this place looks nasty.\"\n  #\"So, now we're a cleanup crew.\"\n\nFalling red bricks. Faded white paint on the windows. A belltower at the top, now falling into shambles, tilting oddly to one side. \n*if dau = 1\n  You're near enough to Daughters territory that they should be doing this themselves.\n\n  *goto a1\n*else\n  You're near enough to Daughters territory that ReVivienne could kill you without having to take a step.\n\n  *goto a1\n\n*label a1\nAnd yet, here you are, ignoring mysterious signs that says 'no parking any time.'\n\n\"Nobody likes a whiner,\" says Buckshot. \"You should consider this an honor. For the first time in decades, the people of Philly are going to meet and make decisions. And what better place to meet than this? This is where the Ancient Americans governed their countries.\"\n\n\"And how did that work out?\" you ask. \"How will that work out for us?\"\n\nOlivia shrugs. \n*if dau = 1\n  \"Ideally, they'll unite into one state, at least long enough to fight the Republic.\"\n\n  That may be a good point, but the Daughters aren't exactly peace-loving. You wonder how they'll fare as part of a nation. Still, you're already stuck in this course of action. All you can hope to do is make changes from the inside.\n  *goto a2\n\n*else\n  \"Ideally, they'll unite into one state of the Republic. Even if that means fighting the Daughters.\"\n\n  That may be a good point, but you recall learning that the Republic funded slavers to undermine Philly. How far are they willing to go to take Philly? Still, you're already stuck in this course of action. All you can hope to do is make changes from the inside.\n  *goto a2\n\n*label a2\n*choice\n  #\"What makes you think forming countries is such a great idea?\"\n    \"It's better than waiting around for highwaymen to pick us off. If all the good people of the wastes are one the same side, how can they lose, right?\"\n\n    *goto a3\n\n  *if (rep = 1) #\"What do you stand to gain by working with the Republic?\"\n    \"I'm just a lady trying to make my way in the wasteland. If I end up living in Black Vein the rest of my life, then that'll be just fine too.\"\n\n    *goto a3\n\n  *if (dau = 1) #\"Why did you betray the Republic?\"\n    \"I'm just a lady trying to make my way in the wasteland. If I have to change sides to keep Black Vein safe, I've got no problem with that.\"\n\n    *goto a3\n\n*label a3\nYou approach the entrance of the ancient building before you can continue the conversation. All thoughts of slavers and philsophy and contested uranium deposits fall away as you raise your gun. Danger lies ahead.\n\n\"Did Queen Echo tell you what we're supposed to be clearing out of here?\" you ask. \n\n\"Nope,\" says Olivia. \"But with my luck, it's gonna have teeth. Or stingers. Or guns. Maybe all three.\"\n\nShe plants a foot on the double doors and kicks them in with a solid thud. Dust flies as sunlight pours into the shattered wooden remains of the now rotting interior. The whole place reeks of age and disuse, and possibly the black mold on the walls. The odor is sharp and sour, and it's enough to make acid pool at the back of your mouth.\n\n\"This place smells like shit,\" says Olivia, scanning the area. A staircase leads upward toward shattered windows, then splits off into either direction, wrapping back around above your head. Hallways extend in either direction. \n\n\"Most ruins smell like shit,\" you point out. In fact, statistically, someone had probably shit here at some point since the war. You decide not to mention this, as someone as seasoned as Olivia surely knows.\n\n\"Where do you wanna investigate first?\" she asks.\n\nThen something creaks above you. The floorboards shake slightly and dust falls. \"I think that's our answer,\" you say.\n*page_break\nThe stairs are not in the best shape. They're a splintered, broken, moldy mess. You're careful not to step directly onto the jagged edges of wood, not wishing to ruin your boots. \"Be careful,\" advises Olivia in a hushed tone, so as not to attract the attention of the source of the odd noises. They've grown louder, the noises, and are no longer limited to the creaking of wood.\n\nSomething growls above, and the sound of claws against wood echoes out, and something snarls, and the wood creaks, and a chill rises along your back. What if all those noises come from one great beast? The thought of it holds you still, keeps your foot from pacing up the next step.\n\n\"Better not be a goddamn bear,\" says Olivia. \"I hate bears.\"\n\nShe leads the way, rifle raised, up the stairs. Her steps are slow, measured, far more cautious than you've ever seen from her.\n\nShe turns the corner before you. All you hear is, \"Goddamnit!\"\n*page_break\nThe bear is large with mottled fur, flattened in some places and bloodied, soaked, in others. Some spots are missing fur, revealing pained pink flesh below. It rests on the loft, idly clawing at the wooden frames beside it. A leather collar is wrapped tightly around its neck, flesh bulging out from either side. \n\n\"What the hell is that thing doing here?\" hisses Olivia. Then she spots the collar, something shiny dangling from its front. A tag. \"Shit, it's someone's pet.\"\n*choice\n  #\"Where's the owner?\"\n    Olivia shrugs. She points to the mess of sheets in the corner, on top of a stained mattress. Both are covered in a thick layer of dust. \"Looks like it's been a while since they were here.\"\n\n    *goto a4\n\n  #\"I wanna pet it.\"\n    \"You shouldn't do that,\" says Olivia. She points to the mess of sheets in the corner, on top of a stained mattress. Both are covered in a thick layer of dust. \"Looks like it's been a while since the owner was here.\"\n\n    *goto a4\n\n  #\"Looks tasty.\"\n    \"I'm gonna pretend you didn't say that,\" says Olivia. She points to the mess of sheets in the corner, on top of a stained mattress. Both are covered in a thick layer of dust. \"Looks like it's been a while since the owner was here.\"\n\n    *goto a4\n*label a4\nAs the bear turns in the yellow sunlight, you get a better look at it. Deep cuts line its back, gone black and dry long ago. The fur has yet to grow back in those places, making the jagged wounds more visible. Some looks like they were infected, and still show the scars of festering. Then you notice the blood on its snout, still visible despite going dry long ago. \"Did it eat its owners?\" you ask. And it's a fair question, considering the red stains on the mattress.\n\n\"God I hope it doesn't have a taste for human flesh,\" is all Olivia can muster. Then she looks to you. \"Come on, wasteland expert. What's the plan here?\"\n*goto b1\n  *label b1\n  *choice\n    #\"Start shooting, obviously.\"\n      *set Cruelty %+6\n      *set Sadism %+4\n      *set Caution %-5\n      *set Deception %-1\n      She offers a sideways smirk. \"It's like you read my mind.\"\n\n      The bear notes your presence, perhaps sensing your ill intent, and snarls, then barrels toward you. You do not hesitate to open fire on the great beast in a deafening cacophony of lead.\n\n      *if Combat > 45\n        Bullets pepper its thick hide and shells fall to the trembling floor. The bear flinches, falls back. You prepare to offer another volley, but Buckshot rushes forward. In a single motion she strikes the bear across the snout with the butt of her rifle, then firing right into its head. \n\n        *goto dead-bear\n        *label dead-bear\n        The bear falls to the floor, sending up a plume of dust. Olivia stands over it, grunting, panting. Then, looking at its lifeless hide, she recomposes herself. \"That was surprisingly easy,\" she says. \n\n        Then you hear a whimper amid the ringing in your ears, and turn to see a small child standing down the hall, tears streaming down her cheeks, a leash in her hand.\n        *goto child1\n\n\n      *else\n        *set Health %-15\n        Bullets pepper its thick hide and shells fall to the trembling floor, but your shots do not hit anything vital. It swipes viciously at you, claws grazing your chest. You fall onto your back as blood seeps through your shirt. Lying down, staring up at its jaws, you prepare to offer another volley, but Buckshot rushes forward. In a single motion she strikes the bear across the snout with the butt of her rifle, then firing right into its head. \n\n        *goto dead-bear\n\n    #\"Lure it outside.\"\n      *set Cruelty %-6\n      *set Sadism %-4\n      *set Caution %+5\n      *set Deception %+1\n      \"Should we use some raw meat or something?\" asks Olivia. \n\n      \"I think we can just make some noise and it'll follow us,\" you say.\n\n      The bear notes your presence, perhaps sensing your ill intent, and snarls, but doesn't move. It just stares at you, as if evaluating the danger you may pose, and if killing you is worth the effort.\n\n      \"Come on,\" you say, patting your knees, as if that will somehow get its attention. \"Come on.\" You say it over and over again like the bear is a small dog, excited for a walk. You take a few steps backwards, down the rickety steps. Then it lifts a paw, starts to follow.\n\n      \"Uh, I'm gonna stay up here,\" says Buckshot, stepping toward one of the windows, raising her rifle so that the bear does not come any closer. It does not notice her. \"You have fun,\" she says.\n\n      You lead the bear all the way downstairs, stepping slowly and quietly, hoping not to startle it. It must be trained, you reason, since it hasn't mauled you yet. Still, you keep a hand on your gun, even as you take your first steps back outside.\n\n      *if Stealth > 45\n        Sunlight strikes its flesh and at first the bear balks, covers its face with a paw. \n\n        \"Come on,\" you say in the same cooing voice you would use on a child.\n\n        After a moment of hesitation, the bear steps forward, now a few feet from the door.\n\n        The bear's head explodes in a mess of blood and a deafening crack shatters across the sky. As your ears ring and you blink impotently, you realize that the noise had actually come first. Looking past the slumping, dead body of the bear, you see a shattered window. \n\n        You race back into the Hall, up the stairs, and see Olivia standing there, a smile on her face. \n\n        \"Nailed it,\" she says. \"Now it won't be bothering anyone else, now will it?\"\n\n        You're about to offer your response, either praising or admonishing Olivia, when you hear a whimper amid the ringing in your ears, and turn to see a small child standing down the hall, tears streaming down her cheeks, a leash in her hand.\n        *goto child1\n\n      *else\n        *set Health %-15\n        Sunlight strikes its flesh and at first the bear balks, covers its face with a paw. \n\n        \"Come on,\" you say in the same cooing voice you would use on a child. Then you step on something hard and it echoes loudly, metallically, across the field. Looking down, you see that it was a rusty tin can.\n\n        The bear snarls, growls, and rushes toward you, somehow upset at this noise. It flashes its claws and you are too slow on the draw. It swipes viciously at you, claws grazing your chest. You fall onto your back as blood seeps through your shirt.\n\n        The bear's head explodes in a mess of blood and a deafening crack shatters across the sky. As your ears ring and you blink impotently, you realize that the noise had actually come first. Looking past the slumping, dead body of the bear, you see a shattered window. \n\n        You race back into the Hall, up the stairs, and see Olivia standing there, a smile on her face. \n\n        \"Nailed it,\" she says. \"Now it won't be bothering anyone else, now will it?\"\n\n        You're about to offer your response when you hear a whimper amid the ringing in your ears, and turn to see a small child standing down the hall, tears streaming down her cheeks, a leash in her hand.\n        *goto child1\n\n    #\"Try and calm it down.\"\n      *set Cruelty %-6\n      *set Sadism %-4\n      *set Caution %-5\n      *set Deception %-1\n      \"And, what, befriend it?\" she asks, rolling her eyes. \"Maybe it can be your friend and you can move in together in Franklin, get a loft or something.\"\n\n      \"That's literally the best idea I've ever heard,\" you say.\n\n      You step forward slowly, lowering your head so as not to seem a threat to the massive beast. It sees you, but remains quiet and still. Upon this closer inspection, you see just how bad its wounds are. Much of its flesh is rancid and blackened.\n\n      \"Hey, buddy,\" you say, really quietly so as not to startle it.\n\n      It lifts its head like a dog who hears his name being called, lilting slightly to the side.\n\n      *if Persuasion > 45\n        You reach a hand out, slowly, and say, \"Wanna go for a walk? We can go to the park, maybe have a nice run. Kill some ducks, too. Would you like that?\" You coo at it like a mother with her child.\n\n        The bear stirs, rises onto its hind legs, and opens its jaw. But it is not a confrontational stance in the slightest. It seems merely to be stretching, excited at the prospect of a walk. Its tongue hangs out dumbly.\n\n        The bear's head explodes in a mess of blood and a deafening crack shatters across the room. As your ears ring and you blink impotently, you realize that the noise had actually come first. Looking past the slumping, dead body of the bear, you see a shattered window. \n\n        \"Nailed it,\" says Olivia. \"Now it won't be bothering anyone else, now will it?\"\n\n        You're about to offer your response, either praising or admonishing Olivia, when you hear a whimper amid the ringing in your ears, and turn to see a small child standing down the hall, tears streaming down her cheeks, a leash in her hand.\n        *goto child1\n\n      *else\n        *set Health %-15\n        \"Come on, we're getting out of here,\" you tell it, standing tall so that he sees you as a threat. You reach a hand out to grab it by the collar, but it flinches. It is not intimidated.\n\n        The bear snarls, growls, and rushes toward you. It flashes its claws and you are too slow on the draw. It swipes viciously at you, claws grazing your chest. You fall onto your back as blood seeps through your shirt.\n\n        The bear's head explodes in a mess of blood and a deafening crack shatters across the room. As your ears ring and you blink impotently, you realize that the noise had actually come first. Looking past the slumping, dead body of the bear, you see a shattered window. \n\n        \"Nailed it,\" says Olivia. \"Now it won't be bothering anyone else, now will it?\"\n\n        You're about to offer your response when you hear a whimper amid the ringing in your ears, and turn to see a small child standing down the hall, tears streaming down her cheeks, a leash in her hand.\n        *goto child1\n\n    *if (Poisoner > 0) #\"Craft a tear gas, then kill it while it's stunned.\"\n      *set Cruelty %+6\n      *set Sadism %+8\n      *set Caution %-5\n      *set Deception %+8\n      \"What if that only makes it angry?\" she asks\n\n      You shrug. \"Then I guess we die.\"\n\n      \"In that case, I'm gonna scrounge around for supplies. You can stay up here. What do we need?\"\n\n      \"Chlorine is the big one,\" you say. \"And we'll need some alocohol. Vodka will work. And some oil wouldn't hurt.\"\n\n      \"Chlorine, alcohol, oil,\" she repeats back. \"You have fun bear-sitting, I'll be back in a jiffy.\"\n\n      And so she heads down the stairs, leaving you with the bear. It is only somewhat aware of your presence, as far as you can tell. It glares at you occasionally, and snarls, but this seems more to be an attempt to clear its nose of debris. \n\n      You cannot help but pity the poor beast, left alone without a friend in the world, rotting away in some ancient ruins. It had clearly been owned. What sort of monster would adopt a bear and then abandon it? Why would you not ride this thing into battle?\n\n      Olivia comes back up the steps, arms full. \n\n      \"All right, what do we do with this?\" she asks. She lays down an old bottle of some chlorine bleach, a bottle of booze, half empty, and small cannister of oil.\n\n      You open the bottle of vodka and pour the bleach into it, careful to cover your nose and avert your eyes. Then you pour the black, sludgy oil into it. It mixes into a grey, disgusting concoction that you dare not smell.\n\n      You take one last look at the bear, then chuck the bottle with all your might.\n      *page_break\n      The bear suffocates slowly, writhing in pain as the chlorine gas burns his throat. It paws at its face, eyes visibly watering, howling like an injured dog, stepping on the shattered glass of the bottle.\n\n      It almost breaks your heart to watch this poor thing suffer. \n\n      Then, it drops to the ground. Its back moves for a while still, rising up and down, but that soon stops.\n\n      \"That took way too long,\" says Olivia, after a few moments of tense silence. \"I can see why nobody uses that shit anymore.\"\n\n      Unceremoniously, she stands and points her rifle at the bears head. The gunshot shatters your ears and the bear's body thuds slightly. Blood seeps onto the floorboard.\n\n      \"See? This was easy.\"\n\n      You're about to offer your response when you hear a whimper amid the ringing in your ears, and turn to see a small child standing down the hall, tears streaming down her cheeks, a leash in her hand.\n      *goto child1\n\n*label child1\n*page_break\nOlivia stares wide-eyed at the child. She wears a faded yellow sundress frayed at the ends, far too long for her. Her hair is thick and curly and all tangled together. One of her fingers is bent in an odd way, but not bruised. She places it along her lips, possibly for comfort.\n\n\"Shit,\" says Olivia. She looks to you. \"What's a damn kid doing here?\"\n\nThe girl drops the chain she was holding, stares at Olivia. Then, she speaks. Her words are not soft, as you have expected. No, they are powerful. \"You killed him!\" she screams. Her trembling, indignant voice bounces off the ancient wood walls. \"He was my friend and you killed him!\"\n\n\"Calm down, kid,\" she says. \"It was a wild animal.\"\n\nThe girl runs at Olivia and pounds her tiny fists on the woman. Buckshot does not flinch - she stands there and takes this minor beating, unsure of how to proceed. She looks to you for guidance.\n*choice\n  #\"We need to get her someplace safe.\"\n    *set Cruelty %-6\n    *set Sadism %-4\n    *set Caution %-5\n    *set Deception %-5\n    \"No shit,\" says Olivia. \n\n    \"I was someplace safe!\" the girl shrilly objects, tears welling in her red eyes. \"Bonsai was my friend! He kept me safe!\"\n\n    \"Where do you think we should take her?\" asks Olivia, ignoring the girl's cries. \n    *label c1\n    *choice\n      *disable_reuse #Franklin\n        \"It's a mostly safe place. She should be good there.\"\n\n        *if VFranklin = 1\n          \"I heard they recently took down some highwaymen,\" she says. \"Sounds like a plan.\"\n\n          *goto c2\n\n        *else\n          \"Didn't they just get conquered by a warlord?\" she asks. \"Try again.\"\n          *goto c1\n\n      #Dutch Mill\n        \"She'll learn the value of hard work there.\"\n\n        \"Can't say I've heard much about them, but everyone knows they're hard-working,\" says Olivia. \"I guess it'll do her some good.\"\n\n        *goto c2\n\n      #Fulfillment\n        \"It's gotta be the safest place in the wasteland.\"\n\n        \"That was my first thought,\" she says. \"Sounds like a plan.\n\n        *goto c2\n\n      #Black Vein\n        \"Now that it's under stronger protection, she should be safe.\"\n\n        \"Unless she ends up working in the mines,\" she says with a snicker.\"\n\n        *goto c2\n\n        *label c2\n        \"Isn't anybody going to ask my opinion?\" screeches the little girl, crossing her arms.\n\n        \"No,\" snaps Olivia. She extends a hand, placing the other on the grip of her pistol. \"Come on now, I'm taking you to your new home.\"\n\n        The girl glares at you, unmistakeable hate in her narrowed eyes, but she reluctantly takes Olivia's hand.\n\n        \"I'll be back after I drop her off and check in on our allies. In the meantime, make sure there are no more surprises waiting for us.\n\n        And so Olivia leaves you alone in Independence Hall.\n        *goto c3\n\n  #\"Kick her out, she's not the mission.\"\n    *set Cruelty %+6\n    *set Sadism %+4\n    *set Caution %-5\n    *set Deception %+5\n    \"Don't be ridiculous,\" Olivia says. \"This is a little girl, not some wasteland asshole who wants to kill us.\"\n\n    \"You killed Bonsai!\" says the girl, tears in her eyes. \"He was my friend! He kept me safe.\"\n\n    *if Persuasion > 55\n      \"She's a hazard and a waste of our time,\" you spit. The little girl looks up at you with soft, teary eyes, wide with hurt. \"We need to clear her out for the congress. Doesn't matter where she goes after that.\"\n\n      Olivia shrugs. \"All fair points.\" She places a hand on the grip of her pistol and looks to the girl. \"Okay, get out.\"\n\n      The child takes another look at you and you recognize burning hatred in her narrowed eyes. Then she looks at the gun and slinks down the stairs, carrying nothing, claiming nothing. \n\n      You stand there in silence a while, then Olivia says, \"So, are we just not going to talk about the fact that this kid had a pet bear?\"\n\n      \"Honestly, that's all I want to talk about,\" you say.\n\n      \"Great. You come up with discussion topics while I go check in on our allies. In the meantime, make sure there are no more surprises waiting for us.\n\n      And so Olivia leaves you alone in Independence Hall.\n      *goto c3\n\n      *label c3\n      *page_break\n      For the first time you remember, you're really alone. Your footsteps echo down the halls, as do the creaks of the wood beneath you. You wander from room to room, examining them for threats you know not to exist. Most are empty clusters of dust with disheveled furniture. A few, on the ground floor, have statues of the ancients in strange costume, posed in such a way that it seems they are having a conversation. Their nameplates and the words on them have faded long ago.\n\n      A few other artifacts litter the rooms, most of which are on display. You find yourself drawn to one display in particular.\n      *choice\n        #A painting of men in tossing crates from a ship, described on what remains of its plaque as a sneak attack\n          *set Stealth +10\n          According to what little you can make of the plaque, the ancient Americans organized a sneak attack on their enemies. They dressed as another group, from India or something, and destroyed the goods their foes had just imported. Apprently this started a war that they eventually won, though you suspect this might simply be a myth.\n\n          Even if it is merely a myth, you cannot help admiring the ingenuity of these old world warriors. So clever of them to target the economy of their enemy first, then start the conflict. Not so different than what Allen's Republic has been doing.\n          *goto c4\n\n        #A large, yellow document, labeled as the Declaration of something or other, signed by dozens\n          *set Persuasion +10\n          While labeled as a replica of something far greater. its words are still meaningful, if somewhat illegible. The part you most keenly make out is that about the rights of \"life, liberty, and the pursuit of happiness.\" What a beautiful lie this is no doubt telling. You can see why some people would be so eager to sign their names onto that ideal.\n\n          Maybe this sort of document is at the heart of Allen's Republic, or even the Daughters, assuring certain \"rights\" and allowing them to be fought for. If so, it's very clever.\n          *goto c4\n\n        #A row of ancient firearms, referred to as muskets, that the ancients used to slaughter one another\n          *set Combat +10\n          They're long, slender things that at first seem like they must have been used by snipers. Upon closer inspection of the images beside them, you note that the old Americans battled their foes in long rows of soldiers, shoulder to shoulder. Seems terribly inefficient, but they had larger numbers than you'd ever seen, so perhaps there was some sense to it.\n\n          *goto c4\n\n          *label c4\n          You're tempted to steal some of the artifacts. They would fetch a good price at any market. But there are signs warning that they are being watched over, and you do not wish to be crucified by angry Eagles for petty theft.\n\n          So you wait, wander aimlessly through the Hall, and twiddle your thumbs. The Congress will meet soon, for the first time ever. A cavernous pit forms in your stomach, pulling you down into the cold, fear rattling your spine. Soon all of Philly will be upon you, for either peace or war.\n          *if dau = 1\n            *goto_scene 12a-daughters_win\n\n          *else\n            *goto_scene 12b-republic_win\n\n\n\n    *else\n      \"It's, like, a lot of work.\"\n\n      \"Fair point,\" says Olivia. \"But I think we should find a place for her to live. Any ideas?\"\n      *goto c1\n\n\n", "12a-daughters_win": "*set Health 100\n[i]There is a theory in history which claims that the world is shaped not by nations and creeds, but by great men who arise within them. The great man theory is perhaps even more true in the wasteland, where a single person can shape the balance of life and death. For that reason, I believe that our new histories will be built upon the choices of a few, rather than the hearts of thousands. I have seen some of these heroes, poets, and supermen in my time. It is upon their backs that a Table of Nations was born.[/i]\n\n-The Historian Pygmy, [i]A Treatise on Chaos[/i]\n\nLeaders and represenatives of all the great towns of Philly sit around a long table. The table itself is composed of several, but the cloth atop it creates a sense of unity. A lie. Perhaps a symbol.\n\nThe representatives are armed to the teeth and have brought protection, you notice, no doubt in case this congress goes terrible awry. Most have even gone so far as to leave their guns on the table - easier to grab if a fight starts.\n\n*if VFranklin = 1\n  You spot Voss of Franklin amid other village leaders, listening patiently as they discuss local matters. He nods his head and strokes his chin, too involved to notice you.\n\n  *goto a1\n*else\n  You spot Gizmo, warlord of Franklin, alone in a corner. Village leaders keep their distance and he is surprisingly non-verbal. He simply looks over the other represenatives as a Fury would sheep.\n\n  *goto a1\n*label a1\n*if Corv = 1\n  Not too far from him sits Corvalla of the Eagles. Dozens of her soldiers fill the room, just as well-armed as everyone else combined, keeping the peace as is expected of militia. She chats with her soldiers, and with local represenatives, eagerly paying attention to all who voice concerns.\n\n  *goto a2\n*else\n  Not too far from him sits Cicada of the Eagles. Dozens of her soldiers fill the room, just as well-armed as everyone else combined, keeping the peace as is expected of militia. She stares emptily around the table, a hand on her pistol at all times. \n\n  *goto a2\n\n*label a2\nOlivia works her way in eventually, pushing through the thick crowds of armed villagers to find her seat at the table. She joins you in the corner, not bold enough to take the head, which remains empty.\n\n\"I'm a little disappointed,\" she whispers over the dull roar. \"I expected to see some Dutch Mill reps here.\"\n*fake_choice\n  #\"Me too.\"\n  #\"I don't know why you'd expect that. They don't like outsiders.\"\n\nShe interrupts you before you can discuss the Dutch at length. \"So can we talk about that bear girl?\" she asks, eyes going wide. \"Where do you get a pet bear? Did it raise her? Is she from a pack of bears?\"\n\n\"I don't know,\" you say.\n\nThe far doors open before you can continue this very important discussion. ReVivienne enters, hair carefully braided, armor cleaned of rust, hands behind her straight back. A dozen Daughter warriors fall in line behind her, then spread out along the far end of the table where she takes her seat. A hush falls over the whole room. Then, four more Daughters enter. They carried a wooden platform bearing the bell you saw beneath their base camp. It's easily as tall as a person, far wider, with a long crack down the side. They place it on the table while everyone looks in strange awe. You can barely see ReVivienne's face past the bell.\n\n\"Welcome, brothers and sisters,\" she says, standing while they all sit. Her presence commands attention and respect. \"Firstly, I would like to thank you all for agreeing to this Congress. Many of you are aware that it is some years in the making, and has only recently become essential. I could bore you with a long eloquent speech about the importance of unity, but instead I'll say this: Allen's Republic is coming for blood. Worse than that, they're coming for a uranium deposit beneath the village of Black Vein. For those who don't know, uranium is the fuel of the weapons of death that once destroyed the world. For this reason, Philly must unite. If the Republicans take the mines, this war will become nuclear.\"\n\nHer words elicit waves of murmurs from the crowd. They whisper to one another about uranium and republics and wars and death, radiation and mutations and guns and refugees. All the things that war demands. ReVivienne stands silently over them all, waiting for them to quiet.\n\nThen, she says, \"I've given you all the facts of the conflict. Now I offer a solution: we form a nation of our very own. We must stand together, or we will assuredly fall separately.\"\n\nMore murmurs. Then, something strangely unrehearsed happens. A woman you do not recognize stands up. She is near the head of the table, to the side somewhat. \n\n\"On behalf of Queen Echo of Fulfillment, I pledge our loyalty to his new nation,\" she proclaims. The whole room goes silent.\n\nThen the delegate to her side rises, does the same on behalf of her village. Then the next, then the next. \n\n*if VFranklin = 1\n  Voss rises and says, \"The City of Franklin welcomes this new nation and will serve as a member. Let's take the fight to those Allen dogs.\" Villagers cheer at his inciting words.\n\n  *goto a3\n*else\n  Gizmo rises and says, \"You all know that I take great pleasure in killing. As a member this nation, I swear to pleasure myself a great deal on these Republic dogs.\" Villagers cringe uncomfortably, perhaps knowing better than to trust a highwayman.\n\n  *goto a3\n*label a3\nOlivia Buckshot is next. She stands tall and says, \"As the delegate from Black Vein - the center of this crisis - I swear to uphold the laws of this nation, just as you all swear to protect my people.\"\n\n*if Corv = 1\n  A few more villagers proclaim their allegience, including Penrose. Then, Corvalla of the Eagles speaks. \"As leader of the Eagles and a member of the Trading Triangle, I have been more involved in this Congress's planning than most of you. That in mind, I never really believed anything could make so many different people unite under a single flag.\" She points to you. All eyes follow the length of her finger, right toward you. \"It was this wastelander who showed me different.\"\n\n  *goto a4\n*else\n  A few more villagers proclaim their allegience, including Penrose. Then, Cicada of the Eagles speaks. \"Most of your don't know me, but you should know that I never supported the idea of this Congress. I never really believed anything could make so many different people unite under a single flag.\" She points to you. All eyes follow the length of her finger, right toward you. \"It was this wastelander who showed me different.\"\n\n  *goto a4\n*label a4\nAll eyes on you, you suppose it is your turn to make a statement. They all look to you, expectant, excited. Once again, you find yourself caught in a place you do not wish to be.\n*choice\n  #Tell them about the slavery conspiracy\n    \"Those of you who know me have most likely heard of the battle I led at Rodin,\" you say. \"In that time, I came to learn that Allen's Republic was funding them, as well as some highwaymen gangs, in order to weaken Philly. It was their hope to make us crave their dirty, underhanded civilization by putting us through hell. Now we have no choice. We must stand, and with one voice proclaim ourselves a new nation, without them.\"\n\n    *goto a5\n  #Tell them about the virtues of nationhood\n    \"A people divided can never stand,\" you say, quoting someone from a book you once read. \"Allen's Republic is united, and so they are able to reach out their hands far enough to touch us - the good people of Philly. We must stand united as well, or else we will never be able to repel their advances. For the first time in history, the people of Philly have no choice. We must stand, and with one voice proclaim ourselves a new nation, without them.\"\n\n    *goto a5\n  #Tell them about the trials of war ahead\n    \"War is never easy. For most of us, it's all we've ever known,\" you say. \"But this enemy is unlike any other. They are not petty highwaymen or enterprising slavers. They are organized, militant, and ready to kill for the land we live on, and what is under it. For the first time in history, the people of Philly have no choice. We must stand, and with one voice proclaim ourselves a new nation, without them.\"\n\n    *goto a5\n\n*label a5\nThunderous applause deafens you, almost as loud as gunfire. It's so strange to stand before these people - your peers - and watch them praise you. Olivia cheers louder than any of them, a wicked smile on her face. ReVivienne walks onto the table and strikes the butt of her rifle against their sacred bell. It rings out, doubling the fervor of the delegates. You wonder if they realize that they are applauding a war.\n*page_break\nSome skirmishes here. A little raiding there. War is fairly boring. Most villages that declared for the Daughters have remained firmly under Philly control. For this reason, the Republic soldiers have acted very little outside the walls of their Fort.\n\nYou stand beside ReVivienne and Buckshot, in the dry forests near Fort Washington. Camp was made yesterday. Tents surround you, as do trucks and guns and warriors, not to mention supplies. You don't recall ever seeing such forces mobilized, all at once. Maybe two hundred warriors total, prepared for a terrible seige. Some are young boys, not yet able to grow a beard, acne on their cheeks. Some are old women missing all their teeth and wrinkled like canyons. They all stand here because of your actions, and they will either win or die by them.\n\n\"I wanna keep you two together,\" says ReVivienne.\n\nOlivia nods. \"Where are you going to be?\"\n\n\"Frontal assault,\" she says. \"I'll give you a choice. You can run with the Eagles on the secondary position - the distraction. Or you can join the civilian militias with the infiltration units.\"\n*label a6\n*choice\n  #\"We'll go with the secondary assault team.\"\n    *set Caution %-10\n    *set Deception %-10\n    \"Everyone appreciates the violent route,\" she says, mostly to herself. \"Report to the Eagles, they know their orders.\"\n\n    The Eagles are positioned on the far side of the encampment. Some of the tents have helmets and even red, wet skulls piked above their folds, taken as trophies from dead Republicans. The warriors themselves are concentrated in a mass, wearing their strange uniforms, flanked by a handful civilian warriors.\n\n    *if Dwide = 1\n      You spot Dwide among the civilian volunteers, wearing his strange, tan garb. A few other Dutch stand beside him. He's too far to greet you, but nods in your direction. It's a respectful nod, more of a bow, as if he's thankful that his people have been drawn into this conflict. Maybe he's just glad to get out of the village for a while.\n\n      *goto b1\n    *else \n      *goto b1\n      *label b1\n      *if Corv = 1\n        Corvalla stands at the center of the mob - fifty warriors between you and her - and you hear here before you see her.\n\n        \"... and so we stand at the precipice of glory,\" she goes on. \"These so-called Republicans have come to conquer us. They believe we can be subjugated. Today we show them just how wrong they are. Today we show all the wasteland, every wretch out there, that Philly belongs to us!\"\n\n        A roar of applause. Some warriors even shoot into the air, adding their gunshots to the cheers. \n\n        Corvalla smirks, looking at her devout warriors. Then she spots you in the crowd, lifts a finger to single you out. \"You! Our great ally!\" she shouts, loudly enough that they all turn to see you. \"I'm glad to see that you're joining our assault team.\"\n\n        Buckshot speaks up before you do, perhaps sparing you a ridiculous speech. \"We're just excited to be here,\" she says. \n\n        \"Perfect,\" Corvalla purrs. \"So, here's the plan. The Daughters are leading the siege from the front while we strike from a weak point at the rear. Civilian militias are already infilitrating the base through under-defended sewers. Ideally, I'd like to take some captives. Hostages will serve as incentive for the Republic to treat us with a little more respect. All clear?\"\n\n        A chorus rings through the crowd: \"Yes ma'am.\" It sounds like the roll of thunder.\n\n        \"Very well,\" she says. \"Get in position and attack at the flare's mark.\"\n        *goto b2\n\n      *else\n        Cicada stands on a podium high above the mob - fifty warriors between you and her. You see her, then hear her.\n\n        \"... and so we stand at the precipice of slaughter,\" she goes on. \"These so-called Republicans have come to conquer us, believing we can be enslaved. Today we show them quite the opposite. Today we show them that it is not we who shall be the slaves, but them. Today we show all the wasteland, every wretch out there, that their lives belongs to us! And so we get to take them.\"\n\n        A roar of applause. Some warriors even shoot into the air, adding their gunshots to the cheers. \n\n        Cicada smirks, looking at her devout warriors. Then she spots you in the crowd, lifts a finger to single you out. \"You! Our great ally!\" she shouts, loudly enough that they all turn to see you. \"I'm glad to see that you're joining our assault team.\"\n\n        Buckshot speaks up before you do, perhaps sparing you a ridiculous speech. \"We're just excited to be here,\" she says. \n\n        \"Perfect,\" Cicada purrs. \"So, here's the plan. The Daughters are leading the siege from the front while we strike from a weak point at the rear. Our job is to get in there and kill as many of them as possible. If you can cripple them, I want you to kill them. If they kill you, at least take a few with you. All clear?\"\n\n        A chorus rings through the crowd: \"Yes ma'am.\" It sounds like the roll of thunder.\n\n        \"Very well,\" she says. \"Get in position and attack at the flare's mark.\"\n        *goto b2\n\n        *label b2\n        *page_break\n        The assault team has assembled far enough into the forest that you cannot be seen from the walls of the Fort. You think you can make out the weakness you're exploiting - a long crack in the grey wall, winding up to the walkway where the guards patrol.\n\n        You stand amid the Eagles and their allies, shoulder to shoulder, sweaty palms on your gun. Olivia is right beside you. The silence is absolute and all you can hear is your breathing. The silence is only broken by Buckshot.\n\n        \"I always get the shits before a big battle,\" she says, as if that is something you want to hear. \"It's the thought of killing that does it. Just makes me sick in all the worst ways. I still haven't decided if I wanna follow the boss's orders to the letter. Prisoners, or no prisoners?\"\n        *choice\n          #\"I say we kill them all.\"\n            *set kill 1\n            *set Cruelty %+10\n            *set Sadism %+10\n            *goto b3\n\n          #\"Taking prisoners is only what's right.\"\n            *set Cruelty %-10\n            *set Sadism %-10\n            *label b3\n            She shrugs. \"I'll follow your lead.\"\n\n            Just then, a red light floats into the air, then bursts. The flare. The signal.\n\n            \"March!\" shouts one of the Eagles. And so you do, pressed by the men and women behind you, a wave of leather and steel and jerseys and guns. A wave of death.\n\n            The trees thin as you walk. Your stomach grows tense. You spot the soldiers along the walls, and they've spotted you. Gunshots ring out and you raise your gun in response. Then, something strange happens. The soldiers start to fall.\n\n            As you step out of the forest, you see why. A victorious smile washes over you as the sight of civilian militias meet her eyes. They're covered in dirt and blood not their own, and something black that undoubtedly came from the sewers. And yet they're smiling as they toss rope ladders down to you and the Eagles.\n            *page_break\n            \"The Fort was mostly abandoned,\" one of them explains, once you've made it atop the wall. Now that you're close to this ragtag infiltration team, you really get a great impression of how awful they smell. \n\n            \"Then what's all that?\" asks Olivia. She points to conflict at the far end of the Fort - gunfire and smoke.\n\n            \"A few holdouts,\" says the warrior. \"We think they left anyone who couldn't run. Anyway, ReVivienne wants you to clear out this half of the base for any stragglers while our team keeps an eye on the sewers.\"\n\n            \"Got it,\" says Olivia.\n            *label bc\n            *page_break\n            You rush throughout the Fort, weapons at the ready, scanning each room and hall and closet for any hint of resistance. They've all been cleared out, save a few stray weapons and armor pieces, and even a few Allen flags. At first, you're elated. An easy victory. You intimidated this shanty nation so much so that they retreated back to their hovel. But you cannot shake the feeling that this was too easy. \n\n            The first few rooms are not occupied and the sound of the Daughters' battle is fading, so you let your guard down. When you enter the next room, the enemy strikes. \n\n            It's a large room, which you immediately realize serves as an armory. Racks of guns line the walls, as do crates of ammunition.\n\n            Three soldiers stand in the center of the room, taking cover behind scattered furniture. They open fire as soon as youn open the door.\n\n            *if Combat > 55\n              Your keen eyes and skill in combat protect you from the worst of the fire. You roll to the side as deafening gunfire overtakes the room, while returning bullets of your own. They fly from your gun as if in slow motion, heating your palms and spraying against their cover and sending splinters flying.\n\n              *goto b4\n\n            *elseif Stealth > 55\n              Your keen eyes and skill in combat protect you from the worst of the fire. You roll to the side as deafening gunfire overtakes the room, while returning bullets of your own. They fly from your gun as if in slow motion, heating your palms and spraying against their cover and sending splinters flying.\n\n              *goto b4\n            *else\n              *set Health %-25\n              You are a bit too slow or a bit too inexperienced, and are one of the first to get shot. The bullet strikes your leg and you fall down, writhing in waves of cold pain, then do your best to crawl to cover, and shoot back. Your bullets do not fly straight, however, and you contribute little to the battle.\n\n              *label b4\n              Your army enters the room like a flood of greys and browns and lead. They fill it, surrounding the enemy. It's almost unfair. Your bullets flay them without mercy and soon their cover is eroded into nothing but a pile of shattered wood. Then they are left, broken, bleeding, bones exposed and eyes fluttering shut. The room grows silent as the warriors all stare at one another, not quite feeling victorious.\n\n              One of the soldiers clings desperately to life, but a warrior presses the muzzle of his rifle to her head and squeezes the trigger, killing any information you might have reaped from her interrogation.\n\n              Once again, it was too easy, and everyone knows it.\n\n              In the silence, as you and your warriors stare at the gore, a beeping becomes apparent. It is Olivia who notices its source.\n\n              \"Shit,\" she says, seeing something you do not, hidden behind one of the ammo crates. She turns to you and the rest of the warriors, fear furrowing her brow. \"It's a bomb,\" she says. \"Run!\"\n              *page_break\n              *set Health %-10\n              The world blurs around you, and you don't recall ever running so quickly. Sweat overcomes your entire body and your heart pounds in your ears, in your chest, threatening to leap out. The cavernous halls of the Fort pass by in an instant, and soon you find your feet treading on the sun-soaked sand of the courtyard.\n\n              You do not see the explosion, but you feel it upon your back. It's a terrible knife of pain, heat that slices past your clothes, throwing you like a wet rag. You fall into a daze for a moment, the world swimming around you. Eventually your eyes blink back open and sound returns, and you realize you had lost your hearing for a moment as well. You watch Olivia pat a flame off her shoulder, then rise from her knees, surveying the rising smoke, the flames, the warriors who rise as well.\n\n              \"It was a trap,\" she says, breathing heavy. The world is still spinning.\n\n              Then, gunfire.\n              *label trap\n              How many hours trapped in this dead Fort? Too many. Rubble blocks one exit - guns block the other. The courtyard has been deserted, save the Daughter flag flying above it, replacing that of the Republic. It somehow seems to drain hope from the Fort, rather than inspire it. \n\n              You and Olivia sit before ReVivienne, determination etched into her brow. You are deep within the Fort, safe from the assailing gunfire of the enemy.\n\n              \"We didn't even think that this might have been easy for a reason,\" she says. She had lost seven Daughters. Twelve Eagles and six civilians died in the explosion. Republic troops have nestled themselves into the forests outside, and have begun picking off anyone they could. They intend to starve you out. \"What do we do?\" In this moment, you see the weakness of a woman who was only recently made leader of her people, with no experience to fall back on. And now she hides in a back room, meeting with outsiders in her search for wisdom.\n\n              \"I have no damn clue,\" says Olivia, equally at a loss. She looks to you. \"What do you think?\"\n              *label d1\n              *choice\n                *disable_reuse #\"We still outnumber them. Even if we lose some people, a frontal assault can still work.\"\n                  *set Caution %-10\n                  *set Deception %-10\n                  *if Combat > 35\n                    \"Yeah, I'm pretty familiar with what you can do in combat,\" says ReVivienne. \"Come on, let's get the troops riled up.\"\n\n                    Morale is low and the outlook is gloomy, and most of the warriors have taken shelter in the deep recesses of the Fort, hoping that the walls would dull the constant gunshots and protect them from stray bullets. All the same, ReVivienne summons her army into the central courtyard where the Daughter flag flies high.\n\n                    She waits until most of the warriors have been assembled - an ocean of grey and brown and rust and leather. They stand nearly two hundred strong, still a force to be reckoned with. Seeing them all together, you remember that you still have a chance at victory.\n\n                    \"Most of you know who I am,\" she starts. \"Those who do not know me personally, you will. I am ReVivienne Washington, leader of the Daughters of Liberty, and I am the one who led you into this trap. We should be defeated, and yet, looking out at all of you fine warriors, I cannot help but feel our victory's glorious light upon my face, just out of sight. Those cowardly Republicans rely on C4 and slavers to do their dirty work. Not us, not Philly. I have no right to ask this of you, but I will anyway. I am going out there to kill as many of those bastards as I can, to do my dirty work my-damn-self. And I hope you will all help me.\"\n\n                    As promised, she turns toward the crumbling wall, rifle drawn, and starts walking. \n\n                    And to your surprise, she is followed. It's a trickle at first, just a few stray warriors who have already pledged their lives to this cause. Then a few more. And then, either through peer pressure or this inspiration of hope, the whole army paces toward that crumbling wall. ReVivienne does not even look back, just starts climbing onto the rubble. \n\n                    Just like that, the battle has begun.\n                    *page_break\n                    The two great armies meet at the tree line. Bullets fly like deafening thunder, cracking across the air, sending soldiers to their doom. Crimson splashes against the grey trees and dying men and women cry out, and all you can do is watch. Then, with Olivia at your back, you join the fray.\n\n                    You charge down the slope of rubble with a mess of steel and leather at your back. Warriors fall to your left and right, though some stand back up. While the Republic soldiers may hold the advantage, you have the numbers.\n\n                    *if kill = 1\n                      *if Combat > 85\n                        For that reason, you show no mercy and no hesitation when you open fire on the foe. They fall swiftly beneath the weight of the tiny lead that you fire. Wave after wave of bullets reaches their chests, cheeks, legs, tearing them down in terrible heaps. Their uniforms and lips are spattered with blood, thick and black. \n\n                        This brutality carries you through the field of battle as adrenaline overcomes you, and all the world seems deafening. \n\n                        *goto Tappon-kill\n\n                      *else\n                        *set Health %-40\n\n                        For that reason, you show no mercy and no hesitation when you open fire on the foe. They fall swiftly beneath the weight of the tiny lead that you fire. Wave after wave of bullets reaches their chests, cheeks, legs, tearing them down in terrible heaps. Their uniforms and lips are spattered with blood, thick and black. \n\n                        This brutality is not enough to carry you through the field of battle, even with adrenaline's aid. A bullet strikes you down, followed by another, both puncturing the same shoulder. You fall to the ground, let pain wash over you, and stare at the sky for a moment as crimson stains the grey dust around you.\n\n                        *if Health > 40\n                          You do not know how long you lie like this, but Olivia eventually collects you. She carries you until you are able to stand on your own again, and the fight goes on. \n\n                          *goto Tappon-kill\n\n                        *else\n                          *goto death\n\n                    *else\n                      *if Combat > 85\n                        For that reason, you are quick to take cover and fire hesitantly on the foe. They fall swiftly beneath the weight of the tiny lead that you fire. Wave after wave of bullets reaches them, but you are careful not to aim for anything too lethal. Legs, arms, maybe the hip. They're simply following orders, after all. No reason to slaughter them for that.\n\n                        This mercy carries you through the field of battle as adrenaline overcomes you, and all the world seems deafening. \n\n                        *goto Tappon-kill\n\n                      *else\n                        *set Health %-40\n                        For that reason, you are quick to take cover and fire hesitantly on the foe. They fall swiftly beneath the weight of the tiny lead that you fire. Wave after wave of bullets reaches them, but you are careful not to aim for anything too lethal. Legs, arms, maybe the hip. They're simply following orders, after all. No reason to slaughter them for that.\n\n                        This mercy is not enough to carry you through the field of battle, even with adrenaline's aid. A bullet strikes you down, followed by another, both puncturing the same shoulder. You fall to the ground, let pain wash over you, and stare at the sky for a moment as crimson stains the grey dust around you.\n\n                        *if Health > 40\n                          You do not know how long you lie like this, but Olivia eventually collects you. She carries you until you are able to stand on your own again, and the fight goes on. \n\n                          *goto Tappon-kill\n                          *label Tappon-kill\n                          The true battle is swift and lasts merely a few moments. In these few moments, you see how truly weak the Republic soldiers really are. Maybe fifty of them total, half dead and half dying. It was not a battle, but a slaughter.\n\n                          Those that remain breathing are trying, desperately, to return to their camp, perhaps to take shelter or a vehicle. With ReVivienne at your army's head, that is not going to happen.\n                          *page_break\n                          General Tappon waits along in the camp, among the disheveled tents, the looted crates, truck tires headed north. It's a sad sight. Her pistol hangs limply from her hand, as if even that is too much effort for someone so tired. You don't recall ever seeing someone look so exhausted.\n\n                          She's surrounded. The entire camp has Daughters and Eagles and volunteers around it. Staring. Waiting. \n\n                          ReVivienne steps forward. As if by instinct, you follow her. But this is not your fight. It never was. It's hers.\n\n                          \"Looks like you win,\" spits Tappon. Her eyes are red and teary. She looks around at the army that surrounds her, contempt in her eye. \"Just one more setback on the road to civilization.\"\n\n                          *if Cruelty > 70\n                            *goto exec\n\n                          *elseif Sadism > 60\n                            *goto exec\n\n                          *elseif Cruelty > 50\n                            *goto exec\n                            *label exec\n                            \"General Tappon,\" starts ReVivienne, as a fearful hush falls over her army. She raises her pistol, points it directly at the General. \"As a representative of the Philly Republic, I charge you with the crimes of warmongering, slavery, and murder. As such, in the name of the Goddess Columbia, I sentence you to die. May her bell ring true in this life, and the next.\"\n\n                            The gunshot shatters across the wind, finite and final. Tappon slumps to the ground, her own pistol falling into the dust. She lies there, inert, empty, and abandoned. Then, the whole wasteland seems to cheer as one. And for the first time in a long while, you feel the weight of the world lift off your back. Your heart beats easily now, softened as the pains of responsibility ebb from you. You barely even hear the cheers of victory, barely feel Olivia's warm hand slap your back. You're not jostled from this odd, dizzy state until ReVivienne wraps her arms around you, crushing you chest and lifting you from the ground.\n\n                            You've won. Philly is yours.\n                            *page_break Epilogue\n                            It is a shame to say that the war with Allen's Republic has only just begun. Thanks to Tappon's death, they now see the fledgling Philly Republic as an imminent threat. Your people spend the next few years fighting to defend borders that, until recently, did not exist. The interior, however - the villages and trade routes and bases - remain safe nestled by the very militias that fight Allen's pigs at the border.\n\n                            Within these borders, the people prosper. Highwaymen and slavers are all but history, and citizens of your new Republic finally have space to breathe. They can finally know peace, even at war.\n\n                            *if Villain > 1\n                              *goto cruel2\n\n                            *elseif Cruelty > 50\n                              *label cruel2\n                              Your violent, warmongering ways do little to ease this tension, and many clamor behind your hot-blooded claims of war's virtue. And how can they believe any differently? The wasteland's been one big warzone as far as anyone cares to remember, and that is never going to change.\n\n                              *goto table\n\n                            *elseif Sadism > 50\n                              *goto cruel2\n\n                            *else\n                              You do your best to advocate peace in this trying time. You didn't go through all of this just to watch everyone you know die, after all. But how can your people believe what you have to day? The wasteland's been one big warzone as far as anyone cares to remember, and that is never going to change.\n\n                              *goto table\n                          *else\n                            \"General Tappon,\" starts ReVivienne, as a fearful hush falls over her army. \"As a representative of the Philly Republic, I charge you with the crimes of warmongering, slavery, and murder. As such, in the name of the Goddess Columbia, I sentence you to life imprisonment in the Temple Bell. May her bell ring true in this life, and the next.\"\n\n                            The crowd watches in silence as she is disarmed and dragged away, in what can only be seen as an act of mercy. Then, the whole wasteland seems to cheer as one. And for the first time in a long while, you feel the weight of the world lift off your back. Your heart beats easily now, softened as the pains of responsibility ebb from you. You barely even hear the cheers of victory, barely feel Olivia's warm hand slap your back. You're not jostled from this odd, dizzy state until ReVivienne wraps her arms around you, crushing you chest and lifting you from the ground.\n\n                            You've won. Philly is yours.\n                            *goto peace-win\n                        *else\n                          *label death\n                          Eventually the world goes dark and cold. Your eyes become harder and harder to open, until they suddenly fail. And all you can do is listen to your last few breathes.\n\n                          You'd been through so much. It seems such a shame that this end would be like so much of your life - pointless.\n                          *page_break Epilogue\n                          *set Health 0\n                          As it would turn out, the fledgling Philly Republic does not actually need you. No, you merely ran a few errands, and they will push onward without you.\n\n                          They, like Allen's Republic, would form a great, albeit \"civilized\" nation. For a time. But it wouldn't be long before the Congress devolved into petty arguments about land, resouces, refugees, and so forth. Then the highwaymen come, sensing oppurtunity as they do, to lay into an already weak state.\n\n                          This is nothing but inviting to the hungry peoples of Allen's Republic. When they return, they will find a weak nation barely clinging to life as the Eagles and the Daughters are at each others teeth, as Fulfillment's trading power weakens every other village in sight, as the people of Black Vein squander their resources and are overrun by highwaymen.\n\n                          And then they will make your people wish for something as sweet as true civilization.\n                          *page_break\n                          Congratulations on completing \"The Black Vein\" and changing the face of the wasteland forever!\n\n                          We hope you enjoyed this playthrough of The Black Vein. If you found this ending less than satisfactory, feel free to restart the game and make other choices. There's more to do in the wasteland than die in battle.\n                          *goto_scene ending\n\n                  *else\n                    \"With all due respect, I sincerely doubt your ability to lead a battle like this,\" she says. \"Any other ideas?\"\n                    *goto d1\n\n                *disable_reuse #\"We still have the sewers to our advantage. A few warriors can get out and take out Tappon.\"\n                  *set Caution %+10\n                  *set Deception %+10\n                  *if Stealth > 35\n                    \"I guess it's better than nothing,\" she says. \"Come on, let's get some of those troops, see if they're ready for a fight.\"\n\n                    Morale is low and the outlook is gloomy, and most of the warriors have taken shelter in the deep recesses of the Fort, hoping that the walls would dull the constant gunshots and protect them from stray bullets.\n\n                    ReVivienne only selects a handful of her most trusted warriors for this task. Ten women, all armored, all scarred. Veterans, certainly. You don't doubt that they'll be enough to seize this victory. Another Daughter is made aware of the plan and placed in charge, secretly, so as not to frighten to the other warriors.\n\n                    So you climb into the dark, dank sewers where stagnant water pools at your feet. You follow the length of it back out into the forest, gun held tight, heart pounding in your ears.\n                    *page_break\n                    \"There's barely fifty of them,\" whispers Olivia after the third time you'd taken count of the enemy forces. It's a careful process. You never know where they might be hiding, or if there is backup somewhere in the forest, waiting to spring another trap.\n\n                    \"Are you sure?\" asks ReVivienne, but her own scouts had reported the same numbers. \"We can't afford another trap. Not like the last one.\"\n\n                    \"I'm sure,\" says Olivia.\n\n                    ReVivienne looks at her girls, then at the ground. The Republic encampment is just a few yards away. One misstep and you'll be caught. \"Launch a flare,\" she says. \n\n                    You're a little offended that, for the first time you remember, she hasn't asked for you advice. But looking at her, you don't see the uncertain girl you met while bound to a chair. You see a warrior. \n\n                    The flare fires up, red and bright, and then dissipates into the air. The world is silent for a moment. Then, gunfire roars. A moment passes, then you watch as your army, two hundred strong, pours into the forest.\n\n                    Just like that, the battle has begun.\n                    *page_break\n                    The two great armies meet at the tree line. Bullets fly like deafening thunder, cracking across the air, sending soldiers to their doom. Crimson splashes against the grey trees and dying men and women cry out, and all you can do is watch. Then, with Olivia at your back, you join the fray.\n\n                    You charge down the slope of rubble with a mess of steel and leather at your back. Warriors fall to your left and right, though some stand back up. While the Republic soldiers may hold the advantage, you have the numbers.\n\n                    *if kill = 1\n                      *if Stealth > 85\n                        For that reason, you show no mercy and no hesitation when you open fire on the foe. They fall swiftly beneath the weight of the tiny lead that you fire. Wave after wave of bullets reaches their chests, cheeks, legs, tearing them down in terrible heaps. Their uniforms and lips are spattered with blood, thick and black. \n\n                        This brutality carries you through the field of battle as adrenaline overcomes you, and all the world seems deafening. \n\n                        *goto Tappon-kill\n\n                      *else\n                        *set Health %-40\n\n                        For that reason, you show no mercy and no hesitation when you open fire on the foe. They fall swiftly beneath the weight of the tiny lead that you fire. Wave after wave of bullets reaches their chests, cheeks, legs, tearing them down in terrible heaps. Their uniforms and lips are spattered with blood, thick and black. \n\n                        This brutality is not enough to carry you through the field of battle, even with adrenaline's aid. A bullet strikes you down, followed by another, both puncturing the same shoulder. You fall to the ground, let pain wash over you, and stare at the sky for a moment as crimson stains the grey dust around you.\n\n                        *if Health > 40\n                          You do not know how long you lie like this, but Olivia eventually collects you. She carries you until you are able to stand on your own again, and the fight goes on. \n\n                          *goto Tappon-kill\n                        *else \n                          *goto death\n\n                    *else\n                      *if Stealth > 85\n                        For that reason, you are quick to take cover and fire hesitantly on the foe. They fall swiftly beneath the weight of the tiny lead that you fire. Wave after wave of bullets reaches them, but you are careful not to aim for anything too lethal. Legs, arms, maybe the hip. They're simply following orders, after all. No reason to slaughter them for that.\n\n                        This mercy carries you through the field of battle as adrenaline overcomes you, and all the world seems deafening. \n\n                        *goto Tappon-kill\n\n                      *else\n                        *set Health %-40\n                        For that reason, you are quick to take cover and fire hesitantly on the foe. They fall swiftly beneath the weight of the tiny lead that you fire. Wave after wave of bullets reaches them, but you are careful not to aim for anything too lethal. Legs, arms, maybe the hip. They're simply following orders, after all. No reason to slaughter them for that.\n\n                        This mercy is not enough to carry you through the field of battle, even with adrenaline's aid. A bullet strikes you down, followed by another, both puncturing the same shoulder. You fall to the ground, let pain wash over you, and stare at the sky for a moment as crimson stains the grey dust around you.\n\n                        *if Health > 40\n                          You do not know how long you lie like this, but Olivia eventually collects you. She carries you until you are able to stand on your own again, and the fight goes on. \n\n                          *goto Tappon-kill\n                        *else \n                          *goto death\n\n                  *else\n                    \"You're not exactly a subtle person,\" she says. \"Any other ideas?\"\n                    *goto d1\n\n                *disable_reuse #\"Diplomacy is still our best bet.\"\n                  *set Cruelty %-10\n                  *set Sadism %-10\n                  \"I somehow doubt that,\" says ReVivienne with a defeated scowl.\n\n                  *if Persuasion > 35\n                    \"If nothing else, it might give us a few more minutes to figure out a better plan,\" you say, flexing the very skills she is calling into question.\n\n                    \"Fine,\" she says with a dismissive wave. \"Go yell over the wall and see if they'll listen.\"\n\n                    Olivia smirks, because she knows that's exactly what you're going to do. \n                    *page_break\n                    You stand atop the wall and the bullets stop flying, after a few minutes of you waving your hands and shouting wildly. The forest is thinned enough on this side that you can see the soldiers among the trees. They inch closer in the silence.\n\n                    General Tappon steps forward, soldiers at her side. \"So, the traitorous contractor has come to beg,\" she says with a smile. \"Go ahead, savage. Beg.\" \n\n                    All the wasteland watches you now, but nobody expects you to beg.\n                    *choice\n                      #\"We know that Allen's Republic was funding the slavers.\"\n                          \"I know how war works,\" you go on. \"You allies to survive. And you thought slavers would make good ones, since they can weaken a wasteland. That was a bad idea. Now, everybody hates you. And they're not wrong. You had to do something truly evil in order to get this far, and you're still losing. So, General, my question is pretty straightforward. Even if you win the day, even if you vanquish us filthy savages, how do you expect to conquer the rest of 'em? You played the long game and you lost. It's time to head home.\"\n\n                          *goto dip1\n\n                        *else\n                          \"You're down a fortress and the whole wasteland hates you. So, we're not gonna, like, be your friend anymore. Understand?\"\n\n                          *goto dip-fail\n\n                      #\"Does your government really think they can hold this much territory?\"\n                        *if Persuasion > 65\n                          \"I know how war works,\" you go on. \"You need an army to survive. Sad thing is, you're losing soldiers left and right, you just lost a major fortress, and I doubt the entire population of your shanty republic could hold back Philly's finest. So, General, my question is pretty straightforward. Even if you win the day, even if you vanquish us filth
