w and return to sniping, not letting the sting of exposed flesh deter you.\n\n              Soon, the chorus of death comes to an end. A few orders are shouted and, daring to look down, you see that most of the soldiers you'd fought are now corpses, lifeless and inert. \n\n              *goto b3\n\n          #Ask them to surrender\n            *set Cruelty %-8\n            *set Sadism %-10\n            *set Deception %-10\n            *set Caution %-6\n            \"I'll talk him down,\" you say.\n\n            \"Sounds like a stupid plan,\" says Artoria. \"But I know better than to question ReVivienne's favorite hire. You think you can talk 'em down, go for it.\"\n\n            It's the closest thing to a vote of confidence you'd ever received in the wasteland, and you're happy to take it. \n\n            You raise your hands in surrender and step forward, off the overpass, beyond the wreckage of the convoy. The stench of gasoline curls into your nose. The Republic soldiers cease fire first, then the Daughters follow. Shouting ensues. Horan stands tall, filthy, torn, a bleeding wound in his side. He gestures for you to step forward.\n\n            \"You've conspired with the Daughters,\" says Horan. \"Speak before I have my troops shoot you dead.\"  Cluney stands beside him, rifle cocked. Duchess is nowhere to be seen.\n            *choice\n              #\"Surrender and we'll let you live.\"\n                *set Cruelty %-2\n                *set Sadism %-2\n                *if Persuasion > 65\n                  \"Run home to General Tappon and come back with the rest of your army. Come back for Philly's head instead of its finger. Win the war, not the battle.\"\n\n                  The troops look around at one another, uncertainty etched into their grimaces.\n\n                  So, you continue. \"You're not gettng a better deal than this, and reinforcements are already on their way. Take the offer. Live to fight another day.\"\n\n                  *goto pers2\n\n                *else\n                  \"That's a good deal, right?\" you ask, looking around at the troops. They do not seem impressed by the offer.\n\n                  Horan pinches his brow and sighs loudly. \"I don't even have a response for that. Men, open fire.\"\n\n                  *goto kill2\n\n              #\"We don't want to fight you. Not over something this petty\"\n                *set Sadism %-2\n                *if Persuasion > 65\n                  \"Run home to General Tappon and come back with the rest of your army. Come back for Philly's head instead of its finger. Win the war, not the battle.\"\n\n                  The troops look around at one another, uncertainty etched into their grimaces.\n\n                  So, you continue. \"You're not gettng a better deal than this, and reinforcements are already on their way. Take the offer. Live to fight another day.\"\n\n                  *goto pers2\n\n                *else\n                  \"That's a good deal, right?\" you ask, looking around at the troops. They do not seem impressed by the offer.\n\n                  Horan pinches his brow and sighs loudly. \"I don't even have a response for that. Men, open fire.\"\n\n                  *goto kill2\n\n              #\"The best you can ask for here is a quick death.\"\n                *set Cruelty %-2\n                *if Persuasion > 75\n                  \"But I'm willing to make you another deal - a better deal. Run home to General Tappon and come back with the rest of your army. Come back for Philly's head instead of its finger. Win the war, not the battle.\"\n\n                  The troops look around at one another, uncertainty etched into their grimaces.\n\n                  So, you continue. \"You're not gettng a better deal than this, and reinforcements are already on their way. Take the offer. Live to fight another day.\"\n\n                  *goto pers2\n\n                  *label pers2\n                  Horan scowls at you, then holsters his gun. \"You'll regret letting us live,\" he says.\n\n                  He and the other soldiers file away, heading down the highway. You watch the walk away from the safety of the wrecked overpass. A twinge of pride fills your chest. You prevented a slaughter. \n\n                  Then a gunshot rings you. Then another. You reach for your gun and then you see the threat. The Daughter warriors. They took advantage of the truce and attacked the soldiers. Not expecting a sudden betrayal, the troops fall by the dozen. Soon, none remain.\n\n                  *goto b4\n\n                *else\n                  \"That's a good deal, right?\" you ask, looking around at the troops. They do not seem impressed by the offer.\n\n                  Horan pinches his brow and sighs loudly. \"I don't even have a response for that. Men, open fire.\"\n\n                  *goto kill2\n\n                  *label kill2\n                  Your saving grace is Artoria. She opens fire as the troopers do, giving you a fighting chance. With no time to run and nowhere to hide, your only choice is to fire back.\n                  *goto kill3\n\n          *if (Bomber > 0) #Detonate the overpass with improvised explosives\n            *set Cruelty %+4\n            *set Sadism %+2\n            *set Deception %+3\n            \"You have anything that goes boom?\" you ask.\n\n            Artoria flashes a devilish smile. \"No, but I know someone who does.\" She looks down at the wrecked convoy and the soldiers being peppered with gunfire. \"Let's go borrow some toys.\"\n\n            Following Artoria down the overpass is easy enough. The Republic troopers are all safely distracted by the mounted snipers trying to kill them. They're too busy to look out for someone trying to steal from their convoy.\n\n            You hide on one side of the truck, flush against it as noxious gasoline pours from its damaged tank. \"This will do,\" says Artoria in a hushed tone, so that the men on the other side of the truck do not hear. She pulls out a canteen, pours out the water, and catches some of the gasoline in its thick drizzle.\n\n            \"We're gonna need gunpowder,\" you say, reciting your expert knowledge on making shit explode. \n\n            She tosses a few bullets to your feet with the hand that isn't holding the canteen. You crush them with the butt of your gun. The strange, sharp smell of exploding powder fills your nose, then flees almost immediately. You crush a few more and sift the ashy powder into a small pile.\n\n            \"That oughta be enough,\" says Artoria. She scoops the gunpowder up with her meaty hand and drops it into the gasoline, then twists the cap back onto the canteen. \"You have something we could use as a fuse?\"\n\n            \"I do not,\" you say. \n\n            \"Alright, I'm gonna throw it high up. You're gonna shoot it in the air. Got it?\"\n            *choice\n              #\"Got it.\"\n                *set Notoriety %+7\n                *set Caution %-4\n                After stepping back a few yards, you throw the canteen as high as you can. It sails through the air and Artoria raises her rifle.\n\n                Then a gunshot deafens you. \n\n                *label b12\n                An explosion tears across the overpass. Bodies fly wildly, splaying their limbs like rag dolls, until they hit the ground with a terrible splatter. The flames arch high for a moment, then retreat back to the ground where smoke columns rise in their stead.\n\n                The world is silent for a moment as everything settles, then Artoria shouts, \"Ladies, move in!\"\n\n                The warriors move swiftly, running toward what remains of the overpass.\n\n                Blackened figures rise from the ashes, then are forced to their knees by the rage of the Daughter warriors. Shouting ensues but no shooting. Abject surrender. \n                *goto b3\n\n              #\"I'm not a very good shot. I'll throw it and you shoot.\"\n                *set Notoriety %+10\n                *set Caution %-4\n                After stepping back a few yards, Artoria throws the canteen as high as she can. It sails through the air and you raise your rifle.\n\n                *if Combat > 35\n                  You squeeze the trigger and you ears ring, and the world seems to slow down.\n\n                  *goto b12\n\n                *else\n                  *set Notoriety %-15\n                  You squeeze the trigger and you ears ring, and the world seems to slow down. But the canteen doesn't explode. You fire a few more times, emptying your cartridge. Then Artoria sighs, picks up her own rifle, and takes aim.\n\n                  *goto b12", "choicescript_description": "They say the world ended a hundred years ago, yet it still turns. In the century since, Philly has been torn apart by rabid monsters and rabid men. Highwaymen, slavers, and militias have carved up territories and claims, while simple villages suffer their wars. You are a simple wanderer looking for work. That’s why you’ve come to the Daughters of Liberty. But a simple scouting job is about to take a turn for the strange, sending you into a spiral of mysteries, intrigue, and brutality. Will you stand by the Daughters? Or will you fight to bring the fire of civilization to your home?\n\n[i]Critical Mass: The Black Vein[/i] is a 108,000-word interactive novel by Michael Meillarec, the second in the Critical Mass series. It’s entirely text-based, without graphics or sound effects, andfueld by the vast, unstoppable power of your imagination. \n\n· Choose your gender.\n· Fight for freedom or bring military order to the wastes.\n· Accomplish your goals with stealth, combat, or persuasion.\n· Make allies and enemies with survivalist factions.\n· Protect a village from brutal raiders or lead them in the front gate.\n· See (or destroy) the successes of Amish Country post-apocalypse.\n· Uncover the secrets buried beneath Black Vein. \n", "choicescript_stats": "[b]Stats[/b]\n*stat_chart\n  percent Health\n  percent Combat\n  percent Stealth\n  percent Persuasion\n\n[b]Allies[/b]\n\n*if Franklin = true\n  Franklin\n\n*if DM = true\n  Dutch Mill\n\n*if Fulfillment = true\n  Fulfillment\n\n*if Eagles = true\n  Eagles\n\n*if BlackVein = true\n  Black Vein\n\n[b]Traits[/b]\n*stat_chart\n  opposed_pair Cruelty\n    Mercy\n  opposed_pair Deception\n    Honor\n  opposed_pair Sadism\n    Pacifism\n  opposed_pair Caution\n    Boldness\n  percent Notoriety", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Critical Mass: The Black Vein[/i].\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "screenshots": "*set Health 78\n*set Combat 100\n*set Stealth 30\n*set Persuasion 30\n\n*set Cruelty 70\n*set Deception 30\n*set Sadism 83\n*set Caution 18\n*set Notoriety 82\nThen she emerges from the bomb shelter's darkness. A surprisingly small woman with wrinkles on her cheeks and deep, dark brown eyes. She's every bit as scarred and wartorn as the other highwaymen and every wasteland warriors you've ever seen, but she holds herself with a more confident attitude. Back straight, eyes narrowed, lips pursed. She is a woman of rare purpose.\n\n\"What do you want?\" she asks. No nuance or subtlety. She is simple.\n*fake_choice\n  #\"We came to warn you. Eagles are coming - their whole army, likely. You should leave before they arrive.\"\n  #\"We're looking for a book on behalf of Queen Echo. Mind if we look for it?\"\n  #\"Bunker Brothers sent me to inspect your bomb shelter. Ma'am, do you know how much asbestos is in this ceiling?\"\n\n*set Health 52\n*set Combat 40\n*set Stealth 90\n*set Persuasion 30\n\n*set Cruelty 31\n*set Deception 91\n*set Sadism 43\n*set Caution 31\n*set Notoriety 14\n\"What makes you even think there's dynamite in there?\" you ask.\n\nShe shrugs. \"Safes are for valuable things. Dynamite would be real valuable in a mining town, wouldn't ya think? I mean, that's gotta be the hot commodity. So, any ideas for breaking in?\"\n*fake_choice\n  #Use your gun             \n  #Power it to trigger a reset\n  #Use a magnet to turn the tumblers\n\n*set Health 92\n*set Combat 40\n*set Stealth 30\n*set Persuasion 90\n\n*set Cruelty 80\n*set Deception 12\n*set Sadism 72\n*set Caution 34\n*set Notoriety 74\n\"So what's the job?\"\n\n\"Pretty simple,\" Corvalla says, pointing to a corkboard on the wall. Flyers and drawings mark it. They depict and describe wanted highwyamen. \"These are warlords, highwwaymen, criminals, etc. They've escaped the Eagles' justice. Pick one, kill 'em, bring me their head.\"\n\nYou look over the list of highwaymen, only three without their names crossed out. \n\n*fake_choice\n  #\"Why not send your soldiers to do this?\"\n  #Alan the Annihilator\n  #Angie the Angry\n  #Laserface", "startup": "\n*title Critical Mass: The Black Vein\n*author Michael Meillarec\n*scene_list\n\tstartup\n\t1-franklin\n\t2-dutchmill\n\t3-buzzers\n\t$ 4-fulfillment\n\t$ 5-reward\n\t$ 6-ft-wash\n\t$ 7-linc\n\t$ 8-rodin\n\t$ 9-ambush\n\t$ 10a-fulfillment\n\t$ 10b-fulfillment\n\t$ 11-independence_hall\n\t$ 12a-daughters_win\n\t$ 12b-republic_win\n\n*create Health 100\n*create Combat 30\n*create Stealth 30\n*create Persuasion 30\n\n*create Scavenger 0\n*create Survivalist 0\n*create Wanderer 0\n\n*create Franklin false\n*create DM false\n*create Fulfillment false\n*create Eagles false\n*create BlackVein false\n\n*create Cruelty 50\n*create Deception 50\n*create Sadism 50\n*create Caution 50\n*create Notoriety 0\n\n*create Slaver 0\n*create Villain 0\n*create Bomber 0\n*create Mechanic 0\n*create Poisoner 0\n\n*create name \"name\"\n*create FGFranklin 0\n*create VFranklin 0\n*create Amos 0\n*create Dwide 0\n*create Cic 0\n*create Corv 0\n*create Allen 0\n*create DoL 0\n*create rep 0\n*create dau 0\n*create kill 0\n*create peace 0\n\n*create man 0\n*create woman 0\n*create neutral 0\n*create dutch 0\n*create gun 0\n*create c1 0\n\n*if not(choice_is_web or choice_is_steam) and not(choice_randomtest)\n\t\t*temp skip_description\n\t\t*config skip_description false\n\t\t*if skip_description\n\n\t\t\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tThey say the world ended a hundred years ago, yet it still turns. In the century since, Philly has been torn apart by rabid monsters and rabid men. Highwaymen, slavers, and militias have carved up territories and claims, while simple villages suffer their wars. You are a simple wanderer looking for work. That’s why you’ve come to the Daughters of Liberty. But a simple scouting job is about to take a turn for the strange, sending you into a spiral of mysteries, intrigue, and brutality. Will you stand by the Daughters? Or will you fight to bring the fire of civilization to your home?\n\n\t[i]Critical Mass: The Black Vein[/i] is a 108,000-word interactive novel by Michael Meillarec, the second in the Critical Mass series. It’s entirely text-based, without graphics or sound effects, andfueld by the vast, unstoppable power of your imagination. \n\n\t· Choose your gender.\n\t· Fight for freedom or bring military order to the wastes.\n\t· Accomplish your goals with stealth, combat, or persuasion.\n\t· Make allies and enemies with survivalist factions.\n\t· Protect a village from brutal raiders or lead them in the front gate.\n\t· See (or destroy) the successes of Amish Country post-apocalypse.\n\t· Uncover the secrets buried beneath Black Vein. \n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t\t[i]You can play the first 3 chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t\t*choice\n\t\t\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t\t\t\t*restart\n\t\t\t\t\t#Play the first 3 chapters now for free.\n\t\t\t\t\t\t\t*goto purchased\n\n\t[i]You can play the first 3 chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2020-02-13 $4.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n\n[i]By most accounts, the Daughters of Liberty have provided a mixture of safety and despair as they spread across the ruins of Philadelphia, planting their flag in anything that could hold it. Unlike most new religious sects, which tend to keep to themselves, the Daughters have come to act as a miltia defending the weak from the vicious. Some, however, are concerned that they are too zealous in their ambition to eradicate violence. They have even been known to execute children for petty theft, though such reports are disputed.[/i]\n\n[i]This vicious behavior likely has little to do with their female-dominated culture, as some researchers suggest, and more to do with their zealous reverence for a goddess named Columbia.[/i]\n\n-Hammermill Hampton, [i]The Rise of Occultism in Formerly New England and Beyond[/i]\n\nYou responded as soon as the call went out. \"The illustrious Daughters of Liberty, who fight for the Rights of all good Wastelanders, seek a mercenary to act as a scout. Seek out ReVivienne Washington at the Temple Bell for further information.\"\n\nYou know the Daughters only by reputation. Some say they fight for the freedom of all wastelanders to live free from the fear of death. Others say they beat down rebellious farmers who refuse to pay for \"protection.\" You'll find out which soon enough.\n\nThe Philly sky before you is menacing as ever - black and grey with its constant veil of sun-shading smog. Someone once told you that Philly was always sunny, back in the old days. You can't really imagine that. \n\nEach step you take down that broken, twisted city road is a hesitation. Highwaymen and mutant monstrosities call these ruins their home, as do peace-loving wastelanders who would fight to the death if it meant a meal. Each block of dilapidated, red-brick storefronts and restaurants can represent a horde of gun-toting animals, hungry for flesh and violence.\n\nYou rush by them in a hurry, gripping your gun tightly. A good gun is the only thing that protects you in this world.\n\nWhat kind of gun do you use?\n*choice\n\t#An oversized shotgun\n\t\t*set Caution %-10\n\t\t*set Sadism %+10\n\t\tBigger than a pistol, smaller than a machine gun. Shotguns are great for emptying shell after shell at some poor idiot who thought his little revolver would save him.\n\n\t\t*goto gun\n\n\t#An simple pistol\n\t\t*set Caution %+10\n\t\tPistols are a staple of wasteland warfare. Old pictures in books show you that soldiers used to always have rifles - or machine guns, but you're not too sure of the difference between them. But they require a lot of ammunition and are hard to find, so most wastelanders rely on good old pistols to get the job done.\n\n\t\t*goto gun\n\n\t#A lever-action rifle\n\t\t*set Caution %-10\n\t\tJust like the cowboys in those old stories used to use. It's a little rusty and jams up sometimes, but it's an otherwise reliable rifle. Plus you find ammo for it everywhere, and it'll fire so straight that you could kill a Buzzer from a hundred yards.\n\n\t\t*goto gun\n\n*label gun\nOf course, you're not the only one in the wastes with a gun. Thousands of people - good and bad - face a hailstorm of bullets every day. And the best or worst of those people are the Daughters of Liberty.\n\nA great flag waves above their compound. Thirteen stripes of red and white, with a bell-shaped symbol in the corner, on a square of black. You've only dealt with their patrols in passing, and they've never bothered you much. Of course, that could change any moment.\n\nTheir base is surrounded by wired fencing with guard towers at the six corners. Some of the fencing is damaged and replaced by scrap stripped from cars. Other parts are replaced by red-brick that had been stripped from the large, collapsing building across the street. The smell of burning and smoke comes from within, accompanied by a thick scent of cooked meat.\n\nYou almost expect to be invited to the barbecue. Then, as you get closer to the compound, you start to feel like you're being watched.\n\nThey're upon you before you can even fire a shot. A bag is placed over your head and your gun is taken from you while you try to fight back. Your assailants hold you to the ground as they try to wrap a rope around your hands.\n\n\"Must be a contractor,\" says one voice. It's a light and airy voice, which seems odd since they seem to be the one holding you down.\n\nA hand his placed over your mouth, despite the head-bag blocking it. You try to speak out and explain yourself, but your words don't quite get through. Then they start dragging you toward, you assume, the compound.\n*page_break\nThe bag is removed from your head and you find yourself in a candlelit chamber, tied to a chair and facing a large bell with a thick crack in its side.\n\n\"Welcome to the Temple Bell,\" says a soft, feminine voice. A scrap of paper lands on the floor before you. The one that advertised the job offer. It lands beside your gun, ammo, and a knife, all of which had been taken off you after capture.\n\n\"Lady, I just want a job,\" you say, craning your neck to try and see whoever is behind you.\n\n\"Obviously,\" she says. \"Otherwise you wouldn't have dared approach our temple.\"\n\n\"Do you tie up everyone looking for work?\"\n\n\"I really am sorry,\" she says, placing a cool hand on your shoulder. \"My girls can get a little excited sometimes. But I'm sure you understand how important security is. It's what the Lady demands.\"\n\nRight. You'd forgotten that, in addition to a militia, they're also a cult. \"So, can I get up now?\"\n\nShe doesn't answer you, though she does circle your chair enough for you to get a sense of her. She wears a heavy armor made of rusted metal and tanned leather - typical of highwaymen and mecenaries. Red shocks of hair flow down the back of her head and meet the butt of the large rifle slung over her back. A few dozen knives rest in sheathes all over her body, ready for action at the slightest threat. Oddly enough, despite her weathered and rugged appearance, she does not have any noticeable scars. That must make her the only wastelander in the world without some terrible wound that scarred over.\n\n\"My name is ReVivienne Washington,\" she says. \"What's yours?\"\n*choice\n\t#Sweet Dee\n\t\t\"The name's Sweet Dee.\"\n\n\t\t*goto name\n\n\t#The Rat King\n\t\t\"The name's Rat King.\"\n\n\t\t*goto name\n\n\t#Ronald McDonald\n\t\t\"The name's Ronald McDonald.\"\n\n\t\t*goto name\n\n\t#Frankle\n\t\t\"The name's Frankle.\"\n\n\t\t*goto name\n\n\t#Giganto\n\t\t\"The name's Giganto.\"\n\n\t\t*goto name\n\n\t#Lactatia\n\t\t\"The name's Lactatia.\"\n\n\t\t*goto name\n\n\t#Mutato\n\t\t\"The name's Mutato.\"\n\n\t\t*goto name\n\n\t#These names are awful\n\t\tWell then pick your own name. \n\n\t\t*input_text name\n\t\t*goto name\n\n*label name\nReVivienne shrugs. \"Weird. What kind of name is that?\"\n\nYou restrain the urge to point out how odd her name is.\n*choice\n\t#A man's name\n\t\t*set man 1\n\t\t\"It's a man's name.\"\n\n\t\tShe sighs and pinches her brow. \"I wasn't asking about your gender. Never mind. Ugh, men.\" Venom spills off her tongue at the mention of your gender - a reminder that these are Daughters of Liberty, never sons.\n\n\t\t*goto man1\n\n\t#A woman's name\n\t\t*set woman 1\n\t\t\"It's a woman's name.\"\n\n\t\tShe sighs and pinches her brow. \"I wasn't asking about your gender. Never mind.\" She seems more annoyed than anything else, but not just at you. Surely living in a military cult is a stressful life, but you're not her therapist.\n\n\t\t*goto man1\n\n\t#A gender neutral name\n\t\t*set neutral 1\n\t\t\"It's a gender neutral name.\"\n\n\t\tShe sighs and pinches her brow. \"I wasn't asking about your gender. Never mind.\" She seems more annoyed than anything else, but not just at you. Surely living in a military cult is a stressful life, but you're not her therapist.\n\n\t\t*goto man1\n\n*label man1\n\"So are you gonna tell me what you want?\" you ask. \"What's the contract?\"\n\nShe ignores your question and stares at the bell before you. It reeks of copper or some other metal and has a great crack spreading down the side. \n\n\"They say that the Lady Columbia rang this Bell when she proclaimed freedom for her nation,\" ReVivienne explains, as if history matters to you. \"Then the bombs fell and freedom went back to sleep, and the Bell cracked. Our duty is to safeguard this holy relic until the Lady returns and rings it yet again. Until then, it only leaved this chamber for public worship.\"\n*choice\n\t#\"Cool.\"\n\t\t\"Yes, it is cool,\" she says. \"Perhaps you will live to see that day. But this leads me to my question. We Daughters are guardians. What are you?\"\n\t\t*goto back1\n\n\t#\"When will that day be?\"\n\t\t\"We cannot know,\" she says. \"Perhaps when highwaymen all perish. Perhaps when all the holy relics in these ruins are brought to the Bell. I suppose we will have to wait and see. But this leads me to my question. We Daughters are guardians. What are you?\"\n\t\t*goto back1\n\n\t#\"Sounds made up.\"\n\t\t\"Our histories are not made up,\" she says with a scowl. \"You will regret these words when the Lady's day comes. But this leads me to my question. We Daughters are guardians. What are you?\"\n\t\t*goto back1\n\n*label back1\n*choice\n\t#A survivalist who specializes in violence\n\t\t*set Combat 70\n\t\t*set Survivalist 1\n\t\tThe gun is the way of the wasteland. This remains true whether you're good or evil, powerful or weak, alone or in a group. If there's something you need, you have the power and to take it by force. When times are good you can get by serving as a merchant's guard or answering contracts like this one, but when times are lean you have the option to beat down a few farmers.\n\n\t\tOnce you tell ReVivienne that you're a simple survivalist, she seems to understand this immediately.\n\t\t*goto c3\n\n\t#A wanderer who specializes in staying hidden.\n\t\t*set Stealth 70\n\t\t*set Wanderer 1\n\t\tIt may not sound like much, but a wanderer is what you are. You get by through staying out of sight and staying out of everyone's way. That isn't to say that you're a pushover in a fight. It just means you're a smart survivor, and that you understand that some people cannot be negotiated with or beaten down.\n\n\t\tOnce you tell ReVivienne that you're a simple wanderer, she seems to understand this immediately.\n\t\t*goto c3\n\n\t#A scavenger who specializes in negotiation\n\t\t*set Scavenger 1\n\t\t*set Persuasion 70\n\t\tScavengers are the base of the wasteland economy, or so you tell yourself. If there's something hidden in the ruins, you'll be the one to find it. Then you'll sell it for a decent meal or some clean water. This skillset also means you're a fierce negotation, so you can sniff out deals and not just pre-war junk.\n\n\t\tOnce you tell ReVivienne that you're a simple scavenger, she seems to understand this immediately.\n\t\t*goto c3\n\n*label c3\n\"Look, I'm no good at all this intimidation stuff,\" she confesses. \"I just got put in charge and I'm expected to have visitors tied up and frightened. Truth is, you're the only person who's come for this contract, so I'm in no position to turn you away.\"\n\nHer harsh, rugged expression turns soft, making you suspect her of being honest.\n\n\"What do you need?\" you ask. You might have also asked to be untied, but didn't want to push your luck. The ropes are digging into your wrists and making them go numb, but you'll just have to suffer for a while.\n\n\"Normally our contractors help Daughters recover holy texts and sacred artifacts,\" she explains, once again assuming that you care about her cult. \"Now that I'm in charge, that's gonna change. It's a waste of time. Know what's more important? Electricity. These ruins are littered with generators that a bit of coal could power. Hell, there's even a nuclear station down the road that just needs a bit of uranium. But let's stick with the coal.\"\n\n\"Coal,\" you say, letting the odd word slip off your tongue.\n\n\"It's a black rock that makes electricity when it burns,\" she explains. \"I don't understand it, but I have people who do. There's a ghost town due west of her that used to have a coal mine. Your job is the locate the village, verify that the mine is still open, and report any potential threats in the area\"\n*label c4\n*choice\n\t*disable_reuse #\"Is electricity really worth all this?\"\n\t\t\"Of course it is,\" she says. \"What purifiers, computers, phones, even lights. They all run on electricity. This'll give us a massive advantage over the highwaymen who prowl the ruins. So, what do you say?\"\n\t\t*goto c4\n\n\t*disable_reuse #\"What's the job pay?\"\n\t\t*if woman = 1\n\t\t\t\"More bullets and moonshine than you can imagine,\" she says with a smirk. \"You'll be our on-call contractor, ensuring that you have a steady line of work. Maybe one day you could even join us. So, what do you say?\"\n\t\t\t*goto c4\n\n\t\t*else\n\t\t\t\"More bullets and moonshina than you can imagine,\" she says with a smirk. \"You'll be our on-call contractor, ensuring that you have a steady line of work. If you were a woman I'd offer to let you a position as a Daughter, but I suppose you'll have to settle. So, what do you say?\"\n\t\t\t*goto c4\n\n\t*disable_reuse #\"Where's the village?\"\n\t\t\"No clue,\" she says. \"We're basing our info on old census records, not maps. All we can say for sure is that it's somewhere west of Philly.\"\n\t\t*goto c4\n\n\t#\"I'll get it done.\"\n\t\t\"But first, would you please untie me?\"\n\t\t*goto quest1\n\n*label quest1\n*page_break\nReVivienne escorts you out of the compound, allowing you to see her soldiers. They all wear metal armor similar to hers, though many have stars or stripes painted on them. Some train with knives and guns and others spar with one another, while some eat around a bonfire. Why they wear battle armor so casually, you do not know. They glare at you, the outsider, as you are escorted out of the compound. You count at least thirty women, all armed. \n\n\"Don't mind them,\" ReVivienne says. \"They're just suspicious of outsiders in the compound.\"\n\nYou have a hard time believing that these are the women who fight highwaymen on behalf of random wastelanders, out of the kindness of their hearts. The rumors that they coerce farmers into giving up their food, however, seems much more plausible.\n\n\"Don't come back until you have a report,\" she says as her soldiers open the massive metal gate, through a series of pulleys.\n\nYou return to the red-brick ruins of Philly, still confused by that odd job interview, but ready to start your promising career as a scout for a cult.\n\nWhat you don't know is that a greater threat looms over these ruins - greater than highwaymen, mutants, and slavers. It rides from the north and seeks the same prize that you do. Your only blessing is that you've gotten a head start.\n*finish"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
        this.initial_commands = saved.initial_commands;
        this.stats = saved.stats;
      }
    }

    _runUntilEnd() {
      while (true) {
        try {
          this._mainLoop();
          return;
        } catch (e) {
          if (e instanceof RestartGame) {
            this._resetAll();
            this._enterScene(this.load_scene("startup"));
            continue;
          }
          if (e instanceof LoadGame) { this._applyState(e.state); continue; }
          if (e instanceof QuitGame) {
            try { this.autosave(); } catch (_) { /* never mask quit */ }
            throw e;
          }
          throw e;
        }
      }
    }

    _mainLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          const nxt = this._nextSceneName(this.scene.name);
          if (!nxt) break;
          this.temps = this._freshTemps();
          this._enterScene(this.load_scene(nxt));
        }
      } catch (e) {
        if (e instanceof GameOver) { this._flushParagraph(); return; }
        throw e;
      }
    }

    _enterScene(scene) {
      this.scene = scene;
      this.finished = false;
      this._pending_scene = null;
      const resume = this._resume;
      if (resume !== null && resume[0] === scene.name) {
        const [, lineNum, indent] = resume;
        this.line_num = lineNum != null ? lineNum : 0;
        this.indent = indent != null ? indent : scene.lines[this.line_num].indent;
      } else {
        this.line_num = 0;
        this.indent = 0;
      }
      this._resume = null;
      if (scene.name !== "startup") this.initial_commands = false;
    }

    _nextSceneName(current) {
      const i = this.scene_list.indexOf(current);
      if (i === -1) return null;
      if (i + 1 < this.scene_list.length) return this.scene_list[i + 1];
      return null;
    }

    // ---- save / load state ---- //

    _baseState() {
      return {
        version: 1,
        scene: this.scene ? this.scene.name : null,
        line_num: this.line_num,
        indent: this.indent,
        initial_commands: this.initial_commands,
        scene_list: this.scene_list.slice(),
        stats: toJsonable(this.stats),
        temps: toJsonable(this.temps),
        unlocked: Array.from(this.unlocked).sort(),
      };
    }

    captureState() {
      const state = this._baseState();
      if (Object.keys(this.checkpoints).length) state.checkpoints = deepCopy(this.checkpoints);
      return state;
    }

    _applyState(state) {
      this.scene_list = (state.scene_list || []).slice();
      this.stats = fromJsonable(state.stats);
      this.temps = fromJsonable(state.temps);
      this.unlocked = new Set(state.unlocked || []);
      this.checkpoints = deepCopy(state.checkpoints || {});
      this.initial_commands = state.initial_commands === undefined ? false : state.initial_commands;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = state.scene ? this.load_scene(state.scene) : null;
      this.line_num = state.line_num || 0;
      this.indent = state.indent || 0;
    }

    _resetAll() {
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.unlocked = new Set();
      this.checkpoints = {};
      this.initial_commands = true;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
    }

    autosave() {
      if (this.scene === null) return;
      if (this.io.on_autosave) this.io.on_autosave(this.captureState());
    }

    requestRestart() { throw new RestartGame(); }

    // ---- main interpreter loop (mirrors Scene.prototype.printLoop) ---- //

    _printLoop() {
      const lines = this.scene.lines;
      this.finished = false;
      while (!this.finished && this.line_num < lines.length) {
        const line = lines[this.line_num];
        if (line.is_blank) { this._flushParagraph(); this.line_num += 1; continue; }

        const indent = line.indent;
        if (indent > this.indent) {
          if (line.command && line.command.toLowerCase() === "comment") { this.line_num += 1; continue; }
          throw this._err("increasing indent not allowed, expected " + this.indent + " was " + indent);
        }

        const end = this.temps._choice_ends.get(this.line_num);
        if (end !== undefined &&
            (truthy(this._safeGet("implicit_control_flow")) || this.temps._fake_choice_depth > 0)) {
          this.line_num = end + 1;
          if (this.temps._fake_choice_depth > 0) this.temps._fake_choice_depth -= 1;
          continue;
        }

        this.indent = indent;

        if (line.command == null && line.text.startsWith("#")) {
          throw this._err("It is illegal to fall out of a *choice statement; " +
            "you must *goto or *finish before the end of the indented block.");
        }

        if (line.command == null) {
          this.initial_commands = false;
          this._printText(line.text);
        } else {
          this._runCommand(line);
        }
        this.line_num += 1;
      }
      this._flushParagraph();
      if (!this.finished) this.finished = true;
    }

    _runCommand(line) {
      const cmd = line.command.toLowerCase();
      const data = line.arg.trim();
      if (INITIAL_COMMANDS.has(cmd)) {
        if (this.scene.name !== "startup" || !this.initial_commands) {
          if (cmd !== "comment")
            throw this._err("Invalid " + cmd + " instruction, only allowed at top of startup.txt");
        }
      } else {
        this.initial_commands = false;
      }
      const handler = DISPATCH[cmd];
      if (handler === undefined) {
        if (NOOP_COMMANDS.has(cmd)) return;
        throw this._err("Non-existent command '" + cmd + "'");
      }
      handler.call(this, data, line);
    }

    _printText(text) { this._para.push(stripMarkup(this.replace_variables(text))); }

    _flushParagraph() {
      if (this._para.length) {
        let joined = this._para.filter((p) => p !== "").join(" ");
        joined = joined.replace(/[ \t]+/g, " ").replace(/ *\n */g, "\n").trim();
        if (joined) this.io.text(joined);
      }
      this._para = [];
    }
  }

  // ---- command handlers (mirror engine._cmd_*) ---- //
  const E = Engine.prototype;

  E._evalLiteral = function (expr, line) {
    if (expr === "") throw this._err("no value specified: " + line.text);
    return this.evaluator.evalString(expr);
  };

  E._cmd_create = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    this.stats[variable] = this._evalLiteral(m[2].trim(), line);
    return false;
  };

  E._cmd_temp = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const rest = m[2].trim();
    this.temps[variable] = rest ? this._evalLiteral(rest, line) : null;
    return false;
  };

  E._cmd_create_array = function (data, line) { this._defineArray(data, line, false); return false; };
  E._cmd_temp_array = function (data, line) { this._defineArray(data, line, true); return false; };

  E._defineArray = function (data, line, temp) {
    const m = /^(\w+)([\s\S]*)$/.exec(data);
    if (!m) throw this._err("Invalid array instruction, no name specified: " + line.text);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const stack = tokenize(m[2].trim());
    if (!stack.length) throw this._err("Invalid array instruction, missing length: " + line.text);
    let length = Math.trunc(toNum(this.evaluator.evalValueToken(stack)));
    if (length < 1) throw this._err("Invalid array instruction, length must be a whole number > 0");
    let values = [];
    while (stack.length) values.push(this.evaluator.evalValueToken(stack));
    if (!values.length) throw this._err("Invalid array instruction, no value specified: " + line.text);
    if (values.length === 1) { const v = values[0]; values = new Array(length).fill(v); }
    else if (values.length !== length)
      throw this._err("array expected 1 or " + length + " values, got " + values.length);
    const target = temp ? this.temps : this.stats;
    for (let i = 0; i < length; i++) target[variable + "_" + (i + 1)] = values[i];
    target[variable + "_count"] = length;
  };

  E._cmd_set = function (data, line) {
    const stack = tokenize(data);
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    if (!stack.length) throw this._err("Invalid set instruction, no expression: " + line.text);
    this._applySet(variable, stack);
    return false;
  };

  E._cmd_setref = function (data, line) {
    const stack = tokenize(data);
    const variable = String(this.evaluator.evalValueToken(stack)).toLowerCase();
    this._requireVar(variable);
    this._applySet(variable, stack);
    return false;
  };

  E._applySet = function (variable, stack) {
    // Leading operator => implicitly based on the variable's current value.
    if (stack.length && (stack[0].name === "OPERATOR" || stack[0].name === "FAIRMATH")) {
      stack.unshift(new Token("VAR", variable, "(implicit)"));
    }
    this.set_var(variable, this.evaluator.evalTokens(stack));
  };

  E._cmd_delete = function (data) {
    const variable = String(this.evaluator.evaluateReference(tokenize(data)));
    delete this.temps[variable];
    delete this.stats[variable];
    return false;
  };

  E._cmd_rand = function (data) {
    const stack = tokenize(data);
    if (!stack.length) throw this._err("Invalid rand statement, expected: varname min max");
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    const minimum = this.evaluator.evalValueToken(stack);
    const maximum = this.evaluator.evalValueToken(stack);
    if (stack.length) throw this._err("Invalid rand statement, expected three args");
    const lo = toNum(minimum), hi = toNum(maximum);
    const diff = hi - lo;
    if (diff < 0) throw this._err("rand min must be <= max: " + lo + " > " + hi);
    if (diff === 0) this.set_var(variable, lo);
    else if (Number.isInteger(lo) && Number.isInteger(hi))
      this.set_var(variable, lo + Math.floor(this._rng() * (diff + 1)));
    else this.set_var(variable, lo + this._rng() * diff);
    return false;
  };

  E._requireVar = function (variable) {
    if (!(variable in this.temps) && !(variable in this.stats))
      throw this._err("Non-existent variable '" + variable + "'");
  };

  // ---- control flow ---- //

  E._cmd_goto = function (data) { this._gotoLabel(this._resolveLabelName(data)); return true; };
  E._cmd_gotoref = function (data) {
    this._gotoLabel(String(this.evaluator.evalString(data)).toLowerCase()); return true;
  };
  E._resolveLabelName = function (data) {
    if (/[\[\{]/.test(data)) return String(this.evaluator.evaluateReference(tokenize(data)));
    return String(data).toLowerCase();
  };
  E._gotoLabel = function (label) {
    if (!(label in this.scene.labels)) throw this._err("bad label " + label);
    this.line_num = this.scene.labels[label];
    this.indent = this.scene.lines[this.line_num].indent;
  };
  E._cmd_label = function () { return false; };

  E._cmd_if = function (data) {
    if (truthy(this.evaluator.evalString(data))) this.indent = this._nextNonblankIndent();
    else this._skipBranch(false);
    return true;
  };
  E._cmd_else = function (data) {
    if (data) {
      if (/^if\b/.test(data)) throw this._err("'else if' is invalid, use 'elseif'");
      throw this._err("nothing should appear on a line after 'else': " + data);
    }
    this._skipBranch(true);
    return true;
  };
  E._cmd_elseif = function () { this._skipBranch(true); return true; };

  E._nextNonblankIndent = function () {
    const lines = this.scene.lines;
    let i = this.line_num + 1;
    while (i < lines.length && lines[i].is_blank) i += 1;
    return i < lines.length ? lines[i].indent : this.indent;
  };

  E._skipBranch = function (inElse) {
    const startIndent = this.indent;
    let nextIndent = null;
    const lines = this.scene.lines;
    while (true) {
      this.line_num += 1;
      if (this.line_num >= lines.length) return;
      const line = lines[this.line_num];
      if (line.is_blank) continue;
      const indent = line.indent;
      if (nextIndent === null) {
        if (indent <= startIndent) throw this._err("expected at least one line in 'if' true block");
        nextIndent = indent;
      }
      if (indent <= startIndent) {
        let parsed = null;
        if (indent === startIndent && line.command) parsed = [line.command.toLowerCase(), line.arg.trim()];
        if (!parsed || inElse) { this.line_num = this._previousNonblank(); this.indent = indent; return; }
        const [command, cdata] = parsed;
        if (command === "else") {
          if (cdata) {
            if (/^if\b/.test(cdata)) throw this._err("'else if' is invalid, use 'elseif'");
            throw this._err("nothing should appear after 'else': " + cdata);
          }
          this.indent = this._nextNonblankIndent();
        } else if (command === "elseif" || command === "elsif") {
          if (truthy(this.evaluator.evalString(cdata))) this.indent = this._nextNonblankIndent();
          else { this.indent = indent; this._skipBranch(false); return; }
        } else if (command === "comment") {
          continue;
        } else {
          this.line_num = this._previousNonblank(); this.indent = indent;
        }
        return;
      }
    }
  };

  E._previousNonblank = function () {
    let i = this.line_num - 1;
    const lines = this.scene.lines;
    while (i > 0 && lines[i].is_blank) i -= 1;
    return i;
  };

  // ---- gosub / return / scene transitions ---- //

  E._cmd_gosub = function (data) {
    const m = /\S+/.exec(data);
    const label = m[0];
    const rest = data.slice(label.length);
    const args = this._evalArgList(rest);
    // Some games (e.g. magics) draw their stat meters with a *gosub to a
    // coloredbar routine whose body is a raw *script DOM block we can't run.
    // Emit a structured bar instead so the front-end can paint it; if the IO
    // opts out (console), fall through and run the label as a normal no-op.
    if (label.toLowerCase() === "coloredbar" && this._emitColoredBar(args)) return true;
    this.temps._choice_substack.push([this.line_num, this.indent]);
    this.temps.param = args;
    this._gotoLabel(/[\[\{]/.test(label) ? String(this.evaluator.evaluateReference(tokenize(label)))
      : label.toLowerCase());
    return true;
  };

  // coloredbar params: textwidth, label, colorhex, width ("NN%"), black.
  // The score printed under the game's bar is stats[label.toLowerCase()].
  E._emitColoredBar = function (args) {
    if (!this.io.colored_bar) return false;
    const label = csStr(args[1] != null ? args[1] : "");
    const color = csStr(args[2] != null ? args[2] : "");
    const pct = toNum(String(args[3] != null ? args[3] : "0").replace(/%/g, "").trim());
    const key = label.toLowerCase();
    const value = Object.prototype.hasOwnProperty.call(this.stats, key) ? this.stats[key] : "";
    this._flushParagraph();
    this.io.colored_bar({ label: label, color: color, pct: pct, value: csStr(value) });
    return true;
  };

  E._cmd_return = function () {
    const substack = this.temps._choice_substack;
    if (substack.length) {
      [this.line_num, this.indent] = substack.pop();
      return;
    }
    const subscene = this.stats._choice_subscene_stack;
    if (subscene && subscene.length) {
      const frame = subscene.pop();
      this.temps = frame.temps;
      this._pending_scene = this.load_scene(frame.name);
      this.finished = true;
      this._resume = [frame.name, frame.line_num, frame.indent];
      return true;
    }
    throw this._err("Invalid *return; without any *gosub");
  };

  E._cmd_gosub_scene = function (data, line) {
    if (!this.stats._choice_subscene_stack) this.stats._choice_subscene_stack = [];
    this.stats._choice_subscene_stack.push({
      name: this.scene.name, line_num: this.line_num + 1, indent: this.indent, temps: this.temps,
    });
    this._cmd_goto_scene(data, line);
    return true;
  };

  E._cmd_goto_scene = function (data) {
    const [sceneName, label, param] = this._parseGotoScene(data);
    const target = this.load_scene(sceneName);
    this.temps = this._freshTemps();
    this.temps.param = param;
    this._pending_scene = target;
    this.finished = true;
    if (label != null) {
      const idx = target.labels[label.toLowerCase()];
