oting starts, the rest of your soldiers attack.\"\n\n        \"You heard 'em,\" she says to her soldiers. \"Get ready, because it's time to put some slavers in the ground.\"\n\n        Preparations are swift and immediate. The soldiers all know what they are doing, having spent years engaging in similar such operations. They hustle around the camp with purpose, leaving you with little to do. So you rest for the first time since you went to the Linc, not more than a few days ago. For once, you get to simply watch, but still you know that you'll be on the front lines.\n\n        Angela comes to you, similarly disposed, and says, \"Thank you,\" with an earnest smile. \"Most people wouldn't have helped me. Some might have even sold me back to the slavers.\"\n        *fake_choice\n          #\"Don't mention it.\"\n          #\"Yeah, I'm pretty great.\"\n          #\"I'm starting to regret my choice.\"\n\n        Tappon's voice interrupts before Angela can say anything. \"Time for action,\" she says. \n\n        And with that, the action begins. \n\n        Tappon is no armchair general - she leads the stealth party herself. You join her, hiding in the ruins with dozens of armed women.\n\n        She leads you to a manhole cover just as Angela had pointed out on the map. With a strained heave, the soldiers lift it. A terrible stench rises from within and it takes all you have not to vomit. One of the younger looking troops gets sick. His vomit pools beside the manhole, but its stench is masked by that other the stagnant shit below.\n\n        One by one they leap into the sewers. You're last to tumble down into the darkness. Black water swirls around your ankles, but your nose is slowly adapting to the sickening stench. \n\n        You wander through the dark tunnels following paths explained to you by Angela. The same paths she used to escape. Soon you see a light quite literally at the end of the tunnel. It comes from a metal grate of thick bars, locked from the outside. \n\n        Beyond the bars is a basement empty of everything but chains, whipping posts, and cages meant for dogs. Some of them even have spikes facing the inside. There's some kind of furnace in the corner, but it doesn't seem like it's burned in a long while.\n\n        Tappon doesn't hesitate to shoot the lock. The gate swings open and soldiers pour in.\n\n        \"This is still a stealth op,\" she reminds everyone. \"We go in quiet, get the slaves someplace safe, kill as many as we can before the assault team. You fuck up, a lot of innocent people die.\"\n\n        And with those inspiring words, you begin the trek up the concrete stairs and into the mouth of the beast.\n        *page_break\n        Your team sneaks silently through the darkened first floor of Rodin. It used to be a museum, based on the signs advertising exhibits. Colorful art hangs from the walls. Paintings, mostly, and a lot of them are red. The scent of copper is heavy in the air, so you assume that red paint is some poor slave's blood. Some white statues are splattered with the same red, and many of them have lost limbs. \n\n        The team disperses throughout the floor, silently knifing patrolling slavers. They fall one by one, totally unaware of the soldiers among them. A few make noise as they fall onto the ground, and some cry out in pain as life slips away, but their compatriots are killed as quickly as they can notice.\n\n        *if Stealth > 45\n\n          *goto c33\n\n        *else\n          *set Health %-10\n          One of the slavers spots you and manages to put a knife in your arm, but the troopers put him down as soon as they notice. They silently patch the flesh wound, making you wince with each stitch, but you don't make a noise.\n\n          *goto c33\n          *label c33\n          Soon you find a back room filled with old, white statues, candles casting light all around it. Chained to them are slaves wearing rags, shackles on their wrists and necks, covered in dirt. There are men, women, and children among them, bruised, huddling together, wide-eyed and trembling.\n\n          \"We're Allen's Republic,\" declares General Tappon with a smiling face. \"We're here to help.\"\n\n          Fire burns alight in the eyes of those poor slaves, hope they surely had not known in a long while. \n\n          \"Get them out through the sewers,\" she orders, and they flock to obey.\n\n          Some of the slaves put up a fight, somehow not understanding your purpose there, or fearing reprisals from the slavers. They are the ones who have to held up at the point of a gun, or else they won't move. The rest run with enthusiasm. You think you spot a little dark-skinned girl in the mob of people, shackles clanging heavily, and wonder if it's Aurea.\n\n          They rush into the sewers, smiling with joy but with panic in their eyes. But the job is not yet done.\n          *goto c44\n\n        *label c44\n        *page_break\n        There are two staircases leading up toward the second floor. One of two things have happened, according to Tappon: the slavers upstairs have managed to not notice what happened on the their brothers, or they heard everything and fortified their position. Smart money is on the latter.\n        *choice\n          #Run in and open fire\n            *set Caution %-8\n            *set Sadism %+6\n            You rush up one staircase and Tappon ascends another, followed by soldiers. \n\n            The slavers are waiting in the wide, opened room of the third floor. Fallen statues become makeshift barricades where walls had been torn down in the decades since the slavers occupied Rodin. Chains lie on the floor, as does rotten food and a mess of empty bullet shells.\n\n            *label f2\n            The fighting starts immediately. Slavers fire from cover and troopers fire back, volley after volley, inch by inch. \n\n            *if Combat > 55\n              You pump lead at them, firing with precision despite the ear-shattering cacophony of their gunfire. Blood soaks the floor and splatters across the statues being used as cover, and coats the walls. You take shelter behind a strange abstract piece made of twisted steel, shapeless but thick. Bullets riddle it and you return fire, killing and injuring slavers.\n\n              Slavers fall like flies, unable to reply to your gunshots with any ease or effectiveness. You step over their armored bodies and press forward, blood sticking to your boot. The floor is cleared in mere moments. \n\n              *goto c55\n\n              *label c55\n              The soldiers round up the injured slavers, clearing out every section of the floor and piling up bodies. The whole place stinks of blood. The bound slavers shout curses at the soldiers. Some struggle impotently against their bonds.\n\n              \"Hmm, how should we put 'em down?\" asks Tappon.\n\n              \"Wait!\" one of them shouts. \"You're the ones who hired us to stir up trouble! What is this?\"\n\n              Tappon shoots him in the head. He falls dead. Then she turns to you. \"How should we execute them?\"\n              *choice\n                #Hanging\n                  Tappon takes your advice with a closed-lip smile. \"Efficient.\" \n\n                  Her soldiers tie nooses from thick hemp ropes and tie them to the columns on the third floor. The slavers try to fight against their captors, but their hands are bound and eyes are blindfolded. The nooses go around their necks and they are kicked unceremoniously out the window.\n\n                  They dance a while on nothing but air, in full view the slaves they had so long oppressed. \n\n                  *label b2\n                  \"We're gonna burn this place,\" says Tappon as you and her troops watch from the execution rooftop. \"Then we're going to rehabilitate the freed prisoners and find villages to take them in. In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n                  *choice\n                    #\"Yes, ma'am.\"\n                      She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                      *goto ending2\n                    #\"What's the big deal with the shipment?\"\n                      \"Don't worry about it,\" she says. \"Now get to work.\"\n                      *goto ending2\n\n                    #\"No, don't thank me or anything.\"\n                      \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                      *goto ending2\n\n                #Crucifixion\n                  *set Cruelty %+20\n                  Tappon takes your advice with a closed-lip smile. \"A punishment fitting their evil.\"\n\n                  Her soldiers craft mighty crosses from stray planks of wood, then force the slavers onto them. They are nailed mercilessly to the arms of the cross. Their screams echo across the desert and their former-captives cheer at their pain. They are then pulled upward and made to hang from their nailed hands, choking on their own breath. They will not die for many hours, and they will suffer all the while.\n\n                  *goto b2\n\n                #Firing squad\n                  Tappon takes your advice with a closed-lip smile. \"Efficient.\"\n\n                  The slavers are lined up in front of Rodin, blindfolded and protesting helplessly. A mere volley is all it takes, and they all fall down. Some are not yet quite dead, but nearly there. They are left to bleed out, cold and alone amid the bodies of their brothers, in full view of those they had oppressed so long.\n\n                  *goto b2\n\n                #Lock them away, but let them live\n                  \"I don't like that,\" says Tappon. \"I don't like that one bit.\"\n\n                  *if Persuasion > 55\n                    \"You want to show Philly that you're powerful, don't you? What's more powerful that imprisoning your enemies, locking them away to be mocked and detested, not even allowed the mercy of death?\"\n\n                    She mulls this over for a moment, then decides she likes it.\n\n                    \"Fine,\" she says. \"We'll lock them up someplace. Maybe build a dungeon somewhere. We could always use a dungeon. But we're gonna burn this place down. Then we're going to rehabilitate the freed prisoners and find villages to take them in. In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n                    *choice\n                      #\"Yes, ma'am.\"\n                        She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                        *goto ending2\n                      #\"What's the big deal with the shipment?\"\n                        \"Don't worry about it,\" she says. \"Now get to work.\"\n                        *goto ending2\n\n                      #\"No, don't thank me or anything.\"\n                        \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                        *goto ending2\n\n                  *else\n                    \"Come on, show some mercy.\"\n\n                    \"Slavers don't get mercy. And just for making the suggestion, you don't get to watch the execution. And you don't get to watch us burn this place down, or help us rehabilitate the freed prisoners and find villages to take them in. In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n                    *choice\n                      #\"Yes, ma'am.\"\n                        She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                        *goto ending2\n                      #\"What's the big deal with the shipment?\"\n                        \"Don't worry about it,\" she says. \"Now get to work.\"\n                        *goto ending2\n\n                      #\"No, don't thank me or anything.\"\n                        \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                        *goto ending2\n\n            *elseif Combat > 35\n              *set Health %-15\n              You fire wildly at them, panicked by the noise and confusion. Blood soaks the floor and splatters across the statues being used as cover, and coats the walls. You take shelter behind a strange abstract piece made of twisted steel, shapeless but thick. Bullets riddle it and you return fire, killing and injuring slavers.\n\n              Your cover does little to protect you, however, and a bullet strikes your foot. You press on in spite of the pain, step over the slavers' armored bodies and press forward, blood sticking to your boot. The floor is cleared in mere moments. \n\n              *goto c55\n\n            *else\n              *set Health %-25\n              You fire wildly at them, panicked by the noise and confusion. Blood soaks the floor and splatters across the statues being used as cover, and coats the walls. You take shelter behind a strange abstract piece made of twisted steel, shapeless but thick. Bullets riddle it and you return fire, killing and injuring slavers.\n\n              Your cover does little to protect you, however, and a bullet strikes your foot. You press on in spite of the pain, step over the slavers' armored bodies and press forward, blood sticking to your boot. The floor is cleared in mere moments. \n\n              *goto c55\n\n          #Sneak up the steps and hope they don't notice you\n            *set Caution %+2\n            *set Sadism %+3\n            You take slow steps up the stairs and draw the knife from your boot. The troopers all draw blades and step quietly behind you, escept those who follow Tappon up the other staircase.\n\n            The slavers are waiting in the wide, opened room of the third floor. Fallen statues become makeshift barricades where walls had been torn down in the decades since the slavers occupied Rodin. Chains lie on the floor, as does rotten food and a mess of empty bullet shells.\n\n            *if Stealth > 55\n              You move silently through the floor, hiding behind cover and timing your movements so that you remain unseen. The troopers do the same, slitting throats and slicing up chests, and hiding those bodies where they will not be seen.\n\n              \"Slit?\" calls out one of the slavers, having lost track of one of his friends. He raises his rifle and turns around, suddenly suspicious.\n\n              You put a knife in his back before he can make another move, then drag his body behind a decapitated statue.\n\n              The other slavers huddle together, realizing they are the last. This is when Tappon steps out into the light. The troopers follow, rifles raised. You step forward over the slavers' armored bodies, blood sticking to your boot. The floor is cleared in mere moments. \n\n              *goto c55\n\n            *elseif Stealth > 35\n              *set Health %-15\n              A single misstep is all it takes. Your heavy foot causes the wood beneath you to creak, and suddenly the highwaymen spot you. \n\n              *goto f2\n\n            *else\n              *set Health %-25\n              A single misstep is all it takes. Your heavy foot causes the wood beneath you to creak, and suddenly the highwaymen spot you. \n\n              *goto f2\n\n          #Convince them to surrender\n            *set Caution %+8\n            *set Sadism %-6\n            You walk up the steps alone. Nobody else is foolish enough to follow you, and you can hardly blame them. Tappon takes your arm before you make it up the staircase and asks, \"What's your endgame here?\"\n            *choice\n              #\"I tell them to leave, you let them go. They won't be Philly's problem anymore.\"\n                *set Cruelty %-10\n                *set Sadism %-8\n                *set Deception %-10\n                *set c1 1\n                *goto con2\n\n              #\"I tell them to leave, you kill them on their way out.\"\n                *set Cruelty %+10\n                *set Sadism %+8\n                *set Deception %+10\n                *label con2\n                She nods and let's go of your arm, and you climb the rest of those stairs to face your fate, hands above your head and gun holstered. \n\n                The slavers are waiting in the wide, opened room of the third floor. Fallen statues become makeshift barricades where walls had been torn down in the decades since the slavers occupied Rodin. Chains lie on the floor, as does rotten food and a mess of empty bullet shells.\n\n                \"Don't shoot!\" you shout. \"I'm here to negotiate.\"\n\n                \"You got thirty seconds before we shoot,\" calls out a voice, but you cannot see where it comes from.\n                *choice\n                  #\"You might as well surrender now and keep your lives. Leave Philly and we won't follow you.\"\n                    *if Persuasion > 55\n                      *goto per-work2\n\n                    *elseif Deception \u003c 50\n                      *goto per-work2\n\n                    *else\n                      *goto per-fail2\n\n                  #\"You can either come out willingly, or I can drag you out. If I have to exert myself, you're going to die.\"\n                    *if Persuasion > 55\n                      *goto per-work2\n\n                    *elseif Deception > 50\n                      *goto per-work2\n\n                    *elseif Villain > 1\n                      *goto per-work2\n\n                    *else\n                      *goto per-fail2\n\n                  #\"Your product has been liberated. Even if you beat us back, how long do you think you'll last with nothing to sell? Leave now and we won't chase you.\"\n                    *if Persuasion > 55\n                      *goto per-work2\n\n                    *elseif Scavenger > 0\n                      *goto per-work2\n\n                    *elseif Notoriety > 30\n                      *label per-work2\n                      There's a long silence for a while, and it's eventually broken by the slaver saying, \"Damnit, fine. Come on boys, we'll go make a profit elsewhere.\"\n\n                      The slavers emerge from cover, slowly, placing their weapons on the floor. They're a dirty bunch wearing the same rusty armor that highwaymen do, and they glare at you with hatred in their eyes.\n\n                      Their apparent leader steps forward - the man you had spoken to. His eyes burn red and his teeth are twisted and yellow. \"You should know, we were getting payments from Allen's Republic. They wanted us to mess up Philly for 'em. When it comes to war, kill a wole lotta them for me.\"\n\n                      *if c1 = 1\n                        *set Notoriety %-4\n                        To your surprise, Tappon allows the slavers to leave. The troops don't seem very happy about it, but they don't speak up. They simply keep watch over the retreating slavers as they flee south, and wonder aloud if they'll make it passed Eagle territory alive.\n\n                        *label a2\n                        From there, they empty the building of any valuable loot and douse it in gasoline. You and your army and the slaves, including Angela and her daughter Aurea, watch as Rodin burns down to the foundation.\n\n                        \"We'll help them build new lives in villages around Philly,\" says Tappon. \"In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n                        *choice\n                          #\"Yes, ma'am.\"\n                            She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                            *goto ending2\n                          #\"What's the big deal with the shipment?\"\n                            \"Don't worry about it,\" she says. \"Now get to work.\"\n                            *goto ending2\n\n                          #\"No, don't thank me or anything.\"\n                            \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                            *goto ending2\n                            *label ending2\n                            *page_break\n                            \"Wait!\" shouts a familiar feminine voice. Angela. She's followed you down the road, holding her little girl with curly hair by the hand. \"I just wanted to thank you. Aurea and I are going to be in Black Vein for a while, since they're looking for settlers. If you're ever in the area, stop by so I can repay you for everything you've done.\" She turns around, then stops and says, \"Do not trust the people of Allen. When imprisoned, I heard it said that they hired the slavers to cause trouble.\" And with that, she leaves you.\n\n                            You cannot shake the feeling that in these last few hours, you did something meaningful. When was the last time that happened? Then you realized that it has been happening a lot recently, and increasingly. How many more meaningful things will you do?\n                            *finish\n\n                      *else\n                        *set Notoriety %+9\n                        The slaves are slaugtered as soon as they step downstairs. Blood runs down the steps and bodies pile at the bottom. A few try and fight back, but they're unarmed and unable to repel bullets with mere fists.\n\n                        *goto a2\n\n                    *else\n                      *goto per-fail2\n\n                      *label per-fail2\n                      *set Notoriety %-4\n                      \"Yeah, on behalf of Rodin I'd like to thank you for the offer,\" says the voice, stilling hidden behind cover. \"Unfortunately it just isn't in our favor, and we would prefer violence.\"\n\n                      They open fire on you, forcing you to retreat back down the stairs. The gunshots fade as soon as they realize you're no longer there. The troops glare at you for wasting their element of surprise, but hold their tongues.\n\n                      \"Now we do things the right way,\" says Tappon.\n\n                      You rush up one staircase and Tappon ascends another, followed by troop. \n\n                      *goto f2\n\n          *if (Bomber > 0) #Head down to the basement and detonate the furnace\n            *set Cruelty %+2\n            *set Sadism %+6\n            *set Caution %-6\n            You and the troops work fast, streaming a trail of gasoline from the furnace all the way outside. You coat it extra thick along the stairs to make sure the flame can travel down it, then leave before the smell becomes too thick. \n\n            Standing outside of Rodin at the edge of the gas trail, Tappon smiles and drops an open lighter on the trail.\n\n            Rodin explodes in a burst of flame and smoke, firing upward them collapsing in on itself. The slaves cheer. Some of them weep with joy and curse the slavers whose bodies fall from the burning ruins.\n\n            *label o2\n            Tappon looks over the crowd of rescued slaves and smiles softly. \"We'll help them build new lives in villages around Philly. In the meantime, I've got more work for you. A supply shipment is leaving Fulfillment for Black Vein. Join the Allen crew protecting it and be ready for action.\"\n            *choice\n              #\"Yes, ma'am.\"\n                She smiles. \"We might make a soldier of you yet,\" she says. \"Now get to work.\"\n                *goto ending2\n              #\"What's the big deal with the shipment?\"\n                \"Don't worry about it,\" she says. \"Now get to work.\"\n                *goto ending2\n\n              #\"No, don't thank me or anything.\"\n                \"Thank you,\" she says with a scowl, as if you should be grateful to serve. \"Now get to work.\"\n                *goto ending2\n\n          *if (Poisoner > 0) #Head down to the basement and rig the furnace to expel toxic gas\n            *set Cruelty %+8\n            *set Sadism %+6\n            *set Deception %+4\n            Furnaces make smoke. Smoke cannot be breathed. So, you toss some gas onto the coal in the furnace and rig the vents as open as they go. Then, in a fit of pure inspiration, you link the furnace vents to those in the wall using some old tubing.\n\n            \"We should get out of here,\" says one of the troops.\n\n            You rush out of Rodin as smoke starts to pour out the windows in thick, black columns. The slaves cheer. Some of them weep with joy and curse the slavers whose screams fill the air. They die, no doubt, in a choking, fitfull panic. \n            *goto o2\n\n          *if (Mechanic > 0) #Destroy the stairs leading up to the third floor - they'll starve or surrender\n            *set Cruelty %+8\n            *set Sadism %+6\n            *set Caution %+6\n            All it takes is a few swings of an axe, and the stairs are unusable. For safe measure, the troopers tear up the wooden floors below so that any jump would end with a splintery death. Then they take up position around Rodin, just in case some of the slavers manage to escape. \n\n            Generl Tappon ensures the freed slaves that their oppressors will have a slow, painful death, and they would eventually burn the building. They seem content with this, though a few call for their heads. Either way, your job is done.\n\n            *goto o2", "9-ambush": "*set Health 100\n[i]War is an unfortunate reality of the wasteland, but one that can be overcome. The way we overcome it? Through war. Fire upon your foes so that only you survive, and there will be nobody left to battle.[/i]\n\n-Rigdal the Vile, [i]Reflections on Life, Death, and the Nonsense in Between[/i]\n\nFulfillment is the same bustling marketplace you knew not too long ago, but this time you do not meet with the queen. You stop just outside the center, before three rusty pickup trucks loaded with fresh food, water filters, and ammunition. The black and gold flag of Allen flies from the last one's cargo. Surrounding them are the familiar faces.\n\nIt's the group met at Fort Washington, the squad that acted so oddly like a family in their banter and friendliness. So odd to know that they - or their nation, at least - had been funding slavers.\n\n\"Good to see you again,\" says the boy who drank too much moonshine. He lies lazily on top of the crates, soaking in the sun. \"What brings ya?\"\n\n\"I'm joining up with you guys,\" you say.\n\n\"The more the merrier,\" says the older woman, the one who had cooked. \"We could always use more guns.\"\n\n\"Duchess! Cluney!\" shouts a voice you don't recognize. A rugged-looking man in a beret steps forward, rifle cocked. \"We're moving out now. Who is this?\"\n\n\"A contractor, Captain Horan,\" says the boy, who you decide must be Cluney. \"General Tappon hired 'em back at Fort Washington.\"\n\n\"Well, if the General says they're okay, we let 'em come. But keep an eye open,\" he says, then looks at you. \"I don't trust natives.\"\n\nWith that begins the long trek toward Black Vein.\n*page_break\nYou, Cluney, and the elder Duchess sit on the back of the second pickup, atop crates of supplies meant for Buckshot and her settlers. Captain Horan sits in the passenger seat of the first vehicle. They travel slowly across the desert, cool winds a reprieve in this heat. To pass the time, Cluney makes conversation.\n\n*if DoL > 0\n  \"I hear you and them Daughters wiped out some slavers. Wish I'd been involved with that raid. Why didn't you call on the Republic?\"\n  *fake_choice\n    #\"It's a local issue, so locals should handle it.\"\n    #\"I don't trust the Republic very much.\"\n    #\"I didn't think Tappon would want to get involved.\"\n\n  \"I can respect that, I guess,\" says Cluney. \"But we're here to help. I just hope you know that.\"\n\n  \"What was it like?\" asks Duchess with a sideways smile. \"Taking down slavers, I mean.\"\n  *goto c\n\n*else\n  \"I hear you and the General wiped out some slavers. Wish I'd gotten that assignment. What was it like?\"\n  *label c\n  *choice\n    #\"Best feeling in the world.\"\n      *set Sadism %+2\n      \"Yeah, nothing quite like killing someone who deserves it,\" says Cluney. \"Or, so I hear. I never killed no one.\"\n\n      *goto c1\n\n    #\"Not as great as seeing those slaves go free.\"\n      *set Sadism %-7\n      *set Cruelty %-8\n      \"Yeah, that sounds great,\" says Cluney. \"I wouldn't know. Never freed no slaves, never killed no one.\"\n\n      *goto c1\n\n    #\"I enjoyed watching them suffer.\"\n      *set Sadism %+7\n      *set Cruelty %+8\n      \"Yeah, nothing quite like killing someone who deserves it,\" says Cluney. \"Or, so I hear. I never killed no one.\"\n\n      *goto c1\n\n    #\"I'd be lying if I said killing ever feels good.\"\n      *set Sadism %-7\n      *set Cruelty %-8\n      \"I wouldn't know,\" says Cluney. \"I never killed no one.\"\n\n      *goto c1\n\n*label c1\n\"There's no shame in that,\" says Duchess. \"Killing's no great honor. Everyone does it.\"\n\n\"Yeah, but I'm a soldier. I gotta do it eventually. And when I do, I'll be great at it.\" Cluney smiles like a child given a treat.\n\nYou don't have the heart - or the stupidity - to tell them that their government has been hiring slavers. At best, they wouldn't believe you. At worst, they would tell their captain and he would have you killed. There's just no good reason to say something so blatantly stupid.\n\nThe forest of broken trees passes in the distance. Fort Washington is beyond it. Tappon and her army. A few days ago you were an ordinary contractor, now you're playing a strange game with militias and a shanty republic.\n\nThen a small set of ruins rises. Grey, broken, unused and unwanted. Perhaps an outpost or a shop of some kind. It has the same sort of overhang that a Wawa does, so it may be a house of worship.\n\n\"Beautiful, isn't it?\" asks Duchess.\n\n\"More like pathetic,\" spits Cluney. \"Assholes destroyed the world and left us to pickup the pieces.\"\n\nShe ignores his remarks. \"When do you suppose we'll build like they used to again?\"\n\nNobody answers. Nobody could possibly have an answer for her. \n*page_break\nThe distant slope upon which Black Vein is positioned comes into view. Still a few miles to the sign, and then to the town, but it's been an easy ride so far. That ease ends when Captain Horan shouts from the front vehicle, ordering the convoy to stop. \n\nThe world is silent and still. Nothing moves but the wind and the humming engines, and the tentative fingers wrapping around triggers. You look around. Nothing but slopes on either side and the ruins of a overpass that once crossed over this highway, now cracked and grey.\n\nGunshots shatter the silence. The sound of screeching metal fills your ears as you find cover. You look up just long enough to spot the banner of the Daughters rising above the overpass, and the warrior Artoria who you'd met at Fulfillment. \n\nAn explosion rocks the truck and sends you flying. The world goes black for a second and even the gunfire seems muted. Then your eyes open and you crawl to your knees, grab your gun, and wipe the dirt off your face. Republic soldiers take cover as Daughter warriors fire down on them. \n\nThe battle has begun. \n\nBullets hail down on the remains of the convoy, peppering crates of wood and steel. Duchess and Cluney return fire as best they can. The truck's driver already lies dead. Glass is everywhere, as is twisted metal. The world is swimming. All that remains is your choice, and the consequences you can never undo.\n*choice\n  #Help the Republic troops\n    *set rep 1\n    You raise your gun and fire on the Daughters of Liberty. The Republic troops fire too, taking cover behind the smoldering wreckage of their convoy. You join them, seeking cover, regaining your senses in the unforeseen ambush. \n\n    Captain Horan fires alongside Duchess and Cluney. \"We need to take out their leader!\" he shouts over the deafening noise of flying bullets. \n\n    You spot the Daughter officer standing on the ridge above. You recognize her as the representative from Fulfillent. Artoria.\n    *choice\n      #Sneak up the broken overpass and take her out\n        *set Caution %+3\n        *set Sadism %+2\n        *set Deception %+6\n        The direct method may be more fun, but usually involves more casualties. So, you opt for something a bit stealthier.\n\n        \"We got your back,\" says Duchess. Cluney nods. Good thing you can always rely on people to follow your lead. \"Do you want us to run in with you, or fire from cover?\"\n        *choice\n          #Have them follow you\n            *set Caution %-3\n            *set Cruelty %+1\n            \"Follow me,\" you say. \n\n            Cluney smiles and throws a victorious fist in the air. Duchess merely nods. They take position behind you, rifles raised.\n\n            You rush up the shattered slope of the overpass, asphalt treading beneath your feet, gun raised. While Cluney may be tempted to open fire at the first sight of the Daughters, he follows you silently, as does Duchess, in spite of her old bones.\n\n            Following the road, you make it up to a slope just past the overpass where you have a perfect angle to sniping warriors. \n\n            *if Stealth > 45\n              You launch a hail of bullets down from above, surprising the Daughters. Your bullets show them no mercy, even as they return fire. Thanks to Duchess and Cluney's cover fire, you're spared an immediate death. You hate to think of what would have happened if they weren't at your back.\n\n              *goto c6\n\n            *else\n              *set Health %-15\n              But you are spotted before you can fire. Bullets fly at you like a storm of lead death.\n\n              You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Duchess and Cluney's cover fire, you're spared an immediate death. You hate to think of what would have happened if they weren't at your back.\n\n              But their cover fire is not enough. A bullet skims your shoulder and a flash of crimson flies, but you grit your teeth and continue firing.\n\n              *goto c6\n\n          #Have them fire from cover\n            *set Caution %+3\n            *set Cruelty %-1\n            \"Stay here, it's safer,\" you say.\n\n            Cluney whines, but obeys, and Duchess nods. They take positions behind the wreckage of the convoy and open fire, covering your approach. Following the road, you make it up to a slope just past the overpass where you have a perfect angle to sniping warriors. \n\n            *if Stealth > 45\n              You launch a hail of bullets down from above, surprising the Daughters. Your bullets show them no mercy, even as they return fire. Thanks to Duchess and Cluney's cover fire, you're spared an immediate death. You hate to think of what would have happened if they weren't at your back.\n\n              *goto c6\n\n            *else\n              *set Health %-15\n              But you are spotted before you can fire. Bullets fly at you like a storm of lead death.\n\n              You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Duchess and Cluney's cover fire, you're spared an immediate death. You hate to think of what would have happened if they weren't at your back.\n\n              But their cover fire is not enough. A bullet skims your shoulder and a flash of crimson flies, but you grit your teeth and continue firing.\n\n              *goto c6\n              *label c6\n              Daughters scream as they fire back, their bullets peppering your rubble cover. But they have been distracted, and the Republic troops are now firing as one. Even from below, their cascade of lead is a terrible storm, and soon the Daughters are falling, one by one, beneath the weight of such painful deaths. \n\n              You watch as they fall, bleeding, yelping, suddenly less intimidating than they had seemed before. Tangles of hair and steels and noise and blood, trying to desperately to retaliate, but failing. It's almost pitiful watching them fall, try to stand, then fall again, until there is no more blood to be pumped through there limbs.\n\n              Almost.\n              *goto c3\n\n      #Run up the broken overpass guns blazing\n        *set Caution %-8\n        *set Sadism %+8\n        *set Deception %-8\n        *set Cruelty %+10\n        The direct method is always the best, or so you tell yourself before you do something stupid. \n\n        \"We got your back,\" says Duchess. Cluney nods. Good thing you can always rely on people to follow your blind stupidity. \"Do you want us to run in with you, or fire from cover?\"\n        *choice\n          #Have them follow you\n            *set Caution %-3\n            *set Cruelty %+1\n            \"Follow me,\" you say. \n\n            Cluney smiles and throws a victorious fist in the air. Duchess merely nods. They take position behind you, rifles raised.\n\n            You rush up the shattered slope of the overpass, asphalt treading beneath your feet, gun raised. As soon as they're in your sights, you fire on the Daughter warriors. Cluney and Duchess follow your lead.\n\n            *if Combat > 45\n              You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Duchess and Cluney's cover fire, you're spared an immediate death. You hate to think of what would have happened if they weren't at your back.\n\n              *goto c2\n\n            *else\n              *set Health %-15\n              You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Duchess and Cluney's cover fire, you're spared an immediate death. You hate to think of what would have happened if they weren't at your back.\n\n              But their cover fire is not enough. A bullet skims your shoulder and a flash of crimson flies, but you grit your teeth and continue firing.\n\n              *goto c2\n\n          #Have them fire from cover\n            *set Caution %+3\n            *set Cruelty %-1\n            \"Stay here, it's safer,\" you say.\n\n            Cluney whines, but obeys, and Duchess nods. They take positions behind the wreckage of the convoy and open fire, covering your approach. \n\n            You rush up the shattered slope of the overpass, asphalt treading beneath your feet, gun raised. As soon as they're in your sights, you fire on the Daughter warriors.\n\n            *label c11\n            *if Combat > 45\n              You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Duchess and Cluney's cover fire, you're spared an immediate death. You hate to think of what would have happened if they weren't at your back.\n\n              *goto c2\n\n            *else\n              *set Health %-15\n              You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Duchess and Cluney's cover fire, you're spared an immediate death. You hate to think of what would have happened if they weren't at your back.\n\n              But their cover fire is not enough. A bullet skims your shoulder and a flash of crimson flies, but you grit your teeth and continue firing.\n\n              *goto c2\n              *label c2\n              Daughters scream as they fire back, their bullets peppering your rubble cover. But they have been distracted, and the Republic troops are now firing as one. Even from below, their cascade of lead is a terrible storm, and soon the Daughters are falling, one by one, beneath the weight of such painful deaths. \n\n              You watch as they fall, bleeding, yelping, suddenly less intimidating than they had seemed before. Tangles of hair and steel and noise and blood, trying to desperately to retaliate, but failing. It's almost pitiful watching them fall, try to stand, then fall again, until there is no more blood to be pumped through there limbs.\n\n              Almost.\n              *goto c3\n\n              *label c3\n              *page_break\n              Most of the Daughters lay dead on the ruins of the overpass, in noxious puddles of blood sprinkled with bullet shells. A few still cling to life, but have either ran out of ammo or the will to fight on. \n\n              You recognize Artoria among the handful of survivors. She's propped herself up against the hull of an ancient truck, scavenged for parts long ago. She has the look of a woman who has yet to give up the strength to fight. \n\n              Captain Horan appears beside you, pistol in hand. \"You want the honors?\" he asks, pointing his pistol at her. \"Or are they mine?\"\n              *choice\n                #Execute Artoria\n                  *set Cruelty %+8\n                  *set Sadism %+6\n                  *set Caution %-7\n                  *set Deception %-6\n                  You raise your rifle to Artoria's forehead. She doesn't even flinch, just stares down the barrel and says, \"My sisters will enjoy the righteous slaughter to come, wastrel.\"\n\n                  The shot rings out, deafening. She falls back onto the asphalt, body now inert. Her eyes stare blankly up, toward nothing.\n\n                  *goto c4\n\n                #Allow Horan the honors\n                  *set Cruelty %+1\n                  *set Sadism %-2\n                  *set Caution %+7\n                  *set Deception %+3\n                  \"Enjoy,\" you say, stepping aside.\n\n                  Horan raises his pistol to Artoria's head. She doesn't even flinch, just stares down the barrel and says, \"My sisters will enjoy the righteous slaughter to come, wastrel.\"\n\n                  The shot rings out, deafening. She falls back onto the asphalt, body now inert. Her eyes stare blankly up, toward nothing.\n\n                  *goto c4\n\n                #Convince Horan to let her live\n                  *set Cruelty %-8\n                  *set Sadism %-6\n                  *set Caution %-3\n                  *set Deception %-9\n                  \"She could be valuable as a captive,\" you say, mentally preparing a long, eloquent speech about the dignity of human life or the value of intelligence from captured soldiers.\n\n                  A gunshot interrupts your thoughts. Artoria falls back onto the asphalt, now inert. Her eyes stare blankly up, toward nothing.\n\n                  \"Why did you do that?\" you demand as your hearing returns.\n\n                  \"We don't let terrorists survive just to escape again.\" \n                  *goto c4\n\n\n                  *label c4\n                  Captain Horan lights a hand-rolled cigar and places it to his lips. \"You've done us a great service today,\" he says. \"We're near enough to Black Vein that your services are no longer required. You should head into town, get some rest.\"\n\n                  You stand amid a mess of bodies, the fighting is done, so you take his advice, not quite knowing if there was a veiled threat behind his words. A terrible knot forms in your stomach. Was this the right choice?\n                  *goto allen-win\n\n                  *label allen-win\n                  *page_break\n                  The people of Black Vein are warm and inviting, and Olivia Buckshot is the kindest among them. They all swarm around her like insects, approaching you with smiles and questions. Where are the soldiers? Are the supplies missing? How many dead? Are we safe? You prepare to answer as many as possible, but Olivia speaks up first.\n\n                  \"Our friend here has had a long day,\" she declares. The all hush at the sound of her voice. The silence is almost reverent. \"They'll be joining me this evening to rest and relax. I expect you not to be pests, understand?\"\n\n                  They all mutter in agreement, then return to their homes. \n\n                  The village is in much better shape than it had been. Most of the shattered homes have been rebuilt, at least superficially, with plywood cut from the nearby forests. The fresh wood looks odd as it is unpainted and haphazardly nailed into brick and drywall, all coated in fading color. But still, it is becoming something closer to Dutch Mill, and much less like Penrose.\n\n                  Buckshot leads you back to her home, one of the smaller ones toward the center of town, where the Buzzer corpses have been mostly cleared away. She talks all the while. \"We had a little trouble getting settled here, at first. Some highwaymen showed up and we had to kill a few. Most of these folks aren't used to violence, but they know it's part and parcel in frontier life. At least no one's dead yet, but that might not last long without a resupply. That shipment was supposed to have some more ammo, and some of those soldiers were supposed to set up shop here. I don't like the idea of taking orders from army boys, but I suppose it's better than dying. I'm real sorry, I've been talking your ear off. How have you been since we last chatted?\"\n                  *choice\n                    #\"I've just been missing you.\"\n                      \"Aw, that's sweet,\" she says. \"I've missed my bug-squashing buddy too.\"\n                      *goto a1\n\n                    #\"Same shit, different day.\"\n                      \"I feel that,\" she says. \"Things get boring around here.\"\n                      *goto a1\n\n                    #\"Swell.\"\n                      \"That's good to hear,\" she says.\n                      *goto a1\n\n                    #\"These have been easily the most stressful few days of my life.\"\n                      \"I'm sorry to hear that,\" she says. \"Maybe a good night's sleep will help.\"\n                      *goto a1\n\n                      *label a1\n\n                      Buckshot's home looks better than you would have expected. The carpets are clean and the wood seems polished and the dust has been kicked off the furniture. You fall onto the couch without any hesitation and allow your eyes to rest. The adrenaline fades from your body and you suddenly find yourself dozing in and out of sleep.\n\n                      Captain Horan appears before you do finally pass out, or maybe you fell asleep and simply woke up when he arrived. He looks good for a man who just got out of a fire fight - full of energy and life, mostly clean, in a crisp uniform. \n\n                      He does not mince words. \"We ride for Fulfillment tomorrow,\" he says. \"We had a deal with their Queen thanks to her seneschal, and have been betrayed. You're going to help me sort it out.\" Not a question. Not even an order. Just another item on your list of labors.\n\n                      And all you can do is fall back onto the couch and let sleep overcome you.\n                      *goto_scene 10a-fulfillment\n\n      #Get close and try to talk her down\n        *set Cruelty %-8\n        *set Sadism %-10\n        *set Deception %-10\n        *set Caution %-6\n        \"I'll talk her down,\" you say to the Captain.\n\n        \"Sounds stupid,\" he says. \"But if it distracts her, go for it.\"\n\n        Not exactly a vote of confidence, but at least you know he won't shoot you in the back as soon as you step away. At least, you hope so.\n\n        You raise your hands in surrender and step forward, beyond the wreckage of the convoy. The Republic soldiers cease fire first, then the Daughters follow. Shouting ensues. Artoria meets your eyes and gestures for you to circle around. There's a slope to the left where the road once rose onto the overpass. You follow it, arms raised all the while. Dirt-soaked Daughters glare at you, faces painted for war. Some lie dead, others lay dying, but most are in good health and are perturbed by your stoppage of their violence.\n\n        Artoria stands tall among them, clad in the shiniest armor you'd ever seen. A red cape flows a few feet off her back. She looks positively regal.\n\n        \"You've conspired with the Republic,\" she says. \"Speak now before I have my warriors strike you down.\"\n        *choice\n          #\"Surrender and we'll let you live.\"\n            *set Cruelty %-2\n            *set Sadism %-2\n            *if Persuasion > 65\n              \"Run home to ReVivienne and come back with the rest of your army. Come back for Allen's head instead of its finger. Win the war, not the battle.\"\n\n              The warriors look around at one another, uncertainty etched into their grimaces.\n\n              So, you continue. \"You're not gettng a better deal than this, and reinforcements are already on their way. Take the offer. Live to fight another day.\"\n\n              *goto pers1\n\n            *else\n              \"That's a good deal, right?\" you ask, looking around at the warriors. They do not seem impressed by the offer.\n\n              Artoria pinches her brow and sighs loudly. \"I don't even have a response for that. Ladies, open fire.\"\n\n              *goto kill1\n\n          #\"We don't want to fight you. Not over something this petty\"\n            *set Sadism %-2\n            *if Persuasion > 65\n              \"Run home to ReVivienne and come back with the rest of your army. Come back for Allen's head instead of its finger. Win the war, not the battle.\"\n\n              The warriors look around at one another, uncertainty etched into their grimaces.\n\n              So, you continue. \"You're not gettng a better deal than this, and reinforcements are already on their way. Take the offer. Live to fight another day.\"\n\n              *goto pers1\n\n            *else\n              \"That's a good deal, right?\" you ask, looking around at the warriors. They do not seem impressed by the offer.\n\n              Artoria pinches her brow and sighs loudly. \"I don't even have a response for that. Ladies, open fire.\"\n\n              *goto kill1\n\n          #\"The best you can ask for here is a quick death.\"\n            *set Cruelty %-2\n            *if Persuasion > 75\n              \"But I'm willing to make you another deal - a better deal. Run home to ReVivienne and come back with the rest of your army. Come back for Allen's head instead of its finger. Win the war, not the battle.\"\n\n              The warriors look around at one another, uncertainty etched into their grimaces.\n\n              So, you continue. \"You're not gettng a better deal than this, and reinforcements are already on their way. Take the offer. Live to fight another day.\"\n\n              *goto pers1\n\n              *label pers1\n              Artoria scowls at you, then holsters her gun. \"You'll regret letting us live,\" she says.\n\n              She and the other Daughters file away, heading down the highway. You watch the walk away from the safety of the wrecked overpass. A twinge of pride fills your chest. You prevented a slaughter. \n\n              Then a gunshot rings you. Then another. You reach for your gun and then you see the threat. The Republic soldiers. They took advantage of the truce and attacked the Daughters. Not expecting a sudden betrayal, the warriors fall by the dozen. Soon, none remain.\n\n              Captain Horan appears beside you, smoking a hand-rolled cigar and watching the fighting. \"You've done us a great service today,\" he says. \"We're near enough to Black Vein that your services are no longer required. You should head into town, get some rest.\"\n\n              The fighting has died down now, so you take his advice, not quite knowing if there was a veiled threat behind his words. A terrible knot forms in your stomach. Was this the right choice?\n              *goto allen-win\n\n            *else\n              \"Right?\" you ask, looking around at the warriors. They do not seem impressed with your offer. \"So, if you ask nicely, I'll be willing to give you that quick death.\"\n\n              Artoria pinches her brow and sighs loudly. \"I don't even have a response for that. Ladies, open fire.\"\n\n              *goto kill1\n\n              *label kill1\n              Your saving graces are Cluney and Duchess. They open fire as the Daughter do, giving you a fighting chance. With no time to run and nowhere to hide, your only choice is to fire back.\n\n              *goto c11\n\n      *if (Bomber > 0) #Detonate the overpass with improvised explosives\n        *set Cruelty %+4\n        *set Sadism %+2\n        *set Deception %+3\n        Your time in the wastes has given you an unquestionably useful proclivity for explosives, as well as an unmitigated passion for blowing shit up. \"I'm going to need gasoline, gunpowder, and a can,\" you say, barking orders to soldiers who are not yours.\n\n        Captain Horan just barely hears you, turns to face you, and says, \"What the hell do you need that for?\"\n\n        Duchess and Cluney do not wait for you to answer. The tales they've heard of you, the stories you have shared, they know that you can be trusted. Duchess scrounges through the bullet-riddled crates of goods that were being transported. She fishes out an old tin can and a handful of gunpowder. Cluney takes a small pale and presses it against the side of the truck so that the gas trickling out of the tank spills into it.\n\n        They hand you the ingredients. You hold up the gasoline in one hand, the can of powder in the other, and say, \"Accelerant, explosive,\" which are probably not correct terms. You pour the gasoline into the can while they watch. It mixes with the gunpowder, even more when you shake it, releasing a noxious odor into the air. As a finishing touch, you coat one end of a thin rope in gas and put the other in the can - a fuse. \n\n        \"Smells like shit,\" mutters Captain Horan, covering his nose. His words are barely audible over the gunfire.\n\n        \"Smells like piping hot death,\" says Duchess. She flashes a wicked smile.\n\n        You seal the lid back over the can and devise your plan for delivering the payload.\n        *choice\n          #\"I can throw this, but someone has to shoot it once it's over the overpass.\"\n            *set Caution %+10\n            \"I'm the best shot here,\" says Duchess. She raises her rifle and smiles. \"You toss is best you can, I'll get the job done.\"\n\n            She rests the bottom of her rifle atop the edge of a truck's hood and takes aim at the overpass. You don't hesitate to chuck the can as far and as hard as you can. It sails through the air and your heart nearly stalls as it flies. You can even see some of the gasoline escape its shell.\n\n            Then a gunshot deafens you. An explosion tears across the overpass. Bodies fly wildly, splaying their limbs like rag dolls, until they hit the ground with a terrible splatter. The flames arch high for a moment, then retreat back to the ground where smoke columns rise in their stead.\n\n            The world is silent for a moment as everything settles, then Captain Horan shouts, \"Troopers, move in!\"\n\n            The soldiers move swiftly, running toward what remains of the overpass.\n\n            Blackened figures rise from the ashes, then are forced to their knees by the rage of the Republic troops. Shouting ensues but no shooting. Abject surrender. \n            *goto bomb-end\n\n          #\"Someone has to carry it up the overpass and light the fuse.\"\n            *set Caution %+4\n            *set Sadism %+6\n            *set Cruelty %+4\n            *set Deception %+8\n            \"I got it,\" says Cluney, taking the can from you. He suddenly looks so young. \n\n            \"No, I'm not letting one of my soldiers become a damn suicide bomber,\" says Captain Horan. \n\n            \"Captain, I said I got this,\" says Cluney.\n\n            \"Light the fuse and get the hell out of there,\" you say, passing it to him.\n\n            \"And come back to us alive,\" says Horan, smiling softly. \"That's an order.\"\n            *page_break\n            An explosion tears across the overpass. Bodies fly wildly, splaying their limbs like rag dolls, until they hit the ground with a terrible splatter. The flames arch high for a moment, then retreat back to the ground where smoke columns rise in their stead.\n\n            The world is silent for a moment as everything settles, then Captain Horan shouts, \"Troopers, move in!\"\n\n            The soldiers move swiftly, running toward what remains of the overpass.\n\n            Blackened figures rise from the ashes, then are forced to their knees by the rage of the Republic troops. Shouting ensues but no shooting. Abject surrender. \n\n            Cluney stands at the center of the flaming rubble, hair standing straight and singed slightly. His mouth is wide with a mad smile. \"Holy shit, that was incredible.\"\n            *goto bomb-end\n            *label bomb-end\n            *set Notoriety %+10\n            *goto c3\n\n          #\"I'm going to carry it up there and blow the whole thing down.\"\n            *set Caution %-4\n            *set Sadism %-6\n            *set Cruelty %-4\n            *set Deception %-8\n            \"Good luck, soldier,\" says Horan, sketching a brief salute. There's an unmistakeable look of admiration in his eyes.\n\n            You rush along the side of the road, crouching behind rubble, sneaking past cars, holding the can gingerly as not to spill its contents. \n\n            *if Stealth > 45\n              Thanks to your experience in all things sneaky, you're able to get close to the Daughter encampment without being noticed. You scurry close to their overpass base under the cover of deafening gunfire, then place the can at the edge where a few ruined cars serve as cover. You light the fuse with a hiss and run just as quickly as your legs can carry you.\n\n              An explosion tears across the overpass. Bodies fly wildly, splaying their limbs like rag dolls, until they hit the ground with a terrible splatter. The flames arch high for a moment, then retreat back to the ground where smoke columns rise in their stead.\n\n              The world is silent for a moment as everything settles, then Captain Horan shouts, \"Troopers, move in!\"\n\n              The soldiers move swiftly, running toward what remains of the overpass.\n\n              Blackened figures rise from the ashes, then are forced to their knees by the rage of the Republic troops. Shouting ensues but no shooting. Abject surrender. \n              *goto bomb-end\n\n            *else\n              *set Health %-95\n              But then you're spotted. Someone shouts. Bullets riddle the asphalt around you. In a fit of confusion and fear, you light the fuse with a hiss and toss it with all your might, and turn to run away.\n\n              But you aren't fast enough. An explosion tears across the overpass. Bodies fly wildly, splaying their limbs like rag dolls, until they hit the ground with a terrible splatter. The flames arch high for a moment, then retreat back to the ground where smoke columns rise in their stead.\n\n              You fly with them, carried through the air by the very edge of the explosive blast. The wind whistles in your ear and you slip out of consciousness. Then, you're awake again, just in time to hit the pavement.\n\n              Pain overcomes you as it shatters across you back. All you can do is watch the flames dance along the overpass. The world is silent for a moment as everything settles, then Captain Horan shouts, \"Troopers, move in!\"\n\n              The soldiers move swiftly, running toward what remains of the overpass. A hand reaches out and pulls you back up. Duchess. \n\n              Blackened figures rise from the ashes, then are forced to their knees by the rage of the Republic troops. Shouting ensues but no shooting. Abject surrender. \n              *goto bomb-end\n\n      *if (Mechanic > 0) #Repair a truck and run over the enemy\n        *set Cruelty %+2\n        *set Sadism %+4\n        *set Caution %-3\n        \"Help me fix this shit,\" you say as you toss open the hood of the truck you're taking cover behind. Several parts are riddled with bullets. Using your limited knowledge of cars, you rip out the pieces that look broken and drop them beside you.\n\n        \"What the hell are you doing to my truck?\" demands Horan, growing red in the face. \n\n        \"Fixing it.\" You look to Duchess and Cluney. \"Gut the other trucks and find parts that look like these, then bring them back.\"\n\n        Duchess picks up a stray spark plug. \"I saw one of these in the cargo.\" And she begins her search.\n\n        \"We aren't retreating,\" Horan snaps. There's a lull in the gunfire, then it returns as deafening as ever. \n\n        \"I know. We're running people over.\" There's a glimmer in his eye. Perhaps it's respect - for you cleverness, if nothing else. \n        *page_break\n        You sit where the Republic driver once had, in a seat soaked with blood. The stench of rust and gasoline soothes you as milk does a baby. Duchess and Cluney stand in the cargo, rifles at the ready. \"Remember,\" says Horan over the hailstorm of gunfire. \"Keep your foot on the pedal and don't let up. If you feel something under your tires, you're on the right path.\"\n\n        \"Got it,\" you say. Then you put the truck into gear and steel yourself. \n\n        It's been a while since you had the oppurtunity to drive and at first the steering wheel seems oddly sturdy and the gears seem to stick. Then you acclimate and become reacquianted with the skill, allowing your muscles to pulse with memory.\n\n        You pull slowly along the side of the road and wind whistles through the broken windows in fat, thick gusts. In the rearview mirror, you watch Duchess and Cluney take potshots at enemies on the overpass who have yet to notice the moinb truck.\n\n        With as much dexterity as you can muster, you turn the car onto the road that turns into the overpass. The Daughters have noticed you now. Their bullets pepper the hood of the truck. You hold yourself below the dashboard and press your foot onto the pedal until it cannot go down any farther.\n\n        You do not see what happens next, head kept safely below the dashboard, but you hear the twisted screams of dying warriors and feel the hike of the truck over each body.\n        *goto c3\n\n  #Help the Daughter warriors\n    *set dau 1\n    You raise your gun and fire on the Republic soldiers. The look of shock and hate on Cluney's face is something you'll never forget. It is easy, in the chaos of the moment, for you to slip out of yourself and pretend that this is not a betrayal, but in your heart you know that the boy looked up to you.\n\n    You do not manage to kill any of the soldiers and most of them are not even aware that you're shooting at them. As quickly as your legs will allow, you run toward the overpass where the Daughters open fire. At the back of your head, an aching worry prods you: what if the Daughters attack you on sight?\n\n    Luckily, they do not. By virtue of a series of misfires or Artoria recognizing you, the overpass is open to you.\n\n    Artoria stands confidently among ancient, ruined automobiles and watches as her warriors fire down on the foe. Her armor is shinier than any you'd ever seen and her expression is one of arrogant victory. A red cape flows a few feet off her back. She looks positively regal. \"Sorry about that,\" she says over the sound of gunfire. \"We didn't have much time to make sure you were safe, sorry about that. Apparently the Queen of Fulfillment's been swayed to ally with the Republic, hence the supply train to Black Vein.\"\n\n    \"So what's the plan?\" you ask.\n\n    \"Kill these assholes, take Black Vein, and bring Queen Echo back into the fold,\" she says, as if the answer should be obvious. \"ReVivienne doesn't want these Republicans interfering with Philly any longer than we can help it. So, what do you know about the soldiers down there?\"\n    *choice\n      #\"They're pathetic.\"\n        *set Cruelty %+3\n        \"I'd expect nothing less.\" She glances over the edge of the overpass, notices the man in the beret. \"He's the captain, no? How do you wanna take him out?\"\n        *goto b1\n\n      #\"They're dangerous.\"\n        *set Caution %+3\n        \"I very much doubt that. At least, they shouldn't be dangerous to us Daughters.\" She glances over the edge of the overpass, notices the man in the beret. \"He's the captain, no? How do you wanna take him out?\"\n        *goto b1\n\n      #\"They're friendly.\"\n        *set Sadism %-3\n        \"That sounds about right. The weak usually are.\" She glances over the edge of the overpass, notices the man in the beret. \"He's their commanding officer, no? How do you wanna take him out?\"\n        *goto b1\n\n        *label b1\n        *choice\n          #Break their cover, slaughter them swiftly\n            *set Caution %-8\n            *set Sadism %+8\n            *set Deception %-8\n            *set Cruelty %+10\n            The direct method is always the best, or so you tell yourself before you do something stupid. \n\n            \"I've got your back,\" says Artoria, raising her rifle. You can always count on someone to eagerly follow your blinding stupidity. \"Do you want us to run in with you, or fire from cover?\"\n            *choice\n              #Have them follow you\n                *set Caution %-3\n                *set Cruelty %+1\n                \"Follow me,\" you say. \n\n                Artoria smiles and nods, raises her rifle and steps into line behind you.\n\n                You down up the shattered slope of the overpass, asphalt treading beneath your feet, gun raised. As soon as they're in your sights, you fire on the Republic soldiers, with Artoria following your lead.\n\n                *if Combat > 45\n                  You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Artoria's cover fire, you're spared an immediate death. You hate to think of what would have happened if she wasn't at your back.\n\n                  *goto b2\n\n                *else\n                  *set Health %-15\n                  You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Artoria's cover fire, you're spared an immediate death. You hate to think of what would have happened if she wasn't at your back.\n\n                  But her cover fire is not enough. A bullet skims your shoulder and a flash of crimson flies, but you grit your teeth and continue firing.\n\n                  *goto b2\n\n              #Have them fire from cover\n                *set Caution %+3\n                *set Cruelty %-1\n                \"Stay here, it's safer,\" you say.\n\n                Artoria rolls her eyes but accepts this, and takes position behind a barricade of concrete along the edge of the overpass.\n\n                You rush up the shattered slope of the overpass, asphalt treading beneath your feet, gun raised. As soon as they're in your sights, you fire on the Daughter warriors.\n\n                *label kill3\n                *if Combat > 45\n                  You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Artoria's cover fire, you're spared an immediate death. You hate to think of what would have happened if she wasn't at your back.\n\n                  *goto b2\n\n                *else\n                  *set Health %-15\n                  You launch a hail of bullets as you roll to cover behind a slab of rubble. Thanks to Artoria's cover fire, you're spared an immediate death. You hate to think of what would have happened if she wasn't at your back.\n\n                  But her cover fire is not enough. A bullet skims your shoulder and a flash of crimson flies, but you grit your teeth and continue firing.\n\n                  *goto b2\n                  *label b2\n                  The Republic's soldiers scream as they fire back, their bullets peppering your rubble cover. But they have been distracted, and the Daughters warriors are now firing as one. Firing from above, their cascade of lead is a terrible storm, and soon the troopers are falling, one by one, beneath the weight of such painful deaths. \n\n                  You watch as they fall, bleeding, yelping, suddenly less intimidating than they had seemed before. Tangles of hair and steel and noise and blood, trying to desperately to retaliate, but failing. It's almost pitiful watching them fall, try to stand, then fall again, until there is no more blood to be pumped through there limbs.\n\n                  Almost.\n                  *goto b3\n\n                  *label b3\n                  *page_break\n                  Most of the soldiers lay dead beneath the ruins of the overpass, in noxious puddles of blood sprinkled with bullet shells. A few still cling to life, but have either ran out of ammo or the will to fight on. \n\n                  Cluney and Duchess are dead, gone pale, drenched in blood, and it's all you can do not to stare at them. So you look to Horan, who's somehow still alive. He's propped himself up against the hull of an ancient truck, scavenged for parts long ago. He has the look of a man who has yet to give up the strength to fight. \n\n                  Artoria appears beside you, pistol in hand. \"You want the honors?\" she asks, pointing her pistol at her. \"Or are they mine?\"\n                  *choice\n                    #Execute Horan\n                      *set Cruelty %+8\n                      *set Sadism %+6\n                      *set Caution %-7\n                      *set Deception %-6\n                      You raise your rifle to Horan's forehead. He doesn't even flinch, just stares down the barrel and says, \"My General will enjoy the righteous slaughter to come, wastrel.\"\n\n                      The shot rings out, deafening. He falls back onto the asphalt, body now inert. His eyes stare blankly up, toward nothing.\n\n                      *goto b4\n\n                    #Allow Artoria the honors\n                      *set Cruelty %+1\n                      *set Sadism %-2\n                      *set Caution %+7\n                      *set Deception %+3\n                      \"Enjoy,\" you say, stepping aside.\n\n                      Artoria raises the pistol to Horan's head. He doesn't even flinch, just stares down the barrel and says, \"My General will enjoy the righteous slaughter to come, wastrel.\"\n\n                      The shot rings out, deafening. He falls back onto the asphalt, body now inert. His eyes stare blankly up, toward nothing.\n\n                      *goto b4\n\n                    #Convince Artoria to let him live\n                      *set Cruelty %-8\n                      *set Sadism %-6\n                      *set Caution %-3\n                      *set Deception %-9\n                      \"He could be valuable as a captive,\" you say, mentally preparing a long, eloquent speech about the dignity of human life or the value of intelligence from captured soldiers.\n\n                      A gunshot interrupts your thoughts. Horan falls back onto the asphalt, now inert. His eyes stare blankly up, toward nothing.\n\n                      \"Why did you do that?\" you demand as your hearing returns.\n\n                      \"We don't let invaders just to escape again.\" \n\n                      *goto b4\n\n\n                      *label b4\n                      Artoria watches over the bodies as they are carried away to be looted and burned. \"You've done us a great service today,\" she says. \"But we aren't done yet. Now we need to take Black Vein. Say, wasn't that your job in the first place?\"\n\n                      You stand amid a mess of bodies, the fighting is done, so you take his advice, not quite knowing if there was a veiled threat behind her words. A terrible knot forms in your stomach. Was this the right choice?\n                      *goto dal-win\n\n                      *label dal-win\n                      *page_break\n                      The people of Black Vein cower before your arrival. Artoria leads the way, stepping into the center of the town with her rifle raised. Her Daughters flow like locusts out from behind her, aiming at the terrified masses as they cower. Olivia Buckshot stands at their head. Her expression is oddly soft. You expected something more hateful.\n\n                      \"People of Black Vein, you are squatting on land claimed by the Daughters of Liberty and those under our protection,\" proclaims Artoria, loudly enough for the villagers to hear. \"By the power of the Trading Triangle, I command you to vacate this land.\"\n\n                      \"Look,\" starts Buckshot, stepping forward. She may not have any official power, but the people look to her to lead. You can see the awe in their eyes, and the fear. \"We're just trying to make it in the wastes like everyone else. We're settlers, plain and simple. You want us to fly your flag, fine. But we left Allen's Republic for a reason. Don't send us back.\"\n\n                      Artoria crinkles her nose and says, \"Very well. We are not a cruel people. My warriors will take up position here for the time being, but be warned. When our settlers arrive to make this land their home, any violence against them will be met with violence of our own.\n\n                      \"Of course. We would love nothing more than to live under your protection,\" says Buckshot. She looks to you. \"And you, it's been a while. Come on, you're sleeping at my place.\"\n\n                      The crowd disperses into a mess of murmurs. Artoria and her Daughters disappear to the edge of town, presumably to make camp. This seems a little too easy for your liking, so you keep your guard up. But the villagers seem mostly fine with this change. Maybe they really are just trying to get out of the Republic.\n\n                      The village is in much better shape than it had been. Most of the shattered homes have been rebuilt, at least superficially, with plywood cut from the nearby forests. The fresh wood looks odd as it is unpainted and haphazardly nailed into brick and drywall, all coated in fading color. But still, it is becoming something closer to Dutch Mill, and much less like Penrose. As you near the center of the town, you spot someone taking down Allen's flag.\n\n                      Buckshot leads you back to her home, one of the smaller ones toward the center of town, where the Buzzer corpses have been mostly cleared away. She talks all the while. \"We had a little trouble getting settled here, at first. Some highwaymen showed up and we had to kill a few. Most of these folks aren't used to violence, but they know it's part and parcel in frontier life. At least no one's dead yet, but that might not last long without a resupply. That shipment was supposed to have some more ammo, and some of those soldiers were supposed to set up shop here. I guess the Daughters will do just as well. Truthfully, I hate taking orders, but these people are just trying to live their lives, so I'll deal with it. I'm real sorry, I've been talking your ear off. How have you been since we last chatted?\"\n                      *choice\n                        #\"I've just been missing you.\"\n                          \"Aw, that's sweet,\" she says. \"I've missed my bug-squashing buddy too.\"\n                          *goto a2\n\n                        #\"Same shit, different day.\"\n                          \"I feel that,\" she says. \"Things get boring around here.\"\n                          *goto a2\n\n                        #\"Swell.\"\n                          \"That's good to hear,\" she says.\n                          *goto a2\n\n                        #\"These have been easily the most stressful few days of my life.\"\n                          \"I'm sorry to hear that,\" she says. \"Maybe a good night's sleep will help.\"\n                          *goto a2\n\n                          *label a2\n\n                          Buckshot's home looks better than you would have expected. The carpets are clean and the wood seems polished and the dust has been kicked off the furniture. You fall onto the couch without any hesitation and allow your eyes to rest. The adrenaline fades from your body and you suddenly find yourself dozing in and out of sleep.\n\n                          Artoria appears before you do finally pass out, or maybe you fell asleep and simply woke up when he arrived. She looks good for a woman who just got out of a fire fight - full of energy and life, mostly clean, armor recently shined.\n\n                          She does not mince words. \"We ride for Fulfillment tomorrow,\" she says. \"The Queen has betrayed the Trading Triangle, thanks to her seneschal, no doubt, and now we must rectify this.\" Not a question. Not even an order. Just another item on your list of labors.\n\n                          And all you can do is fall back onto the couch and let sleep overcome you.\n                          *goto_scene 10b-fulfillment\n\n          #Stay in this position and wear them down\n            *set Caution %+8\n            *set Deception %+8\n            \"We have the high ground,\" you say. \"They don't stand a chance.\"\n\n            \"I don't like to underestimate someone's power, but you have a point,\" says Artoria. \"Find a position, start shooting.\"\n\n            You take up position at the edge of the overpass, beside a small wall of concrete that once kept cars from crashing off the side. An armored Daughter stands on either side of you, firing on the Republic troops below. You join the chorus of death with each pull of your trigger. The gun pushes back as it propels lead forward with deafening cracks.\n\n            Your cover is good enough to prevent any stray bullets from striking you as you fire down on the troops. One by one, bit by bit, they fall. Your ears ring as bullets fire for the better part of an hour as you and the Daughters weed out the enemy. They hide behind the ruins of their convoy, only daring to fire back during a lull in the noise.\n\n            You watch as they fall, bleeding, yelping, suddenly less intimidating than they had seemed before. Tangles of hair and steel and noise and blood, trying to desperately to retaliate, but failing. It's almost pitiful watching them fall, try to stand, then fall again, until there is no more blood to be pumped through there limbs.\n\n            *if Stealth > 35\n              Soon, the chorus of death comes to an end. A few orders are shouted and, daring to look down, you see that most of the soldiers you'd fought are now corpses, lifeless and inert. \n\n              *goto b3\n\n            *else\n              *set Health %-25\n              A bullet strikes the side of your face. You fly backward, recoiling in sharp pain, as crimson flashes before your eyes. You lay still for a moment, then dare to raise a hand to your face. Just a flesh wound, albeit a painful one. You clench your ja
