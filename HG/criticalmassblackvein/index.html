to deadrat1\n\n          #Snipe from the top of the stairs\n            *set Caution %+4\n            *set Cruelty %+6\n            Like a coward, you let the child and your host go first into the darkness below. After all, you don't know what sort of infections a rat bite could lead to, and you certainly don't want to risk that.\n\n            You fire from such safety that your skill hardly matters, and the rats never get close to biting you. Soon  the entire basement smells of dead rat. Their blood runs thickly along their furry hides. A few cling to life, squeaking oddly until they find their place under your boot.\n            *goto deadrat1\n\n      #Trap them\n        *set Sadism %-9\n        *set Caution %+7\n        *set Cruelty %-5\n        \"Trapping's probably more humane,\" you say.\n\n        Then Dwide takes a knee in front of the boy and says, \"Now, you know as well as I do that killin' is wrong, right?\"\n\n        The boy nods, so he continues. \n\n        \"But sometimes, in this wasted land, killing is what we have to do. So, when we're finished with those rats downstairs, I want you to head upstairs and say a prayer to the Lord, alright?\"\n\n        \"Yes, sir,\" says the boy, with a smile. \n\n        You don't recall anyone ever expressing such a reaction to the prospect of killing, but this is a strange community. \n        *page_break\n        It takes a while to set all the traps. They're like regular old rat traps, but much bigger. You have to be careful when rigging them - one wrong move and you lose a finger.\n\n        Dwide swings the door open and casts his candle into the darkness, shedding warm, orange light over the basement below. At first, you don't see the rats. There are logs and tools and even a few pieces of furniture scattered throughout the basement, with large animal pelts mixed among them. Then the pelts begin to move, and you wish you'd taken your chances with the Furies.\n\n        These rats, if you can call them that, are twisted mutants with deep green eyes and patchy fur. Each one is easily the size of a small dog. They hiss rabidly with their sharp teeth jutting out, balking at the sudden presence of light. The largest of the rodents are also the ugliest. Much like the furies they have vestigial limbs and extra facial features wrought by the curse of radiation.\n\n        There are probably a dozen rats in total, but they haven't noticed you yet. You clutch the rat traps and look down into the darkness, and that's when you realize that someone has to go down there.\n        *choice\n          #Let Dwide set the traps\n            *set Caution %+7\n            *set Sadism %-9\n            *set Cruelty %-7\n            You watch from the top of the steps while Dwide sets the traps. Then he baits them with slices of fresh fruit, earning the angry squeaks of the rats. They hiss at him and leap up, trying to get the fruit from between his fingers.\n\n            He tosses a few pieces toward the back of the cellar to distract them while he continues baiting undisturbed. The masses of fur rush over one another, biting and clawing at anything in their way in pursuit of the sweet-smelling meal.\n\n            A few moments later, a dozen traps were set and Dwide was back up the stairs, sweating. He glares at you like the coward you are, but frankly, you aren't sure you would have gotten out of there so easily. \n\n            Then the first rat falls into the trap. A sharp metal clang followed by the pained squeaking of a dying rat. Then another. Then another. Soon the entire basement smells of dead rat. Their blood runs thickly along their furry hides. A few cling to life, squeaking oddly until they find their place under your boot.\n            *goto deadrat1\n\n          #Set the traps yourself\n            *set Caution %-7\n            *set Sadism %+9\n            *set Cruelty %+7\n            You rush down the steps and fumble over the rat traps, trying to set them before they notice the smell of the fresh fruit Dwide had given you as bait. You'd barely set half the traps before they noticed it.\n\n            *if Stealth > 65\n              The rats turn to you and lift their noses thoughtfully. Before they swarm, you lift the little sack of freshly cut fruits. Apples mostly, maybe some pears. Their green eyes follow your hand as you lift an apple slice. You move it from side to side, noting how quickly they turn their gaze. Then, you toss it clear over their masses of fur. They rush over one another, biting and clawing at anything in their way in pursuit of the sweet-smelling meal.\n\n              A few moments later, you'd set all the traps and made it back up the stairs. The little boy looks up at you as if you're some kind of hero for setting a few rat traps. \n\n              Then the first rat falls into the trap. A sharp metal clang followed by the pained squeaking of a dying rat. Then another. Then another. Soon the entire basement smells of dead rat. Their blood runs thickly along their furry hides. A few cling to life, squeaking oddly until they find their place under your boot.\n              *goto deadrat1\n\n            *else\n              The rats turn to you and lift their noses thoughtfully. Before they get the chance to swarm, you rush back up the stairs, abandoning the traps you hadn't set and the sack of fruit meant to serve as bait.\n\n              Dwide glares at you but doesn't say a word as he draws his rifle. A few deafening shots kill the largest of the rats. The rest make a rush for the stairs, but the few traps you'd set were enough to stop them. A sharp metal clang followed by the pained squeaking of a dying rat. Then another. Then another. Soon the entire basement smells of dead rat. Their blood runs thickly along their furry hides. A few cling to life, squeaking oddly until they find their place under your boot.\n              *goto deadrat1\n\n      #Lure them outside\n        *set Caution %+5\n        *set Sadism %-9\n        *set Deception %-7\n        *set Cruelty %-10\n        \"Luring them out of the village will make it easier to clean up,\" you say, earning a smile from Miriam.\n\n        \"Plus then the Furies'll get to eat,\" says the boy.\n\n        Then Dwide takes a knee in front of the boy and says, \"Now, you know as well as I do that killin' is wrong, right? And we might not be killing them ourselves, but we're makin' it so they die anyway.\"\n\n        The boy nods, so he continues. \n\n        \"But sometimes, in this wasted land, killing is what we have to do. So, when we're finished with those rats downstairs, I want you to head upstairs and say a prayer to the Lord, alright?\"\n\n        \"Yes, sir,\" says the boy, with a smile. \n\n        You don't recall anyone ever expressing such a reaction to the prospect of killing, but this is a strange community. \n        *page_break\n        Miriam leads you to the kitchen. No stove, no refrigerator, not even a microwave. Even wastelanders get some kind of steam-cooker or hot plate working, but these people just don't care about technology.\n\n        She rummages around in the cupboard and asks, \"What should we use as bait? I've got fruit. Oh, there's some cheese, that's a classic, right? And some salted meat, but I don't know if rats eat meat.\"\n        *choice\n          #Fruit\n            It seems like an oddly irrelevant choice, so you just go with fruit. \n\n            You all spend the next hour or so lining up the slices of apples and pears along the path leading toward the town's gates. You take a few bites just to make sure the fruit's not gone bad, and it because it smells delicious. \n\n            The trail of fruit leads all the way to the village gate. Then the furry mass of rats emerges from the basement, slowly working their way through the town, squeaking and gnawing on their newfound snacks in a strange parade.\n\n            The other villagers watch as the rats make their way out of the village. When the final one has made it back out into the wasteland, Dwide slams the gate shut.\n\n            They would certainly be slaughtered by the Furies when night comes. \n            *goto deadrat1\n\n          #Cheese\n            It seems like an oddly irrelevant choice, so you just go with cheese. \n\n            You all spend the next hour or so lining up the slices of yellow cheese along the path leading toward the town's gates. You take a few bites just to make sure the cheese's not gone bad, and it because it smells delicious. \n\n            The trail leads all the way to the village gate. Then the furry mass of rats emerges from the basement, slowly working their way through the town, squeaking and gnawing on their newfound snacks in a strange parade.\n\n            The other villagers watch as the rats make their way out of the village. When the final one has made it back out into the wasteland, Dwide slams the gate shut.\n\n            They would certainly be slaughtered by the Furies when night comes. \n            *goto deadrat1\n\n          #Meat\n            It seems like an oddly irrelevant choice, so you just go with meat. \n\n            You all spend the next hour or so lining up the slices of salted, uncooked meat along the path leading toward the town's gates. You wish you could take a few bites, but sadly it hasn't been cooked, so you just line it up.\n\n            The trail leads all the way to the village gate. Then the furry mass of rats emerges from the basement, slowly working their way through the town, squeaking and gnawing on their newfound snacks in a strange parade.\n\n            The other villagers watch as the rats make their way out of the village. When the final one has made it back out into the wasteland, Dwide slams the gate shut.\n\n            They would certainly be slaughtered by the Furies when night comes. \n            *goto deadrat1\n\n  *hide_reuse #\"Let's find the gun.\"\n    *set dutch +1\n    You and Dwide meet the boy Gideon by the well. He seems to be moping, with a frown on his face, and puffy red cheeks, and wet eyes. \n\n    \"Why you been cryin' boy?\" asks Dwide, taking a knee in front of the kid.\n\n    Gideon looks to the ground and twists his foot bashfully.\n\n    \"Look a person in the eye when they talk to you,\" says Dwide. \"Now go on, what's botherin' you.\"\n\n    He looks up and his elder and says, \"I don't want my Pa to shun me, but I can't find his ole pistol. I was just playin' round with it, didn't mean to get it lost.\"\n\n    Dwide just snickers. \"Gideon, your Pa ain't gonna shun you over something so little. Now, if you stole his gun that'd be one thing, but losing it? Did he tell you that he's asked me to help ya out and find it?\"\n\n    \"No,\" the boy confesses, letting smile sneak passed his frown. \"I didn't know Pa knew any outsiders.\"\n\n    \"Well that's just my friend,\" says Dwide. \"Don't worry about them, they're gonna help us find the rifle. Now, why don't we retrace your steps. Where did you go the day you lost it?\"\n\n    \"Well, I fed the chickens in the mornin', then I went to the well to fetch water, then I helped Silo Abram move some grain, and then I helped Nana make supper.\"\n\n    \"And is it safe to assume the gun ain't down the well?\"\n\n    Gideon shakes his head and says, \"No sir.\"\n\n    \"Then we got ourselves three options,\" he says. Then he turns to you. \"Where should we start?\"\n    *label gunfind1\n    *choice\n      *hide_reuse #\"The chicken coop.\"\n        *set gun +1\n        Gideon brings you and Dwide back to his house, a simple one-story home with a lot of windows, and a wide porch. \"The coop's out back,\" he tells you, leading the way.\n\n        You aren't sure what to exect since you've never seen a chicken before, but this surely isn't it. \n\n        The coop is a large cage, spiked on the inside and outside and nearly the size of the house before it. Inside it is a great feathered beast, grey and white, almost as tall as Gideon, with a long red sack of flesh on top of its head and a massive beak - the sort that would make a good sword. It clucks and makes odd, guttural noises as you approach, but doesn't seem frightened despite being caged. Its eyes are so wide apart that it has to turn its head to look at you.\n\n        Dwide sighs. \"I hate dealin' with these things. Give me the creeps.\"\n\n        \"Why?\" asks Gideon. \"It's like a big puppy, but lays eggs and has feathers.\"\n\n        \"If you say so,\" he says. \"Who's going inside to look for the pistol?\"\n        *choice\n          #\"You should do it.\"\n            *set Deception %+3\n            *set Caution %+3\n            *set Cruelty %+3\n            Dwide shrugs and says, \"If you think so.\"\n\n            Gideon unlocks the gate for Dwide and he steps into the coop. He looks like a warrior in an arena, but the other challenger is a giant mutant chicken. \n\n            He holds up a hand, keeping the curious chicken at bay. You hold fast to your gun just in case it's needed, but Dwide steps carefully and walks a circle around the perimeter of the fencing. \"Hush now,\" he says as the chicken clucks and twists its head.\n\n            \"Do ya see it?\" asks Gideon.\n\n            \"Nope, I'm coming back out,\" he says. He leaves the chicken behind with disappointingly little action and locks the cage behind him. \"Guess we'll need to check someplace else.\"\n            *goto gunfind1\n\n          #\"Gideon lost it, he should find it.\"\n            *set Deception %+6\n            *set Caution %+3\n            *set Cruelty %+6\n            \"No problem,\" says Gideon. He unlocks the gate and steps inside the coop, looking like a tiny warrior in an arena, about to face off with a giant mutant chicken.\n\n            He holds up a hand, keeping the curious chicken at bay. You hold fast to your gun just in case it's needed, but Dwide steps carefully and walks a circle around the perimeter of the fencing. \"Hush now,\" he says as the chicken clucks and twists its head.\n\n            \"Do ya see it?\" asks Dwide.\n\n            \"No sir,\" he says. \"I'm comin' back out.\" He leaves the chicken behind with disappointingly little action and locks the cage behind him. \n\n            \"Guess we need to look someplace else.\"\n            *goto gunfind1\n\n          #\"I'll do it.\"\n            *set Deception %-6\n            *set Caution %-3\n            *set Cruelty %-6\n            Gideon unlocks the gate and you step into the coop, feeling like a warriors in an arena, about to face off with a giant mutant chicken.\n\n            You hold up a hand, keeping the curious beast at bay, holding fast to your gun just in case it's needed.\n\n            \"You kill that chicken, you're in big trouble,\" says Dwide. \"I don't walk into your house and burn all your food.\"\n\n            Luckily the chicken is just curious. It clucks and twists its head as you walk around the length of the perimeter, glancing down at the dusty ground to see if the missing pistol is there. But it's not.\n\n            \"Do ya see it?\" asks Dwide.\n\n            \"Nope, I'm coming back out.\"\n\n            You leave the chicken behind with disappointly little action and watch as Gideon locks the cage behind you.\n\n            \"Guess we need to look someplace else,\" says Dwide.\n            *goto gunfind1\n\n      *hide_reuse #\"The grain silo.\"\n        *set gun +1\n        Abram's silo is a large cylinder as wide as a home, with a rounded top and a set of wooden steps wrapped around its side. You'd seen grain siloes in the wasteland before, but they're mostly abandoned or being used as bases for highwaymen. Good places to snipe unsuspecting wastelanders. This one, however, has not decayed in the absence of civilization and even smells like freshly cut wheat - a sweet, somewhat oaky smell that reminds you of stale beer. \n\n        Silo Abram is an old man with wrinkled, leathery skin and a straw hat, unlike the black top hats that the rest of the Dutch wear. He rests on a rocking chair at the edge of his property, the silo rising behind his home and casting a deep, cool, shadow that soothes your sweaty skin.\n\n        \"Gideon, Dwide,\" says Silo Abram, tilting his hat. He doesn't acknolwedge you. \"What can I do ya for?\"\n\n        \"Lil Gideon here lost his Pa's gun,\" Dwide explains. \"We were hoping you'd seen it.\"\n\n        \"Sorry Dwide, I haven't. I'd be happy to let you take a look around, but you can't bring the outsider with you.\"\n\n        \"And why's that?\" you ask.\n\n        He looks at you, then to Gideon. \"Gideon, be a good lad and tell the outsider that I don't like 'em, and that they shouldn't be here.\"\n\n        Gideon looks to you and opens his mouth, but Dwide interrupts him. \"Silo Abram, surely you see how silly yer bein'. This outsider just wants to help us out.\"\n\n        Silo Abram chuckles and says, \"Okay, outsider, what help are you providin'?\"\n        *choice\n          #\"I just want to help a little boy do right by his father.\"\n            *set Deception %-4\n            \"Well, I guess I can't argue with that,\" he says. \"Fine. Go look around, but I ain't seen it.\"\n\n            \"Thanks very much, sir,\" says Gideon with a smile.\n            *goto c6\n\n          #\"I owe Dwide for saving my life, and I intend to pay that debt.\"\n            *set Deception %-4\n            \"Well, I guess I can't argue with that,\" he says. \"Fine. Go look around, but I ain't seen it.\"\n\n            \"Thanks very much, sir,\" says Gideon with a smile.\n            *goto c6\n\n          #\"Honestly, I'm just trying to get out of this town, but Dwide insists I owe him.\"\n            *set Deception %+4\n            \"Hmph, well at least yer honest,\" he says. \"Fine. Go look around, but I ain't seen it.\"\n\n            \"Thanks very much, sir,\" says Gideon with a smile.\n            *goto c6\n\n            *label c6\n            *page_break\n            You circle the silo for what feels like an hour, going from the cool shadow it creates to the harsh sun, then back again. Despite walking that perimeter more times than you cared to, you don't catch sight of the missing pistol. \n\n            \"Maybe it's inside the silo,\" says Gideon.\n\n            He leads you up the rickety steps that cling to the side of the cylinder, toward a stiff wooden door at the top. The sweet smell of raw grain grows stronger the higher you get, and hits you like a wall when he opens the door.\n\n            Gideon leads you up a catwalk that overlooks an ocean of grain below. Thousands of wheat ears look like a tiny desert. \n\n            \"I don't see it,\" says Dwide.\n\n            \"Should we take a dive in and try to find it?\" you ask.\n\n            He chuckles at that. \"Naw, not unless you wanna suffocate,\" he says. \"You fall in there, might not make it out.\"\n\n            Gideon sighs. \"So what do we do?\"\n\n            \"Guess we'll have to look someplace else,\" says Dwide.\n            *goto gunfind1\n\n      *hide_reuse #\"The kitchen.\"\n        *set gun +1\n        Gideon leads you into his home, furnished much like Dwide's. \"Nana?\" he calls, wandering into the kitchen.\n\n        No stove, no refrigerator, not even a microwave. Even wastelanders get some kind of steam-cooker or hot plate working, but these people just don't care about technology.\n\n        His Nana is chopping vegetables by a water basin - not a sink, because there doesn't seem to be any plumbing. Just a water basin. \"Yes, deary?\" she asks. Then she turns around, revealing her deep, soft wrinkles and thick glasses. \"Oh, visitors! Dwide, how's the wife? Oh, and I don't know you.\"\n\n        \"Noel's well,\" he says with a smile. \"And this outsider is a friend of mine.\"\n\n        \"Well, any friend of the Shrudes' is a friend of mine. So, what brings ya by?\"\n\n        Gideon looks at his feet, then speaks up. \"I lost Pa's gun. Have you seen it?\"\n\n        \"Oh, yes, your father did mention something about that to me,\" she says. \"I'm afraid I haven't seen it.\"\n        *choice\n          #\"Is there any chance it's in the kitchen?\"\n            \"I'm afraid there isn't,\" she says with what sounds like genuine sympathy. \"I keep a pretty tight ship around here.\"\n\n            Gideon sags his shoulders in defeat.\n\n            \"Guess we gotta look somewhere else,\" says Dwide.\n\n            *goto gunfind1\n\n          #\"Do you remember seeing Gideon with the gun?\"\n            \"I'm afraid I don't,\" she says with what sounds like genuine sympathy. \"Only weapons I let in my kitchen are knives.\"\n\n            Gideon sags his shoulders in defeat.\n\n            \"Guess we gotta look somewhere else,\" says Dwide.\n\n            *goto gunfind1\n\n      *if (gun = 3) #Gideon, are you sure you didn't go somewhere else that day?\"\n        Gideon twists his foot bashfully on the ground. \"Well. . .\"\n\n        \"Well what?\" asks Dwide, hands on his hips.\n\n        \"I went playing with Hilty outside the village,\" he confesses.\n\n        Dwide pinches his brow. \"So, you went outside town without an adult, you took Hilty with you, and you lost lied about it,\" he says.\n\n        \"I didn't lie!\" he objects.\n\n        \"Not telling the truth is the same as lying. Gideon, do you have any idea how dangerous it is out there?\"\n\n        \"That's why I brought the gun,\" he says. \"Just in case.\"\n\n        Dwide sighs. \"Come on, boy. Show us where y'all went.\" \n        *page_break\n        Gideon leads you to a small pile of rocks at the edge of the village, passed a gap in the fence. It's throwing distance from the burnt out forests that were surely once green and lush, but are now blackened. \n\n        The pistol rests beside the stones, lying in the dirt. Dwide picks it up and says, \"Now get back to your Nana. I'll bring this back to your Pa later tonight.\"\n\n        The boy trudges back toward the village, shoulders sagged and head bowed in frustration at being caught.\n\n        \"Boy's gonna get shunned for this one,\" says Dwide.\n        *choice\n          #\"He deserves it.\"\n            *set Cruelty %+10\n            \"Well, I don't know about that,\" he says. \"Truthfully, I wouldn't punish him too harshly if it were up to me. But it's up to the community, and people like Amos are a lot stricter than I. Come on now. More work to do.\"\n            *goto dc1\n\n          #\"He's just a kid, don't be so ridiculous.\"\n            *set Cruelty %-10\n            \"I actually agree with you,\" he says. \"Truthfully, I wouldn't punish him too harshly if it were up to me. But it's up to the community, and people like Amos are a lot stricter than I. Come on now. More work to do.\"\n            *goto dc1\n\n          #\"What's shunning?\"\n            \"The good book says not to share supper with sinners,\" Dwide explains. \"We do it one better. We just don't talk to 'em. At least, not till they've made their sins right. Come on now. More work to do.\"\n            *goto dc1\n\n  *hide_reuse #\"Let's patch the fence.\"\n    *set dutch +1\n    The fence circling the village is only a fence in some places, and is more of a wall in the other. It is partially meant to protect the Dutch, and partially to keep livestock from running off into the wasteland. The portion you've been assigned to repair is more of a wall.\n\n    A few bearded men had been keeping watch with their rifles, just in case a strange Fury or some other wasteland monster wished to take advantage of the damaged defenses. They departed as soon as Dwide arrived, returning to their real work.\n\n    \"Got damaged in a highwayman attack,\" Dwide says, looking over the gaps in the fence. Some of the wood is blackened and burnt, and much of it is splintered and displaced. There's about enough room for three men standing shoulder-to-shoulder to fit through, if someone were to attack. \"We better patch this quick. Furies been bolder than usual lately.\"\n    *choice\n      #\"I'll patch it. You keep watch.\"\n        *set Caution %+2\n        You set to work hammering rusty nails into freshly cut planks of wood, though you aren't sure where this wood could have been acquired. Perhaps there are still a few good trees in that shattered, twisted, blackened forest. Fires or Buzzers or rabid highwaymen likely destroyed the few remaining green places of Philly. Maybe a few civilized factions tried to use the wood to build homes as neat and clean as the Dutch. Any tribals who may have lived there are likely dead as dirt.\n\n        It's hard, sweaty work. When Dwide notes your panting he says, \"Hard work's the Lord's work,\" and gets back to watching the horizon.\n\n        You have no way to keep track of time except for the sun's angle, and it's telling you that you've been working for a few hours. You line board up against board against board and hammer them into place until your arms go numb from the constant lifting of weight.\n\n        \"We've got company,\" says Dwide. Then he fires an ear-shattering shot into the air, making you recoil instinctively. \"Don't stop working. Now we [i]need[/i] that fence up.\"\n\n        The shot he fired signals a dozen other men who rush, armed to the teeth, to the defense of their town. Another few men come to your aid and suddenly this hard work goes a lot more quickly. \n\n        A small horde of Furies - those damned mutant wolves - rush toward the nearly finished fence. The men of Dutch Mill fire on them while their brothers lift boards into place. A few moments is all it takes and the gap in the fence is completely mended, and the Furies are on the run.\n\n        \"Thanks, boys!\" Dwide calls out as his friends return to work. They wander off like it was nothing, leaving you marinating in your own sweat and massaging your sore arms. It was tough, somewhat peculiar work, but the fence is fixed. Then Dwide says, \"Come on now. More work to do.\"\n        *goto dc1\n\n      #\"You patch it. I'll keep watch.\"\n        *set Caution %-2\n        You keep your eyes peeled on the horizon while the sound of steel on steel rings out behind you. Dwide hammers each board into place, sweating and straining all the while, and you stare emptily at the wastes.\n\n        Your eyes begin to sting as sweat drips down before them, beading on your lashes and slipping down your cheeks. Then they appear, dozens of them, those damned mutant wolves who harrassed you on your way into town: Furies. They rush toward you with sickened yellow eyes and twisted, horrendously mutated snouts.\n\n        \"We got company,\" you shout, aiming down the sights of your gun.\n\n        Your first few shots get the attention of the rest of Dutch Mill, and soon those bearded men appear by your side. Many come with guns and join the efforts to fight off the Furies, and others help Dwide put the fence together before the Furies get the chance to breach it.\n\n        *if Combat > 65\n          You open fire on the Furies, aided by the bullets of your Dutch allies. Your bullets fly true as you target the largest wolves - the alphas, you've heard them called. The others follow your lead while Dwide repairs the fence, and your skill ensures that the Furies are pushed back before they can even get close. The men of Dutch Mill fire on them while their brothers lift boards into place. A few moments is all it takes and the gap in the fence is completely mended, and the Furies are on the run.\n\n          \"Thanks, boys!\" Dwide calls out as his friends return to work. They wander off like it was nothing, leaving you marinating in your own sweat and massaging your sore arms. It was tough, somewhat peculiar work, but the fence is fixed. Then Dwide says, \"Come on now. More work to do.\"\n          *goto dc1\n\n        *else\n          *set Health %-14\n          You open fire on the Furies, aided by the bullets of your Dutch allies, but you are not skilled enough to know which wolves to target. Even if you were, you probably wouldn't hit them anyway. It isn't long before the wolves, undeterred by your missed fire, reach the fence. Pain screeches across your leg as one of the Furies takes a bite of it, tearing the flesh apart until someone manages to put a bullet in its head. Then they retreat. The men of Dutch Mill fire on them while their brothers lift boards into place. A few moments is all it takes and the gap in the fence is completely mended, and the Furies are on the run.\n\n          \"Thanks, boys!\" Dwide calls out as his friends return to work. They wander off like it was nothing, leaving you marinating in your own sweat and massaging your sore arms. It was tough, somewhat peculiar work, but the fence is fixed. Then Dwide says, \"Come on now. More work to do.\"\n          *goto dc1\n\n  *if (dutch = 3) #\"I finished your chores. Now what?\"\n    \"Now we prepare for Communion,\" he says. \"But before that, the Council meeting.\"\n    *choice\n      #\"Yeah, I don't know what any of that is.\"\n        \"Communion is how we become one with the Lord,\" he explains. \"But before that, the Council has to meet to discuss all outstanding issues in Dutch Mill. See, you may believe you came here by chance, but I don't. I believe the Lord sent you to change hearts and minds just in time. Come now, the meeting is soon.\"\n        *goto c7\n\n      #\"Who's on the Council?\"\n        \"All the baptized men and women of Dutch Mill,\" he explains. \"Before we take Holy Communion, the Council has to meet to discuss all outstanding issues in Dutch Mill. See, you may believe you came here by chance, but I don't. I believe the Lord sent you to change hearts and minds just in time. Come now, the meeting is soon.\"\n        *goto c7\n\n      #\"Are we almost done?\"\n        \"Oh, hold yer horses,\" he says. \"Before we take Holy Communion, the Council has to meet to discuss all outstanding issues in Dutch Mill. See, you may believe you came here by chance, but I don't. I believe the Lord sent you to change hearts and minds just in time. Come now, the meeting is soon.\"\n        *goto c7\n\n        *label c7\n        *page_break Later That Night\n        To your surprise, the Council meeting takes place inside an old barn rather than some specially determined meeting house. No tables or chairs, just an empty barn with some bales of hay pushed into the corner, and everyone standing about. Even more peculiar, it seems that every adult member of the village is on this Council. They glare at you when you enter the barn, and you immediately understand that you shouldn't be there. \n\n        While most of the villagers politely ignore your presence, Amos is not so kind. \n\n        \"What's an outsider doin' at the Council?\" he demands, turning red in the face. The other bearded men murmur in discontented agreement. \n\n        \"They're part of the discussion tonight,\" Dwide says. Everyone turns to face him so he says, \"Well, looks like I'm speakin' first. I'm sure many of you are aware of the strange coincidence. We get visitors so rarely, what are the odds we'd get one right before a Council meeting? And what are the odds that the last four've had me and Amos buttin' heads over what to do with outsiders?\"\n\n        \"They're dangerous!\" Amos shouts.\n\n        \"They've been nothing but helpful since we let 'em in,\" he says. That's when all the pieces start to make sense to you. \"Miriam, who helped you clear those nasty rats out the basement? Yoden, who helped lil Gideon find your missing pistol? And who helped us patch the fence, just in time to fend off those damned Furies?\"\n\n        \"I don't care if they pulled in the whole damn harvest,\" says Amos.\n        *choice\n          #\"Look, I don't care about any of this.\"\n            \"And they're even humble,\" says Dwide, earning yet more murmurs from the crowd. \"But we haven't met today to determine whether one single outsider is good or evil. We came to pass judgment.\"\n            *goto c8 \n\n          #\"I'm just trying to help you guys out.\"\n            \"And they're even humble,\" says Dwide, earning yet more murmurs from the crowd. \"But we haven't met today to determine whether one single outsider is good or evil. We came to pass judgment.\"\n            *goto c8 \n\n          #\"I just want to repay my debt to Dwide.\"\n            \"And they're even humble,\" says Dwide, earning yet more murmurs from the crowd. \"But we haven't met today to determine whether one single outsider is good or evil. We came to pass judgment.\"\n            *goto c8 \n\n            *label c8\n\n            \"What're you gettin' at?\" asks Amos.\n\n            Dwide frowns despite his clear victory when he says, \"Amos, you and your boys broke into my home and tried to kill my guest.\"\n\n            This revelation elicits gasps from the crowd. One of the women shouts, \"Amos, is this true?\"\n\n            Amos glares at Dwide as if he didn't expect this. How could he not have expected this? \"I cannot lie to my people,\" he says. \"Yes, I tried to kidnap the outsider. Yes, I would have likely killed them. But let me tell you, they are a threat to our way of life. We cannot allow this degeneracy in out-\"\n\n            \"Shunned,\" says Dwide, cutting him off.\n\n            Dozens of other men and women says, \"shunned,\" one after the other, and turn away from Amos. He tries to speak to them, but none - not even his own friends - respond with anything but \"shunned.\"\n\n            Then he turns to you, an inhuman hate burning in his eyes. \"You're the devil himself, ain't ya?\"\n            *fake_choice\n              #\"You should leave while you still have some dignity.\"\n              #\"Get out of my damned face.\"\n              #\"Shunned.\"\n\n            You stand at the back of the barn and listen while the people of Dutch Mill discuss and deliberate on issues ranging from land ownership disputes, women wearing too-colorful clothes, and a missing chicken. None of these issues end with shunning, and none of them warrant a vote either. Every choice is easy as soon as both sides are presented to the members of the village.\n\n            Dwide finds you afterward, as the barn clears out. \"Sorry I put ya on the spot like that,\" he says. \"Look, I know you're just trying to get out of her. You just show me where you need to go, and I'll give you a ride.\"\n\n            \"I'll take you up on that,\" you say. So, you show him the map you got in Franklin.\n\n            \"Oh yeah, I heard of that place,\" he says. \"Real ghost town. I can get ya there in a couple hours.\"\n\n            \"Must be a slow car if it'll take more than an hour,\" you say.\n\n            He just chuckles. \"Heh, yeah. Car.\"\n            *page_break The Next Morning\n            You'd never seen a horse before until you ended up sitting behind one for a few hours. Two horses hitched to a rickety wooden cart drag it along an old, grey highway. Rusty cars are pushed to either side of the road, and have mostly been stripped of anything useful. \n\n            \"Look, I'm just trying to make my people better,\" says Dwide, not long after you leave the village. \"That means getting along with outsiders. So, if you ever need help, just know you can count on us. We're nothing if not neighborly.\"\n            *fake_choice\n              #\"Thanks, Dwide. I'll take you up on that.\"\n              #\"I prefer to make my own way.\"\n\n            *set Dwide 1\n            *set DM true\n            *set Notoriety %+11\n            The sun is high in the sky by the time you see the outskirts of the village. It's a little wooden thing with a broken fence, positioned on a hill about a mile out. \"Road's too rough ahead, so this is as far as I take ya,\" says Dwide. \"May God's blessings and good fortune be with you.\"\n\n            *label dmend\n            You stand before the hill, your target resting atop its craggy peak. The words \"Black Vein\" are hand painted on an old, dilapidated sign. Your heart swells with a sense of victory at having completed your task. The you hear a deadly sound. The sound of buzzing, and wings flapping.\n            *finish\n\n*label capture\n*page_break\nThe bag is removed from your head and you find yourself in a barren cellar. Ropes cut into your skin and your back aches from the rigid wooden back of your seat. For the second time this week, you've been tied to a chair. It's getting old. \n\nAmos stands before you without his men at his back. \"I truly am sorry about this,\" he says.\n\n\"What do you want?\" you ask. \n\n\"Peace in my village,\" he says. \"But you outsiders show up, and ya get everyone riled, and then there's talk of trading with the outside, like everyone forgets how deadly y'all are. So, I'll cut you a deal. You help me show everyone the horrors of the wasteland, I'll let you go.\"\n*choice\n  #\"Deal.\"\n    \"That's what I wanted to hear,\" he says with a sinister smile.\n    *goto c9\n\n  #\"Fine. Whatever. I don't care about this.\"\n    \"That's what I wanted to hear,\" he says with a sinister smile.\n    *goto c9\n\n  *if (Deception \u003c 50) #You're honorable, right? Would you really kill a guest in your village? That may seem like it's good for the community, but it's bad for your soul.\"\n    \"Come on, you're talking about terrorism,\" you say. \"This is what those demented highwaymen do. They make people afraid so they'll obey. Is that really what the Lord wants from you?\"\n\n    Amos balls his fists and breathes sharply. Then he draws a knife. For a moment you think it's meant for you. Then he cuts the ropes that bind you.\n\n    \"Go back to Dwide,\" he says. \"Don't make me regret this.\"\n\n    You leave the cellar, crisp night air making your neck hairs rise. You wander the village for a while, trying to find your way back to the Shrude residence. Then you see candlelight shining out from an open door, and Dwide's large figure standing in it.\n\n    \"Heh, I was hoping he'd let ya go,\" he says, shouldering his rifle. \"Come in, to the den.\"\n    *goto safe\n\n  *if (Persuasion > 65) #\"You're a Godly man, aren't you, Amos? Tell me, is this really what your God wants?\"\n    \"Come on, you're talking about terrorism,\" you say. \"This is what those demented highwaymen do. They make people afraid so they'll obey. Is that really what the Lord wants from you?\"\n\n    Amos balls his fists and breathes sharply. Then he draws a knife. For a moment you think it's meant for you. Then he cuts the ropes that bind you.\n\n    \"Go back to Dwide,\" he says. \"Don't make me regret this.\"\n\n    You leave the cellar, crisp night air making your neck hairs rise. You wander the village for a while, trying to find your way back to the Shrude residence. Then you see candlelight shining out from an open door, and Dwide's large figure standing in it.\n\n    \"Heh, I was hoping he'd let ya go,\" he says, shouldering his rifle. \"Come in, to the den.\"\n    *goto safe\n\n  #\"Or - and just hear me out - you could let me know.\"\n    \"No,\" he says with a sinister smile. \"No, I think you'll be more than willing to help me with this task. Otherwise, one of my boys will put a bullet in ya.\"\n    *goto c9\n\n    *label c9\n    *page_break\n    You sit across from Amos, nothing but a table and his gun in between you two. The tension is palpable, like an encroaching thunderstorm or the morning after a regrettable one-night-stand. The whole house is silent. He doesn't seem to have a family. Not unsual in the wasteland, but very peculiar in this village.\n\n    \"So, are you gonna tell me your plan?\" you ask. \"Or should I guess?\"\n\n    \"No need to get wise,\" he says. \"The plan is simple. You scare the heck out of everyone in town.\"\n\n    \"So I'm killing people?\"\n\n    \"Of course not!\" he shouts. \"Look, here's the plan. I got three targets planned out. First, Abram's silo. Then, a damaged section of the fence - that needs to be worsened. And the horses should be dealt with, and their wagons.\"\n    *fake_choice\n      #\"So, domestic terrorism.\"\n      #\"You're completely psychotic.\"\n      #\"Therapy. Just saying.\"\n\n    \"I didn't ask for your criticisms,\" he spits. \"You do this and ya get to walk away alive. Now get to work.\"\n\n    You suppose you could always flee to Dwide. He'd probably be willing to help you. But then you'd end up with a bullet in your head. Now way of knowing how many of these bearded freaks are throwing in with Amos. So, like the man said, get to work.\n    *set Amos 1\n    *set Villain +1\n    *label evilness\n    *set Notoriety %+4\n    *choice\n      *disable_reuse #Destroy the grain silo\n        *set dutch +1\n        Silo Abram lives on the far side of the town. His silo is a large cylinder as wide as a home, with a rounded top and a set of wooden steps wrapped around its side. You'd seen grain siloes in the wasteland before, but they're mostly abandoned or being used as bases for highwaymen. Good places to snipe unsuspecting wastelanders. This one, however, has not decayed in the absence of civilization and even smells like freshly cut wheat - a sweet, somewhat oaky smell that reminds you of stale beer. \n\n        You see a few shadowy figures passing in the night, on the far side of the village. They're probably Amos's men. Silo Abram himself, however, is nowhere to be seen. That makes your job a lot easier. All you really have to do is figure out the most creative way to destroy the grain silo.\n        *choice\n          #Introduce rats to a new snack\n            *set Deception %+6\n            *set Caution %+4\n            It isn't hard to find rats. All you have to do is sneak into a house in the middle of the night, find the basement, and open it up. \n\n            *if Stealth > 65\n              This is no problem of a master of stealth such as yourself. You slip in through the unlocked door, staying close to the ground just in case someone is wandering in the night. It only takes a moment for you to spot the basement door. It creeks open, and you spot them. Dozens of beady, green eyes in the darkness. \n\n              These rats, if you can call them that, are twisted mutants with deep green eyes and patchy fur. Each one is easily the size of a small dog. They hiss rabidly with their sharp teeth jutting out, balking at the sudden presence of light. The largest of the rodents are also the ugliest. Much like the furies they have vestigial limbs and extra facial features wrought by the curse of radiation.\n\n              There are probably a dozen rats in total, and you've earned their attention. They swarm toward you, squeaking and nipping, their feet padding against the stone floor of the cellar.\n\n              You rush from the house, back to the silo, those massive rats right on your tail. They follow you clear across town, squeaking all the while. \n              *goto ratsilo\n              *label ratsilo\n\n              You lead those nasty, mutant rats up the steps that cling to the side of the silo. As quickly as possible, you throw open the door. The smell of freshly cut grain overwhelms you, reminds you of stale beer.\n\n              A catwalk overlooks the ocean below. Thousands of wheat ears look like a desert landscape in the night.\n\n              The rats rush passed you, eager at the scent of newly found food. They fall into the grain, a cascade of twisted fur and glowing green eyes, and the sounds of their squeaking become muffled beneath the weight of the wheat.\n\n              You look down, satisfied, and then remember that there's more work to be done.\n              *if dutch = 3\n                *goto exile\n\n              *else\n                *goto evilness\n            *else\n              You stumble and fumble in the darkness, slipping through a luckily unlocked door and managing to find the basement door.  It creeks open, and you spot them. Dozens of beady, green eyes in the darkness. \n\n              These rats, if you can call them that, are twisted mutants with deep green eyes and patchy fur. Each one is easily the size of a small dog. They hiss rabidly with their sharp teeth jutting out, balking at the sudden presence of light. The largest of the rodents are also the ugliest. Much like the furies they have vestigial limbs and extra facial features wrought by the curse of radiation.\n\n              There are probably a dozen rats in total, and you've earned their attention. They swarm toward you, squeaking and nipping, their feet padding against the stone floor of the cellar.\n\n              \"What're you doin' in my house?\" asks a boy's voice. You turn around and see him, a long-haired brat in a night-gown, holding a BB gun. The noise you made must have woken him up.\n              *choice\n                #\"I'm the exterminator.\"\n                  *set Deception %+4\n                  \"Your Mama asked me to get rid of the rat problem,\" you say. \"Now head back to bed and let me work.\"\n\n                  You rush from the house, back to the silo, those massive rats right on your tail. They follow you clear across town, squeaking all the while. \n                  *goto ratsilo\n                #\"I'm trying to destroy your food supply.\"\n                  *set Cruelty %+4\n                  *set Deception %-2\n                  \"Now shut up and get out of the way,\" you say, pushing him aside. \n\n                  You rush from the house, back to the silo, those massive rats right on your tail. They follow you clear across town, squeaking all the while. \n                  *goto ratsilo\n\n          #Craft a fire bomb\n            *set Bomber +1\n            *set Cruelty %+9\n            *set Sadism %+4\n            *set Caution %-9\n            There's not a single car in the entire village, so gasoline is out of the question. You do, however, find a bottle of moonshine while perusing Amos's home. Moonshine, the taste of the wasteland. Every village you'd ever been to had it somewhere. All the wine and beer's been drank, and people still need to get drunk, after all.\n\n            You take a burning sip for yourself, then tie a rag around the neck of the bottle, pushing some into it so that it sticks out like a gecko's tongue.\n\n            \"A-a-a-amos!\" you call out from his kitchen.\n\n            \"What?\" he demands with a scowl, barging into the room.\n\n            \"Got a light?\" you ask. \n\n            He hands you the lighter and walks away, still scowling. So, you return to the silo, ready to start the biggest fire the wastes have ever seen.\n\n            Your thumb goes raw from sliding it down the harsh metal trigger of the flip lighter. It takes nearly ten minutes for the gas to ignite, making you wonder if this pyrotechnic plan was worth it. Then sparks fly and the flame lights up, casting orange shadows around your hand. The flames lick at the cloth tongue of the cocktail. With a wicked grin, you toss it toward the wooden panelling of the silo.\n            *page_break\n            *if Combat > 65\n              If wasteland experience taught you anything, it's to avoid fire. Fire can hurt. Fire can kill. You cannot count the number of people you've met with burn scars on their faces, and you cannot imagine the painstaking care it must take to prevent infection.\n\n              So, you throw the moonshine cocktail from a reasonable distance, taking cover behind a small fence. \n\n              The flames travel slowly up the side of the silo, but the entire structure erupts in fire once the the grain inside catches alight. Even from a great distance away, you can feel the intense heat on your face. You have to cover your eyes for fear that they might burn away. \n\n              Prudent as ever, the people of Dutch Mill rush to action, quickly carrying buckets of water from the well in hopes of extinguishing the fire. Even if they do manage to put it out, they've lost a good deal of food and will not recover any time soon.\n\n              You stare up at the flaming silo, satisfied, then you remember you have more work to do.\n              *if dutch = 3\n                *goto exile\n\n              *else\n                *goto evilness\n\n            *elseif Caution > 50\n              If wasteland experience taught you anything, it's to avoid fire. Fire can hurt. Fire can kill. You cannot count the number of people you've met with burn scars on their faces, and you cannot imagine the painstaking care it must take to prevent infection.\n\n              So, you throw the moonshine cocktail from a reasonable distance, taking cover behind a small fence. \n\n              The flames travel slowly up the side of the silo, but the entire structure erupts in fire once the the grain inside catches alight. Even from a great distance away, you can feel the intense heat on your face. You have to cover your eyes for fear that they might burn away. \n\n              Prudent as ever, the people of Dutch Mill rush to action, quickly carrying buckets of water from the well in hopes of extinguishing the fire. Even if they do manage to put it out, they've lost a good deal of food and will not recover any time soon.\n\n              You stare up at the flaming silo, satisfied, then you remember you have more work to do.\n              *if dutch = 3\n                *goto exile\n\n              *else\n                *goto evilness\n\n            *else\n              *set Health %-12\n              You throw the moonshine cocktail onto the silo's wall and it explodes in a burst of flame. But you stood too close to it, and now those flames lick at your arm. Pain shrieks out along your wrist and you instinctively plunge your entire arm into the cool dust below your feet.\n\n              The pain subsides in a moment, save a faint stinging, and you're left with red wounds that will surely scar. But you're fine. So, you turn your attention to the burning silo. \n\n              The flames travel slowly up the side of the silo, but the entire structure erupts in fire once the the grain inside catches alight. Even from a great distance away, you can feel the intense heat on your face. You have to cover your eyes for fear that they might burn away. \n\n              Prudent as ever, the people of Dutch Mill rush to action, quickly carrying buckets of water from the well in hopes of extinguishing the fire. Even if they do manage to put it out, they've lost a good deal of food and will not recover any time soon.\n\n              You stare up at the flaming silo, satisfied, then you remember you have more work to do.\n              *if dutch = 3\n                *goto exile\n\n              *else\n                *goto evilness\n\n      *disable_reuse #Damage the fence\n        *set dutch +1\n        The fence circling the village is only a fence in some places, and is more of a wall in the other. It is partially meant to protect the Dutch, and partially to keep livestock from running off into the wasteland. The portion you've been assigned to repair is more of a wall.\n\n        It isn't far from Amos's house and is burnt and split open from what appears to be an explosive of some sort. Proably a highwayman attack. The gap is big enough for maybe three men, standing shoulder-to-shoulder, to enter. Or a truck. \n\n        The only question is how you intend to expand the damage.\n        *choice\n          #A good, old-fashioned sledgehammer\n            You find a sledgehammer not far from the wall - it surrounds the home of hard workers, after all, and nothing indicates a hard worker more than a large hammer. It's a great wooden weapon with a heavy iron head sculpted haphazardly into a deadly cube.\n\n            *if Combat > 65\n              You swing without hesitation and it only takes a little effort and some salty sweat to tear that fence apart. The wood splinters as the iron head of the hammer crashes into it. Each swing is a stinging strain on your arms.\n              *label c10\n\n              After an hour or so, that area of the fence is mostly demolished. You look at your work with the pride of a parent. Sweaty and exhausted, but proud. That gap could probably fit twenty people now, or six cars. Maybe even some of those damned Furies.\n\n              But time for gawking is over. You've got work to do.\n              *if dutch = 3\n                *goto exile\n\n              *else\n                *goto evilness\n\n            *else\n              *set Health %-3\n              You swing wildly at the fence, hoping to take out a few splintering boards in spite of your flimsy arms. The hammer probably is probably the heaviest thing you could lift, so you have a great deal of trouble swinging it in that great arch over your head. \n\n              It's only a minute before you're caked in sweat. The wood splinters as the iron head of the hammer crashes into it. Each swing is a stinging strain on your arms.\n              *goto c10\n\n          #A makeshift bomb\n            *set Bomber +1\n            Bombs are easy enough to make, if you have the right ingredients.\n\n            \"A-a-a-amos,\" you shout, entering his home once again. \n\n            \"What?\" he demands with a scowl.\n\n            \"I need some gunpowder.\"\n\n            \"What do you need gunpowder for?\" he asks, pinching the bridge of his nose.\n\n            \"Hey, I'm doing this for you,\" you say. \"You gonna let me do my job, or should I get outta your hair?\"\n\n            He just rolls his eyes and says, \"There's a tin in the shed.\"\n\n            So, tin of gunpowder in hand, you head off to the fence to blow a hole in it.\n            *page_break\n            The bomb is not actually a bomb. It doesn't have to be. In fact, it's just a tin of gunpowder and your own gun.\n\n            *if Combat > 65\n              *label c11\n              Your experience in the wasteland has taught you to keep your damn distance from explosions. So you place the gunpowder tin where the fence seems weakest and take cover behind a stray barrel. \n\n              A single shot is all it takes. Your bullet pierces the tin and an explosion erupts. The gunshot is loud but the burst of flames is louder. Dirt flies up and you cower behind the barrel, so you don't get to see the fence demolish, but the sound of it splintering echoes in the air even as your ears ring.\n\n              *goto c12\n\n              *label c12\n              You flee back to the safety of Amos's house as alerted, awakened Dutch come to investigate the explosion. Lucky for you, none spotted you. You stare back at their panic, then remember you've got more work to do.\n              *if dutch = 3\n                *goto exile\n\n              *else\n                *goto evilness\n\n            *elseif Stealth > 65\n              *goto c11\n\n            *else\n              *set Health %-23\n              Had you been more experienced, you might have known to stay away from the explosion. But you don't. So, when you open fire on the gunpowder tin, you're caught in the shockwave.\n\n              Shrapnel skins your side and the coppery smell of blood fills the air as dirt flies and the fence splinters. You land hard on your back, dazed with your ears ringing. It feels like an hour before you pull yourself up, but it was only about a minute.\n              *goto c12\n\n      *disable_reuse #Loose the horses\n        *set dutch +1\n        The horses, or at least most of them, are in a stable near the rear of the village. There are a few wooden wagons parked beside the stable. You'd seen those wagons in the wasteland, but they were always pulled by gas-guzzling cars, not horses.\n\n        The first thing you notice when you enter the stable is the smell. It hits you like a wall. The odor is pungeant and somehow seems textured as it invades your nostrils, and you have a hard time believing that these horses can live in this constant stench.\n\n        They're great four-legged beasts with luxurious manes not unlike the beards of the dutch, in terms of length. You expect them to have some sort of mutation - patchy fur, additional eyes, stray limbs. But they all seem perfectly healthy, in your expert horse opinion.\n\n        So, how do you deal with them?\n        *choice\n          #Untie them and let them loose\n            *set Sadism %-12\n            *set Cruelty %-15\n            *set Deception %-11\n            It's the most merciful thing you can do for them, really. You untie the ropes around their necks and offer them a hard slap on the back, sending them running and neighing into the wasteland, galloping at full speed toward freedom.\n\n            You watch as they head into the wasteland, then remember you've got more work to do.\n            *if dutch = 3\n              *goto exile\n\n            *else\n              *goto evilness\n\n          #Slit their throats\n            *set Sadism %+12\n            *set Cruelty %+15\n            *set Deception %+11\n            You take the knife from your boot and slit the throat of each horse. Blood pours out their necks and they neigh impotently, trying to gallop away but bound by their ropes. You can see the life fade away from their big brown eyes just as you could a person's.\n\n            You leave the gory mess behind as the stench of blood mixes with manure. Then you remember you've got more work to do.\n            *if dutch = 3\n              *goto exile\n\n            *else\n              *goto evilness\n\n          #Break their legs and leave them to suffer\n            *set Sadism %+12\n            *set Cruelty %+15\n            *set Deception %+11\n            The poor horses cry and neigh impotently as you take a hammer to their legs, shattering bones and forcing them down. Legends and old book inform you that horses have to stand in order to live, so you've granted them a long, painful death.\n\n            You leave the whimpering, injured horses to their fate. Then you remember you've got more work to do.\n            *if dutch = 3\n              *goto exile\n              *label exile\n              *page_break\n              \"Well, I'll be!\" says Amos with a smile. The sun is just rising and your chores are done, and his bearded men are waiting for you.\n\n              The village is in chaos. The people are in a panic. Furies run rabid throughout the town and are hunted by men with guns as they tear apart the crops and run after children. The smell of smoke and fear hangs in the air, and you can feel the glare of the Dutch upon you, though they are too concerned with mutant wolves to bother with you.\n\n              \"Is this what you wanted?\" you ask.\n\n              Amos sighs. \"The Lord demands blood from those who sin. This whole village is full of sin, and it will be paid for so that we may be better for our God.\"\n              *choice\n                #\"Can I go now?\"\n                  \"Yeah, you're free to go,\" says Amos. \"After the havoc you've wrought, I don't suspect we'll be lettin' any outsiders in from now on.\"\n\n                  *label done\n                  *set Amos 1\n                  And so you leave the backward village of Dutch Mill in its chaos. From that chaos, Amos will rise to power, but you will never be allowed to return.\n\n                  So you set your eyes on the road before you, heading toward ReVivienne's ghost town, feeling more alone than ever.\n                  *page_break\n                  The sun is high in the sky by the time you see the outskirts of the village. It's a little wooden thing with a broken fence, positioned on a hill about a mile out.\n\n                  *goto dmend\n\n                #\"Happy to be of help.\"\n                  \"Yeah, I bet you are,\" says Amos. \"After the havoc you've wrought, I don't suspect we'll be lettin' any outsiders in from now on.\"\n\n                  *goto done\n\n                #\"Do I have to leave?\"\n                  \"Yeah, you're free to go,\" says Amos. \"After the havoc you've wrought, I don't suspect we'll be lettin' any outsiders in from now on.\"\n\n                  *goto done\n\n            *else\n              *goto evilness", "3-buzzers": "*set Health 100\n[i]Radiation's curse may have imbued monstrous highwaymen with a unique insanity, but what it did to animals is even worse. Mutant wolves, mudbugs, leatherbacks, and even alligators, but none of these are half as bad as Buzzers. If you run into a nest of Buzzers my clinical advice isn't to run away, because then you'll just die tired. Instead, turn the gun on yourself and spare yourself some pain.[/i]\n\n-Hans Libet, [i]The Last Naturalist[/i]\n\nBuzzing. Wings flapping. Those are the most accursed sounds in the wasteland. Even seasoned highwaymen turn tail and run from the prospect of having to face a Buzzer. \n\nYou spot them not long after you hear them: great monstrosities larger than a man, and louder. Grey exoskeleton, dozens of eyes, antennae, and so many wings. They flit about on the ground and in the air in the middle of the wooden remains of that ghost town, not deigning to notice you. Maybe a dozen, probably more. Spawns of Satan himself.\n\n\"You heading the Black Vein too?\"\n\nYou turn around and level your gun at the source of the strange new voice: a woman clad in salvaged, pre-war swat armor, with a shotgun pointed right at you, and black braids curling down the side of her head. Her deep green eyes stare at you, questioning you, analyzing you. Scars mar her face - cuts and burns and all manner of testaments to her violent past. She seems thin, but not gaut and hollow-cheeked like most survivors.\n\n\"I'll take that as a yes,\" she says, noting your silence. \"What are you doing here?\"\n*choice\n\t#\"None of your business.\"\n\t\t*set Deception %+4\n\t\t\"I get that,\" she says. \"But, I have the feeling you're scouting the place out for settlers. Don't say whether I'm right, just listen to what I have to say.\"\n\n\t\t*goto c1\n\n\t#\"I'm scouting the location for settlers.\"\n\t\t*set Deception %-4\n\t\t\"That's real respectable work,\" she says. \"I'm sure you're real busy, but just listen to what I have to say.\"\n\n\t\t*goto c1\n\n\t#\"Just passing through.\"\n\t\t*set Deception %+4\n\t\t\"I don't wanna call you a liar,\" she says. \"But, I have the feeling you're scouting the place out for settlers. Don't say whether I'm right, just listen to what I have to say.\"\n\n\t\t*goto c1\n\t\t*label c1\n\t\tYou nod in agreement. Just to listen to her words, nothing more. \n\n\t\t\"The name's Olivia Buckshot. I've been hired to clear this place out. Buzzers have taken over and frankly, it's disgusting. So, you're looking to kill the Buzzers and so am I. Why shouldn't we work together?\"\n\t\t*choice\n\t\t\t#\"I work alone.\"\n\t\t\t\t\"Not anymore you dont,\" she says. \"Two of us will make a great team. Or die trying.\"\n\n\t\t\t\t*goto c2\n\n\t\t\t#\"I'd love your help.\"\n\t\t\t\t\"Perfect. Two of us will make a great team,\" she says. \"Or die trying.\"\n\n\t\t\t\t*goto c2\n\n\t\t\t#\"Fine. But I don't trust you for a second.\"\n\t\t\t\t\"We don't have to trust each other,\" she says. \"We just have to make a great team. Or die trying.\"\n\n\t\t\t\t*goto c2\n\n*label c2\n\"Then I assume you have a plan?\" you ask. \"You know, to avoid the dying part.\" You may not exactly trust this woman yet, but the alternative is sitting around and waiting for her to leave, then fighting the Buzzers alone. At best she's a good ally and at worst she's bug fodder, so this is a nuisance you can put up with.\n\n\"I've got a couple,\" she says. \n\n\"Well, let's hear 'em.\"\n\n\"The first one is a basic storm-the-castle. We've got guns - we should use them. Right? Simple enough as long as we manage to get to the queen in the nest.\"\n\n\"You do know these are Buzzers, right? Pretty lethal monsters when they swarm.\"\n\n\"They bleed just like everything else,\" she insists. \"Plus it's kind of comforting to know that they're bugs, and bugs get squashed most of the time.\"\n\n\"What's the other option?\"\n\n\"Stealth,\" she says in an exaggerated whisper, a silvery smile playing on her lips. \"We skirt the walls and sneak around back, then hit them where it hurts - the nest. It's got larvae, the queen, cocoons. All that good shit. And they'll never see us coming. So, which do you wanna go with?\"\n*choice\n\t#Direct assault\n\t\t*set Sadism %+9\n\t\t\"The straightforward method,\" she says with a smirk. \"Respectable. Alright, way I see it we've got a couple things to do before we can call this a wrap.\"\n\n\t\t\"Well, let's hear them,\" you say.\n\n\t\t\"First, we gotta find a position to attack from. Then we have to take out the queen and the nest and all those nasty baby buggies. But let's put first thing's first. Where should we attack from?\"\n\t\t*choice\n\t\t\t#\"Let's just walk right in.\"\n\t\t\t\t*set Caution %-12\n\t\t\t\t\"Gutsy,\" she remarks with that silvery, flowy grin. \"I like that in an ally. Good to know you're not a coward.\"\n\t\t\t\t*page_break\n\t\t\t\tNerves tie a bundle in your belly as you walk down the shattered grey road, gun cocked and aimed straight forward. Olivia Buckshot betrays none of that nervousness, but you suspect her anxieties are just the same as yours. \n\n\t\t\t\tThe wasteland has taught you how to hide your fear - especially your pre-battle fear. Even as a loner, you spend a good amount of time fighting with or near other people. If they sense your fear or even your vague worries, they may not see fit to help you when you need it. After all, would some coward help them?\n\n\t\t\t\tBut Olivia doesn't seem like that type of person. Since you've met her she's been nothing but kind, and kindness in this world is the result of fearlessness. Even the way she walks betrays that confidence. Her wide, lazy gait and the loose grip she holds on her gun, and the way her head gently bobs with each step. She might be walking to ber bed for a well-deserved nap, not preparing to fight deadly beasts.\n\n\t\t\t\t\"You ready for this?\" she asks, and you can tell she means it. She's not asking because she feels obliged to, but because this is your last chance to express any concerns about the plan.\n\n\t\t\t\tYou nod agreeingly.\n\n\t\t\t\t\"Good,\" she says with a smirk. \"I'm trying to think of a pun involving Buzzers but it's not going great. You think of one after, you let me know, alright?\"\n\t\t\t\t*page_break\n\t\t\t\tThe sound of buzzing intensifies as you get closer to Black Vein. The fence circles widely around it, leaving long empty spaces between shattered wooden homes. Even amid the destruction, you can see why someone might want to settle down here. Sure, the ground is craggy and unfit for crops, and there are mutant bugs flying around, but there's so much space to grow.\n\n\t\t\t\tYou're still a fair distance away from the Buzzers. They cluster around a large building which you assume was once a barracks of some sort. It's the largest of the wooden structures by far, and the only one that's more than two stories. The windows are mostly blown out or boarded up and the roof has collapsed in some places. Wooden siding falls off the walls in thick boards after decades of neglect.\n\n\t\t\t\tBuzzers rest on the ground around the barracks. Some cling oddly to the buildings, hanging sideways off the walls or resting on the rooftops.\n\n\t\t\t\tThe sight of them - their antennae and their many eyes and their grey wings who flit too fast to even see - sends chills up your spine. The hairs on your neck stand at attention, as if they are trying to sneak away before the fight. Such disgusting monsters, the Buzzers. No wonder they inspire such fear.\n\n\t\t\t\t\"Such a shame,\" says Olivia. \"They're kind of cute. Now remember. The queen's gonna be someplace in the nest and she's gonna be protected. So don't die until we get there.\"\n\n\t\t\t\tThen she opens fire, and your eardrums feel as if they're about to explode.\n\t\t\t\t*page_break\n\t\t\t\t*if Combat > 65\n\t\t\t\t\t*set Notoriety %+6\n\t\t\t\t\t*set Health %-8\n\t\t\t\t\tThe recoil of the gun, the faint scent of gunpowder, the shrieking shots rattling in your ears. These are familiar, comfortable things in a world so chaotic. They are the only constant in a life of wandering, and they are a punishment for the sickening Buzzers.\n\n\t\t\t\t\tYour sight goes red as you open fire on the startled Buzzers. Nothing else seems to exist except you, your bullets, and your targets. They scatter at first, startled by your assault, and flit about aimlessly. Then they seem to recover their wits, even as bullets shatter their exoskeletons and white bile spills out.\n\n\t\t\t\t\tThe first of the massive moths fall, riddled with lead and white bile smelling of blood. The rest, however, turn to you and Olivia.\n\n\t\t\t\t\tYou never stop shooting. Even as you try to find cover, as you try to step back, as you try to get away, you just keep shooting. The moments in between shots or those when you must reload are the most hair raising and the most terrifying, and you thank your lucky stars that this has become muscle-memory.\n\n\t\t\t\t\tThe Buzzers swarm you, revealing thick stingers on their hides. The buzzing is nearly as deafening as the gunfire and you doubt you'll ever be able to hear anything else, ever again. Their fuzzy antennae nearly touch you, their so close, and every step you take is the choic between survival and their serrated stingers.\n\n\t\t\t\t\tThen a sharp pain erupts in your side and you fall to the ground, silently wishing you'd chosen a different plan of attack. Your cries ring out as you shoot desperately at the Buzzers, hoping you'll finally get a lethal shot. The world is jumbled as they assault you with their stingers. Perhaps one perhaps four or five, you can't see anything beyond the grey of their buzzing wings.\n\n\t\t\t\t\tThe noise stops. The Buzzer falls dead, half on your legs, as you crawl away, leaving a slight trail of blood. Olivia places a victorious boot on the monster's surprisingly frail hide, and it trembles beneath her armor's weight. \n\n\t\t\t\t\tAll the Buzzers are dead, though some still twitch oddly in the breeze. A chill runs up your arms, not from the breeze but from the loss of adrenaline. It's like the world was muted and now sound as returned, and your ears still ring from its absence.\n\n\t\t\t\t\t\"Pretty good in a fight,\" she says, pulling you up by the arm. \"But there's still more work to be done.\"\n\t\t\t\t\t*goto combat-moth\n\n\t\t\t\t*else\n\t\t\t\t\t*set Notoriety %+2\n\t\t\t\t\t*set Health %-28\n\t\t\t\t\tThe recoil of the gun, the faint scent of gunpowder, the shrieking shots rattling in your ears. These are familiar, comfortable things in a world so chaotic. They are the only constant in a life of wandering, and they are a punishment for the sickening Buzzers.\n\n\t\t\t\t\tYour sight goes red as you open fire on the startled Buzzers. Nothing else seems to exist except you, your bullets, and your targets. They scatter at first, startled by your assault, and flit about aimlessly. Then they seem to recover their wits, even as bullets shatter their exoskeletons and white bile spills out.\n\n\t\t\t\t\tThe first of the massive moths fall, riddled with lead and white bile smelling of blood. The rest, however, turn to you and Olivia.\n\n\t\t\t\t\tYou never stop shooting. Even as you try to find cover, as you try to step back, as you try to get away, you just keep shooting. The moments in between shots or those when you must reload are ame as yours. \n\n\t\t\t\tThe wasteland has taught you how to hide your fear - especially your pre-battle fear. Even as a loner, you spend a good amount of time fighting with or near other people. If they sense your fear or even your vague worries, they may not see fit to help you when you need it. After all, would some coward help them?\n\n\t\t\t\tBut Olivia doesn't seem like that type of person. Since you've met her she's been nothing but kind, and kindness in this world is the result of fearlessness. Even the way she walks betrays that confidence. Her wide, lazy gait and the loose grip she holds on her gun, and the way her head gently bobs with each step. She might be walking to ber bed for a well-deserved nap, not preparing to fight deadly beasts.\n\n\t\t\t\t\"You ready for this?\" she asks, and you can tell she means it. She's not asking because she feels obliged to, but because this is your last chance to express any concerns about the plan.\n\n\t\t\t\tYou nod agreeingly.\n\n\t\t\t\t\"Good,\" she says with a smirk. \"I'm trying to think of a pun involving Buzzers but it's not going great. You think of one after, you let me know, alright?\"\n\t\t\t\t*page_break\n\t\t\t\tThe sound of buzzing intensifies as you slip through the fence on the far side of Black Vein. The fence circles widely around it, leaving long empty spaces between shattered wooden homes. Even amid the destruction, you can see why someone might want to settle down here. Sure, the ground is craggy and unfit for crops, and there are mutant bugs flying around, but there's so much space to grow.\n\n\t\t\t\tYou're still a fair distance away from the Buzzers. They cluster around a large building which you assume was once a barracks of some sort. It's the largest of the wooden structures by far, and the only one that's more than two stories. The other buildings, those that mostly survived, are largely two-floor homes.\n\n\t\t\t\tBuzzers rest on the ground around the barracks. Some cling oddly to the buildings, hanging sideways off the walls or resting on the rooftops.\n\n\t\t\t\tThe sight of them - their antennae and their many eyes and their grey wings who flit too fast to even see - sends chills up your spine. The hairs on your neck stand at attention, as if they are trying to sneak away before the fight. Such disgusting monsters, the Buzzers. No wonder they inspire such fear.\n\n\t\t\t\t\"Such a shame,\" says Olivia. \"They're kind of cute. Now remember. The queen's gonna be someplace in the nest and she's gonna be protected. So don't die until we get there.\"\n\n\t\t\t\tThen she opens fire, and your eardrums feel as if they're about to explode.\n\t\t\t\t*page_break\n\t\t\t\t*if Combat > 65\n\t\t\t\t\t*set Notoriety %+6\n\t\t\t\t\t*set Health %-4\n\t\t\t\t\tThe recoil of the gun, the faint scent of gunpowder, the shrieking shots rattling in your ears. These are familiar, comfortable things in a world so chaotic. They are the only constant in a life of wandering, and they are a punishment for the sickening Buzzers.\n\n\t\t\t\t\tYour sight goes red as you open fire on the startled Buzzers. Nothing else seems to exist except you, your bullets, and your targets. They scatter at first, startled by your assault, and flit about aimlessly. Then they seem to recover their wits, even as bullets shatter their exoskeletons and white bile spills out.\n\n\t\t\t\t\tThe first of the massive moths fall, riddled with lead and white bile smelling of blood. The rest, however, turn to you and Olivia.\n\n\t\t\t\t\tYou never stop shooting. Even as you try to find cover, as you try to step back, as you try to get away, you just keep shooting. The moments in between shots or those when you must reload are the most hair raising and the most terrifying, and you thank your lucky stars that this has become muscle-memory.\n\n\t\t\t\t\tThe Buzzers swarm you, revealing thick stingers on their hides. The buzzing is nearly as deafening as the gunfire and you doubt you'll ever be able to hear anything else, ever again. Their fuzzy antennae nearly touch you, their so close, and every step you take is the choic between survival and their serrated stingers.\n\n\t\t\t\t\tThen a sharp pain erupts in your side and you fall to the ground, silently wishing you'd chosen a different plan of attack. Your cries ring out as you shoot desperately at the Buzzers, hoping you'll finally get a lethal shot. The world is jumbled as they assault you with their stingers. Perhaps one perhaps four or five, you can't see anything beyond the grey of their buzzing wings.\n\n\t\t\t\t\tThe noise stops. The Buzzer falls dead, half on your legs, as you crawl away, leaving a slight trail of blood. Olivia places a victorious boot on the monster's surprisingly frail hide, and it trembles beneath her armor's weight. \n\n\t\t\t\t\tAll the Buzzers are dead, though some still twitch oddly in the breeze. A chill runs up your arms, not from the breeze but from the loss of adrenaline. It's like the world was muted and now sound as returned, and your ears still ring from its absence.\n\n\t\t\t\t\t\"Pretty good in a fight,\" she says, pulling you up by the arm. \"But there's still more work to be done.\"\n\t\t\t\t\t*goto combat-moth\n\n\t\t\t\t*else\n\t\t\t\t\t*set Notoriety %+2\n\t\t\t\t\t*set Health %-22\n\t\t\t\t\tThe recoil of the gun, the faint scent of gunpowder, the shrieking shots rattling in your ears. These are familiar, comfortable things in a world so chaotic. They are the only constant in a life of wandering, and they are a punishment for the sickening Buzzers.\n\n\t\t\t\t\tYour sight goes red as you open fire on the startled Buzzers. Nothing else seems to exist except you, your bullets, and your targets. They scatter at first, startled by your assault, and flit about aimlessly. Then they seem to recover their wits, even as bullets shatter their exoskeletons and white bile spills out.\n\n\t\t\t\t\tThe first of the massive moths fall, riddled with lead and white bile smelling of blood. The rest, however, turn to you and Olivia.\n\n\t\t\t\t\tYou never stop shooting. Even as you try to find cover, as you try to step back, as you try to get away, you just keep shooting. The moments in between shots or those when you must reload are the most hair raising and the most terrifying, and you thank your lucky stars that this has become muscle-memory.\n\n\t\t\t\t\tThe Buzzers swarm you, revealing thick stingers on their hides. The buzzing is nearly as deafening as the gunfire and you doubt you'll ever be able to hear anything else, ever again. Their fuzzy antennae nearly touch you, their so close, and every step you take is the choic between survival and their serrated stingers.\n\n\t\t\t\t\tThen a sharp pain erupts in your side and you fall to the ground, silently wishing you'd chosen a different plan of attack. Your cries ring out as you shoot desperately at the Buzzers, hoping you'll finally get a lethal shot. The world is jumbled as they assault you with their stingers. Perhaps one perhaps four or five, you can't see anything beyond the grey of their buzzing wings.\n\n\t\t\t\t\tThe noise stops. The Buzzer falls dead, half on your legs, as you crawl away, leaving a slight trail of blood. Olivia places a victorious boot on the monster's surprisingly frail hide, and it trembles beneath her armor's weight. \n\n\t\t\t\t\tAll the Buzzers are dead, though some still twitch oddly in the breeze. A chill runs up your arms, not from the breeze but from the loss of adrenaline. It's like the world was muted and now sound as returned, and your ears still ring from its absence.\n\n\t\t\t\t\t\"Pretty good in a fight,\" she says, pulling you up by the arm. \"But there's still more work to be done.\"\n\t\t\t\t\t*label combat-moth\n\t\t\t\t\t*page_break\n\t\t\t\t\tThe sight of so many Buzzer corpses is not a sorry sight. The world is better for their loss. Their stiff carcasses rise like coral from the grey asphalt sea and the ground runs thick with surprising gallons of
