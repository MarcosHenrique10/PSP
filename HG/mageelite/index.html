until now.\n\t\t\t\t\t\t*goto books\n\t\t\t\t\t*selectable_if (true = false) #Read: Mages in society\n\t\t\t\t\t\t*goto books\n\t\t\t\t\t*selectable_if (true = false) #Read: Magic crystals\n\t\t\t\t\t\t*goto books\n\t#Simulation room (!)\n\t\t*label simulation_room\n\t\t*page_break\n\t\t\n\t\tThis area was filled with large devices that one could freely enter to leave reality behind.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if ((chapter1_injured != \"Arth\") and (chapter1_arth_event_activated = \"no\")) #Talk: Arth (!)\n\t\t\t\t\n\t\t\t\tInside one of them was someone quite familiar to you: Arth.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tHe appeared to be in a simulated close combat scenario against several Rush Type Zenos at once. It was probably to be better prepared for a scenario like the one you had faced during the aptitude test. It was also slightly nostalgic, as you had spent a lot of time in similar simulations in your childhood.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tArth seemed to ignore you, or perhaps he didn't even notice you. Should you try this simulated training anyway?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter1_arth_event_activated \"yes\"\n\t\t\t\t\t\t*set arth +10\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t*set conscientiousness +1\n\t\t\t\t\t\t[i]Bond with Arth improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Conscientiousness increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou quietly entered the device next to Arth.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tUnexpectedly, not only did you join the same virtual world as Arth, but even the exact same scenario: in front of you was clearly Arth fighting several Rush Type Zenos that were surrounding him.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt didn't seem necessary to intervene as he looked rather happy in the challenging situation he found himself in.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tNot that you could have helped him even if you wanted to... because dozens of Rush Type Zenos suddenly appeared all around you. Not only that, but they all immediately attacked you extremely aggressively. More so than even the real Zenos from the aptitude test did!\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tHowever, it was not an issue for you. Since you were alone and not even in the real world, you could completely freely unleash various spells to deal with all the Zenos. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn theory, the situation was more difficult than the one in the aptitude test... but that wasn't actually the case at all. There was no risk of friendly fire or of getting injured, so there were no limits on what you could achieve.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs all the Zenos were finally dead on the ground, you accidentally locked eyes with Arth. He had also survived his simulated battle without a scratch, and was surrounded by almost a mountain of corpses.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn the end, it looked like Arth nodded at you approvingly, but then he simply entered another combat scenario.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou both continued fighting simulated battles for quite a while longer.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou felt that you had gotten a little closer to him. That was certainly not a bad thing when you might have to entrust your life to him during combat in the future.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto before_roam_menu\n\t#Research area (!!!)\n\t\t*if (chapter1_met_zavier = \"no\")\n\t\t\tThis place... felt familiar, but alien at the same time.\n\t\t\t\n\t\t\t\n\t\t\tIt reminded you of your childhood as a glorified guinea pig. Many years were spent in a similar facility without any opportunity to leave. Even now, your new freedom still felt like a dream that could be taken away at any moment.\n\t\t\t\n\t\t\t\n\t\t\tHowever, it was also different. This place likely had nothing top secret being researched. The security measures were far too relaxed for that. It felt much more approachable compared to the classified area under the academy.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t\"Subject Zero! I'm glad to see you're enjoying your new life. Or do you miss the old days?\"\n\t\t\t\n\t\t\t\n\t\t\tYou were too shocked to speak for a brief moment. In front of you stood one of the main people responsible for your childhood lifestyle: professor Zavier. What was he doing here now?\n\t\t\t\n\t\t\t\n\t\t\t*if (chapter1_last_zenos_alive = \"yes\")\n\t\t\t\t\"Good job on keeping one of the Zenos specimens alive after the aptitude test. I'll leave it here for you to experiment your magic on. Since it's wounded and restrained, there is no risk whatsoever.\"\n\t\t\t\n\t\t\t*if (chapter1_last_zenos_alive = \"no\")\n\t\t\t\t\"It was a shame that you killed off every Zenos specimen in the aptitude test. Otherwise, I was planning to donate the rest to you for magic experiments. Oh well. You will be able to test your magic in combat soon enough.\"\n\t\t\t\n\t\t\t\n\t\t\tWithout elaborating any further, he simply walked into an elevator that seemed to be headed underground and left the laboratory.\n\t\t\t\n\t\t\t*set chapter1_met_zavier \"yes\"\t\n\t\t\n\t\tYou didn't feel like spending any extra time here would end up being beneficial for your mental stability...\n\t\t\n\t\t*choice\n\t\t\t#Leave\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter1_last_zenos_alive = \"yes\") #Experiment: Rush Type Zenos\n\t\t\t\t\n\t\t\t\tRegardless, you slowly approached the captured Rush Type Zenos. It was motionless, restrained and looked barely alive.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]Magic spells available to cast[/i]:\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Drain Magic[/b]: Drains a living being's life force to increase your magical power. [i]Generated by Machiavellianism.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Mind Break[/b]: Increases your own mental stability by slowly destroying the mind of your target. [i]Generated by Self-Absorption.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Curse of Pain[/b]: Kills a living being very slowly while delaying their death. [i]Generated by Sadism.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Flame Shower[/b]: Creates a pillar of fire that burns everything in the targeted spot. [i]Generated by Ruthlessness.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Mind Probe[/b]: Reads surface-level thoughts of a living target. [i]Generated by Openness.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Numb Senses[/b]: Removes the sensation of pain from a living being for several days. [i]Generated by Compassion.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Leave\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t#Drain Magic\n\t\t\t\t\t\t*set machiavellianism +3\n\t\t\t\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t\t\t\t[i]Machiavellianism increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt would be wasteful to simply kill the Zenos.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tInstead, you decided to drain it for magical power. It couldn't do anything to resist as you took its remaining life force away. In the end, it was clearly already dead.\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t#Mind Break\n\t\t\t\t\t\t*set selfabsorption +3\n\t\t\t\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t\t\t\t[i]Self-Absorption increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt would be wasteful to simply kill the Zenos.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tInstead, you decided to experiment with mental magic. It couldn't do anything to resist as you caused it to slowly die in agony. In the end, it was clearly already dead.\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t#Curse of Pain\n\t\t\t\t\t\t*set sadism +3\n\t\t\t\t\t\t*set ruthlessness +2\n\t\t\t\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t\t\t\t[i]Sadism and Ruthlessness increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt would be wasteful to simply kill the Zenos.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tInstead, you decided to experiment with curse magic. It couldn't do anything to resist as you caused it to slowly die in agony. In the end, it was clearly already dead.\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t#Flame Shower\n\t\t\t\t\t\t*set ruthlessness +3\n\t\t\t\t\t\t*set sadism +2\n\t\t\t\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t\t\t\t[i]Ruthlessness and Sadism increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou decided to simply kill the Zenos. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt couldn't escape anywhere as you created a pillar of fire that had soon burned it to ashes.\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t#Mind Probe\n\t\t\t\t\t\t*set openness +3\n\t\t\t\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t\t\t\t[i]Openness increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tDespite being reduced to such a state, the Zenos still made you feel a little curious.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou decided to probe its mind for a while. Unfortunately, it didn't seem to be thinking about anything. Wasn't it despairing about its future...? Apparently not. You could only give up on trying to get anything out of it.\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t#Numb Senses\n\t\t\t\t\t\t*set ruthlessness -5\n\t\t\t\t\t\t*set selfabsorption -3\n\t\t\t\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t\t\t\t[i]Empathy and Compassion increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tEven a Zenos caused you to feel some sympathy after it was reduced to such a state.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tInstead of torturing it anymore, you decided to numb its senses so that its inevitable death would be painless.\n\t\t\t\t\t\t*goto before_roam_menu\n\t#Training area (!)\n\t\t*label training\n\t\t*page_break\n\t\t\n\t\tThese halls reminded you of an area meant for training martial arts.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if ((chapter1_injured != \"Sera\") and (chapter1_sera_event_activated = \"no\")) #Talk: Sera (!)\n\t\t\t\t\n\t\t\t\tThe area was mostly empty, but you quickly noticed Sera practicing her magic spells far from the entrance. She was apparently focusing on casting Area Barriers.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you walked closer to her, she appeared a little surprised at first, but then smiled hesitantly.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"Would you like to practice magic together with me? I was impressed by your magic in the aptitude test, so it looks like I still have a lot to learn.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter1_sera_event_activated \"yes\"\n\t\t\t\t\t\t*set sera +10\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t*set conscientiousness +1\n\t\t\t\t\t\t[i]Bond with Sera improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Conscientiousness increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I just happen to have a little more magical power than most. You were also very impressive by starting to cast so fast in such a shocking situation.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Oh, don't flatter me. But I'm glad you said so. After all, barrier magic is my specialty.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs if to prove her words, Sera continued casting Area Barriers around her. They were decently impressive, although unfortunately, they somewhat paled in comparison to the Area Barriers you were able to create.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou kept practicing various spells with Sera, although mostly Area Barriers, for quite a while in the training area. It almost felt like a dance or perhaps a choreographed duel. Eventually it did seem like her barriers were slightly stronger than at the start.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto before_roam_menu\n\t#Park (!!!)\n\t\t*label park\n\t\t*page_break\n\t\t\n\t\tThe academy's park was not that large, but students walked through it quite often on their way to somewhere else.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter1_will_event_activated = \"no\") #Talk: Will (!!!)\n\t\t\t\t*set chapter1_met_will \"yes\"\n\t\t\t\tAs you walked around the park, you surprisingly found Will in a very remote and isolated part of the area.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tHe looked nothing like his appearance during the attitude test. Instead of the earlier relatively confident and friendly attitude, it actually looked like he was in despair.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFinally it seemed like he noticed your presence. At first, his eyes widened in shock, but then he appeared to relax.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"If it's you, then I don't actually mind. This is the truth about me. It may be better if you know that I'm deathly afraid of the Zenos. I thought it might be fine if we fight them from the air, but this... I'm not sure if I can deal with close combat after all. The solution I came up with was to inhale some magic crystal powder to... increase my imagination to generate more spells? In truth, it's mainly to calm my mind. Do you want to try it with me?\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter1_will_event_activated \"yes\"\n\t\t\t\t\t\t*set will +10\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t*set conscientiousness -1\n\t\t\t\t\t\t[i]Bond with Will improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Spontaneity increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tMagic crystal powder wasn't exactly a narcotic, but it wasn't wrong to call it a drug either. It affected your thoughts in various ways, such as giving new ideas and removing unpleasant thoughts. It might not be a bad idea to try it out at least once. However, it was also somewhat addictive, so it wouldn't be a good idea to keep relying on it for too long. That would only create an infinite spiral of addiction and false thoughts that replaced your existing ones.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn any case, you decided to take the magic crystal powder that Will offered to you. As his classmate, it was better to be familiar with whatever he was going through.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt was a weird experience, to say the least. It almost felt like you were able to reach a higher plane of existence: one where magic was all that existed. In comparison, the mundane and painful normal reality... didn't feel all that important.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tOnce you felt your thoughts heading into a weird direction, you quickly cast a mental stabilization spell on yourself. That was enough for you already.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tOn the other hand, Will still seemed to be blissfully unaware of reality. You also cast a spell to swiftly snap him out of it. Fortunately, you were fast enough that a spell was still so effective on him. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tWill seemed to also somewhat realize that it wasn't a very useful solution for anxiety during real combat. If he became disinterested in his surroundings, it would only endanger him more.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn the end, you felt like you had gotten a little closer to him. That was certainly not a bad thing when you might have to entrust your life to him during combat in the future.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto before_roam_menu\n\t#Healing ward\n\t\t\n\t\tThe academy even had a high-quality hospital of its own.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter1_injured = \"Sera\") #Visit: Sera\n\t\t\t\tYou tried to visit the injured Sera, but she seemed to be still resting to recover her strength.\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter1_injured = \"Arth\") #Visit: Arth\n\t\t\t\tYou tried to visit the injured Arth, but he seemed to be still resting to recover his strength.\n\t\t\t\t*goto before_roam_menu\n\t*selectable_if ((chapter1_met_zavier = \"yes\") and (chapter1_met_will = \"yes\")) #Skip to next week (advance the story!)\n\t\tAre you ready to proceed? You will no longer be able to access any events specific to this week!\n\t\t*choice\n\t\t\t#No\n\t\t\t\t*goto before_roam_menu\n\t\t\t#Yes\n\t\t\t\t*goto after_roam_menu\n\t*selectable_if (true = false) #Examination hall\n\t\t*goto before_roam_menu\n\t*selectable_if (true = false) #Classified area\n\t\t*goto before_roam_menu\n\n*label after_roam_menu\n\n*page_break\n\nThe eventful start to your stay at the magic academy was soon over. Several days had passed spent on studying, lectures and practicing your magic, among other things.\n\n\nJust as you were starting to get used to your new life, bit by bit, something completely unexpected happened.\n\n\n*page_break\n\nIt started with an unnatural sound that suddenly buzzed in your personal room at night.\n\n\nAlmost immediately after, the room's door and window were broken down. Unknown people who had fully masked their faces and features rushed into the room from both directions.\n\n\nYou reacted by...\n\n\n[i]Magic spells available to cast[/i]:\n\n\n[b]Personal Barrier[/b]: Absorbs all forms of damage directed at your body at the expense of your own magical power. [i]Generated by Masochism, Closedness and Introversion.[/i]\n\n\n[b]Paralyze[/b]: Freezes all non-essential muscles in the bodies of humans in your line of sight. [i]Generated by Disagreeableness.[/i]\n\n\n[b]Chain Lightning[/b]: Hits a visible target with a lethal electric shock that immediately jumps to another similar target within a range of 5 meters (ignoring yourself) until all reachable targets have been shocked once. [i]Generated by Ruthlessness.[/i]\n\n*choice\n\t#casting Personal Barrier\n\t\t*set sadism -1\n\t\t*set agreeableness -1\n\t\t*set introversion +1\n\t\t*set openness -1\n\t\t[i]Masochism, Disagreeableness, Closedness and Introversion increased.[/i]\n\t\t\n\t\t\n\t\tYou immediately cast a Personal Barrier spell to protect yourself. It was the safest option considering all possible outcomes.\n\t\t\n\t\t\n\t\tFor some reason, the spell didn't activate correctly. The barrier began to materialize, but never completed itself fully.\n\t\t\n\t\t\n\t\t\"Looks like you have some fighting spirit, but you had the wrong opponent this time.\"\n\t\t*goto after_chapter1end_choice\n\t#casting Paralyze\n\t\t*set agreeableness -3\n\t\t[i]Disagreeableness and Sadism increased.[/i]\n\t\t\n\t\t\n\t\tYou immediately cast a Paralyze spell to disable the intruders. It was safer to prevent them from doing anything for now.\n\t\t\n\t\t\n\t\tFor some reason, the spell didn't activate correctly. It began to materialize, but never fully launched.\n\t\t\n\t\t\n\t\t\"Looks like you have some fighting spirit, but you had the wrong opponent this time.\"\n\t\t*goto after_chapter1end_choice\n\t#casting Chain Lightning\n\t\t*set agreeableness -2\n\t\t*set ruthlessness +3\n\t\t*set sadism +2\n\t\t[i]Disagreeableness, Sadism and Ruthlessness increased.[/i]\n\t\t\n\t\t\n\t\tYou immediately cast a Chain Lightning spell to take out the hostiles.\n\t\t\n\t\t\n\t\tFor some reason, the spell didn't activate correctly. It began to materialize, but never fully launched.\n\t\t\n\t\t\n\t\t\"Looks like you're a real piece of work, but you had the wrong opponent this time.\"\n\t\t*goto after_chapter1end_choice\n\t#putting your hands in the air\n\t\t*set agreeableness +3\n\t\t*set sadism -3\n\t\t[i]Agreeableness and Masochism increased.[/i]\n\t\t\n\t\t\n\t\tYou immediately surrendered your fate to the whims of these intruders. It was safer not to provoke them.\n\t\t\n\t\t\n\t\t\"Looks like you know your place, mage. I hope the rest of your so-called elite class are as obedient.\"\n\t\t\n\t\t\n\t\t*goto after_chapter1end_choice\n\n*label after_chapter1end_choice\n\nWithout any further delay, one of them aimed a weapon-like device at you.\n\n\nThere was no time left to react... everything faded to black as you fell to the ground.\n\n[b]Chapter 1 End[/b]\n\n*check_achievements\n*if not(choice_achieved_chapter1)\n\t*achieve chapter1\n\n*finish", "chapter2": "*advertisement 1200\n[b]Chapter 2: Week 23, 2031[/b]\n\n\nEventually, you woke up in a space without any light or sound. \n\n\nThe weird buzzing sound from before was gone, and it felt like you could use magic properly again. The walls around you radiated magical power, though, so they were likely very resistant to spells.\n\n\nIt seemed quite clear that you had been captured and imprisoned here, for some reason. It was impossible to say when the situation would change.\n\n\nHow should you spend your time until then?\n\n*choice\n\t#Practice your magic spells\n\t\t*set conscientiousness +1\n\t\t*set neuroticism -1\n\t\t[i]Conscientiousness and Stoicism increased.[/i]\n\t\t\n\t\t\n\t\tSince there wasn't anything better to do, it should be useful to spend this time in preparation for future fights.\n\t\t*goto after_imprisoned_choice\n\t#Rest\n\t\t*set agreeableness +1\n\t\t*set neuroticism -1\n\t\t[i]Stoicism and Agreeableness increased.[/i]\n\t\t\n\t\t\n\t\tSince there wasn't much to do, it should be useful to spend this time resting to improve your condition.\n\t\t*goto after_imprisoned_choice\n\t#Observe your surroundings\n\t\t*set introversion +1\n\t\t*set conscientiousness +1\n\t\t[i]Conscientiousness and Introversion increased.[/i]\n\t\t\n\t\t\n\t\tSince there wasn't anything better to do, it should be useful to spend this time preparing for a possible emergency.\n\t\t*goto after_imprisoned_choice\n\t#Try to break the walls\n\t\t*set neuroticism +1\n\t\t*set conscientiousness -1\n\t\t[i]Neuroticism and Spontaneity increased.[/i]\n\t\t\n\t\t\n\t\tIt wasn't totally guaranteed that it was impossible to escape, no matter how slim the odds appeared.\n\t\t\n\t\t\n\t\tYou tried various spells that might have some effect on the walls, but nothing seemed to work, and eventually you simply had to give up.\n\t\t*goto after_imprisoned_choice\n\n*label after_imprisoned_choice\n\n*page_break\n\nSeveral hours later, the same buzzing noise from earlier returned. It was a sure sign that someone was nearby.\n\n\nAs expected, someone quickly entered the room.\n\n\n\"I see you've accepted your fate, mage. Follow me.\"\n\n\nSeveral other unknown people also entered the room and started dragging you along. Who exactly were they...?\n\n*page_break\n\nSoon you could see the other members of your class in front of you. They appeared to be uninjured, which was the first good news since you went to sleep last night.\n\n\n\"Now that you're all here, I'll explain what this is about. In short: this is part of your special training. We're from the AMA. Our purpose is to have you learn how to fight against human opponents.\"\n\n\nThe Anti-Magic Agency of New Washington... It was not an organization that appeared much in public, but every mage had at least heard about it. So this was how they acted. Their methods weren't exactly subtle.\n\n\n\"We'll soon begin a practical demonstration. I'd suggest to focus on protecting your minds from mental attacks while you can still cast spells freely. I'll point out that the main weapon against mages is mental jamming.\"\n\n\nThe agent who kept speaking disappeared after saying what he had to say. Silence descended on the room.\n\n\nMaria immediately looked in your direction. As if following her example, the others also turned to look at you. Sera seemed to want to say something at first, but then apparently chose to stay quiet. Perhaps being easily captured like this had weakened their mental states.\n\n\nHow should your class approach the fight?\n\n*choice\n\t#Focus on everyone's personal mental protection\n\t\t*set introversion +3\n\t\t[i]Introversion increased.[/i]\n\t\t\n\t\t\n\t\tSince they all seemed to expect you to make a decision in this situation, it was hardly possible to stay indecisive. Otherwise you might just be immediately crushed in battle.\n\t\t\n\t\t\n\t\t\"Quickly cast mental barriers on yourselves! Then shield us from any physical attacks!\"\n\t\t\n\t\t\n\t\tEveryone followed your swift decision and started casting their spells. Will seemed to have some trouble, but he also managed to cast some kind of a barrier. \n\t\t\n\t\t\n\t\tImmediately after, the annoying buzzing noise returned. Along with it, five AMA agents rushed toward you with their gun-like weapons raised. However, Sera had already started forming an Area Barrier in front of them, and Arth had stepped forward while radiating magical power to block them too. This plan of mental shielding was clearly working as intended.\n\t\t\n\t\t\n\t\tIn this scenario, your opponents were practically helpless. It took no time at all to disable them with a simple Paralyze spell.\n\t\t\n\t\t\n\t\tYou had won almost as quickly as the fight had started.\n\t\t\n\t\t*goto after_ama_duel_choice\n\t#Focus on shielding the whole party together\n\t\t*set introversion -3\n\t\t[i]Extroversion increased.[/i]\n\t\t\n\t\t\n\t\tSince they all seemed to expect you to make a decision in this situation, it was hardly possible to stay indecisive. Otherwise you might just be immediately crushed in battle.\n\t\t\n\t\t\n\t\t\"Sera, cast a mental barrier on us! Arth, shield us from physical attacks! Others, be ready to fight!\"\n\t\t\n\t\t\n\t\tEveryone followed your swift decision and started casting their spells.\n\t\t\n\t\t\n\t\tImmediately after, the annoying buzzing noise returned. Along with it, five AMA agents rushed toward you with their gun-like weapons raised. However, the buzzing noise no longer appeared to have any effect, and Arth had stepped forward while radiating magical power to block them. This plan of mental shielding was clearly working as intended.\n\t\t\n\t\t\n\t\tIn this scenario, your opponents were practically helpless. It took no time at all to disable them with a simple Paralyze spell.\n\t\t\n\t\t\n\t\tYou had won almost as quickly as the fight had started.\n\t\t\n\t\t*goto after_ama_duel_choice\n\n*label after_ama_duel_choice\n\n*page_break\n\nThe agent who dragged you here in the first place appeared again after the battle was over.\n\n\n\"A splendid result. I'm sure there won't be great difficulties even if you need to fight anti-mages during your tasks. Be prepared, since you'll be sent to the Arctic for a special mission in a few days. You're free to leave now.\"\n\n\nAs quickly as they had appeared, they all swiftly disappeared from your sight.\n\n*page_break\n\nSera suddenly gazed at you directly.\n\n\n\"I've started to think that it might be best if you led us during combat. Your magical power is certainly the greatest among us, but not only that. You seem knowledgeable about fighting, too.\"\n\n\nYour reaction was to...\n\n*choice\n\t#humbly accept\n\t\t*set neuroticism -1\n\t\t*set agreeableness +1\n\t\t[i]Agreeableness and Stoicism increased.[/i]\n\t\t\n\t\t\n\t\t\"I agree, but it's only a slight difference in power and experience. I'm sure we'll all keep growing stronger together.\"\n\t\t\n\t\t\n\t\tNobody really seemed to have any objections.\n\t\t\n\t\t*goto after_reaction_choice\n\t#respond with bold approval\n\t\t*set agreeableness -2\n\t\t*set selfabsorption +1\n\t\t[i]Disagreeableness and Self-Absorption increased.[/i]\n\t\t\n\t\t\"I agree, and for your information, I've never even shown you my full abilities. Your judgment is more correct than you realize.\"\n\t\t\n\t\t\n\t\tNobody really seemed to have objections, although Sera and Arth looked perhaps mildly annoyed.\n\t\t\n\t\t*goto after_reaction_choice\n\t#avoid the issue\n\t\t*set agreeableness +1\n\t\t*set openness -1\n\t\t*set neuroticism +1\n\t\t[i]Agreeableness, Neuroticism and Closedness increased.[/i]\n\t\t\n\t\t\n\t\t\"I still think nobody should be above the others among us. Let's make our decisions together depending on the situation.\"\n\t\t\n\t\t\n\t\tA slightly awkward silence followed, but nobody seemed to really have objections.\n\t\t\n\t\t*goto after_reaction_choice\n\n*label after_reaction_choice\n\n*page_break\n\n[i]Bonds with Maria, Will, Sera and Arth improved.[/i]\n\n*set maria +10\n*set will +10\n*set sera +10\n*set arth +10\n\nIn the end, all of you left the classified area together. Perhaps this shared experience had improved the atmosphere within the class, to some extent.\n\n\nNow you simply had to wait until the previously mentioned Arctic mission was ready to start.\n\n*page_break\n\n*set event_points 2\n\n*label before_roam_menu\n\n*page_break\n\n[i]! = important story event available[/i]\n\n\nEvent Points left for this week: [b]${event_points}[/b] / 2\n\n*choice\n\t#Bulletin board\n\t\t[i]Theoretical exams will be held next week. Remember to study in advance![/i]\n\t\t\n\t\t\n\t\t[i]Entry outside the academy for students is limited for a while longer.[/i]\n\t\t\n\t\t\n\t\t[i]New Vladivostok exchange students are forbidden entry to the academy until further notice due to suspicions of espionage.[/i]\n\t\t\n\t\t*goto before_roam_menu\n\t#Library (new books - some important information!)\n\t\t*label library\n\t\t*page_break\n\t\t\n\t\tThe library was filled with people quietly reading their books.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t#Examine: Books\n\t\t\t\t*label books\n\t\t\t\t*page_break\n\t\t\t\tCertain interesting books were available at the moment.\n\t\t\t\t*choice\n\t\t\t\t\t#Return\n\t\t\t\t\t\t*goto library\n\t\t\t\t\t#Read: Zenos forces\n\t\t\t\t\t\t[b]Rush Type Zenos[/b]: The first known type of Zenos. They were first seen in 2011, shortly after the appearance of the First Nest. They were extremely deadly and difficult-to-kill predators, immediately causing countless deaths and wiping out several countries. Humanity mainly relied on carpet bombing them from the air, eventually even with strategic nuclear weapons, to keep their advance in check, but they were never delayed for that long. Their numbers only kept growing as the devastation caused by them increased. The discovery of magic in 2012 was a major turning point that made them far less dangerous overall. Their appearance reminded many of human-sized ants.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Armor Type Zenos[/b]: The second known type of Zenos. They were first seen in 2012, after the First Nest had been bombed with dozens of strategic nuclear weapons. They were practically immune to all conventional forms of damage, and even nuclear weapons barely slowed them down. Magic spells were realistically the only way to even delay their movements significantly. Fortunately, they moved very slowly, or humanity would have perished soon after their appearance. The exception was their ability to charge at extreme speeds if they saw an enemy they wanted to kill. Their appearance reminded many of building-sized cockroaches.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Flying Type Zenos[/b]: The third known type of Zenos. They were first seen in 2030 around the First Nest; instantly causing major alarm among humanity. However, they have never left the continent of Africa until now. If their numbers or levels of aggression ever increased, humanity would be in great peril, since they could directly attack the three floating cities as well as any airborne mages. Fortunately, they have never been seen using ranged attacks, although their mobility was by far the highest among all types of Zenos. Their appearance reminded many of building-sized mosquitoes.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Nests[/b]: The most mysterious thing about the Zenos were their Nests. These massive underground structures originally came from space and descended deep into the ground upon arrival. The First Nest was located in Africa, the Second Nest in Asia and the Third Nest in South America. The largest of them was the First Nest, and it was also the only Nest known to have created any Flying Type Zenos. The primary goal for humanity had always been destroying the Nests, but all attempts so far had failed. Their surfaces were extremely thick and practically immune to damage, including even magical attacks. Not to mention that they were guarded by extreme amounts of Zenos forces.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Zenos goals[/b]: It's unclear exactly why the Zenos invaded our planet or even where they came from. What's clear is that they were hostile to all life on the planet, destroying everything in their path without exceptions. They seemed fully focused on attacking any life forms and completely uninterested in inorganic matter.\n\t\t\t\t\t\t*goto books\n\t\t\t\t\t#Read: Birth of magic\n\t\t\t\t\t\tMagic was first discovered in 2012; soon after the Zenos invasion began.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe material known now simply as [b]magic crystals[/b] can only be created by the Zenos. It is not public knowledge how they're produced or how they work, but the end result is that magic spells can be cast by touching these crystals and imagining something happening in one's environment. Possible spells and their effectiveness are affected by several factors such as the caster's magical power, imagination, personality, environment and the quality of available magic crystals.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tSince especially [b]Armor Type Zenos[/b] are practically immune to all forms of damage except magic, mages are by far the most important military asset for humanity. That is doubly the case considering the Zenos lack efficient anti-air capabilities, and magic enables potentially devastating air-to-ground attacks.\n\t\t\t\t\t\t*goto books\n\t\t\t\t\t#Read: The three cities\n\t\t\t\t\t\tBefore North America was finally overrun by the Zenos in 2018, humanity had managed to execute several plans to avoid total extinction.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe most important among these plans was the creation of three large artificial islands that floated in the air. This was only possible by expending large amounts of magical power, but it was the only way left to save most of the remnants of humanity.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tA brand new metropolis was built on each of these flying islands. New Washington was mostly occupied by Americans as well as various gifted mages, scientists and most of humanity's remaining military forces. New Vancouver attracted most Canadians, British and Australians as well as various influential or talented civilians from around the world. New Vladivostok consisted of refugees from all around the world, but most survivors were from either Russia or China.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhile the surface of Earth was mostly destroyed by the Zenos, the three cities have remained relatively safe until now.\n\t\t\t\t\t\t*goto books\n\t\t\t\t\t#Read: Mages in society\n\t\t\t\t\t\tMages were always a very privileged class of people. From the start, they had powerful special abilities and rights incomparable to non-mages. It was even easy to earn a lavish standard of living with minimal effort just by using spells.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tHowever, depending on the situation, it hasn't always been that great to be a mage. The worst part has undoubtedly been mandatory enlistment to join the war against the Zenos. A large share of all mages have died over the years due to that duty alone. In addition, mages have never had much privacy; governments have always been paranoid about their powers, and so they've been monitored closely everywhere they went.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tNew Washington has been the best environment for mages in history. Public attitudes to mages have always been more friendly than elsewhere, and it hasn't been that common to be drafted to war recently either.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn New Vancouver, and especially in New Vladivostok, there have been more restrictions and requirements for mages. New Vladivostok has never even allowed mages to move freely without supervision.\n\t\t\t\t\t\t*goto books\n\t\t\t\t\t#Read: Magic crystals\n\t\t\t\t\t\tMagic crystals are the most important resource of the post-Zenos world. Without them, much of modern technology simply wouldn't work anymore, not to mention how important they were for mages to cast spells. Simply the existence of the three flying cities consumed a huge amount of magic crystals daily.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tMost magic crystals had been collected from Zenos corpses over the years, but another method was also developed: harvesting magic crystals from the oceans. Two floating bases were built in the Arctic mainly for this purpose, as the Zenos rarely entered the Arctic areas. This method was relatively slow, but much safer than fighting the Zenos, which also consumed magic crystals during the collection process.\n\t\t\t\t\t\t*goto books\n\t#Simulation room (!)\n\t\t*label simulation_room\n\t\t*page_break\n\t\t\n\t\tThis area was filled with large devices that one could freely enter to leave reality behind.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter2_will_event_activated = \"no\") #Talk: Will (!)\n\t\t\t\t\n\t\t\t\tInside one of them was someone familiar: Will.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tHe appeared to be in a simulated ranged combat scenario against several Rush Type Zenos, and having some difficulties. He didn't seem to notice you at all.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tShould you support him in his effort?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter2_will_event_activated \"yes\"\n\t\t\t\t\t\t*set will +10\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t*set agreeableness +1\n\t\t\t\t\t\t[i]Bond with Will improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Agreeableness increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou quietly entered the device next to Will and joined his combat scenario.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tWill immediately noticed your entry and appeared surprised for a moment, but then became overjoyed.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I've been training here virtually to reduce my fear of the Zenos. It's a bit easier to get used to it since I know it's not real.. but I'd be happy if you can help me!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tDid he mean mental or physical support? Well, that's what you had joined the scenario for.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tFour Rush Type Zenos were already approaching you two from the distance. They had clearly been slowed down by some spell from Will, but their approach was still worryingly speedy.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou swiftly boosted Will's magical power to help him out.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tEncouraged by your help, Will continued casting with even more intensity. The Zenos seemed to be hit hard, and they slowed down to a great extent. Moving forward seemed to be a painful experience for them now.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tOne by one, all the enemy Zenos completely stopped moving. The area was soon filled with silence.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt turned out to be an easy victory for you and Will, and Will seemed clearly more stable than at the start too.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou continued fighting more simulated battles together for a while longer. As you fought, Will seemed to lose some of his fears over time.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto before_roam_menu\n\t#Research area (!)\n\t\t*label research_area\n\t\t*page_break\n\t\t\n\t\tThis area still felt oddly unpleasant to you, even if not as unbearable as before.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter2_maria_event_activated = \"no\") #Talk: Maria (!)\n\t\t\t\t\n\t\t\t\tThe only other person around seemed to be someone you were quite familiar with: Maria. What could she possibly be looking for?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAlmost immediately, she noticed you as well. Her first reaction looked like pure shock. After apparently noticing it was you, her usual calm demeanor returned.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I've been studying this place for a while now. Do you want to look together?\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter2_maria_event_activated \"yes\"\n\t\t\t\t\t\t*set maria +10\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t*set selfabsorption -1\n\t\t\t\t\t\t[i]Bond with Maria improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Empathy increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tCurious about Maria's behavior, you decided to spend some time with her in the research area. It was just the two of you there.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"So, what brings you here?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tMaria seemed to ponder what she should say for a while.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The truth is that I'm an orphan. My parents were killed during the Zenos invasion, and I never even knew their faces. Now I'm doing all I can to study the Zenos. After going through the academy's library, I came here to find out possible extra information about experiments on them.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tThat was... quite a life story? It wasn't a bad thing to know more about her. It was certainly interesting that she was so serious. However, it would be difficult to reveal your own past just yet.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tSince there wasn't much else left to do, you soon left the place together with her, slightly closer than before.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto before_roam_menu\n\t#Training area\n\t\t*label training\n\t\t*page_break\n\t\t\n\t\tThese halls reminded you of an area meant for training martial arts.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t#Park (!)\n\t\t*label park\n\t\t*page_break\n\t\t\n\t\tWill was no longer pursuing his activities within the park, but instead you noticed... Arth?\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter2_arth_event_activated = \"no\") #Talk: Arth (!)\n\t\t\t\t\n\t\t\t\tArth was clearly not doing anything questionable; he was simply quietly sitting on the ground with his eyes closed.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIt looked like he was meditating by himself.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tShould you try this activity yourself?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto park\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter2_arth_event_activated \"yes\"\n\t\t\t\t\t\t*set arth +10\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t*set neuroticism -1\n\t\t\t\t\t\t[i]Bond with Arth improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Stoicism increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou quietly sat on the ground as well. Arth didn't seem to mind your presence in any way.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tAfter closing your eyes and clearing your thoughts somewhat, you could feel some peace and relaxation. It was pretty nice, actually.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tTime seemed to pass very quickly while you were being that relaxed. It was almost as if you fell asleep, but were still vaguely aware of reality.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tEventually you opened your eyes and looked around, but Arth was already gone. Maybe he didn't want to disturb you and simply left? Or he didn't care about you being there?\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tEither way, it didn't feel like you had wasted your time.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto before_roam_menu\n\t#Healing ward (!)\n\t\t\n\t\tThe academy even had a high-quality hospital of its own.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter2_sera_event_activated = \"no\") #Talk: Sera (!)\n\t\t\t\t\n\t\t\t\tAs soon as you walked in, you had noticed Sera. She was completely focused on healing several injured people around her.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tShould you try to help her?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter2_sera_event_activated \"yes\"\n\t\t\t\t\t\t*set sera +10\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t*set ruthlessness -1\n\t\t\t\t\t\t[i]Bond with Sera improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Compassion increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou quietly approached Sera.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tAfter a while, she finally noticed your presence. She never stopped casting her healing spells, though.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tApparently she was doing volunteer work to heal casualties of the war on the surface. In the past, she had been the youngest daughter of an influential family. Feeling aimless, she had started doing such volunteer activities to find new meaning for her life. She had never stopped since then.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou spent a relatively long time helping her by casting some healing spells of your own. There was barely any time to talk, but even so, it was an oddly nice way to spend time together.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tAlthough it was exhausting work, it did also end up feeling rewarding in its own way.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto before_roam_menu\n\t#Skip to next week (advance the story!)\n\t\tAre you ready to proceed? You will no longer be able to access any events specific to this week!\n\t\t*choice\n\t\t\t#No\n\t\t\t\t*goto before_roam_menu\n\t\t\t#Yes\n\t\t\t\t*goto after_roam_menu\n\t*selectable_if (true = false) #Examination hall\n\t\t*goto before_roam_menu\n\t*selectable_if (true = false) #Classified area\n\t\t*goto before_roam_menu\n\n*label after_roam_menu\n\n*page_break\n\nA couple of days passed in the blink of an eye.\n\n\nWhen the promised time came, your class was led to the city's airport. A large plane with special magic engines was already prepared for you. It should be able to travel around the planet within hours.\n\n\nWas it your imagination? No. As you looked back, professor Zavier was examining you carefully from the distance.\n\n*page_break\n\nIt was probably better to forget about him for now.\n\n\nAll five of you entered the plane quietly. There was a lot of room inside; it was clearly meant for dozens of passengers instead of only the current five.\n\n\nBut even with such an advanced vehicle, it would take several more hours to reach the Arctic.\n\n*choice\n\t#Play cards\n\t\t*set conscientiousness -1\n\t\t[i]Spontaneity increased.[/i]\n\t\t\n\t\t\n\t\tYou decided to relax for a moment while spending some time with the others. Arth apparently had something else to do, but everyone else participated to play various card games during the journey.\n\t\t\n\t\t*goto after_travel_choice\n\t#Practice magic\n\t\t*set conscientiousness +1\n\t\t*set neuroticism -1\n\t\t[i]Conscientiousness and Stoicism increased.[/i]\n\t\t\n\t\t\n\t\tYou decided to improve your spellcasting abilities in preparation for what lied ahead of you.\n\t\t\n\t\t*goto after_travel_choice\n\t#Rest\n\t\t*set neuroticism -1\n\t\t[i]Stoicism increased.[/i]\n\t\t\n\t\t\n\t\tYou decided to simply conserve your energy for now in order to be more focused when the time came to act.\n\t\t\n\t\t*goto after_travel_choice\n\t#Observe your surroundings\n\t\t*set introversion +1\n\t\t*set conscientiousness +1\n\t\t[i]Conscientiousness and Introversion increased.[/i]\n\t\t\n\t\t\n\t\tYou decided to to observe the surrounding areas for any signs of magical abnormalities.\n\t\t\n\t\t*goto after_travel_choice\n\n*label after_travel_choice\n\n*page_break\n\nHours later, you had finally reached the Arctic region. The sight below you appeared completely hostile to life: only frozen water was visible as far as you could see.\n\n\nHowever, that was actually a good thing in these times. The absence of life also meant that the Zenos had no real interest in attacking this area of the planet. That's also why two of the most important magic crystal harvesting and experimental bases were built here, relatively safe from the relentless Zenos attacks.\n\n\nThey were already barely visible from the plane. Two large man-made structures that looked like offshore oil rigs could be seen in the distance. One of them belonged to New Washington, and one of them belonged to New Vladivostok. Together they were responsible for a large share of humanity's annual magic crystal production.\n\n*page_break\n\n\"Something is wrong... the New Washington base is offline?\"\n\n\nMaria quickly noticed an abnormality. Not only that, but something was off about the second base too. Instead of being inactive, though, it seemed to be overwhelmed with activity.\n\n\nEven worse, communications seemed to be broken down for some reason. It was impossible to contact New Washington anymore.\n\n\n[i]New Vladivostok base calling for aid! If anyone is nearby, please help us evacuate our personnel. A large Zenos attack is quickly approaching and we have no hope of defending or evacuating the base at this rate. New Vladivostok will reward anyone who can help![/i]\n\n*page_break\n\nApparently you were still able to receive messages from the nearby base, though. It seemed clear that the New Washington base had already been evacuated, but the New Vladivostok base was in great peril.\n\n\nMaria looked like she was extremely focused on thinking about the situation.\n\n\n\"Everything about this is too strange. Did they know about the approaching attack when they sent us here? Why were we the only ones sent to the Arctic? Why are the communications not working?\"\n\n\nArth looked at the icy sea below with a thoughtful expression.\n\n\n\"The Zenos force feels like it's right below us, beneath the ocean floor. It's heading straight for the New Vladivostok base. Their large numbers radiate some sort of magical signal that's disrupting our connections to the outside world.\"\n\n\nNow that he mentioned it, it felt like he was correct. There was some sort of weird magical signal coming from the ocean.\n\n*page_break\n\n\"If that's the case, it's not something generally known to be possible... In any case, we should save the base, right? Shouldn't we be able to accomplish that with our own efforts? If it looks dangerous, we can just fly away by ourselves.\"\n\n\n\"Rather than that, I'd like to try hitting this Zenos army with our spells as an experiment... Does it really matter to us what happens to people from New Vladivostok? They've annoyed us many times before. Well, for this once, I'll listen to you though.\"\n\n\nArth looked at you and smiled. He didn't seem too concerned about how we would approach the situation. On the other hand, Maria seemed quite concerned about the fate of that base. Similarly, Sera was quick to favor helping them.\n\n\n\"Isn't it best to evacuate the base as fast as possible? The Zenos shouldn't attack it anymore if it's emptied. They're still humans, just like us, and risking their lives to harvest magic crystals for humanity to survive!\"\n\n\nWill seemed rather hesitant about that idea.\n\n\n\"Shouldn't we take full advantage of our air superiority? In this situation, we can safely bombard them with spells from the air and gain valuable experience for future battles. We may not be able to stop them, but we can take out lots of them without losing anything. And if you think about it, isn't that probably exactly why we were sent here in the first place? If we were meant to save them, why weren't more mages sent with us for support? In fact, I bet New Washington would be glad to gain a monopoly over magic crystal harvesting.\"\n\n\n\"That's just... are you sure you have a heart?\"\n\n\nSera and Will seemed to have the strongest opinions on this issue. Apparently Maria sided with Sera and Arth with Will, but neither of them advocated as strongly for their stances.\n\n\nIt was impossible to know what your mission here was meant to be now, or even more than that, what choice would ultimately bring the best results. Each potential course of action had certain merits...\n\n*choice\n\t#Bombard the Zenos from the air\n\t\t*set chapter2_nv_arctic_base_fate \"destroyed\"\n\t\t*set machiavellianism +3\n\t\t*set ruthlessness +3\n\t\t*set selfabsorption +2\n\t\t*set sadism +2\n\t\t[i]Machiavellianism, Ruthlessness, Self-Absorption and Sadism increased.[/i]\n\t\t\n\t\t\n\t\tSera and Maria seemed a little dissatisfied about your choice, but they also went along with it. Sera immediately started casting a spell that allowed your group to levitate in the air freely. Her personality seemed most suited to such a task, whereas Arth especially should prefer to focus on attacking the Zenos.\n\t\t\n\t\t\n\t\tThe Zenos weren't exactly visible to you, under the ocean, but their magical presence was getting stronger and stronger. So much so that Maria was soon able to start targeting them with her precise long-range attack spells. Eventually you, Arth and Will were also able to start hitting them with various spells. It was quite interesting to experience the effects of various spells on their forces so clearly.\n\n\n\t\tThis relentless bombardment continued to hit the Zenos forces without a shred of mercy. Rush Type Zenos formed the vast majority of their numbers, and they were easily wiped out by this method. However, the Armor Type Zenos appeared to withstand multiple hits from highly lethal spells.\n\t\t\n\t\t*page_break\n\t\t\n\t\tHundreds of Rush Type Zenos and even a couple of Armor Type Zenos had been slain by your combined spell barrage. It didn't really slow them down, though. They simply didn't seem to care about their losses and rushed forward greedily to reach the base in front of them.\n\t\t\n\t\t\n\t\tA while later, the endless tide of Zenos crashed directly against the Arctic base of New Vladivostok. It was soon consumed by darkness and collapsed into the ocean. Everyone left on it was surely already dead.\n\t\t\n\t\t\n\t\tThere was no end to them at all. For every Zenos that fell, ten more quickly took its place. With the Arctic base annihilated and your magical powers running out, it seemed dangerous to continue flying above the hungry Zenos horde any longer.\n\t\t\n\t\t*goto after_goal_choice\n\t#Evacuate the base\n\t\t*set chapter2_nv_arctic_base_fate \"intact\"\n\t\t*set machiavellianism -3\n\t\t*set ruthlessness -3\n\t\t*set selfabsorption -2\n\t\t*set sadism -2\n\t\t[i]Honor, Compassion, Empathy and Masochism increased.[/i]\n\t\t\n\t\t\n\t\tWill and Arth seemed a little dissatisfied about your choice, but they also went along with it. Sera immediately started casting a spell that allowed your group to levitate in the air freely. Her personality seemed most suited to such a task, whereas Arth especially should prefer to focus on fighting the Zenos if needed.\n\t\t\n\t\t\n\t\tYou immediately tried to contact the base itself.\n\t\t\n\t\t\n\t\t\"We're mage students from New Washington, and we're here to help. Gather on the roof of the base and we'll lift you up with magic.\"\n\t\t\n\t\t\n\t\t[i]From New Washington...? Really? The other mages from New Washington already left us here to die. Even our own mage garrison deserted us while taking the base's political leadership with them... But I'll accept help even from the Zenos themselves if it allows us to survive this catastrophe. Thank you so much for this help.[/i] \n\t\t\n\t\t\n\t\tIt didn't take long until the base's remaining personnel had gathered on top of the base. You immediately began your task of levitating them back to the transport plane with magic. On the other hand, the massive horde of Zenos was constantly getting closer to the base from several directions.\n\t\t\n\t\t*page_break\n\t\t\n\t\tIt was very exhausting, but finally you had successfully saved both the personnel and even the base itself. The Zenos didn't continue aiming for the base anymore after it had been fully evacuated. The leader of the hundreds of workers that you had saved from the base was visibly full of gratitude, too.\n\t\t\n\t\t\n\t\t\"We will never forget this favor, student mages from New Washington! Despite our differences, we still share a great common enemy. May this be a sign of aiming for further cooperation to defeat them once and for all!\"\n\t\t\n\t\t\n\t\tYou escorted the personnel to the relatively nearby flying city of New Vladivostok before starting your return trip to New Washington.\n\t\t\n\t\t\n\t\tEven if New Vladivostok wasn't exactly your ally, it still felt oddly good to receive gratitude from their people. In the end, you were all humans. Compared to the Zenos, they still almost felt like your relatives.\n\t\t\n\t\t*goto after_goal_choice\n\n*label after_goal_choice\n\n*page_break\n\nAlthough exhausted, you were ultimately all able to retreat without any problems. Meanwhile, the movements of the Zenos in the Arctic region continued to intensify, as even more Armor Type Zenos surfaced from the bottom of the ocean floor.\n\n\nThe plane immediately started flying toward New Washington at its maximum speed.\n\n*page_break\n\nEven after more time had passed, you still couldn't easily rest. There was something odd about the atmosphere in the surrounding area.\n\n\nYou gazed at the sky from one of the windows. Although it was supposed to be a relaxing view, it felt wrong. Perhaps it was your intuition as a mage? Despite the beauty of the night sky, it appeared to contain some sort of a grave danger.\n\n\nSomething ominous was up there, observing... and approaching.\n\n\n[b]Chapter 2 End[/b]\n\n*check_achievements\n*if not(choice_achieved_chapter2)\n\t*achieve chapter2\n\n*finish\n", "chapter3": "*advertisement 1200\n*if (chapter3_entered_roaming_phase = \"yes\")\n\t*goto before_roam_menu\n\n[b]Chapter 3: Week 24, 2031[/b]\n\n*label chapter_start\n\nThe time had finally come... for us to get through our theoretical exam as well.\n\n*choice\n\t#Examination hall (advance the story!)\n\t\t*goto after_enter_choice\n\t#Bulletin board\n\t\t[i]Theoretical exams will be held today![/i]\n\t\t\n\t\t\n\t\t[i]Entry outside the academy for students is permitted for now.[/i]\n\t\t\n\t\t\n\t\t[i]New Vladivostok exchange students are forbidden entry to the academy until further notice due to suspicions of espionage.[/i]\n\t\t\n\t\t*page_break\n\t\t*goto chapter_start\n\t*selectable_if (true = false) #Library\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Simulation room\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Research area\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Training area\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Park\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Healing ward\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Classified area\n\t\t*goto after_enter_choice\n\n*label after_enter_choice\n\n*page_break\n\n*temp question1\n*temp question2\n*temp question3\n*temp question3\n\n*temp question1_asked\n*temp question2_asked\n*temp question3_asked\n*temp question4_asked\n*temp question5_asked\n*temp question6_asked\n*temp question7_asked\n*temp question8_asked\n*temp question9_asked\n*temp question10_asked\n\n*temp round\n\n*temp won\n\n*label exam_start\n\n*rand question1 1 1000\n*rand question2 1 1000\n*rand question3 1 1000\n\n*set question1_asked false\n*set question2_asked false\n*set question3_asked false\n*set question4_asked false\n*set question5_asked false\n*set question6_asked false\n*set question7_asked false\n*set question8_asked false\n*set question9_asked false\n*set question10_asked false\n\n*set round 0\n\n*set won \"Won\"\n\n*label game_round\n\n*page_break\n\n*if (round = 3)\n\t*goto exam_finish\n\n*if (question1 \u003c= 200)\n\t*if (question1_asked = true)\n\t\t*rand question1 1 1000\n\t\t*goto game_round\n\t*set question1_asked true\n\t*set round +1\n\t*goto question_1\n\n*if (question1 \u003c= 400)\n\t*if (question2_asked = true)\n\t\t*rand question1 1 1000\n\t\t*goto game_round\n\t*set question2_asked true\n\t*set round +1\n\t*goto question_2\n\n*if (question1 \u003c= 600)\n\t*if (question3_asked = true)\n\t\t*rand question1 1 1000\n\t\t*goto game_round\n\t*set question3_asked true\n\t*set round +1\n\t*goto question_3\n\n*if (question1 \u003c= 800)\n\t*if (question4_asked = true)\n\t\t*rand question1 1 1000\n\t\t*goto game_round\n\t*set question4_asked true\n\t*set round +1\n\t*goto question_4\n\n*if (question1 \u003c= 1000)\n\t*if (question5_asked = true)\n\t\t*rand question1 1 1000\n\t\t*goto game_round\n\t*set question5_asked true\n\t*set round +1\n\t*goto question_5\n\n*label question_1\n\nWhich of these is not a type of Zenos?\n\n*choice\n\t#Armor Type Zenos\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#Water Type Zenos\n\t\t*goto game_round\n\t#Flying Type Zenos\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#Rush Type Zenos\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\n*label question_2\n\nWhich of the three cities is the best environment for mages?\n\n*choice\n\t#New Washington\n\t\t*goto game_round\n\t#New Vancouver\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#New Vladivostok\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#New London\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\n*label question_3\n\nWhich of these is a method of gathering magic crystals?\n\n*choice\n\t#Growing in laboratories\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#Destroying Zenos Nests\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#Asteroid mining\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#Harvesting from the oceans\n\t\t*goto game_round\n\n*label question_4\n\nWhat are the Zenos forces aiming for on Earth?\n\n*choice\n\t#Technology\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#Magic crystals\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#All living beings\n\t\t*goto game_round\n\t#Humans\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\n*label question_5\n\nWhich of these does not affect a mage's spells?\n\n*choice\n\t#Astrology\n\t\t*goto game_round\n\t#Magical power\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#Magic crystals\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\t#Personality\n\t\t*set won \"Lost\"\n\t\t*goto game_round\n\n*label exam_finish\n\n*if (won = \"Won\")\n\t*set conscientiousness +1\n\t[i]Conscientiousness increased.[/i]\n\t*check_achievements\n\t*if not(choice_achieved_exam)\n\t\t*achieve exam\n\n\nThe exam was over. Now you could only hope for the best...\n\n*page_break\n\nAs your class was leaving the examination hall, you suddenly saw someone you didn't exactly want to see: Zavier. He approached you from behind, accompanied by several unidentifiable people.\n\n\n\"Take this.\"\n\n\nZavier threw a crystal-like object into your hands. It reminded you of a giant magic crystal, although its color was blue rather than the usual red.\n\n\n\"You'll need this on your next mission. I call it the [b]Philosopher's Stone[/b]. It's a very special type of magic crystal... one that perhaps only you can use right now. It should greatly amplify the effect of your spells, but it will also limit the amount of spells at your disposal. I hope you're satisfied with the path you've chosen in terms of your magic. Be careful not to lose it!\"\n\n\nWithout further explanation, he disappeared from your sight again.\n\n*page_break\n\nFor a while, you were all simply silent. Ultimately Maria started speaking again.\n\n\n\"If it's as effective as he said, we should mainly focus on guarding ${name} until we can determine its effects. It may be the most important issue for our future, after all.\"\n\n\nSera and Will seemed to agree. On the other hand, Arth looked directly at you with a slightly questioning gaze.\n\n\n\"He said you're the only one who would be able to use it. Who exactly are you?\"\n\n*choice\n\t#Dismiss the issue\n\t\t*set agreeableness +2\n\t\t*set openness -1\n\t\t\n\t\t[i]Agreeableness and Closedness increased.[/i]\n\t\t\n\t\t\n\t\t\"It's nothing that special. I've just taken part in some tests that may have been intended to make me more suitable for using it.\"\n\t\t\n\t\t\n\t\tArth didn't seem entirely satisfied, but he didn't pursue the issue either.\n\t\t\n\t\t*goto after_arth_reaction_choice\n\t#Promise to reveal as much as you can\n\t\t*set agreeableness +3\n\t\t*set introversion -1\n\t\t*set openness +1\n\t\t\n\t\t[i]Agreeableness, Extroversion and Openness increased.[/i]\n\t\t\n\t\t\n\t\t\"It's... complicated. As soon as I can, I'll reveal everything. For now, let's just say that my body is a little special.\"\n\t\t\n\t\t\n\t\tArth didn't seem entirely satisfied, but he didn't pursue the issue either.\n\t\t\n\t\t*goto after_arth_reaction_choice\n\t#Accuse him of hypocrisy\n\t\t*set agreeableness -3\n\t\t*set openness -1\n\t\t\n\t\t[i]Disagreeableness and Closedness increased.[/i]\n\t\t\n\t\t\n\t\t\"You haven't been exactly open about your own past, have you? Will you start talking about it first?\"\n\t\t\n\t\t\n\t\tArth didn't seem entirely satisfied, but he didn't pursue the issue either.\n\t\t\n\t\t*goto after_arth_reaction_choice\n\t#Complain about your own difficulties\n\t\t*set selfabsorption +2\n\t\t*set agreeableness -2\n\t\t*set openness -1\n\t\t\n\t\t[i]Self-Absorption, Disagreeableness and Closedness increased.[/i]\n\t\t\n\t\t\n\t\t\"I would tell you if I could, but it's not that easy for me. Do you even know what I've been through? By all means, if you can convince the military to lift the secrecy, I'll tell you anything you want.\"\n\t\t\n\t\t\n\t\tArth didn't seem entirely satisfied, but he didn't pursue the issue either.\n\t\t\n\t\t*goto after_arth_reaction_choice\n\n*label after_arth_reaction_choice\n\n*page_break\n\nSome time later, you were all summoned to New Washington's airport. It was more convenient than being captured by AMA agents, but it was still an odd experience. You were escorted there by what felt like an army: hundreds of military mages who looked like war veterans. Wasn't this enough force to take out one of the other two cities already? What sort of mission could possibly warrant this amount of mages?\n\n\nBefore receiving any answers, you had already entered one of the oddly shaped planes at the airport. Instead of transport planes, they looked more like... rockets? Were you actually going to space?\n\n\nIt seemed like your question was quickly answered after the \"planes\" started launching off directly upward. They were clearly intended for reaching the orbit, with their extremely powerful magical boosters. But why?\n\n*page_break\n\n\"You seem to have many questions. Let me tell you about it briefly. We're going to stop at New Reno first. Even I don't know what's happening after that.\"\n\n\nOne of the military mages told you that while smiling vaguely. Despite being sent on such a weird mission, he didn't seem worried at all. Perhaps he was simply that confident in the forces that had gathered here.\n\n\nStill, New Reno. It was by far the biggest space station in Earth's orbit at the moment, housing thousands of permanent residents. It was mainly focused on entertainment, gambling and luxuries. It was perfect as a supply station for the military too.\n\n\nIt looked like the true nature of this mission wouldn't become clear for quite a while.\n\n*page_break\n\nAfter reaching New Reno, you had to almost immediately leave it again. The only difference was that you were now equipped with a kind of space suit that allowed you to move freely by only applying a slight amount of magical power.\n\n\nWith you, your class and hundreds of other elite mages drifting aimlessly in space, it was impossible to say what this was all about. Was there an asteroid approaching Earth perhaps?\n\n\nThat guess turned out not to be completely mistaken, in the end. After some time had passed, you finally received an explanation of sorts.\n\n*page_break\n\n[i]What we've named the [b]Fourth Nest[/b] is quickly approaching Earth. Its destination appears to be the Pacific Ocean, and its origin is from distant interstellar space. If we can't stop it here, we may be doomed without any hope of salvation. You must alter its course to hit the Sun instead of our planet. Failure is not an option here![/i]\n\n\nThe transmission was rather brief, but it fully explained why you were needed here. If Zavier was correct about the power of this new magic crystal, you might indeed be the only one who could use it. And if the Nests were as tough to attack as they were described, it would be practically impossible to accomplish this mission without you.\n\n\nNow you could only wait for it to appear.\n\n*page_break\n\nAt last, you could sense the Fourth Nest approaching from far away. It seemed to be aimed directly at the planet, as was explained.\n\n\nIt felt like it was surrounded by a gigantic magical barrier. No ordinary spells should be able to affect it, let alone conventional weapons. But would this new type of magic crystal be enough for the job...?\n\n\nYou started focusing on your main task and felt two spells immediately appearing in your mind.\n\n\n[i]Magic spells available to cast[/i]:\n\n\n[b]Force Push[/b]: Creates a massive pushing force against the target. [i]Generated by Introversion.[/i]\n\n\n[b]Mass Boost[/b]: Greatly increases the magical power of all nearby allies. [i]Generated by Extroversion.[/i]\n\n*choice\n\t*selectable_if (introversion >= 50) #Force Push\n\t\t*set introversion +3\n\t\t[i]Introversion increased.[/i]\n\t\t\n\t\t\n\t\tUnbelievable amounts of magical power swiftly gathered inside your body. Not only from the special magic crystal, but also from your classmates and the hundreds of nearby military mages who started boosting your magical power. It almost felt like you could move the Earth itself now.\n\t\t\n\t\t\n\t\tFocusing once more, you pushed all of that magical power against the Fourth Nest in the distance. It immediately reacted, as if it attempted to push back. In any case, it was not enough to stop you. Your spell kept accelerating its movement toward the Sun instead of its original target.\n\t\t\n\t\t\n\t\tSeveral minutes passed, until you could no longer even feel the presence of its magical power. It had disappeared in the direction of the Sun.\n\t\t\n\t\t\n\t\tIt took a while longer until you heard the news: apparently it couldn't reverse the push you had given it anymore. The mission was a success!\n\t\t\n\t\t\n\t\tThere was some cheering around you. Most of all, your classmates seemed happy. After all, you had just managed to save humanity from a great crisis.\n\t\t\n\t\t*goto after_fourth_nest_choice\n\t*selectable_if (introversion \u003c= 50) #Mass Boost\n\t\t*set introversion -3\n\t\t[i]Extroversion increased.[/i]\n\t\t\n\t\t\n\t\tUnbelievable amounts of magical power swiftly spread out to your surroundings. It felt like you were becoming magically connected with all the hundreds of mages nearby.\n\t\t\n\t\t\n\t\tTogether, all of you started pushing against the Fourth Nest in the distance. It immediately reacted, as if it attempted to push back. In any case, it was not enough to stop you all. Your spells kept accelerating its movement toward the Sun instead of its original target.\n\t\t\n\t\t\n\t\tSeveral minutes passed, until you could no longer even feel the presence of its magical power. It had disappeared in the direction of the Sun.\n\t\t\n\t\t\n\t\tIt took a while longer until you heard the news: apparently it couldn't reverse the push you had given it anymore. The mission was a success!\n\t\t\n\t\t\n\t\tThere was some cheering around you. Most of all, your classmates seemed happy. After all, you had just managed to save humanity from a great crisis.\n\t\t\n\t\t*goto after_fourth_nest_choice\n\n*label after_fourth_nest_choice\n\n*page_break\n\nAfter the success of your second major mission, you had several days left until you could leave New Reno. You were also supposed to be prepared just in case something new happened regarding the Fourth Nest. How to spend that time was up to you.\n\n*set event_points 2\n\n*set chapter3_entered_roaming_phase \"yes\"\n*label before_roam_menu\n\n*page_break\n\n[i]! = important story event available[/i]\n\n\nEvent Points left for this week: [b]${event_points}[/b] / 2\n\n*choice\n\t#Casino (!)\n\t\t*label casino\n\t\t*page_break\n\t\t\n\t\tThe space station's casino was full of people playing, talking and drinking without a care in the world. Most of them probably had no idea about all the threats humanity was constantly facing. In a way, it was even enviable.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter3_maria_event_activated = \"no\") #Talk: Maria (!)\n\t\t\t\t\n\t\t\t\tA little surprisingly, Maria was among the people at the casino. Instead of playing or drinking, though, she seemed to be focused on something.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week. Make your event choices carefully in this chapter...! If you have no event history together, it's likely not worth it to try bonding here.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter3_maria_event_activated \"yes\"\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs you approached her, Maria seemed to already know who it was before even looking at you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"If you're wondering what I'm doing here, I'm simply listening. It's surprising how much valuable information you can learn that way.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe then turned to look at you curiously. A question seemed to have entered her mind on the spot.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Do you think our victory against the Zenos should belong to New Washington... or to all of humanity?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#New Washington\n\t\t\t\t\t\t\t\t*set maria +20\n\t\t\t\t\t\t\t\t*set openness -2\n\t\t\t\t\t\t\t\t*set maria_goal_choice \"shift\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Bond with Maria improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Closedness increased.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (maria >= 50)\n\t\t\t\t\t\t\t\t\t\"I see... I agree that the ends justify the means. What really matters is that the Zenos are defeated, in the end.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou spent some more time with Maria at the casino after that. It felt like her attitude toward you had improved a lot.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (maria \u003c 50)\n\t\t\t\t\t\t\t\t\t\"I see. I'm sorry, but I have something to do.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tMaria quickly left the casino, leaving you to wonder what that had all been about.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Humanity\n\t\t\t\t\t\t\t\t*set maria +30\n\t\t\t\t\t\t\t\t*set openness +2\n\t\t\t\t\t\t\t\t*set maria_goal_choice \"continue\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Bond with Maria greatly improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Openness increased.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I see. I'm glad to hear you think so too.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou spent some more time with Maria at the casino after that. It felt like her attitude toward you had improved a lot.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t\t\t\t\n\t\t\t*if (chapter3_will_event_activated = \"no\") #Talk: Will (!)\n\t\t\t\t\n\t\t\t\tWill was at one of the tables playing poker. He seemed to be having the time of his life.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week. Make your event choices carefully in this chapter...! If you have no event history together, it's likely not worth it to try bonding here.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter3_will_event_activated \"yes\"\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs soon as you approached the table, however, Will quickly left the game and turned to face you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I've been enjoying my time here as if it was my last chance to enjoy life... because it very well might be. Our missions are only going to get more dangerous from now on.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tThen he sighed and looked at you closely.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Tell me honestly. Which one do you value more: life or honor?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Honor\n\t\t\t\t\t\t\t\t*set will +20\n\t\t\t\t\t\t\t\t*set machiavellianism -2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Bond with Will improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Honor increased.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (will >= 50)\n\t\t\t\t\t\t\t\t\t\"I see. I must gather my resolve... so that I won't be a burden to you.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou spent some more time with Will at the casino after that. It felt like his attitude toward you had improved a lot.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (will \u003c 50)\n\t\t\t\t\t\t\t\t\t\"I see. I'm sorry, but I have something to do.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tWill then quickly left the casino, leaving you to wonder what that had all been about.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Life\n\t\t\t\t\t\t\t\t*set will +30\n\t\t\t\t\t\t\t\t*set machiavellianism +2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Bond with Will greatly improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Machiavellianism increased.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I see. I'm glad to hear you think so too.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou spent some more time with Will at the casino after that. It felt like his attitude toward you had improved a lot.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t\t\t\t\n\t\t\t#Play: Blackjack\n\t\t\t\t*goto_scene blackjack\n\t#Arcade\n\t\t*label arcade\n\t\t*page_break\n\t\t\n\t\tThe arcade modu
