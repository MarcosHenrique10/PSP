<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mage Elite — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>

\n*temp dealer_win1_final\n*temp dealer_win2_final\n*temp dealer_win3_final\n*temp dealer_win4_final\n*temp dealer_win5_final\n*temp dealer_win6_final\n*temp dealer_win7_final\n*temp dealer_win8_final\n*temp dealer_win9_final\n*temp dealer_win10_final\n*temp dealer_win11_final\n\n*temp round_stage\n\n*temp doubled_down\n\n*temp player_sum\n*temp dealer_sum\n\n*temp dealer_cards\n\n*temp won\n\n*label game_start\n\n*check_achievements\n*if not(choice_achieved_blackjack)\n\t*if (tokens >= (borrowed_tokens + 500))\n\t\t*achieve blackjack\n\n*if (split_round = 0)\n\t\n\tTokens: ${tokens}\n\t\n\t\n\tBorrowed tokens: ${borrowed_tokens}\n\n\n*rand player_win1 1 13\n*rand player_win2 1 13\n*rand player_win3 1 13\n*rand player_win4 1 13\n*rand player_win5 1 13\n*rand player_win6 1 13\n*rand player_win7 1 13\n*rand player_win8 1 13\n*rand player_win9 1 13\n*rand player_win10 1 13\n*rand player_win11 1 13\n*rand dealer_win1 1 13\n*rand dealer_win2 1 13\n*rand dealer_win3 1 13\n*rand dealer_win4 1 13\n*rand dealer_win5 1 13\n*rand dealer_win6 1 13\n*rand dealer_win7 1 13\n*rand dealer_win8 1 13\n*rand dealer_win9 1 13\n*rand dealer_win10 1 13\n*rand dealer_win11 1 13\n\n*if ((player_win10 = 13) and (player_win9 \u003c 10))\n\t*set player_win1 11\n\t*set player_win2 12\n\n*rand player_win1_suit 1 4\n*rand player_win2_suit 1 4\n*rand player_win3_suit 1 4\n*rand player_win4_suit 1 4\n*rand player_win5_suit 1 4\n*rand player_win6_suit 1 4\n*rand player_win7_suit 1 4\n*rand player_win8_suit 1 4\n*rand player_win9_suit 1 4\n*rand player_win10_suit 1 4\n*rand player_win11_suit 1 4\n*rand dealer_win1_suit 1 4\n*rand dealer_win2_suit 1 4\n*rand dealer_win3_suit 1 4\n*rand dealer_win4_suit 1 4\n*rand dealer_win5_suit 1 4\n*rand dealer_win6_suit 1 4\n*rand dealer_win7_suit 1 4\n*rand dealer_win8_suit 1 4\n*rand dealer_win9_suit 1 4\n*rand dealer_win10_suit 1 4\n*rand dealer_win11_suit 1 4\n\n*set split_available false\n\n*if ((split_round = 0) and (player_win1 = player_win2))\n\t*set spli & ${dealer_win2_final})\n\n*if (player_sum > 21)\n\t*goto game_finish\n\n*if ((player_sum = 21) and (round_stage = 1))\n\t*if ((player_win1 = 11) or (player_win2 = 11))\n\t\t*set won \"Blackjack\"\n\t\t*goto game_finish\n\n*if (doubled_down = true)\n\t*set won \"Undecided\"\n\t*goto game_finish\n\n*if ((round_stage = 1) and (tokens >= (bet*2)))\n\t*if (split_available = true)\n\t\t*choice\n\t\t\t#Stand (stop dealing cards)\n\t\t\t\t*set won \"Undecided\"\n\t\t\t\t*goto game_finish\n\t\t\t#Hit (deal another card)\n\t\t\t\t*set round_stage +1\n\t\t\t\t*goto game_round\n\t\t\t#Double Down (double your bet and deal only one new card)\n\t\t\t\t*set round_stage +1\n\t\t\t\t*set tokens -bet\n\t\t\t\t*set doubled_down true\n\t\t\t\t*goto game_round\n\t\t\t#Split (double your bet and split your initial cards into two separate hands that receive an extra card and are played for one round each)\n\t\t\t\t*set split_round 1\n\t\t\t\t*set tokens -bet\n\t\t\t\t*goto game_start\n\t*else\n\t\t*choice\n\t\t\t#Stand (stop dealing cards)\n\t\t\t\t*set won \"Undecided\"\n\t\t\t\t*goto game_finish\n\t\t\t#Hit (deal another card)\n\t\t\t\t*set round_stage +1\n\t\t\t\t*goto game_round\n\t\t\t#Double Down (double your bet and deal only one new card)\n\t\t\t\t*set round_stage +1\n\t\t\t\t*set tokens -bet\n\t\t\t\t*set doubled_down true\n\t\t\t\t*goto game_round\n*else\n\t*choice\n\t\t#Stand (stop dealing cards)\n\t\t\t*set won \"Undecided\"\n\t\t\t*goto game_finish\n\t\t#Hit (deal another card)\n\t\t\t*set round_stage +1\n\t\t\t*goto game_round\n\n*label game_finish\n\n*if (won = \"Blackjack\")\n\t*set tokens +bet\n\t*set tokens +bet\n\t\n\t*if (bet = 5)\n\t\t*set tokens +3\n\t\n\t*if (bet = 10)\n\t\t*set tokens +5\n\t\n\t*if (bet = 25)\n\t\t*set tokens +13\n\t\n\t*if (bet = 50)\n\t\t*set tokens +25\n\t\n\t[b]You won with a Blackjack! (your initial hand had an ace as well as another card with a value of 10)[/b]\n\t\n\t*page_break\n\t\n\t*goto game_start\n\n*if (won = \"Undecided\")\n\t*set dealer_sum (dealer_win1 + dealer_win2)\n\t*set dealer_cards 2\n\t\n\t*if (dealer_sum \u003c 17)\n\t\t*set dealer_sum ((dealer_win1 + dealer_win2) + dealer_win3)\n\t\t*set dealer_cards 3\n\t\t*if (dealer_sum \u003c 17)\n\t\t\t*set dealer_sum (((dealer_win1 + dealer_win2) + dealer_win3) + dealer_win4)\n\t\t\t*set dealer_cards 4\n\t\t\t*if (dealer_sum \u003c 17)\n\t\t\t\t*set dealer_sum ((((dealer_win1 + dealer_win2) + dealer_win3) + dealer_win4) + dealer_win5)\n\t\t\t\t*set dealer_cards 5\n\t\t\t\t*if (dealer_sum \u003c 17)\n\t\t\t\t\t*set dealer_sum (((((dealer_win1 + dealer_win2) + dealer_win3) + dealer_win4) + dealer_win5) + dealer_win6)\n\t\t\t\t\t*set dealer_cards 6\n\t\t\t\t\t*if (dealer_sum \u003c 17)\n\t\t\t\t\t\t*set dealer_sum ((((((dealer_win1 + dealer_win2) + dealer_win3) + dealer_win4) + dealer_win5) + dealer_win6) + dealer_win7)\n\t\t\t\t\t\t*set dealer_cards 7\n\t\t\t\t\t\t*if (dealer_sum \u003c 17)\n\t\t\t\t\t\t\t*set dealer_sum (((((((dealer_win1 + dealer_win2) + dealer_win3) + dealer_win4) + dealer_win5) + dealer_win6) + dealer_win7) + dealer_win8)\n\t\t\t\t\t\t\t*set dealer_cards 8\n\t\t\t\t\t\t\t*if (dealer_sum \u003c 17)\n\t\t\t\t\t\t\t\t*set dealer_sum ((((((((dealer_win1 + dealer_win2) + dealer_win3) + dealer_win4) + dealer_win5) + dealer_win6) + dealer_win7) + dealer_win8) + dealer_win9)\n\t\t\t\t\t\t\t\t*set dealer_cards 9\n\t\t\t\t\n\t\t\n\t*if (dealer_cards = 2)\n\t\t\n\t\tDealer cards: [b]${dealer_sum}[/b] (${dealer_win1_final} & ${dealer_win2_final})\n\t\t\n\t*if (dealer_cards = 3)\n\t\t\n\t\tDealer cards: [b]${dealer_sum}[/b] (${dealer_win1_final} & ${dealer_win2_final} & ${dealer_win3_final})\n\t\n\t*if (dealer_cards = 4)\n\t\t\n\t\tDealer cards: [b]${dealer_sum}[/b] (${dealer_win1_final} & ${dealer_win2_final} & ${dealer_win3_final} & ${dealer_win4_final})\n\t\t\n\t*if (dealer_cards = 5)\n\t\t\n\t\tDealer cards: [b]${dealer_sum}[/b] (${dealer_win1_final} & ${dealer_win2_final} & ${dealer_win3_final} & ${dealer_win4_final} & ${dealer_win5_final})\n\t\t\n\t*if (dealer_cards = 6)\n\t\t\n\t\tDealer cards: [b]${dealer_sum}[/b] (${dealer_win1_final} & ${dealer_win2_final} & ${dealer_win3_final} & ${dealer_win4_final} & ${dealer_win5_final} & ${dealer_win6_final})\n\t\t\n\t*if (dealer_cards = 7)\n\t\t\n\t\tDealer cards: [b]${dealer_sum}[/b] (${dealer_win1_final} & ${dealer_win2_final} & ${dealer_win3_final} & ${dealer_win4_final} & ${dealer_win5_final} & ${dealer_win6_final} & ${dealer_win7_final})\n\t\n\t*if (dealer_cards = 8)\n\t\t\n\t\tDealer cards: [b]${dealer_sum}[/b] (${dealer_win1_final} & ${dealer_win2_final} & ${dealer_win3_final} & ${dealer_win4_final} & ${dealer_win5_final} & ${dealer_win6_final} & ${dealer_win7_final} & ${dealer_win8_final})\n\n\t*if (dealer_cards = 9)\n\t\t\n\t\tDealer cards: [b]${dealer_sum}[/b] (${dealer_win1_final} & ${dealer_win2_final} & ${dealer_win3_final} & ${dealer_win4_final} & ${dealer_win5_final} & ${dealer_win6_final} & ${dealer_win7_final} & ${dealer_win8_final} & ${dealer_win9_final})\n\n\t*if (player_sum = dealer_sum)\n\t\t*set won \"Tied\"\n\t\n\t*if (player_sum \u003c dealer_sum)\n\t\t*set won \"Lost\"\n\t\t\n\t*if ((player_sum > dealer_sum) or (dealer_sum > 21))\n\t\t*set won \"Won\"\n\n*if (won = \"Won\")\n\t*set tokens +bet\n\t*set tokens +bet\n\t\n\t*if (doubled_down = true)\n\t\t*set tokens +bet\n\t\t*set tokens +bet\n\t\t*set bet (bet*2)\n\t\n\t*if (dealer_sum > 21)\n\t\t\n\t\t[b]You won ${bet} tokens (bust)! (dealer's value total was over 21)[/b]\n\t\t\n\t\t*if (doubled_down = true)\n\t\t\t*set bet (bet/2)\n\t\n\t\t*page_break\n\t\n\t\t*goto game_start\n\t\n\t*else\n\t\t\n\t\t[b]You won ${bet} tokens! (your value total ${player_sum} was higher than dealer's value total ${dealer_sum})[/b]\n\t\t\n\t\t*if (doubled_down = true)\n\t\t\t*set bet (bet/2)\n\t\n\t\t*page_break\n\t\n\t\t*goto game_start\n\n*elseif (won = \"Tied\")\n\t*set tokens +bet\n\t\n\t*if (doubled_down = true)\n\t\t*set tokens +bet\n\t\n\t[b]The result is a tie (push) - bet refunded![/b]\n\t\n\t*page_break\n\t\n\t*goto game_start\n\n*else\n\t\n\t*if (player_sum > 21)\n\t\t\n\t\t[b]You lost (bust)! (your value total was over 21)[/b]\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto game_start\n\t\n\t*else\n\t\t\n\t\t[b]You lost! (dealer's value total ${dealer_sum} was higher than your value ${player_sum})[/b]\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto game_start\n\n*label rules\n\nYou start the game of [b]Blackjack[/b] with 500 borrowed tokens. Every round you play consists of betting 50 tokens against the dealer. If you don't have 50 tokens left to play a round anymore, you will automatically receive another 100 borrowed tokens.\n\n\n[b]If you manage to collect a total of 500 tokens (not counting borrowed tokens), you may receive a special reward...![/b]\n\n\nEach round of the game you play, both you and the dealer are dealt two random cards first (from several packs of cards).\n\n\nIf your hand consists of both an ace and a 10, jack, queen or king, you win automatically with a Blackjack.\n\n\nOtherwise you can choose from several options:\n\n\n[b]Stand[/b]: finish the round and deal cards to the dealer.\n\n\n[b]Hit[/b]: deal a new card to your hand in addition to the ones you currently have.\n\n\n[b]Double Down[/b]: double your bet and deal exactly one more card to your hand, then stand.\n\n\n[b]Split[/b]: double your bet and play two rounds by splitting your initial cards (that must have had the same value such as 10 and 10) into two separate hands (that each get one random extra card). After splitting once, no further splitting is allowed in this version of the game.\n\n\nThe following options are disabled in this version of the game: surrender, insurance.\n\n\nYou bust (lose automatically) if the total value of your hand is ever over 21. The dealer also loses if that happens to them.\n\n\nThe dealer must hit until the total value of their hand is 17 or higher.\n\n\nThe total value of any hand is determined by adding together the values of all cards included in it. For example, the value of a card like 2 of hearts is simply 2. The values of jacks, queens and kings are always 10. The value of an ace is normally 11, but if you would otherwise bust (total value of cards over 21), the value of an ace is counted as 1.\n\n\nOne round has a roughly 50% chance to win; 2x initial bet will be returned upon winning (except 4x if doubling down or 2.5x if won with a Blackjack hand).\n\n*page_break\n\n*goto game_start", "chapter1": "[b]Chapter 1: Week 22, 2031 (3 Weeks Earlier...)[/b]\n\nIt was a peculiar moment in your life.\n\n\nIn front of you stood the military magic academy of [b]New Washington[/b]. It was a majestic building complex meant for the most gifted aspiring magicians in the world.\n\n\nFor the first time, you were free to move as you wished in the real world. Gone were the endless experiments and simulations. Not only that, but you had even been selected as one of the five members of the new Elite Class.\n\n\nThe gates of the magic academy closed behind you.\n\n*label teaser_roaming_phase\n\n*choice\n\t#Classified area (advance the story!)\n\t\t*goto after_enter_choice\n\t#Bulletin board\n\t\t[i]Theoretical exams will be held in two weeks.[/i]\n\t\t\n\t\t\n\t\t[i]Entry outside the academy for students is limited for now.[/i]\n\t\t\n\t\t\n\t\t[i]New Vladivostok exchange students are forbidden entry to the academy until further notice due to suspicions of espionage.[/i]\n\t\t\n\t\t\n\t\tSo nothing was even mentioned about this new Elite Class...? How odd.\n\t\t*page_break\n\t\t*goto teaser_roaming_phase\n\t*selectable_if (true = false) #Library\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Simulation room\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Research area\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Training area\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Park\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Healing ward\n\t\t*goto after_enter_choice\n\t*selectable_if (true = false) #Examination hall\n\t\t*goto after_enter_choice\n\n*label after_enter_choice\n\n*page_break\n\nSlowly but surely, you made your way to the classified underground area of the academy. There were no guards in sight, but your intuition warned you that it would be dangerous to stray. If someone unauthorized entered, they would be unlikely to return alive.\n\n\nWaiting in front of you were four other relatively young people: two men, two women. Most of them seemed cautious to some extent... except the tallest man at the back, who didn't seem to care about anything.\n\n\n\"Welcome to the team! You can call me Will. The unsociable guy is Arth. The ladies are Sera and Maria. Do introduce yourself as well, please.\"\n\n\nOn the other hand, another person welcomed you somewhat warmly. It might be rude not to return the same courtesy.\n\n\nThe truth was that you were a...\n\n*choice\n\t#male\n\t\t*set gender \"male\"\n\t\t*goto after_gender_choice\n\t#female\n\t\t*set gender \"female\"\n\t\t*goto after_gender_choice\n\t#neither\n\t\t*set gender \"other\"\n\t\t*goto after_gender_choice\n\t\t\n\n*label after_gender_choice\n\n*if (gender = \"male\")\n\t[b]male[/b] student who called himself...\n\n*if (gender = \"female\")\n\t[b]female[/b] student who called herself...\n\n*if (gender = \"other\")\n\tstudent who called themselves...\n\n*input_text name\n\nYou chose to use the name [b]${name}[/b] in your new life as a student.\n\n\nTo the mostly expectant gazes of the people in front of you, you chose to...\n\n*choice\n\t#introduce yourself politely\n\t\t*set agreeableness +1\n\t\t[i]Agreeableness increased.[/i]\n\t\t\n\t\t\n\t\tYou revealed your name, but nothing unnecessary. For now, that was enough for them to know.\n\t\t\n\t\t*goto after_introduction_choice\n\t#introduce yourself in a friendly manner\n\t\t*set introversion -1\n\t\t*set agreeableness +1\n\t\t[i]Agreeableness and Extroversion increased.[/i]\n\t\t\n\t\t\n\t\tIt was great to finally meet new people of your own age group. \n\t\t\n\t\t\n\t\tYou responded to Will's friendly offer by introducing yourself to the whole group, trying to create an approachable impression.\n\t\t\n\t\t*goto after_introduction_choice\n\t#ignore them\n\t\t*set introversion +1\n\t\t*set agreeableness -2\n\t\t*set openness -2\n\t\t[i]Disagreeableness, Introversion and Closedness increased.[/i]\n\t\t\n\t\t\n\t\tThere was no need for small talk. Even if the nosy person in front of you looked a bit shocked, you simply ignored it and walked past him. \n\t\t\n\t\t\n\t\tActions spoke louder than words, so there was no need for pleasantries.\n\t\t\n\t\t*goto after_introduction_choice\n\n*label after_introduction_choice\n\nBefore anyone could continue, a loud announcement started echoing from every direction.\n\n\n\"The aptitude test is about to begin. I repeat. The aptitude test is about to begin. [b]Sera[/b], [b]Maria[/b], [b]Arth[/b], [b]Will[/b] and [b]${name}[/b], the tentative members of the [b]Elite Class[/b], must focus on surviving against their opponents by any means necessary.\"\n\n\nThere had been practically no time to get to know each other yet. Even so, all of you instinctively retreated away from the entrance.\n\n*page_break\n\nIt didn't take long for your opponents to appear. \n\n\nFive creatures entered the classified underground space... they were real Zenos!\n\n\nTo be precise, they were [b]Rush Type Zenos[/b]: human-sized insectoids that formed the majority of the Zenos forces invading the planet. It wouldn't be wrong to describe them as giant ants with dozens of massive, poisonous fangs and disgustingly slithering tendrils.\n\n\nWhat did you feel after seeing actual Zenos from such a close distance?\n\n*choice\n\t#Concern for your class\n\t\t*set selfabsorption -2\n\t\t*set ruthlessness -2\n\t\t[i]Empathy and Compassion increased.[/i]\n\t\t*goto after_feeling2_choice\n\t#Excitement to fight\n\t\t*set openness +1\n\t\t*set ruthlessness +1\n\t\t[i]Openness and Ruthlessness increased.[/i]\n\t\t*goto after_feeling2_choice\n\t#Hatred for the Zenos\n\t\t*set neuroticism +2\n\t\t*set openness -1\n\t\t*set ruthlessness +1\n\t\t[i]Neuroticism, Closedness and Ruthlessness increased.[/i]\n\t\t*goto after_feeling2_choice\n\t#Disgusted by the Zenos\n\t\t*set openness -3\n\t\t*set neuroticism +2\n\t\t[i]Closedness and Neuroticism increased.[/i]\n\t\t*goto after_feeling2_choice\n\t#Fear for your safety\n\t\t*set openness -2\n\t\t*set neuroticism +2\n\t\t[i]Closedness and Neuroticism increased.[/i]\n\t\t*goto after_feeling2_choice\n\t#Calmly observing the situation\n\t\t*set neuroticism -2\n\t\t*set machiavellianism +1\n\t\t[i]Stoicism and Machiavellianism increased.[/i]\n\t\t*goto after_feeling2_choice\n\n*label after_feeling2_choice\n\nThe first to react was Sera. She immediately started casting a spell that looked like an Area Barrier. Will also swiftly started moving further away from the Zenos. Maria focused her eyes on one of the Zenos and started casting a spell.\n\n\n\"I'll create a barrier. Everyone, stay behind it and attack the Zenos without letting them get close to you! Wait... what are you doing?!\"\n\n\nArth didn't seem to care about Sera's plans and charged toward the Zenos. His body started to glow, likely strengthened by some type of magic.\n\n\nYou should...\n\n*choice\n\t#rush outside the barrier to fight the Zenos\n\t\t*set sadism -2\n\t\t*set selfabsorption +1\n\t\t*set agreeableness -2\n\t\t[i]Disagreeableness, Masochism and Self-Absorption increased.[/i]\n\t\t\n\t\t\n\t\tYou rushed to catch up with Arth so that you could also fight the Zenos directly.\n\t\t\n\t\t\n\t\t[i]Magic spells available to cast[/i]:\n\t\t\n\t\t\n\t\t[b]Shock Field[/b]: Surrounds you with an electric aura that shocks anyone in close enough range. [i]Generated by Disagreeableness and Introversion.[/i]\n\t\t\n\t\t\n\t\t[b]Reflect[/b]: Reduces any damage aimed at your body and reflects it back in the direction of your enemy. [i]Generated by Masochism.[/i]\n\t\t\n\t\t\n\t\t[b]Overload[/b]: Fills you with unstable magic power that lashes out randomly in your surroundings. [i]Generated by Neuroticism.[/i]\n\t\t\n\t\t*choice\n\t\t\t#Shock Field\n\t\t\t\t*set chapter1_injured \"Sera\"\n\t\t\t\t*set agreeableness -1\n\t\t\t\t*set introversion +2\n\t\t\t\t[i]Disagreeableness increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on reducing any chances that the Rush Type Zenos could successfully damage your body.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, one of the Zenos focused on Arth and one headed in your direction. Three of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking very dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour Shock Field spell quickly started spreading around you, causing the Zenos in front of you to back off as if it sensed danger.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Sera, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Shock Field spell, the Zenos started clashing heavily against Sera's Area Barrier. Maria and Will kept casting offensive spells that rained down on the Zenos, but they continued their charge toward Sera. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\tMeanwhile, Arth had started punching the Zenos closest to him with his magically enhanced fists while deflecting its attempted counter-attacks. The Zenos closest to you finally chose to go on the offense and approached you. However, it couldn't get closer without being pushed away by the effects of your spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tA sudden shout of panic caused you to look back. One of the Zenos had successfully broken through the Area Barrier and attacked Sera with its fangs. Fortunately, Sera only received a light wound before it was pierced by Maria's spell. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell and Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them, the one in front of you, still remained alive. It was almost motionless due to the effects of trying to attack you, though.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Reflect\n\t\t\t\t*set chapter1_injured \"Sera\"\n\t\t\t\t*set sadism -1\n\t\t\t\t[i]Masochism increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on reducing any chances that the Rush Type Zenos could successfully damage your body.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, one of the Zenos focused on Arth and one headed in your direction. Three of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking very dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour Reflect spell quickly started spreading around you, causing the Zenos in front of you to back off as if it sensed danger.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Sera, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Reflect spell, the Zenos started clashing heavily against Sera's Area Barrier. Maria and Will kept casting offensive spells that rained down on the Zenos, but they continued their charge toward Sera. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\tMeanwhile, Arth had started punching the Zenos closest to him with his magically enhanced fists while deflecting its attempted counter-attacks. The Zenos closest to you finally chose to go on the offense and approached you. However, all of its attempts to hit you ended up backfiring harshly.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tA sudden shout of panic caused you to look back. One of the Zenos had successfully broken through the Area Barrier and attacked Sera with its fangs. Fortunately, Sera only received a light wound before it was pierced by Maria's spell. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell and Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them, the one in front of you, still remained alive. It was almost motionless due to the effects of trying to attack you, though.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Overload\n\t\t\t\t*set chapter1_injured \"Sera\"\n\t\t\t\t*set neuroticism +1\n\t\t\t\t[i]Neuroticism increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on reducing any chances that the Rush Type Zenos could successfully damage your body.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, one of the Zenos focused on Arth and one headed in your direction. Three of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking very dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour Overload spell quickly started spreading around you, causing the Zenos in front of you to back off as if it sensed danger.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Sera, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Overload spell, the Zenos started clashing heavily against Sera's Area Barrier. Maria and Will kept casting offensive spells that rained down on the Zenos, but they continued their charge toward Sera. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\tMeanwhile, Arth had started punching the Zenos closest to him with his magically enhanced fists while deflecting its attempted counter-attacks. The Zenos closest to you finally chose to go on the offense and approached you. However, it couldn't get closer without being pushed away by the effects of your spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tA sudden shout of panic caused you to look back. One of the Zenos had successfully broken through the Area Barrier and attacked Sera with its fangs. Fortunately, Sera only received a light wound before it was pierced by Maria's spell. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell and Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them, the one in front of you, still remained alive. It was almost motionless due to the effects of trying to attack you, though.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\n\t#provide support for Arth without leaving the barrier\n\t\t*set selfabsorption -2\n\t\t*set ruthlessness -2\n\t\t*set agreeableness +2\n\t\t*set neuroticism -1\n\t\t[i]Agreeableness, Empathy and Compassion increased.[/i]\n\t\t\n\t\t\n\t\tYou decided to focus on helping Arth without facing the Zenos directly.\n\t\t\n\t\t\n\t\t[i]Magic spells available to cast[/i]:\n\t\t\n\t\t\n\t\t[b]Serenity[/b]: Calms the minds of nearby allies. [i]Generated by Empathy and Agreeableness.[/i]\n\t\t\n\t\t\n\t\t[b]Boost Magic[/b]: Increases the magical power of your nearby allies. [i]Generated by Agreeableness and Extroversion.[/i]\n\t\t\n\t\t\n\t\t[b]Poison Resistance[/b]: Greatly reduces the effectiveness of all poisons in your surroundings. [i]Generated by Honor and Compassion.[/i]\n\t\t\n\t\t*choice\n\t\t\t#Serenity\n\t\t\t\t*set ruthlessness -1\n\t\t\t\t*set agreeableness +1\n\t\t\t\t[i]Empathy and Agreeableness increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on increasing the mental stability of your class in order to make it easier for them to deal with the Rush Type Zenos.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour Serenity spell quickly started spreading to the surrounding area, covering everything in a light yellow glow. The strongest effect it had seemed to be on Arth, who suddenly looked as if he had woken up from a bad dream. He swiftly retreated inside the Area Barrier and focused on guarding Sera from the approaching Zenos. The others didn't show any such major changes, but it certainly felt like they all worked together much more smoothly.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect all the Zenos greatly, slowing down their movements.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Serenity spell to help your team, the Zenos started clashing against Sera's Area Barrier. Maria and Will kept casting offensive spells that rained down on the Zenos, which took its toll on their ability to attack. Two of the Zenos were already on the ground, and the rest were getting weaker as well.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell while Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive, even though it looked quite damaged and motionless due to being affected by Will's spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Boost Magic\n\t\t\t\t*set introversion -2\n\t\t\t\t*set agreeableness +1\n\t\t\t\t[i]Extroversion and Agreeableness increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on increasing the magical power of your class in order to make it easier for them to deal with the Rush Type Zenos.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour Boost Magic spell quickly started spreading to the surrounding area, covering everything in a light blue glow. The speed and effectiveness of the spells being cast rapidly grew.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect all the Zenos greatly, slowing down their movements.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Boost Magic spell to help your team, the Zenos started clashing heavily against Sera's Area Barrier and against Arth in close combat. Maria and Will kept casting offensive spells that rained down on the Zenos, which took its toll on their ability to attack. One of the Zenos attacking Sera was already on the ground, and the ones attacking Arth were becoming weaker as well.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThanks to your spell, the Area Barrier kept growing stronger and even Arth seemed able to easily deal with the Zenos in front of him. He simply used his magically enhanced fists to punch them while deflecting their attempted counter-attacks.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell while Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive, even though it looked quite damaged and motionless due to being affected by Will's spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Poison Resistance\n\t\t\t\t*set machiavellianism -1\n\t\t\t\t*set ruthlessness -1\n\t\t\t\t[i]Honor and Compassion increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on ensuring the safety of your class against the venomous fangs of the Rush Type Zenos.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour Poison Resistance spell quickly started spreading to the surrounding area, covering everything in a light green glow. The ability of the Zenos to cause damage was being rapidly eroded in the test area.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Arth, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Poison Resistance spell to help protect your team, the Zenos started clashing heavily against Sera's Area Barrier and against Arth in close combat. Maria and Will kept casting offensive spells that rained down on the Zenos, which took its toll on their ability to attack. One of the Zenos attacking Sera was already on the ground, and the ones attacking Arth were becoming weaker as well.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tEventually Arth slipped up after he kept fighting the Zenos by himself. One of them managed to hit him on his arm with its fangs. Arth immediately jumped back, but the damage was already done, and he grimaced in agony while starting to retreat toward the barrier.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFortunately, Arth didn't seem to suffer too much from being poisoned. His appearance even improved after the initial reaction. It was likely thanks to the effect of Poison Resistance.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell while Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive, even though it looked quite damaged and motionless due to being affected by Will's spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\n\t#focus on preventing the barrier from being breached\n\t\t*set agreeableness +2\n\t\t*set openness -1\n\t\t[i]Agreeableness and Closedness increased.[/i]\n\t\t\n\t\t\n\t\tYou stayed to help Sera with her Area Barrier.\n\t\t\n\t\t\n\t\t[i]Magic spells available to cast[/i]:\n\t\t\n\t\t\n\t\t[b]Area Barrier[/b]: Absorbs all forms of damage directed at an area at the expense of your own magical power. [i]Generated by Closedness and Extroversion.[/i]\n\t\t\n\t\t\n\t\t[b]Boost Magic[/b]: Increases the magical power of your nearby allies. [i]Generated by Agreeableness and Extroversion.[/i]\n\t\t\n\t\t\n\t\t[b]Electric Field[/b]: Creates a defensive barrier that lashes out randomly with painful shocks in its surroundings. [i]Generated by Sadism and Closedness.[/i]\n\t\t\n\t\t*choice\n\t\t\t#Area Barrier\n\t\t\t\t*set chapter1_injured \"Arth\"\n\t\t\t\t*set openness -1\n\t\t\t\t*set introversion -1\n\t\t\t\t[i]Closedness and Extroversion increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on helping Sera by casting a second Area Barrier.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour own Area Barrier started forming on top of Sera's Area Barrier. It would be practically impossible to get past this obstacle anymore.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Arth, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening your own Area Barrier, the Zenos started clashing heavily against Sera's Area Barrier and against Arth in close combat. Maria and Will kept casting offensive spells that rained down on the Zenos, which took its toll on their ability to attack. One of the Zenos attacking Sera was already on the ground, and the ones attacking Arth were becoming weaker as well.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tHowever, Arth slipped up after he kept fighting the Zenos by himself. One of them managed to hit him on his arm with its fangs. Arth immediately jumped back, but the damage was already done, and he grimaced in agony while retreating inside the barrier.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell while Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive, even though it looked quite damaged and motionless due to being affected by Will's spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Boost Magic\n\t\t\t\t*set introversion -2\n\t\t\t\t*set agreeableness +1\n\t\t\t\t[i]Extroversion and Agreeableness increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on increasing the magical power of your class in order to make it easier for them to deal with the Rush Type Zenos.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour Boost Magic spell quickly started spreading to the surrounding area, covering everything in a light blue glow. The speed and effectiveness of the spells being cast rapidly grew.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect all the Zenos greatly, slowing down their movements.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Boost Magic spell to help your team, the Zenos started clashing heavily against Sera's Area Barrier and against Arth in close combat. Maria and Will kept casting offensive spells that rained down on the Zenos, which took its toll on their ability to attack. One of the Zenos attacking Sera was already on the ground, and the ones attacking Arth were becoming weaker as well.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThanks to your spell, the Area Barrier kept growing stronger and even Arth seemed able to easily deal with the Zenos in front of him. He simply used his magically enhanced fists to punch them while deflecting their attempted counter-attacks.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell while Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive, even though it looked quite damaged and motionless due to being affected by Will's spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Electric Field\n\t\t\t\t*set sadism +1\n\t\t\t\t*set openness -1\n\t\t\t\t[i]Sadism and Closedness increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to focus on helping Sera by casting an Electric Field in front of her Area Barrier.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour own Electric Field started forming on top of Sera's Area Barrier. It would be practically impossible to get past this obstacle anymore.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Arth, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Electric Field, the Zenos tried to move through it, but backed off when the electric shocks started hitting them. Maria and Will kept casting offensive spells that rained down on the Zenos, which took its toll on their ability to attack. One of the Zenos aiming for Sera was already on the ground, and the ones attacking Arth were becoming weaker as well.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tHowever, Arth slipped up after he kept fighting the Zenos by himself. One of them managed to hit him on his arm with its fangs. Arth immediately jumped back, but the damage was already done, and he grimaced in agony while retreating inside the barrier.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell while Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive, even though it looked quite damaged and motionless due to being affected by Will's spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had already won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\n\t#retreat to a safer offensive casting position, leaving Sera and Maria more vulnerable in front of you\n\t\t*set sadism +3\n\t\t*set selfabsorption +2\n\t\t*set machiavellianism +2\n\t\t*set ruthlessness +1\n\t\t[i]Machiavellianism, Ruthlessness, Sadism and Self-Absorption increased.[/i]\n\t\t\n\t\t\n\t\tYou followed Will by retreating far enough so that you could focus on safely casting spells against the Zenos.\n\t\t\n\t\t\n\t\t[i]Magic spells available to cast[/i]:\n\t\t\n\t\t\n\t\t[b]Flame Wave[/b]: Sets a large area in front of you on fire. [i]Generated by Ruthlessness.[/i]\n\t\t\n\t\t\n\t\t[b]Curse of Agony[/b]: Causes a slow and painful death to living beings in your target area. [i]Generated by Sadism.[/i]\n\t\t\n\t\t\n\t\t[b]Surface Freeze[/b]: Freezes the ground under your enemies. [i]Generated by Machiavellianism.[/i]\n\t\t\n\t\t\n\t\t[b]Mind Break[/b]: Increases your own mental stability by slowly deteriorating target minds. [i]Generated by Self-Absorption.[/i]\n\t\t\n\t\t*choice\n\t\t\t#Flame Wave\n\t\t\t\t*set chapter1_injured \"Arth\"\n\t\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t\t*set ruthlessness +1\n\t\t\t\t[i]Ruthlessness increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to wipe out the Zenos by casting a Flame Wave spell in front of you.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour Flame Wave spell started forming next to Sera's Area Barrier. It would be practically impossible for the Zenos to reach Sera anymore.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Arth, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAs you kept strengthening the Flame Wave spell, the Zenos aiming for Sera seemed to sense something and backed off. However, it was too late for them to escape.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe Flame Wave started to move toward the Zenos, rapidly burning everything in its path. The Zenos tried to avoid it, but there was no way they could. Arth also seemed to notice the approaching danger, and as expected, he was able to move out of its way fast enough. However, since he was in a hurry to move away, his arm was accidentally pierced by one of the Zenos with its fang. For a short moment, he grimaced in agony.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe Flame Wave continued its onslaught and burned all of the Zenos to ash. Nothing remained of them, and even Arth had only barely escaped with his life. The area was filled with slightly shocked silence.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Curse of Agony\n\t\t\t\t*set chapter1_injured \"Sera\"\n\t\t\t\t*set sadism +1\n\t\t\t\t[i]Sadism increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to punish the Zenos by casting a Curse of Agony spell on them.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Arth, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tYour Curse of Agony finally activated as well. It swiftly hit all of the Zenos, and even Arth to a lesser extent. The Zenos seemed to go crazy with pain and charged toward the Area Barrier with their remaining strength.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tOne of the Zenos even successfully broke through the Area Barrier and hit Sera with its fangs. Fortunately, Sera only received a light wound before it was pierced by Maria's spell. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also continued casting his spell and Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive, although it was almost motionless due to the effects of being tortured by your spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Surface Freeze\n\t\t\t\t*set machiavellianism +1\n\t\t\t\t[i]Machiavellianism increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to handle the Zenos with a Surface Freeze spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Arth, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tYour Surface Freeze spell finally activated as well. It swiftly hit all of the Zenos, and even Arth got his feet stuck on the floor. The Zenos had no ranged attacks, so by having their legs heavily restricted, they became easy prey for your class.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill continued casting his spell and Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive. It was almost motionless due to the effects of being affected by Will's spell, though.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\t\t\t#Mind Break\n\t\t\t\t*set chapter1_injured \"Sera\"\n\t\t\t\t*set selfabsorption +1\n\t\t\t\t[i]Self-Absorption increased.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou decided to punish the Zenos by casting a Mind Break spell on them.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you began to cast the spell, three of the Zenos focused on Arth. They swiftly moved to rip him apart. On the other hand, two of them charged toward Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFor a moment, the situation was looking dangerous. But that was only until the spells started to activate. First was Sera's Area Barrier that quickly began blocking the Zenos from approaching her. Soon enough, a wave of magical power also surged from Arth and pushed the Zenos back. At the same time, Maria launched a shadowy projectile that pierced one of the Zenos approaching Sera.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill finished casting some sort of a ranged attack from the back. It seemed to affect the Zenos attacking Arth, but it only barely slowed them down.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tYour Mind Break spell finally activated as well. It swiftly hit all of the Zenos, and even Arth to a lesser extent. The Zenos seemed to go crazy and charged toward the Area Barrier with their remaining strength.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tOne of the Zenos even successfully broke through the Area Barrier and hit Sera with its fangs. Fortunately, Sera only received a light wound before it was pierced by Maria's spell. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWill also continued casting his spell and Maria kept hitting the Zenos with a lethal-looking spell one after another. It didn't take long until the Zenos were practically defeated. Only one of them still remained alive, although it was almost motionless due to the effects of being tortured by your spell.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou had won the battle.\n\t\t\t\t\n\t\t\t\t*goto after_goal_choice\n\n*label after_goal_choice\n\n*page_break\n\nNone of your classmates had died during the fight, and all of the Zenos had been swiftly dealt with.\n\n*if (chapter1_injured = \"none\")\n\t*check_achievements\n\t*if not(choice_achieved_flawless)\n\t\t*achieve flawless\n\t\n\tIt was certainly a great result overall. Whoever came up with the test should be pleased.\n\n*if (chapter1_injured = \"Sera\")\n\tUnfortunately, Sera had been poisoned by the Zenos. It shouldn't be dangerous for the time being, though, since Sera was able to quickly cast a healing spell on herself.\n\n*if (chapter1_injured = \"Arth\")\n\tUnfortunately, Arth had been poisoned by the Zenos. It shouldn't be dangerous for the time being, though, since Sera was able to quickly cast a healing spell on him.\n\n*if (chapter1_last_zenos_alive = \"yes\")\n\n\t*page_break\n\t\n\tThe most urgent issue now was how to deal with the one remaining Rush Type Zenos.\n\t\n\t\n\t\"Just let it die. It's not like it will survive if we ignore it.\"\n\t\n\t\n\tWill seemed to prefer the option of letting it die on its own.\n\t\n\t\n\t\"Shouldn't we save it... since it's a valuable living sample of the Zenos...?\"\n\t\n\t\n\tSera, on the other hand, apparently wanted to use her healing magic even on a Zenos.\n\t\n\t\n\tArth didn't look like he had any opinions. Maria only stared at you quietly. Was she waiting for your stance?\n\t\n\t\n\tYou decided to support the idea to...\n\t\n\t*choice\n\t\t#kill it swiftly\n\t\t\t*set selfabsorption -3\n\t\t\t*set ruthlessness -3\n\t\t\t*set machiavellianism -3\n\t\t\t*set conscientiousness -2\n\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t[i]Honor, Compassion, Empathy and Spontaneity increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tAs soon as you made your opinion known, Maria created a shadowy projectile that pierced the head of the Zenos.\n\t\t\t\n\t\t\t\n\t\t\tSera looked slightly uncertain, but didn't voice any complaints about the result.\n\t\t\t\n\t\t\t*goto after_last_zenos_choice\n\t\t#let it die slowly\n\t\t\t*set ruthlessness +3\n\t\t\t*set sadism +3\n\t\t\t*set chapter1_last_zenos_alive \"no\"\n\t\t\t[i]Ruthlessness and Sadism increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tAs soon as you made your opinion known, Sera didn't oppose Will's idea anymore.\n\t\t\t\n\t\t\t\n\t\t\tIt was ignored and left to die without intervention.\n\t\t\t\n\t\t\t*goto after_last_zenos_choice\n\t\t#capture it\n\t\t\t*set agreeableness +1\n\t\t\t*set machiavellianism +3\n\t\t\t*set conscientiousness +2\n\t\t\t*set neuroticism -1\n\t\t\t[i]Machiavellianism, Agreeableness, Conscientiousness and Stoicism increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tAs soon as you made your opinion known, Sera started healing the Zenos.\n\t\t\t\n\t\t\t\n\t\t\tShe didn't heal it enough for it to be a threat again, though. It was only enough for it to stay alive.\n\t\t\t\n\t\t\t*goto after_last_zenos_choice\n\t\t#no opinion\n\t\t\t*set agreeableness +3\n\t\t\t*set introversion +2\n\t\t\t[i]Agreeableness and Introversion increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tThere was a brief period of uncertainty, but eventually Arth gave his support for keeping it alive, so Sera started healing the Zenos.\n\t\t\t\n\t\t\t\n\t\t\tShe didn't heal it enough for it to be a threat again, though. It was only enough for it to stay alive.\n\t\t\t\n\t\t\t*goto after_last_zenos_choice\n\n*label after_last_zenos_choice\n\n*page_break\n\nEven though you had cleared the test quite successfully, it had certainly not been a completely smooth fight.\n\n\nMostly the problems were due to Arth's sudden decision to attack actively on his own. If he had stayed to defend Sera while she was casting her Area Barrier, it should have been a much safer situation overall. But it was also true that it was a good opportunity to practice fighting against Zenos directly without a lot of risk.\n\n\nRegardless, there was still clearly some tension between Sera and Arth.\n\n\n\"Arth, you could have easily caused one of us to die back there. What were you even thinking? Do you want to get us killed when we're going on real missions?\"\n\n\n\"So what? It was a test to see what we could do in a fight against actual Zenos, and certainly not a childproof play fight. If a couple of Rush Type Zenos were enough to kill one of us, then that person shouldn't be part of this Elite Class to begin with. I'm sure the one who created this test would agree with my approach.\"\n\n\nYou decided to...\n\n*choice\n\t#argue in favor of Sera\n\t\t*set agreeableness -3\n\t\t[i]Disagreeableness increased.[/i]\n\t\t\n\t\t\n\t\t\"Arth, Sera made the right call back there. If we had all followed her idea, we would have achieved the best results with the least risk. That's the correct approach for practicing as a team.\"\n\t\t\n\t\t\n\t\tArth looked slightly annoyed, but he didn't start arguing against you.\n\t\t\n\t\t*goto after_argument_choice\n\t#argue in favor of Arth\n\t\t*set agreeableness -3\n\t\t[i]Disagreeableness increased.[/i]\n\t\t\n\t\t\n\t\t\"Sera, Arth does have a point. It was a good opportunity to practice close combat with Zenos without too much risk.\"\n\t\t\n\t\t\n\t\tSera looked slightly annoyed, but she didn't start arguing against you.\n\t\t\n\t\t*goto after_argument_choice\n\t#seek a compromise\n\t\t*set agreeableness +3\n\t\t*set introversion -2\n\t\t[i]Agreeableness and Extroversion increased.[/i]\n\t\t\n\t\t\n\t\t\"Both arguments have some merit, so can't we come to a compromise? For example, if the same situation happens again, couldn't Arth enter close combat directly in front of Sera instead of straying so far away from the rest?\"\n\t\t\n\t\t\n\t\tSera and Arth both looked slightly annoyed, but they didn't continue arguing.\n\t\t\n\t\t*goto after_argument_choice\n\t#stay out of the argument\n\t\t*set agreeableness +3\n\t\t*set openness -2\n\t\t*set introversion +2\n\t\t[i]Agreeableness, Closedness and Introversion increased.[/i]\n\t\t\n\t\t\n\t\tYou chose not to intervene.\n\t\t\n\t\t\n\t\tIn any case, they soon ran out of motivation to continue arguing.\n\t\t\n\t\t*goto after_argument_choice\n\n*label after_argument_choice\n\n*page_break\n\nIn the end, Sera and Arth still seemed dissatisfied with each other as they both left the classified area. Only you, Maria and Will remained; along with the five defeated Zenos.\n\n\nMaria made a sudden proposal.\n\n\n\"I think you clearly have the most magical power among us. It would be more efficient if you were the one giving orders instead of Sera. Both in terms of making the correct tactical decisions... and being respected enough by all of us so that the orders are carried out reliably.\"\n\n\nWill also nodded.\n\n\n\"Maria is probably right. If it weren't for you, one of us might have easily died in that... test. It's simply insane to fight Zenos in close combat, but it felt like you could have cleared the test on your own.\"\n\n\nYou chose to...\n\n*choice\n\t#defend Sera\n\t\t*set selfabsorption -3\n\t\t*set machiavellianism -1\n\t\t*set agreeableness -1\n\t\t[i]Empathy, Honor and and Disagreeableness increased.[/i]\n\t\t\n\t\t\"Sera did her best and prevented you two from being in any danger. Sera's plan was good, and it was mainly Arth's fault that there was any trouble to begin with. Let's put some faith in Sera's abilities for the time being.\"\n\t\t\n\t\t\n\t\tMaria seemed perhaps slightly disappointed by your response, but didn't continue to argue.\n\t\t\n\t\t*goto after_leadership_choice\n\t#agree with the sentiment\n\t\t*set selfabsorption +3\n\t\t*set machiavellianism +1\n\t\t[i]Self-Absorption and Machiavellianism increased.[/i]\n\t\t\n\t\t\n\t\t\"I agree. It doesn't look like Arth will listen to Sera anytime soon, so I should probably be more of a leader for us instead of her.\"\n\t\t\n\t\t\n\t\tMaria seemed somewhat happy by your response, but didn't make any further comments.\n\t\t\n\t\t*goto after_leadership_choice\n\t#suggest favoring democratic leadership\n\t\t*set agreeableness +3\n\t\t*set introversion -1\n\t\t[i]Agreeableness and Extroversion increased.[/i]\n\t\t\n\t\t\n\t\t\"I think we should make decisions together whenever possible. After all, it's more likely we can find the best solutions if there are more options on the table.\"\n\t\t\n\t\t\n\t\tMaria seemed perhaps slightly disappointed by your response, but didn't continue to argue.\n\t\t\n\t\t*goto after_leadership_choice\n\t#dodge the topic\n\t\t*set agreeableness +3\n\t\t*set openness -2\n\t\t*set introversion +2\n\t\t[i]Agreeableness, Closedness and Introversion increased.[/i]\n\t\t\n\t\t\n\t\t\"Let's not make decisions so fast. I'm sure we can cooperate better as we get to know each other better.\"\n\t\t\n\t\t\n\t\tMaria seemed perhaps slightly disappointed by your response, but didn't continue to argue.\n\t\t\n\t\t*goto after_leadership_choice\n\n*label after_leadership_choice\n\n*page_break\n\nEventually, you made your way out of the classified area together with Maria and Will. \n\n\nYou all parted ways and took a moment to rest before resuming your student lifestyles.\n\n*set event_points 2\n\n*label before_roam_menu\n\n*page_break\n\n[i]! = important story event available / !!! = mandatory story event[/i]\n\n\nEvent Points left for this week: [b]${event_points}[/b] / 2\n\n*choice\n\t#Bulletin board\n\t\t[i]Theoretical exams will be held in two weeks.[/i]\n\t\t\n\t\t\n\t\t[i]Entry outside the academy for students is limited for now.[/i]\n\t\t\n\t\t\n\t\t[i]New Vladivostok exchange students are forbidden entry to the academy until further notice due to suspicions of espionage.[/i]\n\t\t\n\t\t*goto before_roam_menu\n\t#Library (!)\n\t\t*label library\n\t\t*page_break\n\t\t\n\t\tThe library was filled with people quietly reading their books.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter1_maria_event_activated = \"no\") #Talk: Maria (!)\n\t\t\t\t\n\t\t\t\tMaria was focused on reading a book in total silence.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs you approached her, she didn't seem surprised at all. In fact, she might have even looked delighted?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"Do you want to study together? I can teach you about the Zenos.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto library\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter1_maria_event_activated \"yes\"\n\t\t\t\t\t\t*set maria +10\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t*set conscientiousness +1\n\t\t\t\t\t\t[i]Bond with Maria improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Conscientiousness increased.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tAt first, when Maria was studying by herself, she hadn't exactly looked approachable. However, her atmosphere quickly changed once she started talking with you about humanity's mortal enemy: the alien Zenos species. It almost felt like the topic was her passion in life.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt was surprisingly enjoyable listening to her. After a while, you had fully memorized the main facts about them.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Rush Type Zenos[/b]: The first known type of Zenos. They were first seen in 2011, shortly after the appearance of the First Nest. They were extremely deadly and difficult-to-kill predators, immediately causing countless deaths and wiping out several countries. Humanity mainly relied on carpet bombing them from the air, eventually even with strategic nuclear weapons, to keep their advance in check, but they were never delayed for that long. Their numbers only kept growing as the devastation caused by them increased. The discovery of magic in 2012 was a major turning point that made them far less dangerous overall. Their appearance reminded many of human-sized ants.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Armor Type Zenos[/b]: The second known type of Zenos. They were first seen in 2012, after the First Nest had been bombed with dozens of strategic nuclear weapons. They were practically immune to all conventional forms of damage, and even nuclear weapons barely slowed them down. Magic spells were realistically the only way to even delay their movements significantly. Fortunately, they moved very slowly, or humanity would have perished soon after their appearance. The exception was their ability to charge at extreme speeds if they saw an enemy they wanted to kill. Their appearance reminded many of building-sized cockroaches.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Flying Type Zenos[/b]: The third known type of Zenos. They were first seen in 2030 around the First Nest; instantly causing major alarm among humanity. However, they have never left the continent of Africa until now. If their numbers or levels of aggression ever increased, humanity would be in great peril, since they could directly attack the three floating cities as well as any airborne mages. Fortunately, they have never been seen using ranged attacks, although their mobility was by far the highest among all types of Zenos. Their appearance reminded many of building-sized mosquitoes.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Nests[/b]: The most mysterious thing about the Zenos were their Nests. These massive underground structures originally came from space and descended deep into the ground upon arrival. The First Nest was located in Africa, the Second Nest in Asia and the Third Nest in South America. The largest of them was the First Nest, and it was also the only Nest known to have created any Flying Type Zenos. The primary goal for humanity had always been destroying the Nests, but all attempts so far had failed. Their surfaces were extremely thick and practically immune to damage, including even magical attacks. Not to mention that they were guarded by extreme amounts of Zenos forces.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Zenos goals[/b]: It's unclear exactly why the Zenos invaded our planet or even where they came from. What's clear is that they were hostile to all life on the planet, destroying everything in their path without exceptions. They seemed fully focused on attacking any life forms and completely uninterested in inorganic matter.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tEventually Maria had taught you all the main points of interest about the Zenos. After that, you both focused on reading more books about various other topics.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou felt that you had gotten a little closer to her. That was certainly not a bad thing when you might have to entrust your life to her during combat in the future.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto library\n\t\t\t#Examine: Books\n\t\t\t\t*label books\n\t\t\t\t*page_break\n\t\t\t\tCertain interesting books were available at the moment.\n\t\t\t\t*choice\n\t\t\t\t\t#Return\n\t\t\t\t\t\t*goto library\n\t\t\t\t\t#Read: Birth of magic\n\t\t\t\t\t\tMagic was first discovered in 2012; soon after the Zenos invasion began.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe material known now simply as [b]magic crystals[/b] can only be created by the Zenos. It is not public knowledge how they're produced or how they work, but the end result is that magic spells can be cast by touching these crystals and imagining something happening in one's environment. Possible spells and their effectiveness are affected by several factors such as the caster's magical power, imagination, personality, environment and the quality of available magic crystals.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tSince especially [b]Armor Type Zenos[/b] are practically immune to all forms of damage except magic, mages are by far the most important military asset for humanity. That is doubly the case considering the Zenos lack efficient anti-air capabilities, and magic enables potentially devastating air-to-ground attacks.\n\t\t\t\t\t\t*goto books\n\t\t\t\t\t#Read: The three cities\n\t\t\t\t\t\tBefore North America was finally overrun by the Zenos in 2018, humanity had managed to execute several plans to avoid total extinction.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe most important among these plans was the creation of three large artificial islands that floated in the air. This was only possible by expending large amounts of magical power, but it was the only way left to save most of the remnants of humanity.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tA brand new metropolis was built on each of these flying islands. New Washington was mostly occupied by Americans as well as various gifted mages, scientists and most of humanity's remaining military forces. New Vancouver attracted most Canadians, British and Australians as well as various influential or talented civilians from around the world. New Vladivostok consisted of refugees from all around the world, but most survivors were from either Russia or China.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhile the surface of Earth was mostly destroyed by the Zenos, the three cities have remained relatively safe
