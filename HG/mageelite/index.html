le was a sight to behold. It was almost bizarre how disconnected it felt from reality. The area was completely filled with human-sized virtual reality devices, similar to the academy's simulation room, but vastly bigger in scale.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t#Play: Virtual Combat\n\t\t\t\t*goto_scene combat\n\t#Airlock Module (!)\n\t\t*label airlock\n\t\t*page_break\n\t\t\n\t\tThis was the place where you could exit the space station if you so desired.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter3_arth_event_activated = \"no\") #Talk: Arth (!)\n\t\t\t\t\n\t\t\t\tArth seemed to be preparing to exit the space station through the airlock.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week. Make your event choices carefully in this chapter...! If you have no event history together, it's likely not worth it to try bonding here.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter3_arth_event_activated \"yes\"\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What are you planning to do?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tJust before Arth was ready to go, you managed to stop him from leaving. He glared at you for a moment, but then he seemed to give up on something.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I simply hate the atmosphere of this place. It's too... stupid. Vapid. Decadent. I was planning to spend some time outside for a change of pace.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tSuddenly he looked at you, as if coming up with something important.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Do you think it's better to have war or peace?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#War\n\t\t\t\t\t\t\t\t*set arth +30\n\t\t\t\t\t\t\t\t*set ruthlessness +2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Bond with Arth greatly improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Ruthlessness increased.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Indeed. I used to think that war was the root of all evil, before, but then I learned the truth: peace can lead to much worse. Just look at this space station. It appears peaceful and joyful, at first, but it's all based on deception. Worse, self-deception. While the people below are fighting for survival, important resources are spent on feeding this abomination. And for what? Meaningless pleasure? It's because the Zenos won't reach these people, no matter what, so they ignore reality. Only when you feel danger, you actually feel alive, and then life is worth living. Fortunately we won't have to be here for long.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou left New Reno together with Arth for a space walk. It felt like his attitude toward you had improved a lot.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Peace\n\t\t\t\t\t\t\t\t*set arth +20\n\t\t\t\t\t\t\t\t*set ruthlessness -2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Bond with Arth improved.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Compassion increased.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (arth >= 50)\n\t\t\t\t\t\t\t\t\t\"I disagree... is what I would have said before. But your abilities seem to be the real deal. If you can convince me in a duel later, I'll follow you to the end, no matter the danger. Even if you fight for peace, a fight is still a fight.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou left New Reno together with Arth for a space walk. It felt like his attitude toward you had improved a lot.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (arth \u003c 50)\n\t\t\t\t\t\t\t\t\t\"I see. I'm sorry, but leave me alone for now.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tArth quickly left through the airlock, leaving you to wonder what that had all been about.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto before_roam_menu\n\t#Observation Dome (!)\n\t\t*label dome\n\t\t*page_break\n\t\t\n\t\tThis module had it all: gourmet food, live music and a superb view of the Earth.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if (chapter3_sera_event_activated = \"no\") #Talk: Sera (!)\n\t\t\t\t\n\t\t\t\tSera was sitting alone at one of the tables, looking at Earth. Somehow she seemed lonely... and maybe conflicted?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]If you activate this event, you will lose one of your ${event_points} remaining Event Points for this week. Make your event choices carefully in this chapter...! If you have no event history together, it's likely not worth it to try bonding here.[/i]\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t*selectable_if (event_points > 0) #Yes (!)\n\t\t\t\t\t\t*set chapter3_sera_event_activated \"yes\"\n\t\t\t\t\t\t*set event_points -1\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou sat together with Sera. She smiled briefly, but then seemed conflicted again.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What's bothering you?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I guess I'm simply unsure about my purpose. I understand that we're fighting for survival, and saving lives by fighting, but is it truly worth it? Sometimes I feel like we're just delaying the inevitable, or fighting the Zenos for the sake of fighting them. Even if we win, life on Earth may never recover due to the destruction caused by the war.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tThen she turned to look at you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Your power may be the decisive factor in the end. Which do you think is ultimately more meaningful... preserving life on Earth, or victory at any cost?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Preserving life\n\t\t\t\t\t\t\t\t*set sera +30\n\t\t\t\t\t\t\t\t*set ruthlessness -2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Bond with Sera greatly improved.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Compassion increased.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I see...! I think I'm more confident in our purpose now. After all, as long as the Zenos exist, humanity and the planet will continue to suffer. If we want to prevent that, we must get rid of the main cause first. Only then can Earth truly recover.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou spent some more time with Sera after that. It felt like her attitude toward you had improved a lot.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto before_roam_menu\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Victory\n\t\t\t\t\t\t\t\t*set sera +20\n\t\t\t\t\t\t\t\t*set ruthlessness +2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Bond with Sera improved.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Ruthlessness increased.[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (sera >= 50)\n\t\t\t\t\t\t\t\t\t\"I see... I suppose there's no way to protect Earth without some sacrifices. If we fail, the Zenos will devour all life that still remains.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou spent some more time with Sera after that. It felt like her attitude toward you had improved a lot.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (sera \u003c 50)\n\t\t\t\t\t\t\t\t\t\"I see... I'm sorry, but I have something to do.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tSera quickly left, leaving you to wonder what she was thinking.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto before_roam_menu\n\t#Skip to next week (advance the story!)\n\t\tAre you ready to proceed? You will no longer be able to access any events specific to this week!\n\t\t*choice\n\t\t\t#No\n\t\t\t\t*goto before_roam_menu\n\t\t\t#Yes\n\t\t\t\t*goto after_roam_menu\n\n*label after_roam_menu\n\n*page_break\n\nA few days later, your time to leave New Reno was finally at hand.\n\n\nApparently something big had happened back on the surface. Nobody seemed to know the details yet, though. You could only wait for more information while starting your return trip.\n\n\nWhat could be waiting for you there?\n\n\n[b]Chapter 3 End[/b]\n\n*check_achievements\n*if not(choice_achieved_chapter3)\n\t*achieve chapter3\n\n*finish", "chapter4": "*advertisement 1200\n[b]Chapter 4: Week 25, 2031[/b]\n\n\nYou were currently aboard the same transport plane that you had used to quickly reach the Arctic weeks ago. However, the situation was far more serious this time around.\n\n\nThe details were still uncertain, but it looked like the Zenos had launched a major offensive against New Vancouver with over a thousand Flying Type Zenos. It was enough to completely destroy the city if it didn't receive reinforcements. New Washington and New Vladivostok had already offered some support, but it didn't seem to be enough to save the city. They had to prioritize their own security. To some extent, New Vancouver was struggling alone.\n\n\nHowever, that's where your team showed its value. It was now a massive military asset that was easy to mobilize and move around. It was possible that you might be able to save the city even on your own. \n\n\nZavier had stressed that your life was more valuable than the whole city of New Vancouver. That being the case, you would likely be in more of a supportive role than fighting them in close combat. \n\n*page_break\n\nIt didn't take very long until New Vancouver was in your field of vision.\n\n\nIn addition, a massive horde of flying Zenos were approaching the airborne island from the direction of Africa. They appeared to be slowed down, for now, but the city's defenders were constantly dropping from the sky. It didn't look like they would be able to hold them back for much longer.\n\n\nThe plane carrying you started to slow down, although Arth looked mildly annoyed about that fact. Then he sighed and seemed to give up.\n\n\n\"I wish we could get closer to them, but it's probably too dangerous. They would overwhelm us immediately from all directions.\"\n\n\nYou were already close enough to cast certain long-range spells, but the Zenos couldn't yet reach you at all. It was probably the right time to act.\n\n\n[i]Magic spells available to cast[/i]:\n\n\n[b]Homing Missiles[/b]: Launches lethal projectiles that follow all nearby enemies until they're hit directly. [i]Generated by Conscientiousness.[/i]\n\n\n[b]Hurricane[/b]: Creates a powerful storm that strikes down nearby flying targets. [i]Generated by Spontaneity.[/i]\n\n\n[b]Gravity Field[/b]: Randomly decreases and increases gravity in the target area. [i]Generated by Openness.[/i]\n\n\n[b]Missile Turret[/b]: Creates a magical weapon that continues shooting missiles at nearby flying enemies. [i]Generated by Stoicism.[/i]\n\n*choice\n\t*selectable_if (conscientiousness >= 50) #Homing Missiles\n\t\t*set conscientiousness +1\n\t\t[i]Conscientiousness increased.[/i]\n\t\t\n\t\t\n\t\tHundreds of magical missiles immediately appeared out of thin air and headed for the vast horde of Flying Type Zenos.\n\t\t\n\t\t\n\t\tIt was a rather impressive sight for a single spell. This kind of power could easily turn the tide of any modern war.\n\t\t\n\t\t\n\t\tA moment later, the Zenos forces started suffering heavy losses. They dropped out of the sky in large amounts and appeared to be in chaos after suffering such a heavy blow.\n\t\t\n\t\t*goto after_spell_choice\n\t*selectable_if (conscientiousness \u003c= 50) #Hurricane\n\t\t*set conscientiousness -1\n\t\t[i]Spontaneity increased.[/i]\n\t\t\n\t\t\n\t\tA huge magical storm appeared out of thin air and headed for the vast horde of Flying Type Zenos.\n\t\t\n\t\t\n\t\tIt was a rather impressive sight for a single spell. This kind of power could easily turn the tide of any modern war.\n\t\t\n\t\t\n\t\tA moment later, the Zenos forces started suffering heavy losses. They dropped out of the sky in large amounts and appeared to be in chaos after suffering such a heavy blow.\n\t\t\n\t\t*goto after_spell_choice\n\t*selectable_if (openness >= 50) #Gravity Field\n\t\t*set openness +1\n\t\t[i]Openness increased.[/i]\n\t\t\n\t\t\n\t\tA gravity anomaly appeared out of thin air and headed for the vast horde of Flying Type Zenos.\n\t\t\n\t\t\n\t\tIt was a rather impressive sight for a single spell. This kind of power could easily turn the tide of any modern war.\n\t\t\n\t\t\n\t\tA moment later, the Zenos forces started suffering heavy losses. They dropped out of the sky in large amounts and appeared to be in chaos after suffering such a heavy blow.\n\t\t\n\t\t*goto after_spell_choice\n\t*selectable_if (neuroticism \u003c= 50) #Missile Turret\n\t\t*set neuroticism -1\n\t\t[i]Stoicism increased.[/i]\n\t\t\n\t\t\n\t\tA magical turret appeared in the air next to your plane and started launching missiles at the vast horde of Flying Type Zenos.\n\t\t\n\t\t\n\t\tIt was a rather impressive sight for a single spell. This kind of power could easily turn the tide of any modern war.\n\t\t\n\t\t\n\t\tA moment later, the Zenos forces started suffering heavy losses. They dropped out of the sky in large amounts and appeared to be in chaos after suffering such a heavy blow.\n\t\t\n\t\t*goto after_spell_choice\n\n*label after_spell_choice\n\n*page_break\n\nYour opening attack had been a great success. Even your classmates appeared shocked at just how much destruction you were able to cause with one spell.\n\n\nIn response, the remaining Zenos forces split into two groups. The larger group retreated toward Africa whereas the smaller group headed straight for New Vancouver. It was a grave threat to the city itself, but not much of a threat compared to the fleeing force of Zenos.\n\n\n[i]Target the fleeing force, and ignore New Vancouver for now. For humanity's sake, some sacrifices must be made.[/i]\n\n\n\"No, we can't let them die! There are so few humans left, but the Zenos can easily replace their losses. We can't afford to sacrifice any more people!\"\n\n\nZavier and Sera had the exact opposite views on how to proceed. The others didn't seem to have made up their minds yet.\n\n\nShould you target the fleeing main force of the Flying Type Zenos, or protect the city in front of you?\n\n\n[i]Magic spells available to cast[/i]:\n\n\n[b]Gravity Storm[/b]: Causes a large area to be ripped apart by gravity. [i]Generated by Ruthlessness.[/i]\n\n\n[b]Stasis[/b]: Freezes all living beings in a large area, making them unable to move or to be moved. [i]Generated by Machiavellianism.[/i]\n\n\n[b]Area Regeneration[/b]: Immediately recovers damage caused to living beings and structures in a large area, making them essentially invulnerable. [i]Generated by Compassion.[/i]\n\n\n[b]Protection Field[/b]: Shields a large area from receiving any damage as long as they don't attack themselves. [i]Generated by Honor.[/i]\n\n*choice\n\t*selectable_if (ruthlessness >= 50) #Gravity Storm (target the main force)\n\t\t*set chapter4_flying_zenos_status \"destroyed\"\n\t\t*set chapter4_new_vancouver_status \"destroyed\"\n\t\t*set ruthlessness +2\n\t\t[i]Ruthlessness increased.[/i]\n\t\t\n\t\t\n\t\tYou quickly started casting another spell before the enemy could escape out of your attack range.\n\t\t\n\t\t\n\t\tA massive storm of gravity anomalies started ripping apart the larger Zenos force that was trying to retreat toward the First Nest. It took a while, but almost all of them were eventually crushed to pieces.\n\t\t\n\t\t\n\t\tMeanwhile, the other group of Flying Type Zenos had attacked New Vancouver and destroyed large parts of the city. In the end, they had been defeated by the defenders.\n\t\t\n\t\t\n\t\tBoth the Zenos forces and the city itself had been ruined during the battle. However, your own team hadn't suffered any injuries.\n\t\t\n\t\t*goto after_spell_choice2\n\t*selectable_if (machiavellianism >= 50) #Stasis (target the main force)\n\t\t*set chapter4_flying_zenos_status \"destroyed\"\n\t\t*set chapter4_new_vancouver_status \"destroyed\"\n\t\t*set machiavellianism +2\n\t\t[i]Machiavellianism increased.[/i]\n\t\t\n\t\t\n\t\tYou quickly started casting another spell before the enemy could escape out of your attack range.\n\t\t\n\t\t\n\t\tSoon the larger Zenos force that was trying to retreat toward the First Nest had stopped moving. They were extremely vulnerable to any attacks, and the air forces of New Vancouver didn't waste this opportunity. It took a while, but almost all of them were eventually dropped out of the sky.\n\t\t\n\t\t\n\t\tMeanwhile, the other group of Flying Type Zenos had attacked New Vancouver and destroyed large parts of the city. In the end, they had been defeated by the defenders.\n\t\t\n\t\t\n\t\tBoth the Zenos forces and the city itself had been ruined during the battle. However, your own team hadn't suffered any injuries.\n\t\t\n\t\t*goto after_spell_choice2\n\t*selectable_if (ruthlessness \u003c= 50) #Area Regeneration (defend the city)\n\t\t*set ruthlessness -2\n\t\t[i]Compassion increased.[/i]\n\t\t\n\t\t\n\t\tYou quickly started casting another spell before New Vancouver was hit by the enemy's reckless charge.\n\t\t\n\t\t\n\t\tThe whole city was covered by a green glow. This powerful spell made it far more difficult for the Zenos to cause any damage. In the end, they were defeated by the defenders without causing much destruction at all.\n\t\t\n\t\t\n\t\tMeanwhile, the larger group of Flying Type Zenos had retreated out of your attack range.\n\t\t\n\t\t\n\t\tBoth the Zenos forces and the city itself had been somewhat spared from damage during the fight. Only the air forces of New Vancouver had suffered great casualties.\n\t\t\n\t\t*goto after_spell_choice2\n\t*selectable_if (machiavellianism \u003c= 50) #Protection Field (defend the city)\n\t\t*set machiavellianism -2\n\t\t[i]Honor increased.[/i]\n\t\t\n\t\t\n\t\tYou quickly started casting another spell before New Vancouver was hit by the enemy's reckless charge.\n\t\t\n\t\t\n\t\tThe whole city was covered by a yellow glow. This powerful spell made it far more difficult for the Zenos to cause any damage. In the end, they were defeated by the defenders without causing much destruction at all.\n\t\t\n\t\t\n\t\tMeanwhile, the larger group of Flying Type Zenos had retreated out of your attack range.\n\t\t\n\t\t\n\t\tBoth the Zenos forces and the city itself had been somewhat spared from damage during the fight. Only the air forces of New Vancouver had suffered great casualties.\n\t\t\n\t\t*goto after_spell_choice2\n\n*label after_spell_choice2\n\n*page_break\n\nYou were quite exhausted after using multiple strategic class spells in a row, but you had successfully pushed back the Flying Type Zenos offensive. It was another success.\n\n\nYour transport plane immediately headed back toward New Washington. It appeared that there was still some secrecy regarding your existence, so you couldn't appear in public at this timing.\n\n\nHowever, the fact remained that you were becoming irreplaceable for humanity. Even your classmates still appeared to be shocked at just how effective your spells were against the Zenos.\n\n\nAn hour later, you had finally returned to New Washington from your journey to space.\n\n*page_break\n\nThe magic academy was temporarily closed, but there was some free time available to spend in New Washington.\n\n\nNow, it was just the calm before the storm... before the war against the Zenos reached its climax.\n\n\n*if (maria >= 50)\n\t[i]Maria requested to meet you at the Shanty Town area.[/i]\n\n\n*if (arth >= 50)\n\t[i]Arth requested to meet you at the Duel Barrier Zone.[/i]\n\n\n*if (sera >= 50)\n\t[i]Sera requested to meet you at the New Washington Tower.[/i]\n\n\n*if (will >= 50)\n\t[i]Will requested to meet you at the Airport.[/i]\n\n*label before_roam_menu\n\n*page_break\n\n*choice\n\t#New Washington Tower\n\t\t\n\t\tThe New Washington Tower was the tallest building in the world. It even had an extremely fast magical elevator. The view at the top was probably something impossible to replicate anywhere else.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if ((sera >= 50) and (chapter4_sera_event_activated = \"no\")) #Meet: Sera (!)\n\t\t\t\t*set chapter4_sera_event_activated \"yes\"\n\t\t\t\t*set sera +30\n\t\t\t\t[i]Bond with Sera improved.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIt took a while to reach the top of the majestic tower, but as promised, Sera was already waiting for you there. She appeared to be looking at the surface of the planet far below.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAfter she noticed you, she briefly smiled and then continued watching the surface.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"You know, I must thank you for many things. Most of all, I feel like my life finally truly has meaning. With the power we possess, we can ultimately save so many lives from suffering and death. Without you, none of this would ever be possible.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou waited for her to continue, and she indeed seemed to have something left to say.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I'm ready to follow you all the way, even if we have to sacrifice our lives to defeat the Zenos. It's worth it so that there will be a future for humanity, and all the other species we've managed to preserve. Dying for that purpose doesn't actually sound so bad at all.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIt was a memorable moment just between you and Sera. Looking at the surface below, badly ravaged but still containing some life and potential, you could feel that the future Sera dreamt of wasn't impossibly far off.\n\t\t\t\t\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_sera)\n\t\t\t\t\t*achieve sera\n\t\t\t\t\n\t\t\t\t*goto before_roam_menu\n\t#Shanty Town\n\t\t\n\t\tThis area of the city was frankly repulsive, and its safety seemed questionable at best. All things considered, it would likely be better to never visit it.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if ((maria >= 50) and (chapter4_maria_event_activated = \"no\")) #Meet: Maria (!)\n\t\t\t\t*set chapter4_maria_event_activated \"yes\"\n\t\t\t\t*set maria +30\n\t\t\t\t[i]Bond with Maria improved.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tEven though you had some doubts, you had willingly entered this slum area to fulfill Maria's request. It was probably something important if she couldn't just say it in a more convenient location.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tNot to disappoint you, she was indeed waiting for you at a remote street she had specified. Her face was more serious than you had ever seen.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIt looked like she had a rather shocking message to convey to you.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I invited you here because the surveillance system of the city is weakest here. There's a tiny bomb hidden inside your brain. Its detonator is held by Zavier. If you value your life, you should cast a Disable Electronics spell straight at your head immediately. Otherwise it may soon be too late.\"\n\t\n\t\n\t\t\t\tWas there any risk in casting that spell...? There shouldn't be. But nothing was ever completely certain. And it was something that Zavier... might actually do, after all.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"How do you know that, though?\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"It was thanks to a listening device of mine. I can tell you more details later. I'll add that I've bet everything on you, and I will follow you to the end. I believe you can defeat the Zenos and bring a bright future for humanity once again.\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Cast the spell\n\t\t\t\t\t\t*set kill_switch_disabled \"yes\"\n\t\t\t\t\t\tYou hesitantly cast the spell, but it didn't really feel like anything had happened. At the very least nothing seemed to go wrong.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"It's to be expected that you won't notice anything yet. It's too tiny to really be detected without removing your brain from your head. However, I'm sure it's no longer functional. Zavier should have no idea about what happened, either.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto after_early_switch_choice\n\t\t\t\t\t#Don't do it\n\t\t\t\t\t\tEven if Maria was right, there should be no reason for Zavier to kill you. Besides, she was certainly a bit suspicious herself. You slowly turned your head away.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I see. Even so, I will follow you and support you with everything I can. I can only hope that I'm wrong about Zavier.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto after_early_switch_choice\n\t\t\t\t\n\t\t\t\t*label after_early_switch_choice\n\t\t\t\t\t\t\n\t\t\t\tWho was Maria, in the end? An agent from the government? A spy? Zavier's underling, or maybe she used to be one? Regardless, she was a crucial part of your team now. For some reason, her words felt too genuine to doubt her intentions that much.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIn order to avoid suspicions, you quickly split up and left the area. However, it was certainly a meeting you wouldn't soon forget.\n\t\t\t\t\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_maria)\n\t\t\t\t\t*achieve maria\n\t\t\t\t\n\t\t\t\t*goto before_roam_menu\n\t#Airport\n\t\t\n\t\tThis was the largest airport in the world. Not only that, but it was also home to humanity's largest remaining air force.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if ((will >= 50) and (chapter4_will_event_activated = \"no\")) #Meet: Will (!)\n\t\t\t\t*set chapter4_will_event_activated \"yes\"\n\t\t\t\t*set will +30\n\t\t\t\t[i]Bond with Will improved.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIt was an odd place for a meeting, but ignoring that, you quickly found Will waiting for you there.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tHe was watching the irregularly departing planes with a somewhat wistful look.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"Do you know how many times I've thought about leaving this academy behind and simply living the rest of my life avoiding the Zenos? Practically every time I've had to face them so far. My fear of them sometimes feels like it's only growing stronger, although I'm trying my best to prevent it.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThen he turned to look at you.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"But after the last battle, my feelings have slightly changed. With the power you have at your disposal, it may well be safer to stay with you than to hide from both the Zenos and the government. What I'm trying to say is that I'm putting my trust in you, and won't consider escaping anymore. I truly hope we'll both survive what's to come. At least I'll bet everything on it.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAfter that, you couldn't both help but start smiling. It was certainly nice to have this kind of shared battle-tested trust with someone.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou spent some more time talking with him before leaving for your temporary resting quarters.\n\t\t\t\t\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_will)\n\t\t\t\t\t*achieve will\n\t\t\t\t\n\t\t\t\t*goto before_roam_menu\n\t\t\t\t\n\t#Central Station\n\t\t*label central\n\t\t*page_break\n\t\t\n\t\tThe central station of the city was filled with various people. There were beggars, merchants, and even some protestors. They were apparently protesting the rationing of magic crystals.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t#Duel Barrier Zone\n\t\t\n\t\tThe barrier zone for official duels was a big attraction in the city.\n\t\t\n\t\t*choice\n\t\t\t#Return\n\t\t\t\t*goto before_roam_menu\n\t\t\t*if ((arth >= 50) and (chapter4_arth_event_activated = \"no\")) #Meet: Arth (!)\n\t\t\t\t*set chapter4_arth_event_activated \"yes\"\n\t\t\t\t*set arth +30\n\t\t\t\t[i]Bond with Arth improved.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou already had an idea of what Arth might want to do as you entered the barrier zone. After all, there was basically only one thing to be done here: magic duels. He had also hinted in the past that he mainly respected raw power.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tNot to disappoint your expectations, he was waiting for you fully prepared for battle. Magical power was radiating around him as if waiting to be unleashed. His expression was fully calm, though.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I'm not a fool, and I know everything depends on you going forward. It's only natural that you'll be leading us if your spells contribute the vast majority of our results. However, it's a different matter to accept it from the heart. In order to entrust my life and death in your hands, I'll have to judge you directly. Let's test our magic against each other until one of us drops. With standard magic crystals, of course. If you used that special magic crystal, it wouldn't be a match at all.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou nodded approvingly and stepped forward. Magical power began emanating from your body as well.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tHowever, the end result was already decided even before the duel started. Your originally high magical power was the reason why you were even able to use Zavier's invention, in the first place. You didn't need it to defeat Arth at all.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs if to prove a point, you walked right next to Arth. After all, close combat was his specialty. He might not be convinced if you sniped him from a distance.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tA contest of raw power quickly began. You both focused on enhancing your bodies and clashed against each other with blows of magical power. Due to using the same magic crystals, the difference wasn't immediately apparent, but soon enough Arth was being pushed back. After a few more rounds of blows, he was already on the ground, defeated.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"It's my loss. I won't object to your decisions anymore.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tArth seemed to be too weakened to even rise up from the ground, but he still made the effort to honor his promise. It was a touching display of trustworthiness. It felt like you could absolutely count on Arth going forward.\n\t\t\t\t\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_arth)\n\t\t\t\t\t*achieve arth\n\t\t\t\t\n\t\t\t\t*goto before_roam_menu\n\t\t\t\t\n\t#Skip to next week (advance the story!)\n\t\tAre you ready to proceed? You will no longer be able to access any events specific to this week!\n\t\t*choice\n\t\t\t#No\n\t\t\t\t*goto before_roam_menu\n\t\t\t#Yes\n\t\t\t\t*goto after_roam_menu\n\n*label after_roam_menu\n\n*if (chapter4_maria_event_activated = \"no\")\n\t\n\t*page_break\n\t\n\tThat night, you received an anonymous message. Its content was quite shocking.\n\t\n\t\n\t[i]There's a tiny bomb hidden inside your brain. Its detonator is held by Zavier. If you value your life, you should cast a Disable Electronics spell straight at your head immediately. Otherwise it may soon be too late. From someone who believes in your importance.[/i]\n\t\n\t\n\tWas there any risk in casting that spell...? There shouldn't be. But nothing was ever completely certain. And it was something that Zavier... might actually do, after all.\n\t\n\t*choice\n\t\t#Cast the spell\n\t\t\t*set kill_switch_disabled \"yes\"\n\t\t\tYou hesitantly cast the spell, but it didn't really feel like anything had happened. Perhaps it was a prank of some sort? That seemed unlikely, but it was impossible to know for sure at this point.\n\t\t\t*goto after_later_switch_choice\n\t\t#Don't do it\n\t\t\tEven if the message was right, there should be no reason for Zavier to kill you. It was better not to trust some unknown message just like that.\n\t\t\t*goto after_later_switch_choice\n\t\t\t\n*label after_later_switch_choice\n\n*page_break\n\nThe fate of humanity might be decided in the following days, but for now, New Washington remained peaceful.\n\n\nIt was uncertain what course of action would follow since the three cities were no longer safe havens. Right now you could only wait for more information.\n\n\n[b]Chapter 4 End[/b]\n\n*check_achievements\n*if not(choice_achieved_chapter4)\n\t*achieve chapter4\n\n*finish", "chapter5": "*advertisement 1200\n[b]Chapter 5: Week 26, 2031[/b]\n\n\nAfter a few days of uncertainty, you suddenly receiced an invitation to Zavier's office.\n\n\nHe wasn't an ordinary magic researcher at all. It was difficult to estimate his sway, but it was clear that he had an important role in the government of New Washington. He even seemed to have influence over the Anti-Magic Agency.\n\n\nEven though you had some doubts about this invitation, it was impossible to refuse. You quickly made your way to his office.\n\n*page_break\n\nZavier was waiting for you alone in a room that practically contained nothing besides two chairs and a desk. It almost looked like an interrogation room. However, this was certainly his personal office.\n\n\n\"Subject Zero... you have certainly surpassed all of my expectations. Without you, the current situation would be hopeless, but now we have a chance to even defeat the Zenos. Before we begin, there's some extra time left. As a reward, you can ask me exactly one question and I'll answer truthfully, whatever it is. I'm sure you have many things that don't make sense to you yet.\"\n\n\nBegin what? In any case, if he was telling the truth, there were indeed many things that would be great to know about. His trustworthiness was just slightly questionable. He had always enjoyed riddles and mysteries, even years ago.\n\n*choice\n\t#Truth about magic and the Zenos\n\t\t\n\t\tZavier smiled after hearing your choice.\n\t\t\n\t\t\n\t\t\"That is a profound topic. Even I do not know everything, but I know much more than what is available in public. The truth is that all magic crystals are basically excrements of the Rush Type Zenos. They consume any organic material they come across, then digest it, and the end result is a magic crystal. Over the years, many magic crystals have also fallen into the oceans, so it's not a lie to say that the Arctic bases harvest them from the oceans. They also contain many captured Rush Type Zenos, though, that are fed various plants to keep them producing magic crystals. This is not public knowledge for several reasons. A big mystery about magic crystals is what they're used for by the Zenos. My own speculation is that they're used to fuel an intergalactic space fleet that is using the Zenos for gathering magic crystals. That's mainly because we've detected several massive packages of magic crystals being launched toward intergalactic space by the Nests, protected by even tougher magical barriers than the Nests themselves. How the magic crystals generate magic is still unknown, but any sufficiently advanced technology is indistinguishable from magic. It has to be some aspect of the universe related to life itself that we have not yet discovered. That's the only explanation for why life is required to create magic crystals. Something about life must be fundamentally different compared to any other material. The Philosopher's Stone, on the other hand, was not developed by us, but found extremely rarely among other magic crystals. We still have no idea about its original purpose, but it's vastly more powerful than any other magic crystal... and likely only you can use it for the foreseeable future.\"\n\t\t\n\t\t\n\t\tNot everything about magic was known or revealed by Zavier, but at least several major questions were answered at once.\n\t\t\n\t\t*goto after_zavier_choice\n\t#Truth about the Arctic mission weeks ago\n\t\t\n\t\tZavier smiled after hearing your choice.\n\t\t\n\t\t\n\t\t\"That is simple to answer for me. The truth is that we detected the incoming Zenos attack days before it was going to reach the Arctic. Naturally, I ordered our own base to be immediately evacuated. New Vladivostok, on the other hand, didn't seem to detect it at all. It might have been due to certain jamming weapons we had installed around the Arctic months ago. Your class was sent there not for any specific goal, but simply as a second aptitude test before handing over the Philosopher's Stone to you. It didn't really matter if you saved their Arctic base or not. If you did, they would be embarrassed and in our debt, and if you didn't, they would be significantly weakened. The important part was that you could experience a real battle against a large Zenos force without too much risk to yourselves and without any help or direct orders. The results were good enough.\"\n\t\t\n\t\t\n\t\tIt looked like both your class and New Vladivostok were dancing in Zavier's palms all along.\n\t\t\n\t\t*goto after_zavier_choice\n\t#Truth about the possible bomb inside your head\n\t\t\n\t\tZavier seemed extremely amused after hearing your choice.\n\t\t\n\t\t\n\t\t\"That is a very interesting question. The truth is that you are correct: there is a microscopic bomb inside your head. It was planted immediately at your birth, and can never be removed or disabled, as it was built from organic material that will activate if messed with. You could say it's an insurance policy prepared long in advance of you actually being able to possibly use the Philosopher's Stone. If you ever rebelled for any or no reason, it would be easy to kill you. However, it's only an insurance for extreme situations. I don't believe either of us want that to ever actually happen. I'm also interested to hear where you learned about this topic, but it's not really a major issue for now. Just remember that as long as our interests are aligned, you have nothing to fear.\"\n\t\t\n\t\t\n\t\tThe reality of the situation was... too cruel. Were you forced to serve Zavier forever, after all?\n\t\t\n\t\t*goto after_zavier_choice\n\t#Truth about the childhood experiments performed on you\n\t\t\n\t\tZavier smiled after hearing your choice.\n\t\t\n\t\t\n\t\t\"That is a nostalgic topic. The truth is that you weren't only experimented on as a child, but you were fully created in one of our laboratories. You were one among hundreds of artificial babies that we created in order to create a human with enough magical power to use the Philosopher's Stone. Every other attempt has been a failure so far, except you. In fact, your existence is a major reason for why I'm in my current political position. There is always hope that we will one day succeed again, and I'm sure we eventually will, but for now we can only rely on you to deal with the threat of the Flying Type Zenos. \"\n\t\t\n\t\t\n\t\tZavier's methods were quite inhumane, but if one only looked at the results, he had indeed perhaps saved humanity by creating your current abilities. That still couldn't erase the feelings of slight fear toward Zavier that you had always felt. Perhaps it was the same feeling that a sentient guinea pig would still have after being released from their laboratory.\n\t\t\n\t\t*goto after_zavier_choice\n\n*label after_zavier_choice\n\n*page_break\n\nJust as Zavier had finished his explanation, a ringing alarm sound filled the room. Holograms of dozens of other people appeared around you. They seemed to all be important politicians and military commanders of the three cities.\n\n\nZavier made a gesture indicating that you shouldn't speak. Were you included in the meeting by Zavier without being invited? Regardless, Zavier started talking himself.\n\n\n\"Now that you're all here, let's begin. All the preparations are done for our decisive battle against the Zenos. We finally have a weapon that can threaten a Nest, and our forces are gathering around the First Nest as we speak. It may well be that humanity's fate will be decided today. Any suggestions?\"\n\n\nIt felt more like a rhetorical question than a true demand for feedback. Zavier glanced at the faces of the various representatives.\n\n*page_break\n\nA general from New Vladivostok didn't waste the opportunity.\n\n\n*if (chapter2_nv_arctic_base_fate = \"intact\")\n\t\"This Subject Zero of yours is also the savior of our Arctic base, so we will volunteer extra mages for protection of the main assault team. In addition, as we agreed earlier, we will use half of our remaining nuclear weapons in this operation.\"\n\t\n\t\n\tZavier looked quite vexed due to the new suggestion, but ultimately didn't argue against it.\n\t\n*if (chapter2_nv_arctic_base_fate = \"destroyed\")\n\t\"Due to the destruction of our Arctic base, we cannot send many forces reliant on magic crystals to participate. However, as we agreed earlier, we will use half of our remaining nuclear weapons in this operation.\"\n\t\n\t\n\tZavier looked slightly doubtful about his words, but ultimately didn't seem to care much about it.\n\t\n\n\n\"That's fine. We will provide most of the mages and magical artillery for the attack, and you will be responsible for most of the nuclear weapons.\"\n\n\nThe discussion continued for a little longer, but everyone already seemed to be in a hurry to be somewhere else. \n\n*page_break\n\nAfter a while, the holograms around the room disappeared. Zavier turned to face you again.\n\n\n\"Now you should understand what is about to happen. Gather your bodyguards... classmates, and prepare to depart at any moment. Today we will either take out the First Nest, or we will lose most of our resources for almost nothing. The fate of humanity will soon be in your hands.\"\n\n\nYou could only nod. Indeed, if the First Nest continued creating more Flying Type Zenos, the three cities would soon be overwhelmed, just like the planet's surface had been lost.\n\n*page_break\n\nAfter only a couple of hours had passed, you were already inside a military transport plane along with Maria, Arth, Sera and Will. Dozens of other military mages were also there with you. Their magical powers weren't quite as strong compared to members of your class, but they were still elite mages. Their main task was simply to boost your magic when needed, though.\n\n\nThe plane was quickly approaching the coasts of Africa, where the First Nest was located. It was still too early to enter the continent, but the softening phase was about to begin.\n\n*page_break\n\n[i]Nuclear launches are underway. Maintain distance from central Africa at all times![/i]\n\n\nThe transmission from New Vladivostok clearly indicated that the operation had now officially begun. The atmosphere inside the plane was quite tense, and nobody really dared to talk for now.\n\n\nThe radar screen in front of you soon detected hundreds of incoming nuclear missiles. They were all headed toward the central parts of the continent. It wouldn't take long for the continent to be mostly annihilated, although it wouldn't be the end of your difficulties just yet. The Zenos had an amazing ability to survive even through nuclear strikes, after all.\n\n\nAfter a moment that felt like eternity, massive explosions started illuminating the sky. It quickly felt like the whole continent of Africa was being engulfed in one vast firestorm. \n\n*page_break\n\nSera immediately started casting a barrier to surround your plane for extra protection. Some of the nearby mages also started boosting her magic in order to preserve her magical power.\n\n\nAs soon as the explosions ahead of you subsided somewhat, the various air forces surrounding Africa quickly started establishing air superiority above the continent.\n\n*if (chapter4_flying_zenos_status = \"destroyed\")\n\tFortunately, so many Flying Type Zenos had been destroyed several days ago that it wasn't difficult to control the skies above Africa anymore. Since the Flying Type Zenos weren't as durable against nuclear weapons as the Armor Type Zenos, some of them had probably died in the explosions just now. Not to mention that some of them were probably stuck in their underground tunnels that had collapsed due to the bombardment.\n\t\n\t*page_break\n\t\n\tIn any case, this was still only the first phase of the softening operation. Quickly after establishing air superiority, a massive magical bombardment followed. The whole continent was again filled with explosions caused by magical artillery and strategic class spells. Countless Zenos must have already been annihilated by now.\n\t\n\t\n\tYou could have caused even stronger explosions with your own spells, but that would have been counterproductive. Getting rid of the First Nest was the only thing that truly mattered this time, and nobody else could do it except you. It would have been highly unwise to waste magical power before even getting close to it.\n\t\n\t\n\tSoon, hundreds of other transport planes started approaching the location of the First Nest ahead of you. Although you were the most important person for this operation, thousands of mages would be sacrificing their lives to improve your chances of success. The truly difficult part of the operation was just about to begin.\n\t\n\t*goto entering_first_nest\n\n*if (chapter4_flying_zenos_status = \"intact\")\n\tUnfortunately, the Flying Type Zenos weren't entirely wiped out by the surprise nuclear attack. Hundreds of them soon started appearing from below the ground, and they immediately collided against the air forces trying to dominate the skies above Africa. Thanks to their extreme mobility, they were able to dodge most attacks and quickly ripped through anything in their way. \n\t\n\t\n\tYou could deal with them by using the Philosopher's Stone, but... Zavier immediately contacted you as you were considering it.\n\t\n\t\n\t[i]Do not waste your magical power here, no matter what happens with the Flying Type Zenos. Even if there are sacrifices, those Zenos will eventually be defeated, whereas you are an irreplaceable asset for the mission. Everything else is secondary to destroying the First Nest.[/i]\n\t\n\t\n\tThat was certainly true, but the chaotic fight over the sky showed no signs of being over anytime soon... while hundreds of people were dying every moment.\n\t\n\t\n\t[i]Magic spells available to cast[/i]:\n\t\n\t\n\t[b]Homing Missiles[/b]: Launches lethal projectiles that follow all nearby enemies until they're hit directly. [i]Generated by Conscientiousness.[/i]\n\t\n\t\n\t[b]Mass Slow[/b]: Slows the movements of all nearby enemies. [i]Generated by Disagreeableness.[/i]\n\t\t\n\t*choice\n\t\t#Preserve your magical power\n\t\t\t*set magical_power_preserved \"yes\"\n\t\t\t*set nw_forces_state \"depleted\"\n\t\t\t*set machiavellianism +2\n\t\t\t*set ruthlessness +1\n\t\t\t*set agreeableness +1\n\t\t\t*set conscientiousness +1\n\t\t\t[i]Machiavellianism, Ruthlessness, Agreeableness and Conscientiousness increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tAll the lives lost today were ultimately meaningless compared to the possible losses following a failure of the mission. No matter what, that could never be allowed.\n\t\t\t\n\t\t\t\n\t\t\tThe aerial battle raged on, but your plane already started descending away from it.\n\t\t\t\n\t\t\t*goto after_sky_choice\n\t\t\t\n\t\t*selectable_if (conscientiousness >= 50) #Cast Homing Missiles\n\t\t\t*set magical_power_preserved \"no\"\n\t\t\t*set nw_forces_state \"intact\"\n\t\t\t*set conscientiousness +2\n\t\t\t*set agreeableness -2\n\t\t\t*set ruthlessness -1\n\t\t\t*set machiavellianism -1\n\t\t\t[i]Conscientiousness, Disagreeableness, Compassion and Honor increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tDespite Zavier's warning, you decided to spend your magical power here. \n\t\t\t\n\t\t\t\n\t\t\tAs you activated your magic, a large amount of magical missiles launched toward the closest Flying Type Zenos. It was hardly enough to take them all down, but their numbers should be significantly reduced.\n\t\t\t\n\t\t\t\n\t\t\tEveryone next to you seemed a bit surprised, but nobody objected to your decision. Regardless, it was already done.\n\t\t\t\n\t\t\t\n\t\t\tThe aerial battle raged on, but your plane already started descending away from it.\n\t\t\t\n\t\t\t*goto after_sky_choice\n\t\t\t\n\t\t*selectable_if (agreeableness \u003c= 50) #Cast Mass Slow\n\t\t\t*set magical_power_preserved \"no\"\n\t\t\t*set nw_forces_state \"intact\"\n\t\t\t*set agreeableness -3\n\t\t\t*set ruthlessness -1\n\t\t\t*set machiavellianism -1\n\t\t\t*set conscientiousness -1\n\t\t\t[i]Disagreeableness, Compassion, Honor and Spontaneity increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tDespite Zavier's warning, you decided to spend your magical power here. \n\t\t\t\n\t\t\t\n\t\t\tAs you activated your magic, the movements of the Flying Type greatly slowed down. They should be much easier targets going forward.\n\t\t\t\n\t\t\t\n\t\t\tEveryone next to you seemed a bit surprised, but nobody objected to your decision. Regardless, it was already done.\n\t\t\t\n\t\t\t\n\t\t\tThe aerial battle raged on, but your plane already started descending away from it.\n\t\t\t\n\t\t\t*goto after_sky_choice\n\t\t\n\t*label after_sky_choice\n\t\n\tSoon, hundreds of other transport planes started approaching the location of the First Nest ahead of you. Although you were the most important person for this operation, thousands of mages would be sacrificing their lives to improve your chances of success. The truly difficult part of the operation was just about to begin.\n\t\n\t*goto entering_first_nest\n\n*label entering_first_nest\n\n*page_break\n\nYour transport plane also started approaching the First Nest. Surrounded by a vast amount of allied forces, nothing seemed capable of threatening you yet. Beneath the ground, though, the situation could quickly get out of control.\n\n\nArth seemed to be in a rather good mood. Perhaps this kind of situation wasn't a bad thing at all for him. Maria and Sera looked a little worried, but not too shaken.\n\n\nOn the other hand, Will had a noticeably ghastly expression on his face.\n\n\n*if (chapter4_will_event_activated = \"yes\")\n\n\tAfter a while, he seemed to get his fears under control. It was even a little admirable for someone who feared the Zenos so much. It had probably been worth it to increase his trust in your abilities over the past weeks.\n\n*if (chapter4_will_event_activated = \"no\")\n\n\tWill's emotional state seemed to take a turn for the worse as you got closer to the First Nest. He was even nervously touching his magic crystals, as if thinking about something.\n\t\n\t\n\tIf only there was some way to snap him out of it...\n\t\n\t\n\t[i]Magic spells available to cast[/i]:\n\t\n\t\n\t[b]Superior Serenity[/b]: Greatly calms the mind of a target. [i]Generated by Empathy.[/i]\n\t\n\t*choice\n\t\t*selectable_if (selfabsorption \u003c= 50) #Cast Superior Serenity\n\t\t\t*set selfabsorption -3\n\t\t\t[i]Empathy increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tYou decided to spend a small part of your magical power to cast a strong mental support spell on Will.\n\t\t\t\n\t\t\t\n\t\t\tIt seemed to have a positive effect on him right away. His expression became far more confident, and he didn't seem to be afraid of the upcoming mission anymore. He also glanced at you while looking grateful.\n\t\t\t\n\t\t\t\n\t\t\tThis Philosopher's Stone truly could be used to solve any sort of problem.\n\t\t\t\n\t\t\t*goto after_will_scene\n\t\t#Ignore him\n\t\t\t*set will_fate \"mia\"\n\t\t\t*set selfabsorption +2\n\t\t\t[i]Self-Absorption increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tIt wasn't probably worth wasting your limited magical power just to improve your companion's mental state. \n\t\t\t\n\t\t\t\n\t\t\tHowever, as you got even closer to the ground, Will looked like he was about to break down. Suddenly he started casting a movement spell on himself and rushed out of the plane's main entrance.\n\t\t\t\n\t\t\t\n\t\t\tJust like that, he had deserted the mission. It was impossible to say what might happen to him now. Everyone around you was shocked speechless as the presence of his magical power disappeared into the distance.\n\t\t\t\n\t\t\t*goto after_will_scene\n\n\n*label after_will_scene\n\n*page_break\n\nYour focus was soon brought back to the mission by necessity. Dozens of transport planes had already landed on the scorched ground above the First Nest. Your plane was also just about to reach its destination. No Zenos were currently visible on the ground, so the path was clear for you to enter the tunnel network leading to the First Nest.\n\n\n\"I'll lead the way. Follow me!\"\n\n\n*if (chapter4_arth_event_activated = \"yes\")\n\n\tEven before your plane had landed on the ground, Arth had already jumped off. As he hit the ground, raw magical power surged around him. Fortunately, he didn't rush ahead on his own, but instead waited until you were able to catch up with him.\n\n*if (chapter4_arth_event_activated = \"no\")\n\t\n\tEven before your plane had landed on the ground, Arth had already jumped off. As he hit the ground, raw magical power surged around him. It looked like he could hardly contain his excitement, since he immediately rushed toward the entrance of the tunnels. What a reckless action once again, just like during the aptitude test...\n\t\n\t\n\t[i]Magic spells available to cast[/i]:\n\t\n\t\n\t[b]Superior Regeneration[/b]: Greatly increases the target's ability to recover from damage. [i]Generated by Compassion.[/i]\n\t\n\t*choice\n\t\t*selectable_if (ruthlessness \u003c= 50) #Cast Superior Regeneration\n\t\t\t*set ruthlessness -3\n\t\t\t[i]Compassion increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tYou decided to spend a small part of your magical power to cast a strong recovery spell on Arth.\n\t\t\t\n\t\t\t\n\t\t\tArth didn't seem to hesitate, even so, and didn't stop to wait for the rest of you.\n\t\t\t\n\t\t\t*goto after_arth_scene\n\t\t#Ignore him\n\t\t\t*set arth_fate \"mia\"\n\t\t\t*set ruthlessness +2\n\t\t\t[i]Ruthlessness increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tIt wasn't probably worth wasting your limited magical power just to improve your companion's chances of survival due to his own recklessness.\n\t\t\t\n\t\t\t\n\t\t\tArth didn't seem to hesitate, even so, and didn't stop to wait for the rest of you.\n\t\t\t\n\t\t\t*goto after_arth_scene\n\n\n*label after_arth_scene\n\n*page_break\n\nHundreds of military mages had already entered the tunnels before your class. Some were also accompanying your team, while others would stay behind to guard the entrance. Although this was the most heavily fortified location on the surface of the planet, it appeared that the softening blows and the large army of mages with you were working as intended to clear the path. At least so far.\n\n*if (chapter4_arth_event_activated = \"yes\")\n\n\tYou soon cautiously entered the tunnels as well, led by Arth as a living wall of magical power in front of you. You could feel that heavy battles were raging ahead of you in multiple directions. Dozens of mages had already died in the surroundings, but a large amount of Zenos had been destroyed as well. Ironically, the narrow spaces worked to humanity's advantage in this battle.\n\n*if (chapter4_arth_event_activated = \"no\")\n\t\n\tYou soon cautiously entered the tunnels as well, led by Sera who was constantly casting a strong barrier. You could feel that heavy battles were raging ahead of you in multiple directions. Dozens of mages had already died in the surroundings, but a large amount of Zenos had been destroyed as well. Ironically, the narrow spaces worked to humanity's advantage in this battle.\n\n\nYour team kept descending the tunnel toward the First Nest's location. You could already feel its presence somewhere in front of you. For a moment, you were able to keep walking peacefully, while one of the mages with you illuminated the way.\n\n*page_break\n\nWithout any warning, a burst of magical power suddenly appeared from your left side. Several Armor Type Zenos were charging toward you, moving through the ground! Had they somehow prepared an ambush?\n\n\n*if (chapter4_sera_event_activated = \"yes\")\n\n\tBefore anyone else was able to react, Sera had already managed to create a powerful new barrier in the direction of their charge. The other nearby mages also started boosting her magic to further strengthen the barrier. Maria followed up by launching precise magical attacks against the approaching enemies.\n\t\n\t*if (will_fate != \"mia\")\n\t\tWill also weakened their attack by casting some sort of a curse on all of them. Their movements slowed down immediately.\n\t\n\t\n\tThe whole tunnel shaked greatly when the Armor Type Zenos crashed against Sera's barrier. However, it was barely able to stop their charge. Once the surprise attack was over, they were soon hit by dozens of spells and annihilated without mercy.\n\n*if (chapter4_sera_event_activated = \"no\")\n\t\n\tSera immediately rushed in your direction. As if desperate to save your life, she started casting an Area Barrier in front of you, but she was leaving herself almost defenseless in the process.\n\t\n\t\n\t*if (will_fate != \"mia\")\n\t\tWill also weakened their charge by casting some sort of a curse on all of them.\n\n\t\n\tSera's life was clearly in danger now, but yours was no longer at risk. Should you deplete some of your own magical power to shield her against the attack...?\n\t\n\t\n\t[i]Magic spells available to cast[/i]:\n\t\n\t\n\t[b]Perfect Shield[/b]: Absorbs and reflects all damage aimed against your body you at the cost of your magical power. [i]Generated by Masochism.[/i]\n\t\n\t*choice\n\t\t*selectable_if (sadism \u003c= 50) #Cast Perfect Shield\n\t\t\t*set sadism -3\n\t\t\t[i]Masochism increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tYou cast the powerful defensive spell on your own body and moved past Sera to take the hit for her. As you had hoped, the Armor Type Zenos crashed into you and received a huge backlash, leaving Sera safe behind you. While they were weakened, all the mages around you started attacking them. It didn't take long until they were all destroyed.\n\t\t\t\n\t\t\t\n\t\t\tSera appeared speechless after being saved from certain death.\n\t\t\t\n\t\t\t*goto after_sera_scene\n\t\t#Let her receive the charge\n\t\t\t*set sera_fate \"mia\"\n\t\t\t*set sadism +2\n\t\t\t[i]Sadism increased.[/i]\n\t\t\t\n\t\t\t\n\t\t\tIt wasn't probably worth wasting your limited magical power just to save one person, even if she was from your own class.\n\t\t\t\n\t\t\t\n\t\t\tSera seemed somewhat satisfied with her fate as well. As the Armor Type Zenos pulverized her right in front you, her face didn't appear regretful. In any case, her sacrifice had saved you from any harm. While the Zenos were immobile, all the mages around you started attacking them. It didn't take long until they were all destroyed.\n\t\t\t\n\t\t\t*goto after_sera_scene\n\n*label after_sera_scene\n\n*page_break\n\nAfter the ambush, your team kept moving ahead without stopping to rest. Time would always be against you here since the Zenos had nearly unlimited reinforcements.\n\n\n*if (arth_fate = \"mia\")\n\tA moment later, a sad scene appeared in front of you. It was Arth, or what was left of him. He had clearly been fighting a group of Zenos with all of his strength. Even so, his body was tattered beyond repair, and his blood had spilled everywhere on the ground. He was already dead.\n\n*if ((chapter4_arth_event_activated = \"no\") and (arth_fate != \"mia\"))\n\tA moment later, you saw Arth in front of you. He had clearly been fighting a group of Zenos on his own. His body and clothes were tattered, but he was only lightly wounded. Your spell must have helped him survive.\n\t\n\t\n\tHe glanced at you for a while, but then joined your team again without complaints. Perhaps he had been humbled a bit by this painful experience. Regardless, he would be a welcome addition to your combat power.\n\n*page_break\n\nThe presence of the First Nest was growing ever stronger ahead of you. It was clear which path was the right way to go. Battles raged in every direction around you, especially straight ahead, but for now you were able to proceed without any real resistance.\n\n\n*if (will_fate != \"mia\")\n\tWill showed a slight amount of fear due to the sinister presence you were constantly approaching, but the fear didn't seem to overwhelm him anymore.\n\n*if (will_fate = \"mia\")\n\tIt was unfortunate that Will wasn't with you anymore, but if he couldn't overcome his fear, it was likely better that he had escaped before entering the tunnel network itself. Inside it his desertion would have likely been much more dangerous.\n\n\n*if (arth_fate != \"mia\")\n\tArth had always been the most reckless member of your class, but now he seemed a bit more reliable. At least he wasn't rushing ahead alone.\n\n*if (arth_fate = \"mia\")\n\tArth had always been the most reckless member of your class, and that had ultimately caused his death this time. At least he had taken several Armor Type Zenos with him to the grave.\n\n\n*if (sera_fate != \"mia\")\n\tSera's competence had never been in doubt. Perhaps she had gained even more commitment and focus, though, as she didn't seem at all hesitant right now.\n\n*if (sera_fate = \"mia\")\n\tSera's death had been a painful sacrifice, but it had saved everyone else from harm without depleting your magical power.\n\n\nMaria had always been a reliable helper on your missions. Even now, she seemed extremely focused on observing the magical presences around the area.\n\n\nA lot of the mages in the surroundings were already dead, and communications had practically stopped functioning properly. However, the final destination of your journey was already right in front of you.\n\n*page_break\n\nAs you entered the largest room in the whole underground complex, what you saw was a rather disturbing sight.\n\n\nIn the middle of the chamber was a huge creature that was almost too hideous to look at. Its body resembled a rotten lump of flesh, with tentacles and eye-like appendages protruding in every direction. There were dozens of holes on its sides that new Zenos forces slowly kept appearing out of. It was surrounded by an extremely powerful purple magical barrier.\n\n\nIt was obviously the First Nest.\n\n\n[i]...'Source' organism... 'Enter'... Become 'entertainment'...[/i]\n\n\nIts creepy voice suddenly reached your mind. It was the most disturbing feeling you had ever experienced, but not quite enough to paralyze you. Did it simply want to consume you...?\n\n*page_break\n\nIn addition to the First Nest, there were dozens of dead mages and Zenos corpses in front of you. New Zenos were also in the process of coming out of the First Nest. You could even feel more and more Zenos forces slowly approaching from behind you.\n\n\n[i]...'Enjoyment' will not stop... Until you are all their 'entertainment'... 'Entering' is inevitable...[/i]\n\n\nThe First Nest continued assaulting your mind with obscure messages and visions. However, the barriers surrounding you provided some level of protection against this type of mental attack. Fortunately you still had dozens of other mages left with you for support.\n\n\nWhile your remaining allies prepared to fight the Zenos reinforcements, it was up to you to assault the First Nest itself. It was difficult to say what would be most effective against it, but it was probably safer to focus on destructive power. After all, you would be putting all of your power into a single strike. If that still wasn't enough to break its defensive barrier, it would be hopeless to even keep trying.\n\n\n[i]Magic spells available to cast[/i]:\n\n\n[b]Gravity Bomb[/b]: A highly destructive spell that causes the targeted area to be ripped apart by extreme gravity. [i]Generated by Ruthlessness.[/i]\n\n\n[b]Brain Shatter[/b]: A highly destructive spell that causes the targeted living creature to swiftly lose its cognitive abilities. [i]Generated by Self-Absorption.[/i]\n\n\n[b]Stealth Missile[/b]: A highly destructive spell that launches a magical missile which mostly ignores all obstacles and detection. [i]Generated by Machiavellianism.[/i]\n\n\n[b]Curse of Death[/b]: A highly destructive spell that causes a certain, yet slow and painful death. [i]Generated by Sadism.[/i]\n\n\n[b]Weaken Barrier[/b]: Weakens the targeted barrier. [i]Generated by Introversion.[/i]\n\n\n[b]Gather Magic[/b]: Gathers raw magical power from all nearby willing participants, generating a magical missile from the combined power. [i]Generated by Extroversion.[/i]\n\n*choice\n\t*selectable_if ((ruthlessness >= 50) and (magical_power_preserved = \"yes\")) #Gravity Bomb\n\t\t*set first_nest_fate \"destroyed\"\n\t\t*set ruthlessness +2\n\t\t[i]Ruthlessness increased.[/i]\n\t\t\n\t\t\n\t\tGathering all of your remaining magical power, you aimed at the First Nest and cast your spell. Everything depended on this one blow. Some of your nearby allies boosted your magic to increase the odds even slightly in your favor. The others continued to block any attacks against you by the surrounding Zenos.\n\t\t\n\t\t\n\t\tSoon enough, its powerful magical barrier started to be ripped apart by unnatural waves of gravity. For a while, there was a great struggle, but ultimately the barrier couldn't stay intact and began to crack.\n\t\t\n\t\t\n\t\tOnce the barrier was damaged, the Nest was far more vulnerable than it used to be. It continued to receive damage from the ruthless assault of your gravity spell, and after some time had passed, the creature completely stopped moving and shattered into several pieces. It seemed to be... dead. At the same time, your own magical power was practically exhausted.\n\t\t\n\t\t\n\t\t\"Our task is finished! Fall back!\"\n\t\t\n\t\t*check_achievements\n\t\t*if not(choice_achieved_firstnest)\n\t\t\t*achieve firstnest\n\t\t\n\t\t*goto after_first_nest_scene\n\t*selectable_if ((selfabsorption >= 50) and (magical_power_preserved = \"yes\")) #Brain Shatter\n\t\t*set first_nest_fate \"destroyed\"\n\t\t*set selfabsorption +2\n\t\t[i]Self-Absorption increased.[/i]\n\t\t\n\t\t\n\t\tGathering all of your remaining magical power, you aimed at the First Nest and cast your spell. Everything depended on this one blow. Some of your nearby allies boosted your magic to increase the odds even slightly in your favor. The others continued to block any attacks against you by the surrounding Zenos.\n\t\t\n\t\t\n\t\tSoon enough, its powerful magical barrier started to receive damage from your spell. For a while, there was a great struggle, but ultimately the barrier couldn't stay intact and began to crack.\n\t\t\n\t\t\n\t\tOnce the barrier was damaged, the Nest was far more vulnerable than it used to be. It continued to receive damage from the relentless assault of your mental attack, and after some time had passed, the creature completely stopped moving. It seemed to be... dead. At the same time, your own magical power was practically exhausted.\n\t\t\n\t\t\n\t\t\"Our task is finished! Fall back!\"\n\t\t\n\t\t*check_achievements\n\t\t*if not(choice_achieved_firstnest)\n\t\t\t*achieve firstnest\n\t\t\n\t\t*goto after_first_nest_scene\n\t*selectable_if ((machiavellianism >= 50) and (magical_power_preserved = \"yes\")) #Stealth Missile\n\t\t*set first_nest_fate \"destroyed\"\n\t\t*set machiavellianism +2\n\t\t[i]Machiavellianism increased.[/i]\n\t\t\n\t\t\n\t\tGathering all of your remaining magical power, you aimed at the First Nest and cast your spell. Everything depended on this one blow. Some of your nearby allies boosted your magic to increase the odds even slightly in your favor. The others continued to block any attacks against you by the surrounding Zenos.\n\t\t\n\t\t\n\t\tSoon enough, its powerful magical barrier started to receive damage from your spell. For a while, there was a great struggle, but ultimately the barrier couldn't stay intact and began to crack at a single point.\n\t\t\n\t\t\n\t\tOnce the barrier was damaged, the Nest was far more vulnerable than it used to be. Your attack quickly passed through the barrier and hit it directly, and after a moment, the creature completely stopped moving. It seemed to be... dead. At the same time, your own magical power was practically exhausted.\n\t\t\n\t\t\n\t\t\"Our task is finished! Fall back!\"\n\t\t\n\t\t*check_achievements\n\t\t*if not(choice_achieved_firstnest)\n\t\t\t*achieve firstnest\n\t\t\n\t\t*goto after_first_nest_scene\n\t*selectable_if ((sadism >= 50) and (magical_power_preserved = \"yes\")) #Curse of Death\n\t\t*set first_nest_fate \"destroyed\"\n\t\t*set sadism +2\n\t\t[i]Sadism increased.[/i]\n\t\t\n\t\t\n\t\tGathering all of your remaining magical power, you aimed at the First Nest and cast your spell. Everything depended on this one blow. Some of your nearby allies boosted your magic to increase the odds even slightly in your favor. The others continued to block any attacks against you by the surrounding Zenos.\n\t\t\n\t\t\n\t\tSoon enough, its powerful magical barrier started to receive damage from your spell. For a while, there was a great struggle, but ultimately the barrier couldn't stay intact and began to crack.\n\t\t\n\t\t\n\t\tOnce the barrier was damaged, the Nest was far more vulnerable than it used to be. It started receiving enormous damage from your curse, and after some time had passed, the creature completely stopped moving. It seemed to be... dead. At the same time, your own magical power was practically exhausted.\n\t\t\n\t\t\n\t\t\"Our task is finished! Fall back!\"\n\n\t\t*check_achievements\n\t\t*if not(choice_achieved_firstnest)\n\t\t\t*achieve firstnest\n\t\t\n\t\t*goto after_first_nest_scene\n\t*selectable_if (introversion >= 50) #Weaken Barrier\n\t\t*set introversion +2\n\t\t[i]Introversion increased.[/i]\n\t\t\n\t\t\n\t\tGathering all of your remaining magical power, you aimed at the First Nest and cast your spell. Everything depended on this one blow. Some of your nearby allies boosted your magic to increase the odds even slightly in your favor. The others continued to block any attacks against you by the surrounding Zenos.\n\t\t\n\t\t\n\t\tSoon enough, its powerful magical barrier started to receive damage from your spell. For a while, there was a great struggle, but ultimately the barrier couldn't stay intact and began to crack.\n\t\t\n\t\t\n\t\tOnce the barrier was damaged, the Nest was far more vulnerable than it used to be. The barrier continued to receive damage from the relentless assault of your spell, and after being hit by several spells from your allies as well, the creature began retreating further into the chamber. It seemed to be... severely wounded. At the same time, your own magical power was practically exhausted.\n\t\t\n\t\t\n\t\t\"Our task is finished! Fall back!\"\n\t\t\n\t\t*goto after_first_nest_scene\n\t*selectable_if (introversion \u003c= 50) #Gather Magic\n\t\t*set introversion -2\n\t\t[i]Extroversion increased.[/i]\n\t\t\n\t\t\n\t\tGathering all of your remaining magical power, you aimed at the First Nest and cast your spell. Everything depended on this one blow. Your allies contributed their magical power to your cooperative spell as well, while they continued to block any attacks against you by the surrounding Zenos.\n\t\t\n\t\t\n\t\tSoon enough, its powerful magical barrier started to receive damage from your spell. For a while, there was a great struggle as it tried to stop the attack, but ultimately the barrier couldn't stay intact and began to crack.\n\t\t\n\t\t\n\t\tOnce the barrier was damaged, the Nest was far more vulnerable than it used to be. It continued to receive damage from the relentless assault of your magical attack, and after some time had passed, the creature began retreating further into the chamber. It seemed to be... severely wounded. At the same time, your own magical power was practically exhausted.\n\t\t\n\t\t\n\t\t\"Our task is finished! Fall back!\"\n\t\t\n\t\t*goto after_first_nest_scene\n\t\t\n\n*label after_first_nest_scene\n\n*page_break\n\nAfter you exited the lair of the First Nest, the surrounding Zenos seemed to already be in total disarray. None of them were rushing in your direction anymore, so the path seemed clear for a safe escape.\n\n\nMaria, who had been silent during the whole operation, suddenly turned to look at you with a complicated expression.\n\n*if (chapter4_maria_event_activated = \"yes\")\n\n\t*if (maria_goal_choice = \"continue\")\n\t\t\"I must reveal something. I work for New Vladivostok, and my task was to capture you after this operation was finished. But now I don't think that's right. For humanity, what matters is you, and certainly not inter-city politics. I'm prepared to follow you, no matter what you want to do.\"\n\t\n\t*if (maria_goal_choice = \"shift\")\n\t\t\"I must reveal something. I work for New Vladivostok, and my task was to capture you after this operation was finished. But now I don't think that's right. For humanity, what matters is you, and certainly not inter-city politics. I'm prepared to follow you, even if it means defecting to New Washington.\"\n\t\t\n\t\n\tSo that was the truth about Maria. You glanced at your few remaining allies, but all of them had simply turned to looked at you.\n\t\n\t*choice\n\t\t#Stay loyal to New Washington\n\t\t\t\"Even if I have some complaints about Zavier, New Washington is still the best environment to support us against the Zenos. It's better not to risk messing everything up while we're finally winning.\"\n\t\t\t\n\t\t\t\n\t\t\t\"I understand that view. As promised, I will surrender voluntarily and defect to New Washington if possible.\"\n\t\t\t\n\t\t\t\n\t\t\tEveryone around you seemed relieved that the sudden situation had been resolved so peacefully.\n\t\t\t\n\t\t\t*goto after_maria_scene\n\t\t#Defect to New Vladivostok\n\t\t\t*set your_fate \"vladivostok\"\n\t\t\t*set maria_fate \"vladivostok\"\n\t\t\t*if ((arth != \"mia\") and (chapter4_arth_event_activated = \"yes\"))\n\t\t\t\t*set arth_fate \"vladivostok\"\n\t\t\t*if ((sera != \"mia\") and (chapter4_sera_event_activated = \"yes\"))\n\t\t\t\t*set sera_fate \"vladivostok\"\n\t\t\t*if ((will != \"mia\") and (chapter4_will_event_activated = \"yes\"))\n\t\t\t\t*set will_fate \"vladivostok\"\n\t\t\t\n\t\t\t\"Thank you for revealing the truth. In fact, I've had enough of being bossed around by Zavier, so I'll take this chance to defect to New Vladivostok. It should be easy in the confusion of the battlefield.\"\n\t\t\t\n\t\t\t\n\t\t\t*if (arth_fate = \"washington\")\n\t\t\t\tArth seemed quite hesitant about the idea.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I won't stop you, but I won't follow you either. New Washington is still the best city for mages, so I hope you won't end up regretting it.\"\n\t\t\t*if (arth_fate = \"vladivostok\")\n\t\t\t\tFollowing your response, Arth quickly declared his intention as well.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I'll follow you to the end, even if it means betraying New Washington. Count me in.\"\n\t\t\t\n\t\t\t*if (sera_fate = \"washington\")\n\t\t\t\tOn the other hand, Sera seemed extremely reluctant to follow you.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I respect your choice, but I can't abandon everything just like that. I wish you luck.\"\n\t\t\t*if (sera_fate = \"vladivostok\")\n\t\t\t\tOn the other hand, Sera seemed quite torn about what to do. In the end, she had apparently made her choice.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I promised to follow you, and I will. I won't hesitate anymore. No matter where you go, I'll support you.\"\n\t\t\t\n\t\t\t*if (will_fate = \"washington\")\n\t\t\t\tWill looked like he was thinking hard about it, but couldn't come to a decision.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I'm sorry, but I still have too much I can't easily abandon.\"\n\t\t\t*if (will_fate = \"vladivostok\")\n\t\t\t\tWill took a while to decide, but eventually he still wanted to join you.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"Let me abandon New Washington with you as well. I'd be lying if I said I have no attachments to it, but I've already decided to bet everything on you, so you can count on me.\"\n\t\t\t\n\t\t\t\n\t\t\tThe few other mages still with you seemed very hesitant about what to do, but ultimately they mostly decided to pretend like they had heard nothing. After all, they didn't have the power to stop you from leaving. One of them actually decided to follow along with you, though.\n\t\t\t\n\t\t\t\n\t\t\tNow you would finally be free of being commanded by Zavier. It was difficult to say how your new environment would be like, but they likely had no real reason to mistreat you. If they did, it would be their mistake.\n\t\t\t\n\t\t\t*goto after_maria_scene\n\n*if (chapter4_maria_event_activated = \"no\")\n\t\n\tBefore you could react, a familiar buzzing sound hit your mind with a paralyzing effect. Your mind was supposed to be shielded against mental jamming, and you had even survived the First Nest's mental assault somehow. What was going on...?\n\t\n\t\n\tBefore you noticed, there was a heavy-looking rifle in Maria's hands. And it was pointed directly at you. One of the supporting mages still with you had also taken out a similar rifle and aimed it at the rest of your remaining allies.\n\t\n\t\n\t\"Don't let your guard down so easily. I'm sorry that I have to do this, but orders are orders. I promise you won't be harmed.\"\n\t\n\t\n\tWas there anything you could still do in such a disadvantageous situation?\n\t\n\t\n\t[i]Magic spells available to cast[/i]:\n\t\n\t\n\t[b]Restore Balance[/b]: Allows everyone nearby to cast spells in their normal state and power level. [i]Generated by Honor.[/i]\n\t\n\t*choice\n\t\t*selectable_if (machiavellianism \u003c= 50) #Cast Restore Balance\n\t\t\t\n\t\t\tFor some reason, you were still able to cast a certain spell despite the powerful jamming effect. Without wasting any time, you immediately tried it.\n\t\t\t\n\t\t\t\n\t\t\tAs soon as you cast it, Maria had already shot at you with her weapon. However, even though you could feel your body starting to get paralyzed, it was too late. Your remaining allies behind you had regained their magical powers.\n\t\t\t\n\t\t\t\n\t\t\tMaria seemed to realize it was hopeless after that and quickly dropped her weapon to the ground.\n\t\t\t\n\t\t\t\n\t\t\t\"I work for New Vladivostok, and my task was to capture you after this operation was finished. Even so, I think you're our best hope against the Zenos, no matter which side you're on. I can start working as a double agent for New Washington or take you to New Vladivostok, if you prefer. You would be treated generously there if you chose to defect.\"\n\t\t\t\n\t\t\t\n\t\t\tSo that was the truth about Maria. You glanced at your few remaining allies, but all of them had simply turned to looked at you.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Stay loyal to New Washington\n\t\t\t\t\t\"Even if I have some complaints about Zavier, New Washington is still the best environment to support us against the Zenos. It's better not to risk messing everything up while we're finally winning.\"\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\"I understand that view. As promised, I will surrender voluntarily and defect to New Washington if possible.\"\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tEveryone around you seemed relieved that the sudden situation had been resolved so peacefully.\n\t\t\t\t\t\n\t\t\t\t\t*goto after_maria_scene\n\t\t\t\t#Defect to New Vladivostok\n\t\t\t\t\t*set your_fate \"vladivostok\"\n\t\t\t\t\t*set maria_fate \"vladivostok\"\n\t\t\t\t\t*if ((arth != \"mia\") and (chapter4_arth_event_activated = \"yes\"))\n\t\t\t\t\t\t*set arth_fate \"vladivostok\"\n\t\t\t\t\t*if ((sera != \"mia\") and (chapter4_sera_event_activated = \"yes\"))\n\t\t\t\t\t\t*set sera_fate \"vladivostok\"\n\t\t\t\t\t*if ((will != \"mia\") and (chapter4_will_event_activated = \"yes\"))\n\t\t\t\t\t\t*set will_fate \"vladivostok\"\n\t\t\t\t\t\n\t\t\t\t\t\"Thank you for revealing the truth. In fact, I've had enough of being bossed around by Zavier, so I'll take this chance to defect to New Vladivostok. It should be easy in the confusion of the battlefield.\"\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*if (arth_fate = \"washington\")\n\t\t\t\t\t\tArth seemed quite hesitant about the idea.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I wo
