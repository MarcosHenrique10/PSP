<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First Bull Run — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "firstbullrun", "title": "First Bull Run", "scenes": {"battle": "*temp chat1 \"yes\"\n*temp chat2 \"yes\"\n*temp chat3 \"yes\"\n*temp chat4 \"yes\"\n*temp chat5 \"yes\"\n*temp chat6 \"yes\"\n*temp chat7 \"yes\"\n*temp chat8 \"yes\"\n*temp chat9 \"yes\"\n*temp chat10 \"yes\"\n*temp chat11 \"yes\"\n*temp chat12 \"yes\"\n*temp chat13 \"yes\"\n*temp chat14 \"yes\"\n*temp chat15 \"yes\"\n*temp chat16 \"yes\"\n*temp chat17 \"yes\"\n*temp chat18 \"yes\"\n*temp chat19 \"yes\"\n*temp burnside_location \"no\"\n*temp porter_location \"no\"\n*temp reynolds_location \"no\"\n*temp enemy_strength \"no\"\n*temp burnside_situation \"no\"\n*temp porter_situation \"no\"\n*temp shattered_situation \"no\"\n*temp pistol \"no\"\n*temp sword \"no\"\n*temp couriers \"2\"\n*temp actions \"2\"\n*temp charge \"no\"\nSpurring down the hill and across the pastures, you return to the marching column of Third Division.  You ride your horse up the files of men until you find your unit.  Captain Lum salutes and reports that nothing has changed since you left.  \n  \nTo the right of the road is a steep, grassy hill, and to the left is a wooded one.  The endlessly repeated crunch of marching boots is now punctuated by the crackle of musketry and the bang of artillery pieces.  You feel a buzzing sense of anticipation in your stomach, and your hair stands up straight under your kepi.  \n\nYou see a lieutenant on a horse galloping back along the road toward the rear.  Seeing Colonel Willcox, he reins in his horse.  The beast throws its head as it comes to a stop, before trotting a few sideways steps.  \n\n\"Colonel Willcox, Sir?\" asks the young officer breathlessly.  \n\n\"I am he.  What is your message?\"\n\n\"Do you know where I can find Colonel Heintzelman or General McDowell?\"\n\n\"Colonel Heintzelman was up on the high hill back there, some ten minutes ride to the north.\"  Willcox twists in his saddle to point.  \n*page_break\n\"Thank you, Sir,\" the man says quickly, preparing to ride away.  \n\n\"Hold up, there, son.  What's afoot?  What goes on at the front?\"  \n\nThe man looks anxiously at the two of you, speaking rapidly.  \"All of Second Division is engaged on the ridge.  The enemy had two or three howitzers and a brigade, but we believe they are bringing up reinforcements.  The Second Rhode Island was ambushed on the road and then Burnside brought up the brigade to drive the ambushers back up the hill.\"    \n\n\"Is Colonel Hunter commanding the attack?\"  \n\n\"No, Sir.  Colonel Hunter was hit at the start of the action, a dreadful throat wound.  I believe Colonel Burnside may be in command, now.\"  \n\nThe messenger gallops off and Willcox turns to you.\n*fake_choice\n  #\"Colonel Hunter is down!  What terrible news!\"\n    \"My god.  Let it not be mortal.\"  \n  #\"We must hurry forward at once!  The battle may hang in the balance.\"  \n    \"Indeed we must, but the men are already tired.  They have marched at least fifteen miles, double what the scouts told us to expect.  We must hazard their strength for the moment of decision.\"  \n  #\"What are your orders, Sir?\"\n\nThe Colonel takes off his hat and wipes the sweat from his brow with a sleeve.  The morning heat has indeed become oppressive, and you feel the desire to loosen your great coat.  \"Major, we must know what is happening up there.  Ride up to the front and send report back of the general situation.  It will be another twenty minutes at least until we can join the fray.  Once the brigade arrives, you can assist with the placement of the regiments.  We must extend the line.\"\n*label alpha\n*choice\n  *if chat1 = \"yes\"\n    #\"What about my regiment?\"\n      \"I will take direct command, for now.  I will stay with the brigade in case I receive orders from Heintzelman.\"  \n      *set chat1 \"no\"\n      *goto alpha\n  *if chat2 = \"yes\"\n    #\"What general things should I look for?\"\n      \"What is the state of the battle?  What is our disposition, the enemy disposition?  What obstacles and what ground are we facing?  Try to determine who is in command, as well.\"  \n      *set chat2 \"no\"\n      *goto alpha\n  #\"Understood, Sir.\"\n    \"God be with you, Major.  Take one of my staff officers with you, as well.  You may need another messenger.\"  He snaps his fingers and one of the mounted lieutenants breaks away from the others.  Looking over your other shoulder, you see your adjutant, Captain Bowles.  He nods gravely as you make eye contact.  \n    *choice\n      #\"Let us go.\"\n        *goto bravo\n*label bravo\nYou ride forward, with the two men in tow, past lines and lines of marching men.  As you pass regiment after regiment, you are struck by the fact that almost every one has its own uniform.  Many are blue, but some are gray, or various combinations of red and blue.  The most outstanding uniform is that of the New York fire Zouaves, men who wear baggy bright red pants and a red Turkish fez.  \n\nNow you are riding out ahead of the lead column, hearing the sounds of gunfire grow ever nearer.  There is something in the road up ahead, and as you draw nearer, you see the sprawled out bodies of dead men, scattered like leaves on either side of the road.  Looking down as you pass, you see wide, staring eyes, and uniforms stained dark red with blood.  Your eyes linger on one Confederate corpse for only a heartbeat, but the dreadful face seems burned into your vision even after you look away.  The dead eyes, the thick beard, dark red with blood, and the flies circling above it.\n*fake_choice\n  #Shake it off.  I have a job to do.  \n  #This does not seem glorious anymore.  \n\nCantering forward, the tree cover on the left ends abruptly, and you see it.  The battle is right in front of you.  The crackling of musket fire, the roaring thump of artillery, and the shouting of officers and men fill your ears.  Subtler but more terrible, the cries and moans of the wounded.  In front of you, on the left, you see more than two thousand men standing in lines, facing up the ridge.  The four regiments are clearly differentiated by their individual uniforms.  \n\nThey stand in one largely unbroken line, four or five men deep, and the front two rows are loading.  Behind them, up and down the line, walk officers with sabers in their hands, calling out encouragement and moving men into place.  Behind these lay the bodies of dead and wounded, stained with blood and filth, many crawling back down the hill in a piteous state.  \n\nThe whole battlefield before you is an uphill slope, with the road running diagonally up it between two grassy pastures.  At the top of the ridge, to the left of the road, is a copse of trees, and all along the crest run lines of Confederate infantry.  In front of the trees stand two fat artillery pieces.  \n\nAs you watch, the guns belch with fire and roll backwards with the recoil.  The howling of the shells makes you jolt in your saddle, but they are aimed at the line on your left.  One strikes the ordered Union line and explodes, sending an arc of blood and body parts into the air behind it.  The other shell disappears into the trees on your left with the sound of splintered branches.  \n\n\"Sweet, merciful Christ…\" says Captain Bowles at your side, startled out of his usual mute obedience.  \n\n*fake_choice\n  #\"Steady, men.  Here it is at last.\"  \n  #\"Oh my god.\"  \n  #\"I do not see any mercy, here, today.\"  \n\nYou pull your eyes away from the spectacle of combat, and force yourself to take a more tactical look at the battlefield.  The brigade of Union men stands to the left of the road, with about two thousands of men in line.  A hundred yards behind them, you see a disorganized jumble of troops at the tree line.  \n\nLooking to the right, you see another Union brigade in two lines, roughly a thousand each.  Directly in front of you is a huge gap on either side of the road, dividing the two brigades.  In this gap you see six Union rifled cannons, with crews working them and horses lined up behind.  \n\nIt is hard to determine the disposition of the enemy troops.  The height of the great ridge is nearly one hundred yards of elevation above you.  In the center is the copse of trees with the artillery, and to the right of this you can see a small farmhouse near the road.  As far as you can tell, the troop numbers seem roughly equivalent to your own force.  \n*image battle1.png\n*set map_trigger \"battle1\"\n*choice\n  #Go left and link up with the brigade commander.\n    *goto burnside\n  #Go right and link up with the other brigade commander.\n    *goto porter\n  #Go to the shattered unit by the treeline.  \n    *goto shattered_unit\n\n*label burnside\nYou lead your two men to the left, weaving between a few free-standing pines and oaks.  Near the center of the long line, you see a clump of officers gathered around the colors.  Riding toward them, you recognize the brigade and division colors next to the old stars and stripes.  Second Brigade, Second Division; Burnside's brigade.  \n*set burnside_location \"yes\"\n*set actions -1\n*choice\n  #\"Who is in command here?\"  \n    A captain runs up to you, \"Major, you would be well advised to dismount.  They are targeting officers, I believe.\"  \n    *choice\n      #Dismount.\n        The captain takes your horse's bridle and shouts over the sound of musketry behind him, \"Colonel Burnside is commanding, here, Major.  What do you need?\"  You hear a musket ball whiz overhead with a sound like an angry insect.  \"Warm work, Sir.\"  \n        *goto charlie\n      #Remain in the saddle.\n        The captain looks anxious, yelling over the musketry behind him, \"Colonel Burnside is commanding, here, Major.  What do you need?\"  Suddenly, you feel something impact with your chest harder than the punch of a prize fighter.  Your body is plucked from the saddle and you fall to the ground, smacking your head hard.  Everything goes black.\n        *ending\n  #\"I need to speak to someone about the situation, here.\"  \n    A captain runs up to you, \"Major, you would be well advised to dismount.  They are targeting officers, I believe.\"  \n    *set chat6 \"no\"\n    *choice\n      #Dismount.\n        The captain takes your horse's bridle and shouts over the sound of musketry behind him, \"We are heavily engaged, Major.  I believe it is one brigade up there.\"  You hear a musket ball whiz overhead with a sound like an angry insect.  \"Warm work, Sir.\"  \n        *goto charlie\n      #Remain in the saddle.\n        The captain looks anxious, yelling over the musketry behind him, \"We are heavily engaged, Major.  I believe it is one brigade up there.\"  Suddenly, you feel something impact with your chest harder than the punch of a prize fighter.  Your body is plucked from the saddle and you fall to the ground, smacking your head hard.  Everything goes black.\n        *ending\n  #Dismount.\n    A captain runs up to you and takes hold of your horse's bridle.  \"Major, what do you need?\" he yells over the volley of musketry behind him.  You hear a musket ball whiz overhead with a sound like an angry insect.  \"Warm work, Sir.\"  \n    *goto charlie\n*label charlie\n*choice\n  #\"I need to speak to Colonel Burnside, immediately.\"  \n    \"This way, Major.\"\n    *goto burnside2\n  *if chat3 = \"yes\"\n    #\"Whose infantry is that on the right?\"\n      \"It is Colonel Porter's brigade, Major.\"  \n      *set porter_location \"yes\"\n      *set chat3 \"no\"\n      *goto charlie\n  *if chat4 = \"yes\"\n    #\"Whose battery is that in the road?\"\n      \"That is our artillery detachment, Captain Reynolds' battery.\"  \n      *set reynolds_location \"yes\"\n      *set chat4 \"no\"\n      *goto charlie\n  *if chat5 = \"yes\"\n    #\"What do you need up here?\"  \n      \"You had best ask the Colonel, instead.\"\n      *set chat5 \"no\"\n      *goto charlie\n  *if chat6 = \"yes\"\n    #\"Tell me what the situation is, here.\"  \n      \"We are heavily engaged, Major.  I believe it is one brigade up on the hill.\"  \n      *set enemy_strength \"yes\"\n      *set chat6 \"no\"\n      *goto charlie\n\n*label burnside2\nThe captain brings you to a stocky Colonel, with a mustache that grows out into the most impressive mutton chops you have ever seen.  \"Colonel Burnside, a major is here to speak with you, Sir.\"\n\nThe Colonel turns distractedly to face you.  \"Yes, what is it?  What brigade are you with?\"\n\nAn officer standing nearby is yelling commands, \"Ready!\"  The muskets come up in ragged unison.  \"Aim!  Fire!\"  The volley pours out and the smoke floats back over you and the Colonel with a strong scent of rotten eggs.  \n*image burnside.png\n*choice\n  #\"I am with Willcox's brigade.  Who is in command of the field?\"  \n    \"I am in command here.  Colonel Hunter was struck in the first moments of the battle.  He has been taken to the rear.\"  \n    *choice\n      #\"I am here to survey the field and report back to Colonel Willcox.\"\n        \"Tell him to hurry forward with everything he has.  \n        *goto burnside3\n      #\"Third Division is advancing and only a short way from here.  How best can we support you, Colonel?\"\n        \"Tell them to hurry forward with everything.  \n        *goto burnside3\n  #\"I am come on behalf of Colonel Willcox to survey the field and to report back.\"\n    \"Tell him to hurry forward with everything he has.  \n    *goto burnside3\n  #\"Third Division is advancing and only a short way from here.  How best can we support you, Colonel?\"\n    \"Tell them to hurry forward with everything.  \n    *goto burnside3\n\n\n*label burnside3\nWe need reinforcement.  My men have borne the brunt of the fight so far and our ammunition runs low.  There is a brigade up there, on the high ground and taking shelter behind a fence.  I sent the Second Rhode Island up and they were thrown back.  Now we are preparing to advance and take the hill by charge.  You may join if you choose.  I must attend to the battle.\"  He turns back to his brigade.  \n*set burnside_situation \"yes\"\n\nYour couriers glance attentively at you, \"What are your orders, Sir?\" \n*if actions \u003c 1\n  *choice\n    #\"Ride to Colonel Willcox and report what we have learned.\"\n      *set report \"yes\"\n      \"Yes, Sir!\"  The Lieutenant salutes and then spurs his horse away to the rear.  \n    \n      Captain Bowles looks at you, awaiting your next order.\n      *goto mcdowell\n    #\"Let us regroup and evaluate the situation.\"\n      *goto mcdowell\n*choice\n  #\"Ride to Colonel Willcox and report what we have learned.\"\n    \"Yes, Sir!\"  The Lieutenant salutes and then spurs his horse away to the rear.  \n    \n    Captain Bowles looks at you, awaiting your next order.\n    *set report \"yes\"     \n    *set couriers -1\n    *choice\n      #\"We charge with Burnside's Brigade.  Ready yourself, Captain.\"\n        Bowles looks surprised, but nods and acknowledges.  \n        *goto hotel\n      #\"Let us go to the other brigade on the right.\"\n        Returning to the saddle, you lead your men away from Burnside's Brigade.  Behind you, you can hear an officer shouting orders at the top of his lungs.  \"Ready, boys!  Forwaaaaaaard march!\"  A bugle call pierces through the din of battle and the obscuring smoke.  \n        *goto porter\n      #\"To the shattered unit at the rear.\"\n        Returning to the saddle, you lead your men away from Burnside's Brigade.  Behind you, you can hear an officer shouting orders at the top of his lungs.  \"Ready, boys!  Forwaaaaaaard march!\"  A bugle call pierces through the din of battle and the obscuring smoke.  \n        *goto shattered_unit\n  #\"We charge with Burnside's Brigade.  Ready yourself, Captain.\"\n    Bowles looks surprised, but nods and acknowledges.  \n    *goto hotel\n  #\"Let us go to the other brigade on the right.\"\n    Returning to the saddle, you lead your men away from Burnside's Brigade.  Behind you, you can hear an officer shouting orders at the top of his lungs.  \"Ready, boys!  Forwaaaaaaard march!\"  A bugle call pierces through the din of battle and the obscuring smoke.  \n    *goto porter\n  #\"To the shattered unit at the rear.\"\n    Returning to the saddle, you lead your men away from Burnside's Brigade.  Behind you, you can hear an officer shouting orders at the top of his lungs.  \"Ready, boys!  Forwaaaaaaard march!\"  A bugle call pierces through the din of battle and the obscuring smoke.  \n    *goto shattered_unit\n    \n    \n\n\n\n    *label hotel\n    Colonel Burnside shouts, \"Ready, boys!  Forwaaaaaaard march!\"  A bugle call pierces through the din of battle and the obscuring smoke, relaying the order to the whole brigade.  A drum somewhere nearby rolls in a martial rhythm, and you feel your hair standing up.  The line lurches forward as the volunteer troops march up the ridge.  The regiment you are with wears gray coats and forage caps, and you feel a certain uneasiness that this could result in confusion when many of the enemy wears gray coats as well.  \n    *achieve overeager\n    *fake_choice\n      #Draw my sword.\n        *set sword \"yes\"\n      #Sword in one hand, pistol in the other.\n        *set sword \"yes\"\n        *set pistol \"yes\"\n      #Ready my pistol.\n        *set pistol \"yes\"\n    You feel a certain amount of security from the lines of men, four deep and shoulder to shoulder, armed to the teeth and shouting with anger.  The other side of your mind reminds you that a stray bullet or shell can end your life in a heart beat.\n    \n    You trip and almost fall.  Looking down, you see a gray coated body, face down in the thick grass.  \n    \n    \"Forward, boys!  Forward, for god's sake!  Come on boys!\"  An officer is shouting encouragement.  The men around him roar with intensity.  Their muskets rest on their right shoulders, and many of them are hunched forward, as if walking into a heavy storm.  The bright sun is blinding you, and you pull down the brim of your hat to block it out.  \n    \n    The smoke of a volley pours out from the top of the ridge, and a moment later you hear the whiz of musket balls flying past you.  There is a sickening sound, like a mallet hitting a slab of meat, and blood sprays out of a man's back as the musket ball passes through.  He gasps, chokes, and falls to the ground with a sickening spin.  You step around his head and keep going forward.  \n    *fake_choice\n      #\"Forward, boys!  Forward!\"\n      #\"Steady on, lads!\"\n    Step by step, you move up the ridge.  Shouts and screams pervade the air in an overwhelming, overlapping cacophony of terror and aggression.  \n    \n    Off to your right, the two rebel howitzers go off in unison.  The scatter shot of cannister shells tear into the line right near you.  One man's head explodes like a smashed grape and you feel the wet splatter of blood on your face.  You are holding your breath involuntarily, gripped by fear and revulsion.  You wipe your face and look down and the dark red streaks on your hand.  \n    \n    There is no time.  Forward.  Upward.  Screaming.  Shouting.  You walk straight into a man in front of you.  Now you notice the bugle call, carrying through the smoky, hot, summer air.  Halt, orders the bugle.  Looking through the gap in the files of men, you can see the rebels.  There is a wooden fence near the summit of the ridge, and a line of men in gray uniforms stand behind it, loading for another volley.  \n    \n    \"Ready!\" shouts a confident sounding voice on your left.  Looking over, you see a clean shaven Colonel with sword held above his head.  Simultaneously, the weapons of the regiment come up.  \"Aim!\"  \n    \n    Before the regiment can fire, a ragged rebel volley erupts from the other line.  The thump of musket balls going home sounds in front of you.  Two men that you can see fall down, clutching fresh wounds.  Looking left again, you see the Colonel standing dumbfounded, with his sword fallen and his arm hanging limply at his side.  As you watch in almost disbelief, the shoulder of his fine gray coat starts to turn dark red with gushing blood.  The men stand still, confused, rifles held at the ready.\n    *choice\n      #\"Fire!\"\n        Before you even finish the word, your voice is drowned out by the roar of several hundred muskets discharging in unison.  Through the wall of smoke, you can see the balls snap splinters off the fence, and a few gray hats drop out of sight.  \n        *goto charge\n      #Rush to help the wounded Colonel.\n        As you run over to him, the Colonel falls to his knees.  His left hand grabs the wound in shock and the blood turns his fingers red.  Kneeling down, you catch him as he almost falls over backward.  An aide kneels down on the other side, looking shocked.  \n        \n        \"Hell,\" mutters the Colonel, \"They won't take my arm.  Damn them, they won't have it.\"\n        *achieve marston\n        *label delta\n        *choice\n          #\"Take him back to the field hospital, right away!\"\n            \"Yes Sir!\"\n            *label echo\n            *choice\n              #\"Tell them not to remove his arm.\"\n                \"Yes Sir!  Private, help me carry the Colonel.\"  The two of them lift the injured officer and carry him down the ridge.  \n                *goto charge\n              #\"The surgeons will know what to do.\"\n                \"Yes Sir.  Private, help me carry the Colonel.\"  The two of them lift the injured officer and carry him down the ridge.  \n                *goto charge\n              *if chat8 = \"yes\"\n                #\"Who is in command, now?\"\n                  \"Lieutenant Colonel Fiske, I believe.\"\n                  *set chat8 \"no\"\n                  *goto echo\n          *if chat7 = \"yes\"\n            #\"Colonel, you have done your duty admirably!  They will have a parade for you when you return home.\"\n              His dazed eyes meet yours, his mouth quivering with pain.  \"Do not… let them take my arm.  Do you understand?\"\n              *set chat7 \"no\"\n              *goto delta\n          *if chat7 = \"yes\"\n            #\"Colonel, I won't let the surgeons amputate your arm.\"\n              His dazed eyes meet yours, his mouth quivering with pain.  \"Good… Good man.  They'll not have it.\"\n              *set chat7 \"no\"\n              *goto delta\n\n*label charge\n*set charge \"yes\"\nA bugle call pierces through the roar of battle.  Its high pitched, carrying tune demands that the men fix bayonets.  Some men react instantly, while others look confused, but the Sergeants and officers shout the order down the line with ferocious intensity.  \"Bayonets!  Fix bayonets!  Fix bayonets!\"\n\nNow, another bugle call, and the officers scream the order through the crackle of musketry and the cries of the wounded.  \"Charge bayonets!  Charge bayonets!\"  You feel yourself quivering with tension, your breath coming in gulps.  The fear threatens to unman you, but you have come this far and you will not turn back.  You wonder if all the rows of brave men feel the same way as you.  \n\nThe bugle sounds again with the familiar trill.  \"Charge!\"\n*fake_choice\n  #\"Charge!\"\nUp the hill and toward the fence, the whole brigade charges forward into the hail of bullets.  The cannons roar again and you hear whistling lead and blood-curdling screams, but these sounds are drowned by the roar of shouting men, two thousand strong.  The angry shout of defiance as men charge forward to death and glory, in unspoken agreement to run the great risk together.  \n\nYour legs move of themselves, carrying you forward to your fate, and you feel as if you are an onlooker, not really there and not in control, simply watching as some other will carries your body forward to fight.  \n\nA few muskets are discharged from the fence with feeble bursts of smoke.  You see the wide and terrified eyes of the defenders.  The soldiers in front of you crash headlong into the fence, which bows from the impact.  One section of boards snaps and the Union men pour through the gap, but the section in front of you is an obstacle through which the men do vicious battle.  The Union bayonets plunge between the wooden boards to be caught or parried by defenders, or to drive home into flesh.  \n*choice\n  #Climb the fence and lead the way forward.\n    You push through the files of jostling men, seeing glimpses of bearded faces filled with rage.  You feel a sharp elbow in your side but you get through to the fence, and you see the enemy.  \"Forward!  Forward, boys!\" you hear yourself shout.  Grabbing the fence with one hand, you climb the boards like rungs on a ladder.  Dropping down onto the other side, you are instantly beset by two rebels.  One swings his musket at your head like a baseball bat.  You instinctively duck out of the way and turn to meet the other attacker.  \n    *if sword = \"yes\"\n      Your saber comes up and you parry the musket, feeling the impact travel up your arm, but gratefully, no blade in your gut.  \n      \n      You swipe the sword to the right and the first rebel raises his arms to block it.  The blade slashes his forearms with a sickening cut and he stumbles backward.  \n      *if pistol = \"yes\"\n        Up comes your pistol in your off hand and without a moment's hesitation, you fire point blank into the other man's chest.  He drops his weapon and falls down, gasping for air.  \n        *goto charge2\n      *else\n        \n        Spinning, you try to parry another attack from the bayonet, but you cannot recover your defense quickly enough.  In desperation, you grab the tip of the musket barrel and try to stop the blow, but the bayonet is thrust painfully into your hip.  You let out an involuntary howl and fall backward, the blade sliding out before the enemy has time to develop his lunge.  \n        \n        Another man in a gray uniform comes in swinging with a musket, wielding it like a club, but he slams it into the rebel's face.  You hear the sound of the musket stock cracking the skull underneath with a sound like a pickaxe on stone.  Then, you realize the gray coated man is a private from the regiment you are with.  Indeed, as you look around you, you see indistinguishable gray coated men fighting viciously in confusion.  \n        \n        Feeling your hip, you find that the wound is not very deep, and you can stand with only moderate pain.  \n        *set hip_cut \"yes\"\n        *goto charge2\n    *else\n      You try to grab the musket, but it is driven hard into your gut.  You feel the sharp, terrible pain as he twists the blade and then yanks it free.  You tumble to the ground and black out from the shock.  \n      *ending\n  *if pistol = \"yes\"\n    #Move forward and try to fire your pistol through the fence.\n      You push through the files of jostling men, seeing glimpses of bearded faces filled with rage.  You feel a sharp elbow in your side but you get through to the fence.  A Union private on your right is yanking on his musket, the bayonet stuck in an unfortunate rebel's ribcage, and another rebel is pointing a musket at the man.  Up comes your pistol and you fire, the weapon kicking back in your hand as smoke pours out the end of it.  A red dot appears on the rebel's neck and he crumples to the ground.  Another man lunges at you with a bayonet, his eyes fierce with animal rage.  Your arm swings to the left and you fire again, clotheslining the attacker and throwing him on his back.  \n      \n      The men on either side of you are climbing the fence, surging forward over the enemy line.  Both sides have gray uniforms, and your eyes are confused as they try to sort out the two groups.  \n      *goto charge2\n  #Shout to the men to tear down the fence.  \n    \"Tear down the fence!  Tear it down!\" you yell, but your voice is lost in the shouting and screaming.  A musket fires somewhere off to the right, and the men in front of you are stabbing back and forth through the gaps in the fence.  One man tries to climb the fence boards and a rebel musket clubs him back off into the sea of Union men behind him.  \n    \n    \"Tear down the fence!\" you scream, \"Pull the boards down!  Clear the obstacle!\"  Two men hear the authoritative words and set down their muskets, grabbing either side of the top board and lifting it free.  They throw it forward against the rebel defenders and start to pull up the next board.  One of them drops with a bayonet in his side, but the others surge forward and drive the enemy back from the fence with a dozen stabbing blades.  \n    \n    They have got the idea, now, and more men pry up the boards, so carefully placed by some farmer in years past.  The section of the fence in front of you crumbles with a jumble of wooden thumps.  \n    *goto charge2\n*label charge2\n\nThe rebels are giving back now, driven from their bloody position at the fence by the ferocity of the attackers.  The Union men let out a howl, sweeping forward like a host of angels, driving all before them.  Some of the enemies drop their muskets and run, while others try to reform in the grassy field at the top of the ridge.  The Union men are not daunted.  Having found victory and glory, they are motivated by an intense, vicious determination to drive the enemy back again.  Forward sweeps the line, ragged and undisciplined, but in deadly earnest.  \n\nThe rebels crumble before the onslaught.  Scattered muskets still fire on both sides, but the glistening red bayonets of the United States Army march inevitably forward.  The two lines grapple and stab at one another for only seconds before the rebels break and flee, running down the eastern slope of the ridge.  Victory!  You have taken the ridge!  You look around you and see blue Union regiments on your left, driving the enemy back, then on the right you see a New York regiment overrunning the Confederate howitzer battery.  \n*fake_choice\n  #\"Victory, by God!  We have done it!\"\n    The men cheer and wave their gray forage caps in the air.  \n  #\"Run you yellow bellies!\"\n    The men cheer and wave their gray forage caps in the air.  \n  #\"Reload!  Halt and reload!\"\n    Some of the men nearest to you listen and start to obey, but most of them are too excited to care.  \nNow the lack of discipline starts to show.  The men start to scatter about the ridge, talking to each other or digging among the dead and wounded for loot.  Some men stab wounded rebels or club them to death.  Others are looking among their own wounded and trying to drag them back down the hill.  \n\nThe officers shout for order.  \"Form lines!  God damn you, form a line!  Regiment, halt!  Attention!\"  \n\nIt is of little use; the volunteers simply are not under your control.  They are not trained well enough to obey, and they are driven to ferocious excess by the adrenaline of the fight.  \n\nSuddenly, you hear a sound from the far side of the ridge.  A thousand voices raised in a vicious roar, like the one you were just a part of.  \n*choice\n  #\"Form a line for God's sake!  The rebels are coming back!\"  \n    Two dozen men heed your orders and form a line in front of you.  Other officers along the line are reining in small sections of troops, but this is your unit for now.  \n    *goto line\n  #\"Fall back!  To the fence line!\"\n    Two dozen men heed your orders and fall back down the hill toward the cover of the fence.  Other officers along the line are reining in small sections of troops, but this is your unit now.  \n    *goto fence\n*label line\n*choice\n  #\"Load!\"\n    Your impromptu squad begins to load their weapons.  A musket takes a full twenty seconds to load in the ablest of hands, and these raw recruits are not the ablest you have seen.  Your eyes settle on the man in front of you as he sets the butt of his musket on the ground, pulls out a powder cartridge, bites off the end of the paper and shoves it down the barrel.  The musket ball goes in after it, then he uses his ram rod to pack it in tight.  The ramrod is replaced in its holder and the musket comes up.  Now the man fishes for a brass charge which he places on the firing hammer.  Ready.  \n    \n    Only just in time.  The rebels are cresting the ridge, fighting their way through a stubborn patch of brambles just in front of your line.  These are not the regiment you just fought.  Clearly, enemy reinforcements were already making their way up the eastern side of the ridge.  A few stragglers are still trying to load, but most of your line is ready.  \n    *choice\n      #\"Volley fire at my command!  Ready!\"\n        The muskets come up and point at the onrushing foes.  \"Aim!\"  You can see the shouting, bearded faces of the rebels looking down the line of barrels.  \"Fire!\"  The muskets discharge with a bang and smoke envelops the gap between your line and the enemy.  Through the smoke, you see men tumble to the ground, but there are many more that keep coming.  They are about fifteen yards away.  \n        *set volleys +1\n        *choice\n          #\"Load!\"\n            Some of your men start to load, but others lower their bayonets to brace for the charging rebels.  \n            *goto kilo\n          #\"Charge bayonets!  Brace!\"\n            One last musket is discharged rapidly, and the line lowers their muskets to waist height, bayonets glinting in a line like a row of pikes.  \n            *set fix_bayonets +1\n            *goto kilo\n      #\"Fire at will!\"\n        The men who are ready bring their muskets up to their shoulders.  You can see the shouting, bearded faces of the rebels looking down the line of barrels.  The weapons go off in scattered bursts, and smoke envelops the gap between your line and the enemy.  Through the smoke, you see men tumble to the ground, but there are many more that keep coming.  They are about fifteen yards away.  \n        *set fire_at_will +1\n        *choice\n          #\"Charge bayonets!\"\n            One last musket is discharged rapidly, and the line lowers their muskets to waist height, bayonets glinting in a line like a row of pikes.  \n            *set fix_bayonets +1\n            *goto kilo\n          #Allow them to maintain fire.\n            Some of your men start to load, but others lower their bayonets to brace for the charging rebels.  \n            *goto kilo\n  #\"Charge bayonets!\"\n    The men follow your order, holding their muskets at waist height, bayonets glinting in a line like a row of pikes.  The rebels are cresting the ridge, fighting their way through a stubborn patch of brambles just in front of your line.  These are not the regiment you just fought.  Clearly, enemy reinforcements were already making their way up the eastern side of the ridge.  \n    \n    You can see an officer, sword in hand, and he yells a command, \"Fire!\"  A scattered volley erupts from the Confederate line, and you wince as the smoke pours out toward you.  Gratefully, you do not feel the punch of a musket ball, but two men in your line drop, one screaming in a dreadful blood-curdling howl.  The men around him take two steps backward, clearly wavering.  \n    *set fix_bayonets +1\n    *choice\n      #\"Stand your ground!\"\n        The men steady themselves and tighten their ranks to close the gaps.  Just as they do, the enemy howls with determination and charges your line.  \n        *label kilo\n        For three seconds, you feel a sickening feeling like standing in front of a runaway horse cart, and you hunch down to brace for the impact.  \n        \n        The Confederates hit your line with fury, driving it back a step, bayonets stabbing and clubs swinging.  Several are skewered on your men's charged bayonets as they try to break through, and others are stabbed or driven back by lunging strikes.  \n        \n        Both ends of your line are bowing backward, driven by the overwhelming number of rebels.  The enemy force has so many men as to outflank both sides of your line, and they are working their way around behind you.  \n        *choice\n          #\"Fight to the death!\"\n            Your men hold for another moment or two, then they break and run by twos and threes.  The rebels get through the holes in the line and some of the men throw down their weapons and surrender.  Not you.  Your pistol drops two rebels before a third gets through and buries a blade in your gut.  The unbelievably sharp and poignant pain is the last thing you feel before a musket ball blows out your brains.\n            *ending\n          #\"Retreat!\"\n            The men take only a second to register the order before they break and run, some throwing down their muskets or losing their hats in the jostling rush.  You run with them, and behind you, you hear the rebels cheering.  Through the fence and down the hill, running as fast as you can without falling and tumbling the rest of the way, you finally reach a position where other Union soldiers are regrouping.  \n            \n            \"Well done, Sir.  You did fine,\" says a panting Corporal from your impromptu unit with a smile.  \n            *goto return_from_charge\n      #\"Fall back to the fence line!\"\n        The men turn and run, but they stay together.  \n        *goto fence\n\n\n*label fence\nReaching the fence line, the soldiers climb hurriedly and plop down on the other side.  Turning to face the top of the ridge, you see hundreds of rebels in line formation, driving back the scattered resistance of Burnside's Brigade.  On your left and right, men are vaulting the fence and continuing down the hill.  \n*choice\n  #\"Load!\"\n    Your temporary squad begins to load their weapons.  A musket takes a full twenty seconds to load in the ablest of hands, and these raw recruits are not the ablest you have seen.  Your eyes settle on the man in front of you as he sets the butt of his musket on the ground, pulls out a powder cartridge, bites off the end of the paper and shoves it down the barrel.  The musket ball goes in after it, then he uses his ram rod to pack it in tight.  The ramrod is replaced in its holder and the musket comes up.  Now the man fishes for a brass charge which he places on the firing hammer.  Ready.  \n    \n    Some of the men crouch and rest their muskets on the wooden fence boards, while others stand and peer over the top.  The rebels are moving forward.  One line of them is fifty yards ahead and marching toward you.  \n    *choice\n      #\"Volley fire at my command!  Ready!\"\n        \"Aim!\"  Musket butts come up into shoulders.  A rebel officer in a plumed hat is waving his sword in the air.  \"Fire!\"  Two dozen muskets go off, the balls invisible but their damage clear.  The tall grass in front of the enemy flicks back as lead balls cut it short, and the rebel unit shows a similar effect.  Half a dozen men drop instantly, some still and others writhing, while one man grabs desperately at a comrade's legs and trips him up.  \n        *set volleys +1\n        *choice\n          #\"Reload!\"\n            Dirty hands grab cartridges and begin the process again.  The rebel muskets come up now, and you hear the officer shout \"Fire!\"  A man beside you is struck in the mouth just as he is biting the cartridge open.  The black powder of the cartridge showers all over the ground around him and he falls backward.  The men appear to be reloading now at very different rates, depending on the position they are standing or sitting in and their level of focus.  \n            *choice\n              #Continue volley fire.  \n                You watch while the standing men finish loading and look anxiously at you, awaiting the order to fire.  \"Ready!  Aim!\"  The last few stragglers raise their muskets.  The enemy is at point blank range, ten yards away.  They howl and charge at a sprint.  \"Fire!\"  Your unit lets off a ragged volley and some of the rebels are thrown backwards as if clotheslined by the violent discharge.  \n                *set volleys +1\n                \n                *label mike\n                The rebels reach the fence, shouting and spitting and stabbing.  Half your men turn and run, muskets, gear, and hats flying free in the panic.  Of those who remain, several fall to enemy bayonets and musket fire.  The rebel officer points his pistol directly at you through the fence.  \n                *choice\n                  *if pistol = \"yes\"\n                    #Try to shoot him first.\n                      Bringing up your own pistol, you see him fire and feel your coat pulled tight, as if someone grabbed it from behind.  You fire and see the man drop, a bullet hole where his blue eye had been.  \n                    \n                      Looking down, you see a hole in the side of your coat, but it barely missed you.  The last remnant of your unit are fleeing now, and one of them pushes you as he rushes past.  Seeing that the ground is lost, you turn and follow them down the hill at a sprint, trying not to trip and tumble down the slope.  Finally, you reach a position where other Union soldiers are regrouping.  \n            \n                      \"Well done, Sir.  You did fine,\" says a panting Corporal from your impromptu unit with a smile.  \n                      *goto return_from_charge\n                  #Throw yourself to the ground.\n                    You throw your body to the ground as his pistol goes off, and you hear the whiz of the bullet above your head.  Rising again, you see the last remnants of your unit running for their lives.  Someone grabs your arm and propels you down the hill with him.  You run with them, and behind you, you hear the rebels cheering.  Down the hill, running as fast as you can without falling and tumbling the rest of the way, you finally reach a position where other Union soldiers are regrouping.  \n            \n                    \"Well done, Sir.  You did fine,\" says a panting Corporal from your impromptu unit with a smile.  \n                    *goto return_from_charge\n              #Fire at will.  \n                \"Fire at will!\"  The first few men spit out the cartridge caps and aim their muskets.  The banging of the discharges are now at a constant but irregular interval as the men fire as fast as they can load.  The enemy is close now, fifteen yards from the fence, their bayonets glinting in the July sun.  \n                *set fire_at_will +1\n                *label romeo\n                *choice\n                  #\"Charge bayonets!\"\n                    *set fix_bayonets +1\n                    *goto mike\n                  #\"Retreat!\"\n                    The men take only a second to register the order before they break and run, some throwing down their muskets or losing their hats in the jostling rush.  You run with them, and behind you, you hear the rebels cheering.  Down the hill, running as fast as you can without falling and tumbling the rest of the way, you finally reach a position where other Union soldiers are regrouping.  \n            \n                    \"Well done, Sir.  You did fine,\" says a panting Corporal from your impromptu unit with a smile.  \n                    *goto return_from_charge\n          #\"Fall back!\"\n            The men take only a second to register the order before they break and run, some throwing down their muskets or losing their hats in the jostling rush.  You run with them, and behind you, you hear the rebels cheering.  Down the hill, running as fast as you can without falling and tumbling the rest of the way, you finally reach a position where other Union soldiers are regrouping.  \n            \n            \"Well done, Sir.  You did fine,\" says a panting Corporal from your impromptu unit with a smile.  \n            *goto return_from_charge\n      #\"Fire at will!\"\n        The men bring up their muskets and a ragged fire ensues.  You watch the enemy draw closer and the occasional man drops out of line as your men's shots go home.  \n        \n        The rebel muskets come up now, and their officer shouts, \"Fire!\"  A man beside you is struck in the mouth just as he is biting the cartridge open.  The black powder of the cartridge showers all over the ground around him and he falls backward.  \n        \n        The rebel line continues to advance into the feeble firepower of your small unit.  They are close now, fifteen yards from the fence, their bayonets glinting in the July sun.  \n        *set fire_at_will +1\n        *goto romeo\n  #\"Fall back and regroup.  The ridge is lost.\"  \n    The men look grateful to receive the order.  They shoulder their weapons and take off down the hill in moderate disorder.  You follow them, jogging at a fast pace and trying not to trip and roll down the rest of the slope, before finally reaching a position where other Union soldiers are regrouping.  \n            \n    \"Well done, Sir.  You did fine,\" says a panting Corporal from your impromptu unit with a smile.  \n    *goto return_from_charge\n\n*label return_from_charge\nYou see your horse standing where you left it, and pulling yourself back into the saddle, you look around the field.  New units are marching forward into the center of the Union line.  Franklin's brigade must be arriving to support the attack.  Riding that way, you see the colors of your own regiment among the others.  You kick your horse up into a gallop until you draw near your own regiment's colors, flowing together with the stars and stripes beside them.  Under the colors rides Colonel Willcox on his gray mare.  Your brigade commander returns your salute as you ride up.  \n*goto quebec\n\n\n*label porter\nRiding to the right end of the line, you have to cross a wide gap of close to two hundred yards where there are no troops.  A handful of blue-coated bodies lay sprawled in the grass, but that is all.  As you ride, you hear a whizzing sound overhead, then another.  The rebels must be taking target practice at the exposed riders.  Spurring your horse forward, you gallop the last hundred yards to reach the first line of Union troops.  There, a sergeant takes your horse's bridle and you dismount.  Now, you see a colonel walking toward you, the silver eagles on his epaulets signifying his rank.  He has a full beard of mixed brown and yellow, and a fine, blue greatcoat that fails to hide his paunchy frame.  You recognize him as Colonel Porter.  \n\n\"Major, what news do you have?\" he asks.  \n*image porter.png\n*set actions -1\n*set porter_location \"yes\"\n*label foxtrot\n*choice\n  *if burnside_situation = \"yes\"\n    #\"Burnside's brigade is going to charge.\"  \n      The colonel looks to the northeast.  God give him victory, but I fear he will not be able to hold the heights without reinforcements.  Those howitzers will enfilade his attack.  What else do you know?\"\n      *choice\n        #\"Third Division is on its way.  I am here to survey the field and report back.\"  \n          \"Very good.  Tell them to hurry.  We need reinforcement and we can take this damned ridge.  Those people only have a brigade or two up there.  We should not have much trouble if we only had another brigade or two, ourselves.  Here, look,\" he takes your sleeve and turns you to face the top of the ridge.  \"You see them fellows right in front of us?  They are the left flank of the whole rebel line.  If we had a brigade or two on our right, we could sweep up there and roll up the whole line.  As it stands now, we are having a hard time of it.  My men attempted to take the ridge, but we were repulsed.  Tell the next brigade in line to take position on our right.\"  \n          *set porter_situation \"yes\"\n          *goto porter2\n  #\"Third Division is on its way.  I am here to survey the field and report back.\"  \n    \"Very good.  Tell them to hurry.  We need reinforcement and we can take this damned ridge.  Those people only have a brigade or two up there.  We should not have much trouble if we only had another brigade or two, ourselves.  Here, look,\" he takes your sleeve and turns you to face the top of the ridge.  \"You see them fellows right in front of us?  They are the left flank of the whole rebel line.  If we had a brigade or two on our right, we could sweep up there and roll up the whole line.  As it stands now, we are having a hard time of it.  My brigade attempted to take the ridge, but we were repulsed.  Tell the next brigade in line to take position on our right.\"\n    *set porter_situation \"yes\"\n    *goto porter2\n  *if chat9 = \"yes\"\n    #\"Who is in command up here?\"\n      The Colonel's stern eyes remain locked with yours for two seconds before he repeats his question.  \"What news, Major?\"\n      *set chat9 \"no\"\n      *goto foxtrot\n  *if chat9 = \"yes\"\n    #\"What is the situation, here?\"\n      The Colonel's stern eyes remain locked with yours for two seconds before he repeats his question.  \"What news, Major?\"\n      *set chat9 \"no\"\n      *goto foxtrot\n\n*label porter2\n*choice\n  *if chat10 = \"yes\"\n    *if porter_location = \"no\"\n      #\"What brigade is this?  I am to report back the disposition of our troops.\"\n        \"Do you not know me?  I am Colonel Porter.  This is my brigade.  Those fellows on the left are Burnside's brigade.  That is Reynolds' artillery on the road.\"  \n        *set burnside_location \"yes\"\n        *set porter_location \"yes\"\n        *set reynolds_location \"yes\"\n        *set chat10 \"no\"\n        *goto porter2\n  *if chat11 = \"yes\"\n    #\"Sir, would the reinforcements not be better in the center of our line?\n      \"Perhaps one regiment, but no more.  The enemy has the center well covered by infantry, and their howitzers can target the center approach, not to mention the sharpshooters in that farmhouse.  We need support on the right side of the line.  That is their weakest point.\"  \n      *set chat11 \"no\"\n      *goto porter2\n  #\"Thank you, Sir.  I will do what I can.\"\n    \"Very well, Major,\" Colonel Porter salutes and turns back to his line.  An officer's voice comes through the smoke and whizzing musket balls, \"Ready!  Aim!… FIRE!\"  The volley explodes out with a roar and you hear a ringing in your ears.  \n    \n    *if burnside_situation = \"no\"\n      Looking to the left side of the Union line, you can see \n      *if burnside_location = \"yes\"\n        Burnside's Brigade marching up the hill.  They stop near the fence and fire a volley.  As you watch, they fix bayonets and charge.  \n        *goto golf\n      *else\n        the other brigade marching up the hill.  They stop near the fence and fire a volley.  As you watch, they fix bayonets and charge.  \n        *goto golf\n    *label golf\n    \n    \"What are your orders, Sir?\" asks your adjutant.  \n    *choice\n      *if couriers = 2\n        #\"One of you, ride to Colonel Willcox and report what we have learned.\"  \n          \"Yes, Sir!\"  The Lieutenant salutes and rides off back up the road.  \n          *set report \"yes\"\n          *if burnside_situation = \"yes\"\n            *achieve full_report\n          *goto india\n      *if couriers = 1\n        #\"Ride to Colonel Willcox and report what we have learned.\"\n          \"Yes, Sir!\"  Captain Bowles rides off back up the road.  \n          *set report \"yes\"\n          *if burnside_situation = \"yes\"\n            *achieve full_report\n          *goto india\n      #\"Stay with me until we gather more information.\"\n        \"Yes, Sir.\"  \n        *goto india\n*label india\n*if actions \u003c 1\n  *goto mcdowell\n*else\n  *choice\n    #Go to the shattered unit at the rear.\n      *goto shattered_unit\n\n*label shattered_unit\n*set actions -1\nYou ride up to the disorganized mess of Union soldiers by the tree line.  Some are clearly wounded, while other are splattered with blood that is not their own.  The men are sheltering in the trees, or simply laying sprawled out with exhaustion.  The occasional spent musket ball whizzes by or thumps into the ground, but it seems relatively safe.  \n*set shattered_situation \"yes\"\n*fake_choice\n  #\"Who is in charge, here?!\"\n    A young captain walks up to you, \"Major, I am trying to get these men up, but they will not attend!\"  \n  #\"What the hell are you doing?!  There is a battle just a stone's throw from here!\"  \n    A young captain walks up to you, \"Major, I am trying to get these men up, but they will not attend!\"  \n  #\"What unit is this?\"\n    A young captain walks up to you, \"Major, most of these men are from the Second Rhode Island regiment.  We were in the forward picket line when the battle started.  The rebels ambushed us with musket fire and cannister shot from those howitzers.  Some of these men are fit for duty, and I am trying to organize them!\"  \n*fake_choice\n  #Encourage them to regroup.\n    You ride into the middle of the group, \"Come on, boys!  You have had a break, now get yourselves together.  Your comrades need you, and I have faith in you!  Reform!\"  \n    *goto november\n  #Shame them into reforming.\n    You ride into the middle of the group, \"Come on, boys!  The war might be over tomorrow, and just think how you will feel if you spend it all on your backs!  If you stand and fight, you will have stories to tell your grandchildren!  Do not betray the trust of your comrades!\"  \n    *goto november\n  #Yell and threaten.\n    You ride into the middle of the group, \"You goddamn cowards!  Pull yourselves up and reform lines, or I'll have you all hanged by evening!  Stand up and fight, you god damned volunteer rabble!\"  \n    *goto november\n  #Let them rest.\n    \"They have seen enough fighting for now.  We marched over twelve miles this morning.  Let them recover their strength.\"\n    \n    \"Yes, Major,\" replies the captain, sounding conflicted.  \n    *goto tango\n*label november\nSome of the uninjured men get unsteadily to their feet and walk toward the captain.  They look exhausted and frightened.  \"Thank you, Major.  Where should we go?\" asks the captain.  \n*fake_choice\n  #\"Get these men up to the front immediately!  Burnside needs all the support he can get!\"\n    \"Yes, Sir!\" The Captain turns to the ragtag unit, \"Ready, boys!  Dress left, forward march!\"  They march forward to rejoin Burnside.  The remaining wounded lay where they are, some sobbing or calling for water.  \n  #\"Form up here in reserve until you are needed.  You can help prevent counter attacks or fill gaps in the line.\"\n    \"Yes, Sir!\" The Captain turns to the ragtag unit, \"Company, rest!\"  The troops relax a little but remain in formation, hopefully ready to act as reserves if needed.  The remaining wounded lay where they are, some sobbing or calling for water.  \n  #\"Form a stretcher detail and move these wounded men to the field hospital, then get back to your brigade.\"  \n    \"Yes, Sir!\" The Captain turns to the ragtag unit, \"Form ambulance detail, gather the wounded and prepare to move out.\"  You turn away, confident that you have resolved at least one problem.  \n*label tango\n*choice\n  *if burnside_situation = \"no\"\n    *if porter_situation = \"no\"\n      #Go to the left hand brigade.\n        *goto burnside\n  *if porter_situation = \"no\"\n    #Go to the right hand brigade.\n      *goto porter\n  *if actions \u003c 1\n    #Regroup and evaluate the situation.\n      *goto mcdowell\n\n\n*label mcdowell\nYour eyes flit across the battlefield.  On the left, you see that Burnside achieved the summit of the ridge, but now his brigade is thrown back by untimely rebel reinforcements.  The various units fall back down the ridge in various degrees of disorder, but most of the men simply run like hares down the slope.  A brave attack, but sadly repulsed by a counter charge.  \n\nLooking back to the northwest road from which you came, you see a large troupe of officers on horseback.  Two dozen, at least.  Behind them, dust is rising in large clouds.  Infantry are not far behind them.  \n\nRiding to link up with the officers, you feel somewhat intimidated.  At the center of the group, sitting high in his saddle, is General Irvin McDowell, the commander of the whole army.  He is an overweight man with a mustache and a long goatee beneath his tall blue cap.  He looks directly at you as you ride up, and your hand automatically snaps to your forehead in a salute.  \"Major,\" says McDowell in a stressed tone of voice, \"What is the state of the field?  Franklin's Brigade is right behind us and ready to move into the battle line.\"  \n*image mcdowell.png\n*label mcdowell2\n*choice\n  *if chat12 = \"yes\"\n    *if burnside_location = \"yes\"\n      *if porter_location = \"yes\"\n        *if reynolds_location = \"yes\"\n          #\"Burnside's Brigade is on the left, and Porter's Brigade is on the right.  That is Reynolds' artillery on the road in front of us.\"  \n            His eyes scan the various units, \"Understood, go on.\"\n            *set chat12 \"no\"\n            *goto mcdowell2\n        *else\n          #\"Burnside's Brigade is on the left, and Porter's Brigade is on the right.\"  \n            His eyes scan the various units, \"Understood, go on.\"\n            *set chat12 \"no\"\n            *goto mcdowell2\n      *else\n        #\"Burnside's Brigade is on the left, and another brigade on the right.\"\n          His eyes glance right, \"That will be Porter on the right, then.  Go on.\"  \n          *set chat12 \"no\"\n          *goto mcdowell2\n    *else\n      *if porter_location = \"yes\"\n        #\"That is Colonel Porter's brigade on the right.\"  \n          His eyes glance left and right, \"That will be Burnside on the left, then.  Go on.\"\n          *set chat12 \"no\"\n          *goto mcdowell2\n  *if chat13 = \"yes\"\n    *if burnside_situation = \"yes\"\n      #\"Burnside's Brigade is low on ammunition and worn out.  They were the first to engage and have borne the brunt of the fighting so far.\"\n        \"Hmm, yes, I see.  What else can you tell me?\"\n        *set chat13 \"no\"\n        *goto mcdowell2\n  *if chat14 = \"yes\"\n    *if porter_situation = \"yes\"\n      #\"Colonel Porter's Brigade was repelled by one rebel attack, but he is facing the far left flank of the rebel line.\"  \n        \"Up there?  That is their left flank?  I see.  Very good, continue.\"  \n        *set chat14 \"no\"\n        *goto mcdowell2\n  *if chat15 = \"yes\"\n    *if shattered_situation = \"yes\"\n      #\"Those stragglers by the tree line are some of Burnside's men that retreated.  I ordered them to reform and prepare to be used as reserves.\"\n        General McDowell waves a gloved hand dismissively, clearly not interested in a small group of stragglers.  \"What else?\"\n        *set chat15 \"no\"\n        *goto mcdowell2\n  *if chat12 = \"no\"\n    #\"That is all that I have to report, Sir.\"\n      *goto sierra\n  \n*label sierra\nSeveral of the horses skitter as the Union artillery opens fire from a short distance away.  \"Very well, Major.  Have you any further observations?\"\n*choice\n  *if burnside_situation = \"yes\"\n    #\"I think the next brigade should reinforce Burnside on the left.  His men are exhausted.\"  \n      \"I see.\"  His eyes flit up to the top of the ridge then over to the left.  He turns to the officer beside him, \"Franklin, place your artillery here in the center.  Let us take the brigade to the left along with Willcox' leading regiment.  Then, we shall storm the heights again and seek to hold them.\"  \n      *set attack \"left\"\n      *goto oscar\n  #\"I believe the next brigade should drive up the center.\"  \n    \"I see.\"  His eyes flit up to the ridge then down to the road.  He turns to the officer beside him, \"Franklin, we will move the brigade into the center of the line, along with Willcox' leading regiment.  Then, we shall storm the heights again and seek to hold them.\"  \n    *set attack \"center\"\n    *goto oscar\n  *if porter_situation = \"yes\"\n    #\"The next brigade should extend our right flank.  Our line will outreach their left and we can roll up their line.\"  \n      He nods.  \"Very good.\"  His eyes flit up to the top of the ridge then over to the right.  He turns to the officer beside him, \"Franklin, place your artillery here in the center.  Let us take the infantry to the right along with Willcox' leading regiment.  We shall storm the heights and attempt to outstretch the rebels' flank.\"  \n      *set attack \"right\"\n      *goto oscar\n  #\"None, Sir.\"\n    His eyes flit up to the ridge then down to the road.  He turns to the officer beside him, \"Franklin, we will move the brigade into the center of the line, along with Willcox' leading regiment.  Then, we shall storm the heights again and seek to hold them.\"  \n    *set attack \"center\"\n    *goto oscar\n\n*label oscar\nGeneral McDowell rides forward, accompanied by most of the other officers, while a few ride off to deliver his instructions to other parts of the army.  Now that they are gone, you see the lead column of Colonel Franklin's Brigade, close enough that you can hear the crunch of the men's marching boots on the gravelly dirt road.  Peering through the enormous dust trail of the marching men, you can see the familiar flag of your regiment at the tail of the marching brigade.\n*fake_choice\n  #Return to my unit.\nYou ride down the marching line, company after company after company.  Men salute as you ride past, and your horse kicks up into a gallop until you draw near your own regiment's colors, flowing together with the stars and stripes beside them.  Under the colors rides Colonel Willcox on his gray mare.  Your brigade commander returns your salute as you ride up.  \n\n*label quebec\n*if report = \"yes\"\n  \"Major $!{surname}, I am glad to see you.  I received your report; good work my friend!\"\n  *fake_choice\n    #\"Thank you, Sir.\"\n    #\"A pleasure, Colonel.\"\n  *gosub trial_end\n  \"It seems that our flanking maneuver did not take them quite by surprise.  God damn the delays.  Even so, it seems we may have a chance to prove ourselves, yet.  Have you anything new to report, Major?\"\n  *label papa\n  *choice\n    *if chat17 = \"yes\"\n      *if charge = \"yes\"\n        #\"I took part in a charge with Burnside's Brigade.  We took the ridge but we were repulsed back down the slope.  The men did not hold their discipline once the first fight was over.\"  \n          Willcox's eyebrows go up and his mustache twitches into an astonished smile, \"You joined a charge?  Well done, Major.  Let us soon have another such chance.\"\n          *set chat17 \"no\"\n          *goto papa\n    *if chat17 = \"yes\"\n      *if attack = \"left\"\n        #\"I spoke to General McDowell.  He intends for us to form up on the left with Burnside and advance on the ridge.\"  \n          \"The general spoke to you?  Well done.  As you can see, I only have the one regiment here.  The others fell behind due to exhaustion, but I've left Ward in command for the time being.  They should arrive soon after we do.\"  \n          *set chat17 \"no\"\n          *goto papa\n    *if chat17 = \"yes\"\n      *if attack = \"center\"\n        *if charge = \"no\"\n          #\"I spoke to General McDowell.  He intends for us to form up in the center and advance on the ridge.\"  \n            \"The general spoke to you?  Well done.  As you can see, I only have the one regiment here.  The others fell behind due to exhaustion, but I've left Ward in command for the time being.  They should arrive soon after we do.\"  \n            *set chat17 \"no\"\n            *goto papa\n    *if chat17 = \"yes\"\n      *if attack = \"right\"\n        #\"I spoke to General McDowell.  He intends for us to form up on the right with Porter and advance on the ridge.\"  \n          \"The general spoke to you?  Well done.  As you can see, I only have the one regiment here.  The others fell behind due to exhaustion, but I've left Ward in command for the time being.  They should arrive soon after we do.\"  \n          *set chat17 \"no\"\n          *goto papa\n    *if chat18 = \"yes\"\n      #\"How is my regiment, Sir?\"\n        \"They are well enough, Major.  They show a bit more spirit than the others for the time being.\"  \n        *set chat18 \"no\"\n        *goto papa\n    *if chat19 = \"yes\"\n      #\"Let us cover ourselves in glory, Sir!\"\n        \"Let it be so, and an end to this damn fool rebellion.\"  \n        *set chat19 \"no\"\n        *goto papa\n    *if chat19 = \"yes\"\n      #\"Battle is not quite what I imagined, Sir.  It is terrible.\"\n        Willcox nods grimly.  \"This is your first, isn't it?  It can certainly be a shock to the system.  When I was in Florida… well, never mind that.\"\n        *set chat19 \"no\"\n        *goto papa\n    *if chat17 = \"no\"\n      #\"That is all, Sir.\"  \n        \"Very good.\"\n        *if attack = \"left\"\n          *goto_scene left\n        *if attack = \"center\"\n          *goto_scene center\n        *if attack = \"right\"\n          *goto_scene right\n        *else\n          *bug why no attack?\n*else\n  \"Major $!{surname}, why did you send no report?  I thought you must have been killed, yet I see you here in good health.  What is the meaning of this?\"\n  *fake_choice\n    *if charge = \"yes\"\n      #\"I took part in a charge with Burnside's Brigade.  We took the ridge but we were repulsed back down the slope.  The men did not hold their discipline once the first fight was over.\"  \n        Willcox's eyebrows go up in astonishment, \"You joined in a charge?  That was exceeding your orders, considerably.  And you failed in the one thing I did order you to do.  I had hoped you might have more discipline than the privates, but it seems I was mistaken.\"  \n    *if charge = \"yes\"\n      #\"I beg your pardon, Colonel.  I was swept up in the excitement and joined in a charge.\"  \n        Willcox's eyebrows go up in astonishment, \"You joined in a charge?  That was exceeding your orders, considerably.  And you failed in the one thing I did order you to do.  I had hoped you might have more discipline than the privates, but it seems I was mistaken.\"  \n    #\"I saw nothing of note that needed to be relayed to you at once.  \n      Willcox shakes his head, \"I send you forward with clear orders and you decide to play the tomfool.  I will entrust the job to someone who is more reliable, next time.\"  \n    #\"My apologies.  No excuse, Sir.\"  \n      Willcox shakes his head, \"I send you forward with clear orders and you decide to play the tomfool.  I will entrust the job to someone who is more reliable, next time.\"\n  *gosub trial_end\n  *if attack = \"left\"\n    The Colonel sighs, \"Well, it cannot be helped.  General McDowell has arrived to take command of the battlefield.  We are ordered into the left of the line with Franklin's brigade.  As you can see, I only have the one regiment here.  The others fell behind due to exhaustion, but I've left Ward in command for the time being.  They should arrive soon after we do.\"  \n  *if attack = \"center\"\n    The Colonel sighs, \"Well, it cannot be helped.  General McDowell has arrived to take command of the battlefield.  We are ordered into the center of the line with Franklin's brigade.  As you can see, I only have the one regiment here.  The others fell behind due to exhaustion, but I've left Ward in command for the time being.  They should arrive soon after we do.\"  \n  *if attack = \"right\"\n    The Colonel sighs, \"Well, it cannot be helped.  General McDowell has arrived to take command of the battlefield.  We are ordered into the right of the line with Franklin's brigade.  As you can see, I only have the one regiment here.  The others fell behind due to exhaustion, but I've left Wa
