 sweep your blade down, but the bearded man raises his musket above his head, and your strike is bluntly stopped by the wooden stock of his weapon.  You pull back your saber and feint another overhand attack, but you switch to a weak sideways slash that drags along his ribcage and tears a wide gash in his tan coat.  He cries with pain and his right arm seizes the injured place in shock.  The Union man on your left takes advantage of the rebel's lowered guard and stabs his bayonet home in his belly, twisting the blade, and pulling it free.  The rebel crumples to the ground, totally destroyed.  \n          *goto juliet\n  #Stay back and observe the battle.  \n    You try to maintain your perspective by holding back from the fight, keeping an eye out for any significant changes.  On the left, Franklin's Brigade is attacking the farmhouse, firing through windows and trying to get around to the door.  On the right, Porter's men are slamming into the defending lines like waves upon rock, the unrelenting tide of men rising further with each attack.  \n    \n    A man is running toward you.  One of your own privates running away from the furious battle line.  He is looking over his shoulder as he runs and does not see you.\n    *choice\n      #Chase him back to the front line.  \n        \"Halt!  Get back in line!  You coward!\"  You push the frightened man back toward the others and he falls over.  \"Get back up there or I'll have you court martialed and hanged for cowardice!  Move it!\"  The man gets to his feet and turns back to the battle.  He rejoins the back of the line, but seems reluctant to get into the fight.\n        *goto juliet\n      #Hit him.  \n        *if sword = \"yes\"\n          You wait until he is near you, then you strike him in the face with the handle of your saber.  He falls backward, clotheslined by the unexpected blow.  \"Get back in line or I'll skewer you right here, you coward!\"  The man's bruised face is filled with terror as he crawls away from you, then he rises to his feet and turns back to the battle.  He rejoins the back of the line, but seems reluctant to get into the fight.  \n          *goto juliet\n        *else\n          You wait until he is near you, then you punch him in the face with a gloved hand.  He falls backward, clotheslined by the unexpected blow.  \"Get back in line or I'll kill you right here, you coward!\"  The man's bruised face is filled with terror as he crawls away from you, then he rises to his feet and turns back to the battle.  He rejoins the back of the line, but seems reluctant to get into the fight.  \n          *goto juliet\n      #Kill him.  \n        *set regimental_strength -1\n        *set second_battalion -1\n        *if pistol = \"yes\"\n          You will make an example of the undisciplined coward.  Raising your pistol, you take aim and fire.  The man falls forward and somersaults a few times before coming to a stop behind you.  You notice a few men and officers looking in shock, but they turn immediately back to the enemy threat.  You have made your point.  \n          *goto juliet\n        *else\n          You will make an example of the undisciplined coward.  Raising your sword, you swing it in a broad, sweeping stroke, slashing the man's throat wide open with a red spurt of blood.  He falls backward and slides to a stop behind you.  You notice a few men and officers looking in shock, but they turn immediately back to the enemy threat.  You have made your point.  \n          *goto juliet\n      #Let him go.  \n        One coward will not make odds.  You ignore him and retain your focus.  \n        *set regimental_strength -1\n        *set second_battalion -1\n        *goto juliet\n*label juliet\nThe rebel line breaks before the roaring fury of the attackers.  A few muskets are discharged at their retreating backs, but most of your men cheer passionately, some waving their hats in the air.  \n*set fourth_alabama_morale -2\n*fake_choice\n  #\"Load!\"\n    Some of your men load while many more cheer foolishly in their undisciplined excitement.  \n  #\"Fire at will!\"\n    Some of your men fire a few lonely shots and some start loading, while many more cheer foolishly in their undisciplined excitement.  \n    *set fire_at_will +1\n  #\"Charge bayonets!  Forward!\"\n    A few dozen men fall into the charge bayonets position, but many more cheer foolishly in their undisciplined excitement, and the unit does not move forward.  \n  #\"Hip hip, huzzay!\"\n    Carried away with excitement, you cheer alongside your men.  \n    \n*if fourth_alabama_morale = 8\n  The rebels retreat about thirty yards up to the crest of the ridge.  Some of them keep running, but an officer rallies the majority of the regiment and they reform ragged lines to oppose you.  He is still wearing his U.S. Army blue coat, with Colonel's eagles on his epaulets.  \n  *goto golf\n*if fourth_alabama_morale \u003c 8\n  The rebels retreat about thirty yards up to the crest of the ridge.  Many of them keep running, but an officer rallies about half of the regiment and they reform ragged lines to oppose you.  He is still wearing his blue U.S. Army coat, with the Colonel's eagle on his epaulets.  \n  *goto golf\n*label golf\n*fake_choice\n  #\"Load, you goddamn fools!  Load your muskets!  The enemy is not yet beaten!\"  \n  #\"Rally, boys!  Rally again!  The enemy has reformed and we must drive him off!\"  \nHearing your voice, and harried by their officers, most of the men stop cheering and attend to their duty.  Cartridges and ramrods appear, and the men reform their lines.  The rebels are reloading as well.  \n\n\"Come on, boys!  Come on!\" shouts a familiar voice from up ahead on your left.  Colonel Willcox is standing in front of the Union line, pacing up and down and yelling.  \"Come on again, boys!  Let's drive 'em back again!  Give 'em the bayonet and send 'em to the devil!\"\n*choice\n  #Join him at the front.\n    You push between the lines of your battalion and raise your saber in the air.  \"Come on, lads!  let's drive them back to Carolina!  Battalion, forward!\"  \n    *set sword \"yes\"\n    *goto hotel\n  #Let him lead.\n    *goto india\n*label hotel\nWillcox continues to shout encouragement, and then the bugle calls out the order as well.  Charge!  The lines of men move forward slowly at first, and you take a few steps backward with your sword up.  Then they start to run, and you have to turn to avoid being bowled over.  Now you are charging straight into the rebel line!  Their muskets come up and their Colonel shouts the order, \"Fire!\"  You see the smoke pour out and feel the pressure of discharge like getting smacked by a door.  \n\nWarm liquid runs down your left leg, but you feel no pain from the bullet wound.  Now, you are engulfed in the smoke of the volley and there is no time to worry about anything.  You see the form of a man holding his bayonet forward like a spear, hoping a Union soldier will skewer himself on it in his haste.  You do not oblige him.  Sweeping the muzzle away to the left, you swipe your sword back with an offhand blow that gashes the man's elbow and causes him to drop the weapon.  \n\nYour eyes water from the smoke as you lunge at another soldier repeatedly, forcing him to step back and back, blocking your attacks with his musket stock.  A friendly sergeant on your right comes in growling like an angry dog, and swings his musket overhand like a sledgehammer.  It hits the man's hat squarely and you hear a sickening crunch as it breaks his skull.  \n\nA man just before you raises his pistol and fires, killing the Union sergeant.  In his right hand is a saber, and he wears a blue coat.  It is the rebel Colonel that you saw leading the defense.  He is a middle-aged man with a noble, shaven face.  His eyes meet yours and he flourishes his sword with practiced ease in a gentlemanly challenge.  \n*set regimental_strength -10\n*set first_battalion -5\n*set second_battalion -5\n*set fourth_alabama_morale -1\n*set officers -1\n*choice\n  #Accept the duel.\n    Raising your sword, you step forward and strike his outstretched blade in ascent.  He steps back with rapidity and then lunges at your groin.  Your own blade instinctively sweeps down to block the attack and he pulls it back, instead stabbing upward toward your throat.  \n    *achieve duel\n    *choice\n      #Try to parry the blow.  \n        Your sword comes up and deflects his blade from piercing your throat, but the point slices your left cheek.  With a burning pain, you feel the blood dripping down your chin.  \n        *set cheek_wound \"yes\"\n        *goto duel\n      #Dodge to one side and try to stab him.  \n        Stepping to the left, his blade misses your throat, but he swipes it sideways and you barely have time to parry, let alone attack.  \n        *goto duel\n      #Step back.  \n        Stepping back, his blade swipes harmlessly in front of your face.  He advances again and this time he swipes at your left with a sweeping curve.  Your sword arm comes up and you block the powerful stroke, feeling a jarring pain in your hand as the force travels up the blade into your arm.  \n        *goto duel\n  #Decline the duel.\n    You lower your sword and take a few steps backward.  His expression changes from aloof to anger, and with one motion he aims his pistol at you and fires.  You feel an immense pain in your neck as you fall backwards in the grass.  Your hands clutch at the wound and feel the thick, hot blood spurting out.  It isn't long before you black out and pass away, unseen among the dead and the wailing injured.\n    *ending\n  *if pistol = \"yes\"\n    #Shoot him with your pistol.\n      Your left arm comes up and points right at his chest.  Bang!  The pistol kicks back and through the plume of smoke, you see your target drop to a knee.  He tries to prop himself up with the saber, but the tip sinks into the dirt of the road and then he is kicked backward by an angry Union private.  The 1st $!{state} roars as they see the enemy line start to buckle, and they push forward again with fury.  The rebel line breaks and they run for the fence line behind them on the left.  \n      \n      This time, your men issue no cheer.  They have seen the terrible cost of battle and they are discovering that it is not so easily won.  Some few men fire at the retreating enemy, while others load, and still more stand there in confusion or dig through the pockets of the dead and wounded.  \n      *set fourth_alabama_morale -3\n      *set colonel \"down\"\n      \n      *goto lima\n\n\n\n*label duel\n*choice\n  #Try to draw him in so your men can help you.  \n    Instead of being aggressive, you prepare to parry his next strike.  Now it comes; a diving lunge toward your belly.  You take a step back and knock the blade away.  You regain your footing with another step backward, and the Colonel advances to stay with you.  He does not strike, waiting for you to make a move.  You oblige him, making a feeble attempt at an overhand swipe.  He knocks your blade away disdainfully and remains in a defensive pose.  \n    \n    This time you attack in earnest to show him that you are willing to fight.  You lunge forward aggressively to stab him in the groin.  He sweeps your blade around in a circle, leaving your defenses open.  Back, back you step, narrowly avoiding another stab at your throat.  You swing your sword across your body to block his second lunge, and the blades clang together furiously.  Then, a Union private stabs at him from your right with a bayonet.  The Confederate Colonel looks angry as he deflects the musket and slashes the leg of the poor man on his backstroke.  \n    *set regimental_strength -1\n    *set second_battalion -1\n    *choice\n      #Now.  Kill him.  \n        Seeing him off balance, you step aggressively forward and slash with a backhanded stroke of your own.  The razor sharp blade opens his belly and his guts spill out through the torn blue coat.  He stands another second, balancing, as if he can continue to fight.  But it will not do.  He falls on his back in the dirt of the road, the blood pouring out around him.\n        \n        The 1st $!{state} roars as they see the enemy line start to buckle, and they push forward again with fury.  The rebel line breaks and they run for the fence line behind them on the left.  \n        *set fourth_alabama_morale -3\n        *set colonel \"down\"\n        *goto kilo\n  #Fight fairly on his ground.  \n    You go on the offensive, making two ineffective feeble attacks to test his guard.  Then he sweeps his sword aggressively, catching your blade and sweeping it in a circle.  With shock, you feel the handle rip free from your grip and the point of his sword at your throat.  He looks into your eyes, showing no emotion in his victory.  But then he glances left and right and sees his regiment crumbling away, retreating back to the fence line on the left.  He makes eye contact again, nods, then removes the blade and turns away to pursue his retreating unit.  \n    *choice\n      #Recover yourself and look around you.\n        *set fourth_alabama_morale -1\n        *goto kilo\n      *if pistol = \"yes\"\n        #Shoot him in the back.\n          Raising your pistol in embarrassed fury, you point it between his shoulder blades and fire.  Through the smoke, you see him fall like a rag doll, skidding in the grass.  \n          *set fourth_alabama_morale -2\n          *set colonel \"down\"\n          *goto kilo\n*label india\nWillcox continues to shout encouragement, and then the bugle calls out the order as well.  Charge!  The lines of men move forward slowly at first, then they start to run.  You follow the line as they roar in unified challenge to the defenders.  As you charge the rebel line, you see their muskets come up for a volley.  You raise your left arm over your head instinctively, as if to ward off a blow.  Through squinted eyes you see the smoke pour out, and you feel the shock wave of the volley, somewhat diminished by the ranks of men in front of you.  \n\nSome men in the front fall wounded, and more trip on their bodies.  You feel warm liquid running down your left leg, but you do not feel the pain of the bullet wound.  Now, you are engulfed in the smoke of the volley and there is no time to worry about it.  Your eyes water as you look between the shoulders of your men and see the brutal clash at the front.  Bayonets stabbing and muskets used as clubs, swung with terrible force.  The air is pervaded with shouts, grunts, and screams, overlaying the clinking of metal on metal and the occasional musket discharge.  \n\n\"Drive them back, boys!  Come on!  Attack!\" you shout, urging the men forward to victory.  You can see the rebel Colonel in the U.S. Army coat, standing in the middle of his line and fighting with a Union Sergeant.  He is a middle-aged man with a noble, shaven face.  His saber sweeps in elegant curves, and he shows easy grace as he disarms the sergeant and then drives the blade into his heart.  \n*set regimental_strength -10\n*set first_battalion -5\n*set second_battalion -5\n*set fourth_alabama_morale -1\n*set officers -1\n*choice\n  #\"Men, kill that officer!  Kill the traitor!\"  \n    Two men hear you through the roaring din and advance at the officer with bayonets.  \"Come on, then!\" yells the Confederate Colonel in his southern accent.  The right man lunges with the bayonet which the Colonel parries aside with his sword.  The left man then takes his chance, but the sword comes back and slashes him in the face.  As he falls away, you see the colonel stagger.  The man's bayonet went home in his side, and he tries to pull it out, but has to block the second lunge of the first Union man.  \n    \n    The blade in his side slides free and his face clenches with agony as he tumbles backward.  Two rebels grab him and drag him back away from the fight.  And now, the whole rebel regiment is retreating.  \n    *set regimental_strength -1\n    *set second_battalion -1\n    *set fourth_alabama_morale -3\n    *goto kilo\n  *if pistol = \"yes\"\n    #Try to shoot him with your pistol.  \n      Lifting your arm, you try to point the weapon between the shifting rows of soldiers to your target.  The Reb Colonel is clashing his sword against a Union musket and driving the man backward.  You cock the six-shooter and as if he could hear it through the roar of battle, the man looks right at you and his mouth opens slightly.  \n      \n      Bang!  The pistol kicks back and through the plume of smoke, you see your target drop to a knee.  He tries to prop himself up with the saber, but the tip sinks into the dirt of the road and then he is kicked backward by the angry Union private who came so close to death by his hand.  The 1st $!{state} roars as they see the enemy line start to buckle, and they push forward again with fury.  The rebel line breaks and they run for the fence line behind them on the left.  \n      *set fourth_alabama_morale -3\n      *goto kilo\n  #\"Forward, boys!  Drive them back!\"  \n    The men around you cheer and try to push forward through the throng of stabbing blades and screaming, angry faces.  The Reb Colonel is holding his own, fending off two attackers with his sword.  The rest of his regiment is backing up, however.  The 1st $!{state} roars as they see the enemy line start to buckle, and they push forward again with fury.  The rebel line breaks and they run for the fence line behind them on the left.  Their Colonel follows them and your men again hold the ground.  \n    *set fourth_alabama_morale -1\n    *goto kilo\n*label kilo\n*comment you fought the colonel and survived.  His men are running for the fence line\nThis time, your men issue no cheer.  They have seen the terrible cost of battle and they are discovering that it is not so easily won.  Some few fire at the retreating enemy while others load.  Still more stand there in confusion, or dig through the pockets of the dead and wounded.  \n*if colonel = \"down\"\n  \n  You look down at the Rebel Colonel, lying in a growing pool of blood.  There is blood on his lips as he looks back at you and mouths something.  You lean down slightly and he repeats himself.  \"Well done, suh.\"\n  *choice\n    #\"You fought bravely, Colonel.  Lay easy.\"\n      \"I have… I have done my duty,\" he replies in his southern accent.  \n      *goto lima\n    #\"What is your name?\"\n      \"Colonel Jones… Four… Fourth Alabama Infantry.  What is your name, suh?\"\n      *choice\n        #\"Major $!{surname}.  First $!{state} Volunteer Infantry.  \n          \"Ve- very good, thank you.\"  \n          *goto lima\n    #Kill him.\n      You stab your sword blade into his throat contemptuously.  The man chokes and blood squirts out of his neck, then the life drains from his eyes.  \n      *goto mike\n*else\n  *goto mike\n*label lima\n*fake_choice\n  #\"You two men, take this officer to the field hospital.\"  \n    \"Yes, Sir!\"  The two privates look grateful to be ordered away from the battle, and they take the officer with great zeal back down the ridge.  \n  #Leave him.\n*label mike\n\nAs sense and rationality return to your excited mind, you remember the feeling of warm liquid that is running down your left leg and into your boot.  You look fearfully down at your pant leg and feel gently for the wound.  But then you see that the leg is not red with arterial blood; it is simply wet as if with water.  You stand dumbfounded for a moment before seizing your canteen.  There is a hole punched right through it, with the metal splayed out on the back from the force of the musket ball exiting.  Your fears of a mortal wound subside, and you look back to the battle. \n\nThe two shattered rebel regiments are reforming behind the fence, running at a diagonal back along the crest of the ridge from the farmhouse.  \n*set canteen \"hit\"\n*if surname = \"Spears\"\n  *image center3.1.png\n  *set map_trigger \"center3.1\"\n  *goto image3\n*if surname = \"Weber\"\n  *image center3.2.png\n  *set map_trigger \"center3.2\"\n  *goto image3\n*if surname = \"Clark\"\n  *image center3.3.png\n  *set map_trigger \"center3.3\"\n  *goto image3\n*if surname = \"Wilkerson\"\n  *image center3.4.png\n  *set map_trigger \"center3.4\"\n  *goto image3\n*if surname = \"Morse\"\n  *image center3.5.png\n  *set map_trigger \"center3.5\"\n  *goto image3\n*if surname = \"Dietrich\"\n  *image center3.6.png\n  *set map_trigger \"center3.6\"\n  *goto image3\n*if surname = \"Murphy\"\n  *image center3.7.png\n  *set map_trigger \"center3.7\"\n  *goto image3\n*if surname = \"Auclair\"\n  *image center3.8.png\n  *set map_trigger \"center3.8\"\n  *goto image3\n*else\n  *image center3.9.png\n  *set map_trigger \"center3.9\"\n  *goto image3\n*label image3\n*if colonel = \"alive\"\n  The Reb Colonel is rallying his men again.  They seem hesitant, but they begin to load.  Some of Franklin's Brigade has got into the farmhouse, and now they are firing down on the remaining Confederates from the second story windows.  It seems to be an untenable position without reinforcement, but they are holding nonetheless.  They fire a ragged volley and a few of your men drop.  \n  *set regimental_strength -5\n  *set first_battalion -4\n  *set second_battalion -1\n  \n  *goto november\n*else\n  The rebels seem confused and disorganized but some of them are loading their muskets.  \n  *goto november\n*label november\nThen, behind the rebel lines, you hear the roar of the two howitzers as they go off in unison.  But this time, they fire cannister shot directly into the rear of the rebel line!  The men in the direct path are ripped to bloody shreds, while others fall with only a single one inch bullet wound.  The \n*if state = \"Massachusetts\"\n  other \nMassachusetts regiments must have taken the guns and turned them on the remaining rebels!  Part of the fence splinters as it is struck by the balls after they pass through the men.  \n\nTo the rebels, this is the last straw.  Almost in a whole group, they turn and run.  \n*fake_choice\n  #\"Aim!  Fire!\"\n    Your men have loaded, and now they fire into the scattering herd of enemies.  \n  #\"Hold fire!\"\n    A few muskets go off, but most of the battalion waits.  \nColonel Willcox is jogging toward you now along the line.  \"Move forward and make sure those people do not reform!  Move to the edge of the ridge and no further.  Find a defensive position and wait for orders.  General McDowell has sent for me.  I will return to you as soon as I may.\"  A smile breaks out on his face and he takes your hand, shaking it vigorously.  \"God bless us, Major!  A hard morning's labor, but it was well done.  Carry on.\"  \n*page_break\n*goto_scene ridge", "choicescript_description": "Lead your troops in desperate, brutal Civil War combat!  Fight to end slavery and preserve the Union!  Earn promotion through impetuous bravery or tactical brilliance.  Stand in the battle line or fix bayonets!  \n\n[i]First Bull Run[/i] is an 88,000-word interactive novel by Dan Rasmussen. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nThe fledgling Union Army is yet to meet the Confederates in a major battle.  The north expects a swift and decisive victory, but they are overconfident.  They will soon discover the brutal, drawn-out nature of industrial warfare.  \n\nAs a regimental commander in the Union Army, you must navigate a series of desperate decisions to keep your men alive and prevent military disaster.  Face down howling artillery shells, massive musket volleys, and vicious hand to hand combat with bayonets and sabers.  \n\nServe alongside the real officers and regiments who fought at First Bull Run in this historically accurate depiction of the battle.  Manage twelve real subordinate officers who live or die by your decisions!  Will you capture howitzers and turn them on the enemy, or storm their positions with infantry?  Will you deploy your companies as skirmishers or concentrate your forces for the attack?  \n\n• Customize your character with 30 portraits and 4 distinct backstories--professional soldier, political leader, German revolutionary, or Irish nationalist.\n• Personalize your regiment to be from any of 21 different states and territories, all chosen based on historical research.\n• Guide the army with a plan of attack.  Support exhausted units, try to outflank the enemy, or charge up the middle.\n• Balance multiple priorities while under enemy fire.  Face real consequences: mistakes will cost lives.  \n• Keep track of your regiment with a detailed, highly interactive stats screen.  Watch your battalions lose strength with each volley you receive, and see junior officers step up to fill the roles of killed or wounded superiors.  \n• Attack aggressively or outthink your enemy.  Tailor your strategy to the situation.  Shoot morale-breaking volleys, fire at will for maximum damage to personnel, or fix bayonets and charge the enemy.  \n• Select companies to deploy as skirmishers.  Split your battalions and delegate command to a subordinate or concentrate your forces for greater strength.  \n\nCan you do what it takes to turn the tide of battle and keep your soldiers alive?\n\n[b]CONTENT WARNING:[/b] This game is set during the American Civil War. It contains racist language and graphic descriptions of torture and of human and animal injury and death.\n", "choicescript_stats": "*label start\nMajor $!{first_name} $!{surname}\n*line_break\n$!{background} from $!{state}\n*line_break\n—————\n*line_break\n1st $!{state} Volunteer Infantry Regiment:\n*line_break\nOfficers: ${officers}\n*line_break\nEnlisted men: ${regimental_strength}\n*line_break\n*if regimental_commander = \"Col. Orlando Willcox\"\n  *image willcox_mini.png left\n  *goto alpha\n*if portrait = \"b1\"\n  *image portrait_b1_mini.png left\n*if portrait ry_hill3.5.png\n      *if map_trigger = \"henry_hill3.6\"\n        *image henry_hill3.6.png\n      *if map_trigger = \"henry_hill3.7\"\n        *image henry_hill3.7.png\n      *if map_trigger = \"henry_hill3.8\"\n        *image henry_hill3.8.png\n      *if map_trigger = \"henry_hill3.9\"\n        *image henry_hill3.9.png\n      *if map_trigger = \"frontal_attack1.1\"\n        *image frontal_attack1.1.png\n      *if map_trigger = \"frontal_attack1.2\"\n        *image frontal_attack1.2.png\n      *if map_trigger = \"frontal_attack1.3\"\n        *image frontal_attack1.3.png\n      *if map_trigger = \"frontal_attack1.4\"\n        *image frontal_attack1.4.png\n      *if map_trigger = \"frontal_attack1.5\"\n        *image frontal_attack1.5.png\n      *if map_trigger = \"frontal_attack1.6\"\n        *image frontal_attack1.6.png\n      *if map_trigger = \"frontal_attack1.7\"\n        *image frontal_attack1.7.png\n      *if map_trigger = \"frontal_attack1.8\"\n        *image frontal_attack1.8.png\n      *if map_trigger = \"frontal_attack1.9\"\n        *image frontal_attack1.9.png\n      *if map_trigger = \"flank1.1\"\n        *image flank1.1.png\n      *if map_trigger = \"flank1.2\"\n        *image flank1.2.png\n      *if map_trigger = \"flank1.3\"\n        *image flank1.3.png\n      *if map_trigger = \"flank1.4\"\n        *image flank1.4.png\n      *if map_trigger = \"flank1.5\"\n        *image flank1.5.png\n      *if map_trigger = \"flank1.6\"\n        *image flank1.6.png\n      *if map_trigger = \"flank1.7\"\n        *image flank1.7.png\n      *if map_trigger = \"flank1.8\"\n        *image flank1.8.png\n      *if map_trigger = \"flank1.9\"\n        *image flank1.9.png\n      *choice\n        #Go back.\n          *goto start\n  #View Union order of battle.\n    *goto order_of_battle\n*label order_of_battle\n*image union_order_of_battle.png\nArmy of Northeastern Virginia\n\nBrigGen. Irvin McDowell, Commanding.\n\nFirst Division\n*line_break \nBrigGen. Daniel Tyler\n\nSecond Division\n*line_break\nCol. David Hunter\n\nThird Division**\n*line_break\nCol. Samuel P. Heintzelman\n\nFifth Division\n*line_break\nCol. Dixon S. Miles\n*choice\n  #Irvin McDowell\n    *goto mcdowell\n  #Expand First Division\n    *goto first_division\n  #Expand Second Division\n    *goto second_division\n  #Expand Third Division**\n    *goto third_division\n  #Expand Fifth Division\n    *goto fifth_division\n*label mcdowell\n*image mcdowell.png\nBrigadier General McDowell is an Ohio man and career army officer who served in the Mexican War.  He was recently chosen to lead the volunteer Army of Northeastern Virginia.  He has yet to earn the respect and trust of the men.  \n*choice\n  #Go Back.\n    *goto order_of_battle\n*label first_division\nFirst Division\n\nBrigGen. Daniel Tyler, Commanding.\n\nFirst Brigade\n*line_break\nCol. Erasmus Keyes\n\nSecond Brigade\n*line_break\nBrigGen. Robert Schenck\n\nThird Brigade\n*line_break\nCol. William T. Sherman\n\nFourth Brigade\n*line_break\nCol. Israel B. Richardson\n*choice\n  #Daniel Tyler\n    *goto tyler\n  #Expand First Brigade\n    *goto first_brigade1\n  #Expand Second Brigade\n    *goto second_brigade1\n  #Expand Third Brigade\n    *goto third_brigade1\n  #Expand Fourth Brigade\n    *goto fourth_brigade1\n  #Go back.\n    *goto order_of_battle\n*label tyler\n*image tyler.png\nBrigadier General Daniel Tyler is a Connecticut man of nearly retirement age.  He served in the army earlier in the century, but resigned some twenty five years ago and became president of a railroad company.  \n*choice\n  #Go Back.\n    *goto first_division\n*label first_brigade1\nFirst Brigade, First Division\n\nCol. Erasmus Keyes, Commanding.\n\n1st Connecticut\n*line_break\nLtc John Speidel\n\n2nd Connecticut\n*line_break\nCol Alfred H. Terry\n\n3rd Connecticut\n*line_break\nCol John L. Chatfield\n\n2nd Maine\n*line_break\nCol Charles D. Jameson\n*choice\n  #Erasmus Keyes\n    *goto keyes\n  #Go Back\n    *goto first_division\n*label keyes\n*image keyes.png\nErasmus Keyes is a career artillery officer from Maine.  He served in the Mexican War and distinguished himself in the Puget Sound War and the Coeur d'Alene War.  \n*choice\n  #Go Back\n    *goto first_brigade1\n*label second_brigade1\nSecond Brigade, First Division\n\nBrigGen. Robert Schenck, Commanding.\n\n2nd New York Militia\n*line_break\nCol. George Tompkins\n\n1st Ohio\n*line_break\nCol. Alexander McCook\n\n2nd Ohio\n*line_break\nLtc. Rodney Mason\n\n1st U.S. Artillery, Company G (Second Section)\n*line_break\nLt. Peter C. Hains\n\n2nd U.S. Artillery, Company E\n*line_break\nCpt. James H. Carlisle\n*choice\n  #Robert Schenck\n    *goto schenck\n  #Go Back\n    *goto first_division\n*label schenck\n*image schenck.png\nRobert Schenck is an Ohio politician and long time opponent to slavery.  \n*choice\n  #Go Back\n    *goto second_brigade1\n*label third_brigade1\nThird Brigade, First Division\n\nWilliam T. Sherman, Commanding.\n\n13th New York\n*line_break\nCol. Isaac F. Quinby\n\n69th New York\n*line_break\nCol. Michael Corcoran\n\n79th New York\n*line_break\nCol. James Cameron\n\n2nd Wisconsin\n*line_break\nLtc. Henry W. Peck\n\n3rd U.S. Artillery, Company E\n*line_break\nCpt. Romeyn B. Ayres\n*choice\n  #William Sherman\n    *goto sherman\n  #Go Back\n    *goto first_division\n*label sherman\n*image sherman.png\nWilliam T. Sherman is an Ohio born career army officer who served in the Seminole War.  He later resigned his army commission and became a banker in California.  He was appointed to Colonel in the wake of the armed rebellion.\n*choice\n  #Go Back\n    *goto third_brigade1\n*label fourth_brigade1\nFourth Brigade, First Division\n\nCol Israel B. Richardson, Commanding.\n\n1st Massachusetts\n*line_break\nCol Robert Cowdin\n\n2nd Michigan\n*line_break\nMaj Adolphus W. Williams\n\n3rd Michigan\n*line_break\nCol Daniel McConnell\n\n12th New York\n*line_break\nCol Ezra L. Walrath\n\n1st United States Artillery, Company G (First Section)\n*line_break\nLt John Edwards, Jr.\n\n2nd United States Artillery, Company M\n*line_break\nCpt Henry J. Hunt\n\n*choice\n  #Israel B. Richardson\n    *goto richardson\n  #Go Back\n    *goto first_division\n*label richardson\n*image richardson.png\nIsrael B. Richardson is an experienced veteran of the Seminole War and the Mexican War.  He earned the nickname of \"Fighting Dick\" while serving in Mexico.  \n*choice\n  #Go Back\n    *goto fourth_brigade1\n\n\n\n\n\n\n\n*label second_division\nSecond Division\n\nCol. David Hunter, Commanding.\n\nFirst Brigade\n*line_break\nCol. Andrew Porter\n\nSecond Brigade\n*line_break\nCol. Ambrose Burnside\n*choice\n  #David Hunter\n    *goto hunter\n  #Expand First Brigade\n    *goto first_brigade2\n  #Expand Second Brigade\n    *goto second_brigade2\n  #Go Back\n    *goto order_of_battle\n*label hunter\n*image hunter.png\nDavid Hunter is a New Yorker and an experienced army veteran.  He is also a close ally to the Lincoln administration and is known for having strong anti-slavery views.  His high rank is often attributed to his connection to the administration.  \n*choice\n  #Go Back\n    *goto second_division\n*label first_brigade2\nFirst Brigade, Second Division.\n\nCol. Andrew Porter, Commanding.\n\n8th New York Militia\n*line_break\nCol George Lyons\n\n14th New York Militia\n*line_break\nCol Alfred M. Wood \n\n27th New York\n*line_break\nCol Henry W. Slocum \n\nUnited States Infantry Battalion \n*line_break\nMaj George Sykes\n\nUnited States Marine Corps Battalion\n*line_break\nMaj John G. Reynolds\n\nUnited States Cavalry Battalion\n*line_break\nMaj Innis N. Palmer\n\n5th United States Artillery, Company D\n*line_break\nCpt Charles Griffin\n*choice\n  #Andrew Porter\n    *goto porter\n  #Go Back\n    *goto second_division\n*label porter\n*image porter.png\nAndrew Porter is a Pennsylvania career military officer who served in the cavalry during the Mexican War.  \n*choice\n  #Go Back\n    *goto first_brigade2\n*label second_brigade2\nSecond Brigade, Second Division.\n\nCol. Ambrose Burnside, Commanding.\n\n2nd New Hampshire\n*line_break\nCol Gilman Marston \n\n71st New York\n*line_break\nCol Henry P. Martin\n\n1st Rhode Island\n*line_break\nMaj Joseph P. Balch\n\n2nd Rhode Island\n*line_break\nCol John S. Slocum\n\n2nd Rhode Island Battery\n*line_break\nCpt William H. Reynolds\n*choice\n  #Ambrose Burnside\n    *goto burnside\n  #Go Back\n    *goto second_division\n*label burnside\n*image burnside.png\nAmbrose Burnside is a modest, unassuming Rhode Island man of varied careers.  He was an army officer during the Mexican War before later inventing a cavalry carbine, running for a congressional seat, and working for a railroad.  \n*choice\n  #Go Back\n    *goto second_brigade2\n\n*label third_division\nThird Division.\n\nCol. Samuel P. Heintzelman, Commanding.\n\nFirst Brigade\n*line_break\nCol. William B. Franklin\n\nSecond Brigade**\n*line_break\nCol. Orlando B. Willcox\n\nThird Brigade\n*line_break\nCol. Oliver O. Howard\n*choice\n  #Samuel Heintzelman\n    *goto heintzelman\n  #Expand First Brigade\n    *goto first_brigade3\n  #Expand Second Brigade**\n    *goto second_brigade3\n  #Expand Third Brigade\n    *goto third_brigade3\n  #Go Back\n    *goto order_of_battle\n*label heintzelman\n*image heintzelman.png\nSamuel Heintzelman is a Pennsylvania native, and an old, experienced, career soldier.  He served in four wars, the Seminole War, the Mexican War, the Yuma War, and the Cortina Troubles.  \n*choice\n  #Go back\n    *goto third_division\n*label first_brigade3\nFirst Brigade, Third Division.\n\nCol William B. Franklin, Commanding.\n\n5th Massachusetts\n*line_break\nCol Samuel C. Lawrence \n\n11th Massachusetts\n*line_break\nCol George Clark, Jr.\n\n${minnesota_regiment}\n*line_break\nCol Willis A. Gorman\n\n1st United States Artillery, Battery I\n*line_break\nCpt James B. Ricketts\n*choice\n  #William B. Franklin\n    *goto franklin\n  #Go back\n    *goto third_division\n*label franklin\n*image franklin.png\nWilliam Buell Franklin is a Pennsylvanian career army officer.  He has been a military engineer for nigh on twenty years, seeing combat duty in the Mexican War.  \n*choice\n  #Go back\n    *goto first_brigade3\n*label second_brigade3\nSecond Brigade, Third Division.\n\nCol Orlando B. Willcox, Commanding.\n\n1st $!{state}**\n*line_break\nMaj $!{first_name} $!{surname}\n\n4th Michigan\n*line_break\nCol Dwight A. Woodbury\n\n11th New York\n*line_break\nCol Noah L. Farnham \n\n38th New York\n*line_break\nCol J. H. Hobart Ward\n\n2nd United States Artillery, Company D\n*line_break\nCpt Richard Arnold\n*choice\n  #Orlando B. Willcox\n    *goto willcox\n  #Go back\n    *goto third_division\n*label willcox\n*image willcox.png\nOrlando Willcox is your commanding officer.  Originally from Detroit, Michigan, Willcox has seen ten years of military service.  Graduating West Point in 1847, he served in the Mexican War and in various Indian conflicts.  He resigned from the army in 1857 to practice law, only to return to the army with the outbreak of rebellion.  \n*choice\n  #Go back\n    *goto second_brigade3\n*label third_brigade3\nThird Brigade, Third Division.\n\nCol Oliver O. Howard, Commanding.\n\n3rd Maine\n*line_break\nMaj Henry G. Staples\n\n4th Maine\n*line_break\nCol Hiram G. Berry\n\n5th Maine\n*line_break\nCol Mark H. Dunnell\n\n2nd Vermont\n*line_break\nCol Henry Whiting\n*choice\n  #Oliver Howard\n    *goto howard\n  #Go back\n    *goto third_division\n*label howard\n*image howard.png\nOliver Otis Howard is a career army ordinance officer from Maine.  He served in the Seminole War, during which he converted to evangelical Christianity.  He is now often ridiculed in the army for his devout religious piety.  He is also condemned by almost all elements of society for his radical egalitarian views.  He is known to be outspokenly in support of absolute racial equality, and even gender equality.  \n*choice\n  #Go back\n    *goto third_brigade3\n*label fifth_division\nFifth Division\n\nCol. Dixon S. Miles, Commanding.\n\nFirst Brigade\n*line_break\nCol. Louis Blenker\n\nSecond Brigade\n*line_break\nCol. Thomas A. Davies\n*choice\n  #Dixon Miles\n    *goto miles\n  #Expand First Brigade\n    *goto first_brigade5\n  #Expand Second Brigade\n    *goto second_brigade5\n  #Go back\n    *goto order_of_battle\n*label miles\n*image miles.png\nDixon Miles is an old infantry officer from Maryland who served in the Mexican War and numerous Indian conflicts.  \n*choice\n  #Go back\n    *goto fifth_division\n*label first_brigade5\nFirst Brigade, Fifth Division.\n\nCol Louis Blenker, Commanding.\n\n8th New York\n*line_break\nLtc Julius Stahel\n\n29th New York\n*line_break\nCol Adolph von Steinwehr\n\n39th New York\n*line_break\nCol Frederick G. D'Utassy\n\n27th Pennsylvania\n*line_break\nCol Max Einstein\n\n2nd United States Artillery, Company A\n*line_break\nCpt John C. Tidball\n\nBrookwood's New York Battery \n*line_break\nCpt Charles Brookwood\n*choice\n  #Louis Blenker\n    *goto blenker\n  #Go back\n    *goto fifth_division\n*label blenker\n*image blenker.png\nLouis Blenker is one of many prominent German revolutionary leaders who fought against the Prussian government and fled Europe after the failure of the 1849 revolution.  He has a reputation of fearlessness in battle.  He settled in New York upon emigrating.  \n*choice\n  #Go back.\n    *goto first_brigade5\n*label second_brigade5\nSecond Brigade, Fifth Division.\n\nCol Thomas A. Davies, Commanding.\n\n16th New York\n*line_break\nLtc Samuel Marsh\n\n18th New York\n*line_break\nCol William A. Jackson\n\n31st New York\n*line_break\nCol Calvin E. Pratt\n\n32nd New York\n*line_break\nCol Roderick N. Matheson\n\n2nd United States Artillery, Company G\n*line_break\nLt Oliver D. Greene\n*choice\n  #Thomas A. Davies\n    *goto davies\n  #Go back\n    *goto fifth_division\n*label davies\n*image davies.png\nThomas Davies is a New Yorker and a West Point graduate who served some years on the Wisconsin frontier before resigning his commission in 1831.  He was a civil engineer for ten years, followed by twenty years as a merchant.  \n*choice\n  #Go back\n    *goto second_brigade5\n*label end", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2025-01-09 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending", "flank": "*temp unit_size \"\"\n*temp flank_score \"0\"\n*set south_skirmishers \"no\"\n*achieve flank\n*if volleys > 2\n  *achieve volley\n*if fire_at_will > 2\n  *achieve fire_at_will\n*if backup_plan = \"none\"\n  *set unit_size \"regiment\"\n  *goto start\n*else\n  *set unit_size \"battalion\"\n  *goto start\n*label start\n\"Regiment, attention!  Right… face!\"  You shout the orders in a parade ground cadence.  \"Forward at quick time… march!\"  The regiment begins to march, the thudding of boots joining the rattle of the drum.  \n\nLooking over your shoulder, you see Ward's fresh New Yorkers following your unit.  Beyond them, you can see more units moving up the hill from Young's Branch.  They will have to do their best without you on the hill.  At least they will not need to contend with a surprise attack from their right flank.  \n\nMinutes pass as the march continues.  Off to the right are a thousand Union soldiers in complete disarray; the shattered units.  \n*if backup_plan = \"rescue\"\n  The time has come, and you shout the prepared order, \"Second Battalion, detach!\"  Captain Clarkson raises his sword in the air and shouts more orders, taking command of the second half of your forces.  They move off of the road and begin to form lines to drive the mass of demoralized men to the north and out of harm's way.  \n\nThe road is sloping downward, now, skirting along the western slope of Henry Hill to a low point where it is meets the curve of a little stream of water.  There is a ford that cuts through the water twice, marked with many old ruts from wagons and carts.  Around where the stream intersects with the road is the edge of a broad belt of trees that runs up the slope of a small little hill.  \n\n*if south_skirmish_company = \"A\"\n  *goto alpha\n*if south_skirmish_company = \"B\"\n  *goto alpha\n*if backup_plan = \"none\"\n  *goto alpha\n*goto bravo\n*label alpha\nYou cannot see any hostile units, so you decide to ask the officer who reported the flanking force.  \n*if south_skirmish_company = \"A\"\n  \"Lieutenant Fairbanks, \n*if south_skirmish_company = \"B\"\n  \"Lieutenant Griffith, \n*if south_skirmish_company = \"F\"\n  \"Captain Roberts, \n*if south_skirmish_company = \"G\"\n  \"Captain Abbott, \nwhere about did you see the enemy regiments?\"  \n\n\"Sir, it was west of the road, on the far side of that belt of trees.  As you see, the trees are rising up that slope.  The top of the hill is bald, grassy terrain, just behind them.  The enemy was forming lines there as if to attack.  They fired on my men, and we were forced to withdraw, having taken near a dozen casualties.\"  \n*label bravo\n*if surname = \"Spears\"\n  *image flank1.1.png\n  *set map_trigger \"flank1.1\"\n  *goto image1\n*if surname = \"Weber\"\n  *image flank1.2.png\n  *set map_trigger \"flank1.2\"\n  *goto image1\n*if surname = \"Clark\"\n  *image flank1.3.png\n  *set map_trigger \"flank1.3\"\n  *goto image1\n*if surname = \"Wilkerson\"\n  *image flank1.4.png\n  *set map_trigger \"flank1.4\"\n  *goto image1\n*if surname = \"Morse\"\n  *image flank1.5.png\n  *set map_trigger \"flank1.5\"\n  *goto image1\n*if surname = \"Dietrich\"\n  *image flank1.6.png\n  *set map_trigger \"flank1.6\"\n  *goto image1\n*if surname = \"Murphy\"\n  *image flank1.7.png\n  *set map_trigger \"flank1.7\"\n  *goto image1\n*if surname = \"Auclair\"\n  *image flank1.8.png\n  *set map_trigger \"flank1.8\"\n  *goto image1\n*else\n  *image flank1.9.png\n  *set map_trigger \"flank1.9\"\n  *goto image1\n*label image1\n*choice\n  #\"Let us move across the stream, then, and prepare to ambush them at the tree line.  It will give us more room to withdraw, if needed.\"  \n    *goto fight1\n  #\"Let us husband our strength and defend the north side of the creek.  It will act as a natural obstacle which they will have to cross.\"\n    *goto fight2\n\n*label fight1\n\"Shall I give the order, Sir?\" asks Captain Lum.  \"Yes, do so, Captain,\" you reply.  \n\n\"$!{unit_size}, halt!  Right face!  Left wheel at the quick step, march!\"  Captain Lum spits out the stream of orders, the body of men obeying each one in turn.  It strikes you as similar to the control of a captain over his ship, or a driver over his horse team.  There is something altogether empowering in watching such maneuvers done well, a certain precise, palpable strength.  \n\nThe ${unit_size} wheels around on its left axis until it is in line, facing the tree line.  \"Forward, march!\" calls Lum, and the ${unit_size} stops turning and marches forward as a line in the new direction.  \n\nThe troops move down a somewhat steep slope to the tiny creek.  Tall reeds grow along the banks of the stream.  Following them, you walk your horse through the slow moving water.  Now you are on the other side, climbing the gentle slope to the belt of trees.  On your left, Ward's 38th New York regiment keeps pace with you.  \n\n\"What's that?!  Sir, I see movement!\"  A private in the front row calls out.  \"Silence in the ranks!\" shout three sergeants at once.  The man was perhaps wrong to cry out, but as you squint your eyes you see that he was right.  The rebels can be seen weaving a path down through the forest.  In a few moments they will come out into the open.  \n\n\"$!{unit_size}, halt!\" you shout, squeezing your horse's flanks with your legs to bring the animal to a halt as well.  \"Present arms!  Shoulder arms!\"  The rebel line materializes out of the shade of the trees and they let out a shrill, screeching cry, unlike anything you have heard in your life.  It sounds like what you might expect to hear from an army of Hell, itself.  The hair on your neck stands up.  \n*choice\n  #Volley fire.\n    \"$!{unit_size}, volley fire at my command!  Ready, aim… fire!\"  The volley ripples out, and it deals serious damage at this close range.  The rebels are a mere fifty yards away.  On your left, the 38th New York fires its own volley into a second rebel regiment emerging from the trees.  \"Load!\"  \n    \n    You peer through the powder smoke at the enemy regiment ahead of you.  They look fresh and almost eager, leaving aside the bloody line of casualties you just created.  After commanding your own regiment all day, these fresh troops have a distinct appearance, different from the exhausted and dirty look of your own soldiers.  \n    \n    The rebel volley smacks hard, the erupting noise feeling like a slap in the face.  Something whizzes past your ear like a hornet, and you suppose you were mere inches away from a trip to kingdom come.  You pull your foot out of the stirrup and lower yourself to the ground, choosing not to tempt fate a second time.  Peering between the shoulders of your ranks, you can still see the enemy.  \n    \n    Looking at your own men, you see a ragged, disorganized loading process.  The men's movements are slower now with exhaustion, and some are forced to beg for cartridges from the man next to them.  Ammunition is running low.  Gradually, the movement of arms stops, as the slower men complete their loads and shoulder arms.  \"Ready, aim, fire!\"  This volley is more ragged than the first, but it does its job.  \n    *set volleys +1\n    *set flank_score +1\n    *goto charge1\n  #Fire at will.\n    \"$!{unit_size}, fire at will!\"  Each soldier takes aim and fires, the effect being a sort of prolonged volley.  It deals out serious damage to the enemy at this close range, as little as fifty yards between your lines.  On your left, the 38th New York fires a volley into a second rebel regiment emerging from the trees.  \n    \n    You peer through the powder smoke at the enemy regiment ahead of you.  They look fresh and almost eager, leaving aside the bloody line of casualties you just created.  After commanding your own regiment all day, these fresh troops have a distinct appearance, different from the exhausted and dirty look of your own soldiers.  \n    \n    The rebel volley smacks hard, the erupting noise like a slap in the face.  Something whizzes past your ear like a hornet, and you suppose you were mere inches away from a trip to kingdom come.  You pull your foot out of the stirrup and lower yourself to the ground, choosing not to tempt fate a second time.  Peering between the shoulders of your ranks, you can still see the enemy.  \n    \n    Looking at your own men, you see a disorganized loading process.  The men's movements are slower now with exhaustion, and some are forced to beg for cartridges from the man next to them.  Ammunition is running low.  The fastest men raise their muskets and fire a second time.  The pop of the muskets is sometimes accompanied by a collapsing enemy across the way.  \n    *set fire_at_will +1\n    *set flank_score +2\n    *goto charge1\n*label charge1\n\nYou shelter your eyes with a gloved hand and see the rebels fixing bayonets.  They are going to charge down into your lines.  \n*set regimental_strength -9\n*if unit_size = \"regiment\"\n  *set first_battalion -5\n  *set second_battalion -4\n*if unit_size = \"battalion\"\n  *set first_battalion -9\n*set officers -1\n*set lt_wounded_trigger2 \"yes\"\n*choice\n  #Hold our ground.\n    \"Fix bayonets!\" you scream, your vocal cords painful from overuse.  Your voice is probably louder than it sounds through all the ringing in your ears.  The men clumsily start to attach the blades to their muskets.  Some few who lost their bayonets raise their muskets like clubs or scavenge a replacement from the bodies of the dead and wounded.  \n    \n    You notice your right hand is shaking uncontrollably, but you seize it with the other hand to hold it still.  The enemy commander's voice carries through a lull in the gunfire, \"Foh Sath Carolina!  Charge!\"  The enemy lets out another inhuman howl, a harpy's cry that threatens to drown all reason amidst the fear it evokes.  The enemy is barreling down toward your lines.  \"Charge bayonets!  Brace!\"  The bugle and drum sound as if in defiance to the rebel yell.  \n    \n    The enemy line hits your own, bayonets of both sides sinking into flesh with the momentum of the strike.  Your own line buckles like a collapsing bridge, parts of the line giving back from the attack or simply being knocked backward down the slope to the stream.  The rear ranks of the line try to dig in their feet to hold up their unbalanced comrades.  \n    \n    The roar of fighting men and the clash of weapons pervades the air, the sounds overlapping each other to create a frenzied cacophony of anger and death.  Screams and shouts cut through the madness, overlapping each other.  \"Damnit!\"  \"Shit!\"  \"Die, you bastard!\"\n    \n    It cannot last.  Your exhausted line breaks and runs, and you go with them.  The men splash through the creek, the patches of reeds flailing left and right as they crash through them.  You run through the water, feeling it splashing into your boots.  \"$!{unit_size}, reform!  Reform!\"  You shout the words, and to your relief, you are obeyed.  Most of the men, at least, reform something like a line.  A dozen or so keep running, ignoring the angry shouts of their sergeants and officers.  You stand behind this new line, panting and wet.  \n    \n    The rebels did not pursue you across the stream, but stayed where they were to cheer their victory.  Now, they see that you are not going to run all the way back to Washington DC, and they start to reform lines, standing amidst the dead and wounded of the last fight.  They begin to load their weapons, a few men peppering you with independent fire.  \n    *set fix_bayonets +1\n    *set regimental_strength -21\n    *if unit_size = \"regiment\"\n      *set first_battalion -9\n      *set second_battalion -12\n    *if unit_size = \"battalion\"\n      *set first_battalion -21\n    *set flank_score +1\n    *goto fire2\n  #Withdraw behind the stream.\n    \"$!{unit_size}, withdraw!\"  The bugle pipes the order with a percussive trill of notes.  Your men abandon their positions and run for it, their strides wide as they run down the gentle slope to the stream bed.  They splash through the creek, the patches of reeds flailing left and right as they crash through them.  \n    \n    Behind you, the enemy lets out another inhuman scream, a harpy's cry that threatens to drown all reason amidst the fear it evokes.  Following your men into the stream, you feel the water splashing your pants and getting into your boots.  \"$!{unit_size}, reform!  Reform!\"  You shout the words, and to your relief, you are obeyed.  Most of the men, at least, reform something like a line.  A half dozen keep running, ignoring the angry shouts of their sergeants and officers.  You stand behind this new line, panting and wet.  \n    \n    The rebels did not pursue you across the stream.  Instead, they have stopped at the position you abandoned, standing amid the bloody dead and wounded from your previous line.  They begin to load their weapons, a few men peppering you with independent fire.  \n    *set regimental_strength -8\n    *if unit_size = \"regiment\"\n      *set first_battalion -2\n      *set second_battalion -6\n    *if unit_size = \"battalion\"\n      *set first_battalion -8\n    *set flank_score +2\n    *goto fire2\n*label fire2\n*choice\n  #Volley fire.\n    \"Volley fire at my command!  Load!\"  The men wearily begin to load their weapons again.  Some are begging for cartridges and finding nobody who can spare one.  This cannot last much longer.  Finally, a majority are standing at the ready.  \"Aim, fire!\"  The volley rips out, diminished but still potent.  If nothing else, the smoke will obscure your position enough to hinder the accuracy of the enemy.  \n    *set volleys +1\n    *set flank_score +1\n    *goto charge2\n  #Fire at will.\n    \"Fire at will!\"  Those who are ready raise their muskets and fire.  Some men are begging for cartridges while other seek replacement ramrods to load their own weapons.  This cannot last much longer, but for now the men ply their pieces as well as they can.  \n    *set fire_at_will +1\n    *set flank_score +2\n    *goto charge2\n*label fight2\n\"Shall I give the order, Sir?\" asks Captain Lum.  \"Yes, do so, Captain,\" you reply.  \n\n\"$!{unit_size}, halt!  Right face!  Left wheel at the quick step, march!\"  Captain Lum spits out the stream of orders, the body of men obeying each one in turn.  It strikes you as similar to the control of a captain over his ship, or a driver over his horse team.  There is something altogether empowering in watching such maneuvers done well, a certain precise, palpable strength.  \n\nThe ${unit_size} wheels around on its left axis until it is in line, facing the tree line.  \"Forward, march!\" calls Lum, and the ${unit_size} stops turning and marches forward as a line in the new direction.  \n\n\"Halt!\"  The troops stop about thirty yards short of the tiny creek.  Tall reeds grow along the banks of the stream.  On the far side of this water is a gentle slope climbing to the belt of trees.  To your left, Ward's 38th New York regiment halts and forms up on your flank.  \n\n\"What's that?!  Sir, I see movement!\"  A private in the front row calls out.  \"Silence in the ranks!\" shout three sergeants at once.  The man was perhaps wrong to cry out, but as you squint your eyes you see that he was right.  The rebels can be seen weaving a path down through the forest.  Now the line materializes out of the shade of the trees and lets out a shrill, screeching cry, unlike anything you have heard in your life.  It sounds like what you might expect to hear from an army of Hell, itself.  The hair on your neck stands up.  \n*choice\n  #Volley fire.\n    \"$!{unit_size}, volley fire at my command!  Ready!\" you scream at the top of your lungs.  \"Aim!\"  The muskets come up into shoulders with a clatter, followed by a breathless silence.  \"Fire!\"  The volley ripples out, musket balls snapping at the marching enemy line.  On your left, the 38th New York fires its own volley into a second enemy regiment emerging from the trees.  \"Load!\"  \n    \n    You peer through the powder smoke at the enemy regiment ahead of you.  They look fresh and almost eager, leaving aside the bloody line of casualties you just created.  After commanding your own regiment all day, these fresh troops have a distinct appearance, different from the exhausted and dirty look of your own soldiers.  \n    \n    The rebels halt a little over fifty yards away and shoulder muskets.  Their volley smacks hard, the erupting noise feeling like a slap in the face.  Something whizzes past your ear like a hornet, and you suppose you were mere inches away from a trip to kingdom come.  You pull your foot out of the stirrup and lower yourself to the ground, choosing not to tempt fate a second time.  Peering between the shoulders of your ranks, you can still see the enemy.  \n    \n    Looking at your own men, you see a ragged, disorganized loading process.  Their movements are slower now with exhaustion, and some are forced to beg for cartridges from the man next to them.  Ammunition is running low.  Gradually, the movement of arms stops, as the slower men complete their loads and stand ready.  \"Aim… fire!\"  This volley is more ragged than the first, but it does its job. \n    *set volleys +1\n    *set flank_score +1\n    *set regimental_strength -9\n    *if unit_size = \"regiment\"\n      *set first_battalion -5\n      *set second_battalion -4\n    *if unit_size = \"battalion\"\n      *set first_battalion -9\n    *set officers -1\n    *set lt_wounded_trigger2 \"yes\"\n    *goto charge2\n  #Fire at will.\n    \"$!{unit_size}, fire at will!\"  Each soldier takes aim and fires, the effect being a sort of prolonged volley.  The musket balls snap at the marching enemy line.  On your left, the 38th New York fires a volley into a second rebel regiment emerging from the trees.  \n    \n    You peer through the powder smoke at the enemy regiment ahead of you.  They look fresh and almost eager, leaving aside the bloody line of casualties you just created.  After commanding your own regiment all day, these fresh troops have a distinct appearance, different from the exhausted and dirty look of your own soldiers.  \n    \n    The rebel volley smacks hard, the erupting noise feeling like a slap in the face.  Something whizzes past your ear like a hornet, and you suppose you were mere inches away from a trip to kingdom come.  You pull your foot out of the stirrup and lower yourself to the ground, choosing not to tempt fate a second time.  Peering between the shoulders of your ranks, you can still see the enemy.  \n    \n    Looking at your own men, you see a disorganized loading process.  Their movements are slower now with exhaustion, and some are forced to beg for cartridges from the man next to them.  Ammunition is running low.  The fastest men raise their muskets and fire a second time.  The pop of the muskets is sometimes accompanied by a collapsing enemy across the way.  \n    *set fire_at_will +1\n    *set flank_score +2\n    *set regimental_strength -9\n    *if unit_size = \"regiment\"\n      *set first_battalion -5\n      *set second_battalion -4\n    *if unit_size = \"battalion\"\n      *set first_battalion -9\n    *set officers -1\n    *set lt_wounded_trigger2 \"yes\"\n    *goto charge2\n*label charge2\n\nThe rebels let out another terrible screeching howl as they charge bayonets.  The rows of glittering steel blades are pointed forward like spears.  \"Charge!\" shouts their officer, and they start to run forward, barreling toward the little stream that stands between you.  \n*choice\n  #Counter charge and meet them in the stream.\n    \"Bayonets!\" you shout.  This moment does not call for deliberation; it calls for swift and decisive action.  \"Forward at my command!  Pass the word along, forward at my command!\"  The leaders around you run down the line, relaying your order.  \"Charge!\"  Your men roar angrily in defiance of the rebel screech and start running forward toward the stream.  You follow them, sword in one hand and revolver in the other.  \n    \n    The drum rolls and the bugle trills.  Forward you go, to death or glory.  You are yelling incoherently, the adrenaline bubbling up over the surface.  Your eyes are fixed on the enemy, thousands of men rushing inexorably towards each other.  \n    \n    The two lines splash into the stream and hit each other with a force like two carriages slamming into each other at full speed.  Shouts of anger and pain lace the sound of clashing metal and splashing water.  You barely notice the water soaking your legs and dripping into your boots.  The men a few feet in front of you are fighting for their lives.  \n    \n    A rebel is struck by a musket butt and falls into a thick patch of reeds, splashing hard in the shallow water.  A Union Corporal takes a bayonet in his leg and falls half way down, the blood spurting out and into the sloshing water.  Enough men are going down that the blood is starting to show in the water, staining the pants of unheeding soldiers.  It is a furious contest, with blades and clubs clashing in desperate earnest.  \n    \n    The fresh troops have the advantage over your battered and exhausted volunteers.  Your men are dissolving around you, breaking out of the melee and laboring up the slope to escape.  Men fling down muskets and gear in their hurry to get away.  You catch of glimpse of Captain Charles Lum laying in the stream, blood running all over his coat from an unseen wound.  Another officer picks him up and throws him over his shoulders before running away.  \n    *set regimental_strength -12\n    *if unit_size = \"regiment\"\n      *set first_battalion -7\n      *set second_battalion -5\n    *if unit_size = \"battalion\"\n      *set first_battalion -13\n    *set officers -1\n    *set first_battalion_commander \"Vacant\"\n    *fake_choice\n      #\"Hold your ground!  Fight!\"  \n    It is no use.  The $!{unit_size} is crumbling.  A dozen men around you are still holding their ground and fighting, however.  You push forward to stand in the line beside them.  On your right is the regimental bugler, looking strange with a scavenged musket in his hands.  On your left is Sergeant Major Keating.  \n    \n    A rebel lunges at your with his bayonet.  You step back from the blade, raising your pistol and blowing his brains out.  You step forward and shoot two more rebels with the close range revolver.  Another man comes at you and you squeeze the trigger, but nothing happens.  You squeeze it two more times, and the third time it fires.  The powder must have gotten wet.  \n    \n    You have no time to ponder the wet pistol as another man swings a musket butt at your head.  You duck and manage to avoid it, and as you rise back up, you see the Sergeant Major's bayonet stab into the man's crotch.  The Sergeant twists the blade and extracts it, causing his victim to scream with pain.  You swipe downward with your sword on the next man, and hear a cracking sound as the blade breaks his shoulder.  \n    \n    The men around you are diminishing.  They are either stabbed or surrendered.  The bugler takes a blade in his unguarded side and collapses in the shallow water.  The rebels are behind you now, and you go back to back with the Sergeant Major, who discards his musket and pulls out his ceremonial sword.  \"Get that officuh, takem prisoner!\" shouts a southern voice from the circling crowd of enemies.  \n    \n    Two men come at you at once.  You parry one musket but the other one sinks into the left side of your torso.  The sharp pain causes you to stumble and slip in the muddy stream bed.  You fall on your back and hit your head, the water soaking you.  You sit up and shake your head, the water spraying off.  You see Sergeant Major Keating fighting desperately, slashing his blade across a soldier's neck so cleanly that it nearly decapitates him.  The hyenas are bound to bring down the lion in time, and as you watch, another man stabs him in the back as he recovers his stroke.  \n    \n    Now a rebel is seizing your coat, digging in your bloody jacket for valuables.  With your remaining strength, you bring your blade up and stab it into the man's belly, jabbing the point up under his ribs.  His eyes go wide and he gasps.  That is the last thing you see before a musket cracks down on your head and everything goes black.  \n    *set flank_score +2\n    *set regimental_strength -13\n    *if unit_size = \"regiment\"\n      *set first_battalion -9\n      *set second_battalion -4\n    *if unit_size = \"battalion\"\n      *set first_battalion -13\n    *set officers -2\n    *set lt_killed_trigger \"yes\"\n    *set e_company_commander \"Vacant\"\n    *choice\n      #Epilogue.\n        *goto_scene captured\n  #Shoot them as they cross.\n    \"Load and wait!\"  You shout the order and the bugler blows the call for cease fire.  The scraping sound of the ramrods in the barrels is the only sound from your ranks.  You can almost feel their anxiety at the sight of the screaming enemy charging.  \n    \n    \"Ready!\"  The rebels are almost into the stream, now.  Most of your own men have their reloads complete.  \"Aim!\"  The weapons come up and point forward at a somewhat downward angle to hit the stream below.  \"Aim low, boys,\" you say to those around you.  \n    \n    The Confederate line splashes into the water of the creek, stepping high to keep from being slowed.  \"Fire!\"  Your line erupts with fiery sparks and a pall of black smoke.  It lifts almost instantly in a light breeze and you see the enemy splashing and wallowing down there.  Many men in the front row fell in the water and tripped up those behind them.  You see men flailing arms and trying to pull themselves out of the morass.  At least, you think, many of them will have wet powder after that affair.  \n    \n    \"Charge bayonets!  Brace!\"  The rebels straggle out of the stream in clumps, many with soaked uniforms and wet, matted beards.  They have lost their momentum, but not all of their fury.  A few of your slower men fire into the enemy at this close range, but most of them are simply melee troops for the moment.  \n    \n    The rebels are reaching your line in clumps.  The Union boys stab down at them as they come up, some taking steps forward to strike at the sides of the rebel groups.  This does not last long, however, as the rest of the enemy regiment comes up.  Wet, bedraggled, and diminished, they are still fresh troops against your own tired ${unit_size}.  They scream, shout, and stab aggressively, driving the blue coats back and bringing them down.  \n    \n    The Union line breaks apart and runs backward, away from the brawl.  The rebels do not pursue at once, taking the moment to regroup and rest.  Ward's New Yorkers are still firing volleys against the other rebel regiment off to the left.  \n    *set volleys +1\n    *set flank_score +2\n    *set regimental_strength -10\n    *if unit_size = \"regiment\"\n      *set first_battalion -4\n      *set second_battalion -6\n    *if unit_size = \"battalion\"\n      *set first_battalion -10\n    *goto fight3\n  #Withdraw to the north.\n    \"$!{unit_size}, about face!\"  You have decided not to wait around for the rebels to attack you.  \"Forward at double quick time, march!\"  The men start forward at a jogging pace away from the enemy.  You jog along with them, feeling the burn in your legs.  You can only imagine how they must feel after marching all damned day.  \n    \n    The rebs splash into the stream, now quite far behind you.  Looking back, you see them pursuing your ${unit_size}, but they are not making much ground.  Ward's New Yorkers are firing volleys against the other rebel regiment off to the left.  His relatively fresh troops should last longer than yours would in a pitched battle.  \n    *set flank_score +1\n    *goto fight3\n*label fight3\nAfter a while, your men are panting and slowing down, so you call a halt.  \"Attention.  About face.  Load!\"  The men obey slowly, some clutching their knees from the uphill run.  The rebels have come to a stop as well, some 75 feet away, and are loading their weapons.  Your own troops are unusually still.  Only a few are loading their weapons.  The others are standing still or looking around, confused.  \"They are out of ammo, Sir,\" says Sergeant Major Keating.  \n    \nThe men who do have ammo raise their weapons and carefully take aim before firing.  Now, some more are loading again, with apparently a few cartridges that they must have squirreled away somewhere.  \n\nThe rebels raise their muskets and fire a volley back, but it seems weaker than the previous ones.  Some of the rebels are dead, and you suppose that still more have wet powder from crossing the stream.  Apparently, their officer decides that they have had enough rest, and he orders them to charge bayonets, again.  And here comes the shrill howl as they charge.  The men around you look your way with anxious expressions.  You hold their fates in the palm of your hand.  \n*set regimental_strength -6\n*if unit_size = \"regiment\"\n  *set first_battalion -3\n  *set second_battalion -3\n*if unit_size = \"battalion\"\n  *set first_battalion -6\n*choice\n  #Stand my ground.\n    Protecting the flank is more important than the integrity of one unit, even if that unit is your own.  \"Charge bayonets!\"  The ${unit_size} obeys reluctantly.  You step forward through the thin ranks and stand in the front line, a private on left and right.  You can see the whites of the enemies' eyes and the teeth in their screaming mouths.  Raising your pistol with your left hand, you fire three bullets into the men in front of you.  One by one, they drop out of the line like sacks, tripping the men behind them.  \n    \n    The rebels reach your line and hit hard, swinging and stabbing, trying to break past the bristling line of bayonets.  The line around you takes a step back and you take one step with them.  \"Hold your ground, $!{state}!\"  You fire point blank into the face of a screaming enemy with a long black beard.  Another stabs at you with his long bayonet.  You parry the musket down and his blade sinks into the grassy ground beneath you.  He loses his balance, leaning forward, and you bring the saber up to slash open his astonished face.  \n    \n    The Union line has held for nearly a minute, but it cannot last.  The exhausted, demoralized troops are disintegrating away to the north, throwing down muskets and gear as they go.  Out of the corner of your eye, you see Captain Charles Lum go down with a bayonet in his chest.  Another Union soldier picks him up, throws him over his shoulders, and takes off at a run.  \n    \n    A dozen Union men are still fighting around you, the sides of this line bending back until it forms a circle, surrounded on all sides.  You see the regimental bugler fighting with a musket until he is stabbed through the throat.  Another man is hit in the face with a musket butt and tumbles to the ground.  \n    \n    You have no time to think, as you find yourself pressed by enemies in front of you.  Beside you, Sergeant Major Keating is fighting with a musket and bayonet, swearing such a stream of curses unlike you have ever heard in your life.  With dulled astonishment, you see him take on two rebels at once, stabbing one with the bayonet and then abandoning the weapon to fight the second man with his hands.  He grabs the rebel's beard and headbutts him, then jabs him in the eyes with his empty hand.  \n    \n    As the enemy falls away, Keating draws his saber to keep on fighting, but the hyenas are bound to bring down the great lion in time.  The man in front of you slashes your leg open and knocks you onto your back.  Your head hits the ground and the sky seems to spin in front of your eyes.  In a moment's glance, you see a bayonet in the Sergeant Major's back, then another in the front.  \n    \n    The rebel who slashed you is on you now, digging in your coat with filthy hands.  He brings out your golden pocket watch with a whoop, but you have some strength yet.  With this last reserve, you drive your saber hard up into his belly and under his ribs.  he lets out a wide eyed gasp, but it is the last thing you see, as a musket butt comes down hard on your eyes and knocks you out cold.\n    *set flank_score +1\n    *set regimental_strength -13\n    *if unit_size = \"regiment\"\n      *set first_battalion -9\n      *set second_battalion -4\n    *if unit_size = \"battalion\"\n      *set first_battalion -13\n    *set officers -3\n    *set first_battalion_commander \"Vacant\"\n    *set lt_killed_trigger \"yes\"\n    *set e_company_commander \"Vacant\"\n    *if flank_score > 3\n      *set battle_outcome +3\n    *if flank_score \u003c 4\n      *set battle_outcome +2\n    *choice\n      #Epilogue.\n        *goto_scene captured\n  #Retreat.\n    \"$!{unit_size}, retreat!\"  The bugle and drum beat the call to retreat and the line obeys without a moment's hesitation.  You feel doubt tugging at your mind, nagging you for your choice, but the decision is made.  You can breathe easy for the moment.  And as you run north along with the panting troops, you admit that it was the only thing to do.  A fight here with exhausted men would be nothing more than honorable suicide.  The inhuman screams of the rebels pursue you as you run.  \n    \n    After a time that feels like forever, you give in to your burning leg muscles and stop.  The poor infantrymen around you are shaking their heads and falling on the ground from exhaustion.  \"$!{unit_size}, I know that you are tired.  If you follow me for a little while longer, I will lead you out of this battle and back to safety.\"  The men around you nod and say, \"Yes Sir.\"  \n    \n    You take the men north, back along the west side of Henry Hill.  There is some fighting off to the right over the old gun positions, but the Union forces seem to be severely diminished.  \n    *if backup_plan = \"rescue\"\n      Looking ahead, you recognize your own Second Battalion, still in formation and driving disordered groups of Union soldiers north across the stream.  Hopefully this contingency plan will help protect much of the Federal force from death and capture.  \n      *goto charlie\n    *else   \n      The shattered mass of troops is even greater than it was when you saw it last.  In a matter of minutes, the rebels will reach them, and you can only imagine the result.  \n      *goto charlie\n*label charlie\n\nAs you approach the stream, your formation breaks apart, and the men run forward to the water.  Some fill canteens while others get down on hands and knees to drink from the clear running stream.  A faint curl of dirt and blood runs downstream from the battered ${unit_size}.  \n*fake_choice\n  #Have my canteen filled.\n    \"Sergeant Major, be so kind as to refill my canteen.\"  The grizzled old NCO takes it, \"My pleasure, Sir.\"  You chug the cool water in one long series of gulps.  It runs down your throat with a sweet, cleansing feeling.  When you finally stop, the canteen is more than half empty.  \"I can fill her again, Major, if you please.\"  He chuckles and refills the canteen for you again.  \n  #Drink from the stream.\n    Your thirst has gotten the better of you.  In your mind, you have done enough to earn a moment of rest.  You go down on your knees in the stream and splash your face with the cool, refreshing water.  Then, you lower your face and guzzle the running water as if drinking right from a spout.  Lord, but it goes down well and refreshes you.  When you've had your fill, you top off the dry canteen and stand back up, dripping with fresh water.  \n*if flank_score > 3\n  *set battle_outcome +3\n*if flank_score \u003c 4\n  *set battle_outcome +2\n*page_break\n*goto_scene battle_conclusion", "frontal_attack": "*temp unit_size \"\"\n*temp bayonets \"no\"\n*set south_skirmishers \"no\"\n*set friendly_fire \"no\"\n*if volleys > 2\n  *achieve volley\n*if fire_at_will > 2\n  *achieve fire_at_will\n*if backup_plan = \"none\"\n  *set unit_size \"regiment\"\n  *goto start\n*else\n  *set unit_size \"battalion\"\n  *goto start\n*label start\nThe sound of musket fire is growing loud again as you order your men back into formation.  You ride down the line on a spare horse from one of Ward's staff.  Some of the men look up at you with a variety of expressions: apprehension, weariness, approval, or simply fear.  The ankles of their light blue pants are mostly spattered brown with dirt.  Many of them have dark red stains spattering or soaking parts of their uniforms; the marks of friends gone down.  Some quarter of them have thrown off their dark blue greatcoats and look like workmen in their shirts and suspenders.  \n\n\"Attention… regiment!\"  The boots thump down into place as they obey your command.  You smile inwardly.  They may be tired, but this body of men is still under your orders, and they will obey, if in their own lackluster way.  But another, darker thought enters your mind.  They seem so few compared to what they were this morning.  \n\nYour eye is drawn away from your own men by a roaring shout behind you.  Looking up to the top of the hill, you see the two Massachusetts regiments engaged in a brutal hand to hand clash with gray clad rebel troops.  As you watch, the blue coated Union ranks dissolve and run down the hill like a herd of a thousand deer.  Some throw aside muskets or packs as they scramble to get away from the bloody bayonets of the enemy.  The rebels on the hill cheer wildly and wave their hats in the air.  You grit your teeth at the sight of the gloating enemy.  \n*fake_choice\n  *if state = \"Massachusetts\"\n    #\"Our statesmen have fought well, but it will soon be our turn.\"  \n      \"Another opportunity to show our grit.\"  Captain Lum catches your eye and you see a weary smile showing through his thick, black beard.  You feel as if an unspoken understanding passes between you.  By now, you have both shared the terrible fear of combat, and you can find no pleasure in the notion of going up that hill again.  \n      *goto delta\n  *else\n    #\"Massachusetts fought well, but it will soon be our turn.\"  \n      \"Another opportunity to show our grit.\"  Captain Lum catches your eye and you see a weary smile showing through his thick, black beard.  You feel as if an unspoken understanding passes between you.  By now, you have both shared the terrible fear of combat, and you can find no pleasure in the notion of going up that hill again.  \n      *goto delta\n  #\"Damn these volunteer troops.  Can they not show the slightest backbone?!\"  \n    Captain Bowles shakes his head, \"Damn frustrating, if I may say so, Sir.\"  You catch his eye and a smile twitches at one side of his lips.  \n  #\"Look at those haughty fellows up there.  It is about time we taught them a little humility.\"  \n    Captain Lum smirks, \"Yes, Sir.  They will be cocksure after such a rout, but we
