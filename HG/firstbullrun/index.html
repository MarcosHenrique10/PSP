plit your battalions and delegate command to a subordinate or concentrate your forces for greater strength.  \n\n    Can you do what it takes to turn the tide of battle and keep your soldiers alive?\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first three chapters now for free.\n                *goto purchased\n\n    [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2025-01-09 $3.99 $2.99 purchased\n    *if choice_is_advertising_supported\n        *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n        *page_break Play Now for Free\n\n*label purchased\n\n*if choice_is_omnibus_app\n  This game is set during the American Civil War. It contains racist language and graphic descriptions of torture and of human and animal injury and death.\n  *page_break\n\n*temp chat1 \"yes\"\n*temp chat2 \"yes\"\n*temp chat3 \"yes\"\n*temp chat4 \"yes\"\n*temp chat5 \"yes\"\n*temp chat6 \"yes\"\n*temp chat7 \"yes\"\n*temp chat8 \"yes\"\n*temp chat9 \"yes\"\n*temp chat10 \"yes\"\n*temp chat11 \"yes\"\n*temp chat12 \"yes\"\n*temp chat13 \"yes\"\n*temp chat14 \"yes\"\n*temp chat15 \"yes\"\n*temp chat16 \"yes\"\n\"Each private thinks for himself—If he wants to go for water, he asks leave of no one. If he thinks right he takes the oats & corn, and even burns the house of his enemy… \n\nMcDowell & all the Generals tried their best to stop these disorders, but for us to say we commanded that army is no such thing—they did as they pleased.\"\n\n-Colonel William T. Sherman \n*line_break\nU.S. Army\n*line_break\nJuly 28, 1861\n*fake_choice\n  #Begin.\n\nJuly 21, 1861\n*line_break\n00:35\n\n\"Major.  Wake up, Sir.\"  You feel startled and confused for a couple of seconds.  Then, floating up through your groggy thoughts, you feel reason and awareness returning to you.  You are in your command tent and your adjutant officer is gently shaking you by the shoulder.  \n*fake_choice\n  #\"Yes, yes, I'm awake.\"  \n    \"Very good, Sir.\"  \n  #\"Good lord, what time is it?\"  \n    \"Thirty minutes past midnight, Sir.\"  \n    *set chat1 \"no\"\n  #\"Let me sleep.\"  \n    \"I'm sorry, Sir, but this is urgent.\"  \n\nRemoving his hand from your shoulder, Captain Bowles steps back and waits for you to sit up.  \"I beg pardon, Sir.  Colonel Willcox has requested the presence of all regimental commanders and staff officers.  We are expected in twenty minutes.\"  \n*label alpha\n*choice\n  *if chat1 = \"yes\"\n    #\"What time is it?\"\n      \"Thirty minutes past midnight, Sir.\"  \n      *set chat1 \"no\"\n      *goto alpha\n  *if chat2 = \"yes\"\n    #\"What do you think it is about?\"\n      \"Marching orders, I believe.  Maybe the General is finally making his attack.\"  \n      *set chat2 \"no\"\n      *goto alpha\n  #\"Thank you, Captain.\"  \n    \"No trouble at all, Sir.  Is there any way I can be of service?\"\n    *label bravo\n    *choice\n      *if chat3 = \"yes\"\n        #\"Some coffee would be remarkable, Captain.\"  \n          \"Your steward is making a pot now, Sir.  It should be here in moments.\"  \n          *set chat3 \"no\"\n          *goto bravo\n      #\"Fetch me my looking glass.\"\n        \"Yes Sir.\"  Captain Bowles hands you a small, square mirror, and you run a hand over your chin as you look at the reflection.  \n        *label facial_hair\n        *choice\n          #I have a full beard.  \n            *goto beard\n          #I have a mustache and goatee.  \n            *goto goatee\n          #I just have a mustache.\n            *goto mustache\n          #I have mutton chops but no beard.  \n            *goto mutton_chops\n          #I have an old fashioned, clean shaven look.\n            *goto clean_shaven\n      *if chat4 = \"yes\"\n        #\"Is my uniform ready?\"  \n          \"Brushed and ready, Major, Sir.  Your steward will help you with it just as soon as you are ready.\"  \n          *set chat4 \"no\"\n          *goto bravo\n  *if chat3 = \"yes\"\n    #\"Is there any coffee to be had?\"\n      \"Your steward is brewing a pot now, Sir.  It should be here in moments.\"  \n      *set chat3 \"no\"\n      *goto alpha\n*label beard\nChoose your portrait.\n*image portraits1.png\n*image portraits2.png\n*choice\n  #A\n    *set portrait \"b1\"\n    *goto charlie\n  #B\n    *set portrait \"b2\"\n    *goto charlie\n  #C\n    *set portrait \"b3\"\n    *goto charlie\n  #D\n    *set portrait \"b4\"\n    *goto charlie\n  #E\n    *set portrait \"b5\"\n    *goto charlie\n  #F\n    *set portrait \"b6\"\n    *goto charlie\n  #G\n    *set portrait \"b7\"\n    *goto charlie\n  #H\n    *set portrait \"b8\"\n    *goto charlie\n  #Go back.\n    *goto facial_hair\n*label goatee\nChoose your portrait.\n*image portraits3.png\n*image portraits4.png\n*choice\n  #A\n    *set portrait \"g1\"\n    *goto shave\n  #B\n    *set portrait \"g2\"\n    *goto shave\n  #C\n    *set portrait \"g3\"\n    *goto shave\n  #D\n    *set portrait \"g4\"\n    *goto shave\n  #E\n    *set portrait \"g5\"\n    *goto shave\n  #F\n    *set portrait \"g6\"\n    *goto shave\n  #G\n    *set portrait \"g7\"\n    *goto shave\n  #Go back.\n    *goto facial_hair\n*label mustache\nChoose your portrait.\n*image portraits8.png\n*choice\n  #A\n    *set portrait \"m1\"\n    *goto shave\n  #B\n    *set portrait \"m2\"\n    *goto shave\n  #C\n    *set portrait \"m3\"\n    *goto shave\n  #D\n    *set portrait \"m4\"\n    *goto shave\n  #E\n    *set portrait \"m5\"\n    *goto shave\n  #Go back.\n    *goto facial_hair\n*label mutton_chops\nChoose your portrait.\n*image portraits6.png\n*image portraits7.png\n*choice\n  #A\n    *set portrait \"mc1\"\n    *goto shave\n  #B\n    *set portrait \"mc2\"\n    *goto shave\n  #C\n    *set portrait \"mc3\"\n    *goto shave\n  #D\n    *set portrait \"mc4\"\n    *goto shave\n  #E\n    *set portrait \"mc5\"\n    *goto shave\n  #F\n    *set portrait \"mc6\"\n    *goto shave\n  #Go back.\n    *goto facial_hair\n*label clean_shaven\nChoose your portrait.\n*image portraits5.png\n*choice\n  #A\n    *set portrait \"c1\"\n    *goto shave\n  #B\n    *set portrait \"c2\"\n    *goto shave\n  #C\n    *set portrait \"c3\"\n    *goto shave\n  #D\n    *set portrait \"c4\"\n    *goto shave\n  #Go back.\n    *goto facial_hair\n*label shave\n\"Shall I fetch your razor and a bowl of water, Sir?\"  \n*fake_choice\n  #\"Yes, if you would be so obliging, Captain.\"  \n    After shaving, you place the razor in the bowl and wipe your face on a small towel.  \n  #\"No, this will do perfectly well for today.\"  \n*label charlie\nThe coffee comes in with the steward and as you gulp it down, you begin to feel more fully human.  Finally, your adjutant and steward help you to get into your uniform.  White undershirt, light blue suspended trousers with gold stripes running down to your ankles, and a heavy blue great coat with shiny gold buttons.  You hold your arms out from your body while your steward efficiently does up the two rows of buttons, fastens your epaulets, and straps on your belt.  Next, he pulls on tall black boots, freshly shined.  \n\nFinally, he hands you your blue leather kepi which you pull down to fit snugly on your head.  You adjust the saber that hangs on your left side and the colt revolver on your right.  Straightening up, you look at your reflection in the glass which your steward holds up.  \"Just as prim as ever you could wish, Sir.\"  \n*fake_choice\n  #\"Very good.  Thank you, steward.\"  \n  #\"Let us go, now, Captain.\"  \n    \nYou step outside of the tent into the darkness.  The stars gleam down from above through the branches of a large tree.  You inhale deeply and take in the sweet scent of plants, tinged with a foul stench of filth.  The smell of an army camp, familiar to you by now.  You feel something tickling the back of your neck and automatically swat the mosquito.  The damn things are insufferable.  \n\nYou stride forward to your staff as they mount their horses in the darkness.  An aide offers you your horse's reins and you climb into the saddle.  You lead the way, trotting down the path to Second Brigade headquarters.  \n*page_break\nWhat is your personal history?\n*choice\n  #I am a professional soldier, trained at West Point and bred to the Army.  \n    *set background \"Career Soldier\"\n    *goto state\n  #I am a state senator and community leader.  I raised this regiment from my home district and now I lead them.  \n    *set background \"State Senator\"\n    *goto state\n  #I am a German Forty-eighter.  I fought in the Prussian Revolution and emigrated to the United States after the revolution failed.\n    *set background \"Prussian revolutionary\"\n    *goto state\n  #I am an Irish immigrant.  My loyalty is both to the United States and to an independent Ireland.\n    *set background \"Irish nationalist\"\n    *goto state\n*label state\nWhat state are you and your regiment from?\n*choice\n  #New York, the wealthiest and most populous state in the Union.\n    *set state \"New York\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Pennsylvania, the second most populous state in the Union.  \n    *set state \"Pennsylvania\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Ohio, the third most populous state in the Union, and a moderate, central state.\n    *set state \"Ohio\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Illinois, the home state of President Lincoln, and a moderate, central state.\n    *set state \"Illinois\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Indiana, a moderate, central state.\n    *set state \"Indiana\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Missouri, a western frontier state, and the site of some early clashes between slavers and abolitionists.  \n    *set state \"Missouri\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Massachusetts, a wealthy, radical republican state that leads the abolitionist movement.  \n    *set state \"Massachusetts\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Michigan, a northern frontier state with a thriving timber industry.\n    *set state \"Michigan\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Wisconsin, a northern frontier state with many recent immigrants and abolitionists.  \n    *set state \"Wisconsin\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Kentucky, a border slave state that is harshly divided over the war.  \n    *set state \"Kentucky\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Iowa, a moderate, frontier state.\n    *set state \"Iowa\"\n    *set state_temp \"cold\"\n    *goto delta\n  #New Jersey, a slave state that is harshly divided over the war.  \n    *set state \"New Jersey\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Maine, a northern, coastal state, with many abolitionists.  \n    *set state \"Maine\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Connecticut, a small, coastal state, with many abolitionists.\n    *set state \"Connecticut\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Tennessee, a slave state that seceded from the Union, but is harshly divided over the war.  \n    *set state \"Tennessee\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Maryland, a border slave state that is harshly divided over the war.  \n    *set state \"Maryland\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Virginia, a slave state that seceded from the Union, but is harshly divided over the war.  \n    *set state \"Virginia\"\n    *set state_temp \"hot\"\n    *goto delta\n  #New Hampshire, a northern state with many abolitionists.\n    *set state \"New Hampshire\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Vermont, a northern state with many abolitionists.\n    *set state \"Vermont\"\n    *set state_temp \"cold\"\n    *goto delta\n  #Kansas, a western frontier state, and the site of some early clashes between slavers and abolitionists.  \n    *set state \"Kansas\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Minnesota, a northern frontier state with many recent immigrants and abolitionists.  \n    *set state \"Minnesota\"\n    *set state_temp \"cold\"\n    *set minnesota_regiment \"2nd Minnesota\"\n    *goto delta\n  #Rhode Island, a small, coastal state, with many abolitionists.\n    *set state \"Rhode Island\"\n    *set state_temp \"cold\"\n    *goto delta\n  #California, a large state on the west coast.  \n    *set state \"California\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Delaware, a small slave state that is harshly divided over the war.\n    *set state \"Delaware\"\n    *set state_temp \"hot\"\n    *goto delta\n  #New Mexico Territory, a sparsely populated territory in the southwest.  \n    *set state \"New Mexico\"\n    *set state_temp \"hot\"\n    *goto delta\n  #Colorado Territory, a sparsely populated territory in the west.\n    *set state \"Colorado\"\n    *set state_temp \"cold\"\n    *goto delta\n*label delta\nWhat is your last name?  (Choosing one of the preset surnames is recommended for full map interaction.)\n*fake_choice\n  #Spears\n    *set surname \"Spears\"\n  #Weber\n    *set surname \"Weber\"\n  #Clark\n    *set surname \"Clark\"\n  #Wilkerson\n    *set surname \"Wilkerson\"\n  #Morse\n    *set surname \"Morse\"\n  #Dietrich\n    *set surname \"Dietrich\"\n  #Murphy\n    *set surname \"Murphy\"\n  #Auclair\n    *set surname \"Auclair\"\n  #Other\n    Please enter your last name.\n    *input_text surname\nWhat is your full name?\n*fake_choice\n  #Thomas $!{surname}\n    *set first_name \"Thomas\"\n  #Frederick $!{surname}\n    *set first_name \"Frederick\"\n  #Elliot $!{surname}\n    *set first_name \"Elliot\"\n  #Robert $!{surname}\n    *set first_name \"Robert\"\n  #Neil $!{surname}\n    *set first_name \"Neil\"\n  #Liam $!{surname}\n    *set first_name \"Liam\"\n  #Hiram $!{surname}\n    *set first_name \"Hiram\"\n  #Other\n    Please enter your first name.\n    *input_text first_name\n*set regimental_commander \"Maj. $!{first_name} $!{surname}\"\n*set stat_trigger \"yes\"\nAfter a few minutes, you arrive at the log cabin that is functioning as the brigade headquarters.  Dismounting, you pass your horse's bridle to an aide and lead the way in.  A dozen officers stand around a large table and map in the center of the room.  The more junior staff officers line the walls, forming a wide ring around their superiors.  The headquarters is lit by a dim, yellow light from the kerosene lamps hanging on the ceiling.  \n\nThe men look up as you enter, and your brigade commander turns to you.  \"Good morning, Major $!{surname}.  We are only waiting for Ward now.  He should be here presently.\"  Colonel Willcox has a jutting brow, slicked back brown hair, and a scraggly goatee with mutton chops.  He greets you with an awkward, whiskery smile and a firm handshake.  \"Cigar?  Tobacco?  Coffee?  My steward can get you anything you need.\"  Without waiting, he turns back to Colonel Farnham, continuing an interrupted discussion.  \n*image willcox.png\n*fake_choice\n  #\"I will take a cigar.\"\n    The steward lights a cigar and hands it to you.  You inhale the smoke and puff it out toward the ceiling.  \n  #\"Chewing tobacco, if you please.\"\n    The steward hands you a leather pouch with some tobacco in it.  \n  #\"A little pipe tobacco if you have it.\"\n    The steward takes your proffered pipe and fills it with tobacco before lighting it and handing it back.  \n  #\"I'll take a hot cup of coffee.\"\n    The steward brings you a steaming cup of black coffee.\n  #\"Nothing for me, thank you.\"\n\nThe door opens and Colonel John Ward enters.  \"Ah ha, we are all here.  Good morning, Colonel Ward.\"  The disheveled officer walks up to the table with a stony face, handing his riding gloves to an aide.  \"Good morning, Sir.\"  \n\n\"My steward will fetch you a cigar,\" Colonel Willcox snaps his fingers, \"Now, gather round the map gentlemen.  We have orders from General McDowell's staff.  I apologize for the somewhat early wake up call, but I have good news.  We are going into battle today.  Our marching orders will move us into position to lead the main attack on the rebel forces this morning.\"  The men around the table generally smile and nod their heads in appreciation.  Most men are eager to show their grit and to 'see the elephant,' a popular phrase meaning to witness battle firsthand.  \n*fake_choice\n  #I am eager to fight!\n  #I am secretly terrified to see battle.\n  #I do not know what to expect.\n*set map_trigger \"startup1\"\n*set map_trigger1 \"yes\"\n*image startup1.png\n\n\"Our orders are to set out at two o'clock.  We are to march up this small road here, around to the northeast to outflank the enemy.\"  He points to an unlabeled road on the map.  \"We should arrive at this ford, Sudley Ford, and cross the Bull Run creek.  Intelligence suggests that we may outflank the enemy's left wing and take him by surprise.  There are a series of diversionary attacks that are planned, and I will go through that now, then my adjutant can give additional details.\"  \n\nThe Colonel puffs his cigar and adjusts the map on the table.  \"Richardson's brigade will march south to Blackburn's Ford to pin down the rebels' right wing and prevent a flanking attack from that direction.  General Tyler will take the rest of his division west along the Warrenton Pike and mount a feint attack across the stone bridge.  Meanwhile, Second and Third Divisions will march circuitously around to the north and cross Sudley Ford to take the enemy in the flank. We are in this main force, under Heintzelman.  Colonel Miles' Fifth Division is in reserve around Centreville acting as a rearguard.  Marching order and other details will be given to your staff once they are written up and approved.  Any questions, gentlemen?\"  \n*label hotel\n*choice\n  *if chat12 = \"yes\"\n    #\"Are we part of the main attack, then?\"\n      \"Yes, Major.  Heintzelman's Third Division is going with the main force.  The other attacks are diversionary.\"  \n      *set chat12 \"no\"\n      *set chat16 \"no\"\n      *goto hotel\n  *if chat13 = \"yes\"\n    #\"Are the men truly ready for this?  We can barely get them to march in formation.\"\n      \"They must be ready.  Our orders are clear.  We are taking them into action this morning.\"  \n      *set chat13 \"no\"\n      *set chat16 \"no\"\n      *goto hotel\n  *if chat14 = \"yes\"\n    #\"Who is leading the attack?\"\n      \"Second Division, under Colonel Hunter.  We will be supporting them.\"  \n      *set chat14 \"no\"\n      *set chat16 \"no\"\n      *goto hotel\n  *if chat15 = \"yes\"\n    #\"Might they not observe our forces moving on their left?\"\n      Colonel Willcox shakes his head, \"We are to reach the ford before six o'clock and thus still under cover of darkness.  The diversionary attacks will go forward between five thirty and six.\"  \n      *set chat15 \"no\"\n      *set chat16 \"no\"\n      *goto hotel\n  *if chat16 = \"yes\"\n    #Stay silent.\n      *goto india\n  *if chat16 = \"no\"\n    #No further questions.\n      *goto india\n*label india\n*if chat15 = \"yes\"\n  Colonel Woodbury takes the pipe out of his mouth, \"Sir, is there a chance our movements on the enemy's left will be observed?\"\n\n  Colonel Willcox shakes his head, \"We are to reach the ford before six o'clock and thus still under cover of darkness.  The diversionary attacks will go forward between five thirty and six.\"  He looks around at the assembled officers.  \n\"Well then, there is not a moment to lose, gentlemen.  Wake the men up and have them ready to move at two o'clock.  Marching orders will be sent to you all in advance.  To victory!\"  He raises his smoldering cigar above his head.  \"Dismissed.\"  \n\nA buzz of chatter overtakes the staff officers around the walls of the room.  The regimental officers shuffle and study the map.  Your adjutant, Captain Bowles, clears his throat.  \"Major, with your permission, I shall go and wake the regiment.\"  You nod and he hurries out the door with some other staff officers.  You have a few minutes at least before you are needed back.  \n*label echo\n*choice\n  *if chat5 = \"yes\"\n    #Talk to Colonel Dwight Woodbury.\n      *set chat5 \"no\"\n      *image woodbury.png\n      You turn to Colonel Woodbury, a young man of about thirty, with a thick brown beard and mustache as well as piercing blue eyes.  He smiles and takes your hand in a sturdy handshake.  \"Good morning, Major.  I am looking forward to showing what Michigan men are made of.  Now is our great opportunity, before all this fun is over.\"  \n      *choice\n        #\"$!{state} men will win the day, Sir.  We shall prove our grit.\"  \n          \"Very well, my good man.  Good luck and godspeed to us all!\"  He pats your shoulder enthusiastically.  \n          *goto echo\n        *if state = \"Michigan\"\n          #\"I will buy you a drink in Detroit when this is all over.\"\n            \"What heroes we shall be upon our return!  Good luck and godspeed to us all!\"  He pats your shoulder enthusiastically.  \n            *goto echo       \n        #\"I wish I could be as sanguine as you, Colonel.  I do not believe that we are ready.\"  \n          \"Oh no, Major, none of that talk, I beg you.  Our boys are ready to fight.  Union men never falter!\"  He pats your shoulder enthusiastically.  \n          *goto echo\n  *if chat6 = \"yes\"\n    #Talk to Colonel Noah Farnham.\n      *set chat6 \"no\"\n      *image farnham.png\n      You st thick, handlebar mustache.  Ward is a veteran of the Mexican War, a middle aged man of near forty.  \n      *fake_choice\n        #\"Good morning, Sir.  How do you do?\"\n          His mustache twitches as he takes the cigar in one hand, responding in his New York accent, \"Major, good day to you.  I believe we shall soon learn how volunteers fight.\"  \n        #\"An early wake up call, to be sure.  At least it is good news.\"  \n          His mustache twitches as he takes the cigar in one hand, responding in his New York accent, \"Indeed.  I believe we shall soon learn how volunteers fight.\"           \n        #Nod back at him with matching incivility.\n          His mustache twitches as he takes the cigar in one hand.  \"Good morning, Major $!{surname}.  I believe we shall soon learn how volunteers fight.\"  \n      *choice\n        *if background = \"Career Soldier\"\n          #\"I have had a difficult time with them.  They do not behave like professional soldiers at all.\"\n            Ward chuckles, \"It is a different beast, this volunteer army.  I almost dread to see how they conduct themselves under fire.  But, in a few hours we will know.\"  He puts the cigar back in his mouth.  \n            *goto echo\n        *if background = \"State Senator\"\n          #\"I have great faith in my men, but I have learned to respect you professional soldiers more fully.\"  \n            Ward looks pleased, \"I am gratified, Major.  Soon, you will learn what battle is truly like.  May it only increase your esteem.\"  He puts the cigar back in his mouth.  \n            *goto echo\n        #\"I believe they will meet the challenge with bravery and honor.\"\n          Ward smirks.  \"Yes, but will they meet it with discipline?  That is the soldier's true virtue.  It is discipline that wins wars, not bravery and honor.  He puts the cigar back in his mouth.  \n          *goto echo\n        #\"I share your concern.  My men are not trained as well as I could wish.\"\n
