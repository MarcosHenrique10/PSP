  If only I can find a nice lonely bush to conduct it behind.\"  \n\n\"Ha!  He has a case of the quick-step!\" laughs Clarkson, \"I tell you, it's all the god damn bullock meat!\"  Everyone laughs as the young officer slinks away sheepishly to find a bush.  \n*page_break\n\"Sir,\" Bowles says to get your attention.  Looking around, you see a half dozen horsemen cantering along the ridge toward you.  At the head, you see Willcox on his gray mare.  He is the picturesque officer, with one hand gripping the reins and the other in a fist against his waist so that the arm extends like the handle of a tea cup.  You salute as he rides up and he returns the gesture before turning to his adjutant.  \"Fetch Colonel Ward, if you please.  I want to speak to him as well.\"  The man rides off.  \n\nColonel Willcox dismounts and nods to you and your officers.  \"At ease, gentlemen.  Is that coffee?  Lord, I would give my left arm for a cup right now.\"\n*choice\n  #\"Captain Withington, fetch the Colonel a cup of coffee.\"  \n    \"Sir, with your pardon,\" ventures Captain Withington, \"We have a new pot brewing.  It will be just a moment.\"  \n    \n    \"No, no.  I haven't time.  I only have a minute,\" replies Willcox.  \"I will wait for Colonel Ward and then I will give you your orders.\"\n    \n    The officers are more creative than might have been expected.  Two men pour half cups of coffee together in one tin mug and Captain Withington brings it to the Colonel, who takes it gratefully and sips.  \"Lord, but that goes down well.  I suppose we have a moment to talk while we wait.  Do you have any questions for me?\"\n    *goto delta\n  #\"Sir, do you bring us orders?\"  \n    \"Yes, but I will wait for Colonel Ward so that I needn't repeat myself.\"  \n    \n    \"Sir, with your pardon, we have a new pot brewing, it will be just a moment,\" ventures Captain Withington.  \n    \n    \"No, no.  I haven't time.  I only have a minute,\" replies Willcox.  \n    \n    The officers are more creative than might have been expected.  Two men pour their half drunk cups together in one tin mug and Captain Withington brings it to the Colonel, who takes it gratefully and sips.  \"Lord, but that goes down well.  I suppose we have a moment to talk while we wait.  Do you have any questions for me, Major $!{surname}?\"\n    *goto delta\n*label delta\n*choice\n  *if chat4 = \"yes\"\n    #\"What is the state of our forces?\"\n      \"This is what I can tell you.  Colonel Burnside's brigade was out of ammunition and they retired to the rear.  Those units off to your left are Sherman's brigade from First Division.  They forded Bull Run Creek to the east and have joined our force.  So we have four brigades that are ready for action.  Porter, Franklin, Sherman, and my own.  Colonel Howard's brigade is expected later in the afternoon as they were held in reserve.\"  \n      *set chat4 \"no\"\n      *goto delta\n  *if chat5 = \"yes\"\n    #\"What do we know about the enemy?\"\n      \"To the best of my knowledge, we faced three brigades of men on the ridge.  They fell back in extreme disorder, as you witnessed.  The rebels have about fourteen cannons set up on that hill to the southeast.  It is called Henry Hill.  Rebel infantry have been sighted but they are staying back in tree cover, so it is hard to determine their strength and numbers.\"  \n      *set chat5 \"no\"\n      *goto delta\n  *if chat6 = \"yes\"\n    #\"Why are the guns silent?\"\n      \"They are moving forward across the creek in order to engage the enemy more closely.  That is what your orders pertain to, so I will tell you more in a moment.\"  \n      *set chat6 \"no\"\n      *goto delta\n  *if chat7 = \"yes\"\n    #\"Do we know where General Tyler and First Division are?\n      \"I do not know.  I believe the General sent word to him to bring his division forward, but thus far we have only seen Sherman's brigade.\"  \n      *set chat7 \"no\"\n      *goto delta\n  *if chat4 = \"no\"\n    *if chat5= \"no\"\n      #\"That is all, Sir.\"\n        *goto echo\n*label echo\nColonel Willcox nods and sips the coffee, looking to the north where you see four horsemen galloping toward you from the next regiment over.  The hoof beats thunder with escalating volume until they are about thirty yards away, when the leader reins in his mount and brings it to a gradual halt.  The other horsemen follow his lead, the beasts snorting with excitement at the chance to let loose.  The leader, Colonel Ward, climbs out of the saddle, bouncing once in his stirrup before pulling his foot free and handing the reins to an aide.  \n\nWard walks up to the two of you and salutes Willcox, waiting for the gesture to be returned before bringing his hand down.  \"At ease, Colonel Ward,\" says Willcox.  \"I have orders for the two of you.\"  Colonel Ward glances at you with his usual surly appearance, his mouth hidden beneath the thick brown mustache.  He nods curtly at you before returning his attention to Willcox.\n*fake_choice\n  #\"Afternoon, Colonel.\"  \n  #Nod back at him.\n  #Give no response.\nColonel Willcox takes off his forage cap and scratches his sweaty hair with the same hand, his right still gripping the coffee cup.  \"Gentlemen, no doubt you have noticed that our guns are no longer firing.  The men needed a rest, anyway, and the artillery duel favored us for a time.  But now, two batteries are being moved forward to engage the enemy at a closer range.  We are continuing the attack across the creek, which is called Young's Branch, and attacking the enemy positions on Henry Hill.  \n\n\"The rebels we engaged earlier today are likely still shattered, but the enemy seems to have brought some reinforcement.  Regardless, we must continue the attack before they are able to bring up any more defense from their other flank.  We have four brigades up and ready to attack, with a fifth on its way.  \n\n\"And so, here are my orders.  You are both to take your regiments south as quick as you may without undue exhaustion.\"  He turns and points south along the ridge.  \"Continue until you reach the road which runs up the ridge and then east across Young's Branch.  There is a ford across the stream and you should have no problems getting your men across.  From there, move up and support the guns however you may.  \n\n\"Two regiments are crossing the ford now with the guns.  One of them is our 11th New York, under Colonel Farnham.  I am going to join up with the 11th and take command at the front line.  You will likely meet with McDowell, or some other commanding officer near the front, who will instruct you further.  If not, then move forward severally and engage the enemy as you think best until you receive further orders.  Have you any questions?  Be quick, for I must be away.\"  \n*fake_choice\n  #\"What of the rest of our brigade?  Colonel Woodbury's 4th Michigan, and Arnold's battery?\"\n    \"Arnold's battery is moving up onto Dogan Ridge.  Woodbury's 4th is set to guard that battery.\"  \n  #\"We are sending the guns across with just two regiments of support?  That seems too risky if they counter attack.\"\n    Willcox furrows his brow at you.  \"General McDowell has given the order to move the batteries.  There is nothing further to discuss about it.  Mind your own unit, Major.\"  \n  #\"No questions, Sir.\"  \n    \nColonel Ward clears his throat, \"Colonel, my volunteers are exhausted.  I may not be able to rouse them, just yet, to the march.  I have instructed them to eat their beef rations, which ought to revive them.\"  \n\nWillcox nods, \"Very good.  Please to march as soon as they are fit to move.  Major $!{surname}, if your men are ready, begin the march now.  It is perhaps a mile to the ford.  And now, I must go.  Godspeed to you, gentlemen, and I shall see you on the other side of the stream.\"  He downs the last of the coffee and hands the cup to you distractedly.  \"Obliged to you, for the coffee, Major.\"  He climbs into the saddle and spurs his horse away, all his staff in tow.  \n\nColonel Ward turns his glance to you, \"Major,\" he says coldly.  \n*fake_choice\n  #\"Colonel.\"\nWard remounts his horse and rides off to the 38th New York.  You return to your officers.  The Lieutenant who went to find a bush is walking up to the group from the other direction, buttoning his great coat.  \"Damn it but I am unwell.  Did I miss anything interesting?\"  Another officer slaps his chest and he snaps to attention instantly.  \n*choice\n  #\"Captain Lum, are the men ready to march?\"\n    \"That they are, Sir.  Shall I bring them to attention?\"  His black-bearded face looks grave.  \n    *choice\n      #\"If you please, Captain.\"\n        \"Yes Sir.  Officers, return to your companies and bring the men to attention.\"  \n        *goto foxtrot\n  #\"We have marching orders.  Get the men up.\"\n    Captain Lum's black-bearded face looks grave, \"Yes Sir.  Officers, return to your companies and bring the men to attention.\"  \n    *goto foxtrot\n*label foxtrot\nThe officers down what coffee they have and scramble to return to their companies.  You turn away and mount your horse.  The familiar sore spots on your thighs and buttocks receive their customary pressure, and you shift in the saddle to minimize the discomfort.  \n\nRiding down the mass of men, you hear the shouted orders and see the units reforming lines, with muskets held at something not unlike 'shoulder arms.'  The experience and discipline are lacking, but the men are needed again to do battle.  You hope that they will ready enough to meet the challenge.\n\n\"1st $!{state}!  Forward… march!\"  The drum rolls its tattoo and the fifes start up a whistling, jaunty marching tune.  Hundreds of boots step forward in time to the music and the regiment is off.  The rattle of the drums inspires a primal, enthusiastic energy that shoots through your body.  \n*page_break\nThe regiment marches along the protected side of the ridge.  You ride in front of the unit, beside Captain Bowles.  You are traveling sideways across the front of the morning's fight.  Scattered throughout the grass are occasional wounded or dead soldiers.  Some lay where they fell, while others crawled away from the fight, leaving a piteous dark red path through the grass.  \n\nOne wounded man is croaking so dreadfully, crying out for water, that you order a sergeant to give him a drink.  Your own throat crackles, and you drink from your half full canteen.  The water is warm, but your throat accepts it gratefully.  \n*if canteen = \"hit\"\n  You found the canteen on a dead body to replace your own that was hit by a musket ball.  It feels dirty to drink water that a dead man filled only this morning.  \n\nAll along the slope, too, you can see other army units.  Companies and regiments are readying to move out, abandoning the brief respite from marching with reluctant obedience.  You glance at your pocket watch.  It has been nearly fourteen hours since you woke up.  As you think back to your tent, you feel your vision swoon with desire to be back there, resting your tired eyes in safety.  \n\nNow you see the road cutting across your path.  Glancing behind, you can see Colonel Ward's New Yorkers marching along half a mile behind your regiment.  Off to your left, the road disappears over the top of the ridge.  \n*fake_choice\n  #\"Regiment, left!\"  \n\"Left… march!\" shouts Captain Lum.  His unsheathed sword points left, and the column turns ninety degrees on its left axis to follow you.  \n    \nYou crest the ridge and see down the far slope.  It travels gently down toward the stream which must be Young's Branch as described by Colonel Willcox.  Before reaching the water, the path passes to the left of a two story stone house.  On the left side of the road, you see two regiments of men standing there, waiting for something.  You recognize these regiments as the 5th and 11th Massachusetts, two of Franklin's regiments that were part of your attack up the ridge.  \n    \nOn the far side of the stream, the ground slopes gently upward again to a wide hill, with the road running along its right face.  Atop this hill stands a structure, visible in the distance, and flanked by gun batteries.  Those must be the two Union batteries that were sent forward.  You cannot see much further than this, not only because of the distance, but because of a thick line of forest that runs north to south across the plateau and obscures anything behind it.  As you watch, you see black smoke bellowing out from the guns and hear the powerful thump of the discharge a full second later.  \n\nYour horse whinnies loudly, sensing the danger ahead, and sharing your anticipation.  You pat her neck comfortingly, your eyes still fixed on the scene up ahead.  On the right of the hill, you see columns of men marching the same direction as you.  You see blue, red, and gray uniforms.  The gray coats must be the 11th New York Zouaves, no doubt led by Colonel Willcox.  They are too far to make out much detail, however.  \n*if surname = \"Spears\"\n  *image henry_hill1.1.png\n  *set map_trigger \"henry_hill1.1\"\n  *goto image2\n*if surname = \"Weber\"\n  *image henry_hill1.2.png\n  *set map_trigger \"henry_hill1.2\"\n  *goto image2\n*if surname = \"Clark\"\n  *image henry_hill1.3.png\n  *set map_trigger \"henry_hill1.3\"\n  *goto image2\n*if surname = \"Wilkerson\"\n  *image henry_hill1.4.png\n  *set map_trigger \"henry_hill1.4\"\n  *goto image2\n*if surname = \"Morse\"\n  *image henry_hill1.5.png\n  *set map_trigger \"henry_hill1.5\"\n  *goto image2\n*if surname = \"Dietrich\"\n  *image henry_hill1.6.png\n  *set map_trigger \"henry_hill1.6\"\n  *goto image2\n*if surname = \"Murphy\"\n  *image henry_hill1.7.png\n  *set map_trigger \"henry_hill1.7\"\n  *goto image2\n*if surname = \"Auclair\"\n  *image henry_hill1.8.png\n  *set map_trigger \"henry_hill1.8\"\n  *goto image2\n*else\n  *image henry_hill1.9.png\n  *set map_trigger \"henry_hill1.9\"\n  *goto image2\n*label image2\n*page_break\nYou lead the regiment down the hill.  As you pass, the \n*if state = \"Massachusetts\"\n  other \nMassachusetts regiments begin to cheer, and you glance benevolently at them as you pass.  They wear the regulation blue Federal uniforms, a rare sight among the patchwork of state militias and colorful Zouaves.  \n\nSome minutes pass as you lead the way down the gradual slope.  Glancing at the stone house on your right, you can see blue capped men with binoculars looking out the upper story windows.  This peaceful little farmhouse looks like it does not belong.  It was built to be strong and last, to shelter some hard working family in quiet but joyful solitude.  Now it has been subsumed by the great, bloody hand of war.  \n\nThe head of the column is nearing the creek.  The road grows rockier and more overgrown as you approach the water.  There is a ford across the river before you; a shallow section where the water scarcely reaches the top of a tall pair of boots.  Your eyes flicker to the right of the path, where a beautiful patch of purple wildflowers are growing.  You feel your breath catch and your eyes water as you find yourself wishing you could be anywhere but here.  But no, your duty is to go on, to whatever death or injury may await you.  \n\nYour horse's hooves splash down into the stream.  The water babbles along from left to right, glistening beautifully in the sun.  The reflected light makes you wince.  Off to the right is a tiny island, with the water swishing around it before rejoining a few yards later.  This little pile of earth in the middle is overgrown with tall, green, wrangling plants.  It looks like somewhere you would have liked to play as a boy.  Time gone, now.  \n\nThe men splash into the ford of the stream, and the column begins to dissolve in chaos as the men rush to refill their canteens with the cool water.  Off to the left, some of the 5th Massachusetts men are doing the same thing.  \n*fake_choice\n  #Try to get them back under control.  \n    \"Battalion, attention!  Halt!  Fall in!  Reform column!\"  It is no use.  The undisciplined volunteers will fill their water if they see fit.  Perhaps they do not see why you should have the right to tell them what to do.  A couple months of drill training, and some visits to the stockade would set them straight.  \n  #Let them fill their canteens.  \n    \"Sergeant, refill my canteen if you please.\"  You slug the last of the warm water in your canteen before passing it down to him.  A moment later, he returns it to you, the cool water dripping down your glove.  The cold droplets fall onto your horse's shoulder, which twitches reflexively.  You indulge yourself with one mouthful of the cold liquid, and swish it around in your mouth until it starts to grow warm.  It is like a balm on your dry throat as it goes down.  \n\nAfter filling their canteens, the men move across the stream and regroup with their companies.  The chaotic scene is punctuated by the nearby thump of cannons, and the whistling of shells flying through the air.  Five minutes after reaching the ford, the regiment is reformed and ready to continue.  \n\n*choice\n  #\"Regiment, forward, march!\"  \n    *goto_scene henry_hill", "right": "*set battle_outcome +2\n*temp battle_efficiency \"lowest\"\n*temp chat1 \"yes\"\nThe regiment reaches the end of the tree cover, and they see the ridge and the battle right before them.  The files of men seem to shiver as they hesitate and lose step.  A messenger rides up at a gallop and reins in his horse to a rapid stop, \"General McDowell's compliments, Sir.  The general orders that this regiment be placed on the right flank of Franklin's Brigade.  You will follow them all the way over to extend the right flank of the line.\"  He points off to the right of the road.  \"From that position, you will advance up the ridge and take the rebels in their left flank and drive them off the high ground.\"  \n\n\"Acknowledged.  Compliments, and so forth,\" replies Willcox in a businesslike tone.  The man salutes and rides off as fast as he arrived.  \n*fake_choice\n  #\"Regiment, right turn!  Follow the column!\"  \n\"Right turn!  Right turn!\"  Your officers shout the order on down the ranks.  The front row makes the right turn, following Franklin's Brigade.  The men in the outer file take wide steps, while the innermost men march two paces in place before continuing.  It could almost be a parade ground if not for the screaming bullets overhead and the roar of cannons.  \n    \nYour regiment advances into the grassy pasture south of the road, along the rear of Reynolds' artillery where the caissons and horse teams wait.  The gun teams are working furiously; shouting orders, loading, aiming, and firing.  You watch one shell fired at the ridge with shocking velocity.  Not a quarter second after the lanyard was pulled, it strikes the ground just short of the rebel line and explodes in a huge puff of smoke.  Hopefully these guns will be able to support your attack.  \n\nThe march continue for several hundred yards further.  You pass behind two New York militia regiments, looking glorious in their fine blue coats and fashionable baggy red pants.  You pass behind two more regiments, one of which you identify as regular infantry and marines.  Army and marine regulars were professional soldiers before the war broke out, and they make up a very small nucleus around which the volunteers fill out the rest of the Army's ranks.  \n\nYou are approaching the right flank of the whole battle line.  The sounds of the fight are less over here, it being much more focused on the center of the line.  The sounds of officers shouting and men arguing are much louder, however.  McDowell and his staff are furiously trying to organize the chaos of thousands of men to form a cohesive body for the attack.  With effort, they are able to cajole the undisciplined men into something like lines, company by company.  \n*page_break\n*image right1.png\n*set map_trigger \"right1\"\nNow the 1st $!{state} is in place on the right end of the line, which is bolstered by multiple reserve regiments standing behind it.  You look up the slope of the ridge before you.  Near the crest stands a lonely gray regiment in opposition.  There is another rebel regiment to the left and somewhat higher up the slope.  They appear to be severely outnumbered and outflanked by your line, but they still have the high ground.  \n\nColonel Willcox turns to you, \"Major ${surname}, I will take command of the regiment for now.  I want you to lead Second Battalion for now.\"  As your superior, Willcox has the right to take direct command of your regiment.  You are relegated to Second Battalion, the right half of the regiment, around four hundred men.\n*fake_choice\n  #I am content with my role.\n  #I should be allowed to command my own regiment.  \nRiding to the right side of your line, you return the salute of Captain Withington.  \"Sir,\" he says simply, more than ordinarily succinct.  \n*fake_choice\n  #\"Willcox is commanding the Regiment.  I am taking command of Second Battalion.  You will return to your Company.\"  \n  #\"I am sorry, Captain, but I am taking direct command of the Battalion for a time.\"  \n*set regimental_commander \"Col. Orlando Willcox\"\n*set second_battalion_commander \"Maj. $!{first_name} $!{surname}\"\n*set b_company_commander \"Capt. William Withington\"\nWithington looks put out, but he nods ascent.  \"Yes, Sir.  Thank you.\"  \n\nThe men stand in fairly straight lines, four files deep, muskets shouldered.  Many of them remove their haversacks and toss them back behind the line.  The company commanders and other officers stand behind the line, either stationary or pacing up and down the ranks.  \n\nThe shrill cry of the bugle sounds in your ears.  \"Forward at the double quick!\" you shout, \"March!\"  The men start to jog up the slope at double quick time.  A few men march at the wrong pace in the excitement, but their comrades quickly correct them.  You stir your horse into a trot behind them and you see the gray lines a few hundred yards ahead.  \n\nThe rebels raise their muskets and fire a volley, the smoke pouring out in one long line.  The crackle of the discharge is almost instantly followed by the whiz of bullets around you.  One man goes down and nearly trips a half a dozen others, but most of the fire is concentrated on the regiment to your left.  \n*set regimental_strength -1\n*set second_battalion -1\n*page_break\n*image right2.png\n*set map_trigger \"right2\"\nOne hundred yards away, now.  The furthest flank of the rebel line is near the leftmost file of the 1st $!{state}.  The rebel officer seems to have noticed this, because he spreads his line thinner to extend to the right.  The men are now only two ranks deep and somewhat widely spaced.  \n\nAnother volley roars out and peppers the Union ranks, again.  This time, you see at least two men go down in your own regiment.  It seems a relatively light loss, all things considered.  \n\n\"Halt!\"  Colonel Willcox shouts the order and you yell it again, spreading the word to even the dullest and deafest of your men.  The enemy stands some sixty yards ahead, loading their muskets.  Your regiment is overlapping their flank and extending beyond it.  Off to the rebel right is nothing but empty grass.  You could try moving your battalion forward to the right to hit the rebels with enfilade fire down their flank.  It could be a risk to take initiative and leave the battle line, however.  \n*set regimental_strength -3\n*set first_battalion -2\n*set second_battalion -1\n*choice\n  #Volley fire.\n    \"Battalion, volley fire at my command!  Ready!  Aim!\"  You shout the orders and hundreds of muskets come up into shoulders.  \"Fire!\"  Two hundred weapons discharge at once with a thunderous crackle.  You see the rebel line quiver as some men in the front rows collapse. \n    *set volleys +1\n    *choice\n      #\"Load!\"\n        \"Load your muskets!\"\n    \n        \"Load, load, load!\"\n    \n        The officers and sergeants mimic your order down the line, a useful practice in the chaos of battle.  The men load as one unified body.  Cartridge out, bite off one end, poor the powder down the muzzle, then the ball after that.  Now they are onto the next step, and ramrods come out in rough unison, ramming the ball and cartridge down to the bottom of the barrel.  You scan up and down the line as the faster men finish this step and raise the gun to their waists where they equip the hammer with a small brass percussion cap to trigger the charge.\n    \n        You almost jump out of your saddle as the rebel volley erupts from just ahead.  A few men along the line fall out of formation as they are struck.  A private ahead of you lets out a truly pitiable wail as he falls to the ground.  He is holding his neck and rolling back and forth, sobbing and screaming like a child.  He cannot be more than sixteen years old.  You notice your jaw is clenched so tight that your teeth are hurting and with an effort you pry your jaws apart and look forward again.  \n        *set regimental_strength -4\n        *set first_battalion -2\n        *set second_battalion -2\n        *choice\n          #Fire.\n            The last of the men are finishing their loads now.  \"Ready!  Aim!\"  A moment of silence as each man chooses his mark.  \"Fire!\"  Your men pour out a volley and more smoke fills the air between them and the enemy.  \n        \n            \"Good work, boys.  Steady now and win the day,\" calls a sergeant from somewhere off to the right.  \n            *set volleys +1\n            *choice\n              #\"Load!\"\n                The men begin the loading process again, some standing tall while others try to make themselves smaller as they await the counter volley.  Here it comes; you see the rebel muskets come up.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing around you in the twisting smoke.  A couple more men fall out of line and the rear ranks step forward to fill the gaps.  \n                \n                \"Ready!  Aim!… Fire!\"  Your men return the volley with dreadful force.  The rebel line is starting to look thin as there are no reserve men left to fill the gaps.  \n                *set regimental_strength -3\n                *set first_battalion -2\n                *set second_battalion -1\n                *set battle_efficiency \"medium\"\n                *goto alpha\n              #\"Fire at will!\"\n                The men who are ready raise their muskets and start to choose targets.  The quickest among them take aim and fire, then they start to load as the slower men bring up their muskets.  \n            \n                Here comes the next rebel volley, their muskets rising to their shoulders in unison.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing around you in the twisting smoke.  A couple more men fall out of line and the rear ranks step forward to fill the gaps.  \n    \n                As the sound of the volley dissipates, the constant patter of the Union fire continues.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n                *set fire_at_will +1\n                *set regimental_strength -3\n                *set first_battalion -2\n                *set second_battalion -1\n                *set battle_efficiency \"low\"\n                *goto alpha\n      #\"Fire at will!\"\n        \"At will, boys, at will.\"  The men load as one unified body.  Cartridge out, bite off one end, poor the powder down the muzzle, then the ball after that.  Now they are onto the next step, and ramrods come out in rough unison, ramming the ball and cartridge down to the bottom of the barrel.  You scan up and down the line as the faster men finish this step and raise the gun to their waists where they equip the hammer with a small brass percussion cap to trigger the charge.  \n        \n        You almost jump out of your saddle as the rebel volley erupts from just ahead.  A few men along the line fall out of formation as they are struck.  A private ahead of you lets out a truly pitiable wail as he falls to the ground.  He is holding his neck and rolling back and forth, sobbing and screaming like a child.  He cannot be more than sixteen years old.  You notice your jaw is clenched so tight that your teeth are hurting and with an effort you pry your jaws apart and look forward again.  \n    \n        The men who are ready raise their muskets and start to choose targets.  The quickest among them take aim and fire, then they start to load as the slower men bring up their muskets.  \n            \n        Here comes the next rebel volley, their muskets rising to their shoulders in unison.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing around you in the twisting smoke.  A couple more men fall out of line and the rear ranks step forward to fill the gaps.  \n    \n        As the sound of the volley dissipates, the constant patter of the Union fire continues.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n        *set fire_at_will +1\n        *set regimental_strength -3\n        *set first_battalion -2\n        *set second_battalion -1\n        *set battle_efficiency \"lowest\"\n        *goto alpha\n  #Move forward to the right.\n    \"Battalion, right oblique, forward!\"  There is a moment's hesitation as the men hear the unexpected order.  The junior officers and sergeants swiftly impel their obedience.  \"Right oblique!  Battalion, forward!\"  The men begin to march forward at a right angle to the enemy, moving toward their flank.  \"Right wheel, march!\"  The right side of the battalion halts in place while the rest of it swings to the right.  \n    \n    The line is now perpendicular to the enemy line, facing away from them.  \"Battalion, about face!\"  The men turn around and face the enemy.  The rebels nearest to you seems to shrink from the new menace on their flank.  \n    *choice\n      #Volley fire.\n        *image right3.png\n        *set map_trigger \"right3\"\n        \"Battalion, volley fire at my command!  Ready!\"  You shout the orders and hundreds of muskets come up into shoulders.  \"Aim!… Fire!\"  Two hundred weapons discharge at once with a thunderous crackle of sound.  You see the rebel flank quiver as they are hit by enfilade fire.  Men drop out of the ranks as they are hit.  \n        \n        The Confederate regiment fires a volley into the larger body of men in front of them.  You can see a rebel officer through the smoke as he pulls back the shattered left wing of his regiment to face your battalion.  \n        *set volleys +1\n        *set regimental_strength -2\n        *set first_battalion -2\n        *choice\n          #\"Load!\"\n            \"Load your muskets!\"\n    \n            \"Load, load, load!\"\n    \n            The officers and sergeants mimic your order down the line.  The men load as one unified body.  Cartridge out, bite off one end, poor the powder down the muzzle, then the ball after that.  Now they are onto the next step, and ramrods come out in rough unison, ramming the ball and cartridge down to the bottom of the barrel.  You scan up and down the line as the faster men finish this step and raise the gun to their waists where they equip the hammer with a small brass percussion cap to trigger the charge.\n            *choice\n              #Fire!\"\n                The last of the men are finishing their loads now.  \"Ready!\"  The musket butts come up into shoulders.  \"Aim!\"  A moment of silence as each man chooses his mark.  The rebel muskets come up too, and you feel your stomach turn over as you stare down the muzzles.  \"Fire!\"  Both lines fire simultaneous volleys and you hear screams of pain through the crash of gunfire.  \n        \n                Your ears are ringing as you peer along the line.  You see someone crawling feebly back from the battle line, leaving a dark red trail in the grass.  \n                *set volleys +1\n                *set regimental_strength -4\n                *set first_battalion -2\n                *set second_battalion -2\n                *set battle_efficiency \"highest\"\n                *goto bravo\n          #\"Fire at will!\"\n            The men who are ready raise their muskets and start to choose targets.  The quickest among them take aim and fire, then they start to load as the slower men bring up their muskets.  \n            \n            Here comes the next rebel volley, their muskets rising to their shoulders in unison.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing around you in the twisting smoke.  A couple more men fall out of line and the rear ranks step forward to fill the gaps.  \n    \n            As the sound of the volley dissipates, the constant patter of the Union fire continues.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n            *set fire_at_will +1\n            *set regimental_strength -4\n            *set first_battalion -2\n            *set second_battalion -2\n            *set battle_efficiency \"high\"\n            *goto bravo\n      #Fire at will.\n        *image right3.png\n        *set map_trigger \"right3\"\n        \"Fire at will!\"  The guns are already loaded, and the men fire off a ragged volley.  You see the rebel flank quiver as they are hit by enfilade fire.  Men drop out of the ranks as they are hit.  The Confederate regiment fires a volley into the larger body of men in front of them.  You can see a rebel officer through the smoke as he pulls back the shattered left wing of his regiment to face your battalion.  \n        \n        Your men are loading at their own pace.  Cartridge out, bite off one end, poor the powder down the muzzle, then the ball after that.  Then the next step, ramming the ball and cartridge down to the bottom of the barrel.  You scan up and down the line as the faster men finish this step and raise the gun to their waists where they equip the hammer with a small brass percussion cap to trigger the charge.  \n            \n        Here comes the next rebel volley, their muskets rising to their shoulders in unison.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing around you in the twisting smoke.  A couple more men fall out of line and the rear ranks step forward to fill the gaps.  \n    \n        As the sound of the volley dissipates, the constant patter of the Union fire continues.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n        *set fire_at_will +1\n        *set regimental_strength -6\n        *set first_battalion -4\n        *set second_battalion -2\n        *set battle_efficiency \"medium\"\n        *goto bravo\n\n*label alpha\nOut of the corner of your eye, you see a messenger ride up to Colonel Willcox and salute.  You edge your horse nearer to the center of the regiment to hear what is said.\n\n\"General McDowell's compliments, Sir.  He requires all regiments to prepare to charge upon the signal.\"  \n\n\"Acknowledged, Major.  My compliments to the General.\"  He turns in your direction and makes eye contact with you before nodding.  \"1st $!{state}, prepare to charge!\"  he yells, and the order runs down the line both ways.  \n*choice\n  #Maintain fire.\n    Your battalion continues to load and fire their weapons as the rest of the force fixes bayonets.  You start to worry that you made the wrong choice, but it is too late.  The drums rattle a rapid cadence and the bugle cuts shrilly through the chaotic noise of the battle.  \n    *choice\n      #\"Charge!\"\n        The regiment lurches forward a few steps before breaking out into a run.  You spur your horse forward at a trot, traveling diagonally along the rear of the line so as not to overrun your own men.  The animal throws her head anxiously but obeys your command.  \n        \n        Most of the rebels are fixing bayonets now while some fire ineffectively into the charging force.  The whole Union flank is charging forward en masse.  As they near the enemy, a shout rises from your ranks, which carries backward and is taken up by the whole attacking force.  You feel the violent intensity of the warlike cry bone deep as you barrel toward the enemy.  The battle cry that must have graced a thousand battlefields, from antiquity to the middle ages to now.  \n        *fake_choice\n          #Take out my pistol.  \n            You pull your pistol out of its holster and cock back the firing hammer.  \n          #Take out my saber.  \n            You pull your sword from its sheath and brandish it above your head.  \n        \n        The blue lines crash into the gray with a force like a locomotive.  Cries of pain and fear mingle with the shouts of intense fury as the two sides grapple with one another.  In front of you, you watch as one of your men swings his musket like a club at a Confederate officer.  The officer takes the vicious blow in the side of the head and collapses in a heap.  Another Union soldier tries to swing his weapon, but the enemy's musket is loaded, and the attacker is brought down in a puff of smoke.  \n        *set regimental_strength -4\n        *set second_battalion -4\n        *goto charlie\n  #Fix bayonets.\n    \"Second Battalion!\" you roar at the top of your lungs, \"Fix bayonets!\"  The men obey without a word, four hundred hands going to their belts simultaneously.  The shining metal blades sweep upward to be affixed over the muzzles of the guns.  You see someone unceremoniously stealing the bayonet from one of the wounded bodies on the ground.  He must have lost his own during the march or traded it for something.  \n    *set fix_bayonets +1\n    *fake_choice\n      #Take out my pistol.  \n        You pull your pistol out of its holster and cock back the firing hammer.  \n      #Take out my saber.  \n        You pull your sword from its sheath and brandish it above your head.  \n    Now the bayonets are affixed and the men stand at the ready.  \"Charge… bayonets!\"  The men clumsily bring their weapons into the charge bayonets stance, holding them at waist height with the blades pointed forward like a row of pikes.\n    \n    The drums rattle a rapid cadence and the bugle cuts shrilly through the chaotic noise of the battle.  \n    *choice\n      #\"Charge!\"\n        The regiment lurches forward a few steps before breaking out into a run.  You spur your horse forward at a trot, traveling diagonally along the rear of the line so as not to overrun your own men.  The animal throws her head anxiously but obeys your command.  \n        \n        Most of the rebels are fixing bayonets now while some fire ineffectively into the charging force.  The whole Union flank is charging forward en masse.  As they near the enemy, a shout rises from your ranks, which carries backward and is taken up by the whole attacking force.  You feel the violent intensity of the warlike cry bone deep as you barrel toward the enemy.  The battle cry that must have graced a thousand battlefields, from antiquity to the middle ages to now.  \n        \n        The blue lines crash into the gray with a force like a locomotive.  Cries of pain and fear mingle with the shouts of intense fury as the two sides lunge and stab at one another.  In front of you, you watch as one of your men lunges at a Confederate officer who takes the bayonet in his belly.  The blue coat \"develops\" the strike with a twist of the bayonet that doubles up his victim, then yanks it out with unbalanced force.  The officer drops his pistol and crumples to the ground with dark red blood staining his fine, gray coat.  Another Union soldier tries to lunge, but the enemy's musket is loaded, and the attacker is brought down in a puff of smoke.  \n        *set regimental_strength -2\n        *set second_battalion -2\n        *goto charlie\n*label bravo\nLooking to the left, you see First Battalion and the rest of the Union force fixing bayonets.  The glint of two thousand shining blades coming out can hardly be missed.  They must be planning to charge.  \n*choice\n  #Maintain fire.\n    Your men continue loading and firing as the main force charges bayonets.  The drums rattle a rapid cadence and the bugle cuts shrilly through the chaotic noise of the battle.  You see thousands of men charge forward en masse.  A shout rises from their ranks that sends a chill up your spine with its violent intensity.  The same battle cry must have graced a thousand battlefields, from antiquity to the middle ages to now.  \n    *choice\n      #\"Battalion, charge!\"\n        Your men shout ascent and charge forward to join the brawl.  The main blue lines crash into the gray with a force like a locomotive.  Cries of pain and fear mingle with the shouts of intense fury as the two sides lunge and stab at one another.  Your own battalion smashes into the rebel's flank as they try to resist the main attack.  A whole rebel company on the flank in enveloped by the Union forces as the rest of the line shrinks away from the flank attack.  Being surrounded and imperiled, these men throw down their muskets and surrender.  \n        *set regimental_strength -4\n        *set second_battalion -4\n        *goto charlie\n      #\"Battalion, hold position!\"\n        From your vantage point on the right, you see the blue lines crash into the gray with a force like a locomotive.  Cries of pain and fear mingle with the shouts of intense fury and the clang of metal as the two sides lunge and stab at one another.  The sheer force of the charge drives the gray lines back a few paces, and the momentum pushes them further.  The Union men in the front have no option to let up, as the men behind push forward and drive the attack on.  \n        *set regimental_strength -2\n        *set first_battalion -2\n        *goto charlie\n  #Fix bayonets.\n    \"Second Battalion!\" you roar at the top of your lungs, \"Fix bayonets!\"  The men obey without a word, four hundred hands going to their belts simultaneously.  The shining metal blades sweep upward to be affixed over the muzzles of the guns.  You see someone unceremoniously stealing the bayonet from one of the wounded bodies on the ground.  He must have lost his own during the march or traded it for something.  \n    *set fix_bayonets +1\n    *fake_choice\n      #Take out my pistol.  \n        You pull your pistol out of its holster and cock back the firing hammer.  \n      #Take out my saber.  \n        You pull your sword from its sheath and brandish it above your head.  \n    Now the bayonets are affixed and the men stand at the ready.  \"Charge… bayonets!\"  The men clumsily bring their weapons into the charge bayonets stance, holding them at waist height with the blades pointed forward like a row of pikes.\n    \n    The drums rattle a rapid cadence and the bugle cuts shrilly through the chaotic noise of the battle.  \n    *choice\n      #\"Battalion, charge!\"\n        Your men shout ascent and charge forward to join the brawl.  The main blue lines smash into the gray ones with a force like a locomotive.  Cries of pain and fear mingle with the shouts of intense fury as the two sides lunge and stab at one another.  Your own battalion smashes into the rebel's flank as they try to resist the main attack.  A whole rebel company on the flank in enveloped by the Union forces as the rest of the line shrinks away from the flank attack.  Being surrounded and imperiled, these men throw down their muskets and surrender.  \n        *set regimental_strength -2\n        *set second_battalion -2\n        *goto charlie\n\n\n*label charlie\n*if battle_efficiency = \"highest\"\n  Already softened up by the musket fire, the rebels are crumbling before the Union bayonets.  \n  *set regimental_strength -3\n  *set first_battalion -3\n*if battle_efficiency = \"high\"\n  Already softened up by the musket fire, the rebels are crumbling before the Union bayonets.  \n  *set regimental_strength -4\n  *set first_battalion -4\n*if battle_efficiency = \"medium\"\n  Already somewhat softened by the musket fire, the rebels are breaking before the Union bayonets.  \n  *set regimental_strength -5\n  *set first_battalion -5\n*if battle_efficiency = \"low\"\n  The rebels are giving back from their position, but fighting furiously.  \n  *set regimental_strength -7\n  *set first_battalion -7\n*if battle_efficiency = \"lowest\"\n  The rebels are giving back from their position, but fighting furiously.  \n  *set regimental_strength -8\n  *set first_battalion -8\n\nThe rebel regiment cannot take the overwhelming force of the Union charge.  They are outnumbered at least three to one.  Some throw down their muskets and surrender to the U.S. soldiers, while a greater number break and run in all directions.  You can hear the officers haranguing their men to reform in the familiar southern twang.  \n*if background = \"Career Soldier\"\n  It strikes a strange cord in your mind.  In all your years of military training, you had never imagined to be fighting an enemy that speaks English.  \nA bright red uniform catches your eye, and you look down at a wounded man on the ground.  He is a Confederate Zouave, with a red coat, blue jacket, and baggy, striped trousers.  One of the legs is red with blood.  He motions to you and you dismount.  \n\n\"Suh,\" says the man in a pained grunt, then gives you a gap toothed grin.  \"Could I get me a taste a' watuh, or something stronguh if ya have it.\"  \n*choice\n  #Give him your canteen.\n    The man takes the canteen and drinks off a big swig before reluctantly returning it.  \n    *choice\n      #\"What unit were you with?\"\n        \"Loosiana Tiger Rifles.  Look here, Yank.\"  He removes his tassled red cap and holds it up with another toothless grin.  There is an embroidered slogan running around the rim of the article.  It reads: [i]Tiger in Search of a Black Republican.[/i]  \"Whatchee think, Yankee?  Hee hee!\"  \n        *goto golf\n      #Leave him.  \n        *goto foxtrot\n  #\"What unit were you with?\"\n    \"Loosiana, Tiger Rifles.  Look here, Yank.\"  He removes his tassled red cap and holds it up with another toothless grin.  There is an embroidered slogan running around the rim of the article.  It reads: [i]Tiger in Search of a Black Republican.[/i]  \"Whatchee think, Yankee?  Hee hee!\"  \n    *label golf\n    *choice\n      #\"God is with us.  We will bring you to account for your evil.\"  \n        \"I ain't scared a' God.  He ain't never hindered me none.  If you love them darkies so much, why'nt you marry one?\"  \n        *label hotel\n        *choice\n          *if chat1 = \"yes\"\n            #\"I can send you to Hell right now, if you wish.\"  \n              His eyes grow wide as you hold out your saber.  \"No no, don't you do dat dere.  No no.\"  \n              *set chat1 \"no\"\n              *goto hotel\n          #Stab him.\n            You hold your saber over his chest.  \"No no no, wait!\"  With steady force, you push the point of the blade into his belly just below the ribcage, continuing until you feel it stick in the dirt beneath him.  Thick, red blood wells up around the blade's entry point and the man gasps with pain.  With a quick movement, you twist the blade, causing him to wrench sharply, and then you pull it free.  He coughs and gags painfully as you wipe the blade on his jacket.  He is not dead yet, but you suppose you have made your point.  \n            \n            *goto foxtrot\n          #Leave.\n            *goto foxtrot\n      #\"I will see you traitors hang.\"  \n        He spits on your boot.  \"Go to Hell!\"  \n        *goto hotel\n      #Leave.\n        *goto foxtrot\n*label foxtrot\n*achieve tiger\nThe Union infantry around you are cheering and waving hats in the air.  The Yankee officers are riding amongst the chaos shouting orders that are largely unheeded.  \"Reform companies!  Reform, damn you!\"  The men are too excited.  Some are moving forward to push the attack, while others are sitting down, or robbing the prisoners.  \n*choice\n  #\"Second Battalion, reform on me!\"\n    With much yelling and effort, as well as the assistance of your officers and NCOs, you manage to extricate the majority of your battalion from the excited group of Union soldiers.  \"form lines!  Attention!\"  \n    \n    You see a half dozen officers ride up on horses and survey your unit.  After a moment's hesitation, you snap to attention and salute General McDowell.  He returns a perfunctory salute, \"Major, take your men north and attack the fence line.\"  \n    *choice\n      #\"Yes Sir!\"  \n        He turns to an officer beside him, \"We have broken the flank, now we must drive them from the field.  Ride to Colonel Burnside and desire him to advance upon the hill…\"  They ride out of your range of hearing as they talk.  \n        \n        \"Forward, march, Sir?\"  You glance down and see the grizzled old Sergeant Major looking placidly up at you.  \n        *choice\n          #\"Yes.  Thank you, Sergeant Major.\"  \n            He nods, \"Battalion!  Forward at quick time, march!\"  The majority go forward while some lag behind.  \"Forward, you god damned parlor soldiers!  Lickety split!\"  He slugs an erring private in the ear, before pushing him forward into line.  \n            *goto delta\n          #\"Battalion, forward march!\"  \n            The majority of the battalion marches forward, while some lag behind.  \"Forward, you god damned parlor soldiers!  Lickety split!\"  The Sergeant Major slugs an erring private in the ear, before pushing him forward into line.  \n            *goto delta\n  #Let them blow off some steam.  \n    You sit back in your saddle and watch the men as they cheer.  \"Hip hip, huzzay!\"  One overly excited private looks up at you, \"We done it, Sir!  We done it!\"  Addressing an officer is usually a serious offense, but it may be an extraordinary circumstance.  \n    *fake_choice\n      #\"Well done, soldier.\"\n        He grins and takes off his hat to you.  \n      #Act like you did not hear the breach in discipline.\n        He grins sheepishly and turns away.  \n      #\"Sergeant, take that man's name.\"\n        The soldier's grin dies away as he looks warily at his sergeant.  \n        \n    You see a half dozen officers ride up on horses and survey your unit.  After a moment's hesitation, you snap to attention and salute General McDowell.  He returns a perfunctory salute, \"Major, take these men in hand.  Once you bring them into order, take them north and attack the fence line.\"\n    *choice\n      #\"Yes Sir!\"  \n        He turns to an officer beside him, \"We have broken the flank, now we must drive them from the field.  Ride to Colonel Burnside and desire him to advance upon the hill…\"  They ride out of your range of hearing as they talk.  \n        \n        \"Attention, Sir?\"  You glance down and see the grizzled old Sergeant Major looking placidly up at you.  \n        *choice\n          #\"Yes.  Thank you, Sergeant Major.\"  \n            He nods, \"Battalion, attention!  You god damned parlor soldiers, get you into lines!  Stand up, you good-fornothin' sluggard!  Put your damn hat on or I'll show you what for to follow orders!\"  \n            \n            Once they are in lines, you call out, \"Forward at the quick time, march!\"  The regiment marches forward in something like order.  \n            *goto delta\n          #\"Battalion, stand at attention!\"\n            The Sergeant Major supports you with a rather more invective speech, \"Battalion, attention!  You god damned parlor soldiers, get you into lines!  Stand up, you good-fornothin' sluggard!  Put your damn hat on or I'll show you what for to follow orders!\"  \n            \n            Once they are in lines, you call out, \"Forward at the quick time, march!\"  The regiment marches forward in something like order.  \n            *goto delta\n\n*label delta\nYou spur your horse forward at a walking pace behind your men.  Looking to the left, you see two other units, more or less battalion sized, being driven forward by officers.  Behind them, the larger disorganized mass of men roils in chaos.  \n\nUp ahead, to the north, you see a similar scene of order from chaos.  Large groups of rebels are fleeing down the far side of the ridge, or into the copse of trees in the farmyard.  Officers and NCOs are forming large groups of the more duty-conscious men into organized units.  These units form a line on the far side of the fence, facing your advance.  Some of them are attempting to fire volleys, but more of them are firing in an undisciplined fashion.  \n\nYou hear a ricochet nearby and wince as it bounces up into a Sergeant's face.  Blood splatters out and he drops forward on the ground, his arms twitching disturbingly.  You see thick globs of blood clinging to blades of grass around his head.  \n\nThe rebel line is now less than one hundred yards ahead of you.  You can see the bearded faces of your adversaries as they furiously load their weapons.  \n*choice\n  #\"Battalion halt!\"\n    \"Halt!  Halt!\"  The unit stops marching, and the shouldered muskets sway slightly as the men fidget into a straighter line.  \n    *choice\n      #\"Ready!\"\n        The men obediently shift their grasp to bring the muskets into a vertical position in front of them, with the bayonets pointing up over the brims of their hats.  \n        *choice\n          #\"Aim!\"\n            Now, the battalion shifts their grips to bring the musket butts into their shoulders, with muzzles pointed downrange.  Silence fills the air, and in it you can hear the distant whinnying of a horse.  A long wisp of dust is carried lazily through the air in front of you.  \n            *choice\n              #\"Fire!\"\n                The sound of the volley erupts and the whole scene in front of you disappears in smoke.  \"Reload!\" you cry, your command seconded by your officers.  Your horse stomps her feet expectantly and you automatically stroke her neck to calm her.  \n                \n                As the smoke of the volley dissipates, you see the field before you almost empty.  The fence is abandoned and the rebel units are running away, disappearing into the trees or down the far side of the ridge.  A few blood stained bodies are leaning or hanging on the fence boards.  \n                *choice\n                  #\"Shoulder arms!  Forward march!\"  \n                    The battalion moves forward across the road and toward the fence.  It is undefended, but rebel sharpshooters are still firing from the windows of the farmhouse.  On the far side of the building, you can see the two Confederate howitzers, abandoned by their gun crews.  \n                    *set regimental_strength -2\n                    *set second_battalion -2\n                    *goto echo\n  #\"Battalion, charge bayonets!\"\n    \"RAH!\" shouts the battalion in unison, bringing their muskets down to the charged position, bayonets forward.  You will not countenance the ragtag defense in front of you.  Acting to keep your momentum, you give the order.  \"Battalion, charge!\"  The drum rolls aggressively and the men shout as they start running forward at the fence.  You spur your horse into a quick trot to keep up with the line.  \n    \n    The rebels fire a ragged volley which nips at your line, dropping a few men, but they do not wait for the smoke to clear to see its effect.  You can see them running like hares, sprinting for the cover of the trees or simply down the far side of the ridge as fast as they can.  \n    \n    Your men reach the abandoned fence and halt, some firing into the retreating ranks of the enemy while others cheer.  A few blood stained bodies are leaning or hanging on the fence boards, but it is otherwise deserted by the enemy.  The fence may be undefended, but rebel sharpshooters are still firing from the windows of the farmhouse.  On the far side of the building, you can see the two Confederate howitzers, abandoned by their gun crews.  \n    *set regimental_strength -5\n    *set second_battalion -5\n    *goto echo\n\n\n\n*label echo\n*choice\n  #Storm the house with infantry\n    \"Come on, boys!  Storm the house, let's go!\"  Many of the men are cheering excitedly, but enough are still in discipline to form a platoon around you.  \"Forward, now!\"  The group rushes up toward the front porch of the house.  Glancing up, you see a rebel looking out of a second story window.  \"Look out, Yankees are comin' in!  Guard the door!\"  \n    \n    Leading the way onto the porch, you brace yourself against a wooden post and kick the door down.  Two rebel muskets fire but you are not hit.  Charging into the smoke, you pistol one man and the other throws down his musket in surrender.  The platoon fans out to clear the first floor, and you follow two of your men upstairs.  At the top of the stairs is a rebel who is so startled that he does nothing as the leading Union soldier drives a bayonet into his stomach.  \n    \n    You follow the other man through a door on the right and two rebels turn their muskets on you.  You shoot the one on the right with your pistol and the other one shoots your comrade.  Then he rushes you, using the musket as a club to knock the pistol aside.  It flies out of your hand and across the room.  Ducking his next swing, you throw your weight against his legs and barrel him down.  His head hits the floor hard and the musket skates across the room.  \n    \n    The rebel is not beaten, however, and he hits you twice in the head before you can get your guard up.  He turns over and starts to crawl away.  \n    *set regimental_strength -1\n    *set second_battalion -1\n    *fake_choice\n      #Go for my pistol.  \n        Standing up, you stagger over to where you think your pistol went.  You see it laying by a half full bookcase and you grab it.  Turning, you see the man charging you with musket in hand, ready to club you to death.  In a heartbeat, you bring up your gun and fire twice.  The bullets hit him in the chest and stomach and he tumbles down at your feet.  Rolling over, you see his bearded face staring up at you, eyes wide and mouth open, sucking for air as blood wells up in it.  \n      #Try to take his bayonet.  \n        Lunging forward, you grab the long saber bayonet in his belt.  He rolls over and tries to wrest the weapon away from your grasp.  You yank on it which cuts his reaching hand, and he recoils in pain.  You seize the moment of vulnerability and drive the blade into his groin.  The man  screams with pain and writhes like an animal in a trap.  You pull the blade free and drive it into his chest with the strength of both arms.  His cries are cut short as the blade punctures his vitals and stabs into the floor.  \n      #Attack him with your hands before he recovers.  \n        Lunging forward, you grab his hair and slam his head into the wooden floor twice.  He wriggles free and rolls over to fight back.  You punch him in the face and then grab his throat.  You squeeze painfully hard and feel your gloved fingers pushing deep into the soft flesh of his neck.  His face turns red as he swings his fists up at you in impotent fury.  You start to slam his head against the floor over and over with all your strength.  As you slam it again and again, the man's attacks grow feebler.  At last, he goes limp and ceases to resist.  You let go and look at your gloves with shock at your own ferocity.  \n    \n    Three Union soldiers come through the door and join you.  You are ready to go through the next door when it opens and you hear a southern accent, \"We give up, don't shoot us!\"  Three muskets are tossed through the door into the room you are in.  \"We comin' out, don't shoot.\"  You control the house, now.  \n    \n    Looking out a window on the northeast side of the building, you see Burnside's Brigade attacking up the hill and driving off the last of the rebel right wing.  \n    *goto win\n  #Sieze the howitzers and turn them on the house.\n    \"Man the guns!  Turn them on the house!\"  The officers around you start shouting the order and gathering groups of men to operate the guns.  Many of the men are cheering excitedly, but enough are still in discipline to follow you and they man the weapons.  You pile in to help turning one of the howitzers, gripping the wheel and pulling with all your might.  The men groan with the joint effort and the gun is traversed back from the fence and then left to face the building.  A private behind you keeps stepping on the heels of your boots as you back up.  \n    \n    Now the weapons are in place and you can almost feel the apprehension of the rebels in the house.  Stepping back, you see the men clumsily loading the cannons.  They sponge the barrels then place the charge and the shell in the muzzle.  A knowledgeable sergeant is directing the men in the loading process.  Now the shells are rammed down and the men step out of the way.  \n    \n    \"Fire!\"  The men pull the lanyards and the house disappears behind a huge plume of smoke.  Two explosions reverberate in the air and you peer through the haze.  The nearest wall of the house is caved in and debris is still falling from the second story.  The rebel fire has stopped, and you see a few men fleeing out of the ruined structure, where they are captured by the Union units on the fence line.  \n    \n    Now looking to the northeast, you see Burnside's Brigade attacking up the hill and driving off the last of the rebel right wing.  \n    *set regimental_strength -1\n    *set second_battalion -1\n    *goto win\n\n*label win\nSome minutes after the fight is over, as you are rallying your men back into a cohesive unit, you see Colonel Willcox riding toward you with his staff officers in tow.  \"Move forward and make sure those rebels do not reform!  Move to the edge of the ridge and no further.  Find a defensive position and wait for orders.  General McDowell has sent for me.  I will return to you as soon as I may.\"  A smile breaks out on his face and he takes your hand, shaking it vigorously.  \"God bless us, Major!  A hard morning's labor, but it was well done.  Carry on.\"  \n*page_break\n*goto_scene ridge", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set first_name \"Thomas\"\n*set surname \"Spears\"\n*set background \"soldier\"\n*set state \"Massachusetts\"\n*set regimental_commander \"Maj. Thomas Spears\"\n*set portrait \"b1\"\n*set regimental_strength \"635\"\n*set officers \"27\"\n*set first_battalion \"343\"\n*set second_battalion \"292\"\n*set second_battalion_commander \"Capt. Ian Clarkson\"\n*set c_company_commander \"1st Lt. Michael German\"\n*set d_company_commander \"1st Lt. James Tillard\"\n*set west_skirmishers \"yes\"\n*set west_skirmish_company \"F\"\nThe rebel volley smacks hard, the erupting noise feeling like a slap in the face.  Something whizzes past your ear like a hornet, and you suppose you were mere inches away from a trip to kingdom come.  Looking at your own men, you see a disorganized loading process.  Their movements are slower now with exhaustion, and some are forced to beg for cartridges from the man next to them.  Ammunition is running low.  The fastest men raise their muskets and fire a second time. \n\nThe rebels let out another terrible screeching howl as they charge bayonets.  The rows of glittering steel blades are pointed forward like spears.  \"Charge!\" shouts their officer, and they start to run forward, barreling toward the little stream that stands between you.  \n*fake_choice\n  #Counter charge and meet them in the stream.\n  #Shoot them as they cross.\n  #Withdraw to the north.\n\n*script changeBackgroundColor(\"black\")\n\n*set first_name \"Frederick\"\n*set surname \"Weber\"\n*set background \"Prussian revolutionary\"\n*set state \"Illinois\"\n*set regimental_commander \"Col. Orlando Willcox\"\n*set portrait \"g5\"\n*set regimental_strength \"755\"\n*set officers \"29\"\n*set first_battalion \"374\"\n*set second_battalion \"380\"\n*set second_battalion_commander \"Maj. Frederick Weber\"\n*set b_company_commander \"Capt. William Withington\"\n*set c_company_commander \"Capt. Ebenezer Butterworth\"\n*set d_company_commander \"Capt. Ian Clarkson\"\n*set west_skirmishers \"no\"\n*set west_skirmish_company \"\"\nThe blue lines smash into the gray ones with a force like a locomotive.  Cries of pain and fear mingle with the shouts of intense fury as the two sides lunge and stab at one another.  In front of you, you watch as one of your men lunges at a Confederate officer who takes the bayonet in his belly.  The bluecoat 'develops' the strike with a twist of the bayonet that doubles up his victim, then yanks it out with unbalanced force.  Another Union soldier tries to lunge, but his rebel target drops him with a point blank musket shot.  \n*fake_choice\n  #Try to get a shot with your pistol.  \n  #Wade in and get your sword bloody.  \n  #Stay back and observe the battle.  \n\n*script changeBackgroundColor(\"sepia\")\n\n*set first_name \"Elliot\"\n*set surname \"Dietrich\"\n*set background \"Prussian revolutionary\"\n*set state \"Ohio\"\n*set regimental_commander \"Col. Orlando Willcox\"\n*set portrait \"m3\"\n*set regimental_strength \"764\"\n*set officers \"30\"\n*set first_battalion \"384\"\n*set second_battalion \"380\"\n*set second_battalion_commander \"Maj. Elliot Dietrich\"\n*set i_company_commander \"1st Lt. John Hatcher\"\nA young Lieutenant sprints up to you from the left, \"Sir, Colonel Willcox is going to order a charge of the entire regiment.  He bids you prepare to charge on his command.\"  He salutes and you return the gesture in acknowledgment.  \n\n\"Battalion, fix bayonets!\" you shout.  The men pull bayonets out of their belts and attach them to the end of their muskets.  As you wait for the order, the two rebel howitzers fire almost simultaneously.  A huge plume of smoke obscures them and the metallic bang makes you wince.  The cannister shot tears a gap in your line, with smoke and dust rising from the ground in a long line from the guns to your unit.  The dead and wounded from the blast crumple in the grass and the men around them try to reform their ranks.  \n\n\"Sir,\" yells Captain Bowles beside you over the din of sound.  \"Where are we charging?  I mean, what is our target?  I can tell the company commanders.\"  \n*fake_choice\n  #\"Everyone attack the infantry behind the fence line.\"  \n  #\"Companies I and K, attack the cannons.  Everyone else, attack the infantry.\"  \n  #\"The whole battalion will swing right to attack the artillery crews.\"\n\n*set first_name \"Liam\"\n*set surname \"Murphy\"\n*set background \"Irish nationalist\"\n*set state \"New York\"\n*set regimental_commander \"Maj. Liam Murphy\"\n*set portrait \"mc2\"\n*set regimental_strength \"780\"\n*set officers \"31\"\n*set first_battalion \"391\"\n*set second_battalion \"389\"\n*set second_battalion_commander \"Capt. William Withington\"\n*set b_company_commander \"1st Lt. Elliot Griffith\"\n*set i_company_commander \"Capt. Daniel Hubbard\"\n\"Yes Sir, I am a painter.  It is a passion of mine; to create beautiful images that reflect the world around us.  Do you find yourself moved by any such passion, Sir?\"\n*fake_choice\n  #\"Patriotism is my great passion.  I love the Union and I will lay down my life for her, if needs be.\" \n  #\"Politics is where my passion lies.  I want to make the world a better place.\"  \n  #\"Women have been known to move my heart, on occasion.  \n  #\"The arts are a worthy passion, and I believe I share that with you.  Be it words on a page or brush strokes on canvas, there is something marvelous about it.\"  \n  #\"God is my greatest devotion.  All life flows from Him, and we are but players on the grand stage of His making.\"  \n  #\"My heart belongs to Ireland.  My greatest wish is to return to Erin someday, and free my countrymen from the English yoke.\"\n\n*set first_name \"Robert\"\n*set surname \"Auclair\"\n*set background \"State Senator\"\n*set state \"Tennessee\"\n*set regimental_commander \"Maj. Robert Auclair\"\n*set portrait \"c1\"\n*set regimental_strength \"753\"\n*set officers \"30\"\n*set first_battalion \"379\"\n*set second_battalion \"374\"\nUp the hill and toward the fence, the whole brigade charges forward into the hail of bullets.  The cannons roar again and you hear whistling lead and blood-curdling screams, but these sounds are drowned by the roar of shouting men, two thousand strong.  The angry shout of defiance as men charge forward to death and glory, in unspoken agreement to run the great risk together.  \n\nA few muskets are discharged from the fence with feeble bursts of smoke.  You see the wide and terrified eyes of the defenders.  The soldiers in front of you crash headlong into the fence, which bows from the impact.  It is an obstacle through which the men do vicious battle.  The Union bayonets plunge between the wooden boards to be caught or parried by defenders, or to drive home into flesh.  \n*fake_choice\n  #Climb the fence and lead the way forward.\n  #Fire your pistol through the fence.\n  #Shout to the men to tear down the fence.  \n\n*set first_name \"Allen\"\n*set surname \"Morse\"\n*set background \"Soldier\"\n*set state \"Vermont\"\n*set regimental_commander \"Col. Orlando Willcox\"\n*set portrait \"b7\"\n*set regimental_strength \"738\"\n*set officers \"29\"\n*set first_battalion \"361\"\n*set second_battalion \"377\"\n*set second_battalion_commander \"Maj. Allen Morse\"\n*set b_company_commander \"Capt. William Withington\"\n*set i_company_commander \"1st Lt. John Hatcher\"\nYou continue forward into the smoke and chaos.  Now you are at the fence line and the last of your battalion is vaulting over.  A few of the rebel gunners stand and fight, but many more are fleeing in terror.  Your head swoons again and you grip the fence to hold yourself up. \n\nGathering your reviving strength and focus, you vault the fence and join the rest of your battalion.  The howitzers are silent now and the gun crews are vanishing into the trees behind them.  The wooden farm house is on your right now, and muskets are firing down on your men from the upper windows and loopholes.  \n*fake_choice\n  #Turn the cannons on the house.  \n  #Storm the house with infantry.\n\n*set first_name \"Neil\"\n*set surname \"Wilkerson\"\n*set background \"State Senator\"\n*set state \"New Mexico\"\n*set regimental_commander \"Maj. Neil Wilkerson\"\n*set portrait \"g1\"\n*set regimental_strength \"672\"\n*set officers \"23\"\n*set first_battalion \"330\"\n*set second_battalion \"342\"\n*set second_battalion_commander \"Capt. Ian Clarkson\"\n*set b_company_commander \"1st Lt. Elliot Griffith\"\n*set c_company_commander \"1st Lt. Michael German\"\n*set d_company_commander \"1st Lt. James Tillard\"\n*set i_company_commander \"2nd Lt. Raymond Dobbins\"\n*set company_L \"1st\"\n\"Volley fire at my command!  Ready!\" you shout at the top of your lungs.  \"Aim!\"  The muskets come up, the stocks resting in each man's shoulder.  The men become almost completely still, trying to control their breathing and choosing their marks.  A short distance away, the rebel muskets come up, mirroring your own command.  \"Fire!\"  Your line erupts in the roar of 200 muskets fired in unison, and you feel the hair of your arms stand up.  The wall of smoke pours forward up the hill, obscuring your position.\n*fake_choice\n  #\"Load!\"\n  #\"Fix bayonets!\"\n  #\"Lay down!\"\n\n*set first_name \"Sean\"\n*set surname \"Kemsley\"\n*set background \"Irish Nationalist\"\n*set state \"Iowa\"\n*set regimental_commander \"Maj. Sean Kemsley\"\n*set portrait \"m1\"\n*set regimental_strength \"748\"\n*set officers \"28\"\n*set first_battalion \"376\"\n*set second_battalion \"372\"\n*set second_battalion_commander \"Capt. William Withington\"\n*set d_company_commander \"Capt. Ian Clarkson\"\n*set i_company_commander \"Capt. Daniel Hubbard\"\n*set company_L \"\"\nNow you are charging straight into the rebel line!  Their muskets come up and their Colonel shouts the order, \"Fire!\"  The smoke pours out and you feel the pressure of the discharge like getting smacked by a door.  You see the form of a man holding his bayonet forward like a spear, hoping a Union soldier will skewer himself in his haste.  You do not oblige him.  Sweeping the muzzle away to the left, you swipe your sword back with an offhand blow that gashes the man's elbow and causes him to drop the weapon.  \n\nYour eyes water from the smoke as you lunge at another soldier repeatedly, forcing him to step back and back, blocking your attacks with his musket stock.  A friendly sergeant on your right comes in growling like an angry dog, and swings his musket overhand like a sledgehammer to finish off the rebel.  \n\nThe enemy Colonel raises his pistol and fires, killing the Union sergeant.  In his right hand is a saber, and he wears a blue coat.  His eyes meet yours and he flourishes his sword with practiced ease in a gentlemanly challenge.  \n*fake_choice\n  #Accept the duel.\n  #Decline the duel.\n  #Shoot him with your pistol.", "startup": "*title First Bull Run\n*author Dan Rasmussen\n*scene_list\n  startup\n  march\n  battle\n  $ left\n  $ center\n  $ right\n  $ ridge\n  $ henry_hill\n  $ frontal_attack\n  $ flank\n  $ rescue\n  $ battle_conclusion\n  $ captured\n  $ historical_summary\n*create surname \"\"\n*create first_name \"\"\n*create state \"\"\n*create state_temp \"\"\n*create background \"\"\n*create portrait \"\"\n*create stat_trigger \"no\"\n*create battle_outcome \"0\"\n*create map_trigger \"0\"\n*create map_trigger1 \"no\"\n*create hill \"no\"\n*create report \"no\"\n*create attack \"center\"\n*create regimental_strength \"780\"\n*create officers \"31\"\n*create first_battalion \"391\"\n*create second_battalion \"389\"\n*create regimental_commander \"\"\n*create first_battalion_commander \"Capt. Charles Lum\"\n*create second_battalion_commander \"Capt. William Withington\"\n*create b_company_commander \"1st Lt. Elliot Griffith\"\n*create c_company_commander \"Capt. Ebenezer Butterworth\"\n*create d_company_commander \"Capt. Ian Clarkson\"\n*create e_company_commander \"Capt. Wayne Roth\"\n*create i_company_commander \"Capt. Daniel Hubbard\"\n*create k_company_commander \"Capt. William Graves\"\n*create fourth_alabama_morale \"10\"\n*create cheek_wound \"no\"\n*create south_skirmishers \"no\"\n*create west_skirmishers \"no\"\n*create south_skirmish_company \"\"\n*create west_skirmish_company \"\"\n*create company_L \"no\"\n*create company_L_strength \"0\"\n*create willcox \"\"\n*create battle_plan \"\"\n*create backup_plan \"\"\n*create frontal_attack \"no\"\n*create cover_flank \"no\"\n*create rescue \"no\"\n*create ricketts_battery \"\"\n*create friendly_fire \"\"\n*create lt_wounded_trigger \"no\"\n*create lt_wounded_trigger2 \"no\"\n*create lt_killed_trigger \"no\"\n*create lt_killed_trigger2 \"no\"\n*create minnesota_regiment \"1st Minnesota\"\n*create stretcher_detail \"no\"\n*create canteen \"\"\n*create concussion \"no\"\n*create hip_cut \"no\"\n*create volleys \"0\"\n*create fire_at_will \"0\"\n*create fix_bayonets \"0\"\n*achievement stalemate visible 100 Gold Medal\n  Achieve the best army outcome possible.\n*achievement orderly_retreat visible 100 Silver Medal\n  Achieve the second best army outcome.\n*achievement colonel visible 50 Promotion\n  Earn a promotion.\n*achievement ricketts visible 100 Captain Ricketts\n  Hidden\n  Save Ricketts' Battery.\n*achievement hero visible 100 Hero\n  Hidden\n  Rescue Colonel Willcox on Henry Hill.\n*achievement flank visible 100 Flank Guard\n  Hidden\n  Protect the army's right flank.\n*achievement captured visible 50 Go Down Swinging\n  Fight to the bitter end.\n*achievement volley visible 50 Volley Fire\n  Volley fire three times.\n*achievement fire_at_will visible 50 Fire At Will\n  Fire at will three times.\n*achievement fix_bayonets visible 50 BAYONETS!\n  Fix bayonets three times.\n*achievement careful visible 50 Careful Commander\n  Keep your soldiers alive.\n*achievement recruiter visible 25 Recruiter\n  Recruit an eleventh company.  \n*achievement overeager visible 25 Overeager\n  Charge with Burnside's Brigade.\n*achievement full_report visible 25 Full Report\n  Give Willcox a full report of the battlefield.\n*achievement obey visible 25 Salute the Rank\n  Respectfully obey Colonel Ward's instructions.\n*achievement duel visible 25 Dueler\n  Duel a Confederate officer.\n*achievement survive_cannon visible 25 Grapeshot Survivor\n  Survive a cannister shell at point blank range.\n*achievement tiger visible 25 Wheat's Tigers\n  Meet a member of Wheat's Louisiana Tigers. \n*achievement marston visible 25 Colonel Marston\n  Speak to Colonel Gilman Marston of Burnside's Brigade.\n\n*if choice_is_omnibus_app\n    *comment skip description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Lead your troops in desperate, brutal Civil War combat!  Fight to end slavery and preserve the Union!  Earn promotion through impetuous bravery or tactical brilliance.  Stand in the battle line or fix bayonets!  \n\n    [i]First Bull Run[/i] is an 88,000-word interactive novel by Dan Rasmussen. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n    The fledgling Union Army is yet to meet the Confederates in a major battle.  The north expects a swift and decisive victory, but they are overconfident.  They will soon discover the brutal, drawn-out nature of industrial warfare.  \n\n    As a regimental commander in the Union Army, you must navigate a series of desperate decisions to keep your men alive and prevent military disaster.  Face down howling artillery shells, massive musket volleys, and vicious hand to hand combat with bayonets and sabers.  \n\n    Serve alongside the real officers and regiments who fought at First Bull Run in this historically accurate depiction of the battle.  Manage twelve real subordinate officers who live or die by your decisions!  Will you capture howitzers and turn them on the enemy, or storm their positions with infantry?  Will you deploy your companies as skirmishers or concentrate your forces for the attack?  \n\n    • Customize your character with 30 portraits and 4 distinct backstories--professional soldier, political leader, German revolutionary, or Irish nationalist.\n    • Personalize your regiment to be from any of 21 different states and territories, all chosen based on historical research.\n    • Guide the army with a plan of attack.  Support exhausted units, try to outflank the enemy, or charge up the middle.\n    • Balance multiple priorities while under enemy fire.  Face real consequences: mistakes will cost lives.  \n    • Keep track of your regiment with a detailed, highly interactive stats screen.  Watch your battalions lose strength with each volley you receive, and see junior officers step up to fill the roles of killed or wounded superiors.  \n    • Attack aggressively or outthink your enemy.  Tailor your strategy to the situation.  Shoot morale-breaking volleys, fire at will for maximum damage to personnel, or fix bayonets and charge the enemy.  \n    • Select companies to deploy as skirmishers.  S
