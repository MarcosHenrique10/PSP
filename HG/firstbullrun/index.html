\n  *image henry_hill3.2.png\n  *set map_trigger \"henry_hill3.2\"\n  *goto image2\n*if surname = \"Clark\"\n  *image henry_hill3.3.png\n  *set map_trigger \"henry_hill3.3\"\n  *goto image2\n*if surname = \"Wilkerson\"\n  *image henry_hill3.4.png\n  *set map_trigger \"henry_hill3.4\"\n  *goto image2\n*if surname = \"Morse\"\n  *image henry_hill3.5.png\n  *set map_trigger \"henry_hill3.5\"\n  *goto image2\n*if surname = \"Dietrich\"\n  *image henry_hill3.6.png\n  *set map_trigger \"henry_hill3.6\"\n  *goto image2\n*if surname = \"Murphy\"\n  *image henry_hill3.7.png\n  *set map_trigger \"henry_hill3.7\"\n  *goto image2\n*if surname = \"Auclair\"\n  *image henry_hill3.8.png\n  *set map_trigger \"henry_hill3.8\"\n  *goto image2\n*else\n  *image henry_hill3.9.png\n  *set map_trigger \"henry_hill3.9\"\n  *goto image2\n*label image2\n*choice\n  #\"Captain Bowles, what regiment is that?\"\n    Bowles takes out a pair of binoculars.  \"Sir, I do not recognize them.  They might be the ${minnesota_regiment}.\"  \n    *choice\n      #\"Yes, perhaps.  Let us find Colonel Willcox.\"  \n        \"Yes Sir, replies your adjutant.  \n        *goto willcox\n      #\"I do not think so.  I don't recognize them.\"  \n        \"Yes…\" replies your adjutant uncertainly.  \"Perhaps they are from Sherman's brigade?  Keyes' or Schenck's brigades?\"  \n        *choice\n          #\"Well, they must be our own troops.  Never mind.\"\n            \"Very well, Sir.\"  \n            *goto willcox\n          #\"I think they are rebels.  We shouldn't have any troops in that area.  We must move forward to support the guns at once!\"\n            \"Yes Sir,\" replies Bowles dutifully.  You turn to your men.  \"Regiment!  Left face!  Forward at double quick time, march!\"  The drum rolls and the bugle chirps as officers shout your command down the line.  Your men start forward at double quick time, essentially a jogging pace.  \n            \n            *goto ricketts\n  #\"Captain Bowles, we need to find Colonel Willcox.\"  \n    \"Yes Sir, replies your adjutant.  \n    *goto willcox\n*label willcox\nYou spur your mount into a trot, craning your neck left and right to try and find your brigade commander.  \"Oh God, please, make it stop, please help me!\"  You wince as the cry of the wounded man cuts through the air.  Your eyes run up and down the disorderly cluster of men.  \n\n\"Colonel Willcox!  Has anyone seen Colonel Willcox?\" you shout.  One of the men points and you follow his finger to a pair of horsemen riding along the edge of the tumultuous throng.  \n\nAs you ride up, you salute the Colonel and he returns the gesture.  \"Major $!{surname}, you have arrived in good time.  There's not a moment to lose.\"  You notice the Colonel's pants and horse are splattered with dark blood.  Sweat stains have soaked all the way through his greatcoat and his face glistens above his thick beard.  \n*choice\n  #\"Are you hit, Sir?!\"\n    \"What?  Oh, no, this is from some poor bastard who tried to unhorse me.  I've led the 11th in two charges, already.  Colonel Farnham was hit in the skull and he shan't survive the day.  No doubt some of it is his blood, too, alas.\"  \n    *choice\n      #\"I saw that he was injured.  What a terrible fate for so valiant a man.\"  \n        Willcox nods, solemnly.  \"Colonel Farnham fought bravely, but I fear that many more will share his fate before day's end.\"  \n        *goto disaster\n      #\"These men are entirely disorganized.  I doubt if they will be easily rallied to return to their duty.\"  \n        Willcox glares at the huddled clumps of disorganized troops, some stealing covert glances back at the group of officers.  \"Yes.  Their lack of training is showing through.  They simply will not obey my commands when they are in this state.\"  He shakes his head angrily.  \n        *goto disaster\n      #\"Heintzelman told me to report to you, Sir.  He was hit in the elbow and had to withdraw from the field.  Have you orders for my regiment?\"  \n        Willcox nods absently, \"Yes, I saw that he was hit.  I take command, then, barring the presence of a more senior officer.\"  \n        *goto disaster\n  #\"Colonel Willcox, Sir.  How have things gone with you?\"\n    \"It's been a hot afternoon.  I've led the 11th in two charges already.  Colonel Farnham was hit in the skull and he shan't survive the day.\"  \n    *choice\n      #\"I saw that he was injured.  What a terrible fate for so valiant a man.\"  \n        Willcox nods, solemnly.  \"Colonel Farnham fought bravely, but I fear that many more will share his fate before day's end.\"  \n        *goto disaster\n      #\"These men are entirely disorganized.  I doubt if they will be easily rallied to return to their duty.\"  \n        Willcox glares at the huddled clumps of disorganized troops, some stealing covert glances back at the group of officers.  \"Yes.  Their lack of training is showing through.  They simply will not obey my commands when they are in this state.\"  He shakes his head angrily.  \n        *goto disaster\n      #\"Heintzelman told me to find you, Sir.  What are your orders for my regiment?\"  \n        Willcox nods absently, \"Yes, I saw that he was hit.  I take command, then, barring the presence of a more senior officer.\"  \n        *goto disaster\n  #\"Beg to report, Sir.\"  \n    \"Go on, then.\"  \n    *choice\n      #\"I noticed two units on the hill moving toward our gun batteries from the east.  They are wearing Federal uniforms but I do not know which unit they are.\"  \n        The Colonel stands tall in his saddle and looks to the crest of Henry Hill to see what you are talking about.  \"From the east?  Maybe First Division… Jesus Christ!\"  You spin your head around and realize your mistake at the same moment.  The blue coated units halt in front of the unsuspecting artillery and level their muskets.  As you watch, the black smoke bellows out, followed by the crack of the volley as the sound reaches your ears.  \n        *goto disaster2\n      #\"These men are entirely disorganized.  I doubt if they will be easily rallied to return to their duty.\"  \n        Willcox glares at the huddled clumps of disorganized troops, some stealing covert glances back at the group of officers.  \"Yes.  Their lack of training is showing through.  They simply will not obey my commands when they are in this state.\"  He shakes his head angrily.  \n        *goto disaster\n      #\"Heintzelman told me to report to you, Sir.  He was hit in the elbow and had to withdraw from the field.  Have you orders for my regiment?\"  \n        Willcox nods absently, \"Yes, I saw that he was hit.  I take command, then, barring the presence of a more senior officer.\"  \n        *goto disaster\n*label disaster\n\nThe Colonel stands tall in his saddle and peers around the battlefield.  \"Who are those units on the hill there?  They are advancing right toward Ricketts' battery.  Are those our men?\"  \n\nYou follow his pointing finger and see the blue coated units nearing the artillery on the hill.  \"I do not know, Colonel…\" you begin, but he cuts you off.  \"Jesus Christ!\"  You realize your mistake at the same moment.  The blue coated units halt in front of the unsuspecting artillery and level their muskets.  As you watch, the black smoke bellows out, followed by the crack of the volley as the sound reaches your ears.  \n*label disaster2\n        \nYou stare impotently as the gun crews are cut down, falling to the ground and writhing in the grass.  The horse teams behind the guns were even worse hit, and almost a third of the animals are down, kicking and trying to break out of their lines and harnesses.  The high pitched screaming of the wounded horses causes you to wince in distress.  The wretched beasts know nothing of war, only the sudden pain of an unprovoked gunshot.  \n\n\"Come on!  Now!\"  Willcox spurs his horse into a full gallop to the organized lines of your 1st $!{state} infantry.  Up the hill, two of the cannons belch fire in a feeble reply, but the rebel infantry give them another volley which cuts them down like so many stalks of corn.  The horse teams are decimated, and one runs wild and loose, the beasts ignoring the whip of the teamster, and dragging the bodies of two wounded horses with them down the hill.  The caisson behind them rolls over and breaks apart, sending shells rolling in all directions.  The animals come free of their lines and disappear down the slope toward the river.  \n\nYou reach your own regiment, but it is too late to rescue the gun battery.  The remaining gunners are discharging their pieces, but the enemy infantry fixes bayonets and charges their position.  Your eyes tear up as you see the gunners overrun and stabbed by the long, bright bayonets.  The survivors break and sprint down the hill in all directions, some falling and rolling in their hurry.  The blue coated rebel infantry cheer and wave their hats in the air.  \n*set ricketts_battery \"lost\"\n*choice\n  #\"Regiment, fix bayonets!\"  \n    The shiny metal blades sweep out and crown the musket barrels.  You glance at Colonel Willcox, his face bearing a strained expression and his jaw clenched.  He closes his eyes and inhales deeply, lets the air out, then spurs his horse forward.  \n    *set fix_bayonets +1\n    *goto golf\n*label ricketts\nTwo minutes pass anxiously as your men advance.  Long enough for you to doubt your decision multiple ways.  What if they are Union men linking up from some other part of the battlefield?  They are wearing blue uniforms, but they are coming from the tree line which was under rebel control the last you knew of it.  \n\nYour regiment is coming up behind the right flank of the Union battery now.  The horse teams stand behind the guns, fidgeting and looking curiously at the 1st $!{state} line.  In front of them the gun crews stand at the ready by their pieces, staring out across the field at the advancing blue regiments.  \n\nA captain with a long, brown beard is running toward you as your men approach his battery.  \"Major, I am Captain Ricketts, Sir!  What regiment is that, and what are you doing?\"  \n*choice\n  #\"1st $!{state}.  We are here to support the battery.\"  \n    \"Yes Sir, but what are those units ahead?  We think that they are coming to support us as well.\"  \n    *choice\n      #\"I do not know, Captain.  I believe they might be rebels.  That is why I am here to support you.\"  \n        Ricketts furrows his brow, \"Sir?  Blue coated rebels?  I am assured that those are our own units.  Reinforcements from Heintzelman to support the battery.\"\n        *goto ricketts2\n      #\"They are coming from the eastern tree line, they are enemies!  You must open fire on them at once!\"  \n        Ricketts furrows his brow, \"Sir, I am assured that those are our own units.  Reinforcements from Heintzelman to support the battery.\"\n        *goto ricketts2\n  #\"Captain Ricketts, fire on those infantry to your front, immediately!\"\n    Ricketts furrows his brow, \"Sir, I am assured that those are our own units.  Reinforcements from Heintzelman to support the battery.\"\n    *goto ricketts2\n*label ricketts2\n*choice\n  #\"I just spoke to Heintzelman five minutes ago!  He was leading the Zouaves on your right.  Those are rebels in front of you!\"\n    \"Yes, Major.  I will order my men to fire, by your order.\"  Ricketts looks unconvinced but he turns and runs back to his battery.  \n    *set ricketts_battery \"saved\"\n    *set battle_outcome +3\n    *goto fire\n  #\"Very well, you may wait, but we are here to support you in the case that they are enemies.\"  \n    \"Understood, Major.  I will return to my unit.\"  He turns and runs back to his battery.  \n    *set ricketts_battery \"saved\"\n    *set battle_outcome +2\n    *goto wait\n*label fire\nYour regiment moves into line amongst the gun crews, and extending to the right of them.  The blue coats in front of you are within a few hundred yards.  You can see officers on horseback leading the men forward.  \n\n\"All guns, open fire!\"  You hear the cry come down the line.  The gun crews act quickly, turning the guns to face the approaching units, but you see some doubtful looks pass between the gunners.  The nearest infantry unit continues to march toward you, and they are now less than 200 yards ahead; within musket range.  \"Present arms!\" you shout, \"Volley fire at my command… Ready!\"\n\nYou squint at the flags at the center of their line.  You don't recognize the first two.  The third might be the Stars and Stripes, the United States flag.  Oh god, you think, have you ordered the artillery to fire on the U.S. Army?!  You pull out your binoculars instantly and look again.  Your heart almost skips a beat before a wave of relief sweeps over you.  It is the Stars and Bars, the Confederate flag.  It is nearly the same as the U.S. flag, except that it has only nine stars and three stripes.\n*set volleys +1\n*fake_choice\n  #Fire.\n\"Aim!\" you call the command with much greater confidence.  \"Fire!\"  Your regiment lets loose a volley and the smoke obscures everything for a moment.  With a glove, you swipe the pungent stuff away from your face, trying to see ahead.  \n\nThump.  Thump.  The cannons open fire with deafening volume, and the cannister rips up the ground in long lines.  You see the enemy line ripple as the buckshot tears holes in the ranks.  But they retain enough order to raise their muskets.  You feel your stomach clench painfully as you await the return fire.  The volley crackles like a line of fireworks in your ears.  You don't feel any shocking pain and sigh with relief to know you are still alive.  \n\nScreams cut through the air.  Some of your men were not so lucky.  \"Step forward, step forward, fill the ranks!\" yells a sergeant ahead.  You see your regimental flag swoon and drop before being instantly raised again by someone else.  \n*set regimental_strength -7\n*set first_battalion -4\n*set second_battalion -3\n*goto echo\n*label wait\nYour regiment moves into line amongst the gun crews, and extending to the right of them.  The blue coats in front of you are within a few hundred yards.  You can see officers on horseback leading the men forward.  \n\n\"All guns, prepare to fire!\"  You hear the cry come down the line.  The gun crews act quickly, turning the guns to face the approaching units, but you see some doubtful looks pass between the gunners.  The nearest infantry unit continues to march toward you, and they are now less than 200 yards ahead; within musket range.  \"Present arms!\" you shout, but you don't give the order yet.  \n\nInstead, you squint at the flags at the center of the approaching line.  You don't recognize the first two.  The third might be the Stars and Stripes, the United States flag.  You sigh with relief, thinking that you almost fired on a friendly unit.  To satisfy your conscience, you pull out your binoculars and look again.  Your heart almost skips a beat as you realize it.  That flag is the Stars and Bars, the Confederate flag.  It is the same as the U.S. flag except it has only nine stars and only three stripes.  The enemy stands before you.  \n*fake_choice\n  #Fire.\n\"Captain Bowles!\" you shout, and see that he is in the saddle not five feet away from you.  \"Ride to Captain Ricketts and order all guns to fire immediately!\"  He nods, \"Sir.  Hyah!\"  His horse spurs away to the left.  \n\nYou turn back to your own men.  \"Shoulder arms!  Volley fire at my command! Ready!\" you bark the command with confidence. \n\nThe Confederate troops raise their muskets.  You feel your stomach clench painfully and you wince as you await the volley.  You cannot wait, however.  \"Aim… Fire!\"  The sound of your voice is drowned as both lines open fire at the same time.  The volleys crackle in your ears like rows of fireworks.  You don't feel any shocking pain and sigh with relief to know you are still alive.  \n\nScreams cut through the air.  Some of your men were not so lucky.  \"Step forward, step forward, fill the ranks!\" yells a sergeant ahead.  You see your regimental flag swoon and drop before being instantly raised again by someone else.  \n\nThump.  Thump.  The first cannons open fire with deafening volume, and the cannister rips up the ground in long lines.  You see the enemy line ripple as the buckshot tears holes in the ranks.  \n*set volleys +1\n*set regimental_strength -5\n*set first_battalion -3\n*set second_battalion -2\n*label echo\n*fake_choice\n  #Maintain volley fire.\n    \"Load!\"  The men are already a step ahead of you, ramming cartridge and ball down the barrels of their muskets.  You skim the line and make sure everyone is doing their duty.  You see a scuffle off to the right as three men try to fall back, but are hindered by a couple of officers behind the line.  The Captain smacks one of them hard with the flat of his sword and then pushes him back to the line.  One of the others slugs a lieutenant in the gut and bolts down the hill.  The limited discipline of the men is being put to the test in the face of death.  \n    \n    The muskets are mostly pointing forward again, the majority being equipped with firing caps.  \"Ready!  Aim!\"  You allow a second for the last few men to shoulder their weapons.  \"Fire!\"  The volley pours out, the center first and rippling out to either end of the line.  \n    \n    You hear a competing voice drift through the smoke, \"Fire!\"  The rebel volley hits back, and you see men cringing and covering their faces instinctively.  A man in front of you falls backward out of the line and lets out a gurgling, rasping groan, followed by a sharp cry.  Looking down, you see blood bubbling up out of his mouth as he tries to cough his airway free.  \n    \n    Off to the left, you heard the piercing scream of horses, struck down by musket balls as they wait behind their guns.  Glancing that way, you see a team of six, with two horses down and flailing while artillery men try to cut them free of the ropes.  If enough horses are killed, the guns will not be able to be moved.  \n    *set volleys +1\n    *set regimental_strength -6\n    *set first_battalion -3\n    *set second_battalion -3\n  #Fire at will.\n    \"Company commanders, fire at will!\"  The cry goes down the line to the left and right.  You skim the line and make sure everyone is doing their duty.  You see a scuffle off to the right as three men try to fall back, but are hindered by a couple of officers behind the line.  The Captain smacks one of them hard with the flat of his sword and then pushes him back to the line.  One of the others slugs a lieutenant in the gut and bolts down the hill.  The limited discipline of the men is being put to the test in the face of death.  \n    \n    The muskets are mostly pointing forward again, the majority being equipped with firing caps.  The fastest men shoulder their arms, aim, and fire.  The ragged fire starts small and picks up steam as the average majority catch up and open fire.  \n    \n    You hear a voice drift through the smoke, \"Fire!\"  The rebel volley hits back, and you see men cringing and covering their faces instinctively.  A man in front of you falls backward out of the line and lets out a gurgling, rasping groan, followed by a sharp cry.  Looking down, you see blood bubbling up out of his mouth as he tries to cough his airway free.  \n    \n    Off to the left, you heard the piercing scream of horses, struck down by musket balls as they wait behind their guns.  Glancing that way, you see a team of six, with two horses down and flailing while artillery men try to cut them free of the ropes.  If enough horses are killed, the guns will not be able to be moved.  \n    *set fire_at_will +1\n    *set regimental_strength -6\n    *set first_battalion -3\n    *set second_battalion -3\n*page_break\nThe second enemy regiment moves into line next to the first and fires a volley directly into Ricketts' battery.  You see the gun crews cut down, men falling down under wheels and gun carriages.  One gunner is hit and falls back, accidentally tugging the lanyard and firing the cannon prematurely.  It rolls back and half crushes another wounded man who fell under the massive wheel.  \n\nYou shade your eyes and peer at the rebel regiments.  You see the glint of bayonets in their hands.  Their commanders must be planning to charge.  \n\n\"$!{surname}!\"  You turn around at the familiar voice.  Colonel Willcox rides up, with a single aide.  \"Major, I've found you.  Good work!  You were right to protect the battery.\"  You notice the Colonel's pants and horse are splattered with dark blood.  Sweat stains have soaked all the way through his greatcoat and his face glistens above his thick beard.  \n*choice\n  #\"Are you hit, Sir?!\"\n    \"What?  Oh, no, this is from some poor bastard who tried to unhorse me.  I've led the 11th in two charges already.  Colonel Farnham was hit in the skull and he shan't survive the day.  No doubt some of it is his blood, too, alas.\"  \n    *goto foxtrot\n  #\"Colonel Willcox, Sir.  How have things gone with you?\"\n    \"It's been a hot afternoon.  I've led the 11th in two charges already.  Colonel Farnham was hit in the skull and he shan't survive the day.\"  \n    *goto foxtrot\n  #\"Beg to report, Sir.\"  \n    \"Go on, then.\"  \n    *choice\n      #\"The enemy has fixed bayonets and are preparing to charge.  They will destroy the battery if we do not stop them.\"  \n        The Colonel peers through the smoke, following your pointing finger.  \"Yes, I see what you mean.  Damn it all.\"\n        *goto foxtrot\n      #\"These guns will not last much longer.  The gun crews are being decimated.\"  \n        The Colonel looks down the line.  \"Yes, we are hard pressed.  Damn it.\"  \n        *goto foxtrot\n  #\"Sir, the enemy is preparing to charge.  We must stop them from taking the battery!\"\n    The Colonel peers through the smoke, following your pointing finger.  \"Yes, I see the bayonets.  Damn it all.\"\n    *goto foxtrot\n*label foxtrot\n\nCaptain Ricketts runs up and salutes rapidly before speaking urgently, \"Sirs, I have ordered my battery to pull out.  We've lost too many animals, but we are going to rescue any guns that we can.  Give me five minutes, maybe ten.\"  \n\nWillcox clears his throat, \"Very well, Captain.  We will do what ever is within our ability.\"  He turns to you.  \"Fix bayonets, Major $!{surname}.\"  \n\n\"Regiment, fix bayonets!\"  The shiny metal blades sweep out and crown the musket barrels.  Looking left, you see the gun crews as they still sponge and load their pieces, while others bring forward the decimated horse teams to hook up to the guns.  You glance at the Colonel, his face bearing a strained expression and his jaw clenched.  He closes his eyes and inhales deeply, lets the air out, then spurs his horse forward.  \n*set fix_bayonets +1\n*achieve ricketts\n*label golf\n*set regimental_commander \"Col. Orlando Willcox\"\n*choice\n  #Follow him forward.  \n    Edging between the files, you ride out in front of the line.  Willcox turns in the saddle to face the men.  \"Come on, boys!\" he shouts at the top of his voice, \"Come on, my gallant $!{state} First, I know you would never forsake me, onward!\"  The men let out a bellowing cheer.  \"Forward, and give them the bayonet!  For $!{state} and Union!  Charge!\"  \n\n    The bugle emphasizes the command with its high, piercing notes.  The instrument that once felt so strong and proud, a symbol of strength and unity, now seems such a frail thing under the roar of battle and the pervasive terror.  The men cheer as one and sprint forward, following you and Colonel Willcox.  \n    \n    You spur your mount into a light canter to stay ahead of the regiment.  The ground thuds beneath your horses' hooves and you feel the vibrations coursing through your body.  The enemy regiment is growing rapidly in your vision, and you see their bayonets shining in long rows.  Muskets fire, but you continue forward, unhurt.  Your horse throws up its head and whinnies in protest as it barrels toward the bristling line of bayonets.\n    *set regimental_strength -5\n    *set first_battalion -2\n    *set second_battalion -3\n    *choice\n      #Draw my sword.  \n        The horse rears up and you cling to the reins to stay in the saddle before its hooves come down on a rebel's head.  You swipe your sword with the momentum so strong it nearly unseats you again, and all that force is directed into the blow across a rebel's face.  Blood sprays out and the blade grates on his broken skull as you yank it free of the falling body.  \n        \n        The Union line hits hard and you are jerked along with the crowd as the two sides clash brutally hand to hand.  From your vantage, it looks like a sea of heads pressing together, and it is almost impossible to tell friend from foe.  Both sides wear blue uniforms.  Hats are flung off and ranks dissolve amidst the violence.  \n        \n        Spotting an officer you don't recognize, you push your horse forward and lunge at him.  He tries to raise his sword, but his arm is pinned in the tight crowd, and his eyes grow wide as your blade sinks three inches into his chest.  For a heartbeat you see his face spasming with pain, then he falls back and into the throng of fighting men.  \n        *page_break\n        *goto mount_down_front\n      #Draw my pistol.  \n        Making special effort not to accidentally shoot your own horse in the face, you aim the pistol directly forward.  Closing one eye, you mark the man with the bayonet pointed straight at you, and squeeze the trigger.  The gun cracks and the rebel falls just as you reach the enemy line.  Your horse rears up and you cling to the reins to stay in the saddle.  \n        \n        Just then, the Union line hits hard and you are jerked along with the crowd as the two sides clash brutally hand to hand.  From your vantage, it looks like a sea of heads pressing together, and it is almost impossible to tell friend from foe.  Both sides wear blue uniforms.  Hats are flung off and ranks dissolve amidst the violence.\n        \n        Spotting an officer you don't recognize, you level your pistol.  His eyes widen but his arm is pressed to his side by the crowd of men.  You fire and feel the gun kick back in your hand.  For a heartbeat, you see the man's face, spasming with pain, before he drops from sight.  \n        *page_break\n        *goto mount_down_front\n  #Stay in the rear.  \n    Edging between the files, he rides out in front of your line and turns in the saddle to face the men.  \"Come on, boys!\" he shouts at the top of his voice, \"Come on, my gallant $!{state} First, I know you would never forsake me, onward!\"  The men let out a bellowing cheer.  \"Forward, and give them the bayonet!  For $!{state} and Union!  Charge!\"  \n\n    The bugle emphasizes the command with its high, piercing notes.  The instrument that once felt so strong and proud, a symbol of strength and unity, now seems such a frail thing under the roar of battle and the pervasive terror.  The men cheer as one and sprint forward, following Colonel Willcox.  \n    \n    You spur your mount into a light canter to keep up with the regiment.  The ground thuds beneath your horses' hooves and you feel the vibrations coursing through your body.  The enemy regiment is growing rapidly in your vision, and you see their bayonets shining in long rows.  Muskets fire and men drop out of line.  The men let out another cheer as they bear down on the enemy.  \n    *set regimental_strength -5\n    *set first_battalion -2\n    *set second_battalion -3\n    *set officers -1\n    *choice\n      #Draw my sword.\n        The Union line hits hard and the two sides clash brutally with bayonets.  You rein in your mount tightly to avoid crashing into your own ranks.  From your vantage, it looks like a sea of heads pressing together, and it is almost impossible to tell friend from foe.  Both sides wear blue uniforms.  Hats are flung off and ranks dissolve amidst the violence.  At the center, you see Colonel Willcox slashing downward with his saber, the blade coming up red.  \n        \n        Peering through the chaos and smoke, you feel helpless as there is very little you can do in a contest such as this.  You must merely watch your men do the real dirty work of war.  \n        *page_break\n        *goto mount_down_rear\n      #Draw my pistol.\n        The Union line hits hard and the two sides clash brutally with bayonets.  You rein in your mount tightly to avoid crashing into your own ranks.  From your vantage, it looks like a sea of heads pressing together, and it is almost impossible to tell friend from foe.  Both sides wear blue uniforms.  Hats are flung off and ranks dissolve amidst the violence.  At the center, you see Colonel Willcox slashing downward with his saber, the blade coming up red.  \n        \n        Peering through the chaos and smoke, you can see the Confederate colors behind the regiment.  Cocking your pistol, you aim across the clashing regiments and target the flag bearers and musicians.  They seem to be the only sure target in this chaos, if not the most honorable one.  \n        \n        You fire twice, the gun kicking back in your hand each time.  One of the flags sways and drops before being instantly raised again.  \n        *page_break\n        *goto mount_down_rear\n*label mount_down_front\nSuddenly, your horse screams and rears back, a bayonet snapping off in her chest.  She loses balance and falls sideways, scattering the tight packed men and sending you down among them.  Your face hits something hard as you flail down to the ground, grabbing for anything to stabilize yourself.  You feel a boot on your chest, twisting as the man tries to find a foothold beneath him.  \n\nNow someone is grabbing you under the armpits and you feel yourself dragged up and onto your feet.  The world around you is spinning, but you cling to your rescuer until you regain your balance.  \"Come on, Sir!\" he cries, pulling you backward.  The two lines are breaking apart, the Union men falling back.  The dreadful violence of the melee was simply too overwhelming.  \n\n*goto willcox_wounded\n*label mount_down_rear\nSuddenly, your horse screams and rears back, no doubt struck by an enemy shot.  She loses her balance and falls sideways, landing on your right leg with a crushing force.  The horse kicks madly, letting out a sharp series of cries as you try to untangle yourself from the stirrups.  Someone grabs you under the armpits and drags you back from the dying animal before setting you on your feet.  You test the hurt leg with a couple stomps, but it seems to still hold you up.  \n\nOne of your company commanders, Captain Butterworth, is still holding your arms as if you might fall over.  \"Are you alright, Sir?\"  You nod and tell him that you are well, nothing but a light pain in the leg.  \n\nNow, you find yourselves being pushed back as the Union line backs up.  The two lines are breaking apart, the Union men falling back.  The dreadful violence of the melee was simply too overwhelming.  \n\n*label willcox_wounded\nYou hear another horse scream and your head turns to see Colonel Willcox fall to the ground, saber in hand.  The horse screams again, kicking madly, until a rebel shoots it dead.  You see Colonel Willcox roll out of the saddle and try to get up.  Three rebels pile on him, trying to take him prisoner.  Willcox sweeps his saber and opens one man's guts.  Another rebel fires his musket point blank at the Colonel's arm.  The saber falls to the ground and Willcox drops on his back.\n\n\"They've got the Colonel!\" yells a sergeant beside you.  His eyes glare with impotent rage.  The men hesitate, unsure of what to do.  \n*set regimental_commander \"Maj. $!{first_name} $!{surname}\"\n*choice\n  #Try to rescue Willcox.\n    \"Come on, men!  We cannot leave the Colonel to the enemy!\"  A few men around you cheer in agreement, while the majority still backs away.  \"He said we would never forsake him!  Let's prove him right!  Come on!\"  You raise your saber above your head and shout a challenge as you run forward, back into the fray.  A dozen men cheer and follow you.  Glancing over one shoulder, you see men and officers, and the regimental colors charging with you.  \n    \n    Looking ahead, you see two Confederates manhandling the Colonel, trying to force him to surrender, but meeting his gritty resistance.  Another rebel looks back at you and your charging cohort.  \"Look out!  Yankees comin'!\"  The rebels around him see you coming and start to brace themselves just as you hit.  \n    \n    You sweep your sword from right to left and slash open the throat of the man who called out a warning.  The blood follows your blade and splashes the next rebel as your carry-through opens his shoulder.  His musket jerks sideways and misses you, firing above your left ear.  The burning paper wad flies out behind the bullet and goes right under your collar, burning like a hot iron.\n    \n    There is no time to dislodge the burning wad, you step back to avoid another man with a bayonet, trying to take revenge for his fallen comrade.  There is no time to recover your stance, so you drop your saber and reach for your pistol, but it catches in the holster.  Just as the rebel is about to skewer you, he is shot in the chest and tumbles backwards.  Your comrades were only seconds behind you and now they hit the rebels with ferocious anger.  \n    \n    Your pistol comes free of the holster and you shoot a rebel on your left.  You see the regimental flag swung overhand like a giant club, knocking over a rebel who was trying to fire his musket.  Then a rebel stabs a sergeant just beside you.  You bring your pistol right and fire right into his neck.  Through the smoke, you see three rebels dragging Willcox away.\n    *choice\n      #\"Save the Colonel!\"\n        You push forward, after the captured Colonel.  The three rebels see you following, and they drop him.  Glancing left, you see Captain Butterworth of C Company, sword in hand.  \n        \n        The rebels charge you with bayonets before you can react.  You barely have time to raise your pistol and shoot before they are on you.  The bullet hits the middle one and he lets out a gurgling scream.  But the right hand rebel lunges with his bayonet.  You grab the musket and yank it aside so that it barely misses your vitals.  The rebel keeps coming and bowls you over, landing on your chest like a hundred-weight of bricks.  \n        \n        The heavier man pins you down and then he starts hitting you in the chest and face.  You let go of the musket and block his blows, but still feel intense pain with each one that lands.  Looking up at the bearded face and bared teeth, you feel intense fear as you know this man is going to kill you.  But out of the fear rises a furious hatred like you have never felt before.  \n        *fake_choice\n          #Kill him.\n        Your vision turns red and you bellow with anger.  First, you bring up a knee hard into his groin and he grunts with pain.  Then you grab his beard and pull it hard so his head is jerked down and his neck makes a cracking noise.  He tries to swing another punch but you roll him onto his back and start punching him in the face, still holding his beard tightly in your right hand.  \n        \n        The man growls with anger and grabs your wrist, trying to pull your hand free of the beard.  You just pull it back and slam it forward, smacking his head against the ground.  Your hands are turning crimson with blood but you cannot tell.  You can feel his nails sticking into your wrist, but you do not dare to let go.  Then you glimpse your pistol lying there on the ground and you snatch it.  The rebel lets out a cry as you shove the barrel against his nose and fire.  \n        \n        There is a loud bang and a hideous smacking sound and the man goes still, his face obliterated and made hideous by the gunshot.  His dead hands are still clinging hard to your wrist and you pry them off before rising to your knees.  \n        \n        You see the other rebel on top of Captain Butterworth, stabbing a bayonet into his chest.  You raise the pistol clumsily and fire, throwing the man off of Butterworth.  Then you see another rebel running at you and automatically your hand comes up and shoots him.  The body slides to a stop in the grass but the man's back heaves like he is trying to catch his breath.  \n        *set officers -1\n        *set c_company_commander \"1st Lt. Michael German\"\n        *choice\n          #Snatch up Colonel Willcox and run.\n            Rebels from the other regiment are moving toward the commotion now.  Ignoring the pain in your face, chest, and arms, you seize Colonel Willcox and carry him at a run back toward the regimental flag.  There, the survivors of your group are fending off the rebel attacks.  \n            \n            \"I can stand!  I can walk!\" shouts Colonel Willcox.  You reach your allies and set the Colonel down.  \"Come on, run!\" shouts a voice.  Without thought for rank, you obey the voice, running back to your own lines along with your group.  It isn't far until you reach your regiment, who greet you with a hearty cheer.  \n            \n            Glancing back, you see the rebel infantry reforming lines and clearly preparing to advance.  Your men see it too and withdraw, not waiting for orders.  You find yourself practically running just so you are not left behind.  \n            *set regimental_strength -5\n            *set first_battalion -4\n            *set second_battalion -1\n            *set willcox \"rescued\"\n            *goto fall_back\n          #Keep fighting.\n            Rebels from the other regiment are moving toward the commotion now.  You rise to your feet in defiance.  You cannot leave Butterworth or Willcox to the enemy, and so you will stand and fight.  \n            \n            Two men rush you.  You fire your pistol and it takes off one man's ear.  The second shot is better aimed and hits him in the chest.  You squeeze the trigger a third time but it clicks.  It is out of bullets.  The man you just tried to shoot roars furiously and knocks the gun out of your hand with the muzzle of his weapon, the bayonet slashing your wrist.  He lunges again and you grab the weapon, twisting it away from your body and attempting to pull it away from your attacker.  \n            \n            As you spin to one side, you see a musket pointed directly at your chest, held by a man who can hardly be 18 years old.  For a moment you realize your position, and then he fires.  The musket ball hits you in the chest like a sledgehammer and you are thrown onto your back.  The pain shoots down through your body, into your arms and legs.  Your shirt feels wet and you groan with shock before you lose consciousness.  \n            *set regimental_strength -5\n            *set first_battalion -4\n            *set second_battalion -1\n            *set willcox \"captured\"\n            *choice\n              #Epilogue.\n                *goto_scene captured\n  #Fall back and protect my men.  \n    \"Willcox did his duty, now let us do our own.\"  You turn to the bugler, \"Order the retreat.\"  The young man nods and raises the brass instrument to his lips.  The bright, chirping tone blows the sound of the retreat.  Your men do not hesitate any longer, and they fall back down the hill, running as fast as they can.  You find yourself practically sprinting just so you are not left behind.  \n    *set willcox \"captured\"\n    *goto fall_back\n\n*label fall_back\n*if ricketts_battery = \"saved\"\n  As you retreat, you pass the wreckage of Ricketts' battery along with three guns.  Thanks to your efforts, he was been able to rescue half of his artillery pieces.  \n*if ricketts_battery = \"lost\"\n  As you retreat, you pass the wreckage of the Union battery, along with all six guns.  The confusion about the uniforms has cost your army dearly.  \n*if willcox = \"captured\"\n  *if ricketts_battery = \"saved\"\n    But you cannot help yourself feeling guilty as you think of your commander, left behind in the clutches of the enemy.  At least his safety should be guaranteed as an officer.  He is far too valuable to be roughly used.  \n  *if ricketts_battery = \"lost\"\n    On top of this, you cannot help yourself feeling guilty as you think of your commander, left behind in the clutches of the enemy.  At least his safety should be guaranteed as an officer.  He is far too valuable to be roughly used.  \n\nThe 1st $!{state} retreats half way down the hill, back to the road and to the increasingly large group of shattered units.  A few of your own men slip away into the crowd but the majority stop at the road and begin to reform companies, encouraged by shouting officers.  \n*set regimental_strength -15\n*set first_battalion -6\n*set second_battalion -9\n\n*if willcox = \"rescued\"\n  \"Well done, Major.  Well done.\"  Colonel Willcox reaches out with his left arm and squeezes your shoulder hard.  \"And, I might say, thank you.\"  You look at his right arm which hangs limply at his side, soaked to the wrist in dark red blood.  \n  *achieve hero\n  *fake_choice\n    #\"You are most welcome, Sir.  It did not feel right leaving you in the hands of those rebels.\"  \n      Willcox chuckles and then sways slightly before catching himself.  \"I think I had best sit down for a moment.\"  \n      \n      Captain Withington steps forward, \"I will stay with you, Colonel.  You need an aide if you would remain in the field.\"  \n    #\"Sir, your arm needs tending.  Let us apply a tourniquet.\"  \n      Willcox looks down, \"Yes, yes.  Fine.  But I am not leaving the field until it is won.\"  He sways slightly before catching himself.  \"I think perhaps I had best sit down, however.\"  \n      \n      Captain Withington steps forward, \"I will see to it, Colonel.  You need an aide if you would remain in the field.\"  \n    #\"You are hit, Sir!  You need to go see a surgeon, immediately.\"\n      Willcox looks irritated, \"I am not going to do any such thing.  I will not leave the field until it is won.\"  He sways slightly before catching himself.  \"I think perhaps I had best sit down, however.\"  \n      \n      Captain Withington steps forward, \"I will stay with you, Colonel.  You need an aide if you would remain in the field.\"  \n    \n  \"Very well.  I am obliged to you, Withington.  Major $!{surname}, I am taking your battalion commander.  If you need me, I will be here.\"  \n      \n  Withington leads him to flat bit of ground, \"Sit down, Colonel, and allow me to staunch the blood flow.\"  \n    \n  \"Sir,\" says Captain Lum at your side, \"Captain Clarkson has seniority.  Second Battalion falls to him if Withington is on detached service.  Shall I inform him?\"  You nod and Lum moves off.  \n  *set second_battalion_commander \"Capt. Ian Clarkson\"\n  *set d_company_commander \"1st Lt. James Tillard\"\n  *set officers -1\n  *page_break\n  *goto massachusetts\n*label massachusetts\nAs the 1st $!{state} reforms, you look up the gentle slope to the east and see the two Confederate regiments standing there, at the position of the abandoned guns of Ricketts' battery.  Looking left, you see two regiments moving up the hill toward the Confederates.  You recognize them as the 5th and 11th Massachusetts.  Scanning your own regiment, you see tired men, some standing and some sitting in the dirt, drinking from canteens.  They will need a moment to rest.  \n\n*if south_skirmishers = \"yes\"\n  \"Major!  Major, Sir!\"  You look to the right and see a corporal running up to you.  He comes to a stop in front of you, panting so hard he can hardly get off a salute before clutching his knees.  \"S-  Sir… Beg pardon, Sir… \n  *if south_skirmish_company = \"A\"\n    Corporal Berg, A Company.  Lieutenant Fairbanks sent me on ahead.  Beg permission to report.\"  \n  *if south_skirmish_company = \"B\"\n    Corporal Rickle, B Company.  Lieutenant Griffith sent me on ahead.  Beg permission to report.\"  \n  *if south_skirmish_company = \"F\"\n    Corporal Weaver, F Company.  Captain Roberts sent me on ahead.  Beg permission to report.\"  \n  *if south_skirmish_company = \"G\"\n    Corporal Toney, G Company.  Captain Abbott sent me on ahead.  Beg permission to report.\"  \n    \n  Captain Bowles glances at you, \"The skirmishers that were deployed to the south.\"  \n  *fake_choice\n    #\"Permission granted.  Report.\"  \n    #\"Out with it, man!\"  \n  *if south_skirmish_company = \"A\"\n    \"Lieutenant Fairbanks \n  *if south_skirmish_company = \"B\"\n    \"Lieutenant Griffith \n  *if south_skirmish_company = \"F\"\n    \"Captain Roberts \n  *if south_skirmish_company = \"G\"\n    \"Captain Abbott \n  bade me report that we encountered heavy enemy strength and were forced to withdraw to avoid being destroyed.  He sighted at least two regiments of Confederates moving up onto the road and threatening our right flank.  He is moving the company to rejoin with the regiment, Sir.\"  \n  *if south_skirmish_company = \"A\"\n    *set regimental_strength +52\n    *set first_battalion +52\n    *set south_skirmish_company \"\"\n  *if south_skirmish_company = \"B\"\n    *set regimental_strength +52\n    *set first_battalion +52\n    *set south_skirmish_company \"\"\n  *if south_skirmish_company = \"F\"\n    *set regimental_strength +52\n    *set second_battalion +52\n    *set south_skirmish_company \"\"\n  *if south_skirmish_company = \"G\"\n    *set regimental_strength +52\n    *set second_battalion +52\n    *set south_skirmish_company \"\"\n  *fake_choice\n    #\"Well done, Corporal.  Take a moment and catch your breath.\"  \n    #\"Damn it.  We are being flanked.\"\n*if willcox = \"rescued\"\n  \"Major $!{surname}.\"  You turn around and see Colonel Willcox beckoning to you with his left hand.  You walk a dozen paces over to him.  Withington has tied a tourniquet around his right arm, but the blood has soaked down his sleeve and all over his pants and the lower half of his greatcoat.  His face is caked with sweat.  \"Major, what is your plan?\"  \n  *choice\n    *if south_skirmishers = \"yes\"\n      #\"My scouts report enemy movement to the south.  We must move troops to protect the flank and prevent them from moving around behind us.\"  \n        \"Very good.  Do that.\"  He runs a hand down his face, his features twisted with pain.  \"Dismissed, Major.\"  You salute him and return to your regiment.  \n        \n        *set battle_plan \"flank\"\n        *goto massachusetts2\n    #\"We need to focus all of our effort on controlling Henry Hill.  We must not give up ground to the enemy.\"  \n      \"Very good.  Do that.\"  He runs a hand down his face, his features twisted with pain.  \"Dismissed, Major.\"  You salute him and return to your regiment.  \n      \n      *set battle_plan \"attack\"\n      *goto massachusetts2\n    #\"I want to pull these shattered units back across the creek.  If we give up a little ground then we can hold Dogan Ridge and avoid a disaster.\"  \n      \"Very good.  Do that.\"  He runs a hand down his face, his features twisted with pain.  \"Dismissed, Major.\"  You salute him and return to your regiment.  \n      \n      *set battle_plan \"rescue\"\n      *set rescue \"yes\"\n      *goto massachusetts2\n*label massachusetts2\nLooking up the hill, you see the Massachusetts regiments charge into the blue coated Confederates.  The enemy holds briefly but then breaks.  The roar of the infantry is faint in your ears, but your mind fills in the gaps as it knows the frenzied sound all too well.  \n\nMassachusetts has retaken the hill!  The flag of the United States flies over the wreckage of the Union gun battery.  \n\n\"Sir,\" says Captain Lum, pointing to the north.  You see four Union officers approaching rapidly on horseback.  You step out into the road and salute as Colonel Ward and his staff officers rein in their animals.  \"Major $!{surname}, have you seen Colonel Willcox?  Report.\"  \n*label ward\n*fake_choice\n  *if willcox = \"rescued\"\n    #\"Colonel Willcox was severely wounded and captured, but we recovered him.  One of my captains is looking after him.\"  \n      Ward's horse starts biting at its shoulder and he tugs the reins to get it to stop.  \"Willcox is hit?  Damn if that isn't awful news.  If he is incapacitated, then I take command of the brigade.\"  \n      *choice\n        *if battle_plan = \"flank\"\n          #\"I deployed skirmishers south along the road.  They have just informed me that two Confederate regiments are moving to flank us from that direction.  We must move to protect the flank, immediately!\"  \n            *goto ward2\n        *if battle_plan = \"attack\"\n          #\"We need to concentrate our forces on Henry Hill.  The enemy must not be allowed to take it.\"  \n            *goto ward2\n        *if battle_plan = \"rescue\"\n          #\"We need to pull these shattered units back across the creek.  If we give up a little ground then we can hold Dogan Ridge and avoid a disaster.\"  \n            *goto ward2\n  *if willcox = \"captured\"\n    #\"I am sorry to say that Colonel Willcox was wounded and captured by the enemy.\"  \n      Ward's horse starts biting at its shoulder and he tugs the reins to get it to stop.  \"Willcox is captured, you say?  Damn if that isn't awful news.  Well, if he is a prisoner, then I take command of the brigade.\"  \n      *choice\n        *if south_skirmishers = \"yes\"\n          #\"I deployed skirmishers south along the road.  They have just informed me that two Confederate regiments are moving to flank us from that direction.  We must move to protect the flank, immediately!\"  \n            *goto ward2\n        #\"We need to concentrate our forces on Henry Hill.  The enemy must not be allowed to take it.\"  \n          *goto ward2\n        #\"We need to pull these shattered units back across the creek.  If we give up a little ground then we can hold Dogan Ridge and avoid a disaster.\"  \n          *goto ward2\n*label ward2\nColonel Ward smirks at you.  \"Do majors give orders to colonels, now?  You forget yourself, Major.  I am in command here.\"  \n*fake_choice\n  *if willcox = \"rescued\"\n    #\"This order comes from Colonel Willcox.  He instructed me to carry out this plan.\"  \n      Ward's eyebrows furrow and his mustache twitches.  \"Do you speak in earnest, Major?\"  Returning his glare, you reply, \"Yes I do, Colonel.\"  He laughs.  \"So be it, then.  I bow to the Colonel's authority.\"  \n      *if battle_plan = \"attack\"\n        *goto frontal_attack\n      *if battle_plan = \"flank\"\n        *goto flank\n      *if battle_plan = \"rescue\"\n        *goto rescue\n  #\"Yes Sir.  My apologies.\"  \n    \"Yes.  Well, here is what we are going to do.\"  \n    *achieve obey\n    *goto ward3\n  #\"What are your orders, then?\"  \n    Ward looks sharply at you.  \"I will tell you your orders, Major.  I will tell you when I am goddamn good and ready.  You cannot question me any more than you can order me about like an enlisted man.  I am your lawful superior, and you will conduct yourself with the proper military form or I will know the reason why.  Is that understood, Major?  Good.\"  \n    *goto ward3\n*label ward3\n*set battle_plan \"attack\"\n\nThe Colonel straightens in his saddle and glares around the battlefield.  \"The Massachusetts infantry hold the hill for the moment.  We are going to provide support to them and keep our forces concentrated to control the hill.  Colonel Sherman is bringing up more regiments across the ford.  We need to sink our teeth in and hold until they are in position.\"\n*choice\n  *if south_skirmishers = \"yes\"\n    #\"With your permission, Sir, what about the flanking forces coming from the south?\"  \n      Ward glances right, \"Yes, you may move one battalion to counter any possible move from that direction.  You may move them south along the road but do not go beyond the edge of the tree cover.  Stay within sight of this position.  The other battalion will stay here to support my regiment.  Understood?\"\n      *set backup_plan \"flank\"\n      *set battle_outcome +1\n      *choice\n        #\"Yes Sir.\"  \n          \"Very well.  Dismissed.\"  The Colonel turns away from you.  \n          *goto_scene frontal_attack\n        #\"Sir... Permission to speak?\"  \n          \"Denied, Major.  Please proceed to carry out your orders.  You are dismissed.\"  The Colonel turns away from you.  \n          *goto_scene frontal_attack\n  #\"Yes Sir.\"  \n    \"Very well.  Dismissed.\"  The Colonel turns away from you.  \n    *goto_scene frontal_attack\n\n\n\n*label frontal_attack\n*fake_choice\n  *if south_skirmishers = \"yes\"\n    #Deploy one battalion to protect the right flank.  \n      *set backup_plan \"flank\"\n      *set battle_outcome +1\n      *achieve flank\n  #Deploy one battalion to move the shattered units back across the river.\n    *set backup_plan \"rescue\"\n    *set rescue \"yes\"\n    *set battle_outcome +2\n  #Commit my entire force to the main battle.  \n    *set backup_plan \"none\"\n*goto_scene frontal_attack\n\n*label flank\n*fake_choice\n  #Deploy one battalion to support the main battle for the hill.\n    *set backup_plan \"attack\"\n  #Deploy one battalion to move the shattered units back across the river.\n    *set backup_plan \"rescue\"\n    *set rescue \"yes\"\n    *set battle_outcome +2\n  #Commit my entire force to cover the flank.\n    *set backup_plan \"none\"\n*goto_scene flank\n\n*label rescue\n*fake_choice\n  *if south_skirmishers = \"yes\"\n    #\"Deploy one battalion to protect the right flank.  \n      *set backup_plan \"flank\"\n      *set battle_outcome +1\n      *achieve flank\n  #Deploy one battalion to support the main battle for the hill.\n    *set backup_plan \"attack\"\n  #Commit my entire force to moving the shattered units out of harm's way.  \n    *set backup_plan \"none\"\n*goto_scene rescue", "historical_summary": "You may be wondering how much of this story is true to the real events of July 21st, 1861.  While I have tried to stick scrupulously close to the true events of the battle, I have sacrificed or abbreviated certain points of accuracy for the sake of a better story.  I have included this historical summary for readers who are interested in the true events of that day.  \n\nThe reader in this story takes the place of a Major in command of a regiment.  They are actually taking the place of Major Alonzo Bidwell, who commanded the 1st Michigan Volunteer Infantry Regiment at Bull Run.  Colonel Willcox was the actual regimental commander, but he was temporarily promoted to command the whole brigade, leaving the 1st Michigan under the command of Lieutenant Colonel Comstock.  Comstock resigned from the army a month before the battle, leaving the 1st Michigan under command of Major Bidwell.  \n\nThe Union Army was camped at Centreville on the morning of July 21st.  They began their march at 2:30 AM in the same general disposition as portrayed in this story.  Tyler's First Division marched west along the Warrenton Turnpike, while Second and Third Divisions marched north in a flanking maneuver.  There were delays caused by logistical problems that held up the march, so that the early morning surprise attack did not happen.  \n\nThe two divisions reached the turn to the north around 6:00 AM, and embarked on a twelve mile march along a small, winding road.  Union reconnaissance had suggested that this would be a six mile march, and this error was costly to the Union plan.  The flanking maneuver was observed by a Confederate Captain named Edward Alexander from across Bull Run creek.  Finally, the Union force forded the river around 9:30 AM, with some delays caused by men breaking formation to collect blackberries growing along the stream.  \n*page_break\nShortly after this, Daniel Hunter's division engaged two Confederate brigades on Dogan Ridge.  This first part of the battle is portrayed in my story with relative accuracy.  Colonel Hunter was wounded in the throat and then there was some confusion about whether Andrew Porter or Ambrose Burnside was in command of the field.  However, these two brigades were able to push the rebels back and take the ridge without much support from Heintzelman's Division, unlike in my story.  Porter's Brigade extended to the right of the rebel line, and was able to push them back by outflanking them.  \n\nThe next part of the battle involved an artillery duel, with the Union guns on Dogan Ridge and the Confederate guns on Henry Hill.  During this time, both sides organized their forces and brought up support.  The positions of units in my story are very closely aligned with the real events during this interlude.  \n\nIn the early afternoon, General McDowell moved two artillery batteries forward onto Henry Hill and started to send his infantry across Young's Branch to support them.  The 11th New York, 1st Minnesota, and 14th Brooklyn regiments fought on the right flank of the batteries, and were shattered by the intense fighting.  Colonel Noah Farnham, who was severely ill at the time of the battle, was struck in the forehead by a musket ball and died later of the wound, as portrayed here.  Colonel Heintzelman was also wounded in the right elbow, but probably remained on the field in command of troops, unlike in this story.  \n\nAt this time, the 1st Michigan arrived at the front.  The Confederates sent two regiments to attack Captain James Ricketts' battery on the hill.  Wearing blue uniforms, they were mistaken as Union reinforcements from Heintzelman, and they slaughtered the unsuspecting gun teams.  Captain Ricketts was wounded three times and captured.  \n*page_break\nAt this point, Colonel Willcox led his own 1st Michigan regiment in three successive charges against the rebel position on the hill.  Before the third attack, he called out to his men, \"Come on, my gallant Michigan First, I knew you would never forsake me, onward!\"  He was wounded in the arm during the ensuing fight, and his own men fought bitter hand to hand combat to rescue their commander and their colors.  Willcox then remained on the field, accompanied by Captain Withington, and both were later captured in the ensuing rout.  Both men received the Medal of Honor for their actions at First Bull Run.  \n\nThe 1st Michigan did not factor much into the remainder of the battle.  The untrained, inexperienced troops joined the disorganized crowd of shattered units on the western slope of the hill.  Both sides fought over the position where Ricketts' battery had been, taking and retaking the same ground, but the Confederates were able to bring up and engage more men.  They also outflanked the Union line, as in this story.  The shattered Union units were easily swept off the battlefield, and the whole army began to retreat.  \n\nThe retreat became a chaotic rout, with men stealing horses, abandoning wagons, and running for their lives.  Many Union civilians had come to watch the battle, and their wagons fouled up the Union Army's retreat even more.  The battle was a decisive Confederate victory over the United States.  In my story, I added the ability to mitigate this disaster, and even to achieve a stalemate, but a total Union victory seemed too farfetched and too easy.  After all, the reader takes the place of a junior officer in a large army.  \n\nHopefully, you can see that I tried to stick as close as possible to the true events of the battle, and I sincerely hope that you enjoyed this interactive fiction novel.  If you enjoyed it, please tell your friends and consider supporting my work.\n\nYour most affectionate and obedient servant,\n*line_break\nDan Rasmussen.\n*goto_scene ending", "left": "*temp battle_efficiency \"lowest\"\n*temp bayonets \"no\"\n*temp target \"\"\n*set battle_outcome +1\nThe regiment reaches the end of the tree cover, and they see the ridge and the battle right before them.  The files of men seem to shiver as they hesitate and lose step.  A messenger rides up at a gallop and reins in his horse to a rapid stop, \"General McDowell's compliments, Sir.  The general orders that this regiment be placed on the right flank of Franklin's Brigade, which is forming up here to the left of the road.  You are to form up in front of the ${minnesota_regiment}.\"  He points up ahead and to the left.  \n\n\"Acknowledged.  Compliments, and so forth,\" replies Willcox in a businesslike tone.  The man salutes and rides off as fast as he arrived.  \n*choice\n  #\"Regiment, left turn!  Follow the column!\"  \n    \"Left turn!  Left turn!\"  Your officers shout the order on down the ranks.  The front row makes the left turn, following Franklin's Brigade.  The men in the outer file take wide steps, while the innermost men march two paces in place before continuing.  It could almost be a parade ground if not for the screaming bullets overhead and the roar of cannons.  \n    \n    Your regiment advances into the grassy pasture north of the road, along the rear of Reynolds' artillery where the caissons and horse teams wait.  The gun teams are working furiously; shouting orders, loading, aiming, and firing.  You watch one shell fired at the ridge with shocking velocity.  Not a quarter second after the lanyard was pulled, it strikes the ground just short of the rebel line and explodes in a huge puff of smoke.  Hopefully these guns will be able to support your attack.  \n    \n    The regiment in front of you stops in place and turns right.  \"That is the ${minnesota_regiment}, we are to take position in front of them,\" says Colonel Willcox.  \n    *choice\n      #\"Regiment, follow me!\"\n        *image left1.png\n        *set map_trigger \"left1\"\n        The troops follow you to the right until you reach the flank of the next regiment in the front line.  The officers shout orders to the men and try to straighten out the line.  \"Dress left!\" you hear a captain shouting.  The men slowly manage to form a relatively straight line, four ranks deep.  Company after company files into place.  Most of the men fall into an easy stance, resting muskets on the ground and standing with their feet apart, sometimes scratching itches or drinking from canteens.  \n        *choice\n          #\"I did not give you permission to stand at ease!  Stand at attention you reprobates!\"\n            Some of the men do stand to attention, or at least something like it.  Many more ignore the order or even grumble.  The volunteer discipline does not meet your expectation.  \n            \n            *goto alpha\n          #Let the men have a moment to relax.\n            If ever they needed a break, it is now.  You want your men to take whatever rest they can after such a long morning march.  \n            \n            *goto alpha\n*label alpha\nMany of the men pull off their haversacks and blanket rolls and toss them into heaps behind the line.  You see a puff of smoke from the Confederate howitzers, and a second later you hear a deafening explosion on your right.  Your horse twitches with anxiety, then stomps its feet to blow off the steam.  Through the ringing of your ears, you hear a dreadful, inhuman screaming.  Looking right you can see a smoking hole in the ground where the Confederate shell struck.  A horse is on the ground screaming and kicking furiously as its rider attempts to get out of the saddle.  Two officers run up and pull the man out from under the beast, which must have been struck by shrapnel.  The piercing scream of the dying animal goes straight to your heart.  \n\n\"Take the horses to the rear.  We will be better on foot,\" says Colonel Willcox.  You dismount and two staff officers lead the small herd of horses away.  \n\n\"Major, I will command the regiment.  Take command of the right battalion for the time being,\" Willcox gives the order with calm finality.  \n*choice\n  #\"Yes Sir!\"  \n    *goto bravo\n  #\"It is my regiment, Sir.\"\n    The Colonel looks sharply at you.  \"Are you questioning my orders, Major?\"  His voice is cold with distaste as he stares into your eyes.  \n    *choice\n      #\"No, Sir.  Beg pardon, Sir.\"  \n        *goto bravo\n      #\"It may be my only chance for glory, Sir.\"\n        \"You'll have a better chance to achieve glory in command of a battalion.  If you intend to disobey then I will remove you from command and see you disgraced and court martialed.  Now go.\"  He points to the right hand battalion.  \n        *goto bravo\n*label bravo\nYou walk to the right side of your line.  Your regiment has 811 men: 780 enlisted and 31 officers.  Each battalion has about 400 men.  You will now command second battalion, consisting of Companies F through J.  Riding up to Captain Withington, you return his salute.  \"Sir,\" he says simply, more than ordinarily succinct.  \n*fake_choice\n  #\"Willcox is commanding the Regiment.  I am taking command of Second Battalion.  You will return to your Company.\"  \n  #\"I am sorry, Captain, but I am taking direct command of the Battalion for a time.\"  \n*set regimental_commander \"Col. Orlando Willcox\"\n*set second_battalion_commander \"Maj. $!{first_name} $!{surname}\"\n*set b_company_commander \"Capt. William Withington\"\nWithington looks put out, but he nods ascent.  \"Yes, Sir.  Thank you.\"  \n\n\"Forward at my command!\" shouts Colonel Willcox.  The men look around anxiously, shifting their stances.  \"Forward… march!\"  The bugle emphasizes the order and your hear yourself shouting the words in response.  \"Forward march!\"  \n\nForward marches the line, up the ridge and toward the enemy.  You squint your eyes against the sun, trying to see the disposition of the rebel troops.  They are obscured behind a long wooden fence that runs along the ridge to the north of the farmhouse.  The fence will no doubt provide them cover and defense from your attack.  \n\nAs you move up the slope, you see the metal barrels of the two rebel howitzers pointing through the fence.  They are nearly straight ahead of your battalion, just a little to the right, in front of the copse of trees.  As you watch, they fire again, the shells howling over your lines and causing nearly everyone to duck.  \n*page_break\nLooking to the left, you see the Union line extending far off.  Burnside's regiments are all mixed up together in one big mass, advancing up the same ground again.  Looking to the right, you see nothing.  A stretch of pasture land intersected by the road, but no units there.  You have the extreme right flank of the attack.  \n\nOn all sides, you hear marching feet, swishing grass, and the clatter of gear.  Then, from the fence ahead erupts a volley of fire, accompanied by hundreds of puffs of smoke.  You wince as the rounds whiz past or thump as they hit home.  Your right hand defensively covers your groin, while the other one goes to your cap to hold it on, as if the musket balls were a storm of wind and hail.  \n\nYour boot slips as you walk forward, and you drop to a knee but manage to keep your feet.  The grass there feels like it is dewy, but it cannot be so in the hot sun.  Looking down, you see that it is dark red with blood, and your white glove is stained with it.  Looking at your boot, you see that you slipped in a pool of some poor bastard's spilled guts, a dead Yankee from one of the early morning attacks.  \n\nA Minnesotan Corporal helps you to your feet and you jog a few steps back to your place.  You push down the rising nausea in your stomach and continue forward.  \n*set regimental_strength -4\n*set first_battalion -3\n*set second_battalion -1\n*page_break\n\"Regiment, halt!\" You hear Willcox's voice from the left, followed by a bugle call to the same effect.  \"Ready, aim,\" You repeat the command as it comes down the line.  \"Fire!\"  The shouts and the bugle are drowned in the universal roar of sound as 400 muskets are discharged in unison.  As the smoke blows forward away from your line, you can only see a hint of the fence line where the rebels are sheltering.  \n\nYou are still somewhat deafened as another order is shouted down the line.  \"Fire by battalion.\"\n*choice\n  #\"Load!\"\n    \"Load your muskets!\"\n    \n    \"Load, load, load!\"\n    \n    The officers and sergeants mimic your order down the line, a useful practice in the chaos of battle.  The men load as one unified body.  Cartridge out, bite off one end, pour the powder down the muzzle, then the ball after that.  Now they are onto the next step, and ramrods come out in rough unison, ramming the ball and cartridge down to the bottom of the barrel.  You scan up and down the line as the faster men finish this step and raise the gun to their waists where they equip the hammer with a small brass percussion cap to trigger the charge.\n    \n    You almost jump out of your boots as the rebel volley erupts from the fence line.  A few men along the line fall out of formation as they are struck.  A Minnesotan behind you lets out a truly pitiable wail as he falls to the ground.  Glancing over, you see him holding his neck and rolling back and forth, sobbing and screaming like a child.  He cannot be more than sixteen years old.  You notice your jaw is clenched so tight that your teeth are hurting and with an effort you pry your jaws apart and look forward again.  \n    *set regimental_strength -6\n    *set first_battalion -4\n    *set second_battalion -2\n    *choice\n      #\"Volley fire at my command!\"\n        The last of the men are finishing their loads now.  \"Ready!\"  You wait until most of the weapons are held in the ready position.  \"Aim!\"  The musket butts come up into shoulders.  There is a moment of silence as each man chooses his mark.  \"Fire!\"  Your men pour out a volley and more smoke fills the air between them and the enemy.  \n        \n        \"Good work, boys.  Steady now and win the day,\" calls a sergeant from somewhere in the smoke to your right.  \n        *set volleys +1\n        *choice\n          #\"Load!\"\n            The men begin the loading process again, some standing tall while others try to make themselves smaller as they await the counter volley.  Here it comes; you see the rebel muskets come up.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing overhead in the twisting smoke.  A few more men fall out of line and the rear ranks step forward to fill the gaps.  \n            *set regimental_strength -6\n            *set first_battalion -3\n            *set second_battalion -3\n            *choice\n              #\"Ready, aim, fire!\"\n                Most of the men are ready and you give the rest a few more seconds to bring their musket up before you shout the command to fire.  The volley roars out with another pluming wall of powder smoke, and the slowest men's muskets rattling off in a trailing patter of shots.  A faint scream carries down the slope from the enemy line.  Some of your bullets must have gone home…\n                *set volleys +1\n                *choice\n                  #\"Load!\"\n                    The men obey your order, but the uniformity of their process is starting to unravel.  The more skilled men are loading at rapid pace while the inexperienced laggards trail behind, still trying to get the cartridge into the barrel while the others are finishing the ramming.  Now some half of the men are ready and waiting while the others are slowly catching up.  \n                    *choice\n                      #Wait for everyone to be ready.\n                        Watching the last of the men catching up, you can almost feel the impatience of the quickest loaders.  Finally, most of them are done loading and you give the order.  \"Ready!  Aim!  Fire!\"  The space between the regiments is again torn up by flying lead.  \n                        *set volleys +1\n                        *set battle_efficiency \"high\"\n                        *goto charlie\n                      #\"Fire at will!\"\n                        You give the order to fire at will.  The men who are ready raise their muskets and start to choose targets.  Many of them fire at the same time, giving a diminished volley effect, then they start to load as the slower men bring up their muskets.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n                        *set fire_at_will +1\n                        *set battle_efficiency \"highest\"\n                        *goto charlie\n                  #\"Fire at will!\"\n                    You give the order to fire at will.  The men who are ready raise their muskets and start to choose targets.  The quickest among them take aim and fire, then they start to load as the slower men bring up their muskets.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n                    *set fire_at_will +1\n                    *set battle_efficiency \"highest\"\n                    *goto charlie\n          #\"Fire at will!\"\n            You give the order to fire at will.  The men who are ready raise their muskets and start to choose targets.  The quickest among them take aim and fire, then they start to load as the slower men bring up their muskets.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n            \n            Here comes the next rebel volley, their muskets rising to their shoulders in unison.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing overhead in the twisting smoke.  A few more men fall out of line and the rear ranks step forward to fill the gaps.  \n            *set fire_at_will +1\n            *set regimental_strength -6\n            *set first_battalion -3\n            *set second_battalion -3\n            *set battle_efficiency \"high\"\n            *goto charlie\n  #\"Fire by company!\"\n    Your order is quickly relayed down the line by shouts, and the company commanders take over.  Captain Whittlesey begins to shout commands to his company, just in front of you.  \"H Company, Load!\"  The company loads as one unified body.  Cartridge out, bite off one end, poor the powder down the muzzle, then the ball after that.  Now they are onto the next step, and ramrods come out in rough unison, ramming the ball and cartridge down to the bottom of the barrel.  You scan up and down the line as the faster men finish this step and raise the gun to their waists where they equip the hammer with a small brass percussion cap to trigger the charge.\n    \n    You almost jump out of your boots as the rebel volley erupts from the fence line.  A few men along the line fall out of formation as they are struck.  A Minnesotan behind you lets out a truly pitiable wail as he falls to the ground.  Glancing over, you see him holding his neck and rolling back and forth, sobbing and screaming like a child.  He cannot be more than sixteen years old.  You notice your jaw is clenched so tight that your teeth are hurting and with an effort you pry your jaws apart and look forward again.  \n    \n    \"H Company, ready!\"  This company is the first to finish loading.  \"Aim!… Fire!\"  About forty muskets fire in unison, a subdued volley.  \"Company G, ready!\"  \"I Company, ready!\"  \"Fire!\"  \"Fire!\"  The other companies fire their volleys one after another, two overlapping.  Meanwhile, Company H is already ramming new balls down the barrels as Company K discharges their muskets.  \n    *set regimental_strength -6\n    *set first_battalion -4\n    *set second_battalion -2\n    *choice\n      #Maintain fire by company.\n        You start to walk down the line, watching your men load and the company officers direct them.  Just behind you stand the neat rows of the ${minnesota_regiment}, looking uneasy as they stand in the line of fire but unable to answer.  Company H brings up their muskets again almost in unison with the rebels at the fence line.  Some men stand tall while others try to make themselves smaller as they await the volley.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing overhead in the twisting smoke.  A few more men fall out of line and the rear ranks step forward to fill the gaps.  \n        *set regimental_strength -6\n        *set first_battalion -3\n        *set second_battalion -3\n        *choice\n          #Maintain fire by company.\n            The company commanders retain control and continue to fire volleys.  The fire is slowing down and becoming more ragged as the slower loaders hold back the quicker ones.  \n            *set battle_efficiency \"medium\"\n            *goto charlie\n          #\"Battalion, fire at will!\"\n            The shout goes down the line, and soon the men are aiming and firing as quickly as they can load.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n            *set battle_efficiency \"high\"\n            *set fire_at_will +1\n            *goto charlie\n      #\"Fire at will!\"\n        \"At will, boys!\"  The men hear the order and a few instantly pop off their muskets, but many more continue to fire ragged volleys with their companies as their loading was still pretty regular.  \n        \n        Here comes the next rebel volley, their muskets rising to their shoulders in unison.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing overhead in the twisting smoke.  A few more men fall out of line and the rear ranks step forward to fill the gaps.  \n        \n        As the sound of the volley dissipates, the constant patter of the Union fire continues.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n        *set regimental_strength -6\n        *set first_battalion -3\n        *set second_battalion -3\n        *set battle_efficiency \"low\"\n        *set fire_at_will +1\n        *goto charlie\n  #\"Fire at will!\"\n    \"At will, boys, at will.\"  The men load as one unified body.  Cartridge out, bite off one end, poor the powder down the muzzle, then the ball after that.  Now they are onto the next step, and ramrods come out in rough unison, ramming the ball and cartridge down to the bottom of the barrel.  You scan up and down the line as the faster men finish this step and raise the gun to their waists where they equip the hammer with a small brass percussion cap to trigger the charge.  \n    \n    You almost jump out of your boots as the rebel volley erupts from the fence line.  A few men along the line fall out of formation as they are struck.  A Minnesotan behind you lets out a truly pitiable wail as he falls to the ground.  Glancing over, you see him holding his neck and rolling back and forth, sobbing and screaming like a child.  He cannot be more than sixteen years old.  You notice your jaw is clenched so tight that your teeth are hurting and with an effort you pry your jaws apart and look forward again.  \n    \n    The men who are ready raise their muskets and start to choose targets.  The quickest among them take aim and fire, then they start to load as the slower men bring up their muskets.  \n            \n    Here comes the next rebel volley, their muskets rising to their shoulders in unison.  \"Steady boys.  Steady, now.\"  The smoke pours out and you hear balls whizzing overhead in the twisting smoke.  A few more men fall out of line and the
