rear ranks step forward to fill the gaps.  \n    \n    As the sound of the volley dissipates, the constant patter of the Union fire continues.  Fire at will may not have the same terrible shattering effect of the volley, but it certainly has its time and place.  \n    *set fire_at_will +1\n    *set regimental_strength -12\n    *set first_battalion -7\n    *set second_battalion -5\n    *set battle_efficiency \"lowest\"\n    *page_break\n    *goto charlie\n    \n*label charlie\nA young Lieutenant sprints up to you from the left, \"Sir, Colonel Willcox is going to order a charge of the entire regiment.  He bids you prepare to charge on his command.\"  He salutes and you return the gesture in acknowledgment.  \n*fake_choice\n  #\"Battalion, load!\"\n    The men load their muskets, following the familiar command with no reservation.  \n    *set bayonets \"no\"\n  #\"Battalion, fix bayonets!\"\n    The men pull bayonets out of their belts and attach them to the end of their muskets.  \n    *set fix_bayonets +1\n    *set bayonets \"yes\"\nAs you wait for the order, the two rebel howitzers fire almost simultaneously.  A huge plume of smoke obscures them and the metallic bang makes you wince.  The cannister shot tears a gap in your line, with an arc of blood and body parts flying backward.  Smoke and dust rises from the ground in a long line from the guns to your unit.  The dead and wounded from the blast crumple in the grass and the men around them are splattered in gore as they try to reform their ranks.  \n\nCaptain Hubbard of Company I is crawling away in a pitiable state of destruction.  His right leg is hanging on by a scrap of flesh at the knee and his face is splattered with blood and marked with wide eyed terror.  \n*set regimental_strength -6\n*set second_battalion -6\n*set officers -1\n*set i_company_commander \"1st Lt. John Hatcher\"\n\n\"Sir,\" yells Captain Bowles beside you over the din of sound.  \"Where are we charging?  I mean, what is our target?  I can tell the company commanders.\"  \n*choice\n  #\"Everyone attack the infantry behind the fence line.  Those howitzers will be less of a threat at close range.\"  \n    *set target \"infantry\"\n    *goto delta\n  #\"Companies I and K, attack the cannons.  Everyone else, attack the infantry.\"  \n    *set target \"both\"\n    *goto delta\n  #\"The whole battalion will swing right to attack the artillery crews.  The ${minnesota_regiment} can support the other battalion.\"  \n    *set target \"artillery\"\n    *goto delta\n*label delta\n\"Very good, Sir.\"  Bowles hurries off to spread the word to your subordinates.  You glance left, awaiting the order to charge.  You see Colonel Willcox scanning the line for readiness.  Then he turns to the bugler and says something.  \n\n\"Ready, boys!\" you shout.  The bugle sounds the charge.  \"Charge!\" you scream at the top of your lungs.  The regiment roars in answer, a defiant bellow of rage, as their legs propel them forward into the maw of the enemy.  It is a battle cry that must have graced a thousand battlefields, from antiquity to the middle ages to now.  \n\n*if target = \"infantry\"\n  *goto attack_infantry\n*if target = \"artillery\"\n  *goto attack_artillery\n*if target = \"both\"\n  *goto attack_both\n\n*label attack_infantry\nThe entire regiment charges forward toward the fence.  Your view bounces up and down as you sprint along with your men.  The fence is close now and several rebel muskets discharge, but most of the enemy is loading or bracing for the impact of the charge.  Your line hits the fence and several men instantly vault over it, toppling defenders.  More of your men stab between the boards with bayonets.  Those with loaded weapons fire back and forth, adding smoke to the howling chaos of the fight.\n*fake_choice\n  #\"Climb the fence!\"\n    Some of your men keep the rebels at bay, grappling and stabbing through the fence, while other climb or vault it.  A few of these are knocked off or injured doing this, but more of them get across and join the fray.  \n  #\"Tear down the boards!\"\n    Some of your men keep the rebels at bay, grappling and stabbing through the fence, while others pull apart the carefully constructed boards.  With the obstacle coming to pieces, the Union men push forward with another roar.  \n*if battle_efficiency = \"highest\"\n  Already softened up by the volleys, the rebels are crumbling before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -2\n  *set first_battalion -1\n  *set second_battalion -1\n*if battle_efficiency = \"high\"\n  Already softened up by the volleys, the rebels are crumbling before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -2\n  *set first_battalion -1\n  *set second_battalion -1\n*if battle_efficiency = \"medium\"\n  Already somewhat softened by the volleys, the rebels are breaking before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -3\n  *set first_battalion -2\n  *set second_battalion -1\n*if battle_efficiency = \"low\"\n  The rebels are giving back from the fence line, but fighting furiously.  Some of them are starting to run back down the far slope of the ridge.  \n  *set regimental_strength -4\n  *set first_battalion -2\n  *set second_battalion -2\n*if battle_efficiency = \"lowest\"\n  The rebels are giving back from the fence, but fighting furiously.  Some of them are starting to run back down the far slope of the ridge.  \n  *set regimental_strength -5\n  *set first_battalion -3\n  *set second_battalion -2\n\"Look out!\" screams a voice on your right.  Looking that way, you see the two howitzers.  They have been turned to the side and are aimed down the length of your line; enfilade fire.  As this knowledge and dread wells up in your mind, you see the gun crews cover their ears and lean away from the pieces.  \n\nBoth cannons fire with a thump and you hear the wail of lead balls all around you.  Men are collapsing and blood splashes through the air.  Legless bodies fall like towers, headless bodies crumple, screams fill the air.  They each fired double cannister shells, hitting your unit with the enormous buckshot.  The survivors stand, shocked, in the midst of the gore and chaos.  There is no reason or rationale for this dichotomy.  The only difference between the living, maimed, and dead is dumb luck.  \n*set regimental_strength -8\n*set second_battalion -8\n*choice\n  #\"Turn right!  Fire on those guns!\"\n    You rally all the men who will attend.  Most of the remnants of Company K, the right flanking company hit hardest, are able to be rallied.  These men form a rough line, facing the guns.  You see the Confederates putting new charges into the muzzles.  \n    \n    \"Ready, aim, fire!\"  Your men fire a volley.  Nearly half the gun crews are wiped out.  One loader falls and grabs the barrel of the gun, trying to hold himself up before tumbling in a heap beneath it.  The horse teams behind the massive guns scream as the musket balls carry past the gun crews and strike them.  The rest of the gunners need no further convincing.  They unceremoniously abandon the guns and sprint into the copse of trees as fast as they can run.  \n    *goto win\n\n\n*label attack_artillery\nSecond Battalion angles to the right, charging up the dissipating line of smoke left by the cannister shot.  Through the haze, you can see the Confederate gun teams working furiously, sponging and loading the guns to fire again.  They have thrown off their coats and now their suspenders are visible over sweat-soaked undershirts.  \n\nThe Confederate artillery officer notices that you are charging at them, and he yells and harangues the men to hurry.  Fifty yards, forty, thirty.  The rebel gunners are ramming the cannister charges into the guns.  Then another shell, double cannister.  They roll the guns forward so the barrels stick through the wooden fence.  At twenty yards, the battalion roars anew in fear and anger.  The men swerve away from the gun barrels like a flock of birds, sweeping around to either side.  You follow the left group but you aren't far out of the sights when you hear the order.  \n\n\"Fire!\"  Your vision goes dark and you feel yourself thrown to the ground, rolling from the hit.  You ask yourself if you are dead.  Your head is pounding and you manage to peel open your right eyelid.  The left side of your face is pressed into the ground and you can see nothing but the blades of grass and the all-pervading powder smoke.  \n\nSomeone pulls you up and you rest a moment on your knees, feeling your body for any gaping holes that weren't there this morning.  \"Sir, are you alright?\"  A young soldier is trying to help you up.  You can hardly see five feet in front of you for all the smoke.  Your ears are thrumming and your head is spinning from the shock, but you seem to be otherwise unhurt.  \n*set concussion \"yes\"\n*achieve survive_cannon\n*set regimental_strength -3\n*set second_battalion -3\n*fake_choice\n  #\"I am alright.  Help me up.\"\n    The private helps you to your feet.  \n  #\"Forward!  Keep going!\"\n    The private still helps you to your feet before moving forward.  \nYou continue forward into the smoke and chaos.  Now you are at the fence line and the last of your battalion is vaulting over.  A few of the rebel gunners stand and fight, but many more are fleeing in terror.  Your head swoons again and you grip the fence to hold yourself up. \n*if bayonets = \"yes\"\n  You see a rebel gunner in a dark red shirt as he tries to fight with a rammer, wielding it like a quarter staff.  A Union soldier takes the blow and rams his bayonet deep into the man's guts.  The two of them almost embrace as the rebel falls forward while the Yankee tries to pull his blade back out.  \n*if bayonets = \"no\"\n  You see a rebel gunner in a dark red shirt as he tries to fight with a rammer, wielding it like a quarter staff.  A Union soldier is struck repeatedly and collapses, but another man swings his musket like a club and practically takes the rebel's head off his shoulders.  \n  *set regimental_strength -2\n  *set second_battalion -2\n\nGathering your reviving strength and focus, you vault the fence and join the rest of your battalion.  The howitzers are silent now and the gun crews are vanishing into the trees behind them.  On the left, you see First Battalion and the ${minnesota_regiment}.  \n*if battle_efficiency = \"highest\"\n  Already softened up by the volleys, the rebels are crumbling before the attack.  \n  *set regimental_strength -3\n  *set first_battalion -3\n*if battle_efficiency = \"high\"\n  Already softened up by the volleys, the rebels are crumbling before the attack.  \n  *set regimental_strength -4\n  *set first_battalion -4\n*if battle_efficiency = \"medium\"\n  Already somewhat softened by the volleys, the rebels are breaking before the attack.  \n  *set regimental_strength -5\n  *set first_battalion -5\n*if battle_efficiency = \"low\"\n  The rebels are giving back from the fence, but fighting furiously.  \n  *set regimental_strength -7\n  *set first_battalion -7\n*if battle_efficiency = \"lowest\"\n  The rebels are giving back from the fence, but fighting furiously.  \n  *set regimental_strength -8\n  *set first_battalion -8\n\n*label echo\nThe wooden farm house is on your right now, and muskets are firing down on your men from the upper windows and loopholes.  \n*set regimental_strength -1\n*set second_battalion -1\n*choice\n  #Turn the cannons on the house.  \n    \"Man the guns!  Turn them on the house!\"  The officers around you start shouting the order and gathering groups of men to operate the guns.  Many of the men are cheering or rooting through rebel supplies, but enough are still in discipline to man the weapons.  You pile in to help turning one of the howitzers, gripping the wheel and pulling with all your might.  The men groan with the joint effort and the gun is traversed back from the fence and then right to face the building.  A private behind you keeps stepping on the heels of your boots as you back up.  \n    \n    Now the weapons are in place and you can almost feel the apprehension of the rebels in the house.  Stepping back, you see the men clumsily loading the weapons.  They sponge the barrels then place the charge and the shell in the muzzle.  A knowledgeable sergeant is directing the men in the loading process.  Now the shells are rammed down and the men step out of the way.  \n    \n    \"Fire!\"  The men pull the lanyards and the house disappears behind two huge plumes of smoke.  The explosions reverberate in the air as you peer through the haze.  The nearest wall of the house is caved in and debris is still falling from the second story.  The rebel fire has stopped, and you see a few men fleeing out of the ruined structure.  \n    *set regimental_strength -1\n    *set second_battalion -1\n    *goto win\n  #Storm the house with infantry.\n    \"Come on, boys!  Storm the house, let's go!\"  Many of the men are cheering or rooting through rebel supplies, but enough are still in discipline to form a platoon around you.  \"Forward, now!\"  The group rushes forward and around the house to the front porch.  Glancing up, you see an astonished rebel looking out of a second story window.  \"Look out, Yankees are comin' in!  Guard the door!\"  \n    \n    Leading the way onto the porch, you brace yourself against a wooden post and kick the door down.  Two rebel muskets fire but you are not hit.  Charging into the smoke, you pistol one man and the other throws down his musket in surrender.  The platoon fans out to clear the first floor, and you follow two of your men upstairs.  At the top of the stairs is a rebel who is so startled that he does nothing as the leading Union soldier drives a bayonet into his stomach.  \n    \n    You follow the other man through a door on the right and two rebels turn their muskets on you.  You shoot the one on the right with your pistol and the other one shoots your comrade.  Then he rushes you, using the musket as a club to knock the pistol aside.  It flies out of your hand and across the room.  Ducking his next swing, you throw your weight against his legs and barrel him down.  His head hits the floor hard and the musket skates across the room.  \n    \n    The rebel is not beaten, however, and he hits you twice in the head before you can get your guard up.  He turns over and starts to crawl away.  \n    *set regimental_strength -1\n    *set second_battalion -1\n    *fake_choice\n      #Go for my pistol.  \n        Standing up, you stagger over to where you think your pistol went.  You see it laying by a half full bookcase and you grab it.  Turning, you see the man charging you with musket in hand, ready to club you to death.  In a heartbeat, you bring up your gun and fire twice.  The bullets hit him in the chest and stomach and he tumbles down at your feet.  Rolling over, you see his bearded face staring up at you, eyes wide and mouth open, sucking for air as blood wells up in it.  \n      #Try to take his bayonet.  \n        Lunging forward, you grab the long saber bayonet in his belt.  He rolls over and tries to wrest the weapon away from your grasp.  You yank on it which cuts his reaching hand, and he recoils in pain.  You seize the moment of vulnerability and drive the blade into his groin.  The man  screams with pain and writhes like an animal in a trap.  You pull the blade free and drive it into his chest with the strength of both arms.  His cries are cut short as the blade punctures his vitals and stabs into the floor.  \n      #Attack him with your hands before he recovers.  \n        Lunging forward, you grab his hair and slam his head into the wooden floor twice.  He wriggles free and rolls over to fight back.  You punch him in the face and then grab his throat.  You squeeze painfully hard and feel your gloved fingers pushing deep into the soft flesh of his neck.  His face turns red as he swings his fists up at you in impotent fury.  You start to slam his head against the floor over and over with all your strength.  As you slam it again and again, the man's attacks grow feebler.  At last, he goes limp and ceases to resist.  You let go and look at your gloves with shock at your own ferocity.  \n    \n    Three Union soldiers come through the door and join you.  You are ready to go through the next door when it opens and you hear a southern accent, \"We give up, don't shoot us!\"  Three muskets are tossed through the door into the room you are in.  \"We comin' out, don't shoot.\"  You control the house, now.  \n    *goto win\n\n\n\n\n\n*label attack_both\nAs they run, the right half of the battalion breaks off and charges diagonally toward the two howitzers.  \n*choice\n  #Join the left attack on the infantry.  \n    *goto infantry_half\n  #Join the right attack on the artillery.  \n    *goto artillery_half\n\n\n\n\n*label infantry_half\nYou join the three companies charging forward to the infantry behind the fence.  Your view bounces up and down as you sprint along with your men.  The fence is close now and several rebel muskets discharge, but most of the enemy is loading or bracing for the impact of the charge.  Your line hits the fence and several men instantly vault over it, toppling defenders.  More of your men stab between the boards with bayonets.  Those with loaded weapons fire back and forth, adding smoke to the howling chaos of the fight.\n*fake_choice\n  #\"Climb the fence!\"\n    Some of your men keep the rebels at bay, grappling and stabbing through the fence, while other climb or vault it.  A few of these are knocked off or injured doing this, but more of them get across and join the fray.  \n  #\"Tear down the boards!\"\n    Some of your men keep the rebels at bay, grappling and stabbing through the fence, while others pull apart the carefully constructed boards.  With the obstacle coming to pieces, the Union men push forward with another roar.  \n*if battle_efficiency = \"highest\"\n  Already softened up by the volleys, the rebels are crumbling before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -2\n  *set first_battalion -1\n  *set second_battalion -1\n*if battle_efficiency = \"high\"\n  Already softened up by the volleys, the rebels are crumbling before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -3\n  *set first_battalion -2\n  *set second_battalion -1\n*if battle_efficiency = \"medium\"\n  Already somewhat softened by the volleys, the rebels are breaking before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -4\n  *set first_battalion -2\n  *set second_battalion -2\n*if battle_efficiency = \"low\"\n  The rebels are giving back from the fence line, but fighting furiously.  Some of them are starting to run back down the far slope of the ridge.  \n  *set regimental_strength -5\n  *set first_battalion -3\n  *set second_battalion -2\n*if battle_efficiency = \"lowest\"\n  The rebels are giving back from the fence, but fighting furiously.  Some of them are starting to run back down the far slope of the ridge.  \n  *set regimental_strength -6\n  *set first_battalion -3\n  *set second_battalion -3\n\nLooking to the right, you see the two companies you sent right to deal with the artillery.  Through the smoke, you can see that they are winning but they took some losses.  Now they are turning the guns on the wooden farmhouse to their right, which is being used as a firing platform for the rebels.   The men pull the lanyards and the house disappears behind a huge plume of smoke.  When it clears, you see the nearest wall of the house is caved in and debris is still falling from the second story.  The rebel fire has stopped, and you see a few men fleeing out of the ruined structure.  \n*set regimental_strength -9\n*set second_battalion -9\n*goto win\n*label artillery_half\nYou follow the two companies as they angle to the right, charging up the dissipating line of smoke left by the cannister shot.  Through the haze, you can see the Confederate gun teams working furiously, sponging and loading the guns to fire again.  They have thrown off their coats and now their suspenders are visible over sweat-soaked undershirts.  \n\nThe Confederate artillery officer notices that you are charging at them, and he yells and harangues the men to hurry.  Fifty yards, forty, thirty.  The rebel gunners are ramming cannister shells into the cannons.  Then another shell, double cannister.  They roll the guns forward so the barrels stick through the wooden fence.  At twenty yards, the battalion roars anew in fear and anger.  The men swerve away from the gun barrels like a flock of birds, sweeping around to either side.  You follow the left group but you aren't far out of the sights when you hear the order.  \n\n\"Fire!\"  Your vision goes dark and you feel yourself thrown to the ground, rolling from the concussive force.  You ask yourself if you are dead.  Your head is pounding and you manage to peel open your right eyelid.  The left side of your face is pressed into the ground and you can see nothing but the blades of grass and the all-pervading powder smoke.  \n\nSomeone pulls you up and you rest a moment on your knees, feeling your body for any gaping holes that weren't there this morning.  \"Sir, are you alright?\"  A young soldier is trying to help you up.  You can hardly see five feet in front of you for all the smoke.  Your ears are thrumming and your head is spinning from the shock, but you seem to be otherwise unhurt.  \n*set concussion \"yes\"\n*achieve survive_cannon\n*set regimental_strength -5\n*set second_battalion -5\n*fake_choice\n  #\"I am alright.  Help me up.\"\n    The private helps you to your feet.  \n  #\"Forward!  Keep going!\"\n    The private still helps you to your feet before moving forward.  \nYou continue forward into the smoke and chaos.  Now you are at the fence line and the last of your unit is vaulting over.  A few of the rebel gunners stand and fight, but many more are fleeing in terror.  Your head swoons again and you grip the fence to hold yourself up. \n*if bayonets = \"yes\"\n  You see a rebel gunner in a dark red shirt as he tries to fight with a rammer, wielding it like a quarter staff.  A Union soldier takes the hit and rams his bayonet home in the man's guts.  The two of them almost embrace as the rebel falls forward while the Yankee tries to pull the blade back out.  \n*if bayonets = \"no\"\n  You see a rebel gunner in a dark red shirt as he tries to fight with a rammer, wielding it like a quarter staff.  A Union soldier is struck repeatedly and collapses, but another man swings his musket like a club and practically takes the rebel's head off his shoulders.  \n  *set regimental_strength -2\n  *set second_battalion -2\n\nGathering your reviving strength and focus, you vault the fence and join the rest of your battalion.  The howitzers are silent now and the gun crews are fighting for their lives.  As they give back, they manage to take down a few Union soldiers, but at last they break and run away into the trees behind the battery.  \n\nLooking left, you can see the majority of the regiment fighting with the enemy infantry.  \n*set regimental_strength -2\n*set second_battalion -2\n*if battle_efficiency = \"highest\"\n  Already softened up by the volleys, the rebels are crumbling before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -2\n  *set first_battalion -1\n  *set second_battalion -1\n*if battle_efficiency = \"high\"\n  Already softened up by the volleys, the rebels are crumbling before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -3\n  *set first_battalion -2\n  *set second_battalion -1\n*if battle_efficiency = \"medium\"\n  Already somewhat softened by the volleys, the rebels are breaking before the attack.  Driven back from the fence line, they start to run away down the far side of the ridge.  \n  *set regimental_strength -4\n  *set first_battalion -2\n  *set second_battalion -2\n*if battle_efficiency = \"low\"\n  The rebels are giving back from the fence line, but fighting furiously.  Some of them are starting to run back down the far slope of the ridge.  \n  *set regimental_strength -5\n  *set first_battalion -3\n  *set second_battalion -2\n*if battle_efficiency = \"lowest\"\n  The rebels are giving back from the fence, but fighting furiously.  Some of them are starting to run back down the far slope of the ridge.  \n  *set regimental_strength -6\n  *set first_battalion -3\n  *set second_battalion -3\n*goto echo\n*label win\n\nSome minutes after the fight is over, as you are rallying your men back into a cohesive unit, you see Colonel Willcox jogging toward you with his staff officers in tow.  \"Move forward and make sure those rebels do not reform!  Move to the edge of the ridge and no further.  Find a defensive position and wait for orders.  General McDowell has sent for me.  I will return to you as soon as I may.\"  A smile breaks out on his face and he takes your hand, shaking it vigorously.  \"God bless us, Major!  A hard morning's labor, but it was well done.  Carry on.\"  \n*page_break\n*goto_scene ridge", "march": "You return to your regiment to find that Captain Bowles has done admirably.  The men are awake and gathered around campfires, having their breakfast.  The scent of brewing coffee and grilled meat largely drives away the stink of sweat and latrines.  You oversee the preparations as well as you can, but the men are hard to control.  Military discipline has yet to grace many of them, but at least they are too tired to cause much mischief.  \n\nMarching orders arrive before long: [i]1st $!{state} (Maj. $!{surname}), 4th Michigan (Col. Woodbury), 11th New York (Col. Farnham), 38th New York (Col. Ward), 2nd U.S. Artillery Company D (Cpt. Arnold).  [/i]\n\nYour regiment will be first in line.  The plan was to march at two o'clock, but the ragtag volunteers take longer than expected to get ready.  Finally, at thirty minutes past two, the march begins in earnest.  \n\nThe soldiers are rather subdued at first, no doubt still tired and feeling the effects of last night's whiskey.  You ride your horse near the head of the column for about thirty minutes, accompanied by the brigade commander, Willcox.  You can see the outlines of two story houses as you enter the town of Centreville.  Suddenly, the battalion in front of you stops in their tracks.  \n*choice\n  #\"1st $!{state}, halt!\"\n    \"Halt!\" the other officers instantly back you up, sending the cry on down the line in the darkness behind you.  Some of the men in the front of the column keep walking and crash headlong into the unit in front of them.  The men at the back of that unit turn around and start pushing, and the two groups begin to scuffle.  \n    *choice\n      #\"Shut the hell up!  Get back in formation!\"\n        Most of the men ignore you and some others start to whoop and cheer as the fight continues.  \n        *choice\n          #Fire your pistol in the air.\n            You pull out your colt revolver, cock the hammer, and fire into the air.  The loud report of the gun cracks through the still night and startles everyone nearby.  \n            *goto pistol\n          #Ride into the mill and start kicking with your cavalry spurs.\n            You spur your mount forward and feel a thump as its hooves knock over two fighting men.  You offer a sturdy left foot kick to some Private from the other regiment before feeling someone tugging on your right boot, a man of your own regiment.  You yank your foot out of his hands and kick him in the face three times before he falls down.  He cries out in pain and the fight breaks up.  Someone lifts the man to his feet and you see glistening blood running down his cheek from a three inch gash.  \n            *goto kick\n      #\"Get back in line or I'm putting you all up on charges!\"\n        Most of the men ignore you and some others start to whoop and cheer as the fight continues.  \n        *choice\n          #Fire your pistol in the air.\n            You pull out your colt revolver, cock the hammer, and fire into the air.  The loud report of the gun cracks through the still night and startles everyone nearby.  \n            *goto pistol\n          #Ride into the mill and start kicking with your cavalry spurs.\n            You spur your mount forward and feel a thump as its hooves knock over two fighting men.  You offer a sturdy left foot kick to some Private from the other regiment before feeling someone tugging on your right boot, a man of your own regiment.  You yank your foot out of his hands and kick him in the face three times before he falls down.  He cries out in pain and the fight breaks up.  Someone lifts the man to his feet and you see glistening blood running down his cheek from a three inch gash.  \n            *goto kick\n      #Ride your horse into the middle of the brawl to break it up.\n        Riding into the mill with your horse, some of the men on both sides back off.  A few of the thicker ones just try to get around you to continue the fight.  \"Get the damn horse out the way, now!\" yells a voice from your own formation.  \n        *choice\n          #Fire your pistol in the air.\n            You pull out your colt revolver, cock the hammer, and fire into the air.  The loud report of the gun cracks through the still night and startles everyone nearby.  \n            *goto pistol\n          #Start kicking with your cavalry spurs.\n            You offer a sturdy kick to some Private from the other regiment.  You feel someone tugging on your right boot, a man of your own regiment.  You yank your boot out of his hands and kick him in the face three times before he falls down.  He cries out in pain and the fight breaks up.  Someone lifts the man to his feet and you see glistening blood running down his cheek from a three inch gash.  \n            *goto kick\n      #Do nothing.\n        Men begin to whoop and cheer as the fight continues.  Colonel Willcox rides forward.  Pulling out his revolver, he fires a shot into the air, cracking the stillness of the night air with its loud report.  \"My next bullet will be for the next man to throw a punch or say one word!\" screams the Colonel at the top of his lungs.  \"You god damned undisciplined scoundrels!  You call yourselves soldiers?!  I've never seen such a pathetic, criminal display in all my years!  Get back in line!\"  \n        *goto do_nothing\n\n*label pistol\nThe fight breaks up and most of the men start going back to their columns.  \n*fake_choice\n  #\"Get back in line and shut your mouths!  Sergeants, take those men's names!\"\n  #\"The next one out of line gets a bullet between the eyes!\"\n*goto next\n*label kick\n*fake_choice\n  #\"Get back in line and shut your mouths!  Sergeants, take those men's names!\"\n  #\"If you survive this day, I'll see you court martialed!\"\n*goto next\n\n*label do_nothing\nColonel Willcox rides back to you, \"Undisciplined rabble, worse than a frontier militia.  You had best keep your men in line, Major.\"  \n*fake_choice\n  #\"Yes, Colonel.\"\n  #\"I only hope they fight the enemy with such zeal.\"\n    \"God send they do, Major.\"\n*goto alpha\n*label next\nColonel Willcox shakes his head and laughs as you ride back to him.  \"God help us.  With soldiers like this, its a miracle that we can march them in the right direction.\"  \n*fake_choice\n  #\"They'll do their duty when the moment comes.\"\n    \"God send they do, Major.\"  \n  #\"I only hope they fight the enemy with such zeal.\"\n    \"God send they do, Major.\"\n*label alpha\nYou sit in the saddle, waiting for the column to start moving again.  You check your pocket watch by the dim light of a torch.  Twenty minutes have passed.  Something must be holding up the column.  Colonel Willcox curses, \"Damnation!  Captain, ride up there and find out what the hold up is.\"  The staff officer rides off forward.  As more time passes, the men in the column start to sit down and talk.  You can see candlelight in some of the windows of the houses nearby.  No doubt the occupants are wondering why an army is stationed right outside their front doors.  The men start up a song as they wait, a popular tune called A'rovin'.  \n\n[i]\"She placed her hand upon my toe,[/i]\n*line_break\n[i]mark well what I do say![/i]\n*line_break\n[i]She placed her hand upon my toe,[/i]\n*line_break\n[i]I said, young miss, you're rather low, [/i]\n*line_break\n[i]I'll go no more a'rovin' with you, fair maid.[/i]\n\nColonel Willcox chuckles and shakes his head.  \"Good Christ.\"  \n*page_break\n[i]\"She placed her hand upon my knee,[/i]\n*line_break\n[i]mark well what I do say![/i]\n*line_break\n[i]She placed her hand upon my knee,[/i]\n*line_break\n[i]I said, young miss, you're rather free![/i]\n*line_break\n[i]I'll go no more a'rovin' with you, fair maid.\"[/i]\n\nAt last, you can see the messenger returning along the stationary column of men.  Some lounging troops are getting in the way of his horse as he tries to get through.  \n\n[i]\"She placed her hand upon my thigh,[/i]\n*line_break\n[i]mark well what I do say![/i]\n*line_break\n[i]She placed her hand upon my thigh,[/i]\n*line_break\n[i]I said, young miss, you're rather high![/i]\n*line_break\n[i]I'll go no more a'rovin' with you, fair maid.\"[/i]\n\n[i]\"A rovin' a rovin,[/i]\n*line_break\n[i]Since rovin's been my ru-i-n,[/i]\n*line_break\n[i]I'll go no more a rovin' with you, fair maid.\"[/i]\n\nAs the song comes to an end, you hear enthusiastic clapping from a second story window.  The voice of a young lady floats down to you, \"Bravo!  Bravo!\" followed by the hissing voice of an older woman, \"Alice!\" and the clapping stops.  The soldiers hoot and whistle with appreciation, and you fear you may have to intervene again, but they do not attempt any further communication with the house.  \n\nThe messenger breaks through the crowd of men and salutes Colonel Willcox and yourself.  \"Sir, General Tyler's compliments.  First Division is having supply problems and… discipline problems.  The teamsters ran out of oats, and the mules won't pull the supply wagons without their oats.  They are holding up the advance.  I believe the general was somewhat disturbed, Sir.  He did not have much time to spare for me.\"  \n\nColonel Willcox slaps his leg angrily and shifts in his saddle.  \"Damn it all!  Hell and damnation, stubborn god damned animals!\"  \n*page_break\nHours of waiting go by, and the first light of dawn is in the sky as you finally start moving again.  First Division must have solved their logistical problems, because the column is marching west, again.  After leaving the town, you reach the road that turns north to curve up and around the enemy's flank.  Looking at your watch, you see that it is five minutes until six.  Your men are supposed to be starting their attack now, but you still have miles of ground to cover.  \n\nAs if in response to your checking the time, you hear the echo of distant artillery somewhere to the south or southeast.  The diversionary attacks are beginning.  Colonel Willcox looks at you with unease, \"What's o'clock, Major?\"  \n\n*fake_choice\n  #\"Six o' the clock.  We are well behind our time.\"  \n  #\"Six o' the clock.  The plan is out.  They will see our men from ten miles away, now.\"  \n\n\"It is too late to demur now.  In any case, we cannot deviate without orders.  Hell and death.  We must carry on.\"  \n\nThe column marches north along the crest of a ridge.  In the first light of dawn, you can see the dust rising from marching men to the west.  Beyond them, you can faintly see the outline of Bull Run creek as it slithers across the landscape.  As the march continues, the sun rises above the horizon.  The road begins to narrow and follows the landscape down off the ridge and into a lowland wooded area.  Before long, it dwindles to little more than a cart track, weaving between the trees.  The columns tighten their files to only three men wide.  You cross an unfinished railroad cutting that carves right through slopes and trees of the landscape.  \n\nChecking your pocket watch, you see that it is fifteen minutes till eight o'clock.  The sunlight shines through the branches and you can see the road clearly.  The faint roar of cannon echoes in the distance.  First Division must be launching its diversionary attack across the stone bridge to the south.  \n\n*choice\n  #Check in with the battalion commanders.  \n    Your regiment is divided into two battalions of five companies each, with about 400 men per battalion.  You squeeze your horse's flanks with your boots, bringing the animal to a gradual stop.  The beast throws back its head and snorts in objection to this deviation, but it offers no further resistance.  A moment later, Captain Charles Lum comes alongside you and you gently kick the horse's side to match pace with him.  \n    \n    \"Good morning, Sir,\" he says pleasantly, looking up at you.  Captain Lum is your second in command, and the commander of First Battalion.  He is a spare young man, with deep set eyes, a long black beard, and thick hair protruding from under his cap.  \n    *image lum.png\n    *choice\n      #\"A fine morning, Captain.  How are you holding up?\"\n        \"Splendid, Sir.  Perhaps a trifle tired, but I'm certain it will fall from me as soon as I lay eyes on the enemy.\"  \n        *label foxtrot\n        *choice\n          #\"And how are the men doing, Captain?\"  \n            \"Oh, they miss their tents, to be sure.  But do not worry about them, they've more than enough spirit for the trials ahead.  All of the officers have behaved excellently, as well.  I've no complaints, Sir.\"  He smiles slightly through his thick whiskers, \"Although, if I may take the liberty, I feel a certain vexation that I've no time for leisure.  The marching troops, the landscapes, the trees, all of it makes me wish I had a brush in my hand.\"  \n            *goto delta\n          #\"Are you having any difficulties, Captain?\"  \n            \"No, Sir.  Nothing I cannot handle.  All of my officers have seconded me perfectly.  I've no complaints, Sir.\"  He smiles slightly through his thick whiskers, \"Although, if I may take the liberty, I feel a certain vexation that I've no time for leisure.  The marching troops, the landscapes, the trees, all of it makes me wish I had a brush in my hand.\"  \n            *goto delta\n      #\"Good morning.  Do you have anything to report?\"\n        \"Nothing extraordinary, Sir.  Some of the usual disobedient foolery, but I have it all well in hand.  Sergeant Major Keating is a great help, of course.\"  \n        *goto foxtrot\n    *label delta\n    *choice\n      #\"You were a painter before all this, no?\"\n        \"Yes Sir, I am a painter.  It is a passion of mine; to create beautiful images that reflect the world around us.  Do you find yourself moved by any such passion, Sir?\"\n        *choice\n          #\"Patriotism is my great passion.  I love the Union and I will lay down my life for her, if needs be.\"  \n            \"Amen, Sir!  We must do whatever is necessary to save our beloved Union.\"  \n            *goto golf\n          #\"Politics is where my passion lies.  I want to make the world a better place.\"  \n            \"Ah.  By your leave, may I make so bold as to ask, what are your politics?\"  \n            *choice\n              *if background = \"Prussian revolutionary\"\n                #\"I am a Socialist.  I believe in the equality of man, and I deny the right of monarchs, and all who would subjugate their fellows.  I fought for this cause in Prussia, and I do so again in America.\"  \n                  \"Well.  I have no love for kings or lords, being a proud Republican.  Democracy and freedom are essential to liberty.  That is why I am here, Sir.\"  \n                  *goto golf\n              #\"I am a moderate, like President Lincoln.  We must find compromise for the betterment of all people, and we must preserve the Union above all other considerations.\"  \n                \"Yes Sir!  We must do whatever is necessary to save our beloved Union.\"  \n                *goto golf\n              #\"I am an abolitionist, first and foremost.  Slavery is a wicked evil and it must be contained, if not abolished entirely.\"  \n                \"I admire your opinion, Sir.  This foolish rebellion only proves its sickening influence.  They would betray their nation and Constitution to spread such an evil thing.  It is… not right.\"  \n                *goto golf\n          #\"Women have been known to move my heart, on occasion.  \n            Lum lets out an involuntary chuckle.  \"They do have a certain charm to them, have they not?  I'll not deny it will be a relief to see my wife again when this is all over.\"  \n            *goto golf\n          #\"The arts are a worthy passion, and I believe I share that with you.  Be it words on a page or brush strokes on canvas, there is something marvelous about it.\"  \n            Lum smiles with ingenuous pleasure, \"Thank you, Sir.  I did not know you were of like mind.  I must show you some of my paintings when we return home.\"  \n            *goto golf\n          #\"God is my greatest devotion.  All life flows from Him, and we are but players on the grand stage of His making.\"  \n            \"A worthy and admirable pursuit, Sir.  I honor your devotion.  I find that I am most in touch with God when I am standing in front of an easel.  I can mimic his creation with my own petty imitations.\"  \n            *goto golf\n          *if background = \"Career Soldier\"\n            #\"I am not a passionate man.  I am a professional.\" \n              \"I understand you, Sir.  And I, for one, honor your commitment to duty.\"  \n              *goto golf\n          *if background = \"Irish nationalist\"\n            #\"My heart belongs to Ireland.  My greatest wish is to return to Erin someday, and free my countrymen from the English yoke.\"\n              \"I understand you, Sir.  A man surely must love his own country above all others.  Our grandfathers threw off the English yoke, as you know, but that freedom must be extended to all men.\"  \n              *goto golf\n      #\"Try to stay focused, Captain.\"\n        \"Yes Sir.  I beg your pardon for taking the liberty, Sir.\"  \n        *goto golf\n    *label golf\n    *choice\n      #\"That will be all, Captain.\"\n        \"Thank you, Sir.\"  \n        *goto charlie\n  #Ride down the line and review the troops.  \n    You turn your horse, pulling its head back to avoid it hitting an inconvenient tree.  The animal snorts with disapprobation at the deviation, but it obeys.  You ride slowly down the line, watching the marching lines of blue clad men.  Most of them don't look up, but some of the Sergeants give you the musket-carrying salute; one arm across the chest.  \n    \n    For the most part, the men look tired but acceptable.  Then you see one man, a baby faced Private, returning to the column from out of the woods on your right.  He tips his hat and says, \"Fine morning, Sir.\"  \n    *choice\n      #\"What are you doing out of line, Private?!\"\n        \"Just had a need, Sir, begging your pardon.  An urgent need that would not wait.\"  \n        *choice\n          #\"Did you ask leave of your sergeant or company officer?\"\n            \"Uh, no, Sir.  No doubt I should have done so.  Only, well… well it was a bit sudden, begging pardon.\"  \n            *choice\n              #\"Give me your name and company.  I'm putting you up on charges.\"\n                He looks a bit downcast, but not nearly as much as he probably should.  \"Private David Wilkes, B company, Sir.\"  He hurries back to his place in the column.  \n                *goto bravo\n              #\"Very well.  Get back to your place, Private.\"\n                \"Thank you, Sir.\"  He hustles on up to his place.  You shake your head with almost comical disbelief, before returning to the front of the column.  \n                *goto bravo\n          #\"Give me your name and company.  I'm putting you up on charges.\"\n            He looks a bit downcast, but not nearly as much as he probably should.  \"Private David Wilkes, B company, Sir.\"  He hurries back to his place in the column.  \n            *goto bravo\n          #\"Very well.  Get back to your place, Private.\"\n            \"Thank you, Sir.\"  He hustles on up to his place.  You shake your head with almost comical disbelief, before returning to the front of the column.  \n            *goto bravo\n      #\"Indeed it is.\"  \n        He hustles back up the line to find his place.  You have given up trying to keep discipline with these men.  \n        *goto bravo\n      #Ignore the fellow.\n        He hustles back up the line to find his place.  You have given up trying to keep discipline with these men.  \n        *goto bravo\n*label charlie\n\nStopping your horse again, you watch the men march by in three ragged files.  Muskets rest on their right shoulders, and the lines of weapons are a powerful sight to behold.  The sound of clinking canteens and marching feet fills the air.  \n\nYou kick the animal back into a walk as your other battalion commander comes along side you.  \"What may I do for you, Sir?\"  A friendly smile accompanies the greeting, turning up the ends of his black mustache and mutton chops.  Captain Withington of Second Battalion is a social creature.  He was a manufacturer of farm implements when the call for volunteers came.  \n*image withington.png\n*fake_choice   \n  #\"How are you doing, Captain?\"\n    \"Just splendid, Sir.  I am eager to 'see the elephant.'  I don't feel nervous at all.\"\n  #\"Do you have anything to report?\"\n    \"Nothing out of the way, Sir.  I have placed several officers at the rear of the column to prevent stragglers falling behind, but they haven't reported any problems, yet.\"  \n*choice\n  #\"How are your men doing, Captain?\"\n    \"Well as can be, Sir, with such an early call.  I imagine the artillery has a harder time of it, moving guns down this winding, little path.  No doubt, that has been the cause of the frequent stops.\"  \n    *goto echo\n  #\"What do you think of the Army, Captain?\"\n    \"Oh, it is remarkably pleasant, Major.  It reminds me of my boyhood.  Sleeping out of doors, walking in the woods and the fields.  And, with a little luck, we shall have a chance to test ourselves against the enemy.\"  \n    *choice\n      #\"I agree, Captain.  It's the soldier's life for me!\"\n        His smile widens and he nods emphatically.  \n        *goto echo\n      #\"You know that some of these men will likely not come home when it's all over?\"\n        His smile diminishes, slightly.  \"Yes, Sir, I am sure you are right.  But, though there may be a vacant chair, we shall drink to those who fell with honor defending their country.\"  \n        *goto echo\n*label echo\n*fake_choice\n  #\"Thank you, Captain Withington.\"\n    \"You are welcome, Sir.\"\n  #\"That will be all, Captain.\"\n    \"Thank you, Sir.\"\n*label bravo\n\nYou come out of the woods at last and see the landscape.  Up ahead on the right, the land slopes up and down in gentle hills.  On the left, it cascades gently down to the distant creek.  There are some fields cultivated with crops, but more of it is pasture land.  On the other side of Bull Run creek, you can see hilly terrain with a smattering of farmland and forest.  The landscape is beautiful in the morning sun, but you can already feel the July heat.  As you peer across the creek, you can see a glint of sun reflected from something on top of a distant hill.\n*fake_choice\n  #\"Look, Sir.  I think that is the glint of binoculars.  The enemy must be observing our movements.\"\n  #\"Colonel Willcox, do you see that scout, Sir?\"\nThe Colonel looks in the direction you are pointing.  \"I see it.  Be damned to the delay.  We should have been under the cover of darkness at this point.\"  \n*fake_choice\n  #\"With a blessing, the diversions will still draw many rebels away.\"  \n    Willcox nods agreement.  \"Indeed they may.  Whether or no, we shall outlast them.\"  \n  #\"This attack is not going as planned.  The enemy knows we approach and from which direction.  Would it not be better to turn back?\"\n    Willcox shakes his head.  \"No.  The enemy is but a band of rebellious plantation owners.  They cannot withstand the might of the full United States, not with an army of this size.  You worry yourself, unnecessarily, Major.  Even if we would be wise to turn back, we may not do so, not without orders.\"  \n    \nAs the columns continue to advance, the road becomes ever narrower and more winding.  The men abandon the neat files and walk along in clumps, up and down the gently sloping hills.  More time passes in this way, and it is not until after nine o'clock in the morning when you finally reach Sudley Ford.  The Sudley mansion, for which the ford is named, rests atop a hill to the north.  You can see a few straggling men in blue and red uniforms walking up the hill to the mansion.  God knows what they are about, stealing hens or worse.  \n\nYour horse's feet splash across the ford beside your column, now mostly reformed into lines.  Reaching the far side, you are thankful to see an actual dirt road traveling south.  Across the road is a small church with a wooden cross atop its humble steeple.  \n\nAs the men reach the far side of the ford, many abandon their ranks and join a growing huddle of men from various regiments along the shore.  Riding forward, you see the cause of the disturbance.  They have discovered a large patch of blackberries growing along the shoreline, and they are collecting the berries to eat later.  You bury your face in your glove.  Experience has taught you that berry bushes are too great a temptation, and no threats are likely to bring them back to a sense of their duty.  \n\nYour horse shivers nervously as you hear a distant booming.  A series of deep thumping noises indicate that a battery of cannons has opened fire, much nearer than any you have yet heard.  This is followed by a faint crackle of musket fire.  The battle is not far ahead; perhaps at the front of your marching column.  \n\nColonel Willcox turns to you, \"It sounds like the battle has begun in earnest.  I must find a high point from which to observe.  I must know what goes forward.  Will you join me, Major?\"\n*fake_choice\n  #\"Yes Sir, let me give orders to my next in command and then I shall join you.\"  \n  #\"Yes Sir.  Anything to avoid watching this display.\"  \nYou turn to Captain Lum, your second in command.  \"Captain, take command for a time.  Once they are done, follow the rest of the division along the southward road.  I shall return presently.\"  \n\n\"Very good, Sir,\" he replies with an automatic salute.  \n\nYou beckon to your adjutant, Captain Bowles, and follow the Colonel and his staff as they leave the road and make their way up the western slope behind the small church.  As your elevation increases, and you get out from the scattered tree cover, you hear the sounds of battle quite clearly to the south.  You can only spare a glance or two because Colonel Willcox is moving quite fast, seeking the highest point around.  \n\nAt last, you crest a relatively steep hill and see that a gaggle of officers is already there.  Willcox rides up and salutes an officer in a fine blue coat with a glittering gold saber on his belt.  You recognize the man as Colonel Samuel Heintzelman, the commander of Third Division and Willcox's direct superior.  He is an old man of nearly sixty, with a thick, graying beard.  He has a prosthetic glass left eye, which gives him a slightly crooked gaze.  Still, one would be unwise to mention it to the grizzled veteran of many wars who now leads seven thousands of men into battle.  \n\n\"Good morning, Colonel,\" says Willcox deferentially, \"We have come to survey the field.  This is Major $!{surname}, one of my regimental commanders.\"  \n*image heintzelman.png\n*fake_choice\n  #\"Good morning, Colonel.\"  \n  #\"Fine day for a fight, wouldn't you say, Colonel?\"  \n  #Salute but remain silent.  \nColonel Heintzelman returns the salute with a white gloved hand, before replying in a gravelly voice, tinged with a German accent.  \"Good morning, gentlemen.  Look,\" he points to the south.  Following his pointing finger, your eyes fall upon the battle.  Beyond two short hills, you see a high ridge.  Lines of blue coated Union soldiers are marching up the slope of the ridge.  At the crest, a regiment of Confederate soldiers stands behind a fence, reloading their muskets.  The land between you is rolling fields and woodlands.  \n\nYou watch the muskets come up, and a volley of smoke pours out, followed by the crackling sound of gunfire carrying across the hills.  The billowing smoke drifts up into the air behind the rebels, wafted by the wind.  The blue lines going up the hill seem to falter and ripple, before continuing forward.  You can see an officer on a horse, riding along the back of the line.  You can imagine his shouted orders above the din of battle.  The Union line stops, the muskets come up, and the smoke pours out in near unison as they return the volley.  You see them continuing up the slope, bayonets glinting in the sunlight, and leaving a line of crumpled, blue bodies behind them.  \n\nHeintzelman speaks again, \"Hunter's Division is engaged.  We must move every brigade forward as quick as may be.  The enemy is not here in force.  It might be a single brigade before us.\"  \n*image march1.png\n*set map_trigger \"march1\"\n*fake_choice\n  #I am exhilarated by the sight of battle so close.  \n  #Seeing the crumpled bodies of our men was horrifying.  \n    \nHeintzelman turns to one of his dozen staff officers, \"Ride up and find Colonel Hunter.  Ask him where he needs support, and put us at his disposal.\"  \n\n\"Yes, Sir!\" the staff officer salutes and rides off at a gallop.  \n\nHeintzelman turns to your group, \"Colonel Willcox, take your brigade in as quick as ever you can.  You are to hurry forward and find a place in the line of battle.  I will contact you if I have further orders.\"  \n\n\"Yes, Sir,\" Willcox salutes and then turns his horse away.  \n*page_break\n*goto_scene battle", "rescue": "*temp march \"\"\n*temp take_wounded \"\"\n*temp unit_size \"\"\n*set friendly_fire \"no\"\n*set battle_outcome +3\n*set south_skirmishers \"no\"\n*if volleys > 2\n  *achieve volley\n*if fire_at_will > 2\n  *achieve fire_at_will\n*if backup_plan = \"none\"\n  *set unit_size \"regiment\"\n  *goto start\n*else\n  *set unit_size \"battalion\"\n  *goto start\n*label start\n\"Regiment, attention!  Right… face!\"  You shout the orders in a parade ground cadence.  \"Forward at quick time… march!\"  The regiment begins to march, the thudding of boots joining the rattle of the drum.  \n\nLooking over your shoulder, you see Ward's fresh New Yorkers following your unit.  Beyond them, you can see more units moving up the hill from Young's Branch.  \n*if backup_plan = \"attack\"\n  The time has come, and you shout the prepared order, \"Second Battalion, detach!\"  Captain Clarkson raises his sword in the air and shouts more orders, taking command of the second half of your forces.  They move off of the road to the left and march toward the crest of Henry Hill to support the main attack.  \n*if backup_plan = \"flank\"\n  The time has come, and you shout the prepared order, \"Second Battalion, detach!\"  Captain Clarkson raises his sword in the air and shouts more orders, taking command of the second half of your forces.  You move First Battalion off of the road and allow the second half of your regiment to continue south to cover the flank.  \n  \nAs you march south, you pass thousands of men of all regiments mingling to the right of the road.  They watch anxiously as your column marches past them.  These untrained volunteers simply don't have the discipline or organization to stand in the battle line and be shot at any longer.  \n\nAt last, you reach the straggling end of this group.  \"$!{unit_size}, right turn, march!\"  The front of your line begins the turn, and each file of the column turns on the same point of ground.  You march the men into a line along the southern end of the shattered units.  \"Halt!\"  The line stops.  \n\n\"What shall we do now, Sir?\" asks your adjutant quietly.  You look over the disorganized mass of men and many stare back at you.  Among the exhausted, terrified groups are many wounded men, sitting or sprawled out in the grass.  \n*fake_choice\n  #\"We will march in line to drive them north.  We do not need to be rough with them, I believe they will respond to firm encouragement.\"  \n    *set march \"soft\"\n  #\"We will march in line to drive them north.  If they do not obey orders then they will obey the bayonet.\"  \n    *set march \"rough\"\n\"Yes Sir.  Beg your pardon, but what of those too wounded to walk?\"  \n*fake_choice\n  #\"Form stretcher teams.  Use anything that is available to make the stretchers.\"  \n    *set take_wounded \"yes\"\n  #\"The wounded must wait.  This battle is still very hot.  If they cannot keep pace, leave them behind.\"\n    *set take_wounded \"no\"\n\"Understood, Sir.\"  \n\nYou turn to your second in command on your left.  \"Captain Lum, did you hear the orders?\"\n\n\"I did, Sir,\" replies Lum.  \n\n\"Carry on then, Captain,\" you reply; fulfilling the necessary formality.  \n\n\"$!{unit_size}, right face!\"  Lum moves down the line, shouting your orders and relaying them to the company commanders.  \n*page_break\n*if take_wounded = \"yes\"\n  \"B Company, form stretcher teams!\"  The company steps out of line and looks blank.  The officers instruct them to build makeshift stretchers and you watch as they do their best.  Many of them strip off their overcoats, and a few who still have their packs spread out their blankets.  It is not perfect, but in the Army, one must often make do.  \n\n*if march = \"soft\"\n  \"Forward, march!\"  The drum rolls and the ${unit_size} moves forward at a walking pace.  The soldiers call out to their disorganized compatriots.  \"Come on, now.  Git moving out!  Move your tails, it ain't safe, here!\"  A few of the men yell back, but a majority take the path of least resistance.  \n\n  A couple of scuffles break out as some men push back against your line.  \"Hey!  Hey, now!\" screams a sergeant at the top of his lungs.  \"We are marching through!  You try to hinder us and I swear by holy God you'll be messing in the hospital, tonight!\"  The red faced, mustached sergeant looks like he is about to make good on his threat, but his company officer takes the situation in hand.  The Lieutenant lets the resistant soldiers get through the line and the march continues.  The stragglers watch the back of your line with blank expressions. \n\n*if march = \"rough\"\n  \"Fix bayonets!\"  The 1st $!{state} soldiers obey somewhat reluctantly.  \"Forward, march!\"  The drum rolls and the unit moves forward at a walking pace.  \"Come on, now.  Git moving out!  Move your tails, it ain't safe, here!\"  A few of the men yell back, but a majority take the path of least resistance, no doubt startled by the order to fix bayonets.\n  \n  A couple of scuffles break out as some men push back against your line.  \"Hey!  Hey, now!\" screams a sergeant at the top of his lungs.  \"We are marching through!  You try to hinder us and I swear by holy God you'll be messing in the hospital, tonight!\"  \n  \n  \"We ain't cattle, you can't drive us with bayonets!\" shouts a furious resister.  \n  \n  \"Prick him good and he will march!\" roars the red-faced sergeant.  \"Move your arses you sodden, whipped, uppity little rats!  If I have to come up there myself, you will wish you'd been shot like men in the line!  I'll break your filthy whore necks!\"  You chuckle at the intense drill sergeant tirade.  Some of the men are intimidated, but a few are required to be driven by the bayonet.  You see a red mark on the seat of the chief protester as he limps quickly away from your line.  \n  *set fix_bayonets +1\n  \n*if take_wounded = \"no\"\n  As the line moves forward, you leave a pitiful wake of wounded men, some limping to follow and others laying flat, too injured to move on their own.  You feel a certain pang at the sight, but you remind yourself that war is cruel and that you are doing your duty as well as you are able.  \n*page_break\nSeveral minutes pass at an interminably slow speed, driving the frightened volunteers before you.  The sound of musketry and distant yells pursue you as you move past the contested position on the hill where the Union gun battery had been placed.  \n\n\"Look out behind!\" calls a voice somewhere to your right.  Turning around, you see a gray coated mass of troops rushing down the hill toward the rear of your regiment.  The men have fixed bayonets and are rushing forward in a disorganized mass at a full sprint.  \n*fake_choice\n  #Turn and fire on them.\n    \"1st $!{state}, halt!  About face!\"  The ${unit_size} stops marching and turns around to face the onrushing graycoats.  \"Fire at will.\"  The bugle relays the order with a bright series of notes.  Your troops shoulder their muskets and fire at the approaching unit.  The men seem daunted by the gunfire, and many of them try to stop running.  You see them waving their arms and throwing down their muskets.  They are shouting something inaudible.  \n    \n    With horror, you realize what has happened.  You squint at the regiment's flags and revulsion wells up in your stomach as you recognize the colors of the 2nd Wisconsin volunteer infantry.  You were firing on a gray coated Union regiment!  They were retreating from battle only to be fired on by their own lines.  \n    \n    \"Hold fire, hold fire!\" you cry.  The Wisconsin men peel off and run parallel to your line down the hill to the west.  \"About face.  Forward march!\"  \n    \n    There is nothing you can do about the friendly fire incident now, but your eye lingers on the gray bodies lingering on the grassy slope.  \"Our own men.  Damn it,\" curses Captain Lum, beside you.  \n    *set fire_at_will +1\n    *set friendly_fire \"yes\"\n  #Hold fire.\n    You immediately sense that something is wrong.  Peering through your binoculars, you try to make out the colors of the regiment.  There it is, the stars and stripes.  That is no Confederate regiment, that is the 2nd Wisconsin infantry, wearing the gray Wisconsin militia coats and trousers.  \"Hold fire.  Carry on,\" you say to the officers around you.  \"Captain Bowles, ride to Colonel Ward and inform him that those are our own men, the 2nd Wisconsin, if you please.\"  Bowles salutes and gallops off with great haste.  \n    \n    The Wisconsin men peel off and run parallel to your line down the hill to the west.  It nearly could have been a friendly fire disaster.  \n    *set battle_outcome +1\n  #Try to identify the unit.\n    You feel a certain doubt about the identity of this charging regiment.  Pulling out your binoculars, you peer through the wafting clouds of powder smoke and try to identify the flags.  You see one that looks like the stars and stripes, but the Confederate flag is so similar that you cannot tell, and this flag is flapping in the air too much to be easily identified.\n    \n    Instead, you focus in on the other flag beside it.  It is dark blue with an image in the center.  It looks familiar and you squint to try and make out the words… Wisconsin Infantry Vols.  A few muskets pop from your own line, which has turned around on its own to face the perceived threat.  \n    \n    \"$!{unit_size}, cease firing!  Hold your fire!\"  You shout the words and look again.  That is no Confederate regiment, that is the 2nd Wisconsin infantry, wearing the gray Wisconsin militia coats and trousers.  \"Captain Bowles, ride to Colonel Ward and inform him that those are our own men, the 2nd Wisconsin, if you please.\"  Bowles salutes and gallops off with great haste.  \n    \n    \"Our own men.  Damn it,\" curses Captain Lum, beside you.  The Wisconsin men peel off and run parallel to your line down the hill to the west.  It nearly could have been a friendly fire disaster.  \n    *set battle_outcome +1\n*page_break\nThe sun is beginning to move down in the west.  It must be near on four o'clock in the afternoon.  Suddenly, you hear a terrible sound in the distance behind you.  It is unlike anything you have heard in your life.  It is a high pitched, banshee scream, coming from a thousand mouths or more.  Even at this distance, the sound sends chills up your spine.  You feel the urge to spur your men on faster, but they are already preoccupied enough with their task.  Hopefully it will be fast enough to reach safety in time.  \n\nUp ahead, you can see the grassy terrain sloping down to Young's Branch, the stream you crossed to reach Henry Hill.  The thought of the cool water makes your dry tongue want to roll over in your mouth.  \n\nOff to the left you see a Union regiment being held in reserve.  A half dozen horsemen break away from this unit and ride toward you.  You stop your horse and wait for them, Bowles at your side.  \n\nThe leader of the group approaches you, a Colonel with a course-skinned face and a cropped beard.  His expression looks stern and forbidding, his eyebrows furrowed.  You recognize him as Colonel William Sherman.  \"Major… what is your name?  What unit is this?\"\n*if unit_size = \"regiment\"\n  *fake_choice\n    #\"Major $!{first_name} $!{surname}, Sir.  This is the 1st $!{state} Infantry, under my command.\"\n*if unit_size = \"battalion\"\n  *fake_choice\n    #\"Major $!{first_name} $!{surname}, Sir.  This is the first battalion of the 1st $!{state} Infantry, under my command.\"\nHis eyes flit across your unit as it continues marching.  \"What are your orders?  Where are you moving these men?\"  \n*fake_choice\n  #\"Sir, my men are tired and low on ammunition, but they are still cohesive.  Colonel Willcox has ordered us to move these shattered regiments to the rear so as to prevent a total rout.  \n  #\"Sir, my directive was to use my force to push these shattered regiments north and out of harm's way.  I am at your command if you choose to supersede my orders.\"  \nSherman almost growls with frustration.  \"Damnation, hell and damnation!  We need reserves or this whole attack is going to crumble.  Damn these volunteers.  Rabble!\"  You wait silently for his tirade to end.  He looks at you sharply, \"Carry on, Major.  Take up a defensive position north of the stream.  Dismissed.\"  He turns his horse and rides away with no ceremony.  You let out a sigh of relief.  \n\n*if backup_plan = \"flank\"\n  As you approach the small creek, you halt your mount and turn back.  Peering over the distance with your binoculars, you try to make out your own second battalion.  There they are, small and at bay, like a tree before a mighty storm.  As you watch, their line breaks.  They retreat back, following your own path to the north.  They held well, and no doubt did much to protect the rest of the army, but you feel a certain amount of guilt that you were not there with them.  \n  *set regimental_strength -62\n  *set second_battalion -62\n  *set officers -2\n  *set k_company_commander \"Vacant\"\n  *set lt_killed_trigger2 \"yes\"\n\nYou have done the inglorious task of moving the broken units to the rear.  Hopefully this contingency plan will help protect much of the federal force from death and capture.  Ideally, it shan't be necessary at all, but you fear that the Union attack is already stalled and hanging by a thread.  \n  \nAs you approach the stream, your formation breaks apart, and the men run forward to the water.  Some fill canteens while others get down on hands and knees to drink from the clear running stream.  A faint curl of dirt and blood runs downstream from the battered troops.  \n*fake_choice\n  #Have my canteen filled.\n    \"Sergeant Major, be so kind as to refill my canteen.\"  The grizzled old NCO takes it, \"My pleasure, Sir.\"  Taking back the canteen, you chug the cool water in one long series of gulps.  It runs down your throat with a sweet, cleansing feeling.  When you finally stop, the canteen is more than half empty.  \"I can fill her again, Major, if you please.\"  He chuckles and refills the canteen for you again.  \n  #Dismount and drink.\n    Your thirst has gotten the better of you.  In your mind, you have done enough to earn a moment of rest.  Climbing down from the stirrups, you go down on your knees in the stream and splash your face with the cool, refreshing water.  Then, you lower your face and guzzle the running water as if drinking right from a spout.  Lord, but it goes down well and refreshes you.  When you've had your fill, you top off the dry canteen and return to your horse, dripping with fresh water.  \n*page_break\n*goto_scene battle_conclusion", "ridge": "*temp chat1 \"yes\"\n*temp chat2 \"yes\"\n*temp chat3 \"yes\"\n*temp chat4 \"yes\"\n*temp chat5 \"yes\"\n*temp chat6 \"yes\"\n*temp chat7 \"yes\"\n*temp chat8 \"yes\"\n*temp chat9 \"yes\"\n*temp coffee \"no\"\n*set regimental_commander \"Maj. $!{first_name} $!{surname}\"\n*set second_battalion_commander \"Capt. William Withington\"\n*set b_company_commander \"1st Lt. Elliot Griffith\"\n*if volleys > 2\n  *achieve volley\n*if fire_at_will > 2\n  *achieve fire_at_will\n*if stretcher_detail = \"yes\"\n  *set second_battalion +2\n  *set regimental_strength +2\nJuly 21, 1861\n*line_break\n12:45\n\nYou stand atop the Dogan ridge, peering through your binoculars to the southeast.  You have to keep wiping the sweat out of your eyes to keep it from fogging the lenses.  You do so again, wiping your face with your right sleeve, only to discover that it is still wet from the last time you wiped your face dry.  You have more success with the unused left sleeve of your wool greatcoat, and bring the perspective glasses back to your eyes.  \n\nThe ground slopes away to the southeast until it reaches a small creek called Young's Branch, largely obscured from view by a band of trees and shrubs that run along it.  On the far side, the land rises again up to another hill.  As your vision settles on it, you see two huge plumes of smoke, followed a second later by the banging report of the guns.  You hear a wicked howling sound and instinctively duck as the ball passes overhead.  \n\nThe other ball strikes a small mossy hump off to the right, which explodes in a ridiculously huge puff of gray dust.  Watching the earthbound cloud, you suppose it must have been the ash heap, where the local farmers dumped their fireplace ash for god knows how many years.  You chuckle slightly at the amusing thought, but even your amusement is tinged by the recent memory of fear and violent death.  \n\n\"Anything, Sir?\"  Captain Bowles asks beside you.  \n*image ridge1.png\n*set map_trigger \"ridge1\"\n*fake_choice\n  #\"Nothing.  Just the rebel guns.\"  \n  #\"You can have another look.  I don't see anything but their artillery.\"  \n    \"That is alright.  I will take your word.\"  \nBowles is standing with his hands behind his back, peering contemplatively across the landscape.  \"If only we could keep our momentum.  This artillery duel may be quite damaging to their cannon, but I fear we may give them too much time to bring up reserves.\"  He unclasps his hands and pulls out a silver pocket watch.  \"It has been ninety minutes since we took the ridge.\"\n\n*if hip_cut = \"yes\"\n  Your hand goes to your hip as the fiery pain of the stab wound flares up.  The blade did not go deep, but it still stings.  \n*if cheek_wound = \"yes\"\n  Feeling your left cheek gingerly, the gash stings like you put salt in it.  Glancing at your glove, you see a thin red line that indicates it is still oozing blood.  It could have been worse.  \n*if concussion = \"yes\"\n  Your head is still pounding ever since the cannon knocked you over.  You rub your temple as your vision blurs slightly.  Your mind has to work to bring back what your adjutant just said to you.  \n*fake_choice\n  #\"I think General McDowell knows his business.  The men needed the rest after marching so far.  God knows we all did.\"  \n    \"You have the right of it, Major.  It was quite a brisk morning's work, to be sure.\"  \n  #\"I agree.  We should not let up when we have the advantage.  I would that our force was already across that stream and driving them back again.\"  \n  #\"I think this position is advantageous.  Our parrot guns have the advantage at this range.  We should hold the ridge and let them come, if they are man enough.\"  \n    \"You have the right of it, Major, I am certain.\"\nBowles looks a little uneasy, \"Easier said than done, perhaps.  I do not mean to question or impugn any orders.  I was only speaking my mind, Sir.\"\n*fake_choice\n  #\"Charlie, you know me well enough by now.  You can speak freely.  Do not stand on ceremony.\"  \n    He smiles comfortably, \"Thank you, Sir.\"  \n  #\"Just be careful not to become too complacent, or you might find yourself in a pot of hot water.\"  \n    He nods, \"Yes Sir.\"  \nThe rebel cannons fire again, this time aiming more to the south.  You can see the faintest blur as the balls fly through the air at their frightening velocity.  You cannot see where they hit, as that direction is obscured by trees, but you hear the thumps and the whistling of the deadly ricochets.  \n\nBowles looks at his watch again.  \"You know, I have not heard our guns reply for almost five minutes.  That is odd.\"  \n*fake_choice\n  #\"Are we out of ammunition?\"\n    Charles purses his lips, \"I find that hard to believe.  All the caissons were full some half hour past.  They ought to have enough and to spare.\"  \n  #\"They must be repositioning.\"\n    Charles nods distractedly, \"Yes, perhaps.  Where to, I wonder?\"  \n*comment The guns are going silent.  You speculate about why.\n*fake_choice\n  #\"Let us return to the regiment.  Orders may come down to us soon.\"  \n  #\"I need a bite to eat.  Let us return to the regiment.\"  \n\"Very well, Sir.  Lead on.\"  You walk back across the ridge and down the northwest side.  You breathe deeply and exhale with relief now that you are out of the enemy's sights.  The regiment is resting on this side of the ridge, sheltered from the rebel artillery.  You hear a distant bird chirping somewhere on your left, and realize that it is the first you have heard since you reached the battlefield.  The great boom of the guns is not terrifying only to men.  \n\nYour regiment is not far ahead, and you see them sitting or half laying out in the grass.  Many of them are smoking pipes or eating cold rations of beef.  Some are using rolled blankets as pillows and covering their faces with their hats to block the bright July sun.  \nYou approach a dozen officers who are sitting and talking amongst themselves.  Some of them are holding tin cups with small wisps of steam rising from them.  One of them notices your approach and says something.  They set down their cups precariously in the grass and hurriedly get to their feet.  All the officers turn to you and stand at attention, and Captain Lum salutes sharply as you walk up.  \n*label alpha\n*choice\n  *if chat1 = \"yes\"\n    #\"At ease, gentlemen.  Do not let your drinks grow cold.\"  \n      The rigid stance of the officers disappears, and some of them venture to collect their cups gingerly from the uneven ground.  \n      *set chat1 \"no\"\n      *goto alpha\n  *if chat2 = \"yes\"\n    #\"Captain Lum, what have you to report?\"  \n      *temp casualties \"780\"\n      *set casualties -{regimental_strength}\n      \"The men are resting, Sir, per your orders.  I detailed first platoon, F Company to collect our haversacks from where we left them at the start of the battle.  I had them shared out and instructed the men to eat some of the beef rations we received this morning.  I have an initial casualty estimate from the company commanders.  We have ${casualties} enlisted casualties: dead, wounded, and missing.  \n      *if i_company_commander = \"1st Lt. John Hatcher\"\n        Captain Hubbard of I Company lost a leg.  \n      *if lt_wounded_trigger = \"yes\"\n        Lieutenants Carpenter and Conway were both injured.  \n      I have nothing further to report, Sir.\"  \n      *set chat2 \"no\"\n      *choice\n        #\"Well done, Captain.\"  \n          \"Thank you, Sir.\"  \n          *goto alpha\n        #\"A steep butcher's bill.\"\n          \"Yes, Sir.\"  \n          *goto alpha\n  *if chat3 = \"yes\"\n    #\"Is that coffee I smell?  I trust there is enough for me.\"  \n      \"Certainly, Sir.\"  Captain Lum picks up his cup and holds it out.  \"It is my second cup, sir.  I've had quite enough.\"  \n      *set chat3 \"no\"\n      *choice\n        #\"I am obliged to you, Captain.\"  \n          You take the cup and sip gratefully.  It is not a very strong brew, but it is coffee and it is hot.  \n          *set coffee \"yes\"\n          *goto alpha\n        #\"No no, keep your coffee.  I am perfectly fine.\"\n          \"Yes Sir.\"  Lum withdraws the proffered cup.  \n          *goto alpha\n  *if chat1 = \"no\"\n    *if chat2 = \"no\"\n      #\"Very well, Captain Lum.  I will resume command, now.  You are relieved.\"  \n        \"Very good, Sir.\"  \n        *goto bravo\n*label bravo\nYou take a moment to sit down on the ground.  Taking your gloves off, you run your hands through the tall, prickly grass.  Your legs ache but it feels delightful to give them a break.  More distant cannon fire pricks at your nerves, but it has become so constant over the past hour as to hardly touch the surface of your conscious mind.  \n\nYour stomach growls angrily and you grimace with discomfort.  No doubt that hunger is contributing to your uneasiness of mind.  \n*if coffee = \"yes\"\n  You gulp down the rest of your coffee to try and dull the empty feeling.  \nReaching into a knapsack, you pull out a piece of stale bread and a cold piece of beef.  It is not one of the better tasting meals you've had, but you devour it with great rapacity and feel the sharp cut of hunger dulled.  Closing your eyes, you breathe deeply and feel some of the stress start to dissipate.  \n*page_break\nThe other officers sit back down and start to chat quietly among themselves.  Their conversation skirts away from the uncomfortable events of the morning and revolves around less serious things.  You imagine that they, like yourself, are somewhat shocked by the experience of battle.  \n\n\"I tell you, beef has no comparison to a haunch of venison,\" says Captain Clarkson of D Company.  \"No comparison at all, my friends.\"  \n\n\"No doubt, the Army should have asked you before we set out,\" replies Captain Withington, \"Then we might have had a deer train instead of all those troublesome bullocks!\"  The others chuckle quietly at the remark.\n\nA young Lieutenant stands up with a grin on his face, \"You'll excuse me, gentlemen, but I have some private business to attend to that simply will not wait.
