 may unseat them yet.\"  \n\n*label delta\n\"Look out!\" calls a voice somewhere to your left.  Turning your head, you see another gray coated regiment moving up the slope toward the guns, marching left to right along your vision.  The 38th New York opens fire on the rear right side of the regiment.  A few of your men on the left start firing some ranged shots at the regiment as well.  For its part, the gray line continues moving up the slope toward the other two regiments.  \n*if surname = \"Spears\"\n  *image frontal_attack1.1.png\n  *set map_trigger \"frontal_attack1.1\"\n  *goto image1\n*if surname = \"Weber\"\n  *image frontal_attack1.2.png\n  *set map_trigger \"frontal_attack1.2\"\n  *goto image1\n*if surname = \"Clark\"\n  *image frontal_attack1.3.png\n  *set map_trigger \"frontal_attack1.3\"\n  *goto image1\n*if surname = \"Wilkerson\"\n  *image frontal_attack1.4.png\n  *set map_trigger \"frontal_attack1.4\"\n  *goto image1\n*if surname = \"Morse\"\n  *image frontal_attack1.5.png\n  *set map_trigger \"frontal_attack1.5\"\n  *goto image1\n*if surname = \"Dietrich\"\n  *image frontal_attack1.6.png\n  *set map_trigger \"frontal_attack1.6\"\n  *goto image1\n*if surname = \"Murphy\"\n  *image frontal_attack1.7.png\n  *set map_trigger \"frontal_attack1.7\"\n  *goto image1\n*if surname = \"Auclair\"\n  *image frontal_attack1.8.png\n  *set map_trigger \"frontal_attack1.8\"\n  *goto image1\n*else\n  *image frontal_attack1.9.png\n  *set map_trigger \"frontal_attack1.9\"\n  *goto image1\n*label image1\n*fake_choice\n  #\"Open fire!\"\n    More of your troops shoulder their muskets and fire long range shots at the distant unit.  You can see the men out there visibly shrinking as they lower their heads to make themselves into smaller targets.  They continue marching uphill, however.  You see one of the rebel units on the hill shift to face the approaching men and shoulder muskets.  Are they going to fire on their own men?  They let loose a volley which peppers the gray coated ranks of the newcomers.  \n    \n    With horror, you realize what has happened.  The unit you were firing on is a gray coated Union regiment!  Revulsion wells up in your stomach as you think about the terrible misunderstanding.  Those men are going forward into battle and being shot in the rear by men of their own army!  \n    \n    \"Hold fire, hold fire!\" you cry, but it is already too late; the Union regiment is well out of range.  You watch as they raise their muskets and return the rebel volley.  The tearing sound of gunfire reaches your ears a moment after you see the smoke pour out.  \n    *set friendly_fire \"yes\"\n  #\"Cease fire!\"\n    You immediately sense that something is wrong.  Peering through your binoculars, you try to make out the colors of the regiment.  \"Cease fire!  Hold your fire!\" shout other officers in the regiment.  There it is, the stars and stripes.  That is no Confederate regiment, that is the 2nd Wisconsin infantry, wearing the gray Wisconsin militia coats and trousers.  \n    \n    \"Captain Bowles, ride to Colonel Ward and inform him that those are our own men, the 2nd Wisconsin, if you please.\"  Bowles salutes and gallops off with great haste.  \n    \n    \"Our own men.  Damn it,\" curses Captain Lum, beside you.  The Wisconsin regiment continues marching uphill.  You see one of the rebel units on the hill shift to face the approaching men and shoulder muskets.  They let loose a volley which peppers the gray coated ranks of the newcomers.  You watch as the 2nd Wisconsin raises their own muskets to return the rebel volley.  The tearing sound of gunfire reaches your ears a moment after you see the smoke pour out.  \n    *set battle_outcome +1\n  #Try to identify the unit.\n    You feel a certain doubt about the identity of this new regiment.  They are advancing from your left, which you had thought to be under the control of friendly units.  Pulling out your binoculars, you peer through the wafting clouds of powder smoke and try to identify the flags.  You see one that looks like the stars and stripes, but the Confederate flag is so similar that you cannot tell, and this flag is flapping in the air too much to be easily identified.\n    \n    Instead, you focus in on the other flag beside it.  It is dark blue with an image in the center.  It looks familiar and you squint to try and make out the words… Wisconsin Infantry Vols.  \n    \n    \"Cease fire!  Hold your fire!\"  You shout the words and look again.  That is no Confederate regiment, that is the 2nd Wisconsin infantry, wearing the gray Wisconsin militia coats and trousers.  \"Captain Bowles, ride to Colonel Ward and inform him that those are our own men, the 2nd Wisconsin, if you please.\"  Bowles salutes and gallops off with great haste.  It matters little, now, however, as they are out of musket range.  \n    \n    \"Our own men.  Damn it,\" curses Captain Lum, beside you.  The Wisconsin regiment continues marching uphill.  You see one of the rebel units on the hill shift to face the approaching men and shoulder muskets.  They let loose a volley which peppers the gray coated ranks of the newcomers.  You watch as the 2nd Wisconsin raises their own muskets to return the rebel volley.  The tearing sound of gunfire reaches your ears a moment after you see the smoke pour out.  \n    *set battle_outcome +1\n\nAt least the sun is now in the west, so you do not have to shelter your eyes against it.  This thought causes you to glance up at the sky, then think to check your pocket watch.  It is 3:45 PM.  \n\nPutting the watch back in its pocket, you watch as the gray coated Union regiment breaks and runs back down the hill.  The rebels fire another volley into them as they flee.  You can see the U.S. flag fluttering down the hill, carried by someone in the center of the mass of men.  \n*fake_choice\n  #\"I cannot blame them.  Shot in the back by your own men and in the front by the enemy.  I should run, myself.\"\n    Captain Lum simply winces and shakes his head in frustration.  \n  #\"More cowards.  We will have to drive the enemy off, ourselves.\"  \n    \nA familiar bugle call pierces the air from somewhere off to the left.  \"$!{unit_size}, forward march!\"  The line lurches forward.  You hear a sergeant shouting, \"Move your goddamn feet, there!  Left, right, left right!\"  You lead the way, seated on your new mount.  Your eyes run down the lines of men.  They bring their knees up high to keep their pace while marching uphill.  \n\nYour eyes return to the top of the hill, where the enemy waits for you.  You rub your nose as the disgusting smell of shit pervades the air.  After a moment, you realize it is the bodies of the dead, lying sprawled or curled up in the grass.  Dead and wounded men from various units are sprinkled around you.  It stinks like a latrine, and the flies are already swarming.  \n\nOff to the left of your unit, you see the 38th New York, and beyond them a regiment of highlanders with their distinctive black and red kilts.  The Highlanders evoke stories in your mind of the Napoleonic Wars and the heroes of the past.  You wonder if the battles of Austerlitz, Marengo, and Waterloo all felt as terrible as this.  They were probably worse, though they seem infinitely remote now.  Old stories from a past life, before you faced the terrible cost of war.  \n\nNow you see some commotion in the middle of the rebel line.  The ranks move aside and a half dozen men push one of the abandoned cannons forward.  You tense up as you look down the barrel of the gun, and your horse skitters as it feels your anxiety.  \n\n\"Steady boys, steady now.\"  The cannon disappears behind a huge puff of smoke with a powerful thump.  You can feel the vibrations in the air as the cannister shot rips into the files of men on your right.  One man falls as his right leg is torn off at the knee.  Another's face is smashed in and his hat falls down to cover the gaping bloody hole before your mind can even register the image.  Those nearby who are intact untangle themselves from the bloody mess of limbs and bodies and blunder forward, their uniforms caked in gore.  \n\nYou hear hoots of excitement up ahead at the success of the cannister shot.  But they will not be able to fire it again before you have a chance to respond.  Your men are within musket range, now.  \n*set regimental_strength -8\n*set first_battalion -8\n*choice\n  #Volley fire. \n    \"Halt!  $!{unit_size}, ready!  Aim!\"  Your men bring up the muskets to their shoulders.  Before you can give a further command, the rebels fire a volley.  The balls whiz overhead and a few thump home into bodies.  The regimental flag falls over the lines of men, its carrier struck in the leg.  Someone tosses down his musket and raises the flag again in defiance of the enemy.  \n    \n    \"Fire!\"  The Union volley ripples out, followed by the wall of smoke.  Before they are obscured from view, you see a handful of rebels fall out of line.  Your ears are ringing after that discharge.  \n    *set volleys +1\n    *set regimental_strength -4\n    *if unit_size = \"regiment\"\n      *set first_battalion -2\n      *set second_battalion -2\n    *if unit_size = \"battalion\"\n      *set first_battalion -4\n    *choice\n      #Maintain volley fire.\n        \"Load!\"  The musket butts are placed on the ground and the men pull out cartridges.  You feel a burning pain in your neck and your hand reflexively covers it.  For a moment you think you were hit by an enemy ball, but pulling your hand away reveals a squirming, dying wasp in your hand.  You break out in a laugh and throw the insect away.  All of a sudden, your nerves are gone.  the moment's distraction and relief has left your mind in a calmer state.  You are ready to do what needs to be done.\n        \n        \"$!{unit_size}, ready!  Aim!\"  The muskets come up in unison, and across the field, you see the enemy muskets coming up.  If you shoot quick enough, the smoke will obscure your men.  \"Fire!\"  The shots crack out almost simultaneous to the rebel volley.  A couple men fall, but the line is loading again.  Someone is weeping somewhere off to the left, weeping so pitifully as to darken the light of day.  \n        \n        The guns are loaded again.  There are a few slow-loading stragglers, but most are ready.  \"$!{unit_size}, ready, aim, fire!\"  Another volley, another deafening crack, more men falling down.  Screams, shouts, stray shots.  At least the rebels seem to have abandoned firing the artillery piece.  \n        *set volleys +1\n        *set regimental_strength -6\n        *if unit_size = \"regiment\"\n          *set first_battalion -3\n          *set second_battalion -3\n        *if unit_size = \"battalion\"\n          *set first_battalion -6\n        *goto charge\n      #Fire at will.\n        \"$!{unit_size}, fire at will!\"  The musket butts are placed on the ground and the men pull out cartridges.  You feel a burning pain in your neck and your hand reflexively covers it.  For a moment you think you were hit by an enemy ball, but pulling your hand away reveals a squirming, dying wasp in your hand.  You break out in a laugh and throw the insect away.  All of a sudden, your nerves are gone.  the moment's distraction and relief has left your mind in a calmer state.  You are ready to do what needs to be done.  \n        \n        The fastest men are loaded and they bring their weapons into their shoulders, steady and aim for a second, then discharge.  The weapons crackle and smoke billows out in uneven puffs.  Across the field, you see the enemy muskets coming up.  The volley rolls out and a few men fall.  Someone is weeping somewhere off to the left, weeping so pitifully as to darken the light of day.  \n        \n        The ${unit_size} continues to fire at will, emptying their muskets as soon as they are loaded.  Another rebel volley, more men falling down.  Screams, shouts, stray shots.  At least the rebels seem to have abandoned firing the artillery piece.  \n        *set fire_at_will +1\n        *set regimental_strength -7\n        *if unit_size = \"regiment\"\n          *set first_battalion -4\n          *set second_battalion -3\n        *if unit_size = \"battalion\"\n          *set first_battalion -7\n        *goto charge\n      #Fix bayonets and charge.  \n        \"$!{unit_size}, fix bayonets!\"  The musket butts are placed on the ground, and the men pull out their shining saber bayonets.  You feel a burning pain in your neck and your hand reflexively covers it.  For a moment you think you were hit by an enemy ball, but pulling your hand away reveals a squirming, dying wasp in your hand.  You break out in a laugh and throw the insect away.  All of a sudden, your nerves are gone.  the moment's distraction and relief has left your mind in a calmer state.  You are ready to do what needs to be done.  \n        \n        You watch as the men around you affix the blades to the muzzles of their weapons.  You wait another two seconds until the movement has stopped and the shining rows of blades stand vertically above the hats of the entire ${unit_size}.  A rebel volley peppers the line with small accuracy, but a few more men fall.  \n        *set fix_bayonets +1\n        *set regimental_strength -3\n        *if unit_size = \"regiment\"\n          *set first_battalion -2\n          *set second_battalion -1\n        *if unit_size = \"battalion\"\n          *set first_battalion -3\n        *goto lead_charge\n  #Fire at will.\n    \"$!{unit_size}, fire at will!\"  The men glance back, somewhat surprised, but they bring up their muskets.  Before they can discharge, the rebels fire a volley.  The balls whiz overhead and a few thump home into bodies.  The regimental flag falls over the lines of men, its carrier struck in the leg.  Someone tosses down his musket and raises the flag again in defiance of the enemy.  \n    \n    The Union muskets go off in close unison, essentially a ragged volley, followed by the wall of smoke.  Before they are obscured from view, you see a handful of rebels fall out of line.  Your ears are ringing after that discharge.  \n    *set fire_at_will +1\n    *set regimental_strength -4\n    *if unit_size = \"regiment\"\n      *set first_battalion -2\n      *set second_battalion -2\n    *if unit_size = \"battalion\"\n      *set first_battalion -4\n    *choice\n      #Maintain fire.\n        The musket butts are placed on the ground and the men pull out cartridges.  You feel a burning pain in your neck and your hand reflexively covers it.  For a moment you think you were hit by an enemy ball, but pulling your hand away reveals a squirming, dying wasp in your hand.  You break out in a laugh and throw the insect away.  All of a sudden, your nerves are gone.  the moment's distraction and relief has left your mind in a calmer state.  You are ready to do what needs to be done.  \n        \n        The fastest men are loaded and they bring their weapons into their shoulders, steady and aim for a second, then discharge.  The weapons crackle and smoke billows out in uneven puffs.  Across the field, you see the enemy muskets coming up.  The volley rolls out and a few men fall.  Someone is weeping somewhere off to the left, weeping so pitifully as to darken the light of day.  \n        \n        The ${unit_size} continues to fire at will, emptying their muskets as soon as they are loaded.  Another rebel volley, more men falling down.  Screams, shouts, stray shots.  At least the rebels seem to have abandoned firing the artillery piece.  \n        *set fire_at_will +1\n        *set regimental_strength -7\n        *if unit_size = \"regiment\"\n          *set first_battalion -4\n          *set second_battalion -3\n        *if unit_size = \"battalion\"\n          *set first_battalion -7\n        *goto charge\n      #Fix bayonets and charge.\n        \"$!{unit_size}, fix bayonets!\"  The musket butts are placed on the ground, and the men pull out their shining saber bayonets.  You feel a burning pain in your neck and your hand reflexively covers it.  For a moment you think you were hit by an enemy ball, but pulling your hand away reveals a squirming, dying wasp in your hand.  You break out in a laugh and throw the insect away.  All of a sudden, your nerves are gone.  the moment's distraction and relief has left your mind in a calmer state.  You are ready to do what needs to be done.  \n        \n        You watch as the men around you affix the blades to the muzzles of their weapons.  You wait another two seconds until the movement has stopped and the shining rows of blades stand vertically above the hats of the entire ${unit_size}.  A rebel volley peppers the line with small accuracy, but a few more men fall.  \n        *set fix_bayonets +1\n        *set regimental_strength -3\n        *if unit_size = \"regiment\"\n          *set first_battalion -2\n          *set second_battalion -1\n        *if unit_size = \"battalion\"\n          *set first_battalion -3\n        *goto lead_charge\n  #Fix bayonets.\n    \"$!{unit_size}, fix bayonets!\"  The musket butts are placed on the ground, and the men pull out their shining saber bayonets.  You watch as the men around you affix the blades to the muzzles of their weapons.  You wait another two seconds until the movement has stopped and the shining rows of blades stand vertically above the hats of the entire ${unit_size}.  A rebel volley peppers the line with small accuracy, but a few more men fall.  \n    *set fix_bayonets +1\n    *set bayonets \"yes\"\n    *set regimental_strength -4\n    *if unit_size = \"regiment\"\n      *set first_battalion -2\n      *set second_battalion -2\n    *if unit_size = \"battalion\"\n      *set first_battalion -4\n    *choice\n      #Volley fire.\n        \"Load!\"  As you wait, you feel a burning pain in your neck, and your hand reflexively covers it.  For a moment you think you were hit by an enemy ball, but pulling your hand away reveals a squirming, dying wasp in your hand.  You break out in a laugh and throw the insect away.  All of a sudden, your nerves are gone.  the moment's distraction and relief has left your mind in a calmer state.  You are ready to do what needs to be done.\n        \n        \"$!{unit_size}, ready!  Aim!\"  The muskets come up in unison, and across the field, you see the enemy muskets coming up.  If you fire quick enough, the smoke will obscure your men.  \"Fire!\"  The shots crack out almost simultaneous to the rebel volley.  A couple men fall, but the line is loading again.  Someone is weeping somewhere off to the left, weeping so pitifully as to darken the light of day.  \n        \n        The bayonet-tipped guns are loaded again.  There are a few slow-loading stragglers, but most are ready.  \"$!{unit_size}, aim, fire!\"  Another volley, another deafening crack, more men falling down.  Screams, shouts, stray shots.  At least the rebels seem to have abandoned firing the artillery piece.  \n        *set volleys +1\n        *set regimental_strength -6\n        *if unit_size = \"regiment\"\n          *set first_battalion -3\n          *set second_battalion -3\n        *if unit_size = \"battalion\"\n          *set first_battalion -6\n        *goto charge\n      #Fire at will.\n        \"$!{unit_size}, fire at will!\"  As you watch, you feel a burning pain in your neck and your hand reflexively covers it.  For a moment you think you were hit by an enemy ball, but pulling your hand away reveals a squirming, dying wasp in your hand.  You break out in a laugh and throw the insect away.  All of a sudden, your nerves are gone.  the moment's distraction and relief has left your mind in a calmer state.  You are ready to do what needs to be done.  \n        \n        The fastest men are loaded and they bring their weapons into their shoulders, steady and aim for a second, then discharge.  The weapons crackle and smoke billows out in uneven puffs.  Across the field, you see the enemy muskets coming up.  The volley rolls out and a few men fall.  Someone is weeping somewhere off to the left, weeping so pitifully as to darken the light of day.  \n        \n        The ${unit_size} continues to fire at will, emptying their muskets as soon as they are loaded.  Another rebel volley, more men falling down.  Screams, shouts, stray shots.  At least the rebels seem to have abandoned firing the artillery piece.  \n        *set fire_at_will +1\n        *set regimental_strength -7\n        *if unit_size = \"regiment\"\n          *set first_battalion -4\n          *set second_battalion -3\n        *if unit_size = \"battalion\"\n          *set first_battalion -7\n        *goto charge\n      #Charge.\n        \"$!{unit_size}, charge bayonets!  Forward at my command.  Charge!\"  \n        *set regimental_strength -3\n        *if unit_size = \"regiment\"\n          *set first_battalion -2\n          *set second_battalion -1\n        *if unit_size = \"battalion\"\n          *set first_battalion -3\n        *goto lead_charge2\n\n\n*label charge\nA bugle call trills off to your left.  It is signaling an order to charge.  You see both of the \n*if state = \"New York\"\n  other \nNew York regiments moving forward up the hill, bayonets pointed forward like a phalanx of spears.  Some of your men hear the call and start to move forward, but they are shouted back by sergeants and officers.  The gravelly voice of the Sergeant Major rises above all the others:  \"Halt!  Halt, you contemptible goddamn scrubs!  That order ain't for you, damn it all!\"  He glances up at you, expectantly, to confirm or negate the order.  \n*choice\n  #Charge.\n    *if bayonets = \"no\"\n      \"$!{unit_size}, fix bayonets!\"  The long blades clatter against other equipment as they are drawn and affixed to the ends of muskets.  \n      *set fix_bayonets +1\n      *goto bayonets\n    *if bayonets = \"yes\"\n      *label bayonets\n      \"Charge bayonets!\"  The men point the weapons forward in front of them, with a hint of reluctance in their stances.  \"$!{unit_size}, forward at my command!  Ready… Charge!\"  \n      \n      The regimental bugler was watching you, awaiting your command.  Now, he raises the instrument to his mouth and blows a sharp series of notes.  \"Charge!\"  The men howl and run forward up the hill, not far behind Ward's New Yorkers and the Highlanders.  Two thousand men charging en masse.  It is a sight to behold.  \n      *goto charge2\n    *goto charge2\n    *comment this line above just prevents a quicktest error\n  #Maintain fire.\n    \"$!{unit_size}, maintain fire!  Fire at will!\"  The overly eager men at the front step back into line and the ${unit_size} continues to fire, the muskets crackling in an unceasing round.  The rebels appear to be firing at will, too, but you do not hear many shots coming your way.  Their aim seems to be focused rather on the New Yorkers that are charging up the hill.  \n    \n    Ward's men and the highlanders on their left have reached the enemy line.  You hear the shouting and clashing of weapons, slightly softened by the distance.  The rebel line you were targeting moves left and piles into the melee.  Your targets are now mingled with the Union soldiers and impossible to fire at distinctly.  \n    *set fire_at_will +1\n    *goto charlie\n*label charlie\n*fake_choice\n  #\"$!{unit_size}, cease firing!\"  \n    \"Hold fire!  Cease firing!\"  The other leaders repeat your order, and the bugler blows the call to cease fire; nine notes in three upward trills.  \n  #\"$!{unit_size}, maintain fire!\"  \n    If you hit some of Ward's regiment, then so be it.  Some of your men look around, anxiously, but the majority continue to fire into the mass of brawling troops.  \nScreams and shouts carry down the hill, along with the thuds and clangs of the weapons striking each other.  You sneeze painfully from the powder smoke and then pull out a handkerchief to wipe your eyes.  You hear a cheer and pull it away from your face in time to see the rebel line crumbling away and retreating.\n*fake_choice\n  #\"$!{unit_size}, forward at quick time, march!\"  \nThe men rest the muskets on their shoulders and then walk forward.  As your horse walks behind them, you wrinkle your nose at the stench of death around you.  You remove your hat and wipe the sweat out of your hair with your white riding glove.  Looking down at your hand, you see the palm of the glove stained a light brown color from all the dirt and sweat and god knows what that you have handled today.  \n    \nReaching the crest of the hill, you see some fifty rebels that surrendered, hands in the air.  Colonel Ward rides up to you, his staff in tow.  \"Much obliged for the assistance,\" he says in an acidic, sarcastic tone.  \"Detach some of your men to take these prisoners to the rear.\"  He departs without returning your salute.  \n    \n\"Make it so, Captain,\" you say to the nearest officer, Captain Clarkson.  He hurries off, shouting the necessary orders.  The officers and sergeants begin collecting these men into groups and sending them to the rear with small detachments of guards.  There is no fight left in them.  \n    \nAll the remaining rebels are running for the treeline as quick as their legs will carry them.  The New Yorkers are still cheering, their bayonets blooded and glistening in the afternoon sun.  The corpses and wounded bodies are strewn all about the place of battle.  As the cheering subsides, it is replaced by the soft but relentless groans of these wounded soldiers.  \n*set regimental_strength -1\n*set first_battalion -1\n*page_break\n*goto alpha\n\n*label lead_charge\n*fake_choice\n  #\"$!{unit_size}, charge bayonets!  Forward at my command.  Charge!\"  \n*label lead_charge2\nThe regimental bugler was watching you, awaiting your command.  Now, he raises the instrument to his mouth and blows a sharp series of notes.  \"Charge!\"  The men howl and run forward up the hill.  On the left, you see Ward's New Yorkers and the Highlanders following your example.  Two thousand men or more charging en masse.  It is a sight to behold.  \n\n*label charge2\nYou are drawing closer to the rebels, who are firing at will.  The smoke pours out and the balls whiz through the air.  The gray coated line bows backward, the men instinctively backing up as the threat draws near.  You let out an enthusiastic shout, \"Charge!  Charge!  Forward, boys!  Come on!\"  \n\nThe line smacks into the enemy with furious energy.  The clash of metal on metal is punctuated by gunshots and screamed obscenities.  Off to the left, you see the \n*if state = \"New York\"\n  other \nNew York regiments clashing with the rebels.  You cannot spare them more then a second's glance, however, as your attention is needed in front of you.  \n*fake_choice\n  #Cheer the men on.  \n    \"Come on, lads!  Come on, for $!{state}!  They've almost broken, just keep going!  Fight!\"  The men around you roar and push, lunging with bayonets.  \n    \n    You see the long blades hitting home, sticking into soft bodies, twisting, and coming back bloody.  The enemy is not going without a fight, however.  Some of your own men are being stabbed, driven forward onto the waiting blades by the impetus of those behind them.  A rebel swings the butt of his musket and it hits a man across the face so hard that his blue hat flies off.  \n    \n    \"Hold, hold yuh ground!\"  The Confederate officer is shouting at his own men in that distinctive southern drawl.  It is no use.  His men are giving back, and those at the back are breaking away in twos and threes, running back toward the treeline hundreds of yards away.  \n  #Fire your pistol.\n    You pull out your Colt revolver and cock the hammer back.  You see a rebel fighting furiously while backing up, and you target him.  The pistol fires with a bang and sparks fly out the barrel.  The rebel falls backward and topples two others as he grabs for a hold.  You aim at another man, a fellow with a thick brown beard and a wide brimmed hat.  Bang!  He just drops instantly, one moment alive and dead the next.  A Union soldier kicks the body as it trips him up.  It is no longer a man, just a dead sack, an obstacle to the living.  \n    \n    You instantly pick another target and fire again, repeating it until your gun is empty.  You flip open the weapon's cylinder and start to reload.  Your eyes are focused on the task, but your ears pick up the screams and shouts around you, the sound of sharp blades slicing into flesh, the clatter of muskets striking each other.  The stink of black powder fills your nose, thankfully wiping out the stench of shit from those who have already died.  \n    \n    \"Hold!  Hold yuh ground!\"  The Confederate officer is shouting at his own men in that distinctive southern drawl.  It is no use.  His men are giving back, and those at the back are breaking away in twos and threes, running back toward the treeline hundreds of yards away.  \n\n\"Come on, boys, come on!\" screams Captain Lum, his distinctive voice rising above the din in vicious excitement.  \"Send those bastards running, come on!\"  The rebel line starts to break.  Now they do break, running back through the grass toward the distant cover of the trees.  The Union men pursue them with a terrifying, bloodthirsty intensity.  They stab the laggards or seize them and drag them backward to become prisoners.  \n\nBut now it is all over.  The company officers are calling the men back.  \"Look at those rebs skedaddle!  Huzzah!\"  The enthusiastic voice sets the men a-cheering.  \"Huzzah, huzzah, huzzah!\"  You let out a sigh of relief as you watch the backs of the retreating rebels.  Looking around, you see some fifty that surrendered, hands in the air.  The officers and sergeants are collecting these men into groups and sending them to the rear with small detachments of guards.  There is no fight left in them.  \n\nYou peer off to the left and see the other rebel units running.  The \n*if state = \"New York\"\n  other \nNew Yorkers are cheering too, their own bayonets blooded and glistening in the afternoon sun.  The corpses and wounded bodies are strewn about the place of battle.  As the cheering subsides, it is replaced by the soft but relentless groans of the wounded.  \n*set regimental_strength -10\n*if unit_size = \"regiment\"\n  *set first_battalion -4\n  *set second_battalion -6\n*if unit_size = \"battalion\"   \n  *set first_battalion -10\n*page_break\n*label alpha\nPerhaps you had hoped for a moment of rest, but it is not to be.  Between the scattering clumps of retreating enemies, you see two fresh regiments marching forward across the field.  You hear groans and cursing from the men nearest you.  They are tired, sweat-soaked, and spent.  You give in and take the last swig of your own canteen; no more than a mouthful of hot water.  \n\n\"Sir.  Major $!{surname}.\"  You glance around and see your adjutant, Captain Bowles.  He points behind you and to the right, back down the hill where many of the routed Union soldiers are clustering.  Following his pointing finger, you see it.  Two large gray units appearing out of the forest.  \n\n*if backup_plan = \"flank\"\n  You pull out your binoculars to get a closer look.  Focusing the lenses, you see a Union unit of a few hundred troops standing in the enemy's way.  They are your own men, Second Battalion of the 1st $!{state}.  They are outnumbered four to one and slowly giving back, firing a volley then withdrawing some fifty meters before loading and firing again.  They are in a desperate position, unable to win but playing for time.  \n  \n  Behind Second Battalion are the thousands of men from routed and broken units, sheltering on the west side of the road.  As the fight draws near to them, you see most of them running northward in disorder.  It is no sort of withdrawal, it is a chaotic flight to any possible safety.  \n  *goto bravo\n*else\n  You pull out your binoculars to get a closer look.  Focusing the lenses, you see the rebel units fire a volley.  Looking downrange, you see the thousands of men from routed and broken units sheltering on the west side of the road.  They are running northward in complete disorder, leaving a trail of bloody bodies behind with each enemy volley.  It is no sort of withdrawal, it is a chaotic flight to any possible safety.  \n  *goto bravo\n*label bravo\n\nYou turn your binoculars to the northwest, the direction from which you entered the battle.  You can make out two Union regiments half way down the slope, moving forward as a reserve.  There is nothing more on this side of the river, but you can make out some distant lines of blue far to the northwest, the sun glinting off bits of metal on their gear.  They will not be able to help you, even if they knew your predicament.  \n\n\"Sir,\" says Captain Lum from beside you.  Looking down, you see his expectant but anxious face.  The officers around you are all awaiting your command.  The decision is yours.  \n*choice\n  #\"We will hold our ground to the very last.  Form lines.\"  \n    *goto fight\n  #\"It is time to withdraw.  We cannot hold this position.\"  \n    *goto withdraw\n*label fight\n\"Yes Sir,\" replies Lum dutifully.  It is clear to you that he disagrees, but he trusts you enough to carry out the orders.  He turns to the waiting men, shouting a stream of orders.  \"$!{unit_size}, attention!  Form lines!  Face the enemy!  C Company, get yourselves in order.  Move it!  Line up!\"  The ${unit_size} responds sluggishly, doubtfully, forming lines slowly as if there is some question about the meaning of the orders.  \n\nThe decision is made.  You will stand your ground and meet your fate, whatever it may be.  Your eyes stray downrange to the approaching rebel units.  They are not in range yet, but they are not far off.  \n\nYou tightly close your eyes and inhale deeply.  Beneath the stench of powder and filth is the wholesome smell of grass.  A simple field of green grass, like the ones you played in as a child.  For just a moment, you are there, safe and full of hope, happy and unconcerned.  But it is only a dream… a wish.  Tears fill your closed eyes as the nostalgia washes over you, combined with the dread and the stink of death.  There is no more time for wishing.  You open your eyes and face the enemy, filled with a new resolve.  \n*choice\n  #Volley fire.\n    \"$!{unit_size}, present arms!  Shoulder arms!\"  You give them a moment to obey, and find them slower than they have been all day.  But they do bring the stocks of muskets into shoulders.  \"Volley fire at my command.\"  You try to judge the distance.  To fire too soon would be a disaster; a wasted volley and thirty seconds to load again.  \"Ready…\"  Almost there.  \"Aim.\"  Now.  They are in range.  \"Fire!\"  \n    \n    The volley rips out raggedly, percussing your already ringing ears and filling the air with more smoke.  \"Load!\"  The muskets come down, butts on the ground, and the cartridges are pulled from pouches.  You see some men sharing cartridges with others who have run out.  Now the ramrods appear, painfully slow and cautious.  \n    \n    The rebel volley feels like a gust of wind as your gut clenches against the threat, like a carriage driver barreling toward a cliff with an uncontrolled team of horses.  You hear screams and some of your men collapse, but you were lucky again.  \n    *set volleys +1\n    *set regimental_strength -5\n    *if unit_size = \"regiment\"\n      *set first_battalion -3\n      *set second_battalion -2\n    *if unit_size = \"battalion\"   \n      *set first_battalion -5\n    *fake_choice\n      #\"Ready!\"\n    The ready muskets come up, while others are still desperately trying to load.  Then the volley rips out before you have a chance to give another order.  You furrow your brow in confusion before you see the rear ranks of your regiment decimated.  The bugler beside you falls forward, a red hole in his back.  \n    \n    Looking behind you on the right, you see the enemy.  A rebel battalion has approached your unguarded flank and fired a volley into your rear line.  Now you hear a sound unlike anything you have heard in your life.  The rebel unit lets out an inhuman high-pitched howl, the sort of sound one might expect to come from the armies of Hell.  \n    *set volleys +1\n    *set regimental_strength -11\n    *set officers -3\n    *set first_battalion_commander \"Vacant\"\n    *if unit_size = \"regiment\"\n      *set first_battalion -4\n      *set second_battalion -7\n      *set k_company_commander \"Vacant\"\n    *if unit_size = \"battalion\"   \n      *set first_battalion -11\n      *set e_company_commander \"Vacant\"\n    \n    *goto rout\n  #Fire at will.\n    \"$!{unit_size}, present arms!  Shoulder arms!\"  You give them a moment to obey, and find them slower than they have been all day.  But they do bring the stocks of muskets into shoulders.  You try to judge the distance.  To fire too soon would be a disaster; wasted ammunition and thirty seconds to load again.  \"…Fire at will!\"  \n    \n    The muskets crack, percussing your already ringing ears and filling the air with more smoke.  Some men are already loading.  You see them sharing cartridges with others who have run out.  \n     \n    The rebel volley feels like a gust of wind as your gut clenches against the threat, like a carriage driver barreling toward a cliff with an uncontrolled team of horses.  You hear screams and some of your men collapse, but you were lucky again.  \n    *set fire_at_will +1\n    *set regimental_strength -5\n    *if unit_size = \"regiment\"\n      *set first_battalion -3\n      *set second_battalion -2\n    *if unit_size = \"battalion\"   \n      *set first_battalion -5\n    *fake_choice\n      #\"Steady, boys!\"\n    You watch the ramrods working up and down, the majority of the unit between shots.  Suddenly, a volley rips out from somewhere on your right.  You furrow your brow in confusion before you see the rear ranks of your regiment decimated.  The bugler beside you falls forward, a red hole in his back.  \n    \n    Looking behind you on the right, you see the enemy.  A rebel battalion has approached your unguarded flank and fired a volley into your rear line.  Now you hear a sound unlike anything you have heard in your life.  The rebel unit lets out an inhuman high-pitched howl, the sort of sound one might expect to come from the armies of Hell.  \n    *set regimental_strength -11\n    *set officers -3\n    *set first_battalion_commander \"Vacant\"\n    *if unit_size = \"regiment\"\n      *set first_battalion -4\n      *set second_battalion -7\n      *set k_company_commander \"Vacant\"\n    *if unit_size = \"battalion\"   \n      *set first_battalion -11\n      *set e_company_commander \"Vacant\"\n    \n    *goto rout\n*label rout\nThe men do not wait another second to see what will happen next.  The line crumbles, men scattering in any safe direction they can find.  Most of them run north or northwest to escape the enemy lines, but others throw themselves to the ground with hopes of surviving by being overlooked.  Some officers go with them, while still more were dropped by the surprise volley.  Captain Lum is lying on the ground, and as you watch, he is picked up by a sergeant, who throws the body over his shoulders and takes off at a run.  \n*fake_choice\n  #\"No!  Hold your ground!\"  \nYou shout the orders to unheeding ears.  The rebel unit on the flank is charging, howling like banshees, shining bayonets fixed.  You raise your pistol and fire all six bullets into the oncoming line.  There are still a half dozen men around you; the Sergeant Major and a few others.  The teenage drummer boy discards his instrument and picks up a musket.  With bayonet attached, the weapon stands two feet taller than him.  \n\nYou let out a shout of defiance, joined by the men around you.  Pulling out your saber, you turn the horse to face the enemy.  \n\nThe rebel line hits, stabbing viciously at the last redoubt of Union soldiers.  Two of your men are stabbed instantly.  Then the drummer boy is skewered by two bayonets.  The Sergeant Major knocks one weapon aside and stabs his bayonet home into the recoiling soldier.  The weapon pulls free of his grasp as the man falls back, and he swipes out his saber with a practiced flourish.  You see a bayonet stick into his leg, a fount of blood appearing around it, but he sweeps the blade elegantly through the air and opens the man's throat.  But you know the hyenas are bound to bring down the lion.  Finally, a musket cracks, and he crumples forward.\n\nYou witness all this in a moment, unable to do anything as you parry incoming blades.  \"Git that officuh!\" shouts a voice.  You bring the blade down hard on a gray hat with a crack and a splash of blood before your horse is brought down.  The loyal animal screams as bayonets sink into its flesh, and you fall painfully from the saddle, hitting your head on the ground.  You feel intense pressure in your ears and behind your eyes, then groping hands digging at your uniform, looking for loot.  You bring the blade up into the man's belly, piercing up under his ribs.  He lets out a gasp, eyes wide.  \n\nYou feel a bayonet stick into your left torso, then a musket butt comes down hard on your face.  Everything goes black.  \n*set regimental_strength -7\n*set first_battalion -7\n*if backup_plan = \"flank\"\n  *set regimental_strength -62\n  *set second_battalion -62\n*choice\n  #Epilogue.\n    *goto_scene captured\n*label withdraw\n\"Very good, Sir,\" replies Captain Lum, with an audible sigh of relief.  he turns to the men and lets out a stream of orders, \"$!{unit_size}, attention!  Form ranks!  Lieutenant, get your men in order!  Prepare to move out!\"  \n\nYou feel doubt tugging at your mind, nagging you for your choice.  But the decision is made.  You can breathe easy for the moment.  And as you watch the exhausted men forming ragged lines, you admit that it was the only thing to do.  A fight here with exhausted troops would be nothing more than honorable suicide.  The inhuman howling screams pursue you as you march back to the road.  \n\n\"$!{unit_size}, left face!  Forward march!\"  The unit becomes a column and follows you down the slope, heading back north to Young's Branch.  The thought of the cool water makes your dry tongue want to roll over in your mouth.  \n\nA half dozen horsemen break away from the nearest Union reserve unit and ride toward you.  You kick the horse off the path and wait for them, Bowles at your side.  \n\nThe leader of the group approaches you, a Colonel with a course-skinned face and a cropped beard.  His expression looks stern and forbidding, his eyebrows furrowed.  You recognize him as Colonel William Sherman.  \"Major… what is your name?  What unit is this?\"\n*if unit_size = \"regiment\"\n  *fake_choice\n    #\"Major $!{first_name} $!{surname}, Sir.  This is the 1st $!{state} Infantry, under my command.\"\n*if unit_size = \"battalion\"\n  *fake_choice\n    #\"Major $!{first_name} $!{surname}, Sir.  This is the first battalion of the 1st $!{state} Infantry, under my command.\"\nHis eyes flit across your unit as it continues marching.  \"What are your orders?  Where are you moving these men?\"  \n*fake_choice\n  #\"Sir, my men are exhausted and nearly all our ammunition is spent.  We are withdrawing north of Young's Branch to regroup.  I act on my own initiative, having received no orders.\"  \n  #\"Sir, I doubt these men could stand another volley without breaking.  We have fought since the morning and our ammunition runs low.  I am taking them north across the stream.  \nSherman almost growls with frustration.  \"Damnation, hell and damnation!  We need reserves or this whole attack is going to crumble.  Damn these volunteers.  Rabble!\"  You wait silently for his tirade to end.  He looks at you sharply, \"Carry on, Major.  Take up a defensive position north of the stream.  Dismissed.\"  He turns his horse and rides away with no ceremony.  You let out a sigh of relief.  \n\n*if backup_plan = \"flank\"\n  As the ${unit_size} approaches the small creek, you halt your mount and turn back.  Peering over the distance with your binoculars, you try to make out your own second battalion.  There they are, small and at bay, like a tree before a mighty storm.  As you watch, the line breaks.  They retreat back, joining the routing mass of troops.  They held well, and no doubt did much to protect the rest of the army, but you feel a certain amount of guilt that you were not there with them.  \n  *set regimental_strength -62\n  *set second_battalion -62\n*if backup_plan = \"rescue\"\n  Looking ahead, you recognize your own Second Battalion, still in formation and driving disordered groups of Union soldiers north across the stream.  Hopefully this contingency plan will help protect much of the federal force from death and capture.  \n  \nAs you approach the stream, your formation breaks apart, and the men run forward to the water.  Some fill canteens while others get down on hands and knees to drink from the clear running stream.  A faint curl of dirt and blood runs downstream from the battered ${unit_size}.  \n*fake_choice\n  #Have my canteen filled.\n    \"Sergeant Major, be so kind as to refill my canteen.\"  The grizzled old NCO takes it, \"My pleasure, Sir.\"  Taking back the canteen, you chug the cool water in one long series of gulps.  It runs down your throat with a sweet, cleansing feeling.  When you finally stop, the canteen is more than half empty.  \"I can fill her again, Major, if you please.\"  He chuckles and refills the canteen for you again.  \n  #Dismount and drink.\n    Your thirst has gotten the better of you.  In your mind, you have done enough to earn a moment of rest.  Climbing down from the stirrups, you go down on your knees in the stream and splash your face with the cool, refreshing water.  Then, you lower your face and guzzle the running water as if drinking right from a spout.  Lord, but it goes down well and refreshes you.  When you've had your fill, you top off the dry canteen and return to your horse, dripping with fresh water.  \n*page_break\n*goto_scene battle_conclusion", "henry_hill": "*temp chat1 \"yes\"\n*temp chat2 \"yes\"\n*temp chat3 \"yes\"\n*temp chat4 \"yes\"\n*temp chat5 \"yes\"\n*temp aide_patience \"2\"\nThe bugle blows and the drum rolls.  A stray shell howls in the air above you as the column lurches forward and up the gentle slope of Henry Hill.\n\nThe gravelly dirt path leads south along the west side of the hill.  An uneven board fence follows along the right side of the path.  The knee high grass sways gently in the slight breeze.  Grasshoppers buzz and try to hop out of the path of the marching men.  Off to the left, you see a blue coated regiment standing in formation on the slope of the hill.  A few minutes pass as your column continues along the road.  \n\nNow, the Union batteries are close on your left, obscured somewhat by their elevation on top of the hill.  Behind the roaring guns are stationary horse teams with wooden caissons that hold the artillery shells and equipment.  Men are running back and forth, some carrying crates up toward the battery.  You hear shouts carrying across the pasture between you and them.  One voice comes cleanly through, \"-need another worm up here, the head snapped off-\"  The rest of his remark is drowned by another salvo of artillery fire.  \n\nA horseman in a blue coat is riding back along the path ahead of you.  You recognize him as a Captain, one of Colonel Heintzelman's staff.  Drawing up to you, he reins in his horse to stop in the grass off to one side of the path.  He salutes you and you return the gesture, before leading your own horse off the road and out of the way of your marching column.  \n\n\"Major ${surname}, Sir.  Colonel Heintzelman sends word to all approaching regiments to move to the right side of the line and support his troops.  He would have you advance at double time up this road until you reach the edge of the wood.  Once there, he will direct you.\" \n*label alpha\n*choice\n  *if chat1 = \"yes\"\n    #\"Understood.  My compliments to the Colonel.\"  \n      He nods, \"Very well.  I must continue, now, Sir.\"  \n      *set chat1 \"no\"\n      *set aide_patience -1\n      *goto alpha\n  *if chat2 = \"yes\"\n    #\"What is the situation up ahead?\"  \n      \"The 11th New York charged and was repulsed.  Heintzelman was going to lead the 14th Brooklyn forward.\"  \n      *set chat2 \"no\"\n      *set aide_patience -1\n      *if aide_patience > 0\n        *goto alpha\n      *else\n        *goto bravo\n  *if chat3 = \"yes\"\n    #\"Who is in command up there?\"  \n      \"Colonel Heintzelman and Colonel Willcox.\"  \n      *set chat3 \"no\"\n      *set aide_patience -1\n      *if aide_patience > 0\n        *goto alpha\n      *else\n        *goto bravo\n  *if chat4 = \"yes\"\n    #\"Have you seen Colonel Willcox?\"  \n      \"Yes, Sir.  He led the 11th New York in a brave charge.\"  \n      *set chat4 \"no\"\n      *set aide_patience -1\n      *if aide_patience > 0\n        *goto alpha\n      *else\n        *goto bravo\n  *if chat5 = \"yes\"\n    #\"What is the enemy strength?\"  \n      \"We were facing two or three regiments, but it is impossible to tell their strength through the forest.\"  \n      *set chat5 \"no\"\n      *set aide_patience -1\n      *if aide_patience > 0\n        *goto alpha\n      *else\n        *goto bravo\n  #\"Thank you, Captain.\"\n    \"Sir.\"  He rides off down the left side of your column, continuing on toward the next regiment on the road behind you.  \n    *goto charlie\n*label bravo\nThe aide stirs in his saddle.  \"I am sorry, Major.  I was ordered to move with the utmost dispatch.  I must obey my orders!\"  He salutes rapidly as he kicks his horse back into motion.  It rears briefly before kicking up into a gallop back along the left side of your column.  \n\n*label charlie\nReturning to the head of your regiment, you reach the crest of the hill and see further.  You count eleven Union cannons in a staggered line across the top of the hill.  Three or four hundred yards ahead of these guns, you can see a line of smaller rebel cannons poking out of the far tree line.  \n\nNine of the U.S. guns are behind you, while two are ahead and on your left.  These two appear to be battered, without horse teams and the ground strewn with the bodies of men and animals.  In front of them, you can see a unit of Fire Zouaves directing volleys into the tree line.  It is hard to tell much through the black powder smoke, but the red legs of the uniforms are impossible to miss.  \n\nYou glance to the right now, looking down the slope of the hill.  There, you see a chaotic scene.  A disorganized mass of men from two different regiments are standing, sitting, or laying down in the high grass that leads down to a small stream.  You recognize the 11th New York, Colonel Farnham's regiment of your own brigade.  Most of them have thrown off their gray coats, revealing their red undershirts which contrast with their gray trousers.  \n\nAs you look on, two men are hurrying toward you with a stretcher, bearing an officer.  As they come closer, you see that it is Colonel Noah Farnham, a man that you know well.  You remember seeing him this very morning at the briefing, still very ill but bravely refusing to sit out the battle.  Now, his face is changed.  His forehead is caved in like a broken egg shell, with thick, dark blood gushing out of the musket wound.  His eyes are closed and his mouth hangs open.  A small pool of thick blood sloshes back and forth around his head as the stretcher bearers run, soaking into the dirty white cloth around it.  \n*if surname = \"Spears\"\n  *image henry_hill2.1.png\n  *set map_trigger \"henry_hill2.1\"\n  *goto image1\n*if surname = \"Weber\"\n  *image henry_hill2.2.png\n  *set map_trigger \"henry_hill2.2\"\n  *goto image1\n*if surname = \"Clark\"\n  *image henry_hill2.3.png\n  *set map_trigger \"henry_hill2.3\"\n  *goto image1\n*if surname = \"Wilkerson\"\n  *image henry_hill2.4.png\n  *set map_trigger \"henry_hill2.4\"\n  *goto image1\n*if surname = \"Morse\"\n  *image henry_hill2.5.png\n  *set map_trigger \"henry_hill2.5\"\n  *goto image1\n*if surname = \"Dietrich\"\n  *image henry_hill2.6.png\n  *set map_trigger \"henry_hill2.6\"\n  *goto image1\n*if surname = \"Murphy\"\n  *image henry_hill2.7.png\n  *set map_trigger \"henry_hill2.7\"\n  *goto image1\n*if surname = \"Auclair\"\n  *image henry_hill2.8.png\n  *set map_trigger \"henry_hill2.8\"\n  *goto image1\n*else\n  *image henry_hill2.9.png\n  *set map_trigger \"henry_hill2.9\"\n  *goto image1\n*label image1\n*fake_choice\n  #\"You men, what happened here?\"\n    The stretcher bearers keep running without noticing you.  \n    \n  #\"Sweet Jesus.  Colonel Farnham is hit!\"  \n\"Sir, what are our orders?\"  Captain Lum and Captain Withington are looking at you.  The decision is yours.  \n*choice\n  #\"Let us find who is in charge of this group.  We need to bring some order to this chaos.\"  \n    *goto organize\n  #\"There is no time to lose.  We must attack now!\"\n    *goto attack\n  #\"We will deploy skirmishers to watch the flanks before we do anything else.\"  \n    *goto skirmishers\n\n\n*label organize\n\"Yes, Sir,\" Captain Lum rides forward, \"Hey!  Who is in command here?!\"  Some of the men nearest to him move away, but one man steps forward, speaking in a New York accent.  \"Afternoon, Captain.  I am Captain Tagan, 11th New York, Company G.\"  Captain Lum leads him over to you before repeating what you already heard, \"Major ${surname}, this is Captain Tagan, 11th New York, claiming command.\"  \n\n\"Afternoon, Sir.  I ain't truly in command here, but I can tell you what happened, if you please.  We were pushed back and Colonel Farnham was hit.  Then the boys just gave up and they won't be roused, sir.  We was with the ${minnesota_regiment} at the time, and their Colonel was able to rally about half of them to go forward and fight again.  He took most of the willing men and officers with him.  Ain't nobody in charge, here, Sir.  I reckon we could rouse some of the boys though.  Maybe a hundred if we really tried.  But I'm tellin' ya, Sir; most of these boys are scared and they ain't going forward again, not without a fight.\"  \n*choice\n  #\"I will try to rally them.\"  \n    \"Very good, Sir,\" replies the Captain with a salute.  You spur your horse forward and make your way into the cluster of cowering men.  Some of them cringe and slink away, while others look attentively at you, waiting to hear what you will say.\n    *choice\n      #Say encouraging words.\n        You inhale deeply and shout over the sounds of musket and cannon fire.  \"Come on, lads!  Now is the time to show your character!  You are men of honor, brave and true!  Stand firm now, for Ellsworth and Farnham and all your brave comrades!  Stand up and fight!\" \n        \n        Some of the more attentive men cheer your words.  \"He is right, we are men of honor!\" shouts one man.  \"Now for it, let's give it another effort, boys!\" yells another.  Before long, the willing men filter to the front and form ranks at attention.  Most of them wear the red and gray of the 11th New York, with a few blue Minnesota uniforms scattered amongst them.  You can't help but smile as you quickly scan the ranks and count upwards of 100 men.  Captain Tagan orders them forward and they form an impromptu company of skirmishers at the front of your regiment.  \n        *achieve recruiter\n        *choice\n          #\"Captain Tagan, join First Battalion.\"\n            *set regimental_strength +102\n            *set first_battalion +102\n            *set company_L \"1st\"\n            *set company_L_strength \"102\"\n            *goto 14th_retreat\n          #\"Captain Tagan, join Second Battalion.\"\n            *set regimental_strength +102\n            *set second_battalion +102\n            *set company_L \"2nd\"\n            *set company_L_strength \"102\"\n            *goto 14th_retreat\n      #Shame them for cowardice.\n        You inhale deeply and shout over the sounds of musket and cannon fire.  \"Come on, lads!  Think what your wives and sweethearts would say!  Lord, if they could see you now, what a pitiable sight they would behold.  Frightened by the sight of the enemy, unable to do your duty!  What will these men think of you?  Do you want them to call you cowards?  Stand up straight and do your duty if you have any respect for yourself or your country!\"  \n        \n        \"He is right, what will you think of yourselves tomorrow?\" barks a bulky Corporal with a thick beard.  Before long, the willing men filter to the front and form ranks at attention.  Most of them wear the red and gray of the 11th New York, with a few blue Minnesota uniforms scattered amongst them.  You quickly scan the ranks and count upwards of 60 men.  Captain Tagan orders them forward and they form an impromptu company of skirmishers at the front of your regiment.  \n        *achieve recruiter\n        *choice\n          #\"Captain Tagan, join First Battalion.\"\n            *set regimental_strength +61\n            *set first_battalion +61\n            *set company_L \"1st\"\n            *set company_L_strength \"61\"\n            *goto 14th_retreat\n          #\"Captain Tagan, join Second Battalion.\"\n            *set regimental_strength +61\n            *set second_battalion +61\n            *set company_L \"2nd\"\n            *set company_L_strength \"61\"\n            *goto 14th_retreat\n      #Yell and threaten.\n        You inhale deeply and shout over the sounds of musket and cannon fire.  \"You yellow dogs!  Cowards!  Stand and fight like men, if you can!  I'll have you all put up on charges and thrown in the stockade!  Do I need to order my men to come whip you, or will you attend to your duties?\"  \n        \n        \"Do I look like a slave to you?\" shouts an angry New Yorker, \"I'm a free man, you can't talk to me like that.  Get down off yah horse and come say that again!\"  Some of the other men murmur with agreement, while others move away from the insubordinate man.  \n        *choice\n          #Dismount and face him.\n            You lift your left boot out of the stirrup and drop to the ground.  As you approach the man, he looks apprehensive, but raises his fists.  \"Come on then, you bugger!\"  You swing a gloved fist at his head from the right.  He ducks and punches you in the gut, driving you back.  It seems like he may have hesitated since striking an officer is such a serious offense, because the punch was half hearted.  You duck beneath his next blow and then strike him twice in the ribcage.  \n            \n            The man grunts and growls as he comes at you again, swinging with wide and aggressive punches at your face.  You back up and avoid these, before leaning forward and throwing your weight against his chest.  He loses his balance on the slope and falls hard on his back, smacking his head on the ground.  You take advantage of this and strike him repeatedly in the face, your white gloves coming away bloody.  \n            \n            You rise to your feet amidst the shocked crowd of onlookers.  \"If only he would have fought the enemy with such bravery!  Are you afraid to face the enemy?  What kind of men are you, anyhow?!\"  You hear the men murmuring, and some of them nod agreement.  You have impressed them with your intensity and drive.  \n            \n            \"He is right, what will you think of yourselves tomorrow?\" barks a bulky Corporal with a thick beard.  Before long, the willing men filter to the front and form ranks at attention.  Most of them wear the red and gray of the 11th New York, with a few blue Minnesota uniforms scattered amongst them.  You quickly scan the ranks and count upwards of 40 men.  Captain Tagan orders them forward and they form an impromptu company of skirmishers at the front of your regiment.  \n            *achieve recruiter\n            *choice\n              #\"Captain Tagan, join First Battalion.\"\n                *set regimental_strength +42\n                *set first_battalion +42\n                *set company_L \"1st\"\n                *set company_L_strength \"42\"\n                *goto 14th_retreat\n              #\"Captain Tagan, join Second Battalion.\"\n                *set regimental_strength +42\n                *set second_battalion +42\n                *set company_L \"2nd\"\n                *set company_L_strength \"42\"\n                *goto 14th_retreat\n          #Order him arrested.\n            \"Sergeant Major, put that man under arrest!\"  The Sergeant Major steps forward, flanked by two Corporals, with a grin showing beneath his thick mustache.  \"With pleasure, Sir,\" he growls.  The rebellious New Yorker takes a step back as the three men approach, and his allies desert him.  \n            \n            \"Come quiet, you deadbeat, or I'll tie you in knots,\" says the Sergeant aggressively.  He reaches for the insubordinate man's collar, but the man thrusts his hands away.  The Sergeant Major shoves him hard and he falls on his back in the grass.  He gives him a couple kicks in the ribcage, then takes him by the arms and lifts him up.  \"Take him to the rear, boys.  Sir, the offender has been taken into custody.\"  He salutes and returns to the line.  \n            *set regimental_strength -2\n            *set first_battalion -2\n            *goto 14th_retreat\n          #Shoot him.\n            You pull out your pistol and cock back the hammer.  The angry Private's eyes widen as you point the gun at his chest.  You pull the trigger and the weapon fires, kicking your arm up with the recoil and filling the air between you with black smoke.  As it dissipates, you see the man tumble back into the thick grass, blood darkening the front of his red shirt.  \n            \n            \"You murdering coward bugger!\" shouts an angry voice on the left.  \"Let's scrag that son of a bitch!\" shouts another on your right.  The New Yorkers are closing in from both sides, some with raised muskets.  Apparently, they don't think you had the right to murder their comrade for answering an officer.  \n            *choice\n              #Stand your ground.\n                \"You cannot threaten an officer, that is a hanging offense!\" you shout back at the disobedient men.  A musket pops and you feel a sharp pain in your gut.  Feeling dizzy, you fall out of the saddle and hit your head hard on the ground.  Everything goes dark.\n                *ending\n              #Back off.\n                You back away from the group, deciding that it is best not to continue the altercation.  Returning to your regiment, you concede that the New Yorkers will not be moved by force.  \n                *goto 14th_retreat\n  #\"Do what you can, Captain.  I must attend to other matters.\"  \n    \"Very good, Sir,\" replies the Captain with a salute.  He returns to the cluster of men and starts speaking to them, trying earnestly to rally them.  Before long, he leads an impromptu unit forward, consisting of some fifty of the most willing troops.  Most of them wear the red and gray of the 11th New York, with a few blue Minnesota uniforms scattered amongst them.  Captain Tagan orders them into line and they form a company of skirmishers at the front of your regiment.  \n    *achieve recruiter\n    *choice\n      #\"Captain Tagan, join First Battalion.\"\n        *set regimental_strength +42\n        *set first_battalion +42\n        *set company_L \"1st\"\n        *set company_L_strength \"42\"\n        *goto 14th_retreat\n      #\"Captain Tagan, join Second Battalion.\"\n        *set regimental_strength +42\n        *set second_battalion +42\n        *set company_L \"2nd\"\n        *set company_L_strength \"42\"\n        *goto 14th_retreat\n  #\"What pitiful creatures.  Let them hide if they will!\"  \n    \"Very well, Sir,\" replies the Captain with hesitation, but he salutes with gusto as you turn away.  \n    *goto 14th_retreat\n*label attack\n\"Yes Sir.\"  You raise your saber high above your head, and you see the ranks stiffen as they await your command.  \"Regiment, left face!  Forward, march!\"  The drums thunder as the march begins again.  Your line moves toward the regiment of Zouaves fighting at the tree line.  A horse breaks through the Union line and gallops toward you.  Its hair is matted with blood and an officer's boot dangles from one flapping stirrup.  The sight feels like a knife to the heart.  The thought forms wordlessly in your mind: \"That might have been me.\"  The animal squeals and breaks to one side, flying along the face of your regiment and evading the few reaching arms who try to catch the reins.  It is gone now, running away down the hill.  \n\nYour eyes return to the line of Zouaves just in time to see them breaking apart.  Three quarters of the unit is running back away from the line.  After fifty yards they turn back around in a confused mass and fire a ragged volley.  Fortunately for the bravest fourth of the regiment, they aimed far too high.  \n\nThe remaining men in the front line break and run, taking fire from the front and from their own men in the rear.  The whole unit is running like hares now.  They crash into your advancing line of troops and force their way through the ranks.  The formation is driven apart and crumbles as the terror spreads like a contagion.  Both regiments run back down the hill together in one chaotic mass.  \n*choice\n  #Try to rally them.  \n    \"Come on, boys!  1st $!{state}, halt!  Unit, halt!\"  You ride your horse into the midst of the men and try to physically block them from retreating.  It is no good; the regiment falls back all the way to the road before they stop.  Most of the Brooklyn Zouaves keep going and disintegrate amongst the other shattered units, but the 1st $!{state} stops short of this.  The officers shout and shove them back into lines and companies.  The regiment seems somewhat diminished, as the most frightened men surely took the chance to slip away.  \n    *set regimental_strength -21\n    *set first_battalion -12\n    *set second_battalion -9\n    *goto heintzelman\n  #Just follow them.  \n    The regiment falls back all the way to the road before they stop.  Most of the Brooklyn Zouaves keep going and disintegrate amongst the other shattered units, but the 1st $!{state} stops short of this.  The officers shout and shove them back into lines and companies.  The regiment seems somewhat diminished, as the most frightened men surely took the chance to slip away. \n    *set regimental_strength -30\n    *set first_battalion -14\n    *set second_battalion -16\n    *goto heintzelman\n*label skirmishers\n\"Very good, Sir.  Where shall we deploy the skirmishers?\"  \n*choice\n  #\"South down the road to watch the right flank.\"  \n    *set south_skirmishers \"yes\"\n    \"Yes Sir.  What Company shall we deploy?\"  \n    *choice\n      #\"A Company, 1st Battalion.\"  \n        \"Understood, Sir.\"  Captain Lum turns, \"Lieutenant Fairbanks, come here!\"  The young man runs up and salutes.  \"Take your Company down the road to the south.  Stop at the road junction and cover the right flank.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.\"  \n        \n        \"Yes, Sir!  Captain!\"  He salutes again and then hurries off to carry out his orders.  His company leaves the regiment and carries on down the road, diminishing your force by some seventy men.  \n        \n        *set south_skirmish_company \"A\"\n        *set regimental_strength -71\n        *set first_battalion -71\n        *goto 14th_retreat\n      #\"B Company, 1st Battalion.\"\n        \"Understood, Sir.\"  Captain Lum turns, \"Lieutenant Griffith, come here!\"  The young man runs up and salutes.  \"Take your Company down the road to the south.  Stop at the road junction and cover the right flank.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.\"  \n        \n        \"Yes, Sir!  Captain!\"  He salutes again and then hurries off to carry out his orders.  His company leaves the regiment and carries on down the road, diminishing your force by some seventy men.  \n        \n        *set south_skirmish_company \"B\"\n        *set regimental_strength -69\n        *set first_battalion -69\n        *goto 14th_retreat\n      #\"F Company, 2nd Battalion.\" \n        \"Very good, Sir.\"  Captain Withington scratches his mustache and turns, \"Captain Roberts, come here!\"  The officer runs up and salutes.  \"Take your Company down the road to the south.  Stop at the road junction and cover the right flank.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.\"  \n        \n        \"Yes, Sir!\"  He salutes again and then hurries off to carry out his orders.  His company leaves the regiment and carries on down the road, diminishing your force by some seventy men.  \n        \n        *set south_skirmish_company \"F\"\n        *set regimental_strength -70\n        *set second_battalion -70\n        *goto 14th_retreat\n      #\"G Company, 2nd Battalion.\"\n        \"Very good, Sir.\"  Captain Withington scratches his mustache and turns, \"Captain Abbott, come here!\"  The officer runs up and salutes.  \"Take your Company down the road to the south.  Stop at the road junction and cover the right flank.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.\"  \n        \n        \"Yes, Sir!\"  He salutes again and then hurries off to carry out his orders.  His company leaves the regiment and carries on down the road, diminishing your force by some seventy men.  \n        \n        *set south_skirmish_company \"G\"\n        *set regimental_strength -72\n        *set second_battalion -72\n        *goto 14th_retreat\n  #\"West to Chinn Ridge.  I want to know if the enemy is getting around behind us.\"  \n    *set west_skirmishers \"yes\"\n    \"Yes Sir.  What Company shall we deploy?\"  \n    *choice\n      #\"A Company, 1st Battalion.\"  \n        \"Understood, Sir.\"  Captain Lum turns, \"Lieutenant Fairbanks, come here!\"  The young man runs up and salutes.  \"Take your Company west across the stream and take up position on that ridge.  You are to cover the rear and prevent the enemy from getting around behind us.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.\"  \n        \n        \"Yes, Sir!  Captain!\"  He salutes again and then hurries off to carry out his orders.  His company leaves the regiment and carries on down the hill, diminishing your force by some seventy men.  \n        \n        *set west_skirmish_company \"A\"\n        *set regimental_strength -71\n        *set first_battalion -71\n        *goto 14th_retreat\n      #\"B Company, 1st Battalion.\"\n        \"Understood, Sir.\"  Captain Lum turns, \"Lieutenant Griffith, come here!\"  The young man runs up and salutes.  \"Take your Company west across the stream and take up position on that ridge.  You are to cover the rear and prevent the enemy from getting around behind us.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.\"  \n        \n        \"Yes, Sir!  Captain!\"  He salutes again and then hurries off to carry out his orders.  His company leaves the regiment and carries on down the hill, diminishing your force by some seventy men.  \n        \n        *set west_skirmish_company \"B\"\n        *set regimental_strength -69\n        *set first_battalion -69\n        *goto 14th_retreat\n      #\"F Company, 2nd Battalion.\" \n        \"Very good, Sir.\"  Captain Withington scratches his mustache and turns, \"Captain Roberts, come here, if you please!\"  The officer runs up and salutes.  \"Take your Company west across the stream and take up position on that ridge.  You are to cover the rear and prevent the enemy from getting around behind us.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.\"  \n        \n        \"Yes, Sir!\"  He salutes again and then hurries off to carry out his orders.  His company leaves the regiment and carries on down the hill, diminishing your force by some seventy men.  \n        \n        *set west_skirmish_company \"F\"\n        *set regimental_strength -70\n        *set second_battalion -70\n        *goto 14th_retreat\n      #\"G Company, 2nd Battalion.\"\n        \"Very good, Sir.\"  Captain Withington scratches his mustache and turns, \"Captain Abbott, come here, if you please!\"  The officer runs up and salutes.  \"Take your Company west across the stream and take up position on that ridge.  You are to cover the rear and prevent the enemy from getting around behind us.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.\"  \n        \n        \"Yes, Sir!\"  He salutes again and then hurries off to carry out his orders.  His company leaves the regiment and carries on down the hill, diminishing your force by some seventy men.  \n        \n        *set west_skirmish_company \"G\"\n        *set regimental_strength -72\n        *set second_battalion -72\n        *goto 14th_retreat\n  #\"On both the south road and on Chinn Ridge to the west.\"  \n    *set south_skirmishers \"yes\"\n    *set west_skirmishers \"yes\"\n    \"Yes Sir.  What Companies shall we deploy?\"  \n    *choice\n      #\"A and B Companies, 1st Battalion.\"  \n        \"Understood, Sir.\"  Captain Lum turns, \"Lieutenant Fairbanks, Lieutenant Griffith, come here!\"  The young men run up and salute.  \"Fairbanks, take A Company down the road to the south.  Stop at the road junction and cover the right flank.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.  Lieutenant Griffith, take B Company west across the stream and take up position on that ridge.  You are to cover the rear and prevent the enemy from getting around behind us.  If you observe any serious flanking movement, report it to the Major.  Dismissed.\"  \n        \n        \"Yes, Sir!  Captain!\"  They salute again and then hurry off to carry out their orders.  Both companies leave the regiment and move off in two directions, diminishing your force by some one hundred fifty men.  \n        \n        *set south_skirmish_company \"A\"\n        *set west_skirmish_company \"B\"\n        *set regimental_strength -140\n        *set first_battalion -140\n        *goto 14th_retreat\n      #\"F and G Companies, 2nd Battalion.\"  \n        \"Very good, Sir.\"  Captain Withington scratches his mustache and turns, \"Captain Roberts, Captain Abbott, come here, if you please!\"  The officers run up and salute.  \"Roberts, take F Company down the road to the south.  Stop at the road junction and cover the right flank.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.  Captain Abbott, take G Company west across the stream and take up position on that ridge.  You are to cover the rear and prevent the enemy from getting around behind us.  If you observe any serious flanking movement, report it to the Major.  Dismissed.\"   \n        \n        \"Yes, Sir!\"  They salute again and then hurry off to carry out their orders.  Both companies leave the regiment and move off in two directions, diminishing your force by some one hundred fifty men.  \n        \n        *set south_skirmish_company \"F\"\n        *set west_skirmish_company \"G\"\n        *set regimental_strength -142\n        *set second_battalion -142\n        *goto 14th_retreat\n      #\"A and F Companies.  One from each battalion.\"\n        \"Understood, Sir,\" says Captain Lum, \"Do you mind, Withington?\"  \n        \n        \"Be my guest,\" replies the other battalion commander.  \n        \n        Lum nods and turns away, \"Lieutenant Fairbanks, Captain Roberts, come here!\"  The two men run up and salute.  \"Fairbanks, take A Company down the road to the south.  Stop at the road junction and cover the right flank.  If you observe enemy flanking movements of any considerable force, you are to send report to Major $!{surname} immediately.  Captain Roberts, take F Company west across the stream and take up position on that ridge.  You are to cover the rear and prevent the enemy from getting around behind us.  If you observe any serious flanking movement, report it to the Major.  Dismissed.\"  \n        \n        \"Yes, Sir!\"  They salute again and then hurry off to carry out their orders.  Both companies leave the regiment and move off in two directions, diminishing your force by some one hundred fifty men.  \n        \n        *set south_skirmish_company \"A\"\n        *set west_skirmish_company \"F\"\n        *set regimental_strength -141\n        *set first_battalion -71\n        *set second_battalion -70\n        *goto 14th_retreat\n*label 14th_retreat\nYou hear a distant cheer from the woods to the southeast.  Looking that direction, you see the Union Fire Zouaves break and run.  They leave behind a few dozen bodies on the hill, their conspicuous red uniforms standing out amidst the grass.  As the routing men approach you, you see officers on horseback riding with them, trying to reinstate order.  \n*label heintzelman\nOne of the officers rides up to you, panting and gripping his bloody right arm.  \n*choice\n  #\"Colonel Heintzelman, are you alright?\"\n    He looks at you, teeth gritted with pain, and growls an answer, \"God damn rebels shot me in the elbow.  I cannot feel my arm.  Damn them to hell and back!\"  He closes his eyes and inhales, clearly regaining control of himself.  \"Listen, we have to retake those guns.  The whole battle will depend on our guns.  They are playing hell with those rebels.  Do not let them take the guns.  I must retire to the rear to find a surgeon.  They'll not have my arm, the bloody minded saw bones.  I am leaving Colonel Willcox in command of this field for now.  Find him and do what you can.\"  \n    *choice\n      #\"Yes Sir!\"\n        *goto delta\n      #\"Take care of yourself, Colonel.\"\n        *goto delta\n  #\"Colonel Heintzelman, what are our orders?\"\n    He looks at you, teeth gritted with pain, and growls an answer, \"Damn them to hell and back!\"  He closes his eyes and inhales, clearly regaining control of himself.  \"Listen, we have to retake those guns.  The whole battle will depend on our guns.  They are playing hell with those rebels.  Do not let them take the guns.  I must retire to the rear to find a surgeon.  They'll not have my arm, the bloody minded saw bones.  I am leaving Colonel Willcox in command of this field for now.  Find him and do what you can.\"  \n    *choice\n      #\"Yes Sir!\"\n        *goto delta\n      #\"Take care of yourself, Colonel.\"\n        *goto delta\n*label delta\nSomething catches your eye to the east, and you spur your horse a few steps onto a higher bit of ground.  Looking out across the hilltop, you see the main Union battery loading and firing.  On its left, you see a blue coated Union regiment approaching them.  Or maybe it is two regiments.\n*if surname = \"Spears\"\n  *image henry_hill3.1.png\n  *set map_trigger \"henry_hill3.1\"\n  *goto image2\n*if surname = \"Weber\"
