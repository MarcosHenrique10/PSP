rd in command for the time being.  They should arrive soon after we do.\"  \n  *goto_scene {attack}\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n    *label purchased\n    *return\n*page_break\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n    *return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n    *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the rest of the game.[/i]\n\n*purchase_discount adfree 2025-01-09 $3.99 $2.99 purchased\n*abort", "battle_conclusion": "*temp outcome \"\"\n*temp trigger0 \"no\"\n*temp trigger1 \"no\"\n*temp trigger2 \"no\"\n*if volleys > 2\n  *achieve volley\n*if fire_at_will > 2\n  *achieve fire_at_will\n*if fix_bayonets > 2\n  *achieve fix_bayonets\n*comment this removes the temporary L company from your troop count\n*set company_L \"no\"\n*if company_L_strength = 102\n  *set regimental_strength -91\n*if company_L_strength = 61\n  *set regimental_strength -53\n*if company_L_strength = 42\n  *set regimental_strength -37\n*comment this adds the west skirmish company back to your troop count if you deployed one\n*if west_skirmish_company = \"A\"\n  *set regimental_strength +71\n  *set first_battalion +71\n*if west_skirmish_company = \"B\"\n  *set regimental_strength +69\n  *set first_battalion +69\n*if west_skirmish_company = \"F\"\n  *set regimental_strength +70\n  *set second_battalion +70\n*if west_skirmish_company = \"G\"\n  *set regimental_strength +72\n  *set second_battalion +72\n*comment this shows the casualties from second battalion fighting on the hill if your backup plan was attack\n*temp lt_killed_trigger3 \"no\"\n*if backup_plan = \"attack\"\n  *set regimental_strength -31\n  *set second_battalion -31\n  *set officers -1\n  *if i_company_commander = \"1st Lt. John Hatcher\"\n    *set i_company_commander \"2nd Lt. Raymond Dobbins\"\n  *set lt_killed_trigger3 \"yes\"\nMoving across the stream, you begin the counter march back up the road you just came down a few hours ago.  You went into the fire and came out alive, but the same cannot be said for many others.  Why were they hit and not you?  Why was brave Colonel Farnham killed in the first action while you survived the whole battle?  It simply does not make sense.  \n\nOff to the right, you see a bit of level ground that looks like a convenient defilade to place your troops in.  They will have a heightened view of Young's Branch, and the little dip in the slope will partially protect them from enemy fire.  \"Halt!  Right face.  March!\"  \n\nYour eyes scan the rest of the rising slope of Dogan Ridge.  You see a few Union guns on the hill, protected by a regiment.  Even at this distance, you recognize Colonel Woodbury's 4th Michigan and Captain Arnold's battery.  They have been held in reserve all this time and did not witness the things that you did.  You can imagine Woodbury, champing at the bit and wanting to fight.  You wish you could trade places with him now that you have seen the elephant yourself.  \n\n*if ricketts_battery = \"saved\"\n  On the way to your new position, you see a small Union artillery battery.  An officer steps out in front of it and waves to you emphatically.  You see that it is Captain Ricketts, whose battery you rescued on Henry Hill.  Now, the whole battery lets out a hearty cheer.  \"Hip hip, huzzah!  Huzzah!  Huzzah!\"  Some of your men remove their hats in acknowledgment of the fine compliment.  You nod at Ricketts with sincere pleasure on your face.  You did the right thing and it made a difference.  \n  \nThe 1st $!{state} forms up in the defilade and finally gets a chance to rest.  You take a moment to just close your eyes and be idle.  It feels like a luxury to not have any urgent requirements to fulfill.  But this time of waiting cannot last as the sound of guns comes steadily closer.  \n\n*if rescue = \"yes\"\n  The battlefield is somewhat obscured by the rising, overlapping clouds of powder smoke, but it is clear that the United States is not doing well on Henry Hill.  The constant stream of straggling Union troops crossing Young's Branch and withdrawing up the ridge is a testament to that.  Gradually, these numbers grow, and full regiments retreat across the stream in various states of disorder.  \n  \n  Two lonely stragglers in this retreat make their way toward you, one helping the other along.  \"Colonel Willcox, Sir!  Captain Withington!\" you cry, \"I am glad you made it to safety.\"  \n  \n  Willcox smiles at you.  \"Captain Withington has behaved extremely well.  I fear the battle for Henry Hill is lost, but I hope that we can stem the rout and hold the enemy here.\"\n*if rescue = \"no\"\n  The battlefield is somewhat obscured by the rising, overlapping clouds of powder smoke, but it is clear that the United States is not doing well on Henry Hill.  The constant stream of straggling Union troops crossing Young's Branch and withdrawing up the ridge is a testament to that.  Gradually, these numbers grow, and full regiments retreat across the stream in various states of disorder.  \n  \n  The small stream becomes choked with fleeing men of all units, with uniforms of red, blue, gray, and green.  It is a singularly undisciplined rout.  \n*page_break\nNow the enemy line is drawing near.  You can see the rebel lines moving north on the road and approaching the creek.  Arnold's battery on the hill fires at these lines, killing some small few.  Either the ridge will hold, or the whole army will be in jeopardy.  \n\nThe rebels let out their terrible banshee scream, a most inhuman sound that brings fear to your heart.  The leading regiments are fixing their bayonets.  The intensity of the rebel yell grows and these regiments charge forward to cross the stream.  \n*if battle_outcome > 8\n  *set outcome \"stalemate\"\n  *goto stalemate\n*elseif battle_outcome > 6\n  *set outcome \"orderly_retreat\"\n  *goto orderly_retreat\n*elseif battle_outcome > 4\n  *set outcome \"chaotic_retreat\"\n  *goto chaotic_retreat\n*else\n  *set outcome \"rout\"\n  *goto rout\n\n\n\n\n*label stalemate\n\"Regiment, present arms!  Shoulder arms!\"  You bark the orders, but your soldiers were already awaiting the command, and they obey sharply.  \"Ready!\"  The howling rebels are pouring through the stream and starting to climb the slope.  \"Aim… fire!\"  Your volley roars out, and the musket balls tear down the slope.  Some of the low shots bounce up off the grass and ricochet into the enemy formations.  As the smoke clears, you see the bodies floating in the water you just drank from.  It is running red.  \n\nThe rebels are not beaten, and they continue up toward you.  Other Union regiments are firing volleys as well.  Then you hear a thunderous series of bangs just off to the right  Ricketts battery has opened fire with cannister shot, and the lead balls whistle through the air.  The enormous scatter shot flies down the slope and cuts swathes in the enemy formation, sending arms and heads and pieces of muskets flying down the slope into the stream below.  \n\nThe rebel lines seem to waver and halt.  \"Fire!\"  Your final volley is the last straw.  The remaining rebels break and run for the stream and the far side of it.  Men slip and fall in the blood soaked grass or in the spilled entrails of their comrades.  The cannons fire again, slaughtering the retreating Confederates even as they try to escape.  \n\nYour men begin to cheer, waving their hats and shouting with excitement.  The rebels have fallen back!  \"Give you joy, Sir!\" shouts Captain Bowles, even shaking your hand.  You feel almost dazed by the moment.  The carnage was truly terrible to witness, but at least you are safe.  \n\nIs that all the rebels have?  Will they not come again?  You wait for the next assault with growing weariness.  It feels like a burden just to sit in your saddle, now.  As the sun slowly goes down in the west, it becomes apparent.  The enemy will not come again.  They are going to let the battle end for today.  \n\nThe sound of evening insects fills the air, and the rebel forces are obscured by darkness when someone finally comes to you with orders.  It is General McDowell, the commander of the whole army.  He looks completely exhausted in the dim light, with bags under his eyes and shoulders slumped.  \"Colonel, prepare to move out.  You are to proceed across the stone bridge and return to your morning's camp at Centreville.\"  He has mistaken you for a Colonel in his weary state.  Perhaps he cannot see the rank on your epaulets in the evening darkness.\n*achieve stalemate\n*achieve orderly_retreat\n*fake_choice\n  #\"Yes Sir.\"\n    \"Well done, today.\"  He turns his horse and departs.  \n  #\"Beg pardon, Sir, but what's afoot?\"  \n    \"We are withdrawing to Centreville and then returning to Washington.  The rebels have put up a greater fight than we had counted on, and most of our army's terms of enlistment are up in the next three days.\"\n\n\"1st $!{state}, attention!\"  The men stand up and form their line.  They look at you expectantly.  \"Regiment, prepare to move out.\"\n*choice\n  #Epilogue\n    *goto epilogue\n*label orderly_retreat\n\"Regiment, present arms!  Shoulder arms!\"  You bark the orders, but your soldiers were already awaiting the command, and they obey sharply.  \"Ready!\"  The howling rebels are pouring through the stream and starting to climb the slope.  \"Aim… fire!\"  Your volley roars out, and the musket balls tear down the slope.  Some of the low shots bounce up off the grass and ricochet into the enemy formations.  As the smoke clears, you see the bodies floating in the water you just drank from.  It is running red.  \n\nThe rebels are not beaten, and they continue up toward you.  Other Union regiments are firing volleys as well.  \n*if ricketts_battery = \"saved\"\n  Then you hear a thunderous series of bangs just off to the right  Ricketts battery has opened fire with cannister shot, and the lead balls whistle through the air.  The enormous scatter shot flies down the slope and cuts swathes in the enemy formation, sending arms and heads and pieces of muskets flying down the slope into the stream below.  \n\nThe rebel lines seem to waver and halt.  \"Fire!\"  Your final volley is the last straw.  The remaining rebels break and run for the stream and the far side of it.  Men slip and fall in the blood soaked grass or in the spilled entrails of their comrades.  \n*if ricketts_battery = \"saved\"\n  The cannons fire again, slaughtering the retreating Confederates even as they try to escape.  \n  \nYour men begin to cheer, waving their hats and shouting with excitement.  The rebels have fallen back!  \"Give you joy, Sir!\" shouts Captain Bowles, even shaking your hand.  You feel almost dazed by the moment.  The carnage was truly terrible to witness, but at least you are safe for the moment.  \n\nThe rebels are not finished, however.  They deploy skirmishers who advance in loose order, prodding your defenses.  Your men have at least managed to collect ammo from some of the retreating units, but they are still very low.  The enemy is not going to give up.  They want to take the ridge and push you off the field.  \n\nAt last, a messenger rides up to you.  You resolve to tell him the truth, that your men are exhausted and no longer possess enough ammunition to hold their ground.  \"Compliments of General McDowell.  He commends you for holding this ground long enough for the rest of the army to withdraw.  He has ordered all remaining units to withdraw in order across the stone bridge and to return to this morning's camp at Centreville.\"  \n*achieve orderly_retreat\n*fake_choice\n  #\"Understood.\"\n  #\"Very well.  What's afoot?\"\n    \"The army is withdrawing to Centreville and then returning to Washington.  The rebels have put up a greater fight than we had counted on, and most of our army's terms of enlistment are up in the next three days.\"\n\n\"1st $!{state}, attention!\"  The men stand up and form their line.  They look at you expectantly.  \"Regiment, prepare to move out.\"\n*choice\n  #Epilogue\n    *goto epilogue\n*label chaotic_retreat\n\"Regiment, present arms!  Shoulder arms!\"  You bark the orders, but your soldiers do not obey.  They are staring ahead at the screaming onrushing foes.  \"Regiment, attention!\"  You shout more commands, but the men are beyond your control.  They start to dissolve and run away in groups of a dozen or more.  Seeing their friends routing, the sturdier troops break and run.  You spur your horse after them to try and regain control, but it is no use.  \n\n*if ricketts_battery = \"saved\"\n  There are a series of three thunderous bangs off to the left as Ricketts' battery opens fire with cannister shot.  The enormous scatter shot cuts bloody swathes in the enemy formation, but the gunners do not wait to load another salvo.  They abandon the guns and equipment and run for their lives up the slope.  Some cut horses free of their lines and ride off in pell-mell disorder.  \n  \nLooking around the slope, you see that the rout is not limited to your own unit.  The Union volunteers have seen enough, and they are fleeing as fast as they can run.  You have to admit to yourself that the proud United States Army has been defeated in battle.  It is a bitter pill to swallow. \n*choice\n  #Epilogue\n    *goto epilogue\n*label rout\n\"Regiment, present arms!  Shoulder arms!\"  You bark the orders, but your soldiers do not obey.  Discipline and order dissolve before your very eyes as your soldiers abandon their posts and run.  \"Regiment, attention!\"  You shout more commands, but the men are beyond your control.  They will not fight for a moment longer.  Muskets and gear are cast away as they flee.  You spur your horse after them to try and regain control, but it is no use.  \n\n*if ricketts_battery = \"saved\"\n  The gun crews of Ricketts' battery is abandoning their guns unfired.  You see Captain Ricketts haranguing a fleeing soldiers who slugs him in the mouth and runs for it.  Some of the gunners cut horses free of their lines and ride off in pell-mell disorder.  \n\nLooking around the slope, you see that the rout is not limited to your own unit.  The Union volunteers have seen enough, and they are fleeing as fast as they can run.  You have to admit to yourself that the proud United States Army has been defeated in battle.  It is a bitter pill to swallow. \n*choice\n  #Epilogue\n    *goto epilogue\n\n\n\n\n\n*label epilogue\nJuly 30, 1861\n*line_break\n07:00\n\nThe soft armchair feels exquisitely comfortable after the hardships of being on campaign.  You inhale deeply and close your eyes as you let the air back out.  You have no duties this morning, and you are determined to enjoy the time that you have.  The common room of the inn is empty except for a gray haired gentleman sitting quietly in the far corner.  The usual group of residing army officers must still be asleep after staying up to ungodly hours the night before.  \n\nMany officers have found a brief respite in the absence of troops to command.  Most of the Union Army that fought a week ago has already disbanded and gone home.  The vast majority had signed only 90 day enlistments and left as soon as these terms were up.  Fortunately, many of your own regiment stayed and signed three year enlistments to remain in the army.  The war may last longer than initially thought, but three years should be more than enough time to defeat the rebellion.  \n\n\"Good morning, Major,\" says the owner of the inn, brightly.  \"Breakfast is on the stove this very minute.  In the meantime, should you like your fresh coffee and something to read?  We have the latest newspaper here, with news of your brave battle.\"  \n*fake_choice\n  #\"Thank you, ma'am, that would be marvelous.\"  \n    \"You need to strengthen yourself up after so much exertion.  Coffee is just what your constitution requires.  We have a nice breakfast cooking with fresh eggs the hen laid this very morning.\"  The middle aged woman retreats to the kitchen after offering the same to the gentleman across the room.  \n  #\"No thank you, ma'am.  I do not require anything at the moment.\"  \n    \"You need to strengthen yourself up after so much exertion.  Coffee is just what your constitution requires.  I will not hear anything else about it.\"  The middle aged woman is set in her ways and not easily deterred from doing whatever she knows to be correct.  You merely sigh as she retreats to the kitchen.  \n\nA minute later, you receive the steaming cup of coffee and a copy of the newspaper from a servant.  \"Missus says drink up since we have another pot on the stove already, sir.\"  \n\nLeaving the piping hot cup for the moment, you take up the paper and peer at the cover.  \n\n[b][i]WAR NEWS[/i][/b]\n*line_break\n————\n*line_break\n[b][i]THE BATTLE AT BULL'S RUN[/i][/b]\n*line_break\n————\n*line_break\n[b][i]Latest Particulars[/i][/b]\n*line_break\n————\n*line_break\n[b][i]AN EXCITING SCENE[/i][/b]\n*line_break\n————\n*line_break\n*if outcome = \"stalemate\"\n  [b][i]NEITHER ARMY VICTORIOUS[/i][/b]\n  *goto charlie\n*if outcome = \"orderly_retreat\"\n  [b][i]FEDERAL ARMY RETREATS TO WASHINGTON[/i][/b]\n  *goto charlie\n*else\n  [b][i]DEFEAT OF THE FEDERAL ARMY[/i][/b]\n  *goto charlie\n*label charlie\n*line_break\n————\n*line_break\n[b][i]GREAT SLAUGHTER ON BOTH SIDES[/i][/b]\n*line_break\n————\n*line_break\n[b][i]Army of the Potomac to be Reorganized[/i][/b]\n*fake_choice\n  #Continue reading.\nYou skim the fanciful rhetoric of the battle.  It is not all that similar to the true events, the writer preferring his own imagination of what a battle might look like.  There is a sub heading that catches your eye, however:\n\n*if outcome = \"stalemate\"\n  [b][i]\"An Unclear Result - Both Armies leave battlefield in Order.[/i][/b]\n\n  [i]\"All our military operations went swimmingly on.  The enemy were seemingly in retreat when many more formidable forces appeared to distress the Federal Army.  After a fierce battle with many dead, wounded, and missing, both armies allowed night to fall without a clear victor.  The Federal Army then withdrew to Washington where many enlistments were ended.\"[/i]\n*if outcome = \"orderly_retreat\"\n  [b][i]\"An Orderly Retreat - Officers control frightened Soldiers[/i][/b]\n\n  [i]\"All our military operations went swimmingly on.  The enemy were seemingly in retreat when many more formidable forces appeared to distress the Federal Army.  Rearguard stood bravely for hours while commanders withdrew troops and baggage train.  A full panic was narrowly avoided, but victory was unable to be grasped.\"[/i]\n*if outcome = \"chaotic_retreat\"\n  [b][i]\"A Great Retreat - Teamsters, Civilians, and Soldiers frightened.[/i][/b]\n\n  [i]\"All our military operations went swimmingly on.  The enemy were seemingly in retreat when a terrific consternation broke out among the troops.  Our whole army was in retreat.  Many baggage trains were emptied and their horses galloped across the open fields.  For a time, a perfect panic prevailed, but the officers brought their soldiers in control before reaching Centreville.\"[/i]\n*if outcome = \"rout\"\n  [b][i]\"A Great Stampede - Teamsters, Civilians, and Soldiers frightened.[/i][/b]\n\n  [i]\"All our military operations went swimmingly on.  The enemy were seemingly in retreat when a terrific consternation broke out among the troops.  Our whole army was in retreat.  Many baggage trains were emptied and their horses galloped across the open fields.  For a time, a perfect panic prevailed.  Wounded soldiers cried on the roadside for assistance, but the alarm was so great that many were passed by.\"[/i]\n\nYour eyes flit to the next column where you see another subtitle:\n\n[b][i]\"LATER DETAILS[/i][/b]\n*line_break\n————\n*line_break\n[b][i]By Last Night's Washington Train[/i][/b]\n*line_break\n————\n*line_break\n[b][i]The Killed and Wounded &c.\"[/i][/b]\n\n[i]Col. Slocum of the Second Rhode Island is not killed, as at first reported…[/i]\n*line_break\n[i]The death of Colonel Cameron, of the New York Highlanders, is confirmed…[/i]\n*line_break\n[i]Colonel Farnham, of the 11th New York, received a severe head wound and is despaired of…[/i]\n*line_break\n[i]Col. Hunter was wounded twice but the wounds are believed to be minor and a full recovery is expected…[/i]\n*line_break\n[i]Colonel Heintzelman was struck in the elbow but remained in the saddle all the way back to Washington.  [/i]\n*line_break\n*if willcox = \"rescued\"\n  *if battle_plan = \"rescue\"\n    [i]Colonel O. Willcox was wounded in the arm and captured during a noble & brave charge, but was rescued by his own men and is recuperating in Washington.  [/i]\n    *goto alpha\n  *elseif backup_plan = \"rescue\"\n    [i]Colonel O. Willcox was wounded in the arm and captured during a noble & brave charge, but was rescued by his own men and is recuperating in Washington.  [/i]\n    *goto alpha\n  *else\n    [i]Colonel O. Willcox was wounded in the arm and captured during a noble & brave charge, but was rescued by his own men.  It is believed that he was captured again later in the battle as Federal troops were overrun by advancing Confederates.  [/i]\n    *set willcox \"captured\"\n    *goto alpha\n*if willcox = \"captured\"\n  [i]Colonel O. Willcox was wounded in the arm and captured during a noble & brave charge.  He is believed to be alive and well treated by enemy officers.  [/i]\n*label alpha\n*page_break\nYou put down the newspaper.  You will have time to read it all later.  For now, you reach in your breast pocket and pull out a small, informal list that you have been working on.  It will be useful later to fill out your monthly report of unit strength.  You have written down some key information about the remnants of your regiment.  \n\n[i]Officers killed, wounded, etc:[/i]\n\n*if i_company_commander = \"1st Lt. John Hatcher\"\n  *set trigger0 \"yes\"\n*if lt_killed_trigger = \"yes\"\n  *set trigger0 \"yes\"\n*if lt_killed_trigger2 = \"yes\"\n  *set trigger0 \"yes\"\n*if lt_killed_trigger3 = \"yes\"\n  *set trigger0 \"yes\"\n*if trigger0 = \"yes\"\n  [i]Died:[/i]\n  *line_break\n*if i_company_commander = \"1st Lt. John Hatcher\"\n  [i]Capt. Daniel Hubbard, Commanding I Company.[/i]\n  *line_break\n*if i_company_commander = \"2nd Lt. Raymond Dobbins\"\n  [i]Capt. Daniel Hubbard, Commanding I Company.[/i]\n  *line_break\n*if lt_killed_trigger2 = \"yes\"\n  [i]1st Lt. Alvin Buse, F Company.[/i]\n  *line_break\n*if lt_killed_trigger3 = \"yes\"\n  [i]1st Lt. John Hatcher, I Company.[/i]\n  *line_break\n*if lt_killed_trigger = \"yes\"\n  [i]2nd Lt. Seth Johnston, C Company.[/i]\n\n*if c_company_commander = \"1st Lt. Michael German\"\n  *set trigger1 \"yes\"\n*if e_company_commander = \"Vacant\"\n  *set trigger1 \"yes\"\n*if k_company_commander = \"Vacant\"\n  *set trigger1 \"yes\"\n*if lt_wounded_trigger2 = \"yes\"\n  *set trigger1 \"yes\"\n*if trigger1 = \"yes\"\n  [i]Wounded & Captured:[/i]\n  *line_break\n*if c_company_commander = \"1st Lt. Michael German\"\n  [i]Capt. Ebenezer Butterworth, Commanding C Company.[/i]\n  *line_break\n*if e_company_commander = \"Vacant\"\n  [i]Capt. Wayne Roth, Commanding E Company.[/i]\n  *line_break\n*if k_company_commander = \"Vacant\"\n  [i]Capt. William Graves, Commanding K Company.[/i]\n  *line_break\n*if lt_wounded_trigger2 = \"yes\"\n  [i]2nd Lt. Russell Byron, E Company.[/i]\n\n*if first_battalion_commander = \"Vacant\"\n  *set trigger2 \"yes\"\n*if lt_wounded_trigger = \"yes\"\n  *set trigger2 \"yes\"\n*if trigger2 = \"yes\"\n  [i]Wounded:[/i]\n  *line_break\n*if first_battalion_commander = \"Vacant\"\n  [i]Capt. Charles Lum, Commanding First Battalion.[/i]\n  *line_break\n*if lt_wounded_trigger = \"yes\"\n  [i]1st Lt. Alfred Carpenter, H Company.[/i]\n  *line_break\n  [i]2nd Lt. Francis Conway, A Company.[/i]\n\n[i]Enlisted losses, estimated:[/i]\n\n*if regimental_strength > 740\n  [i]6 killed[/i]\n  *line_break\n  [i]19 wounded[/i]\n  *line_break\n  [i]13 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 730\n  [i]8 killed[/i]\n  *line_break\n  [i]24 wounded[/i]\n  *line_break\n  [i]17 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 720\n  [i]11 killed[/i]\n  *line_break\n  [i]29 wounded[/i]\n  *line_break\n  [i]19 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 710\n  [i]12 killed[/i]\n  *line_break\n  [i]35 wounded[/i]\n  *line_break\n  [i]24 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 700\n  [i]14 killed[/i]\n  *line_break\n  [i]39 wounded[/i]\n  *line_break\n  [i]27 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 690\n  [i]14 killed[/i]\n  *line_break\n  [i]45 wounded[/i]\n  *line_break\n  [i]31 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 680\n  [i]16 killed[/i]\n  *line_break\n  [i]49 wounded[/i]\n  *line_break\n  [i]34 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 670\n  [i]17 killed[/i]\n  *line_break\n  [i]56 wounded[/i]\n  *line_break\n  [i]35 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 660\n  [i]19 killed[/i]\n  *line_break\n  [i]62 wounded[/i]\n  *line_break\n  [i]38 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 650\n  [i]22 killed[/i]\n  *line_break\n  [i]66 wounded[/i]\n  *line_break\n  [i]40 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 640\n  [i]24 killed[/i]\n  *line_break\n  [i]71 wounded[/i]\n  *line_break\n  [i]44 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 630\n  [i]25 killed[/i]\n  *line_break\n  [i]77 wounded[/i]\n  *line_break\n  [i]46 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 620\n  [i]27 killed[/i]\n  *line_break\n  [i]81 wounded[/i]\n  *line_break\n  [i]48 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 610\n  [i]30 killed[/i]\n  *line_break\n  [i]88 wounded[/i]\n  *line_break\n  [i]51 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 600\n  [i]32 killed[/i]\n  *line_break\n  [i]93 wounded[/i]\n  *line_break\n  [i]55 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 590\n  [i]32 killed[/i]\n  *line_break\n  [i]99 wounded[/i]\n  *line_break\n  [i]59 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 580\n  [i]33 killed[/i]\n  *line_break\n  [i]104 wounded[/i]\n  *line_break\n  [i]64 missing[/i]\n  *goto bravo\n*else\n  [i]35 killed[/i]\n  *line_break\n  [i]108 wounded[/i]\n  *line_break\n  [i]68 missing[/i]\n  *goto bravo\n*label bravo\n\nThe sound of the door opening draws your attention.  Looking up, you see Colonel Heintzelman walk in, trailed by two staff officers.  The Colonel's right arm is in a sling and the sleeve of his fine new greatcoat hangs empty by his side.  You tuck the paper back into your own jacket as the owner approaches Heintzelman.  \"Why hello, Colonel.  What may we do for you today?\"  \n\nHeintzelman's one real eye glances about the common room, its glass companion sitting idly in its socket.  \"Good morning, ma'am.  I am told that Major $!{first_name} $!{surname} is staying at this public house.  Would you be so kind as to tell him that Colonel Heintzelman desires a word?\"  \n\nYou set down the newspaper and rise quickly to your feet.  \n*fake_choice\n  #\"Good morning, Sir.\"  \nHeintzelman steps up to you and returns your salute with his left hand.  He holds it out to his side and one of the aides pulls off the white glove.  Putting the hand forward, he seizes your left and shakes it vigorously.  \"Beg pardon, Major, but my right hand is indisposed.  The surgeons tell me that it will not need to come off barring some misfortune.  A blessing if ever there was one.  At ease!  Sit!\"  One of the aides drags another armchair forward and Heintzelman sits opposite you.  \n\n\"How are you doing this morning?  Good?  Very well!  \n*if willcox = \"rescued\"\n  Colonel Willcox is recovering in the hospital, or no doubt he would deliver this news himself.\"  \n*if willcox = \"captured\"\n  Since Colonel Willcox was captured, I am here to deliver this message in his place.\"  \n\nThe Colonel clears his throat and speaks to his aide, \"Have them fetch me a glass of whiskey, will you?  Care for a cigar, Major?\"  \n*fake_choice\n  #\"Yes, thank you.\"  \n    The aide lights two cigars and waves out the match before handing one to each of you.  \n  #\"No, thank you.\"\n    The aide lights a cigar and waves out the match before handing it to Heintzelman.  \nA gravelly chuckle makes its way out of the Colonel as he puffs the cigar.  \"The one good thing about this damned sling is that I can ask my staff do every little annoying task on my behalf.  Now, where was I?\"  \n\nThe whiskey arrives for Heintzelman and he takes a large swig.  \"Well, no doubt you are aware that the battle did not go quite as we might have hoped…  I suppose you might be feeling rather down about it.  \n*fake_choice\n  #\"Yes, Sir.  I am ashamed that we did not achieve victory.\"  \n    \"Ah, I imagined it might be so.  But, do not trouble your mind.  If anything, the responsibility for the outcome falls on General McDowell, and the division commanders such as myself.  But truly, the indiscipline of our force bears the greatest share of the blame.  What can any one officer do to change the outcome of such a contest?  Do not blame yourself for failings that are much beyond your control.\"  \n  #\"Not I, Sir.  I do not worry over much about things which I cannot control.\"  \n    \"Very good.  I would not have you trouble yourself over failings so much larger than any one man.  If anything, the responsibility for the outcome falls on General McDowell, and the division commanders such as myself.  But truly, the indiscipline of our force bears the greatest share of the blame.  What can any one officer do to change the outcome of such a contest?\"\n\nThe Colonel takes another swig of whiskey and puffs the cigar in his mouth before continuing.  \"I do have a few informal remarks about your performance, though no doubt Willcox can give you a better account, at a later date.  \n*if report = \"yes\"\n  *if attack = \"left\"\n    I am told that you aided with reconnaissance during the first stage of the battle and advised the attack should go up the left side of the ridge.  Well done.  No doubt the information you provided was of great use to the army.\"  \n  *if attack = \"center\"\n    I am told that you participated in the assault on Dogan Ridge during the first stage of the battle.  It was well done.\"  \n  *if attack = \"right\"\n    I am told that you aided with reconnaissance during the first stage of the battle and advised the attack should go up the right side of the ridge.  Very well done!  We were able to outflank them and drive them off with minimal casualty!\"  \n*if report = \"no\"\n  I understand that you failed to report the condition of the field to your commander despite ordered to do so.  However, I am told that you participated in the assault on Dogan Ridge during the first stage of the battle.  That may assist in making up for your failure.\"  \n\n\"Now, as to the fight on Henry Hill.  \n*if ricketts_battery = \"saved\"\n  If there was one critical moment, in my estimation, it was your rescue of Ricketts' gun battery.  If we had lost all of those guns, it would have been the devil to pay and no pitch hot!  Very well done in realizing the threat before it was too late.  A little luck and intuition can cover a multitude of sins, I dare say!\"  \n*if ricketts_battery = \"lost\"\n  If there was one critical moment, in my estimation, it was the loss of Ricketts' gun battery on the hill.  That miscommunication with the rebels wearing blue uniforms was just damnably unfortunate.  I don't suppose that even those rogues meant to cause such a deception, but they were happy enough to benefit by one.  Alas.\"  \n\n*if battle_plan = \"attack\"\n  *if backup_plan = \"flank\"\n    \"After the affair with the guns, I am told that you led your men in an attack on the heights of Henry Hill.  You were wise to deploy one of your battalions to cover the flank.  If not for this, we might have had a much sorer day.\"  \n    *goto friendly_fire\n  *if backup_plan = \"rescue\"\n    \"After the affair with the guns, I am told that you led your men in an attack on the heights of Henry Hill.  You were wise to deploy one of your battalions to drive back the shattered units.  Damned rabble they might be, but I don't suppose the Confederates would have minded a few thousand extra prisoners.\"  \n    *goto friendly_fire\n  *if backup_plan = \"none\"\n    \"After the affair with the guns, I am told that you led your men in an attack on the heights of Henry Hill.  It was bravely done, but I only wish that your flank had been protected.  A shame, but it cannot be helped, now.\"  \n    *goto friendly_fire\n*if battle_plan = \"flank\"\n  *if backup_plan = \"rescue\"\n    \"After the affair with the guns, I am told that you led your men to cover the right flank of the army.  It was an excellent piece of judgment, and many soldiers in this army ought to thank you for it.  In addition, you were wise to deploy one of your battalions to drive back the shattered units.  Damned rabble they might be, but I don't suppose the Confederates would have minded a few thousand extra prisoners.\"  \n    *goto friendly_fire\n  *else\n    \"After the affair with the guns, I am told that you led your men to cover the right flank of the army.  It was an excellent piece of judgment, and many soldiers in this army ought to thank you for it.\"  \n    *goto friendly_fire\n\n*if battle_plan = \"rescue\"\n  *if backup_plan = \"flank\"\n    \"After the affair with the guns, I am told that your regiment drove the shattered units back to safety.  Damned rabble they might be, but I don't suppose the Confederates would have minded a few thousand extra prisoners.  In addition, you were wise to deploy one of your battalions to cover the flank.  If not for this, we might have had a much sorer day.\"  \n    *goto friendly_fire\n  *else\n    \"After the affair with the guns, I am told that your regiment drove the shattered units back to safety.  Damned rabble they might be, but I don't suppose the Confederates would have minded a few thousand extra prisoners.\"  \n    *goto friendly_fire\n*label friendly_fire\n\n*if friendly_fire = \"yes\"\n  Colonel Heintzelman takes a long drag on his cigar and blows the smoke out toward the ceiling.  \"There is one sore point, however, that I must address.  I have heard from an officer of the 2nd Wisconsin volunteer infantry that you fired on them in the heat of battle.  I have no doubt that it was an accident caused by their gray militia uniforms.  However, I must mention it, but I do not suppose there is anything to be gained by litigating an honest mistake.\"  \n*if friendly_fire = \"no\"\n  Colonel Heintzelman takes a long drag on his cigar and blows the smoke out toward the ceiling.  \"There is another point in your favor.  I have heard from an officer of the 2nd Wisconsin volunteer infantry that they were fired upon several times by Union regiments, no doubt due to their gray militia uniforms.  He mentioned your regiment as one that held fire and avoided this mistake.  One of the rare occasions when an officer does better to do nothing at all.  Ha!\"  \n\n*if outcome = \"stalemate\"\n  \"All in all, I believe you did as well as anyone might have asked of you.  Better, even.  Well done, Major!\"\n*if outcome = \"orderly_retreat\"\n  \"All in all, I believe you did as well as anyone might have asked of you.  Well done, Major.\"\n*if outcome = \"chaotic_retreat\"\n  \"All in all, you performed your duty adequately, and I am satisfied with your performance.\"  \n*if outcome = \"rout\"\n  \"Certainly there will be plenty of opportunities for you to improve your performance, Major.\"  \n*fake_choice\n  #\"Thank you, Sir.\"\n  #\"Understood, Sir.\"  \n\"Well, that is enough of that.  I am pleased to say that I have brought you some pleasant news.  Here.\"  He takes a proffered letter from an aide and passes it to you.  Your heart beats faster as you open the envelope labeled [b][i]WAR DEPARTMENT.[/i][/b]\n*fake_choice\n  #Open the envelope.\nThe letter is typed, leaving blank lines where your particulars have been filled out with a pen.  A broad smile spreads involuntarily across your face as you read.  \n    \n[i]The President of the United States of America[/i]\n\n[i]To [b]Major $!{first_name} $!{surname}[/b], greeting:[/i]\n\n[i]I, reposing especial trust and confidence in your patriotism, valour, conduct and fidelity, do by these presents constitute and appoint you to be [b]Colonel & commander[/b] of the [b]First $!{state} Regiment of Volunteer Infantry,[/b] commanded by [b]the same[/b] in the army of the United States, raised for the defense of American liberty.  You are therefore carefully and diligently to discharge the duty of [b]Colonel[/b] by doing and performing all manner of things thereunto belonging.  [/i]\n\n[i]And I do strictly charge and require all officers and soldiers under your command, to be obedient to your orders, as [b]Colonel[/b].  And you are to observe and follow such orders and directions from time to time as you shall receive from this, or a future President of the United States, or any other your superior officer, according to the rules and discipline of war, in pursuance of the trust reposed in you.  This commission to continue in force during the pleasure of the President of the United States of America for the time being.[/i]\n\n[i]Given under my hand at the City of Washington this [b]thirtieth[/b] day of [b]July[/b] in the year of our Lord one thousand and [b]eight hundred sixty one[/b].[/i]\n\n[i]By the President,[/i]\n*line_break\n[i][b]Abraham Lincoln[/b][/i]\n\nThe end.\n*achieve colonel\n*choice\n  #Historical notes.\n    *goto_scene historical_summary\n  #Done.\n    *goto_scene ending", "captured": "*temp trigger0 \"no\"\n*temp trigger2 \"no\"\n*temp outcome \"\"\n*achieve captured\n*if volleys > 2\n  *achieve volley\n*if fire_at_will > 2\n  *achieve fire_at_will\n*if fix_bayonets > 2\n  *achieve fix_bayonets\n*comment this removes the temporary L company from your troop count\n*set company_L \"no\"\n*if company_L_strength = 102\n  *set regimental_strength -91\n*if company_L_strength = 61\n  *set regimental_strength -53\n*if company_L_strength = 42\n  *set regimental_strength -37\n*comment this adds the west skirmish company back to your troop count if you deployed one\n*if west_skirmish_company = \"A\"\n  *set regimental_strength +71\n  *set first_battalion +71\n*if west_skirmish_company = \"B\"\n  *set regimental_strength +69\n  *set first_battalion +69\n*if west_skirmish_company = \"F\"\n  *set regimental_strength +70\n  *set second_battalion +70\n*if west_skirmish_company = \"G\"\n  *set regimental_strength +72\n  *set second_battalion +72\n*comment this shows the casualties from second battalion fighting on the hill if your backup plan was attack\n*temp lt_killed_trigger3 \"no\"\n*if backup_plan = \"attack\"\n  *set regimental_strength -31\n  *set second_battalion -31\n  *set officers -1\n  *if i_company_commander = \"1st Lt. John Hatcher\"\n    *set i_company_commander \"2nd Lt. Raymond Dobbins\"\n  *set lt_killed_trigger3 \"yes\"\n*comment continue\n*if battle_outcome > 8\n  *set outcome \"stalemate\"\n  *goto alpha\n*elseif battle_outcome > 6\n  *set outcome \"orderly_retreat\"\n  *goto alpha\n*elseif battle_outcome > 4\n  *set outcome \"chaotic_retreat\"\n  *goto alpha\n*else\n  *set outcome \"rout\"\n  *goto alpha\n*label alpha\nSeptember 3rd, 1861\n*line_break\n09:30\n\nThe sky is a bright blue, with glorious puffs of white cloud cascading lazily across it.  The sound of an unknown bird chirruping brings an absent smile to your lips.  This sound is followed instantly by the crack of bat on ball and the roar of a dozen onlookers.  Your eyes flit back down to the baseball game and see the runner rounding first base.  Two of the outfielders are going for the ball as it rolls toward the wooden wall of the stockade.  A Confederate guard in a tower yells something indistinct at the outfielders, pointing at the ball.  \n\n\"Major $!{surname}!\"  Glancing around at the sound of your name, you see Colonel Willcox walking toward you.  His right arm is still in a sling, but in his left is a handful of papers.  It might be mail from home!\n\n\"Do not get up, at ease,\" says Willcox.  \"The surgeons may say what they like about being out of danger, but I say that you require rest, and I am your commanding officer.  Sit down.\"\n*fake_choice\n  #\"You are up and walking, Sir.  Your arm does not appear to be fully recovered, either.\"  \n    \"Bah, it is just an arm.  Walking to get the post will have no ill effect on an arm.\"  \n  #\"I want to get into the game.  I grow tired of spectating.\"  \n    \"Ha, do not waste your breath.  I will not allow it for a long time, yet.\"  \n  #\"Is there any mail for me, Sir?\"  \n    \"Indeed, there is another letter here from your father.  But first, look at this.\"\nColonel Willcox holds out a folded newspaper.  \"Finally, a Union newspaper.  They talk about the battle.  I hope they get some of the details correct, this time.  If they write that I was killed again, I shall be quite irritated.\"  \n*fake_choice\n  #Read the newspaper.\n[i]August 14th, 1861[/i]\n\n[b][i]WAR NEWS[/i][/b]\n*line_break\n————\n*line_break\n[b][i]THE BATTLE AT BULL'S RUN[/i][/b]\n*line_break\n————\n*line_break\n[b][i]Latest Particulars[/i][/b]\n*line_break\n————\n*line_break\n[b][i]AN EXCITING SCENE[/i][/b]\n*line_break\n————\n*line_break\n*if outcome = \"stalemate\"\n  [b][i]NEITHER ARMY VICTORIOUS[/i][/b]\n  *achieve stalemate\n  *achieve orderly_retreat\n  *goto charlie\n*if outcome = \"orderly_retreat\"\n  [b][i]FEDERAL ARMY RETREATS TO WASHINGTON[/i][/b]\n  *achieve orderly_retreat\n  *goto charlie\n*else\n  [b][i]DEFEAT OF THE FEDERAL ARMY[/i][/b]\n  *goto charlie\n*label charlie\n*line_break\n————\n*line_break\n[b][i]GREAT SLAUGHTER ON BOTH SIDES[/i][/b]\n*line_break\n————\n*line_break\n[b][i]Army of the Potomac to be Reorganized[/i][/b]\n\nYou skim the fanciful rhetoric of the battle.  It is not all that similar to the true events, the writer preferring his own imagination of what a battle might look like.  There is a sub heading that catches your eye, however:\n\n*if outcome = \"stalemate\"\n  [b][i]\"An Unclear Result - Both Armies leave battlefield in Order.[/i][/b]\n\n  [i]\"All our military operations went swimmingly on.  The enemy were seemingly in retreat when many more formidable forces appeared to distress the Federal Army.  After a fierce battle with many dead, wounded, and missing, both armies allowed night to fall without a clear victor.  The Federal Army then withdrew to Washington where many enlistments were ended.\"[/i]\n*if outcome = \"orderly_retreat\"\n  [b][i]\"An Orderly Retreat - Officers control frightened Soldiers[/i][/b]\n\n  [i]\"All our military operations went swimmingly on.  The enemy were seemingly in retreat when many more formidable forces appeared to distress the Federal Army.  Rearguard stood bravely for hours while commanders withdrew troops and baggage train.  A full panic was narrowly avoided, but victory was unable to be grasped.\"[/i]\n*if outcome = \"chaotic_retreat\"\n  [b][i]\"A Great Retreat - Teamsters, Civilians, and Soldiers frightened.[/i][/b]\n\n  [i]\"All our military operations went swimmingly on.  The enemy were seemingly in retreat when a terrific consternation broke out among the troops.  Our whole army was in retreat.  Many baggage trains were emptied and their horses galloped across the open fields.  For a time, a perfect panic prevailed, but the officers brought their soldiers in control before reaching Centreville.\"[/i]\n*if outcome = \"rout\"\n  [b][i]\"A Great Stampede - Teamsters, Civilians, and Soldiers frightened.[/i][/b]\n\n  [i]\"All our military operations went swimmingly on.  The enemy were seemingly in retreat when a terrific consternation broke out among the troops.  Our whole army was in retreat.  Many baggage trains were emptied and their horses galloped across the open fields.  For a time, a perfect panic prevailed.  Wounded soldiers cried on the roadside for assistance, but the alarm was so great that many were passed by.\"[/i]\n*fake_choice\n  #Continue reading.\nYour eyes flit to the next column where you see another subtitle:\n\n[b][i]\"LATER DETAILS[/i][/b]\n*line_break\n————\n*line_break\n[b][i]By Last Night's Washington Train[/i][/b]\n*line_break\n————\n*line_break\n[b][i]The Killed and Wounded &c.\"[/i][/b]\n\n[i]Col. Slocum of the Second Rhode Island is not killed, as at first reported…[/i]\n*line_break\n[i]The death of Colonel Cameron, of the New York Highlanders, is confirmed…[/i]\n*line_break\n[i]Colonel Farnham, of the 11th New York, received a severe head wound and is despaired of…[/i]\n*line_break\n[i]Col. Hunter was wounded twice but the wounds are believed to be minor and a full recovery is expected…[/i]\n*line_break\n[i]Colonel Heintzelman was struck in the elbow but remained in the saddle all the way back to Washington.  [/i]\n*line_break\n[i]Colonel O. Willcox was wounded in the arm and captured during a noble & brave charge.  He is believed to be alive and well treated by enemy officers.  [/i]\n*fake_choice\n  #\"Well, Colonel, looks like you survived this time.\"\n    \"Hmph, damned fool reporters.\"  \n  #\"Well treated?  What do you say to that, Sir?\"\n    \"Ha!  If they could see how little we eat, they might see it different.\"  \n\nYou flip through the pages for a few minutes until you find some detailed casualty reports.  \n\n[b][i]1st $!{state} Regiment Vol's[/i][/b]\n\n[b][i]Officers:[/i][/b]\n\n*if i_company_commander = \"1st Lt. John Hatcher\"\n  *set trigger0 \"yes\"\n*if lt_killed_trigger = \"yes\"\n  *set trigger0 \"yes\"\n*if lt_killed_trigger2 = \"yes\"\n  *set trigger0 \"yes\"\n*if lt_killed_trigger3 = \"yes\"\n  *set trigger0 \"yes\"\n*if trigger0 = \"yes\"\n  [i]Died:[/i]\n  *line_break\n*if i_company_commander = \"1st Lt. John Hatcher\"\n  [i]Capt. Daniel Hubbard, Commanding I Company.[/i]\n  *line_break\n*if i_company_commander = \"2nd Lt. Raymond Dobbins\"\n  [i]Capt. Daniel Hubbard, Commanding I Company.[/i]\n  *line_break\n*if lt_killed_trigger2 = \"yes\"\n  [i]1st Lt. Alvin Buse, F Company.[/i]\n  *line_break\n*if lt_killed_trigger3 = \"yes\"\n  [i]1st Lt. John Hatcher, I Company.[/i]\n  *line_break\n*if lt_killed_trigger = \"yes\"\n  [i]2nd Lt. Seth Johnston, C Company.[/i]\n\n[i]Wounded & Captured:[/i]\n*line_break\n[i]Major $!{first_name} $!{surname}, Commanding Regiment.[/i]\n*line_break\n*if c_company_commander = \"1st Lt. Michael German\"\n  [i]Capt. Ebenezer Butterworth, Commanding C Company.[/i]\n  *line_break\n*if e_company_commander = \"Vacant\"\n  [i]Capt. Wayne Roth, Commanding E Company.[/i]\n  *line_break\n*if k_company_commander = \"Vacant\"\n  [i]Capt. William Graves, Commanding K Company.[/i]\n  *line_break\n*if lt_wounded_trigger2 = \"yes\"\n  [i]2nd Lt. Russell Byron, E Company.[/i]\n\n*if first_battalion_commander = \"Vacant\"\n  *set trigger2 \"yes\"\n*if lt_wounded_trigger = \"yes\"\n  *set trigger2 \"yes\"\n*if trigger2 = \"yes\"\n  [i]Wounded:[/i]\n  *line_break\n*if first_battalion_commander = \"Vacant\"\n  [i]Capt. Charles Lum, Commanding First Battalion.[/i]\n  *line_break\n*if lt_wounded_trigger = \"yes\"\n  [i]1st Lt. Alfred Carpenter, H Company.[/i]\n  *line_break\n  [i]2nd Lt. Francis Conway, A Company.[/i]\n\n[i]Captured:[/i]\n*line_break\n[i]Capt. William Withington, Commanding Second Battalion.[/i]\n\n[b][i]Enlisted men killed, wounded, &c:[/i][/b]\n\n*if regimental_strength > 740\n  [i]6 killed[/i]\n  *line_break\n  [i]19 wounded[/i]\n  *line_break\n  [i]13 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 730\n  [i]8 killed[/i]\n  *line_break\n  [i]24 wounded[/i]\n  *line_break\n  [i]17 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 720\n  [i]11 killed[/i]\n  *line_break\n  [i]29 wounded[/i]\n  *line_break\n  [i]19 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 710\n  [i]12 killed[/i]\n  *line_break\n  [i]35 wounded[/i]\n  *line_break\n  [i]24 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 700\n  [i]14 killed[/i]\n  *line_break\n  [i]39 wounded[/i]\n  *line_break\n  [i]27 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 690\n  [i]14 killed[/i]\n  *line_break\n  [i]45 wounded[/i]\n  *line_break\n  [i]31 missing[/i]\n  *achieve careful\n  *goto bravo\n*elseif regimental_strength > 680\n  [i]16 killed[/i]\n  *line_break\n  [i]49 wounded[/i]\n  *line_break\n  [i]34 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 670\n  [i]17 killed[/i]\n  *line_break\n  [i]56 wounded[/i]\n  *line_break\n  [i]35 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 660\n  [i]19 killed[/i]\n  *line_break\n  [i]62 wounded[/i]\n  *line_break\n  [i]38 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 650\n  [i]22 killed[/i]\n  *line_break\n  [i]66 wounded[/i]\n  *line_break\n  [i]40 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 640\n  [i]24 killed[/i]\n  *line_break\n  [i]71 wounded[/i]\n  *line_break\n  [i]44 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 630\n  [i]25 killed[/i]\n  *line_break\n  [i]77 wounded[/i]\n  *line_break\n  [i]46 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 620\n  [i]27 killed[/i]\n  *line_break\n  [i]81 wounded[/i]\n  *line_break\n  [i]48 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 610\n  [i]30 killed[/i]\n  *line_break\n  [i]88 wounded[/i]\n  *line_break\n  [i]51 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 600\n  [i]32 killed[/i]\n  *line_break\n  [i]93 wounded[/i]\n  *line_break\n  [i]55 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 590\n  [i]32 killed[/i]\n  *line_break\n  [i]99 wounded[/i]\n  *line_break\n  [i]59 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 580\n  [i]33 killed[/i]\n  *line_break\n  [i]104 wounded[/i]\n  *line_break\n  [i]64 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 570\n  [i]35 killed[/i]\n  *line_break\n  [i]108 wounded[/i]\n  *line_break\n  [i]68 missing[/i]\n  *goto bravo\n*elseif regimental_strength > 560\n  [i]37 killed[/i]\n  *line_break\n  [i]112 wounded[/i]\n  *line_break\n  [i]72 missing[/i]\n  *goto bravo\n*else\n  [i]38 killed[/i]\n  *line_break\n  [i]117 wounded[/i]\n  *line_break\n  [i]77 missing[/i]\n  *goto bravo\n*label bravo\n*page_break\n\"Major, look at this!\"  Willcox holds up a letter he was just reading.  \"It's from my friend Patterson who works for the war department.  He writes that we may expect to be exchanged any day now!  And this was written ten days ago.  Here, read this paragraph.\"\n\n[i]I am happy to inform you, also, that we received your recommendations with regard to the officers under your command.  Charles Lum was promoted to Lieutenant Colonel and is currently acting commander of the 1st $!{state} Infantry in accordance with your advice.  Your most ardent recommendation of Major $!{first_name} $!{surname} has not been overlooked, either.  As soon as he is exchanged, he may reasonably expect to be appointed Colonel and commander of the 1st $!{state} regiment.  [/i]\n\nLooking up, you let out an involuntary joyous bark of laughter.  Willcox beams back at you with a look of pride and exultation.  \"May I be the first to congratulate you on your coming promotion!  I am confident that the Army and the nation will benefit from their trust in your abilities.  Well done, $!{first_name}.\"  \n\nThe end.\n*achieve colonel\n*choice\n  #Historical notes.\n    *goto_scene historical_summary\n  #Done.\n    *goto_scene ending", "center": "*temp horse \"yes\"\n*temp bayonets \"no\"\n*temp pistol \"no\"\n*temp sword \"no\"\n*temp colonel \"alive\"\nThe regiment reaches the end of the tree cover, and they see the ridge and the battle right before them.  The files of men seem to shiver as they hesitate and lose step.  A messenger rides up at a gallop and reins in his horse to a rapid stop, \"General McDowell's compliments, Sir.  The general orders that this regiment be placed on the right flank of Franklin's Brigade, which is forming up here to the right of the road.\"  He points up ahead and to the right.  \n\n\"Acknowledged.  Compliments, and so forth,\" replies Willcox in a businesslike tone.  The man salutes and rides off as fast as he arrived.  \n*choice\n  #\"Regiment, right turn!  Follow the column!\"  \n    \"Right turn!  Right turn!\"  Your officers shout the order on down the ranks.  The front row makes the right turn, following Franklin's Brigade.  The men in the outer file take wide steps, while the innermost men march two paces in place before continuing.  It could almost be a parade ground if not for the screaming bullets overhead and the roar of cannons.  \n    \n    Your regiment advances into the grassy pasture south of the road, along the rear of Reynolds' artillery where the caissons and horse teams wait.  The gun teams are working furiously; shouting orders, loading, aiming, and firing.  You watch one shell fired at the ridge with shocking velocity.  Not a quarter second after the lanyard was pulled, it strikes the ground just short of the rebel line and explodes in a huge puff of smoke.  Hopefully these guns will be able to support your attack.  \n    \n    The regiment in front of you stops, turns to the left, and then marches forward into place in the battle line.  \n    *choice\n      #\"Forward, regiment!\"  \n        *image center1.png\n        *set map_trigger \"center1\"\n        Your men got jumbled up when the other regiment stopped, but they reform their ranks much quicker than you might have normally expected.  Apparently, the sight and sound of battle so close has shaken the men into something like seriousness.  The intervening distance to your place in the line is not far, but the march seems interminably long as you can almost feel the presence of rebel guns pointed your way.  \n        \n        \"Regiment, form line.  Dress left!\"  Colonel Willcox shouts the order.  According to protocol, he is in direct command of the regiment unless he delegates command to yourself.  \n        *fake_choice\n          #I am content in my role.\n          #I want to command my men.\n        The Colonel seems to be thinking about the same thing.  \"Major $!{surname}, take command of the right battalion for the time being.\"  \n        *fake_choice\n          #\"Yes Sir!\"\n          #\"Very well.\"\n        You ride to the right side of your line.  You know your regiment has 811 men: 780 enlisted and 31 officers.  Each battalion has about 400 men.  You will now command second battalion, consisting of Companies F through J.  Riding up to Captain Withington, you return his salute.  \"Sir,\" he says simply, more than ordinarily succinct.  \n        *fake_choice\n          #\"Willcox is commanding the Regiment.  I am taking command of Second Battalion.  You will return to your Company.\"  \n          #\"I am sorry, Captain, but I am taking direct command of the Battalion for a time.\"  \n        *set regimental_commander \"Col. Orlando Willcox\"\n        *set second_battalion_commander \"Maj. $!{first_name} $!{surname}\"\n        *set b_company_commander \"Capt. William Withington\"\n        Withington looks put out, but he nods ascent.  \"Yes, Sir.  Thank you.\"  \n        \n        \"Shall I take the horses, Major?\" asks your adjutant, Captain Bowles.  \n        *choice\n          #\"Very well, Captain.  We will be better off on foot.\"  \n            *set horse \"no\"\n            Dismounting, you hand the reins to your adjutant.\n            *goto alpha\n          #\"No, thank you, Captain.  I shall remain in the saddle.\"  \n            *goto alpha\n*label alpha\nYour men stand in fairly straight lines, four files deep, with muskets shouldered.  Many of them remove their haversacks and toss them back behind the line.  The company commanders and other officers stand in the rear, either stationary or pacing up and down the ranks. \n\nYou hear a bang from the rebel howitzers on the hill.  Almost simultaneously, you see two shells fly in your direction.  One hits off to the left, but the other explodes in front of your battalion.  You twitch reflexively, but take no injury.  You hear a horrible screaming just ahead from someone less lucky than yourself.  A man in the front row is on the ground, howling with pain.  Someone beside him drags him back behind the lines and lays him down near you.  The right side of his head seems peeled like a fruit, with his ear and much of the flesh hanging off.  It is a shrapnel wound.  You do not recognize the man in his current state, but he is the first casualty from your regiment.  \n*choice\n  #Detail two men to carry him to the field hospital.\n    *set second_battalion -3\n    *set regimental_strength -3\n    *set stretcher_detail \"yes\"\n    *goto bravo\n  #The wounded will lay on the field until we have time later.\n    *set second_battalion -1\n    *set regimental_strength -1\n    *goto bravo\n*label bravo\n\"Forward march at my command!\" shouts Colonel Willcox.  The men look around anxiously, shifting their stances.  \"Forward… march!\"  The bugle emphasizes the order and your hear yourself shouting the words in response.  \"Forward march!\"  \n\nForward marches the line, up the ridge and toward the enemy.  You see the rebels on the crest, standing in the open in neat, gray lines.  You squint your eyes against the sun as it glints off musket barrels.  The enemy line extends to the right of the farmhouse and straddles the road.  \n\nThe rebel line disappears in a wave of smoke as their volley explodes forth.  The musket balls tear up the road and several thump home into your men.\n*if horse = \"yes\"\n  Your horse screams and bucks you out of the saddle.  Your arms instinctively protect your head, but you hit the ground hard and feel pain jolt through your right arm and leg.  \"Sir, are you alright?!\" yells a Lieutenant, leaning over you.  \n  *choice\n    #\"I am fine.  Help me get up.\"\n      The Lieutenant helps you to your feet and dusts you off.  You are able to stand, although your body aches.  Looking to the horse, you see it writhing on the ground in agony.  Its neck is red with blood, and it seems unable to get to its feet.  You are on foot, now.\n      \n      *goto charlie\n    #\"Get back.  I am fine!\"\n      You are able to stand, although your body aches.  Looking to the horse, you see it writhing on the ground in agony.  Its neck is red with blood, and it seems unable to get to its feet.  You are on foot, now.\n      \n      *goto charlie\n*else\n  *goto charlie\n*label charlie\nAs the regiment marches forward, they leave a sad wake of half a dozen blue coats, laying wounded or dead in the trampled, bloody grass.  \"Steady, boys!\" shouts an officer on your left.  The enemy is getting closer, but they are still several hundreds yards away.  You can see them reloading their muskets through the dissipating smoke of their first volley.  \n\nThe Union artillery behind you thunders, and you see the rebel regiment in front of you struck by two shells.  One hits directly and a dozen men are blown to pieces in a shower of gore.  The rest of the rebel line quavers, but then they fill in the gap in the line and continue loading.  \n\nYou look to the left and see First Battalion of your own regiment.  On their left marches Franklin's entire brigade, with two regiments in front and one behind.  On your right, two regiments from Porter's Brigade are joined in the attack.  At least your flanks are secure.  \n\nThe enemy howitzers fire now, and you look left to see the damage.  The left flank of Franklin's Brigade is struck by two cannister shells.  The buckshot rounds cut red swathes in the line and the survivors trip on the bloody bodies that fall in their path.  It is several hundred yards away, and you cannot make out much in the way of detail, but you know that this attack is costing a great deal of Union strength.  \n*if surname = \"Spears\"\n  *image center2.1.png\n  *set map_trigger \"center2.1\"\n  *goto image2\n*if surname = \"Weber\"\n  *image center2.2.png\n  *set map_trigger \"center2.2\"\n  *goto image2\n*if surname = \"Clark\"\n  *image center2.3.png\n  *set map_trigger \"center2.3\"\n  *goto image2\n*if surname = \"Wilkerson\"\n  *image center2.4.png\n  *set map_trigger \"center2.4\"\n  *goto image2\n*if surname = \"Morse\"\n  *image center2.5.png\n  *set map_trigger \"center2.5\"\n  *goto image2\n*if surname = \"Dietrich\"\n  *image center2.6.png\n  *set map_trigger \"center2.6\"\n  *goto image2\n*if surname = \"Murphy\"\n  *image center2.7.png\n  *set map_trigger \"center2.7\"\n  *goto image2\n*if surname = \"Auclair\"\n  *image center2.8.png\n  *set map_trigger \"center2.8\"\n  *goto image2\n*else\n  *image center2.9.png\n  *set map_trigger \"center2.9\"\n  *goto image2\n*label image2\n*set first_battalion -2\n*set second_battalion -5\n*set regimental_strength -7\n*page_break\nThe swishing grass under your boots changes to packed dirt and gravel as you step out onto the road which runs diagonally across your march.  The rebels are clearly visible now as they raise their muskets for another volley.   They have the high ground and your men are exposed as they march.  \"Brace yourselves!\" you shout, just as the rebel volley pours forth.  A man just in front of you drops his musket and grabs his left arm with a cry of pain.  Blood appears through his fingers and he stumbles and falls to the ground.  \n\nPulling your eyes away and looking down the line of the battalion, you see more men falling out of the ranks, some writhing on the ground in agony.  You are marching straight into death with nothing but random, dumb chance to preserve your lives.  The rebels are now less than 200 yards ahead.  \n\nYou hear the familiar high shriek of the regimental bugle.  It calls a halt.  The line lurches to a stop, and a call comes down from the center.  \"Fire by battalion!\"  You now have direct control of the unit.  The men glance around anxiously, waiting for a command while the rebels reload their weapons.  \n*set first_battalion -3\n*set second_battalion -4\n*set regimental_strength -7\n*choice\n  #Volley fire.\n    \"Volley fire at my command!  Ready!\" you shout at the top of your lungs.  \"Aim!\"  The muskets come up, the stocks resting in each man's shoulder.  The men become almost completely still, trying to control their breathing and choosing their marks.  A short distance away, the rebel muskets come up, mirroring your own command.  \"Fire!\"  Your line erupts in the roar of 200 muskets fired in unison, and you feel the hair of your arms stand up.  The wall of smoke pours forward up the hill, obscuring your position.\n    *set fourth_alabama_morale -1\n    *set volleys +1\n    *choice\n      #\"Load!\"\n        The musket butts go down to the ground, and the line starts pulling out cartridges.  You hear the more distant roar of the rebel volley through the wall of smoke, and instantaneously, you feel the rush of wind by your face as a ball narrowly misses you.  Scanning down the line, you see a few men down, but most of them are ramming the ball and cartridge down the barrel.  \n        *set first_battalion -4\n        *set second_battalion -4\n        *set regimental_strength -8\n        *choice\n          #Maintain volley fire.\n            \"Ready!\"  A majority of muskets come up while the stragglers finish their loads.  You give them a few more seconds and most of them bring the weapons up.  \"Aim!\"  More muskets come up clumsily and the rows of metal barrels flicker in the sunlight.  \"Fire!\"  The wall of smoke pours out again, hiding the effect of the volley.  \n            *set volleys +1\n            *set fourth_alabama_morale -1\n            *choice\n              #\"Load!\"\n                The process of loading begins again.  You instinctively wipe the sweat off your brow with a sleeve, the salt stinging your right eye.  The rebels reply with another volley that brings down a few more soldiers.  \n                *set first_battalion -3\n                *set second_battalion -3\n                *set regimental_strength -6\n                *goto fix_bayonets\n              #\"Fix bayonets!\"\n                The men reach to their sides and up come the long saber bayonets, sliding over the end of the musket barrels and clicking securely into place.  The rebels reply with another volley that brings down a few more soldiers. \n                *set fix_bayonets +1\n                *set first_battalion -3\n                *set second_battalion -3\n                *set regimental_strength -6\n                *set bayonets \"yes\"\n                *goto fix_bayonets\n          #Fire at will.\n            More than half of your battalion is ready, and they fire a ragged half-volley, but the tail end of the volley dissipates into dozens of muskets in scattered individual fire.  You sacrifice some of the fear effect of the volley, but each man fires as quickly as he can load.  The rebels reply with another volley that brings down a few more soldiers. \n            *set fire_at_will +1\n            *set first_battalion -3\n            *set second_battalion -3\n            *set regimental_strength -6\n            *goto fix_bayonets\n      #\"Fix bayonets!\"\n        The musket butts go down to the ground, and the line starts pulling out bayonets.  You hear the more distant roar of the rebel volley through the wall of smoke, and instantaneously, you feel the rush of wind by your face as a ball narrowly misses you.  Scanning down the line with your eyes, you see a few men down, but most of them are locking the bayonets in place.  \n        *set fix_bayonets +1\n        *set first_battalion -4\n        *set second_battalion -4\n        *set regimental_strength -8\n        *set bayonets \"yes\"\n        *choice\n          #\"Load!\"\n            The men pull out their cartridges and begin the cumbersome process of reloading.  The smoke is dissipating enough now to see the rebel line as they reload their own muskets.  You sneeze ferociously from the smoke and the stirred up dust.  Your men are mostly finishing their reload as the rebel muskets come up.  There is no smoke to hide you this time.  The enemy position erupts with smoke and muzzle fire.  Half a dozen of your regiment go down while the rest finish complete their loads or step into empty files to replace wounded comrades.  \n            *set first_battalion -3\n            *set second_battalion -3\n            *set regimental_strength -6\n            *choice\n              #Volley fire.\n                \"Ready!  Aim!… Fire!\"  Your men return the volley, but the effect is obscured by the wall of smoke.  \n                *set volleys +1\n                *set fourth_alabama_morale -1\n                *goto fix_bayonets\n              #Fire at will.\n                More than half of your battalion is ready, and they fire a ragged half-volley, but the tail end of the volley dissipates into dozens of muskets in scattered individual fire.  You sacrifice some of the fear effect of the volley, but each man fires as quickly as he can load.  \n                *set fire_at_will +1\n                *goto fix_bayonets\n          #\"Forward!\"\n            The battalion glances around at the order.  \"Forward at quick time, march!\"  The unit is trained well enough for this simple order, at least, and they move together in one uniform line.  Officers push stragglers forward and you walk along behind them all.  First battalion stands behind you on the left, loading their muskets.  On your right, the two regiments of Porter's Brigade seem to be following your lead, though their lines are much less uniform than your own.   Now First Battalion is moving forward to keep up with you.  \n            \n            The rebel muskets come up and you feel your stomach clench painfully tight in anticipation.  The tearing sound of the volley makes you wince and you see a Lieutenant on your right drop to the ground as if he tripped on something.  He remains face down, sobbing and screaming with pain as you walk past him.  \n\n            The rebels are close now, their line as long as your own but only three files deep.  You can see them fixing bayonets in preparation for your attack.  It will be a bloody fight.  Off to the left, you hear a concerted shout.  Looking automatically, you see the leftmost Union regiment charging forward, sprinting toward the farmhouse and the fence.  Smoke emanates from the house as rebel muskets ply in and out of windows and loopholes cut for the purpose.  Looking forward, you are glad it is only a line of men before you, with no additional fortification.  Still, your leg muscles are starting to burn from the exercise of climbing the slope, and you can only imagine your men's exhaustion after they marched twelve miles to Sudley Ford on half rest.  \n            *set regimental_strength -7\n            *set first_battalion -4\n            *set second_battalion -3\n            *set lt_wounded_trigger \"yes\"\n            *set officers -1\n            *choice\n              #\"Charge bayonets!\"\n                The muskets come off your men's shoulders and are held at waist height, with the bayonets pointing forward like a row of pikes.  Scattered fire is peppering you from the enemy line.  They are firing at will, as fast as each man can load.  The enemy line is terrifyingly close, now, a mere twenty yards.  Their muskets bang distinctly in your ears as they fire point blank into your lines.\n                *set regimental_strength -2\n                *set first_battalion -1\n                *set second_battalion -1\n                *goto delta\n      #\"Lay down!\"\n        The men seem surprised by the order, but two thirds of them obey, going prone in the road or the grass.  You hear the more distant roar of the rebel volley through the wall of smoke, and instantaneously, you feel the rush of wind by your face as a ball narrowly misses you.  Scanning down the line with your eyes, it is impossible to tell who is hit and who is just laying down.  \n        *set first_battalion -4\n        *set second_battalion -1\n        *set regimental_strength -5\n        *choice\n          #\"Stand up and load!\"\n            The men rise unsteadily to their feet and start to reload their muskets.  flecks of grass or pebbles drop from their uniforms as they go through the motions of loading.  Off to your left, First battalion fires another volley, having stood and absorbed the enemy fire.  \n            \n            Your men are ramming the balls down the barrel and bringing the weapons up to place the firing caps as the rebel muskets come up.  You see their officer's sword in the air behind the line and you feel a sudden intense urge to interrupt him somehow.  You must stop that murdering arm from coming down, but you cannot.  You feel utterly helpless as the volley pours out and plucks at your line with deadly velocity.  \n            *set first_battalion -4\n            *set second_battalion -2\n            *set regimental_strength -6\n            *choice\n              #Maintain volley fire.\n                \"Ready!\"  A majority of muskets come up while the stragglers finish their loads.  You give them a few more seconds and most of them bring the weapons up.  \"Aim!\"  More muskets come up clumsily and the rows of metal barrels flicker in the sunlight.  \"Fire!\"  The wall of smoke pours out again, hiding the effect of the volley.  \n                *set volleys +1\n                *set fourth_alabama_morale -1\n                *goto fix_bayonets\n              #Fire at will.\n                More than half of your battalion is ready, and they fire a ragged half-volley, but the tail end of the volley dissipates into dozens of muskets in scattered individual fire.  You sacrifice some of the fear effect of the volley, but each man fires as quickly as he can load.  \n                *set fire_at_will +1\n                *goto fix_bayonets\n*label fix_bayonets\nPiercing through the noise comes the sharp cry of the bugle.  \n*if bayonets = \"yes\"\n  It is an order to fix bayonets, which you have already carried out independently.  \n  *goto foxtrot\n*else\n  \"Fix bayonets!\" you yell, confirming the order from Willcox.  The long saber bayonets glitter in the sun as they are fixed over the barrels of 400 muskets, locked in place by a small mechanism built into the barrel of each.  \n  *set fix_bayonets +1\n  *goto foxtrot\n*label foxtrot\n\nYou hear Willcox's shouting voice in a brief lull, \"Regiment, Forward at quick time, march!\"  The bugle call repeats this order.  The whole regiment moves forward at essentially a walking pace, muskets shouldered.  As they leave the position they were just in, you see a sad row of more than a dozen bodies laying in the grass, still in their lines.  \n\nPeering around the field, you see Porter's two regiments advancing on your right flank, though somewhat behind you and in ragged lines.  The baggy, red pants of the fire Zouaves stand out like a sore thumb as they march up the slope.  \n\nThe rebel muskets come up and you feel your stomach clench painfully tight in anticipation.  The tearing sound of the volley makes you wince and you see a Lieutenant on your right drop to the ground as if he tripped on something.  He remains face down, sobbing and gasping with pain as you walk past him.  \n*set regimental_strength -4\n*set first_battalion -2\n*set second_battalion -2\n*set officers -1\n*set lt_wounded_trigger \"yes\"\n\nThe rebels are close now, their line as long as your own but only three files deep.  You can see them fixing bayonets in preparation for your attack.  It will be a bloody fight.  Off to the left, you hear a concerted shout.  Looking automatically, you see the leftmost Union regiment charging forward, sprinting toward the farmhouse and the fence.  Smoke emanates from the house as rebel muskets ply in and out of windows and loopholes cut for the purpose.  Looking forward, you are glad it is only a line of men before you, with no additional fortification.  Still, your leg muscles are starting to burn from the exercise of climbing the slope, and you can only imagine your men's exhaustion after they marched twelve miles to Sudley Ford on half rest.  \n*choice\n  #\"Charge bayonets!\"\n    The muskets come off your men's shoulders and are held at waist height, with the bayonets pointing forward like a row of pikes.  Scattered fire is peppering you from the enemy line.  They are firing at will, as fast as each man can load.  The enemy line is terrifyingly close, now, a mere twenty yards.  Their muskets bang distinctly in your ears as they fire point blank into your lines.\n    *set regimental_strength -2\n    *set first_battalion -1\n    *set second_battalion -1\n    \n    \"Ready, boys!\" screams Colonel Willcox off to your left.  \"Ready!\" you repeat as loudly as your lungs will allow, blinking the sweat out of your eyes.  \"Charge!\"  The bugle sounds the order, and the whole regiment roars with one unified voice as it charges.  It is a battle cry that must have graced a thousand battlefields, from antiquity to the middle ages to now.  Nearly 800 men sprinting en masse with fury in their eyes and sharp steel pointed forward.  \n    *label delta\n    *choice\n      #Draw my sword.\n        *set sword \"yes\"\n        *goto echo\n      #Sword in one hand, pistol in the other.\n        *set sword \"yes\"\n        *set pistol \"yes\"\n        *goto echo\n      #Ready my pistol.\n        *set pistol \"yes\"\n        *goto echo\n\n*label echo\nThe blue lines smash into the gray ones with a force like a locomotive.  Cries of pain and fear mingle with the shouts of intense fury as the two sides lunge and stab at one another.  In front of you, you watch as one of your men lunges at a Confederate officer who takes the bayonet in his belly.  The bluecoat 'develops' the strike with a twist of the bayonet that doubles up his victim, then yanks it out with unbalanced force.  The officer drops his pistol and crumples to the ground with dark red blood staining his fine, gray coat.  Another Union soldier tries to lunge, but his rebel target drops him with a point blank musket shot.  \n*set regimental_strength -7\n*set first_battalion -4\n*set second_battalion -3\n\n*choice\n  *if pistol = \"yes\"\n    #Try to get a shot with your pistol.  \n      Getting in close, you smell the pungent stench of sweat and filth from a long, hot march.  Raising your left arm, you aim between two files of your men.  A young rebel is looking off to his left, trying to parry a Yankee bayonet.  You fire and see his handsome jaw explode with gore.  he falls backward and knocks over another man, but is instantly replaced by an old graybeard in a tan coat.  Cocking the pistol, you fire again, this time winging the man's shoulder.  He twitches with pain, but lunges anyway and nicks somebody in the front row.  You fire again as he tries to block a stab and he falls away from the line with no visible wound.  \n      *set regimental_strength -1\n      *set second_battalion -1\n      *goto juliet\n  *if sword = \"yes\"\n    #Wade in and get your sword bloody.  \n      You push forward, trying to squeeze between the tight packed ranks of your own men.  You smell the pungent stench of sweat and filth from a long, hot march.  A Union soldier in the front row raises his musket for an overhand stab, and he hits you hard in the cheek bone with the butt of the weapon as he starts his lunge.  You feel slightly dizzy from the hard hit, but you are held upright by the tight-packed ranks of men long enough to recover.  Pushing ahead, you reach the front line and see two men directly before you.  On the right is a young rebel, barely an adult.  On the left is a bulky, middle aged man with a long brown beard.  \n      *choice\n        #Attack the man on the right.\n          The young man raises his musket to parry a Union bayonet lunge, and your sword blade sweeps down on his shoulder with a splitting force.  You feel the wet smack of blade on flesh, followed by the grind of bone as you drag the red blade free with a swift jerking motion.  The left man stabs at you with his bayonet, and you instinctively grab the blade to push it aside.  It misses your abdomen but stabs into your coat, catching in the fabric.  You feel yourself pulled forward as he tries to free the bayonet.  \n          \n          Releasing the blade with your hand, you grab the muzzle of the rifle and then lunge with the sword.  He drops his weapon to evade your strike, but there is a man right behind him that hinders his retreat.  The point of your saber rams home in his throat and he grabs the blade with both hands in instinctive terror.  Pulling it free, you see the spurt of blood and two fingers flying off.  The musket falls out of your coat and you back up in shock at the sheer violence.  Your left hand has four stinging red lines on the fingers from grabbing the bayonet, but no more.  \n          *goto juliet\n        #Attack the man on the left.  \n          You
