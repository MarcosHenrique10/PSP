<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scarlet Sails — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "scarletsails", "title": "Scarlet Sails", "scenes": {"choicescript_description": "Hoist the Jolly Roger and set sail to find the legendary Titan’s Treasure! Do you fight with a cutlass or with magic? Are you biding your time until you can shoot your captain in the back, or are you the reason the rum is gone?\n\n[i]Scarlet Sails[/i] is an 80,000-word interactive novel by Felicity Banks, author of [i]Attack of the Clockwork Army[/i] and [i]Bali B & B[/i]. Your choices control the story. It's entirely text-based–without graphics or sound effects–and fueled by the vast, unstoppable power of your imagination.\n\n• Enjoy an adventure on the high seas.\n• Choose your personality, fighting style, and magical skill.\n• Play as male or female or nonbinary; gay, straight, or asexual.\n• Choose who to love, including options for singlehood or polyamory.\n• Face the horrors of your past—and of the deep.\n• Find treasure, treachery, and maybe even true love.\n", "choicescript_stats": "*comment Scarlet Sails\n\n\nName: $!{name}\n\nMagical Skill: $!{magic}\n\n[i]Click \"Next\" for a reminder of the magic system.[/i]\n\nRank: $!{rank}\n\n*stat_chart\n\ttext ships_in_fleet Number of Ships in Fleet\n\topposed_pair morality\n\t\tMorality\n\t\tMalevolence\n[i]The value you place on human life.[/i]\n*stat_chart\n\topposed_pair truthfulness\n\t\tTruthfulness\n\t\tTreachery\n[i]Your level of deceitfulness.[/i]\n*stat_chart\n\topposed_pair skepticism\n\t\tSkepticism\n\t\tSweetness\n[i]Whether you believe in the goodness of others.[/i]\n*stat_chart\n\topposed_pair sober\n\t\tSober\n\t\tSozzled\n[i]Your ability to handle strong liquor and/or become an alcoholic.[/i]\n\t\t\n*stat_chart\n\tpercent swordfighting Swordfighting\n\tpercent brawling Brawling\n\tpercent gun_fu Gun Fu\n\tpercent magical_skill Magical Skill\n*line_break\nRapport:\n*stat_chart\n\tpercent captain_blood Captain Blood\n\tpercent truman Truman\n\tpercent firebird Firebird\n\tpercent jalu Jalu\n*line_break\n*stat_chart\n\ttext gold Gold\n\tpercent filth Filth\n\tpercent health Personal Health\n\n\n\n*stat_chart\n\tpercent killed Likelihood of Getting Killed in Your Sleep\n\n*page_break\n\n[b]Magic[/b]\n\nOne in three people are born with one of the following skills: \n\nFeelsmith (can read or alter emotions using touch but can’t alter themselves).\n\nHealsmith (can create or heal physical ailments using touch but can’t heal themselves).\n\nQuickensmith (can alter physical objects using touch but can’t alter humans). \n\nThose born with a reasonable amount of magical ability are branded with the first letter of their primary skill, which is both a warning to others and an advertisement of their usefulness.\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2025-05-08 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.", "coda": "*page_break Which Historical Pirate Are You?\n*if (morality \u003c 30) and (gun_fu > 25)\n\t*set blackbeard 1\n*if (victim > 1) and (brawling >25)\n\t*set annebonny 1\n*if (skepticism \u003c 50) and (swordfighting > 25)\n\t*set maryread 1\n*if (sober >55) and (gold > 500)\n\t*set roberts 1\n*label ok\nBased on your statistics, you resemble the real historical pirate\n*choice\n\t*selectable_if (blackbeard = 1) #Blackbeard.\n\t\t*achieve blackbeard\n\t\tThey say the devil himself rode on Blackbeard's ship…\n\t\t\n\t\t*page_break\n\t\tEdmund Teach was a famously terrifying pirate, with a gift for showmanship augmented by the mighty beard that gave him his nickname. Although he was sometimes generous and charming, he preferred to be frightening. He was famous for his drinking, cursing, and violence.\n\t\t\n\t\tOn one occasion, he was sitting at a table at night with the pilot and two crewmen and decided to have some fun. He took both his pistols and cocked them under the table. One of the crewmen noticed and quietly left the room. Blackbeard blew out the candle, crossed his hands, and shot at the other two men. One shot missed, and the pilot was unharmed. The other man, Israel Hands, was kneecapped by the shot and permanently disabled.\n\t\t\n\t\tLater, when Blackbeard was asked why he'd shot at his own crew, he said, \"If I did not now and then kill one of you, you would forget who I am.\"\n\t\t\n\t\tHe was finally killed in a battle so intense that the sea around the ship was stained red. Blackbeard took five musket balls and twenty sword wounds before dying—as he cocked his own pistol for one last shot.\n\t\t\n\t\tThe lieutenant in charge of the action that finally ended Blackbeard's reign of terror decapitated the pirate's corpse and hung the head from the front of the bowsprit.\n\n\t\tPerhaps if Blackbeard had lived long enough, he would have grown bored of villainy and found happiness in the arms of a Gentleman Pirate with adorable curly hair.\n\t\t*goto ending\n\t*selectable_if (annebonny = 1) #Anne Bonny.\n\t\t*achieve annebonny\n\t\tAnne Bonny was disguised as a boy when she was young in order to hide the fact that she was illegitimate and raised by her father. Someone questioned the child and discovered her secret, causing social and financial chaos. Anne Bonny's male disguise never failed her again. \n\t\t\n\t\tWhen she was a young woman, she was known for her violent temper. It served her well when a man paid her unwelcome attention. She beat him up, and he spent a considerable amount of time reconsidering his life choices while laid up in bed.\n\t\t\n\t\tAnne Bonny's father was quite wealthy, and she was expected to marry well and live comfortably. Instead, she married a poor sailor. Her father immediately disinherited her, and she and her husband had to move elsewhere in order to make a living. History doesn't record whether the sailor loved Anne Bonny or the chance at making a fortune, but the relationship certainly didn't end well.\n\t\t\n\t\tNot far into her marriage, Anne Bonny met the pirate Captain Rackham and left her husband to become a pirate herself, disguised as a man. History doesn't record whether Anne Bonny loved Captain Rackham or the chance at making a fortune, but the relationship certainly didn't end well.\n\t\t\n\t\tWhile sailing with Rackham (pausing on occasion to have at least two children), Anne Bonny found herself attracted to another crew member and attempted to seduce him. \"He\" was another woman in disguise: the pirate Mary Read. The two became extremely close—so close that Rackham became murderously jealous and would have killed Mary Read if Bonny hadn't revealed that Read was also a woman.\n\t\t\n\t\tAlthough this mollified Rackham (who was apparently of the historically popular \"there's no such thing as a lesbian\" school of thought), the 1724 book [i]A General History of the Robberies & Murders of the Most Notorious Pirates[/i] hints strongly that Anne Bonny was either bisexual or a lesbian, saying she was \"not altogether…reserved in point of chastity\" and fell in love with Mary Read (rather than one of the actual men on board) \"for some reasons best known to herself\". Although Mary Read considered herself entirely faithful to her husband, female sexual relationships were perceived differently in the 1700s, and a modern woman might consider their very close \"sentimental friendship\" as an active sexual romance, even if they themselves did not (due to a different concept of what \"sex\" meant). \n\t\t\n\t\tWhen their ship was desperately outnumbered, and Anne Bonny knew as well as anyone that her piratical career was about to end, she was one of only three pirates still on deck fighting against the overwhelming odds. Her courage and skill weren't enough to defend the ship with only two others, so she was taken to trial and, along with most of the crew, sentenced to hang.\n\t\t\n\t\tAt that point, she revealed that she was pregnant. Her unborn child saved her life. \n\t\t\n\t\tShe gave birth in prison, and was reprieved several more times. Since the king periodically issued pardons for pirates and let them switch to privateers (which they tended to do for a while and then turn pirate again until the next chance for a pardon), I choose to believe that she was eventually released—only to continue her piratical ways.\n\t\t\n\t\tThe day Captain Rackham was executed, she was permitted to see him. Her version of wifely comfort was to tell him, \"If you'd fought like a man, you needn't have been hung like a dog.\"\n\t\t*goto ending\n\t*selectable_if (maryread = 1) #Mary Read.\n\t\t*achieve maryread\n\t\tMary Read's mother, a widow, disguised Read as a boy during childhood in order to hide her illegitimacy and therefore gain a living from her mother-in-law. In time, the mother-in-law died, and as a result, thirteen-year old Mary was sent to work as a footman. She didn't much like it and soon ran away to sea and then the army.\n\t\t\n\t\tAlthough she was well known for her courage and fighting skills, she was still poor and therefore unable to advance in the ranks. She fell in love with another soldier and soon revealed herself by \"accidentally\" flashing her breasts. He was terribly pleased to have a secret girlfriend hidden in plain sight, but she refused to be intimate without marriage. Eventually, they saved enough money to buy her some female clothes and get married. \n\t\t\n\t\tThe story was a romantic one, and Mary Read was well respected as a trooper. Their soldier friends took up a collection as a wedding gift. With that money, they started a restaurant and would have lived peacefully, except that Read's husband died very soon afterwards. Once again, Read found herself needing to dress as a man in order to support herself. She took ship for the West Indies and was captured by pirates along the way. They forced her to remain on board and join their crew.\n\t\t\n\t\tAlthough she hated pirates, her courage and skill made her a natural fighter. Her reputation only grew when she was insulted, because she fought and won several duels. She fell in love again, this time with a man who had also been captured and forced to join the crew. The pair considered themselves to be married as fully as if they'd been able to formalize their union. At one stage, he was committed to a duel and she knew he was unlikely to survive, so she set up her own duel with his opponent two hours earlier. She risked her own life for his and killed the man who would have killed her husband.\n\t\t\n\t\tWhen Anne Bonny attempted to start a relationship with her, Mary Read revealed her secret and the two disguised women became very close. \n\t\t\n\t\tWhen their ship was desperately outnumbered in battle and the entire crew knew they were likely to face trial, only three of the pirates remained on deck fighting. Of those three, only one was a man. The others were Anne Bonny and Mary Read. Despite their efforts,the ship was captured and Mary Read was one of the pirates sentenced to hang.\n\t\t\n\t\tAt that point, she revealed that she was pregnant. Anne Bonny was also pregnant, so both women were reprieved. History doesn't reveal the crew's reaction when they discovered that out of the three bravest men on board, two were pregnant women.\n\t\t\n\t\tMary Read applauded the court's justice, agreeing that she deserved to hang and that one of the men released was her husband, an innocent man. She kept his identity secret and loved him faithfully until the end. Ultimately, she died of natural causes.\n\t\t*goto ending\n\t*selectable_if (roberts = 1) #Captain Roberts.\n\t\t*achieve roberts\n\t\tCaptain Roberts was a Second Mate in the navy when he was taken by pirates. Although he hated the profession, he was quickly won over by his disdain for the proper authorities and his ability to gain rank as a pirate. He was fond of the written word, and on at least one occasion issued receipts when he sold people their own stolen ships. His rules for the men on board included:\n\t\t\n\t\t[i] The Musicians to have Rest on the Sabbath Day, but the other six Days & Nights, none without special Favour.[/i]\n\t\t\n\t\t[i] To Keep their Piece, Pistol & Cutlass clean & fit for Service.[/i]\n\t\t\n\t\t[i] The Lights & Candles to be put out at eight o'Clock at Night. If any of the Crew, after that Hour, still remained inclined for Drinking, they were to do it on the open Deck.[/i]\n\t\t\n\t\tThe first two rules were very successful; the third was designed to curb drunkenness and failed utterly. Because pirates.\n\t\t\n\t\tOn the day of his final battle, he was described as \"a gallant figure\", wearing a red damask waistcoat and breeches, a scarlet feather in his hat, and a gold necklace with a diamond cross. He was killed when he was hit in the throat with grape-shot.\n\t\t*goto ending\n\t#Captain Charles Johnson.\n\t\t*achieve johnson\n\t\tCaptain Charles Johnson is a mysterious, eloquent and compelling figure. He/She/They (your own chosen pronoun will be used from now on) wrote the 1724 bestseller [i]A General History of the Robberies and Murders of the Most Notorious Pirates[/i], and ${his} true identity remains shrouded in mystery to this day despite the fact that ${he} wrote a thrilling non-fiction book that is in print two centuries later.\n\t\t\n\t\tThere are several theories about the true identity of Captain Charles Johnson. During one fifty-year period, it was generally believed that the name was a pseudonym for Daniel Defoe, since the pair have a similar writing style. When that theory was debunked, it left a tantalizing mystery. \n\t\t\n\t\tIt is clear from the book that the writer is an experienced sailor, yet no records exist of a Captain Charles Johnson (military or otherwise) that would fit the little that is known about the writer. Virtually every detail in the book has been independently confirmed elsewhere, and the sheer amount of minutiae is astounding. It is clear that the writer was an eyewitness to at least some of the events ${he} wrote about.\n\n\t\tThe most plausible theory is that Captain Johnson was a not-entirely-reformed pirate who loved retelling a good story. \n\t\t\n\t\tBased on the very personal details of Anne Bonny's story in Captain Johnson's book combined with a sudden vagueness about her ultimate fate, I like to think that Captain Charles Johnson might have been the pirate Anne Bonny. \n\t\t\n\t\tWe'll never know for sure.\n\t\t*goto ending\n\t#History? No thanks, I'm far too piratical for anything that smells like education. \n\t\tEven if there's sex and violence and cross-dressing?\n\t\t*choice\n\t\t\t#Even if there's sex and violence and cross-dressing.\n\t\t\t\tOkay then.\n\t\t\t\t\n\t\t\t\t*goto ending\n\t\t\t#I suppose pirate history might be interesting.\n\t\t\t\t*goto ok\n\n*label ending\n*page_break SERIOUSLY THE END THIS TIME\nWe hope you've enjoyed playing [i]Scarlet Sails.[/i]\n\n*feedback\n\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "keelhauling": "*disable_reuse\n*if alreadyinchapterfour = 0\n\t*set alreadyinchapterfour 1\n\t*page_break\nYour stomach twists in fear, remembering all too well the day you saw a man keelhauled. He was torn to shreds as he drowned beneath a ship's barnacle-encrusted belly. By the time he was hauled back on board, both breath and blood had largely left his body. You untied the worn and bloody ropes from his corpse with trembling hands and helped tip his remains overboard. The clothes you wore that day never came clean, reminding you daily of the cost of disobedience.\n\nStarting to shake, you wonder if this will be your last time standing upright.\n*if jalu = 0\n\tPerhaps killing an innocent man was all in vain. You can still see his bloody fingerprints on the railing. He was no better than you, but he was no worse either. Just another pirate with barely a coin to their name, trying to live. Well, it's too late to bring him back now. Might as well be the best murdering scumbag you can be.\nDo you:\n*fake_choice\n\t#Attempt to escape using magic?\n\t\t*set magical_skill %+10\n\t\tYou try to focus your magic, but it's no use. You're being watched too closely.\n\t#Headbutt $!{blood_name} and dive overboard? \n\t\t*set brawling %+10\n\t\tYou struggle to attack her, but you're being held too firmly.\n\t#Plead for mercy? \n\t\t*set skepticism %-10\n\t\t\"Don't kill me, please!\" you say. No one is listening.\n\n\nUnable to disobey a direct order, Truman ties you up to be keelhauled. The only comfort he can give you is to use an excessive amount of rope, effectively cushioning most of your body. It's a kindness you hope you live long enough to repay someday, although ideally not in the same fashion. \n\nAt the same time, several others run a rope under the ship in preparation for dragging you along the same route. \n\nTied up and helpless, you have one more chance at survival.\nWhat do you do?\n*choice\n\t*selectable_if (smith = 3) #Use my quickensmith magic to smooth the underside of the ship so I'm bruised instead of cut open. \n\t\t*if  (magical_skill > 10)\n\t\t\t*set mc_saves_self 1\n\t\t\t*goto arg\n\t\t*else\n\t\t\t*goto arg\n\t*selectable_if (gold>0) #Offer the captain all of my money. \n\t\t\"Take my gold!\" you say. \"Everything I own. As a…gift, to show my respect.\"\n\n\t\t*if gold > 10\n\t\t\t*set gold 0\n\t\t\t\"It's true that gold heals all wounds,\" she says. \"And I'd hate to waste my time finding where you've stashed yours. I'll challenge you to a test, and if you pass, then we can save your keelhauling for after we find Jalu's island. If it's empty, we'll keelhaul you then.\"\n\t\t\t*goto_scene ss4b\n\t\t*else\n\t\t\t\"I'll take everything your own, certainly,\" she says. \"But ${gold} gold is not enough to save you.\"\n\t\t\t*set gold 0\n\t\t\t*goto arg\n\t#Tell $!{blood_name} that I know the general area of the treasure and can navigate the way there. \n\t\t\"I know where the treasure is,\" you yell. \"I recognize one of the islands.\"\n\n\t\t*if truthfulness >56\n\t\t\t\"It's true that gold heals all wounds,\" says $!{blood_name}. \"Or most, in any case. I've never known you to lie, so I'll challenge you to a test. If you pass, then we can save your keelhauling for after we find Jalu's island. If it's empty, we'll keelhaul you then.\"\n\t\t\t*goto_scene ss4b\n\t\t*else\n\t\t\t$!{blood_name} shrugs. \"I think we both know your word can't be trusted.\"\n*label arg\n*set keelhaul 1\n\n$!{blood_name} does the honors herself, lifting you easily and rolling your trussed-up body over the railing. Your arms are pinned to your sides, so you can't even cover your head. Instead, you plunge awkwardly into the water. Before you can struggle back for one last breath, the bindings around you are hauled with the strength of ten pirates, and you are dragged under the vast bulk of the ship.\n\nYour best hope for survival is to stay still, hastening your short journey from one side of the ship to the other—but it's impossible. Everything in you screams that you have to fight, so your legs kick wildly, banging your knee against the implacable strength of the ship. You're dimly aware of your skin being flayed and salted in a hundred places as every knife-edged barnacle and crusted growth on the ship's underbelly cuts into you. There is nothing but blood and darkness and the tugging around your torso. Perhaps it is a mercy that your arms are bound to your body, but it makes you as helpless as a swaddled baby, even as the breath is knocked out of you and you want to scream for lack of air.\n\nThen you're flying, scattering blood and seawater, and there's one last concussive crash of your skull against the railing before you land on the deck. It is not a soft landing, but you're able to sob in a breath—and for a moment, that is all that matters.\n\nAlthough you’re beaten, bruised, terrified beyond words, and half-drowned, you're alive. \n*if mc_saves_self=1\n\tYour magic was stronger than you knew.\n\t*goto collapse\n*else\n\tThe previous crew must have had a quickensmith who cleaned the ship better than any regular set of tools—and did so the very day you stole it. That quickensmith saved your life. There's no other explanation.\n*label collapse\n\nYou collapse on the deck gasping with pain and lack of oxygen as you fill your lungs with air once more. Firebird slices through your bonds. Lying in a pool of water and your own blood, you find yourself laughing with delight to be alive.\n\n\"Welcome back,\" says $!{blood_name} dryly. \"You'll need to replace that rope from your spoils. And when you can stand, clean up that mess. I won't tolerate a slippery deck.\" Her mouth twitches very slightly. \"Someone could get hurt.\"\n*set keelhaul 1\n*goto_scene ss4b\n", "marooned": "*comment marooned via rowboat with j, f, t. after stowing away or annoying a captain. picked up by SS and show map to get on board; back into crew and main story. (but blood already has a copy of the map)\n*comment ch 4 from here can be test to get back on board - if you fail, you show her j's map. If you pass, he does. (remember, blood doesn't remember your name)\n*set gun_fu %-20\n*set marooned 1\n*set ships_in_fleet 0\n*set rank \"Landlubber\"\n*set ranking 0\n*set alreadyinchapterfour 1\n*set blood_name \"Jalu\"\n\nIt's a long and uncomfortable boat ride, but soon the mountainous island is tantalizingly close. All you have to do is find a way past the breakers to reach the shore.\n*set health %+10\n*choice\n\t#Work together.\n\t\t*set killed %-10\n\t\t*set truman %+10\n\t\t*if jaluhere = 1\n\t\t\t*set jalu %+10\n\t\t\tThe boat might be useful later, so you wedge the oars in place, and the two strongest swimmers—you and Jalu—get into the water to haul the others to safety. Firebird keeps up your spirits by insulting you colorfully and thoroughly and laughing as the waves crash over your head, knocking you painfully against the boat you're trying to save. \n\t\t\t\n\t\t\tWhen you're finally past the waves, she and Truman jump out and haul the boat the rest of the way while you and Jalu simply stay out of the way and hold on. By the time your feet touch sand under the water, everyone is exhausted. With one final effort, you haul the boat up to the treeline so it doesn't float away. \n\t\t\t*goto firstthings\n\t\t*else\n\t\t\tThe boat might be useful later, so you wedge the oars in place, and the two strongest swimmers—you and Firebird—get into the water to haul the others to safety. Truman keeps up your spirits by singing a marching song, interrupted periodically by the waves crashing over your head and knocking you painfully against the boat you're trying to save. \n\t\t\t\n\t\t\tWhen you're finally past the waves, he jumps out and helps haul the boat the rest of the way. By the time your feet touch sand under the water, everyone is exhausted. With one final effort, you haul the boat up to the treeline so it doesn't float away. \n\t\t\t*set health %-10\n\t\t\t*goto firstthings\n\t#Continue rowing around the island. Perhaps there are helpful locals.\n\t\t*set skepticism %-10\n\t\tYou row around the island and see signs of a village on the slopes of the main hill. It's certainly no desert island. Unfortunately, there's no one close enough to call to for help. Continuing onwards to make a full circuit of the island, you find a narrow harbor with a stream flowing into it. You and Firebird have to use the oars as poles to avoid getting swept into the rocks at the mouth of the harbor, but after that, it's relatively easy to get to shore. The second the boat is secure, you leap into the river, wade upstream until the water is fresh, and take a long and delicious drink.\n\t\t*goto firstthings\n\t#Every man for himself!\n\t\t*set skepticism %+10\n\t\t*set health %+10\n\t\t\"Time to swim for it,\" you say, and lead by example. Your muscles are aching after rowing for so long, but swimming through the waves is the perfect way to loosen everything up, and by the time you reach the shore, you feel ready to take on your next challenge. The others arrive, sopping wet, moments later.\n*label firstthings\n\nWhat is the most important thing to do next?\n*choice\n\t#Make camp and dry out the guns.\n\t\t*set gun_fu %+20\n\t\tTruman and Firebird go into the trees and come back grinning and talking through mouthfuls of fresh fruit. You eat your fill and wash your hands before putting the guns back together.\n\t\t*goto whatevers\n\t#Find something to eat.\n\t\t*set health %+10\n\t\tTruman is surprisingly enthusiastic about exploring the island, so the two of you head into the jungle to see what you can find. It's immediately obvious that you're not going to starve, and Truman volunteers his shirt as a container for the large number of juicy and delicious melons, coconuts, bananas, and mangoes that you find already fallen on the ground from their overloaded trees. He starts singing without knowing he's doing it, and you quietly enjoy the cheerful tune until he sees you smiling and stops, covering his mouth.\n\t\t\n\t\t\"I haven't heard that one before,\" you say.\n\t\t\n\t\t\"Oh. I…er…made it up.\" He smiles shyly. \"I didn't mean to sing it aloud. It's just that I like trees.\" He waves a hand vaguely. \n\t\t\n\t\t\"Sure,\" you say, talking through a mouthful of banana so fresh it's creamy. \"They're not just for making ships.\"\n\t\t\n\t\tYou head back to share the food, wondering silently how Truman came to be on board ship when he clearly longs to put down roots.\n\t\t*goto whatevers\n\t#Hide our visible weapons so we appear helpless.\n\t\t*set truthfulness %-10\n\t\tThe jungle is so thick that it's easy to make every weapon simply vanish in the underbrush. You take careful note of the surrounding area so you can find it again yourself. Truman takes a few steps into the trees and throws fruit and coconuts out onto the sand for everyone to eat. It seems you're not going to starve.\n\t\t*goto whatevers\n\t*if (knows_about_jalu_name = 1) #Tell the others Jalu's secret. \n\t\t*set truthfulness %+10\n\t\t\"There's something everyone here should know,\" you say. \"Jalu is Kallin Graveson.\"\n\t\t*if jaluhere = 1\n\t\t\t*set jalu %-10\n\t\t\tJalu twitches reflexively but recovers as quickly as always. He shrugs. \"Captain Graves decided he wanted an heir and stole me from my mother when I was a child. I paid attention to everything he taught me and soon learned to fight, to sail, and to lie.\"\n\t\t\t\n\t\t\t\"So can we trust you?\" Truman asks.\n\t\t\t\n\t\t\tJalu shrugs. \"You can trust my hatred for my father, and you can trust the treasure map on my back. Both are real and unchanging.\"\n\t\t\t\n\t\t\t\"All right,\" says Truman. \"Shall I gather some food then?\"\n\t\t\t\n\t\t\t\"Please do,\" says Jalu. \"Oh, and please don't call me Kallin. I'm Jalu now.\"\n\n\t\t\tTruman takes a few steps into the trees and throws fruit and coconuts out onto the sand for everyone to eat. It seems you're not going to starve.\n\t\t\t*goto whatevers\n\t\t*else\n\t\t\tTruman and Firebird chew over the new information. \n\t\t\t\n\t\t\t\"So,\" says Firebird. \"That map on his skin is what he stole.\"\n\t\t\t\n\t\t\t\"Yep.\"\n\t\t\t\n\t\t\t\"Then,\" she says, \"we need to get it back.\"\n\t\t\t\n\t\t\tTruman clears his throat. \"I may not be much of a pirate, but for once I agree with Firebird.\"\n\t\t\t\n\t\t\tShe flashes him a smile, and the pair head into the jungle to gather food. They return with armfuls of delicious juicy mangoes, bananas, and coconuts. Apparently you're not going to starve. \n\t\t\n*label whatevers\n\nMore than a week passes, and your guts are extremely loose from an excessively fruity diet. The village isn't keen on pirates, and none of you are skilled at either hunting or gathering. It rains a lot. Who knew a painful death would be so itchy?\n\nOne day, you gaze out over the open ocean and see what looks like a lump on the water. Standing up and shading your eyes, you think you can just make out the white of a tall ship's sails. \n\n\"What is it?\" says Truman.\n\n\"A ship!\"\n\n\"Oh,\" he says flatly, as if hearing bad news. \"Well, I suppose we can't live entirely on coconuts.\"\n\nAs the ship begins to take shape, you jump up and down on the shore, waving frantically. It changes course and heads straight for you, and soon you're able to make out the skull and crossbones flag decorated with a cutlass and an hourglass. \n\nFirebird stands beside you. \"Well, well. Look who's sailed back into our lives—new ship, same captain.\"\n\nTruman stares, going as stiff as a wild animal that spots humans approaching. \"Captain Blood is here?\"\n\n\"Yep,\" you tell him. \"And we need to get on that ship. I reckon she'll let us. We've suffered enough, haven't we?\"\n\nSure enough, the ship continues to approach.\n*if hints = 1\n\n\t[i]Has your gun had a chance to dry out? If not, are you trustworthy? If neither of those are true, gold is your only friend.[/i]\n*choice\n\t#I'll shoot Captain Blood and take over. \n\t\t*set truman %-20\n\t\t*if gun_fu>10\n\t\t\tCaptain Blood's new ship draws close to shore and then weighs anchor. She doesn't send a boat for you. You advise the others to go ahead of you. While they're drawing Captain Blood's eye, you wade out behind them. You're careful to keep your gun above the water, but it's still a long way to the ship when you have to stop or start swimming. Captain Blood stands at the railing, and you can hear the impatient tapping of her wooden foot against the deck. Steadying your breath, you take your gun, aim for her chest, and fire.\n\t\t\t\n\t\t\tShe screams in pain and rage, and you see a red patch blossom on her shirt. Others run to assist her, but they back off when they see her wound is mortal. She dies unaided, watched in silence by her crew.\n\t\t\t\n\t\t\tBy the time she breathes her last, Firebird is on deck with her, sword out and ready to take on any challengers. Jalu stands ready at her shoulder.\n\t\t\t\n\t\t\tYou swim over and take your place as captain. Truman moves to the back of the crowd, his face wooden.\n\t\t\t*set rank \"Captain\"\n\t\t\t*set ranking 4\n\t\t\t*set killed %+20\n\t\t\t*set captain_blood 0\n\t\t\t*set blooddead 1\n\t\t\t*set bloodhere 0\n\t\t\t*page_break\n\t\t\t*goto_scene ss4b\n\t\t*else\n\t\t\tCaptain Blood's new ship draws close to shore and then weighs anchor. She doesn't send a boat for you. You advise the others to go ahead of you. While they're drawing Captain Blood's eye, you wade out behind them. You're careful to keep your gun above the water, but it's still a long way to the ship when you have to stop or start swimming. Captain Blood stands at the railing, and you can hear the impatient tapping of her wooden foot against the deck. Steadying your breath, you take your gun, aim for her chest, and fire.\n\t\t\t\n\t\t\tThe gun makes a wet [i]squelch[/i]. You drop your gun into the water, hoping desperately that you can pretend nothing happened. \n\t\t\t\n\t\t\tFirebird, Jalu, and Truman are already on board. You climb up after them, wondering if you'll get killed for revealing your hand.\n\t\t\t*if jaluhere = 1\n\t\t\t\t*set jalu %-10\n\t\t\t\n\t\t\t\tJalu gives you a measuring look, and you know he saw what you tried to do. He doesn't say a word.\n\t\t\t\t*goto abc\n\t\t\t*else\n\t\t\t*label abc\n\t\t\t*set captain_blood %-20\n\t\t\t*set bloodhere 1\n\t\t\t*goto endybit\n\t#I convince the others to pool our gold in order to sweeten her up.\n\t\t*set gold 0\n\t\tTogether, you gather all your gold. It might be enough. Then again, it might not. Truman is the most trustworthy, so he carries all of it.\n\t\t\n\t\tCaptain Blood's new ship draws close to shore and then weighs anchor. She doesn't send a boat for you. You sigh and swim for it, arriving wet and rumpled. When everyone is on board, Truman presents the gold to Captain Blood, calling it a gift. \n\t\t\n\t\tShe gathers it up happily, and you wait, dripping wet, to hear if the gift is enough to save you.\n\t\t*set bloodhere 1\n\t\t*goto endybit\n\t#I tell the others to let me do the talking. That treasure map will save us.\n\t\t*set bloodhere 1\n\t\t*set truthfulness %+10\n\t\tCaptain Blood's new ship draws close to shore and then weighs anchor. She doesn't send a boat for you. You sigh and swim for it, arriving wet and worn out. When everyone is on board, you tell her all that you know about Jalu and his map. \n\n\t\t*if jaluhere = 1\n\t\t\tJalu confirms that you're speaking the truth.\n\t\t\t\n\t\t\tYou hear a murmur among the crew, almost none of whom are the same crew as you landed with at Cutlass Island. Like all pirates, however, the thought of treasure has them enthralled.\n\t\t\t*goto endybit\n\t\t*else\n\t\t\t\"Do you expect me to track down the [i]Scarlet Sails[/i] and take Jalu from Captain Starboard's clutches?\" she asks.\n\t\t\t\n\t\t\t\"I know you have the strength to do it.\"\n\t\t\t\n\t\t\tYou hear a murmur among the crew, almost none of whom are the same crew as you landed with at Cutlass Island. Nonetheless, like all pirates, the thought of treasure has them enthralled.\n\n*label endybit\n\n\"The day's not over yet,\" Captain Blood says with a wolfish grin, pointing at you. \"I nominate Feegle to earn passage for ${his} friends on my new ship. Let's have us a good old-fashioned contest.\"\n\n\"It's $!{name},\" you say quietly, \"but I accept your terms.\"\n*set blood_name \"Captain Blood\"\n*set bloodhere 1\n*set ships_in_fleet 1\n*set rank \"Crew\"\n*set ranking 2\n*set alreadyinchapterfour 1\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss4a\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss4a\n*else\n\t*page_break\n\t*goto_scene ss4a\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set hints 0\n\n*set he \"she\"\n*set him \"her\"\n*set his \"hers\"\n\n*set name \"River\"\n\n*set morality 60\n\n*set truthfulness 50\n\n*set skepticism 57\n\n*set sober 20\n\n*set swordfighting 13\n*set brawling 10\n*set gun_fu 30\n\n*set magical_skill 13\n\n*set magic \"feelsmith\"\n\n*set captain_blood 32\n*set jalu 0\n*set truman 55\n*set firebird 60\n\n*set health 75\n*set gold 3\n*set ships_in_fleet 1\n\n*set killed 82\n\n*set filth 32\n\n\n\n\nYou hear her before you see her: that distinctive [i]thump-tap, thump-tap[/i] as Captain Blood walks up behind you. Judging by the cracking pace of her steps, she's in a foul mood. Luckily, you know just how to fix that: start a fight. \n*fake_choice\n\t#Captain Blood doesn't smile much, but it's a sight worth seeing.\n\t#Brawling is good hearty exercise, and it's been almost an hour since the last fight.\n\t#Enough! I'm not sticking with Blood any more. It's time to strike out on my own.\n\n\n\n*script changeBackgroundColor(\"black\")\n\n\n\n\n\n*set hints 0\n\n*set he \"she\"\n*set him \"her\"\n*set his \"hers\"\n\n*set name \"Fellin\"\n\n*set morality 60\n\n*set truthfulness 50\n\n*set skepticism 57\n\n*set sober 63\n\n*set swordfighting 13\n*set brawling 10\n*set gun_fu 29\n\n*set magical_skill 13\n\n*set magic \"healsmith\"\n\n*set captain_blood 32\n*set jalu 78\n*set truman 55\n*set firebird 60\n\n*set health 75\n*set gold 3\n*set ships_in_fleet 1\n\n*set killed 82\n\n*set filth 32\n\n\nYou stand at the railing, trying desperately to get your head around your change in fortune.\n\n*fake_choice\n\t#\"I'm going to shoot you,\" I say evenly.\n\t#\"I can drink you under the table and still be ready for another round,\" I say boldly.\n\t#\"I've always wanted to match blades with you,\" I say.\n\n\n*script changeBackgroundColor(\"sepia\")\n\n\n*set hints 0\n\n*set he \"she\"\n*set him \"her\"\n*set his \"hers\"\n\n*set name \"Redbeard\"\n\n*set morality 65\n\n*set truthfulness 40\n\n*set skepticism 57\n\n*set sober 65\n\n*set swordfighting 33\n*set brawling 15\n*set gun_fu 5\n\n*set magical_skill 13\n\n*set magic \"feelsmith\"\n\n*set captain_blood 31\n*set jalu 52\n*set truman 65\n*set firebird 60\n\n*set health 75\n*set gold 3\n*set ships_in_fleet 1\n\n*set killed 82\n\n*set filth 32\n\n\nTruman stares. \"Captain Blood is here?\"\n\n\"Yep,\" you tell him. \"And we need to get on her ship.\"\n*fake_choice\n\t#I shoot Captain Blood and take over. Assuming my gun's working.\n\t#I convince the others to pool our gold in order to sweeten her up.\n\t#I tell the others to let me do the talking. Our treasure map will save us.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*set hints 0\n\n*set he \"she\"\n*set him \"her\"\n*set his \"hers\"\n\n*set name \"Caleb\"\n\n*set morality 60\n\n*set truthfulness 50\n\n*set skepticism 57\n\n*set sober 20\n\n*set swordfighting 13\n*set brawling 10\n*set gun_fu 30\n\n*set magical_skill 13\n\n*set magic \"quickensmith\"\n\n*set captain_blood 32\n*set jalu 0\n*set truman 55\n*set firebird 60\n\n*set health 75\n*set gold 12\n*set ships_in_fleet 1\n\n*set killed 50\n\n*set filth 10\n\n\nThere's no market at sea, so it's better to spend it now, right? You look around and see…\n*fake_choice\n\t#Fresh fruit and vegetables. Two gold pieces.\n\t#A bar of soap. Four gold pieces.\n\t#A new sword. A better one. Ten gold pieces. \n\t#A leatherworker with an array of wide belts. Two gold pieces.\n\t#The tallest, glossiest, most buckle-ridden boots you've ever seen. Two gold pieces.\n\t#I'd better get moving. How am I going to steal a ship?\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*set hints 0\n\n*set he \"she\"\n*set him \"her\"\n*set his \"hers\"\n\n*set name \"River\"\n\n*set morality 60\n\n*set truthfulness 50\n\n*set skepticism 57\n\n*set sober 20\n\n*set swordfighting 13\n*set brawling 10\n*set gun_fu 30\n\n*set magical_skill 13\n\n*set magic \"feelsmith\"\n\n*set captain_blood 32\n*set jalu 0\n*set truman 55\n*set firebird 60\n\n*set health 75\n*set gold 3\n*set ships_in_fleet 1\n\n*set killed 82\n\n*set filth 32\n\n\nPeople on both ships are getting friendlier and friendlier. A pirate's life is short, but it's merry. Why not fall in love at first sight, when you might die the next day?\n\nYou sense someone watching you, and…\n*fake_choice\n\t#Go elsewhere. I've had enough romantic entanglements for a lifetime.\n\t#I'm pleased to see it's Captain Blood, looking strangely vulnerable and utterly kissable. \n\t#I'm pleased to turn and see that it's Jalu. However I caught his eye, I'm glad I did it.\n\t#I'm pleased to see Truman looking at me with bedroom eyes. So there is something he wants from me after all. \n\t#I'm pleased to see Firebird silently daring me to get to know her better. ", "ss1": "*hide_reuse\n*set bobname \"Heran\"\n*set janename \"Lokni\"\nYou hear her before you see her: that distinctive [i]thump-tap, thump-tap[/i] as Captain Blood walks up behind you. Her half-wooden footsteps drum like a heartbeat underneath the sounds of yelling, drinking, crying, singing, and throwing up. Even among the thieves and villains currently patronizing Cutlass Island's biggest inn, your captain is a danger worth watching. As she draws closer, many of the other pirates stop and stare, entranced by the beacon of her scarlet hair when everyone else's hair is black. \n\nJudging by the cracking pace of her steps, she's in a foul mood. Luckily, you know just how to fix that: start a fight. \n*choice\n\t#Captain Blood doesn't smile much, but it's a sight worth seeing.\n\t\t*set captain_blood %+10\n\t\t*goto brawling\n\t#Brawling is good hearty exercise, and it's been almost an hour since the last fight.\n\t\t*set brawling %+10\n\t\t*goto brawling\n\t#Enough! I'm not sticking with Blood any more. It's time to strike out on my own.\n\t\t*set truthfulness %-10\n\t\t*set captain_blood %-10\n\t\t*set bloodhere 0\n\t\t*goto_scene ss1b\n*label brawling\nAs far as Captain Blood is concerned, you're just another crewmate among the filthy mass. That lack of notice has protected you so far. There are posters curling up on the walls that remind you what happens when a member of a successful pirate's crew gets too ambitious.\n\n[i]WANTED[/i]\n\n[i]Kallin Graveson[/i]\n\n[i]Feelsmith male, young, straight hair.[/i]\n\n[i]He stole from Captain Graves.[/i]\n\n[i]100 gold pieces for his head.[/i]\n\n[i]Body not required. [/i]\n\nYou've met Captain Graves, unfortunately. It wasn't easy to escape from him, and you hope you never cross paths again.\n\nNo one knows your true ambitions yet. You could have it all: strength, skill, wealth, and power. Even the nicest of sailors needs to gain power in order to make their own choices. But until you're strong enough to avoid getting killed, you'll keep playing the meek crewmate. Captain Blood might wear an eye patch, but her remaining eye sees everything. \n\nLuckily for you, there's nothing easier than starting a brawl on Cutlass Island. You look around and consider the most efficient beginning: something quick enough to cheer up the captain before she takes her mood out on you. \n*choice\n\t#I tell a server how much their food stinks.\n\t\t*set truthfulness %+10\n\t\tYou see one of the servers shambling past and tell him that you'd rather eat dirt than attempt to bite into the inn's infamously overpriced and stale bread rolls. He punches you in response, and you fall back against the balcony railing, catching hold of the closest post with one hand and hoping he doesn't flip you over the beam. Captain Blood gives a yell and kicks him in the back of the knee with the fire-hardened prongs at the end of her wooden leg. He collapses, screaming.\n\t\t\n\t\tAs you stand upright with a sigh of relief, you're careful to step on his fingers as you move toward the safety of the wall. He screams again, grabbing for you so wildly that he topples two other pirates, who promptly start punching one another. Captain Blood grins.\n\t\t\n\t\t\"You're more fun than I thought,\" she says to you, \"though I admit that isn't hard.\"\n\t\t*goto fight\n\t#I punch someone. \n\t\t*set brawling %+10\n\t\tThere are punchable faces everywhere. You deliberately pick someone with a sword and hit her right in the jaw. She reels back, and her sword is in her hand before she's even upright. You duck under her blade and kick her ankle as you wriggle out of range. Her second strike misses you but slices right through the pointed corner of some other pirate's hat. He bellows with rage and draws his own sword, and the pair of strangers attack one another as if they've both fallen for the same man. \n\t\t\n\t\tCaptain Blood grins and deftly slices the purse from your first victim, spilling coins everywhere. She stands back with you to watch as the swordfight turns into a proper bar brawl. \n\t\t\n\t\t\"You're quicker than you look,\" she says to you, \"though I admit that isn't hard.\"\n\t\t*goto fight\n\t#I flip a coin over the balcony and watch people scramble to claim it. \n\t\t*set gold -1\n\t\t*set skepticism %+10\n\t\tYour coin twinkles beautifully in the lantern-light as it falls over the balcony. People pause their drinking and look up as they catch sight of a glimmer in the air. Their companions follow their gaze, and an eerie quiet falls in the short moments it takes for your coin to fall within range. \n\t\t\n\t\tThen some woman reaches for it, another shoves her, and a man attempts to climb up both of them to get it for himself. The women turn on him and shove him into a chair which they hurl across the room with him in it. With unnatural strength like that, one of them must be a quickensmith. Sure enough, you catch a glimpse of a 'Q' brand on the back of a hand as the coin disappears into the writhing mass. Luckily for her, no one else notices the obvious use of magic.\n\t\t\n\t\tSomeone hurls a glass that flies upward and smashes into someone on the first floor. The injured party whirls around and punches the person beside them in a fury. In moments, a man throws a knife. It lands, still quivering, in the wall of your own balcony. The closest woman is a serving wench, who grabs the knife and slashes the arm of a patron trying to unlace her bodice. He howls in rage and goes to punch her. She ducks neatly and goes on her way, stepping around other patrons as they hurl themselves at one another.\n\t\t\n\t\t\"You're smarter than you look,\" Captain Blood says, bracing herself for the fight as it rolls closer, \"though I admit that isn't hard.\"\n*label fight\n*choice\n\t#\"Says the woman who misplaced her own leg,\" I shoot back.\n\t\t*set captain_blood %+20\n\t\t\"Says the woman who misplaced her own leg,\" you say.\n\t\tShe laughs delightedly and gives you a friendly punch that almost dislocates your shoulder.\n\t\t*goto fighton\n\t#\"Are we going to join in or not?\"\n\t\t*set captain_blood %+10\n\t\t*set brawling %+10\n\t\t\"Are we going to join in or not?\" you say.\n\n\t\tShe laughs delightedly and gives you a friendly punch that almost dislocates your shoulder. You leap into the crowd to deal out kicks, punches, and the occasional bite.\n\t\t*goto fighton\n\t#I duck my head, still playing the harmless crew member. \"Thank you, Captain.\"\n\t\t*set captain_blood %+10\n\t\t*set truthfulness %-10\n\t\t\"Thank you, Captain,\" you say meekly.\n*label fighton\n\nThe fight spreads quickly, filling the inn with yells of rage, grunts of pain, and the smash of breaking plates. A feelsmith touches someone lightly on the cheek, and his victim starts crying hysterically as the magical attack does its work. The nearest pirate with a sword immediately draws and stabs the feelsmith through the heart. He's dead in moments.\n\nOne of the servers rolls her eyes in annoyance at the mess, but other than that, no one reacts. Even on Cutlass Island, there's a simple etiquette: no guns fired inside and no magic except by mutual agreement. Among pirates, using magic in a straightforward brawl means instant death. The server's face brightens as she checks the 'F' brand on his hand, evidently remembering the WANTED posters for Kallin Graveson. She hauls the corpse into a sheltered nook and begins sawing through the dead man's neck with a bread knife.\n\nIt's not an easy task. She glances around guiltily and then closes her eyes to concentrate. The head pops off like a cork from a bottle, and the wound cauterises itself in seconds. \n\n[i]Huh.[/i] The server is a healsmith, and a powerful one too. For a hundred gold, using her magic was worth the risk. She wraps the head in her apron and moves toward the closest door. Too bad the feelsmith wasn't Kallin. Even from above, you can see that he had curly hair.\n*choice\n\t#I go and rummage through the corpse's clothing for gold.\n\t\tIt takes you three tries to find your way into the oddly shaped corner where the headless corpse is stashed. The inn has a smarter design than you would have thought. At last, however, you're able to kneel on the sticky floor and take what the foolish magic user no longer needs. You find two gold coins in his left shirt cuff and another sewn into his collar.\n\t\t*set gold +3\n\t\t*goto wotcher\n\t#I amuse myself by starting a hue and cry after the healsmith.\n\t\t*set morality %-10\n\t\t\"Hoy!\" you yell, beating the rhythm for a rogue magic user on the banister railing. \"That healsmith has Kallin Graveson's head!\"\n\t\t\n\t\tFaces turn up toward you, but no one can hear what you're saying. You continue beating the hunting rhythm with one hand and point at the healsmith's exit with the other. It takes a few tries, but the surging crowd gets the idea eventually, and soon you hear a high-pitched shrieking from outside as the pack brings its prey to ground. The thrill of nearby death makes you shiver with delight.\n\t\t*goto wotcher\n\t#I catch up with the healsmith and threaten her until she gives me all her gold.\n\t\t*set gold +5\n\t\tIt takes a long time to elbow your way outside through the thick crowd around the bar, but it's easy to spot the woman carrying the loosely wrapped bundle. You run up to her and step directly into her path so she stumbles and drops the head, which falls from its cover and rolls off the dirt track into the long grass.\n\t\t\n\t\t\"I know who you think that is,\" you say. \"And I know how you beheaded him.\"\n\t\t\n\t\tShe begins to shake. \"What do you want?\"\n\t\t\n\t\t\"What does anyone want?\" you say. \n\t\t\n\t\tShe scowls. Before you get around to naming an amount, she promises to give you everything she has. There's three gold in her purse, plus two more hidden in the coils of hair pinned up on her head. She probably has more somewhere, but you're feeling generous, so you take what she offers and walk back inside.\n*label wotcher\n\nYou run your finger over the brand on the back of your own hand, comforted as always by the smooth raised skin that proclaims your magical talent. Even though you're not trained, it could be useful to you someday. Magic is as common as cutlasses, but not everyone is a…\n*choice\n\t#Feelsmith like me. If I could alter my own emotions as well as those of other people, life would be endlessly pleasant.\n\t\t*set magic \"feelsmith\"\n\t\tYou're concerned someone might confuse you for the runaway Kallin Graveson, so you immediately slip on the gloves you keep with you at all times. People will suspect you're a feelsmith, but they won't know for sure.\n\t\t*goto harb\n\t#Healsmith like me. If I could heal myself as well as other people, I'd have perfect health forever. Ah well. \n\t\tEvery pirate knows not to harm a healer. You're too important at sea. The \"H\" on your hand is more useful than a gun.\n\t\t*set killed %-40\n\t\t*set magic \"healsmith\"\n\t\t*set smith 2\n\t\t*goto harb\n\t#Quickensmith like me. Too bad I can only alter objects and not people.\n\t\t*set magic \"quickensmith\"\n\t\t*set smith 3\n\t\tShips always sail better with a quickensmith in the crew. The \"Q\" on your hand is handier than a sword for keeping your place on board ship.\n*label harb\n\nOne of the servers shoves his way through a nearby knot of fighters while carrying a stack of splintered wooden mugs, and\n*if smith \u003c3\n\this bare arm brushes yours as he passes. Before you can control it, your magic unfurls inside you\n\t*if smith = 1\n\t\tand you feel a wave of hatred for all pirates. They're worse than a pack of dogs: they smell, they bite, and they eat and drink and fight and snore like animals.\n\t\t\n\t\tYou shake off the server's emotions and quickly neutralize your expression in case he looks back. If he knows you saw his rage, it could tip him over the edge into action, and it's clear he'd fight to kill. Sometimes you wish you weren't a feelsmith.\n\t\t*goto capblood\n\t*else\n\t\tand you see a man with a permanent migraine and a racing pulse. He needs both a healer and a holiday, but if he could afford either, he wouldn't need them. You know better than to offer to ease his pain, and you quickly neutralize your expression in case he glances back. Looking into somebody's body without their permission is an offense that could get you drawn and quartered; a gruesome way of ensuring a healsmith's friends can't haul them back from the brink of death.\n\t\t*goto capblood\n*else\n\this tray touches your bare arm as he passes. Before you can control it, your magic unfurls inside you and you feel the battered and rum-soaked reality of the mugs. Their wood is warped, made from a mixture of trees and scrap, and the oldest mugs are rubbed smooth from an endless procession of callused fingers. \n\t\n\tYou pull your perspective back into your flesh-and-blood self with an effort and shake your head slightly to get rid of the last dregs of the sensation.\n\t\t\n*label capblood\n\nCaptain Blood gives you a wave and jumps into the fray, swinging her wooden leg with devastating skill and laughing as she inflicts bruises and broken bones. She steals a drink or two along the way, and it even looks like she's made a new friend, since she and another captain end up fighting back to back as several others team up against them. When the brawl evolves back into a free-for-all, she takes a breather and shoves other pirates aside to come and talk to you. \n\n\"You know what, Farling?\" she says.\n*fake_choice\n\t#\"What?\" you say.\n\t\t*set name \"Farling\"\n\t#\"The name's Sam.\"\n\t\t*set name \"Sam\"\n\t#\"The name's Casey.\"\n\t\t*set name \"Casey\"\n\t#\"The name's River.\"\n\t\t*set name \"River\"\n\t#\"The name's ________\"\n\t\t*input_text name\n*set ships_in_fleet 0\n*set rank \"Landlubber\"\nShe waves her hand dismissively. \"Our ship is done for. It might look all right, but it won't sail much longer, and it can't be fixed.\"\n\nYour stomach drops. It wasn't perfect, but you liked sailing with Captain Blood. Now you have to get yourself hired elsewhere—and with only ${gold} pieces of gold, you'll need to do it fast.\n\nCaptain Blood claps you on the shoulder, careful not to actually touch your skin. \"I tell you what, Wellin—\"\n\n\"$!{name},\" you say automatically.\n\n\"A few of our crew are all right. I'll keep them. The rest can get gone. If you'd like to be on board with me, you'll need to prove your worth.\" She looks at you thoughtfully, and you know your chance of going unnoticed is gone—but at least you won't be left stranded. Probably. \"If you can recruit five decent new crewmates and steal a better ship, you can be first mate. I'll even give you a bit of gold to start you off.\"\n\n\"Can do, Captain,\" you say, wondering if you're lying. \n\nShe smiles at you again, and you suppress a shiver. It's clear she knows that you haven't truly made up your mind whether to follow her or wait for your chance to betray her. She smooths down the nearest WANTED poster, reminding you of the danger of angering a well-known pirate captain, and passes you a pleasantly heavy bag of coin.\n\nOne day, you'll be your own…\n*fake_choice\n\t#Man, with your own ship. \n\t\t*set he \"he\"\n\t\t*set his \"his\"\n\t\t*set him \"him\"\n\t#Woman, with your own ship.\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n\t#Captain, with your own ship.\n\t\t*set he \"they\"\n\t\t*set his \"their\"\n\t\t*set him \"them\"\n\nRight now you're too poor, too unknown, and too unskilled to have power. But you're healthy, and you're young, and you have a little magic. You consider simply finding a crew and stealing a ship for yourself, but you know Captain Blood’s watching you. Her resources and fighting skills are beyond yours…for now.\n\nShe walks away without bothering to look back. The inn has a very different atmosphere suddenly. With plenty of gold in your hand and the prospect of a brighter future dangling in front of you, the pirate rabble around you looks like a living armory. It's crucial that you choose your weapons wisely. \n\n[i]Do I really have what it takes to steal an entire ship?[/i]\n\nYou shake off a powerful sense of dread and focus on your first task. As you look around, you notice a man with his hook hand snarled in someone's beard while a woman beside them carefully holds her ale to the side as she throws up over the banister on the crowd below. It's clear Captain Blood has given you the task of recruiting a new crew because it's too unpleasant to bother doing it herself.\n*set gold +10\n\n*label choose_again\nYou find new crew members who are:\n*choice\n\t#Smart enough to not be too drunk in this lawless place. \n\t\t*set skepticism %+10\n\t\t*set sober %+10\n\t\tThe drunks tend to be downstairs near the bar, so you head up to the flat roof, where you're immediately immersed in one of the informal markets of Cutlass Island. \n\t\t\n\t\tYou choose four crew members who are seafaring types, literally or virtually born on board. Their skin is hard, and their hair is short: two men and two women. The women are sisters, Taliha and Kila, and pleased at the chance to continue working together. \n\t\t\n\t\tIf you ever had a sister, you don't remember her. Probably not, since your earliest memory is getting sold here as a child, and you were already alone.\n\n\t\tOne of the sellers is hissing insults at his last slave, a young man who stands upright and impassive, wearing his manacles like jewelry. It's easy to see why he hasn't sold. He's far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand, marking him as a healsmith. He sees you looking at him and subtly changes the way he stands so he suddenly looks biddable. Then he winks and straightens up again. His self-assurance is breathtaking, and you know that he knows you'll buy him—and then set him free. \n\t\t*set bobname \"Taliha\"\n\t\t*set janename \"Kila\"\n\t\t*choice\n\t\t\t#Too bad. I'm not buying someone who's so obviously going to cause trouble.\n\t\t\t\t*set skepticism %+10\n\t\t\t\t*set jaluhere 0\n\t\t\t\t*goto notjalu\n\t\t\t#I can't resist a bad boy.\n\t\t\t\t*set jalu %+10\n\t\t\t\t*set jaluhere 1\n\t\t\t\t*goto gigglebox\n\t\t\t#You can never have too many healsmiths after a sea battle. Maybe he can give me some pointers on my own magic.\n\t\t\t\t*set magical_skill %+10\n\t\t\t\t*set jaluhere 1\n\t\t*label gigglebox\n\t\tYou bargain the seller down to two gold pieces and hope you haven't just bought yourself a new problem. When you ask the ex-slave his name, he tells you \"Jalu\" but offers no further information and asks no questions about his fate. \n\t\t*set jaluname \"Jalu\"\n\t\t*set gold -2\n\t\t*goto Jalu\n\t#Obviously in need of work.\n\t\t*set morality %+10\n\t\t*set skepticism %-10\n\t\t*set gold -8\n\t\t*set killed %-10\n\t\tYou're drawn, as always, to the roof of the inn. It may as well be your home, since your earliest memory is being sold there as a toddler. You don't remember your own family or where you were born. It doesn't matter now.\n\t\t\n\t\tThere aren't any children there at this time of night, so you pick the three slaves that you think would suit Captain Blood best and let them know they'll be treated and paid exactly the same as the rest of the crew. The first is Gana, the second his son Jarn, and the third is a wiry young woman named Rain who somehow manages to have a pistol on her hip despite the fact she was empty-handed when you bought her. \n\t\t\n\t\tAfter choosing them, you spot a man your own age with an \"H\" brand on the back on his hand, marking him as a healsmith. His master is clearly going to beat him if he doesn't sell before dawn, but no one is interested in buying a slave with such an arrogant look in his eye. Naturally, you buy him. He's in unusually good shape for a slave—for anyone, to be perfectly honest—and volunteers his name: Jalu. Although he has the most to gain from your gift of freedom, he gives you a casual, \"Thanks\" and clearly considers his slave debt paid from then on. The other three treat you with a flattering deference, and you know you have their loyalty—for now.\n\t\t*set bobname \"Gana\"\n\t\t*set janename \"Jarn\"\n\t\t*set jaluname \"Jalu\"\n\t\t*set jaluhere 1\n\t\t*goto Jalu\n\t#In possession of nice-looking guns you might steal later. \n\t\t*set gun_fu %+10\n\t\t*set truthfulness %-10\n\t\tThe best weapons will be on the fifth floor—that is, the roof—where everyone who's anyone goes to sell everything that's anything. You've been sold there a few times yourself, and your earliest childhood memory is the day you met your first master on that very spot (may he be a slave in his next life).\n\t\t\n\t\tAfter a quick stroll around to see what's on offer, you have two rather nice guns to recruit—along with their owners, Gina and Laren. They're both women, and since they're sisters, they are pleased to find someone ready to hire both at once. You pick a couple more based on their sun-darkened faces—both are clearly experienced sea dogs—and then one of the slaves on offer catches your eye. It's easy to see why he hasn't sold: far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand, marking him as a healsmith. \n\t\t*set bobname \"Gina\"\n\t\t*set janename \"Laren\"\n\t\t*choice\n\t\t\t#Too bad. I'm not buying someone who's so obviously going to cause trouble.\n\t\t\t\t*set skepticism %+10\n\t\t\t\t*set jaluhere 0\n\t\t\t\t*goto notjalu\n\t\t\t#I can't resist a bad boy.\n\t\t\t\t*set jalu %+10\n\t\t\t\t*set jaluhere 1\n\t\t\t\t*goto giggleboxes\n\t\t\t#You can never have too many healsmiths after a sea battle. Maybe he can give me some pointers on my own magic.\n\t\t\t\t*set magical_skill %+10\n\t\t\t\t*set jaluhere 1\n\t\t*label giggleboxes\n\t\tHis name is Jalu, and his owner sells him for just two gold pieces. Gina and Laren immediately introduce themselves to him and start chatting amiably.\n\t\t*set jaluname \"Jalu\"\n\t\t*set gold -2\n\t\t*goto Jalu\n\t#Definitely not feelsmith men—I'm not going to mess with Captain Graves, even from afar, and I don't want to behead anyone. \n\t\t*set skepticism %+10\n\t\t*set morality %+10\n\t\tYou pick two flint-eyed women and two map-eyed older men. They all look sun-hardened and practical, which bodes well for life on board ship. Captain Blood should be pleased. The men are Donn and Hann; brothers who've sailed together all their lives. You don't remember your own family or where you were born. It doesn't matter now. \n\t\t\n\t\tYour stomach grumbles. Given that you don't know when you'll next get some food, you head upstairs to fortify yourself with some decent chow. There's always someone selling food up there, along with every other item under the sun—including people. You've been sold there more than once yourself.\n\t\t\n\t\tOne of the sellers is hissing at his last slave, a young man who stands upright and impassive, wearing his manacles like jewelry. It's easy to see why he hasn't sold. He's far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand, marking him as a healsmith. \n\t\t*set bobname \"Donn\"\n\t\t*set janename \"Hann\"\n\t\t*choice\n\t\t\t#Too bad. I'm not buying someone who's so obviously going to cause trouble.\n\t\t\t\t*set skepticism %+10\n\t\t\t\t*set jaluhere 0\n\t\t\t\t*goto notjalu\n\t\t\t#I can't resist a bad boy.\n\t\t\t\t*set jalu %+10\n\t\t\t\t*set jaluhere 1\n\t\t\t\t*goto giggleboo\n\t\t\t#You can never have too many healsmiths after a sea battle. Maybe he can give me some pointers on my own magic.\n\t\t\t\t*set magical_skill %+10\n\t\t\t\t*set jaluhere 1\n\t\t*label giggleboo\n\t\t*set gold -2\n\t\t\n\t\tYou argue the seller down to a measly two gold pieces. When you ask the ex-slave his name, he tells you \"Jalu\" but offers no further information—and asks no questions about his fate. Donn and Hann immediately ask him about his travels, and the three of them quickly discover they have several old haunts in common.\n\t\t*goto Jalu\t\t\n\t#Feelsmith men. Captain Graves is a scoundrel, and anything that bothers him is good news for the rest of Rahana. \n\t\tYou search for an hour and don't find a single feelsmith man. Of course, most magic users wear gloves, although there are a lot of healsmiths and quickensmiths deliberately going bare-handed today to avoid getting mistaken for Kallin Graveson. So much for annoying your second—and worst—master. It's probably for the best, since you pretended to be catastrophically stupid just to make him sell you on, and you don't want to draw his attention back to you.\n\t\t*goto choose_again\n\n*label Jalu\n*set jalu %+10\n\nJalu is very attractive, with liquor-smooth skin and a body that shows no trace of past illness or mistreatment—just muscles. A lot of muscles. You wonder uneasily if Captain Blood will object to having a handsome ex-slave on board. Hopefully she likes a nice view. Or she'll be glad to have another healsmith around to magically maintain her red hair.\n*set jalumuscles 1\n*fake_choice\n\t#I'll certainly enjoy seeing him every day, and I gather the feeling is mutual.\n\t\t*set jalu %+10\n\t#I have a bad feeling about him suddenly. He's hiding something.\n\t\t*set skepticism %+10\n\t#I'm just glad to have freed a slave before his spirit was broken.\n\t\t*set skepticism %-10\n\t#I certainly enjoy working for Captain Blood, and not just for her winning personality.\n\t\t*set captain_blood %+10\nHis healsmith brand is off-center and messily done, although he's tall enough that he must have eaten well as a child. You guess that he had a safe childhood but was taken by pirates around puberty. That would have been when his healsmithing ability became apparent for the first time. It may even have given him enough value to keep him alive. Whatever happened to him, it hasn't taken away his sense of his own worth. He might well have found his true calling on board ship. Perhaps he'll make a good first mate for you one day—if he can be trusted.\n*set jalubrand 1\n*label notjalu\n\nBefore you leave the roof, you have a quick wander among the sellers. Your mouth waters at the sight of fresh fruit and vegetables, and you even spot someone with a couple of bars of real soap to sell. The floral smell of the soap is sweeter than the smell of freshly cut wood. Probably because soap is rarer. \n\nFruit and vegetables will stave off scurvy for a while, and the soap might just help you get rid of that itchy rash you've had for the last six weeks.\n*label shopping\nYou check your remaining coins—there \n*if gold > 1\n\tare ${gold} gold pieces left. \n\t*goto ax\n*if gold = 1\n\tis just 1 gold piece left. \n\t*goto ax\n*if gold = 0\n\tisn't a single gold piece left.\n\t*goto harbor\n*label ax\n\nThere's no market at sea, so it's better to spend it than save it, right? You look around and see…\n*choice\n\t*selectable_if (gold > 1) #Fresh fruit and vegetables. Two gold pieces.\n\t\t*set health %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 3) #A bar of soap. Four gold pieces.\n\t\t*set filth %-10\n\t\t*set health %+10\n\t\t*set gold -4\n\t\t*goto shopping\n\t*selectable_if (gold > 9) #A new gun. A better one. Ten gold pieces.\n\t\t*set gun_fu %+10\n\t\t*set gold -10\n\t\t*goto shopping\n\t*selectable_if (gold > 9) #A new sword. A better one. Ten gold pieces. \n\t\t*set swordfighting %+10\n\t\t*set gold -10\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #An array of brilliantly colored silks cut in lengths for sashes. Two gold pieces.\n\t\tYou pick the best and brightest colors for when you want to impress others with your wealth and style.\n\t\t*set firebird %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #A leatherworker with an array of wide gunbelts. Two gold pieces.\n\t\tYou negotiate to get two for the price of one, wearing one belt low on your hips and the other across your chest. This will make it easier to carry several guns at once.\n\t\t*set gun_fu %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #The tallest, glossiest, most buckle-ridden boots you've ever seen. Two gold pieces.\n\t\tThey fit perfectly, hidden dagger-sheaths and all. You walk taller with them on—literally.\n\t\t*set swordfighting %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t#I'd better get moving. How am I going to steal a ship?\n\t\t*goto harbor\n*label harbor\n\nLooking out toward the harbor, you spot a gorgeous ship with trim lines and blood-red sails. The sight of it sets your heart beating faster, and your mouth actually waters. You can’t help it: you’re in love. \n\nOne of the servers gives you an indulgent smile as he sees you staring open-mouthed out the window. \"Seen the [i]Scarlet Sails[/i], have we?\" he says. \"You're not the first to want her. That's her captain over yonder if you're looking to join up. Captain Starboard.\"\n\nThe
