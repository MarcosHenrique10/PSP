set truthfulness %-10\n\t\t\t\t\t#I make a mental note not to bother offering mercy in future.\n\t\t\t\t\t\t*set morality %-10\n\t\t\t\t\t#I make a mental note to get a bigger skull-and-crossbones flag so I don't have to yell my intentions next time.\n\t\t\t\t\t\t*set truthfulness %+10\n\t\t\t\t\"Ready cannons!\" you bellow. \"Mind the powder! Fire!\"\n\t\t\t\t\n\t\t\t\tThe [i]Scarlet Sails[/i] explodes in smoke, and you're half-deafened by the sounds of screaming crew and crunching wood. As the smoke clears, you see massive holes all along the merchant vessel's flank. \n\t\t\t\t\n\t\t\t\tYou bellow orders to trim sails and turn about, and the crew jumps to their stations with a will. By the time you're lined up for another broadside, the crew of the merchant ship lines the rails with hands raised in surrender. The ship is yours.\n\t\t\t\t*goto captaincy\n\t\t*else\n\t\t\tYou give the sails a proper airing and speed across the waves, laughing as you draw close enough to see their terrified faces.\n\t\t\t*if smith = 3\n\t\t\t\t*set gun_fu %+10\n\t\t\t\tYou're unable to resist slipping your awareness away from your physical self and into the ship. The [i]Scarlet Sails[/i] quivers with joy, speeding to the hunt like a kitten to her first mouse. It's all about skill and joy and death, and it's what she was made for. You pull back into yourself, but the smile stays on your face.\n\t\t\t\t*goto goldenbow\n\t\t\t*else\n\t\t\t\t*label goldenbow\n\t\t\t\tThe [i]Golden Boy[/i] has an unusually stupid captain, dressed all in white so he can't possibly hide from view. \n\t\t\t\t*fake_choice\n\t\t\t\t\t#I make a mental note never to parade myself before a fight.\n\t\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t\t#I make a mental note not to bother offering mercy in future.\n\t\t\t\t\t\t*set morality %-10\n\t\t\t\t\t#I make a mental note to get a bigger skull-and-crossbones flag so I don't have to yell my intentions so loudly.\n\t\t\t\t\t\t*set truthfulness %+10\n\t\t\t\t*label broadside\n\t\t\t\tThe [i]Scarlet Sails[/i] tips sharply as your crew brings her neatly alongside the merchant vessel and prepares to turn it to matchsticks. She rights herself perfectly, and you feel her thrumming with energy beneath your feet.\n\t\t\t\t\n\t\t\t\t\"Surrender!\" you yell, remembering just in time that you intend to keep that ship for yourself. No need to break it if you don't have to.\n\t\t\t\t\n\t\t\t\t\"Never!\" someone shouts back, giving the lie to his words as he ducks below decks.\n\t\t\t\t\n\t\t\t\t\"Ready cannons!\" you bellow. \"Fire at will!\"\n\t\t\t\t\n\t\t\t\tThe [i]Scarlet Sails[/i] explodes in smoke and half deafens you with the sounds of screaming crew and crunching wood. As the smoke clears, you look back to see a massive hole in the merchant vessel's flank. \n\t\t\t\t\n\t\t\t\tYou bellow orders to trim sails and turn about, and the crew jumps to their stations with a will. By the time you're lined up for another broadside, the crew of the merchant lines the rails with their pistols in their hands. You can't help admiring their courage, but you shoot them again all the same. \n\t\t\t\t\n\t\t\t\tWhen the smoke clears and the ships are separated once more, you make the unpleasant discovery that one of your own cannons has exploded, wounding several members of your new crew. Hoping for the best, you turn about for another round.\n\t\t\t\t\n\t\t\t\tThis time, the merchant crew has their hands raised in surrender. The ship is yours—just barely.\n\t\t\t\t*set rank \"captain\"\n\t\t\t\t*set ranking 4\n\n*label captaincy\n*if (rank = 4) and (noob = 1)\n\t*achieve captainy\n\t*goto faker\n*else\n*label faker\n*fake_choice\n\t#That went well. I'll be sure to do some shooting practice, all the same.\n\t\t*set gun_fu %+10\n\t#I'll run drills with the guns to make sure we're never caught out.\n\t\t*set gun_fu %+10\n\t#That went well. I'll make sure the crew knows I appreciate their efforts.\n\t\t*set killed %-10\n\t\t*set truman %+10\n*if ((ranking = 4) and (noob = 1)) and (friendly = 0)\n\t*page_break\n\t*achieve captainy\n\tYou're glad to let $!{blood_name} take the larger prize of the merchant ship. \n\n\tOn the [i]Scarlet Sails[/i], you lead a mixed crew that includes several of the merchant's sailors. Some are more enthusiastic about their new lives than others. \n\t\t\t\t\n\tThose too loyal to the merchant are left in their lifeboat to row for the nearest island. You and $!{blood_name} relieve them of their gold and share it among the crew according to the rules you made previously.\n\t*if golden = 1\n\t\t*set gold + 10\n\t\t*goto crew\n\t*elseif (golden = 2)\n\t\t*set gold 20\n\t\t*goto crew\n\t*else\n\t\t*set gold + 40\n\t\t*goto crew\n\n*elseif (ranking = 4) and (friendly = 0)\n\tThose loyal to the merchant are left in their lifeboat to row for the nearest island. You and $!{blood_name} relieve them of their gold and share it among the crew according to the rules you made previously.\n\t*if golden = 1\n\t\t*set gold + 20\n\t\t*goto crew\n\t*elseif (golden = 2)\n\t\t*set gold 30\n\t\t*goto crew\n\t*else\n\t\t*set gold + 50\n\t\t*goto crew\n*elseif (ranking = 4) and (noob = 1)\n\t*achieve captainy\n\t*goto twosome\n*else\n\t*label twosome\n\tThe two ships of your fleet sail together into a wealthy future. The merchants didn't know anything about the treasure map, but they might make useful cannon fodder later.\n\t\n\tWhat could possibly go wrong?\n\t*set ships_in_fleet 2\n\t*page_break\n\t*goto_scene ss6\n\t*goto crew\n*label crew\n\n*if ((bloodhere = 1) or (starboardhere = 1)) or (jalucaptain = 1)\n\tYou'll have plenty of contact with the new ship, but you are permitted to choose just one official member of your crew:\n\t*choice\n\t\t#Firebird. She can help train me in swordfighting and boxing.\n\t\t\t*set swordfighting %+10\n\t\t\t*set brawling %+10\n\t\t\t*set firebird %+10\n\t\t\t$!{blood_name} throws in Truman for free, apparently not seeing his value.\n\t\t\t*goto two\n\t\t#Truman. He’s honest and won’t cause trouble to the others. \n\t\t\t*set morality %+10\n\t\t\t*set truthfulness %+10\n\t\t\t*set truman %+20\n\t\t\t$!{blood_name} throws in Firebird for free, apparently not seeing her value.\n\t\t\t*goto two\n*else\n\tYou'll definitely take both Firebird and Truman on your ship, but which will be your first mate?\n\t*fake_choice\n\t\t#Firebird. She can help train me in swordfighting and boxing.\n\t\t\t*set swordfighting %+10\n\t\t\t*set brawling %+10\n\t\t\t*set firebird %+10\n\t\t#Truman. He’s honest and won’t cause trouble to the others. \n\t\t\t*set morality %+10\n\t\t\t*set truthfulness %+10\n\t\t\t*set truman %+20\n*label two\nThe two ships of your fleet sail together into a wealthy future. Those who used to live under the merchant flag don't know anything about the treasure map, but they might be handy as cannon fodder later.\n\nWhat could possibly go wrong?\n*set ships_in_fleet 2\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss6\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss6\n", "ss5b": "*if ranking \u003c 4\n\t*set noob 1\nThe following day, you wake up somewhat worse for wear, and struggling to shake off your dreams of death by keelhauling. Unfortunately, it’s time to get back to work. \n\nSpecifically, it's time to hunt the [i]Scarlet Sails[/i]. Fortunately, your ship and the [i]Scarlet Sails[/i] are heading in the same direction, so finding her should be easy. \n\nWhat do you do next?\n*fake_choice\n\t#Trim the sails. \n\t\t*set truman %+10\n\t#Practice running out the cannons. \n\t\t*set gun_fu %+10\n\t#Swab the deck. You've seen what sickness on board can do.\n\t\t*set filth %-20\n\t\t*set health %+10\n\t#Do some magic training.\n\t\t*set magical_skill %+10\n\t\t\n*if blooddead = 1\n\tYou wake in what used to be Captain Blood's cabin and summon \n\t*if jaluhere = 1\n\t\tTruman, Firebird, and Jalu.\n\t\t*goto boger\n\t*else\n\t\tTruman and Firebird to join you.\n\t*label boger\n\tYou discuss the best way to proceed toward the treasure.\n\t*goto bogert\n*else\n\tTruman takes you and Firebird to Captain Blood's cabin to discuss the best way to proceed toward the treasure. \n*label bogert\n\"We're sailing along the same trade route Captain Starboard's likely to have taken,\" says Firebird. \"But any insight you have could be handy.\"\n\nSuddenly, you remember your old days as a wallflower and long for the peace your passivity brought you.\n*fake_choice\n\t#\"I believe Jalu has more reason than anyone to want this quest to succeed,\" I say. \n\t\t*set jalu %+10\n\t#\"Truman has better insight into people than I do,\" I say.\n\t\t*set truthfulness %+10\n\t\t*set truman %+10\n\t#\"You know better than I do,\" I say to Firebird.\n\t\t*set firebird %+10\n\nTogether, you look at the riddle encircling the map.\n\n[i]You are many and I am none. I will be one when you are none. [/i]\n\t\n\"What do you think that means?\" Firebird says, and sighs in exasperation at your blank look.\n\n\"Go eat your lunch and come back,\" $!{blood_name} says to everyone. \"We might as well head for the treasure as well as we can with the little we know.\"\n\nYou eat a rather pungent salad for lunch, polishing off the last of the fresh food from Cutlass Island. It's impossible to enjoy it while you're trying to think of what to say to prove your usefulness. Clearly, the day of the wallflower is over.\n*choice\n\t#I ask crew members for advice and pretend I came up with their ideas. \n\t\tNo one knows a thing, unfortunately.\n\t\t*set truthfulness %-10\n\t\t*set skepticism %-10\n\t\t*goto meeting\n\t#I make up an answer that at least gets us heading in the right direction. \n\t\tYou decide to spin some kind of answer interpreting \"none\" to mean \"not on known maps\" and say that your personal memory is the best existing guide.\n\t\t*set truthfulness %-10\n\t\t*goto meeting\n\t#I admit I don’t know the answer, but I know some of those islands.\n\t\t*set truthfulness %+10\n*label meeting\n\nBack in Captain Blood's cabin, Truman admits he doesn't know anything useful. Your sense of a general direction is good enough for the moment, and you hope you'll remember more details along the way. The last time you were in that part of the world, you were just a terrified child.\n*page_break\nTogether, you have one last brainstorm about the meaning of the riddle. \n\n[i]You are many and I am none. I will be one when you are none. [/i]\n\nIt seems clear that the “many” is talking about treasure seekers like you, so the final “none” could mean that you are no longer “seekers” when the treasure is found…or that finding the treasure gets you all killed.\n\nTruman asks you quietly if you're concerned about the deadly danger.\n*fake_choice\n\t#Nah. No life is worth much. Not even mine. Or yours.\n\t\t*set morality %-10\n\t#Nah. Nothing ever scares me.\n\t\t*set truthfulness %-10\n\t#Of course I'm scared. I hope this gold is worth it.\n\t\t*set truthfulness %+10\n\t\t*set truman %+10\n*page_break\nAfter several weeks of sailing, Truman gives a shout from the crow's nest as he spots an unescorted vessel on the horizon. Firebird is on the bridge and immediately shouts orders to intercept. There's no mistaking the [i]Scarlet Sails[/i]. \n\nIf the ship is captured, you'll be part of a fleet at last. You and $!{blood_name} could be allies instead of continuing to pretend neither of you wants to take the ship from the other. \n\nTruman's already well positioned to fly signal flags across the waves.\n\n*if hints = 1\n\t[i]Are you better at Treachery, Sweetness/Truthfulness, or Gun Fu?[/i]\n*choice\n\t#Fake scurvy so they draw closer and I can shoot Captain Starboard.\n\t\t*if (truthfulness \u003c40) and (gun_fu > 20)\n\t\t\t*set gun_fu %+10\n\t\t\t*set rank \"captain\"\n\t\t\t*set ranking 4\n\t\t\tYou send Truman to lower the skull and crossbones and fly the flags indicating non-infectious disease. He adds an invitation to trade. He lies quite fluently in semaphore. As the [i]Scarlet Sails[/i] draws closer, you can see the crew standing on the deck, but they're not on guard yet. You snap out orders to your own crew to conceal their weapons and stop looking so much like a pack of liars. They attempt to act respectable, and several break out in whistling. \n\t\t\t*fake_choice\n\t\t\t\t#I make a mental note not to rely on the crew's acting skills in the future.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note that red sails don't lend themselves to subterfuge.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note to learn how to whistle properly. It seems fun.\n\t\t\t\t\t*set skepticism %-10\n\t\t\t\n\t\t\tCaptain Starboard stands at the ship's railing, apparently unconcerned about the unfamiliar vessel until she gets close enough to recognize you. She shudders, and her parrot takes the hint and squawks angrily at you.\n\t\t\t\n\t\t\tYou draw and cock your weapon. \"Hello. I'm afraid we're perfectly healthy. You're going to give us your ship, and we're going to give you your lives.\"\n\t\t\t\n\t\t\tCaptain Starboard draws her own pistol, leveling it at you. You hear the scrape of swords taken from their scabbords all around you, but of course they're no use at a distance.\n\t\t\t\n\t\t\tYou shoot carefully, and her hat goes flying backward. The parrot screeches and takes to the air. For a moment, you think you've missed. Then Captain Starboard puts her hands to her head and curses. Her parrot dives for you in a fury, and you hit it from the air. It falls into the sea, too small to make a splash. Captain Starboard curses beautifully, but soon she loses the ability to speak. They die within moments of one another.\n\t\t\t\n\t\t\t\"Had enough?\" you ask, trying to keep the surprise from your voice. Those were the two best shots of your life! Maybe you should practice shooting more and get genuinely good at it.\n\t\t\t\n\t\t\tAn enormous man covered in tattoos steps into Captain Starboard's place at the railing. \"We surrender! Please don't kill me.\"\n\t\t\t*set starboarddead 1\n\t\t\t*set starboardhere 0\n\t\t\t*set rank \"captain\"\n\t\t\t*set ranking 4\n\t\t\t*goto captaincy\n\t\t*else\n\t\t\tYou send Truman to fly the flags indicating non-infectious disease, and he adds an invitation to trade. He lies quite fluently in semaphore. As the other ship draws closer, you can see the crew standing on the deck, but they're not on guard yet. You snap out orders to your own crew to conceal their weapons and stop looking so much like a pack of liars. They attempt to act respectable, and several break out in whistling. \n\t\t\t*fake_choice\n\t\t\t\t#I make a mental note not to rely on the crew's acting skills in the future.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note that bright red sails don't lend themselves to subterfuge.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note to learn how to whistle properly. It seems fun.\n\t\t\t\t\t*set skepticism %-10\n\t\t\t\n\t\t\tCaptain Starboard stands at the ship's railing, apparently unconcerned about the unfamiliar vessel until she gets close enough to recognize you. She shudders, and her parrot takes the hint and squawks angrily at you.\n\t\t\t\n\t\t\tYou draw and cock your weapon. \"Hello. I'm afraid we're perfectly healthy. You're going to give us your ship, and we're going to give you your lives.\"\n\t\t\t\n\t\t\tCaptain Starboard draws her own pistol, leveling it at you. You hear the scrape of swords taken from their scabbards all around you, but of course they're no use at a distance.\n\t\t\t\n\t\t\tYou shoot carefully, and her hat goes flying backward. \n\t\t\t\n\t\t\tThe parrot screeches and takes to the air, but Captain Starboard only laughs at you. \"Almost got me,\" she says. \"But not quite.\"\n\t\t\t\n\t\t\tYou're frozen to the spot as she cocks her gun ready to take her shot. But then an enormously muscled crewman is behind her, and he grabs her, and suddenly there's a red ribbon across her neck. \n\t\t\t\n\t\t\tShe dies so quickly she doesn't even make a sound. Her parrot dives in fury at the traitor, who hits it from the air with the flat of his sword. It falls into the water and sinks from view.\n\t\t\t\n\t\t\t\"We surrender,\" he declares to both crews. \"I ain't listening to that parrot no more.\"\n\t\t\t\n\t\t\tThe two ships erupt in cheers. It seems you've become a fleet. \n\n\t\t\tThat was too close. If you want to try a move like that again, you'd better build up your shooting skills first.\n\t\t\t*set starboarddead 1\n\t\t\t*set starboardhere 0\n\t\t\t*goto captaincy\n\t#Suggest we peacefully combine forces to search for the treasure. I reek of trustworthiness.\n\t\t*set morality %+20\n\t\t*if (skepticism \u003c 40) or (truthfulness > 60)\n\t\t\t*set magical_skill %+20\n\t\t\tYou send Truman to fly the flags indicating an invitation to trade. As the other ship draws closer, you can see Captain Starboard at the railing. \n\t\t\t\n\t\t\tA crew member approaches the rail, looming beautifully, but Captain Starboard waves him aside and greets you herself. \"How's things?\"\n\t\t\t\n\t\t\t\"Well enough,\" you say. \"I have a proposition for you. We have knowledge about that map and a well-armed crew. If you'll join us, we'll be stronger together.\"\n\t\t\t\n\t\t\tShe stares at you for a long moment, and you have time to wonder what impression you really made on her. \n\t\t\t\n\t\t\t\"Yes,\" she says at last. \"You have a deal.\"\n\t\t\t*set friendly 1\n\t\t\t*goto captaincy\n\t\t*else\n\t\t\tYou send Truman to fly the flags indicating an invitation to trade. As the other ship draws closer, you can see Captain Starboard at the railing. \n\t\t\t\n\t\t\tA crew member approaches the rail, looming beautifully, but Captain Starboard waves him aside and greets you herself. \"Have we met?\"\n\t\t\t\n\t\t\t\"We may have,\" you say. \"I have a proposition for you. We have a treasure map and a well-armed crew. If you join us, we'll be stronger together.\"\n\t\t\t\n\t\t\tShe stares at you for a long moment, and you have time to wonder what impression you really made on her. \n\t\t\t\n\t\t\t\"No,\" she says at last. \"I know your type too well.\"\n\t\t\t\n\t\t\tShe stays right where she is until the two ships are separate once more.\n\t\t\t\n\t\t\tFirebird appears beside you. \"Are you really going to let them go?\"\n\t\t\t\n\t\t\t\"Certainly not!\" you say, and snap out orders to attack. It's not what you wanted, but it'll have to do.\n\t\t\t*goto broadside\n\t#Chase them down and broadside them until they surrender. \n\t\t*label broadside\n\t\t*if gun_fu > 20\n\t\t\t*set gold +5\n\t\t\t*set rank \"captain\"\n\t\t\t*set ranking 4\n\t\t\tYou give the sails a proper airing and race across the waves, laughing as you draw close enough to see their terrified faces.\n\t\t\t*if smith = 3\n\t\t\t\t*set gun_fu %+10\n\t\t\t\tYou're unable to resist slipping your awareness away from your physical self and into the ship. The ship quivers with joy under your feet, speeding to the hunt like a lion to her first fresh meal. It's all about skill and joy and death, and it's what she was made for. You pull back into yourself, but the smile stays on your face.\n\t\t\t\t*goto goldenboy\n\t\t\t*else\n\t\t\t\t*label goldenboy\n\t\t\t\tYour ship tips sharply as your crew brings her neatly alongside the [i]Scarlet Sails[/i] and prepares to turn it to matchsticks. At the perfect moment your ship rights herself, and you feel her thrumming with energy beneath your feet.\n\t\t\t\t\n\t\t\t\t\"Surrender!\" you yell, remembering just in time that you intend to keep the [i]Scarlet Sails[/i] for yourself. No need to break it if you don't have to.\n\t\t\t\t\n\t\t\t\t\"Never!\" someone shouts back, giving the lie to his words as he ducks below decks.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#I make a mental note never to rely on crewmen's acting skills.\n\t\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t\t#I make a mental note not to bother offering mercy in future.\n\t\t\t\t\t\t*set morality %-10\n\t\t\t\t\t#I make a mental note to get a bigger skull-and-crossbones flag so I don't have to yell so loud.\n\t\t\t\t\t\t*set truthfulness %+10\n\t\t\t\t\"Ready cannons!\" you bellow. \"Mind the powder! Fire!\"\n\t\t\t\t\n\t\t\t\tThe [i]Scarlet Sails[/i] explodes in smoke and splinters, and you're half-deafened by the sounds of screaming crew and crunching wood. As the smoke clears, you see massive holes all along your enemy's flank. \n\t\t\t\t\n\t\t\t\tYou bellow orders to trim sails and turn about, and the crew jumps to their stations with a will. By the time you're lined up for another broadside, Captain Starboard stands at the railing with her hands raised in surrender. The ship is yours.\n\n\t\t\t\tIt is a delight to claim her crew as your own—and particularly enjoyable to set her adrift in her own lifeboat with all those loyal to her: three crewmen and one parrot. \n\t\t\t\t*goto captaincy\n\t\t*else\n\t\t\tYou give the sails a proper airing and race across the waves, laughing as you draw close enough to see their terrified faces.\n\t\t\t*if smith = 3\n\t\t\t\t*set gun_fu %+10\n\t\t\t\tYou're unable to resist slipping your awareness away from your physical self and into the ship. The ship quivers with joy under your feet, speeding to the hunt like a lion to her first fresh meal. It's all about skill and joy and death, and it's what she was made for. You pull back into yourself, but the smile stays on your face.\n\t\t\t\t*goto goldenbow\n\t\t\t*else\n\t\t\t\t*label goldenbow\n\t\t\t\t*set firebird %-20\n\t\t\t\tYour ship tips sharply as your crew brings her neatly alongside the [i]Scarlet Sails[/i] and prepares to turn it to matchsticks. At the perfect moment your ship rights herself, and you feel her thrumming with energy beneath your feet.\n\t\t\t\t\n\t\t\t\t\"Surrender!\" you yell, remembering just in time that you intend to keep the [i]Scarlet Sails[/i] for yourself. No need to break it if you don't have to.\n\t\t\t\t\n\t\t\t\t\"Never!\" someone shouts back, giving the lie to his words as he ducks below decks.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#I make a mental note never to rely on crewmen's acting skills.\n\t\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t\t#I make a mental note not to bother offering mercy in future.\n\t\t\t\t\t\t*set morality %-10\n\t\t\t\t\t#I make a mental note to get a bigger skull-and-crossbones flag so I don't have to yell.\n\t\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t\"Ready cannons!\" you bellow. \"Mind the powder! Fire!\"\n\t\t\t\t\n\t\t\t\tThe [i]Scarlet Sails[/i] explodes in smoke and splinters, and you're half-deafened by the sounds of screaming crew and crunching wood. As the smoke clears, you see massive holes all along your enemy's flank. \n\t\t\t\t\n\t\t\t\tYou bellow orders to trim sails and turn about, and the crew jumps to their stations with a will. By the time you're lined up for another broadside, the crew of the [i]Scarlet Sails[/i] lines the rails with their pistols in their hands. You can't help admiring their courage, but you shoot them again. \n\t\t\t\t\n\t\t\t\tWhen the smoke clears and the ships are separated once more, you make the unpleasant discovery that one of your own cannons has exploded, wounding Firebird. One of your best fighters is crippled because you didn't check the guns when you should have. Hoping for the best, you turn about for another round.\n\t\t\t\t\n\t\t\t\tThis time, Captain Starboard stands alone at the rail with her hands raised in surrender. The ship is yours.\n\t\t\t\t\n\t\t\t\tIt is a delight to claim her crew as your own—and particularly enjoyable to set ex-captain Starboard adrift in her own lifeboat with all those loyal to her: three crewmen and one parrot. But that was too close. If you want to take any more ships, you'd better practice your gun skills first.\n\t\t\t\t*set starboardhere 0\n\t\t\t\t*set rank \"captain\"\n\t\t\t\t*set ranking 4\n\n*label captaincy\n*fake_choice\n\t#That went well. I'll be sure to do some shooting practice all the same.\n\t\t*set gun_fu %+10\n\t#That could have gone better. I'd better run drills with the guns before we're caught out.\n\t\t*set gun_fu %+10\n\t#That went well. I'll make sure the crew knows I appreciate their efforts.\n\t\t*set killed %-10\n\t\t*set truman %+10\n*if ((ranking = 4) and (noob = 1)) and (friendly = 0)\n\t*page_break\n\t*achieve captainy\n\t*set killed %+15\n\t*goto hijk\n*else\n*label hijk\n*if ranking = 4\n\tYou are made captain of the [i]Scarlet Sails[/i], leading a mixed crew that includes several of your old crewmates. Some are more enthusiastic about their new lives than others. Big Eddy is the natural choice of first mate, and it's clear he has no desire to be captain. He really is the smartest man on board.\n\t*if (captaincyindanger = 1) and (jalucaptain = 0)\n\t\tWith that in mind, you nominate Jalu as captain of the other ship. \n\t\t*set ranking 5\n\t\t*set rank \"Fleet Captain\"\n\t\t*set jaluname \"Captain Jalu\"\n\t\t*set blood_name \"Captain Jalu\"\n\t\t*fake_choice\n\t\t\t#It'll keep him far away from me.\n\t\t\t\t*set skepticism %+10\n\t\t\t#He was born to lead. I'm glad he challenged me to my face.\n\t\t\t\t*set skepticism %-10\n\t\t\t\t*set jalu %+10\n\t\t*goto bubblestheclown\n\t*else\n\t\t*goto bubblestheclown\n*else\n*label bubblestheclown\nYou'll sail on the [i]Scarlet Sails[/i] once more, and you hope you can get on better with the crew this time. The ship is as perfect as ever. You'll have plenty of contact with $!{blood_name}'s ship, but you'll keep Firebird and Truman with you on the [i]Scarlet Sails[/i]. Who do you spend the most time with?\n*fake_choice\n\t#Firebird. She can help train me in swordfighting and boxing.\n\t\t*set swordfighting %+10\n\t\t*set brawling %+10\n\t\t*set firebird %+10\n\t\t*goto cup\n\t#Truman. He’s honest and won’t cause trouble to the others. \n\t\t*set morality %+10\n\t\t*set truthfulness %+10\n\t\t*set truman %+20\n\t\t*goto cup\n\n*label cup\nThe two ships of your fleet sail together into a wealthy future. Many of the crew are strangers to you, but they might make useful cannon fodder later.\n\nWhat could possibly go wrong?\n*set ships_in_fleet 2\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss6\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n*page_break\n*goto_scene ss6\n", "ss6": "*set ships_in_fleet 2\n*if bloodhere = 0\n\t*set blooddead 1\n\n*set victimname \"Truman\"\nEveryone celebrates the beginning of life as a pirate fleet by searching the newly acquired vessel for rum. As it turns out, there's more than one secret stash on board! It’s the perfect solution to the lingering awkwardness caused by attempting to bring together two very different crews as one fleet.\n\nPiratical diplomacy is easy when there’s enough rum for all. Suddenly, everyone is getting on famously, and people are swinging back and forth from one ship to the other.\nHow much do you drink? \n*fake_choice\n\t#None for me—I need to keep an eye on the new crew. \n\t\t*set sober %+20\n\t\t*set skepticism %+10\n\t#A few. I need to be part of the group. \n\t\t*set skepticism %+10\n\t\t*set killed %-10\n\t#Plenty. Whatever I want, I get—or else!\n\t\t*set sober %-20\n\t\t*set morality %-10\n\n*label fling\nPeople on both ships are getting friendlier and friendlier. A pirate's life is short, but it's merry. Why not fall in love at first sight when you might die the next day?\n\nIt's an effort to keep from using your magic, but you're getting more skilled at remaining in your own skin these days. \n*if smith \u003c 3\n\tAt last, you can relax a little bit and let yourself get physically close to other people. \n\t*goto youxz\n*else\n*label youxz\n\nYou sense someone watching you, and…\n\n*if hints = 1\n\t[i]Been at sea a while, haven't you? As long as the relevant rapport statistic is decent, you're probably not imagining those tender looks. \n\t*if blooddead = 0\n\t\t[i]But be aware that Captain Blood won't get involved with someone who's too moral, and Truman won't get involved with someone who's too malevolent.[/i]\n\t\t*goto hijk\n\t*else\n\t\t[i]But be aware that Truman won't get involved with someone who's too malevolent.[/i]\n\t\t*goto hijk\n*else\n*label hijk\n*choice\n\t#I go elsewhere. I've had enough romantic entanglements for a lifetime.\n\t\t*set skepticism %+10\n\t\t*goto arg\n\t*if ((blooddead = 0) and (blood_love = 0)) #I'm pleased to see it's Captain Blood, looking oddly vulnerable and utterly kissable. \n\t\t*if (morality \u003c 51) and (captain_blood > 60)\n\t\t\t*set victim +1\n\t\t\tShe takes you by the hand and pulls you into her cabin, where the two of you hide under her enormous table like runaway lovers. \n\t\t\t\n\t\t\t\"Mind the spiky leg,\" she says breathlessly, pushing back her masses of red hair. It's the closest to tenderness you've seen in her, and you realize she must really like you.\n\t\t\t\n\t\t\t\"I've always admired good craftsmanship,\" you say, swallowing a grunt of pain as her wooden leg bruises your shin.\n\t\t\t\n\t\t\tShe doesn't waste any more words.\n\t\t\t*set blood_love 1\n\t\t\t*set victimname \"Captain Blood\"\n\t\t\t*goto feelings\n\t\t*else\n\t\t\tShe [i]thump-tap[/i]s up to you and kisses you full on the mouth.\n\t\t\t\n\t\t\t\"Always wanted to do that,\" she says. \"Just the once, though. And if you tell anyone, I'll kill you.\"\n\t\t\t\n\t\t\t\"I—Aye aye, Captain.\"\n\t\t\t\n\t\t\tShe strolls away and throws herself into a wrestling match between Firebird and Jalu.\n\n\t\t\tYou know Blood well enough to know that you'll never kiss her again. There's no charming her out of a decision once she's made it.\n\t\t\t*set rejected 1\n\t\t\t*set blood_love 5\n\t\t\t*goto feelings\n\t*if ((jaludead = 0) and (jalu_love = 0))  #I'm pleased to turn and see that it's Jalu. However I caught his eye, I'm glad I did.\n\t\t*if jalu > 60\n\t\t\t*set victim +1\n\t\t\tHe doesn't break eye contact as he walks toward you, stepping over ropes, pirates, discarded weapons, and bottles with perfect instincts. You stand face to face, feeling his breath caress your face while his hands remain at his side. Up close, you can see a tiny scar on his lip that only highlights his perfection.\n\t\t\t\t\n\t\t\tThat mouth curves into a smile, and you look up to see genuine delight in his dark eyes. He's impossibly still and you're hypnotized, unable to close the tiny gap between you. \n\t\t\t\t\n\t\t\tHe lifts one hand and cups your cheek. You're surprised to see his eyes suddenly brimming with what looks suspiciously like tears. He has genuine feelings for you under all that easy charm. And then he's kissing you, and you don't have another coherent thought for a long time. \n\t\t\t*set jalu_love 1\n\t\t\t*set victimname \"Jalu\"\n\t\t\t*goto feelings\n\t\t*else\n\t\t\t*set jalu_love 5\n\t\t\tHe doesn't break eye contact as he walks toward you, stepping over ropes, pirates, discarded weapons, and bottles with perfect instincts. You stand face to face, feeling his breath caress your face while his hands remain at his side. Up close, you can see a tiny scar on his lip that only highlights his perfection.\n\t\t\t\t\n\t\t\tThat mouth curves into a smile, and you look up to see genuine delight in his dark eyes. He's impossibly still and you're hypnotized, unable to close the tiny gap between you. \n\t\t\t\n\t\t\t\"In case you had an attack of feelings…you're not my type,\" he says and walks away.\n\t\t\t*set rejected 1\n\t\t\t*goto feelings\n\t*if  (truman_love = 0) #I'm pleased to see Truman looking at me with bedroom eyes. So there is something he wants from me after all. \n\t\t*if (morality > 49) and (truman > 60)\n\t\t\t*set victim +1\n\t\t\tTruman pauses only long enough to be sure he hasn't misinterpreted the invitation in your eyes. Then he half runs to you, tenderly kissing your hands and lips and hair. \n\t\t\t\n\t\t\tYou melt into his embrace, knowing he's the one person on board you can trust completely.\n\t\t\t*set truman_love 1\n\t\t\t*set victimname \"Truman\"\n\t\t\t*goto feelings\n\t\t*else\n\t\t\tTruman pauses only long enough to be sure he hasn't misinterpreted the invitation in your eyes. Then he half runs to you, kissing your hands and lips and hair, all the while clearly aware of the weapons you're still wearing.\n\t\t\t\n\t\t\tHe's gentle and sweet, but you can tell he doesn't quite trust you. The kisses are entirely for your benefit, not his. Gross. So you politely break it off.\n\t\t\t*set rejected 1\n\t\t\t*set truman_love 5\n\t\t\t*goto feelings\n\t*if (firebird_love = 0) #I'm pleased to see Firebird daring me with her eyes to get to know her better. \n\t\t*if firebird > 60\n\t\t\t*set victim +1\n\t\t\tFirebird kisses like she fights; mixing grace and passion into a storm that's no less enjoyable for the sense that it might kill you.\n\t\t\t\n\t\t\tShe laughs as she kisses you, and bites your lips and ears like a cat at play. You laugh back, kissing her with bruising force and pulling her closer by the hair.\n\t\t\t\n\t\t\tThis is what it feels like to be at the mercy of Nature: the time a pirate feels most alive.\n\t\t\t*set firebird_love 1\n\t\t\t*set victimname \"Firebird\"\n\t\t\t*goto feelings\n\t\t*else\n\t\t\t*set firebird_love 5\n\t\t\tShe runs up to you as if you're the only person in the world. Her bright eyes turn brighter still as she whips out her sword and challenges you to a practice bout.\n\t\t\t\n\t\t\tOh. Not romance then. Oh well. At least it'll burn off some energy.\n\t\t\t*set rejected 1\n\t\t\t*set swordfighting %+10\n\t\t\t*goto feelings\n\n*label feelings\n\nHow do you feel?\n*choice\n\t*if ((rejected = 1) and (victim = 0)) #Rejected! But there's someone else I like.\n\t\t*goto youxz\n\t#Uh-oh. I’m developing feelings. Emotional feelings. Better steer clear. \n\t\t*set skepticism %+10\n\t\t*if blood_love = 1\n\t\t\t*set captain_blood %-10\n\t\t\t*set blood_love 0\n\t\t\t*goto arg\n\t\t*elseif jalu_love = 1\n\t\t\t*set jalu %-10\n\t\t\t*set jalu_love 0\n\t\t\t*goto arg\n\t\t*elseif firebird_love = 1\n\t\t\t*set firebird %-10\n\t\t\t*set firebird_love 0\n\t\t\t*goto arg\n\t\t*elseif truman_love = 1\n\t\t\t*set truman %-10\n\t\t\t*set truman_love 0\n\t\t\t*goto arg\n\t\t*else\n\t\t\t*goto arg\n\t*if victim = 1\n\t\t#The night doesn't have to end. Why not love more than one person?\n\t\t\t*achieve onelove\n\t\t\t*set skepticism %-10\n\t\t\t*if blood_love =1\n\t\t\t\t*set captain_blood %+20\n\t\t\t\t*goto youxz\n\t\t\t*elseif jalu_love=1\n\t\t\t\t*set jalu %+20\n\t\t\t\t*goto youxz\n\t\t\t*elseif firebird_love=1\n\t\t\t\t*set firebird %+20\n\t\t\t\t*goto youxz\n\t\t\t*elseif truman_love=1\n\t\t\t\t*set truman %+20\n\t\t\t\t*goto youxz\n\t\t\t*else\n\t\t\t\t*goto youxz\n\t*selectable_if (victim > 1) #Wait a sec... what if both the ones I love could love each other too? All of us?\n\t\t*goto couch\n\t#Thoroughly satisfied.\n\t\t*if blood_love = 1\n\t\t\t*set captain_blood %+20\n\t\t\tEvery bruise you acquire making love with Blood is well worth the pain. It won't be easy loving her, but you've always risen to a challenge.\n\t\t\t*achieve onelove\n\t\t\t*goto arg\n\t\t*elseif jalu_love = 1\n\t\t\t*set jalu %+20\n\t\t\tWhen at last you and Jalu stop making out long enough to notice the rest of the world, quite a few pirates are placing bets on how long it'll take you to notice they're watching. Jalu ducks his head, uncharacteristically shy—but only for a moment. Then he's kissing you again, and you barely notice as your audience laughs and gets back to drinking and fighting.\n\t\t\t*achieve onelove\n\t\t\t*goto arg\n\t\t*elseif firebird_love = 1\n\t\t\t*set firebird %+20\n\t\t\t*set victimname \"Firebird\"\n\t\t\tFirebird drags you to the nearest ladder and the pair of you climb down and down, kissing and caressing one another so much the ladder is a significant obstacle. But you manage to descend without falling and suddenly you're in the cool darkness far below decks. Everyone and everything else is far away, and instead of sweat and pirates you smell the earthy scent of bilge water and rot. Somehow even that smells wonderful, and you and Firebird fling off your clothes and love one another with the shameless grace of animals.\n\t\t\t*achieve onelove\n\t\t\t*goto arg\n\t\t*elseif truman_love = 1\n\t\t\t*set truman %+20\n\t\t\t*set victimname \"Truman\"\n\t\t\tTruman kisses you on each shoulder and then turns suddenly and scurries up into the rigging. It is a clear invitation to one of the few places on board you can find a form of privacy, so you follow him willingly, feeling your heart beat harder as you climb after the man who has been storing up kisses for you for so long. But of course this is Truman, and he wants to know your heart as well as your body. So you spend the party talking, and kissing, and talking again—high above the sails and the celebrations below.\n\t\t\t*achieve onelove\n\t\t\t*goto arg\n\t\t*else\n\t\t\t*goto arg\n*label arg\n*page_break\n*if (bloodhere = 0) and (jaluhere = 0)\n\tYou can't help feeling that the party would be completely different if Blood and Jalu were present. More than the party: you yourself would be completely different. It feels like you've grown from a slave child to a pirate captain in a single short voyage over forgettable seas. Your life has been full of storms, and lovers, and shipwrecks, and battles, but none of it matters much when a life can be ended so easily. The only things that truly matter are you, and power, and gold. \n\t*if firebird_love = 1\n\t\tAnd now Firebird.\n\t\t*goto yeahbaby\n\t*elseif truman_love = 1\n\t\tAnd now Truman.\n\t\t*goto yeahbaby\n\t*else\n\t\t*goto yeahbaby\n*elseif blooddead = 1\n\tYou can't help feeling that the party would be completely different if Captain Blood was on board. More than the party; you yourself would be completely different. It feels like you've grown from a slave child to a pirate captain in a single short voyage over forgettable seas. Your life has been full of storms, and lovers, and shipwrecks, and battles, but none of it matters much when a life can be ended so easily. The only things that truly matter are you, and power, and gold. \n\t*if jalu_love = 1\n\t\tAnd now Jalu.\n\t\t*goto yeahbaby\n\t*elseif firebird_love = 1\n\t\tAnd now Firebird.\n\t\t*goto yeahbaby\n\t*elseif truman_love = 1\n\t\tAnd now Truman.\n\t*goto yeahbaby\n\t\t*else\n\t\t*goto yeahbaby\n*elseif jaludead = 1\n\tYou can't help feeling that the party would be completely different if Jalu was still alive. That man still had secrets to share, and you half regret shooting them out of his head. Ah well. The only things that truly matter are you, and power, and gold. You don't need him to get the treasure. \n\t*if blood_love = 1\n\t\tEspecially with Captain Blood at your side. \n\t\t*goto yeahbaby\n\t*elseif firebird_love = 1\n\t\tWith Firebird by your side, you're unbeatable.\n\t\t*goto yeahbaby\n\t*elseif truman_love = 1\n\t\tWith Truman, you already have a treasure beyond price. But you'll be getting to gold, too, no matter what.\n\t\t*goto yeahbaby\n\t*else\n\t*goto yeahbaby\n*else\n\t*label couch\n\n\t*if victim >1\n\t\t*if (blood_love = 1) and (firebird_love = 1)\n\t\t\tHeading back out on deck, you have one lover beside you and another in front of you, and suddenly you want both of them beside you. \n\t\t\t\n\t\t\t\"Hey,\" you say out loud, drawing the two beautiful, fierce women into a single loose circle. \"Do you think…?\"\n\t\t\t\n\t\t\tFirebird and Blood look at each other, then at you. A spark passes between them, and they kiss one another without letting go of you.\n\t\t\t\n\t\t\tYour knees buckle, but their arms hold you up.\n\t\t\t*goto yeahbaby\n\t\t*if (blood_love = 1) and (jalu_love = 1)\n\t\t\tWhen you realize you've just fallen for the two most ambitious people you know, you can't help wondering what they'd be like together. From there, you mind immediately supplies pictures of what the three of you could do together. You grab Captain Blood first and whisper suggestions. She has some ideas of her own and brings a spatial awareness to the situation that makes you think math really can be useful in real life. The pair of you breathlessly hunt down Jalu, who is just as breathlessly looking for you. When he sees you and Blood hand in hand and too excited to speak, he understands you perfectly.\n\t\t\t\n\t\t\t\"My room has a lock,\" says Blood.\n\t\t\t\n\t\t\t\"Ah!\" says Jalu. \"Truly, you have it all.\"\n\t\t\t\n\t\t\tGiggling and caressing one another, you go inside and leave the party to itself for a while.\n\t\t\t*goto yeahbaby\n\t\t*if (firebird_love = 1) and (truman_love = 1)\n\t\t\tYou find yourself on the open deck with one lover beside you and another in front of you, and suddenly you want both of them beside you. \n\t\t\t\n\t\t\t\"Hey,\" you say out loud, drawing your two closest friends into a single loose circle. \"Do you think…?\"\n\t\t\t\n\t\t\tFirebird and Truman look at each other, then at you, then back at each other. \"You're cute,\" says Firebird to Truman. \"But I'm scared I might break you.\"\n\t\t\t\n\t\t\t\"I'm already broken,\" he says, with his usual matter-of-fact style. As always, it is the simple truth. \"I won't mind.\"\n\t\t\t\n\t\t\tFirebird smiles at him, and you realize you've found two people who are in love with both you and each other. Perhaps all your broken pieces add up to a single whole.\n\t\t\t*goto yeahbaby\n\t\t*if (firebird_love = 1) and (jalu_love = 1)\n\t\t\tYou feel like your entire body is glowing with the pleasure of loving both Jalu and Firebird, and you remember the way Firebird's eyes lingered on Jalu the first time she saw him. Suddenly it occurs to you that she might like to do more than look at him. You find her at once and ask her.\n\t\t\t\n\t\t\t\"Are you asking me if I'd like to have a three-way relationship?\" she says, fingering the sword at her hip.\n\t\t\t\n\t\t\t\"I am.\"\n\t\t\t\n\t\t\tShe breaks out in a grin. \"Have you ever tried fighting naked?\"\n\t\t\t*goto yeahbaby\n\t\t*if (truman_love = 1) and (jalu_love = 1)\n\t\t\tYou smile to think that you've kissed both Truman and Jalu in one night. One is utterly trustworthy, and the other is full of secrets, even now. You wonder idly how they feel about one another, and suddenly you're desperately curious. \n\t\t\t\n\t\t\tYou find Truman first, knowing he'll tell you the truth without hesitation or judgement. Feelsmiths always see more darkness in others than they let on, so he's unlikely to be shocked. \n\t\t\t\n\t\t\tOnce you find Truman, Jalu is close by as well. You catch Truman's eye and deliberately raise your palm to him, inviting him to read your emotions as you look at Jalu.\n\t\t\t\n\t\t\tHe presses his palm flat against yours, and you feel your own desires reflected back at you—and multiplied. Your body warms up so quickly you have to pull away.\n\t\t\t\n\t\t\t\"What was that?\" says Jalu.\n\t\t\t\n\t\t\tTruman grins at him. \"I'm afraid we'll have to show you. In private. If that sounds like something you'd like.\"\n\t\t\t\n\t\t\tJalu smiles slowly. \"Yes,\" he says at last. \"It does.\"\n\t\t\t*goto yeahbaby\n\t\t*if (truman_love = 1) and (blood_love = 1)\n\t\t\tYou smile to think that you've kissed both Truman and Blood in one night. One is utterly trustworthy, and the other is full of secrets, even now. You wonder idly how they feel about one another, and suddenly you're desperately curious. \n\t\t\t\n\t\t\tYou find Truman first, knowing he'll tell you the truth without hesitation or judgement. Feelsmiths always see more darkness in others than they let on, so he's unlikely to be shocked.\n\t\t\t\n\t\t\tIt takes a long time to find him, but of course he's in the rigging, avoiding the usual hysteria and drunkenness of a piratical celebration. You can't remember now why the party started, anyway.\n\t\t\t\n\t\t\tHe kisses you by way of greeting. \"I hoped you'd find me.\"\n\t\t\t\n\t\t\t\"It wasn't easy.\"\n\t\t\t\n\t\t\tHe holds on to the yardarm with his knees so he can trace patterns on your skin that make you shiver with desire.\n\t\t\t\n\t\t\t\"Truman? How do you feel about Captain Blood?\"\n\t\t\t\n\t\t\t\"She's brilliant,\" he says. \"A great strategist and mapmaker, clever with people and with a ship sense as clever as a quickensmith.\"\n\t\t\t\n\t\t\tYou nod in agreement before realizing he's being factual. \"No, I mean romantically. With both of us. And her.\"\n\t\t\t\n\t\t\tHe jerks backward, almost toppling off his perch into the sea. \"Her? You can't be serious. She's a great captain but a terrible human. We're nothing but parts of the ship to her, to be added or discarded with a moment's thought. How could you even say such a…oh.\" He smooths a crease in his trousers. \"You already have feelings for her.\"\n\t\t\t\n\t\t\t\"I like her.\"\n\t\t\t\n\t\t\t\"I…thought I knew you better than that.\" He shuffles backward, as if your touch might be infectious. \"Please, can we not speak of this again?\"\n\t\t\t\n\t\t\t\"All right,\" you say, swallowing protests. You know how this goes. Even Truman  doesn't need to spell out the fact that your relationship with him is over. Before you can embarrass yourself further, you descend to the deck and find solace with Captain Blood.\n\t\t\t*set truman_love 0\n\t\t\t*set victim -1\n\t\t\t*set truman %-20\n\t\t\t*set victimname \"Captain Blood\"\n\t\t\t*goto ahbaby\n\t\t*label yeahbaby\n\t\t*page_break\n\t\t*if victim >1\n\t\t\t*achieve polyamorous\n\t\t\t*set polyamorous 1\n\t\t\t*goto ahbaby\n\t\t*else\n\t\t\t*goto ahbaby\n\t*else\n*label ahbaby\nMid-party, you hear hauntingly beautiful singing. It’s too good for pirates…because it’s a group of poisonous mermaids! You see a new kid called Helene lose her self-control and dive overboard to kiss a mermaid, not realizing she's been lured by their magic. Her face is eaten away by the powerful acid of the mermaid's saliva, garbling her screams as she dies. She probably didn't expect her pirate career to end so quickly.\n\n*if victim = 0\n\t*if firebird > truman\n\t\t*set victimname \"Firebird\"\n\t\t*goto a\n\t*else\n\t\t*set victimname \"Truman\"\n\t\t*goto a\n*else\n\n*label a\n$!{victimname} is splashed by the mermaid-enchanted water and dives overboard, swimming straight for a brunette mermaid who pauses before the fatal kiss to look up at you—and give a vicious smile. The best pirate on board is going to get killed while you watch.\nDo you:\n\n*if hints = 1\n\t[i]For the lifeboat attack, you'll need either Brawling or Swordfighting. [/i]\n\t\n\t[i]Shooting is Gun Fu. Obviously. [/i]\n\t\n\t[i]Throwing people overboard is Brawling. [/i]\n\t\n\t[i]You savvy?[/i]\n*choice\n\t#Risk my own life, leaping into a lifeboat and rowing right at the mermaid?\n\t\t*set health %-10\n\t\t*if (brawling > 20) or (swordfighting > 20)\n\t\t\tYou leap into the lifeboat and ignore the voice in your head telling you that getting any closer to those poisonous fish-women is a terrible idea. When you cut the first rope, the lifeboat lurches alarmingly to one side. You hold on tight and cut the other, and your stomach jumps as the boat falls into the sea.\n\t\t\t\n\t\t\tGrabbing the oars, you row hard toward the brunette mermaid, who is laughing at your attempt at heroism. You jump forward, almost capsizing your boat, and break that perfect nose with an oar. \n\t\t\t\n\t\t\tShe screams in rage and pain and dives away under the water. \n\t\t\t\n\t\t\t$!{victimname} comes back to reality and scrambles aboard at once.\n\t\t\t*set morality %+10\n\t\t\t*if blood_love = 1\n\t\t\t\t*set captain_blood %+20\n\t\t\t*if jalu_love = 1\n\t\t\t\t*set jalu %+20\n\t\t\t*if firebird_love = 1\n\t\t\t\t*set firebird %+20\n\t\t\t*if truman_love = 1\n\t\t\t\t*set truman %+20\n\t\t\t*goto splash\n\t\t*else\n\t\t\tYou leap into the lifeboat and ignore the voice in your head telling you that getting any closer to those poisonous fish-women is a terrible idea. When you cut the first rope, the lifeboat lurches alarmingly to one side. You hold on tight and go to cut the other, and your stomach jumps as the boat falls into the sea.\n\t\t\t\n\t\t\tGrabbing the oars, you row hard toward the brunette mermaid, who is laughing at your attempt at heroism. Her distraction lessens the power of her magic, and $!{victimname} punches her right in the pretty little nose.\n\t\t\t\n\t\t\tShe screams in rage and dives away under the water, leaving her victim behind.\n\t\t\t\n\t\t\t$!{victimname} comes back to reality and scrambles aboard at once. It's lucky you didn't need to do the whole rescue on your own, because you're not a skilled fighter.\n\t\t\t*goto splash\n\t#Shoot the mermaid. \n\t\t*if gun_fu > 20\n\t\t\t*set gold +5\n\t\t\tYou grab your pistol, dodging a burst of enchanted water hurled on deck from below. The mermaid sees you aiming at her and hesitates. \n\t\t\t\n\t\t\t$!{victimname} manages to shake off enough of the enchantment to start swimming away, but the mermaid gives chase. You shoot that monster in the back, and she sinks beneath the waves.\n\t\t\t\n\t\t\t$!{victimname} turns around at once and rips the golden chain from the mermaid's neck, swimming back to you safely and giving it to you in thanks for your help. \n\t\t\t*goto splash\n\t\t*else\n\t\t\tYou grab your pistol and cock it, but as you do so, you're splashed with the enchanted water, and suddenly the brunette mermaid is all you want from life. She smiles at you and cocks a finger. Her distraction dilutes the power of her magic, and $!{victimname} punches her right in the pretty little nose.\n\t\t\t\n\t\t\tShe screams in rage and pain and dives away under the water, leaving you to recover your wits and help $!{victimname} back on board. Luckily one of you was competent.\n\t\t\t*goto splash\n\t#Throw other crew members overboard to distract the mermaids.\n\t\t*set morality %-30\n\t\t*set killed %+20\n\t\t*set truman %-20\n\t\t*if brawling > 20\n\t\t\tYou grab the closest person and shove them bodily over the railing, where another two mermaids swim for them at once. The brunette mermaid raises an eyebrow at you, daring you to provide a second warm body. \n\t\t\t\n\t\t\t$!{bobname} is panicking because $!{janename} has jumped into the water. You can fix that. $!{bobname} is already at the railing. Three seconds later, the mermaid has another victim. \n\t\t\t\n\t\t\tThe brunette releases her original prey and accepts your gift, kissing and killing $!{bobname} in the same moment. $!{janename} screams so loudly the mermaids back away.\n\t\t\t\n\t\t\tYou help $!{victimname} and $!{janename} back on board.\n\t\t\t*goto splash\n\t\t*else\n\t\t\tYou grab the closest person and shove them bodily over the railing, where another two mermaids swim for them at once. The brunette mermaid raises an eyebrow at you, daring you to provide a second warm body. Her distraction lessens the power of her magic, and $!{victimname} punches her right in the pretty little nose.\n\t\t\t\n\t\t\tShe screams in rage and pain and dives away under the water. $!{victimname} scrambles aboard at once. You effectively murdered a crew member, and weren't even super helpful. But at least $!{victimname} is fine, even if they mostly rescued themself.\n\n*label splash\n\nJust when you think the fight will be won, you're splashed by another watery attack. Suddenly, every fiber of your being longs to leap overboard. All you want in life is to kiss a mermaid yourself. \n*choice\n\t*selectable_if (smith = 1) #I use my feelsmith magic to break free of the enchantment.\n\t\t*set skepticism %+10\n\t\t*set magical_skill %+10\n\t\tYou come back to yourself but feel as if you've given up the sun. \n\t\t\n\t\t\"Full sails!\" you yell. \"Run!\"\n\t\t\n\t\tIn moments, the ship is leaping over the waves and away from danger.\n\t\t\n\t\t*goto secrets\n\t*selectable_if (smith = 3) #I use my magic to drop part of the ship on myself so I can't follow her call.\n\t\t*set magical_skill %+10\n\t\tOuch! Pinning yourself down with half a yardarm is incredibly painful. The mermaids sing a taunting song, and you hate yourself for resisting. \n\t\t\n\t\tThen Truman gets to you and uses his feelsmith magic to set you straight.\n\t\t\n\t\tYou come back to yourself but feel as if you've given up the sun. \n\t\t\n\t\t\"Full sails!\" you yell. \"Run!\"\n\t\t\n\t\tIn moments, the ship is leaping over the waves and away from danger.\n\t\t\n\t\t*set health %-10\n\t\t*goto secrets\n\t#It’ll kill me, but she’s so beautiful….\n\t\t*set skepticism %-10\n\t\t*set rank \"First Mate\"\n\t\tYou go to jump overboard, and it takes three people to keep you from leaping into the deadly water. While they're distracted, mermaids swarm over the other vessel, spitting on it at crucial points. Their venom eats through the wood, and the entire ship is lost because of you. \n\n\t\tThe [i]Scarlet Sails[/i] survives undamaged, but you won't be captaining her any time soon.\n\t\t\n\t\t*set rank \"Crewman\"\n\t\t*set ranking 2\n\t\t*set ships_in_fleet 1\n\t\t*goto_scene ss7\n\t*selectable_if (victim > 0) #No! I won’t betray true love. These feelings aren't real.\n\t\t*if blood_love =1\n\t\t\t*set captain_blood %+20\n\t\t*if jalu_love=1\n\t\t\t*set jalu %+20\n\t\t*if firebird_love=1\n\t\t\t*set firebird %+20\n\t\t*if truman_love=1\n\t\t\t*set truman %+20\n\t\tYou come back to yourself but feel as if you've given up the sun. Then you look at the \n\t\t*if polyamorous =1\n\t\t\tones who sail\n\t\t\t*goto love\n\t\t*else\n\t\t\tone who sails\n*label love \nwith you—giving you human love, not a magical imitation—and you're filled with joy to have passed the test.\n\t\t\n\"Full sails!\" you yell. \"Run!\"\n\nIn moments, the ship is leaping over the waves and away from danger.\n\n*label secrets\n*if (blood_love=1) and (captain_blood > 70)\n\tCaptain Blood pulls you aside. \"This was a good day,\" she tells you.\n\t\n\t\"Apart from the horrible deaths by mermaid,\" you say.\n\t\n\t\"Sure.\" She waves a hand airily before moving on. \"Anyway, I wanted you to know that if you don't try and kill me, I won't try and kill \n\t*if keelhaul = 1\n\t\t*if mc_saves_self =1\n\t\t\tyou.\"\n\t\t\t*goto cap\n\t\t*else\n\t\t\tyou. After all, I've already saved your skin once.\"\n\t\t\t\n\t\t\t\"You have?\"\n\t\t\t\n\t\t\t\"Aye,\" she says. \"I'm the quickensmith that let you survive your keelhauling.\"\n\t\t\t\n\t\t\tYou automatically glance at her hands. They're scarred, certainly, but not branded.\n\t\t\t\n\t\t\t\"Always keep one secret close,\" she says with a smile. \"But not from me, since I have none from you.\"\n\t\t\t*set knowbloodquickensmith 1\n\t\t\t*goto cap\n\t*else\n\t\tyou.\"\n\t\t*label cap\n\t\t\n\t\tCaptain Blood is vicious and maybe psychotic, but she's honest. You thank her with genuine gratitude.\n\t\t\n\t\t\"And one more thing,\" she says, looking far less comfortable. \"When we're in private, you may call me by my first name.\"\n\t\t\n\t\t\"Thank you, uh…\"\n\t\t\n\t\t\"Bonnie,\" she says.\n\t\t\n\t\t\"Bonnie,\" you repeat, and since she's promised not to kill you, you can even let yourself smile.\n\t\t*goto abba\n*else\n*label abba\n\n*if (jalu_love =1)\n\tJalu finds you and asks if you're all right.\n\t\n\t\"Yes,\" you say. \"I think.\"\n\t\n\tHe takes advantage of the crew's lack of attention and draws you away into your own cabin for some privacy. Your body heats up in anticipation, but he sees the brightness in your eyes and says, \"It's not that.\"\n\t\n\t\"Oh no?\"\n\t\n\t\"I want to tell you something. Can I?\"\n\t\n\t*if knows_about_jalu_name =1\n\t\t\"Go ahead—Kallin.\"\n\n\t\tHis breath huffs out, and his gaze quickly turns speculative. \"Please keep calling me Jalu. I like the way it sounds on your lips.\"\n\t\t\n\t\t\"Is that your secret?\" you ask.\n\t\t\n\t\t\"No, it's the riddle. My grandfather knew the answer. He saw the treasure for himself, which is why I know it's real. I also know it was guarded by the Titan.\"\n\t\t\n\t\t\"An enormous sea-snake?\"\n\t\t\n\t\tHe nods, begging you with his eyes not to laugh. Or hit him. \"I hated pirates. I wanted everyone to die fighting it. Now…I hope it's dead. Or old. Or at least that we can fight it and win. Can you forgive me?\"\n\t\t\n\t\tYou answer with a kiss.\n\t\t*set jalu %+10\n\t\t*set knows_about_jalu_serpent 1\n\t\t*goto b\n\t*else\n\t\t\"Of course.\"\n\t\t\n\t\t\"Kallin,\" he says.\n\t\t\n\t\tThe name rings a bell, and in a moment you make the connection and your mouth drops open. \"You're Kallin Graveson! The feelsmith who stole from Captain Graves!\"\n\t\t\n\t\t\"That's me,\" he says, and for once his poise deserts him.\n\t\t\n\t\t\"Huh,\" you say. \"Well, then. Thanks for telling me.\"\n\t\t\n\t\tHis breath huffs out, and his gaze quickly turns speculative. \"Please keep calling me Jalu. I like the way it sounds on your lips.\"\n\t\t\t\n\t\tYou answer with a kiss.\n\t\t*set knows_about_jalu_name 1\n\t\t*set knows_about_jalu_feelsmith 1\n\t\t*goto b\n*else\n*label b\n\n*if (firebird_love=1) and (firebird > 70)\n\tWhen the ship is definitely safe and people are starting to laugh at themselves for being afraid of a pack of fish, you stand on the railing to idly watch the water slide by. After a little while, you realize Firebird is standing beside you. You put your arm around her waist, and she leans in to you with a happy murmur.\n\t\n\t\"I'm glad I turned pirate,\" she says. \"It's what I was born to be.\"\n\t\n\tRemembering the sight of her in a fight, you can't help but agree.\n\t*goto c\n*else\n*label c\n\n*if (truman_love=1)\n\tThe shifts change at the usual time, and the normal routine takes over. Truman calls you to join him in the rigging, and you climb up with a will.\n\t\n\tUp there, the creaking of the mast is a song, and the wind is greater while the ship is smaller.\n\t*if morality >49\n\t\t\"I love you,\" he says simply. \"You make me remember that piracy isn't what I was made for.\"\n\t\t\n\t\t\"Do you think you can make a different life one day?\" you ask him.\n\t\t\n\t\t\"With a bit of gold, and with you?\" he says. \"Of course.\"\n\t\t*goto d\n\t*else\n\t\t\"I saw what you did,\" he says. \n\t\t\n\t\t\"Being heroic?\" you ask hopefully.\n\t\t\n\t\t\"No,\" he says. \"Throwing people overboard.\"\n\t\t\n\t\t\"To distract the mermaids,\" you say weakly, wondering when your own voice grew so thin.\n\t\t\n\t\tHe doesn't speak.\n\t\t\n\t\t\"It's over between us, isn't it?\" you ask.\n\t\t\n\t\t\"Yes.\"\n\t\t\n\t\tYou climb away from him in silence and join the others on deck.\n\t\t*goto d\n*else\n\t\n*label d\n\nThe crew is shaken, and several are gone forever. $!{janename} whittles a doll out of wood and releases it into the sea to commemorate $!{bobname}. Truman stands alone at the stern and weeps as three other dolls are made one by one and dropped overboard to disappear into the white wake. The last is a block, with eyes drawn on. You don't even know who is being mourned, but it was Truman himself who attempted to make the figure. He doesn't even own a knife, and you suspect he didn't know the dead person. If anyone would mourn a loner, it's Truman.\n\t\nYou make yourself scarce, guiltily glad that no one you care about was lost.\n*if filth > 1\n\t*set filth %+10\n\t*set health %-10\n\t*goto_scene ss7\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n\t*goto_scene ss7\n*else\n*goto_scene ss7\n", "ss7": "The crew toasts to long lives and blue skies every night at dinner, determined to put on a brave face. \n\nOne night you're on the bridge watching a glorious sunset, saddened that the brilliant red only reminds everyone of the gory deaths you witnessed so recently. The ocean looks like blood. \n\nHow much do you drink this time?\n*choice\n\t#None for me thanks. I’d like to keep my wits about me.\n\t\t*set sober %+10\n\t\t*goto party\n\t#A few, since you’re offering. I admit I’m a little shaken. \n\t\t*set sober %-10\n\t\t*set truthfulness %+10\n\t\t*if sober > 50\n\t\t\tIt's more than you usually drink, but who cares? You're safe now!\n\t\t\t*set drunk true\n\t\t\t*goto party\n\t\t*else\n\t\t\t*goto party\n\t#Keeping drinking until the rum is gone. There’s nothing to worry about now we’ve gotten past those mermaids. \n\t\t*set sober %-20\n\t\t*set skepticism %-10\n\t\t*set drunk true\n\t\t*achieve rumgone\n*label party\n\nThe party is still in full swing three nights later, and you’re \n*if drunk = true\n\t*set swordfighting %-20\n\t*set brawling %-20\n\t*set gun_fu %-20\n\t*set magical_skill %-20\n\tthoroughly drunk and gulping the very last dregs of your rum when Truman yells, \"Fleet to starboard!\"\n\t*goto attacked\n*else\n\tbeginning to regret not being utterly drunk when Truman yells, \"Fleet to starboard!\"\n*label attacked\n\nYou rush to the starboard rail and peer into the darkness. There are a terrifying number of red lights glimmering like deadly fireflies against the black. Your stomach turns, and for a moment, you think you're about to empty your stomach over the railing like you did as a tiny seasick child on your first slave ship.\n\nThere's only one pirate with so many ships: Captain Graves.\n\nYou yell a warning and run for your weapons, breaking up a twelve-person wrestling match and two friendly swordfights on your way. \n*choice\n\t*selectable_if (smith = 1) #Use my feelsmith magic to get everyone up and moving.\n\t\t*set magical_skill %+10\n\t\t*goto next\n\t*selectable_if (smith = 2) #Use my healsmith magic to get people sober fast.\n\t\t*set magical_skill %+10\n\t\t*goto next\n\t*if (bloodhere = 1) #Yell for Captain Blood. We'll need her authority and brains.\n\t\t*set captain_blood %+10\n\t\t*goto next\n\t#Make sure Firebird knows who's coming. She's our best fighter.\n\t\t*set firebird %+10\n\t\t*goto next\n*label next\n\t\t\nIt's no use. The ship is in chaos, and there's no time to be proactive. There are bodies sprawled everywhere in a horrible foreshadowing of the near future.\n\nYou deliberately kick at bare legs as you jump over them, shouting that Captain Graves and his fleet are coming. It's hard to focus with your heartbeat pounding in your ears, but you force yourself to slow down and make sure as many people as possible are pulled out of their stupor. Not everyone has to die.\n\nBefore you reach the closest hatch, Truman is scrambling across the rigging unfurling sails in the desperate hope you can outmaneuver the superior force. You grab a pair of crew and send them into the ropes, telling them to stay there and obey Truman unless ordered elsewhere.\n\n*if bloodhere = 1\n\tCaptain Blood is already at the railing of her ship, grim-faced. She knows who's coming for you. \"How many ships does he have?\" she calls to you.\n\n\t\"Six,\" you say without glancing around. You've made it your business to keep track of Captain Graves, and your latest intelligence is less than a month old. \"Unless his runaway feelsmith took one. Or he's gained more lately.\"\n\n\t\"Good. Being a fleet of six should slow him down. This is our plan: we'll cut through the middle of his fleet, whether there's a gap for us or not. All guns firing, of course, and if we're very lucky we'll slow them down more than they slow us. Then we'll sail on, if they let us.\"\n\n\t\"A bold strategy,\" you yell back, \n\t*if (knowbloodquickensmith=1) and (bloodhere=1)\n\t\tglad to have her quickensmith magic on hand.\n\t\t*goto broadside\n\t*else\n\t\twishing there were more quickensmiths among the crew.\n\t\t*goto broadside\n*else\n\tThe relatively sober shift leader is already coming to meet you, grim-faced. \"How many ships does he have?\" \n\n\t\"Six,\" you say, without glancing around. You've made it your business to keep track of Captain Graves, and your latest intelligence is less than a month old. \"Unless his runaway feelsmith took one. Or he's gained more lately.\"\n\t\n\tHe tugs at his beard, waiting for you to come up with something less terrifying.\n\n\t\"Being a fleet of six should slow him down,\" you tell him quickly. \"This is our plan: we'll cut through the middle of his fleet, whether there's a gap for us or not. All guns firing, of course, and if we're very lucky, we'll slow them down more than they slow us. Then we'll sail on—if they let us.\"\n\t\n\tHe tips his hat, but it's clear from his face he thinks it's a terrible plan. \"I'll spread the word.\"\n*label broadside\n\nThere's not much time left.\n*choice\n\t#I check and prime the cannons.\n\t\t*set gun_fu %+10\n\t\t*goto battle\n\t*selectable_if (smith = 3) #I use my quickensmith magic to speed up the ship. \n\t\t*set magical_skill %+10\n\t\tYou can feel the ship responding to your magic, growing sleeker and faster. It might just save your life.\n\t\t*goto battle\n\t#I kiss the one (or ones) I love.\n\t\t*if blood_love = 1\n\t\t\t*set captain_blood %+10\n\t\t\tYou kiss Captain Blood until she shoves you away. \"Enough of that nonsense now,\" she says with a grin.\n\t\t\t*if smith = 1\n\t\t\t\n\t\t\t\tYour fear of Captain Graves lowers your usual magical defense, and you accidentally feel what Captain Blood is feeling: a wild joy. Her reckless glee is more intoxicating than any amount of rum, and you're suddenly ready to take on any enemy with your bare hands.\n\t\t\t\t\n\t\t\t\t*set brawling %+10\n\t\t\t\t*goto jalu\n\t\t\t*if smith = 2\n\t\t\t\tYour fear of Captain Graves lowers your usual magical defense, and you accidentally saw Captain Blood's speeding heart rate and breathless warmth. She's more turned on by the coming fight than by any kiss you could give her. You can't help feeling both offended and invigorated. \n\t\t\t\t\n\t\t\t\t*set captain_blood %-10\n\t\t\t\t*set brawling %+10\n\t\t\t\t*goto jalu\n\t\t\t*else\n\t\t\t\t\n\t\t*label jalu\t\n\t\t*if jalu_love=1\n\t\t\t*set jalu %+10\n\t\t\tYou go below and wake Jalu.\n\n\t\t\t\"What's wrong?\" he says, evidently reading your face like a map. \"Has he found us already?\"\n\t\t\t\n\t\t\t\"Captain Graves?\" you say. \"Yes, but how did you—\"\n\t\t\t\n\t\t\t\"No time to explain,\" he says. \"But we're not as outnumbered as you probably think.\"\n\t\t\t\n\t\t\t\"Should I tell the others that you have something up your sleeve?\"\n\t\t\t\n\t\t\t\"Not yet. But I imagine our illustrious captain has given orders by now.\"\n\t\t\t\n\t\t\tYou outline the battle plan.\n\n\t\t\t\"Good,\" he says, and kisses you. You're surprised to find no trace of rum on his breath, as if he didn't drink at all.\n\t\t\t*if smith = 1\n\t\t\t\n\t\t\t\tYour fear of Captain Graves lowers your usual magical defense, and you accidentally feel what Jalu is feeling: relief. As if he's been waiting to battle Captain Graves for weeks.\n\t\t\t\t\n\t\t\t\tThere's no time to figure out how to ask him what he knows. Taking a deep breath, you head back up on deck.\n\t\t\t\t*set jalu %+10\n\t\t\t\t*goto firebird\n\t\t\t*elsif smith = 2\n\t\t\t\tYour fear of Captain Graves lowers your usual magical defense, and you accidentally see Jalu's rock-steady heartbeat. He isn't afraid at all. That steadiness calms you, and you head back up on deck.\n\t\t\t\t\n\t\t\t\t*set brawling %+10\n\t\t\t\t*goto firebird\n\t\t\t*else\n\t\t\t\tTaking a deep breath, you head back up on deck.\n\t\t*label firebird\n\t\t*if firebird_love=1\n\t\t\t*set firebird %+10\n\t\t\tYou spot Firebird in the pile of wrestlers comparing wounds and climb over several ex-merchants to plant a kiss square on her lips. \n\t\t\t\n\t\t\t*if smith = 1\n\t\t\t\tYou accidentally catch the sense of her mood. She's euphoric at the chance of fighting a real battle against terrible odds. It's as if she's a drunkard in need of more and more alcohol for the same high. You're unpleasantly reminded of other addicts' behavior, but even as you draw away from her, the enthusiasm in her small frame fills you with new energy and power.\n\t\t\t\t*set firebird %-10\n\t\t\t\t*set brawling %+10\n\t\t\t\t*goto grinner\n\t\t\t*elseif smith = 2\n\t\t\t\tYou accidentally catch a glimpse of her many injuries. Any normal person would want a healsmith's attention—or at least a pack of fresh bandages. Before you can help yourself, you lessen the worst of her recent injuries, wondering uneasily if she's really fit for a fight.\n\t\t\t\t*set brawling %-10\n\t\t\t\t*goto grinner\n\t\t\t*else\n\t\t\t*label grinner\n\t\t\tShe grins at you and spits out a tooth. \"I gather there's a proper fight coming.\"\n\t\t\t\n\t\t\t\"Captain Graves.\"\n\t\t\t\n\t\t\t\"This is it, then. Good.\"\n\t\t\t\n\t\t\tShe likes the recklessness of the plan and sorts her companions into gun crews at once.\n\t\t\t*goto trubaby\n\t\t*label trubaby\n\t\t*if truman_love=1\n\t\t\t*set truman %+10\n\t\t\t\n\t\t\tYou swing up into the rigging and kiss Truman with a softness that makes the coming battle seem far away. \n\t\t\t*if smith = 1\n\t\t\t\n\t\t\t\tYou accidentally feel what Truman is feeling: an overwhelming mixture of terror and trust. He knows he's no fighter, and he has consciously put his life in your hands. You draw courage from his faith in you.\n\t\t\t\t\n\t\t\t\t*set truman %+10\n\t\t\t\t*set brawling %+10\n\t\t\t\t*goto eyebrows\n\t\t\t*elsif smith = 2\n\t\t\t\tYou accidentally see the lung cancer poisoning Truman's every breath. No wonder he never learned to fight. He knew his body couldn't be trained out of its weakness. You can heal him, but not now: not when your life depends on being strong. \n\t\t\t\t\n\t\t\t\tIn your secret heart, you vow to live—and to give Truman his life too. You love him more than ever.\n\t\t\t\t\n\t\t\t\t*set brawling %+10\n\t\t\t\t*set truman %+10\n\t\t\t\t*goto eyebrows\n\t\t\t*else\n\t\t\t*label eyebrows\n\t\t\tHis eyebrows lift as you explain the plan, but he grasps the desperate wisdom of it immediately and leaps from rope to rope to tell the other riggers exactly what to do and when.\n\t\t\t\n\t\t\t*goto battle\n\t\t*elseif victim = 0\n\t\t\tIt's too late for love to blossom now. You might just end up in the sea's embrace before the next dawn touches the sky.\n\t\t\t*goto battle\n\t\t*else\n\t\t\t*goto battle\n\t#I order someone to sharpen my sword for me.\n\t\t*set swordfighting %+10\n*label battle\n\nYour breath comes short and sharp as the red-lit fleet of Captain Graves sails ever closer. It's hard to reconcile the death coming for you with the laughter of an hour earlier. \n*if drunk = true\n\n\tYou can tell your balance is off, which means all your magical and fighting skills are impaired as well. This is…not good.\n\t*goto notgood\n*else\n*label notgood\n*page_break\nIn the darkness you hear enemy voices jeering and chanting before you can see their faces. Then there's a flash of steel here and there. The swords already look bloody because of the red-hooded lanterns favored by Captain Graves when he's on the hunt. \n\nWhen you were young, everyone who was anyone used red lights. These days, Captain Graves reigns supreme. No one risks his anger by appearing to imitate his glory. He steals it all for himself.\n\nOne of the ships has blood-red sails. The sight fills you with a new wave of fury. He's stolen the iconic image of your beloved [i]Scarlet Sails[/i]. From now on, red sails will belong to him too—unless you defeat him tonight.\n\nHis own flagship is unmistakable: larger and sleeker than the rest and hung with real human leg-bones like a ghastly necklace. It leads the pack from the center. A hatefully familiar black-clad figure shouts orders from the bridge, and his nearest ships draw closer to him in response.\n\nNow you can see every face clearly and make out the exact words of their insults and threats. \n*if jaluhere = 1\n\tSome instinct makes you look around for Jalu, but he's nowhere to be seen. There's no time to seek him out. You're about to crash. On purpose.\n\t*goto seek\n*else\n\tYou're about to crash. On purpose.\n*label seek\n*fake_choice\n\t#I check my powder is dry, ready to fire across the water.\n\t\t*set gun_fu %+10\n\t#I draw my sword, ready for boarders.\n\t\t*set swordfighting %+10\n\t#I crouch by the bulkhead, waiting for my chance to kill Captain Graves myself.\n\t\t*set morality %-10\n\nMoments from impact, Captain Graves shouts a warning to his men, and his flagship crew produces long poles from the cannon ports. They push against their closest ally, preventing a collision between their own vessels. Your ship doesn't hit the flagship head-on but instead screeches along the side, sending people and splinters flying. \n\nYou're thrown headlong, but you keep hold of your weapon and jump to your feet just as your cannons send out their first fusillade, ripping into enemy ships on both sides. Only the flagship returns fire, and you realize the ship on your starboard side doesn't dare shoot you for fear of hitting Captain Graves.\n\nHe was not a forgiving master, as you recall.\n\nThe crew on the second ship of the enemy fleet abandons their vessel to board yours, knowing there are plenty of others to retrieve their blasted ship when the battle is done. You're instantly outnumbered, and in moments, you're fighting for your life. \n\nThe [i]Scarlet Sails[/i] bucks under you as the flagship's second round of cannon fire hits with devastating force. You hear shrieks from belowdecks, and it's impossible to know if your cannons will be able to fire a second time. An enemy crewman lands virtually at your feet, roaring in pain as his leg folds under him.\n*fake_choice\n\t#I lift him and throw him overboard in one movement.\n\t\t*set brawling %+10\n\t#I shoot him and then take his gun.\n\t\t*set gun_fu %+10\n\t#I run him through.\n\t\t*set swordfighting %+10\n\nYou dispatch him easily and straighten up so you have a clear view of the next attack. \n\nOn the opposite deck, Captain Graves stands with his hand raised in an ironic salute. His smile only widens as he recognizes you. You lift your pistol to fire, and he turns his back on you, revealing a heavy sheet of steel protecting his back from his crown to mid-thigh. It's no use wasting your shot.\n\nAll around you, the deck swarms with pirates screaming in rage, pain and hate as they do their best to kill one another. You fight hard, ignoring everything but the closest enemy. And then you no longer hear cannons, and there's an empty space beside you on the deck. A hand tugs you into a crouch.\n\nYou almost stab her in reflex before recognizing \n*if blooddead = 0\n\tCaptain Blood. \n\t*goto bombsaway\n*else\n\tFirebird. \"$!{blood_name} gave me this,\" she says.\n*label bombsaway\n\nShe thrusts a paper-wrapped bundle in your hands. It carries the burnt stench of tar and gunpowder. \"Kill that man,\" she says, well aware of your feelings about slave ships in general and Captain Graves in particular. \"No amount of armor can stop a bomb if you light it next to him.\" \n\n*if blooddead = 0\n\t*goto killblood\n*else\n*label yupyup\t\n*if hints = 1\n\n\t[i]To use the bomb effectively, you'll need a combined Brawling + Swordfighting score of over 70. Otherwise, you're better off on the[/i] Scarlet Sails[i] (you yellow-bellied maggot).[/i]\n*choice\n\t#I hurry to kill Captain Graves with the bomb. \n\t\t*if ((brawling + swordfighting) > 70)\n\t\t\t*set health %-20\n\t\t\t*set firebird %+10\n\t\t\t*set gun_fu %+10\n\t\t\tYou swing over to the enemy ship and fight your way through to Captain Graves, slashing at exposed skin and punching anyone who gets too close. Some of the faces are familiar, reminding you exactly how they treated a young slave who couldn't fight back. The captain's iron armor draws you like a magnet, and in moments, you're face to face.\n\t\t\t\n\t\t\t\"I do believe we've met before,\" he says. \"Let me guess, you've sworn vengeance on me for killing your father?\"\n\t\t\t\n\t\t\t\"No,\" you say, carefully holding the bomb behind your back and lighting it, hoping the fuse isn't too short or too long.\n\t\t\t\n\t\t\t\"Your mother?\" he says, obviously enjoying the fact that you're shorter than he is. \"Brother? Sister? Pet?\"\n\t\t\t\n\t\t\t\"I never swore vengeance on you,\" you say honestly. \"Once I got out of your clutches, I made my own life. A good one.\"\n\t\t\t\n\t\t\t\"And yet here you are, back in my clutches,\" he says smoothly. \"How sad.\"\n\t\t\t*fake_choice\n\t\t\t\t#\"At least I lived,\" I tell him.\n\t\t\t\t#\"Yes, Captain,\" you say and lower your head.\n\t\t\t\t#\"I came to warn you that Captain Blood made a bomb just for you.\"\n\t\t\tBefore turning to run, you give him the bomb like a gift.\n\t\t\t\n\t\t\tYou leap onto the rail, and your own ship is so close and so ragged that you can jump from one to the other.\n\t\t\t\n\t\t\tWhen you glance back at Captain Graves, he's walking toward the rail as well, about to calmly throw Captain Blood's bomb back onto her ship. You feel a flash of reluctant admiration before the bomb explodes in his hand, and you duck a shower of gory shrapnel. It's the last time Captain Graves will ever touch anyone.\n\t\t\t\n\t\t\tYou shake several pieces of dead pirate out of your hair and dive under a lifeboat for shelter until your ears stop ringing. \n\t\t\t\n\t\t\tThe ringing in your ears and the coating of blood reminds you all too well of the time you spent on Captain Graves's ship, and you shake with old fear even as you tell yourself over and over that he's dead and can never hurt anyone again. Half of his left hand has landed on the deck so close by that you can see one of the gold rings he loved so much. Just as three women rush for you at once, sensing easy prey, someone rings the ship's bell, and they fall over one another to look. [i]Ding-ding-ding! Ding-ding-ding![/i]\n\t\t\t\n\t\t\tYou glance over yourself and see \n\t\t\t*set gravesdead 1\n\t\t\t*if jaluhere = 1\n\t\t\t\tJalu at the bell. \n\t\t\t\t*goto captainjalu\n\t\t\t*else\n\t\t\t\tTruman at the bell. \n\t\t\t\t*label trumansavesyou\n\t\t\t\t\n\t\t\t\t\"Three cheers for Captain $!{name}!\" he cries at the top of his lungs. \"Captain Graves is dead!\"\n\t\t\t\t\n\t\t\t\tCaptain Graves's crew hesitates and then joins the cheering. \n\t\t\t\t\n\t\t\t\tTruman doesn't look surprised at their apparent change of heart. He understood their misery better than anyone and twisted it to your advantage! Your pet feelsmith has proven his worth a thousand times over. \n\t\t\t\t\n\t\t\t\t*if truman \u003c 50\n\t\t\t\t\tYou have a funny feeling he's given you the fleet in exchange for his freedom. Well, fine. He's a rubbish pirate anyway. In the meantime, he can do as he's told since he's the only trustworthy man around.\n\t\t\t\t\n\t\t\t\tYour first order is that the corpses and flag be removed from Graves's flagship, which the crew does gladly. The second is to make Truman your first mate. You know better than anyone that he's the best and bravest man around. Maybe one day, he can do what he really wants and give up piracy forever.\n\t\t\t\t\n\t\t\t\tIt's a strange feeling to own the ship that used to be your prison.\n\t\t\t\t*if jaluhere = 1\n\t\t\t\t\t*goto graves\n\t\t\t\t*else\n\t\t\t\t\t*set ranking 5\n\t\t\t\t\t*set ships_in_fleet +6\n\t\t\t\t\t*set rank \"Fleet Captain\"\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene ss8\n\t\t\t\t\n\t\t*else\n\t\t\tYou swing over to the bone-wreathed flagship and fight your way through the enemy crew, slashing at exposed skin and punching anyone who gets too close. Some of the faces are familiar, reminding you exactly how they treated a young slave who couldn't fight back. The captain's iron armor draws you like a magnet, but before you reach him, the bomb is knocked from your hand and rolls merrily away across the deck, plopping harmlessly into the sea.\n\t\t\t\n\t\t\tBefore you can escape, Captain Graves steps in front of you, and his sword is at your throat. \n\t\t\t\n\t\t\t\"I do believe we've met before,\" he says. \"Let me guess, you've sworn vengeance on me for killing your father?\"\n\t\t\t\n\t\t\t\"No,\" you say, trying to breathe normally instead of gasping with the certain knowledge you're about to die.\n\t\t\t\n\t\t\t\"Your mother?\" he says, obviously enjoying the fact that you're
