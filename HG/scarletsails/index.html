alu, but he's not there. $!{bobname} volunteers to fetch him and returns with both Jalu and Captain Blood.\n\t\t\t\n\t\t\t*goto jalu\n*label captain\nCaptain Blood orders you out of the way. It’s a good time to test the extent of Jalu's healing ability. \n\n*label jalu\nJalu reluctantly attempts to heal Firebird, who promptly kicks him in the shins for being worse than useless. She's right: there isn't the slightest evidence of healing. \n*if smith = 2\n\tYou heal her yourself before she gets properly annoyed or bleeds out. Either would be dangerous.\n\t*goto jalu2\n*else\n\tYou bandage her up as well as possible before she gets properly annoyed or bleeds out. Either would be dangerous.\n\n*label jalu2\nAs a result of his uselessness, Captain Blood chooses to make Jalu an object lesson about how replaceable everyone is. \n\nA fake magic user is incredibly rare, and only a desperate man or a moron would use such a method to get off Cutlass Island. Sooner or later, every secret gets revealed. The only thing more offensive than a rogue magic user is a fake one.\n*fake_choice\n\t#I give Jalu a sharp kick to make sure we're not seen as allies.\n\t\t*set jalu %-10\n\t#I say something positive about his usefulness in other areas.\n\t\t*set jalu %+10\n\t\t*set skepticism %-10\n\t#I keep quiet until I know what Captain Blood has planned for him. She's the boss.\n\t\t*set skepticism %+10\n\t\t*set captain_blood %+10\nHe’s forced to walk the plank for everyone else’s amusement. The crew laughs and jeers as he balances on the end of a wobbling plank pushed out over the water. Captain Blood leaves the crew to their fun, making it clear she doesn’t care if Jalu lives or dies—she owes him nothing.\n\nIf Jalu jumps into the sea quickly, he’ll be able to swim to a nearby island. Otherwise, he'll eventually fall and drown. \n\nHe refuses to jump, balancing carefully as the ship rocks with increasing force. Every minute reduces his chance of survival. Still, he appears confident, as if walking the plank is merely a stepping-stone to greatness. You're not entirely sure if you hate his guts or admire them.\n*choice\n\t#I kick the plank so he falls in, saving his life without making me look like a pushover. \n\t\t*set skepticism %+10\n\t\t*set morality %+10\n\t\t*set jalu %+10\n\t\t*if smith = 3\n\t\t\t*set magical_skill %+10\n\t\t\tYou yell, \"Watch this!\" and place your hands on the rail, becoming one with the ship as you prepare to move one precise part. The [i]Scarlet Sails[/i] is distractingly beautiful, and as you luxuriate in the sensation of water rushing past your bow, you realize someone is yelling and reluctantly return to your human body.\n\t\t\t*goto map\n\t\t*else\n\t\t\tYou yell, \"Watch this!\" as you climb the rope rail, ready to jump onto the near end of the plank.\n\t\t\t*goto map\n\t#I throw him something to help him swim back to shore.\n\t\t*set skepticism %-10\n\t\t*set morality %+10\n\t\t*set jalu %+20\n\t\tYou loosen the ropes lashing the plank in place and prepare to let it go. \"It ain't the [i]Scarlet Sails[/i], but one plank of wood's better than none.\"\n\t\t*goto map\n\t#I shoot him. \n\t\t*set morality %-10\n\t\t*set gun_fu %+10\n\t\t*set jalu %-20\n\t\tYou draw your gun and cock the hammer, sighting carefully since the ship is starting to roll with the ocean swells. Those around you cheer, fall silent, or suddenly vanish belowdecks depending on their inclinations.\n\t\t*goto map\n\t*selectable_if (gold > 2) #I organize bets on how long it’ll be until he falls. \n\t\t*set gold +9\n\t\t*set jalu %-10\n\t\t\"I'm taking bets,\" you say. \"Is he going to jump?\"\n\t\t\n\t\tA few of the crew back away, but most surge forward to place bets. A couple of those betting he'll stay on the plank until he faints with exhaustion shout insults at the related pair of new crew, who bet he'll jump off with plenty of time for a leisurely swim back to Cutlass Island. You're convinced he's too stubborn to jump.\n*label map\n\n\"Wait!\" Jalu says. \"You want me back on board.\"\n\n\"Oh, do we?\" says Firebird. \"Why's that?\"\n\nHe plants his feet more steadily and takes off his shirt, throwing it into the sea with casual disregard. Apparently he thinks his chest and abs are his ticket back on board—and he gives you just enough time to wonder if he's right before turning around to reveal the treasure map tattooed on his back. Ohh!\n*fake_choice\n\t#Treasure! Awesome!\n\t\t*set skepticism %-10\n\t#Ooh. Nice back muscles.\n\t\t*set jalu %+10\n\t#Is this a trick?\n\t\t*set skepticism %+10\nSomeone gasps. Everyone stares. More that one person unconsciously holds out their hands as if to pull Jalu back on board.\n\nYour heart skips a beat as you recognize one of the islands—and you know how to get to the right area. It's infamous for hidden reefs, which is why the reefs are outlined on the map—and why a pile of gold could be as safe there as on the ocean floor. The map may still be a fake, but it's the most plausible fake you've ever seen.\n\nJalu turns around, looking more self-satisfied than ever. \"Do we have a deal?\"\n\nYou shrug as if you're reluctant to even consider it, but your heart is hammering with excitement. Those who bet he'd jump for it give up their coins as if they already own plenty more.\n\nThe treasure hunt is on! With enough gold, you could rule the waves.\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss3\n*if filth > 2\n\t*set filth %+10\n\t*set health %-10\n\t*page_break\n\t*goto_scene ss3\n", "ss2b": "*set ships_in_fleet 1\n\nOnce you've sailed well away from the thrills and spills of Cutlass Island, life gets boring fast and people get twitchy. \n\nSoon, Firebird isn't the only one pulling out her sword at the slightest provocation. Captain Starboard weighs the sea anchor and declares that it's time to celebrate the new shipmates. You've never been celebrated before, and it's surprisingly enjoyable to be someone else's political tool. \n\nThere's plenty of rum on board, and any initial diffidence quickly falls away as the drunken celebration continues. Soon, things turn cheerfully rowdy, and Truman takes up a position in the crow's nest as much to protect himself from the general chaos as to keep watch for any potential threat from other pirates.\n\nYou go to the hold and bring up more rum bottles from the crate marked \"onions\". Pirates might have a life expectancy hovering right about your estimate of your own age, but they sure know how to party. \n\nSome people are practicing swordplay or running out the guns. Others are wrestling. Firebird has one of the new crew in a headlock while she blocks the swords of two others. She’s laughing with joy, and definitely winning.\n\nWhat do you do for fun?\n*label fun\n*choice\n\t*selectable_if (sober > 30) #Drink some more. \n\t\tMmm, rum. Now this party's really getting started.\n\n\t\tWhat do you do next?\n\t\t*set sober %-10\n\t\t*goto fun\n\t#Run out the shiny new cannons. \n\t\tYou grab some powder and head belowdecks to set off some explosions. It's terribly relaxing. One of the barrels has a tendency to get blocked, so you make a note of it and check everything else is in order.\n\t\t*set gun_fu %+10\n\t\t*goto firebird\n\t#Wrestle with Firebird. \n\t\t*set firebird %+10\n\t\t*set brawling %+10\n\t\tFirebird always enjoys a friendly fight. You dive into the knot of combatants, pulling Firebird's plaited hair and punching her in the shins and back, feeling the ridges of her scars as thicker lines against your knuckles. \n\t\t*if smith = 1\n\t\t\tSince she doesn't mind wrestling with a feelsmith, you don't try and hide the confidence that washes over you as her delight in her own skill bleeds into your emotions.\n\t\t\t*set magical_skill %+10\n\t\t\t*goto she\n\t\t*if smith = 2\n\t\t\tSince she doesn't mind wrestling with a healsmith, you don't bother to hide the confidence that washes over you as the sense of her perfectly honed body bleeds into your awareness.\n\t\t\t*se holds out their hands as if to pull Jalu back on board.\n\nYour heart skips a beat as you recognize one of the islands. It so happens that you know how to get to the right area. It's infamous for hidden reefs—which is why the reefs are outlined on the map, and why a pile of gold could be as safe there as on the ocean floor. The map may still be a fake, but it's the most plausible fake you've ever seen.\n\nJalu turns around, looking more self-satisfied than ever. \"Do we have a deal?\"\n\nYou shrug as if you're reluctant to even consider it, but your heart is hammering with excitement. Those who bet he'd jump for it give up their coins as if they already own plenty more.\n\nThe treasure hunt is on! With enough gold, you could rule the waves.\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss3d\n*if filth > 2\n\t*set filth %+10\n\t*set health %-10\n\t*page_break\n\t*goto_scene ss3d\n", "ss2c": "Once you've sailed a full week without any sign of pursuit, you weigh the sea anchor and declare that it's time to celebrate the new ship. There's plenty of rum on board, and any initial diffidence quickly falls away as the drunken celebration continues. Soon, things turn cheerfully rowdy, and Truman takes up a position in the crow's nest as much to protect himself from the general chaos as to keep watch for any potential threat from other pirates.\n\nSome people are practicing swordplay or running out the guns. Others are wrestling. Firebird has $!{bobname} in a headlock while she blocks the swords of two others. She’s laughing for joy and definitely winning.\n\nWhat do you do for fun?\n*label fun\n*choice\n\t*selectable_if (sober > 30) #Drink some more. \n\t\tMmm, rum. Now this party's really getting started.\n\n\t\tWhat do you do next?\n\t\t*set sober %-10\n\t\t*goto fun\n\t#Run out the shiny new cannons. \n\t\tYou grab some powder and head belowdecks to set off some explosions. It's terribly relaxing. One of the barrels has a tendency to get blocked, so you make a note of it and check everything else is in order.\n\t\t*set gun_fu %+10\n\t\t*goto firebird\n\t#Wrestle with Firebird. \n\t\t*set firebird %+10\n\t\t*set brawling %+10\n\t\tFirebird always enjoys a friendly fight. You dive into the knot of combatants, pulling Firebird's plaited hair and punching her in the shins and back, feeling the ridges of her scars as thicker lines against your knuckles. \n\t\t*if smith = 1\n\t\t\tSince she doesn't mind wrestling with a feelsmith, you don't try and hide the confidence that washes over you as her delight in her own skill bleeds into your emotions.\n\t\t\t*set magical_skill %+10\n\t\t\t*goto she\n\t\t*if smith = 2\n\t\t\tSince she doesn't mind wrestling with a healsmith, you don't bother to hide the confidence that washes over you as the sense of her perfectly honed body bleeds into your awareness.\n\t\t\t*set magical_skill %+10\n\t\t\t*goto she\n\t\t*else\n\t\t\t*label she\n\t\t\tShe gives as good as she gets and more, grinning and insulting you between punches. At last, the two of you run out of breath and collapse on the warm planking of the deck. It's a good day, and you can feel the bruises swelling on your hands and face to prove it.\n\t\t\t*set brawling %+10\n\t\t\t*goto firebird\n\t#Grab a reasonably blunt sword and join the fray. \n\t\t*set swordfighting %+10\n\t\tKilling crew members is a waste of resources, so you're careful not to actually injure anyone—not badly—as you fight a friendly battle with one of the new crew. She's small, but she moves fast, dodging most of your attacks and slapping others away with her own sword. Her footwork is faster than thought, and you're distracted trying to emulate her skill. When she sees you looking down, she puts her blade to your neck and crows at her easy victory. You drop your sword in surrender and ask her for another bout. Flattered, she gives you a lesson.\n\n*label firebird\n\n*if sober \u003c 50\n\tWhen you're done, you stand still on the deck to enjoy the familiar sway of the sea, glancing up to check the sails are in order just as a freak wave hits. Like an idiot drunk, you stumble backward into Firebird, crushing her against another crew member. It wouldn't matter, except he's holding a naked sword, and it slices through Firebird's thigh. Her blood wells up, pouring in a red waterfall down her leg. \n\t*set firebird %-10\n\t*goto firebird2\n*else\n\tWhen you're done, you stand on the deck to enjoy the familiar sway of the sea, glancing up to check the sails are in order just as a freak wave hits. One of the crew stumbles forward and knocks Firebird over. It wouldn't matter, except he's holding a naked sword, and it slices through Firebird's arm. Her blood wells up, spreading out in an ominous red pool. \n\t\n*label firebird2\n\nThe edges of the bloody pool outline the grain of the wood perfectly. Firebird isn't laughing any more.\nWhat do you do?\n*choice\n\t*selectable_if (smith = 2) #Heal her using magic. \n\t\tWith Firebird's permission, you pull back the torn edges of her clothing and place your hands on either side of the wound, ignoring the blood. The broken skin knits together as you watch. Using magic is exhausting, but it's fascinating too. Someone goes and gets Jalu to assist.\n\t\t*set magical_skill %+10\n\t\t*set firebird %+10\n\t\t*goto jalu\n\t#Tear up some rags to help staunch the bleeding. \n\t\t*set skepticism %-10\n\t\t*set truthfulness %+10\n\t\t*set firebird %+10\n\t\tWith Firebird's permission, you carefully cut her ruined clothing away from the wound, ripping the cloth into rough strips. Together, you and Firebird press the makeshift bandage firmly against the wound.\n\n\t\tSomeone goes and gets Jalu, since he's a feelsmith.\n\t\t*goto jalu\n\t#Fetch help—if she just pays me three gold pieces. \n\t\t*set skepticism %+10\n\t\t*set gold +3\n\t\t*set firebird %-10\n\t\t\"I'll get Jalu for you,\" you tell Firebird. \"If you promise me three gold pieces for my trouble.\"\n\t\t\n\t\t\"Go then,\" she says through gritted teeth.\n\t\t\n\t\tYou jump up and scan the crowd for Jalu, sending $!{janename} to find him. $!{janename} returns with Jalu in tow. It's a good time to test the extent of your first mate's healing ability. \n\t\t*goto jalu\n\n*label jalu\nJalu reluctantly attempts to heal Firebird, who promptly kicks him in the shins for being worse than useless. She's right: there isn't the slightest evidence of healing. \n\nA fake magic user is incredibly rare, and only a desperate man or a moron would use such a method to get off Cutlass Island. Sooner or later, every secret gets revealed. The only thing more offensive than a rogue magic user is a fake one.\n*if smith = 2\n\tYou heal Firebird before she gets properly annoyed or bleeds out. Either would be dangerous.\n\t*goto jalu2\n*else\n\tYou bandage Firebird as well as possible before she gets properly annoyed or bleeds out. Either would be dangerous.\n\n*label jalu2\nJalu has just proven his incompetence in front of the entire crew. He's made you look like a fool. \n*fake_choice\n\t#Give him a sharp kick right away.\n\t\t*set jalu %-10\n\t\t*set morality %-10\n\t#Say something positive about his usefulness in other areas.\n\t\t*set jalu %+10\n\t\t*set skepticism %-10\n\t#Scan the crew's faces to gauge their mood.\n\t\t*set skepticism %+10\n\t\t*set killed %-10\n\t\t\nMost of the crew looks like they're itching to give Jalu a kick themselves. \n\nTruman is shaking in fearful anticipation of further violence. He's not wrong.\n*label borednow\n*choice\n\t*hide_reuse #Make Jalu walk the plank. He can swim back to shore from here, and no one's worse off.\n\t\t*set skepticism %-10\n\t\tYou force him to walk the plank for everyone’s amusement. The crew laughs and jeers as he balances on the end of a wobbling plank stretched out over the water. \n\n\t\tIf Jalu jumps into the sea quickly, he’ll be able to swim back to land. Otherwise, the sea will get rougher, and eventually he'll fall and drown. \n\n\t\tHe refuses to jump, standing carefully as the ship rocks with increasing force. Every minute reduces his chance of survival. Still, he appears confident, as if walking the plank is merely a stepping-stone to greatness. You're not entirely sure if you hate his guts or admire them.\n\t\t*choice\n\t\t\t*selectable_if (gold > 2) #Organize bets on how long it’ll be until he falls. \n\t\t\t\t*set gold +9\n\t\t\t\t*set jalu %-10\n\t\t\t\t\"I'm taking bets,\" you say. \"Is he going to jump?\"\n\t\t\t\t\n\t\t\t\tA few of the crew back away, but most surge forward to place bets. A couple of those betting he'll stay on the plank until he faints with exhaustion shout insults at $!{bobname} and $!{janename}, who bet he'll jump off with plenty of time for a leisurely swim back to Cutlass Island. You're convinced he won't jump.\n\t\t\t\t\n\t\t\t\t$!{bobname} starts getting restless, and you might have to shoot Jalu—if only to make sure you don't lose your bet.\n\t\t\t\t\n\t\t\t\t\"Wait!\" Jalu says. \"You want me back on board.\"\n\n\t\t\t\t\"Oh, do we?\" says Firebird. \"Why's that?\"\n\n\t\t\t\tHe plants his feet more steadily and takes off his shirt, throwing it into the sea with casual disregard. \n\t\t\t\t\n\t\t\t\tThere on his naked back is a tattoo of a map. A treasure map.\n\t\t\t\t\n\t\t\t\tThose who bet he'd jump for it give up their coins at once, as cheerful as if they already own plenty more.\n\t\t\t\t*goto map\n\t\t\t#This is taking too long. I can fix that.\n\t\t\t\t*goto borednow\n\t#\"It's time for a keelhauling.\"\n\t\t*set gun_fu %+10\n\t\t*set jalu %-20\n\t\t\"It's time for a keelhauling!\" you announce.\n\n\t\tThose around you cheer, fall silent, or suddenly vanish belowdecks, depending on their inclinations. Generally, the first mate would fetch a good strong rope, but Jalu is unlikely to cooperate with his own maiming or death as he's pulled underwater from one side of the ship to the other. You signal to $!{bobname} to make the arrangements.\n\t\t\n\t\t\"Don't damage me!\" Jalu says. \"Take off my shirt!\"\n\t\t\n\t\tYou raise one eyebrow. \"Now is not the time.\"\n\t\t\n\t\tHe reaches for his buttons and unfastens them one by one, never taking his eyes off your face. Apparently, he thinks his chest and abs are his ticket back on board—and he gives you just enough time to wonder if he's right before turning around to reveal the treasure map tattooed on his back. Oh. That makes more sense.\n\t\t*goto map\n\t#Have Jalu whipped and then everyone can get back to work.\n\t\t\"There's a cat o'nine tails under the map table,\" you say, turning to Firebird to have her fetch it. She's trembling with sudden fear, and you realize uncomfortably that she's been whipped before, possibly as a child and definitely as a slave. A sudden flashback of the smell of your own broken flesh makes you pause. It was coppery and salty, always underlined by the smell of your own terrified piss. \"Go get it, $!{janename}.\"\n\t\t\n\t\tYou tie Jalu upright to the mast, surprised at the steadiness of your hands. \"This is all so familiar,\" you tell Jalu, choosing not to mention that you were always the one being tied up until now. \"Captain Graves taught me himself.\"\n\t\t\n\t\tHe jerks back in the ropes and stares at you in real terror. \"You knew him?\"\n\t\t*fake_choice\n\t\t\t#\"Not willingly.\"\n\t\t\t\t*set skepticism %-10\n\t\t\t#\"He trained me, and you're about to feel the benefit.\"\n\t\t\t\t*set morality %-10\n\t\t\t#\"Depends who's asking.\"\n\t\t\t\t*set skepticism %+10\n\t\t\"I'm Kallin Graveson,\" he says, and you can see how hard it is for him to share his secret. \"Or at least, that's what I once was. If you want to stop Captain Graves, I can help.\"\n\t\t\t\n\t\t\"Nonsense,\" you say.\n\t\t\t\n\t\t\"I can prove it,\" he says, with his usual confidence. \"Take off my shirt…but you may want to take me to your cabin first.\"\n\t\t\t\n\t\t\"I'm not in the mood,\" you say drily, but you unfasten his shirt anyway, since it's a shame to have it ripped and bloody. Apparently, he thinks his chest and abs are his ticket back into favor—and he gives you just enough time to wonder if he's right before he twists in his bindings, revealing the treasure map tattooed on his back. Ah!\n\t\t*set knows_about_jalu_name 1\n*label map\n\n*fake_choice\n\t#Treasure! Awesome!\n\t\t*set skepticism %-10\n\t#Ooh. Nice back muscles.\n\t\t*set jalu %+10\n\t#Is this a trick?\n\t\t*set skepticism %+10\nSomeone gasps. Everyone stares. More than one person unconsciously holds out their hands as if to save him themselves.\n\nYour heart skips a beat as you recognize one of the islands and realize you know how to get to the right area. It's infamous for hidden reefs, which is why the reefs are outlined on the map—and why a pile of gold could be as safe there as on the ocean floor. The map may still be a fake, but it's the most plausible fake you've ever seen.\n\nJalu turns around, looking more self-satisfied than ever. \"Do we have a deal?\"\n\nYou shrug as if you're reluctant to even consider it, but your heart is hammering with excitement.\n\nThe treasure hunt is on! With enough gold, you could rule the waves.\n\n\"One more thing,\" says Jalu with that same arrogant grin. \"I challenge you for captaincy of this vessel. You choose the test.\"\n\n\"And when you fail?\" you ask, stunned into foolishness by his audacity—and realizing an instant too late that you just agreed to his challenge.\n\n\"You win my share of the treasure,\" he says.\n\n\"Very well,\" you say evenly, ignoring the sensation that the ship just dropped out of existence beneath you. \"Let's duel.\"\n*set blood_name \"Jalu\"\n*set stowaway 1\n*set golden 3\n*set alreadyinchapterfour 0\n*set captaincyindanger 1\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss4a\n*if filth > 2\n\t*set filth %+10\n\t*set health %-10\n\t*page_break\n\t*goto_scene ss4a\n", "ss2d": "*set alreadyinchapterfour 0\nOne of the crew members is so big he has to duck coming in the door. The quickensmith brand on his hand indicates that anything he can't move with brute force will still fall to his magic. You shift politely out of his way and hope he doesn't dislike stowaways.\n\nInstead, his gargantuan face splits in a delighted grin. \"New crew!\" he booms, and then lowers his voice to a minor shout, evidently believing it to be a conspiratorial whisper. \"Don't worry if yer keelhauled. Big Eddy's gotcha covered. Practically no one dies of it now Big Eddy's aboard.\"\n\n\"Thank you, Big Eddy,\" Truman says gravely.\n\nThe big man nods and sets to his meal without any further explanation. \n\nLess than an hour later, Captain Starboard has the crew gathered on deck for the fun. \"You three make good cleaners, so I'll pick just one of you to take the punishment for stowing away. Who wants to volunteer?\"\n*fake_choice\n\t#\"I will,\" I say. \"This was my idea, and the others shouldn't suffer on my behalf.\"\n\t\t*set morality %+10\n\t\t*set firebird %+20\n\t\t*set truman %+30\n\t#I volunteer Firebird. She's tough.\n\t\t*set firebird %-10\n\t#I volunteer Truman. He's of no practical use to me.\n\t\t*set truman %-20\n\"Hah!\" says Captain Starboard. \"I do like to keelhaul the first to speak up. Congratulations, $!{name}. You're it.\"\n\nKeelhauling is a horrible way to die. You’ll be dragged under the ship, torn apart with a thousand jagged cuts from barnacles while unable to breathe or see.\n\nJalu shifts his feet, looking profoundly uncomfortable. If he doesn't want to watch you killed, perhaps he's not such a natural pirate after all. That's not necessarily a bad thing, when it's your life on the line.\n*choice\n\t#I appeal to him to intervene on my behalf.\n\t\t\"You were a slave two weeks ago, Jalu,\" you say evenly, guessing that an emotional outburst would only make him ignore you entirely. \"What are you going to do now you're in a position of power?\"\n\t\t\t\n\t\t\"Me?\" he says lazily, and his face is blank once more. \"Nothing. Keelhauling is your problem, not mine. The closest island is that way. Go ahead and jump overboard. It'll be a pleasant swim instead of a torturous death—but you'll need to be quick.\"\n\t\t\t\n\t\tAs he points to the blurry outline on the horizon, his arm knocks Captain Starboard's bare shoulder. He freezes in place for a tiny moment, and you see them both blink hard at the same time.\n\t\t\t\n\t\t\"How about I give you one more chance?\" says Captain Starboard.\n\t\t\t\n\t\tYou feel your eyes widen and you dip your head to hide the thoughts tumbling over each other in your mind. Captain Starboard is being merciful—after declaring your fate in front of the entire crew. That's not natural.\n\t\t\t\n\t\tJalu isn't a healsmith at all. He's a feelsmith who branded over his own mark. And if the crew realizes, they'll kill him. Is that why he altered his own mark? But why—\n\t\t\t\n\t\t[i]Oh telk. He's Kallin Graveson. He's the feelsmith who betrayed Captain Graves.[/i]\n\t\t\n\t\tBig Eddy grabs Jalu's wrist and squints at his mark. After a lengthy pause he says, \"I know who you are.\" Jalu tries to pull away, but Big Eddy barely even notices. \"I'm a nice guy, so I'm going to put you and your new friends in a boat rather than a grave.\"\n\t\t\n\t\t\"Thank you,\" said Jalu. \"If our paths cross again, I'll remember.\"\n\t\t\n\t\t\"Wait,\" said Firebird. \"Don't send us away! I can fight for you.\"\n\t\t\n\t\tBig Eddy throws Jalu overboard and then turns to Firebird. She snarls at him, but it's clear the crew is with him—even if they don't quite know why. So she jumps overboard, and you and Truman hastily follow her. The smaller of the ship's two lifeboats splashes into the sea a few minutes later, and the four of you climb aboard with difficulty.\n\t\t\n\t\t\"Don't worry,\" says Jalu, taking an oar and fitting it to the oarlock on his side of the boat. \"I have a plan.\"\n\t\t*fake_choice\n\t\t\t#\"It's going well so far,\" I say bitterly.\n\t\t\t\t*set skepticism %+10\n\t\t\t#I punch him in the face. Punching always helps me feel better.\n\t\t\t\t*set brawling %+10\n\t\t\t#\"Really?\" I say with genuine curiosity. \"What is it?\"\n\t\t\t\t*set skepticism %-10\n\t\tJalu grins, and lets go of the oar to remove his shirt. He certainly does have a toned chest, but somehow that doesn't matter much when you're marooned. Then he turns around, and you see it: a treasure map tattooed into his back.\n\t\t*set knows_about_jalu_name 1\n\t\t*set knows_about_jalu_feelsmith 1\n\t\t*set jalu %+10\n\t\t*gosub mapbit\n\t\t*goto_scene marooned\n\t#I signal Truman to use his magic in combination with mine.\n\t\t*set magical_skill %+10\n\t\tLooking at Truman, I touch the back of my hand to indicate that I think we should band together and use our magic to get us out of this mess. He covers his own brand and shakes his head sharply, which immediately draws Captain Starboard's attention. \n\t\t\n\t\t\"What's this?\" she says. Her parrot hears the tension in her voice and lands on her shoulder to glare at Truman. \"Are you trying to use your magic to get out of dying? And a feelsmith too!\" She pauses, and you have a horrible feeling you know exactly what she's going to say next. \n\t\t\n\t\t\"You're him,\" she breathes. \"You're Kallin Graveson, aren't you? I'm going to be rich!\"\n\t\t*set knows_about_jalu_name 1\n\t\t*set knows_about_jalu_feelsmith 1\n\t\t*choice\n\t\t\t#\"Yep, that's definitely Kallin Graveson,\" I say. \"I knew luring him aboard would be handy. He's all yours.\"\n\t\t\t\t*set truthfulness %-10\n\t\t\t\t*set truman %-30\n\t\t\t\t*set morality %-20\n\t\t\t\t*goto heaven\n\t\t\t#\"No!\" I shout. \"He's a nobody. I've known him more than a year, and he's not Kallin.\"\n\t\t\t\t*set truthfulness %+10\n\t\t\t\t*set truman %+10\n\t\t\t\t*goto heaven\n\t\t\t#\"Don't hurt him, please! Captain Graves would kill you rather than actually part with a hundred gold.\"\n\t\t\t\t*set skepticism %-10\n\t\t\t\t*set truman %+10\n\t\t*label heaven\n\t\tCaptain Starboard draws her pistol and aims it at Truman's heart. \"You might want to close your eyes for this,\" she tells him gently.\n\t\t\t\t\t\t\n\t\t\"No!\" says Jalu. \"He's not Kallin Graveson and I can prove it.\"\n\t\t\t\t\t\n\t\tTruman opens his eyes to stare at Jalu in confusion. \n\t\t\t\t\t\t\n\t\tCaptain Starboard doesn't lower her gun. \"I'm listening.\"\n\t\t\t\t\t\t\n\t\t\"I know he's not Kallin Graveson,\" Jalu says heavily, \"because I am.\"\n\t\t\t\t\t\t\n\t\tCaptain Starboard just laughs at him.\n\t\t\t\t\t\t\n\t\t\"Look!\" says Jalu. \"Look at my brand. I altered it to look like a letter H instead of an F. Who but Kallin Graveson would do that?\"\n\t\t\t\t\t\t\n\t\t\"All right then,\" she says, and turns the gun on him. \"Tell me what you stole from him.\"\n\t\t\t\t\t\t\n\t\tHe raises his hands, palms spread, showing that he's not carrying a gun of his own. Then he unbuttons his shirt and casually throws it over the closest rope rail.\n\t\t\t\t\t\t\n\t\tHe's still young, with no hair on his chest. The scars here and there only accentuate the firmness of his muscles. He pauses a fraction of a second to smirk at everyone's reaction to his physique, then turns away.\n\t\t\t\t\t\t\n\t\tThere on his back is a tattoo of a treasure map.\n\t\t*gosub mapbit\n\t\t\"All right then,\" says Captain Starboard to you. \"I'll challenge you. If you pass the test, I won't keelhaul you or your friends for stowing away. Does that sound fair?\"\n\n\t\t\"Absolutely!\" you say. \"Um. What test, exactly?\"\n\t\t*set blood_name \"Captain Starboard\"\n\t\t*if filth > 1\n\t\t\t*set filth %+10\n\t\t\t*page_break\n\t\t\t*goto_scene ss4a\n\t\t*if filth > 2\n\t\t\t*set filth %+10\n\t\t\t*set health %-10\n\t\t\t*page_break\n\t\t\t*goto_scene ss4a\n\t\t*else\n\t\t\t*page_break\n\t\t\t*goto_scene ss4a\n\t#I signal Firebird to join me in taking him hostage.\n\t\t*set gun_fu %+10\n\t\t*set firebird %+10\n\t\tShe gives you a smile and you know you're on. You grab your pistol and point it right at Jalu. Before you say a word, Firebird is behind him with the point of her sword pressed into the soft skin under his chin.\n\t\t\n\t\tMost of the crew takes a step back, but doesn't move so far that they miss out on the fun. Jalu swallows. Carefully.\n\t\t\n\t\t\"I like Jalu well enough,\" Captain Starboard says calmly, \"but he's just one person and you stowaways are far more trouble than I like. So you can kill him if you like, but all it'll do is make your own deaths less pleasant.\"\n\t\t\n\t\tFirebird appears distracted by Jalu's well-shaped rear. You're about to yell at her when she slices the shirt from Jalu as neatly as peeling a banana.\n\t\t\n\t\t\"I have something you might like,\" says Firebird. \"It's a gift, given in the confidence that you'll show appropriate appreciation to me and my friends.\"\n\t\t\n\t\tCaptain Starboard laughs at her confidence. \"Surprise me.\"\n\t\t\n\t\tFirebird spins Jalu around to reveal the treasure map tattooed onto his back.\n\t\t*gosub mapbit\n\t\t\n\t\t\"Well, well, well,\" says Captain Starboard, and her displeasure is forgotten as quickly as yesterday's storm. \"I might not have to bother keelhauling $!{name} after all. I'll give you a contest. If you can match or beat me, you can join the crew as an equal.\"\n\t\t\n\t\t\"And if I can't?\" I asked.\n\t\t\n\t\t\"You can still have that keelhauling you're trying so hard to earn.\"\n\t\t*page_break\n\t\t*goto_scene ss4a\n\n*label mapbit\n*fake_choice\n\t#Treasure! Awesome!\n\t\t*set skepticism %-10\n\t#Ooh. Nice back muscles.\n\t\t*set jalu %+10\n\t#Is this a trick?\n\t\t*set skepticism %+10\nYour heart skips a beat as you recognize one of the islands, and know how to get to the right area. It's infamous for hidden reefs—which is why the reefs are outlined on the map, and why a pile of gold could be as safe there as on the ocean floor. The map may still be a fake, but it's the most plausible fake you've ever seen.\n\nJalu turns around, looking more self-satisfied than ever. \"Who here likes treasure?\"\n\nYou shrug as if you're reluctant to even consider it, but your heart is hammering with excitement.\n\nThe treasure hunt is on! With enough gold, you could rule the waves.\n\n*return\n", "ss3": "*set blood_name \"Captain Blood\"\nJalu looks annoyingly relaxed despite his precarious position. \n\nYou need to exploit his physical vulnerability while you have it, or he'll keep his secrets in reserve for the next time he needs power. Although you'd hate to let that map go to waste, you want more information before you stick your neck out. \n\nIt occurs to you for the first time that although he's not a feelsmith, he is a male with straight hair. Perhaps you could alter his brand to look like an F. It's already so rough, you might be able to manage it. Maybe it's worth keeping him alive. Or maybe not.\n*fake_choice\n\t#Describe how I plan to kill him, cut the map off his back, and pickle it for convenient reference. I know exactly how.\n\t\t*set morality %-10\n\t\t*set truthfulness %+10\n\t\t*set jalu %-10\n\t\t\"Very pretty map,\" you tell him. \"I'll certainly keep the tattoo, although the rest of you isn't necessary.\"\n\t\t\n\t\tYou draw your sword and check that it's good and sharp. It is. \n\t\t\n\t\t\"The rest of you may want to step back,\" you say. \"Part one of tattoo removal is always messy.\"\n\t\t*goto key\n\t#Tell him the map is good enough to keep him on board—if he cooperates. \n\t\t*set truthfulness %+10\n\t\t*set skepticism %-10\n\t\t*set jalu %+10\n\t\t\"So far you've proved yourself worse than useless,\" you say. \"That map might save you, but only if you turn into a decent sailor the second your foot touches this deck. Otherwise, you can just—\"\n\t\t*goto key\n\t#Cut him until he gives me more information. \n\t\t*set swordfighting %+10\n\t\t*set morality %-10\n\t\t*set jalu %-10\n\t\tYou draw your sword and check that it's good and sharp. It is.\n\t\t\n\t\tFirebird braces the ship-side end of the plank while you step out onto it, adapting the usual guard position on the narrow and shaking perch. Jalu, to his credit, doesn't take a step backward—although it would have been funny to see him fall. When you're close enough, you smile nastily and lunge forward, cutting his bare arm neatly and drawing back before he even knows he's hurt.\n\t\t\n\t\t\"Don't you think this would be more interesting if I had a sword too?\" he says, pressing his other hand on the bloody cut.\n\t\t\n\t\tYou shrug. \"This isn't a fight. This is a conversation. I'm telling you to learn some respect. You're telling me more about that map.\"\n\t\t\n\t\tHe bites his lip, and you prepare to strike another blow.\n\n*label key\n\n\"Wait!\" he says. \"I'm useful to you in more ways than you know. You need me to interpret the symbols on the map. The island is guarded by a deadly reef, and the map's no good unless you know how to read it. Guarantee my safety on board, or I'm leaving.\"\n*page_break\n\"There are no guarantees at sea,\" you tell him.\n\n\"Your word will have to do,\" he says, keeping his tone just shy of sarcasm. His posture is loose-limbed and arrogant still, even on that little plank. He knows you're too much of a pirate to resist the chance at treasure.\n\n\"If we go to this island, and there's no treasure,\" you say, \"I'll throw you overboard myself.\"\n\nHe shrugs and steps back on board as casually as if his place were never in doubt.\n\n\"Go to the galley,\" you tell him. \"If there aren't any dishes for you to wash, you can scrub the deck.\"\n\nHe bobs his head in a mocking parody of a bow and goes to the closest ladder. Before he can disappear belowdecks, Captain Blood emerges from the same ladder. Her face darkens with rage at the sight of him, and she drags him back on deck with her as she approaches the gathered crew.\n\n\"Who let this vile creature back on board?\" she growls.\n*choice\n\t#\"I did, Captain,\" I say. \"He has a treasure map—and knows the key to interpret it.\"\n\t\t*set truthfulness %+10\n\t\t*goto blame\n\t#I quickly merge with the other crew members, hoping no one speaks up.\n\t\t*set truthfulness %-10\n\t\t\"It was $!{name},\" Jalu says calmly. \"Because ${he} knew you'd want to see my map.\"\n\t\t*goto blame\n\t#I grab a crew member by the ear and toss him at her feet to take the blame.\n\t\t*set morality %-10\n\t\t*if smith = 1\n\t\t\tYou're careful to shield your magic before you grab your victim. It's disorienting to sense how people feel about you, and you have no interest in his sense of betrayal. \n\t\t\t\n\t\t\tHe twists to glare up at you.\n\t\t\t\n\t\t\t*goto itwas\n\t\t*if smith = 2\n\t\t\tYou're careful to shield your magic before you grab your crew member. It's disorienting to feel pain as you create it, and you have no interest in having the experience of a twisted ear. \n\t\t\t\n\t\t\tHe turns to glare up at you.\n\t\t\t\n\t\t\t*goto itwas\n\t\t*else\n\t\t\tYou grab someone at random and toss him hard onto the deck. He turns to glare up at you, being smart enough not to verbally protest and get into a you said/he said shouting match.\n\n\t\t\t*label itwas\n\t\t\t\"It was $!{name},\" Jalu says calmly, ruining everything. \"Because ${he} knew you'd want to see my map.\"\n\n*label blame\n\nCaptain Blood's eyes brighten as Jalu turns to show her his tattoo, but when she drags him back to the ship's side, you know you're both in real trouble.\n\n\"Yes, we will investigate this map,\" she says, and the crew breaks out in smiles. \"But $!{name} has failed to see an order of mine fulfilled and must be punished. There are no exceptions.\"\n\nYour knees weaken as you remember writing the rules for discipline on board ship only days earlier. By now, everyone knows them by heart. \n\nNaturally, today is the day Captain Blood finally gets your name right.\n\n\"The punishment for disobeying me is keelhauling,\" says Captain Blood, deliberately releasing Jalu as she takes hold of you instead. \n\nIt’s a horrible way to die. You’ll be dragged under the ship, torn apart with a thousand jagged cuts from barnacles while unable to breathe or see.\n\n\"Cheer up,\" she tells you. \"I once met a man who survived it.\"\n\nHow do you try to save yourself?\n*if hints = 1\n\n\t[i]Hint time! How thrilled you must be that you're not facing a gory death without my timely assistance![/i]\n\n\t[i]Does Jalu like or dislike you, according to your stats page?[/i] \n\t\n\t[i]Does the crew and/or Truman want you killed in your sleep?[/i]\n\t\n\t[i]Are you good (that is, over 10%) at Magical Skill, Brawling, or Gun Fu? If not, stereotypical piracy is probably not a good long-term career for you.[/i]\n*choice\n\t#Appeal desperately to Jalu. \n\t\t*if jalu > 58\n\t\t\t\"I saved you, Jalu,\" you say evenly, guessing that an emotional outburst would only make him ignore you entirely. \"What are you going to do about it?\"\n\t\t\t\n\t\t\t\"Me?\" he says lazily. \"Nothing. Keelhauling is your problem, not mine. Cutlass Island is that way. Go ahead and jump. It'll be a pleasant swim instead of a torturous death—but you'll need to be quick.\"\n\t\t\t\n\t\t\tAs he points to the blurry outline on the horizon, his arm knocks Captain Blood's bare shoulder. He freezes in place for a tiny moment, and you see them both blink hard at the same time.\n\t\t\t\n\t\t\t\"How about I test you and keelhaul you if you fail?\" says Captain Blood to you.\n\t\t\t\n\t\t\tYou feel your eyes widen and you dip your head to hide the thoughts tumbling over each other in your mind. Captain Blood is being merciful—after declaring your fate in front of the entire crew. That's not like her. \n\t\t\t\n\t\t\tJalu isn't a healsmith at all. He's a feelsmith, who branded over his own mark.\n\t\t\t\n\t\t\t[i]Oh telk. He's Kallin Graveson. He's the feelsmith who betrayed Captain Graves.[/i]\n\t\t\t\n\t\t\tAnd stole his map.\n\t\t\t*set knows_about_jalu_name 1\n\t\t\t*set knows_about_jalu_feelsmith 1\n\t\t\t*goto success\n\t\t*else\n\t\t\t\"I saved you, Jalu!\" you say, grabbing his arm since that's all you can reach with Captain Blood holding you. \n\t\t\t*if smith \u003c3\n\n\t\t\t\tYou're careful to keep your magic from working, because you're uneasily certain that seeing more of him than his polished exterior would be a fatal error.\n\n\t\t\t\t*goto whhat\n\t\t\t*else\n\t\t\t\t*label whhat\n\t\t\t\tShaking him, you demand, \"What are you going to do about it?\"\n\t\t\t\t\n\t\t\t\t\"Me?\" he says lazily. \"Nothing. Keelhauling is your problem, not mine. That island over there looks adequate. Go ahead and jump. It'll be a pleasant swim instead of a torturous death—but you'll need to be quick about it.\"\n\t\t\t\t*goto fail\n\t#Appeal to the crew to make an exception under the circumstances. \n\t\t*if (killed \u003c 50) or (truman > 50)\n\t\t\tYou spread your arms as wide as you can while Captain Blood is gripping your shoulders. \"This treasure is for all of us, and everyone on board knows I made the right decision.\"\n\t\t\t\n\t\t\tTruman coughs carefully, sharpening the eerie silence. But first, he and then the others turn their eyes on Captain Blood. No one dares to speak, but their opinion is clear. The crew wants you to live.\n\t\t\t\n\t\t\t\"It's true that gold heals all wounds,\" says Captain Blood from behind you. \"Or most, in any case. I'll challenge you to a test, and if you pass, then I'll put off your keelhauling until we find Jalu's island. If it's empty, we'll keelhaul you then.\"\n\t\t\t*goto success\n\t\t*else\n\t\t\tYou spread your arms as wide as you can while Captain Blood is gripping your shoulders. \"This treasure is for all of us, and everyone on board knows I made the right decision.\"\n\t\t\t\n\t\t\tTruman coughs carefully, sharpening the eerie silence. He shuffles his feet but doesn't look up. Jalu winces sympathetically a moment before Captain Blood's fist connects with your back and you're thrown to the deck.\n\t\t\t*goto fail\n\t*selectable_if (smith = 1) #Use your magic to change her mind. \n\t\t*if (magical_skill > 10)\n\t\t\t*set jalu %+10\n\t\t\tThere's a worn-out seam on your right shoulder that means Captain Blood's iron grip is giving you magical access to her through the palm of her hand. You close your eyes to focus and desperately think kind thoughts at her.\n\t\n\t\t\t\"How about I test you and keelhaul you if you fail?\" says Captain Blood.\n\t\t\t\t\t\n\t\t\tYou feel your eyes widen, and you dip your head to hide the thoughts tumbling over each other in your mind. Captain Blood is suddenly being merciful. That's not like her. At all.\n\t\t\t\n\t\t\tIt worked.\n\t\t\t*goto success\n\t\t*else\n\t\t\tThere's a worn-out seam on your right shoulder that means Captain Blood's iron grip is giving your magic access to her through the palm of her hand. You close your eyes to focus and desperately think merciful thoughts at her.\n\t\t\t\n\t\t\tShe shakes you roughly and moves her hand. \"Don't try that on me again or I'll skip the keelhauling and just shoot you.\"\n\t\t\t*goto fail\n\t#Break free and fight.\n\t\t*if brawling >10\n\t\t\tYou manage to punch, bite, kick, and wriggle your way to freedom—of a sort. You're standing alone, but you're standing on the plank.\n\t\t\t\n\t\t\tCaptain Blood laughs. \"All right then, let's give you a test. If you best me, we'll save the keelhauling for another day. If the treasure's good enough, we might even skip it altogether.\"\n\t\t\t*goto success\n\t\t*else\n\t\t\tYou punch, kick, and bite, but all you get is a twisted arm.\n\t\t\t*goto fail\n\t#Shoot Jalu in the head to prove your loyalty to Captain Blood.\n\t\t*if gun_fu > 10\n\t\t\t\"My apologies, Captain,\" you say. You grab your gun, cocking and shooting it in one smooth motion.\n\t\t\t\n\t\t\tJalu stares at you, too shocked to feel the pain until the blood from his gunshot wound drips into his eyes. He covers that pretty face with his hands and runs for the railing as if the sea will somehow come to his aid.\n\t\t\t\n\t\t\tHe dies still clinging to the rail.\n\t\t\t\n\t\t\tCaptain Blood copies the map from his back, and throws Jalu away like a barrel of rotted meat.\n\t\t\t\n\t\t\t\"Good effort,\" she says to you. \"But you can't absolve disobedience to me so easily. If you want to avoid keelhauling, you'll have to pass a test.\"\n\t\t\t*set jaluhere 0\n\t\t\t*set jalu 0\n\t\t\t*set jaludead 1\n\t\t\t*goto success\n\t\t*else\n\t\t\t\"My apologies, Captain,\" you say, and grab your gun, cocking and shooting it in one smooth motion. The bullet flies wide, hitting the ocean somewhere too far away for your eyes to see. \n\t\t\t\n\t\t\tFirebird laughs at you good-naturedly, but Jalu doesn't take his attempted murder quite so lightly. You see a flash of true rage on his face and wonder if you've seen the real Jalu for the first time.\n\t\t\t*set jalu 0\n\t\t\t*goto fail\n\n*label success\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss4a\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss4a\n\n*label fail\n*set alreadyinchapterfour 1\n*set keelhaul 1\n*set blood_name \"Captain Blood\"\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene keelhauling\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n\t*page_break\n\t*goto_scene keelhauling\n", "ss3d": "*disable_reuse\n*set rank \"Crewman\"\nJalu looks annoyingly relaxed despite the fact he's still balanced on a single plank of wood above a hungry sea. \n\nYou need to exploit his physical vulnerability while you have it, or he'll keep his secrets in reserve for the next time he needs power. He has a map, but he doesn't captain this ship.\n*fake_choice\n\t#I describe how I plan to kill him, cut the map off his back, and pickle it.\n\t\t*set morality %-10\n\t\t*set truthfulness %+10\n\t\t*set jalu %-10\n\t\t\"Very pretty map,\" you tell him. \"I'll certainly keep the tattoo, although the rest of you isn't necessary.\"\n\t\t\n\t\tYou draw your sword and check that it's good and sharp. It is. \n\t\t\n\t\t\"The rest of you may want to step back,\" you say. \"Part one of tattoo removal is always messy.\"\n\t\t*goto key\n\t#I tell him the map might be good enough to stave off a keelhauling—if he cooperates. \n\t\t*set truthfulness %+10\n\t\t*set skepticism %-10\n\t\t*set jalu %+10\n\t\t\"So far you've proved yourself to be a thief and a liar,\" you say. \"My friends and I will keep a close eye on you and see if you're as useful as you say.\"\n\t\t*goto key\n\t#I cut him until he gives me more information. \n\t\t*set swordfighting %+10\n\t\t*set morality %-10\n\t\t*set jalu %-10\n\t\tYou draw your sword and check that it's good and sharp. It is.\n\t\t\n\t\tYou smile nastily and lunge forward, cutting his bare arm neatly and drawing back before he even knows he's hurt.\n\t\t\n\t\t\"Don't you think this would be more interesting if I had a sword too?\" he says, pressing his other hand on the bloody cut.\n\t\t\n\t\tYou shrug. \"This isn't a fight. This is a conversation. I'm telling you to learn some respect. You're telling Captain Starboard more about that map.\"\n\t\t\n\t\tHe bites his lip, and you prepare to strike another blow.\n\n*label key\n*page_break\n\"Wait!\" he says. \"I'm useful to you in more ways than you know. You need me to interpret the symbols on the map. The island is guarded by a deadly reef, and the map's no good unless you know how to read it. Guarantee my safety on board, or I'm leaving.\"\n\nYou raise one eyebrow but agree to let him live—for now.\n\n\"That will have to do,\" he says. His posture is loose-limbed and arrogant still. He knows you're too much of a pirate to resist the chance at treasure.\n\n\"If we go to this island and there's no treasure,\" you say, \"I'll throw you overboard myself.\"\n\nHe shrugs off the threat of keelhauling as casually as if his place were never in doubt.\n\nCaptain Starboard's parrot flutters down from the rigging, and you realize you've overstepped your rights. Sure enough, Captain Starboard is right behind you.\n\n\"Now that he's dealt with, what shall we do about you?\" she says to you. \"A crew member who failed to prevent this liar getting back onto my ship. How do you feel about being keelhauled?\"\n\n\"Uh…not good?\"\n\nHow do you try to save yourself?\n*if hints = 1\n\t[i]Hint time! How thrilled you must be that you're not facing a gory death without my timely assistance![/i]\n\t\n\t[i]Are you an honest person (don't lie to me; I can tell)? [/i]\n\t\n\t[i]Are you well liked by Truman and/or unlikely to be killed in your sleep? [/i]\n\t\n\t[i]If not, maybe marooning is for you.[/i]\n*choice\n\t#Appeal desperately to her better nature based on my trustworthiness.\n\t\t*if truthfulness > 50\n\t\t\t\"I never lied to you,\" you say, \"and I never will. Truman, Firebird, and I are an asset to any crew.\"\n\t\t\t\n\t\t\tShe grunts at your extraordinary claim, but you meet her eyes steadily, and you can see she believes you.\n\t\t\t\n\t\t\t\"Prove it,\" she says, and puts her gun away. \"I'll test you, and if you pass, then I won't keelhaul you.\"\n\t\t\t*goto success\n\t\t*else\n\t\t\t\"I never lied to you,\" you say, \"and I never will. Truman, Firebird, and I are an asset to any crew.\"\n\t\t\t\n\t\t\tShe grunts at your extraordinary claim, but you meet her eyes steadily.\n\t\t\t\n\t\t\t\"I think you're a liar,\" she says, and puts her gun away. \"Which isn't always a bad thing. If you survive being keelhauled, I'll keep you on.\"\n\t\t\t*goto fail\n\t#Appeal to the crew to make an exception under the circumstances. \n\t\t*if (killed \u003c 50) or (truman > 50)\n\t\t\tYou spread your arms as if giving the crew a gift. \"This treasure is big enough for all of us, and I can help you get it.\"\n\t\t\t\n\t\t\tTruman coughs carefully, sharpening the eerie silence. But first, he and then the others turn their eyes on Captain Starboard. No one dares to speak, but their opinion is clear. The crew wants you to live.\n\t\t\t\n\t\t\t\"It's true that gold heals all wounds,\" says Captain Starboard. \"Or most, in any case. I'll challenge you to a test, and if you pass, then we can save your keelhauling for after we find Jalu's island. If it's empty, we'll keelhaul you then.\"\n\t\t\t*goto success\n\t\t*else\n\t\t\tYou spread your arms as if giving the crew a gift. \"This treasure is big enough for all of us, and I can help you get it.\"\n\t\t\t\n\t\t\tTruman coughs carefully, sharpening the eerie silence. He shuffles his feet but doesn't look up. Jalu winces sympathetically a moment before Captain Starboard's fist connects with the back of your head and you're thrown to the deck.\n\t\t\t*goto fail\n\t#Suggest I get marooned instead.\n\t\t\"Why mess up your beautiful ship with my blood and guts?\" you say desperately. \"There's an island east of here. If you agree to send me there instead of killing me, I won't cause any trouble.\"\n\t\t\n\t\t\"Fine,\" she says. \"But you can take your friends with you.\"\n\t\t\n\t\t\"Wait,\" said Firebird. \"Don't send us away! I can fight for you.\"\n\t\t\n\t\tCaptain Starboard throws her overboard before she has a chance to fight back. You take the hint and dive overboard after her, moving aside as Truman quickly follows suit. The smaller of the ship's two lifeboats splashes into the sea a few minutes later, and the three of you climb aboard with difficulty. Truman even shouts a thank you back at the [i]Scarlet Sails[/i]. Captain Starboard laughs and drags Jalu away. A few minutes later, you see another person splash into the sea from the distant ship, and Truman makes you wait until a dripping Jalu catches up to you.\n\t\t\n\t\t\"She copied the map,\" he says with a scowl. \"Now I've got nothing.\"\n\t\t*goto_scene marooned\n*label success\n*if filth > 1\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss4a\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss4a\n*label fail\n*set alreadyinchapterfour 0\n*set keelhaul 1\n*if filth > 1\n\t*set filth %+10\n\t*goto_scene keelhauling\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n\t*goto_scene keelhauling\n", "ss4a": "*disable_reuse\n*comment blood, starboard or jalu - if jalu wins, he becomes captain and you're back to first mate.\n*set ships_in_fleet 1\n*if jaludead = 1\n\tYou stand next to the bloody mess Jalu left behind, trying desperately to get your head around your change in fortune.\n\t*goto bloodymess\n*else\n\tYou stand at the railing, trying desperately to get your head around your change in fortune.\n*label bloodymess\n*if marooned = 1\n\tYou don't recognize many of the crew members, but hopefully $!{bobname} and $!{janename} don't want you dead.\n\t*goto enjoy\n*else\n*label enjoy\n\n\"I so enjoy a challenge,\" says $!{blood_name}. \"So much so that I'll let you choose the type of contest from the standard \"Drink and/or Bleed\" range of challenges. After all, it's your life at stake.\"\n\nYou give a slight nod of gratitude, knowing babbled thanks would be unwelcome. \n\nAs always, Truman is the judge. No one else is as trustworthy.\n\n*if hints = 1\n\t[i]Where do your skills lie? Are you better at shooting, drinking, or stabbing? Or do you have no decent piratical skills whatsoever?[/i]\n*choice\n\t#\"I'm going to shoot you,\" I say evenly.\n\t\t\"You're going to try,\" your opponent retorts cheerfully. \"Glad to see you've got some guts. I hope you don't spill them on my nice shiny deck.\"\n\t\t\n\t\t*gosub betting\n\n\t\t*if jaluhere = 1\n\t\t\t*set jalu %+15\n\t\t*if (gun_fu >20) and (sober >49)\n\t\t\tBy mutual agreement, you and $!{blood_name} stand back to back beside the mainmast.\n\t\t\t\n\t\t\t\"How many paces?\" Truman asks.\n\t\t\t\n\t\t\tLooking down the ship, you know you won't get farther than twenty, so that's what you say.\n\t\t\t\n\t\t\t\"Good enough for me,\" $!{blood_name} says, and for the first time you hear the tiniest hint of fear in that unshakeable voice. \n\t\t\t\n\t\t\tFlintlocks aren't known for their accuracy, so it's possible neither of you will get shot. At least, that's what you tell yourself, pathetically grateful that your hands aren't actually shaking. Yet.\n\t\t\t\n\t\t\t\"Try not to hit any of my crew,\" $!{blood_name} says, cheerfully confident once more. \"Shall we?\"\n\t\t\t\n\t\t\t\"Yes,\" you say, and you feel the warmth of your enemy's back leave yours as you set off on your short walk.\n\t\t\t\n\t\t\tYou count twenty paces, focusing so desperately on the numbers you almost forget to turn and fire.\n\t\t\t\n\t\t\tIt's a sunny day, and the wooden stock of your pistol is a warm breath against your hand. You steady your own breath…and fire.\n\t\t\t\n\t\t\tThe [i]crack! crack![/i] of the two pistols is almost simultaneous.\n\t\t\t*page_break\n\t\t\t$!{blood_name} yelps with pain. Your musket ball actually hit! You brace for the searing pain of your own wound and—nothing happens.\n\t\t\t\n\t\t\tThe return shot missed.\n\t\t\t\n\t\t\tYou're alive.\n\t\t\t\n\t\t\tIt's over.\n\t\t\t*if betting=1\n\t\t\t\t*set gold +5\n\t\t\t\t\n\t\t\t\tYou collect your winnings and your congratulations as your whole body begins to shake.\n\t\t\t\t\n\t\t\t\t\"That went well!\" proclaims $!{blood_name}, slapping your back and absent-mindedly mopping at their own oozing blood. \"You won fair and square.\"\n\t\t\t\t*page_break\n\t\t\t\t*achieve gunduel\n\t\t\t\t*goto_scene ss4b\n\t\t\t*elseif betting_on_captain=1\n\t\t\t\tYou accept waves of congratulations as your whole body begins to shake.\n\t\t\t\t\n\t\t\t\t\"That went well!\" proclaims $!{blood_name}, slapping your back and absent-mindedly mopping at their own oozing blood. \"You won fair and square.\"\n\t\t\t\t\n\t\t\t\t\"You just lost five gold,\" says Firebird with a grin. \"Lucky you're alive to pay it.\"\n\t\t\t\t*set gold -5\n\t\t\t\t*page_break\n\t\t\t\t*achieve gunduel\n\t\t\t\t*goto_scene ss4b\n\t\t\t*else\n\t\t\t\t*page_break\n\t\t\t\t*achieve gunduel\n\t\t\t\t*goto_scene ss4b\n\t\t*if (gun_fu > 10) or (sober >49)\n\t\t\t*set alreadyinchapter e}, and for the first time you hear the tiniest hint of fear in that unshakeable voice. \n\t\t\t\n\t\t\tFlintlocks aren't known for their accuracy, so it's possible neither of you will get shot. At least, that's what you tell yourself, wishing your hands were steadier.\n\t\t\t\n\t\t\t\"Try not to hit any of my crew,\" $!{blood_name} says, cheerfully confident once more. \"Shall we?\"\n\t\t\t\n\t\t\t\"Yes,\" you say, and you feel the warmth of your enemy's back leave yours as you set off on your short walk.\n\t\t\t\n\t\t\tYou count twenty paces, focusing so desperately on the numbers you almost forget to turn and fire.\n\t\t\t\n\t\t\tIt's a sunny day, and the wooden stock of your pistol is a warm breath against your hand. You steady your own breath, and fire.\n\t\t\t\n\t\t\tThe [i]crack! crack![/i] of the two pistols is almost simultaneous.\n\t\t\t*page_break\n\t\t\t$!{blood_name} laughs as your shot goes wide. You wait for the searing pain of the return shot and—nothing happens. Then you realize something is very, very wrong with your leg.\n\t\t\t\n\t\t\tYou look down, and see a deep gash across your right shin, already streaming blood.\n\t\t\t\n\t\t\tYou lost.\n\t\t\t\n\t\t\tBut you're alive.\n\t\t\t\n\t\t\t*if captaincyindanger = 1\n\t\t\t\tBut you just lost your ship to Jalu.\n\t\t\t\t*set jalucaptain 1\n\t\t\t\t*set rank \"Crewman\"\n\t\t\t\t*set ranking 2\n\t\t\t\t*goto darvit\n\t\t\t*else\n\t\t\t\tBut now you're going to be keelhauled.\n\t\t\t*label darvit\n\t\t\t*set health %-10\n\t\t\t*if betting=1\n\t\t\t\t*set gold -5\n\t\t\t\t\n\t\t\t\tYou give up five gold as your whole body begins to shake. Truman is weeping quietly. He hates to see anyone hurt, but you hadn't realized you'd made such an impression. \n\t\t\t\t\n\t\t\t\t\"That went well!\" proclaims $!{blood_name}, slapping your back. \"Too bad for you, though, isn't it?\"\n\t\t\t\t*if captaincyindanger =1\n\t\t\t\t\t*goto_scene ss4b\n\t\t\t\t*else\n\t\t\t\t\t*goto_scene keelhauling\n\t\t\t*elseif betting_on_captain=1\n\t\t\t\tYou accept five gold in payment for your bet as your whole body begins to shake. Truman is weeping quietly. He hates to see anyone hurt, but you hadn't realized you'd made such an impression. \n\t\t\t\t\n\t\t\t\t\"That went well!\" proclaims $!{blood_name}, slapping your back. \"Too bad for you, though, isn't it?\"\t\n\t\t\t\t*set gold -5\n\t\t\t\t*if captaincyindanger = 1\n\t\t\t\t\t*goto_scene ss4b\n\t\t\t\t*else\n\t\t\t\t\t*goto_scene keelhauling\n\t\t\t*else\n\t\t\t\t\"That went well!\" proclaims $!{blood_name}, slapping your back. \"Too bad for you though, isn't it?\"\t\n\t\t\t\t\n\t\t\t\tYour whole body begins to shake. Truman is weeping quietly. He hates to see anyone hurt, but you hadn't realized you'd made such an impression. \n\t\t\t\t*if captaincyindanger = 1\n\t\t\t\t\t*goto_scene ss4b\n\t\t\t\t*else\n\t\t\t\t\t*goto_scene keelhauling\n\t#\"I can drink you under the table and still be ready for another round,\" I say boldly.\n\t\t*set truman %+10\n\t\t\"I'd like to see you try!\" $!{blood_name} shoots back.\n\t\t\n\t\t*gosub betting\n\n\t\t*if sober \u003c38\n\t\t\t*set alreadyinchapterfour 1\n\t\t\tTruman volunteers to fetch up his personal stores of rum. It probably has much less urine in it than you're used to, and it certainly tastes better. Who knew Truman had such excellent taste in rum? Or so much of it stashed away? You drink, and drink, and drink. \n\t\t\t\n\t\t\t\"I was born for this!\" you say, waving your next pint.\n\t\t\t\n\t\t\t\"Urg,\" says $!{blood_name}, and slides bonelessly to the deck.\n\t\t\t\n\t\t\tYou did it! The crew erupts in cheers, and you've never felt better. \n\t\t\t*set truman %+10\n\t\t\t*if betting = 1\n\t\t\t\t*set gold +5\n\t\t\t\tFirebird cheerfully gives you the five gold you've won.\n\t\t\t\t*page_break\n\t\t\t\t*achieve drinking\n\t\t\t\t*goto_scene ss4b\n\t\t\t*elseif betting_on_captain=1\n\t\t\t\tFirebird cheerfully collects the five gold you've lost.\n\t\t\t\t*page_break\n\t\t\t\t*achieve _name} grins at you and loosens up, letting the sword tip point at the deck. You know better than to trust that old trick, so when that sword swings upward at you, your own blade is already in place to knock it aside. Before $!{blood_name} can recover, you follow through with a sideways slash. \n\t\t\t\n\t\t\tTruman's gasp is clearly audible in the silence. You look at your sword, and the edge is red.\n\t\t\t\n\t\t\t$!{blood_name} raises the unmarked sword in surrender. \n\t\t\t\n\t\t\t\"You win!\" says Truman, and signals for bandages to be brought for $!{blood_name}.\n\t\t\t*if betting =1\n\t\t\t\t*set gold +5\n\t\t\t\tFirebird cheerfully gives you the five gold you've won.\n\t\t\t\t*page_break\n\t\t\t\t*achieve swordduel\n\t\t\t\t*goto_scene ss4b\n\t\t\t*elseif betting_on_captain=1\n\t\t\t\tFirebird cheerfully collects the five gold you've lost.\n\t\t\t\t*page_break\n\t\t\t\t*achieve swordduel\n\t\t\t\t*goto_scene ss4b\n\t\t\t*else\n\t\t\t\t*page_break\n\t\t\t\t*achieve swordduel\n\t\t\t\t*goto_scene ss4b\n\t\t*if (swordfighting > 20) or (sober >49)\n\t\t\t*set alreadyinchapterfour 1\n\t\t\t$!{blood_name} checks the edge of a new sword, and you can tell it's all about ensuring that it's sharp rather than hoping for nice safe bluntness. You make a show of checking your own sword edge, but you're so terrified you can't see straight. \n\t\t\t\n\t\t\tThere's only so long you can pretend to prepare. The crew backs off into a loose ring and an eerie hush falls. With no chances left, you widen your stance and set a guard ready. You know $!{blood_name} well enough to know your opponent will strike first.\n\t\t\t\n\t\t\tSure enough, $!{blood_name} grins at you and loosens up, letting the sword tip point at the deck. You know better than to trust that old trick, so when that sword swings upward at you, your own blade is already in place to knock it aside. Before $!{blood_name} can recover, you follow through with a sideways slash. \n\t\t\t\n\t\t\tTruman's gasp is clearly a lse\n\t*page_break\n*label yeehah\nThe show isn't over yet. You sense that your behavior in the aftermath of the upheaval will have an impact on your future, perhaps even on your survival.\n\n*if captaincyindanger = 1\n\tYou look straight at Jalu, and he smiles as if you're merely taking a cruise together. He won't hurt you if you won't hurt him, apparently. That's not the usual way of things at sea, but it'll do.\n*choice\n\t#I threaten everyone with violence to keep them in line. \n\t\t*gosub trial_end\n\t\t*set morality %-10\n\t\t*goto fin\n\t*selectable_if (gold > 5) #I bribe Firebird so she has my back against other crew members. \n\t\t*gosub trial_end\n\t\t*set gold -6\n\t\t*set firebird %+10\n\t\t*set skepticism %+10\n\t\t*set killed %-10\n\t\t*goto fin\n\t#I get back to a normal routine as quickly as possible. This will blow over.\n\t\t*gosub trial_end\n\t\t*set skepticism %-10\n\t\t*set truman %+10\n\t\t*goto fin\n\t*if (marooned = 1) #I recommend we follow and take over the [i]Scarlet Sails[/i].\n\t\t*gosub trial_end\n\t\t*page_break\n\t\t*goto_scene ss5b\n*label fin\n*if filth > 1\n\t*set filth %+10\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n*page_break\n*if marooned = 1\n\t*goto_scene ss5b\n*else\n\t*goto_scene ss5\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first four chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2025-05-08 $3.99 $2.99 purchased\n*abort\n", "ss5": "*if ranking \u003c 4\n\t*set noob 1\nThe following day, you wake up somewhat worse for wear, struggling to shake off nightmares of death by keelhauling. Unfortunately, it’s time to get back to work. \nWhat do you do next?\n*fake_choice\n\t#Trim the sails. \n\t\t*set truman %+10\n\t#Practice running out the cannons. \n\t\t*set gun_fu %+10\n\t#Swab the deck. You've seen what sickness on board can do.\n\t\t*set filth %-20\n\t\t*set health %+10\n\t#Do some magic training.\n\t\t*set magical_skill %+10\n\t\t\n*if captaincyindanger = 1\n\t*if jalucaptain = 1\n\t\t*set blood_name \"Captain Jalu\"\n\t\tCaptain Jalu makes you first mate and promises to give you a ship as soon as one is available. You get the feeling he knows something you don't. \n\t\t\n\t\tGenerally, captains who are overthrown get killed, so being demoted to first mate is more than you could have hoped for. It seems he actually finds you useful and doesn't particularly enjoy killing crew members. It's all very confusing—but better than being enslaved again. \n\t\t*set ranking 3\n\t\t*set rank \"First Mate\"\n\t\t*goto shift\n\t*else\n\t\t*set blood_name \"Jalu\"\n\t\tYou consider killing or marooning Jalu, but instead, you have Truman publicly read his emotions, checking for further mutinous thoughts. There are none. It seemed he's content to have rolled his dice and lost.\n\t\t\n\t\tThe crew is quietly impressed by the weight of the punishment, even though Jalu took it willingly. Being read by a feelsmith is an intensely exposing experience and a strange choice for such a private man.\n\t\t\n\t\tLater, Truman and Jalu have a lengthy private conversation regarding other things that Truman saw. Unfortunately, Truman's personal ethics prevent him from sharing the details of that conversation with you. You're briefly tempted to have Firebird punch Truman until he tells you everything he knows, but in the meantime, at least you're certain you won't have to duel Jalu a second time.\n\t\t*page_break\n\t\t*goto shift\n*else\n\n\tNow that the excitement's over, ship life returns to its normal rhythm. \n\t*if keelhaul = 1\n\t\t*goto shift\n\t*else\n\t\tYou're quietly pleased to see $!{blood_name} looking exhausted, but you're careful not to let it show on your face.\n*label shift\n\nWhen your shift is over, Truman joins you and $!{blood_name} in the map room, so called because it's dominated by an enormous table covered in maps held in place with dozens of tiny quickensmith-made clamps. \n\n$!{blood_name} lays a sketch of the treasure map over one of the navigational maps on the desk. The outline of the islands shows through clearly, and the maps don't line up.\n\n\"That would have been too easy,\" Truman mutters in the awkward silence. You can see he's concerned someone will lose their temper from the frustration.\n*choice\n\t#Ask if everyone would like to sit down now.\n\t\t*if blooddead = 0\n\t\t\t*set captain_blood %+10\n\t\t\t*goto siddown\n\t\t*else\n\t\t\t*if jaludead = 0\n\t\t\t\t*set jalu %+10\n\t\t\t\t*goto siddown\n\t\t\t*else\n\t\t\t\t*goto siddown\n\t#Touch Truman gently on the arm. As a feelsmith, he'd rarely receive human touch.\n\t\t*set truman %+10\n\t\t*goto siddown\n\t*if (jaluhere = 1) #Punch Jalu. That should make everyone feel better.\n\t\t*set brawling %+10\n\t\t*set jalu %-10\n*label siddown\n\n$!{blood_name} raises an eyebrow at you. You ignore the others and write a copy of the riddle encircling the treasure map. \n\n[i]You are many and I am none. When I am one you will be none. [/i]\n\t\n\"What do you think that means?\" you ask.\n\nNo one answers. The silence stretches out until it's time for a break.\n\nYou eat an excellent salad for lunch, thanks to the ship's fresh supplies. It's impossible to enjoy it while you're trying to think of what to say to prove your usefulness. \n*set health %+10\n*choice\n\t#I ask crew members for advice and pretend I came up with their ideas. \n\t\tNo one knows a thing, unfortunately.\n\t\t*set truthfulness %-10\n\t\t*set skepticism %-10\n\t\t*goto meeting\n\t#I make up an answer that at least gets us heading in the right direction. \n\t\tYou decide to spin some kind of answer interpreting \"none\" to mean \"not on known maps\" and say that your personal memory is the best existing guide.\n\t\t*set truthfulness %-10\n\t\t*goto meeting\n\t#I admit I don’t know the answer, but I know the worst reefs are north.\n\t\t*set truthfulness %+10\n*label meeting\n\nBack in the map room, Truman admits he doesn't know anything useful. \n*if jaludead = 0\n\tEven with the benefit of his feelsmithing, he's unable to get any more information from Jalu's mind except that the tattoo was done by Jalu's father, himself the son of an eyewitness to the treasure. It's good to have confirmation the map is real, but it hasn't gotten you any closer to the treasure. \n\t*goto sense\n*else\n*label sense\n\nYour sense of a general direction is good enough for the moment, and you hope you'll remember more details along the way. The last time you were in that part of the world, you were just a terrified child.\n*page_break\nThe ship's inner circle has one last brainstorm on the meaning of the riddle. \n\n[i]You are many and I am none. When I am one you will be none. [/i]\n\nIt seems clear that the “many” is talking about treasure seekers like you, so the final “none” could mean that you are no longer “seekers” when the treasure is found…or that finding the treasure gets you all killed.\n\nTruman asks you quietly if you're concerned about the deadly danger.\n*fake_choice\n\t#Nah. No life is worth much. Not even mine. Or yours.\n\t\t*set morality %-10\n\t#Nah. Nothing ever scares me.\n\t\t*set truthfulness %-10\n\t#Of course I'm scared. I hope this gold is worth it.\n\t\t*set truthfulness %+10\n\t\t*set truman %+10\n*page_break\nAfter some weeks of sailing, Truman gives a shout from the crow's nest as he spots an unescorted vessel on the horizon. $!{bobname} is on the bridge and immediately calls out orders to intercept. Everyone on board is delighted at the prospect of great wealth, a proper fight, or both. \n*if ranking \u003c4\n\tIf the new ship is captured, you'll be made captain at last. You and $!{blood_name} could be allies instead of continuing to pretend neither of you knows that you each want the [i]Scarlet Sails[/i] for yourself. \n\n\tOn the other hand, there might be someone on the other ship who can help you find the treasure. \n\nYou can use signal flags to communicate across the waves.\n\n*if hints = 1\n\t[i]Are you better at Treachery, Sweetness/Truthfulness, or Gun Fu?[/i]\n*choice\n\t#Fake scurvy so they draw closer, and we can take the ship whole.\n\t\t*if ((truthfulness \u003c40) and (gun_fu > 20))\n\t\t\t*set gun_fu %+10\n\t\t\t*set winner 1\n\t\t\tYou order Truman to fly the flags indicating non-infectious disease, and he adds an invitation to trade. He can lie quite fluently in semaphore. \n\n\t\t\tAs the other ship draws closer, you see it's a merchant vessel—with an unusually stupid captain. He's standing on the bridge in a crisp white uniform that's evidently designed to make him stand out. You snap out orders to your own crew to conceal their weapons and stop looking so much like a pack of pirates. They attempt to act respectable, and several break out in whistling. \n\t\t\t*fake_choice\n\t\t\t\t#I make a mental note not to rely on the crew's acting skills in the future.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note never to wear white.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note to learn how to whistle properly. It could be fun.\n\t\t\t\t\t*set skepticism %-10\n\t\t\t\n\t\t\tA member of the merchant's crew comes to greet you with one hand on the flintlock at her hip, but the captain waves her aside and greets you himself. \n\t\t\t\n\t\t\tYou draw and cock your weapon. \"Hello. I'm sorry to tell you this, but we're pirates. You're going to give us your ship, and we're going to give you your lives.\"\n\t\t\t\n\t\t\t\"Nonsense!\" he blusters. \"I have my own security on board. Besides, your men look more like slaves than killers.\"\n\t\t\t\n\t\t\t\"That's as may be,\" you say. \"But I can shoot you dead from here, so how much is your life worth?\"\n\t\t\t\n\t\t\t\"I don't believe you,\" he says with the last of his self-confidence.\n\t\t\t\n\t\t\tYou shoot carefully, and his hat goes flying backward. He screams in horror and pain and clutches at his head.\n\t\t\t\n\t\t\t\"Had enough?\" you ask, trying to keep the surprised delight from your voice. Those were the two best shots of your life! Maybe you should practice shooting more and get genuinely good.\n\t\t\t\n\t\t\tHis pants are suddenly wet through. He trembles as he draws a very shiny, very blunt dress sword from his belt and lays it on the deck. \"We surrender! Please don't kill me.\"\n\t\t\t*set ranking 4\n\t\t\t*set rank \"Captain\"\n\t\t\t*set ships_in_fleet 2\n\t\t\t*goto captaincy\n\t\t*else\n\t\t\t*set rank \"Captain\"\n\t\t\t*set ranking 4\n\t\t\t*set ships_in_fleet 2\n\t\t\tYou order Truman to fly the flags indicating non-infectious disease, and he adds an invitation to trade. He can lie quite fluently in semaphore. \n\n\t\t\tAs the other ship draws closer, you see it's a merchant vessel—with an unusually stupid captain. He's standing on the bridge in a crisp white uniform that's evidently designed to make him stand out. You snap out orders to your own crew to conceal their weapons and stop looking so much like a pack of pirates. They attempt to act respectable, and several break out in whistling. \n\t\t\t*fake_choice\n\t\t\t\t#I make a mental note not to rely on the crew's acting skills in the future.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note never to wear white.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note to learn how to whistle properly. It could be fun.\n\t\t\t\t\t*set skepticism %-10\t\n\t\t\t\n\t\t\tA member of the merchant's crew comes to greet you with one hand on the flintlock at her hip, but the captain waves her aside and greets you himself. \n\t\t\t\n\t\t\tYou draw and cock your weapon. \"Hello. I'm ever so sorry to tell you this, but we're pirates. You're going to give us your ship, and in exchange we're going to give you back your lives.\"\n\t\t\t\n\t\t\t\"Nonsense!\" he blusters. \"I have my own security on board. Besides, your crew looks more like slaves than killers.\"\n\t\t\t\n\t\t\t\"That's as may be,\" you say. \"But I can personally shoot you dead from here, so how much is your life worth?\"\n\t\t\t\n\t\t\t\"I don't believe you,\" he says with the last of his self-confidence.\n\t\t\t\n\t\t\tYou shoot carefully, meaning to hit his hat, but instead, your shot flies right past him and hits his first mate right in the forehead. She mouths obscenities at you as she dies. You're almost as badly startled as she is. \n\t\t\t\n\t\t\t\"Had enough?\" you ask the [i]Golden Boy[/i]'s captain, trying to keep the shock from your voice. You definitely need to practice your shooting before you try something like that again.\n\t\t\t\n\t\t\tHis pants are suddenly wet through. He trembles as he draws a very shiny, very blunt dress sword from his belt and lays it on the deck. \"We surrender! Please don't kill me.\"\n\t\t\t*goto captaincy\n\t#Suggest we peacefully combine forces to search for the treasure. \n\t\t*set morality %+20\n\t\t*set friendly 1\n\t\t*if (skepticism \u003c 40) or (truthfulness > 60)\n\t\t\t*set magical_skill %+20\n\t\t\tYou order Truman to fly the flags indicating an invitation to trade. As the other ship draws closer, you can see it's a merchant vessel—with an unusually stupid captain. He's standing on the bridge in a crisp white uniform that's evidently designed to make him stand out. You snap out orders to your own crew to conceal their weapons and stop looking so much like a pack of pirates. They attempt to act respectable, and several break out in whistling. \n\t\t\t*fake_choice\n\t\t\t\t#I make a mental note not to rely on the crew's acting skills in the future.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note never to wear white.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note to learn how to whistle properly. It could be fun.\n\t\t\t\t\t*set skepticism %-10\n\t\t\t\n\t\t\tA member of the merchant's crew comes to greet you with one hand on the flintlock at her hip, but their captain waves her aside and greets you himself. \n\t\t\t\n\t\t\t\"My name is $!{name},\" you say. \"I have a proposition for you. We have a treasure map and a well-armed crew. What we need is more information, and more manpower. If you'll join us for a perfectly legal expedition, you'll get richer than even you could have dreamed.\"\n\t\t\t\n\t\t\tHe stares at you for a long moment, and you begin to see that he's not as dumb as he looks. But he's definitely bored with his life.\n\t\t\t\n\t\t\t\"Yes,\" he says at last. \"You have a deal.\"\n\t\t\t*goto captaincy\n\t\t*else\n\t\t\tYou order Truman to fly the flags indicating an invitation to trade. As the other ship draws closer, you can see it's a merchant vessel—with an unusually stupid captain. He's standing on the bridge in a crisp white uniform that's evidently designed to make him stand out. You snap out orders to your own crew to conceal their weapons and stop looking so much like a pack of pirates. They attempt to act respectable, and several break out in whistling.\n\t\t\t*fake_choice\n\t\t\t\t#I make a mental note not to rely on the crew's acting skills in the future.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note never to wear white.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t#I make a mental note to learn how to whistle properly. It could be fun.\n\t\t\t\t\t*set skepticism %-10\n\t\t\t\n\t\t\tA member of the merchant's crew comes to greet you with one hand on the flintlock at her hip, but their captain waves her aside and greets you himself. \n\t\t\t\n\t\t\t\"My name is $!{name},\" you say. \"I have a proposition for you. We have a treasure map and a well-armed crew. What we need is more information and more manpower. If you'll join us for a perfectly legal expedition, you'll get richer than even you could have dreamed.\"\n\t\t\t\n\t\t\tHe stares at you for a long moment, and you begin to see that he's not as dumb as he looks. \n\t\t\t\n\t\t\t\"No,\" he says, and you realize his first mate is pointing her gun right at you. \"I don't know much, but I know better than to trust pirates.\"\n\t\t\t\n\t\t\tHe and his mate stay right where they are until the two ships are separate once more.\n\t\t\t\n\t\t\t$!{blood_name} appears beside you. \"Are you really going to let them go?\"\n\t\t\t\n\t\t\t\"No!\" you say, and snap out orders to attack. It's not what you wanted, but it will have to do.\n\t\t\t*goto broadside\n\t#Chase them down and broadside them until they surrender. \n\t\t*if gun_fu > 20\n\t\t\t*set gold +5\n\t\t\t*set rank \"captain\"\n\t\t\t*set ranking 4\n\t\t\tYou give the sails a proper airing and speed across the waves, laughing as you draw close enough to see their terrified faces.\n\t\t\t*if smith = 3\n\t\t\t\t*set gun_fu %+10\n\t\t\t\tYou're unable to resist slipping your awareness away from your physical self and into the ship. The [i]Scarlet Sails[/i] quivers with joy, speeding to the hunt like a kitten to her first mouse. It's all about skill and joy and death, and it's what she was made for. You pull back into yourself, but the smile stays on your face.\n\t\t\t\t*goto goldenboy\n\t\t\t*else\n\t\t\t\t*label goldenboy\n\t\t\t\tThe [i]Golden Boy[/i] has an unusually stupid captain, dressed all in white so he can't possibly hide from view. The [i]Scarlet Sails[/i] tips sharply as your crew brings her neatly alongside the merchant vessel and prepares to turn it to matchsticks. Your ship rights herself perfectly, and you feel her thrumming with energy beneath your feet.\n\t\t\t\t\n\t\t\t\t\"Surrender!\" you yell, remembering just in time that you intend to keep that ship for yourself. No need to break it if you don't have to.\n\t\t\t\t\n\t\t\t\t\"Never!\" someone shouts back, giving the lie to his words as he ducks below decks.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#I make a mental note never to rely on crewmen's acting skills.\n\t\t\t\t\t\t*
