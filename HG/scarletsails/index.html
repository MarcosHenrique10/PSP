 fight is still boiling all around you on the third floor, despite having calmed down elsewhere. Amid the broken glass and swearing pirates, the captain of the [i]Scarlet Sails[/i] is a sun-darkened whirlwind of flying fists and feet. Someone knocks off her hat, and she sends her parrot to peck at their face in retaliation. The bird and its victim both shriek fit to wake the dead. \n\nHow do you plan to steal her ship?\n*set knowsstarboard 1\n*choice\n\t#I tell my new crew members they have to fight for the ship to earn their place—and I’ll be right behind them with drawn sword. \n\t\t*set truthfulness %-10\n\t\t*set swordfighting %+10\n\t\tYou take your crew to the harbor where they charge onto the [i]Scarlet Sails[/i], frightening the skeleton crew off the vessel with barely a drop of blood shed. One of the ship's pathetic runaways spots you and realizes you're pulling the strings. He charges at you in a fury with his sword raised—which is handy, because it leaves his belly wide open. \n\t\t*choice\n\t\t\t#Run him through.\n\t\t\t\t*set swordfighting %+10\n\t\t\t\tThe hardest part of killing him is pulling your sword out afterwards. It's stuck in his guts, and you have to brace your foot on his chest and yank on the hilt to get your weapon back. Also, he stinks of bad eggs. If he hadn't died, he'd still have ended up spilling his bowels in a gutter somewhere. Your own stomach turns, and you hold your breath as you clean your sword on a dry section of his shirt. \n\t\t\t\t*goto rules\n\t\t\t#Trip him over and laugh as you take his ship.\n\t\t\t\t*set morality %-10\n\t\t\t\tHe goes flying and very nearly cuts himself with his own sword. You laugh so loudly $!{janename} leans over the railing to see what's happening. Soon, the entire crew is laughing. The humiliated man slinks away, and you've won the [i]Scarlet Sails[/i] without breaking a sweat.\n\t\t\t\t*goto rules\n\t\t\t#Knock him out.\n\t\t\t\t*set brawling %+10\n\t\t\t\tYou dodge his sword and clonk him neatly on the head with the hilt of your own. He drops like a bag of old potatoes, and you kick him out of the way.\n\t\t\t\t*goto rules\n\t*selectable_if (gold > 9) #I throw gold around to fool the rightful owners into stealing Blood's old ship—leaving the [i]Scarlet Sails[/i] for me.\n\t\t*set gold -10\n\t\t*set truthfulness %-10\n\t\t*set brawling %+10\n\t\tAfter letting your old crew know to take their belongings and go elsewhere, you set your new crew to work pretending drunkenness and overpaying for drinks as they talk loudly about your old ship's amazing wealth. All the time, they're careful to keep within hearing distance of the crew of the [i]Scarlet Sails[/i]. Before long, you see the latter gather their weapons and head off to take your ship. \n\t\t\n\t\tYou watch as the [i]Scarlet Sails[/i] is emptied of people, and then you simply walk on board. With that, the ship is yours.\n\t\t*goto rules\n\t#I kill the captain while she’s brawling and most of her crew’s off drinking. Then I'll take the [i]Scarlet Sails[/i] in the confusion. \n\t\t*set morality %-20\n\t\t*set starboarddead 1\n\t\t*set starboardhere 0\n\t\tEven as you make the decision, your stomach twists with dread. You've killed in self-defense, in sea battles, and even by accident. But you've never committed murder. \n\t\tHow do you attempt to kill her?\n\t\t*choice\n\t\t\t#Hurl her off the third-floor balcony onto the cobblestones below. \n\t\t\t\t*set brawling %+10\n\t\t\t\t*set health %-10\n\t\t\t\tYou wait until Captain Starboard is distracted by a sword duel with another captain and then tackle her, aiming for her knees to knock her off balance. She punches you in the face as she falls, snapping your head back, but you don't lose focus. You twist out of her grasping hands and kick her hard in the stomach—shoving her between two of the balcony posts.\n\t\t\t\t\t\n\t\t\t\tIt works—she flies through the railings and plummets to her death three storeys below. There's a horrible crunch, and you look down to see the signs of at least two others crushed beneath her. It could so easily have been your back broken by someone else's fight—but it wasn't. You shake it off and turn away, nursing your sore head. No one knows you killed her on purpose. On Cutlass Island, accidents happen.\n\t\t\t\t\t\n\t\t\t\tHer parrot screeches in rage and dives down to peck at the inn's staff as they haul out the bodies. You send $!{bobname} to fetch her abandoned hat so you can show it to the shipboard guards as proof of death.\n\t\t\t\t*goto rules\n\t\t\t#Stab her. \n\t\t\t\t*set swordfighting %+20\n\t\t\t\t*set health %-10\n\t\t\t\tYou draw your sword and wait for an opening. Captain Starboard and another captain are dueling furiously, but it's clear from the clashing blades that they're not trying to actually hurt each other. You angle your body to expose as little of yourself as possible and deliberately flip off your target's hat with the tip of your blade. \n\t\t\t\t\t\n\t\t\t\tShe turns to you in a fury, and the other captain salutes her with the hilt of her sword and backs away to find another opponent. Your target's first strike is a warning—a literal slap of the wrist that almost knocks your sword from your hand. It's clear you're outmatched, but she doesn't yet know you intend to kill her. There's no time for finesse. Instead of aiming for the obvious targets of her heart or limbs, you strike across her neck, slicing open her artery.\n\t\t\t\t\t\n\t\t\t\tShe howls in rage and rains blows on your back and shoulders, but you both know she can't last. Her sword drops from her hand, and even in the noisy brawl, the clang of the round hilt on the wooden floor rings like a bell. She stares at her own hand, unable to accept that her fingers no longer have the strength to hold her sword. Then she looks at you and keeps her eyes locked on yours as her legs give way. She tries to shout for justice, realizing too late that yours was no friendly fight. You hear the creaking of wooden floorboards as a space opens up around you. Pirates are skilled at avoiding the cleanup after a fight turns bad. \n\t\t\t\t\n\t\t\t\tThe blood from the captain's throat finally slows, and her face hits the floor.\n\t\t\t\t\t\n\t\t\t\tYou take her hat and sword for proof of death while her vicious parrot is still reeling in shock. \n\t\t\t\t*goto rules\n\t\t\t#Shoot her. \n\t\t\t\t*set gun_fu %+10\n\t\t\t\t*set killed %+20\n\t\t\t\t*set swordfighting %+10\n\t\t\t\tShe's distracted by a friendly swordfight with another captain, so you carefully turn away and draw your flintlock. You shield the pistol with your body as you set it to half-cocked, controlling your breathing so you don't do anything that could make the imprecise aim worse. As you turn to face her, she ignores her companion and stares right at you—but she's not quick enough. Pirates expect to be killed by friends, lovers, and rivals. Usually, strangers are safe. \n\t\t\t\t\n\t\t\t\tLetting out a slow breath, you squeeze the trigger in what feels like achingly slow motion. The flint strikes steel, subtly jerking your hand, but the shot flies true and buries itself in her forehead. \n\t\t\t\t\t\n\t\t\t\tHer opponent steps back and stares right at you, about to shout an accusation of murder.  You'll be killed at once by crowd justice, but at least you'll be able to kill her as well. The pair of you stare at one another, weighing your options. She chooses to walk away, and your vision blurs with relief. Starboard's hat fell forward, covering the distinctive wound. No one roars for justice.\n\t\t\t\t\t\n\t\t\t\tYou take your victim's sword for proof of death while her parrot is still reeling in shock. It's time to go. \n\t\t\t\t*goto rules\n\t\t\t#Use my magic. \n\t\t\t\t*set magical_skill %+20\n\t\t\t\t*set health %-10\n\t\t\t\t*set killed %+20\n\t\t\t\tThe captain is distracted by a swordfight with another captain. Both women are grinning, deliberately clashing swords more often than they're hitting one another. \n\t\t\t\t*if smith = 1\n\t\t\t\t\tYou arrange your magic carefully in your mind and then stumble forward as if by accident, brushing the captain's bare wrist for a fraction of a second before shambling away.\n\t\t\t\t\t\t\t\n\t\t\t\t\tMoments later, you have a splitting post-magic headache, and you know you've pushed your smithing to its limit. The headache spikes at the sound of a scream of shock. Thanks to your magic, your victim suddenly decided to fight for real, and the other captain is bleeding and furious. Seconds later, the captain of the [i]Scarlet Sails[/i] is dead, and her parrot is too. \n\t\t\t\t\t\t\n\t\t\t\t\tWhen you see the other captain frown thoughtfully, you are careful to melt away into the crowd rather than running away in a panic. She must suspect a feelsmith was involved, but she can't prove it. When you see her shrug and sheath her sword, you know you've escaped mob justice.\n\t\t\t\t\t\t\t\n\t\t\t\t\tYou take your crew to board the [i]Scarlet Sails[/i], telling $!{janename} to fetch the captain's hat as proof of death.\n\t\t\t\t\t*goto rules\n\t\t\t\t*elsif smith = 2\n\t\t\t\t\tYou arrange your magic carefully in your mind and then stumble forward as if by accident, brushing the captain's bare wrist for a fraction of a second before shambling away.\n\t\t\t\t\t\t\t\n\t\t\t\t\tMoments later, you have a splitting post-magic headache, and you know you've pushed your smithing to its limit. The headache spikes at the sound of a scream of shock. Thanks to your magic, the swordfighting captain's jugular artery just cracked open like a broken pot, and blood is sheeting down her chest. \n\t\t\t\t\t\t\n\t\t\t\t\tWhen you see the other captain frown thoughtfully, you are careful to melt away into the crowd rather than running away in a panic. She must suspect it was a healsmith rather than an unlucky blow that killed her new friend, but she can't prove it. When you see her shrug and sheath her sword, you know you've escaped mob justice.\n\t\t\t\t\t\t\n\t\t\t\t\tYou take your crew to board the [i]Scarlet Sails[/i], telling $!{janename} to fetch the captain's hat as proof of death.\n\t\t\t\t\t*goto rules\n\t\t\t\t*else\n\t\t\t\t\tYou arrange your magic carefully in your mind and then walk casually to the strong outer wall, leaning against it so a hole in the elbow of your shirt lets you subtly touch the wood.\n\t\t\t\t\t\t\t\n\t\t\t\t\tMoments later, you have a splitting post-magic headache, and you know you've pushed your smithing to its limit. The headache spikes at the sound of a cry of shock. Thanks to your magic, the section of balcony railing beside the captain and her friend broke as they both leant on it, sending them falling to their death.\n\t\t\t\t\t\t\n\t\t\t\t\tYou're careful not to act overly concerned about the deaths. If someone realizes your magic was involved, you'll be killed. Luckily, the inn is old and in dire need of repair. One more broken railing barely raises an eyebrow. It's trickier to steal the captain's hat than it was to kill her, which is of course why you delegate that task to the new crew.\n\t\t\t\t\t\t\n\t\t\t\t\tWhen you have the hat, you take it and head for the [i]Scarlet Sails[/i].\n*label rules\n\nThe ship is yours. Checking that your weapons are in good order, you walk back along the path toward the inn to tell Captain Blood her new ship is ready.\n\nLost in your thoughts, you almost knock over one of your old crew members. She steps aside and catches your wrist so you don't fall. \"Steady on,\" she says.\n\nThe palm of her hand is criss-crossed with old scars. She's one of the rare people who doesn't shy away from touching a magic user, probably because she's too fond of wrestling to care.\n\n\"Thanks, Firebird,\" you say.\n\nShe shrugs awkwardly. Conversation always makes her surly. So does silence, of course. Her natural state is fighting, with or without a sword. She fights like other pirates breathe. In fact, she'd make a valuable addition to any crew.\n*label truthordare\n*choice\n\t#I tell her exactly what I'm doing and ask if she wants to join me.\n\t\t*set truthfulness %+10\n\t\t*set firebird %+10\n\t\t\"Captain Blood asked me to recruit new crew for the [i]Scarlet Sails[/i]. You want in?\"\n\t\t\t\n\t\tShe purses her lips, unconsciously resting one hand on the sword at her hip. \"Captain Blood is fun, and she's a fine hand with a sword. I'll come.\"\n\t\t*goto rulesx\n\t#I tell her Captain Blood is only keeping crew members who pay me three gold.\n\t\t*set truthfulness %-10\n\t\t\"Captain Blood's setting up an elite new crew. You want in? It'll cost you three gold.\"\n\t\t\t\n\t\t\"Huh,\" she says. \"I would have thought she'd have kept me and ditched the rest of you. Ah well.\" She unlaces her left boot and counts out three gold from underneath her foot. \n\t\t\t\n\t\tYou tried keeping money in your boot once, but it hurt too much. Still, Firebird doesn't seem to notice physical pain any more. She has a new gash across one arm that'll give her yet another scar to add to the rest. No wonder she looks so cheerful: Cutlass Island is a veritable buffet of foolish challengers.\n\t\t*set gold +3\n\t\t*goto rulesx\n\t#I say goodbye to her.\n\t\t*set skepticism %-10\n\t\t*set firebird %+10\n\t\t\"You never hit me in anger,\" you say, certain Firebird knows the value of such a compliment. \"So, thank you.\"\n\t\t\n\t\t\"Where are you going?\" she asks.\n\t\t*goto truthordare\n\n*label rulesx\n*set ships_in_fleet 1\nGlancing back toward the ship, you spot someone lurking between empty crates on the dock. Firebird has a throwing dagger in her hand before you've consciously realized the hunched figure in the shadows is someone you know. \n*fake_choice\n\t#I grab my gun.\n\t\t*set gun_fu %+10\n\t#I grab my blade.\n\t\t*set swordfighting %+10\n\t#I step close enough to see him properly.\n\t\t*set skepticism %-10\n\nYou let one hand creep toward the weapon on your hip, but when you see the man's face, you relax. Firebird bursts out laughing.\n\n\"Truman!\" she says. \"Hiding as usual, I see.\"\n\nHe steps into the light, his arms raised. \"Feelsmith male, young, straight hair,\" he quotes softly from the WANTED poster. His low voice is barely louder than the lapping water behind him. \"It could be me.\"\n\n\"Ah!\" says Firebird. \"You shoulda asked me to keep you company. I'd have fought anyone that tried to take your head.\"\n\nTruman smiles his thanks, but as usual, he's unable to let a truth remain unspoken. \"Even you couldn't protect me from a mob the size of that one.\" He gestures at the inn, where several pirates spill loudly from the doors and at least one is held upside down from an upper window, wailing an apology for some perceived slight.\n\n\"Come with us,\" you blurt out.\n\nTruman stares at you. \"Where are you going? I'll come, but why bring me?\"\n\nThere's no need to tell the truth out loud, but your real reason for bringing him is…\n*fake_choice\n\t#He's right to be worried for his safety here. \n\t\t*set morality %+10\n\t#A feelsmith with his unshakeable honesty is a portable lie detector. \n\t\t*set skepticism %+10\n\t\t*set truthfulness %+10\n\t#He's similar enough to Kallin Graveson to be a useful bargaining piece later.\n\t\t*set morality %-10\n\t\t*set skepticism %+10\n\n\"I need more men,\" you say blithely. \n\nYou can tell he doesn't believe you (mostly because he says so out loud), but he does trust you enough to go with you rather than continue to hide and hope no one tries to abduct him. To be honest, he's pleasant to have around. He's the only person you know who doesn't drink or fight. Instead, he works and sings—and generally stays out of your way unless you seek him out.\n\nThe three of you walk back to the ship.\n\nThe other pirates don't dare to question you about the addition of two more crew members, which gives you a delicious taste of authority. It could be addictive.\n*fake_choice\n\t*selectable_if (gold > 0) #The day's going well, so I send one of my new recruits to buy me one last drink.\n\t\t*set sober %-10\n\t\t*set gold -1\n\t#I congratulate the crew on our new ship. We're a team now.\n\t\t*set killed %-10\n\t\t*set skepticism %-10\n\t#I remind our recruits never to get in my way.\n\t\t*set skepticism %+10\n\t\t*set killed %+10\n*set rank \"First Mate\"\n*set ranking 3\n*set killed %+10\n\t\n*if smith = 3\n\tYou rest your hands on the wooden railing and let your sense of self fade as you magically examine the ship. She's well made, with no leaks whatsoever, and she's as beautiful inside as out. You sense her vibrating with a kind of energy, as if she longs to sail fast and far. The other humans are dim shadows, crawling over her like babies too young to leave their mother. You sigh with mingled delight and sorrow as you pull away from your ship-sense and feel your own small, inelegant body once more.\n\t*goto for\n*else\n\n*label for\nFor a moment, you're tempted to simply sail away. But Captain Blood and a couple of others you recognize are already boarding. One day you'll earn—or more likely steal—your own ship. You can hardly wait. \n\nCaptain Blood grins at you like she grins at a good meal or a ruined enemy. She's impressed with your work…but you’ve just revealed yourself as a threat to her position as top dog. \n*fake_choice\n\t#Better stay on guard. \n\t\t*set skepticism %+10\n\t#She won't kill me as long as I'm useful. I trust her judgment.\n\t\t*set captain_blood %+10\n\t#I'll keep my gun well maintained and close by at all times.\n\t\t*set gun_fu %+10\n\nCaptain Blood takes up her position on the bridge as if she's always owned the [i]Scarlet Sails[/i], and as first mate, it's now your job to get everyone else in order. You shout commands and feel a thrill when old and new crew alike jump to obey you. In minutes, the blood-red sails belly out with the wind, and you float away into the darkness.\n\n*if jaluhere = 0\n\tAmong the new crew in Captain Blood's lot, you recognize the cocksure slave from the roof of the inn.\n\n\t\"Call me Jalu,\" he says with a grin. \"And you are?\"\n\n\t\"$!{name}.\" \n\n\t\"I could have sworn you were going to buy me,\" he says comfortably. He's very attractive, with liquor-smooth skin and a body that shows no trace of past illness or mistreatment—just muscles. A lot of muscles. \n\t*set jalumuscles 1\n\t*set jaluhere 1\n\t*set jaluname \"Jalu\"\n\t*fake_choice\n\t\t#\"What are you doing here?\"\n\t\t\t*set truthfulness %+10\n\t\t#\"Did you think I'd buy a piece of half-rotted flotsam like you? Not likely.\"\n\t\t\t*set truthfulness %-10\n\t\t#\"Actually, you were too good-looking, and I wimped out.\"\n\t\t\t*set truthfulness %+10\n\t\t\t*set jalu %+20\n\tHe laughs delightedly. \"Would you believe Captain Blood just bought me and set me free?\"\n\n\tYou sigh. \"Of course she did.\"\n\t\t\t\n\tHe gets back to work with every appearance of satisfaction. You take the chance to observe what you can of him without being too obvious.\n\n\tHis \"H\" brand is off-center and messily done, although he's tall enough that he must have eaten well as a child. You guess that he had a safe childhood but was taken by pirates around puberty. That would have been when his healsmithing ability became apparent for the first time. It may even have given him enough value to keep him alive. Whatever happened to him, it hasn't taken away his sense of his own worth. \n\n\tHe may or may not be a good fighter, but he seems so sure of himself that you're willing to bet no one will dare to challenge him. \n\t*set jalubrand 1\n\t*goto bx\n*else\n*label bx\n\nWhen the ship is sailing smoothly and it's time for a shift change, Captain Blood takes you to the biggest cabin, laughing at a set of rules carved into the door. \"Smart lady,\" she says approvingly, walking in and carelessly throwing the previous captain's belongings into a corner. \"Makes sure people know what's what. Now let's you and I decide how to run this ship.\"\n\n\"Aye aye, Captain,\" you say carefully, unaccustomed to being treated like your opinion matters.\n\n\"First,\" she says, \"how shall we distribute spoils when we have them?\"\n*fake_choice\n\t#Equal shares for every soul on board. \n\t\t*set skepticism %-10\n\t#Triple share for the captain and double share for the first mate.\n\t\t*set golden 2\n\t#Five shares for the captain and four shares for the first mate. \n\t\t*set truthfulness %+10\n\t\t*set golden 3\n\n\"Fine,\" she says. \"What about the level of cleanliness?\"\n*fake_choice\n\t#Every bit of the ship scrubbed daily, including the head—starting immediately.\n\t\t*set skepticism %+10\n\t\t*set killed %+10\n\t#Every bit of the ship scrubbed once a week, including the head.\n\t\t*set filth 2\n\t\t*set filth %+10\n\t#Rain's a perfectly good cleaner. We'll mop if there’s a lot of blood or vomit. \n\t\t*set filth 3\n\t\t*set filth %+10\n\t\t*set health %-10\n\n\"One more thing,\" she says. \"How will we punish disobedience on board?\"\n*fake_choice\n\t#Minor offenses will be punished with a night in the brig; major offenses with longer. Direct disobedience to the captain or mate gets a keelhauling.\n\t\t*set skepticism %-10\n\t\t*set filth %+10\n\t#Minor offenses will be punished with a week in the brig without food, major offenses punished with the cat o’nine tails. Direct disobedience to the captain or mate gets a keelhauling.\n\t#Minor offenses will be punished with the cat o’nine tails. Direct disobedience to the captain or mate gets a keelhauling.\n\t\t*set morality %-10\n\t\t*set killed %+20\n\nCaptain Blood assigns you to the previous captain's luxurious quarters and chooses the map room for herself. \n*set ships_in_fleet 1\n*goto_scene ss2\n", "ss10": "*comment ships in fleet, inc Jalu but minus serpent ones. combo fleets if jalu/blood and you're already co-captain?\nIt's been a difficult journey from Cutlass Island but a good one. You lost crewmates, but you gained the (somewhat damaged) [i]Scarlet Sails[/i] as your own and a respectable pile of gold. \n\nWith enough gold, even the [i]Scarlet Sails[/i] can be made as good as new.\n*if skepticism \u003c 48\n\t*achieve nicepirate\n\tYou've always known that you deserve a chance to be \n\t*if ((firebird_love = 1) or (truman_love = 1)) or ((blood_love =1) or (jalu_love =1))\n\t\trespected—and loved.\n\t\t*if blood_love =1\n\t\t\t*set captain_blood %+20\n\t\t*if jalu_love =1\n\t\t\t*set jalu %+20\n\t\t*if firebird_love =1\n\t\t\t*set firebird %+20\n\t\t*if truman_love =1\n\t\t\t*set truman %+20\n\t\t*goto ch\n\t*else\n\t\trespected—and even trusted.\n\t\t*set killed %-20\n\t\t*goto ch\n*else\n*label ch\n*choice\n\t#I've had enough of the pirate life. I'll settle down.\n\t\t*set firebird %-10\n\t\t*set captain_blood %-5\n\t\t*if (polyamorous =1)\n\t\t\t*if ((firebird_love=1) and (blood_love=1)) and ((firebird > 50) and (captain_blood > 50))\n\t\t\t\tIt hurts to lose Firebird, but you've had enough of the sea, and she refuses to leave it. Surprisingly, Bonnie is ready to settle on land. It's strange to discover the person she is when she doesn't have to keep a pack of pirates in line. She starts a pub just so she can hurl herself into a brawl every once in a while.\n\t\t\t\t*goto reputation\n\t\t\t*if ((jalu_love=1) and (blood_love=1)) and ((jalu > 70) and (captain_blood > 70))\n\t\t\t\tYou and Captain Jalu and Captain Blood live happily ever after as retired pirates, writing and performing an array of pirate-themed plays that keep you living in style for the rest of your lives.\n\t\t\t\t*goto reputation\n\t\t\t*elseif ((firebird_love=1) and (truman_love=1)) and ((firebird > 70) and (truman > 70))\n\t\t\t\tYou and Firebird and Truman live happily ever after, letting Firebird sail off in your ship as you and Truman keep house, greeting her with joy every time she visits.\n\t\t\t\t*goto reputation\n\t\t\t*elseif ((firebird_love=1) and (jalu_love=1)) and ((firebird > 70) and (jalu > 70))\n\t\t\t\tFirebird refuses to leave the sea, so you sadly bid her farewell and begin a new life on shore with Jalu, who is as sick of piracy as you are.\n\t\t\t\t*goto reputation\n\t\t\t*elseif ((truman_love=1) and (jalu_love=1)) and ((truman > 70) and (jalu > 70))\n\t\t\t\tYou and Truman and Jalu live happily ever after, giving up piracy and settling down into a cliffside cottage with views to the horizon.\n\t\t\t\t*goto reputation\n\t\t\t*else\n\t\t\t\t*if (blood_love = 1) and (captain_blood > 70)\n\t\t\t\t\tNot all romances work out—but one of yours does.\n\n\t\t\t\t\tYou and Captain Blood live happily ever after. It's strange to discover the person she is when she doesn't have to keep a pack of pirates in line. She starts a pub just so she can hurl herself into a brawl every once in a while.\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (jalu_love=1) and (jalu > 70)\n\t\t\t\t\tNot all romances work out—but one of yours does.\n\n\t\t\t\t\tYou and Jalu live happily ever after, equally sick of the pirate life. He works as a feelsmith, listening to the sad stories of others and helping them find peace.\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (truman_love=1) and (truman > 70)\n\t\t\t\t\tNot all romances work out—but one of yours does.\n\n\t\t\t\t\tYou and Truman live happily ever after, settling down in a beach house so you can swim in the ocean every morning.\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (firebird_love=1) and (firebird > 70)\n\t\t\t\t\tNot all romances work out—but one of yours does.\n\n\t\t\t\t\tFirebird refuses to leave the sea, so you set up house and enjoy a quiet life between her joyful and passionate visits.\n\t\t\t\t\t*goto reputation\n\t\t\t\t*else\n\t\t\t\t\t*goto reputation\n\t\t*else\n\t\t\t*if (blood_love=1) and (captain_blood > 70)\n\t\t\t\tYou and Captain Blood live happily ever after. It's strange to discover the person she is when she doesn't have to keep a pack of pirates in line. She starts a pub just so she can hurl herself into a brawl every once in a while.\n\t\t\t\t*goto reputation\n\t\t\t*elseif blood_love = 1\n\t\t\t\tSadly, Bonnie is unable to settle down, so you part with only a few scars.\n\t\t\t\t*goto reputation\n\t\t\t*elseif (jalu_love = 1)\n\t\t\t\tYou and Jalu live happily ever after, equally sick of the pirate life. He works as a feelsmith, listening to the sad stories of others and helping them find peace.\n\t\t\t\t*goto reputation\n\t\t\t*elseif (truman_love=1) \n\t\t\t\tYou and Truman live happily ever after, settling down in a beach house so you can swim in the ocean every morning.\n\t\t\t\t*goto reputation\n\t\t\t*elseif (firebird_love=1) and (firebird > 70)\n\t\t\t\tFirebird refuses to leave the sea, so you set up house and enjoy a quiet life between her joyful and passionate visits.\n\t\t\t\t*goto reputation\n\t\t\t*elseif firebird_love = 1\n\t\t\t\tFirebird can't stomach the idea of leaving the sea, so she cheerfully bids you farewell and sails away.\n\t\t\t\t*goto reputation\n\t\t\t*else\n\t\t\t\tYou live a quiet life as a lighthouse-keeper, content to let other ships risk the rocks.\n\t\t\t\t*goto reputation\n\t#I'll be meaner and richer than Captain Graves ever was.\n\t\t*set gold (gold *2)\n\t\t*set truman %-10\n\t\t*set jalu %-10\n\t\t*if (polyamorous=1)\n\t\t\t*if ((firebird_love=1) and (blood_love=1)) and ((firebird > 70) and (captain_blood > 70))\n\t\t\t\tYou and Firebird and Captain Blood live happily ever after, terrifying the world and finding fame and fortune until even the sight of your scarlet-clad flagship is enough to make others surrender.\n\t\t\t\t*set ships_in_fleet +7\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*if ((jalu_love=1) and (blood_love=1)) and ((jalu > 70) and (captain_blood > 70))\n\t\t\t\tYou and Captain Jalu and Captain Blood live happily ever after as fleet co-captains, terrifying the world and finding fame and fortune until even the sight of your scarlet-clad flagship is enough to make others surrender.\n\t\t\t\t*set ships_in_fleet +8\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*elseif ((firebird_love=1) and (truman_love=1)) and ((firebird > 70) and (truman > 70))\n\t\t\t\tYou and Firebird and Truman live happily ever after, leaving Truman to keep house while you and Firebird go off marauding for months at a time, free in the knowledge of a warm home to return to.\n\t\t\t\t*goto reputation\n\t\t\t*elseif ((firebird_love=1) and (jalu_love=1)) and ((firebird > 70) and (jalu > 70))\n\t\t\t\tYou and Firebird and Jalu live happily ever after, and Jalu is soon more famous and more feared than his father.\n\t\t\t\t*set ships_in_fleet +7\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*elseif ((truman_love=1) and (jalu_love=1)) and ((truman > 70) and (jalu > 70))\n\t\t\t\tYou and Jalu live happily ever after, and Jalu is soon more famous and more feared than his father. Truman, unfortunately, can't stomach all the killing and leaves you.\n\t\t\t\t*set truman_love 0\n\t\t\t\t*set ships_in_fleet +7\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*else\n\t\t\t\tNot every love story works out perfectly. But you do pretty well.\n\n\t\t\t\t*if (blood_love=1) and (captain_blood > 70)\n\t\t\t\t\tYou and Captain Blood live happily ever after, becoming outrageously wealthy. The [i]Scarlet Sails[/i] has so much gold, you can never seem to spend it all.\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (jalu_love=1) and (jalu > 70)\n\t\t\t\t\tYou and Jalu live happily ever after, becoming more wealthy and famous together than you ever were alone.\n\t\t\t\t\t*set ships_in_fleet +6\n\t\t\t\t\t*achieve bigfleet\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (truman_love=1)\n\t\t\t\t\tTruman can't bear to continue life as a pirate, so he settles down on land. He's always glad when you visit, which is something at least.\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (firebird_love=1) and (firebird > 70)\n\t\t\t\t\tYou and Firebird live happily ever after, so feared throughout the world that Firebird struggles to find people to fight. Together, you find a curious peace in the midst of constant violence.\n\t\t\t\t\t*set ships_in_fleet +5\n\t\t\t\t\t*achieve bigfleet\n\t\t\t\t\t*goto reputation\n\t\t\t\t*else\n\t\t\t\t\tSadly, neither of your romances last.\n\t\t\t\t\t*goto reputation\n\t\t*elseif victim > 0\n\t\t\t*if (blood_love=1) and (captain_blood > 70)\n\t\t\t\tYou and Captain Blood live happily ever after, becoming outrageously wealthy. The [i]Scarlet Sails[/i] has so much gold, you can never seem to spend it all.\n\t\t\t\t*goto reputation\n\t\t\t*elseif (jalu_love=1) and (jalu > 70)\n\t\t\t\tYou and Jalu live happily ever after, becoming more wealthy and famous together than you ever were alone.\n\t\t\t\t*set ships_in_fleet +6\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*elseif (truman_love=1)\n\t\t\t\tNot all romances work out, unfortunately. Truman can't bear to continue life as a pirate, so he settles down on land. He's always glad when you visit, though.\n\t\t\t\t*goto reputation\n\t\t\t*elseif (firebird_love=1) and (firebird > 70)\n\t\t\t\tYou and Firebird live happily ever after, so feared throughout the world that Firebird struggles to find people to fight. Together, you find a curious peace in the midst of constant violence.\n\t\t\t\t*set ships_in_fleet +5\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*else\n\t\t\t\t*goto reputation\n\t\t*else\n\t\t\tYou lose touch with all your old crew as they're constantly getting killed or replaced. A few sneak off every time you reach port. But no one criticizes you to your face.\n\t\t\t*set ships_in_fleet +4\n\t\t\t*achieve bigfleet\n\t\t\t*goto reputation\n\t#You can never have too much gold. I'm sailing for more.\n\t\t*set gold (gold *3)\n\t\t*if ((polyamorous=1) and (victim > 1))\n\t\t\t*if ((firebird_love=1) and (blood_love=1)) and ((firebird > 70) and (captain_blood > 70))\n\t\t\t\tYou and Firebird and Captain Blood live happily ever after, terrifying the world and finding fame and fortune until even the sight of your scarlet-clad ship is enough to make others surrender.\n\t\t\t\t*set ships_in_fleet +7\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*if ((jalu_love=1) and (blood_love=1)) and ((jalu > 70) and (captain_blood > 70))\n\t\t\t\tYou and Captain Jalu and Captain Blood live happily ever after as fleet co-captains, terrifying the world and finding fame and fortune until even the sight of your scarlet-clad flagship is enough to make others surrender.\n\t\t\t\t*set ships_in_fleet +8\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\t\t\t\n\t\t\t*elseif ((firebird_love=1) and (truman_love=1)) and ((firebird > 70) and (truman > 70))\n\t\t\t\tYou and Firebird and Truman live happily ever after, leaving Truman to keep house while you and Firebird go off marauding for months at a time, free in the knowledge of a warm home to return to.\n\t\t\t\t*set ships_in_fleet +5\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*elseif ((firebird_love=1) and (jalu_love=1)) and ((firebird > 70) and (jalu > 70))\n\t\t\t\tYou and Firebird and Jalu live happily ever after. The three of you are soon richer, more famous, and more feared than Captain Graves.\n\t\t\t\t*set ships_in_fleet +7\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*elseif ((truman_love=1) and (jalu_love=1)) and ((truman > 70) and (jalu > 70))\n\t\t\t\tYou and Truman and Jalu live happily ever after, eventually growing so rich that you give up piracy and retire into a cliffside cottage with views to the horizon. From there, you run a gambling den that keeps the money coming in.\n\t\t\t\t*set ships_in_fleet +4\n\t\t\t\t*goto reputation\n\t\t\t*else\n\t\t\t\tNot all polyamorous romances work out, unfortunately. But you do all right.\n\n\t\t\t\t*if (blood_love=1) and (captain_blood > 70)\n\t\t\t\t\tYou and Captain Blood live happily ever after, becoming outrageously wealthy. The [i]Scarlet Sails[/i] has so much gold, you can never seem to spend it all.\n\t\t\t\t\t*set ships_in_fleet +7\n\t\t\t\t\t*achieve bigfleet\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (jalu_love=1) and (jalu > 70)\n\t\t\t\t\tYou and Jalu live happily ever after, becoming more wealthy and famous together than you ever were alone.\n\t\t\t\t\t*achieve bigfleet\n\t\t\t\t\t*set ships_in_fleet +7\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (truman_love=1) and (truman > 70)\n\t\t\t\t\tAfter a few outrageously successful years, you and Truman settle down in a beach house so you can swim in the ocean every morning. \n\t\t\t\t\t*set ships_in_fleet +4\n\t\t\t\t\t*achieve bigfleet\n\t\t\t\t\t*goto reputation\n\t\t\t\t*elseif (firebird_love=1) and (firebird > 70)\n\t\t\t\t\tYou and Firebird live happily ever after, so feared throughout the world that Firebird struggles to find people to fight. Together, you find a curious peace in the midst of constant violence. There's always plenty of gold. \n\t\t\t\t\t*set ships_in_fleet +6\n\t\t\t\t\t*achieve bigfleet\n\t\t\t\t\t*goto reputation\n\t\t\t\t*else\n\t\t\t\t\tEven if neither of your romances lasts, your love of gold endures forever.\n\t\t\t\t\t*goto reputation\n\t\t*else\n\t\t\t*if (blood_love=1) and (captain_blood > 70)\n\t\t\t\tYou and Captain Blood live happily ever after, becoming outrageously wealthy. The [i]Scarlet Sails[/i] has so much gold, you can never seem to spend it all.\n\t\t\t\t*set ships_in_fleet +6\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n\t\t\t*elseif (jalu_love=1) and (jalu > 70)\n\t\t\t\tYou and Jalu live happily ever after, becoming more wealthy and famous together than you ever were alone.\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*set ships_in_fleet +6\n\t\t\t\t*goto reputation\n\t\t\t*elseif (truman_love=1) and (truman > 70)\n\t\t\t\tAfter a few outrageously successful years, you and Truman settle down in a beach house so you can swim in the ocean every morning. \n\t\t\t\t*set ships_in_fleet +4\n\t\t\t\t*goto reputation\n\t\t\t*elseif (firebird_love=1) and (firebird > 70)\n\t\t\t\tYou and Firebird live happily ever after, so feared throughout the world that Firebird struggles to find people to fight. Together, you find a curious peace in the midst of constant violence. There's always plenty of gold. \n\t\t\t\t*achieve bigfleet\n\t\t\t\t*set ships_in_fleet +5\n\t\t\t\t*goto reputation\n\t\t\t*else\n\t\t\t\tYour romance doesn't last, but your greatest love is gold anyway. Gold never leaves you.\n\n\t\t\t\tYou build on your wealth, and everyone on board is made rich.\n\t\t\t\t*set ships_in_fleet +4\n\t\t\t\t*achieve bigfleet\n\t\t\t\t*goto reputation\n*label reputation\n\n*if (morality > 50) and (skepticism \u003c 50)\n\tYou are loved by all, especially the slaves that you buy and set free.\n\t*goto killed\n*elseif (morality \u003c50) and (skepticism > 50)\n\tYou are feared by all, because it's well known that you'll kill any member of your crew that doesn't prove useful.\n\t*goto killed\n*else\n\tYou are generally respected, and your ship runs like a dream.\n*label killed\n*if killed > 70\n\t*if ((brawling) + (skepticism)) > 80\n\t\n\t\tOne dark night, you're attacked by your first mate in your sleep. You fight her off and have her keelhauled the following day. Her bloodied and broken corpse is an unforgettable lesson to your crew.\n\t\t*goto scurvy\n\t*else\n\t\n\t\tOne dark night, your first mate creeps into your cabin and kills you in your sleep by stabbing you in the back. So much for the pirate life. \n\t\t\n\t\tOf course, she'll never find where you've hidden your gold.\n\t\t\n\t\t*page_break\n\t\t*achieve epicdeath\n\t\tTHE END\n\t\t*goto_scene coda\n*label scurvy\n*if gold > 3000\n\t*achieve superrich\n\t\n*if filth > 55\n\n\tYou've survived mermaids, pirates, and a sea-serpent, but you die of scurvy six months later. \n\t\n\tShould have eaten your vegetables.\n\n\tTHE END\n\t*goto_scene coda\n*else\n\n\tIt's a good time to be alive.\n\n\tTHE END\n\t*goto_scene coda\n", "ss1b": "*hide_reuse\n*set rank \"Landlubber\"\n*set ranking 0\n*set ships_in_fleet 0\n*set mc_saves_self 1\n*comment joining Captain Starboard's crew (and/or stowaway)\n*set blood_name \"Starboard\"\n*set starboardhere 1\nAvoiding her eye, you head down the closest stairs and out of range of her temper. You've been on Captain Blood's ship for almost two years, wet season and dry. It feels strange to realize you're about to sail—or stagger—into the unknown. You stand alone at the internal balcony of the first floor, watching the crowd tossing and turning below. Someone else started a fight as you walked down the stairs. That should please your old master.\n\nCaptain Blood's unlikely to care that you've slipped away, since you haven't taken anything from her. Even your slave-debt is long gone. The only gold you carry is your own, earned with good honest theft and pillage same as anyone else on board. You've kept your head down all this time in an effort to be just another crewmate among the filthy mass. That lack of distinction has protected you from her wrath so far. You're willing to bet she doesn't even know your name. \n*fake_choice\n\t#Liars make the best pirates.\n\t\t*set truthfulness %-10\n\t#Brawlers make the best pirates.\n\t\t*set brawling %+10\n\t#Pirates know not to trust anyone.\n\t\t*set skepticism %+10\n\t#Being a pirate doesn't have to mean being a killer.\n\t\t*set morality %+10\n\nReaching over to the nearest wooden pillar, you smooth down the curling top of one of the posters glued there. There are more, dozens or hundreds more, arranged in rows along the walls and on every other pillar in the place. Each one serves as a visual reminder of what happens when a member of a successful pirate's crew gets openly ambitious.\n\n[i]WANTED[/i]\n\n[i]Kallin Graveson[/i]\n\n[i]Feelsmith male, young, straight hair.[/i]\n\n[i]He stole from Captain Graves.[/i]\n\n[i]100 gold pieces for his head.[/i]\n\n[i]Body not required. [/i]\n\nYou've met Captain Graves, unfortunately. It wasn't easy to escape from him, and you hope you never cross paths again. Captain Blood would kill you for disobedience, but she wouldn't kill you without a reason, and she wouldn't kill you just for fun.\n\n[i]Maybe I should have stayed with her.[/i]\n*page_break\nThe fight on the ground floor fills the inn with yells of rage, grunts of pain, and the smash of breaking plates. A feelsmith touches someone lightly on the cheek, and his victim starts crying hysterically as the magical attack does its work. The nearest pirate with a sword immediately draws and stabs the feelsmith through the heart. He dies fast, still gurgling an attempt at begging for mercy.\n\nOne of the servers rolls her eyes in annoyance at the mess, but other than that, no one reacts. Even on Cutlass Island, there's a simple etiquette: no guns fired inside and no magic except by mutual agreement. Among pirates, an error like that means instant death. The server's face brightens as she checks the 'F' brand on his hand, evidently well aware of the WANTED posters for Kallin Graveson. She hauls the corpse into a sheltered nook and begins sawing through the dead man's neck with a bread knife.\n\nIt's not an easy task. She glances around guiltily and then closes her eyes to concentrate. The head pops off like a cork from a bottle, and the wound cauterises itself in seconds. It seems the server is a healsmith, and a powerful one too. For a hundred gold, using her magic was worth the risk. She wraps the head in her apron and moves toward the closest door. Too bad the feelsmith wasn't Kallin. Even from above, you could see that he had curly hair.\n*choice\n\t#I go and rummage through the corpse's clothing for gold.\n\t\tIt takes you three tries to find your way into the oddly shaped corner where the headless corpse is stashed. The inn has a cleverer design than you would have guessed. At last, however, you're able to kneel on the sticky floor and take what the foolish magic user no longer needs. You find two gold coins in his left shirt cuff and another sewn into his collar.\n\t\t*set gold +3\n\t\t*goto wotcherxba\n\t#I amuse myself by starting a hue and cry after the healsmith.\n\t\t*set morality %-10\n\t\t\"Hoy!\" you yell, beating the rhythm for a rogue magic user on the banister railing. \"That healsmith has Kallin Graveson's head!\"\n\t\t\n\t\tFaces turn up toward you, but no one can hear what you're saying. You continue beating the hunting rhythm with one hand and point at the healsmith's exit with the other. It takes a few tries, but the surging crowd gets the idea eventually, and soon you hear a high-pitched shrieking from outside as the pack brings its prey to ground. The thrill of nearby death makes you shiver with delight.\n\t\t*goto wotcherxba\n\t#I catch up with the healsmith and threaten her until she gives me all her gold.\n\t\t*set gold +5\n\t\tIt takes a long time to elbow your way outside through the thick crowd around the bar, but it's easy to spot the woman carrying the loosely wrapped bundle. You run up to her and step directly into her path so she stumbles and drops the head, which falls out of its cover and rolls off the dirt track into the long grass.\n\t\t\n\t\t\"I know who you think that is,\" you say. \"And I know how you beheaded him.\"\n\t\t\n\t\tShe shakes with fear and doesn't try to deny it. \"What do you want?\"\n\t\t\n\t\t\"What does anyone want?\" you say. \"Gold, of course.\"\n\t\t\n\t\tShe scowls in annoyance. Before you get around to naming an amount, she promises to give you everything she has. There's three gold in her purse, plus two more hidden in the coils of hair pinned up on her head. She probably has more somewhere, but you're feeling generous, so you take what she offers and walk back inside.\n*label wotcherxba\n\nYou run your finger over the brand on the back of your hand, comforted as always by the smooth raised skin that proclaims your magical talent. Even though you're not trained, it could be useful to you someday. Magic is as common as cutlasses, but not everyone is a…\n*choice\n\t#Feelsmith like me. If I could alter my own emotions as well as those of other people, life would be endlessly pleasant.\n\t\t*set magic \"feelsmith\"\n\t\tYou're concerned someone might confuse you for the runaway Kallin Graveson, so you immediately slip on the gloves you keep with you at all times. People will suspect you're a feelsmith, but they won't know for sure.\n\t\t*goto harbxxx\n\t#Healsmith like me. If I could heal myself as well as others, I'd have perfect health forever. Ah well. \n\t\tEvery pirate knows not to harm a healer. You're too important at sea. The \"H\" on your hand is more useful than a pistol.\n\t\t*set killed %-40\n\t\t*set magic \"healsmith\"\n\t\t*set smith 2\n\t\t*goto harbxxx\n\t#Quickensmith like me. Too bad I can only alter objects and not people.\n\t\t*set magic \"quickensmith\"\n\t\t*set smith 3\n\t\tShips always sail better with a quickensmith in the crew. The \"Q\" on your hand is handier than a sword for keeping your place on board ship.\n\n*label harbxxx\n\nNo one knows your true ambitions, since you've never spoken them aloud. You could have it all: strength, skill, wealth, and power. Even the nicest of sailors needs to gain power in order to make their own choices. \n\nLooking out from your balcony to the harbor, you spot a gorgeous ship with trim lines and blood-red sails. The sight of it sets your heart beating faster, and your mouth actually waters. You can’t help it: you’re in love. \n\nOne of the servers gives you an indulgent smile as he sees you staring open-mouthed out the window. \"Seen the [i]Scarlet Sails[/i], have we?\" he says. \"You're not the first to want her. That's her captain over yonder if you're looking to join up. Captain Starboard.\"\n\nThere's another fight developing nearby, as usual on Cutlass Island. Among the broken glass and swearing pirates, the captain of the [i]Scarlet Sails[/i] is a sun-darkened whirlwind of flying fists and feet. Someone knocks off her hat and she sends her parrot to peck at their face in retaliation. The bird and its victim both shriek fit to wake the dead. \n\nOutside the window, the [i]Scarlet Sails[/i] dances on the waves. You wish you were already standing on the sun-warmed deck below those bloody sails.\n*set knowsstarboard 1\n*choice\n\t#I tell Captain Starboard I'm a decent sailor with a little magic, and I want a berth.\n\t\t*set truthfulness %+10\n\t\tThe captain restores her parrot and hat to their proper positions and sighs with satisfaction.\n\t\t\n\t\tShe stops and stares at you. \"Well? What do you want?\"\n\t\t\n\t\tYou show her the brand proclaiming your magical talent. \"To earn my place on that beautiful ship of yours.\" \n\t\t\n\t\t\"Oho!\" she says. \"Flattery!\"\n\t\t\n\t\t\"Flattery!\" squawks the bird.\n\t\t\n\t\t\"Honesty,\" you tell her evenly, doing your best not to be put off by the parrot's yellow glare.\n\t\t\n\t\t\"Flattery!\" it squawks again.\n\t\t\n\t\t\"Flattery's better'n honesty,\" the captain says, showing you the healsmith brand on her own hand. \"That's the parrot's name, after all. But honesty has its uses. Go swab the decks of my ship, and if you're good enough, I'll let you stay on. Tell the one with half a beard that Captain Starboard sent you.\"\n\t\t*set blood_name \"Captain Starboard\"\n\t\t*goto fight\n\t#I impress the captain by beating her at wrestling.\n\t\t*set brawling %+10\n\t\t*set health %-10\n\t\tThe captain restores her parrot and hat to their proper positions and sighs with satisfaction.\n\t\t\n\t\tShe stops and stares at you. \"Well? What do you want?\"\n\t\t\n\t\t\"Your hat,\" you grin at her.\n\t\t\n\t\tShe spreads her arms wide, showing she has no weapons—unless you count the \"H\" branded on one hand. \"Come and get it then.\"\n\t\t\n\t\tYou've fought a healsmith before. They touched your finger, and you collapsed, screaming in pain while your legs blistered and burned as if you were on fire. But this is a public fight, and she won't dare use her magic. Any witnesses would throw her off the balcony in a heartbeat.\n\t\t\n\t\tSwallowing your fear, you charge at her, bearing both of you to the ground. The parrot screeches in protest and takes to the air, dropping a poo on the ground-floor crowd as it does so. \n\t\t\n\t\tYou kneel on the captain's arm, pinning one hand while you grab for the other. She twists and kicks you, sending you flying through the balcony railings. You scream in real terror and grab the railing with both hands, realizing just in time that you're not going to die and you could still win this fight. Before your momentum fades, you swing your body around and kick the captain in the chest. She collapses backward, and you scramble back onto the balcony and sit astride her with both hands on her shoulders, grinning and faking nonchalance as she punches you around the face and arms.\n\t\t\n\t\t\"Done?\" you ask.\n\t\t\n\t\t\"Not by half,\" she grunts.\n\t\t\n\t\tYou lean forward, putting your full weight on her chest and plucking her hat from her head. \"I am.\"\n\t\t\n\t\tAt that moment, despite the sounds of a ripening brawl behind you, you hear the rushing sound of feathers and hurl yourself backward before her loyal bird makes a hole in the back of your head. You toss the hat back to her and hold out a hand to help her up.\n\t\t\n\t\tThe parrot lands on her shoulder and turns its head to glare at you with one yellow eye.\n\t\t\n\t\t\"Captain,\" you say. \"I'm joining your crew.\"\n\t\t\n\t\tShe laughs. \"Very well. The name's Captain Starboard, and my ship's the [i]Scarlet Sails[/i].\"\n\t\t\n\t\tYou can't stop grinning.\n\t\t\n\t\t\"That was fun,\" she continues drily, pointedly releasing your hand, \"but now that you're one of mine…if you lay a hand on me again, I'll keelhaul you. Go to my ship and tell the man with half a beard that I ordered you to sign up.\"\n\t\t\n\t\t\"Yes Captain,\" you say, and make a hasty exit.\n\t\t*set blood_name \"Captain Starboard\"\n\t\t*goto fight\n\t#I make preparations to stow away on board.\n\t\t*set skepticism %+10\n\t\t*set stowaway 1\n\t\t*goto_scene ss1d\n\t#I recruit a crew and steal the [i]Scarlet Sails[/i]. \n\t\t*set truthfulness %-10\n\t\t*set health %-10\n\t\t*goto_scene ss1c\n*label fight\n*set blood_name \"Captain Starboard\"\n*set starboardhere 1\n*choice\n\t#I feed the parrot a crust from a nearby plate before heading for the ship.\n\t\t*set killed %-10\n\t\tCaptain Starboard laughs delightedly and gives you a friendly punch that almost dislocates your shoulder.\n\t\t*goto fighton\n\t#I find the nearest knot of brawlers and join in, showing off on my way to doing as I'm told.\n\t\t*set brawling %+10\n\t\tYou leap into the crowd to deal out kicks, punches, and the occasional bite. It's always a good idea to stay in shape.\n\t\t*goto fighton\n\t#I duck my head submissively so she doesn't see the ambition in my face. \"Thank you, Captain.\"\n\t\t*set killed %-10\n\t\t*set truthfulness %-10\n*label fighton\n\nThe fight rises to a crescendo, filling the inn with noise and fury and shattered glass. Your own balcony erupts in blood and fists, and your exits are blocked. A quickensmith grabs a balcony railing, and seconds later, they have a club to fight with. \n*if smith \u003c3\n\tYou feel a stab of jealousy that you can't use your own type of magic in a fight unless you want the entire crowd to turn on you in a mortal fury.\n\nOne of the servers hurries past with a stack of splintered wooden mugs, and\n*if smith \u003c3\n\this bare arm brushes yours as he passes. Before you can control it, your magic unfurls inside you,\n\t*if smith = 1\n\t\tand you feel a wave of hatred for all pirates. They're worse than a pack of dogs: they smell, they bite, and they eat and drink and fight and snore like animals.\n\t\t\n\t\tYou shake off the server's emotions and quickly neutralize your expression in case he looks back. If he knows you saw his rage, it could tip him over the edge into action, and it's clear he'd fight to kill. Sometimes you wish you weren't a feelsmith.\n\t\t*goto capblood\n\t*else\n\t\tand you see that the man has a permanent migraine and a racing pulse. He needs both a healer and a holiday, but if he could afford either, he wouldn't need them. You know better than to offer to ease his pain, and you quickly neutralize your expression in case he glances back. Looking into somebody's body without their permission is an offense that could get you drawn and quartered; a gruesome way to ensure a healsmith's friends can't haul them back from the brink of death.\n\t\t*goto capblood\n*else\n\this tray touches your bare arm as he passes. Before you can control it, your magic unfurls inside you, and you feel the battered and rum-soaked reality of the mugs. Their wood is warped, made from a mixture of trees and scrap, and the oldest mugs are rubbed smooth from an endless procession of callused fingers. \n\t\n\tYou pull your perspective back into your flesh-and-blood self with an effort and shake your head slightly to get rid of the last dregs of the sensation.\n*label capblood\n\nCaptain Starboard jumps into the fray, directing her parrot to flap in the faces of her opponents. The bird and the woman move together with devastating skill, cutting a path through the crowd. She steals a drink or two along the way, and it even looks like she's made a new friend, since she and another captain end up fighting back to back as several others team up against them. The parrot flaps up to the rafters, looking crankier than ever. When the brawl evolves back into a free-for-all, Captain Starboard takes a breather and comes back to you. \n\n\"You know what, scrubber?\" she says.\n*fake_choice\n\t#\"What?\" you say.\n\t\t*set name \"Scrubber\"\n\t#\"The name's Sam.\"\n\t\t*set name \"Sam\"\n\t#\"The name's Casey.\"\n\t\t*set name \"Casey\"\n\t#\"The name's River.\"\n\t\t*set name \"River\"\n\t#\"The name's ________\"\n\t\t*input_text name\n\t\t\t\nHer bird returns to her shoulder and clacks its beak at you. She turns her back to the room as if it's a perfectly calm scene and says, \"I lost a lot of crew in a fight last month. If you save me the trouble of sorting out the good from the bad in this hole, I'll give you a hammock to use instead of a scrubbing brush on your first night.\"\n\n\"Can do, Captain,\" you say, thrilled to have gained responsibility so quickly. \n\nOne day, you'll be your own…\n*fake_choice\n\t#Man, with your own ship. \n\t\t*set he \"he\"\n\t\t*set his \"his\"\n\t\t*set him \"him\"\n\t#Woman, with your own ship.\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n\t#Captain, with your own ship.\n\t\t*set he \"they\"\n\t\t*set his \"their\"\n\t\t*set him \"them\"\n\nWith the prospect of a brighter future dangling in front of you, the pirate rabble around you looks like a living armory. It's crucial that you choose your weapons wisely. \n\nYou shake off a powerful sense of dread and focus on your task. Glancing around, you see two pirates drunkenly passed out mid-fight, another attempting to seduce one of the servers, and still another having a desperate swordfight with one of the supporting columns—and losing. It's clear Captain Starboard has given you the task of recruiting new crew members because it's too depressing to bother doing herself.\n\n*label choose_again\nYou find new crew members who are:\n*choice\n\t#Smart enough to not be too drunk in this lawless place. \n\t\t*set skepticism %+10\n\t\t*set sober %+10\n\t\tThe drunks tend to be downstairs near the bar, so you head up to the flat roof, where you're immediately immersed in the informal market of Cutlass Island. \n\t\t\n\t\tYou choose four crew members who are seafaring types, literally or virtually born on board. Their skin is hard, and their hair is short: two men and two women. The women are sisters, Taliha and Kila, and pleased at the chance to continue working together. \n\t\t\n\t\tIf you ever had a sister, you don't remember her. Probably not, since your earliest memory is getting sold here as a child, and you were already alone.\n\t\t\n\t\tOne of the sellers is hissing insults at his last slave, a young man who stands upright and impassive, wearing his manacles like jewelry. It's easy to see why he hasn't sold. He's far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand, marking him as a healsmith. He sees you looking at him and subtly changes the way he stands so he suddenly looks biddable. Then he winks and straightens up again. His self-assurance is breathtaking, and you know that he knows you'll buy him—and then set him free. \n\t\t*set bobname \"Taliha\"\n\t\t*set janename \"Kila\"\n\t\t*choice\n\t\t\t#Too bad. I'm not buying someone who's so obviously going to cause trouble.\n\t\t\t\t*set skepticism %+10\n\t\t\t\t*set jaluhere 0\n\t\t\t\t*goto notjalu\n\t\t\t#I can't resist a bad boy.\n\t\t\t\t*set jalu %+10\n\t\t\t\t*set jaluhere 1\n\t\t\t\t*goto gigglebox\n\t\t\t#You can never have too many healsmiths after a sea battle. Maybe he can give me some pointers on my own magic.\n\t\t\t\t*set magical_skill %+10\n\t\t\t\t*set jaluhere 1\n\t\t*label gigglebox\n\t\t*set jaluname \"Jalu\"\n\t\t*set gold -2\n\t\tYou bargain the seller down to two gold pieces and hope you haven't just bought yourself a new problem. When you ask the ex-slave his name, he tells you \"Jalu\" but offers no further information—and asks no questions about his fate. \n\t\t\n\t\t*goto Jalu\n\t#Obviously in need of work.\n\t\t*set morality %+10\n\t\t*set skepticism %-10\n\t\t*set gold -8\n\t\t*set killed %-10\n\t\tYou're drawn, as always, to the roof of the inn. It may as well be your home, since your earliest memory is being sold there as a toddler. You don't remember your own family or where you were born. It doesn't matter any more.\n\t\t\n\t\tThere aren't any children there at this time of night, so you pick the three slaves that you think would suit Captain Starboard best and let them know they'll be treated and paid exactly the same as the rest of the crew. The first is Gana, the second his son Jarn, and the third is a wiry young woman named Rain who somehow manages to have a pistol on her hip despite the fact she was empty-handed when you bought her. \n\t\t\n\t\tAfter choosing them, you spot a man your own age with an \"H\" brand on the back on his hand, marking him as a healsmith. His master is clearly going to beat him if he doesn't sell before dawn, but no one is interested in buying a slave with such an arrogant look in his eye. Naturally, you buy him. He's in unusually good shape for a slave—for anyone, to be perfectly honest—and volunteers his name: Jalu. Although he has the most to gain from your gift of freedom, he gives you a casual \"Thanks\" and clearly considers his slave debt paid from then on. The other three treat you with a flattering deference, and you know you have their loyalty—for now.\n\t\t*set bobname \"Gana\"\n\t\t*set janename \"Jarn\"\n\t\t*set jaluhere 1\n\t\t*goto Jalu\n\t#In possession of nice-looking guns you might steal later. \n\t\t*set gun_fu %+10\n\t\t*set truthfulness %-10\n\t\tThe best weapons will be on the fifth floor—that is, the roof—where everyone who's anyone goes to sell everything that's anything. You've been sold there a few times yourself, and your earliest childhood memory is the day you met your first master there (may his body never be recovered).\n\t\t\n\t\tAfter a quick stroll around to see what's on offer, you have two rather nice guns to recruit—along with their owners. They're both women, and since they're sisters, they are pleased to find someone ready to hire both at once. You pick a couple more based on their sun-darkened faces—both are clearly experienced sea dogs—and then one of the slaves on offer catches your eye. It's easy to see why he hasn't sold: far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand, marking him as a healsmith. \n\t\t*set bobname \"Gina\"\n\t\t*set janename \"Laren\"\n\t\t*choice\n\t\t\t#Too bad. I'm not buying someone who's so obviously going to cause trouble.\n\t\t\t\t*set skepticism %+10\n\t\t\t\t*set jaluhere 0\n\t\t\t\t*goto notjalu\n\t\t\t#I can't resist a bad boy.\n\t\t\t\t*set jalu %+10\n\t\t\t\t*set jaluhere 1\n\t\t\t\t*goto giggleboxes\n\t\t\t#You can never have too many healsmiths after a sea battle. Maybe he can give me some pointers on my own magic.\n\t\t\t\t*set magical_skill %+10\n\t\t\t\t*set jaluhere 1\n\t\t*label giggleboxes\n\t\t*set jaluname \"Jalu\"\n\t\t*set gold -2\n\t\tHis name is Jalu, and his owner sells him for just two gold pieces. Gina and Laren immediately introduce themselves to him and start chatting amiably.\n\t\t*goto Jalu\n\t#Definitely not feelsmith men—I'm not going to mess with Captain Graves, even from afar, and I don't want to behead anyone today. \n\t\t*set skepticism %+10\n\t\t*set morality %+10\n\t\tYou pick two flint-eyed women and two map-eyed older men. They all look sun-hardened and practical, which bodes well for life on board ship. Captain Starboard should be pleased. The men are Donn and Hann; brothers who've sailed together all their lives. You don't remember your own family or where you were born. If you ever had a brother, you don't remember him. Probably not, since your earliest memory is getting sold here as a child, and you were already alone.\n\t\t\n\t\tYour stomach grumbles. Given that you don't know when you'll next get some food, you head upstairs to fortify yourself with some decent chow. There's always someone selling food up there, along with every other item under the sun—including people.\n\t\t\n\t\tOne of the sellers is hissing at his last slave, a young man who stands upright and impassive, wearing his manacles like jewelry. It's easy to see why he hasn't sold. He's far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand, marking him as a healsmith. \n\t\t*set bobname \"Donn\"\n\t\t*set janename \"Hann\"\n\t\t*choice\n\t\t\t#Too bad. I'm not buying someone who's so obviously going to cause trouble.\n\t\t\t\t*set skepticism %+10\n\t\t\t\t*set jaluhere 0\n\t\t\t\t*goto notjalu\n\t\t\t#I can't resist a bad boy.\n\t\t\t\t*set jalu %+10\n\t\t\t\t*set jaluhere 1\n\t\t\t\t*goto giggleboo\n\t\t\t#You can never have too many healsmiths after a sea battle. Maybe he can give me some pointers on my own magic.\n\t\t\t\t*set magical_skill %+10\n\t\t\t\t*set jaluhere 1\n\t\t*label giggleboo\n\t\t*set jaluname \"Jalu\"\n\t\t*set gold -2\n\t\tYou argue the seller down to a measly two gold pieces. When you ask the ex-slave his name he tells you \"Jalu\" but offers no further information—and asks no questions about his fate. Donn and Hann immediately ask him about his travels, and the three of them quickly discover they have several old haunts in common.\n\t\t*goto Jalu\t\t\n\t#Feelsmith men. Anything that bothers Captain Graves is good news for every other man, woman and child in all of Rahana. \n\t\tYou search for an hour and don't find a single feelsmith man. Of course, most magic users wear gloves, although there are a lot of healsmiths and quickensmiths deliberately going bare-handed today to avoid getting mistaken for Kallin Graveson. So much for annoying your second—and worst—master. It's probably for the best, since you pretended to be catastrophically stupid just to make him sell you on, and you don't want to draw his attention back to you.\n\t\t*goto choose_again\n\n*label Jalu\n\nJalu is very attractive, with liquor-smooth skin and a body that shows no trace of past illness or mistreatment—just muscles. A lot of muscles. You wonder uneasily if Captain Starboard will object to having a handsome ex-slave on board. Hopefully she likes a nice view. Or if she's like Blood, she'll be glad to have a healsmith around to magically alter her dark hair.\n*set jalumuscles 1\n*fake_choice\n\t#I'll certainly enjoy seeing him every day, and I gather the feeling is mutual.\n\t\t*set jalu %+10\n\t#I have a bad feeling about him suddenly. He's hiding something.\n\t\t*set skepticism %+10\n\t#I'm just glad to have freed a slave before his spirit was broken.\n\t\t*set skepticism %-10\n\t#I certainly enjoyed my time spent with Captain Blood, and not just for her winning personality.\n\t\t*set captain_blood %+10\nHis healsmith brand is off-center and messily done, although he's tall enough that he must have eaten well as a child. You guess that he had a safe childhood but was taken by pirates around puberty. That would have been when his healsmithing ability became apparent for the first time. It may even have given him enough value to keep him alive. Whatever happened to him, it hasn't taken away his sense of his own worth. He might well have found his true calling on board ship. Perhaps he'll make a good first mate for you one day—if he can be trusted.\n*label notjalu\n*set jalumuscles 1\n\nYou have a last quick wander among the sellers on the roof, satisfied with the crew you've found. It's been a good day so far, and it's hard to keep your excitement from spilling over and drawing unwanted attention. \n\nYou already have a gun and sword, but your mouth waters at the sight of fresh fruit and vegetables, and you even spot someone with a couple of bars of real soap to sell. The floral smell of the soap is sweeter than the smell of freshly cut wood. Probably because soap is rarer. \n\nFruit and vegetables will stave off scurvy for a while, and the soap might just help you get rid of that itchy rash you've had for the last six weeks.\n*label shopping\nYou check your remaining coins—there \n*if gold > 1\n\tare ${gold} pieces left.\n\t*goto axb\n*if gold = 1\n\tis just one piece remaining.\n\t*goto axb\n*if gold = 0\n\tisn't a single one left. Ah wel..\n\t*goto harbor\n*label axb\nAh well. There's no market at sea, so it's better to spend it than save it, right? You look around and see…\n*choice\n\t*selectable_if (gold > 1) #Fresh fruit and vegetables. Two gold pieces.\n\t\t*set health %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 3) #A bar of soap. Four gold pieces.\n\t\t*set filth %-10\n\t\t*set health %+10\n\t\t*set gold -4\n\t\t*goto shopping\n\t*selectable_if (gold > 9) #A new gun. A better one. Ten gold pieces.\n\t\t*set gun_fu %+10\n\t\t*set gold -10\n\t\t*goto shopping\n\t*selectable_if (gold > 9) #A new sword. A better one. Ten gold pieces. \n\t\t*set swordfighting %+10\n\t\t*set gold -10\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #An array of brilliantly colored silks cut in lengths for sashes. Two gold pieces.\n\t\tYou pick the best and brightest colors for when you want to impress others with your wealth and style.\n\t\t*set firebird %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #A leatherworker with an array of wide belts. Two gold pieces.\n\t\tYou negotiate to get two for the price of one, wearing one belt low on your hips and the other across your chest. This will make it easier to carry several guns at once.\n\t\t*set gun_fu %+10\n\t\t*set firebird %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #The tallest, glossiest, most buckle-ridden boots you've ever seen. Two gold pieces.\n\t\tThey fit perfectly, hidden dagger-sheaths and all. You walk taller with them on—literally.\n\t\t*set swordfighting %+10\n\t\t*set gold -2\n\t\t*set firebird %+10\n\t\t*goto shopping\n\t#It really is time to get moving.\n\t\t*goto harbor\n\n*label harbor\n\nOn your way out, you almost knock over one of your old crew members, but she steps aside and catches your wrist so you don't fall down the stairs. \"Steady on,\" she says.\n\nThe palm of her hand is criss-crossed with old scars. She's one of the rare people who doesn't shy away from touching a magic user, probably because she's too fond of wrestling to care.\n\n\"Thanks, Firebird,\" you say.\n\nShe shrugs awkwardly. Conversation always makes her surly. So does silence, of course. Her natural state is fighting, with or without a sword. She fights like other pirates breathe. In fact, she'd make a valuable addition to any crew. \n*label truthordare\n*choice\n\t#I tell her exactly what I'm doing and ask if she wants to join me.\n\t\t*set truthfulness %+10\n\t\t*set firebird %+10\n\t\t\"I've had enough of Captain Blood,\" you say, \"and I'm joining the crew of the [i]Scarlet Sails[/i]. You want in?\"\n\t\t\t\n\t\tShe purses her lips, unconsciously resting one hand on the sword at her hip. \"Captain Blood was fun, but I've fought everyone on that ship a hundred times. A change is as good as a challenge.\"\n\t\t*goto rulesyi\n\t#I tell her Captain Blood has abandoned the entire crew and left the island…but I'll give her a berth if she gives me three gold.\n\t\t*set truthfulness %-10\n\t\t\"Captain Blood's taken off,\" you say, \"but I've found a new crew. You want in? It'll cost you.\"\n\t\t\t\n\t\t\"Huh,\" she says. \"I would have thought she'd have kept me and ditched the rest of you. Ah well.\" She unlaces her left boot and counts out three gold from underneath her foot. \n\t\t\t\n\t\tYou tried keeping money in your boot once, but it hurt too much. Still, Firebird doesn't seem to notice physical pain any more. She has a new gash across one arm that'll give her yet another scar to add to the rest. No wonder she looks so cheerful at the moment: Cutlass Island is a veritable buffet of foolish challengers.\n\t\t*set gold +3\n\t\t*goto rulesyi\n\t#I say goodbye to her.\n\t\t*set skepticism %-10\n\t\t*set firebird %+10\n\t\t\"You never hit me in anger,\" you say, certain Firebird knows the value of such a compliment. \"So, thank you.\"\n\t\t\n\t\t\"Where are you going?\" she asks.\n\t\t*goto truthordare\n*label rulesyi\n*set ships_in_fleet 1\n\nYou're almost at the harbor when you spot another of the crew lurking between empty crates on the dock. Firebird has her sword out and on guard before you've consciously realized the hunched figure in the shadows is someone you know. \n*fake_choice\n\t#Grab your gun.\n\t\t*set gun_fu %+10\n\t#Grab your sword.\n\t\t*set swordfighting %+10\n\t#Approach carefully.\n\t\t*set skepticism %-10\n\nYou let one hand creep toward the weapon on your hip, but when you see the man's face, you relax. Firebird bursts out laughing.\n\n\"Truman!\" she says. \"Hiding as usual, I see.\"\n\nHe steps into the light, his arms raised. \"Feelsmith male, young, straight hair,\" he quotes softly from Captain Graves's WANTED poster. \"It could be me.\"\n\n\"Ah!\" says Firebird. \"You shoulda asked me to keep you company. I'd have fought anyone that tried to take your head.\"\n\nTruman smiles his thanks, but as usual, he's unable to let a truth remain unspoken. \"Even you couldn't protect me from a mob the size of that one.\" He gestures at the inn, where several pirates spill loudly from the doors and at least one is held upside down from an upper window, wailing an apology for some perceived slight.\n\n\"Come with us,\" you blurt out.\n\nTruman stares at you. \"Where are you going? I'll come, but why bring me?\"\n\nThere's no need to tell the truth out loud, but your real reason for bringing him is…\n*fake_choice\n\t#He's right to be worried for his safety here. \n\t\t*set morality %+20\n\t#A feelsmith with his unshakeable honesty is a portable lie detector. \n\t\t*set skepticism %+10\n\t\t*set truthfulness %+10\n\t#He's similar enough to Kallin Graveson to make a useful bargaining piece later.\n\t\t*set morality %-10\n\t\t*set skepticism %+10\n\n\"I need more men,\" you say blithely. \"Let's go.\"\n\nYou can tell he doesn't believe you (mostly because he says so out loud), but he chooses to go with you rather than continue to hide and hope no one more energetically bloodthirsty spots him. To be honest, it's pleasant to have him around. He's the only person you know who doesn't drink or fight. Instead, he works and sings—and generally stays out of your way unless you seek him out.\n\nFirebird doesn't question your decision at all, which gives you a delicious taste of authority. It could be addictive.\n\nThere are only a few men guarding the [i]Scarlet Sails[/i], several of them asleep and snoring. Your explanation of Captain Starboard's orders is enough to get you on board.\n\nAs you walk up the gangplank onto your new home, Truman blurts out, \"Oh! How beautiful!\"\n*fake_choice\n\t*selectable_if (gold > 0) #The day's going well, so I send Firebird to buy me one last drink.\n\t\t*set sober %-10\n\t\t*set gold -1\n\t#I congratulate the others on our new ship. We're a team.\n\t\t*set killed %-10\n\t\t*set skepticism %-10\n\t#I kick the other guards awake and tell them to swab the deck or face the consequences of sleeping on watch.\n\t\t*set filth %-10\n\t\t*set killed %+10\n\n*if smith = 3\n\tYou rest your hands on the wooden railing and let your sense of self fade as you magically examine the ship. She's well made, with no leaks whatsoever, and she's as beautiful inside as out. You sense her vibrating with a kind of energy, as if she longs to sail fast and far. The humans on board are dim shadows, crawling over her like babies too young to leave their mother. You sigh with mingled delight and sorrow as you pull away from your ship-sense and feel your own small, inelegant body once more.\n\nYou find a spare locker and hammock and string your new bed up between Firebird and Truman, and then you explore the ship until Captain Starboard comes on board. She casts a glance over your new recruits and nods once before snapping out orders to ready the [i]Scarlet Sails[/i] for departure. \n\nFirebird spots someone with double swords and immediately insults him. He cheerfully draws and engages her in a friendly swordfight. \n*fake_choice\n\t#I join in. Firebird's technique is suberb, and every fight with her is a lesson.\n\t\t*set swordfighting %+10\n\t\t*set firebird %+10\n\t\tYou take careful note of the way Firebird tricks her opponent into striking with his weaker arm when he should be using it to guard. It's a beautiful thing to watch, and she laughs so delightedly as she defeats you both that instead of making an enemy of your new acquaintance she makes a friend. \n\t\t*goto starboard\n\t#I check that no one's bothering Truman.\n\t\t*set truman %+10\n\t\t*set skepticism %-10\n\t\tTruman's always wary of those around him, but he's the one person you know isn't a threat to you. Apart from anything else, even you could take him in a fight. You stand next to him at the railing and watch the lights of Cutlass Island shrink to a distant glow.\n\t\t\n\t\t\"It's strange,\" he says. \"No matter what I'm leaving behind, the lights on shore always look like home as they fade away.\"\n\t\t*goto starboard\n\t#If only Truman were into wrestling so I could get physical with him.\n\t\t*set truman %+20\n\t\t*set brawling %+10\n\t\tHe's always wary of those around him, but he's the one person you know isn't a threat to you. Apart from anything else, even you could take him in a fight. You stand next to him at the railing and watch the lights of Cutlass Island shrink to a distant glow.\n\n\t\t\"It's strange,\" he says. \"No matter what I'm leaving behind, the lights on shore always look like home as they fade away.\"\n\n\t\tYou give him a sympathetic punch in the arm, which he seems to appreciate.\n\t\t*goto starboard\n\t#Firebird is so gorgeous I have to force myself to stop staring at her or she might fight me for real.\n\t\t*set firebird %+10\n\t\t*set killed %-10\n\t\tYou saw dancers with scarves once, when you were a slave child at an upmarket fair. They swung and leapt and arched as if only manners kept them from flying away. Whenever Firebird fights, you remember that starlit night and your heart leaps in your chest. She makes every fight into a dance.\n\t\t*if firebird > 65\n\n\t\t\tYou blush when she catches you watching her, but she just grins even wider.\n\t\t\t*goto starboard\n\t\t*else\n*label starboard\t\n\nWhen the waves ripen, Captain Starboard takes up her position on the bridge and orders the crew waiting in the rigging to set the sails. In minutes, the blood-red sailcloth bellies out with the wind. You float away into the darkness with the wind at your back.\n\nAfter the ship is sailing smoothly and your first shift is done, Captain Starboard takes you to the biggest cabin, showing you a set of rules carved into the door. \"Read them,\" she says, \"or find someone to read them to you. There's enough new crew that we'll vote on them again tomorrow.\"\n\nAt dawn, you're tipped from your hammock by way of invitation to join the rest of the crew on deck. It's time to vote on the ship rules. Those you brought on board watch your face from the corners of their eyes. You suspect they'll all copy your vote. Before anyone sees you grinning with the thrill of power, you duck your head. It's not time to show your true colors yet. At the moment, you're a nobody. But that position will change soon, and you'll vote to protect your own future.\n\n\"First,\" says Captain Starboard, \"by a show of hands, how shall we distribute spoils when we have them?\"\n*fake_choice\n\t#Equal shares for every soul on board. \n\t\t*set skepticism %-10\n\t#Triple share for the captain and double share for the first mate.\n\t\t*set golden 2\n\t#Five shares for the captain and four shares for the first mate. \n\t\t*set golden 3\n\n\"Excellent,\" she says, pretending not to notice the way you and your followers skew the vote. \"What about the level of cleanliness?\"\n*fake_choice\n\t#Every bit of the ship scrubbed daily, including the head—starting immediately.\n\t\t*set skepticism %+10\n\t\t*set killed %+10\n\t#Every bit of the ship scrubbed once a week, including the head.\n\t\t*set filth 2\n\t\t*set filth %+10\n\t#When it rains it’ll wash things clean enough—and a mop if there’s a lot of blood or vomit. \n\t\t*set filth 3\n\t\t*set filth %+10\n\t\t*set health %-10\n\nThere's a mumble of vague discontent at the thought of doing chores at all, but your recruits faithfully vote with you.\n\n\"One more thing,\" says Captain Starboard. \"How will we punish disobedience on board?\"\n*fake_choice\n\t#Minor offenses will be punished with a night in the brig; major offenses with longer. Direct disobedience to the captain or mate gets a keelhauling.\n\t\t*set skepticism %-10\n\t\t*set filth %+10\n\t#Minor offenses will be punished with a week in the brig without food, major offenses punished with the cat o’nine tails. Direct disobedience to the captain or mate gets a keelhauling.\n\t#Minor offenses will be punished with the cat o’nine tails. Direct disobedience to the captain or mate gets a keelhauling.\n\t\t*set morality %-10\n\t\t*set killed %+10\n\t\t\nThe prospect of a keelhauling stills every tongue. Captain Starboard glances around with a grim smile, pleased that her power has been acknowledged. You look just an innocent and humble as you know how. No one will be keelhauling you if they know what's good for them.\n\nThe cook needs a helper, so you're sent to the galley, where you spend your entire day boiling and salting strips of fresh meat. Firebird teases you when she passes through for meals, but after dinner, Truman stays by your side, silently helping you as the blisters on your hands begin to bleed.\n\n*if jaluhere = 0\n\t*set jaluname \"Jalu\"\n\tAt last, the cooking is done and you're released from night shift to recover. You wake at a tap on your shoulder and stare into the annoyingly perfect face of that cocksure slave from Cutlass Island.\n\n\t\"Call me Jalu,\" he says. \"And you are?\"\n\n\t\"$!{name}.\" \n\n\t\"I could have sworn you were going to buy me,\" he says comfortably. He's very attractive, with liquor-smooth skin and a body that shows no trace of past illness or mistreatment—just muscles. A lot of muscles. \n\t*set jalumuscles 1\n\n\tYou need to piss, and your head is still muzzy
