 shorter than he is. \"Brother? Sister? Pet?\"\n\t\t\t\n\t\t\t\"I never swore vengeance on you,\" you say honestly. \"Once I got out of your clutches, I made my own life. A good one.\"\n\t\t\t\n\t\t\t\"And yet here you are, back in my clutches,\" he says smoothly. \"How sad.\"\n\t\t\t*fake_choice\n\t\t\t\t#\"At least I lived,\" I tell him, \"for a bit.\"\n\t\t\t\t#\"Yes, Captain,\" you say and lower your head.\n\t\t\t\t#\"Please just let me go.\"\n\t\t\tThe ships crash together, and his wide stance is shaken just enough for you to hurl yourself backward. Without looking around, you scramble away among the fighters and the dead and leap for your own ship in terror.\n\t\t\t\n\t\t\tYou turn and see Captain Graves taunting another solo fighter from your ship before slashing her throat and going on to his next victim. It's clear he's aiming for smaller, younger opponents. Nothing has changed since you were a helpless child. \n\t\t\t\n\t\t\tExcept it has. You don't belong to him any more.\n\t\t\t\n\t\t\tUnable to stop shaking, you dive under a lifeboat for shelter and tell yourself over and over that you're not a slave any more and you never will be again. Just as three women rush toward you at once, sensing easy prey, someone rings the ship's bell, and they fall over one another to look. [i]Ding-ding-ding! Ding-ding-ding![/i]\n\t\t\n\t\t\tYou glance over yourself and see \n\t\t\t*if jaluhere = 1\n\t\t\t\tJalu at the bell. \n\t\t\t\t*set health %-10\n\t\t\t\t*goto captainjalu\n\t\t\t*else\n\t\t\t\tTruman at the bell, holding a smoking pistol. Following the line of his hand, you see the crumpled heap that used to be Captain Graves. Your old master is dead at Truman's hand. Your mind struggles to catch up. When it really matters, Truman can kill.\n\t\t\t\t*goto trumansavesyou\n\t#I stay on the [i]Scarlet Sails[/i] where it's safer and I can fight honestly.\n\t\t*set skepticism %+10\n\t\t*set truthfulness %-10\n\t\t*if ((brawling + swordfighting) > 60)\n\t\t\tYou turn and fight, not worrying about who lives and who dies as long as you're one of the ones left standing when the gun smoke clears. It's close work, so there's no chance to reload your own gun, although it's handy as a threat when three of the enemy pirates try to attack you at once. Two of them back off, and you flick the sword from the third man's hand before they all realize you were bluffing. Then there's two to fight, so you slash one across the chest to make him stumble back into the other. You're about to finish them both off when the ship's bell rings out in an obvious pattern: [i]Ding-ding-ding! Ding-ding-ding![/i]\n\t\t\t\n\t\t\tLeaving the enemy to disentangle themselves, you glance over and see \n\t\t\t*if jaluhere = 1\n\t\t\t\tJalu at the bell. The tide's about to turn, and you dive under a lifeboat to hide until it's clear what's happening and who you need to fight next.\n\t\t\t\t*goto captainjalu\n\t\t\t*else\n\t\t\t\tTruman at the bell, holding a smoking pistol. Following the line of his hand, you see the crumpled heap that used to be Captain Graves. Your old master is dead at Truman's hand. Your mind struggles to catch up. When it really matters, Truman can kill.\n\t\t\t\t*goto trumansavesyou\n\t\t*else\n\t\t\t*set health %-10\n\t\t\tYou turn and fight, not worrying about who lives and who dies as long as you're one of the ones who lives. It's close work, so there's no chance to reload your gun, and you're struggling to hold your own. You're taking wounds from all quarters, and you can feel your body starting to seize up as your mind calmly informs you that you're going to die. Just as three women rush you at once, sensing easy prey, someone rings the ship's bell, and they fall over one another to look. [i]Ding-ding-ding! Ding-ding-ding![/i]\n\t\t\n\t\t\tLeaving the enemy to disentangle themselves, you glance over yourself and see \n\t\t\t*if jaluhere = 1\n\t\t\t\tJalu at the bell. The tide's about to turn, and you dive under a lifeboat to hide until it's clear what's happening and who you need to fight next.\n\t\t\t\t\n\t\t\t\t*goto captainjalu\n\t\t\t*else\n\t\t\t\tTruman at the bell, holding a smoking pistol. Following the line of his hand, you see the crumpled heap that used to be Captain Graves. Your old master is dead at Truman's hand. Your mind struggles to catch up. When it really matters, Truman can kill. \n\t\t\t\t*goto trumansavesyou\n*label captainjalu\n*fake_choice\n\t#I bet Jalu has a plan to save us.\n\t\t*set jalu %+10\n\t#Jalu's definitely hiding something.\n\t\t*set skepticism %+10\n\t#That liar probably knew all along that Captain Graves would be in this area!\n\t\t*set jalu %-10\n\"To me!\" Jalu yells in a voice that carries across the water and cuts through the grunts and cussing of those still fighting. \"To me, all those loyal to Kallin Graveson! To me!\"\n\nIn an instant, scores of men on the other ships give an answering cry hailing Jalu as Captain Kallin. \n\nHe stole more than treasure from Captain Graves: he stole loyalty. It's clear at once that the vast majority of enemy crew were waiting for Jalu to give the order to attack. When he catches sight of you, he winks as if you've been working for him all along. Which of course you have. He even fooled Truman. Or did he?\n*page_break\n*set knows_about_jalu_name 1\n*if gravesdead = 1\n\t\n\tNow that Captain Graves is dead, all his people are free. You stand up in the open and cheer for Jalu, if for no other reason than the fact he's clearly about to have six ships under his command. He gambled and won, and you feel a stab of jealousy, quickly stifled.\n\t\n\tJalu is smart enough to see what you're thinking, and he assigns one of his men to pilot the bone-decorated ship under your command. Your first order is that the bones be removed, which he does gladly. It's a strange feeling to own the ship that used to be your prison.\n\t\n\tA good feeling.\n\t*if ships_in_fleet = 1\n\t\t*page_break\n\t\t*achieve captainy\n\t\t*set ships_in_fleet +6\n\t\t*set ranking 5\n\t\t*set rank \"Fleet Captain\"\n\t\tYou arrange to swap ships, preferring the [i]Scarlet Sails[/i] as your flagship.\n\t\t*goto graves\n\t*else\n\t\t*set ships_in_fleet +6\n\t\tYou remain on board the [i]Scarlet Sails[/i], letting Jalu's man captain the second ship under your command.\n\t\t*set rank \"Fleet Captain\"\n\t\t*goto graves\n*else\n\n\tJalu draws his pistol and holds it with both hands, aiming at something on the other ship. You forget your own caution as you crawl out from under the lifeboat and stand to watch Captain Graves face Jalu without flinching. \n\t\n\tHe laughs uproariously, not even drawing his own weapon. \"Do you think you're going to kill your own father?\"\n\t\n\t\"Yes,\" says Jalu quietly, and fires.\n\t\n\tThe shot hits Captain Graves in his mouth, destroying the cruel sneer that used to be so frightening. In such a short moment, the scourge of Captain Graves is gone from the world. It's a bloody sight, but you can't help feeling lighter knowing that he'll never whip a child again.\n\t\n\tThose men loyal to him surrender within minutes, and Jalu orders them placed in the flagship's brig. You know very well they won't be comfortable, and they won't be escaping. Captain Graves knew how to build a cage. But you and Jalu have escaped. \n\t\n*label graves\n*fake_choice\n\t#I'll never trust Jalu again.\n\t\t*set jalu %-10\n\t\t*set skepticism %+10\n\t#I'll never doubt Jalu again.\n\t\t*set jalu %+10\n\t\t*set skepticism %-10\n\t#Jalu is smart. I won't forget that.\n\t\t*set jalu %+10\nJalu evidently has the combined gifts of treachery and leadership. Luckily, he's your ally—and taking you to a pile of riches beyond your wildest dreams. \n\n*if knows_about_jalu_name = 0\n\tJalu isn't Jalu at all!\n\t\n\tIt all makes sense. Jalu was a terrible healsmith with a botched brand because he wasn't a healsmith at all. He was a feelsmith, hiding his brand because it revealed who he was: Kallin Graveson. The son of Captain Graves; the one man Captain Graves trusted to carry his treasure map on his own skin. And Jalu cast off his name, stole the map, and stole the loyalty of his father's men.\n\t\n\tYou can't help baring your teeth in a vicious smile. Captain Graves could not have been more badly hurt. Jalu destroyed everything he loved.\n\t*set knows_about_jalu_name 1\n\t*goto lalala\n*else\n*label lalala\n\nLooking at Jalu, you suddenly remember the day a child your own age was brought on board that same bone-bound flagship. He was screaming, struggling, and calling for his mother. The only difference between you was that Jalu—Kallin—was forced to learn how to be as vicious as Captain Graves. Down in the foul belly of the ship with the other slaves, you rarely saw the captain. That was a mercy he didn't get.\n\nHow do you dispose of your prisoners?\n*fake_choice\n\t#Kill them.\n\t\t*set morality %-10\n\t\t*set truman %-10\n\t#Drop them off on an island where they can make a new life.\n\t\t*set morality %+10\n\t\t*set skepticism %-10\nThe air feels clearer when your prisoners are gone.\n\n*if ((skepticism > 65) or (jalu > 60)) and (knows_about_jalu_serpent = 0)\n\tYou suspect Jalu's still hiding something. Truman has already confirmed that the treasure is real, but you decide to investigate further.\n\t*choice\n\t\t#Ask Jalu directly what he’s hiding. \n\t\t\t*if jalu > 65\n\t\t\t\t*goto success\n\t\t\t*else\n\t\t\t\t*goto fail\n\t\t#Threaten Jalu until he tells you what he’s hiding. \n\t\t\t*if (morality \u003c 40) and (truthfulness > 60)\n\t\t\t\t*goto success\n\t\t\t*else\n\t\t\t\t*goto fail\n\t\t#Tell Truman you suspect Jalu is hiding something and ask him to make Jalu tell you what it is. \n\t\t\t*if truman >65\n\t\t\t\t*goto success\n\t\t\t*else\n\t\t\t\t*goto fail\n\n\t*label success\n\tThe ships are sorted into a new and mighty fleet. New captains are \n\t*if ships_in_fleet = 1\n\t\t*set rank \"Captain\"\n\t\tappointed—including you, of course. There's also more rum to be had, and you take the chance to question Jalu.\n\t\t*goto serpent\n\t*else\n\t\tappointed, rum casks are breached on every ship, and you take the chance to question Jalu.\n\t*label serpent\n\t\n\t\"All right,\" he says, still glowing with his victory. \"I'll tell you everything. Please don't kill me for using you, since all I knew of you before coming on board was that you were a pack of pirates not so different from my father.\"\n\n\t\"What have you been hiding—other than your entire identity, past, and original feelsmith brand?\" you ask.\n\n\t\"The answer to the riddle on my back,\" he says. \"It's about a sea-serpent that still guards the treasure. My grandfather saw the treasure but lost his ship to the titan. You've probably heard the legend; I heard it from his own lips. I believe we can fight it and get the treasure, but I suspect we'll pay for it with the lives of several good fighters.\"\n\n\tYou let him be so you can focus on building your skills for the coming fight. \n\t*set knows_about_jalu_serpent 1\n\t\n\t*goto_scene ss8\n*elseif (jaluhere = 1) and (knows_about_jalu_serpent = 1)\n\t\n\tIf the titan was guarding the treasure when Jalu's grandfather was a young man, it could be dead by now. But you have no intention of being eaten. So you decide to improve your…\n\t*fake_choice\n\t\t#Magical skill.\n\t\t\t*set magical_skill %+20\n\t\t\t*page_break\n\t\t\t*goto_scene ss8\n\t\t#Blade skills.\n\t\t\t*set swordfighting %+20\n\t\t\t*page_break\n\t\t\t*goto_scene ss8\n\t\t#Gun skills.\n\t\t\t*set gun_fu %+20\n\t\t\t*page_break\n\t\t\t*goto_scene ss8\n\t\t#Hand-to-hand fighting. \n\t\t\t*set brawling %+20\n\t\t\t*page_break\n\t\t\t*goto_scene ss8\n\t\t#Diplomacy.\n\t\t\t*set killed %-20\n\t\t\t*page_break\n\t\t\t*goto_scene ss8\n*else\n\n\t*goto_scene ss8\n\n*label fail\n*if knows_about_jalu_feelsmith = 0\n\tJalu shows you that the brand on his hand is an altered feelsmith brand. That explains a lot. \n\t*goto panda\n*else\n\tIt's no good. Jalu doesn't tell you anything you don't already know.\n*label panda\t\nYou have a bad feeling about this entire treasure hunt, so you work to improve your…\n*fake_choice\n\t#Magical skill.\n\t\t*set magical_skill %+10\n\t#Blade skills.\n\t\t*set swordfighting %+10\n\t#Gun skills.\n\t\t*set gun_fu %+10\n\t#Hand-to-hand fighting. \n\t\t*set brawling %+10\n\t#Diplomacy.\n\t\t*set killed %-10\n*page_break\n*goto_scene ss8\n\n\n*label killblood\nIt suddenly occurs to you that in the chaos you have an opportunity to get rid of Captain Blood herself without anyone knowing. \n*label try_again\n\nYou’re in the middle of a major battle, but you might never get a chance like this again. Time to move.\n\nWhat do you do?\n*choice\n\t#I betray Captain Blood and kill her so I can rise to greater power. \n\t\t*set captain_blood 0\n\t\t*set truthfulness %-20\n\t\t*set morality %-20\n\t\t*set truman %-20\n\t\tHow do you overpower her?\n\n\t\t*if hints = 1\n\t\t\t[i]What is your best fighting statistic? You [/i]do[i] have a decent fighting statistic…right?[/i]\n\t\t*choice\t\n\t\t\t*selectable_if (smith = 1) #I alter her personality using magic. \n\t\t\t\t*set magical_skill %+10\n\t\t\t\tAs you take the improvised bomb from her hands, you let your fingers touch hers and you focus your magic, watching as her face changes from a captain in a battle, to a friend betrayed, to an empty shell. She immediately throws her sword away and attacks a crowd of enemies with an empty pistol. Seconds later, she is cut and broken and slashed in a dozen places. They trample her underfoot as they scatter to pursue more difficult targets.\n\t\t\t\t\n\t\t\t\tYou catch a glimpse of her body looking strangely small before you're caught up fighting off more pirates.\n\t\t\t\t*set blooddead 1\n\t\t\t\t*set bloodhere 0\n\t\t\t\t*if blood_love = 1\n\n\t\t\t\t\tSo much for true love.\n\t\t\t\t\t*goto done\n\t\t\t\t*else\n\t\t\t\t\t*goto done\n\t\t\t#I hurl her overboard.\n\t\t\t\t*if brawling > 30\n\t\t\t\t\tYou move the bomb into your weaker hand and grab her by the shirt with the other, pushing her against the rope rail ready to flip her into the sea. \n\t\t\t\t\t\n\t\t\t\t\tShe whacks you with her wooden leg, but you have her off balance and press her harder, using all your strength to shove her up and over the rail into the churning gap between the ships. When you look down, she is a tiny figure, already shrunken from the titanic figure you admired and feared all this time. As you watch, the ships are pushed together again, and she's crushed to death between them.\n\t\t\t\t\t*set blooddead 1\n\t\t\t\t\t*set bloodhere 0\n\t\t\t\t\t*if blood_love = 1\n\n\t\t\t\t\t\tSo much for true love.\n\t\t\t\t\t\t*goto done\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto done\n\t\t\t\t*else\n\t\t\t\t\tYou move the bomb into your weaker hand and grab her by the shirt with the other, pushing her against the rope rail ready to flip her into the sea. She whacks you with her wooden leg, breaking at least one of your fingers. \n\t\t\t\t\t\n\t\t\t\t\t\"Go and get Captain Graves before I decide to waste my blade killing you.\" She turns away in disgust.\n\t\t\t\t\t*set blood_hates_you 1\n\t\t\t\t\t*set health %-10\n\t\t\t\t\t*if keelhaul = 1\n\t\t\t\t\t\t*if mc_saves_self=1\n\t\t\t\t\t\t\t*goto try_again\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"To think I used my smithing to save your rotten hide when I keelhauled you!\"\n\t\t\t\t\t\t\t*goto try_again\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto try_again\n\t\t\t*selectable_if (smith = 2) #I stop her heart.\n\t\t\t\t*set magical_skill %+10\n\t\t\t\tAs you take the improvised bomb from her hands, you let your fingers touch hers and you focus your magic, watching as her face changes from a captain in a battle, to a friend betrayed, to a person who knows they are already dead and their mind hasn't caught up to their body yet.\n\t\t\t\t\n\t\t\t\tMoments later, she falls at your feet, as dangerous to you now as a sack of flour. You toss her overboard before anyone sees the tell-tale purpling of her skin. \n\t\t\t\t*set blooddead 1\n\t\t\t\t*set bloodhere 0\n\t\t\t\t*if blood_love = 1\n\n\t\t\t\t\tSo much for true love.\n\t\t\t\t\t*goto done\n\t\t\t\t*else\n\t\t\t\t\t*goto done\t\t\t\t\n\t\t\t#I shoot her in the flesh leg so she’s helpless.\n\t\t\t\t*if gun_fu >30\n\t\t\t\t\tPerfect shot! She collapses, cussing you out furiously as her life drains away, making a bright new stain on her precious ship. It's eerie to think that such a terrifying figure bleeds and dies just like everyone else.\n\t\t\t\t\t*set blooddead 1\n\t\t\t\t\t*set bloodhere 0\n\t\t\t\t\t*if blood_love = 1\n\n\t\t\t\t\t\tSo much for true love.\n\t\t\t\t\t\t*goto don\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto don\n\t\t\t\t\t*page_break\n\t\t\t\t\t*label don\n\t\t\t\t\t*achieve gunduel\n\t\t\t\t\t*goto done\n\t\t\t\t*else\n\t\t\t\t\tYou shoot her a glancing blow, and your shot ricochets and lodges in her wooden leg. She snarls in rage and draws her own pistol. You immediately drop your gun and raise your arms.\n\t\t\t\t\t\n\t\t\t\t\t\"Go and get Captain Graves before I decide to waste my shot killing you.\" She turns away in disgust to fight someone else, not even bothering to kick your pistol overboard.\n\t\t\t\t\t*set blood_hates_you 1\n\t\t\t\t\t*set health %-10\n\t\t\t\t\t*if keelhaul = 1\n\t\t\t\t\t\t*if mc_saves_self=1\n\t\t\t\t\t\t\t*goto try_again\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"To think I used my smithing to save your rotten hide when I keelhauled you!\"\n\t\t\t\t\t\t\t*goto try_again\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto try_again\n\t\t\t*selectable_if (smith = 3) #I use quickensmith magic to make it look like an accident. \n\t\t\t\t*if magical_skill >19\n\t\t\t\t\tYou can feel that the deck is half-broken already and it won't make any difference to your sailing speed, so you collapse the deck directly under her feet. She shrieks like a little girl with the shock of it and hits the cannon barrel directly below with back-breaking force. You're still magically connected to the ship and everything on it, so you feel her bones separate and her dead body sizzle on the hot iron. \n\t\t\t\t\t*set blooddead 1\n\t\t\t\t\t*set bloodhere 0\n\t\t\t\t\t*if blood_love = 1\n\n\t\t\t\t\t\tSo much for true love.\n\t\t\t\t\t\t*goto done\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto done\n\t\t\t\t*else\n\t\t\t\t\tYou can feel that the deck is half-broken already and more damage won't make any difference to your sailing speed, so you set your mind to collapsing the deck directly under her feet. It doesn't break. You're not strong enough. Then Captain Blood's fist connects with your nose, and the magical connection breaks.\n\t\t\t\t\t\n\t\t\t\t\t\"That was unwise,\" she snarls, and you realize with a cold shock that she's a quickensmith—and stronger than you. \"Now go and get Captain Graves before I decide to waste my blade killing you.\" She turns away in disgust.\n\t\t\t\t\t*set blood_hates_you 1\n\t\t\t\t\t*set health %-10\n\t\t\t\t\t*if keelhaul = 1\n\t\t\t\t\t\t*if mc_saves_self=1\n\t\t\t\t\t\t\t*goto try_again\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"To think I used my smithing to save your rotten hide when I keelhauled you!\"\n\t\t\t\t\t\t\t*goto try_again\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto try_again\n\t\t\t#I can’t wait to see her face when she realizes I’m a better swordsman than her now. \n\t\t\t\t*if swordfighting > 30\n\t\t\t\t\t*set blooddead 1\n\t\t\t\t\t*set bloodhere 0\n\t\t\t\t\tIt's no time to be sporting. You lunge and stab her in the chest before she has time to see what you're doing. She stares at her own ruined body in shock before lifting her eyes to you with an expression of exasperated surprise. It takes time for her to bleed out, but she doesn't bother drawing her own weapon. She knows death too well. \n\t\t\t\t\t*if blood_love = 1\n\n\t\t\t\t\t\tSo much for true love.\n\t\t\t\t\t\t*goto donyy\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto donyy\n\t\t\t\t\t*page_break\n\t\t\t\t\t*label donyy\n\t\t\t\t\t*if keelhaul = 1\n\t\t\t\t\t\t*if mc_saves_self =1\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*achieve swordduel\n\t\t\t\t\t\t\t*goto done\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"To think I used my smithing to save your rotten hide when I keelhauled you!\"\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*achieve swordduel\n\t\t\t\t\t\t\t*goto done\n\t\t\t\t\t*else\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*achieve swordduel\n\t\t\t\t\t\t*goto try_again\n\t\t\t\t*else\n\t\t\t\t\tIt's no time to be sporting. You lunge forward, meaning to stab her in the chest, but she sees you coming and whacks you with her wooden leg. You're knocked to the deck, and you suddenly know you're still an inferior fighter. She's about to slash your throat when you roll sideways, and she gashes your shoulder instead. Before she gives chase, she's attacked by the enemy. They effectively saved your life.\n\t\t\t\t\t*set health %-10\n\t\t\t\t\t*set blood_hates_you 1\n\t\t\t\t\t*goto try_again\n\t#No. I won't do it.\n\t\t*goto done\n*label done\n*if (blood_hates_you = 1) and (blood_love = 1)\n\t*set blood_love 0\n\t*set captain_blood %-50\n*if blooddead = 1\n\t*set blood_love 0\n\t*set firebird %-20\n\tThe next time you look up, Firebird is close by and glaring at you. \"I saw what you did. What I want to know is why.\"\n\t\n\t\"I've won myself a ship and killed a killer,\" you say.\n\t\n\t\"In the middle of a battle?\" she yells. \"What's wrong with you?\"\n\t\n\t\"Would it have been better if I killed her over luncheon?\" you ask.\n\t\n\t*if (blood_love = 1) and (firebird_love = 1)\n\t\t\"I loved her,\" Firebird snarls. \"And you. Now you're both dead to me.\"\n\t\t*set firebird_love 0\n\t\t*set killed %+50\n\t\t*goto booyah\n\t*elseif (firebird_love = 1)\n\t\t\"I loved you, once,\" says Firebird. \"I didn't know you only loved yourself.\"\n\t\t\n\t\t\"Fine!\" you say, since you knew perfectly well that Blood was essential to everyone's chances of survival. So what?\n\t\t*set firebird_love 0\n\t\t*set killed %+50\n\t\t*goto booyah\n\t*else\n\t*goto booyah\n*else\n*label booyah\n\nYou can see Captain Graves, and you have a bomb. What do you do?\n*goto yupyup\n", "ss8": "*temp ohcrap true\n*if filth > 1\n\t*set filth %+10\n\t*set health %-10\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n*if drunk = true\n\t*set swordfighting %+20\n\t*set brawling %+20\n\t*set gun_fu %+20\n\t*set magical_skill %+20\n\t\n*if (truman_love = 1) and (truman \u003c 50)\n\t*set victim -1\n\t*set truman_love 0\n\t*goto awdear\n*if (firebird_love=1) and (firebird \u003c 50)\n\t*set victim -1\n\t*set firebird_love 0\n*label awdear\n\nAll your ships travel together in relative harmony thanks to the promise of \n*if jaluhere = 1\n\ttreasure—and in relative sobriety thanks to Captain Jalu, who settles into one of the ships that used to belong to Captain Graves. Some of his men are already regretting their loyalty, although not as much as those you left behind. Success hasn't changed Jalu at all. He's the same handsome, arrogant, compelling man he always was.\n\t*goto weeks\n*else\n\ttreasure. The map copied from Jalu's back is beginning to fade, and you wonder uneasily if killing him was a terrible mistake.\n*label weeks\n*if blooddead = 1\n\n\tYou keep wishing you could ask Captain Blood what to do. [i]Stupid, stupid, stupid.[/i] It's possible that murdering or ditching anyone who gets in your way isn't the path to happiness after all.\n\t\n\t[i]Nah. That's just the sunstroke talking.[/i]\n\t\nWith Captain Graves dead, his ships are given out as prizes. You manage to keep the [i]Scarlet Sails[/i] for yourself along with two vessels that used to belong to Captain Graves. The joy of captaining such a vessel is almost enough to make you forget the horror of the battle. \n*set ships_in_fleet +2\n*if jaluhere = 1\n\t*set rank \"Fleet Co-Captain\"\n\t*goto cooperation\n*else\n\t*set rank \"Fleet Captain\"\n*label cooperation\n\nWeeks pass, and you start dreaming about fresh fruit and vegetables again. Your teeth feel a little loose, but you've been through worse. \n\n*if jaluhere = 1\n\tCaptain Jalu makes it clear that no one is going to die of scurvy: the treasure is tantalizingly close now. It's hard not to believe someone who believes in himself with such fervor. He freely shares the secret code of the map on his back, and you pore over the details of the map, clearly seeing why the treasure has remained safe for so long. It's astonishing that a ship ever managed to get through that deadly maze of a reef.\t\n\t\n*if hints = 1\n\t[i]If your first option is to clean up, you really should take it. When people call you a lice-infested blaggard, they're not exaggerating.[/i]\n*choice\n\t*selectable_if (filth > 39) #The galley reeks. I'd better clean up before the rot spreads to our last fresh food.\n\t\tYou manage to clean and sort all the food without throwing up. Most of it is still all right to eat, although a lot is only good for stew.\n\t\t*set health %+10\n\t\t*set filth %-20\n\t\t*goto post_dawn\n\t*if (victim > 0) #Plenty of time to enjoy some romance.\n\t\t*if blood_love = 1\n\t\t\t*set captain_blood %+20\n\t\t\tThe sky is blue, the wind is strong, and kisses are free. Life is good. There's no energy to fight but plenty of time to talk. As the days pass, it's clear your love is stronger than ever. Captain Blood is an excellent teacher, and you're learning a lot.\n\t\t\t*goto dawn\n\t\t*if jalu_love = 1\n\t\t\t*set jalu %+20\n\t\t\tThe sky is blue, the wind is strong, and kisses are free. Life is good. There's no energy to fight but plenty of time to talk. As the days pass, it's clear your love is stronger than ever. Some of Jalu's many secrets are well worth sharing.\n\t\t\t*goto dawn\n\t\t*if firebird_love = 1\n\t\t\t*set firebird %+20\n\t\t\tThe sky is blue, the wind is strong, and kisses are free. Life is good. There's no energy to fight but plenty of time to talk. As the days pass, it's clear your love is stronger than ever. Firebird is ambidextrous, and not just when she's fighting.\n\t\t\t*goto dawn\n\t\t*if truman_love = 1\n\t\t\t*set truman %+20\n\t\t\tThe sky is blue, the wind is strong, and kisses are free. Life is good. There's no energy to fight but plenty of time to talk. As the days pass, it's clear your love is stronger than ever. Truman has spent a great deal of time in the crow's nest, and he has some remarkable things to show you.\n\t\t\t*goto dawn\n\t\t*else\n\t\t\tToo bad you screwed up that romance you thought you had going for you. Oh well.\n\t\t\t*goto dawn\n\t#I'll work on honing my magical skills.\n\t\tIt costs you a headache or two, but you're definitely improving.\n\t\t*set magical_skill %+10\n\t\t*goto post_dawn\n*label dawn\n*if polyamorous > 0\n\t*if blood_love = 1\n\t\t*if firebird_love = 1\n\t\t\tSo is Firebird, and it's a glorious thing to see.\n\t\t\t*goto post_dawn\n\t\t*else\n\t\t\tSo is Jalu, and you feel like the luckiest pirate in the world to have two brilliant souls entwined with yours.\n\t\t\t*goto post_dawn\n\t*elseif jalu_love = 1\n\t\t*if truman_love = 1\n\t\t\tHe is surprisingly tender with Truman, and it makes you love them both more than ever.\n\t\t\t*goto post_dawn\n\t\t*else\n\t\t\tIt turns out Firebird is ambidextrous, and not just when she's fighting. You and Jalu are the luckiest pirates on board.\n\t\t\t*goto post_dawn\n\t*else\n\t\tYou and Truman are the luckiest pirates on board.\n\t\t*goto post_dawn\n*else\n*label post_dawn\n\nAt last, another hungry dawn lights up a string of islands before you: the treasure’s hiding place. You can practically hear the clink of coins pouring endlessly through your hands! Looking around, everyone on deck is leaning forward, hoping for a glimpse of the riches ahead. \n\nThe crew is edgy, wild-eyed and ready to snap with the tension of being so close to success or failure after such a tense journey. Everyone knows the treasure will need to be divided—and if some pirates are betrayed, there’ll be more gold for the rest. You're careful to keep familiar faces close by, especially Firebird. \n\n*if jaludead = 0\n\t*set blood_name \"Captain Jalu\"\n\tJalu swings over the water to you, knowing your ship has the shallowest draft in the fleet. He \n\t*goto asks\n*else\n\tTruman\n\t*goto asks\n*label asks\nasks you how you want to proceed. \n\nHow do you avoid the reef without risking last-minute mutiny?\n\n*if hints = 1\n\t[i]You'll need solid Quickensmithing Magic Skill, or reasonable Sobriety, or plenty of Gold (combined with a low Likelihood of Being Killed in Your Sleep), or excellent alcohol tolerance (high Sozzled).[/i]\n*choice\n\t*selectable_if (smith = 3) #I use my magic to sail through. \n\t\t*if magical_skill > 15\n\t\t\tThe other captains defer to your judgment, and Truman rounds up two more quickensmiths he considers trustworthy. Truman's judgement is excellent, so you accept them gladly. Besides, you have a common goal.\n\t\t\t\n\t\t\tYou furl every sail and stand at the bow of the ship with a quickensmith at each side. Behind you, the crew waits in eerie silence, having been warned not to enter the hold. The three of you close your eyes to concentrate and deliberately stretch a long wooden arm down in front of your ship so you have a warning if you're about to run aground. Then you smooth and lift the base of the ship, steadying the vessel carefully and moving forward at a tightly controlled crawl. As leader, you open your eyes, noting the measurements your crew is taking and glancing constantly at a paper copy of the map.\n\t\t\t\n\t\t\tFor an hour, it seems like you'll be shepherding the [i]Scarlet Sails[/i] through dangerous waters forever, and then you look at the map again and realize you're safely inside the sheltered harbor.\n\t\t\t*goto through\n\t\t*else\n\t\t\tThe other captains defer to your judgment, and Truman rounds up two more quickensmiths he considers trustworthy. Truman's judgement is excellent, so you accept them gladly. Besides, you have a common goal.\n\t\t\t\n\t\t\tYou furl every sail and stand at the bow of the ship with a quickensmith at each side. Behind you, the entire crew waits in eerie silence, having been warned not to move. The three of you close your eyes to concentrate and deliberately stretch a long wooden arm down in front of your ship so you have a warning if you're about to run aground. Then you smooth and lift the base of the ship, steadying the vessel carefully and moving forward at a tightly controlled crawl. As leader, you open your eyes, noting the measurements the others are taking and glancing constantly at a paper copy of the map.\n\t\t\t\n\t\t\tThen you both hear and feel the crunch as your wooden warning pole is smashed. You hurl yourself into your magic, sending the ship backward. You're not quick enough.\n\t\t\t*goto ship\n\t#Deploy a lifeboat ahead of you and take plenty of depth measurements. \n\t\t*if sober > 49\n\t\t\tIt's difficult, repetitive work even with every shift on duty at once. Your shoulders ache with tension as you set and furl and set and furl the sails, tacking again and again in a zigzag path that has everyone sweating and panting as they run from halyards to sheets and back again. Truman scurries about aloft with a second copy of the map clenched between his teeth.\n\t\t\t\n\t\t\tFor hours, it seems like you'll be shepherding the [i]Scarlet Sails[/i] through dangerous waters forever, and then you look up and realize you're safely inside the sheltered harbor.\n\t\t\t*goto through\n\t\t*else\n\t\t\tIt's difficult, repetitive work even with every shift on duty at once. Your shoulders ache with tension as you set and furl and set the sails, tacking again and again in a zigzag path that has everyone sweating and panting as they run from halyards to sheets and back again. Truman scurries about aloft with a second copy of the map clenched between his teeth.\n\t\t\t\n\t\t\tYou never noticed how much your hands shake when you attempt to focus on a task. It couldn't be all that rum you constantly drink…could it?\n\t\t\t*goto ship\n\t*selectable_if (gold > 9) #Wait for favorable conditions—and bribe the crew to keep them from revolting. \n\t\t*set gold -10\n\t\t*if killed > 60\n\t\t\tYou scatter gold cheerfully, hoping you haven't just wasted real gold on imaginary gold. The atmosphere turns cheerful, and you breathe a sigh of relief. \n\t\t\t\n\t\t\tAn hour passes before crew members start bickering with one another. You overhear two of your oldest crew members planning a mutiny, convinced you are simply putting them off in order to trick them out of the treasure somehow. Apparently you're almost universally hated. A true captain would be able to keep them in line.\n\t\t\t\n\t\t\tSomeone shouts, \"Forward!\" and the others swarm over the rigging setting sails as others haul up the sea anchor and angle the sails for a direct route into the tantalizing harbor immediately ahead of you. \n\n\t\t\tYour crew genuinely hates you, and unfortunately, their opinions matter (just this once).\n\t\t\t*goto ship\n\t\t*else\n\t\t\tYou scatter gold cheerfully, hoping you haven't just wasted real gold on imaginary gold. The atmosphere turns cheerful, and you breathe a sigh of relief. Gold solves everything, as usual.\n\t\t\t\n\t\t\tWhen the tide is as high as it'll get and the wind is favorable, you creep toward the richest island in all of Rahana. It's a terrifying journey over a deceptively smooth sea.\n\t\t\t*goto through\n\t#Wait until the wind is lower and the tide higher—and share drinks with the likely ringleaders until they're too drunk to cause trouble.\n\t\t*if sober \u003c 40\n\t\t\tThe worst members of your crew pass out, and you shtill feel jusht fine. \n\t\t\t\n\t\t\tThe least drunk members of the crew wait until the moment is right and sail forward. It's a terrifying journey over a deceptively smooth sea.\n\t\t\t*goto through\n\t\t*else\n\t\t\tYou're not as drink-hardened as you thought. You think you're outdrinking everyone…and then you wake up knowing something is wrong. \n\t\t\t\n\t\t\tAs you struggle to your feet, still utterly incapacitated, you see the island is closer…the crew has set sail without your orders!\n*label ship\n*set ohcrap false\n*page_break\n[i]Crunch![/i]\n\nYour precious ship hits a reef—and hits it hard. The jagged coral bites into the ship's flank and tears an enormous hole. The shock of it sends people flying, smashing into one another and onto the deck. Several run for the lifeboats, ready to abandon ship.\n\n\"Avast!\" you yell, and the crew freezes in place. The ship doesn't sink. You send a quickensmith to check the hole and patch it up as well as possible. \n\nWhen they come back, they report that the ship should last the night but will need more significant repairs after you've found the treasure. Okay. You screwed up, but not too badly. Probably. As long as you can float, it's all good.\n\n*label through\n\nFirebird stands by your side as you cross the wide bowl of the harbor, passing an enormous zero-shaped island that puts you in mind of the first “none” in the riddle—[i]You are many and I am none. When I am one you will be none[/i]—especially since the riddle was written in a circle around the map. \nDo you:\n*choice\n\t#Call the crew's attention to the relevance of the riddle.\n\t\t\"Hey,\" you say. \"Look! What's that?\"\n\t\t*set skepticism %-10\n\t\t*set truman %+10\n\t\t*goto thief\n\t#Try to steer as far from the circle as possible. \n\t\t*set skepticism %+10\n\t\t*set health %+10\n\t\t*goto thief\n\t*if (jaludead = 0) #Question Jalu. He knows more than he’s said. \n\t\t*set skepticism %+10\n\t\t*goto thief\n\t#Check your powder is dry. \n\t\t*set gun_fu %+10\n\t\t*goto thief\n*label thief\n\n\"Oh,\" says \n*if jaludead = 0\n\tJalu, his voice cracking with terror. \"I guess it didn't die then.\"\n\t*goto pass\n*else\n\tTruman. \"Oh no…\"\n*label pass\n\nAs you pass the circle, it opens up into a line—the \"none\" and \"one\" of the riddle is about the sea monster's changing shape! \n\nYour pleasure in solving the riddle is marred when the “island” lifts its massive head and you find yourself facing the enormous sea-serpent of legend. Apparently it bites its own tail to sleep in a circle shape, but releases it to attack treasure hunters. And now you're trapped in the harbor with it. \n\n[i]You are many and I am none. When I am one you will be none.[/i]\n\nNow that it's in the shape of a \"one\" (awake) you're about to be \"none\" (super dead).\n\nThe sea-serpent roars and arrows through the water toward your ship. You scream and shoot it, but your musket ball bounces off its armored hide without making a dent. The titan doesn't even notice, but rips the bowsprit clean off your ship, pulling away a large section of the bow at the same time.\n*fake_choice\n\t#I scream, \"Look over there! Lots more tasty ships!\"\n\t\t*set killed %+10\n\t#I grab my weapons and prepare to fight for my life.\n\t\t*set health %+10\n\t#I freeze, hoping it's attracted to movement and will eat someone else first.\n\t\t*set killed %+10\nThe sea-serpent spots the other ships gathered patiently at the harbor entrance and roars in delight. It flicks the [i]Scarlet Sails[/i] with its tail and goes to meet the larger meal. Your ship lurches sickeningly to port and collides with a half-submerged rock where it sticks fast. Several men are left dangling from the rails, screaming for help, and others are in the water.\n\nThe [i]Scarlet Sails[/i] screeches like an animal in pain and tips forward as water pours into the hold. You gaze helplessly toward the harbor mouth and the open ocean, but all you see is more death. The screams of the sea-serpent's victims are easily audible as one terrified howl echoing across the water.\n\nThose ships that are still floating fill their sails at once and aim for the serpent's lair. Their only hope of survival is to flee onto land, and the reef that was so dangerous an hour ago might even get in the serpent's way and save their lives. \n\nYour poor [i]Scarlet Sails[/i] fills with water to the first bulkhead and then hangs on her rock with her head down like a naughty child. It's better than sinking outright, but not by much. The safety of land is so close, yet impossibly far away.\n\n*if blooddead = 1\n\t*goto truman\n*else\n\t*if (bloodhere = 1)\n\t\tYou watch as the serpent wraps itself around one of the ships, adding coil after coil and squeezing until the vessel snaps in two. It's easy to spot the distinctive wooden-legged shape of Captain Blood as she runs up the collapsing deck with drawn sword, only to be tossed into the sea as the ship breaks a second time. \n\t\t*set ships_in_fleet -1\n\t\t*goto truman\n\t*else\n\t\t\n*label truman\n*if jaludead = 0\n\t\"I didn't think it would be so big,\" Jalu whispers in horror. \"I thought Grandfather was exaggerating.\"\n\n\t\"You were [i]told[/i] about that thing!?\" you shout at him. \n\t*if (knows_about_jalu_serpent = 1)\n\t\tThe fact that he also told you about it is irrelevant. He should have wept and wailed as he told you!\n\n\tHow do you respond to Jalu's treachery? \n\t\n\tIt suddenly occurs to you that if he dies in this battle, his ships could all be yours.\n\t*choice\n\t\t#Kill him.\n\t\t\t*set morality %-20\n\t\t\t*set jalu 0\n\t\t\t*set jalu_love 0\n\t\t\tHow do you kill him?\n\t\t\t\n\t\t\t*if hints = 1\n\t\t\t\t[i]Are you better at Gun Fu, Swordfighting, Brawling, or Magic? Jalu's actually a feelsmith, so you'll need Feelsmithing Magical Skill over 30 to beat him in that skill, but only 25 to beat him with Healsmithing, and no special skill to beat him with Quickensmithing.[/i]\n\t\t\t*choice\n\t\t\t\t#Shoot him. \n\t\t\t\t\t*if gun_fu > 35\n\t\t\t\t\t\tYou draw your pistol and shoot him in the face at point-blank range. \n\t\t\t\t\t\t\n\t\t\t\t\t\tHe's not so pretty now. The ship is tilting so badly, he slides right off the deck into the sea. Good riddance!\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou laugh to think that you've killed the nemesis of the all-powerful Captain Graves. It was so easy! Perhaps you'll become the greatest pirate in the world now that Captain Graves is defeated.\n\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t*goto next\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou draw your pistol and shoot him in the face…but your powder got wet in the shipwreck, and the gun doesn't fire. He looks around like a man in a dream and then dives overboard, grabbing pieces of driftwood to make himself a raft and oars so he can escape. Good riddance.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou laugh to think that you've scared off the nemesis of the all-powerful Captain Graves. It was so easy! \n\n\t\t\t\t\t\tOf course, he may kill you later.\n\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t*goto next\n\t\t\t\t#Stab him. \n\t\t\t\t\t*if swordfighting > 35\n\t\t\t\t\t\tYou draw your sword and stab him right through the heart. He gasps and clutches his chest like a romantic heroine before crumpling to the deck. The ship is tilting so badly, he slides right off the deck into the sea. Good riddance!\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou laugh to think that you've killed the nemesis of the all-powerful Captain Graves. It was so easy! Perhaps you'll become the greatest pirate in the world now that Captain Graves is defeated.\n\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t*goto next\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou draw your sword to stab him, but he knocks your blade aside, not even reacting as his arm begins to bleed. He looks around like a man in a dream and then dives overboard, grabbing pieces of driftwood to make himself a raft and oars so he can escape. Good riddance.\n\n\t\t\t\t\t\tOf course, he may kill you later.\n\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t*goto next\n\t\t\t\t#Tie him up for keelhauling. \n\t\t\t\t\t*if brawling > 35\n\t\t\t\t\t\tYou knock him out with a king-hit to the jaw and tie him to the mast for later. He's awkward and heavy, but the closest crew members gladly help you. No one likes being lied to.\n\t\t\t\t\t\t*set jalu_tied_to_mast 1\n\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t*goto next\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou punch him in the face, but you're not strong enough to knock him out. He looks around like a man in a dream and then dives overboard, grabbing pieces of driftwood to make himself a raft and oars so he can escape. Good riddance.\n\n\t\t\t\t\t\tOf course, he may kill you later.\n\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t*goto next\n\t\t\t\t#Use my magic. \n\t\t\t\t\tOf course, now that you know Jalu is a feelsmith—the escapee from Captain Graves—you know to move carefully.\n\t\t\t\t\t*if (smith = 1)\n\t\t\t\t\t\t*if magical_skill > 29\n\t\t\t\t\t\t\tYou slam the palm of your hand onto his face and push your will into his mind. His face changes to the face of a terrified child, and he leaps overboard and starts swimming right for the sea-serpent.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tTruman hauls himself up beside you by the rope rail. \"What did you do?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I gave him the strong desire to fight that titan one-on-one.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You killed him,\" he says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Yes.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou laugh to think that you've killed the nemesis of the all-powerful Captain Graves. It was so easy! Perhaps you'll become the greatest pirate in the world now that Captain Graves is defeated.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tTruman backs away in disgust.\n\t\t\t\t\t\t\t*set truman %-10\n\t\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t\t*goto next\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou slam the palm of your hand onto his face, ready to push your will into his mind and send him hopelessly swimming right for the sea-serpent. But then a wave of pity fills you, and you let him go.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs soon as you release him, you realize the pity didn't come from your own heart. Jalu's a stronger feelsmith than you are. He smirks and dives overboard, grabbing pieces of driftwood to make himself a raft and oars so he can escape. Good riddance. Of course, he might kill you later.\n\t\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t\t*goto next\n\t\t\t\t\t*elseif (smith = 2)\n\t\t\t\t\t\t*if magical_skill > 24\n\t\t\t\t\t\t\tYou slam the palm of your hand onto his face and order his blood to stop flowing. He tries to step away, but his body is no longer under his control. His feet slip out from under him as the blood pools beneath his skin, turning his face black and purple with bruising before the last breath leaves his body. He slides away from you down the sloping deck into the sea. Good riddance!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou laugh to think that you've killed the nemesis of the all-powerful Captain Graves. It was so easy! Perhaps you'll become the greatest pirate in the world now that Captain Graves is defeated.\n\t\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t\t*goto next\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou slam the palm of your hand onto his face and order his blood to stop flowing. But then a wave of pity fills you, and you let him go.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs soon as you release him, you realize the pity didn't come from your own heart. Jalu's magic is stronger than yours. He smirks and dives overboard, grabbing pieces of driftwood to make himself a raft and oars so he can escape. Good riddance. Of course, he may kill you later.\n\t\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t\t*goto next\n\t\t\t\t\t*else\n\t\t\t\t\t\t*if ships_in_fleet > 0\n\t\t\t\t\t\t\tThe ship is already turning to matchwood, so you just place your hands on the railing and concentrate—and the place where he's standing flips him high into the air. You listen to him scream as he falls back down and hits the sea, too far from your failing ship to gain any driftwood that could save his life. Distance doesn't matter anyway, since he's so stunned he immediately sinks from view. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou laugh to think that you've killed the nemesis of the all-powerful Captain Graves. It was so easy! Perhaps you'll become the greatest pirate in the world now that Captain Graves is defeated.\n\t\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t\t*goto next\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe ship is already turning to matchwood, so you just place your hands on the railing and concentrate—and the place where he's standing flips him high into the air. Unfortunately he saw what you intended and was ready for it. The second he lands in the water, he grabs pieces of driftwood to make himself a raft and oars so he can escape. Good riddance. Of course, he may kill you later.\n\t\t\t\t\t\t\t*set jaludead 1\n\t\t\t\t\t\t\t*set jaluhere 0\n\t\t\t\t\t\t\t*set jalu 0\n\t\t\t\t\t\t\t*goto next\n\t\t#Throw him in the brig and decide his fate later. \n\t\t\t*set morality %+10\n\t\t\t*set skepticism %+10\n\t\t\tThe crew is furious with him and his secrets and helps you wrestle him downstairs into the brig.\n\t\t\t*set jalu_tied_to_mast 1\n\t\t\t*set brawling %+10\n\t\t\t*goto next\n\t\t#I tell him to swim for the nearest rocky atoll where he'll be marooned. \n\t\t\t*set morality %-10\n\t\t\t*set jalu %-30\n\t\t\t\"That's fair,\" he says, and dives overboard of his own volition. You watch him with your pistol cocked, but he doesn't try to take any of the driftwood with him. No point marooning a man with a ready-made raft.\n\t\t\t\n\t\t\tThe main island is too far away, so he swims toward the second-largest island and soon disappears among the waves. He might even make it to shore, but you don't care. Either way, he's too smart to get within sight of you again. It wouldn't end well.\n\t\t\t*set jaludead 1\n\t\t\t*set jaluhere 0\n\t\t\t*set jalu 0\n\t\t\t*goto next\n\t\t#Fight beside him. \n\t\t\t*set swordfighting %+10\n\t\t\t*set jalu %+20\n\t\t\tYou take a calming breath.\n\t\t\t\n\t\t\t\"Live and learn,\" you say, feeling hysteria bubbling beneath your words. \"Did your grandpa give you any tips for fighting it?\"\n\t\t\t\n\t\t\t\"Sort of,\" he says, smiling weakly. It's the first time you've seen him unsure of himself, and you find yourself actually feeling sorry for him. \"He said never to come here, and if I ever see a sea-serpent to flee at once.\"\n\t\t\t\n\t\t\t\"Right,\" you say, noting without surprise that the lifeboat of the [i]Scarlet Sails[/i] has more holes than remaining wood. \"It's time for us to fight.\"\n\t\t\t*goto next\n*else\n*label next\n*if jaludead = 1\n\t*set rank \"Fleet Captain\"\n\t*set ranking 5\n*if filth > 1\n\t*set filth %+10\n\t*set health %-10\n\t*page_break\n\t*goto_scene ss9\n*if filth > 2\n\t*set health %-10\n\t*set filth %+10\n\t*page_break\n\t*goto_scene ss9\n", "ss9": "*comment jalu_tied_to_mast (or in brig)\n*temp out_of_water false\n*temp luck 0\n*rand luck 0 100\n*if (jalu_love = 1) and (jalu \u003c 50)\n\t*set jalu_love 0\n\t*goto succ\n*if (blood_love = 1) and (captain_blood \u003c 50)\n\t*set blood_love 0\n*if (truman_love = 1) and (truman \u003c 20)\n\t*set truman_love 0\n*label succ\nThe sea-serpent bares its enormous mouth in a fanged grin as all the surviving ships enter the harbor. As if it weren't enough to be herded neatly into the sea-serpent's lair, the water is suddenly infested with mermaids. You're grateful you weren't foolish enough to try and swim to land. \n\nMoments later, the garbled screams begin as the mermaids take their first victims, laughing high tinkling laughs as the sea-serpent deliberately herds your crewmates into their deadly embrace. A few people try to swim back out to sea, and the titan fishes their bodies from the water as if they were apples bobbing in a bucket.\n\nMomentarily satisfied, the sea-serpent heads right for your ship. It's about to ram you. You frantically wrap your arms around the nearest ropes to try to keep out of the water. \n\nIt's no use. The [i]Scarlet Sails[/i] bucks at the titan's impact, throwing you overboard with many others. As soon as you break the surface, you reach for your weapons, but they're gone. You can feel the mermaids' magic twisting your mind, and at least one ship has already sunk.\n*set ships_in_fleet -2\n*page_break\nHow do you get out of the water?\n*if hints = 1\n\n\t[i]You'll need either: [/i]\n\t\n\t[i]Quickensmith Magical Skill over 20,[/i]\n\t\n\t[i]Brawling over 30 combined with Morality below 50,[/i]\n\t\n\t[i]Swordfighting over 30 combined with Morality below 50,[/i]\n\t\n\t[i]Literal luck (it's 50-50), or[/i]\n\t\n\t[i]Morality over 55 combined with Truthfulness over 60. But if you have strong rapport and a romantic relationship with Truman or Firebird, they'll still let you join them.[/i]\n*choice\n\t*selectable_if (smith = 3) #I'll use my magic to create a makeshift vessel. \n\t\t*if magical_skill > 20\n\t\t\tYou grab handfuls of scrap wood and frantically press them together, using your magic to form a ramshackle boat which you climb into at once. The pull of the mermaids is still present, but it's not as potent when you're dripping instead of swimming. You grab two more pieces of driftwood, flatten them into oars with magic, and paddle back to the [i]Scarlet Sails[/i]. She's broken, but she's yours.\n\t\t\t*set out_of_water true\n\t\t\t*goto serpent\n\t\t*else\n\t\t\tYou grab handfuls of scrap wood and frantically press them together, using your magic to form a ramshackle boat which you climb into at once. The pull of the mermaids is still present, but it's not as potent when you're dripping instead of swimming. Your magic isn't strong enough to last, however, and your boat falls to pieces around you as your head begins to ache.\n\t\t\t*set health %-10\n\t\t\t*goto serpent\n\t#Firebird is on one of the biggest pieces of timber, but it’ll only hold one. I'll knock her off and take it. \n\t\t*set firebird %-20\n\t\t*if (morality \u003c 50) and (brawling > 30)\n\t\t\tIt's easy to set aside your conscience when you've had so much practice doing so. \n\t\t\t\n\t\t\tYou swim to Firebird's raft and press down so hard on the side it tips over. As she plunges into the water, you punch her in the jaw, pushing her away and distracting her at the same time. Then you climb aboard and kick her as hard as you can with both feet, giving you a little bit of much-needed speed. The pull of the mermaids is still present, but it's not as potent when you're dripping instead of swimming. You paddle back to the [i]Scarlet Sails[/i]. She's broken, but she's yours.\n\t\t\t*set out_of_water true\n\t\t\t*goto serpent\n\t\t*else\n\t\t\tYou swim to her raft and press down so hard on the side it tips over. As she plunges into the water, you go to punch her into oblivion, but she clonks you on the head with an oar and climbs back on board. So much for that plan.\n\t\t\t*set health %-10\n\t\t\t*goto serpent\n\t#Truman is nearby and still has his sword. I'll take it and make sure I'm too prickly to eat. \n\t\t*set truman %-20\n\t\t*if (morality \u003c 50) and (swordfighting > 30)\n\t\t\tIt's easy to set aside your conscience when you've had so much practice doing so. \n\t\t\t\n\t\t\tAs soon as you grab for the sword, Truman surrenders it, uninterested in fighting a fellow human when you're both in the titan's growing shadow. Once you have the sword, the mermaids ignore you to focus on easier prey, and you get back on board the [i]Scarlet Sails[/i] at once. \n\t\t\t*set out_of_water true\n\t\t\t*goto serpent\n\t\t*else\n\t\t\tIt's easy to set aside your conscience when you've had so much practice doing so. \n\t\t\t\n\t\t\tTruman sees your intention and touches your face. You never expected him to fight back, yet you find yourself suddenly deciding to go elsewhere. Even knowing he must have used magic on you, you can't resist the urge to leave him alone. It's a struggle to focus on the fight, and you're too slow to dodge a blow from a mermaid. You're lucky to escape with your life.\n\t\t\t*set health %-10\n\t\t\t*goto serpent\n\t#I swim as fast as I can and hope fate favors me. \n\t\t*if luck > 49\n\t\t\tYour mind screams at you to grab your sword, but of course it's back on the [i]Scarlet Sails[/i]. You desperately work on ignoring the voice in your head telling you to surrender and kiss a mermaid, and you swim for the ship instead.\n\t\t\t\n\t\t\tAmazingly, your luck holds, and you make it back on board. \n\t\t\t*set magical_skill %+10\n\t\t\t*set out_of_water true\n\t\t\t*goto serpent\n\t\t*else\n\t\t\tYour mind screams at you to grab your sword, but of course it's back on the [i]Scarlet Sails[/i]. You desperately work on ignoring the voice in your head telling you to surrender and kiss a mermaid, and you swim for the ship instead.\n\t\t\t\n\t\t\tTwo mermaids nearby see where you're trying to go and circle you like sharks, grinning as they sing-song, \"Who you gonna kiss? Who you gonna kiss?\"\n\t\t\t\n\t\t\tYou can tell they think you're easy prey, and they're absolutely right.\n\t\t\t*set health %-10\n\t\t\t*goto serpent\n\t#I'll join forces with Firebird and Truman—if we cooperate, we’ll survive (hopefully). \n\t\t*if (morality >55) and (truthfulness > 60)\n\t\t\tYou swim for them without breaking eye contact. Firebird is trying to help Truman and his sword onto her raft, and it takes perfect balance. She sees you coming and glances at Truman with an eyebrow raised to ask his opinion.\n\t\t\t\n\t\t\t\"$!{he} can be trusted,\" he says.\n\t\t\t\n\t\t\tThe three of you climb onto the raft and balance it by setting your backs against one another, ready to fight. When the sea-serpent capsizes another ship, the mermaids are distracted by the new crowd of victims, and all three of you are able to get back onto the [i]Scarlet Sails[/i].\n\t\t\t*set out_of_water true\n\t\t\t*goto serpent\n\t\t*else\n\t\t\tYou swim for them without breaking eye contact. Firebird is trying to help Truman and his sword onto her raft, and it takes perfect balance. She sees you coming and glances at Truman with an eyebrow raised to ask his opinion. He reluctantly shakes his head, and she shoves you away with an oar. He likes you fine, but he doesn't trust you.\n\t\t\t*if firebird_love = 1\n\t\t\t\t*if firebird > 70\n\t\t\t\t\t\n\t\t\t\t\tFirebird sighs in exasperation at the look of betrayal on your face and holds out the oar to haul you in. \"I hope I don't regret this,\" she says.\n\t\t\t\t\t*set out_of_water true\n\t\t\t\t\t*goto serpent\n\t\t\t\t*else\n\t\t\t\t\t\"Sorry,\" says Firebird, and blows you a kiss. \"You're fun, but I know you too well to risk my own life.\"\n\t\t\t\t\t*set health %-10\n\t\t\t\t\t*set naughty 1\n\t\t\t\t\t*goto serpent\n\t\t\t*if truman_love = 1\n\t\t\t\t*if truman > 70\n\t\t\t\t\tTruman begins to cry, and Firebird reluctantly holds out the oar to haul you in. \"I hope I don't regret this,\" she says.\n\t\t\t\t\t*set out_of_water true\n\t\t\t\t\t*goto serpent\n\t\t\t\t*else\n\t\t\t\t\tTruman is crying, grieving you already, but he knows you too well to let you come closer.\n\t\t\t\t\t*set health %-10\n\t\t\t\t\t*set naughty 1\n\n*label serpent\n\n*if health \u003c 20\n\t*set brawling %-20\n\t*set swordfighting %-20\n\t*set gun_fu %-20\n\t*set magical_skill %-20\n\tYou can feel your body growing weaker, and you just hope it hangs on a little longer. Your hands are shaking, and you can't seem to think straight.\n\t\n\t*if hints = 1\n\t\n\t\t[i]Your stats just weakened due to poor health. Oops, shoulda cleaned up more often.[/i]\n\t\t*goto ss\n\t*else\n\t\t*goto ss\n*else\n*label ss\n*page_break\nThere's only one way to save yourself: you have to kill the sea-serpent before it destroys the last few ships. It's already coming back to finish you off. All your life has led up to this moment. If you don't use all your skills and smarts, you're dead.\n*if naughty = 1\n\tPeople might not trust you enough to save you, but they'll trust your leadership.\n\n*if hints = 1\n\t[i]You need Gun Fu over 38 if you're out of the water. Otherwise, you need:[/i]\n\t\n\t[i]Feelsmith with Brawling over 40,[/i]\n\t\n\t[i]Both Treachery over 55 and Swordfighting over 37, or[/i]\n\t\n\t[i]Both Sweetness over 49 and Truthfulness + Truman Rapport = 140 or more.[/i]\n\t\n\t[i]Good luck, you pox-faced swine. You clearly need it now more than ever.[/i]\n*choice\n\t*selectable_if (out_of_water) #Luckily, the cannons can still save us. \n\t\t*if gun_fu > 38\n\t\t\tThere are a few people still avoiding the mermaids' deadly magic by clinging onto the broken deck of the [i]Scarlet Sails[/i]. Hopefully they'll be enough. With moments to spare, you snap out orders. Truman's the type to know exactly where the last dry powder can be found. He probably has a secret stash in his cabin. Firebird can draw her sword and challenge the serpent directly so it's distracted. She might even survive. You yell instructions and take the rest of the exhausted crew members with you to the cannons, hastily heaving them around to aim through the gaping hole in the bow.\n\n\t\t\tThe titan is coming closer fast.\n\t\t\t\t\t\n\t\t\tTruman runs in with the powder, and you load the closest cannon as you've done a million times before. This time your, life depends on it. You light the fuse yourself, and the cannon fires with gusto, hurling the lead ball right into the sea-serpent's open maw. It rips through the back of the serpent's throat, and the creature's hissing roar turns into an ear-shattering scream of pain. It falls sideways with a splash that nearly capsizes you and thrashes wildly in the water, scattering the mermaids.\n\t\t\t\t\t\n\t\t\tYou see it calm itself as it realizes the end has come. It turns its broken head awkwardly toward you to stare at its killer, its eyes already filming over as it sinks helplessly into the depths.\n\t\t\t\t\n\t\t\tYou watch in silence until it disappears into the dark. For some reason, you find yourself crying. \n\t\t\t\t\n\t\t\t*if truman_love = 1\n\t\t\t\tTruman wraps his arms around you.\n\t\t\t\t*goto success\n\t\t\t*if (jalu_love = 1) and (jalu > 50)\n\t\t\t\tYou find Jalu, and he kisses you.\n\t\t\t\t*set jalu_tied_to_mast 0\n\t\t\t\t*goto success\n\t\t\t*if (firebird_love = 1)\n\t\t\t\tFirebird comes belowdecks and is so relieved to see you she punches you in the stomach, winding you.\n\t\t\t\t*goto success\n\t\t\t*if blood_love = 1\n\t\t\t\tIf only you knew if Captain Blood were still alive.\n\t\t\t\t*goto success\n\t\t\t*else\t\t\n\t\t\t\t*goto success\n\t\t*else\n\t\t\tThere are a few people still avoiding the mermaids' deadly magic by clinging onto the broken deck of the [i]Scarlet Sails[/i]. Hopefully there are enough for what you have to do. With moments to spare, you snap out orders. Truman's the type to know exactly where the last dry powder can be found. He probably has a secret stash in his cabin. Firebird can draw her sword and challenge the serpent directly so it's distracted. She might even survive. You yell instructions and take the rest of the exhausted crew members with you to the cannons, hastily heaving them around to aim through the gaping hole in the bow.\n\n\t\t\tThe titan is coming closer fast.\n\t\t\t\t\t\t\n\t\t\tTruman runs in with the powder, and you load the closest cannon as you've done a million times before. This time, your life depends on it. You light the fuse yourself and realize—an instant too late—that the barrel is blocked. It blows up in your face, and your body is stabbed in a dozen places by hot iron shrapnel. You scream in pain, but your voice barely makes a noise. When you try to get up, you can't. Your body no longer obeys your mind. A smell of burning meat fills the broken ship, and you realize the smell is you.\n\t\t\t*page_break\n\t\t\tBlood trickles in rivulets from your head and legs and itches along your paralyzed arms. You lie helpless on the sloping floor, listening to the moans of your crewmates and the hissing of the sea-serpent coming to eat you all. The ship is burning, and you wonder in a daze if the sea-serpent has eaten cooked meat before. \n\t\t\t\t\n\t\t\tAs consciousness slips away, you spend your last breath whispering to the victorious titan: \"I hope I stick in your throat.\"\n\t\t\t*set mc_dead 1\n\t\t\t*goto fail\n\t#Throw a mermaid at it. Their acid will kill anything…if I can resist their magic.\n\t\tThere are a few people still avoiding the mermaids' deadly magic by clinging onto the broken deck of the [i]Scarlet Sails[/i]. Everyone else is doing their best to join them. By sheer good luck, you've managed to haul yourself through a hole in the galley wall where you can still see what's happening. Truman, Firebird, and \n\t\t*if (jaludead = 1)\n\t\t\ta few others have made it back to the relative safety of the bridge.\n\t\t\t*goto otherss\n\t\t*else\n\t\t\tJalu have made it back to the relative safety of the bridge.\n\t\t*label otherss\n\t\t*if (brawling > 40) and (smith = 1)\n\t\t\tThere's a single determined mermaid climbing the wreckage of the bow to get to them. You creep sideways along the ship's flank so she doesn't spot you too soon and grab her by the hair. \n\t\t\t\t\n\t\t\t\"Firebird!\" you yell. \"I need you! But don't kill her.\"\n\t\t\t\t\n\t\t\tFirebird grasps your request at once and helps you haul the mermaid onto the upper deck and then keep her still. She's clever enough to avoid touching the mermaid's skin, but you can see it's difficult for her to resist the mermaid's powerful magic from close by. It's not easy for you, either. When you outline your plan, Firebird grins and gives you her spare sword.\n\t\t\t\t\n\t\t\tThe sea-serpent opens its jaws so close to you that its fetid breath washes over you. It's not easy not to simply scream and run, but you and Firebird lift the mermaid and hurl her with all your strength into the serpent's mouth. Then you both run with all your might toward the far end of the ship. As you slip and slide on the wet and broken deck, you hear the hissing anger of the serpent change to a garbled wail, and you turn around. \n\t\t\t\t\n\t\t\tThe mermaid's half-chewed body is clearly visible in the sea-serpent's mouth. She lies in the center of an expanding ring of broken and bleeding flesh as her poison quickly spreads, melting the sea-serpent's body like ice in the sun. The creature falls sideways with a splash that nearly capsizes you and thrashes wildly in the water, scattering the remaining mermaids.\n\t\t\t\t\t\n\t\t\tYou see it calm itself as it realizes the end has come. It turns its broken head awkwardly toward you to stare at its killer, its eyes already filming over as it sinks helplessly into the depths.\n\t\t\t\n\t\t\tYou watch in silence until it disappears into the dark. For some reason, you find yourself crying.\n\t\t\t\t\n\t\t\t*if truman_love = 1\n\t\t\t\tTruman wraps his arms around you.\n\t\t\t\t*goto success\n\t\t\t*if (jalu_love = 1) and (jalu > 50)\n\t\t\t\tYou find Jalu, and he kisses you.\n\t\t\t\t*set jalu_tied_to_mast false\n\t\t\t\t*goto success\n\t\t\t*if (firebird_love = 1)\n\t\t\t\tFirebird is so relieved to see you safe that she punches you in the stomach, winding you.\n\t\t\t\t*goto success\n\t\t\t*if blood_love = 1\n\t\t\t\tIf only you knew if Captain Blood were still alive.\n\t\t\t\t*goto success\n\t\t\t*else\n\t\t\t\t*goto success\n\t\t*else\n\t\t\tThere's a single determined mermaid climbing the wreckage of the bow to get to them. You creep sideways along the ship's flank so she doesn't spot you too soon and grab her by the hair. \n\t\t\t\t\t\n\t\t\t\"Firebird!\" you yell. \"I need you! But don't kill her.\"\n\t\t\t\t\t\n\t\t\tFirebird grasps your request at once and helps you haul the mermaid onto the upper deck and then keep her still. She's clever enough to avoid touching the mermaid's skin, but you can see it's difficult for her to resist the mermaid's powerful magic from close by. It's not easy for you, either. When you outline your plan, Firebird grins and gives you her spare sword.\n\t\t\t\n\t\t\tYou risk one last glance at the mermaid, and her gorgeous eyes are lifted to yours in total surrender. \"I'm sorry,\" you whisper, suddenly overwhelmed with remorse that you might have hurt her. \"Are you all right?\"\n\t\t\t\t\n\t\t\tShe smiles at you, and your heart melts. You can hear yelling, and some telking fool is grabbing at your arm with all their strength, so you throw them off and kiss the mermaid's perfect lips.\n\t\t\t*page_break\n\t\t\tThe passionate love between you and your magical love burns you like the best and strongest and first rum you ever tasted. It's almost unbearable.\n\t\t\t\t\n\t\t\tThen it [i]is[/i] unbearable, and you pull away. She's still smiling at you, but something is wrong. Your face is still burning. It hurts more and more, and the burning feels hotter and hotter. You reach up your hands to clutch at the invisible fire and feel your face crumbling away. Your hands touch your mutilated jaw before they, too, burn away.\n\t\t\t\t\n\t\t\tThere's barely even time to scream before your throat is eaten away by the mermaid's poison, and your life ends.\n\t\t\t*set mc_dead 1\n\t\t\t*goto fail\n\t#Trick it into attacking a ship full of people I'm not too fond of, and stab it inside one of its existing wounds while it’s distracted. \n\t\t*set morality %-10\n\t\tThere are a few people still avoiding the mermaids' deadly magic by clinging onto the broken deck of the [i]Scarlet Sails[/i]. Everyone else is doing their best to resist the mermaid's charm. Some are even succeeding. By sheer good luck, you manage to haul yourself through a hole in the galley wall where you can still see what's happening. You spot Truman, Firebird, and \n\t\t*if (jaludead = 1) \n\t\t\tothers who've made it back to the relative safety of the deck above you.\n\t\t\t*goto oth\n\t\t*else\n\t\t\tJalu in relative safety on the deck above you.\n\t\t*label oth\n\t\t*if ((truthfulness \u003c 45) and (swordfighting > 37))\n\t\t\tYou haul your exhausted body onto the upper deck of the [i]Scarlet Sails[/i] with Truman's assistance. \n\t\t\t\t\n\t\t\t\"Are there others on board?\" you gasp at him.\n\t\t\t\t\n\t\t\t\"None but these seven,\" he says, \"counting you.\"\n\t\t\t\t\n\t\t\t\"You need to convince the others there are more fighters coming—and that we're going to kill the serpent.\"\n\t\t\t\t\n\t\t\tHe opens his mouth to argue but just nods and quickly uses his magic on the others. Knowing Firebird's courage, he doesn't bother using feelsmithing on her. She's already drawn her sword and looks like she's ready to challenge the serpent to single combat.\n\t\t\t*if firebird_love = 1\n\n\t\t\t\tBy the black depths of the sea, she's magnificent!\n\t\t\t\t*goto draw\n\t\t\t*else\n\t\t\t*label draw\n\t\t\t\t\n\t\t\tYou draw your own sword and stand beside her, listening with satisfaction as Truman and the others yell at the nonexistent army belowdecks to shoot their cannons.\n\t\t\t\t\n\t\t\tThe sea-serpent pauses as it takes in the scene, and you can see it reconsidering its attack while you choose a small but bloody wound on the side of its neck. \n\t\t\t\t\n\t\t\t\"See that neck wound?\" you tell Firebird quietly. \"That's for us.\"\n\t\t\t\t\n\t\t\tAs the sea-serpent turns to prey on an easier target, you and Firebird hurl your swords like spears into its existing wound. It jerks in shock and screams at you in rage, but when it opens its mouth, you can see the blades protruding into the back of its throat. The creature falls sideways with a splash that nearly capsizes you and thrashes wildly in the water, scattering the remaining mermaids. Its panic shoves your swords deeper, tearing away much of its through and cutting off its own ability to breathe.\n\t\t\t\t\t\n\t\t\tYou see it calm itself as it realizes the end has come. It turns its broken head awkwardly toward you to stare at its killers, its eyes already filming over as it sinks helplessly into the depths.\n\t\t\t\n\t\t\tYou watch in silence until it disappears into the dark. For some reason, you find yourself crying.\n\t\t\t\t\n\t\t\t*if truman_love = 1\n\t\t\t\tTruman wraps his arms around you.\n\t\t\t\t*goto success\n\t\t\t*if (jalu_love = 1) and (jalu > 50)\n\t\t\t\tYou find Jalu, and he kisses you.\n\t\t\t\t*set jalu_tied_to_mast false\n\t\t\t\t*goto success\n\t\t\t*if (firebird_love = 1)\n\t\t\t\tFirebird is so relieved that you're safe that she punches you in the stomach, winding you.\n\t\t\t\t*goto success\n\t\t\t*if blood_love = 1\n\t\t\t\tIf only you knew if Captain Blood were still alive.\n\t\t\t\t*goto success\n\t\t\t*else\n\t\t\t\t*goto success\n\t\t*else\n\t\t\tYou haul your exhausted body onto the upper deck of the [i]Scarlet Sails[/i] with Truman's assistance. \n\t\t\t\t\n\t\t\t\"Are there others on board?\" you gasp at him.\n\t\t\t\t\n\t\t\t\"None but these seven,\" he says, \"counting you.\"\n\t\t\t\t\n\t\t\t\"You need to convince the others there are more fighters below—and that we're going to kill the serpent.\"\n\t\t\t\t\n\t\t\tHe opens his mouth to argue but just nods and quickly uses his magic on the others. Knowing Firebird's courage, he doesn't bother using feelsmithing on her. She's already drawn her sword and looks like she's ready to challenge the serpent to single combat.\n\t\t\t*if firebird_love = 1\n\t\t\t\n\t\t\t\tBy the black depths of the sea, she's magnificent!\n\t\t\t\t*goto drawx\n\t\t\t*else\n\t\t\t*label drawx\n\n\t\t\tYou draw your own sword and stand beside her, listening with satisfaction as Truman and the others yell at the nonexistent army belowdecks to shoot their cannons. \n\t\t\t\t\n\t\t\tThe sea-serpent pauses as it takes in the scene, and you can see it reconsidering its attack while you pick a small but bloody wound on the side of its neck. You can tell it doesn't quite believe your ruse, so you give up and hurl your sword like a spear at its neck. \n\t\t\t*page_break\n\t\t\tYour sword hits the scales a hands-breadth from the open wound and falls harmlessly into the sea. Firebird raises her own sword for another attempt, but the titan is moving too fast. It knocks her headlong as it grabs you in its mouth. For a moment, nothing happens, and you find yourself laughing hysterically from behind the serpent's teeth.\n\t\t\t\t\n\t\t\tThen it starts to chew, and your once-strong body is broken to bits as easily as stale bread. In seconds, you're nothing more than a sea-serpent's mouthful. \n\t\t\t\n\t\t\tThere's no more laughter. No more breath. No more you.\n\t\t\t\t\n\t\t\tSo much for treasure.\n\t\t\t*set mc_dead 1\n\t\t\t*goto fail\n\t#Throw away my weapons and let the serpent attack me, hopefully filling its belly with enough of the [i]Scarlet Sails[/i] to save my crew.\n\t\tYou haul your exhausted body onto the upper deck of the [i]Scarlet Sails[/i] with Truman's assistance. \n\t\t\t\t\n\t\t\"Are there others on board?\" you gasp at him.\n\t\t\t\t\n\t\t\"None but these seven,\" he says, \"counting you.\"\n\t\t\t\n\t\t*if jalu_tied_to_mast = 1\n\t\t\t\"Get everyone to the stern, as quick as you can—Jalu, too.\"\n\t\t\t*goto stern\n\t\t*else\n\t\t\t\"Get everyone to the stern, as quick as you can.\"\n\t\t\t*label stern\n\t\t\t\n\t\t\t\"What are you going to do?\" he says, half reaching for your bare arm as if he wants to read your feelings rather than wait for your words.\n\t\t\t\t\n\t\t\tIt's strange. You almost forget what you're doing as he frowns at you in concern. His eyelashes are girlishly long, framing the deep brown of his eyes. Being close to death makes everything seem profoundly beautiful. Snapping out of it, you say, \"I'm going to feed the ship to the monster.\"\n\t\t\t\t\n\t\t\t\"But…how?\" he says.\n\t\t\t\t\n\t\t\t\"Any fish can be caught with the right bait,\" you tell him. \n\t\t\t*if morality \u003c 40\n\t\t\t\t\n\t\t\t\tHis eyes widen. \"You?\"\n\t\t\t\t\t\n\t\t\t\t\"Yep.\"\n\t\t\t\t\t\n\t\t\t\t\"But…I thought you only cared about yourself.\"\n\t\t\t\t\t\n\t\t\t\tYou laugh before getting a grip on yourself once more. \"Can you hurry up now?\"\n\t\t\t\t*goto hurry\n\t\t\t*else\n\t\t\t\n\t\t\t\tHis eyes widen. \"You?\"\n\t\t\t\t\t\n\t\t\t\t\"Yep. Can you hurry up now?\"\n\t\t\t\t*label hurry\n\t\t\t\t\t\n\t\t\t\t\"Um! Yes!\" he says, and runs to gather the others at the safer end of the ship.\n\t\t\t\t\t\n\t\t\t\t\"Safer\" is, of course, a relative term.\n\t\t\t\t\t\n\t\t\t\tIn moments, you stand alone, feeling both foolish and terrified on the ship's bow. \"Hey fishy fishy,\" you whisper, swallowing hysterical laughter. \"Come see $!{name}, the amazing edible figurehead!\"\n\t\t\t\t\t\n\t\t\t\tThe monster's head slowly swings toward you, and its jaws open impossibly wide. A blast of rotten wind hits you as the monster moves to swallow you whole. \n\t\t\t\t\t\n\t\t\t\tWhen you can't see its eyes any more, you turn to flee through the ship, diving into the closest jagged hole and landing painfully on your side. The sunshine pouring through the open bow is blocked out by the serpent's tongue and teeth. You know you don't have time to get away before it crushes your precious [i]Scarlet Sails[/i] with you inside.\n\t\t\t\t*page_break\n\t\t\t\t*if (((truthfulness) + (truman)) > 140) and (skepticism \u003c 51)\n\t\t\t\t\tAnd then a human hand grabs you, dragging you away.\n\t\t\t\t\t\n\t\t\t\t\t\"Truman?\" you say weakly, but the screaming and snapping of timbers is too loud for anyone to hear anything. \n\t\t\t\t\t\n\t\t\t\t\tHe yanks you to your feet and pulls you by the wrist as the world shifts around you. Water rushes into the broken hold, and suddenly you want to find a mermaid. They're so beautiful….\n\t\t\t\t\t\n\t\t\t\t\tTruman slaps you on the face, and you snap out of the mermaid's enchantment only to fall into a dozen reaching arms. Human arms.\n\t\t\t\t\t\n\t\t\t\t\t\"We've got you now,\" says Firebird, suppressing your instinctive struggles until you realize you're being rescued. The others paddle away from the wreckage, crouched around you on what used to be a map table. Three and a half wooden legs point absurdly to the sky. \n\t\t\t\t\t\n\t\t\t\t\t\"You're safe,\" Firebird tells you, and lets go.\n\t\t\t\t\t\n\t\t\t\t\tYou look back with her as the [i]Scarlet Sails[/i] is torn to pieces by the infuriated serpent. It can't bear to think that you've escaped, and it opens its jaw wider and wider until its jaw unhinges like a snake and it's able to take the whole front half of the ship inside its mouth. \n\t\t\t\t\t\n\t\t\t\t\tThe noise of the ship's demise is muffled inside the serpent's mouth…but your ship is too big for any living creature, and the foremast and yardarms are visibly wedged in place in the serpent's open mouth. As you watch, the back half of your ship see-saws on its rock and finally comes to a perfectly balanced stop, like an absurd sculpture. \n\t\t\t\t\t\n\t\t\t\t\tThe creature realizes its error and thrashes wildly in the water, scattering the remaining mermaids in a churning froth as it tries to break the front of the [i]Scarlet Sails[/i] into smaller pieces. It's no use.\n\t\t\t\t\t\n\t\t\t\t\tYou see it calm itself as it realizes the end has come. It turns its broken head awkwardly toward your pathetic little raft to stare at its killer, its eyes already filming over as it sinks helplessly into the depths.\n\t\t\t\t\t\n\t\t\t\t\tYou watch in silence until it disappears into the dark. For some reason, you find yourself crying.\n\t\t\t\t\t\n\t\t\t\t\t*if truman_love = 1\n\t\t\t\t\t\t*set truman %+30\n\t\t\t\t\t\tTruman wraps his arms around you and kisses the top of your head.\n\t\t\t\t\t\t*goto success\n\t\t\t\t\t*if (jalu_love = 1) and (jalu > 50)\n\t\t\t\t\t\tYou find Jalu on the makeshift raft, and he kisses you.\n\t\t\t\t\t\t*set jalu_tied_to_mast 0\n\t\t\t\t\t\t*goto success\n\t\t\t\t\t*if (firebird_love = 1)\n\t\t\t\t\t\tFirebird is so relieved to see you safe that she punches you in the stomach, winding you.\n\t\t\t\t\t\t*goto success\n\t\t\t\t\t*if blood_love = 1\n\t\t\t\t\t\tIf only you knew if Captain Blood were still alive.\n\t\t\t\t\t\t*goto success\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto success\n\t\t\t\t*else\n\t\t\t\t\tAt least you're on your beautiful ship. \n\t\t\t\t\t\n\t\t\t\t\tAs the sea-serpent clamps its mighty jaws shut, you're crushed inside like a spider in a glass jar. The pain and pressure is unbearable, but it's over quickly.\n\t\t\t\t\t\n\t\t\t\t\tGold matters so little now, when it was once so important. \n\t\t\t\t\t\n\t\t\t\t\tYou and your ship are devoured together, dying as a single body broken beyond recognition. No one could ever gather all the pieces of what used to be your life.\n\t\t\t\t\t\n\t\t\t\t\t*set mc_dead 1\n\t\t\t\t\t*goto fail\n*label fail\n*set mc_dead 1\n*page_break\n*achieve epicdeath\nTHE END\n*goto_scene coda\n*label success\n*page_break\n*achieve killedtitan\nThe last mermaids shout insults at you and swim away. Those humans left in the water try to chase them, but their swimming is mercifully slow, and the mermaid's influence dissipates before they're out of the harbor. Your fellow pirates come back to themselves and return, shame-faced, to the closest ships. \n\nOnly two of the ships are seaworthy, and there's only one lifeboat on the [i]Scarlet Sails[/i]. It's an infuriating wait until a healthy quickensmith is sent to help patch up the [i]Scarlet Sails[/i] well enough that you can sail the short distance to shore. Since it's your ship, you have to watch the others leave in smaller boats while you remain stuck on that stupid rock.\n*if jalu_tied_to_mast = 1\n\tToo tired to bother with more death, you set Jalu free, impressed that he survived.\n\t*set jalu_tied_to_mast 0\n\t*goto mast\n*else\n*label mast\n*page_break\nFinally, you and the [
