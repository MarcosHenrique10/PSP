with sleep. There's sleep in your eyes and something sticky in your hair.\n\t*fake_choice\n\t\t#\"What are you doing here?\"\n\t\t\t*set truthfulness %+10\n\t\t#\"Did you think I'd buy a piece of half-rotted flotsam like you? Not likely.\"\n\t\t\t*set truthfulness %-10\n\t\t#\"Actually, you were too good-looking, and I wimped out.\"\n\t\t\t*set truthfulness %+10\n\t\t\t*set jalu %+20\n\tHe laughs delightedly. \"Would you believe Captain Starboard just made me first mate?\"\n\n\tYou sigh. \"Of course she did.\"\n\t\t\n\tHe invites you to breakfast with a chivalry indistinguishable from sarcasm, and the pair of you head for the galley together. You take the chance to observe what you can of him without being too obvious.\n\n\tHis \"H\" brand is off-center and messily done, although he's tall enough that he must have eaten well as a child. You guess that he had a safe childhood but was taken by pirates around puberty. That would have been when his healsmithing ability became apparent for the first time. It may even have given him enough value to keep him alive. Whatever happened to him, it hasn't taken away his sense of his own worth. \n\n\t*set jalubrand %+10\n\tHe may or may not be a good fighter, but he seems so sure of himself that you're willing to bet no one will dare to challenge him. \n\t*set jaluhere 1\n\t*goto thees\n*else\n\tSomehow, while you were in the galley, Jalu became first mate. Huh.\n*label thees\n\t\nSo this was your first day aboard the [i]Scarlet Sails[/i]. \n\nIt could have been better. Then again, it could have been worse.\n\n*set ships_in_fleet 1\n*set ranking 2\n*set rank \"Crewmate\"\n*set blood_name \"Captain Starboard\"\n*set bloodhere 0\n*set blooddead 1\n*set starboardhere 1\n*set jaluhere 1\n*page_break\n*goto_scene ss2b\n", "ss1c": "*hide_reuse\n*temp havefirebird 0\n*set ships_in_fleet 0\n*set rank \"Landlubber\"\nYour pulse quickens as you realize you could be captain of the [i]Scarlet Sails[/i] before dawn. Or you could be dead. Fates change quickly on Cutlass Island. \n\nOne of the servers sees your indecision and offers you a drink. When you see the \"F\" brand on the back of her hand, you flinch away. She rolls her eyes at you, well used to piratical paranoia about feelsmiths, and moves on. You should do the same before your nervous excitement draws attention.\n*choice\n\t#I'll need to recruit an impressive-looking first mate before I do anything else.\n\t\t*set jalu %+10\n\t\t*set skepticism %+10\n\t\t*set killed %-10\n\t\t*set jaluname \"Jalu\"\n\t\t*set jaluhere 1\n\t\tChoosing a first mate is easy. It's choosing a good one that's hard. They need leadership qualities, but not so much that they'll lead a mutiny against you. They need to be smart, but not smart enough to get hired elsewhere. They need to be loyal, but not so loyal they refuse to leave their existing work and come with you.\n\t\t\n\t\tYou rub the \n\t\t*if smith = 1\n\t\t\t\"F\" on your own hand. It's a nervous habit—and one you need to break.\n\t\t\t*goto chacha\n\t\t*if smith = 2\n\t\t\t\"H\" on your hand. It's a nervous habit—and one you need to break.\n\t\t\t*goto chacha\n\t\t*else\n\t\t\t\"Q\" on your hand. It's a nervous habit—and one you need to break.\n\t\t*label chacha \n\n\t\tToo much thinking. Time to act. You search for a first mate who is…\n\t\t*choice\n\t\t\t#Smart enough not to be too drunk in this lawless place. \n\t\t\t\t*set bobname \"Taliha\"\n\t\t\t\t*set janename \"Kila\"\n\t\t\t\t*set skepticism %+10\n\t\t\t\t*set sober %+10\n\t\t\t\t*set gold -2\n\t\t\t\tThe drunks tend to be downstairs near the bar, so you head up to the flat roof, where you're immediately immersed in the informal market of Cutlass Island. One of the sellers is hissing insults at his last slave, a young man who stands upright and impassive, wearing his manacles like jewelry. It's easy to see why he hasn't sold. He's far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand marking him as a healsmith. You can never have too many healsmiths after a sea battle. Now that you're away from Captain Blood, you could also use healsmiths to change the color of your hair. \n\t\t\t\t\n\t\t\t\tHe sees you looking at him and subtly changes the way he stands so he suddenly looks biddable. Then he winks and straightens up again. His self-assurance is breathtaking, and you know that he knows you'll buy him—and then set him free. He might cause problems later, but he's more impressive than you could have hoped for.\n\t\t\t\t\n\t\t\t\tYou bargain the seller down to two gold pieces and hope you haven't just bought yourself a whole lot of trouble. When you ask the ex-slave his name, he tells you \"Jalu\" but offers no further information—and asks no questions about his fate. You find yourself explaining his role as first mate, demanding more and more hours and skills, but he only smiles and agrees.\n\t\t\t\t\n\t\t\t\tThe other new crew members that you choose are seafaring types, literally or virtually born on board. Their skin is hard, and their hair is short: two men and two women. The women are sisters, pleased at the chance to continue working together. \n\t\t\t\t\n\t\t\t\tIf you had a sister, you don't remember her. It doesn't matter now.\n\t\t\t\t*set bobname \"Gina\"\n\t\t\t\t*set janename \"Laren\"\n\t\t\t\t*set jaluhere 1\n\t\t\t\t*goto Jalux\n\t\t\t#Obviously in need of work.\n\t\t\t\t*set morality %+10\n\t\t\t\t*set skepticism %-10\n\t\t\t\t*set gold 0\n\t\t\t\t*set killed %-40\n\t\t\t\t*set jaluhere 1\n\t\t\t\tYou're drawn, as always, to the roof of the inn. It may as well be your home, since your first memory is the day you were sold there as a toddler. You don't remember your own family or where you were born. It doesn't matter now.\n\t\t\t\t\n\t\t\t\tThere aren't any children there at this time of night, so you pick the slaves that you think would suit you best and let them know they'll be treated and paid as your crew. It costs you every coin you have, but you can't sail a ship alone. There's an older man with his son—too young to haul well, but hopefully his small size will prove handy; two women who have the calluses on their hands to prove they know how to handle themselves on board ship; and a young man with an \"H\" brand on the back on his hand marking him as a healsmith. \n\t\t\t\t\n\t\t\t\tThe healsmith is different from the rest. His master was clearly going to beat him if he didn't sell before dawn, but no one was interested in buying a slave with such an arrogant look in his eye. He's in unusually good shape for a slave—for anyone, to be perfectly honest—and volunteers his name: Jalu. Although he had the most to gain from your gift of freedom, he gives you a casual \"Thanks\" and clearly considers his slave debt paid from then on. The other three treat you with a flattering deference, and you know you have their loyalty—for now.\n\t\t\t\t\n\t\t\t\tYou take Jalu aside to discuss making him your first mate, since the others are already deferring to him. He's so calm about his sudden promotion that you find yourself demanding more and more hours and skills. All he does is smile and agree until you finally decide you're done.\n\t\t\t\t*set bobname \"Gana\"\n\t\t\t\t*set janename \"Jarn\"\n\t\t\t\t*goto Jalux\n\t\t\t#In possession of nice-looking guns. If they're a terrible first mate, at least you can cut your losses by stealing from them. \n\t\t\t\t*set gold -2\n\t\t\t\t*set gun_fu %+10\n\t\t\t\t*set truthfulness %-10\n\t\t\t\tThe best weapons will be on the fifth floor—that is, the roof—where everyone who's anyone goes to sell everything that's anything. You've been sold there a few times yourself, and your earliest childhood memory is the day you met your first master there.\n\t\t\t\t\n\t\t\t\tAfter a quick stroll around to see what's on offer, you have two rather nice guns to recruit—along with their owners. They're both women, and since they're sisters, they are pleased to find someone ready to hire both at once. You pick a couple of men based on their sun-darkened faces—clearly experienced sea dogs—and then one of the slaves on offer catches your eye. It's easy to see why he hasn't sold: far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand marking him as a healsmith. You can never have too many healsmiths after a sea battle. Now that you're away from Captain Blood, you could also use the healsmith to change the color of your hair. \n\t\t\t\t\n\t\t\t\tHis name is Jalu, and his owner sells him for just two gold pieces. The women immediately introduce themselves to him and start chatting amiably. He's so sure of himself they automatically defer to his opinions. You take him aside to discuss making him your first mate. He's so calm about his sudden promotion that you find yourself demanding more and more hours and skills. All he does is smile and agree until you finally decide you're done.\n\t\t\t\t*set bobname \"Gina\"\n\t\t\t\t*set janename \"Laren\"\n\t\t\t\t*set jaluhere 1\n\t\t\t\t*goto Jalux\n\t\t\t#Definitely not feelsmith men—I'm not going to mess with Captain Graves, even from afar, and I don't want to behead anyone. \n\t\t\t\t*set skepticism %+10\n\t\t\t\t*set gold -2\n\t\t\t\t*set morality %+10\n\t\t\t\t*set jaluhere 1\n\t\t\t\tYou pick two flint-eyed women and two map-eyed older men. They all look sun-hardened and practical, which should work well on board ship. The men are brothers who've sailed together all their lives. You don't remember your own family or where you were born. It doesn't matter now. What matters is finding another crew member. The ones you have seem useful, but they're not first mate material.\n\t\t\t\t\n\t\t\t\tYour stomach grumbles. Given that you still need to steal a ship, you head upstairs to fortify yourself with some decent chow. There's always someone selling food up there, along with every other item under the sun—including people.\n\t\t\t\t\n\t\t\t\tOne of the sellers is hissing at his last slave, a young man who stands upright and impassive, wearing his manacles like jewelry. It's easy to see why he hasn't sold. He's far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand marking him as a healsmith. You can never have too many healsmiths after a sea battle. Now that you're away from Captain Blood, you could also use the healsmith to change the color of your hair. \n\t\t\t\t\n\t\t\t\tYou argue the seller down to a measly two gold pieces. When you ask the ex-slave his name, he tells you \"Jalu\" but offers no further information—and asks no questions about his fate. The older men you recruited immediately ask him about his travels, and the three of them quickly discover they have several old haunts in common. He's so sure of himself they automatically defer to his opinions. You take him aside to discuss making him your first mate. He's so calm about his sudden promotion that you find yourself demanding more and more hours and skills. All he does is smile and agree until you finally decide you're done.\n\t\t\t\t*set bobname \"Donn\"\n\t\t\t\t*set janename \"Hann\"\n\t\t\t\t*goto Jalux\n\t\t\t#Feelsmith men. Captain Graves is a scoundrel, and anything that bothers him is good news for the rest of Rahana. \n\t\t\t\tYou search for an hour and don't find a single feelsmith man. So much for annoying your second—and worst—master. It's probably for the best, since you pretended to be catastrophically stupid just to make him sell you on, and you don't want to draw his attention back to you.\n\t\t\t\t*goto chacha\n\n\t\t*label Jalux\n\n\t\tJalu is very attractive, with liquor-smooth skin and a body that shows no trace of past illness or mistreatment—just muscles. A lot of muscles. You wonder uneasily if it's wise to turn a slave into the most powerful member of your crew, especially one who's sure to turn heads.\n\t\t*set jalumuscles 1\n\t\t*fake_choice\n\t\t\t#I'll certainly enjoy seeing him every day, and I gather the feeling is mutual.\n\t\t\t\t*set jalu %+10\n\t\t\t#I have a bad feeling about him suddenly. What have I done?\n\t\t\t\t*set skepticism %+10\n\t\t\t#I'm just glad to have freed a slave before his spirit was broken.\n\t\t\t\t*set skepticism %-10\n\t\tHis healsmith brand is off-center and messily done, although he's tall enough that he must have eaten well as a child. You guess that he had a safe childhood but was taken by pirates around puberty. That would have been when his healsmithing ability became apparent for the first time. It might even have given him enough value to keep him alive. Whatever happened to him, it hasn't taken away his sense of his own worth. He might well have found his true calling on board ship. If he can be trusted, he'll serve you very well.\n\t\t*set jalubrand 1\n\n\t\tBefore you leave the roof, you have a quick wander among the sellers. You already have a gun and sword, but your mouth waters at the sight of fresh fruit and vegetables, and you even spot someone with a couple of bars of real soap to sell. The floral smell of the soap is sweeter than the smell of freshly cut wood. Probably because soap is rarer.\n\t\t*if gold = 0\n\t\t\t\t\n\t\t\tToo bad your coins are all gone.\n\t\t\t*goto harborx\n\t\t*else\n\t\t\tFruit and vegetables will stave off scurvy for a while, and the soap might just help you get rid of that constant itching you've had for the last six weeks. Between those two stalls there's a man selling hats, including tricorns. If you're going to be a captain, maybe you should look like it.\n\t\t\t*label shoppingx\n\t\t\tYou check your remaining coins—there \n\t\t\t*if gold > 1\n\t\t\t\tare ${gold} gold pieces left.\n\t\t\t\t*goto axx\n\t\t\t*if gold = 1\n\t\t\t\tis just one left.\n\t\t\t\t*goto axx\n\t\t\t*if gold = 0\n\t\t\t\tare none left.\n\t\t\t\t*goto axx\n\t\t\t*label axx\n\t\t\tAh well. There's no market at sea, so it's better to spend it than save it, right? You look around and see…\n\t\t\t*choice\n\t\t\t\t*selectable_if (gold > 1) #Fresh fruit and vegetables. Two gold pieces.\n\t\t\t\t\t*set health %+10\n\t\t\t\t\t*set gold -2\n\t\t\t\t\t*goto shoppingx\n\t\t\t\t*selectable_if (gold > 3) #A bar of soap. Four gold pieces.\n\t\t\t\t\t*set filth %-10\n\t\t\t\t\t*set health %+10\n\t\t\t\t\t*set gold -4\n\t\t\t\t\t*goto shoppingx\n\t\t\t\t*selectable_if (gold > 9) #A new gun. A better one. Ten gold pieces.\n\t\t\t\t\t*set gun_fu %+10\n\t\t\t\t\t*set gold -10\n\t\t\t\t\t*goto shoppingx\n\t\t\t\t*selectable_if (gold > 9) #A new sword. A better one. Ten gold pieces. \n\t\t\t\t\t*set swordfighting %+10\n\t\t\t\t\t*set gold -10\n\t\t\t\t\t*goto shoppingx\n\t\t\t\t*selectable_if (gold > 1) #From now on, I wear a tricorn of my own. Two gold pieces.\n\t\t\t\t\tThe hat you choose is big and black and has an internal band that'll be handy for storing a spare blade. It fits perfectly and feels mighty fine.\n\t\t\t\t\t*set swordfighting %+5\n\t\t\t\t\t*set killed %-10\n\t\t\t\t\t*set gold -2\n\t\t\t\t\t*goto shoppingx\n\t\t\t\t*selectable_if (gold > 1) #An array of brilliantly colored silks cut in lengths for sashes. Two gold pieces.\n\t\t\t\t\tYou pick the best and brightest colors for when you want to impress others with your wealth and style.\n\t\t\t\t\t*set firebird %+10\n\t\t\t\t\t*set gold -2\n\t\t\t\t\t*goto shoppingx\n\t\t\t\t*selectable_if (gold > 1) #A leatherworker with an array of wide belts. Two gold pieces.\n\t\t\t\t\tYou negotiate to get two for the price of one, wearing one belt low on your hips and the other across your chest. This will make it easier to carry several guns at once.\n\t\t\t\t\t*set gun_fu %+10\n\t\t\t\t\t*set gold -2\n\t\t\t\t\t*goto shoppingx\n\t\t\t\t*selectable_if (gold > 1) #The tallest, glossiest, most buckle-ridden boots you've ever seen. Two gold pieces.\n\t\t\t\t\tThey fit perfectly, hidden dagger-sheaths and all. You walk taller with them on—literally.\n\t\t\t\t\t*set swordfighting %+10\n\t\t\t\t\t*set gold -2\n\t\t\t\t\t*goto shoppingx\n\t\t\t\t#Time to move on.\n\t\t\t\t\t*goto harborx\n\t\t\t\t\t\t\n\t\t\t*label harborx\n\t\t\tOn your way out, you almost knock over one of your old crew members, but she steps aside and catches your wrist so you don't fall down the stairs. \"Steady on,\" she says.\n\n\t\t\tThe palm of her hand is criss-crossed with old scars. She's one of the rare people who doesn't shy away from touching a magic user, probably because she's too fond of wrestling to care.\n\n\t\t\t\"Thanks Firebird,\" you say.\n\t\t\t\n\t\t\tShe shrugs awkwardly. Conversation always makes her surly. So does silence, of course. Her natural state is fighting, with or without a sword. She fights like other pirates breathe. In fact, she'd make a valuable addition to any crew.\n\t\t\t*label truthordarex\n\t\t\t*set havefirebird 1\n\t\t\t*choice\n\t\t\t\t#I tell her exactly what I'm doing and ask if she wants to join me.\n\t\t\t\t\t*set truthfulness %+10\n\t\t\t\t\t*set firebird %+10\n\t\t\t\t\t\"I've had enough of Captain Blood,\" you say, \"and I'm stealing the [i]Scarlet Sails[/i]. You want in?\"\n\t\t\t\t\t\t\n\t\t\t\t\tShe purses her lips, unconsciously resting one hand on the sword at her hip. \"Captain Blood was fun, but I've fought everyone on that ship a hundred times. A change is as good as a challenge.\"\n\t\t\t\t\t*goto rules\n\t\t\t\t#I tell her Captain Blood has abandoned the entire crew and left the island…but I'll give her a berth if she gives me three gold.\n\t\t\t\t\t*set truthfulness %-10\n\t\t\t\t\t\"Captain Blood's taken off,\" you say, \"but I'm going to steal the [i]Scarlet Sails[/i]. You want in? It'll cost you three shiny.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\"Huh,\" she says. \"I would have thought she'd have kept me and ditched the rest of you. Ah well.\" She unlaces her left boot and counts out three gold from underneath her foot. \n\t\t\t\t\t\t\n\t\t\t\t\tYou tried keeping money in your boot once, but it hurt too much. Still, Firebird doesn't seem to notice physical pain any more. She has a new gash across one arm that'll give her yet another scar to add to the rest. No wonder she looks so cheerful: Cutlass Island is a veritable buffet of foolish challengers.\n\t\t\t\t\t*set gold +3\n\t\t\t\t\t*goto rules\n\t\t\t\t#I say goodbye to her.\n\t\t\t\t\t*set skepticism %-10\n\t\t\t\t\t*set firebird %+10\n\t\t\t\t\t\"You never hit me in anger,\" you say, certain Firebird knows the value of such a compliment. \"So, thank you.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\"Where are you going?\" she asks.\n\t\t\t\t\t*goto truthordarex\n\t#I'll recruit the best fighter from my old ship. She'll both protect and train me.\n\t\t*set firebird %+10\n\t\t*set brawling %+10\n\t\t*set bobname \"Gina\"\n\t\t*set janename \"Laren\"\n\t\t*set havefirebird 1\n\t\tThe best weapons will be on the fifth floor—that is, the roof—where everyone who's anyone goes to sell everything that's anything. You've been sold there a few times yourself, and your earliest memory is the day you met your first master as a child. \n\t\t\n\t\tKnowing Firebird, she'll be up there checking out the swords.\n\t\t\t\n\t\tAfter a quick stroll around the informal market you hear the sound of brawling from below and realize Firebird is probably in the thick of it. Since you're surrounded by willing sailors, you recruit two new crew members. They're both women, and as sisters they're pleased to find someone willing to hire both at once. Their names are Gina and Laren.\n\t\t*set bobname \"Gina\"\n\t\t*set janename \"Laren\"\n\t\t\n\t\tOn your way out, you almost knock Firebird over, but she steps aside and catches your wrist so you don't fall down the stairs. \"Steady on,\" she says.\n\n\t\tThe palm of her hand is criss-crossed with old scars. She's one of the rare people who doesn't shy away from touching a magic user, probably because she's too fond of wrestling to care.\n\n\t\t\"Thanks Firebird,\" you say.\n\n\t\tShe shrugs awkwardly. Conversation always makes her surly. So does silence, of course. Her natural state is fighting, with or without a sword. She fights like other pirates breathe. \n\t\t*label truthordare\n\t\t*choice\n\t\t\t#I tell her exactly what I'm doing and ask if she wants to join me.\n\t\t\t\t*set truthfulness %+10\n\t\t\t\t*set firebird %+20\n\t\t\t\t\"I've had enough of Captain Blood,\" you say, \"and I'm stealing the [i]Scarlet Sails[/i]. You want in?\"\n\t\t\t\t\t\n\t\t\t\tShe purses her lips, unconsciously resting one hand on the sword at her hip. \"Captain Blood was fun, but I've fought everyone on that ship a hundred times. A change is as good as a challenge.\"\n\t\t\t\t*goto firejalu\n\t\t\t#I tell her Captain Blood has abandoned the entire crew and left the island…but I'll give her a berth if she gives me three gold.\n\t\t\t\t*set truthfulness %-10\n\t\t\t\t\"Captain Blood's taken off,\" you say, \"but I'm stealing the best ship on the island. You want in? It'll cost you three shiny.\"\n\t\t\t\t\t\n\t\t\t\t\"Huh,\" she says. \"I would have thought she'd have kept me and ditched the rest of you. Ah well.\" She unlaces her left boot and counts out three gold from underneath her foot. \n\t\t\t\t\t\n\t\t\t\tYou tried keeping money in your boot once, but it hurt too much. Still, Firebird doesn't seem to notice physical pain any more. She has a new gash across one arm that'll give her yet another scar to add to the rest. No wonder she looks so cheerful: Cutlass Island is a veritable buffet of foolish challengers.\n\t\t\t\t*set gold +3\n\t\t*label firejalu\n\t\tYou feel enormous relief knowing Firebird is on your side. \n\t\t\t\n\t\t\"One condition,\" she says suddenly. \"Don't make me first mate.\"\n\t\t\t\n\t\t\"Oh.\"\n\t\t\t\n\t\t\"Cheer up,\" she grins. \"Let's find a good one together.\"\n\n\t\tShe scans the ramshackle marketplace, pursing her lips. \n\t\t\t\n\t\tOne of the sellers is hissing insults at his last slave, a young man who stands upright and impassive, wearing his manacles like jewelry. It's easy to see why he hasn't sold. He's far too cool and confident to make a good slave. But he looks strong and smart, and he's got an \"H\" burned onto the back of one hand marking him as a healsmith. You can never have too many healsmiths after a sea battle. He sees you looking at him and subtly changes the way he stands so he suddenly looks biddable. Then he winks and straightens up again. \n\t\t\t\n\t\t\"Him,\" says Firebird. \"The good-looking one.\"\n\t\t*choice\n\t\t\t#\"Well, I do like a nice view.\"\n\t\t\t\t*set jalu %+10\n\t\t\t\t*goto buyjalu\n\t\t\t#\"Are you sure? He looks like an arrogant piece of work.\"\n\t\t\t\t*set jalu %-10\n\t\t\t\t\"Exactly,\" she grins. \"Don't you just want to punch him in the face and see what happens?\"\n\t\t\t\t\t\n\t\t\t\t\"Actually, yes.\"\n\t\t\t\t*goto buyjalu\n\t\t\t#\"You think he's going to be a decent fighter for you to play with, don't you?\"\n\t\t\t\t*set brawling %+10\n\t\t\t\t\"Look at the way he stands,\" she says, sounding terribly pleased with herself. \"He knows how to fight. I want to test him. Please can I? Please? I'll let him train you a bit too.\"\n\t\t\t\t\t\n\t\t\t\tYou sigh, but your mouth is twitching into a smile. \"Fine.\"\n\t\t\t\n\t\t*label buyjalu\n\t\t*set jaluhere 1\n\t\t*set jaluname \"Jalu\"\n\t\tFirebird leads the way to the slaves' corral. You bargain the seller down to two gold pieces, and hope you haven't just bought yourself a whole lot of trouble. \n\t\t\n\t\tWhen you ask the ex-slave his name, he tells you \"Jalu\" but offers no further information—and asks no questions about his fate. You take him aside to discuss making him your first mate. He's so calm about his sudden promotion that you find yourself demanding more and more hours and skills. All he does is smile and agree until you finally decide you're done.\n\t\t\t\n\t\tHe certainly is attractive, with liquor-smooth skin and a body that shows no trace of past illness or mistreatment—just muscles. A lot of muscles. \n\t\t*set jalumuscles 1\n\t\t*fake_choice\n\t\t\t#I'll certainly enjoy seeing him every day, and I gather the feeling is mutual.\n\t\t\t\t*set jalu %+10\n\t\t\t#I have a bad feeling about him suddenly. He could cause trouble.\n\t\t\t\t*set skepticism %+10\n\t\t\t#I'm glad to have freed a slave before his spirit was broken.\n\t\t\t\t*set skepticism %-10\n\t\t*set jalubrand 1\n\t\tHis healsmith brand is off-center and messily done, although he's tall enough that he must have eaten well as a child. You guess that he had a safe childhood but was taken by pirates around puberty. That would have been when his healsmithing ability became apparent for the first time. It may even have given him enough value to keep him alive. Whatever happened to him, it hasn't taken away his sense of his own worth. He might well have found his true calling on board ship. Perhaps he really will make a good first mate for you.\n\t\t\t\n\t\tBefore you leave the roof, you have one last wander among the sellers. You already have a gun and sword, but your mouth waters at the sight of fresh fruit and vegetables, and you even spot someone with a couple of bars of real soap to sell. The floral smell of the soap is sweeter than the smell of freshly cut wood. Probably because soap is rarer.\n\t\t\n\t\tFruit and vegetables will stave off scurvy, and the soap might just help you get rid of that constant itching you've had for the last six weeks. Between them there's a man selling hats, including tricorns. If you're going to be a captain, maybe you should look like it. \n\t\t\t\t\n\t\t\"Go on,\" says Firebird. \"You know you want the hat. Here, I'll buy it for you. Or you can waste my shiny coins on food if you must.\"\n\t\t\t\n\t\t*set gold +2\n\t\t*label shopping\n\t\tYou check your remaining coins—there \n\t\t*if gold > 1\n\t\t\tare ${gold} pieces left.\n\t\t\t*goto axb\n\t\t*if gold = 1\n\t\t\tis just one piece left.\n\t\t\t*goto axb\n\t\t*if gold = 0\n\t\t\tisn't a single one left.\n\t\t*label axb\n\t\tAh well. There's no market at sea, so it's better to spend it than save it, right? You look around and see…\n\t\t*choice\n\t\t\t*selectable_if (gold > 1) #Fresh fruit and vegetables. Two gold pieces.\n\t\t\t\t*set health %+10\n\t\t\t\t*set gold -2\n\t\t\t\t*goto shopping\n\t\t\t*selectable_if (gold > 3) #A bar of soap. Four gold pieces.\n\t\t\t\t*set filth %-10\n\t\t\t\t*set health %+10\n\t\t\t\t*set gold -4\n\t\t\t\t*goto shopping\n\t\t\t*selectable_if (gold > 9) #A new gun. A better one. Ten gold pieces.\n\t\t\t\t*set gun_fu %+10\n\t\t\t\t*set gold -10\n\t\t\t\t*goto shopping\n\t\t\t*selectable_if (gold > 9) #A new sword. A better one. Ten gold pieces. \n\t\t\t\t*set swordfighting %+10\n\t\t\t\t*set gold -10\n\t\t\t\t*goto shopping\n\t\t\t*selectable_if (gold > 1) #A tricorn of my own. Two gold pieces.\n\t\t\t\tThe hat you choose is big and black and has an internal band that'll be handy for storing a spare blade. It fits perfectly, and feels mighty fine.\n\t\t\t\t\t\n\t\t\t\tFirebird gives you an appreciative look, and you wonder where your taciturn fighter has gone.\n\t\t\t\t*set swordfighting %+5\n\t\t\t\t*set firebird %+10\n\t\t\t\t*set gold -2\n\t\t\t\t*goto shopping\n\t\t\t*selectable_if (gold > 1) #An array of brilliantly colored silks cut in lengths for sashes. Two gold pieces.\n\t\t\t\tYou pick the best and brightest colors for when you want to impress others with your wealth and style. Firebird is clearly pleased at your blossoming fashion sense. Huh.\n\n\t\t\t\t*set firebird %+10\n\t\t\t\t*set gold -2\n\t\t\t\t*goto shopping\n\t\t\t*selectable_if (gold > 1) #A leatherworker with an array of wide belts. Two gold pieces.\n\t\t\t\tYou negotiate to get two for the price of one and strap one belt low on your hips and the other across your chest. This will make it easier to carry several guns at once.\n\t\t\t\t*set gun_fu %+10\n\t\t\t\t*set gold -2\n\t\t\t\t*goto shopping\n\t\t\t*selectable_if (gold > 1) #The tallest, glossiest, most buckle-ridden boots you've ever seen. Two gold pieces.\n\t\t\t\tThey fit perfectly, hidden dagger-sheaths and all. You walk taller with them on—literally.\n\t\t\t\t*set swordfighting %+10\n\t\t\t\t*set gold -2\n\t\t\t\t*goto shopping\n\t\t\t#It's time to move on.\n\t\t\t\t*goto rules\n\n*label rules\n*set jaluhere 1\n\nOne of the servers hurries past with a stack of splintered wooden mugs, and\n*if smith \u003c3\n\this bare arm brushes yours as he passes. Before you can control it, your magic unfurls inside you,\n\t*if smith = 1\n\t\tand you feel a wave of hatred for all pirates. They're worse than a pack of dogs: they smell, they bite, and they eat and drink and fight and snore like animals.\n\t\t\n\t\tYou shake off the server's emotions and quickly neutralize your expression in case he looks back. If he knows you saw his rage, it could tip him over the edge into action, and it's clear he'd fight to kill. Sometimes you wish you weren't a feelsmith.\n\t\t*goto capbloody\n\t*else\n\t\tand you see a man with a permanent migraine and a racing pulse. He needs both a healer and a holiday, but if he could afford either, he wouldn't need them. You know better than to offer to ease his pain, and you quickly neutralize your expression in case he glances back. Looking into somebody's body without their permission is an offense that could get you drawn and quartered; a gruesome way to make sure a healsmith's friends can't haul them back from the brink of death.\n\t\t*goto capbloody\n*else\n\this tray touches your bare arm as he passes. Before you can control it, your magic unfurls inside you and you feel the battered and rum-soaked reality of the mugs. Their wood is warped, made from a mixture of trees and scrap, and the oldest mugs are rubbed smooth from an endless procession of callused fingers. \n\t\n\tYou pull your perspective back into your flesh-and-blood self with an effort and shake your head slightly to get rid of the last dregs of the sensation.\n*label capbloody\n\nYou're almost at the harbor when you spot someone lurking between empty crates on the dock. Firebird has her sword out and on guard before you've consciously realized the hunched figure in the shadows is familiar. \n*fake_choice\n\t#Grab your gun.\n\t\t*set gun_fu %+10\n\t#Grab your sword.\n\t\t*set swordfighting %+10\n\t#Approach carefully.\n\t\t*set skepticism %-10\n\nYou let one hand creep toward the weapon on your hip, but when you see the man's face, you relax. Firebird bursts out laughing.\n\n\"Truman!\" she says. \"Hiding as usual, I see.\"\n\nHe steps into the light, his arms still raised. \"Feelsmith male, young, straight hair,\" he quotes the WANTED poster softly. \"It could be me.\"\n\n\"Ah!\" says Firebird. \"You shoulda asked me to keep you company. I'd have fought anyone that tried to take your head.\"\n\nTruman smiles his thanks, but as usual, he's unable to let a truth remain unspoken. \"Even you couldn't protect me from a mob the size of that one.\" He gestures at the inn, where several pirates spill loudly from the doors and at least one is held upside down from an upper window, wailing an apology for some perceived slight.\n\n\"Come with us,\" you blurt out.\n\nTruman stares at you. \"Where are you going? I'll come, but why bring me?\"\n\nThere's no need to tell the truth out loud, but your real reason for bringing him is…\n*fake_choice\n\t#He's right to be worried for his safety here. \n\t\t*set morality %+10\n\t\t*set skepticism %-10\n\t#A feelsmith with his unshakeable honesty is a portable lie detector. \n\t\t*set skepticism %+10\n\t\t*set truthfulness %+10\n\t#He's similar enough to Kallin Graveson to be a useful bargaining piece later.\n\t\t*set morality %-10\n\t\t*set skepticism %+10\n\n\"We need more crew,\" you say blithely. \"Let's go.\"\n\nYou can tell he doesn't believe you (mostly because he says so out loud), but he does trust you enough to go with you rather than continuing to hide. To be honest, it's pleasant to have him around. He's the only person you know who doesn't drink or fight. Instead, he works and sings—and generally stays out of your way unless you seek him out.\n\n\"So,\" says Jalu. \"Where's this ship we're about to steal?\"\n\nYou can't stop the smile breaking across your face as you turn to look at him. There are bigger ships, and newer ships, and faster ships. But none of them ride the waves with the arrogant grace of the [i]Scarlet Sails[/i]. You turn and point wordlessly, shivering with longing to go aboard. Truman whistles appreciatively.\n\nJalu pauses to give you a look that's undoubtedly complimentary and stops just short of being insulting. \"How shall we address you\n*fake_choice\n\t#When the ship is ours, Ma'am?\"\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n\t#When the ship is ours, Sir?\"\n\t\t*set he \"he\"\n\t\t*set his \"his\"\n\t\t*set him \"him\"\n\t#When the ship is ours?\"\n\t\t*set he \"they\"\n\t\t*set his \"their\"\n\t\t*set him \"them\"\n\nThe others wait expectantly, and you realize you never did properly introduce yourself. Whether real or invented, your name will sound a lot better with \"Captain\" in front of it.\n*set ranking 4\n*set rank \"Captain\"\n*fake_choice\n\t#\"Captain Farling.\"\n\t\t*set name \"Farling\"\n\t#\"Captain Sam.\"\n\t\t*set name \"Sam\"\n\t#\"Captain Casey.\"\n\t\t*set name \"Casey\"\n\t#\"Captain Rampant.\"\n\t\t*set name \"Rampant\"\n\t#\"Captain River.\"\n\t\t*set name \"River\"\n\t#\"Captain ________\"\n\t\t*input_text name\n\nThe crew—your crew—murmurs your name back at you, and you suppress the urge to laugh. You're a captain now!\n\nAlmost.\n\n\"How do we take the ship, Captain $!{name}?\" Jalu asks smoothly.\n*set rank \"Captain\"\n*set ranking 4\n*choice\n\t#I draw my sword. \"How do you think? Kill everyone on board, and I'll be right behind you.\"\n\t\t*set truthfulness %-10\n\t\t*set swordfighting %+10\n\t\tJalu leads the others in a charge, killing at least one of the skeleton crew left on board while Firebird kills another. The rest of the crew manages well enough, although $!{bobname} has a bad cut across his arm and $!{janename} concludes the battle by throwing up over the side of the ship. Truman manages to keep out of the way as usual.\n\t\t\n\t\tOne of the defeated guards spots you and realizes you're pulling the strings. He leaps at you with sword raised—which is handy, because it leaves his belly wide open. The hardest part of killing him is pulling your sword out afterwards. It's stuck in his guts, and you have to brace your foot on his chest and yank on the hilt to get your weapon back. Also, he stinks of bad eggs. If he hadn't died, he'd still have ended up spilling his bowels in a gutter somewhere. Your own stomach turns, and you hold your breath as you clean your sword on a less stained section of his shirt. \n\t\t*goto rulesx\n\t*selectable_if (gold > 9) #\"Let's fool the previous owners into stealing Captain Blood's ship, thinking it’s loaded with gold—leaving their ship virtually defenseless.\"\n\t\t*set gold -10\n\t\t*set truthfulness %-10\n\t\t*set brawling %+10\n\t\tYou set your new crew to work, pretending drunkenness and overpaying for drinks as they talk loudly about the [i]Wanderer[/i]'s amazing wealth. They're careful to keep within hearing distance of the captain and crew of the [i]Scarlet Sails[/i]. Before long, you see Captain Starboard's crew gather their weapons and leave the inn to take Captain Blood's ship. \n\t\t\n\t\tWhile their best fighters are distracted, you take your new crew and burst onto the [i]Scarlet Sails[/i], throwing her two remaining crew members overboard. In minutes, the ship is yours.\n\t\t*goto rulesx\n\t#I don't want anyone killed. Let's charge the ship together and scare them off.\n\t\t*set morality %+20\n\t\t*set health %-10\n\t\t*set truthfulness %-20\n\t\t\"Interesting strategy,\" Jalu says. \"So what if they don't run away like a bunch of landlubbers?\"\n\t\t\n\t\t\"They will,\" you say, \"if you lot just follow my lead.\"\n\t\t\n\t\t\"Wait!\" says Truman.\n\t\t\n\t\tYou turn to him, expecting him to keep out of anything that's already deceptive and could turn violent. \n\t\t\n\t\t\"I need a sword,\" he says. \"To wave around.\"\n\t\t\n\t\tOnce Truman and the rest are suitably armed, you realize there's no more preparing to do. It's guts or glory, and it feels like your stomach is tying itself in every knot you know. You shout the command to attack and leap on board, careful not to catch your sword on the ropes or release the terrified giggle from your throat.\n\t\t\n\t\tThe others scream bloody murder behind you, and the small number of crew left guarding the [i]Scarlet Sails[/i] scatter in shock, scrambling for their own weapons. Truman kicks one man's sword from his grasp and shouts threats so vile that two others leap overboard before he can get close enough to engage them. The rest see they're outnumbered and flee without striking a blow. The [i]Scarlet Sails[/i] is yours.\n\n\t\t\"Truman!\" you gasp. \"You're…scary!\"\n\t\t\n\t\tHe grins at you. \"My da always said that if you're gonna lie you should make it count.\"\n\t\t*set truman %+10\n\t\t*goto rulesx\n\t#\"I'll kill the captain while she’s brawling and most of her crew’s off drinking.\"\n\t\t*set morality %-20\n\t\t*set truman %-10\n\t\t*set starboarddead 1\n\t\t*set killed %+20\n\t\tTruman's eyes widen before he lowers his gaze, doing his best to hide his revulsion. A part of you agrees with him. You've killed in self-defense, in sea battles, and even by accident. But you've never committed murder. \n\t\t\t\n\t\t\"Captain Starboard has a trained parrot that's particularly vile,\" says Firebird, \"but it makes her easy to find.\"\n\t\t\t\n\t\tWith a curt nod, you head back into the inn.\n\t\t\t\n\t\tHow do you kill her?\n\t\t*choice\n\t\t\t#Hurl her off the third-floor balcony onto the cobblestones below. \n\t\t\t\t*set brawling %+10\n\t\t\t\t*set health %-10\n\t\t\t\tYou wait until Captain Starboard is distracted by a sword duel with another captain and then tackle her, aiming for her knees to knock her off balance. She punches you in the face as she falls, snapping your head back, but you don't lose focus. You twist out of her grasping hands and kick her hard in the stomach—shoving her between two of the balcony posts.\n\t\t\t\t\t\t\n\t\t\t\tIt works—she flies through the railings and plummets to her death three storeys below. There's a horrible crunch, and you look down to see the signs of at least two others crushed beneath her. It could so easily have been your back broken by someone else's fight—but it wasn't. You shake it off and turn away, ignoring your throbbing head. No one knows you killed her on purpose. On Cutlass Island, accidents happen.\n\t\t\t\t\t\t\n\t\t\t\tHer parrot screeches in rage and dives down to peck at the inn's staff as they haul out the bodies. You send Jalu to fetch Captain Starboard's abandoned hat so you can show it to the shipboard guards as proof of death.\n\t\t\t\t*goto rulesx\n\t\t\t#Stab her. \n\t\t\t\t*set swordfighting %+10\n\t\t\t\t*set health %-10\n\t\t\t\tYou draw your sword and wait for an opening. Captain Starboard and another captain are dueling furiously, but it's clear from the clashing blades that they're not trying to actually hurt each other. You angle your body to expose as little of yourself as possible and deliberately flip off your target's hat with the tip of your blade. \n\t\t\t\t\t\t\n\t\t\t\tShe turns to you in a fury, and the other captain salutes her with the hilt of her sword and backs away to find another opponent. Your target's first strike is a warning—a literal slap of the wrist that almost knocks your sword from your hand. It's clear you're outmatched, but she doesn't yet know you intend to kill her. There's no time for finesse. Instead of aiming for the obvious targets of her heart or limbs, you strike across her neck, slicing open her artery.\n\t\t\t\t\t\t\n\t\t\t\tShe howls in rage and rains blows on your back and shoulders, but you both know she can't last. Her sword drops from her hand, and even in the noisy brawl the clang of the round hilt on the wooden floor rings like a bell. She stares at her own hand, unable to accept that her fingers no longer have the strength to hold her sword. Then she looks at you and keeps her eyes locked on yours as her legs give way. She tries to shout for justice, realizing too late that yours was no friendly fight. You hear the creaking of wooden floorboards as a space opens up around you. Pirates are skilled at avoiding the temptation to witness a murder. \n\t\t\t\t\t\t\n\t\t\t\tThe blood from the captain's throat finally slows, and her face hits the floor.\n\t\t\t\t\t\t\n\t\t\t\tYou take her hat and sword for proof of death while her vicious parrot is still reeling in shock. \n\t\t\t\t*goto rulesx\n\t\t\t#Shoot her. \n\t\t\t\t*set gun_fu %+10\n\t\t\t\t*set killed %+10\n\t\t\t\tShe's distracted by a friendly swordfight with another captain, so you carefully turn away and draw your flintlock. You shield the pistol with your body as you set it to half-cocked, controlling your breathing so you don't do anything that could make the imprecise aim worse. As you turn to face her, she ignores her companion and stares right at you—but she's not quite quick enough. Pirates expect to be killed by friends, lovers, and rivals. Usually, strangers are safe. \n\t\t\t\t\t\n\t\t\t\tLetting out a slow breath, you squeeze the trigger in what feels like achingly slow motion. The flint strikes steel, subtly jerking your hand, but the shot flies true and buries itself in her forehead. \n\t\t\t\t\t\t\n\t\t\t\tHer opponent steps back and stares at you, deciding whether or not to shout an accusation of murder. You'd be killed at once by crowd justice, but you'd still have time to kill her for crying foul. The pair of you remain still, weighing your options. She chooses to walk away. You wait for five long seconds as your victim slumps to the ground. Her hat falls forward, covering the distinctive wound. No one roars for justice. Excellent.\n\t\t\t\t\t\t\n\t\t\t\tYou take your victim's sword for proof of death while her parrot is still reeling in shock. It's time to go. \n\t\t\t\t*goto rulesx\n\t\t\t#Use my magic. \n\t\t\t\t*set magical_skill %+20\n\t\t\t\tCaptain Starboard is distracted by a swordfight with another captain. Both women are grinning, deliberately clashing swords more often than they're hitting one another. \n\t\t\t\t*if smith = 1\n\t\t\t\t\tYou arrange your magic carefully in your mind and then stumble forward as if by accident, brushing the captain's bare wrist for a fraction of a second before shambling away.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\tMoments later, you have a splitting post-magic headache, and you know you've pushed your smithing to its limit. The headache spikes at the sound of a scream of shock. Thanks to your magic, your victim suddenly decided to fight for real, and the other captain is bleeding and furious. Seconds later, the captain of the [i]Scarlet Sails[/i] is dead, and her parrot is too. \n\t\t\t\t\t\t\t\n\t\t\t\t\tWhen you see the other captain frown thoughtfully, you are careful to melt away into the crowd rather than running away in a panic. She already suspects a feelsmith was involved, but she can't prove it. When you see her shrug and sheath her sword, you know you've escaped mob justice.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou take your crew to board the [i]Scarlet Sails[/i], bearing the captain's hat to prove she's dead. \n\t\t\t\t\t*set health %-10\n\t\t\t\t\t*goto rulesx\n\t\t\t\t*elsif smith = 2\n\t\t\t\t\tYou arrange your magic carefully in your mind and then stumble forward as if by accident, brushing the captain's bare wrist for a fraction of a second before shambling away.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\tMoments later, you have a splitting post-magic headache, and you know you've pushed your smithing to its limit. The headache spikes at the sound of a scream of shock. Thanks to your magic, the swordfighting captain's jugular artery just cracked open like a broken pot, and blood is sheeting down her chest. \n\t\t\t\t\t\t\t\n\t\t\t\t\tWhen you see the other captain frown thoughtfully, you are careful to melt away into the crowd rather than running away in a panic. She might suspect it was a healsmith rather than an unlucky blow that killed her new friend, but she can't prove it. When you see her shrug and sheath her sword, you know you've escaped mob justice.\n\t\t\t\t\t\t\t\n\t\t\t\t\tYou take your crew to the [i]Scarlet Sails[/i], bearing the captain's hat to prove she's dead. \n\t\t\t\t\t*set health %-10\n\t\t\t\t\t*goto rulesx\n\t\t\t\t*else\n\t\t\t\t\tYou arrange your magic carefully in your mind and then walk casually to the strong outer wall, leaning against it so a hole in the elbow of your shirt lets you subtly touch the wood.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\tMoments later, you have a splitting post-magic headache, and you know you've pushed your smithing to its limit. The headache spikes at the sound of a cry of shock. Thanks to your magic, the section of balcony railing beside the captain and her new friend broke as they both leant on it, sending them falling to their death.\n\t\t\t\t\t\t\t\n\t\t\t\t\tYou're careful not to act overly concerned about the deaths. If someone realizes your magic was involved, you'll be killed. Luckily, the inn is old and in dire need of repair. One more broken railing barely raises an eyebrow. It's trickier to steal the captain's hat than it was to kill her, which is why you send Jalu to do it.\n\t\t\t\t\t\t\t\n\t\t\t\t\tYou lead your crew outside to the [i]Scarlet Sails[/i], bearing the captain's hat to prove she's dead.\n\t\t\t\t\t*set health %-10\n*label rulesx\n*if starboarddead = 1\n\n\tThe skeleton crew left on board surrenders their ship at once, grateful to escape with their lives.\n\t*goto boo\n*else\n*label boo\n*page_break\n*set rank \"Captain\"\n*set ranking 4\n*set killed %+20\n*achieve captainy\nWhen you take up your position on the bridge of the [i]Scarlet Sails[/i], Truman blurts out, \"Oh! How beautiful it is!\"\n\nYou couldn't have said it better yourself.\n*fake_choice\n\t*selectable_if (gold > 0) #The day's going well, so I send $!{bobname} to buy me one last drink.\n\t\t*set sober %-10\n\t\t*set gold -1\n\t\t*set skepticism %-10\n\t#I congratulate my crew on our new ship. We're a team now.\n\t\t*set killed %-10\n\t\t*set skepticism %-10\n\t#I remind my crew to never get in my way.\n\t\t*set skepticism %+10\n\t\t*set killed %+10\n\t\t*set filth %-10\n\n*if smith = 3\n\tYou rest your hands on the wooden railing and let your sense of self fade as you magically examine the ship. She's well made, with no leaks whatsoever, and she's as beautiful inside as out. You sense her vibrating with a kind of energy, as if she longs to sail fast and far. With your magical senses, the crew members are dim shadows, crawling over her like babies too young to leave their mother. You sigh with mingled delight and sorrow as you pull away from your ship-sense and feel your own small, inelegant body once more.\n\nIn minutes, the blood-red sails belly out with the wind, and you float away into the darkness.\n*choice\n\t#I check that no one's bothering Truman.\n\t\t*set truman %+10\n\t\t*set skepticism %-10\n\t\tHe's always wary of those around him, but he's the one person you know isn't a threat to you. Apart from anything else, even you could take him in a fight. You stand next to him at the railing and watch the lights of Cutlass Island shrink to a distant glow.\n\t\t\n\t\t\"It's strange,\" he says. \"No matter what I'm leaving behind, the lights on shore always look like home as they fade away.\"\n\t\t*goto starboardx\n\t#If only Truman were into wrestling, so I could get physical with him.\n\t\t*set truman %+10\n\t\t*set brawling %+10\n\t\tHe's always wary of those around him, but he's the one person you know isn't a threat to you. Apart from anything else, even you could take him in a fight. You stand next to him at the railing and watch the lights of Cutlass Island shrink to a distant glow.\n\t\t\n\t\t\"It's strange,\" he says. \"No matter what I'm leaving behind, the lights on shore always look like home as they fade away.\"\n\t\t*goto starboardx\n\t#Firebird is so gorgeous I have to force myself to stop staring at her.\n\t\t*set firebird %+10\n\t\t*set killed %-10\n\t\tYou saw dancers with scarves once, when you were a slave child at an upmarket fair. They swung and leapt and arched as if only manners kept them from flying away. Whenever Firebird fights, you remember that starlit night and your heart leaps in your chest.\n\t\t*goto starboardx\n\t#I spy on Jalu.\n\t\t*set jalu %-10\n\t\t*set skepticism %+10\n\t\tHe's alone at the helm while the others investigate their new quarters. You go below and pass underneath him so you can come up on deck behind his position. He has an easy stance, perfect for passing a full night without fading, and his hand is light on the wheel. There's nothing interesting to see based on the back of his head and you're not sure what you were looking for. But as you half turn back to the nearest ladder, the lantern-light glints on his cheek, flashing silver. You hold your breath until you're out of sight, knowing but not quite believing what you saw: Jalu was crying.\n\n*label starboardx\n\nSince the ship is sailing smoothly, and Jalu is at the helm until further notice, you do some exploring. The galley is well stocked, there are more than enough weapons to go around, and the captain's cabin is comfortable without being over-full. You come out and read the shipboard law carved into the door. It's time to set your own rules, so you get a knife and make the necessary adjustments. \n\nFirst, you need to decide on the distribution of spoils.\n*fake_choice\n\t#Equal shares for every soul on board. \n\t\t*set skepticism %-10\n\t#Triple share for the captain and double share for the first mate.\n\t\t*set golden 2\n\t#Five shares for the captain and three shares for the first mate. \n\t\t*set truthfulness %+10\n\t\t*set golden 3\n\nNext, you set the level of cleanliness on board. \n*fake_choice\n\t#Every bit of the ship scrubbed daily, including the head—starting immediately.\n\t\t*set skepticism %+10\n\t\t*set killed %+10\n\t#Every bit of the ship scrubbed once a week, including the head.\n\t\t*set filth 2\n\t\t*set filth %+10\n\t#Rain's a perfectly good cleaner—and a mop if there’s a lot of blood or vomit. \n\t\t*set filth 3\n\t\t*set filth %+10\n\t\t*set health %-10\n\nFinally, you need to set a standard of shipboard discipline.\n*fake_choice\n\t#Minor offenses will be punished with a night in the brig; major offenses with longer. Direct disobedience to the captain or mate gets a keelhauling.\n\t\t*set skepticism %-10\n\t\t*set filth %+10\n\t#Minor offenses will be punished with a week in the brig without food, major offenses punished with the cat o’nine tails. Direct disobedience to the captain or mate gets a keelhauling.\n\t#Minor offenses will be punished with the cat o’nine tails. Direct disobedience to the captain or mate gets a keelhauling.\n\t\t*set morality %-10\n\t\t*set killed %+10\n*set ships_in_fleet 1\n*set ranking 4\n*set rank \"Captain\"\n*set blood_name \"Jalu\"\n*set captaincyindanger 1\n*set bloodhere 0\n*set starboardhere 0\n*set jaluhere 1\n*page_break\n*goto_scene ss2c\n", "ss1d": "*hide_reuse\n*comment Cap S is a healer.\n*set rank \"Stowaway\"\n*set stowaway 1\n*set mc_saves_self 1\nFighting spreads quickly, filling the inn with yells of rage, grunts of pain, and the smash of breaking glass. Your own balcony erupts, and your exits are blocked. A quickensmith grabs a balcony railing, and seconds later, they have a club to fight with. \n*if smith \u003c3\n\tYou feel a stab of jealousy that you can't use your own type of magic in a fight unless you want the entire crowd to turn on you in a mortal fury.\n\t*goto fury\n*else\n*label fury\n\nOne of the servers hurries past with a stack of splintered wooden mugs, and\n*if smith \u003c3\n\this bare arm brushes yours as he passes. Before you can control it, your magic unfurls inside you,\n\t*if smith = 1\n\t\tand you feel a wave of hatred for all pirates. They're worse than a pack of dogs: they smell, they bite, and they eat and drink and fight and snore like animals.\n\t\t\n\t\tYou shake off the server's emotions and quickly neutralize your expression in case he looks back. If he knows you saw his rage, it could tip him over the edge into action, and it's clear he'd fight to kill. Sometimes you wish you weren't a feelsmith.\n\t\t*goto capblood\n\t*else\n\t\tand you see that the man has a permanent migraine and a racing pulse. He needs both a healer and a holiday, but if he could afford either, he wouldn't need them. You know better than to offer to ease his pain, and you quickly neutralize your expression in case he glances back. Looking into somebody's body without their permission is an offense that could get you drawn and quartered; a gruesome way to make sure a healsmith's friends can't haul them back from the brink of death.\n\t\t*goto capblood\n*else\n\this tray touches your bare arm as he passes. Before you can control it, your magic unfurls inside you and you feel the battered and rum-soaked reality of the mugs. Their wood is warped, made from a mixture of trees and scrap, and the oldest mugs are rubbed smooth from an endless procession of callused fingers. \n\t\n\tYou pull your perspective back into your flesh-and-blood self with an effort and shake your head slightly to get rid of the last dregs of the sensation.\n*label capblood\n\nCaptain Starboard jumps into the fray, directing her parrot to flap in the faces of her opponents. They move together with devastating skill, cutting a path through the crowd. She steals a drink or two along the way, and it even looks like she's made a new friend, since she and another captain end up fighting back to back as several others team up against them. The parrot flaps up to the rafters, looking crankier than ever. \n\nYou don't own much more than the clothes on your back, a few coins, a left-skewing gun, and a battered sword. Luckily all of it is with you, because you don't want to run into Captain Blood back on board the [i]Wanderer[/i]. Everything changes now. \n*choice\n\t#I go buy a drink to steady my nerves.\n\t\t*set gold -1\n\t\t*set sober %-10\n\t\tYou head downstairs to the bar. \n\t\t\n\t\tIt's smelly and crowded, and with each step, your bare feet stick to the many mysterious substances of the floor. Luckily, there's not too much broken glass around today. Elbowing aside a hairy giant of a woman who appears to be eating the face of her equally hirsute and twice as busty companion, you finally reach the bar. The closest barman has his hands full, but he cleverly saves time by taking your coin in his teeth and spitting it into a bucket behind him. He's sloshing mugs of ale onto the counter as fast as they're being taken away, so you grab one and squeeze back through the crowd, narrowly missing a punch in the stomach as another pirate fights to take your place.\n\t\t\n\t\tThe ale is good stuff, at least by pirate standards. Which is to say, the tang of piss is a minor note rather than tasting like the main ingredient.\n\t\t*label another\n\t\t*choice\n\t\t\t*selectable_if (sober >35) #Perhaps I'll have another before moving on.\n\t\t\t\t*set gold -1\n\t\t\t\t*goto another\n\t\t\t#I go find some food.\n\t\t\t\t*goto shoppingx\n\t\t\t#I need more gold, so I'll steal some.\n\t\t\t\t*set truthfulness %-10\n\t\t\t\t*goto stealing\n\t#I go to buy some food.\n\t\t*goto shoppingx\n\t#I need more gold, so I'll steal some.\n\t\t*set truthfulness %-10\n\t\t*goto stealing\n*label stealing\nFirst things first. You touch the tiny pockets sewn into the inside of your shirt to check your ${gold} gold coins are still secure. They are.\n\t\nYou glance over the inner railing at the friendly brawl boiling below, above, and around you. The bar is downstairs, so there's a lot of drunks and a lot of coins to steal on the ground floor. Upstairs, there's an informal market on the roof. There's more gold upstairs, but the wealthy are wary, especially here. On your current balcony, people might be too involved in their fun to notice one more bump.\n*choice\n\t*selectable_if (sober > 49) #It's the bar for me. Drunks make great victims when I'm sober.\n\t\t*set sober %+10\n\t\t*set gold +5\n\t\tIt's smelly and crowded, and with each step, your bare feet stick to the many mysterious substances of the floor. Luckily, there's not too much broken glass around today. You pick a pocket here, offer to fetch a drink for someone there, and before you know it, you're a whole lot richer. The stink of unwashed bodies, vomit, sour ale, and rotting dreams is starting to get to you, so you head upstairs for some air—and, of course, to lighten your sagging pockets.\n\n\t\t*goto shoppingx\n\t#I'll head to the roof and get some real money flowing my way.\n\t\t*set gold +10\n\t\tYou spot your target within seconds: a sparkly-eyed fool who thinks his hired muscle means he doesn't need to pay attention to his purse. Instead, the three of them are attracting more notice than anyone else. You hang back, waiting for the inevitable.\n\t\t\t\n\t\tBefore you have time to get bored, someone makes a grab for that clinking purse, and both of the muscle-men jump on her, delighted to finally have something to do. The wealthy young buck watches the fight and laughs. Meanwhile, you slit the purse at his belt and catch the coins as they begin to fall. \n\t\t\t\n\t\tIt's tempting to simply keep grabbing that glittering rain, but there's been enough stupidity today. When your hand is full, you move away, nodding in acknowledgement as others smile thanks at you and reach out their own long fingers. The young fool and his bodyguards will eventually notice they've lost their small fortune, but they'll have no reason to remember you. \n\t\t\t\n\t\tAnd now to spread your gold among the local community.\n\t\t*goto shoppingx\n\t#When it comes to fighting and stealing, I can do two things at once.\n\t\t*set brawling %+10\n\t\t*set gold +3\n\t\tYou leave your weapons in their places and dive into the fray with your fists already raised. \n\t\t\t\n\t\tThere are punchable faces everywhere. You deliberately pick someone with a sword and hit her in the jaw. She reels back, and her sword is in her hand before she's even upright. You duck under her blade and kick her ankle as you wriggle out of range. Her second strike misses you but slices right through the pointed corner of some other pirate's hat. He bellows with rage and draws his own sword, and the pair of strangers attack one another as if they've both fallen for the same man. \n\n\t\tIn the interest of fairness, you pick both of their pockets, one after the other. One of the other pirates watches you with a smile and gives you a silent round of applause as you finish. You bow and head away upstairs before you catch the eye of someone less appreciative.\n*label shoppingx\n\nOne of the sellers hawking his wares at the rooftop market is clenching and unclenching his fists in evident frustration, held back from violence only by the desire not to bruise his wares. He hisses insults at his last slave, a young man who stands upright and impassive, wearing his manacles like jewelry. It's easy to see why the slave hasn't sold. He's far too cool and confident to take orders well. \n\nAt the same time, Captain Starboard of the [i]Scarlet Sails[/i] is a few paces in front of you, and she's giving him a thoughtful look. Her parrot clacks its beak at you, and you look away. On his block, the handsome slave gives Captain Starboard a delighted smile as if he's been looking for her. You ignore their silent exchange and walk into a gap between the wooden stalls criss-crossing the open space. \n\nThe roof of the inn may as well be your home, since your earliest memory is being sold there as a toddler. You don't remember your own family or where you were born. It doesn't matter now. There are more WANTED posters up here targeting the ill-fated Kallin Graveson but no sign of any feelsmith men. It's probably for the best, since beheadings are awfully noisy even without a crowd.\n\nIt's been a good day so far, and it's hard to keep your excitement from spilling over and drawing unwanted attention. For a moment, you consider hiring a healsmith to alter the color of your hair. But of course that's far too expensive.\n\nYour mouth waters at the sight of fresh fruit and vegetables, and you even spot someone with a couple of bars of real soap to sell. The floral smell of the soap is sweeter than the smell of freshly cut wood. Probably because soap is rarer. \n\nFruit and vegetables will stave off scurvy for a while, and the soap might just help you get rid of that itchy rash you've had for the last six weeks. You'll need food while you're stowing away, too.\n*label shopping\nYou check your remaining coins—there \n*if gold > 1\n\tare ${gold} gold pieces left.\n\t*goto axb\n*if gold = 1\n\tis just one piece left.\n\t*goto axb\n*if gold = 0\n\tisn't a single one left.\n*label axb\nAh well. There's no market at sea, so it's better to spend it than save it, right? You look around and see…\n*choice\n\t*selectable_if (gold > 1) #Fresh fruit and vegetables. Two gold pieces.\n\t\t*set health %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 2) #Hardtack and salted beef. Three gold pieces.\n\t\t*set health %+20\n\t\t*set gold -3\n\t\t*goto shopping\n\t*selectable_if (gold > 3) #A bar of soap. Four gold pieces.\n\t\t*set filth %-10\n\t\t*set health %+10\n\t\t*set gold -4\n\t\t*goto shopping\n\t*selectable_if (gold > 9) #A new gun. A better one. Ten gold pieces.\n\t\t*set gun_fu %+10\n\t\t*set gold -10\n\t\t*goto shopping\n\t*selectable_if (gold > 9) #A new sword. A better one. Ten gold pieces. \n\t\t*set swordfighting %+10\n\t\t*set gold -10\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #An array of brilliantly colored silks cut in lengths for sashes. Two gold pieces.\n\t\tYou pick the best and brightest colors for when you want to impress others with your wealth and style.\n\t\t*set firebird %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #A leatherworker with an array of wide belts. Two gold per belt.\n\t\tYou negotiate to get two for the price of one, wearing one belt low on your hips and the other across your chest. That will make it easier to carry several guns at once.\n\t\t*set gun_fu %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t*selectable_if (gold > 1) #The tallest, glossiest, most buckle-ridden boots you've ever seen. Two gold pieces.\n\t\tThey fit perfectly, hidden dagger-sheaths and all. You walk taller with them on—literally.\n\t\t*set swordfighting %+10\n\t\t*set gold -2\n\t\t*goto shopping\n\t#It's time to get moving.\n\t\t*goto harbor\n*label harbor\n\nOn your way out, you almost knock over one of your old crew members, but she steps aside and catches your wrist so you don't fall down the stairs. \"Steady on,\" she says.\n\nThe palm of her hand is criss-crossed with old scars. She's one of the rare people who doesn't shy away from touching a magic user, probably because she's too fond of wrestling to care.\n\n\"Thanks, Firebird,\" you say.\n\nShe shrugs awkwardly. Conversation always makes her surly. So does silence, of course. Her natural state is fighting, with or without a sword. She fights like other pirates breathe. In fact, she'd make a valuable addition to any crew.\n*label truthordare\n*choice\n\t#I tell her exactly what I'm doing and ask if she wants to join me.\n\t\t*set truthfulness %+10\n\t\t*set firebird %+10\n\t\t\"I've had enough of Captain Blood,\" you say, \"and I'm stowing away on the [i]Scarlet Sails[/i]. You want in?\"\n\t\t\n\t\tShe purses her lips, unconsciously resting one hand on the sword at her hip. \"Captain Blood was fun, but I've fought everyone on that ship a hundred times. A change is as good as a challenge.\"\n\t\t*goto rules\n\t#I tell her Captain Blood has abandoned the entire crew and left the island…but I'll help her stow away with me if she gives me three gold.\n\t\t*set truthfulness %-10\n\t\t\"Captain Blood's taken off,\" you say, \"but I'm stowing away on the best ship on the island. You want in? It'll cost you.\"\n\t\t\t\n\t\t\"Huh,\" she says. \"I would have thought she'd have kept me and ditched the rest of you. Ah well.\" She unlaces her left boot and counts out three gold from underneath her foot. \n\t\t\t\n\t\tYou tried keeping money in your boot once, but it hurt too much. Still, Firebird doesn't seem to notice physical pain any more. She has a new gash across one arm that'll give her yet another scar to add to the rest. No wonder she looks so cheerful: Cutlass Island is a veritable buffet of foolish challengers.\n\t\t*set gold +3\n\t\t*goto rules\n\t#I say goodbye to her.\n\t\t*set skepticism %-10\n\t\t*set firebird %+10\n\t\t\"You never hit me in anger,\" you say, certain Firebird knows the value of such a compliment. \"So, thank you.\"\n\t\t\n\t\t\"Where are you going?\" she asks.\n\t\t*goto truthordare\n\n*label rules\n*set ships_in_fleet 1\n\nYou're almost at the harbor when you spot someone lurking between empty crates on the dock. Firebird has her sword out and on guard before you've consciously realized the hunched figure in the shadows is someone you know. \n*fake_choice\n\t#Grab your gun.\n\t\t*set gun_fu %+10\n\t#Grab your sword.\n\t\t*set swordfighting %+10\n\t#Approach carefully.\n\t\t*set skepticism %-10\n\nYou let one hand creep toward the weapon on your hip, but when you see the man's face, you relax. Firebird bursts out laughing.\n\n\"Truman!\" she says. \"Hiding as usual, I see.\"\n\nHe steps into the light, his arms raised. \"Feelsmith male, young, straight hair,\" he quotes softly from Captain Graves' WANTED poster. \"It could be me.\"\n\n\"Ah!\" says Firebird. \"You shoulda asked me to keep you company. I'd have fought anyone that tried to take your head.\"\n\nTruman smiles his thanks, but as usual, he's unable to let a truth remain unspoken. \"Even you couldn't protect me from a mob the size of that one.\" He gestures at the inn, where several pirates spill loudly from the doors and upstairs someone is struggling and screaming, held upside down from an upper window for someone's amusement.\n\n\"Come with us,\" you blurt out.\n\nTruman stares at you. \"Where are you going? I'll come, but why bring me?\"\n\nThere's no need to tell the truth out loud, but your real reason for bringing him is…\n*fake_choice\n\t#He's right to be worried for his safety here. \n\t\t*set morality %+10\n\t\t*set skepticism %-10\n\t#A feelsmith with his unshakeable honesty is a portable lie detector. \n\t\t*set skepticism %+10\n\t\t*set truthfulness %+10\n\t#He's similar enough to Kallin Graveson to be a useful bargaining piece later.\n\t\t*set morality %-10\n\t\t*set skepticism %+10\n\n\"We could use the company,\" you say blithely. \"Let's go.\"\n\nYou can tell he doesn't believe you (mostly because he says so out loud), but he does trust you enough to go with you rather than hope that the empty crates can keep him from harm. To be honest, it's pleasant to have him around. He's the only person you know who doesn't drink or fight. Instead, he works and sings—and generally stays out of your way unless you seek him out.\n\nAs if he knows what you're thinking, he smiles at you and says, \"I always thought there was more to you, \n*choice\n\t#Sam.\"\n\t\t*set name \"Sam\"\n\t\t*goto worries\n\t#Casey.\"\n\t\t*set name \"Casey\"\n\t\t*goto worries\n\t#River.\"\n\t\t*set name \"River\"\n\t\t*goto worries\n\t# ________\"\n\t\t*input_text name\n*label worries\n\"No worries,\" you say gruffly, becoming concerned that Truman's quiet nature has hidden a mind sharp enough to know you better than you know yourself. \n\nHe proves it immediately by saying, \"One day, you'll be your own\n*fake_choice\n\t#Man, with your own ship.\"\n\t\t*set he \"he\"\n\t\t*set his \"his\"\n\t\t*set him \"him\"\n\t#Woman, with your own ship.\"\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n\t#Captain, with your own ship.\"\n\t\t*set he \"they\"\n\t\t*set his \"their\"\n\t\t*set him \"them\"\n\n\"Enough of that dreamy nonsense,\" you tell him. \"Time to sneak on board and get comfy.\"\n\nThere are only two men guarding the [i]Scarlet Sails[/i] who are still awake.\n\nAs you cast sideways glances at the ship, Truman blurts out, \"Oh! How beautiful!\" before Firebird shushes him.\n\nThere's something about stowing away together that makes you like them better than before. You won't miss many of the old crew. Lokni snored, and Heran always had pockets full of rocks for \"target practice\" which often involved hitting you from behind.\n*set truman %+10\n*set firebird %+10\n\nYou carefully seal your weapons inside several layers of varnished oil-cloth you \"borrowed\" from the [i]Wanderer[/i] and slip into the water three ships away from the [i]Scarlet Sails[/i]. Listening to the [i]slosh-slosh-slosh[/i] of the water and the murmur of conversation above, you climb carefully up the webbing hanging down the ship's flank. You, Firebird, and Truman slide into the shadows one by one before heading for the unguarded hatch at the stern.\n*set killed %+10\n\nYou climb down into the stinking dark of the hold and make yourselves as comfortable as possible. It will be a long wait until it's safe to come out. \n\nTruman tells stories to stave off the boredom as you listen to the creaks and stomping of the rightful crew returning to their ship. At last, the tide turns, the ship begins to move, and you give the others a tight smile. Of course, they can't see it in the darkness.\n\t\n\"I'll keep watch,\" says Truman. \"You two may need to fight for our place when we're found, so you'd better sleep.\"\n\n*if smith = 3\n\tYou rest your hands on the wooden side of the ship and let your sense of self fade as you magically examine the ship. She's well made, with no leaks whatsoever, and she's as beautiful inside as out. You sense her vibrating with a kind of energy, as if she longs to sail fast and far. The humans on board are dim shadows, crawling over her like babies too young to leave their mother. You sigh with mingled delight and sorrow as you pull away from your ship-sense and feel your own small, inelegant body once more.\n\nIt's not so bad with three of you stowing away at once. But it's bad enough. \n\nWhen you wake up, Truman is too nervous to sleep, and he's finally run out of stories to tell.\n*fake_choice\n\t#I ask Firebird to give us some swordfighting tips.\n\t\t*set swordfighting %+10\n\t\t*set firebird %+10\n\t\t*goto starboard\n\t#I tell stories so Truman can calm down well enough to sleep.\n\t\t*set truman %+10\n\t\t*set skepticism %-10\n\t\t*goto starboard\n\t#If only Truman were into wrestling so I could get physical with him.\n\t\t*set truman %+10\n\t\t*set brawling %+10\n\t\t*goto starboard\n\t#Firebird is so gorgeous I have to force myself to stop staring at her or she might fight me for real.\n\t\t*set firebird %+10\n\t\t*set killed %-10\n\n*label starboard\t\n*set health %-20\nThe days crawl by and the nighttime darkness is an endless torment. All your food is long gone, and you are desperately hungry and thirsty. One more day should be enough to keep you from getting hauled back to Cutlass Island. Of course, the captain might simply choose to throw you overboard.\n\nYou wake at a tap on your shoulder and stare into an annoyingly perfect male face.\n\n\"Call me Jalu,\" he says. \"And you are?\"\n\n\"$!{name},\" you say, trying to sound powerful as you blink in shock. \"And these are Firebird and Truman; a fighter and a feeler who are well worth keeping on board.\"\n\n\"I see,\" he says comfortably. He's very attractive, with liquor-smooth skin and a body that shows no trace of past illness or mistreatment—just muscles. A lot of muscles. \n\nYou need to piss, and your head is still muzzy with sleep. There's sleep in your eyes and something sticky in your hair.\n*set jalumuscles 1\n*set jalubrand 1\n\t\t\nHe invites you to breakfast with a chivalry indistinguishable from sarcasm, and the four of you head for the galley together. You take the chance to observe what you can of him without being too obvious.\n\nHis \"H\" brand is off-center and messily done, although he's tall enough that he must have eaten well as a child. You guess that he had a safe childhood but was taken by pirates around puberty. That would have been when his healsmithing ability became apparent for the first time. It might even have given him enough value to keep him alive. Whatever happened to him, it hasn't taken away his sense of his own worth. And it's clear from the way the other pirates address him that he's first mate of the [i]Scarlet Sails[/i]—recently recruited, since they're all still examining him when they think he isn't looking.\n\nCaptain Starboard chose him well. He may or may not be a good fighter, but he seems so sure of himself that you're willing to bet no one will dare to challenge him. \n*set jaluhere 1\n*set jaluname \"Jalu\"\n*set starboardhere 1\n*set knowsstarboard 1\n*set blood_name \"Captain Starboard\"\n\nAt the galley, all conversation ceases as you enter. You automatically move toward the stack of wooden bowls near the stove, but Jalu stops you. \"I'm so sorry,\" he purrs. \"Did you think I was about to feed you three?\" He shakes his head sadly, prompting laughter from the crew. \"Now get to work!\"\n\nThree hours later, your hands are blistered and bleeding from scrubbing the pots and pans and bowls and knives and then every inch of the deck, including the head.\n\nA pair of boots stands before you, and you look up at a dark silhouette against the punishing sun. For a moment you see two heads, and then her parrot squawks and flies elsewhere. \"You just earned one meal,\" says Captain Starboard. \"After that, we'll talk about whether or not to have you keelhauled for daring to stow away on my ship.\"\n\nTruman helps pull you to your feet as the captain's parrot screams with avian laughter. The three of you head right back to the galley and eat until your bellies are groaning. Once the hunger fades, the fear begins.\n*set ships_in_fleet 1\n*set ranking 3\n*set rank \"Stowaway\"\n*set blood_name \"Captain Starboard\"\n*set jaluhere 1\n*set bloodhere 0\n*set starboardhere 1\n*page_break\n*goto_scene ss2d\n", "ss2": "Once you've sailed a full week without any sign of pursuit, she weighs the sea anchor and declares that it's time to celebrate the new ship. There's plenty of rum on board, and any initial diffidence quickly falls away as the drunken celebration continues. Soon, things turn cheerfully rowdy, and Truman takes up a position in the crow's nest as much to protect himself from the general chaos as to keep watch for any potential threat from other pirates.\n\nSome people are practicing swordplay or running out the guns. Others are wrestling. Firebird has one of the new crew in a headlock while she blocks the swords of two others. She’s laughing for joy.\n\nWhat do you do for fun?\n*label fun\n*choice\n\t*selectable_if (sober > 48) #Drink some more. \n\t\tMmm, rum. Now this party's really getting started.\n\n\t\tWhat do you do next?\n\t\t*set sober %-10\n\t\t*goto fun\n\t#Run out the shiny new cannons. \n\t\tYou grab some powder and head belowdecks to set off some explosions. It's terribly relaxing. One of the barrels has a tendency to get blocked, so you make a note of it and check everything else is in order.\n\t\t*set gun_fu %+10\n\t\t*goto firebird\n\t#Wrestle with Firebird. \n\t\t*set firebird %+10\n\t\t*set brawling %+10\n\t\tFirebird always enjoys a friendly fight. You dive into the knot of combatants, pulling Firebird's plaited hair and punching her in the shins and back, feeling the ridges of her scars as thicker lines against your knuckles. \n\t\t*if smith = 1\n\t\t\tSince she doesn't mind wrestling with a feelsmith, you don't try and hide the confidence that washes over you as her delight in her own skill bleeds into your emotions.\n\t\t\t*set magical_skill %+10\n\t\t\t*goto she\n\t\t*if smith = 2\n\t\t\tSince she doesn't mind wrestling with a healsmith, you don't bother to hide the confidence that washes over you as the sense of her perfectly honed body bleeds into your awareness.\n\t\t\t*set magical_skill %+10\n\t\t\t*goto she\n\t\t*else\n\t\t\t*label she\n\t\t\tShe gives as good as she gets and more, grinning and insulting you between punches. At last, the two of you run out of breath and collapse on the warm planking of the deck. It's a good day, and you can feel the bruises swelling on your hands and face to prove it.\n\t\t\t*set brawling %+10\n\t\t\t*goto firebird\n\t#Grab a reasonably blunt sword and join the fray. \n\t\t*set swordfighting %+10\n\t\tKilling crew members is a waste of resources, so you're careful not to actually injure anyone—not badly—as you fight a friendly battle with one of the new crew. She's small, but she moves fast, dodging most of your attacks and slapping others away with her own sword. Her footwork is faster than thought, and you're distracted trying to emulate her skill. When she sees you looking down, she puts her blade to your neck and crows at her easy victory. You drop your sword in surrender and ask her for another bout. Flattered, she gives you a lesson.\n\n*label firebird\n\n*if sober \u003c 50\n\tWhen you're done, you stand still on the deck to enjoy the familiar sway of the sea, glancing up to check the sails are in order just as a freak wave hits. Like an idiot drunk, you stumble backward into Firebird, crushing her against another crewmate. It wouldn't matter except he's holding a naked sword, and it slices through her thigh. Her blood wells up, pouring in a red waterfall down her leg. \n\t*set firebird %-10\n\t*goto firebird2\n*else\n\tWhen you're done, you stand on the deck to enjoy the familiar sway of the sea, glancing up to check the sails are in order just as a freak wave hits. Firebird's latest opponent stumbles forward and both of them collapse onto the deck. It wouldn't matter except he's holding a naked sword, which slices through her arm. Her blood wells up, spreading out in an ominous red pool. \n*label firebird2\n\nThe edges of the bloody pool outline the grain of the wood perfectly. Firebird isn't laughing any more.\nWhat do you do?\n*choice\n\t*selectable_if (smith = 2) #Heal her using magic. \n\t\tWith Firebird's permission, you \n\t\t*label you\n\t\tpull back the torn edges of her clothing and place your hands on either side of the wound, ignoring the blood. The broken skin knits together as you watch. Using magic is exhausting, but it's fascinating too.\n\n\t\tBefore you can finish,\n\t\t*set magical_skill %+10\n\t\t*set firebird %+10\n\t\t*goto captain\n\t#Tear up some rags to help staunch the bleeding. \n\t\t*set skepticism %-10\n\t\t*set truthfulness %+10\n\t\t*set firebird %+10\n\t\tWith Firebird's permission you carefully cut her ruined clothing away from the wound, ripping the cloth into rough strips. Together, you and Firebird press the makeshift bandage firmly against the wound.\n\n\t\t*goto captain\n\t#Help her—if she just pays me three gold pieces. \n\t\t*set skepticism %+10\n\t\t*set gold +3\n\t\t*set firebird %-10\n\t\t*if smith = 2\n\t\t\t\"I'll heal you,\" you tell Firebird, \"If you promise me three gold pieces for my trouble.\"\n\n\t\t\t\"Go then,\" she says through gritted teeth.\n\n\t\t\tYou\n\t\t\t*goto you\n\t\t*else\n\t\t\t\"I'll get a healsmith for you,\" you tell Firebird. \"If you promise me three gold pieces for my trouble.\"\n\t\t\t\n\t\t\t\"Go then,\" she says through gritted teeth.\n\t\t\t\n\t\t\tYou jump up and scan the crowd for J
