ing in appreciation of your idea. \"It's smart. Just in case either of us gets hurt or sick, we'll have supplies to take care of ourselves.\"\n\n\"Let's go for basic stuff like bandages and aspirin and... yeah,\" you suggest awkwardly. \"It would be worse if we got sick or hurt trying to use things we had no idea how to use.\"\n\n\"Alright, good point,\" Abby says agreeably. Abby lets you walk on ahead. She follows you to the pharmacy. The destruction from the night before is evident. Though there is no more fire, many buildings are burned down, and the buildings that are still standing are blackened, soot-covered, and fire-damaged. You recognize your old house, still half-caved in. It is eerily quiet, and you don't spot any of those creatures, but you motion to Abby to keep quiet. Half-crouched, you both precariously clamor over debris silently towards the pharmacy.\n\nThe door to the pharmacy is sealed with soot and partially covered with debris. You and Abby try hard but unsuccessfully to open it, and your attempts are absolutely useless. Abby suddenly gasps quietly and points at an undead creature who hasn't seemed to notice the two of you yet, but has wandered here, attracted to the noise that you and Abby were making earlier. What do you do?\n\n*choice\n #Just run. Screw the pharmacy, your lives are on the line!\n  *goto 34\n #Shoot the creature with your weapon. You really do need basic first aid, just in case.\n  *goto 35\n\n*label 34\n\nAbby looks at you frantically through the soot-smeared, foggy glass. Her eyes are wide and she's shaking her head. You mouth \"I'm sorry\" and walk away, venturing further into the dark. You sloppily, but silently, search through the shelves. The market has already been raided, by the mess you see. \n\nSuddenly, you hear clattering.\n\nYou know that no one is in here. There's no other way in, you and Abby had already looked around.\n\nUnless a creature has been trapped in here.\n\nYou hurriedly swipe an entire shelf's worth of dried fruit into your pack and sprint towards the door. You nearly slam into the creature when you round the corner. It hasn't heard you yet. \n\nYou notice a broken window out of the corner of your eye. You can either go for the window, or try to shoot it.\n\nWhat do you do?\n\n*choice\n #Keep running!\n  *goto 43\n #Use your weapon.\n  *goto 44\n\n*label 43\n\n\n\"Keep running!\" you hiss at Abby. She looks pissed off but she keeps up with you.\n\n\"Are you kidding me?\" she hisses. \"We don't even know where the hell we are!\"\n\n\"I know these woods,\" you insist, sounding more confident than you really feel.\n\nYou jog into a clearing cluttered and scattered with random mobs of the creatures.\n\n\"Crap, look what you put us into, you idiot!\" Abby says angrily. You gulp.\n\n\"I'm sorry, you were right. Happy?\" you say weakly, still feigning toughness. Abby softens and grabs your hand.\n\n\"I'm sorry, too. We're not going to get out of this,\" Abby whispers.\n\n\"I know.\" You squeeze her hand in a very feeble attempt of comforting her.\n\nAfter a long, miserable session of struggle, you finally shake it off. You groan at your own stupidity when you realize you could have simply used your weapon! It would have been much easier had you just done so. It was clear that trying to run with tons and tons of creatures crawling pretty much everywhere would not have worked.\n\nThe creatures catch on that you both are there and mob around you.\n\nTHE END\n*goto_scene ending\n\n*label 44\n\n\"What are you doing?\" Abby whispers as you ready and raise your weapon.\n\n\"Saving our lives,\" you say back arrogantly. You shoot. You miss.\n\n\"Crap!\" you hiss. The noise from the near-hit has let the creature know exactly where you are.\n\nSuddenly you see a flash of silver lodge in between where the creature's eyes used to be. \"Smooth going,\" Abby whispers scoldingly. She slaps the back of your head before leaning over and yanking the knife out of its head, which makes a disgusting, slimy, then a horrible crunching noise. \"You need more practice with that thing.\"\n\n\"I know,\" you reply, feeling somewhat offended. You rub the back of your head, looking scandalized. \"Now what do you want to do?\"\n\n\"I don't know,\" Abby replies absently, running her fingers through the handles of her many knives on her belt. (You suspect she has even more in her pack.) \"We should either go back to the pharmacy or look for a new place to sleep. These woods seem to be crawling with Shells.\"\n\n\"Shells?\" you ask, confused and curious. \"What are Shells?\"\n\n\"I call them Shells,\" Abby explains sheepishly. You chuckle bemusedly, but she turns to look at you, her eyes serious. \"Because they're not people anymore. They're just shells of the people they used to be. There's nothing in there anymore. They're just... nothing.\"\n\n\"Oh,\" you say awkwardly, feeling suddenly very sobered. \n\n\"What did you call them, then?\" Abby asks interestedly.\n\n\"I didn't really call them anything,\" you admit. \"I called them undead creatures, like the ones on TV? But I dropped the 'undead' part after a while.\"\n\n\"You've never thought about it?\" Abby asks. You shift uncomfortably, thinking of your father.\n\n\"I don't like to think about it,\" you say flatly. Abby nods.\n\n\"Fair enough,\" Abby says. \"So what are we going to do?\" \n\nWhat do you say?\n\n*choice\n #\"Let's just go back to the pharmacy. It's probably clear now, I didn't see anything else.\"\n  *goto 57\n #\"Let's go look for a place to sleep, then. It's starting to get dark, and our chances of living won't be as good when it's dark.\"\n  *goto 58\n\n*label 58\n\n\"Let's go look for a new place to sleep then,\" you suggest. \"For tonight.\"\n\n\"Alright,\" Abby murmurs agreeably. \"You're taking the first guard shift though; I totally saved your butt back there.\"\n\nYou crack a smile. \"Alright, whatever,\" you say with a small laugh. Things considerably lighten as you two meander across town aimlessly, looking for a place to crash.\n\nLittle do you know, if you don't start a fire or you're not in a building at night, you're screwed.\n\nThey'll find you. They'll infect you. They'll kill you. What a bad way to find out.\n\nThey mob around you and Abby. Abby holds onto your shoulder tightly before they start to crowd in.\n\nTHE END\n*goto_scene ending\n\n*label 57\n\n\"We should go back to the pharmacy,\" you say. \"It's probably clear now, I didn't see anything else.\"\n\n\"You didn't see that Shell either,\" Abby mutters, looking slightly annoyed and slightly amused. \"Alright, whatever, let's go. We need supplies.\"\n\n\"Well, I'm sorry I didn't see the Shell,\" you reply a bit snappily, almost fiercely even, feeling somewhat offended. \"We need another way to get in.\"\n\n\"No duh,\" Abby hisses. You and Abby reach at the pharmacy again. She suddenly points at a window that's pretty high up, but is cracked open.\n\nWhat do you do?\n\nYou say:\n\n*choice\n #\"Abby, give me a boost.\"\n  *goto 45\n #\"I'll give you a boost. Find a way for me to get in once you get in there, though.\"\n  *goto 46\n\n*label 35 \n\n\n\"What are you doing?\" Abby whispers as you ready and raise your weapon.\n\n\"Saving our lives,\" you say back arrogantly, feigning confidence. You shoot. You miss.\n\n\"Crap!\" you hiss. The noise from the near-hit has let the creature know exactly where you are.\n\nSuddenly you see a flash of silver lodge in between where the creature's eyes used to be. \"Smooth going,\" Abby whispers scoldingly. She slaps the back of your head before leaning over and yanking the knife out of its head, which makes a disgusting, slimy, then a horrible crunching noise. \"You need more practice with that thing.\"\n\n\"I know,\" you reply, feeling somewhat offended. You rub the back of your head, looking scandalized. \"We need another way to get in.\"\n\n\"No duh,\" Abby hisses. She points at a window that's pretty high up, but is cracked open.\n\nWhat do you do?\n\nYou say:\n\n*choice\n #\"Abby, give me a boost.\"\n  *goto 45\n #\"I'll give you a boost. Find a way for me to get in once you get in there, though.\"\n  *goto 46\n\n*label 45\n\n\"Abby, give me a boost,\" you say. She nods and stands under the window, locking her fingers together. You step on her hands carefully and you tug open the window and pull yourself in.\n\n\"See anything?\" she calls up quietly.\n\n\"It's clear,\" you call back just as quietly. \"Can you climb a rope?\"\n\n\"Yeah,\" she calls back.\n\nYou tether the rope you found by the window to a metal beam in above the window, and then let it down. Abby climbs up to the window and you make room for her to get in. You and Abby find yourselves on top of a very tall shelf.\n\n\"Use the rope again,\" she suggests quietly. You both pull the rope in and let it down. You cover your hands with the sleeves of your shirt and slide down. Abby copies you. You find dark hoodies in a locker and toss one to Abby, pulling one on, yourself.\n\n\"We'll need them,\" you say grimly as she slips on her jacket.\n\n\"We look like a bad pop-singing duo,\" Abby says bemusedly, laughing quietly. She points to the mirror across the aisle, and you two do look like, with your dirty jeans and dirt-encrusted sneakers and your hoodies, you note. You smile at her and close the locker quietly.\n\nYou both grab bandages, pills and miscellaneous items like clothes, matches, and gum. \n\n\"How are we supposed to get out?\" you whisper.\n\n\"We can clear the debris from here,\" Abby points out. \"The door opens in after all.\"\n\n\"Alright,\" you say agreeably. Using brooms, you brush away the broken, burnt, and splintered pieces of you don't know what. It feels almost normal. You open the door and let Abby out first. It's dark now.\n\n\"Smoke,\" Abby whispers, almost in your ear. You jump, startled - she's closer than you thought she was. \"Shells can't make fire.\"\n\n\"Shells?\" you ask, confused and curious. \"What are Shells?\"\n\n\"I call them Shells,\" Abby explains. She looks at you darkly, her eyes serious. \"Because they're not people anymore. They're just shells of the people they used to be. There's nothing in there anymore. They're just... nothing.\"\n\n\"Oh,\" you say awkwardly, feeling suddenly very sobered.\n\n\"What did you call them, then?\" Abby asks interestedly.\n\n\"I didn't really call them anything,\" you admit. \"I called them undead creatures, like the ones on TV? But I dropped the 'undead' part after a while.\"\n\n\"You've never thought about it?\" Abby asks. You shift uncomfortably, thinking of your father.\n\n\"I don't like to think about it,\" you say flatly. Abby nods.\n\n\"Fair enough,\" Abby says. \"I don't think we should check out the fire. There was fire when this all started,\" Abby says suddenly.\n\n\"Then what do we do?\" you ask.\n\n\"I don't know, you decide,\" Abby says, biting her lip.\n\n*choice\n #\"Let's go raid more, then. The more supplies the better, right?\"\n  *goto 66\n #\"Let's go find a place to sleep, then. It's dark now.\"\n  *goto 58\n\n*label 46\n\n\n\"I'll give you a boost. Find a way to get me up there when you're in, though,\" you say. She nods. You stand under the window, locking your fingers together. She steps on your hands carefully and she tugs open the window and pulls herself in.\n\n\"See anything?\" you call up quietly.\n\n\"It's clear,\" Abby calls back just as quietly. \"Can you climb a rope?\"\n\n\"Yeah,\" you call back.\n\nYou hear Abby shuffling around, and then she lets down a thick, patchy rope. You climb up to the window and Abby makes room for you to get in. You and Abby find yourselves on top of a very tall shelf.\n\n\"Use the rope again,\" you suggest quietly. You both pull the rope in and let it down. You cover your hands with the sleeves of your shirt and slide down. Abby copies you. You find dark hoodies in a locker and toss one to Abby, pulling one on, yourself.\n\n\"We'll need them,\" you say grimly as she slips on her jacket.\n\n\"We look like a bad pop-singing duo,\" Abby says bemusedly, laughing quietly. She points to the mirror across the aisle, and you two do look like, with your dirty jeans and dirt-encrusted sneakers and your hoodies, you note. You smile at her and close the locker quietly.\n\nYou both grab bandages, pills and miscellaneous items like clothes and gum. \n\n\"How are we supposed to get out?\" you whisper.\n\n\"We can clear the debris from here,\" Abby points out. \"The door opens in after all.\"\n\n\"Alright,\" you say agreeably. Using brooms, you brush away the broken, burnt, and splintered pieces of you don't know what. It feels almost normal. You open the door and let Abby out first. It's dark now.\n\n\"Smoke,\" Abby whispers, almost in your ear. You jump, startled - she's closer than you thought she was. \"Shells can't make fire.\"\n\n\"Shells?\" you ask, confused and curious. \"What are Shells?\"\n\n\"I call them Shells,\" Abby explains. She looks at you darkly, her eyes serious. \"Because they're not people anymore. They're just shells of the people they used to be. There's nothing in there anymore. They're just... nothing.\"\n\n\"Oh,\" you say awkwardly, feeling suddenly very sobered. \n\n\"What did you call them, then?\" Abby asks interestedly.\n\n\"I didn't really call them anything,\" you admit. \"I called them undead creatures, like the ones on TV? But I dropped the 'undead' part after a while.\"\n\n\"You've never thought about it?\" Abby asks. You shift uncomfortably, thinking of your father.\n\n\"I don't like to think about it,\" you say flatly. Abby nods.\n\n\"Fair enough,\" Abby says. \"I don't think we should check out the fire. There was fire when this all started,\" Abby says suddenly. She sounds scared, so you just agree to comfort her.\n\n\"Then what do we do?\" you ask.\n\n\"I don't know, you decide,\" Abby says, biting her lip.\n\n*choice\n #\"Let's go raid more, then. The more supplies the better, right?\"\n  *goto 66\n #\"Let's go find a place to sleep, then. It's dark now.\"\n  *goto 58\n\n*label 66\n\n\"Let's go raid more, then,\" you tell Abby. \"The more supplies, the better, right?\" She bites her lip thoughtfully, watching the sky turn purple.\n\n\"It's starting to get late,\" she murmurs. \"I don't want to risk being out when it's dark, you know?\"\n\n\"Then what do we do?\" you ask.\n\n\"I don't know, you decide,\" Abby says, biting her lip.\n\n*choice\n #\"Let's go raid more, then. The more supplies the better, right?\"\n  *goto 67\n #\"Let's go find a place to sleep, then. It's dark now.\"\n  *goto 58\n\n*label 67\n\nYou and Abby have argued for so long that the sun has fully sunken under the horizon and the stars have begun to pop out of the velvety night sky. It even fades from its deep, dark blue to black. It is cold and breezy.\n\n\"Great,\" you mutter, \"you couldn't just scope out one building with me, could you? You just had you keep arguing - \"\n\n\"It's your fault!\" Abby hisses back, almost growling, cutting you off. \"It's dark now, and we can't see crap! There isn't even any moonlight tonight, you twat!\"\n\n\"Yeah, believe whatever you want,\" you say bitterly, almost fiercely even. \"It was so your fault for not listening.\" The tension between you two is so intense and angry that the air seems to crackle.\n\n\"Now what?\" Abby whispers angrily.\n\n\"I don't know,\" you snap.\n\n\"Stay quiet!\" Abby hisses, motioning frantically.\n\n\"No,\" you snap, letting your voice get louder. \"We're screwed anyways!\"\n\n\"Shut up!\" Abby hisses, clapping her hand over your mouth. \"Shut up, you're going to blow our cover and screw us over! Stop!\"\n\nYou make loud mumbles behind her hand. She nearly strangles you, or snaps your neck, or something, until you both freeze. A guttural whine from one of those creature things, or Shells, or whatever, comes from somewhere in the darkness.\n\nLittle do you know, if you don't start a fire or you're not in a building at night, you're screwed.\n\n\"I'm sorry,\" you say quietly when Abby finally lets go of you.\n\n\"I am, too,\" she says quietly.\n\nThey'll find you. What a bad way to find out.\n\nThey mob around you and Abby. Abby holds onto your shoulder tightly before they start to crowd in.\n\nTHE END\n*goto_scene ending\n", "50": "\"Let's go the cottage,\" you say finally. Abby glances at you, looking rather uncertain.\n\n\"Go back to the cottage?\" she asks skeptically, biting her lip. Her eyes are wide and fearful.\n\n\"What's wrong with the cottage?\" you ask, confused.\n\n\"Well, I don't trust the woods,\" she says quietly. She watches her shoes. \"When I was hunting, I saw tons of Shells.\" The word still falls oddly upon your ears. You nod. \"I nearly got discovered a couple of times. I know the cottage is near the edge, but I don't trust the woods.\"\n\n\"Well...\" you begin. You trail off, thinking hard.\n\nWhat do you say?\n\n*choice\n #\"Then we should go check out who's started this fire.\"\n  *goto 60\n #\"Let's go look for a new place to sleep then.\"\n  *goto 58\n #\"I think we should still go to the woods.\"\n  *goto 59\n\n*label 58\n\"Let's go look for a new place to sleep then,\" you suggest. \"For tonight.\"\n\n\"Alright,\" Abby murmurs agreeably. \"You're taking the first guard shift though; I totally saved your butt back there.\"\n\nYou crack a smile. \"Alright, whatever,\" you say with a small laugh. Things considerably lighten as you two meander across town aimlessly, looking for a place to crash.\n\nLittle do you know, if you don't start a fire or you're not in a building at night, you're screwed.\n\nThey'll find you. They'll infect you. They'll kill you. What a bad way to find out.\n\nThey mob around you and Abby. Abby holds onto your shoulder tightly before they start to crowd in.\n\nTHE END\n*goto_scene ending\n\n*label 60\n\n\"Then we should go check out who's started this fire,\" you say to Abby. She nods. You two silently walk to the building where the smoke is coming from.\n\nWhen you reach the building, you find a boy about your age crouches over the fire, warming his hands. He's wearing a dark leather hoodie, grey jeans, and beaten up sneakers.\n\n\"You should probably make a smaller fire next time,\" you say quietly and a bit impulsively, leaning against the frame of the door. Abby stands a bit behind you, looking at you bewilderedly, giving you a what-are-you-doing sort of look. \"The smoke could attract people you can't trust.\"\n\nSuddenly, you are staring down a barrel of a silver-grey pistol with a silencer. The boy is panting, his thin chest heaving, looking at you with wide coppery brown eyes and parted, chapped lips. His wavy dark brown hair is disheveled.\n\n\"Watch it!\" Abby snaps, pointing a knife at him, her ears red.\n\n\"Can I trust you?\" he spits out, ignoring Abby and not lowering his weapon.\n\n\"I swear on it, I'm friendly,\" you insist, putting up your hands as a submissive gesture and leaning a little away from the gun. Abby stands closer to you, almost protectively. The boy studies you for a bit longer, and then puts the gun back into the waistband of his pants. \"Don't shoot yourself like that,\" you say quietly, walking slowly towards him. Abby follows you, still looking a bit mussed. You both sit next to the fire quietly, keeping your distance from the stranger.\n\n\"The safety was never off,\" he replies back gruffly. He clears his throat, avoiding both of your gazes. Abby huffs next to you.\n\n\"Oh,\" you reply back uncomfortably. Abby huffs again.\n\n\"I'm Dan,\" the boy says quietly and briskly, as if he wasn't used to talking about himself, or maybe even talking at all. \n\n\"I'm Abby,\" Abby says back hesitantly. You nod.        \n\n\"What's your story?\" Dan asks suddenly.\n\n\"What do you mean?\" you say hesitantly, your eyebrows knitted together in confusion.\n\n\"Everyone has a story,\" he says darkly. He pokes the fire so the flames get smaller. \"Of what happened to them when ow did I misunderstand you?\" you press lightly. Dan smiles wider.\n\n\"I just wanted to make sure you didn't have, like, a death wish or something you know?\" he says lightly. His expression suddenly falls. \"The last person I found put one through his own head when a mob started coming for us. I bolted.\" He chews on his bottom lip. \"I don't want that happening again.\"\n\n\"Fair enough,\" you say softly. \"You look tired. Get rest. I'll keep watch.\"\n\n\"Wake me up so you get rest, too,\" Dan says, stifling a yawn. \n\n\"Fair enough,\" you say again. \n\n\"Um, good night,\" you say uncomfortably.\n\n\"Sweet dreams,\" Dan mutters quietly in reply.\n\nDan slowly falls asleep, snoring quietly. The fire dies out. The night is quiet - not even crickets. But you can see the stars. Halfway through the night, when the sky is no longer velvety blue but pitch black, you wake Dan up, and almost immediately fall asleep yourself. You wake up, and Dan is avidly watching something out the window.\n\n\"What's on the agenda today?\" you say jokingly. Dan doesn't respond.\n\nYou walk up to him. His skin is very cold. Then you notice a bullet hole under his chin. His dark brown hair had hidden the exit hole. You swallow, take his supplies and his pistol, and gently shut his eyes. \n\n\"Hypocrite,\" you say fondly. A deep pang of sadness resonates in your gut. Is everyone you try to stay with going to die?\n\nA click of a safety coming off a gun sounds from behind you. What do you do?\n\n*choice\n #Raise your hands as an attempt to show friendliness.\n  *goto 80\n #Nothing. Let whoever it is kill you. It'd be a favor to you.\n  *goto 81\n #Turn around to check who it is.\n  *goto 82\n #Try to stealthily attack your attacker.\n  *goto 83\n\n*label 80\n\nYou raise your hands as an attempt to show friendliness. \"I'm friendly,\" you call back.\n\n\"Too bad,\" you hear a gruff male voice call back. \n\n\"If you want my supplies, just take them! Leave me and just take them and go!\" you say, panicking.\n\n\"You'd just come after me,\" the gruff voice says.\n\nBANG.\n\nYou feel a bullet go through your spine. You blurrily see a man grabbing your and Dan's packs and weapons, and vaguely feel your warm blood seep through your clothes.\n\nTHE END\n*goto_scene ending\n\n*label 83\n\nYou decide to try to stealthily attack your attacker. You want to live, after all. And this guy probably isn't going to let you live.\n\nYou blindly throw back one of Abby's knives. You hear him hiss in pain. Maybe you hit him! Even though it didn't seem like a death rattle, it sounded like at his a yelp of disability. (Or whatever.) You start to turn around -\n\n\"Your aim really sucks, kid,\" you hear a gruff male voice call back. You feel a bullet go through your spine. You blurrily see a man grabbing your and Dan's packs and weapons, and vaguely feel your warm blood seep through your clothes.\n\nTHE END\n*goto_scene ending\n\n*label 81\n\nYou do nothing. Let whoever it is kill you, you think bitterly, almost fiercely even. It'd be a favor to you.\n\nYou wait and wait for a bullet to go through the back of your skull, but nothing happens. You realize you are crying. You slowly turn around to find that the man has put the gun back into his shoulder holster and is simply watching you, confusedly and bewilderedly. His beetle-like eyes are squinty, and almost completely widen in shock when you simply start screaming. To be honest, it feels good to get all this pent-up angry and sad energy out of your system.\n\n\"What are you doing?\" you ask. You throw the packs at him with all of your strength (which isn't much). \"Take them!\" you yell, nearly screaming. They bounce his chest and onto the floor by his feet. You kick all your weapons at him. \"I'm unarmed! Just kill me already!\"\n\nHe just pityingly watches you. You are sobbing now. You see Dan's pistol, still lying there. What do you do?\n\n*choice\n #Throw that at him too. \n  *goto 94\n #Shoot yourself.\n  *goto 95\n #Nothing. Just keep having your tantrum. \n  *goto 96\n\n*label 95\n\nHe just pityingly watches you. You are sobbing now. You see Dan's pistol, still lying there. You decide to shoot yourself, because everyone you know dies anyways. \n\n\"Kid, what are you doing?\" the man asks gruffly, his squinty eyes widening. He actually seems kind of shocked.\n\nYou fumble with the safety, and your finger trembles on the trigger.\n\n\"Don't - !\" he begins, sounding panicked.\n\nBANG.\n\nEverything goes black.\n\nTHE END\n*goto_scene ending\n\n*label 96\n\nHe just pityingly watches you. You are sobbing now. You see Dan's pistol, still lying there. You just ignore it - you're too depressed to care about it. You just keep having your tantrum. You're even stomping your feet and shaking your fists at the sky in everything.\n\n\"Does everyone I even remotely care about die?\" you scream. \"First my parents, then Abby, and now this guy called Dan Dan, and I haven't even known him a full 24 hours! And now you will, too! Because you know who I am!\"\n\n\"Kid, shut up,\" he says gruffly, crossing his arms.\n\n\"Don't tell me to do anything, sir!\" you shout back, your voice very hoarse.\n\nHe claps a dusty hand over your mouth. \"Just.... Shhhhhh,\" he whispers desperately, and you finally stop, and get quiet. \"Thank goodness,\" he mutters, letting go of your face. \"You really know how to throw a fit, kid.\" He tosses you two packs, shoves the weapons in the emptiest one, and shoulders that one. He nods at Dan's body.\n\n\"Was he your friend?\" he asks gruffly. You laugh nervously.\n\n\"Not really,\" you reply. \"We had only met the night before.\"\n\n\"Right,\" he says. \"You, er, screamed that.\"\n\n\"Sorry,\" you mumble sheepishly.\n\nHe watches you clutch the packs he tossed at you, and then starts heading outside. He leans back in the entrance and looks back at you.\n\n\"Are you coming or what?\" he asks, still gruffly. \n\nWhat do you do?\n\n*choice\n #Go with him.\n  *goto 112\n #Decline his offer politely.\n  *goto 113\n\n*label 112\n\"Are you coming or what?\" he asks, still gruffly. \n\n\"Uh, sure,\" you say uncertainly, standing up and jogging to his side.\n\n\"This is temporary,\" he says. \"I just have to drop you off at the quarantine zone and you'll be out of my hair.\"\n\n\"Right. Thanks,\" you say quietly.\n\n\"I'm Joe,\" he says gruffly.\n\nWhen he drops you off at the quarantine border, you turn to him, hope in your eyes.\n\n\"Are you sure I can't stick around you, Joe?\" you ask timidly. \"I - you haven't died yet.\"\n\n\"No,\" he says firmly. Then he walks away.\n\nYou wait until he's out of your sight before you run away.\n\nYou go back to the cottage. You feel bad about Abby, and you think about Dan a lot. In your dreams, Dan and Abby nod simultaneously, looking like ridiculous, oversized bobble heads, in some kind of awkward acknowledgement. But you need to move on. So you do.\n*page_break\n\nTwo years later, and it is now winter, and it's cold and snowing. The stream is frozen over. The markets and stores are all raided empty, except for rotting produce that soon will turn to dirt. Wasted. Like the rest of world. You miss the warmth of blankets and hot showers and hot food more than ever.\n\nYou haven't been living the best life. You aren't proud of everything you've done. But you needed to live.\n\nIt suddenly dawns on you, crashes on you all at once.\n\nUntil now you haven't realized. But you suddenly realize that there is nothing to live for. Not for you. You have nothing to live for. What are you living for? You don't have anyone to take care of, or anyone to take care of you. You - don't - have - anything.\n\nYou finally realize what an empty life you've been living. You're a savage. All this knowledge crashes on you at once. You don't want to be this. It's a miracle you've lived like this for this long without even thinking about it.\n\nYou hold one of Abby's knives to your arm, and cut neatly. It's sharp, although there is a little blood from when you stabbed someone with it to take their supplies. You finally feel regret for that person. Sorrow overwhelms you for every person you've killed. \n\nSurvival makes a person used to anything. You don't want to live like this, so lowly, so inhumanely.\n\nThe blood seeps out onto the cottage floor, hot, wet, and bright red. You got your wish after all. Something warm.\n\nYou realize there is warm wetness nearly freezing to your face - you are crying. You sink to the floor, weakening, and things fade to black.\n\nTHE END\n*goto_scene ending\n\n*label 94\n\nHe just pityingly watches you. You are sobbing now. You see Dan's pistol, still lying there. You throw that at him too. He simply stands and watches you bewilderedly. You've probably given him at least a small bruise with all the stuff you've chucked at him.\n\n\"Does everyone I even remotely care about die?\" you scream. \"First my parents, then Abby, and now this guy called Dan, and I haven't even known him a full 24 hours! And now you will, too! Because you know who I am!\"\n\n\"Kid, shut up,\" he says gruffly, crossing his arms.\n\n\"Don't tell me to do anything, sir!\" you shout back, your voice very hoarse.\n\nHe claps a dusty hand over your mouth. \"Just.... Shhhhhh,\" he whispers desperately, and you finally stop, and get quiet. \"Thank goodness,\" he mutters, letting go of your face. \"You really know how to throw a fit, kid.\" He tosses you two packs, shoves the weapons in the emptiest one, and shoulders that one. He nods at Dan's body.\n\n\"Was he your friend?\" he asks gruffly. You laugh nervously.\n\n\"Not really,\" you reply. \"We had only met the night before.\"\n\n\"Right,\" he says. \"You, er, screamed that.\"\n\n\"Sorry,\" you mumble sheepishly.\n\nHe watches you clutch the packs he tossed at you, and then starts heading outside. He leans back in the entrance and looks back at you.\n\n\"Are you coming or what?\" he asks, still gruffly. \n\nWhat do you do?\n\n*choice\n #Go with him.\n  *goto 112\n #Decline his offer politely.\n  *goto 113\n\n*label 82\n\nYou turn around to check who it is. \n\nA man is aiming a gun at you. You kind of figured when you heard the safety go off.\n\n\"Are you going to kill me?\" you ask bluntly and flatly. Obviously he is. But you can't quite bring yourself to care. He doesn't respond, but he grips the gun more tightly. You spread your arms, as if to say \"ta-da\". \"Knock yourself out. Shoot me. Make it quick, though, please.\"\n\nHe hesitates, then snaps the safety back on and then slides it back into his shoulder holster. \n\n\"Was he your friend?\" he asks gruffly. You laugh nervously.\n\n\"Not really,\" you reply. \"We had only met the night before.\"\n\nHe watches you, then starts heading outside. He looks back at you.\n\n\"Are you coming or what?\" he asks, still gruffly. \n\nWhat do you do?\n\n*choice\n #Go with him.\n  *goto 112\n #Decline his offer politely.\n  *goto 113 \n\n*label 113\n\n\"Are you coming or what?\" he asks, still gruffly.\n\n\"Um, no thanks. But thanks, sir,\" you mumble. The man shrugs.\n\n\"Suit yourself,\" he says curtly, almost in a way of a goodbye.\n\nNow you're alone. All alone.\n\nWhat do you do?\n*choice\n #Go back to the cottage.\n  *goto 114 \n #Commit suicide.\n  *goto 115\n #Do nothing.\n  *goto 116\n\n*label 114\n\nYou go back to the cottage. You feel bad about Abby and Dan, and you think about them a lot. Sometimes about the man, too. But you need to move on. So you do.\n*page_break\nTwo years later, and it is now winter, and it's cold and snowing. The stream is frozen over. The markets and stores are all raided empty, except for rotting produce that soon will turn to dirt. Wasted. Like the rest of world. You miss the warmth of blankets and hot showers and hot food more than ever.\n\nYou haven't been living the best life. You aren't proud of everything you've done. But you needed to live.\n\nIt suddenly dawns on you, crashes on you all at once.\n\nUntil now you haven't realized. But you suddenly realize that there is nothing to live for. Not for you. You have nothing to live for. What are you living for? You don't have anyone to take care of, or anyone to take care of you. You - don't - have - anything.\n\nYou finally realize what an empty life you've been living. You're a savage. All this knowledge crashes on you at once. You don't want to be this. It's a miracle you've lived like this for this long without even thinking about it.\n\nYou hold one of Abby's knives - or maybe it was a knife you stole off of a man you had killed the other day - to your arm, and cut neatly. It's sharp, although there is a little blood from when you stabbed someone with it to take their supplies. You finally feel regret for that person. Sorrow overwhelms you for every person you've killed. \n\nSurvival makes a person used to anything. You don't want to live like this, so lowly, so inhumanely.\n\nThe blood seeps out onto the cottage floor, hot, wet, and bright red. You got your wish after all. Something warm.\n\nYou realize there is warm wetness nearly freezing to your face - you are crying. You sink to the floor, weakening, and things fade to black.\n\nTHE END\n*goto_scene ending\n\n*label 115\n\nYou decide to commit suicide.\n\nYou fumble with the safety, and your finger trembles on the trigger.\n\n\"Don't - !\" the voice in your head begins, sounding panicked. It sounds like a mix between your parents and Abby and Dan.\n\nBANG.\n\nEverything goes black.\n\nTHE END\n*goto_scene ending\n\n*label 116\n\nYou do nothing. You sit there, numb, next to Dan's corpse. You watch the sky turn purple. You feel depressed sad. It's been a few hours, and you feel vaguely like moving.\n\nWhat do you do?\n\n*choice\n #Go back to the cottage.\n  *goto 114 \n #Commit suicide.\n  *goto 115\n #Do nothing.\n  *goto 118\n\n*label 118\n\nYou continue to do nothing. Just sitting there, feeling lonely, mulling over your life and choices. Woe is you.\n\nYour stomach rumbles. You ignore it. You don't feel very hungry anyways.\n\nYou vaguely feel restless. Like you should do something. Maybe you should.\n\nWhat do you do?\n\n*choice\n #Go back to the cottage.\n  *goto 114 \n #Commit suicide.\n  *goto 115\n #Do nothing.\n  *goto 119\n\n*label 119\n\nYou prop your head on your hand, and your elbow on the splintery window pane. Watch out. You don't want to get a splinter. Then maybe you'll actually do something.\n\nYou mull over life some more, looking out the window, like those dramatic and sometimes pretty sappy movies. It's getting dark.\n\nYou feel pretty restless now. You should probably do something.\n\nWhat do you do?\n\n*choice\n #Go back to the cottage.\n  *goto 114 \n #Commit suicide.\n  *goto 115\n #Do nothing.\n  *goto 120\n\n*label 120\n\nIt's been a few hours. It's really dark now. You have no idea what you're even staring at anymore. The sunset was nice. But that was like two hours ago.\n\nYou mull over life some more.\n\nSo. Now what are you doing to do?\n\n*choice\n #Go back to the cottage.\n  *goto 114 \n #Commit suicide.\n  *goto 115\n #Do nothing.\n  *goto 121\n\n*label 121\n\nYou find this really funny, don't you? Could you please do something?\n\n*choice\n #Go back to the cottage.\n  *goto 114 \n #Commit suicide.\n  *goto 115\n #Do nothing.\n  *goto_scene 122\n\n\n\n", "99": "\"Are we going to use the car or not?\" Dan demands.\n\nYou decide to use the car. You'd rather risk getting in a crash for a better transportation method than have to walk everywhere and get mobbed all the time. Good choice.\n\n\"Yeah, sure, why not?\" you say, opening the door. Dan grins and grabs the keys.\n\n\"Put on your seat belt,\" he says cheerily. You raise your eyebrows but strap yourself in anyways. \n\nDan starts the car, looking a little too excited for your liking.\n\n\"I have a theory,\" you say.\n\n\"Hmmmm?\" Dan asks. He accidentally presses the gas before releasing the emergency brake, making the car jolt violently. \"Sorry, sorry,\" Dan mutters, fumbling with the break.\n\n\"About how this all started?\" you continue. Dan hums distractedly. \"I think that fire released something, that made everyone just go bonkers. Like anthrax. Because it's a powder? But instead of killing you, it drives you insane. Then takes over.\"\n\n\"Huh,\" Dan says darkly. \"That's interesting.\"\n\n\"Yeah,\" you say absently, watching destruction and debris blur past your smudged window. \"You know, you're not bad at driving.\"\n\nDan grins, and then makes a sharp turn, slamming you into the car door.\n\n\"Um, I take that back,\" you mutter angrily, peeling your sweaty self off of the plastic door.\n\n\"Sorry,\" Dan mutters again sheepishly.\n\nA silence falls over the three of you.\n\n\"Do you think, if it weren't for all this, we would talk at all?\" Dan asks. He immediately looks like he wants to take it all back.\n\n\"What do you mean by 'all this'?\" you ask.\n\n\"The end of the world,\" Dan says. \"The apocalypse. Whatever.\"\n\nHow do you respond?\n\n*choice\n #\"Yeah, sure, I guess, if I ever bumped into you in the halls at school.\"\n  *goto_scene 101\n #\"Probably not. We were friends with some pretty different people, don't you think?\"\n  *goto_scene 102\n", "title": "*image art.jpg", "bow": "Outside, the flames reach your house. The air in your house already seems denser, heavier, and much hotter, even for summer. The panic sets in still deeper as you scramble down the stairs. The power is out, and you can't see anything in the dark. You still frantically try to flick on light switches, searching for a sign of normalcy. Smoke begins to fill your house. You cough violently - your labored, panicked breathing does not do well with the smoke. You also hear coughing sobs downstairs. The flames engulf your room.\n\n\"Where are you?\" you scream to your parents. \"The house is on fire!\"\n\nYou sprint and stumble downstairs to find your mother sobbing over your father's dead body. There are bite marks all over his neck, and you swallow the lump that has formed in your throat. You don't know how your father died but you have a good idea. Is someone - or something - else in the house? You have to act fast. You realize that there is some kind of infection that is turning people into infected creatures, like the undead on TV. So that's what you immediately tag the creatures, in your head, for now - even though you know it's inaccurate, you need a label for whatever is happening. Your mother sobs on your father's chest pathetically, her face red and contorted with grief and sorrow, and you are immediately faced with a conflict. Your mother will be slow and an obstacle in your hope of survival, but she is your mother.\n\nDo you leave her or try to convince her to go with you?\n\n*choice\n #Leave her\n  *goto creature1bow\n #Try to convince her to escape with you\n  *goto momcreature1bow   \n\n*label creature1bow\n                 \nYou leave your mourning and grieving mother with your father. You feel a pang of regret as you burst through the weathered door of your home; however, it is the end of the world and you know that it is now every man for himself. It was a choice you had to make - or at least that's what you try to convince yourself. You turn around and watch the fire cave in half of the roof, and you know your mother has now also died. You are shocked to suddenly realize that you are now an orphan. \n\nAn undead creature crawls out of the fire and grabs your leg, catching you off-guard. You:\n\n*choice\n  #Shoot it.\n   *goto creature1bowshoot\t\n  #Try to make a run for it.\n    *goto creature1bownoshoot\n\t  \n*label creature1bowshoot\n\nYou grapple with your bow and your quiver of arrows as you're trying to shake off the damned creature. It has a vice-like grip around your ankle, despite its greyed, flaky, wasted arms and hands. You can see yellowed bone poking out of its withered fingers. \n\n\"Get off,\" you say feebly to the creature as you're trying to notch an arrow into the bow. You weren't expecting it to get off of you simply because you said so - you are still just simply trying to find normalcy in your sudden, insane life.\n\nYou shakily shoot an arrow into its neck - you definitely need a lot more practice with your weapon, but the shot is enough to distract it from you. You stumble away at the sight of more of the undead crawling out of the fire, still feeling rather shaky, and run into the night, away from the fire.\n\nAfter some time of walking and running, you come into some woods. You recognize them as the woods you played in when you were younger. . You realize you must have somehow subconsciously been heading here, as it is a long way away from your house. Maybe you came here in hope of a feeling of security, none of which you receive. However, a structure to your left that you don't quite remember from your earlier days catches your eye. There is a weathered cottage there. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n*label creature1bownoshoot\n\n\nThe undead creature attempts to bite you and tear your flesh off of your leg. After a long, miserable session of struggle, you finally shake it off. You groan at your own stupidity when you realize you could have simply used your weapon! It would have been much easier had you just done so. It was clear that trying to run with a creature attached to your leg would not have worked. Your unnecessary struggles have resulted in you losing most of your supplies in the fire.\n\nYou escape into the night, away from the fire.\n\nAfter some time of walking and running, you come into some woods. You recognize them as the woods you played in when you were younger. You realize you must have somehow subconsciously been heading here, as it is a long way away from your house. Maybe you came here in hope of a feeling of security, none of which you receive.  However, a structure to your left that you don't quite remember from your earlier days catches your eye. There is a weathered cottage there. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n*label momcreature1bow\n\nAfter your insistent, harsh whispers and pleas, your mother runs alongside you outside, stumbling and sobbing. You don't know where exactly you are headed yet, but you know you need to get away from the fire. You murmur to her to keep up with you and to keep quiet, but you doubt she can hear you over the general chaos and her own loud cries. You feel a pang of regret for bringing her along - you know that she will definitely slow you down - but you couldn't have left your mother there, to certain death! Together you both turn around and watch the fire cave in half the house. Your mother sobs even harder when the house begins to collapse. You look at her, unsure how to comfort her - a concept like sensitivity has already begun to seem foreign to you. \n\nAttracted by the noise your mother is making, an undead creature crawls out of the fire and grabs your mother. She immediately screams and begs for you to help her. Her screams are attracting still more of the creatures, and she isn't responding to your frantic gestures for her to be quiet. You: \n\n*choice\n  #Free your mother from the undead creature, possibly injuring her or yourself.\n    *goto momcreature1bowpull\n  #Try to shoot it.\n    *goto momcreature1bowshoot\n  #Just leave her and run\n    *goto momcreature1bowleave\n\n*label momcreature1bowpull\n\nAfter a moment of debate, you decide to help your mother. You try to pull the creature off of your mother. You, at first, shudder at the thought of touching the withered, burnt skin of the creature - the hesitation of those two seconds causes your mother's demise. The undead creature bites your mother. After a long session of struggle, you finally shake it off of her, but it's now too late. Your mother seems dead on the dirt, but you know she will turn into one of those horrific undead creatures, too. Out of an odd, unusual mix of a sort of respect and mercy, you shoot her in the head to prevent her from turning into one of those creatures. Out of respect, you close her glazed-over eyes. You are depressed with the loss of your mother, and you wipe away a few of your hot tears in her memory. You are shocked to suddenly find yourself an orphan.\n\nYour struggles have resulted in you losing half of your supplies in the fire.\n\nYou escape into the night, away from the fire.\n\nAfter some time of walking and running, you come into some woods. You recognize them as the woods you played in when you were younger.  You realize you must have somehow subconsciously been heading here, as it is a long way away from your house. Maybe you came here in hope of a feeling of security, none of which you receive.  However, a structure to your left that you don't quite remember from your earlier days catches your eye. There is a weathered cottage there. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n    \n*label momcreature1bowshoot\n\nAfter a moment of hesitant debate, you decide to try to help your mother. You try to shoot the creature off of her. You are panicking, causing your hands to be very shaky. However, there is no time to get calm - your mother is being attacked! You take as best of an aim as you can, and you shoot. You have successfully shot the undead creature through the head, but you have also accidentally shot your mother. You put pressure on her stomach wound, telling her it will be okay. She can tell that you are lying. She is still crying as she dies. After she dies, you close her eyes out of respect. You are depressed with the loss of your mother, and you wipe away a few of your tears in her memory. You are shocked to suddenly find yourself an orphan.\n\nYou suddenly have realized you have killed your own mother. The thought makes you sick, and you vomit next to your mother's cooling corpse.\n\nYou stand up and leave into the night, away from the fire and chaos.\n\nAfter some time of walking and running, you come into some woods. You recognize them as the woods you played in when you were younger. You realize you must have somehow subconsciously been heading here, as it is a long way away from your house. Maybe you came here in hope of a feeling of security, none of which you receive. However, a structure to your left that you don't quite remember from your earlier days catches your eye. There is a weathered cottage there. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n*label momcreature1bowleave\n\nYou leave your mother. You can hear her more of her screams and her desperate, useless pleas as she struggles with the undead creature, but you don't turn around. Suddenly, her noises are drowned out by the roar of the fire, and then silence. You feel a pang of guilt and shame as you run into the night, to the woods you used to play in when you were younger; however, it's the end of the world and you know that it is now every man for himself. Your mother would have slowed you down anyways. You feel grim with the new, strange knowledge and coldness that you weren't aware you had before.\n\nAfter some time of walking and running, you come into the woods you were heading to. Maybe you came here in hope of a feeling of security, none of which you receive. A strange structure catches your eye. There is a cottage there that you don't recognize. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n*label death1\n\nThe girl suddenly turns around to see you aiming your weapon at her face.\n\nDetermination on her already dirt-caked face, she swiftly reaches behind her shoulder, and the next thing you see is a flash of silver. Suddenly, a throwing knife is in your chest. She is much faster than you had thought.\n\nShe leans over and tugs the knife out, making you bleed even faster. She looks at you pityingly for a moment, and then is distracted by your supplies.\n\nYour life flashes before your eyes. The last thing you see is the girl reaching for your pack and taking your weapon as you bleed out on the dirt floor.\n\nTHE END\n*goto_scene ending\n\n\n\n\n\n \n", "choicescript_description": "What if you had to survive in a zombie apocalypse? In this riveting interactive novel, you make the story. Save your parents? Or let them die… Alliances or murder? Its your choice, choose carefully or it’ll be your last.\n\n[i]Burn(t)[/i] is a 70,000-word interactive novel by Vivi Tran. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  ADVERTISING\n  \n  Remove advertisements.\n  \n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*label purchased_list\n\n*if choice_purchased_adfree\n  ADVERTISING\n  \n  You've paid to remove advertisements.\n", "death5": "Abby bites her lip thoughtfully. \"Thank you for sparing my feelings,\" she says, not looking or sounding sorry at all, \"but I know you don't trust me.\" She looks disappointed. \n\"I just didn't see a point in sticking together,\" you say flatly, and she nods, looking like a ridiculous, oversized bobble head.\n\"Then I don't see a point in you living,\" Abby says quietly. She whips out a knife and stabs you in the chest faster than you can say \"I'm sorry\". \nYou yelp in pain and immediately press a hand against your wound. It doesn't really stop the blood, and you can feel dirt rubbing into it. Abby gives you a cold look as she cleans her blade on your bit of dirty, ragged shirt she ripped off when you fell.\nYour life flashes past your eyes. The last thing you see is Abby grabbing your pack and your weapon before running from some creatures that noticed the commotion between you and Abby.\nTHE END\n*goto_scene ending\n", "death6": "You run into Abby at the cottage. Abby and you get into a loud, angry argument. It attracts the creatures.\nShe leaves you for dead and takes off. Three of the creatures mob around her and she falls. You distantly see blood. She gets up and keeps running. A bigger mob crashes through the windows and flood through the little entrance of the cottage, and you are cornered and already pretty much dead.\nYour life flashes before your eyes. The last thing you see is Abby running, and your flesh being torn off of your body by a mob of the creatures.\nTHE END\n*goto_scene ending\n", "death7": "You run into Abby by the fire. Abby and you get into a loud, angry argument. It attracts the creatures.\nShe leaves you for dead and takes off.\nYour life flashes before your eyes. The last thing you see is Abby running, and your flesh being torn off of your body by a mob of the creatures.\nTHE END\n*goto_scene ending\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Burn(t).[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99", "handgun": "Outside, the flames reach your house. The air in your house already seems denser, heavier, and much hotter, even for summer. The panic sets in still deeper as you scramble down the stairs. The power is out, and you can't see anything in the dark. You still frantically try to flick on light switches, searching for a sign of normalcy. Smoke begins to fill your house. You cough violently - your labored, panicked breathing does not do well with the smoke. You also hear coughing sobs downstairs. The flames engulf your room.\n\n\"Where are you?\" you scream to your parents. \"The house is on fire!\"\n\nYou sprint and stumble downstairs to find your mother sobbing over your father's dead body. There are bite marks all over his neck, and you swallow the lump that has formed in your throat. You don't know how your father died but you have a good idea. Is someone - or something - else in the house? You have to act fast. You realize that there is some kind of infection that is turning people into infected creatures, like the undead on TV. So that's what you immediately tag the creatures, in your head, for now - even though you know it's inaccurate, you need a label for whatever is happening. Your mother sobs on your father's chest pathetically, her face red and contorted with grief and sorrow, and you are immediately faced with a conflict. Your mother will be slow and an obstacle in your hope of survival, but she is your mother.\n\nDo you leave her or try to convince her to go with you?\n\n*choice\n #Leave her.\n  *goto creature1handgun\n #Try to convince her to escape with you.\n  *goto momcreature1handgun\n\n*label creature1handgun\n\nYou leave your mourning and grieving mother with your father. You feel a pang of regret as you burst through the weathered door of your home; however, it is the end of the world and you know that it is now every man for himself. It was a choice you had to make - or at least that's what you try to convince yourself. You turn around and watch the fire cave in half of the roof, and you know your mother has now also died. You are shocked to suddenly realize that you are now an orphan. \n\nAn undead creature crawls out of the fire and grabs your leg, catching you off-guard. You:\n\n*choice\n  #Shoot it.\n   *goto creature1handgunshoot\n  #Try to run.\n   *goto creature1bownoshoot\n\n*label creature1handgunshoot\n\nYour weapon goes off with a loud bang. You lose some of your supplies in the fire when the bang of the shot makes you stumble backwards - it had much more backfire than you had thought. You manage to shoot the creature in the head. Lucky shot. However, the result of the loud noise attracts many undead creatures. There are too many for you to take on by yourself, even with your weapon, so you take off, running away from the fire and the house. \n\nAfter some time of walking and running, you come into some woods. You recognize them as the woods you played in when you were younger.  You realize you must have somehow subconsciously been heading here, as it is a long way away from your house. Maybe you came here in hope of a feeling of security, none of which you receive. However, a structure to your left that you don't quite remember from your earlier days catches your eye. There is a weathered cottage there. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n*label creature1bownoshoot\n\nThe undead creature attempts to bite you and tear your flesh off of your leg. After a long, miserable session of struggle, you finally shake it off. You groan at your own stupidity when you realize you could have simply used your weapon! It would have been much easier had you just done so. It was clear that trying to run with a creature attached to your leg would not have worked. Your unnecessary struggles have resulted in you losing most of your supplies in the fire.\n\nYou escape into the night, away from the fire.\n\nAfter some time of walking and running, you come into some woods. You recognize them as the woods you played in when you were younger. You realize you must have somehow subconsciously been heading here, as it is a long way away from your house. Maybe you came here in hope of a feeling of security, none of which you receive.  However, a structure to your left that you don't quite remember from your earlier days catches your eye. There is a weathered cottage there. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n*label momcreature1handgun\n\nAfter your insistent, harsh whispers and pleas, your mother runs alongside you outside, stumbling and sobbing. You don't know where exactly you are headed yet, but you know you need to get away from the fire. You murmur to her to keep up with you and to keep quiet, but you doubt she can hear you over the general chaos and her own loud cries. You feel a pang of regret for bringing her along - you know that she will definitely slow you down - but you couldn't have left your mother there, to certain death! Together you both turn around and watch the fire cave in half the house. Your mother sobs even harder when the house begins to collapse. You look at her, unsure how to comfort her - a concept like sensitivity has already begun to seem foreign to you. \n\nAttracted by the noise your mother is making, an undead creature crawls out of the fire and grabs your mother. She immediately screams and begs for you to help her. Her screams are attracting still more of the creatures, and she isn't responding to your frantic gestures for her to be quiet. You:\n\n*choice\n  #Free your mother from the undead creature, possibly injuring her or yourself.\n    *goto momcreature1bowpull\n  #Try to shoot it.\n    *goto momcreature1handgunshoot\n  #Just leave her and run\n    *goto momcreature1bowleave\n\n*label momcreature1bowleave\n\nAfter a moment of torn internal debate, you leave your mother. You can hear her screams and useless pleas as she struggles with the undead creature, but you don't turn around. Suddenly, it is silent except for the crackling of the fire. You feel a pang of remorse as you run into the darkness, to the woods you used to play in when you were younger; however, it's the end of the world and you know that it is now every man for himself. You feel grim with the new knowledge.\n\nAfter some time of walking and running, you come into the woods you were heading to. Maybe you decided to come here for a sense of security - none of which you receive. A strange structure catches your eye. There is a cottage there that you don't recognize. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n*label momcreature1bowpull\n\nAfter a moment of debate, you decide to help your mother. You try to pull the creature off of your mother. You, at first, shudder at the thought of touching the withered, burnt skin of the creature - the hesitation of those two seconds causes your mother's demise. The undead creature bites your mother. After a long session of struggle, you finally shake it off of her, but it's now too late. Your mother seems dead on the dirt, but you know she will turn into one of those horrific undead creatures, too. Out of an odd, unusual mix of a sort of respect and mercy, you shoot her in the head to prevent her from turning into one of those creatures. Out of respect, you close her glazed-over eyes. You are depressed with the loss of your mother, and you wipe away a few of your hot tears in her memory. You are shocked to suddenly find yourself an orphan.\n\nYour struggles have resulted in you losing half of your supplies in the fire.\n\nYou escape into the night, away from the fire.\n\nAfter some time of walking and running, you come into some woods. You recognize them as the woods you played in when you were younger.  You realize you must have somehow subconsciously been heading here, as it is a long way away from your house. Maybe you came here in hope of a feeling of security, none of which you receive.  However, a structure to your left that you don't quite remember from your earlier days catches your eye. There is a weathered cottage there. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n*label momcreature1handgunshoot\n\nAfter a moment of hesitant debate, you decide to try to help your mother. You try to shoot the creature off of her. You are panicking, causing your hands to be very shaky. However, there is no time to get calm - your mother is being attacked! You take as best of an aim as you can, and you shoot. You have successfully shot the undead creature through the head, but you have also accidentally shot your mother. You put pressure on her stomach wound, telling her it will be okay. She can tell that you are lying. She is still crying as she dies. After she dies, you close her eyes out of respect. You are depressed with the loss of your mother, and you wipe away a few of your tears in her memory. You are shocked to suddenly find yourself an orphan.\n\nYou suddenly have realized you have killed your own mother. The thought makes you sick, and you vomit next to your mother's cooling corpse.\n\nYou stand up and leave into the night, away from the fire and chaos.\n\nAfter some time of walking and running, you come into some woods. You recognize them as the woods you played in when you were younger. You realize you must have somehow subconsciously been heading here, as it is a long way away from your house. Maybe you came here in hope of a feeling of security, none of which you receive. However, a structure to your left that you don't quite remember from your earlier days catches your eye. There is a weathered cottage there. Upon coming into the cottage, you see a girl about your age raiding for supplies. You:\n\n*choice\n #Try to kill her.\n   *goto death1\n #Try to form an alliance with her.\n   *goto_scene 2\n\n\n*label death1\n\nThe girl suddenly turns around to see you aiming your weapon at her face.\n\nDetermination on her already dirt-caked face, she swiftly reaches behind her shoulder, and the next thing you see is a flash of silver. Suddenly, a throwing knife is in your chest. She is much faster than you had thought.\n\nShe leans over and tugs the knife out, making you bleed even faster. She looks at you pityingly for a moment, and then is distracted by your supplies.\n\nYour life flashes before your eyes. The last thing you see is the girl reaching for your pack and taking your weapon as you bleed out on the dirt floor.\n\nTHE END\n*goto_scene ending\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nYou only have enough space for one weapon. What available weapon do you choose?\n\n*fake_choice\n #A bow and quiver of arrows. Silent.\n #A handgun. Good for sniping, not too much backfire.\n #A shotgun. Good for close combat, major backfire.\n #You're a pacifist. You'll do without a weapon.\n\n*script changeBackgroundColor(\"black\")\n\n\"Well, I'm glad this thing started,\" Dan murmurs, poking the fire more.\n\n\"You're glad?\" Abby and you ask incredulously in unison. You and Abby exchange disbelieving looks. \n\n\"Why?\" Abby presses, leaning forward as to get a better look at Dan. Her hair dangles precariously close to the fire, but she doesn't seem to notice or care.\n\n\"For me, I mean. For you guys, it really does - well - suck. But my life before was more of a tragedy,\" he says, laughing bitterly. \"My dad beat me. My mom died. I was bullied. I wasn't doing well in school anyways, I didn't have a future,\" he murmurs. He avoids your gazes, keeping his eyes trained on the dying fire. It gives his brown eyes a dangerous, coppery look. \"I'm free, now.\" He watches Abby poke the fire more, making the flames bigger. \"They all died. I tried to save them. It didn't work out. Even though... they didn't deserve to die, no one does,\" he says bitterly, almost fiercely even, watching Abby practically jabbing her stick into the ashes now. He looks up at you two hopefully. \"Can I hang around you guys? We could be, I don't know, a team, maybe.\"\n\n\"Um,\" Abby says, looking at you. She doesn't look like she wants to decide.\n\nWhat do you say?\n\n*fake_choice\n #\"Yeah, we can use another person helping out.\"\n #\"We hope so, but no promises.\"\n #\"Three's kind of company, isn't it? We go through a lot, you might not be able to, um, keep up with us.\"\n\n*script changeBackgroundColor(\"sepia\")\n\nAbby nods. \"I get it. I still have my iPod on me.\" They share a warm look over the fire.\n\n\"I didn't have time to grab anything like that. And my house burned down anyways,\" you say stiffly, feeling very excluded. The situation suddenly gets more awkward.\n\n\"We'll have to ditch these things eventually,\" Abby says to you in a way of comfort, nudging you with her elbow. You don't feel any comfort from this. You just feel even more awkward. Dan looks at you darkly over the fire.\n\nYou offer to keep first watch. You watch them fall sleep, breathing and snoring softly, watch the fire fade to embers, watch the sky get lighter. You don't wake either of them up. You doubt you'd be able to sleep anyways. Even when they are sleeping, the feeling of awkwardness, coldness, and aloofness stays with you.\n\nThen it occurs to you. You could just leave right now. Just take your pack and go.\n\nOr you could stay. And keep feeling excluded in moments like this.\n\nWhat do you do?\n\n*fake_choice\n #Leave them. They're better off without you.\n #Stay. You shouldn't be stupid about them keeping nonfunctioning electronics in their packs and your being realistic.\n\n\"Sounds good,\" Abby murmurs, nodding in appreciation of your idea. \"It's smart. Just in case either of us gets hurt or sick, we'll have supplies to take care of ourselves.\"\n\n\"Let's go for basic stuff like bandages and aspirin and... yeah,\" you suggest awkwardly. \"It would be worse if we got sick or hurt trying to use things we had no idea how to use.\"\n\n\"Alright, good point,\" Abby says agreeably. Abby lets you walk on ahead. She follows you to the pharmacy. The destruction from the night before is evident. Though there is no more fire, many buildings are burned down, and the buildings that are still standing are blackened, soot-covered, and fire-damaged. You recognize your old house, still half-caved in. It is eerily quiet, and you don't spot any of those creatures, but you motion to Abby to keep quiet. Half-crouched, you both precariously clamor over debris silently towards the pharmacy.\n\nThe door to the pharmacy is sealed with soot and partially covered with debris. You and Abby try hard but unsuccessfully to open it, and your attempts are absolutely useless. Abby suddenly gasps quietly and points at an undead creature who hasn't seemed to notice the two of you yet, but has wandered here, attracted to the noise that you and Abby were making earlier. What do you do?\n\n*fake_choice\n #Just run. Screw the pharmacy, your lives are on the line!\n #Shoot the creature with your weapon. You really do need basic first aid, just in case.", "shotgun": "After your insistent, harsh whispers and pleas, your mother runs alongside you outside, stumbling and sobbing. You don't know where exactly you are headed yet, but you know you need to get away from the fire. You murmur to her to keep up with you and to keep quiet, but you doubt she can hear you over the general chaos and her own loud cries. You feel a pang of regret for bringing her along - you know that she will definitely slow you down - but you couldn't have left your mother there, to certain death! Together you both turn around and watch the fire cave in half the house. Your mother sobs even harder when choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  What if you had to survive in a zombie apocalypse? In this riveting interactive novel, you make the story. Save your parents? Or let them die… Alliances or murder? Its your choice, choose carefully or it’ll be your last.\n\n  *if choice_is_advertising_supported\n    [i]Burn(t)[/i] is supported by advertisements, but you can buy the unlimited version\n    to turn off ads forever.\n    \n    *purchase_discount adfree 2018-01-01 $4.99 $2.99 purchased\n    *page_break_advertisement\n\n    *goto purchased\n  *else\n    [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n    *purchase adfree $4.99 purchased\n    *page_break Play Now for Free\n\n*label purchased\n\n*image art.jpg\n\n*goto_scene 1\n", "why": "Are you sure? It's better to have something just in case; it doesn't mean you'll necessarily use it to hurt others.\n*choice\n #Yes, I'm sure\n  *goto idiot\n #No, I want to go back.\n  *goto_scene 1\n\n*label idiot\n\nOutside, the flames reach your house. The air in your house already seems denser, heavier, and much hotter, even for the summer heat. The panic sets in still deeper as you scramble down the stairs. The power is out, and you can't see anything in the dark. You still frantically try to flick on light switches, searching for a sign of normalcy. Smoke begins to fill your house. You cough violently - your labored, panicked breathing does not do well with the smoke. You also hear coughing sobs downstairs. The flames engulf your room.\n\"Where are you?\" you scream to your parents. \"The house is on fire!\" No answer.\nYou sprint and stumble downstairs to find your neighbor, stumbling through your living room. He looks horrific - his skin has a weird, grey-ish tint to it and he looks like he's flaking. There are bite marks all over his neck. You swallow the lump that has formed in your throat. You don't know how they died but you have a good idea. Is someone - or something - else in the house? You have to act fast. You realize that there is some kind of infection that is turning people into infected creatures, like the undead on TV. So that's what you immediately tag the creatures, in your head, for now - even though you know it's inaccurate, you need a label for whatever is happening. \n*page_break\nYou escape outside. Everywhere you look is bright red, vivid orange, neon yellow, electric blue, or some kind of mix. The air crackles with heat. It's like the world caught on fire.\nTears prickle in your eyes. Your parents left you to die.\nYou drop all your supplies - your weapon clatter, and you hear a guttural, disgusting whine. You don't care. You feel numb. And then you walk into the fire.\nTHE END\n*goto_scene ending\n"}};
