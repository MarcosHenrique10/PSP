<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Burn(t) — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

<script>
window.__CS_OFFLINE__ = {"game": "burnt", "title": "Burn(t)", "scenes": {"1": "Introduction\n\n\"We'd all learn something from the end of the world.\" - Anonymous\n\n\"Doesn't everyone want a zombie apocalypse to happen, just a little bit?\" - Anonymous\n\n\"I'd burn the city down just to show you the lights\" - fall out boy\n\n\"It takes one lit match to set the world on fire\" - Anonymous\n\nWelcome to the apocalypse.\n\n*page_break\nYou wake up at two AM to darkness and fire outside your bedroom window. The unbearable heat had woken you up. You walk to the window in groggy disbelief, rubbing your eyes. Among the flames are people killing people and blood and ash and -\n\nYou back away. You gulp. Instead of the usual traffic, you hear terrified screams.\n\n\"Mum? Dad?\" you call out frantically. The panic of a definite disaster begins to sink into your sleep-slowed brain. You hear a muffled cry downstairs.\n\nYou scramble in the dark and grab a school backpack. You pack it with things you think you might need - water, bags of chips, granola bars, clothes, and shoes. Essential, basic things you'll need to survive if need be. You desperately hope not, but the chances of just a normal house fire seem highly unlikely. Your dad is, conveniently for you, an accomplished huntsman, and leaves his weapons in a flamboyant display case across the hall from your room. You break open the glass with a nearby paperweight and reach in for a weapon. Unfortunately, your choice of weapons narrows considerably since you need ammo to use the weapons, and not all the ammo to all the weapons are in the display case. You only have enough space for one weapon. What available weapon do you choose?\n\n*choice\n #A bow and quiver of arrows. Silent.\n  *goto_scene bow   \n #A handgun. Good for sniping, not too much backfire.\n  *goto_scene handgun\n #A shotgun. Good for close combat, major backfire.\n  *goto_scene shotgun\n #You're a pacifist. You'll do without a weapon.\n  *goto_scene why\n", "100": "\"Are we going to use the car or not?\" Dan demands. You decide to walk instead. You'd rather risk being a bit slow for not dying in a fiery crash. Good choice.\n\n\"Nah, I don't know about that, man,\" you say, scratching the back of your head awkwardly. Dan is so disappointed you almost reconsider using the car, but you know you were being rational. \"Come on, you've only had, like, what? One lesson?\"\n\n\"I know,\" Dan mumbles miserably. \n\nYou start heading deeper into town, and Dan follows a beat later rather grudgingly. \n\n\"We'll raid today, make sure we're good on supplies,\" you say decisively. \"Then we'll scope out the town, see if there's a really good place where we can stay regularly.\"\n\n\"Most of the houses are burned down,\" Dan points out.\n\n\"I know,\" you reply back darkly.\n\nA silence falls between the two of you.\n\n\"I have a theory,\" you say.\n\n\"Well, what is it?\" Dan asks. He accidentally gets his jacket stuck on a nail sticking out of a door, and then trips over some debris while he tries to free himself from the nail. \"Sorry, sorry,\" Dan mutters, stumbling to stand up. You sigh.\n\n\"About how this all started?\" you continue. Dan hums distractedly. \"I think that fire released something, that made everyone just go bonkers. Like anthrax. Because it's a powder? But instead of killing you, it drives you insane. Then takes over.\"\n\n\"Huh,\" Dan says darkly. \"That's interesting.\"\n\n\"Mmmhmm,\" you reply absently.\n\n\"Why don't we head into this store?\" Dan asks, gesturing to a supermarket. You both duck in, and the raid goes smoothly. You and Dan breathe in relief when you push the door to the open street. It's getting dark, and the sun is almost completely set.\n\n\"We'll need a place to sleep,\" you say pointedly, glancing over at Dan. He nods towards a half-burnt but sturdy looking building that looks easy to protect. \n\n\"How about there?\" he asks. You nod.\n\nYou enter the building. You suddenly feel kind of sick, but brush it off as hunger. You and Dan eat the apples you got, since they're perishable. You missed fresh food too much to pass it up. Dan crunches into his first apple appreciatively.\n\nYou grip your stomach. You feel really weird, and it hits you out of nowhere.\n\n\"Hey, what the heck?\" Dan asks, looking bewildered. \"Are you hungry or something? We just ate, but -\"\n\n\"I feel funny,\" you choke out. Dan goes cold. \"Like, really weird. I felt kind of sick before, but, like, this -\"\n\nDan eyes you warily.\n\n\"You look kind of green,\" Dan murmurs. \"You should lay down or something,\" he says, concerned. \"I'll go look for cold medicine or something -\"\n\n\"No,\" you say weakly. \"I think...\" you trail off, thinking. How do you even tell someone this? How do you ask them to kill you for you because you're too much of a wimp to do it yourself? \"Remember my theory?\"\n\n\"Yeah?\" Dan says, sounding a little high-pitched.\n\n\"I think that's what's happening,\" you whisper, your eyes closed.\n\n\"Oh,\" Dan says, eyes wide with realization. \"Oh no,\" Dan murmurs, \"okay, we have to get out of here, and -\"\n\n\"Go without me,\" you choke out.\n\n\"No!\" Dan says, his eyes snapping open. They look so scared.\n\n\"You aren't going to be able to save me. Put one through my head and go,\" you say, your voice stronger. Then you double up in pain. You hear the safety of a gun click off.\n\n\"This is what you want, right?\" Dan asks carefully. You feel his eyes trained on you. You nod.\n\n\"Do it,\" you say.\n\n\"I'm still really sorry about this,\" Dan says softly.\n\nBANG.\n\nEverything goes black.\n\nTHE END\n*goto_scene ending\n", "101": "\"Do you think, if it weren't for all this, we would talk at all?\" Dan asks. He immediately looks like he wants to take it all back.\n\n\"What do you mean by 'all this'?\" you ask.\n\n\"The end of the world,\" Dan says. \"The apocalypse. Whatever.\"\n\n\"Yeah, sure, I guess,\" you say, \"if I ever bumped into you in the halls at school.\"\n\nDan hums a distracted sort of noise in response.\n\n\"We should just sleep in the car,\" you mumble. Dan beams.\n\n\"See? Another plus to actually using the car!\" Dan says, still smiling like an idiot.\n\n\"Quit acting like you're trying to convince me to use the car, Dan,\" you say exasperatedly. \"We're already in it, you can stop.\"\n\n\"Sorry,\" Dan whispers, not really looking sorry at all. \"I'm just still excited. It makes me feel normal. It's also why I keep my phone around, even though it's dead and all. It's useless, but... just for a sense of normalcy.\"\n\n\"I didn't have time to take anything like that,\" you say softly. \"My house was one of the first to have burnt down.\"\n\n\"Oh,\" Dan says softly, his face falling and his smile fading. An awkward silence falls over you two.\n\n\"You're taking first lookout,\" you say, climbing in the back.\n\n\"Alright, whatever,\" Dan says agreeably. He leans back in his car seat. The backseat much more comfortable than the dirt floor you slept on last night, you must admit. You settle in.\n\n\"Night,\" Dan calls back.\n\n\"Mhm,\" you respond.\n*page_break\n\nYou're awake. It is morning, but you can't be bothered to open your eyes.\n\n\"Get up, kiddo!\" \n\n\"Since when did you call me 'kiddo'?\" you groan, reaching blindly for your pack. Your hand hits a wall. That's weird.\n\n\"Kiddo, you have to get up. Stop messing about.\"\n\nYou blearily open your eyes, and your room comes into focus. Your father is standing in your doorway, arms crossed. \n\n\"Hurry up, you're going to be late.\"\n\n\"Whoa!\" you screech, snapping into a sitting position. \"What is going on?\" Your mind spins with confusion.\n\n\"What is going on is that you're going to be late if you don't hurry up!\" your father snaps back impatiently. He tosses a t-shirt and jeans at you and claps his hands. \"Hurry, hurry! I don't want to be late for work waiting on you!\"\n\n\"Oh,\" you mutter, \"it was a weird dream is all, dad. Sorry. It was like it was real.\"\n\n\"It's fine, kiddo,\" your father replies, softening. \"But hurry up!\"\n\nYou scramble out of bed and haphazardly throw on what your father left on the bed. You sling on your backpack, which feels full of books, not random survival stuff. You roll your shoulders and go to brush your teeth, and then sprint downstairs.\n\nOddly, you still feel confused. It won't go away. It feels more like memory than a dream.\n\nYou arrive at school, to find that your first class is rearranging seating. You sit behind a boy that seems familiar. He turns her head to check the clock, which is behind you, and turns back around. You notice a bruise on his neck.\n\nThen it hits you. It's Dan.\n\n\"Excuse me?\" you say softly, tapping his shoulder.\n\n\"Yes?\" he asks, confused.\n\n\"You just seem familiar... um... what's your name?\"\n\n\"I'm Dan?\" he says it like a question. You don't know what to make of this. \"Do I know you?\"\n\n\"Um... no. You don't.\" You slump back into your seat, not able to take your eyes off of the back of his head. Didn't Dan get bullied or something? You'll ask him to eat lunch with you later.\n\nWhen you dig into your backpack for your first schoolbook of the day, you find a bag of dried fruit at the bottom.\n\nTHE END\n*goto_scene ending\n", "102": "\"Do you think, if it weren't for all this, we would talk at all?\" Dan asks. He immediately looks like he wants to take it all back.\n\n\"What do you mean by 'all this'?\" you ask.\n\n\"The end of the world,\" Dan says. \"The apocalypse. Whatever.\"\n\n\"Probably not,\" you say awkwardly. \"We were friends with some pretty different people, don't you think?\"\n\nDan hums a distracted sort of noise in response. \"Fair point,\" he murmurs. The atmosphere in the car suddenly feels very awkward.\n\n\"We should just sleep in the car,\" you mumble after a few minutes. Dan smiles half-heartedly.\n\n\"See? Another plus to actually using the car!\" Dan says, still smiling awkw You quit that a while ago, too.\n\nYour parents don't know.\n\nYou parents have no idea what effect they have on you.\n\nYou sigh, and get up and brush your teeth. Your parents fall silent when you open the bathroom door. You can feel their eyes trained on your back when your walk up the stairs to your room. Feeling very tired and feeling weary and old, you go to sleep.\n\n\nYou wake up at two AM to darkness and fire outside your bedroom window. The unbearable heat had woken you up. You walk to the window in groggy disbelief, rubbing your eyes. Among the flames are people killing people and blood and ash and -\n\nYou back away. You gulp. Instead of the usual traffic, you hear terrified screams.\n\n\"Mum? Dad?\" you call out frantically. The panic of a definite disaster begins to sink into your sleep-slowed brain. You hear a muffled cry downstairs.\n\nYou scramble in the dark and grab a school backpack. You pack it with things you think you might need - water, bags of chips, granola bars, clothes, and shoes. Essential, basic things you'll need to survive if need be. You desperately hope not, but the chances of just a normal house fire seem highly unlikely. Your dad is, conveniently for you, an accomplished huntsman, and leaves his weapons in a flamboyant display case across the hall from your room. You break open the glass with a nearby paperweight and reach in for a weapon. Unfortunately, your choice of weapons narrows considerably since you need ammo to use the weapons, and not all the ammo to all the weapons are in the display case. You only have enough space for one weapon. What available weapon do you choose?\n*choice\n #A bow and quiver of arrows. Silent.\n  *goto 132\n #A handgun. Good for sniping, not too much backfire.\n  *goto 132\n #A shotgun. Good for close combat, major backfire.\n  *goto 132\n #You're a pacifist. You'll do without a weapon.\n  *goto 132\n\n*label 132\n\nOutside, the flames reach your house. The air in your house already seems denser, heavier, and much hotter, even for summer. The panic sets in still deeper as you scramble down the stairs. The power is out, and you can't see anything in the dark. You still frantically try to flick on light switches, searching for a sign of normalcy. Smoke begins to fill your house. You cough violently - your labored, panicked breathing does not do well with the smoke. You also hear coughing sobs downstairs. The flames engulf your room.\n\n\"Where are you?\" you scream to your parents. \"The house is on fire!\"\n\nYou sprint and stumble downstairs to find your neighbor, stumbling through your living room. He looks horrific - his skin has a weird, grey-ish tint to it and there are bite marks all over his neck. You swallow the lump that has formed in your throat. You don't know how your father died but you have a good idea. Is someone - or something - else in the house? You have to act fast. You realize that there is some kind of infection that is turning people into infected creatures, like the undead on TV. So that's what you immediately tag the creatures, in your head, for now - even though you know it's inaccurate, you need a label for whatever is happening. \n\nYou escape, outside. Everywhere you look is bright red, vivid orange, neon yellow, electric blue, or some kind of mix. The air crackles with heat. It's like the world caught on fire.\n\nTears prickle in your eyes. Your parents left you to die.\n\nYou drop all your supplies - your weapon clatter, and you hear a guttural, disgusting whine. You don't care. You feel numb. And then you walk into the fire.\n\nTHE END\n*goto_scene ending\n\n*label 127\n\nOh, thank goodness you aren't a complete twat. Anyways.\n\n\"I'm sorry, mum, dad,\" you say quietly. \"I shouldn't have done it. Sorry.\"\n\nYour parents look bewildered. They aren't used to you apologizing for anything.\n\n\"Um, did you just apologize?\" your mum asks, confused.\n\n\"Yeah. I did,\" you say, starting to feel sheepish.\n\n\"Alright,\" she says, sitting down. Your dad continues to stare at you like you sprouted another head or you just admitted you were an alien or something.\n\n\"Um,\" you say awkwardly, backing away. \"I'll... just go to my room...?\" \n\n\"Okay,\" your mum says faintly. She exchanges a disbelieving look with your dad. You start up the stairs, feeling your parents' eyes trained on your back the whole way up.\n\nYou collapse on your bed, feeling rather different. You fall asleep.\n\nYour dream is odd. You fall through to an alternate reality where you wake up to fire and destruction. Your parents die in this dream of yours. And you watch a girl named Abby die, and see a boy named Dan's body. He committed suicide.\n\nHow did you get to this reality? They seem like parallel worlds.\n\nYou're awake. It is morning, but you can't be bothered to open your eyes.\n\n\"Get up, kiddo!\" \n\n\"Since when did you call me 'kiddo'?\" you groan to Dan, reaching blindly for your pack. Your hand hits a wall. That's weird.\n\n\"Real funny. Honey, you have to get up. Stop messing about.\"\n\n\"Since when did you call me 'honey'?\" you mumble towards the direction of what must be Abby's voice. \"You guys are acting weird.\"\n\n\"You just keep getting funnier! You heard him, stop messing about.\"\n\nYou blearily open your eyes, and your room comes into focus. Your father is standing in your doorway, arms crossed. Your mother stands behind him, tapping her foot.\n\n\"Hurry up, you're going to be late,\" they say together.\n\n\"Whoa!\" you screech, snapping into a sitting position. \"What is going on?\" Your mind spins with confusion.\n\n\"What is going on is that you're going to be late if you don't hurry up!\" your father snaps back impatiently. Your mother tosses a t-shirt and jeans at you and claps her hands. \"Hurry, hurry! I don't want to be late for work waiting on you!\"\n\n\"Oh,\" you mutter, \"it was a weird dream is all, dad, mum. Sorry. It was like it was real.\"\n\n\"It's fine,\" your father replies, ied fruit at the bottom.\n\nTHE END\n*goto_scene ending\n\n*label 124\n\nWell, you're not a complete twat, at least.\n\nYou stay out of trouble for the entire day! Holy cow! No one thought you had it in you. All your teachers thought you were replaced by an imposter, they were so surprised. The teacher's pet actually smiled at you. You feel vaguely accomplished. Good job.\n\nWhen you head home, your dad narrows his eyes at you over the morning newspaper and your mum looks up at the ceiling when you walk in as if you aren't there, still sipping her tea.\n\n\"What'd you do today?\" your dad asks suspiciously. \"You look happy.\"\n\nWhat do you say?\n\n*choice\n #You gasp in mock offense, and then you tell him that you had a good day.\n  *goto 128\n #\"Nothing!\"\n  *goto 130\n\n*label 128\n\n\"What'd you do today?\" your dad asks suspiciously. \"You look happy.\"\n\nYou gasp in mock offense, and then you laugh. \"I just had a good day, is all,\" you say lightly, smiling. Your dad narrows his eyes so much they're practically slits.\n\n\"Oh, lordy,\" your mother mutters. \"What law did you break? I need to know whether or not we've got to hire that lawyer again.\"\n\n\"No, I was good!\" you say indignantly. Your mum and dad's eyebrows raise simultaneously. They exchange a look, and then burst out in laughter.\n\n\"Good one, son!\" your dad wheezes. You huff crossly and stomp up the stairs. You can still hear your parents laughing downstairs. \n\nYou collapse on your bed. You don't know why, but tonight you feel different. Maybe it's because you followed the rules like a normal person for once. Or maybe it's because you made your parents laugh when you're used to their sudden scowls whenever you walk into a room. \n\nYou feel lonely.\n\nYou look out the window, watching the sky turning orange, then red, then purple, then dark blue. And stars popped out of the moonless night.\n\nYour eyes droop, and you fall asleep.\n\nYour dream is odd. You fall through to an alternate r s smart? Is ruthless surviving smart? You don't know anymore.\n\nIt's getting pretty dark now. You won't fare as well in the dark.\n\n*choice\n #Go into the woods.\n  *goto_scene death6\n #Go towards the smoke.\n  *goto_scene death7\n #Do nothing and speculate about life some more.\n  *goto 146\n #You go back and look for Abby. You feel bad, after all.\n  *goto 144\n\n*label 146\n\nYou're going to die if you just keep standing there and keep not doing anything.\n\nYou stand there, speculating about your life. You mull over your choices so far. Was this smart? You don't know anymore.\n\nIt's getting dark. You won't fare as well in the dark.\n\n*choice\n #Go into the woods.\n  *goto death6\n #Go towards the smoke.\n  *goto death7\n #Do nothing and speculate about life some more.\n  *goto_scene 122\n #You go back and look for Abby. You feel bad, after all.\n  *goto 144\n", "149": "You panic. How can anyone expect you to do anything useful? Your friend is stuck outside! Something bad could happen!\n\nYou feel like you could start hyperventilating any second. Your hands feel clammy and you feel like you're going to vomit really, really soon.\n\n\"Calm down!\" Abby mouths frantically behind the glass. She waves her hands around ridiculously. It looks kind of odd. If you were in any other situation, you'd find her over exaggerated hand movements very funny, but you're too busy panicking now.\n\nA guttural whine sounds from somewhere. Your eyes widen when you glance at the creature behind Abby. She slowly turns around, and then turns back to you, her mouth open in a silent, terrified scream.\n\nAbby cups her hand to her mouth in surprise. You point behind her unnecessarily, still wide-eyed.\n\nThe noise has caught the attention of three more of the creatures - too many for her to take on, and you both know that. She is cornered against the door.\n\nYou watch, horrified, as you watch her beaten and bitten. The creatures begin to tear her apart, creating a bloody, messy, gory scene. You can smell her blood from yards away. She threw her pack aside with all the supplies and her weapons in it before the creatures mobbed around her, perhaps for you to retrieve later. Whatever her intention was, you'd be able to now regardless. You stop with the stupid kit and climb out of a window Abby couldn't have reached from outside. You inevitably fall. You don't break anything, but it knocks the wind out of you. By the time you reach where Abby is, she is a bloody mess and the creatures have left. You shoot her clean through the head to prevent her from turning. Her face remains miraculously intact. You close her glazed-over eyes, and then become sick a couple feet from what's left her body. You pick up her pack and start running.\n\nYou are almost to the woods when you turn and see smoke coming from a building half a mile away. You're pretty sure the creatures can't create fire, and it's pretty chilly tonight. Fire would be nice. But you're almost to the woods - do you just go to your cottage or head to the building with the smoke? \n\n*choice\n #Go into the woods.\n  *goto 55\n #Go towards the smoke.\n  *goto 150\n #Do nothing and speculate about life for a while.\n  *goto 151\n #You go back and try create a little funeral service for Abby. You feel bad, after all.\n  *goto 152\n #Commit suicide\n  *goto 154\n\n*label 55\n\nBetter the devil you know than the devil you don't, after all.\n\nYou shoulder the packs onto your shoulder more comfortably, and then begin trooping out to the cottage. You feel bad for Abby. But you need to move on. So you do.\n*page_break\nTwo years later, and it is now winter, and it's cold and snowing. The stream is frozen over. The markets and stores are all raided empty, except for rotting produce that soon will turn to dirt. Wasted. Like the rest of world. You miss the warmth of blankets and hot showers and hot food more than ever.\n\nYou haven't been living the best life. You aren't proud of everything you've done. But you needed to live.\n\nIt suddenly dawns on you, crashes on you all at once.\n\nUntil now you haven't realized. But you suddenly realize that there is nothing to live for. Not for you. You have nothing to live for. What are you living for? You don't have anyone to take care of, or anyone to take care of you. You - don't - have - anything.\n\nYou finally realize what an empty life you've been living. You're a savage. All this knowledge crashes on you at once. You don't want to be this. It's a miracle you've lived like this for this long without even thinking about it.\n\nYou hold one of Abby's knives to your arm, and cut neatly. It's sharp, although there is a little blood from when you stabbed someone with it to take their supplies. You finally feel regret for that person. Sorrow overwhelms you for every person you've killed. \n\nSurvival makes a person used to anything. You don't want to live like this, so lowly.\n\t\nThe blood seeps out onto the cottage floor, hot, wet, and bright red. You got your wish after all. Something warm.\n\nYou realize there is warm wetness nearly freezing to your face - you are crying. You sink to the floor, weakening, and things fade to black.\n\nTHE END\n*goto_scene ending\n\n*label 154\n\nYou're so depressed, you commit suicide.\n\nYou suddenly miss the warmth of blankets and hot showers and hot food more than ever.\n\nYou hold one of Abby's knives to your arm, and cut neatly. It's sharp, although there is a little blood from when Abby stabbed someone or something with it, probably to get out of sort situation where she needed to survive. Sorrow overwhelms you for every person you've seen that has probably died or turned into one of those creatures. \n\nSurvival can make a person used to anything. You don't want to live like that, so lowly, so inhumanely.\n\nThe blood seeps out onto the dirt floor, hot, wet, and bright red. You got your wish after all. Something warm.\n\nYou realize there is warm wetness nearly freezing to your face - you are crying. You sink to the floor, weakening, and things fade to black.\n\nTHE END\n*goto_scene ending\n\n*label 152\n\nEven though it's late, you know you can't move on without a little closure. You pick some random, pale roadside flowers nearby - they look ethereal, eerily, and angelic all at the same time, radiating in the moonlight. \n\nYou start back to where Abby's body is.\n\nIt's nighttime, now.\n\nLittle do you know, if you don't start a fire or you're not in a building at night, you're screwed.\n\nThey'll find you. They'll infect you. They'll kill you. What a bad way to find out.\n\nThey mob around you. You hold your breath and clutch the flowers to your chest before they start to crowd in. You've never felt so alone. You close your eyes.\n\nTHE END\n*goto_scene ending\n\n*label 151\n\nYou stand, watch the sky turn dusky purple, fiery orange, vivid red, and then start to turn velvety blue. It's getting late. You think about your life choices, and mull over life.\n\nIt's going to be nighttime soon. Your chances won't be very good once it's dark.\n\nWhat do you do?\n\n*choice\n #Go into the woods.\n  *goto 55\n #Go towards the smoke.\n  *goto 150\n #Do nothing and speculate about life for a while.\n  *goto 153\n #You go back and try create a little funeral service for Abby. You feel bad, after all.\n  *goto 152\n #Commit suicide\n  *goto 154\n\n*label 153\n\nHmmm. It's nighttime now. You should probably do something or else you won't like what you get.\n\n*choice\n #Go into the woods.\n  *goto 55\n #Go towards the smoke.\n  *goto 150\n #Do nothing and speculate about life for a while.\n  *goto_scene 122\n #You go back and try create a little funeral service for Abby. You feel bad, after all.\n  *goto 152\n #Commit suicide\n  *goto 154\n\n*label 150 \n\nYou decide to take a chance and head to the fire. You're better off with someone covering for you than being alone.\n\nA boy your age crouches over the fire, warming his hands. He's wearing a dark leather hoodie, grey jeans, and beat up sneakers.\n\n\"You should probably make a smaller fire next time,\" you say quietly and a bit impulsively, leaning against the frame of the door. \"The smoke could attract people you can't trust.\"\n\nSuddenly, you are staring down a barrel of a silver-grey pistol with a silencer. The boy is panting, his thin chest heaving, looking at you with wide coppery brown eyes and parted, chapped lips. His wavy hair is disheveled. \n\n\"Can I trust you?\" he spits out, not lowering his weapon. \n\n\"I swear on it, I'm friendly,\" you insist, putting up your hands as a submissive gesture and leaning a little away from the gun. The boy studies you for a bit longer, and then puts the gun back into the waistband of his pants. \"Don't shoot yourself like that,\" you say quietly, walking slowly towards him. You sit next to the fire quietly, keeping your distance.\n\n\"The safety was never off,\" he replies back gruffly. He clears his throat, avoiding your gaze.\n\n\"Oh,\" you reply back awkwardly. \n\n\"I'm Dan,\" the boy says quietly and briskly, as if he wasn't used to talking about himself, or maybe even talking at all. \"What's your story?\"\n\n\"What do you mean?\" you say hesitantly.\n\n\"Everyone has a story,\" he says darkly. He pokes the fire so the flames get smaller. \"Of what happened to them when this started.\"\n\n\"My parents died. My house burned down. And I just watched my friend get mauled by those stupid creatures,\" you say slowly. He nods. It's enough.\n\n\"I'm glad this started,\" he murmurs, poking the fire more.\n\n\"You're glad?\" you ask incredulously. \"Why?\" you press, leaning forward as to get a better look at Dan.\n\n\"For me, I mean. For you, you know, it really does - well - suck. But my life before was more of a tragedy,\" he says, laughing bitterly. \"My dad beat me. My mom died. I was bullied. I wasn't doing well in school anyways, I didn't have a future,\" he murmurs. He looks at you across the flames. \"I'm free ing his eyes sleepily and stifling a yawn.\n\n\"Good morning,\" you reply without turning from the window. Dan offers you a pack of fruit leather and you eat it. It's apricot. You hate apricot, but you suck it up anyways. Food is food.\n\n\"So, who was your friend?\" Dan asks conversationally, his mouth full. A lump forms in your throat.\n\n\"Her name was Abby,\" you say quietly. You feel tears prickle in your eyes. You immediately mentally reprimand yourself for being so pathetic.\n\n\"That's a nice name. I knew a girl called Abby, too,\" Dan replies. He suddenly looks sad and dark. \"I hope we aren't talking about the same Abby.\"\n\n\"I hope so, too,\" you say absently. You finish eating and you watching Dan finish eating his own last strip of fruit leather. \"Let's go now.\"\n\n\"Now?\" Dan asks, standing up.\n\n\"Yeah,\" you say with sudden decisiveness. You grab Dan's pack and toss it to him, and then start heading for that supermarket in town. \"I know where she is. Let's go.\"\n\nThe trip into town is quiet but not awkward, with you a little ahead almost the entire way. It gives you a sense of purpose.\n\nYou reach where Abby is. Her body has begun to rot, and she smells bad.\n\n\"Oh no,\" Dan says softly. He looks like he is about to cry. \"Oh no, that's her.\"\n\nYou bite your lip, feeling extremely sympathetic towards Dan.\n\nYou pick some random, pale roadside flowers nearby - they look ethereal, eerily, and angelic all at the same time, radiating in the sunlight. You rest them on Abby's body, and then turn away. No words are needed. Dan seems to understand. You both begin to walk away, although rather aimlessly.\n\n\"Do you call them anything?\" Dan asks suddenly, breaking the melancholy silence that you were sharing. \"Those creature things?\"\n\n\"No,\" you say honestly.\n\n\"I call them Shadows,\" Dan says in an almost whisper, as if he's letting you in on a secret.\n\n\"Shadows?\" you ask, half bemused and half curious.\n\n\"I have a good reason for calling them that,\" Dan explains. You roll your eyes. \n\n\"No duh. I kind of figured,\" you say with a laugh.\n\nHe turns to look at you darkly, his dark eyes serious. \"Because they're not people anymore. They're just shadows of the people they used to be. There's nothing in there anymore. They're just... nothing.\"\n\n\"Oh,\" you say awkwardly. You both pick up your packs and put away your weapons simultaneously. \n\n\"Well, what did you call them, then?\" Dan asks.\n\n\"I didn't really call them anything,\" you admit. \"I called them undead creatures, like the ones on TV? But I dropped the 'undead' part after a while.\"\n\n\"You've never thought about it?\" Dan asks. You shift uncomfortably, thinking of your father.\n\n\"I don't like to think about it,\" you say flatly. Dan nods.\n\n\"Fair enough,\" Dan says. \"Wait - \"\n\n\"What?\" you say. Dan points to a car behind you, with the keys conveniently left on the hood.\n\n\"I don't know how to drive,\" you say flatly, biting your lip. Dan grins.\n\n\"I do,\" he says in a matter-of-fact sort of voice. \n\n\"Do you have a license?\" you ask, your eyebrows knitting together. Dan shakes his head.\n\n\"I had a lesson,\" Dan replies sheepishly. \n\n\"Oh,\" you say, \"one lesson.\" Dan nods, looking even more sheepish.\n\n\"Are we going to use the car or not?\" Dan demands.\n\nWhat do you do?\n*choice\n #Use the car. You'll risk getting in a crash for a better transportation method.\n  *goto_scene 99\n #Walk instead. You'll risk slowness for not dying in a crash.\n  *goto_scene 100\n\n*label 156\n\n\"No,\" you say quietly. \"I want to move on.\"\n\n\"You know, closure can help,\" Dan presses, looking at you in a careful sort of way.\n\nYou hesitate, and then shake your head. \"I don't think I really need it.\"\n\n\"Alright, suit yourself,\" Dan says a little huffily.\n\n\"Um. Good night, then, I guess,\" you say.\n\n\"Night. I'll wake you up late so I can get some rest, too,\" Dan says, a lilt of a warning to his voic re we going to use the car or not?\" Dan demands.\n\nWhat do you do?\n\n*choice\n #Use the car. You'll risk getting in a crash for a better transportation method.\n  *goto_scene 99\n #Walk instead. You'll risk slowness for not dying in a crash.\n  *goto_scene 100\n", "2": "*advertisement\n\"Hey,\" you say softly to her. She whips around, her green eyes wide, alert, and maybe a little scared. You put your hands up in a show of submission and offer her a small but half-hearted smile. \"I'm friendly,\" you insist when she still looks suspiciously at you. She finally relaxes and lets go of a knife you hadn't even realized she had reached for. You notice how her face is smeared with dirt and soot and her mouth is set in a thin, grim line. It's emphasized by her miraculously clean-looking and almost floaty-appearing long black hair. You vaguely wonder if your face looks the same, although maybe not as exotic as her appearance gives off.\n\n\"What do you want?\" she says sharply, still not stopping her raid despite her conversing with you. \n\nYou don't want to scare her off. What do you say?\n\n*choice\n #\"Want to, I don't know, team up, maybe?\"\n  *goto 16\n #\"We've both been through a lot. Want to work together?\"\n  *goto 16\n\n*label 16\n\n\"Sorry, I work alone,\" she says, not really sounding sorry at all. She hesitates. Her thin, straight, long black hair floats around her head, and her green eyes glitter in the weak moonlight. \"My name is Abby.\" You nod in acknowledgement. She stands up. She clearly wasn't woken up by all the disaster, or maybe she fell asleep in her street clothes, like you did - she has on a plaid flannel-type shirt, blue jeans, and well-worn sneakers. You nod again, unnecessarily.\n\n\"Nice name,\" you reply awkwardly, scratching the back of your head. The conversational nonchalantness of the situation seems foreign to you both, already. (Or maybe it's just you.) You lean against the doorframe of the entrance, crossing your arms. \"Consider it,\" you press on insistently. She finally nods and you sigh in relief. She finally walks over to you in a brisk sort of pace.\n\n\"What supplies do you have in your pack?\" she asks quickly, in a way that almost sounds like a demand. She looks at you expectantly. You reply:\n\n*choice\n #\"Just some supplies\n  *goto 17\n #\"Here, let's split up our supplies, alright? I might have what you need and vice versa.\"\n  *goto 18\n\n*label 17\n\n\"Like, what supplies?\" Abby says suspiciously. You suddenly realize you have to build trust with this girl before you can move on to a successful and beneficial alliance.\n\n\"Some food, some water,\" you reply quickly. She nods, looking slightly more relaxed again. \n\n\"Water?\" she says interestedly. She is still looking at you expectantly. You notice her lips are chapped - she must be thirsty, you realize. \n\nYou only have two water bottles - that's not very much to go around. But you need to build the trust with this girl - what do you do?\n\n*choice\n #Give her a water bottle.\n  *goto 19\n #Mention that there is a freshwater stream nearby.\n  *goto 20\n\n*label 19\n\nYou hold out a water bottle to her, looking at her expectantly. She gingerly takes it, as if expecting you to reach out and snatch it back.\n\n\"Okay. Um. Thanks,\" Abby replies quietly, looking surprised and awkward. You smile at her uncertainly, and she offers you a small smile back. You clear your throat awkwardly. She takes a gulp of water. \"I have iodine and water bladders, but no actual water.\" She laughs nervously. You are relieved to know that she is reciprocating the same trust in you that you are trying to give to her.\n\n\"There's a stream nearby,\" you say offhandedly. She looks surprised at this knowledge.\n\n\"You know these woods?\" she asks. You nod. \n\n\"I grew up in them,\" you say in a matter-of-fact sort of tone. She nods in an awkward, silent reply. You usher her to stand up. She follows you as you lead her to the stream, which is slow-moving and flooded. Abby silently hands you a water bladder and a dropper full of what you assume must be iodine.\n\n\"I have my own set,\" Abby pipes up next to you in the darkness, holding up another water bladder and dropper. You both fill your water bladders and add a drop of iodine.\n\n\"Now we're good on water,\" Abby says unnecessarily, trying to break the tensed quiet.\n\n\"We should go rest,\" you say, stifling a yawn.\n\n\"Who's going to keep watch tonight?\" Abby asks.\n\nYou say:\n\n*choice\n #\"I will. You should get some rest, you look tired.\"\n  *goto 21\n #\"You should. Wake me up half-way through so you can get some rest too, though.\"\n  *goto 22\n\n*label 20\n\n\"There's a stream nearby,\" you say offhandedly, looking at her out of the corner of your eye. She looks surprised at this knowledge. \"I noticed you have empty water bladders... and maybe iodine in those droppers... and yeah,\" you finish awkwardly. She looks at her supplies, then back up to you. She glances at your two bottles then away. You bite your lip, annoyed that she noticed your water bottles. \"For now, here's a water bottle,\" you mumble, grudgingly handing her a bottle. She gives you a cold look as she tries to tug the bottle out of your hard grip. She finally yanks it out of your hand, stumbling back a bit.\n\n\"Thanks,\" she says uncomfortably and almost coldly, taking a sip of water. \"You know these woods?\" she asks, still sounding very cold. You wonder vaguely whether or not you've angered her. (You probably have, as she doesn't seem stupid enough to miss your reluctance to share supplies with her.) You nod, slightly uncomfortably. \n\n\"I grew up in them,\" you say in a matter-of-fact sort of tone. She nods in an awkward, silent reply. You usher her to stand up. She follows you as you lead her to the stream, which is slow-moving and flooded. Abby silently hands you a water bladder and a dropper full of what you assume must be iodine with the same hesitation you showed before. (You kind of deserve it.)\n\n\"I have my own set,\" Abby says quietly next to you in the darkness, holding up another water bladder and dropper. You both fill your water bladders and add a bit of iodine.\n\n\"Now we're good on water,\" Abby says unnecessarily. She still sounds quite cold. You can tell that she doesn't trust you too much now. Good going, you. \n\n\"We should go rest,\" you say, fumbling with the bladder. Abby reaches over and ties it shut for you, and you mumble \"thanks\" awkwardly.\n\n\"Who's going to keep watch tonight?\" Abby asks.\n\nYou say:\n\n*choice \n #\"I will. You should get some rest, you look tired.\"\n  *goto 21\n #\"You should. Wake me up half-way through so you can get some rest too, though.\"\n  *goto 25\n\n*label 21\n \nHalf way through the night, your eyes begin to droop. You are very tired, but the voice in the back of your head strongly believes you can stay up, but maybe it's just delirious. What do you do?\n\n*choice\n #Wake up Abby so she can keep watch for the rest of the night while you sleep.\n  *goto 24\n #Sleep without waking Abby - she looks tired.\n  *goto death2\t\n #Raid Abby's supplies and leave.\n  *goto death2\n #Try to stay up.\n  *goto death2\n\n*label death2\n\nYour eyes droop closed and you fall asleep. An undead creature attacks you (you can't be too surprised be this) and you get bitten. Your life flashes before your eyes. You're bleeding out heavily on the floor - if you don't turn, you'll die of blood loss. The last thing you see is a creature tearing your flesh from your arm.\nTHE END\n*goto_scene ending\n\n*label 25\n\nYou wake up to warm morning sunlight, and a startlingly empty room.\n\nAbby is gone, and so is all your supplies.\n\nYou mentally curse yourself for being so hostile to her. Maybe if you had been nicer and more trusting towards her, this wouldn't have happened! You know you were acting stupid last night, but you vaguely blame it on fatigue and shock. You roll over and sit up, stretching and yawning tiredly. You'll definitely have to go find more food and a means to defend yourself, now. You smile. Good thing you know these woods so well. Maybe you don't need Abby.\n\nThe window suddenly crashes opens, and fear floods your gut.\n\nOne of those undead creatures clamors in, seeing a sign of life - you.\n\nYou grab a broken, badly splintered table leg as a weapon. The creature grabs you, and you attempt to beat it off. Successfully, you do, but the table leg splinters into uselessness. Desperately, you grab the teapot that Abby left and beat the creature into submission. Given the situation, you would have usually found this odd scenario very funny, but your life is on the line.\n\nYou quietly open the cottage door and sneak out, tip toeing past the other undead creatures. Your silence keeps you safe.\n\nYou chew on pine as you venture deeper into the forest. It tastes disgusting, but food is food, and you don't really have many options here. And, of course, since you have the worse luck, you find Abby again. She has stupidly left her supplies out. Your supplies are left out as well. What do you do?\n\n*choice\n #Steal the supplies.\n  *goto death3\n #Confront Abby.\n  *goto death4\n\n*label death3\n\nAbby finds you stealing. She can't exactly shout at you - that would be certain instant death - so she brandishes her knife threateningly at you. Even though you don't have a means of defending yourself, you back away with the intent to keep the pack. Her eyes narrow darkly. You drop your pack immediately, but it's too late. \n\nDetermination on her already dirt-caked face, she swiftly reaches behind her shoulder, and the next thing you see is a flash of silver. Suddenly, a throwing knife is in your chest, sooner than you can start running for it. She is much faster than you had thought.\n\nShe leans over and tugs the knife out, making you fall and bleed even faster. She looks at you pityingly for a moment, and then is distracted by the supplies dly once she understands what you mean. You usher her to stand up. She follows you as you lead her to the stream, which, luckily for you, is slow-moving and flooded from last night's heavy rain. Abby silently hands you a water bladder and a dropper full of what you assume must be iodine.\n\n\"I have my own set,\" Abby pipes up next to you in the darkness, holding up another water bladder and dropper. You both fill your water bladders and add a drop of iodine.\n\n\"Now we're good on water,\" Abby says unnecessarily.\n\n\"We should go rest,\" you say.\n\n\"Who's going to keep watch tonight?\" Abby asks.\n\n*choice\n #\"I will. You should get some rest, you look tired.\"\n  *goto 21\n #\"You should. Wake me up half-way through so you can get some rest  too, though.\"\n  *goto 22\n\n*label 22\n\nHalf way through the night, Abby shakes you awake. You are confused for a moment until your memory suddenly starts working again and you remember everything properly. You are amazed Abby actually stayed versus just raiding everything and leaving. You actually aren't quite sure if you would have stayed, yourself.\n\n\"You seem tired,\" Abby whispers. \"I can try to stay up and keep guard while you sleep.\"\n\nWhat do you do?\n\n*choice \n #Wake up and keep guard.\n  *goto 21\n #Sleep on.\n  *goto death2\n\n*label 24\n\n\"Abby!\" you whisper. She only stirs. You nudge her a little harder with your foot.\n\n\"Hmmmm? Whassamatter?\" Abby mumbles, rolling over as you try to shake her awake. \"Jusaminutemum.\"\n\nYou feel a pang of guilt, even though you're not quite at fault for the end of the world. Normal is gone, for the both of you.\n\n\"Abby, I'm about to pass out. I'm so tired. Can I crash while you keep guard for a bit? If I fall asleep on watch, it's trouble for the both of us,\" you say quietly and insistently. Abby opens her eyes blearily.\n\n\"Whoa! Who are you? What are you doing here?\" she screeches, jerking away.\n\n\"It's me,\" you say plaintively. A flicker of recognition flashes in her eyes, and she sags, remembering. She looks sad. You vaguely wonder if you would have the same reaction if you were woken up this violently and suddenly in the morning.\n\n\"Oh. Right. Sorry, I forgot for a minute,\" she says quietly, scooting back to her original spot. \"Yeah, sure I will, you look awful.\"\n\n\"Thanks,\" you say sarcastically, but you smile a genuine, tired smile of gratitude at her. She smiles back, and then stifles a yawn.\n\nYou offer her a tired mumble of \"good night\" and lay down.\n*page_break\n\n\nYou wake up to the smell of cooking meat and blinding sunshine. It looks like it's nearer to noon than morning. Looking through the window, you find Abby crouched over a fire, cooking two rabbits to browned perfection. Your mouth waters at the tempting smell and your stomach rumbles embarrassingly loudly, and Abby glances up at you with an eyebrow raised, looking bemused. She hands you one and you take it with a feeble, groggy \"thank you\". You're amazed she stayed through the night and even went to get food for you. You aren't quite sure if you would have done that, yourself. Once you start eating, the only sounds are morning bird song, the crackle of the fire, and obnoxiously loud chewing.\n\n\"You can hunt?\" you mumble through a mouthful of rabbit. She nods.\n\n\"I took lessons,\" she says in a matter-of-fact sort of tone, mirroring your voice last night. You both simultaneously crack grins at the slightly reminiscent reference. Food has put you two in a very good mood.\n\n\"I know edible plants,\" you pipe up suddenly. She smiles and bites into her own rabbit. \n\n\"Well, then, if we're ever trapped in the woods, food won't be a problem,\" laughed Abby. Her statement sounds a bit pointed, for some reason you can't quite put your finger on. \"So what's on the agenda today?\"\n\nWhat will you do today?\n\nYou say:\n\n*choice \n #\"Let's get some more food from the woods.\"\n  *goto_scene 3\n #\"Let's go into town to see if there's anything we can raid.\"\n  *goto_scene 3 \n", "29": "\"Alright, fair enough,\" Abby says agreeably, \"we can't always hunt for everything, right? And everything we could possibly need is there.\"\n\n\"Let's stick to dry food, so it's not too heavy since we've got to carry things around,\" you suggest.\n\n\"Fair enough,\" Abby says again. You nod quietly, and you both gather all your supplies and leave the cottage. Abby immediately takes the lead, walking faster than you. You follow her willingly to the supermarket. The destruction from the night before is evident. Though there is no more fire, many buildings are burned down, and the buildings that are still standing are blackened, soot-covered, and fire-damaged. You recognize your old house, still half-caved in. It is eerily quiet, and you don't spot any of those creatures, but you motion to Abby to keep quiet. Half-crouched, you both precariously clamor over debris silently towards the market.\n\nThe market sliding doors are covered with debris and soot, making them hard to open. Abby and you work to force the doors open. You slide in, but the debris force the doors back closed after you. Abby is stuck outside. \n\nWhat do you do?\n\n*choice \n #Ditch her.\n  *goto 31\n #Find a way to get her in.\n  *goto 32\n #Raid without her and come back.\n  *goto 33\n #Be useless an panic.\n  *goto_scene 149\n\n*label 31\n\nAbby looks at you frantically through the soot-smeared, foggy glass. Her eyes are wide and she's shaking her head. You mouth \"I'm sorry\" and walk away, venturing further into the dark. You sloppily, but silently, search through the shelves. The market has already been raided, by the mess you see. \n\nSuddenly, you hear clattering.\n\nYou know that no one is in here. There's no other way in, you and Abby had already looked around.\n\nUnless a creature has been trapped in here.\n\nYou hurriedly swipe an entire shelf's worth of dried fruit into your pack and sprint towards the door. You nearly slam nt.\n\nIt attracts the creatures.\n\nShe leaves you for dead and takes off. Three of the creatures mob around her and she falls. \n\nYou distantly see blood. She gets up and keeps running. \n\nA bigger mob crashes through the windows and flood through the little entrance of the cottage, and you are cornered and already pretty much dead.\n\nYour life flashes before your eyes. The last thing you see is Abby running, and your flesh being torn off of your body by a mob of the creatures.\n\nTHE END\n*goto_scene ending\n\n*label death7\n\nYou run into Abby by the fire. Abby and you get into a loud, angry argument.\nIt attracts the creatures.\n\nShe leaves you for dead and takes off.\n\nYour life flashes before your eyes. The last thing you see is Abby running, and your flesh being torn off of your body by a mob of the creatures.\n\nTHE END\n*goto_scene ending\n\n*label 144\n\nYou sprint, as quietly as you can. It's getting dark - it makes it hard to see. You run into a building when you see a creature a little ways off - avoiding a mess is easier in this situation than dealing with one. You grapple with the latch for a second, and then tumble out. The creature lets out an angry, guttural growl outside. You dodge out some side door, and then trip over some debris. It catches you off guard, and you fall hard onto the sun-cracked pavement. You manage to lift yourself up on your hands and knees. It was quite a fall, and although you didn't break anything, you have the breath knocked out of you.\n\nAnd now an angry Abby approaches you. She found you rather than vice versa, which is somewhat convenient for you, if she weren't so angry. She grabs your shirt and pulls you up, her nails leaving small tears in the cotton - she is much stronger than she looks. The pale light from the moon makes her look much more intimidating than she usually looks (or maybe that's because she is on the bordering on losing her temper).\n\n\"What kind of stunt was that?\" she hisses angrily. \"I've been looking for you everywhere! I thought you died, you idiot!\" You are still out of breath, so she waits impatiently, tapping her foot, as you pant pathetically.\n\n\"There was a creature out there,\" you finally manage to get out. Abby somehow is able to look angry and worried at the same time.\n\n\"Why didn't you use your weapon?\" she demands, sounding a little less angry.\n\n\"It's easier to avoid messy situations than deal with them, thank you very much,\" you reply back angrily, feeling defensive. You pat yourself off, although the action is more out of habit than actually getting your clothes clean.\n\n\"Why'd you just leave me?\" she says angrily. \"Either one of us could have gotten killed! We have to stay a team!\"\n\n\"I...\" you begin trailing off, thinking hard.\n\nWhat do you say?\n\n*choice\n #\"I was coming back for you. I didn't want to waste time getting the door open when I could have been getting supplies for us.\"\n  *goto death5\t\n #\"I thought you worked alone.\"\n  *goto death5\n\n*label 32\n\nAbby looks at you frantically through the soot-smudged, foggy window. You nod at her, mouthing \"I'll try to get you in.\" You also make ridiculous, flamboyant hand gestures in an attempt to make sure she understands you. She sags in relief and nods to show you that she understood what you were trying to say for a few minutes of trying to comprehend your gestures and trying to read your lips. You poke around the mess and debris in the market for something to get the door open.\n\nYou find things that can either break the glass of the door open, or pry the doors open, or let you take the sliders off so you can simply take off the door.\n\nWhat do you choose?\n\n*choice\n #A crowbar that's a bit rusty to pry open the doors. You might hurt yourself using this, but it will be quiet and fast.\n  *goto 38\n #A heavy paperweight to smash the window. It will be quite loud, but you won't hurt yourself using this and it will be fast.\n  *goto 39 \n #A door picking kit that looks relatively new but you don't really know how to use. (You'd use them to dismantle the doors off of its frame.) It will take an extremely long time using this, but it's harm-free and silent.\n  *goto 40\n\n*label 38 \n\nYou put down the paperweight and the kit as quietly as you can. Abby watches you through the window, eyes wide, as you fit the crowbar into the opening of the door and pull it open, leaning all your weight away from the bar.  \n\nThe bar snaps, but Abby smartly and quickly wedges a splinted board in between the doors before it could shut. Your hands are bloody from the damaged, rusty crowbar, however, and the ends of your shirt sleeves are stained orange by the rust.\n\nA creature emerges from the darkness - apparently these things can smell, too. They can't seem to see though. \n\nAbby throws a knife at it, hitting it in the head. She runs over, pulls out the knife, which makes a disgusting, slimy, then a horrible crunching noise, and then runs back to you. She punches your arm.\n\n\"Ow!\" you yelp quietly. \"What was that for?\"\n\n\"You are a complete idiot for not checking the place out before doing stuff that would require a crap ton of time and effort, you know?\" she says scoldingly, her face set in a scowl. Her eyes soften when they pause on your damaged and bloody hands. \"Let me see your hands,\" she whispers, her own held out towards yours. You rest your hands in hers, wincing a bit.\n\nShe pours water carefully over your hands, and rips off part of a clean shirt in her pack and bandages your hands. This makes your hands a bit bulky, so it will make using your weapon a bit harder.\n\nAbby and you raid the store, finding some first aid supplies, like actual bandages, antiseptic, aspirin, and antibiotics as well. \n\nYou both duck under the board. The sun is beginning to set. Abby stops to watch it for a minute, and you wait impatiently, tapping your foot.\n\n\"Even though it's the end of the world, I'm still glad we still iple times, and are screaming in agony. You can smell death and your own blood in the air.\n\nYour life flashes before your eyes. You can still make out Abby's horrified face behind broken, dirty window, still with a hand cupped over her mouth. You feel your arm ripped off before everything goes black.\n\nTHE END\n*goto_scene ending\n\n*label 40\n\nYou put down the crowbar and the paperweight. Abby watches through the window, eyes wide. You climb up debris quietly and start working on the top hinge. You fumble with the kit for a minute until you successfully begin unscrewing the first bolt out.\n\nA half an hour passes. The sky outside is beginning to darken, and Abby looks tired. She is still watching you work.\n\nA creature stumbles by, not noticing either of you. They must be blind, you realize. Abby accidentally scrapes one of her throwing knives against the door, making a quiet but horrible metallic grating sound.\n\nAbby cups her hand to her mouth in surprise. You stop working and point behind her, wide-eyed.\n\nThe noise has caught the attention of three of the creatures - too many for her to take on, and you both know that. She is cornered against the door.\n\nYou watch, horrified, as you watch her beaten and bitten. The creatures begin to tear her apart, creating a bloody, messy, gory scene You can smell her blood from yards away. She threw her pack aside with all the supplies and her weapons in it before the creatures mobbed around her, perhaps for you to retrieve later. Whatever her intention was, you'd be able to now regardless. You stop with the stupid kit and climb out of a window Abby couldn't have reached from outside. You fall. You don't break anything, but it knocks the wind out of you. By the time you reach where Abby is, she is a bloody mess and the creatures have left. You shoot her clean through the head to prevent her from turning. Her face remains miraculously intact. You close her glazed-over eyes, and then become sick a couple feet from wha
