 sleeping soundly when suddenly...\n\n\"\u003cALERT!>\" The ship computer sounds a little alarm and a small red light begins blinking. Also, the entire console begins shaking because you left the alarm on 'vibrate'.\n\n\"Computer, what is it?\" You ask, rubbing your eyes.\n\n\"\u003cCaptain> \u003cDetecting beacon on asteroid Jebediah L26> \u003cDo you wish to investigate?>\"\n\n\"What kind of beacon? Is there a distress call or is it just a checkpoint?\" \n\n\"\u003cNature of beacon is unknown>\"\n\nFrank is wide awake. \"Do you want to check it out? It's not that far out of the way.\"\n\n*choice\n\t#\"Let's go!\" Frank says\n\t\t*set hours +5\n\n\t\t*if shipsteering = 1\n\t\t\tThe ${ship}'s stiff controls make it difficult to get close to the asteroid\n\t\t\t*if temppilot > 70\n\t\t\t\t*set temppilot %+5\n\t\t\t\t*if whopilot = \"You\"\n\t\t\t\t\tbut fortunately you have the experience to land the ${shipname} without significant damage.\n\t\t\t\t\t*goto getout\n\t\t\t\t*else\n\t\t\t\t\tbut fortunately ${whopilot} has the experience to land the ${shipname} without significant damage.\n\t\t\t\t\t*goto getout\n\t\t\t*else\n\t\t\t\t*set temppilot %+10\n\t\t\t\t*set damage +1\n\t\t\t\t*if whopilot = \"You\"\n\t\t\t\t\tand unfortunately you don't have the experience to land the ${shipname} without dinging it a little.\n\t\t\t\t\t*goto getout\n\t\t\t\t*else\n\t\t\t\t\tand unfortunately ${whopilot} doesn't have the experience to land the ${shipname} without dinging it a little.\n\t\t\t\t\t*goto getout\n\t\t*else\n\t\t\tThe ${ship}'s smooth steering make it easy to get close to the asteroid.\n\t\t\t*if temppilot > 70\n\t\t\t\t*if whopilot = \"You\"\n\t\t\t\t\tand you have the experience to land the ${shipname} without a scratch.\n\t\t\t\t\t*goto getout\n\t\t\t\t*else\n\t\t\t\t\tand ${whopilot} has the experience to land the ${shipname} without a scratch.\n\t\t\t\t\t*goto getout\n\t\t\t*else\n\t\t\t\t*set damage +1\n\t\t\t\t*set temppilot %+5\n\t\t\t\t*if whopilot = \"You\"\n\t\t\t\t\tbut unfortunately your lack of experience means you end up dinging ${shipname} a little.\n\t\t\t\t\t*goto getout\n\t\t\t\t*else\n\t\t\t\t\tbut unfortunately ${whopilot}'s lack of experience means the ${shipname} gets dinged a little.\n\t\t\t\t\t*goto getout\n\n\t\t*label getout\n\t\t\n\t\tYou, Linda, and Frank suit up and disembark.\n\n\t\tFrank complains, \"Who wore this helmet before me? It smells rank.\"\n\n\t\tIt's nice to get out of the ship, although the gravity on the asteroid is almost unnoticeable.\n\t\t\n\t\tStill, whereas on the ship there is a perpetual hum of cooling fans, power converters, and compressors. Now, in your suit, all you hear is your own breathing...\n\t\t\n\t\t\"\u003cCaptain>\" The ship computer opens a comm channel. \"\u003cSensors detect movement in immediate vicinity> \u003cBe aware of potentially hostile agents nearby>\"\n\n\t\t*page_break What the...\n\t\t\n\t\tYou look near the rim of a small crater but it's difficult to see with the Sun as bright as it is. You dim your visor and your eyes adjust. Soon you notice piles of dull metal.\n\t\t\n\t\tAs you slowly jump toward the crater, the piles reveal themselves to be masses of robots. You conclude that you're looking at the aftermath of a conflict between two factions of robotic miners.\n\t\t\n\t\tYou bend down to get a closer look...\n\t\t\n\t\t\"Holy Carp!\" Something's firing at you! You fall to the side and look out. One of robotic miners is missing half its body but is evidently still functional enough to fire its blaster.\n\t\t\n\t\tYou realize that the blaster is an electromagnetic pulse emitter, not a gun with bullets. The EMPs won't hurt you although they could damage the breathing and communications controls in your space suit. You need to disable the robot.\n\n\t\tYou reach down and grab a downed robot to throw. You pick it up easily but in the near-absence of gravity it's like throwing a helium-filled balloon.\n\n\t\t*page_break Need something else...\n\n\t\tYou look around and find what looks like another EMP emitter. You fiddle with the knobs on the side and fire it at the robot sniper. You're not a great shot but you squeeze the trigger a few times and something must be happening because the robot stops firing.\n\n\t\tFrank inspects the robots. \"They seem to be of two distinct models.... this half belongs to the Jones Group and the other half to Atlas Consolidated.\"\n\n\t\tLinda is at the beacon. \"The beacon itself looks like a standard milestone checkpoint, but modified. I don't see any evidence of human activity on this rock, and I can't see why anyone would have modified it.\"\n\n\t\tYou look around for anything worth scavenging but find nothing. You still have the EMP emitter in your hand.\n\n\t\t*choice\n\t\t\t#\"Do you want to keep it?\" Frank asks. \"It could come in handy.\"\n\t\t\t\t*set havegun 1\n\t\t\t\t\n\t\t\t\tYou head back to the ship and take off.\n\t\t\t\t\n\t\t\t\t*goto beacon\n\t\t\t#\"But you don't know whether it's in full proper working condition.\" Linda says over the comm link, \"and a malfunctioning EMP emitter is the last thing you want on board.\"\n\t\t\t\t*set havegun 0\n\n\t\t\t\tYou head back to the ship and take off.\n\n\t\t\t\t*goto beacon\n\t#\"No, let's keep going.\" Linda advises\n\t\t*goto beacon\n\n*label beacon\n\nBack on board, you take off and look out at the millions of rocks floating in front of you.\n\nLinda makes herself comfortable, \"All the major asteroids (as well as the dwarf planet Ceres) are charted and their orbital paths are in the computer's memory, so collision with any of them shouldn't happen.\"\n\n\"But in the movies they're dodging asteroids like the barrels in Donkey Kong,\" Frank adds.\n\nLinda explains, \"A particularly irritating and unfortunately common mistake: The asteroid belt isnt tough to navigate, seeing as the closes ones are millions of miles away...\"\n\nFrank protests, \"But there are trillions of other things floating around out here: asteroids too small to chart, debris from asteroid collisions or comet tails, and even discarded components from ships.\"\n\nLinda crosses her arms. \"Radar should detect almost all of these, and the ship's computer should compensate to avoid collisions. Although I suppose every now and then...\"\n\n*finish Look out!\n", "traveltomoon": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n\nCHAPTER II - THE MOON\n\n---\n\nBut first the Moon...\n\nYou hang up after getting some more details from Jarvis and he sends you two documents: Specs with exact coordinates and details about the asteroid (orbital speed, angle of rotation, etc.) and a manual for the computer you need to reboot, a Diogenes 6.\n\nJarvis also advances you $400 for travel and other expenses.\n*set money +400\n\nYou wake Linda and explain the situation to her and Frank.\n\n*page_break \"It will be a few days before we can get to Zebulon and we need to figure out what to do next.\"\n\n\"Firstly, we need to unload our cargo of 'gently used' pharmaceuticals at the port at Pisces Station.\n\nSecondly, we may want to get another ship. Our current ride, the \"Kelstar\", is a Pengo-class and would take around 5 days (~120 hours) to reach Zebulon.\nA faster ship could get there in perhaps 3 (~75 hours). A ship with better handling would make navigating the asteroid field easier.\nAnd a ship with a stronger hull would better withstand any collisions with asteroids.\"\n\n\"On the other hand,\" Linda interrupts, \"the Kelstar is paid for while a better ship would be more expensive.\"\n\nYou shrug noncommittally and continue. \"And thirdly, for a mission like this we may want to hire another crew member. Navigating through the asteroid belt will be easier with another set of eyes and hands.\"\n\nFrank and Linda look at each other when you say this.\n\n*page_break \"So, first things first\"\n\n\"We can burn through the rest of our fuel and get to the Moon by the end of the day, or keep drifting and get there sometime tomorrow.\nIf we drift, we'll still have half a tank of fuel which will increase the trade-in value of the Pengo.\"\n\n*choice\n\t#\"Pedal to the metal!\" Frank gleefully advises. \"No time to waste!\"\n\t\t*set hours +5\n\t\t*set reputation %+ 5\n\t\t*set fuel 0\n\t\t*set hoursfree 1\n\t\t*set franksmood %+ 5\n\t\t*set lindasmood %- 5\n\t\t\n\t\t\"That's the spirit!\" You smile at Frank while Linda rolls her eyes.\n\n\t\t\"We should get to Pisces Station in time for dinner...\" you explain.\n\t\t\n\t\t\"Mac & Cheese Wednesdays at Bennies!\" Frank interjects.\n\n\t\t\"...so we have the rest of day to prepare ourselves.\"\n\t\t\t\t\t\t\n\t\t*goto spendtime\n\n\t#\"Time does matter,\" Linda thoughtfully asks. \"But fuel isn't cheap and we still have several days.\"\n\t\t*set hours +15\n\t\t*set reputation %- 5\n\t\t*set fuel 50\n\t\t*set hoursfree 2\n\t\t*set franksmood %+ 5\n\t\t*set lindasmood %- 5\n\n\t\t\"That seems like the more prudent course of action.\" You nod at Linda and Frank folds his arms across his chest.\n\n\t\t\"We should get to Pisces Station in time for dinner tomorrow...\" you explain.\n\t\t\n\t\t\"Mac & Cheese Thursdays at Bennies!\" Frank interjects.\n\t\t\n\t\t\"...so we have two days to prepare ourselves.\"\n\t\t\t\t\t\t\n\t\t*goto spendtime\n\n*label spendtime\n\n*page_break Clear your throat and get ready to command your crew.\n\n\"All this zero-gravity time has been bad for our health and strength. We're not going to get into top shape right away, but some exercise will help us be alert and focused once we reach Zebulon.\n\nAdditionally, navigating the asteroid belt will be tricky. We should feed the specs Jarvis sent me into the flight simulator and practice with it to improve our odds of a safe landing.\n\nAnd on the third hand, I've never used a computer system like the one we're supposed to reboot...\" You look at the manual \"... a Diogenes 6. If at least one of us reads through this thing we'll have a better idea of what to do when we get there.\"\n\nLinda clears her throat, \"I have some thoughts on that.\"\n\nFrank rolls his eyes. \"Here we go,\" he mutters. \n\n*choice\n\t#\"Go ahead, Linda\"\n\t\t*set lindasmood %+ 5\n\t\t\"The best pilot should be the one who trains in the simulator and that's probably you. The one with the most computer experience should study the manual, and that would be me.\"\n\n\t\t\"And what about me?\" Frank asks.\n\n\t\t\"Just stay out of our way.\"\n\t\t\n\t\t*if hoursfree = 2\n\t\t\t\"We have two days,\" she adds, \"so we can mix up the tasks in order to give everyone the most preparation.\"\n\t\t*goto decider\n\n\t#\"What do you think, Frank?\"\n\t\t\"Um. Not sure. So, we can exercise, train on the simulator, or read the manual, right? I'd rather train on the simulator, I guess.\"\n\n\t\tLinda says, \"It would be a better use of time for the Captain to train on the simulator.\"\n\n\t\t\"And what will you do?\" Frank asks.\n\n\t\t\"I don't know.\" Linda answers exasperatedly.\n\t\t*goto decider\n\n\t#\"This is my decision\"\n\t\t*set lindasmood %- 5\n\t\t*goto decider\n\n*label decider\n\nLinda and Frank both look at you, waiting for your decision.\n\n*choice\n\t#\"Linda, I want you to study the manual.\"\n\t\t*set lindasmood %+ 5\n\t\t*set hcomputers %+ 15\n\t\tLinda smiles.\n\t\t\n\t\t*choice\n\t\t\t#\"And Frank, I want you to train on the simulator.\"\n\t\t\t\tFrank grins.\n\t\t\t\t\n\t\t\t\t*set franksmood %+ 5\n\t\t\t\t*set rpiloting %+ 10\n\t\t\t\t\"I'm going to focus on getting back into shape.\"\n\n\t\t\t\tAs Frank starts up the training sim you hear him murmur, \"You keep telling yourself it's just a game, but it's awfully unnerving to watch your ship go down in flames in 3D surround-o-vision.\"\n\t\t\t\t*set strength %+ 10\n\t\t\t\t*goto spendtime2\n\n\t\t\t#\"And I'm going to train on the simulator.\"\n\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t*set piloting %+ 15\n\t\t\t\t\"Frank, I want you to focus on getting back into shape.\"\n\n\t\t\t\t\"Ah. The sweat smell of victory.\" You hear Frank mutter.\n\t\t\t\t*set rstrength %+ 15\n\t\t\t\t*goto spendtime2\n\n\t#\"Frank, I want you to study the manual.\"\n\t\t*set lindasmood %- 5\n\t\t*set rcomputers %+ 5\n\t\tLinda glares at you.\n\t\t\n\t\t*choice\n\t\t\t#\"And Linda, I want you to train on the simulator.\"\n\t\t\t\t*set hpiloting %+ 5\n\t\t\t\t*set strength %+ 10\n\t\t\t\tLinda stares at you with her mouth open. \"Are you kidding me?\"\n\n\t\t\t\t\"I'm going to focus on getting back into shape.\"\n\n\t\t\t\t\"Wow, this is boring.\" You hear Frank mutter as he pages through the manual.\n\t\t\t\t*goto spendtime2\n\n\t\t\t#\"And I'm going to train on the simulator.\"\n\t\t\t\t*set piloting %+ 15\n\t\t\t\t*set hstrength %+ 5\n\n\t\t\t\t\"Linda, I want you to focus on getting back into shape.\"\n\n\t\t\t\t\"Wow that's boring.\" You hear Frank mutter.\n\t\t\t\t*goto spendtime2\n\n\t#\"I'm going to study the manual.\"\n\t\t*set computers %+ 10\n\t\t*choice\n\t\t\t#\"And Frank, I want you to train on the simulator.\"\n\t\t\t\t*set franksmood %+ 5\n\t\t\t\t*set rpiloting %+ 10\n\t\t\t\t*set lindasmood %- 5\n\t\t\t\t*set hstrength %+ 5\n\t\t\t\tFrank grins.\n\n\t\t\t\t\"Linda, I want you to focus on getting back into shape.\"\n\n\t\t\t\tAs Frank starts up the training sim you hear him murmur, \"You keep telling yourself it's just a game, but it's awfully unnerving to watch your ship go down in flames in 3D surround-o-vision.\"\n\t\t\t\t*goto spendtime2\n\n\t\t\t#\"And Linda, I want you to train on the simulator.\"\n\t\t\t\t*set rstrength %+ 15\n\t\t\t\tLinda stares at you with her mouth open. \"Are you kidding me?\"\n\n\t\t\t\t*set hpiloting %+ 5\n\t\t\t\t\"Frank, I want you to focus on getting back into shape.\"\n\n\t\t\t\t\"Ah. The sweat smell of victory.\" You hear Frank mutter.\n\t\t\t\t*goto spendtime2\n\n*label spendtime2\n\n*if hoursfree = 2\n\t*set hoursfree 0\n\tLinda goes back to her bunk and the rest of the day is spent sleeping, eating, and performing routine maintenance. In the free moments in between other tasks the three of you train, read, and exercise as you instructed.\n\t\n\tThe next morning Linda reminds you that you have an additional day to prepare.\n\t\n\t*choice\n\t\t#\"Linda, I want you to study the manual.\"\n\t\t\tLinda smiles.\n\n\t\t\t*set lindasmood %+ 5\n\t\t\t*set hcomputers %+ 15\n\t\t\t*choice\n\t\t\t\t#\"And Frank, I want you to train on the simulator.\"\n\t\t\t\t\tFrank grins.\n\n\t\t\t\t\t*set franksmood %+ 5\n\t\t\t\t\t*set rpiloting %+ 10\n\t\t\t\t\t\"I'm going to focus on getting back into shape.\"\n\n\t\t\t\t\t*set strength %+ 10\n\t\t\t\t\t\n\t\t\t\t\tYou hear Linda murmur, \"Wow, some big changes since the Diogenes 5.\"\n\t\t\t\t\t*goto spendtime2\n\n\t\t\t\t#\"And I'm going to train on the simulator.\"\n\t\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\t*set piloting %+ 15\n\t\t\t\t\t\"Frank, I want you to focus on getting back into shape.\"\n\n\t\t\t\t\t*set rstrength %+ 15\n\n\t\t\t\t\tYou hear Linda murmur, \"Wow, some big changes since the Diogenes 5.\"\n\t\t\t\t\t*goto spendtime2\n\n\t\t#\"Frank, I want you to study the manual.\"\n\t\t\tLinda glares at you.\n\n\t\t\t*set lindasmood %- 5\n\t\t\t*set rcomputers %+ 5\n\t\t\t*choice\n\t\t\t\t#\"And Linda, I want you to train on the simulator.\"\n\t\t\t\t\tLinda stares at you with her mouth open. \"Is this a joke?\"\n\n\t\t\t\t\t*set hpiloting %+ 5\n\t\t\t\t\t\"I'm going to focus on getting back into shape.\"\n\t\t\t\t\t*set strength %+ 10\n\n\t\t\t\t\t*set lindasmood %- 5\n\t\t\t\t\tYou hear Linda mutter, \"This is stupid.\"\n\t\t\t\t\t*goto spendtime2\n\n\t\t\t\t#\"And I'm going to train on the simulator.\"\n\t\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\t*set piloting %+ 15\n\t\t\t\t\t\"Linda, I want you to focus on getting back into shape.\"\n\t\t\t\t\t*set lindasmood %- 5\n\t\t\t\t\t*set hstrength %+ 5\n\n\t\t\t\t\t\"What a waste of time,\" Linda mutters.\n\t\t\t\t\t*goto spendtime2\n\n\t\t#\"I'm going to study the manual.\"\n\t\t\t*set computers %+ 10\n\t\t\t*choice\n\t\t\t\t#\"And Frank, I want you to train on the simulator.\"\n\t\t\t\t\tFrank grins.\n\n\t\t\t\t\t*set franksmood %+ 5\n\t\t\t\t\t*set rpiloting %+ 10\n\t\t\t\t\t\"Linda, I want you to focus on getting back into shape.\"\n\n\t\t\t\t\t*set lindasmood %- 5\n\t\t\t\t\t*set hstrength %+ 5\n\t\t\t\t\t\"What a waste of time,\" Linda mutters.\n\t\t\t\t\t*goto spendtime2\n\n\t\t\t\t#\"And Linda, I want you to train on the simulator.\"\n\t\t\t\t\tLinda stares at you with her mouth open, \"Is this a joke?\"\n\t\t\t\t\t\n\t\t\t\t\t*set hpiloting %+ 5\n\t\t\t\t\t\"Frank, I want you to focus on getting back into shape.\"\n\n\t\t\t\t\t*set rstrength %+ 15\n\n\t\t\t\t\tYou hear Linda mutter, \"This is stupid.\"\n\t\t\t\t\t*set lindasmood %- 5\n\t\t\t\t\t*goto spendtime2\n\n*label pisces\n\n\n*if (lindasmood \u003c 50) and (franksmood \u003c 50)\n\tAt your next sleep-shift the ship computer whispers to you.\n\n\t\u003cLinda and Frank are not happy> \u003cYou ought to make more of an effort>\n\n\tYou wonder about Frank and Linda. They are your crew, but your friends as well.\n\nYou hope your crew is up for the challenges of the next few days.\n\n*set hours +1\n\nThe next day you wake to see the Moon completely filling your viewscreen. You navigate toward Pisces Station, near the edge of Mare Vaporum, the \"Sea of Vapors\".\n\nTraffic seems heavier than usual and you have a few near-misses as you prepare for landing.\n\n*if piloting > 50 \n\t*set reputation %+ 5\n\tOne particularly irresponsible pilot cuts you off and you just barely avoid a collision.\n\t*set piloting %+ 5\n\t*goto dockingbay\n*else\n\t*set reputation %- 5\n\tOne particularly irresponsible pilot cuts you off and you end up damaging one of the starboard stabilizers when you scrape your Pengo against his Marlin. It looks like the same one that buzzed you earlier. The stabilizer will be an easy fix once you've landed but its loss means a rougher landing on the lunar surface, damaging some of the landing gear as well.\n\t*set piloting %+ 5\n\t*set shipvalue -50\n\t*goto dockingbay\n\n*label dockingbay\n\n*page_break Activate the retro-thrusters.\n\nYou finally are able to taxi into an available docking bay. You get out and stretch your legs. It's not Earth, but it feels good to stand and walk in gravity again.\n\nAll three of you are clearly glad to be on solid ground again, and the mood lightens. Linda begins telling one of her anecdotes.\n\n*choice\n\t#Listen politely\n\t\t*set lindasmood %+ 5\n\t\t*set franksmood %- 5\n\t\tFrank sighs.\n\n\t\t\"Have you been to Pisces Station before, Frank?\" you ask.\n\n\t\t\"No.\"\n\n\t\tLinda is clearly comfortable in tour-guide mode. \"Pisces Station is a typical spaceport, which is to say, dark, cold, slightly damp, somewhat smelly, and full of tired and grouchy people murmuring to themselves as they stagger from one cave-like office to the next...\"\n\n\t\t\"When space travel became as commonplace as it is now, a Canadian doctor (who since lost his license to practice medicine) invented what he called \"Space Yoga\". Although he had never been in space before, he had the idea to come up with specific exercises that would aid travelers returning to a gravity environment after days or weeks in space. He made trillions selling his books, and I got one as a gift one year. I still remember some of the exercises, although a few of the positions are too embarrassing to do in public.\"\n\n\t\t\"You could make a fortune in 'Space Pilates',\" Frank muses.\n\n\t\t*goto movon\n\t#\"Come on, we have to get moving.\"\n\t\t*set lindasmood %- 5\n\t\t*set franksmood %+ 5\n\t\tLinda pouts.\n\n\t\t*goto movon\n\n*label movon\n\nSuddenly you feel that particular sensation in the back of your neck that someone is watching you. You turn your head but by the time you do no one is there.\n\n*choice\n\t#Tell the others what you just experienced.\n\t\t*set lindasmood %+ 5\n\t\t*set franksmood %+ 5\n\n\t\tFrank begins, \"'Space Paranoia' is real. It's the minor form of 'Space Madness'.\"\n\n\t\tLinda affirms, \"It afflicts everyone who spends so much time alone in the void of space.\"\n\n\t\tThey're probably right.\n\t\t\n\t\t*goto ben\n\n\t#Don't say anything.\n\t\t*set reputation %+ 5\n\t\t*goto ben\n\n*label ben\n\nNow that you're here, you have to drop off your cargo and get paid, and figure out what you want to do about a ship to Zebulon.\n\nLinda wonders aloud whether you'll see any Moon-borns.\n\n\"What's that?\" Frank asks.\n\n*choice\n\t#Listen politely\n\t\t*set lindasmood %+ 5\n\t\t\n\t\tShe explains, \"Childbirth is still rare off-Earth. Pregnant women are advised to avoid the radiation experienced in space or on the Moon. And childbirth itself can be complicated without the aid of gravity and medical technology, both of which are in far greater supply on Earth.\n\n\t\tBut it happens, and there are two elementary schools on the Moon for the small number of children born here each year.\n\n\t\tThe low gravity and high levels of ultra-violet radiation can be challenging for newborns and the rate of infant mortality is high. Those that make it past the first five years end up with peculiar physical traits: the low gravity means limbs and spine are able to grow with less resistance, to the degree that average height is over two meters. The high UV radiation also results in the skin producing higher levels of melanin to protect itself from damage.\n\n\t\t*page_break\n\n\t\tNo one has come up with a convincing theory about the unusual, or absence of, pigmentation in the iris and hair, but many suspect it is related to the diet available on the Moon, which consists largely of packaged items such as macaroni and cheese, and root vegetables grown in lunar soil, which is very high in certain essential minerals and completely deficient in others.\"\n\n\t\t\"Well how about that,\" Frank says.\n\n\t\t*goto benny\n\n\t#\"Let's keep moving.\"\n\t\t*set lindasmood %- 5\n\t\t\"Come on.\"\n\n\t\t*goto benny\n\n*label benny\n\n\"You know, it's been a while since any of us had any real food,\" you say.\n\n\"I swear I can smell Bennie's mac & cheese from the other end of the spaceport,\" Frank says.\n\n\"It will delay our other responsibilities,\" Linda says.\n\n\"But we could use a hot meal,\" Frank replies, \"and it could be good to hear what the other pilots are up to.\"\n\n*set deadline (150 - hours)\n\n*label bennies\n*choice\n\t#\"Yay Bennie's!\" Frank is practically jumping up and down.\n\t\t*set franksmood %+ 5\n\t\t*set lindasmood %- 5\n\t\t*set hours +1\n\t\t*set money - 1\n\t\t*set strength %+ 10\n\t\tAh. The music and conversation and cooking smells from Bennie's temporarily make you forget what a dump Pisces Station is.\n\t\t\n\t\tYou get an order of the signature dish and some local brew and start up a conversation with some other pilots who just got in from Deimos, the lesser Martian moon.\n\t\t\n\t\tOne of the pilots mentions a comet that's not yet on all the charts. She says that if you get close enough to its gravity well you should be able to slingshot around it and save time and fuel getting to sector 12 of the asteroid belt.\n\t\t*set information 1\n\t\t\n\t\tThat's handy to know. Do you want to stick around or head out?\n\t\t\n\t\t*choice\n\t\t\t#\"Let's stick around!\" Frank encourages you.\n\t\t\t\t*set franksmood %+ 5\n\t\t\t\t*set lindasmood %- 5\n\t\t\t\t*set hours +2\n\t\t\t\t*set money - 2\n\t\t\t\t\"Hey! They're playing that song you used to love! You know, that one?\" Frank is clearly in his element.\n\n\t\t\t\tYou fill up your glass and find a couple of old friends who recently dropped off a shipment of weapons on Ganymede.\n\n\t\t\t\tYou politely listen in on their conversation:\n\n\t\t\t\t\"That Atlas/Jones Group conflict is getting out of hand.\"\n\t\t\t\t\n\t\t\t\t\"How's that?\"\n\t\t\t\t\n\t\t\t\t\"Atlas Consolidated and Jones Group both have swarms on the surface of some of those mid-size 'roids.\"\n\n\t\t\t\t\"They both do? That's got to be illegal.\"\n\n\t\t\t\t\"I agree, it's a funny situation\"\n\n\t\t\t\t\"I didn't say 'funny', I said 'illegal'.\"\n\t\t\t\t\n\t\t\t\t*page_break Something fishy here...\n\n\t\t\t\t\"OK. Fair enough. It's legal, though. At least there's nothing outlawing it. Remember that UNOOSA ruling on Pallas and Vesta? Ever since, mining colonies can only claim whole asteroids less than 200km in length. Anything bigger is fair game.\"\n\n\t\t\t\t\"I'll deliver munitions as long as I get paid, but I don't care for it. Still, it's just robots, not people getting shot.\"\n\t\t\t\t\n\t\t\t\t\"Robots?\" you ask.\n\t\t\t\t\n\t\t\t\t\"You know. The companies defend their quarries with armed robots. Of course, the only things that ever breech the security perimeter are also robots, so the shootouts so far have just been between them.\"\n\t\t\t\t*set information 2\n\t\t\t\t*set strength %- 5\n\t\t\t\t\n\t\t\t\tThat was very interesting. You wonder what you've gotten yourself into and what to expect on the surface of Zebulon.\n\t\t\t\t\n\t\t\t\tYou turn to Frank, slumping in his chair. \"What do you think? One more or get moving?\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"Just one more,\" Frank assures you.\n\t\t\t\t\t\t*set franksmood %+ 5\n\t\t\t\t\t\t*set lindasmood %- 5\n\t\t\t\t\t\t*set hours +3\n\t\t\t\t\t\t*set money - 4\n\t\t\t\t\t\t*set information 3\n\t\t\t\t\t\t*set strength %- 10\n\t\t\t\t\t\t\"Mmm. That's the good stuff.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou make friends with a guy in the ship rental business, named Paul Meade.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe name rings a bell with you. \"The sculptor?\" You ask.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe laughs. \"Yep! I ended up making enough money from that one famous piece to start up my business.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou chat about art and commerce and life and seem to agree on most things.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe likes the cut of your jib and says he can set you up with a great deal on a ship if you can make it to Capricorn Station by tomorrow.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou thank him and realize that you're feeling very sleepy.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Come on. Last one.\" Frank holds a glass in front of your face.\n\t\t\t\t\t\t\t\t*set franksmood %+ 5\n\t\t\t\t\t\t\t\t*set lindasmood %- 5\n\t\t\t\t\t\t\t\t*set hours +4\n\t\t\t\t\t\t\t\t*set information 4\n\t\t\t\t\t\t\t\t*set money - 8\n\t\t\t\t\t\t\t\t*set strength %- 20\n\t\t\t\t\t\t\t\tThat was a mistake. You're going to have a headache tomorrow.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou stumble out of Bennie's \n\t\t\t\t\t\t\t\t*goto pickport\n\n\t\t\t\t\t\t\t#\"We're done here.\" Linda is standing in the doorway checking her watch every 15 seconds.\n\t\t\t\t\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\t\t\t\t*goto pickport\n\n\t\t\t\t\t#\"Let's get moving.\" Linda prompts you.\n\t\t\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\t\t*goto pickport\n\n\t\t\t#Linda is finished with her gingered ale. \"Let's head out.\"\n\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t*goto pickport\n\n\t#Linda is less enthusiastic. \"We need to get moving, the two thousand dollar bonus expires in ${deadline} hours.\"\n\t\t*set lindasmood %+ 5\n\t\t*goto pickport\n\n*label pickport\n\nYou get back to your ship and offload the pharmaceuticals.\n*temp bonus\n*set bonus (50 - hours)\n\nYou get paid $100 for the job, plus a bonus of $${bonus} for early delivery\n\nYou get that same sensation of being watched, and this time when you turn around you catch the sight of a tall person in a dark blue overcoat rushing around a corner, out of sight.\n\n*set money + 100\n*set money + bonus\n\n*finish\n"}};
