<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zebulon — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "zebulon", "title": "Zebulon", "scenes": {"choicescript_description": "Journey through Space and uncover the secrets of the asteroid Zebulon! Pilot a spacecraft with two loyal sidekicks and your pet goldfish Henry. Travel to the Moon, meet some interesting characters, and then blast off to the Asteroid Belt. Along the way make the right choices to discover the secrets of Zebulon and your own past.\n\n[i]Zebulon[/i] is a 30,000-word interactive novel by Matt Slaybaugh. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nIf Douglas Adams had written a multiple-choice gamebook, it might not be entirely unlike this!", "choicescript_stats": "Info about your ship, your abilities, and how others feel about you\n\n*stat_chart\n\ttext Hours\n\ttext Money\n\n\ttext Ship\n\ttext ShipName\n\tpercent Fuel\n\n\ttext ShipSpeed\n\ttext ShipSteering\n\ttext ShipStrength\n\n\tpercent Piloting\n\tpercent Computers\n\tpercent Strength\n\n\tpercent LindasMood\n\tpercent FranksMood\n\tpercent Reputation\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n", "ending": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nDays later you're well-rested, sipping some space-tea in the galley.\n\n\"Computer,\" you say. \"How'd we do? Spoogle me and tell me what you see.\"\n\n*temp love\n*set love ((reputation + franksmood) + lindasmood) / 3\n\n*if reputation > 65\n\t\"\u003cYour reputation is solid gold> \u003cYou are respected admired and loved throughout the Solar System>\"\n\n\tLinda and Frank agree and can't wait to join you on your next adventure.\n\t*goto end\n*elseif reputation > 55\n\t\"\u003cDespite some setbacks your reputation is good> \u003cYou are liked by many throughout the Solar System>\"\n\n\t*if lindasmood > franksmood\n\t\tLinda and Frank agree, although you will have to convince Frank to join you on your next adventure.\n\t\t*goto end\n\t*else\n\t\tLinda and Frank agree, although you will have to convince Linda to join you on your next adventure.\n\t\t*goto end\n\n*elseif reputation > 45\n\t\"\u003cYour reputation is good> \u003cYou are tolerated by most but grudgingly so by many throughout the Solar System>\"\n\n\tLinda and Frank agree. You will have to work hard to convince them to join you on your next adventure.\n\t*goto end\n\n*else\n\t\"\u003cYour reputation is ruined. The only people who will ever hire you are those who have never heard of you.>\"\n\n\tLinda and Frank would agree if they hadn't already jumped ship at their first opportunity to get away from you.\n\n\tYou spend the rest of your days hauling tubs of space-mayonnaise to the various lunar bases.\n\t*goto end\n\n*label end\n\n---\n\n*page_break End\nWe hope you've enjoyed playing [i]Zebulon.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99", "enterlab": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n\nCHAPTER IX - THE LAB\n\n---\n\n*set hours + 3\n\n*comment At Act III, calculate each of the characters percentile loyalty on 3-point scale: 1=loathe, 2=indifferent, 3=love\n*comment SK determines trick ending, R+H individually choose to go with SK or stay (or fight)\n\nYou get to the structure, basically, a Quonset hut.\n\nThe door is locked with an electronic keypad.\n\n\"Locked!? Are you kidding me?!\" Frank cries. \"What is the point of a lock way out here?!\"\n\n*if sidekick != \"\"\n\t${sidekick} steps up. \"I may have a passcode that will work.\"\n\n\t\"Oh.\" You say. And ${sidekick} unlocks the door.\n\n\t\"How did...\"\n\n\t*goto passkey\n\n*else\n\tLinda steps up. \"I may be able to crack it.\"\n\n\tAfter spending a few minutes pushing buttons, she picks up a rock and smashes the keypad.\n\n\tShe opens the door and steps through, calling back over her shoulder, \"After all that, we can't let a locked door stop us. It's only to keep the robots out, anyway.\"\n\t*goto passkey\n\n*label passkey\n\n*page_break\n\nYou step inside, through the airlock, and into the inner chamber.\n\nLinda locates the environmental controls. \"It's not exactly cozy,\" she says, examining the water-recycling equipment, \"but a person could live here for about a month before running out of essential resources.\"\n\nYou don't plan on remaining more than a few minutes and stay in your suit. You use the flashlight built in to the left wrist of your suit to explore the area.\n\nThere it is. The Diogenes 6, that you've traveled so far and endured so much to get to, is on a platform in front of you.\n\n*page_break\n\n*if sidekick != \"\"\n\t*if sidekick = \"Anders\"\n\t\t*comment Works for Atlas, wants to make sure you succeed\n\t\t*if reputation > 50\n\t\t\t*comment Butts in to help, confusing you, but for the best\n\t\t\tAnders turns to you. \"You know, Captain, it's not just chance that I'm here with you.\"\n\n\t\t\t\"What do you mean?\" You ask.\n\n\t\t\t\"I work for Atlas Consolidated.\"\n\t\t\t\n\t\t\t\"What!?\" Frank says, getting ready to hit him.\n\n\t\t\tAnders is taken aback. \"Wait. Let me explain. We knew that Asmico might be planning some monkeyshines now that we're suing them over the Ceres project, and we just wanted to make sure this went smoothly.\"\n\n\t\t\t\"But how...\" You begin.\n\n\t\t\t\"They had me approach you back on Luna. It was my luck you picked me and not that woman. I didn't trust her.\"\n\n\t\t\t\"Well that's a relief.\" Frank says.\t\t\t\n\n\t\t\t*page_break\n\n\t\t\t*goto computerpho\n\t\t*else\n\t\t\t*comment Let's you fail, and only steps in when computer needs rebooting\n\t\t\tYou ask Anders to hand you the manual.\n\n\t\t\t\"I thought you had it.\" He says.\n\n\t\t\t\"Seriously?!\" Ugh. \"Well, can you go back to the ship and get it?\"\n\t\t\t\n\t\t\t\"My job description doesn't include navigating fields of robots.\" Anders says. \"If you need the manual, you should go get it yourself.\"\n\t\t\t\n\t\t\t*if lindasmood \u003c 50\n\t\t\t\tYou see Linda nodding in agreement.\n\n\t\t\tYou don't want to waste time out there and wait to see whether you really need the manual. \n\n\t\t\t*goto computerpho\n\n\t*elseif sidekick = \"Beleina\"\n\t\t*comment Works for Asmico, wants to make sure you fail\n\n\t\tSuddenly, Beleina turns to you, with tears in her eyes.\n\n\t\t\"You should know, Captain, that this is goodbye.\"\n\t\t\n\t\t\"What?\" you ask.\n\t\t\n\t\t\"An Asmico representative approached me on Luna before we took off. He explained it all to me. How you are a traitor, how you purposefully sabotaged their operation on Ceres.\"\n\n\t\t*if reputation > 50\n\t\t\t*comment Changes mind and tearfully regrets what she had planned\n\t\t\t\n\t\t\tShe falls to her knees, crying. \"But now that I've gotten to know you I know he must have been lying!\"\n\t\t\t\n\t\t\tYou don't know what to do. It's hard to console someone in a spacesuit.\n\t\t\t\n\t\t\t\"There, there,\" Frank says, patting her helmet.\n\t\t\t\n\t\t\t\"Please forgive me!\" Beleina says.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"Go back to the ship and wait for us there.\"\n\t\t\t\t\t*goto timeout\n\n\t\t\t\t#\"What were you planning to do to us?\"\n\t\t\t\t\tMy orders were to kill you, but I'm not a heartless person. I was just going to take your ship and maroon you on this asteroid.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Go back to the ship and wait for us there.\"\n\t\t\t\t\t\t\t*goto timeout\n\n\t\t\t\t\t\t#\"We all make mistakes. Thanks for being truthful with me. But don't leave my sight.\"\n\t\t\t\t\t\t\t*set reputation %+ 5\n\t\t\t\t\t\t\t*goto computerpho\n\n\t\t\t\t#\"That's OK. We all make mistakes.\"\n\t\t\t\t\t\"OK?\" Frank asks. \"She may have been trying to kill us!\"\n\t\t\t\t\t*set franksmood %- 5\n\t\t\t\t\t*goto computerpho\n\n\t\t*else\n\t\t\t*comment Tries to sabotage the computer (R+H may or may not fight her) and maroons you\n\n\t\t\tShe looks you straight in the eyes. \"And now that I've gotten to know you, I have to say it doesn't surprise me at all. This will be very easy.\"\n\n\t\t\t${sidekick} picks up a pipe and threatens you with it while backing up toward the door.\n\t\t\t\n\t\t\t*if havegun=1\n\t\t\t\t*choice\n\t\t\t\t\t#Shoot her with the EMP gun\n\t\t\t\t\t\tThe EMP gun is designed for use against robots, but is effective against the electronics in spacesuits as well.\n\n\t\t\t\t\t\tYou see ${sidekick} begin to choke now that her respirator is failing. ${sidekick} falls to the floor frantically trying to get the oxygen to resume.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Linda! Get the air turned on in here!\"\n\t\t\t\t\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\t\t\t\t*set franksmood %+ 5\n\t\t\t\t\t\t\t\tLinda rushes to the ventilator and gets them turned on, but by the time the air is breathable, ${sidekick} has fallen unconscious.\n\n\t\t\t\t\t\t\t\tYou verify that ${sidekick} is still breathing and then the three of you take a moment to reflect on what just happened.\n\t\t\t\t\t\t\t\t*set sidekick \"\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"That was a close call. But you saved us, Cap'n.\" Frank says.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto computerpho\n\t\t\t\t\t\t\t#Take a deep breath and quickly swap out your air tube with ${sidekick}'s to share the oxygen from your tank.\n\t\t\t\t\t\t\t\t*set lindasmood %+ 10\n\t\t\t\t\t\t\t\t*set franksmood %+ 10\n\t\t\t\t\t\t\t\t*set reputation %+ 25\n\t\t\t\t\t\t\t\tThis is a risky move, but you manage to get breathable air into ${sidekick}'s helmet.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou ask Linda to get the ventilation working and swap your air back and forth until the chamber is full of breathable air.\n\t\t\t\t\t\t\t\t*set hours +1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Thank you.\" ${sidekick} gasps. \"I'm so sorry.\"\n\t\t\t\t\t\t\t\t*goto computerpho\n\n\t\t\t\t\t\t\t#Watch her die.\n\t\t\t\t\t\t\t\t*set lindasmood %- 10\n\t\t\t\t\t\t\t\t*set franksmood %- 10\n\t\t\t\t\t\t\t\tThe three of you take a moment of silence.\n\t\t\t\t\t\t\t\t*set sidekick \"\"\n\n\t\t\t\t\t\t\t\t\"That was nasty business, but you saved us, Cap'n.\" Frank says.\n\n\t\t\t\t\t\t\t\t*goto computerpho\n\t\t\t\t\t#Charge at her\n\t\t\t\t\t\tYou rush toward her.\n\n\t\t\t\t\t\t*if strength > skstrength\n\t\t\t\t\t\t\tYou nearly overpower ${sidekick} but she gets in a blow to your helmet that knocks you down.\n\t\t\t\t\t\t\t*goto Frank\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t${sidekick}'s stronger than you and you don't have a chance.\n\t\t\t\t\t\t\t*goto Frank\n\n\t\t\t\t\t#Wait to see what happens\n\t\t\t\t\t\t*goto wait\n\n\t\t\t*else\n\t\t\t\t*choice\n\t\t\t\t\t#Charge at her\n\t\t\t\t\t\tYou rush forward.\n\n\t\t\t\t\t\t*if strength > skstrength\n\t\t\t\t\t\t\tYou nearly overpower ${sidekick} but he gets in a blow to your helmet that knocks you down.\n\t\t\t\t\t\t\t*goto Frank\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t${sidekick}'s stronger than you, and you don't have a chance.\n\t\t\t\t\t\t\t*goto Frank\n\n\t\t\t\t\t#Wait to see what she does\n\t\t\t\t\t\t*goto wait\n\n\t*elseif sidekick = \"Cargill\"\n\t\t*comment Used to work for Atlas\n\t\tCargill leans in toward the computer and mumbles, \"Oh. Isn't this like the one on Ceres?\"\n\t\t\n\t\t\"What?\" you say.\n\t\t\n\t\t\"Oh, uh. Nothing. Just a mistake.\"\n\t\t\n\t\t\"No.\" The realization dawns on you. \"You were there. On Ceres. You were there!\"\n\t\t\n\t\t\"I don't know what you're talking about,\" Cargill says. But even though his visor you can see him starting to sweat.\n\n\t\t\"This is him.\" You say, inching toward Cargill. \"This is the guy who destroyed all that equipment on Ceres. The one who botched the whole mission. The mission I got blamed for!\"\n\n\t\t*page_break\n\n\t\t*if reputation > 50\n\t\t\t*comment Admits he was the one who botched the Ceres job. He didn't know it would get pinned on you.\n\t\t\tCargill looks like he's going to make a run for it.\n\t\t\t\n\t\t\t*if franksmood > 50\n\t\t\t\tFrank moves over and gets between Cargill and the hatch. \"What is this?\"\n\n\t\t\t\"Hey. I'm sorry. It was an accident. I didn't know anyone would get blamed for it. I definitely didn't think you would have to take the heat. I didn't even know you.\"\n\n\t\t\t*choice\n\t\t\t\t#\"Go back to the ship and wait for us there.\"\n\t\t\t\t\t*goto timeout\n\t\t\t\t#\"What were you planning to do to us?\"\n\t\t\t\t\t\"I wasn't planning anything!\" Cargill pleads. \"When you hired me on Luna I didn't even recognize you, although I figured it out over the past couple of days. I was hoping you wouldn't recognize me and we could just part ways once this gig was over.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Go back to the ship and wait for us there.\"\n\t\t\t\t\t\t\t*goto timeout\n\t\t\t\t\t\t#\"We all make mistakes. Thanks for being truthful with me. We'll figure out what's next between us once we're off this rock. Until then, don't leave my sight.\"\n\t\t\t\t\t\t\t*set reputation %+ 5\n\t\t\t\t\t\t\t*goto computerpho\n\t\t\t\t\t\t#\"That's OK. We all make mistakes.\"\n\t\t\t\t\t\t\t\"OK?\" Frank asks. \"His mistakes ruined your career and reputation!\"\n\t\t\t\t\t\t\t*set franksmood %- 10\n\t\t\t\t\t\t\t*set lindasmood %- 5\n\t\t\t\t\t\t\t*set reputation %+ 10\n\t\t\t\t\t\t\t*goto computerpho\n\n\t\t*else\n\t\t\t*comment Let's slip that he was the one who botched the Ceres job. When he gets discovered he maroons you.\n\n\t\t\tHe looks you straight in the eyes. \"Yeah, that was me. So what? Someone had to take the fall, and it may as well been a fool like you.\"\n\t\t\t\n\t\t\t\"But why?\" Frank asks. \"Why ship out with us if you knew...?\"\n\t\t\t\n\t\t\t\"I didn't know.\" Cargill drops his shoulders, readying for a fight. \"Not that it matters now, but I didn't recognize you until after we took off from Luna. Small world, eh?\"\n\n\t\t\t${sidekick} picks up a pipe and threatens you with it while backing up toward the door.\n\t\t\t\n\t\t\t*if havegun = 1\n\t\t\t\t*choice\n\t\t\t\t\t#Shoot him with the EMP gun\n\t\t\t\t\t\tThe EMP gun is designed for use against robots, but is effective against the electronics in spacesuits as well.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou see ${sidekick} begin to choke now that his respirator is failing. ${sidekick} falls to the floor frantically trying to get his oxygen to resume.\n\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Linda! Get the air turned on in here!\"\n\t\t\t\t\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\t\t\t\t*set franksmood %+ 5\n\t\t\t\t\t\t\t\tLinda rushes to the ventilator and gets them turned on, but by the time the air is breathable, ${sidekick} has fallen unconscious.\n\n\t\t\t\t\t\t\t\tYou verify that ${sidekick} is still breathing and then the three of you take a moment to reflect on what just happened.\n\t\t\t\t\t\t\t\t*set sidekick \"\"\n\n\t\t\t\t\t\t\t\t\"Phew, that was close, but you saved us, Cap'n.\" Frank says.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto computerpho\n\t\t\t\t\t\t\t#Take a deep breath and quickly swap out your air tube with ${sidekick}'s to share the oxygen from your tank.\n\t\t\t\t\t\t\t\t*set lindasmood %+ 10\n\t\t\t\t\t\t\t\t*set franksmood %+ 10\n\t\t\t\t\t\t\t\t*set reputation %+ 25\n\t\t\t\t\t\t\t\tThis is a risky move, but you manage to get breathable air into ${sidekick}'s helmet.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou ask Linda to get the ventilation working and swap your air back and forth until the chamber is full of breathable air.\n\t\t\t\t\t\t\t\t*set hours +1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Thank you.\" ${sidekick} gasps. \"I'm sorry.\"\n\t\t\t\t\t\t\t\t*goto computerpho\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Watch him die.\n\t\t\t\t\t\t\t\t*set lindasmood %- 10\n\t\t\t\t\t\t\t\t*set franksmood %- 10\n\t\t\t\t\t\t\t\tThe three of you take a moment of silence.\n\t\t\t\t\t\t\t\t*set sidekick \"\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Had to be done, I guess. You saved us, Cap'n.\" Frank says.\n\n\t\t\t\t\t\t\t\t*goto computerpho\n\t\t\t\t\t#Charge at him\n\t\t\t\t\t\tYou rush toward him.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if strength > skstrength\n\t\t\t\t\t\t\tYou nearly overpower ${sidekick} but get in a blow to your helmet that knocks you down.\n\t\t\t\t\t\t\t*goto Frank\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t${sidekick}'s stronger than you and you don't have a chance.\n\t\t\t\t\t\t\t*goto Frank\n\n\t\t\t\t\t#Wait to see what happens\n\t\t\t\t\t\t*goto wait\n\t\t\t*else\n\t\t\t\t*choice\n\t\t\t\t\t#Charge at him\n\t\t\t\t\t\tYou rush toward him.\n\n\t\t\t\t\t\t*if strength > skstrength\n\t\t\t\t\t\t\tYou nearly overpower ${sidekick} but get in a blow to your helmet that knocks you down.\n\t\t\t\t\t\t\t*goto Frank\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t${sidekick}'s stronger than you and you don't have a chance.\n\t\t\t\t\t\t\t*goto Frank\n\t\t\t\t\t#Wait to see what he does\n\t\t\t\t\t\t*goto wait\n\t*goto wait\n\n*else\n\t*comment Just Frank and Linda\n\t\"Purty blinkenlights,\" says Frank.\n\t\n\t*goto computerpho\n\n*label Frank\n*if franksmood > 50\n\t*if rstrength > skstrength\n\t\tFrank jumps in and grabs ${sidekick}.\n\n\t\tThere's a lot of kicking and punching, but eventually you, Linda, and Frank are able to subdue ${sidekick}.\n\t\t\n\t\t*set hours +1\n\t\t\n\t\tYou take a good long time to explain what happened on Ceres. How you were just taking the fall for someone else; you don't know who.\n\t\t\n\t\tLinda argues the point that some stranger on a Moon base cannot have more credibility than you, with whom ${sidekick} has been traveling and working for days.\n\t\t\n\t\tEventually ${sidekick} relents and comes around. None of you let ${sidekick} out of your sight, however.\n\n\t\t*set reputation %+ 10\n\t\t\n\t\t*goto computerpho\n\t*else\n\t\t${sidekick} knocks Frank back and goes through the door, wedging it shut with the pipe.\n\n\t\tYou struggle to open the door but by the time you do, there's no one in sight.\n\t\t*goto timeout\n*else\n\t\"Frank, do something!\" You shout, but it's too late.\n\t*goto wait\n\n\n\n*label wait\n${sidekick} continues backing out the door, goes through it, closes it, then wedges the pipe so that you're effectively locked in.\n\nYou struggle to open the door but by the time you do, there's no one in sight.\n*goto timeout\n\n\n\n*label timeout\n\nNot long after, you hear the engines start up and the ship take off.\n\n\"Shhhhhugar,\" Frank says.\n\nYou see thousands of flashes of light as the robot drones outside fire on the ship.\n\n*if (shipstrength \u003c 2) or (damage > 2)\n\tThe ${ship} explodes into billions of tiny fragments.\n\n\t\"Double sugar,\" Frank says.\n\t*set lindasmood %- 5\n\t*set franksmood %- 5\n\t*goto marooned\n\n*else\n\tThe ${ship} evades the attack and slips safely off into space.\n\n\t\"No way could ${sidekick} have maneuvered like that.\" Frank says.\n\n\t\"Unbelievable.\" Linda says. \"${sidekick} must have been sabotaging the ship all along and only just now repaired the navigation.\"\n\t*goto marooned\n\n*label marooned\n*page_break\n*set marooned 1\n\n\"Marooned!\" Frank wails, \"We're marooned!\"\n\n\"Snap out of it!\" Linda yells.\n\n\"Frank,\" you say, \"find a radio or some way of transmitting a signal and get a hold of Flabbergassed... or Asmico... or anyone!\"\n\n*page_break\n\n*label computerpho\n\nYou and Linda study the computer.\n\nShe pushes a button.\n\n\"\u003cTurn around when possible>\" The computer replies.\n\nYou push another button.\n\n\"\u003cAhead, keep left>\"\n\nShe pushes a third button.\n\n\"\u003cIt looks like you're writing a letter>\"\n\n\"I don't think this is right.\" Linda says.\n\n*set sidekick \"\"\n\n*finish", "hirehelp": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n\nCHAPTER IV - THE DEN\n\n---\n\nThe waiter directs you to the back room, where a card game is underway.\n\nOver a dozen men and women of all shapes, sizes, and manners sit around two large round tables playing 'Cobbles' - which looks something like battleships meets minesweeper, using Mahjong tiles.\n\nThe waiter asks if you'd like a drink.\n\n*temp drink\n*set drink 0\n\n*choice\n\t#Linda arches her eyebrow. \"No, thanks.\"\n\t\t*set lindasmood %+ 5\n\t\t*set franksmood %- 5\n\t\t*set drink 1\n\t\t*goto waiting\n\t#Frank grins and gives you the thumbs-up. \"Yes, please.\"\n\t\t*set lindasmood %- 5\n\t\t*set franksmood %+ 5\n\t\t*set drink 1\n\t\t*set strength %- 5\n\t\tBefore long, the waiter returns with drinks, a \"flaming tailpipe\", a favorite among space jockeys. He waits for you to pay.\n\t\t*choice\n\t\t\t#Pay\n\t\t\t\t\"$2?\" You mutter to yourself.\n\t\t\t\t*set money -2\n\t\t\t\t*set drink 0\n\t\t\t\t*goto waiting\n\t\t\t#Ask Linda to pay\n\t\t\t\t\"Kind of busy at the moment,\" she says to the waiter. \"Can we settle later?\"\n\t\t\t\t*set drink 0\n\t\t\t\t*goto waiting\n\t\t\t#Ask Frank to pay\n\t\t\t\t\"Thanks!\" He hands the waiter $4 in credits. \"Keep the change\"\n\t\t\t\t\n\t\t\t\tLinda rolls her eyes.\n\t\t\t\t*set money -4\n\t\t\t\t*set drink 2\n\t\t\t\t*goto waiting\n\n*label waiting\n\n*if drink = 2\n\tYour interruption of the game is clearly unwelcome, but the waiter makes a point of introducing you to the group and explains that you're looking to hire an extra crew mate. The men and women relax a little.\n\t*set reputation %+ 5\n\t*goto describe\n*else\n\tYour interruption of the game is clearly unwelcome. You clear your throat a few times and try to get the attention of the people at the tables. A few look up, but more out of annoyance than interest.\n\t*set reputation %- 5\n\t*goto describe\n\n*label describe\n\nYou briefly describe your mission and then wait by the door as some of them mutter to each other without stopping their game.\n\nAs you wait you notice one particularly tall and slender man seated at one of the tables, with a long dark blue coat slung over the back of the chair. You make eye contact for a half a second before he returns his attention to the game. His face was expressionless and you can't detect any intention. You're uneasy, but you realize there's nothing to be suspicious of; there are plenty of tall people with blue coats.\n\nStill, you stop the waiter as he gathers empty glasses from the tables and ask him whether he knows anything about the tall man in blue.\n\n*page_break \"Do you know that man?\"\n\n*if drink = 2\n\t\"Last I heard, he was working as a rep for one of the mining outfits, Atlas Consolidated or Jones Group. I don't know which. Probably on his way to or from the belt now.\"\n\t\n\tYou thank the waiter and mull over this news. \"Why would someone from Atlas be tailing us?\" you ask yourself.\n\t\n\t\"Probably just to make sure we do a good job,\" Frank says, his mouth full of peanuts.\n\t\n\t\"But what if he's working with the Jones Group?\" Linda asks. \"Could he have been monitoring the call with Jarvis?\"\n\n\t*goto suspicion\n\n*elseif drink = 1\n\t\"Sorry, I make a point of not getting involved in my customers' affairs.\"\n\t*goto suspicion\n*else\n\tThe waiter ignores you.\n\t*goto suspicion\n\n*label suspicion\n\n\"You don't have any evidence of anything, just a suspicious feeling,\" Frank says. \"There's nothing you can do now.\"\n\nYou wait to see if anyone comes up to talk to you, but you and Linda are starting to feel impatient.\n\n\"We can't take too much time for this,\" Linda says.\n\n\"Hey,\" asks Frank, \"Do you want to join the game?\"\n\n*choice\n\t#Linda is unambiguous. \"No, there isn't time for games, we have to get going.\"\n\t\t*set lindasmood %+ 5\n\t\t*set hours +1\n\t\tYou feel like a wallflower, standing there waiting.\n\t\t\n\t\tYou wait a bit and then head to the game table anyway.\n\t\t*goto game\n\t#Frank, on the other hand, is always up for this kind of thing. \"It'll pass the time and might help to break the ice a little.\"\n\t\t*label game\n\t\t*set hours +1\n\n\t\tYou walk over and introduce yourself again. \"May I sit in?\" you ask, smiling. \n\t\t*if reputation \u003c 50\n\t\t\t\"No.\" Three of them say, in unison. The rest ignore you.\n\t\t\t*set reputation %- 5\n\t\t\t\n\t\t\tThe waiter walks over and whispers in your ear, \"A round of drinks will make them more agreeable.\"\n\t\t\t\n\t\t\t\"What do you think?\" Frank asks. \"It won't be cheap but could help.\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"Come on,\" Linda says, \"we don't need this.\"\n\t\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\t*goto blueman\n\t\t\t\t#\"Think of it as an investment.\" Frank says.\n\t\t\t\t\t*set hours +1\n\t\t\t\t\t*if money >19\n\t\t\t\t\t\t*set money -20\n\t\t\t\t\t\tYou agree, and slip the waiter $20. In a few minutes he returns with a few pitchers of local suds.\n\t\t\t\t\t\t*set reputation %+ 10\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\tThe waiter was right; several of the players raise their glasses to you, and it's clear you're welcome now, although some are clearly unmoved by your obvious pandering.\n\t\t\t\t\t\t\t*goto sitdown\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe waiter must have been putting you on. The players snicker at the sucker giving them free drinks.\n\n\t\t\t\t\t\t\tYou slink away and wait at the doorway.\n\t\t\t\t\t\t\t*goto blueman\n\t\t\t\t\t*else\n\t\t\t\t\t\tUnfortunately you don't have enough cash.\n\t\t\t\t\t\n\t\t\t\t\t\tYou slink away and wait at the doorway.\n\t\t\t\t\t\t*goto blueman\n\t\t*else\n\t\t\tA couple of them grudgingly murmur assent and one fellow jerks his chair to the side to allow you more room.\n\t\t\t\n\t\t\t*label sitdown\n\t\t\t\n\t\t\t\"Thanks,\" you say, and sit down. You realize you're seated next to the man with the blue coat. He had been hiding under his hat, but has no choice but to acknowledge you now, albeit silently.\n\n\t\t\tFor the first time you have the opportunity to see his face. His skin is quite dark, while his eyes and hair are very light. His hair, in fact, is so white that it's almost lavender-colored.\n\t\t\t\n\t\t\t*page_break You realize he's a native. A Moon-born.\n\t\t\t\n\t\t\tLinda suggests that her time would be better spent elsewhere and before you have a chance to argue she's already gone.\n\n\t\t\tFrank makes himself comfortable at the bar.\n\t\t\t\n\t\t\tOn your right is a young woman with an eye patch who introduces herself as Regina Nooz. She takes a sip from her Fitz beer, glances at the players across the table then back at you, and grins mischievously. \"So,\" she says, \"You know how to play?\"\n\t\t\t\n\t\t\tWell, do you?\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Pfft. You kidding? My grammaw invented this game and taught it to me when I was knee-high to a Saturnian sand-flea\n\t\t\t\t\tThe room quiets. \"I hope you can pilot a spacecraft better than you can lie,\" Regina says. Seems like the other players were hoping for more from you.\n\t\t\t\t\t*set reputation %-5\n\t\t\t\t\t*goto startgame\n\t\t\t\t#Ahem. Uh. Er. Um. No, actually.\n\t\t\t\t\tSome of the other players laugh. \"After all that,\" Regina asks you, \"You don't even know how to play?\" She chuckles, but she's laughing with you, not at you - you think, anyway.\n\t\t\t\t\t*set reputation %+5\n\t\t\t\t\t*goto startgame\n\t\t\t\n\t\t\t*label startgame\n\n\t\t\tRegina continues, \"A full game can last two full Earth days, are you prepared for that?\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Whew. Well, I'm in this deep, may as well go all the way.\n\t\t\t\t\tYou grin sheepishly. \"Why not?\"\n\t\t\t\t\t\n\t\t\t\t\tThe room erupts in cheers and laughter.\n\t\t\t\t\t*set reputation %+15\n\n\t\t\t\t\tYou can't help but smiling; finally accepted by this group of thieves and miscreants - the sort of people you normally avoid. Yet here you are, welcoming, even desiring their acceptance and friendship.\n\t\t\t\t\t*goto startgame2\n\n\t\t\t\t#Two days! I want to be friendly, but that's unreasonable.\n\t\t\t\t\t*set reputation %-10\n\t\t\t\t\n\t\t\t\t\tYou have to politely decline, and are ready to leave embarrassed.\n\t\t\t\t\t*goto startgame2\n\t\t\t\t\t\n\t\t\t*label startgame2\n\t\t\tA motion on your left catches your attention: The man in blue makes some small gesture toward Regina. She nods almost imperceptibly and whispers to you, \"Red says you got other plans to get to.\"\n\n\t\t\t*if reputation > 65\n\t\t\t\tThen she puts her arm around you and, to the group, she shouts, \"This fish-liver is hereby an official member of the Pirate's Den.\"\n\t\t\t\t\n\t\t\tRegina looks at you and says, loudly, \"I know you have to be going.\" A few chuckles across the room. \"But I hope you don't forget us once you're gone.\" The room rises a bit with laughter and then everyone settles back into their respective games.\n\t\t\t\n\t\t\t*page_break Alright then...\n\t\t\t\n\t\t\tYou don't want to overstay the welcome you've received and you should get going, but you want to find out more about \"Red\", and these pirates could be good friends to have.\n\t\t\t\n\t\t\tYou push your chair back and make the motions that suggest you're getting ready to leave. You look to Regina and Red for cues about what's expected of you and Regina takes your arm to pull you back to the table. More quietly and gently than before she says, \"Stay for a couple of minutes. Why don't we teach you a little of this game so that you won't have to be embarrassed next time.\"\n\n\t\t\tWhat do you think, stay or go?\n\t\t\t*choice\n\t\t\t\t#Stay\n\t\t\t\t\tYou can't help but like this woman, and she clearly knows the mysterious stranger, making him seem less threatening than before. You jerk your chair back to the table and say, \"OK\"\n\t\t\t\t\t*goto cobble\n\t\t\t\t#Go\n\t\t\t\t\t\"I'm really sorry. I've stayed too long already. Thanks so much.\n\t\t\t\t\t*set reputation %-5\n\t\t\t\t\t*goto blueman\n\t\t\t\n\t\t\t*label cobble\n\t\t\t\n\t\t\tShe begins, \"The game of Cobbles is very old, yet is constantly evolving. Some say the game should never be played twice the exact same way.\"\n\t\t\t\n\t\t\t\"Usually, about a third of the rules are local house-rules and one new rule is supposed to be created each time you play, although that rule is itself sometimes changed or ignored. So as you travel around the System, you're likely to learn new variations that you can bring with you when you're back with friends.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t\"That said, there is one rule that is consistent in every game: you need a method to determine who goes first. Typically, whoever goes first has an advantage, so determining that has become something of a game in itself, that we here refer to as, \"Stardust\". And in fact, when we only have a few minutes to kill, we may spend it just playing Stardust a few times instead of getting into the bigger game.\"\n\n\t\t\t\"To play Stardust, you have three cards, labeled Sunshine, Moonshine, and Starshine. Sunshine beats Moonshine; Moonshine beats Starshine; but Starshine beats Sunshine. If you ever played Rock-Paper-Scissors as a kid, it's the same idea.\"\n\n\t\t\t\"Each of the two initial players selects one of the three cards without showing it. On the count of three, both players reveal which card they picked.\"\n\t\t\t\n\t\t\t*page_break Go on...\n\n\t\t\t\"The winner is the best out of three. Pretty simple, really. The only difference from what you may know is that ties go to the defender, which in this case is ol' Red, here.\"\n\n\t\t\t\"Ready?\" Regina gives each of you the three cards and you mull them over.\n\t\t\t*if teethclean = 1\n\t\t\t\tYou remember hearing about this game at the dentist but missed some of the crucial details.\n\n\t\t\t\"Go ahead. Select your card for the first round.\"\n\n\t\t\t*temp pick1\n\t\t\t*set pick1 \"\"\n\t\t\t*temp pick2\n\t\t\t*set pick2 \"\"\n\t\t\t*temp score\n\t\t\t*set score 3\n\n\t\t\t*choice\n\t\t\t\t#Sunshine (star > sun > moon)\n\t\t\t\t\t\"Un... Deux... Trois... Show!\"\n\n\t\t\t\t\t*set pick1 \"Sunshine\"\n\t\t\t\t\t*set score + 1\n\n\t\t\t\t\t\"Well done! Red picked Moonshine, which loses to your Sunshine. But we have two more rounds.\"\n\t\t\t\t\t*goto round2\n\t\t\t\t#Moonshine (sun > moon > star)\n\t\t\t\t\t\"Eins... Zwei... Drei... Show!\"\n\n\t\t\t\t\t*set pick1 \"Moonshine\"\n\t\t\t\t\t*set score - 1\n\n\t\t\t\t\t\"Red picked Moonshine as well. Sorry, this is a draw. The round goes to Red. But, you have two more rounds.\"\n\t\t\t\t\t*goto round2\n\t\t\t\t#Starshine (moon > star > sun)\n\t\t\t\t\t\"Uno... Dos... Tres... Show!\"\n\n\t\t\t\t\t*set pick1 \"Starshine\"\n\t\t\t\t\t*set score - 1\n\n\t\t\t\t\t\"Too bad. Red picked Moonshine, which beats Starshine. But, you have two more rounds.\"\n\t\t\t\t\t*goto round2\n\n\t\t\t*label round2\n\n\t\t\t\"Select your card for the second round.\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Sunshine (star > sun > moon)\n\t\t\t\t\t*set pick2 \"Sunshine\"\n\t\t\t\t\t*if pick1 = \"Sunshine\"\n\t\t\t\t\t\t\"Unu... Du... Tri... Show!\"\n\n\t\t\t\t\t\t\"Red picked Sunshine as well. Sorry, this is a draw. The round goes to Red.\"\n\t\t\t\t\t\t*set score - 1\n\n\t\t\t\t\t\t*if score = 1\n\t\t\t\t\t\t\t*goto losegame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t*elseif pick1 = \"Moonshine\"\n\t\t\t\t\t\t\"Fah... Bree... Sehn... Show!\"\n\n\t\t\t\t\t\t\"Well done! Red picked Moonshine, which loses to Sunshine.\"\n\t\t\t\t\t\t*set score + 1\n\n\t\t\t\t\t\t*if score = 5\n\t\t\t\t\t\t\t*goto wingame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t*elseif pick1 = \"Starshine\"\n\t\t\t\t\t\t\"Wa'... Cha'... Wej... Show!\"\n\n\t\t\t\t\t\t\"Too bad. Red picked Starshine, which beats Sunshine.\"\n\t\t\t\t\t\t*set score - 1\n\n\t\t\t\t\t\t*if score = 1\n\t\t\t\t\t\t\t*goto losegame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t*goto round3\n\n\t\t\t\t#Moonshine (sun > moon > star)\n\n\t\t\t\t\t*set pick2 \"Moonshine\"\n\n\t\t\t\t\t*if pick1 = \"Sunshine\"\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t\"Huq... Iskay... Kinsa... Show!\"\n\n\t\t\t\t\t\t\"Too bad. Red picked Sunshine, which beats Moonshine.\"\n\n\t\t\t\t\t\t*if score = 1\n\t\t\t\t\t\t\t*goto losegame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t*elseif pick1 = \"Moonshine\"\n\t\t\t\t\t\t\"Hun... Tzab... Ox... Show!\"\n\n\t\t\t\t\t\t\"Red picked Moonshine as well. Sorry, this is a draw. The round goes to Red.\"\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t*if score = 1\n\t\t\t\t\t\t\t*goto losegame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t*elseif pick1 = \"Starshine\"\n\t\t\t\t\t\t\"Cien... Uah... Paiste... Show!\"\n\n\t\t\t\t\t\t\"Well done! Red picked Starshine.\"\n\t\t\t\t\t\t*set score +1\n\n\t\t\t\t\t\t*if score = 5\n\t\t\t\t\t\t\t*goto wingame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t*goto round3\n\t\t\t\t#Starshine (moon > star > sun)\n\t\t\t\t\t*set pick2 \"Starshine\"\n\t\t\t\t\t*if pick1 = \"Sunshine\"\n\t\t\t\t\t\t\"Sinep... Tup... Rep... Show!\"\n\n\t\t\t\t\t\t\"Well done! Red picked Sunshine.\"\n\t\t\t\t\t\t*set score +1\n\n\t\t\t\t\t\t*if score = 5\n\t\t\t\t\t\t\t*goto wingame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t*elseif pick1 = \"Moonshine\"\n\t\t\t\t\t\t\"Bat... Bi... Hiru... Show!\"\n\n\t\t\t\t\t\t\"Too bad. Red picked Moonshine, which beats Starshine.\"\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t*if score = 1\n\t\t\t\t\t\t\t*goto losegame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t*elseif pick1 = \"Starshine\"\n\t\t\t\t\t\t\"Topinte... Kwilin... Ha'in... Show!\"\n\n\t\t\t\t\t\t\"Red picked Starshine as well. Sorry, this is a draw. The round goes to Red.\"\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t*if score = 1\n\t\t\t\t\t\t\t*goto losegame\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto round3\n\n\t\t\t*label round3\n\n\t\t\t\"Select your card for the third round.\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Sunshine (star > sun > moon)\n\t\t\t\t\t*if pick2 = \"Sunshine\"\n\t\t\t\t\t\t\"It... O... San... Show!\"\n\n\t\t\t\t\t\tRed picked Sunshine as well. Sorry, this is a draw. The round goes to Red.\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t*goto scoring\n\t\t\t\t\t*elseif pick2 = \"Moonshine\"\n\t\t\t\t\t\t\"Hitotsu... Futatsu... Mittsu... Show!\"\n\n\t\t\t\t\t\tWell done! Red picked Moonshine.\n\t\t\t\t\t\t*set score +1\n\t\t\t\t\t\t*goto scoring\n\n\t\t\t\t\t*elseif pick2 = \"Starshine\"\n\t\t\t\t\t\t\"Hana... Tul... Set... Show!\"\n\n\t\t\t\t\t\tToo bad. Red picked Starshine, which beats Sunshine.\n\t\t\t\t\t\t*set score -1\n\t\t\t\t\t\t*goto scoring\n\t\t\t\t\t*goto scoring\n\n\t\t\t\t#Moonshine (sun > moon > star)\n\t\t\t\t\t*if pick2 = \"Sunshine\"\n\t\t\t\t\t\t\"Ataqan... Alax... Qankus... Show!\"\n\n\t\t\t\t\t\tToo bad. Red picked Sunshine, which beats Moonshine.\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t*goto scoring\n\t\t\t\t\t*elseif pick2 = \"Moonshine\"\n\t\t\t\t\t\t\"Atausiq... Marluuk... Pingasut... Show!\"\n\n\t\t\t\t\t\tRed picked Moonshine as well. Sorry, this is a draw. The round goes to Red.\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t*goto scoring\n\t\t\t\t\t*elseif pick2 = \"Starshine\"\n\t\t\t\t\t\t\"Ateresex... Malrug... Pingeyug... Show!\"\n\n\t\t\t\t\t\tWell done! Red picked Starshine.\n\t\t\t\t\t\t*set score +1\n\n\t\t\t\t\t\t*goto scoring\n\t\t\t\t\t*goto scoring\n\t\t\t\t#Starshine (moon > star > sun)\n\t\t\t\t\t*if pick2 = \"Sunshine\"\n\t\t\t\t\t\t\"Moja... Mbili... Tatu... Show!\"\n\n\t\t\t\t\t\tWell done! Red picked Sunshine.\n\t\t\t\t\t\t*set score +1\n\n\t\t\t\t\t\t*goto scoring\n\t\t\t\t\t*elseif pick2 = \"Moonshine\"\n\t\t\t\t\t\t\"Eni... Eji... Meta... Show!\"\n\n\t\t\t\t\t\tToo bad. Red picked Moonshine, which beats Starshine.\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t*goto scoring\n\t\t\t\t\t*elseif pick2 = \"Starshine\"\n\t\t\t\t\t\t\"Kunye... Kubili... Kuthathu... Show!\"\n\n\t\t\t\t\t\tRed picked Starshine as well. Sorry, this is a draw. The round goes to Red.\n\t\t\t\t\t\t*set score -1\n\n\t\t\t\t\t\t*goto scoring\n\n\t\t\t*label scoring\n\t\t\t*if score > 3\n\t\t\t\t*goto wingame\n\t\t\t*elseif score \u003c 3\n\t\t\t\t*goto losegame\n\n\t\t\t*label wingame\n\n\t\t\tThat's it. You have 2 out of 3. You've won!\n\t\t\t\n\t\t\tYou're as surprised as the people around you. It's rare for a newbie to win at Stardust on the first try.\n\t\t\t\n\t\t\t\"Beginner's luck, looks like.\" Regina seems to not like the fact that you won, although some of the players sitting nearby watching seem impressed, and Red doesn't seem to care one way or the other.\n\t\t\t\n\t\t\t*goto washroom\n\n\t\t\t*label losegame\n\n\t\t\tThat's it. Red has 2 out of 3. You've lost!\n\t\t\t\n\t\t\tYou're humbled, but you can tell from the relaxed smiles on the faces around you that this kind of gentle hazing is part of the process of being accepted.\n\t\t\t*set reputation %+ 5\n\n\t\t\t*goto washroom\n\n*label washroom\n\n*page_break\n\nRegina turns her back on you and is soon involved in a deep, close conversation with her friend Polly Esther, who is inexplicably wearing roller skates. You feel it's time to leave. You stand and realize that Red has slipped away without you noticing.\n\nYou remind the group that you're looking to hire a co-pilot and stand by the doorway. Frank follows and waits with you.\n\nAfter a moment you feel a tug at your sleeve and turn to see Red beckoning you.\n\n\"Who is that guy?\" Frank asks.\n\n*choice\n\t#\"I don't know.\" You say. \"I can't keep playing games like this. We need to get going and I need to stay here to see if anyone's interested in signing on with me.\"\n\t\t*goto blueman\n\t#\"I saw him earlier. I think he may be a friend. We can't leave until Linda gets back anyway... can you chat people up here and see if anyone wants to join the crew?\"\n\t\t\"I need to find out what this guy's story is.\"\n\t\t\n\t\t*if franksmood > 50\n\t\t\t\"Aye aye, Cap'n,\" Frank grins.\n\t\t\t*goto redduck\n\t\t*else\n\t\t\t\"Whatever.\" Frank shuffles his feet and stares at the floor.\n\t\t\t*goto redduck\n\n\t\t*label redduck\n\n\t\t*set hours +1\n\t\tRed ducks into a utility closet and you follow.\n\n\t\t\"I have to apologize,\" he says, and you realize this is the first time you've heard him speak above a murmur. His voice is soft, but quite deep. \"Reg and I wanted to keep you occupied until the shift change so I could speak to you without anyone interrupting us.\"\n\n\t\tOn the far wall is a small sink with an air dryer next to it. Red turns on the dryer. \"To mask the sound, just in case.\"\n\n\t\t\"I'm glad you sat down at the game table back there,\" he continues, \"I didn't want to draw any attention to myself being seen with you, but had to get a message to you.\" Red says, his eyes darting back and forth between your face and the door, \"You seem like a decent person, so I don't want to...\"\n\n\t\t*page_break \"What? What's going on?\" You ask.\n\n\t\tRed says, \"That job on Ceres. There was a foul-up.\"\n\n\t\t\"Yes, there was.\" You affirm, \"I was there, but it wasn't my fault! I was trying to help!\"\n\n\t\t\"I don't know anything about the details, and I don't need to. Don't want to. But you know it cost a few people a lot of money.\"\n\n\t\t\"I suppose it must have.\" You had thought, or at least hoped, that the incident had blown away like the rest of your past.\n\n\t\t\"Those people are people who don't like losing money.\" Red continues.\n\n\t\t\"No one does.\"\n\n\t\t\"But these are people who have devoted their lives to amassing wealth. They don't forgive and forget.\"\n\n\t\t\"Red, not to be rude, but what exactly is your point?\"\n\n\t\t\"They're after you.\"\n\n\t\t*page_break \"What?\"\n\n\t\t\"Shh!\" Red points at the door, where you can hear someone moving. \"I've said too much here. I'll make sure the documents get to you.\"\n\n\t\tRed darts toward the door, exits and carefully closes the door behind him. You hear him talking with someone and then footsteps as they walk away.\n\n\t\t\"'Said too much'?\" You think. Didn't really say anything is more like it. \n\n\t\tYou don't hear anything. Red must have distracted the guard or janitor or whoever that was. On the other hand, what's his game? Is he trying to trap me?\n\n\t\tShould you make a quick exit back to the game room or wait a bit longer?\n\n\t\t*choice\n\t\t\t#Get back. I can't waste much more time trying to hire more crew.\n\t\t\t\tYou dash out and avoid being seen, you think. You make it back to the game room.\n\t\t\t\t*goto blueman\n\t\t\t#Stay. It may not be safe yet.\n\t\t\t\tYou wait a few moments until you can't hear anything at all outside the door when someone in a uniform throws the door open and sees you. \"You're not supposed to be in here! Who are you?!\"\n\n\t\t\t\tYou squeeze past him, apologizing, saying you were just looking for the washroom. You make it back to the game room.\n\n\t\t\t\t*set reputation %-5\n\t\t\t\t*set hours +1\n\t\t\t\t*goto blueman\n\n*label blueman\n\n*if franksmood > 50\n\tFrank beams as you walk in. \"I've found you some interviewees, Cap'n.\"\n\t\n\tHe gestures to a man and a woman standing next to him.\n\t*goto thebar\n*else\n\tFrank is back at the bar. You take your place at the doorway.\n\t*set hours +1\n\n\tIn time, a man and a woman stand and approach you.\n\t*goto thebar\n\n*label thebar\n*if whichbar = \"Pisces\"\n\n\tThe man epitomizes the word, \"strapping\", whatever that actually means. He looks familiar to you, although you've run across thousands of men like him over the years.\n\n\t\"Cargill,\" he says, and makes a point of squeezing your hand harder than necessary.\n\n\t*page_break\n\n\tYou begin asking him whether he knows anything about the Diogenes line of computers but he cuts you off.\n\t\n\t\"Nah.\" He says, pushing his shoulders back. \"I don't do tech support. I'm a pilot. If you need help navigating the 'roid field, I'm your guy. Otherwise you're wasting my time.\"\n\n\tHiring price is $75 up front and another $150 when the job is finished.\n\t\n\t*goto beltran\n\n*if whichbar = \"Capricorn\"\n\n\tThe man is nervous, well-dressed, and quiet.\n\n\t\"Anders,\" he says. He seems like a decent-enough guy, although you wouldn't want to have to rely on him in a fight.\n\t\n\t*page_break\n\n\t\"Computers,\" he says. \"That's what I studied. That's what I'm good at.\"\n\t\n\tYou ask about the Diogenes operating system and Anders' eyes widen.\n\t\n\t\"Why yes. In fact I was on the team that developed the Kernel for Diogenes 7.\"\n\n\tHiring price is $75 up front and another $150 when the job is finished.\n\n\t*goto beltran\n\n*label beltran\nThe woman is named Beleina. She's neither young nor old, and seems a bit more well-rounded than the guy; her skills are pretty much the same as yours. She can do just about anything, although not at an expert level. You feel that you would get along well on the trip.\n\nHiring price is $50 up front and another $100 when the job is finished.\n\nYou have $${money}\n\n*if money \u003c 75\n\tShoot. You can't afford the guy\n\t*if money \u003c 50\n\t\tor the woman.\n\n\tDo you want to call Jarvis and see if he can float you any more cash?\n\t*choice\n\t\t#\"We don't need it that badly,\" Linda says.\n\t\t\t*set lindasmood %+ 5\n\t\t\tYou wonder whether you'll have enough crew for the perils ahead and hope you made the right decision.\n\n\t\t\t*finish\n\t\t#\"Gee. Maybe we had better.\" Frank advises.\n\t\t\t*set franksmood %+ 5\n\t\t\t*set hours +2\n\t\t\t*set money +10\n\t\t\t*set reputation %-10\n\t\t\tYou take some time and find a place at the station where you can make a call to Jarvis's office on Earth.\n\t\t\t\n\t\t\tHe is not pleased, but you convince him to send another $100 of the advance. The call cost $10, so you're up $90.\n\t\t\t*goto hire\n\t\t\n*else\n\t*label hire\n\n\tWhat do you think? \n\n\t*choice\n\t\t*if (whichbar = \"Pisces\") and (money >= 75)\n\t\t\t#Hire Cargill the pilot\n\t\t\t\t*set sidekick \"Cargill\"\n\t\t\t\t*set money -75\n\t\t\t\t*set hours +1\n\t\t\t\tCargill slaps you on the shoulder and says he'll meet you at the docking bay in a couple of hours.\n\t\t\t\t*set skpiloting 87\n\t\t\t\t*set skcomputers 25\n\t\t\t\t*set skstrength 67\n\t\t\t\t*finish\n\t\t*if (whichbar = \"Capricorn\") and (money >= 75)\n\t\t\t#Hire Anders the computer whiz\n\t\t\t\t*set sidekick \"Anders\"\n\t\t\t\t*set money -75\n\t\t\t\t*set hours +2\n\t\t\t\tAnders bows slightly and says he'll meet you at the docking bay in an hour.\n\t\t\t\t*set skpiloting 25\n\t\t\t\t*set skcomputers 87\n\t\t\t\t*set skstrength 50\n\t\t\t\t*finish\n\t\t*if money >= 50\n\t\t\t#Hire Beleina the Jane-of-all-trades\n\t\t\t\t*set sidekick \"Beleina\"\n\t\t\t\t*set money -50\n\t\t\t\tBeleina shakes your hand and says she's ready to go and walks with you back to the docking bay.\n\t\t\t\t*set skpiloting 65\n\t\t\t\t*set skcomputers 65\n\t\t\t\t*set skstrength 65\n\n\t\t\t\t*finish\n\t\t#Forget it. Too expensive\n\t\t\t*set sidekick \"\"\n\n\t\t\t*finish\n\n", "landship": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n\nCHAPTER VII - TOUCHDOWN\n\n---\n\n*set hours +3\n\n*if sidekick != \"\"\n\tYou and ${sidekick} are getting along a little better now. Space travel sometimes feels like an interminable elevator ride.\n\t*if ship = \"Tortoise\"\n\t\tThe Tortoise is really roomy, so you can spend hours apart from the others where you don't even see or hear each other.\n\t\t*set lindasmood %+ 5\n\t\t*set franksmood %+ 5\n\t\t*goto flashes\n\t*else\n\t\tYou're at the helm for the few hours it takes to get to Zebulon, and ${sidekick} pretty much just stays in the galley. Linda and Frank keep to themselves.\n\t\t*goto flashes\n\n*label flashes\n\nYou're now close enough to the target to see the asteroid's outline through the window. It has an odd, egg-like shape, and it looks like there are human-made structures on either end.\n\nAs you near the asteroid, you see flashes appearing at both ends. Then you realize what's happening. Someone's firing on you!\n\nAnd this isn't any EMP blast, this is solid matter!\n\n*if sidekick != \"\"\n\t\"${sidekick}!\" You shout. \"Get up here!\"\n\t\n\t${sidekick} crawls into the co-pilot's seat.\n\nA few rounds hit the port-side stabilizer and the entire ship vibrates.\n*set damage +1\n\n*if shipstrength = 3\n\tYou mentally thank Jarvis for getting you the Tortoise. The bullets bounce off the hull like raindrops on a tin roof.\n\t\n\tYou manage to land right next to one of the structures you saw.\n\t*set distance 0\n\t*goto longwalk\n*elseif shipstrength = 2\n\t*set distance 1\n\t*set hours + 1\n\t\"Crud.\" Linda announces. \"The hull of the ${ship} can't take much of this. You're going to have to land, like, really soon.\"\n\t\n\tYou try to get as close as you can to the structures you saw, but the best you can do is about a kilometer away.\n\t*goto longwalk\n*else\n\t*set distance 2\n\t*set strength %- 5\n\t*set skstrength %- 5\n\t*set hours + 2\n\t\"Nuts.\" Linda announces. \"The hull of the ${ship} can't take this. You're going to have to do a hard landing, like RIGHT NOW.\"\n\t*if sidekick != \"\"\n\t\t${sidekick} starts shouting, \"Land! Land!\"\n\t\t*goto land\n\n\t*label land\n\tYou don't have any choice. You essentially just drop the ship where it is. You get banged up a bit but gather yourself together and see that you're a few kilometers from the structure.\n\n\t*if (piloting \u003c 65) and (skpiloting \u003c 65)\n\t\t*set damage +1\n\t\tThe ship is significantly damaged during landing.\n\t\t*goto longerwalk\n\n\t*goto longerwalk\n\n*label longerwalk\n\n*page_break Think happy thoughts...\n\nYou suit up and head out. Fortunately you're far enough away that nothing or nobody seems to be aware you're here. The gravity is so light that you can hop 20 meters in a single stride.\n\nIt's fun actually, to skip toward the structure, except as you get closer you realize you're not exactly alone anymore.\n\n*if sidekick != \"\"\n\tYou hear ${sidekick} making sniffing sounds. \"[This air smells used...]\"\n\n*label longwalk\n\n*finish\n", "navigateamongrobots": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n\nCHAPTER VIII - ROBOTS\n\n---\n*set hours +3\n\nYou're in the thick of it. You're surrounded by scores of robots. Most of them are equipped with drills and dragging carts behind them. But a few are armed. You aren't sure if these are the same things that had been firing on your ship.\n\nThe weapons seem to be some kind of slag-cannon. It's not practical to use bullets since the location is so far from any normal resupply route. And the point of the operation is to generate metal, not hurl it out into space. The solution is to use the slag - the byproduct of the smelting process - as the ammunition, essentially in computer-targeted catapults.\n\nNone of the robots seem to be bothering you. You're not even sure if they are aware you're there.\n\n*if sidekick != \"\"\n\t\"Maybe they only fire at vehicles,\" ${sidekick} says.\n\n*page_break\n\nFrank approaches one of the robots and taps it on the shoulder. The robot turns and a display reads across its chest, \"I think you ought to know I'm feeling very depressed. How I hate the night.\"\n\n\"Gort! Klaatu barada nikto!\" Frank shouts at it.\n\n\"Easy!\" Linda says. \"Don't antagonize them.\"\n\n*if havegun = 1\n\tYou have the EMP emitter in your pack, do you want to get it out?\n\t*choice\n\t\t#Yes\n\t\t\t\"Just to be safe.\" Linda says.\n\t\t\n\t\t\tYou pull out the emitter and suddenly a dozen robots with slag cannons and emitters of their own spin to face you and open fire. Get out of there!\n\t\t\t\n\t\t\tYou jump out of the way, dropping the emitter in the process. The robots continue firing at the emitter as it floats back to the surface of the asteroid.\n\t\t\t*set havegun 0\n\t\t\t*goto structure\n\t\t#No\n\t\t\t\"Best not to be perceived as a threat,\" Frank says.\n\t\t\t*goto structure\n*else\n\tYou wish you had brought that EMP emitter from Jebediah after all.\n\t*goto structure\n\n*label structure\n\n*if sidekick != \"\"\n\t${sidekick} says, \"You know, I never thought we'd get this far.\"\n\n\t\"Me neither,\" you reply.\n\n\t\"No, I mean... \"\n\t\n\t\"What?\"\n\t\n\t\"Never mind.\"\n\nYou carefully move toward the building...\n\n*finish", "navigatefield": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n\nCHAPTER VI - THE ASTEROID FIELD\n\n---\n\nWHAM!\n\n*set damage 0\n*temp newpiloting\n*if whopilot != \"you\"\n\t*set newpiloting skpiloting\n\t*goto smash\n*else\n\t*set newpiloting piloting\n\t*goto smash\n\n*label smash\n\nYou can barely see it until it's too late. \"It's some cloud of debris!\" Linda shouts from the scanner. \"The particles are too small and dispersed for the ship's radar to detect them!\"\n\nYou realize you're in the \"Hildas Gyre\" - a slowly rotating collection of garbage discarded from passing ships. You can just barely read the labels from the aluminum cans as they shoot past: \"Have you had your Fitz today?\"\n\nLinda shouts, \"The \"${shipname}\" is getting pelted with millions of pieces of space junk. Each bit is small, but they're moving so quickly that they could tear the hull to shreds!\"\n\n\"We need to get out of here!\" Frank yells.\n\n*if shipsteering = 1\n\tThe steering in these ${ship} ships wasn't designed to let you perform evasive actions like you're in now.\n\t*if shipspeed = 2\n\t\tBut at least the \"${shipname}\" is fast enough to avoid more damage.\n\t\t*if newpiloting > 70\n\t\t\t*set damage 0\n\t\t\t*goto damage0\n\t\t*elseif newpiloting > 60\n\t\t\t*set damage 1\n\t\t\t*goto damage0\n\t\t*elseif newpiloting > 50\n\t\t\t*set damage 2\n\t\t\t*goto damage0\n\t\t*else\n\t\t\t*set damage 3\n\t\t\t*goto damage0\n\t*else\n\t\tAnd the \"${shipname}\" is so slow that it can't accelerate quickly enough.\n\t\t*if newpiloting > 70\n\t\t\t*set damage 1\n\t\t\t*goto damage0\n\t\t*elseif newpiloting > 60\n\t\t\t*set damage 2\n\t\t\t*goto damage0\n\t\t*elseif newpiloting > 50\n\t\t\t*set damage 3\n\t\t\t*goto damage0\n\t\t*else\n\t\t\t*set damage 4\n\t\t\t*goto damage0\n*else\n\tThankfully the steering in these ${ship} ships was designed precisely for evasive actions like this one.\n\n\t*if shipspeed = 2\n\t\tAnd the \"${shipname}\" is fast enough to escape with minimal damage.\n\t\t*if newpiloting > 70\n\t\t\t*set damage 0\n\t\t\t*goto damage0\n\t\t*elseif newpiloting > 60\n\t\t\t*set damage 1\n\t\t\t*goto damage0\n\t\t*else\n\t\t\t*set damage 2\n\t\t\t*goto damage0\n\t*else\n\t\tBut the \"${shipname}\" is so slow that it can't accelerate quickly enough even when it's pointing in the right direction.\n\t\t*if newpiloting > 70\n\t\t\t*set damage 0\n\t\t\t*goto damage0\n\t\t*elseif newpiloting > 60\n\t\t\t*set damage 1\n\t\t\t*goto damage0\n\t\t*elseif newpiloting > 50\n\t\t\t*set damage 2\n\t\t\t*goto damage0\n\t\t*else\n\t\t\t*set damage 3\n\t\t\t*goto damage0\n\n*label damage0\n*if damage > 1\n\n\t\"\u003cWARNING> \u003cWARNING> \u003cWARNING>\"\n\n\t*goto damage0b\n*label damage0b\n\n*if shipstrength = 2\n\tFortunately, the reinforced bulkheads protect the ${ship} from the worst of the potential damage.\n\t*set damage -1\n\t*goto damage2\n*else\n\tThe lack of reinforced bulkheads on the ${ship} mean some of the particles tear through the hull.\n\t*goto damage2\n\n*label damage2\n*page_break\n*if damage > 2\n\n\t\"\u003cALERT!> \u003cALERT!> \u003cALERT!>\"\n\n\t*goto damage2b\n*label damage2b\n*set hours +damage\n\n*if damage \u003c 0\n\t*set lindasmood %+ 15\n\t*set franksmood %+ 10\n\t\"Wow!\" Frank is impressed. \"How did you do that?\"\n\t\n\t\"Yeah,\" Linda agrees. \"If anything, the ship is in better shape now than before the dust storm.\"\n\t*goto damage3\n*elseif damage = 0\n\t*set lindasmood %+ 10\n\t*set franksmood %+ 5\n\t\"How about that,\" Frank says. \"The flight training paid off. We had enough piloting skill to avoid any damage.\"\n\t*goto damage3\n*elseif damage = 1\n\t*set lindasmood %+ 5\n\t\"We should have either spent more time with the flight simulator or gotten a better ship,\" Linda assesses. \"We weren't able to avoid minimal damage to the ship, although it is nothing that will prevent us from continuing.\"\n\t*goto damage3\n*elseif damage = 2\n\t\"We should have either spent more time with the flight simulator or gotten a better ship,\" Linda scolds. \"The ${ship} sustained significant damage. We can continue, but you may want to drop anchor to examine the condition of the ship.\"\n\t*choice\n\t\t#\"We should drop anchor,\" Linda says.\n\t\t\t*set lindasmood %+ 5\n\t\t\t*set franksmood %- 5\n\t\t\t*goto assess\n\t\t#\"Let's just go,\" Frank says.\n\t\t\t*set lindasmood %- 5\n\t\t\t*set franksmood %+ 5\n\t\t\t*goto damage3\n*elseif damage = 3\n\t*set lindasmood %- 5\n\t\"The ship is nearly wrecked,\" Linda hisses at you. \"We need to drop anchor and asses the damage.\"\n\t*goto dropanchor\n*elseif damage = 4\n\t*set lindasmood %- 10\n\t*set franksmood %- 5\n\tThe ship is totaled. You quickly suit up as the oxygen hisses out of the cockpit. You need to request assistance. You're lucky to be alive.\n\t*goto drift\n\n*label dropanchor\n*set hours +1\n\n*if damage = 3\n\tThe ship computer is able to lock onto a nearby asteroid,\n\t*if piloting > 67\n\t\tand you're able to position the ship and land it.\n\t\t*goto anchor\n\t*else\n\t\tbut you're unable to position the ship without damaging it further.\n\t\t*set damage +1\n\t\t*goto anchor\n\n\t*label anchor\n\t*set hours +1\n\n\t*if sidekick != \"\"\n\t\t*if ((strength > 75) or (skstrength > 75)) or ((rstrength > 75) or (hstrength > 75))\n\t\t\tYour crew and you are able to manually lower the anchor and attach it to the surface of the asteroid.\n\t\t\t*goto assess\n\t\t*else\n\t\t\tNeither you nor anyone in the crew are strong enough to manually lower the anchor and attach it to the surface of the asteroid.\n\t\t\t\n\t\t\tThe asteroid passes by below the ship. You missed your opportunity and are now drifting.\n\t\t\t*goto drift\n\t*else\n\t\t*if ((strength > 75) or (rstrength > 75)) or (hstrength > 75)\n\t\t\tYour crew and you are able to manually lower the anchor and attach it to the surface of the asteroid.\n\t\t\t*goto assess\n\t\t*else\n\t\t\tNeither you nor anyone in the crew are strong enough to manually lower the anchor and attach it to the surface of the asteroid.\n\n\t\t\tThe asteroid passes by below the ship. You missed your opportunity and are now drifting.\n\t\t\t*goto drift\n\n*label assess\n*set hours +1\n\n*if damage = 3\n\tYou have no choice but to spend a full day getting the ${ship} so it's at least able to take off, land, and not leak oxygen. There is still damage, however.\n\t*set damage 2\n\n*if damage = 2\n\tThe damage is significant, although you could probably get to Zebulon without incident.\n\t*choice\n\t\t#Linda is insistent, \"Captain, what are you thinking? We have to repair the damage!\"\n\t\t\t*set lindasmood %+ 5\n\t\t\t*temp repair1\n\t\t\t*temp repair2\n\t\t\t*temp repair3\n\t\t\t*temp repair4\n\t\t\t*temp repair5\n\t\t\t*set repair1 (piloting + strength)\n\t\t\t*set repair2 (computers + skpiloting)\n\t\t\t*set repair3 (skstrength + skcomputers)\n\t\t\t*set repair4 (repair1 + repair2)\n\t\t\t*set repair5 (repair4 + repair3)\n\t\t\t\n\t\t\t*if repair5 > 400\n\t\t\t\t*if sidekick != \"\"\n\t\t\t\t\tYou and ${sidekick} have a knack for repairs and are able to make the ${ship} space-worthy in a few hours.\n\t\t\t\t\t*set hours +5\n\t\t\t\t\t*set damage 0\n\t\t\t\t\t*goto damage3\n\t\t\t\t*else\n\t\t\t\t\tYou have a knack for repairs and are able to make the ${ship} space-worthy in about half a day.\n\t\t\t\t\t*set hours +11\n\t\t\t\t\t*set damage 0\n\t\t\t\t\t*goto damage3\n\t\t\t*elseif repair5 > 350\n\t\t\t\t*if sidekick != \"\"\n\t\t\t\t\tYou and ${sidekick} manage to work together well and are able to make the ${ship} space-worthy in several hours.\n\t\t\t\t\t*set hours +9\n\t\t\t\t\t*set damage 0\n\t\t\t\t\t*goto damage3\n\t\t\t\t*else\n\t\t\t\t\tYou manage to figure out what to do and are able to make the ${ship} space-worthy in about a day.\n\t\t\t\t\t*set hours +23\n\t\t\t\t\t*set damage 0\n\t\t\t\t\t*goto damage3\n\t\t\t*else\n\t\t\t\t*if sidekick != \"\"\n\t\t\t\t\tNeither you nor ${sidekick} are shipwrights and neither of you have a knack for repairs. It takes a full day to get the ship space-worthy.\n\t\t\t\t\t*set hours +24\n\t\t\t\t\t*set damage 1\n\t\t\t\t\t*goto damage3\n\t\t\t\t*else\n\t\t\t\t\tYou are not a shipwright, and you don't have a knack for repairs. It takes two full days to get the ship space-worthy.\n\t\t\t\t\t*set hours +48\n\t\t\t\t\t*set damage 1\n\t\t\t\t\t*goto damage3\n\n\t\t#Frank is equally insistent, \"Oh man. What are we doing?! Let's just get going!\"\n\t\t\t*set lindasmood %- 5\n\t\t\t*goto damage3\n\n\n*else\n\n*label drift\n*set hours +168\n*set strength %- 30\n*set skstrength %- 30\n\nYou manage to get the radio working and begin sending out distress calls. Unfortunately, the Earth and Moon are on the other side of the Sun and you're not able to communicate directly with anyone there.\n\nYou eventually are able to get a message through to the Lunar Guard station on Phobos, who relays the message to Jarvis, back on Earth.\n\n*page_break\n\nIt takes a full day to get confirmation from him via text message:\n\n\u003c\"WHAT IN THE NAME OF ALL THAT IS PURE AND GOOD ARE YOU DOING?!\">\n\n\u003c\"HOW DID YOU MANAGE TO MESS THIS UP SO BADLY?!\">\n\n\u003c\"I'll get a replacement ship out to you when I can. AND THE COST IS COMING OUT OF YOUR PAYMENT!\">\n*set money -1000\n\nYou don't know how long it will take, but it has to be at least five days before a replacement can get to you.\n\n*if sidekick != \"\"\n\tYou and ${sidekick} are pretty much ready to kill each other at this point. You simmer for a while, trying to remain civil, but burst out every now and then. The exchanges are all almost exactly like this:\n\t\n\t*set reputation %- 10\n\tYou, \"How could you have let this happen?!\"\n\n\t${sidekick}, \"ME?! YOU'RE the captain! This is all YOUR fault!\"\n\n\tetc.\n\n\t*goto rescue\n\n*label rescue\n*page_break\n*set hours + 72\nFinally, after days have passed, the ship radio begins pinging. You're being hailed. Rescue!\n\n\"{Hailing ${ship}-class ${shipname}} {This is Captain Flip of Flabbergassed towing and hauling} {We have a drop off for one Nelson Jarvis.}\"\n\n\"Hello! Yes, Jarvis said you'd be coming.\"\n\n\"{Wait} {What?} {My paperwork says Jarvis will be signing the form...}\"\n\nUgh. \"No! I mean, no. Jarvis is my dispatcher, he called in the new ship from his office. The ship is for me...\"\n\n\"{And who are you?}\"\n\nYou identify yourself\n*if sidekick != \"\"\n\tand ${sidekick}\nand explain your situation.\n\n\"{Hold on.} {You're not in our records.} {I'll dock and we can go through it.}\"\n*page_break\n\nThe Flabbergassed is huge, absurdly large, insanely enormous. You had thought you would discuss matters at your end but you realize it makes much more sense to go over there. You can already tell that his ship has artificial gravity, so you'll be able to sit and stand normally.\n\nYou work though the details of docking with Captain Flip. The vidscreen is broken but you realize that he's Myron Flip, the same guy who flipped you off in his Marlin all those days ago.\n\nWell, can't let petty thoughts cloud the issues at hand.\n\nHow do you want to handle this?\n\nYou think you have some coffee left in the galley; some REAL coffee. You could take some over. That would be a nice gesture. After all, he made a long journey because you messed up.\n\nOn the other hand, these jerko types tend to walk all over anyone who shows submissive behavior. Don't give him any gifts! He's being paid. He's late. And he's a jerk!\n\nBut whatever. It's been a long week. One of the longest you've ever had. There's no advantage in trying to manipulate the guy or take out your grievances with him. Just be helpful and friendly. You imagine this guy just wants to get a move on as soon as he can. Maybe you should prepare a joke or two.\n\nSo what do you want to do?\n\n*if sidekick != \"\"\n\t*choice\n\t\t#\"Maybe take him some coffee?\" Frank says.\n\t\t\t*set reputation %+5\n\t\t\t*goto myron\n\t\t#\"Give him what-for!\" ${sidekick} advises.\n\t\t\t*set reputation %-20\n\t\t\t*goto myron\n\t\t#\"Just organize all the paperwork on your end,\" Linda advises.\n\t\t\t*set reputation %+20\n\t\t\t*goto myron\n*else\n\t*choice\n\t\t#\"Maybe take him some coffee?\" Frank says.\n\t\t\t*set reputation %+5\n\t\t\t*goto myron\n\t\t#\"Just organize all the paperwork on your end,\" Linda advises.\n\t\t\t*set reputation %+20\n\t\t\t*goto myron\n\n*label myron\n\nYou enter Myron's ship and gradually feel your way to the area where the artificial gravity is more stable.\n\nYou're in the hangar, where ships and surface vehicles are kept. You see some robotic drones equipped with drills for mining missions and some submersible units that must be intended for the icy seas of Europa.\n\nMyron approaches and has no interest in you whatsoever. You look at his face and realize that maybe he's not the guy you thought he was.\n\n\"Hey. Uh. Do you ride a Marlin?\" you ask.\n\nHe doesn't look up from his clipboard. \"Those death-traps? No way.\"\n\n\"Were you on your way to Luna about a week ago?\"\n\n\"Nope.\"\n*page_break\n\n\"Your name is Myron Flip isn't it?\"\n\n\"Yep. Common name, though.\"\n\nYou stand in silence as Myron flips through the papers on his clipboard.\n\n*if reputation > 60\n\t\"You know. I don't see your name on here, but you're stranded, and you obviously know this Jarvis guy.\" Myron gives you a big smile. \"Just sign here, and if the powers that be don't like it they can come and take care of it themselves. How about that?\"\n\n\t*goto signing\n*elseif reputation > 50\n\t\"OK. Got it.\" Myron hands you a form to sign. \"Didn't see it before. Sorry 'bout that.\"\n\n\t*set hours +1\n\t*goto signing\n*elseif reputation > 40\n\t\"I just don't see you on here. I'm going to have to call this in.\"\n\t\n\tIt takes hours for Myron to get a signal, and then for his dispatcher to get a hold of Jarvis and then get back to Myron.\n\n\t*set hours +7\n\t*goto signing\n*else\n\t\"I just don't see you on here. You know it's cruel to guys like me to drag us all the way out here just to get a free ship. So long and good luck\"\n\t\n\tDespite your protests, Myron leaves you drifting and you have to spend hours getting a hold of Jarvis, explaining the situation.\n\t\n\tIt's days later before Myron returns and hands you the paperwork without saying a word.\n\n\t*set hours +50\n\t*goto signing\n\n*label signing\n\nHe finally gets all the forms in order and hands you the keys to your new ship.\n\nThe ship is a Tortoise-class. A sticker on the inside of the window reads \"PB & J\". It makes the Pengo look like a Marlin, but is built to be nigh-indestructable. Looks like Jarvis doesn't trust your piloting skills anymore.\n\n*if sidekick != \"\"\n\t\"That guy totally rides a Marlin.\" $sidekick is still in a foul mood after everything that happened today, but is starting to get out of it.\n\n\t\"What do you mean?\"\n\n\t\"I heard you talking about that with him. But all over his cockpit he has Marlin magazines and sticker
