s and over his chair is a leather jacket with the Marlin X50 logo on it.\"\n\n\t\"That's weird.\"\n\nYou get your supplies moved over to the new ship and begin takeoff procedures.\n\n*set ship \"Tortoise\"\n*set shipname \"Loaner #3\"\n*set shipspeed 0\n*set shipsteering 0\n*set shipstrength 3\n\n*label damage3\n\nYou do a quick check of all the controls and all the lights on the panel seem to blink when they're supposed to, and not blink when they're not.\n\nYou get under way.\n\n*if ship = \"Tortoise\"\n\n\tYou look in the ample glove compartment and see a portable vidscreen with a paper note taped to it.\n\n\t*page_break You read the paper:\n\n\t\"Captain, I hope this finds you well. Regina and some of the other 'pirates' were able to find this evidence that we thought you should see. - Regards, Red (a friend)\"\n\n\tYou check to make sure you're alone and turn on the vidscreen. You see Nelson Jarvis' face. It's been so long you've seen him in person you almost don't recognize him.\n\n\tThe audio is garbled. It looks like a poorly-compressed copy of an original, and an incomplete one at that.\n\n\tYou are able to make out Nelson's voice say: \"...after the Ceres debacle...sue Asmico...all the blame...you dead...my idea...understand what they...after you landed...goodbye...end like this...\"\n\n\t*goto fin\n\n*label fin\n\nYou anxiously await what happens on Zebulon.\n\n*finish\n", "quit": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\"I can't stand that guy,\" you say to yourself. You turn off the phone and see what new videos are available.\n\n*goto_scene ending", "rebootcomputer": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n\nCHAPTER X - THE COMPUTER\n\n---\n\n*comment video\n*set deadline (150 - hours)\n\nFrank wanders around the room while you and Linda look at the computer.\n\n\"Hey, what's this do?\" he says, pointing to a large switch on the wall.\n\n*choice\n\t#\"Flip it and see.\"\n\t\tThrough one of the small windows in the bunker you see a red light begin blinking in the distance.\n\t\t\n\t\t*if marooned = 0\n\t\t\t*set marooned 1\n\t\t\tSoon you see thousands of robots mobilize their slag cannons, firing tons of rocky debris toward your ship. By the time you realize what is happening, your ship is in a billion pieces.\n\n\t\t\t\"Shiminy,\" says Frank.\n\t\t\t*goto video\n\t\t*else\n\t\t\tSoon you see thousands of robots mobilize their slag cannons. They seem to congregate where your ship had been parked. They sit there for a few minutes, then the red light stops blinking and the robots go back to work.\n\t\t\t*goto video\n\n\t#\"Leave it.\"\n\t\tThe shiny, red, candy-like switch remains untouched.\n\n\t\t*goto video\n\n*label video\n\nA few moments later, Frank is poking around under a tarpaulin. \"Hey. Why do you think there are so many explosives here?\"\n\n\"I don't know,\" Linda says. \"Could you just be quiet?\"\n\n*temp comps\n*if sidekick = \"Anders\"\n\t*set comps (300 - ((computers + hcomputers) + skcomputers))\n\t\"That is odd to have explosives inside where the drones can't access them.\" Anders says. \"They must be a reserve or something.\n\n\tHe turns his attention back to the computer. \"This should be easy. It aint rocket surgery.\"\n\t*goto turnon\n*else\n\t*set comps (300 - (computers + hcomputers))\n\t*goto turnon\n\n*label turnon\nIn the end it takes you all ${comps} minutes to figure out how to turn on the computer.\n*set hours +2\n\nFrank speaks up again. \"Hey, those robots out there seem to be working fine. Why do we need to fix the computer?\"\n\n\"Ugh. I don't know!\" says Linda. \"You want that bonus, don't you?\"\n\nFrank looks at his watch.\n\n*if hours \u003c 150\n\t\"Wow,\" Frank says. \"We can still beat the deadline with ${deadline} hours to spare!\"\n\t*goto video2\n*else\n\t\"Well,\" Frank says. \"It's taken us ${hours} hours to get here. There's no way we can collect that bonus.\"\n\t\n\t\"What?\" Linda says. \"What should we do?\"\n\t\n\t*choice\n\t\t#\"We came here to do a job. Let's do it!\"\n\t\t\t*set reputation %+ 5\n\t\t\t*goto video2\n\t\t\n\t\t#\"Destroy this stupid computer! That'll show 'em!\"\n\t\t\t*goto destroy\n\t\t\n\t\t#\"Let's just get out of here. I quit!\"\n\t\t\t*set reputation %- 5\n\t\t\t*goto video3\n\n*label video2\n\n*page_break\n\nYou finally get the computer working. \"Viola! We did it!\"\n\nOnce the computer boots, you see message prompting you to play a video.\n\n*if sidekick != \"\"\n\t${sidekick} peers over your shoulder. \"What's that?\"\n\t*goto launch\n*else\n\tFrank peers over your shoulder. \"What's that?\"\n\t*goto launch\n\n*label launch\n\nLinda launches the video, which shows Nelson Jarvis' face and begins in the middle of a sentence: \"...that after the Ceres debacle, Atlas was planning to sue Asmico and the only way Asmico could get out of it was to pin all the blame on you, which would be easier with you dead. I just wanted you to know this wasn't my idea. I didn't even understand what they were planning for you until after you landed at Pisces. I guess this is goodbye. I'm sorry it had to end like this.\"\n\n\"Hunh?\" Frank says.\n\n*if sidekick = \"Beleina\"\n\t\"That's him.\" says Beleina. \"That's the guy who wanted me to sabotage your mission.\"\n\n\"Wait. Look!\" Linda points to a timer on the computer monitor. \n\nFor the first time you notice wires running from the computer to the tarpaulin.\n\n\"Shoot.\" You say.\n\n*choice\n\t#\"Destroy the computer!\"\n\t\t*goto destroy\n\t#\"Run!\"\n\t\t*goto video3\n\n*label destroy\n*set reputation %- 10\n*set compdestroyed 1\n\nYou all take turns gleefully smashing the computer to smithereens. You really take the time to enjoy yourself, using muscles in your shoulders that you don't often use.\n\nThe computer makes pitiful beeping noises and then it plays an audio file, \"It won't be a stylish marriage, I can't afford a carriage. But you'll look sweet upon the seat of a bicycle built for two...\"\n\nAfterward, as you all breathlessly smile at each other in a congratulatory way, Linda pulls at the wires under the tarp. \"Hey look, they weren't actually connected.\"\n\n*if sidekick = \"Beleina\"\n\tBeleina sheepishly mutters. \"I was supposed to do that.\"\n\n\t\"But then you would have been killed with us.\" Frank says.\n\n\t\"I was going to steal your ship.\"\n\n\t\"Oh. Well, thanks.\"\n\n*if sidekick = \"Cargill\"\n\tCargill hangs his head. \"Gee whiz. I'm awful sorry I got you nice people into this mess.\"\n\t\n\tFrank pats him on the shoulder. \"That's OK.\"\n\n\"That's it. Let's get out of here.\"\n\n*label video3\n\n*if marooned = 1\n\t*comment get a hold of Myron\n\n\t\"We can't go anywhere without a ship,\" Linda wails. \"We need help!\"\n\n\t*goto myron\n\n*else\n\tYou make it back to the ${ship}, make some repairs, and take off.\n\t\n\t*if sidekick != \"\"\n\t\t${sidekick} sleeps the entire trip back to the Moon.\n\t\n\tIn the galley, Frank makes some ramen. \"Well Cap'n. That was fun. What do you want to do tomorrow?\"\n\n\t*goto myron\n\n*label myron\n*page_break\n\n\"Captain,\" Frank says suddenly, \"We're being hailed. The signal is strong. The ship must be close.\"\n\n*if compdestroyed = 1\n\t\"It's Myron Flip!\"\n\n\t\"Oh great.\" Linda says.\n\n\t\"Put him on, Frank.\"\n\n\t\"\u003cHeyyo, Captain.>\"\n\n\t\"Mister Flip. I must say it's good to hear your voice.\"\n\n\t*if reputation > 50\n\t\t*comment Myron makes a point of helping you, saying Regina is an old friend and she asked him to look out for you.\n\n\t\t\"\u003cI've been keeping close. Turns out we have some friends in common. Red sends his regards.>\"\n\n\t\t\"Red?\" You muse.\n\n\t\t\"\u003cI've got a hot shower, dry bunks, and some real Earth food up here. I'll be there in a few minutes.>\" Myron sounds happy to be speaking with you.\n\n\t\tMyron signs off and you and your crew get ready to leave and meet up with him.\n\n\t\tIt's been a very long day and you look forward to a long sleep.\n\n\t\t\"Who's Red?\" Linda asks.\n\n\t\t*goto end\n\n\t*else\n\t\t*comment he grudgingly helps you\n\n\t\t\"\u003cYeah. I'm only doing this as a favor for someone else. I don't know why, but you have friends out there. Red sends his regards.>\"\n\n\t\t\"Red?\" You muse.\n\n\t\t\"\u003cI'll be there in a few hours.>\" Myron mumbles. \"\u003cBy the way, Atlas is pretty upset about their computer.>\"\n\n\t\tMyron signs off and you and your crew get ready to leave and meet up with him.\n\n\t\tIt's been a very long day and you look forward to a long sleep.\n\n\t\t\"Who's Red?\" Linda asks.\n\n\t\t*goto end\n*else\n\t*label atlas1\n\t\"It's someone from Atlas Consolidated!\" Frank says.\n\n\t\"Ahoy.\" You say.\n\n\t\"\u003cAhoy Captain>\" the rich and mellow voice booms over the speaker, \"\u003cI wanted to congratulate you personally on a job well done.> \u003cThis is Sam Atlas, President of my family's business.> \u003cI have come to learn of the betrayal your employer had planned and I am glad you made it through.>\n\n\t*if marooned = 1\n\t\t\"\u003cWe have a ship en route to you with hot food and showers, as a sign of our gratitude and good will toward you.>\"\n\n\t*if hours \u003c 150\n\t\t\"I believe we have just completed the quest.\"\n\n\t\t\"\u003cWe have your payment ready and are transferring the full amount, plus the agreed bonus, into your account.>\"\n\n\t\t*goto atlas\n\t*else\n\t\t\"I'm sorry we weren't able to complete the mission in time.\"\n\n\t\t\"\u003cWe shan't be paying the bonus, but the rest of your payment is ready and we are transferring it into your account.>\"\n\n\t\t*goto atlas\n\t*label atlas\n\n\t\"\u003cPlease visit one of our offices after you've returned to Luna and we can discuss working together again.>\"\n\t*goto end\n\n*label end\n\n*finish", "rentship": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n*temp fromplace\n*set fromplace \"Pisces\"\n\nCHAPTER III - THE SHIPYARD\n\n---\n\nNow for a ship...\n\n\"We need to figure out how we're going to get to Zebulon.\" You tell your crew. \"Should we take the time to shop around for a better ship or just keep the Pengo?\"\n\nFrank is peering at a map on the wall. \"Looks like there's a shipyard here at Pisces Station, and another at Capricorn Station.\"\n\nLinda steps up. \"'Cap' \", as it's called, is renowned for the quality of merchandise, culture, and people. Even some Earth residents make a point of shopping at Cap' Station. However, Capricorn Station will take several hours to reach by surface monorail.\"\n\n\"Well...\" you begin.\n\n*temp fuelcost\n*set fuelcost ((100 - fuel) / 2 ) \n\n*choice\n\t#Linda speaks up. \"We should just keep the Pengo and get going...\"\n\t\tTime is of the essence, and this Pengo has been adequate so far\n\t\t*goto gasup1\n\t#\"... but if you're committed to buying something, save time and just go to the Pisces Station shipyard here.\"\n\t\t*set hours +2\n\t\t*temp totalhave\n\t\t*set totalhave (money + shipvalue)\n\t\t*label pisces\n\n\t\tThe dealer here has three ships in your price range:\n\n\t\t\"A Rhino-class ship - Built to be sturdy, although not particularly fast or maneuverable, it's still a step up from a Pengo.\"\n\n\t\t\"A Dragonfly-class ship - Dragonflies handle as well as (fans would say better than) any other ship in the sky, although they're not the fastest, and make sure you don't get in a collision while flying one.\"\n\n\t\t\"A Springbok-class ship - This ship is essentially a rocket with a cockpit, it'll get wherever it's headed in no time, but even I have to admit that the steering is 'disappointing'.\"\n\n\t\t*page_break\n\n\t\tYou discuss options with your crew. \"Fuel costs $1 per kilogram...\"\n\t\t\n\t\t\"The Metric System works!\" Linda blurts.\n\t\t\n\t\t\"...and it will take a full fueling to get to Zebulon and back. The Pengo has a smaller tank but doesn't burn through as much fuel as the larger ships.\"\n\n\t\t\"We have $${money},\" Linda says, \"and we can trade in the Pengo for an additional $${shipvalue} for a total of $${totalhave} available to spend.\"\n\n\t\t\"These ships each cost $500. Fueling any of them would cost $15. Filling the Pengo's fuel store would cost... uh, carry the 1... $${fuelcost}.\"\n\n\t\tFrank is still excited about the possibilities at Capricorn Station and enquires about ground transportation there.\n\t\t\n\t\t\"The last time I went there it took most of a day,\" Linda says.\n\t\t\n\t\t\"Unfortunately the rail union began a strike this morning,\" says the dealer, \"and every other option for getting to Cap' is going to cost maybe $1,200 for the three of you and take at least two days.\"\n\t\t\n\t\t\"Oh well,\" you say. \"Thanks anyway. I guess these four are our options.\"\n\n\t\t*choice\n\t\t\t#Keep the Pengo. \"You know where I stand,\" says Linda\n\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\"Cheapskate.\" The dealer grumbles as you walk out of the shipyard\n\t\t\t\t*goto gasup1\n\t\t\t#Get the Springbok for $500. Frank likes this one. \"Speed isn't just cool, it's really a safety feature.\"\n\t\t\t\t*set hours +1\n\t\t\t\t\"Fast as the wind.\" The dealer gladly takes your money.\n\n\t\t\t\t\"I knew a pilot who flew a Springbok just like this one.\" The dealer continues, \"She was dropping 'bots off at the southern pole of Mercury. You know what the heat and cosmic radiation is like that close to the Sun. Her Springbok meant she could get in and out without having to spend any more time than necessary.\"\n\n\t\t\t\t*set fuelcost 15\n\t\t\t\t*set ship \"Springbok\"\n\t\t\t\t*set money -500\n\t\t\t\t*set money +shipvalue\n\t\t\t\t*set shipvalue 400\n\t\t\t\t*set shipspeed 2\n\t\t\t\t*set shipsteering 1\n\t\t\t\t*set shipstrength 1\n\t\t\t\t*goto nameship1\n\t\t\t#Get the Rhino for $500. Linda advises, \"If you feel compelled to spend money, this is probably the best bet.\"\n\t\t\t\t*set hours +1\n\t\t\t\t\"Tough as nails.\" The dealer gladly takes your money.\n\t\t\t\t\n\t\t\t\t\"I knew a pilot who flew a Rhino just like this one.\" The dealer continues. \"She was running freight between Phobos, orbiting Mars and Io, orbiting Jupiter. Other pilots would have chosen to go over or under the 'roid belt, but she went right though. Probably once a month or so. Got pretty dinged up from all the collisions, but the hull never breeched.\"\n\n\t\t\t\t*set fuelcost 15\n\t\t\t\t*set ship \"Rhino\"\n\t\t\t\t*set money -500\n\t\t\t\t*set money +shipvalue\n\t\t\t\t*set shipvalue 400\n\t\t\t\t*set shipspeed 1\n\t\t\t\t*set shipsteering 1\n\t\t\t\t*set shipstrength 2\n\t\t\t\t*goto nameship1\n\t\t\t#Get the Dragonfly for $500. Frank and Linda seem equally impressed by this one.\n\t\t\t\t*set hours +1\n\t\t\t\t\"Steers like a dream.\" The dealer gladly takes your money\n\n\t\t\t\t\"I knew a pilot who flew a Dragonfly just like this one.\" The dealer continues. \"He was delivering supplies to the asteroid Pallas and had no choice but to navigate that 'roid field. He was a skilled pilot, but it was the handling of his Dragonfly that kept him out of trouble.\"\n\n\t\t\t\t*set fuelcost 15\n\t\t\t\t*set ship \"Dragonfly\"\n\t\t\t\t*set money -500\n\t\t\t\t*set money +shipvalue\n\t\t\t\t*set shipvalue 400\n\t\t\t\t*set shipspeed 1\n\t\t\t\t*set shipsteering 2\n\t\t\t\t*set shipstrength 1\n\t\t\t\t*goto nameship1\n\n\t\t*label nameship1\n\n\t\tWould you like to name your new ship?\n\t\t*input_text shipName\n\n\t\tFrank is pleased. \"The ${ship}-class starship, '${shipName}'. Flabulous!\"\n\n\t\t\"Let's fill 'er up,\" Linda says.\n\n\t\t*set fuel 100\n\n\t\t*label gasup1\n\n\t\tYou need $${fuelcost} worth of fuel and have $${money}.\n\t\t*set money -fuelcost\n\n\t\t*if fuelcost > money\n\t\t\tWhoops. You get on the horn with Jarvis and ask him to advance you another $50. Not a big deal but it takes hours to get a hold of him and for the transfer to get through.\n\t\t\t*set money +50\n\t\t\t*set hours +5\n\t\t\t*set reputation %-5\n\n\t\tYou chat with the fuel attendant a bit about your mission, although you keep a number of the details private. You never know...\n\n\t\tHe doesn't seem all that interested, but advises you to pop into Bennie's and find a co-pilot. \"I don't care if you're in a Chimera with a Diogenes 9 running your on-boards; landing on a mid-size 'roid is awful tricky.\"\n\n\t\tThe attendant has a point, after all, you've never landed this type of craft on an asteroid.\n\n\t\tWhat do you think?\n\n\t\t*choice\n\t\t\t#Frank is looking forward to bringing someone new aboard. \"The more the merrier.\"\n\t\t\t\t*set hours +2\n\t\t\t\t*set whichbar \"Pisces\"\n\t\t\t\t\n\t\t\t\t*if information = 0\n\t\t\t\t\tThe bartender welcomes you and you take a seat at the bar.\n\t\t\t\t\t*goto bartime\n\t\t\t\t*elseif information = 1\n\t\t\t\t\tThe bartender ignores you as you take a seat at the bar.\n\t\t\t\t\t*goto bartime\n\t\t\t\t*elseif information = 2\n\t\t\t\t\tThe bartender smiles at you as you take a seat at the bar.\n\t\t\t\t\t*goto bartime\n\t\t\t\t*elseif information = 3\n\t\t\t\t\tThe bartender grins at you as you walk in. He remembers all the money you spent here.\n\t\t\t\t\t*goto bartime\n\t\t\t\t*elseif information = 4\n\t\t\t\t\tThe bartender scowls at you as you take a seat at the bar.\n\t\t\t\t\t*goto bartime\n\n\t\t\t\t*label bartime\n\n\t\t\t\tYou gather your mental notes for how you will introduce yourself and head toward Bennie's.\n\n\t\t\t\t*set deadline (150 - hours)\n\t\t\t\t*if (lindasmood > 45)\n\t\t\t\t\tLinda whispers in your ear. \"Remember, you only have $${money} in cash and we have only ${deadline} hours left to earn that $2,000 bonus.\"\n\n\t\t\t\t*goto_scene hireHelp\n\n\t\t\t#But Linda is less enthusiastic. \"Captain, you already have a crew. You don't need the expense or the headache.\"\n\t\t\t\t*set deadline (150 - hours)\n\n\t\t\t\tYour ship is a ${ship}-class dubbed \"${shipname}\"\n\n\t\t\t\t\"Not bad,\" says Linda, \"You have $${money} in cash and the deadline for earning the 2 thousand dollar bonus is ${deadline} hours away.\"\n\n\t\t\t\t*goto_scene travelToAsteroid\n\n\t#Frank thinks you should visit the Capricorn Station shipyard.\n\t\t*label capricorn\n\t\t*set money -3\n\n\t\tIt takes most of a day on the monorail to get to Cap' Station (and the tickets cost $1 each). At least you're able to sleep on the train. When you step onto the platform you feel the trip was worth it.\n\t\t*set strength %+5\n\t\t*set rstrength %+5\n\t\t*set hstrength %+5\n\t\t*set hours +17\n\n\t\t\"I don't know how they do it,\" Linda says, staring at the Ivy and ferns growing in well-tended gardens along the edges of the domed walkway, \"but the Cap' is the only place on the Moon where the air actually feels fresh. The people are well-dressed and friendly, and everything just seems so clean.\"\n\n\t\t\"The children are clean, polite, and curious,\" she continues, \"and they carry balloons everywhere. Did you know, the low gravity and low (artificial) atmospheric pressure means that oxygen does as well as helium for keeping balloons aloft?\"\n\n\t\tFrank chimes in, \"Also, the trees are made of candy and every minute the sky rains snowflakes made of fudge.\"\n\n\t\t*page_break \"All right, all right.\"\n\n\t\tYou make your way to the shipyard. The sign reads, \"Paul's Boats and Junk\" but \"and Junk\" has been crossed out.\n\n\t\tPaul the dealer here slaps you on the back, saying he remembers you from Bennie's.\n\n\t\tHe points at the sign. \"I was trying to be cute, calling the place 'PB&J' but people don't seem to want to shop at a place that brags about being full of junk.\"\n\n\t\t*if information > 2\n\t\t\tPaul keeps his word from last night and says he'll give you a discount of $100 off of any ship you see.\n\t\t\t*goto capyard\n\t\t*else\n\t\t\tYou tell him you must have one of those faces and say he must be mistaking you for someone else.\n\t\t\t*goto capyard\n\t\t\n\t\t*label capyard\n\t\t*page_break\n\t\tThere are four ships here:\n\t\t\n\t\tA Wolverine-class ship - \"Known for maneuverability and sturdiness, although it's not the fastest beast out there,\" Paul tells you.\n\t\t\n\t\tA Palomino-class ship - \"Fast and tough, but doesn't handle much better than the Pengo,\" Frank informs you.\n\t\t\n\t\tA Falcon-class ship - \"Super-fast and steers like a dream. Just don't get hit by anything,\" Linda offers.\n\t\t\n\t\t*temp totalhave\n\t\t*set totalhave (money + shipvalue)\n\n\t\t*temp fuelcost\n\t\t*set fuelcost ((100 - fuel) / 2 ) \n\n\t\t*temp shipcost0\n\t\t*temp shipcost1\n\t\t*temp shipcost2\n\t\t*if information = 3\n\t\t\tThe Wolverine is $649 and the two others are $599 (they're normally $749 and $699 without the discount).\n\t\t\t*set shipcost0 649\n\t\t\t*set shipcost1 599\n\t\t\t*set shipcost2 900\n\t\t\t*goto capyard2\n\t\t*else\n\t\t\tThe Wolverine is $749 and the two others are $699.\n\t\t\t*set shipcost0 749\n\t\t\t*set shipcost1 699\n\t\t\t*set shipcost2 900\n\t\t\t*goto capyard2\n\n\t\t*label capyard2\n\n\t\tFueling any of them would cost $30. Filling the Pengo's fuel store would cost $${fuelcost}.\n\n\t\t*page_break But behold!\n\n\t\tFinally Paul shows you a Chimera-class ship - This one has it all, the fastest engine available in the sturdiest structure and equipped with the most advanced steering available. Just don't cough when you see the price: $900 (\"Sorry, Paul says, \"I just can't give discounts on this baby.\"). Fueling her will cost $30.\n\n\t\t*if totalhave \u003c 900\n\t\t\tToo bad you don't have the cash. You have $${money} and you can trade in the Pengo for an additional $${shipvalue} for a total of $${totalhave}.\n\n\t\tFuel costs $1.5 per kilogram and it will take a full fueling to get to Zebulon and back. The Pengo has a smaller tank but doesn't burn through as much fuel as the larger ships.\n\n\t\tYou wonder what sort of (presumably cheaper) ships you missed back at the Pisces Station shipyard, and you enquire about ground transportation there, even though it would mean an extra day on the Moon.\n\n\t\tLinda looks up from a vidscreen. \"Unfortunately the rail union began a strike this morning and every other option for getting to Pisces is either prohibitively expensive or time-consuming.\"\n\n\t\t*page_break \"Guess we're stuck with these options.\"\n\t\tWhat do you prefer?\n\n\t\t\"Captain,\" Paul tells you, \"keep in mind these come with empty fuel reserves so you'll need to fill up before heading out.\"\n\n\t\t\"Also,\" Linda adds, \"if you want to hire any crew you'll need some scratch handy.\"\n\n\t\tYou have $${money} and you can trade in the Pengo for an additional $${shipvalue} for a total of $${totalhave}.\n\n\t\t*temp fromplace\n\t\t*set fromplace \"Capricorn\"\n\n\t\t*label capchoice\n\t\t*choice\n\t\t\t#Keep the Pengo. \"You know where I stand.\" says Linda\n\t\t\t\t\"Are you sure?\" Paul asks you. \"From what I understand, you're planning to fly through an asteroid field and actually land on one. These Pengoes are meant just for transport, not acrobatics like that.\"\n\t\t\t\t*choice\n\t\t\t\t\t#Reconsider?\n\t\t\t\t\t\t*goto capchoice\n\t\t\t\t\t#Nah, I've made up my mind\n\t\t\t\t\t\t*goto gasup2\n\t\t\t#Get the Wolverine for $${shipcost0} (with trade-in). \"This what my son drives to and from Venus,\" Paul says.\n\t\t\t\t*set hours +1\n\t\t\t\t\"You're not in any kind of hurry, are you?\" Paul chuckles.\n\n\t\t\t\t\"Just kidding,\" he continues. \"I mean, not really kidding, but she'll be fine. If you were heading to the Kuiper Belt I'd advise something faster, but for dodging asteroids a Wolverine is perfect.\"\n\n\t\t\t\t*set ship \"Wolverine\"\n\t\t\t\t*set money +shipvalue\n\t\t\t\t*set shipvalue 500\n\t\t\t\t*set shipspeed 1\n\t\t\t\t*set shipsteering 2\n\t\t\t\t*set shipstrength 2\n\t\t\t\t*set money - shipcost0\n\t\t\t\t*goto nameship2\n\t\t\t#Get the Palomino for $${shipcost1} (with trade-in). \"If you want to waste your money, this is how you should do it,\" Linda says.\n\t\t\t\t*set hours +1\n\t\t\t\t\"As long as you're moving in a straight line, this is a great ship,\" Paul says.\n\n\t\t\t\t\"Just kidding,\" he continues. \"I mean, not really kidding, but she'll be fine. As long as you stay away from the asteroid belt... Oh really? Well, best of luck!\"\n\n\t\t\t\t*set ship \"Palomino\"\n\t\t\t\t*set money +shipvalue\n\t\t\t\t*set shipvalue 500\n\t\t\t\t*set shipspeed 2\n\t\t\t\t*set shipsteering 1\n\t\t\t\t*set shipstrength 2\n\t\t\t\t*set money - shipcost1\n\t\t\t\t*goto nameship2\n\t\t\t#Get the Falcon for $${shipcost1} (with trade-in). Frank is excited about this one. \"So. Cool.\"\n\t\t\t\t*set hours +1\n\t\t\t\t\"Be careful with the hull. The aluminum plating has been known to sheer,\" Paul tells you.\n\n\t\t\t\t\"Just kidding,\" he continues. \"I mean, not really kidding, but she'll be fine. As long as you stay away from the asteroid belt... Oh really? Well, best of luck!\"\n\n\t\t\t\t*set ship \"Falcon\"\n\t\t\t\t*set money +shipvalue\n\t\t\t\t*set shipvalue 500\n\t\t\t\t*set shipspeed 2\n\t\t\t\t*set shipsteering 2\n\t\t\t\t*set shipstrength 1\n\t\t\t\t*set money - shipcost1\n\t\t\t\t*goto nameship2\n\t\t\t*if totalhave > shipcost2\n\t\t\t\t#Get the Chimera for $${shipcost2} (with trade-in)\n\t\t\t\t\t*set hours +1\n\t\t\t\t\t\"There's really no better ship out there.\" Paul says.\n\n\t\t\t\t\t\"The Marlins are great for the kids for when they want to show off, but are still learning. But the Chimera has it all.\" He continues, \"And I don't just mean the style... Let me put it this way, even bad pilots look good when behind the stick of a Chimera.\"\n\n\t\t\t\t\t*set ship \"Chimera\"\n\t\t\t\t\t*set money +shipvalue\n\t\t\t\t\t*set shipvalue 700\n\t\t\t\t\t*set shipspeed 2\n\t\t\t\t\t*set shipsteering 2\n\t\t\t\t\t*set shipstrength 2\n\t\t\t\t\t*set money - shipcost2\n\t\t\t\t\t*goto nameship2\n\n\t\t*label nameship2\n\n\t\tWould you like to name your new ship?\n\t\t*input_text shipName\n\n\t\tThe ${ship}-class starship, \"${shipName}\". Right on.\n\n\t\t*label gasup2\n\t\tNow you need to fill 'er up.\n\t\t*set fuel 100\n\n\t\tYou need $${fuelcost} worth of fuel and have $${money}.\n\n\t\t*if fuelcost > money\n\t\t\tWhoops. You get on the horn with Jarvis and ask him to advance you another $50. Not a big deal but it takes hours to get a hold of him and for the transfer to get through.\n\t\t\t*set money +50\n\t\t\t*set hours +5\n\n\t\t*set money -fuelcost\n\n\t\tYou chat with the fuel attendant a bit about your mission, although you keep a number of the details private. You never know...\n\n\t\tHe doesn't seem all that interested, but advises you to pop into The Teal Fox and hire a co-pilot. \"I don't care if you're in a Chimera with a Diogenes 9 running your on-boards; landing on a mid-size 'roid is awful tricky.\"\n\n\t\tThe attendant has a point, after all, you've never landed this type of craft on an asteroid.\n\n\t\tWhat do you think? Besides, the food at the Teal Fox is supposed to be good.\n\n\t\t*choice\n\t\t\t#\"Seems reasonable.\" Frank says. \"Another hand on deck makes sense.\"\n\t\t\t\t*set hours +2\n\t\t\t\t*set whichbar \"Capricorn\"\n\n\t\t\t\tThe wait staff is attractive and polite. You're handed the favored Lunar cocktail, a 'Needletail' before you've even sat down. You take a sip and feel your throat tighten and your eyes water. You've had worse, although that's not saying much.\n\t\t\t\t*set strength %- 5\n\n\t\t\t\tGiven the scant food resources on the Moon there is only one entree served, an Italian dish called \"Gomito con Formaggio\", which you order.\n\n\t\t\t\t\"Tastes like mac & cheese.\" Frank says.\n\n\t\t\t\t*set deadline (150 - hours)\n\n\t\t\t\t*if (lindasmood > 45)\n\t\t\t\t\tLinda whispers in your ear, \"Remember, you only have $${money} in cash and we have only ${deadline} hours left to earn that $2,000 bonus.\"\n\n\t\t\t\t*goto_scene hireHelp\n\n\t\t\t#\"No, let's just blast off.\" Says Linda. \"We already have a pilot and a crew, don't we?\"\n\n\t\t\t\t*set deadline (150 - hours)\n\n\t\t\t\tFrank protests but Linda interrupts him. \"Quit mining and groping and come on! The deadline for earning the 2 thousand dollar bonus is ${deadline} hours away!\"\n\n\t\t\t\t*goto_scene travelToAsteroid\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set Hours\t1\n*set Money\t85\n*set Ship\t\"Pengo\"\n*set ShipName\t\"Kelstar\"\n*set Fuel\t 65\n*set ShipSpeed\t1\n*set ShipSteering\t1\n*set ShipStrength\t1\n*set Piloting\t 50\n*set Computers\t 50\n*set Strength\t 50\n*set LindasMood\t 54\n*set FranksMood\t 52\n*set Reputation\t 54\n\n\nThe beautiful and fascinating aspect of keeping a goldfish in space is that the absence of gravity means the water forms a wobbly sphere around the fish.\n\nYou keep the water in clear plastic bag to keep the water from sloshing out, and keep the bag velcro'd to the wall.\n\nFrank glances back and sees that twelve-parsec stare on your face. \"Waxing nostalgic again?\"\n\n*fake_choice\n\t#You clear your throat and your head. \"Nope! Just waking up and planning the rest of the day.\"\n\t#You feel yourself beginning to wallow in memory...\n\n*script changeBackgroundColor(\"black\")\n*set Hours\t29\n*set Money\t19\n*set Ship\t\"Chimera\"\n*set ShipName\t\"Heart of Gold\"\n*set Fuel 100\n*set ShipSpeed\t2\n*set ShipSteering\t2\n*set ShipStrength\t2\n*set Piloting 59\n*set Computers 50\n*set Strength 53\n*set LindasMood 58\n*set FranksMood 60\n*set Reputation 62\n\n\nLinda suggests that her time would be better spent elsewhere and before you have a chance to argue she's already gone.\n\nFrank makes himself comfortable at the bar.\n\nOn your right is a young woman with an eye patch who introduces herself as Regina Nooz. She takes a sip from her Fitz beer, glances at the players across the table then back at you, and grins mischievously. \"So,\" she says, \"You know how to play?\"\n\nWell, do you?\n\n*fake_choice\n\t#Pfft. You kidding? My grammaw invented this game and taught it to me when I was knee-high to a Saturnian sand-flea\n\t#Ahem. Uh. Er. Um. No, actually.\n\n*script changeBackgroundColor(\"sepia\")\n*set Hours\t25\n*set Money\t623\n*set Ship\t\"Pengo\"\n*set ShipName\t\"Kelstar\"\n*set Fuel 0\n*set ShipSpeed\t1\n*set ShipSteering\t1\n*set ShipStrength\t1\n*set Piloting 59\n*set Computers 50\n*set Strength 57\n*set LindasMood 61\n*set FranksMood 58\n*set Reputation 60\n\n\nWhat do you prefer? \n\n\"Captain,\" Paul tells you, \"keep in mind these come with empty fuel reserves so you'll need to fill up before heading out.\" \n\n\"Also,\" Linda adds, \"if you want to hire any crew you'll need some scratch handy.\" \n\nYou have $623 and you can trade in the Pengo for an additional $350 for a total of $973. \n\n*fake_choice\n\t#Keep the Pengo. \"You know where I stand.\" says Linda\n\t#Get the Wolverine for $749 (with trade-in). \"This what my son drives to and from Venus,\" Paul says.\n\t#Get the Palomino for $699 (with trade-in). \"If you want to waste your money, this is how you should do it,\" Linda says.\n\t#Get the Falcon for $699 (with trade-in). Frank is excited about this one. \"So. Cool.\"\n\t#Get the Chimera for $900 (with trade-in)\n", "startup": "*title Zebulon\n*author Matt Slaybaugh\n\n*scene_list\n\tstartup\n\ttravelToMoon\n\trentShip\n\thireHelp\n\ttravelToAsteroid\n\tnavigateField\n\tlandShip\n\tnavigateAmongRobots\n\tenterLab\n\trebootComputer\n\tending\n\n\n\n*create piloting 50\n*create computers 50\n*create strength 50\n*create hours 0\n*create money 50\n*create fuel 65\n*create sidekick \"\"\n*create ship \"Pengo\"\n*create shipname \"Kelstar\"\n*create shipspeed 1\n*create shipsteering 1\n*create shipstrength 1\n*create hoursfree 0\n*create shipvalue 350\n*create information 0\n*create deadline 0\n*create whichbar \"Pisces\"\n*create teethclean 0\n*create skpiloting 50\n*create skcomputers 50\n*create skstrength 50\n*create whopilot \"You\"\n*create reputation 50\n*create havegun 0\n*create damage 0\n*create lindasmood 50\n*create franksmood 50\n*create hpiloting 45\n*create hcomputers 60\n*create hstrength 45\n*create rpiloting 45\n*create rcomputers 45\n*create rstrength 60\n*create distance 0\n*create marooned 0\n*create temppilot 50\n*create compdestroyed 0\n\n\nThe Future Needs You!\n\nA \"Choice\" space adventure game in ten chapters\n\nThis is an interactive fiction / multiple-choice game, like those old \"Choose Your Own Adventure\" books from the '80s.\nMake choices to determine the outcome of the story.\n\nCreated with ChoiceScript by Matt Slaybaugh\n*line_break\nfor the\n*link http://jayisgames.com/cgdc9 Casual Gameplay Design Competition #9\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and choice_is_advertising_supported)\n\t\t[i]This game is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.[/i]\n\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break_advertisement\n\n\n*label purchased\n\n*page_break Onward!\n\nCHAPTER I - THE SHIP\n\n---\n\nYou begin your day like most others: yawn, stretch, use the toilet, say \"hello\" to the goldfish, see what's new on the blogs, and make sure your ship is still on course for The Moon.\n\nYou stop in the other bunk room and say \"Good morning\" to Linda, your shipwright. \"Good night,\" she says as she gets ready for her scheduled 4-hour sleep shift.\n\nIn the cockpit, Frank, your communications officer, is seated at the controls, updating his Spacebook page. \"Mornin',\" he says over his shoulder to you.\n\nEverything looks in order. As you rub the sleep from your eyes, you look up at the billion pinpoints of light filling the front window.\n\nFrank notices you staring. \"Never gets old, does it? Just look at all those stars!\"\n\n*choice \n\n\t#\"Yep,\" you say. Although frankly, it has gotten a bit old.\n\t\t*set franksmood %- 5\n\n\t\tYou can't take the time to gawk at the vacuum of space. You get plenty of stargazing when it's your turn to pilot.\n\t\t \n\t\t*goto morestart0 \n\n\t#Take a moment and ponder the Universe with Frank.\n\t\t*set franksmood %+ 5\n\n\t\t*label whynot\n\t\tYou look out at the Moon and see the glare from the Moonvertisements illuminating the tens of thousands of mineral drones roving over the surface.\n\n\t\tAhead you see the hotshots zipping past you, the cruise ships ferrying Europa-trash, the hulking container ships...\n\n\t\tOne fellow sidles up to your ship in his Marlin X50 starcycle. You can see him shouting at you, although of course you can't hear anything through the vacuum of space. He makes some rude hand gestures, throws some empty Fitz beer cans at you, laughs, and speeds off.\n\n\t\t\"What was he saying?\" Frank asks.\n\n\t\t\"I don't know.\" You turn to ask the on-board computer, an old-but-reliable Pythagoras 2 model.\n\n\t\t*page_break \"Computer, could you see what that guy was saying?\"\n\n\t\t\"\u003cNegative> \u003cLip-reading module not installed> \u003cCorrection module installed but not configured> \u003cCorrection module configured but configured incorrectly> \u003cCorrection module installed> \u003cRegistration markings on vehicle point to one Myron Flip residing at Leo Station on Earth moon Luna> \u003cCurrently employed with Flabbergassed Towing and Hauling and Tugging and Bringing and Taking>\"\n\n\t\t\"Jerko...\" you mutter to yourself.\n\n\t\t\"\u003cMuttering is early stage of Space Madness> \u003cShall I arrange psychiatry appointment?>\"\n\n\t\t\"NO!\" \"I mean, no... No thank you.\" You mutter some more but so quietly that even you can't hear it.\n\t\t\n\t\t*page_break Frank looks at you with concern.\n\n\t\t*goto morestart0\n\n*label morestart0\nYou find your toothbrush floating past your head. You pluck it out of the air and look around for the toothpaste.\n\nYou see that the dental floss has somehow gotten itself wrapped around and woven into one of the ventilation grates. Extracting that will have to be a problem you solve later.\n\nHow hard do you want to look for the toothpaste?\n\n*choice\n\n\t#\"Meh. You brushed yesterday,\" Frank advises. \"Check out this vid I found of a cat doing mime.\"\n\t\t*set lindasmood %- 5\n\n\t\tAlthough the video is the stupidest thing you have seen in a long while, the 'rope pull' part was kind of funny.\n\t\t*goto morestart01\n\n\t#\"Captain, not to butt in,\" Linda butts in from the other room, \"But I don't recall you brushing yesterday.\"\n\t\t*set lindasmood %+ 5\n\t\t*set money +35\n\t\t*set teethclean 1\n\t\t*set hours +1\n\n\t\tYou eventually find the toothpaste tube wedged in the bulkhead. And the tube is stuck to a $35 credit chip!\n\t\t\n\t\tYou now have $${money}. \"Take that, collection agency!\" you say to yourself.\n\n\t\tLinda drifts into the washroom to brush her teeth.\n\t\t\n\t\t\"Oh. Excuse me, Captain. What were you saying?\"\n\t\t\n\t\t\"Looky here.\" You show her the credit chip.\n\t\t\n\t\t\"Money often appears in unexpected places,\" she says. \"That reminds me of a story in the news a few months ago...\"\n\t\t\n\t\t*choice\n\t\t\t#Politely excuse yourself\n\t\t\t\t*set lindasmood %- 5\n\t\t\t\tMoney is nice to have, but really not all that interesting in of itself, right?\n\n\t\t\t\tLinda has her qualities, but her shaggy dog stories are too often too long. \n\t\t\t\t*goto morestart01\n\t\t\t#Listen politely\n\t\t\t\t*set lindasmood %+ 5\n\n\t\t\t\t\"One fellow, Paul Meade, had always hated banks ever since his parents lost all their savings during one of the cyclical recessions. So, he kept all of his money as cash - in shoe boxes inside insulated metal crates.\n\n\t\t\t\tThat was fine until the big currency conversion a few years ago, $20,000 was suddenly worth $20; a $20 bill was suddenly worth two cents. \n\t\t\t\t\n\t\t\t\tSome people had enough advance warning to make arrangements, but Paul lost everything. After the initial anguish and despair he was able to joke about it, using $20 bills as napkins, candle wicks, toilet paper, etc.\n\n\t\t\t\tWith nearly no money, Paul had to sell his possessions and move out. He wound up at a shelter with one change of clothes and three suitcases full of old money. Then he really broke down, stopped washing, stopped working, and began making his \"art\": singed dollar bills pasted overtop a papier mache form, suggesting the shape of a charging bull and a retreating bear.\n\n\t\t\t\tA friend saw it, who showed it to another friend, etc. until Paul got an offer from the very same bank that had ruined his parents years earlier.\n\t\t\t\t\n\t\t\t\tThe offer was to buy the piece and place it in the lobby of their main headquarters in New Seattle, and they paid just a little more than the cash had been worth before the currency conversion.\n\t\t\t\t\n\t\t\t\tShows to go ya, eh?\"\n\t\t\t\t\n\t\t\t\tLinda brushes her teeth and heads to her bunk.\t\t\t\n\t\t\t\t\n\t\t\t\t*page_break\n\n\t\t\t\t*goto morestart01\n\n*label morestart01\n\nYou have a moment before it's your turn at the console. You glance at the newstube.\n\n*choice\n\t#Back on Earth you actually cared about politics and the daily tribulations of famous people, but out in space all that stuff seems so trivial.\n\t\t*set reputation %- 5\n\t\n\t\tProbably just the usual sensationalized drivel.\n\n\t\t*goto morestart1\n\n\t#Yet you're starting to feel out of touch. Maybe it would be good to just make sure there hasn't been another robot uprising in your home town.\n\t\t*set reputation %+ 5\n\n\t\t\"Computer, what's in the news?\"\n\n\t\t\"\u003cHurricane in New Tunisia> \u003cAnother Mining Conflict on Ceres> \u003cLabor Strikes in Union of Central America> \u003cSolar Flares Damage Venusian Satellites> \u003cFood Shortages in New Yugoslavia> \u003cAntarctic Tourism at Record Levels> \u003cCyborg Party Wins Plurality of Seats in Laotian Parliament>...\"\n\n\t\t\"Sub-detail on the second one, on Ceres.\"\n\n\t\t\"\u003cDwarf planet Ceres largest object in the asteroid belt separating Mars and Jupiter> \u003cTerritory dispute related to mining rights> \u003cZagat rating of Cerean eateries overall dropped to 0.1 due to 'stated raisins not actually raisins'> \u003cRequest for robotic guards denied by Martian council> ...\"\n\n\t\t\"That's enough.\"\n\t\t\n\t\t\"... \u003cAnother robot uprising in Obion, Tennessee>\"\n\t\t\n\t\t*page_break \"What?\"\n\t\t\n\t\t\"\u003cGroup of mechanical mannequins calling themselves 'The Uncanny Valley of the Dolls' on strike at local gigamall>\"\n\t\t\n\t\t\"Oh, just more uncanny valley girls. Never mind.\"\n\t\t\n\t\t*goto morestart1\n\n*label morestart1\n*choice\n\t#Look in on Henry the fish.\n\t\t*set reputation %+ 5\n\n\t\tThe beautiful and fascinating aspect of keeping a goldfish in space is that the absence of gravity means the water forms a wobbly sphere around the fish.\n\n\t\tYou keep the water in clear plastic bag to keep the water from sloshing out, and keep the bag velcro'd to the wall.\n\n\t\tHenry tends to swim with his belly toward the center of the blob of water and his little dorsal fin just under the outside edge.\n\t\t\n\t\t*goto nostalgia\n\n\t#Look through the rear port\n\t\t*set reputation %- 5\n\n\t\tYou see the Earth, still huge, but shrinking almost imperceptibly in the rear-view screen and you remember the first time you saw the Earth from space. \n\n\t\tYou start thinking about the old days.\n\n\t\t*goto nostalgia\n\n*label nostalgia\nFrank glances back and sees that twelve-parsec stare on your face. \"Waxing nostalgic again?\"\n\n*choice\n\n\t#You clear your throat and your head. \"Nope! Just waking up and planning the rest of the day.\"\n\t\t*set reputation %+ 5\n\n\t\tNo time for gazing, navel- or star- or otherwise. Let's get moving!\n\n\t\t*goto morestart2\n\n\t#You feel yourself beginning to wallow in memory...\n\t\t*set reputation %- 5\n\n\t\t\"Speaking of waxing, this floor could use a buff.\" You look down at the decorative wooden floor you had placed in the Pengo.\n\n\t\t\"Remember when we installed that?\" Frank asks. \"Well, you installed it... These ships are so lifeless with their copper doorknobs, their irradiated food prep areas, and their general absence of life...\"\n\n\t\t\"Mmm... Hey, did you feed Henry today?\" you ask.\n\n\t\t\"Oh... I don't think so.\"\n\n\t\t\"How certain are you? I shouldn't overfeed him.\"\n\n\t\t\"... Erm... No. I didn't feed him.\"\n\n\t\tLinda shouts from the other room, \"Frank, you have to remember that kind of stuff. I bet you didn't clean out the engine room either, like you were supposed to. Did you?\"\n\n\t\tFrank turns around, annoyed, and shouts back at Linda. \"Yeah, yeah, LINDZIE, who made you captain?!\"\n\n\t\t\"I told you not to call me that!\"\n\n\t\t*choice\n\t\t\t#\"Frank, she's right. We all have to pull our weight around here. We have to rely on each other. Okay buddy?\"\n\t\t\t\t*set franksmood %- 5\n\t\t\t\tOuch. Probably should have left out that last part. Calling someone \"buddy\" is so patronizing.\n\t\t\t\t\n\t\t\t\tFrank turns back to his screen.\n\t\t\t\t\n\t\t\t\t*goto bicker\n\n\t\t\t#\"Linda, leave it be. He'll get on it.\" \n\t\t\t\t*set lindasmood %- 5\n\t\t\t\tYou hear Linda muttering in the bunk room, \"... always taking HIS side...\"\n\t\t\t\t\n\t\t\t\tYou remind yourself that you are the captain, not her. She can't be superceding your command. On the other hand, she's probably right.\n\n\t\t\t\t*goto bicker\n\n\t\t\t#Stay out of it. You can't get involved in their bickering.\n\t\t\t\t*set reputation %- 5\n\t\t\t\t\n\t\t\t\tThey continue like this for a while.\n\n\t\t\t\tThey're your friends, and part of friendship is being involved when your friends can't resolve something on their own, not to mention that you are the captain and you need to maintain order.\n\n\t\t\t\t*goto bicker\n\n\t\t*label bicker\n\t\t\"Frank, I need you on engine room detail now.\"\n\t\t\n\t\tFrank slowly extricates himself from the cockpit and heads to the engine room.\n\t\t\n\t\t*page_break Take his place at the controls.\n\n\t\tYou used to pride yourself on being one of the few in the new generation of \"space jockeys\":  men and women who traveled the solar system, getting the job done - whatever the job might be.\n\n\t\tIt had been so exciting; accelerating close to a half-a-million kilometers per hour and making that record-setting run to Neptune, conducting petrological surveys on potential comets in the Oort Cloud at the very edge of the solar system, navigating the asteroid belt at full throttle just for fun...\n\n\t\tBut the System isn't the wild, wide-open playground it used to be.\n\n\t\tThe surge in space travel and exploration has driven the development of dozens of off-planet shipyards, constructing ships much larger than can be built on Earth. As of ten years ago, there is now more construction in orbit around Earth than on the surface.\n\n\t\tThese huge ships need an enormous amount of materials. The choicest ones these days are magnesium for the hulls (\"stronger than steel, lighter than aluminum\") to reduce fuel costs; lithium for batteries; and gold for the electronics, which leads to fewer errors than copper wires in the nanocircuitry.\n\n\t\t*page_break\n\n\t\tMining is big business now, particularly on asteroids, which often have mineral veins closer to the surface than the various moons and terrestrial planets have.\n\n\t\tTwenty years ago dozens of private companies had drones mining the asteroids between Mars and Jupiter.\n\n\t\tYou had gotten caught up in the excitement of the 'roid rush, but never made the billions in cash you had been promised. Too many lies. Too much loss...\n\n\t\t*goto morestart2\n\n*label morestart2\nYou don't think about the old days so much now, you had your time in the Sun, so to speak, and you're content doing courier runs for Asmico, a small delivery and IT support company.\n\nYou begin thinking of how things used to be but your reverie is broken by the space telephone (\"spelephone\") ringing...\n\n*choice\n\t#Answer it\n\t\t*set reputation %+ 5\n\t\tIt's Nelson Jarvis, the dispatcher at Asmico.\n\t\t*goto action\n\t#See who it is first\n\t\tIt's Nelson Jarvis, the dispatcher at Asmico.\n\t\t*goto action\n\t#If it's important they'll send an email.\n\t\t*set reputation %- 5\n\t\t*set hours +1\n\t\tBefore long you get an email. It's from Nelson Jarvis, the dispatcher at Asmico.\n\t\t\n\t\tIt reads, \"Answer the phone!\" and the phone rings again.\n\t\t*choice\n\t\t\t#Answer it\n\t\t\t\tIt's Nelson Jarvis, the dispatcher at Asmico.\n\t\t\t\t*goto action\n\t\t\t#Let it ring\n\t\t\t\t*goto_scene quit\n\n*label action\n\"Heyyo Jarvis, what's shaking?\"\n\n\u003c\"Everything. Where are you?\">\n\nYou adjust the cruise module and lean back. \"Just driftin' to the Moon ol' bu....\"\n\n\u003c\"Ugh. Why you wasting time with that kindygarden crud? Lunar runs don't even pay nothing.\">\n\n\"Wait a minute. You're the one who got me this gig!\"\n\n\u003c\"Oh yeah. That's true. But still, aren't you ready for something more interesting?\">\n\n\"I've done interesting. Been there, etc. Right now, the client doesn't care when the shipment arrives; I can drift on fumes, and enjoy some well-earned...\"\n\n\u003c\"Drop your joystick and listen. I got a job for you, a good one.\">\n\n\"Nelson, I told you before...\"\n\n*choice\n\t#(sigh) \"What's the gig?\"\n\t\t*label okay\n\t\t\u003c\"You know that one asteroid, in sector 12, 'Zebulon'?\">\n\t\t\n\t\t\"That 'one'? There are millions of...\"\n\t\t\n\t\t\u003c\"I know, I know. But this is one of the bigger ones, aside from the major five, one of the biggest. Named for some American explorer. Well, the spectraprobe shows over 90% iron, with loads of gold, titanium, nickel - all the good stuff.\">\n\n\t\t\"Yeah, so what? Put some minerbots up there.\"\n\n\t\t\u003c\"Already done. That's the thing. The Master Control Unit that runs the drones keeps flaking out. They need some flash and blood and want a manual reboot and 'visual assessment.'\">\n\n\t\t\"Manual reboot? When did we go back to the 21st century?\"\n\n\t\t\u003c\"I know...\">\n\n\t\t*page_break \"And who's 'they'? And why us? Why me?\"\n\n\t\t\u003c\"The folk at Atlas, man. They asked for us!\">\n\n\t\t\"Um...\"\n\n\t\t\u003c\"Yep, after that job on Ceres, our reputation is solid, man!\">\n\n\t\t\"What do you mean, 'solid'? That was a disaster! Atlas was not...\"\n\t\t\n\t\t\u003c\"That's all behind us. Look, the money is good...\">\n\n\t\t*page_break \"How good?\"\n\n\t\t\u003c\"I'm not saying you can retire after this...\">\n\n\t\t\"How much, Jarvis?\"\n\n\t\t\u003c\"Well, can't make any promise, but I bet Asmico could swing double your regular rate and Atlas is willing to pay a $2,000 bonus if you can do it within the next 150 hours. Let's call it 'hazard pay'.\">\n\n\t\t\"Two thousand isn't what it used to be.\"\n\n\t\t\u003c\"Come on, I'm handing this to you on a very nice plate. You want me to talk to Franklin? He'll do it. I know. But you and I both know he's a screw-up, so I'm calling you first.\">\n\n\t\t\"...\"\n\n\t\t*page_break You think about all the money you owe between Mercury and Pluto.\n\n\t\t\u003c\"You there? ... Look. I didn't want to say it 'cause we're friends, but I can order you to go. You did foul up on Ceres and Atlas has every right to...\">\n\n\t\t\"Jarvis! That was NOT my fault! It was a different pilot who...\"\n\n\t\t\u003c\"Yeah, well, you were the one still standing there when all was said and done...\">\n\n\t\t\"You just said my reputation was solid...\"\n\t\t\n\t\t\u003c\"I said 'OUR' reputation, meaning mine.\">\n\t\t\n\t\t\"That was... I was just... Nelson... Don't blame me for that.\"\n\n\t\t\u003c\"It's too late for excuses. Too late to find a scapegoat for your screw-ups. But look, like I said, that's in the past. The main question is, 'Are you in?'\">\n\n\t\t*page_break You hear yourself grumbling.\n\n\t\t\"... You mentioned 'hazard pay'. What was that for?\"\n\n\t\t\u003c\"Uh... says here... something... 'Skilled pilots only'. \">\n\n\t\t\"Do you think I'm skilled enough?\" you say dryly.\n\n\t\t\u003c\"Probably. Hey, what about those three idiots in your crew?\">\n\n\t\t\"There's only two now, and they're not...\"\n\n\t\t\u003c\"Alright, whatever. Are they up for this kind of mission? If not, dump 'em.\">\n\n\t\t\"I'm not 'dumping' them. They've been with me for a long time.\"\n\n\t\t\u003c\"You have a good working relationship? A captain can't get too close to the crew.\">\n\n\t\t*choice\n\t\t\t#\"I think of them more as friends than as employees.\"\n\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t*set franksmood %+ 5\n\t\t\t\t*set reputation %- 5\n\t\t\t\t*goto jibber\n\t\t\t#\"They're friends but none of us ever forget that I'm the boss.\"\n\t\t\t\t*set reputation %+ 5\n\t\t\t\t*set lindasmood %- 5\n\t\t\t\t*set franksmood %- 5\n\t\t\t\t*goto jibber\n\n\t\t*label jibber\n\n\t\t\u003c\"Enough jibber-jabber. You in or out?\">\n\n\t\t*choice\n\t\t\t#You think to yourself: \"I'm a reasonably skilled pilot, and it could be fun to get back in the game, and I do need the money. \"... Yeah... Cheese Louise... Merde. Why not?\"\n\t\t\t\t\n\t\t\t\tYou have ${money} space credits, a 2-person crew, a Pengo-class ship and 150 hours... and you're wearing sunglasses.\n\t\t\t\n\t\t\t\t*finish We're going to Zebulon!\n\n\t\t\t#Hang up the phone.\n\n\t\t\t\t*goto hangup\n\n\t#\"Get lost!\"\n\t\t*set reputation %- 5\n\n\t\t\"Give me a chance! I know you're still sore about that gig on Ceres, but this one should be easy money.\"\n\n\t\t*choice\n\t\t\t#\"Okay\"\n\t\t\t\t*goto okay\n\n\t\t\t#\"Buzz off!\"\n\t\t\t\t*goto hangup\n\t#Hang up\n\t\t*label hangup\n\t\t*goto_scene quit\n\n\n", "traveltoasteroid": "*comment Zebulon\n*comment 2010 Matt Slaybaugh\n\nCHAPTER V - BLASTOFF\n\n---\n\nLinda meets you in the corridor.\n\n*if lindasmood > 50\n\t\"Great news!\" she says. \"I located some additional documentation on that computer we're supposed to reboot.\"\n\t\n\tShe hands you a manual.\n\t*set hcomputers %+ 5\n\n\t*choice\n\t\t#\"Thanks\" you say.\n\t\t\t*goto teeth\n\t\t#\"Wow, that's great! Thanks so much for doing that!\"\n\t\t\t*set lindasmood %+ 5\n\t\t\t*set computers %+ 5\n\t\t\t*goto teeth\n*else\n\t\"Oh hey Linda.\" Frank says. \"Where were you?\"\n\t\n\t\"Just stretching my legs,\" she says.\n\t\n\t*goto teeth\n\n*label teeth\n\n*if teethclean = 0\n\tOuch! You're suddenly distracted by a pain in your tooth. The back molar on the upper left feels like little space demons are using it as a dart board.\n\t\n\t\"We've got to get going, but don't you think you ought to pop in to a dentist while you're on The Moon?\" Linda asks. \"Available dental care will be precisely nonexistent once we get under way.\"\n\n\t*choice\n\t\t#\"Suck it up!\" Frank says, \"It's just a tooth.\"\n\t\t\t*set strength %- 10\n\t\t\t*goto nextpart\n\t\t#\"Safety first... and uh... oral health a close second.\" Linda advises.\n\t\t\t*set hours + 2\n\t\t\t*set strength %+ 10\n\t\t\t*set teethclean 1\n\t\t\tYou have to wait in the dentist's office for a while before she can squeeze you in. You kill time reading a local magazine, \"Crater and Fissure Monthly\". You can't tell whether it's about teeth or comets. The macro photos look the same either way.\n\n\t\t\tThe hygienist turns out to be the exact opposite of what you've heard about these moon dentists, that they're brutal, rude, and careless. She turns out to be gentle, courteous, and thorough, although that impression could be due to the way nitrous oxide behaves in a low-pressure atmosphere.\n\n\t\t\tThe dentist on the other hand, is exactly what you expect - she rambles on about her moon-golf swing and asks you banal questions at the precise moment when you need to spit.\n\n\t\t\t*page_break Teeth as clean as a whistle. A filthy, filthy whistle...\n\n\t\t\tFor a time the dentist and the hygienist gab and banter while you lie back helplessly between then. You learn lots of useless trivia, for example:\n\t\t\t\n\t\t\t- Joan on 'The Cosmic and The Cruel' has an evil twin who is having an affair with an Ionian Gas Magnate.\n\t\t\t\n\t\t\t- Some strategies for how to win the opening round of Cobbler: The dentist swears you almost always win if you just pick 'Starlight' for all three runs. The hygienist says the first run is a gamble, but for the following two you should play whatever your opponent played in the last run.\n\n\t\t\t- Atlas Consolidated is planning to sue Asmico for the fracas on Ceres last year. You're certain this doesn't bode well for you, but the anesthetic makes it seem like no big deal.\n\n\t\t\tThe filling seems to hold and the cleaning was well overdue.\n\n\t\t\t*page_break That local anesthetic sure makes your mouth numb.\n\t\t\t\n\t\t\tAs you pass by the docking bay, the attendant calls after you, \"All fueled up, Captain?\"\n\n\t\t\tYou feel drool dripping down your chin. You don't want to embarrass yourself to the attendant, so just nod your head.\n\n\t\t\t\"Hello? Captain? Have you tanked up? Regulations say I need to confirm all ships leave this dock with an adequate level of fuel.\"\n\n\t\t\tYou nod again, but that doesn't cut it. The attendant chases after you and tugs at your sleeve. \"Captain, also, we had to charge you a cleaning fee for that dental floss you had wrapped around...\"\n\n\t\t\tYou stare at him unblinking until he slowly releases your sleeve and backs away.\n\n\t\t\t*set reputation %-5\n\t\t\t*set money -9\n\t\t\t*goto nextpart\n\n*label nextpart\n\n*if sidekick = \"Anders\"\n\tYou meet up with Anders who ends up being late. \"Sorry, I was engrossed with something on my computer while I was waiting for you.\"\n\t\n\t*goto parking\n*elseif sidekick = \"Beleina\"\n\n\t*goto parking\n*elseif sidekick = \"Cargill\"\n\tYou have trouble finding Cargill, but the second place you look is the game table where you first met him. Thankfully, you don't lose too much time.\n\n\t*goto parking\n*else\n\tYou feel you're forgetting something, but you often feel that way (part of the space paranoia) and head out.\n\t*goto parking\n\n*label parking\n\n*comment Parking fee?\n\nYou get to docking bay 94, nod to the attendant, and enter the ship, performing the usual pre-flight tests.\n\n*page_break You climb up the ladder.\n\n*set deadline (150 - hours)\n\n\"\u003cI am the ${ship}-class ${shipname}> \u003cWelcome aboard, Captain>\" the ship computer greets you. \"\u003cI hope you had a pleasant visit on Earth moon Luna.>\"\n\nYou used to get really annoyed by the false politeness programmed into these ship computers...  and some things never change.\n\n*if ship != \"Pengo\"\n\t\"Hey wait! Where's Henry!\" Frank looks side-to-side, as though the goldfish might be swimming in the air next to you. \"Oh no, did you leave him somewhere? Did you leave him on the Pengo?\"\n\t\n\t\"Cheese and Crackers!\" You curse to yourself. \"I can't leave our ship mascot behind. His conversation wasn't very stimulating, but he's my most precious companion. Uh. Present company excluded.\"\n\t\n\tLinda sighs, \"It's just a fish.\"\n\t\n\t*choice\n\t\t# \"You'd feel really bad leaving Henry behind.\" Frank is a talented guilt-trip-layer.\n\t\t\t*set reputation %+ 10\n\t\t\t\n\t\t\t*if sidekick = \"\"\n\t\t\t\tYou take some time to make sure he's not anywhere onboard then run out to the docking area and talk to the attendant.\n\t\t\t\t*set hours +1\n\t\t\t\t*goto attendant\n\t\t\t*else\n\t\t\t\tYou ask ${sidekick} to look around the ${ship} to make sure Henry's not here, then you run out to the docking area and talk to the attendant.\n\t\t\t\t*goto attendant\n\t\n\t\t\t*label attendant\n\t\t\t*if reputation > 50\n\t\t\t\tThe attendant is very helpful and gets you back in to the Pengo.\n\t\t\t\t*set hours +1\n\t\t\t\t\n\t\t\t\t*goto gethenry\n\t\t\t*else\n\t\t\t\tThe attendant is not very helpful and you have to wait for him to finish with other pilots.\n\t\t\t\t*set hours +1\n\t\t\t\t\n\t\t\t\tDo you want to plead with him to hurry, yell at him for being incompetent, or just wait politely?\n\t\t\t\t*choice\n\t\t\t\t\t# Plead, \"But Henry's my only real friend!\"\n\t\t\t\t\t\n\t\t\t\t\t\tEven through his visor you can see the attendant arching his eyebrow. He clearly doesn't think much of you, but eventually gets the keys for your old ship.\n\t\t\t\t\t\t*set reputation %-5\n\t\t\t\t\t\t*set hours +1\n\t\t\t\t\t\t*goto gethenry\n\t\t\t\t\t# Yell, \"I need to speak to your manager!\"\n\n\t\t\t\t\t\t\"I'm the manager. I run this place. I'll get to you when I can.\" He doesn't shout, but it's clear he's not going to do you any favors. Eventually he sends out an assistant to let you into your old ship.\n\t\t\t\t\t\t*set reputation %-20\n\t\t\t\t\t\t*set hours +3\n\t\t\t\t\t\t*goto gethenry\n\t\t\t\t\t# Wait. It was your fault, and other people have problems, too.\n\t\t\t\t\t\tYou end up twiddling your thumbs for almost two hours but the attendant eventually gets back to you. \"Thanks for waiting. It's been a hectic day with the pico technology conference. It's nice for me when people like you understand that.\" He gets the keys and lets you back into your old ship.\n\n\t\t\t\t\t\t*set reputation %+ 5\n\t\t\t\t\t\t*set hours +2\n\t\t\t\t\t\t*goto gethenry\n\n\t\t\t*label gethenry\n\t\t\tYou crawl back into your old ship, where you see Henry swimming briskly. He's just now getting used to being in gravity again.\n\n\t\t\tYou get the bag and hurry back to the ship.\n\n\t\t\t*goto entership\n\n\t\t# \"If we don't hustle we'll never have a chance of getting that bonus.\" Linda - always the pragmatist. \n\t\t\t*set reputation %- 10\n\n\t\t\t\"Poor Henry,\" Frank says.\n\n\t\t\t\"On the other hand,\" Linda argues, \"He was the fifth goldfish you've had in the past two years. Maybe you can pick up Henry VI when you're on earth next.\"\n\t\t\t\n\t\t\t*goto entership\n\n*label entership\n\n*if sidekick != \"\"\n\tYou introduce Linda to ${sidekick}. You're not sure whether they'll get along, but you hope so.\n\n*if sidekick != \"\"\n\t\"\u003cCaptain>\" the ship computer asks, \"\u003cWill you please introduce me to your new sidekick?>\"\n\n\t${sidekick} makes a face and says, \"The name is ${sidekick} and I'm not a 'sidekick' you can call me 'first mate'.\"\n\t\n\t\"\u003cVery well>\"\n\n\tLinda and Frank hear this and look at each other with matching arched eyebrows.\n\t*set lindasmood %-5\n\t*set franksmood %-5\n\n\tYou both settle into the cockpit. Do you want ${sidekick} to operate the controls during takeoff?\n\n\t*choice\n\t\t#\"Let me show you the control,\" you say.\n\t\t\t\"I've been flying these things since I was 14,\" ${sidekick} says.\n\n\t\t\tYou flip a bunch of switches and turn some dials, the thrusters engage and you have lift-off!\n\n\t\t\t*goto liftoff\n\n\t\t#\"Let's see what you can do,\" you say.\n\t\t\t\"I'll be happy to demonstrate,\" ${sidekick} says.\n\n\t\t\t${sidekick} flips a bunch of switches and turns some dials, the thrusters engage and you have lift-off!\n\n\t\t\tYou're glad you had ${sidekick} at the helm during takeoff so you could observe. \n\n\t\t\t*if skpiloting \u003c piloting\n\t\t\t\tYou can see that ${sidekick}'s piloting skills are not quite at the level you had hoped for. You're clearly the better pilot.\n\t\t\t\t*page_break Onward!\n\t\t\t\t*goto liftoff\n\t\t\t*elseif skpiloting > piloting\n\t\t\t\tYou're impressed. You can see that ${sidekick}'s skills are better than you expected. You're clearly the less experienced pilot.\n\t\t\t\t*page_break Onward!\n\t\t\t\t*goto liftoff\n\t\t\t*else\n\t\t\t\tYou can see that ${sidekick}'s piloting ability is about what you expected. You both have about the same level of skill.\n\t\t\t\t*page_break Onward!\n\t\t\t\t*goto liftoff\n\n*label liftoff\n\n*if ship = \"Pengo\"\n\tGood 'ol Pengo. She's not much to look at, but the controls are familiar, and you've steered the ship long enough for the seat to fit your backside perfectly.\n\t*goto takeoff\n*elseif ship = \"Rhino\"\n\tTurns out the Rhino handles about the same as the Pengo did, which is to say, poorly.\n\t*goto takeoff\n*elseif ship = \"Dragonfly\"\n\tThe steering is impressive. You're glad you upgraded from the Pengo.\n\t*goto takeoff\n*elseif ship = \"Springbok\"\n\tWow Springbok's are fast! You haven't seen your past disappear from your rearview mirror this quickly since you left Lubbock, Texas.\n\t*goto takeoff\n*elseif ship = \"Wolverine\"\n\tThe Wolverine isn't much faster than the Pengo, although you weren't expecting it to be. But it handles well and you're happy with your choice.\n\t*goto takeoff\n*elseif ship = \"Palomino\"\n\tThe Palomino's steering isn't much better than the Pengo's but it makes up for it with speed.\n\t*goto takeoff\n*elseif ship = \"Falcon\"\n\tThe Falcon flies great: accelerating twice as much as the Pengo ever did, and handles really well.\n\t*goto takeoff\n*elseif ship = \"Chimera\"\n\tThey weren't kidding. The Chimera flies like nothing else. You almost feel like you're not good enough to be in it.\n\t*goto takeoff\n\n*label takeoff\n\nYou get your instructions from ground control, and taxi out.\n\n*temp eta\n*if shipspeed = 1\n\t*set eta 126\n\t*goto eta\n*else\n\t*set eta 72\n\t*goto eta\n\n*label eta\n\"\u003cOur estimated time of arrival is ${eta} hours>\"\n\n*page_break Onward!\n\n*if information>0\n\tYou remember that you should be doing something with a slingshot but don't recall the details.\n\n\t*if sidekick = \"Cargill\"\n\t\t\"Cargill, do you know anything about slingshotting around a comet?\"\n\n\t\t\"Oh sure, if there's one nearby we should be able to save some time with that.\"\n\n\t\tHe checks the charts. \"Aha! Found one. Yep this should shave off half a day or so.\"\n\n\t\tYou and he plug the information into the computer.\n\t\t*set eta -14\n\n\t\t\"\u003cUpdate ETA ${eta}>\"\n\n\t\tCargill turns on the auto-pilot with a course for Zebulon. You and he will need to monitor the timing of the thrusters to take full advantage of the comet's gravity wake, but otherwise you can let the auto-pilot manage the lateral thrusters for any course correction, and the ship's computer will alert you if it detects any new objects in front of you.\n\n\t\t*page_break Onward!\n\t\t*goto slingshot\n\t*else\n\t\t*if sidekick != \"\"\n\t\t\tYou discuss slingshotting around a comet, but ${sidekick} doesn't know enough about it to be much help.\n\t\t\t\n\t\tYou manage to find the comet that you were told about and plot a trajectory that should save you some time.\n\n\t\t*set eta -7\n\n\t\t\"\u003cUpdate ETA ${eta}>\"\n\n\t\tYou turn on the auto-pilot with a course for Zebulon. You'll need to monitor the timing of the thrusters to take full advantage of the comet's gravity wake, but otherwise you can let the auto-pilot manage the lateral thrusters for any course correction, and the ship's computer will alert you if it detects any new objects in front of you.\n\n\t\t*page_break Onward!\n\t\t*goto slingshot\n*else\n\tYou turn on the auto-pilot with a course for Zebulon. You should be able to let the auto-pilot manage the lateral thrusters for any course correction, and the ship's computer will alert you if it detects any new objects in front of you.\n\n\t*goto slingshot\n\n*label slingshot\n\nFrank puts his hands behind his head. \"Well, we can kick back now. We've got days before we need to do anything.\"\n\n\"Yes, days,\" Linda says. \"Days to prepare ourselves for the trip through the asteroid field and for operating the computer once we get there.\"\n\n\"Come on, we already went through all that on the way to the Moon.\"\n\n*page_break\n\n*if sidekick != \"\"\n\t${sidekick} pipes up, \"I don't know about you all, but I haven't had any really good shut-eye in days. I always sleep terribly on Luna. I think we should all just cryo-sleep until say, zero-hour minus 4. Maximum rest will make me as fresh as possible for when the ship hits the fan, so to speak.\"\n\n\tFrank agrees, \"Yeah. Maybe I've been in space too long, but zero-G is the only civilized way to sleep.\"\n\nLinda interrupts, \"I ought to sift through the computer manual now while we have time so we won't have to spend any more time than necessary on that asteroid. And landing this ship on Zebulon will be tricky. It would behoove you, or whoever pilots this bucket to train on the simulator a bit.\"\n\n*page_break\n\n\"Cheese Louise,\" Frank says, yawning, \"Just put me in the cryo-chamber until we get there.\"\n\n\"Well?\" Linda asks, looking at you.\n\n*if sidekick != \"\"\n\tYou're about to say something when ${sidekick} speaks up. \"I know I'm new here and I know you're the captain, but we're not babies. I think I can figure out how best to spend my time before the mission begins.\"\n\n*temp amount1\n*temp amount2\n*set amount1 eta / 5\n*set amount2 eta / 10\n\n*choice\n\t#\"We're all grown-ups, and you all know what you ought to be doing.\"\n\t\t\"Any questions, ask me.\"\n\n\t\tLinda takes off in a huff clutching the computer manuals.\n\t\t*set lindasmood %- 5\n\t\t*set franksmood %+ 5\n\t\t*set hcomputers %+ 5\n\t\t*set skpiloting %+ 5\n\t\t*set rpiloting %+ 5\n\t\t*goto youtrain\n\n\t#\"I don't know. Let's take ten and I'll let you know when I've made up my mind.\"\n\t\t*set reputation %- 10\n\n\t\tYou immediately realize they were expecting a bit more leadership from you. You pretend to make adjustments to the auto-pilot for a while and then return to the galley and call everyone in.\n\n\t\t\"We have a few days to get ready. I'm not going to micromanage you, but we can't just goof off until we get to Zebulon.\"\n\n\t\t\"Linda,\" you say, \"I want you to focus on:\"\n\t\t\n\t\t*choice\n\t\t\t#Studying the manuals.\n\t\t\t\t*set hcomputers %+ 10\n\t\t\t\t*set lindasmood %+ 5\n\t\t\t\t\"Aye aye.\"\n\n\t\t\t\t*goto Franktrain\n\t\t\t#Training on the simulator.\n\t\t\t\t*set hpiloting %+ 5\n\t\t\t\t*set lindasmood %- 5\n\t\t\t\t\"That's a waste of my time.\"\n\n\t\t\t\t*goto Franktrain\n\t\t\t#Resting up.\n\t\t\t\t*set lindasmood %- 5\n\t\t\t\t*set hstrength %+ 5\n\t\t\t\t\"Aye aye.\"\n\n\t\t\t\t*goto Franktrain\n\t\t\t#Exercising.\n\t\t\t\t*set hstrength %+ 5\n\t\t\t\t\"Aye aye.\"\n\n\t\t\t\t*goto Franktrain\n\t\t\t#Whatever you think is best.\n\t\t\t\t*set lindasmood %- 5\n\t\t\t\t*set hcomputers %+ 5\n\t\t\t\t*goto Franktrain\n\n\t\t*label Franktrain\n\n\t\tYou turn toward Frank. \"And I want you to take some time each day to:\n\n\t\t*choice\n\t\t\t#Study the manuals.\n\t\t\t\t*set rcomputers %+ 5\n\t\t\t\t\"Uh. Okay...\"\n\n\t\t\t\t*goto sktrainz\n\t\t\t#Train on the simulator.\n\t\t\t\t*set rpiloting %+ 10\n\t\t\t\t*set franksmood %+ 5\n\t\t\t\t\"Yay!\"\n\n\t\t\t\t*goto sktrainz\n\t\t\t#Rest up.\n\t\t\t\t*set rstrength %+ 5\n\t\t\t\t\"Can do.\"\n\n\t\t\t\t*goto sktrainz\n\t\t\t#Exercise.\n\t\t\t\t*set rstrength %+ 10\n\t\t\t\t\"You got it.\"\n\n\t\t\t\t*goto sktrainz\n\t\t\t#Whatever you think is best.\n\t\t\t\t*set rstrength %- 5\n\t\t\t\t\"Aye aye.\"\n\n\t\t\t\t*goto sktrainz\n\n\t\t*label sktrainz\n\t\t*if sidekick != \"\"\n\n\t\t\t\"And ${sidekick}, I'd like you to focus on:\n\n\t\t\t*choice\n\t\t\t\t#Studying the manuals.\n\t\t\t\t\t*set skcomputers %+ 5\n\t\t\t\t\t\"If you say so.\"\n\n\t\t\t\t\t*goto youtrain\n\t\t\t\t#Training on the simulator.\n\t\t\t\t\t*set skpiloting %+ 5\n\t\t\t\t\t\"If you say so.\"\n\n\t\t\t\t\t*goto youtrain\n\t\t\t\t#Resting up.\n\t\t\t\t\t*set skstrength %+ 5\n\t\t\t\t\t\"If you say so.\"\n\n\t\t\t\t\t*goto youtrain\n\t\t\t\t#Exercising.\n\t\t\t\t\t*set skstrength %+ 5\n\t\t\t\t\t\"If you say so.\"\n\n\t\t\t\t\t*goto youtrain\n\t\t\t\t#Whatever you think is best.\n\t\t\t\t\t*set reputation %- 5\n\t\t\t\t\t\"If you say so.\"\n\n\t\t\t\t\t*goto youtrain\n\n*label youtrain\n\nNow it's your turn. What do you want to be the PRIMARY way you spend your days before getting to Zebulon?\n\n*choice\n\t#Study the manuals\n\t\t*set computers %+ 5\n\t\t*goto train1\n\t#Train on the simulator\n\t\t*set piloting %+ 5\n\t\t*goto train1\n\t#Rest up\n\t\t*set strength %+ 5\n\t\t*goto train1\n\t#Exercise\n\t\t*set strength %+ 5\n\t\t*goto train1\n\n*label train1\n\nWhat do you want to be the SECONDARY way you spend your days before getting to Zebulon?\n\n*choice\n\t#Study the manuals\n\t\t*set computers %+ 5\n\t\t*goto train2\n\t#Train on the simulator\n\t\t*set piloting %+ 5\n\t\t*goto train2\n\t#Rest up\n\t\t*set strength %+ 5\n\t\t*goto train2\n\t#Exercise\n\t\t*set strength %+ 5\n\t\t*goto train2\n\n*label train2\n\n*if sidekick != \"\"\n\n\tLater in the day you overhear Frank and Linda (mostly Frank) gossiping, with little nice to say about ${sidekick}.\n\n\t*choice\n\t\t#Eavesdrop\n\t\t\t*set reputation %- 5\n\t\t\t*goto listen\n\t\t#Join them\n\t\t\t*set lindasmood %+ 5\n\t\t\t*set franksmood %+ 5\n\t\t\t\n\t\t\tYou sidle up alongside them. They are a little embarrassed to be caught like this.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"Boy do I have some choice words of my own.\"\n\t\t\t\t\t*set reputation %- 10\n\t\t\t\t\t*goto listen\n\t\t\t\t#\"This isn't appropriate.\"\n\t\t\t\t\t\"${sidekick} is new and we need to make every effort to be welcoming and get along with each other.\"\n\t\t\t\t\t\n\t\t\t\t\tYou get up and head to the cockpit.\n\t\t\t\t\t*set reputation %+ 10\n\t\t\t\t\t*set franksmood %- 5\n\t\t\t\t\t*goto conversation\n\t\t\t\t#\"Go on.\n\t\t\t\t\tYou listen.\n\t\t\t\t\t*set reputation %- 5\n\t\t\t\t\t*goto listen\n\t\t#Ignore them\n\t\t\t*goto sktrain1\n\t\n\t*label listen\n\t\n\t*if sidekick = \"Beleina\"\n\t\t\"Beleina is good company for the long ride, but she's a bit of a chatty Cathy, isn't she?\"\n\t\t\n\t\t\"She's less into the give-and-take of conversation and more just into the give...\"\n\n\t\tBeleina appears suddenly and immediately joins the conversation.\n\n\t\t\"Did you get the mac & cheese at Bennie's? Did you know there's no cheese in it? Yeah, some kind of fermented soy protein. I don't know; tastes okay to me. Anything's better than these darn tubes.\n\n\t\t\"I always liked the tapioca. I don't know why, maybe it reminds me of holiday dinners as a kid. But this stuff is just as good.\n\t\t\n\t\t\"Hey, you remember that placed that burned down on Deimos? \"Plube's\"? \"Plube's Tube's\"? Remember that dish? The rice & beans? Only in the menu they spelled it \"Ricin Beans\"? And they didn't know why nobody ever ordered it?\n\t\t\n\t\t\"Oh yeah, even though it was like less than half the price of anything else on the menu?\n\t\t\n\t\t\"Man. I've probably eaten literally a ton of that stuff...\"\n\n\t\t*goto conversation\n\n\t*elseif sidekick = \"Cargill\"\n\t\t\"He intimidates me.\"\n\n\t\t\"It's his swagger.\"\n\n\t\t\"Even in zero gravity he swaggers! How is that even possible?\"\n\n\t\tCargill appears suddenly and immediately joins the conversation.\n\n\t\t\"Hey Cargill, the light switch over the head is a bit wonky, you have to jiggle the switch a lit...\"\n\n\t\t\"What?!\"\n\n\t\t\"Uh... the light switch over the head is...\"\n\t\t\n\t\t\"Oh yeah, yeah. A bit wonky, you have to jiggle the switch a little. Got it...\"\n\n\t\t*goto conversation\n\n\t*elseif sidekick = \"Anders\"\n\t\t\"I want to like Anders, I really do.\"\n\n\t\t\"But he doesn't fit in with us. He's like a fourth wheel.\"\n\n\t\t\"You're going to spend days within just a few feet of the guy.\"\n\n\t\t\"But he doesn't always make it easy. It took him a while to warm up to me, and now he won't stop yammering.\"\n\n\t\tAnders appears suddenly and immediately joins the conversation.\n\n\t\t\"So Duane says he's level 19 but he won't show anyone the readout so we all think he's lying. But why would he lie when he must know we'll find out? And Rhys said his costume doesn't fit him anymore, but what the heck? It's totally fine, you know?\"\n\n\t\t\"Mmm... His costume?\"\n\n\t\t\"Yeah. Wait. You're in the Twefcow Guild, right?\"\n\n\t\t\"Sorry, what's...\"\n\n\t\t\"Twefcow. The Twenty-First Century Office Worker Guild. You know, renaissance stuff. We play like we're back in the 2000s like during the 'Steampunk Revolution' or whatever it was called.\"\n\n\t\t\"Yeesh...\"\n\n\t\t*goto conversation\n\n\t*label conversation\n\t*page_break\n\n\tIt's clear that ${sidekick} isn't fitting in to your group as smoothly as you had hoped.\n\n\tYou try to be friendly but find that you quickly run out of conversation topics, not that ${sidekick} seems to mind much.\n\n\tYou're a little curious what ${sidekick} knows, if anything, about that failed job on Ceres.\n\n\tAnd you wonder whether ${sidekick} is connected at all with Atlas, or with those pirates in the game room, or whether your Space Paranoia is getting out of hand.\n\n\t*choice\n\t\t#Keep ${sidekick} close\n\t\t\t*set reputation %+ 5\n\t\t\tYou need to get along and your crew needs to trust you and be loyal to you.\n\n\t\t\tOn the other hand, you need to respect ${sidekick}'s independence more than you do with Linda and Frank. You don't have the same relationship with ${sidekick} that you do with them.\n\n\t\t\t*choice\n\t\t\t\t#Micromanage\n\t\t\t\t\tYou keep on ${sidekick}'s back about staying active and preparing for the mission.\n\n\t\t\t\t\t${sidekick} seems to resent you for this, but you see results.\n\t\t\t\t\t*set skstrength %+ 5\n\t\t\t\t\t*set skpiloting %+ 5\n\t\t\t\t\t*set skcomputers %+ 5\n\t\t\t\t\t*set reputation %- 5\n\t\t\t\t\t*goto sktrain1\n\t\t\t\t#Be conversational\n\t\t\t\t\t*set reputation %+ 5\n\t\t\t\t\tYou ask about family and home and try to get to know ${sidekick}.\n\n\t\t\t\t\t*if sidekick = \"Beleina\"\n\t\t\t\t\t\tYou learn that she has worked with Asmico before.\n\t\t\t\t\t\t*goto alsatian\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou learn that he has worked with Atlas before.\n\t\t\t\t\t\t*goto alsatian\n\n\t\t\t\t\t*label alsatian\n\t\t\t\t\t\n\t\t\t\t\tYou want to ask about Ceres and whether ${sidekick} knows of the accusations made against you.\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Be direct\n\t\t\t\t\t\t\tYou bluntly ask ${sidekick} about the botched Ceres mission and what your reputation is.\n\t\t\t\t\t\t\t*if sidekick = \"Anders\"\n\t\t\t\t\t\t\t\t*set reputation %- 5\n\t\t\t\t\t\t\t\tHe is surprised by your brusqueness but tells you that he's not familiar with the Ceres mission and had never heard of you before meeting you.\n\t\t\t\t\t\t\t\t*goto sktrain1\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tAlthough surprised by your brusqueness, ${sidekick} seems to be almost relieved by your honesty.\n\t\t\t\t\t\t\t\t*set reputation %+ 5\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t\t\t${sidekick} almost blushes. \"It's hard to put a number on these things but I'd say your general reputation is... I don't know... maybe about ${reputation} out of 100, based on what I heard back on Luna.\"\n\t\t\t\t\t\t\t\t\t*goto sktrain1\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t... but not enough to overcome the obvious mistrust. ${sidekick} prevaricates and steers the conversation toward other topics.\n\t\t\t\t\t\t\t\t\t*goto sktrain1\n\n\t\t\t\t\t\t#Be coy\n\t\t\t\t\t\t\t*if sidekick = \"Anders\"\n\t\t\t\t\t\t\t\t*set reputation %- 5\n\t\t\t\t\t\t\t\tHe is completely oblivious to what you're referring to and has clearly never heard of you or your supposed reputation.\n\t\t\t\t\t\t\t\t*goto sktrain1\n\t\t\t\t\t\t\t*elseif sidekick = \"Beleina\"\n\t\t\t\t\t\t\t\tShe quickly gets your meaning and is oddly coy about Ceres and your reputation. You try to draw out her real opinion, but she dodges every question.\n\t\t\t\t\t\t\t\t*goto sktrain1\n\t\t\t\t\t\t\t*elseif sidekick = \"Cargill\"\n\t\t\t\t\t\t\t\tHe's slow to get your meaning, and then suddenly seems to recognize you. After that he doesn't say a word.\n\t\t\t\t\t\t\t\t*goto sktrain1\n\t\t\t\t\t\t\t*goto sktrain1\n\n\t\t\t\t\t\t#Don't ask\n\t\t\t\t\t\t\tYou don't want to embarrass yourself.\n\t\t\t\t\t\t\t*goto sktrain1\n\n\t\t\t\t#Just observe\n\t\t\t\t\tYou don't interact any more than necessary, but watch ${sidekick} closely.\n\t\t\t\t\t*goto sktrain1\n\t\t#Remain aloof \n\t\t\tYou most likely interact with ${sidekick} again after this mission, so there's no point investing yourself in a relationship, professional or otherwise.\n\t\t\t*set reputation %- 5\n\t\t\t*goto sktrain1\n\n*label sktrain1\n\n*set hours (eta - 20)\n*set deadline (150 - hours)\n\n*page_break Days pass...\n\nAfter days coasting with the Solar wind at your back the ship computer sounds an alert. \"\u003cOutermost objects in asteroid belt now in visual range>\"\n\n\"\u003cThe deadline for earning the 2 thousand dollar bonus is ${deadline} hours away>\"\n\nNow is when the trickier flying begins. You leave the auto-pilot on but keep your hands on the controls in case you need to take action.\n\n*if sidekick != \"\"\n\tWho do you want to pilot the ship from here on?\n\t\n\t*choice\n\t\t#I'll do it.\n\t\t\t*set temppilot piloting\n\t\t\t*goto whopilot\n\t\t#${sidekick}\n\t\t\t*set whopilot sidekick\n\t\t\t*set temppilot skpiloting\n\t\t\t*goto whopilot\n\t\t#Frank\n\t\t\t*set whopilot \"Frank\"\n\t\t\t*set temppilot rpiloting\n\t\t\t*goto whopilot\n\t\t#Linda\n\t\t\t*set whopilot \"Linda\"\n\t\t\t*set temppilot hpiloting\n\t\t\t*goto whopilot\n\n\n\n*label whopilot\n\nSome hours later...\n\nYou're
