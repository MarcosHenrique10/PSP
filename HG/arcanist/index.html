housand trumpets were set off right next to your bed as you were sleeping.\n\n\t\tYou fall to the ground and gasp. \n\n\t\tYou are unsure how many minutes have passed, but you find yourself controlled once again. You get up in a daze and touch the orb. You have lost all sense of touch, and don't even feel the orb yet you can see it cupped in your hand.\n\n\t\tA dazzling display of a rainbow of colours weakly pulses out of the orb. The room is partially revealed, and you can make out some decorations, including paintings and portraits, along with a shield by one of the walls.\n\n\t\tA tall man comes into your sight. He speaks, yet you can't hear him properly.\n\t\t*set health -10\n\t\t*goto C\n\n\t#You shout, \"Get the hell out of my head!\"\n\t\t(gained Void)\n\n\t\t\"Get the hell out of my head!\"\n\t\t\n\t\tA wave of purple energy is released from within you. The voice is pushed out of your mind, much to your own relief. You take long breaths and place your hand onto your chest. Your heart is beating rapidly, so much you can feel it's every beat.\n\t\t\n\t\tYou fall onto your knees, sweat trickles down your face and you gasp. \n\n\t\t\"Impressive, little one,\" the male voice comes back. \"Enough of these games and let me do my job.\"\n\n\t\tYou lose control over your body once again. You get up and walk over to the orb and touch it. The orb pulses weakly in the colour of a rainbow. The room is partially revealed, and you can make out some decorations, including paintings and portraits, along with a shield by one of the walls.\n\n\t\tA tall man comes into your sight, after which you regain control over your body. The man looks at you with furrowed brows and then nods. \"Interesting thing you did there, I'll give you that. But if you disobey me again I will make your life a living hell, is that understood?\"\n\n\t\tYou are taken aback, unsure about what the man is talking about, yet you nod as you notice the cold expression he is giving. \n\t\t*set void +10\n\t\t*goto C\t\n\t\n*label C\n*page_break\n\"Welcome to the Fae Academy ${name} Light. I believe you will fit right into the culture of this school here,\" the man says. He removes the black top hat he was wearing. \"My apologies, I forgot to introduce myself. I am Professor Drakath, and I will be the person in charge of your incoming cohort.\"\n\nProfessor Drakath is bald, with bushy brows and blue eyes which compliment his dark black skin. You get to see his white teeth as he makes what you assume is a smile, yet it looks much more ferocious, as if he was a snarling wolf.\n\nYou clear your throat and stare at the man vigilantly. \"You could have just brought me here without keeping me in the dark like that,\" you say. You frown. \"I didn't enjoy this fiasco one tiny bit.\"\n\nProfessor Drakath chuckles. \"Oh my, ${name}, these are simply things you will have to get used to here. After all, you decided to join our Fae Academy, and thus you must respect our methods that have nurtured thousands of successful mages renown across Michiwitt. Is that understood?\"\n\nYou don't respond. [i]What kind of stupid logic is that?[/i]\n\nProfessor Drakath sighs. \"Anyhow, I would like to congratulate you once again for passing our test. Magic does indeed course through your veins at a passable standard to our criteria. Not many pass this test, after all. Consider yourself a part of the elite.\"\n\nThe two of you stand in silence, staring each other in the eyes.\n\n*page_break\n\nThe man rubs his bald head. \"Ah, right, I completely forgot.\" Drakath snaps his fingers, causing a pink light to burst out from them. A sheet of paper materializes from the pink light and floats down into your hands.\n\n\"What is this?\" you ask.\n\n\"Your timetable for the first term,\" he responds. \n\nYou squint, looking down at the blank piece of paper.\n\n*fake_choice\n\n\t#\"Uhm, the timetable is blank.\"\n\t\t\"Uhm, the timetable is blank.\"\n\t#\"You're joking, right? There's nothing on this sheet of paper.\"\n\t\t\"You're joking, right? There's nothing on this sheet of paper.\"\n\n\t#\"Sir, the sheet seems to be blank. Does that mean I have no lessons?\"\n\t\t\"Sir, the sheet seems to be blank. Does that mean I have no lessons?\"\n\nProfessor Drakath grabs the sheet out of your hand and then mutters something under his breath. \"My mistake, I forgot that we have undergone a change in how we do our lectures here starting this term. There are no more timetables.\"\n\n\"No more timetables? So what am I supposed to do throughout my days here?\" you respond.\n\n\"No timetables doesn't mean there are no timetables. Do you get what I'm trying to say?\" The man tilts his head and raises his brows.\n\nYou shake your head and try to figure out what he was getting to. [i]What? No I don't get what you're saying. That made no sense. Literally zero sense at all![/i]\n\n\"…\"\n\n\"…\"\n\nThe silence echoes as you stare into Professor Drakath's eyes. \n\n\"…\"\n\n*page_break\n\nYour shoulders slump in defeat. \"No, I one thousand percent don't understand what you are trying to say.\"\n\nProfessor Drakath groans and rubs his temples. \"Ah, the youth of this day, no common sense or independent reasoning whatsoever. What I mean to say is there are timetables, lessons will be going on, however it is wholly within your autonomy to decide whether you go to a lesson or not.\" \n\nThe man then hands you back the sheet of paper. This time, the sheet is filled with the different lessons you can take part in during a day. You spot that during a day you can only go to two lectures, as each lecture takes a block of three hours.\n\n\"Your lectures start tomorrow,\" Professor Drakath adds. \"I suggest you go to your dorm and rest up.\"\n\nThe man pauses.\n\n\"…\"\n\n\"…\"\n\n[i]Can you hurry up and tell me where to go you scary man.[/i]\n\n\"Anyways, it would be great if you could leave now, I have another student that I must attend to.\"\n\n*fake_choice\n\t#\"Attend to? Don't you mean kidnap?\"\n\t\t\"Attend to? Don't you mean kidnap?\"\n\t\t\n\t\tThe professor grins. \"Good one.\" He points to a nearby door. \"Leave that way and close the door on the way out.\"\n\t\t\n\t#\"Where exactly am I leaving?\"\n\t\t\"Where exactly am I leaving?\"\n\t\t\n\t\tProfessor Drakath groans and rubs his temple. He points to a nearby door. \"Obviously you leave through a door. Close it on the way out.\"\n\nYou make your way out of the room.\n\n*set met_drakath \"true\"\n\n*page_break\n\nYou find yourself walking through a narrow hallway. There are dozens of doors along the corridor, with each door having a signpost on it, revealing which class can be found within. \n\nYou are able to spot that classes such as 'Basic Illusions', 'Intermediate Illusions' and 'Advanced Illusions' are right next to each other. It seems this is the same for all other domains of magical study, with them being grouped together in nearby rooms with the varying entry levels separated.\n\nAs you walk through the corridor, you spot a crossroad of sorts. There are three passageways, labelled with the area that they lead to. \n\n*choice\n\n\t#Follow the pathway to the Cafeteria.\n\t\tYou rub your stomach, realizing you haven't eaten in almost two days. You think back to the rough journey you had to take to get here and smile. \n\t\t\n\t\t[i]You made it here in one piece ${name}, you're a strong ${man} that's for sure.[/i]\n\t\t\n\t\tMaking your way to the meeting area for the academies was no easy affair, considering that you had run away from home with only 5 gold pieces to your name.\n\t\t\n\t\tYou think back at your decision to not spend those 5 gold pieces, and nod in approval. Now that you're in the academy, you will no longer have to spend a single piece of silver to sustain yourself, as they will cover this cost.\n\n\t\tAs you make your way to the cafeteria, your nose is bombarded by the succulent aroma of barbecued chicken. Once inside the cafeteria, you notice there aren't many students around. There are only about thirty of them, but they seem to be minding their own business as not many mingle with each other.\n\n\t\tOut of the corner of your eye you spot a familiar face. Estelle is sat by herself, eating food from her plate consisting of grilled chicken and salad.\n\t\t\n\t\tAs if noticing your gaze, the girl looks up and makes eye contact. She waves at you.\n\t\t*goto D\n\t\t\n\n\t#Follow the pathway to the Dorms.\n\t\tYou walk through to the dorm area, nodding at a couple of the students you breeze past. Most of them seem to be around your age, and are too busy making their way to their own rooms to notice you.\n\t\t\n\t\tThe dorms are separated into the different year groups, and you find that there are five year groups in total. \n\n\t\tAs you walk around, you find that there is a small garden just past the first year dorm.\n\n\t\tYou walk into the garden and rejoice at the sweet peach smell that fills the air. It is rather spacious, with it easily able to contain more than thirty people at once. There is also a fountain in the middle of the garden. Water spews out of the fountain through a statue of a tiny woman with green wings. On the statue it is written 'The Fae queen Aim von Khaeng.'\n\n\t\tYou sit by one of the benches and start to doze off. After a while you are sound asleep. \n\t\t\n\t\t*page_break\n\t\t\n\t\tYou are jolted back to reality as you feel something tapping against your shoulder. \n\n\t\t\"Everything okay there?\" a boy asks. \"Need any help?\"\n\t\t*goto E\n\t\t\t\n\n\n\t#Follow the pathway to the Training Rooms.\n\t\tYou make your way through the corridor that goes to the training rooms. Blood and sweat fill the air, and as you get closer you can hear the sounds of spells crashing into walls and people fighting each other.\n\t\t\n\t\tYou know the sound of magical spells as you've heard them many times before, but you've never been this close to one in your life. You gulp hard. \n\n\t\t[i]Is this a good idea?[/i] \n\t\t\n\t\tYou're unsure of whether to turn back now as you have zero experience in magic and not enough in hand to hand combat. Just as you decide to turn around, you find a man blocking your way.\n\n\t\t\"Fresh blood? Come on over here,\" the man says.\n\t\t*goto F\n\n*label D\n*choice\n\n\t#Ignore Estelle and leave the Cafeteria\n\t\t*set social -5\n\t\t(lost social)\n\t\t*goto checkpoint_save\n\n\t#You approach Estelle\n\t\t(Estelle approves) (gained Intelligence) (gained Social)\n\t\t\n\t\tYou walk over to Estelle and ask, \"Can I sit here?\" \n\n\t\tThe girl beams, joy written all over her face, bringing a fuzzy warmth to your heart. \"Of course you can sit next to me! I'm so glad that you were able to pass the test,\" she says. She puts down the fork in her hand. \"None of the others from our base location made it here, that kinda sucks but I knew you would make it.\" The girl gives you a thumbs up.\n\n\t\tYou look at her with confusion. \"What are you talking about? Our base location?\"\n\n\t\tEstelle tilts her head and looks at you with widened eyes. \"You really don't know anything do you? You realize that there are hundreds of different locations in our great country of Vargas, from which the Nine Great Academies recruit their students from. And we're only a small country compared to Michiwitt… You're lost aren't you? Are you an amnesiac?\"\n\n\t\tYou laugh nervously and rub the back of your neck. \"Uhm, I am a bit lost, yes.\" \n\t\t\n\t\tEstelle slumps back into her chair. \t\t\"Oh, ${name}, I take it you also don't know why so few were lined up for the Fae Academy.\" She quickly raises her hand before you're even able to answer. \"It's alright, you don't have to say a thing, whatever you say will just disappoint me anyway.\"\n\t\t\n\t\t\"That's mean Estelle…\"\n\n\t\tEstelle frowns for a moment, and then continues, \"I'm sorry. I'll just explain. The reason why so few people lined up for the Fae Academy is because it has the highest rate of failure for the students. Their criteria are different to the other schools, after all, they value roughened edges over perfect diamonds.\"\n\n\t\tYou smile weakly, realizing that you made a grave mistake by not researching the different schools in much more depth. \"I'm lucky...\"\n\n\t\t\"You betcha, lucky is an understatement. But then again, I suppose their criteria fits you perfectly, roughened edges with a chance to glimmer much brighter than even a perfect diamond.\" The girl nods. \"Yes, being friends with me will help you get there in no time.\" She gives you a thumbs up once again.\n\t\t\n\t\t\"Ouch.\"\n\t\t\n\t\t*page_break\n\n\t\tEstelle then proceeds to explain to you how the academy works. She tells you that every few weeks students are tested, which involves a myriad of events, including dungeon excursions, going into beast ranges and also more simple tests of prowess in your own chosen subjects.\n\n\t\tAfter six months, students are all put together and fight it out for a chance to represent the Fae Academy in the Annual Competition of Magic, where all Nine Great Schools will be sending their most gifted individuals. \n\n\t\t\"Thank you, Estelle,\" you say once the girl ends with her run-down of things you should know. \"I'm pretty tired, I think I'm just going to go and find my room and collapse on my bed. We should hang out again later.\"\n\n\t\tYou wave goodbye and walk out of the cafeteria with a full belly and a worn out mind. \n\t\t*set intelligence +10\n\t\t*set health -5\n\t\t*set social +10\n\t\t*goto checkpoint_save\n\n*Label E\n*choice\n\n\t#\"Yea everything is fine. I was just dreaming a little.\"\n\t\t(gained Social) (Brandon approves)\n\t\t\n\t\t\"Yea everything is fine. I was just dreaming a little.\"\n\n\t\tThe boy smiles. You notice he has long blonde hair along with orange eyes. He has freckles all over his face. The boy sits down next to you. \"Isn't it insane how we made it here? I assume you're a first year as well, right?\" He stretches out his hand. \"Oh, my apologies for being rude I haven't even introduced myself yet. I'm Brandon, a pleasure to meet you.\"\n\n\t\tYou nod. \"I'm ${name}, nice to meet you too.\"\n\n\t\t\"You know, this place is filled with so many amazing stories. At least that's what I have heard from my older sister. She's a fourth year here.\" Brandon pauses. His demeanour changes for a split second. \t\t\"Anyway, what brought you here ${name}? Why did you choose this school of all places? I mean I chose it solely because my sister is here, but I take it you have other reasons.\"\n\n\t\tJust as you are about to answer, Brandon cuts you off. \"Sorry, this is probably too personal of a question anyway, don't mind me. I should learn to keep my mouth shut when you don't even know me yet to be answering that type of question.\"\n\t\t\n\t\t\"Don't worry about it,\" you reply. \"And to be honest, I just kind of randomly chose to come here…\"\n\t\t\n\t\tBrandon's eyes widen and he grins. \"You're a crazy ${man}, you know that? That's just bloody hilarious. So do you even know what happens here?\"\n\t\t\n\t\tYou shake your head. \"Uhh, not really, no. I didn't have the luxury to do much research before getting here.\"\n\t\t\n\t\t\"I see I see, well, you came to the right place then. I have all the information that you could ever need right here.\" He points to his temple. \n\n\t\t*page_break\n\t\t\n\t\tThe two of you proceed to chat about the school, and Brandon gives a lot of information about what is going to transpire in the coming weeks. You find out that students are tested every couple of weeks, and that at the end of the term, students are chosen to represent the Fae Academy at the Annual Competition of Magic, where the Nine Great Schools battle it out against each other.\n\n\t\tYou talk with Brandon for what seems like only a couple of minutes, yet already a full hour has passed by. The boy excuses himself and says he has some things to take care of, before leaving. \n\t\t\n\t\t*set met_brandon \"true\"\n\t\t*set social +10\n\n\t\t*goto checkpoint_save\n\t\t\n\n\t#Ignore the boy and leave the garden.\n\t\t*set social -5\n\t\t(lost social)\n\t\t*goto checkpoint_save\n\n*Label F\n*choice\n\n\t#Ignore the man and run away\n\t\t*goto checkpoint_save\n\n\t#You gulp hard and approach the man.\n\t\t(gained Strength) (gained Social) (Arthus approves)\n\n\t\t\"What're ya doing here kid?\" the man asks. He is a medium height yet he has the most muscles you've ever seen in your life. A body builder amongst body builders. He has short brown hair, and a disjointed nose that bends to the left.\n\n\t\t\"Nothing,\" you reply. \"I'm just lost. No worries though, I can find my way ba-\"\n\n\t\tThe man cackles. \"Well ya ain't lost no more are ya! Come, I'll give ya a good first lesson for free. Just yer luck that I've been aching to train a greenhorn newbie.\" He grabs you and then picks you up onto his shoulder before entering into one of the rooms. \n\t\t\n\t\tYou flail about but are unable to get out of his grasp.\n\n\t\tThe room reeks of copper and iron, and you notice the blue mats on the ground are stained all over with patches of blood. \n\n\t\t\"I-I don't think I want to be here right now,\" you squeak. \n\n\t\tThe man puts you down. \"I ain't giving ya a choice. As yer teacher yer have to obey all my commands the moment you enter my classroom until the lesson is done. Now drop down and gimme fifty!\"\n\n\t\tYour heart races and a crippling fear spreads through your body, causing you to tense up. You swallow all the saliva in your mouth. You obey the teacher and start doing pushups. He then instructs you through almost a dozen more exercises. \n\n\t\t\"Well done kiddo, I'll make a fine ${man} out of you,\" the man says after you finish the last exercise. \"Good ol' Arthus here will have his doors open for a student such as yourself any time of the day! Now get outta here and enjoy ya first day at the academy.\" \n\t\n\t\t*set met_arthus \"true\"\n\t\t*set strength +10\n\t\t*set social +5\n\t\t*goto checkpoint_save\n\t\n*label checkpoint_save\n*goto_scene fae_academy2", "fae_academy2": "*page_break\n\nYou make your way to your dorm room, following the instructions which you find on the backside of the sheet of paper that Professor Drakath had given you.\n\nIt doesn't take long for you to find the location. You open the door, finding it to be relatively spacious. It is also quite colourful, much to your surprise. There are lively paintings hung up all around the room, some of flowers, others of animals and some of magical spells like fireballs and water cannons.\n\nYou walk into your room and close the door behind you. There is a single king sized bed in the centre of the room. Beside it there is a mahogany drawer. To one corner is a wardrobe, with a mirror attached to one of its thick, wooden doors.\n\nThere are two doors in the room. You inspect both, finding that one leads to a bathroom, and the second leads into a study area, where there is a desk and a couple of large, heavy books placed upon it.\n\n[i]This is my new home sweet home, I guess.[/i]\n\nYou take in the scenery of what will be your new abode for the foreseeable future. You breath in slowly and deeply as tears well up in your eyes. You think back to your family, especially your older brother who you were extremely close with.\n\nYou wipe away the tears and shake your head. \"Now isn't the time for that.\"\n\n*choice\n\n\t#Take a shower.\n\t\tYou go into your bathroom. You marvel at the shower, which is made with four glass panes, creating a heavenly box. The floor of the shower is a pleasant to the eyes mosaic, the patterns almost hypnotizing.\n\t\n\t\tOnce you step into the shower, you turn on the water. It comes out at the perfect temperature, as if it already knew that you wanted it hot but not too hot. \n\n\t\tYour worries and anxieties from the day seem to wash away. You think back at the events that unfolded today, and you smile. You can't wait to start learning about magic.\n\n\t\tAfter finishing your shower, you decide that you are too exhausted to do anything else and you hop into the comfort of your bed.\n\n\t\t*goto Day1\n\n\t#Enter the study.\n\t\tYou enter the study, revealing a single desk with a chair behind it. There is a bookshelf to your right, however there aren't any books.\n\n\t\t[i]Well I suppose I'm going to be filling that up really soon.[/i]\n\t\t\n\t\tYou look to the desk and quickly scan the three heavy books on it.\n\n\t\tOne is titled 'Illusion Magic for Beginners'. The second is titled 'The Art of Theurgy'. Finally, the last book available is called 'Meditation and its uses'. \n\n\t\tAfter deliberation, you decide to read through one of the books. Which do you choose?\n\n\t\t*choice\n\n\t\t\t#Read Illusion Magic for Beginners.\n\t\t\t\t(gained Illusion) \n\n\t\t\t\tYou spend the next couple of hours reading through the pages of the book. The book details that to use illusion magic is to create something which doesn't exist. This statement may sound contradictory at first, however the more you read the book, the more you understand.\n\n\t\t\t\tIllusion magic can be used to create vivid replications of all the five senses. It allows the user to make the sound of a bell echo in another person's mind, or in a group of peoples' minds if your techniques are advanced enough.\n\n\t\t\t\tIt can also be used to create images of objects and things. Of course, starting off, an individual will only be able to create small objects, however the more advanced an individual becomes, and the greater their control over illusion magic, the greater the wonders they can manifest.\n\n\t\t\t\tYou read that if you reach a high enough level, you can even create illusions that are so complex that they can become actual reality.\n\n\t\t\t\tYou find that your mind is numb from all of the reading you've done, and you decide to go to sleep.\n\n\t\t\t\t*set illusion +10\n\t\t\t\n\t\t\t\t*goto Day1\n\n\t\t\t#Read The Art of Theurgy.\n\t\t\t\t(gained Theurgy)\n\t\t\t\t\n\t\t\t\tYou spend the next couple of hours reading through the pages of the book. \n\n\t\t\t\tTheurgy is the magic of life and healing. It is said that the most advanced users of theurgy can practically become immortal. However, this doesn't mean that they are invincible, as a severed head will almost always do the trick in snuffing the life out of a person.\n\n\t\t\t\tTheurgy is not only used for healing. It also has offensive and defensive spells which are mainly focused around the powers of nature and the life force of oneself and your opponents.\n\n\t\t\t\tYou find that your mind is numb from all of the reading you've done, and you decide to go to sleep. \n\t\t\t\t*set theurgy +10\n\n\t\t\t\t*goto Day1\n\n\t\t\t#Read Meditation and its uses.\n\t\t\t\t(gained Intelligence)\n\t\t\t\t\n\t\t\t\tYou spend the next couple of hours reading through the pages of the book. The book describes that meditation can be used to cleanse the impurities within your body, which aids in replenishing ones own health and reduces stress.\n\n\t\t\t\tThe book also describes that meditation improves the way in which your brain functions, allowing for faster cognition and aids to increasing the amount of information that can be stored within it.\n\n\t\t\t\tYou find that your mind is numb from the reading and practising of meditation techniques. You decide to get into your bed and you fall asleep almost immediately. \n\t\t\t\t\n\t\t\t\t*set intelligence +10\n\t\t\t\t*goto Day1\n\n\n\t#Go to sleep.\n\t\tYou decide to forgo studying or showering as you are simply too tired to continue for the day. \n\t\t\n\t\tYou spend a couple of minutes thinking about everything that has happened today, along with what the future holds for you. You well up with excitement at the thought of finally being able to use magic to create wonders.\n\n\t\tYou get into your bed and fall asleep almost immediately.\n\n\t\t*goto Day1\n\n*label Day1\n\nYou wake up with the glare of the sun flowing through your bedroom. You get out of your bed and walk over to your window. \n\n[i]Reminder to self, close the blinds in the evening.[/i]\n\nYou open the window. After opening it a warm breeze of fresh air enters.\n\nYou yawn and go to your bathroom, freshening yourself up. You then walk over to the clock that hangs opposite to your bed. The time reads 07:30.\n\nYou pick up the sheet of paper given to you by Professor Drakath and look at the timetable. You have three options available for your 08:00 slot.\n\n*choice\n\t#Go to Basic Illusions\n\t\t*goto basicillusions\n\t#Go to Basic Theurgy\n\t\t*goto basictheurgy\n\t#Go to Training Room\n\t\t*goto trainingroom\n\t\n*label basicillusions\nYou look down at your timetable and decide that illusion magic is something you want to learn more about as soon as possible. \n\nYou make your way out of your dorm and go through to the area of the academy where all of the classrooms are. It doesn't take long for you to find the class.\n\nAs you reach the class, you find that it is rather empty. The class is spacious, able to accommodate at least forty to fifty students. The room takes the shape of a lecture hall, with the wooden seats having tiny desks attached to them that can be flipped open or closed.\n\nThere are only about fifteen students currently in the hall, spread out rather thinly along the room. You walk over to an empty space toward the middle of the hall and sit down. \n\nYou look toward the front of the class where there is an elevated stage on which the lecturer will be carrying forth the lesson. There is a clock to the wall and it reads 07:45. You realize that you came way too early.\n\n[i]Better early than late.[/i]\n\n*if (met_brandon=true)\n\t\"Can I sit here?\" a familiar male voice calls out. You turn around and see Brandon standing a couple meters away. Before you can even reply the boy has already sat himself next to you.\n\n\t*fake_choice\n\t\t#\"Of course.\"\n\t\t\t\"Of course,\" you say. \"You picked illusion magic as well, what a coincidence.\"\n\t\t#\"Sure, I guess.\"\n\t\t\t\"Sure, I guess,\" you say. \"You picked illusion magic as well, what a coincidence.\"\n\t\t#\"Oh good morning Brandon.\"\n\t\t\t\"Oh, good morning Brandon,\" you say. \"You picked illusion magic as well, what a coincidence.\"\n\n\tBrandon nods. \"Of course! There's nothing cooler than creating something which doesn't exist.\" He rubs his hands together and smiles devilishly. \"Oh I'm going to prank my sister the moment I've learned something useful.\"\n\n\tYou shake your head and stifle a laugh. The two of you talk about illusion magic and it's uses for the next couple of minutes.\n\n\tThe moment the clock turns 08:00 your vision goes dark. Voices echo in your mind and you cover your ears as you try to push them out. \n\n\t*choice\n\t\t*selectable_if (illusion > 15) #Defend yourself\n\t\t\t(gained Illusion)\n\n\t\t\tYou snap out of your delirium and force the voices out of your head. Your vision slowly fades back in and you find Professor Drakath stood at the front of the class.\n\n\t\t\tAs you look around you notice that many of the other students have their faces planted on their desks. Only about ten of the total forty students seem to have escaped the spell, including Brandon beside you.\n\n\t\t\t*set illusion +5\n\n\t\t\t*goto illusion_1\n\n\t\t#You are helpless\n\t\t\tTime seems to pass and you are unable to get the voices out of your mind. The voices become louder and louder, and you find yourself sinking into the ground.\n\n\t\t\tYour vision suddenly comes back after what felt like an eternity. Your body feels weak and your brain feels like it has been turned to jelly.\n\n\t\t\t*goto illusion_1\n\n*if (met_brandon=false)\n\n\tYou wait around in the class, and after about ten minutes the seats have started filling up. You estimate that there are probably around forty individuals in the room.\n\n\tThe moment the clock turned to 08:00 your vision went dark. Voices started to echo in your mind and you cover your ears as you try to push them out. \n\n\t*choice\n\n\t\t*selectable_if (illusion > 15) #Defend yourself\n\t\t\t(gained Illusion)\n\n\t\t\tYou snap out of your delirium and force the voices out of your head. Your vision slowly fades back in and you find Professor Drakath stood at the front of the class.\n\n\t\t\tAs you look around you notice that many of the other students have their faces planted onto the desks. Only about ten of the total forty students seem to have escaped the spell, including the boy sat beside you.\n\n\t\t\t*set illusion +5\n\n\t\t\t*goto illusion_1\n\n\t\t#You are helpless\n\t\t\tTime seems to pass and you are unable to get the voices out of your mind. The voices become louder and louder, and you find yourself sinking into the ground.\n\n\t\t\tYour vision suddenly comes back after what felt like an eternity. Your body feels weak and your brain feels like it has been turned to jelly.\n\n\t\t\t*goto illusion_1\n\n\n\n*label basictheurgy\nYou look down at your timetable and decide to pick theurgy as your first lesson of the school year. For some reason you really want to know how theurgy works; the prospect of being able to heal and cure somebody piques your interest much more than throwing fireballs or creating illusions.\n\nYou make your way out of your dorm and through to the area of the academy where all of the classrooms are. It doesn't take long for you to reach your destination.\n\n*if (met_estelle=true)\n\tAs you walk into the class, you notice Estelle is sat toward the front on her own. As if sensing your presence, the girl turns around. As your eyes lock with hers, she raises her hand and calls you over. \n\n\tYou make your way to Estelle and sit next to her.\n\n\t\"Theurgy, an unexpected choice for you,\" Estelle says.\n\n\tYou tilt your head. \"Why is that? Don't I look like somebody who cares for helping others?\"\n\n\tEstelle giggles. \"No, I just assumed you're less reserved and more of a maniac when it comes to magic.\"\n\n\tYour mouth opens wide. You can't understand the gall of this girl. \"That's mean!\"\n\n\tEstelle sighs. \"You're right, I'm sorry, I didn't mean it like that. But anyway, you're here now so I suppose we can help each other out, right?\"\n\n\tYou nod. \"Yes, exactly. As long as you don't make remarks like that then we are all good.\" You give a thumbs up, causing the girl to smile.\n\n\t*page_break 08:00\n\n\tThe clock strikes 08:00. \n\n\tA small woman walks into the room. She wears a green robe and has a green tiara on her head, covering her black hair which is speckled with gray.\n\n\tThe woman coughs. \"Good morning everybody.\" Her voice is deep and she breaths frantically as if she has issues with her lungs. \"Welcome to Basic Theurgy my sweet, hopeful students. I am Professor Sakamei.\"\n\n\tShe coughs once again, but this time more violently. \"Now I'm going to have to let you all down as we won't be doing any practical lessons for quite a while, neither are we going to be learning about theurgy per se.\"\n\n\tYou look to Estelle.\n\n\t*fake_choice\n\t\t#\"Is she okay?\"\n\t\t\t\"Is she okay?\n\t\t#\"Isn't theurgy supposed to make us immortal?\"\n\t\t\t\"Isn't theurgy supposed to make us immortal?\"\n\t\t#\"Oh I have a bad feeling about this class.\"\n\t\t\t\"Oh I have a bad feeling about this class.\"\n\n\t\"Quieten down,\" Professor Sakamei shouts whilst looking directly at you.\n\n\tYou shift uncomfortable in your seat.\n\t*goto theurgy_1\n\n*if (met_estelle=false)\n\tYou find an empty seat toward the middle of the class and sit down. You look around and scan the room, but all you see is unfamiliar faces.\n\n\t*page_break 08:00\n\n\tThe clock strikes 08:00. \n\n\tA small woman walks into the room. She wears a green robe and has a green tiara on her head, covering her black hair which is speckled with gray.\n\n\tThe woman coughs. \"Good morning everybody.\" Her voice is deep and she breaths frantically as if she has issues with her lungs. \"Welcome to Basic Theurgy my sweet, hopeful students. I am Professor Sakamei.\"\n\n\tShe coughs once again, but this time more violently.\t\t \"Now I'm going to have to let you all down as we won't be doing any practical lessons for quite a while, neither are we going to be learning about theurgy per se.\"\n\n\t*goto theurgy_1\n\t\t\n*label trainingroom\nYou look down at your timetable and decide that you want to go to the training area. You believe that you'll be surrounded by a lot of magic in the coming weeks, and thus you should work to keep your body as fit and strong as possible.\n\nAfter all, a healthy body means a healthy mind. And without that, you know that you won't be at the optimum level to study in the first place.\n\n*if (met_arthus=true)\n\n\t\tYou walk through the familiar corridors and soon find yourself stood outside the room where you were recently put through gruelling physical exercise. Despite this, you've come back for more as the experience revitalized and energized you.\n\n\t\tYou walk into Training Room 20. There are twenty training rooms in total along the corridor.  The thick smell of blood hits you once again, yet this time you are ready for it and aren't as thrown off by it.\n\n\t\tThere are about a dozen other students in the room.\n\n\t\t\"Good morning pipsqueaks,\" the teacher says. He is the same man you met previously. He looks at you and makes a toothy grin.\n\n\n*if (met_arthus=false)\n\n\t\tYou make your way through the academy, following a map that you hold in your hand. Soon, you find yourself in an corridor where each room has the word 'Training Room' written on it, with each room having a different number.\n\n\t\tYou notice that there are twenty training rooms, making you wonder how many are needed for an academy that teaches magic. You reach Training Room 20, which is where you've been directed to go.\n\n\t\tYou open the door and are immediately hit by a thick smell of blood and sweat. You cover your nose as you walk in. You feel nauseous. \n\n\t\tThere are about a dozen other students in the room. \t\t\t\tThe floors of the room are covered in blue mats, which are stained with blood. You feel the contents of your stomach begging to be released, but you close your eyes and focus hard to not vomit.\n\n\t\t\"Good morning pipsqueaks,\" the teacher in charge says. He is a medium height yet he has the most muscles you've ever seen in your life. A bodybuilder amongst bodybuilders. He has short brown hair, and a disjointed nose that bends to the left.\n\n\n*goto training_1\n\n\n\n*label illusion_1\n\n*page_break\n\nProfessor Drakath clears his throat. \"To all of you that were able to break out of this simple spell, congratulations. It seems you will be doing well in this class of mine.\"\n\nThe man pauses and looks around the room, seemingly making brief eye contact with every student. \"For those of you who didn't, I expect you to put in double or triple the amount of effort. If by next week you are unable to break out of this spell, you will be dismissed from this class. There will be no attempts to rejoin either.\"\n\nStudents in the audience gasp.\n\n\"Good,\" Professor Drakath says. \"It seems my voice has been heard. Now, I haven't been too harsh on you all since this is only a beginner's class, after all. However, don't expect this sort of leniency from me going forward. I will work you down to the bone and mould you into weavers of illusion like no other teacher can do.\"\n\n*if (met_brandon=true)\n\t(gained Illusion)\n\n\tYou nudge Brandon and whisper into his ear, \"This is supposed to be lenient? I sure as hell don't want to see him when he's serious and strict.\"\n\n\tBrandon nods. \"There is no way I'm going to let myself get caught up in his crossfire. Crazy old fart.\"\n\t\n\tYou spend the next couple of hours learning the basics of illusion magic. Whenever you feel a bit confused, you ask Brandon for answers, which he quickly and willingly helps you with.\n\n\tThree hours blow by in a breeze, and you notice that your knowledge on illusion magic has increased substantially with Brandon's help. \n\t*set illusion +5\n\t*goto day1_lesson2\n\n*else\n\t(gained Illusion)\n\n\tWhat a weird teacher you think. Not only is he needlessly strict, but he also seems to try and push the living fear into his students. You doubt that this approach will accomplish much, other than getting students thrown out of his class.\n\n\tYou spend the next couple of hours learning the very basics of illusion magic. Three hours blow by in a breeze, and you feel that your knowledge on illusion magic has increased. \n\t*set illusion +5\n\t*goto day1_lesson2\n\n*label theurgy_1\n(gained Theurgy)\n\nThe professor snaps her fingers. Roots and vines grow out of the ground, bringing with them dozens of flowerpots. \n\nYou marvel at the display of magic. The air is filled with the electric buzz of arcanic particles, a sensation you are not only growing accustomed to, but almost addicted toward. \n\nYou take in a deep breath, filling your nostrils with the fresh scent of soil and earthiness and herb of chrysanthemums. \n\nThe vines continue to move around and bring a flowerpot to each student. A budding rose is held within your pot, yet to reveal which colour it will take on.\n\nYou hope for a…\n\n*fake_choice\n\t#White Rose\n\t#Red Rose\n\t#Pink Rose\n\n\"Now then,\" the woman says. \"We are going to spend this lesson watering these plants of yours. Before you can become ready to master the methods of theurgy, you must come to terms with how precious a life is, whether it has the ability of cognition or not. These are now your precious children, if they die, you are expelled from this class. There will be no arguments on this matter so you best prepare yourselves accordingly!\"\n\nYour heart starts to beat faster. You look down at the pot, realizing that you need to take the utmost care for it, or risk losing your place in the class.\n\n\"Well then, I have prepared everything for you already. It's now up to you to take care of your new child. You may leave the class and take your plant with you whenever you feel ready.\" \n*set theurgy +5\n\n*choice\n\n\t#You water your plant.\n\t\t(gained Theurgy)\n\t\t\n\t\tYou go to the front of the class and grab a beaker of water. You notice that multiple other students have done the same and nod at yourself, believing your choice to be correct.\n\n\t\tYou bring the beaker of water back to your seat and start watering your plant. As you tend to it, you find that a connection starts to build with the budding seed. It's a rather weird sensation, as if you can sense the plant's energy and vitality.\n\n\t\t[i]You feel strong and healthy, my little rose.[/i]\n\n\t\tYou decide to leave to go to your room along with the plant after having spent about an hour in the classroom. By then, most of the student's have already left, causing you to do the same.\n\n\t\tAfter reaching your room, you place the plant near your window, allowing it to bask in the sunlight. You feel your connection with the rose growing. You can only sit and imagine what it will look like when it's finally sprouted.\n\t\t*set theurgy +5\n\n\n\t\t*goto day1_lesson2\n\n\t#You find a spot in the class where the sun shines through.\n\n\t\tYou grab your plant and walk over to one of the areas of the class where the sun is shining through a window. It seems that you weren't the only one with this idea.\n\n\n\t\t*choice\n\t\t\t\n\t\t\t*selectable_if (social \u003c 10) #Ask for help\n\t\t\t\t(gained Theurgy)\n\n\t\t\t\tYou walk up to the other students and ask for their help. Your warm smile seems to work, and they make some space for you to put your plant down.\n\n\t\t\t\tYou spend about an hour allowing your plant to bask in the sunlight before leaving the classroom and going to your dorm room. \n\t\t\t\t*set theurgy +10\n\t\t\t\t*goto day1_lesson2\n\n\t\t\t#Figure it out on your own\n\t\t\t\t(gained Theurgy)\n\n\t\t\t\tYou walk up to the other students and try to find some space to put your plant. You find that there is no space and thus you decide to place your plant in an area where less sunlight can reach it.\n\n\t\t\t\tYou spend about an hour with your plant in the classroom, after which you go back to your dorm room. \n\n\t\t\t\t*set theurgy +5\n\n\t\t\t\t*goto day1_lesson2\n\n\t#You decide to ask the professor for some fertilizer.\n\t\t(gained Theurgy)\n\t\t\n\t\tBefore the professor leaves the room, you run up to her. \"Excuse me, Professor Sakamei,\" you call.\n\n\t\tThe tiny woman stops walking away and turns around. \"Yes my dear young ${gentleman}?\"\n\n\t\t\"Is there a possibility that you have some fertilizer laying about that I could use? I was just wondering, if there's none that's fine after all.\"\n\n\t\tThe professor nods. \"Of course, there's some behind my desk. Feel free to use as much as you need, it will replenish itself.\" \n\n\t\t\"Thank you,\" you reply as the teacher walks out of the classroom. \n\n\t\tYou go behind her desk and find there are a couple dozen buckets of fertilizer. You realize that you would never have seen them had you not asked. You grab a bucket and bring it over to your seat.\n\n\t\tYou then pour some fertilizer on your plant. You cover your nose as the horrid smell wafts up. \n\t\t\n\t\tAfter you finish pouring the fertilizer, you decide to put the bucket back behind the professor's desk and then leave the hall with your plant.\n\n\t\tYou soon reach your dorm room, and then place your plant by the windowsill. You notice that there is a strange connection between you and the plant, as you can almost sense it's euphoria of being by the sunlight. \n\t\t*set theurgy +10\n\n\t\t*goto day1_lesson2\n\n\t*selectable_if (met_estelle=true) #Ask Estelle for help.\n\t\t(gained Theurgy) (Estelle approves)\n\t\t\n\t\tYou nudge Estelle. \"What do you think I should do?\" you ask. \n\n\t\t\"You probably want to get some fertilizer and use it, then water your plant and finally put it somewhere with abundant amounts of sunlight,\" she replies. \"That's what I'm going to do.\"\n\n\t\tYou follow Estelle's lead. She walks behind the teacher's desk and grabs a bucket. You cover your nose as the stench of fertilizer covers your palette. \n\n\t\t\"Grab a beaker of water please,\" Estelle says. You nod and grab one, after which the two of you go back to your seats.\n\n\t\tYou then add fertilizer to your plant and wait for about half an hour, after which you pour some water on it. Finally, the two of you place your plants near a windowsill where a lot of sun is shining through.\n\n\t\tYou thank Estelle for her help, and the two of your make your way to the dorms together. You wave goodbye as you have to part, and you agree to meet up with her later on.\n\n\t\tYou enter your dorm room and place your plant next to your window. You then have a quick shower as you prepare yourself for the next lesson of the day. \n\n\t\t*set theurgy +15\n\t\t*goto day1_lesson2\n\n\n*label training_1\n*page_break\n\n\"My name is Arthus, and I'll be your instructor for all things physical. You'll be coming here to Training Room 20 every lesson. This is the only room for strictly physical training. The other rooms are for magical training.\" The man flexes his muscles. \"Ya see these here? They'll protect ya from more than just spells.\"\n\n\"What the hell was that accent change,\" a boy mutters beside you.\n\nA girl raises her hand. She is rather slim and is wearing square glasses. Her fair white skin almost makes her look like a ghost, and the jet-black long hair of hers contrasts greatly with her skin tone. \n\nArthus furrows a brow. \"What do ya want kid? I'll allow questions for today only! Just cos yer all new I'll be a nice chap for now.\"\n\nThe girl cowers back and bumps into you. \"Sorry,\" she squeaks. \n\n*set training_lesson1 \"true\"\n\n*choice\n\n\t#Help the girl.\n\t\tYou nudge the girl. \"Ask your question, I'm interested to hear what you want to say.\"\n\n\t\tThe girl's eyes widen. She smiles and it seems like you gave her the confidence she needed. \n\n\t\t\"What are the benefits to spending time here instead of in one of the classes teaching magic?\" she asks.\n\n\t\tArthus laughs. \"What use are ya in combat if ya can't even run half a mile? What use are ya if ya tire at the slightest inconvenience. Magic won't solve every one of your issues, remember that. Ya still need to temper your body in order for yer mind and yer spirit to have enough resolve for combat.\"\n\n\t\tYou nod. You agree with the points Arthus has stated. There will be points in time where you'll simply run out of arcana to cast spells, and at that point you have only your body to rely on.\n\n\t\t*page_break Training Proceeds\n\t\t(gained Strength) (gained Dexterity) (lost Health)\n\n\t\tArthus clears his throat. \"Alright, let's begin.\" \n\n\t\tThe next three hours breeze by in a flash. Your body is sore and you recall the gruelling training you were put through. The girl who you'd encouraged to ask her question introduced herself as Giselle, and the two of you spend most of the training together.\n\n\t\tYou have a couple of bruises around your shoulder. Your biceps hurt from all the push ups you were doing, whilst your thighs burn due to all of the squats you had to put yourself through. \n\n\t\t*set strength +10\n\t\t*set dexterity +5\n\t\t*set health -10\n\t\t*set met_giselle \"true\"\n\t\t*goto day1_lesson2\n\n\n\t#Ignore the girl.\n\n\t\tYou take a step away from the girl.\n\n\t\tArthus taps his forearms. \"Well, what is your question?\" \n\n\t\tThe girl doesn't respond.\n\n\t\tThe man sighs. \"Right, I've really been given another batch of cowardly pipsqueaks. Don't worry, I'll beat yer into warriors by the time ya leave this school.\"\n\n\t\t*page_break Training Proceeds\n\t\t(gained Strength) (gained Dexterity) (lost Health)\n\n\t\tArthus clears his throat. \"Alright, let's begin.\" \n\n\t\tThe next three hours flew past in a flash. Your body is sore and you recall the gruelling training you were put through.\n\n\t\tYou have a couple of bruises around your shoulder. Your biceps hurt from all the push ups you were doing, whilst your thighs burn due to all of the squats you had to put yourself through. \n\t\t*set strength +10\n\t\t*set dexterity +5\n\t\t*set health -10\n\t\t*goto day1_lesson2\n\n\n\n\t#Ask a question.\n\n\t\tYou take a step away from the girl.\n\n\t\tArthus taps his forearms. \"Well, what is your question?\"\n\n\t\tThe girl doesn't respond. Just as you notice that Arthus is about to lose his temper, you butt in.\n\n\t\t\"What is the point of coming here? I mean I like physical exercise as much as the next person, but if we are in an academy to learn magic, shouldn't magic just be my priority?\"\n\n\t\tArthus laughs. \"Ya have some balls on ya to think that magic will solve every problem. What are ya gonna do when ya opponent strips ya of all ya magic? Think! Ya need need to use yet nogginn every now and then.\" He points to his head. \"Ya magic can always be taken away, but ya body can't, well, strictly speaking for now it can't.\"\n\n\t\t\"Oh, okay,\" you respond. \"That makes sense.\"\n\n\t\tArthus smiles. \"Good question. Are there any more before we begin? Today will only be a light workout so that I can gauge all of ya fitness levels.\" \n\n\t\t*page_break\n\t\t(gained Strength) (gained Dexterity) (lost Health)\n\t\t\n\t\tArthus clears his throat. \"Alright, let's begin.\" \n\n\t\tThe next three hours flew past in a flash. Your body is sore and you recall the gruelling training you were put through. This was definitely all but a light workout, you think to yourself as your massage your shoulder.\n\n\t\tYou have a couple of bruises around your shoulder. Your biceps hurt from all the push ups you were doing, whilst your thighs burn due to all of the squats you had to put yourself through. \n\t\t*set strength +10\n\t\t*set dexterity +5\n\t\t*set health -10\n\t\t*goto day1_lesson2\n\n\n*label day1_lesson2\n\nYou are currently sat in your room. You stare out of your window. It has been a rather eventful day so far, and now you have to make your decision on whether you want to go to a second lesson or not.\n\nYou look down at your timetable and decide to:\n\n*choice\n\n\t#Go to Basic Pyromancy.\n\t\tYou nod your head as you decide to go to Basic Pyromancy. The mere thought of being able to fling fireballs at an opponent brings you joy. You were never a pyromaniac, however you do enjoy setting things on fire like the next person.\n\n\t\tAnd when setting things on fire involves you using your own magic, you believe it will be even more awesome and fun.\n\n\t\tYou make your way out of your dorm and through the academy. You feel like you've already become more familiar with the layout of the school, much to your own surprise.\n\n\t\tSoon you reach the class for Basic Pyromancy. It is absolutely packed in here, with you estimating there to be at least one hundred students inside. There are only enough seats for about half the class to sit, however.\n\n\t\t\"Damn it, I should have come here earlier,\" you mutter under your breath. You stare at the clock, the time reading 12:55. You make a mental note to get here for at least 12:40 next time.\n\n\t\tYou stand by one of the far walls in the room, looking down at the platform where a professor will arrive any moment now. You start to sweat, the heat in the room slowly becoming unbearable. \n\n\t\t*page_break\n\n\t\t\"Attention everybody,\" a woman calls out. She is wearing a tight black dress that shows off all of her curves and edges. She has long red hair that falls to her hips, and a sway in her walk that is glueing everybody's attention to her.\n\n\t\t\"I am Professor Yolanda and I will be your guide for the basics of pyromancy. I don't expect it to be greatly exciting, considering that we will only be learning the basics. However, if you stick with this, by the time you get to advanced pyromancy, I promise that you'll never want to learn another field of magic.\"\n\n\t\tThe lesson goes by relatively quickly. Professor Yolanda spends most of the lesson teaching the basics of mana, arcana and how to properly utilize magic and form them into various spells. \n\n\t\tYou find out that mana is what happens when your body breaks down the arcana absorbed from the atmosphere into usable blocks of energy that can be used to cast magic. There are different types of arcana, with individuals more suited to the different forms. \n\n\t\tThese different arcana types include fire, water, earth, wind, dark and light. You asked a nearby student what arcana illusion magic is made up of, and they were kind enough to explain that illusion magic is created from dark and light magic coming together.\n\n\t\t*page_break\n\t\t(gained Pyromancy)\n\n\t\tYou make your way to your dorm room. Your mind is filled with all of the new information you've learned today. You grab a notebook and jot down some important information.\n\t\t\n\t\tYou are relatively exhausted and once you finish jotting down your notes, you quickly get into bed and fall asleep.\n\t\t*set met_yolanda \"true\"\n\t\t*set pyromancy +10\n\t\t*goto dungeon1\t\t\n\n\t#Go to Basic Meditation.\n\t\tYou nod your head as you decide to go to Basic Meditation. You feel like you've already had an eventful enough day, and could use a class which has a lot lower of an intensity.\n\n\t\tAfter all, this is your first day, and there will always be tomorrow when it comes to learning magic.\n\n\t\tInstead of this lesson taking place in one of the classrooms, you find yourself out in the wilderness. You are stood next to a waterfall, along with a couple dozen other students.\n\n\t\tAt the head of the group is a senior student. He is tall and muscular, and has a scar running from his right eye down to his nose. \n\n\t\tThe boy looks around at the group of new students. \"Let me introduce myself,\" he says. \"I'm Brax, a fifth year student here. I specialize in illusion magic and am currently the leader for our team that competes at the Annual Competition of Magic.\"\n\n\t\tThe boy takes his shirt off, revealing his tanned olive skin, along with multiple scars and what look like stab wounds to you. \"Everyone follow after me. We're going to jump into the waterfall and meditate.\"\n\n\t\tYou gulp hard, and then raise your hand.\n\n\t\t\"Yes, what's up?\" Brax responds.\n\n\t\t\"Do I have to take my shirt off?\" you ask.\n\n\t\tBrax shakes his head. \"I mean, you don't have to, I'm not going to force you, but is this really what you want to do? Your clothes will just get soaked after all.\"\n\n\t\t*fake_choice\n\n\t\t\t#Take your shirt off\n\n\t\t\t#Keep your shirt on\n\n\t\t\"Well, let's get on with it. Follow me.\"\n\n\t\tYou walk into the stream. The current isn't too strong, however it is strong enough that it makes it difficult to walk forward. \n\t\t\n\t\tYou shiver, the water is icy.\n\n\t\t\"Alright everyone,\" Brax shouts. His voice somehow manages to penetrate through the noise of the waterfall. \"Do your best to just get into a state of mind where it is empty. Focus only on your breathing and the sensations of the waves of water touching your body. Try your best to remove all of your thoughts.\"\n\n\t\tBrax sits down and crosses his legs as water pours onto him from above. \"It's fine if you don't get the hang of it, this is only your first try. I have one rule, however. If you don't follow this, I'm going to throw you out of here. Don't, under any circumstance, and I mean it. Don't talk.\"\n\t\t\n\t\tYou stare at the fifth year student. His expression seems tranquil, yet you sense the hidden undertones from his words are being let out in a dominating aura. You won't be talking, no matter what happens.\n\n\t\tYou make your way under the waterfall, and copy Brax. You cross your legs and close your eyes. The water that is pouring onto your head is slightly uncomfortable and also weirdly refreshing.\n\n\t\tYour thoughts keep racing and you are unable to get into the meditative zone for a large portion of the time. Not only this, but you are also shivering due to the cold, whilst your mind is still affected by your first lesson of the day.\n\n\t\t*page_break\n\n\t\tYou're unsure how much time has passed, but you feel a tap on your shoulder. You open your eyes and spot Brax is stood next to you. \n\n\t\t\"Didn't you hear me?\" Brax says. \"We're done here. Come, let's get out here before you freeze to death.\"\n\n\t\tYou roll your head around. It felt as if you were sleeping just then, but you weren't since you could kind of hear the sound of the water crashing down.\n\n\t\tYou feel that your mind has expanded in a way, however you can't quite pinpoint how. \n\n\t\tYou make your way back to your dorm room, foregoing any dinner, and jump into bed the moment you arrive. You fall asleep almost immediately.\n\n\t\t*set intelligence +10\n\t\t*goto dungeon1\n\n\n\t#Go to Library.\n\t\tYou yawn. As you read your timetable you notice that there is an option to go to the library. It seems that the library is open all day, every day, meaning that there is always an option to go there instead of staying in your room or going to a lesson.\n\n\t\tYou don't rush to get to the library, instead you decide to have a walk around the academy premises. After all, you had been teleported here and have no idea what your new home really looks like.\n\n\t\tAs you explore the area, you find that the academy seems to be built in the middle of a rainforest. Wherever you look, there are hundreds of thick rubber trees. The area of the academy is by no means small. You estimate that this is equivalent to the size of a small town of maybe 2000 residents.\n\n\t\tYou find multiple new buildings as you walk past the other students that are busy on their own schedule. There are food stalls, clothes shops and even buildings made for recreational activities, such as a small dome that has been made into an ice rink.\n\n\t\tIt doesn't take long for you to find the library. It is the tallest building in the whole academy, and it looks more like a mage's tower than it does a library due to this. \n\n\t\t*if (met_brandon=true)\n\t\t\t\n\t\t\tYou spot Brandon from afar. The boy is stood next to a girl. The girl also has blonde hair and freckles dotted all over her face in a similar way to Brandon. She's slightly taller than the boy, and you notice that she has large breasts.\n\n\t\t\t\"Oh, ${name}, what are you doing here?\" Brandon shouts. He walks over to you along with the girl. \"Oh this is great. Julia, this is my friend ${name}. ${name}, this is my sister Julia.\"\n\t\t\t\n\t\t\t*fake_choice\n\t\t\t\t#\"Nice to meet you Julia.\"\n\t\t\t\t\t\"Nice to meet you Julia.\n\t\t\t\t#\"Good evening to you two.\"\n\t\t\t\t\t\"Good evening to you two.\"\n\n\t\t\tJulia stretches out a hand. She has a much calmer demeanour than her brother. \"Nice to meet you,\" she says. \n\t\t\t\n\t\t\t\"Haha did you know that Julia ju-\"\n\n\t\t\tJulia grabs Brandon and puts him into a headlock. \"Shut up you moron!\" She takes in a deep breath. \"I'm sorry about my brother. He's a weird one. But I'm glad he's made at least one friend so far.\"\n\n\t\t\tYou stifle a laugh. \"N-No worries, he's been really nice to me so far.\"\n\n\t\t\tJulia grins and then lets the flailing boy go. \"Please take care of him, he has this tendency to talk too much and get himself in trouble. Honestly, you can just kick him in the face if he doesn't stop talking. That usually does the trick for me.\"\n\n\t\t\tYou open your mouth wide and raise your brows.\n\t\t\t\n\t\t\t[i]What the hell did I just witness here?[/i]\n\n\t\t\tBrandon catches his breath. \"Don't listen to her, she's just a meanie when she wants to be. Anyway, didn't you say you have somewhere to be sis?\"\n\n\t\t\tJulia rolls her eyes. \t\t\tShe walks over to you and comes closer to your ears. \"He's a sweet boy, I swear. Give him a chance. I promise he isn't as bad as he seems.\"\n\t\t\t\n\t\t\tShe then walks away, leaving you and Brandon alone.\n\t\t\t\n\t\t\tYou cant help but laugh. \"So, I'm going to the library, to answer your question. What about you?\" \n\t\t\t\n\t\t\tBrandon sighs. \"The library? That sounds interesting, but I've got something else to get done. Anyway, I'll see you later!\" The boy leaves before you can even respond.\n\t\t\t*goto library1\n\t\t\n\t\t*else\n\t\t\t\n\t\t\t*goto library1\n\t\t\t\n\n\t\t\t\t\n\n\n*label library1\n*page_break\nYou open the doors to the library. A waft of fresh lemon washes over your palette as you make your way through the building. There are floating candles to be seen almost everywhere, and the scent seems to be coming from them.\n\n[i]I sure do hope that these books are all fireproof, because there are more than a hundred of these candles around.[/i]\n\t\nThe library is massive, you notice there are too many floors for you to count. Just on the ground floor there are hundreds of bookshelves, and you spot quite a lot of students walking around through the aisles. There are tables spread around the library and a lot of people are sat by them.\n\t\t\t\t\nYou make your way over to one of the many mahogany bookshelves and browse what it has in store. You figure out that each bookshelf has books related to an overarching subject. The one you are looking at is labelled 'Basic Pyromancy'. \n\t\t\t\n[i]So this must be where you I can borrow books that will help out with preparing for lessons.[/i]\n\t\t\t\t\nIt doesn't take long for you to find bookshelves that interest you. Which bookshelf do you decide to browse?\n\n*choice\n\t#You go to the bookshelf 'Basic Pyromancy'\n\t\t(gained Intelligence) (gained Pyromancy) (lost Health)\n\t\t\n\t\tYou decide on getting a book for pyromancy. It doesn't take long for you to find a suitable book. As you browse through the collection of books, however, you find that the majority of books on a bookshelf are for learning specific spells.\n\t\t\n\t\tOn the other hand, the book you currently picked out only gives a broad and general overview of how to set the foundations for pyromancy. Of course, you have no other choice than to take this book as you haven't yet reached a level to know how to cast any spells.\n\t\t\n\t\tAfter getting your book you decide to leave the library and make your way back to your dorm. Once there you read through the book and practice until the night comes. You are tired and your body feels heavy.  \n\t\t\n\t\tYou quickly jump into your bed, falling asleep almost immediately.\n\n\t\t*set intelligence +10\n\t\t*set health -10\n\t\t*set pyromancy +10\n\t\t*goto dungeon1\n\t\t\n\t#You go to the bookshelf 'Basic Illusions'\n\t\t(gained Intelligence) (gained Illusion) (lost Health)\n\t\t\n\t\tYou decide on getting a book for illusion magic. It doesn't take long for you to find a suitable book. As you browse through the collection of books, however, you find that the majority of books on a bookshelf are for learning specific spells.\n\t\t\n\t\tOn the other hand, the book you currently picked out only gives a broad and general overview of how to set the foundations for illusion magic. Of course, you have no other choice than to take this book as you haven't yet reached a level to know how to cast spells.\n\t\t\n\t\tAfter getting your book you decide to leave the library and make your way back to your dorm. Once there you read through the book and practice until the night comes. You are tired and your body feels heavy.  \n\t\t\n\t\tYou quickly jump into your bed, falling asleep almost immediately.\n\n\t\t*set intelligence +10\n\t\t*set health -10\n\t\t*set illusion +10\n\t\t*goto dungeon1\n\t\t\n\t#You go to the bookshelf 'Basic Theurgy'\n\t\t(gained Intelligence) (gained Theurgy) (lost Health)\n\t\t\n\t\tYou decide on getting a book for theurgy. It doesn't take long for you to find a suitable book. As you browse through the collection of books, however, you find that the majority of books on a bookshelf are for learning specific spells.\n\t\t\n\t\tOn the other hand, the book you currently picked out only gives a broad and general overview of how to set the foundations for theurgy. Of course, you have no other choice than to take this book as you haven't yet reached a level to know how to cast spells.\n\t\t\n\t\tAfter getting your book you decide to leave the library and make your way back to your dorm. Once there you read through the book and practice until the night comes. You are tired and your body feels heavy.  \n\t\t\n\t\tYou quickly jump into your bed, falling asleep almost immediately.\n\n\t\t*set intelligence +10\n\t\t*set health -10\n\t\t*set theurgy +10\n\t\t*goto dungeon1\n\n*label dungeon1\n*page_break\nKNOCK KNOCK KNOCK\n\nYou jolt out of your bed.  You open your eyes, your vision is rather blurry. You can just about make out that it is really dark. You hear people talking around you.\n\n\"What the hell?\" you shout. You find yourself stood beside dozens of students. Fortunately for you, you are wearing more clothes than when you went to sleep. You sigh with relief.\n\n[i]This whole magic thing is starting to piss me off. Why is it so easy to kidnap me?[i]\n\nYou are inside what seems like a cavern. A dim amount of light is emitted from the walls of the cavern as there are candles attached to them at intervals of three to four meters.\n\nYour attention is jolted to a pair of clapping hands.\n\n\"Alright everybody,\" Professor Drakath yells.  \"Welcome to your first dungeon experience.\"\n\nYou gasp collectively with the other students. \n\nProfessor Drakath chuckles. \"Did you really think we wouldn't surprise you like this? Remember, as a magician, you must always be prepared. At any point in time an opponent can decide that it's your last day to live. Even when you sleep you must still be cautious. This is just a small lesson in being more prepared.\"\n\n[i]Being prepared? We haven't even been given the tools to be prepared yet![/i]\n\n\"Don't worry,\" the man says. \"This will be one of the easier dungeons you will be put through. I didn't have the time to put you into groups, so feel free to go with whichever friend you want. This is a two person dungeon. \"\n\n\"What if we don't have anybody to go with?\" a relatively tall, skinny, dark skinned boy asks. \"Won't that be unfair if it's a two person dungeon?\"\n\n\"If you have nobody to go with I'll pair you up with other stragglers,\" Professor Drakath replies. \"Alright, get on with it you people!\"\n\nWho do you decide to pair up with?\n\n*choice\n\t\n\t*selectable_if (met_giselle=true) #You approach Giselle.\n\t\t\"Giselle,\" you say as you walk over to the girl. \"Would you want to work with me?\"\n\t\t\n\t\tThe girl seems taken aback. She adjusts her glasses. \"I- Yes of course! I didn't think anybody would want to go with me. Are you sure though? I'm not good at anything.\"\n\t\t\n\t\tYou pat the girl on the back. \"Don't say that! I was with you training yesterday and you pushed yourself through every task that Arthus put us through. I believe in your heart and grit, that's why I want to do this with you.\"\n\t\t\n\t\tThe girl blushes. She clears her throat. \"Okay, let's do this,\" she says.\n\t\t\n\t\t*set giselle_dungeon \"true\"\n\t\t*goto_scene fae_academy3\n\t\t\n\t\t\n\t*selectable_if (met_brandon=true) #You approach Brandon.\n\t\tYou spot Brandon stood alone to the far side of the cavern. You walk over to him and wave.\n\t\t\n\t\t\"${name}, how's it going? Isn't this just a stupid situation we've been put in?\" Brandon asks. He groans and scratches the back of his neck. \"So freaking stupid!\"\n\t\t\n\t\tYou nod. \"Yea, I mean I don't exactly like being magically teleported out of the comfort of my bed.\"\n\t\t\n\t\tBrandon shakes his head. \"Not that, I don't care about that. I mean the part where you have to go out of your way to find a partner to do this test with. I mean, it would be humiliating to have to go to Professor Drakath and tell him you have no friends to work with.\" The boy sulks.\n\t\t\n\t\tYou tilt your head. \"Uh, I mean we've only been here for a day so I think that is quite normal.\" You point toward the professor. There are almost twenty students that have walked over to him and you can overhear them asking to be paired up with somebody. \"See? There's already lots of people doing what you think is humiliating.\"\n\t\t\n\t\t\"Hmm, you might be right there,\" Brandon replies. He takes in a deep breath. \"Sorry, I was just over thinking, as per usual.\"\n\t\t\n\t\t\"Anyway,\" you say. \"I came here because I want to work with you in the dungeon, if that's alright with you, of course.\"\n\t\t\n\t\tBrandon's eyes light up. \"Really? It would be my honour! I didn't think anyone would want to work with me. I mean, I talk too much and I know that I sometimes say offensive things, but I genuinely don't mean to be annoying… Ah, I'm rambling again.\"\n\t\t\n\t\tYou laugh. \"Don't worry about it. Let's get this done. I know that we will do really well here.\"\n\t\t\n\t\t*set brandon_dungeon \"true\"\n\t\t*goto_scene fae_academy3\n\t\t\n\t*selectable_if (met_estelle=true) #You approach Estelle.\n\t\tYou spot Estelle. She is stood right next to you. The girl taps you on the shoulder.\n\t\t\n\t\t\"Oh, hey Estelle,\" you say. \"I was just looking for you.\"\n\t\t\n\t\t\"Really? I was looking for you as well,\" she replies. \"So, what do you say ${name}? Want to work together on this dungeon with me?\"\n\t\t\n\t\tYou nod. \"That's exactly what I was going to ask you haha.\" You rub the back of your head. \"Do you think it's going to be difficult?\"\n\t\t\n\t\tEstelle shrugs. \"I think it'll be a quick one. I doubt there's anything to worry about here. Especially if we work together it should all be fine.\"\n\t\t\n\t\tYou sigh. \"Good, because I don't feel too confident in doing this. I haven't even learned a single spell yet. Just the foundations of magic so far.\"\n\t\t\n\t\t\"Yea, I doubt we'll have to use any spells. I'm not sure what to expect though.\" The girl rubs her chin. \"I guess we'll find out soon enough.\"\n\t\t\n\t\t*set estelle_dungeon \"true\"\n\t\t*goto_scene fae_academy3\n\t#You decide to tell Professor Drakath that you have nobody to work with.\n\t\tYou walk over to Professor Drakath. He is surrounded by roughly twenty other students. You overheard some of the students asking to be paired up as they don't know anybody well enough.\n\t\t\n\t\t\"Alright,\" Professor Drakath says. \"Each of you wishes to be paired up? Done.\"\n\t\t\n\t\tHe separates you all into two groups at random. There are ten people in each group. He then points at one person from the left group, the group you are in, and then at one person from the right group. \"Alright, you two are a team,\" he says.\n\t\t\n\t\tIt doesn't take long for it to come to your turn. Professor Drakath points at you, and then at the tall, dark and skinny boy who'd asked him a question a moment ago. \"You two are a team,\" he says.\n\t\t\n\t\tYou walk over to the boy and stretch out your hand. \"I'm ${name}, nice to meet you.\"\n\t\t\n\t\tThe boy grabs your hand and shakes it. It is only now that you notice how much he towers above you. \"I'm Song, the pleasure is mine.\"\n\t\t\n\t\tThe two of you walk to a less populated area. You stare at the boy. \"What do you think we're going to have to do in this dungeon?\"\n\t\t\n\t\tSong shrugs. \"Beats me. It can't be something difficult, right? I mean we've been here for only a single day. We don't know any spells, so this should just be a practice trial or something.\" He raises his hand and covers his mouth as he yawns. \"Well, it's whatever, let's just get to it.\"\n\t\t\n\t\tYou nod. \"Yea, I can't see them doing anything different either.\"\n\t\t\n\t\t*set song_dungeon \"true\"\n\t\t*goto_scene fae_academy3", "fae_academy3": "*page_break\n\n\"May I have everybody's attention?\" Professor Drakath shouts over the chatter from the students.  \"In a moment you will all be teleported to your own dungeon, along with your partner. Whilst inside the dungeon, we will be assessing you on your teamwork and ability to creatively solve the problems ahead of you. Also, you will very briefly be learning some spells whilst inside the dungeon. This is nothing more than a taster session, I believe almost all of you will pass, as it isn't difficult to do so. If you don't pass… Well, I think you know exactly what will happen.\"\n\n[i]Teleported again. What a surprise.[/i]\n\nProfessor Drakath continues. \"This will be a very quick affair. There will be no lessons in the morning session, however they will resume again in the afternoon session. I wish you all the best of luck.\"\n\nYour vision blurs. Your world starts to spin, and your stomach churns as you feel the urge to vomit. You take in deep breaths and stop yourself from spewing.\n\nTo calm yourself you think about…\n\n*fake_choice\n\t#A serene lake\n\t\tYou picture a tranquil lake where there is a lot of sunlight. This seems to do the trick and you are able to calm down immediately.\n\t#The food you will eat after this\n\t\tYou gag and hold onto your stomach before a projectile of vomit shoots out of you. You groan and wipe your mouth.\n\t#How much you'll sleep later\n\t\t[i]I'm going to sleep so much that I'll need an explosion to happen before I wake up.[/i]\n\t\t\nAs your vision starts coming back, you find yourself in a small room. Blue flames are all around you. There is a podium in front of you, along with a blue orb sat atop it. You find yourself on an elevated ground. Beyond the blue flames is another area which would require you walking down a flight of stairs. You observe the stairs for a moment before putting your attention to your companion.\n*page_break\n\n*if (giselle_dungeon=true)\n\t\"What's this?\" Giselle says. She points at the blue flames. \n\t\n\t\"I don't know,\" you respond. \"What do we even have to do here?\" You look around, trying to find a way out of the room, but there are no doors, and the blue flames block you from leaving the area you are stood at.\n\t\n\t\"Welcome students,\" a monotonous voice booms. \n\t\n\tYou stumble forward and almost knock down the blue orb off the podium. \"What the hell?\" you shout. You look around in search of the voice but don't find anything. \"Did you hear that Giselle?\"\n\t\n\tGiselle nods and looks around cautiously. \"Yea, I definitely heard that. What do you th-\"\n\t\n\t\"Let me introduce myself,\" the voice booms once again. \"I shall be your examiner for this test. Follow my instructions very carefully if you don't want to fail.\"\n\t\n\tYou gulp hard. \"Alright, what do you want us to do?\"\n\t\n\t\"Dispel the blue flames that are blocking your exit. Once you have done that, the next instructions will be given.\"\n\t\n\t\"How are we supposed to dispel the flames if we haven't learned any spells?\" you ask. \n\t\n\t\"The orb will temporarily give you spells based on your proficiencies in the different forms of arcana. Good luck.\" \n\t\n\t\"What do you mean?\" Giselle asks. \n\t*page_break\n\t\"…\"\n\t\n\t\"…\"\n\t\n\tYou both wait yet no response comes. You grab the blue orb. An electric current buzzes through your skin, causing the hairs on your arms and neck to stand. \n\t\n\t\"Hmm, how interesting,\" you say. A blue screen pops out from the orb. \"Can you see this Giselle?\"\n\t\n\tGiselle shakes her head. \"No, what do you see?\"\n\t\n\tYou give the girl the orb. After a couple moments she says, \"This blue screen. It is showing me the spells that I can temporarily take control of. But how does that work?\"\n\t\n\t\"Beats me,\" you reply. \"I'm not going to complain about how when I can finally use a spell.\"\n\t\n\tGiselle gives you the orb back. \"You make your choice first, I don't know what to do.\"\n\t\n\tYou nod. The blue screen comes back. It gives you an option to choose a single spell to temporarily take possession of.\n\n\t*choice\n\t\t*selectable_if (pyromancy>10) #You choose the spell Flame Barrier\n\t\t\tAn influx of information flows into your mind. You black out momentarily, and after you come back to your senses, you stare at your hands. The blue orb has disappeared.\n\t\t\t\n\t\t\t\"So, did it work?\" Giselle asks.\n\t\t\t\n\t\t\tYou nod. You intuitively know how to cast the spell. It's almost as if you have known this spell your whole life, yet you know that this is far from the truth. This will be the first time you've ever truly used magic.\n\t\t\t\n\t\t\tYour heart beats at a fast clip. You clasp your hands together and push out the mana stored inside of your body. A bright red barrier forms around you. It is large enough to also encompass Giselle within it.\n\t\t\t\n\t\t\t\"Let's go,\" you say. \n\t\t\t\n\t\t\tThe pair of you walk through the flames and come out unscathed. You now find that the room is much larger than you first thought. It was almost as if an optical illusion was put around you as you were stood within the circle of blue flames. \n\t\t\t\n\t\t\t\"Congratulations,\" the monotonous voice says. \"You have passed the first part of the test. Your next task is to exit the dungeon.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tGiselle frowns. She points toward a far away door. There is a chasm that separates where you are from the door. \"How are we supposed to get across that?\" she asks. \n\t\t\t\n\t\t\tSuddenly a blue orb floats down and lands in her hands. The girl is in thought for almost a minute before saying, \"What spell should I take?\"\n\t\t\t\n\t\t\t\"What spells can you take?\"\n\t\t\t\n\t\t\t\"There is a spell called Vine Travel… Wait I don't know why I even asked you. Sorry, yes I'll be taking this spell.\" \n\t\t\t\n\t\t\tAfter a couple of moments, Giselle walks toward the edge where the chasm is. She slams her palms on the ground. Green vines sprout out and form a bridge. It doesn't take long for the two of you to cross the vine bridge and make it to the door.\n\t\t\t\n\t\t\t\"Congratulations, you have passed your first test. Dungeon one has been cleared. You will now be teleported back in five, four, three, two, one.\"\n\n\t\t\t*goto dungeon_complete\n\t\t\t\n\t\t*selectable_if (illusion>25) #You choose the spell Reveal Truth\n\t\t\tAn influx of information flows into your mind. You black out momentarily, and after you come back to your senses, you stare at your hands. The blue orb has disappeared.\n\t\t\n\t\t\t\"So, did it work?\" Giselle asks.\n\t\t\n\t\t\tYou nod. You intuitively know how to cast the spell. It's almost as if you have known this spell your whole life, yet you know that this is far from the truth. This will be the first time you've ever used magic.\n\t\t\t\n\t\t\tYour heart beats at a fast clip. You clasp your hands together and push out the mana stored inside of your body. A purple light expands out of your hands. Soon, it reaches the blue flames.\n\t\t\n\t\t\tThe blue flames disappear, and you realize that they weren't there to begin with. \"They were just an illusion,\" you note.\n\t\t\n\t\t\tGiselle gasps. \"The flames? Really?\"\n\t\t\n\t\t\tYou nod. You then walk down some steps, reaching a much larger area.\n\t\t\n\t\t\t\"Congratulations,\" the monotonous voice says. \"You have passed the first part of the test. Your next task is to exit the dungeon.\"\n\t\t\n\t\t\t*page_break\n\t\t\n\t\t\tGiselle frowns. She points toward a far away door. There is a chasm that separates where you are from the door. \"How are we supposed to get across that?\" she asks. \n\t\t\t\n\t\t\tSuddenly a blue orb floats down and lands in her hands. \"What spell should I take?\" she asks you. \n\t\t\t\n\t\t\t\"What spells can you take?\"\n\t\t\t\n\t\t\t\"There is a spell called Vine Travel… Wait I don't know why I even asked you. Sorry, yes I'll be taking this spell.\" \n\t\t\t\n\t\t\tAfter a couple of moments, Giselle walks toward the edge where the chasm is. She slams her palms on the ground. Green vines sprout out and form a bridge. It doesn't take long for the two of you to cross the vine bridge and make it to the door.\n\t\t\t\n\t\t\t\"Congratulations, you have passed your first test. Dungeon one has been cleared. You will now be teleported back in five, four, three, two, one.\"\n\t\t\n\t\t\t*goto dungeon_complete\n\t\t\n\t\t\t\n\t\t*selectable_if (theurgy>15) #You choose the spell Vine Travel\n\t\t\tAn influx of information flows into your mind. You black out momentarily, and after you come back to your senses, you stare at your hands. The blue orb has disappeared.\n\t\t\n\t\t\t\"So, did it work?\" Giselle asks.\n\t\t\n\t\t\tYou nod. You intuitively know how to cast the spell. It's almost as if you have known this spell your whole life, yet you know that this is far from the truth. This will be the first time you've ever used magic.\n\t\t\n\t\t\tYour heart beats at a fast clip. You clasp your hands together and push out the mana stored inside of your body. You press your hand onto the ground. Vines sprout forth and travel over the flames. They then move down onto the next level of the area.\n\t\t\t\n\t\t\t\"Let's go,\" you say. You start walking along the vines with Giselle right behind you. It doesn't take long for the two of you to reach the lower level of the room. \n\t\t\t\n\t\t\t\"Congratulations,\" the monotonous voice says. \"You have passed the first part of the test. Your next task is to exit the dungeon.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\tGiselle frowns. She points toward a far away door. There is a chasm that separates where you are from the door. You walk over to the edge chasm. You can't see how deep it is, but you know that falling into there could spell the death of you. \n\t\t\t\n\t\t\t\"This is easier than I expected,\" you say. You place your palms on the ground. Green vines sprout out and form a bridge. It doesn't take long for the two of you to cross the bridge and make it to the do
