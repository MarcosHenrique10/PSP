or. \n\t\t\t\n\t\t\t\"Congratulations, you have passed your first test. Dungeon one has been cleared. You will now be teleported back in five, four, three, two, one.\"\n\t\t\t\n\t\t\t*goto dungeon_complete\n\t\t\t\n\t\t\t\n\t\t*selectable_if (strength>15)  #You put the orb away and decide to lift the podium and place it onto a patch of flames.\n\t\t\tYou shake your head and put the orb away. \"Here, take it,\" you say to Giselle.\n\t\t\t\n\t\t\tYou then grab the podium and lift it up. It isn't as heavy as you had expected it to be. You place the podium onto a patch of the flames. Unexpectedly the flames don't affect the podium. \n\t\t\t\n\t\t\tYou furrow your brows and then put your hand to the blue flames. There is no heat coming off from them and you are able to keep your hands in them.\n\t\t\t\n\t\t\t\"The flames are fake,\" you say. \"It's just an illusion.\" You walk through the flames and down the flight of stairs.\n\t\t\t\n\t\t\t\"Congratulations,\" the monotonous voice says. \"You have passed the first part of your test… Albeit in a rather unusual way I must add. Your next task is to exit the dungeon.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\n\t\t\tGiselle frowns. She points toward a far away door. There is a chasm that separates where you are from the door. \"How are we supposed to get across that?\" she asks. \n\t\t\t\n\t\t\tSuddenly a blue orb floats down and lands in her hands. \"What spell should I take?\" she asks you. \n\t\t\t\n\t\t\t\"What spells can you take?\"\n\t\t\t\n\t\t\t\"There is a spell called Vine Travel… Wait I don't know why I even asked you. Sorry, yes I'll be taking this spell.\" \n\t\t\t\n\t\t\tAfter a couple of moments, Giselle walks toward the edge where the chasm is. She slams her palms on the ground. Green vines sprout out and form a bridge. It doesn't take long for the two of you to cross the vine bridge and make it to the door.\n\t\t\t\n\t\t\t\"Congratulations, you have passed your first test. Dungeon one has been cleared. You will now be teleported back in five, four, three, two, one.\"\n\t\t\t*goto dungeon_complete\n\t\t\t\n\t\t\t\n\t\t#You forego using the orb and ask Giselle to use it first.\n\t\t\t\n\t\t\t\"You should go first,\" you say. \n\t\t\t\n\t\t\t\"Huh? Really?\" Giselle bites her lower lip. \"Are you sure? I don't want to mess this up for us.\"\n\t\t\t\n\t\t\tYou pat her on the back. \"Don't worry, you've got this, okay? I believe in you.\"\n\t\t\t\n\t\t\tGiselle nods. She closes her eyes and takes in a deep breath. \"I've decided to take the spell Vine Travel,\" she says. \"Here goes nothing.\"\n\t\t\t\n\t\t\tShe places her hand on the ground. A couple of seconds later, green vines sprout out and create a platform for the two of you to walk across. \n\t\t\t\n\t\t\tIt doesn't take long for you to reach the lower level of the room.\n\n\t\t\t\"Congratulations,\" the monotonous voice says. \"You have passed the first part of the test. Your next task is to exit the dungeon.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\tGiselle frowns. She points toward a far away door. There is a chasm that separates where you are from the door. You walk over to the edge chasm. You can't see how deep it is, but you know that falling into there could spell the death of you. \n\t\t\t\n\t\t\t\"This is easier than I expected,\" you say. \"Just do what you did again GIselle.\"\n\t\t\t\n\t\t\tThe girl nods. She places her palms on the ground. Green vines sprout out and form a bridge. It doesn't take long for the two of you to cross the bridge and make it to the door. \n\t\t\t\n\t\t\t\"Congratulations, you have passed your first test. Dungeon one has been cleared. You will now be teleported back in five, four, three, two, one.\"\n\t\t\t\n\t\t\t*goto dungeon_complete\n\t\t\t\n\t\t\t\n\t\t\t\n*if (estelle_dungeon=true)\n\t\"Interesting,\" Estelle says. She points at the blue flames. \n\t\n\t\"What do you mean by that?\" you respond. \"What do we even have to do here?\" You look around, trying to find a way out of the room, but there are no doors, and the blue flames block you from leaving the area you are stood at.\n\t\n\t\"Welcome students,\" a monotonous voice booms. \n\t\n\tYou stumble forward and almost knock down the blue orb off the podium. \"What the hell?\" you shout. You look around in search of the voice but don't find anything. \"Did you hear that Estelle?\"\n\t\n\tEstelle nods. \"Yea, I definitely heard that.\" The girl looks around cautiously. \n\t\n\t\"Let me introduce myself,\" the voice booms once again. \"I shall be your examiner for this test. Follow my instructions carefully.\"\n\t\n\tYou gulp hard. \"Alright, what do you want us to do?\"\n\t\n\t\"Dispel the blue flames that are blocking your exit. Once you have done that, the next instructions will be given.\"\n\t\n\t\"How are we supposed to dispel the flames if we haven't learned any spells?\" you ask. \n\t\n\t\"The orb will temporarily give you spells based on your proficiencies in the different magic forms. Good luck.\" \n\t\n\t*page_break\n\tEstelle grabs the blue orb. She looks at it from all angles before saying, \"You first young ${gentleman}.\"\n\t\n\tYou roll your eyes and pick up the orb. An electric current buzzes through your skin, causing the hairs on your arms and neck to stand. \n\t\n\t\"Hmm, how interesting,\" you say. A blue screen pops out from the orb. \"Can you see this Estelle?\"\n\t\n\tThe girl shakes her head. \"No, what do you see?\"\n\t\n\tYou give the girl the orb. After a couple moments she says, \"So this is how they are going to temporarily give us the ability to use spells. I wonder how it works.\"\n\t\n\t\"Beats me,\" you reply. \"I'm not going to complain about how when I can finally use a spell.\"\n\t\n\tEstelle gives you the orb back. \"You make your choice first. I think I'll wait and see what happens.\"\n\t\n\tYou nod. The blue screen comes back. It gives you an option to choose a single spell to temporarily take possession of.\n\t\n\t*label start\n\t\n\t*choice\n\t\t*selectable_if (pyromancy>10) #You choose the spell Flame Barrier\n\t\t\tAn influx of information flows into your mind. You black out momentarily, and after you come back to your senses, you stare at your hands. The blue orb has disappeared.\n\t\t\t\n\t\t\t\"Show me what you can do now,\" Estelle says. The girl rubs your shoulders. \"Don't be shy, you've got this.\"\n\t\t\t\n\t\t\tYou nod. You intuitively know how to cast the spell. It's almost as if you have known this spell your whole life, yet you know that this is far from the truth. This will be the first time you've ever used magic.\n\t\t\t\n\t\t\tYour heart beats at a fast clip. You clasp your hands together and push out the mana stored inside of your body. A bright red barrier forms around you and is large enough to also encompass Estelle within it.\n\t\t\t\n\t\t\t\"Let's go,\" you say. \n\t\t\t\n\t\t\tThe pair of you walk through the flames and come out unscathed. You now find that the room is much larger than you first thought. It was almost as if an optical illusion was put around you as you were stood within the circle of blue flames. \n\t\t\t\n\t\t\t\"Congratulations,\" the monotonous voice says. \"You have passed the first part of the test. Your next task is to exit the dungeon.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tEstelle points toward a far away door. There is a chasm that separates where you are from the door. \n\t\t\t\n\t\t\t\"Interesting, but they made this dungeon way too easy. And I thought today would be interesting, I guess not.\" The girl moans. \"Let me get us out of here.\"\n\t\t\t\n\t\t\tEstelle touches your shoulder. Her body pulses a bright white colour. You look on in horror as wings sprout out of her back. The wings are white and feathery like a bird's. \n\t\t\t\n\t\t\t\"Doesn't that hurt?\" you ask.\n\t\t\t\n\t\t\tEstelle nods. \"You get used to it.\" The girl laughs. \"Pain is nothing but an illusion of the body. If your mind is strong enough, pain is nothing.\" \n\t\t\t\n\t\t\tEstelle then picks you up and flies off to the other side of the chasm. When she puts you down, the wings dissipate into a white light that looks like shattered glass in the air.\n\t\t\t\n\t\t\t\"Well, thank you,\" you say. \"You made this really easy for us.\"\n\t\t\t\n\t\t\t\"Don't mention it,\" Estelle says. \"You did your thing too.\" \n\t\t\t\n\t\t\tThe two of you walk over to the door.\n\t\t\t\n\t\t\t\"Congratulations, you have passed your first test. Dungeon one has been cleared. You will now be teleported back in five, four, three, two, one.\"\n\t\t\t\n\t\t\t*goto dungeon_complete\n\t\t\t\n\t\t*selectable_if (illusion>25) #You choose the spell Reveal Truth\n\t\t\tAn influx of information flows into your mind. You black out momentarily, and after you come back to your senses, you stare at your hands. The blue orb has disappeared.\n\t\t\n\t\t\t\"Show me what you can do now,\" Estelle says. The girl rubs your shoulders. \"You've got this.\"\n\t\t\n\t\t\tYou nod. You intuitively know how to cast the spell. It's almost as if you have known this spell your whole life, yet you know that this is far from the truth. This will be the first time you've ever used magic.\n\t\t\t\n\t\t\tYour heart beats at a fast clip. You clasp your hands together and push out the mana stored inside of your body. A purple light expands out of your hands. Soon, it reaches the blue flames.\n\t\t\n\t\t\tThe blue flames disappear, and you realize that they weren't there to begin with. \"They were just an illusion,\" you note.\n\t\t\n\t\t\tEstelle rubs her chin. \"I expected as much. They really aren't making this difficult for us.\"\n\t\t\n\t\t\tYou nod. You then walk down some steps, reaching a much larger area.\n\t\t\n\t\t\t\"Congratulations,\" the monotonous voice says. \"You have passed the first part of the test. Your next task is to exit the dungeon.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tEstelle points toward a far away door. There is a chasm that separates where you are from the door. \ ations, you have passed your first test. Dungeon one has been cleared. You will now be teleported back in five, four, three, two, one.\"\n\t\t\t\n\t\t\t*goto dungeon_complete\n\t\t\n\t\t\n\t\t#You decide to walk through the flames.\n\t\t\t(gained Void)\n\t\t\tYou put the orb back onto the podium. \n\t\t\t\n\t\t\t\"What are you doing?\" Estelle asks. \n\t\t\t\n\t\t\tYou shrug. \"Just checking out something.\" You put your hand above the flames. They aren't hot whatsoever. \"What do you think, Estelle? The flames aren't hot, could they be an illusion?\"\n\t\t\t\n\t\t\tEstelle bites her lower lip. \"Possibly, I mean that could definitely be something they would do. But I don't think you should tempt fate like that.\"\n\t\t\t\n\t\t\tYou laugh. \"Alright, tempting fate incoming.\"\n\t\t\t\n\t\t\tYou look to where the stairs are and then run through the blue flames that separate you from them. \n\t\t\t\n\t\t\t\"What are you doing?\" Estelle shouts. \n\t\t\t\n\t\t\t\"Hahaha, I was right, these flames aren't real,\" you say. \n\t\t\t\n\t\t\tEstelle comes after you and reaches the stairs. \"That wasn't very smart ${name}. You scared me there.\"\n\t\t\t\n\t\t\tYou shrug. \"I mean, it's not like they are going to make a test that can harm or kill us on our first try.\"\n\t\t\t\n\t\t\tThe girl shakes her head. \"I can't believe you did that based on this thought pattern. They definitely will be doing that in the future, so don't do something like this again.\"\n\t\t\t\n\t\t\t\"Fine, fine,\" you say and put your hands up defensively.\n\t\t\t\n\t\t\t\"Congratulations,\" the monotonous voice says. \"You have passed the first part of your test… Albeit in a rather unusual way I must add. Your next task is to exit the dungeon.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tEstelle points toward a far away door. There is a chasm that separates where you are from the door. \"Interesting, but they made this dungeon way too easy,\" she says. The girl moans. \"I thought today would be interesting, I guess not. Let me get us out of here.\"\n\t\t\t\n\t\t\tEstelle touches your shoulder. Her body pulses a bright white colour. You look on in horror as wings sprout out of her back. The wings are white and feathery like a bird's. \n\t\t\t\n\t\t\t\"Doesn't that hurt?\" you ask.\n\t\t\t\n\t\t\tEstelle nods. \"You get used to it.\" The girl laughs. \"Pain is nothing but an illusion of the body. If your mind is strong enough, pain is nothing.\" \n\t\t\t\n\t\t\tEstelle then picks you up and flies off to the other side of the chasm. When she puts you down, the wings dissipate into a white light that looks like shattered glass in the air.\n\t\t\t\n\t\t\t\"Well, thank you,\" you say. \"You made this really easy for us.\"\n\t\t\t\n\t\t\t\"Don't mention it,\" Estelle says. \"You did your thing too.\" \n\t\t\t\n\t\t\tThe two of you walk over to the door.\n\t\t\t\n\t\t\t\"Congratulations, you have passed your first test. Dungeon one has been cleared. You will now be teleported back in five, four, three, two, one.\"\n\t\t\t\n\t\t\t(gained void) \n\t\t\t\n\t\t\t*set void+10\n\t\t\t\n\t\t\t*goto dungeon_complete\n\t\t\n\t\t*hide_reuse #You forego using the orb and ask Estelle to use it first.\n\t\t\t\n\t\t\tYou hand the orb to Estelle. \"I think you should go first, I don't want to mess this up.\"\n\t\t\t\n\t\t\tEstelle shakes her head. \"No, you should do this. I believe in you, okay. And you should believe in yourself as well!\" She gives you the orb back.\n\t\t\t\n\t\t\tYou take in a deep breath. \"Alright, I'll go first,\" you reply.\n\t\t\t\n\t\t\t*goto start\n\t\n*if (brandon_dungeon=true)\n\tBrandon groans. \"Seriously? Flames? I hate flames. They are so bothersome and just destroy the beauty of what magic should be. Why is it always popular to have raw power instead of finesse and control of techniques.\"\n\t\n\tYou cough. \"I don't think that's what we should be worrying about right now Brandon. What are we even supposed to be doing here?\" \t\n\t\n\tYou look around, trying to find a way out of the room, but there are no doors, and the blue flames block you from leaving the area you are stood at.\n\t\n\t\"Welcome students,\" a monotonous voice booms. \n\t\n\tYou stumble forward and almost knock down the blue orb off the podium. \"What the hell?\" you shout. You look around in search of the voice but don't find anything. \"Did you hear that Brandon?\"\n\t\n\tBrandon nods. \"Yea, I heard a robotic voice from above. What of it?\"\n\t\n\t\"Let me introduce myself,\" the voice booms once again. \"I shall be your examiner for this test. Follow my instructions carefully.\"\n\t\n\tYou gulp hard. \"Alright, what do you want us to do?\"\n\t\n\t\"Dispel the blue flames that are blocking your exit. Once you have done that, the next instructions will be given.\"\n\t\n\t\"How are we supposed to dispel the flames if we haven't learned any spells?\" you ask. \n\t\n\t\"The orb will temporarily give you spells based on your proficiencies in the different magic forms. Good luck.\" \t\n\t\n\t*page_break\n\t\n\tBrandon walks over to the orb. \"Interesting, so they give us magic temporarily? I suppose that is useful for those who haven't learned any magic before.\"\n\t\n\t\"Like myself,\" you say. \n\t\n\t\"Like yourself.\" The boy gives you the orb. \"You should probably have the first go at it then, you haven't experienced the wonders of magic yet, whilst I have on the other hand. I believe you will fall in love with this very quickly.\"\n\t\n\tYou shake your head. \"If you already know magic, why don't you get rid of these flames first. We can always use the orb for the next test,\" you reply. \n\t\n\tBrandon furrows his brows. \"I mean, I suppose what you're saying is okay, but don't you want to experience the art of magic right now?\"\n\t\n\t*fake_choice\n\t\t#\"I don't really care about that right now.\"\n\t\t\t\"I don't really care about that right now,\" you say. You shake your head. \"What if they are timing us? Don't you want to be one o a tiny prickling sensation moves around your stomach. \n\nYou rub your eyes together and look around, finding that you are in your bedroom once again. \n\n\"What a long day,\" you comment. You look outside and notice that it is still very dark. You read the clock. It is currently 03:15.\n\nYou decide to go to bed. You fall asleep almost immediately. Throughout the night, however, you toss and turn, and despite being asleep you feel as though you are awake.\n\nYou wake up and go back to sleep every hour or two, the looming threat of being teleported somewhere weighing heavy on your mind.\n\n*label checkpoint_save\n*page_break End of Chapter\n*goto_scene fae_academy4", "fae_academy4": "*page_break Two weeks later\n\nYou wake up to the sound of birds chirping. You yawn and stretch your hands. Two weeks have passed by in a flash.\n\n[i]Another day, another chance of glorious pursuit of magic.[/i]  \n\nYou spent the past two weeks going through a comfortable rhythm of going to lessons and learning magic. You still hadn't learned any spells, however the time has finally come today.\n\nToday you will finally be tested for your affinity and prowess in the different disciplines of magic that are taught at the academy. You find it weird that it took a whole two weeks for this to occur instead of at the beginning of the semester, but now you don't care any more about it.\n\nBased on the results from this test, you will find out which spell tomes you will be given. There are multiple spell tomes for each discipline, with the disciplines available at the academy being theurgy, pyromancy and illusion. \n\nYou've also expanded your social circle, and you now know most of the people in the classes you frequent. The most notable people in your circle are Giselle, Estelle, Brandon and Song.\n\nYou've worked closely with each of them on separate occasions, and the five of you spend almost all of your free time together.\n\nYou look at your clock. It is 09:00.\n\nYou quickly get ready and are then on the way to have your affinities tested. You think to yourself that you want your proficiency to be related to which field of magic?\n\n*fake_choice\n\t#Illusion Magic\n\t#Pyromancy\n\t#Theurgy\n\t#Hydrosophy\n\t#Summoning\n\nYou make your way to the Main Hall of the academy. It is a huge room, which can accommodate at least a thousand students with ease.\n\nYou are sat beside your friends, the people you've met in the past two weeks and have spent most of your free time with. Brandon is to your left, and beside him is Song. To your right are Giselle and Estelle. \n\n\"Are you nervous?\" Brandon asks. You look to the orange eyed boy. His freckles are much brighter than the first time you'd met him. His blond hair has also grown slightly, and he moves it out of the way of his eyes.\n\n*fake_choice\n\t\n\t#\"Yes, I'm nervous. I'm actually kind of freaking out right now. What if I don't have an affinity for what I want to pursue?\"\n\t\t\"Yes, I'm nervous. I'm actually kind of freaking out right now. What if I don't have an affinity for what I want to pursue?\"\n\t\t\n\t#\"Not really, I'm confident that I'll have the affinity for the path I want to pursue.\"\n\t\t\"Not really, I'm confident that I'll have the affinity for the path I want to pursue.\"\n\t\t\n\t#\"You must be nervous if you're asking that question.\"\n\t\t\"You must be nervous if you're asking that question.\"\n\t\t\nBrandon pats you on the back and chuckles. \"Well, I suppose it doesn't matter how any of us feel. We're going to find out soon any ways. Am I right Song?\"\n\nSong turns his head and groans. \"Do you ever stop talking Brandon? It's quiet in the hall, get a hint.\"  He then rubs his dark, bald head and sighs. \"He's just non stop isn't he ${name}.\"\n\n\"Hey, that's not nice,\" Brandon butts in before you have a chance to speak. \"But fine, I'll be quiet since it's bothering only you.\"\n\n\"Sarcasm?\" you ask. \n\nBrandon shakes his head. \"I'd never be sarcastic, you know me well enough,\" he says with a smirk. \"What about you Giselle? How are you feeling?\"\n\nGiselle is fiddling with her thumbs and then adjusts her square glasses with her fair white skin. \"I'm nervous. I'm really nervous. You know what, can we not talk about this?\"\n\nYou put your hand on Giselle's shoulder and give it a gentle squeeze. \n\t\n*page_break\n\n\"May I have everyone's attention,\" Professor Drakath calls out. He waits a couple moments for any straggling conversations to end. \"Today is a rather monumentous occasion for you all. Well, for the most of you. Your preliminary test will be carried out and you will receive a spell book that relates back to your greatest affinity.\" \n\nHe pauses. \n\n\"To explain that further, if your affinity is greatest for illusion magic, you will be given a choice of five basic illusion magic tomes, each of which hold within them multiple spells that you can learn. At our academy here, we excel at teaching the disciplines of illusion, pyromancy and theurgy. Thus, if you somehow have your greatest affinity to summoning magic, hydrosophy or any of the other disciplines, then we will have to relocate you to a school more suited to that type of study.\"\n\nYou gasp. \"This can't be serious, right?\" You look at your friends. \"How can they even relocate us that easily?\"\n\nThey all seem similarly nervous. You scratch the back of your neck and shift about as you feel uncomfortable on the chair.\n\nProfessor Drakath seemingly hears what you say. He looks to you and says, \"Don't worry. We have good relationships with the other schools. Passing our entrance test is enough to get you into any of the other eight academies of Vargas.\"\n\n\"Now then,\" Professor Drakath says. \"If you look under your seats, you will find a sheet of paper that will direct you to the time and location of your test. I wish you all the best of luck.\"\n\nThe man starts to leave. The audience is in complete silence. It seems that nobody was expecting this outcome. \n\n*fake_choice\n\t#\"This is just stupid.\"\n\t\t\"This is just stupid.\"\n\t#\"Is this serious?\"\n\t\t\"Is this serious?\"\n\t#\"I can't believe it.\"\n\t\t\"I can't believe this.\"\n\n\"It'll be okay,\" Estelle says. Her voice breaks everyone from their daze. She is the first to search under her chair. She pulls out a thin piece of paper. \"10:15 at Training Room 5.\"\n\nBrandon is the next. \"10:30 at Training Room 7.\"\n\n\"10:00 at Training Room 5,\" Giselle says. \"I guess we go together Estelle.\"\n\nEstelle nods. \"I'll be there to support you. You'll be fine, okay.\"\n\nSong groans. \"Seriously? I'm stuck with chatty mouth over there.\" He shows you his piece of paper. It reads '10:30 at Training Room 7'. \n\nYou laugh. \"Could the two of you stop bickering, I won't be able to contain my laughter.\"\n\n\"I'm not bickering,\" Brandon replies. \"He's just sensitive. Anyway, what does yours say?\"\n\n*page_break Reach down\n\nYou reach down under your chair and feel a piece of paper. You pick it up and then say, \"10:30 at Training Room 20.\"\n\nYou look at your watch. \"Well, it's already 09:45, so we better get a move on.\"\n\nThe five of you make your way out of the Main Hall and toward the training rooms. The hallway isn't as packed you thought it would be. There's enough space that most of the students from your cohort are able to stand around and chat to each other whilst the others are going into the rooms. \n\nGiselle is the first to be tested. It is very quick and she comes out with a huge grin on her face and some tears that seem to be out of joy. \"My main affinity is theurgy,\" she says. She shows you a green scroll. \"I can't wait to practice this. I chose a spell called 'Minor Heal'.\"\n\nEstelle goes in next and comes out with a warm smile. \"Theurgy as well,\" she says calmly. \n\n\"Alright,\" Brandon shouts. \"We have two theurgy practitioners. Now we just need a pyromancy specialist, and two illusionists. Am I right?\"\n\nSong rolls his eyes. The tall, skinny boy looks down at Brandon with furrowed brows. \"And why is that?\"\n\n\"I have no clue. I'm just speaking for the sake of it. Let's go best friend!\" Brandon grabs Song and then goes off to Training Room 7. \n\n\"Alright,\" you say. \"I'll be back soon.\"\n\nYou make your way to Training Room 20. Once you open the door, you notice that you are the only student inside, unlike the other rooms where multiple students were going in and out of. \n\nThe room is relatively dark. You squint your eyes as you try to look around.\n\n*fake_choice\n\t\n\t#\"Hello, is anyone there?\n\t\t\"Hello, is anyone there?\"\n\t\t\n\t#\"Excuse me, isn't this Training Room 20? Where is everyone?\"\n\t\t\"Excuse me, isn't this Training Room 20? Where is everyone?\"\n\t\t\n\t#\"Anybody home?\"\n\t\t\"Anybody home?\"\n\t\t\n\t\t\nYou hear a woman laughing.  She slowly comes into vision. She has medium length purple hair with some white streaks within. Her eyes are a deep purple that look at you inquisitively. She's slender and slightly taller than you. The woman is wearing a tight leather one piece. \n\nYou clear your throat. \"Uh, excuse me. I-\"\n\n\"Yes yes, I know already. You're ${name} Light. I'll be taking care of your assessment. Just come a bit closer.\"\n\n*choice\n\t\n\t#Move closer\n\t\t\"Yea sure,\" you reply. You walk over to the woman. She grabs your hand tightly. \"What are you doing?\" \n\t\t\n\t\t\"I'm trying to see what is going on in your body. It'll be quick, don't worry.\" A purple light expands from her body like a mist. You feel a prickling from where the mist touches you.\n\t\t\n\t\t[i]What a weird woman but I suppose this is how everybody else is getting their affinities tested as well.[/i]\n\t\t\n\t\tThe woman frowns. \n\t\t\n\t\t\"What's wrong?\" you ask. \n\t\t\n\t\t\"It's just as I suspected. We need to go. Finding out has alerted them.\" \n\t\t*goto move_closer\n\t\t\n\t#Don't move closer\n\t\t\"I don't think I will,\" you reply. You stare at the woman, unsure of her intentions. You sense a weird energy emanating from her. You aren't able to pinpoint why, but you don't trust her.\n\t\t\n\t\t\"Don't worry, I won't bite,\" she responds. She licks her lower lips and then bites the air. \"Alright, jokes aside, come here, I need to get this done with quickly. I have some plans after this so don't waste my time.\"\n\t\t\n\t\tThe woman moves closer to you and then grabs your hand. A purple light is emitted from her body like a mist. You feel a prickling from where the mist touches you.\n\t\t\n\t\tThe woman frowns. \"Just as I suspected. We need to go. Finding out has alerted them.\"\n\t\t\n\t\t*goto move_closer\n\t\n\t\n*label move_closer\n\n\"Where do we need to go? And who have you alerted?\" you ask. The woman tugs onto your hand more forcefully. \"Ouch, what are you doing?\"\n\n\"We don't have time for this,\" she snaps. \"If you don't want to die, then listen to me and follow closely behind me.\"\n\nYou stop in your tracks. \"What are you talking about?\"\n\n\"Hurry up! You're playing with fire here.\" The woman grabs you even tighter than before and starts running with you toward a wall. Just then you hear the doors of the room crash open. \n\n\"Stop right there,\" a man shouts. You look back and see a man wearing a white robe. He has a staff in his hand with an orb attached to the top of the staff. His left eye is covered by an eye patch. His hair is covered by a hood, and you can make out his olive skin. \"Give me the child Bami!\"\n\n\"Go to hell, Templar asshole,\" Bami responds. She throws a small black gem onto the ground, smashing it into smithereens.\n\nSuddenly a purple portal forms in front of the woman. You can see a dark forest on the other side. Before you can do anything the woman pulls you into the portal.\n\n*goto_scene solas1", "mages1": "*temp flowersmany \"\"\n*temp flowersfew \"\"\n*temp kiss \"\"\n\n*page_break\nYou make your way through the busy streets of Val Sola alongside Mbali. The Mage's Guild is situated in a more rural area of the city. The hustle and bustle lessens the closer you get to the guild. \n\nAfter about half an hour you reach your destination.\n\nThe Mage's Guild is a rather small structure. The building is made out of mahogany, and seems to only be large enough to have maybe four or five different rooms. \n\nYou squint your eyes as you look at the building. \n\n*choice\n\t#\"This is smaller than I expected\"\n\t\t\"This is smaller than I expected,\" you say. \n\t\t\n\t\tMbali laughs. \"That's what she said.\" She giggles. \"It's a lot bigger inside than what it looks like from here.\"\n\t\t\n\t\t\"What, really?\"\n\t\t\n\t\tThe girl nods. \"Of course. There's no way the Mage's Guild could be this small. It's all magic after all.\"\n\t\t\n\t\t*goto mages_1\n\t*selectable_if (intelligence>10) #\"Surely it can't be this small. It has to bigger on the inside, right?\"\n\t\t(Mbali approves)\n\t\t\n\t\t\"Surely it can't be this small. It has to bigger on the inside, right?\"\n\t\t\n\t\tYou rub your chin. \"The building looks small, but I can sense a large amount of arcana pulsing from within it. Is this a magical structure by any chance? The inside is bigger than the outside, right?\"\n\t\t\n\t\tMbali grins. \"You're spot on there. I'm glad you noticed.\"\n\t\t\n\t\t*set mbali +5\n\t\t*goto mages_1\n\t\t\n\t*selectable_if (observation>10) #Notice the arcana emitted by the structure\n\t\t(Mbali approves)\n\t\t\n\t\tYou rub your chin. \"The building looks small, but I can sense a large amount of arcana being emitted by it. Is this a magical structure by any chance? The inside is bigger than the outside, right?\"\n\t\t\n\t\tMbali grins. \"You're spot on there. I'm glad you noticed.\"\n\t\t\n\t\t*set mbali+5\n\t\t*goto mages_1\n\t\n*label mages_1\n*page_break\n\n\"Let's go inside,\" Mbali says. The girl leads you into the Mage's guild. \n\nImmediately upon entering you come to realize how much bigger it is inside. The open space of the reception is large, very large. There are chandeliers floating up above at almost twenty meters.\n\nThere are about fifteen people in the reception going about their own business. You notice that every person in here is wearing robes of different colours. \n\n\"What's up with the robes?\" you ask. \n\n\"What do you mean?\" Mbali responds. \n\n\"I mean, they all have different colours. Why is that? Is that just a fashion thing?\"\n\nMbali shakes her head. \"No, the colours represent what ranking a member of the Mage's Guild has. For instance, an F rank mage will be given a brown robe, whilst an S ranked mage will be given a rainbow coloured robe.\"\n\nYou raise your brows. \"What about you? Where's your robe?\"\n\n\"At home, I don't really like wearing it,\" she says. She drags her fingers across her chest and then down to her stomach. \"Too tacky.\"\n\n*fake_choice\n\t#\"I like what you're wearing right now a lot more than a robe.\"\n\t\t(Mbali approves)\n\t\t\n\t\t\"I like what you're wearing right now a lot more than a robe,\" you say. \"A robe can't do your curves justice.\"\n\t\t\n\t\tThe girl raises a brow and then turns around. Her hands are on her hips and she sways the from side to side. \"You really think so?\"\n\t\t\n\t\tYou tongue gets caught in your throat. [i]You are way too sexy. It is illegal to be this smoking hot.[/i]\n\t\t\n\t\t*set mbali +5\n\t#\"You're such a fashionista.\"\n\t\tYou chuckle. \t\t\"You're such a fashionista, Mbali, did you know that?\" \n\t\t\n\t#\"Robes suck anyways.\"\n\t\tYou agree with the girl. \"Robes suck anyway. If I could go out and never have to wear one of those horrid things then I would rejoice.\"\n*page_break\n\nMbali chuckles. \"You always make me laugh. I mean, if you're asking me what ranking I have, I'm a D ranked mage at the moment. I haven't been taking enough quests recently.\"\n\n\"D ranked already? How long have you been here for?\"\n\nMbali pauses. She counts her fingers. \n\n\"Can't remember?\"\n\n\"No,\" she replies. \"I think I've been in Val Sola for maybe a month longer than you.\"\n\n\"Only a month?\" You gasp. \"Wait, what about Demeter?\"\n\n\"Oh that crazy elf has been here for like a whole year if I'm not mistaken.\" Mbali rolls her neck. \"Come, let's get you initiated into the guild. I want to finish a quest today.\"\n\n*page_break\n\nYou make your way over to the receptionist of the Mage's Guild. A man is stood behind the counter. He has short blue hair and is wearing glasses. He has a very pale complexion. You spot that he's the only individual you've seen in here so far that isn't wearing robes. He wears a simple white t shirt. \n\n\"Good afternoon Bee,\" Mbali says. \n\n\"Afternoon,\" Bee responds. \"Who might we have here?\"\n\n\"${name},\" you say. \"I want to join the Mage's Guild.\"\n\nThe man looks you up and down. He then takes out a sheet of paper. \"Here, right down your name, age, where you live and your specialization.\"\n\n\"Specialization?\"\n\n\"The field of magic that you have the greatest affinity to,\" he says. \n\n\"Oh, right.\" You take the piece of paper and write down all of your information, after which you hand it back to him. \n\nThe man raises a brow. \n\n*if (illusion>5) \n\t\"Illusion magic, interesting. You'd be more useful for quests pertaining to subterfuge.\"\n\t*goto mages_2\n*if (pyromancy>5)\n\t\"Pyromancy. Okay, that's good. You'll be quite useful in completing our extermination quests.\"\n\t*goto mages_2\n*if (theurgy>5)\n\t\"Theurgy. I think we can find you some good quests with habitat restoration or resource gathering.\"\n\t*goto mages_2\n*if (summoning>5)\n\t\"Summoning, I don't see many people with this affinity. Very good, you're going to be an all-rounder.\"\n\t*goto mages_2\n*if (hydrosophy>5)\n\t\"Hydrosophy. Not as strong as pyromancy in extermination quests, but nonetheless a good affinity to possess. When you reach a higher level you can embark on voyages at sea.\"\n\t*goto mages_2\n\t\n\t\n*label mages_2\n*page_break\n\"Let me quickly explain the types of quests available at the Mage's Guild,\" Bee says. \"The main quests that are usually available come from the categories of Extermination, Resource Gathering and Subterfuge.\"\n\n*choice\n\t#Ask about Extermination quests\n\t\t\"Could you explain the extermination quests for me please,\" you ask. \n\t\t\n\t\t\"They are rather simple, as the name suggests, the quests will give you a set number of opponents to defeat. These will range in difficult depending on what rank quest you can take on. With these extermination quests we need you to just kill whatever creatures need killing. You show us some proof, like cutting of the ears or tails of your prey, and we'll provide you with greater rewards the larger your kill count.\"\n\t\t\n\t\t*goto mages_2\n\t#Ask about Resource Gathering quests\n\t\t\"Could you explain the resource gathering quests please,\" you ask. \n\t\t\n\t\t\"Resource gathering quests are just as the name would explain. We send you to find resources and you bring back as many as you can. The more resources you bring, the greater your reward. Quests for more difficult to obtain resources, such as a dragon's tongue, won't be available to you until you reach a high enough rank.\"\n\t\t*goto mages_2\n\t#Ask about Subterfuge quests\n\t\t\"Could you explain the subterfuge quests? Those sound quite interesting,\" you say. \n\t\t\n\t\t\"These are a bit more tricky,\" Bee responds. \"It really depends on the specifics of the quest, but these are usually requests given by individuals rather than by the guild. These can range from having you act as a detective to solve a mystery all the way to having you infiltrate one of the many kingdoms of Michiwitt to gain information.\"\n\t\t*goto mages_2\n\t#No more questions\n\t\t*goto mages_2.5\n\t\n*label mages_2.5\nBee gives you a brown robe. \"I'll be changing the colour of your robe every time you advance in rank here. To reach the E rank you'll need to complete either four F rank quests or one E rank quest.You are currently only able to accept E or F rank quests. Our guild has the rule that you can accept quests of only one rank higher than your current rank, or any below your rank. However quests three ranks lower than your current rank cannot help you advance to a higher rank.\" The man points to a blue orb that is floating at the other side of the room. \"To find quests simply put your hand on the orb and the information will be transmitted into your mind.\"\n\n\"Thank you,\" you reply before going to the orb. \n\nYou touch the orb. An electrical current surges into your mind. Immediately after you can see all of the available quests when you close your eyes. \n\n\"Okay that's a lot to take in,\" you say. You take your hand off the orb. You open your eyes and look to Mbali. \"What do you think? I'll let you lead the way today.\"\n\nMbali smirks. \"So you want me to lead? Didn't pick you for that shy.\"\n\n\n*fake_choice\n\t*selectable_if (mbali>20) #I'll go wherever you want me to you hot piece of ass\n\t\tYou grin and wink. \"You can use me in any way you want. Whenever you want to.\"\n\t\t\n\t\t\"I'll keep that in mind,\" she responds. She rubs her lips. \"I'll make sure to think of some things to do to you.\"\n\t#You\t laugh nervously. Your tongue ties itself into a knot. How is Mbali so effortlessly stunning?\n\t#You keep quiet\n\t\t\nThe girl puts her hand on the orb and then closes her eyes. \"We'll take an E rank quest. Should be easy enough.\" The girl puts a finger on her lips. \"This one. It's a foraging quest. We'll go to the Ionian Valley to retrieve poppy flowers.\"\n\n\"Poppy flowers?\"\n\n\"They are used to create some healing potions. It's an easy enough quest, we just need to be careful about ambushes. There are a lot of annoying slime creatures in the valley. They're just… Ugh.\"\n\n\"How do we get to the Ionian Valley?\" you ask. \n\n\"It's simple, follow me.\"\n\n*page_break Follow Mbali\n\nThe girl leads you through the guild, which seems to be growing in size as you make your way further through it. Soon you reach a room which has dozens of portals within it. Each portal looks like a mirror, however instead of seeing your own reflection you can make out the different landscapes hidden within it. \n\nA woman is stood in the middle of the room, her eyes covered by a blue bandage. \n\n\"Mbali,\" the woman calls out. \"Where would you like to travel this time?\"\n\n\"The Ionian Valley ma'am.\"\n\n\"Very well,\" the woman replies. She points to one of the barriers and then looks to you. \"That will take you to the Ionian Valley. When you are ready to return simply break this and I'll bring you back. Don't lose it, under any circumstances.\"\n\nThe woman hands you a small black gem. It is cold to the touch yet a crackling electricity is emitted by it.\n\n\"Let's go,\" Mbali says and then walks into the portal. \n\nYou follow closely behind her heels. \n\nA wave of grogginess follows the teleportation, however you are able to stomach it. Once you regain your bearings, you breath in the fresh air of the wilderness. The sound of running water causes you to focus on the riverbed. Along the riverbed are hundreds of flowers. \n\n*choice \n\t#What are those flowers?\n\t\tYou spot a flower that is rooted along the riverbed, water flowing up halfway it's stem. It has beautiful yellow petals and you spot some bees buzzing about by it. \n\t\t\n\t\t\"Those are poppy flowers,\" Mbali says. She walks over to a flower and carefully plucks it, making sure to remove it, root and all, in one precise pull. \n\t\t\n\t\t\"How many do we need to pick?\" you ask. \n\t\t\n\t\t\"As many as we can,\" she responds. \"The more we pick, the greater our reward will be. I say we should aim for about four hundred flowers.\"\n\t\t\n\t\tYour mouth opens wide. \"F-Four hundred? We're going to be here all day.\"\n\t\t\n\t\tMbali chuckles. \"This is a quest, ${name}, of course it's not going to be easy.\"\n\t\t\n\t\t*goto mages_3\n\t\t\n\t*selectable_if (theurgy>10) #Those are the poppy flowers.\n\t\tYou spot a flower that is rooted along the riverbed, water flowing up halfway it's stem. It has beautiful yellow petals and you spot some bees buzzing about by it. \n\t\t\n\t\t\"Those are poppy flowers, right?\" you say as you look at Mbali. \n\t\t\n\t\tThe girl nods. She then walks over to a flower and carefully plucks it, making sure to remove it, root and all, in one precise pull. \n\t\t\n\t\t\"How many do we need to pick?\" you ask. \n\t\t\n\t\t\"As many as we can,\" she responds. \"The more we pick, the greater our reward will be. I say we should aim for about four hundred flowers.\"\n\t\t\n\t\tYour mouth opens wide. \"F-Four hundred? We're going to be here all day.\"\n\t\t\n\t\tMbali chuckles. \"This is a quest, ${name}, of course it's not going to be easy.\"\n\t\t\n\t\t*goto mages_3\n\t\t\n\t*selectable_if (dexterity>15) #Pick a flower\n\t\n\t\tYou spot a flower that is rooted along the riverbed, water flowing up halfway it's stem. It has beautiful yellow petals and you spot some bees buzzing about by it. \n\t\t\n\t\tYou walk over to a flower and touch it. It is very soft and feels fragile. You furrow your brows and then gently tug at the flower, removing it completely from the ground, root and all. \n\t\t\n\t\tMbali raises a brow. \"Impressive,\" she says. \"If you're this good at foraging the poppy flowers, we'll have an easy time here.\"\n\t\t\n\t\t\"How many do we need to pick?\" you ask. \n\t\t\n\t\t\"As many as we can,\" she responds. \"The more we pick, the greater our reward will be. I say we should aim for about four hundred flowers.\"\n\t\t\n\t\tYour mouth opens wide. \"F-Four hundred? We're going to be here all day.\"\n\t\t\n\t\tMbali chuckles. \"This is a quest, ${name}, of course it's not going to be easy.\"\n\t\t\n\t\t*goto mages_3\n\t\n\t\n*label mages_3\n*page_break\n\nYou get to work immediately and spend the next couple of hours plucking the flowers. It's not the easiest task as you have to walk quite a long distance along the riverbed, sorting through all of the dozens of different types of flowers. \n\nYou are able to pick a…\n*fake_choice\n\t\n\t*selectable_if (dexterity>15) #Lot of Flowers\n\t\t\"How many have you got, ${name}?\" Mbali calls as she returns from the other side of the river. \n\n\t\t\"I gathered 300 poppy flowers,\" you say. \n\n\t\t\"Wow,\" Mbali says with her mouth wide agape. \"Seriously, you picked 300?\"\n\n\t\tYou wink. \"What can I say, I've got nimble fingers. How many did you pick?\"\n\n\t\t\"300 as well. We're going to get a nice reward today,\" the girl responds.\n\t\t\n\t\t*set flowersmany \"true\"\n\t\t\n\t\t*fake_choice\n\t\t\t*selectable_if (((((mbali>20) and(orientation=\"gayF\")) or (orientation=\"straightM\")) or (orientation=\"bisexual\"))) #\"I think I deserve a reward from you.\"\n\t\t\t\tYou move closer to the girl and softly say, \"I think I deserve a reward from you. I've been a good ${boy} just for you.\"\n\n\t\t\t\tMbali raises a brow. \"Oh really? And what exactly would that reward be?\"\n\n\t\t\t\tYou get even closer until you can feel the girl's breath against your neck. \n\n\t\t\t\tMbali looks into your eyes. \"Well, since you've been so good to me for the past few months, I'll give you a reward.\" She pulls you in closer and locks onto you lips with hers. \n\n\t\t\t\tThe kiss is soft and sweet. Your heart jumps in your chest.\n\n\t\t\t\tA moment later she lets go of you.\n\t\t\t\t\n\t\t\t\t*set kiss \"true\"\n\n\t\t\t#Say nothing\n\n\n\t#Few flowers\n\t\t\"How many have you got, ${name}?\" Mbali calls as she returns from the other side of the river.\n\n\t\t\"I gathered 150 poppy flowers,\" you say. \n\n\t\tMbali nods. \"Good, 150 is a good amount. I picked 300 so we have more than enough.\"\n\t\t*set flowersfew \"true\"\n\t\nOut of the corner of your eye you spot something moving. You raise your hand up. Mbali focuses on where you are looking. \n\nA blue blob is sliding across the ground, moving toward you. \n\n\"A slime,\" Mbali says. \"We can leave now before it gets here.\"\n\n*choice\n\t#Go back to the Mage's Guild\n\t\t\"Let's get back,\" you say. \"I'm tired enough already.\"\n\t\t\n\t\t\"Yea, let's do that,\" Mbali says.\n\t\t\n\t\tYou scratch the back of your head. \"Well, how are we getting back? We used a portal to get here, but I don't see a portal anywhere close to here.\"\n\t\n\t\tThe girl smiles warmly. She grabs your hand. \"Hold on tight.\" \n\t\t\n\t\tMbali grabs a black gem from her pocket and then throws it onto the ground. Your vision blurs and you feel the usual effects of teleportation take over.\n\t\t\n\t\t*goto mages_4\n\t\t\n\t#Approach the slime\n\t\t\"I could use a quick little fight to be honest,\" you say. You make your way over to the slime. Once you get close enough, the creature suddenly morphs. It's body starts to increase in size until it's as tall as you are. Hands and feet jump out of the blob.\n\t\t\n\t\tYou stare wide eyed at the slime which now has become a mirror reflection of yourself. \n\t\t\n\t\t\"What in the…\"\n\t\t\n\t\tThe slime rushes toward you.\n\t\t\n\t\t*if (pyromancy>10)\n\t\t\tYou circulate the mana within your body immediately. Flames start to form in your palms. You throw the flames at the slime, causing it to stop running toward you. The slime starts to copy your movements and creates blue balls of energy in its palms. \n\t\t\t\n\t\t\t\"What the fuck,\" you shout. You jump forward as a blue ball flies your way. You furrow your brows. \n\t\t\t\n\t\t\t[i]Let me finish this quickly.[/i]\n\t\t\t\n\t\t\tYou push even more mana into your palms and start to form dozens of fireballs at once. You throw them at the slime with reckless abandon and keep conjuring more fireballs. \n\t\t\t\n\t\t\tThe slime's body starts to reduce in size as more fireballs strike it. After you've thrown almost twenty fireballs at it, the slime finally is reduced to nothing, leaving behind only a small blue core. \n\t\t\t\n\t\t\tYou walk over to the slain foe and pick up the gem. \n\t\t\t\n\t\t\t\"Nice work,\" Mbali says. \"Now you see why fighting slimes is rather annoying. They are just copycats. Of course pyromancy is the weakest magic against these specific slimes.\"\n\t\t\t\n\t\t\tYou nod in understanding. \n\t\t\t\n\t\t\t\"Let's go, before more slimes come to this commotion.\" The girl grabs your hand and then throws a black gem onto the ground. \n\t\t\t\n\t\t\tYour vision blurs and you feel the usual effects of teleportation take over. \n\t\t\t\n\t\t\t*goto mages_4\n\t\t\t\n\t\t*if (summoning>10)\n\t\t\tYou circulate the mana within your body immediately. You push your hands forward and in a blast of energy your Cerberus forms in front of the running slime. The slime stops in it's tracks. \n\t\t\t\n\t\t\t\"Perfect stuff,\" Mbali shouts. \"The slime can't mimic your summon since it's already copied your form.\"\n\t\t\t\n\t\t\tThe three headed hound growls. It sprints at the the slime and jumps onto it. The slime falls to the ground and Cerberus mauls the creature. \n\t\t\t\n\t\t\tThe battle ends quickly, with only a small blue core left of the slime by the end. \n\t\t\t\n\t\t\tYou walk over and pick up the core. \n\t\t\t\n\t\t\t\"Good job,\" Mbali says. \"Let's get going before more slimes come because of this commotion we've created.\" The girl runs over to you and grabs your hand. She then throws a black gem onto the ground. \n\t\t\t\n\t\t\tYour vision blurs and you feel the usual effects of teleportation take over.\n\t\t\t\n\t\t\t*goto mages_4\n\t\t\t\n\t\t*if (hydrosophy>10)\n\t\t\tYou circulate the mana within your body immediately. You push your hands forward as blade of water form in them. The blades slice through the slime, cutting it in half. \n\t\t\t\n\t\t\t\"That was easy,\" you mumble.\n\t\t\t\n\t\t\tThe two halves of the slime start to move back to one another and in just a couple breaths the slime has regained it's structure. \n\t\t\t\n\t\t\tYou frown. You then shoot out even more blades of water at the creature. The barrage becomes too much for the slime, and after throwing eight blades at it the creature stops reforming, leaving behind only a small blue crystal. \n\t\t\t\n\t\t\tYou walk over to the blue core and pick it up. \n\t\t\t\n\t\t\t\"Good job,\" Mbali says. \"Let's get going before more slimes come because of this commotion we've created.\" The girl runs over to you and grabs your hand. She then throws a black gem onto the ground. \n\t\t\t\n\t\t\tYour vision blurs and you feel the usual effects of teleportation take over.\n\t\t\t\n\t\t\t*goto mages_4\n\t\t\n\t\t*if (theurgy>10)\n\t\t\tYou circulate the mana within your body immediately. You press your hands onto the ground. A bright flash of green and brown is emitted. Roots and vines form out of the ground and slam into the slime. \n\t\t\t\n\t\t\tThe slime falls onto its back. Your vines wrap around the slime and squeeze it tightly.\n\t\t\t\n\t\t\tIn just a couple breaths the slime is pulverized into an explosion of blue goo, leaving behind only a small blue crystal. \n\t\t\t\n\t\t\tYou move over to the crystal and pick it up. \"A beast core,\" you say with a smile. \"That was easy.\"\n\t\t\t\n\t\t\tMbali claps her hands. \"Amazing work,\" she says. \"But let's get going before more slimes come to this commotion of ours.\"\n\t\t\t\n\t\t\t\"Alright, how do we get back though?\" you ask. \n\t\t\t\n\t\t\t\"Like this.\" Mbali runs over to you and grabs your hand.  She then throws a black gem onto the ground. \n\t\t\t\n\t\t\tYour vision blurs and you feel the usual effects of teleportation take over.\n\t\t\t\n\t\t\t*goto mages_4\n\t\t\n\t\t*if (illusion>10)\n\t\t\tYou circulate the mana within your body immediately. You push your hands out, causing a pink light to be released. The light reaches the slime, which stops in its tracks. The slime looks around and then puts its hands defensively against its head. \n\t\t\t\n\t\t\tYou frown. \"Mbali, how do we destroy this thing?\"\n\t\t\t\n\t\t\t\"I can practically only heal,\" the girl replies. \"I'm sorry, I'm no use here.\"\n\t\t\t\n\t\t\tYou rub your chin. You unsheathe a dagger from your side and ready yourself to fight the creature. \n\t\t\t\n\t\t\t\"It'll be difficult to defeat it with a blade,\" Mbali says.\n\t\t\t\n\t\t\t\"On second thought, this is a pain in the ass, let's get out of here,\" you say. \n\t\t\t\n\t\t\tMbali runs over to you and grabs your hand. She then throws a black gem onto the ground. \n\t\t\t\n\t\t\tYour vision blurs and you feel the usual effects of teleportation take over.\n\t\t\t\n\t\t\t*goto mages_4\n\t\n\t\n*label mages_4\n*page_break\n(gained Dexterity) (gained Intelligence)\n\nYou rub your eyes. Your head is spinning. When you regain your bearings you find yourself in the lobby of the Mage's Guild.\n\nYour backpack is filled to the brim with the flowers you had picked. You walk to the reception counter with Mbali. \n\n*if (flowersmany=true)\n\t\"600 poppy flowers,\" Bee says with furrowed brows. \"That's quite a large haul you've brought in today. Well done the two of you.\"\n\t\n\tThe man hands you each 40 gold pieces. \n\t\n\t*set gold +40\n\t*set dexterity +5\n\t*set intelligence +5\n\t\n*if (flowersfew=true)\n\t\"450 poppy flowers,\" Bee says. \"A good amount for a first excursion.\"\n\t\n\tThe man hands each of you 30 gold pieces.\n\t\n\t*set gold +30\n\t*set dexterity +5\n\t*set intelligence +5\n\t\n\n\n\"${name} pass me your robe would you, I'll upgrade you to a E rank mage. With your first task you've already displayed an ability to be of worth to this establishment.\"\n\nYou do as the man asks and hand him your brown robe. In return you are given a dark green robe. \n\nYou smile and put on the robe immediately, after which you make your way back home.\n\n*if (kiss=true)\n\t\n\t\"I want more rewards,\" you say. You look to Mbali. \n\t\n\tThe girl stops walking. She turns around to face you and smiles. \"I'll only give you rewards if you help me out at the Mage's Guild.\"\n\t\n\tYou tilt your head.\n\t\n\t*fake_choice\n\t\t#I get to kiss this beautiful woman whenever we take quests from the guild? I'm living a good life now!\n\t\t#That's a bit of a weird statement but hey, I don't care. I'll help you out everyday then.\n\t\t#Now that is a transaction I can wholeheartedly approve of.\n\t\t\t\n\t\t\tYou chuckle. \"I'll be helping you out every single day if you reward me like before.\"\n\t\t\t\n\t\t\tMbali edges closer to you and whispers into your ear, \"Oh no, that was just a little taster. My rewards will whip you into subservience.\"\n\t\t\t\n\t\t\tYou swallow all the saliva in your mouth.\n\t\t\t\n\t\t\tThe girl gives you a peck on the cheek before turning around and walking away. You watch with uninhibited lust at her ass as she sways her hips from side to side.\n*set mageE \"true\"\n\n*label checkpoint\n*if templars2=true\n\t*goto_scene templars2\n*if templars2=false\n\t*goto_scene chapter2\n", "mages2": "*if mageE=false\n\t*set templars2 \"true\"\n\t*goto_scene mages1\n*if mageE=true\n\tYou want to go to the Mage's Guild along with Mbali, however the girl tells you that they are temporarily closed for the month.\n\t\n\t\"What do you mean they are closed?\" you ask. \"How is that even possible?\"\n\t\n\tMbali shrugs. \"I'm sorry, there's something important going down there that I can't really tell you about.\"\n\t\n\tYou tilt your head. \"You can't tell me? Why not?\"\n\t\n\t\"I… I can't tell you, that's all you need to know.\"\n\t\n\tYou sigh and then start sulking. You walk around the living room like a headless chicken. \"Damn it, what do I do now?\"\n\t*label magechoice\n\t*choice\n\t\t#Go to the Adventurer's Guild\n\t\t\t*goto_scene adventurers2\n\t\t#Go to the Alchemist Society\n\t\t\t*goto_scene alchemy1\n\t\t#Try to spend time with Mbali\n\t\t\t\"Hey, Mbali,\" you say.\n\t\t\t\n\t\t\tShe turns around to you. \"Yes?\"\n\t\t\t\n\t\t\t\"Since I can't go to the Mage's Guild, why don't we do something today?\"\n\t\t\t\n\t\t\tMbali shakes her head. She starts to make her way out of the living room. \"I'm sorry, but I need to go-\"\n\t\t\t\n\t\t\t\"Oh come on, pretty please.\" You clasp your hands together and then get onto your knees. \"I'm begging you.\"\n\t\t\t\n\t\t\t*if mbali\u003c5\n\t\t\t\t\"I'm sorry, but I really can't go. I'll see you later ${name}.\"\n\t\t\t\t\n\t\t\t\t(Relationship with Mbali is too low)\n\t\t\t\t\n\t\t\t\t*goto magechoice\n\t\t\t*if mbali>5\n\t\t\t\tThe girl stops in the middle of the doorway. She bites her lower lip. \"Alright, fine, but I only have an hour before I really have to leave!\"\n\t\t\t\t\n\t\t\t\tYou rub your hands together whilst grinning. \"That's what I love to hear.\"\n\t\t\t\t\n\t\t\t\t\"Well, what do you want to do?\" she asks. \n\t\t\t\t\n\t\t\t\tYou shrug and then nervously scratch the back of your neck. \"I didn't really think this through haha.\"\n\t\t\t\t\n\t\t\t\tMbali rolls her eyes. \"You're such a moron.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\tYou spend the next hour walking around the nearby forest with Mbali.\n\t\t\t\t\n\t\t\t\tMbali looks at you. Sunlight makes its way through the canopy and hits her face. \n\t\t\t\t\n\t\t\t\tYou think that Mbali…\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Is the most beautiful woman you've ever met\n\t\t\t\t\t#Needs to relax a bit more\n\t\t\t\t\t\n\t\t\t\tYou sigh. \"You've got to leave now don't you?\"\n\t\t\t\t\n\t\t\t\tThe girl nods. She smiles. \"I enjoyed this, really, but I have to go. We should do this again sometime.\"\n\t\t\t\t\n\t\t\t\tWith that Mbali exits the area, leaving you alone in the forest.\n\t\t\t\t\n\t\t\t\tYou sit on the ground and stare at the canopy. You grin. \n\t\t\t\t\n\t\t\t\t*goto_scene templars2", "screenshots": "*set fullname \"Arcane Light\"\n*set illusion 15\n*set pyromancy 5\n*set hydrosophy 5\n*set summoning 20\n*set theurgy 0\n*set void 15\n*set health 100\n*set mana 30\n*set gold 50\n*set dexterity 25\n*set strength 5 \n*set intelligence 15\n*set observation 10\n*set social 35\n*set invisibility \"true\"\n*set water_wall \"true\"\n*set flame_dash \"true\"\n*set thorn_armour \"true\"\n\n*comment screenshot1\nYou grab a seat on the dining table and look at the fruits of your collective labours. You grab a fork and dig into a delicious omelette. You then take a swig of the icy cold water in the glass in front of you. \n\n\"This is just amazing,\" you say. \"Life is worth living like this.\"\n\nDemeter laughs. \"You shouldn't go saying things like that.\"\n\n\"Why not?\" Mbali retorts. She frowns. \"${name} isn't wrong at all, this is exactly why life is worth living. Surrounded by friends and family and just enjoying each other's company.\"\n\nDemeter tilts his head back and groans. \"That's not what I meant. The act of saying that totally jinxed this quiet peaceful life of ours. The wheel has heard ${name}'s words and will throw something at us now. And anyway, none of us have a family to go back to anyway.\"\n\nYou shudder at the end of Demeter's sentence. You sigh knowingly. Going back home to your families would only put them in danger of the Templars. \"Demeter is right. I guess we are all the family we have right now.\"\n\nThe mood is completely ruined by that single sentence. You all eat in silence.\n\nYou walk out into the garden after finishing your breakfast. You stare at the clear blue sky. \n\n[i]What should I do for today?[/i]\n\n*fake_choice\n\t#Go to the Adventurer's Guild\n\t#Go to the Mage's Guild\n\t#Go to the Training Ground\n\t\n\t\t*goto_scene draken_academy\n\n*comment screenshot2\nYou groan as you wake from your slumber to a whisper. You tumble and turn before mumbling, \"Demeter, leave me alone.\"\n\n\"…\"\n\nThe whisper comes again. It tickles your ear but you can't quite make out what is being said. \n\n\"Seriously, Demeter, stop it!\"\n\n\"…\"\n\nYou grit your teeth and then open your eyes. \"Stop messing around!\"\n\nYour heart lurches. You rub your eyes. Terror and disbelief fills you from the core. You're no longer at your camp site, instead you're alone in the wilderness. The ground is wet and muddy. It is cold and you shiver. \"Where am I?\"\n\nYou rub your hands against your shoulders. A tingle runs down your spine.\n\nYou feel immediate danger.\n\n*fake_choice\n\t*selectable_if (dexterity>24) #Jump forward\t\t\n\t*selectable_if (invisibility=\"true\") #Cast Invisibility\t\n\t*selectable_if (water_wall=\"true\") #Cast Water Wall\n\t*selectable_if (flame_dash=\"true\") #Cast Flame Dash\n\t*selectable_if (thorn_armour=\"true\") #Cast Thorn Armour\n\t#Turn around\n\t\n*comment screenshot3\nYou push out your mana and throw your hands forward. \"Cerberus, help me out,\" you shout. \n\nThe three headed hound forms a few steps away from Captain. It snarls at him, acidic saliva dripping from the middle head. \n\n\"Well done,\" Captain says. \"A strong summoned beast. So you're a talented Voidwoken.\" He grins. Moments later his face contorts into a scowl. \"A Voidwoken nonetheless. Like a big fish in a small pond. I'm a big fish in an ocean, don't think for even a fraction of a second that we are in the same realm you mutt.\"\n\nThe boy's hands light up bright yellow. A longsword forms in each hand. He brandishes the weapons. \"Here doggy, here you little mutt.\" \n\n\"Cerberus, attack!\"\n\nCerberus howls and then lunges at Captain. The boy dodges and slashes down. Cerberus' right head catches the blade in its mouth and presses down hard. The blade snaps in half. \n\nThe left head opens wide and a fireball bursts out. It hits the boy straight in the chest. He is thrown back into a tree.\n*label killcaptain\n*fake_choice\n\t#Run\n\t#Go in for the kill\n\t\t*finish\n\t\t\n*comment screenshot 4\nYou wait for some sort of response. Seconds tick by and you yawn. You then sigh. \"Might as well have a look for myself. I have time to waste anyway it seems.\"\n\nYou browse through the books but find nothing remotely interesting. There's some books on herbal medicine that was used a thousand years ago, there's also some religious texts that you've never heard of. \n\nYou find a small purple tome underneath the book you just put away. It seems rather plain and you pick it up to then put it to the pile of books you've already decided are useless to you. \n\nA sudden intense pull comes from the spirit. A purple light forms where you palm is holding onto the book. \"Is this it? This has to be it?\" You jump and grin.\n\nThe light dims down until it disappears. You open the book carefully, your eyes ready for the upcoming experience. \n\n\"What in the?\" you shout. You flip through the pages of the book rapidly. You frown and then turn it upside down as you try to figure out what is going on. There are only diagrams and symbols to be found on the pages, not a single readable letter in sight. You groan and then rub your temple. \"Seriously, this is what got you so excited? Are you kidding me.\"\n\n\"What's going on?\" Ploy calls out. The girl appears behind you a couple breaths later.\n\n\"Nothing, I just thought I found something good, but it turns out it's useless.\" You point at the purple tome.\n\n\"Let me see that,\" Ploy says. You hand her the book. The girl flips through the pages much more slowly than you did. She chuckles and then hands the book back to you.\n\n\"So?\" you say. \"What is it? You're smiling? Do you know what I'm supposed to do with this?\"\n\nThe girl shrugs. \"I have no idea.\"\n\n\"You… Was that intentional?\"\n\nPloy smirks and then walks away. As her figure disappears she adds, \"Maybe.\"\n\nYou look at the book once more and decide to tackle the problem by…\n*fake_choice\n\t#Read through it more slowly\n\t#Try to convene with your spirit\n\t#Find some books that are linked to it\n\t*if (book_purple=true) #Activate your Void form\n\t\t*finish\n*comment screenshot5\nBrenda grabs a hold of you and pushes you to the ground. A small boulder shoots your way and crashes into a tree behind you.\n\n\"Get a hold of yourself ${name}, this isn't the time to zone out!\" Brenda shouts. She gets you onto your feet and rushes behind a nearby tree. \"Breath,\" she says.  \n\nThe girl slaps you in the face when she notices you aren't paying attention. \"Hey, look at me,\" she shouts. \"Breathe, together with me, 1, 2, 3.\"\n\nYou take in a deep breath and can finally move your body again. \n\n\"Good,\" Brenda continues. \"Now let's get this done.\"\n\nYou nod. You look out from behind the tree and see Sir Stevie jumping out of the ground at the serpent. \n\nYou don't need to be told what to do, you already know that you have to:\n\n*fake_choice\n\t\n\t#Circle behind the serpent and cause a distraction.\t\t\n\t#Find a better vantage point and start casting spells at the serpent. \n\t#Wait for the right moment and go in for the kill.\n\t\t*finish\n", "solas1": "*page_break\n*label undead\nYour mind spins and your stomach churns. As you drop on the other side of the portal you fall onto your knees and immediately spew out the contents of your stomach. \n\n\"Sorry about that,\" Bami says. \"This is probably the largest distance of teleportation you have experienced.\"\n\nIt takes you a couple of minutes to gather your bearings. You then get onto your feet, but you are still weak and wobble about.\n\n\"Woah there, careful,\" Bami says. She catches you before you fall back down. \"Here, drink this.\"\n\nShe hands you a cup of water. \n\n\n*choice\n\t\n\t#Take the cup\n\t\tYou immediately grab the cup and chug down its contents. \n\t\t\n\t\tYour insides start to feel rejuvenated and the dizziness that permeated through your whole being starts to ebb away. \n\t\t\n\t\tYou take a couple steps away from the woman. \n\t\t\n\t\t\"Get away from me.\"\n\t\t\n\t\t*goto Bami1\n\t\t\n\t#Don't take the cup\n\t\tYou shake your head and then push yourself away from the woman. \n\t\t\n\t\t\"Get away from me.\" You stare at the woman and then scan your surroundings. It is relatively dark and a gentle wind is blowing through the expanse. \n\t\t\n\t\t*goto Bami1\n\t\t\n*label Bami1\n\"${fullname}, we don't have time for your temper tantrums right now. I'm not here to hurt you, rather the opposite,\" Bami says. \"And I don't want to restrain you either, so don't make this difficult for me.\"\n\n\"How do you know my name?\"\n\nBami's purple eyes twinkle, illuminating the dark expanse. \"How couldn't I know of you?\"\n\n\"That doesn't answer my question.\" You take in deep breaths and feel your heartbeat starting to intensify. \n\nYou sense that the woman has a lot of power, her aura is thick. You almost feel suffocated by the immense pressure.\n\nBami groans. \"Seriously, am I going to need to explain everything before you let your guard down?\"\n\nYou nod. \n*if (fae=true)\n\t\"Let me begin with saying that I just saved your life. You were in immediate danger, if not for me then those so called teachers at your academy would have given you a fate worse than death.\"\n\n\tYou gulp hard. \t\"What do you mean? A fate worse than death?\" \n\n\t\"It means that they were going to wait for your powers to manifest themselves properly, and then use you as a fucking battery.\" \n\t\n*if (draken=true)\n\t\"Let me begin with saying that I just saved your life. You were in immediate danger, if not for me then that damned Templar minion would have given you a fate worse than death.\"\n\t\n\tYou gulp hard. \t\"What are you talking about? A fate worse than death?\"\n\t\n\t\"That thing right there, that spectre, was a minion sent by the Templars. They were going to grab you and use your energy as a battery. You're lucky I was there to stop it.\"\n\nYou notice the rage in Bami's voice, but you also sense some fear. \"A battery? What are you talking about?\"\n\t\n\"Bami don't be mean . This is only a newborn we're dealing with after all. Be patient.\" The woman rolls her neck around and then sighs. \"Look, ${fullname}, you are a Voidwoken. Have you ever heard of that before?\"\n\n\"A Voidwoken?\" You shake your head. \"I don't know what that is, sorry.\"\n\n\"Close your eyes and sense the mana that flows within you. Trace that back to its source and tell me what you see.\"\n\n*fake_choice\n\t#\"Why should I? I still don't trust you.\"\n\t\t\"Why should I? I still don't trust you. I don't even know who you are or what you want from me.\"\n\t\t\n\t\tBami sighs. She scratches the back of her neck. \"Seriously, don't make me have to resort to threatening you. It's only the two of us here, so if I wanted to cause you harm, I very realistically can without you putting up the slightest fight.\"\n\t#\"Okay, but only because I have no other choice.\"\n\t\t\"Okay, but I'm only doing as you ask since I have no other choice.\"\n\t\t\n\t\tBami chuckles. \"Well then, get on with it young ${gentleman}.\"\n\nYou close your eyes and do as commanded. You follow the flow of mana from within your body all the way to its origin. Right behind your lungs you see the purple arcane core that exists within you.\n\n\"What do you see?\" Bami asks.\n\n\"I see a purple arcane core. It's not too big, and its pulsating every couple of seconds, going from bright to dark.\"\n\n\"Good,\" Bami responds. \"Now I want you to take a closer look at how it changes from bright to dark. Focus in on the dark as much as possible.\"\n\nYou sigh. You open your eyes and take a good look at the woman. \"I'm only going to do this because you genuinely don't seem like you mean me any harm.\"\n\nYou take in a deep breath and focus on the arcane core as it pulses to dark. You suddenly feel yourself leaving your body. Your eyes snap open and you look around. You can see your body from a third person perspective, along with Bami.\n\nBami looks up at where you are and waves. \"What did I tell you?\"\n\nYou flail your arms about as you try to jump back into your body. \n\n\"It's not that easy to control your Void form,\" Bami says and then chuckles. \"I'll teach you the utmost basics.\"\n\nThe woman closes her eyes and within a second she floats out of her body. Instead of looking like herself, she takes on the form of a humanoid figure but seems to be made out of shadows. You can't make out her face as it is covered by a hood.\n\n\"Don't mind my appearance,\" she says. \"You look the exact same as me right now.\"\n\n\"Wait, how are we speaking then?\" \n\n\"Telepathically,\" Bami responds. \"Okay, if you want to go back into your body, you simply have to focus on the bright pulsing from within your arcane core. Like this.\" Bami immediately starts to float back down into her body. \n\n\"Try it,\" the woman shouts with her hands cupped against her mouth. \n\nYou focus on the bright pulsing from within your arcane core and find yourself pulled back to your body as if you were attached by strings. You fall onto your ass but begin laughing. \"That's amazing!\"\n\n\"Do you trust me now?\" the woman asks. \n\n*fake_choice\n\t#\"Yes, I trust you.\"\n\t\t\"Yes, I trust you. Maybe I'm naive but I think I believe you.\"\n\t#\"Maybe a little more than before.\"\n\t\t\"Maybe a little more than before, but I still don't buy everything.\"\n\t#\"No, you still kidnapped me.\"\n\t\t\"Of course not, you still kidnapped me.\"\n\t\t\nBami laughs. \"Well, that doesn't matter anyway. We need to get going back to the base.\"\n\n\"The base?\" \n\n\"Our base of operations. There's more of us. Not many, since we are usually captured and used before we have a chance to grow, but enough of us to make it almost impossible for them to break in.\"\n\n\"A base of Voidwoken? So what are we? How did we come to exist?\"\n\nBami smiles. She puts up two fingers. \"Two to be exact, but more on that later.\" She pats you on the back. \"So you're finally feeling the camaraderie? I'll explain everything when we get there. But now isn't the best time, we need to get a move on.\"\n\n\"Alright.\" \n\nYou follow Bami through the dark forest. A nice aroma fills the air, a mixture of tulips and lavender seems to be the most prominent flowers in the area. You try to remember the layout of where you are walking, but find it too difficult. It seems like there might be some magic spell placed upon the area preventing you from doing this.\n\nA thick fog starts to fill the area, causing you to be unable to see more than a few steps ahead of you. You quicken your pace in order to stay closer to Bami. \n\nAfter about twenty minutes have passed, the fog finally starts to clear out. Your eyes widen and your mouth falls agape as you stare at the landscape ahead of you. \n\nIt is now completely bright, the moon nowhere to be seen and the stars having disappeared from the sky. There is a humongous fortress in the distance, looking more the size of a city than a castle. A stream runs beside the fortress and also into it. The colours of the vegetation make the area burst into life. There is green grass filled with blue and purple flowers. There are bees and other insects buzzing about.\n\nThe green walls of the fortress have vines climbing all over it. The sky has taken on an extremely light blue hue, and you feel yourself calming and relaxing as you take in deep breaths of the fresh, sweet air. \n\n\"Here we are,\" Bami says. \"This is going to be your new home starting from now. Not too shabby, am I right?\"\n\n\"…\" You look at the woman with a blank expression.\n\n\"Too soon? Okay let's get you inside so I can give you peace of mind and explain what's going on.\"\n\n*fake_choice\n\t#\"Too soon.\"\n\t\t\"Too soon,\" you say.\n\t#Shrug\n\t\tYou shrug.\n\t#\"No, I'm actually excited.\"\n\t\t\"No, I'm actually excited,\" you respond.\n\nIt doesn't take long for you to reach the inside of the fortress. \n\n\"This is Val Sola,\" Bami says. \"One of the only places on Michiwitt where Voidwoken can live in peace.\"\n\nBami brings you through the fortress. There is quite a hustle and bustle within the place, and you spot hundreds of individuals going about their days. What surprises you the most is that there are dozens of different races present in Val Sola.\n\nElves with their long, pointy ears are the second most common after humans. Then there are a lot of dwarves about as well, with their short stature and thick, long ginger beards. You also see some races you'd never heard of before, but Bami is able to answer all of your questions. She tells you about the Lizardfolk, who have a humanoid stature and build, but are usually taller and have scales instead of skin. These people all range in the colour of scales that they possess, with you noticing some with green, red, blue or purple scales. \n\nThere are even Harpies, Faeries and all manner of mystical creatures.\n\nAs you make your way through Val Sola, Bami stops in front of a building that looks like a temple. It is relatively large, with the windows stained in unique mosaic patterns. The head of the temple is dome shaped, and a single purple gem, about the size of four or five people, is fit atop it.\n\n\"We're here,\" Bami says. The woman places her hands on her back and then stretches. This is followed by the sounds of something cracking and the woman groaning in bliss. \n\n\"What is here?\" you ask. \n\nBami doesn't respond and instead opens the door to the building. She then goes inside.\n\nYou follow the woman. The aura within the building is thick, you can feel a huge amount of arcana within. It buzzes and crackles with energy in the air. You arcane core seems to be whirring. You close your eyes and focus on the arcane core, and you find it is gleaming. \n\n\"And who might that be?\" a hoarse male voice calls. \"A new recruit ey? Where'd you find this young ${man} Bami?\"\n\nThe man comes into your vision. He's an elf, his ears long and pointed with a bald head. His skin as fair as a princess'. He's clean shaven, like almost all of the other elves you've seen so far, and he has the characteristic purple eyes everybody else seems to have here. \n\n\"Solas,\" the man says and then stretches his arm out. You notice that the elf is very slender, and his every movement is elegant and refined.\n\n\n\n*choice\n\t#Shake his hand.\n\t\tYou stretch your arm out and clasp your hand with his. The man has a firm grip, despite seeming like he were relatively fragile on first glances.\n\t\t\n\t\t\"What might your name be?\" he asks. \n\t\t\n\t\t\"${fullname},\" you respond. \"Now could you start explaining what is going on here? I realize that you guys aren't trying to harm me or anything like that, but I still don't appreciate being kidnapped and then left in the dark on everything.\"\n\t\t\n\t\t*goto solas_explain\n\t\t\n\t#Don't shake his hand.\n\t\tSolas stares at you with a smile. \"Defensive… Understandable, given the circumstances.\" He pulls his arm back and then crosses both arms.\n\t\t\n\t\tBami chuckles. \"${He}'s a rude one Solas, don't mind ${him}.\"\n\t\t\n\t\t\"I'm not rude,\" you snap. \"I just don't appreciate being left in the dark after being kidnapped. You would at least understand that, right?\"\n\t\t\n\t\t*goto solas_explain\n\t\n*label solas_explain\n\nSolas nods. \"My apologies ${mr} ${fullname}. Look, now that you're here, I can guarantee your safety from those that would plot to steal your power.\"\n\n\"What are you talking about?\" you respond.\n\n\"Have you ever heard of the Wheel of Life?\"\n\nYou shake your head. \"I've heard some children's tales about it, but I'm not too familiar with it. Why do you ask?\"\n\nSolas beckons you to follow him. You soon reach a small room. \"Come, sit,\" he says. \n\nYou oblige and seat yourself by one of the three couches in the room. \n\n\"Would you like some tea?\" he asks.\n\n*fake_choice\n\t#\"Yes please.\"\n\t\t\"Yes please,\" you say. \n\t\t\n\t\tThe elf grabs a teapot, pours you a drink and then hands you the warm cup. You take a sip. It is a sweet jasmine flavour.\n\t#\"No thank you.\"\n\t\t\"No thank you,\" you respond.\n\n\"The Wheel of Life isn't a myth or a legend. It is very much our reality,\" Solas says. \"To put it simply, every living being that is capable of sentience, namely the humans, elves, dwarves and the like, are a part of the Wheel of Life. When you die, that isn't the true end, you won't cease to exist just like that. Your soul is brought back into the Wheel of Life until the time comes that you are to be reborn.\"\n\nYou furrow your brows. \"And how can you know that this is true?\"\n\n\"Because we are Voidwoken,\" he responds. Solas grabs his teapot and starts to pour himself some tea. \"You see, most people are unable to access the realm of the wheel. They are unable to control their path once their life has been extinguished from their living body. Us, on the other hand, we have some control over this.\"\n\n\"What? So I would be able to remember things from my previous lives? Is that what you're getting at?\"\n\nSolas shakes his head. \"Well, not quite. I mean, there are some who are able to do that, but that's a small fraction of the Voidwoken. Instead, Voidwoken are able to tap into the powers of the wheel. This is what makes our existence dangerous, because those without this ability wish to exploit it.\"\n\n\"Not just exploit it,\" Bami says. She clenches her fists and grits her teeth.\n\nSolas gets up and rubs the woman's shoulder. \"Want me to finish this alone?\"\n\nBami nods. She storms out of the room.\n\n*fake_choice\n\t#\"Is she okay?\"\n\t\t\"Is she okay?\"\n\t#\"What was that about?\"\n\t\t\"What was that about?\"\n\t#\"She's a bit weird.\"\n\t\t\"She's a bit weird,\" you say. \n\t\t\nSolas sits back down and sighs. \"Not many of us were able to lead a normal life. Many of us were trapped and captured by Templars or magicians and had our powers sucked out of us.\" He pauses. \"You wouldn't believe me if I told you the cruel things that many of us had to experience.\" \n\nYou gulp hard.\n\n\"Anyhow, what I am saying is that to be a Voidwoken means to gain the powers of the wheel. That means being able to channel spirits, which makes us as powerful as we are. But this obviously comes with the drawback of us being hunted by those who want our power.\"\n\nSolas takes a sip of his tea and then lays back into his couch. \"We are also hunted by creatures that live on the other side of the veil that separates our living world from the world of the wheel.\"\n\n\"Wait. When my spirit leaves my body, is that me entering the veil?\"\n\n\"Indeed. You will enter the world of spirits when you get there. Of course, right now you possess no spirits. As a Voidwoken you will act as a conduit for spirits, but you must usually first complete a task for them that will have them join forces with you. I have already prepared a spirit for you. Keep in mind that your prowess in magical fields not related to the spirit of your choice will temporarily be reset.\" Solas hands you a thin booklet. \"Make your choice.\"\n\nYou read through the contents of the book.  With furrowed brows you ask, \"What do you mean by temporarily reset?\"\n\n\"It is a large effort on your body to house your very first spirit, and as such your link to the other forms of magic will be cut off, but only for a few months, that is. If I remember correctly it will be around two to three months only.\"\n\n*choice\n\t#Choose a spirit of flames.\n\t\t(gained Pyromancy) (lost Hydrosophy) (lost Summoning) (lost Theurgy) (lost Illusion) \n\t\t\n\t\t\"This one,\" you say. You point to the spirit of flames. \n\t\t\n\t\t\"Interesting choice,\" Solas says. \"The power of flames will be coursing through your body as your primary source of power from this day onward.\"\n\t\t\n\t\tA red wisp jumps out of the book and starts to fly around you in circles. After a couple moments the wisp rushes into your head. \n\t\t\n\t\tYou hold onto your head. Images start to flash in your mind. They are vivid, depicting volcanoes and forest fires. The collapse of stars and the birth of n
