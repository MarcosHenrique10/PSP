ew ones. You clutch onto your head as a pain starts to expand from within your mind. \n\t\t\n\t\tYou scream out and fall back into the sofa. You take quick breaths. The visions start to fade away. \n\t\t\n\t\t*set pyromancy 15\n\t\t*set hydrosophy 0\n\t\t*set summoning 0\n\t\t*set theurgy 0\n\t\t*set illusion 0\n\t\t*set void 20\n\t\t*goto first_spirit\n\t\t\n\t#Choose a spirit of water.\n\t\t(gained Hydrosophy) (lost Pyromancy) (lost Summoning) (lost Theurgy) (lost Illusion)\n\t\t\n\t\t\"This one,\" you say. You point to the spirit of water.\n\t\t\n\t\t\"Interesting choice,\" Solas says. \"The power of water will begin coursing through your veins as the primary source of your power from this day onward.\"\n\t\t\n\t\tA blue wisp jumps out of the book and starts to fly around you in circles. After a couple of moments the wisp rushes into your head. \n\t\t\n\t\tYou hold onto your head. Images start flashing in your mind. They are vivid, and you can see the deadly force of tsunamis crashing against the earth. You see whirlpools the size of cities. You clutch onto your head as a pain starts to expand within your mind.\n\t\t\n\t\tYou scream and fall back into the sofa, and start to taking quick breaths as the visions fade.\n\t\t\n\t\t*set pyromancy 0\n\t\t*set hydrosophy 15\n\t\t*set summoning 0\n\t\t*set theurgy 0\n\t\t*set illusion 0\n\t\t*set void 20\n\t\t*goto first_spirit\t\t\t\n\t\t\t\n\t#Choose a spirit of illusions.\n\t\t(gained Illusion) (lost Pyromancy) (lost Hydrosophy) (lost Summoning) (lost Theurgy)\n\t\t\n\t\t\"This one,\" you say. You point to the spirit of illusions.\n\t\t\n\t\t\"Interesting choice,\" Solas says. \"The power of illusions will begin coursing through your veins as the primary source of your power from this day onward.\"\n\t\t\n\t\tA pink wisp jumps out of the book and starts to fly around you in circles. After a couple of moments, the wisp rushes into your head.\n\t\t\n\t\tYou hold onto your head. Images start flashing in your mind. They are vague, and hundreds of them seem to be happening every second. You see beasts of myth. Gargantuan dragons, colossal giants, a phoenix rising from a pile of ash. You see the visage of a liche, and the undead army of a necromancer. \n\t\t\n\t\tYou hold onto your head and scream out. The vivid images start to subside as you take quick breaths.\n\t\t\n\t\t*set pyromancy 0\n\t\t*set hydrosophy 0\n\t\t*set summoning 0\n\t\t*set theurgy 0\n\t\t*set illusion 15\n\t\t*set void 20\n\t\t*goto first_spirit\n\t\t\n\t#Choose a spirit of nature.\n\t\t(gained Theurgy) (lost Pyromancy) (lost Hydrosophy) (lost Summoning) (lost Illusion)\n\t\t\n\t\t\"This one,\" you say. You point to the spirit of nature.\n\t\t\n\t\t\"Interesting choice,\" Solas says. \"The power of nature will start coursing through your veins as the primary source of your power from this day onward.\"\n\t\t\n\t\tA green wisp jumps out of the book and starts to fly around you in circles. After a couple of moments, the wisp rushes into your head.\n\t\t\n\t\tYou hold onto your head as images start flashing in your mind. You can see the vivid ley lines of the earth, the roots and channels that nature takes. You can see earthquakes with seismic powers so strong they can topple kingdoms. You spot trees the size of mountains, and even trees that are sentient, able to walk around in harmony with birds perched upon their branches. \n\t\t\n\t\tYou scream and fall back into the sofa. You take quick breaths as the visions fade.\n\t\t\n\t\t*set pyromancy 0\n\t\t*set hydrosophy 0\n\t\t*set summoning 0\n\t\t*set theurgy 15\n\t\t*set illusion 0\n\t\t*set void 20\n\t\t*goto first_spirit\n\t\n\t#Choose a spirit of summoning.\n\t\t(gained Summoning) (lost Pyromancy) (lost Hydrosophy) (lost Theurgy) (lost Illusion)\n\t\t\n\t\t\"This one,\" you say. You point to the spirit of summoning.\n\t\t\n\t\t\"Interesting choice,\" Solas says. \"The power of summoning will start coursing through your veins as the primary source of your power from this day onward.\"\n\t\t\n\t\tA brown wisp jumps out of the book and starts to fly around you in circles. After a couple of moments, the wisp rushes into your head.\n\t\t\n\t\tYou hold onto your head in agony. Hundreds of images start flashing in your mind. You can see multiple different creatures, from trolls to griffins and dragon.You see a unicorn, a three headed cerberus and  a cyclops all in combat with one another, causing carnage to the surrounding wilderness.\n\t\t\n\t\tYou scream and fall back into the sofa. You take deep breaths as the visions fade. \n\t\t\n\t\t*set pyromancy 0\n\t\t*set hydrosophy 0\n\t\t*set summoning 15\n\t\t*set theurgy 0\n\t\t*set illusion 0\n\t\t*set void 20\n\t\t*goto first_spirit\n\t\n\t\n*label first_spirit\n\n\"Drink this,\" Solas says. He hands you another cup of tea. \n\nYou take the cup. It feels heavy in your hand, and your whole body is weakened and numb. A gentle aroma of lemon comes out of the cup, filled with a jasmine undertone. You take a sip. The pain in your mind is soothed. \n\n\"What was that?\" you ask. \"Those images, the visions? They felt so real. So vivid. Like I was there as it was happening.\"\n\nSolas takes the cup from you after you finish drinking it all. \"That was history. Images of the past. I gave you a primordial spirit, the most basic level of a spirit. It doesn't have its own personality, its own calling or quest that you must complete to gain its trust. This spirit is simply the essence of the wheel.\"\n\n\"Thank you,\" you say. You can feel this new power coursing through you. It is strong and electric.\n\n\"Don't thank me, it is only right that I help one of my kin. With the spirit you've just taken, your connection to the other realms of magic have been temporarily cut off. Only the element of the spirit remains for now. In the future you'll be able to rekindle that connection you had to all of the planes of magic,\" Solas says. He yawns. \"This must be a lot for you to take in. But we have many things to get done right now.\"\n\n\"What do you mean?\"\n\n\"Bami will aid you.\" He then talks into the watch on his left hand and calls her name. A couple minutes later the woman walks into the room.\n\nBami seems to have regained her energy, as she beams with a smile upon entering the room. \"So, which spirit did you choose?\"\n\n*choice\n\n\t*selectable_if (illusion>5) #\"A spirit of illusion.\"\n\t\t\"A spirit of illusion,\" you respond.\n\n\t\t\"Illusions? Interesting, I don't think I would have picked you for that. I thought you'd be more into pyromancy. You seem like that type of person to me,\" she says.\n\n\t\t*goto first_spirit1\n\n\n\t*selectable_if (theurgy>5) #\"A spirit of nature.\"\n\t\t\"A spirit of nature,\" you respond.\n\n\t\t\"Theurgy? Interesting, I don't think I would have picked you for that. I thought you'd be more into pyromancy. You seem like that type of person to me,\" she says.\n\n\t\t*goto first_spirit1\n\n\n\t*selectable_if (summoning>5) #\"A spirit of summoning.\"\n\t\t\"A spirit of summoning,\" you respond.\n\n\t\t\"Summoning? Interesting, I don't think I would have picked you for that. I thought you'd be more into pyromancy. You seem like that type of person to me,\" she says.\n\n\t\t*goto first_spirit1\n\n\n\t*selectable_if (pyromancy>5) #\"A spirit of flames.\"\n\t\t\"A spirit of flames,\" you respond.\n\n\t\t\"Pyromancy? Now  that's exactly the kind of choice I thought you'd be taking. Congratulations,\" she says.\n\n\t\t*goto first_spirit1\n\n\n\t*selectable_if (hydrosophy>5) #\"A spirit of water.\"\n\t\t\"A spirit of water,\" you respond.\n\n\t\t\"Hydrosophy? Interesting, I don't think I would have picked you for that. I thought you'd be more into pyromancy. You seem like that type of person to me,\" she says.\n\n\t\t*goto first_spirit1\n\n\n*label first_spirit1\n\"So that's what you think of me? But why? I'm not hot headed or anything like that,\" you respond. \n\nBami shrugs. \"Just my intuition, it's not always right. Anyway, let's get going.\"\n\nYou make your way out of the temple with Bami. She gives you a thorough tour of Val Sola. Along the way you stop and chat with many of the Voidwoken, and you start to realize that these are all just normal people, besides the fact that within every single on there lives at least one spirit, if not more. The city is bustling and peaceful, and you notice that you feel safe within the confines of the walls of Val Sola. \n\nYou are taken to the most important locations within the city. The library, the temples, the training grounds, the merchant shops and the taverns.\n\nBefore Bami takes you to your new home, you ask to go and visit which area once again? It seems to have left a deep impression within you.\n\n*choice\n\t#You go to the library.\n\t\t(gained Intelligence)\n\t\t\n\t\tYou ask to go and visit the library again. The building is relatively small compared to the library found at your former academy. However, once you get inside, you realize that this library goes deep underground. \n\t\t\n\t\tYou take a ponder around of the books available, and make a mental note for the ones that you wish to read.\n\t\t\n\t\tOnce you're done, Bami leads you to where you will be staying.\n\t\t\n\t\t*set intelligence +5\n\t\t*goto Home_Solas1\n\t\t\n\t#You go to the temples.\n\t\t(gained Observation)\n\t\t\n\t\tYou ask to go and have a look around the multiple temples in Val Sola. There are at least five unique temples that you've noticed, each related to a different worshipped entity.\n\t\t\n\t\tAs you explore the different temples, you start to sense some sort of divine energy that is different to arcana. You can't quite pinpoint what this is, but you make a mental note to remember to check this out in more depth in the future.\n\t\t\n\t\tOnce you're done, Bami leads you to where you will be staying.\n\t\t\n\t\t*set observation +5\n\t\t*goto Home_Solas1\n\t\t\n\t#You go to the training grounds.\n\t\t(gained Dexterity)\n\t\t\n\t\tYou ask to go and have a look around the training grounds. When you get there, you can hear the sounds of battle. Swords clinging against each other fills the air. You also witness battles being held completely with magic, and stray fireballs fly into the air before fizzling into nothing as they hit the surrounding translucent barrier.\n\t\t\n\t\tAs you observe the fights happening on the training grounds, you feel like your tactical awareness is increasing. You can't pinpoint how, but you start to understand the motivations and reasoning behind the moves being made in combat.\n\t\t\n\t\tOnce you're done, Bami leads you to where you will be staying.\n\t\t\n\t\t*set dexterity +5\n\t\t*goto Home_Solas1\n\t#You go to the merchant shops.\n\t\t(gained Strength)\n\t\t\n\t\tYou ask to go and have a quick look around the merchant shops. This is situated toward the centre of Val Sola. There are dozens of stalls set up on the pavement, and multiple stores dotted around. You browse the wares that are available, and make a mental note of what things would be useful for you in the future and their price points. You are even given a potion for free from a merchant, which you immediately drink. \n\t\t\n\t\tYou feel your strength rising, and your muscles feel slightly bigger, even though they don't look like they've changed.\n\t\t\n\t\tOnce you're done, Bami leads you to where you will be staying.\n\t\t\n\t\t*set strength +5\n\t\t*goto Home_Solas1\n\t#You go to the taverns.\n\t\t(gained Social)\n\t\t\n\t\tYou ask to go and have a quick look around the taverns in the city. You see that there are at least a dozen taverns, each with a different name and giving off  unique vibes. \n\t\t\n\t\tYou enter a couple of the taverns and quickly find yourself conversing with some of the patrons, and even drink a little bit before being dragged out by Bami.\n\t\t\n\t\tBami then leads you to where you will be staying.\n\t\t\n\t\t*set social +5\n\t\t*goto Home_Solas1\n\t\t\n\n\n*label Home_Solas1\n*page_break\n\"We're here,\" Bami says.\n\nYou find yourself stood by a patch of land that is detached from the hustle and bustle of the inner city of Val Sola. If it wasn't for the fact that you could see the city walls in the distance, you'd think you were in the middle of a farmyard. \n\nThe grass that surrounds the cottage in front of you is a healthy, vibrant green. There are three stories of the cottage, and you can sense two unique mana signatures from the first two floors. \n\n\"Am I living with other people?\" you ask. \n\n\"Of course,\" Bami responds. \"What, did you think you'd just get your own place? Pfft.\" \n\nThe woman laughs. She looks at you and notices your expression. \"Oh, my bad. Let me explain, we've put the three of you in the same house since you are the three newest recruits of ours. Get to know your two house mates and we'll begin with working tomorrow.\"\n\n*fake_choice\n\t#Complain\t\n\t\t\"Tomorrow? Already? Don't I get a couple of days rest to let all of this sink in?\"\n\t#Question\n\t\t\"Why is it so urgent? What are we fighting against?\"\n\nBami shakes her head. \"There's a lot going on in the world right now that you don't know of. We don't have the time or luxury to just let you relax. There's a war we have to win, at any cost.\"\n\nBami opens the door to the cottage and shouts, \"I've arrived my sweet tulips, with a present.\"\n\n\"It'd be nice if you knocked for once,\" a male voice calls. Despite the high pitch of the voice, you are able to tell that this is a boy.\n\n\"Stop yapping about and get over here Demeter,\" Bami shouts. \n\nAn elf comes into your sight. He's shorter than Solas, and has a much darker skin tone. His ears aren't as long and pointed as those of the elves you've seen in the city. His skin is greyish brown, and he looks like he's in his mid to late teens.\n\n\"Oh, I didn't realize we had company,\" Demeter says. \"I'd apologize about my outburst if it wasn't for the fact I'm not in the wrong.\" He glares at Bami and then takes a breath. He stretches his hand out. \"I'm Demeter.\"\n\n\"${name},\" you respond and shake the elf's hand.\n\n\"Interesting, you don't seem scared of me,\" Demeter says whilst looking at you with a tilted head.\n\n*fake_choice\n\n\t#\"Uhm, why exactly am I supposed to be scared of you?\"\n\t\tYou scratch your neck. \"Uhm, why exactly am I supposed to be scared of you?\"\n\t#\"I mean you look as scary as a child eating candy.\"\n\t\t\"I mean you look as scary as a child eating candy.\"\n\t#\"You got me, I'm so scared that I can't move.\"\n\t\t\"You got me, I'm so scared that I can't move. I'm shaking in my boots right now.\"\n\t\t\nDemeter bursts into laughter. \"I love ${him} Bami, where in the heavens did you find ${him}?\"\n\n\"Ignore him ${name}, he's a bit of a weird one at times. Dark elves aren't known to being, quote on quote, normal,\" Bami says.\n\n\"Dark elves?\" You raise your eyebrows. \"You're a dark elf? What does that mean? I didn't know that there is such a thing. How are you different to regular elves?\"\n\n\"And that explains everything,\" Demeter says. \"So you have no clue what I am? You haven't heard the bedtime stories that your human kind have spread?\"\n\n\"Alright alright enough with the damn history lesson,\" Bami says. She pushes the boy away. \"Where are you Mbali? Come on, don't be shy we are adding a new member to the team.\"\n\nYou hear footsteps coming down from a nearby staircase. As you look to your right, you lock eyes with a short, dark-skinned girl. She's a head shorter than you and has her white hair braided all the way down to her hips. She looks up at you with her big eyes which glow a light purple. \n\n\"Nice to meet you,\" Mbali says with a warm smile. \"Don't mind Demeter, he's just a bit twisted. You'll get used to it.\"\n\nYou laugh awkwardly and look to Demeter who has already started walking away.\n\n\"Get your ass back over here,\" Bami shouts. She grabs the boy by the collar and swings him across the hallway. \"Did I say I was done with you? You rude little…\" \n\nBami catches your gaze and then lets go of Demeter. \"Oopsie. Don't mind me.\"\n\n\"So what did you want to talk to us about Bami?\" Mbali asks. \n\n\"Let's go and get comfortable,\" Bami responds. \"Come ${name}, follow me inside we'll go sit in the living room.\"\n\nBami takes you into the building and soon you find yourself in a rather cozy living room. A fireplace is to the far end, keeping the inside warm despite the raging wind from outside.\n\n*fake_choice\n\t#Sit next to Bami\n\t\tYou walk over to a seat next to Bami. \n\t#Sit next to Demeter\n\t\tYou walk over to a seat next to Demeter.\n\t#Sit next to Mbali\n\t\tYou walk over to a seat next to Mbali.\n\n\"Here, I made some coffee,\" Mbali says. She then proceeds to pour you all a cup. You take a sip. It's rather mild and bitter.\n\nBami blows at her steaming coffee. She takes a sip and then say, \"I wanted to talk to you about our next mission. We leave tomorrow morning.\"\n\nMbali frowns. \"Wait, but ${name} hasn't even been here for a day. Don't you think it's reckless to throw ${him} into the thick of it without adequate training or time to process all of this?\"\n\nBami grins. \"Don't worry. ${he}'s got what is needed, trust me on that. And we don't have the luxury of doodling around right now. These are very important missions that we are carrying out, for the sake of the Voidwoken.\"\n\nDemeter cracks his knuckles.\n\n\"Oi, stop it with that irritating habit,\" Mbali shouts. \"I've already told you a thousand times.\"\n\nThe boy shrugs. \"Anyway, where are we going? Who are we killing this time?\" He rubs his hands together and grins. \"Tell me they're goblins. I love squashing those little twerps.\"\n\n\"Killing?\" You look wide eyed at Demeter and then at Bami.\n\n\"We're not killing anybody this time Demeter,\" Bami responds. \"Well, I hope.\"\n\nDemeter groans. \"Oh seriously, that's just the worst Bami.\"\n\nBami slaps Demeter's forehead. \"We're going to Pleiades. There's a chance there is a relic hidden about. We're being sent to make sure nobody gets their hands on it, if it really is there.\"\n\n\"So the information isn't too credible?\" Demeter asks. \"I mean, given that you're bringing a newbie along, I suppose we aren't sure that the relic even exists?\"\n\n\"Precisely,\" Bami says. \"Nevertheless, we are short-handed and need to verify this for ourselves. Hence we're taking ${name} with us so soon after getting here.\"\n\n*fake_choice\n\t#\"Val Sola doesn't seem short-handed to me.\"\n\t\t\"Val Sola doesn't seem short-handed to me. There's a lot of people here.\"\n\t\t\n\t\tBami nods. \"You're not wrong, but not everyone has the same talent as you. You're capable of housing an advanced spirit within yourself, something not every Voidwoken can do.\"\n\t#\"I'm glad that I can help.\"\n\t\t\"I'm glad that I can help, in whatever way possible.\"\n\t\t\n\t\tBami smiles. \"Good, we're going to make use of you, that's for sure.\"\n\nAfter finishing the conversation, you are led to the top floor of the cottage. You find that your floor is relatively spacious. You have your own bedroom with a king sized bed, your own bathroom and your own kitchen as well. \n\nOnce you hop into bed, it doesn't take long for you to fall asleep.\n\n*page_break The Next Morning\n\nYou wake up to the sound of blackbirds singing their chorus to the dawn of a new day. You get yourself ready very quickly, satisfied with how refined every part of your home is, including the shower which was majestic to use.\n\nYou make your way down the flight of stairs. As you reach the bottom of the stairs, you spot both Demeter and Mbali. \n\n*fake_choice\n\t\n\t#\"Good morning.\"\n\t\t\"Good morning,\" you say. \n\t\t\n\t\t\"Good morning to you too ${name},\" Mbali responds. \"Did you sleep well?\"\n\t\t\n\t\tYou nod. \"Like a baby, to be perfectly honest with you.\"\n\t\t\n\t\tDemeter laughs. \"And you look just like one too.\"\n\t\t\n\t\tMbali rolls her eyes. \"Funny one Demeter. Don't worry ${name}, you'll learn to ignore him really quickly.\"\n\t\t\n\t#\"I hate my life.\"\n\t\t(Demeter approves) \n\t\t\"I hate my life,\" you say. \n\t\t\n\t\t\"That's the spirit,\" Demeter says. \"One must first relish in their hatred of life before they can cherish the beauties of it.\" He pats you on the back. \"Maybe you aren't so bad after all.\"\n\t\t\n\t\tMbali rolls her eyes. \"Ignore him and his weird way of speaking. You'll do better by just blocking out that voice of his. It's served me well so far.\"\n\t\t\n\t\t\"Hmph, I simply live in a higher dimension of enlightenment compared to you,\" Demeter responds.\n\t\t\t\t\n\t\t*set demeter +5\n\t#\"Can I make us some breakfast first?\"\n\t\t(Mbali approves)\n\t\t\n\t\t\"Can I make us some breakfast first?\"\n\t\t\n\t\t\"We'll eat on the way,\" Mbali says. \"Wait, when was the last time you ate?\"\n\t\t\n\t\tYou rub your stomach, which is growling. \"Hmm, it feels like a long time to be honest. I can't really tell though.\"\n\t\t\n\t\t\"Right, give me a sec,\" the girl replies. She rushes up the stairs and after a minute comes back down. She hands you a piece of bread. \"Better than nothing, right?\"\n\t\t\n\t\tYou smile and nod. \"Thank you very much.\" You then devour the bread in one swift motion.\n\t\t*set mbali +5\n\t\t\n\"Knock knock,\" Bami calls from outside. She then opens the front door of the building. \n\nDemeter jumps forward with a flying kick aimed at Bami. The woman disappears before impact and reappears beside you. \"Missed me you moron,\" she says and cackles.\n\nDemeter gets up and brushes the grass off himself. \"You're supposed to knock, and not just say the words you old wench.\"\n\nBami raises her brows and makes a fist. \"Who are you calling an old wench?\" \n\n\"Woah,\" Mbali rushes into the middle of the pair. \"Let's simmer down. Right, we haven't even told ${name} about how to use ${his} new powers. Controlling a spirit is something we should teach ${him}.\"\n\n\"That can wait,\" Bami says. She waves her hands in a circular motion. A purple portal forms outside of the cottage.\n\nYou squint your eyes as you try to process how creating a portal works. You can sense the flow of the mana from Bami, but it seems like a puzzle in creation when she makes the portal.\n\t\t\n\"Neat, right?\" Bami says whilst pointing at her portal. \n\n*fake_choice\n\t#Agree\n\t\t\"Yes, how do you do it?\" you ask.\n\t\t\n\t\tBami grins and then shrugs. \"Can't let out my secrets just yet. I'll let you know there's only two people in all of Val Sola capable of what I'm doing right here.\"\n\t\t\n\t\t\"You're not special you wench,\" Demeter shouts.\n\t\t\n\t#Disagree\n\t\t(Demeter approves) \n\t\t\n\t\t\"Not really,\" you respond. \n\t\t\n\t\tBami rolls her eye. \"If only you knew how special I am to be doing this. There's only two people in all of Val Sola capable of this.\"\n\t\t\n\t\t\"You're not special you wench,\" Demeter shouts.\n\t\t*set demeter +5\n\t\t\nBami sighs. \"Let's get a move on.\"\n\nYou step into the portal.\n\n*page_break\n\nYou find yourself by a seashore. You turn and look around and realize that you must be on an island. Waves crash against the beach, and a great wind ploughs through the expanse. \n\nBami is at the head of the group. She's on her knees and analysing the golden sand. \"We're not the first here,\" she says. She scowls. \"Damn it, we need to get a move on.\"\n\nAs you make your way inland, an open plain appears in front of you. The grass reaches up to your shins. Your ${haircolour} ${hairstyle} flutters about because of the wind.\n\nBami suddenly stops moving.\n\n\"What do you see?\" Demeter asks\n\n\"A battle,\" Bami says. \"Multiple mana signatures… This isn't good, we have to make haste if there truly is a relic here. Especially if this relic is a high grade spirit.\" \n\nAs you get further into the island, you start to sense the mana that Bami was speaking about. There is a large clearing with the grass charred and destroyed and the earth dishevelled. \n\n\"What do you sense ${name}?\" Bami asks.\n\n*fake_choice\n\t#A large skirmish\n\t\t\"A large skirmish,\" you respond. \n\t#A small battle\n\t\t\"A small battle,\" you respond.\n\t\t\nYou close your eyes and visualize the spells that were used. You can sense fireballs and lightning were used quite a bit.\n\n\"I sensed ten people,\" Bami says. \"Only four left, I believe.\"\n\nBami puts her finger on her lips. She points to a stream in the distance. You squint your eyes and are able to make out four arcana signatures.\n\nAs your party moves closer, you're able to see four men each wearing heavy plated armour. They all have a longsword in one hand and a shield in another. \n\n\"Templars.\" Mbali whispers. \"They got here quicker than expected.\"\n\n\"The relic must truly be here,\" Bami replies. \"Come, we have to ambush them.\"\n\n\"I'll charge ahead,\" Demeter says. A dim purple light envelops Demeter. After a couple moments, the light disappears, and the boy is now stood wearing almost identical armour to the templars. He is wielding a long obsidian staff with blades on both of its ends.\n\nBami looks to Mbali. \"You stay back and heal,\" she says. She then looks to you. \"I'm going to watch for now and get involved if you guys need the help. ${name} what do you want to do?\"\n\n\"I have no idea,\" you reply. \"I don't have access to any magic I've learned and only have a spirit now. I haven't even practised with it yet.\"\n\n\"Alright, then just do what you can,\" Bami says. She puts her hand on your shoulder. \"I know this is all abrupt and a lot to take in, but we have no other choice.\"\n\n*page_break\nYou take in a deep breath and calm yourself down. \"Okay, I'll do what I can.\"\n\n\"Good,\" Bami says. \"Demeter, get on with it.\"\n\nDemeter nods. He starts to push his mana through his body, causing a purple mist to form around him. He then runs toward the Templars at an insanely fast speed. \n\n\"Incoming,\" a Templar shouts. He blocks Demeter's staff blade just as it was reaching his neck. \"Ambush! Ambush!\"\n\nThe Templars rush at Demeter. Demeter is able to vault around dexterously and avoid the strikes from the opponents. \n\nDemeter kicks one templar in the groin. The templar falls onto his knees. The dark elf slides his blade into the man's neck, right where there is no armour.\n\n\"Fucker,\" a Templar shouts. He kicks Demeter and slashes at his calf.\n\n\"Ugh,\" Demeter groans. Blood pours out of his leg.\n\nMbali clasps her hands together. A green energy is released from her palms and flies all the way to Demeter. It bathes him in a healing energy, causing the wound on his calf to stop bleeding\n\n\"Come on,\" Bami says. \"Go and take part ${name}, we don't have all day here.\"\n\nYou nod.\n\n*choice\n\n\t*selectable_if (illusion>5) #Use your spirit of illusion.\n\t\tYou close your eyes and focus on your purple arcane core. You can sense that the spirit of illusion that you had absorbed is sitting within your core, waiting patiently for you to make use of it for the first time. \n\n\t\tYou hear what sounds like a whisper from deep within the spirit. You try to move closer to the voice. An image of a pink crow comes to your mind. The crow is surrounded by hundreds of stars in the distance. It opens its eyes and caws. \n\n\t\tYou open your eyes and throw your hands forward. A well of pink energy is pushed out of your body and crashes into the Templars in the distance. \n\n\t\tThe men suddenly stop attacking Demeter and start screaming in fear as they look up at the sky. Their vision has become filled with demons.\n\n\t\t\"Nice work,\" Demeter shouts. In a single sweeping motion he beheads each of the remaining opponents with his bladestaff. \n\n\t\t*goto pleiades \n\n\t*selectable_if (pyromancy>5) #Use your spirit of flames.\n\t\tYou close your eyes and focus on the purple arcane core hidden within you. You can sense the spirit of flames, it sounds as if it were whispering to you but you can't quite make it out. You sense it is waiting patiently for you to come.\n\n\t\tYou move closer to it's whirring voice, trying to make out what it's saying. Suddenly a great phoenix flashes in your mind, it flies around on an open plain and then rushes at you. \n\n\t\tYou open your eyes and throw your hands forward. A well of red energy is pushed out of your body and crashes into the Templars in the distance. The Templars scream as the flames engulf them. \n\n\t\t\"Nice work,\" Demeter shouts. In a single sweeping motion he beheads each of the burning opponents. \n\n\t\t*goto pleiades\n\n\t*selectable_if (theurgy>5) #Use your spirit of nature.\n\t\tYou close your eyes and focus on the purple arcane core hidden within you. You can sense the spirit of nature, it is moving about rapidly, wanting to grab your attention. \n\n\t\tYou move your focus closer to the spirit. Suddenly, a massive treant with thick brown branches, comes into your vision. It reaches out its branches to you. A red fruit blossoms and falls onto you. \n\n\t\tYou open your eyes and throw your hands forward. A well of green energy is pushed out of your body and crashes into the Templars in the distance. Roots and vines have sprouted out of the soil and wrapped around the Templars.\n\n\t\t\"Nice work,\" Demeter shouts. In a single sweeping motion he beheads each of the remaining opponents. \n\n\t\t*goto pleiades\n\n\t*selectable_if (summoning>5) #Use your spirit of summoning.\n\t\tYou close your eyes and focus on the purple arcane core hidden within you. You can sense the spirit of summoning, it is moving about rapidly, wanting to grab your attention. \n\n\t\tYou move your focus closer to the spirit. Suddenly, an image of a three-headed dog comes into your mind. The Cerberus spits out flames from the two side heads and ice from the middle head.\n\n\t\tYou open your eyes and throw your hands forward. A well of brown energy is pushed out of your body and rushes toward the templars in the distance. A Cerberus forms out of the brown cloud of energy, yet it is much smaller than the image you just had. \n\n\t\tThe Cerberus reaches just above the waist from all of the templars. The creature stars spitting flames and ice, causing the templars to fall back and ignore Demeter.\n\n\t\t\"Nice work,\" Demeter shouts. In a single sweeping motion he beheads each of the remaining templars. The Cerberus disappears a moment later.\n\t\t*goto pleiades\n\n\t*selectable_if (hydrosophy>5) #Use your spirit of water.\n\t\tYou close your eyes and focus on the purple arcane core hidden within you. You can sense the spirit of water, it is sitting rather tranquilly within you, but you can sense it wanting to be released. \n\n\t\tYou move your focus closer to the spirit. Suddenly an image of a great Leviathan forms in your mind. The creature is so large that even the depths of the sea seem small compare to it. \n\n\t\tYou open your eyes and throw your hands forward. A well of blue energy shoots out of your body and crashes into the templars in the distance. \n\n\t\tWater starts to seep out of their armor, slowing down their speed significantly. \n\n\t\t\"Nice work,\" Demeter shouts. In a single sweeping motion he beheads each of the remaining templars.\n\t\t*goto pleiades\n\t\n*label pleiades\n*page_break\nDemeter comes rushing back to where the three of you are. \"Are we just gonna leave the bodies there?\" he asks. \n\n\"We have to hide them,\" Bami responds. \"Even though it'll take a bit of time, we have to cover our tracks.\"\n\nYour stomach churns as you look at the headless corpses. \n\nYou rush away and fall onto your knees before vomiting. The hot liquid burns your throat. \n\nMbali rushes to your side and puts her hand on your back. You feel a boost of energy within yourself and the pain from your throat goes away. \n\n\"Thank you,\" you mutter and then get onto your feet. Your nerves are steeled and you are able to control yourself as you look at the corpses. \n*fake_choice\n\t#\"Good riddance.\"\n\t\t(Demeter approves)\n\t\t\n\t\t\"Good riddance,\" you say whilst glaring at the corpses.\n\t\t\n\t\t*set demeter +5\n\t#\"That is disgusting.\"\n\t\t\"That is disgusting,\" you say whilst staring at the corpses.\n\t#\"Do we have to keep killing like this?\"\n\t\t(Mbali approves)\n\t\t\n\t\t\"Do we have to kill like this?\"\n\t\t\n\t\t\"I wish it wasn't like this as well,\" Mbali says.\n\t\t*set mbali +5\n\n\"First time ey?\" Demeter asks. \n\nYou nod. \n\n\"First time's always a bitch.\" Demeter pats you on the back. \"You'll get used to it, don't worry ${name}.\"\n\nThe boy then grabs a corpse and snaps his fingers, engulfing it in flames. He then does the same to the rest of the corpses, creating a bonfire of human flesh and metal.\n\nYou make your way through the plains once again at a slower pace, cautious of any enemies waiting around.\n\nBami takes on a more hands off approach, letting the three of you do all of the fighting and scouting. She explained this is so that you can 'learn as you go'.\n\nYour party comes across four skirmishes against the Templars, but you make easy work of them and feel your connection to your spirit deepening. You are able to use its powers a lot easier.\n\nYou are stood by a great stone henge, about twenty meters tall and a diameter of about fifteen meters.\n\n\"Is this it?\" you ask. \n\nBami furrows her brows and walks closer to the landmark. \"I'm not sure,\" she responds. The woman starts circling the large object, weaving spells every now and then as she carries out her analyses. Her eyes suddenly go completely white. You watch as she closes her eyes and she starts to float out of her body in her void form. \n\n\"What do you call that?\" you ask Mbali. \"Bami said it's a void form.\"\n\n\"Apparition or void form works,\" she responds. \"It's what happens when we tap into the Wheel of Life and enter the world of spirits.\"\n\nYou look up at Bami's Apparition. It's giving off a bright purple light as it floats above. \n\nAfter about a minute Bami comes back into her body. \"I've got it,\" she says. \n\nThe woman makes some signs with her hands and then thrusts her hands forward. The stone henge starts to shake, causing the ground to tremble with such force that you almost fall down.\n\n\"What happened?\" you ask. \n\nA dark blue light surrounds the stone henge. \n\n\"Shit,\" Bami shouts. \n\nAn intense sucking force starts pulling you toward the stone henge which gives off a red light. You try to grab onto something but there is practically nothing in the plains around you.\n\n*choice\n\t\n\t#Shout for help.\n\t\tYou scream at the top of your lungs, trying to get one of your companions' attention. It is only after a moment that you notice that they are all in the same predicament as you, unable to escape the seeming event horizon.\n\t\t\n\t\t\"Try to stay together,\" Bami shouts. \n\t\t\n\t\tDemeter is relatively close to you and is somehow able to get to your side. The boy puts his hand on your shoulder. \"Better like this or we might get separated inside,\" he says. \n\t\t\n\t\tJust as the final words leave his mouth the intensity of the vortex has increased and you are sucked into the red hue of the stone henge. \n\t\t\n\t\t*goto pleiades1\n\t#Use magic.\n\t\tYou connect with the spirit within you and try to push the magic out of your fingertips. Just as you get the feeling that your about to succeed, the ground tremors and you fall onto your face. \n\t\t\n\t\t\"Try to stay together,\" Bami shouts. \n\t\t\n\t\tDemeter is relatively close to you and is somehow able to get to your side. The boy puts his hand on your shoulder. \"Better like this or we might get separated inside,\" he says. \n\t\t\n\t\tJust as the final words leave his mouth the intensity of the vortex has increased and you are sucked into the red hue of the stone henge. \n\t\t\n\t\t*goto pleiades1\n\t\t\n\t#Do nothing.\n\t\tYou make a single misstep and fall to the ground. Once you get up again it is already too late. The vortex's power has increased almost twofold and you are sucked right into the red hue of the stone henge.\n\t\t\n\t\t*goto pleiades1\n\t\t\n\t\t\n*label pleiades1\n*page_break\n\nYou crash into the ground and tumble forward a couple of meters. You hold your hands against your head, protecting it from the fall. You cough out blood and are extremely winded by the fall. \n\n\"You okay?\" Demeter asks. He rushes over to you and helps you onto your feet. \n\n\"T-Thanks,\" you say and then cough out some more blood. You look down at the red substance on your palms. \n\n\"Drink this,\" Demeter says. He hands you a small red vial and uncorks it. \n\n\"What is this?\" You stare with squinted eyes at the vial.\n\n\"A healing potion, it'll help with any nasty internal bleeding and that sort of stuff,\" Demeter responds. \"Now drink it quickly, we don't have time. We need to go and find Bami and Mbali.\"\n\nYou nod and chug down the contents of the vial. It is bitter sweet, yet almost immediately you feel your insides being mended, as a warmth radiates through your body. \n\nYour vision improves and you are able to see your surroundings more clearly. You're currently in a dimly lit cave, with torches attached to either side at intervals of about ten meters.\n\n\"Where do we go?\" you ask.\n\n\"Anywhere,\" Demeter responds. \"What do you think?\"\n\n*fake_choice\n\t#Forward\n\t\t\"Let's move forward.\"\n\t#Backward\n\t\t\"Let's move backward.\"\n\n\"Alright,\" Demeter says and then moves in that direction.\n\nYou follow the dark elf through the dimly lit caverns. There are multiple pathways that are connected in a maze, as you are constantly having to decide which cavern to follow with the constant splitting of directions.\n\nAfter moving through to the fifth cavern, Demeter suddenly stops moving and raises his hand up. \n\nYou follow suit and stop moving. You hear a low pitched growling but can't pinpoint where it's coming from. \n\nWith a loud thud the ground behind you is destroyed and a skeletal hand grasps onto your ankle. \n\nYou move without thinking and start to push mana into your hands.\n*fake_choice\n\t*selectable_if (illusion>5) #Cast Illusion Magic\n\t\tA pink blast of energy escapes your hands and a lifelike image of yourself is created a couple meters ahead of you. The skeletal hand lets go of your ankle and jumps out of the ground toward the illusive image.\n\n\t\tThe creature looks like a human skeleton, wearing a helmet and with a sword sheathed to its side. \n\n\t\t\"Undead filth,\" Demeter shouts. He runs at the skeleton and slashes it in half. He then stamps on it's skull until it has been turned into dust.\n\n\t*selectable_if (pyromancy>5) #Cast Pyromancy\n\t\tA red ball of energy escapes your hands, turning into a fireball as it rushes at the skeleton beneath you. You are sent tumbling back by the impact of your spell.\n\n\t\tThe skeleton has let go of your ankle and is now standing ominously in front of you, missing a whole hand and leg.\n\n\t\t\"Undead filth,\" Demeter shouts. He runs at the skeleton and slashes it in half. He then stamps on it's skull until it has been turned into dust.\n\t\t\n\t*selectable_if (hydrosophy>5) #Cast Hydrosophy\n\t\tA blue blast of energy escapes your hands. Your vision suddenly goes blurry and you turn into a stream of water that is moving in the opposite direction of the skeletal hand.\n\t\t\n\t\tYou hold onto your stomach as you return to being your physical form, the spell having felt like a great wave of sea sickness.\n\t\t\n\t\tThe skeleton has now come out of the ground and is stood staring intently at you and Demeter with its ruby red eyes. It has the same helmet on that the other Templars you've previously defeated wore, and a sword sheathed to its side.\n\t\t\n\t\t\"Undead filth,\" Demeter shouts. He runs at the skeleton and slashes it in half before it can react. He then stamps on it's skull until it has been turned into dust.\n\t*selectable_if (theurgy>5) #Cast Theurgy\n\t\tA green blast of energy escapes your hands, causing roots and vines to latch onto the skeletal hand and allowing you to free yourself from its grasp. The vines uproot the creature, revealing a humanoid skeleton with ruby red eyes that is wearing a Templar helmet and holding a longsword in its left hand. \n\n\t\t\"Undead filth,\" Demeter shouts. He rushes at the skeleton and slashes it in half. He then stamps on it's skull until it has been turned into dust.\n\n\t*selectable_if (summoning>5) #Cast Cerberus\n\t\tA brown blast of energy escapes your hands and crashes into the nearby ground. The force of the spell causes you to fall back. You look at your ankle and see the skeletal hand is still latched onto you. In the distance you see an undead humanoid skeleton with ruby eyes, wearing the same helmets the Templars from before did.\n\n\t\t\"Undead filth,\" Demeter shouts. He rushes at the skeleton and slashes it in half. He then stamps on it's skull until it has been turned into dust.\n\t\n*page_break\n\"What was that?\" you exclaim. \"Was that just a living skeleton?\"\n\n\"What did it look like to you? Of course that was a skeleton.\" Demeter sighs. \"Filthy undead is what we're up against. We need to find the others quickly because this could turn sour really soon.\"\n\nThe two of you quicken your pace as you make your way through the caverns. Steadily these caverns grow bigger and bigger, and they are no longer empty but you can spot statues every now and then. You don't have the time to observe them, but they seem ancient to you. As you move through the caverns the floor that was previously earth is now turning into cement which has taken on an orange colour. \n\nYou make your way to the largest room yet. There are four doors that lead out of the room. \n\n\"Which door?\" you ask. \n\nDemeter shrugs. \"I'm not sure… I've been trying to contact the other two but our communication method is being jammed. Damn it.\"\n\nYou take a look around. There are a couple of silver chests laying around. There are piles of gold and trinkets all over the room. \n*fake_choice\n\t#Choose the first door.\n\t\t\n\t#Choose the second door.\n\t\t\n\t#Choose the third door.\n\t\t\n\t#Choose the fourth door.\n\t\t\n\t#Grab some treasure\n\t\t*goto dead\n\t\t\n\"Let's go to this one,\" you say as you point to the door. \n\n\"Sure, not like it really matters at this point,\" Demeter responds. \n\nYou go to the door and open it. Cold air rushes out of the corridor and a rotting stench permeates from it. You instantly close the door and take a step back. \n\n\"Yea,\" Demeter says. \"Not that one. I don't like the look of that one.\"\n\nThe boy then goes over to a different door and opens it. \"This one is better, I think I can sense Bami and Mbali in the distance.\"\n\nThe two of your rush through the new corridor.\n\nCLING\n\n\"DUCK ${name}.\"\n\nYou move a split second too late and are knocked to the ground by the impact of an arrow. You grit your teeth as your right shoulder flares up in pain. \n\n\"Shit, are you okay?\" Demeter asks. He helps you onto your feet and then stares at the arrow. \"Fuck. I think it's poisoned.\"\n\nBlood is pouring out of your shoulder.\n\n\"Okay, hold still, I'm going to pull it out on three, okay?\"\n\nYou nod and close your eyes before taking a deep breath. \n\n\"One.\"\n\n\"Two.\"\n\nDemeter pulls the arrow out to your surprise. You scream.\n\n\"What the hell?\"\n\nDemeter ignores you and starts to wrap some bandages around your shoulder. \"We need to get to Mbali quickly. She'll be able to help you.\"\n\nYou stumble along through the corridor, helped by Demeter as he almost drags you onward. Your mind is spinning and your body doesn't want to listen to your commands. Sweat trickles down your forehead and it feels as if you are having both a migraine and a fever at the same time. \n\n\"Hang on,\" Demeter says. \"I can sense them, they are really close.\"\n\nYou cough. \"O-Okay, I'm trying.\"\n\nYou lose track of time. The surroundings seem to be getting more and more extravagant, and the cave system seems more like an underground city at this point. However this city is almost completely deserted, its former glory having been replaced with the necrotic energy of the undead lurking about in the shadows. \n\n\"Finally, there they are,\" Demeter says, excitement laced in his voice. \"Mbali, Bami, we need help.\"\n\nYou look up and spot the two companions you'd lost on the way. They sprint over to the two of you. \n\n\"What happened?\" Bami asks. \n\n\"Poisoned arrow, a trap,\" Demeter responds. \"Mbali, can you help?\"\n\n\"Let me see what we're dealing with,\" the girl replies. She closes her eyes and puts her hands on your shoulder. \"Just regular poison, give me a moment.\"\n\nA wave of energy flows from her hands to the open wound. The negative symptoms you had almost immediately dissipate and you're able to stand up straight by yourself.\n\n\"Thank you Mbali,\" you say.\n\nThe girl smiles. \"Don't worry about it.\"\n\nThe floor starts to shake.\n\n*page_break\n\nSkeletons rush out of the ground and circle your party. You count that at least a dozen skeletons have surrounded you, and more are approaching from the distance as you speak. \n\nThe four of you stand with your backs facing each other, making sure there isn't a single area left to be flanked. \n\n\"Let's get out of here,\" Demeter shouts. He raises his weapon and dashes forward, slicing a skeleton in half and knocking another over. \n\n*fake_choice\n\t#Cast magic from a distance.\n\t\tYou access the spirit housed within yourself. You close your eyes and focus on drawing from the fountain of its power.\n\t\t\n\t\t*if (illusion>5)\n\t\t\tYou push out a wave of pink energy, causing four identical clones, one for you and one for each of your party members to appear behind the skeletons. The skeletons are distracted and turn to face the illusions. \n\t\t\t\n\t\t\tBami makes use of this and spews out flames from her palms, engulfing at least half of the skeletons. Those caught in the flames quickly turn to ash.\n\t\t\t\n\n\t\t*if (pyromancy>5)\n\t\t\tYour hands start to fill with flames. You are able to shape the flames into balls and start throwing them at the skeletons you are facing. The creatures rattle as they are blasted away by the impact of the fireballs.\n\t\t\t\n\t\t\t\"Burn, burn it all!\" Bami shouts. She stretches her hands out and flames shoot out of her palms, engulfing at least half of the skeletons. Those caught in the flames quickly turn to ash.\n\t\t\t\n\n\t\t*if (theurgy>5)\n\t\t\tYou punch your palm into the ground. Roots and vines shoot out and race towards the skeletons and grasp them in a tightly. The vines pulse green and the skeleton's caught by them have their energy sucked out of them. After a couple moments they stop moving all together before falling to the ground into a pile of bones.\n\t\t\t\n\t\t\t\"Good stuff,\" Bami shouts. She stretches her hands out and flames shoot out of her palms, engulfing those you'd caught in your vines and a couple others. Those caught in the flames quickly turn to ash.\n\t\t\t\n\n\t\t*if (summoning>5)\n\t\t\tYou clasp your hands together. A brown ball of energy shoots out at the ground next to a skeleton. Your Cerberus bursts into existence and jumps at the skeleton. Two of its heads spew out flames at the nearby skeletons.\n\t\t\t\n\t\t\t\"Burn, burn it all!\" Bami shouts. She stretches her hands out and flames shoot out of her palms, engulfing at least half of the skeletons. Those caught in the flames quickly turn to ash.\n\t\t\t\n\t\t\t\n\t\t*if (hydrosophy>5)\n\t\t\tYou push out a wave of energy toward your hand. A torrent of water bursts out from underneath a group of the skeletons, flinging them into the air. Their bones rattle as they fall to the ground.\n\t\t\t\n\t\t\t\"Good stuff,\" Bami shouts. She stretches out her hands and flames shoot out of her palms, engulfing at least half of the skeletons. Those caught in the flames quickly turn to ash.\n\t\t\t\n\t\t\n\t#Run into melee range\n\t\tYou find a sword dropped by one of the skeletons and pick it up. You then follow Demeter, providing backup for him as he decimates the opponents.\n\t\t\n\t\tBones rattle as Demeter slashes his bladestaff at the undead creatures.\n\t\t\n\t\tYou turn around and find Bami shooting flames out of her palms, engulfing at least half of the skeletons and burning them to ash.\n\t\t\nYou run through the cave, along with your three companions, in the hopes of finding an area you can rest at for a little while. \n\nIt doesn't take long for you to reach a suitable area. You pant after you stop running. \"What have you dragged me into Bami.\" You frown and glare at the woman. \"My first day. My freaking first day and you're trying to get me killed.\"\n\nBami bites her lower lip. \"I'm sorry. I didn't know it was going to turn out like this.\"\n\nMbali pats you on the back. \"Don't worry, we're getting out of here one way or another.\"\n\n\"Hopefully not in a body bag,\" Demeter mumbles.\n\nBami smacks the dark elf. \"Demeter!\"\n\n\"Settle down children,\" Bami jumps in. \"We'll take a bit of a rest. Do whatever you want in that time. I'm going to contact Val Sola.\"\n\n*choice\n\t#Meditate\n\t\tYou excuse yourself from Mbali and Demeter and move a couple of steps away. You sit down and cross your legs, just like you'd been taught previously at your academy. \n\t\t\n\t\tYou close your eyes, take in deep breaths and clear your mind to your best ability. You pull at the strands of arcana in the air, replenishing the storage you've rapidly depleted since arriving on this island.\n\t\t\n\t\t*goto pleiades_battle2\n\t\t\n\t#Talk to Demeter\n\t\t(Demeter approves)\n\t\t\n\t\t\"Demeter,\" you call out. \"Is it always like this? This hectic and chaotic?\"\n\t\t\n\t\tThe dark elf laughs. \"Of course it is. That's the beauty in our existence, anything other than chaos would be meaningless.\"\n\t\t\n\t\tYou furrow your brows. \"What do you mean by that?\"\n\t\t\n\t\tMbali coughs. \"Don't listen to what he says. Your mind will be corrupted and before you know it you'll turn into a dark elf too.\"\n\t\t\n\t\tDemeter laughs hysterically whilst holding onto his stomach. \"Listen to her, it's true ${name}.\"\n\t\t\n\t\t*set demeter +5\n\t\t*goto pleiades_battle2\n\t\t\n\t#Talk to Mbali\n\t\t(Mbali approves)\n\t\t\n\t\t\"Mbali,\" you call out. \"Thank you for saving me.\"\n\t\t\n\t\tThe girl smiles warmly. \"Don't worry, it was nothing.\"\n\t\t\n\t\tYou shake your head. \"It wasn't just nothing. I was dumb enough to get poisoned. I could have died if you weren't here.\"\n\t\t\n\t\tDemeter groans. \"Would you stop being such a wet wipe already, we need to focus right now. There could be more enemies coming any moment now.\"\n\t\t*set mbali +5\n\t\t*goto pleiades_battle2\n\t\t\n\t#Take a nap\n\t\tYou find a comfy spot on the rock ground and close your eyes. You try to get as much rest as possible, but there is too much adrenaline circulating your system right now.\n\t\t*goto pleiades_battle2\n\n*label pleiades_battle2\n*page_break\n\nAn hour passes by in a flash. \n\n\"Attention you three,\" Bami says. The woman is frowning.\n\n\"What's wrong?\" you ask. \n\n\"We're going to head back to Val Sola,\" she says. \"I thinks it's too dangerous for us. More templars have been spotted since we arrived. We'll have to concede this relic to them.\" Bami clenches her fists and then punches the cave wall.\n\n\"Don't worry Bami,\" Demeter says. \"We were just a bit unlucky. Our next mission will be better, and hopefully we can get rid of even more of those nasty Templars.\"\n\nBami shapes her hands into multiple different signs and then presses her palms together. A purple portal forms in front of her. \n\n\"Let's go,\" she says.\n\n*page_break Enter the portal\n\nYou reach the other side of the portal. You feel dizzy nauseous. However, it's not as bad as the last time you were teleported by Bami. \n\nAfter a couple moments you regain your bearings and find yourself back in Val Sola. The hustle and bustle of the city is ever present. You make your way to Solas' office along with Bami, Mbali and Demeter. \n\nUpon reaching there, you spot the elf sitting behind his mahogany desk. His eyes have bags under them and he mumbles to himself. \n\nThe elf spots your approach and quickly puts away the pieces of paper he was looking at. \"My apologies,\" he says. He smiles weakly. \"Our information was lacking this time. I'm glad we suffered no losses, that's all that matters.\"\n\nBami grunts. \"Those damned Templar pigs,\" she hisses. \"I'll be sure to wipe them out next time I see them.\" She then storms out of the office. \n\nYou look back at the woman with raised brows. \n\n\"Why is she so angry again?\" you ask. \n\nSolas scratches the back of his neck. \"We all have our own baggage. She simply has a much darker past, I hope you can understand and respect that. Maybe she'll open up to you in the future, and you can always ask if you want to find out, after all.\"\n\n*fake_choice\n\t#Run after Bami\n\t\t*gosub trial_end\n\t\t(Bami approves)\n\t\t\n\t\t\"You know what, I'll do just that,\" you say. You quickly exit the office and make your way through the hallways of the temple in search of Bami. You search for what feels like an eternity before reaching a small, secluded courtyard.\n\t\t\n\t\tThere are dozens of colourful flowers spread about and a wonderful, sweet and calming aroma fills the air. Bami is say by a bench, holding her head in her hands. \n\t\t\n\t\t\"Is everything okay?\" you call out. \n\t\t\n\t\tBami looks up. She wipes away the tears on her face and sniffles. \"What do you want?\"\n\t\t\n\t\t\"Just to check up on you, that's all…\" You notice the woman is giving you a rather blank expression so you quickly add, \"I didn't mean to bother you, I'll just leave if that's better.\"\n\t\t\n\t\tThe woman shakes her head. \"No, stay. Come, sit.\"\n\t\t\n\t\tYou go and take a seat next to Bami. \n\t\t\n\t\t\"Can you just, sit, I'd rather not talk,\" she says. \n\t\t\n\t\tYou smile. \"If that helps, of course.\"\n\n\t#Stay\n\t\t*gosub trial_end\n\t\t\"I guess I'll wait for her to open up to me if she wants to,\" you say. \n\t\t\n\t\tSolas claps his hands. \"On another note, well done you three. Bami told me that you worked together cohesively. That's exactly what I want to see from you. The future is indeed bright.\"\n\n*goto_scene chapter1\n\n\n\n*label dead\nYour focus shifts from the multiple doorways and toward the treasure strewn on the ground. There are multiple chests filled with gold and silver coins, and many trinkets and other valuable artifacts.\n\n\"What are you doing?\" Demeter asks. \n\nYou don't respond. Rather, you can't respond. \n\nDemeter grabs onto your shoulder and says, \"Come on, lets get going.\"\n\nYou growl and shove the dark elf away. You jump onto the hoard of gold. Your mind starts to burn as a terrible frenzy fills you. You roar and try to pocket as many valuables as possible. \n\nAs you look down at your hands you find that your skin and flesh has started to fall off, revealing your pearly white bones. \n\nYou turn to look at Demeter. The dark elf is staring at you with widened eyes. He furrows his brows and then says, \"I'm sorry ${name}.\"\n\nYou raise your hands up as his bladestaff comes flying at you. Your vision clouds as you feel your head separating from the spine.\n\nYou have died. Better luck next time!\n*page_break Death\n*goto undead\n\n*label trial_end\n\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\n*page_break\n*check_purchase adfree\nRemember earlier how we told you that the first seven chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2023-10-12 $4.99 $2.99 purchased\n*abort\n", "startup": "\n*title The Arcanist's Journey\n*author Colin Daumen (Dusk Arcana)\n*scene_list\n\tstartup\n\tfae_academy\n\tfae_academy2\n\tfae_academy3\n\tfae_academy4\n\tdraken_academy\n\tdraken_academy2\n\tsolas1\n\t$ chapter1\n\t$ adventurers1\n\t$ mages1\n\t$ training1\n\t$ chapter2\n\t$ tournament_heart1\n\t$ tournament_heart2\n\t$ templars\n\t$ adventurers2\n\t$ mages2\n\t$ alchemy1\n\t$ templars2\n\t$ ending\n\n*create save_load false\n*create return_to_scene\"\"\n*create return_to_label\"\"\n\n*create gender \"male\"\n*create he \"he\"\n*create him \"him\"\n*create his \"his\"\n*create man \"man\"\n*create sir \"sir\"\n*create mr \"Mr.\"\n*create gentleman \"gentleman\"\n*create boy \"boy\"\n\n*create name \"name\"\n*create surname \"surname\"\n*create fullname \"fullname\"\n\n*create orientation \"yes\"\n\n*create  valentine \"Valentine\"\n*create  boyfriend \"boyfriend\"\n*create  husband \"husband\"\n*create  val_he \"he\"\n*create  val_his \"his\"\n*create  handsome \"handsome\"\n*create  val_man \"man\"\n*create rel_val 50\n\n*create hair \"hair\"\n*create hairlength \"hairlength\"\n*create hairstyle \"hairstyle\"\n*create haircolour \"haircolour\"\n*create body \"body\"\n\n\n*create illusion 5\n*create pyromancy 5\n*create hydrosophy 5\n*create summoning 5\n*create theurgy 5\n*create void 0\n*create health 100\n*create mana 10\n*create gold 5\n*create dexterity 0\n*create strength 0 \n*create intelligence 0\n*create observation 0\n*create social 0\n\n*create sillusion 5\n*create spyromancy 5\n*create shydrosophy 5\n*create ssummoning 5\n*create stheurgy 5\n*create svoid 0\n*create shealth 100\n*create smana 10\n*create sgold 5\n*create sdexterity 0\n*create sstrength 0 \n*create sintelligence 0\n*create sobservation 0\n*create ssocial 0\n\n\n*create mbali 0\n*create demeter 0\n*create bami 0\n*create ploy 0\n\n*create smbali 0\n*create sdemeter 0\n*create sbami 0\n*create sploy 0\n\n*create fae\"\"\n*create draken\"\"\n\n*create met_brandon\"\"\t\n*create met_arthus\"\"\t\n*create met_estelle\"\"\t\n*create met_drakath\"\"\n*create met_yolanda\"\"\n*create met_giselle\"\"\n*create met_solas\"\"\n*create met_brenda\"\"\n*create met_mbali\"\"\n*create met_demeter\"\"\n*create met_bami\"\"\n*create met_ploy\"\"\n*create met_song\"\"\n*create met_elias\"\"\n*create met_lara\"\"\n\n*create training_lesson1\"\"\n\n*create spirit_illusion\"\"\n*create spirit_flames\"\"\n*create spirit_water\"\"\n*create spirit_summoning\"\"\n*create spirit_nature\"\"\n\n*create giselle_dungeon\"\"\n*create brandon_dungeon\"\"\n*create estelle_dungeon\"\"\n*create song_dungeon\"\"\n*create fought_elias\"\"\n*create entered_void\"\"\n*create fight_gate\"\"\n\n*create adventurerE \"\"\n*create adventurerD\"\"\n*create adventurerC\"\"\n*create mageE\"\"\n*create mageD\"\"\n*create mageC\"\"\n\n*create templars2\"\"\n\n*create book_purple\"\"\n*create cursed_amulet\"\"\n\n*create learn_truth\"\"\n*create invisibility\"\"\n*create lesser_fireball\"\"\n*create water_wall\"\"\n*create summon_hawk\"\"\n*create thorn_armour\"\"\n*create create_illusion\"\"\n*create flame_dash\"\"\n*create wall_of_fire\"\"\n*create mirage\"\"\n*create water_cannon\"\"\n*create thorns\"\"\n*create cerberus\"\"\n*create piercing_water\"\"\n*create fire_breath\"\"\n*create water_breath\"\"\n*create minor_heal\"\"\n*create mud\"\"\n\n*if choice_is_omnibus_app\n\t*comment skip description\n\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tMold an orphan's path into elemental mastery, unveiling magic's secrets. Race against approaching foes to conquer the arcane summit. Make friends, cast a great variety of spells, and navigate the hidden truths in this world of magic and might.\n\n\t[i]The Arcanist's Journey[/i] is a 138,000-word interactive fantasy novel by Colin Daumen. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n\tIn this captivating interactive novel, you will step into the shoes of an orphan who, burdened by a challenging past, embarks on a daring journey to forge a better future. Forced to flee from home in search of a brighter destiny, you will delve into the realm of magic, determined to master its arcane mysteries. Your choices will shape not only the protagonist's path to mastery but also the unfolding narrative, as you navigate the trials and tribulations of a world brimming with enchantment and danger. Will you rise above adversity and become the master of your own destiny? The power to weave this compelling tale lies within your hands.\n\n\t• Play as male or female\n\t• Shape your protagonist's destiny through intricate choices\n\t• Choose whether to join the Fae Academy or the Draken Academy, each granting you greater expertise in different fields of magic.\n\t• Unveil the mysteries of elemental magic in a richly detailed world.\n\t• Study from five different schools of magic; Pyromancy, Hydrosophy, Summoning, Theurgy and Illusion.\n\t• Navigate treacherous decisions as enemies draw near\n\t• Engage with a captivating narrative, woven with suspense and intrigue\n\t• Overcome challenges using intellect, wit, or sheer determination\n\t• Be a part of the Alchemical Society, Mage’s Guild or Adventurer’s Guild\n\n\tDive into [i]The Arcanist's Journey[/i], where your decisions carve the way to mastery and survival. Will you rise to the pinnacle of arcane power or succumb to the encroaching darkness? Your adventure awaits!\n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t[i]You can play the first seven chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first seven chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first seven chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2023-10-12 $4.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n*label purchased\n\n*if choice_is_omnibus_app\n\t*page_break\n\t\n*set fae\"false\"\n*set draken \"false\"\n\t\n*set met_brandon \"false\"\n*set met_arthus \"false\"\n*set met_estelle \"false\"\n*set met_drakath \"false\"\n*set met_yolanda \"false\"\n*set training_lesson1 \"false\"\n*set met_giselle \"false\"\n*set met_solas \"false\"\n*set met_brenda \"false\"\n*set met_song \"false\"\n*set met_elias \"false\"\n*set met_lara \"false\"\n*set met_mbali \"false\"\n*set met_demeter \"false\"\n*set met_bami \"false\"\n\n\n*set gender \"Male\"\n\n*set giselle_dungeon \"false\"\n*set brandon_dungeon \"false\"\n*set estelle_dungeon \"false\"\n*set song_dungeon \"false\"\n*set fought_elias \"false\"\n*set entered_void\"false\"\n*set fight_gate \"false\"\n\n*set spirit_illusion \"false\"\n*set spirit_flames \"false\"\n*set spirit_water \"false\"\n*set spirit_summoning \"false\"\n*set spirit_nature \"false\"\n\n\n*set adventurerE \"false\"\n*set adventurerD \"false\"\n*set adventurerC \"false\"\n*set mageE \"false\"\n*set mageD \"false\"\n*set mageC \"false\"\n\n*set templars2\"false\"\n\n*set book_purple\"false\"\n*set cursed_amulet\"false\"\n\n*set learn_truth \"false\"\n*set invisibility \"false\"\n*set lesser_fireball \"false\"\n*set water_wall \"false\"\n*set summon_hawk \"false\"\n*set thorn_armour \"false\"\n*set create_illusion \"false\"\n*set flame_dash \"false\"\n*set wall_of_fire \"false\"\n*set mirage \"false\"\n*set water_cannon \"false\"\n*set thorns \"false\"\n*set cerberus \"false\"\n*set piercing_water \"false\"\n*set fire_breath \"false\"\n*set water_breath \"false\"\n*set minor_heal \"false\"\n*set mud \"false\"\n\n*comment finished\n\n\n*page_break Let us Begin\n\nMoonlight shines down on the patch of field around you. The crackling and buzzing of magic in the air fills you with joy and hope for a new life. Having recently abandoned your home in Raza, this is the new start you have always wished for.\n\nAs the youngest member of your family, you had no prospects. You came from generations of farmers. All of the land your parents had would go to your eldest brother, leaving you with nothing but the burden of having to fend for yourself.\n\nYou look up at the moon and make a fist. [i]Please, if there are any gods listening, please let me get in. I've already suffered enough, please don't make me go through more hardship. I can't take this agony any longer, I just can't.[/i]\n\nYou are surrounded by almost a hundred other children that look around your age. You just turned 16 a couple weeks ago.\n\nStrong winds blow across the field, bringing with it a sweet smell of honey.\n\nYou are stood far behind all of the other children, having yet to make your decision on which school you want to join. There are nine queues, and you are unsure which one you should take.\n\nYou can make out the names for each of the schools as there is a banner with their name just behind each queue. You think about it for a while before whittling down your options to two. The Fae Academy and the Draken Academy. \n\nThe Fae Academy is known for being the greatest of the Nine Great Academies in terms of learning illusion magic, whilst the Draken Academy is known for it's pyromancy and raising elite soldiers.\n\nWhich school do you decide for?\n\n\n*choice\n\t#I follow the queue with the banner for the Fae Academy.\n\t\t*set illusion +10\n\t\t*goto_scene fae_academy\n\n\t#I follow the queue with the banner for the Draken Academy.\n\t\t*set pyromancy +10\n\t\t*goto_scene draken_academy\n\n\t\t\n", "templars": "You rub your eyes and yawn. As you open them, you find yourself tucked comfortably in your bed back in Val Sola. Light flows in from your window and you spot some small birds flying about whilst chirping harmoniously, a quite pleasant sound to the ear. \n\nYou furrow your brows. [i]How the hell am I back here?[/i]\n\nA blue light flashes outward from your chest, and with it a figure starts to form a couple meters away  from you. AI materializes with a smile on her face. \"Obviously because of me,\" she says. \"I brought you all back here, there's nothing left for us back in the Khaeng Kingdom.\"\n\nYou are flustered. \"How ca-\"\n\nAI cuts you off. \"It's simple really. Using your memories it was a piece of cake, hehe.\"\n\n\"My what?\" you shout. \"How the… That's an insane invasion of my privacy.\"\n\nAI rolls her eyes. \"It's not like I chose to do that. That's simply what happens when you merge with a higher level spirit. I become a part of you, and with time you'll become a part of me.\"\n\nYou open your mouth wide. You sigh. \"So, you know I don't want to talk about anything from the past.\"\n\nShe nods. \"For now, I bet you'll warm up to me really soon. Well, sooner than later anyway.\"\n\n\"So what happened to the tournament then?\"\n\n\"Who knows, I don't.\" AI shrugs. \"Well, I know they must have been surprised when my tower disappeared.\"\n\n*label AI_2\n*choice\n\t#Check up on your party\n\t\tYou get out of your bed and have a quick shower. After getting changed you make your way out of your room.\n\t\t\n\t\t\"Where are you going?\" AI asked as you're halfway through the door.\n\t\t\n\t\tYou groan. \"To see my friends. Why, am I not allowed to do that?\"\n\t\t\n\t\t\"I mean you can try, but they aren't here right now.\"\n\t\t\n\t\t\"Wait, seriously? Why not?\"\n\t\t\n\t\tAI shrugs. \"I don't know. You were out of it for almost a week at this point.\"\n\t\t\n\t\t\"Out of it? What are you on about?\" you ask. \n\t\t\n\t\t\"Passed out, sleeping deeply, recovering, a coma.\" AI puts a finger on her chin and furrows her brows. \"Those are all the word-\"\n\t\t\n\t\t\"I get it I get it,\" you jump it.\n\t\t*goto AI_2\n\t#Go for a walk\n\t\tYou make your way out of your home and into the garden. \n\t\t\n\t\tThere is a nice, fresh, flowery smell that lingers on your palette with every breath you take.\n\t\t\n\t\tYou spend about half an hour just idly walking around in your garden. Once it gets a bit boring you decide to venture deeper into the wilderness.\n\t\t\n\t\tThere is a forest not too far away from where you live. You reach it within ten minutes of a gentle jog. The sun is out but there are some clouds covering it partially, making it the perfect temperature to explore.\n\t\t\n\t\tLush green trees fill behind the entrance to the gated forest. There is a statue of a mountain lion in front of the black gate. The gate spreads around the forest as far as the eye can see. \n\t\t\n\t\tOnce you enter the forest, your attention is instantly capture by the sound of some running water.\n\t\t\n\t\t*choice\n\t\t\t#Follow the sound\n\t\t\t\tIt is relatively easy for you to weave your way through the dense forest in search of the water. It becomes louder and louder until you reach a beautiful river. It is a pristine blue and so clear that you can see all of the fishes swimming about.\n\t\t\t\t\n\t\t\t\tYou take in deep breaths of the fresh, air, and try to commit this image to memory. \n\t\t\t\t\n\t\t\t\t[i]I should definitely come back here,[/i]\n\t\t\t\t\n\t\t\t\tAfter spending about an hour by the river you make your way back home.\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto AI_4\n\t\t\t#Ignore the water\n\t\t\t\t[i]I've had enough of these hell forsaken bodies of water.[/i]\n\t\t\t\t\n\t\t\t\tYou decide to venture in the complete opposite direction of what you assume to be a river.\n\t\t\t\t\n\t\t\t\tAs you travel further into the forest, you start to see more of its inhabitants. Large squirrels with thick brown fur zoom past you, their mouths stuffed with nuts or berries. \n\t\t\t\t\n\t\t\t\tDozens of birds fly above. You spot some blue tits, parrots and even hummingbirds.\n\t\t\t\t\n\t\t\t\tYou walk around aimlessly for a while. You reach a hill, which you quickly climb. Once at the top you get an amazing view of the river in the distance. It's water is a pristine blue and you can see the fishes splashing about.\n\t\t\t\t\n\t\t\t\tYou take in a deep breath and relax. \"Guess the river isn't as bad as I thought it'd be. Well, from this far away anyway.\"\n\t\t\t\t\n\t\t\t\tYou enjoy the nature and relax for about an hour before making your way back you.\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto AI_4\n\t#Ask to see AI's tower\n\t\t\"Hey, AI,\" you say.\n\t\t\n\t\t\"No,\" she responds. \n\t\t\n\t\tYou frown. \"What do you mean no? I didn't even ask anything yet.\"\n\t\t\n\t\tAI laughs. She holds onto her stomach.\n\t\t\n\t\t\"What's so funny? Huh? You're so annoying.\"\n\t\t\n\t\tAI rolls her eyes. \"I know exactly what you are going to ask and my answer is no. I can't let you into my tower, my inner world, until you've gotten stronger. It's quite literally impossible as of right now.\"\n\t\t\n\t\t\"What do you mean by impossible?\" you ask.\n\t\t\n\t\t\"Impossible. Definition, something that is unable to occur, exist or be done. In this situation, it means tha-\"\n\n\t\t\"Alright alright,\" you say whilst throwing you hands up. \"Forget I even asked.\"\n\t\t\n\t\t*goto AI_2\n\t\n*label AI_4\nOnce you reach your home, the aroma of roses punches you in the face. You hear Demeter and Ploy talking, there voices quite loud.\n\nYou open the front door and see Demeter, Ploy, Mbali and Bami all in the living room. \n\nPloy sprints over to you and grabs onto you in a tight bear hug. \"You're awake, I was so worried!\" Her voice goes to a quite high pitch. \n\nYou try to free yourself but her grip is strong.\n\nYou yelp. \"Ow, ow, ow, you're hurting me.\"\n\nShe finally unhands you and then punches your shoulder. \"You scared us.\"\n\nBami clears her throat. \"I'm glad that you're all good and well, but we're going to have to cut this reunion short. Since you're already awake let's get going to Solas, he's been waiting for your return.\"\n\nThe woman drags you out of the house, the others following close on your heels. She stops and then turns to them, \"Just ${name},\" she says. \"You won't need to be coming with us.\"\n\n*page_break\n\nYou have made your way to Solas' office, right in the middle of Val Sola. The elf is sat behind his mahogany desk, the dark bags under his eyes ever-present. There is a floating ball of green light a couple feet above the table. A green mist is emitted by the object, and with it a calming mint fragrance fills the room. \n\nSolas is wearing a brown tunic embroidered with some gold. His deep purple eyes stare at you intensely. A smile slowly blooms into existence and the elf stands up. \"${name}, you really are exactly what we've been needing aren't you.\"\n\nThe elf stands up and walks over to you. He looks you up and down with a glimmer in his eyes,\n\n*fake_choice\n\t#\"What? You're creeping me out.\"\n\t#Take a step back\n\t#Stay silent\n\t\t\nSolas clears hi throat. \"So, where is it? The advanced spirit you've contracted with.\"\n\nA blue light escapes from your chest. AI materializes next to the elf. She grins and then says, \"You're shorter than I thought you'd be.\"\n\nSolas frowns.\n\n\"So, what do you want from me? I don't come cheap, let me tell you that.\" AI chuckles. A blue ball of light forms in her palms which she then plays around with. The ball floats from hand to hand.\n\nSolas tilts his head and laughs weakly. \"Right, straight to the point, you're one of those types.\" He rubs his hands together before saying, \"I need your help. We are going to launch an attack on the Templar stronghold in Saeng Meuang. With your help, I'm certain we can eradicate those barbarians in one fell swoop.\"\n\nAI shakes her head. \"Highly unlikely. With the information I have gathered whilst in the Khaeng Kingdom, you're going to need a lot more help than just me.\"\n\nSolas grins. \"Ah, so you're underestimating my prowess. Don't worry about that, we have enough firepower. All that we need is the final piece of the puzzle, and it just so happens that you've walked right through my front door today.\"\n\nAI rubs her chin. Her eyes suddenly spark and a blue beam shoots out. \"Scanning complete,\" she says in a monotonous voice, just like back in the tower when you'd first heard her. \"So you need me to do what? Scramble communication?\"\n\nSolas shakes his head. \"No, I need you to temporarily shut down their infrastructure.\"\n\n\"That's a… Tall task you are asking of here. You know that, right?\"\n\n\"Of course. But it's precisely because of your nature that I know this will be possible. You are a rare type of spirit, even in the advanced category. We should be ready to launch our attack soon.\"\n\n*label questions\n*choice\n\t#Ask about the templar attack\n\t\t\"Can somebody explain to me what's going on? Why do we need to attack the Templars?\"\n\t\t\n\t\t\"Explanations do seem necessary,\" Solas responds. \"I've told you a little bit about it before, but to get into some more detail seems appropriate. The Order of Templars is our natural enemy in every sense of it. Think of it like the relationship between fire and ice. We are on opposite sides of a spectrum, and it is inevitable that one of us has to be destroyed.\"\n\t\t\n\t\tBami smashes her fist into the door. The room shakes. You turn around, half expecting the door to be off it's hinges, but it is still there, not a dent or scratch to it.\n\t\t\n\t\t\"Good thing I reinforced that after your last burst out,\" Solas says.\n\t\t\n\t\tBami clenches her fists. \"Those bastards use us Voidwoken for their sick, depraved, malicious experiments. We're nothing more than animal fodder for them, soulless assholes.\"\n\t\t\n\t\t\"Let's stay calm,\" Solas jumps in. He goes to his desk and grabs a teacup. He pours a warm drink into it and then hands it to Bami.\n\t\t\n\t\t*goto questions\n\t#Ask about the Templar origins\n\t\t\"What even are Templars? You've spoken about them a lot but I still don't understand anything,\" you say.\n\t\t\n\t\t\"Vicious bas-\"\n\t\t\n\t\t\"Bami,\" Solas says. He glares at the woman who quickly turns her head away. \"To be more specific, Templars are individuals who have been rejected by the Wheel of Life. Why or how, I do not know. All I know is that their existence will be terminated permanently once they die in this realm. This is why they experiment on us Voidwoken, they harvest our life force to extend their time here and figure out a way back into the wheel.\"\n\t\t\n\t\tYou gasp. \"Harvest our life force?\"\n\t\t\n\t\t\"Indeed, and it is a rather agonizing process as well. I wouldn't wish it onto my worst enemy… Well, actually, I do wish it upon every Templar out there.\" Solas makes a toothy grin. \n\t\t\n\t\t*goto questions\n\t#\"Why do Templars want spirits?\"\n\t\t\"That's a rather simple question to answer, actually,\" Solas replies. \"Spirits are a powerful weapon, and in and of themselves are already a full arsenal in the hands of anyone with even a little amount of talent. Unfortunately for us, Templars cannot make contracts with spirits unless they possess a Voidwoken's arcane core. As a matter of fact, only Voidwoken can contract with them precisely due to our possession of this core.\"\n\t\t\n\t\tYou gulp hard. \"So… You mean to say that Templars will-\"\n\t\t\n\t\t\"Mercilessly torture us, suck out our life force dry before removing our arcane cores, which has to be done whilst we are still alive and awake.\" Solas grits his teeth and clenches his fists. \"This is why we need to eradicate them. For once and for all. As long as Templars exist, us Voidwoken will always have a massive target on our backs. And hiding doesn't work too well either, unless you are here in Val Sola.\"\n\t\t\n\t\t*goto questions\n\t#Ask about the plan\n\t\t\"What's the plan then? I take it I have no choice but to join in since AI is contracted to me.\"\n\t\t\n\t\tBami roughly pats you on the shoulder. \"See, ${name} gets it.\"\n\t\t\n\t\tYou move away from the woman and gently press against your shoulder as blood flows to it.\n\t\t\n\t\t\"Yes, we'll require your assistance,\" Solas says. \"But think of it this way, you will need to fight Templars one way or another. They aren't the type that just let us Voidwoken live peaceful lives. We are hidden here, but out in the wider world they will find you, sooner rather than later, that is.\"\n\t\t\n\t\tYou take in deep breaths. \"I'm all for it.\"\n\t\t\n\t\t\"Good, but don't fret, there is still some time before we want to put this plan into action. You will have enough time to train.\"\n\t\t\n\t\t*goto home1\n\t\n*label home1\n*page_break\nYou make your way back home alone once you finish your discussion with Solas and Bami. They don't give you an exact time frame, but you guess that you have at least a couple of months time to train before the assault on the Templar Order.\n\n\"So, what did they want from you?\" Demeter asks. He is stood so close to you that you can feel his breath on your neck.\n\n\"Give ${name} some space you animal,\" Ploy says. She pushes the dark elf away and then takes his place, her breath now lingering on your neck. \"And your breath smells Demeter, what the hell did you eat?\"\n\nDemeter grins. He breaths out with his mouth wide open toward Ploy. \"Gaaaarlic.\"\n\nPloy gags and then sends a kick at the dark elf. He ducks underneath.\n\nYou throw your hands up in exasperation and take a couple steps back. \"Can you both just relax? Be more like Mbali, please.\"\n\nMbali nods.\n\n\"Well, hurry up,\" Demeter says. \"Don't just keep us waiting in the da
