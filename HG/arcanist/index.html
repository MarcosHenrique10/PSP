rk like this all day. What happened?\"\n\n*page_break\n\nYou explain the situation, leaving out no details. \n\n\"Did you guys know about this? About the war with the Templars?\" you ask.\n\n\"Of course,\" Demeter responds. \"It's weirder that you hadn't heard about this until now. I guess you were fortunate enough to be brought here before those pests found you.\"\n\n\"Is that so?\" you mutter. You look to your three companions, and want to find out some more information. You decide to ask…\n\n*choice\n\t#Ploy\n\t\t\"What do you know about the Templars, Ploy?\"\n\t\t\n\t\tThe girl opens her mouth and then pauses. She breathes in deeply before weakly saying, \"I don't think I'm ready to talk about my experience.\"\n\t\t\n\t\tYou rub the back of your head. \"Sorry, I'm here if you ever want to talk about it.\"\n\t\t\n\t\tShe smiles. \"Don't worry.\"\n\t\t\n\t\t*goto part1\n\t#Mbali\n\t\t\"What do you know about the Templars, Mbali?\"\n\t\t\n\t\tThe girl shrugs. \"I'm the same as you. Bami found me and brought me here before anything bad could happen. But from the stories I've heard from others… Let's just say they are always gruesome.\"\n\t\t\n\t\t*goto part1\n\t#Demeter\n\t\t\"What do you know about the Templars, Demeter?\"\n\t\t\n\t\tThe dark elf clicks his tongue. \"They slaughtered my whole family trying to find me,\" he says whilst frowning. \n\t\t\n\t\tYour heart drops.\n\t\t\n\t\t\"Don't worry, I have something planned for that bastard if I ever manage to find him,\" Demeter says. \"He took everything from me, so it's only right that I pay him back in full.\"\n\t\t\n\t\t*goto part1\n\t\n*label part1\n*page_break Time Passes By\nYou spend the next few days resting at home and training. Your connection with AI grows stronger as the days go by, and soon her quirks have become a natural part of your life. \n\nYou soon grown bored of your routine, and thus decide it's time to…\n\n*choice\n\t#Go to the Adventurer's Guild\n\t\t*goto_scene adventurers2\n\t#Go to the Alchemical Society\n\t\t*goto_scene alchemy1\n\t#Go to the Mage's Guild\n\t\t*goto_scene mages2\n", "templars2": "A few months go by in a flash. You spend most of your time training for the upcoming attack against the Templars. You spend a lot of time in AI's tower reading and finding information about the Templars. \n\nThere isn't too much that you can find out as AI's resources are limited to the books that were assembled by the Khaeng Kingdom. What you are able to read about isn't much different to what you have already been told by Solas and others.\n\nYou are currently sat in your bedroom. AI is in front of you, looking out of the window.\n\n\"What's wrong?\" you ask. \"You never look so lost in thought.\"\n\nYou observe her, unsure about what is going on in her mind.\n\n[i]Kind of unfair that you live rent free in my mind but I can't do the same to you.[/i]\n\nAI turns around. There are tears welled in her eyes. \n\nYou are taken aback. \"W-Wait, hello? Is everything okay? Aren't you a robotic spirit? You can cry?\"\n\nAI rolls her eyes. \"Are you stupid? You've known me for how long now, and you're trying to tell me you've never seen me get emotional?\"\n\nYou rub your chin. \"Fair enough… Well, what's wrong?\"\n\nAI's demeanour hardens. Her eyes glow a bright blue. \"A calamity is coming.\"\n\n\"What do you mean?\"\n\n\"It is coming and we have no way to stop it. The Templars… They are coming.\"\n\n*goto_scene ending", "tournament_heart1": "*temp injured\n*page_break\nThe rest of the party went by uneventfully, however you were filled with the constant dread brought onto you by the appearance of Captain. \n\nYou stand in the middle of a ballroom with your three companions. You look at each of them, noticing their heavy expressions. \n\nPloy stands with her arms crossed whilst frowning.\n\n\"Come on, lighten up,\" Demeter says. \"Let's just enjoy this while we can.\"\n\nThe girl glares at him. \"Enjoy? You think this is the time to be enjoying?\"\n\nDemeter raises his hands up defensively. \"I'm just saying, getting all pissed off and angry about this won't help us at all. You need to relax.\"\n\n\"Relax? Relax? We haven't even been in this city for a day and we've already been found. And you tell me to relax?\"\n\n*fake_choice\n\t#Stay quiet\n\t\tYou don't say a word as you don't know what you can say at this point. You feel a deep sense of dread by your encounter with Captain.\n\t\t\n\t*selectable_if (mbali>20)\t#Ask Mbali for help\n\t\tYou nudge Mbali and give her a meaningful look. \n\t\t\n\t\tThe girl seems to understand you and quickly interrupts the arguing pair. \"Come on you two, we have better things to think about right now.\"\n\t\t\n\t\tPloy sighs. \"You're right, I'm sorry. I'm supposed to be leading us but I'm losing my temper.\"\n\t\t\n\t*selectable_if (social>14) #Diffuse the tension\n\t\tYou step in between the arguing pair. \"If I didn't know any better I'd think you were having a lovers spat.\"\n\t\t\n\t\t\"No way!\"\n\t\t\n\t\t\"No way!\"\n\t\t\n\t\tYou look at the two and laugh. \"Let's just think about something more important, like what we're going to do once we are brought into the pocket dimension. Brooding about the Templars won't do us any good right now.\"\n\t\t\n\nYou look up at the large golden clock hung to one side of the ballroom. The clock ticks midnight. \n\n\"Teleportation commencing in 5 seconds,\" a robotic voice booms.\n\nYou look around in search of the voice but can't find it.\n\nA bright blue light encompasses your surroundings and your vision starts to fade away. \n\nYou rub your eyes as the effects of the teleportation wears off. You look around and find yourself next to the shoreline of the island. You can't see where the golden sands of the shoreline ends. The sound of waves crashing against the beach clings heavy in the air, and there is a slight salty smell about. You point your gaze further inland and find there to be a dense forest between you and your objective. \n\nFar away there is a gargantuan tower that seems to stand so high that it never ends. You look up but can't fathom where this tower finally stops rising.\n\n*fake_choice\n\t#You marvel at the magical display\n\t\tYou marvel at the level of magic that the Khaeng Kingdom is able to display, as teleporting more than five hundred individuals at once is a feat you cannot even imagine in your wildest dreams. The amount of raw mana needed to achieve that is insane.\n\t#You fear the magical display\n\t\tYou fear the magical display that was just show by the Khaeng Kingdom. To think that they can with such ease teleport more than five hundred individuals at once gives you a deep sense of fear. You are only a tiny fish in a large pond, helpless against true magical prowess.\n\n\"Isn't this a bit much?\" Demeter says. \"This isn't an island, this is way bigger than any island I've ever heard of.\"\n\n\"Indeed,\" Ploy replies. \"By my estimations we are about thirty kilometres away from the tower. If we were to walk there without being attacked and taking no detours, at a steady pace, it'd take us roughly six hours to get there.\"\n\n\"Six hours.\" Mbali looks up at the sky. \"So how long will it take us just to reach it at a reasonable estimate?\"\n\nPloy shrugs. \"I mean, we are going to be attacked by beasts and humans alike. I'd say that a realistic time frame is anywhere from five to seven days if we are fast.\"\n\nYou mouth widens. \"F-Five days? Do we even have that time?\"\n\n\"We shall see, no point in dwelling on it now. From the previous Tournament of Heart, it took two weeks before the winning team completed the contest.\"\n\n\"I have a question,\" Mbali jumps in. \"Say there are only two groups remaining on the island. Given how huge this place is, how can there be a guarantee for the groups to meet?\"\n\n\"It's simple, actually. They have made it so that staying outside of a certain range will have you automatically disqualified. This range will become apparent later on, and we will hear announcements about this. That's how you are forced to fight. You either continue onward or face disqualification.\"\n\n\"I see. That's smart. But I don't know about how easy that is.\" Mbali laughs.\n\n*choice\n\t#\"Let's set up camp.\"\n\t\t\"I don't think that's our move,\" Ploy says.\n\t\t\n\t\t\"Why not?\" you ask.\n\t\t\n\t\t\"We're running on limited time as you already know. Right now the last thing we need to do is set up our base.\"\n\t\t*goto island2\n\t#\"What do we do now?\"\n\t\t*goto island2\n\t#\"Let's get on with it.\"\n\t\t*goto island2\n\t\n*label island2\n\"Here's what we'll do,\" Ploy says. \"We're going to make our way through the forest. Simple as that.\"\n\nDemeter grins. \"I can agree with that wholeheartedly. We'll destroy anything or anyone in our way.\"\n\nWith your simple tactic sorted, you make your way into the dense forest. Demeter walks at the front of the group. He wears armour made out of magic that he's recently learned. A spell known as Wild Armour. This allows him to create a set of armour made out of random properties. Right now, he's conjured a set of heavy metal armour, made out of a black metal. He holds his obsidian staff blade in his right hand. \n\nYou are stood in the middle of the group along with Mbali, whilst Ploy is behind you, guarding your rear. You have yet to see Ploy's magic in action, and you feel your curiosity piqued. As of now, Mbali is the most protected member of your party as she is the main healing source. Demeter acts as a tank up front to absorb incoming enemy attacks.\n\nYou make your way through the forest and suddenly, after fifteen minutes, you feel a large magical presence. \n\nThe trees ahead of you suddenly start to part, creating two distinct paths.\n\n\"Stop,\" Ploy calls and you all cease moving.\n\nYour eyes dart about vigilantly, looking for any opponents. \n\nDemeter sniffs around. He points to the left and says, \"Smells like there's some creatures there.\" He then points to the other path and says, \"I can sense humans along that path though.\"\n*page_break\nHumans on one path and monsters on the other. It seems a battle is inevitable.\n\n\"What do you all think?\" Ploy says. \"We have two clear options. We can decide to fight against others that are part of this tournament, or fight against unknown creatures.\"\n\n\"I say we fight our competitors,\" Demeter says. \"Whittling down their numbers as quickly as possible will be our best choice. Who knows, the group might hinder us in the long run if we don't exterminate them now.\"\n\nMbali jumps in. \"But we don't know how strong they are. I don't feel good fighting against others without having prepared for them or at least scouted a little bit of information.\"\n\nDemeter shrugs. \"Well, we don't know what magical creatures we might face on the other path. I think both are equally dangerous, so the only smart decision is to exterminate our competitors.\"\n\nPloy looks to you. \"What do you say ${name}. I'll leave the final decision to you. Either works for me.\"\n\nYou gulp hard and start to think about what you want to do.\n\n*choice\n\t#Fight the creatures\n\t\t(Mbali Approves)\n\t\t\n\t\t\"I say we take on the monsters,\" you say. \"It might be too risky going up against our competition if we don't know what we're dealing with. I think as of right now, this will be an easier battle for us.\"\n\t\t\n\t\t\"Okay, then it is settled,\" Ploy says. \"Let us make our way.\"\n\t\t\n\t\tYou wander through the path. You sense danger the further you venture in, your whole nervous system is running at its highest capacity, readying you for the battle that is to come.\n\t\t\n\t\tDemeter raises his hand from the front of the formation. You all stop moving. He then points up ahead. There is a group of grey wolves. They each reach about one and a half meters, and their heads look massive, even from the thirty odd meters that you are stood away from them.\n\t\t*set mbali +5\n\t\t*goto fight_wolves\n\n\t\t\t\t\n\t#Fight the humans\n\t\t(Demeter Approves)\n\t\t\n\t\t\"I say we fight the humans,\" you say. \"Demeter is right. Whittling down their numbers now will serve us better in the long run. And who knows, the creatures we find in this forest might be even more dangerous.\"\n\t\t\n\t\t\"Okay then, it is settled,\" Ploy says. \"Let us make our preparations.\"\n\t\t\n\t\tYou discuss strategy with your companions.\n\t\t*set demeter +5\n\t\t*goto fight_humans\n\t\n\t*selectable_if (observation>10) #You spot a third path\n\t\t\"Wait,\" you tell the others. You then point to between the two paths. You notice a lot of arcana is coming through from there, and the longer you stare the clearer the path starts to become.\n\t\t\n\t\t\"What are you looking at?\" Ploy asks.\n\t\t\n\t\t\"There's a third path,\" you say. \"You just need to keep looking straight ahead where I am. It'll open up.\"\n\t\t\n\t\tThe three others do as you ask and they find the third path as well. You quickly make your way along the path.\n\t\t*goto clearing2\n\n*label fight_wolves\n*choice\n\t#Follow Demeter's lead\n\t\t\"Wrap around and attack from behind ${name},\" Demeter says. He shouts loudly enough to grab the wolves' attention, allowing you to circle around and flank the creatures. Demeter runs over to the creatures, his obsidian blade staff in hand and begins to spin around mercilessely slashing at the wolves.\n\t\t\n\t\tYou use this as an opportunity to attack. You unsheathe your two daggers and jump at the nearest wolf, lodging your blades into it's skull. The wolf falls to the ground, lifeless.\n\t\t\n\t\tDemeter slashes his staff blade wildly at the wolves, keeping them at a good distance. The wolves seem cautious and afraid to attack him.\n\n\t\tYou run at the next closest wolf, catching it off guard. You slam your daggers into it's neck, but not before it makes a high pitched whine. The three remaining wolves immediately turn their attention to you. You jump back as one jumps at you.\n\n\t\t\"No you don't,\" Demeter says. He charges forward and slashes at one of the wolves that had turned to face you. It's head is severed from it's body.\n\n\t\tThe remaining two wolves try to run, but you and Demeter are easily able to encircle them and then pick them off.\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage. Blood and gore is splattered all over the forest grass. The corpses of the wolves are mangled and dismembered.\n\t\t*goto clearing1\n\n\t*if (invisibility=\"true\") #Cast Invisibility\n\t\tYou push your mana through your body and look for the nearest wolf. \"Cover me, I'll attack when you charge Demeter.\" you tell your companions before becoming shrouded in darkness. You make your way around the wolves, a dagger in both of your hands. The smallest wolf is at the back of the group of five. You are only a few steps away from the wolf, waiting to attack. \n\n\t\tDemeter shouts loud enough that the wolves' attention is immediately grabbed. He runs over to them, his long obsidian staff with sharp blades on both ends in hand. The wolves growl and rush at him.\n\n\t\tYou immediately lunge at the small wolf. You stab both blades into it's neck. The creature falls to the ground without a sound. \n\n\t\tDemeter slashes his staff blade wildly at the wolves, keeping them at a good distance. The wolves seem cautious and afraid to attack him. You use this opportunity. Your invisibility has already worn off.\n\n\t\tYou run at the next closest wolf, catching it off guard. You slam your daggers into it's neck, but not before it makes a high pitched whine. The three remaining wolves immediately turn their attention to you. You jump back as one jumps at you.\n\n\t\t\"No you don't,\" Demeter says. He charges forward and slashes at one of the wolves that had turned to face you. It's head is severed from it's body.\n\n\t\tThe remaining two wolves try to run, but you and Demeter are easily able to encircle them and then pick them off.\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage. Blood and gore is splattered all over the forest grass. The corpses of the wolves are mangled and dismembered.\n\t\t*set mana -2\n\t\t*goto clearing1\n\t*if  (lesser_fireball=\"true\") #Cast Lesser Fireball\n\t\tYou push your mana through your body and toward your palms. You form ten small fireballs and then launch them at the nearest wolf. The fireballs crash into the creature one by one. By the fifth fireball the wolf has already lost all life.\n\n\t\t\"Nice work,\" Demeter says. He then rushes forward, his long obsidian blade staff in his hand. The wolves are completely unprepared for the attack and he quickly decapitates two in one swift strike. \n\n\t\tYou form another ten fireballs and then aim five each at the two remaining wolves. The wolves are stronger than the first as you have already lost the element of surprise. Only three fireballs connect with one, and two with the other.\n\n\t\tDemeter uses this as an opportunity and stabs one wolf in the head. He removes his blade from the corpse and then jumps to the side as the second wolf attacks him. Without skipping a beat he kicks the wolf and then lodges his staff into it's face.\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage. Blood and gore is splattered all over the forest grass. The corpses of the wolves are mangled and dismembered.\n\t\t*set mana -2\n\t\t*goto clearing1\n\t*if (create_illusion=true) #Cast Create Illusion\n\t\tYou push your mana through your body and then focus it into your mind. You envision an image of a wounded deer and place it behind the wolves. The wolves immediately turn their attention away from where you are stood.\n\n\t\t\"Nice work,\" Demeter says. He then rushes forward, his long obsidian blade staff in hand. The wolves don't seem to hear his approach and he runs his blade through three of them. The three lifeless corpses don't seem to break them out of your spell. Demeter uses this to finish off the remaining two.\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage. Blood and gore is splattered all over the forest grass. The corpses of the wolves are mangled and dismembered.\n\n\t\t*set mana -2\n\t\t*goto clearing1\n\t*if (flame_dash=true) #Cast Flame Dash\n\t\tYou push mana from your arcana core throughout your body. The soles of your feet start to give off a red energy. You look to where you wish to move and then pulse forward. You leave behind a stream of flames in your wake as you cross the distance to the wolves. You're able to catch two wolves on fire. The creatures run in panic, however they can't find you as you've already hidden behind a nearby tree.\n\n\t\t\"Nice work,\" Demeter says. He then rushes forward, his long obsidian blade staff in hand. He stabs at the wolves that are on fire and then turns his focus to the remaining three. He spins around with his staff, decapitating the three remaining wolves.\n\n\t\t\"Woah,\" you say. \"They didn't even see any of that coming.\"\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage. Blood and gore is splattered all over the forest grass. The corpses of the wolves are mangled and dismembered.\n\n\t\t*set mana -2\n\t\t*goto clearing1\n\t*if (wall_of_fire=true) #Cast Wall of Fire\n\t\tYou push mana from your arcane core through your body and toward your palms. You life them up and then focus on where you want to create your Wall of Fire. You choose a spot that encompasses all five of the wolves. The spell bursts forth, igniting all of the wolves. The wolves howl and start to run around like crazy. \n\n\t\tDemeter uses this as an opportunity and runs at the wolves. He stabs his obsidian blade staff into the wolves in succession. In only a manner of a few seconds all five of the opponents have been killed, their dismembered bodies laying on the ground whilst still ablaze.\n\n\t\t\"Woah,\" you say. \"They didn't even see any of that coming.\"\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage. Blood and gore is splattered all over the forest grass, whilst other patches have been burned asunder by your flames.\n\t\t*set mana -2\n\t\t*goto clearing1\n\t*if (water_cannon=true) #Cast Water Cannon\n\t\tYou push your mana from within your arcane core through your body. Once the mana reaches your palms a blue torrent of water starts to form in them both. You throw two torrents at each opponent, causing them all to be briefly knocked onto the ground.\n\n\t\tDemeter uses this as an opportunity and rushes at the wolves. In a whirlwind he slashes at the creatures with his obsidian blade staff. Blood splatters all over the grass and trees in the vicinity. In less than half a minute the creatures have been rendered lifeless, their decapitated heads on the ground.\n\n\t\t\"Woah,\" you say. \"They didn't even see any of that coming.\"\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage.\n\n\t\t*set mana -2\n\t\t*goto clearing1\n\n\t*if (cerberus=true) #Cast Cerberus\n\t\tYou think about casting Cerberus but then go against it. It is too great of a burden onto your mana pool to cast it right now, as it takes away half of your total mana.\n\n\t\t*goto fight_wolves\n\t*if (piercing_water=true) #Cast Piercing Water\n\t\tYou push mana from within your arcane core through to your palms. Your hands take on a blue sheen. You then thrust them forward, forming sharp arches of water. Your projectiles cut into the flesh of each of the wolves. The creatures collectively howl and then charge at you.\n\n\t\t\"No you don't,\" Demeter says. He rushes at the wolves, his obsidian staff blade in hand. The wolves move sluggishly due to the damage you've inflicted on them. A trail of blood is left in their wake. Demeter spins around like a whirlwind, slashing at the wolves with no mercy. In less than half a minute he defeats each of them.\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage.\n\n\t\t*set mana -3\n\t\t*goto clearing1\n\t*if (mud=true) #Cast Mud\n\t\tYou push the mana from within your arcane core out. The substance washes over your body and you press your hands onto the ground. Mud forms where the wolves are. The creatures notice you and try to run to you but immediately slip and fall.\n\n\t\t\"Good stuff,\" Demeter shouts and then rushes at the wolves, his obsidian blade in hand. The wolves move sluggishly due to your spell and are unable to defend themselves adequately. Demeter spins around like a whirlwind, slashing at the wolves with no mercy. In less than half a minute he defeats each of them.\n\n\t\t\"That's the stuff ${name},\" Demeter says. \"An unbeatable duo we are.\"\n\n\t\tYou smile and then take in a deep breath. You look at the carnage. Blood and gore is splattered all over the forest grass. The corpses of the wolves are mangled and dismembered.\n\t\t*set mana -3\n\t\t*goto clearing1\n\n*label fight_humans\nYou decide that you will…\n*choice\n\t#Improvise\n\t\t\"I will play it by ear,\" you say. \"No point making a strategy when we have no information anyway. I'll stay loose.\"\n\t\t\n\t\t\"Alright,\" Ploy says. \"Demeter you charge in from the front. I'll summon my tiger to accompany you. Mbali, stay at the back with me and heal Demeter whenever necessary. Let's do this.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\tThere are three boys and a girl sitting by a camp site. Two of them are arguing with one another, a boy and the girl.\n\t\t\n\t\tYou look to your companions and then to the opposing group, who are about forty meters away. You decide to use trees as cover to try and get closer to them.\n\t\t\n\t\tYou look to Demeter who is fidgeting on the spot. You see the boy sigh. His eyes widen and he seems to be overcome by some force. He jumps out of cover and charges at the enemies. \n\t\t\n\t\t\"What th-\" You shake your head and unsheathe your daggers. You watch as Demeter reaches the enemy group and make your way around them.\n\t\t\n\t\tDemeter slashes at the arguing pair and swings his blade staff at their necks. He catches them completely off guard, his blade sliding through them like jelly. A blue light surrounds the pair and their bodies disappear in a flash of blue as they are transported out of the pocket dimension. Demeter instantly changes focus onto the remaining boys.\n\t\t\n\t\tYou flank the pair who have turned to Demeter. You run up and slam each dagger into their backs. They disappear into blue nothingness.\n\t\t\n\t\tThe battle finished in less than thirty seconds.\n\t\t\n\t\t*goto clearing1\n\t\t\n\t*if (invisibility=\"true\") #Cast Invisibility\n\t\t\"I'll use my invisibility to flank the opponents,\" you say. \"I just need you to distract them momentarily.\"\n\t\t\n\t\t\"I like the sound of that,\" Demeter says. \"I'll grab their attention from the front. Mbali, you stay close to me and heal me whenever needed.\"\n\t\t\n\t\t\"I will stay at the back and protect our own flank,\" Ploy says. \"I'll keep Mbali protected.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYou pump out mana from within your arcana core and bathe your body in it. Your body flickers a couple of times before disappearing from enemy vision completely. You make your way around trees until you spot your opponents. You stand a good fifteen meters away from them. You spot three boys and a girl, who seem to be arguing about something.\n\t\t\n\t\tDemeter jumps out of a brush and rushes at the party. \n\t\t\n\t\t\"Wait,\" the girl screams. She jumps back just as Demeter's blade staff is about to pierce her body. Her three companions scramble to meet Demeter head on.\n\t\t\n\t\tYou use the opportunity and unsheathe your daggers. You run at the girl and stab your daggers into her skull. A blue shimmer of light encompasses the girl, after which her body disappears. The battle ensues but is over just as quickly as it had begun. Your plan worked flawlessly. With each opponent defeated, the blue shimmer of light surrounds them and seemingly transports them out of the pocket dimension.\n\t\t*set mana -2\n\t\t*goto clearing1\n\t*if  (lesser_fireball=\"true\") #Cast Lesser Fireball\n\t\t\"I'll cast as many fireballs as I can to catch the opponents off guard,\" you say. \"Demeter, I'll leave the rest up to you and continue assaulting them with fire.\"\n\t\t\n\t\t\"I like the sound of that,\" Demeter says. \"I'll grab their attention from the front so they can't target you ${name}. Mbali, stay close to me, I think I'll be needing you to heal me.\"\n\t\t\n\t\t\"Good ideas,\" Ploy says. \"${name}, protect Mbali. I will flank our opponents and summon my tiger.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYou make your way around a tree and are able to spot the opponents. There are three boys and one girl. You quickly push the mana within your body to your palms and form a dozen fireballs. You throw your hands forward, the fireballs rush at the opponents.\n\t\t\n\t\tThe enemy group is caught off guard and you watch as a couple fireballs decimate the girl. A blue shimmer of light encompasses the girl, after which her body disappears. The battle ensues but is over just as quickly as it had begun. The enemy group had no chance with your advantage of surprise and numbers with Ploy's summoned tiger. With each opponent defeated, the blue shimmer of light surrounds them and seemingly transports them out of the pocket dimension.\n\t\t*set mana -1\n\t\t*goto clearing1\n\t*if  (water_wall=\"true\") #Cast Water Wall\n\t\t\"I'll use my Water Wall,\" you say. \"I can place it for us as a distraction, allowing us to circle around them before they know what hit them.\"\n\t\t\n\t\tPloy tilts her head. \"I have an idea. I'll summon my tiger first and you then create multiple walls around our opponents, trapping them. Then we'll encircle them, giving them no way of escaping.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYour opponents come into vision. There are three boys and a girl sat around a camp fire.\n\t\t\n\t\tPloy throws her hands forward. An orange glow is emitted from her palms. A ferocious tiger forms in the middle of the enemy party. You watch as your opponents scream and try to run away.\n\t\t\n\t\t\"No you don't,\" you say. You let your mana wash through your body and then you focus on the location you want your spell to form at. Walls of water form around the enemies. You watch as the group tries to break through your spell, however their resistance is short lived and Ploy's tiger decimates them. A blue shimmer surrounds the opponents after taking fatal damage, and seems to transport them out of the pocket dimension.\n\t\t*set mana -3\n\t\t*goto clearing1\n\t*if  (summon_hawk=\"true\") #Cast Summon Hawk\n\t\t\"I'll summon my hawk to scout the area up ahead,\" you say. \"We can use the information to prepare our formation accordingly.\"\n\t\t\n\t\t\"Good idea,\" Ploy says.\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tJust as you want to summon your hawk, you realize that there is no need for it. There are already four opponents in sight, three males and a female, sat beside a camp fire. You look to your companions and they seem to understand your train of thought without you having to say a word. Demeter looks to Ploy who then nods. She lets her mana flow through her body and her hands take on a orange glow. She aims her hands at the enemy party.\n\t\t\n\t\tA huge tiger forms in the middle of the camp site and roars so loud you have to cover your ears.\n\t\t\n\t\t\"Nice stuff Ploy,\" Demeter says. He runs at the opponents, his obsidian blade staff in hand and begins to slash at them. The tiger and Demeter wreak havoc and all you're able to do is stand back and watch. It takes less then half a minute for the battle to end. A blue shimmer surrounds the opponents after taking fatal damage, and seems to transport them out of the pocket dimension.\n\t\t\n\t\tYou rub the back of your neck and say, dejectedly, \"Well I was useful.\"\n\t\t*set mana -3\n\t\t*goto clearing1\n\t*if (thorn_armour=\"true\") #Cast Thorn Armour\n\t\t\"I'll use my Thorn Armour to protect myself and then rush to meet our opponents head on. I won't be taking too much damage,\" you say.\n\t\t\n\t\tMbali shakes her head. \"No, you can't use that spell right now, it'll cost you too much mana.\"\n\t\t\n\t\t\"I agree with Mbali,\" Demeter says. \"Save that for a more important situation or if we start losing the fight.\"\n\t\t*goto fight_humans\n\t*if (create_illusion=true) #Cast Create Illusion\n\t\t\"I'll create an illusion that will make the opponents think we are behind them,\" you say. \"I'm not sure how well this spell will land, but it should buy us enough time to charge at them and catch them off guard.\"\n\t\t\n\t\t\"I like the sound of that,\" Demeter says. \"I'll rush in from the front and run them over with pure force.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\tThere are three boys and a girl sitting by a camp site. Two of them are arguing with one another, a boy and the girl.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYou focus your mana through to your mind and then start to envision a group lions surrounding the enemy party. You try to add more layers to the spell, and create sounds. The lions roar and charge at the enemies.\n\t\t\n\t\t\"That's the stuff,\" Demeter yells and then charges forward, his obsidian blade staff in hand. He slashes the the nearest opponent. Ploy throws her hand forward and calls out, \"Summon tiger.\" A large tiger forms right in the middle of the enemies and lunges at the girl. A blue shimmer glows from the boy Demeter was fighting as his blade slides through his neck. He recoils immediately and helps Ploy's summon. He stabs at the girl, after which a blue glow surrounds her as well. Her body shimmers away into nothingness.\n\t\t\n\t\tThe battle ends quickly, all in less than half a minute.\n\t\t*set mana -2\t\t\n\t\t*goto clearing1\n\t*if (flame_dash=true) #Cast Flame Dash\n\t\t\"I'll use my Flame Dash to create an area of flames that they can't pass through,\" you say.\n\t\t\n\t\tPloy frowns. \"No, you should use that spell more defensively, in case you need to create distance between yourself and the opponents.\"\n\t\t\n\t\t\"I agree,\" Mbali says.\n\t\t*goto fight_humans\n\t*if (wall_of_fire=true) #Cast Wall of Fire\n\t\t\"I'll cast my spell Wall of Fire,\" you say. \"I'll create two of them to encircle two of our opponents. We should be able to take out the other two rather quickly with this.\"\n\t\t\n\t\t\"Great idea,\" Ploy says. \"Make sure to use the spell on whoever seems to be their tank and healer. With them out of the equation we can quickly defeat the remaining two who shouldn't have great defensive capabilities.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\tThere are three boys and a girl sitting by a camp site. Two of them are arguing with one another, a boy and the girl.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYou look to the four and spot there is one wearing a heavy plate armour, wielding a sword by his side. He is stood next to another boy who is wearing a green robe. You presume these to be a healer and a knight. You quickly push the mana within your body outward and raise your palms forward. You create circles of fire around the two of them in your mind and then cast your mana forth. A huge flame bursts forth around the pair. A heat fills the battleground. \n\t\t\n\t\t\"Fuck,\" the healer says.\n\t\t\n\t\t\"That's the stuff ${name},\" Demeter shouts and rushes forward, his obsidian blade staff in hand. He catches up to the arguing pair before they can react and slashes at their necks. A blue shimmer forms around the two of them, and their bodies disappear out of the pocket dimension. \n\t\t\n\t\tYou cast a wall of fire across the remaining two, burning them asunder and sending them out of the dimension as well. The battle ended in less than half a minute.\n\t\t*set mana -2\n\t\t*goto clearing1\n\t*if (water_cannon=true) #Cast Water Cannon\n\t\t\"I'll use my Water Cannon,\" you say. \"I can throw quite a few projectiles at our opponents.\"\n\t\t\n\t\t\"Good idea,\" Ploy says. \"Demeter, you can rush into the fray and I'll summon my tiger to back you up. Mbali, you stay close to me and heal Demeter whenever necessary.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\tThere are three boys and a girl sitting by a camp site. Two of them are arguing with one another, a boy and the girl.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYou push your mana through your body. A blueish energy emanates from your palms and then torrents of water from in each. You look to Demeter and he nods.\n\t\t\n\t\tDemeter rushes at the opponents. The noise of his sprint startles the group and you immediately throw your Water Cannon at a boy dressed in green robes. Both torrents hit the boy square in the face. A blue light emanates from him and his body disappears into fragments, out of the pocket dimension. \n\t\t\n\t\tPloy throws her hands forward. An orange glow covers them. \"Summon Tiger,\" she shouts. You watch as a tiger forms in the middle of the enemy group. It bares its fangs and jumps onto the girl, biting down onto her neck. The girl's body disappears into blue nothingness. Demeter finishes off the remaining two.\n\t\t\n\t\tThe battle ended in less than half a minute.\n\t\t*set mana -2\n\t\t*goto clearing1\n\t*if (thorns=true) #Cast Thorns\n\t\t\"I'll cast my Thorns,\" you say. \"I can cast many of them from quite a far distance. I should be able to immobilize at least one or two of the four opponents we'll face.\"\n\t\t\n\t\t\"I like the sound of that,\" Demeter says. \"I'll use that to decimate those that are caught by your spell.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\n\t\tThere are three boys and a girl sitting by a camp site. Two of them are arguing with one another, a boy and the girl.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYou push your mana through your body and into your palms. You then slam them into the ground. Roots and vines sprout out from in front of the arguing pair. The thick vines wrap around each of them.\n\t\t\n\t\tDemeter yells at the top of his lungs as he charges at the enemies. He slashes at the pair captured in your spell. His blade slides through both of their necks. A blue light shimmers around the boy and girl, and their bodies start to fade away from the pocket dimension. \n\t\t\n\t\t\"Summon Tiger,\" Ploy says and aims her hands at the remaining two. An orange energy seeps out of her palms. A ferocious tiger forms between the remaining two. It bares it's fangs and leaps at the nearest, biting down at his neck. A blue light follows. \n\t\t\n\t\tThe last boy is torn down by Demeter, the battle ending in less than half a minute.\n\t\t*set mana -1\n\t\t*goto clearing1\n\t*if (cerberus=true) #Cast Cerberus\n\t\t\"I'll summon my Cerberus,\" you say. \"It can grab their attention and then the rest of you can decimate them.\"\n\t\t\n\t\tPloy frowns \"No, you should use that spell another time. Summoning a Cerberus will take too much of a toll on your mana pool. Save it for important battles. I'll summon my tiger instead, it's not as powerful as your Cerberus but it only costs a fraction of your mana cost to cast.\"\n\t\t*goto fight_humans\n\t*if (piercing_water=true) #Cast Piercing Water\n\t\t\"I'll use my Piercing Water spell,\" you say. \"If we have the element of surprise, I'm confident in taking out one opponent with it.\"\n\t\t\n\t\t\"I like the sound of that,\" Demeter says. \"Whittle down their numbers and I'll rush into the fray.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\tThere are three boys and a girl sitting by a camp site. Two of them are arguing with one another, a boy and the girl.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYou look to the other two boys. One is wearing heavy armour and the other a green robe. You then push your mana through your body and to your palms. Arcs of water form above them and then rush at the boys. \n\t\t\n\t\tThe spell penetrates through their chests, leaving all armour useless. The boys shimmer blue before breaking into a fragment of blue light as they are transported out of the pocket dimension. \n\t\t\n\t\tDemeter picks off the remaining two, and the battle finishes within half a minute. \n\t\t*set mana -3\n\t\t*goto clearing1\n\t*if (mud=true) #Cast Mud\n\t\t\"I'll cast my spell Mud,\" you say. \"I'll create a zone where our competitors won't be able to move easily.\"\n\t\t\n\t\t\"Good idea,\" Ploy says. \"Demeter, use that as an opportunity to rush at our opponents. I'll summon my tiger and have it back you up. Mbali, you stay close to me and heal Demeter when necessary.\"\n\t\t\n\t\tYour group makes their way through the path. As you quietly make your way along it, you start to hear some voices. They aren't too loud and you can't make out what they are talking about, but you spot exactly where your opponents are located.\n\t\t\n\t\tYou look to your party members and then make a thumbs up.\n\t\t\n\t\tYou get closer and find there are three boys and a girl sitting by a camp site about fourty meters away. Two of them are arguing with one another, a boy and the girl.\n\t\t\n\t\t[i]Time to proceed with the plan.[/i]\n\t\t\n\t\tYou quietly make your way closer to the enemy group, using trees as cover. Once you are close enough you push the mana in your body outward. A brownish energy emanates from you and you press your palms on the ground. Mud forms by everywhere within a twenty square meter area of you.\n\t\t\n\t\t\"Woah,\" the girl shouts. She is caught off balance and falls to the ground.\n\t\t\n\t\tDemeter yells at the top of his lungs as he charges at the enemies. He quickly reaches them and slashes with his blade staff. His blade slides through the necks of the arguing pair. A blue light shimmers around the boy and girl, and their bodies start to fade away from the pocket dimension. \n\t\t\n\t\t\"Summon Tiger,\" Ploy says and aims her hands at the remaining two. An orange energy seeps out of her palms. A ferocious tiger forms between the remaining two. It bares it's fangs and leaps at the nearest, biting down at his neck. A blue light follows. \n\t\t\n\t\tThe last boy is torn down by Demeter, the battle ending in less than half a minute.\n\t\t*set mana -3\n\t\t*goto clearing1\n\n\n*label clearing1\n*page_break\nYou find yourself in a clearing after your battle. You take in deep breaths and replay the fight in your mind. You wonder if there were things you could have done to improve it. \n\n[i]That was clean. Hopefully all of them will be this easy.[/i]\n\n\"Well done you all,\" Ploy says. \"This was simple, just like a training exercise. We should keep to ambushing whenever possible.\"\n\nDemeter laughs. \"Ambushing, really? We shouldn't cower away from battles and only focus on being sneaky. If we find opponents we should engage no matter what.\"\n\nPloy clicks her tongue. \"Listen, we are here to win not to be prideful or hot headed. I would agree with you if this competition was really for us to prove ourselves to a kingdom and it's people.\"\n\n\"Hey,\" Mbali calls out and then puts her fingers to her lips. She raises her brows. \"What are you talking about?\"\n\nYou seize up. [i]Shit, we can't be talking about our mission in the open. There's people watching and listening to the contestants. If they just heard that…[/i]\n\nYou take in deep breaths and look to your companions, who are all tensed up. The tension gets to you and you start laughing. \n\n\"What are you laughing at?\" Mbali whispers. \n\nYou can't stop laughing and hold onto your stomach. You wipe away a tear from your eye. \"S-Sorry, you just whispered that like somebody is listening to us.\"\n\nYou share a glance with the others and then nod meaningfully. The others reciprocate, seeming to understand your intentions.\n\n\"Let's get moving,\" Ploy says. \n\n*label clearing2\n\nYou continue onward to the tower whilst talking with…\n\n*choice\n\t#Ploy\n\t\t(Ploy approves) \n\t\t\n\t\tYou want to ask the girl about when she'd found out she was also a Voidwoken, but you quickly stop yourself. Having to hide yourselves is truly becoming a pain in your backside. Instead you talk with her about tactics and the sort of stuff that wouldn't raise suspicion if any people were listening to you from outside the pocket dimension. \n\t\t\n\t\t\"So you can summon a tiger,\" you say. \"What else can you do? I haven't really seen everything you have to offer.\"\n\t\t\n\t\tPloy grins. \"Wouldn't you like to know. I've got a lot of hidden aces under my sleeves, but for now I'll only be using my summoning magic as needed for the situations we encounter.\"\n\t\t\n\t\t\"So summoning is the domain you have the greatest affinity to?\"\n\t\t\n\t\tPloy chuckles. \"That's not what I said. Don't worry about it too much.\" She winks at you.\n\t\t*set ploy +5\n\t\t*goto clearing3\n\t#Demeter\n\t\tDemeter fills you with stories of the adventures of a dark elf, known as Demon. From the folk tales that Demeter had heard as a child, it was said that Demon was the very first prince of the dark elves. His power was so great that he could bend the fabric of space and time. His achievements were immeasurable, and it is even said that he still lives to this day, but not in the world as we know it.\n\t\t\n\t\t\"He ascended,\" Demeter says. \"To a new plane of existence. At least that's what I was told.\"\n\t\t\n\t\t\"What could that mean? To ascend?\" you ask.\n\t\t\n\t\tDemeter shrugs. \"Beats me, it's not something I've got on my mind to want to find out.\"\n\t\t\n\t\tYou grin. \"He's totally your idol. You want to be just like him. Literally. You're even as reckless as him, if the stories you told me are true.\"\n\t\t\n\t\tDemeter grins. \"So you think I'm like Demon. I like the way you think.\"\n\t\t\n\t\t\"I- That's not what I was saying.\"\n\t\t\n\t\tThe dark elf chuckles. \"That's all that I heard.\"\n\t\t\n\t\t[i]In through one ear and out the other.[/i] You sigh.\n\t\t*goto clearing3\n\t#Mbali\n\t\tMbali is much more soft spoken than your two other companions. You prod and prod, but the answers to your questions are usually succinct. You try your hardest to get a natural conversation going, but it seems that in this current situation Mbali doesn't want to speak too much. \n\t\t\n\t\tYou wonder whether this is due to the knowledge of the competition being broadcast throughout the whole Khaeng Kingdom, or whether she's just feeling out of it right now.\n\t\t\n\t\tYou don't push the issue too much and decide to continue on in silence instead, focusing on your surroundings.\n\t\t*goto clearing3\n\t\n*label clearing3\n*page_break\nYou reach a small clearing, trees only sparsely located around the area, unlike the rest of the forest you've been traversing. A blue screen forms in the clearing and an image of King Sabai-Dii is displayed. \n\n\"This is a message to all remaining contestants,\" the king says. \"There are now one hundred groups remaining, fifty seven have been eliminated. Best of luck.\"\n\nThe screen disappears.\n\n\"Fifty seven,\" Demeter says whilst counting his fingers. \"What, there's 228 less opponents now. What a bummer.\"\n\nYou shake your head. \"That's not a bummer. That's a good thing.\"\n\nYour group continues onward. It doesn't take long, only about forty five minutes since your last battle, for your next encounter. This time, there is only one path for you to follow through the forest, and with Demeter's keen senses he notices there to be enemies up ahead. Your group edges closer and closer to where your opponents are. You soon spot a group of trolls. They are tall, chunky, green creatures whose noses are like squished tomatoes. A horrid stench fills the air, their body odour enough to threaten to knock you out.\n\nOut of the corner of your eye you spot a barrel, and as you look more closely at it you spot there is a black substance in it, oil.\n\n*choice\n\t*selectable_if (spirit_flames=true) #Ignite the oil\n\t\tYou take in a deep breath and then push your mana through your body. You focus on the spirit housed within you and an image of a bright flame springs forth in your mind. You aim your hand at the barrel of oil. A torrent of flames spews out of your palms. The barrel of oil explodes, showering the trolls in flames. \n\t\t\n\t\tPloy throws her hands forward and says, \"Summon Tiger.\" The tiger forms on top of one of the trolls and bites down hard at it's neck. A thick blackish-green liquid oozes out of the troll as it roars in pain. \n\t\t\n\t\tDemeter rushes to another troll and slashes at it with his blade staff. The troll's skin is thick, and his blade only enters a couple inches before he has to withdraw it. \n\t\t\n\t\tYou continue using the power of your spirit of flames and burn asunder the trolls. The battle soon ends with the creatures having made almost no resistance whatsoever.\n\t\t\n\t\t*goto clearing4\n\t\n\t*selectable_if (dexterity>10) #Spill the oil\n\t\tYou take in a deep breath and then sprint over to the barrel. With a kick you spill it's contents, after which you back away behind a tree before any of the trolls can spot you. \n\t\t\n\t\t[i]Seriously? They didn't even notice me?[/i]\n\t\t\n\t\tYou go back to your companions and then say, \"Let's rally them to the oil. They won't be able to fight against us whilst stood in it.\"\n\t\t\n\t\tPloy shakes her head. \"Maybe say something next time before running of on your own.\"\n\t\t\n\t\t\"Oh.\" You rub the back of your neck and laugh nervously. \"I forgot, sorry.\"\n\t\t\n\t\t\"Summon Tiger,\" Ploy shouts whilst throwing her hands forward. The tiger forms on top of one of the trolls and bites down hard at it's neck. A thick blackish-green liquid oozes out of the troll as it roars in pain. \n\t\t\n\t\tDemeter rushes to another troll and slashes at it with his blade staff. The troll's skin is thick, and his blade only enters a couple inches before he has to withdraw it. \n\t\t\n\t\tYou tilt your head. The trolls haven't moved a single step. The troll roaring was the only thing to tell you that they are alive, except for the there is no resistance. Your party culls down the creatures with ease.\n\t\t*goto clearing4\n\t\n\t*selectable_if (mud=true) #Cast Mud\n\t\tYou push the mana through your way as you make your way closer to the trolls. Once within range, you press your palms onto the ground. Mud forms, with you at the centre of the spell. The brown substance quickly covers all of the trolls.\n\t\t\n\t\t\"Summon Tiger,\" Ploy shouts whilst throwing her hands forward. The tiger forms on top of one of the trolls and bites down hard at it's neck. A thick blackish-green liquid oozes out of the troll as it roars in pain. \n\t\t\n\t\tDemeter rushes to another troll and slashes at it with his blade staff. The troll's skin is thick, and his blade only enters a couple inches before he has to withdraw it. \n\t\t\n\t\tYou tilt your head. The trolls haven't moved a single step. The troll roaring was the only thing to tell you that they are alive, except for the there is no resistance. Your party culls down the creatures with ease.\n\t\t\n\t\t*goto clearing4\n\t\t\n\t#Do nothing\n\t\tYou decide against making any rash decisions and instead wait for the others to make a decision.\n\t\t\n\t\t\"Let's circle around and attack from behind,\" Ploy says.\n\t\t\n\t\tYou all quickly make your way around the trolls, seemingly unnoticed as the creatures don't move an inch. \n\t\t\n\t\t\"Summon Tiger,\" Ploy shouts whilst throwing her hands forward. The tiger forms on top of one of the trolls and bites down hard at it's neck. A thick blackish-green liquid oozes out of the troll as it roars in pain. \n\t\t\n\t\tDemeter rushes to another troll and slashes at it with his blade staff. The troll's skin is thick, and his blade only enters a couple inches before he has to withdraw it. \n\t\t\n\t\tYou tilt your head. The trolls haven't moved a single step. The troll roaring was the only thing to tell you that they are alive, except for the there is no resistance. Your party culls down the creatures with ease.\n\t\t\n\t\t*goto clearing4\n\t\t\t\t\n*label clearing4\nYou think to the weirdly placed barrel of oil and say, \"Why was there a barrel of oil next to the trolls?\"\n\n\"It's been placed there intentionally,\" Ploy says. \"The competition isn't just to gauge brute strength but also to find the party most able to utilize any advantage found.\"\n\nYou find a green amulet on the ground where the trolls had initially been standing. \"What's this?\" you say and bend down to pick the item up.\n\n\"Don't touch that,\" Ploy shouts. She pushes you away. \"You almost got yourself screwed.\"\n\nYou get back up and dust yourself off. \"What are you talking about?\"\n\n\"The trolls weren't moving and barely reacting to us,\" Ploy replies. \"And they just so happened to all be stood around this amulet.\"\n\nThe cogs turn in your head quickly. \"So the amulet is the cause of it, I see.\" \n\nThe amulet is rather plain, made out of silver or iron, and there is a single pink gemstone lodged into its centre. It buzzes and crackles with energy, threatening to consume you if you touch it.\n\n*choice\n\t*selectable_if (spirit_illusion=true) #Dispel the illusions\n\t\t\n\t\tYou feel a sudden pulling from your illusion spirit. The entity is almost calling at you to place your hand on the amulet. You feel a surge of energy surround your palms. You reach down.\n\t\t\n\t\t\"What are you doing?\" Ploy shouts.\n\t\t\n\t\tYou ignore her and grab the amulet. An electric crackle escapes from the point you touched the amulet. You examine the item more closely and move it around in your hands. \n\t\t\n\t\t\"It's all good,\" you say. \"Nothing to worry about here.\"\n\t\t\n\t\tPloy stares at you with widened eyes and her mouth wide agape.\n\t\t\n\t\t\"How did you just do that?\"\n\t\t\n\t\tYou shrug. \"Honestly. I have no clue. It just felt… I don't know, right. It felt right.\"\n\t\t\n\t\tYou wear the amulet and feel that you've grown closer with the illusion spirit. You can almost hear it speaking to you.\n\t\t\n\t\t*set cursed_amulet \"true\"\n\t\t*goto clearing5\n\t\n\t*selectable_if (intelligence>15) #You know these illusions\n\t\t\n\t\tYour mind starts to race as you stare at the amulet. You remember reading through a book once before that detailed pendants that had been cursed with illusions. Once you touch them you'd become trapped in a never ending cycle of illusions. From what you read from the book, the easiest way to dispel the curse is to bathe it in fire. \n\t\t\n\t\t*if (pyromancy>10)\n\t\t\tYou push your mana through to your palms and then create a weak flame. You hover the flame above the amulet for a while until you are certain you've dispelled the curse. \n\n\t\t\t\"What are you doing?\" Ploy shouts. She grabs your shoulder.\n\t\t\t\n\t\t\t\"Don't worry, trust me,\" you respond.\n\t\t\t\n\t\t\tYou pick up the item and move it around. The necklace crackles with energy, which surges from your palm through to the rest of your body. You grin and then wear the amulet.\n\t\t\t\n\t\t\t\"See, I told you not to worry.\"\n\t\t\t*set cursed_amulet \"true\"\n\t\t\t*goto clearing5\n\t\t*else\n\t\t\t\"Are any of you able to create some flames?\" you ask.\n\t\t\t\n\t\t\t\"I can,\" Ploy says. \"But why are you asking?\"\n\t\t\t\n\t\t\t\"It's really simple. If you bathe the amulet in flames it'll destroy whatever curse was placed on it. We can then take this amulet and who knows, it might be useful for us in the future.\"\n\t\t\t\n\t\t\tPloy furrows her brows.\n\t\t\t\n\t\t\t\"No really, you just have to trust me,\" you say. \"I wouldn't do something stupid.\"\n\t\t\t\n\t\t\t\"Fine,\" the girl replies. She places her hands above the amulet. Flames spew out of her palms toward the amulet, covering it and the grass around it. \n\t\t\t\n\t\t\t\"Okay that's enough,\" you say. You then wait for about half a minute before grabbing the necklace. It crackles with energy, which surges from your palm through to the rest of your body. You grin and wear the amulet.\n\t\t\t\n\t\t\t\"See, I knew it was going to be fine.\"\n\t\t\t*set cursed_amulet \"true\"\n\t\t\t*goto clearing5\n\t\t\n\t\t\n\t#Do nothing\n\t\tYou decide to not play with fire and leave the amulet where it is. You get the feeling that the amulet may be important or worth something, however a dark energy is emanating from it, much more powerful than you think you can handle at this point in time. Maybe in another life you'd have made a different decision.\n\t\t\n\t\t\n*label clearing5\n*page_break\nYour first day in the pocket dimension slowly comes to an end. The sky has already darkened and moonlight falls down.\n\nYou stare at the moon, it seems so real that you can't believe it is simply a creation of magic. This whole pocket dimension is a situation you'd never have thought about experiencing just months ago. Your life has been completely flipped upside down in a short period of less than 6 months.\n\nYou feel quite…\n\n*choice\n\t#Dejected\n\t\tYou don't know why, but you have a feeling that everything may just come crashing down soon. Like this is just a dream. You fear this the most, the moment that you're pulled out of this dream and find yourself back at home, poor and without prospects for your future. Images of your past play in your mind and you feel a sadness about to burst through.\n\t\t\n\t\tYou shake your head and the negative thoughts within away.\n\t\t\n\t\t[i]No point dwelling on it now. I have a competition to win.[/i]\n\t\t\n\t\t*goto clearing6\n\t\t\n\t#Excited\n\t\tYou feel extremely energetic. Excitement builds within you. After all, it's only been a short few months since you've been introduced to the world of magic, yet you've already had such amazing adventures that you'd want to share with your future children, should you choose to have them. You think about all of the crazy things you have yet to experience and gleefully smile.\n\t\t\n\t\tYou have a single wish, that this experience never ends and that you'll continue to live this wild and random life. \n\t\t*goto clearing6\n\t#Calm\n\t\tDespite everything that has happened to you in recent times, you don't feel overly emotional. You are unsure why, but it might be that you're trying to temper your expectations for the future, as you know it can be taken away from you at any point in time. Especially with the dangers involved with studying magic, you try your best to just take everything one step at a time and not worry too much about the future or the past. The present, that is where you believe it is best to live.\n\t\t*goto clearing6\n\t\t\n*label clearing6\n*page_break\nYour group is sat huddled against a camp fire. Your surroundings are revealed by the blaze. The air is thick in the smell of the burning wood. Hints of sweetness linger.\n\n\"What do you think is in the tower?\" Demeter asks. He looks to the structure in the distance, his right hand leaning on his forehead.\n\n\"Nothing good, I'd say,\" Mbali responds. \"Nothing good ever comes out of something that looks like that.\"\n\nPloy giggles.\n\nYou stare at the tower that moves so high up the sky that you can't see it's end. \"I wonder what's at the top.\"\n\nPloy fake barfs. \"Not you too. What are you both on asking those questions.\" The girl bursts out laughing. \n\nYou can't help but do the same. \n\n\"No but really,\" you say. \"Maybe that's where the treasure is hidden.\"\n\n\"Ya ya,\" Ploy says. \"Let's think about that sort of stuff later. Let's get some rest first, I'll stay up on night watch first. You three take a rest.\"\n\n*fake_choice\n\t#Try something else. \n\t\t*goto templarfight1\n\t#Sleep until your turn\n\t\tYou don't argue with the girl. You're exhausted after the long day you've had. You find a nice spot of grass near the camp fire and then lay down. Almost immediately after finding a comfortable position you fall asleep.\n\t\t*if observation>19\n\t\t\tYou sleep is cut short by a loud scream. You shudder awake and jump onto your feet. Mbali and Demeter are stood as well. \n\n\t\t\t\"What happened?\" you ask. You look around. \"Where is Ploy?\"\n\n\t\t\t\"She's not here,\" Mbali says. \n\n\t\t\tYour heart lurches. Another scream sounds out in the wilderness. You look to Demeter and he nods. You sprint off into the direction of the voice. \n\n\t\t\tOnly about thirty meters out from your camp you find Ploy being restrained by a tree creature. It has a large mouth filled with teeth made out of branches. Ploy is raised up in the air and being pulled into the tree's mouth. The girl moves about and tries to free herself, however the roots are wrapped around her so tightly that she can barely move. \n\n\t\t\tDemeter jumps forward with his blade staff and slashes off the roots holding onto Ploy. The girl falls to the ground with a loud thud. You sprint over to her and get her onto her feet. Her eyes have rolled into the back of her head.\n\n\t\t\t\"Shit.\"\n\t\t\t*page_break\n\t\t\t*goto sleeping1\n\t\t*else\n\t\t\t*goto templarfight1\t\t\n\t*selectable_if (ploy>9) #Join Ploy\n\t\tPloy stands up and starts to make her way out of the camp site. You follow behind her.\n\t\t\n\t\t\"What are you doing?\" she asks. \n\t\t\n\t\t\"I can't really sleep yet,\" you say. \"There's nothing wrong with having two of us. It's probably safer like this as well.\"\n\t\t\n\t\tThe girl furrows her brows and then sighs. \"You're not wrong. Fine, come with me. I was trying to give you all some more rest.\"\n\t\t\n\t\t\"How nice of you,\" you respond. \"You don't need to worry that much about us three. We're actually quite experienced already. Well, Demeter and Mbali definitely are.\"\n\t\t\n\t\t\"And that's not the same for you?\"\n\t\t\n\t\tYou tilt your head and think about it for a couple breaths. \"I guess this is all new to me but I feel comfortable in this. Somehow. I don't know why, but I think this is always what I wanted from life in the first place. Or I was just born to fulfil this exact purpose.\"\n\t\t\n\t\tPloy smiles. \"You're pretty poetic. Such thoughtful words.\"\n\t\t\n\t\tThe two of you walk around a roughly fifty meter perimeter of your camp. It is awfully quiet.\n\t\t\n\t\t*page_break\n\t\t\n\t\tTwo hours pass by rather quickly. Ploy is leaning against a tree, her eyes slowly closing and opening as she battles against falling asleep. \n\t\t\n\t\tYou smirk as you watch this. [i]I knew it was a good idea for me to join you.[/i]\n\t\t\n\t\tShe slides down the tree and falls onto her ass. You hold onto your mouth just as you are about to laugh at the sight of her. You let her have her rest.\n\t\t\n\t\tThe hairs on the back of your neck jump up. You sprint at Ploy and pull her away from the tree. A dark glow shimmers around the tree, and only moments later does a mouth form in its centre, the teeth made out of bark. \n\t\t\n\t\t\"What in the-\" You feel an immense sense of disgust as the tree creature removes itself from the soil. It's large black roots twist around each other and form into legs. \n\t\t\n\t\tYou try to slap Ploy awake. \"We've gotta go,\" you say. She doesn't respond. \t\tThe girl seems to still be in a daze. You grunt and try to lift the girl onto her feet. You use all of your energy and are able to move with her toward your camp. You constantly turn your head to watch the weird tree creature, which is slowly following you. You are relieved as it's pace of movement is way too slow to catch up to you.\n\t\t\n\t\tYou soon reach your camp site. You lay Ploy down and then wake up Mbali and Demeter.\n\t\t\n\t\t\"We have a problem,\" you say. \"We've gotta get out of here.\"\n\t\t\n\t\tDemeter yawns and rubs his eyes. \"I'm still tired, just a few more minutes.\"\n\t\t\n\t\tYou kick the dark elf. \"We've got no time, a monster is chasing us.\"\n\t\t\n\t\tDemeter jumps up upon hearing this. \"Where?\" he says whilst looking around, his eyes filled with energy. \n\t\t\n\t\tYou point to where you'd come from. The creature is about thirty meters away but you can kind of make out it's body.\n\t\t\n\t\t\"Let's go,\" you say. You grab Ploy with Demeter's help, and rush away. \n\t\t\n\t\t*goto sleeping1\n\n\n*label templarfight1\n\"…\"\n\nYou groan as you wake from your slumber to a whisper. You tumble and turn before mumbling, \"Demeter, leave me alone.\"\n\n\"…\"\n\nThe whisper comes again. It tickles your ear but you can't quite make out what is being said. \n\n\"Seriously, Demeter, stop it!\"\n\n\"…\"\n\nYou grit your teeth and then open your eyes. \"Stop messing around!\"\n\nYour heart lurches. You rub your eyes. Terror and disbelief fills you from the core. You're no longer at your camp site, instead you're alone in the wilderness. The ground is wet and muddy. It is cold and you shiver. \"Where am I?\"\n\nYou rub your hands against your shoulders. A tingle runs down your spine.\n\nYou feel immediate danger.\n\n*choice\n\t*if (dexterity>24) #Jump forward\n\t\tYour instincts react faster than your thoughts. You throw yourself forward. Out of the corner of your eye you see a bright yellow ball fly where you were stood.\n\t\t\n\t\tThe ball crashes into the ground. Earth and soil scatters into the atmosphere as a small crater is left in it's wake.\n\t\t*goto stump\n\t*if (invisibility=\"true\") #Cast Invisibility\n\t\tYour instincts take over. You push mana through your body and cast invisibility. Your body becomes shrouded in darkness. You disappear from vision.\n\t\t*goto stump\n\t*if (water_wall=\"true\") #Cast Water Wall\n\t\tYour instincts take over. You push mana through your body and cast water wall. You push your palms forward and focus on the area in front of you. Water burst out of the ground in front of you and forms a solid wall. A fraction of a second later a bright yellow ball crashes into the wall.\n\t\t\n\t\tYou are sent back a few meters by the ensuing shockwave.\n\t\t*goto stump\n\t*if (flame_dash=\"true\") #Cast Flame Dash\n\t\tYour instincts take over. You push mana through your body and cast flame dash. You disappear from your location and reappear about ten meters away, leaving behind a trail of fire. Out of the corner of your eye you see a bright yellow ball fly where you were stood.\n\t\t\n\t\tThe ball crashes into the ground. Earth and soil scatters into the atmosphere as a small crater is left in its wake.\n\t\t*goto stump\n\t*if (thorn_armour=\"true\") #Cast Thorn Armour\n\t\tYour instincts take over. You push mana through your body and cast thorn armour. A green breast piece covered in thorns forms around your chest. You take in a deep breath. A bright yellow ball flies at you.\n\t\t\n\t\tThe ball of energy crashes into your armour. You are thrown back half a dozen meters. You grunt as you land on your back. You are in pain but are mostly fine and scramble onto your feet.\n\t\t*goto stump\n\t#Turn around\n\t\tYou turn around. A bright yellow ball flies your way. \"Shit,\" you utter. You push out as much mana as you can. The ball crashes into you.\n\t\t\n\t\tYou're thrown back a dozen meters. You gasp as you are slammed into a tree. \n\t\t\n\t\t\"Pugh.\" You spit out blood.\n\t\t\n\t\t\"Tsk, and here I expected better from a Voidwoken,\" a familiar voice calls. Captain laughs. \"I guess you're all worthless bags of flesh like I've always thought.\"\n\t\t*set injured \"true\"\n\t\t*goto templarfight2\n\n*label stump\n\nYou hear a person clapping. \"Bravo, nice reaction there ${name},\" a familiar voice says. \"I didn't expect anything less of a capable Voidwoken such as yourself.\"\n\nYou gather your bearings and search for the voice. You find Captain leaning against a nearby tree. He smiles and waves at you. \"Fancy seeing you here.\"\n\nYou furrow your brows.\n\n*label templarfight2\n*fake_choice\n\t#\"Where are my friends?\"\n\t\t\"Where are my friends?\" you ask. You watch Captain cautiously whilst simultaneously trying to scan the area for methods of escape. It looks like you're in the same forest as before, so you're still in the pocket dimension, but you can't sense your companions anywhere in the vicinity.\n\t\t\n\t\tCaptain makes a toothy grin. \"Oh, you don't need to worry about them. It's just you and me right now.\" He licks his lips. \"And they are occupied right now just like you are.\"\n\t\t\n\t#\"Do you want to die?\"\n\t\tYou spit in the boy's direction. \"You fucking asshole, do you want to die?\" \n\t\t\n\t\tCaptain makes a toothy grin. \"Now that's exactly what I like to hear.\" He licks his lips. \"When your prey talks this much, snuffing out their life is even more enjoyable.\"\n\t\t\n\t#\"Why are you attacking me?\"\n\t\tYou furrow your brows. \"Why are you attacking me? Didn't you want to make a wager?\"\n\t\t\n\t\tCaptain sighs. He rubs his temple. \"Seriously, do you have to ask that?\" He punches the tree he's leaned against. His voice becomes louder and more aggressive. \"I told that old fart Abbott that you'd just be useless prey, there's no reason to save you for absorption. A carcass will do just fine.\"\n\t\t\n\t\t\"What the hell are you talking about?\"\n\t\t\n\t\tThe boy raises his hand up. \"Shut your trap! Unless you want me to get serious with you.\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"Fuck you!\"\n\t\t\t\t\"Fuck you!\"\n\t\t\t#\"Go to hell!\"\n\t\t\t\t\"Go to hell!\"\n\t\t\t#\"What?\"\n\t\t\t\t\"What?\"\n\t\t\t\t\n\t\t\"That's it,\" Captain shouts. \"Don't say I didn't warn you already.\"\n\t\t\n\t\tA black aura forms around him. It flickers from dark to light, black to yellow, every couple of seconds. \"I'm going to relish every second of torture that I'm going to force upon you Voidwoken scum.\"\n\n\t\tYou immediately circulate mana through your body. You are on high alert, ready for the Templar's attack.\n\n\t\tThe boy grins. At first it is normal, but as your eye contact with him prolongs, the smile turns sinister. He looks more like a beast than a human, his eyes devoid of any emotion. There is a coldness to him. His gaze is telling you one thing.\n\n\t\t[i]He will kill me.[/i]\n\n\t\t\"Ready or not, I'm coming,\" Captain says, his voice now rough and tattered. Saliva drips down the sides of his lips.\n*label fight1captain\n*choice\n\t*selectable_if (((cerberus = true) or (water_cannon = true)) or (wall_of_fire = true)) #Cast a spell\t\t\t\t\n\t\t*choice\n\t\t\t*selectable_if (cerberus=true) #Cast Cerberus\n\t\t\t\tYou push out your mana and throw your hands forward. \"Cerberus, help me out,\" you shout. \n\n\t\t\t\tThe three headed hound forms a few steps away from Captain. It snarls at him, acidic saliva dripping from the middle head. \n\n\t\t\t\t\"Well done,\" Captain says. \"A strong summoned beast. So you're a talented Voidwoken.\" He grins. Moments later his face contorts into a scowl. \"A Voidwoken nonetheless. Like a big fish in a small pond. I'm a big fish in an ocean, don't think for even a fraction of a second that we are in the same realm you mutt.\"\n\n\t\t\t\tThe boy's hands light up bright yellow. A longsword forms in each hand. He brandishes the weapons. \"Here doggy, here you little mutt.\" \n\n\t\t\t\t\"Cerberus, attack!\"\n\n\t\t\t\tCerberus howls and then lunges at Captain. The boy dodges and slashes down. Cerberus' right head catches the blade in its mouth and presses down hard. The blade snaps in half. \n\n\t\t\t\tThe left head opens wide and a fireball bursts out. It hits the boy straight in the chest. He is thrown back into a tree.\n\t\t\t\t*label killcaptain\n\t\t\t\t*choice\n\t\t\t\t\t#Run\n\t\t\t\t\t\tYou decide to use this as the prime opportunity to get away. Whether you can defeat him or not, you need to get to your companions.\n\n\t\t\t\t\t\tYou run as fast as you can. You push mana through your body until it reaches your feet. You're able to run faster by using your mana like this, however you're being sapped dry very quickly.\n\n\t\t\t\t\t\tAfter about ten minutes you find yourself in a familiar area. You realize that you aren't too far from your camp. You navigate through the area with relative ease. When you reach your camp the others are still asleep.\n\n\t\t\t\t\t\tYou sigh in relief. [i]Nothing happened to the others.[/i]\n\n\t\t\t\t\t\tYou then wake the three up.\n\n\t\t\t\t\t\tDemeter groans. He gets up lazily. \"What? What happened?\"\n\n\t\t\t\t\t\t\"Templars,\" you respond.\n\n\t\t\t\t\t\t\"WHAT?\" \n\n\t\t\t\t\t\tYou recount the events that just unfolded.\n\n\t\t\t\t\t\t\"Shit,\" Ploy says. \"We need to clear up and get out of here.\n\n\t\t\t\t\t\tYou scramble about, clearing up the camp and setting off.\n\n\t\t\t\t\t\t*goto checkpoint_save\n\n\t\t\t\t\t#Go in for the kill\n\t\t\t\t\t\tYou rush over to the downed opponent. He looks up at you in a daze. You bring out all of the power you find within your spirit. The spirit whizzes much more violently than usual. \n\n\t\t\t\t\t\tYou sense that it is repulsed by the Templar. You try to get control of your body but it starts to move on its own. Power starts to seep into your bones and muscles.\n\n\t\t\t\t\t\t*if spirit_illusion=true\n\t\t\t\t\t\t\tYour hands start to shimmer a bright pink.\n\t\t\t\t\t\t*if spirit_flames=true\n\t\t\t\t\t\t\tA blazing flame\tforms around your hands.\n\t\t\t\t\t\t*if spirit_nature=true\n\t\t\t\t\t\t\tThorns form around your hands.\n\t\t\t\t\t\t*if spirit_summoning=true\n\t\t\t\t\t\t\tA brown energy covers your hands and then claws form. \n\t\t\t\t\t\t*if spirit_water=true\n\t\t\t\t\t\t\tA blue energy covers your hand and watery blades form.\n\t\t\t\t\t\tYour hands start to move by themselves. Before you know it your enhanced fists have smashed into Captain's face. You keep punching and punching until his face becomes a bloodied pulp.\n\n\t\t\t\t\t\tYou throw once more at his head. His neck makes a loud snap. \n\n\t\t\t\t\t\tOnce the adrenaline leaves your system you jump back and scream. \n\n\t\t\t\t\t\tYou look down at your bloodied hands. \"W-What just happened?\"\n\n\t\t\t\t\t\tYou grab onto your face. You look through the slits of your fingers at the corpse on the ground. \n\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#You feel repulsed at yourself\n\t\t\t\t\t\t\t#You don't feel anything\n\t\t\t\t\t\t\t#He deserved what happened\n\n\t\t\t\t\t\tYou leave the battlefield and find your way back to your companions. \n\n\t\t\t\t\t\tAfter about ten minutes you find yourself in a familiar area. You realize that you aren't too far from your camp. You navigate through the area with relative ease. When you reach your camp the others are still asleep.\n\n\t\t\t\t\t\tYou sigh in relief. [i]Nothing happened to the others.[/i]\n\n\t\t\t\t\t\tYou then wake the three up.\n\n\t\t\t\t\t\tDemeter groans. He gets up lazily. \"What? What happened?\"\n\n\t\t\t\t\t\t\"Templars,\" you respond.\n\n\t\t\t\t\t\t\"WHAT?\" \n\n\t\t\t\t\t\tYou recount the events that just unfolded.\n\n\t\t\t\t\t\t\"Shit,\" Ploy says. \"We need to clear up and get out of here.\n\n\t\t\t\t\t\tYou scramble about, clearing up the camp and setting off.\n\n\t\t\t\t\t\t*goto checkpoint_save\n\n\n\t\t\t*selectable_if (water_cannon=true) #Cast Water Cannon\n\t\t\t\tYou push out the mana in our body and throw your hands forward. \"Water Cannon,\" you shout. \n\n\t\t\t\tTwo torrents of water spout out from your palms.\n\n\t\t\t\tCaptain throws his hands up. A bright yellow barrier forms a few meters ahead of him. Your spell crashes into the barrier, which loses its bright lustre as you continue to cast your spell.\n\n\t\t\t\tYour opponent furrows his brows. \"Not bad ${name},\" he says. \"But not good enough either.\"\n\n\t\t\t\tThe barrier breaks but before the water can rush at him another barrier forms. \n\n\t\t\t\t[i]Damn it, what do I do?[/i]\n\n\t\t\t\t*choice\n\t\t\t\t\t#Put everything into the spell\n\t\t\t\t\t\tYou take in a deep breath and concentrate on the water flowing out of our palms. You feel at the mana within your body. There is still a lot of it remaining. You then sense at your spirit of water. It is buzzing and crackling wit an energy that you've never experienced before.\n\n\t\t\t\t\t\tThe spirit is whirring frantically, as if drawn to the Templar.\n\n\t\t\t\t\t\t[i]Here goes nothing.[/i]\n\n\t\t\t\t\t\tYou throw all of your energy into the torrent. It increases in size every second, until it is so big that you could fit two people on top of each other in it. \n\n\t\t\t\t\t\tYou gasp as your energy is being sapped. You grit your teeth and keep going. \n\n\t\t\t\t\t\tCaptain's barriers break one after another. You notice that his complexion has whitened. \n\n\t\t\t\t\t\t\"What is going on?\" Captain says weakly. His eyes are widened. The next barrier breaks in a bright yellow light. Your torrent washes the boy away. He crashes against a tree.\n\n\t\t\t\t\t\tYou stop casting the spell and gasp. You pant.\n\n\t\t\t\t\t\t*goto killcaptain\n\n\t\t\t\t\t#Run away\n\t\t\t\t\t\tYou wait for the next barrier to break before making a break for it. You turn and run as fast as you can.\n\n\t\t\t\t\t\t\"Bastard, where do you think you're going?\" Captain shouts. \n\n\t\t\t\t\t\tYou look back and see the boy has started chasing you. He's quite far away though.\n\n\t\t\t\t\t\t[i]I can do this.[/i]\n\n\t\t\t\t\t\t\"No you don't!\"\n\n\t\t\t\t\t\tYou look back again. A yellow bolt flies your way. You can't react in time. You are hit square in the face and are thrown back. You crash into a tree.\n\t\t\t\t\t\t*goto templarfight_injured\n\n\t\t\t*selectable_if (wall_of_fire=true) #Cast Wall of Fire\n\t\t\t\tYou push out the mana in your body and throw your hands up. \"Wall of Fire,\" you shout.\n\n\t\t\t\tA couple meters ahead of you flames starts to sprout out of the ground. A blazing wall made of fire stands between you and your opponent.\n\n\t\t\t\t\"Bravo,\" Captain says. \"What a useless spell you have there. You think that will keep me at bay?\"\n\n\t\t\t\tYellow bolts of light fly at the flames. Before they can pass through they dissipate into clouds of smoke.\n\n\t\t\t\t\"What? You talked so big just a moment ago,\" you say. \"Where's all of that confidence.\"\n\n\t\t\t\t\"Shut your trap, mongrel!\"
