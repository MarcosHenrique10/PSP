\n\n\t\t\t\tEven more bolts start flying at you. You grit your teeth.\n\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Create another wall placed defensively\n\t\t\t\t\t\tYou bolster the wall that you've already made and create one directly behind it. The two merge and create an even bright blaze of fire in the area. You feel the heat coming off the spell. You touch the wall but there is no pain.\n\n\t\t\t\t\t\tThe bolts of yellow energy are now completely ineffective. You decide that now is the time.\n\n\t\t\t\t\t\tYou create one final pillar of flames and then make a sprint for it. \n\n\t\t\t\t\t\t*goto checkpoint_save\n\t\t\t\t\t#Create another wall placed offensively\n\t\t\t\t\t\tYou spot an opening. You push out all of the mana within you and throw your hands forward. Four fiery pillars surround Captain in all directions. \n\n\t\t\t\t\t\tYour opponent screams.\n\n\t\t\t\t\t\tYou look around and realize this is your best opportunity. You make a sprint for it. \n\n\t\t\t\t\t\tAs you run away you constantly look back to see if Captain is catching up.\n\n\t\t\t\t\t\tYour heart thumps in your chest as you make your escape. After about ten minutes you slow down. You can sense that you've lost your attacker.\n\n\t\t\t\t\t\tYou realize that you aren't too far from your camp. You navigate through the area with relative ease. When you reach your camp the others are still asleep.\n\n\t\t\t\t\t\tYou sigh in relief. [i]Nothing happened to the others.[/i]\n\n\t\t\t\t\t\tYou then wake the three up.\n\n\t\t\t\t\t\tDemeter groans. He gets up lazily. \"What? What happened?\"\n\n\t\t\t\t\t\t\"Templars,\" you respond.\n\n\t\t\t\t\t\t\"WHAT?\" \n\n\t\t\t\t\t\tYou recount the events that just unfolded.\n\n\t\t\t\t\t\t\"Shit,\" Ploy says. \"We need to clear up and get out of here.\n\n\t\t\t\t\t\tYou scramble about, clearing up the camp and setting off.\n\n\t\t\t\t\t\t*goto checkpoint_save\n\n\t#Wait for the attack\n\t\tA bright yellow bolt flies at you. You were ready. You leap to the side, the bolt grazes against your cheek. \n\n\t\tYou land behind a thick tree. You clutch onto you chest.\n\n\t\t\"Not so fast,\" Captain shouts. \n\n\t\tYou see a yellow flash out of the corner of your eye. You throw your body onto the ground. \n\n\t\tWith a loud crack the tree snaps and fall onto you. \n\n\t\t\"Argh,\" you roar with guttural impact. You stare at your right leg. It's snapped completely. \n\t\t*choice\n\t\t\t*selectable_if (minor_heal=true) #Cast Minor Heal\n\t\t\t\tYou press your hand against your leg. A warm yellow light flows out of your palm. The energy circles your mangled leg, which starts to mend itself. Bones crack and shift as your leg is repaired.\n\n\t\t\t\tYou grunt and push yourself off the ground. You have a slight limp.\n\t\t\t\t\n\t\t\t\t\"Trying to run away are you?\" Captain says. He cackles. You can hear each footstep as loud as thunder as he approaches. Twigs snap underneath as he rushes over.\n\n\t\t\t\tYou feel a sudden, intense amount of energy well up within your stomach as your fear turns into dread. Your insides burn as you gain a second wind of energy. \n\n\t\t\t\tYou look behind your back and notice that Captain has stopped his chase. You take your chance and sprint away as fast as you can. \n\n\t\t\t\tYour heart thumps in your chest as you make your escape. After about ten minutes you slow down. You can sense that you've lost your attacker.\n\n\t\t\t\tYou realize that you aren't too far from your camp. You navigate through the area with relative ease. When you reach your camp the others are still asleep.\n\n\t\t\t\tYou sigh in relief. [i]Nothing happened to the others.[/i]\n\n\t\t\t\tYou then wake the three up.\n\n\t\t\t\tDemeter groans. He gets up lazily. \"What? What happened?\"\n\n\t\t\t\t\"Templars,\" you respond.\n\n\t\t\t\t\"WHAT?\" \n\n\t\t\t\tYou recount the events that just unfolded.\n\n\t\t\t\t\"Shit,\" Ploy says. \"We need to clear up and get out of here.\n\n\t\t\t\tYou scramble about, clearing up the camp and setting off.\n\n\t\t\t\t*goto checkpoint_save\n\n\t\t\t*selectable_if (mirage=true) #Cast Mirage\n\t\t\t\tYou push your mana through and cast Mirage. Your body disappears into a clone of water and you blink a couple meters away. \n\n\t\t\t\tYou take in a deep breath and cast Mirage again. You realize that you need to create as much distance from Captain as possible, your leg is too destroyed.\n\n\t\t\t\tYou try one more cast but fall to the ground before you can complete it. You grunt and hold onto your right thigh.\n\t\t\t\t*goto templarfight_injured\n\t\t\t*selectable_if (create_illusion=true) #Cast Create Illusion\n\t\t\t\tYou throw your hands out and cast Create Illusion. You create a replica of yourself a couple feet away, praying that will give you enough time to escape.\n\n\t\t\t\tYou try to stand up but your destroyed leg flares out. The pain is excruciating\n\t\t\t\t*goto templarfight_injured\n\t\t\t#Stand up\n\t\t\t\tYou try to get onto your feet, but your right leg is too destroyed. You take one step before falling onto your face. \n\t\t\t\t*goto templarfight_injured\n\t\t\t\n\t#Make a different choice\n\t\t*goto fight1captain\n\n\n\t\t*label templarfight_injured\n\t\t\"Trying to get away are you?\" Captain says. The boy cackles. You can hear each footstep as he approaches you. Twigs snap under his feet.\n\n\t\tYou try to crawl away.\n\n\t\t\"No no, not like that,\" Captain hisses. He slams his foot onto your right knee.\n\n\t\t\"AGH,\" you scream. Your body goes cold and rigid, and you sense death is coming. \n\n\t\tYour hair is grasped onto tightly from behind. \"You're not going anywhere,\" Captain says. \n\n\t\tYou kick at him with your left leg. He catches your foot and twists hard.\n\n\t\tYou scream once again. He kicks you in the ribs. All of the air is sucked out of your body. You gasp.\n\n\t\tHe kicks you in the face. \n\n\t\t\"Scum,\" he says and then spits on you.\n\n\t\tYou can barely see but can make out his gaze. He looks down at you as if you were nothing more than prey. \n\n\t\t\"Enough fun for me,\" he says. He raises his foot high up. A yellow energy comes off it. It grows brighter and brighter by the seconds until you can't keep your eyes open. \"Pray to your disgusting wheel that you'll be reborn once again.\"\n\n\t\tCaptain brings down his foot onto your face. The last thing you can remember is the sound of your neck cracking.\n\n\t\tDarkness ensues. You don't know for how long, but you were flowing in an endless sea of black for an eternity.\n\n\t\tA massive brown wheel slowly starts to come to vision in the distance. It takes what feels like years before you finally reach the wheel. There are thousands of purple wisps flying around the wooden wheel. \n\n\t\tThe wheel gives off a thick, mystical aura. You are drawn to it like a moth to flames, your whole being unable to resist its call upon you. Soon you realize that all of the purple wisps around you are also spirits. You can't see yourself but you realize you are only one of thousands of these purple wisps being attracted by the wheel. \n\n\t\tA voice booms. \"xoijojak aosijo asoud…\"\n\n\t\t\"beionme arrilkjd ahoisd…\"\n\n\t\t\"Where is this voice coming from? Is this the wheel? I can't understand what is being said.\"\n\n\t\t\"Come to me.\"\n\n\t\tYour soul is pulled into the wheel at a terrific speed. \n\n\t\tThe ethereal voice comes again. \"Do not disappoint me again. You'll be given another chance my child, my fragment. Try again to put my plan into effect.\"\n\n\t\t*page_break\n\t\tYou have died and your journey has ended. Try again.\n\t\t*page_break Retry Checkpoint\n\t\t*goto island2\n\n*label sleeping1\n*page_break\nYou were able to make it away from the creature, which stopped following you after you reached a hundred meters away from it.\n\nHours pass by, yet Ploy doesn't seem to be able to wake from whatever enchantment has been put on her. Her forehead is hot to the touch, and no matter what spell Mbali casts, nothing seems to cure her.\n\n\"I can't help,\" Mbali says. She seems dejected, the usual glimmer in her eyes having vanished. She snifles. \"I'm so sorry, I've been nothing but useless this whole journey.\"\n\n*choice\n\t#Agree with Mbali\n\t\t(Mbali disapproves) (Demeter disapproves)\n\t\t\n\t\t\"You're not wrong,\" you respond. \"You've not been useful yet. Key word, yet.\"\n\t\t\n\t\tTears well up in the girl's eyes and she starts to bawl.\n\t\t\n\t\t\"What is wrong with you?\" Demeter asks. You shakes his head disapprovingly.\n\t\t\n\t\t*goto sleeping2\n\t\t\n\t#Disagree with Mbali\n\t\t(Mbali approves)\n\t\t\n\t\t\"Don't say that Mbali. You've not been useless at all. Without you we can't be as aggressive as we need to be in order to win this competition.\"\n\t\t\n\t\tDemeter nods. \"${name} is right. Everything has moved smoothly so we haven't had to use your powers yet. Don't worry, everything will work itself out.\"\n\t\t\n\t\tMbali chuckles and wipes away the tears that had formed in her eyes. She smiles. \"Thank you, both of you. I needed that.\"\n\t\t\n\t\t*goto sleeping2\n\t\t\n\t#Stay silent\n\t\t\n\t\tYou decide to not say anything as you don't know what you can say in this situation.\n\t\t*goto sleeping2\n\t\t\n*label sleeping2\n\n\"What do we do?\" you ask as you look at Ploy. \"She looks like she's getting worse by the second.\"\n\n\"It's a curse for sure,\" Mbali says. \"I've never seen one like this before, it's completely evading any mana i push into her body.\"\n\nDemeter grabs his blade staff and slams the blade into the ground. \"There's only one thing we need to do,\" he says. \"If it's a curse, then destroying whatever put the curse on her in the first place should do the trick.\"\n\nYou can't fault his logic, and you also have no other ideas.\n\n\"What is that thing?\" Mbali asks.\n\n*if (observation>10)\n\tYou think back at the image of the creature. You remember that it was made out of a darker bark than any of the trees near it. You remember seeing a similar image before in one of your textbooks in the academy.\n\t\n\t\"I think it might be a Treant,\" you say.\n\t\n\tDemeter shakes his head. \"Treants are supposed to be protectors of the forest, of nature itself. That thing is everything but a protector. I sense a dark energy from it.\"\n\t\n\t\"Then maybe it's a Cursed Treant?\" you respond. \"That's the only thing I can think of.\"\n\t*goto sleeping3\n*elseif (intelligence>10)\n\t\"It has to be a Cursed Treant,\" you say. \"That's the only thing that I can remotely think of that matches the description of what we're facing.\"\n\t\n\t\"A cursed treant.\" Demeter frowns. \"Treants are supposed to be protectors of the wild, to defend nature itself. For it to attack us when we haven't done anything to harm this forest… Yes, it has to be cursed in some way. Maybe that same curse has taken hold on Ploy.\"\n\t*goto sleeping3\n*else\n\tYou shrug. \"That's not something I've ever heard of. A sentient tree which just has a mouth and can cast curses. Thinking about it, isn't this a little absurd?\"\n\t\n\t\"That description…\" Mbali scratches the back of her head. \"A Treant. It's a Treant!\"\n\t\n\t*goto sleeping3\n\n*label sleeping3\n\"How do we fight it?\" you ask.\n\n\"Head on,\" Demeter says. \"Keep it clean and simple.\"\n\nYou frown. \"I don't think we have the luxury to keep it that simple.\"\n\n\"Well, what do you suggest?\"\n\n\"Obviously fire,\" you respond. \"Trees are notoriously weak against fire. We could set the forest on fire, maybe that'll kill it.\"\n\n\"Absolutely not,\" Mbali jumps in. \"We aren't going to start a forest fire, that's completely out of the question.\"\n\n\"No, let ${name} speak,\" Demeter says. \"We're in a pocket dimension so it doesn't matter what we do.\"\n\n\"That doesn't make it any better.\" Mbali crosses her arms together.\n\n\"Calm down you two,\" you say. \"Alright, we'll think of something on the fly instead.\"\n\nDemeter grins. \"Now that's more of my wavelength. Let's destroy that hunk of wood and release our damsel in distress.\"\n\n\"Who is going to stay with Ploy?\" Mbali asks. \n\nYou think about it for a while before deciding…\n\n*choice\n\t#Mbali should stay\n\t\t\"Mbali, why don't you stay?\" you say. \"You're better at healing anyway and if Ploy takes a turn for the worse I'm uncertain Demeter or I will be of proper help.\"\n\t\t\n\t\t\"Okay, that's fine,\" she responds. \"I believe in you two. Go and finish that monster off.\"\n\t\t\n\t\tDemeter pumps his chest out and says, \"Don't you worry, this will be a piece of cake.\"\n\t\t*goto treant_demeter\n\t#Demeter should stay\n\t\t\"Demeter, why don't you say?\" you say. \"I don't know why, but I get the feeling we might be getting ambushed, and I know you're going to be able to defend Ploy in case that happens.\"\n\t\t\n\t\tDemeter rubs his chin and then nods. \"I suppose you're right, I think I'd deal best with an ambush and being able to protect Ploy.\"\n\t\t\n\t\tYou look to Mbali. \"Let's go.\"\n\t\t*goto treant_mbali\t\t\n\t*selectable_if (cerberus=true) #You will stay\n\t\t\"I should stay,\" you say. \"I can summon my Cerberus to protect me and Ploy in case anything happens.\"\n\t\t\n\t\t\"Very well,\" Demeter says. \"Mbali, let's go and destroy that walking piece of bark.\"\n\t\t*goto treant_you\n\t\n*label treant_demeter\n*page_break\nYou make your way into the forest along with Demeter. The boy's armour glows under the moonlight and you can sense a large amount of mana being exuded by it.\n\nHe's really getting ready for a battle, you think to yourself, as you watch Demeter's confident strides forward. \n\nAlmost immediately after entering a hundred meter distance from the Cursed Treant makes it's turtle like approach to you. With each step that it takes closer to you, you feel your throat seizing up and your heart exploding in pace. \n\nYou look to Demeter, who has a much cooler expression than you do. He seems so calm despite the imminent battle. His eyes meet yours and he gives you a weak smile. He then looks to the Cursed Treant and you see that his gaze is filled with determination.\n\n\"Let's do this,\" Demeter says. He holds onto his blade staff and then rushes forward. The Cursed Treant opens it's grotesque mouth and lets out a sound similar that of a felled tree hitting the ground. \n\nBrown vines fly out of the creature's mouth toward you. \n\n*if (dexterity>10) \n\tYou jump out of the way just in time. You roll forward and avoid more vines before hiding behind a thick tree nearby.\n\t\n*if (dexterity\u003c10)\n\tYou muffle a scream as a vine pierces your shoulder. Blood pours out of your wound and you jump to the side as another vine flies at you. You find a nearby tree and hide behind it.\n\t*set health -10\n\t\nYou pant heavily. \"Demeter,\" you shout. \"Tell me when you're ready.\"\n\n\"No problem,\" Demeter shouts back. \n\nYou take a peak from behind the tree but immediately move your head back as a vine comes shooting at your face.\n\n\"This thing is locked onto me,\" you say. \"Make use of that please, before I get killed.\"\n\n\"Don't worry,\" Demeter responds, his voice quiet due to the distance he is from you. \"I have a plan.\"\n\nYou wait for what feels like an eternity. Finally, Demeter calls out, \"Get ready.\"\n\nYou push the mana within your body to it's fullest and decide to prepare to cast…\n\n*choice\n\t*selectable_if (lesser_fireball=true) #Lesser Fireball\n\t\tYou wait for the signal. It comes seconds later.\n\t\t\n\t\tDemeter shouts, \"Let's go!\"\n\t\t\n\t\tYou rush out from behind the tree and throw a dozen fireballs at the Cursed Treant. Vines come flying your way but are destroyed the moment your fire impacts against them. You keep forming new fireballs and fling them at your opponent. \n\t\t\n\t\tThe fireballs impact against the Treant but don't seem to be doing much damage.\n\t\t\n\t\t*if (observation>10)\n\t\t\tYou spot a patch of bark that is a completely different colour near the Cursed Treant's mouth. You don't think too much about it and decide to throw a couple fireballs at that area. \n\t\t\t\n\t\t\tThe creature roars in pain as the flames hit the area. Suddenly the area bursts into fire and the Treant stops moving.\n\t\t\t\n\t\t\t\"Perfect stuff,\" Demeter says. He flies down from from a tree branch above and slams his blade staff into the Treant. The sharp blade slices cleanly through the creature and splits it in half. \n\t\t\t\n\t\t*if (observation\u003c10)\n\t\t\tYou continue to throw the fireballs but they don't seem to have much of an effect. You feel your mana is being drained rather quickly.\n\t\t\t\n\t\t\t\"Demeter, please help,\" you shout. You throw yourself to the ground and dirt and vines are thrown your way. \n\t\t\t\n\t\t\t\"I got you,\" Demeter calls. He flies down from a tree branch above and slams his blade staff into the Treant. The sharp blade slices cleanly through the creature and splits it in half.\n\t\t\t\n\t\t*goto after_treant\n\t\t\n\t*selectable_if (flame_dash=true) #Flame Dash\n\t\tYou wait for the signal. It comes seconds later.\n\t\t\n\t\tDemeter shouts, \"Let's go!\"\n\t\t\n\t\tYou push your mana through to the soles of your feet and run out from behind the tree. Vines and thorns come flying your way. You start to move so fast that you're able to see the incoming projectiles in slow motion. You run in a straight line toward the Cursed Treant, leaving a trail of fire behind you. You start to run circles around the creature before it can make any reaction. A circle of flames bursts forth around it. You run out of the way as the Cursed Treant tries to slam itself into you. \n\t\t\n\t\t\"Perfect distraction,\" Demeter calls out. You look up and find the dark elf jumping down from a tree branch. He holds his blade staff high above his head and then slams it into the creature. He slices cleanly through the Treant and splits it in half.\n\t\t*goto after_treant\n\t\t\n\t*selectable_if (mud=true) #Cast Mud\n\t\tYou wait for the signal. It comes seconds later.\n\t\t\n\t\tDemeter shouts, \"Let's go!\"\n\t\t\n\t\tYou press your hands onto the ground, causing mud to form all around you. You jump out from behind the tree. Vines and thorns fly your way. The Treant is completely focused on you and starts to chase you. \n\t\t\n\t\tWIth the first step that the creature takes it's whole body falls forward into the mud.\n\t\t\n\t\t\"Nice stuff,\" Demeter shouts. You look up to find the dark elf leap down from a tree branch. He holds his blade staff high above his head and slams it into the Treant's back. His strike connects with such force that the creature is split in half.\"\n\t\t*goto after_treant\n\t\t\n\t#Use your spirit\n\t\tYou wait for the signal. It comes seconds later.\n\t\t\n\t\tDemeter shouts, \"Let's go!\"\n\t\t\n\t\t*if (spirit_flames=true)\n\t\t\tYou concentrate on the spirit of flames housed within you. A burst of red energy comes forth from it and you rush out from behind the tree. You aim your palms at the Cursed Treant. Flames spew out of your palms, incinerating the creature. Vines and thorns fly your way but are burned asunder by your flames. The creature is set on fire and starts to move backward.\n\t\t\t\n\t\t\t\"That's it,\" Demeter shouts. You look up to see the boy leap from a tree branch. He holds his blade staff high up above his head and then slams it down at the Treant. The blade hits with such force that it slices cleanly through the Treant and splits it in half.\n\t\t\t\n\t\t\t*goto after_treant\n\t\t*if (spirit_illusion=true)\n\t\t\tYou concentrate on the spirit of illusion within you. A burst of pink energy springs forth from you and you rush out from behind the tree. You dodge vines and roots that fly your way and aim your hands at the Treant. The creature momentarily stops attacking you.\n\t\t\t\n\t\t\t\"That's it,\" Demeter shouts. You look up to see the boy leap from a tree branch. He holds his blade staff high up above his head and then slams it down at the Treant. The blade hits with such force that it slices cleanly through the Treant and splits it in half.\t\t\t\n\t\t\t*goto after_treant\n\t\t*if (spirit_nature=true)\n\t\t\tYou concentrate on the spirit of nature housed within you. A burst of brownish-green energy springs forth from you and you rush out from behind the tree. You raise your hands up causing a shield made up of bark to form. Vines and roots from the Treant's attack are caught in your shield. Your shield absorbs all of the projectiles and then throws them back at the Cursed Treant.\n\n\t\t\t\"That's it,\" Demeter shouts. You look up to see the boy leap from a tree branch. He holds his blade staff high up above his head and then slams it down at the Treant. The blade hits with such force that it slices cleanly through the Treant and splits it in half.\t\t\t\n\t\t\t*goto after_treant\n\t\t*if (spirit_water=true)\n\t\t\tYou concentrate on the spirit of water housed within you. A burst of blue energy springs forth from you and you jump out from behind the tree. Vines and thorns fly your way. You raise your hand up. Water forms in front of you and catches the projectiles. You then unleash a wave of water at the Treant. Your opponent is dazed and stops attacking.\n\n\t\t\t\"That's it,\" Demeter shouts. You look up to see the boy leap from a tree branch. He holds his blade staff high up above his head and then slams it down at the Treant. The blade hits with such force that it slices cleanly through the Treant and splits it in half.\t\t\t\n\t\t\t*goto after_treant\n\t\t\t\n\t\t*if (spirit_summoning=true)\n\t\t\tYou concentrate on the spirit of summoning housed within you. A burst of brown energy springs forth from you and you jump out from behind the tree. You jump out of the way as vines and thorns fly your way. You fling your hands forward. Cerberus forms behind the Treant. The creature turns to face your summon. Cerberus' three heads simultaneously spout flames at your opponent.\n\t\t\t\n\t\t\t\"That's it,\" Demeter shouts. You look up to see the boy leap from a tree branch. He holds his blade staff high up above his head and then slams it down at the Treant. The blade hits with such force that it slices cleanly through the Treant and splits it in half.\t\t\t\n\t\t\t*goto after_treant\n\n\n*label treant_mbali\n*page_break\nYou make your way through the forest along with Mbali. You're able to see the Cursed Treant in the distance, however it isn't moving. Not until you reach within a one hundred meter range of it. Once within that range the creature makes a slow approach to you. It has rather large strides but each step takes a long time to come to fruition, roughly taking ten seconds each. \n\nYou notice a nervous energy coming from Mbali the moment she first lays eyes on the creature. You pat her on the back. \"It's okay, we'll get this done in no time,\" you say.\n\nMbali gulps. \"We have no choice, let's do this.\"\n\n\"Do you have any way of defeating it? I can be a distraction pretty easily.\" You look to your companion with hope.\n\nMbali nods. \"I think I can do something. Seeing it first hand is different than what you were explaining before. I can sense a lot of cursed aura from it, I just need the time to set up a spell to dispel the curse.\"\n\nYou take in a deep breath. \"Okay, good, how much time do you need?\"\n\n\"About a minute. I need you to distract it from me for just a minute. I think that's enough time.\"\n\n\"Alright, I'll catch it's attention from up front and you loop around and do what you need to do.\"\n\nWith your course of action created, you decide to initiate the plan.\n\n*page_break\nYou wait until Mbali is far away enough and then you rush forward. The Cursed Treant opens it's grotesque mouth and lets out a sound similar that of a felled tree hitting the ground.\n\nBrown vines fly out of the creature's mouth toward you.\n\n*if (dexterity>10) \n\tYou jump out of the way just in time. You roll forward and avoid more vines before hiding behind a thick tree nearby.\n\t\n*if (dexterity\u003c10)\n\tYou muffle a scream as a vine pierces your shoulder. Blood pours out of your wound and you jump to the side as another vine flies at you. You find a nearby tree and hide behind it.\n\t*set health -10\n\t\nYou pant and then calm yourself down. You take in slow breaths. You look out from behind the tree and immediately push your head back as vines come flying at you.\n\n*choice\n\t*selectable_if (water_wall=true) #Cast Water Wall\n\t\tYou push the mana within your body forth. You feel your insides welling up with power. You jump out from behind the tree and raise a wall made out of water a couple meters ahead of you. Thorns and vines race at you but are blocked by the wall. You edge closer to the Treant, forming large water walls each time you need to. \n\t\t\n\t\tThe creature roars and stops throwing it's vines and thorns. It instead decides to continue it's approach to you. \n\t\t\n\t\t[i]Perfect, come to me.[/i]\n\t\t\n\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms. The creature's focus is completely on you.\n\t\t\n\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\t\t\n\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t*goto after_treant1\n\t\t\n\t*selectable_if (wall_of_fire=true) #Cast Wall of Fire\n\t\tYou push the mana within your body forth. You feel your insides welling up with power. You jump out from behind the tree and raise your hands up. A wall of fire forms a couple meters ahead of you. Thorns and vines race at you but are burned asunder by the wall. You edge closer to the Treant, forming large fiery walls each time you need to. \n\t\t\n\t\tThe creature roars and stops throwing it's vines and thorns. It instead decides to continue it's approach to you. \n\t\t\n\t\t[i]Perfect, come to me.[/i]\n\t\t\n\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms. The creature's focus is completely on you.\n\t\t\n\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\t\t\n\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t*goto after_treant1\n\t\t\n\t*selectable_if (create_illusion=true) #Cast Create Illusion\n\t\tYou push the mana within your body forth. You feel your insides welling up with power.  You form an image of yourself that has moved out from behind the tree. Vines and thorns rush at the image you created. You run in the opposite direction toward the Treant. You create a constant flow of illusions of yourself, confusing the Treant to the point that it no longer knows which one to attack. Instead it completely stops attacking and decides to approach you.\n\t\t\n\t\t[i]Perfect, come to me.[/i]\n\t\t\n\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms. The creature's focus is completely on you.\n\t\t\n\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\t\t\n\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t*goto after_treant1\n\t\t\n\t*selectable_if (mud=true) #Cast Mud\n\t\tYou push the mana within your body forth. You feel your insides welling up with power.  \t\tYou press your hands onto the ground, causing mud to form all around you. You jump out from behind the tree. Vines and thorns fly your way. The Treant is completely focused on you and starts to chase you, albeit slowly. \n\t\t\n\t\tAfter taking about three steps the Treant slips and falls forward into the mud.\n\t\t\n\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms.\n\t\t\n\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\t\t\n\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t*goto after_treant1\n\t#Use your spirit\t\t\n\t\t*if (spirit_flames=true)\n\t\t\tYou concentrate on the spirit of flames housed within you. A burst of red energy comes forth from it and you rush out from behind the tree. You aim your palms at the Cursed Treant. Flames spew out of your palms, incinerating the creature. Vines and thorns fly your way but are burned asunder by your flames. The creature is set on fire and starts to move backward.\n\t\t\t\n\t\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms.\n\n\t\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\n\t\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t\t\n\t\t\t*goto after_treant1\n\t\t*if (spirit_illusion=true)\n\t\t\tYou concentrate on the spirit of illusion within you. A burst of pink energy springs forth from you and you rush out from behind the tree. You dodge vines and roots that fly your way and aim your hands at the Treant. The creature momentarily stops attacking you.\n\t\t\t\n\t\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms.\n\n\t\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\n\t\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t\t*goto after_treant1\n\t\t*if (spirit_nature=true)\n\t\t\tYou concentrate on the spirit of nature housed within you. A burst of brownish-green energy springs forth from you and you rush out from behind the tree. You raise your hands up causing a shield made up of bark to form. Vines and roots from the Treant's attack are caught in your shield. Your shield absorbs all of the projectiles and then throws them back at the Cursed Treant.\n\n\t\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms.\n\t\t\n\t\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\n\t\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t\t*goto after_treant1\n\t\t*if (spirit_water=true)\n\t\t\tYou concentrate on the spirit of water housed within you. A burst of blue energy springs forth from you and you jump out from behind the tree. Vines and thorns fly your way. You raise your hand up. Water forms in front of you and catches the projectiles. You then unleash a wave of water at the Treant. Your opponent is dazed and stops attacking.\n\n\t\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms.\n\n\t\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\n\t\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t\t*goto after_treant1\n\t\t\t\n\t\t*if (spirit_summoning=true)\n\t\t\tYou concentrate on the spirit of summoning housed within you. A burst of brown energy springs forth from you and you jump out from behind the tree. You jump out of the way as vines and thorns fly your way. You fling your hands forward. Cerberus forms behind the Treant. The creature turns to face your summon. Cerberus' three heads simultaneously spout flames at your opponent.\n\n\t\t\tYou spot Mbali has looped around the creature. A yellowish green light is blazing out from her palms.\n\n\t\t\tMbali raises her hands forward and shouts, \"Dispel Curse.\"\n\n\t\t\tThe light from her hands forms into a ray aimed at the Cursed Treant. The moment the ray of light touches the monster, it stops moving. A dark energy escapes from the Treant and rushes into the sky. You look up in awe at the amount of cursed energy being released from the Treant. After a couple of moments the Treant's mouth closes up and it's roots sink into the soil. You stare at what now has become a simple tree in a forest.\n\t\t\t*goto after_treant1\n\n\n*label treant_you\nYou watch as your companions make their way into the forest. You immediately push your mana forth and summon Cerberus. Your three headed hound patrols around your camp vigilantly, in case of an ambush.\n\nYou look down at Ploy, her complexion quite pale and her breathing ragged. \n\nTen minutes go by.\n\nThe girl starts coughing.\n\nYou scramble to your backpack and take out a bottle of water. Ploy's eyes slowly start to open, and you help her get a drink of water.\n\n\"Are you okay?\" you ask. \n\nPloy weakly groans.\n\n\"Don't speak,\" you quickly add. You help her onto a seated position and give her the water in little sips.\n\nMoments later Mbali and Demeter come walking back. Demeter is holding onto his shoulder. Mbali heals it by pressing her hand onto it, after which a green light follows as she casts her heal.\n\n*goto treantcamp\n\n*label after_treant\n\n\"We did it,\" you say whilst panting. You look at the corpse of the creature. A dark light escapes from within it and rushes into the atmosphere.You shiver at the sight.\n\nDemeter coughs. \"We did do it. Let's get back to camp and check on Ploy.\"\n\n*goto treantcamp\n\n*label after_treant1\n\"We did it,\" you say whilst panting. You stare at the newly formed tree of the forest, your mind filled with both amazement and fear. \n\n[i]Magical creatures are even crazier than I expected.[/i]\n\n\"Quickly, let's go back and check on Ploy,\" Mbali says.\n*goto treantcamp\n\n*label treantcamp\n*page_break\nYour party is sat around a new camp fire. Ploy has started to regain her strength. You gaze rather solemnly at the girl. \n\nYou've noticed that anything can happen in this competition. \n\n\"Don't look at me so worried,\" Ploy says as she meets your gaze. She smiles. \"That was nothing. And thank you all, I'm really sorry for putting us in a bad situation.\"\n\n\"Don't say that,\" Mbali says. \"We're a team, and that could have been any of us.\"\n\nDemeter laughs. \"Ahh don't talk like that you two. This isn't real, we can't actually get hurt in here.\"\n\n\"But still,\" Mbali says. \"We're a team and we're going to work together to win this.\"\n\n*choice\n\t#\"What do we do next?\"\n\t\t\"We should rest,\" Mbali says. \"Properly rest this time. Let's take it easy tomorrow.\"\n\t\t\n\t\tDemeter and Ploy both nod.\n\t\t\n\t\t*goto checkpoint_save\n\t\t\n\t#\"Today was a crazy day.\"\n\t\t\"It was so amazing though,\" you add. \"I've never been tested like this before, and it's fun to be able to experience this with you all.\"\n\t\t\n\t\t\"You're making me blush,\" Demeter says with a chuckle.\n\t\t\n\t\tYou roll your eyes and then look up at the sky. You take in your environment and stage you are at right now. You smile.\n\t\t*goto checkpoint_save\n\t#\"Don't worry too much.\"\n\t\t\n\t\t\"Yes,\" Demeter responds. \"Winning or losing here isn't at any high stakes. So let's just enjoy this, because it won't always be like this.\"\n\t\t\n\t\t\"You're right on that,\" Ploy says. \"But still, thank you guys.\"\n\t\t\n\t\t*goto checkpoint_save\n\t\n\n*label checkpoint_save\n*page_break End of Chapter\n*goto_scene tournament_heart2", "tournament_heart2": "The next few days go by rather smoothly, you find yourself in constant battle, be it against other competitors or monsters. Despite this, you prevail through all obstacles.\n\nOn the sixth day you finally make it to the tower. After so much blood, sweat and tears have been shed, you've reached the first part of your goal. \n\nYou feel\n\n*fake_choice\n\t#Prepared\n\t\t\n\t#Energized\n\t\t\n\t#Scared\n\t\t\n\t#Underwhelmed\n\t\t\nYou don't know what awaits inside, but you sense that it'll be a much more difficult trial than what you've been subjected to so far. There's a sense of excitement laced within your fear.\n\nThe tower is even bigger now that you are standing beside it. It's walls are made out of a matte black, smooth material. It looks perfect, weirdly so. The wall reflects the sunlight from above, and you're even able to slightly make out your reflection. You chuckle as you don't see yourself, but the fake body you'd decided to don for the competition. \n\nThere is a rather large entrance in front of you. There are torches lined up against the corridor that it leads to. You look to your companions. Demeter seems to be brimming with energy. He wiggles his neck around and claps his hands. Mbali seems much more reserved, you sense almost no emotion exuding from her loose expression. Ploy looks back at you all and smiles.\n\nYou roll your neck and take in a deep breath. \"Let's do this.\"\n\nYou walk past Ploy and take the first step into the tower. The air is different inside the tower. It is much heavier and filled with a much higher concentration of arcana. You hold onto your chest as your breathing becomes more laboured. At the same time, you get the sense that you'll be able to fight day and night without having to worry too much about depleting your mana resources.\n\n[i]If only I could meditate here and try to improve my cultivation level.[/i]\n\nYou walk aimlessly for a couple of minutes. The corridor is filled with torches and seems to never end. Outside of the sound of your boots hitting the ground with each stride and the flickering of the flames, there is complete silence. You furrow your brows. \"This feels a bit off, don't you guys think?\"\n\n\"…\"\n\nYou shuffle about uncomfortably and scratch your neck. \"Guys?\"\n\n\"…\"\n\nYou turn around. There is nobody there.  Your heart sinks.\n\nYou start walking back the way you came but are unable to get back to the entrance. The entrance is nowhere to be found, nor are your party members. Realizing that you are now stranded and with no other option but to continue onward, you turn back around and continue along your original direction of the corridor. \n\n*page_break\nTen minutes go by. It's only after this that you finally reach what looks to be an exit. A black door is in front of you. A cold, frosty air blows out from behind the door. You shiver. You rub your shoulders with your hands and then get closer to the door. \n\nYou put your hand on the doorknob. Surprisingly, it isn't that cold to the touch. You furrow your brows. The handle doesn't budge an inch.\n\nYou put as much strength as possible into twisting the handle, but to no avail. \n\n[i]What do I do now?[/i]\n\n*choice\n\t#Cast a spell\n\t\tYou think to yourself to cast one of your spells but then quickly push that thought to the side. You're unsure what could happen and what is waiting behind the door. Instead, you remember Ploy telling you that the tower may have certain mechanisms that require you to push mana into them before they can activate.\n\t\t\n\t\tGiven that you're at a dead end, you decide to do this. You push some mana into the door handle. The door opens with ease this time around.\n\t\t\n\t\t*goto behind_door\n\t\t\n\t#Grab a torch\n\t\tYou move to one of the torches nearby in the room and pick it up. The flames that are dancing aren't too hot. You go over to the door and place the torch onto the handle. \n\t\t\n\t\t\"Maybe this will work,\" you mutter. \n\t\t\n\t\tAs if hearing your words, there comes a click from within the door. You quickly put the torch back and unlock the door.\n\t\t\n\t\t*goto behind_door\n\t*selectable_if (observation>10) #You notice a small crack in the door hinge\n\t\tYou immediately push some mana into your fists and then punch the door hinge. The door flies open with ease. With a loud crash it falls to the ground in front of you.\n\t\t\n\t\t*goto behind_door\n\n*label behind_door\nYou shiver even more after entering the new room. It is rather spacious, and the floor is made completely out of ice. You make very small, careful steps, but almost fall to the ground. \n\n[i]Damn it, what do I do about this floor? I'll just keep on slipping at this rate.[/i]\n\n*choice\n\t*selectable_if (intelligence>10) #Push mana into your feet\n\t\tYou remember a simple fix to most issues in the world is simply magic. You concentrate some of your mana to the soles of your feet and then are able to walk much more easily.\n\t\t*goto room1\n\t\t\n\t*selectable_if (dexterity>10) #You don't worry as you have impeccable balance\n\t\tYou've already practised your balance to the death and know that you can simply walk across the ice and not fall down as long as you're extra careful.\n\t\t*goto room1\n\t\t\n\t#Move with care\n\t\tYou decide to walk much more slowly, making sure that you shift your balance equally before each step.\n\t\t*goto room1\n\t\n*label room1\nAs you make your way through the room, you shiver. It is getting colder by the second, and you start to wish that you were back at your camp fire along with your companions. Ahead of you, about twenty meters away, you notice a silhouette. The silhouette starts to make way to the shape of a human. You squint your eyes and soon find yourself standing across from a rather tall, burly boy who looks to be in his late teens. He has short brown hair and is smiling at you.\n\n\"Who are you?\" you call out.\n\n\"I should be asking you that,\" the boy responds. His voice is rather deep and rough. \n\nThe pair of you look up simultaneously as a blue light forms above. The outline of a person's face forms in the screen, but you're unable to make out any details. \"Welcome,\" a woman says. \"Congratulations for making it all the way to this here tower. You've survived outside, which is an accomplishment in and of itself.\"\n\n\"What the hell? Who are you?\" the boy shouts. \n\n\"The owner of this here tower,\" she replies. \"Now, since you've reached my home, the rules of this competition are changing. You'll no longer be accompanied by your companions. From this point forward, you are on your own.\"\n\n\"That is bullshit!\" The boy slams his fist into the ground.\n\n\"Now now, that isn't language you should be using. Remember, this event is being broadcasted for all to see.\"\n\nYou take in a deep breath. [i]I'm on my own now? That can't be good.[/i]\n\n\"Anyhow, enough talking. You two are to fight to the death or until one of you admits defeat. Only the winner will move on proceed through my tower.\"\n\nThe blue screen disappears. Your eyes lock with the boy's.\n\n*fake_choice\n\t#Rush in\n\t\tYou take advantage of the situation and run forward at your opponent. You catch him by surprise and slash a dagger at his thigh. The boy yelps and slams a fist down at you.\n\t\t\n\t\t*if dexterity>10\n\t\t\tYou duck your head under the punch and kick at his leg before stabbing your dagger into his chest. You jump back just as he is about to launch another fist at your face.\n\n\t\t*if dexterity\u003c10\n\t\t\tYou raise your hands and block his attack. You are pushed back and fall to the ground. You scramble back onto your feet and distance yourself a couple of meters.\n\t\t\t\n\t\tYour opponent is visibly enraged. He bares his teeth and roars. He presses his hands together. A bright red light is emitted from his palms. A beam of fire forms in his palms and then rushes at you.\n\t\t\n\t\t*fake_choice\n\t\t\t*selectable_if (water_wall=true) #Cast Water Wall\n\t\t\t\tYou push your mana to its limits and form a wall of water in front of you just as the flames are about to reach you. Steam forms where your attack blocks his.\n\t\t\t\t\n\t\t\t\tThe boy grunts and then says, \"Nice thing you did there. Don't count on it working again.\"\n\t\t\t\t\n\t\t\t\tYou tilt your head. \"Wasn't planning on it.\"\n\t\t\t\t\n\t\t\t\tYou feel at the spirit housed within you. \n\t\t\t\t\n\t\t\t\t[i]Help me out here a little.[/i]\n\t\t\t\t\n\t\t\t\t*if spirit_illusion=true\n\t\t\t\t\tA pink energy flows out of your palms and then swarms at your opponent. He stands frozen to the spot. You immediately run forward, your daggers in hand then slash at his exposed neck. A blue burst of light forms from the boy and he disappears in a spectacle of the light, his body shattering and leaving behind nothing but the blue light.\n\t\t\t\t\t*goto battle1_end\t\t\t\t\t\n\t\t\t\t*if spirit_flames=true\n\t\t\t\t\tA red energy flows out from your body as you convene with your spirit of flames. You grin and then throw your hands forward. A huge torrent of flames, much bigger than what your opponent had conjured, burst out. Your flames engulf the boy. You watch as his body shatters into blue light.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t*if spirit_water=true\n\t\t\t\t\tA blue energy flows out from your body and you feel your body temperature lowering slightly. You push out the energy. A vortex of water forms underneath your opponent, launching him high up into the air. You hear a loud thud as his body hits the ceiling of the room. You watch as his body falls to the ground. His head slams against the icy floor, after which his body shatters into blue light.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t*if spirit_summoning=true\n\t\t\t\t\tA brown energy pulses from within you. You focus that energy to behind your opponent. A reticulated python forms out of your magic. \n\t\t\t\t\t\n\t\t\t\t\t\"Ahh,\" the boy screams. He falls to the ground. Your summoned snaked wraps it's thick, meaty body around the boy and squeezes tightly. The boy claws and scratches as he tries to get out of its grip. \n\t\t\t\t\t\n\t\t\t\t\tYou run forward, daggers in hand. You slam them down onto his head. His body shatters into a blue light, leaving you alone in the room with your summon.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t*if spirit_nature=true\n\t\t\t\t\tA green energy flows out from your body. You press your palms onto the ground. Roots and vines sprout out from behind the boy. He is caught off guard. The vines wrap around his neck and squeeze tightly. He tries to fight against it but soon vines grab onto his arms and legs, immobilizing him completely. The boy starts to suffocate.\n\t\t\t\t\t\n\t\t\t\t\tYou decide to end his misery quickly. You run over to him and slam your daggers into his skull. A blue light escapes as he is transported out of the pocket dimension.\n\t\t\t\t\t*goto battle1_end\t\t\t\t\n\t\t\t*selectable_if (wall_of_fire=true) #Cast Wall of Fire\n\t\t\t\tYou push your mana to its limits and form a wall of fire just in time as the flames are about to reach you. The ice on the ground starts to melt under the intense heat of the two spells. \n\t\t\t\t\n\t\t\t\tThe boy chuckles. \"Flames as well? Unfortunate for you, but I'm simply stronger in this situation.\"\n\t\t\t\t\n\t\t\t\tYou furrow your brows. [i]What is he talking about?[/i]\n\t\t\t\t\n\t\t\t\tYour answer comes moments later. Your wall of fire is destroyed and his flames continue onto you. You jump away from the spell but are singed in his fire. You pat your right shoulder which is on fire. Just then another stream of fire rushes at you.\n\t\t\t\t\n\t\t\t\tThe slippery ice dissipates, making way for solid ground. You use this and start to duck and weave from the flames. You grit your teeth, the pain on of your right shoulder starting to become unbearable. \n\t\t\t\t\n\t\t\t\t\"Where do you think you're running,\" the boy shouts. He laughs and continues his onslaught. \"You know what, I'll give you a breather. Not like you can do anything.\"\n\t\t\t\t\n\t\t\t\tYou furrow your brows. \"I don't think that's smart.\"\n\t\t\t\t\n\t\t\t\t\"This is just the chasm of a difference between us,\" he retorts. \"You're helpless against me.\"\n\t\t\t\t\n\t\t\t\tYou take in a deep breath and then focus on the spirit housed within you.\n\t\t\t\t\n\t\t\t\t[i]Help me take out this arrogant piece of crap.[/i]\n\t\t\t\t\n\t\t\t\t*if spirit_illusion=true\n\t\t\t\t\tA pink energy flows out of your palms and then swarms at your opponent. He stands frozen to the spot. You immediately run forward, your daggers in hand then slash at his exposed neck. A blue burst of light forms from the boy and he disappears in a spectacle of the light, his body shattering and leaving behind nothing but the blue light.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t*if spirit_flames=true\n\t\t\t\t\tA red energy flows out from your body as you convene with your spirit of flames. You grin and then throw your hands forward. A huge torrent of flames, much bigger than what your opponent had conjured, burst out. Your flames engulf the boy. You watch as his body shatters into blue light.\n\t\t\t\t\t*goto battle1_end\t\t\t\t\t\n\t\t\t\t*if spirit_water=true\n\t\t\t\t\tA blue energy flows out from your body and you feel your body temperature lowering slightly. You push out the energy. A vortex of water forms underneath your opponent, launching him high up into the air. You hear a loud thud as his body hits the ceiling of the room. You watch as his body falls to the ground. His head slams against the icy floor, after which his body shatters into blue light.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t*if spirit_summoning=true\n\t\t\t\t\tA brown energy pulses from within you. You focus that energy to behind your opponent. A reticulated python forms out of your magic. \n\t\t\t\t\t\n\t\t\t\t\t\"Ahh,\" the boy screams. He falls to the ground. Your summoned snaked wraps it's thick, meaty body around the boy and squeezes tightly. The boy claws and scratches as he tries to get out of its grip. \n\t\t\t\t\t\n\t\t\t\t\tYou run forward, daggers in hand. You slam them down onto his head. His body shatters into a blue light, leaving you alone in the room with your summon.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t*if spirit_nature=true\n\t\t\t\t\tA green energy flows out from your body. You press your palms onto the ground. Roots and vines sprout out from behind the boy. He is caught off guard. The vines wrap around his neck and squeeze tightly. He tries to fight against it but soon vines grab onto his arms and legs, immobilizing him completely. The boy starts to suffocate.\n\t\t\t\t\t\n\t\t\t\t\tYou decide to end his misery quickly. You run over to him and slam your daggers into his skull. A blue light escapes as he is transported out of the pocket dimension.\n\t\t\t\t\t*goto battle1_end\n\t\t\t*selectable_if (dexterity>10) #Dodge\n\t\t\t\tYour body moves almost automatically according to it's own will. You jump to the side as the flames are about to reach you. The boy frowns and then directs his flames to where you are. You dodge again and again, the flames never so much as kissing you. \n\t\t\t\t\n\t\t\t\t\"Stop moving you little rat,\" the boy shouts. \n\t\t\t\t\n\t\t\t\t\"Sure,\" you respond and stand still.\n\t\t\t\t\n\t\t\t\t\"Oh, that was easy.\" The boy cackles.\n\t\t\t\t\n\t\t\t\t\"Or was it?\" You run forward at your opponent just as he blinks. When he opens his eyes once again you have already closed the distance, your daggers in both hands. You roll forward as he aims his flames at you. As you finish your roll you slash at his calves. The boy yelps and then falls to the ground. Blood pores out from where you struck. \n\t\t\t\t\n\t\t\t\tThe boy opens his mouth to speak but you don't give him the luxury. You plunge your daggers into his face. A blue light follows as he's transported out of the pocket dimension.\n\t\t\t\t\n\t\t\t\t*goto battle1_end\t\t\t\t\n\t\t\t#Brace yourself\n\t\t\t\tYou cross your arms against your face and push your mana outward, creating a protective barrier. Flames engulf you. You scream out as the burning sensation covers your whole body. You push out even more mana as you try to fight against the onslaught.\n\t\t\t\t\n\t\t\t\t\"Burn,\" the boy shouts. \"Burn you little rat!\"\n\t\t\t\t\n\t\t\t\tYour vision starts to fade away as the sensation of pain starts to become too much to handle.\n\t\t\t\t\n\t\t\t\tJust as you're about to give up, you feel the spirit within you calling to you. It speaks no words but you know it is telling you to not give up and to use it. You grit your teeth and scream. A dark purple energy crashed out from you and dispels the flames. You cough out some blood and regain your breath. You glare at the boy across from you.\n\t\t\t\t\n\t\t\t\t\"Ready for round two?\" he asks. He grins smugly.\n\t\t\t\t\n\t\t\t\t\"Shut up,\" you snap back. You focus on the spirit within you.\n\t\t\t\t\n\t\t\t\t*if spirit_illusion=true\n\t\t\t\t\tA pink energy flows out of your palms and then swarms at your opponent. He stands frozen to the spot. You immediately run forward, your daggers in hand then slash at his exposed neck. A blue burst of light forms from the boy and he disappears in a spectacle of the light, his body shattering and leaving behind nothing but the blue light.\n\t\t\t\t\t\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t\t\n\t\t\t\t*if spirit_flames=true\n\t\t\t\t\tA red energy flows out from your body as you convene with your spirit of flames. You grin and then throw your hands forward. A huge torrent of flames, much bigger than what your opponent had conjured, burst out. Your flames engulf the boy. You watch as his body shatters into blue light.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t\t\n\t\t\t\t*if spirit_water=true\n\t\t\t\t\tA blue energy flows out from your body and you feel your body temperature lowering slightly. You push out the energy. A vortex of water forms underneath your opponent, launching him high up into the air. You hear a loud thud as his body hits the ceiling of the room. You watch as his body falls to the ground. His head slams against the icy floor, after which his body shatters into blue light.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t\t\n\t\t\t\t*if spirit_summoning=true\n\t\t\t\t\tA brown energy pulses from within you. You focus that energy to behind your opponent. A reticulated python forms out of your magic. \n\t\t\t\t\t\n\t\t\t\t\t\"Ahh,\" the boy screams. He falls to the ground. Your summoned snaked wraps it's thick, meaty body around the boy and squeezes tightly. The boy claws and scratches as he tries to get out of its grip. \n\t\t\t\t\t\n\t\t\t\t\tYou run forward, daggers in hand. You slam them down onto his head. His body shatters into a blue light, leaving you alone in the room with your summon.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t\t\n\t\t\t\t*if spirit_nature=true\n\t\t\t\t\tA green energy flows out from your body. You press your palms onto the ground. Roots and vines sprout out from behind the boy. He is caught off guard. The vines wrap around his neck and squeeze tightly. He tries to fight against it but soon vines grab onto his arms and legs, immobilizing him completely. The boy starts to suffocate.\n\t\t\t\t\t\n\t\t\t\t\tYou decide to end his misery quickly. You run over to him and slam your daggers into his skull. A blue light escapes as he is transported out of the pocket dimension.\n\t\t\t\t\t*goto battle1_end\n\t\t\t\t\n\t*selectable_if (mud=true) #Cast Mud\n\t\tYou push your mana through your body and toward your palms. You then press your palms to the ground. Mud forms all around you and reaches your opponent. \n\t\t\n\t\t\"Try walking in that,\" you say. You run forward, daggers in hand. Now that your spell has taken form you are completely unhindered by the ice and instead are able to traverse the distance with ease.\n\t\t\n\t\t\"Shut your trap,\" the boy shouts. He claps his hands together and then pulls them apart. Strings of fire a formed. He throws a flaming net at you. \"Burn you mongrel!\"\n\t\t\n\t\tYou slide to the side across the mud, narrowly dodging the spell. You rush onward, the distance closed to only five meters. \n\t\t\n\t\t\"Stand still,\" the boy yells. He forms another flaming net, which you easily avoid. You close the distance to only a couple meters. The boy tries to move back. He slips and falls flat onto his back. \n\t\t\n\t\tYou jump forward with both daggers and plunge them into his face. A blue light shimmers and then his body shatters into blue nothingness as he is transported out of the pocket dimension.\n\t\t\n\t\t\n\t\t*goto battle1_end\n\t*selectable_if (cerberus=true) #Cast Cerberus\n\t\tYou push your mana through your body and then push your hands forward. A brownish light forms behind your opponent. Cerberus forms out of the light. The three headed hound barks at the boy.\n\t\t\n\t\t\"What the fuck is that,\" the boy yelps. He furrows his brows and then grits his teeth. \"There's no way I'm going to let a second rate magician like you win against me.\"\n\t\t\n\t\tThe boy turns to face your summon. He jumps out of the way as Cerberus lunges at him, it's sharp fangs bared. You watch as he fights against Cerberus defensively, unable to get the upper hand against it. However, the boy is rather fast and Cerberus isn't able to land a killing blow.\n\t\t\n\t\tYou unsheathe your daggers and slowly close the distance. You wait for an opening.\n\t\t\n\t\t[i]There it is![/i]\n\t\t\n\t\tCerberus lunges at the boy. He jumps back. You are right behind the boy and slam your daggers into the back of his neck. A blue light shimmers and then his body shatters into blue fragments as he is transported out of the pocket dimension.\n\t\t*goto battle1_end\t\t\n\t*selectable_if (create_illusion=true) #Cast Create Illusion\n\t\tYou push your mana through your body and then focus on an image of the icy floor melting rapidly. \n\t\t\n\t\tThe boy looks at the floor with alarm on his face. \"What's going on,\" he shrieks. He jumps back from what he believes to be some sort of attack from you. He slips across the icy floor.\n\t\t\n\t\tYou grin and then throw a dagger aimed at the boy's head.\n\t\t\n\t\t*if dexterity>10\n\t\t\tYour dagger hits the mark perfectly. A blue light shimmers and then the boy's body shatters into fragments of the blue light as he's transported out of the pocket dimension.\n\t\t\t\n\t\t*if dexterity\u003c10\n\t\t\tYour dagger hits slightly off target and lodges itself to the boy's shoulder. You frown and then remove your second dagger. You close the distance between yourself and the screaming boy. You plunge your dagger into his neck. A blue light shimmers and then the boy's body shatters into fragments of the blue light as he's transported out of the pocket dimension.\n\t\t\n\t\t*goto battle1_end\n\n*label battle1_end\n*page_break\nYou pant.  A blue screen forms above you. \"Congratulations on your victory,\" the female voice calls out. \"Please enter onto the next floor of this tower.\"\n\nAn icy door forms in the middle of the room, a couple of meters in front of you. It opens up to reveal another room. You take a breather for a couple of minutes as you observe the structure. \n\nOnce you feel replenished you walk through the door. \n\n*page_break\n\nIt is no longer cold. You find yourself outside again. Instead of another room that you were expecting, you are instead in a small expanse of plains. There is a small body of water to your left. Small blades of grass wave about as wind flows through the area.\n\nAs you look up you see the sun, covered slightly by clouds. \"How interesting,\" you mutter. Not only did you get transported into a pocket dimension, which in and of itself is an insane feat of magic that you are nowhere close to comprehending, but now the tower held within the dimension, which seemingly extends into the heavens, has brought you into what feels like another new layer of dimensional travel.\n\nYou take in a breath and compose yourself. You have no luxury for standing in awe of your surroundings.\n\n*choice\n\t*selectable_if (summon_hawk=true) #Cast Summon Hawk\n\t\tYou push your mana forth through your body. A brown light is emitted from your palms. A hawk forms in your hand, your vision connected with its. You command the hawk into the skies. It flies from your hands, flapping its brown, feathery wings. \n\t\t\n\t\tYou notice a girl in the distance. She immediately looks up at your hawk. A thunder bolt races out of her hands at your hawk. \n\t\t\n\t\tYou grunt as your connection to your summon is cut off. You feel a slight recoil and hold onto your stomach. You wipe away sweat from your brows and then rush forward.\n\t\t\n\t\t[i]I've been spotted. I have to attack now.[/i]\n\t\t\n\t\t*goto encounter\n\t\t\n\t*selectable_if (invisibility=true) #Cast Invisibility\n\t\tYou allow your body to become bathed in mana. Moments after you are covered by shadows, becoming invisible to the eye. You make your way through the plains much quicker than before, unworried about being spotted by your enemy. \n\t\t\n\t\tAfter moving around for almost two minutes, you finally find your opponent. She's about a hundred meters away. You circle around her position until you are behind her. You run forward until you are about twenty meters away. The girl suddenly turns. She seems to see through your spell and grins. She mockingly brings her hand up and aims a finger at you.\n\t\t\n\t\t*goto encounter\n\t#Continue onward\n\t\tWithout any other plans in mind, you decide to move forward. You move rather slowly, anticipating an attack at any moment from any direction. After going on like this for about five minutes you finally find your opponent. \n\t\t\n\t\t*goto encounter\n\t\n*label encounter\nYou look at the girl. She relatively tall and is wearing a large black witches' hat. You notice her electric yellow eyes, which are staring at you intensely.\n\nYou wave at her and smile.\n\nThe girl scoffs and then forms electricity in her hands.\n\n\"Straight to the point, alright,\" you mutter. \n\nStrands of electricity come rushing your way. You jump out pre-emptively, narrowly avoiding the attack. You get back onto your feet and create some distance between, hoping there is a limit to the range of her spell. You find this to be true, as she stops casting her spell once you are about ten meters away. \n\nThe girl raises a brow and smirks. \"Bad move.\"\n\nLightning bolts form in both her hands and she flings them at you.\n\n\"Shit.\" You dodge to the side of one incoming projectile. You groan as you are shocked by the second bolt. Your body seizes up and a stinging sensation runs through your whole body. \n\n\"Shouldn't have gone so far away, that's my favourite type of fight,\" the girl calls out. \n\nYou snap out of the electric shock and jump to the side a bolt flies across the side of your face. \n\n[i]What do I do?[/i]\n\n*choice\n\t#Rush in and close the distance\n\t\tYou grit your teeth and sprint at the girl. You're luckily able to dodge a couple incoming bolts. Once you're back within her range, strands of electricity fly your way. \n\t\t\n\t\t[i]Not like this.[/i]\n\t\t\n\t\tYou throw yourself forward to the ground. You feel the uncomfortable electric current pass through you. You get back onto your feet. You start to focus on the spirit hidden within you. Your mind becomes blank and you find yourself in a completely new state of mind, as if you were meditating.\n\t\t\n\t\t*if spirit_illusion=true\n\t\t\tA pink hue of light comes out of your eyes. You see the world in this colour. Your intuition rapidly improves and you are able to predict the moves of your opponent. She moves to kick you in the groin but you already predicted this. You stop moving for a split step. The kick misses you. You close the distance and thrust your daggers into her neck.\n\t\t\t\n\t\t*if spirit_flames=true\n\t\t\tRed flames form around your body. Your body feels much lighter and you somehow see patterns of attack that you should take. You close the distance to the girl in an instant. She kicks out at your leg. You raise your leg and block the strike. Flames usher forth from you as the girl's leg connects. The girl yelps and stumbles back. You push forward and throw a punch at her head. You land an uppercut.\n\t\t\t\n\t\t*if spirit_nature=true\n\t\t\tA brownish green light flows out from your body. Thorns and vines sprout from underneath you. You feel a connection to each vine as if they are your limbs. You concentrate on the vines and attack the girl. A thick thorny vine, about three meters in length, slams into the girl. She yelps out as she's thrown to the side. She jumps up onto her feet but you don't relent. Another vine crashes into the girl.\n\t\t\t\n\t\t*if spirit_summoning=true\n\t\t\tA brown energy flows out of you. A rage take over and you leap forward with such power that the ground beneath you is left with a dent. You punch at the girl. She raises her hands to her face. She is sent flying. You press forward as the girl gets to her feet. You kick at her leg. You hear a snapping sound. The girl screams. You use the opening and land a hook square at her chin.\n\t\t*if spirit_water=true\n\t\t\tEnergy fills through your body and it takes on a blue hue. You feel much faster than before. You rush forward and punch at the girl. Your attack narrowly misses. The girl quickly creates electricity in her hands and aims it at you. You step to the side and then kick at her legs. She falls to the ground. You stomp down at her head. She rolls to the side in time and gets back up. You don't give her any time to think, water forms underneath you and propels you forward at her. You land a clean punch at her temple.\n\t\t\t\n\t\tThe girl falls back and before she hits the ground she shatters into blue light.\n\t\t*goto end_fight\n\t*selectable_if (create_illusion=true) #Cast Create Illusion\n\t\tYou feel your mana course through your veins. You envision an image of the ground shattering beneath the girl's feet. She stumbles back as she screams. You sprint toward her, your daggers in hand. You are about five meters from her. The girl breaks out of your spell and jumps onto her feet. She raises her hands and an electric current beams out from them. The electricity jumps at you. You howl in pain as you are thrown back a couple meters.\n\t\t\n\t\tYou grit your teeth and throw yourself onto your feet. You jump to the side as an electric beam speeds at you. You narrowly dodge. \n\t\t\n\t\t\"Don't screw with me,\" the girl shouts. She pushes even more mana into her next attack. She charges her electricity and it begins to glow so bright your eyes start to hurt.\n\t\t\n\t\t[i]Damn, I need to finish this now.[/i]\n\t\t\n\t\tYou start to focus on the power from within your spirit. Your mind becomes blank and you find yourself in a completely new state of mind, as if you were meditating.\n\t\t\n\t\t*if spirit_illusion=true\n\t\t\tA pink hue of light comes out of your eyes. You see the world in this colour. Your intuition rapidly improves and you are able to predict the moves of your opponent. She moves to kick you in the groin but you already predicted this. You stop moving for a split step. The kick misses you. You close the distance and thrust your daggers into her neck.\n\t\t\t\n\t\t*if spirit_flames=true\n\t\t\tRed flames form around your body. Your body feels much lighter and you somehow see patterns of attack that you should take. You close the distance to the girl in an instant. She kicks out at your leg. You raise your leg and block the strike. Flames usher forth from you as the girl's leg connects. The girl yelps and stumbles back. You push forward and throw a punch at her head. You land an uppercut.\n\t\t\t\n\t\t*if spirit_nature=true\n\t\t\tA brownish green light flows out from your body. Thorns and vines sprout from underneath you. You feel a connection to each vine as if they are your limbs. You concentrate on the vines and attack the girl. A thick thorny vine, about three meters in length, slams into the girl. She yelps out as she's thrown to the side. She jumps up onto her feet but you don't relent. Another vine crashes into the girl.\n\t\t\t\n\t\t*if spirit_summoning=true\n\t\t\tA brown energy flows out of you. A rage take over and you leap forward with such power that the ground beneath you is left with a dent. You punch at the girl. She raises her hands to her face. She is sent flying. You press forward as the girl gets to her feet. You kick at her leg. You hear a snapping sound. The girl screams. You use the opening and land a hook square at her chin.\n\t\t*if spirit_water=true\n\t\t\tEnergy fills through your body and it takes on a blue hue. You feel much faster than before. You rush forward and punch at the girl. Your attack narrowly misses. The girl quickly creates electricity in her hands and aims it at you. You step to the side and then kick at her legs. She falls to the ground. You stomp down at her head. She rolls to the side in time and gets back up. You don't give her any time to think, water forms underneath you and propels you forward at her. You land a clean punch at her temple.\n\t\t\t\n\t\tThe girl falls back and before she hits the ground she shatters into blue light.\n\t\t*goto end_fight\n\t\t\n\t*selectable_if (water_wall=true) #Cast Water Wall\n\t\tYou push your mana forth and bring a large wall made of water in front of you. The girl's lightning bolts crash into the spell. The wall is immediately reduced in size. \n\t\t\n\t\t[i]Damn it, it's not holding up.[/i]\n\t\t\n\t\tYou watch as another bolt comes flying at your wall. You realize it's about to crash. Just as the bolt makes impact with your Water Wall, you rush out from behind it and sprint at the girl, daggers in hand. \n\t\t\n\t\tThe girl scoffs. Just as you've completely closed the distance she moves away at such an insanely fast speed that you can see her after images. You don't relent and continue forward, not giving her time to cast any of her spells. \n\t\t\n\t\tElectricity starts to form in her hands but you cut her off and slash at her stomach. The girl falls back again whilst frowning. \n\t\t\n\t\t[i]I'm not letting you go anywhere.[/i]\n\t\t\n\t\tYou start to focus on the power from within your spirit. Your mind becomes blank and you find yourself in a completely new state of mind, as if you were meditating.\n\t\t\n\t\t*if spirit_illusion=true\n\t\t\tA pink hue of light comes out of your eyes. You see the world in this colour. Your intuition rapidly improves and you are able to predict the moves of your opponent. She moves to kick you in the groin but you already predicted this. You stop moving for a split step. The kick misses you. You close the distance and thrust your daggers into her neck.\n\t\t\t\n\t\t*if spirit_flames=true\n\t\t\tRed flames form around your body. Your body feels much lighter and you somehow see patterns of attack that you should take. You close the distance to the girl in an instant. She kicks out at your leg. You raise your leg and block the strike. Flames usher forth from you as the girl's leg connects. The girl yelps and stumbles back. You push forward and throw a punch at her head. You land an uppercut.\n\t\t\t\n\t\t*if spirit_nature=true\n\t\t\tA brownish green light flows out from your body. Thorns and vines sprout from underneath you. You feel a connection to each vine as if they are your limbs. You concentrate on the vines and attack the girl. A thick thorny vine, about three meters in length, slams into the girl. She yelps out as she's thrown to the side. She jumps up onto her feet but you don't relent. Another vine crashes into the girl.\n\t\t\t\n\t\t*if spirit_summoning=true\n\t\t\tA brown energy flows out of you. A rage take over and you leap forward with such power that the ground beneath you is left with a dent. You punch at the girl. She raises her hands to her face. She is sent flying. You press forward as the girl gets to her feet. You kick at her leg. You hear a snapping sound. The girl screams. You use the opening and land a hook square at her chin.\n\t\t*if spirit_water=true\n\t\t\tEnergy fills through your body and it takes on a blue hue. You feel much faster than before. You rush forward and punch at the girl. Your attack narrowly misses. The girl quickly creates electricity in her hands and aims it at you. You step to the side and then kick at her legs. She falls to the ground. You stomp down at her head. She rolls to the side in time and gets back up. You don't give her any time to think, water forms underneath you and propels you forward at her. You land a clean punch at her temple.\n\t\t\t\n\t\tThe girl falls back and before she hits the ground she shatters into blue light.\n\t\t*goto end_fight\n\t*selectable_if (wall_of_fire=true) #Cast Wall of Fire\n\t\tYou push your mana forth causing a flames to encircle the girl. You watch as electricity tries to break through the spell but to no avail. The girl screams and shouts.\n\t\t\n\t\tYou unsheathe your daggers and ready yourself. More and more electricity pushes forth until the fire dissipates. Sweat drips down the girls forehead and she pants.\n\t\t\n\t\t[i]I'm not letting you go anywhere.[/i]\n\t\t\n\t\tYou start to focus on the power from within your spirit. Your mind becomes blank and you find yourself in a completely new state of mind, as if you were meditating.\n\t\t\n\t\t*if spirit_illusion=true\n\t\t\tA pink hue of light comes out of your eyes. You see the world in this colour. Your intuition rapidly improves and you are able to predict the moves of your opponent. She moves to kick you in the groin but you already predicted this. You stop moving for a split step. The kick misses you. You close the distance and thrust your daggers into her neck.\n\t\t\t\n\t\t*if spirit_flames=true\n\t\t\tRed flames form around your body. Your body feels much lighter and you somehow see patterns of attack that you should take. You close the distance to the girl in an instant. She kicks out at your leg. You raise your leg and block the strike. Flames usher forth from you as the girl's leg connects. The girl yelps and stumbles back. You push forward and throw a punch at her head. You land an uppercut.\n\t\t\t\n\t\t*if spirit_nature=true\n\t\t\tA brownish green light flows out from your body. Thorns and vines sprout from underneath you. You feel a connection to each vine as if they are your limbs. You concentrate on the vines and attack the girl. A thick thorny vine, about three meters in length, slams into the girl. She yelps out as she's thrown to the side. She jumps up onto her feet but you don't relent. Another vine crashes into the girl.\n\t\t\t\n\t\t*if spirit_summoning=true\n\t\t\tA brown energy flows out of you. A rage take over and you leap forward with such power that the ground beneath you is left with a dent. You punch at the girl. She raises her hands to her face. She is sent flying. You press forward as the girl gets to her feet. You kick at her leg. You hear a snapping sound. The girl screams. You use the opening and land a hook square at her chin.\n\t\t*if spirit_water=true\n\t\t\tEnergy fills through your body and it takes on a blue hue. You feel much faster than before. You rush forward and punch at the girl. Your attack narrowly misses. The girl quickly creates electricity in her hands and aims it at you. You step to the side and then kick at her legs. She falls to the ground. You stomp down at her head. She rolls to the side in time and gets back up. You don't give her any time to think, water forms underneath you and propels you forward at her. You land a clean punch at her temple.\n\t\t\t\n\t\tThe girl falls back and before she hits the ground she shatters into blue light.\n\t\t*goto end_fight\n\t\n*label end_fight\nYou pant and collapse to the ground. The fight was short but intense, and you try to catch your breath as best as you can.\n\nYou look up and see the blue screen once again. \"Congratulations,\" the female voice says. \"There are no further participants to pit you against at the moment. You are free to roam my home until I call upon you once again.\"\n\nThe blue light brightens and extends to cover your whole surroundings. You watch as the ground turns blue. A moment later bricks start to form underneath you. You stare in marvel as your whole surroundings change and you find yourself inside of the tower. \n\nThere are candles and torches all around the room. You seem to be inside a library as there are dozens of book shelves. A staircase leads up to more books. There are four wooden chairs in the middle of the room, and a fire lit inside a fireplace. \n\n\"Pretty weird to have a fire in a room full of books,\" Mbali calls out. You turn to find her stood at a far wall to the side. She leans against a shelve, a book in hand.\n\nAs you look about you find both Ploy and Demeter. \n\n\"Glad of you to make it here last,\" Demeter jokes. \n\nYou chuckle. \"Better late than ever, am I right.\"\n\n\"What a surprise that whole situation was,\"Ploy says. \"I didn't even have a second to breath after getting in. An arrow was already hurtling my way.\" The girl rolls her neck. \n\nYour party reconvenes and you sit by the four chairs in the middle of the library. \n\n*fake_choice\n\t#\"I have to say, I'm loving this place.\"\n\t\t\n\t#\"I don't think I can deal with more surprises.\"\n\t\t\n\t#\"We need to stay vigilant.\"\n\t\t\nDemeter groans. \"Where are we anyway? Like what part of this tower? I tried finding ways out of here but it looks like we're stuck in this room for good.\"\n\n\"Until we are called to fight again,\" Ploy responds. \"This is the most thrilling part of watching this competition. Seeing all of the group members showing off their own skills.\"\n\nYou raise a brow. You want to make a comment and ask about what it's like to grow up watching this competition, but you quickly push the idea out of your head. You have to blend in, and should already have experienced that as you are disguising as a youth of the Khaeng Kingdom.\n\n\"This tower though,\" Ploy says. \"It seems to be sentient. That's new for sure, I've never once heard of that being part of this
