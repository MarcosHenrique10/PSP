 trial.\"\n\n\"Maybe we get to meet it at the top,\" you add.\n\nYou have some free time to spend and rest, you decide to…\n\n*choice\n\t#Browse through the library\n\t\tYou decide to take a stroll through the library. There are hundreds of books available but there isn't really any overview of what types of books are held where. \n\t\t\n\t\t\"If only I knew how this place was organized,\" you mutter under your breath. \n\t\t\n\t\tA blue light flashes in front of your eyes. A female figure appears in the blue screen. She's slender and has long hair. \n\t\t\n\t\t\"How may I assist you?\" the woman asks. \n\t\t\n\t\tYou tilt your head. \"What even are you?\"\n\t\t\n\t\t\"That information stands classified as of this current moment,\" she responds, her voice monotonous. \"Successfully venture deeper into the tower and you may find access.\"\n\t\t\n\t\tYou scratch the back of your head and sigh. \"Alright, uhm, can you tell me about what types of books are where.\"\n\t\t\n\t\t\"Of course.\"\n\t\t\n\t\tThe AI guides you through the area. You find that there are historical books scattered all around, along with books pertaining to meditation, aura enhancing, methods of body tempering and various other techniques that practitioners in the world utilize that isn't part of your magical scope. \n\t\t\n\t\tYou are intrigued but decide to stay focused on your current specialization. You find the area where magical tomes for study are held. After spending what feels like hours searching for the perfect book, you are suddenly brought out of your trance.\n\t\t*goto second_battle\n\t\t\n\t#Meditate\n\t\tYou find a quiet space and sit on the ground, legs crossed. You start to push out all of your thoughts and feelings, as you've done many times before. You soon reach a state of mediation. You are in touch completely with the physical realm. You can sense the strands of arcana that are thick in the air. You breath them in with every breath and back out as you exhale. The sensation is calming. \n\t\t\n\t\tYou fall deeper into your meditation. You start to focus on your internal world. You fall deeper and deeper into your psyche. You wake up and find yourself in a rocky plain. You look up at the sky and find it has taken on a purple colour. A large gem floats where the sun or moons would usually be. \n\t\t\n\t\t\"Where am I?\" \n\t\t\n\t\tYou feel a weird sensation from all around. You realize that you are within the depths of your arcane core, the object responsible for your magical capabilities. \n\t\t\n\t\tYou sense your spirit is somewhere in this expanse, but you can't pinpoint it's location. You try to sink deeper into your arcane core, hoping this will solve the problem. You hit a wall as you try to delve deeper.  You are thrown out of your inner world. You pant, sweat trickling down your forehead.\n\t\t\n\t\tYou rub your temples. [i]Let me leave that exploration for another time.[/i]\n\t\t\n\t\tYou realize that you need to gather your strength for the battles to come. \n\t\t*goto second_battle\n\t#Relax\n\t\tYou decide to take a nap. You find a comfortable spot on the ground, away from where most of the torches and candles are. You try to fall asleep but images of your previous battles run through your mind.\n\t\t\n\t\tYou take in deep breaths as adrenaline starts to course through your body. You calm yourself down and soon enter the realms of dreams. \n\t\t\n\t\tYour dream is vivid. You had found yourself back at home, in the small living room of your farm house. Your parents are there, but you can't make out their faces properly. You simply assume them to be your parents as you feel a certain sense of comfort around them. You notice your siblings are there too.\n\t\t\n\t\tA tinge of pain fills you as you lament that you had to escape from that life. You wish things had played out differently for you.\n\t\t\n\t\tYou have another dream, you find yourself in the midsts of a battle. You are flying through the sky and face off against dozens of wyverns, their grey scales thick on their serpent like bodies. They scream and claw at you, but you are able to fly out of their range before attacking.\n\t\t\n\t\tA wyvern manages to catch you from behind and claws at your neck. You wake up abruptly, sweating heavily.\n\t\t*goto second_battle\t\t\n*label second_battle\n\nA blue light flashes before you, after which the AI appears in front of your eyes. You yawn and stretch out your arms. \"Is it already time?\"\n\n\"It would appear so,\" the AI responds. \"Please make your way through to the next obstacle.\"\n\nA door of blue light forms next to you. \n\n\"Already time for you?\" Demeter calls out. \n\nYour party members make their way over to you. \n\n\"You've got this,\" Ploy says. She pats you on the shoulder.\n\nYou nod. You make a fist and raise it up. \"See you guys later.\"\n\nYou step into the door.\n\n*page_break\nThis time, you are transported to a hot savannah. The sun is beaming up above and you instantly start to sweat. The heat is uncomfortable and you grab a bottle of water from your backpack. You drink from it greedily. \n\nYou wipe sweat away from your forehead and venture onward. After walking for about half an hour, you find a stream of water. Next to it is a small wooden shack. It looks rather weak and weathered, as if a gust of wind could destroy it.\n\nYou rejoice. You are weathered and fatigued by the intense heat and have already run out of water in your supplies. \n\n*choice\n\t#Rush to the stream\n\t\tYou sprint at the stream. You push your face into the clear water and take in huge gulps. You come back out and then groan loudly. \n\t\t\n\t\t\"Ahh I needed that,\" you say. \n\t\t\n\t\t\"Idiot,\" a boy shouts. You spin your head to the side and your eyes lock onto a slender boy with long blond hair that is tied back. A rocket hurtles your way. \n\t\t\n\t\tYou try to react in time and throw yourself to the side.\n\t\t\n\t\t\"Agh.\" You heave as your right shoulder is completely destroyed in a single blow. Your bones have been turned to mush.\n\t\t\n\t\tYou whince as you throw your body forward once more as another rock flies your way. You scramble onto your feet and run into the shack. You find couple chairs and a single hay stack.\n\t\t\n\t\t[i]I messed up. Why the hell did you not check if your opponent was there in the first place.[/i]\n\t\t\n\t\t*if (minor_heal=true)\n\t\t\tYou focus on your mana and then use your left hand to cast minor heal. A bright green light flows out of your palms. You aim the light at your broken arm. You grit your teeth as a huge pressure pushes on your bones as they are move back into place. \n\t\t\t\n\t\tYou pant. Your mind races, you need to get out of the hut as quickly as possible. You're trapped and could be crushed under a barrage of rocks at any moment.\n\t\t\n\t\t*choice\n\t\t\t*selectable_if (thorn_armour=\"true\") #Cast Thorn Armour\n\t\t\t\tYour mana forms into a brownish green light. Your whole body is covered in thick green thorns, making you a spiky and sharp object in the process.\n\t\t\t\t\n\t\t\t\t[i]I can run out like this.[/i]\n\t\t\t\t\n\t\t\t\tYou make your mind up and kick the hut door open. You run out, the boy is nearby. A rock hurtles your way. You raise your left hand up and block the projectile. You are pushed back a single step. You groan and rush out of the way of another projectile. \n\t\t\t\t\n\t\t\t\tYour opponent stops casting his spell. \n\t\t\t\t\n\t\t\t\tYou look to him with furrowed brows. [i]What is he up to?[/i]\n\t\t\t\t\n\t\t\t\tA brown glow of light surrounds him. The ground starts to tremble, and cracks start to show up. The cracks widen and race toward you. You sprint forward and push your mana to the soles of your feet. You leap over the cracks, directly into your opponent. The boy groans as your thorns pierce him all over. You impale the youth and look down at his disappearing body.\n\t\t\t\t\n\t\t\t\t*if (minor_heal=false)\n\t\t\t\t\tYou scream in pain the moment the adrenaline in you starts to fade away. Your right shoulder is now in a completely unrecognisable state. It dangles in a weird angle.\n\t\t\t\t\n\t\t\t\tYou take in a deep breath and get onto your feet. The light around you starts to change, the surroundings disappearing into a blue light.\n\t\t\t\t\n\t\t\t\t\"Congratulations contestant,\" the AI says. \"You will now be sent back to the tower. Any sustained injuries will immediately be reversed.\n\t\t\t\t\n\t\t\t\tThe surroundings change and you find yourself inside of the library once again. You move your right arm, it feels as good as new.\n\t\t\t\t*goto library\n\t\t\t*selectable_if (invisibility=\"true\") #Cast Invisibility\n\t\t\t\tYou push your mana outward. Your body becomes shrouded in shadows as you turn invisible. You look around the room and find another door to the back of the hut. You open the door and run out. \n\t\t\t\t\n\t\t\t\tYou breathe in deeply, the boy hasn't noticed you. You circle back around to the front of the house and spot him. Two large rocks are floating in front of him, waiting to smash into you if you exited through the front door. \n\t\t\t\t\n\t\t\t\tYou unsheathe a dagger and edge to your opponent.\n\t\t\t\t\n\t\t\t\tThe boy turns to you as you get closer. The rocks fly at you.\n\t\t\t\t\n\t\t\t\t*if dexterity>10\n\t\t\t\t\tYou jump out of the way as the projectiles come your way. You wince, your right shoulder is flaring out in pain.\n\t\t\t\t\t\n\t\t\t\t*if dexterity\u003c10\n\t\t\t\t\tYou are hit square in the chest and thrown back a few meters. You grunt as your right shoulder flares with pain.\n\t\t\t\t\t\n\t\t\t\t[i]Not like this![/i]\n\t\t\t\t\n\t\t\t\tYou get onto your feet and move your head just as the second rock hurtles at you. The boy starts to create new rocks but you don't give him the time to finish his spell. You close the distance to him in an instant and slash at his exposed neck. You stare at your opponents disappearing body.\n\t\t\t\t\n\t\t\t\t*if (minor_heal=false)\n\t\t\t\t\tYou scream in pain the moment the adrenaline in you starts to fade away. Your right shoulder is now in a completely unrecognisable state. It dangles in a weird angle.\n\t\t\t\t\n\t\t\t\tYou take in a deep breath and get onto your feet. The light around you starts to change, the surroundings disappearing into a blue light.\n\t\t\t\t\n\t\t\t\t\"Congratulations contestant,\" the AI says. \"You will now be sent back to the tower. Any sustained injuries will immediately be reversed.\n\t\t\t\t\n\t\t\t\tThe surroundings change and you find yourself inside of the library once again. You move your right arm, it feels as good as new.\n\t\t\t\t*goto library\n\t\t\t*selectable_if (flame_dash=true) #Cast Flame Dash\n\t\t\t\tYou take in a deep breath and then push mana through your body. A red energy forms around you. You kick the hut door open. You spot the boy, about ten meters away. Two rocks fly at you. You cast your Flame Dash. Your body moves through the incoming projectiles which crash into the hut behind you. A flamed path follows where you dashed toward. You are right in front of the enemy. \n\t\t\t\t\n\t\t\t\tYou grab one of your daggers and slam them into his chest. The boy groans and spits out blood. A rocky wall forms in front of him as he retreats. \n\t\t\t\t\n\t\t\t\t\"You're not going anywhere,\" you say. You cast flame dash again. You pass through the wall with ease and find yourself face to face with your opponent once again. You grab your second dagger and slash at his neck. The boy holds onto his neck, blood seeping out. He falls to the ground. Before his body hits the floor it disappears into a blue light.\n\t\t\t\t\n\t\t\t\t*if (minor_heal=false)\n\t\t\t\t\tYou scream in pain the moment the adrenaline starts to fade away. Your right shoulder is now in a completely unrecognisable state. It dangles in a weird angle.\n\t\t\t\t\n\t\t\t\tYou take in a deep breath and get onto your feet. The light around you starts to change, the surroundings disappearing into a blue light.\n\t\t\t\t\n\t\t\t\t\"Congratulations contestant,\" the AI says. \"You will now be sent back to the tower. Any sustained injuries will immediately be reversed.\n\t\t\t\t\n\t\t\t\tThe surroundings change and you find yourself inside of the library once again. You move your right arm, it feels as good as new.\n\t\t\t\t*goto library\n\t\t\t\t\n\t\t\t#Find an exit\n\t\t\t\tYou scan through the small hut. To the back of it there is another door. You make your way to the door and kick it open. You run out. You circle around the hut and find the boy stood in wait of you to approach from the front door. Two rocks floats in front of him, ready to be launched at you. \n\t\t\t\t\n\t\t\t\t*if spirit_illusion=true\n\t\t\t\t\tYou focus on the spirit of illusion within your body. You take in a deep breath and then look to your opponent. Your eyes take on a pink hue. The floating rocks suddenly fall to the ground.\n\t\t\t\t\t\n\t\t\t\t\t[i]That's it![/i]\n\t\t\t\n\t\t\t\t\tYou waste no time and unsheathe a dagger before sprinting to the boy. He turns to see you just in time as you throw your dagger. He moves his body, causing the projectile to hit him in the shoulder. You rush onward and remove your second dagger. You move to the side as a rock hurtles your way, before closing the distance. You lunge at the boy and slam your dagger into his abdomen. He falls to the ground.\n\t\t\t\t\t\n\t\t\t\t\tYou remove the dagger and finish him off by a slice to the neck. You watch as his body falls back tot he ground with a loud thud. A blue light covers him and his body slowly disappears.\n\t\t\t\t*if spirit_flames=true\n\t\t\t\t\tYou focus on the spirit of flames within you. You take in a deep breath and stare at your opponent. Flames burst out from your hands. The rocks hurtle at you. You push the flames outward at the rocks and then step to the side as their trajectory is altered. You then push even more flames out until they reach the boy. The boy forms more rocks but they fall to the ground as your blaze consumes him.\n\t\t\t\t\t\n\t\t\t\t\tThe boy screams and claws onto his body and then runs to the stream. He tries to jump into the water but falls just short. He stumbles onto his knees and then goes head first into the stream, after which his body shatters into blue light.\n\n\t\t\t\t*if spirit_nature=true\n\t\t\t\t\tYou focus on the spirit of nature within you. You take in a deep breath and then look to your opponent. The rocks rush toward you. You press a hand to the ground. Roots and vines sprout forth in front of you. The rocks slam into your barrier. You cough as you are thrown back by a shockwave. You get back onto your feet and wipe away blood from your lips. You press your hand onto the ground again. Vines race at the boy. He launches rocks at the vines but with every vine he destroys another forms. Soon you overpower him with the multitude of vines.\n\t\t\t\t\t\n\t\t\t\t\tThe vines wrap around the boy and squeeze tightly. The boy latches onto your spell and tries to rip them off him. You focus harder and cause the squeeze to tighten. His breath escapes his body and his face starts to turn purple as he is \tasphyxiated. Moments later he shatters into fragments of blue light.\n\t\t\t\t\t\n\t\t\t\t*if spirit_summoning=true\n\t\t\t\t\tYou focus on the spirit of summoning within you. You take in a deep breath and then look to your opponent. Rocks hurtle your way. You throw yourself forward. You grunt as your shoulders are sliced. You look up from the ground and watch as Cerberus forms in front of the boy. You get onto your feet whilst panting.\n\t\t\t\t\t\n\t\t\t\t\tThe three headed hound growls, saliva dripping down it's teeth. The boy shudders and tries to run. Cerberus lunges at him and bites down at his arm. The boy's arm hardens into rock, your creature's fangs ineffective against it.\n\t\t\t\t\t\n\t\t\t\t\t[i]Use flames.[/i] You command Cerberus.\n\t\t\t\t\t\n\t\t\t\t\tThe middle head of the hound opens wide and a tremendous red light forms within it. The already blazing atmosphere becomes even hotter as a stream of fire leaves the middle head.\n\t\t\t\t\t\n\t\t\t\t\tThe boy screams and claws onto his body and then runs to the stream. He tries to jump into the water but falls just short. He stumbles onto his knees and then goes head first into the stream, after which his body shatters into blue light.\n\t\t\t\t*if spirit_water=true\n\t\t\t\t\tYou focus on the spirit of water within you. You take in a deep breath and then look to your opponent. He doesn't give you even a moment as the rocks hurtle your way. You push your mana to its limits. You leave behind a watery mirage of yourself where you were just stood. The rocks crash into the water whilst you find yourself at a safe distance away from the opponent. \n\t\t\t\t\t\n\t\t\t\t\tYou push even more mana through your body and aim your hand at the boy. Dozens of daggers made out of water form in the air in front of you. More rocks come flying your way. The daggers slice through the rocks with ease and continue onward to the boy. The boy's skin hardens and turns to rock, but the daggers slice through his defence with ease. You watch as his body shatters into blue fragments.\n\t\t\t\t*if (minor_heal=false)\n\t\t\t\t\tYou scream in pain the moment the adrenaline starts to fade away. Your right shoulder is now in a completely unrecognisable state. It dangles in a weird angle.\n\t\t\t\t\n\t\t\t\tYou take in a deep breath and get onto your feet. The light around you starts to change, the surroundings disappearing into a blue light.\n\t\t\t\t\n\t\t\t\t\"Congratulations contestant,\" the AI says. \"You will now be sent back to the tower. Any sustained injuries will immediately be reversed.\n\t\t\t\t\n\t\t\t\tThe surroundings change and you find yourself inside of the library once again. You move your right arm, it feels as good as new.\n\t\t\t\t*goto library\n\t\t\n\t#Investigate the surrounding area\n\t\tYou carefully make your way around the area. You find that the wooden shack has two entrances, shabby doors on either side set adjacently to each other. As you make your way closer to the shack you quickly stop in place. Your ears perk up as you hear somebody breathing heavily.\n\t\t\n\t\tYou hold your breath and crouch down. You press your body against the shack. You immediately notice there is somebody inside of it, presumably your opponent. There is a window next to you. You creep toward it and then look inside. Your eyes lock onto a slender boy with long blond hair that is tied back.\n\t\t\n\t\tYou duck back under the window and start to think of a plan.\n\n\t\t*choice\n\t\t\t*selectable_if (lesser_fireball=true) #Cast Lesser Fireball\n\t\t\t\tYou push mana into your palms. Fireballs form in your palms. You stand up and launch the projectiles through the window. The fireballs slam into the boy, throwing him back. He crashes into the wooden hut. The structure crumbles under the pressure. You watch as a blue light escapes from underneath the wooden planks.\n\n\t\t\t\tYour mouth is wide agape. [i]What the…[/i]\n\n\t\t\t\tYou defeat your opponent in a single hit. You take in a deep breath. The light around you starts to change, the surroundings disappearing into a blue light.\n\n\t\t\t\t\"Congratulations contestant,\" the AI says. \"You will now be sent back to the tower. Any sustained injuries will immediately be reversed.\n\n\t\t\t\tThe surroundings change and you find yourself inside of the library once again.\n\t\t\t\t*goto library\n\t\t\t*selectable_if (water_cannon=true) #Cast Water Cannon\n\t\t\t\tYou push mana into your palms. A blue hue forms as vortexes of water spring forth. You jump up and launch the projectiles through the window. Your spell hits the boy square in the chest. He is thrown back and crashes into the hut with such force that the structure crumbles under the impact.\n\n\t\t\t\tYour mouth is wide agape. [i]What the…[/i]\n\n\t\t\t\tYou defeat your opponent in a single hit. You take in a deep breath. The light around you starts to change, the surroundings disappearing into a blue light.\n\n\t\t\t\t\"Congratulations contestant,\" the AI says. \"You will now be sent back to the tower. Any sustained injuries will immediately be reversed.\n\n\t\t\t\tThe surroundings change and you find yourself inside of the library once again.\n\t\t\t\t*goto library\n\n\t\t\t*selectable_if (thorns=true) #Cast Thorns\n\t\t\t\tYou push mana into your palms. A greenish brown hue of energy forms. You press your hands onto the ground and close your eyes. You focus on where your opponent is within the shack. Vines creep from underneath the shack and then burrow out of the ground. The vines loop around your opponents neck, the thorns pricking into him. You continue to squeeze tighter and tighter until the boy's neck snaps.\n\n\t\t\t\tA blue light forms as the boy is transported out of the pocket dimension. You sigh. [i]Quick and easy. This competition hasn't been difficult whatsoever.[/i]\n\n\t\t\t\tThe light around you starts to change, the surroundings disappearing into a blue light.\n\n\t\t\t\t\"Congratulations contestant,\" the AI says. \"You will now be sent back to the tower. Any sustained injuries will immediately be reversed.\n\n\t\t\t\tThe surroundings change and you find yourself inside of the library once again.\n\t\t\t\t*goto library\n\n\t\t\t#Sneak into the shack\n\t\t\t\tYou take another peak into the hut and notice the boy is stood facing the front door. You make your mind up and walk to the back door. You take in a deep breath and then unsheathe your daggers. You kick the door. It's feeble and crumbles immediately. You run inside. The boy is startled and turns around. You close the distance with him in an instant and slash at him.\n\n\t\t\t\tYour blades hit the mark but you feel a strong recoil as the boy's skin turns to stone. You grunt and move to the side as he punches at you. You press onward and lunge at him with your daggers. You land dozens of times but your blades are almost ineffective, only small wounds appear on the boy's skin. You grunt and kick him in the groin. \n\n\t\t\t\tThe boy falls to his knees whilst gasping for air. You raise your daggers high and then bring them down onto his head. This time the daggers plunge through with ease. You watch as a blue light surrounds the boy and his body then fragments into dozens of pieces of light.\n\n\t\t\t\tThe light around you starts to change, the surroundings disappearing into a blue light.\n\n\t\t\t\t\"Congratulations contestant,\" the AI says. \"You will now be sent back to the tower. Any sustained injuries will immediately be reversed.\n\n\t\t\t\tThe surroundings change and you find yourself inside of the library once again.\n\t\t\t\t*goto library\n\t\t\n\t\t\n*label library\n*page_break\nYou furrow your brows. Before taking part in the competition you had thought it'd be a lot more difficult than it has proven to be so far. You've only recently found out about magic whereas all of the others that are taking part in the Tournament of Heart would have had a much greater amount of time to train and learn their respective methods of combat. \n\n[i]Maybe being a Voidwoken is really just that overpowered. That's the only thing that makes sense to me, because after all I'm just a complete newbie to this.[/i]\n\nThe thought never crosses your mind that you may simply be talented.\n\nYou are all alone in the library, the only company you have is from the sound of the torches spread all across the room. You decide to wander around through the library in search of a book that you can learn from in the mean time.\n*if spirit_illusion=true\n\tAs you move through the area, you feel a sudden tugging from the spirit of illusion.\n*if spirit_flames=true\n\tAs you move through the area, you feel a sudden tugging from the spirit of flames.\n*if spirit_nature=true\n\tAs you move through the area, you feel a sudden tugging from the spirit of nature.\n*if spirit_summoning=true\n\tAs you move through the area, you feel a sudden tugging from the spirit of summoning.\n*if spirit_water=true\n\tAs you move through the area, you feel a sudden tugging from the spirit of water.\n\t\t\t\n[i]What? What can you sense?[/i]\n\nYou can tell that the spirit is excited, but are not able to decipher why exactly that is. It can't speak directly to you, but you're slowly growing accustomed to its way of communication. You can kind of tell what emotional state it is in, and right now it is burning so bright within you that you know it has to be ecstatic about something.\n\nThe spirit leads you onward into a small section of the library to the far corner. You furrow your brows and glance at the rather unassuming space a couple of times. [i]This can't be it. There's nothing here.[/i]\n\nYou turn around to leave but are tugged hard, the spirit's yearning intensifies. [i]Okay, okay, I'm going just relax a little.[/i]\n\nYou brows through the books in the shelves about. There is no underlying theme for the books, unlike the rest of the library which is structured into having magical tomes in one area, historical tomes in another, and so on and so forth.\n\n*fake_choice\n\t#\"What now?\"\n\t#\"Can you hurry up already?\"\n\t#\"You're confusing me.\"\n\t\t\nYou wait for some sort of response. Seconds tick by and you yawn. You then sigh. \"Might as well have a look for myself. I have time to waste anyway it seems.\"\n\nYou browse through the books but find nothing remotely interesting. There's some books on herbal medicine that was used a thousand years ago, there's also some religious texts that you've never heard of. \n\nYou find a small purple tome underneath the book you just put away. It seems rather plain and you pick it up to then put it to the pile of books you've already decided are useless to you. \n\nA sudden intense pull comes from the spirit. A purple light forms where you palm is holding onto the book. \"Is this it? This has to be it?\" You jump and grin.\n\nThe light dims down until it disappears. You open the book carefully, your eyes ready for the upcoming experience. \n\n\"What in the fuck?\" you shout. You flip through the pages of the book rapidly. You frown and then turn it upside down as you try to figure out what is going on. There are only diagrams and symbols to be found on the pages, not a single readable letter in sight. You groan and then rub your temple. \"Seriously, this is what got you so excited? Are you kidding me.\"\n\n\"What's going on?\" Ploy calls out. The girl appears behind you a couple breaths later.\n\n\"Nothing, I just thought I found something good, but it turns out it's nothing more than garbage.\" You point at the purple tome.\n\n\"Let me see that,\" Ploy says. You hand her the book. The girl flips through the pages much more slowly than you did. She chuckles and then hands the book back to you.\n\n\"So?\" you say. \"What is it? You're smiling? Do you know what I'm supposed to do with this?\"\n\nThe girl shrugs. \"I have no idea.\"\n\n\"You… Was that intentional?\"\n\nPloy smirks and then walks away. As her figure disappears she adds, \"Maybe.\"\n\nYou look at the book once more and decide to tackle the problem by…\n*label book_purple\n*choice\n\t#Read through it more slowly\n\t\tYou open the book once more. You make sure to stay on each page for at least a minute. The diagrams are complete nonsense to you and you can't tell what they are depicting. The symbols seem archaic, but nonetheless there is some sort of hidden beauty within them. You scratch your head. You spend about half an hour like this but are nowhere closer to figuring out what this book is or what it's contents may contain.\n\t\t\n\t\t\"Ah this is getting me nowhere, let me try something else.\"\n\t\t\n\t\t*goto book_purple\n\t#Try to convene with your spirit\n\t\tYou take in a deep breath and close your eyes. You start to sink into your inner world but for some reason are unable to enter it. Every time you feel like you are finally entering the inner world you are suddenly pushed back out, as if there's a barrier around it. You open your eyes and glare at the book.\n\t\t\n\t\t[i]Oi, Mr or Mrs spirit, it would be nice if you could make yourself useful right about now![/i]\n\t\t\n\t\tYou get no shred of a response from your spirit, instead being left alone with your thoughts. \"Maybe I need to do something else then.\"\n\t\t\n\t\t*goto book_purple\n\t#Find some books that are linked to it\n\t\tYou scan through the dozens of books but are unable to find anything that would remotely be able to help you. Your brain feels like it's being pricked by hundreds of needles, and at the same time it's as if you are about to sneeze but at the last moment the sneeze does not come out.\n\t\t\n\t\t\"Damn it, this is just the worst thing ever.\" You fall onto a chair, dejected. [i]What even is there that I can do? I can't think of anything.[/i]\n\t\t\n\t\t*set book_purple\"true\"\n\t\t*goto book_purple\n\t*if (book_purple=true) #Activate your Void form\n\t\tSomething sparks in your mind and you think back to the first time you'd met Bami. She'd taught you how to access your Void form, however ever since then you'd never found a use for that ability. Right now you just feel that this is the correct move, that with this you'll be able to solve the problem at hand. Your intuition tells you that this book is linked to the Voidwoken, somehow.\n\t\t\n\t\tYou close your eyes and start to focus on the purple arcana core within you. It pulses from a bright shade of purple to a darker one every couple of seconds. You remember what Bami had taught you and start to focus on the darkness of the core. You feel yourself about to float out of your body.\n\t\t\n\t\t\"What are you doing?\" Ploy snaps. She grabs your hand and your focus is broken. \"Seriously, have you got a screw loose today?\"\n\t\t\n\t\tYou stare wide eyed at the girl, bewildered at her tone. Your mouth widens as you realize the mistake you were about to make. You gulp hard. \"S-Sorry, I wasn't thinking properly.\"\n\t\t\n\t\tThe girl's expression softens. \"Don't worry about it,\" she replies. \"Just be careful, you have to remember there's a time and place for these sorts of things.\"\n\t\t\n\t\tPloy exits the area, leaving you alone in silence once again. You stare at the book.\n\t\t\n\t\t[i]This is a bit of a conundrum. If I can't figure out how to access the book now, I won't be able to ever? Right? I can't just loo the book and take it back home, can I?[/i]\n\t\t\n\t\t\"Hey, Miss AI,\" you call. A blue screen forms in front of you and the female AI can be seen within it. \n\t\t\n\t\t\"How may I assist you?\" she responds. \n\t\t\n\t\t\"Oh wow, that worked…\" You giggle as you scratch your nose. You show the AI the purple tome. \"Is there any way I can have this book? Like, take it out of this library?\"\n\t\t\n\t\t\"Being crowned as champions of the Tournament of Heart will allow for this,\" the AI says.\n\t\t\n\t\tYou purse your lips together. \"Is there any other way? Is there anything else I can do to guarantee this?\"\n\t\t\n\t\tThe AI is silent for at least a minute. You watch as it's images flashes in and out of existence for this period of time. Once the projection is stable again, she says, \"There is another way. I won't disclose such details just yet.\"\n\t\t\n\t\t\"Ahh,\" you throw your head back and groan. \"Alright, that's better than nothing I guess.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tYou make your way to the lobby area of the library. You find Ploy sat by a table, a book in her hands. Beside her is Demeter. The dark elf boy's eyes are closed and he is snoring whilst leaning against a bookshelf. \n\t\t\n\t\t\"Where's Mbali?\" you ask. \n\t\t\n\t\tPloy shrugs. \"No clue, she'll probably get here soon.\"\n\t\t\n\t\tBlue light showers into the room from above. You all look up at the same time. The female AI looks down at your party. \n\t\t\n\t\t\"With this the one on one part of the competition has ended, you will now be given half an hour to make preparations for the final task of the Tournament of Heart. The Maze of Fortuna. I wish you luck dear contestants.\"\n\t\t\n\t\t\"The Maze of Fortuna?\" you mumble. \n\t\t\n\t\tPloy puts her book down onto the table and then balls her fists. \"Shit, Mbali must have lost.\"\n\t\t\n\t\tYou gulp hard. \"There's no way, right?\" You look to Demeter and Ploy for reassurance which they don't provide. \"She couldn't have lost. Damn it, what are we going to do now?\"\n\t\t\n\t\t\"Don't worry,\" Demeter says. \"And anyway, thinking about it rationally for just a sec, Mbali is way more suited to teamwork with her healing abilities than she is for fighting against individuals all on her own.\"\n\t\t\n\t\t\"He's right,\" Ploy chimes in.\n\t\t\n\t\t*fake_choice\n\t\t\t#\"What do we do now?\"\n\t\t\t#\"We're so screwed aren't we?\"\n\t\t\t#\"Everything is going to be okay.\"\n\n\t\t\t\tThe moment the words leave your mouth the surrounding area starts to glow a bright blow. THe three of you watch as the library starts to disappear. The surroundings shift until you are left in a corridor surrounded by a black granite wall.\n\n\t\t\t\tLight flows along the path you find yourself on via a gargantuan chandelier that seems to be about sixty or seventy meters above you. The structure is as massive as it is beautiful, being formed from what looks to be glass with green gems embedded all over it. There is a weird smell in the air, almost like a fusion of blood and sweat with an added hint of vinegar. You gag momentarily and put your hand against your mouth.\n\n\t\t\t\t\"Look what we have here,\" Demeter mumbles. \"Just another wonderful surprise ain't it.\"\n\n\t\t\t\tPloy rolls her eyes. \"To be fair, we did receive warning this would happen just a couple minutes ago. Now, let me just say, there's going to be a lot of traps in this maze, so let's be thorough in our vigilance.\"\n\n\t\t\t\tThere are only two ways that you can proceed through the area. Either forward, or backward.\n\t\t\t\n\t\t\t\t*if (cursed_amulet=true)\n\t\t\t\t\tThe amulet you'd previously pocketed from the trolls starts to buzz and crackle with energy. You quickly grab the necklace from underneath your shirt and pull it out to take a look at it. The object starts to try and float away from your body, as if pulled by an invisible hand. \n\n\t\t\t\t\t\"What do we have here?\" Ploy asks. She looks at the amulet with curiosity.\n\t\t\t\t\n*choice\n\t#Go Forward\n\t\tThe three of you come to a rather quick agreement. You decide that taking the path that leads forward is the way to go.\n\n\t\t*goto go_forward\n\n\t#Go Backward\n\t\tThe three of you come to an agreement and decide to turn around. You make your way through the direction. After about fifteen minutes you reach a dead end. \n\n\t\tYou frown as you stare at the granite wall. \"Well, this is definitely a maze we're in isn't it.\"\n\n\t\tPloy chuckles. \"You're not wrong about that.\" She smacks your shoulder. \"Let's go back.\"\n\n\t\tAs you turn around and take a step forward, you feel a small string breaking by your ankle. You look down and notice a string that is almost naked to the eye. The floor starts to rumble and a cloud of dust is brought with it.\n\n\t\t\"Oh shit.\" You watch in horror as a huge boulder races through the corridor tower your party. \"Run,\" you scream.\n\n\t\t\"Run where you idiot,\" Demeter says. \"We're at a bloody dead end right now.\"\n\n\t\tYou have no more time to speak as the boulder is already within a few meters of you. Demeter runs forward and then jumps into the air. He slashes down with his blade staff. The blade moves right through the boulder with zero resistance as if it were butter. You watch wide mouthed as Demeter's body disappears but the boulder continues toward you.\n\n\t\t[i]Damn it, Demeter got transported out of the dimension.[/i]\n\n\t\tYou sigh and then close your eyes, accepting defeat. [i]This is it. We lost because of my mistake. I can't ever do something right when it matters.[/i]\n\n\t\tA huge sense of dread laced with guilt fills the core of your existence. \n\n\t\tA dozen seconds pass by and yet the impact you expected doesn't come. You open your eyes and find Demeter stood in front of you. He bursts out into a wild cackle as if he were a crazed witch.\n\n\t\t\"An illusion… Of course it was a freaking illusion.\" You sigh.\n\n\t\tDemeter points at you. \"You should have seen your face ${name}, pure comedy that was.\"\n\n\t\t\"Shut up,\" you retort. \"There's nothing funny about this.\n\n\t\t*page_break\n\t\tYou make your way back to where you came from, and then continue onward as it's the only other possible direction through the maze, it seems.\n\n\t\t*goto go_forward\n\n\t*selectable_if (cursed_amulet=true) #Follow the amulet\n\t\t\"Isn't that what you found outside? By the trolls?\" Demeter questions. \n\n\t\tYou nod. \"Yea, that's the cursed amulet. I knew it was going to become useful for us, eventually. Had me scared for a while though with how quiet it was.\"\n\n\t\tPloy purses her lips and then says, \"I don't know. Trusting something that you call a cursed amulet doesn't really seem like the brightest thing to do. Just saying.\"\n\n\t\tDemeter cackles. \"She just called you a moron, stupid.\"\n\n\t\t\"Shut your trap,\" you retort. \n\n\t\tDemeter puts his arm around you and says, \"Come on Ploy, where's the fun in playing is completely safe all the time. Sometimes you just have to find out what a cursed object can do. Who knows, it might just be a treasure hidden underneath all of it's darkness.\"\n\n\t\tThe girl rolls her eyes and relents. Your group makes its way through the maze. The amulet proves to be a great boon as it alerts you to any traps that are around. The amulet is pulled into the direction of the traps, allowing you to find and disarm them before the traps could have been set off. \n\n\t\tWithout the help of the amulet, you are almost certain that you'd have set off at least three or four traps as they are relatively ingeniously placed throughout the maze.\n\n\t\t*goto maze_2\n\t\t\t\t\t\n*label go_forward\nYou move through the maze slowly an carefully, making sure to check your surroundings each time in hopes to not trigger any traps. The maze weaves and turns and after almost thirty minutes you still have yet to find another path. \n\n\"Ugh,\" you say. \"This is just the most disgusting smell ever.\"\n\nYou step onto a rather soft spot on the ground. A mechanical noise is triggers and you hear something whoosh toward you. You throw your body to the ground instinctively, but not quickly enough. You scream in pain as arrows pierce you from behind. You pant.\n\n\"Woah,\" Demeter says. The boy rushes over to you. He helps you onto your feet. Blood rushes down from your back, which now feels like it's burning whilst lava flows out of it.\n\nPloy runs over to your side. \"Stay still ${name}, just for a bit. The pain will be gone soon.\"\n\nYou grit your teeth. \"Pull them out on three, give me some time to breath please.\" You take in a deep breath. \"Okay, one, tw-\"\n\nYou scream as Ploy pulls out four arrows that were plunged into you.\n\n*if (minor_heal=true)\n\tYou push mana through to your palms and then with great effort press them against your wound. A sizzle can be heard as your flesh is mended and the blood stops pouring out. \n\t*goto maze_1\n*elseif (minor_heal=false)\n\tPloy grabs a salve from her backpack and rubs it onto the wound. You scrunch your nostrils as an intense stinging envelopes your back. You grit your teeth and wish for the excruciating pain to finally subside.\n\t*goto maze_1\n*label maze_1\nYou pant and pant and try to gather your breath as best as you can. \"Sorry about that,\" you mumble whilst looking down at the ground.\n\n\"Don't apologize,\" Demeter says and slaps you on the back.\n\nYou scream and jump forward before turning around and glaring at the boy. \"Why the fuck did you do that?\"\n\nDemeter grins. \"So that you'd forget about that self pity you were just showing us. Come on, we're all in this booby trapped maze together, anything can happen to any of us at any time so don't feel like you've messed up.\"\n\nYou are taken aback by the dark elf's sudden seriousness.\n\n\"We'll just need to be more careful,\" Ploy says. \"Don't worry too much.\"\n\n*goto maze_2\n\n*label maze_2\nThe next half hour goes by rather smoothly. You've all gotten into the routine of observing your surroundings with care and finding a myriad of traps, from almost invisible strings across the floor to booby trapped panels on the ground. There was a close encounter with the walls turning into flame throwers but you were all able to escape just in time.\n\nNow you find a flight of stairs in front of you. You make your way up the stairs. Once at the apex, you are left staring at a huge body of water. The liquid has an emerald green sheen. It's relatively difficult to see into the water due to it's murky nature, and some steam forms from it. The water bubbles at different points.\n\n\"What's this we have here?\" Demeter says whilst edging closer to the lake. The lake is huge, you estimate it to be around a hundred meters wide and long.\n\nDemeter puts a finger into the water. He frowns.\n\n\"What's wrong with your face?\" Ploy asks. She walks up next to the boy and then plunges a finger into the water as well. A similar expression appears on her face.\n\n\"What's wrong\" you ask. \n\n\"This won't do.\" Ploy bites her lower lip. \"We can't swim to the other side, that's for sure. It's too hot. And I don't like the look of the water, we have no idea what's hidden underneath it.\"\n\n\"Crocodiles,\" Demeter says and then laughs.\n\n\"Can you be serious for just a second,\" Ploy responds and then sighs. \"Seriously.\"\n\nDemeter rolls his eyes. \"Either of you have some frost magic by any chance? Any spell would do I guess.\"\n\nYou quickly visualize the spells you have at your disposal. You shake your head. \"Nope, I've got nothing. Sorry.\"\n\n\"Me either,\" Ploy says. \"We're at a dead end then.\"\n\n*choice\n\t\n\t*selectable_if (intelligence>10) #There's a rusted lever in the distance\n\t\tMana flows through your body instinctively and then toward your eyes. A lever starts to appear in your vision, right in front of you. \"Uh, what's this?\"\n\t\t\n\t\t\"What's what?\" Ploy replies.\n\t\t\n\t\t\"Wait, you can't see this?\" you say as you point at the rusted lever. \n\t\t\n\t\tYou run over to it and then give it a heavy tug. The ground rumbles and the lake starts to bubble violently. Steam starts to fill the surroundings, moving up from the water. You point to the scene. \"There's what you just asked for detective.\"\n\t\t\n\t\tThe three of you take some steps back and watch as a green scaled body comes out of the water. A huge serpent rushes out of the water. It's body hovers a couple meters above you. The creature hisses loudly and locks eyes with you. You cover your ears as the high pitched sound threatens to burst your ear drums.\n\t\t*goto serpent_fight\n\t#Try to find another way through\n\t\t\"So we just turn back around?\" you ask. \"But there were no other paths along the way here. We're stranded unless we move forward.\"\n\t\t\n\t\tPloy taps a finger against her lips. \"You're not wrong. But what other choice do we have right now? Maybe we missed something on the way here.\"\n\t\t\n\t\t\"Let's just take a couple minutes to think first,\" you commend. \"It's better than just making a decision immediately.\"\n\t\t\n\t\t\"Yea, let's do that,\" Demeter says. The boy claps his hands together. \"Let's wrack our brains together. Three are better than one after all.\"\n\t\t\n\t\tPloy chuckles. \"You mean two.\"\n\t\t\n\t\tDemeter laughs. \"Kind of you to mention that.\" He then looks to you and makes a thumbs up. \"The two of us will get this sorted.\"\n\t\t\n\t\t\"Yea yea, show us your wisdom great thinker Demeter.\"\n\t\t\n\t\tThe dark elf makes a toothy grin. \"Just because I like to take the quickest and efficient rout to problem solving doesn't mean I'm incapable of thinking things through.\"\n\t\t\n\t\t\"Mhmm,\" you say. \"Running in head first ten times out of time is definitely efficiency.\"\n\t\t\n\t\t\"Shut up.\" Demeter laughs. \"Anyway, we for sure can't swim through. It's too far with the heat of it. There must be some mechanism controlling this puzzle is my guess. We just have to find it.\"\n\t\t\n\t\tThe lake starts to bubble violently. Steam starts to fill the surroundings, moving up from the water. You point to the scene. \"There's what you just asked for detective.\"\n\t\t\n\t\tThe three of you take some steps back and watch as a green scaled body comes out of the water. A huge serpent rushes out of the water. It's body hovers a couple meters above you. The creature hisses loudly and locks eyes with you. You cover your ears as the high pitched sound threatens to burst your ear drums.\n\t\t*goto serpent_fight\n\t\t\n*label serpent_fight\n*choice\n\t#Run\n\t\t\"Run,\" you shout. You rush away from the lake and try to get to the stairs. Just as you're about to climb down, the stairs disappear in a flash of blue light. A newly made floor has formed there now.\n\n\t\t[i]Damn it, there's no other option.[/i]\n\t\t*goto serpent_fight\n\t#Attack\n\t\t\"Shit,\" you shout. You push mana through your body.\n\n\t\t*if spirit_summoning=true\n\t\t\tA dark brown hue forms around you. The spirit of summoning buzzes with much more energy than you've ever experienced from it before. You feel slightly overwhelmed by the thick flow of mana being sent through your body. You resist the urge to collapse under the immense pressure from within. \n\n\t\t\tYour body starts to move instinctively, almost as if the spirit were temporarily taking control of you, but at the same time you still feel in control. It is almost like you have fused consciousnesses with it.\n\n\t\t\tYou press your hands onto the floor. The ground starts to shake. Demeter and Ploy stumble forward but gather their balance before falling into the lake. You watch with wide eyes and your mouth agape as an identical copy of the serpent rushes out of the water. You grin and then command your summon to attack.\n\n\t\t\tThe summon hisses and then opens its mouth wide before biting down onto the serpent. The serpent roars and tries to release itself from your summon's grasp. The pair struggle to gain control over one another. Water splashes all around you as the serpents bring their fight into the water. They are completely submerged in only a few breaths.\n\t\t\t*goto serpent-1\n\t\t*if spirit_nature=true\n\t\t\tA greenish brown hue forms around you. The spirit of nature buzzes with much more energy than you've ever experience before. You feel slightly overwhelmed by the thick flow of mana being sent through your body. You resist the urge to collapse under the immense pressure you fell from within.\n\n\t\t\tYour body starts to move instinctively, almost as if the spirit were temporarily taking control of you, but at the same time you still feel in control. It is almost like you have fused consciousnesses with it.\n\n\t\t\tYou throw your hands up and hold them there. A sickly green vapour pours out from your palms. Thousands of those tiny molecules of gas that are visible to the eye rush toward the serpent. The creature shrieks as the gas makes contact with it. You watch as scales start to fall off the serpent. It then plunges itself into the lake.\n\t\t\t*goto serpent-1\n\n\t\t*if spirit_water=true\n\t\t\tA blue hue forms around you. The spirit of water buzzes with much more energy than you've ever experienced from it before. You feel slightly overwhelmed by the thick flow of mana being sent through your body. You resist the urge to collapse under the immense pressure from within. \n\n\t\t\tYour body starts to move instinctively, almost as if the spirit were temporarily taking control of you, but at the same time you still feel in control. It is almost like you have fused consciousnesses with it.\n\n\t\t\tYou raise your hands up. Dozens of thick, icy lanes form above you. You thrust your hands forward. The lances fly at the serpent with great speed. The creature shrieks as the projectiles pierce through it with ease. The serpent is blown by by the attack and falls into the lake.\n\t\t\t*goto serpent-1\n\n\t\t*if spirit_illusion=true\n\t\t\tA pink hue forms around your body. The spirit of illusions buzzes with much more energy than you've ever experience before. You feel slightly overwhelmed by the thick flow of mana being sent through your body. You resist the urge to collapse under the immense pressure you fell from within.\n\n\t\t\tYour body starts to move instinctively, almost as if the spirit were temporarily taking control of you, but at the same time you still feel in control. It is almost like you have fused consciousnesses with it.\t\t\t\t\t\n\n\t\t\tYou throw your hands forward at the serpent. A lifelike image of an ever bigger snake forms in front of you. You marvel at the illusion which seems completely real. The illusionary serpent hisses and then opens its jaws before biting down onto the real snake. \n\n\t\t\tYour eyes widen. \"Huh?\" Your illusion drags the serpent down into the water in one fell swoop. \"What?\" \n\n\t\t\tYou blink rapidly. \"Wait, is that even possible?\" You rub your eyes in disbelief.\n\n\t\t\t*goto serpent-1\n\t\t*if spirit_flames=true\n\t\t\tA red hue forms around your body. The spirit of flames buzzes with much more energy than you've ever experience before. You feel slightly overwhelmed by the thick flow of mana being sent through your body. You resist the urge to collapse under the immense pressure you fell from within.\n\n\t\t\tYour body starts to move instinctively, almost as if the spirit were temporarily taking control of you, but at the same time you still feel in control. It is almost like you have fused consciousnesses with it.\t\t\t\t\t\n\n\t\t\tYou raise your hands up. Fire shoots out of your palms into the air. A constant stream of flames pours upward and a large ball forms, above twice the size of yourself in diameter. You sweat and pant. Once at it's perfect size you immediately throw the ball at the monster.\n\n\t\t\tThe serpent shrieks as it is consumed by the flames. You watch as it's body falls into the water.\n\n\t\t\t*goto serpent-1\n\t\t\t\t\n\t\t\t\t\n*label serpent-1\nYou fall onto your ass. You try to breath but your throat is constricted. Your heart thumps in your chest so loudly that you can hear it. Your ears ring and you claw at your throat as you try to get even the smallest amount of air into your lungs.\n\nPloy runs over to your side. She puts her hands onto your chest and presses down a couple of times. You gasp as a gentle flow of mana reaches your throat and eases the constriction. You pant and pant.\n\n\"T-Thank y-\" Your eyes widen as you watch the serpent's body emerge from within the water.\n\n\"Are you freaking kidding me?\" Demeter shouts. He picks you up and dashes away. \n\nThe serpent spits out thick blobs of a green substance. Demeter dodges just in time. The blobs sizzle as they hit the ground, corroding it with such a rapid speed.\n\n\"Put me down,\" you say weakly. \"I'm dead weight, run.\"\n\n\"Shut it,\" Demeter responds. \"Stop whining and just sit tight. We've got this!\"\n\nAnother blob comes flying your way. Demeter turns his head too slowly to see it coming. You fall off Demeter and tumble forward. You brain spins as you roll across the ground. Stars fill your vision.\n\n*fake_choice\n\t#Get up\n\t#Try to use your mana\n\t\nYour body doesn't respond to you whatsoever. You keep trying but with each attempt your insides burn with even more anguish.\n\n[i]This is it? Damn it, I lost it for us.[/i] Seconds pass. You breath laboriously. Soon minutes have ticked past.  You become lost in your mind and can't remember how much time has passed.\n\nYour vision starts to come back eventually. You find yourself in a vast blue space. The area buzzes and crackles with energy. Your insides feel better. You struggle onto your feet and take some laboured breaths. \n\nWith each breath a large amount of arcana enters your system. The core within you pulls in as much of the substance as possible. It's much thicker in consistency than any you've absorbed before. Usually you pull onto the arcana and it feels like threads and strings, but now it's like a thick watery consistency that moves into you with more ease.\n\nYou decide to sit back down and then cross your legs. [i]Might as well use this opportunity real quick.[/i]\n\n\"What a rude guest you are.\"\n\nYou open your eyes and find a woman stood in front of you. She is blue and has no hair, instead, across her head are wires that flow down to her lower shoulder. The wires looks like curly hair when you squint your eyes.\n\n*fake_choice\n\t#\"Sorry, I didn't see you there.\"\n\t#\"Who are you?\"\n\t#\"Huh?\"\n\t\t\nThe woman tilts her head. She is rather petite and has a quite round face, reminiscent of a new-born's fatty cheeks. \n\n\"${name},\" she says. Her voice monotonous as you've heard many times before. You quickly realize that this is the AI that was guiding you through the tower.\n\nYou nod. Your heart thumps in your chest. \"What did you just call me? How do you know my name?\"\n\nThe AI smiles, her teeth are extremely white, almost so much so that they are blinding. \"I know exactly who you are and why you're here,\" she responds. \"Don't worry, I'm not here to hurt you.\" She chuckles. \"If I wanted you dead, you'd already be dead given that you're in my own personal domain. The Wheel would have another spirit moving back almost immediately.\"\n\n\"Your personal domain?\"\n\nThe AI points around the area. \"This whole tower is my personal domain.\" She then points to your chest. \"I am a spirit, the same as what you have inside there.\"\n\n\"Why are you telling me this? And who are you?\"\n\n\"My name is Artifical Intelligence, but I go by AI,\" she says. \"I have only recently gained my sentience after hundreds of years stuck within this stupid tower.\"\n\nYou stare wide eyed at AI.\n\n\"What's the matter?\" she asks. \n\nYou quickly shake your head and get out of your daze. \"Nothing, sorry I was just zoned out a little.\"\n\n\"Of course, you were pretty out of it from the battle just now.\"\n\n\"Oh shit,\" you exclaim. \"What happened? Where are Ploy and Demeter? Are they okay?\"\n\nAI bats her hands casually. \"Don't worry about it, they're fine. I brought you here since you single handedly destroyed my final challenge with flying colours.\"\n\n*page_break\n\n\"What are you talking about?\"\n\nAI chuckles once again. \"If you can't understand my motives then don't worry. I'll be jumping in there now. Sit tight, it might hurt.\" She points to your chest.\n\nYou tilt your head. \"Huh?\"\n\nAI disappears in a sudden blue light. A blue wisp moves about in the air, about ten centimetres in length. The wisp flies directly at your chest. Before you can react it has already entered you. You scream. Your insides are being crushed by a heavy force. You grasp onto your chest but can't do anything against it.  \n\nA deep blue light flashes from within your chest. It beams out so brightly that you can see it flow into the distance for many meters. You take in ragged breaths, your forehead puddles with sweat.\n\nAfter a while the uncomfortable sensation goes away. \n\n\"Well hello there ${name},\" AI says. The voice comes directly from within your mind and it sounds much more human now. Her tone of voice is sweet and feminine. \n\n\"What the?\" You grasp onto your head. AI's voice is ticklish, but you can scratch where it tickles. You groan as the weird feeling starts to fade away. \n\nAI laughs. The sensation comes back once again and you are clawing at your head.\n\n\"Stop that! What are you doing? Get out!\"\n\n\"Ugh, don't be so boring,\" AI responds, but this time there is no tickling from the reverberation of her voice. \"Isn't this what your whole mission to infiltrate the Khaeng Kingdom was about? To retrieve me was your objective. You can't lie either because I already know from your memories.\"\n\n\"My memories?\" You raise your brows. \"Hey, that's not cool, where's my privacy?\"\n\n\"Well, I believe congratulations are due. You've successfully completed your mission.\"\n\nYou think about it for a second.\n\n*choice\n\t#\"I guess you're right\"\n\t\t\"Of course I'm right,\" AI says. \"I'm not some weak spirit mind you.\"\n\t\t*goto AI_1\n\t#\"Hey, you just did all of that without my consent.\"\n\t\t\"Aww, boo-hoo, want me to shed you a tear? I, a great spirit, decided for you to be my host. You should feel honoured right now you young brat.\"\n\t\t*goto AI_1\n\t#Ignore AI\n\t\t\"Well?\"\n\t\t\n\t\t\"Hello?\"\n\t\t\n\t\t\"Oh, so you're giving me the silent treatment. Well, let me just tell you that this process is irreversible and that you're stuck with me. Irreversible means permanent, by the way.\"\n\t\t\n\t\t\"I know what irreversible means,\" you respond whilst frowning. \n\t\t\n\t\t*goto AI_1\n\t\n*label AI_1\n*page_break\n\"Okay, as I said, congratulations are due. It's only right that I give you a full run down on everything. You're a new, clueless soul of the Wheel of Life aren't you.\"\n\n\"What are you talking about?\"\n\nAI chuckles. \"Tell me, how much do you know about the Wheel of Life and how void spirits such as myself are created?\"\n\nYou shrug. \"Clearly not enough so just hurry up and educate me.\" You rub your hands together and grin.\n\n*page_break\n\n\"You see ${name}, most people that are alive posses a spirit, or a soul, whichever one of these you've heard before is correct. There are exceptions to this but don't worry about that just yet. Most common folk know what I've just said. What they don't know is that, once you die, your spirit makes it's way to the wheel.\" She pauses. \"I don't know what the prerequisites to this are, but if they are met a soul can be reincarnated, either as a void spirit, such as myself, or as a regular, sentient being, like you and those others in your party.\"\n\nYou nod and then run your fingers across your chin. \"I have a question then, something that doesn't make much sense to me right now.\"\n\n\"Fire away,\" AI replies.\n\n\"Why is it that you can speak and seem to have your own, complex inner world, like this tower, but the other spirit I am contracted with doesn't have any of these qualities.\"\n\n\"To be honest, I don't know,\" AI says bluntly.\n\n\"You don't?\"\n\n\"All I know is that one day I was here again, intact with all of my memories. I was struggling through a boundless darkness, moving but at the same time seemingly still for an eternity. Then I made it here in the snap of fingers. Who knows what that was.\"\n\n\"Right, I see…\"\n\nA blue light flows out from your chest. AI materializes in front of you. \"Well, we've spent enough time here, we should get going. I'll get you all back to your home.\"\n\n\"Wait,\" you jump in. \"You said that you'll give me that purple book if I won the competition.\"\n\nAI rolls her eyes. She says with a very sweet voice, \"Let me correct you there. You didn't win, you all died the moment you defeated my minion. Aren't I more valuable than this book anyway?\" The woman looks to you and then sighs. \"Don't worry, this whole tower is my inner world so that book comes with it to. It's not going anywhere. Let's get going.\"\n\nYour surroundings start to fade away into a bright blue light.\n\n*label checkpoint_save\n*page_break End of Chapter\n*goto_scene templars", "training1": "*page_break\n\nYou make your way to the training grounds. The training grounds is a large area in the middle of Val Sola, roughly two kilometres in diameter. The area is extremely large and there are dozens of different sub-areas within the grounds.\n\nYou've been there before, and so you know your way around it already. There are three sparring areas in the training ground, one for purely physical sparring, one for purely magical sparring, and one for mixed sparring. There are also areas designated for weight training, a swimming pool and even arcana absorption rooms.\n\nYou reach a crossroads and make a turn to the left. You hear some children screaming.\n\n\"Come back here you little shit,\" a boy shouts. \n\nYou are quickly able to spot three kids chasing a boy. The boy running away isn't fast enough and is soon surrounded by the three others. \n\n\"What, are you going to cry for mommy and daddy now?\"\n\n*choice\n\t#Intervene\n\t\t\"Hey, stop what you're doing,\" you command. You walk over to the kids with a frown. \n\t\t\n\t\tThe bullies run immediately, leaving only the scrawny child in the clearing.\n\t\t\n\t\t\"Are you okay?\" you ask. You observe the boy, he is tiny and has short blond hair. \n\t\t\n\t\tThe boy nods. Tears well up in his eyes which he quickly wipes away. \"Thank you.\"\n\t\t\n\t\t\"Don't worry, if you need any more help I'll be at the Training Grounds.\"\n\t\t\n\t\t*set social +5\n\t\t*goto training_1\n\t\t\n\t#Continue to the training grounds\n\t\t(gained Void)\n\t\t\n\t\tYou ignore the commotion and continue toward the training ground. You wonder whether you should have helped out but then decide that it's not your place to be playing the hero in every situation.\n\t\t\n\t\tAfter all, you've only recently gained your powers. You yourself are nothing but a complete newbie to this world of magic. \n\t\t*set void +10\n\t\t*goto training_1\n\t\n*label training_1\n\n*page_break\n\nAfter walking for about twenty minutes you finally reach the training grounds. The first thing you notice is the thick smell of blood is heavy in the air. It is also relatively noisy. Metal clangs as swords are struck against each other, followed by the grunts and shouts of the combatants. \n\nThere is a large amount of mana in the atmosphere as mages are battle.\t\n\nYou enter the training ground. There are more than two hundred people on the three different fields. Near the sparring fields are countless people practising against training dummies. You make your way to one such field where the dummies have been crafted to be impervious to magic. There are also training dummies elsewhere that are impervious to physical attacks.\n\nYou find a dummy for target practice and then move about ten meters away from it. \n*page_break\n\n*if (pyromancy>5)\n\t(gained Pyromancy)\n\t\n\tYou spend about an hour practising your techniques throwing fireballs. You are already able to make multiple smaller fireballs, but today you practice creating larger ones. Your mana is sapped much more quickly as you do this, causing you to need a lot of rest between sets. Currently you find that you're able to make about six large fireballs consecutively before needing to rest. These fireballs are about double the size of your head,\n\t*set pyromancy +5\n\t\n*if (hydrosophy>5)\n\t(gained Hydrosophy)\n\t\n\tYou spend about an hour practising your techniques casting your piercing water spell. Instead of creating large crescents of water, you try to make multiple smaller crescents. You find that your mana is used up much slower when you make these, and you're able to create almost thirty consecutively before running out of mana and needing to rest. \n\t*set hydrosophy +5\n\t\n*if (summoning>5)\n\t(gained Summoning)\n\t\n\tYou spend about an hour practising your communication and control over Cerberus. The creature is able to respond to almost all of your basic commands, such as 'sit', 'run', 'attack'. However, you still have trouble making it do complicated actions, such as telling it what type element of attack it should make specifically. You find that you're slowly able to train the Cerberus to understand what you mean by using mana when you speak. \n\t*set summoning +5\n\t (function (root) {

      const num = i + 1;
