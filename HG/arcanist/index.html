erbs and says, \"We should head back.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto third_day\n\t\t\t#Mbali\n\t\t\t\t(Mbali approves)\n\t\t\t\t\n\t\t\t\tYou are quick to find Mbali to one side of the village. She is stood atop a hill, looking down at the main village. You join the girl in enjoying the sunset. \n\t\t\t\t\n\t\t\t\t\"What do you think?\" Mbali asks.\n\t\t\t\t\n\t\t\t\t\"About what?\"\n\t\t\t\t\n\t\t\t\t\"Tell me, what are you thinking about right now. Be honest.\"\n\t\t\t\t*set mbali +5\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"How much I hate the situation we've been put in right now.\"\n\t\t\t\t\t\t\"How much I hate the situation we've been put in right now,\" you say. You sigh. \"This is so unfair.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tMbali nods. \"I agree, it's unfair. But I suppose these were the cards we've been dealt. We are Voidwoken and as such need to do what we can to protect each other.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"But still… Don't you think it's completely unjust that we're just thrown into this situation with no choice whatsoever? I hate it when I'm not given a choice.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tMbali chuckles. She turns to you and steps closer. She looks up into your eyes with a conviction you've never experienced from her before. \"You're thinking about this too selfishly ${name}. Your realize we're the lucky ones, we have the power and the ability to change the future of our kind. For ever hundred Voidwoken in Val Sola there's only one of us, with the ability to house a spirit within themselves. You get what I'm saying?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou shake your head.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe girl sighs. \"I'm saying that we're privileged. We can at least fight back against the Templars. The others can't, so it's our duty to make sure we do everything in our power to keep them safe.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe two of you sit down and watch the sunset before leaving back to the wooden shack once it gets dark.\n\t\t\t\t\t\t\n\t\t\t\t\t#\"How beautiful this view is.\"\n\t\t\t\t\t\t\"How beautiful this view is,\" you say. The sun's light has turned the sky a mixed hue of orange and purple. You look down at the small village, watching the dozens of children running around and playing with each other. It is a quite peaceful scene in front of you. \"I wish I could relax like this everyday.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tMbali pats you on the shoulder. \"Don't worry, once we're done with this you'll get a lot more time to relax.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou sigh. \"I'll still be confined to Val Sola. It's starting to feel more like a prison than a sanctuary.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe girl laughs. \"You're not wrong on that, I've thought this many times before. But at the end of the day it's one of the only places we can truly relax without worrying about having to constantly look behind our backs. In the open world right here, there will always be enemies hidden in the shadows, ready to pounce at us.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou gulp hard. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe two of you sit down and watch the sunset before leaving back to the wooden shack once it gets dark.\n\t\t\t\t\t\n\t\t\t\t\t*selectable_if (((((mbali>25) and(orientation=\"gayF\")) or (orientation=\"straightM\")) or (orientation=\"bisexual\")))\t\t\t\t\t#\"How beautiful you are\" (Sex Choice)\n\t\t\t\t\t\t\"How beautiful you are,\" you say.\n\t\t\t\t\t\t\n\t\t\t\t\t\tMbali chuckles. \"Is that so?\" She moves closer to you until you can feel her breath against your skin. She then whispers, \"And what will you do with my beauty?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou smile. \"Whatever you want me to do.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe girl raises a brow and then grabs your hand. She presses your hand against her breast and looks at you with lust. \"I want you, here and now.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou lift her chin with your hand and press your lips against hers. They are soft, and taste sweet like cherries. \n\t\t\t\t\t\t\n\t\t\t\t\t\tMbali pushes you onto your back and then jumps on top of you. She rips off your shirt and then kisses your neck. She slowly kisses downward until she reaches your stomach. She grabs your slacks and pulls them down. \n\t\t\t\t\t\t\n\t\t\t\t\t\tShe rubs her tongue against your stomach, and as you moan she says, \"I'm going to fuck you until your body gives in it me.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#\"I'm scared.\"\n\t\t\t\t\t\t\"I'm scared,\" you say. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe girl nods understandingly. \"I know what you mean. It is scary, what we are, what we have to do, the people chasing us. Everything about this is scary.\" She takes in a deep breath and then sits down. You do the same. \"But do you know what?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What Mbali?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"If I were given the choice of this or being able to live a completely normal life, I would still choose this.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou are taken aback. You look the girl up and down. \"Do you really mean that?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (mbali>25) \n\t\t\t\t\t\t\tThe girl nods. \"It's because of meeting people like you that I wouldn't choose to going back to living a normal life.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYour mind blanks. \"Wait, what?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tMbali grins. She puts her hand onto your lap. She looks at you with a twinkle in her eyes. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Kiss her\n\t\t\t\t\t\t\t\t\tYour heart thumps in your chest and a heat rises to your face. You place a hand underneath Mbali's chin and lift it up. You press your lips against hers.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tHer lips are soft and taste of cherries. As you kiss her tongue enters your mouth. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou pull back. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"What? Sorry, don't you like that?\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou shake your head. \"I wasn't expecting it, aha.\" You rub the back of your head. \"I like it.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tMbali grins. \"Then come here you ${handsome} ${man}.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#Pull away\n\t\t\t\t\t\t\t\t\tYou pull away from Mbali and stand up. \"I'm sorry,\" you say. \"I can't do this.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tMbali sighs. \"It's alright… We should get going.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*if (mbali\u003c25)\n\t\t\t\t\t\t\t\"Of course I mean that,\" Mbali responds. \"After having a taste for magic I can't say I want to go back to being regular. It's too boring for me, don't you agree?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou think back to how your life was only a couple months before. How much you yearned to be able to learn magic and have the wonders of the world revealed to you. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#You agree with Mbali, you wouldn't give up what you have now for a normal life. There's nothing you want more than to unravel the mysteries of the world.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#You disagree with Mbali, you would give up what you have now for a normal life. There's nothing you want more than to live a happy life with your family.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#You are impassive and don't really care either way. You accept the way things are now and that is it.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou spend the next half hour watching the sunset, and once it turns dark you make your way back to the wooden shack.\n\t\t\t\t\n\t\t*set social +5\n\t\t*set dexterity +5\n\t\t*goto third_day\n\t\n*label third_day\n*page_break Day Three\nOn the last day you decide to meditate.\n\t\nYou spend most of the day meditating after finding out new information from one of the tomes you brought with you. You find out that if you use the correct technique of meditation, you will be able to convert the arcana from the atmosphere into mana. Increasing your mana reserves will allow you to cast spells more frequently and will also allow you to cast higher level spells. \n\nUp until now you've only been using meditation to help regain your mana stores. With this new information in hand, you begin meditation with a new found excitement. It doesn't take long for you to figure out how to increase your mana stores as the instructions from the tome were very easy to understand. Unlike with regular meditation where you allow the arcana to wash through every area of your body equally, in this instance you focus it directly onto the purple arcana core you possess deep within you. This core is responsible for the production of the mana in your body that lets you cast magic. \n\nYou meditate for about three hours before reaching your limit. You feel full, and your insides are brimming with so much energy that you feel like you'll burst any moment if you continue trying to refine the arcana from the atmosphere. \n\n[i]Wait, does this mean I can use arcane cores gathered from beasts to increase my mana stores?[/i]\n\nYou make a mental note to yourself to test this theory out in the future. \n\nYou spend the rest of the day chatting with Demeter, Mbali and Ploy. Despite having only spent a few days in Ploy's company, you already feel that the group gels well. Based on your first impression you find Ploy to be…\n\n*fake_choice\n\t#Charming. Her accent is the cherry on top as every word she says flows smoothly.\n\t#Beautiful, she's exactly the type of woman you can find yourself falling in love with.\n\t#Bossy, which is to be expected as she is the leader of your group.\n\t#You're unsure as you've barely gotten to know her.\n\nYou find yourself outside the city walls of Nam Khaeng. You marvel at the great grey structure, which towers somewhere between twenty and thirty meters. The sun blazes from above, causing you to sweat incessantly. It is humid and there is a gentle breeze in the area. \n\nYou reach the front of the queue to enter the city. The queue is in single file, and you are stood to the front of your group. There is a group of six guards wearing some leather armour. They wear their armour relatively scarcely, having their shoulders unprotected. This is probably due to the intense heat that the Khaeng Kingdom experiences on a daily basis. According to Ploy when there isn't heat, there is rain. These are the only two types of weather that come about. \n\n\"Stop there,\" a guard says. He is bald with a scar across his right cheek. He's a muscular fellow, and you his skin is more tanned than most of the others you've seen so far today. \"Documents and reason for entry.\"\n\nYou take in a deep breath. [i]You've rehearsed this dozens of times ${name}, you've got this.[/i]\n\n*choice\n\t#\"I am here to take part in the Tournament of Heart along with my three companions.\"\n\t\tThe guard looks you up and down and then to the three behind you. He raises a brow and then looks at you with suspicion.\n\t\t\n\t\t\"You? You look like you'd be better suited to a carnival,\" he says. The group of five guards behind the man all laugh in unison. \n\t\t\n\t\t\"What did you just say?\" Demeter jumps in.\n\t\t\n\t\t\"Bugger off lady,\" the guard says. He then looks at Demeter with widened eyes. He rubs his hands together. \"You know what, I'll let you through but on one condition.\"\n\t\t\n\t\tDemeter grits his teeth. \"And what would that condition be?\"\n\t\t\n\t\tThe guard turns to his companions and then back to Demeter. \"Come spend a quick fifteen minutes with me, in private.\"\n\t\t\n\t\tDemeter gasps. \"Absolutely not you lowly predator!\"\n\t\t\n\t\t\"Go on Mink, don't let her talk to you like that,\" a guard shouts. \"Show her what Mink is packing down there.\"\n\t\t\n\t\tThe guard snarls and then grabs onto Demeter's shoulder. \"I was being nice because you are attractive, but I will take you by force if I have to.\"\n\t\t\n\t\t\"Shut your trap,\" Demeter shouts and punches the guard. \n\t\t\n\t\t[i]Shit[/i]\n\t\t\n\t\tThe guards unsheathe their swords. \n\t\t\n\t\t*choice\n\t\t\t*selectable_if (strength>25) #Fight\n\t\t\t\tYou grab your two trusty daggers from their sheaths and rush at the nearest guard. You block the guard's sword swipe with your daggers and then kick him in the shin. A loud crunch follows. The guard screams and falls to the ground. \n\t\t\t\t\n\t\t\t\tYou stare at his kneecaps which have completely caved in. \n\t\t\t\t\n\t\t\t\t\"Look out,\" Ploy shouts.\n\t\t\t\t\n\t\t\t\tYou are sent flying by a sword strike. Blood flows from your shoulder which you quickly press on with your hand. You grimace and get back up. \n\t\t\t\t\n\t\t\t\t\"We need to get out of here,\" Ploy says. \"Follow me.\"\n\t\t\t\t\n\t\t\t\tThe girl snaps her fingers. A huge metal hammer materializes in her hands. She swings the hammer at the guards, throwing them all back in the process. \"Run!\" \n\t\t\t\t\n\t\t\t\tPloy leads the way into the city. It is relatively crowded and you can't move a meter without bumping into somebody else.\n\t\t\t\t\n\t\t\t\t\"What do we do now?\" you ask.\n\t\t\t\t\n\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\t\t\t\t\n\t\t\t\tYou do as commanded and take off your ring.\n\t\t\t\t\n\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t*page_break\n\t\t\t\t*goto inside_city\n\t\t\t*selectable_if (dexterity>20) #Grab Demeter and run through the gate\n\t\t\t\t\"Let's go,\" you shout. You then grab Demeter and rush forward. \n\t\t\t\t\n\t\t\t\t\"No you don't,\" a guard says. He swings his sword at your head. \n\t\t\t\t\n\t\t\t\tYou lean back just in time, dodging the blade. You kick up, landing a clean shot at the guard's exposed chin. The guard crumbles to the ground. \n\t\t\t\t\n\t\t\t\t\"Assholes,\" a different guard shouts. He tries to grab onto you but you spin out of his way. You lose your grasp on Demeter and continue onward. \n\t\t\t\t\n\t\t\t\tYou move out of the way of the last guard and then kick him in the groin. \"Asshole,\" you mutter.\n\t\t\t\t\n\t\t\t\tThe others follow close behind you. Once inside you look around for any guards. It is relatively crowded and you can't move a meter without bumping into somebody else.\n\t\t\t\t\n\t\t\t\t\"What do we do?\" you ask. \n\t\t\t\t\n\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\t\t\t\t\n\t\t\t\tYou do as commanded and take off your ring.\n\t\t\t\t\n\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now.\"\n\t\t\t\t\n\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t*goto inside_city\n\t\t\t\t\n\t\t\t\t\n\t\t\t*selectable_if (social>14) #Persuade the guards\n\t\t\t\t(Ploy approves)\n\t\t\t\t\n\t\t\t\t\"Wait,\" you shout. The guards glare at you with their swords readied. \"Let me extend a wholehearted apology for my companion here.\"\n\t\t\t\t\n\t\t\t\t\"Yer damn right should be apologizing,\" the guard who was punched says. He holds onto his bloodied nose. \"I should order you to be slain on the spot.\"\n\t\t\t\t\n\t\t\t\tYou cup your hands together and then bring your fingertips to your nose. \"My deepest apologies. I promise we won't cause any more trouble.\"\n\t\t\t\t\n\t\t\t\tThe guard scoffs. \"Do you now?\" He stamps his feet. \"Unless you have something better than that-\"\n\t\t\t\t\n\t\t\t\t\"Here,\" you jump in.  \"I'll give you all of the gold I have as an apology. I hope you aren't offended.\" You throw a bag of gold at one of the other guards. \n\t\t\t\t\n\t\t\t\tThe main guard is stood wide eyed and dazed. \n\t\t\t\t\n\t\t\t\tYou don't wait for his response and take this as your opportunity and make your way into the city.\n\t\t\t\t\n\t\t\t\t*set gold 0\n\t\t\t\t*set ploy +5\n\t\t\t\t*goto inside_city\n\t\t\t\t\n\t\t\t#Cast a spell\n\t\t\t\tWhich spell will you cast?\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (learn_truth=\"true\") #Cast Learn Truth\n\t\t\t\t\t\tYour mind starts to flow with mana. You stare at the man. You're able to sense that he indeed wishes to defile Demeter. \n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]What the hell was I thinking using this spell?[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\tDemeter dashes to the head guard and slams a fist into his face. The man is knocked unconscious. The other guards look to each other with blank faces and start to back away.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Let's go,\" Ploy says. She runs at you and grabs your hand.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the gate and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (invisibility=\"true\") #Cast Invisibility\n\t\t\t\t\t\tYou pump out mana from within your arcana core and bathe your body in it. Your body flickers a couple of times before disappearing completely.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What the- Where did ${he} go?\" a guard shouts.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou run over to one of the guards in the back and slam the hilt of your dagger on their temple. You then reappear from vision as the guard crumbles to the ground.\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Invisibility breaks on interacting with something.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\tDemeter dashes to another guard and slams a fist into his face. The man is knocked unconscious. The other guards look to each other with blank faces and start to back away.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Let's go,\" Ploy says. She runs at you and grabs your hand.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the gate and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if  (lesser_fireball=\"true\") # Cast Lesser Fireball\n\t\t\t\t\t\tYou push out mana from within your arcana core to your palms. Multiple small fireballs form in a magnificent red blaze. You throw your hand forward, aiming two fireballs at each opponent.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe guards shout as the projectiles rush at them.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Let's go,\" you say before running past the guards and into the city. The others follow behind you.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if  (water_wall=\"true\") # Cast Water Wall\n\t\t\t\t\t\tYou push out quite a large amount of mana from within your arcane core. The mana reaches your hands and you look to the area of the ground in front of you where you want the spell to form. Water bursts out from the ground, diagonally across the guards, shielding you from them.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Quick, let's go,\" you shout. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the gate and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if  (summon_hawk=\"true\") #Cast Summon Hawk\n\t\t\t\t\t\tYou push out a sizeable amount of mana from within your arcane core. You throw your hands forward. A large brown hawk materializes in mid air and flies up into the sky. You are able to control the hawk telepathically and direct it to above the castle walls. You look around and find there aren't many guards.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Let's push through, there's no guards on the wall,\" you say. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Roger that,\" Demeter says. He flings his hands forward. A brownish red energy spreads out and slams into the guards, knocking them onto the ground.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the gate and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\t\t\t\t\t*selectable_if (thorn_armour=\"true\") # Cast Thorn Armour\n\t\t\t\t\t\tYou push out a huge amount of mana from within your arcane core. You almost immediately feel a sapping on your core. A green light bursts forth causing long and sharp green thorns to sprout out and cover your shirt.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Magicians,\" a guard shouts. He rushes over to you and slashes at your chest.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou are pushed back a couple of steps. You look down, not a dent can be found in the armour. Your heart thumps in your chest but you grin, your insides burning like ecstasy.\n\t\t\t\t\t\t\n\t\t\t\t\t\tDemeter dashes to the head guard and slams a fist into his face. The man is knocked unconscious. The other guards look to each other with blank faces and start to back away.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Let's go,\" Ploy says. She runs at you and grabs your hand.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the gate and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\t\t\t\t\t*selectable_if (create_illusion=true) #Cast Create Illusion\n\t\t\t\t\t\tYou push mana forth from your arcana core. You focus on an image of a gargantuan dragon flying in the skies above. It's fangs are dripping with a green poison and it's scales glimmer under the sunlight.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe guards point to the sky.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"D-Dragon!\" \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Run!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe guards scatter like wildfire, bumping into each other and falling on their asses.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Let's go,\" you shout. \n\n\t\t\t\t\t\tYou sprints past the gate and weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if (flame_dash=true) #Cast Flame Dash\n\t\t\t\t\t\tYou push mana from your arcana core throughout your body. The soles of your feet start to heat up. You look to where you wish to move and then pulse forward. You leave behind a stream of flames in your wake. You have made it all the way into the city.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou look back to your companions and wave.\t\t\t\t\t\t \"Guys, let's go!\" \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe guards panic and try to kick away the path of flames.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the city gates and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if (wall_of_fire=true) #Cast Wall of Fire\n\t\t\t\t\t\tYou push mana from your arcane core through to your extremities. Your hands start to take on a bright red glow. You aim for where you want the spell to land and then throw your hands forward. A fiery wall forms in front of the guards. It reaches almost two meters up. Your hear the guards scream.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Quick, let's go,\" you shout. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the gates and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if (mirage=true) #Cast Mirage\n\t\t\t\t\t\tYou push mana from within your arcane core throughout your entire body. You look to the gate entrance. You focus on where you wish to move and then allow your mana to burst out. Only a watery image of yourself remains where you'd been stood. You have now made it through the entrance.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Quick, let's go,\" you shout. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Roger that,\" Demeter says. He flings his hands forward. A brownish red energy spreads out and slams into the guards, knocking them onto the ground.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the gate and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if (water_cannon=true) #Cast Water Cannon\n\t\t\t\t\t\tYou push your mana from within your arcane core through your body. Once the mana reaches your palms a blue torrent of water starts to form in them both. You throw two torrents at each opponent, causing them all to be briefly knocked onto the ground.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Quick, let's go,\" you shout. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the gate and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if (thorns=true) #Cast Thorns\n\t\t\t\t\t\tYou push your mana through your body, which takes on a dim greenish-brown shine. You then throw your palms onto the ground and let your mana flow into it. A large vine covered in thorns sprouts behind the guards and slams into them, throwing them forward. You kick away a guard that is thrown your way.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Quick, let's go,\" you shout. \n\t\t\t\t\t\t\n\t\t  us for now. We'll put them back on once the coast is clear.\"\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\t\t\t\t\t*selectable_if (water_breath=true) #Cast Water Breath\n\t\t\t\t\t\tYou push mana from within your arcana core through to your body and then throw your hands forward. \"Get them Cerberus,\" you shout. Your summon forms in front of you. Each of its three heads barks as it locks eyes with the guards.\n\n\t\t\t\t\t\tCerberus howls and then the mouth of it's middle head opens up wide. The hound spouts out a torrent of water at the guards. The guards panic and scream before turning tail and running off.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Quick, let's go,\" you shout. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the city gates and weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (minor_heal=true) #Cast Minor Heal\n\t\t\t\t\t\tYou push your mana forth and focus it onto your hands. A warm yellow light covers your hands. The spell has no effect as you are not injured. \n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Why did I just do that?[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\tDemeter dashes to the head guard and slams a fist into his face. The man is knocked unconscious. The other guards look to each other with blank faces and start to back away.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Let's go,\" Ploy shouts. She runs to you and grabs your hand. You sprint hand in hand with Ploy past the gate and weave through the crowded city.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou look around for any guards. \t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance changes to that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\n\t\t\t\t\t*selectable_if (mud=true) #Cast Mud\n\t\t\t\t\t\tYou push the mana from within your arcane core out. The substance washes over your body and you press your hands onto the ground. Mud starts to form with you at it's centre before expanding outward. The guards loose their footing and fall to the ground. Your companions aren't under the effect of the spell as you don't want them to be.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Quick, let's go,\" you shout. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYour group sprints past the city gates and you weave through the crowded city. You look around for any guards. \n\t\t\t\t\n\t\t\t\t\t\t\"What do we do?\" you ask. \n\n\t\t\t\t\t\t\"Take your rings off,\" Ploy says. She then goes ahead and puts a ring on instead. Her appearance morphs into that of a tall girl with tanned skin and short black hair. \n\n\t\t\t\t\t\tYou do as commanded and take off your ring.\n\n\t\t\t\t\t\t\"Let's go,\" Ploy says. \"This way they won't be able to spot us for now. We'll put them back on once the coast is clear.\"\n\n\t\t\t\t\t\t*set fight_gate \"true\"\n\t\t\t\t\t\t*goto inside_city\n\t\t\t\t\t\t\n\t\t\n\t#Hand over your documents\n\t\tThe guard looks at your documents whilst squinting. \n\t\t\n\t\t\"Everything seems in order,\" he says. He then stretches his hand out. \"That'll be 30 gold.\"\n\t\t\n\t\tYou hand the guard a bag of gold that Ploy had prepared in advance. The amount is short by ten gold so you quickly add to it from your own pocket.\n\t\t\n\t\t\"Welcome to Nam Khaeng,\" the guard says. \"Don't cause any trouble and we won't have any issues.\"\n\t\t\n\t\tYou nod and then make your way into the city with your companions.\n\t\t\n\t\t*set gold -10\n\t\t*goto inside_city\n\t\t\n\t*selectable_if (illusion>25) #Use your illusion spirit\n\t\tYou put your hands together and let your mana flow through to your palms. You release the illusion onto the guard. \n\t\t\n\t\tThe man immediately tenses up and stands up straighter. He looks to you with fear and adoration. He salutes and says, \"My apologies prince, make your way in immediately.\"\n\t\t\n\t\t\"Prince?\" Demeter whispers.\n\t\t\n\t\t\"Shut up and play along,\" you respond.\n\t\t\n\t\tYou quickly enter the city with a grin on your face. [i]That was easy.[/i]\n\t\t*goto inside_city\n\t\n*label inside_city\nYou marvel at the beauty and lustre of Nam Khaeng. The buildings are large and many of them have an onion-shaped dome at the top, whilst others spiral upward like tornadoes. You see colourful and lively aesthetics all around, the colours of the rainbow almost equally represented throughout the city. \n\nThere are multiple people that you pass wearing cloths across their whole heads, only their eyes being revealed. They move about at a much slower pace than you are used to. This is probably why it is so crowded and busy here, everyone is moving at a snail's pace. Aromas that make you instinctively salivate waft through the air as you wander through Nam Khaeng. You see hundreds of chefs with stalls along the streets, cooking their products on open flames. There are dozens of spices that you've never seen before, and pastries and dishes you'd never have imagined to exist.\n\n*fake_choice\n\t#You are gluttonous and try as much food as you can.\n\t#You take your time browsing the dishes and pick out a select few.\n\t#You don't have the luxury to try any new food, your objective is the tournament.\n\nThere are many guards stationed around the perimeter of the city wall, however the further into the city you get, the less guards you see.\n\nThe people of Nam Khaeng seem to be all smiles, and you only rarely notice sullen expressions on their faces.\n\n*choice\n\t#Ask about the architecture\n\t\t\"Ploy,\" you say. \"You're a native to here, right? Can you tell me more about the buildings in the city? They are quite beautiful, I must say.\"\n\t\t\n\t\tPloy nods. \"I agree. You see, Nam Khaeng is ruled by imperial decree, the King possesses the station of a god. Because of that, of course, the current King and those previous in line have always had a desire to create a city that will be marvelled upon by any foreigners that make their way here. A way to show that the Khaeng Kingdom is strong and wealthy. Even if that isn't really the case.\"\n\t\t\n\t\t\"Is it like this all over the kingdom?\" Mbali asks. \n\t\t\n\t\tPloy shakes her head. \"Unfortunately, this is more of an exception than a rule. You see, many scholars and philosophers over the generations have shown great resentment to the obscene amount of wealth thrown at this city, whilst all of the other areas of the kingdom are less than sub-par. This place is just an illusion of power. Beautiful as it may be, there are dark secrets hidden behind every structure built.\" She pauses and turns to look you in the eyes. \"Every single building has the blood of thousands laced into it.\"\n\t\t\n\t\tYou gulp hard and then look at your surroundings more carefully.\n\t\t*goto tournament1\n\t#Ask about the people in Nam Khaeng\n\t\t\"Ploy,\" you say. \"I've only seen people smile here. Are they really that happy?\"\n\t\t\n\t\tThe girl shakes her head. \"Unfortunately that isn't that case,\" she replies. \"The smiles are a part of the culture here. The people will smile even if they are angry. Smile if they are sad. Smile if they are happy. You see, that's just how it is here. I can't tell you why because I don't know. It's always been this way.\"\n\t\t\n\t\t\"Oh, I see,\" you say whilst scratching the back of your head. \"I'm not sure I really understand it.\"\n\t\t\n\t\tPloy smiles. \"You don't have to. Just remember that just because somebody is smiling doesn't mean they agree with you or have any good will toward you.\"\n\t\t\n\t\t*goto tournament1\n\t#Stay quiet\n\t\tYou continue your way through the bustling streets of Nam Khaeng, observing every minute detail you come across. You spot some little children running around, chasing each other, whilst there are other children who are selling drinks and food. \n\t\t\n\t\tYou notice that the city, despite having such a large quantity of buildings made out of gold and other precious materials, isn't as beautiful as that image would give. The people seem to be hard working and there seems to be quite a large prevalence of poverty. There are many people whose clothes are dirtied or tattered, yet everyone smiles, no matter what. \n\t\t*goto tournament1\n\n*label tournament1\n*page_break\nAfter making your way through the city, you soon find yourself at the location for the Tournament of Heart. You are inside a building that Ploy called the Foundry, and inside you find there are more than five hundred others. From these estimations there must be at least more than 100 groups that are going to take part in the competition. \n\nThe Foundry is filled to the brim with more gold than you've ever encountered in your life. Walls made of gold, chandeliers made of gold, even chairs and tables are made of gold here. The room you are in is only one of dozens of the Foundry, which is more akin to an estate or mansion. Some steps lead to an elevated floor, where there stands a podium. It strikes you as odd, as unlike everything else that is tinged yellow, it is the only thing not made out of gold. It seems to be obsidian, one of the other precious materials you've seen about in Nam Khaeng. Obsidian isn't as widespread as gold in the city, but you do remember seeing your fair share of it since getting here.\n\nA tall, aged man with deep brown skin walks out from behind the podium. He wears a golden cloth diagonally across his chest, exposing one of his pectorals. He has on a golden crown which hides his bald head. Behind him are ten guards who hold unsheathed golden swords in one hand and golden shields in the other. From their stern expressions and the aura they give off, you can tell they are a completely different level of strength compared to the guards at the city entrance. \n\n\"That's King Sabai-Dii,\" Ploy says. \n\nKing Sabai-Dii scans the crowd with his mellow yellow eyes and then smiles gently. \"Welcome to the Tournament of Heart, my loyal people.\"\n\nThe room bursts into applause.\n\nThe King basks in the applause. He takes in a deep breath and then continues. \"To be able to live through another Tournament of Heart, despite my old age, is thanks to you all. My people, today we celebrate the glory that is Khaeng, for we are a strong and united people.\"\n\nThe applause comes at an even louder clip. You cover your ears as a result.\n\n*page_break\nThe King raises his hand and says, \"Settle down my children.\" The crowd quietens. You squint your eyes and take a closer look at him, noticing the lines across his forehead and the deep wrinkles he possesses. He looks to be in his sixties.\n\n\"My people, this competition is the life and blood of our success as a kingdom. You need not worry if you are unable to win, for only four of you all can achieve this success. I need you to keep in mind that the talent you show here will be recognized moving on in the future. Show us what you are capable of and you will surely become pivotal figures to the life of Khaeng.\" The man leans against the podium and gasps. He pauses for a half minute whilst taking slow, laboured breaths.\n\n\"I shall explain what your objective is. You will be sent into a pocket dimension, a place outside of the reality of this dimension. You will find yourself on an island of our own construction. The people in this room won't be the only hindrance to your goal. See, on the island there will be spirit beasts and other monsters waiting to tear you apart.\"\n\nThe King pauses and looks around the room. He smiles, as if having noticed something funny. \"Do not worry, dying in the pocket dimension does not spell true death. You will be brought back here alive and well. We shall also be watching closely from here at your progress. Your trials will be broadcast all across the Kingdom, and the people of Khaeng will get to know who you are, our future heroes.\"\n\nDemeter pulls close to you. \"This is a bit…\"\n\n*choice\n\t#\"Weird, right?\"\n\t\t(Demeter Approves)\n\t\t\n\t\tDemeter nods. \"That's what I was thinking. They're going to be watching us and all, I don't know how I feel about that.\"\n\t\t\n\t\t\"Yea.\" You shiver on the spot. \"Weird for sure.\"\n\t\t*set demeter +5\n\t\t*goto tournament2\n\t\t\n\t#\"Exhilarating isn't it?\"\n\t\t(Demeter Disapproves)\n\t\t\n\t\tDemeter looks at you with a tilted head. \"Not what I meant. I think it's really weird.\"\n\t\t\n\t\tYou are taken aback and rub the back of your head awkwardly \"Oh, right.\"\n\t\t*set demeter -5\n\t\t*goto tournament2\n\t\t\n\t#\"It's a lot.\"\n\t\tDemeter nods. \"Yea, it's a lot isn't it.\"\n\t\t\n\t\t*goto tournament2\n*label tournament2\nThe King continues. \"Once you have reached that island, your objective is to make it through all of your enemies. That is the main objective and win condition. However, the reward for the competition is also hidden deep in the pocket dimension, so if you can somehow find it you will be crowned winners.\"\n\nKing Sabai-Dii raises his hands. \"Now then, we shall feast tonight before you are sent off to the greatest test of your lives. Off you go, mingle and dance with each other, for this is a competition without bad blood. What happens inside stays inside the pocket dimension and that is final!\" The man speaks with such great authority. You notice other contestants' solemn expressions. \n\n\"Keep our Kingdom united and usher in a new age of glory!\"\n\n*page_break\n\nYou are inside one of the almost dozen ballrooms currently being used for the night's festivities. The King has arranged for food, drink and music. The youths dance around and chat with each other. You spot that most of the people that you will fighting against are around fourteen to eighteen years old. You very rarely see any people that look younger than that.\n\nA boy walks up to you. He's holding a golden glass and sips on whatever drink is within it. His hair is spiky and jet black, and his nose is quite small. He's half a head smaller than you but oozes confidence. \"Hello to you,\" he says before pressing his hands together and bringing his fingertips to his nose. \n\nYou reciprocate that action.\n\n*choice\n\t#\"Who might you be?\"\n\t\t\"Who might you be?\"\n\t\t\n\t\t\"Captain is the name I go by,\" he says softly. His blue eyes glimmer under the candle light from above. He observes you for a moment before saying, \"I've had my eye on you and your group for a while.\"\n\t\t\n\t\tYou gulp hard. [i]Shit, did they find us out? No, can't be, our disguises are too impeccable.[/i]\n\t\t\n\t\t\"No need to look so scared,\" Captain says and then laughs. \"Don't worry, I'm not here to declare war on you.\"\n\t\t\n\t\t\"Scared? I don't know what you're talking about,\" you say and laugh awkwardly. \"How can I help you, Captain?\"\n\t\t\n\t\t\"Well first by introducing yourself, that'd be nice.\"\n\t\t\n\t\t\"Right, right. I am Hunter, nice to meet you.\" You squint your eyes and sense two others are staring at you and Captain. [i]Those must be his companions. Not too shabby, I can sense a strong magical signature from all three of them.[/i]\n\t\t\n\t\t*goto party1\n\t\t\n\t#\"Can I help you?\"\n\t\t\"Can I help you?\"\n\t\t\n\t\t\"Absolutely,\" the boy says. \t\t\"Captain is the name I go by,\" he says softly. His blue eyes glimmer under the candle light from above. He observes you for a moment before saying, \"I've had my eye on you and your group for a while.\"\n\t\t\n\t\tYou gulp hard. [i]Shit, did they find us out? No, can't be, our disguises are too impeccable.[/i]\n\t\t\n\t\t\"No need to look so scared,\"  Captain says and then laughs. \"Don't worry, I'm not here to declare war on you.\"\n\t\t\n\t\t\"Scared? I don't know what you're talking about,\" you say and laugh awkwardly. \"How can I help you, Captain?\"\n\t\t\n\t\t\"Well first by introducing yourself, that'd be nice.\"\n\t\t\n\t\t\"Right, right. I am Hunter, nice to meet you.\" You squint your eyes and sense two others are staring at you and Captain. [i]Those must be his companions. Not too shabby, I can sense a strong magical signature from all three of them.[/i]\n\t\t\n\t\t*goto party1\n\t\t\n\t#\"Sorry, I'm quite busy right now.\"\n\t\t\"Oh don't be like that,\" the boy says. \"I noticed your presence here and it was rather peculiar. Let's say I am intrigued. \t\tCaptain is the name I go by,\" he says softly. His blue eyes glimmer under the candle light from above. He observes you for a moment before saying, \"I've had my eye on you and your group for a while.\"\n\t\t\n\t\tYou gulp hard. [i]Shit, did they find us out? No, can't be, our disguises are too impeccable.[/i]\n\t\t\n\t\t\"No need to look so scared,\"  Captain says and then laughs. \"Don't worry, I'm not here to declare war on you.\"\n\t\t\n\t\t\"Scared? I don't know what you're talking about,\" you say and laugh awkwardly. \"How can I help you, Captain?\"\n\t\t\n\t\t\"Well first by introducing yourself, that'd be nice.\"\n\t\t\n\t\t\"Right, right. I am Hunter, nice to meet you.\" You squint your eyes and sense two others are staring at you and Captain. [i]Those must be his companions. Not too shabby, I can sense a strong magical signature from all three of them.[/i]\n\t\t\n\t\t*goto party1\n\t\n*label party1\n*page_break\nCaptain takes a sip of his drink and then puts it down on the table beside him. He edges closer to you and whispers, \"You see, I know what you and your friends truly are.\"\n\nYour heart sinks. Sweat forms on your palms and you fidget on the spot.\n\n\"Don't worry,\" Captain says. \"I simply want to make a wager.\"\n\nYou furrow your brows. \"A wager? What are you talking about?\"\n\nCaptain chuckles whilst twirling his fingers around a strand of his hair. \"A simple wager. I want to see who will be the last standing.\"\n\nYou tilt your head. \"What are you talking about?\"\n\n\"Don't worry about that, I have the leverage in this situation, after all.\" Captain smiles victoriously.\n\n\"And what will you do if I say no?\"\n\nThe boy shrugs. \"I could just scream out that you're not really from the Khaeng Kingdom, that should be enough to throw you out. Come, don't be such a bad sport. If you're able to win, I'll make it worth your time.\" \n\nYou open your mouth to respond but Captain quickly excuses himself and enters the crowd. \n\n*choice\n\t#Find Demeter\n\t\tYou make your way through the packed banquet room. Unfortunately there is barely enough room to move around so you end up constantly bumping shoulders with others. You find Demeter by a chocolate fountain. The dark elf stares at the object and then puts a cup underneath it, after which he starts to drink the thick mixture.\n\t\t\n\t\t\"Demeter,\" you say. You move up really close to him. \n\t\t\n\t\t\"What's going on?\" he responds. \"You look like you've seen a ghost.\"\n\t\t\n\t\tYou quickly explain what had transpired only moments ago, to which Demeter simply nods. \"It was bound to be like this from the beginning wasn't it,\" he says. \"It doesn't matter, we were going to win this whole fiasco regardless.\"\n\t\t\n\t\t\"H-How are you so calm in this situation?\"\n\t\t\n\t\tDemeter chuckles and shrugs. \"Let's just say I've been through a lot worse than this. It's nothing to even worry about. We proceed as if this never happened.\"\n\t\t*goto checkpoint_save\n\n\t\t\n\t#Find Mbali\n\t\tYou make your way through the packed banquet room in search of Mbali. You scour around the whole room but are unable to find her. An idea pops into your head and you rush outside. There you find Mbali sat on a bench underneath a great oak tree. The girl is humming a tune that you can't quite make out. She stares up at the starry night sky.\n\t\t\n\t\t\"Mbali,\" you say as you move closer to the girl. \"We have a problem, a bit problem!\"\n\t\t\n\t\tThe girl gasps. \"What? What's going on?\"\n\t\t\n\t\tYou explain what had transpired inside the banquet hall with Captain. \n\t\t\n\t\t\"This isn't good,\" Mbali says. She bites her lower lip. \"What do we do?\"\n\t\t\n\t\t\"I… I don't know. Maybe we should find the others first.\"\n\t\t*goto checkpoint_save\n\n\t\t\n\t#Find Ploy\t\t\n\t\tYou make your way through the packed banquet room in search of Ploy. She is the first person you think of as she is this operation's leader. You find her after walking up a flight of stairs to the second level of the building. The girl is stood in a group of about twelve others who all seem to be having a light-hearted conversation, laughing and joking with each other.\n\t\t\n\t\t\"Ploy,\" you say as you move closer to her. You grab her hand and whisper, \"We have a problem.\"\n\t\t\n\t\tPloy nods and then look to the others in the group and says, \"If you would excuse me.\" You walk to a more secluded area. \"What's the matter?\" she asks. \n\t\t\n\t\tYou explain what had transpired only moments ago. \n\t\t\n\t\tThe girl frowns and thinks about it for a while.\n\t\t\n\t\t\"Ploy?\"\n\t\t\n\t\t\"We'll figure this out. Let's get with the others first.\"\n\t\t*goto checkpoint_save\n\n*label checkpoint_save\n*page_break End of Chapter\n*goto_scene tournament_heart1", "choicescript_description": "Mold an orphan's path into elemental mastery, unveiling magic's secrets. Race against approaching foes to conquer the arcane summit. Make friends, cast a great variety of spells, and navigate the hidden truths in this world of magic and might.\n\n[i]The Arcanist's Journey[/i] is a 138,000-word interactive fantasy novel by Colin Daumen. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nIn this captivating interactive novel, you will step into the shoes of an orphan who, burdened by a challenging past, embarks on a daring journey to forge a better future. Forced to flee from home in search of a brighter destiny, you will delve into the realm of magic, determined to master its arcane mysteries. Your choices will shape not only the protagonist's path to mastery but also the unfolding narrative, as you navigate the trials and tribulations of a world brimming with enchantment and danger. Will you rise above adversity and become the master of your own destiny? The power to weave this compelling tale lies within your hands.\n\n• Play as male or female\n• Shape your protagonist's destiny through intricate choices\n• Choose whether to join the Fae Academy or the Draken Academy, each granting you greater expertise in different fields of magic.\n• Unveil the mysteries of elemental magic in a richly detailed world.\n• Study from five different schools of magic; Pyromancy, Hydrosophy, Summoning, Theurgy and Illusion.\n• Navigate treacherous decisions as enemies draw near\n• Engage with a captivating narrative, woven with suspense and intrigue\n• Overcome challenges using intellect, wit, or sheer determination\n• Be a part of the Alchemical Society, Mage’s Guild or Adventurer’s Guild\n\nDive into [i]The Arcanist's Journey[/i], where your decisions carve the way to mastery and survival. Will you rise to the pinnacle of arcane power or succumb to the encroaching darkness? Your adventure awaits!", "choicescript_stats": "This is a stats screen!\n*label screen\n*choice\n\t#Main.\n\t\t*stat_chart\n\t\t\ttext Name\n\t\t\ttext Gender\n\t\t\ttext Health\n\t\t\ttext Mana\n\t\t\ttext Gold\n\t\t\t\n\t\t\ttext Strength\n\t\t\ttext Dexterity\n\t\t\ttext Social\n\t\t\ttext Intelligence\n\t\t\ttext Observation\n\n\t\t\ttext Illusion\n\t\t\ttext Pyromancy\n\t\t\ttext Hydrosophy\n\t\t\ttext Summoning\n\t\t\ttext Theurgy\n\t\t\ttext Void\n\t\t\t\n\t\t*goto screen\n\n\t#Relationships\n\t\t*if (met_ploy=true)\n\t\t\t*stat_chart\n\t\t\t\tpercent Ploy\n\t\t\t\t\n\t\t*if (met_demeter=true)\n\t\t\t*stat_chart\n\t\t\t\tpercent Demeter\n\t\t\t\t\n\t\t*if (met_bami=true)\n\t\t\t*stat_chart\n\t\t\t\tpercent Bami\n\t\t\t\t\n\t\t*if (met_mbali=true)\n\t\t\t*stat_chart\n\t\t\t\tpercent Mbali\n\t\t\t\t\n\t\t*goto screen\n\t\t\t\t\n\t#Spell List\n\t\t*if (learn_truth=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Learn_Truth Learn Truth (1 Mana)\n\n\t\t*if (invisibility=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Invisibility Invisibility (2 Mana) \n\n\t\t*if (lesser_fireball=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Lesser_Fireball Lesser Fireball (1 mana)\n\n\t\t*if (water_wall=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Water_Wall Water Wall (3 mana)\n\n\t\t*if (summon_hawk=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Summon_Hawk Summon Hawk (3 mana)\n\n\t\t*if (thorn_armour=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Thorn_Armour Thorn Armour (40% total mana)\n\n\t\t*if (create_illusion=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Create_Illusion Create Illusion (2 mana)\n\n\t\t*if (flame_dash=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Flame_Dash Flame Dash (2 mana)\n\n\t\t*if (wall_of_fire=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Wall_of_Fire Wall of Fire (2 mana)\n\t\t\t\t\n\t\t*if (mirage=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Mirage Mirage (3 mana)\n\t\t\t\t\n\t\t*if (water_cannon=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Water_Cannon Water Cannon (2 mana)\n\t\t\t\t\n\t\t*if (thorns=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Thorns Thorns (1 mana)\n\t\t\t\t\n\t\t*if (cerberus=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Cerberus Cerberus (50% mana)\n\t\t\t\t\n\t\t*if (piercing_water=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Piercing_Water Piercing Water (3 mana)\n\t\t\t\t\n\t\t*if (fire_breath=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Fire_Breath Fire Breath\n\t\t\t\t\n\t\t*if (water_breath=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Water_Breath Water Breath\n\t\t\t\t\n\t\t*if (minor_heal=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Minor_Heal Minor Heal (2 mana)\n\t\t\t\t\n\t\t*if (mud=true)\n\t\t\t*stat_chart\n\t\t\t\ttext Mud Mud (3 mana)\n\t\t\t\t\n\n\t\t\t\n\t\t*goto screen", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n\t[b]Rest of the Game[/b]\n\n\tUnlock the rest of the game, including the thrilling conclusion!\n\n\t*purchase_discount adfree 2023-11-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n\tYou're completely upgraded!\n\n*if choice_purchased_adfree\n\t[b]Rest of the Game[/b]\n\n\tYou've paid to unlock the rest of the game.\n", "draken_academy": "You walk over to the queue for the Draken Academy. This queue is relatively large compared to all of the other ones. You stand at the back of the queue and overhear the other children talking. \n\n\"I can't wait to learn about pyromancy. I want to be as strong as a dragon,\" one youth says. \n\nAnother youth laughs. \"Good luck with that, you'll need more than one lifetime to become that powerful.\"\n\n\"Hmph, it's possible. Who do you think created the Draken Academy? A human who was so powerful that he could tame a dragon and keep it in the school. Where do you think it got it's name from.\"\n\n[i]Dragons? Dragons are real? That's news to me. I knew that magic is real, but I really thought dragons are just a myth.[/i]\n\nYou look at yourself in the reflection from a nearby stream. You are a…\n\n*label gender\n\n*choice\n\t#Male\n\t\t*set gender \"male\"\n\t\t*set he \"he\"\n\t\t*set him \"him\"\n\t\t*set his \"his\"\n\t\t*set man \"man\"\n\t\t*set sir \"sir\"\n\t\t*set mr \"Mr.\"\n\t\t*set gentleman \"gentleman\"\n\t\t*goto name\n\t\t\n\t#Female\n\t\t*set gender \"female\"\n\t\t*set he \"she\"\n\t\t*set him \"her\"\n\t\t*set his \"her\"\n\t\t*set man \"woman\"\n\t\t*set sir \"ma'am\"\n\t\t*set mr \"Ms.\"\n\t\t*set gentleman \"lady\"\n\t\t*goto name\n*label name\n\t\n\"What is your name?\"\n\n*if (gender=\"male\")\n\t*goto male_name\n\n*if (gender=\"female\")\n\t*goto female_name\n\n*label male_name\n\n*fake_choice\n\t#Adam\n\t\t*set name \"Adam\"\n\t#Boris\n\t\t*set name \"Boris\"\n\t#Carl\n\t\t*set name \"Carl\"\n\t#Dave\n\t\t*set name \"Dave\"\n\t#Let me input my name\n\t\t*input_text name\n*goto  surname\n\n*label female_name\n\n*fake_choice\n\t#Anna\n\t\t*set name \"Anna\"\n\t#Betsy\n\t\t*set name \"Betsy\"\n\t#Caroline\n\t\t*set name \"Caroline\"\n\t#Denise\n\t\t*set name \"Denise\"\n\t#Let me input my own name\n\t\t*input_text name\n\n*goto surname\n\n*label surname\n*set surname \"Light\"\n*set fullname (name&\" \")&surname\n\nYour name is ${mr} ${name} ${surname}.\n*goto orientation\n\n*label orientation\nWho are you attracted to?\n\n*fake_choice\n\t#Men.\n\t\t*if (gender=\"male\")\n\t\t\t*set orientation \"gayM\"\n\t\t*if (gender=\"female\")\n\t\t\t*set orientation \"straightM\"\n\t\n\t#Women.\n\t\t*if (gender=\"female\")\n\t\t\t*set orientation \"gayF\"\n\t\t*if (gender=\"male\")\n\t\t\t*set orientation \"straightF\"\n\t\t\t\n\t#Men and Women\n\t\t*set orientation \"bisexual\"\n\t\t\n\t#I'm not interested in such things.\n\t\t*set orientation \"asexual\"\n\n*goto hair\n\n*label hair\nYour hair is…\n*fake_choice\n\t#Short and curly\n\t\t*set hair \"short and curly\"\n\t\t*set hairlength \"short\"\n\t\t*set hairstyle \"curly\"\n\t#Long and curly\n\t\t*set hair \"long and curly\"\n\t\t*set hairlength \"long\"\n\t\t*set hairstyle \"curly\"\n\t\t\n\t#Short and straight\n\t\t*set hair \"short and straight\"\n\t\t*set hairlength \"short\"\n\t\t*set hairstyle \"curly\"\n\t#Long and straight\n\t\t*set hair \"long and straight\"\n\t\t*set hairlength \"long\"\n\t\t*set hairstyle \"straight\"\nYour hair has a…\n*fake_choice\n\t#Blue colour\n\t\t*set haircolour \"blue\"\n\t#Red colour\n\t\t*set haircolour \"red\"\n\t#Blond colour\n\t\t*set haircolour \"blond\"\n\t#Purple colour\n\t\t*set haircolour \"purple\"\n\t#Brown colour\n\t\t*set haircolour \"brown\"\n\t#Black colour\n\t\t*set haircolour \"black\"\n\t\t\nYour body proportions are…\n*fake_choice\n\t#Slim\n\t\t*set body \"slim\"\n\t#Chubby\n\t\t*set body \"chubby\"\n\t#Muscular\n\t\t*set body \"muscular\"\n\t#Average\n\t\t*set body \"average\"\n\n\n\n*label begin\n\n\"My name is ${fullname},\" you reply. \n\n\"Alright young ${man},\" the man says. \"You may take our preliminary test.\" He points to a red tent a couple of meters away. This is where you've seen all the other students go to, however only a fraction of the amount that went in have come back out.\n\nYou assume that those who have come back out failed this test. \n\nYou gulp hard and then walk to the tent. The moment you reach inside you start to sweat. The temperature has risen to the heights of summer. \n\n\"Welcome,\" a voice booms. \n\nYou look around but can't find any person inside of the rather small tent. There is a red orb on the floor and nothing else is around. \n\n\"Don't be alarmed by my voice. This is magic, after all. Now, to complete our preliminary test to see whether you are gifted enough for our prestigious Draken Academy, you must simply touch the orb. That is all.\"\n\n*fake_choice\n\t#\"What does this orb do?\"\n\t\t\"What does this orb do?\" you ask.\n\t\t\n\t#\"Will it hurt?\"\n\t\t\"Will it hurt?\" you ask.\n\t#\"Don't be alarmed? There's a damn voice in my head. Of course I'm alarmed!\"\n\t\t\"Don't be alarmed? There's a damn voice in my head. Of course I'm alarmed!\" You take in a deep breath and compose yourself.\n\n\"Hurry up would you, I don't have all day,\" the voice returns, this time the tone more forceful.\n\n\"Alright, I'm going,\" you respond.\n\nYou walk over to the orb and the pick it up. It is warm to the touch. An electric current buzzes out of the orb, startling you. You almost drop the object but are able to catch it before it falls. \n\nYou feel that your energy is being sapped for each second you hold onto it. The orb starts to pulse in different colours. From blue to green to orange. The whole spectrum of the rainbow is emitted. \n\n\"Interesting,\" the voice comes again. \"You have passed the test. You may now enter the Draken Academy.\"\n\nYou jump back as a portal opens right in front of you. It is almost like a mirror but instead of seeing a reflection of yourself, you can see a large statue of a dragon. The dragon's mouth is wide open and a flame is inside of it. \n\nYou walk into the portal.\n*set draken \"true\"\n*page_break Off to Draken Academy\n\nYour head spins and your stomach churns. You fall onto the ground at the other side of the portal. You hold onto your stomach as you feel the urge to vomit.\n\nAfter a minute the feeling subsides. \n\n\"Are you okay?\" a boy asks. You look up and see him stood in front of you. He is rather short and has medium length blue hair. His eyes are also blue and he wears circular glasses.\n\n*choice\n\t\n\t#\"Yea I'm fine.\"\n\t\t\"Yea, I'm fine.\" You get up. \"Thanks for asking.\"\n\t\t\n\t\t\"No problem,\" the boy responds. \"I'm Grant by the way.\"\n\n\t\t\"${name},\" you say.\n\n\t\t*goto grant\n\t\n\t#\"Does it look like I'm okay?\"\n\t\t\"Does it look like I'm okay?\"\n\t\t\n\t\tThe boy laughs. \"Not really, here let me help you up.\" He grabs you by the hand and helps you onto your feet. \"I'm Grant by the way.\"\n\n\t\t\"${name}\" you reply.\n\n\t\t*goto grant\n\n\t#\"You didn't see anything.\"\n\t\t\"You didn't see anything.\"\n\t\t\n\t\tThe boy chuckles. \"I for sure didn't see anything.\" He helps you onto your feet. \"I'm Grant by the way.\"\n\n\t\t\"${name},\" you reply.\n\n\t\t*goto grant\n\t\n\t\n*label grant\n\"You should probably be more careful in the future,\" Grant says. \"Teleportation isn't for the weak.\"\n\nYou scratch the back of your head. \"Didn't really have a choice but whatever.\" You pause and take in a deep breath.  \"So, what are we supposed to do now? You're also a new student, right?\"\n\nGrant shakes his head. \"Nah, I'm a second year student. I'm just here to show you around for today.\"\n\nYou cup your hands together. \"Well then, please do take care of me.\" \n\n\"No need to be so formal,\" the boy responds. He pats you on the back a few times. \"Come, let me show you around.\"\n\nThe boy brings you though the area, pointing to the numerous buildings on the campus. He brings you past the library, training halls, markets, dorms and the various classrooms that exist in the Draken Academy. \n\n[i]Wow this place is huge[/i]\n\nYou marvel at the academy. It has a unique fiery atmosphere due to all of the torches that are lit everywhere. You find it is almost impossible to go more than ten meters without seeing a torch. \n\n\"Let me show you something amazing,\" Grant says. He takes you through an alleyway that twists and turns multiple times. At the end of the alleyway is a flight of stairs that goes up onto what looks like a battlement.\n\nYou follow closely behind.\n\n*page_break\n\nAs you reach the top of the flight of stairs your words get stuck in your throat. You look out at the scenery that unfolds outside of the academy. A vast savannah awaits in the distance. You can see hundreds of animals roaming the plains. \n\nYou can spot a pride of lions roaming about with their cubs. There are zebras, elephants, giraffes and a whole wide assortment of creatures about.\n\n\"Isn't this great?\" Grant asks. \n\nYou nod. \"This is amazing.\"\n\nThe boy points to the horizon. \"Further ahead in that direction is what we call a beast range. That's where all of the magical beasts are that you'll have to fight in the future. Well, I think you'll find out yourself soon.\"\n\n\"Huh?\" You gulp hard. \"What do you mean fight soon?\"\n\nGrant chuckles. \"It's alright, the percentage of students that meet their end are relatively low on the beast range excursions. As long as you don't act like a complete idiot, you'll be fine.\"\n\n*fake_choice\n\t\n\t#\"Fine? Are you joking right now? I don't want to die!\"\n\t\t\"Fine? Are you joking right now? I don't want to die!\"\n\t\n\t#\"Haha, you're funny.\"\n\t\tYou roll your eyes. \"Haha, you're funny.\"\n\t\n\t#\"Soon? What do you mean soon?\"\n\t\t\"Soon? What do you mean soon? Hey, answer my question Grant.\"\n\t\n\t\nYou shudder as a bell rings from behind. \n\n\"Right, time to go,\" Grant says. \"I'll bring you to the Assembly Hall and from there you should be good to go. Hopefully I'll see you again in the future. If you're still alive by then.\"\n\nThe boy turns and walks back down the stairs whilst cackling wildly.\n\n[i]Is he trying to scare me? Because it's working.[/i]\n\nYou follow him through the school. It doesn't take long for you to reach the assembly hall. There are hundreds of other students inside.\n\n\"Right then,\" Grant says. \"This is where I leave you to fend for yourself. Good luck ${name}. Let me just give you a quick piece of advice before I go.\"\n\nYou nod your head. \"I'm listening.\"\n\n\"Do your best to be part of a large social circle. It will help you in the future, trust me on that.\"\n\n\"Thank you Grant,\" you respond, after which the boy leaves.\n\nYou look around the assembly hall. [i]Where should I sit?[/i]\n\n*fake_choice\n\t#Follow the students to the left of the hall.\n\t#Follow the students to the right of the hall.\n\t#Make your way through the middle of the hall.\nYou make your way through to the seating areas. There are multiple statues along the way, depicting dragons and humans. Each statue has some writing depicting it's story, however you don't have the time or luxury to stand and read any of them. \n\nThe hall is packed but you are able to find a seat with relative ease. There is a large stage down below, along with a podium to the centre of it.\n\nThe new first year students start chatting. You try to listen to some conversations but it is too difficult as too many are going on at once.\n\nSuddenly the room goes pitch black. A collective gasp comes from the crowd. \n\nA red light flashes from the stage, illuminating the whole room. You can see the reactions of awe from some of the other students. \n\nA woman is stood kneeling on the stage with wings of flames protruding out of her back. \n\n\"Wow.\" You are taken aback by the display of magic. \n\n\"Greetings my new hatchlings,\" the woman says. She gets up and the wings disappear. \"Excuse my entrance but I had to show you what you should be aiming toward. Welcome to the Draken Academy. I hope you're all feeling extremely excited and optimistic for the future. I'm Professor Petra, but you can all just call me Big Sis Petra.\"\n\nThe woman has long red hair and a rather thin, long nose. Her smile seems genuine to you, and she is constantly smiling as she speaks. \n\n\"Now then, congratulations for passing our preliminary test to become accepted into our school. Come now, a round of applause for yourselves is in order.\" She starts clapping.\n\nSoon the students join in on the clapping.\n\n*fake_choice\n\t\n\t#Join in on the clapping.\n\t\n\t#Don't join in on the clapping.\n\t\n\t\nProfessor Petra laughs. \"Alright, you seem as good a cohort as any. Now, let me just explain how things are going to work here. Your next couple of weeks will be interesting. We're going to start by giving you lessons on magic in the first week. In the second week we are going to send you into a beast range in groups of four.\"\n\nThose next to you gasp. You on the other hand think to Grant and start realizing that he was telling the truth. \n\n[i]I should probably listen to his advice. Keep my social circle large? That means I probably shouldn't offend anyone, no matter what.[/i]\n\n\"Now now, no need to look so scared. We're going to make sure you all are prepared for the beast range. Of course, we can't guarantee that unexpected things won't happen, but as long as you follow our instructions properly, you'll make it past this trial.\" \n\nShe continues for about ten minutes explaining the history of the academy and what you can expect to learn whilst here.\n\nThe woman looks down at a watch on her left wrist. \"Well then, I believe it's time to wrap this up. If you would all look into your left pockets, you'll find your designated area for your crash course training.\"\n\nYou look down at your clothes. Your eyes widen. You hadn't noticed that you were wearing a uniform with an insignia of a dragon on it. As you look around you see that all of the other students are wearing it as well. \n\nYou start to get the feeling that magic is…\n\n*fake_choice\n\t#Dangerous\n\t\tYou sense there is a huge amount of danger involved with magic. If somebody can change your clothes without you noticing, you wonder what somebody with malicious intent could do to you.\n\t#Amazing\n\t\tYou think there is nothing more amazing than magic, the fact that your clothes were changed without you noticing is proof of this in your mind.\n\n[i]Think about this later, you've got somewhere to be right now.[/i]\n\nYou make your way to the location of your crash course. You find yourself led to a field, the grass is cut relatively short and a fresh, earthy smell wafts up from it.  There are twenty students in total, including you, stood around the field. \n\nYou are all staring at your instructor. He is a bald man with a long hooked nose wearing only red shorts and a red headband. He's relatively slim, but his muscles are well defined and you notice some scars all over his torso. \n\n\"Alright everybody,\" he shouts. \"I'm Larry and I'll be the man keeping this ship afloat. Listen to me and you'll live past twenty in this cruel world of ours.\"\n\nLarry snaps his fingers. A flame bursts forth from them. It dances and then turns into a ballerina, spinning around majestically. He then throws the flame over to his other hand. He does this back and forth multiple times before extinguishing it with a simple clap. \n\nYou look on in awe at the amazing display.\n\n\"Now, you see this here, this is the sort of finesse I'm going to teach you. Big, powerful spells are good and all, but they waste an awfully large amount of mana. You need to keep your mana consumption low if you're gonna survive in the wilderness.\"\n\nA girl raises her hand.\n\n\"Ooh, questions.\" Larry shuffles about happily. \"Fire away young gun.\"\n\n\"Uhm what exactly are we going to encounter in the beast range?\" she asks. \n\n\"Chaos,\" Larry responds. \"Absolute chaos. I can't go into all the nitty gritty little details, that would ruin the test, but you'll need to be prepared for anything and everything. And that's why I'm here. Moving on, any other questions?\"\n\n*choice\n\t\n\t#Raise your hand and ask about magic.\n\t\t\"Yes, another question,\" Larry says happily. \"What would you like to know about?\n\n\t\t\"So what are we going to learn from you? In terms of magic?\" you ask. \n\n\t\t\"Great question. I'll be bringing you through the basics of pyromancy and summoning magic. Those are my two specialities and it has been deemed that you are all gifted in those areas as well,\" he responds. \"I know, you might want to learn other forms of magic, but for now you'll learn these. After finishing your time in the beast range you'll be able to learn any sort of magic by yourself if none of the teachers here are specialized in it. We have a vast wealth of knowledge in our library, after all.\"\n\n\t\tLarry nods. \"Alright, let's get on with our first lesson.\"\n\n\t\t*goto larry_lesson1\n\t\n\t#Raise your hand and ask about potentially dying.\n\t\t\"Yes, another question,\" Larry says happily. \"What would you like to know about?\"\n\n\t\t\"Uh… Is there a possibility that we could you know… Die?\"\n\n\t\t\"When you enter the beast range you mean?\"\n\n\t\tYou nod.\n\n\t\t\"Of course there is. There is a chance you could die right here right now. Don't let that bother you too much. As long as you practice diligently you'll be fine. And if you're scared, I suggest leaving this academy immediately,\" he responds. \"Does anybody want to throw away their chance at magic? A chance at a brighter future? Just for fear of death? Raise your hands if that is the case.\"\n\n\t\tNobody raises their hands. \n\n\t\t\"Great, this is exactly the sort of conviction you need if you truly wish to pursue something as complex and wonderful as magic,\" Larry says. \"Now then, let's get on with our first lesson.\"\n\n\t\t*goto larry_lesson1\n\t\n\t#Raise your hand and ask about potential rewards.\n\t\n\t\t\"Yes, another question,\" Larry says happily. \"What would you like to know about?\"\n\n\t\t\"Will there be any rewards of sort?\"\n\n\t\tLarry nods. \"Of course there will be. The groups that display an excellent showing will be given a choice of advanced magic tomes to choose from.\"\n\n\t\t\"Any other questions?\" the man continues. \"No? Right then, let's get on with our first lesson.\"\n\n\t\t*goto larry_lesson1\n\t\n\t#Don't ask any questions.\n\t\n\t\t\"No more questions? Aww, don't be shy in the future. Whatever comes to your mind, just ask. I'll be there to answer anything and everything.\"\n\n\t\tThe man pauses.\n\n\t\t\"Now then, let's get on with our first lesson.\"\n\n\t\t*goto larry_lesson1\n\t\n\n*label larry_lesson1\n*page_break\n\"I want every one of you to sit down and get into your most comfortable seating position. And make sure you there is enough space between yourselves.\"\n\nYou find an empty spot of field and then sit down cross legged. \n\n\"Good, now close your eyes,\" he commands.\n\nYou close your eyes.\n\n\"This is going to freak you out a tiny bit if you haven't experienced this before, but it's alright. You're going to see a whole new world now, so be prepared.\" \n\nYou hear the snap of Larry's fingers. \n\nSuddenly a red light flashes bright from within the darkness of your closed eyes. You can see a bright flame a couple meters away from you, and an outline of a person that looks exactly like Larry. \n\n\"Keep your eyes closed everyone,\" the man commands. \"What you're seeing now is the arcana of the environment. I've just jump started the process by feeding my own mana to you all. Mana is what happens when we humans digest the arcana from the atmosphere and turn it into usable components for magic.\"\n\n\"Wow,\" you mumble. Despite your eyes being closed, you can look around at the twinkling particles of arcana that are moving through the atmosphere. They are very slow, almost like glitter falling from the sky. You predominantly sense red particles. \n\n\"Now that you can all sense the arcana in your surroundings, you'll be able to pull them into your body. At this point in time it doesn't really matter what form of arcana you absorb. Be it light, dark, fire, water, wind or earth. You currently are just creating a base foundation for your body to produce mana,\" Larry says. \n\n*set pyromancy +10\n\n*page_break\n\nYou spend the next couple of hours practising the absorption of arcana. It is difficult at first, but you quickly gain your footing and are able to absorb the particles. \n\nYou body is pumping with this new-found source of energy, and you can sense within yourself that you're storing this mana throughout your body. It almost feels you've grown a new limb. You can't control it too well yet. It's as if you were a toddler walking for the first time. But you know that it is there, which brings you a great amount of joy.\n\n\"Alright,\" Larry says. \"Everyone get up, we're going to attempt to cast our first spells now.\"\n\nThe man explains that the Fireball is one of the simplest spells around. He then teaches you how to manipulate your mana to form a fireball. \n\n\"Now that I've explained everything, I'm going to put each of you on the spot.\" He points to one of the students. \"Come here.\"\n\nThe student, a rather tall girl with long blonde hair and pointy ears walks forward. \n\n\"What's your name?\" he asks her. \n\n\"Brenda, sir,\" she replies. \n\n\"You are going to cast a fireball for us all to see,\" Larry says. \"Don't be shy.\"\n\nThe girl seems rather resolute and you notice no shyness at all. She clasps her hands together and then takes in a deep breath. She then slowly pulls her hands apart. From within her hands a small red ball of light forms. It grows bigger and bigger until it becomes a fireball the size of a fist. \n\nLarry claps. \"Well done Brenda,\" he says. \"You may take a seat.\"\n\nThe man then points to the next student and he continues with this manner until he reaches you.\n\n*set met_brenda \"true\"\n\nYou walk toward Larry and then turn to look at the group of students. You take in deep breaths, trying to calm yourself down. \n\n[i]It's fine, only like half of the others have been able to do it. It doesn't matter if I can or can't do it, I'm nervous so it'll probably be a failure.[/i]\n\nYou gulp hard.\n\nAs you try to calm down your nerves, what do you think of?\n\n*choice\n\t\n\t#You think of the life you left behind and that failure isn't an option.\n\t\tYou remind yourself that failure is not an option. You take in a deep breath, close your eyes and then clasp your hands together. You feel at the mana within your body and push it toward your palms as instructed. \n\n\t\tYou slowly start to pull your hands apart. A small red orb is glowing in between them. You smile and then push even more mana into the orb, hoping to make it even bigger.\n\n\t\tThe orb grows bigger and bigger and you start to feel the heat exuded by it. It starts to move about crazily.\n\n\t\tSuddenly the orb fizzles out. You sigh and then look at Larry.\n\n\t\t\"Unlucky,\" the man says. \"You were so close as well. Better luck next time, I'm sure you'll have it perfected by
