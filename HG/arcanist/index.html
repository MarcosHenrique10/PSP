tomorrow.\"\n\n\t\t*page_break\n\n\t\tYou walk back over to where the rest of the students are. You sulk and stare at the ground.\n\n\t\t\"It's alright,\" Brenda says. She's stood right next to you. \"For a first try that was great. That wasn't my first try, and it definitely wasn't the first try of the others who got it done as well.\"\n\n\t\t\"Really?\" you respond. \n\n\t\tThe girl nods. \"Don't worry, I know you can do it.\"\n\n\t\t\"Thank you, I needed that,\" you reply. \n\n\t\tYou watch as the last few students make their attempts. After this, the lesson is officially over.\n\n\t\t*goto activity_choice\n\t\n\t#You try to remember what your mother looks like.\n\t\tYou think back to the fragmented memories that you have of your mother. You can vaguely remember that she had the same ${hair} ${haircolour} hair as you. However that's about it.\n\n\t\tYou can't remember much about her, as she had only been in your life for a couple of years. To this day you're still unsure about what happened. Your father and step-mother had made this topic a taboo.\n\n\t\tYou shake your head. You take in a deep breath and close your eyes. You clasp your hands together. You feel at the mana within your body and push it toward your palms as instructed.\n\n\t\tYou slowly start to pull your hands apart. A small red orb is glowing in between them. You smile and then push even more mana into the orb, hoping to make it even bigger.\n\n\t\tThe orb grows bigger and bigger and you start to feel the heat exuded by it. It starts to move about crazily. It is crackling and even a shadow is being created by it. \n\n\t\tYou try to make the flame bigger, but it stays at its current size. \n\n\t\t\"Congratulations,\" Larry says. \"Not the biggest or brightest flame, but a flame nonetheless. I know you'll be doing a lot better tomorrow.\" He gives you a thumbs up.\n\n\t\t*page_break\n\n\t\tYou walk back over to where the rest of the students are. You know that you should feel happy, but there is a calmness within you. \n\n\t\t[i]What does my mother actually look like? Why have I never thought of this?[/i]\n\n\t\t\"Nice work,\" Brenda says. \n\n\t\tYou turn and see that she is stood right next to you. \"Oh, thanks,\" you respond.\n\n\t\tYou watch as the last few students make their attempts at casting a fireball. After this, the lesson is officially over.\n\n\t\t*goto activity_choice\n\t\n\t#You think about the brightest fireball possible.\n\t\tYou close your eyes and visualize a fireball so bright that is could rival a star. You take a deep breath and then clasp your hands together. You feel at the mana within your body and push all of it toward your palms. \n\n\t\tYou quickly pull your hands apart. A large red orb glows in between your palms. You push even more mana from your body into your palms, causing the orb to grow bigger. It is now the size of your head.\n\n\t\tYou can feel the heat coming off the fireball, and it starts crackling and moving like a flame. [i]Not big enough.[/i]\n\n\t\tYou push even more mana into the fireball.\n\n\t\t\"Stop,\" Larry shouts.\n\n\t\tBefore you can react the flame explodes. You are sent flying back by a shockwave. You crash into grass almost a dozen meters away and keep rolling away. When you finally stop rolling you try to get up but are too weak.\n\n\t\tYou vision starts to fade away. \n\n\t\t*page_break\n\n\t\tYou wake up with a ringing in your ears. You open your eyes and find yourself in what seems to be an infirmary. As you look around, you find that it is already night time. \n\n\t\tYou are surprised to see Brenda is sat on a chair nearby, sleeping. She snores very gently. The moonlight from outside shines onto her.\n\n\t\tYou heart jumps into you throat. You cough.\n\n\t\t\"Hmm?\" the girl jumps up. She hits her head against the windowsill. \"Ouch,\" Brenda groans. She rubs the back of her head.\n\n\t\t\"Are you okay?\" you ask. \n\n\t\t\"Yea I'm fine,\" she responds. \"What about you? How are you feeling?\"\n\n\t\t\"Uhh, I feel good,\" you say.\n\n\t\tBrenda gets up and walks over to you. She places her hand on your forehead. \"Okay good, your fever has gone down. You scared me- I mean you scared us all there. You need to be more careful when you use magic.\"\n\n\t\tYou scratch your neck and groan. \"I know, I know. I was just nervous and didn't want to fail miserably. You know? I'd rather fail spectacularly like that than to just fizzle out the spell.\"\n\n\t\tBrenda frowns and furrows her brows. \"That's not a good way of thinking. You put not only yourself but everyone else in danger.\" She sighs. \"Just come to me if you need help before you explode on us like that next time.\"\n\n\t\tThe girl turns to leave.\n\n\t\t\"Wait, where can I find you?\"\n\n\t\tBrenda turns back around. She pauses\n\t\t\n\t\t\"..\"\n\t\t\n\t\t\"I'm in dorm room C41.\" \n\t\t\n\t\tThe girl smiles and then leaves.\n\n\t\t*page_break\n\n\t\tYou sit in silence for a couple of minutes. You then look around the infirmary room and find a sheet of paper that tells you where your dorm room is. \n\n\t\t\"Dorm room C12,\" you mumble to yourself.\n\n\t\tThere is also a map that shows you where to go. You get up, finding that you feel completely healthy, and then walk toward your dorm room.\n\n\t\t*goto dorm_room\n\t\n\t#You think of nothing.\n\t\tYou take in a deep breath, close your eyes and then clasp your hands together. You try to push out all of the thoughts out of your mind. You feel at the mana within your body and push it toward your palms as instructed. \n\n\t\tYou slowly start to pull your hands apart. A small red orb is glowing in between them. You smile and then push even more mana into the orb, hoping to make it even bigger.\n\n\t\tThe orb grows bigger and bigger and you start to feel the heat exuded by it. It starts to move wildly.\n\n\t\tSuddenly the orb fizzles out. You sigh and then look at Larry.\n\n\t\t\"Unlucky,\" the man says. \"You were so close as well. Better luck next time, I'm sure you'll have it perfected by tomorrow.\"\n\n\t\t*page_break\n\n\t\tYou walk back over to where the rest of the students are. You sulk and stare at the ground.\n\n\t\t\"It's alright,\" Brenda says. She's stood right next to you. \"For a first try that was great. That wasn't my first try, and it definitely wasn't the first try of the others who got it done as well.\"\n\n\t\t\"Really?\" you respond. \n\n\t\tThe girl nods. \"Don't worry, I know you can do it.\"\n\n\t\t\"Thank you, I needed that,\" you reply. \n\n\t\tYou watch as the last few students make their attempts. After this, the lesson is officially over.\n\n\t\t*goto activity_choice\n\n\n\n*label activity_choice\nYou make your way to the canteen along with the other students. It is already 17:00, and there won't be any other lessons until tomorrow. \n\nYou're grouped together with the students that are part of your crash course. The cafeteria is full of students. \n\nThe cafeteria is also very large, and you notice there are five different sections within it. These sections are restricted by the year group of the students. There seem to be less students as students progress through the years.\n\nYou stand in the queue, listening to your classmates making idle chit chat and introducing themselves properly for the first time. \n\nYou feel a nudge on your shoulder. You look over and see Brenda staring at you. \"Don't you want to talk with anyone?\" she asks. \n\n*choice\n\t\n\t#\"Oh, I was just thinking about what I want to eat.\"\n\t\tYou shrug. \"Oh, I was just thinking about what I want to eat.\"\n\t\t\n\t\tBrenda nods. \"Yea, I was thinking about that as well. I really want to try out the sweet and sour pork belly with rice that they are serving.\"\n\n\t\t\"Wait, that's what I want to get as well,\" you respond. \"And with a si-\"\n\n\t\t\"A side of fries.\" The girl chuckles. \n\n\t\t\"Have we met before?\" you ask. You look her up and down and try to figure out where you've seen her before, but your memories come up blank. \n\n\t\t\"Maybe we have,\" Brenda replies. \"You'll remember, I'm sure of it ${fullname}. Wanna sit together?\"\n\n\t\tYou nod. The two of you get your food and then sit together in the cafeteria.  You take in a deep breath of the food on your plate, causing you to salivate. You rub your stomach as it grumbles.\n\n\t\t*page_break\n\n\t\tYou cough violently and almost spit out your drink.\n\n\t\t\"You're from Raza as well?\" You stare at Brenda. [i]This world is way too small, like seriously what are the chances?[/i]\n\n\t\t\"Yes, maybe that will help jog your memory.\" The girl smiles. \n\n\t\tYou bite your lower lip and try to remember, but you still come up blank. \"Nope, I still can't remember who you are. Sorry.\"\n\n\t\tBrenda shrugs. \"It's fine, I wasn't expecting you to anyway. But I mean we're both here studying magic together now, so I might as well lend you a helping hand since you've lent me one before.\"\n\n\t\t\"What do you mean?\"\n\n\t\t\"I'll help you with magic. We should study together.\"\n\n\t\t\"Oh, right, yea why not.\" You grin. \"That sounds great. What do you think about this beast range situation? Is it really dangerous?\"\n\n\t\tThe girl nods. \"Yes, if I'm not mistaken then it can be fatal. But if we study hard for the next two weeks, we'll be fine.\"\n\n\t\tYou take in a deep breath. \"Two weeks doesn't sound like enough time for me. I'm a complete newbie to this.\"\n\n\t\t\"I think that's part of the test,\" Brenda responds. She digs into her food, twirling her fork about elegantly. \"None of us are supposed to be prepared, I think. But I mean we're going to be in groups of four. Just stay in my group and we'll do fine.\"\n\n\t\tYou chuckle. \"That is an offer I can't refuse.\"\n\n\t\t*goto dorm_room\n\t\n\t#\"Hmm, oh where are my manners.\"\n\t\t\"Hmm, oh where are my manners.\" You scratch the back of your head sheepishly.\n\t\t\n\t\tBrenda chuckles. \"A bit shy aren't you?\"\n\n\t\t\"I wouldn't say shy… Not exactly.\"\n\n\t\t\"It's fine,\" she replies. She pats you on the back. \"I'll help you out, don't worry.\"\n\n\t\tThe two of you proceed to get your food. As you sit down, you stare at her plate of food, an exact replica of yours; sweet and sour pork belly with rice and a side of fries.\n\n\t\t\"Have we met before?\" you ask. You look her up and down and try to figure out where you've seen her before, but your memories come up blank. \n\n\t\t\"Maybe we have,\" Brenda replies. \"You'll remember, I'm sure of it ${fullname}.\"\n\n\t\t*page_break\n\n\t\tYou cough violently and almost spit out your drink.\n\n\t\t\"You're from Raza as well?\" You stare at Brenda. [i]This world is way too small, like seriously what are the chances?[/i]\n\n\t\t\"Yes, maybe that will help jog your memory.\" The girl smiles. \n\n\t\tYou bite your lower lip and try to remember, but you still come up blank. \"Nope, I still can't remember who you are. Sorry.\"\n\n\t\tBrenda shrugs. \"It's fine, I wasn't expecting you to anyway. But I mean we're both here studying magic together now, so I might as well lend you a helping hand since you've lent me one before.\"\n\n\t\t\"What do you mean?\"\n\n\t\t\"I'll help you with magic. We should study together.\"\n\n\t\t\"Oh, right, yea why not.\" You grin. \"That sounds great. What do you think about this beast range situation? Is it really dangerous?\"\n\n\t\tThe girl nods. \"Yes, if I'm not mistaken then it can be fatal. But if we study hard for the next two weeks, we'll be fine.\"\n\n\t\tYou take in a deep breath. \"Two weeks doesn't sound like enough time for me. I'm a complete newbie to this.\"\n\n\t\t\"I think that's part of the test,\" Brenda responds. She digs into her food, twirling her fork about elegantly. \"None of us are supposed to be prepared, I think. But I mean we're going to be in groups of four. Just stay in my group and we'll do fine.\"\n\n\t\tYou chuckle. \"That is an offer I can't refuse.\"\n\n\t\t*goto dorm_room\n\t\n\t\n\t#\"I think I'm okay for now, thanks for asking though Brenda.\"\n\t\t\"I think I'm okay for now, thanks for asking though Brenda.\"\n\t\t\n\t\t\"Oh come on,\" the girl replies. She pouts. \"Don't be like that. Fine, you don't have to talk to the others, at least just talk to me.\"\n\n\t\tYou deliberate for a moment. \"Fine, that works for me.\" You stare at the pouting girl. \"Do I know you from somewhere?\"\n\n\t\tBrenda nods. \"You do.\"\n\n\t\tShe walks forward into the queue and goes to get her food. You quickly follow behind her. \"Hey, wait up,\" you shout.\n\n\t\t*page_break\n\n\t\tYou cough violently and almost spit out your drink.\n\n\t\t\"You're from Raza as well?\" You stare at Brenda. [i]This world is way too small, like seriously what are the chances?[/i]\n\n\t\t\"Yes, maybe that will help jog your memory.\" The girl smiles. \n\n\t\tYou bite your lower lip and try to remember, but you still come up blank. \"Nope, I still can't remember who you are. Sorry.\"\n\n\t\tBrenda shrugs. \"It's fine, I wasn't expecting you to anyway. But I mean we're both here studying magic together now, so I might as well lend you a helping hand since you've lent me one before.\"\n\n\t\t\"What do you mean?\"\n\n\t\t\"I'll help you with magic. We should study together.\"\n\n\t\t\"Oh, right, yea why not.\" You grin. \"That sounds great. What do you think about this beast range situation? Is it really dangerous?\"\n\n\t\tThe girl nods. \"Yes, if I'm not mistaken then it can be fatal. But if we study hard for the next two weeks, we'll be fine.\"\n\n\t\tYou take in a deep breath. \"Two weeks doesn't sound like enough time for me. I'm a complete newbie to this.\"\n\n\t\t\"I think that's part of the test,\" Brenda responds. She digs into her food, twirling her fork about elegantly. \"None of us are supposed to be prepared, I think. But I mean we're going to be in groups of four. Just stay in my group and we'll do fine.\"\n\n\t\tYou chuckle. \"That is an offer I can't refuse.\"\n\n\t\t*goto dorm_room\n\n\n*label dorm_room\n*page_break\n\nYou make your way through the dark streets of the Draken Academy and soon find yourself in the complex where all of the dorms are located. You see about ten large buildings, each separated by a patch of land filled with red bushes, flowers and trees.\n\nYou look down at the sheet of paper in your hand.\n\n[i]Dorm room C12[/i]\n\nYou walk through to the building for first year students and then go along the corridor for all of the rooms in C block. You find a sign which points you in one direction toward rooms C1 - C24, and then other direction to C25 - C50.\n\nYou shake your head and walk in the direction to your dorm. It smells very clean along the corridor, as if it was just recently cleaned. You spot a couple other students walking along the corridor and gently nod at them. \n\nYou stop walking when you reach the room labelled C12. You put your hand on the round, metallic doorknob. It is very cold to the touch.\n\nYou open the door and enter your new home. \n\nA breeze of fresh air greets you as you walk through the door. You spot that your window is open. You frown, as your room is situated on the ground floor of the building. You walk to the window and close it. \n\nYou look around, your room is rather empty. Your bed is large and the duvet is relatively thick. There is a desk and a chair, along with a lamp on top of the desk. \n\nYou also find that you have a bathroom all to yourself. The bathroom is spacious, and looks very modern. \n\nYour first impression of your room is…\n*fake_choice\n\t#It's nice and comfy\n\t#Not too shabby\n\t#Could be better\n\t#A room is a room\n\nYou grin from ear to ear as you stare at your shower. You've never experienced a shower this magnificent before. You giggle like a child as you turn on the shower. Hot water pours down and steam quickly fills the room. You close the bathroom door and take off your clothes.\n\nYou step into the shower and let the water wash away all of the stress you've accumulated today. \n\n\"You deserve to live like this ${name}.\" You chant this multiple times as you shower.\n\nAs you finish up, you look at your reflection in the bathroom mirror. Your ${haircolour} hair looks healthier than ever before. You drag a finger across a mark that is present in between your chest.\n\nYou recall the excruciating pain from when a dagger was plunged there. You push the image out of your mind and prepare yourself for bed.\n\n*page_break Two Weeks Later\n\n*set pyromancy +20\n\n(gained Pyromancy)\n\nYou are stood by your designated training field, along with the rest of your classmates. \n\nLarry walks around, jabbing people in the stomach in an irregular pattern and irregular intervals, putting you on edge as you control a fireball in your hand. \n\n\"Keep channelling,\" Larry shouts. \"This is your last lesson. Tomorrow you're going into the thick of a beast range. The last thing you want is your spells to fizzle out because you are getting attacked.\"\n\nA punch lands in your stomach. You grunt but manage to keep your focus on the fireball intact. \n\n\"Good stuff,\" Larry says. He then walks away from you and continues over to other students. \n\nAbout an hour passes by. \n\n\"Enough,\" Larry shouts. \"Let's get one last sparring session going. Choose your opponent.\"\n\n*choice\n\t\n\t#You choose Brenda.\n\t\tYou walk over to Brenda and tap her on the shoulder.\n\n\t\t\"Hey bestie,\" the girl responds. She puts her hands on her hips. \"Now don't tell me you want a rematch, I already pummelled you into the ground last time.\" She chuckles and then sticks her tongue out. \n\n\t\tYou roll your eyes. \"I wasn't prepared back then. I am now.\"\n\n\t\t\"Alright then, I'll accept your challenge,\" she responds. The two of you walk a bit further away from the other students. Brenda then moves exactly ten meters away from you.\n\n\t\tYou look up at the sky. There is a cool sunset on the horizon. You take in a breath of the fresh air and look down as the wind makes the grass bend under its pressure. \n\n\t\tYou clasp your hands together. You then aim your hands into the sky, which Brenda copies. A flame shoots out of your hand and into the sky. Brenda similarly does so. \n\n\t\tTime almost seems to slow down as you watch the two flames hurtling at each other. \n\n\t\tThe flames crash into each other. \n\n\t\t[i]Go.[/i]\n\n\t\t*page_break\n\n\t\t(gained Dexterity) (gained Strength) (gained Intelligence)\n\n\t\tYou sprint forward. You roll to the ground as a flaming dagger rushes at you. You push mana out of your body and disappear in a flash of red light. \n\n\t\tYou appear behind Brenda, holding a dagger to her neck. \n\n\t\t\"Woah,\" she yelps. \"When did you learn that?\"\n\n\t\tYou put the dagger down and grin. You make a fist and raise it into the air. \"Finally. I finally beat you. Did you see that Brenda?\"\n\n\t\tBrenda turns around with a huge grin. \"Well the score is still twenty to one, so I don't think you should be so happy just yet.\"\n\n\t\tYou cough violently. You put your hands onto your ears. \"Oh sorry, I didn't hear what you just said.\"\n\n\t\t\"I just said that-\"\n\n\t\tYou cover your ears. \"La-la-la-la-la I can't hear you.\"\n\n\t\tBrenda giggles. \n\n\t\t*set dexterity +10\n\t\t*set strength +10\n\t\t*set intelligence +10\n\n\t\t*page_break\n\n\t\tOne of the most important things you learned in the past two weeks was that battles between mages usually end very quickly. At least at this level of competition, according to Brenda. \n\n\t\tYou've slowly grown closer with Brenda. You spend most of your time with her and consider her as one of your closest friends if not your closes friend here. \n\n\t\tShe's helped you out so much in your time at the academy, that you feel a strong bond with her. \n\t\t\n\t\tYou feel a…\n\t\t\n\t\t*fake_choice\n\t\t\t#Romantic connection\n\t\t\t#Friendly connection\n\n\t\tBrenda grabs your shoulder and starts massaging it. \"Now then, if you would stop spacing out as usual, we've got a beast range to conquer.\"\n\n\t\t\"You mean survive in. I'm not trying to test fate and defeat anything.\"\n\n\t\tBrenda laughs. \"Yes yes, whatever you say.\"\n\n\t\t*goto beast_range1\n\t\n\t\n\t\n\t#You choose one of the weaker students.\n\t\tYou look around and spot one of the weaker students, Elias. He has short blonde hair which is parted in the middle and gelled back. His eyes are a grey-blue, and he's a rather tall boy compared to others. \n\n\t\tHe's somebody you've spoken with for a fair bit, and you even consider him a friend of sorts. From what you've observed he's absolutely terrible at anything related to magic. \n\n\t\tYou sigh, feeling bad for picking him out, but you need the confidence boost before entering the beast range.\n\t\t\n\t\t[i]Sorry Elias, but this is just the way it has to be for now.[/i]\n\n\t\t\"Elias,\" you shout. \n\n\t\tThe boy turns around and spots you. He waves at you. \"Hey ${name}, what's up? Did you want to spar?\"\n\n\t\tYou nod. \n\n\t\tElias grins. He looks around and then points to a free patch of the field. \"Let's go there.\"\n\n\t\tYou start to have a bad feeling about this. [i]Elias usually isn't so confident. Did he learn something new? No, that can't be. He's awfully terrible at magic.[/i]\n\n\t\tYou gulp and walk with the boy. Once you both reach the patch of field, you separate yourselves by exactly ten meters. \n\n\t\tYou take in a deep breath. [i]Don't worry. Just use the tactic you made for this fight. Regardless of what he comes up with, I'm confident in my own skills.[/i]\n\n\t\tYou look up at the sky. There is a cool sunset on the horizon. You take in a breath of the fresh air and look about as the wind makes the grass bend under its pressure. \n\n\t\tYou clasp your hands together. You then aim your hands into the sky, which Elias copies. A flame shoots out of your hand and into the sky. The boy copies you. \n\n\t\tTime almost seems to slow down as you watch the two flames hurtling at each other. \n\n\t\tThe flames crash into each other. \n\n\t\t[i]Go.[/i]\n\n\t\t*page_break\n\t\t(gained Void) (gained Dexterity)\n\n\t\tYou spring forward. You push mana into your palms and conjure a flaming dagger. You jump to the side as a fireball comes your way.\n\n\t\tA loud explosion of flames occurs in front of you, but you dodge it just in time. You furrow your brows.\n\n\t\t[i]He's stronger than I thought.[/i]\n\n\t\tYou throw your dagger at the boy and simultaneously create another one in your palms. \n\n\t\tThe boy creates a red shield that blocks the dagger.\n\n\t\tYou smirk. You disappear from the spot in a flash of bright red and reappear behind Elias. \n\n\t\t\"Got you,\" you shout as you raise your dagger and prepare to stab him in the shoulder. \n\n\t\tSuddenly the ground under you starts to violently shake. You are sent flying back as a creature jumps out of the ground. \n\n\t\tYou roll back and get onto your feet. \"What the hell?\"\n\n\t\tElias grins as he looks to your direction. A large groundhog, about two meters tall, is next to him. It has thick brown fur. The creature bares its fangs at you, however you notice that it can't really see you. The groundhog burrows back into the ground. \n\n\t\tYou furrow your brows and then raise your hands up. \"I give up,\" you say. \n\n\t\tElias claps. \"Yes, that was great sparring ${name}. You almost had me there, but I knew you would try to ambush me from behind.\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"How did you know?\"\n\t\t\t\t\"How did you even know?\" You shake your head. \"You know what, it doesn't matter.\"\n\t\t\t#\"Hmph, I won't go easy on you next time.\"\n\t\t\t\t\"Hmph, I won't go easy on you next time.\"\n\n\t\tYou scratch your chin and then sigh. \"You're perceptive. But what the hell? Have you been hiding your power this whole time?\"\n\n\t\tElias shakes his head. \"No, I just learned this summoning spell yesterday. I was spending all my time learning this instead of the magic Larry has been teaching us. You know, I don't really like pyromancy all that much.\"\n\n\t\tYou groan and walk over to the boy. You rub your side and then laugh. \"Well, I must admit you're pretty powerful.\"\n\n\t\t\"Haha, you're not too shabby yourself. Come on, let's get a move on, the others have already left to make their teams for the beast range.\"\n\t\t*set void+10\n\t\t*set dexterity +10\n\n\t\t*set fought_elias \"true\"\n\t\t*goto beast_range1\n\t\n\n\n\n*label beast_range1\n\nYou are stood in the middle of a forest just outside the academy. All of the other students from your year group are there. There are hundreds of people you've never talked to, and many that you've never even seen despite having lived here for weeks now.\n\nYou are stood beside Brenda, the two of you having agreed to be part of the same group. Now you need to find two more students to join your party. \n\n\"What do you think?\" Brenda asks whilst scratching her chin. \"What should we do? Or who should we try to recruit?\"\n\nYou shrug. \"I have no idea Brenda, I haven't been talking with others except for you and Elias.\"\n\nBrenda nods. \"Then Elias it is,\" she says.\n\nBefore you can say anything the girl disappears into the thick of the crowd.\n\nYou rub your temple. \"Oh you do my head in Brenda,\" you mutter. \n\nAs you patiently wait for the girl to come back, you feel a tap on your shoulder. You turn around and spot a green haired girl about half your height. You look down at her and ask, \"Is everything okay?\"\n\nThe girl nods. She is wearing a green robe that is a little bit too big for her, causing her arms to be covered and the robe to drag along the ground. She looks up at you with her hazel eyes. \"Are you ${name}?\" she asks. \n\n\"Uh, yes, why do you ask?\"\n\n\"Great, can I team up with you?\"\n\nYou stare at the girl, dumbfounded. \"Do I know you?\"\n\n\"No,\" she replies. \n\nYou scratch the back of your head. \"What a weird…\" \n\nYou deliberate for a moment before saying…\n\n*choice\n\t\n\t#\"Sure, you can team up with me.\"\n\t\t\"Sure, you can team up with me.\"\n\t\t\n\t\tThe girl has a huge smile on her face. \"I'm Lara,\" she says. \"The voices told me to come with you.\"\n\n\t\t\"The voices? What are you talking about?\" You take a step back. \"Are you okay?\" \n\n\t\t\"It doesn't matter,\" Lara responds. \"But you've already agreed so you can't go back on your word!\"\n\n\t\t\"Right… Whatever, I'm just waiting for my friend Brenda to come back, she's trying to get one more person and then we're all set for the beast range.\"\n\n\t\t*goto beast_range2\n\t\n\t#\"Uh, why should I team up with you? I don't even know you.\"\n\t\t\"Uh, why should I team up with you? I don't even know you.\"\n\t\t\n\t\tThe girl tilts her head. \"Because I'm strong,\" she responds. \"I can prove it if you want.\"\n\n\t\tThe girl's eyes suddenly sparkle in a bright green. You sense a thick amount of mana exuding from her body.\n\n\t\tYou quickly put a hand on her shoulder. \"Okay okay, I get it you're strong, no need to go all out here. There's hundreds of people around us, you'll just hurt somebody if you're not careful.\"\n\n\t\tYou sigh. \"Alright, join me then, I suppose I have nothing to lose if you're strong.\"\n\n\t\t\"Really?\" the girl says. Her eyes turn back to hazel and she whistles in joy. \"Yay, I'm glad you see my power. I won't disappoint. Oh, I'm Lara by the way, nice to meet you ${name}.\"\n\n\t\t\"How do you know me? And why do you want to team up with me, if you mind me asking? It can't be because of my reputation, I have none.\"\n\n\t\tLara nods. \"Yes, you have literally no reputation. It's like you're trying to be invisible.\" She chuckles. \"The voices told me.\" \n\n\t\tYou take a step back. \"Which voices?\"\n\n\t\tThe girl shakes her head. \"Don't worry about it.\"\n\n\t\t\"Right… Whatever, I'm just waiting for my friend Brenda to come back, she's trying to get one more person and then we're all set for the beast range.\"\n\n\t\t*goto beast_range2\n\n\n*label beast_range2\n\nBrenda soon comes back along with Elias. The boy has tied his blonde hair back and is wearing a black shirt and some simple trousers that seem very flexible and comfortable. He towers above the rest of the people in the surroundings, his grey-blue eyes darting about as if he is searching for somebody. \n\n\"Oh, Lara,\" he calls out. \"What are you doing here?\" \n\n\"Elias? Are you teaming up with ${name}?\"\n\nElias nods. \"I sure am,\" he replies. \"So it's the four of us then I suppose?\"\n\n\"I suppose so.\"\n\n\"Wait, you know this girl?\" you chime in whilst looking up at Elias.\n\n\"Yea, she lives next door to me,\" Elias responds. \"Didn't expect this lineup, but I mean it's as good as it gets I suppose.\"\n\nBrenda claps her hands together. \"Great, all we need to do now is sign our names on this sheet of paper and we'll be transported into the beast range.\"\n\nBrenda goes first and writes her name down, followed by Elias, and then Lara. Finally it's your turn. \n\n\"Are you guys ready?\" you ask.\n\n\"As ready as ever,\" Elias says.\n\nYou look to the two girls and they both nod. You take in a long, deep breath and then write down your name on the paper. \n\n*label checkpoint_save\n*page_break End of Chapter\n*goto_scene draken_academy2", "draken_academy2": "Your vision fades away and you feel like your body has ceased to exist. After a couple of moments you are overcome by the sensation of falling. This stays for what seems like an eternity.\n\nYour vision starts to come back and you fall onto your knees. You hold onto your stomach but are able to stop yourself from vomiting. \n\nYou clutch onto the spatial ring you'd been given a week ago, a magical device that creates an alternate dimension where you can put items into it. Within it you stored enough food and water to last you for a whole month whilst in the beast range. You quickly pull out a bottle of water and chug the contents. \n\nThe water is icy cold and refreshing. You look around and find your companions stood about. \n\nBrenda moves over to you and helps you onto your feet. Her complexion has darkened a little, the teleportation seeming to have had an effect on her as well. \n\n\"Are you okay Brenda?\" you ask. \n\nThe girl nods. \"I'm fine,\" she replies weakly. \"Come, let's find somewhere to set up camp.\"\n\n\"Wait,\" Elias says. \"I think we should talk about our strategy first.\"\n\nYou look to Brenda and then to Elias and sigh. \"Already with the arguments,\" you mumble.\n\n*choice \n\t\n\t#Agree with Elias.\n\t\t\"I think we should talk about strategy too,\" you respond. \"I'm best in close quarters combat at the moment. Not to say I'm any good at it, but that's what I've practised the most right now. I'm relatively quick and agile too. I suppose I'll be our scout then, since I'm confident to not get caught by any creatures.\"\n\t\t\n\t\t\"I'll be in charge of the front lines with my trusty summon Sir Stevie,\" Elias says. \"He might not look like much, but he's a big ball of muscle and power.\"\n\t\t\n\t\t\"What about you?\" you ask Lara.\n\t\t\n\t\t\"I can heal and summon shields and stuff, I guess. It's not my favourite but I suppose it'll do for now,\" she replies deadpan.\n\t\t\n\t\t\"Brenda will be our damage,\" you say. You grin whilst looking at her. \"She's got a lot of punch to her, trust me on that.\" \n\t\t\n\t\tBrenda sighs. \"Now that we're done with that, let's get a move on.\"\n\t\t\n\t\t*goto moving\n\t\t\n\t#Agree with Brenda.\n\t\t\"I think we should get a move on as well,\" you say. \"We can talk about strategy on the way.\"\n\t\t\n\t\t\"Wait,\" Lara says. \"Let's finish our strategy now, it'll only take a minute.\"\n\t\t\n\t\tYou sigh. \"Two against two… What do we do now?\"\n\t\t\n\t\t\"Stop wasting time,\" Brenda snaps. She grabs a coin from her pocket. \"Heads and we move, tails and we talk strategy.\" \n\t\t\n\t\tThe girl tosses the coin high and then catches it. She reveals it to be tails.\n\t\t\n\t\t\"Alright, strategy it is. Quickly,\" Brenda says as she looks about vigilantly. \"${name} is fast and agile. He'll be our scout. Elias has his groundhog summon so he'll be in charge of keeping the beasts occupied. I'll be our main force of area of effect spells.\"\n\t\t\n\t\t\"I'll do healing and shielding then, I guess. It's not my favourite but I suppose it'll do for now,\" Lara says deadpan.\n\t\t*goto moving\n\t\t\n\t#Ask Lara for her opinion.\n\t\t\"Lara, what do you think?\" you ask.\n\t\t\n\t\t\"I think we should finish our strategy. It'll only take a minute after all.\"\n\t\t\n\t\t\"I suppose that makes sense,\" you respond. \"Alright I'll be in charge of scouting then. I'm probably the fastest of us and am only good in close quarters combat.\"\n\t\t\n\t\t\"I'll be in charge of the front lines with my trusty summon Sir Stevie,\" Elias says. \"He might not look like much, but he's a big ball of muscle and power.\"\n\t\t\n\t\t\"What about you?\" you ask Lara.\n\t\t\n\t\t\"I can heal and summon shields and stuff, I guess. It's not my favourite but I suppose it'll do,\" she replies deadpan.\n\t\t\n\t\t\"Brenda will be our damage,\" you say. \"She's got a lot of punch to her.\" \n\t\t\n\t\tBrenda sighs. \"Now that we're done with that, let's get a move on.\"\n\t\t*goto moving\n\t\t\n*label moving\n\nThe four of you carefully and slowly make your way through the wilderness. You place a hand above your forehead as you look up. The sun is bright in the sky, it's glare quite uncomfortable. You notice multiple birds flying about, and the constant noise made by these creatures puts you on constant edge. \n\nElias walks to the front of the group. His summoned groundhog creature, Sir Stevie, is currently burrowed under the ground. Sir Stevie is about ten meters ahead. You can sense him due to the arcana he gives off, despite being underground.\n\nThe forest is relatively dense, with the trees as thick as two quite fat people stood side by side. You notice that the canopy isn't too dense, however, and sunlight is easily able to penetrate through. \n\nThere is an earthy smell in the air. It is strong and filled with undertones of wood. \n\n\"Wait,\" you say. You raise a finger to your lips and signal your companions to be quiet. You sense something not to far away. \n\nYou close your eyes and focus on the arcana in the surroundings. You can see the particles as clear as day, and within this sea of arcana particles, you can make out thousands of tiny particles that come together to form into the shape of a large snake.\n\nYou point to your right. \"A beast,\" you whisper. \n\n*fake_choice\n\t\n\t#\"We should engage.\"\n\t\t\"We should engage,\" you say. \n\t#\"We should avoid it.\"\n\t\t\"We should avoid it,\" you say.\n\t#\"What should we do?\"\n\t\t\"What should we do?\" you ask.\n\t\t\n\"Let's fight it,\" Brenda says. You notice that the girl seems resolute.\n\nYou roll your neck around, take a deep breath, and then nod. \"Let's do this.\"\n\nBrenda looks to Elias. \"Engage,\" she whispers. \n\nElias clasps his hands together and grins. You spot that Sir Stevie has started to move underground toward the snake. \n\nYou all tiptoe closer to the creature. Once you are close enough to finally see the creature, you stand deathly still.\n\nThe creature is almost twenty meters long, and it is as thick if not thicker than two trees combined. It has dark blue scales all over its body, and its eyes are a deep black.\n\nYou lock eyes with the snake and your heart immediately drops. The creature is staring back at you with murderous intent. It moves its head from where it is rested on the ground and raises it into the air. \n\nYou look up and freeze.\n\n*page_break\n\nBrenda grabs a hold of you and pushes you to the ground. A small boulder shoots your way and crashes into a tree behind you.\n\n\"Get a hold of yourself ${name}, this isn't the time to zone out!\" Brenda shouts. She gets you onto your feet and rushes behind a nearby tree. \"Breath,\" she says.  \n\nThe girl slaps you in the face when she notices you aren't paying attention. \"Hey, look at me,\" she shouts. \"Breathe, together with me, 1, 2, 3.\"\n\nYou take in a deep breath and can finally move your body again. \n\n\"Good,\" Brenda continues. \"Now let's get this done.\"\n\nYou nod. You look out from behind the tree and see Sir Stevie jumping out of the ground at the serpent. \n\nYou don't need to be told what to do, you already know that you have to:\n\n*choice\n\t\n\t#Circle behind the serpent and cause a distraction.\n\t\tYou nerves have calmed and you start to run around the serpent. It doesn't take you long to reach behind it. You conjure flaming daggers out of your hand. You stop after creating your twelfth one. \n\t\t\n\t\tThe daggers levitate in front if you in a circle.\n\t\t\n\t\t\"Oi,\" you scream. \"You big, ugly piece of crap. Look at me when I'm talking to you.\"\n\t\t\n\t\t*if (fought_elias=false)\n\t\t\tYou stare at Sir Stevie. The groundhog is about two meters tall, and has thick brown fur. It's claws are extremely sharp and it roars as it crashes into the snake.\n\t\t\n\t\tThe snake head butts Sir Stevie out of the way and then slithers around to where you are. It stares at you and then opens its jaw wide. A rotten stench permeates out of the serpent's mouth. You want to cover your nose but know you can't.\n\n\t\tIn a flash you disappear from your spot and reappear about a meter away from the serpent. You push your hands forward, causing your daggers to fly into the creature's mouth. Blue blood spurts out.\n\n\t\tThe serpent roars and crashes its head down at you. \n\n\t\tYou disappear once again in a bright flash and are now stood almost ten meters away. You hold onto your right arm. A dark blue liquid has covered it. Your knees start to buckle and you fall to the ground.\n\n\t\tYour lungs feel like they are being crushed from the inside and you can't breath at all. You grab onto your throat as you struggle to breath.\n\n\t\tYour vision starts to darken and you soon lose your grasp onto consciousness.\n\n\t\t*page_break\n\n\t\tYou wake up with a ringing in your head. You look around, remembering the serpent is just nearby. You hear the creature roar. \n\n\t\t[i]Huh?[/i]\n\n\t\tYou look down at your unconscious body. Your whole world has taken on a dark purple colour. You look around and see Lara rushing toward you. The girl puts her hands onto your chest, causing a green energy to seep into your body.\n\n\t\t*fake_choice\n\t\t\t#\"What's going on?\"\n\t\t\t#\"Where am I?\"\n\n\t\tYou can sense that your body is being healed.\n\n\t\t\"Is he okay?\" Brenda shouts.\n\n\t\t\"He's fine,\" Lara replies. \"Not sure he'll wake up though.\"\n\n\t\t\"Damn it,\" Brenda hisses. It seems that you bought enough time for her to complete her spell. A humongous fireball is in her hand, almost quadruple the size of her. She holds the fireball above her head. The nearby trees are scorched and blackened whilst any leaves are on fire. The girl throws the fireball into the air. \n\n\t\tThe fireball keeps rising until it reaches about ten meters into the sky. As if with a mind of its own, the fireball starts shooting hundreds of smaller fireballs at the serpent. \n\n\t\tThe serpent tries to dodge the strikes but has too large of a surface area to do so. It then coils around and protects its head.\n\n\t\t\"Got you,\" Brenda says. The large fireball then comes crashing down at the serpent. \n\n\t\tA huge shockwave is left in the wake of the explosion. A crater remains where the serpent had been. The charred corpse lays lifeless, about a quarter its former size. \n\n\t\tElias rushes over to your side. His clothes are tattered bit he seems to be in good health despite this. \"You sure ${he}'s okay?\" he asks. \n\n\t\tLara nods. \"Yes, ${he}'s fine. It's just, I don't know why ${he} isn't waking up. ${He} should be okay already, so why are you still asleep ${name}. \"\n\n\t\t[i]What the fuck is this? If I'm down there, then what am I doing up here?[/i]\n\n\t\t*page_break\n\n\t\tYou try to look at your hands and find that you have a body but it is completely black and translucent.\n\n\t\t[i]Deep breaths ${name}, you already panicked once, no need to panic again![/i] You quickly realize that you can't breathe.\n\n\t\tYou are currently levitating about three meters in the air above your body.\n\n\t\tYou try to manoeuvre yourself to the ground. It's difficult at first but soon you find a way to get to the ground.\n\n\t\tYou then put your hand on your unconscious frame. Suddenly you are sucked back into your body. \n\n\t\tYou cough violently as you wake up. You lurch forward and look around. He stare at your hands and notice that you're back to normal. \n\n\t\t\"Oh thank the gods,\" you mutter. You get off your back and lean forward.\n\n\t\t\"Are you alright?\" Brenda asks. She runs at you and hugs you tightly. \"Don't scare me like that again.\"\n\n\t\t\"I'm fine,\" you reply. You groan and rub your head. \"So what do we do with the corpse?\"\n\n\t\t\"Absorb it,\" Lara says.\n\n\t\t*set entered_void \"true\"\n\t\t*goto snakeabsorption\n\n\n\t\t\n\t\t\n\t#Find a better vantage point and start casting spells at the serpent. \n\t\tYou disappear in a flash of flames and reappear on a tree branch not too far away from the serpent. You watch as Sir Stevie crashes into the serpent.\n\t\t\n\t\t*if (fought_elias=false)\n\t\t\tYou stare at Sir Stevie. The groundhog is about two meters tall, and has thick brown fur. It's claws are extremely sharp and it roars as it crashes into the snake.\n\n\t\tFrom your vantage point you are able to see the whole battlefield clearly. You push your mana into your hands and start creating flaming daggers. You create about a dozen daggers, which float about in a circle in front of you. \n\n\t\tBrenda is a bit further away. Her eyes are closed as she focuses on casting a powerful spell. All you have to do is buy her enough time to end this battle.\n\n\t\tLara is stood near Elias and you see her weaving patterns with her hands that create green barriers around Sir Stevie. With every attack of the snake, a barrier is broken, yet a new one is created almost immediately.\n\n\t\tYou fling your daggers at the distracted serpent. A dagger lands right in between one of its scales, causing the creature to roar. \n\n\t\tBlue blood is pouring out of the wound. The serpent spins around and makes a beeline toward Brenda. \n\n\t\t\"What the fuck?\" you yell. You disappear into flames and appear next to Brenda. \n\n\t\t[i]I need to distract it, without Brenda's spell we won't defeat it.[/i]\n\n\t\tYou run at the serpent. For some reason the creature seems caught off guard and stops moving. You conjure daggers in your hands and then disappear into flames once again.\n\n\t\tYou appear in the air behind the serpent. You plunge your daggers into the back of the serpent's head. \n\n\t\tThe creature writhes about and its large tail connects with your body.\n\n\t\tYou are sent flying more than a dozen meters away and crash into a thick tree. \n\n\t\t\"Puh.\" You spit out blood and roll down the tree. Your head hits the ground first and you are knocked unconscious.\n\n\t\t*page_break\n\n\t\tYou wake up with a ringing in your head. You look around, remembering the serpent is just nearby. You hear the creature roar. \n\n\t\t[i]Huh?[/i]\n\n\t\tYou look down at your unconscious body. Your whole world has taken on a dark purple colour. You look around and see Lara rushing toward you. The girl puts her hands onto your chest, causing a green energy to seep into your body.\n\n\t\t*fake_choice\n\t\t\t#\"What's going on?\"\n\t\t\t#\"Where am I?\"\n\n\t\tYou can sense that your body is being healed.\n\n\t\t\"Is he okay?\" Brenda shouts.\n\n\t\t\"He's fine,\" Lara replies. \"Not sure he'll wake up though.\"\n\n\t\t\"Damn it,\" Brenda hisses. It seems that you bought enough time for her to complete her spell. A humongous fireball is in her hand, almost quadruple the size of her. She holds the fireball above her head. The nearby trees are scorched and blackened whilst any leaves are on fire. The girl throws the fireball into the air. \n\n\t\tThe fireball keeps rising until it reaches about ten meters into the sky. As if with a mind of its own, the fireball starts shooting hundreds of smaller fireballs at the serpent. \n\n\t\tThe serpent tries to dodge the strikes but has too large of a surface area to do so. It then coils around and protects its head.\n\n\t\t\"Got you,\" Brenda says. The large fireball then comes crashing down at the serpent. \n\n\t\tA huge shockwave is left in the wake of the explosion. A crater remains where the serpent had been. The charred corpse lays lifeless, about a quarter its former size. \n\n\t\tElias rushes over to your side. His clothes are tattered bit he seems to be in good health despite this. \"You sure ${he}'s okay?\" he asks. \n\n\t\tLara nods. \"Yes, ${he}'s fine. It's just, I don't know why ${he} isn't waking up. ${He} should be okay already, so why are you still asleep ${name}. \"\n\n\t\t[i]What the fuck is this? If I'm down there, then what am I doing up here?[/i]\n\n\t\t*page_break\n\n\t\tYou try to look at your hands and find that you have a body but it is completely black and translucent.\n\n\t\t[i]Deep breaths ${name}, you already panicked once, no need to panic again![/i] You quickly realize that you can't breathe.\n\n\t\tYou are currently levitating about three meters in the air above your body.\n\n\t\tYou try to manoeuvre yourself to the ground. It's difficult at first but soon you find a way to get to the ground.\n\n\t\tYou then put your hand on your unconscious frame. Suddenly you are sucked back into your body. \n\n\t\tYou cough violently as you wake up. You lurch forward and look around. He stare at your hands and notice that you're back to normal. \n\n\t\t\"Oh thank the gods,\" you mutter. You get off your back and lean forward.\n\n\t\t\"Are you alright?\" Brenda asks. She runs at you and hugs you tightly. \"Don't scare me like that again.\"\n\n\t\t\"I'm fine,\" you reply. You groan and rub your head. \"So what do we do with the corpse?\"\n\n\t\t\"Absorb it,\" Lara says.\n\n\t\t*set entered_void \"true\"\n\t\t*goto snakeabsorption\n\n\t\n\t#Wait for the right moment and go in for the kill.\n\t\tYou circle around the area and watch as Sir Stevie is waging war on the serpent. \n\t\t\n\t\t*if (fought_elias=false)\n\t\t\tYou stare at Sir Stevie. The groundhog is about two meters tall, and has thick brown fur. It's claws are extremely sharp and it roars as it crashes into the snake.\n\n\t\tYou watch as Lara casts dozens of barriers around Sir Stevie. Each time the snake attacks the groundhog, a barrier shatters, but a new one forms almost instantly, keeping the summon from dissipating. \n\n\t\tYou decide to watch how the fight plays out a little longer. \n\n\t\tYou notice that the serpent is doing its best to protect a single spot on its tail. It keeps moving the spot away from the groundhog.\n\n\t\t\"Brenda,\" you shout. You stare at the girl, about ten meters away from you. Her eyes are closed as she focuses on a powerful spell that requires her full concentration. \n\n\t\t\"What?\" the girl responds. \n\n\t\t\"I think I've got this handled, just hit the serpent with what you've got right now.\"\n\n\t\tBrenda opens her eyes and looks toward your direction. \"Are you sure?\"\n\n\t\t\"Yes, quickly.\"\n\n\t\tBrenda bites her lower lip and then claps her hands together. A bright fireball about as big as her floats up into the sky. After reaching about five meters into the air, the fireball starts to shoot out hundreds of miniature versions of itself at the serpent. \n\n\t\tThe serpent raises its head up and roars at the spell. It unravels itself and goes all the way up to the fireball. \n\n\t\t[i]Gotcha.[/i]\n\t\t\n\t\t*page_break\n\n\t\tYou snap your fingers, causing dozens of flaming daggers to form in front of you. You then disappear in a flash of red light. You reappear right behind the snake's tail. \n\n\t\tYou plunge your dagger into a spot where the scales aren't as dark blue. \n\n\t\tThe snake suddenly hisses and falls to the ground. With a loud thump it crashes into the ground, lifeless. \n\n\t\tYour companions look wide-eyed at you. \n\n\t\t\"What did you do?\" Elias asks. He walks over to you with a slight limp. \n\n\t\tYou pull out your dagger, and along with it a large red heart comes out. \n\n\t\t\"I saw it protecting this part of the tail like its life depended on it,\" you respond. \"Just a bit of observation I suppose.\"\n\n\t\tYou stare at the corpse of the snake. You then look down at your hands. [i]I really just did that… Practice really does make you achieve what you want.[/i]\n\n\t\tYou wipe away some tears that have started to build in your eyes.\n\n\t\t\"Are you alright?\" Brenda asks. \n\n\t\t\"I'm fine,\" you reply. \"So what should we do with the corpse?\"\n\n\t\t\"Absorb it,\" Lara says.\n\n\t\t*goto snakeabsorption\n\t\t\n\t\n*label snakeabsorption\n*fake_choice\n\t#\"Is this okay to do?\"\n\t\t\"Is this okay to do?\"\n\t#\"Sure, but how?\"\n\t\t\"Sure, but how?\"\n\t\t\nYou tilt your head. \"I don't remember hearing about this from Larry,\" you say. You look at Brenda and then Elias. \"Is this what we're supposed to do?\"\n\nThe pair shrug.\n\n\"I'm not sure,\" Brenda says. \"I mean, I don't know how we would do it either… Lara, could you demonstrate?\"\n\nLara nods. \"Sure thing. Creatures inside of a beast range are filled with arcana that is much denser than what we can cultivate from the atmosphere. Think of it like a vacuum that has been gathering years worth of arcana and stored it within itself.\"\n\nThe girl walks over to the humongous creature and puts her hand on its corpse. You can sense that she is pulling the arcana from the corpse into her body, in a similar way to what you'd do in regular meditation. \n\nYou make your way over to the corpse and start copying Lara. \n\n\"Woah there, why are you absorbing so much so quickly?\" she shrieks. \"Slow down, there needs to be enough split evenly between us four.\"\n\nYou scratch the back of your head. \"I can't go any slower.\"\n\nLara furrows her brows. \"Alright, I'll tell you when to stop.\"\n\nAfter about a minute passes, the girl tells you to stop absorbing.\n\nYou watch as your three companions continue absorbing the serpent's arcana.\n\n[i]Why are they taking so long? Can't they speed themselves up? We're in a freaking beast range right now.[/i]\n\nIn the meantime you decide to…\n\n*fake_choice\n\t#Meditate\n\t#Keep guard\n\nTen minutes go by and they still haven't finished up. You groan.\n\nYou feel that your insides have been filled to the brim with the energy you stole from the serpent. You close your eyes and look within your body. Behind your lungs is a small purple crystal, your arcane core.\n\nThe core is glowing brightly, something which has never happened before. You can sense it buzzing and crackling in joy from what you absorbed. The core starts to pump out mana much denser than before, you notice.\n\n[i]Hmm, is this because I absorbed arcana from this specific serpent or just because it came from a creature in a beast range?[/i]\n\nAfter fifteen minutes have passed, they finally finish up. \n\n\"Took your sweet time you three,\" you comment.\n\nLara scowls. \"It's not that we're slow, you're just too fast you monster.\"\n\nYou laugh. \"That isn't nice to say. Anyway, what now? We still need to look for somewhere to set up base don't we?\"\n\n\"Yes,\" Brenda says. The girl is looking at you with what you sense as curiosity. \"Come on, let's get out of here. We've already spent too much time in this spot. Some other creatures must be on their way here probably to kill off any injured members of the battle or to just take the scraps.\" She points at the desiccated corpse. \n\nThe four of you quickly make your way through the forest in your original formation. \n\n*page_break\n\nAbout an hour later, you find yourself stood by a waterfall. The sound of the water crashing onto the stream below is calming. The sun is still high in the sky, but the temperature is much cooler here.\n\n\"Where do we set up camp?\" you ask. \n\nThere is a lot less coverage of trees in the area, and beside the waterfall is the only place where you can position yourself to only have to worry about creatures coming from one direction. \n\nBrenda points to a wall near the waterfall. \"We set up there. We can't get flanked this way.\"\n\n\"Hmm.\" Elias rubs his chin. \"We should probably secure the location whilst we are setting up camp, don't you think?\"\n\n\"I agree,\" Brenda replies. \"${name} do you think you'll be able to do this alone?\"\n\n*fake_choice\n\t#You nod.\n\t\t\"Of course I will,\" you say.\n\t\t\n\t#You shake your head.\n\t\t\"I don't think I can,\" you say.\n\t\t\nElias quickly butts in. \"I'll send Sir Stevie along with ${name}, it's not too difficult for me to do that as long as a fight doesn't happen I'll be able to conserve enough mana.\"\n\n\"Yea that sounds good,\" you respond. \n\nYou conjure two daggers and then wait for Elias to summon Sir Stevie. The groundhog spins around a couple of times and then walks over to you. The ground shakes with each step it takes. \n\n\"Uhh.\" You stare at the groundhog. It is laying down in front of you and making a low growling sound. \n\n\"He wants you to pet him,\" Elias says. \n\n\"Oh, really?\" You place a hand on the groundhog and start scratching it. \n\nThe groundhog shakes about joyfully. It then steps back a couple of meters and burrows into the ground. \n\n\"He'll follow you from underground, gives us the element of surprise,\" Elias says.\n\n\"Alright, I'll get going then.\" \n\nYou start walking away from the camp, making sure to remember the exact layout of the area as you move about. You follow the stream for about ten minutes, before changing direction.\n\nAs you move about the perimeter of the camping ground, you hear a high-pitched buzzing.\n\nOut of the corner of your eye you can see a huge beehive, about twenty meters away. \n\nThe bees seem really big from where you are, and the beehive looks at least three meters in size.\n\n\"Let's make a detour from the beehive Sir Stevie,\" you say. \n\n*page_break An Hour Later\n\nYou make your way back to your base of operations. Tents have already been put up and the three others are currently sat by a camp fire, roasting some meat across it. \n\nYou salivate as you take in a whiff of what smells like rabbit meat.\n\n\"${name},\" Elias calls. \"How did it go? Find anything useful?\"\n\nYou shrug. \"A couple of landmarks, a cave, a huge beehive and an area filled with trolls.\" You gulp hard as you recall the sight of those trolls. They were all tall, had dark green skin and noses as fat and red as tomatoes. \n\nYou describe what they look like to your peers. \n\n\"Ugh,\" Elias responds. \"Let's avoid them at all costs, am I right?\"\n\n\"Yea,\" Brenda chimes in. \"Enough talk, let's dig in, we've been waiting for you to get back ${name} before we started eating.\"\n\nYou quickly join in and help devour the food that was freshly made. You lick your fingers and pat your stomach when you finish eating.\n\n\"That was delicious,\" you say.\n\n*choice\n\t\n\t#Make conversation with Elias.\n\t\tYou walk over to Elias, not wishing to interrupt the conversation that Brenda and Lara are having. \n\t\t\n\t\t\"Want something to drink?\" Elias asks. He has a cup in both hands filled with a red liquid. \n\t\t\n\t\t\"Yea sure,\" you respond. You take the cup and smell it. A strong, fruity aroma comes from it. \"Alcohol? At this time? We're in a beast range.\"\n\t\t\n\t\tElias chuckles. \"It's fine, alcohol won't do much to us anyway. You can just purge the toxins by using your mana. It's like an instant detoxification process.\"\n\t\t\n\t\t\"Really?\" You raise an eyebrow and then take a swig. The drink goes down smoothly, and it has a crisp, floral feel to it. \"Woah, this is so strong.\"\n\t\t\n\t\tYou cough and then hiccup before sneezing.\n\t\t\n\t\tElias laughs and pats you on the back. \"The holy trifecta haha.\"  \n\t\t\n\t\tYour head quickly starts to feel weird. You feel dizzy and as if the world is spinning. You push your mana through your body and then look wide eyed at your friend. \n\t\t\n\t\t\"What did I tell you,\" he says. \"Works like a charm. Now relax and drink up some more.\"\n\t\t\n\t\tYou nod and take a couple of swigs. You feel the heat rising to your cheeks. You look up at the countless, bright stars in the sky. \"It's never this bright where I'm from,\" you say. \n\t\t\n\t\t\"Where are you from again?\" Elias asks. \n\t\t\n\t\t\"Raza…\" You shake your head. \"What about you Elias? You haven't told me much about yourself.\"\n\t\t\n\t\tElias shrugs. \"I mean you've never asked before. I'll keep it short and sweet. I'm from a small country you've probably never heard of before, Elfheim.\"\n\t\t\n\t\t\"Elfheim?\" You furrow your brows and try to visualize the world map you know of. \"No I really have never heard of that place before.\"\n\t\t\n\t\t\"Haha see, I told you. Anyway, it's a really nice place I'll have you know. You should come and visit sometime, I'll show you around. A private tour guide, if I may be so bold to make a claim such as this.\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"That would be nice.\"\n\t\t\t\t\"That would be nice,\" you say.\n\t\t\t#\"Let me think about it first.\"\n\t\t\t\t\"Let me think about it first,\" you say.\n\t\t\t\t\n\t\tBrenda and Lara walk over to you two. \n\t\t\n\t\tBrenda sits next to you and grabs your glass from your hand. She takes a whiff. \"Alcohol? Seriously? We're in a beast range right now, we don't have the luxury of this.\"\n\t\t\n\t\tYou scratch the back of your head and glance at Elias with a side eye. \n\t\t\n\t\t\"Don't worry,\" Elias says, seemingly having understood that you need help. \"I already explained to ${name} that using mana will detoxify the alcohol immediately. Look, ${he}'s already sober and as good as new. You should try it out.\"\n\t\t\n\t\tThe girl frowns. \"I'm alright. I'll take the first watch, you guys can head on to sleep.\"\n\t\t\n\t\tBrenda storms away. Lara runs over to the girl and then the two of them disappear into the forest. \n\t\t\n\t\tYou rub your temples and then hand the glass back to Elias. \"We should go to sleep and take on the second watch then.\"\n\t\t\n\t\tYou walk toward your tent. It's relatively small however it's really comfortable. It doesn't take long before you fall asleep.\n\t\t\n\t\t*goto second_watch\n\t\t\n\t\t\n\t#Make conversation with Brenda.\n\t\tYou walk over to Brenda, not wishing to interrupt the conversation that Lara and Elias are having. \n\t\t\n\t\tThe girl is staring up at the night sky with a twinkle in her eyes. \n\t\t\n\t\t\"Everything okay?\" you ask. \n\t\t\n\t\tBrenda's gaze stays where it was for a couple of seconds, after which she slowly looks toward you. \"The world is so big,\" she says. \"If we were to die here tonight, nobody would know.\"\n\t\t\n\t\tYou cough. \"That's a rather morbid train of thought. I think I have to ask again. Are you okay Brenda?\"\n\t\t\n\t\tThe girl nods. \"I'm alright.\" She beckons you to sit beside her. \"So, tell me, you just fought a beast for the first time. How does it feel?\"\n\t\t\n\t\tYou slump down beside the girl. \"It's not what I expected. Can I be completely honest with you?\"\n\t\t\n\t\t\"Of course you can,\" Brenda responds. She smiles warmly whilst looking into your eyes.\n\t\t\n\t\t*fake_choice\n\t\t\t#\"I was terrified.\"\n\t\t\t\t\"I was terrified. Like, mortified. This is not what I expected at all.\"\n\t\t\t#\"It wasn't what I expected.\"\n\t\t\t\t\"It wasn't what I expected. It was exhilarating but also terrifying.\"\n\t\t\n\t\t\"Yea,\" Brenda responds. \"It's not what I expected as well.\"\n\t\t\n\t\tYou raise your brows. \"Wait, this is your first time as well?\"\n\t\t\n\t\tThe girl is silent. \n\t\t\n\t\tShe places her hands above the camp fire and then rubs them together. \"Why is that a surprise to you?\"\n\t\t\n\t\tYou shrug. \"I don't know, it's just I always expected that you've done all of these things before since you always seem so confident. You also know so much about magic already and about these beasts and just surviving out here.\"\n\t\t\n\t\tBrenda chuckles. She grabs one of your hands. You notice that her hand is shaking. \"Just because I have all of this knowledge doesn't mean I wasn't as terrified. We would have died if we made a single error, just let that sink in.\"\n\t\t\n\t\tYou stare into Brenda's eyes, and feel yourself becoming lost in them. Your heart thumps in your chest. \n\t\t\n\t\tBrenda pulls her hand away from yours and gets up. \"I'll take the first watch,\" she says. She walks over to Lara, taking the girl with her into the forest. \n\t\t\n\t\tYou decide that now is the best time to go to sleep, as you'll have to take on the second watch with Elias.\n\t\t\n\t\t*goto second_watch\n\t\t\n\t\t\n\t\t\n\t\t\n\t#Make conversation with Lara.\n\t\tYou walk over to Lara, not wishing to interrupt the conversation that Brenda and Elias are having. \n\t\t\n\t\tLara is mumbling something under her breath. You can make out a couple of words, but not enough to understand what she's talking about.\n\t\t\n\t\t\"Everything okay?\" you ask. \n\t\t\n\t\tLara's head jerks to you. You notice that her eyes are completely white.\n\t\t\n\t\tYou take a step back. \"Uh, Lara?\"\n\t\t\n\t\t\"So you're ${name}? You look different to what I expected,\" Lara says. Her voice isn't the same as before, it is much deeper and sounds like she's aged by almost a century. \n\t\t\n\t\t\"Excuse me?\" You take another step back, yet Lara takes a step toward you. \n\t\t\n\t\t\"You have all that power within you, but don't know how to use it? You don't even know what you truly are, your poor thing. The wheel has brought you back yet you are defenceless if the Templars find you. A recipe for disaster. Indeed, pandemonium will ensue.\" Lara's eyes slowly start to go back to their normal hazel. Her brows are raised.\n\t\t\n\t\t\"Lara? Are you okay? What was that? What did you mean by Templars? Pandemonium?\"\n\t\t\n\t\tLara rubs her temples and then groans. \"Seriously? She just had to choose to do that right here and now? I warned her, stupid hag.\" Her voice is back to normal.\n\t\t\n\t\tHer eyes suddenly go white again. \"Who are you calling a stupid hag?\" the aged voice asks.\n\t\t\n\t\tYou scratch the back of your neck. \"What the hell is going on here?\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"You're a what?\" Elias shouts. He gasps and stares at Lara with widened eyes. \n\t\t\n\t\t\"Hey,\" Brenda says. She punches Elias in the shoulder. \"That was mean!\"\n\t\t\n\t\t\"Right, right, sorry,\" Elias responds. \"I didn't mean for it to come out like that. But you're a Banshee? How is that even possible?\"\n\t\t\n\t\tYou clear your throat. \"I'm a bit in the dark here guys, what are you talking about? What is a Banshee?\"\n\t\t\n\t\tBrenda turns to look at you. \"How don't you know what a Banshee is? Haven't you heard any of the children's stories?\"\n\t\t\n\t\tYou shake your head. \"I wouldn't be asking if I knew, would I?\"\n\t\t\n\t\t\"Stop arguing,\" Lara cuts in. \"Look, I didn't hide this for any other reason than exactly what's going on right now. Just because I'm a Banshee doesn't mean I'm not human. I still have feelings and emotions.\"\n\t\t\n\t\t\"Right, you're right Lara, I'm sorry,\" Brenda replies. \n\t\t\n\t\t\"Thank you.\" Lara sighs. \"${name}, a Banshee is simply put a person whose soul has been fused with a spirit's. We both coexist in my body in a friendly manner. Of course, that's not always what happens, sometimes the spirits try to take over, destroying the human in the process. But for my part we're on good terms. Her name is Estella, she was an elf whilst alive. I learn a lot from her, and she's the closest thing I have to a parent.\"\n\t\t\n\t\t\"So how does it work?\" you ask. \"She can just take control whenever she wants?\"\n\t\t\n\t\t\"It's not really like that. I don't really want to get into it right now, but she's not dangerous, that's all you guys need to know. Now, Brenda, we should go for the first watch. You two should sleep and wait for us to get back.\"\n\t\t\n\t\tYou nod. \"Alright then.\"\n\t\t\n\t\tYou make your way to your tent and go to sleep.\n\t\t\n\t\t*goto second_watch\n\t\t\n*label second_watch\n\nYou wake to Elias' voice. He calls you from outside your tent, prompting you to quickly get up and out of it. \n\nYou yawn as you walk toward Elias. The camp fire is still blazing. You place your hands above the fire and rub them together. \"Wow it's so cold right now,\" you say. \n\n\"Way too cold,\" Elias says and nods in agreement. \"Right, let's get going, we only need to stay up for four hours.\"\n\nThe two of you start walking around your encampment in a radius of about two hundred meters. It's relatively quiet, with only a couple of owls in the vicinity making any sort of noise. \n\nAs you make your third lap around the area, you spot something in the distance. A dark shadow is nestled between two trees. \n\n*choice\n\t\n\t#Ignore it.\n\t\tYou rub your eyes and then notice that the shadowy figure isn't there.\n\t\t\n\t\t[i]Must be the lack of a full eight hours of sleep creating some illusions[/i]\n\t\t\n\t\tYou continue along your walk of the camp perimeter. Soon the pair of you make your way back to the camp.\n\t\t\n\t\t*goto camp_fight\n\t\t\n\t#Inform Elias\n\t\tYou nudge Elias.\n\t\t\n\t\t\"What's up?\" he responds. \n\t\t\n\t\tYou point to where you spotted the shadow. You squint your eyes as you find there is nothing there any more. \"Huh, weird, I thought I saw something.\"\n\t\t\n\t\t\"What did you think you saw? Describe it to me,\" Elias says. \n\t\t\n\t\t\"It kind of looked like a person, but more like a person if they were made out of shadows, if that makes sense.\"\n\t\t\n\t\tElias scratches his head. \"Hmm, are you certain?\"\n\t\t\n\t\t\"Yes, absolutely certain. I saw that for sure.\"\n\t\t\n\t\tElias groans. \"Right, we should go check that out then.\"\n\t\t\n\t\tAs you get closer to where you'd spotted the shadow, you feel your insides starting to scream. You slow down. \"Elias,\" you call. \n\t\t\n\t\t\"I know,\" he responds. \"Let's go back, this doesn't feel right.\"\n\t\t\n\t\t\n\t\t*goto camp_fight\n\t\t\n*label camp_fight\n*page_break\nAs you get closer to the camp, you suddenly feel a great sense of dread. The arcana in the air seems sickly, as if something were rotting. You hold onto your stomach and fall onto your knees. \n\nElias runs to you. \"Are you okay?\" He helps you back onto your feet. \n\n\"I don't know,\" you reply. \"Something isn't right.\"\n\n\"Let's get you back to the camp, Lara will heal you up in no time.\"\n\nYou try to move but your foot is stuck firmly in the ground. You turn your head. Elias is frozen to the spot, looking down at the ground. \n\n\"Elias?\" you call. \n\nThe boy doesn't respond. He's still holding onto you. \n\nYour heart starts to slam at your chest. You can hear the sound of your heartbeat and feel the vibrations it's causing in your body. \n\nThe feeling of dread intensifies with every passing moment. You try but are unable to get your body to move. \n\nYour breath gets stuck in your throat as a shadowy figure appears in front of you, about ten meters away. \n\nYou try to open your mouth and scream, but your body won't obey your command. \n\nThe shadowy figure starts to walk closer to you. It looks like a humanoid creature but you can't see its face as it is covered by a hood. As it comes closer you notice that is isn't walking, rather it is floating a couple centimetres above the ground. \n\n[i]Fuck, fuck, fuck.[/i]\n\nYou take a deep breath and start to circulate your mana through your body. \n\n[i]What? What is going on right now? This can't be real![/i]\n\nYour mana circulates but at such a slowed down rate that you'd need a full minute before you could cast a spell. \n\n*fake_choice\n\t#\"Get away from us!\"\n\t\t\"Get away from us!\"\n\t#\"What do you want?\"\n\t\t\"What do you want?\"\n\nThe figure is now only a meter away from you. It's aura is terrifying. You battle with the urge to fall unconscious.\n\nYou grit your teeth, not allowing whatever spell is being cast on you to succeed. \n\n\"Child of ashes,\" the cloaked figure says. It's voice is very deep, and it sounds like the words aren't coming from it, but rather from elsewhere in the environment. \"What luck have I been presented with here? \n\nThe figure is now so close that you can smell it. A rotten stench fills the air, and your insides feel like they are being corroded from the shadow's aura. \n\n\"Hmph, reinforcements? What do you think you're doing here Bami?\"\n\nYour body suddenly starts listening to you again and you are able to jump away from the shadow. Elias is still frozen to the spot, however. \n\n\"Go to hell where you belong,\" a woman shouts. She slowly comes into vision. The woman has medium length purple hair with some white streaks within. Her eyes are a deep purple that look at you inquisitively.  She's slender and only slightly taller than you. The woman is wearing a tight leather one piece, with a sword fastened on both sides.\n\nThe woman raises her hand and waves it to the right. A huge purple chain appears in her hand. \"I suggest you get out of here you scum, before I lose my temper.\" She swings the chain at the shadow. \n\n\"I suppose I'll bid you farewell,\" the shadow says. It then disappears into thin air. \n\nYou run over to Elias and shake him, yet he still doesn't move. \"Help me,\" you exclaim. You turn and look to the woman. \n\n\"He's fine,\" Bami responds. \"He'll go back to normal once we leave.\"\n\nYou sigh in relief. \"Alright, he's fine. Wait, what do you mean when we leave? Who are you?\"\n\nYou push your mana through your body and ready yourself to cast a spell. \n\n\"I don't have time for this,\" Bami says. \"Now that I've revealed myself by saving you, they are going to be on our tails any moment now.\"\n\nThe woman waves her right hand and a purple portal appears behind you. \n\nYou turn around and see a dark forest from within the portal. \n\n\"Wait wh-\" Before you have time to respond you are pushed into the portal.\n\n*label checkpoint_save\n*page_break End of Chapter\n*goto_scene solas1", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending", "fae_academy": "You find yourself in one of the smaller queues. Only about half a dozen others are part of the queue here, comprised almost completely of girls.\n\n\"How weird,\" you mutter under your breath. There is a small pond next to the queue. You stare at your reflection. You are a…\n\n*label gender\n\n*choice\n\t#Male\n\t\t*set gender \"male\"\n\t\t*set he \"he\"\n\t\t*set him \"him\"\n\t\t*set his \"his\"\n\t\t*set man \"man\"\n\t\t*set sir \"sir\"\n\t\t*set mr \"Mr.\"\n\t\t*set gentleman \"gentleman\"\n\t\t*set boy \"boy\"\n\t\t*goto name\n\t\t\n\t#Female\n\t\t*set gender \"female\"\n\t\t*set he \"she\"\n\t\t*set him \"her\"\n\t\t*set his \"her\"\n\t\t*set man \"woman\"\n\t\t*set sir \"ma'am\"\n\t\t*set mr \"Ms.\"\n\t\t*set gentleman \"lady\"\n\t\t*set boy \"girl\"\n\t\t*goto name\n*label name\n\t\n\"What is your name?\"\n\n*if (gender=\"male\")\n\t*goto male_name\n\n*if (gender=\"female\")\n\t*goto female_name\n\n*label male_name\n\n*fake_choice\n\t#Adam\n\t\t*set name \"Adam\"\n\t#Boris\n\t\t*set name \"Boris\"\n\t#Carl\n\t\t*set name \"Carl\"\n\t#Dave\n\t\t*set name \"Dave\"\n\t#Let me input my name\n\t\t*input_text name\n*goto  surname\n\n*label female_name\n\n*fake_choice\n\t#Anna\n\t\t*set name \"Anna\"\n\t#Betsy\n\t\t*set name \"Betsy\"\n\t#Caroline\n\t\t*set name \"Caroline\"\n\t#Denise\n\t\t*set name \"Denise\"\n\t#Let me input my own name\n\t\t*input_text name\n\n*goto surname\n\n*label surname\n*set surname \"Light\"\n*set fullname (name&\" \")&surname\n\nYour name is ${mr} ${name} ${surname}.\n*goto orientation\n\n*label orientation\nWho are you attracted to?\n\n*fake_choice\n\t#Men.\n\t\t*if (gender=\"male\")\n\t\t\t*set orientation \"gayM\"\n\t\t*if (gender=\"female\")\n\t\t\t*set orientation \"straightM\"\n\t\n\t#Women.\n\t\t*if (gender=\"female\")\n\t\t\t*set orientation \"gayF\"\n\t\t*if (gender=\"male\")\n\t\t\t*set orientation \"straightF\"\n\t\t\t\n\t#Men and Women\n\t\t*set orientation \"bisexual\"\n\t\t\n\t#I'm not interested in such things.\n\t\t*set orientation \"asexual\"\n\n*goto hair\n\n*label hair\nYour hair is…\n*fake_choice\n\t#Short and curly\n\t\t*set hair \"short and curly\"\n\t\t*set hairlength \"short\"\n\t\t*set hairstyle \"curly\"\n\t#Long and curly\n\t\t*set hair \"long and curly\"\n\t\t*set hairlength \"long\"\n\t\t*set hairstyle \"curly\"\t\t\n\t#Short and straight\n\t\t*set hair \"short and straight\"\n\t\t*set hairlength \"short\"\n\t\t*set hairstyle \"curly\"\n\t#Long and straight\n\t\t*set hair \"long and straight\"\n\t\t*set hairlength \"long\"\n\t\t*set hairstyle \"straight\"\n\nYour hair has a…\n*fake_choice\n\t#Blue colour\n\t\t*set haircolour \"blue\"\n\t#Red colour\n\t\t*set haircolour \"red\"\n\t#Blond colour\n\t\t*set haircolour \"blond\"\n\t#Purple colour\n\t\t*set haircolour \"purple\"\n\t#Brown colour\n\t\t*set haircolour \"brown\"\n\t#Black colour\n\t\t*set haircolour \"black\"\n\t\t\nYour body proportions are…\n*fake_choice\n\t#Slim\n\t\t*set body \"slim\"\n\t#Chubby\n\t\t*set body \"chubby\"\n\t#Muscular\n\t\t*set body \"muscular\"\n\t#Average\n\t\t*set body \"average\"\n\nA girl turns around and looks at you. She's short and slender, wearing a hair clip in the shape of a heart. Her sea blue eyes seem to be filled with curiosity as they dart about everywhere. She stretches out her hand and then asks, \"What's your name?\"\n\n\"My name is ${fullname}.\" You shake the girl's hand. \"Nice to meet you.\"\n\nThe girl smiles . \"I'm Estelle, thank you for asking.\" She chuckles. \"So what's wrong with you?\"\n\nYou furrow your brows and stare at the girl. \n\n[i]What?[/i]\n\n*set met_estelle \"true\"\n*set fae \"true\"\n*choice\n\n\t#\"What do you mean what's wrong with me? What's wrong with you?\"\n\t\t\"What do you mean what's wrong with me? What's wrong with you?\"\n\t\t\n\t\t\"I'm sorry,\" Estelle spits out. \"I should have phrased that better, my deepest apologies.\" She curtsies, pulling up the pink robe she's wearing to reveal her lower legs. \"I meant why have you chosen the Fae Academy? The smallest queue is here for a very good reason, I thought you'd know already.\"\n\t\t*goto A\n\t#\"Uhm, excuse me? What did you just say to me?\"\n\t\t\"Uhm, excuse me? What did you just say to me?\"\n\t\t\n\t\t\"Oh I'm sorry, you didn't understand my question did you?\" She scratches her hair and laughs awkwardly. \"I meant why have you joined the Fae Academy?\"\n\t\t*goto A\n\t#\"I want to conquer the universe and rule over all with an iron fist. What about you?\"\n\t\t(gained Social)\n\t\t\n\t\t\"I want to conquer the universe and rule over all with an iron fist. What about you?\"\n\t\n\t\tYou giggle as the girl stares at you with furrowed brows. \"I'm just joking, don't take it so seriously.\"\n\t\t\n\t\tEstelle chuckles. \"You're a little comedian, I see,\" she says sweetly. \"What I meant is that you've also decided to join the Fae Academy. You must know it's reputation by now, so why have you chosen it?\"\n\t\t*set social +5\n\t\t*goto A\n\n*Label A\n\nYou wrack your head around why you decided to join this school. What brought you to study at the Fae Academy? Fate? Lust? Wonder? Boredom?\n*choice\n\t#You think back on all of the stories you'd heard about the Fae Academy, the fabled magic that your parents had talked about all those years ago when you were just a little kid.\n\t\t(gained Intelligence)\n\t\t*set intelligence +5\n\t\t*goto B\n\n\t#You don't really know why. You simply felt something pulling you toward this choice, almost as if there was something hidden deep within your heart tugging you to this unknown place, in the hopes that something will be fulfilled there.\n\t\t(gained Void)\n\t\t*set void +5\n\t\t*goto B\n\n\t#You remember that your older brother had always said that the Fae Academy is home to the highest proportion of females to males. You grin to yourself at the thought of being surrounded by more women than men. You've always enjoyed the company of women more than men.\n\t\t(gained Social)\n\t\t*set social +5\n\t\t*goto B\n\n*Label B\n\nYou shrug and reply, \"No reason really. What about you Estelle?\" You grin. \"You better have a good answer read-\"\n\nBefore you can finish your sentence, a foreign voice rings in your mind. Your vision becomes cloudy and you feel like you are falling. You shudder as you hit solid ground. You find yourself in a dark room, dimly lit by a couple of candles floating in the air. \n\nThe candles give off a purple light, and a lavender scent fills the air. Your mind starts to become foggy as you focus on the floating candles. You quickly snap your focus away from the candles.\n\nYou see a small black orb on the ground which is sat in the middle of a diagram that looks like a pentagram. A large amount of magical energy is exuded by the object. Your chest tightens. The closer you get to the orb the greater this electrical sensation becomes. \n\n[i]This has to be pure arcana, it's so electric.[/i]\n\n\"Get up,\" a rough male voice calls out from your mind. \n\n*page_break\n\nYour body moves without your consent, and you get up from the chair you were sitting on. You lose all feeling in your limbs, and instead it seems like there are strings wrapped around them from above, controlling your every move.\n\n\"What the hell?\" you scream out. A purple glow of light flashes out from you. Your heart thumps in your chest. You move your hands and sigh in relief, you are in control again.\n\nYou look around, trying to find a way to escape the room. Yet you find there are no doors and no walls to be found. Only darkness looms in the far corners out of reach from the candles. \"What do you want from me?\" you shout. \n\nYou take in a deep breath as you try to compose yourself, yet moments later find yourself biting your fingernails. \n\n\"Touch the artifact,\" the male voice commands. \n\n*choice\n\n\t#You obey the command of the voice and touch the orb.\n\t\t(gained Intelligence)\n\n\t\t[i]I have no other choice, damn it.[/i]\n\t\t\n\t\tThe orb is cold to the touch, and your hand fits neatly on top of it. The object starts to pulse, it's colour changing every other second, from bright blue to dark green. The room is illuminated as the orb's light becomes brighter.\n\n\t\tThe room is finally revealed. You can see that there are indeed four walls around you. The walls are decorated with antique paintings and portraits. A shield is hung to the far right of the room, with the insignia of the Fae Academy printed onto it; a small winged human-like creature in the colour purple.\n\n\t\tA tall man, almost two meters in height, appears in front of you out of thin air. He claps his hands. \n\t\t\n\t\tYou scream and fall onto your ass.\n\t\t\n\t\t\"Well done, you passed the test with flying colours,\" he says. \n\t\t*set intelligence +10\n\t\t*goto C\n\n\t#You stand still and do nothing.\n\t\t(lost Health)\n\n\t\t\"Touch the artifact,\" the male voice repeats. This time, the voice is louder and more forceful. You look to the orb, yet hesitate.\n\n\t\t\"Stop wasting my time,\" the voice shouts. You clutch your head as a wave of pain is unleashed within. It feels as if a t
