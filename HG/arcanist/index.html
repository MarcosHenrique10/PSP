 law?\"\n\nYour mouth opens quickly by instinct to respond, but no words come out. Instead you are frozen on the spot.\n\n\"What? Are you getting shy on me now?\"\n\n*choice\n\t#Ignore the girl\n\t\tYou sigh. You close your eyes and take in a deep breath to compose yourself. You then turn your focus to the papers in front of you whilst Ploy continues to observe you.\n\t\t*goto runemaker2\n\t\t\n\t#Taunt her\n\t\t\"No, I was just lost for words,\" you reply. You grin. \"You know, I'm going to make sure that the first rune I engrave is on you. Right here.\" You point to your ass.\n\t\t\n\t\t[i]That'll shut her up won't it, hehe.[/i]\n\t\t\n\t\tPloy giggles. \"Oh really? Then you'll be the only person I'll ever let see it.\" She winks. \"Whenever you want to see it.\"\n\t\t\n\t\tYour mouth widens again. [i]I can't win against her.[/i]\n\t\t*goto runemaker2\n\t#Flirt with her\n\t\t\"Not shy, just speechless,\" you say. You grasp onto your chest. \"My heart is beating so fast because of what you said.\"\n\t\t\n\t\tPloy gets up and edges closer to you. Moments later she is stood right above you. You can smell the sweet, flowery perfume that she is wearing. The scent is intoxicating, threatening to pull you into her grasp.\n\t\t\n\t\tThe girl giggles. \"Close your eyes, and don't move an inch.\"\n\t\t\n\t\tYou furrow your brows.\n\t\t\n\t\t\"Just do it!\" Ploy crosses her arms under her chest, causing her boobs to jiggle.\n\t\t\n\t\tYou gulp and then close your eyes. The sweet fragrance moves closer and closer to you. Moments later, you feel a soft sensation on your left check. \n\t\t\n\t\tYou open your eyes just as Ploy's lips move away from your cheek. \n\t\t\n\t\tThe girl gives a coy smile. \"You should get back to studying ${name}. If you don't finish this within 3 days, then you won't be getting my reward.\"\n\t\t\n\t\tYou tilt your head and raise a brow. \"Oh really? And what is this reward you're going to give me?\"\n\t\t\n\t\tPloy puts a finger across her lips and giggles. \"That's a secret.\"\n\t\t\n\t\t*set Ploy+10\n\t\t*goto runemaker2\n\t\n*label runemaker2\n*page_break Next Day\nYou are once again back in the Alchemical Society's third floor, studying as hard as you can.\n*if ploy>5\n\tYou have even more willpower than before as you wonder what sort of reward Ploy will give you. You shake your head and then slap your thigh. \"Less thinking, more working!\"\n\t\nSo far, in the middle of your second day, you've been able to memorize about seventy to eighty percent of the diagrams. \n\nYou put away some papers in front of you and stretch your hands out. You grin. [i]Talking about 3 days as if I can't do something this easy. You better be amazed when I'm done here Oak.[/i]\n\nThe next few hours go by in a flash. You are exhausted and have finally reached your goal. You raise a fist into the air and yell, \"Let's go ${name} you genius.\"\n\nYou immediately get out of the room and look for Oak. You find him in one of the tattooing studios with a client.\n\nOak uses a mechanical contraption that has multiple rapidly moving needles attached to it. You can see ink piercing into the skin of the client each time the needle moves up and down. \n\nOak doesn't so much as look up at you before saying, \"Here to give up? Thought you would have already done that yesterday. Don't worry though, you could probably make a really good potion crafter. It's a lot eas-\"\n\n\"Oh shut the hell up would you,\" you snap. \"Don't go assuming you're better than me! I'm here because I'm done, not because I want to give up.\"\n\nOak's eyes widen. He puts down the tattooing needle and then looks up at you with a huge, beaming grin. \"Ladies and gentleman, we have a new recruit,\" he screams at the top of his lungs.\n\nYou shudder as a half a dozen or so voices respond in return by whistling or clapping. \n\n\"We party tonight,\" a woman calls out.\n\n*page_break\nAfter showing Oak that you successfully memorized everything, you are taken to a pub right try to find Jean.\n\n[i]Not even a description or anything. That Oak, what is wrong with him?[/i]\n\nFinally, after going from door to door asking for Jean, you find her.\n\n*page_break \nJean is in a small room filled with hundreds of empty vials. There are many different plants, herbs and minerals spread out through the room, and sunlight comes in from many open windows. \n\nJean smiles at you. She's rather short and has brunette hair. She has some tattoos which you can see on her arms, but they aren't as numerous as Oak's. \n\n\"I'm sorry about my boyfriend,\" she says. \"I don't know what he's said or done, but I'll extend my apologies in advance.\"\n\nYou laugh.\n\n*fake_choice\n\t#\"He's something else for sure.\"\n\t#\"Wow, aren't you too beautiful for him?\"\n\t#\"You two match up like yin and yang.\"\n\t\t\nJean smirks. \"So, you want to learn about potion crafting, is that right?\"\n\nYou nod. \n\nThe woman claps. She then grabs onto your hands and excitedly says, \"Great, then let me give you a quick overview of what we do here.\"\n\nYour whole being is washed by warmth whenever you hear Jean's sweet voice. \n\n\"Potion crafting is a lot more simple when compared to rune making. Here we mix all sorts of herbs and minerals and then infuse them with mana to create potions.\n\n\"That doesn't sound too hard,\" you respond.\n\nJean grins. \"You're right, it sounds easy, but it isn't. You need to be very precise with every measurement, from the amount of mana you infuse into a potion, all the way to the milligrams of each reagent you use. A single misstep can lead to an unusable potion, a less potent concoction, or in the worst case scenario, and unstable liquid that could cause an explosion.\"\n\nYou scratch your head and smile weakly. \"Uhm… That doesn't sound that easy after all.\"\n\nJean chuckles. She pats you on the shoulder. \"You'll get the hang of it soon enough, don't worry. Unlike runemaking, here practice is all that you need. Practice makes perfect.\"\n\nJean then teaches you some of the absolute basics of potion crafting. She shows you how to properly weigh ingredients using a scale, and how to infused a potion with mana. After this, she gives you enough ingredients and reagents to practice on your own.\n\nYou spend the next few hours practising these techniques. With every attempt you find that you're learning a valuable amount. Once it gets dark you go back home with Ploy.\n\n*page_break Back at Home\nIt is just you and Ploy at home. Demeter is out on a quest for the Adventurer's Guild, whilst Mbali is preoccupied with the Mage's Guild. You are sat on one of the couches in the living room. In front of you is a small coffee table. You have a magical device called a Weigher laying in front of you on the table. Whenever you place any substance on the Weigher, a number jumps out in the air in front of you, depicting how heavy the substance is in milligrams.\n\nYou yawn and stretch your hands out.\n\nPloy is laying on the carpeted floor, supporting her head up with a hand against her chin. She stares at you whilst smiling.\n\nYou notice the girl's gaze hasn't left you for what feels like an eternity. \"What? Is there something on my face?\"\n\nShe shakes her head, still smiling.\n\n\"Don't you have something better to do than watching me? Like, I don't know, some runemaking stuff? Jean told me it's a lot harder than potion crafting so why don't you get to studying a little.\"\n\n\"I just love watching you when you're so focused, that's all,\" she responds.\n\n\"Be serious for a second Ploy,\" you say. You then sigh when you notice your words have no effect on the girl.\n\nPloy rolls her eyes. She shakes her head. \"I'm getting all the training I need whilst at the Alchemical Society. Now is my free time,\" she responds. She pauses and takes a deep breath. \"Am I not allowed to look at a pretty face? Is that against the law?\"\n\nYour mouth opens quickly by instinct to respond, but no words come out. Instead you are frozen on the spot.\n\n\"What? Are you getting shy on me now?\"\n\n*choice\n\t#Ignore the girl\n\t\tYou sigh. You close your eyes and take in a deep breath to compose yourself. You then turn your focus to the papers in front of you whilst Ploy continues to observe you.\n\t\t*goto potioncrafter2\n\t\t\n\t#Taunt her\n\t\t\"No, I was just lost for words,\" you reply. You grin. \"You know, I'm going to make sure that the first rune I engrave is on you. Right here.\" You point to your ass.\n\t\t\n\t\t[i]That'll shut her up won't it, hehe.[/i]\n\t\t\n\t\tPloy giggles. \"Oh really? Then you'll be the only person I'll ever let see it.\" She winks. \"Whenever you want to see it.\"\n\t\t\n\t\tYour mouth widens again. [i]I can't win against her.[/i]\n\t\t*goto potioncrafter2\n\t#Flirt with her\n\t\t\"Not shy, just speechless,\" you say. You grasp onto your chest. \"My heart is beating so fast because of what you said.\"\n\t\t\n\t\tPloy gets up and edges closer to you. Moments later she is stood right above you. You can smell the sweet, flowery perfume that she is wearing. The scent is intoxicating, threatening to pull you into her grasp.\n\t\t\n\t\tThe girl giggles. \"Close your eyes, and don't move an inch.\"\n\t\t\n\t\tYou furrow your brows.\n\t\t\n\t\t\"Just do it!\" Ploy crosses her arms under her chest, causing her boobs to jiggle.\n\t\t\n\t\tYou gulp and then close your eyes. The sweet fragrance moves closer and closer to you. Moments later, you feel a soft sensation on your left check. \n\t\t\n\t\tYou open your eyes just as Ploy's lips move away from your cheek. \n\t\t\n\t\tThe girl gives a coy smile. \"You should get back to studying ${name}. If you can't create a working potion within 3 days, then you won't be getting my reward.\"\n\t\t\n\t\tYou tilt your head and raise a brow. \"Oh really? And what is this reward you're going to give me?\"\n\t\t\n\t\tPloy puts a finger across her lips and giggles. \"That's a secret.\"\n\t\t\n\t\t*set Ploy+10\n\t\t*goto potioncrafter2\n\t\n*label potioncrafter2\n*page_break Day 2\nYou find yourself back on the second floor of the Alchemical Society, studying as hard as you can.\n\n*if ploy>5\n\tYou have even more willpower than before as you wonder what sort of reward Ploy will give you. You shake your head and then slap your thigh. [i]Stop thinking about that and get on with it ${name}.[/i]\n\t\nAs the hours tick by, through Jean's help you're able to control how much mana you push into a potion. Your control isn't yet perfected to be able to create a working potion, but you sense that you're getting very close to it.\n\nYou spend equal amounts of time practising the use of the Weigher and controlling your mana output.\n\n*page_break\nJean walks into the room and hovers behind you. She watches you as you use the Weigher. You lock eyes with her for a moment before focusing back on your task. You grab a vial of liquid and push mana into it, controlling the mana output as best as you can. \n\n\"Hmm, I think you're ready for the next step,\" Jean says.\n\nYour ears perk up. \"Really?\"\n\nJean nods. \"Wait here just a moment please,\" she says. The woman leaves the room. After a couple of minutes she returns, holding a huge book in her hands. \n\nYour eyes widen. \"Uhm… What is that monstrosity?\"\n\nJean chuckles and then hands you the book. You almost fall to the ground under the sheer weight of the item. \n\n\"This book has all of the current known recipes for potion crafting written down in it,\" Jean says. \"At least all the ones we know here in Val Sola, you might find more recipes in different places. I want you to try your best to memorize all of the recipes.\"\n\nYou gulp hard. \"A-All of them? There must be hundreds of recipes in here. That's impossible.\"\n\n\"225 recipes if I'm not mistaken,\" Jean responds. \"I'm not giving you a time limit or anything, but it'd be best if you tried memorizing them all. Trust me, you'll find advancing through potion crafting will become easier with this as your foundational knowledge.\"\n\n\"…\"\n\nJean smiles. \"Well then, I'll leave you to it ${name}.\"\n\n*fake_choice\n\t#\"This isn't fair.\"\n\t#\"Hey, wait up Jean.\"\n\t#\"I can't do this!\"\n\t\t\nBefore you even get to speak, she has left the room and is out of earshot.\n\n[i]So fast for somebody so tiny.[/i]\n\nYou spend the next hours reading and memorizing all of the recipes in the book. Each recipe has a description of the potion that will be created, what happens if it is brewed incorrectly, and the precise reagents and amount of mana required to successfully make it. \n\nOnce darkness descends onto the lab you're in, you decide to take the book back home with you. Ploy is already waiting in the living room when you get back.\n\n\n*choice\n\t*selectable_if (ploy \u003c=5 ) #Don't join the party\n\t\t*goto potioncrafter3\n\t*selectable_if (ploy>5) #Join the party (Sex Choice)\n\t\tShe grins as you enter the room. The girl is holding a bottle of red wine in both hands. \"Surprise,\" she shouts.\n\n\t\tYou furrow your brows. \"Ploy, where did you get that from?\"\n\n\t\tShe rubs a finger across her lips in a circular motion. \"Doesn't matter. Didn't I tell you I'd give you a reward? Well, her it is, hehe.\"\n\n\t\tYou tilt your head. \"What? But I haven't even made a potion yet.\"\n\n\t\t\"Doesn't matter,\" Ploy retorts. \"You're seriously so dense sometimes, aren't you.\" She giggles. \"Now drink up, I want to give you my reward as soon as possible.\"\n\n\t\tYou blink multiple times. \"I though the wine was the reward.\"\n\n\t\tThe girl huffs. \"The reward is what I'm going to do to you after we're done drinking you dummy.\" She beckons you to come to her with her hand. \"Let's drink.\"\n\n\t\t*fake_choice\n\t\t\t#\"You're dangerous.\"\n\t\t\t#\"Anything for you.\"\n\t\t\t#\"You go first.\"\n\t\tPloy chuckles and then opens one of the bottles. She takes a huge swig from it. She puts the bottle on the coffee table, stands up, walks over to you and pushes you onto the sofa. She hands you the bottle of wine whilst staring deep into your eyes. \"Drink with me.\"\n\n\t\tYou take a quick whiff of the liquid before pouring it down your throat. The wine is strong but sweet. You can taste notes of cherry and strawberry along with a slight hint of vanilla that lingers on.\n\n\t\t\"Now, I have a nice little game I think we should play,\" Ploy says. \n\n\t\t\"What game?\"\n\n\t\tShe edges closer to you and whispers into your ear. \n\n\t\tYour face flushes red the moment the words leave her mouth. You slowly nod.\n\t\n\t\t*page_break\n\t\tPloy helps you get to the bedroom. You stumble about whilst laughing.\n\n\t\t\"Are you ready?\" Ploy asks. \n\n\t\t\"I was born ready,\" you respond. You hiccup. \"Ready for what though?\"\n\n\t\t\"Your reward, silly.\"\n\n\t\tAll of the alcohol leaves your body almost immediately after hearing what Ploy said. You push your mana through your body to expel as much of the alcohol from your bloodstream as you can. \n\n\t\t\"I've been dreaming about this reward,\" you say. \n\n\t\tPloy giggles. She twirls around in the red dress she's wearing. \"Here's your reward.\"\n\n\t\tThe girl unzips the back of her dress and then lets it drop to the ground. You marvel at her sexy physique. Her breasts are large, her waist slim and her hips wide. You stare at her nipples.\n\n\t\tPloy slowly moves closer to you. \"Here you go\" she says, after which she presses her breasts into your face. You immediately start sucking on her nipples.\n\n\t\tPloy groans and mutters, \"I want you.\"\n\n\t\tYou look up at her, put a hand across her chin, pull her closer to you, and then kiss her.\n\n\t\tYour body isn't under your own control, instead a primal instinct takes over. The sweet sounds of Ploy moaning and groaning is like a spell compelling you to advance further and further into her.\n\n\t\t*page_break The Next Morning\n\t\tSunlight flows into your room. You rub your eyes and then yawn. You open them and look to your side. Ploy is laying half covered by your blanket, whilst the rest of her naked body is exposed.\n\n\t\tYou think back to everything that happened last night. Blood rushes to your face and you smile in a daze. You watch the sleeping Ploy and chuckle. \n\n\t\t[i]That girl is something else. Insatiable, that's what she is.[/i]\n\n\t\t*fake_choice\n\t\t\t#Freshen up\n\t\t\t#Make food\n\t\t\t#Wake up Ploy\n\t\t\t\n\t\t[i]What am I doing?[/i] You decide that taking a nap is the best thing to do right now. You were awake almost the whole night and could use some more rest. Minutes go by but your thoughts are filled to the brim with the sounds and images from the last night.\n\n\t\tYou get out of bed and freshen up, after which you go down tot he kitchen and make some scrambled eggs. You bring the food to your room and wake up Ploy. The girl groans as you try to shake her away.\n\n\t\t\"5 more minutes,\" she says.\n\n\t\t\"In 5 minutes I'll have eaten all of the food I made for you.\"\n\n\t\tThe girl scowls. She opens her eyes and stares at you. She raises a brow as she looks at your half naked body. \"How did you like that special move of mine?\"\n\n\t\t\"Which one? They were all special… You're so nasty Ploy, I love it.\"\n\n\t\t\"Oh, this one, hehe.\" She makes some movements with her hands and then opens her mouth, after which she brings her hands closer to her mouth. \n\n\t\tYou grin. \"Oh, that was my favourite one for sure.\"\n\n\t\tPloy grabs a hair bubble and ties her hair up into a topknot. \"Is that so… Come here, I want to give you some more thanks for last night.\"\n\n\t\tYou quickly put the plate to the side. \"You're a freak Plo…Unghh, yes!\"\n\n\t\t*goto potioncrafter3\n\n*label potioncrafter3\nYou are once again on the second floor of the Alchemical Society. You've spent the past few days memorizing all of the information in the thick book given to you by Jean. Finally, on your fifth day since joining the society, you're ready to start brewing some potions.\n\nJean hands you about a dozen beakers, along with enough reagents to be able to play around and tamper with.\n\nYou make some easy potions to start of, like the stomach cleansing potion, which is mainly given to children suffering from indigestion. Another potion you make is the tiger balm potion, which is used to clear blocked noses and help with colds. \n\nOnce you gain some more confidence in your abilities, you decide to create a…\n\n*choice\n\t#Low Healing Potion\n\t\tA low level healing potion is one of the most common potions found all over Michiwitt. This is because it's the cheapest healing potion available. It can help mend minor injuries sustained in combat. Almost all groups of adventurer's and soldiers carry these with them.\n\t\t\n\t\t*goto potionfin\n\t\n\t#Low Stamina Potion\n\t\tA low level stamina potion is one of the three most common potions available all around Michiwitt. This is mainly used by adventurer's and soldiers to combat the fatigue of battle. A simple potion like this can revitalize and rejuvenate the strength of an individual, giving them a second wind whilst in the middle of a battle of life and death.\n\t\t*goto potionfin\n\t\t\n\t#Low Mana Potion\n\t\tA low level mana potion is the most common potion of use for mages all over the continent of Michiwitt. When a magician's stores of mana inevitable runs dry, this potion comes in handy. This is especially so when in a fight for life and death.\n\t\t\n\t\t*goto potionfin\n\t\t\n*label potionfin\nYou quickly recall the recipe from memory and then start brewing. You add the ingredients into a vial which is being heated from below by a small fire. Once the mixture is bubbling you press your hands onto the scorching vial. You grimace but hold onto the vial whilst pushing your mana into it. \n\nYou keep this up for a couple of minutes until the vial starts to glow. You remove your hand and ball it up into a fist before raising it into the air. \n\n\"Bravo,\" Jean calls from behind you.\n\nYou scream and fall onto your ass. \"What the hell Jean?\"\n\nThe woman chuckles. She claps and says, \"You're now officially a potion crafter. Come back whenever you want to take on some assignments, there's a lot of them available.\"\n\nYou grin. \"Oh, I'll be back soon don't you worry.\"\n\n*goto_scene templars2\n", "chapter1": "*page_break\nTwo months have passed since your first mission alongside Demeter, Bami and Mbali. The city of Val Sola has quickly become your home. You know the place like the back of your hand already, at least a small area of it. There are still many places left to be explored as it is huge.\n\nThe bustling atmosphere is infectious, and you wake up everyday filled with a will and energy for living. There is now enjoyment in your routines. \n\nIn the months you've been here, you were accompanied by your…\n\n*choice\n\t*selectable_if (illusion>5) #Spirit of Illusion\n\t\t(gained Social) (gained Create Illusion)\n\t\t\n\t\tYour spirit has given you the powers to wield magic from the illusion field. Your mastery over the spirit has improved with time, however you still feel like you haven't been able to tap into it's full potential yet. \n\t\t\n\t\tSo far, you've been able to make use of your spirit to cast the Create Illusion, a spell that forms illusions to fool opponents into believing the fake image you create is there.\n\t\t\n\t\tHowever, it seems that for those trained with arcana are only slightly influenced by this spirit. You find that a side effect of having a spirit of illusion housed within yourself is that your relationship with other people has improved.\n\t\t\n\n\t\t*set social +5\n\t\t*set bami +5\n\t\t*set demeter +5\n\t\t*set mbali +5\n\t\t*set spirit_illusion \"true\"\n\t\t*set create_illusion \"true\"\n\t\t*goto friends\n\t\t\n\t*selectable_if (pyromancy>5) #Spirit of Flames\n\t\t(gained Dexterity) (gained Lesser Fireball)\n\t\t\n\t\tYour spirit has given you the powers to wield magic from the pyromancy field. You've always enjoyed the carnage and chaos that flames can create. Not only that, but you feel that flames will always have a practical application in life, no matter what situation you find yourself in.\n\t\t\n\t\tSo far, you've been able to make use of your spirit to cast the spell Lesser Fireball. It's power isn't too great, however you're able to cast multiple small fireballs of them at once, enough to barrage a lesser opponent into oblivion. \n\t\t\n\t\tYou have had to spend many sleepless nights due to the damage incurred onto your body for failing the casting process of this very spell. As such, you've found out the hard way that pyromancy is the most dangerous discipline of arcana. Of course, it is too late for you to fully focus on another school of magic as you possess a spirit of flames. \n\t\t\n\t\tA positive boon of this damage you've incurred over the months is that you're much quicker to dispel your magic when you realize there is about to be a self-destruction.\n\t\t\n\n\t\t*set dexterity +10\n\t\t*set spirit_flames \"true\"\n\t\t*set lesser_fireball \"true\"\n\t\t*goto friends\n\t\t\n\t*selectable_if (hydrosophy>5) #Spirit of Water\n\t\t(gained Intelligence) (gained Piercing Water)\n\t\t\n\t\tYour spirit has given you the powers to wield magic from the field of hydrosophy. You've always enjoyed the domain of water and the creatures hidden in the depths of the oceans. Of course, you also believe that being able to conjure water will be useful in your journeys. If you ever find yourself stranded in a desert, you know that you'll not die of thirst.\n\t\t\n\t\tSo far, you've been able to make use of your spirit to cast Piercing Water, an ability that isn't hindered by armour. The effects of this spell are relatively good, however you find that your reserves of mana run out rather quickly when you use it.\n\t\t\n\t\tAnother effect you've noticed is that your mind is more tranquil than before. You're able to think calmly in most situations, and even under a barrage of opposing spells you never lose concentration on your casting process.\n\t\t\n\n\t\t*set intelligence +10\n\t\t*set spirit_water \"true\"\n\t\t*set piercing_water \"true\"\n\t\t*goto friends\n\t\t\n\t*selectable_if (summoning>5) #Spirit of Summoning\n\t\t(gained Strength) (gained Cerberus)\n\t\t\n\t\tYour spirit has given you the power to summon a mighty Cerberus into battle. You've always loved the idea of having dozens of different creatures to summon hidden in your arsenal. In your mind, the perfect situation is for you to possess a summon for each element so that you can overcome any challenge. Also, you like the idea of taking care of these creatures, be they elementals or cute fairies.\n\t\t\n\t\tOf course, your Cerberus is still just a pup that hasn't reached anywhere near it's full potential. You spend much time with your pet, tending to it and play fighting with it whenever you have the time. As a result you've grown physically stronger.\n\t\t\n\t\tYou still have a long way to go to master your control over the Cerberus, as your bond is not as strong as you'd like it to be. The creature doesn't listen to all of your commands as of now.\n\t\t\n\n\t\t*set strength +10\n\t\t*set spirit_summoning \"true\"\n\t\t*set cerberus \"true\"\n\t\t*goto friends\n\t\t\n\t*selectable_if (theurgy>5) #Spirit of Nature\n\t\t(gained Observation) (gained Thorns)\n\t\t\n\t\tYour spirit has given you the powers to wield magic from the field of theurgy. You've always had an affinity with nature, and as such you feel a strong connection to your spirit. You have started keeping potted plants in your bedroom and are able to draw power from them. You watch them grow every day and note down the most effective methods to aid in their life cycles.\n\t\t\n\t\tSo far, you're able to make use of your spirit to cast the spell Thorns, which creates a large moving vine covered in thorns that is able to immobilize foes. This has proven useful in hunting groups of smaller magical creatures at once. The toll on your mana isn't too great, however the overall strength of the spell isn't either.\n\t\t\n\t\tAnother effect you've noticed is that your mind is able to process information relating to your surroundings much more clearly than before. It's almost as if you can sense your surroundings through a new third eye.\n\t\t\n\n\t\t*set observation +10\n\t\t*set spirit_nature \"true\"\n\t\t*set thorns \"true\"\n\t\t*goto friends\n\t\t\n\n\n*label friends\n\nYour life in your new home with Demeter and Mbali has been anything but boring since you arrived. The house is constantly in disorder because of Demeter, who wishes for nothing more than to spice up his life, no matter how stupid his ideas are. On the other hand, Mbali has a much calmer demeanour and brings a grounding force to the home.\n\nYou've spent most of your time…\n*set met_demeter \"true\"\n*set met_mbali \"true\"\n*choice\n\t\n\t#Destroying all order with the  Devil of Destruction, Demeter\n\t\t\n\t\tYou've spent the vast majority of your time with the dark elf, Demeter. He's a character, a very unique character, however despite this you love how much energy he brings every day. He doesn't like to talk about his past, and you can sense that there are many secrets hidden behind his boisterous behaviour and attitude.\n\t\t\n\t\tThe dark elf has helped you at every step of the way, and has become your closest friend. Despite causing mayhem, if you need help he is the first to lend a hand.\n\t\t*set demeter +10\n\t\t*goto places\t\n\t\t\n\t#Mingling with the quiet and mysterious Mbali\n\t\tYou've spent most of your time with Mbali. The short, white haired girl has brought a much needed calmness to your life. The chaos that comes with everything you've experienced in such a short amount of time has had a toll on you both physically and mentally. However, with her help, you've settled in to your new life with ease.\n\t\t\n\t\tYou speak to her whenever you need an emotional hand, and she brings a nice calming air with her every step of the way. You know that you can trust her with whatever you need, but so far she still has not opened up about herself or her past.\n\t\t\n\t\t*set mbali +10\n\t\t*goto places\n\t\n\t#Bothering Bami\n\t\tYou've spent most of the past two months following Bami at every chance that you can get. She was annoyed by you at first but has slowly started to warm with you, at least that's what you think. You can sense that she has a tough exterior but an extremely soft interior, and you greatly enjoy being in her company. You feel safe whilst around her, even though she does send a stray punch at you here and there.\n\t\t\n\t\tAs you've gotten to find out more about her, you've come to know that she's only four years older than you, much younger than you'd initially thought she'd be.\n\t\t*set bami+10\n\t\t*goto places\n\t\n\t#By yourself\n\t\t(gained Void) (gained Dexterity) (gained Strength)\n\t\t\n\t\tInstead of socializing with the others in your new home, you've taken a more reclusive approach and put in a lot of time to improving your own body. You believe that right now it is most important for you to have a body that is capable of the strains of magic. As such, you've gained a couple of kilograms of muscle, and you've noticed that your cardio is much greater than before.\n\t\t*set void +10\n\t\t*set dexterity +5\n\t\t*set strength +5\n\t\t*goto places\n\n\n*label places\n\nBesides spending time at home, you have also frequented the…\n\n*choice\n\t#Library\n\t\t(gained Magic)\n\t\t\n\t\tYou spend many sleepless nights at the library, researching everything to do with the world of magic. You find books that give you information on the different races of sentient peoples in the world, along with the different types of magical creatures and where to find them. You try to find out more about the Wheel of Life and the Voidwoken, however there don't seem to be too many of them available. Instead you've found this information comes much easier when you simply ask others about it.\n\t\t\n\t\t*if (spirit_illusion=true) \n\t\t\t*set illusion +5\n\t\t\t\n\t\t*if (spirit_flames=true)\n\t\t\t*set pyromancy +5\n\t\t\t\n\t\t*if (spirit_summoning=true)\n\t\t\t*set summoning +5\n\t\t\t\n\t\t*if (spirit_water=true)\n\t\t\t*set hydrosophy +5\n\t\t\t\n\t\t*if (spirit_nature=true)\n\t\t\t*set theurgy +5\n\t\t\t\n\t\t*goto memories\n\t\t\n\t\t\n\t#Training Grounds\n\t\t(gained Strength)\n\t\t\n\t\tYou spend a lot of time frequenting the training grounds. You observe the fighting that takes place, a mixture of magical displays to one side and swordsmanship on the other end of the grounds. In the middle of the training ground is an area for sparring where the use of both magic and non-magical techniques are allowed.\n\t\t\n\t\tYou take your time to learn more from those that are training there, and mainly take part in the non-magical training as this seems to be an area you are lacking in. You spar a little but mainly stick to tempering your body by the area where you can life heavy weights.\n\t\t\n\t\t*set strength +5\n\t\t*goto memories\n\t\t\n\t#Temples\n\t\t(gained Intelligence)\n\t\t\n\t\tYou spend many hours in the various temples in Val Sola, exploring your own existence under the guidance of the many monks and priests. You find that you rather enjoy this, as you are able to spend time away from the hustle and bustle of the city.You do enjoy the quiet. \n\t\t\n\t\tYou tap into your inner self and your mind clears the more often you meditate at the temples.\n\t\t\n\t\t*set intelligence +5\n\t\t*goto memories\n\t\t\n\t#Taverns\n\t\t(gained Social)\n\t\t\n\t\tYou frequent the many taverns in the city, drinking and enjoying your time here. You believe there is no reason to be alive if you cannot enjoy the simplest things, such as the company of others. As a result you've found yourself becoming better at interacting with others.\n\t\t\n\t\t*set social +5\n\t\t*goto memories\n\t\t\n\t#Merchant Shops\n\t\t(gained Observation)\n\t\t\n\t\tYou go around the city and the various merchant shops, looking for items that could help you with your studies. You currently don't have the funds to buy any of the items you want, however you make mental notes of what you may want to purchase in the future. After seeing all of the different wares the city has to offer, you start to notice what items hold more value.\n\t\t\n\t\t*set observation +5\n\t\t*goto memories\n\t\n\t#Running Field\n\t\t(gained Dexterity)\n\t\t\n\t\tYou spend a lot of time at the running field, making sure to improve your cardio at any chance possible. You've come to realize that even though magic is a powerful force, there is no way that you will survive this harsh world if your body can't complete the most basic of necessities. \n\t\t*set dexterity +5\n\t\t*goto memories\n\t\t\n\n\n*label memories\n*page_break Wake Up\n\nYou yawn as you wake from your slumber. Sunlight beams into your room through the window. You rub your eyes and then get off your bed. You take a look outside.\n\nA lush green garden comes into view. You spot Mbali watering some of the plants. She's wearing a tight yellow dress that has a pink floral pattern running down to her thighs.\n\n*choice\n\t\n\t#Comment on her dress\n\t\t(Mbali approves)\n\t\n\t\t\"Mbali,\" you shout.\n\n\t\tThe girl stops what she is doing and then turns to look up at you. \"Good morning ${name},\" she responds.  \n\t\t\n\t\tYou marvel at the girl's physique. Slender yet she has wide hips and large breasts to die for.\n\n\t\t\"You're looking gorgeous in that,\" you say.\n\n\t\tMbali smiles. \"Why thank you,\" she says before returning to watering he plants. \n\n\t\t[i]Tough crowd with her as usual. Can't find an opening whatsoever.[/i]\n\n\t\t*set mbali +5\n\n\t\t*goto begin1\n\t\n\t#Make a joke\n\t\t\"Hey, Mbali,\" you shout. \n\n\t\tThe girl turns to look at you. \n\n\t\t\"Have you ever heard of an up dog?\"\n\n\t\tThe girl stares at you with her brows furrowed. \"A what?\"\n\n\t\t\"An updog.\"\n\n\t\t\"What's that?\" she responds. \n\n\t\t\"Have you never heard of it?\"\n\t\t\n\t\t\"An updog?\"\n\n\t\tYou groan. \"Nevermind, don't worry about it,\" you say before turning away.\n\n\t\t*goto begin1\n\t\n\t#\"Good morning, Mbali.\"\n\t\t\"Good morning to you too ${name},\" she responds. \"Had any breakfast yet?\"\n\n\t\tYou shake your head. \"Not yet, just woke up.\"\n\n\t\tThe girl smiles. \"Head down when you're ready, I'll make us something to eat.\"\n\n\t\tYou rub your stomach. \"Thank you.\"\n\n\t\t*goto begin1\n\t\n\t\n*label begin1\n\n*page_break\n\nYou walk through your bedroom toward your bathroom. You get in the shower, toothbrush in hand. It doesn't take long for you to freshen up.\n\nYou look through your wardrobe and then decide to wear a…\n\n*fake_choice\n\t#White T-shirt and Black Shorts\n\t\tYou put on a baggy white shirt and some black shorts.\n\t#Green chequered shirt and black trousers\n\t\tYou put on a green chequered shirt and some loose black trousers.\n\t#Mage's robe\n\t\tYou grab your trusty ${haircolour} robe which matches your hair colour.\n\t\t\n\t*if (gender=\"female\")\t#Black dress\n\t\tYou put on a tight black dress that accentuates your curves.\n\t\t\n\t*if (gender=\"female\")\t#Red one piece\n\t\tYou put on a red one piece that accentuates your curves.\n\t\t\n\n*if (gender=\"male\")\n\tYou look at yourself in the mirror and grin at yourself. \"You look dashing young man.\" You flex your biceps before making your way downstairs.\n\t\n*if (gender=\"female\")\n\tYou look at yourself in the mirror and gently move your hips from side to side. \"Looking gorgeous as always you fine lady.\" You blow a kiss to yourself before making your way downstairs.\n\nAfter moving down one floor you spot Demeter's open bedroom door.\n\n\"Nine hundred and twelve, nine hundred and thirteen,\" he says as he does push-ups. \n\n\"Good morning Demeter,\" you say. \n\nThe dark elf  looks up at you and nods before returning to his exercise. You already know that he won't respond properly to anything in the morning if he hasn't finished his workout. It seems to be the only time where he isn't bothering somebody else.\n\n*page_break \n\nOnce you reach the bottom floor you walk over to the kitchen. You bump into Mbali who is putting an apron around her waist. \n\n\"I have a question Mbali,\" you say. \"Why did you take the bottom floor? It has the smallest amount of private space for yourself. Mine and Demeter's floors could very well have been yours and you know it.\"\n\nMbali grins. \"Well you have your answer there, I like having things more communal. The more people around me, the merrier. It was always like that back home.\" She grabs a frying pan.\n\n\"Back home?\"\n\nMbali pauses. She puts the frying pan onto the stove. \"Yes… Mind giving me a hand ${name}?\"\n\n\n*choice \n\t\n\t#Help set up the table\n\t\t\"Of course I'll give you a hand,\" you say. \n\n\t\tYou swiftly arrange the dining table, placing all utensils and needed items on it. After you're finished, you look down at the table with a smile. \n\n\t\tThere are three porcelain plates, each with a golden fork to one side and a knife to the other.  You pour some water into each glass.\n\n\t\t*goto breakfast\n\t\n\t#Help chop some ingredients\n\t\t\"Here let me get to chopping,\" you say.\n\t\t\n\t\tYou walk over to the counter and remove a chopping board. You grab a sharp knife and then assemble the vegetables you will be using. You grab a few onions, along with some chives and a spring onion. \n\t\t\n\t\tYou masterfully chop everything into small pieces.\n\t\t\n\t\t*goto breakfast\n\t\n\t#Help cook the food\n\t\t\"Let me do that,\" you say. You walk over to the frying pan. \"Could you chop me some onions and a couple spring onions too,\" you tell Mbali.\n\t\t\n\t\tYou crack and egg into a bowl and start whisking away, after which you add some salt and pepper, along with the vegetables Mbali chopped. \n\t\t\n\t\t*goto breakfast\n\t\n\t\n*label breakfast\n*page_break\n\nYou grab a seat on the dining table and look at the fruits of your collective labours. You grab a fork and dig into a delicious omelette. You then take a swig of the icy cold water in the glass in front of you. \n\n\"This is just amazing,\" you say. \"Life is worth living like this.\"\n\nDemeter laughs. \"You shouldn't go saying things like that.\"\n\n\"Why not?\" Mbali retorts. She frowns. \"${name} isn't wrong at all, this is exactly why life is worth living. Surrounded by friends and family and just enjoying each other's company.\"\n\nDemeter tilts his head back and groans. \"That's not what I meant. The act of saying that totally jinxed this quiet peaceful life of ours. The wheel has heard ${name}'s words and will throw something at us now. And anyway, none of us have a family to go back to anyway.\"\n\nYou shudder at the end of Demeter's sentence. You sigh knowingly. Going back home to your families would only put them in danger of the Templars. \"Demeter is right. I guess we are all the family we have right now.\"\n\nThe mood is completely ruined by that single sentence. You all eat in silence.\n\n*page_break\n\nYou walk out into the garden after finishing your breakfast. You stare at the clear blue sky. \n\n[i]What should I do for today?[/i]\n\n*choice\n\t#Go to the Adventurer's Guild\n\t\t(Demeter approves)\n\t\t\n\t\tYou nod your head as the answer comes to you. Of course, you have to head to the Adventurer's Guild. You have yet to step foot in there since getting here.\n\t\t\n\t\tYou rush to the living room where both Mbali and Demeter are sitting on a sofa. \"Guys, I'm gonna go to the Adventurer's Guild. Either of you wanna join?\"\n\t\t\n\t\tDemeter jumps up and runs to you. He grabs your hands. \"Seriously? Finally, I've been waiting for you to say those exact words since you got here.\"\n\t\t\n\t\tYou stumble back a couple of steps and stare at the excited face of the dark elf. \"Uh, why didn't you say anything then?\"\n\t\t\n\t\t\"Isn't it obvious?\" Demeter responds. \"I didn't want you blaming me for anything once we take on some quests from the guild.\"\n\t\t\n\t\t\"Touché.\" \n\t\t\n\t\tMbali stays seated on the couch and responds, \"Not my cup of tea that place there. You two have fun though.\"\n\t\t*set demeter +5\n\t\t*goto_scene adventurers1\n\t\t\n\t#Go to the Mage's Guild\n\t\t(Mbali approves)\n\t\t\n\t\tYou nod your head as the answer comes to you. Of course, you have to head to the Mage's Guild. You've been in Val Sola for two months already yet haven't stepped foot in the guild yet.\n\t\t\n\t\tYou rush to the living room where both Mbali and Demeter are sitting on a sofa. \"Guys, I'm gonna go to the Mage's Guild. Either of you wanna join?\"\n\t\t\n\t\tMbali stands up. \"I've got some stuff to take care of at the guild. I'll go with you.\"\n\t\t\n\t\tDemeter stays slumped on the couch and shakes his head. \"Not me, that place gives me the creeps.\"\n\t\t*set mbali +5\n\t\t*goto_scene mages1\n\t\t\n\t\t\n\t\t\n\t#Go to the Training Ground\n\t\tYou nod your head as the answer comes to you. Of course, you have to head to the Training Ground. Every time you've been there has been a treat to your eyes. Observing how others train and getting into the thick of it is right up your alley. \n\t\t\n\t\tYou rush to the living room where both Mbali and Demeter are sitting on a sofa. \"Guys, I'm gonna go to the Training Ground. Either of you wanna join?\"\n\t\t\n\t\tBoth of your housemates shake their heads. \n\t\t\n\t\tDemeter scowls.\t\t \"Just a bunch of meat heads there, not of much use for me.\" \n\t\t\n\t\tMbali frowns and slaps the dark elf on the forehead. \"Can you ever be nice Demeter? Seriously.\" She turns to you. \"Sorry, it's not really my cup of tea.\"\n\t\t\n\t\tYou sigh. \"Fine, I'll go have fun for all of us instead then.\"\n\t\t\n\t\t*goto_scene training1", "chapter2": "*temp demetersex\"\"\n\n\n\n\n*page_break\nYou wake up to the sound of three arguing voices coming from downstairs. \n\nYou groan. \n\n*fake_choice\n\t#What a great way to start the day\n\t#Oh no, what's going on now?\n\t#At least I'm alive today... Think of the bright side\n\n\"What do you mean we have to go to the tournament?\" Demeter shouts. \"This is the stupidest thing I've ever heard.\"\n\nYou groan. [i]What's the problem now?[/i]\n\nYou make your way downstairs and find Mbali, Demeter and Bami in the living room. \n\nDemeter is leaning against the far wall whilst Mbali and Demeter are sat by the sofas.  He glares at Bami whilst taking in deep breaths.\n\nBami wears skin tight red dress and has on some red high heels. She seems rather pissed off and is constantly tapping a finger against her forearm.\n\n*fake_choice\n\t#\"What's going on?\"\n\t\t\"What's going on?\" you ask.\n\t\t\n\t#\"You guys are too loud.\"\n\t\t\"You guys are too loud,\" you say. \"I was just dreaming of being fed grapes by a-\"\n\t\t\n\t#Stand quietly\n\t\t\n\t#\"You look beautiful as always Bami\"\n\t\t(Bami approves)\n\t\t\n\t\t\"You look beautiful as always Bami,\" you say. You look to Demeter. \"Now why are you antagonizing my favourite woman in Val Sola this early in the morning. It's unbecoming of you.\"\n\t\t\n\t\t*set bami +5\n\t\t\n\"You are trying to get us killed Bami,\" Demeter shouts. \"You can't seriously think this is a good idea. I fail to believe it! There's no way in hell you're being this reckless with our lives.\"\n\nBami clears her throat. She takes in a deep breath and then says, \"Unfortunately I don't have any say in this matter. Solas has already made his mind up. And you know what that means.\"\n\n\"What is this about?\" you interject.\n\nBami turns to you. \"There will be a competition in the Khaeng Kingdom. It's a big festival they hold every ten years, gathering the best warriors of their people to fight against each other. Only one group will be crowned as winner of the Tournament of Heart.\"\n\n\"What does that have to do with anything?\" you ask. \n\n\"Be patient, I'm getting there.\" Bami rubs her temples. \"You see, we have received information that there will be a high level artifact as a prize. We need you to infiltrate the Khaeng Kingdom and win this competition. This prize is important. I can't overstate how important it is.\"\n*goto questions\n\n\n*label questions\n*choice\n\t#\"What is the artifact?\"\n\t\t\"We believe it is a high level spirit. What you currently have inside of you is only a basic one,\" Bami says.\n\t\t\n\t\t\"What's the difference between a high level and basic spirit and why is it so important that we retrieve this? And why are you asking us?\" you respond.\n\t\t\n\t\tMbali quickly cuts in, \"The three of us have basic spirits, anybody can create a contract with them. More advanced spirits have much more unique characteristics and are more difficult to create contracts with. Some advanced spirits might even refuse a contract based on your personality. It's really cool actually.\"\n\t\t\n\t\tYou raise a brow. \"What unique characteristics are we speaking of here?\"\n\t\t\n\t\t\"For instance, your spirit is able to give you access to one of the five basic domains of arcana. Pyromancy, theurgy, hydrosophy, summoning and illusion magic are all the most basic ways we can utilize magic. There are more advanced forms of magic, light magic, curses, witchcraft and chaos magic to name a few. These spirits are the easiest way to gain access to them.\"\n\t\t\n\t\t\"That's a lot of information,\" you reply. You clench your fists, your insides welling with excitement. You visualize these new forms of magic that you've never seen before and imagine all of the wonders they could produce. \n\t\t\n\t\t\"Somebody skipped reading books,\" Demeter says and then winks at you.\n\t\t\n\t\t\"Ouch,\" you say and laugh. \n\t\t\n\t\t\"Getting back to the point,\" Bami says. \"It's important because… Honestly I don't know. Solas said some things but I wasn't really listening.\"\n\t\t\n\t\tYou stare at Bami with your mouth agape. \n\t\t\n\t\t\"And the reason we need you specifically is because there is an age limit for those that can compete in the Tournament of Heart. You have to be under 18 years old.\"\n\t\t\n\t\tYou furrow your brows. \"Aren't there lots of other young kids around here?\"\n\t\t\n\t\t\"It's because we all have contracted with spirits,\" says Demeter. \"Spirits, even the basic ones, are rare.\"\n\t\t\n\t\t\"Exactly,\" Bami replies. \"We put our faith in you three because we see your potential. Now, go and prove us right.\"\n\t\t*goto questions\n\t\t\n\t#\"Where is the Khaeng Kingdom?\"\n\t\t\"It's in the southern peninsula of the continent, quite a long way away from here,\" Bami says. \"You'll be teleported just outside their capital city, Nam Khaeng. We have other agents on the field as well, so don't worry about that.\"\n\t\t\n\t\t\"Won't it be difficult for us to you know, blend in?\" you ask. \"We're a group with an elf, a dark elf, and a human. Not exactly inconspicuous.\"\n\t\t\n\t\t\"No problem there, we're way ahead of you. Solas will cast a cloaking spell, you'll all appear to look like the natives of the Khaeng Kingdom.\" \n\t\t*goto questions\n\t\t\n\t#\"What are the rules of the competition?\"\n\t\t\"This is the interesting part,\" Bami says. \"You will be sent to a remote island. There you will need to find the artifact whilst fighting off the other groups of four.\"\n\t\t\n\t\t\"Group of four? But we're only three,\" Mbali points out. \n\t\t\n\t\t\"Yes, you'll met your fourth member when you get to the Khaeng Kingdom. He's already there.\"\n\t\t*goto questions\n\t\n\t#\"Why are you having us go? Why not other, more experienced people?\"\n\t\t\"Why are you having us go? Why not other, more experienced people?\"\n\t\t\n\t\t\"That's a valid question,\" Bami replies. \"The issue here is that there is a strict age limit for entering the competition. You need to be under 18 years old. If this wasn't the case, we'd do just as you suggested, and send more experienced people in.\"\n\t\t\n\t\t*goto questions\n\t\t\n\t\t\n\t#\"How much time do we have?\"\n\t\t\"I need you to leave today,\" Bami says.\n\t\t\n\t\t\"What?\" You rub your eyes. \"Did you just say today?\"\n\t\t\n\t\tBami nods. \"I really am sorry about how short notice this is, but that is the nature of planning these things. We can't let anybody know until the day of execution. Any leak of information could jeopardize the whole operation. And that would mean there's even more danger for you four.\"\n\t\t\n\t\tDemeter slams a fist against the wall. \"That's rea-\"\n\t\t\n\t\t\"I also found out today,\" Bami says. She sighs. \"Listen, Solas is the only person who usually knows about these things. And I trust him with my whole life and know he wouldn't do this unless it was necessary.\"\n\t\t\n\t\t\"Oh.\" Demeter rubs his head and laughs awkwardly.\n\t\t*goto solas\n\t\n\n*label solas\n*page_break Solas' Office\nYou are seated in Solas' office. The elf is sipping on a cup of tea, blowing away the hot steam emanating from it. He puts his cup down and says, \"This is a very important mission. Not just because it's essential that this artifact doesn't fall into the hands of our enemies. No, the most integral part of this mission is that the three of you will grow stronger from it.\" He turns to look at you. \"I can't give you the resources or quality of training that the Nine Great Academies can, however, I can give you the opportunities you need to far surpass any alumni they have. This is one such opportunity, and I need you to seize it.\"\n\nYou gulp as you stare at the elf's stern expression. There is an air of urgency that you can't seem to shake off.\n\nSolas takes a sip of his tea. \"You will meet with Ploy, she's been placed back to her home town of Nam Khaeng for almost a full year now. She'll be your superior during the mission, make sure to listen to her as she's more experienced than you all.\"\n\nDemeter scrunches his nostrils. \"I highly doubt that.\"\n\nSolas shakes his head. He raises his right hand and then makes a fist. \"What did I tell you about that attitude of yours?\" Solas glares at Demeter. \n\nThe dark elf looks back with a blank expression.\n\nSolas groans and runs his hands across his neck. \"Don't forget this chain of command. Ploy is the leader of the group and you will do as she asks.So, more information will follow once you arrive in Nam Khaeng. Best of luck to you all.\"\n\nThe elf claps his hands twice. \"Bami, if you could do the honours.\"\n\n\"Of course,\" she responds. \"This'll be a tough teleportation, get ready.\"\n\nYour stomach starts to churn and your vision fades away. \n\n*page_break To Nam Khaeng\n\nYour head is spinning so fast that it feels like you're inside of a tornado. Your insides are blazing. You try to breath in to calm your body but it doesn't work.\n\nYou throw your head to the side and vomit. \"Ughh.\" You wipe your mouth. You take in a breath and open your eyes.\n\nYou find yourself on the ground of a small wooden shack. \n\n\"Are you all okay?\" a girl asks. Her voice is soft and sweet. \n\nYou squint your eyes and search for the owner of the voice. You soon find a tanned girl who looks to be in her late teens, probably seventeen or eighteen. She has short, curly brown hair that reaches her chin, and a cute, tiny nose.\n\n*fake_choice\n\t#\"I feel terrible.\"\n\t\tSeconds after those words leave your mouth you immediately throw your head to the side again and release a noxious concoction from your stomach.\n\t\t\n\t\t\"Ugh,\" you groan. \n\t\t\n\t\t\"Let me help you,\" the girl says. She helps you onto your feet and brings you to a table. Both Demeter and Mbali are seated around the table, looking like they've had better days.\n\t\t\n\t\tShe hands you a glass of water which you gladly take. You take slow sips. \n\t\t\n\t#\"I've never felt better\"\n\t\t\"Amazing,\" the girl says. \"I'll go tend to your partners first then.\"\n\t\t\n\t\tThe girl walks over to a nearby table and hands a glass of water to Demeter and Mbali, who both look like they'd just seen a ghost.\n\n\"Sorry about this,\" the girl says. \"I know this must have been the furthest teleportation you've been put through.\"\n\nAs you slowly start to feel better and regain your bearings, you notice that the girl has an accent you'd never heard before. She almost completely refuses to use the letter 'R' and instead substitutes it with the letter 'L'. And the way she speaks is almost as if she were singing, the words blending together with the different pitches she makes melodically.\n\n*if (observation>10) \n\t\"You must be Ploy,\" you say. You stretch our your hand. \"Nice to meet you.\"\n\t\n\tThe girl nods and smiles. \"Nice to meet you three, I'm not sure how much you've been told but I'll bring you up to speed.\"\n\t\n*if (observation\u003c10)\n\t\"Who are you?\" you ask. \n\t\n\t\"Oh, my apologies,\" the girl says. She presses her hands together and brings them to her face, with her nose resting in between the space of her thumb and pointer finger. \"My name is Ploy, I'm sure you must have been told a little bit about our mission, but if not I'll bring you up to speed. \n\t\n*page_break\n\nThe girl recounts what you had already been told previously along with some other details. \n\n\"First thing is first,\" Ploy says. \"We need to get you three into your disguises.\"\n\nThe girl walks over to an old, rotting cupboard and brings out three obsidian rings. \n\n\"Stored in each of these are a pre set of I believe five or six appearances that will make you look like a native of Khaeng,\" Ploy says. \"Feel free to take your time when choosing.\"\n\nShe hands you the ring, which you quickly put on. \n\nA blue screen forms in front of you and you can see the different appearances available. You notice that all of the pre sets have two things in common. Curly hair and tanned skin.\n\nYou decide for the appearance of a…\n\n*fake_choice\n\t#Blue eyed male with a skinny frame\n\t\t\n\t#Blue eyed female with a skinny frame\n\t\t\n\t#Brown eyed male with a muscular frame\n\t\t\n\t#Brown eyed female with a muscular frame\n\t\t\n\t#Brown eyed male with a chubby frame\n\t\t\n\t#Blue eyed female with a chubby frame\n\t\t\nAfter making your choice you feel a little dizzy. This goes away after a couple of breaths. You look down at your new body in surprise. Even your clothes have changed, and you're wearing a simple white shirt along with brown slacks.\n\n\"Woah,\" you gasp. \"This is so cool.\"\n\nYou look over to Demeter who has now taken on the appearance of a tall, blue eyed female.\n\n\"Demeter,\" you say.\n\n*fake_choice\n\t#\"You look better like this.\"\n\t\t\"You look better like this,\" you say. \"Maybe don't swap back to your normal self when we're done here.\"\n\t\t\n\t\tMbali giggles. \"I agree.\"\n\t#\"Is this really appropriate?\"\n\t\t\"Is this really appropriate Demeter?\"\n\nThe dark elf chuckles. \"Let me have some fun will you,\" he responds in a high pitch. \n\n\"Wha-\" You push your hands to your mouth and try to stop yourself from laughing. You are unable to overcome it and cackle like a mad ${man}. You hold onto your stomach and fall onto your ass. \"S-Say that again please.\"\n\nDemeter grins. \"Let me have some fun will you.\" He presses his arms against his breasts and winks at you.\n\n\"We can't have fun right now\" you say. \"We have a task at hand!\" \n\nYou then look to Mbali who has taken on almost the exact same appearance as Demeter, with the only difference being her hair is much longer, reaching her lower back whereas Demeter's reaches his shoulders.\n\n*page_break\n\nPloy claps her hands together to get your attention. \"Now then, you don't need to worry about your accent, the ring has already taken care of that.\"\n\n\"You're right,\" you say. You recall Demeter a moment ago had the exact same accent as Ploy.\n\nPloy spends the next hour going over the basic etiquette of the Khaeng Kingdom. You find out that you should press your hands together and bring the tips of your fingers to your nose whenever you meet somebody new and are going to speak to them. This is done as a sign of respect.\n\nThe competition begins in four days. As you are located a half a day's journey from the capital of Nam Khaeng, you have three days to make your preparations for the tournament.\n\nOn the first day you decide to study magic.\n\nIn preparation for your mission, Bami had handed you some magical tomes. You rummage through your backpack and remove five tomes. There has now been a long enough period for your spirit to settle into your body, and as such your ability to learn other forms of magic has finally returned.\n\n*if (spirit_illusion=true)\n\tThere is a single intermediate tome related to the spirit you have contracted with, that of illusions, along with four more basic tomes that have information on the four other domains of basic magic.\n\t\n\tYou take a look at the books and decide to read the tome of…\n\t\n\t*choice\n\t\t#Intermediate Illusions\n\t\t\t(gained Illusion) (gained Learn Truth) (gained Invisibility)\n\t\t\t\n\t\t\tYou spend a whole day going over the tome of intermediate illusion. Your knowledge on the topic of illusions widens and you find out how to more efficiently circulate your mana through your body when casting illusion magic. Due to having made a contract with an illusion spirit you are very easily able to learn two new spells, 'Learn Truth' and 'Invisibility'. \n\t\t\t\n\t\t\tLearn Truth is a spell that allows you to find out if a person is telling the truth or lying to you. The spell has two requirements. The first is that you need to cast the spell before asking a question. The second is that you can only use it once a day. This is due to the spell being unhindered by any forms of magical defences, meaning you can cast it against any living being, no matter how strong they are. \n\t\t\t\n\t\t\tInvisibility is a spell that allows you to temporarily make yourself unseen to the naked eye. The spell has a boost in effectiveness when used in the dark. However, invisibility does not stop any sounds you make, and things like footprints will still be left behind. \n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tOnce you've learned the spells, you rush over to Demeter and Mbali. \n\t\t\t\n\t\t\t\"Guys,\" you say. \"I want to try out my new spells on you.\"\n\t\t\t\n\t\t\t\"What spells have you managed to learn?\" Mbali asks. \n\t\t\t\n\t\t\tYou grin. \"Learn Truth and Invisibility.\" You point at Demeter. \"Tell me a lie.\"\n\t\t\t\n\t\t\tYou close your eyes and circulate your mana through your body and then cast Learn Truth. The spell is discrete, and if not for the fact that you were the person casting the spell, you probably would not have noticed it as there seems to be no magical signature left by it, nor are there any physical stimuli created, such as the usual bright pink lights whenever you use your spirit of illusion. \n\t\t\t\n\t\t\tDemeter rubs his chin. \"My name is Jo Mama.\"\n\t\t\t\n\t\t\tYour spell immediately takes effect and you are able to know that Demeter is lying. It's almost like a tingling sensation all over your body. You raise a fist and grin. \"Nice!\"\n\t\t\t\n\t\t\tYou then cast your spell invisibility. With this spell as well, there is almost no magical signature left by it that others could detect. \n\t\t\t\n\t\t\t\"Woah, where did you go?\" Mbali asks. \n\t\t\t\n\t\t\tYou slowly walk behind the girl and then disable the spell. You tap her on the shoulder. \"Here I am.\"\n\t\t\t\n\t\t\t*set illusion +10\n\t\t\t*set learn_truth \"true\"\n\t\t\t*set invisibility \"true\"\n\t\t\t\n\t\t\t*goto second_day\n\t\t\t\n\t\t#Basic Pyromancy\n\t\t\t(gained Pyromancy) (gained Lesser Fireball)\n\t\t\t\n\t\t\tYou spend the whole day going over the tome of basic pyromancy. Your knowledge on the topic of pyromancy improves and you start to figure out how to channel this form of magic. You are able to learn a single spell from the pyromancy field, 'Lesser Fireball'. \n\t\t\t\n\t\t\tLesser Fireball is a spell that allows you to conjure multiple fireballs, which can then be used in a variety of ways. The tome details that you can use the spell offensively, as a ball of fire is a rather destructive form of magic. But you can also use it for more mundane issues, such as lighting candles or even creating a source of light whilst in the dark. \n\t\t\t\n\t\t\tYou spend a couple of hours perfecting your use of the spell. You find that you aren't able to cast too many Lesser Fireballs. This is due to your chosen spirit not being of the pyromancy field. If you had a spirit of flames you'd be able to much more easily cast this spell and it'd take a lesser toll on your mana pool. \n\t\t\t\n\t\t\t*set pyromancy +10\n\t\t\t*set lesser_fireball \"true\"\n\t\t\t*goto second_day\n\t\t#Basic Hydrosophy\n\t\t\t(gained Hydrosophy) (gained Water Wall)\n\t\t\t\n\t\t\tYou spend the whole day going over the tome of basic hydrosophy. Your knowledge on the topic of hydrosophy improves and you start to figure out how to channel this form of magic. You are able to learn a single spell from the hydrosophy field, 'Water Wall'. \n\t\t\t\n\t\t\tWater Wall is a defensive spell that allows you to conjure a barrier of water in front of you. From the information you've gathered from the tome, it is most effective used to defend physical attacks and against the element of fire. Casting the spell takes quite a toll on your mana, as the wall can reach up to three meters in height. The bigger you make the Water Wall, the more mana is consumed. You are able to cast multiple walls, but at the moment you've found your limit to be casting two walls at any one point in time.\n\t\t\t*set hydrosophy +10\n\t\t\t*set water_wall \"true\"\n\t\t\t*goto second_day\n\t\t#Basic Summoning\n\t\t\t(gained Summoning) (gained Summon Hawk)\n\t\t\t\n\t\t\tYou spend the whole day studying the tome of basic summoning. Your knowledge on the topic of summoning improves and you start to figure out how to channel this form of magic. You are able to learn a single spell from the summoning field, 'Summon Hawk'.\n\t\t\t\n\t\t\tSummon Hawk is a reconnaissance spell that allows you to conjure a hawk as a temporary pet, so long as you have enough mana to sustain it's existence. From the detailed descriptions in the tome, you find that you can send the hawk off to scout any location for you, however it's range is limited by your own mana. You're able to see everything the hawk can.\n\t\t\t\n\t\t\tUpon practising with the spell, you are able to determine that the current range of use you are able to do with Summon Hawk is about five hundred meters.\n\t\t\t*set summoning +10\n\t\t\t*set summon_hawk \"true\"\n\t\t\t*goto second_day\n\t\t#Basic Theurgy\n\t\t\t(gained Theurgy) (gained Thorn Armour)\n\t\t\t\n\t\t\tYou spend the whole day reading the tome of basic theurgy. Your knowledge on the topic rapidly improves and you become able to start channelling this form of magic. You are able to learn a single spell from the theurgy field, 'Thorn Armour'.\n\t\t\t\n\t\t\tThorn Armour is a defensive spell that allows you to create a magical set of armour that is covered in thorns. Unlike many other spells, this one doesn't require a constant amount of mana to keep form. Once you've cast the spell, the armour will remain until it is either destroyed or until you disable it. However, the spell costs a lot of mana, almost half of your total pool. \n\t\t\t*set theurgy +10\n\t\t\t*set thorn_armour \"true\"\n\t\t\t*goto second_day\n\n*if (spirit_flames=true)\n\tThere is a single intermediate tome related to the spirit you have contracted with, that of pyromancy, along with four more basic tomes that have information on the four other domains of basic magic.\n\t\n\tYou take a look at the books and decide to read the tome of…\n\t\n\t*choice\n\t\t#Basic Illusions\n\t\t\t(gained illusion) (gained Create Illusion)\n\t\t\t\n\t\t\tYou spend the whole day going over the tome of basic illusion magic. Your knowledge on the topic of illusions improves and you start to figure out how to channel this form of magic. You are able to learn a single spell from the illusion field, 'Create Illusion'.\n\t\t\t\n\t\t\tCreate Illusion is a spell that allows you to conjure a lifelike image to an opponent. From the information you've gathered from the tome, you've found that the effectiveness of Create Illusion increases with your proficiency in illusion magic. At the current moment you're able to create only basic illusions, only images. As you improve your abilities you will be able to create lifelike creatures that can be touched, smelled and even heard.\n\t\t\t*set illusion+10\n\t\t\t*set create_illusion \"true\"\n\t\t\t*goto second_day\n\t\t\t\n\t\t#Intermediate Pyromancy\n\t\t\t(gained Pyromancy) (gained Flame Dash) (gained Wall of Fire)\n\t\t\t\n\t\t\tYou spend the whole day reading the tome of intermediate pyromancy. Your knowledge on the topic of pyromancy increases, and due to housing a spirit of flames within you already, you find that you're able to learn rather quickly. You are able to learn two new spells, 'Flame Dash' and 'Wall of Fire'.\n\t\t\t\n\t\t\tFlame Dash is a movement ability that allows you to increase your speed substantially whilst leaving behind a trail of flames in your wake. \n\t\t\t\n\t\t\tWall of Fire is a unique spell that can be used both offensively and defensively. By conjuring a wall of flames you can defend yourself from attacks but also have the option to use it offensively and trap opponents in your flames by casting multiple walls. At the current \tmoment you've come to find that you're able to create four of them continuously, however the toll on your mana is rather large as you lose around seventy percent of it. A single Wall of Fire only costs you a tiny amount, and it seems there is a multiplicative mana toll with this spell.\n\t\t\t\n\t\t\tYou spend the rest of the day playing with these two new spells until you are completely exhausted.\n\t\t\t\n\t\t\t*set pyromancy +10\n\t\t\t*set flame_dash \"true\"\n\t\t\t*set wall_of_fire \"true\"\n\t\t\t*goto second_day\n\t\t\t\n\t\t#Basic Hydrosophy\n\t\t\t(gained Hydrosophy) (gained Water Wall)\n\t\t\t\n\t\t\tYou spend the whole day going over the tome of basic hydrosophy. Your knowledge on the topic of hydrosophy improves and you start to figure out how to channel this form of magic. You are able to learn a single spell from the hydrosophy field, 'Water Wall'. \n\t\t\t\n\t\t\tWater Wall is a defensive spell that allows you to conjure a barrier of water in front of you. From the information you've gathered from the tome, it is most effective used to defend physical attacks and against the element of fire. Casting the spell takes quite a toll on your mana, as the wall can reach up to three meters in height. The bigger you make the Water Wall, the more mana is consumed. You are able to cast multiple walls, but at the moment you've found your limit to be casting two walls at any one point in time.\n\t\t\t*set hydrosophy +10\n\t\t\t*set water_wall \"true\"\n\t\t\t*goto second_day\n\t\t\t\n\t\t#Basic Summoning\n\t\t\t(gained Summoning) (gained Summon Hawk)\n\t\t\t\n\t\t\tYou spend the whole day studying the tome of basic summoning. Your knowledge on the topic of summoning improves and you start to figure out how to channel this form of magic. You are able to learn a single spell from the summoning field, 'Summon Hawk'.\n\t\t\t\n\t\t\tSummon Hawk is a reconnaissance spell that allows you to conjure a hawk as a temporary pet, so long as you have enough mana to sustain it's existence. From the detailed descriptions in the tome, you find that you can send the hawk off to scout any location for you, however it's range is limited by your own mana. You're able to see everything the hawk can.\n\t\t\t\n\t\t\tUpon practising with the spell, you are able to determine that the current range of use you are able to do with Summon Hawk is about five hundred meters.\n\t\t\t*set summoning +10\n\t\t\t*set summon_hawk \"true\"\n\t\t\t*goto second_day\n\t\t\t\n\t\t#Basic Theurgy\n\t\t\t(gained Theurgy) (gained Thorn Armour)\n\t\t\t\n\t\t\tYou spend the whole day reading the tome of basic theurgy. Your knowledge on the topic rapidly improves and you become able to start channelling this form of magic. You are able to learn a single spell from the theurgy field, 'Thorn Armour'.\n\t\t\t\n\t\t\tThorn Armour is a defensive spell that allows you to create a magical set of armour that is covered in thorns. Unlike many other spells, this one doesn't require a constant amount of mana to keep form. Once you've cast the spell, the armour will remain until it is either destroyed or until you disable it. However, the spell costs a lot of mana, almost half of your total pool. \n\t\t\t*set theurgy +10\n\t\t\t*set thorn_armour \"true\"\n\t\t\t*goto second_day\n\n*if (spirit_water=true)\n\tThere is a single intermediate tome related to the spirit you have contracted with, that of hydrosophy, along with four more basic tomes that have information on the four other domains of basic magic.\n\n\tYou take a look at the books and decide to read the tome of…\n\t\n\t*choice\n\t\t#Basic Illusions\n\t\t\t(gained illusion) (gained Create Illusion)\n\n\t\t\tYou spend the whole day going over the tome of basic illusion magic. Your knowledge on the topic of illusions improves and you start to figure out how to channel this form of magic. You are able to learn a single spell from the illusion field, 'Create Illusion'.\n\n\t\t\tCreate Illusion is a spell that allows you to conjure a lifelike image to an opponent. From the information you've gathered from the tome, you've found that the effectiveness of Create Illusion increases with your proficiency in illusion magic. At the current moment you're able to create only basic illusions, only images. As you improve your abilities yo pples. He moans in pleasure as you rub his crotch with your hands. You kiss his from his chest and slow move down as he twitches and groans. Once you reach his stomach you stop. You look up at him. \"Tell me you want me.\"\n\t\t\t\t\n\t\t\t\t\"I want you ${name}.\"\n\t\t\t\t\n\t\t\t\tYou grin and lick your lips. You unzip his trousers. \"Just how I like it.\"\n\t\t\t\t\n\t\t\t\t\"Unghhh ${name} don't stop!\"\n\t\t\t\t\n\t\t\t\t*set demetersex \"true\"\n\n\t\t\t\t\t\n\t\t\t#\"Only if you want to.\"\n\t\t\t\t\"Only if you want to,\" you respond and then shrug. \"It doesn't matter to me to be honest.\"\n\t\t\t\t\n\t\t\t\tDemeter nods. \"You're right, well, I kind of want to stay like this for a while longer.\"\n\t\t\t\t\n\t\t\t\tYou spend another hour in the woods with Demeter before making your way back to the wooden shack.\n\t\t\n\t\t*set observation +5\n\t\t*set intelligence +5\n\t\t*set demeter +5\n\t\t*goto third_day\n\t\t\n\t#Go into the village with Mbali and Ploy\n\t\t(gained Social) (gained Dexterity)\n\t\t\n\t\tYou make your way to behind the wooden shack you have been staying in. Outside of it you find that you are in the middle of the woods, not another soul in sight. \n\t\t\n\t\tThe way to the nearest village is relatively quick, you only spend two hours on foot to get there. The shack is hidden in a perfect position in the forest, not too far away from the closest living people, but also far enough that finding it is almost impossible.\n\t\t\n\t\tWhen you reach the village, you find that it is relatively small, only about fifty people live here, and the majority of them are children. You make sure to remember what Ploy had told you previously and greet each stranger by put your palms together and letting your fingertips touch your nose.\n\t\t\n\t\tPloy introduces you to the people, and you happily converse with them. The people are very friendly, and you even play a game of catch with the children, who insisted you take part.\n\t\t\n\t\tOnce you finish playing with the kids, you notice that Ploy and Mbali are both nowhere to be seen. You ask around and find out that the two girls are in different parts of the village. You decide to look for…\n\t\t\n\t\t*fake_choice\n\t\t\t#Ploy\n\t\t\t\t(Ploy approves)\n\t\t\t\t\n\t\t\t\tYou are quick to find Ploy to one end of the village. She's gathering herbs in a small garden. She is very concentrated on what she's doing and doesn't even notice as you sneak up on her. \n\t\t\t\t\n\t\t\t\tYou get onto your knees and help out, picking out the exact same herbs that she does. After about ten minutes go by the girl finally escapes the zoomed in focus she was in and looks at you. \n\t\t\t\t\n\t\t\t\t\"Thank you,\" she says. \"You've been really helpful ${name}.\" She gets up from her knelt position and wipes away the dirt and soil on her exposed knees. \n\t\t\t\t\n\t\t\t\tYou tilt your head. \"I thought you didn't notice me.\"\n\t\t\t\t\n\t\t\t\tPloy giggles. \"Come on, if I can't even notice you then I deserve to die to a Templar ambush.\"\n\t\t\t\t\n\t\t\t\t\"Touché,\" you respond. \n\t\t\t\t*set ploy +5\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Ask about her family\n\t\t\t\t\t\t\"I've been meaning to ask, and I hope you're not too uncomfortable answering,\" you say. \"If it's too much just tell me.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Ask ahead,\" Ploy responds.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You grew up here, right? How come you're able to stay here for a whole year without Templars finding you? And does this mean you get to visit your family every now and then?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tPloy twirls through her curly hair and gives a dejected smile. \"It's complicated. As long as you don't stay in the same place for too long the Templars have a hard time finding you.\" She takes in a deep breath. \"And as for family, let me give you some advice, since you're new to this world of ours. Stay as far away from them as possible, it's better for them to think you're dead than to have any hope. Trust
