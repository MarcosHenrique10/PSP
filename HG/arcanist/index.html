<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Arcanist's Journey — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "arcanist", "title": "The Arcanist's Journey", "scenes": {"adventurers1": "*page_break\nYou make your way through the busy midday streets of Val Sola. You spot numerous carts and stands that are selling fresh produce. You spot fruit vendors, people selling freshly sourced eggs and even some individuals using magic to make ice cream out of fresh milk.\n\nYou see a familiar smoothie seller and nudge Demeter. \"Want a smoothie?\"\n\nDemeter nods. \"Sure, why not. Apple mixed with orange for me.\"\n\nYou reach the vendor and then ask for a …\n\n*fake_choice\n\t#Watermelon Smoothie\n\t\tYou ask for a watermelon smoothie for yourself and one mixed apple with orange smoothie for Demeter.\n\t#Orange Smoothie\n\t\tYou ask for a orange smoothie for yourself and one mixed apple with orange smoothie for Demeter.\n\t#Pineapple Smoothie\n\t\tYou ask for a pineapple smoothie for yourself and one mixed apple with orange smoothie for Demeter.\n\t#Apple Smoothie\n\t\tYou ask for an apple smoothie for yourself and one mixed apple with orange smoothie for Demeter.\n\t\t\n\"That'll be five gold,\" the female vendor says. \n\n*choice\n\t#Give her five gold\n\t\tYou hand the woman five gold and then grab your beverages. You hand one to Demeter before taking a sip of yours. \n\t\t\n\t\tThe beverage is cool and refreshing, just what you needed to get your day started.\n\t\t\n\t\t*set gold -5\n\t\t*goto adventure_guild1\n\t*selectable_if (social>10) #Haggle\n\t\t\"Five gold?\" you say. \"I've been coming to you almost every day since I arrived at Val Sola, could you give it to me for four gold?\" \n\t\t\n\t\tYou cup your hands apologetically. \"Pretty please?\"\n\t\t\n\t\t\"Fine,\" the vendor says. \"You better continue coming here every day.\"\n\t\t\n\t\t\"Of course,\" you say with a smile.\n\t\t\n\t\t*set gold -4\n\t\t*goto adventure_guild1\n\t\t\n\t*selectable_if (illusion>15) #Use some illusion magic\n\t\t(gained void)\n\t\t\n\t\tYou wriggle your hands very gentle and allow your mana to flow through your body. You alter your voice ever so slightly through the magic given to you by your spirit of illusions.\n\t\t\n\t\t\"Could you do three gold today? I'm running a bit short, you know.\" \n\t\t\n\t\tThe woman furrows her brows. \"Fine, but only this one time. You've been coming here everyday so I'll let you off the hook, but only this once,\" the vendor responds.\n\t\t\n\t\t*set gold -3\n\t\t*set void +10\n\t\t*goto adventure_guild1\n\t\n*label adventure_guild1\n*page_break\nYou make your way to the guild, smoothie in hand, and a smile on your face. Sunlight kisses your tanned skin as you weave your way through the busy streets of Val Sola. Despite having at first thought that being a Voidwoken was an insanely rare situation, you have quickly come to realize that it isn't as unique as expected. There are at least a few thousand people that live here, and every single one of them is a Voidwoken.\n\nOf all these people that live here, not everyone has the innate talent to succeed in magic. Thus, there are many merchants, performers and artists that live a peaceful life here in the sanctuary, without having to worry about being hunted for their innate powers by the Templars.\n\nIt doesn't take long for you to reach the Adventurer's Guild. The building is rather unassuming, made out of a dark brick. Written across the front of it is 'Adventurer's Guild'. There are two tall, intimidating guards stood in front of the door wearing full plate armour. \n\n\"Demeter,\" one of the guards says with a nod as the pair of you make your way through. \n\nThe inside of the guild is relatively spacious, with enough space to house at least a hundred people. There are ten large, circular wooden tables dotted across the room, and about an odd twenty or so adventurer's seated around the tables. \n\n*goto adventure_guild2\n\n*label adventure_guild2\nYou rub your chin and look around the room. [i]What should I do?[/i]\n*choice\n\t#Go to the receptionist\n\t\tYou make your way to the front desk. There is a beautiful, dark skinned woman behind the desk. Her short, curly brown hair glistens under the sunlight. \n\t\t\n\t\tThe woman smiles warmly. \"Good afternooon, and who is this you've brought with you Demeter?\"\n\t\t\n\t\t\"My housemate, ${name},\" Demeter responds. \"We're here to look for some quests, Angelica.\"\n\t\t\n\t\tThe woman raises an eyebrow and looks you up and down. \"A housemate with this crazy thing? Is everything okay ${name}? Has he corrupted you beyond repair already?\"\n\t\t\n\t\tDemeter groans. \"Can you give it a rest please, we're here for business.\"\n\t\t\n\t\tYou chuckle. \"Everything is fine. He hasn't corrupted me.\"\n\t\t\n\t\t*goto adventure_guild3\n\t\t\n\t*hide_reuse *selectable_if (social\u003c10) #Speak to adventurers\n\t\t(gained Social)\n\t\t\n\t\tYou walk over to a group of adventurer's seated near the reception. There are three in total, and each has a wooden cup filled with what you presume to be ale. \n\t\t\n\t\t\"What do ya want kid?\" a male asks. He's a short and burly dwarf, with a thick ginger beard.\n\t\t\n\t\tYou scratch your head. \"Just taking a look around, it's my first time here.\"\n\t\t\n\t\tThe man grins, revealing his yellow stained teeth, of which he is missing a few of. \"A newbie,\" he shouts. The others in the guild laugh loudly. He grabs your shoulder and presses down firmly. \"You'll do well to be cautious. Listen to ye old veteran here and you'll stay alive long enough.\"\n\t\t\n\t\tYou nod and then excuse yourself. \n\t\t\n\t\t*set social +5\n\t\t*goto adventure_guild2\n\t\t\n\t*hide_reuse *selectable_if (strength\u003c10) #Take part in an arm wrestle\n\t\t(gained Strength)\n\t\t\n\t\tYou spot a group of five adventurer's around a table, arm wrestling. They are a rather burly bunch, their muscles bulging as they wrestle. \n\t\t\n\t\tYou walk over to the group and say, \"Can I join?\"\n\t\t\n\t\tA man looks up at you from where he's seated and laughs. \"${boy}, are you sure about that?\"\n\t\t\n\t\tYou nod. You roll your neck around and then stretch your arms. \"What's the harm done? Are you scared to lose to a weak ${boy} like me?\"\n\t\t\n\t\tThe man raises his brow and grins. He beckons you to sit across from him. \n\t\t\n\t\tYou lock hands with the man and then push with all of your might. The man's hand doesn't budge a single bit. \n\t\t\n\t\tThe man laughs and with one swift motion your hand crashes onto the table. \"${He}'s got spirit, I tell ya,\" the man says. \n\t\t\n\t\tYou excuse yourself. \n\t\t\n\t\t*set strength +5\n\t\t*goto adventure_guild2\n\t\n\t\n*label adventure_guild3\n\n\"Well then, let me initiate you into the guild ${name},\" Angelica says. She grabs a sheet of paper and hands it to you. \"Write down your name, age and location of residence.\"\n\nYou nod and quickly write down your information on the sheet. You then hand it back to Angelica. \n\n\"Perfect,\" the woman says. She then hands you a small silver medallion. \n\nYou look at it, there is an insignia of a sword in front of a shield etched onto the medallion. You put it into your pocket. \n\n\"Simply use this medallion whenever you wish to receive a quest. It's simple.\" She points to a wooden board at the other side of the room that has dozens of sheets of paper nailed to it. \"You pick up the quest you want to take, and bring it to me. I'll take your medallion upon completion of the quest and increase your standing within the guild. Currently you're at the lowest rank, F, and as such you can only pick up quests of F and E rating.\"\n\nYou nudge Demeter. \"What's your rank?\"\n\nDemeter grins. \"I'm already a D rank adventurer. No worries though, we'll take an E rating quest.\"\n\n*page_break Walk over to the quest board\n\nYou stare at the dozens of quests on the board. There are mostly quests in the C-D range of ratings, with the rest above and below being fewer in number by a quite large margin. \n\n\"Retrieve the holy grail,\" you say as you look at an S rated quest. \"Holy fuck.\"\n\nDemeter looks to one quest and grabs it. He shows you the paper and says, \"We'll take this one.\"\n\nYou read the contents of the E rated quest. 'Slay twenty goblins in the Neuman Forest.'\n\n\"Twenty goblins, alright, that sounds like a fitting challenge doesn't it?\"\n\nDemeter grins. \"Indeed, but don't let your guard down for even a moment. Goblin or not, enemies will do everything in their power to stay alive. Which just so happens to include killing us.\"\n\nYou gulp hard. \"Noted.\"\n\n*fake_choice\n\t#What now?\n\t\t\n\t#Is this dangerous?\n\t\t\n\t#Where do we go?\n\t\t\nDemeter rubs the back of his neck. \"Right, I forgot it's your first time.\"\n\n\"How the hell…\" You look wide eyed at the dark elf. \"Are you stupid?\"\n\nDemeter shrugs. \"Alright, let's go. There's a portal inside the guild that can take us to any place we need to go.\"\n\nYou make your way through the guild until you reach the portal room.\n\nThere are five different elevated platforms upon which floats an oval shaped mirror. Upon further inspection you notice that you can both see your reflection and see into the mirror at the same time. The scenery changes constantly, from icy mountains to the blistering brightness of desserts. \n\nA woman is stood in the middle of the room, her eyes covered by a blue bandage. \n\n\"Demeter,\" the woman calls out. \"Where would you like to travel this time?\"\n\nThe boy hands her the sheet. \"Neuman Forest ma'am.\"\n\nYou tilt your head. [i]Ma'am? Did Demeter just speak respectfully? There's no way, I can't believe it.[/i]\n\n\"Very well,\" the woman replies. She points to one of the barriers and then looks to you. \"That will take you to the Neuman Forest. When you are ready to return simply break this and I'll bring you back. Don't lose it, under any circumstances.\"\n\nThe woman hands you a small black gem. It is cold to the touch yet a crackling electricity is emitted by it.\n\n\"Let's go,\" Demeter says. \n\n*page_break Enter the portal\n\nA slight wave of grogginess washes over you as you reach the other side of the portal. You quickly reach into your backpack and grab a bottle of water, downing the contents. \n\nYou find yourself in a dense green forest. Only a small amount of sunlight is able to penetrate through the foliage. Demeter is stood in front of you, kneeling on the ground.\n\nThe boy is looking at some footprints. \n\n*choice\n\t#What is that?\n\t\tDemeter crouches down and presses his hands on the footprints. \"Still a bit warm… From their size those must be goblins, their nearby.\"\n\t\t\n\t\t*goto goblins1\n\t\t\n\t*selectable_if (observation>20) #Take a look \n\t\t(Demeter approves)\n\t\t\n\t\tYou walk over to the footprints and then kneel beside Demeter. The prints are rather small, with five distinct toe prints showing. \n\t\t\n\t\t\"That must be from a goblin,\" you say. You look around, noting that there are five more prints each in varying sizes. \" The pritns are warm and we're dealing with at least five of them.\"\n\t\t\n\t\t*set demeter +5\n\t\t*goto goblins1\n\t\t\n\t*selectable_if (intelligence>20) #Make a guess\n\t\t(Demeter disapproves)\n\t\t\n\t\t\"Must be goblins,\" you say. \"I mean, that's the only logical answer considering this forest is supposedly filled with them.\"\n\t\t\n\t\tDemeter nods. \"I mean, you're right, but try not to jump to such conclusions without further observation first.\"\n\t\t\n\t\t*set demeter -5\n\t\t*goto goblins1\n\n*label goblins1\n\nYou take in a deep breath. \"This will be easy enough. I mean, I've defeated templars and undead skeletons with you. What the hell can a goblin do to us?\"\n\nDemeter shakes his head. \"Let me give you some advice, never, ever, and I mean it, never underestimate an opponent. That's how people get killed and I for sure am not going to get myself killed here today. You need to treat each battle like it could be your last, literally, it's life or death ${name}.\"\n\n\"Okay okay, I understand, I'll keep that in mind.\" \n\nOut of the corner of your eye you spot a green flash. \n\n*choice\n\t#Get a better look\n\t\tYou turn and look to where you thought you saw something. \n\t\t\n\t\t\"Grrrar,\" a goblin shouts as it hurls a rock at you. \n\t\t\n\t\tThe rock lands right across your temple. You fall onto your ass, blood pouring form the wound.\n\t\t\n\t\t*set health -5\n\t\t*goto goblins2\n\t\n\t*selectable_if (dexterity>15) #Leap forward\n\t\tYour body moves automatically. You leap forward as a rock is hurled your way. You dodge the projectile with ease. \n\t\t\n\t\tYou get off the ground and lock eyes with the goblin that threw the rock.\n\t\t\n\t\t*goto goblins2\n\t\t\n\t*selectable_if (strength>15) #Raise your hands across your face\n\t\tYou throw your hand forward and punch an incoming rock. A creature growls and you quickly see a goblin stood a couple of meters away.\n\t\t\n\t\tYou lock eyes with the goblin.\n\t\t\n\t\t*goto goblins2\n\t\t\n\t*selectable_if (observation>15) #Throw a rock\n\t\tYou spot the goblin before it's able to make a move. You grab a rock from the ground and throw it at the creature. \n\t\t\n\t\tThe rock misses its mark, however you startle the goblin enough, causing it to drop the rock in its hand.\n\t\t\n\t\t*goto goblins2\n\t\n*label goblins2\n\n\"Fucking goblin,\" you hiss. You stare at the small green creature, about four feet in height. It is rather chubby, and is wearing some tattered brown leather across it's privates. The creature grabs a wooden stick from the ground and growls at you.\n\n\"You can take care of this one,\" Demeter says. \"It's good practice.\n\nYou nod. You decide to…\n\n*fake_choice\n\t#Use your spirit\n\t\t*if (illusion>10)\n\t\t\tYou channel the power from within your spirit. The mana in your body pulses and you feel a great amount of energy welling into your palms. You thrust your palms forward.\n\t\t\t\n\t\t\tA pink energy escapes your palms and rushes at the goblin. The goblin drops it's wooden stick and lets out a high pitched scream as your illusion magic causes it to see visions of it's own demise.\n\t\t\t\n\t\t\tYou run over to the creature, dagger in hand. Once within range you stab the goblin's neck. Blackish green blood pours out from the wound. The goblin falls to the ground with a loud thud.\n\t\t\t\n\t\t\t*goto goblins3\n\t\t*if (pyromancy>10)\n\t\t\tYou channel the power from within your spirit. The mana in your body pulses and you feel a great amount of energy welling into your palms. You thrust your palms forward.\n\t\t\t\n\t\t\tA red fireball forms in your hand, about the size of a ball of yarn. You throw the fireball at the goblin with perfect accuracy. The creature roars as its flung back by the impact. He gets back up and then sprints at you.\n\t\t\t\n\t\t\tYou form a dozen more fireballs and throw them at the creature in succession before it can close the distance to you. Just as it's a couple steps away from you the goblin drops to the ground as a charred corpse.\n\t\t\t\n\t\t\t*goto goblins3\n\t\t*if (hydrosophy>10)\n\t\t\tYou channel the power from within your spirit. The mana in your body pulses and you feel a great amount of energy welling into your palms. You thrust your palms forward.\n\t\t\t\n\t\t\tDroplets of water form in your palms. Slowly they turn into a large crescent blade of water which you shoot at the goblin. You aim it expertly at the goblin's neck.\n\t\t\t\n\t\t\tWith a loud thud the goblin's head is severed from its body and drops onto the ground.\n\t\t\t\n\t\t\t*goto goblins3\n\t\t*if (theurgy>10)\n\t\t\tYou channel the power from within your spirit. The mana in your body pulses and you feel a great amount of energy welling into your palms. You thrust your palms forward.\n\t\t\t\n\t\t\tA brownish green glow of energy forms in your palms. You press your palms into the ground, causing vines to rush toward the goblin. The vines are covered in thorns and pierce into the goblin. The creature makes a high pitched scream as the vine wraps around its neck. A moment later you press your palms together and the vines snap the goblin's neck.\n\t\t\t\n\t\t\t*goto goblins3\n\t\t*if (summoning>10)\n\t\t\tYou channel the power from within your spirit. The mana in your body pulses and you feel a great amount of energy welling into your palms. You thrust your palms forward.\n\t\t\t\n\t\t\tYou summon Cerberus. The three headed hound howls and sprints at the goblin. The goblin's eyes widen in fear as it tries to defend itself, yet it's too late. Cerberus makes quick work of the goblin, sinking it's sharp fangs into the goblin's brain.\n\t\t\t\n\t\t\t*goto goblins3\n\t\t\n\t*selectable_if (strength>10) #Overpower the goblin\n\t\tYou carefully make your way over to the goblin. You cover your face whenever it throws a rock. Soon, you are close enough to the creature that it stops throwing rocks. \n\t\t\n\t\tThe goblin holds its stick up against you. You swipe at the creature's hand as it tries to hit you. You kick it in the stomach, causing it to fall onto it's back. You raise a fist and smash it into the goblin's face. \n\t\t\n\t\tThe goblin snarls and bites your hand. You yelp and smash your other fist into it's face with all the power you can muster. \n\t\t\n\t\tThe goblin stops moving, it's lifeless body underneath you. \n\t\t\n\t\t*goto goblins3\n\t\t\n\t*selectable_if (dexterity>10) #Run over to the goblin\n\t\tYou sprint at the goblin, dodging the rocks that it throws your way. You are able to grab a rock flying your way and then throw it back at the goblin. \n\t\t\n\t\tYou reach the goblin and then kick it in the face. The goblin stumbles and falls onto its. The creature bares its fangs at you. \n\t\t\n\t\tYou stomp onto its face with such force that it's neck breaks.\n\t\t\n\t\t*goto goblins3\n\n*label goblins3\n*page_break\n\nYou look down at the lifeless corpse of the goblin. All of the adrenaline that was coursing through your body suddenly dissipates. You move to the side and hold onto your stomach as a vile concoction starts to flow from your stomach. You vomit. \n\n\"Whoa there,\" Demeter says. He goes to you and rubs your back as you vomit. \"You'll get used to this, don't worry.\"\n\nYou take a bottle of water and rinse your mouth. \"That… The goblin smells like shit.\"\n\nDemeter laughs. \"I know. They don't really shower.\" He then walks over to the goblin and plunges his hand into it's chest. He removes a small green core from within it and then puts it into his backpack. \n\nYou take in a deep breath. \"One down. Nineteen left.\"\n\nYou make your way through the forest with Demeter, picking off goblins whenever you see them. It doesn't take long for the pair of you to get to twenty kills. \n\n*page_break\n\n(gained Dexterity) (gained Observation)\n\nYou sit beside the last goblin corpse. You feel that your combat prowess has improved, and you're able to be much calmer in battle situations. Making your way through the forest also helped you understand that tactics are necessary before engaging in combat. Using the terrain to your advantage was a complete requirement in the battles. Most of all, you learned from Demeter that underestimating an opponent can lead to your own downfall.\n\nFortunately for you, you only had to fight a group of four goblins at once, all other battles were with a smaller number of opponents. With the powers from your spirit and with the help of Demeter this quest was no problem whatsoever. \n\nYou nudge Demeter. \"Let's go back home. I think I've had enough of this place for today.\"\n\nDemeter nods. You both pull out the black gem given to you by the Adventurer's Guild. \n\nYou throw the gem onto the ground. Your vision clouds and you feel your body entering a portal.\n\n*set dexterity +5\n*set observation +5\n\n*page_break\n\nYou find yourself in the portal room of the Adventurer's Guild. You're a bit groggy but you're able to deal with the sensation. \n\nYou make your way to the reception with Demeter.\n\n\"How did it go?\" Angelica asks. \n\n\"Easy as usual,\" Demeter responds. He then takes out the twenty cores you'd retrieved from the goblins and hands it to Angelica. \n\n\"Great,\" she responds. \"Pass me your badges.\"\n\nYou give her your silver medallion. \n\n\"Alright, rewards for this quest is fifty gold in total. I take it you're splitting this amount?\"\n\n*choice\n\t#\"Of course.\"\n\t\t(gained Gold) (gained Adventurer Rank E)\n\t\t\n\t\tYou are handed twenty five gold pieces and your adventurer rank is increased to E grade. \n\t\t\n\t\tYou don't wait around too long in the guild and make your way back home with Demeter.\n\t\t\n\t\t*set gold +25\n\t\t*set adventurerE \"true\"\n\t\t*goto checkpoint\n\t\t\n\t*selectable_if (social>15) #Try to get more\n\t\t(gained gold) (gained adventurer rank E)\n\t\t\n\t\tYou nudge Demeter. \"Hey, do you mind if I get a bit more of the reward? I really want to buy something nice from the merchants. I've had my eyes on it for a while now.\"\n\t\t\n\t\tDemeter rolls his eyes. \"Trying to swindle me? Fine, but only because you showed the spirit of a true warrior. I might be able to depend on you in battle in the future if you keep up like this.\"\n\t\t\n\t\tYou are handed thirty gold and then make your way back home with Demeter.\n\t\t\n\t\t*set gold +30\n\t\t*set adventurerE \"true\"\n\t\t*goto checkpoint\n\t\t\n\t*selectable_if (illusion>15) #Use illusion magic\n\t\t(gained Gold) (gained Void) (gained Adventurer Rank E)\n\t\t\n\t\t\"I thought it said sixty gold in total on the leaflet,\" you say. \n\t\t\n\t\tAngelica furrows her brows. She takes the sheet with the quest on it. \n\t\t\n\t\tJust as she's about to read the contents you allow your mana to wriggle toward her. You use your illusion magic to change the words on the paper. \n\t\t\n\t\tAngelica shakes her head. \"Nope, I don't see anything wrong here, you simply misread.\"\n\t\t\n\t\tYou are handed twenty five gold pieces and then make your way back home with Demeter.\n\t\t\n\t\t*set gold +25\n\t\t*set adventurerE \"true\"\n\t\t*set void +10\n\t\t*goto checkpoint\n\t\n*label checkpoint\n\"How did you find today?\" Demeter asks.\n\n\n*fake_choice\n\t*selectable_if (Demeter>15) #\"Fun, the most fun I've had so far.\"\n\t\t\"Fun, the most fun I've had so far,\" you say. \n\t\t\n\t\tDemeter grins. \"Exactly what I thought too! There's nothing better than testing your skills and destroying your opponents.\"\n\t\t\n\t\tYou laugh. \"That is really all you think about isn't it Demeter?\n\t\t\n\t\tDemeter stops walking. He shakes his head. \"No… Not at all.\"\n\t\t\n\t\t\"What's the matter? You're getting so serious all of a sudden.\"\n\t\t\n\t\tDemeter turns around and looks you in the eyes. \"I think of you. A lot. Spending time with you is my favourite thing.\"\n\t\t\n\t\t*fake_choice\n\t\t\t*selectable_if (((((demeter>20) and(orientation=\"gayM\")) or (orientation=\"straightF\")) or (orientation=\"bisexual\"))) #\"I like you too.\"\n\t\t\t\t(Demeter approves)\n\t\t\t\t\n\t\t\t\t\"I like you too,\" you say. You feel heat rush to your cheeks.\n\t\t\t\t\n\t\t\t\tDemeter takes a step back. You notice his whole face has gone red. \"Y-Y… R-Really?\"\n\t\t\t\t\n\t\t\t\tYou nod. \"I've had my eyes on you since I got here.\"\n\t\t\t\t\n\t\t\t\tDemeter rubs his nose. \"I-I have to go.\" He runs away in the direction of your house.\n\t\t\t\t\n\t\t\t\t[i]What the… This will take some work.[/i]\n\t\t\t\t\n\t\t\t\t*set demeter +10\n\t\t\t\t\n\t\t\t#\"Thank you.\"\n\t\t\t\t\"Thank you,\" you respond. \"I enjoy spending time with you too. I'm glad that I could have such a great friend like you in my life.\"\n\t\t\t\t\n\t\t\t\tDemeter coughs. \"Great friend…\" He laughs. \"Of course, what else could I be? I'm your great friend.\"\n\t\t\t\t\n\t\t\t\tYou make your way home but now in complete silence. You sense that Demeter is upset, but you're unsure why.\n\t\t\t\n\t#\"It was alright.\"\n\t\t\"It was alright,\" you say. \"I can definitely come back again and do more quests with you, if you'd like.\"\n\t\t\n\t\t\"I'd love to do that,\" Demeter responds.\n\t\t\n\t#\"I hate it.\"\n\t\t\"I hate it,\" you say. \"Having to kill things just isn't in my nature… But I have no other choice than to do this. Maybe I'll go to the Mage's Guild or the Training Grounds next time instead. I don't have the stomach for this blood and gore.\"\n\t\t\n\t\tDemeter chuckles. \"With how our lives have gone, none of us have the option of being pacifists. You might hate it, but you'll learn its importance. Because once the Templars come and try to steal take away everything you care about, you'll know that bloodshed is a necessity sometimes.\"\n\n*if templars2=true\n\t*goto_scene templars2\n*if templars2=false\n\t*goto_scene chapter2\n", "adventurers2": "*if adventurerE=false\n\t*set templars2\"true\"\n\t*goto_scene adventurers1\n*if adventurerE=true\n\tYou make your way to the Adventurer's Guild along with Demeter. \n\n\tThe dark elf is more excited than usual, and talked your ears off on the way here. Once inside the Adventurer's Guild, the pair of you go to the quest board.\n\n\tThere are currently three E rank quests available to take. Whilst you could potentially take a D rank quest since your current rank is E, you still decide to take the safer route and complete a quest of your own level. \n\n\tYou read through two quests. The first quest is to exterminate some ogres whilst the second is to protect a merchant caravan trying to reach their destination. \n\n\tYou look to Demeter, \"What are you leaning toward?\"\n\n\tDemeter taps his left index finger against his right forearm. \"I'm thinking that we should exterminate the ogres. That sounds easy enough.\"\n\n\tYou roll your eyes. \"Are you sure you're not leaning toward that because it'll guarantee slaughter and carnage?\"\n\n\tDemeter makes a toothy grin. \"You know me so well, ehehe.\"\n\n*choice\n\t#Exterminate the ogres\n\t\tYou grab the leaflet and then make your way to the reception. Angelica is waiting behind the desk. \n\t\t\n\t\t\"Beautiful as always Angelica,\" Demeter says.\n\t\t\n\t\t\"Oh stop it,\" she responds.\n\t\t\n\t\t\"No you stop being coy,\" Demeter says. \n\t\t\n\t\tYou clear your throat. \"Sorry to interrupt, but we've got a quest we'd like to take on.\"\n\t\t\n\t\t\"Very good,\" Angelica says. The woman twirls a finger through her curly, brown hair. She grabs the leaflet from you and reads through it carefully. \"An ogre extermination quest. All you need to do to show proof of completion of the quest is to bring their noses.\"\n\t\t\n\t\t\"Why their noses?\" you ask. \"That's a bit of a weird request.\"\n\t\t\n\t\t\"Rather simple,\" Angelica replies. \"We used to do ears, but it became quickly apparent that adventurers would slice off two ears from a single ogre and say they had slain two of them.\"\n\t\t\n\t\t\"Alright,\" Demeter jumps in. \"I think we're ready to get on with it.\"\n\t\t\n\t\t\"Very well, follow me,\" the woman says. \n\t\t\n\t\t*page_break\n\t\tAngelica brings you to the portal room of the guild. \n\t\t\n\t\tOnce inside, she bows to the portal keeper. \"E rank Adventurers to go to the Ogre Plains, Madam Seer,\" she says. Angelica quickly retreats afterwards. \n\t\t\n\t\tThe portal keeper looks directly at you, despite her eyes being covered by a blue bandage.\n\t\t\n\t\tYou feel a huge pressure weighing down on you. The ground starts to shake and you try your hardest to not fall onto your feet. \n\t\t\n\t\t\"${name}, is that correct?\" Madam Seer asks. \n\t\t\n\t\t\"Y-Yes.\"\n\t\t\n\t\t\"Hmm, interesting…\" A black gem floats towards you. \"Don't lose this and make sure to break it once you wish to return.\"\n\t\t\n\t\tThe pressure around you starts to fade away. You sigh in relief. \n\t\t\n\t\tMadam Seer points to one of the portals. \"Go, this will take you to the Ogre Plains.\"\n\t\t\n\t\t*page_break Enter the Portal\n\t\t\n\t\tYour stomach churns as you are transported away from the Adventurer's Guild. You rub your eyes and then reach into your backpack. You grab a bottle of water and drink from it. \n\t\t\n\t\tYou look around the area, it is relatively windy and blades of grass reach all the way to your ankles.\n\t\t\n\t\t\"Watch out,\" Demeter shouts. \n\t\t\n\t\tYou turn to where his voice came from. You jump to the side. A huge breeze of wind flies past your head. As you get up you notice a large figure bulking in the distance, about twenty meters away. You turn around and see a huge mound of dirt that was thrown your way. The mound is filled with grass. \n\t\t\n\t\tThe creature glares at you and Demeter. It has a sickly bright green skin colour. It's physique is round all over, including it's face. It looks like a human baby but enlarged by a hundred times. \n\t\t\n\t\tYou cover your mouth as your stomach contents threatens to spill out at the sight of the ogre.\n\t\t\n\t\t\"Quit daydreaming let's get on with it,\" Demeter snaps. \n\t\t*label ogre\n\t\t*choice\n\t\t\t*selectable_if (water_cannon=true) #Cast Water Cannon\n\t\t\t\tYou push mana through your body and toward your arms. Once the mana reaches your palms you form it into torrents of water. You aim the torrents of water at the ogre in the distance. \n\t\t\t\t\n\t\t\t\tThe projectiles smash directly into it's chest. You furrow your brows.\n\t\t\t\t\n\t\t\t\tThe ogre is pushed back a couple steps and then roars. It's pitch is so high that you have to cover your ears. \n\t\t\t\t\n\t\t\t\t\"What the hell?\" you scream. You allow your mana to pump through your body once again and throw two more torrents at the creature.\n\t\t\t\t\n\t\t\t\tThe spell lands square on the face of the ogre, but again, it seems to have no effect aside of pushing it back a couple of steps. \n\t\t\t\t\n\t\t\t\t\"Ogres are immune to the water element,\" Demeter calls out. \n\t\t\t\t\n\t\t\t\t\"Seriously?\" \n\t\t\t\t\n\t\t\t\t\"Yes!\" The dark elf carries his blade staff and runs at the ogre. Once within a five meter range he suddenly disappears into black smoke. He reappears in the air behind the creature. He slams his blade staff down at the creature.\n\t\t\t\t\n\t\t\t\tThe ogre raises it's thick arms up defensively. Dark red blood splatters out. \n\t\t\t\t\n\t\t\t\tThe ogre turns and swings at Demeter. It connects cleanly against his torso. Demeter is thrown back.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\"Shit,\" you mutter. You push mana through your body again and then aim more torrents at the ogre. The projectiles reach it in an instant and hit it right where Demeter had wounded it.\n\t\t\t\t\n\t\t\t\tThe ogre roars. It turns its attention toward you and charges. Grass and soil is thrown up in it's path. Its approach is sloppy and slow.\n\t\t\t\t\n\t\t\t\t\"Demeter,\" you shout. \"Are you okay?\"\n\t\t\t\t\n\t\t\t\t\"I'm okay,\" he responds. \"Shoot at it's legs.\"\n\t\t\t\t\n\t\t\t\t\"Alright.\" You create two more torrents and aim at the legs of the sprinting creature. The ogre falls to the ground, staining it red with its blood.\n\t\t\t\t\n\t\t\t\tDemeter appears behind the ogre once again in a black flash. He pierces his blade staff right into the back of it's head.\n\t\t\t\t\n\t\t\t\tYou pant. \"Are you okay Demeter?\"\n\t\t\t\t*goto ogres1\n\t\t\t\t\n\t\t\t\n\t\t\t*selectable_if  (lesser_fireball=\"true\") #Cast Lesser Fireball\n\t\t\t\tYou push mana through your body and toward your palms. Once it reaches your hands balls of fire form and hover above them. You aim at the ogre in the distance.\n\t\t\t\t\n\t\t\t\tThe projectiles smash directly into it's chest. You furrow your brows. [i]Ineffective?[/i]\n\t\t\t\t\n\t\t\t\tThe ogre is pushed back a couple steps and then roars. It's pitch is so high that you have to cover your ears. \n\t\t\t\t\n\t\t\t\t\"What the hell?\" you scream. You allow your mana to pump through your body once again and throw even more fireballs at the creature.\n\t\t\t\t\n\t\t\t\tThe spell lands square on the face of the ogre, but again, it seems to have no effect aside of pushing it back a couple of steps. \n\t\t\t\t\n\t\t\t\t\"Ogres are immune to elemental magic,\" Demeter calls out. \n\t\t\t\t\n\t\t\t\t\"Seriously? Why didn't you say that before?\" \n\t\t\t\t\n\t\t\t\t\"I forgot,\" he responds. The dark elf carries his blade staff and runs at the ogre. Once within a five meter range he suddenly disappears into black smoke. He reappears in the air behind the creature. He slams his blade staff down at the creature.\n\t\t\t\t\n\t\t\t\tThe ogre raises it's thick arms up defensively. Dark red blood splatters out. \n\t\t\t\t\n\t\t\t\tThe ogre turns and swings at Demeter. It connects cleanly against his torso. Demeter is thrown back.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\"Shit,\" you mutter. You push mana through your body again and then aim more fireballs at the ogre. The projectiles reach it in an instant and hit it right where Demeter had wounded it.\n\t\t\t\t\n\t\t\t\tThe ogre roars. It turns its attention toward you and charges. Grass and soil is thrown up in it's path. Its approach is sloppy and slow.\n\t\t\t\t\n\t\t\t\t\"Demeter,\" you shout. \"Are you okay?\"\n\t\t\t\t\n\t\t\t\t\"I'm okay,\" he responds. \"Shoot at it's legs.\"\n\t\t\t\t\n\t\t\t\t\"Alright.\" You create throw a dozen fireballs aimed at the legs of the sprinting behemoth. The ogre falls to the ground, staining it red with its blood.\n\t\t\t\t\n\t\t\t\tDemeter appears behind the ogre once again in a black flash. He pierces his blade staff right into the back of it's head.\n\t\t\t\t\n\t\t\t\tYou pant. \"Are you okay Demeter?\"\n\t\t\t\t*goto ogres1\n\t\t\t\t\n\t\t\t*selectable_if (create_illusion=true) #Cast Create Illusion\n\t\t\t\tYou push mana through your body and then aim your hands at the ogre. You conjure an image of a soaring dragon in the skies above. \n\t\t\t\t\n\t\t\t\tThe ogre looks up for a moment and then turns its attention toward you. The creature roars and smashes its fists against its chest.\n\t\t\t\t\n\t\t\t\t\"What the hell?\" you scream. You push mana through your body again and try to create another illusion.\n\t\t\t\t\n\t\t\t\t\"It's pointless,\" Demeter says. \"It's too stupid to be tricked by illusion magic.\"\n\t\t\t\t\n\t\t\t\tYou bite your lower lip. \"Shit, what do we do then?\"\n\t\t\t\t\n\t\t\t\t\"Try something else, I need a little backup that's all.\"\n\t\t\t\t\n\t\t\t\t*goto ogre\n\t\t\t\t\n\t\t\t*selectable_if (thorns=true) #Cast Thorns\n\t\t\t\tYou push mana through your body and then press them onto the ground. \n\t\t\t\t\n\t\t\t\t\"I'm going to bind him, finish him off Demeter,\" you say. \n\t\t\t\t\n\t\t\t\tThe dark elf nods and then disappears in a black flash of light.\n\t\t\t\t\n\t\t\t\tYou concentrate on the vines you've formed in the ground. Once they reach the ogre you pull them out of the ground. The vines filled with thorns wrap around the ogre's legs.\n\t\t\t\t\n\t\t\t\tThe creature roars in pain as it is toppled onto the ground. [i]That's super effective.[/i]\n\t\t\t\t\n\t\t\t\t\"Nice shit,\" Demeter shouts. He appears above the Demeter, blade staff in hand. He slams the weapon down at the ogre.\n\t\t\t\t\n\t\t\t\tThe creature roars and punches at the weapon. Demeter is sent flying back. When he gets back onto his feet he spits out some blood. He smiles maniacally at the ogre. \"You little fucker.\" He then looks to you and says, \"More vines.\"\n\t\t\t\t\n\t\t\t\tYou nod and create even more vines. They wrap around the fallen ogres arms and neck. Demeter disappears in a black flash and then reappears above the enemy once again. This time the ogre can't resist as the blade pierces directly into its head.\n\t\t\t\t\n\t\t\t\tYou pant. \"Are you okay Demeter?\"\n\t\t\t\t*goto ogres1\n\t\t\t#Follow Demeter's lead\n\t\t\t\t\"I'll follow your lead,\" you say.\n\t\t\t\t\n\t\t\t\tDemeter nods. \"Okay, let's do this. Just distract it for me.\"\n\t\t\t\t\n\t\t\t\t\"No problem,\" you respond. You unsheathe your trust daggers and then run at the ogre. The creature is dumbfounded and stands frozen to the spot as you approach it. \n\t\t\t\t\n\t\t\t\tOnce you're within arms length of the ogre it suddenly snaps back to it's sense and throws a punch at you.\n\t\t\t\t\n\t\t\t\tYou dodge away from the very telegraphed attack and slice at it's thigh. The ogre roars and tries to kick you away. You once again dodge away from it and then slice at it's other leg. \n\t\t\t\t\n\t\t\t\tThe ogre roars and jumps high up into the air.\n\t\t\t\t\n\t\t\t\tYou stumble backward. Once it falls back down the whole ground shakes and you are thrown away. \n\t\t\t\t\n\t\t\t\tYou get up onto your feet but are sent flying by a heavy punch. Your insides feel like they have been crushed. You cough out blood.\n\t\t\t\t\n\t\t\t\tJust as the ogre is about to reach you Demeter flashes into existence in a black cloud of energy. He slams his blade staff into the back of the ogre's head, taking it out cleanly in one shot.\n\t\t\t\t\n\t\t\t\t\"Are you okay ${name}?\" Demeter asks. \n\t\t\t\t\n\t\t\t\tYou groan. \"Could be better that's for sure.\"\n\t\t\t\t\n\t\t\t\t*goto ogres1\n\t\t\t\t\n\t\t*label ogres1\n\t\t\n\t\tDemeter nods. He grabs a small knife and slices off the ogres nose. He then throws it to you.\n\t\t\n\t\tIt's still warm and blood drips down your hands. You quickly put the organ into your backpack. \n\t\t\n\t\tDemeter chuckles. \"One down, let's keep going.\" \n\t\t\n\t\t\"You bloodthirsty little dark elf.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tBy the time the sun starts to go down, the two of you have been able to defeat a dozen ogres. You're both battered and bruised as each fight is hard fought. Fortunately enough for you, the ogres aren't social creatures, so each battle was two against one.\n\t\t\n\t\tAfter the twelfth ogre, you break the black gem given to you by Madam Seer and return to the Adventurer's Guild.\n\t\t\n\t\tOnce back at the guild you go directly to the front desk. \n\t\t\n\t\t\"How was it?\" Angelica asks. \n\t\t\n\t\t\"Difficult,\" you reply. \"More difficult than I thought it'd be.\"\n\t\t\n\t\tThe woman smiles gently. \"You made it back in one piece, that's all that matters.\" \n\t\t\n\t\tYou hand her all of the ogre noses you'd collected, after which she hands you a bag of gold. \n\t\t\n\t\t\"Here, give me your adventurer badges.\"\n\t\t\n\t\tThe two of you hand over your silver medallions. She puts them down underneath the counter. You can't see what she does to the badges, but after handing them back she says, \"Now you're both officially D rank adventurers. Come back again when you're ready to take on some more quests. For now, I'd highly suggest you rest up. You look very rough and worn out.\"\n\t\t\n\t\t*goto_scene templars2\n\t#Escort the Merchant to Wallgate\n\t\tYou grab the leaflet and then make your way to the reception. Angelica is waiting behind the desk. \n\t\t\n\t\t\"Beautiful as always Angelica,\" Demeter says.\n\t\t\n\t\t\"Oh stop it,\" she responds.\n\t\t\n\t\t\"No you stop being coy,\" Demeter says. \n\t\t\n\t\tYou clear your throat. \"Sorry to interrupt, but we've got a quest we'd like to take on.\"\n\t\t\n\t\t\"Very good,\" Angelica says. The woman twirls a finger through her curly, brown hair. She grabs the leaflet from you and reads through it carefully. \"Escorting quest. You're going to need to travel with a merchant named Asta from Val Sola to Val Luna, he's carrying quite a few valuables that he'd rather not lose along the way. \"\n\t\t\n\t\t\"Why can't he just, you know, be teleported there?\" you ask.\n\t\t\n\t\t\"Val Luna is our sister city,\" she responds. \"Do you know of Val Luna and it's relationship to Val Sola?\"\n\t\t\n\t\tYou shake your head. \"Honestly… I've never even heard of it before.\"\n\t\t\n\t\tAngelica laughs. \"Not surprising, you've not been here for that long have you.\"\n\t\t\n\t\tYou look to Demeter but he shrugs. \"I have no clue what she's talking about either.\"\n\t\t\n\t\t*page_break Val Luna\n\t\tAngelica explains that Val Luna is the sister city of Val Sola. Where Val Sola is a hub for Voidwoken from all walks of life to live in, Val Luna is the strategic military location where all of the most powerful and prominent Voidwoken live.\n\t\t\n\t\t\"That's the gist of it,\" she continues. \"And the reason why we can't just teleport you to Val Luna is because of our defences. To allow something such as long distance teleportation would mean to create a hole in our defence system.\"\n\t\t\n\t\tYou tilt your head. \"But don't we get teleported to and from here?\"\n\t\t\n\t\t\"Yes, but that is only because of Madam Seer, she's a bit of an exception.\"\n\t\t\n\t\t\"Madam Seer?\"\n\t\t\n\t\t\"The blindfolded woman who teleported us to the goblins last time,\" Demeter says. \"Scary lady, very scary I tell you!\"\n\t\t\n\t\t\"Listen to your friend,\" Angelica says. \"Do not on any circumstance ever offend her. Do so at your own risk.\"\n\t\t\n\t\t\"Alright,\" Demeter jumps in. \"I think we're ready to get on with it.\"\n\t\t\n\t\t\"Very well, come back tomorrow at noon to meet the merchant.\"\n\t\t\n\t\t*page_break Next Day\n\t\t\n\t\tYou go back to the Adventurer's Guild the next day at noon. Once you get there, you find a merchant with a large caravan that is being dragged by thick black horses. The creatures neigh as you approach. \n\t\t\n\t\t\"Hello there,\" the merchant says and waves at you. He's quite chubby and his face is relatively round. His eyes are very small and he looks at you very cautiously. \"You must be Demeter and ${name} if I'm not mistaken.\"\n\t\t\n\t\tYou wave back. \"Good afternoon, that would be us.\"\n\t\t\n\t\tThe merchant rubs his hands together. His skin is fair and his hair dark. \"I'll keep the introductions quick since I need us to get out of here as soon as possible. I'm Timothy and I work as a travelling merchant that moves between Val Sola and Val Luna.\"\n\t\t*label merchant1\n\t\t*choice\n\t\t\t#\"What are you bringing there?\"\n\t\t\t\tThe merchant rubs his tomato of a nose. \"Just some resources needed in Val Luna, that's all.\"\n\t\t\t\t\n\t\t\t\t\"Is that so?\" You furrow your brows but don't continue questioning.\n\t\t\t\t\n\t\t\t\t*goto merchant1\n\t\t\t\t\n\t\t\t\t\n\t\t\t#\"How far is it to Val Luna?\"\n\t\t\t\t\"Not too far,\" Timothy says. \"Roughly three to four days depending on how quickly we move and whether we have to take any detours.\"\n\t\t\t\t\n\t\t\t\t\"Detours?\"\n\t\t\t\t\n\t\t\t\tThe merchant shrugs. \"You know, wild ogres or goblin ambushes. Stuff like that. That's why I'm hiring you two, to protect these valuables on the way.\"\n\t\t\t\t\n\t\t\t\t*goto merchant1\n\t\t\t#\"Let's get going.\"\n\t\t\t\tTimothy nods and then beckons you into his carriage.\n\t\t\t\t\n\t\t\t\tIt's rather spacious inside, and there is a table in the middle. On opposite ends of the carriage a soft, leathery sofas which you sit on. There is a teapot on the table in the middle and four cups. Despite the carriage moving at a quite high speed, there is no shaking or movement whatsoever. It is as still and tranquil as a pond with no fish or animals. \n\t\t\t\t\n\t\t\t\tYou look out of the window and watch as the buildings of Val Sola flash by. Soon, they start to disappear and instead give way to a forest sparse with trees. \n\t\t\t\t\n\t\t\t\t\"Why is there snow all over here?\" you ask. You notice that you've only just exited Val Sola for maybe fifteen minutes and the weather is already drastically changing. There are maple trees all around with snow dotted over them. \n\t\t\t\t\n\t\t\t\t\"Val Sola is covered in a powerful barrier,\" Timothy says. \"It's so advanced that we can even control the weather in the area around it, and it's impossible to find Val Sola unless you are a Voidwoken.\"\n\t\t\t\t\n\t\t\t\tYou rub your chin. \"I see… Couldn't one of us betray t-\"\n\t\t\t\t\n\t\t\t\tTimothy chortles. He wipes away tears and holds onto his stomach. \n\t\t\t\t\n\t\t\t\t\"Sorry about my friend… ${name} asks some stupid questions sometimes,\" Demeter says.\n\t\t\t\t\n\t\t\t\t\"What? Why is this a stupid question?\"\n\t\t\t\t\n\t\t\t\tTimothy gathers his composure and then says, \"Because who in their right mind would do that? We are Voidwoken, that means betrayal is out of the question, especially to those filthy Templars. There's not a single soul in Val Sola or Val Luna that is stupid enough to believe that our mortal enemies would ever be faithful to their words.\"\n\t\t\t\t\n\t\t\t\tYou frown. \"Hey, that may be true, but I'm just saying, if a Templar kidnapped one of your children then you might-\"\n\t\t\t\t\n\t\t\t\tTimothy shakes his head. \"No, even if they did something like that, I guarantee you there is not a single one of us willing to give away our location. And even if that did happen, there are dozens of defences in place that aren't known to us common folk.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe journey continues in relative silence for the next few hours. You enjoy watching the scenery as the carriage speeds through the vast expanse. Timothy has a tracking device that alerts him to the presence of any living beings in a nearby vicinity, however it is only effective within a five hundred meter radius of the carriage. \n\t\t\t\t\n\t\t\t\t\"How boring,\" Demeter says. The dark elf groans and throws his head back. \"Seriously, this is just the worst.\"\n\t\t\t\t\n\t\t\t\tYou hit Demeter on the shoulder. \"Hey, don't say that. You're going to bring us some bad luck.\"\n\t\t\t\t\n\t\t\t\tTimothy clears his throat. \"Now now, let's just relax.\"\n\t\t\t\t\n\t\t\t\tA high pitched beep comes out of the tracking device. You look at it. There are half a dozen red dots that have just popped up. \n\t\t\t\t\n\t\t\t\t\"Shit,\" Timothy yells. He presses a button underneath the table. The carriage makes a quick stop. He looks to you two.\n\t\t\t\t\n\t\t\t\tDemeter rubs his hands together whilst grinning. \"Don't you worry, we've got this in the bag.\"\n\t\t\t\t\n\t\t\t\tYou jump out of the carriage with Demeter. You find yourself surrounded by snow. Each step that you take is followed by a heavy crunch underfoot. \n\t\t\t\t\n\t\t\t\tYou squint your eyes. Everything in the vicinity is white. You can't make out anything but the snow, even the clouds up above seem to be the same colour.\n\t\t\t\t\n\t\t\t\t\"What are we looking for?\" you ask. \n\t\t\t\t\n\t\t\t\t\"Anything,\" Demeter says.\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (summon_hawk=true) #Summon Hawk\n\t\t\t\t\t\tYou push mana through your body and to your palms. You then raise them high into the air. A brown light flows out of your palms. A brown hawk forms in the light and then flies off into the sky. You are connected directly to the vision of the hawk. \n\n\t\t\t\t\t\tAs it flies up above you are able to make out what has been spotted by the tracking device. \n\n\t\t\t\t\t\tSix thick, grey wolves rush through the snow toward you. They are silent and swift, making no unnecessary noise. \n\n\t\t\t\t\t\t\"Wolves,\" you say to Demeter. \"Six of them, coming our way within a minute.\"\n\t\t\t\t\t\t*goto wolves1\n\t\t\t\t\t#Nothing\n\t\t\t\t\t\t*goto wolves1\n\t\t\t\t\n\t\t\t\t*label wolves1\n\t\t\t\tThe pair of you ready yourself for the incoming opponents. It isn't long until you hear howling and barking in the distance. \n\t\t\t\t\n\t\t\t\tYou squint your eyes as you see the creatures approach. The wolves almost perfectly blend into the background of the snow. \n\t\t\t\t\n\t\t\t\t\"Demeter,\" you say. \"There's six of them, we take three each?\"\n\t\t\t\t\n\t\t\t\tThe dark elf grins. He unsheathes his blade staff and says, \"Pfft, you try to get as many as you can. I'm taking down all six if you're too slow.\" He sticks out his tongue at you before rushing forward.\n\t\t\t\t\n\t\t\t\tYou sigh. \"Would you grow up, seriously.\"\n\t\t\t\t\n\t\t\t\tYou watch as Demeter slashes at an incoming wolf. The creature yelps as it is thrown away, blood splattering out into the white snow. \"One from me, catch up ${name} if you can!\"\n\t\t\t\t\n\t\t\t\tA wolf rushes past Demeter and sprints directly toward you.\n\t\t\t\t\n\t\t\t\tYou push mana through your body.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if  (lesser_fireball=\"true\") #Cast Lesser Fireball\n\t\t\t\t\t\tFlames form in your palms. The wolf stops in its tracks, it shivers where it is stood.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Scared of this are you?\" You chuckle. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wolf howls and turns around to retreat. Before it can move far enough away you unleash your fireballs at it. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wolf is singed into oblivion, only a charred corpse remains. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto wolves2\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if  (water_wall=\"true\") #Cast Water Wall\n\t\t\t\t\t\tA wall of water forms right in front of the wolf. The animal smashes into it. The wolf's head becomes stuck in the water. It moves and moves its head about trying to get out of the water but is unable to do so.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou watch as it moves it's legs about frantically, trying to get hold from the snow underneath to pull itself out. Seconds tick by and the wolf finally can't hold it's breath any longer. It starts to breath in the water. Moments after this it loses consciousness and stops moving all together. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto wolves2\n\n\t\t\t\t\t*selectable_if (thorns=true) #Cast Thorns\n\t\t\t\t\t\tYou press your hands onto the snowy ground. A vine covered with sharp thorns sprout out from underneath and rush at the wolf.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wolf jumps to side and dodges the attack. It howls and closes the distance to you.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou chuckle and control the vine. It spins back around and slams into the wolf from behind. The creature yelps as it is thrown away. The vine continues to chase after the wolf and then wraps around it.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou unsheathe your daggers and rush to the wolf before piercing it's brain.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto wolves2\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (cerberus=true) #Cast Cerberus\n\t\t\t\t\t\tA brown light glows out from your palms. A few meters in front of you Cerberus materializes. The three headed hound barks loudly as it locks eyes with the opposing wolf. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wolf stops in its tracks. It is much smaller than Cerberus.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou notice the wolf's tail lowers down and it tucks it between its hind legs.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Go get him Cerberus,\" you say. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto wolves2\n\t\t\t\t\t*selectable_if (invisibility=\"true\") #Cast Invisibility\n\t\t\t\t\t\tA purple light flashes around you and then you disappear from vision. The wolf stops in its tracks and looks around, confused. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou take slow steps toward the wolf. You notice that your footprints are still visible with each step that you take, despite making no sound at all.\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Damn it, I'll just have to make it quick.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou unsheathe your daggers and sprint at the wolf. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wolf seems to see where you're coming from and jumps back. Just as it lands on the snow you jump forward and slash at it with your daggers. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou once again become visible as the wolf's blood splatters all over your robe. [i]One down.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto wolves2\n\t\t\t\t\t#Attack head on\n\t\t\t\t\t\tYou stop the flow of mana going through you and unsheathe your daggers. You rush at the incoming wolf. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wolf howls and bares its fangs as the distance closes. It lunges forward at you.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou step to the side and kick at the wolf's stomach. The creature yelps as it is sent flying. You relent and rush to the wolf. Before it has a chance to get up you slam your dagger into its brain.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto wolves2\n\n\t\t\t\t*label wolves2\n\t\t\t\tThe battle ends rather quickly, only a few minutes after the wolves appeared all six of them have already been slain by you and Demeter. \n\t\t\t\t\n\t\t\t\tThe snow in the area is stained with the crimson blood of your foes.\n\t\t\t\t\n\t\t\t\tDemeter wraps his hand around your shoulder as you both make your way back to the carriage. \"Four kills from me,\" he says. He pinches your cheek. \"Look at you, only getting two of them by the time I'd already finished off four.\"\n\t\t\t\t\n\t\t\t\tYou gently push him away and roll your eyes. \"Seriously, you're so annoying… And such a meat head.\"\n\t\t\t\t\n\t\t\t\tDemeter grins. He shrugs before saying, \"Well this meat head right here just wooped your ass in the kill count. Better luck next time ${name}.\"\n\t\t\t\t\n\t\t\t\tWhen you step back into the carriage you notice that Timothy looks rather pale. He is biting his nails.\n\t\t\t\t\n\t\t\t\t\"Everything okay with you?\" Demeter asks. \"You look like you just saw a ghost.\"\n\t\t\t\t\n\t\t\t\tTimothy loosens his collared shirt and takes in a deep breath. \"Fighting and conflict have never been my thing,\" he says. \n\t\t\t\t\n\t\t\t\t\"I see,\" Demeter says. \"Well, let's get going.\"\n\t\t\t\t\n\t\t\t\tTimothy presses a button underneath the table in the middle of the carriage and the horses start moving once again.\n\t\t\t\t\n\t\t\t\t*page_break Val Luna\n\t\t\t\tThe next few days go by rather quickly. There are quite a few occasions where you and Demeter have to fend off attacking creatures, but none of them proved to be a difficult task. \n\t\t\t\t\n\t\t\t\tAfter four days you finally reach Val Luna. The city is hidden deep in the snowy mountains that you were travelling through.'\n\t\t\t\t\n\t\t\t\t\"We're here,\" Timothy says. \n\t\t\t\t\n\t\t\t\tYou look out of a window with furrowed brows. \"We're here? I don't see anything.\"\n\t\t\t\t\n\t\t\t\tThe merchant laughs. \"Of course you don't see anything, if you did then the defences of Val Luna would be completely useless, and we've put too much money and effort into them for that to be the case.\"\n\t\t\t\t\n\t\t\t\tThe carriage suddenly shakes and trembles violently. You look out and see a faint blue barrier in front of you. The surrounding snow starts to fade away into the blue light. Your stomach churns. Your head is thrown back violently and hits the thick wooden walls of the carriage. \n\t\t\t\t\n\t\t\t\tYou see stars in your vision.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\tYou groan and rub your eyes. There is some pain to the back of your head.\n\t\t\t\t\n\t\t\t\t\"Are you okay?\" Timothy asks. \"Sorry about that, I don't know why the portal was so violent today.\"\n\t\t\t\t\n\t\t\t\t\"I'm fine,\" you reply. \n\t\t\t\t\n\t\t\t\t\"Well, we're here,\" Timothy says. He opens the carriage door and gets out. Demeter follows behind.\n\t\t\t\t\n\t\t\t\tYou groan and gather your energy, after which you get out as well. Your eyes widen as you look around the area. \n\t\t\t\t\n\t\t\t\tIt is very dark, you look up in the sky and see a half crescent moon. In the distance you can hear marching. Every couple of seconds a person yells out a word you can't quite catch, and afterwards dozens or even hundreds of others yell out the same word in unison. \n\t\t\t\t\n\t\t\t\t\"Welcome to Val Luna,\" Timothy says. He shivers \"I'd rather we get out of here as quickly as possible. Not my favourite place in Michiwitt, I'll tell you that.\"\n\t\t\t\t\n\t\t\t\tDemeter on the other hand is looking around the area like a child in a candy store for the first time. \n\t\t\t\t\n\t\t\t\t\"Look at this ${name}.\"\n\t\t\t\t\n\t\t\t\t\"Look at that ${name}.\"\n\t\t\t\t\n\t\t\t\t\"Oh my word, seriously, there's even this here ${name}.\"\n\t\t\t\t\n\t\t\t\tYou groan as you make your way through Val Luna. There aren't many large buildings like in Val Sola, nor are there any of the numerous street food stalls and vendors. Instead, this place looks like a military camp. You walk past dozens of training grounds and witness battles between Voidwoken. \n\t\t\t\t\n\t\t\t\tYou gulp hard as you see a full five on five battle in the distance. It is complete anarchy, however there is a barrier around the group fighting. Stray stones and rocks or spells are all absorbed by the barrier. \n\t\t\t\t\n\t\t\t\t\"Right, it's time for me to hand off my items,\" Timothy says. \"You two, do whatever you want for the next hour. I'll be back at the entrance by then and we'll get back to Val Sola.\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Explore the area\n\t\t\t\t\t\tYou spend the next hour exploring Val Luna alone. Demeter decided he wanted to take part in some training, however you declined his invitation.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou find that Val Luna is a much rougher place, and the Voidwoken here rarely smile as they move about the city. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou don't find too much to explore as you are quite tired and the city gives you a very unsettling feeling. Once you're done, you meet back up with Timothy and Demeter and make the journey back to Val Sola.\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs you exit the city, you think to yourself that this is most definitely not the last time you'd be here.\n\t\t\t\t\t\t*goto wolves3\n\t\t\t\t\t#Find somewhere to rest\n\t\t\t\t\t\tYou find a quiet place away from all the noise of battle. You sit and relax whilst looking up at the starry night sky. Demeter decided he wanted to take part in some training, however you declined his invitation.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou spend the whole time like this. It is quite peaceful. Once an hour passes you meet back up with Timothy and Demeter before making your way back to Val Sola. \n\t\t\t\t\t\t\n\t\t\t\t\t\tAs you exit the city, you think to yourself that this is most definitely not the last time you'd be here.\n\t\t\t\t\t\t*goto wolves3\n\t\t\t\t\t#Try to find somewhere to train\n\t\t\t\t\t\tYou figure that you won't be coming back here for a while, and so you want to see what Val Luna is all about, much to the delight of Demeter. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou are welcomed in open arms to join in on some physical training exercises, and are brought through a short run, after which you take part in some weight training and callisthenic exercises. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe pair of you work up a good sweat, and once an hour passes by you meet back up with Timothy and make your journey back to Val Sola. \n\t\t\t\t\t\t\n\t\t\t\t\t\tAs your carriage passes through the portal out of the city, you think to yourself that this is most definitely not the last time you'll visit here.\n\t\t\t\t\t\t*goto wolves3\n\t\t\t\t\t\n\t\t\t\t*label wolves3\n\t\t\t\tOnce you get back to Val Sola you are thanked by the merchant. He gives you a hefty bounty of fifty gold pieces which you and Demeter split evenly. Once you get back to the Adventurer's Guild Angelica changes your badges, and you officially become D rank adventurers.\n\t\t\t\t\n\t\t\t\tYou don't linger on for too long and make your way back home.\n\t\t\t\t\n\t\t\t\t*goto_scene templars2\n\t\t\t\t\t\t\n\n\t\t", "alchemy1": "*temp mbalisex \"\"\n*temp drink \"\"\nYou had previously heard from Ploy that there is an institution of alchemy in Val Sola. At the Alchemical Society, they brew all manner of potions, ranging from those used for cosmetic enhancements, such as Potions of Youth, all the way to battle amplifying substances, such as the Vial of Vigour.\n\nYou make your way to the Alchemical Society with Ploy. The girl has been acting very differently ever since you returned from the Khaeng Kingdom. She's been speaking with you a lot more and you've been hanging out with her almost every single day since you woke up from your coma. \n\nPloy sticks close to you as you walk across the busy streets of Val Sola. After about ten minutes, you reach the Alchemical Society. It's a rather large building of four stories. It is adorned with many precious materials, and you can spot gold, emeralds, rubies, diamonds and even sapphires, all of which are extremely difficult to come across. \n\nAs you enter the building, you are hit by a cacophony of herbs and spices. Your sense of smell is overloaded and you cover your nose with a handkerchief.  \n\nThe room is filled with all sorts of items. There are hundreds of vials and glasses, their contents ranging in colours. Some are dark and murky, whilst others are bright and clear.\n\nYou stare at a large beaker which has a dark green, brownish liquid within it that seems to be of an extremely thick consistency. [i]I bet that tastes like month old unwashed socks.[/i]\n\n\"How may I be of assistance?\" a man calls out. You spin around and find a tanned male, a tiny bit shorter than yourself, stood in front of you. \n\nYour eyes widen. The man wears a short sleeve shirt and blue shorts. All of his bare skin, outside of his face and some parts of his neck, are covered with tattoos. The left side of his body is adorned with colourful symbols and runes, with bright blues, purples and reds being the most prominent features. The right side of his body has tattoos that are much darker, only blacks and greys visible. \n\n*choice\n\t#Marvel at the tattoos\n\t\t\"Wow,\" you say. You grab the man's hand and get a closer look. Each of the tattoos seems to be filled with arcana, and you can feel the electric crackling of it when you touch them. \"I love the art you've done there.\"\n\t\t\n\t\tThe man grins. \"I'm glad you like it.\" He stretches out his hand. \"I'm Oak, how may I assist you two today?\"\n\t\t*goto alchemy\n\t\t\n\t#Recoil in disgust at the tattoos\n\t\tYou take a couple steps back whilst furrowing your brows. You've never seen a tattoo before in your life so this comes as quite a shock to you.\n\t\t\n\t\tThe man raises a brow. \"I'm Oak, how may I be of assistance to you two today?\"\n\t\t*goto alchemy\n\t\n*label alchemy\n\"We're here to enrol in the Alchemical Society,\" Ploy quickly says.\n\nOak scowls. \"Look, I don't know what you two heard but you won't get rich overnight working for us.\"\n\n\"That's not why we're here,\" you jump in. \"We're interested in alchemy, that's all.\"\n\nOak bites his lower lip and then sighs. \"Well, as long as you know that you can't magically turn stone to gold through alchemy then it's all good here.\"\n\nPloy bumps your shoulder and then whispers, \"I'm pretty sure there's some sort of transmutation spell out there that'll do exactly that.\"\n\nOak shakes his head. \"This new generation of the youth… Don't keep your hopes up.\"\n\n*page_break\n\nThe man leads you through the Alchemical Society. On the second floor is where most of the practitioners reside. You are able to look into multiple rooms where individuals are crafting potions, the main items that are made and sold at the Alchemical Society.\n\nOn the third floor is a tattoo parlour, which Oak explains isn't there just for aesthetic purposes. Each tattoo is imbued by an alchemist to provide short term or permanent boosts to an individual. \n\n\"The short term boosts are more powerful,\" Oak explains. \"We call those active runes. They have a recharge rate, which means that after using an active rune you have to wait a set period before you can use it again. On the other hand, the permanent boosts are called passive runes, and those grant boosts to your abilities permanently. Of course, these boosts are quite a large amount weaker than an active rune's.\"\n\nOak gives you a quick tour and then asks, \"Which field do you want to learn about? We allow newcomers to join either potion crafting or runemaking, but not both until they've reached a sufficiently high enough level.\"\n\n\"Wait,\" Ploy says. \"What's on the fourth level? You've given us a tour but only on three floors, what's on the fourth floor?\"\n\n\"Don't worry about that right now,\" Oak responds. He then looks to your with a stern expression. \"So, what will it be? Runemaking or potion crafting?\"\n\nYou pause and think about it.\n\n*choice\n\t#Become a runemaker\n\t\t\"Runemaking sounds like it's more suited to me,\" you say. \"I'll go with that.\"\n\t\t\n\t\t\"What about you?\" Oak says whilst looking at Ploy.\n\t\t\n\t\tShe rubs her lips with her index finger. \"Hmm… Since ${name} is going with runemaking, it only makes sense for me to learn potion crafting.\" The girl looks at you and then sticks our her tongue. \"Who knows, maybe I'll create a love potion to give to you.\" She winks and blows you a kiss.\n\t\t\n\t\tYou scratch the back of your head and laugh nervously.\n\t\t*goto runemaker1\n\t\t\n\t#Become a potion crafter\n\t\t\"I think I'll go with potion crafting,\" you say. \"I think I'll be able to come up with some interesting things in the future.\"\n\t\t\n\t\t\"What about you?\" Oak asks whilst looking at Ploy.\n\t\t\n\t\tPloy rubs her lips with her index finger. \"Since ${name} is going with potion crafting, I'll learn runemaking instead. We'll be an even stronger power couple if we do it like this!\"\n\t\t\n\t\tYou stare blankly at the girl. \t\t\"Power couple?\" \n\t\t\n\t\tShe grins cheekily and then grabs your arm. \"Yes, a power couple. Just you and me, we're going to be in love forever.\"\n\t\t\n\t\tYou stumble back and then cough. \"Uhm…\"\n\t\t\n\t\tPloy points to your shoulder. \"And my first rune is going right there, you better be prepared.\"\n\t\t\n\t\tYou scratch the back of your neck and laugh nervously.\n\t\t\n\t\t*goto potioncrafter1\n\t\t\n\t\n\t\n*label runemaker1\n*page_break\nOak brings you to a small room on the third floor. There is a whiteboard filled with sketches and diagrams. Some are of the human body, others are of weird asymmetrical shapes that you've never seen before, and others seem to be optical illusions.\n\n\"Here you are,\" Oak says. \"Take as much time as you need. Once you're able to draw everything on this board from memory, we'll move onto the next stage of your training.\"\n\nYour mouth drops wide agape. \"A-All of this? There's like two hundred drawings, and wait, isn't this board just way too massive? There's no way I can remember all of this!\"\n\nOak chuckles and then pats you on the shoulder. \"Well, I'll just say it now then, if you can't complete this simple task within 3 days, then just give up, you clearly don't have the required skills and drive to become a Runemaker.\"\n\nOak leaves the room whilst whistling a strange, low pitched tune.\n\nYou curse under your breath. \"3 days, don't underestimate me!\"\n\n*page_break Back at Home\nYou were unable to completely memorize all of the drawings and diagrams in just a day, despite pushing through almost 12 consecutive hours. Your insides bubble and boil as you recall Oak's words and how he looked down on you, serving as fuel for you to complete this task whatever means necessary. \n\nIt is just you and Ploy at home. Demeter is out on a quest for the Adventurer's Guild, whilst Mbali is preoccupied with the Mage's Guild. You are sat on one of the couches in the living room. In front of you is a small coffee table. Dozens of pieces of paper are scattered on the table with the drawings and diagrams that you need to memorize in the next two days. \n\nYou yawn and stretch your hands out.\n\nPloy is laying on the carpeted floor, supporting her head up with a hand against her chin. She stares at you whilst smiling.\n\nYou notice the girl's gaze hasn't left you for what feels like an eternity. \"What? Is there something on my face?\"\n\nShe shakes her head, still smiling.\n\n\"Don't you have something better to do than watching me? Like, I don't know, some potion crafting stuff?\"\n\nPloy's smile turns into a grin. She shakes her head. \"I'm getting all the training I need whilst at the Alchemical Society. Now is my free time,\" she responds. She pauses and takes a deep breath. \"Am I not allowed to look at a pretty face? Is that against the
