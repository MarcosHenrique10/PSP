<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To Ashes You Shall Return — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>

      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "toashesyoushallreturn", "title": "To Ashes You Shall Return", "scenes": {"choicescript_description": "You died young. Sorry about that. But now you’re back! Your wife’s magic yanks you from death’s clutches, but power always comes with a cost. Decide if you can love the heart that doomed you before it’s too late.\n \n[i]To Ashes You Shall Return[/i] is a 31,000-word interactive novel of sapphic love and loss by Kaitlyn Grube. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nExplore the wonders of:\n• Queer romance \n• Tragedy\n• Witchcraft\n• A kitty named Tabitha\n• An unstoppable tide of existential dread\n \nThe dirt claims us all in the end. How will you live in the meantime? ", "choicescript_stats": "*stat_chart\n\tpercent Humanity\n\nCREDITS\n\nStory: Kaitlyn Grube\n\nArt: Hannah Wolffman\n\nDedicated to the friends who fill my life with warmth and kindness. I love you more than words could ever express.", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Turn off all ads and delays.\n  \n  *purchase_discount adfree 2025-07-10 $2.99 $1.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to turn off all ads and delays.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "dust": "*set humanity \"1\"\n*label 5scene_1\nThe concept of a body is a distant memory. You are dust on the shelf that once held your skull, timeless and fading in and out of memories like breath through lungs. \n\nThe house is empty. The mountains of trash that dominated the living room have all been rounded up into trash bags and carted away, the furniture beneath wrapped in plastic and moved out in a blink. All that remains is the beige carpet you always promised to replace and white walls repainted to erase any signs of inhabitation. The window on the far wall is propped open to let the wind carry inside, taking a few of your particles with each gust and scattering them. \n\nLayla bustles from room to room, doing last-minute cleaning and scavenging leftover items that were missed in the initial moving process. She stands taller than she has in recent memory. The bags beneath her eyes have faded to nothing more than darkened scars. Her hair falls delicately down to her shoulders, glossy and shining in the midday light. Her eyes are framed by new wrinkles, but possibility crackles in their mahogany depths, mingling with the evident melancholy in her expression until you start to ache. She hums softly as she drifts around the house. It’s the same tune as the one that brought you back from oblivion so long ago, and the sound lulls you into a drift of memories that has gotten easier and easier to embrace.\n*page_break If the end\n*goto 5scene_2\n*label 5scene_2\nLying on the dew-covered grass is a balm against the heat of the morning sun. The air is sweet with the honeysuckle blooms trailing up the garden fence and the violets your mother so carefully tends. Your mother kneels beside you, gently cupping soil in palms rough with callouses. Her cardigan fans out behind her, trailing on the ground, and you pluck dandelions to tuck away in her pockets when she isn’t looking. She will bemoan having to fish out all the fluff later, but for now, she grins to herself and pretends not to notice the flurry of your stubby child hands. She finally gives up the façade when a piece of dandelion flies up your nose and makes you sneeze profusely. The joy in your mother’s laugh sticks with you long after the moment passes.\n\nImages flash by without rhyme or reason. The soft down of mulch beneath a tree with a canopy so thick it blots out all but the most pioneering of sun beams. The inside of a suitcase, staring up at a zipper that bobs each time it brushes against someone’s knee. Being suspended in mid-air, mingling with particles that saturate the atmosphere like shattered diamond fragments, reflecting light in infinite conversation with one another.\n\nLayla’s face materializes once again. Her hair is long, trailing behind her like the tail of a star as she leaves the kitchen in her old apartment. She misjudges the clearance on her left side and slams her elbow into the doorframe with a sound that makes you both wince even before the pain has a chance to settle in. A friend of yours is visiting with her toddler, removing the opportunity to swear, although you can see the impulse flash across Layla’s face with violent abruptness. Instead, she mutters something so roundabout and nondescript that you realize, incredibly and without any warning, that you are in love with this woman. And once Layla turns back to you, eyes and mouth agape, you realize you said as much out loud without meaning to.\n\nEverything seems to come back to her, doesn’t it? Every memory, every itch of emotion in your chest, somehow twines through time and winds up at Layla’s fingertips.\n*page_break was inevitable,\n*goto 5scene_3\n*label 5scene_3\nYou watch from a distance as a young, wispish Layla leaves a house you don’t recognize: a single-story place with windows shined to perfection and a manicured but desolate-looking lawn. Tears run down Layla’s face, but the hard set to her brow suggests that anger walks hand-in-hand with her sadness. She has a single suitcase in one hand while the other is clenched in a fist. A woman with grey hair but the same mahogany eyes flings open the front door behind her, shouting something unintelligible. A man’s head pokes out from her other side. He places a hand on the woman’s shoulder, trying to calm her, but she shakes him off and shouts something that makes Layla’s shoulders go rigid. She pauses in the driveway. She screws her eyes shut, shakes her head, and keeps walking without turning back.\n\nThe world reshapes in a blur of color and Layla is walking up to a bright purple house in the midst of a pine forest. A single streak of grey carves along her scalp and there is an aged tranquility to her gaze that you don’t recall seeing in her before. She hesitates on the threshold for only a moment before knocking. Two faces—apprehensive at first, then smiling—draw her inside, enveloping Layla in warmth and candlelight. Relief settles in Layla’s expression like a cat curling up to sleep.\n\nThe interior of the purple house twists and morphs into the house you and Layla shared. The living room unfolds like the birthday card from your mother that you read countless times. Layla is curled up on one end of the mustard-colored couch with her knees tucked to her chest, gazing upon you with adoration. You see yourself, too, sitting on the opposite end of the couch with the earnest uncertainty of someone who is unaware of the indelible space they carve out of the world. This house would cement that mark, for the brief moment you belonged to it.\n*page_break did the love\n*goto 5scene_4\n*label 5scene_4\nThe house remains unchanged and yourself a constant observer from the shelf tucked away in the living room, but the details within start to shift.\n\nA man and woman you don’t recognize stand in the corner of the kitchen, hidden save for the anxious curve of their shoulders, talking in voices that speak of quiet but undeniable resentment. A little boy bangs two monster truck figurines together and makes revving noises to drown them out. He rolls the cars along your dusty shelf, picking up little particles of you as he does so, and you see that while this moment will stick with him, as it does you, it will not shatter him.\n\nA man sits on the floor with his back against the front door. A bottle of whiskey teeters in one hand. He repeats this cycle, day after day, ignoring a cell phone that buzzes indefinitely with missed calls. One day, he finally picks up. He and the person on the other end of the line both end up crying. He leaves the next day and does not return, but you hope on his behalf, as you do all the others.\n\nFinally, you see yourself and Layla again, snuggled up together beneath a horde of blankets while a movie blasts out from the TV that leaves you both buried in a mountain of tissues by the end. Once the credits roll, Layla presses her feet against your thighs to get your attention. You turn to face her, your lips twitching up in the barest hint of a smile, and Layla’s eyes rove over you as if drinking you in.\n\n“This world was made for us, my love,\" she says. \"This little pocket of space and time. All yours, all mine.”\n*page_break still\n*goto 5scene_5\n*label 5scene_5\nYour surroundings come back into focus as Layla enters the room. The present Layla, you think, but it is getting harder to tell. She takes a look around the empty room and her smile turns rueful, as if she too is awash in memories. \n\nThe air stills with a sense of finality. Layla takes a deep breath, her sigh disturbing the air around you, and then she stiffens. She crosses the room toward you in a handful of hurried steps and reaches up to the shelf on which you reside. Her fingers close around the only remaining object: your wedding ring. Layla bites her lip and turns the ring over in her hand, watching the sunlight play off its surface. She hesitates for a long moment before putting the ring in her pocket.\n\nYou watch as Layla walks to the front door. She opens it, letting the midday sun streak in and banish the shadows that remain. She takes one last look around the house, and though her eyes travel over your space on the shelf, they never settle on you directly. \n\nLayla raises her palm, kisses it, and blows a gust of air into the empty room. Then she steps over the threshold and shuts the door behind her with a soft click.\n*page_break matter?\n*goto 5scene_6\n*label 5scene_6\nWind breathes in through the open window.\n*choice\n\t#Leave Vivien to her fate.\n\t\t*goto_scene ending\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 7200 $1.99 $0.99", "garden": "*advertisement 1200\n\n*set humanity \"80\"\n*label 2scene_1\nThe dawn of May brings with it the beauty of a world exploding with color but also a humidity that makes the air thick and slightly noxious. Layla leads you by the hand through botanical gardens brimming with sunflowers as tall as men and rose-entwined archways that herald fields of summer green. For a moment, things feel almost normal.\n\nA week has passed since Layla brought you back from the dead, and you can tell something isn’t right.\n\nIt started with little things. Shedding more in the shower. Lacking your usual food cravings. Waking up in the morning hours before Layla, watching her contented, sleeping face because you couldn’t admit defeat and get out of bed to start the day. \n\nBut then three days went by and you hadn’t taken a single bite of food. Sleep started to evade you entirely but with no ill effects. And then, one morning, a few stray strands of hair in the shower drain turned to a fist-sized clump with part of your scalp still attached. That was a little harder to ignore.\n\nIt doesn’t hurt, at least. But falling apart at the seams is just as disconcerting and gross as you imagined. \n\nNow, as you walk through the gardens, you have drowned yourself in full winter gear despite the humidity—hoodie, face mask, beanie—to cover the pockmarks on your skin that grow larger with each passing hour.\n*choice\n\t#Secure your mask.\n\t\tYou pull your face mask higher onto your nose, fighting the urge to dry heave as your own rancid breath is trapped by the fabric. You duck your head and follow Layla further into the botanical gardens.\n\t\t*goto 2scene_2\n\t#Hide your hands in your hoodie sleeves.\n\t\tYou drew the line at winter gloves when you left the house this morning, worried that passersby would mistake you for a bank robber or something, but you are regretting that decision now. You draw your hands further into the sanctuary of your sleeves to hide the scabs on your palms and the fingernail that looks a sneeze away from falling off entirely. You duck your head and follow Layla further into the botanical gardens.\n\t\t*goto 2scene_2\n\t#Pull up your hood.\n\t\tYou yank your hood tighter over your head, self-conscious about the bald spots you tried to conceal by parting your hair differently. The fabric itches against your scalp more than it should. You duck your head and follow Layla further into the botanical gardens.\n\t\t*goto 2scene_2\n*label 2scene_2\n\n“You got a destination in mind?” you ask, noting the purpose with which Layla is tugging your hand.\n\n“You’ll see.” Layla avoids your gaze, but you catch a glimpse of her coy smile.\n\nThe two of you weave through a maze of hedges trimmed to perfection and burst out into the sunlight. Layla skids to a stop and pulls you closer, molding you into the curve of her body. She nods to indicate the world in front of you, grinning, and your breath catches when you follow her gaze. \n\nA sea of violets in full bloom spreads out before you. The wind sends ripples along its surface like waves breaking against the shore. Butterflies and bees arc through the air like fish leaping out of water before sinking back below the leafy canopy. Trees frame the flowers in the far distance, but the field is so vast that you could dive into the violets and swim in them for hours before emerging on the other side. \n\nLayla stands with you in silence. Her hand gently squeezes yours.\n\n*choice\n\t#Smell the flowers.\n\t\tYou tilt your chin so the wind can better caress your nose, carrying a scent simultaneously like the sweetness of childhood and fresh laundry. The memory returns of the summers you spent in your mother’s garden watching her hang bed sheets on a clothesline to dry in the midday sun. Transparent white fabric billowed in the wind, sending the sunlight dancing across your eyes and carrying with it the smell of home. \n\n\t\tYou recall your mother emerging from the house, always careful not to let the screen door slam, carrying with her the violet seedlings she so painstakingly cultivated during the early spring months. She sat in the dirt beside you, digging into the freshly tilled soil with her hands to create a bowl in which to place the seedlings. The combination of your mother’s perfume, wet dirt, and laundry felt discordant and strange at the time, but now, you would give anything to be enveloped by it again.\n\t\t*page_break\n\t\t*goto 2scene_3\n\t#Touch the flowers.\n\t\tYou stoop down and brush your fingertips over the nearest flower. The petals are soft as the linen cardigan your mother always wore when she worked in the garden. The memory returns of the summers you spent in your childhood home, lying in a carpet of grass still wet with morning dew while your mother tended to the garden. Your stubby little fingers wove bracelets out of blades of grass you plucked from the soil, coiling and uncoiling in unpracticed but dedicated hand eap onto the bridge like a crocodile and drag you under the water.\n\t\t*page_break\n\t\t*goto vivien_5\n\t#Hang back.\n\t\t“You know what? I’m good,” you say, eyeing the horde of koi with suspicion. You crouch low on the bridge to watch Layla interact with the fish. Her expression grows brighter with delight the closer the mob becomes, but her face falls when the koi bypass her entirely and swarm at your feet instead. \n\n\t\tDozens of fish weave together in a tapestry so dense you can’t tell where one fish ends and another begins. They slide over one another, thrashing and squirming, trying to get as close to you as possible. A chorus of toothless mouths gape open, swallowing empty air with the desperation of a starving man.\n\n\t\t“Fine. I see who the favorite is,” Layla pouts, folding her arms. \n\n\t\tYou open your mouth to reassure her before your heart sinks into your stomach. The fish must smell the decay lurking beneath your skin and think you are a piece of detritus to fight over and consume. You aren’t a benefactor to them. You are food. The same as you were food to the ant below the hedge and the worms below the soil and all the other critters that were meant to claim your flesh when you died.\n\n\t\t“You can keep them,” you say hoarsely, the words sticking in your throat, and you back as far away from the water’s edge as the bridge will allow.\n\t\t*page_break\n\t\t*goto vivien_5\n*label vivien_5\nYou and Layla both jump as two shapes come barreling past. Layla curls into herself, her hand clutching her heart for a moment before the tension flees her body.\n\nThe intruders are only kids. They skid to their knees at the edge of the water, holding a tub of blueberries. Their stubby fingers grasp great handfuls of fruit and toss them into the water. Laughter consumes the pair when the koi snatch up the food in a frenzy, giggling in a way that makes you feel hopeful and melancholy at the same time.\n\nThe world is moving on without you. These children will n*choice\n\t#Express understanding.\n\t\tFor as much of a chore as school was during your teenage years, being stuck in a classroom every day isn’t so bad now. It lets you be around people again, for one thing. Even the simple act of seeing tired, caffeine-fueled faces enter the room and hearing idle chatter makes each day feel less like cyclical purgatory. And since your olfactory senses are gone, you can’t even be tormented by the kids who haven’t discovered deodorant yet.\n\n\t\tOf course, with the joy of seeing people arrive comes the dread of watching them leave. But you don’t know how to put into words the heaviness of silence descending upon a room you’ve only ever associated with voices and the shuffling of papers. It feels like looking up through a casket while people walk away from your grave, and you are voiceless, unknown, and unending. But there is no single sentence in the world to convey that feeling, and so you settle for less.\n\n\t\tYou walk up to the whiteboard at the front of the room and write in shaky, stilted script as you get the hang of holding the marker in unfamiliar hands.\n\n\t\tIT’S NOT ALL BAD.\n\n\t\tLayla’s brow smooths in relief. She goes back to sifting through her leather book, sparing you the occasional glance over the pages. \n\n\t\t“Good. That’s good,” she mutters, seemingly more to herself than to you. Her tone suggests she accepts a forgiveness you didn’t intend to convey, and something prickles within you as you set the marker down. “Now, go find the other ingredients, if you would. I’ll make sure nothing combusts.”\n\t\t*page_break\n\t\t*goto 3.5scene_5\n\t#Express resentment.\n\t\tAnger rushes through you like a tide of blood you no longer possess. It feels muted but hollow in a way that aches rather than diminishes. You take the marker in hands steadied by your white-knuckle grip and march up to the whiteboard.\n\n\t\tYOU PAWNED ME OFF.\n\n\t\tSilence slaps the room after you set the marker down. Layla stares at the words ove and double doors below that lead to instrument storage: a veritable cavern of exposed, creaky wood with instrument cases lined up in cubbies like cadavers in a morgue. \n\nApart from the percussion equipment—snare drums, xylophones, hi-hats, and such—lined up on the upper risers, most of the furniture is laid out just before you on the lowest elevation. A conductor’s podium stands surrounded by a massive semicircle of plastic chairs. A whiteboard spans the left wall and acts as a backdrop with poorly-erased diagrams showing how to replace a woodwind reed without breaking yourself or the instrument. An upright piano looms against the far wall with keys browned with age, a missing music stand, and rainbow-colored flowers painted on the side. A trumpet lays forgotten on the chair just beside it.\n*choice\t\n\t#Play the piano.\n\t\tYou amble towards the piano with no small amount of uncertainty, but the silence is a chain that begs to be broken. You try to play the lullaby your mother taught you as a girl, but your fingers are clumsy and your movements stilted without muscles to guide them. You play a single correct note, then a wrong one that haunts the air, and then you admit defeat.\n\n\t\tThe room is surprisingly bright, given the hour. The walls are white concrete, like the rest of the school, but a panel of narrow windows dominates the back wall, just below the ceiling. Moonlight floods the room, bathing every corner and illuminating particles of dust in the air like specters. The particles frolic through the air, brushing your body, dipping down to the carpet before changing their minds and bounding back up towards the ceiling. Their presence surrounds you until you can practically see the ghosts of all the students who passed through this room, talking and laughing with instrument cases hanging at their sides. You hear the faint echo of a thousand symphonies, of a beginner’s instrument squawks and the swelling of hearts on the first successful run-through of a piece. You see fingerprints on brass as instruments are gifted from one generation to the next and the proud stature of those who leave for better futures.\n\n\t\tYou feel a parade of specters brush past you without a thought, but when you turn to watch the ghostly procession, you are completely, utterly alone.\n\t\t*page_break\n\t\t*goto 3.5scene_6\n\t#Play the trumpet.\n\t\tYou retrieve the trumpet from the chair and hold it up, trying to recall your brief stint with the instrument during your teenage years. But once you bring the mouthpiece up to your face, you realize that you have no lungs with which to breathe. In fact, you cannot remember what it feels like to inhale. Brass clangs uselessly against your teeth, rattling your jaw and filling the air with the least musical sound you can imagine. You lower the trumpet in defeat.\n\n\t\tThe room is surprisingly bright, given the hour. The walls are white concrete, like the rest of the school, but a panel of narrow windows dominates the back wall, just below the ceiling. Moonlight floods the room, bathing every corner and illuminating particles of dust in the air like specters. The particles frolic through the air, brushing your body, dipping down to the carpet before changing their minds and bounding back up towards the ceiling. Their presence surrounds you until you can practically see the ghosts of all the students who passed through this room, talking and laughing with instrument cases hanging at their sides. You hear the faint echo of a thousand symphonies, of a beginner’s instrument squawks and the swelling of hearts on the first successful run-through of a piece. You see fingerprints on brass as instruments are gifted from one generation to the next and the proud stature of those who leave for better futures.\n\n\t\tYou feel a parade of specters brush past you without a thought, but when you turn to watch the ghostly procession, you are completely, utterly alone.\n\t\t*page_break\n\t\t*goto 3.5scene_6\n*label 3.5scene_6\nSchools seem to be the graveyard for the unwanted. Just like the chemistry lab, the music room is filled with objects strewn about the room without a proper home. The lowest riser is populated only with a bag of violin strings, unopened in the original packaging. The trumpet from earlier is accompanied by a bottle of valve oil on the adjacent seat. A metronome sits precariously on the conductor’s stand, tilting sideways as if threatening to leap to the ground, and a lone wooden mallet lies on the floor below a xylophone as if dropped and forgotten. \n\nYou retrieve the second slip of paper Layla gave you. It reads:\n\n“I am a drifter between the immovable, the accelerant of sanctuary and destruction. I trickle in tandem with the river but skitter from its touch like a scorned lover.”\n\nWhich object do you choose?\n*choice\n\t#The violin strings.\n\t\tYou palm the strings, hold it close to your sternum, and hurry back to the chemistry lab. \n\t\t*goto kaboom_1\n\t#The valve oil.\n\t\tYou pick up the valve oil, clutch it tightly in your hand, and return to the chemistry lab with renewed purpose. Layla accepts the object gratefully. \n\n\t\t“Alright. Let’s throw it in,” she declares. She measures out some of the oil, then sprinkles it atop the wristwatch, which still glows faintly. As the droplets rain down onto the metal, Layla recites another passage from the leather-bound book beside the Bunsen burner.\n\n\t\tThe effect is immediate. The oil does not ignite. Instead, the soft glow surrounding the wristwatch brightens, and it begins to hum. The sound doesn’t resemble a voice, nor any instrument, but an unfamiliar, bone-deep rumble. If the echoing feeling of hitting your funny bone had a noise, this would be close to it.\n\n\t\tYou clap your hands in delight in the same moment Layla lets out a colossal sigh of relief. You’re two for two so far. Layla throws you an appreciative glance, at which you give her a mock salute.\n\t\t*page_break\n\t\t*goto 3.5scene_7\n\t#The metronome.\n\t\tYou palm the metronome, hold it close to your sternum, and hurry back to the chemistry lab. \n\t\t*goto kaboom_1\n\t#The wooden mallet.\n\t\tYou palm the mallet, hold it close to your sternum, and hurry back to the chemistry lab. \n\t\t*goto kaboom_1\n*label 3.5scene_7\n“Not bad. I might make a witch out of you yet,” Layla teases with a flirtatious smile, and you realize how much you have missed this side of her. You hold her gaze for a moment before her grin falters and the moment is lost. She looks away and her jaw works like she’s chewing the inside of her cheek. \n\nYou offer Layla a tiny, hesitant wave to garner her attention. She gives it slowly, like she is afraid to gaze upon you, and alarm sprouts within your hollow chest.\n\n“Vivien,” she says, each syllable sounding like a chore, “do you hate me for bringing you back? Even a little?”\n\nThe question steals all coherent thought for several moments. Sure, Layla has asked about your well-being several times since you were resurrected. She even pondered aloud whether the ritual was worth it—if she was causing you both more pain in the long run. But she has never asked whether your feelings toward her had changed.\n\nWhen you said your vows on the altar, you meant every word. Each promise felt natural, inherent, unchallengeable. You and Layla had your fights, true, but nothing that couldn’t be solved with apologies or a vulnerable conversation. Nothing that would qualify as a true schism. But your undeath shook the earth between you, creating a fault line that seems to be drifting wider with each passing day. Is it still possible to bridge that gap? Do you want to?\n\nYou walk up to the whiteboard and palm the red marker, realizing that a single nod or shake of your head won’t suffice.\n*choice\t\n\t#Accept things have changed.\n\t\tYou hesitate before the first letter, realizing simultaneously how much these words will hurt Layla but that they need to be said. Each word feels like condemnation and clarity in equal measure.\n\n\t\tIT WOULD BE HARD NOT TO.\n\n\t\tLayla stares at the writing for a long time and says nothing. Her mahogany eyes, so filled with joy and mischief in your memories, grow haunted the longer you look into them. She takes a long, tremulous breath.\n\n\t\t“I can hardly blame you. I would feel the same way in your shoes,” she admits quietly, her voice hanging in the air like the toll of a bell, and then she turns toward the spell again. Your dismissal is clear.\n\t\t*page_break\n\t\t*goto 3.5scene_8\n\t#Build a bridge.\n\t\tThe words flow from your hand as easy as breathing. No matter how circumstance changes your minds or bodies, some things are constant. Indisputable.\n\n\t\tI COULD NEVER.\n\n\t\tYou expect relief to cross Layla’s face, but the laugher that explodes from her lips is not borne of joy. The sound is harsh and contemptuous, hitting you harder than an act of violence ever could.\n\n\t\t“I don’t believe you,” Layla says.\n\n\t\tYou stare helplessly at of the spite on her face. What other words would suffice to convey how much you love her still? What touch could you offer in a body with all its softness stripped away? Your love is an immutable fact of life, unaltered by suffering or grief or hopelessness, but does that even matter if those feelings can’t reach her? \n\n\t\tHow can you accept the fact that her love for you might have diminished?\n\n\t\tLayla’s sneer falters the longer she stares at you. Her face softens into something like regret.\n\n\t\t“Forget what I said, Vivien. That was about me, not you. Just…just give me a minute,” she murmurs, and you cling onto the compassion in her mahogany eyes like a lifeline. She returns to fussing over the spell, leaving you to find the last ingredient.\n\t\t*page_break\n\t\t*goto 3.5scene_8\n*label 3.5scene_8\nYou exit the chemistry lab and head the opposite direction from last time, emerging at the end of the science hallway into the cafeteria. The room is so large that it feels like you could shout and the echo would become its own separate entity by the time it reached the opposite wall. Most of the room is the same depressing color palette as the rest of the school: white tile, grey tables, hard plastic seats screwed into the floor so no one can run off with them. But a six-foot statue of a frog—the school mascot—stands proudly at the center of the room, a beacon of golden, ostentatious school spirit amongst the defeat of windowless concrete. \n\nThe signs of inhabitation are hard to miss despite the emptiness of the cafeteria. Purple and green banners for back-to-school celebrations have been defaced by ketchup stains that look like someone aimed a condiment bottle like a water gun and the remnants dripped down the fabric and onto the floor. Forgotten objects litter the room like gravestones fallen into disrepair: napkins, pizza crusts, candy wrappers, even a textbook with the pages ripped out.\n\nIt's easy to imagine the cafeteria during the school day, although you are always consigned to the biology room. The sounds of laughter, swearing, and shouting are audible even from down the hall most days. You make a game out of imagining the drama unfolding just out of sight. One kid makes one too many “yo mama” jokes and starts a fistfight. Another yells at them to shut up while they finish their homework. Another realizes their friends are graduating at the end of the year and shoves down the impending dread. Another falls in love. Another chain smokes in the security camera’s blind spot. The quintessential high school experience.\n*choice\n\t#You hoped to have kids someday.\n\t\tYou and Layla had given the idea serious thought in the months leading up to your death. Researched adoption agencies. Interrogated parents you knew. Asked so many questions that social workers sighed as they picked up your calls. \n\n\t\tThe idea of having kids sounded impossible for much of your life. Finding a steady job was more floundering than stable footing. The prospect of meeting a sane person through a dating app, let alone marrying them and agreeing to kids, seemed like a pipe dream. But then you found Layla and the details of your life fell into place in the shape of her. \n\n\t\tYou stare across the empty cafeteria and wonder whether a child of yours would have gone to this school someday. You could have been their cheerleader at all their games, or competitions, or shows, or whatever extracurricular they chose, shouting their praises from the audience loud enough to turn their cheeks beet red from embarrassment. You could have held them during their first heartbreak, celebrated their first job, shepherded them away from the mistakes you once made. \n\t\t\n\t\tIn another world, you and Layla would be planning to be parents. But in this one, that dream crashed down the moment your heart stopped.\n\t\t*page_break\n\t\t*goto 3.5scene_9\n\t#Wonder about future generations.\n\t\tThe months before you died were so normal and simple that it aches to remember now. Layla would come bursting through the door after work with a dozen new stories about how the students were driving her up a wall. Jimmy set his hair on fire. Deshawn thought it would be funny to make his experiment explode. Raina put a dead possum in the cabinets again.\n\n\t\tAll of Layla’s stories made you afraid and in awe of the next generation in equal measure. Their chaos would be a whirlwind that took the world by storm, for better or for worse. While part of you wished the kids would mellow with age and settle into adulthood much as you had—modest expectations and quiet but insistent resistance against the status quo—the other part of you wanted to watch the fire catch.\n\n\t\tNow, you are consigned to watching the world move on as a ghost dragged back to this plane on a technicality. The otherness of your body and the experience of death that no living person shares create a divide that yawns wider with each passing day. How much longer can you stand to drift away, even if your body’s deterioration were to halt right this moment? \n\t\t*page_break\n\t\t*goto 3.5scene_9\n*label 3.5scene_9\nYou shake your head to bring yourself back to the present. All that matters right now is finding the correct ingredients for the spell. If it succeeds, everything will go back to normal. Your flesh will regrow, you can go out in public again, and your relationship with Layla will repair itself like kintsugi. All of it hinges on getting this last part right.\n\nA closer look around the room reveals more forgotten objects left to the mercy of the midnight gloom. A bowl of tater tots is on its side on the nearest table, spilling crumbs across its surface. An ink pen, still clicked open, lies next to some wall graffiti of a tyrannosaurus rex with a tank turret coming out of its head and lasers for eyes. A salt shaker sits innocuously on the condiment table in the corner. A single plastic knife covered in red (tomato sauce, you hope) has been flung onto the ground across the room.\n\nYou take a look at the last riddle. It reads:\n\n“I am a boon of the earth, a harbinger of pain and pleasure stacked upon the preexisting. I am the line in the sand: protection, protest, point of no return.”\n\nWhich object do you choose?\n*choice\t\n\t#The tater tots.\n\t\tYou palm the food, hold it close to your sternum, and hurry back to the chemistry lab. \n\t\t*goto kaboom_1\n\t#The ink pen.\n\t\tYou palm the pen, hold it close to your sternum, and hurry back to the chemistry lab. \n\t\t*goto kaboom_1\n\t#The table salt.\n\t\tYou grab the salt shaker and beat feet back to the chemistry lab. Layla seems just as anxious as you; she is bouncing on the balls of her feet when you walk in.\n\n\t\t“Nice job. Ready? Fingers crossed.” Layla takes the shaker and sprinkles salt over the watch and the oil, which makes a soft fizzing sound on contact. Then she holds up her leather book and recites the last verse of the spell. The Latin words are music on her tongue, leaving the air bereft and heavy when she finishes. Then all you can do is wait.\n\n\t\tMovement above the fire catches your eye. Your gaze snaps to the face of the wristwatch as the hands start ticking backwards, slowly at first, and then speeding up until they race like a stuttering heartbeat. The watch glows brighter. The humming from before crescendos until the sound tears at the very fabric of the world, blurring the edges of your vision.\n\n\t\tAnd then it stops.\n\n\t\tThe clock gives one more pathetic tick and then stills. The light and the humming both fade into nothing. Even the Bunsen burner shuts off with no prompting from you or Layla, leaving the room in darkness and silence.\n\n\t\tYou expect to feel something change: lightness filling your body from the toes up, the prickles of new growth from your bones, even a sense of relief. But you feel nothing. Not even disappointment.\n\t\t*page_break\n\t\t*goto 3.5scene_10\n\t#The plastic knife.\n\t\tYou palm the plastic, hold it close to your sternum, and hurry back to the chemistry lab. \n\t\t*goto kaboom_1\n*label 3.5scene_10\n“No. No, no, no. That can’t be it.” Layla’s voice starts as a whisper and gains traction with every word. The blankness in her expression darkens with a heat that simmers up from her coal black eyes. “There has to be more. Not after all this time, the research, the hope I let myself feel. This has to work.”\n\nYou stare helplessly at Layla as she paces back and forth, stewing in her anger. Any words you could offer to soothe her have been stolen by the choices she made. \n\n“Is this the best my magic can do?” Layla throws up her hands and stares past the ceiling, shouting at the sky. “I studied this nonsense for a decade and the best I can do is a parlor trick? I was going to help people. I was going to save people. And this is all I have to show for it? Turning the woman I love into a monster, unable to save her from my own goddamn failure?” \n\nLayla stops pacing suddenly and stares daggers at her leather spell book. Then she marches over, picks it up, and launches it at the nearest cabinet. The glass doors shatter on impact, raining particles onto the floor that glitter like the sea in sunlight. Layla stares at the shards like she is trying to reclaim her hope in the mess.\n*choice\n\t#Clean the glass.\n\t\tFor the first time since you skeletonized, you’re thankful you don’t have skin to break. You stoop down, pick up the book as a dustpan, and start scooping up the glass. Before you can clean more than a handful, however, Layla’s voice makes you freeze.\n\n\t\t“Leave it,” she shouts in a tone so venomous it sends a shiver up your spine. You lower the book to the ground slowly and back away. “I’ll get it later. I’ll…figure out everything later. Just get out.”\n\n\t\tYou gaze upon the self-loathing on Layla’s face and realize this night has broken something in her that she might never get back. Worse yet, your presence only serves as a reminder. You exit the room with a heavy conscience and the realization that you barely recognize the woman you are leaving behind.\t\n\t\t*finish\n\t#Confront Layla.\n\t\tYou move forward to stand in front of Layla, waiting for her to recognize your presence. Your own anger bubbles up the longer you wait. Why does she get to yell and throw things when you are consigned to screaming in silence? Does she not think your chest aches so badly you’re convinced for a moment that your heart was restored after all? How has it become your responsibility to cater to her feelings, her outbursts, when you have been reduced to a shadow?\n\n\t\tWhen Layla finally raises her head to meet your eyes, she looks away again just as quickly, as if she can't stand to look at you.\n\n\t\t“Get out.” Her voice comes as a whisper at first. She scowls when you don’t move. “Get out! Don’t look at me like that. I know, okay? I know! Just get the hell out!” she screams, her breath coming in ragged gasps. \n\n\t\tYou hold her gaze for a moment more, waiting to see if she will change her mind, before you turn and silently leave the room. Layla does not call after you, but you see the last piece of the woman you knew dissolve in her eyes as you shut the door. \n\t\t*finish\n*label kaboom_1\nLayla snatches the object from you and plops it into the bowl in a hurry. She recites a string of Latin from the leather-bound book in her hand and you both watch the spell with bated breath. \n\nHope sparks in you as a gentle red light emanates from the bowl. That hope is handily shattered, however, when the light extinguishes with a puff of smoke and a sound like someone lets out a single rasping cough.\n\n“No. You’ve got to be kidding me. No.” Layla shuts the book with a snap and leans over the spell, eyes wide with disbelief. The longer you watch her, the more her befuddlement shifts to something darker. She turns on you with such ferociousness that you take a step backwards on instinct. “I shouldn’t have let you help with this. Of course you got it wrong. Of course,” she snarls. “Why did I think you would take this seriously? You’re not a mage. You never tried to understand this part of me—never have, never will. I should have known better.”\n\nSeveral things happen simultaneously. The last words leave Layla’s mouth in a cluster of hard sounds. A loud clang drowns out the final syllable. And your body tips like a scale with the weights removed from one side.\n\nYou and Layla both look down to find your arm—your dominant one—lying on the floor, unattached.\n\n*choice\n\t#Express your frustration.\n\t\tThe combination of your arm lying on the floor like roadkill and Layla’s angry stare is too much. You kneel down, teetering as you get used to your new lopsidedness, and pick up your limp, fallen appendage. Then you slam it down on the desk in front of Layla and walk away.\n\n\t\t“Vivien,” Layla barks. You can feel her gaze boring into you from behind. “Vivien. Where are you going? Vivien!” \n\n\t\tScrew what Layla thinks. She is pawning all the blame off on you? She can deal with the aftermath by herself. You feel a sense of righteousness as you walk away, but also the hollow, sinking feeling that each step you put between you is a distance you will never be able to bridge again.\n\t\t*finish\n\t#Jam your arm back on.\n\t\tThe silence hits you like a club to the back of the head. In the absence of real solutions, the only thought that occurs to you is that the biology students will wonder where your arm went. You kneel down, teetering as you get used to your new lopsidedness, and pick up your limp, fallen appendage. Then you shove the humerus back into its socket.\n\n\t\tYour arm topples back to the floor. \n\n\t\tYou pick up your arm and shove it in its place again and again and again, clanging bone against bone so hard that it rattles your whole body. Finally, Layla catches your hand to stop you.\n\n\t\t“Let it go, Vivien. You can't fix it.” \n\n\t\tYou release your grip on your detached arm. As Layla takes the appendage from you, walking over to her desk to set it down, you turn and walk out of the door. Whatever she does with your arm, you don’t care. You have already lost every piece of you that matters. The distance between you and Layla is simply one more burden to carry until your shoulders dissolve with the rest of you.\n\t\t*finish", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set humanity \"99\"\n\nYour world is a void. Blackness unfurls like the night sky in every direction. There is no sound to break the silence—not even the rush of blood in your body. There is no up, no down, no past, no future. Darkness swallows all, as unending as grief and as absolute as death.\n\nBut you exist.\n\nAt least, you think you do. You may not possess a hand to grasp the air nor a voice with which to scream, but you can wield thoughts distinct from the void that envelops you.\n\n*fake_choice\n\t#I am here.\n\t#I exist.\n\n*script changeBackgroundColor(\"black\")\n\n*set humanity \"99\"\n“You really have to ask?” Layla looks down at you helplessly. “I spent my whole life thinking I was broken, that I would never find anyone, that the way I loved was wrong. And then I met you. And I loved you. And then you died, Vivien, courtesy of a potato salad at the age of twenty-freaking-six, and I knew I had the power to fix it. Hang the fates, or destiny, or whatever. You deserve better. I deserve better.”\n\nYou reach out to take Layla’s hand, but she isn’t done.\n\n“What, should I have just let you stay dead? Is that what you wanted?” she snarls.\n\n*fake_choice\n\t#I want to live.\n\t#You should have let me go.\n\n*script changeBackgroundColor(\"sepia\")\n*set humanity \"99\"\n\nSilence descends heavily over the room. Layla tilts her head in the way she does when she’s thinking hard about something.\n\n“What was it like?” she asks eventually.\n\n“What was what like?”\n\n“You know…being dead.”\n\n*fake_choice\n\t#It was agony.\n\t#It was bliss.\n\t#It was nothingness.\n\t#Not that different from being alive.\n\t#I don't remember.\n\n*set humanity \"80\"\n\nYou trudge along beside Layla, lost in your thoughts, when the garden path suddenly takes a hard left. You round the corner only to run face-first into something so hard you nearly trip backwards from the recoil. Rubbing your poor smashed forehead, you look up to see the object you smacked into is another person. A middle-aged man, pot-bellied with a paternal smile, rubs his chin and laughs good-naturedly.\n\n“Whoops! Sorry about that, miss. I can barely tell my left foot from my right most days,” he jokes, but the longer he looks at you, the more his expression shifts from amicable to puzzled to horrified.\n\n*fake_choice\n\t#Try to explain yourself.\n\t#Make zombie noises.\n\n*set humanity \"50\"\n\nYou offer Layla a tiny, hesitant wave to garner her attention. She gives it slowly, like she is afraid to gaze upon you, and alarm sprouts within your hollow chest.\n\n“Vivien,” she says, each syllable sounding like a chore, “do you hate me for bringing you back? Even a little?”\n\n*fake_choice\n\t#I forgive you.\n\t#I can't forgive you.\n\n", "skull": "*advertisement 1200\n*set humanity \"20\"\n*label 4scene_1\nIt has been a year since Layla resurrected you.\n\nThe decay hasn’t stopped. You suspect it never will. Your skeleton body is now the object of your envy; all that remains of you is a skull with a handful of teeth. Any awareness of your limbs was severed the moment they fell from you, so you are consigned to watching the world pass you by from the perch on which Layla placed you: the living room shelf in the house you once shared.\n\nThe shelf itself isn’t so bad. Layla has folded a crochet blanket beneath you which, although unnecessary, brings emotional comfort if not physical. Your neighbors are trinkets you adored in life: a teddy bear you’ve had since you were a baby, your diploma, the last birthday card from your mother. Your wedding ring.\n\nThe rest of the living room dampens your spirits with its disrepair. Every inch of space is covered with discarded paper—research notes—furiously scribbled on and then abandoned in fits of desperate frustration. The ugly mustard couch is covered in dirty clothes and the cushions are perpetually in disarray. Layla rarely makes it to the bedroom these days before collapsing in the wee hours of the morning.\n\nYou can hear Layla puttering around the kitchen and catch glimpses of her dark hair as she rummages in the cabinets by the corner. She stopped humming months ago, but the sight reminds you of simpler times, and you drift away in a tide of memories.\n*page_break\n*goto 4scene_2\n*label 4scene_2\nStrange though it might seem, the memory that returns is your first real argument with Layla. You haven’t been dating long—a couple of months, maybe—but Layla corners you for the third time that week to spitball date ideas, and her glowering expression sets you on edge. \n\n“Vivien, darling, this should not be difficult,” Layla says with a long-suffering sigh. “I just need you to choose between movie night and roller skating. I can plan everything else. All you have to do is tell me what you want.”\n\nThe weight of Layla’s expectation presses down on you, making your eyes too heavy to lift. You gaze down at your own fidgeting fingers. \n\n“I’m fine with whatever. Pick which one you want to do.”\n\n“Christ, are you allergic to having an opinion? I can’t make every decision. This is supposed to be a partnership.” Layla swings her hands in the air between you like she can form a bridge out of thin air. Her eyes dart between yours, searching.\n*choice\n\t#You’re afraid Layla will resent your choices.\n\t\t“And what if I pick roller skating, but you had your heart set on a movie, and you spend the whole time we’re out stewing, wishing you were home curled up on the couch, and you start to hate me and ignore my calls and I end up sad and alone?” The words explode from you without your permission, flooding out in an unstoppable tide, and the gravity of them settles in the silence that comes after.\n\n\t\tLayla’s eyes widen. She stares at you, mouth agape, before her expression softens. She takes your hands in hers and squeezes, bleeding her own warmth into you.\n\n\t\t“Vivien, I’m not asking because I already have an answer in mind. If I had a desperate desire to stay in and watch a movie, trust me, you would know.” Layla offers you a wry smile. “I’m trying to get to know you better. What you want. What you like. What you don’t,” she says softly. “But to do that, I need you to give me definitive answers.”\n\n\t\tLayla’s request is so simple and yet so monumental, but her words cause something to click for the first time in your life. \n\n\t\t“I’ll try,” you agree, and from that day on, a world of choices spreads out before you like words on a page.\n\t\t*page_break\n\t\t*goto 4scene_3\n\t#You don't have any opinions.\n\t\tFrustration bubbles up your throat the longer you try to summon the right words and fail.\n\n\t\t“You don’t get it,” you finally snap. “I don’t know whether I like movies or roller skating more. I don’t know my favorite flavor of ice cream, or my favorite color, or how I like to part my hair, or any of the other things you’ve brought up. No one’s ever asked before you, okay? I don’t know. I don’t have an answer.”\n\n\t\tLayla pauses for a moment. Gradually her expression softens into something compassionate and sad. She takes your hands in hers and squeezes, tracing her thumb over your palms in a way that sends electricity skittering across your skin. \n\n\t\t“Then now’s the perfect time to learn, isn’t it?” she asks gently. \n\n\t\tThe prospect seems so simple, yet so far out of reach. But the choice is laid out before you as simply as words on a page, and you realize that the next step forward means a commitment. Asserting yourself. It will get easier with time, you hope.\n\t\t*page_break\n\t\t*goto 4scene_3\n*label 4scene_3\nThe world rushes back to the present and once again you are nothing but a skull spectating from a shelf. Layla is still rummaging around in the kitchen, judging by the periodic clanging of dishes. Once, you would have joined her, pressing your chest to her back and swaying back and forth while she hummed a tune you only knew from her lips. She would have half-heartedly berated you for distracting her before melting against you, nestling her head beneath your chin so you could bask in the scent of her lavender shampoo. Now, you can only listen for the shuffle of her footsteps and cling to the memory.\n\nLayla suddenly pokes her head around the corner. Her hair is pulled back in the same unwashed low bun as the past few months and a dish rag is flung over one shoulder. She looks at you and offers a smile that doesn’t reach her mahogany eyes.\n\n“I can’t decide what I should cook tonight. What do you think, Vivien? Click once for alfredo and twice for enchiladas,” she says.\n*choice\t\n\t#Alfredo.\n\t\tYou hinge open your jaw and bite down once, making a clicking sound with the teeth that remain. Such a miniscule action feels like admitting defeat. It was only yesterday that you agreed to be more decisive. \n\n\t\tWasn’t it? \n\n\t\tTime seems to slip away from you more often, jumbling together like raindrops instead of moving in a straight line. That argument happened years ago. Yet the sight of Layla scowling at you, demanding answers, superimposes on the woman standing before you now, blurring at the edges like a photo with double exposure. What a cruel joke for the world to play; you gain the ability to make the decisions that stalled your life for so long only to lose it in a blink.\n\n\t\tLayla’s face twists and morphs between all your memories of her until you can no longer distinguish which one belongs to the present. Infinite expressions stare back at you: compassion, disgust, hope, resentment, longing, regret. And all of them want something you no longer know how to give.\n\n\t\tYou wish beyond anything to close your eyes and banish the world for a moment, but you have no eyelids to shut. You can only endure as the moments pass with no way to measure them.\n\t\t*page_break\n\t\t*goto 4scene_4\n\t#Enchiladas.\n\t\tYou hinge open your jaw and bite down twice, making a clicking sound with the teeth that remain. Such a miniscule action feels like admitting defeat. It was only yesterday that you agreed to be more decisive. \n\n\t\tWasn’t it? \n\n\t\tTime seems to slip away from you more often, jumbling together like raindrops instead of moving in a straight line. That argument happened years ago. Yet the sight of Layla scowling at you, demanding answers, superimposes on the woman standing before you now, blurring at the edges like a photo with double exposure. What a cruel joke for the world to play; you gain the ability to make the decisions that stalled your life for so long only to lose it in a blink.\n\n\t\tLayla’s face twists and morphs between all your memories of her until you can no longer distinguish which one belongs to the present. Infinite expressions stare back at you: compassion, disgust, hope, resentment, longing, regret. And all of them want something you no longer know how to give.\n\n\t\tYou wish beyond anything to close your eyes and banish the world for a moment, but you have no eyelids to shut. You can only endure as the moments pass with no way to measure them.\n\t\t*page_break\n\t\t*goto 4scene_4\n*label 4scene_4\nIt has been a year and a half since Layla resurrected you, you think. \n\nThe piles of research notes scattered around the living room have been cleared away. That’s not to say that the house is any cleaner. Other objects have simply taken their place: takeout boxes, dirty laundry, and other general clutter. The only spotless corner of the room belongs to an altar that used to be Layla’s desk. Her computer and graded papers have been replaced with statues of various deities and offerings jumbled together without rhyme or reason. \n\nLayla kneels before the altar with her head bowed. Her back is turned to you, but the solemn cave to her shoulders is clear to see. She hasn’t admitted defeat in finding a cure. At least, not where you can hear. But these days, she spends more time at this altar than pouring over her research notes, which tells you more than she ever could with words. \n\n“Please. If there’s anyone out there listening,” Layla pleads, her voice barely a whisper. “Aphrodite. Thanatos. Hathor. Anubis. Semara. Batara Kala. Can anyone hear me?”\n\nLayla invokes a dozen more names you aren’t familiar with. You weren’t much for religion as a girl; calling out into the aether felt more hollow than keeping your desires tucked away inside you. But then again, you didn’t think much of magic once, either.\n*page_break\n*goto 4scene_5\n*label 4scene_5\nYour consciousness drifts back to the first time you saw Layla cast a spell. You can’t recall how long you had been together, only the trepidation on Layla’s face. She holds a peach in the palm of her hand, tough and unyielding in its underripe state, and waves her other hand through the air around it.\n\n“Don’t freak out. It’s just a little spell. Like, itsy bitsy teeny little baby spell. It accelerates the decay just enough to ripen it,” she rambles.\n\n“Uh-huh.” You recognize she is stalling and raise an eyebrow, trying to quell your skepticism for fear of scaring Layla off entirely.\n\nLayla flounders in the silence that follows. Finally, she closes her eyes and mutters an incantation under her breath. The change is immediate. The peach darkens and softens before your very eyes, sagging in Layla’s hand.\n\n“Whoops. Overdid it a bit. I’m still perfecting that spell.” Layla’s eyes open and meet yours, narrowing in concern. “Vivien?”\n\nThat did not just happen. There’s no such thing as magic. Spells are something out of a children’s book, read and discarded between the pages. But there sits the evidence in Layla’s hand, indisputable. Does that mean there’s a god? Magical creatures that could steal you away in the night? Lizard people?\n\n“You’re spiraling.” Layla snaps her fingers in front of your face to bring you back. “Look, it’s really no big deal. What’s a date without a little death, anyway?” She raises her eyebrows at you suggestively.\n*choice\n\t#Revel in the excitement.\n\t\t“That was cool as hell. Am I dating a superhero? Can you fly? Turn invisible? Talk to animals?” Questions burst from your mouth faster than your brain can keep track. Layla places her hand on your shoulder to stop you.\n\n\t\t“No, nothing that impressive. I’m still basically an apprentice. I’ve been practicing—still am—but this is about all I can do.”\n\n\t\t“So you bend the rules of the cosmos to…ripen fruit from the grocery store.”\n\n\t\t“It’s a useful skill!”\n\n\t\tYou cackle at the absurdity of it all. Layla joins in and you both laugh a little too long, diffusing the tension with joy and incredulity. You don’t ask her more questions about magic. Now you wish you had.\n\t\t*page_break\n\t\t*goto 4scene_6\n\t#Admit some hesitation.\n\t\tA question lingers on your tongue, feeling more like a condemnation of yourself than Layla, but a condemnation nonetheless. Layla raises her eyebrows expectantly.\n\t\n\t\t“Have you ever, you know…” You try to hedge the question to no avail. “…cursed someone?”\n\n\t\tLayla looks taken aback. She waves both hands palms-out in a placating gesture.\n\n\t\t“Goodness, no. I’ve never used my powers to hurt anyone, I promise.” Layla cuts off abruptly and brings a pensive hand to her chin. “Unless you count that time in kindergarten where a girl stole my pretzel and I wished she would stub her toe.”\n\n\t\tYou let out a snort of laughter as your fear abates.\n\t\t\n\t\t“I don’t know. That’s pretty vicious,” you tease.\n\n\t\t“Then by all means, cuff me and take me away,” Layla quips back, winking, and offers you a bite of peach.\n\t\t*page_break\n\t\t*goto 4scene_6\n*label 4scene_6\nYou gaze upon the present version of Layla—or what you guess is the present version—and marvel at the power she commands in contrast to before. The woman who ripened a peach for you now beseeches the gods, and yet all you feel is sorrow. \n\n“What did we do to deserve this?” Layla’s eyes are wide and pleading. “Our whole lives, we’re told that existence is suffering. We’re born through someone else’s pain, we collect loss and grief like Girl Scout badges, and then we die and cause pain to others. And we’re told that it’s all worth it; we just have to hold onto the little things. Quiet moments. Memories. Love. Am I a bad person for trying to hold onto the one thing—the one person—who made me want to get up in the morning? Is it selfish to want one more chance to hold her hand, to kiss her cheek and tell her every mundane thing I’ve done today? Is it wrong to crave the feeling of her heartbeat against my palm?\n\n“Because they were right. I would do it all over again, just to feel that one more time. But not if she is the cost.” Layla glances at you and the desperation in her eyes shakes you to your core. “If you want a soul, you can have mine. Just make this stop.”\n*choice\t\n\t#Bargain with Layla.\n\t\t*goto 4scene_7\n\t#Dissuade Layla.\n\t\t*goto 4scene_7\n*label 4scene_7\nYou try to clack your teeth, but when you focus all your willpower into your jaw, nothing happens. You try again, narrowing your focus so completely that you can feel every atom in what remains of you. Still nothing. You send your will out through the aether in the vain hope that Layla will sense your distress.\n\t\nNothing.\n\t\t\nYour awareness is unchanged; the collection of statues on the altar is still crystal clear and Layla’s voice reaches you unimpeded. But how will Layla know you’re still alive? What shapes do your desires take when you no longer have the tools to voice them? \n\nBleak terror fills your consciousness as completely as Layla’s desperation saturates the air, but the gods remain as silent as you.\n*page_break\n*goto 4scene_8\n*label 4scene_8\nYou don’t know how long it has been since Layla resurrected you. \n\nThe entire house has become an altar on which to mourn the life you and Layla might have had. Piles of trash coat the floor, towering and teetering like poorly-made sculptures. The desk on which Layla offered sacrifices to every deity known to man is long since abandoned, collecting detritus with the same sense of hopelessness as the rest of the living room. \n\nYour shelf is the only space to remain untouched. Your lone skull occupies the same space beside the last sentimental items of your former life, doomed to eternally look down upon the destruction that multiplies with each passing day, swallowing the home you once knew into a void that feels unsettlingly familiar in its own right.\n*choice\n\t#I EXIST.\n\t\t*goto 4scene_9\n\t#I AM HERE. \n\t\t*goto 4scene_9\n*label 4scene_9\nLayla’s forlorn face comes into focus. Her hair is short now, bobbed to her chin after her long tresses grew so matted she could no longer maintain them. Now they shroud her face in a greasy tangle. Those mahogany eyes you were once content to drown in are veiled in a grief so thick that no amount of daylight can push it aside. Dark circles smudge the skin beneath them like war paint for a battle long past. Layla is slumped on the ugly mustard couch in the center of the room, as she so often is these days, but instead of pouring over research notes or staring off into space, her gaze is directed at you. \n\n“I’m sorry,” Layla says quietly, simply, and then bursts into tears. Her shoulders cave forward like her spine can no longer hold her up. “This is all my fault. I thought I was saving you. The moment you drew that first breath was the happiest of my life, you know? Not when I left my hometown, not when we said our wedding vows, because in that moment, I had hope again after I lost everything. I had so many plans. We could get a dog. Have kids. Start a community garden. Take up couples yoga like every other insufferable suburban couple. But now you’re dead. Again. And this is so much worse because I…” Layla’s voice breaks off. Her lower lip trembles as she tries again. “I killed you.”\n\nShe does not know you are still alive. She pours out her heart, unaware that you remain, listening to every word as a captive audience. How could she know? To her eyes, you must simply be a static skull, unmoved by love or grief. The line between understanding and isolation is so thin it’s transparent yet so strong it’s invincible.\n\n“I thought, somehow, this would all turn out okay because I love...because I loved you. I thought that was all that mattered,” Layla whispers. She buries her head in her hands. “I wish you were here, Vivien. I miss you so much.”\n*page_break\n*goto 4scene_10\n*label 4scene_10\nLayla’s sobs echo off the walls, amplifying the sound of her grief like the bounds of a prison cell. Tears carve rivulets down her cheeks and meet again at the trembling outcrop of her chin before dripping onto the piles of trash blanketing the carpet. Layla loses her composure completely and cries with heaving, screaming sobs that you have never heard from her before and wish you never have to again. The empty space around her body where your arms should be haunts you nearly as much as the sound. \n\n“I’m sorry. I’m so sorry,” Layla begs the empty air, unaware that you are still privy to every word, even if you are not in a position to absolve her.\n*choice\n\t#Comfort Layla.\n\t\t*goto 4scene_10\n\t#Leave Layla to her misery.\n\t\tYou accept, as you must, the futility of any effort to try and reach Layla through her sorrow. The world is no stage, and Layla is no actor, able to hear the gasps and cheers from an audience palpable from just beyond the stage lights. The worlds you occupy are separate and untouching despite their overlap: the observer and the observed. A single word or gesture would bridge that divide, and yet the world denies you that simple luxury, whether through callous disregard or the same inability to act that now consigns you to ineptitude. \n\n\t\tPerhaps Layla is correct. Maybe this state of being constitutes being dead, in the purest sense of the word. But this silent observation does not resemble the oblivion you expected, nor the ascension that so many religions promise. You picture ascension as some grand ceremony with lights and cherubs farting out “God Save the Queen” between their ass cheeks, or something similarly bombastic. This doesn’t feel like something greater.\n\n\t\tThis feels like loneliness. \n\n\t\tIs this what godhood entails? Being stuck in limbo, forced to come to grips with your own unending existence? Watching the delights of life from afar with no way to participate besides lurking on the edge of consciousness? Is this void where all prayers go to die at the feet of someone who hears but cannot answer? \n\n\t\tWhere does that leave you?\n\t\t*finish", "startup": "*title To Ashes You Shall Return\n*author Kaitlyn Grube\n*scene_list\n\tstartup\n\tgarden\n\ttravel\n\tschool\n\tskull\n\tdust\n*create humanity \"undetermined\"\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tYou died young. Sorry about that. But now you’re back! Your wife’s magic yanks you from death’s clutches, but power always comes with a cost. Decide if you can love the heart that doomed you before it’s too late.\n \n\t[i]To Ashes You Shall Return[/i] is a 31,000-word interactive novel of sapphic love and loss by Kaitlyn Grube. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n\tExplore the wonders of:\n\t• Queer romance \n\t• Tragedy\n\t• Witchcraft\n\t• A kitty named Tabitha\n\t• An unstoppable tide of existential dread\n \n\tThe dirt claims us all in the end. How will you live in the meantime? \n\n\t*if choice_is_advertising_supported\n\t\t[i]${choice_title}[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase_discount adfree 2025-07-10 $2.99 $1.99 purchased\n\t\t*page_break_advertisement\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t*purchase_discount adfree 2025-07-10 $2.99 $1.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n\n*set humanity \"100\"\n*label 1scene_1\nYour world is a void. Blackness unfurls like the night sky in every direction. There is no sound to break the silence—not even the rush of blood in your body. There is no up, no down, no past, no future. Darkness swallows all, as unending as grief and as absolute as death.\n\nBut you exist.\n\nAt least, you think you do. You may not possess a hand to grasp the air nor a voice with which to scream, but you can wield thoughts distinct from the void that envelops you.\n*choice\n\t#I exist.\n\t\t*goto 1scene_1_1\n\t#I am here.\n\t\t*goto 1scene_1_1\n*label 1scene_1_1\nWith a feeling like an inhale, life sprouts in the void. Pinpricks of light unfold like petals. One turns to a dozen and a dozen turns to hundreds of thousands until the void is saturated with lights suspended in the air like confetti. Each comes with a snippet of sensation: the sound of a laugh, the stab of sorrow, the smell of your mother’s food. \n\nThese are memories, you realize, recognizing the parts of you floating beyond your consciousness even if you can’t recall their contents. \n\nA soft hum catches your ear. A voice, simultaneously foreign and wholly familiar, hums a tune so quietly that you have to strain to hear. With it comes a wave of feeling that hollows out what’s left of you. The melody becomes a siren’s song; ignoring its call feels worse than death, but embracing it brings the sorrow of holding a phantom of something you once loved. \n*choice\n\t#The pull of the song is too much to resist.\n\t\tAs the song grows louder, your vision becomes swathed in a gentle pink hue. Much of you is still beyond your reach, but a name finally returns.\n\t\t\n\t\tVivien. You are Vivien.\n\t\t*page_break\n\t\t*goto light_1\n\t#Some things are best left forgotten.\n\t\tThe siren’s song fades to nothingness. As you remain in darkness, willing the melody to fade, one of the pinpricks of light floats lazily in your direction. Your vision is swathed in white. Much of you is still beyond your reach, but a name finally returns.\n\n\t\tVivien. You are Vivien.\n\t\t*page_break\n\t\t*goto dark_1\n*label light_1\nThe bar is nearly dead on a Tuesday night. There are a couple of regulars, of course: the old lesbian in a jean jacket watching
