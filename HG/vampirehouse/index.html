 and hung around.\n\nPeople were nervous. Not just the students either, it was the teachers and staff too.\n\n\"They said there was another one...\"\n\nI walked alongside two people gossiping.\n\n\"I heard he was just a kid.\"\n\n\"How old?\"\n\n\"Eight.\"\n\n\"Is he dead?\"\n\n\"I don't know.\"\n\nAn unsettling feeling inched its way into my stomach.\n\n*page_break\n\nWhen the day ended, I noted a few officers milling about around school. They had the place surrounded,\nthough not in an obvious way. Officers stayed out of the way, and had their cruisers parked on the outskirts\nof the school grounds.\n\nSome were parked at nearby businesses across the street.\n\nThey seemed like they were on the lookout for something.\n\nI pulled my rain coat's hood up as I left the school.\n\n*page_break\n\nI considered what I wanted to do that afternoon.\n\n\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit the wolf camp\n\t\t\t\t\n\t\t\t\t*gosub_scene subRoxanne\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit Damien\n\t\t\t\t\n\t\t\t\t*gosub_scene subDamien\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n\nThe overcast skies made the day look later than it was. If I didn't hurry, it would be dark before I returned.\nI picked up the pace, and jogged back home.\n\n*page_break\n\nWhen I got back, I looked at the small television set placed in the main room.\n\nI flipped on the news.\n\n\"...Will continue to worsen as the week goes on.\" A young man spoke in front of a map of my area. It looked\nlike we would be getting more rain.\n\n\"Thank you, Sam.\" The view shifted to show a young woman in front of a suburban house. \"This is the home of\nyoung Eric Garfield. He was found dead this morning in an alley off Lily Street. It isn't known why he was\nthere, or what happened. The police are still conducting an investigation.\" She carried a grim expression.\n\"The community was still reeling from four deaths only yesterday. Despite all five deaths being violent,\nthe police don't know if they're connected yet.\n\n\"Despite that,\" she said. \"The police are urging people to not go out at night. All the deaths thus far\nhave occurred after sundown.\"\n\nI turned off the news when I heard the door opening. My mother stepped through.\n\n\"Hey, honey.\" She smiled at me. \"How was school?\"\n\n\"Good.\" I studied her expression carefully.\n\nShe carried a smile, but I could just barely make out a hint of worry.\n\n*page_break\n\nI settled down into my room, and thought about what I wanted to do before going to sleep.\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n\n*page_break\n\nWhen I lied down for the night, I thought to myself, [i]At least the weekend's here.[/i]\n\n\n\n*goto_scene octoberEleventh\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octoberthirteenth": "\n\n\n\n\n\n\n[i]Today is October 13th, Monday.[/i]\n\nI needed to call Damien. I'd explain everything, lead him to the monster, and we\ncould all call it a day.\n\nI grabbed my phone, only to find a message from him already on it.\n\n'I'll be waiting for you after school. We need to talk.'\n\nI hoped he wasn't too pissed that I blatantly ignored his warning not to get involved.\n\n*page_break\n\nI didn't have any trouble waking up that morning. I was showered, dressed, and awake\nin record time.\n\n\"Honey, you're on the news!\" My mom called to me from the living room.\n\nI walked in, and looked at the television.\n\n*page_break\n\n\n\"A teenage ${Boy} saved the life of a little girl yesterday afternoon.\" It was the same female reporter\nspeaking that I had seen the last couple of times I watched the news. \"$!{He} intervened when a man\nbroke into one of the homes in the suburbs behind us.\"\n\nI looked at my mother. \"They didn't show my picture or anything, right?\"\n\n*page_break\n\n\"Hey, I saw you on the news!\" One of my classmates shouted as I walked through the front doors.\n\nOf course they did.\n\nThat was a troubling development. That thing could see me on the news. It could learn more about me.\n\nIt was still out there.\n\n*page_break\n\nThough, honestly... the attention wasn't too bad.\n\nI still kept most of the details of what really happened to myself.\n\n*page_break\n\nAs expected, Damien was waiting for me in front of the school.\n\n\"Hey- ow!\" He grabbed my arm and dragged me away from the school grounds.\n\nA ton of people were staring.\n\n\"You know, these people probably think you're kidnapping me right now,\" I said.\n\nHe stopped walking. \"Do. Not. Talk.\"\n\nI shrunk back. \"...Sorry.\"\n\n*page_break\n\nA black limo pulled up along the curb. Damien all but threw me inside it, before\nstepping in himself.\n\nSitting directly across from me was none other than Lord Reyes himself.\n\n\"H-hello, sir,\" I said.\n\n\"You've been on the news,\" he said. \"And it's related to the killings.\"\n\n\"Yeah...\"\n\nHe leaned forward, his eyes dug into me. \"This isn't a game.\"\n\n\"I-\"\n\n\"If you try to go after it, you will die. That thing isn't some feeble minion scurrying\naround the dark, occasionally lashing out at humanity.\"\n\n\"But-\"\n\n\"It. Is. A. Killer. You can't hope to stand up against it,\" Lord Reyes said. \"You need\nto leave this to the professionals. To those that have the necessary experience to\nfight such a monster.\"\n\n\"I can track-\"\n\n\"Do not get involved any further.\" Lord Reyes sighed. \"You seem like a nice kid. And\nI know you were trying to help. But you can't get involved.\"\n\nThe limo slowed to a stop. Two figures walked around the car and opened the door\nnext to me. The moment the door opened, I was pulled from the limo.\n\nWe were in front of the Leavitt manor.\n\n\"Stay out of trouble,\" Lord Reyes called as he drove away.\n\n*page_break\n\n\"Seriously?\" I watched them disappear off in the distance.\n\nDamien did not prove as useful as I had hoped.\n\nThen again, maybe that was arrogance on my part. Maybe they had the situation more under control than I\nrealized.\n\n*page_break\n\n\n\nI sighed as I considered what I wanted to do that day.\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit the wolf camp\n\t\t\t\t\n\t\t\t\t*gosub_scene subRoxanne\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit Damien\n\t\t\t\t\n\t\t\t\t*gosub_scene subDamien\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n*page_break\n\nAs the daylight waned, I returned to the guest house.\n\nI checked the news as soon as I returned home.\n\n\"The police are still looking for the criminal, who was described as wearing 'a burlap sack on his head'.\"\nA familiar female reporter spoke. \"The criminal's image conjures ideas of a Hollywood style serial killer,\nleading experts to-.\"\n\n*page_break\n\nIt didn't look like there were any other deaths since my last encounter with it.\n\nI thought about what I wanted to do that night.\n\n\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n*page_break\n\n*goto_scene octoberFourteenth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobertwelfth": "\n\n\n\n\n[i]Today is October 12th, Sunday.[/i]\n\n\n\nThe day had come. The sun was... still nowhere to be seen. However, the rain had fallen to barely anything\nmore than a light drizzle. I figured it was the best I was going to get. I grabbed the paper with the spell\ncircle on it, and quickly wrote down the words to the incantation.\n\nI stopped in front of the guest house's front door and quickly used the spell to get my initial direction\nbefore heading out.\n\n*page_break\n\nEarly on, I stopped under trees along the road every few minutes to make sure I was headed in the right direction,\nbut eventually realized my bearing weren't that hard to keep.\n\nBased on the general direction I was going, this 'aberration' was located in a suburb. Or, if that ended up not\nbeing true, somewhere past it.\n\nThe idea was enough to give me pause. I had no clue what the range on that spell was. For all I knew, it was pointing\ntoward something thousands of miles away, and totally unrelated to the killer.\n\nI decided I'd try following it for as long as I could.\n\n*page_break\n\nThe suburbs I found myself in were a pretty nice neighborhood. The houses were all painted white, with pristine\nyards.\n\nChecking the spell was slightly awkward. The weather guaranteed that nobody would be out on the street, but\nI was still easily visible from any window.\n\nI couldn't just cut through people's yards, which made the entire process extremely tedious whenever the spell\ntried to guide me through a house. \n\n*page_break\n\nEventually, however. I stumbled across a home that caught my eye.\n\nthe door was wide open.\n\nI looked around, but didn't see anyone around. The street was empty. The only sound I heard was rain\nsprinkling down around me.\n\nThe spell seemed to be drawing toward the house. Though, I couldn't be certain that it wasn't trying to\ndraw me past it.\n\nI took a deep breath, and approached.\n\nA 'for sale' sign was sticking out of the ground. The porch contained various little lawn gnomes,\nwith overly cute expressions.\n\nThe bell around my neck started ringing. I froze.\n\n*page_break\n\nThere wasn't a sound coming from inside the house. I cautiously, and silently, passed through the\nopen door.\n\nWood creaked above me. I heard someone wandering around upstairs.\n\nIt took me a few moments, but I managed to find the stairs. I crouched down low, and kept my\nmovements agonizingly slow.\n\nEvery few seconds I heard a piece of furniture get moved, or the sound of someone rustling\nthrough something.\n\n\"Stop hiding.\" The voice that spoke was strange. It sounded hoarse and distant. \"Face your responsibility.\"\n\nI climbed the rest of the stairs and peeked around. I came out at a hallway. A bedroom lie ahead\nof me. Light shone through the windows, but the overcast skies kept the house in\nshadow.\n\nSomeone repeatedly pounded on a door.\n\nSilence.\n\n*page_break\n\n\"Another.\"\n\nI tensed. A certain noise became apparent to me.\n\nFlies buzzed in the room ahead of me. A lot of them, from the sound of it.\n\n\"Familiar.\" Heavy footsteps thudded against the floor. They came closer to me.\n\nI stepped back, ready to make a hasty retreat out the front door.\n\n\"Hey!?\" It sounded like a little girl yelling. \"Is anybody out there!?\" She was yelling from\nanother room in the house, on the same floor.\n\n\"Be silent,\" It said.\n\n\"I need help!\" She sounded desperate and afraid. It didn't sound like it was directed at me though.\n\nIt was hard to tell from inside the house, but I got the sense she was shouting out a window.\n\n[i]Hopefully the neighbors will hear...[/i]\n\nA large figured stepped in front of the doorway to one of the bedrooms. Its frame was thick. It\nwore a sack over its head. Filth, dirt, and black grime coated his body. Insects seethed on his skin.\nI constantly saw flies crawling in and out of various small holes on his sack head.\n\nI paled as I slowly backed away.\n\n\"You have done many terrible things.\" It marched toward me, the house creaking and shaking with every step.\n\"You deserve this.\"\n\nI nearly tripped as I backed down the staircase.\n\n\"Do not flee.\"\n\nI'd seen enough. I needed to find either Damien or the police to deal with this thing.\n\n*page_break\n\nExcept there was still a little girl upstairs. That thing continued down the stairs toward me.\nIf I led it outside, she'd be fine.\n\nThere was just one thing I needed to do first.\n\nI sprinted into one of the adjacent rooms. It was a kitchen, finely furnished, and with a noticeable\namount of pink decorations.\n\nI spotted a phone hanging on the wall. I grabbed it, dialed 911, and dropped the phone. It dangled\nuselessly from the wall. The operator spoke from the other side of it.\n\n\"Hello, what is the nature of your emergency?\" A brief pause followed. \"Hello?\"\n\nIt came into the room, looked at the dangling phone, and hung it up.\n\nI smirked. \"Good thing that sixty seconds to trace thing is bull.\"\n\nI retreated further back into the house. That thing was cutting off my access to the front door.\n\n\"Face the consequences of your actions.\"\n\nI ran out the back door, into the backyard.\n\n*page_break\n\nA large pool sat in their backyard. I circled around it, and waited for the figure to show\nback up.\n\nIt didn't.\n\nI grabbed the bell around my neck. It was still vibrating.\n\n[i]Is he leaving?[/i]\n\n[i]Is he going back for the girl?[/i]\n\nI saw her climbing out a window on the second floor.\n\n*page_break\n\nShe dropped from the window to a small section of roof underneath it. She slid immediately, and\nnearly fell past the edge.\n\nI heard a siren in the distance.\n\nWood shattered behind the window the girl had just come from. I rushed to the house's wall.\n\n\"Jump down!\" I shouted.\n\nThe girl peeked over the edge of the roof. \"I-I can't.\" She was young. Probably about ten. Blond hair,\ntied into a braid, reached her shoulders.\n\n\"It's alright,\" I said. \"I'll catch you. We don't have a lot of time.\"\n\nShe looked back, and flinched. I couldn't see what she was looking at, but I assumed that thing was about\nto come through the window.\n\n\"Come on,\" I said. \"We don't-\"\n\nShe leapt forward. I had to back up a few steps to grab her.\n\nDespite being only ten or so, she nearly knocked me over when she landed against my chest.\n\n*page_break\n\nI didn't waste a second booking around the house fence. they had a gate facing the street. A latch held it\nin place. I threw the gate open, and ran toward the street.\n\nA red and blue light was flashing just down the road. I knelt down and released the girl, before waving at them\nto come over.\n\nThe car pulled up to the side of the road, and the officer stepped out of the cruiser in a surprisingly\ncasual manner. He was tall, and balding.\n\nAnother stepped out from the passenger door. He had smooth and clean blond hair.\n\nHe glanced over me and the girl. \"Are you two alright?\" He sounded more confused than anything.\n\n[i]Right... I didn't tell the operator anything.[/i]\n\n\"Some psycho broke into the house!\" The girl yelled. \"He's still in there!\"\n\nThe taller officer pulled out his gun, and immediately entered the house.\n\nThe blonde cop approached us. \"What happened?\"\n\n\"Some guy broke in...\" The girl spoke. Her voice was cracking a bit.\n\nThe officer gave me an expectant look.\n\n\"Oh... uh.\" I cleared my throat. \"I was walking by, when I noticed the front door was open. I heard\nsomeone scream from inside.\" I looked at the girl. \"I guess that was you. So I went in, and saw a...\nman.\"\n\n\"What did he look like?\" the officer asked.\n\n\"He was wearing a sack on his head,\" I said. \"I couldn't see his face.\"\n\n\"A sack? Like a burlap sack?\"\n\nI nodded. \"He was also really big. Not just tall. He was thickly built.\"\n\nHe crossed his arms. \"Thick, as in muscular, or fat?\"\n\nI thought back. It had been kind of hard to tell. \"A little bit of both, I think.\"\n\nThe taller cop who entered the house exited. \"Nobody's inside. Second story is trashed.\"\nHe grabbed his radio, and sent a message explaining the situation.\n\nThe blond officer knelt down next to the girl. \"Do you know how we can contact your parents?\"\n\nShe nodded meekly before standing up.\n\n*page_break\n\nMy mother was at the police station when I arrived.\n\nI ended up having to spend a good part of the day talking to the police. I didn't get the sense\nthey were accusing me of anything, but it was pretty clear they didn't totally buy why I said I\nwas there.\n\nAdmittedly, it looked weird. I had no reason to be wandering around that neighborhood. And stumbling\nacross the house minutes before that guy broke in was pretty crazy timing.\n\nStill, they ultimately just asked me for my side of the story, and seemed happy I intervened.\n\nMy mother and I returned home late in the evening.\n\n\"I'm just glad you're okay.\" She smiled at me for a few moments, before suddenly shifting into\na scowl. \"Don't do that again.\"\n\nI smiled sheepishly. \"Uh... I was just helping.\"\n\n\"You could have died.\" She sighed. \"Though if you hadn't shown up when you did, that girl...\"\n\n\"I know,\" I said. \"It was a really lucky break.\"\n\nAnd I meant in when I said it. Nobody knew I had tracked the killer's location, but if I had been\neven a few minutes late, that situation could have ended a lot worse.\n\n*page_break\n\nThe day spent, I went into my room. I had some time left before I needed to go to sleep.\n\n\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n*page_break\n\n\n*goto_scene octoberThirteenth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobertwentieth": "\n\n\n[i]Today is October 20th, Monday.[/i]\n\n*page_break\n\nWith the weekend over, I found myself back in school.\n\nSurprisingly, it didn't look like many people knew what happened. I was thankful the\npolice had remained tight-lipped about everything.\n\nI thought back to my mom constantly bringing up whether I was bringing anyone with me\nto the Halloween party.\n\nIt was something to consider, and I knew more than a few people...\n\n*page_break\n\nSchool let out, and I considered what I wanted to do for the day.\n\n\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit the wolf camp\n\t\t\t\t\n\t\t\t\t*gosub_scene subRoxanne\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit Damien\n\t\t\t\t\n\t\t\t\t*gosub_scene subDamien\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n\n\n*page_break\n\nThe afternoon rolled by quickly, and I was back home by evening.\n\nI spent some time practicing the spell, before deciding if there was anything else I wanted to do.\n\n\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n\n\n*page_break\n\n*goto_scene octoberTwentyfirst\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobertwentyfirst": "\n\n\n\n[i]Today is October 21st, Tuesday.[/i]\n\n*page_break\n\nThere still hadn't been any deaths in the news. No one had even been attacked since the last\nkilling.\n\nWell, nobody except me.\n\nMaybe that was why that thing came after me. It might have blamed me for it not being able\nto find anyone to kill now.\n\nNot without getting caught anyway.\n\n*page_break\n\nThe school day was over in a flash, and it was time to decide what to do with my afternoon.\n\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit the wolf camp\n\t\t\t\t\n\t\t\t\t*gosub_scene subRoxanne\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit Damien\n\t\t\t\t\n\t\t\t\t*gosub_scene subDamien\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n\n\n*page_break\n\n\nI returned to my home as the sun was setting. More spell practice, followed by some free time.\n\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n*page_break\n\n*goto_scene octoberTwentysecond\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobertwentysecond": "\n\n\n\n\n\n\n[i]Today is October 22nd, Wednesday.[/i]\n\n*page_break\n\nI spent the day thinking about that Halloween party that was coming up.\n\nI was able to bring a guest. That could probably mean just a friend.\n\nBut, it could also mean a date.\n\n*page_break\n\nMy mom's constant pushing at that angle was weird, but I had been thinking about it.\n\n*page_break\n\n*if (ElizabethEvents = 6)\n\t\n\tElizabeth and I walked to school. Our relationship had started out\n\tso awful, but things had changed between us.\n\t\n\tWe were friends. Kind of.\n\t\n\tActually, no.\n\t\n\tWe were friends. Period.\n\t\n\tMaybe we weren't always completely friendly toward each other, but we were friends. Close ones\n\tat that. I'd learned a lot about her, and she learned a lot about me.\n\t\n\tI was still worried about how she was doing in school. I always assumed she stood up for herself.\n\tShe seemed strong and confident enough that she wouldn't put up with any sort of disrespect.\n\t\n\tApparently I was wrong. I wondered just how bad her situation really was.\n\t\n\t*page_break\n*comment\n\n*if (MatthewEvents = 6)\n\t\n\tI sat across from Matthew during lunch. We had been friends for years.\n\t\n\tHell, we'd been friends for as long as I'd lived in Lakeside, which was practically my whole life.\n\t\n\tHe'd always had my back. I admired how much effort he put into his training, even if he did take it\n\ttoo far sometimes.\n\t\n\tSpeaking of which...\n\t\n\tThings had recently taken an ugly turn for him. I had no clue what happened to him after his mother\n\tshowed up at the hunters lodge. He never talked about it. He just stopped showing up.\n\t\n\t*page_break\n*comment\n\n*if (MalkaEvents = 6)\n\t\n\tMalka and I chatted in the hallway.\n\t\n\tI still wasn't sure what to make of her. Elizabeth and I had so much drama when we were getting\n\tto know each other, but Malka was insanely friendly right out the gate.\n\t\n\tNot that I didn't appreciate it. She ended up being a lot of fun to hang out with.\n\t\n\tShe was a nice... ghoul, I guess.\n\t\n\tI wondered how she really felt about that. She had told me, but it was only after I had lied\n\tto her. Was she still terrified of people finding out the truth?\n\t\n\tGiven that she was driven out of her home town, maybe she had reason to be worried.\n\t\n\t*page_break\n*comment\n\n*if (DamienEvents = 6)\n\tI spotted Damien speaking to one of the officers patrolling the school.\n\t\n\tHe shot me a smirk and a wave before continuing the conversation. I didn't want\n\tto interrupt him.\n\t\n\tDamien had been a cool guy from the moment I met him. Not to mention he saved my life.\n\t\n\tEvidently demons had an undue negative reputation. Assuming he was a demon of course.\n\tI had never actually asked him for further details about that.\n\t\n\tOut of every creature I'd gotten to know, I think we had the least trouble getting along.\n\t\n\t*page_break\n*comment\n\n*if (RoxyEvents = 6)\n\t\n\tOn the walk home, I spotted Roxanne entering the woods with Elizabeth. I assumed they were headed\n\tto El Abrigo.\n\t\n\tWe had not gotten off to the greatest start by any means. In fact, our relationship was probably\n\tworse than Elizabeth and I had been.\n\t\n\tI think my persistence in showing up at the wolf camp over and over again had earned her begrudging\n\trespect.\n\t\n\tI wasn't entirely certain it was anything more than that though.\n\t\n\tRespect.\n\t\n\tNot friendship. Or anything more than that.\n\t\n\tBut... maybe that didn't have to be the case.\n\t\n\t*page_break\n*comment\n\n\nI spent my afternoon thinking about the upcoming party.\n\nIt was just over a week away.\n\n*page_break\n\nIt was nice having the distraction.\n\n*page_break\n\n*goto_scene octoberTwentythird\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobertwentythird": "\n\n\n[i]Today is October 22nd, Wednesday.[/i]\n\n*page_break\n\nThe day passed quickly and without incident. I still mulled over what I wanted\nto do.\n\nMaybe I was just over thinking it. I was stressing myself out for no good reason.\n\n*page_break\n\n\"Screw it.\"\n\nIt was time to make a decision.\n\n*choice\n\t*if (ElizabethEvents = 6) #Ask Elizabeth\n\t\t*goto_scene elizabethEnd\n\t*if (MatthewEvents = 6) #Ask Matthew\n\t\t*goto_scene matthewEnd\n\t*if (MalkaEvents = 6) #Ask Malka\n\t\t*goto_scene malkaEnd\n\t*if (DamienEvents = 6) #Ask Damien\n\t\t*goto_scene damienEnd\n\t*if (RoxyEvents = 6) #Ask Roxanne\n\t\t*goto_scene roxanneEnd\n\t#Honestly, I don't think there was anyone I wanted to go with.\n\t\t*comment BadEnd\n\t\t\n\t\tAs I walked away from school, I realized there wasn't really anyone I wanted to invite to the party.\n\t\t\n\t\tMaybe I just hadn't gotten close enough to anyone.\n\t\t\n\t\t*goto_scene ending\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "prologue": "\n\n\n\n\n\n[i]What gender do you want your character to be?[/i]\n\n*fake_choice\n\t#A boy\n\t\t[i]And what about ${His} name?[/i]\n\t\t\n\t\t*fake_choice\n\t\t\t#Alex\n\t\t\t\t*set Name \"Alex\"\n\t\t\t\t*goto AfterName\n\t\t\t#I'll choose my own.\n\t\t\t\t*comment\n\t\t\t\t*goto BeforeName\n\t#A girl\n\t\t*set Sex \"female\"\n\t\t*set Him \"her\"\n\t\t*set His \"her\"\n\t\t*set PHis \"hers\"\n\t\t*set He \"she\"\n\t\t*set Himself \"herself\"\n\t\t*set Boy \"girl\"\n\t\t*set Son \"daughter\"\n\t\t*set Guy \"girl\"\n\t\t*set Boyfriend \"girlfriend\"\n\t\t*set Man \"lady\"\n\t\t[i]And what about ${His} name?[/i]\n\t\t\n\t\t*fake_choice\n\t\t\t#Alexis\n\t\t\t\t*set Name \"Alexis\"\n\t\t\t\t*goto AfterName\n\t\t\t#I'll choose my own.\n\t\t\t\t*comment\n\t\t\t\t*goto BeforeName\n\n*label BeforeName\n\n*input_text Name\n\n$!{Name}, is that right?\n*choice\n\t#Yes\n\t\t*goto AfterName\n\t#No\n\t\t*goto BeforeName\n*label AfterName\n\n\n\n*comment Character creation script above\n\n\n\n\n\n\nElizabeth Leavitt stood atop her balcony, overlooking the crowd below.\n\nHer eerily pale skin matched her pristine white dress. Elizabeth's ebony hair\ncontrasted deeply with her pure white appearance. It hung low enough to\nreach the small of her back.\n\nShe wasn't human, she was a vampire. Elizabeth wasn't been bitten\nand turned. She was simply born to a vampire couple.\n\nA hundred years ago, a mob of humans gathering outside her home\nwould have been a bad sign.\n\nA rock smashed against the brick wall next to her. Another busted\nthrough one of her windows.\n\nThings weren't significantly better in the present day, with only one small\nexception.\n\nHer kind no longer hid in the dark.\n\nFifteen years earlier, only a year before her own birth, creature's\nof the night came out of hiding. Some said they believed humanity had\nreached the point where they could be accepted in society.\n\nOthers were more pragmatic, and simply recognized that recent advancements\nin technology made it difficult to remain hidden.\n\nAnother rock came an inch from grazing her head. Her eyes narrowed at a group\nof four teenagers within the crowd.\n\nElizabeth noticed a ${Boy} amongst the group. A black cloth covered ${His} mouth and nose, obscuring\n${His} face. Strands of black hair hung under ${His} cap.\n\n$!{His} eyes locked on Elizabeth's. Even through that makeshift mask, Elizabeth could see\na scowl form.\n\n*page_break\n\nFlashing red and blue lights appeared at her front gate. Three police cars\npulled in.\n\n\"Finally.\" Elizabeth crossed her arms. \"It took them ages.\"\n\nA gentle hand pulled Elizabeth back.\n\n\"Honey,\" Elizabeth's mother said. \"Please stay inside until this is cleared up.\"\n\nShe was a tall woman. Her skin was even paler than Elizabeth's.\n\n\"They broke one of our windows,\" Elizabeth said.\n\n\"The police are already here,\" her mother said. \"They'll deal with the ones that did that later.\"\n\n\"'Ones'?\" Elizabeth asked. \"It wasn't just one or two, they were all doing that.\"\n\n\"Sweetie... they-\"\n\n\"Whatever.\" Elizabeth stormed off.\n\n*page_break\n\nThe evening passed quietly after that. The police made no arrests, which didn't surprise Elizabeth in\nthe least.\n\nShe ate at the dinner table, her mother sat across from her, and her father was in the other room, talking\nto someone on the phone.\n\nElizabeth picked at a piece of chicken on her plate.\n\n\"Aren't you going to eat?\" her mother asked.\n\nElizabeth shrugged.\n\n\"Are you still angry?\"\n\n\"Of course I'm still angry!\" Elizabeth snapped. \"That's the second time those animals\nhave shown up at our doorstep! We're not leaving town, so why don't they just stay home!?\"\n\n\"We have to be patient. If we are, they will eventually leave us alone.\"\n\nElizabeth looked down at her food. Her thoughts drifted back to that ${Boy}. $!{He} was only one of\nmany, but if there was a single person in that crowd Elizabeth wanted to get back at, it was ${Him}.\n\nElizabeth didn't know why. Maybe it was just because ${His} face was the only one she really looked at,\ncovered up as it was.\n\nHer father walked in from the other room. Unlike her mother, and herself, he\nlooked fairly normal. His hair was short and black, and his skin tan.\n\n\"Looks like we're having guests,\" he said.\n\n*page_break\n\nElizabeth's father had a friend. That friend had fallen on rough times. Elizabeth's family\nwas quite well off, and had a sizeable guest house.\n\nThey'd only be staying for a month or so. Totally. For sure.\n\nThe Leavitt family stood in front of their manor.\n\n\"Why are we taking in these bums?\" Elizabeth asked.\n\nHer mother nudged her. \"Be nice. They need help.\"\n\n\"So do lots of people.\"\n\n\"They're old friends of your father.\"\n\nElizabeth rolled her eyes.\n\n\"And me.\"\n\nElizabeth's expression stubbornly remained glum.\n\n\"And they might become your friends too.\"\n\nA black car pulled up to their front gate. Her father was already standing by it\nto meet them.\n\nA blond woman stepped out of the car. They chatted in the distance.\n\nAfter a few moments, the gates creaked open and the black car pulled through. It drove\naround their manor and headed toward the area behind it, where the guest house was\nlocated.\n\nElizabeth and her mother followed them around the manor.\n\n*page_break\n\nThe guest house was nothing compared to the manor next to it, but it wasn't a bad space\non its own. It resembled a one story house with a well-tended garden out front.\n\nThe woman stepped out of the car, followed by a teenager. The youth was clearly her ${Son},\nand was around Elizabeth's age.\n\nSomething about ${Him} caught Elizabeth's attention. She studied every inch of ${Him}.\n\nBlack hair. It stuck out to Elizabeth more than anything. The texture. The thickness.\n\n${He} looked at Elizabeth. $!{His} expression was grim.\n\nElizabeth narrowed her eyes at ${Him}.\n\n$!{He} glared back.\n\nElizabeth crossed her arms. A smirk formed across her lips.\n\n\"It's ${Him}.\"\n\n\"Hmm?\" Elizabeth's mother tilted her head. \"Do you know ${Him}, honey?\"\n\nShe wondered how long they'd be allowed to stay if she mentioned their\n${Son} had been in that mob. The one that threw rocks at their manor.\n\nAt her.\n\nAnd then, another thought drifted into her mind.\n\nElizabeth's smirk grew wicked. \"Why, yes. I think I do.\"\n\n*page_break\n\n*goto_scene firstDayNewJob\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "roxanneend": "\n\n\n\nRoxanne.\n\nShe and I... well, we didn't exactly have the best of friendships. In fact, out of every creature\nI had met, we probably had the worst relationship possible.\n\nAnd I wasn't sure how much that had really changed.\n\nI think I had begrudgingly earned her respect when I kept showing up despite her overwhelming aggression,\nbut I wasn't sure there was much more to it than that.\n\nRespect.\n\nNot friendship.\n\nCertainly not affection.\n\nJust... respect.\n\n*page_break\n\nStill... I couldn't help but feel something a little deeper for her, even if I didn't quite know why.\n\nMaybe it was because of how much we really didn't get along that I in some strange way became attracted\nto her.\n\nOr maybe, it was just because she was kind of a badass. There was definitely something exciting about that,\neven if I couldn't really explain what that something was.\n\n*page_break\n\nI wasn't sure where she was, but the werewolf camp seemed like a safe enough bet. Even if she didn't go straight there\nafter school, I could reasonably expect her to show up eventually.\n\nHer pack was still training. Even if she had no plans of taking part in the festivities, she still apparently felt\nobligated to be a part of it.\n\nI passed through the gate as soon as I could, and made my way toward the camp.\n\nTo my surprise, I found a familiar old man walking along the road.\n\n\"Jeremiah!\" I waved as I approached him. He had been walking back toward his camp.\n\nHe nodded at me in passing. \"What brings you out this way?\"\n\n\"Oh, I was planning on talking to Roxanne about something.\"\n\nJeremiah nodded slowly. \"And what might that 'something' be?\"\n\n\"Oh... uh.\" I thought about my response.\n\n*fake_choice\n\t#I was going to ask her out.\n\t\tJeremiah raised a brow at me.\n\t\t\n\t\t\"Is that... fine?\" I asked.\n\t\t\n\t\tHe closed his eyes, seemingly deep in thought. \"That depends on her.\"\n\t\t\n\t\t\"But I mean, there's no werewolf law against it. Is there?\"\n\t\t\n\t\tJeremiah chuckled and shook his head. \"No, no. It's hardly forbidden. Or even\n\t\tthat uncommon.\"\n\t\t\n\t\tI smiled. [i]Good to know.[/i]\n\t#I just wanted to talk to her about the Leavitt's Halloween party.\n\t\t\"I believe she's planning to attend,\" Jeremiah said. \"If only for a short while.\n\t\tShe'll be with us for most of the night.\"\n\t\t\n\t\t\"Right...\" I said. \"Your pack has that... reunion. Thing.\"\n\t\t\n\t\tHe nodded. \"Correct\"\n*comment\n\n*page_break\n\nThe camp slowly came into view.\n\n\"Do you know if she's here?\" I asked.\n\n\"Sorry.\" Jeremiah shrugged. \"I've been out in the forest all day. I haven't been to the camp since this morning.\"\n\nI nodded. \"Alright. Thanks.\"\n\n*page_break\n\nI wandered the camp grounds, trying to see if I could make out Roxanne's face in the crowd. People were still gathered\naround only a few different spots. Everybody was sparring or training with one another.\n\nAfter several minutes I started stopping people to ask them if they had seen Roxanne. I continuously got a negative\nresponse.\n\nAfter a long while, I concluded that she wasn't around.\n\n*page_break\n\nAnd so I waited.\n\nAnd waited.\n\nAnd waited.\n\n*page_break\n\nThe sun was starting to set, and most of the wolves were starting to tire. I would have been sad to lose a free show, but\nhonestly it was getting pretty old to watch anyway.\n\nEvidently becoming a werewolf imbued one with enhanced stamina, because otherwise I couldn't imagine how those people were\nable to keep fighting for hours like that.\n\nI looked down at my own body. [i]Or maybe I'm just out of shape.[/i]\n\n\"You're here late, aren't you?\" Roxanne asked.\n\n*page_break\n\nI whipped around a little too cheerfully. Roxanne was watching me curiously, a hint of amusement on her smile.\n\n\"I've been waiting for you,\" I said.\n\n\"Why?\" Roxanne asked.\n\n\"Well... you got invited to the Halloween party, right?\" I asked. \"The one the Leavitt's are hosting?\"\n\nShe nodded.\n\n\"Great!\" I smiled at her. \"I was wondering if you wanted to come with me.\"\n\nRoxanne tilted her head as she eyed me up and down.\n\n\"You know...\" I swallowed nervously. \"As a date.\"\n\nHer eyes stopped. For a brief moment it didn't really look like she was staring at anything. And then, just\nas suddenly, her eyes darted up to mine.\n\nI flinched back ever so slightly.\n\n\"You're asking me out?\"\n\nI slowly nodded.\n\nRoxanne crossed her arms as she walked around me. The way she was looking me over made it seem like she was sizing\nme up.\n\n*page_break\n\n\"I guess.\" Roxanne's tone was weirdly indifferent.\n\nFor a second I thought I didn't hear her right.\n\n\"But, I'm not going to be there for very long,\" Roxanne said. \"The pack expects me to be here on Halloween\nnight, even if I'm not going to be taking part in the competitions.\"\n\n\"Right...\" I smiled. \"I mean- great. That's great.\"\n\n\"Can you find your way back?\" Roxanne asked, looking out toward the setting sun.\n\n*page_break\n\nIt was getting very low. I was pretty sure it would be dark long before I got back.\n\nI was a lot more familiar with the forest than I used to be, but I was still a bit worried.\nThere was a killer on the loose. And it had targeted me before.\n\nBeing caught out in the dark by that thing was a genuinely unsettling idea.\n\n*page_break\n\nApparently Roxanne sensed my concern, because she immediately grabbed my arm and led me out\nof the camp, toward the gate.\n\nDirectly toward it, that is. She didn't bother with the nearby dirt road, which wasn't that surprising.\nShe almost certainly knew the area well, and it'd be faster to go straight toward the gate, then follow\nthe road for some arbitrary distance before breaking off.\n\n\"Why did you ask me out?\" Roxanne asked.\n\n*page_break\n\nThe question came so far out of nowhere that it nearly stopped me in my tracks.\n\nRoxanne glanced at me as we were walking, an expectant look across her face.\n\n\"Oh, uh...\" I still wasn't quite sure what it was about her I liked.\n\n*page_break\n\nMaybe it wasn't just one thing.\n\n*set Var 0\n\n*fake_choice\n\t#\"You're cool.\"\n\t\t\n\t\tRoxanne smirked, something about her expression suggested she already knew this, and wanted to say\n\t\tas much.\n\t\t\n\t\t\"Fair enough,\" she said.\n\t\t\n\t#\"I think its just attraction. Totally irrational.\"\n\t\t\n\t\t\"Something primal, huh?\" Roxanne seemed to be deep in thought for a few moments. \"I can appreciate\n\t\tthat.\"\n\t\t\n\t\tI wondered if I should make a comment about her being a werewolf, but thought better of it. I hadn't\n\t\theard any of the wolves referring to themselves as being animals. I wasn't certain the idea wouldn't\n\t\toffend her.\n\t\t\n\t#\"I don't really know.\"\n\t\t*set Var 1\n\t\t\n\t\tRoxanne raised a brow at me.\n\t\t\n\t\tI shrugged.\n\t\t\n\t\tShe chuckled under her breath before pressing on.\n\t\t\n*comment\n\n*page_break\n\n\"So... why did you say yes?\" I asked.\n\nRoxanne shrugged. \"I don't really know.\"\n\n*if (Var = 1)\n\tI laughed. It was a little louder than I meant it to be.\n\t\n\tRoxanne cracked up to.\n\t\n\t\"I think that might actually be a good sign,\" I said.\n\t\n\tShe smiled at me. \"I hope so.\"\n*if (Var = 0)\n\tI frowned.\n\t\n\t\"You're... not a terrible ${Guy},\" she said. \"I've dated worse. Far worse.\"\n*comment\n\n*page_break\n\nA dark gloom gripped the forest. I could still make out an orange blush across the sky, but the canopy\nwas choking out what little light we could have been getting.\n\nShadows surrounded us. Odd noises filled the forest.\n\nI glanced at Roxanne. [i]Glad she's here.[/i]\n\n*page_break\n\nA ringing sound filled the air.\n\n*page_break\n\nI looked around.\n\n*page_break\n\n[i]Like a bell.[/i]\n\n*page_break\n\nI stopped.\n\nRoxanne turned around. \"What's up?\" She stared at the bell hanging from my neck. \"What is-\"\n\nSomething slammed into me from behind.\n\n*page_break\n\nI quickly jumped to my feet.\n\nAnd found a meaty hand gripping my throat.\n\nThat thing was there.\n\n[i]It followed me into this side!?[/i]\n\n*page_break\n\n[i]It's not possible. It needs a key. It need-[/i]\n\nIt slammed a fist right into my stomach. The force was great enough that I nearly vomited from\nthe strike.\n\nI fell to my knees. I willed myself to get back up, but I couldn't move.\n\nIt kicked my in the chest, and I went sprawling across the grass.\n\n\"You've come to me?\" it asked. \"Surprising.\"\n\n*set Damage + 3\n\n*page_break\n\nI glanced over to the side, trying to see what Roxanne was doing.\n\nShe wasn't standing nearby. In fact, I didn't see her at all.\n\nI looked at that thing as it approached me.\n\nA low growl filled the air.\n\n*page_break\n\nThat thing turned around just as a monstrous wolf-beast leapt onto its back. The sudden weight caused\nit to buckle to the ground. The wolf bit down on its shoulder, and tore a chunk of meat away.\n\nIt let out a low groan before throwing her back with one arm.\n\nThose werewolves seemed bigger to me before.\n\nCompared to me, they were huge.\n\nBut she wasn't fighting me. That thing, as human as it looked, was still quite a bit larger than her.\nIt had more meat on it. More muscle.\n\nI wasn't sure Roxanne could win that fight through brute force alone.\n\n*page_break\n\nAnd then I remembered the spell.\n\n*page_break\n\nI kept my voice low. It was barely more than a whisper.\n\nI spoke the incantation.\n\nThat thing showed no reaction. Though I noticed Roxanne's ears twitch a few times.\nHer animalistic eyes fell on me for a moment before returning to that thing.\n\nI kept it going. I had practiced the spell so much I would never forget how to speak\nit.\n\n*page_break\n\nIt reached over, and touched its shoulder for a moment, as if it had just noticed the wound\nfor the first time.\n\nRoxanne lunged forward.\n\nIt balled its hands together and brought them down together over head.\n\nRoxanne let out a dog-like yelp as she crashed into the forest floor.\n\n*page_break\n\nI didn't stop the spell, but I found myself really wanting to yell for her to get up and take\nanother chunk out it.\n\nIt was probably all that she was going to need to win.\n\nIt grabbed Roxanne by the scruff of her neck in one hand, and wrapped his arm around her torso\nbefore throwing her against a tree.\n\n*page_break\n\nI winced as it stomped down on her ribs.\n\nRoxanne suddenly started violently snapping at it. Her teeth sunk into its arms multiple times\nin quick succession.\n\nIt backed up enough for Roxanne to scramble away.\n\nShe slowly circled it. I noticed she limped as she strafed around.\n\nThat thing on the other hand, looked completely fine.\n\nI diligently kept up the spell.\n\n*page_break\n\nRoxanne suddenly put some distance between herself and it.\n\nShe howled into the air. It was so loud I could hear the sound pounding\ninto my chest.\n\nI nearly lost focus on the spell.\n\n*page_break\n\nIt charged forward, and punched at her. Roxanne ducked just out of the its range before moving in and\nclawing at it. Her swipe didn't have that much effort put into it. it easily avoided the swipes.\n\nDistant howling filled the air.\n\nThey went back and forth for a long while. Roxanne's aggression decreased substantially.\nShe bit and swiped at it every few moments, but mostly was keeping a defensive position.\n\n*page_break\n\nIt lunged forward, and grabbed ahold of Roxanne's neck in both hands. It dragged her up into the air.\n\n\"Dammit.\" I broke the spell as I moved forward.\n\nI desperately felt out the ground, but I only found a particularly strong stick.\n\nWith no other options, I sprinted forward and jammed it into the thing's side. I was pretty sure I had actually\npierced its ribs at least a couple of inches.\n\nUnfortunately, it responded by effortlessly smacking me to the ground with one hand.\n\n*page_break\n\nAs I regained my footing growls filled the air.\n\nI looked around, and saw various shapes and silhouettes surrounding us on all sides.\n\n*page_break\n\nI slowly backed up against a tree.\n\nThat thing slowly swivelled its head around, taking in the sight of all those creatures.\n\nRoxanne raked her claws across its arms, forcing it to release her. She retreated back as\nthe pack moved forward.\n\nTheir movement was slow and deliberate. I didn't hear a sound except twigs snapping, and leaves\nbeing crushed as they moved forward.\n\nI imagined that thing realized how badly it had screwed up.\n\nIt took on a wolf pack alone.\n\n*page_break\n\nThe pack lunged forward.\n\n*page_break\n\nIt lost.\n\n*page_break\n\nI averted my gaze, but I couldn't block out the sound of meat being torn apart. For all that was being done\nto it, that thing didn't utter so much as a whimper.\n\nOr maybe it did, but I just couldn't hear it over the pack's violence.\n\nI shakily got to my feet, and backed away.\n\nDeep down, I understood that they had saved me.\n\nBut, in that moment, I felt greater fear than I had at any point in my life.\n\n*page_break\n\nI ran.\n\n*page_break\n\nIt was a ridiculous response. I had no reason to think anything was going to happen to me.\n\nNot to mention no idea where I was going.\n\nIt was irrational, but it was what my body was screaming at me to do.\n\nIt was instinct.\n\n*page_break\n\nI stopped when I tripped over an exposed root and tumbled across the ground.\n\nI was out of breath.\n\nMy body ached from getting smacked around by that murderer.\n\nI smiled. [i]It's dead.[/i]\n\nThey had killed him. It was over.\n\n*page_break\n\nI didn't need to worry about him coming back anymore.\n\n*page_break\n\nSomething wet touch the back of my neck. I instinctively swatted my hand at whatever\nthat was.\n\nI briefly touched a furry muzzle.\n\nI whipped around too quickly. I knew I had betrayed my fear.\n\nI didn't want any of them to see that. I had spent time with them, learned about them.\n\nI shouldn't have felt any fear.\n\n*page_break\n\nThe beast in front of my shift. Its fur melted away in the darkness, leaving behind a human\nframe.\n\nEven in the dark, I could make out Roxanne's face.\n\nShe moved closer.\n\n\"Roxanne... I-\"\n\nShe put her hands on my shoulders. \"It's okay.\" And pulled me closer, before wrapping her arms\naround me.\n\n\"I didn't think you-\" Whatever lie I tried to tell died in my throat. \"Sorry.\"\n\n\"It's okay.\"\n\n*page_break\n\nI don't know how long we were there like that for.\n\nMinutes passed.\n\nfor the longest time I only heard insects out in the forest, and our own breathing.\n\nI focused on hers. Every few seconds, her warm breath ran across my shoulder.\n\nHer presence was comforting. I was glad she was so close.\n\n*page_break\n\nEventually, however, it had to end.\n\nThe pack was still there, picking through its infested remains. Insects seethed in what I imagined\nused to be that thing's body.\n\nIt had been absolutely torn to shreds, and I was glad the darkness stopped me from making out\nhow bad of a mess that really was.\n\n*page_break\n\nRoxanne walked me to the gate.\n\n\"Thanks for coming with me,\" I said. \"I'll-\"\n\nShe suddenly grabbed and kissed me.\n\nRoxanne ended it before I even had a chance to react to what was happening.\n\n\"I'll see you around,\" she said.\n\n*page_break\n\n*set Damage 0\n\nThe days passed quickly after that.\n\nI stood in front of the manor in the nicest clothes I could put together.\n\nMy mother was incessantly taking pictures.\n\nOf. Everything.\n\nShe would not stop.\n\n*page_break\n\n\"Oh, now [i]that's[/i] the best costume so far!\" She rapidly took pictures of a couple\nwalking through the front door.\n\nI sighed.\n\n\"So....\" My mom walked up next to me. \"Who are you waiting for?\"\n\n\"Roxanne.\"\n\n\"Huh?\" My mom tilted her head. \"She's already inside. I think she's up on the balcony or something.\"\n\n\"What?\" I quickly rushed inside. [i]We probably should have agreed on somewhere to meet.[/i]\n\n*page_break\n\nI made my way to the second floor and stepped out into the balcony.\n\nSure enough, Roxanne was there.\n\nShe wore a pure white dress. It was surprisingly girly for someone like her.\n\nShe caught me staring. \"How do I look.\"\n\n\"Huh?\"\n\n\"Hey.\" Roxanne smirked. \"I like to dress up pretty too sometimes.\"\n\n\"Sorry.\" I chuckled. \"You do look great though.\"\n\n\"I know.\" She wrapped an arm around my waist, and led me over to the balcony. \"It's a great view\nup here.\"\n\nWe peered out over the dense forest near the manor. The sky was clear, and there was enough moonlight\nto make out the surrounding landscape.\n\n*page_break\n\n\"It's crazy,\" I said.\n\nRoxanne glanced at me.\n\n\"How we got here, I mean.\" I laughed. \"So much happened... and it all started with me being part of an\nangry mob.\"\n\nRoxanne pulled me a little closer. \"I'm just glad things turned out like this.\"\n\n\"It could have gone badly.\" I sighed. \"I could have... remained set in my ways. Or gotten murd-\"\n\nShe pulled me into a deep kiss. It lasted long enough that I was actually able to respond to it.\n\n\"For tonight,\" Roxanne said. \"Let's forget about all that.\"\n\nI smiled. \"Sounds good to me.\"\n\n\"C'mon,\" she said. \"I want to catch at least one dance in the party before I have to go.\"\n\nWe left the balcony together.\n\n*page_break\n\nDespite everything. I felt lucky.\n\n*goto_scene ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "screenshots": "*comment BeginShotOne\nscreenshots!\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n\"Of course, I could always tell them you were amongst that mob earlier.\" She scowled\nat me. \"And with one of the ones throwing rocks to boot. How long do you think it will\nbe before they throw you and dear old mom out?\"\n\n\"I-\"\n\n\"A week? A day? Five minutes.\" She chuckled. \"Yes, definitely that last one.\"\n\n*fake_choice\n\t#\"Look, I wasn't trying to-\"\n\t#\"You deserved it you fr-\"\n\t#Say nothing\n*comment EndShotOne\n\n\n\n*comment BeginShotTwo\n\n*set MatthewEvents 4\n*set KnowsRoxy 1\n*set ElizabethEvents 1\n*set Cash 40\n*set Athletics 60\n\n*script changeBackgroundColor(\"black\")\n\nMatthew collapsed.\n\nNot, fell to one knee. Collapsed.\n\nI made a move to enter the pit, but several people beat me to it.\n\nMatthew waved them off, and pushed himself back to his feet. His legs were\na bit shaky, but he managed to walk out of the ring and sit down in some grass.\n\n*fake_choice\n\t#Say nothing\n\t#\"Are you alright?\"\n\t#\"What the hell are you doing?\"\n*comment EndShotTwo\n\n\n\n*comment BeginShotThree\n\n*set MatthewEvents 0\n*set ElizabethEvents 0\n*set Cash 0\n*set Athletics 40\n\n*script changeBackgroundColor(\"sepia\")\n\n\"So what's your deal?\"\n\n\"Huh?\"\n\n\"Why were you with that mob?\" Elizabeth asked. \"Do you really hate my kind that much,\nor...?\"\n\nI mulled her question over.\n\nWhy was I with those people stoning her house?\n\t\n*fake_choice\n\t#Supernatural creatures are dangerous. I shouldn't tolerate their presence.\n\t#It's what my friends were doing. I didn't really question it beyond that.\n*comment EndShotThree\n\n\n*comment BeginShotFour\n\n*set KnowsMalka 1\n*set KnowsDamien 1\n*set Cash 100\n*set ElizabethEvents 4\n*set RoxyEvents 2\n*set MatthewEvents 3\n*set Athletics 80\n*set Studies 80\n\nI closed my eyes, and took a deep breath.\n\nThe situation looked bad.\n\nFive kids dead in front of Roxanne's house.\n\nThey had spray paint.\n\nDid Roxanne or her family really kill them?\n\n*fake_choice\n\t#Maybe it was Roxanne. She's got a bit of a temper. Maybe it just got out of hand. Matthew's got the right idea here.\n\t#Elizabeth doesn't seem to think Roxanne would be capable of it. I trust her judgement.\n\t#Roxanne and I may not get along very well, but I don't think she'd do this.\n\t#People died. And here we are. Squabbling. Honestly it's pissing me off.\n*comment EndShotFour\n\n\n\n*comment BeginShotFive\n\n*set KnowsMalka 1\n*set KnowsDamien 0\n*set Cash 40\n*set ElizabethEvents 0\n*set RoxyEvents 0\n*set MatthewEvents 0\n*set Athletics 50\n*set Studies 80\n\n\"I was helping her out around school. Some people got the wrong idea.\"\n\n\"Uh-huh.\" Malka looked at Elizabeth. \"What was ${He} helping you with?\"\n\n\"$!{He} was carrying my books.\"\n\nIt took every ounce of willpower in my body not to face palm at that.\n\nI shot an annoyed look at Elizabeth.\n\nShe glared back, and spoke in a hushed whisper. \"What was I supposed to say?\"\n\n*fake_choice\n\t#\"Not that!\"\n\t#\"You were supposed to lie!\"\n\t#\"Just let me do all the talking!\"\n*comment EndShotFive\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "startup": "*title The Vampire House\n*author Jesse Freeman\n*scene_list\n  startup\n  prologue\n  firstDayNewJob\n  highSchool\n  firstDayOfWork\n  theBlackBook\n  octoberFirstDay\n  octoberFirstWeek\n  octoberSixth\n  octoberSeventh\n  octoberEighth\n  octoberNinth\n  octoberTenth\n  octoberEleventh\n  octoberTwelfth\n  octoberThirteenth\n  octoberFourteenth\n  octoberFifteenth\n  octoberSixteenth\n  octoberSeventeenth\n  octoberEighteenth\n  octoberNineteenth\n  octoberTwentieth\n  octoberTwentyfirst\n  octoberTwentysecond\n  octoberTwentythird\n  elizabethEnd\n  matthewEnd\n  malkaEnd\n  damienEnd\n  roxanneEnd\n  subHunterLodge\n  subLeavittManor\n  subCrypt\n  subDamien\n  subRoxanne\n  subRead\n  subStudy\n  subShopClothes\n  subShopBooks\n  subWorkout\n  subChangeClothes\n  noteChoices\n  ending\n*comment\n\n*comment !!! People !!!\n*comment Elizabeth Leavitt - Vampire Girl - well educated - Mega wealthy - Slightly spoiled\n*comment A very pale girl with black hair. Below average height. Thin.\n\n*comment (Wendell) Mr. Leavitt - Vampire Dad - Wealthy business owner - Ultra wealthy\n*comment Short black hair. Tan skin.\n\n*comment (Kara) Mrs. Leavitt - Vampire Mom - ??? - Ultra Wealthy\n*comment Long black hair. Very pale. Tall.\n\n*comment Malka (Leavitt?) - Vampire(?) cousin - Goth - fashionable - Forced to flee home town of Riverbrook\n*comment Black hair (Naturally blond). Average h k. I wore a single\n\t\t\tfingerless glove on my right hand. Rather than ending at my wrist,\n\t\t\tthe glove's cloth ran up my arm, stopping just short of my elbow.\n\t\t\t\n\t\t\tMy pants were black, and fairly plain. The only thing that made\n\t\t\tthem stand out was a belt with a cross design on the buckle.\n\t\t\t\n\t\t\t*return\n\t\t*elseif (WearsGoth = 0) and (Sex = \"female\")\n\t\t\t\n\t\t\t*set WearsGoth 1\n\t\t\t*set WearsPlain 0\n\t\t\t*set WearsStylish 0\n\t\t\t\n\t\t\tI put on a black dress with a transparent lace material hanging past the\n\t\t\tend of it. I had a choker made from an opaque cloth, that was tied together\n\t\t\twith some dark string.\n\t\t\t\n\t\t\tI wore a set of fingerless gloves, with decorative white ribbon weaved into\n\t\t\tthe top of them in a criss-cross pattern. The gloves were long, just barely failing\n\t\t\tto reach my elbows.\n\t\t\t\n\t\t\t*return\n\t\t*else\n\t\t\t[i]Wait... I'm already wearing this![/i]\n\t\t\t\n\t\t\t*return\n\t*if (OwnsStylish = 1) #Wear a stylish outfit\n\t\t*if (WearsStylish = 0)\n\t\t\t\n\t\t\t*set WearsGoth 0\n\t\t\t*set WearsPlain 0\n\t\t\t*set WearsStylish 1\n\t\t\t\n\t\t\tMy jacket, shirt, pants, and cap all had popular brands on them.\n\t\t\tEvery article of clothing was in great condition, made from good\n\t\t\tmaterial, and most importantly, just flat out looked great.\n\t\t\t\n\t\t\tMy outfit's color-scheme contained a lot of blues and whites.\n\t\t\tAll things considered, it came together great.\n\t\t\t\n\t\t\t*return\n\t\t*else\n\t\t\t[i]Wait... Im already wearing this![/i]\n\t\t\t\n\t\t\t*return\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subcrypt": "*comment subroutine for the lakeside crypt. Malka's activity\n\n\n\n\n*if (WearsGoth = 1)\n\t*set Malka + 5\n*comment\n\n\n\n\n\n\n*if (MalkaEvents = 0)\n\t*set Malka + 5\n\t*set MalkaEvents 1\n\t\n\t\"I'm glad you decided to come,\" Malka said.\n\t\n\tI shrugged. \"I didn't see any harm in it.\"\n\t\n\t\"So, you ever been here?\"\n\t\n\t\"Here?\" I wasn't sure what she meant until she stopped in front of\n\ta large building.\n\t\n\tThe words 'Lakeside Crypt' were drawn on a sign over the front door.\n\t\n\t\"Uh... no,\" I said.\n\t\n\t*if (WearsGoth = 1)\n\t\t\"Really?\" Malka asked. \"I'm surprised. You dress perfectly for\n\t\tthis sort of atmosphere.\"\n\t\t\n\t\tI smiled sheepishly. \"Yeah... there were a few people at school\n\t\tI saw dressed like this. I kinda liked this style, but I don't really know\n\t\tanything about the culture surrounding it.\"\n\t\t\n\t\t\"Well,\" she said. \"Now's the best time to learn.\"\n\t*if (WearsGoth = 0)\n\t\t\"Too bad,\" Malka said. \"Still, I think you'll fit in okay. And who\n\t\tknows... maybe my style will rub off on you.\"\n\t\t\n\t\tI smirked. \"We'll see.\"\n\t*comment\n\t\n\t*page_break\n\t\n\tThe windows were heavily tinted to the club, leaving the inside with very little\n\tnatural light. The club's colors were predominantly purple and red. There actually\n\twasn't a whole lot of people present. I got the sense that place\n\twas more popular at night.\n\t\n\tA dance floor took up the entire left half of the building. However, there were\n\tonly a handful of people out on it.\n\t\n\tMusic was playing, though it seemed unusually quiet for what I would expect\n\tfrom a club.\n\t\n\t\"These sorts of places don't really pick up until later,\" Malka said. \"We can hang\n\tout by the bar though.\"\n\t\n\tI stared at her. \"Uh... Malka? I'm not old enough to-\"\n\t\n\t\"If they served alcohol here, do you think they'd be letting teenagers in?\"\n\t\n\t*page_break\n\t\n\tI felt a little out of place.\n\t*if (WearsGoth = 1)\n\t\tEven while wearing the right clothes.\n\t*comment\n\t\n\tMalka and I had taken seats by ourselves. She seemed really excited.\n\t\n\tI smiled. \"You act like you haven't been here before,\" I said.\n\t\n\t\"Oh, I haven't.\"\n\t\n\tI titled my head. \"What?\"\n\t\n\t\"Yeah... I was sorta nervous about coming here alone for the first time.\" She smiled at me.\n\t\"So I figured I'd bring a buddy along.\"\n\t\n\t\"And you didn't think to mention that?\" I asked.\n\t\n\t\"I figured you wouldn't be comfortable coming here for the first time, unless the other\n\tperson had been here before.\"\n\t\n\t\"Yeah,\" I said. \"You'd be right.\"\n\t\n\tShe shrugged. \"Well, there you go. Smart move on my part.\"\n\t\n\t*fake_choice\n\t\t#\"Flawless logic.\"\n\t\t\t*set Malka + 5\n\t\t\t\n\t\t\t\"Why thank you.\"\n\t\t\t\n\t\t\tI rolled my eyes.\n\t\t\t\n\t\t\tShe stuck her tongue out at me.\n\t\t\t\n\t\t\tAfter a few moments of silence, she said, \"Hey, in all seriousness? Thanks for coming out\n\t\t\there with me.\"\n\t\t\t\n\t\t\tI shrugged. \"It wasn't any trouble. And, it's a pretty cool club.\"\n\t\t\t\n\t\t\t\"Think you'll come here with me again?\" she asked.\n\t\t\t\n\t\t\t\"I'll think about it.\"\n\t\t\t\n\t\t\t\"You have my number.\"\n\t\t#\"I was kind of interested in places like this anyway. So, I guess it's fine.\"\n\t\t\t\n\t\t\t*if (WearsGoth = 1)\n\t\t\t\t\"I still can't believe you haven't been to a place like this earlier,\" she\n\t\t\t\tsaid. \"We'll have to come here together again sometime.\"\n\t\t\t\t\n\t\t\t\t\"I'd like that,\" I said.\n\t\t\t\t\n\t\t\t\t\"Give me a call sometime,\" Malka said. \"We'll do this again.\"\n\t\t#\"Why not come with Elizabeth?\"\n\t\t\t\n\t\t\t\"Are you joking?\" Malka raised a brow at me. \"I don't think that girl\n\t\t\teven knows what a club is. And she certainly wouldn't want to come\n\t\t\tto one like this.\"\n\t\t\t\n\t\t\t\"She would if she was going with you,\" I said.\n\t\t\t\n\t\t\t\"Maybe...\" Malka strummed her fingers across the bar. \"Still, it's\n\t\t\tpretty fun hanging out with you.\"\n\t\t\t\n\t\t\t\"Thanks,\" I said. \"Maybe I'll give you a call so we can do this\n\t\t\tagain sometime.\"\n\t\t\t\n\t\t\tShe smiled. \"Sure. Hit me up any time.\"\n\t*comment\n\t\n\tWe chatted and listened to the music for a while after that. It was a nice\n\tafternoon of just hanging around, enjoying ourselves.\n\t\n\tEventually however, we left the club, and went our separate ways.\n\t\n\t*return\n*comment\n\n\n\n\n*if (MalkaEvents = 1) and (Malka >= 20)\n\t*set Malka + 5\n\t*set MalkaEvents 2\n\t\n\tWe sat at the bar again.\n\t\n\t\"So...\" I moved a bit closer to Malka, and kept my tone quiet. \"What are you?\"\n\t\n\tShe tilted her head at me.\n\t\n\t\"I noticed you didn't have fangs like Elizabeth, or her parents. So I'm guessing\n\tyou're not a vampire.\"\n\t\n\tShe shook her head. \"I'm human.\"\n\t\n\t\"What? Really?\"\n\t\n\t\"Uh, yeah?\" She smirked. \"What did you think, I had to be some sort of creature of\n\tthe night because I'm related to some vampires.\"\n\t\n\t\"Kind of, yeah.\"\n\t\n\t*page_break\n\t\n\tI strummed a finger across the bar counter. \"So, there's nothing unusual about you\n\tat all.\"\n\t\n\t\"N... Nope.\" She smiled sheepishly. \"Just a regular girl.\"\n\t\n\tI raised a brow.\n\t\n\t\"Anyway... you should really come here at night sometime,\" she said. \"This place gets\n\treally cool then.\"\n\t\n\t\"You came here at night alone?\" I asked.\n\t\n\t\"Uh... no.\"\n\t\n\tI smirked. \"Did you come here at night ever?\"\n\t\n\tShe smirked for a few seconds before shaking her head.\n\t\n\t\"You're too afraid to come here alone that late aren't you?\" I asked.\n\t\n\t\"Of course not,\" she said. \"That said... if you'd like to, we could-\"\n\t\n\t\"I'm gonna have to pass,\" I said. \"I prefer to be home by night. Also,\n\tI'm not sure the Leavitt's would feel comfortable with you disappearing\n\tat night while they're responsible for you.\"\n\t\n\tShe shrugged. \"I'm sure they'd be cool with it.\"\n\t\n\t\"Have you actually asked them to be sure?\"\n\t\n\t*page_break\n\t\n\tWe talked for the better part of an hour. I didn't even notice when several\n\tgirls approached us.\n\t\n\t\"Malka?\" the tallest of the bunch asked. \"I didn't know you came here.\"\n\t\n\t\"Stephanie!\" Malka shot to her feet, and rushed over to her. \"I didn't\n\tknow you even knew about this place.\"\n\t\n\t\"All the girls come here,\" Stephanie said. \"You've got to join us\n\tafter one of our meetings.\" Her eyes jumped over to me.\n\t\n\tI gave her a small wave.\n\t\n\tShe gave Malka a mischievous smile. \"Who's ${He}?\"\n\t\n\t\"$!{Name},\" Malka said. \"$!{He} was a friend of Elizabeth.\"\n\t\n\t\"Your 'friend' now too, I take it?\"\n\t\n\tMalka gave a sheepish smile. \"Yes, we're friends.\"\n\t\n\t\"Hmm... interesting,\" she said. \"And does ${He} know your a member of our-\"\n\t\n\t\"Club!\" Malka said a little too loudly.\n\t\n\t\"Apparently not.\" Stephanie said. \"We'll see you around, $!{Name}.\"\n\t\n\tI nodded to her, then looked at the time.\n\t\n\t*page_break\n\t\n\tI had lost track of time while chatting with Malka. It was about time I got a move on.\n\t\n\t*page_break\n\t\n\tI gave a hasty goodbye before leaving.\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (MalkaEvents = 2) and (Malka >= 40)\n\t*set Malka + 5\n\t*set MalkaEvents 3\n\t\n\tMalka and I walked through the front doors of the club.\n\t\n\t\"Hey?\" I turned to Malka.\n\t\n\t\"Hmm?\" She went over to our usual spot by the bar.\n\t\n\t\"What club are you a part of?\" I asked.\n\t\n\t\"Club?\" Malka raised a brow. \"What are you talking about?\"\n\t\n\t\"Uh...\" I tilted my head as I took a seat. \"You know. That club you and\n\tapparently twenty other girls are a part of.\"\n\t\n\tHer eyes widened. \"Oh! Right, sorry.\"\n\t\n\t*page_break\n\t\n\tShe nervously scratched the back of her neck.\n\t\n\t\"You know\" I crossed my arms. \"It kind of seems like you're hiding something.\"\n\t\n\t\"What? No! Of course not.\"\n\t\n\t\"Okay,\" I said. \"What club are you a part of?\"\n\t\n\t\"Um...\"\n\t\n\t\"It's taking an awful long time for you to remember the name of this club,\" I said. \"Which\n\tyou are supposedly a member of.\"\n\t\n\tMalka fidgeted  for decoration. It doesn't actually do anything.\"\n\t\n\t\"Does to!\"\n\t\n\tI waited until they were a ways ahead of me before I started walking.\n\t\n\t*page_break\n\t\n\tTo be honest, I didn't really have a game plan. If a car showed up to pick them up... well,\n\tthat'd be that. I couldn't follow a car on foot.\n\t\n\tThe girls crossed the street, and headed straight into the woods.\n\t\n\tI raised a brow at the sight, but kept moving forward.\n\t\n\tThey disappeared just beyond the first line of shrubbery.\n\t\n\tI looked around nervously before rushing forward.\n\t\n\tThere was something that felt really creepy about doing that.\n\t\n\t*page_break\n\t\n\t*if (Sneak = 1)\n\t\tI moved with absolute silence. Crouched low, avoiding\n\t\tbrush and leaves.\n\t\t\n\t\t[i]I. Am. A... preda- wait.[/i]\n\t\t\n\t\tI just stuck to following the girls normally. This whole thing was\n\t\talready really uncomfortable. I didn't want to add actual stalking\n\t\ttechniques to the mix.\n\t*comment\n\t\n\tIt was difficult to follow them. Every step of the way the shrubs just\n\tseemed to grow denser and denser. I constantly snagged myself of random\n\tbranches and thorny plants.\n\t\n\tI would have assumed the girls were having the same problem, except they\n\twere actually getting further and further away from me.\n\t\n\t[i]How are they moving that fast through this!?[/i]\n\t\n\tI pushed forward harder. And quite a bit more noisily.\n\t\n\tHopefully they wouldn't notice.\n\t\n\t*page_break\n\t\n\t\"What the hell are you doing here!?\" A familiar looking girl stood before me.\n\t\n\t\"Er... Stephanie?\" I looked around.\n\t\n\tSeveral other girls were approaching. Malka was amongst them.\n\t\n\t\"I was... about to ask you the same thing,\" I said. \"Can't a ${Guy} take a walk through the\n\twoods without being bothered?\"\n\t\n\tShe scowled at me.\n\t\n\t\"How'd you reach me so quickly, anyway?\" I asked. \"This shrubbery is- oh.\"\n\t\n\tA clearing was a short distance ahead of me.\n\t\n\t\"Wait...\" My eyes narrowed at a familiar couple of trees.\n\t\n\tThey crossed over one another, forming a natural arch.\n\t\n\t*page_break\n\t\n\tThat wasn't just a clearing, it was [i]the[/i] clearing. The gateway was there.\n\t\n\tI shot a suspicious glance at Malka. She was somehow involved with it. I wasn't that\n\tsurprised. She was a close family member of Elizabeth, and she had access.\n\t\n\tMalka looked... not angry. She looked worried actually.\n\t\n\tAnd maybe there was a bit of disappointment in there too.\n\t\n\tI mulled over what I could say.\n\t\n\t*page_break\n\t\n\t\"Hey!\" Stephanie took a step toward me. \"You shouldn't-\"\n\t\n\t\"So you know about it too, Malka?\" I asked. \"I'm surprised. You haven't been\n\tout here that long. Elizabeth must have shown it to you.\"\n\t\n\t\"Huh?\" Malka eyed me curiously. \"You... you know?\"\n\t\n\t\"Of course.\" I crossed my arms. \"I've lived in this town all my life. How could\n\tI not?\"\n\t\n\tMost of the girls looked surprised, as did Malka herself.\n\t\n\t\"So you already know what we are. What we're doing.\" Malka gave me a wary look.\n\t\n\t\"...Yes.\" I didn't let myself wince or look away. This had to look good. \"Like I said,\n\tI don't have a problem with it.\"\n\t\n\tMalka smiled. \"I'm glad to hear that.\"\n\t\n\tI smirked and shrugged.\n\t\n\t\"I was really worried about how you'd react if you knew I'm basically a walking corpse.\"\n\t\n\t*page_break\n\t\n\tI stared.\n\t\n\t*page_break\n\t\n\tAnd stared, and stared.\n\t\n\t*page_break\n\t\n\t\"What?\"\n\t\n\t\n\t*return\n*comment\n\n\n\n\n*if (MalkaEvents = 4) and (Malka >= 80)\n\t*set Malka + 5\n\t*set MalkaEvents 5\n\t\n\tI stared at my phone. My thumb rested over the 'send' button.\n\t\n\t'Hey Malka. Want to hang out today?'\n\t\n\tI tried to get myself to press it, but I just couldn't get my thumb\n\tto move forward.\n\t\n\t*page_break\n\t\n\t[i]A corpse. What did that even mean?[/i]\n\t\n\tGiven that she was hanging out with a bunch of other girls, going to\n\ta secret meeting or something, I kinda figured they might be witches\n\tor something.\n\t\n\tBut nope. A corpse.\n\t\n\tAnd she thought I fully understood what she was. Of course, I didn't\n\thave a clue.\n\t\n\tAnd I wouldn't until I asked her.\n\t\n\tWhich would reveal I had lied right to her face.\n\t\n\t*page_break\n\t\n\tI sighed. \"Screw it.\" I sent the message.\n\t\n\tI heard a phone ring behind me.\n\t\n\t\"Sure,\" Malka said.\n\t\n\tI flinched before whipping around.\n\t\n\tShe shot me a smile before leading me away from the school.\n\t\n\t*page_break\n\t\n\tI kept glancing toward Malka as we walked, then turning away when she noticed.\n\t\n\t\"Something wrong?\"\n\t\n\t\"No.\" I gave a weak smile. \"Just... thinking about something.\"\n\t\n\t\"About what?\" Malka asked.\n\t\n\t*page_break\n\t\n\tWe reached the club. As usual, there weren't a whole lot of a people there.\n\t\n\t\"You've been acting really strange,\" Malka said. \"If something's wrong, you can\n\tjust tell me.\"\n\t\n\tI scratched the back of my head. \"I was just a little curious. I don't actually know\n\tthat much about your...\"\n\t\n\t[i]Is condition a good word to use? Probably not.[/i]\n\t\n\t[i]Ailment? No that's even worse.[/i]\n\t\n\t\"Ah, I see.\" She tilted her head. \"I thought you said you already knew about that.\"\n\t\n\tI quickly took our usual spot by the bar. \"I just... I mean I know what you are, but\n\tI don't actually know that much about it. What it's like I mean.\"\n\t\n\t\"Oh.\" Malka seemed to be considering what I said. \"Let me think about it...\"\n\t\n\t*page_break\n\t\n\t\"Well, I'm not sure where to start,\" Malka said. \"What do you want to know?\"\n\t\n\t*set Var 0\n\t\n\t*label MalkaQuestions\n\t\n\t*choice\n\t\t*hide_reuse #\"Do you still need to eat?\"\n\t\t\t\n\t\t\tShe laughed. \"Of course!\"\n\t\t\t\n\t\t\tI smiled sheepishly. \"I wasn't sure.\"\n\t\t\t\n\t\t\t\"My system can't handle anything but meat though,\" she added.\n\t\t\t\n\t\t\t\"Will vegetables make you sick?\" I asked.\n\t\t\t\n\t\t\tShe shook her head. \"If I ate a diet of only fruits and vegetables the worst\n\t\t\tthat would happen is that I would eventually starve to death.\"\n\t\t\t\n\t\t\t\"That's... pretty bad actually,\" I said.\n\t\t\t\n\t\t\tShe smirked. \"Because meat is so hard to come by?\"\n\t\t\t\n\t\t\t*goto MalkaQuestions\n\t\t*hide_reuse #\"How long have you been like this?\"\n\t\t\t*set Var + 1\n\t\t\t\n\t\t\t\"Less than a year,\" she said.\n\t\t\t\n\t\t\t\"You were alive before that?\" I asked.\n\t\t\t\n\t\t\tShe nodded. \"I was a totally normal girl and everything.\"\n\t\t\t\n\t\t\t*goto MalkaQuestions\n\t\t*hide_reuse *if (Var >= 1) #\"Can I ask how it happened?\"\n\t\t\t*set Var + 1\n\t\t\t\n\t\t\t\"My parents found someone who could bring me back,\" she said. \"They weren't willing to just\n\t\t\tsee me go, so...\"\n\t\t\t\n\t\t\tI nodded my head solemnly.\n\t\t\t\n\t\t\t\"They had a close friend who knew how to do this.\"\n\t\t\t\n\t\t\tI wondered how she died, and if that was too personal of a question.\n\t\t\t\n\t\t\t*goto AfterMalkaQuestions\n\t*label AfterMalkaQuestions\n\t\n\t*page_break\n\t\n\tIt definitely was.\n\t\n\t*page_break\n\t\n\t\"Alright, alright,\" Malka said. \"That's enough of all this moody talk. Let's just enjoy ourselves!\"\n\t\n\tI smiled. \"Sure.\"\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (MalkaEvents = 5) and (Malka >= 100)\n\t*set Malka + 5\n\t*set MalkaEvents 6\n\t\n\tI waited at the club for Malka to arrive. I still didn't feel like I really understood what\n\tshe was.\n\t\n\tMaybe it didn't matter though. Malka was still Malka. If she was a ghoul or whatever, maybe it\n\twasn't that big of a deal.\n\t\n\tThere was one thing that was bothering me though. Malka believed I already knew what she was.\n\tIt was the only reason she told me anything at all.\n\t\n\tWas that a breach of trust?\n\t\n\t\"Been waiting long?\" Malka asked.\n\t\n\tI shook my head, and threw o
