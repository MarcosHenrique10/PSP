logy, explaining I already had plans before heading out\nto meet up with Matthew.\n\n*page_break\n\nMatthew stood in front of the high school. A large back pack hung from his\nshoulders. He waved at me as I approached.\n\n\"Hey!\" Matthew smiled. \"I'm glad you came. Today's going to be great!\"\n\n*page_break\n\nWe walked for a long time. We skirted around the border of the woods,\nbefore finally taking a lonely road that led deep into it. I wasn't too familiar\nwith the area, so I had to trust Matthew to know where we was going.\n\nAfter an hour passed I heard the sound of a river flowing.\n\n*page_break\n\nWe stepped away from the road, and marched up a short hill. Pushing our way\npast a thick set of shrubs, we found ourselves at the bank of a river.\n\nThe river shore was rocky. I saw fish darting back and forth just under the\nwater's surface.\n\n*fake_choice\n\t#\"Seems like it'd be a good place to go fishing.\"\n\t\tMatthew chuckled. \"I'm pretty sure that's illegal.\"\n\t\t\n\t\tI shrugged. \"Just saying.\"\n\t#\"So... what now?\"\n\t\tMatthew smirked. \"Now. We train.\" He flexed an arm. \"Ready to get pumped?\"\n\t\t\n\t\t\"...I guess so. Sure.\"\n\t\t\n\t\tHe frowned.\n\t\t\n\t\t\"Oh, I'm sorry.\" I cleared my throat. \"Yes, friend. Let us do this. My excitement\n\t\tis quite brimming.\"\n\t\t\n\t\tHe laughed. \"Shut up.\"\n*comment\n\n*page_break\n\nMatthew's pack contained some padded armor. It was pretty light, but he had enough\npieces to cover our whole bodies. I was surprised he was able to fit two sets in one bag.\n\nHe also carried two retractable batons. I had no idea where he'd gotten them.\n\nMatthew tossed me one, which I fumbled.\n\n\"Figured we'd start with some sparring,\" he said.\n\n*fake_choice\n\t#\"Where'd you even get these?\"\n\t\t\n\t\t\"Internet,\" Matthew said.\n\t\t\n\t\tI paled. \"That's... disturbing.\"\n\t\t\n\t\t\"What?\" he asked. \"It's not like I bought a shotgun or something. Though\n\t\tI could probably get one of those too.\"\n\t\t\n\t\tI shook my head. \"Let's just do this.\"\n\t#\"Alright, man. Let's do this.\"\n\t\t\n\t\t\"That's what I like to hear!\" Matthew smirked. \"Better get ready, punk.\n\t\tI'm not gonna hold back anything.\"\n\t\t\n\t\t\"'Punk'?\" I raised a brow.\n\t\t\n\t\tHe shrugged. \"It was all I could think to say.\"\n\t\t\n\t\t*goto AfterMatthewFight\n\t*if (Charm = 1) #\"Beating each other with clubs by the riverside? You really know how to show someone a good time.\"\n\t\t*set Matthew + 10\n\t\t\n\t\t\"I like to think of myself as a charmer,\" Matthew said.\n\t\t\n\t\t\"Really? Well, I think you might need some pointers.\"\n\t\t\n\t\t\"Is that a fact?\" Matthew raised a brow. \"And I suppose you have a self help book on that too?\"\n\t\t\n\t\tI glanced off the the side. \"...No.\"\n*comment\n\n*label AfterMatthewFight\n\n*set Fighting + 4\n*set Athletics + 4\n\nI fell back against the rivers rocky shore. Matthew fell beside me.\n\n\"I feel sore,\" I said.\n\nHe nodded. \"Yeah. That happens. Good practice though.\"\n\n\"Hey, Matthew?\"\n\n\"Yeah?\"\n\n*fake_choice\n\t#\"Why are you training so hard?\"\n\t\t*set Matthew + 5\n\t\t\n\t\t\"I've always been interested in stuff like this,\" he said.\n\t\t\n\t\tI shook my head. \"You've always been kinda interested in sports.\n\t\tBut that's not what this is. And you've never trained this hard\n\t\teither.\"\n\t\t\n\t\t\"I don't know.\" He shrugged. \"It's just... My whole life I've grown\n\t\tup on stories about hunters. My mom told me about the creatures she's\n\t\tfaced off with. And now I've been invited to a hunters lodge.\"\n\t\t\n\t\tI glanced at him.\n\t\t\n\t\tHis expression was serious. The most serious I think I'd ever seen it.\n\t\t\n\t\t\"I want to try my absolute hardest at this. I want to fight monsters\n\t\tlike my mom. I want to help people.\"\n\t\t\n\t\tI looked up at the sky. We didn't say anything for a while after that.\n\t#\"Thanks for calling me up.\"\n\t\tHe gave a broad smile. \"Of course.\"\n\t\t\n\t\t\"Hell of a workout too,\" I said.\n\t\t\n\t\tMatthew nodded. \"Absolutely.\" He flexed one arm. \"Just keep working\n\t\tlike this, and soon you'll have muscles just like mine.\"\n\t\t\n\t\tWe lied on that shore for a long while after that.\n*comment\n\n*page_break\n\nMatthew packed his gear up, and we found our way back to the road.\n\n\"We'll have to do this again sometime,\" I said.\n\nMatthew nodded. \"Definitely.\"\n\n*page_break\n\nMatthew and I went our separate way shortly after that.\n\n*goto AfterHangout\n\n\n\n*label AfterHangout\n\n\n\nI smiled as I walked back home. It had been a pretty good Saturday, all things\nconsidered.\n\nThe sun was bright. It felt like a good day for a walk.\n\n*page_break\n\nI wandered through a neighborhood I wasn't familiar with. It looked pretty nice.\nThe houses were all large and well kept.\n\nExcept for one.\n\nA single house stood out amongst the others due to its overgrown yard, and rotting\nexterior. It didn't look like anybody had been maintaining it for a long, long\ntime.\n\nI imagined the neighbors must have been pissed at whoever was responsible\nfor its upkeep.\n\n*page_break\n\nApproaching it seemed like a pretty good idea.\n\n*fake_choice\n\t#It was a nice house, barring the lack of maintenance.\n\t\t*comment\n\t#There's clearly no owner. No one would mind if I took a closer look.\n\t\t*comment\n\t#I just had the distinct feeling something interesting was inside.\n\t\t*comment\n*comment\n\n[i]What's the worst that could happen?[/i]\n\n*page_break\n\n\n\n\n\n\n*label Checkpoint\n\n[i]Checkpoint set.[/i]\n\n[i]If you die, you'll restart here.[/i]\n\n*set Var 0\n*temp SneakUpstairs 0\n*temp LookedKitchen 0\n*temp LookedGarage 0\n*temp LookedFridge 0\n\n\n\n\n\n\n\n*page_break\n\nI approached the front door. The porch was worn down, and had a single\nchair resting on it, next to a potted plant. The chair was so old, it looked like it might break if\nI sat in it.\n\nThe plant was dead, and had been so for a very long time. All that was left was\njust a blackened, rotted stem.\n\nHeavy curtains hung behind the windows. Several small holes were torn through\nthem, but none were large enough for me to see through.\n\nThe welcome mat read, 'Hi, I'm Mat!'\n\n*label Porch\n\n*choice\n\t#Try opening the door.\n\t\t\n\t\tI tried to turn the knob, but the door was locked.\n\t\t\n\t\tNot particularly surprising, but it did leave me with\n\t\tfew options. I wasn't a locksmith after all.\n\t\t\n\t\t*page_break\n\t\t*goto Porch\n\t*if (Var = 0) #Check under the mat.\n\t\t*set Var + 1\n\t\t\n\t\tI'd heard people sometime hide spare keys to their front\n\t\tdoor under their welcome mats. Though given how well\n\t\tknown the idea was, it seemed like too much of a security risk.\n\t\t\n\t\tThen again, most burglars probably didn't gamble on stumbling across the key\n\t\tneeded to get inside. So, maybe the issue was moot.\n\t\t\n\t\tI grabbed the mat, and pulled it up.\n\t\t\n\t\tNothing. Just a perfectly square section of the front porch that wasn't as\n\t\tdirty as the rest.\n\t\t\n\t\t*goto Porch\n\t*if (Var = 1) #Check under plant.\n\t\t*set Var + 1\n\t\t\n\t\tI picked up the potted plant.\n\t\t\n\t\tJust like before, there was nothing underneath it.\n\t\t\n\t\t*goto Porch\n\t*if (Var = 2) #Was there anywhere else a key could be hidden?\n\t\t\n\t\tI looked around.\n\t\t\n\t\tThere was nothing else on the porch. Just a plant and Mat. There was no way a\n\t\tkey could have been hidden under that chair.\n\t\t\n\t\tI looked at the boards that made up the porch.\n\t\t\n\t\tThey were old, and a little worn out.\n\t\t\n\t\tOne was cracked open. There was a big enough hole broken through it to\n\t\tgrab the board, and pull it loose.\n\t\t\n\t\tI knelt down beside it, and peered under the board.\n\t\t\n\t\t*page_break\n\t\t\n\t\tSomething was under there, though it was too dark to see what it was.\n\t\t\n\t\tI grabbed the board, and carefully pulled at it, testing its strength.\n\t\t\n\t\tIt was extremely loose. Apparently it wasn't held in place by anything.\n\t\tI yanked the board out of the porch, and looked past the opening I\n\t\tcreated.\n\t\t\n\t\tA single, white key say beneath the porch, easily within reach.\n\t\t\n\t\tI grabbed it, and set the board back in place.\n\t\t\n\t\t*goto LivingRoom\n*comment\n\n\n\n*label LivingRoom\n\nI had trouble getting the lock to turn, but I was eventually able to get the front door open.\n\nThe door let out a loud creak as I pushed it open. It would have creeped me out, if it wasn't\nlaughably cliché.\n\nThe house had a strange smell to it that I couldn't quite place. Despite it being sunny\noutside, the curtains were so thick that the inside was still very dark.\n\nFurniture was not lacking, strangely enough.\n\nThe living room was fully furnished. A couch and television sat together\ndirectly across from the front door.\n\nA grandfather clock stood in the corner of the room, no longer ticking away. The hands\nwere stopped at twelve-o-clock exactly. A cabinet displayed a large amount of fine china.\n\nIt didn't look like the previous owners had packed up their belongings.\n\nIn fact, it looked like they had simply left everything as it was without warning.\n\nPlates and glasses sat on the table in front of the television. Something black stuck\nto the plates. I imagined that used to be food at some point.\n\nPictures hung from the walls. Most depicted a family of three. One older man, an older\nwoman, and a little girl.\n\nA set of stairs led up to the second floor. There were a couple of doors leading further\ninto the house as well.\n\n*page_break\n\nI sneezed.\n\nDust. Coated. Everything.\n\n*page_break\n\n*label LivingRoomSearch\n\n[i]The living room.[/i]\n\n*if (LookedGarage = 2)\n\t*set LookedGarage 3\n\t\n\tI went back into the living room. The footsteps stopped at the top of the\n\tstairs.\n\t\n\t*page_break\n\t\n\tI looked up into the darkness of the second floor.\n\t\n\tA single figure stood alone. I just barely made out its silhouette from the\n\tblackness around it.\n\t\n\tThere were no visible features, no defining traits.\n\t\n\tExcept one.\n\t\n\t*page_break\n\t\n\tIts right arm ended in a long blade. It wasn't a person holding a knife.\n\tIt had no hand. Just a blade jutting out.\n\t\n\tIt walked down the steps.\n\t\n\tI took a step back.\n\t\n\t*page_break\n\t\n\tIts left hand ended in a set of sharp claws. The light glinted off of\n\tthem in a strange way. It almost looked like they were made out of metal.\n\t\n\t*page_break\n\t\n\tIt was halfway down the stairs. My back touched the wall behind me.\n\t\n\tI looked around.\n\t\n\tA kitchen door to my left.\n\t\n\t*page_break\n\t\n\tIt was nearly at the bottom of the steps. It had no face. Its head looked human,\n\tbut it had no features.\n\t\n\tI looked into the living room. The front door was an option, albeit a farther away one.\n\t\n\t*page_break\n\t\n\tIts foot touched down past the final step.\n\t\n\t*fake_choice\n\t\t#Run for the front door.\n\t\t\t*gosub trial_end\n\t\t\tI sprinted for the door. The thing immediately slammed into my side.\n\t\t\t\n\t\t\t*if (Fighting >= 2)\n\t\t\t\tIt raised its bladed arm up, and stabbed down at my chest, but I\n\t\t\t\tdeflected the blade with my bare hand.\n\t\t\t\t\n\t\t\t\tI got a nasty cut on my hand, but it was better than being impaled\n\t\t\t\tin the chest.\n\t\t\t\t\n\t\t\t\t*set Damage + 1\n\t\t\t\t\n\t\t\t\tI planted my foot in the thing's chest, and shoved it off me.\n\t\t\t\t\n\t\t\t\tThe moment it fell back, I tried to get up and run for the front door.\n\t\t\t\tHowever, it was on its feet faster than I was. I managed to get up, but\n\t\t\t\twas pushed back to the wall by that thing taking multiple swipes at me.\n\t\t\t\t\n\t\t\t\tThe moment my back touched the wall it lunged forward, aiming to impale me.\n\t\t\t\t\n\t\t\t\tI dodged to the side. Its blade arm got stuck in the drywall.\n\t\t\t\t\n\t\t\t\tWithout thinking, I threw all my weight into a punch, striking its head.\n\t\t\t\t\n\t\t\t\tIt barely seemed effected as it pulled itself free.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\"That's adorable, kid. But leave this to the professionals.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tI backed toward the kitchen door. It stalked after me.\n\t\t\t\t\n\t\t\t\tA hand grabbed my shoulder, and threw me into the kitchen.\n\t\t\t\t\n\t\t\t\tLiterally. I was off the ground for a few seconds before making\n\t\t\t\ta loud 'thud' against the tiled floor.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tMy legs shook as I clambered to my feet. A lot of noise\n\t\t\t\twas coming from the living room.\n\t\t\t\t\n\t\t\t\tIt sounded like furniture was being broken.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tI nearly fell to my knees when I heard a god-awful shriek. It\n\t\t\t\tsounded like a person screaming while their voice was muffled.\n\t\t\t\t\n\t\t\t\t*goto AfterDanger\n\t\t\t*else\n\t\t\t\tI couldn't even react before it drove its bladed arm into my chest.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tI ineffectually grabbed the blade in my chest, spat a small amount of blood up,\n\t\t\t\tand blacked out.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t[i]$!{Name} died...[/i]\n\t\t\t\t*goto Checkpoint\n\t\t#Go into the kitchen, and block the door.\n\t\t\t*gosub trial_end\n\t\t\tI threw the kitchen door open, slammed it shut, and immediately noticed a lack of\n\t\t\tfurniture I could reinforce the door with.\n\t\t\t\n\t\t\tTwo counters, one in the middle of the room, the other built along the wall, were\n\t\t\tcompletely immovable. There was exactly one old stool on the other side of the room.\n\t\t\t\n\t\t\tI threw my weight against the door just in time to stop that thing from opening it.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tIt started slamming against the door. It wasn't hitting hard enough to dislodge me, but it was\n\t\t\tfrequent enough to guarantee I couldn't move.\n\t\t\t\n\t\t\tI looked toward the door leading into the garage.\n\t\t\t\n\t\t\tI could probably make it in there before that thing noticed I wasn't blocking the door\n\t\t\tanymore, but I had no way to open the garage. There was no power.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t\"Can I open the garage door with my bare hands?\" I asked myself.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tIt slammed against the door again. I pressed back harder.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t\"I dunno. Maybe? You'd probably damage the door. But, you could manage with enough\n\t\t\tstrength.\"\n\t\t\t\n\t\t\tI looked across the kitchen's central counter.\n\t\t\t\n\t\t\t\"I think the trick is getting your fingers under there. It'd be hard, but... I don't know.\n\t\t\tI think it's doable.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tThere was a... thing. A definitely not human thing.\n\t\t\t\n\t\t\tI didn't have time to consider it before a single blade shot through the door, and sliced my\n\t\t\thand. Luckily it was off center enough that it didn't impale me.\n\t\t\t\n\t\t\tI threw myself forward and fell across the floor. It slammed the door open.\n\t\t\t\n\t\t\tThe moment I looked up, I felt a hand ruffle my hair.\n\t\t\t\n\t\t\t\"Hold tight. I'll be right back.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tMy legs shook as I clambered to my feet. A lot of noise\n\t\t\twas coming from the living room.\n\t\t\t\n\t\t\tIt sounded like furniture was being broken.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tI nearly fell to my knees when I heard a god-awful shriek. It\n\t\t\tsounded like a person screaming while their voice was muffled.\n\t\t\t\n\t\t\t*goto AfterDanger\n*comment\n\n*choice\n\t#Look at pictures\n\t\t*gosub trial_end\n\t\t\n\t\tI took a closer look at the various photos hanging off the walls.\n\t\t\n\t\tA large family photo was the first one to catch my eye. An older man\n\t\twith a noticeable bald spot stood next to a woman. A little girl,\n\t\tprobably around six, or seven, stood between them.\n\t\t\n\t\tThey all gave a nice, warm smile at the camera.\n\t\t\n\t\tThe rest of the pictures showed the same family members in various\n\t\tlocations. The little girl standing on a school auditorium's stage.\n\t\t\n\t\tThe woman standing in knee deep water at a beach.\n\t\t\n\t\tThe father at a bowling alley with the girl.\n\t\t\n\t\tOne of the portraits was cracked. The photo within was missing, leaving\n\t\tan empty frame hanging from the wall.\n\t\t\n\t\t*page_break\n\t\t*goto LivingRoomSearch\n\t#Go upstairs\n\t\t*gosub trial_end\n\t\t*if (SneakUpstairs = 1)\n\t\t\tThere was no way I was heading back up there.\n\t\t\t*goto LivingRoomSearch\n\t\t\n\t\tThe railing along the side of the stairs was broken. All that was left of it were\n\t\ta few sticks pointing up.\n\t\t\n\t\tAs I walked up the steps, they groaned under my weight.\n\t\t\n\t\tI could see that the second floor was much darker than the first. In fact, it was\n\t\tclose to pitch black.\n\t\t\n\t\t[i]Really go up?[/i]\n\t\t\n\t\t*fake_choice\n\t\t\t#Yes.\n\t\t\t\tThe stairs exited into a hallway.\n\t\t\t\t\n\t\t\t\tI couldn't see anything beyond the tiny amount of light\n\t\t\t\tcoming from downstairs.\n\t\t\t\t\n\t\t\t\tI squinted against the darkness, and crept forward.\n\t\t\t\t\n\t\t\t\tThere was an open door at the end of the hall. I could just barely see\n\t\t\t\ta flicker of light on the brass knob.\n\t\t\t\t\n\t\t\t\tAs I got closer, I heard something.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tSome sort of movement. Just the faintest rustling.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*if (Sneak = 1)\n\t\t\t\t\t*set SneakUpstairs 1\n\t\t\t\t\t\n\t\t\t\t\t[i]Sneak[/i]\n\t\t\t\t\t\n\t\t\t\t\tI crouched down as low as I could, and sidled up along the wall.\n\t\t\t\t\t\n\t\t\t\t\tI peeked through the open doorway.\n\t\t\t\t\t\n\t\t\t\t\tThe only thing I could make out was a bed. The windows not only had a\n\t\t\t\t\tthick curtain in front of them, but were also reinforced with boards.\n\t\t\t\t\t\n\t\t\t\t\tThe movement was louder. Something was definitely in that room.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\tI crept back toward the stairs. I felt endangered.\n\t\t\t\t\t\n\t\t\t\t\tUnless I had a light, I wasn't too keen on going in there.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto LivingRoomSearch\n\t\t\t\t*if (Sneak = 0)\n\t\t\t\t\t\n\t\t\t\t\tI pushed the door completely open, and stepped through.\n\t\t\t\t\t\n\t\t\t\t\tThe window was reinforced with boards, in addition to the thick curtain\n\t\t\t\t\thanging in front of it.\n\t\t\t\t\t\n\t\t\t\t\tSo much light was blocked out that the room was nearly pitch black.\n\t\t\t\t\t\n\t\t\t\t\tThe movement stopped.\n\t\t\t\t\t\n\t\t\t\t\tI turned my head, straining to hear.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\tI felt a sharp pain in my throat, before I was knocked to the floor.\n\t\t\t\t\t\n\t\t\t\t\tI blinked, and tried to look down. I couldn't move my head.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\tSomething wet ran down the front of my throat. I reached up,\n\t\t\t\t\tand felt something sharp sticking out of it.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\tI choked and spat. I desperately grappled with something in front\n\t\t\t\t\tof me.\n\t\t\t\t\t\n\t\t\t\t\tSomething gently pressed itself across the left side of my neck.\n\t\t\t\t\tFollowed by a sudden tear.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\tEverything went black.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\t[i]$!{Name} died...[/i]\n\t\t\t\t\t*goto Checkpoint\n\t\t\t#No.\n\t\t\t\t*goto LivingRoomSearch\n\t\t\n\t\t*page_break\n\t\t*goto LivingRoomSearch\n\t#Go into another room.\n\t\t*gosub trial_end\n\t\tI tried one of the doors leading further into the house. The door was\n\t\tunlocked, but when I pushed the door hit against something on the other side\n\t\tof it.\n\t\t\n\t\tI gave a harder shove, but couldn't dislodge whatever was blocking it.\n\t\t\n\t\tWith no other options, I went to another door near the staircase.\n\t\t\n\t\t*goto KitchenSearch\n*comment\n\n*label KitchenSearch\n\n*if (LookedGarage = 1)\n\t*set LookedGarage 2\n\t\n\tSomething walked around upstairs. Heavy footsteps sounded one by one.\n\t\n\tThey approached the stairs.\n*comment\n\n*if (LookedKitchen = 0)\n\t*set LookedKitchen 1\n\t\n\tThe kitchen was directly adjacent to the living room. The oven stood open,\n\twith something rotten inside it. Thankfully there wasn't much of an odor.\n\t\n\tI imagined whatever had been in there had been rotting for a long time.\n\t\n\tDirty dishes sat unwashed in the sink. A black substance clung to\n\tthem.\n\t\n\tA dark brown stain coated the tiled floor near the fridge.\n\t\n\tOne other door led further into the house.\n\t\n\tSomething creaked upstairs.\n*comment\n\n[i]Kitchen[/i]\n\n*choice\n\t*if (LookedFridge = 0) #Look in fridge\n\t\t*set LookedFridge 1\n\t\t\n\t\tAs I got closer, I noticed the dark stain wasn't just on the floor, it was speckled\n\t\tacross the front of the fridge too.\n\t\t\n\t\tI opened, and immediately reeled back. I almost vomited my guts out in an instant.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe fridge was stuffed with rotting meat. It wasn't meat bought in a nice little\n\t\tpackage from the store and simply left in the fridge either. Various random animal\n\t\tparts were just haphazardly thrown into the fridge wherever they fit.\n\t\t\n\t\tI saw a lot of what probably used to be squirrels and raccoons. A few cats and dogs\n\t\twere thrown in too.\n\t\t\n\t\tAnd that was just the meat I could still recognize. Several pieces were totally\n\t\tunidentifiable, either due to being rotted, or being absolutely mangled.\n\t\t\n\t\tI took note that the fridge had no power. The meat had been festering unpreserved\n\t\tfor a while.\n\t\t\n\t\t*page_break\n\t\t\n\t\tBut not for that long.\n\t\t\n\t\tI looked back at the oven. The previous owners had been gone so long whatever\n\t\tthey were cooking had long since rotted to near nothing.\n\t\t\n\t\tThis meat, though certainly not fresh, hadn't been rotting for nearly as long.\n\t\t\n\t\tSomeone had added it to the fridge recently.\n\t\t\n\t\t*page_break\n\t\t*goto KitchenSearch\n\t*if (LookedGarage = 0) #Go further into the house\n\t\t*set LookedGarage 1\n\t\t\n\t\tI stepped through another doorway, and found myself in the family's garage.\n\t\t\n\t\tThere was no car in it. There were, however, dozens of tools scattered across\n\t\ta nearby shelf. The garage was otherwise pretty bare bones, aside from a single\n\t\tsteel cabinet.\n\t\t\n\t\tI walked over to the cabinet, and opened it.\n\t\t\n\t\tA large can of paint fell out, and I backed away just in time to avoid my foot\n\t\tgetting hit.\n\t\t\n\t\tThe bang when that can hit the floor seemed deafeningly loud.\n\t\t\n\t\tSomething stirred upstairs.\n\t\t\n\t\t*page_break\n\t\t*goto KitchenSearch\n\t#Return to the living room\n\t\t\n\t\tI exited back to the living room.\n\t\t\n\t\t*page_break\n\t\t*goto LivingRoomSearch\n*comment\n\n\n*label AfterDanger\n\n\n\n\nI wandered into the living room, and found the creature's corpse dangling over the back of the\ncouch. Gaping wounds covered its head and torso. It looked like some clawed animal\nhad torn it to pieces.\n\nStanding in front of it was something demonic looking.\n\nIts skin was covered in black scales. A pair of horns protruded from its head. It fingers ended\nin deep red claws. I wasn't sure if they were naturally red, or just stained with blood. Its\neyes were black, with yellow iris's.\n\nAnd its face... was pretty human looking actually.\n\nKind of boyish, really.\n\nFocusing more on its human face, as opposed to its inhuman body, it looked like a guy around\nmy age.\n\nHe wore black jeans, and a red jacket. There was something oddly comforting about him just wearing\nnormal clothes.\n\nI looked between him and the creature.\n\nHe crossed his arms and eyed me up and down.\n\n\"What are you?\" I asked.\n\nHe shot me a big toothy grin. \"An angel.\"\n\nI stared.\n\n\"What does it look like?\" He walked around to me.\n\nI eyed the front door. \"What are you doing here?\"\n\n\"My job.\" He jerked a thumb toward the creature sprawled across the couch. \"I think I\ncould ask you the same thing.\"\n\n\"Uh...\"\n\n[i]What was I doing here?[/i]\n\n*fake_choice\n\t#\"It seemed like a nice house.\"\n\t\t\n\t\tHe stared at me.\n\t\t\n\t\tI shrugged. \"I was just taking a peek.\"\n\t\t\n\t#\"I don't have a good reason.\"\n\t\t\n\t\t\"Hmm.\" He shook his head.\n\t\t\n\t\t\"Sorry,\" I said.\n\t#\"Would you believe me if I said it was a magic spell?\"\n\t\t\n\t\t\"Not really,\"  he smiled. \"Though it is a pretty original story, I'll give you that.\"\n*comment\n\n*page_break\n\n\"C'mon.\" He grabbed my shoulder and led me outside. \"Let's get you out of here.\"\n\n\"Wait- uh... who are you?\"\n\nHe smirked. \"Damien. Professional exterminator, at your service.\"\n\n*set KnowsDamien 1\n\n\"Exterminator?\" I raised a brow. \"Like a hunter?\"\n\nHe scoffed. \"No, I hunt actual monsters. I'm not a Van Helsing wannabe.\"\n\nI looked back toward the monster just before we exited.\n\n*page_break\n\nIt still lied there. Blood seeped into the couch.\n\n*page_break\n\n\"What happens now?\" I asked.\n\n\"Now,\" he said. \"I report that I've successfully completed my task without incident.\"\nHe eyed me curiously. \"And just because I don't want to bother with the extra paperwork...\n\n\"You're free to walk away from this.\"\n\nI gave him an incredulous look. \"...I can just walk away from this mess.\"\n\n\"Sure.\" He shrugged. \"Your a cute kid, so I'll let you off the hook this time.\"\n\n*fake_choice\n\t#\"'kid'? You don't look that much older than me.\"\n\t\t\n\t\tHe crossed his arms. \"Looks can be deceiving.\"\n\t\t\n\t\tI raised a brow. \"Still waiting to hear a number here.\"\n\t\t\n\t\tHe frowned. \"It's not important.\" He gave me a light push toward\n\t\tthe street. \"Just scram, while I get to cleaning up.\"\n\t#\"Uh... what did you call me?\"\n\t\t*set Damien + 5\n\t\t\n\t\t\"I said 'you're cute'. Your face is attractive. Now get lost, I've got\n\t\twork to do.\"\n\t\t\n\t\tI tried to say something, but he cut me off with a gentle shove toward\n\t\tthe street.\n\t#\"Sounds fine to me.\"\n\t\t\n\t\tI didn't see any reason to complain. I got bailed out of a dangerous situation.\n\t\tIf he wanted me out of the way while he cleaned up, I was fine with that.\n\t\t\n\t\t\"Great, now scram. I've got work to do.\"\n*comment\n\nThe sun was setting when I finally got home.\n\nMy hand ached. I hadn't really been aware of it while I was being attacked.\n\nMy hand got cut pretty bad.\n\nI didn't think I needed to go to the hospital, but I did make a point of cleaning the cut\nas soon as I got home. I noticed the Leavitt's had a tiny first aid kit in their bathroom.\n\nI pulled a square shaped bandage over my hand. It was a bit uncomfortable, since it restricted\nmy finger movement, but I figured it was better than just leaving my cut exposed.\n\n\n\n\n\n\n*page_break\n\nI had some free time before going to sleep for the night.\n\nI considered my options.\n\n*label TasksThree\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto AfterTasksThree\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto TasksThree\n\t\t*goto AfterTasksThree\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto AfterTasksThree\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto TasksThree\n\n*label AfterTasksThree\n\n\nThe night was getting pretty late, so I finally collapsed onto my bed, and went to sleep.\n\n*set Damage - 1\n\n*page_break\n\n[i]Today is October 5th, Sunday.[/i]\n\n*page_break\n\n\"What happened to your hand?\"\n\nI blinked groggily. My mother was sitting across the guest house's living room table.\n\n\"Did that happen yesterday?\"\n\nI nodded. \"Accident. Last night. No big deal.\"\n\n\"Well... alright.\"\n\n*page_break\n\nI didn't get any calls or texts in the morning, so I figured I'd have to find a way\nto make myself busy.\n\nI heard the front door close, as my mother left for the day.\n\n*page_break\n\nI yanked the black book out from under my bed and got to reading. Trying to find a\nway through that gate might have been on the back burner, but I could still learn something\nelse from it.\n\nI skimmed pages, ignoring journal entries and instead focusing on spell descriptions.\n\nMy plan was to find something interesting to hone in on.\n\n*page_break\n\n\"Hmm...\" I sighed.\n\nI turned a few pages.\n\n\"Counter charm?\"\n\nI turned a few more.\n\n\"Protection from evil?\"\n\n*page_break\n\nI found myself honing in on defensive spells. Monsters existed, and I was all but letting\nmyself stumble into their lairs.\n\nI'd been plotting to pass through some sort of magical portal without thinking\nabout the consequences.\n\nWould the creatures on the other side know I didn't belong?\n\nWould they be aggressive?\n\nIf they were could I defend myself?\n\nIt was honestly a little scary just how little thought I had put into the situation.\nIn the back of my mind, I wondered if that was the stone's doing. I seemed to know\nwhere things were based on intuition, but I wondered if it also made me less\nhesitant to investigate strange occurrences.\n\n*page_break\n\nThe smart move probably would have been to throw that rock away, and wash my\nhands of this whole situation, but I really wanted to learn more. There was\njust something about that book and its spells that enamored me.\n\nSo, I kept reading.\n\n*page_break\n\n'Warning wire'\n\nI raised a brow at a detailed drawing of a wire wrapped around a bell. The\nbell was covered in four different runes.\n\nThe author drew the bell from different perspectives to show where to place\nthe runes.\n\n*page_break\n\n'Of my many defensive patterns, the most useful has been a rather\ningenious invention by a European gentlemen I met during my travels.'\n\n'Many defensive patterns require a large amount of set up, with potentially\ndifficult to move equipment and materials. However, this item can grant a\nprotective measure against any threat, despite being small enough to wear around\nmy neck.'\n\n'The fact that it looks to the untrained eye to merely be an accessory is only\nan added bonus.'\n\n'The warning wire rings the bell whenever danger is nearby. I was skeptical\nwhen I first heard about it. I assumed its creator was a paranoid fool. I\nexpected the bell to ring in the presence of any supernatural entity, whether\nthey be malevolent or not.'\n\n'To my astonishment, the bell can differentiate between benign creatures\nand dangerous ones. How it does this is beyond me. Despite being a simple\npattern, it somehow understands context.'\n\n'I shall endeavor to research this object further someday, but for now,\nit works phenomenally.'\n\n*page_break\n\n'The only downside is that the warning wire doesn't offer literal protection to its\nwearer. It merely warns them of imminent danger. Regardless, I've found\nthat more often than not, that's enough to safeguard my life.'\n\n*page_break\n\nI shut the book.\n\nThe good news was, all I'd need was a bell and a wire.\n\nThe downside was that I couldn't rely on the books drawings. I'd\nhave to actually draw the runes on my bell. I didn't consider myself\nan artist, but so long as I had the book as a reference, I was fairly\ncertain I could get them right.\n\nEventually.\n\nThere was the issue of a drawing implement. The book said runes could\nbe drawn with any material, but most materials would wear away if I just\ncarried that bell in my pocket, or around my neck.\n\nI hid the book back under my bed, and went out in search of materials.\n\n*page_break\n\nMy first stop was the Leavitt's manor itself.\n\nI found Mrs. Leavitt chatting with Elizabeth in one of its many halls.\n\n*page_break\n\n\"Hello, ma'am.\" I glanced at Elizabeth. \"Elizabeth.\"\n\n\"Well hello, $!{Name},\" Mrs. Leavitt said. \"How are you today?\"\n\n\"Good, good...\" I shuffled nervously. \"Do you... have a bell lying around I can have?\"\n\nShe raised a brow, as did Elizabeth.\n\n*fake_choice\n\t#\"It's for an art project.\"\n\t\t\n\t\t\"Oh?\" She smiled. \"Is it a school project?\"\n\t\t\n\t\t\"More of a personal project,\" I said.\n\t#\"I'm planning to make a necklace with it.\"\n\t\t\n\t\t\"With a bell?\" Elizabeth asked.\n\t\t\n\t\tI nodded.\n\t#\"I need it for a magic spell.\"\n\t\t\n\t\tElizabeth raised a brow at me, but Mrs. Leavitt just laughed.\n*comment\n\nMrs. Leavitt looked at Elizabeth. \"You probably have a few lying around, right?\"\n\n\"Huh?\" Elizabeth tilted her head at her mother.\n\n\"Well you still have your old collection don't you?\"\n\n\"Old collection?\" I asked.\n\nMrs. Leavitt nodded. \"My daughter still has all her-\"\n\n\"Mom!\" Elizabeth shouted. \"Stop.\"\n\n\"Dear, I was just-\"\n\n\"Yes, I have a few!\" Elizabeth grabbed my arm and led me away. \"Let's go!\"\n\n*page_break\n\nElizabeth was gripping my arm so tightly, it actually hurt.\n\nI struggle in vain as we approached what I guessed was her room. \"Can you let go?\"\n\n\"Huh? oh.\" She released me.\n\nI rubbed my arm. \"What was that about?\"\n\n\"What's the bell about?\" she asked. \"You've been acting really suspicious lately. First\nyour stalking around the woods. Now some weird stuff with a bell...\" She looked at my hand.\n\"What happened?\"\n\nI looked at my bandage. \"I won't ask you about this supposed 'collection', if you\ndon't ask any questions about this.\"\n\nShe eyed me suspiciously. I got the distinct feeling Elizabeth didn't want to end\nthe conversation there.\n\n\"Fine. Wait out here.\"\n\n*page_break\n\nShe disappeared inside her room for a few minutes. I didn't so much as get a glimpse inside\nit before she closed the door.\n\nWhen she emerged she was carrying three different bells. Each had a different size and styling\nto them.\n\nOne was golden, and had an open bottom.\n\nThe second was a silver sphere, and had a bit of red ribbon tied to it. I guessed it was once part of\na Christmas decoration.\n\nThe last was rectangular and black. I had no clue what it could have been a part of. I had never seen\na bell with that style before.\n\nThey all looked pretty old, like she had them lying around for years.\n\n*page_break\n\n\"I had these lying around, and they broke off, so...\" She glanced off to the side. \"I guess I don't\nreally need them anymore.\"\n\n\"Broke off of what?\" I asked.\n\n\"I thought we weren't asking questions.\"\n\n\"Right.\" I looked them over.\n\n*fake_choice\n\t#Take the golden bell.\n\t\t*set Bell \"golden\"\n\t\t\n\t\tI looked the bell over, shaking it a couple of time, listening to the ringing. \"Is this real gold?\"\n\t\t\n\t\t\"If it was, do you think I'd just be giving it to you?\" Elizabeth asked.\n\t\t\n\t\tI laughed. \"Fair enough.\"\n\t#Take the silver bell.\n\t\t*set Bell \"silver\"\n\t\t\n\t\tI looked the bell over, shaking it a couple of times, listening to the high-pitched ringing. \"Is\n\t\tthis real silver?\"\n\t\t\n\t\tShe shrugged. \"Probably not?\"\n\t\t\n\t\tI nodded, and pocketed the bell. \"Thanks.\"\n\t#Take the black bell.\n\t\t*set Bell \"black\"\n\t\t\n\t\tI looked the bell over, shaking it a couple of times, listening to the low-pitched ringing. \"What's\n\t\tthis thing made out of?\"\n\t\t\n\t\tShe shrugged. \"No clue. Honestly, it's not really one of my favorites.\"\n\t\t\n\t\t\"I'll take it,\" I said.\n\t\t\n\t\t\"Really?\" she asked. \"I'm surprised.\"\n\t\t\n\t\tI shrugged, and pocketed it.\n*comment\n\n*page_break\n\nFinally, I found myself back in my room.\n\nThe ${Bell} bell sat beside the black book. I opened it to the page showing where\nto draw the runes. I was going to have to do some guesswork, since my bell didn't\nquite match the one in the book.\n\n*if (Bell = \"black\")\n\tI made a good choice picking the black bell. Its rectangular shape made\n\tdrawing on it much easier.\n*comment\n\nI spent almost half an hour painstakingly drawing and erasing runes on the bell with\na marker. Any time I was even slightly off, I erased and tried again. I couldn't afford\nany inaccuracy.\n\nAfter I was certain I had the bell drawn correctly, I got out a knife I borrowed from the\nkitchen.\n\nIf I drew on the bell in marker, the symbols would eventually fade. I couldn't think of any\ndrawing materials that were going to last.\n\nSo, I opted to carve the runes into the bell. I had to be very slow, and very delicate.\n\nTruthfully, I wasn't one-hundred percent certain carving the runes into the bell would even\nwork, but it was the only reasonable option I could think of.\n\n*page_break\n\n[i]An hour, and a lot of silent cursing later...[/i]\n\n*page_break\n\nI had done it. I made sure not to accidentally puncture through the bell's material.\nI had engraved the symbols in place, but otherwise had not damage the bell.\n\nNext came the wire.\n\n*page_break\n\nI worked a piece of wire through the bell's loop, and connected it to a\n*if (Bell = \"silver\")\n\tmatching\nsilver-colored necklace.\n\nI put the necklace on, grabbed the bell, and read aloud the pattern of words shown in\nthe book.\n\n*page_break\n\nThe incantation was extremely long. It nearly took up a whole page of the book, and took\nme more than a full minute to finish saying.\n\n*page_break\n\nAnd I was done.\n\nAnd, as was customary, there was absolutely no sign that I had done anything.\n\nI'd be a lot more confident about using spells if I was given some sign\nthat something was happening. Like some sort of beep or chirp, or flicker\nof light.\n\nI sighed, walked into the bathroom, and looked in a mirror.\n\n*page_break\n\n...I was wearing a bell as a necklace.\n\n*page_break\n\nI had done a lot of stupid things involving that book, but this was the first\none other people would actually notice.\n\n\"Eh, maybe no one will notice.\"\n\n*page_break\n\nMy mother stared at me. \"Why are you wearing a bell?\"\n\nI frowned. \"Just trying out a new style. I'll see you later, I'm gonna head\nout for a bit.\"\n\n\"Okay... have fun.\"\n\n*page_break\n\nI considered what I wanted to do that day.\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a couple of options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t*goto AfternoonEnd\n\t\t\t\t\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n\n\nI got home fairly late, and went straight to my room.\n\n*page_break\n\nI considered what I wanted to do that evening.\n\n*label FinalEvening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto FinalEvening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto FinalEvening\n\n*label Night\n\nAs I lay back in my bed, I realized the weekend was just about over. School would start\nup again tomorrow.\n\nI looked at my bandaged hand.\n\nHopefully it wouldn't take too much longer to heal. Writing with it was probably going to be\na pain.\n\nDespite nearly getting killed the day before, I didn't forget about the gateway out in the\nwoods. I still felt I needed to lay low, but I was hopeful I could try passing through it later in the\nweek without being caught.\n\nI took a deep breath, closed my eyes, and drifted to sleep.\n\n\n\n*goto_scene octoberSixth\n\n*label trial_end\n*comment end trial\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octoberfourteenth": "\n\n\n[i]Today is October 14th, Tuesday.[/i]\n\n\n\nI hadn't slept well the night before.\n\nI went straight to the television when I woke up.\n\n*page_break\n\n\"After a spate of slayings, there have been no further deaths. Police say the threat is by no means over.\nPeople should remain-\"\n\nI shut the television off.\n\n\"Thank god.\" I shook my head as I got ready for school.\n\nMaybe Damien did have the situation handled.\n\n*page_break\n\nI arrived at school earlier than usual.\n\n\"Hey, $!{Name},\" A girl I didn't recognize said as we passed each other in the hall.\n\n\"Hi?\" I became aware of a large number of people watching me. People were also acting a bit\nfriendlier than usual.\n\nI still wasn't used to that.\n\nAnd I still didn't hate it.\n\n*page_break\n\nThe day was over quickly enough, and I had to decide what I wanted to do for the day.\n\n\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit the wolf camp\n\t\t\t\t\n\t\t\t\t*gosub_scene subRoxanne\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit Damien\n\t\t\t\t\n\t\t\t\t*gosub_scene subDamien\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n*page_break\n\nI returned home in the evening, went to my room, and considered what I wanted to do.\n\n\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n*page_break\n\n*goto_scene octoberFifteenth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobernineteenth": "\n\n\n[i]Today is October 19th, Sunday.[/i]\n\n*page_break\n\n\nThings were looking a bit busier around the Leavitt manor. People were coming and going, vans\nfilled with party supplies had shown up.\n\nI found Mr. and Mrs. Leavitt considering decorations in the front yard.\n\nElizabeth stood off to the side, watching equipment and supplies get unloaded. She had a certain\nlook in her eyes.\n\nI approached her. \"I take it you're a fan of these parties?\"\n\nShe smiled at me. \"Of course! Mom and Dad always put a lot into them.\"\n\nI smirked. \"Gotta say, I'm kind of surprised. I kind of figured you'd see yourself\nas being above a holiday most well know for candy.\"\n\nShe shot a scowl at me. \"It's not about candy to us, our people have a long history with this holiday.\"\n\nI crossed my arms. \"Really? Vampires love Halloween?\"\n\n\"Not just vampires,\" she said. \"Look... we didn't always use to be able to show what we really were\nto people. This was our day to do that. There are tons of creatures out there that could never walk\nout in public. This day was their free pass. They could walk the streets without getting harassed,\nor even worse, killed.\"\n\nI frowned. \"I see...\"\n\nShe smirked. \"It was also a good day to invite outsiders in.\"\n\nI raised a brow. \"How do you mean?\"\n\n\"If a human didn't know monsters existed, but we thought we could trust them with the truth...\" She\nsmiled. \"Halloween was the perfect day to do that. You show what you really are, convince them that\nyou really are a creature, and then see what their reaction is.\"\n\n\"And if their reaction is bad?\" I asked.\n\n\"You can just claim it was all just a practical joke the next day.\"\n\n*page_break\n\nI didn't stick around too long after that, since it looked like the Leavitt's were going to be pretty busy\nwith their preparations.\n\nMy mother caught me as I was returning to the guest house to keep practicing the spell.\n\n\"Hey, honey!\" She beamed at me. \"It looks like they're still throwing that party! I'm gonna see\nwhat their putting together.\"\n\n\"That's nice,\" I said, as I walked by.\n\n\"Be the way...\" She gave me a playful expression.\n\n\"I don't have a date.\"\n\n[i]Geez. Stop asking. It's getting kind of weird now.[/i]\n\n*page_Break\n\nThe day passed. I didn't leave my room. My voice was feeling a bit well-used before I went\nto sleep.\n\nI figured I should lay off the practice the next day.\n\n*page_break\n\n*goto_scene octoberTwentieth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octoberninth": "\n\n\n\n[i]Today is October 9th, Thursday.[/i]\n\nI couldn't focus at all during school. All I could think about was the gate. I could get through\nit easily. And even better, the people on the other side weren't hostile toward me being there.\n\nWell, Jeremiah wasn't. Roxanne definitely was.\n\nAnd everybody else... well, they kept to themselves, so at least I knew I wouldn't get lynched\nif I went through again.\n\n*page_break\n\nI stared at the clock during the final minutes of school.\n\n[i]Come on.[/i]\n\n*page_break\n\n[i]Come on...[/i]\n\n*page_break\n\n\"Come on come on come on come on come on-\"\n\nEverybody in class was staring at me.\n\nI smiled. \"Sorry.\"\n\nThe bell rang.\n\n\"Finally!\" I sprinted out the door.\n\n*page_break\n\nI half expected Roxanne to be waiting for me when I reached the gate, but I was alone.\n\nSprinting from school, through the woods, to the gate might have had something to do with\nher absence. Assuming she planned on stopping me.\n\nI stepped up to the trees, and walked between them.\n\nA click sounded through the air, and I pressed forward, trying to find my way back to the\ndirt road.\n\n*page_break\n\nAnd eventually I did, though I didn't come out where I had before. Despite that, I was\npretty sure turning left and following the road would take me to Roxanne's pack.\n\nIt was the safer option, since Jeremiah was there.\n\nI looked toward the direction I hadn't travelled. The road's constant twists and turns\nmade it impossible to see if I would find anything.\n\nI really wanted to see what else I could find.\n\n*page_break\n\nNot to mention Roxanne might have been giving all the other inhabitants a heads up about me\nbeing around. Making a solid first impression as soon as possible was probably wise.\n\n*page_break\n\nAnd so I walked toward parts unknown.\n\n*page_break\n\nHalf an hour later, I found a town.\n\nNot a collection of cabins sitting in the middle of a field either. An actual town.\n\nThe roads were paved with smooth stone. The buildings were crafted from beautiful brick-work.\nLamp posts lined the streets. A huge mansion stood in the center of the city, far bigger than\nthe Leavitt's.\n\nI couldn't help but gape at the sight.\n\nI didn't see any cars on the roads, just people walking around. The roads also lacked a side walk.\nI got the sense there wasn't much use for vehicles in their hidden little haven, so the city\nwasn't designed with them in mind.\n\nI cautiously stepped forward, and wandered toward the mansion.\n\nThrongs of people crowded the streets. I couldn't understand how a city as big as that, as populated\nas that, could have remained a secret in my own town.\n\n*page_break\n\nThe people were a mixed bag, appearance wise. I saw numerous human-looking ones. But, I also saw many that\nclearly weren't.\n\nSome were big and burly. Others small and petite. Some were beautiful, some were ugly.\n\nI was enamored as I wandered down the streets. Unlike the Werewolves clearing, there were actual shops\naround.\n\n*page_break\n\nA clothing store's window held numerous dresses and outfits. The shop seemed to focus on women's fashion.\n\nThough I didn't see any brands I recognized, they looked like the kind of clothes I could find in my own\nmall. Not sure what I was expecting though, it's not like the monster community would have magic clothes\nor anything.\n\nA young woman was looking through the same window I was. Her long hair was a vibrant red, and she was\nvery pretty. If she wasn't human, I couldn't tell what she was.\n\n\"Excuse me,\" I said. \"I'm a bit new here.\"\n\n\"Oh?\" She smiled at me. \"Really?\"\n\n\"Yeah... this is actually my first time visiting this... town.\"\n\nShe raised a brow at my comment. I worried that wasn't the right word to use.\n\nThere was nothing I could do, except move past it. \"I don't suppose you could\nanswer a few questions?\"\n\nShe shrugged. \"I don't see why not.\"\n\n\"Thanks.\" I smiled.\n\n*set Var 0\n\n*label Questions\n\n*choice\n\t*hide_reuse #\"What is this town called?\"\n\t\t*set Var + 1\n\t\t\n\t\t\"Abrigo,\" she said. \"I think the proper name is El Abrigo, but everyone just shortens it.\"\n\t\t\n\t\t\"El Abrigo?\" I titled my head. \"Sounds foreign.\"\n\t\t\n\t\t\"It probably should.\" She nodded. \"The town's founder is after all.\"\n\t\t\n\t\t*goto Questions\n\t*hide_reuse #\"What's that mansion over there?\"\n\t\t*set Var + 1\n\t\t\n\t\t\"That's Lord Reyes manor,\" she said. \"He created this pocket dimension, not to mention the town.\"\n\t\t\n\t\t\"Wow...\" I stared off toward the manor. \"That's amazing.\"\n\t\t\n\t\tShe crossed her arms, and raised a brow at me. \"I'm surprised you didn't already know that.\"\n\t\t\n\t\tI shrugged. \"It's my first time here.\"\n\t\t\n\t\t\"Well, yeah,\" she said. \"But, his name really never came up when you got someone to give you\n\t\taccess to one of the gates?\"\n\t\t\n\t\t[i]'One' of the gates? There's more than one?[/i]\n\t\t\n\t\tI really wanted to pry about the other gates, but it was already way to obvious that I didn't\n\t\tbelong. A question like that would get me made.\n\t\t\n\t\t\"Sorry,\" I smiled awkwardly. \"I guess I'm just bad with names.\"\n\t\t\n\t\t*goto Questions\n\t\n\t*if (Var >= 1) #\"Thanks, that's all I needed to know.\"\n\t\t\n\t\tShe nodded. \"Alright.\"\n\t\t\n\t\tI took off toward the mansion.\n\t\t\n\t\t*goto AfterQuestions\n*label AfterQuestions\n\n*page_break\n\nSoon enough, I found myself in front of the mansion. A lovely red brick wall surrounded\nthe property. Ivy grew along it, giving a nice green accent to the brick.\n\nThe gates stood wide open, though I noted two men standing guard. They wore thick metal\narmor that wouldn't have looked out of place in the middle ages.\n\nI approached one of them, but froze when I saw the helmet had no head in it.\n\nThe suits were empty.\n\nOne of them shifted. I think it was looking at me.\n\n\"What do you require, visitor?\" it asked, it's voice hollow and distant.\n\n\"Oh! Uh...\"\n\n*fake_choice\n\t#\"I'm visiting this... place for the first time. So-\"\n\t\t\n\t\t\"You wish to see Lord Reyes then?\" it asked. \"Which gate did you cross from?\"\n\t\t\n\t#\"What are you?\"\n\t\t\n\t\t\"Lord Reyes' guardians.\" It approached me. \"Which gate did you cross from?\"\n\t\t\n\t#\"N-nothing. I'll just be g-\"\n\t\t\n\t\t\"We don't recognize you. Lord Reyes will likely want an audience with you,\" it\n\t\tsaid. \"Which gate did you cross from?\"\n*comment\n\n\"Uh...\" I thought about that. \"The... double tree... one?\"\n\nIt stared at me. \"We require the proper name of the gate.\"\n\nSomeone spoke from behind me. \"Crossed dryads\"\n\nI turned around, and saw a black-scaled demon.\n\n\"Damien?\"\n\nHe shot a smirk my way. \"In the flesh.\" He eyed me curiously. \"So you were the one\ncausing trouble yesterday.\"\n\n\"Uh...\" I tilted my head. \"I didn't think I was.\"\n\nHe laughed. \"Some girl from the wolves camp showed up at the manor, yelling and shouting\nabout a human somehow crossing the gate.\"\n\n\"Roxanne?\" I asked.\n\nHe nodded. \"Yeah. Lord Reyes made me follow her back. I guess you were gone by then.\"\n\nI shifted nervously. \"Is it a problem that I'm here?\"\n\n\"Nah.\" Damien smiled. He frowned a second later. \"Well, maybe. Yeah. We should go talk\nto Lord Reyes.\"\n\nI took a step away from him. \"He's not gonna kill me is he?\"\n\n\"What? No!\" Damien laughed. \"Though if you crossed into his domain without permission\nhe might be a bit cross.\"\n\n\"Isn't that all the more reason not to talk to him?\" I asked.\n\nDamien shook his head. \"The longer you take to go explain yourself to him, the angrier he's gonna get.\"\n\n\"But-\"\n\n\"Look.\" Damien grabbed my shoulder, and led me toward the front door. \"It's fine. He's not an\nunreasonable guy. Just explain your situation to him, and it'll all work out. I promise.\"\n\n\"Alright... if you say so.\"\n\n*page_break\n\nDespite looking like a mansion from the outside, the interior was more like a meeting hall. Several\nrows of benches lined the room in two separate columns. A podium was set up at the far end of the room.\n\nThe only people around were more of those hollow suits.\n\n\"I know this place like the back of my hand,\" Damien said. \"Just follow me.\"\n\nHe led me out of the hall, and into a long hallway. Unlike the Leavitt's, Lord Reyes didn't have\nlots of fine paintings hung up on the walls, or really any sign of opulence at all.\n\nHallways were given minimum furnishings. And the furniture he did use looked pretty basic.\n\nWe continued until we exited out the back door.\n\nThe back area was one huge garden. I saw roses growing everywhere. I also noted some actual\ncrops too. There weren't enough crops being grown for the place to act as a farm, so I assumed they\nwere just a personal project of Lord Reyes.\n\n*page_break\n\nWe approached a creature. A demon I assumed, given that he looked like an older version of Damien.\nHis scales were red.\n\nHe was snipping away at a bush with a large pair of shears.\n\nDamien gave me an expectant look.\n\nI stared back.\n\nHe nodded toward the demon.\n\nI approached the red creature.\n\n*choice\n\t#\"Good afternoon, Lord Reyes. I've come to apologize for my intrusion into your domain.\"\n\t\t*set Damien + 5\n\t\t\n\t\tDamien snickered.\n\t\t\n\t\tI looked back at him, and whispered. \"Was that too much?\"\n\t\t\n\t\tLord Reyes approached me. \"A little, yes.\"\n\t\t\n\t\t*goto AfterGreeting\n\t#\"Excuse me, are you Lord Reyes?\"\n\t\t\n\t\t\"I am.\" He put the shears away, and turned to face me.\n\t\t\n\t\t*goto AfterGreeting\n\t#\"This garden is beautiful.\"\n\t\t\n\t\t\"Thank you,\" Lord Reyes put the shears away. \"I take great pride in my work here.\"\n\t\t\n*label AfterGreeting\n\nI swallowed nervously. \"I'm $!{Name}.\"\n\nHe looked me over.\n\n\"I believe a girl named Roxanne came by here yesterday, and... mentioned my presence.\"\n\n\"She did,\" Lord Reyes said. \"Can I ask how you gained access to my domain?\"\n\n\"A spell,\" I said. \"It let me slip in here without one of those coins.\"\n\nHe crossed his arms. \"And might I ask what you were trying to accomplish by doing such a\nthing?\"\n\nI thought about that.\n\n*fake_choice\n\t#\"I don't really know.\"\n\t\t\n\t\tHe tilted his head at me.\n\t\t\n\t\t\"It just- I wanted to go through. I didn't think about why.\"\n\t\t\n\t\t\"Right now, I'm more concerned about how you found a gate,\" he said.\n\t\t\n\t\t\"I was led here with a spell.\" I pulled the rock out of my pocket. \"I used this to-\"\n\t\t\n\t#\"I was just curious.\"\n\t\t\n\t\t\"Indeed,\" he said. \"But how did you find a gate in the first place?\"\n\t\t\n\t\t\"I used a spell.\" I pulled the rock out of my pocket. \"This let me-\"\n\t\t\n\t#\"I think one of my spells had me under a trance or something.\"\n\t\t\n\t\tHe raised a brow at my comment.\n\t\t\n\t\tI pulled the rock out of my pocket. \"I used a-\"\n\t\t\n*comment\n\n\"Amazing.\" He stepped forward, and took the rock out of my hand. \"You\npractice runic magic?\"\n\n\"I found a book detailing how to use runes for spells,\" I said. \"I don't actually\nunderstand it very well.\"\n\nHe gave the rock back. \"What are your intentions now?\"\n\n\"Huh?\"\n\n\"You've successfully crossed into my domain,\" he said. \"What do you intend to do now?\"\n\n*page_break\n\n\"Well...\"\n\n*fake_choice\n\t#\"I'd like to learn more about the people here. It's a once in a lifetime opportunity.\"\n\t\t\n\t\t\"I see.\" Lord Reyes walked around me. \"You wish to meet more of my kind?\"\n\t\t\n\t\tI nodded.\n\t\t\n\t\t\"Very well.\"\n\t\t\n\t\tI looked at Damien. He smiled, and gave me a thumbs up.\n\t\t\n\t#\"I want to keep looking around. This city looks amazing.\"\n\t\t\n\t\t\"Hmm...\" Lord Reyes walked around me. \"You wish to see more of my city?\"\n\t\t\n\t\tI nodded.\n\t\t\n\t\t\"Very well.\"\n\t\t\n\t\tI looked at Damien. He smiled, and gave me a thumbs up.\n*comment\n\n\"$!{Name}.\" Lord Reyes extended his hand. \"I officially welcome you to my domain. You may come\nand go as you please.\"\n\nI shook his hand.\n\n\"I'm trusting you,\" he said. \"I hope you won't make me regret that.\"\n\n\"I won't, sir,\" I said.\n\n\"Very good,\" he said with a smile. \"My pupil, Damien, can take it from here.\"\n\n*page_break\n\nDamien led me out into the city. \"Nicely done. Told you the old man would be reasonable.\"\n\n\"Yeah,\" I said. \"So... what now?\"\n\n\"Do whatever you want,\" he said. \"Hang around here, go home, whatever.\"\n\nIt had been a rather full day. \"I think I'm ready to go home, but I'll\ndefinitely visit again.\"\n\n\"Looking forward to it,\" he said. \"Can you find your way back home?\"\n\nI nodded. \"Yeah, I can find the clearing again, no problem.\"\n\n*page_break\n\nWhen I got home, I had already used up a good portion of the day.\n\nI considered what I wanted to do that evening.\n\n\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n\n*page_break\n\n*goto_scene octoberTenth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octoberseventeenth": "\n\n\n[i]Today is October 17th, Friday.[/i]\n\nA bolt of lightning woke me up.\n\nThe rain was coming down hard.\n\n*page_break\n\nI sat up groggily. [i]How late is it?[/i]\n\nI grabbed my phone. '3:54'\n\nI sighed and laid down. A noise kept me awake.\n\nIt sounded like a bell.\n\n*page_break\n\nMy eyes shot open, and I rolled out of bed. The warning bell was shaking.\n\nI grabbed it, and wrapped it around my neck, before creeping out of my room.\n\n*page_break\n\nThe living room was nearly pitch black.\n\nA buzzing noise filled the air.\n\nLightning struck outside, sending a flash of light across the room.\n\nA large figure stood on the other end of the room. \n\nI bolted for the front door, and threw it open.\n\n*page_break\n\nRain was coming down in torrents as I ran outside.\nI came to an abrupt halt when I remembered my mother was still sleeping in the other room.\n\nI spun around, and saw it standing in the doorway, watching me.\n\nIt stepped closer.\n\nI backed away.\n\nMy breaths were rapid. My heart pounded in my chest. My legs shook beneath me.\n\n[i]What do I do...[/i]\n\n*page_break\n\nIts movement was slow and heavy. I maintained my distance.\n\n\"You look at me with fear.\"\n\nI glanced back toward the Leavitt manor.\n\n\"Do you think I enjoy this?\"\n\n[i]Are their doors unlocked at night?[/i]\n\n\"I do this for you.\"\n\n[i]Should I break a window to get in if they aren't?[/i]\n\n\"For all of you.\"\n\n[i]Would I have time? He looks slow, but...[/i]\n\n\"I never asked for this.\"\n\nI kept moving toward the Leavitt's. \"Why are you doing this!? What do you want!?\"\n\n\"But none of you will stop.\" It kept lumbering forward. \"None of you will just... behave.\"\n\nMy breath caught in my throat. I could see it happening. A shift, like a release of tension.\n\nThat thing, hunkered down, tensed, and launched forward. It's heavy frame slammed into me, sending\nme rolling across the ground.\n\n*set Damage + 1\n\n\"Stay inside at night.\"\n\nI pushed myself up, weakly regaining my footing.\n\n\"Don't steal.\"\n\nIt kicked me in the stomach hard enough to floor me again.\n\n*set Damage + 1\n\n\"Don't lie.\"\n\nA meaty hand grabbed my throat, and lifted me off the ground.\n\n\"Don't. Scream.\"\n\nIt pinned me against the Leavitt manor wall. Its fingers clamped around my throat.\n\n\"I broke them to save them.\"\n\n*page_break\n\nI struggled pointlessly. It was too strong. It was inhumanly strong.\n\nInsects crawled up and down its arm.\n\nFlies.\n\nWorms.\n\nCentipedes.\n\nThe thing's body seethed with activity, even in the rain.\n\n\"I'm not in the wrong here.\" Somehow, his grip became even tighter. \"I'm not the villain.\"\n\n*page_break\n\n\"I don't deserve this.\"\n\n*page_break\n\nI couldn't think of anything. I couldn't think, period.\n\n*page_break\n\n\"I don't deserve a thousand lifetimes of [i]this[/i].\"\n\n*page_break\n\nSomething gave.\n\n*set Damage + 1\n\nI felt... strangely relaxed.\n\nCalm.\n\nIn that moment. I imagined blacking out would follow.\n\n*page_break\n\nThen death.\n\n*page_break\n\n\"-y!\"\n\nI felt rain falling against my face.\n\n\"$!{Name}, are you okay! $!{Name}!\"\n\n*page_break\n\nThunder rumbled in the distance.\n\nSomething was touching my neck.\n\n*page_break\n\n\"...reathing. $!{He}'s alive.\"\n\nMy throat hurt like hell.\n\nI started coughing and sputtering as I sat up.\n\nDamien was kneeling next to me. \"Thought you were nearly a goner.\"\n\nI rubbed my throat. It still hurt. \"So did I.\"\n\n*page_break\n\nDamien looked awful.\n\nHe had multiple gaping wounds all over him. His black scales had turned crimson\nfrom how much blood he'd lost.\n\nAt least the rain was rapidly washing it all away.\n\nSpeaking of which, I noticed the violent downpour was now little more than a drizzle.\n\nI stood up.\n\n\"Easy,\" Damien said.\n\n\"I think he came after me,\" I said.\n\nDamien nodded. \"I'm sorry. We had been tracking him all week... he never had time to hurt anyone.\nHe somehow beat our methods when he decided to come after you.\"\n\n\"Is mom alright?\" I asked.\n\nHe nodded. \"Lady in the guest house, right?\"\n\n\"Yeah.\"\n\n\"She's fine.\" Damien guided me around the side of the Leavitt's manor, toward the front. \"Come on.\"\n\n*page_break\n\nThey took me to the hospital. Thankfully, I didn't have any serious injuries.\n\n*page_break\n\nIt was early in the morning when I finally got back to the guest house. I collapsed into my bed\nthe second I got to my room.\n\nLingering paranoia remained. Though, the police were apparently now watching the Leavitt manor\nin case he came back.\n\nI didn't do anything for the rest of the day.\n\n*page_break\n\n*goto_scene octoberEighteenth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octoberseventh": "\n\n\n[i]Today is October 7th, Tuesday.[/i]\n\n*page_break\n\nMy eyes drifted shut as I sat across from Matthew during lunch.\n\n\"Sorry, Daniel.\" Matthew said. \"I can't.\"\n\n\"C'mon, man,\" he said. \"We've already got, like, four other people coming.\nIt wouldn't be the same without the man himself.\"\n\n\"Sorry, I just can't do it.\"\n\n\"Man... what about you $!{Name}?\"\n\n\"Hmm?\" My head drooped, and slipped free from my hand. It nearly hit my tray of food\nbefore I stopped myself.\n\n\"You alright?\" Matthew asked.\n\n\"Yeah, just tired.\" I rubbed my eyes. \"What did you ask me?\" I looked to Daniel.\n\n\"Don't worry,\" Daniel said. \"It's not going down until past midnight.\"\n\nI smirked. \"Yeah, I don't think I'd be able to stay awake until then.\"\n\n*page_break\n\n\n\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n\n\n\n*page_break\n\n\n\nI stood at the Leavitt's front gate, and watched the sun setting across the tree tops.\nI heard a\n*if (Bell = \"silver\")\n\thigh pitched\n*if (Bell = \"black\")\n\tlow pitched\nringing.\n\n*page_break\n\nIt was quiet, almost impossible to hear.\n\nI looked around, before feeling something lightly brush against\nmy chest.\n\nThe bell shook every few seconds. the wire vibrated.\n\n*page_break\n\nI scanned the nearby tree line. Anxiety crept into my chest.\n\nI had the distinct feeling I was being watched.\n\nI stepped forward. The sun was low, casting dark shadows throughout the\nwoodland.\n\nSomething moved between two trees.\n\nI squinted against the forest's darkness. I heard the buzzing of flies.\n\nThe feeling of anxiety passed. The bell stopped.\n\nI decided it was time to go inside.\n\n*page_break\n\nI felt safer the moment I shut the Leavitt's front door behind me.\n\nI looked at the bell. \"What on earth was that?\"\n\nSo long as whatever that was stayed outside, I was fine with it.\n\n\"Hey!\" My mother rushed up to me. \"Guess what we just got invited to?\"\n\n\"Uhh... did-\"\n\n\"The Leavitt's are throwing another Halloween party this year!\" She beamed at me. \"Oh,\nit was so great last year. Aren't you exci
