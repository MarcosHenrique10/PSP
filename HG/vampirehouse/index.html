er stop right there. Unless you want your\n\t\twhole family thrown out in an instant.\"\n\t\t\n\t\tI really, really wanted to say something right there.\n\t\t\n\t\t*page_break\n\t\t\n\t\tBut I couldn't.\n\t\t\n\t\t*page_break\n\t\t\n\t\tShe took a deep breath. Her face relaxed.\n\t\t\n\t\t\"You'll be starting tomorrow, right after school.\" She walked away. \"I'll\n\t\tbe swinging by after school too, you know, to make sure you're getting the hang\n\t\tof the new job.\"\n\t\t\n\t#Say nothing\n\t\t*set Elizabeth + 5\n\t\t\n\t\t\"Not going to say anything?\" She smirked. \"Probably the smartest\n\t\tthing you've done all day.\"\n\t\t\n\t\tI scowled at her.\n\t\t\n\t\t\"You start tomorrow, after school.\" She walked away. \"See you then!\"\n\t\t\n\t\t'See you then?'\n\t\t\n\t\t[i]Well, I'm sure she's not going to cause any problems for me on my first day.[/i]\n\t\t[i]Definitely not.[/i]\n\t\t\n*label AfterFirstChoice\n\n*page_break\n\n\"Well. That sucked.\"\n\n*page_break\n\n*goto_scene highSchool\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "firstdayofwork": "\n\n\n\nElizabeth's family didn't live far from school. It took me less than\nan hour to walk back.\n\nUnsurprisingly, Elizabeth was waiting for me at the front gate.\n\n*page_break\n\n*if (FlagRanWithRumors = 1)\n\tShe looked... peeved.\n\t\n\tPretending we were a couple in front of her friend\n\tprobably wasn't the smartest thing to do.\n*if (FlagRanWithRumors = 0)\n\tShe carried a smug expression. I could already tell this was going to be unpleasant.\n\n\"Ready for work?\" she asked.\n\n*page_break\n\nOn one hand, the work wasn't as hard as I thought it would be, granted\nI wasn't doing even half as much as the other servants. I was only expected to clean up\naround the house. I wasn't preparing meals or anything fancy like that.\n\nOn the other hand, Elizabeth was doing her absolute best to make my work as awful as possible.\nIt wasn't anything major. She wasn't having me do back-breaking menial labor with zero breaks and\nrests.\n\nInstead, she would pop in and make a slight comment. Maybe she'd request something. Maybe she'd\nask me to do something totally inane. But she always did it in a fashion so overly polite, so entirely-too-pleasant,\nit was completely obvious she was mocking me.\n\nIt was actually pretty clever, since even by the end of the day, the rest of the staff didn't think\nanything was odd. After all, she was just making a few 'slight requests'.\n\n*page_break\n\nI had an hour or two of sunlight left before being informed that I was done for the day.\nI half expected Elizabeth to show up with perfect timing to inform me that I needed to do just\na few more things.\n\n*if (Elizabeth >= 15)\n\tShe actually did show up unexpectedly. I had been making my way to the guest house out back when she\n\tpopped up out of nowhere.\n\t\n\tLiterally. I had looked off to the side for just a second and she was suddenly there.\n\t\n\tShe eyed me up and down.\n\t\n\t\"Can I help you?\" I asked.\n\t\n\tShe frowned. \"So, what's your deal?\"\n\t\n\t\"Huh?\"\n\t\n\t\"Why were you with that mob?\" Elizabeth asked. \"Do you really hate my kind that much,\n\tor...?\"\n\t\n\t*page_break\n\t\n\tI thought that over for a moment.\n\t\n\t*page_break\n\t\n\tI hadn't put that much thought into it before.\n\t\n\t*page_break\n\t\n\tWhy was I with those people, stoning her house?\n\t\n\t*fake_choice\n\t\t#Supernatural creatures are dangerous. I shouldn't tolerate their presence.\n\t\t\t*set Elizabeth - 15\n\t\t\t\n\t\t\t\"Yes.\"\n\t\t\t\n\t\t\tShe raised a brow. \"Yes...?\"\n\t\t\t\n\t\t\tI nodded. \"I'd prefer you creatures weren't around. We were trying to get\n\t\t\tyou to leave town. That's it.\"\n\t\t\t\n\t\t\tShe frowned, there was something almost sad in her expression. \"I see.\"\n\t\t\t\n\t\t\tI walked around her, and continued onto the guest house.\n\t\t\t\n\t\t\t\"Well,\" she called. \"You're going to have to try a lot harder than that!\"\n\t\t\t\n\t\t\tThat was becoming apparent.\n\t\t\t\n\t\t#It's what my friends were doing. I didn't really question it beyond that.\n\t\t\t*set Elizabeth + 15\n\t\t\t\n\t\t\t\"It's what we were doing.\"\n\t\t\t\n\t\t\tShe raised a brow.\n\t\t\t\n\t\t\t\"My friends needed my help, so I helped them.\"\n\t\t\t\n\t\t\tShe stared at me for a long time.\n\t\t\t\n\t\t\tAnd then burst out laughing.\n\t\t\t\n\t\t\t\"Seriously!?\" Elizabeth asked. \"That's it? No sob story about how a vampire\n\t\t\tkilled your best friend or something? It's 'just what my friends decided\n\t\t\twe were doing'?\"\n\t\t\t\n\t\t\t\"Hey!\"\n\t\t\t\n\t\t\t\"I mean... come on!\" She laughed. \"Can't you think for yourself?\"\n\t\t\t\n\t\t\tI scowled. \"Yes!\"\n\t\t\t\n\t\t\tShe rolled her eyes. \"Right. Well, if you want my advice-\"\n\t\t\t\n\t\t\t\"I really don't.\"\n\t\t\t\n\t\t\t\"You should get yourself some new friends,\" Elizabeth said.\n\t\t\t\n\t\t\tI walked around her, and continued on to the guest house. \"I'll keep that\n\t\t\tin mind.\"\n\n*page_break\n\nTo my surprise, I actually did get paid for my work. I was surprised Elizabeth hadn't\npopped by to tell her parents I was volunteering my time as a thank you for their\nhospitality.\n\nForty bucks wasn't too shabby.\n\n*set Cash + 40\n\n*page_break\n\nThe guest house was nice, if a bit small. The living room was outfitted to act as\na game room. There was a couch and a television, plus a pool table and darts. A fridge\nwas stocked with a decent amount of liquor.\n\nI noticed the padlock on it right away, and wondered if that was meant for me.\n\nThere were a couple of bedrooms next to each other on one side of the house, and a\nbathroom on the opposite side.\n\nThere was no kitchen. If we wanted to eat, we'd have to go to the main house. Or\njust go out to town. I fully intended to do the latter as much as possible.\n\n*page_break\n\nMy mom still wasn't home. She was probably out either dealing with the aftermath of\nthe fire, or trying to find a respite from it.\n\nI hadn't seen Elizabeth's parents either. Maybe they were with my mom.\n\n*page_break\n\nI entered the smaller guest bedroom. Despite being the tinier option, it had\nfour beds. I didn't have any siblings to share it with, so I had the space\nto myself.\n\nIt felt a little odd. Not just because I was in an unfamiliar space.\nThe room was clearly made for a larger family. Four beds, two desks, a few bookshelves.\n\nNo personal belongings though. The entire room felt vacant.\n\nI plopped down on a bed and sighed. I still had plenty of time before turning in, but didn't\nfeel like going out.\n\nI could always study. I was a bit behind.\n\nOr I could just read a book.\n\n*label Tasks\n\n\"What should I do...\"\n\n*choice\n\t#Study\n\t\tMy textbooks thankfully weren't destroyed in the fire. I\n\t\thad forgotten my backpack at school when it happened.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto AfterTasks\n\t#Read\n\t\tI had a few books in my backpack. I would have lost them\n\t\tto the fire if I hadn't accidentally left my bag at school\n\t\tthat day.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Tasks\n\t\t*goto AfterTasks\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I went to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto AfterTasks\n*label AfterTasks\n\n*page_break\n\nThe rest of the evening passed quickly. The sun went down, my mom eventually\nshowed up, and I finally decided it was time to sleep.\n\nThere was always something weird about sleeping in an unfamiliar room in an unfamiliar\nbed. I tossed and turned for a while before finally falling asleep.\n\n*goto_scene theBlackBook\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "highschool": "\n\n\n\n\nOh yes, good old Lakeside High. I'd been attending for just over a year.\nI walked toward the entrance, passing numerous people still milling about\noutside.\n\nThat vampire girl attended too, and was in the same grade as me. Despite that,\nI'd almost never seen her around. I think we just never had the same schedule.\n\nThat, or I'd been subconsciously avoiding her. It could go either way.\n\n\"Hello, $!{Name}!\" An arm wrapped around me. \"It's so good to see you!\"\n\nIt was that vampire girl.\n\n*page_break\n\n[i]What. Even.[/i]\n\n*page_break\n\nShe turned around and just barely kept her voice from being a full on shout as she said, \"It's\nso NICE that YOU AND YOUR MOM are STAYING at my HOME! You know the VAMPIRE HOUSE!\" She turned\nto a random kid passing by. \"$!{Name} is staying at my house. And I'm a... VAMPIRE!\"\n\nSaid random kid took a few steps back.\n\nDozens of people were staring at us. A few were laughing. Most just looked baffled.\n\n\"Ah, I see what this is.\" I nodded grimly.\n\n\"Well, buddy... how- are those your friends?\"\n\nI sighed, before turning around.\n\n[i]Yep, there they are. My friends.[/i]\n\nThree of them to be exact.\n\nThe tallest of the bunch, Matthew, gave me an odd look. \"Uh, hey. What's going on?\"\n\n\"$!{Name}?\" she asked. \"Aren't you going to introduce me to your friends?\"\n\nThe shortest, Daniel crossed his arms. \"[i]She's[/i] your friend?\"\n\n*fake_choice\n\t#\"This is... er?\"\n\t\t*set Elizabeth + 5\n\t\t\n\t\t\"Oh, $!{Name}!\" She slapped my back. Hard. \"Very funny. I'm Elizabeth Leavitt.\"\n\t\t\n\t\tMatthew's eye twitched. \"I know.\"\n\t\t\n\t\tHer smile faded. \"I suppose you would.\"\n\t\t\n\t\tTheir eyes locked into a mutually intense and angry glare.\n\t\t\n\t\t\"Hey, $!{Name}?\" He looked at me. \"Is everything alright?\" He gestured\n\t\ttoward Elizabeth. \"I mean with... whatever this is?\"\n\t\t\n\t\tElizabeth gave me an expectant stare.\n\t\t\n\t\t\"Yes,\" I said, through gritted teeth. \"Everything. Is. Fine.\"\n\t\t\n\t\t\"...Alright.\" Matthew looked back and forth between Elizabeth and myself. \"I guess I'll see\n\t\tyou around?\"\n\t\t\n\t\tI nodded.\n\t\t\n\t#\"I'll explain it to you guys later.\"\n\t\t*set Elizabeth - 5\n\t\t\n\t\tElizabeth elbowed me in the gut hard enough to nearly make me buckle to my\n\t\tknees.\n\t\t\n\t\t\"I'm Elizabeth Leavitt.\"\n\t\t\n\t\tMatthew glared at her. \"We know who you are.\"\n\t\t\n\t\tElizabeth smirked. \"Of course you do.\"\n\t\t\n\t\t\"Whatever's going on right now...\" Matthew stepped up to her. \"I'd suggest\n\t\tyou watch yourself.\"\n\t\t\n\t\t\"Oh?\" Elizabeth tilted her head. \"What are you going to do?\"\n\t\t\n\t\tHe glared at her.\n\t\t\n\t\tShe smiled back innocently.\n\t\t\n\t\tHe looked at me. \"We'll see you later.\"\n\t\t\n\t#[Nod.]\n\t\t*set FlagCarryingThings 1\n\t\t*set Elizabeth + 10\n\t\t\n\t\tShe pulled me closer. \"I'm Elizabeth Leavitt.\"\n\t\t\n\t\tMatthew stared dumbfounded at us. \"...Yeah. Uh, $!{Name}?\"\n\t\t\n\t\t\"$!{He}'s staying at my family's manor right now as our personal guest,\" Elizabeth said.\n\t\t\"Did you know ${His} mom and mine go way back?\"\n\t\t\n\t\tMatthew shook his head. \"Uh...\"\n\t\t\n\t\t\"I've been feeling a little under the weather lately.\" Elizabeth ruffled my hair. \"So\n\t\tthis ${Guy}'s gonna be helping me out today. Carrying my books... Helping me with my\n\t\thomework during lunch...\"\n\t\t\n\t\t\"What?\" Matthew asked.\n\t\t\n\t\t[i]What?[/i]\n\t\t\n\t\tI stared at her.\n\t\t\n\t\t\"Isn't that right?\" She smiled at me. I could just barely make out a pair of fangs peeking\n\t\tout from behind her lips.\n\t\t\n\t\t\"...Right.\"\n\t\t\n\t\t\"Okay.\" Matthew took a step away from us. \"I'll see you later, $!{Name}.\"\n\t\t\n\t\tI nodded solemnly.\n\t\t\n*page_break\n\n*if (FlagCarryingThings = 1)\n\tElizabeth wasn't kidding about having me help her.\n*if (FlagCarryingThings = 0)\n\tI had assumed I'd be relatively free for the rest of the day, and wouldn't have to worry\n\tabout Elizabeth until after school.\n\t\n\tI was wrong.\n*comment\n\nDespite us not having a single other class together, Elizabeth was somehow always waiting for me right\nafter I left class. It didn't matter where the class was, or how far hers must have been, she\nwas always somehow just there.\n\n*if (FlagCarryingThings = 1)\n\tElizabeth had me help her with absolutely everything that day, without exception.\n*if (FlagCarryingThings = 0)\n\tShe made it clear she 'desperately needed' my assistance.\n\t\n\tWith everything. Apparently.\n*comment\n\nShe had me carry all her books. She had me open every door that stood in her way.\n\n*page_break\n\nAnd she just couldn't seem to help but loudly proclaim that I was doing all of that to the entire\nfreaking planet.\n\n*page_break\n\nEventually lunch came around.\n\nI gloomily marched down a hallway. Elizabeth followed me closely.\n\nI overheard two girls whispering amongst each other.\n\n\"There they are.\"\n\n\"I know right? Sooo cute~\"\n\nI nearly stopped dead in my tracks, only Elizabeth's prodding kept me moving.\nI strained to hear what they were saying, even as we kept moving.\n\n\"When did ... going out?\"\n\n\"... I dunno ... -thing for her.\"\n\n\"Adorable.\"\n\nA sinking sensation settled into my stomach.\n\n[i]What exactly were those girls thinking about us?[/i]\n\n\"Hey, Elizabeth!\" A tall girl with cropped brown hair rushed up to us.\n\n\"Hey!\" Elizabeth dragged me over to her. \"This is my new friend.\" Her voice held a mischievous tone.\n\n\"New 'friend', huh?\" The girl crossed her arms, looking me over with a raised brow. \"Is that a fact?\"\n\n*fake_choice\n\t#\"I'm $!{Name}.\"\n\t\t\n\t\t\"I know,\" she said with a smirk. \"I'm Roxanne. So... I finally get to meet ${Him}, huh?\"\n\t\t\n\t\tElizabeth raised a brow. \"Where did you hear about ${Him}? I hadn't told anybody yet.\"\n\t\t\n\t\t\"Well you two have been making such a big scene, it didn't take long to find out.\"\n\t\tRoxanne looked at me. \"Got to say, you really found yourself the romantic type.\"\n\t\t\n\t\tI paled. I imagine Elizabeth would have too, if she had any melanin left to lose.\n\t\t\n\t\t\"So how did you two become a couple?\" Roxanne asked. \"I've never seen you two\n\t\ttalking to each other before.\"\n\t\t\n\t\t*page_break\n\t\t\n\t#\"I take it you already know about this whole thing?\"\n\t\t*set Roxy + 5\n\t\t\n\t\t\"You could say that,\" she said. \"Though it's kinda hard not to notice when you\n\t\ttwo are being so obvious about it.\"\n\t\t\n\t\tI frowned. \"Does everyone know?\"\n\t\t\n\t\t\"Basically.\" She shrugged. \"Everyone who cares anyway. I'm Roxanne, by the way.\"\n\t\t\n\t\t\"Oh.\" Well, at least I wouldn't have to explain everything to Matthew later.\n\t\t\n\t\t\"So...\" Roxanne looked us both over. \"When did you two hook-up? I've never seen\n\t\tyou two hanging out before.\"\n\n*page_break\n\nElizabeth stared at her friend for a really long time.\n\n*page_break\n\nRoxanne's eyes darted between the two of us, her expression growing more nervous with each\npassing second.\n\n*page_break\n\n*if (Elizabeth >= 15)\n\t*set Elizabeth + 5\n\tA hint of red touched Elizabeth's cheeks.\n*if (Elizabeth \u003c 15)\n\t*set Elizabeth - 5\n\tShe opened her mouth, but only the slightest breath escaped, as if whatever words she\n\ttried to form died in her throat.\n*comment\n\nI coughed nervously. \"We-\"\n\n\"That is not even slightly what is going on here!\" Elizabeth shouted.\n\nRoxanne took a step back. \"Easy, Elizabeth. I was just-\"\n\n\"I would never in a million years. I wouldn't... that- why would you even think that!\"\n\n\"Um.\" Roxanne scratched the back of her neck. \"You two were being so lovey-dovey all day. It seemed\npretty obvious.\"\n\n\"B-but we weren't!\" Elizabeth threw her hands up. \"At all! $!{He} was just carrying my books, and opening\ndoors, and....\"\n\n\"Hun?\" Roxanne smiled nervously. \"That's what\n*if (Sex = \"male\")\n\tboyfriends do for their girlfriends sometimes.\n*if (Sex = \"female\")\n\tgirls do for their girlfriends sometimes. I think.\"\n\nElizabeth stared at me.\n\nTaking everything in, I felt...\n\n*fake_choice\n\t#...embarrassed that people think I'm going out with this girl.\n\t\t\n\t\tI smiled nervously. \"That's really not what's happening here.\"\n\t\t\n\t\tRoxanne raised a brow at me.\n\t\t\n\t\t\"I'm serious.\"\n\t\t\n\t\t\"Uh-huh.\" Roxanne nodded. \"Sure.\"\n\t\t\n\t\t\"Enough!\" Elizabeth stomped her foot with enough force to send a slight quake through\n\t\tthe floor. \"I'm not listening to any more of this!\" She stormed off.\n\t\t\n\t\t\"Elizabeth!\" Roxanne took off after her. \"Wait up!\"\n\t\t\n\t#...that this whole thing was hilarious. Payback is great.\n\t\t*set Elizabeth - 10\n\t\t*set Roxy + 10\n\t\t\n\t\t*set FlagRanWithRumors 1\n\t\t\n\t\tA chuckle escaped my lips. \"C'mon, Elizabeth.\"\n\t\t\n\t\tShe stared at me, eyes wide.\n\t\t\n\t\t\"There's not much point in lying to your friend. The Secret is out.\"\n\t\t\n\t\tRoxanne laughed. \"I knew it! So... how long have you two been going out?\"\n\t\t\n\t\tElizabeth tried to say something, but I cut her off. \"Oh, officially\n\t\tI guess it's only been a few days. But, we've been pretty close for a\n\t\twhile longer.\"\n\t\t\n\t\t\"Interesting.\" Roxanne shot a curious look at Elizabeth.\n\t\t\n\t\t\"Yeah.\" I smirked at Elizabeth. \"She just wasn't ready to make that final\n\t\tleap into a real relationship until recently. She was really nervous about\n\t\tthe whole thing. It was pretty adorable really.\"\n\t\t\n\t\tRoxanne smirked. \"I bet she was.\"\n\t\t\n\t\tElizabeth at some point in the conversation had given up trying to speak.\n\t\tHer cheeks were noticeably flushed.\n\t\t\n\t\tIt looked like she wanted to say something. But nothing came out of her\n\t\tmouth. After several moments of silence she suddenly stormed off.\n\t\t\n\t\t\"Elizabeth?\" Roxanne took off after her. \"Hey, it's not that big of a deal!\"\n\t\t\n\t#...a little flustered. Elizabeth was actually pretty cute. For a freak.\n\t\t*set Elizabeth + 5\n\t\t\n\t\tI felt a blush touch my cheeks. \"I, uh...\" I shuffled nervously before\n\t\tcasting a glance toward Elizabeth.\n\t\t\n\t\tShe stared right back, wide eyes studying my expression.\n\t\t\n\t\t\"W-we're not like that,\" I said.\n\t\t\n\t\tRoxanne nodded. \"Sure.\"\n\t\t\n\t\t\"$!{He}'s telling the truth!\" Elizabeth shouted. \"We're not a couple! $!{He} was just\n\t\thelping me out.\"\n\t\t\n\t\tRoxanne rolled her eyes.\n\t\t\n\t\t\"I-I... I need to go.\" Elizabeth quickly took off.\n\t\t\n\t\t\"Wait!\" Roxanne followed closely behind. \"I want juicy details!\"\n\t\t\n[i]Well. This has been... something.[/i]\n\n*set KnowsRoxy 1\n\n*page_break\n\nI found my usual friends sitting together. Every single one of them stared at me in shock\nas I approached.\n\n\"What exactly is going on?\" Matthew asked.\n\nI sat down, took a deep breath, and said. \"I'm being black-mailed by the vampire girl\nbecause my mom doesn't have anywhere else we can stay there's nothing I can do right\nnow and everyone thinks we're dating but we're not.\"\n\n\"What?\"\n\n\"I'm being black-mailed by her,\" I said. \"There's nothing I can do.\"\n\n\"With what?\" Daniel asked.\n\n\"My mom and hers go way back apparently,\" I said. \"No idea how far back, or in what way.\nThey're letting us stay at their guest house.\"\n\nDaniel raised a brow. \"And...?\"\n\n\"And... [i]YOU[/i] nearly hit Elizabeth with a rock yesterday during the protest.\" I sighed, \"If\nshe tells her family about that, we're definitely getting kicked out.\"\n\n\"So what?\" Matthew asked. \"You'd be better off.\"\n\n\"There's no where else to go. Not for a while anyway,\" I said. \"It's only a month. That's\nall. After that, I'm home free.\"\n\nI got the sense Matthew wanted to push the issue more, but he let it go.\n\n*page_break\n\nThe rest of the day went much more smoothly. I didn't see Elizabeth once.\n\nShe probably still expected me to show up for work after\nschool, but at least I got a brief respite from her.\n\n*page_break\n\n*goto_scene firstDayOfWork\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "malkaend": "\n\n\n\n\n\n\nMalka was a nice girl. She had a unique sense of fashion.\n\nShe was also a walking corpse.\n\nI still wasn't sure what to make of that.\n\n*page_break\n\nI thought about what pursuing a relationship with her would mean. I have to emphasise that point.\n\nMalka is dead. She's a corpse.\n\nIt seemed like trying to pursue her could create some unsavoury parallels with acts I'd rather\nnot think about.\n\nI wondered if Malka would be pissed that I had thought that. From her perspective, she probably\ndidn't consider herself the equivalent of some random rotting body.\n\n\"Damn...\" I sighed. [i]I shouldn't think of her that way either.[/i]\n\n\"What's wrong?\" Malka asked.\n\n\"Oh! Malka!\" I jumped a little.\n\nWe stood outside the school.\n\n\"What's up?\" Malka smirked at me, amused by my reaction.\n\n\"Not much.\" I scratched the back of my neck. \"Hey, uh... are you going to the Halloween party?\"\n\n*page_break\n\nWe walked through town together. It seemed like we were heading toward the club, but I didn't ask.\nI was more or less just blindly following Malka.\n\n\"So why did you want to know whether I was attending or not?\" Malka asked.\n\n\"Well...\" I cleared my throat. [i]Do I want to do this?[/i]\n\nShe eyed me curiously.\n\nMy eyes drifted across her face. She didn't look dead.\n\n\"I wanted to know if you wanted to go. With me.\"\n\nShe tilted her head. \"You want us to show up together?\"\n\n\"Not just together. But, like...\"\n\n\"'Together'?\" Malka asked. \"As in... [i]together[/i]. That kind of together.\"\n\n\"Yeah,\" I said.\n\n\"Wow...\" Malka looked away, seemingly mulling over what I had said.\n\n*page_break\n\nI felt a weight drop against my stomach. I tried my best to keep a straight face.\n\n\"I can't do that.\"\n\nI stopped.\n\n\"I'm... I'm sorry,\" she said. \"But, it couldn't work out between us.\"\n\n\"What do you mean. It-\"\n\n\"Don't do that,\" she said. \"Don't pretend. You know what I am.\"\n\nI stared at her for a while, uncertain what to say.\n\nIt was true, I had some doubts of my own about the situation. But, I was willing to at least give\nthings a shot.\n\nMalka sighed. \"Look, let's just go to the club for a while. Hang out, like we normally do.\"\n\nI nodded slowly, and followed her.\n\n*page_break\n\nFor a club with such a dark atmosphere, I was surprised at the lack of Halloween decorations.\n\nAs far as I knew, they weren't planning to do anything on Halloween night.\n\nMalka had been chatting for a long while. I was barely following along. She acted normal, but I could\ntell her voice was just a little strained.\n\nThings were awkward.\n\nAsking her out was a mistake.\n\nI couldn't help but feel a little frustrated though. It would have been one thing if she had just not\nbeen that into me, but from the sounds of things she didn't think I could get past what she was.\n\nI couldn't say with absolute certainty that she was wrong about that, but I wanted to believe we\nhad a chance.\n\nThe issue was moot though. I had no way to convince her, and I was certain she wouldn't let me press\nthe point.\n\nShe was still talking to me, and we were still hanging out. In a few days this awkwardness would likely\nsubside and we could keep being friends.\n\nThat would just have to be enough.\n\n*page_break\n\nThe day passed slowly, and before I knew it, the sun was setting along the horizon.\n\nThe club was starting to pick up. The atmosphere was slowly turning more and more energetic. Unfortunately,\nit was also time for Malka and I to return to the Leavitt manor.\n\nWe set out and before I knew it, the sun had actually set. A thick darkness blanketed us. I was thankful\nI was so familiar with the area, otherwise we would have had some trouble getting back home.\n\n*page_break\n\nMalka's phone rang as we were walking.\n\nI barely glanced at her before returning my gaze ahead.\n\n\"What?\" Malka was staring at her screen. She quickly texted something back.\n\nHer phone rang a few moments later.\n\n\"What on earth... weird.\"\n\nThe messages continued to go back and forth for a while. Malka looked more and more confused.\nHowever, as the seconds passed she went from confused to worried.\n\n\"$!{Name}?\" Malka looked at me. \"I need to make a quick detour.\"\n\nI stopped. \"What? Where?\"\n\n\"The... local...\" Malka smiled sheepishly. \"Cemetery.\"\n\nI stared.\n\n*page_break\n\nAnd that's how I found myself walking through the front gate of a cemetery.\n\n\"What on earth are we doing out here?\" I asked.\n\nVarious gravestone surrounded us. It was so dark I couldn't make out the writing\non any of them.\n\n\"My friend is out here. For some reason.\"\n\nIn the distance I spotted a building. It was pretty small, and I thought it might be a shed\nof some kind until we got closer.\n\nIt was a tomb. I guessed it was given to someone as a special burial. If the sun was out,\nwe'd probably see a marker explaining in detail who they were, and why they had a monument\ndedicated to them.\n\nThe tomb's door was bashed in.\n\n\"Did your friend do this?\" I asked.\n\n\"I... don't know,\" Malka said. \"Her messages were really weird and evasive.\" She looked at me.\n\"I'm glad your here actually.\"\n\n*page_break\n\nWe stepped forward, past the broken down doorway and into the tomb itself. The sun had set some\ntime earlier, but I wasn't sure it would have made any difference whether it was night or day.\n\nThe tomb had no lights, and almost no windows. We only received a meagre amount of light from a\nsingle slit-shaped window built near the ceiling.\n\nInside sat a large and finely crafted tombstone.\n\n\"Why is your friend here?\" I asked.\n\nMalka looked around. \"It doesn't look like she is.\" She pulled out her phone and rapidly texted\nsomeone a message.\n\nWe waited. There was no response.\n\n\"Dammit, what the hell are you doing?\" Malka asked, mostly to herself.\n\n\"She said she was in here?\" I asked.\n\n\"Yeah, but she didn't say why,\" Malka said. \"And now it looks like she isn't here at all.\"\n\n\"Or returning your texts,\" I said. \"Apparently.\"\n\n*page_break\n\nWe exited the tomb. Malka was clearly pissed. I was mostly just curious.\n\nThe entire situation was odd.\n\n\"Come on,\" I said. \"It's dark.\" A ringing sound reached my ears. \"We should... get...\"\n\nI saw it standing in the distance. That thing.\n\nThe killer.\n\nI reached down, and touched the bell hanging from my neck. It was shaking, giving off a\nconstant chime.\n\n\"Malka.\" I took a step back.\n\nShe raised a brow at me. \"What's up with that bell?\"\n\n\"Run.\"\n\nMalka tilted her head. \"What?\"\n\n*page_break\n\n\"Run now!\" I grabbed Malka's arm and dragged her along as I took off toward the opposite side of the\ncemetery.\n\n\"Wha- hey!\"\n\nThat thing was still a ways behind us, and it was dark. We could lose it easily.\n\n\"$!{Name}! Stop!\" Malka dug her feet into the ground, slowing me down. I eventually tripped\nfrom trying to drag her forward.\n\n\"That killer is right behind us!\" I shouted.\n\n\"Killer? What are-\" A blade shot out of Malka's chest.\n\nIt was a machete. Black fluid coated the blade, and seeped from her chest wound.\n\n\"Malka...\" I stood up slowly.\n\nMalka stared down at her chest. She gripped the blade.\n\n*page_break\n\nIt was yanked out of her body. Malka fell to the ground. That thing stood over her.\n\n[i]It caught up so fast...[/i]\n\nI stumbled back.\n\nIt marched forward. A black grime clung to its blade.\n\n\"You...\" I stared at it. \"You sent those messages?\"\n\nIt nodded once, before lunging forward. It took an enormous swing at me.\n\n*set Damage 0\n\n*if (Fighting > 10)\n\tI ducked away, narrowly avoiding being struck.\n\t\n\tIt swung several more times, forcing me further and further back with each strike.\n*if (Fighting \u003c= 10)\n\t*set Damage + 1\n\t\n\tI raised my arm up. The blade slashed it open.\n\t\n\tI gritted my teeth as I quickly scrambled away. It took several more swings at me,\n\tbut I managed to keep ahead of it.\n*comment\n\nI glanced past it, at Malka, hoping to see her still somehow alive.\n\n*page_break\n\nShe was sitting in the grass with her phone out, talking to someone.\n\n*page_break\n\nI stared. For the briefest of moments, I questioned if this had all been some elaborate hallucination.\n\nAnd then that thing chopped into my side with his machete.\n\n*set Damage + 1\n\nI fell to the ground, clutching at the fresh cut over my ribs.\n\nI took my hand off of it, and stared at the red smear across my palm.\n\nThat thing swung down at me. I rolled out of the way, got up to my feet, and sprinted\naway.\n\nI spun around after I was sure I had some distance between myself and that thing.\n\nIt was coming after me, it's steps slow and ponderous as ever.\n\nI glanced at Malka.\n\nShe was walking toward us in a nonchalant manner.\n\n*page_break\n\nIt noticed her. Its head tilted just the slightest bit, as if it was looking at a curious oddity.\n\nIt marched toward her, lifted its blade high over its head, and brought it down.\n\nThe blade sliced deep into her torso. Black fluid poured from the massive wound. Malka didn't flinch,\nor show any real reaction at all.\n\nShe reached up, grabbed the side of that thing's neck in one hand, gripped the other side in with the\nother.\n\nAnd tore.\n\n*page_break\n\nThere was no real viciousness behind the motion. Malka simply tore two chunks of flesh from its neck\nlike it was nothing. She didn't look pissed. She didn't look scared.\n\nI stared in horror as the thing reeled back. It lost its grip on the machete, which remained buried in\nMalka's body.\n\nShe grabbed the handle, and slowly worked the blade our of herself by turning it back and forth.\n\nI noticed the thing trying to rise to its feet, and a realization suddenly struck me.\n\nI quickly spoke the incantation to weaken him.\n\nIts struggle ceased immediately. I didn't dare stop speaking the spell though.\n\nI got to my feet and approached slowly. A pool of blood steadily grew around it.\n\nI was happy the lighting was so poor. I couldn't make out the insides of his neck, which I noticed\nwere seething with insects.\n\n\"You okay?\" Malka asked.\n\n*page_break\n\nThe police showed up several minutes later. Apparently Malka had called them when she was on the phone.\n\nWe sat nearby, they had contacted my mother and the Leavitt's. They would be arriving shortly to take\nus home.\n\nWell, they would take Malka home. I'd probably be going to the hospital.\n\nI felt a hand brush against my side, just above my cut.\n\nI winced as the remainder sent pain flooding through me again. It was weird, I didn't feel that much\nwhen that thing was actually trying to kill me, it was only after everything had settled down that\nthe pain returned.\n\nI chalked it up to adrenaline.\n\n\"Sorry you got a bit banged up,\" Malka said.\n\nI shrugged. \"I was just lucky you saved me.\" I eyed her wounds. A stab through her chest, and a massive\ncut to her torso. \"Are you going to be alright?\"\n\nShe nodded. \"Yeah, this is nothing. Literally. I'm pretty much immortal when it comes to normal weapons\nlike this.\"\n\n\"That's awesome,\" I said.\n\nShe smiled sheepishly. \"Not... really. It's mostly just weird.\"\n\n\"I don't think so.\"\n\nMalka frowned at me, but said nothing.\n\n*page_break\n\nA silence fell between us.\n\n*page_break\n\n\"Have you ever dated?\" I asked.\n\n\"Yeah,\" she said. \"Before I became... this.\"\n\n\"But not since?\"\n\nMalka shook her head.\n\n\"Why n-\" I stopped myself. I wasn't stupid. I knew 'why' she hadn't been with anybody. It didn't\nmean I agreed with her reason. \"You don't think anyone would like you like this?\"\n\n\"No.\" She sighed. \"I'm sure there are some people that would be really into me being a corpse.\nThey're just not the kind of person I'd want to start a relationship with.\"\n\nI mulled that over for a moment. \"So your saying I'm just a necrophiliac who's just trying to\nfulfill ${His} fetish?\"\n\n\"What- no!\" Malka answered quickly. \"I never thought you...\" She pinched the bridge of her nose. \"It's\ncomplicated.\"\n\n\"Is it?\" I asked. \"You think people would either be disgusted by what you are, or they'd be too... 'eager'?\"\n\nMalka glanced away from me. \"I just... I haven't been like this very long. I'm not used to it. I can't\njust be expected to accept what I've become overnight.\"\n\n*page_break\n\nI didn't have a response for that. I couldn't just tell her to get over what she had become, especially\nwhen I wasn't sure how comfortable I was with it either.\n\n\"Malka?\" I stood up. \"Please come to the Halloween party with me.\"\n\n\"I-\"\n\n\"You said you're not comfortable with what you are yet. That's fine, I respect that,\" I said. \"But you're\nnever going to be comfortable with what you are if you don't push yourself out of your comfort zone.\"\n\nMalka fidgeted a bit. She definitely didn't want to be having this conversation.\n\n\"Maybe it'll work out, maybe it won't,\" I said. \"But, either way, you'll be a little closer to\nbeing comfortable in your own body.\"\n\n\"...I'll think about.\"\n\nI noticed an ambulance nearing us. \"That's probably for me.\"\n\n*page_break\n\nThe days passed quickly. I had to get some stitches, but I was otherwise okay.\n\nThe doctors noticed some black grime in my wounds, but couldn't figure out what it was. I\ndecided not to mention it probably came from Malka.\n\nMalka herself stopped by to see me shortly after I arrived at the hospital, though there wasn't\nmuch need, they let me out that night.\n\nAnd... as the Halloween party approached we didn't talk about that much. Malka and I still hung out,\nbut neither of us spoke about what we had discussed.\n\n*page_break\n\nThe night of the party came. I wandered the halls of the Leavitt manor. Music pounded through the walls.\nThe party was taking place mainly in the dining room.\n\nI still hadn't seen Malka despite the party going on for nearly an hour.\n\nI somehow had never learned where in the manor she had been staying, so it took me quite a while to find\nher.\n\nI was lucky a few servants were still milling around the house to guide me.\n\n*page_break\n\nI found Malka's room on the third floor.\n\nI hesitated as I raised my fist up to the door. There was no noise from the other side.\n\nWith a deep breath, I knocked three times.\n\n*page_break\n\nNo answer. But, I did hear stirring from within.\n\n*page_break\n\n\"Malka?\" I called. \"It's-\"\n\n\"Come in.\"\n\nI stared at the door.\n\n\"It's unlocked.\"\n\nI looked around. \"Okay...\"\n\n*page_break\n\nI stepped through.\n\nMalka always dressed in black, I had expected her room to reflect that.\n\nBut, it didn't. In fact, her room was bare. There were almost no personal items around.\n\nThere was a bed, with a plain brown blanket on it. A dresser and desk sat near it. A\nfew generic paintings of flowers hung from the walls.\n\nI had to remind myself Malka was just a guest like me. Her stay was temporary too.\n\nMalka cleared her throat.\n\nI turned, seeing her dressed in a fine black dress.\n\nShe wore a black bow in her hair. Her dress was very frilly, and stopped just short of\nher knees. Her black socks were very long, and reached past her knees. White lace accented\nthem.\n\nI had to stop myself from staring. \"You look good.\"\n\n\"Thanks.\" Malka's tone was weak. \"You too.\"\n\nWe both stood quietly. My eyes darted over her bare room. She stared down at her own feet.\n\n*page_break\n\n\"Are you coming to the party?\" I asked.\n\nMalka shrugged. \"Sure.\"\n\n\"...Are you comfortable coming to the party?\"\n\n\"Not really,\" Malka said. \"No.\"\n\nI frowned. \"Malka. You don't have to-\"\n\n\"But I will anyway,\" she said. \"I think you were right. I can't change overnight, but I can at least\ntry.\"\n\nI smiled at her, before walking toward the door.\n\nShe grabbed my wrist. I glanced back at her.\n\n*page_break\n\nShe quickly leaned over and kissed my cheek\n\nHer lips were ice-cold, but I didn't flinch.\n\n\"Thanks.\" Malka quickly moved past me, and out the door.\n\nI stood still, staring at the open door.\n\nShe called from down the hall. \"Are you coming or what?\"\n\nI flinched, looked around, and went after her.\n\n*page_break\n\nI still didn't know if things were going to work out between us, but I was excited to find out.\n\n*goto_scene ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "matthewend": "\n\n\n\n\n\nI made my way to Matthew's house.\n\nHe stopped coming to the hunters lodge after his mom showed up that day. I still didn't know what\nthat had been about.\n\n*page_break\n\nI walked through a suburb. It was just after school let out, so I was seeing a lot of cars still\ncoming and going.\n\nI came across a nice little house. A picket fence surrounded it, and I noted two dogs lounging\nin the front yard.\n\nThey both perked up when I approached.\n\n\"I don't recognize either one of you,\" I said, looking them over.\n\nThey were both big dogs. I couldn't figure out their breed. I guessed they could best be classified\nas 'mutts'.\n\n[i]I hope the old ones didn't get killed by something.[/i]\n\nMatthew's mom regularly brought dogs with her during hunts, though I wasn't sure what their\nexact purpose was.\n\nI would have assumed it was something vaguely related to tracking, but it seemed like bloodhounds\nwould be better for that.\n\n*page_break\n\nOne barked at me as I approached the door, but otherwise made no move to approach me.\n\nThe door opened before I even reached it.\n\nMatthew's mom was staring at me.\n\n\"Hey, Mrs. Rowe.\" I waved at her.\n\nShe barely gave more than a half wave back. I got the distinct sense she didn't like me.\n\nPerhaps I was viewed as a bad influence.\n\n*page_break\n\n\"I'm sorry to bother you, ma'am.\" I gave her a sheepish smile. \"I was... checking in on your son.\"\n\n\"Is that a fact?\" She crossed her arms. \"Well, I assure you, he's fine.\"\n\n\"Right...\" I took a step forward. \"Could I see him?\"\n\n\"Why?\"\n\nI bit back a sigh. Clearly, she wasn't going to make this easy.\n\n\"Well... the Leavitts are holding a Halloween party. I though he might like to come with me.\"\n\nShe raised a brow at me. \"The Leavitts? You know them?\"\n\n\"My mom and them go way back. Apparently.\" I coughed nervously. \"We've been staying in their\nguest house for the last month or so.\"\n\n\"Oh.\" Mrs. Rowe's features softened immediately. \"I thought you were- nevermind.\" She smiled\nat me. \"Would you like to come in?\"\n\n*page_break\n\n[i]That was easy.[/i]\n\nMatthew was sprawled out on a sofa, watching television.\n\nThe show looked like a cartoon. It depicted various colorful horses.\n\n\"What are you watching?\" I asked.\n\nMatthew immediately shut off the television. \"It just came on I wasn't really watching that.\"\n\n\"Okay.\" I glanced at Mrs. Rowe, who smirked back at me. \"Can I talk to you for a minute?\"\n\n\"Huh, sure.\" He stood up, and looked at his mom. \"Uh-\"\n\n\"I'll give you a minute.\" Mrs. Rowe backed away. She started to leave the room, but stopped at\nthe doorway and looked at me. \"Start influencing him, would ya?\"\n\nI tilted my head at her.\n\n*page_break\n\n\"What's going on?\" Matthew asked.\n\n\"You know how I've been staying at the Leavitt Manor?\"\n\nHe nodded.\n\n\"They're having a party on Halloween,\" I said. \"And I'm allowed to bring...\"\n\n\"A friend?\" Matthew asked.\n\n\"Or, you know...\" I swallowed nervously. \"A d-\"\n\n\"It doesn't matter,\" Matthew said. \"My mom's not going to want me headed out anywhere\nfor a while.\"\n\n\"Why?\"\n\nMatthew averted his gaze. \"No reason.\"\n\n*fake_choice\n\t#Ask Mrs. Rowe to let him come.\n\t\t\n\t\t\"Hold on,\" I said.\n\t\t\n\t\t\"What are you doing?\" Matthew asked.\n\t\t\n\t\t*page_break\n\t\t\n\t\tI walked further into the house. To my surprise, Mrs. Rowe was standing out in\n\t\tthe hall, right next to the doorway. She flinched when I appeared.\n\t\t\n\t\t\"Were you listening in?\" I asked.\n\t\t\n\t\tShe smiled. \"No.\"\n\t\t\n\t\t\"Right.\" I suppressed the urge to roll my eyes. \"I was hoping Matthew could join\n\t\tme for-\"\n\t\t\n\t\t\"Sure.\"\n\t\t\n\t\t\"a social... what?\" I stared at her in disbelief.\n\t\t\n\t\t\"I have no problem with that.\"\n\t\t\n\t\t\"Okay. Yeah. Thanks.\" I backed away slowly.\n\t\t\n\t\t\"No problem!\" She smiled at me.\n\t\t\n\t#Tell Mrs. Rowe the party is being hosted by vampires.\n\t\tI shouted out into the hall Mrs. Rowe disappeared to. \"Hey, the Leavitt's are vampires\n\t\tand they're hosting a party with a bunch of other monsters! Can Matthew come?\"\n\t\t\n\t\tShe immediately poked her head in through the door. \"Oh, sure. Have a good time\n\t\tMatthew.\"\n*comment\n\n[i]Well... that was easy.[/i]\n\n\"Fantastic.\" I smiled at Matthew. \"So, um. You coming?\"\n\nHe stared at me for a long while. \"Sure.\"\n\n\"Great.\" I remembered I hadn't really specified what I wanted this to be. \"Hey, Matthew? Can\nwe talk outside real quick?\"\n\n*page_break\n\n\"I probably should have said this earlier,\" I said. \"But, about coming with me to this\nHalloween party...\"\n\nMatthew raised a brow at me.\n\n\"I don't want us to go together as friends.\"\n\n\"What?\" He frowned at me. \"You don't want people at this thing to think we're friends?\"\n\n\"No, that's not what I-\" I took a deep breath. \"Will you go as my date?\"\n\nMatthew stared at me for a second. \"Sure.\"\n\n\"What.\" I blinked. \"Really? It was that easy?\"\n\nHe smirked. \"Yeah, I've actually liked you for a while now.\"\n\n\"Why didn't you say anything?\" I asked.\n\n\"I dunno...\" He shrugged. \"We're good friends. Didn't want to screw that up.\"\n\n*page_break\n\n\"Huh...\" I leaned against the wall. \"I'm not really sure what to do now. Halloween\nis still over a week away.\"\n\n\"We can hang out for the rest of the day,\" Matthew said.\n\n\"Is your mom going to let you go anywhere though?\" I asked.\n\nHe shrugged. \"I don't know. You seem pretty good at convincing her to let me do\nthings though.\"\n\n\"She thinks I'm a good influence or something,\" I said.\n\n*page_break\n\nWe were walking through his neighborhood. I wasn't really sure where we were trying to\ngo though. At least his mom let us go out.\n\n\"You're not going to the hunters lodge anymore are you?\" I asked.\n\n\"No,\" Matthew said.\n\n\"Because your mom won't let you go?\" I asked.\n\nHe shook his head. \"I mean, yeah, she definitely isn't going to let me go anymore. But, that's\nnot why.\"\n\nI eyed him curiously. \"So then what's the real reason you won't go anymore?\"\n\nHe looked away. \"It doesn't matter. I'm not going. And that's all that matters.\"\n\n*page_break\n\nWe ended up deciding to go the mall. It was a pretty nice, if somewhat dull, day. Matthew and I\ndidn't talk much about the party, or what we would be after it.\n\nWe ended up losing track of time, and before we knew it, the sun was setting.\n\n\"I should probably head home soon,\" Matthew said.\n\n\"Yeah, me too.\"\n\nThe mall was less crowded than it had been as we made our way to the entrance.\n\nA ringing sound reached my ears. I froze.\n\n*page_break\n\n\"What is that?\" Matthew asked.\n\nI looked around. Most of the stores were still open. Plenty of people\nwere around. There was no way that thing was in there with us. Too many\npeople would have seen it.\n\nUnless it suddenly decided it didn't care about being seen.\n\n\"Where is it?\" I kept spinning around, taking in everything around me. \"You're\nhere somewhere...\"\n\n\"Uh?\" Matthew looked around too. \"What's going on right now?\"\n\n\"You know that killer?\" I asked. \"The one that murdered those kids. That tried\nto murder me?\"\n\n\"Yeah?\"\n\n\"This bell can detect him,\" I said. \"I accidentally stole a spell book from the Leavitts. It\nshowed me how to make this. Its here.\"\n\nMatthew stared at me for a long time, taking in everything I had said. \"So, wait. You can use magic?\"\n\n\"Sort of.\" I couldn't find it anywhere. And the people walking around nearby weren't freaking out,\nso clearly he wasn't just out of sight. People would notice that thing.\n\n*page_break\n\nI looked up. A walkway was above the two of us. I saw it staring down at me.\n\nI backed away slowly.\n\nMatthew looked up, and saw it too. \"What-\"\n\nIt jumped off the walkway.\n\n*page_break\n\nI stumbled back. Matthew took a step in front of me.\n\nIt fell to the ground. It was heavy enough to send a shock through the ground that\nfelt beneath my feet.\n\nSeveral people were staring at all three of us. I was happy to see a few phones come out. Hopefully\nthe police would respond soon.\n\n*page_break\n\nI looked to Matthew. \"I don't supposed you have a weapon do you?\"\n\n\"What?\" He glanced at me, before focusing back on that thing. \"No! Why would I?\"\n\n\"Just getting hopeful.\"\n\nWe retreated backward as that thing lumbered toward us.\n\n\"Any ideas?\" Matthew asked.\n\nI looked around.\n\n*choice\n\t#Try to find a makeshift weapon in a nearby store.\n\t\t\"Come on!\" I shouted, as I sprinted for a store that seemed to have\n\t\ta lot of equipment for sports.\n\t\t\n\t\tAs soon as we entered I grabbed a bat, and handed it to Matthew. I grabbed\n\t\tone of my own.\n\t\t\n\t\t\"Can we beat him with just bats?\" Matthew asked, watching as the thing rapidly\n\t\tclosed the distance between us.\n\t\t\n\t\t\"I hope so,\" I said.\n\t\t\n\t\t*if (Fighting >= 10)\n\t\t\tWe stood in the door way, clearly waiting for that thing to get in swinging\n\t\t\trange. I mumbled the spell to weaken it under my breath. I was so quiet that\n\t\t\teven Matthew didn't notice me doing anything.\n\t\t\t\n\t\t\tThe thing charged forward with sudden blinding speed. Both Matthew and I ducked\n\t\t\tto the side, narrowly avoiding getting knocked to the ground, before turning\n\t\t\ton it.\n\t\t\t\n\t\t\tWe both lunged forward, striking with as much strength as we could muster.\n\t\t\t\n\t\t\tI found it somewhat difficult to keep up the spell while swinging a bat, but\n\t\t\tmanaged to hold the incantation together.\n\t\t\t\n\t\t\tThat thing flinched under our attacks. It quickly recovered\n\t\t\tand yanked my bat from my hands before turning on Matthew.\n\t\t*if (Fighting \u003c 10)\n\t\t\tThe thing charged forward with blinding speed. Matthew stepped out of the way\n\t\t\tin time, but I got knocked to the ground.\n\t\t\t\n\t\t\tI ineffectually tried to raise my bat up, but it simply tore it from my hands\n\t\t\tbefore turning on Matthew.\n\t\t*comment\n\t\t\n\t\tIt made one huge swing at him. Matthew blocked with his bat, but it was shattered\n\t\tin his hand.\n\t\t\n\t\tHe was knocked back, but managed to keep his footing regardless.\n\t\t\n\t\tI struggled to my feet before making a move for the door. \"Come on! Follow\n\t\tme to the second floor.\"\n\t\t\n\t\t\"What?\" Matthew asked. \"Why the second floor?\"\n\t\t\n\t\t\"We can't just run,\" I said.\n\t\t\n\t\tThat thing had followed us into a mall, blatantly attacking us in the open. It wasn't\n\t\tgoing to leave. I had a spell I could use to make it vulnerable. All I needed was for the\n\t\tpolice to show up and shoot that thing.\n\t\t\n\t\t*goto AfterFirstTest\n\t#Run upstairs.\n\t\t\"Let's head upstairs!\" I shouted.\n\t\t\n\t\t\"What?\" Matthew asked. \"Why?\"\n\t\t\n\t\t\"We can't just run,\" I said.\n\t\t\n\t\tThat thing had followed us into a mall, blatantly attacking us in the open. It wasn't\n\t\tgoing to leave. I had a spell I could use to make it vulnerable. All I needed was for the\n\t\tpolice to show up and shoot that thing.\n\t\t\n\t\t*goto AfterFirstTest\n*comment\n\n*label AfterFirstTest\n\n*page_break\n\nWe sprinted to a set of escalators. That thing was headed toward us.\n\nWe rushed up the already moving steps. When I reached the top I smashed my fist down\non a button labeled, 'emergency shut off'\n\n\"Alright?\" Matthew asked. \"What now?\"\n\nI looked around.\n\nI noticed a security guard emerge from a nearby doorway. The doorway led into a hidden back\narea of the mall.\n\nI glanced at Matthew. \"Let's lead him back there.\"\n\n\"Will we have anywhere to run to back there?\" he asked.\n\n\"I hope so.\"\n\n*page_break\n\n\"H-hey!\" The security guard made a feeble attempt to grab at us as we rushed past him.\n\n\"Sorry!\" I shouted behind me. \"Also, you might want to run.\"\n\nJust before Matthew slammed the door shut behind us, I saw that thing knock the security guard to the side\nwhile coming for us.\n\n\"Can we lock that door?\" I looked at Matthew, and saw him on the phone. \"Who are you calling? The police\nare definitely already on the way!\"\n\n\"My mom,\" he said.\n\nI threw my hands up. \"Why are you calling her!?\"\n\n\"This seems like her thing, hold on, it's ringing.\"\n\nThat thing smashed against the doorway from outside.\n\n*page_break\n\nI took a quick look around. There wasn't much in that back area. Just a few boxes here and there. The\nhallway stretched down the entire length of the mall. I guessed there would be another door further\ndown.\n\n\"I think this is just a short cut for getting across the mall quickly,\" I said.\n\n\"Open the door,\" it spoke from the other side of the doorway.\n\nMatthew hung up. \"Think it'll hold?\"\n\nA heavy force struck the door again. I felt the wall and floor shake.\n\n\"It is made out of metal,\" I said.\n\n*page_break\n\n\"You are a disgrace.\" The door was struck again. A dent appeared in it.\n\nMatthew and I shared a look.\n\n\"It was easy before.\" The door was struck again. \"You have the courage to throw\nstones when there's no risk to yourself.\"\n\nI raised a brow. [i]He knows about that?[/i]\n\n\"But the moment a real threat appears you show your true colors.\" The door bent slightly\nfrom the next blow. \"You are a pretender. You bring shame to your supposed profession.\"\n\nWe backed away.\n\n\"You are a disappointment.\" The door nearly broke open. \"Your friends think you are\nweak. Your own mother considers you a disappointment.\"\n\nI started to move down the hall, I signalled to Matthew to do the same, but found him\nstaring at the door.\n\n\"Matthew,\" it said. \"You wanted to be a hunter. You went to play with some weapons as if they were toys.\"\n\n*page_break\n\nOne final strike broke the door open. \"This was just a game to you.\" It stepped through\nthe doorway. \"You never had what it took to be a hunter. You are a joke.\"\n\n\"Shut up!\" Matthew shouted back. \"I made a bad decision, that's it... that lodge, it wasn't-\"\n\n\"Stop making excuses.\" It walked forward. \"Stop pretending that you can be something more than\nthis.\"\n\nMatthew's body tensed. He was about to attack.\n\n\"More than some small minded bigot. Your hatred was irrational. It was misdirected. You\ncould not tell the difference between the real monsters and mere creatures.\"\n\nMatthew rushed forward. That thing planted its fist directly into his stomach.\n\nHe crumpled to the ground immediately.\n\n\"You are nothing.\" He grabbed Matthew by the neck and lifted him up. \"You will die. Your friend\nwill die. Your mother will be glad that you d-\"\n\nA blade shot through its chest. \"Don't put words in my mouth.\"\n\n*page_break\n\nIt was an unusually long dagger. The metal was mostly black, but the blade had a red colored\nedge.\n\nA woman stood behind it.\n\n\"Mrs. Rowe?\" I stared. [i]How did she get here so fast.[/i]\n\nIt dropped Matthew. She slowly withdrew the blade.\n\nIt fell to its knees.\n\nI suddenly remembered the incantation, but before I could speak it the creature collapsed.\n\nMrs. Rowe lowered down, and checked the thing's body. \"It's dead. Good riddance.\"\n\n[i]How did she hurt it without a spell?[/i]\n\nI stared at her weapon. It was a long dagger of some kind. The material looked so strange.\n\n*page_break\n\nMatthew rubbed his throat. \"Mom?\"\n\n\"You act like you're surprised to see me,\" she said. \"You did call me.\"\n\nHe rose to his feet. \"Yeah, I just didn't think-\"\n\nHis mom all but slammed into him. She was hugging him.\n\n\"I'm glad your safe.\"\n\n*page_break\n\nThe three of us waited in front of the mall.\nSeveral police cruisers were parked out front. Matthew's mom was on the phone with someone.\nMatthew and I sat on the curb. According to Matthew himself, she was talking to her boss.\n\nApparently hunters had some sort of bureaucracy they had to go through after killing something.\n\nWell... 'real' hunters. As Mrs. Rowe has put it.\n\n\"Alright, I'll call you later.\" She hung up.\n\n\"So, seriously,\" I said. \"How did you get here so fast?\"\n\nShe smirked. \"Trade secret.\"\n\nI laughed. Matthew didn't.\n\nI watched him carefully. He looked troubled.\n\n*page_break\n\n\"You angry at how close of a call it was?\"\n\nI wasn't sure how to word the question, 'are you mad you got your ass kicked with almost zero effort on that thing's part?'\n\n\"No,\" he said coldly.\n\nMrs. Rowe frowned at him.\n\n\"Uh...\" I looked Mrs. Rowe for a moment. What I was about to say seemed like something I\nshould keep between us, but...\n\nHe raised a brow at me.\n\n\"That thing was saying some things before she showed up,\" I said.\n\n\"So?\" Matthew said, a little too defensively.\n\n*page_break\n\nMrs. Rowe and I shared a look. I wasn't sure how much of that thing's talk she had heard.\n\n\"You don't actually believe any of it do you?\" I asked.\n\nHis response was a little too slow. \"No.\"\n\nIt was one of those odd things. A slight pause would have just been a slight pause to most\npeople, but I'd known him for years. There was something more there.\n\n\"Matthew.\" Mrs. Rowe approached him. \"I wasn't... angry... exactly. I was just-\"\n\n\"Disappointed.\" Matthew stood up. \"In me. I know.\"\n\n*page_break\n\nI wasn't present when Mrs. Rowe spoke to Matthew after the incident at the hunters lodge. I don't know what was said.\n\nHowever, it looked like Matthew took it personally.\n\n\"Matthew...\" I tried to think of something to say.\n\n\"I'll see you at home,\" Matthew said to his mother in passing.\n\nShe started to follow him. \"Matthew-\" But was stopped by one of the officers present.\n\n\"Ma'am, your representative arrived at the station,\" the officer said. \"We'll need you\nto come down for a statement.\"\n\nMrs. Rowe looked conflicted between following her son, and going with the officer.\n\n\"I'll talk to him,\" I said. \"You go on.\"\n\nShe hesitated for a moment, before nodding at me.\n\n*page_break\n\nI had to sprint to catch up with Matthew. He wasn't exactly running home or anything, but he was\nmoving at a solid enough clip that losing sight of him was a very real possibility.\n\n\"Matthew! I-I, uh... Whew.\" I was a bit out of breath. \"Hold up.\"\n\nHe didn't. He kept moving at the exact pace he had been going.\n\nAt least it was just a power walk. He would have lost me if it had even been a mere jog.\n\n\"Hey... man.\" I suddenly realized I had basically nothing to say to him. There wasn't really\nany one thing I could say to magically make him feel better.\n\nMatthew sighed, and just barely slowed down for me. \"Hey.\"\n\n[i]That's progress. Sort of.[/i]\n\n*page_break\n\n\"She's doesn't think that,\" I said.\n\n\"What?\" Matthew glanced at me.\n\n\"That you're a disappointment.\"\n\n\"How would you know?\" he asked.\n\nI wouldn't. Not really.\n\n\"I've gotten a pretty good feel for her personality. I think.\" I nodded to myself, trying to figure\nout where I was going with this. \"She's your mom. She's not going to think anything bad about you.\"\n\nMatthew scowled. I could tell he had a remark on the tip of his tongue.\n\n\"Look. Whatever you do. Whatever you say when she comes home tonight... don't let it end\non this note. Don't just walk away.\"\n\nMatthew watched me, but still said nothing.\n\n\"You two need to talk,\" I said. \"Just... clear the air. You know?\"\n\nMatthew begrudgingly nodded. \"Yeah. Alright.\"\n\nI nodded. \"Good. It's getting a bit late. I should probably head home.\"\n\n\"Wasn't your mom going to pick you up from the mall?\" he asked.\n\nI stopped in my tracks.\n\n*page_break\n\nThe police had called her and explained the situation. Specifically, they told her that I had\nbeen attacked by that murderer. Again.\n\nShe had probably arrived at the mall by now and noticed I was gone.\n\nI hastily waved Matthew goodbye before taking off toward the mall. \"I'll see you later, man!\"\n\n*page_break\n\nSo, my mom was beyond pissed to say the least.\n\nBut, you know, 'I'm so glad your safe, etc.'\n\nIt was fine in the end.\n\nThe days passed quickly after that. I didn't pry too much into Matthew's situation. He was still\ncoming to the Halloween party. I took that as a sign things at least hadn't gone too badly with\nher.\n\n*page_break\n\nAnd finally, the night came. I stood waiting by the front gate. Car after car passed by. I didn't\nrecognize any of them, though I quickly realized I had no idea what Mrs. Rowe's car looked like.\n\nIt was an odd thing, considering how long I'd known Matthew. I was sure I had seen it before.\n\nI guess I just never committed it to memory.\n\n\"Hey, man.\"\n\nI flinched and spun around.\n\nMatthew stood behind me, dressed in surprisingly formal clothing. Black suit, black tie.\n\nIt didn't totally match the Halloween vibe the party was going for, but he looked good\nregardless.\n\n\"Didn't see us pass you?\" he asked.\n\nI smiled. \"I guess not.\"\n\n*page_break\n\n\"Oh! You two finally got together!\" My mom repeatedly took photos of Matthew and I standing next\nto each other.\n\n\"'Finally'?\" Matthew asked.\n\n\"Yeah...\" She snapped a few more pictures before putting the camera away. \"I was 'this' close to\nthinking ${He} had moved on to Elizabeth.\"\n\n\"Right...\" I led Matthew toward the dining hall. \"Let's just get going.\"\n\n*page_break\n\nThe part was mainly happening in the dining room, but Matthew and I didn't spend much time in there.\n\nInstead, we wandered the garden the Leavitts had out back. It was a pleasant way to spend an evening.\n\n\"Matthew... not to kill the moment or anything, but you and your-\"\n\n\"We're better. Mostly.\" He smiled at me. \"I've got you to thank for that. If you hadn't said what you said...\"\n\n\"I'm glad,\" I said.\n\n\"I'm sorry we didn't get a chance to talk much during the last week or so,\" Matthew said. \"Especially\nconsidering you asked me out.\"\n\nI shrugged. \"It's alright. You're here now, right?\"\n\n\"I'm looking forward to making up for lost time,\" he said.\n\nI raised a brow at him. \"How do you m-\"\n\n*page_break\n\nHe suddenly leaned forward and kissed me.\n\nIt caught me off guard for a moment, before I returned it.\n\nI distinctly heard a picture being taken nearby, and my mom excitedly talking to\nsomebody.\n\nI suppressed a sigh as Matthew pulled away.\n\n*page_break\n\n\"We had a couple of close calls...\" Matthew said. \"But I'm glad things turned\nout the way they did.\"\n\nI smiled. \"It all worked out in the end.\"\n\n*goto_scene ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "notechoices": "\n\n\n\n\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit the wolf camp\n\t\t\t\t\n\t\t\t\t*gosub_scene subRoxanne\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit Damien\n\t\t\t\t\n\t\t\t\t*gosub_scene subDamien\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n\n\n\n\n\n...........................................................................................................................\n\n\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n\n\n\n\n.................................................................................................................\n\n*page_break\n\nSorry. The next file is still under construction.\n\nYell at the writer to get a leg on!\n(╯°□°)╯︵ ┻━┻\n\n*page_break\n\n*goto_scene ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobereighteenth": "\n\n\n[i]Today is October 18th, Saturday.[/i]\n\n\n\n\n*page_break\n\n\nIt was still out there, somewhere. That thing could one day return, and the previous night\nhad only gone to show just how vulnerable I was.\n\nIf Damien hadn't intervened, that would have been the end for me.\n\nI woke up, took a quick shower, and grabbed the black book.\n\nI would find something I could use to protect myself, and kill that thing.\n\n*page_break\n\nI wouldn't be caught off guard again.\n\n*page_break\n\nTo my disappointment, I found a noticeable lack of spells with offensive capabilities. Which\nwas to say, there were none at all.\n\nNot a single spell in that book contained a way to cause harm to anther person or creature.\n\nThere were defensive spells, but they weren't really something I could use to kill anything.\n\nRegardless, they were all I had.\n\n*page_break\n\n'Aberrations Bane' seemed like the most fitting spell to focus on.\n\n*page_break\n\n'In my research, I am at times forced to encounter twisted and deranged creatures.\nWhen these times come, preparation for the meeting is key. Such creatures are not\nalways dangerous, but the risk is always present. Especially when dealing with an\nunknown being.'\n\n'As such, I researched a pattern specifically to use against them. This spell,\nwhen applied properly, will generate an aura that deteriorates an aberration's spirit, weakening them.\nEven near-invincible creatures will become vulnerable to mortal weaponry.'\n\n'Unfortunately, the spell does little to weaken such a being's combat prowess, and\nthus they still pose a threat. Quick use of a blade or gun while channeling the spell\nis highly recommended.'\n\n*page_break\n\nIt was good enough for me.\n\nTo my surprise, the spell had no illustration to go with it. There was no circle or rune pattern.\n\nThere was only an invocation. it was split into two parts. The first part only had to be said\nonce, and initiated the spell.\n\nThe second part however, had to be spoken continuously. As long as I was saying it, the spell would\nremain. If I faltered or misspoke, the spell would break, and I'd have to restart it. \n\n*page_break\n\nI didn't want to have to rely on looking at a sheet of paper, particularly seeing as I could get attacked at\nany time. So, I took to memorizing it.\n\nI spent the entire day speaking the spell again and again.\n\n*page_break\n\nAs the day wore on, my mother eventually returned.\n\n\"Hey, honey.\" She walked into my room, and looked around. \"Is someone else here?\"\n\nI raised a brow at her. \"What? No.\"\n\n\"Oh, I thought I heard you talking.\"\n\nI smiled sheepishly. Uh... don't worry about it.\"\n\n*page_break\n\nMy mother shut the door, walked over, and sat down on my bed. \"How are you holding up?\"\n\n*fake_choice\n\t#\"I'm fine.\"\n\t\t\n\t\tMom frowned at me. \"Are you sure about that?\"\n\t\t\n\t\t\"Yes.\" I wasn't going to lose.\n\t\t\n\t\t\"It's okay to admit it, if you're afraid,\" she said.\n\t\t\n\t\t\"I'm not,\" That thing wouldn't get the drop on me again. \"We've got the police outside.\n\t\tI've got Damien watching my back.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tAnd I've got an ace up my sleeve. Things will turn out differently next time.\n\t\t\n\t\t*page_break\n\t\t\n\t\tMy mom gave me a weak smile. \"Okay.\"\n\t\t\n\t#\"A lot happened, but I'll be alright.\"\n\t\t\n\t\tShe smiled at me, before hugging me. \"I'm glad to hear it.\"\n\t\t\n\t\tI hugged her back. \"It's all going to work out.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t[i]Because I'm going to kill that bastard.[/i]\n\t\t\n\t#\"Not really.\"\n\t\t\n\t\tShe put a hand on my shoulder. \"Do you want to talk about it?\"\n\t\t\n\t\tI sighed. \"Not really. No.\"\n\t\t\n\t\tShe hugged me. \"It's going to be all right, honey.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tIt wasn't going to be 'all right', until that thing was dead.\n*comment\n\nThe rest of the evening came and went without incident. I quietly practiced by myself.\n\n*page_break\n\n*goto_scene octoberNineteenth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobereighth": "\n\n\n\n[i]Today is October 8th, Wednesday.[/i]\n\n*page_break\n\n\"Okay,\" Elizabeth nervously spoke to someone on her phone. \"Let's meet at\nschool, alright?\" She quickly rushed passed the front gate. \"It's going to be fine,\nRoxanne. Just stay calm.\"\n\nI raised a brow at Elizabeth as she disappeared into the distance.\n\n*page_break\n\nMatthew waited for me by the school's front door.\n\n\"Hey, man.\" I walked over to him. \"What's up?\"\n\nMatthew looked disturbed. \"Didn't you hear?\"\n\n\"Huh?\"\n\n\"Daniel is dead. So are a few other people.\"\n\n\"What!?\" I stared in shock. \"What happened?\"\n\nMatthew shook his head. \"It just happened last night, but... they think he and his friends\nwere murdered.\"\n\n\"How?\" I asked. \"By who?\"\n\nHe shrugged. \"I don't know that much yet. I'll see what other people in school know.\"\n\nI nodded. \"Alright.\"\n\nThe bell rang.\n\n\"We'd better get going,\" I said.\n\n*page_break\n\nThe day passed quickly. The hallways were filled with rumors about the deaths.\n\nEverybody had a different story to tell.\n\nThey were found shot. They were butchered. They were all somehow hit by a drunk driver.\n\nThe crime scene was unbelievably bloody. The bodies didn't have a scratch on them.\n\nThere was only one detail the remained uniform across them.\n\n*page_break\n\n\"They died in front of your house!\" Matthew shouted in Roxanne's face. \"How long were they\nlying out there before-\"\n\n\"Shut up!\" Roxanne snarled at Matthew as she stepped up to him. \"My family didn't do anything.\"\n\n\"Then what happened? Why them?\" Matthew asked. \"Your werewolf family attacked them didn't they?\"\n\nI blinked. \"Roxanne's a werewolf?\"\n\nShe and Matthew looked at me before returning to their argument.\n\n\"I told you, my family didn't do anything,\" she said.\n\nMatthew scoffed. \"They said those kids were carrying spray paint with them. You sure you didn't\nget really angry when they showed up to vandalise your house?\"\n\n\"She wouldn't do that.\" Elizabeth approached the two. \"Roxanne wouldn't kill anybody over something\nthat stupid.\"\n\n*page_break\n\nFive kids dead in front of Roxanne's house.\n\nThey had spray paint.\n\nI already knew Daniel was up to something. They were probably there to deface her house.\n\nThe question was, would Roxanne or her family really kill them for that?\n\nAnd if not her, then who?\n\n\"Of course you'd be on her side.\" Matthew scowled at Elizabeth. \"You people always stick together,\neven when your own kind does something horrific.\"\n\n\"Oh, please!\" Elizabeth shouted. \"You're the one throwing baseless accusations around!\"\n\n*page_break\n\nI closed my eyes, and took a deep breath.\n\nThe situation looked bad.\n\n*page_break\n\nFive kids dead in front of Roxanne's house.\n\nThey had spray paint.\n\nDid Roxanne or her family really kill them?\n\n*fake_choice\n\t#Maybe it was Roxanne. She's got a bit of a temper. Maybe it just got out of hand. Matthew's got the right idea here.\n\t\t*set Matthew + 20\n\t\t*set Roxy - 20\n\t\t*set Elizabeth - 10\n\t\t\n\t\t\"Roxanne,\" I said. \"I'm not saying you meant to kill them.\"\n\t\t\n\t\tShe shot a glare at me.\n\t\t\n\t\t\"I'm just saying... maybe a fight got out of hand? You saw them coming, confronted them-\"\n\t\t\n\t\t\"I didn't see them out there until hours after they died!\" She shouted. \"I didn't do anything!\"\n\t\t\n\t\t\"Then maybe your family-\"\n\t\t\n\t\tRoxanne shoved me back. She was quite a bit stronger than she looked, and I immediately lost\n\t\tmy balance and tumbled across the ground.\n\t\t\n\t\t\"This is what I'm talking about,\" Matthew said. \"Just a little confrontation, and those animal\n\t\tinstincts come out.\"\n\t\t\n\t\t\"She's not an animal,\" Elizabeth said.\n\t\t\n\t\t*page_break\n\t\t\n\t\tAn announcement played over the loudspeakers. \"Roxanne Gray, please report to the main office.\"\n\t\t\n\t\tRoxanne huffed, before storming away.\n\t\t\n\t\tMatthew helped me back to my feet.\n\t\t\n\t\tI watched Elizabeth follow her friend.\n\t\t\n\t#Elizabeth doesn't seem to think Roxanne would be capable of it. I trust her judgement.\n\t\t*set Elizabeth + 20\n\t\t*set Roxy + 10\n\t\t*set Matthew - 10\n\t\t\n\t\t\"I don't know Roxanne very well,\" I said. \"But I do know Elizabeth.\"\n\t\t\n\t\tElizabeth shot a curious glance my way.\n\t\t\n\t\t\"If she doesn't think Roxanne did anything, then I believe her.\"\n\t\t\n\t\t\"How would she know?\" Matthew asked. \"She wasn't there.\"\n\t\t\n\t\tI rolled my eyes. \"Neither were you.\"\n\t\t\n\t\tMatthew crossed his arms with a huff. \"Whatever.\" He walked away.\n\t\t\n\t\tElizabeth smiled at me. \"Thanks.\"\n\t\t\n\t\tI shrugged.\n\t\t\n\t\t*page_break\n\t\t\n\t\tAn announcement played over the loudspeakers. \"Roxanne Gray, please report to the main office.\"\n\t\t\n\t\tRoxanne shared a nervous glance with Elizabeth. They left together.\n\t\t\n\t#Roxanne and I may not get along very well, but I don't think she'd do this.\n\t\t*set Roxy + 20\n\t\t*set Elizabeth + 10\n\t\t*set Matthew - 10\n\t\t\n\t\t\"I don't think you're on the right track here,\" I said.\n\t\t\n\t\tMatthew raised a brow at me.\n\t\t\n\t\t\"Roxanne might be a little hot-headed sometimes, but... I don't think\n\t\tshe'd kill anybody.\"\n\t\t\n\t\t\"You can't know that,\" Matthew said.\n\t\t\n\t\t\"She never tried to hurt me,\" I said. \"Even after what I tried to do to\n\t\tElizabeth.\"\n\t\t\n\t\t\"You're actually taking my side?\" Roxanne asked.\n\t\t\n\t\t\"I'm just giving my honest opinion,\" I said.\n\t\t\n\t\t*page_break\n\t\t\n\t\tAn announcement played over the loudspeakers. \"Roxanne Gray, please report to the main office.\"\n\t\t\n\t\t\"Well,\" Roxanne sighed. \"Thanks, $!{Name}. I guess.\" She left with Elizabeth.\n\t\t\n\t\tMatthew watched them walk away. \"Do you really believe she didn't do anything?\"\n\t\t\n\t\t\"Call it intuition,\" I said.\n\t\t\n\t#People died. And here we are. Squabbling. Honestly it's pissing me off.\n\t\t*set Roxy + 10\n\t\t*set Elizabeth + 10\n\t\t*set Matthew + 10\n\t\t\n\t\t\"I didn't even know that kid!\"\n\t\t\n\t\tI rubbed the back of my neck. \"Will...\"\n\t\t\n\t\t\"Well then, wouldn't that just make it easier for you?\"\n\t\t\n\t\tMy features hardened. \"...you all...\"\n\t\t\n\t\t\"You humans are all the same. You always think our kind is violent.\"\n\t\t\n\t\tMy brows furrowed. \"Just...\"\n\t\t\n\t\t\"The only reason we're like that is-\"\n\t\t\n\t\t\"Shut the [i]fuck[/i] up!\" My face contorted into snarl. \"People have died!\"\n\t\t\n\t\tThey stared at me.\n\t\t\n\t\t\"Five people. all around our age. Dead. And here you all are, arguing like freaking\n\t\tchildren! I've been listening to the rumors and stories flying around the halls,\n\t\tand you know what I've heard?\" I asked. \"Gossip. Every story is different. I don't\n\t\tknow what happened to those kids.\" I glared at Matthew. \"And neither do you.\"\n\t\t\n\t\tI sighed. \"And neither does anyone else. This shouting and arguing isn't helping. If you're mad\n\t\tthat people died, show them some respect.\" I looked at Matthew. \"Let it go until the facts come out,\n\t\tyou're not a cop.\" I looked at Roxanne. \"Calm. Down. You getting defensive looks really\n\t\tbad. You're only hurting yourself getting into a screaming match.\"\n\t\t\n\t\tI let out a deep breath.\n\t\t\n\t\tThey kept staring.\n\t\t\n\t\t*page_break\n\t\t\n\t\tAn announcement played over the loudspeakers. \"Roxanne Gray, please report to the main office.\"\n\t\t\n\t\tRoxanne and Elizabeth silently left.\n\t\t\n\t\tMatthew looked like he wanted to say something. He wandered off instead.\n\t\t\n*comment\n\n*page_break\n\nI couldn't wait for the school day to end.\n\n*page_break\n\nAnd when it did, I had a thought.\n\nRoxanne was preoccupied. She had far worse problems to deal with, than worrying about me\nfinding the gate.\n\nIt was cynical, but I had no chance of being seen if I tried to go through.\n\nI made a break for the woods.\n\n*page_break\n\n...Before remembering everything I needed to open the gate was still in my room back home.\n\n*page_break\n\nI flung the door to the guest house open, and rushed by my mother.\n\n\"Honey, I heard some-\"\n\n\"Hi just grabbing some stuff from my room I'll see you later bye!\"\n\n\"W-wait! Honey!\"\n\nI slammed the door behind me, springing away from the Leavitt manor and into the nearby forest.\n\n*page_break\n\nThe woodland felt unfamiliar to walk through. I still hadn't gotten a feel for\nthe lay of the land, but at the same time, I was confident I was headed in the right direction.\n\nMaybe I remembered the forest better than I remembered.\n\nOr, maybe that rock was still guiding me toward the gate.\n\nI stumbled across the clearing. A familiar pair of crossed trees stood in the center of it.\n\nI pulled the black book out of my bag, and the seed from my pocket. The seed, despite being nearly a week\nold, was still holding up quite well.\n\nI sat down between the two trees, and flipped the book open to the appropriate page.\n\nI set the seed on the ground.\n\n[i]Seed. Check.[/i]\n\nI set the book on the ground, and opened it to a page illustrating a circle and symbols.\n\n[i]Magic thingie. Check.[/i]\n\nI read over a long series of words that were beyond my understanding.\n\n[i]Dumb incantation. Check.[/i]\n\nI skimmed over the instructions one last time. The book didn't say what to do with the seed.\n\nI shrugged, and just tried laying it on the book's drawing of the circle.\n\nIt was how everything else in that book worked.\n\n*page_break\n\nI spoke a long line of words. It didn't take as long as the bell did, but it was still much\nlonger than most other incantations from the book.\n\nThe moment I finished the air clicked.\n\nI looked around.\n\n*page_break\n\nThe forest looked... exactly the same.\n\nI stood up.\n\nNothing had changed at all.\n\nI grabbed the book and seed.\n\n*page_break\n\nSince nothing seemed to happen, I took that as a sure sign the spell had gone off without a hitch.\n\n*page_break\n\nThe only question was... where to go?\n\nThe clearing looked the same, and there was no sign of civilization anywhere near me.\n\nI shrugged, and walked in a random direction.\n\n*page_break\n\nI didn't pick up on it right away, but the forest did seem different. The clearing and its two\ntrees were unchanged, but everything beyond them was slightly different.\n\nThe natural paths I had been following through the woods were either different or completely gone.\nI was in a different forest. It made me wish I had been paying more attention to the forest on my\nside. If I had, I might have had a better idea of just how much different the new forest was.\n\nThere was one thing I was nervous about. I didn't know what would happen if I got lost.\n\nThere was no guarantee I'd ever run into a town if I just kept walking in a random direction.\nI made a point of moving in a straight line. Worse case scenario, I'd find nothing and have to\ngo back to the tree gate.\n\n*page_break\n\nEventually I stumbled onto a dirt road.\n\nWhether I went left or right, the road twisted away from my line of sight. I didn't know which way led\nto a town, assuming there even was one.\n\nI looked back to the woods. If I tried to follow the road, I'd lose track of the clearing, unless I had a\nway to remember this specific section of road.\n\nI walked back to the forest's edge, and approached one of the trees. I found a weak spot in the bark, and tore\naway at it until a large section of it was missing.\n\nWhen it was time to go back, I'd just look for that tree.\n\n*page_break\n\nI turned around to see an older man walking down the road toward me.\n\nA weight dropped into my stomach. This was it. First contact.\n\nThat man definitely wasn't human. Probably. And even if he was, he was probably\npretty heavily involved in the monsters society.\n\nI took a deep breath, and approached him.\n\nIf I was lucky, the monster population would be large, and I wouldn't look out of place.\n\nIf not, he'd know I didn't belong.\n\n*page_break\n\n\"Not from around here, are ya?\" he asked.\n\n[i]Dammit![/i]\n\nThe guy looked old, but he was in amazing shape. I could see muscles brimming through his\nwhite shirt. His arms and legs were thick and meaty.\n\n\"Uh, yeah.\" I laughed nervously. \"It's actually my first time here. I don't suppose you could\ntell me where the nearest...\"\n\n[i]Town? Village?[/i]\n\n[i]...Lair?[/i]\n\nHe eyed me curiously. \"Pack's roaming grounds are this way. I suppose it wouldn't be neighbourly\nto leave you wandering blind.\"\n\nI smiled. \"Thanks.\"\n\n*page_break\n\nWe continued along the dirt road to the left of the tree I marred. The walk was mostly silent.\nI had been trying so hard to cross the gate, and suddenly I couldn't think of any questions to ask\nto one of the creatures beyond it.\n\nNot that it matter. I'm not sure what questions I could have asked that wouldn't give me away instantly.\n\n*page_break\n\n\"So.\" The old man said. \"How'd a human get out here?\"\n\nI paled. \"Um...\" I smiled sheepishly.\n\n*fake_choice\n\t#\"I'm not human.\"\n\t\t\n\t\tHe shot me a tired look. \"Hmm...\"\n\t\t\n\t\t\"Really.\"\n\t\t\n\t\tHe looked ahead, and just kept wal
