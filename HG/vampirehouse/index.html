<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Vampire House — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "vampirehouse", "title": "The Vampire House", "scenes": {"choicescript_description": "Human/monster romance at its finest! Overcome species diversity. Meet new and exciting creatures. Learn to cast spells. Train to fight monsters. Study to improve your grades in school!\n\n[i]The Vampire House[/i] is a 85,000-word interactive novel by Jesse Freeman. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n• Experience a world filled with monsters.\n• Study an occult text.\n• Romance various monsters and demons.\n• Develop your athletic prowess, or become a bookworm.", "choicescript_stats": "Cash: ${Cash}\n\nElizabeth Events: ${ElizabethEvents}/6\n*line_break\n*if (KnowsRoxy = 1)\n\tRoxanne Events: ${RoxyEvents}/6\n\t*line_break\n*if (KnowsMalka = 1)\n\tMalka Events: ${MalkaEvents}/6\n\t*line_break\nMatthewEvents: ${MatthewEvents}/6\n*line_break\n*if (KnowsDamien = 1)\n\tDamienEvents: ${DamienEvents}/6\n*comment\n\nGrade:\n*if (Studies \u003c 80)\n\tC\n*if (Studies >= 80) and (Studies \u003c 90)\n\tB\n*if (Studies >= 90) and (Studies \u003c 100)\n\tA\n*if (Studies >= 100)\n\tA+\n*comment\n\nFitness:\n*if (Athletics \u003c 40)\n\tBad\n*if (Athletics >= 40) and (Athletics \u003c 50)\n\tPoor\n*if (Athletics >= 50) and (Athletics \u003c 60)\n\tAverage\n*if (Athletics >= 60) and (Athletics \u003c 70)\n\tDecent\n*if (Athletics >= 70) and (Athletics \u003c 80)\n\tGood\n*if (Athletics >= 80)\n\tAmazing\n*comment\n\n*if (Fighting != 0)\n\tHunting:\n\t*if (Fighting \u003c 10)\n\t\tUnskilled\n\t*if (Fighting >= 10) and (Fighting \u003c 40)\n\t\tBeginner\n\t*if (Fighting >= 40) and (Fighting \u003c 50)\n\t\tAmateur\n\t*if (Fighting >= 50) and (Fighting \u003c 70)\n\t\tMediocre\n\t*if (Fighting >= 70) and (Fighting \u003c 90)\n\t\tSkilled\n\t*if (Fighting >= 90) and (Fighting \u003c 100)\n\t\tAdept\n\t*if (Fighting >= 100)\n\t\tProfessional\n*comment\n\n\nStyle:\n*if (WearsPlain = 1)\n\tPlain\n*if (WearsGoth = 1)\n\tGoth\n*if (WearsStylish = 1)\n\tYes\n*comment\n\n\nSkills:\n*line_break\n*if (EasyStudy = 1)\n\tEasy Studying\n\t*line_break\n*if (Empathy = 1)\n\tEmpathy\n\t*line_break\n*if (Charm = 1)\n\tCharm\n\t*line_break\n*if (Sneak = 1)\n\tSneak\n\t*line_break\n*if (SkipRead = 1)\n\tSkip Read\n\t*line_break\n*comment\n\n\nBooks:\n*line_break\n*if (SecretsToStudying = 1)\n\tSecrets to Studying Success\n*if (SecretsToStudying = 2)\n\tComplete - Secrets to Studying Success\n*line_break\n*if (EmpathyAndMannerisms = 2)\n\tComplete - The Guide to Empathy and Mannerisms.\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove advertising[/b]\n  \n  Remove in-game advertisements.  \n  \n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove advertising[/b]\n  \n  You've paid to remove in-game advertisements.\n", "damienend": "\n\n\n\n\n\n\n\nDamien...\n\nOut of every person I know, I think we had the least amount of drama.\n\nHe was a cool guy. He did his best to show me around El Abrigo. Not to mention\nhe saved me from getting diced by... whatever that thing had been in the abandoned\nhouse.\n\nAnd from the killer.\n\nHe had been a lot busier lately, due to the killers presence. I didn't understand what his job\nwas exactly, but it was clear he was working with the police.\n\nI wondered if that was a normal thing. Some monsters were extremely dangerous. The police couldn't\nbe expected to go toe-to-toe with anything and everything.\n\nHe was a specialist. Someone who protected the public.\n\nI respected that.\n\n*page_break\n\nI made my way to El Abrigo, though I had no real clue where he was. The best I could do was\ngo to the manor and hope he was there.\n\nAnd if he wasn't, well... hopefully somebody could direct me to him.\n\n*page_break\n\nThe streets were absolutely packed. It wasn't exactly a small town of course, but I had never seen so\nmany bodies around, nor did they ever seem so excited. I guessed everybody was gearing up for the Halloween\ncelebration.\n\nThe week long holiday hadn't actually arrived yet, but it looked like everyone was ready\nfor it.\n\n\"Man...\" I looked around at the various shops. All of them carried more colorful decorations that I was used to seeing.\n\"They really do take Halloween seriously.\" [i]Do they wear costumes over here too?[/i]\n\n*page_break\n\nI approached the front gate. Several guards were stationed in front of it.\n\nDespite all the good will on the streets, rising crime rates were probably a problem with so many more people\naround.\n\n\"Excuse me,\" I said, approaching the nearest guard. \"I'm looking for Damien.\"\n\n\"You can find him inside.\"\n\nI nodded and walked through the front gate. [i]That was lucky. If he had been out in the town, I never\nwould have found him.[/i]\n\n*page_break\n\nDozens of people were in the main hall of Lord Reyes' manor. Decorations were already up, and it looked like\nLord Reyes himself was busy directing people around.\n\nI scanned the crowd for Damien. If he was around, I didn't see him.\n\n*page_break\n\nMy eyes fell on Lord Reyes. He was looking at me.\n\nHe quickly tilted his head back, and mouthed something.\n\nIt looked like, 'garden'.\n\n*page_break\n\nI stared. \"Uh... Oh!\" I waved to Lord Reyes and mouthed a thank you back, before heading out\nto the garden.\n\n*page_break\n\nSure enough, I saw the man himself.\n\nDamien.\n\nGardening.\n\nIn an apron. It had a few pockets in front of it, which were filled with small tools.\n\n*page_break\n\n\"You garden?\" I asked, approaching.\n\nDamien smirked, only glancing my way for a second before returning to a rose bed. \"Of course.\"\n\nI was almost surprised he didn't get embarrassed about it. Then again, he didn't seem like the type\nto feel insecure about something like that.\n\n\"Looks like things are busy around here,\" I said.\n\nHe nodded. \"Yeah... things haven't been much better out on your side.\"\n\nI frowned. \"They're still looking for him, huh?\"\n\n\"Obviously.\" Damien stood up. \"We would have told you if we got him.\"\n\n\"Do they think he's still in the area?\"\n\nDamien opened his mouth, but no words came out. He quickly shut it, like he was mulling over his words.\n\nI raised a brow at him.\n\n\"I'm not really supposed to talk about details like that,\" Damien said. \"It's very need to know.\"\n\n\"Oh.\" I crossed my arms. \"Why?\"\n\n\"Mostly to keep the press away.\" Damien laughed. \"It's better for the police to keep details of\na case to themselves. Makes it a lot easier to arrest the bad guys.\"\n\n\"Can you arrest... 'it'?\"\n\nDamien shrugged. \"Probably not. In fact, I'm pretty sure every officer on that force is going to\nbe shooting on sight. And I don't really blame them.\"\n\n*page_break\n\n[i]Dear lord I let this conversation drift to a really dark place didn't I?[/i]\n\n*page_break\n\n\"So...\" I cleared my throat. \"On a slightly less depressing note. The Leavitt's are holding a Halloween\nparty.\"\n\n\"I heard,\" Damien said.\n\n\"And they've invited both my mother and I.\"\n\nDamien nodded.\n\n\"And... they aren't opposed to me bringing a...\" I mulled the right phrase over in my head.\n\n*fake_choice\n\t#\"Date.\" I might as well cut to the chase.\n\t\t\n\t\tDamien smirked. There was a playful vibe to his features.\n\t\t\n\t\t\"Is that a fact?\" Damien asked.\n\t\t\n\t\tOf course he was going to beat around the bush to screw with me.\n\t\t\n\t\tI nodded. \"Yep. But, uh... I'm not really dating anyone right now.\"\n\t\t\n\t\tDamien crossed his arms. \"Me neither.\"\n\t\t\n\t\t[i]Well, I already knew that. Wait. Did I know that? Come to think of it, I haven't met any of his friends.[/i]\n\t\t\n\t\t\"So... in that case.\" I smiled as cooly and casually as I could. Which I was pretty sure was 'not very'.\n\t\t\"Would you like to go with me?\"\n\t\t\n\t\t\"As... what exactly?\" Damien raised a brow with me. His tone was openly teasing.\n\t\t\n\t\tI took a deep breath. [i]Like a band-aid. Just get it over with quickly.[/i]\n\t\t\n\t\t\"I want you to come to the party as my date,\" I said.\n\t\t\n\t#\"Guest.\" It's nice and neutral. Doesn't really imply anything.\n\t\t\n\t\t\"That's cool,\" Damien said.\n\t\t\n\t\t\"Yeah,\" I said. \"You know, I was actually thinking of asking the person I invited out. You know,\n\t\tmake it a date.\"\n\t\t\n\t\tDamien raised a brow at me. His eyes studied my features closely. \"And you're telling me about this?\"\n\t\t\n\t\tI nodded.\n\t\t\n\t\t\"Are you asking me out?\" Damien asked.\n\t\t\n\t\tI was not expecting that response. He might as well have punched me in the gut.\n\t\t\n\t\tI thought over the best response. Maybe direct was better.\n\t\t\n\t\t\"Yes,\" I said.\n\t\t\n\t\tDamien eyed me closely for a few moments.\n*comment\n\n*page_break\n\n\"Sure,\" Damien said.\n\nI blinked slowly.\n\n\"I'd love to.\" He shot me a broad smile. \"Halloween night? Sounds fun. I'll have to show you around El Abrigo\nduring the celebration too.\"\n\n\"I...\" I smiled. \"Yeah! That sounds great!\"\n\n*page_break\n\nI beamed as I left the manor. Damien followed me, saying his duties in the garden could wait for a while.\n\nWe didn't stray from the packed streets that day. We took in all the sights along with the crowds.\n\nIt was loud, and maybe a little stressful, but it was a good day.\n\n*page_break\n\nThe sun set along the horizon before too long. I was disappointed. I wanted to stay a bit longer.\n\nEl Abrigo was probably quite the sight at night, but it already took me too long to get back to the\ngate. If the sun was setting now, it'd be dark before I could find the trees again.\n\n*page_break\n\nWe walked along a slowly darkening street. The canal ran beside us. Several small boats were going up\nand down it. The streets weren't as packed as they had been, though quite a few people were still coming\nand going.\n\n\"I probably shouldn't stay out much longer,\" I said. \"I might not be able to find my way back if I don't\ngo now.\"\n\nDamien nodded. \"I'll come with you. I've got some work to do on your side tonight anyway.\"\n\n*page_break\n\nTo my surprise, Damien didn't take the dirt road out of El Abrigo to find the crossed trees. He just\nwalked straight into the woods.\n\nI didn't see any trails to follow, but Damien seemed to know where he was going.\n\nUnsurprising, given that he lived\nin El Abrigo. I assumed he knew his way around the local area pretty well.\n\nThe sun had set low enough enough that the woods were noticeable darkened. It was actually getting pretty\nhard to see through the gloom the canopy cast down on us.\n\nStill, Damien seemed pretty confident about where he was going. I didn't see any reason to question his\nsense of direction.\n\n*page_break\n\nI glanced at Damien. [i]I wonder if he has night vision...[/i]\n\nI thought about it for a little while.\n\n\"Do you have-\" A ringing sound reached my ears.\n\nDamien glanced at me. His eyes quickly fell on the bell I wore as a necklace.\n\nI grabbed the bell, ceasing its incessant ringing. It vibrated against my grip.\n\n\"What is that?\" Damien asked.\n\n\"I carved runes into it,\" I said. \"It rings when the killer is nearby.\"\n\nDamien stared at me for several seconds before whipping around. He scanned the forest around us with a\nlook of fierce determination.\n\n*page_break\n\nThe sun was disappearing over the horizon. The forest around us was shrouded in darkness. I couldn't make\nout much. And I certainly didn't see that thing.\n\nThat thing wasn't small. It was hard to believe we hadn't spotted it if it was nearby.\n\n\"Can that bell tell you where it is?\" Damien asked.\n\nI shook my head.\n\n*page_break\n\nSeveral minutes passed and nothing happened. If that thing was nearby, it wasn't showing itself.\n\n\"Okay...\" I looked around. Neither of us had a flash light, and it was nearly pitch black. \"What now?\"\n\nDamien grabbed my shoulder, and started walking.\n\nI raised a brow but said nothing.\n\nFor a while all I heard was the sound of leaves and twigs getting crushed underneath our feet as we moved.\nI could only faintly make out Damien's arm in the darkness.\n\n\"Can you see that?\" Damien asked.\n\nI scanned our surroundings.\n\n*page_break\n\nAhead of us, just past a small thicket of brush, was a tiny orange light.\n\nWordlessly, we crept forward. Our footsteps inevitably crushed leaves and twigs beneath our feet, but\nwe didn't say a word regardless.\n\nI pushed past the brush, with Damien just ahead of me.\n\n*page_break\n\nThe light shone from a wooden trap door built in the ground. It would have looked at home next to a\nhouse. Some sort of outside access to somebody's basement.\n\nBut there was nothing but trees and brush around it. We wouldn't have even seen it if it wasn't for\nthe darkness of the night, and the light shining out from within it.\n\n*page_break\n\nDamien and I shared a look before creeping forward. That bell was still vibrating in my hands, and I wished\nI could just get the thing to shut off.\n\nDamien knelt in front of the trap door, and tilted his head, listening.\n\nI followed suit.\n\n*page_break\n\nSomething wooden creaked slowly.\n\n*page_break\n\nI couldn't make out anything else, but the bell was still trying to ring. It was there.\n\n*page_break\n\nI looked at Damien, about to ask what the plan was, but he had already raised a finger up to his lips.\n\nI nodded silently as he gripped the trapdoor with one hand.\n\nHe pulled the door open painfully slowly. He peeked through the small crack he had made, before suddenly\nyanking the door completely open.\n\nHe stopped the door a moment before it slammed against the dirt surrounding it. He slowly lowered it the rest\nof the way down before releasing it.\n\nWe had barely made any noise at all.\n\n*page_break\n\nA ladder was built into the trapdoor, extending down into a basement of some kind.\n\nThe orange light came from an old light bulb hanging from the ceiling at the bottom of the drop. Wires\nwere rigged into it. The thing looked very makeshift. Like someone had just barely rigged a habitable\nspace together our in the woods.\n\nDamien was the first to start down the ladder.\n\n*page_break\n\nI started to follow. Damien quickly waved to get my attention, and shook his head at me when I looked\nat him.\n\nI scowled at him.\n\nHe shook his head more firmly.\n\nI very silently whispered, 'I know a spell that can hurt him.'\n\nDamien started to shake his head, but stopped.\n\nHe seemed to be mulling it over for a few moments.\n\n*page_break\n\nEventually, I got tired of waiting for his response and started down the ladder.\n\nDamien let out a defeated sigh before continuing the rest of the way down.\n\nThe bottom of the ladder led into a tight tunnel. If that thing was in there\nit must have been a touch fit for it. It's body was so big and bulky, it could probably\nbarely squeeze through.\n\nMore lights were crudely linked into the ceiling. Most looked old, but I noted that the amount of\nlight they were giving off was very uneven.\n\nThey were all different wattages, and I imagined, they had all seen different amounts of use.\n\nI wondered if it had picked the bulbs up from wherever it could find them. Just scavenging for\nits make shift home.\n\nThe tunnel ended at a spacious basement. The walls, floor, and ceiling were all dirt. The place\nlooked more like a cave than a basement.\n\nOr perhaps 'lair' would be a better word.\n\nDamien stopped as soon as he stepped into the room. I tried to look past him, but didn't see\nanything beside several boxes lining the far wall.\n\nHe stared at something just outside my field of view.\n\n*page_break\n\nI tried to creep closer, but he raised his hand up, stopping me.\n\nDamien hunkered down, and slowly moved forward.\n\nHe didn't make a sound. I moved to the end of the tunnel, and peeked out.\n\n*page_break\n\nThat thing worked at a table set against the wall. A rack of tools hung above it.\nAmongst normal tools like a few screw drivers, wrenches, a hammer, I made out a machete and an axe. Both\nwere stained with dried blood.\n\nIt held a cleaver in its hand, and was cutting into something on the table.\n\nIts hands were coated in blood from whatever it was working on.\n\nDamien inched in closer and closer.\n\nI eyed the sharp claws at the end of his fingers. He had them bared.\n\nI was sure he was going to try to tear into that thing.\n\nIf all went well, he'd have it down in a single stroke.\n\nDamien was just about behind it. I could tell he was getting ready to lunge forward.\n\nI held my breath\n\nDamien made his move.\n\n*page_break\n\nThat thing whipped around and slashed Damien across the face so hard it sent him tumbling across the floor.\n\nIt marched up to Damien, grabbed him, lifted him up into the air, and threw him across the room.\n\nA lot of blood was dripping down Damien's face as he shakily got to his feet.\n\nThat thing loudly dropped the cleaver on the table, and pulled the axe off the rack of tools.\n\nDamien was already moving forward, though with no weapon, I wasn't sure what he was hoping to do.\n\n*page_break\n\nDamien leapt forward, before immediately pulling back as that thing took a swing at him.\n\nEvery time it attacked, it took a step forward. If it went on too long, Damien would eventually\nbe backed against the wall.\n\nEventually, Damien moved forward and stayed there. It tried to strike him with the axe, but Damien\ngrabbed the weapon's handle, and yanked it out of that thing's hands.\n\n*page_break\n\nIt backed off toward the table, while Damien got a better grip on the axe. That thing pulled the machete\noff the wall just as Damien rushed forward.\n\nDamien parried its slash with his axe, before clawing into its stomach.\n\nI winced at the sight of insects festering in the thing's fresh wound. Unfortunately, It didn't so much as flinch.\n\nI remembered the spell to weaken it. The practiced words came back to me in an instant.\n\nI began the incantation.\n\n*page_break\n\nI tried to keep my words hushed, but it heard me.\n\nIt turned its head to face me. It was hard to believe that thing could actually see me through that sack, but it\ndefinitely knew I was there.\n\n\"So you've come to me, child?\" It asked.\n\nDamien rushed forward, and buried his axe in that thing's shoulder.\n\nAnd I do mean 'buried'. The axe head was embedded deep enough in its shoulder, Damien probably could have ripped\nthe rest of its arm out away from its torso.\n\nI was kind of hoping he would try.\n\nThe thing let out a barley audible grunt before falling to one knee.\n\n*page_break\n\nDamien grabbed the axe handle with both hands and started pulling.\n\nIt suddenly lunged forward and threw Damien back. He accidentally yanked the axe free when as he was thrown\nback.\n\nI smirked when I saw the creature falter from the suddenly torn open wound.\n\nSaid smirk faded the moment that thing stomped toward me.\n\n*page_break\n\nFor a moment, I froze. I could go forward into the room, or fall back toward the entrance.\n\nI could move behind Damien if I went further in. Damien could attack that thing from behind if\nI fell back.\n\n*page_break\n\nIf I went further in, I'd have nowhere to run to.\n\nIf I went back I still had the option of going up the ladder.\n\n*page_break\n\nExcept that thing was just fast enough to get a hold of me as I was climbing if I tried.\n\n*page_break\n\nIts large, meaty hand grabbed my shoulder.\n\nIt drove the machete through my stomach.\n\n*page_break\n\nI stared down in shock.\n\nI gently wrapped my fingers around the blade, as if to confirm it was actually there.\n\n*page_break\n\nIt tore the blade out of my body.\n\nI screamed as I fell to the ground.\n\nI blacked out for a moment. Something was happening nearby, I could hear it.\n\n*page_break\n\nI felt a pair of hands grab my shoulders and drag me back toward the ladder.\n\nMy senses returned to me and I looked around.\n\nA trail of blood led from myself down toward the end of the tunnel.\n\nThat creature has several new wounds, but didn't took badly phased by them.\n\n*page_break\n\n\"$!{Name}!\" Damien shook me a little, trying to get my attention.\n\nHe had several deep cuts across his body. his breathing was heavy.\n\nHe stared down at me, fear and worry in his eyes.\n\nI tried to start the spell again, but I struggled to form the words.\n\n\"I need you to do what I say, alright?\" Damien asked.\n\nI looked down the hall, and saw it walking toward us.\n\n\"Do you trust me?\"\n\nI nodded weakly.\n\n*page_break\n\n\"I need you to make a... pact.\"\n\nMy head started to droop a bit.\n\n\"Stay with me.\" Damien gently shook me. \"It's your only chance.\"\n\n*page_break\n\nI didn't have the slightest clue what he was going on about.\n\n\"Will you let me grant you power?\" Damien asked.\n\nI felt very cold.\n\n\"$!{Name}?\" Damien shook me a little. \"Will you let me grant you power.\"\n\n\"How?\" I asked weakly.\n\n\"I just need your permission,\" he said. \"That's all.\"\n\nIt was nearly on top of us.\n\n*page_break\n\n\"Fine. Yes,\" I said.\n\n\"I need you to say it exactly. We don't have much time.\"\n\n\"I want you to grant me power,\" I said.\n\nDamien immediately took my hand in his and shook it.\n\n*page_break\n\nA strange sensation ran down my spine.\n\nIt was like an electric tingle. It seemed to spread throughout my body before seeping into my very core.\n\n*page_break\n\nI became aware of Damien. I couldn't quite describe it. I knew he was there. There was a connection between\nus.\n\nI was wounded, but it didn't hurt anymore.\n\nMy strength returned to me. I tried to rise to my feet, and found it surprisingly easy to do.\n\nThat thing was standing over us. It brought the machete down toward my face.\n\nI instinctively grabbed at it.\n\n*page_break\n\nThe blade stopped in my hand. It stung a little, and I could see blood trailing down my hand, and dripping\nto the dirt floor.\n\nIt pressed down, pushing all of its weight against the weapon.\n\nIt didn't so much as budge an inch. It didn't even really hurt either.\n\nThe blade slowly bent in my hand. It was trying to force it down so much the blade was about to break\n\n*page_break\n\nI wasn't too focused on that however.\n\nThe only thing I was aware of was how good I felt. Energy surged through me. I had never felt so awake\nand aware.\n\n*page_break\n\nI felt powerful.\n\n*page_break\n\nI stomped down on the creature's knee. It buckled instantly.\n\nI followed up with another kick to its face. I sent it sprawled across the floor.\n\nI was a lot stronger than I remembered.\n\nHell, I was probably stronger than Damien.\n\n*page_break\n\nI took the machete. It was a bit bent, but otherwise still in good shape.\n\nI raised the weapon up, ready to strike, before remembering something.\n\nI spoke the incantation. Only when the spell was ready did I bring the blade\ndown across its throat.\n\nI tore through the creature's neck. If I had gotten a few more inches I would have decapitated\nit completely.\n\nI managed to keep the spell up, even as I had to hold back gagging at the sight of its neck.\n\n*page_break\n\nIt wasn't the gore that got to me. It was bugs.\n\nIts insides were seething. I couldn't understand how that thing's body functioned with so many insects\ncrawling its insides.\n\n*page_break\n\nI dropped the machete and backed off. I touched the wound in my stomach. I was fairly certain I had\na matching one coming out of my back.\n\n\"Come on,\" Damien said. \"You'll be okay for now, but you need to get you checked out.\"\n\nI looked at the thing. \"What about it?\"\n\n\"It's not going anywhere,\" he said. \"And I can't take back what I did to you unless I'm sure you won't immediately\nbleed out afterword.\"\n\n*page_break\n\nIt was a little odd going to El Abrigo for medical treatment. They had hospitals of course, but\nit was a strange being surrounded by strange creatures while they were looking me over.\n\nIt was also strange being told a stab wound that completely penetrated my body, 'didn't look too\nserious', and then later being discharged that night.\n\nThey applied some sort of... 'stuff' to my wound. I never got a clear answer on what it was. They\nstitched my wounds closed after that, and let me leave.\n\n*page_break\n\nDamien sent word out to his people about where that thing's body was. He insisted on going\nhome with me to make sure I was alright.\n\nI still felt amazing. I was stronger, faster. It felt like I could do anything.\n\n*page_break\n\n\"I probably shouldn't wait any longer,\" Damien said. \"Just hold still a moment.\"\n\n\"Huh?\" I turned to him.\n\nDamien put put a hand on my shoulder and another over my heart. \"I want to release you from our bond. Do you agree?\"\n\nI really, really wanted to say no. I had never felt like that before. I wanted more of it.\n\nDamien's grip tightened. \"Do you agree?\"\n\nI held back a sigh as I spoke. \"Yes.\"\n\n*page_break\n\nAnd just like that it was over. That power was long gone, as was my connection to Damien.\n\nHe patted my shoulder. \"Good. Your stomach still okay.\"\n\nI touched the stitched wound and winced. \"Pretty much.\" At least I wasn't dying anymore.\n\n*page_break\n\nThe days passed quickly after that. Eventually, the day of Halloween came. Damien showed\nup at the Leavitt manor to escort me to El Abrigo.\n\nHe still planned to come to the party, but he seemed far more interested in showing me around his town during\nthe absolute height of celebration.\n\n*page_break\n\nThe streets were crowded, and the noise was deafening.\n\nDozens of fireworks were going off all over El Abrigo.\n\n\"Didn't want me to miss the show?\" I asked, as we wandered the busy city streets.\n\nDamien smiled. \"All the best stuff only comes out at night. You should visit us after sundown more often.\"\n\n*page_break\n\nHe led me along the canal that ran through the city. I noted a lot of boats in use.\n\n\"I also wanted to grab one of those,\" Damien said.\n\nI raised a brow. \"A boat? You mean like... rent one?\"\n\nHe nodded. \"Yeah. There's a place we can go to have one for an hour. Some of the fancier ones give you\nfood while you ride.\"\n\nI looked more closely. The boats generally only had enough room for about three or four people. There\nwere always two people sitting either side-by-side, or across from each other. The third was directing\nthe boat.\n\nDamien found us a boat with a table built in the middle of it. We had the option of getting something\nsmall to eat, but I passed. I figured there'd be a lot to eat at the party later, so there was no reason\nto fill up now.\n\nNot to mention Damien was paying, and I didn't want to mooch too much.\n\n*page_break\n\nWe set out into the waters. It took a moment to get settled down. The boat constantly shook back and forth.\nIt didn't make me nauseous or anything, but it did take a little getting used to.\n\nThe canal walls prevented us from seeing into the city streets, but we still had a great view of the fireworks\ngoing off overhead.\n\nIt was a little quieter down on the water. The roar of the crowd was dulled.\n\nIt was darker too. Only the occasional flash of light from a firework illuminated Damien, who sat across from\nme.\n\n*page_break\n\nHe eyed me curiously. \"So what now?\"\n\n\"Huh?\"\n\nDamien crossed his arms. \"The killer's dead now. And you. You seem to have developed some skill.\"\n\nI raised a brow. \"Skill? What are you talking about?\"\n\nHe pointed to the bell around my neck. \"You figured out how to make that. Not to mention a spell to weaken that\ncreature. Seems to me like you might have a knack for runic magic.\"\n\nI shrugged. \"I just copied spells out of a book. I don't actually know anything about it.\"\n\n\"Well then you should learn,\" Damien said. \"You could make a good living off of that you know.\"\n\nI mulled that over.\n\n\"Out here anyway,\" Damien quickly added.\n\n*page_break\n\nI sighed. \"I don't know. I'll think about it. So much happened recently... I'm just waiting for things\nto settle back down. For tonight, I'm just going to try to enjoy myself. No worrying about tomorrow.\"\n\n\"Fair enough.\" Damien smiled. \"I suppose this isn't exactly the most romantic discussion we could\nbe having on a first date anyway.\"\n\n\"With everything that happened, I didn't have much time to think about... us,\" I said. \"I'm glad something\ngood came from this mess.\"\n\nDamien smirked. \"I like to think I'm worth it.\"\n\nI chuckled. \"We'll see.\"\n\n\"I could show you,\" he said.\n\n*page_break\n\nBefore I could come up with a response he reached over the table, grabbed me and kissed me.\n\nIt was deep, and long.\n\n*page_break\n\nWhen he broke it off, I slumped back, a little out of breath.\n\n\"So?\" Damien smirked at me.\n\n\"That was... pretty good. Definitely a six. Maybe a seven.\"\n\nWe shared a laugh, as flurry of fireworks exploded in the sky above us.\n\n*goto_scene ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "elizabethend": "\n\n\n\nElizabeth.\n\nShe was already going to the party, so I couldn't exactly invite her to it.\n\nNot unless I explicitly told her I wanted it to be a date.\n\nThe thought left me feeling uneasy. We were closer, sure, but I still wasn't sure\nwe were that close.\n\n*page_break\n\nThere was only one thing to do.\n\n*page_break\n\nI made my way back to the manor. I wasn't sure if she was home yet or not, but it was the only reliable\nplace I would see her. I didn't have her number.\n\nWhen I arrived, I saw Mr. Leavitt standing outside, chatting with a handful of other people. I didn't recognize\nany of them. They might have been helping plan the party, or planning to attend it.\n\nI waved to him in passing as I tried to go deeper into the mansion.\n\nHe stepped away from the group at the last second, joining me.\n\n\"So. Looking for someone?\" he asked.\n\n\"Elizabeth.\"\n\nI instantly regretted speaking.\n\n*page_break\n\n\"Any particular reason?\" he asked.\n\nI held back a tired sigh. \"I just wanted to talk to her about something.\"\n\n\"Is that a fact?\" He smirked. \"And what exactly were you hoping to talk about?\"\n\nIt was a lot easier to avoid this discussion when I genuinely wasn't trying to\ndate his daughter.\n\n*fake_choice\n\t#When I thought about it, there wasn't much point in hiding. I basically already had his blessing.\n\t\t\n\t\t\"I'm going to ask her to come to the Halloween party,\" I said.\n\t\t\n\t\t\"You know she's already going, right?\" Mr. Leavitt asked.\n\t\t\n\t\tI sighed. \"I meant, I'm going to ask her to join me. As in, show up with me. Together.\"\n\t\t\n\t\t\"Like... a date?\"\n\t#There's just something weird about having this kind of conversation with a girl's father.\n\t\t\n\t\t\"Just some recent school stuff,\" I said.\n\t\t\n\t\tHis features hardened. \"Has she been having trouble... still?\"\n\t\t\n\t\t\"Uh...\" The honest answer was 'probably'. \"No, no. Roxanne does a pretty good job of watching her back.\"\n\t\t\n\t\tMr. Leavitt smiled. \"Oh yes. That girl has been nothing short of a guardian angel.\" He eyed\n\t\tme curiously. \"Just out of curiosity... this has nothing to do with the upcoming party\n\t\tdoes it?\"\n\t\t\n\t\t\"I-\"\n\t\t\n\t\t\"I'm sure Elizabeth would love your company. If that is what you're planning to talk about.\"\n*comment\n\n*page_break\n\nMy eye twitched. [i]Deep breaths. We can get through this.[/i]\n\n\"Is she here right now?\" I asked.\n\nHe shook his head. \"I think she went to-\" he suddenly stopped. His expression suggested he said too much.\n\nI raised a brow. \"El Abrigo?\"\n\nMr. Leavitt gave me a shocked expression.\n\n\"Gate out in the woods. Trees that form an X.\" I smiled when Mr. Leavitt frowned. \"Don't worry, she didn't\ngive away your people's secrets or anything. I found out on my own.\"\n\n\"How?\"\n\n\"Pretty much just through random happen-stance,\" I said. \"You wouldn't believe me if I told you.\"\n\nHe eyed me curiously, and suspiciously. \"I see...\"\n\nI waved him off as I walked. \"I'll wait up for her.\"\n\n*page_break\n\nIt was a long time before Elizabeth finally came home. Honesty... I was feeling really stressed. The more\ntime I had alone, the more time I spent thinking about how this could go wrong.\n\nStill, I wouldn't know her answer unless I asked.\n\nThe sun had just set along the horizon. The yard was cast in dark shadows. She passed through the front gate.\n\nThe second her foot touched the door I rushed out to greet her.\n\n\"Sorry I was late, d- oh.\" Elizabeth gave me a surprised look. \"$!{Name}? Are you going somewhere?\"\n\n\"Uh, no.\" I cleared my throat. \"I was waiting for you.\"\n\n\"Why?\"\n\n*choice\n\t#Just come right out with it.\n\t\t\n\t\t\"Do you want to go to the Halloween party?\" I asked.\n\t\t\n\t\tShe tilted her head. \"Er... yeah.\"\n\t\t\n\t\tI paused. \"Oh, no, I meant- do you want to go with me?\"\n\t\t\n\t\tShe stared. \"...How do you mean?\"\n\t\t\n\t\t\"You know...\" I smiled sheepishly. \"As my date.\"\n\t\t\n\t\t*goto AfterQuestion\n\t#Beat around the bush.\n\t\t\n\t\t\"You know the Halloween party that's coming up?\" I asked.\n\t\t\n\t\tShe nodded.\n\t\t\n\t\t\"Well... I was planning on going.\" I looked off to the side. \"But, you know. Showing up\n\t\tto a party by myself. Kind of lame.\"\n\t\t\n\t\tShe crossed her arms. \"I'm showing up by myself.\"\n\t\t\n\t\tI flinched. \"Er- no! I mean, it's not [i]lame[/i]. Not if you do it.\"\n\t\t\n\t\tShe raised a brow at me.\n\t\t\n\t\t\"It's just- it would be nice if we went.\"\n\t\t\n\t\tSilence.\n\t\t\n\t\t\"Together.\"\n\t\t\n\t\t\"Together?\" Elizabeth asked.\n\t\t\n\t\t\"Like, you know... a date. Or something like that.\"\n\t\t\n\t\t*goto AfterQuestion\n*label AfterQuestion\n\n*page_break\n\nThere was a delay in Elizabeth's reaction, like her brain was slowly working out\nwhat I had said.\n\n*page_break\n\n\"Oh.\" Her features shifted. She seemed surprised.\n\nOr perhaps shocked would be a better word.\n\n*page_break\n\nThis was beginning to seem like a poor decision.\n\n*page_break\n\nA red tint reached her cheeks. \"I... yes.\"\n\nI stared.\n\nShe grew a slight smile. \"I'd enjoy that.\"\n\nWe stood staring at one another.\n\nI wasn't sure what to say.\n\nGiven her silence, apparently neither was she.\n\n\"That's great,\" I said.\n\nShe smirked. \"At least you won't have to worry about picking me up.\"\n\n*page_break\n\n\"So... where is everyone?\" Elizabeth asked, as we walked further into the house.\n\nI shrugged. \"I think your father and mother went out into town. It's pretty late, so I\nthink the servants were done for the day.\"\n\nShe nodded. \"I see.\"\n\nI still had a whopping eight days until the party. It almost seemed like I had asked Elizabeth\ntoo soon.\n\nStill, I was glad to have the issue off my chest.\n\nI noticed Elizabeth staring at me with a raised brow.\n\n\"What?\" I asked.\n\n\"Why is that ringing?\"\n\n*page_break\n\n\"Ringing?\" I tilted my head. \"What are you-\"\n\nI finally became aware of it. The sound. The ringing.\n\nMy bell was active and warning me.\n\nA chill crept down my spine.\n\n\"We need to go.\"\n\n*page_break\n\nI grabbed Elizabeth's arm and led her to the front door.\n\n\"Woah, wait!\" She dug her feet into the floor. \"What are you talking about? What's going on.\"\n\nI stopped, and pinched the bridge of my nose. \"I accidentally stole a spellbook from your library.\nIt was the day of the fire. I used a spell from it to enchant this bell. It gives a warning when\nthe killer is nearby.\"\n\n\"Killer?\" Elizabeth stared at me. \"You mean-\"\n\n\"Yes! Now let's go!\" I yanked her forward.\n\nStanding in the doorway, was a large man, with a sack on his head.\n\nI stopped.\n\n*page_break\n\nBlood coated his body from head to toe. He carried a cleaver in his hand, not unlike what a\nchef would use in a kitchen. The blade was cracked and bent from use.\n\nI noted several wounds in his torso. It looked like someone had shot him several times in the\nchest.\n\n[i]How did we not hear that?[/i]\n\nI backed away slowly. \"Elizabeth?\"\n\nHer eyes were wide with horror. She barely glanced at me before looking back at that thing.\n\n\"Listen to me.\" I pulled her along with me as we slowly retreated. \"I'm gonna start running. I\nneed you to follow me. Alright?\"\n\nShe nodded slowly.\n\n*page_break\n\nI was about to start running, when a realization struck me.\n\nThe incantation. I had practiced it non-stop for ages. I could recite it now.\n\nI eyed the bullet wounds in its chest. [i]Would those still hurt it?[/i]\n\nI mumbled the spell under my breath. It didn't show much of a reaction.\n\nI wondered if it didn't understand that I was weakening it.\n\n\n*temp SackmanHP 5\n*set Damage 0\n\n*choice\n\t#Recite the incantation\n\t\t*set SackmanHP - 1\n\t\t\n\t\tI mumbled the incantation under my breath.\n\t\t\n\t\tElizabeth shot me a confused look.\n\t\t\n\t\tIt approached. Its heavy steps resounded throughout the home.\n\t\t\n\t\t\"What are you doing?\" Elizabeth said.\n\t\t\n\t\t\"Child. Accept... you...\" Its swayed in place, before falling to one knee. \"Something\n\t\tdoesn't feel...\" It pressed a hand against its wounds.\n\t\t\n\t\t\"Time to go,\" I said.\n\t\t\n\t\t*goto AfterFirstTest\n\t#Just run\n\t\t*set Damage + 1\n\t\t\n\t\t\"Now!\" I bolted away, dragging Elizabeth along with me.\n\t\t\n\t\tA heavy weight slammed into my back, sending me rolling across the ground. I tried to\n\t\tstand up, but it slammed a heavy boot against my back.\n\t\t\n\t\t\"Do not struggle.\" Its breath was heavy and desperate. \"The pain will-\"\n\t\t\n\t\tElizabeth sank her fangs into the side of its neck. She immediately drew\n\t\taway from it, coughing and sputtering blood.\n\t\t\n\t\tI scrambled away and got up.\n\t\t\n\t\tTiny insects crawled out from the bite wounds. Elizabeth gagged while spitting out blood.\n\t\t\n\t\t*goto AfterFirstTest\n*label AfterFirstTest\n\nI didn't waste any time as Elizabeth and I sprinted down the hall. We eventually came out in the dining room.\nA soft light emanated from a chandelier over the long table. Unused Halloween decorations sat in boxes.\n\n*if (Damage > 0)\n\tI was aching a bit from getting rushed, but I was alright.\n*if (SackmanHP = 4)\n\tIt looked like using the incantation had hurt that thing, though I couldn't tell to what extent.\n*comment\n\nElizabeth pulled out her phone and was dialling a number.\n\n\"You're calling someone now?\" I asked.\n\n\"Yes,\" she said. \"The police.\"\n\n\"Weren't we suppose to have police watching this place!?\" I shouted.\n\n\"They were.\" It walked into the dining room. I noticed insects swarming over its bullet wounds.\nI wondered if they were trying to keep them plugged.\n\n*page_break\n\nI looked over the room. There had to be something I could use.\n\nTons of boxes with Halloween decorations. Useless.\n\nPlates, set out on the table. A few scrapes of food stuck to them. Useless.\n\nI eyed a steak knife on one of the plates. It wasn't much...\n\n*if (Fighting > 10)\n\tI knew a little about fighting.\n*comment\n\n*if (Fighting >= 20)\n\tActually... I knew a lot about it. I had spent a lot of time training with Matthew at the hunters lodge.\n*comment\n\nI could always try running instead.\n\nElizabeth moved closer to me.\n\n\"Be ready,\" I said.\n\n*temp HasKnife 0\n*temp UsedSpell 0\n\n*label BeforeSecondTest\n\n*choice\n\t#Run\n\t\t\n\t\tWhat's the plan?\n\t\t\n\t\t*choice\n\t\t\t#Over the table. It doesn't look very limber.\n\t\t\t\t*set Damage + 1\n\t\t\t\t\n\t\t\t\tI clambered over the table. Before I reached the other side\n\t\t\t\tof it, I felt a chair smash against my back, sending me careening\n\t\t\t\tover the edge of it.\n\t\t\t\t\n\t\t\t\tI stood up, only to have Elizabeth pull me down as another chair\n\t\t\t\tflew over my head.\n\t\t\t\t\n\t\t\t\tWe sprinted back toward the nearest door as the thing kicked the table\n\t\t\t\thard enough to splinter a large chunk of it.\n\t\t\t\t\n\t\t\t\t*goto AfterSecondTest\n\t\t\t#Under the table. We'll crawl toward the far end of it.\n\t\t\t\t\n\t\t\t\tWhen we went under the table, Elizabeth made a move to pass through the\n\t\t\t\tother side of it, but I grabbed her.\n\t\t\t\t\n\t\t\t\tI pressed a finger to my lips before nodding toward the far end of the table.\n\t\t\t\t\n\t\t\t\tWe crawled slowly and quietly. The creature was being strangely quite.\n\t\t\t\t\n\t\t\t\tI heard a loud crack as it kicked the entire table over. Elizabeth and\n\t\t\t\tI bolted immediately.\n\t\t\t\t\n\t\t\t\tI looked back to see it staring down where the table had been. After a short\n\t\t\t\tdelay it looked around and spotted us.\n\t\t\t\t\n\t\t\t\tWe made it out into the hallway before it had any real chance to go after us.\n\t\t\t\t\n\t\t\t\t*goto AfterSecondTest\n\t*if (HasKnife = 0) #Take steak knife\n\t\t*set HasKnife 1\n\t\t\n\t\tI grabbed the steak knife. Its grip tightened on the cleaver.\n\t\t\n\t\tIt was ready for a fight.\n\t\t\n\t\t*goto BeforeSecondTest\n\t*if (HasKnife = 1) #Rush forward, and attack with the steak knife\n\t\t\n\t\t*if (Fighting >= 20)\n\t\t\t*set SackmanHP - 2\n\t\t\t\n\t\t\tI rushed forward. It brought its cleaver down on me, but I deflected the slash\n\t\t\toff to the side.\n\t\t\t\n\t\t\tIt grabbed me with its off hand, and I drove my steak knife into its wrist. It didn't\n\t\t\tflinch, but its grip did weaken enough for me to pull away.\n\t\t\t\n\t\t\tIt took a large step back, before throwing its weight forward. It made for a heavy\n\t\t\tswing at me.\n\t\t\t\n\t\t\tI ducked back, barely avoiding the blade by a mere inch.\n\t\t\t\n\t\t\tElizabeth grabbed hold of its arm. It stared at her.\n\t\t\t\n\t\t\tI lunged forward, and buried my knife into its neck. It raised its foot up, and kicked\n\t\t\tme back.\n\t\t\t\n\t\t\tI lost my grip on the knife as Elizabeth rushed next to me.\n\t\t\t\n\t\t\t*comment\n\t\t*if (Fighting >= 10) and (Fighting \u003c 20)\n\t\t\t*set SackmanHP - 1\n\t\t\t*set Damage + 1\n\t\t\t\n\t\t\tI rushed forward and took a hard swing at it. The thing blocked my slash with its\n\t\t\tbare arm. I left a deep but that immediately started seething with various small bugs.\n\t\t\t\n\t\t\tI winced at the sight, oblivious to the large fist headed for my side.\n\t\t\t\n\t\t\tIt knocked me off my feet. I was pretty sure he cracked a rib.\n\t\t\t\n\t\t\tThat thing readied a heavy swing, but Elizabeth grabbed its arm.\n\t\t\t\n\t\t\tIt stared at her. I struggled to my feet.\n\t\t\t\n\t\t\tIt tried to shake Elizabeth off, but seemed to be having trouble getting her to move.\n\t\t\tEventually, it took a swing at her with its free hand.\n\t\t\t\n\t\t\tElizabeth finally let go, just barely avoiding getting cut open.\n\t\t\t\n\t\t\tI lunged forward, and stabbed forward with every ounce of strength I had. The blade\n\t\t\tsank into its belly.\n\t\t\t\n\t\t\tI backed off before it had a chance to retaliate.\n\t\t\t\n\t\t\t*comment\n\t\t*if (Fighting \u003c 10)\n\t\t\t*set Damage + 1\n\t\t\t\n\t\t\tI timidly approached, blade held out in front of me. It took a step forward, seemingly\n\t\t\tsizing me up.\n\t\t\t\n\t\t\tI slashed at its arm. It knocked the steak knife away with its cleaver, before kicking\n\t\t\tme in the stomach. Sprawled across the ground, I didn't have time to react before it\n\t\t\trushed at me.\n\t\t\t\n\t\t\tIt raised its cleaver over its head. Elizabeth rushed it from behind, and grabbed its arm.\n\t\t\t\n\t\t\tIt swung its body around, and threw Elizabeth to the floor.\n\t\t\t\n\t\t\tI got to my feet. Elizabeth quickly moved around to my side.\n\t\t\t*comment\n\t\t*comment\n\t\t\n\t\tWe didn't waste any more time getting out of there.\n\t\t\n\t\t*goto AfterSecondTest\n\t*if (HasKnife = 1) #Wait for him to attack, then counter with the knife.\n\t\t\n\t\t*if (Fighting >= 10)\n\t\t\t*set SackmanHP - 1\n\t\t\t\n\t\t\tI stared the thing down. It approached slowly.\n\t\t\t\n\t\t\tI watched carefully. I was waiting for that moment. I had seen it before.\n\t\t\t\n\t\t\tIt seemed so slowly, but every now and then, it would tense up, and lunge\n\t\t\tforward with more speed than I thought it was capable of.\n\t\t\t\n\t\t\tIts legs tensed. It shot forward.\n\t\t\t\n\t\t\tI ducked down, and threw myself forward.\n\t\t\t\n\t\t\tI angled myself away from its blade, passing by its left side.\n\t\t\t\n\t\t\tI stabbed into its left knee. It had launched itself forward with such force,\n\t\t\tthat the blade easily slammed deep into its leg. It tripped, and tore the\n\t\t\tblade from my hand.\n\t\t\t\n\t\t\tI quickly backed away. Elizabeth joined my side. It was sprawled across the ground,\n\t\t\tbut quickly recovering.\n\t\t\t\n\t\t\t*comment\n\t\t*if (Fighting \u003c 10)\n\t\t\t*set SackmanHP - 1\n\t\t\t*set Damage + 1\n\t\t\t\n\t\t\tI crouched down low, and held the steak knife in a tight grip.\n\t\t\t\n\t\t\tIt lunged forward, faster than I thought it could move. I blindly stabbed\n\t\t\tforward.\n\t\t\t\n\t\t\tMy blade pierced its stomach, but it also clipped my side with its cleaver.\n\t\t\t\n\t\t\tIt lost its balance as it clutched at the knife in its belly. I quickly scrambled\n\t\t\taway.\n\t\t\t\n\t\t\tElizabeth came to my side, checking the cut along my ribs. It wasn't too bad.\n\t\t\t\n\t\t\t*comment\n\t\t*comment\n\t\t\n\t\tElizabeth and I bolted out of there.\n\t\t\n\t\t*goto AfterSecondTest\n*label AfterSecondTest\n\n*page_break\n\n*if (Damage = 1)\n\tI was only hurting a little.\n*if (Damage >= 2)\n\tMy injuries were stinging, but I was still okay.\n*comment\n\n*if (SackmanHP \u003c= 3)\n\tWe were actually making some progress on injuring that thing. I hoped.\n\t\n\tI wasn't sure how much that thing could take. Supposedly my spell had made\n\tit 'vulnerable' to normal weapons. But, I wasn't sure what that really meant.\n*comment\n\n\"Where are we going?\" Elizabeth asked.\n\n\"You called the police right?\" I asked.\n\n\"Yeah, but... we can't just stay here, can we?\"\n\nIf we escaped, he'd come back. Again. The police couldn't hurt him unless I used that\nincantation.\n\nBest case scenario if we run: he gets away.\n\nWorst case scenario if we run: he kills the police that arrive, and then gets away anyway.\n\nI needed to kill him. If I didn't, it wasn't going to end.\n\n\"We just need to buy time,\" I said.\n\n*page_break\n\nWe got a decent head start from the dining room. As we ran down a hall, we came across a staircase.\n\n\"We're not going up there are we?\" Elizabeth asked. \"There's no way out.\"\n\n\"This house is huge,\" I said. \"We can keep outmanoeuvring him. And he won't be able to escape\nas easily when the police get here.\"\n\nHeavy footsteps thudded from down the hall.\n\nWe bolted up the stairs.\n\n*page_break\n\nElizabeth stopped me as we were sprinting down the hall. \"My dad has a rifle.\"\n\nI stared. \"What?\"\n\n\"He has it mounted on the wall in his room.\"\n\n\"Does it still work?\" I asked.\n\n\"I think so.\" Elizabeth didn't actually look too certain.\n\n\"Where's his room?\"\n\n*page_break\n\nWe sprinted through a heavy door, and locked it behind us. I grabbed a table Mr. Leavitt had\nset up next to the door, and blocked it.\n\nThe moment I had it pressed against the door, I felt a heavy force smash against it. That thing\nwas outside. The door was thick enough to hold it back for a while, but it would get in eventually.\n\n\"Here.\" Elizabeth pulled an old looking rifle off the wall. It didn't look like it would be out of\nplace in an old western movie.\n\n\"...Are you sure that thing still works?\"\n\n\"I saw him working on it all the time,\" Elizabeth said. \"He's been keeping it in good condition.\"\n\n*page_break\n\nI looked the rifle over. I had never handled a gun before, so it took me a few moments to figure\nout how to check if it was even loaded.\n\nWhich it wasn't. Of course.\n\nI needed to find a way to load it.\n\nHe had a large bed set in the middle of the back wall. A fine dresser sat next to it, with an antique\nalarm clock sitting on tip. His closet was slightly ajar. I noticed several sets of clothes lining it.\nA desk sat in the corner of his room. Various papers sat scattered on top of it.\n\nThe window was open. A light, cold draft was coming through.\n\n*set Var 0\n*temp HasRifleBullets 0\n*temp HasPistol 0\n*temp HasPistolBullets 0\n\n*label BeforeThirdTest\n\n*if (Var = 0)\n\tIt was kicking against the door. We still had some time before it broke inside.\n\t\n\t\"Don't pretend your strong.\"\n*if (Var = 1)\n\tThe door was starting to crack from the repeated strikes.\n\t\n\t\"You are a coward. You're weak.\"\n*if (Var = 2)\n\tWood splintered as the door cracked in half. Thankfully, it didn't completely fall apart.\n\t\n\t\"You always need other people. They never need you.\"\n*if (Var = 3)\n\tThe top half of the door was broken away. The table held the lower half in place.\n\t\n\t\"You're a leech. A parasite feeding off those around you. Why can't you do anything yourself?\"\n*if (Var = 4)\n\tIt completely smashed the door down. kicked the table over, and stepped inside.\n\t\n\t\"Elizabeth.\"\n\t\n\t*goto AfterThirdTest\n*comment\n\n*set Var + 1\n\n*choice\n\t*hide_reuse #Check under the bed.\n\t\t\n\t\tI ducked down, and looked under Mr. Leavitt's bed.\n\t\t\n\t\tI didn't see anything.\n\t\t\n\t\t*goto BeforeThirdTest\n\t*hide_reuse #Check the dresser.\n\t\t*set HasPistol 1\n\t\t\n\t\tA gun sat beneath a pile of papers. It was a pistol, but it had no ammo.\n\t\t\n\t\t*if (HasPistolBullets = 1)\n\t\t\t\"This is it!\" I struggled to load the gun, before turning the safety off. \"Let's\n\t\t\thope this works.\"\n\t\t*if (HasPistolBullets = 0)\n\t\t\t\"Another one?\" I looked at Elizabeth.\n\t\t\t\n\t\t\tShe shrugged.\n\t\t\t\n\t\t\tSeeing as I had never used a gun before, the pistol might actually be more manageable.\n\t\t\tI just had to hope I could find some bullets lying around somewhere.\n\t\t*comment\n\t\t\n\t\t*goto BeforeThirdTest\n\t*hide_reuse #Check the closet\n\t\t*set HasPistolBullets 1\n\t\t\n\t\tI pushed the clothes aside, and looked around. A small shelf was built high into the top\n\t\tof the closet\n\t\t\n\t\tA dozen or so boxes lined it. I pulled them down and dug through their contents.\n\t\t\n\t\t*if (HasPistol = 0)\n\t\t\tI stumbled across a box of ammo.\n\t\t\t\n\t\t\tI raised a brow at them.\n\t\t\t\n\t\t\tThey were 9mm bullets, meant for a pistol, not a rifle.\n\t\t\t\n\t\t\t\"Let's hope he has the gun these go to in here,\" I said.\n\t\t*if (HasPistol = 1)\n\t\t\t\"Yes!\" I quickly reloaded the pistol, and turned the safety off. \"Let's hope this\n\t\t\tworks.\"\n\t\t*comment\n\t\t\n\t\t*goto BeforeThirdTest\n\t*hide_reuse #Check the desk\n\t\tI dug through the desk's drawers, but didn't find anything useful.\n\t\t\n\t\t\"Dammit!\" I slammed a drawer shut, before moving on.\n\t\t\n\t\t*goto BeforeThirdTest\n\t*hide_reuse #Look out the window.\n\t\t*set HasRifleBullets 1\n\t\t\n\t\tA flower box was attached to the window. I noted several dead flowers in the pot. It looked\n\t\tlike they used to be roses.\n\t\t\n\t\tSomething red was sticking out of the soil. I dug my hand into the dirt, and withdrew a box\n\t\tof ammo. It looked like it belonged in a rifle.\n\t\t\n\t\t\"This is is,\" I said. \"Let's hope this is enough to stop him.\"\n\t\t\n\t\tElizabeth was still looking around the room. \"Is there anything else we can use?\"\n\t\t\n\t\t*goto BeforeThirdTest\n*comment\n\n*label AfterThirdTest\n\n*page_break\n\nElizabeth stared as it entered. \"What?\"\n\n\"You were always so pathetic. You could never do anything on your own.\" It didn't move from\nthe doorway, it just stared her down.\n\n\"I-I... what are you-\"\n\n\"They're tired of always having to help you. Your friends. Your family. Y-\"\n\n\"Enough of this crap,\" I said.\n\n*if (HasPistol = 1) and (HasPistolBullets = 1)\n\t*if (HasRifleBullets = 1)\n\t\t*set SackmanHP - 3\n\t\tI shoved the rifle into Elizabeth's hands, as I took aim with the pistol.\n\t\t\n\t\tI began the incantation.\n\t\t\n\t\tElizabeth took aim.\n\t\t\n\t\tI opened fire.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe kickback from the gun was more than I was expecting, though thankfully it\n\t\tdidn't cause me to stop speaking the spell.\n\t\t\n\t\tI emptied the entire clip into its chest.\n\t\t\n\t\tIt fell to its knees, clutching at its wounds.\n\t\t\n\t\tElizabeth just stood there, staring at it. Her eyes were wide with shock.\n\t\t\n\t\tI shot her a hard glare. I couldn't speak without breaking the spell.\n\t\t\n\t\tShe flinched, and looked at me.\n\t\t\n\t\tI nodded toward the thing.\n\t\t\n\t\tThe first shot was awkward, and I winced when I saw the rifle slam back into Elizabeth's\n\t\tshoulder.\n\t\t\n\t\tHer next few shots were more stable.\n\t\t\n\t\tI felt a bit of satisfaction as the thing fell over, blood pooling out of its body.\n\t\t*goto AfterShooting\n\t*comment\n\t\n\tI began the incantation, and opened fire.\n\t\n\t*page_break\n\t\n\tThe kickback from the gun was more than I was expecting, though thankfully it\n\tdidn't cause me to stop speaking the spell.\n\t\n\tI emptied the entire clip into its chest.\n\t\n\tIt fell to its knees, clutching at its wounds.\n\t\n\t*goto AfterShooting\n*comment\n*if (HasRifleBullets = 1)\n\t*set SackmanHP - 1\n\tI opened fire. The rifle kicked back against my shoulder.\n\t\n\tI knew guns had recoil, but I didn't realize just how powerful\n\tthe thing really was.\n\t\n\tMost of my shots struck its chest. It fell to the ground.\n\t\n\t*goto AfterShooting\n*comment\n\n\n*label AfterShooting\n\n*page_break\n\nWe bolted out of that room as quickly as we could.\n\n*if (SackmanHP \u003c= 0)\n\tThat thing wasn't looking too good when we left it.\n*comment\n\nWe ran down the hall, stopping at a door that led out into a balcony.\n\n\"Are you alright?\" I asked breathlessly.\n\nElizabeth nodded.\n\n\"That thing... it was talking to you.\"\n\n\"Yeah.\" Elizabeth wandered to a nearby window. \"I can see a flashing light.\"\n\n\"The police?\" I asked.\n\nShe nodded, still staring. \"I think so.\"\n\n*page_break\n\nI opened the door to the balcony, and looked outside.\n\nJust as she said, a police cruiser was far off in the distance, headed toward us.\n\nIt would still be a while before it arrived.\n\n*page_break\n\nI looked around, and noticed some sort of metal pole leaning against the wall on the balcony.\n\n\"Hey, Elizabeth?\" I walked out, and grabbed one. \"I think we can bar the balcony doors-\"\n\nI heard an awful sound behind me. Like a blade cutting through meat and bone.\n\n*page_break\n\nElizabeth was on her knees. A cleaver torn into her shoulder blade. It had gone in so\ndeep that her arm had nearly been amputated.\n\nShe hadn't let out so much as a scream or a whimper. She just stared at the cleaver embedded in her torso.\n\n\"There was never any other outcome,\" it said.\n\n*page_break\n\n\"This is how the story ends.\"\n\n*page_break\n\n\"A weak child, too pathetic to live its own life, dies.\"\n\n*page_break\n\n\"You god damned bastard!\" I threw all my weight into a single punch against its face.\n\nI heard bugs get crushed underneath the sack.\n\nI grabbed Elizabeth and pulled her out onto the balcony. I dumped her on the ground before slamming the doors\nshut, and barring them with a pole.\n\n*page_break\n\nElizabeth was shaking and crying. A massive pool of blood was forming around her.\n\n\"It's okay,\" I said. \"Just... just hang in there. Help will be here soon.\"\n\nHer breathing was shallow. The cleaver was still stuck in her shoulder.\n\n\"What can I do?\"\n\nSomething struck the doors. The pole held firm, keeping them shut.\n\n\"$!{Name}?\" Elizabeth's voice was weak.\n\nI started to reach toward the cleaver, but stopped myself. Pulling that thing out wouldn't\nhelp.\n\n\"I-I need...\"\n\nI looked over the wound. I couldn't apply pressure to it due to it being a split on\nboth sides of her body. [i]Is that even what you do? Apply pressure to a wound by hand?[/i]\n\n*page_break\n\n\"...your blood.\"\n\n*page_break\n\nI stared down at Elizabeth. [i]What?[/i]\n\n\"Please.\"\n\n\"I-I...\" She was serious.\n\nIt didn't look like she was going to make it.\n\n*fake_choice\n\t#Vampires always bite the neck right?\n\t\tI lowered down, until my face was an inch from hers.\n\t\t\n\t\tThe position would have left me flustered if she wasn't dying right in front of me.\n\t\t\n\t\t\"Okay...\" I waited for her to react.\n\t\t\n\t\tShe gently placed a hand on my chin, and guided my face away.\n\t\t\n\t\tI was about to ask when she was going to start, when she suddenly shot up and bit\n\t\tdown on my neck.\n\t\t\n\t\tShe roughly dragged me down to her level on the ground. I could feel her normal teeth\n\t\tpressing into my skin. Her fangs were sharp, but they hadn't quite punctured my skin yet.\n\t\t\n\t\tI wasn't sure if she was hesitating or what.\n\t\t\n\t\t\"Elizabeth, wh-\"\n\t\t\n\t\tShe bit down.\n\t\t\n\t#The arm would be better.\n\t\tI knelt down, and gave her my arm. She hesitated for a moment, before suddenly sinking\n\t\ther fangs into my wrist.\n\t\t\n\t\tI flinched from the sight, but not from the pain.\n\t\t\n\t\tThere wasn't any pain.\n\t\t\n\t\tI only felt a strange sensation in my wrist. It was weirdly pleasant.\n\t\t\n\t\tShe released my arm, grabbed the back of my neck, and yanked me down to her level.\n\t\t\n\t\tShe bit into my neck.\n\t\t\n*comment\n\n*page_break\n\n*set Damage + 1\n\nIt felt good.\n\nI could feel those fangs pierced through my skin, but it didn't hurt.\nI was simply aware of them.\n\nIt felt great.\n\nI had no clue how much blood she was drinking. Honestly, I didn't particularly care.\nEverything was fine.\n\nIt felt fantastic.\n\n*page_break\n\n*set Damage + 1\n\nI wrapped my arms around Elizabeth, and pulled her closer.\n\nI don't know how long we stayed like that. In that moment, there was nothing else.\n\nThe entire world was just one wonderful moment.\n\n*page_break\n\n*set Damage + 1\n\nBut, it ended. She pulled her fangs free from my neck.\n\nElizabeth hovered by my neck for a few moments. She licked the bite.\n\nI trembled as a jolt of pleasure ran through me.\n\n*page_break\n\nThe door was broken. Its wooden frame smashed apart. [i]How long has that been going on?[/i]\n\nElizabeth stood up. I fell to the ground immediately, and rolled on my back.\n\nI saw blood pulsing through her wound. It somehow wasn't escaping her body. She used her good\narm to grab her nearly detached shoulder, and pulled it against her torso.\n\nThe sound of bone crunching and flesh tearing came from Elizabeth. She released her bad shoulder.\n\nIt didn't fall free. Her arm was attached just fine.\n\nThe cleaver still lay buried in her body.\n\n*page_break\n\nMy eyes fell on her fingers. They twitched endlessly. Her arms shook. Her body trembled.\n\nShe gently laid a hand on the cleavers handle, and tore it free from her body.\n\nElizabeth didn't make a sound. She didn't even flinch.\n\nThe doors were battered down, and that thing stood watching.\n\n*page_break\n\nThe need to use the spell came back to me in an instant. I fell back, and stared\nup at a star filled sky.\n\nI spoke it.\n\n*page_break\n\nI mumbled the spell for as long as I could. I was vaguely aware that something was happening\nnearby.\n\nBut it was just noise. Clutter.\n\nI kept speaking the spell.\n\n*page_break\n\nMy vision blurred. A loud noise filled the air.\n\n[i]Just gotta keep telling the song.[/i]\n\n[i]Song? Runes... Patterns.[/i]\n\n*page_break\n\nMy mind drifted to a strange place. Thoughts of runes and words filled my head. They all held meaning.\n\nThey seemed significant to me. Why was humanity so unaware of them. Their meaning was obvious. Patterns\nwere easy enough to weave.\n\n[i]Why am I having trouble stopping that monster? All I have to do is...[/i]\n\n*page_break\n\n[i]Why is that noise so loud?[/i]\n\n*page_break\n\nFlashing lights filled my vision when I woke.\n\n[i]When did I fall asleep?[/i]\n\nI struggled to look over the edge of the railing.\n\nA dozen cruisers stood in the Leavitt's front yard.\n\nI looked back toward the doorway.\n\n*page_break\n\nA blood soaked figure stood in the doorway, but I couldn't make them out.\nThey held a cleaver in their hand. The blade was broken in half. The handle\nwas bent into an odd curve.\n\n*page_break\n\nI collapsed.\n\n*page_break\n\n*set Damage - 3\n\nI felt cold.\n\nI was lying on an uncomfortable and unfamiliar bed.\n\nI opened my eyes. The first thing I saw was a bag of blood. It was hooked up to my\narm. I couldn't tell how late, or early, it was.\n\nThe sky was black outside a nearby window.\n\n\"Hey.\"\n\n*page_break\n\nElizabeth was sitting next to my bed. She looked fine. No blood on her clothes. No\nvisible injuries.\n\n\"You're okay.\" My voice was hoarse and weak. It felt like I hadn't had anything to drink in\nages.\n\n\"Yeah,\" she said.\n\nI noticed her fingers were twitching.\n\nMy eyes fell on Elizabeth's. Elizabeth's pupils looked dilated.\n\n\"Are you... okay. After drinking my blood I mean.\"\n\nShe nodded. \"Yeah, it just... it takes a while to wear off.\"\n\nI looked up at the ceiling. \"Is it dead?\"\n\nShe looked down. \"Yes.\"\n\n\"Did you kill it?\" I asked.\n\n\"Yes.\"\n\nI watched Elizabeth's expression carefully. She looked almost guilty.\n\n\"You did the right thing,\" I said.\n\n\"I know.\"\n\n*page_break\n\nElizabeth stood up, and walked over to me. She was staring down at me.\n\nI raised a brow at her.\n\nShe leaned down, and kissed me.\n\n*page_break\n\nAfter that bite, kissing her seemed... anti-climatic.\n\nIt certainly didn't hold the same passion, though maybe that was because I was struggling\nto stay awake.\n\nI spoke as she pulled away. \"I'm tired.\"\n\nShe smirked. \"Get some sleep then.\"\n\nI nodded. \"Will do.\"\n\n*page_break\n\nThe days passed quickly after that. I was allowed to leave the hospital the next day.\n*if (Damage > 0)\n\tThat thing hadn't given me more than some mild bruising, and Elizabeth's bite\n\twas fixed just by giving me a blood transfusion.\n*if (Damage = 0)\n\tI was only hospitalized for blood loss caused by Elizabeth's bite, and all I\n\tneeded for that was a transfusion.\n*comment\n\n*page_break\n\n*set Damage 0\n\n[i]Today is Halloween.[/i]\n\nDozens of cars were parked in front of the Leavitt Manor.\n\nI waited by the front door for Elizabeth to come meet me.\n\n\"Oh, you look so cute!\" My mother was taking pictures of... everything. Me included.\n\nI felt an arm wrap around mine.\n\n*page_break\n\n\"Ready?\" Elizabeth asked.\n\n\"Yeah, let's...\"\n\nHer clothing was all white. Her dress had multiple signs of wear\nand tear along the edges. It almost looked like the material had been pulled out of a grave.\n\n\"What?\" she asked.\n\n\"You look amazing,\" I said.\n\nShe led me inside, toward the dining hall. \"Well look who's trying to be charming.\"\n\n\"What do you mean 'trying'?\"\n\n*page_break\n\nThe night was fantastic.\n\nThe dining room had been largely cleared of furniture, making a large space for people to dance at.\nFood was kept off to the side. I was happy to see the Leavitt's hadn't let recent events get in\nthe way of their party.\n\nAs the night wore on, the music changed. The melody was slower.\n\nI noted people leaving the dance floor. There were only couples left.\n\nI glanced at Elizabeth. [i]Are we a couple? I mean, we hadn't really made anything official, so-[/i]\n\nElizabeth grabbed my arm and led me out.\n\n\"Uh, are you sure-\"\n\n\"Yes.\" Elizabeth all but forced me to wrap my arms around her. \"I've been waiting for this all night.\"\n\n*page_break\n\n\"You know.\" I pulled her a little closer. \"I was a little out of it at the hospital...\"\n\n\"Oh, were you now?\" she smirked at me.\n\n\"Yeah, I figured we should retry something.\" I leaned forward.\n\nShe leaned closer to me. Our faces were barely an inch apart. \"What did you have in mind?\"\n\n*page_break\n\nI finally closed the rest of the distance between us. Our lips locked. We pulled one another closer.\n\nI'm pretty sure I heard my mom give a 'whoop'. I suppressed a groan of irritation.\n\n*page_break\n\nWe pulled apart.\n\n\"One month,\" I said.\n\nElizabeth raised a brow at me. \"Huh?\"\n\n\"It's only been a month, since... you know.\" I laughed. \"It hardly seems like any time at all.\"\n\nShe smiled at me. \"It's funny how things turn out sometimes.\"\n\n*page_break\n\n\"Well,\" I said. \"I'm glad things went the way they did.\"\n\n\"Me too.\"\n\n*goto_scene ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]The Vampire House.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "firstdaynewjob": "\n\n\n\n[i]These freaks have a pretty nice house, I wonder how they make their money.[/i]\n\nPaintings and antique furniture filled the manor's ornate halls.\nI must have spotted at least a dozen vases during my walk through it.\nEverything was perfectly clean, though I didn't actually see any servants.\n\nIt was Sunday, maybe they had the day off.\n\n\"Hello.\"\n\nI turned to see a familiar face.\n\nI believed her name was Elizabeth, of the Leavitt family. Her pale skin and clothes\ngave her an eerie, almost phantom-like, appearance.\n\n\"And how are you today... $!{Name}, right?\" she asked.\n\n\"Yeah.\" I tilted my head at her. Something about her tone felt off.\n\n\"$!{Name}, of course.\" She walked around me, looking me over from every angle. \"And\nyour family? Settling in okay, are they?\"\n\n\"Yes.\" I crossed my arms. My expression turned darker. \"Can I help you\nwith something?\"\n\n\"Oh... if it isn't too much trouble.\" She grinned at me. I felt something\nwicked behind those eyes. \"My family has really been needing a new servant.\nOne of our other ones quit. I told my mother and father that you've been looking\nfor a job for a while now.\" Her smile grew darker. \"Turns out... they're happy\nto help.\"\n\n\"Excuse me?\" I nearly scoffed at her. \"What are you even talking about?\"\n\n\"Your friend probably should have aimed that rock a little better,\" she said. \"Otherwise, we probably\nwouldn't even be having this conversation right now.\"\n\n[i]Oh.[/i]\n\n\"Of course, I could always tell them you were amongst that mob earlier.\" She scowled\nat me. \"And with one of the ones throwing rocks to boot. How long do you think it will\nbe before they throw you and dear old mom out?\"\n\n\"I-\"\n\n\"A week? A day? Five minutes.\" She chuckled. \"Yes, definitely that last one.\"\n\nAn incident had left my family without a home. A fire destroyed our house, and there had\nbeen some kind of issue with the insurance. Trying to find somewhere else to live on\nsuch short notice is the one kind of stress my mom really didn't need right after\nlosing a house she'd lived in for nearly a decade, while also trying to sort out whatever\nwas going on with the insurance company.\n\n*fake_choice\n\t#\"Look, I wasn't trying to-\"\n\t\t\n\t\t\"I don't care.\" She whipped around, and walked away. \"You'll be starting tomorrow,\n\t\tafter school. Normally I wouldn't come straight home right after school,\n\t\tbut I think I'll make an exception.\" She looked over her shoulder. \"You know,\n\t\tto make sure you're getting the hang of your new job.\"\n\t\t\n\t#\"You deserved it you fr-\"\n\t\t*set Elizabeth - 5\n\t\t\n\t\tShe practically snarled at me. \"You'd bett
