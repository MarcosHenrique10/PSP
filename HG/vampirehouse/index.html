king. \"If you say so.\"\n\t#\"Magic.\"\n\t\t\n\t\t\"Don't have many humans that can do that out here,\" he said.\n\t\t\n\t\tI shrugged. \"I stumbled across a book of spells by accident.\"\n\t\t\n\t\t\"And just decided to randomly use magic from the book?\" His tone was painfully\n\t\tmonotone. \"Sounds safe.\"\n*comment\n\n*page_break\n\n\"I'm, $!{Name},\" I said.\n\n\"Jeremiah.\"\n\nWe continued on for a long time. I couldn't think of anything to say. I was nervous\nabout him knowing what I was. I kept checking my warning bell, but it didn't react.\n\nThat probably meant I was still safe.\n\nAt least until I met the rest of his... pack.\n\nI thought about that.\n\nPack. Like wolves. Or werewolves.\n\nHopefully I wouldn't run into Roxanne there.\n\n*page_break\n\nThe road came to a halt at the edge of a town. Every single house was a cabin.\n\nI looked around. The 'town' was actually pretty tiny. I didn't see anything but houses\nin it, so perhaps it would be better to describe the location as just a bunch of cabins\nthat happened to be built near one another.\n\nIt didn't look like there was any electricity.\n\n\"And this is where you all live?\" I asked.\n\nJeremiah shook his head. \"Not all. Most live outside the refuge.\"\n\nA handful of people milled about. There weren't any streets in the community. The entire town\nwas just one grassy field.\n\nI eyed Jeremiah. He seemed pretty okay with me being human, though I still figured I'd be safer if\nhe didn't tell anyone.\n\n*page_break\n\n\"Who's the human?\" A boy approached me. He looked like he was around twelve or so. Long scraggly\nhair fell past his shoulders. \"Is ${He} allowed to be here?\"\n\nI sighed. Evidently Werewolves had some sort of super sense or something.\n\nJeremiah smiled. \"It's all right child. $!{He} doesn't mean any harm.\"\n\nI raised a brow at Jeremiah. [i]Can he really know that?[/i]\n\nI nearly asked him, before realizing how suicidally stupid that was.\n\nHe looked at me. \"Let's visit my abode. We have a few things to discuss.\"\n\n*page_break\n\nHe led me to one of several cabins. It didn't look unique at all. In fact,\nevery single cabin looked identical to one another.\n\nHe opened the front door, and led me inside.\n\nThe interior of his cabin was just one big room. A fireplace stood in the middle,\nand a few beds lined the walls. He had a table set up near the fireplace, and several\ndressers and cupboards along one wall.\n\nHe sat down at the table. I took a seat across from him.\n\n\"Do you know what I am?\" he asked. \"What we are?\"\n\nI nodded. \"I can take a guess.\"\n\n\"How did you find out about us?\" he asked.\n\n\"Well... I didn't actually know anything about you.\"\n\nHe stared expectantly at me.\n\n\"I mean... I assumed. I saw Roxanne come out of here, so-\"\n\n\"Roxanne?\" He raised a brow. \"Is she how you know about us?\"\n\nI was beginning to feel like this was an interrogation.\n\n\"Uh... No. I found the gate on my own. I would have passed through it whether I\nsaw her come out or not.\"\n\nHe leaned over the table, his eyes boring into me. \"And what exactly were you hoping\nto accomplish by doing that?\"\n\n\"Well...\"\n\n*page_break\n\nI stared at him.\n\n*page_break\n\nI had no idea.\n\n*page_break\n\nI pulled a rock out of my pocket. \"I was just following this thing.\" I still kept it on me,\neven though it hadn't led me into any misadventures in a while.\n\nJeremiah stared at the rock for a long while.\n\nI smiled sheepishly.\n\nA smile tugged at his lips, before he broke into uncontrollable laughter.\n\nI chuckled nervously.\n\n*page_break\n\n\"$!{Boy},\" he said. \"I don't know what you're on about, but I needed that.\" He stood up.\n\"Well, you seem harmless enough, so how about I just give you this?\"\n\nHe walked over to one of the cupboards, and started digging around into it.\n\nA familiar voice spoke from outside his front door. \"Uncle! Are you there?\"\n\n\"Come in!\" Jeremiah shouted over his shoulder.\n\n\"The police showed up at our school,\" she said, walking in. \"They actually apologized, and said\nthey had cleared us.\" Roxanne beamed. \"I was really worried they were gonna try to pin what happened\non...\" She spotted me sitting at the table. \"Us.\"\n\n*fake_choice\n\t#\"Hi Roxanne. Jeremiah's your uncle?\"\n\t\t\n\t\tShe stared at me with a blank expression on her face. \"Yeah.\"\n\t\t\n\t#\"So Jeremiah. Are there other towns out here like this? And how long does this world stretch on for?\"\n\t\t\n\t\t\"There's one town, as well as many smaller communities like ours,\" he said. \"Deep\n\t\tdown, we all stand together though. We have to watch each other's backs.\"\n\t\t\n\t\tI nodded. Roxanne just stared at me.\n\t\t\n\t\t\"As for this pocket dimension...\" He grumbled something. \"I never quite understood how it worked myself, but you keep walking\n\t\tfor a while, things start getting... strange.\" He shrugged. \"I prefer to just stay near\n\t\tthe entrance. Things are safer like that.\"\n*comment\n\n\"What is ${He} doing here!?\" Roxanne stormed up to me. \"I knew you were up to something!\"\n\nJeremiah walked up to me. \"Here you go.\" He handed me a dark green coin.\n\nI took it. \"A coin?\"\n\nHe nodded. \"You can pass through the gate with that.\"\n\nI smiled. \"Thanks! this is great!\" That seed probably wouldn't have lasted very long anyway.\n\n\"Hey!\" Roxanne snarled at me. \"Don't give ${Him} that!\"\n\n\"I already slipped through once,\" I said.\n\n\"So what?\" she asked. \"Are we just supposed to give you the key to our home just because you can\nbypass the lock?\"\n\nI shrugged. \"Sure.\"\n\nRoxanne pinched the bridge of her nose. \"You know what? I'm going to go find someone who can deal with you.\"\nRoxanne left, slamming the door behind her.\n\nI looked at Jeremiah. \"Should I be concerned about that?\"\n\n\"Hmm... probably not.\" He looked thoughtful for a moment. \"Though, maybe you shouldn't stick around too long.\"\n\n*page_break\n\nJeremiah led me outside, and I took in the sights around their community. There wasn't a whole lot\nmore to see. Just a handful of additional cabins, and a lot of people wandering around.\n\n\"Can't say I know what the story is between you and my girl, but I'll be happy to see you\nvisit again,\" he said. \"We don't have many visitors around here. Least of all humans.\"\n\nI smiled. \"Thanks. I'll definitely swing by again sometime.\"\n\nHe nodded, as we headed back to the dirt road.\n\n\"Say, uh... Jeremiah?\" I asked. \"Is this all really okay?\"\n\n\"Hmm?\"\n\nI raised the coin up. \"You know, giving me this? Just sort of showing me where your people live.\nWhat if I was planning to hurt all of you?\"\n\n\"Oh.\" He chuckled. \"You couldn't.\"\n\nI raised a brow. \"How do you know I wouldn't try?\"\n\n\"I didn't say you wouldn't try,\" Jeremiah smiled. \"You just couldn't succeed. I'd make sure of that.\"\n\nI stared at him. \"Oh.\"\n\n*page_break\n\nWe wandered a short ways down the dirt road, when Jeremiah spoke up. \"Can you find your way back?\"\n\nI nodded. \"I left a mark by the road. I should be able to find the clearing again.\"\n\nWe went our separate ways. I briefly considered travelling further down the road, in the opposite\ndirection I had just come from, but I had already seen a lot in one day.\n\nPlus Roxanne was on the warpath, and I wasn't too keen on meeting whoever she was bringing\nto 'deal with me'.\n\n*page_break\n\nI stepped though the gate, and returned to my world. Just like before, the only sign anything\nhad happened was a faint click in the air.\n\nI still had plenty of daylight left, I figured I could do something around town before heading\nback home.\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n\n*page_break\n\nThe sun was setting when I returned home. I saw Roxanne and Elizabeth talking at the front door.\n\nI immediately wandered around the side of the house, thankfully avoiding their notice.\n\n*page_break\n\nI returned to my room, and considered what I wanted to do for the night.\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n*page_break\n\n\n\n*goto_scene octoberNinth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octobereleventh": "\n\n\n\n[i]Today is October 11th, Saturday.[/i]\n\n\n*page_break\n\nI was feeling lazy, so I didn't get up for a long while.\n\nWhen I finally did, it was past noon. I blamed the overcast sky.\n\n*page_break\n\nMy mother was gone when I stepped out of my room, so I flipped on the news.\n\n\"...Last night.\" A reporter stood in front of an apartment complex. \"Marking the sixth\ndeath in just three days. Police have submitted a statement indicating that the killings\nare connected. All of them have occurred at night. All victims have been minors, ages\nranging from as young as eight, to as old as seventeen.\n\n\"There are currently no suspects,\" the reporter said. \"Police are urging people to remain indoors\nat night, teenagers and children in particular. Federal agents are-\"\n\nI shut the television off.\n\nThere wasn't anything I could do about it, so I just went about my day.\n\n*page_break\n\nI walked into my room and checked my phone. No messages.\n\nI sighed. My eyes fell on the black book. Its dark cover jutted out from under my bed.\n\n*page_break\n\nMaybe there was something I could do.\n\n*page_break\n\nI flipped through the book, I skipped journal entries entirely, and just focused on the names\nof spells. If it wasn't immediately obvious what a spell did, I read a brief description to\nfind out, and moved on if it wasn't what I needed.\n\nNot that I knew what I needed, of course.\n\nI wanted something that could help. But, that was a pretty vague goal.\n\nMaybe a spell to find the killer? Or a spell to somehow prevent current killings?\n\nI didn't have the slightest clue what spells the book contained, and it didn't have anything\nresembling an index.\n\n*page_break\n\nI stopped at a page labeled 'Locate Aberration'.\n\n'I learned of a pattern that could be used to detect aberrations. I've rarely wanted to interact\nwith such twisted beings, but it seemed like something I could one day need.'\n\nI quickly skimmed the related journal entry, but didn't see any description on what an 'aberration'\nactually was.\n\nIt seemed like a long shot. But the spell was also pretty easy. All I needed was the circle, which\nwas drawn into the book, and the words, which were written.\n\n'Place the palm of one hand on the circle. Speak the incantation.'\n\nI put my hand on the circle, and spoke a short series of words.\n\n'Do not lift your hand off the circle, or the spell will break.'\n\nI felt something stir in my chest. It was like a faint pulling, as if tiny threads had woven themselves\ninside me, and were now being tugged by some strange force.\n\nIt didn't hurt, though it was unsettling.\n\n*page_break\n\nI wrapped my fingers around the warning bell dangling from my neck. [i]Would it give me a warning if\nthe killer came after me?[/i]\n\n[i]Would that warning be enough?[/i]\n\n*page_break\n\nI was getting ahead of myself. There was no guarantee that what I was sensing was the killer. It could\nhave just been some weird thing in the woods.\n\nI stared down at the book.\n\n\"Why am I getting involved with this?\"\n\nI wasn't a cop. Trying to find the killer on my own wasn't smart. Especially considering I fit\nhis demographic.\n\n*page_break\n\nI ran my hand down the cover of the book, letting that old texture sink in.\nA feeling wormed its way into my gut. An instinctive desire to use that book to find\nthe killer.\n\nThe more I looked at that cover, the more I wanted to do it.\n\nI eyed the various symbols on it. \"There's just something....\" I sighed. \"Screw it.\"\n\nI'd try it.\n\nOf course, there was just one problem standing in my way.\n\n*page_break\n\nI stared down at the circle. I had to keep my hand pressed flat against it\nfor the spell to work. If I wanted to actually track down whoever this was, I'd\nhave a difficult time carrying the book, pressing a hand against the open page,\nand walking around town.\n\nI'd probably get more than a few stares, that was for certain.\n\nI looked outside. A weak downpour continued.\n\nNot to mention I'd probably damage the book too.\n\nWith a resigned sigh, I grabbed a piece of paper and a pen.\n\n*page_break\n\nAn hour later, and I was surrounded by several crumpled pieces of paper.\n\nMy first efforts involved looking at the circle, and trying to copy it. I immediately\nhit a snag simply because I couldn't draw a free hand circle.\n\nHowever, I eventually realized I could trace the picture by drawing over it.\n\nI placed a piece of paper flat across the surface of the page, and very very slowly\ndrew over it. I was careful not to use too much force, lest I damage the page beneath.\n\nEven just tracing the image, I screwed up a few times and had to start over. I wasn't actually\nsure how perfect the circle or the symbols had to be, but I didn't want to gamble on a slightly\noff symbol not mattering.\n\nAt best, nothing would happen, and at worst...\n\n*page_break\n\nI had the image in my head of the book exploding.\n\nOr summoning a swarm of bees.\n\n*page_break\n\nIt took a full two hours, but eventually I had a perfectly transcribed circle. I tested it by laying\nit flat against my desk, placing my hand on it, and repeating the incantation.\n\nJust like before, a sensation weaved its way through my chest, and pulled me forward, leading toward\nsomething.\n\nI looked in the direction I was being drawn.\n\nStraight through a wall. Apparently I couldn't count on the spell to guide me around obstacles.\n\n*page_break\n\nMy phone buzzed. I walked over and checked it.\n\n'This is Damien. Got your number from Lord Reyes.'\n\nI raised a brow at that. [i]Did I give him my number?[/i]\n\n*set Var 0\n*label DamienTexting\n\n*choice\n\t*hide_reuse #'Why did Lord Reyes have my number?'\n\t\t*set Var + 1\n\t\t\n\t\t'He said he got it from Mr. Leavitt.'\n\t\t\n\t\t[i]Leavitt had my number?[/i]\n\t\t\n\t\t*goto DamienTexting\n\t*if (Var = 1) #'Why did Mr. Leavitt have my number?'\n\t\t*set Var + 1\n\t\t\n\t\t'I don't know. I've never met him.'\n\t\t\n\t\tI let out an huff. \"Very helpful.\"\n\t\t\n\t\t*goto DamienTexting\n\t#'What's going on?'\n\t\t\n\t\t'Nothing really. Just thought you might want to hang out today.'\n\t\t\n\t\t'At El Abrigo?' I texted back.\n\t\t\n\t\t'Actually, I thought I'd meet you out there.'\n\t\t\n\t\t*goto AfterDamienTexting\n*label AfterDamienTexting\n\nI stood up. There wasn't any real reason not to. I stashed the page with a copied circle\non it, and got ready to leave.\n\n'Where should I meet you?'\n\nDamien texted back, 'I'm at the front gate.'\n\nI stared at my phone.\n\n\"Okay...\"\n\n*page_break\n\nI quickly got dressed and went out to meet Damien. And sure enough, he was standing next to the\nfront gate.\n\nHe looked troubled, but the moment he saw me, he threw on a smile.\n\n\"Everything alright?\" I asked.\n\nHe nodded. \"Of course.\" He jerked a thumb behind him. \"Let's get going.\"\n\n\"Going where?\" I asked.\n\n\"Just around town,\" he said. \"Seemed like a good day for a walk.\"\n\nI looked to the sky. \"It's raining...\"\n\n\"Oh. Yeah.\" He shrugged. \"Didn't really notice it.\"\n\n*page_break\n\nWe had been walking for less than a minute before I decided to stop beating around the bush.\n\n\"What's going on, Damien?\" I asked.\n\n\"Huh? Noth-\"\n\n\"Stop,\" I said. \"You're acting very strange. Why did you call me out here? What's going on?\"\n\nHe gave me a nervous smile, but it faltered into a defeated frown after a few seconds.\n\nI stared at him expectantly.\n\n\"Have you... gotten into anything else lately?\" he asked.\n\n\"Huh?\"\n\n\"You showed up at that abandoned house. You somehow found a gate to El Abrigo on your own.\" He gave\nme a very serious look. \"Have you gotten mixed up in anything else? Have you seen any strange creatures\nsince then. Not like me though. More like... what you saw at that house.\"\n\nI shook my head. Of course, it seemed like I was about to. \"I haven't seen anything strange lately.\" But,\nhe didn't need to know that yet.\n\nHe raised a brow, as he studied my expression. \"Are you sure?\"\n\nI nodded, while remaining neutral.\n\nHe gave a sigh of relief. \"Good. I don't have to worry about you getting in over your head.\"\n\n\"Is that all you needed from me?\" I asked.\n\n\"Well. Kinda.\" He shot me a toothy grin. \"I was planning to dance around the subject for a while.\"\n\n\"So what now?\" I asked.\n\nHe looked thoughtful for a moment. \"I didn't expect this conversation to be over so soon...\"\n\nI looked off toward the city. \"Do you like books?\"\n\n*page_break\n\nWe went to one of the local book stores.\n\nEverybody inside was staring the moment we walked through the front doors.\n\n[i]Right... Damien's a demon. And looks like one.[/i]\n\nIt was too late, if I suddenly turned back, it would really awkward. Plus,\nDamien seemed fine with the situation.\n\nI sat down at one of the sofas. \"They're pretty cool about letting people read inside\nhere. I've made some purchases here myself.\"\n\n\"Do you hang out here often?\" Damien asked.\n\n\"Hmm... occasionally. I guess.\"\n\nTruthfully, I wasn't just trying to hang out with Damien. He clearly knew something about\nthe recent killings, and was hoping to find a lead through me.\n\nIf the killer was a monster, he'd probably know.\n\n\"So... how's work been?\" I asked.\n\nDamien poked through one of the shelves, glancing through titles. \"It's been... work.\"\n\nI nodded.\n\nHe grabbed a book from the shelf and read the back of it.\n\n*page_break\n\n\"Have you been watching the news lately?\" I asked.\n\nFor just a second, I could see him stiffen. \"Who's news?\"\n\n\"The one here, in Lakeside,\" I said. \"People were killed. It all happened over the past few days.\"\n\n\"I'd heard about,\" he said.\n\n\"You're an exterminator right? Stopping killers like that is your thing.\"\n\nDamien shot a curious glance at me. \"If it's a dangerous monster. Sure.\"\n\n\"Is it?\" I asked.\n\n\"I wouldn't know.\"\n\nI frowned.\n\n\"And if I did think it was one,\" he said. \"I'd ask you to stay out of it. A kid like you\nshould be focused on things like school work.\"\n\n\"'Kid'?\" I rolled my eyes. \"You really don't look that much older than me.\"\n\nDamien looked like he wanted to get snippy with my, but he bit back whatever retort he\nhad before turning to face me. \"Listen. You don't need to be getting involved with this.\nLeave this to the professionals. You're only endangering yourself.\"\n\nI smiled at him. \"Of course. Why would I do anything else?\"\n\n*page_break\n\nDamien and I departed at the Leavitt's front gate. I told him it was fine if he wanted\nto split up at the book store, but he wouldn't go.\n\nConsidering how many people had died in about eight days... I couldn't really blame him.\n\nThe constant rain presented a continued problem for me. I had the spell remade on a single\nsheet of paper, which would be less awkward than carrying around a book, but it was just\nas vulnerable to water damage as the book was.\n\nThe more I thought about it, the more I realized continuously using the spell simply wasn't\na realistic option.\n\nI'd have to use it briefly, go in the general direction it pointed me to, and then rinse and\nrepeat until I arrived to wherever I was being guided to.\n\n*page_break\n\n\"So... are you bringing anyone?\"\n\nI perked up. My mother had been talking about something since I returned.\n\n\"Uh...\"\n\n\"I'm sure Mr. Leavitt wouldn't mind,\" she said. \"I mean, you and Elizabeth seem\nto have gotten... close.\" She gave me the creepiest smile I'd ever seen.\n\n\"Are you talking about that Halloween party?\" I asked.\n\n\"Of course,\" she said. \"I'm sure they'd be fine if you were bringing a date. And\nif it was Eliz-\"\n\n\"We're. Not. Dating.\" I should probably try to find a date, just so she'll let that go.\n\n\"It's not super formal, but I should find you something nice to wear anyway.\"\n\nThe fire did destroy most of my clothing. Then again, I'm not sure I trusted\nmy mom to pick clothes out for me.\n\n\"I'll find something,\" I said.\n\nShe looked a little disappointed. \"Well... alright.\"\n\n*page_break\n\nA bolt of lightning struck very close by. The noise was deafening.\n\nI peeked out a window, and saw that the rain was coming down hard.\n\nI decided I'd put my plan off until tomorrow. [i]Hopefully the weather will have cleared by then.[/i]\n\n*page_break\n\nI considered what I wanted to do that evening.\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n\n*page_break\n\n\n\n\n*goto_scene octoberTwelfth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octoberfifteenth": "\n\n\n\n[i]Today is October 15th, Wednesday.[/i]\n\n*page_break\n\nI checked the news when I woke up.\n\nAnd, once again, there were no further deaths.\n\n*page_break\n\nIt looked like everything was going okay, though I couldn't help but be curious about\nwhat exactly Damien was doing.\n\nIf they had actually caught the creature, I imagined they would have announced it.\n\nOf course, the creature was a monster. Maybe they wouldn't just to prevent a controversy.\n\nThe idea of that happening unsettled me.\n\n*page_break\n\nSchool went well enough, though I noted my classmates weren't being quite as friendly as they\nhad been before.\n\nThey were still nicer. And I was still more popular than I had been, but I could feel my five\nminutes of fame drifting away.\n\n*page_break\n\nWhen school let out, I considered what I wanted to do.\n\n\n\n*label AfternoonTasks\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a few options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Hang out with Malka\n\t\t\t\t\n\t\t\t\t*gosub_scene subCrypt\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit the wolf camp\n\t\t\t\t\n\t\t\t\t*gosub_scene subRoxanne\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Visit Damien\n\t\t\t\t\n\t\t\t\t*gosub_scene subDamien\n\t\t\t\t\n\t\t\t\t*goto AfternoonEnd\n\t\t\t#Do something else\n\t\t\t\t*goto AfternoonTasks\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label AfternoonEnd\n\n\n*page_break\n\n\nThe sun was setting just as I got home. I thought about what I wanted to do for the rest of the evening.\n\n\n*label Evening\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto Night\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Evening\n\t\t*goto Night\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto Night\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Evening\n\n*label Night\n\n*page_break\n\n*goto_scene octoberSixteenth\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octoberfirstday": "\n\n\n\n\n\n\n\n\nI didn't see Elizabeth when I woke up that morning.\n\nBefore leaving, I walked around the side of the manor, observing the fire damage.\nThe manor's outer wall was blackened, but was still standing. The grass between\nthe wall and outer gate was burned in large spots. I wondered\nif the attackers had been standing outside the fence, throwing the bombs from all\nthe way out there.\n\nI looked up at the broken windows leading into the library. They were high up,\nand fairly small. I would have thought the attackers aim was impressive, if\nI hadn't nearly gotten struck by one of the bottles.\n\nAt least I made a little money for my time.\n\n*set Cash + 40\n\nThe air was chilly on my walk to school. It was the first day of October, and the\nweather was starting to change for the worse.\n\n*page_break\n\nI didn't see Elizabeth around at all during school. I wasn't sure if she was even\nthere that day.\n\n\"Anyone? Anyone? No volunteers?\"\n\nI sat in my biology class. The teacher lectured as he wrote something on the white board. My\nhead drooped every few moments.\n\n\"Okay, $!{Name}.\"\n\nI perked up. The white board had the word 'Autotrophs' written on it.\n\n\"What do you think they are?\"\n\n*fake_choice\n\t#\"Living things that make their own food with sunlight.\"\n\t\t*set Studies + 2\n\t\t\n\t\t\"That's correct!\" He beamed at me. \"They're also called 'producers'. However,\n\t\tthey don't just use sunlight, there are many producers that live in the ocean and\n\t\trely on ocean vents to produce energy.\"\n\t\t\n\t\tI managed to give the right answer. I found myself paying a bit more\n\t\tattention in class until the bell rang.\n\t\t\n\t\t[i](Estimated grade boosted)[/i]\n\t\t\n\t#\"No idea.\"\n\t\t\n\t\t\"You need to study more.\" He shook his head disappointedly. \"Autotrophs, or 'producers'\n\t\tare creatures that create their own food. These things usually\n\t\tuse sunlight, but there's also sea creatures that rely on underwater\n\t\theat vents to produce energy.\"\n\t\t\n\t#\"Creatures that eat dead bodies.\"\n\t\t\n\t\t\"Nope!\" He smirked. \"You're thinking of decomposers!\"\n\t\tHe turned to the rest of the class. \"Autotrophs, or 'producers'\n\t\tare creatures that create their own food. These things usually\n\t\tuse sunlight, but there's also sea creatures that rely on underwater\n\t\theat vents to produce energy.\"\n\n*page_break\n\nI got a text near the end of the day from my mom. Apparently they didn't need me to come\nin to work today. Not surprising, given the fire damage they were dealing with.\n\nI put the phone away, happy that I was getting a day to myself. Unfortunately, I remembered\npromising to eat dinner with the Leavitts.\n\nMaybe that was the reason I suddenly had the day off.\n\n*page_break\n\nI still had a couple of hours after school before I had to go to dinner.\nThat was plenty of time to find something to do by myself. Plus, I now\nhad some money to spend.\n\n${Cash} dollars to be exact.\n\nMaybe Elizabeth trying to screw with me was for the best.\n\nThe only question was where to go.\n\n\n*fake_choice\n\t#Shop for clothes - not that my t-shirt and jeans are bad... but there's nothing wrong with looking for a new style.\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store - My current selection of books is slightly limited. I've got the money to expand my collection.\n\t\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout - It's been a little while since I've gone to the gym. The local youth center is free, so there's no reason not to.\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Just go for a walk around town - It'd be a nice change of pace, and I might find some place cool. Also, it's free.\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*page_break\n\n\nI returned to the mansion. Several people packed equipment into trucks and left just\nas I arrived. If I had to guess, I'd say they were working on the repairs.\n\nMy mother stood by the front door with Mrs. Leavitt. They seemed to be having an animated conversation\nbefore noticing me.\n\nShe waved me over excitedly.\n\n\"Great news!\" Her smile could not have been wider.\n*if (WearsGoth = 1)\n\t\"Kara's niece... is...\" She looked me over with a curious eye.\n\t\n\tMrs. Leavitt chuckled. \"My niece is going to love you.\"\n\t\n\t\"Huh?\" I looked down at myself. \"Oh, right.\" Well, at least mom wasn't freaking out over the new clothes,\n\tthinking I needed a shrink or something.\n\t\n\tMy mom shook off whatever weird vibe I had given her.\n\"Kara's niece is joining us. I think they're planning to have her live with them for a while! Won't\nthat be fun?\"\n\n\"Kara's niece...\" I looked at Mrs. Leavitt. \"There's more of them?\"\n\nMrs. Leavitt raised a brow at my comment, but didn't seem to take offense to it.\n\n\"That's... great.\"\n\n\"She's only a year older than you and Elizabeth,\" Mrs. Leavitt said. \"I'm sure you two will\nget along just fine.\"\n\nI'd already made an enemy out of one teenage vampire in that house, I wasn't too keen on\nadding another one to the list.\n\n*page_break\n\n*set KnowsMalka 1\n\nIn a lot of peoples' minds there's a stereotypical idea of what a vampire should look like.\nYou see it in television all the time, and it goes beyond merely being pale. Vampires\nare always depicted as wearing all black, and their clothing sometimes looks like it\nbelongs in the Victorian era of fashion. Although, the style is usually updated to better match\nmodern tastes.\n\nHowever, in real life, most vampires don't look like that. If they did, everybody would\nhave already known they existed long before they chose to show themselves.\n\nIn spite of that...\n\nMrs. Leavitt's niece, looked exactly like Hollywood's idea of a vampire.\n\nAll black clothing. Check.\n\nBlack lipstick and mascara. Check.\n\nThe style of her clothing looks like it was popular a couple hundred years ago. Check.\n\nShe was an extremely stylish goth who went by Malka.\n\n\"I haven't seen you in so long!\" Elizabeth seemed genuinely happy to see her cousin. \"How have you\nbeen out in Riverbrook?\"\n\n\"Well, my family's dumping me on you guys since they think I'm going to be lynched, so...\"\n\nElizabeth frowned. \"Right... sorry.\" Her eyes darted to me for just a split second.\n\nI immediately looked down at my plate.\n\n*page_break\n\nThe entire dining room looked great. A clean, white, cloth stretched across a lengthy table.\nThe Leavitt's could probably host a dinner for fifty people at that table if they wanted to.\nA massive chandelier hung over the table. Shimmering crystals hung from it.\n\nThe conversation drifted on. My mother and the Leavitt's talked about 'the meeting' in a\ncouple of months. I had no idea what that was about, and I didn't really care to ask.\n\nElizabeth shifted between talking to her cousin, talking to her parents, and just digging into\nher plate.\n\nApparently vampires ate food too.\n\nI frowned at Elizabeth, eyeing her curiously.\n\nIt occurred to me in that moment that I had never once seen any of the Leavitt's feed on\nanyone's blood. They never explicitly mentioned doing it, and neither did any of the staff.\n\nIt simply never came up.\n\nI kind of wanted to broach the subject with one of them, but it seemed like an\nawkward topic to bring up.\n\n[i]\"Holla, Kara! Say, what's it like consuming human blood?\"[/i]\n\nAnd maybe I was worried it might be taken as an invitation. None of them had tried to\nassault me yet, but... I didn't feel any reason to take that risk.\n\nMy eyes wandered over to Elizabeth's cousin, Malka.\n\n*if (WearsGoth = 1)\n\t*set Malka + 10\n\t*set FlagWoreGothDinner 1\n\t\n\tThe look in her eyes was very approving. It made me nervous.\n\t\n\tI'm guessing she appreciated the style of clothing I wore, seeing\n\tas it was so similar to her own.\n*comment\n\nShe smiled. \"So, I don't think I got your name.\"\n\n\"Oh, uh... I'm $!{Name}.\"\n\n\"Malka.\"\n\n*set Var 0\n\n*label MalkaConversation\n\n*if (Var = 3)\n\t*goto AfterMalkaConversation\n\n*fake_choice\n\t*hide_reuse #\"You said you're from Riverbrook?\"\n\t\t*set Var + 1\n\t\t\n\t\tShe nodded. \"Heard of it?\"\n\t\t\n\t\t\"Not really,\" I said. \"I'm assuming it's not close by?\"\n\t\t\n\t\tShe shook her head. \"I had to take a plane to get out here.\"\n\t\t\n\t\t*page_break\n\t\t*goto MalkaConversation\n\t*hide_reuse #\"How long do you think you'll be staying?\"\n\t\t*set Var + 1\n\t\t\n\t\tShe shrugged. \"Until my parents stop worrying, I guess.\"\n\t\t\n\t\t\"When do you think that will happen?\" I asked.\n\t\t\n\t\tShe smirked. \"Whenever things 'clear up', as they put it.\"\n\t\t\n\t\tMeaning when local hate-groups are nearly gone. Which could be\n\t\ta long, long time depending on where she lives.\n\t\t\n\t\t*page_break\n\t\t*goto MalkaConversation\n\t*hide_reuse #\"You and Elizabeth seem close.\"\n\t\t*set Var + 1\n\t\t\n\t\t\"Of course!\" Malka smirked at Elizabeth. \"Our parents introduced us to each other when\n\t\twe were around six or seven. We've stayed in touch since then. I text her daily.\"\n\t\t\n\t\tElizabeth laughed. \"If only you'd keep our time zone differences in\n\t\tmind when you do.\"\n\t\t\n\t\tShe shrugged. \"What's a couple of hours between family?\"\n\t\t\n\t\t\"I don't appreciate being woken up at midnight because you 'forgot'\n\t\tit wasn't ten over here.\" Elizabeth's tone had a hint of ice to it,\n\t\tbut honestly, she came off pretty sweetly.\n\t\t\n\t\tThey almost seemed like sisters.\n\t\t\n\t\t*page_break\n\t\t*goto MalkaConversation\n\t*hide_reuse #\"I like your style.\"\n\t\t*set Var + 1\n\t\t\n\t\tShe grinned. \"Thanks. \n\t\t*if (WearsGoth = 1)\n\t\t\t*set Malka + 5\n\t\t\tI could say the same about you.\"\n\t\t\t\n\t\t\tI smiled nervously. \"Yeah, I uh, just picked it up today.\"\n\t\t\t\n\t\t\t\"Not your normal style?\" she asked.\n\t\t\t\n\t\t\t\"No, but it's growing on me,\" I said.\n\t\t*if (WearsGoth = 0)\n\t\t\t\"\n\t\t\t\n\t\t\t\"I've actually been a little curious about that style,\" I said.\n\t\t\t\"I've just never really been willing to give it a shot.\"\n\t\t\t\n\t\t\t\"You really should,\" she said. \"Trust me, you won't regret it.\"\n\t\t\t\n\t\t\tI smiled. \"Maybe I will.\"\n\t\t*comment\n\t\t\n\t\tElizabeth rolled her eyes at us.\n\t\t\n\t\tMalka stuck her tongue out at Elizabeth.\n\t\t\n\t\t*page_break\n\t\t*goto MalkaConversation\n\t*hide_reuse #\"When you said your parents were scared you'd be lynched...\"\n\t\t*set Var + 1\n\t\t\n\t\tEvery person sitting at that table tensed. Silence loomed.\n\t\t\n\t\tThat probably was not the best topic to broach.\n\t\t\n\t\t\"Things have been getting a bit violent near my home,\" Malka said. \"My\n\t\tparents didn't think I was safe anymore.\" She looked down at her plate.\n\t\t\"...I can't say that I blame them.\"\n\t\t\n\t\t\"What do you think of that, $!{Name}?\" Elizabeth glared at me. \"People trying\n\t\tto hurt her for not being human?\"\n\t\t\n\t\t\"I...\"\n\t\t\n\t\t*fake_choice\n\t\t\t#[Don't say anything]\n\t\t\t\t*set Elizabeth - 5\n\t\t\t\t\n\t\t\t\t\"If you ask me,\" Elizabeth spoke through gritted teeth. \"People\n\t\t\t\tlike that deserve the absolute worst of whatever they get.\"\n\t\t\t\t\n\t\t\t\tI stared at her, speechless.\n\t\t\t\t\n\t\t\t\tMy mother coughed nervously. \"So... have you been to the movies lately, Kara?\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t#\"I hope your family back home is alright.\"\n\t\t\t\t*set Malka + 5\n\t\t\t\t\n\t\t\t\tMalka smiled weakly. \"Thanks. I don't know what's going to happen, but I\n\t\t\t\tthink they'll be okay.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t#\"I'm sorry.\"\n\t\t\t\t*set Elizabeth + 20\n\t\t\t\t\n\t\t\t\tElizabeth's eyes widened. She stared at me.\n\t\t\t\t\n\t\t\t\t\"It's not your fault,\" Malka smiled. \"It's not like you're one of those people,\n\t\t\t\tright?\"\n\t\t\t\t\n\t\t\t\tElizabeth opened her mouth to say something.\n\t\t\t\t\n\t\t\t\tI stiffened immediately.\n\t\t\t\t\n\t\t\t\t\"I...\" Elizabeth cleared her throat. \"Let's talk about something else.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\n\t\t*goto MalkaConversation\n*label AfterMalkaConversation\n\n\"I think that's enough about me,\" Malka said. \"How about I learn a bit about you?\"\n\nI shrugged. \"Sure.\"\n\n\"You know, I actually had the chance to chat up the servants in this house all day.\"\nMalka's eyes darted between me and Elizabeth, as a grin spread across her face.\n\"There wasn't much else for me to do after all.\"\n\nI raised a brow at her. \"Okay?\"\n\n\"So...\" Her grin widened. \"What's the deal with you and Elizabeth?\"\n\nElizabeth immediately started choking on her food.\n\n\"...What?\" I asked.\n\n\"Well, I've heard the most interesting of talk.\" Malka looked at Elizabeth. \"Seems\na lot of the servants think there might be something going on between you two.\"\n\nWhatever conversation Elizabeth's parents were having with my mom died instantly.\nThey didn't make it totally obvious that they were listening in, but I could\ntell they were committed to eavesdropping now.\n\n*if (FlagRanWithRumors = 1)\n\tPretending to be Elizabeth's ${Boyfriend} in front of her friend might have\n\tbeen funny, but this wasn't school.\n\t\n\tMy mother was watching, not to mention Mr. and Mrs. Leavitt themselves.\n*if (FlagRanWithRumors = 0)\n\tPeople at school thought we were dating, but I was surprised the servants\n\tthought so as well. Maybe Elizabeth had hung around a little too closely.\n*comment\n\n\"Those rumors are completely baseless!\" Elizabeth nearly shouted as she spoke.\n\nI winced at the sight of blush filling her cheeks. That couldn't have looked\ngood to her parents.\n\n\"Really?\" Malka fished her phone out of her pocket. \"Because I got the most interesting\ntext from Roxy... thanks for introducing us by the way.\" She winked at Elizabeth.\n\"I might have missed out on this if it wasn't for her.\"\n\nMalka showed us the screen to her phone. A text from Roxanne was displayed on the screen.\n\n'Your never going to believe this!! Elizabeth got herself some sort of secret ${Boyfriend} or something!\nShes being super coy about the whole thing. She wouldnt fess up even with ${Him} right by her. She just\nran off. I'm gonna get more details later'\n\n[i]Oh boy.[/i]\n\n\"That was just a misunderstanding.\" I looked to Elizabeth for support. Her face was completely red,\nand she said nothing.\n\nI took that as a cue that I'd have to lead the charge on this issue.\n\n\"I was helping her out around school. Some people got the wrong idea.\"\n\n\"Uh-huh.\" Malka looked at Elizabeth. \"What was ${He} helping you with?\"\n\n\"$!{He} was carrying my books.\"\n\nIt took every ounce of willpower in my body not to face palm at that.\n\nI shot an annoyed look at Elizabeth.\n\nShe glared back, and spoke in a hushed whisper. \"What was I supposed to say?\"\n\n*fake_choice\n\t#\"Not that!\"\n\t\t\"Aww... they're having a lovers quarrel,\" Malka said.\n\t#\"You were supposed to lie!\"\n\t\t\"Aww... they're having a lovers quarrel,\" Malka said.\n\t#\"Just let me do all the talking!\"\n\t\t\"Aww... they're having a lovers quarrel,\" Malka said.\n*comment\n\n\"Malka!\" Elizabeth sneered at her cousin. \"Stop!\"\n\nOur parents really were just staring. No subtlety, no pretending to talk about\nsome random topic while really listening in. They were just blatantly looking our way.\n\n*label DinnerEnd\n\n*fake_choice\n\t*hide_reuse #\"We really aren't dating. That's all I can say.\"\n\t\t\"And yet... nobody's convinced.\" Malka's grin inched a little wider.\n\t\t\n\t\tMy eyes narrowed at her teeth. Her lips had parted just enough to reveal a lack of\n\t\tfangs.\n\t\t\n\t\t[i]Is she not a vampire?[/i]\n\t\t\n\t\t*goto DinnerEnd\n\t*hide_reuse #\"So... will you be attending school with us?\"\n\t\t\"Yes.\" She tilted her head. \"Was that your best attempt at changing the subject?\"\n\t\t\n\t\t\"No. Er- I mean...\"\n\t\t\n\t\tShe laughed.\n\t\t\n\t\t*goto DinnerEnd\n\t*hide_reuse *if (Charm = 1) #(Charm) \"She's not exactly my type. I'm into people with more... unique, interests.\"\n\t\t*set Malka + 5\n\t\t\n\t\t\"Is that a fact?\" She asked. \"And exactly what sort of 'unique' interests are you talking about.\"\n\t\t\n\t\t\"Well for starters...\" I eyed her clothes. \"Fashion choice. I'm into something a bit... darker.\"\n\t\t\n\t\t*if (WearsGoth = 1)\n\t\t\t*set Malka + 5\n\t\t\t\"I can tell.\n\t\t\t\n\t\t\"You'd better be careful.\" She smirked. \"Your girlfriend might get jealous if she thinks your\n\t\tflirting.\"\n\t\t\n\t\t\"I've got nothing to worry about, since we're not really dating.\"\n\t\t\n\t\t\"Hmm...\" Malka shook her head. \"I'm not buying it.\"\n\t\t\n\t\t*goto DinnerEnd\n\t*hide_reuse #\"I think I'm done eating for the night.\"\n\t\tI stood up from the table. \"Thank you for having me, Mr and Mrs. Leavitt. I should really go...\n\t\tstudy.\"\n\t\t\n\t\tI felt a little bad for leaving Elizabeth back there. Hopefully she wouldn't say anything stupid\n\t\tto her cousin.\n*comment\n\nI let out a sigh of relief the moment I got back to the guest house. The faster we got our own place,\nthe better.\n\nI walked into my bedroom, and considered my options.\n\n*label Tasks\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto AfterTasks\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto Tasks\n\t\t*goto AfterTasks\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home, then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto AfterTasks\n\t#Change style (Free action)\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto Tasks\n\n*label AfterTasks\n\n*page_break\n\n*goto_scene octoberFirstWeek\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "octoberfirstweek": "\n*comment October 2nd, Thursday\n\n\n[i]Today is October 2nd, Thursday.[/i]\n\n\nThe next morning I still didn't see Elizabeth.\n\nThe weather was getting colder. I put my hands in my pockets, and felt a familiar stone.\n\nI still carried it around with me. It was superstitious. And slightly nonsensical, seeing\nas it would supposedly lead me to more weird monsters, but I was just enamored with that book.\nSomething about that spell just got stuck in my head.\n\nThe Leavitt's said I could come in today for work, but they probably wouldn't have much for me to\ndo. Still, a couple hours of work could still make me a little money. They made it clear it was optional.\nIt I wanted to come in and work, then I could just come in and work, otherwise... I could do whatever.\n\nI looked up at the sky.\n\nIt was pretty cloudy. Might be rain.\n\n*page_break\n\nAs I was about to walk to school, I found myself repeatedly looking out at the woodland nearby.\nI was fairly certain I wouldn't get lost on my way to school if I cut through the woods.\n\nIn fact, the more I dwelled on it, the more appealing the idea seemed.\n\nI rubbed a thumb against the stone in my pocket.\n\n*page_break\n\n*fake_choice\n\t*hide_reuse #I might see something cool while I'm out there.\n\t\t*comment\n\t\t\n\t*hide_reuse #It would be nice to take in the sights. It's got to be better than walking along the road.\n\t\t*comment\n\t\t\n\t*hide_reuse #I don't think there are any poisonous snakes or anything like that around here. It's probably safe.\n\t\t*comment\n*comment\n\nI didn't venture far from the road. Or rather, I tried not to.\n\nThe further I walked, the more I drifted away from it. It wasn't too long before I completely\nlost sight of it.\n\nI didn't mind though. I was content to listen to the sounds of nature around me. The rustling\nof the trees. The occasional chirp of a bird, or buzz of an insect.\n\nI let myself wander. I had time.\n\n*page_break\n\nI stumbled across a large clearing. Two trees grew in the center of it. Both leaned to the\nside, so much so that it looked like they might fall over. They crossed one another, forming\na large 'X'.\n\nI felt drawn toward them.\n\nThe clearing was empty, and not quite overgrown. A few trails in the grass led from the trees\nand off toward the surrounding forest.\n\nSomebody had been repeatedly coming by on a regular basis.\n\nIt was a nice spot. I could see why people would make a habit of stopping by.\n\n*page_break\n\nI was missing something, I could feel it.\n\n*page_break\n\nI approached one of the trees and ran a hand along\nits trunk. There wasn't anything out of the ordinary about it.\n\nI looked up at the leaves. They swayed in the breeze, and otherwise seemed unremarkable\n\n\"What are you doing here!?\"\n\nI jumped back. Roxanne stood before me, her eyes wide.\n\nI looked around. There was a lot of distance between me and forest. There was no way\nshe could have snuck up on me that fast.\n\nI smiled. \"I guess Elizabeth must have taught you how to do that.\"\n\n\"What!?\" Roxanne shouted. \"She told you about this?\"\n\nI gave her a blank stare.\n\n\"I...\" She raised a brow at me. \"Where do you think you are right now?\"\n\n\"Uh...\"\n\n*fake_choice\n\t#\"A clearing in the woods?\"\n\t\t*comment\n\t#\"A field with two trees?\"\n\t\t*comment\n\t#\"On my way to school?\"\n\t\t*comment\n\t#\"...I have no idea.\"\n\t\t*comment\n*comment\n\nRoxanne relaxed. \"C'mon. You shouldn't be over here.\"\n\n\"Well, alright, but- hey!\"\n\nRoxanne roughly grabbed my arm and dragged me away.\n\n*page_break\n\nOn the way to school Roxanne insisted that she had just been out for a morning jog\nwhen she saw me.\n\nI did not buy that for even one second.\n\n*page_break\n\n\"Hey.\" Matthew plopped down across from me in the cafeteria.\n\nI looked up, and saw he had a black eye.\n\n\"How'd you get...\" My eyes fell to his arms. They were covered in bruises\nand scratches. \"Oh my god.\"\n\nHe beamed. \"I know, right? I'm making a lot of progress!\"\n\n[i]...What is he talking about again?[/i]\n\n\"Um...\" I smiled sheepishly.\n\n*fake_choice\n\t#\"Yeah, man. Glad to hear it!\" (I can fake my way through this. Probably)\n\t\t\n\t\tHe raised a brow at me. \"Yeah?\"\n\t\t\n\t\t\"Uh... yeah!\"\n\t\t\n\t\tMatthew crossed his arms. \"And what am I doing again?\"\n\t\t\n\t\t[i]I'm faking and he knows![/i]\n\t\t\n\t\tI gave a nervous chuckle. \"Oh... training?\"\n\t\t\n\t\tHe laughed. \"That is actually right.\"\n\t\t\n\t\t\"Nailed it!\"\n\t\t\n\t#\"Does this have something to do with what you wanted to do after school the other day?\"\n\t\t\n\t\tHe grinned. \"You could say that.\"\n\t\t\n\t#\"Are you alright?\"\n\t\t\n\t\t\"Of course!\" He laughed. \"You think I can't take a hit?\"\n\t\t\n\t\t\"How'd that even happen?\"\n*comment\n\n\"I got an invitation to the local hunter lodge.\"\n\nBefore the big reveal that supernatural creatures existed, there were always humans that\nknew about them. These creatures were dangerous, but law enforcement wasn't always an\noption. Or in some cases, simply not enough.\n\nWhen monsters revealed themselves, hunters inevitably came out of the woodwork too. Their\nbusiness is quasi-legal in most places, though regulation varies greatly.\n\nHunters have existed for hundreds of years, enduring throughout the ages. They have one\njob.\n\n*page_break\n\nKill any monsters that threaten humanity.\n\n*page_break\n\n\"They've started training me,\" Matthew said. \"I'll be following in my mom's footsteps.\"\n\n\"I suppose you are,\" I said. \"Wait... does that mean you were inviting me? Were you allowed\nto do that?\"\n\n\"My mom's a veteran hunter. I could get away with it. Shame you have a job, otherwise-\"\n\n\"Actually. I only sorta have a job now,\" I said. \"I can come in and work a couple of hours\nwhenever I want, but I don't actually have to. Some stuff happened. They don't need me as much.\"\n\nMatthew beamed. \"Alright! So you'll come? I can still get you in.\"\n\n*temp GoLodge 0\n\n*fake_choice\n\t#\"Of course! I'll come after school.\"\n\t\t*set Matthew + 5\n\t\t*set GoLodge 1\n\t\t\n\t\t\"Perfect! I can't wait!\"\n\t\t\n\t#\"I'll think about it.\"\n\t\t\n\t\tMatthew frowned. \"Alright. But trust me, you won't regret it.\"\n\t\t\n\t#\"I don't know...\"\n\t\t\n\t\t\"Oh, c'mon!\" Matthew pleaded. \"You won't regret coming.\"\n\t\t\n\t\t\"I-\"\n\t\t\n\t\t\"Just think about it. Okay?\"\n\n*page_break\n\nThe day passed quickly enough after that.\n\n*page_break\n\n*if (GoLodge = 1)\n\t*gosub_scene subHunterLodge\n\t*goto LodgeSkip\n\nI walked away from the school, and considered my options.\n\n*label FirstAfterSchool\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThe only person I knew who had something interesting going on right now was Matthew.\n\t\t\n\t\tWell, he did want me to join him at the local hunters lodge. And not many get to see\n\t\tthe inside of that place.\n\t\t\n\t\tOf course, I could always do some work at the Leavitt's. There wasn't as much to do,\n\t\tso it wouldn't pay as well, but it was something.\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t*goto LodgeSkip\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\tI worked around their house for a few hours.\n\t\t\t\tLike before, I was still mostly just cleaning.\n\t\t\t\t\n\t\t\t\tI didn't see Elizabeth around. I guessed she was still\n\t\t\t\tavoiding me over what happened at dinner.\n\t\t\t\t\n\t\t\t\t*goto LodgeSkip\n\t\t\t#Do something else\n\t\t\t\t*goto FirstAfterSchool\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label LodgeSkip\n*page_break\n\n\nIt was late when I finally returned to my room for the evening. A familiar urge was tugging at me.\n\nI pulled the black book out of its hiding spot.\n\n*page_break\n\nIt felt good to hold it in my hands again. I took my time, studying the cover, letting the cover's\ntexture sink into my fingers.\n\nI set it on my desk, and opened it again.\n\nI flipped ahead until I was just past the first spell.\n\n*page_break\n\n'I had the guide, but not the torch. The path was clear, but I was too blind to follow it.\nThe spell tugged at my soul, guiding me forward, but it wasn't enough. I found myself pulled\nto seemingly nondescript locales. There was nothing special about them.'\n\n'But I knew that wasn't true. I could feel it in my bones. There was something more before\nme, I simply couldn't see it.'\n\n'Our world holds many dark secrets, but why are they not more known to us? Monsters are\nfeared and hunted all around the world endlessly. How then, can they remain hidden? Men\nscour the forests with swords and guns. They carry silver blades, and holy relics. How \nhave they not found anything?'\n\n'They've hidden somewhere beyond humanity. Some place we cannot simply walk into.'\n\n'The world exists in layers, each woven atop the other. I was pulled to where these\nbeings hide, but I could not yet touch them. They existed out of sync with the world\nI knew of.'\n\n'I searched for a way to connect with them. To physically exist alongside them.'\n\n'My research gave me the answer.'\n\n*page_break\n\n'There was a gate. One that couldn't be seen with the naked eye. This gate\nwould be locked, with passage given only to those with the right key. At the\ntime, I had no connections to the other side. No allies I could call upon to\ngrant me access to their secret domain.'\n\n'The situation seemed hopeless. Until I was struck with a realization.'\n\n'Perhaps I didn't need a key. Maybe all I needed was a tool to pick the lock.'\n\n'Could such a thing exist?'\n\n'To my good fortune, there was.'\n\n*page_break\n\nThe gate wouldn't literally be a door, but it would be a clear\npoint of passage. Objects were imbued with special properties that\nthe gateway would recognize. If a person passed through this gate while\ncarrying the necessary object, they would be transported to the other side.\n\nOtherwise, nothing would happen, and those left out of the loop would be none\nthe wiser.\n\nThe last page detailed a spell to 'trick' a gateway into letting someone through\nwithout a 'key'. The spell required finding an object from the other side of the\ngate.\n\nI stared at the page.\n\n\"How am I supposed to do that!?\" I flipped the book shut.\n\n[i]If I can't pass through this 'gateway' then I can't grab anything from the other side of it.[/i]\n\nI rubbed the back of my neck.\n\n[i]Unless someone from the other side brings something through...[/i]\n\nIt didn't seem like it would be easy. I'd have to find someone who was regularly coming and\ngoing from a gateway, then hope they brought something through with them. And then somehow\nconvince them to hand over whatever they brought out.\n\nAnd also there was the issue of actually finding a gateway to test this spell out on.\n\nI thought back to the author's writing. He mentioned somehow knowing that he was in\nfront of a gate, even if it didn't look unusual.\n\nI had felt something similar.\n\nI'd need to go back there.\n\n*page_break\n\nI still had some time before bed.\n\nI considered my options.\n\n*label TasksOne\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto AfterTasksOne\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto TasksOne\n\t\t*goto AfterTasksOne\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto AfterTasksOne\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto TasksOne\n\n*label AfterTasksOne\n\nIt was getting pretty late, so I finally collapsed onto my bed, and went to sleep.\n\n*page_break\n\n[i]Today is October 3rd, Friday.[/i]\n\nI woke up half an hour earlier than I normally would. I showered and got dressed as quickly\nas possible.\n\nI took off into the woods.\n\nThe sky wasn't any clearer than it had been the day before. I left for school so early that\nthe forest was extremely dark.\n\nDespite that, I knew where to go. I didn't recognize my surroundings, but I could feel\na pull in my core. I knew which way to go.\n\n*page_break\n\n*if (Sneak = 1)\n\t[i]Sneak[/i]\n\t\n\tWhen I neared the clearing, I crouched low. I took pains to avoid breaking\n\ttwigs or crushing leaves. I kept my steps slow and measured.\n\t\n\tI crept behind a thick shrub growing near the clearing's edge.\n\t\n\tI saw the two trees, and had a direct view of the gap between them.\n\t\n\tThe only thing to do was wait for someone to appear.\n\t\n\t*page_break\n\t\n\tMinutes passed, and I remembered I would eventually have to go to school.\n\t\n\t[i]Maybe it would have been better to do this on the weekend...[/i]\n\t\n\tI decided to wait for as long as I could.\n\t\n\t*page_break\n\t\n\tI felt tired. My head kept drooping, and my eyelids felt heavy.\n\t\n\tI started to doze, but snapped myself out of it.\n\t\n\tSomebody stood by the crossed trees.\n\t\n\tI strained my eyes against the darkness of the forest. Whoever it\n\twas spun around, and stared at the gap between the trees.\n\t\n\tSomebody else appeared. It wasn't quite as flashy as I had expected.\n\tThere was no magical door tearing open space and time. The person\n\tliterally just popped into existence.\n\t\n\tI grumbled slightly. I just couldn't make out much.\n\t\n\tThey were both women, that was certain.\n\t\n\tI leaned forward and squinted.\n\t\n\t*page_break\n\t\n\tSomebody was hiding on the other side of the clearing.\n\t\n\tAt first I thought it was trick of my eyes, but there was\n\tdefinitely someone standing amongst the distant shrubbery.\n\t\n\tA man. Very tall. He wore something on his head. It didn't\n\tseem to be a hat.\n\t\n\tHe was looking at me. Or, it felt like he was. I couldn't really\n\texplain why.\n\t\n\tAnxiety crept down my spine.\n*if (Sneak = 0)\n\tI stood at the edge of the clearing, and sat down, waiting.\n\t\n\tI had a great view of the gap between the crossed trees. If\n\tanyone passed through, I'd definitely see them.\n\t\n\tFor several minutes nothing happened.\n\t\n\t*page_break\n\t\n\tSo naturally, I nodded off without meaning to.\n\t\n\tI only woke when I heard footsteps approaching me.\n\t\n\tI looked up, my eyes bleary. I couldn't immediately make out\n\tthe two women ahead of me.\n*comment\n\n\"What are you doing?\" Elizabeth asked.\n\n*if (Sneak = 1)\n\t\"Gah!\" I flinched back. \"Oh. Uh...\"\n\t\n\t[i]Huh... I'm surprised I didn't recognize them.[/i]\n*if (Sneak = 0)\n\tI shot to my feet. \"Oh! Uh...\"\n\t\n\t[i]Whoops...[/i]\n*comment\n\nRoxanne crossed her arms. \"You're out here again? What is this?\"\n\n*fake_choice\n\t#\"Nothing.\"\n\t\t\n\t\tElizabeth face palmed, and walked away.\n\t\t\n\t\tRoxanne. Looked. Pissed.\n\t\t\n\t\t\"Are you freaking kidding me right now!? What are you doing out here?\" She\n\t\tsnarled at me. \"This isn't funny.\"\n\t\t\n\t\tI took a step back. \"Easy-\"\n\t\t\n\t\tShe got a inch from my face. \"I don't know what you're up to, but don't\n\t\tcome back here again.\"\n\t\t\n\t\tShe stormed off.\n\t#\"It just seemed like a great spot when I came by it before, so...\"\n\t\t\n\t\tElizabeth and Roxanne shared a look.\n\t\t\n\t\t\"...I just figured I'd hang out around here before school today.\"\n\t\t\n\t\t*if (Sneak = 1)\n\t\t\t\"And why were you crouched down like that?\" Roxanne asked.\n\t\t\t\n\t\t\t\"Uh... because...\"\n\t\t\t\n\t\t\"Enough.\" Roxanne took a deep breath. \"Whatever this is. Whatever you're\n\t\ttrying to do. Drop it.\"\n\t\t\n\t\tShe and Elizabeth left.\n\t\t*comment\n\t\t\n\t\t*goto GlitchBreak\n\t*if (Sneak = 1) #\"I was looking at that guy.\"\n\t\tI peered past them, out into the woods, but I couldn't see him anywhere.\n\t\t\n\t\t\"Who?\" Elizabeth asked, looking around.\n\t\t\n\t\t\"There was some guy over there,\" I said. \"He was just staring. It was weird.\"\n\t\t\n\t\tRoxanne tilted her head to the side. \"Right. Listen.\" She stepped up to me. \"I'm\n\t\tnot sure what's going on here, but you need to not be here anymore. Do not come\n\t\tback here. Understood?\"\n\t\t\n\t\tI nodded.\n\t\t\n\t\t\"C'mon, Elizabeth.\" Roxanne left. Elizabeth followed.\n*comment\n\n*label GlitchBreak\n\n*page_break\n\nAlright. This was going to be difficult.\n\nIt was pretty clear Roxanne was going to do everything in her power to stop me from\ngoing back there.\n\n\"You just tossing that away?\" Roxanne asked.\n\nElizabeth shrugged, as something fell to the grass beside her.\n\nI walked over, and saw a strange fruit.\n\nIt was round, bright red, and mostly eaten. It's insides were yellow. I saw\na large brown seed nestled in its core.\n\nI quickly snatched up the fruit, and pocketed it.\n\n[i]Well that was easy. Unless she brought whatever this fruit was in with her.[/i]\n\nI mulled that over. When I had to find something from the other side of the gate,\ndid that count things that were initially brought over from this side? If that was\nthe case, I probably could have just lent Elizabeth a pen for the day and been\nguaranteed access.\n\nOn the other hand... that did sound a little too easy.\n\nDuring our walk to school, I broke away from Elizabeth and Roxanne. I pulled\nout the fruit, and removed its seed. I was pretty sure that fruit would be\nrotted by the time I could make any use out of it. I hoped the seed would\nlast longer.\n\n*page_break\n\nThe day passes quickly after that, and school let out.\n\n*label SecondAfterSchool\n\n*fake_choice\n\t#Shop for clothes\n\t\t\n\t\tI went to the local mall. It's in walking distance, and has a huge selection of stores to choose\n\t\tfrom.\n\t\t\n\t\t*gosub_scene subShopClothes\n\t#Go to the book store\n\t\n\t\tI went to the nearest book store. It was a quaint little shop run by a nice old lady.\n\t\t\n\t\t*gosub_scene subShopBooks\n\t#Workout\n\t\t\n\t\tThe local youth center lets people my age workout for free, so it's a pretty good option for me. It's\n\t\tnot quite as fancy as some of the more expensive gyms, but it's just as good.\n\t\t\n\t\t*gosub_scene subWorkout\n\t#Activities\n\t\t\n\t\tThere were a couple of options\n\t\t\n\t\t*fake_choice\n\t\t\t#Go to The Hunters Lodge\n\t\t\t\t\n\t\t\t\t*gosub_scene subHunterLodge\n\t\t\t\t*goto SecondEvening\n\t\t\t\t\n\t\t\t#Work at the Leavitt's manor\n\t\t\t\t*set Cash + 20\n\t\t\t\t\n\t\t\t\t*gosub_scene subLeavittManor\n\t\t\t\t\n\t\t\t\t*goto SecondEvening\n\t\t\t#Do something else\n\t\t\t\t*goto SecondAfterSchool\n\t\t\n\t#Just go for a walk around town\n\t\t*set ExploredTown + 1\n\t\t*set Athletics + 1\n\t\t\n\t\tI just went for a pleasant stroll around town. I made a point of walking around parts I wasn't\n\t\tfamiliar with. Unfortunately, I didn't see anything particularly interesting. Still, it was a little\n\t\tbit of a workout, if nothing else.\n*comment\n\n*label SecondEvening\n\n*page_break\n\nWhen I arrived at my room, the first thing I did was pull out the black book.\n\nI still had the large seed in my pocket.\n\nI'd need to draw another circle, again, with symbols given certain positions\nwithin it.\n\nAnd once again, there was an illustration present in the book that I figured\nwould work just fine.\n\nI couldn't perform the spell in my room, I'd need to go to the gateway, and use\nit there.\n\n*page_break\n\nThe only problem was Roxanne. I'd gone to the gate twice in two days, and been caught\nboth times. The possibility that she'd be expecting me the next day was a distinct\nrisk. Not to mention I'd have the book on me then.\n\nThere was no way she wouldn't guess I'd taken it from the Leavitt's without permission.\n\n*page_break\n\nThere was nothing I could do. I couldn't risk getting caught again with the book.\n\nI'd need to lay low for a little while. If I didn't show up at the gate again\nfor a week or so, she'd forget about me.\n\nUntil then, I just had to bide my time.\n\n*page_break\n\nI still had time before I needed to turn in for the night. I considered my options.\n\n\n*label TasksTwo\n\n*choice\n\t#Study\n\t\tI grabbed a textbook.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subStudy\n\t\t*goto AfterTasksTwo\n\t#Read\n\t\tI grabbed a book.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto TasksTwo\n\t\t*goto AfterTasksTwo\n\t#Exercise\n\t\t*set Athletics + 2\n\t\tI cycled between doing push ups, crunches, and squats in my room for a while. I\n\t\tcould never seem to work out as much at home then when I go to the gym.\n\t\t\n\t\tStill, a workout's a workout.\n\t\t*goto AfterTasksTwo\n\t#Change style\n\t\tI looked at my available wardrobe\n\t\t\n\t\t*gosub_scene subChangeClothes\n\t\t*goto TasksTwo\n\n*label AfterTasksTwo\n\n*page_break\n\nThe evening spent, I turned in for the night.\n\n*page_break\n\nI woke up early, and groggily shuffled out of my bedroom.\n\nThe guest house was dark and quiet. I faintly heard snoring coming from the room\nmy mom slept in.\n\nI stretched. \"Heh, I'm surprised she's not already...\"\n\nI stopped.\n\n\"Already...\"\n\n*page_break\n\n[i]Today is October 4th, Saturday.[/i]\n\n*page_break\n\nI ran back inside my room, and threw myself down on the bed.\n\n[i]Saturday! Yes![/i]\n\nI yawned, stretched out, and snuggled into the covers.\n\nMy eyes drifted shut.\n\n*page_break\n\nAnd then immediately flew back open.\n\n\"God. Dammit...\" It was too late. I was already awake.\n\n*page_break\n\nI took my time getting up that morning. I had no real plans.\n\nTrying to approach the gate that early still felt too risky, but\nI didn't have much else going on.\n\n*if (MatthewEvents > 0)\n\tI could go back to the Hunters Lodge to train some more.\n*if (MatthewEvents = 0)\n\tI could ask Matthew about the Hunters Lodge. He might\n\tstill want to show me around.\n\nI took a long shower that morning, still mulling over my options.\n\nWhen I stepped out, I saw my phone had a couple of messages waiting\non it.\n\n*page_break\n\nI picked up my phone.\n\n*label Test\n*temp CheckedBoth 0\n\n*choice\n\t#'Unknown Number: 1 message'\n\t\t*label MalkaConversation\n\t\t\n\t\t'Heya, $!{Name}. We haven't talked since dinner and im new to the area\n\t\tmaybe you could show me around?'\n\t\t\n\t\t*if (CheckedBoth > 1)\n\t\t\t*choice\n\t\t\t\t#'Sure, why not?'\n\t\t\t\t\t'Great. Me meet in front of the manor.'\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto MalkaHangout\n\t\t\t\t#[Check other message]\n\t\t\t\t\t*goto MatthewConversation\n\t\t\n\t\tI raised a brow a the message. I texted back...\n\t\t\n\t\t*set Var 0\n\t\t*temp KnowSender 0\n\t\t\n\t\t*label MalkaTexting\n\t\t\n\t\t*choice\n\t\t\t*hide_reuse #'Who is this?'\n\t\t\t\t*set Var + 1\n\t\t\t\t*set KnowSender 1\n\t\t\t\t*if (CheckedBoth = 1)\n\t\t\t\t\t*set CheckedBoth + 1\n\t\t\t\t\n\t\t\t\t'Malka. Duh.'\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto MalkaTexting\n\t\t\t*hide_reuse #'How did you get this number?'\n\t\t\t\t*set Var + 1\n\t\t\t\t\n\t\t\t\t'I've got my sources ;p'\n\t\t\t\t\n\t\t\t\tI frowned at the text. I'd be having some words\n\t\t\t\twith my friends later.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto MalkaTexting\n\t\t\t*hide_reuse *if (KnowSender = 1) #'Wouldn't you rather hang out with Elizabeth?'\n\t\t\t\t*set Var + 1\n\t\t\t\t\n\t\t\t\t'I've been catching up with her for the last few days. Plus I want to get\n\t\t\t\tto know her $!{Boyfriend} a little better.'\n\t\t\t\t\n\t\t\t\tI tried to type out a denial, but another message arrived before I finished.\n\t\t\t\t\n\t\t\t\t'jk ;p'\n\t\t\t\t\n\t\t\t\tI guessed Elizabeth managed to convince her I wasn't her ${Boyfriend}. I hoped\n\t\t\t\tthat didn't involve mentioning me being in that mob.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto MalkaTexting\n\t\t\t*if (Var > 1) #[Check other message]\n\t\t\t\t*set CheckedBoth + 1\n\t\t\t\t*set Var 0\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto MatthewConversation\n\t\t\t*if (CheckedBoth > 1) #'Sure, why not?'\n\t\t\t\t\t'Great. Meet me in front of the manor.'\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto MalkaHangout\n\t#'Matthew: 1 message'\n\t\t*label MatthewConversation\n\t\t\n\t\t'Hey man. Wanna hang out today? I've got a great location scoped out.'\n\t\t\n\t\t*if (CheckedBoth > 1)\n\t\t\t*choice\n\t\t\t\t#'Sure.'\n\t\t\t\t\t'Alright! Let's meet up near the school. I'll show\n\t\t\t\t\tyou the way from there.'\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto MatthewHangout\n\t\t\t\t#[Check other message]\n\t\t\t\t\t*goto MalkaConversation\n\t\t\n\t\t*set Var 0\n\t\t\n\t\t\n\t\t*label MatthewTexting\n\t\t\n\t\t\n\t\t*choice\n\t\t\t*hide_reuse #'Where?'\n\t\t\t\t*set Var + 1\n\t\t\t\t\n\t\t\t\t'Its in the woods next to the river. Totally perfect.'\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto MatthewTexting\n\t\t\t*hide_reuse #'Scoped out for what?'\n\t\t\t\t*set Var + 1\n\t\t\t\t\n\t\t\t\t'Hardcore training. You and me. Exercise and sparring.'\n\t\t\t\t\n\t\t\t\t*if (Fighting = 0)\n\t\t\t\t\t'Sparring?' I typed back. 'I don't know anything\n\t\t\t\t\tabout that.'\n\t\t\t\t\t\n\t\t\t\t\tMatthew replied, 'I'll help you out. C'mon. It'll be fun.'\n\t\t\t\t\n\t\t\t\tApparently Matthew was looking to expand his skills.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto MatthewTexting\n\t\t\t*if (Var > 1) #[Check other message]\n\t\t\t\t*set CheckedBoth + 1\n\t\t\t\t*set Var 0\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto MalkaConversation\n\t\t\t*if (CheckedBoth > 0) #'Sure.'\n\t\t\t\t\t'Alright! Let's meet up near the school. I'll show\n\t\t\t\t\tyou the way from there.'\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto MatthewHangout\n*comment\n\n\n\n*label MalkaHangout\n\n*set Malka + 20\n\nI sent Matthew a quick apology, stating I already made plans\nbefore heading out to the front of the manor.\n\nMalka smiled and waved at me from the front gate.\n\nShe looked more or less the same as she did at dinner. The only noticeable\ndifference was that she wore thicker black makeup than she had before. \n\n*if (WearsGoth = 1)\n\tShe eyed my clothing. \"Looking good.\"\n\t\n\t\"Thanks,\" I said. \"You too.\"\n\n\"So... we just wandering around, or do you know some place interesting around here?\" She\nasked.\n\n\"Some place interesting...\" I thought about that.\n\nThere was the mall. I wasn't sure it was interesting exactly, but it could be fun.\n\n*page_break\n\n\"The mall, huh?\" Malka smirked as walked through the mall's crowded parking lot. \"Not\nexactly a unique choice, but I guess it'll do.\"\n\n\"Yeah...\" I scratched the back of my head. \"It just seemed like the most obvious choice.\"\n\nWe wandered the many stores. Malka took her time, gazing through each shop's window.\nShe seemed... impressed really. She even went as far as to give a slight hum at some\nof the flashier shops merchandise.\n\nI laughed.\n\nShe looked my way.\n\n\"Sorry,\" I said. \"It's just- you act like you've never been in a mall before.\"\n\n\"I haven't.\"\n\n\"Heh... oh.\" I frowned. \"Wait, what?\"\n\nShe shrugged. \"We didn't have one out in Riverbrook. It was a pretty small town.\"\n\n*page_break\n\nWe came across a shop called 'Gothic Central'.\n\n\"Ooh.\" Malka rushed up to the window. \"Have you been in there?\"\n\n*if (WearsGoth = 1)\n\tI looked at my clothes, then back at her.\n\t\n\tShe smirked. \"Right.\"\n\t*if (OwnsGoth = 1) and (WearsGoth = 0)\n\t\tI nodded. \"I actually bought an outfit from here.\"\n\t\t\n\t\t*if (FlagWoreGothDinner = 1)\n\t\t\t\"The same one you wore at dinner the other night?\" Malka asked.\n\t\t\t\n\t\t\t\"Yeah, that's the one.\"\n\t\t*comment\n\t\t\n\t\t\"Shame you aren't wearing it,\" Malka said. \"I'm a huge fan of this style. It'd\n\t\tlook great on you.\"\n*comment\n\nShe approached the store's entrance. \"Mind if I check it out?\"\n\n*page_break\n\nThe store was lined with shirts depicting characters from various cartoons.\nThe words 'sale' was plastered over the wall above them.\n\n'up to 20% off or more!'\n\n\"Up to X off or more?\" I rolled my eyes. \"Yeah, right. It'll be twenty percent at most, probably lower.\"\n\nMalka elbowed me. \"Look who's taking the sale seriously.\"\n\nI chuckled.\n\n\"Hmm. The selection's not terrible.\" Malka crossed her arms, looking over the store. \"I think\nordering my clothes online is a better option though.\"\n\n\"Really?\" I asked.\n\nShe nodded. \"It can get a bit pricey sometimes though. Especially for the name brand stuff.\"\nMalka gave a little twirl, while emphasizing her own dress. \"Looking this good doesn't come cheap.\"\n\n*fake_choice\n\t#\"Humble are we?\"\n\t\tShe smirked. \"It's just one of my several great qualities.\"\n\t\t\n\t\t\"Wow.\" I shook my head. \"You're incredible.\"\n\t\t\n\t\t\"I know.\"\n\t#\"If you're looking for a sticker shock, check out U-Central.\"\n\t\t\"That gaudy store on the other side of the mall? Pass.\"\n\t\t\n\
