rn\n*comment\n\n\n\n\n\n*if (ElizabethEvents = 5) and (Elizabeth >= 100)\n\t*set ElizabethEvents 6\n\t*set Elizabeth + 5\n\t\n\tThe school day was over. I was planning to go work at the Leavitt Manor again, but...\n\t\n\tI just felt really pissed off.\n\t\n\tMy thoughts drifted back to Elizabeth. Again.\n\t\n\t*page_break\n\t\n\tIt was hypocritical of me of course. I had no right to be outraged at her treatment.\n\t\n\tBut I was.\n\t\n\tIt was almost funny. I had to ask myself: How did it come to this?\n\t\n\tFrom throwing rocks, to being worried about her emotional well being.\n\t\n\t*page_break\n\t\n\tI stepped onto the side walk surrounding the school when I spotted Elizabeth\n\tout of the corner of my eye.\n\t\n\tShe stood in a nearby grassy field with Roxanne. I could hear shouting from some guy and Roxanne.\n\t\n\tI approached.\n\t\n\t*page_break\n\t\n\t\"You'd better shut your mouth.\" Roxanne snarled at him.\n\t\n\t'Him' being a guy from our grade. Brown hair. Short. Kinda lanky.\n\t\n\tHe looked familiar.\n\t\n\t\"I thought after tossing a few rocks your way, you'd learn to stop coming outside.\"\n\t\n\t\"Oh.\" I frowned. \"Right.\"\n\t\t\n\t*page_break\n\t\n\t\"Let's just go,\" Elizabeth said, grabbing Roxanne's arm.\n\t\n\t\"No! This jerk...\" She noticed me. \"What are you doing here?\"\n\t\n\t\"It looked like...\" I hesitated, glancing at Elizabeth and that guy. \"It looked like Elizabeth needed a hand.\"\n\t\n\tRoxanne raised a brow. \"Huh?\"\n\t\n\t\"What?\" Elizabeth looked surprised.\n\t\n\t\"What!?\" That guy looked extremely pissed. \"You're taking her side?\"\n\t\n\tI nodded.\n\t\n\t\"Why?\"\n\t\n\tI shrugged. \"She's my friend.\"\n\t\n\tAs pissed as I'd been just a few moments ago, I felt weirdly calm during our exchange. It was probably a\n\tgood thing, since that guy seemed to be losing steam with every word spoken.\n\t\n\t*page_break\n\t\n\t\"Forget it.\" He stomped away from us. \"You used to be cool. Have fun hanging out with that freak.\"\n\t\n\tRoxanne eyed me suspiciously.\n\t\n\tI scratched the back of my neck.\n\t\n\t\"You working around the house today?\" asked Elizabeth.\n\t\n\tI nodded. \"You headed the same way?\"\n\t\n\t*page_break\n\t\n\tMrs. Leavitt was waiting for us by the front gate. She looked concerned.\n\t\n\tElizabeth and I shared a glance before approaching her.\n\t\n\t\"Elizabeth,\" Mrs. Leavitt said. \"Are you having problems at school?\"\n\t\n\tElizabeth tilted her head. \"What do you mean?\"\n\t\n\t\"$!{Name} mentioned that you might be having some problems to your father.\"\n\t\n\tElizabeth raised a brow at me. \"Did $!{He} now?\"\n\t\n\tShe looked a little peeved. Maybe I should have kept my concerns to myself after\n\tall.\n\t\n\t*page_break\n\t\n\t\"It's just a few people giving me trouble.\" Elizabeth looked over to me. \"$!{Name} helped\n\tme out. It's all fine.\"\n\t\n\tMrs. Leavitt looked at me. \"Well then, Thank you. I'm glad to hear my daughter has such\n\ta good friend.\"\n\t\n\t\"I wasn't doing anything special,\" I said.\n\t\n\tMrs. Leavitt shook her head. \"We've had a lot of problems lately. Someone fire-bombed our\n\thouse. Earlier we had an entire mob outside our home. Some of them even tried to hurt\n\tElizabeth. And those ones were young enough to go to school with her.\"\n\t\n\tI glanced away. \"Yeah...\"\n\t\n\t\"It's good to know she's got a friend watching over her when she's away.\"\n\t\n\tI winced from that.\n\t\n\tMrs. Leavitt hugged her daughter. \"Well, as long as your okay.\"\n\t\n\tElizabeth wiggled a little. \"Alright, alright... geez. Too much love.\"\n\t\n\tMrs. Leavitt smirked. \"C'mon. Dinner's nearly done.\" She walked toward\n\tthe front door.\n\t\n\tElizabeth followed.\n\t\n\tI looked down at my feet. A weight dropped in my stomach when I realized what I wanted to say.\n\t\n\t*page_break\n\t\n\t\"M-ma'am?\" I called out.\n\t\n\tThey both stopped.\n\t\n\t\"There's something you should know.\" I took a deep breath. \"Those kids... the ones with\n\tthe mob. The ones that threw rocks at her.\"\n\t\n\tElizabeth studied me curiously.\n\t\n\t\"I... I was-\"\n\t\n\tElizabeth immediately sprinted up to me. Her tone was hushed. \"What are you doing?\"\n\t\n\tI flinched back. \"I-\"\n\t\n\tShe shook her head. \"It's nothing mom!\" Elizabeth put on a big cheerful smile, and turned\n\tto face her mother. \"You go ahead. I'll catch up in a few minutes.\"\n\t\n\t\"Okay...\" Mrs. Leavitt eyes us both curiously. \"I'll see you then.\"\n\t\n\t*page_break\n\t\n\tElizabeth smacked the side of my head.\n\t\n\t\"Ow!\" I backed away from her. \"What was that for!?\"\n\t\n\t\"What are you doing?\" She scowled at me. \"Were you about to tell her what you did?\"\n\t\n\t\"Well, yeah,\" I said. \"It just seems like she should know.\"\n\t\n\t\"Well she doesn't!\" Elizabeth shouted. \"Don't tell anyone what you did. Okay?\"\n\t\n\t\"Elizabeth... I owe them the truth.\"\n\t\n\tShe sighed. \"$!{Name}, just... don't. Don't do this.\"\n\t\n\t\"Why?\"\n\t\n\t\"Because I like having you around! Or, um...\" She stumbled over her next few words,\n\ta touch of red reaching her cheeks. \"You're not as... bad as you used to be. I don't\n\tmind hanging out with you. I don't want my parents hating you.\"\n\t\n\t\"Well...\" I scratched the back of my head. \"A-alright. Fine, I wont. for now anyway.\"\n\t\n\t\"Good,\" she said, walking toward her front door. \"You should join us for dinner.\"\n\t\n\t\"I'd like that,\" I said.\n\t\n\t*return\n*comment\n\n\n\n\n\n*set Elizabeth + 5\n\nI spent the afternoon working around the manor.\n\n\n\n*if (EventTutor = 0)\n\t*set EventTutor 1\n\tI saw Mr. Leavitt around the manor. He seemed to be deep in thought about something.\n\t\n\tHe perked up when he saw me. \"Hello, $!{Name}. I don't suppose you could help me\n\twith something could you?\"\n\t\n\t\"What do you need?\" I asked.\n\t\n\t\"Well, I've been looking for a tutor for Elizabeth. Our last one quit, and I haven't\n\tfound a replacement yet.\"\n\t\n\t\"Hmm.\" I thought about that. [i]Do I know any tutors?[/i]\n\t\n\t*page_break\n\t\n\tI did not.\n\t\n\t*page_break\n\t\n\t\"I don't suppose you know any tutors at your school do you?\"\n\t\n\tI shook my head. \"I don't think so.\"\n\t\n\tHe frowned. \"Well, that's too bad. I'll find someone eventually.\"\n\t\n\t*page_break\n\t\n\tI returned to my duties.\n\t\n\tI figured I could easily make a\n\t*if (Studies \u003c 80)\n\t\tC\n\t*if (Studies >= 80) and (Studies \u003c 90)\n\t\tB\n\t*if (Studies >= 90) and (Studies \u003c 100)\n\t\tA\n\t*if (Studies >= 100)\n\t\tA+\n\t.\n\t\n\t*if (Studies \u003c 90)\n\t\tIf I could reach the point where I could confidently make an A,\n\t\tI'd probably be able to tutor Elizabeth.\n\t\t\n\t\tIt'd be an easy way to make some extra cash.\n\t\t\n\t\tOn the other hand... I'd also be spending a lot of time alone with Elizabeth.\n\t*if (Studies >= 90)\n\t\tI was doing well enough in my classes that I was probably qualified to\n\t\ttutor her.\n\t\t\n\t\tI could make some extra cash, though I'd also have to spend more time with Elizabeth,\n\t\tfor better or worse.\n\t*comment\n\t\n\t*return\n*comment\n\n*if (EventTutor = 1) and (Studies >= 90)\n\t*set EventTutor 2\n\t\n\tI made a point of finding Mr. Leavitt that day. My grades were solid. Tutoring\n\twas a decent way to make extra money.\n\t\n\tElizabeth was going to be giving me grief as long as I stayed under their roof either\n\tway, so I didn't particularly care whether I had to work directly with her or not.\n\t\n\t*page_break\n\t\n\t\"You want to tutor my daughter?\" Mr. Leavitt asked.\n\t\n\tI nodded. \"Yes, sir.\"\n\t\n\t\"I have to ask...\" He gave me an appraising eye. \"Are you and Elizabeth, dating?\"\n\t\n\tMy eye twitched. \"No. We're not a-\"\n\t\n\t\"Look, I get it,\" he said. \"I'm the girl's old man. But, there's really no reason\n\tnot to be upfront about.\"\n\t\n\t\"Sir...\"\n\t\n\t\"I'm not going to go grab my shotgun.\"\n\t\n\t\"Sir.\"\n\t\n\t\"I have no issues with-\"\n\t\n\t\"Sir!\"\n\t\n\t*page_break\n\t\n\tAnd so I had the job, though I wouldn't be able to start until the next time I\n\tworked. Elizabeth was off... somewhere.\n\t\n\t*return\n*comment\n\n*if (EventTutor = 2)\n\t\n\tI spent the some of my afternoon tutoring Elizabeth for the upcoming test.\n\t\n*comment\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subread": "*comment this section should be used as a reading subroutine ONLY\n\n\n\n\n\n\n\n*label Begin\n\n\n\n*fake_choice\n\t*if (SecretsToStudying = 1) #Read 'Secrets to Studying Success'\n\t\t*label EasyStudy\n\t\t\n\t\t*if (EasyStudy = 0)\n\t\t\tThe book detailed various techniques students can use\n\t\t\tto get the most out of their studying.\n\t\t\t\n\t\t\tI'd probably need to read that book a few more times to\n\t\t\tfully understand it.\n\t\t\t\n\t\t\t*set EasyStudy 0.25\n\t\t\t*return\n\t\t*if (EasyStudy = 0.25)\n\t\t\tI spent more time reading 'Secrets to Studying Success'.\n\t\t\t\n\t\t\tSome of those techniques seemed needlessly convoluted. I wondered\n\t\t\thow practical they really were.\n\t\t\t\n\t\t\t*if (SkipRead = 1)\n\t\t\t\tThanks to reading 'Skipping the Bull, I knew better than to linger on the parts\n\t\t\t\tcovering techniques that were convoluted. Tips and tricks should be simple. This\n\t\t\t\twas just padding. I skimmed ahead.\n\t\t\t\t\n\t\t\t\t[i]$!{Name} made extra progress![/i]\n\t\t\t\t*set EasyStudy 0.50\n\t\t\t\t*goto EasyStudy\n\t\t\t\n\t\t\tA couple more reading sessions and I'd be done with that book.\n\t\t\t\n\t\t\t*set EasyStudy 0.50\n\t\t\t*return\n\t\t*if (EasyStudy = 0.50)\n\t\t\tI spent more time reading 'Secrets to Studying Success'\n\t\t\t\n\t\t\tThe more I read, the more convinced I became that many of those techniques\n\t\t\twere beyond useless. On the bright side, some of the simpler ones made sense.\n\t\t\t\n\t\t\tIt was nothing truly ground breaking or fantastic, just small things like,\n\t\t\t'have a good setting' and 'everybody has different methods, do what works for you personally'.\n\t\t\t\n\t\t\tIndividually, it wasn't much, but putting it all together... It could actually\n\t\t\tadd up to something.\n\t\t\t\n\t\t\t*set EasyStudy 0.75\n\t\t\t*return\n\t\t*if (EasyStudy = 0.75)\n\t\t\tI finished reading 'Secrets to Studying Success'.\n\t\t\t\n\t\t\tThe book could have been a lot shorter if the author had just stuck\n\t\t\tto simple tips and told her audience to try all of them out. If I didn't\n\t\t\tknow better, I'd say that the more convoluted tricks to studying existed\n\t\t\tsolely to pad the book's length out.\n\t\t\t\n\t\t\tRegardless, I learned quite a few useful tricks. I'd believed my studying sessions\n\t\t\twould be going much more smoothly from that point forward.\n\t\t\t\n\t\t\t[i]$!{Name} learned a skill![/i]\n\t\t\t\n\t\t\t[b]Easy Studying[/b]\n\t\t\t\n\t\t\t[i]Studying is twice as effective now.[/i]\n\t\t\t\n\t\t\t*set EasyStudy 1\n\t\t\t*set SecretsToStudying 2\n\t\t\t*return\n\t*if (CharmingDevils = 1) #Read 'Charming Devils'\n\t\t*label Charm\n\t\t\n\t\t*if (Charm = 0)\n\t\t\tThe book claims to be able to teach its readership how to better interact with\n\t\t\tthe opposite sex.\n\t\t\t\n\t\t\tThe initial passages are all by an individual calling himself 'B'. The passages\n\t\t\tread similarly to a journal, detailing various aspects of his life. The focus\n\t\t\tis particularly heavy on his failed dealings with women, and how he learned from\n\t\t\tthem\n\t\t\t\n\t\t\t*if (SkipRead = 1)\n\t\t\t\tThanks to reading 'Skipping the Bull, I knew better than to linger on the parts\n\t\t\t\tinvolving 'B'. I skimmed any segments where he talked about himself, without\n\t\t\t\tgiving any practical advice.\n\t\t\t\t\n\t\t\t\t[i]$!{Name} made extra progress![/i]\n\t\t\t\t*set Charm 0.33\n\t\t\t\t*goto Charm\n\t\t\t\n\t\t\tI'd need to read that book a couple more times to finish it.\n\t\t\t\n\t\t\t*set Charm 0.33\n\t\t\t*return\n\t\t*if (Charm = 0.33)\n\t\t\tThe book continues discussing the plight of 'B' as he continues to struggle to\n\t\t\tcourt woman after woman. To be completely honest, by that point, the book was\n\t\t\treally starting to drag on. Tremendously so.\n\t\t\t\n\t\t\tI was about to the point where if I heard the author say one more time how\n\t\t\theartbroken he was, I was going to strangle myself. At least I could learn\n\t\t\tfrom his mistakes. Maybe just knowing what not to do or say would be enough.\n\t\t\t\n\t\t\tI'd need to read that book one more time to finish it.\n\t\t\t\n\t\t\t*set Charm 0.66\n\t\t\t*return\n\t\t*if (Charm = 0.66)\n\t\t\tThe book finally, [b]FINALLY[/b] moved on from the sections involving 'B'.\n\t\t\tThe final chapters were more about the overall approach to trying to start\n\t\t\ta romantic relationship with not just woman, but really anyone.\n\t\t\t\n\t\t\tThe advice wasn't too ground breaking, such as 'be confident'.\n\t\t\tIt at least mentioned certain pitfalls many people fall into. 'If you're a man and you don't\n\t\t\tknow her, don't compliment her physical appearance right out the gate', or 'Even if you're\n\t\t\tdeeply infatuated with the other person, remember to give them some space. Being too close\n\t\t\ttoo early can cause the other person to back away from the relationship.'\n\t\t\t\n\t\t\t[i]$!{Name} learned a skill![/i]\n\t\t\t\n\t\t\t[b]Charm[/b]\n\t\t\t\n\t\t\t[i]$!{Name} will occasionally gain unique dialogue options when dealing with ${His}[/i]\n\t\t\t[i]romantic interests.[/i]\n\t\t\t\n\t\t\t*set Charm 1\n\t\t\t*set CharmingDevils 2\n\t\t\t*return\n\t*if (PathOfNinja = 1) #Read 'Path of the Ninja'\n\t\t*label Sneak\n\t\t\n\t\t*if (Sneak \u003c 0.3)\n\t\t\tThe book depicted a series of ridiculous scenarios ranging from needing to assassinate\n\t\t\tthe local gang leader, to fighting off a mob of knife wielding henchman, to being held\n\t\t\tat gun point by a psychopath.\n\t\t\t\n\t\t\tEach scenario had a list of supposed techniques a person can utilize to definitely\n\t\t\tget out of these situations unscathed. The advice was so blatantly unsafe, it seemed\n\t\t\tcriminal.\n\t\t\t\n\t\t\t*if (SkipRead = 1)\n\t\t\t\tThanks to reading 'Skipping the Bull, I knew better than to linger on... basically\n\t\t\t\tany part of this book. It was kind of dumb, and I was embarrassed to be reading it.\n\t\t\t\t\n\t\t\t\t[i]${Name} made extra progress![/i]\n\t\t\t\t\n\t\t\t\tI'd need to read it a few more times, even skipping ahead as much as I was.\n\t\t\t\t\n\t\t\t\tI hoped this book wouldn't prove to be a total waste of time.\n\t\t\t\t\n\t\t\t\t*set Sneak 0.4\n\t\t\t\t*return\n\t\t\t\n\t\t\tThis was going to take quite a while to read...\n\t\t\t\n\t\t\t*set Sneak + 0.1\n\t\t\t*return\n\t\t*if (Sneak \u003c 0.6)\n\t\t\tHonestly, the book was worth the one dollar price tag.\n\t\t\t\n\t\t\tThe advice and techniques are so stupid and dangerous that the entire book comes\n\t\t\toff as being unintentionally hilarious.\n\t\t\t\n\t\t\tIt was honestly getting difficult to tell if the Author sincerely meant this\n\t\t\twork as a real guide to being a ninja, or if they were being a parody of one.\n\t\t\t\n\t\t\t*if (SkipRead = 1)\n\t\t\t\tAgain, there was nothing useful in the book. I skimmed ahead much more\n\t\t\t\trapidly.\n\t\t\t\t\n\t\t\t\t[i]$!{Name} made extra progress![/i]\n\t\t\t\t\n\t\t\t\tI'd need to read that thing a couple more times to be done with it.\n\t\t\t\t\n\t\t\t\t*set Sneak 0.7\n\t\t\t\t*return\n\t\t\t\n\t\t\tThe book was still going to take a while to finish reading...\n\t\t\t\n\t\t\t*set Sneak + 0.1\n\t\t\t*return\n\t\t*if (Sneak \u003c 0.9)\n\t\t\tI had wasted a massive amount of time on this book, and hadn't learned a single\n\t\t\tuseful thing. At least it was funny. And only a dollar.\n\t\t\t\n\t\t\t*if (SkipRead = 1)\n\t\t\t\tI gave a long, drawn out sigh. Did this book contain anything useful?\n\t\t\t\t\n\t\t\t\t[i]${Name} made extra progress![/i]\n\t\t\t\t\n\t\t\t\t*set Sneak 0.9\n\t\t\t\t*goto Sneak\n\t\t\t\n\t\t\tI was getting a bit closer to finishing the book at least.\n\t\t\t\n\t\t\t*set Sneak + 0.1\n\t\t\t*return\n\t\t*else\n\t\t\tTo my absolute shock, the final section of the book contained information that wasn't\n\t\t\tincredibly stupid. Various reports and training programs for undercover police, soldiers,\n\t\t\tand hunters had been compiled and explained.\n\t\t\t\n\t\t\tThe techniques and advice given were actually useful for maintaining stealth.\n\t\t\t\n\t\t\tThe undercover cop segment explained the importance of understanding stealth as\n\t\t\tbeing more than hidden. Sometimes it's just about looking like you belong somewhere\n\t\t\tyou don't.\n\t\t\t\n\t\t\tThe hunter segments explained camouflage thoroughly, as well techniques\n\t\t\tthat can be used to reduce noise when travelling through wooded areas.\n\t\t\t\n\t\t\tThe section based on apparently real military training contained instructions on\n\t\t\turban stealth. It was mostly about raiding a building, which admittedly wasn't\n\t\t\tuseful to me. At least I knew how to creep through a building now.\n\t\t\t\n\t\t\t[i]$!{Name} learned a skill![/i]\n\t\t\t\n\t\t\t[b]Sneak[/b]\n\t\t\t\n\t\t\t[i]In situations that require it, $!{Name} can now sneak much more effectively.[/i]\n\t\t\t\n\t\t\t*set Sneak 1\n\t\t\t*set PathOfNinja 2\n\t\t\t*return\n\t*if (SkippingTheBull = 1) #Read 'Skipping the Bull'\n\t\t*if (SkipRead = 0)\n\t\t\tThe book explained that most self-help books are padded with useless commentary\n\t\t\tto pad out their length. It elaborated that many self-help books contain only\n\t\t\tone or two useful techniques, and that the key to getting the most out of them\n\t\t\tis to find that advice and skip everything else.\n\t\t\t\n\t\t\tThe book contained various examples of this, which were surprisingly easy to\n\t\t\tget through.\n\t\t\t\n\t\t\tI was done with the book before I knew it!\n\t\t\t\n\t\t\t[i]$!{Name} gained a skill![/i]\n\t\t\t\n\t\t\t[b]Skip Reading[/b]\n\t\t\t\n\t\t\t[i]When reading books, $!{Name} will now skip irrelevant chapters, and only[/i]\n\t\t\t[i]focus on the important parts of a work. This will cut down the total number[/i]\n\t\t\t[i]of times some books have to be read.[/i]\n\t\t\t\n\t\t\t*set SkipRead 1\n\t\t\t*set SkippingTheBull 2\n\t\t\t*return\n\t\t*return\n\t#GoBack\n\t\t*set Var 1\n\t\t*return\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subroxanne": "\n\n\n\n\n*if (Fighting >= 10)\n\t*set Roxy + 5\n\t*set Athletics + 2\n*comment\n\n\n\n*if (RoxyEvents = 0)\n\t*set Roxy + 5\n\t*set RoxyEvents 1\n\t\n\tI travelled a familiar set of road, headed in the opposite direction of El Abrigo.\n\t\n\tI stumbled across the werewolf camp quickly enough.\n\t\n\tA small crowd had gathered off to one side of the camp. I couldn't make out what\n\tthey were doing.\n\t\n\t*page_break\n\t\n\tJeremiah shot me a broad smile and a quick wave as I approached.\n\t\n\tRoxanne stood beside him. She looked displeased that I had shown up, to say the\n\tleast.\n\t\n\t*page_break\n\t\n\t\"What are you doing here?\" Roxanne asked.\n\t\n\t\"I just felt like visiting.\"\n\t\n\t\"You showed up just in time,\" Jeremiah said. \"Perhaps you'd like to join our pack\n\tduring our games?\"\n\t\n\t\"'Games'?\"\n\t\n\tJeremiah nodded. \"Once a year, packs from different regions meet and host several games.\n\tThey're focused on feats of strength.\"\n\t\n\t\"So it's a competition?\" I asked. \"You're training to beat the other packs?\"\n\t\n\t\"That's right.\" Jeremiah smiled. \"Though, there's no real prizes or anything. Truth be told,\n\tit's mostly just an excuse to meet up with our extended family.\"\n\t\n\t\"Alright,\" I said. \"Sounds fun.\"\n\t\n\tSomething changed in Roxanne's expression. She developed a wicked smile before grabbing my\n\tarm, and leading me over the crowd.\n\t\n\t\"Well then,\" she said. \"Why don't I help you get started.\"\n\t\n\tI shot a worried glance back at Jeremiah.\n\t\n\tHe smirked, before walking away.\n\t\n\t*page_break\n\t\n\t\"I think this a good one to start with.\" Roxanne shot me a broad, sinister smile.\n\t\n\tWe stood in front of a patch of dirt. There was literally nothing else around.\n\t\n\t\"Okay?\" I raised a brow at her.\n\t\n\tA young man walked by me, followed by another man. They both crouched down low.\n\tOne rushed forward, slamming into the other one and knocking him to the ground.\n\t\n\tI stared in shock, until I realized what they were doing.\n\t\n\t\"Wrestling?\" I turned to Roxanne.\n\t\n\tI didn't have a chance to react before she knocked me to the ground.\n\t\n\t*page_break\n\t\n\tI had the distinct sense Roxanne still had some lingering anger about my treatment\n\tof Elizabeth, in addition to her kind in general.\n\t\n\tI didn't know anything about wrestling, so I mostly just found myself getting effortlessly\n\ttossed around for a while.\n\t\n\tRoxanne's apparent fury did little to better my odds against her.\n\t\n\t*page_break\n\t\n\tRoxanne let out a tired huff before collapsing into the dirt. \"That was fun.\"\n\t\n\t\"For you maybe.\" I rubbed a bruises spot on my arm. I was gonna be aching for a\n\twhile after this.\n\t\n\t\"Whatever,\" she said. \"Just consider it good exercise.\"\n\t\n\t\"I think I would rather have gone to the gym,\" I said.\n\t\n\t\"Well next time you 'just feel like visiting', maybe just do that instead.\"\n\t\n\t*page_break\n\t\n\t\"Apologies.\" Jeremiah approached me, and helped me to my feet. \"Perhaps I should have\n\tintervened.\"\n\t\n\tI shook my head. \"It's fine. She's still angry. Roxanne probably just needed to work\n\tthat anger off.\"\n\t\n\t\"Regardless,\" he said. \"I'll see to it she acts a little less... rough, if you decide\n\tto visit again.\"\n\t\n\t\"Thanks.\" I noted it was getting a bit late. \"I have to go, but... I'll be sure to visit\n\tagain.\"\n\t\n\tHe nodded. \"Looking forward to it.\"\n\t\n\t*return\n*comment\n\n\n\n\n\n\n\n*if (RoxyEvents = 1) and (Roxy >= 20)\n\t*set Roxy + 5\n\t*set RoxyEvents 2\n\t\n\tI went back to the werewolf camp. Honestly, I was a bit nervous, seeing as their 'games' gave\n\tRoxanne ample opportunity to blatantly attack me.\n\t\n\tIf I was lucky, she'd be done venting her anger, and I'd be safe.\n\t\n\t*page_break\n\t\n\tI heard a bone-chilling howl just as I reached the camp.\n\t\n\tEven from a distance, I could see two monsters attacking each other. It was daylight,\n\tbut despite that, what I was looking at were clearly two werewolves, transformed.\n\t\n\tThey looked like they straight out of a horror movie. Two humanoid wolf-creatures. Sharp teeth\n\tfilled their maws. Even though a face full of fur, I could make out an inhuman expression of\n\trage as the two figures lashed out at each other.\n\t\n\tThey swiped at each other, clawing through fur and hide. They bit hard enough to draw blood.\n\t\n\tThe dirt under their feet steadily turned more and more red as the fight went on.\n\t\n\tI didn't dare approach and closer than I already had.\n\t\n\t*page_break\n\t\n\tAnd then, one gained the upper hand. It tackled its opponent into the ground before sinking\n\ta set of sharp teeth into the opponents throat.\n\t\n\tThe downed enemy struggled. The teeth sank in deeper.\n\t\n\tThe opponent let out a pained whimper. Its body relaxed. The attacker loosened the grip on\n\tits throat.\n\t\n\t*page_break\n\t\n\tAnd it was over. They separated from each other, and slowly shifted. Their bodies warped, muscles\n\tbecame smaller, jagged teeth shortened.\n\t\n\tThe werewolves had been two girls. One I didn't recognize. The victor was Roxanne.\n\t\n\tI stared. [i]Neither of them are wearing any...[/i]\n\t\n\tI looked away.\n\t\n\t*page_break\n\t\n\tI caught Jeremiah watching me from nearby. He was leaning against one of the cabins.\n\t\n\tHe looked amused.\n\t\n\tI frowned and tried to approach him. However, I was cut off by Roxanne's voice.\n\t\n\t\"Enjoy the show?\"\n\t\n\tMy eye twitched. I didn't immediately turn to face her. Instead, I risked a quick sideways\n\tglance in her direction.\n\t\n\t[i]She's clothed. Good.[/i]\n\t\n\tI let out a relieved sigh when I turned to fully face her. \"It was... violent.\"\n\t\n\t\"We heal quickly,\" she said. \"And we need to be ready for the meetup with the other packs.\n\tThey won't throw any punches.\"\n\t\n\t*page_break\n\t\n\t\"Right.\" I looked to Jeremiah. \"Hey, J-\" He was gone.\n\t\n\tI looked around. \"Where did he-\"\n\t\n\t\"So, you came back for more, hmm?\" Roxanne raised a brow at me.\n\t\n\tShe wasn't quite as openly pissed at me as she had been, so it seemed I was at least\n\tmaking progress.\n\t\n\t\"I guess so.\" I kind of wasn't. But, I got the sense my reluctance to take part in what\n\twas clearly an important event wouldn't be well received.\n\t\n\t*page_break\n\t\n\tA sickening crunching sound turned my attention away from her.\n\t\n\tTwo more fighters changing into their wolf forms. The process wasn't clean looking. I\n\tcould see bones cracking and mending beneath their skin. fur slowly pushed itself out\n\tin random patches across their skin.\n\t\n\t\"Does that hurt?\" I asked.\n\t\n\t\"Huh?\" Roxanne followed my gaze to them. \"Oh. Uh... the first few times.\"\n\t\n\t\"Just the first few times?\" I raised a brow at her.\n\t\n\tRoxanne shrugged. \"Yeah... it looks worse than it is. Don't worry about it.\"\n\t\n\t\"If you say so...\"\n\t\n\t*page_break\n\t\n\tThings went slightly better for me, though only because Roxanne didn't spend the\n\tentire afternoon pummelling me.\n\t\n\tInstead, I got repeatedly beaten down by random members of her pack. In truth, it\n\twasn't actually that bad. They didn't seem to really have any problem with me. In\n\tfact, it was kind of fun trying to wrestle someone to the ground when the other\n\tperson doesn't hate your guts.\n\t\n\tAfter a while, I saw the afternoon was draining away, and had to head back home.\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (RoxyEvents = 2) and (Roxy >= 40)\n\t*set Roxy + 5\n\t*set RoxyEvents 3\n\t\n\tI laid out in the grass near the werewolf camp. I was out of breath, as was\n\tRoxanne.\n\t\n\tApparently I was getting a bit better, since she was just as worn out as I was.\n\t\n\t\"Are you guys really weak to silver?\" I asked.\n\t\n\t\"What?\" Roxanne looked at me.\n\t\n\t\"It's in all the movies,\" I said.\n\t\n\t\"Kind of. Yeah.\"\n\t\n\tI laughed. \"How are you 'kind of' allergic to silver?\"\n\t\n\tShe smirked at me. \"It won't burn my skin or anything if I touch it. But, a weapon\n\tmade out of silver would hurt like hell.\"\n\t\n\t\"Are you otherwise pretty much immortal?\" I asked.\n\t\n\tShe shook her head. \"We'd die from anything that could kill a normal human.\"\n\t\n\tI frowned. \"That's... boring.\"\n\t\n\tShe laughed. \"We still heal really fast, even in human form. I can't survive\n\tbeing shot in the head, but I'd be unkillable with something simple like a knife.\"\n\t\n\t*page_break\n\t\n\t\"So what's the deal with you?\" Roxanne rolled over to better face me. \"You were trying\n\tto kill Elizabeth barely even a month ago. And now you're being all buddy-buddy?\"\n\t\n\tI shrugged. \"We moved into her family's guest house. I got to know her.\"\n\t\n\t\"That's it?\" Roxanne tilted her head at me. \"You're totally cool with hanging out\n\twith my kind now because you had to be roomies?\"\n\t\n\t\"Basically.\" I chuckled. \"It's hard to think someone's inherently evil when\n\tyou're chatting with them every day.\"\n\t\n\tI thought back to my earliest interactions with Elizabeth, back when she was still\n\ttrying to get back at me.\n\t\n\t\"Though... she was acting pretty evil early on.\"\n\t\n\t\"Please.\" Roxanne rolled her eyes. \"You had it coming.\"\n\t\n\tI smirked. \"Maybe.\"\n\t\n\tRoxanne stood up. \"Definitely.\"\n\t\n\t*page_break\n\t\n\tI got up too. \"I guess things are better between us now though.\"\n\t\n\t\"You guess?\" Roxanne asked.\n\t\n\t\"We haven't been at each other's throats half as much, so... yeah.\" I smiled. \"I guess\n\twe're sort of friends.\"\n\t\n\tRoxanne nodded.\n\t\n\t\"So... what about you?\" I asked.\n\t\n\t\"I think calling us friends might be a bit of a stretch.\"\n\t\n\tI smirked at her. \"Acquaintances is is then.\"\n\t\n\tShe crossed her arms, a scowl on her face.\n\t\n\tI kept my smirk up, not looking away.\n\t\n\tRoxanne rolled her eyes. \"Fine. Acquaintances it is.\"\n\t\n\t*page_break\n\t\n\tI started to walk away from her. \"So...\" I stopped. \"I'll see you around?\"\n\t\n\tRoxanne nodded as she walked back to camp. \"Yeah, yeah.\"\n\t\n\t*page_break\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (RoxyEvents = 3) and (Roxy >= 60)\n\t*set Roxy + 5\n\t*set RoxyEvents 4\n\t\n\tWhen I arrived at the werewolf camp, I found Jeremiah leading a group\n\tof kids inside his cabin.\n\t\n\tSeveral adults looked like they were keeping an eye on the perimeter, though\n\tthey didn't seem bothered when I passed by them.\n\t\n\tRoxanne waved me over the moment she saw me. \"Come on.\"\n\t\n\t\"What's happening?\" I asked.\n\t\n\t\"Something came from the borderland,\" she said.\n\t\n\t\"Borderland?\" I tilted my head. \"What-\"\n\t\n\t\"This is just a pocket dimension,\" Roxanne quickly said. \"It's not really its own\n\tworld. There is a border, and things get really, really weird at it. Sometimes\n\tdangerous stuff comes out.\"\n\t\n\t\"Are we safe here?\" I asked.\n\t\n\t\"The problem is being dealt with,\" she said. \"Members of our pack are scouring the woods. I'm\n\tsure exterminators have been sent from the city to deal with whatever showed up too.\"\n\t\n\t*page_break\n\t\n\tShe led me inside Jeremiah's cabin. The kids had all gathered around on the floor. They didn't look\n\tparticularly worried.\n\t\n\tMaybe the adults were intentionally keeping them out of the loop.\n\t\n\tJeremiah pulled a chair up and sat down in it. He held a thick book in his hand.\n\t\n\tI leaned over to Roxanne and whispered, \"What's he doing?\"\n\t\n\t\"Distracting them until the problem gets dealt with.\"\n\t\n\tJeremiah shot a look at us. \"I'm [i]teaching[/i] them our kind's long history.\"\n\t\n\tRoxanne rolled her eyes.\n\t\n\t*page_break\n\t\n\tJeremiah flipped through a few pages of his book. \"Hmm... might as well start with the\n\tfirst.\" I very briefly saw him glance at me.\n\t\n\t\"This is the story, of where our kind came from,\" Jeremiah said.\n\t\n\t\"But we already heard this story a hundred times!\" One of the kid yelled.\n\t\n\t\"And you're gonna hear it for the hundredth-and-one!\" Jeremiah snapped back. \"It all began with\n\ta young maiden, deep in the first woods.\"\n\t\n\tRoxanne whispered to me. \"Literally every pack has a different version of this story, and none of them are\n\teven slightly similar. So, you know... take what he's about to say with a grain of salt.\"\n\t\n\tJeremiah cleared his throat. He was glaring daggers at Roxanne.\n\t\n\tShe waved him off. \"Fine. Tell your story.\"\n\t\n\t*page_break\n\t\n\t'The first woods contained a shrine to a now long forgotten god. It was once maintained by a proud\n\tpeople.'\n\t\n\t'However, time had not treated these people well. Creatures stirred in the woods around\n\tthem, attacking at night. Men, women, and children alike were slain.'\n\t\n\t'The shrine had a sole maiden maintaining it day after day. The other members of their faith had given\n\ttheir lives to defend it from the abominations beyond the village.'\n\t\n\t'The village itself was destroyed. Fewer than twelve remained inside its borders. They had given up\n\tany hope they once had of fending off the threat to their people. Various monsters roamed free across the land.\n\tSome would drain the blood of the innocent, others consumed the rotting flesh of the dead'\n\t\n\t'It was endless.'\n\t\n\t*page_break\n\t\n\t'One day, the maiden was attacked during her daily worship. She lie, dying on the alter of her god. She realized\n\tshe was going to join the rest of her people.'\n\t\n\t'And she felt rage.'\n\t\n\t'Rage that so many of her people had been slain. Rage that they were powerless to stop their tormentors.'\n\t\n\t'She prayed that her people would be given strength beyond any mortal. She prayed they would be given\n\tthe strength necessary to fight against the monsters that threatened their lives.'\n\t\n\t'Her prayers were heard.'\n\t\n\t*page_break\n\t\n\t'She didn't ask for protection from those monsters. She didn't ask for peace. In her rage, she demanded\n\tviolence. And power.'\n\t\n\t'I was given to her. And to her people.'\n\t\n\t'They gained the ability to change their form to that of monsters. They gained the strength to take the\n\tfight to the abominations that lurked outside their homes.'\n\t\n\t*page_break\n\t\n\tSomeone cleared their throat. I looked to the front door, and saw a young woman standing in it.\n\t\n\t\"The threat has ended,\" she said.\n\t\n\tJeremiah gave a light nod, closed his book, and stood up. \"We can continue this story some other time\"\n\t\n\tThe kids scattered immediately. I didn't hang around much longer myself before deciding it was time to go home.\n\t\n\t*return\n*comment\n\n\n*if (RoxyEvents = 4) and (Roxy >= 80)\n\t*set Roxy + 5\n\t*set RoxyEvents 5\n\t\n\tI visited the werewolf camp again.\n\t\n\t\"Hey Roxanne?\" I approached her.\n\t\n\tShe nodded at me as she leaned against one of the cabins. She held a book\n\tlabeled 'Lovers in the Desert'. It showed a shirtless man swatting a burning\n\tstick at several scorpions as they crawled toward a woman sitting in the sand.\n\t\n\t\"Lovers in the Desert?\" I raised a brow.\n\t\n\tRoxanne immediately tossed the book to the side. She held a surprised expression\n\tfor just a split second before immediately relaxing into a calm and cool pose.\n\t\n\t\"What's up?\"\n\t\n\tI raised a brow at her. \"Uh... What was that?\"\n\t\n\tShe tilted her head. \"What was what?\"\n\t\n\t\"You just tossed some trashy novel away.\"\n\t\n\tShe snarled at me. \"It is not trashy! It's- I mean I don't know what you're talking about.\"\n\t\n\t\"Fine, whatever you say.\"\n\t\n\t*page_break\n\t\n\tWe walked around the camp. For whatever reason Roxanne didn't seem to be interested in joining\n\ttheir games that day.\n\t\n\t\"How much of that story Jeremiah told was true?\" I asked.\n\t\n\t\"Well its fiction...\" Roxanne raised a brow at me. \"Gabriel and Julia never existed. And if they\n\tdid, they probably didn't have to fend off super intelligent scorpions in death valley.\"\n\t\n\tI stared at her. \"Are... are you talking about that romance novel?\"\n\t\n\tShe blinked. \"Uh...\"\n\t\n\t*page_break\n\t\n\t\"Oh...\" Roxanne chuckled. \"You meant about our origin. It's probably not true.\"\n\t\n\t\"What makes you say that?\" I asked.\n\t\n\t\"Every single pack passes a story like that down to their kin,\" she said. \"but none of\n\tthem are quite the same. If they aren't the same, they can't be based on a true story\n\tcan they?\"\n\t\n\tI shrugged. \"Stories have a tendency to warp and change over time. I'm assuming this\n\tstory was passed down orally before being put in a book. Even if it's not accurate\n\tanymore, it might have been based on something that actually happened.\"\n\t\n\t\"Every legend has an element of truth?\" Roxanne looked thoughtful. \"Maybe. But whatever\n\thappened, whatever [i]really[/i] happened. The truth is long gone.\"\n\t\n\t\"Hmm...\" I watched several people fighting nearby. \"Are you going to participate in\n\tthese 'games'? They sound like the werewolf Olympics.\"\n\t\n\t\"No.\"\n\t\n\tI shot a curious look at Roxanne. I hadn't expected that answer. Or for it to be so quick.\n\t\n\tShe glanced away. \"Don't worry about it.\"\n\t\n\t\"I-\"\n\t\n\tRoxanne quickly left.\n\t\n\t*page_break\n\t\n\tI hung around for a while after that, but eventually decided it was time to return home.\n\t\n\t*return\n*comment\n\n\n\n*if (RoxyEvents = 5) and (Roxy >= 100)\n\t*set Roxy + 5\n\t*set RoxyEvents 6\n\t\n\tI tried entering another 'game' when I arrived at the werewolf camp.\n\t\n\tI gave up after ten minutes. I hadn't been aware of it before, but these\n\tpeople were training nearly non stop. It had finally come the point where I was hopelessly\n\tbehind compared to the rest of them.\n\t\n\tIt made me kind of want to see these games played against the other packs. I imagined they'd\n\tbe pretty intense.\n\t\n\t*page_break\n\t\n\tI mostly just watched from the sidelines while different people fought. I still hadn't quite\n\tgrasped the rules of some of these games.\n\t\n\tThe one where they transformed and went all out was pretty self explanatory.\n\t\n\tThe wrestling one seemed to involve just getting your opponent to give up, though otherwise\n\tI didn't see any way to 'win'.\n\t\n\tA few other games seemed really random. One involved trying to land a strike against the opponents\n\ttorso. You won if you landed even one hit. Given how full contact most of their fights had been,\n\tit was a surprisingly gentle game.\n\t\n\t*page_break\n\t\n\tRoxanne eventually stumbled away from the crowd. I took note of a growing number of bruises\n\ton her body. Given her apparent regeneration, I figured they'd be gone before the next day.\n\t\n\t\"You're doing pretty well out there.\"\n\t\n\tRoxanne collapsed face down into the grass. Her voice was muffled. \"Thanks.\"\n\t\n\tI sat down next to her. \"So.\"\n\t\n\tShe rolled over until she was staring up at the sky. \"So.\"\n\t\n\t\"You're [i]not[/i] joining them in their games against the other packs?\"\n\t\n\tShe sighed. \"I knew you'd bring that up.\"\n\t\n\t\"I'm just curious,\" I said. \"You're really tough. I don't see why you wouldn't-\"\n\t\n\t\"I just don't want to, okay?\" Her response was a bit flippant.\n\t\n\tI frowned. \"Any particular reason why?\"\n\t\n\t\"I don't have to have a reason,\" she said.\n\t\n\t\"No... but if something's wrong-\"\n\t\n\t\"I don't need you acting as my shrink.\" She sat up abruptly. \"I'm just not interested in\n\tthese stupid games.\"\n\t\n\t\"Why are you training then?\" I asked.\n\t\n\tShe took a deep breath. \"I'm just giving them a hand for the upcoming games. Plus, there's\n\tnot a lot else to do out in the woods.\"\n\t\n\t\"But, you live in town.\"\n\t\n\t\"Yeah, but my pack hangs out around here,\" she said.\n\t\n\t*page_break\n\t\n\tI felt very dissatisfied with our conversation, but it was clear to me that Roxanne wasn't interested\n\tin talking.\n\t\n\t\"Alright,\" I said. \"I'll drop this, but-\"\n\t\n\t\"Thank y-\"\n\t\n\t\"BUT,\" I said with emphasis. \"If you need any help, or someone to talk with, I'm here. Alright?\"\n\t\n\t\"Yes. Fine.\" She got up.\n\t\n\tI watched as she went back for another round of fighting.\n\t\n\t*page_break\n\t\n\t\"I should thank you for that.\"\n\t\n\tI flinched. Jeremiah stood behind me.\n\t\n\t\"She's been having some... trouble.\" He sighed. \"She hasn't participated in the actual games in a long while.\"\n\t\n\t\"Why?\"\n\t\n\tHe studied my face before speaking. \"I don't rightly know.\"\n\t\n\tI let out a low groan as he walked away.\n\t\n\t*page_break\n\t\n\tI was feeling pretty dissatisfied with how that whole day had gone when I finally went home.\n\t\n\t*page_break\n\t\n\t*return\n*comment\n\n\n\n\n\n\n\n\nI spent the afternoon with Roxanne's pack. I was inevitably dragged into their 'games'.\n\n*if (Fighting >= 10)\n\tMy training at the hunters lodge meant I was actually able to keep up with them.\n\t\n\tI think even Roxanne was a little impressed.\n*if (Fighting \u003c 10)\n\tI couldn't seem to keep up with the other members of the pack. It wasn't too\n\tsurprising, given that I'm only human.\n\t\n\tStill, I had to wonder if I could reach the point where I could keep up with them\n\tif I had more experience at fighting.\n*comment\n\n\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subshopbooks": "*comment this file should be used for book shopping subroutine ONLY\n\n\n\nI walked through the front door. A bell hanging overhead gave off a distinct 'ding'\nas I stepped through.\n\nI sized up their offerings of books.\n\n\n*label StoreChoice\n\n*choice\n\t*selectable_if (CharmingDevils = 0) #Charming Devils: The Miscreants Guide to Beguiling\n\t\tI picked up the book, 'Charming Devils'. The cover showed a young man with devil\n\t\thorns speaking to woman in a flirtatious manner.\n\t\t\n\t\t'Do you find yourself tongue-tied when dealing with the opposite sex? Do you try to\n\t\tturn on the charm, but only manage to put your own foot in your mouth? Well then, you\n\t\tneed to read Fredrick Nielson's newest book, Charming Devils.'\n\t\t\n\t\t'This guide explores the various social trappings that come to dealing with the\n\t\tmysterious gender known as women. Pick this book up today, and you're guaranteed\n\t\tto see greater success in your love-life, and a massive boost to your self-esteem.'\n\t\t\n\t\tThe book is priced at twenty dollars.\n\t\t\n\t\t*choice\n\t\t\t*selectable_if (Cash >= 20) #Buy 'Charming Devils' - (20 dollars)\n\t\t\t\t*set Cash - 20\n\t\t\t\t*set CharmingDevils 1\n\t\t\t\t\n\t\t\t\t[i]Cash left: ${Cash}[/i]\n\t\t\t\t\n\t\t\t\tI purchased the book, and stashed it in my backpack.\n\t\t\t\t*goto StoreChoice\n\t\t\t#Pass\n\t\t\t\t*goto StoreChoice\n\t*selectable_if (PathOfNinja = 0) #Path of the Ninja: The Ultimate Guide to Stealth and Assassination\n\t\tI picked up the book, 'Path of the Ninja'. The cover showed a finely dressed business man\n\t\tthrowing a blade across an office room toward one of his co-workers.\n\t\t\n\t\t'Have you felt trapped by your boring day to day? Do you wish you had the skills and power\n\t\tto become one with the shadows and strike fear into the hearts of your enemies?'\n\t\t\n\t\t'If you read this book, you'll be guaranteed to learn all the skills and techniques\n\t\tnecessary to join the ranks of shinobi. Stealth will be your philosophy, power will\n\t\tbe your tool. Embrace your destiny today!'\n\t\t\n\t\t'Also check out: '101 methods of the bare-fisted monk' and 'The Art and Science of\n\t\tBushido: How to disarm and defeat any opponent with nothing but a katana!!!''\n\t\t\n\t\tThe book is discounted down (way down) to one dollar.\n\t\t\n\t\tpulling at the discount sticker reveals the original price was twenty dollars.\n\t\t\n\t\t*choice\n\t\t\t*selectable_if (Cash >= 1) #Buy 'The Path of the Ninja' - (1 dollar)\n\t\t\t\t*set Cash - 1\n\t\t\t\t*set PathOfNinja 1\n\t\t\t\t\n\t\t\t\t[i]Cash left: ${Cash}[/i]\n\t\t\t\t\n\t\t\t\tI purchased the book, and stashed it in my backpack.\n\t\t\t\t*goto StoreChoice\n\t\t\t#Pass\n\t\t\t\t*goto StoreChoice\n\t*selectable_if (SkippingTheBull = 0) #Skipping the Bull: How to Get Straight to the Point of Self-Help Books\n\t\tI picked up the book, 'Skipping the Bull'. The cover showed an overweight man glaring at the reader\n\t\twhile throwing a book titled, 'self help' in the trash.\n\t\t\n\t\t'Let me start by saying one simple truth, right here, right now.'\n\t\t\n\t\t'99% of what self-help books say is complete bull. Every self-help book at best, has one piece\n\t\tof good advice. However, you can't sell a book that's only one sentence long, so authors\n\t\tof these book pad out the length to justify their price.'\n\t\t\n\t\t'My book is going to teach you to recognize useful advice in other books,\n\t\tas well as how to skip past meaningless bull.'\n\t\t\n\t\t'You'll save yourself hours of wasted time, and it's all by following my simple, clear\n\t\tinstructions.'\n\t\t\n\t\tThe book is priced at five dollars.\n\t\t\n\t\t*choice\n\t\t\t*selectable_if (Cash >= 5) #Buy 'Skipping the Bull' - (5 dollars)\n\t\t\t\t*set Cash - 5\n\t\t\t\t*set SkippingTheBull 1\n\t\t\t\t\n\t\t\t\t[i]Cash left: ${Cash}[/i]\n\t\t\t\t\n\t\t\t\tI purchased the book, and stashed it in my backpack.\n\t\t\t\t*goto StoreChoice\n\t\t\t#Pass\n\t\t\t\t*goto StoreChoice\n\t#Read a book\n\t\tThe store isn't a library, so I couldn't read anything I hadn't purchased. Customers could however\n\t\tread anything they brought in or purchased themselves.\n\t\t\n\t\tI got out the book I brought with me.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene subRead\n\t\t*if (Var = 1)\n\t\t\t*set Var 0\n\t\t\t*goto StoreChoice\n\t\t\n\t\tAfter reading for a while, I put my book away, and left the store.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*return\n\t#Leave for the day\n\t\tI exited the store.\n\t\t*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subshopclothes": "*comment this file should be used for clothing shopping subroutine ONLY\n\n\n\n\n\nI looked around the mall, considering my options...\n\n*label StoreChoice\n\n*choice\n\t#Check out a store catering to goths\n\t\tThe store, 'Gothic Graveyard' was darkly decorated. A dark blue rug,\n\t\tand gray walls, were about as colorful as it got. Various shirts\n\t\tand dresses hung off the walls, alongside a variety of accessories\n\t\tlike collars, pendants and studded wrist-bands.\n\t\t\n\t\tThey also had makeup, though I found that a bit intimidating\n\t\tthis early on.\n\t\t\n\t\t*if (OwnsGoth = 0)\n\t\t\tIn truth, I hadn't really worn clothing like this before. Though,\n\t\t\tI was a bit... curious about it.\n\t\t\t\n\t\t\tIt'd probably cost me about eighty dollars to get a decent outfit put together\n\t\t\tfrom this place.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t*selectable_if (Cash >= 80) #Buy a goth outfit - (80 dollars)\n\t\t\t\t\t*set Cash - 80\n\t\t\t\t\t*set OwnsGoth 1\n\t\t\t\t\t*set WearsGoth 1\n\t\t\t\t\t*set WearsPlain 0\n\t\t\t\t\t*set WearsStylish 0\n\t\t\t\t\t\n\t\t\t\t\t[i]Cash left: ${Cash}[/i]\n\t\t\t\t\t\n\t\t\t\t\tI grabbed various items from around the store, and went to the back to change.\n\t\t\t\t\t\n\t\t\t\t\t*if (Sex = \"male\")\n\t\t\t\t\t\tI stepped in front of a mirror when I was finished. I wore a black hoodie\n\t\t\t\t\t\twith a skull design along the back. I wore a single fingerless glove\n\t\t\t\t\t\ton my right hand. Rather than ending at my wrist, the glove's cloth\n\t\t\t\t\t\tran up my arm, stopping just short of my elbow.\n\t\t\t\t\t\t\n\t\t\t\t\t\tMy pants were black, and fairly plain. The only thing that made\n\t\t\t\t\t\tthem stand out was a belt with a cross design on the buckle.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI didn't change my shoes. Those had already been black, and I didn't\n\t\t\t\t\t\twant to spend anymore money.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHappy with my choice, I exited the store wearing my new clothes.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI wasn't too sure how mom would react.\n\t\t\t\t\t*if (Sex = \"female\")\n\t\t\t\t\t\tI stepped in front of a mirror when I was finished. I wore a black dress\n\t\t\t\t\t\twith a transparent lace material hanging past the end of it. I had a choker\n\t\t\t\t\t\tmade from an opaque cloth, that was tied together with some dark string.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI wore a set of fingerless gloves, with decorative white ribbon weaved into\n\t\t\t\t\t\tthe top of them in a criss-cross pattern. The gloves were long, just barely failing\n\t\t\t\t\t\tto reach my elbows.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI didn't change my shoes. Those had already been black, and I didn't\n\t\t\t\t\t\twant to spend anymore money.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHappy with my choice, I exited the store wearing my new clothes.\n\t\t\t\t\t\n\t\t\t\t\t*goto StoreChoice\n\t\t\t\t#Look at a different store\n\t\t\t\t\tI decided against getting anything, and exited back to the mall.\n\t\t\t\t\t*goto StoreChoice\n\t\t*if (OwnsGoth = 1)\n\t\t\tI browsed around the store, but they didn't have anything of interest I\n\t\t\tdidn't already own.\n\t\t\t\n\t\t\tI exited back to the mall after a short while.\n\t\t\t\n\t\t\t*goto StoreChoice\n\t\t*return\n\t#Check out a store specialized in the latest fashion trends\n\t\tI entered an exceptionally fancy store called, 'U-Central'.\n\t\t\n\t\tI had no idea what the 'U' stood for.\n\t\t\n\t\tThe store only carried the latest brands. Every article of clothing was\n\t\tat the height of fashion and taste. It was also insanely expensive.\n\t\t\n\t\tI grimaced at more than a few price tags around that store.\n\t\t\n\t\tThe store itself was quite colorful, with bright red carpeting, and highly\n\t\tdecorated walls showcasing models in branded clothing.\n\t\t\n\t\t*if (OwnsStylish = 0)\n\t\t\tI normally wore pretty plain clothes. My closet is filled with t-shirts\n\t\t\tand jeans back home.\n\t\t\t\n\t\t\tWell it was, anyway. They're all burned up now.\n\t\t\t\n\t\t\tMaybe that fire was a sign it was time to take my choice of style more seriously.\n\t\t\tMaybe I should care more about how I dress, and take greater pains to look\n\t\t\tas presentable as possible.\n\t\t\t\n\t\t\tOn the other hand...\n\t\t\t\n\t\t\tMaybe one-hundred-and-forty dollars for the cheapest clothes in that store was asking\n\t\t\ta bit much.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t*selectable_if (Cash >= 140) #Buy a stylish outfit - (140 dollars)\n\t\t\t\t\t*set Cash - 140\n\t\t\t\t\t*set OwnsStylish 1\n\t\t\t\t\t*set WearsStylish 1\n\t\t\t\t\t*set WearsPlain 0\n\t\t\t\t\t*set WearsGoth 0\n\t\t\t\t\t\n\t\t\t\t\t[i]Cash left: ${Cash}[/i]\n\t\t\t\t\t\n\t\t\t\t\tMy jacket, shirt, pants, and cap all had popular brands on them.\n\t\t\t\t\tEvery article of clothing was in great condition, made from good\n\t\t\t\t\tmaterial, and most importantly, just flat out looked great.\n\t\t\t\t\t\n\t\t\t\t\tMy outfit's color-scheme contained a lot of blues and whites.\n\t\t\t\t\tAll things considered, it came together great.\n\t\t\t\t\t\n\t\t\t\t\tThe price tag may have been comically high, especially considering\n\t\t\t\t\tI was wearing the cheap option, but I would definitely be getting\n\t\t\t\t\tsome positive attention at school.\n\t\t\t\t\t\n\t\t\t\t\t*goto StoreChoice\n\t\t\t\t#Look at a different store\n\t\t\t\t\tI decided against getting anything, and exited back to the mall.\n\t\t\t\t\t*goto StoreChoice\n\t\t*return\n\t#Leave the mall\n\t\tAfter milling around a while longer, I left the mall.\n\t\t\n\t\t*return\n\t\t\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "substudy": "*comment this section should be used as a studying subroutine ONLY\n\n\n\n*label Begin\n\n\n\n*set Var 2\nI spent some time studying.\n\n*if (EasyStudy = 1)\n\t*set Var + 2\n\tReading 'Secrets to Studying Success' made my efforts even more effective!\n\n\n\n*set Studies + Var\n\n\n\n\n\nIf I took a test right now, I'd probably\n*if (Studies \u003c 80)\n\tmake a C\n*if (Studies >= 80) and (Studies \u003c 90)\n\tmake a B\n*if (Studies >= 90) and (Studies \u003c 100)\n\tmake an A\n*if (Studies >= 100)\n\tget a perfect score.\n\n\n\n\n\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subworkout": "*comment this file should be used for the working out subroutine ONLY\n\n\n\n\n\n\n\n\nThe gym was busy, with tons of people around. Despite being a 'youth' center, I'd say\nthe ratio of young people to adults was about fifty-fifty.\n\nI spent some time running on a treadmill, as well as lifting weights.\n\n*set Athletics + 3\n\nFitness:\n*if (Athletics \u003c 40)\n\tBad\n*if (Athletics >= 40) and (Athletics \u003c 50)\n\tPoor\n*if (Athletics >= 50) and (Athletics \u003c 60)\n\tAverage\n*if (Athletics >= 60) and (Athletics \u003c 70)\n\tDecent\n*if (Athletics >= 70) and (Athletics \u003c 80)\n\tGood\n*if (Athletics >= 80)\n\tAmazing\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "theblackbook": "\n\n\n\n\nElizabeth was waiting for me just outside the guest house.\nShe held a familiar, wicked smile.\n\nThe sun inched over the horizon, sending waves\nof orange light across the still dark sky.\n\n\"Ready to go to school, [i]buddy[/i]?\" The last word left her mouth\nwith just the right inflection to send a chill down my spine.\n\n*fake_choice\n\t#\"You couldn't have just waited for me at school?\"\n\t\t*set Elizabeth - 5\n\t\t\n\t\t\"I'm afraid not,\" she said. \"Lucky you, hmm?\"\n\t\t\n\t\tI rolled my eyes.\n\t\t\n\t\t\"No need to get testy.\" She made for the front gate.\n\t\t\n\t\tI sighed, and followed.\n\t\t\n\t#\"As I'll ever be.\"\n\t\t\n\t\t\"Glad to hear it,\" she said. \"Let's not dally.\"\n\t\t\n\t\tShe made for the front gate, and I followed closely behind.\n\t\t\n\t#[Nod groggily]\n\t\t\n\t\t\"Not much of a morning person?\" she asked.\n\t\t\n\t\tI shrugged.\n\t\t\n\t\t\"Pity.\" She made for the front gate. \"Well, I'm sure the walk\n\t\twill wake you up.\"\n\t\t\n*comment\n\n*page_break\n\nNaturally, I found myself burdened with not only carrying my bag, but\nhers as well. I was surprised, seeing as doing things like that was the reason\neveryone though we were dating. I assumed she planned to take it back before we got to school.\n\nThat, or she realized everybody thought we were dating, and knew it was\ntoo late to do damage control.\n\nA realization struck me after we were about halfway to Lakeside High.\n\n\"Why are we walking?\" I asked.\n\n\"Huh?\" She raised a brow at me. \"I'm not sure what you mean.\"\n\n\"Your family's rich.\"\n\nShe frowned. \"And?\"\n\n\"Why. Are. We. Walking? Don't they have someone who can drive you?\"\n\nShe shrugged. \"There was never really any need. We live so close by, and it's\nnot like it would normally take me this long.\"\n\nI tilted my head. I didn't know what she meant, but it was a little uncanny\nhow she could just appear without me noticing her.\n\nShe wasn't human. She might have been a lot faster than I realized.\n\n*fake_choice\n\t#\"So your going the slow way purely for my benefit? Wonderful.\"\n\t\t*set Elizabeth - 5\n\t\t\n\t\t\"I'd watch that tone if I were you,\" she mocked. \"I could always\n\t\tdecide to take the scenic route. We have plenty of time.\"\n\t\t\n\t\tI sighed.\n\t\t\n\t\tShe shook her head as she continued on.\n\t#\"Do you have super speed or something?\"\n\t\t*set Elizabeth + 5\n\t\t\n\t\tShe laughed. It wasn't really mocking. She seemed sincerely amused.\n\t\t\n\t\t\"Everyone always thinks that for some reason.\"\n\t\t\n\t\t\"That's kind of what it looks like,\" I said. \"Plus, I don't see\n\t\twhat else it could be if it gets you to school faster.\"\n\t\t\n\t\t\"I only meant I wouldn't be walking along the side of the road like\n\t\tthis.\"\n\t\t\n\t\tI looked off to the side. The area near the school was\n\t\theavily forested. Nothing but wilderness stood between\n\t\ther home and Lakeside High.\n*comment\n\n*page_break\n\nElizabeth snatched her bag back as soon as we arrived at school.\n\nShe ran for the front door.\n\n\"You do realize people from school probably saw us walking\ntogether, right?\"\n\nShe nearly tripped over her own feet.\n\n\"Just checking.\"\n\n*page_break\n\nNaturally I didn't see Elizabeth all morning.\n\n*page_break\n\nDuring lunch, I was approached by Matthew.\n\n\"You have time after school?\"\n\nI didn't think I did, given I'd be expected to come in for work.\n\n\"I've got work,\" I said. \"But It's only for a few hours. Probably.\"\n\n\"Oh.\" He frowned. \"Wait, you got a job?\"\n\nMy eye twitched. \"Sort of.\"\n\n\"Where?\"\n\n\"Uh... around?\" I glanced off to the side. \"Oh look. Roxy.\"\n\n\"Huh?\"\n\nI made a ninety-degree turn to the right and approached Roxanne. \"Hey Roxanne!\nHow's it going?\"\n\nShe dumped what was left of her lunch into the trash. \"...Nothing?\"\n\n\"That's great!\" I smiled.\n\n\"Okay... wha- HEY!\"\n\nI grabbed Roxanne's arm and pulled her away. \"Let's go take care of that thing!\"\n\nI really, really hoped Matthew didn't know Roxanne was a friend of Elizabeth's.\n\n*page_break\n\nRoxanne yanked her arm free. \"What are you doing!?\"\n\n\"Sorry, sorry!\" I backed away. \"I needed an out.\"\n\nShe rolled her eyes.\n\nI shrugged. \"Sorry.\"\n\nWe awkwardly stood out in the open. There was still a few minutes before lunch\nwas over.\n\n*if (FlagRanWithRumors = 1)\n\t\"So...\" Roxanne smirked. \"I see Elizabeth isn't with you today.\"\n\t\n\tI laughed. \"I think I may have scared her off.\"\n\t\n\t\"No kidding!\" She chuckled. \"Smooth move running with the rumors like\n\tthat.\"\n\t\n\t\"It's always nice to get a little payback.\"\n\t\n\tHer smirk faded. \"It wouldn't have been necessary if you\n\tweren't trying to brain her with a rock.\"\n\t\n\t*goto AfterRumorCheck\n*else\n\t\"So...\" She stepped up to me. \"Gotta say, Elizabeth told me about you trying\n\tto give her a concussion a couple days ago.\"\n\t\n\t*goto AfterRumorCheck\n*label AfterRumorCheck\n\n\nI scratched the back of my neck. \"Right. Uh, about that-\"\n\n\"Are you seriously going to try justifying throwing rocks at someone?\" She raised\na brow at me.\n\n\"Er- no. That wasn't even me, it was...\"\n\nShe stared at me expectantly.\n\n\"...My friend.\"\n\nRoxanne nearly guffawed. \"Wow.\"\n\n*fake_choice\n\t#\"Sorry\"\n\t\t\n\t\t\"I'm not the one you should be apologizing to.\"\n\t\t\n\t\tShe walked away, leaving me alone in the hall just as the bell rang.\n\t\t\n\t#\"We weren't trying to hurt her.\"\n\t\t\n\t\tShe rolled her eyes, before walking away. The bell rang a few\n\t\tmoments later.\n\t\t\n*comment\n\n\"Lovely.\" I took off toward my next class. \"Oh.\" I stopped.\n\n[i]I didn't hear what Matthew wanted to do later.[/i]\n\nIt was too late to figure that out. Not that it mattered. I wouldn't be able to make it anyway.\n\n*page_break\n\nThe afternoon passed by uneventfully. Unlike the day before, I found myself face to face with\nElizabeth in front of the school.\n\n\"You're walking with me?\" I asked \"Again?\"\n\nShe frowned. \"I'm not too concerned about a few baseless rumors.\"\n\n\"If you say so.\"\n\n\"Be quiet.\" She whipped around and marched forward. \"Just follow me. I've got a special assignment\nfor you today.\"\n\n\"...Wonderful.\"\n\n*page_break\n\nI stared at a large storage shed located behind their mansion. Various gardening tools\ncould be found within. Although I hadn't entered it myself, I had seen a few\ngardeners regularly coming in and out of it while I was working the day before.\n\nElizabeth patted my shoulder. \"Best of luck organizing everything in there. The gardeners will\nbe really thankful. Things always tend to become a bit messy after a while.\"\n\nShe walked away with a triumphant smile as I surveyed the situation.\n\n*page_break\n\nShe wasn't lying about the place being a mess. The shed was not organized in any way. The only\nsemblance of order were the tools being located on the right side, and supplies on the left.\n\nOther than that, everything was just left wherever.\n\nFinding the right spot for everything was going to be difficult.\n\n*page_break\n\nAnd it was. It took the better part of two hours to get that shed looking even halfway decent.\n\nNaturally, as soon as I had finished, Elizabeth abruptly appeared. She\nlooked over every inch of it with a careful eye, lingering pointlessly on each item. I did\nnot believe for one moment that she was really analysing the quality of my work.\n\nEvery few seconds she would accentuate her inspection with a 'hmm'.\n\n*page_break\n\n\"I suppose your work here is acceptable,\" she said. \"Well, that's one task down. You're halfway\ndone for the day!\"\n\n\"What?\"\n\nShe smirked. \"Oh? Surely you didn't think that was it?\"\n\nMy eye twitched.\n\n\"No, no, no. I'm going to need you to put a few things up in the library too.\"\n\nWith a sigh, I followed her into the manor. They had a modest library built into the Western\nwing of the building. Almost a hundred books sat piled haphazardly in one of its corners.\n\n\"What happened?\" I asked.\n\n\"Hmm? Oh!\" She smiled. \"Nothing.\"\n\nI stared at her.\n\n\"Sorry, these things always seem to pile up around here. No idea why.\"\n\nI couldn't tell if she was being sarcastic.\n\n\"Good thing you're here, hmm?\"\n\nI grumbled something so quiet it was unintelligible even to me.\n\n\"Pardon me?\"\n\n\"I'll get right on it,\" I said.\n\n\"Glad to hear it,\" she said. \"I'll see you soon.\"\n\n*page_break\n\nI actually found the library to be a fairly pleasant place to work.\nIt was quiet, and kind of cozy.\n\nI struggled at first to find where any of the books went. Going into the task, I wasn't really that familiar\nwith how libraries organized their books, but once I got into the swing of things, my pace picked up.\n\nWindows were built high along the western wall of the room. When I first looked the sky\nwas already drifting to an intense crimson, however after nearly being done it was almost\nblack.\n\nThe days were getting shorter and shorter. It wouldn't be that long before winter finally\nhit us.\n\nAs my task went on, I noticed how strange some of the family's books were. Most were nothing\nunusual. Some fiction. Some not.\n\nHowever, a select few were very bizarre. Their covers always depicted strange symbols I\ncouldn't recognize, with a title in a language I couldn't read.\n\nAll of them went to a single shelf located in the far end of the library, stuck in\ntheir own lonely corner.\n\nI would have liked to get a glimpse at their contents, but every book was\nbeyond my comprehension.\n\n*page_break\n\nAt least, that's what I thought at first. Near the end of my task, I found a single\nblack book. Its cover depicted a white circle surrounding various markings. However, it had\na title. \n\nAn English one.\n\n'Secret Arts of the Wandering Occultist'\n\nSkimming the first few pages revealed the book was actually written in English. Perhaps\n'book' is the wrong word. It felt more like a tome. It was heavy and thick, not to mention\nold.\n\nAt least it was still in good condition.\n\nI ran my hand down the cover, letting the old texture sink in. I was enamored with my find,\neven if I didn't know what it was.\n\nThe sound of glass breaking snapped me back into the real world.\n\n*page_break\n\nThe windows were far too high up for me too peer out them, but I knew I heard the shatter\ncome from beyond them.\n\nSomething had broken against the outside wall.\n\n\"What on earth...\" I closed my eyes, listening.\n\nIt sounded like somebody was talking.\n\nI opened my eyes just in time to see a flaming bottle smash against one of the windows. Glass\nshattered as flames erupted away from the window. Shards of glass burned as they fell to the floor.\n\n\"What-\"\n\nAnother bottle followed, flying gracefully through the opening the last one created.\nIt shattered against the ground in front of me. Pieces of flaming glass leapt toward me.\nI lifted my arm up, wincing as bits of fire bounced off my sleeve.\n\nMy heart pounded in my chest as I heard something breaking against the wall outside again.\n\n\"Fire... again...?\" My voice was hoarse. \"Someone's fire-bombing the library!\" I stumbled back,\nclutching the book to my chest. \"Somebody! Help!\"\n\nAnother bottle hit a window.\n\nThe window shattered. The bottle didn't.\n\nIt fell in a burning arc until it struck the corner of a shelf. Wood and paper\nignited instantly.\n\nA noticeable amount of smoke filled the room.\n\nFinally, I thought better of sticking around. I whipped around and sprinted for\nthe nearest set of doors. They flung open before I reached them. A man stared\npast me with an expression of shock and fear.\n\nI sprinted by him, running as far from the library as I could.\n\nVoices and shouts filled the halls of the manor. People scrambled to get outside.\n\nI stumbled when I reached the front steps, and rolled into their lawn.\n\nSomehow, I had kept a grip on that book the whole time.\n\n*page_break\n\nRed and blue lights approached in the distance.\n\nSeveral people outside were staring at me. I recognized most of them as servants\nfrom around the house. Elizabeth stood out a bit more, however.\n\nShe looked terrified.\n\nAfter a few moments, I realized she wasn't quite looking at me, but rather my shirt.\n\nI looked down.\n\nSmall embers were burning their way through both the front of my shirt and my\nsleeve. I instinctively patted myself down, putting embers out one after the other.\n\n*if (Elizabeth >= 20)\n\t\n\t\"Oh my god!\" Elizabeth rushed over to me, quickly looking over my arm and torso. \"I'm so\n\tsorry!\"\n\t\n\t\"Huh...?\"\n\t\n\tShe spent several more moments looking over each blackened spot of cloth, until she was\n\tabsolutely certain it wasn't burning any more.\n\t\n\t\"Um, Elizabeth?\" I looked around sheepishly.\n\t\n\tQuite a few people were staring at us. A few were whispering amongst themselves.\n\tSomething about their general demeanor seemed familiar.\n\t\n\t\"It's that high school gossip all over again,\" I mumbled.\n\t\n\t\"Hmm?\" she looked up at me.\n\t\n\tI chuckled. \"Nothing. Don't worry about it.\"\n\t\n\tShe backed away from me. I watched as her expression shifted from worried to\n\tembarrassed. She quickly ran away from me. A few chuckles came from\n\tthe crowd around us.\n\t\n*if (Elizabeth \u003c 20)\n\tShe took a few tentative steps away from me. It looked like she wanted\n\tto say something, but fled instead.\n*comment\n\n*page_break\n\nI stood up. \"Did they catch them?\"\n\nThe people surrounding me just looked around.\n\n\"Who?\" A man approached me from the manor's doorway. It took a few moments\nfor me to realize he was the same guy who threw open the doors to the library.\n\nHis skin was tan, and his hair black. Though we had never really talked, I knew\nhe was Elizabeth's father, Mr. Leavitt.\n\n\"Whoever was throwing those fire-bombs,\" I said.\n\nMurmurs filled the crowd around us.\n\n\"Is that how the fire got started?\" he asked.\n\nI nodded. \"Someone threw them in from outside.\"\n\nA fire truck drove past the gate and came to an abrupt stop in front of the\ncrowd. \n\nMr. Leavitt left me to go deal with them. I took the opportunity to wander\naway.\n\n*page_break\n\nIt wasn't until I had gotten back into the guest house that I realized I was still\nholding onto that book.\n\nIt was probably for the best, considering there wasn't anywhere I could put it. I stared out\nthe guest house window. I couldn't see the fire from there, but I could see orange light. It looked\nlike the fire department was still dealing with it.\n\nI carried the book into my room.\n\nAgain, I found my eyes wandering over the black cover. I studied each symbol on it.\nThey might as well have just been random shapes for all I knew about them. And yet, there\nwas something mysterious and tantalizing about them.\n\nIt felt like I was holding onto some piece of forbidden knowledge.\n\nI heard a door slam. Before I could react, my bedroom's door flung open and I found\na pair of arms wrapped around me.\n\nDespite only being able to see thick locks of blond hair, I knew instantly it was my mother.\n\n*fake_choice\n\t#\"I'm fine.\"\n\t\tShe let go of me.\n\t#\"Are you okay?\"\n\t\tShe nodded before releasing me.\n\t#\"How was your day?\"\n\t\tShe chuckled, and let go of me.\n*comment\n\n\"I'm glad you're all right.\"\n\nI looked down at myself, noticing the soot marks on my clothing. It would\nhave been wise to change out before she saw me.\n\nShe looked distraught. \"They said you were there when the fire started.\"\n\nI nodded. \"Somebody fire-bombed the mansion. I had a close call, but I'm okay.\"\n\n\"I've got to go make sure the Leavitts are okay,\" she said. \"Will you be\nalright by yourself?\"\n\nI nodded. \"Yeah.\"\n\nI retreated back into my room the moment the front door shut.\n\n*page_break\n\n'Secret Arts of the Wandering Occultist'\n\nMy eyes followed the title carefully. I cautiously gripped the cover\nof the book, before flipping it open.\n\nThe very first page was entirely blank, except for one line.\n\n'To my dearest Anastasia... you have my heart and soul for all time.'\n*line_break\n'-B.'\n\n\"B?\" I closed the book, and looked over its cover.\n\nI couldn't find the author's name.\n\nI flipped through the first few pages, but came up just as empty.\n\nThere was nothing to be done for it, so I simply continued on.\n\n*page_break\n\nA brief look through the first several pages revealed the book\nwas somewhere between a personal journal and an instruction guide.\n\nMost pages were snippets of a man's life.\nOthers offered explanations and instructions on various occult topics.\n\nI skimmed most of the passages, simply trying to get a feel for what the book\nwas about. Eventually however, I turned back to the very first instruction\nthe book gave.\n\nThe writer claimed to know a spell to locate paranormal phenomenon.\n\nI started the section by reading his journal first.\n\n*page_break\n\n'It would be my first attempt at the occult arts. A true artistic endeavour.\nThat day, I would no longer be playing at knowing how the darker side of\nour world worked, I would be living it. The tools of my art were prepared,\nI needed to only begin the incantation, and all would be clear.'\n\n'Fear and anxiety tore away at my core. I wanted to give up, and return\nto my home. I considered it. Returning to everything I'd run from. I could\ngo back to being a simple lad, continuing his simple education. I could get\na simple job, a simple wife, and raise a simple family.'\n\n'Sadly, it was not to be. In my youthful arrogance I saw myself fit for\nsomething greater than that. I felt the hidden forces of the world\nwere the key to unlocking my own personal greatness. As if such knowledge\nwould somehow make me into more of a man; one superior to his peers.'\n\n'The spell was simple enough. It would guide me to strange occurrences.\nI would learn all there was to know about the darker side of this world.\nI would go on to meet a variety of strange and wondrous creatures.'\n\n'That spell led me to some of the most verdant gardens of darkness any man\n <script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }

    if (scene == null && line == null) return "";

  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);

    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;

  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);

    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');

      if (Number.isInteger(value)) return String(value);

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],

  class Token {
    constructor(name, value, pos, func) {

      this.value = value;

    let pos = 0;

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);

      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }

    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;

  function charAt(v1, v2) {

    return s.charAt(i - 1);

    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),

      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {

      }

        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {

          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }

        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);

      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");

    }
  }

    const t = Date.parse(value.trim());
