pen the front doors. \"Hey... Malka?\"\n\t\n\t*page_break\n\t\n\tWe were seated at the bar. Malka stared at me, her brow raised.\n\t\n\t\"So, basically,\" I cleared my throat. \"Hypothetically speaking, if I didn't\n\tactually know what you were, and was just bluffing before... that'd be cool,\n\tright?\"\n\t\n\tMalka's expression shifted from confused to upset.\n\t\n\tI swallowed nervously. \"No? Just checking. Good thing-\"\n\t\n\t\"You didn't know? So you were following me to find out what I was hiding.\"\n\t\n\t\"Malka...\"\n\t\n\t*fake_choice\n\t\t#\"Yeah, that's what I was doing.\"\n\t\t\t\n\t\t\tMalka was visibly upset but she didn't say anything.\n\t\t\t\n\t\t\t\"I didn't know you were a ghoul,\" I said. \"But I did know you\n\t\t\twere something. I knew the moment you headed for that gate. If\n\t\t\tyou were just some human, you wouldn't be headed there.\"\n\t\t\t\n\t\t\tMalka sighed. \"It's not the same... Elizabeth's a vampire. They're cool,\n\t\t\tthey're powerful. I'm...\"\n\t\t\t\n\t\t\t\"It doesn't matter,\" I said. \"People... people's opinions on this matter\n\t\t\tare completely arbitrary. People think vampires are cool because of freaking\n\t\t\tmovies.\"\n\t\t\t\n\t\t\t\"It's easy for you to say that,\" Malka said. \"I have to hide what I am. I have to put\n\t\t\ton makeup every day to make myself seem less lifeless. You think I'd even be let through\n\t\t\tthe front door of the school if they knew what I was?\"\n\t\t\t\n\t\t\t\"I don't care what they think of you,\" I said. \"I know you. You're not some zombie that's\n\t\t\ton the edge of slaughtering everyone around her.\" I took a deep breath. \"I'm sorry I lied,\n\t\t\tbut I'm glad you told me. And it's like I said...\n\t\t\t\n\t\t\t\"I don't have a problem with it.\" I smiled at her.\n\t\t\t\n\t\t\tMalka eyed me curiously, but said nothing.\n\t\t\t\n\t\t\t\"If you're angry...\" I stood up. \"I understand. But, I like hanging out with you. I'll\n\t\t\tgive you some time to think it over, but I hope we can keep coming out here like this.\"\n\t\t\t\n\t\t#\"No, I already knew.\"\n\t\t\t\n\t\t\t\"Don't lie to me!\" She scowled at me. \"You lied right to my face. Do you have\n\t\t\tany idea how big a risk I took telling you?\"\n\t\t\t\n\t\t\tI took a deep breath. \"Yes.\"\n\t\t\t\n\t\t\tMy answer may have been a bit too blunt, since whatever Malka was about to say\n\t\t\tdied in her throat.\n\t\t\t\n\t\t\t\"I'm not stupid, Malka.\" I sighed. \"I've seen what people try to do to your kind.\"\n\t\t\t\n\t\t\tShe crossed her arms, but said nothing.\n\t\t\t\n\t\t\t\"I've been one of those people.\"\n\t\t\t\n\t\t\t\"W-what?\" Malka asked.\n\t\t\t\n\t\t\t\"I've harassed your kind before. My friends and I tried to hurt Elizabeth personally.\"\n\t\t\t\n\t\t\tMalka stood up from her seat, and took a step away.\n\t\t\t\n\t\t\tI didn't acknowledge it. \"And I was wrong. I saw Elizabeth and her family as a threat.\n\t\t\tMy friends saw them as a threat. So we tried to hurt them.\"\n\t\t\t\n\t\t\tMalka didn't move.\n\t\t\t\n\t\t\t\"But, right after that, we moved into their guest house,\" I said. \"And I got to know\n\t\t\tElizabeth. I got to know her family. I learned that they weren't what I thought they were.\"\n\t\t\t\n\t\t\t\"I... I have to think about this,\" Malka walked away.\n\t\t\t\n\t*comment\n\t\n\t*page_break\n\t\n\tI left the club a short time later.\n\t\n\t*return\n*comment\n\n\n\n*if (MalkaEvents = 6)\n\tMalka and I didn't talk about what we had discussed. She was still hanging out with me\n\tthough, so at least she still wasn't mad. Probably.\n*comment\n\n\n\nI hung around with Malka for a few hours.\n\n*if (WearsGoth = 0)\n\t\n\tI got the distinct sense I wasn't fitting in due to my clothes. Malka\n\twould probably be having a better time with me if I was dressed more\n\tlike her.\n*if (WearsGoth = 1)\n\t\n\tI fit in pretty well with local crowd due to my fashion sense, even if I\n\tdidn't know that much about the scene.\n*comment\n\n*set Malka + 5\n\nWe mostly just chatted with the other people hanging around, or listened to the music,\nbut it was a pretty good way to spend the day.\n\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subdamien": "\n\n\n\n\n\n\n*if (WearsStylish = 1)\n\t*set Damien + 5\n*comment\n\n\n\n\n\n\n*if (DamienEvents = 0)\n\t*set Damien + 5\n\t*set DamienEvents 1\n\t\n\tI passed through the gate, and made my way to El Abrigo.\n\t\n\tThe streets were just as bustling as they had been when I first saw them.\n\t\n\tThe city was still gorgeous. I caught myself staring at the manor again.\n\t\n\tI wandered into the city streets, but I wasn't really sure where I was headed.\n\tI didn't know where anything was.\n\t\n\tThen again, I guess that was the point.\n\t\n\t*page_break\n\t\n\tI walked along shops, looking at the various wares being peddled.\n\t\n\tOf particular interest were street vendors selling carved stones. The stones\n\theld runes on them, similar to the ones in my own spell book.\n\t\n\tI approached one of the stalls. \"Excuse me?\"\n\t\n\tA pale man with pointed ears perked up at my approach. \"Yes?\"\n\t\n\t\"What are those?\" I asked.\n\t\n\tHe smiled. \"Rune stones, of course!\"\n\t\n\t\"What do they do?\"\n\t\n\t\"Depends on the stone and rune,\" he said, grabbing a couple of different ones. \"This one's\n\tbeen enchanted for luck. This one for protection, And this one for love.\"\n\t\n\t\"Interesting,\" I said. [i]Does my spell book have instructions for making those?[/i]\n\t\n\t\"You've really never seen one before?\" he asked.\n\t\n\tI shook my head.\n\t\n\tHe gave me an appraising look. \"Tell, you what.\" He grabbed the stone for love, and handed\n\tit to me. \"How about I just give you that one, and if it causes you to meet someone, well...\n\tyou'll remember where you got it. Right?\"\n\t\n\tMy eyes widened. \"You'd just give something like this away?\"\n\t\n\tHe smirked. \"Truthfully, most of these stones fail after several days. You'd have to keep\n\tcoming back to make use out of them. Plus... they're pretty cheap to make. All I need is a rock\n\tand a knife\" He pointed toward his own head. \"And this, of course. It takes years of study to make\n\tthese.\"\n\t\n\t\"Really?\" I didn't quite manage to hide my disbelieving tone.\n\t\n\tI hadn't spent so much as a day studying runic magic, and I had no problem doing it.\n\t\n\tthen again, the book had literally everything I needed to perform magic, so maybe I shouldn't\n\thave been too self-congratulatory.\n\t\n\t\"Alright,\" I said. \"I'll carry this on me. If I happen to meet my soulmate, I'll\n\tbe sure to come back to your store,\" I said.\n\t\n\t\"Well then.\" He smiled. \"I look forward to your future patronage.\"\n\t\n\tI chuckled as I pocketed the stone, and walked away from his booth.\n\t\n\t*page_break\n\t\n\tI immediately walked into someone.\n\t\n\t*page_break\n\t\n\t\"Sorry!\" I clumsily backed off.\n\t\n\tDamien stared at me. \"Hey! Watch- oh. Hey, $!{Name}.\"\n\t\n\tI raised a brow at him, while gripping the stone in my pocket.\n\t\n\t*page_break\n\t\n\t[i]This is probably nothing.[/i]\n\t\n\t*page_break\n\t\n\t\"I didn't expect to see you around so soon,\" Damien said.\n\t\n\tI shrugged. \"It was a pretty cool city, I guess I just couldn't stay away.\"\n\t\n\tHe smiled. \"Next time you visit, be sure to stop by the manor, if I'm there, I'll\n\tshow you around. It's better than just wandering at random.\"\n\t\n\t\"Sounds good to me,\" I said.\n\t\n\t*return\n*comment\n\n\n\n*if (DamienEvents = 1) and (Damien >= 20)\n\t*set Damien + 5\n\t*set DamienEvents 2\n\t\n\tI made a point of heading straight to the manor when I arrived at El Abrigo.\n\t\n\tI saw a familiar pair of animated armors standing guard at the front gate.\n\t\n\t\"Uh... hey?\" I approached one of them. \"I'm looking for Damien. Is he here right\n\tnow?\"\n\t\n\tThe guard nodded. \"He is currently in an audience with Lord Reyes. If you wait in the main\n\thall, we will inform him of your presence.\"\n\t\n\t\"Thanks.\" I passed by both of them, and took a seat in the hall.\n\t\n\t*page_break\n\t\n\tI had been waiting about fifteen minutes before Damien came in through one of the hallways.\n\t\n\t\"Hey!\" He waved at me. \"Decided to take me up on my offer?\"\n\t\n\tI nodded.\n\t\n\t\"Well then.\" He shot a toothy grin my way. \"What are we waiting for?\"\n\t\n\t*page_break\n\t\n\tWe walked the crowded streets of El Abrigo.\n\t\n\t\"Hey.\" I glanced at him. \"I didn't interrupt anything important did I?\"\n\t\n\t\"Huh?\" He raised a brow at me.\n\t\n\t\"One of the guards said you were in a meeting with Lord Reyes,\" I said. \"I hope you didn't\n\tcut out of that early just to meet me.\"\n\t\n\t\"Nah.\" Damien smirked. \"It didn't even tell me you showed up until after I was done talking\n\twith him.\"\n\t\n\t\"Good,\" I said. \"I wouldn't want you getting into trouble with your boss just to show me around.\"\n\t\n\t\"Actually...\" Damien frowned. \"He's not exactly my boss.\"\n\t\n\t\"What is he then?\" I asked.\n\t\n\t\"He's more like a... mentor. I guess.\"\n\t\n\t\"So he's teaching you?\" I asked.\n\t\n\tDamien shrugged. \"Basically.\"\n\t\n\t*page_break\n\t\n\t\"Where are we?\" I asked.\n\t\n\t\"Eastern Point,\" he said.\n\t\n\tWe stood in an area enclosed by stone walls. A massive fountain stood in the center, with a huge\n\twhite spike jutting out of its center. Streams of water cascaded down from the top of the spike, giving\n\tits surface a glittering shine.\n\t\n\t\"Is it a park?\" I asked.\n\t\n\t\"Close enough,\" he said. \"Though in my opinion you need grass and at least a few trees to qualify as\n\ta park.\"\n\t\n\t\"It's still pretty.\" I watched other people milling about. Some were eating at a set of nearby benches.\n\tOthers were just casually hanging around.\n\t\n\t\"True,\" he said. \"There's a ton of places like this.\"\n\t\n\t\"I get the sense Lord Reyes has a thing for architectural beauty. If his home is anything to go by.\"\n\t\n\tDamien nodded. \"The guy's an artist at heart. He takes pride in making his city as beautiful as possible.\"\n\t\n\t*page_break\n\t\n\tWe hung around Eastern Point for the better part of an hour before I decided it was getting a bit late.\n\t\n\t\"Come see me again,\" Damien said. \"There's still a lot more of this city to see.\"\n\t\n\tI nodded. \"I'll see you around.\"\n\t\n\t*page_break\n\t\n\tI made my way back to the gate, and returned home.\n\t\n\t*return\n*comment\n\n\n\n*if (DamienEvents = 2) and (Damien >= 40)\n\t*set Damien + 5\n\t*set DamienEvents 3\n\t\n\tI took my time going to the manor in El Abrigo. The city streets seemed unusually busy.\n\t\n\tBanners were being strung up over the streets.\n\t\n\t'Halloween - Festivities start on the 23.'\n\t\n\tI raised a brow. \"Twenty-third?\"\n\t\n\tI thought back on what my mother had told me. The Leavitt's were throwing a party on Halloween.\n\t\n\tAnd this city was apparently starting the holiday a week early. Apparently monsters took the holiday\n\tpretty seriously.\n\t\n\tI was surprised. Halloween mainly consisted of people dressing up like monsters, and then\n\teither going to parties or getting candy.\n\t\n\tIt seemed like the kind of thing real monsters might find offensive.\n\t\n\t*page_break\n\t\n\tLord Reyes stood in his front yard, surrounded by living suits of armor.\n\t\n\tCrates were being unloaded at his front gate. His armored guards took them one by one inside his\n\tmanor.\n\t\n\t\"We only have so much time to prepare, let's get moving!\" Lord Reyes shouted.\n\t\n\tDamien rushed past me. \"The caterers are ready. We can expect them to come down on the twenty-second.\"\n\t\n\tLord Reyes gave a wide smile. \"Excellent! We've got everything ready. This'll be the biggest celebration\n\tour city's held in a long time.\" Lord Reyes peered past Damien. \"Anyway... I think that's all I'll need from\n\tyou today. You should go soak in the atmosphere of the town.\"\n\t\n\t\"Huh? I mean... I guess.\" He tilted his head. \"Are you sure you don't-\" Damien followed Lord Reyes\n\tgaze back to me. \"Oh.\" He smiled. \"Yeah, I've got a few places in mind I'd like to see.\"\n\t\n\t\"Good on you,\" Lord Reyes said. \"I'll see you soon.\"\n\t\n\t*page_break\n\t\n\tDamien rushed up to me. \"How's it going, $!{Name}?\"\n\t\n\t\"Good.\" I jerked a thumb behind me, toward the city. \"What's going on?\"\n\t\n\t\"Halloween.\" He spoke as if it should have been obvious.\n\t\n\tI mean, it was. Though I still didn't understand why they were taking a holiday most well known\n\tas that time you got tons of free candy as a kid, so seriously.\n\t\n\t*page_break\n\t\n\tHe led me through the crowded city streets. We had to stick close to one another to keep from\n\tbeing separated.\n\t\n\tEvery few seconds one of us got bumped or jostled by someone rushing by.\n\t\n\t\"Halloween is really taken serious around here, isn't it?\" I asked.\n\t\n\t\"Absolutely!\" Damien shouted. \"It's [i]our[/i] holiday.\"\n\t\n\tI raised a brow at that statement. \"Really now?\"\n\t\n\t\"Yes!\" Damien spoke with a hint of defensiveness. \"I mean, yeah it has roots in Ireland or something, but that\n\twas ages ago. Things have changed.\"\n\t\n\tI nearly lost my footing when someone charged past me.\n\t\n\tDamien steadied me by grabbing my shoulder. \"You okay?\"\n\t\n\t\"Yeah...\" I said. \"Can we duck out of this crowd?\"\n\t\n\t*page_break\n\t\n\tIt took a while, but we eventually drifted away from the more crowded areas of the city.\n\t\n\tDamien led me to a river that flowed through part of the city. The river flowed through\n\ta man-made canal. Smooth white stones formed the walls of the canal, and it was built in\n\tsuch a way that the river only ever made exact ninety-degree turns. The river had a\n\tvery blocky look to it.\n\t\n\t\"I know a good place built along the canal,\" Damien said.\n\t\n\tAs walked alongside it, I peered into the water. The canal was pretty wide, and I saw a few small boats\n\tcoming and going through it.\n\t\n\tThey always had one person in front of it, guiding it forward. Some had additional passengers, though\n\tthey weren't helping control the boat.\n\t\n\t*page_break\n\t\n\tEventually, we came across a large bridge. A small building was placed on the bridge. I noted a staircase\n\tcurving around the side of the building, ending near the water. Several tables were set next to it, with\n\tpeople eating at them.\n\t\n\t\"Is this some sort of coffee house?\" I asked. \"Or a restaurant?\"\n\t\n\t\"Both,\" Damien said. \"It's one of my favorite spots in town. You can eat next to the water if you want.\"\n\t\n\t\"That's cool,\" I said.\n\t\n\t\"I'm not sure we'll have time to get a full meal,\" Damien said. \"But we can grab some coffee real quick.\"\n\t\n\tI smiled. \"Sounds good.\"\n\t\n\t*page_break\n\t\n\tWe took a seat by the water, underneath the building. When I looked in the water, I made out a few fish\n\tswimming by.\n\t\n\t\"Huh.\" I looked closer. \"That water is really clear.\"\n\t\n\tDamien smirked. \"One of the benefits to being in a pocket dimension. Zero pollution.\"\n\t\n\t[i]Right. Somebody created this... everything.[/i]\n\t\n\t\"How did the fish and trees get here?\" I asked.\n\t\n\t\"They were brought in from outside,\" Damien said.\n\t\n\t\"But there's a whole forest out there,\" I said. \"Did they plant all of those?\"\n\t\n\t\"The first trees. Yeah,\" Damien said. \"Lord Reyes made this pocket dimension hundreds\n\tof years ago. The forest has spread. All the animals he introduced have formed an eco-system\"\n\t\n\tI stared at Damien. [i]Hundreds of years?[/i]\n\t\n\tHe stared back, with a questioning look in his eyes. \"What?\"\n\t\n\t\"How old is Lord Reyes?\" I asked.\n\t\n\tDamien shrugged. \"Nobody knows. Old though. that's for sure.\"\n\t\n\t*page_break\n\t\n\tA waitress came up to us. \"What are you two having?\"\n\t\n\tI looked at the menu given to us.\n\t\n\t\"Uh...\"\n\t\n\t*page_break\n\t\n\tIt was not written in English. Or any other language I recognized.\n\t\n\t*page_break\n\t\n\tI looked at Damien. He was visibly suppressing the urge to laugh.\n\t\n\t\"We're both getting this.\" He pointed to something on the menu.\n\t\n\t\"Of course, sir.\" She took our menus. \"I'll be right back.\"\n\t\n\t*page_break\n\t\n\t\"What did you get?\" I asked.\n\t\n\t\"You'll see.\" He smirked. \"It's not something you'd find in a human city.\"\n\t\n\tA thought crossed my mind.\n\t\n\t*if (Cash = 0)\n\t\tI didn't have any money.\n\t\t\n\t\t*goto MoneyCheck\n\t*comment\n\t\n\tI had ${Cash}\n\t*if (Cash = 1)\n\t\tdollar.\n\t*if (Cash != 1)\n\t\tdollars.\n\t*comment\n\t\n\t*label MoneyCheck\n\t\n\t\"How much were those?\" I asked.\n\t\n\tDamien waved a hand. \"Don't worry. It's my treat.\"\n\t\n\t\"But-\"\n\t\n\t\"Seriously.\" He shot me a toothy grin. \"I make a lot of money working for Lord Reyes. This\n\tis nothing to me.\"\n\t\n\t\"Well... I'd-\"\n\t\n\t\"Seriously!\" Damien laughed. \"It's fine. Don't worry about it.\"\n\t\n\t\"Alright,\" I said. \"If you're gonna twist my arm about it.\"\n\t\n\t\"Why thank you for letting me have the 'privilege' of paying.\"\n\t\n\tI nodded at him. \"Of course. If anyone deserved the honor...\"\n\t\n\tDamien shook his head as we shared a laugh.\n\t\n\t*page_break\n\t\n\tEventually, the waitress returned with two white cups. The drink inside was dark blue,\n\tbut it smelled like coffee.\n\t\n\tDamien watched me closely as he took his drink.\n\t\n\tI looked at the blue coffee before taking a sip.\n\t\n\tMy eyes widened.\n\t\n\t*page_break\n\t\n\tI felt something.\n\t\n\tIt started in my stomach and spread to the rest of my body.\n\t\n\tIt felt good. I felt awake and aware.\n\t\n\tBut, it didn't feel like caffeine. There was something different about\n\tit. I was more soothed, like my body had been healed of its exhaustion,\n\tas opposed to simply being boosted out of it.\n\t\n\t*page_break\n\t\n\t\"W-what is this?\" I asked. \"That felt...\"\n\t\n\t\"Good?\" Damien asked.\n\t\n\t\"Different, but-\" I smiled. \"Yeah. Good.\"\n\t\n\tDamien nodded. \"This stuff's amazing. And you won't crash later from it either.\"\n\t\n\t\"Wow.\" I looked at the cup. \"They need to bring this to our cities.\"\n\t\n\tHe nodded. \"Definitely. I can't count the number of times I felt beat\n\tdown after doing a job on your side, but couldn't get my hands on some of\n\tthis.\"\n\t\n\t\"Couldn't you just order a cup of this, and put it in a Thermos?\" I asked.\n\t\n\t\"Uh...\" Damien furrowed his brows. It looked like he genuinely had never thought\n\tof that. \"I'll be right back.\"\n\t\n\t*page_break\n\t\n\tI waited for him to finish speaking with one of the staff before we left. He\n\tlooked disappointed as we left.\n\t\n\t\"Apparently you have to drink it right away or something,\" he said.\n\t\n\t\"Too bad.\"\n\t\n\t\"Yeah...\"\n\t\n\t*page_break\n\t\n\tIt was getting a bit late, so we split up and went our separate ways.\n\t\n\t\"Make sure to swing by during the Halloween celebrations!\" Damien called\n\tafter me.\n\t\n\t\"I'll do that!\" I shouted back.\n\t\n\t*return\n*comment\n\n\n\n\n\n\n*if (DamienEvents = 3) and (Damien >= 60)\n\t*set Damien + 5\n\t*set DamienEvents 4\n\t\n\tI went straight to the manor when I arrived at El Abrigo.\n\t\n\tI noticed several armored guards patrolling the borders of the town\n\twhen I entered.\n\t\n\t*page_break\n\t\n\t\"Hello.\" I walked up to one of the armored guards in front of the manor. \"Is Damien\n\there?\"\n\t\n\t\"He is currently at work for Lord Reyes,\" it said. \"However, we believe he should\n\tbe finished shortly.\"\n\t\n\tI pondered if it would be appropriate for me to show up and talk to him while\n\the was on the job. Then again, if he would be done soon, then maybe I'd run into\n\thim just as he was finishing up whatever he was doing.\n\t\n\t\"I don't suppose you could tell me where he is?\" I asked.\n\t\n\t\"Outside of town,\" it said. \"Specifically, he likely went up the Northern\n\tTrail.\"\n\t\n\t\"Northern Trail. Right,\" I said. \"I'm going to assume that's north of the city?\"\n\t\n\tIt nodded.\n\t\n\t\"Which way is north?\"\n\t\n\t*page_break\n\t\n\tA dirt road, similar to the one I had arrived to El Abrigo from, went North, deeper\n\tinto the woods surrounding the city.\n\t\n\tI followed them. I figured I'd probably run into Damien on his way back.\n\t\n\t*page_break\n\t\n\tI was walking for quite a while. Almost an hour, before I started having doubts\n\tabout heading in the right direction.\n\t\n\tMaybe there was more than one trail headed north. Maybe Damien had been off in the woods,\n\tand came back to the road somewhere behind me.\n\t\n\t*page_break\n\t\n\tI pushed forward. If I didn't see anything for another half hour, I'd turn back.\n\t\n\t*page_break\n\t\n\tI heard something in the distance. It sounded like wood breaking.\n\t\n\tI picked up the pace, rushing forward.\n\t\n\t*page_break\n\t\n\tI hadn't really noticed before, but the sky was looking a bit strange. It was still blue,\n\tbut the color somehow looked off.\n\t\n\tI looked back toward the city. The sky hanging over it looked normal. Conversely, when I\n\tlooked at the sky in opposite direction, it just seemed to get stranger.\n\t\n\tThe blue color shifted closer to a teal color. The clouds were strangely formed too.\n\t\n\tThey weren't fluffy, rather they had odd sharp angles to them.\n\t\n\t*page_break\n\t\n\tI kept moving forward, but at a much slower pace.\n\t\n\tI heard a crunch and inhuman shriek.\n\t\n\tSomething came stumbling out of the forest.\n\t\n\tIt looked like a small tree, but its body was bent and warped unnaturally, as if something\n\thad twisted and stretched its trunk and branches out. The bark was completely black.\n\t\n\tThe small tree's movements were very abrupt. It would either be stock still, or moving at a lightning-fast\n\tpaced. Every time it moved the tree made a loud 'crunch'.\n\t\n\t\"What the hell?\" I took a step away.\n\t\n\tI hoped that thing was friendly.\n\t\n\tIt rushed forward, stopping a few feet in front of me.\n\t\n\tI stumbled back.\n\t\n\t\"Where do you think you're going!?\" Damien slammed into the tree.\n\t\n\tIt didn't move an inch. After a few seconds, it did a rapid spin, throwing Damien\n\tback.\n\t\n\tDamien threw himself forward. He repeatedly clawed into the creature's side with his\n\tbare claws. I saw wood and bark splintering across the ground.\n\t\n\tThe tree moved back, before launching itself at him. It punctured his shoulder with a\n\tsingle long branch.\n\t\n\tDamien let out a shout before snapping the branch off the tree.\n\t\n\t\"Alright you bastard,\" he said. \"You want this to get ugly?\" He pulled a small hammer\n\tout of his pocket. It wasn't a war hammer or anything. It looked exactly like what I\n\twould find in anyone's garage.\n\t\n\tHe sprinted in front of the tree, jumped up on the air, and brought the hammer down\n\tacross it.\n\t\n\tThe strike sent out a deafening crunch as the hammer's metal handle was bent in his hand.\n\tThe tree-monster was split wide open down the middle.\n\t\n\tDamien, somewhat ineffectually, tried to strike the creature with the hammer again, but\n\tcouldn't get a good angle. He mostly just grazed it with the handle.\n\t\n\tThe tree convulsed unnaturally, like its body was made out of flesh rather than wood.\n\t\n\tDamien tossed the hammer away, before kicking the creature hard enough to send it\n\trolling across the ground.\n\t\n\tHe stepped up, grabbed each half of its mostly split body with each hand, and tore\n\tit fully apart.\n\t\n\t*page_break\n\t\n\tSomething... happened. It felt like the air around me had shattered.\n\t\n\t*page_break\n\t\n\tThe tree turned fully black, as if it were a three-dimensional shadow. It\n\tfell apart, disintegrating into dust.\n\t\n\tI stared at Damien as the ash-like stuff faded.\n\t\n\tHe was a bit torn up, with dozens of wounds across his body. I got the sense he had\n\tbeen fighting for a while.\n\t\n\t*page_break\n\t\n\tI feebly raised my hand up, and waved at Damien. \"Hey.\"\n\t\n\tHe stared at me, eyes wide with shock. \"$!{Name}? What are you doing out here?\"\n\t\n\t\"I heard you were on a job. Figured I'd meet you halfway.\"\n\t\n\t\"I'm an exterminator!\" Damien shouted. \"I fight monsters! Dangerous ones!\"\n\t\n\t[i]Oh yeah. I was supposed to have known that, wasn't I?[/i]\n\t\n\t\"Sorry,\" I said.\n\t\n\tHe pinched the bridge of his nose, took a deep breath, and walked up to\n\tme. \"Come on. Let's get you out of here.\"\n\t\n\t*page_break\n\t\n\t\"Are you going to be alright?\" I asked, eyeing his wounds.\n\t\n\tHe smirked. \"Yeah. I heal fast.\"\n\t\n\t\"Good,\" I said. \"What were those things?\"\n\t\n\t\"I don't know,\" he said. \"It's a common issue with these pocket dimensions. Really weird\n\tstuff pops up along the borders. No one knows where they come from or why they're so\n\thostile.\"\n\t\n\t\"They just... appear?\" I asked.\n\t\n\tHe nodded. \"I've heard people theorize that they used to be something normal. That tree\n\tfor example. It might have just been an ordinary tree once, but it was growing too close\n\tto the border and... something happened.\"\n\t\n\tI looked back where we came from. \"I'm surprised anyone would wander away from the city.\"\n\t\n\t\"Most people don't,\" Damien said. \"The further out you go, the worse it gets. The land starts\n\twarping. Weird plants and animals start appearing.\"\n\t\n\t\"Has anyone every tried venturing out really far?\" I asked. \"To see what's out there?\"\n\t\n\tDamien nodded. \"Over the years, there's been a ton of people that have tried that.\n\t\n\t\"They don't usually come back.\"\n\t\n\t*page_break\n\t\n\tIt had taken so long to walk out and meet him, by the time we had gotten back,\n\tI realized I would need to go home soon.\n\t\n\tI wished that gate out in the woods was closer.\n\t\n\t\"Sorry,\" I said. \"If I had just stayed in town...\"\n\t\n\tDamien shook his head. \"It's alright. If you hear I'm on a job, just stay here. alright?\"\n\t\n\t\"Okay.\"\n\t\n\t*page_break\n\t\n\tI had to head back home shortly after that.\n\t\n\t*return\n*comment\n\n\n\n\n*if (DamienEvents = 4) and (Damien >= 80)\n\t*set Damien + 5\n\t*set DamienEvents 5\n\t\n\tI made a quick stop by the guest house before going to El Abrigo.\n\t\n\tI grabbed the black book, and shoved it into my bag.\n\t\n\t*page_break\n\t\n\t\"He's currently in the main hall,\" said one of the armored guards.\n\t\n\t\"Thanks,\" I shouted, as I ran into Lord Reyes manor.\n\t\n\tI threw open the doors, and found numerous people working on the interior.\n\tDecorations were being set up, preparations being made. That Halloween week\n\tof celebration was coming up, and it looked like they were getting ready.\n\t\n\tDamien stood in one of the corners, leaning back against the wall.\n\t\n\t\"They not have anything for you to do?\" I asked.\n\t\n\tDamien perked up when he saw me. \"Nope. I'm glad you came by, I was getting bored.\"\n\t\n\t*page_break\n\t\n\tWe walked the halls of the manor. It looked like Damien was headed toward the garden\n\tin the back.\n\t\n\t\"Hey, I wanted to show you something,\" I said.\n\t\n\tDamien glanced at me.\n\t\n\tI pulled out the black book. \"Lord Reyes said something about... runic magic?\"\n\t\n\tDamien nodded. \"That's the spell book?\"\n\t\n\t\"It's more like a journal-slash-instruction guide. But close enough.\"\n\t\n\t*page_break\n\t\n\tWe went out into Lord Reyes garden. Once again, it was great sight. It didn't look\n\tlike his planning for Halloween had gotten in the way of taking care of it.\n\t\n\t\"So, why are you showing me this?\" Damien asked, flipping through the book.\n\t\n\tI shrugged. \"Mostly, I just wanted to know more about it. I've heard of runic magic\n\tbefore.\"\n\t\n\tDamien scratched the back of his head. \"I don't know how much I could help you. I've\n\tonly got a layman's knowledge of the subject.\"\n\t\n\t\"That's still better than my understanding of it,\" I said. \"Which is nothing.\"\n\t\n\t\"Alright.\" Damien cleared his throat. \"Let's see... well the basic principle revolves around certain\n\tsymbols. These symbols have universal meaning. For example, the letter A is only known\n\tas a letter, and only has certain sounds associated with it, because we gave it that meaning.\n\tThose associations are entirely arbitrary.\n\t\n\tThese symbols however, have non-arbitrary meaning behind them. They mean what they mean, regardless\n\tof what we think or know about them.\"\n\t\n\t\"So...\" I tilted. \"It's written in stone then? The universe has decided these symbols have a particular\n\tmeaning?\"\n\t\n\tDamien nodded. \"Right. And these symbols, when used in certain patterns produce certain effects. Which is\n\tbecause they're infallible.\"\n\t\n\tI raised a brow. \"What do you mean... 'infallible'.\"\n\t\n\t\"Any meaning conveyed through runes is true. Always.\"\n\t\n\t\"Like... they could make anything happen?\" I asked.\n\t\n\t\"That's right,\" Damien said. \"Supposedly anyway. In practice, these runes take years of research to understand\n\tand even then... it's pretty much beyond us.\"\n\t\n\t\"I see...\"\n\t\n\tDamien continued. \"Anyway, to use runic magic, all you need is a pattern. Patterns can be vocally spoken words,\n\teach symbol has at least one word associated with it. Or they can be drawn. Or both.\"\n\t\n\tI waited a moment.\n\t\n\tDamien didn't say anything.\n\t\n\t\"And?\"\n\t\n\t\"That's all I know about it,\" he said. \"Different patterns convey different meanings. And those meanings\n\twill always be true. If your pattern says the sun will explode in five seconds, that's exactly what's gonna\n\thappen.\"\n\t\n\tI paled.\n\t\n\t\"But...\" Damien laughed. \"That's basically impossible. More complicated actions require more complicated\n\tpatterns. Nobody's ever discovered a pattern that has that kind of destructive potential.\"\n\t\n\t*page_break\n\t\n\t\"Thanks,\" I said.\n\t\n\tHe shrugged. \"Sorry I don't know more than that.\"\n\t\n\tI smiled at him. \"Honestly... I think that's all I really needed to know about it.\"\n\t\n\t*page_break\n\t\n\tWe spent some time hanging around Lord Reyes manor, before I had to go home for the day.\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (DamienEvents = 5) and (Damien >= 100)\n\t*set Damien + 5\n\t*set DamienEvents 6\n\t\n\tI met up with Damien and we went off into the city. He made a point\n\tof guiding me away from the crowded streets immediately.\n\t\n\tSomething which I was grateful for.\n\t\n\t*page_break\n\t\n\t\"Can I ask you something?\" Damien asked.\n\t\n\t\"Sure.\"\n\t\n\t\"What was the deal with you before?\"\n\t\n\tI raised a brow at him. \"Hmm? When?\"\n\t\n\t\"That girl. Werewolf. She showed up yelling that a human had breached one of our\n\tgates. But,\" Damien frowned, as he studied my face. \"That's not really what's bothering\n\tme.\"\n\t\n\tI crossed my arms. \"Alright? What is bothering you then?\"\n\t\n\t\"She said something about you hating monsters. She said that you tried to hurt one\n\tof her friends,\" Damien said. \"Was that really true?\"\n\t\n\tI glanced away. I could probably lie, but...\n\t\n\t*page_break\n\t\n\t\"Yeah,\" I said. \"A bunch of my friends and I showed up with a mob in front of Elizabeth's home.\n\tWe tried to hurt her.\"\n\t\n\t\"Elizabeth?\"\n\t\n\t\"Roxanne's friend,\" I said. \"It wasn't that long ago either. Not even a full month. But, I had to\n\tmove in to her family's guest house. My mom and I had no other choice. I was forced to interact with\n\ther. I had to get closer to her, whether I liked it or not.\"\n\t\n\t\"And...?\" Damien watched me closely. His expression seemed almost suspicious.\n\t\n\t\"She... they weren't what I thought they were,\" I said. \"Creatures. Monsters. whatever you want to\n\tcall them.\" I laughed. \"We're... almost friends now. Sort of.\"\n\t\n\t\"So you don't feel the same way you did before?\" Damien asked.\n\t\n\t\"No,\" I said. \"I like her. And Malka. And... I guess, Roxanne.\" I shrugged. \"For a given value\n\tof [i]like[/i].\" I looked at Damien. \"And I like you too. It's hard to think a certain type of people\n\tare terrible when you're friends with them.\"\n\t\n\tDamien laughed. \"You went from despising all monsters to being friends with a demon?\"\n\t\n\tI chuckled. \"Tell me about it.\"\n\t\n\t*page_break\n\t\n\tUnlike before, we didn't really visit any place in particular. We took our time, and just checked our random\n\tshops and locales.\n\t\n\tThe city was so gorgeous, I didn't care. It was just nice to get to take in all the sites with Damien.\n\t\n\t*page_break\n\t\n\tI hoped whatever his concerns were would disappear over time. I'd gotten to know him pretty well,\n\tI think ultimately, he knew he could trust me.\n\t\n\t*page_break\n\t\n\tThe day wore on, and eventually I had to take my leave.\n\t\n\t\"I'll see you around,\" I said.\n\t\n\tDamien nodded, before silently leaving.\n\t\n\t*return\n*comment\n\n\n\n\n\n\n\n*set Damien + 5\n\n\nI spent the afternoon wandering around El Abrigo with Damien. He showed me various\nlocations and points of interest, while explaining what different creatures were.\n\n*if (WearsStylish = 1)\n\t*set Damien + 5\n\t\n\tI caught him examining my outfit on more than a few occasions. I thing he greatly approved\n\tof my stylish clothing.\n*comment\n\nEventually the day had worn on long enough, and I made my way back home.\n\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subhunterlodge": "*comment this file should be used for the hunter lodge subroutine ONLY!\n\n\n*if (Athletics >= 60)\n\t*set Fighting + 2\n\t*set Matthew + 5\n*comment\n\n\n\n\n\n\n\n\n*if (MatthewEvents = 0)\n\t*set MatthewEvents 1\n\t*set Matthew + 5\n\t\n\tThe Hunters Lodge was a compound out in the woods. It consisted of two old buildings, and a huge\n\tfenced off area behind it.\n\t\n\tThe two buildings looked like repurposed cabins. They might have been someone's vacation home\n\tonce, before being turned into a training center.\n\t\n\t\"I'm glad you decided to come, buddy.\" Matthew looked extremely happy. \"Trust me, this is going\n\tto be great!\"\n\t\n\tI eyed a few bruises on him. \"Yeah...\"\n\t\n\t\"You'll have a few of your own after a couple of training sessions.\"\n\t\n\tI frowned. \"Is that really a good thing?\"\n\t\n\t*page_break\n\t\n\tSeveral cars were parked out front when we arrived. Some were brand new, and looked expensive;\n\tothers were beaten down and old.\n\t\n\tI noted a carved wooden slate placed above the double-doors leading inside. It depicted a sword\n\tpiercing through the head of a wolf.\n\t\n\tI looked back at the cars, and noticed a similar decoration on several of the vehicles.\n\t\n\tThe doors creaked as Matthew opened them. \"Fair warning, they're definitely going to put\n\tyou in a sparring match during your first day. You know, so they'll have an idea of your\n\tcurrent skill level.\"\n\t\n\t\"I've never been in a real fight,\" I said. \"\n\t*if (Athletics \u003c 50)\n\t\tAnd I'm not exactly in great shape.\n\tI don't have a skill level.\"\n\t\n\t\"Well then,\" He said \"It's all the more important you start practicing early.\"\n\t\n\t*page_break\n\t\n\tWe stood inside the largest of the two buildings. It served as some sort of meeting hall,\n\twith a large open room filled with tables. A bar was set up alongside the wall, with a few\n\tpeople sitting and chatting by it.\n\t\n\tHalf-a-dozen people crowded a bulletin board covered in posts and notes.\n\t\n\tAn old man stood at the far end of the room, surveying the scene before him. His eyes locked\n\ton mine.\n\t\n\tI swallowed nervously.\n\t\n\t\"Hey, gramps!\" Matthew shouted. \"Got ${Him} right here!\"\n\t\n\tI shot a glare at Matthew. Several people stared at us.\n\t\n\t\"Seriously!?\" I hissed.\n\t\n\tHe grabbed my shoulder led me forward. \"Got some fresh meat right here.\"\n\t\n\tA few people were chuckling. Someone let out a holler.\n\t\n\tThe old man didn't give much of a reaction when I was presented.\n\t\n\tHe was tall, and had a thick, white beard. He walked around me, eyeing me, sizing me up.\n\tHe took my arm, and lifted it. He gripped it firmly.\n\t\n\tI tensed.\n\t\n\t*if (Athletics \u003c 60)\n\t\t\"$!{He}'s a little on the scrawny side.\" The old man spoke matter-of-factly. It\n\t\twasn't insulting, or demeaning. It was just the truth.\n\t\t\n\t\tHe let go.\n\t*if (Athletics >= 60) and (Athletics \u003c 100)\n\t\t\"Hmm.\" He released me. \"There's room for improvement.\"\n\t*if (Athletics = 100)\n\t\t\"$!{He} seems quite strong.\" He let go.\n\t*comment\n\t\n\tThe old man walked to a set of doors leading to the fenced off area in the back.\n\t\n\t\"Follow me,\" he said. \"We'll see if you have any talent for this.\"\n\t\n\t*page_break\n\t\n\tThe fenced off area behind the lodge was far bigger than I realized. The moment\n\tI stepped outside the terrain took a sudden, downward slope. I could see everything.\n\t\n\tThey had a shooting range set up, with several people taking aim at far away targets.\n\t\n\tA different range was set up for several archers. A couple used bows, but most wielded\n\tcrossbows.\n\t\n\tWe approached a shallow pit of sand in the very center of the back area. A small crowd\n\twas gathered around it.\n\t\n\tTwo figures darted to and from one another. I couldn't make out what was happening\n\tuntil we were at the edge of the ring.\n\t\n\tOne man, and one woman were fighting. They wore protective padding.\n\t\n\tThe man threw a punch. The woman ducked under it, charged, and slammed into his\n\tstomach. They tussled on the ground, punching, kicking, and grappling.\n\t\n\t\"Er...\" I looked at Matthew.\n\t\n\t\"Hm?\" He tilted his head at me.\n\t\n\t*fake_choice\n\t\t#\"They have men and women fight each other here?\"\n\t\t\t\"We're training you lot to fight the monsters of this world,\" the old man said.\n\t\t\t\"Those creatures rarely care if you're a man, woman, or child. They'll kill\n\t\t\tyou just the same. This isn't a sport or a game. Your life is on the line,\n\t\t\tyou need the best training you can get. We're not going to coddle anyone\n\t\t\tover something as irrelevant as gender.\"\n\t\t\t\n\t\t\t[i]Well, I'm making a great first impression...[/i]\n\t\t\t\n\t\t\t*if (Sex = \"female\")\n\t\t\t\t\"No worries,\" Matthew said. \"Even if they pair you against a man, you'll\n\t\t\t\tdo fine. Trust me.\"\n\t\t\t*if (Sex = \"male\")\n\t\t\t\t\"What's wrong, man?\" Matthew elbowed my ribs a few times. \"Afraid of\n\t\t\t\tfighting a girl?\"\n\t\t#\"Am I going in there?\"\n\t\t\t\"Of course!\" Matthew grinned. \"Everybody who shows up for their first day\n\t\t\thas to. It's kind of like Fight Club. Except we also have crossbows and stuff.\"\n\t*comment\n\t\n\tThe crowd applauded. I looked back into the ring.\n\t\n\tThe man was being helped up by the woman he was sparring.\n\t\n\t\"What did I miss- Matthew!\"\n\t\n\tHe grabbed my from behind, and shoved me into the ring.\n\t\n\tI whipped around, and shot a glare his way.\n\t\n\tA stocky woman caught it. She stepped into the ring, and tossed me some protective\n\tgear.\n\t\n\tShe already wore hers.\n\t\n\t\"You ready, kid?\" she asked.\n\t\n\tI looked at her arms.\n\t\n\t[i]I didn't know women could get that kind of muscle.[/i]\n\t\n\tI fumbled with the gear, trying to quickly put it on.\n\t\n\t*page_break\n\t\n\t\"Keep your hands up!\" Her gloved hands struck the side of my head.\n\t\n\tGood thing I wore padding.\n\t\n\tMy efforts during our fight. Or rather, 'fight', were... pathetic.\n\t\n\tI constantly shifted between just blocking attacks, or completely dropping\n\tmy guard and throwing punches.\n\t\n\tI got chewed out and hit hard either way. None of my attacks were landing.\n\t\n\tShe effortlessly blocked or dodged anything I threw her way. And unless I completely\n\tfocused on defense, I couldn't seem to block her strikes.\n\t\n\tDespite the last two people in the pit grappling, kicking, and just generally, brawling,\n\tall the woman did was punch. Very rarely she'd throw in a kick, but it was always pretty\n\teasy to avoid.\n\t\n\tDespite that woman absolutely hammering me, I assumed she was holding back by not tackling me to\n\tthe ground, or trying to grapple.\n\t\n\t*set Fighting + 2\n\t*set Athletics + 2\n\t\n\tEventually, after I don't know how long, someone called her off. I fell to my knees as soon as she\n\tstepped away.\n\t\n\t*page_break\n\t\n\tEverything was sore.\n\t\n\t*page_break\n\t\n\tMatthew patted me on the back as soon as I stepped into the ring. I winced when he did.\n\t\n\t\"Heh, sorry.\" He smiled. \"So... what did you-\"\n\t\n\tThe same stocky woman from before gripped Matthew's shoulder. \"Your turn.\"\n\t\n\t\"Huh, but I-\"\n\t\n\tShe dragged him one handed into the pit. \"Your friend's fine. Just get ready.\"\n\t\n\tI took my padded gear off, and stepped away from circle.\n\t\n\t\"Hmm...\" The old man sighed. \"I take it you've never been in a fight?\"\n\t\n\tI nodded. \"Not a real one anyway.\"\n\t\n\tHe smiled. \"Good. It's easier to work with a clean slate then...\" He looked at Matthew\n\tin the pit. \"People who only think they know everything about combat.\"\n\t\n\t\"So... does that mean I'm in?\" I asked.\n\t\n\tHe laughed. \"If by 'in' you mean allowed to come train at the lodge... yes. Though\n\twe're not nearly as restrictive as people think. I've found that most are intimidated\n\tat the idea of just asking us to teach them, so most don't.\"\n\t\n\t\"What happens now?\" I asked.\n\t\n\t\"Now... we give you training with every weapon we legally can,\" he said. \"Which mostly just\n\tmeans no guns.\"\n\t\n\t*page_break\n\t\n\tI spent the rest of my time at the lodge being handed, bows, crossbows, knives, clubs, swords,\n\tand various other oddities, and being given basic instruction in their use. It wasn't as intensive\n\tas the one-on-one sparring, but it was a start.\n\t\n\tThey showed me specialized bolts they had for their crossbows. Some were coated in iron, others\n\tsilver. I had heard of cross-bolts being made with gold tips, but they were so rare most lodges\n\tweren't carrying them just for training.\n\t\n\tBefore I knew it, the day was winding down. Matthew met up with me, once again battered and bruised.\n\t\n\tWe chatted as we made our way back to town.\n\t\n\t\"So,\" he said. \"What did you think.\"\n\t\n\t\"It was... interesting.\"\n\t\n\t\"You coming back?\" Matthew asked.\n\t\n\t*fake_choice\n\t\t#\"Definitely\"\n\t\t\t*set Matthew + 5\n\t\t\t\n\t\t\t\"Alright!\" He grinned. \"You and me are gonna make an amazing team someday.\n\t\t\tJust wait and see!\"\n\t\t#\"Maybe\"\n\t\t\t\"Ah, c'mon!\"\n\t\t\t\n\t\t\tI laughed. \"I'll see you tomorrow, man.\"\n\t\t\t\n\t\t\tHe smiled. \"Alright. See you then.\"\n\t*comment\n\t*return\n*comment\n\n\n\n\n\n\n\n*if ((MatthewEvents = 1) and (Fighting >= 8)) and (Matthew >= 20)\n\t*set MatthewEvents 2\n\t\n\tI joined Matthew out at the hunters lodge.\n\t\n\tI watched Matthew as he stumbled out of the sparring ring. He shot me\n\ta weary smile as he plopped down next to me.\n\t\n\tA couple of new people stepped into the ring. The crowd surrounding\n\tthem applauded, ready for another show.\n\t\n\t\"Hurting?\" I asked.\n\t\n\t\"Absolutely,\" he said. \"That's how you know you put forth a good effort.\"\n\t\n\t\"It doesn't feel like I'm making any real progress,\" I said.\n\t\n\t\"What do you mean?\"\n\t\n\tI shrugged. \"I've been training here a few times now. It just doesn't seem\n\tlike I'm doing any better than when I started.\"\n\t\n\tMatthew stood up. \"It takes time to improve. You can't expect to become\n\ta master overnight. Give it a month or two.\"\n\t\n\tI crossed my arms. \"I'll be a master in a month or two?\"\n\t\n\t\"Uh, no.\" He smirked. \"But you might just be merely bad by then, instead\n\tof totally sucking.\"\n\t\n\tI laughed. \"Vote of confidence accepted.\"\n\t\n\t\"Well, buddy.\" He grabbed my shoulder, and led me from the sparring pit. \"That's\n\twhy I'm here.\"\n\t\n\t*page_break\n\t\n\tWe walked around the grounds. I suspected Matthew wanted to get at least one training\n\tsession in with each course.\n\t\n\tThey had me do the same thing the very first day, but I wasn't sure that was actually\n\twhat we were supposed to be doing.\n\t\n\tIn fact, I noted most members of the lodge just hung around certain areas. Some people\n\tsparred, some went to the shooting range, others practiced archery.\n\t\n\tThere was overlap of course. People sparring might train with guns.\n\t\n\tBut nobody trained with everything.\n\t\n\tMatthew stepped up to a brick wall that stood alone in small clearing. Various knives\n\twere placed in a box on a nearby table.\n\t\n\tWooden targets were set up on the wall, and Matthew took his turn trying to hit the\n\tthem.\n\t\n\t\"Why do you train at everything?\" I asked.\n\t\n\t\"Because.\" He threw a knife. It the target, but the handle of the knife was the part\n\tthat actually made contact. \"I want to be good with as many weapons as I can.\"\n\t\n\t*fake_choice\n\t\t#\"Shouldn't you try to be more specialized?\"\n\t\t\t\n\t\t\t\"Huh?\"\n\t\t\t\n\t\t\t\"I mean-\" I scratched the back of my neck. \"You could spend a thousand hours\n\t\t\tpracticing with all these different weapons and be sorta good at using them,\n\t\t\tor you could train with just one weapon, and be amazing with it.\"\n\t\t\t\n\t\t\tHe smiled. \"Well, I'll just have to put in ten-thousand hours or\n\t\t\twork, and become amazing at everything.\"\n\t\t\t\n\t\t\tI frowned.\n\t\t\t\n\t\t\t[i]In which case, you could have mastered one weapon.[/i]\n\t\t#\"I guess it never hurts to be more prepared.\"\n\t\t\t\n\t\t\t\"Exactly,\" Matthew said. \"You'll never know when you'll need to be able\n\t\t\tto do something like this. So, we need to keep practicing.\"\n\t\t\t\n\t\t\tHe threw another knife. It hit the target blade first, but didn't stick.\n\t*comment\n\t\n\tHonestly, I didn't know anything about being a hunter. Maybe he was right.\n\t\n\tI didn't exactly see myself becoming a professional hunter, so it didn't really\n\tmatter.\n\t\n\t*page_break\n\t\n\tI spent the rest of the day training with Matthew.\n\t\n\t*page_break\n\t\n\t*set Fighting + 2\n\t*set Athletics + 2\n\t*set Fighting + 2\n\t*return\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n*if (MatthewEvents = 2) and (Matthew >= 40)\n\t*set MatthewEvents 3\n\t*set Matthew + 5\n\t*set Athletics + 2\n\t*set Fighting + 2\n\t\n\tWe were making the rounds at the hunters hall. Oddly, Matthew\n\thad elected not to spar in the pit that day, instead just focusing\n\ton weapons training.\n\t\n\tThe numerous bruises on his arms and legs may have had something to\n\tdo with that.\n\t\n\tSometimes I worried he was a little too enthusiastic about his training.\n\tIf he wasn't careful, he was going to hurt himself one of these days.\n\t\n\t*page_break\n\t\n\tWe stood at the archery range. The other people present effortlessly\n\treadied their arrows and fired them.\n\t\n\tMatthew needed a little more time than them. He seemed to struggle to\n\tget the arrow set right.\n\t\n\tHe fired a shot. It completely missed the target.\n\t\n\tMatthew's accuracy wasn't exactly stellar either.\n\t\n\t*page_break\n\t\n\tMy archery skills on the other hand...\n\t\n\t*page_break\n\t\n\t...was god awful. It took me two hours to figure out how to fire an arrow correctly.\n\tI rarely hit my targets.\n\t\n\tIt always seemed to take me too long to shoot too. Matthew could\n\tfire an arrow off twice as fast as me. And the other archers\n\tpresent could do it even faster.\n\t\n\t*page_break\n\t\n\t\"Want some tips?\" Matthew asked.\n\t\n\t\"Is the novice playing at being a master?\" I asked.\n\t\n\tHe shrugged. \"I'm better at it than you.\"\n\t\n\t*fake_choice\n\t\t#\"Fair enough.\"\n\t\t\t*set Fighting + 1\n\t\t\t\n\t\t\tMatthew walked over, and watched me as I readied a shot.\n\t\t\t\n\t\t\t\"Lower your shoulders a bit more,\" he said. \"I think your standing\n\t\t\tup a little too straight.\"\n\t\t\t\n\t\t\tI took aim.\n\t\t\t\n\t\t\t\"Hold your breath when you fire!\"\n\t\t\t\n\t\t\t\"Isn't that rifles?\" I asked.\n\t\t\t\n\t\t\t\"Hmm.\" Matthew stared off into space, a contemplative look across\n\t\t\this features. \"I can't remember.\"\n\t\t\t\n\t\t\tI let the arrow loose. It missed my target by a mile.\n\t\t\t\n\t\t\t\"Alright, I'm-\"\n\t\t\t\n\t\t\t\"Hold on.\" Matthew handed me another arrow. \"Practice makes perfect. Just keep\n\t\t\tshooting. Don't worry if you can't hit the target yet.\"\n\t\t\t\n\t\t\t\"...Fine.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tI spent the next several minutes firing shot after shot. My aim steadily improved,\n\t\t\tthough not by much.\n\t\t#\"Maybe this weapon just isn't for me.\"\n\t\t\t\n\t\t\t\"That's ridiculous,\" Matthew said. \"It's all about repetition. You just have to keep\n\t\t\tpracticing, and you can get good at anything.\"\n\t\t\t\n\t\t\t\"There is such a thing as talent,\" I said.\n\t\t\t\n\t\t\t\"Hard work beats talent,\" Matthew said. \"Trust me on that one.\"\n\t\t\t\n\t\t\t\"If you say so...\"\n\t\t\t\n\t\t\tI kept practicing, though perhaps not with the same enthusiasm as before.\n\t*comment\n\t\n\t*page_break\n\t\n\tWe continued making our rounds around the training grounds.\n\t\n\t\"And there he is again...\" A woman said.\n\t\n\tA man chuckled. \"Yeah, I know. What's up with him? Can't make up his mind?\"\n\t\n\t\"Not very talented, eh?\"\n\t\n\tThey seemed to be leering toward myself and Matthew.\n\t\n\t[i]Are they talking about me?[/i]\n\t\n\t\"He's dragging that newbie around with him, wasting his time too.\"\n\t\n\t*page_break\n\t\n\t\"Something wrong?\" Matthew asked.\n\t\n\tI looked ahead, and nearly bumped into Matthew.\n\t\n\t\"Oh! Sorry.\" I glanced back. \"Let's... let's keep going.\"\n\t\n\t*return\n*comment\n\n\n\n\n\n\n\n*if (MatthewEvents = 3) and (Matthew >= 60)\n\t*set MatthewEvents 4\n\t*set Matthew + 5\n\t*set Athletics + 2\n\t*set Fighting + 2\n\t\n\tA massive number of people showed up to the hunters lodge that\n\tday.\n\t\n\tEvery parking spot was taken, and I could hear the dull roar of a crowd\n\tbefore I even stepped through the front door.\n\t\n\tMatthew and I shared a curious look before entering.\n\t\n\t*page_break\n\t\n\tNobody was attending the main building, everyone stood outside of it,\n\tlooking out into the training area.\n\t\n\tSeveral cages made from thick steel bars stood near the sparring pit.\n\tA very thin black cloth covered the cages. The material was thin\n\tenough to just barely be able to see through them.\n\t\n\t\"No. Way.\" Matthew looked shock. \"They captured some.\"\n\t\n\tI followed Matthew as rushed forward to meet the crowd.\n\t\n\t*page_break\n\t\n\tThe old man I met during my first visit stood in front of the cages.\n\t\n\t\"The time has come for the initiation,\" he said. \"To those who wish\n\tto join our ranks, and officially become hunters, step forward now\n\tand be judged.\"\n\t\n\t\"What's going on?\" I asked.\n\t\n\tMatthew didn't take his eyes off the cages. \"This is how people become\n\treal hunters. They're given a test against an actual monster. If they\n\tcan win alone, they pass.\"\n\t\n\t\"Who can try to become a hunter?\" I asked. \"How long do you have to\n\ttrain?\"\n\t\n\tHe laughed. \"Anyone can take the test. You could be here eight years\n\tor eight minutes. Doesn't matter. If you win, you pass.\"\n\t\n\t*page_break\n\t\n\tDespite the massive crowd around us, only three people stepped forward.\n\t\n\tThe old man nodded, and started with a short but stout man from the trio.\n\t\n\t\"Step into the pit.\" The old man stepped aside as a cage was dragged to the\n\tedge of the pit.\n\t\n\tA man and woman stepped into the pit, and marked the challenger with something\n\tred.\n\t\n\tI glanced at Matthew. \"What is-\"\n\t\n\t\"Human blood,\" Matthew said. \"So the creature won't charge the crowd instead of him.\"\n\t\n\t\"Where'd they get the blood?\"\n\t\n\tHe shrugged. \"They normally keep some on hand in case someone gets hurt during training.\"\n\t\n\t*page_break\n\t\n\tThe old man walked over the the cage, unlocked a heavy padlock attached to the door, and\n\tstepped away.\n\t\n\tThe crowd grew silent, the challenger in the ring raised up a knife and hunkered down.\n\t\n\tI narrowed my eyes at the cage. I could see movement beyond the cloth. A shadow approached\n\tthe doorway. Whatever it was looked humanoid, though I could see a set of long claws extending\n\tfrom one of its hands.\n\t\n\t*page_break\n\t\n\tThe figure lunged forward, throwing the cage open as it stumbled into the pit. Its face held\n\tno features. No mouth, no eyes, nothing. Its claws looked like they were made of metal.\n\t\n\t\"Wait...\" I narrowed my eyes at it. \"That looks just like-\"\n\t\n\tThe creature sprinted forward, and swiped at the challenger. He ducked, and slashed its\n\tbelly as he ran around it.\n\t\n\tThe thing's stomach bled, though it hardly seemed affected. It whipped around and blindly\n\tslashed and swung at him.\n\t\n\tThe man didn't allow himself to be pushed back. He kept circling the creature, just barely\n\tstaying out of its lethal reach.\n\t\n\tThat man only slashed and stabbed occasionally. He didn't risk going all in. Slowly, cuts\n\tand puncture wounds formed across the creature's arms.\n\t\n\tThe pit's sand was steadily growing redder as the fight wore on.\n\t\n\t*page_break\n\t\n\tThe creature slowed down. It's steps were less certain, less solid. It couldn't keep standing\n\tup straight.\n\t\n\tThe man was looking a bit tired, but still didn't have a single scratch on him.\n\t\n\tThe creature stumbled, and fell to one knee. The man lunged forward, and drove his blade\n\tinto its throat. He tore it away in the blink of an eye, sending a streak of red\n\tdroplets across the sand.\n\t\n\tA strange chocking came from the creature.\n\t\n\t*page_break\n\t\n\tIt fell.\n\t\n\t*page_break\n\t\n\tThe man breathed heavily, staring down at it.\n\t\n\tIt twitched occasionally, but otherwise seemed to be done.\n\t\n\t*page_break\n\t\n\tThe crowd exploded into applause.\n\t\n\tMatthew watched the scene with a determined expression. \"Someday...\"\n\t\n\tI raised a brow.\n\t\n\t\"Someday that's gonna be me in there,\" he smirked. \"I'll be one of the greatest\n\thunters this world's ever seen.\"\n\t\n\t*page_break\n\t\n\tDespite there being a couple other challengers, and despite Matthew really\n\twanting me to stay to watch the other fights, I spent what time I had left training.\n\t\n\tI went home a little while later.\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (MatthewEvents = 4) and (Matthew >= 80)\n\t*set MatthewEvents 5\n\t*set Matthew + 5\n\t*set Athletics + 2\n\t*set Fighting + 2\n\t\n\tI watched Matthew sparring in the pit again.\n\t\n\t\"Him again?\" Someone in the crowd said. \"This'll be over quick.\"\n\t\n\t*page_break\n\t\n\tI still couldn't grasp any useful information from watching the fights.\n\tI figured that I would eventually develop some sort of insight into\n\tthe fights, that I would gain the ability to read moves, and make\n\tpredictions on the fight.\n\t\n\tSo far, I was just watching two dudes duking it out. I had no clue\n\twhat each person's strategy was, or who might win.\n\t\n\tThe only guess I could make was looking at the win-loss rates for\n\teach fighter, but the hunters lodge didn't keep records like that.\n\t\n\t*page_break\n\t\n\tI eyed several visible bruises on Matthew's arms. He winced every\n\ttime he had to block a strike.\n\t\n\t\"He wouldn't be so bad if he'd stop over-training.\"\n\t\n\t\"I don't think it's that he's bad... he's just never even close to\n\tone-hundred percent. And he never lets himself heal.\"\n\t\n\tMatthew took a blow to his stomach and faltered. I couldn't see it through\n\this padded armor, but I knew his torso was just as roughed up as his arms.\n\t\n\tI crossed my arms.\n\t\n\t[i]They're just bruises. He wouldn't fight with an actual injury would he?[/i]\n\t\n\tMatthew breathed heavily as he struggled to stand up straight.\n\t\n\tHis opponent delivered a rapid flurry of punched all across his torso.\n\t\n\tMatthew collapsed.\n\t\n\t*page_break\n\t\n\tNot, fell to one knee, or plopped down on the ground.\n\t\n\tCollapsed.\n\t\n\t*page_break\n\t\n\tI made a move to enter the pit, but several people beat me to it.\n\t\n\tMatthew waved one of them off, and pushed himself back to his feet. His legs were\n\ta bit shaky, but he managed to walk out of the ring and sit down in some grass.\n\t\n\t*fake_choice\n\t\t#[Say nothing]\n\t\t\t\n\t\t\tI sat down next to Matthew. A few people approached us, asking if we\n\t\t\twere okay.\n\t\t\t\n\t\t\tI deferred to Matthew, and he always waved them off.\n\t\t\t\n\t\t\tAfter a good long while he looked at me. \"Just needed to catch my breath.\"\n\t\t\t\n\t\t\tI sighed, and stood up. \"Is that a fact?\"\n\t\t\t\n\t\t\t\"Yeah.\" He stood up, his legs still shaking. \"C'mon let's-\"\n\t\t\t\n\t\t\t\"No. That's it,\" I said. \"No more training today.\"\n\t\t\t\n\t\t\t\"I won't get good if I don't try my hardest.\"\n\t\t\t\n\t\t\t\"You won't get good if you're freaking dead!\" I scowled at him. \"What is\n\t\t\tthe point of all this?\"\n\t\t\t\n\t\t\t\"I- you wouldn't get it.\" Matthew frowned as he glanced away. \"I won't stop.\n\t\t\tNo matter what.\"\n\t\t\t\n\t\t#\"Are you alright?\"\n\t\t\t\n\t\t\t\"Of course, man.\" He winced as he forced a smile. \"I think it was just\n\t\t\ta lucky hit.\"\n\t\t\t\n\t\t\tI crossed my arms, and scowled at him. \"No. It wasn't. You need to stop this.\"\n\t\t\t\n\t\t\t\"Alright, alright.\" Matthew struggled to his feet. \"He was pretty good. But\n\t\t\tI'll get better.\"\n\t\t\t\n\t\t\t\"Stop doing that.\"\n\t\t\t\n\t\t\t\"What?\" Matthew asked.\n\t\t\t\n\t\t\t\"That. Brushing this off.\" I sighed. \"What are you trying to accomplish here?\"\n\t\t\t\n\t\t\tHe glanced off to the side. \"I'm trying to get better. That's it.\"\n\t\t\t\n\t\t#\"What the hell are you doing?\"\n\t\t\t\n\t\t\t\"What-\"\n\t\t\t\n\t\t\t\"What is this!?\" I shouted. \"I've been looking the other way for a while now. You\n\t\t\ttrain every single day. You're bruised and battered every single day. Why? Why\n\t\t\tdo you keep pushing yourself that hard?\"\n\t\t\t\n\t\t\t\"I...\" He frowned, and glanced away. \"I'm going to be the best.\"\n\t\t\t\n\t\t\t\"The best what?\"\n\t\t\t\n\t\t\t\"Hunter. What else?\"\n\t*comment\n\t\n\tI opened my mouth to say something, but Matthew just brushed past me.\n\t\n\t\"I knew you wouldn't get it.\"\n\t\n\t*page_break\n\t\n\tI left the hunters lodge alone.\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (MatthewEvents = 5) and (Matthew >= 100)\n\t*set MatthewEvents 6\n\t\n\tI approached the hunters lodge. I knew Matthew was there, but I\n\tworried about what he was doing.\n\t\n\tWhen I entered the main hall, I saw a woman looking over the crowd,\n\tseemingly trying to find someone.\n\t\n\tShe looked familiar.\n\t\n\tIt was something about her face and her hair. I had seen it before.\n\t\n\t*page_break\n\t\n\t\"Looking for someone?\" I asked.\n\t\n\tShe nodded. \"A boy around your age. Matthew Rowe.\"\n\t\n\t\"He's a friend of mine.\" I guided her to the door leading out back. \"He's\n\tprobably training out there right now.\"\n\t\n\tSomething shifted in her features. I just barely couldn't make out what it was.\n\t\n\tShe almost seemed... annoyed.\n\t\n\tI stared at her for a few moments. Realization struck me.\n\t\n\tI was looking at Mrs. Rowe. Matthew's mother.\n\t\n\t*page_break\n\t\n\tSure enough, Matthew was in the sparring pit.\n\t\n\tAgain.\n\t\n\t*page_break\n\t\n\tHe didn't look any better than he did before. His opponent seemed unusually\n\tslow. They were definitely holding back.\n\t\n\tMrs. Rowe stepped into the pit.\n\t\n\t\"Uh...?\" I looked around. \"You're not allowed to-\"\n\t\n\tMatthew opponent made a lunge toward him.\n\t\n\t\"That's enough!\" Mrs. Rowe stepped in the way.\n\t\n\tI didn't quite make out what happened, other than Mrs. Rowe clearing blocking\n\tthe attack and performing some sort of follow up.\n\t\n\tMatthew's opponent was thrown across the sand. Mrs. Rowe whipped around the face\n\tMatthew, a snarl formed across her features.\n\t\n\t\"M-mom!?\" He shouted.\n\t\n\tShe grabbed his shoulder. \"With me. Now.\"\n\t\n\t*page_break\n\t\n\tI tentatively followed Matthew and his mother as they walked away from the hunters\n\tlodge.\n\t\n\t\"What do you think you're doing here?\" She asked him.\n\t\n\t\"Huh?\" Matthew stared at her.\n\t\n\tShe scowled. \"What. Are. You. Doing. Here?\"\n\t\n\t\"T-training?\"\n\t\n\t\"To do what?\" Mrs. Rowe asked.\n\t\n\t\"To do what you do. To kill monsters.\"\n\t\n\tMrs. Rowe stopped. She looked at Matthew. Her eyes twitched.\n\t\n\tI took a tiny step back.\n\t\n\t*page_break\n\t\n\t\"What [i]I[/i] do?\" Mrs. Rowe asked\n\t\n\tMatthew nodded slowly.\n\t\n\t\"The only thing you're training to do here, is commit murder.\" She glared at him.\n\t\"These people don't know what I do. They don't understand what my people do.\"\n\t\n\t\"But-\"\n\t\n\t\"These people are no better than those kids that attacked that vampire family\n\ta while back.\"\n\t\n\tI blinked. \"What?\"\n\t\n\tShe looked at me. \"An attempted stoning. Than a fire-bombing. If I recall correctly.\"\n\t\n\tI paled, as did Matthew.\n\t\n\t\"But...\" Matthew stared at her. \"You're a hunter. You fight monsters all the time.\"\n\t\n\t\"I fight threats to...\" She gave Matthew a curious look. \"Did you think those people\n\twere doing the right thing? Attacking a family like that?\"\n\t\n\t\"We... they-\"\n\t\n\t\"We!?\" She shouted. Mrs. Rowe looked horrified. \"What do you mean 'we'?\"\n\t\n\tI took a step forward, but Matthew subtly raised a hand.\n\t\n\tAdmitting I was a part of that was probably a terrible idea.\n\t\n\t\"I wanted to run them out of town,\" he said. \"So I gathered up my friends, and-\"\n\t\n\t\"Enough.\" Mrs. Rowe took a deep breath. A number of emotions passed through face.\n\t\n\t*page_break\n\t\n\tShock.\n\t\n\tAnger.\n\t\n\tSadness.\n\t\n\t*page_break\n\t\n\tDisappointment.\n\t\n\t*page_break\n\t\n\t\"We're going home,\" she said. \"Clearly, we have much to discuss.\"\n\t\n\t*page_break\n\t\n\tMatthew didn't say a word as he departed with her.\n\t\n\tI didn't stay much longer.\n\t\n\t*return\n*comment\n\n\n\n*if (MatthewEvents = 6)\n\tI trained at the hunters lodge, but didn't see Matthew.\n\t\n\t*set Fighting + 2\n\t*set Athletics + 2\n\t*set Matthew + 5\n\t\n\t*if (Athletics >= 60)\n\t\tFighting + 2\n\t*comment\n\t\n\t*return\n*comment\n\nI spent the afternoon training at the hunters lodge with Matthew.\n\nMy combat skills got a bit sharper, and it was a good workout.\n\n*set Fighting + 2\n*set Athletics + 2\n*set Matthew + 5\n\n*if (Athletics >= 60)\n\tI was in much better shape than I used to be. Matthew was still a ways\n\tahead of me, but I was catching up. And more importantly, I was training\n\ta lot harder.\n\t\n*comment\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "subleavittmanor": "*comment this file should be used for the Leavitt Manor subroutine ONLY!\n\n\n*if (EventTutor = 2)\n\t*set Elizabeth + 5\n\t*set Cash + 20\n\t\n\t*page_break\n*comment\n\n\n\n*if (ElizabethEvents = 0)\n\t*set ElizabethEvents 1\n\t*set Elizabeth + 5\n\t\n\tI still occasionally got lost in that manor, despite having gone through every\n\tsingle room multiple times.\n\t\n\tAt the time, I was wandering through one of the outer halls. Large windows lined the wall\n\ton my right, giving me a nice view of somebody's rose bed.\n\t\n\tI think that put me at Western wall.\n\t\n\tSeveral portraits were hung from the wall on my left. Every single one was labeled\n\twith a name and a date. A few were fairly new, most were extremely old.\n\t\n\tApparently the Leavitt bloodline had very few daughters, given the number of men\n\tin the paintings.\n\t\n\tI didn't recognize any of the people depicted. Not surprising, given some dated back\n\tto more than two hundred years ago.\n\t\n\t*page_break\n\t\n\t'Wendell & Kara Leavitt - 1999'\n\t\n\tI stopped in front of a painting of Mr. and Mrs Leavitt. They stood side by side, holding\n\tsomething in their arms. It was a baby, bundled up in a blanket.\n\t\n\t\"Aren't you supposed to be working?\" Elizabeth approached from down the hall.\n\t\n\t\"Yeah...\" I studied the painting. \"Is that you?\"\n\t\n\t*set Elizabeth + 5\n\t\n\t\"Hmm?\" She stepped next to me. \"Oh, yes. It is.\"\n\t\n\t\"How old were you?\" I asked.\n\t\n\tShe shrugged. \"I think this was from just after I was born. That's\n\twhat mom said anyway.\"\n\t\n\t\"Is that why they had it made?\" I asked. \"To celebrate having a child?\"\n\t\n\t\"I... I suppose.\" She frowned at me. \"I never really asked about it.\"\n\t\n\t*fake_choice\n\t\t#\"Why? Too cheesy?\"\n\t\t\t*set Elizabeth + 5\n\t\t\t\n\t\t\tElizabeth smirked. \"Just get back to work.\" She wandered off.\n\t\t#\"I'd imagine its easy to forget about things like this, since for you they've just always been around.\"\n\t\t\tShe shrugged. \"I guess.\"\n\t\t\t\n\t\t\tI walked away. \"I should get back to work.\"\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (ElizabethEvents = 1) and (Elizabeth >= 20)\n\t*set ElizabethEvents 2\n\t*set Elizabeth + 5\n\t\n\tI wandered through what used to be the library. Enough of the damage had been repaired that we could\n\tenter when the work crew wasn't there.\n\t\n\tElizabeth sat alone at one of the tables. She kept her head propped up on one arm. Her head drooped\n\tevery few seconds. A book lie open in front of her.\n\t\n\tI smirked as her eyes drifted more and more closed.\n\t\n\t*page_break\n\t\n\tElizabeth's eyes closed. She slumped forward.\n\t\n\t*page_break\n\t\n\tI slammed both of my palms against the table.\n\t\n\tElizabeth shot up, eyes wide.\n\t\n\tI smiled at her.\n\t\n\tShe glared back at me.\n\t\n\t*page_break\n\t\n\tI sat down across from her. \"What are you doing?\"\n\t\n\t\"Reading.\" She looked down at her book.\n\t\n\t\"With your eyes closed?\"\n\t\n\tShe glanced up at me. Her eyes were cold. \"I didn't get much sleep last night.\"\n\t\n\tI looked at her book. \"What are you reading?\"\n\t\n\t\"None of your business.\"\n\t\n\t\"Hmm. I hadn't heard of that book.\"\n\t\n\tShe stared at me.\n\t\n\tI smiled back.\n\t\n\t*page_break\n\t\n\tShe shut the book, and scooted it to the side. \"What do you want?\"\n\t\n\tI shrugged.\n\t\n\t*fake_choice\n\t\t#\"Just trying to chat.\"\n\t\t\t\n\t\t\t\"Why?\" she asked.\n\t\t\t\n\t\t\t\"No reason not to, I guess.\"\n\t\t\t\n\t\t\tShe frowned. \"There's plenty of reason not to.\"\n\t\t\t\n\t\t\t\"Maybe,\" I said. \"Doesn't mean I can't anyway.\"\n\t\t\t\n\t\t#\"I was just bored.\"\n\t\t\t\n\t\t\tShe scowled. \"Well, I'm a little busy.\"\n\t\t\t\n\t\t\t\"Reading?\"\n\t\t\t\n\t\t\t\"Yes.\"\n\t\t\t\n\t\t\t\"And sleeping?\"\n\t\t\t\n\t\t\tShe pinched the bridge of her nose, and sighed.\n\t*comment\n\t\n\tI eyed her book. Her hand was still on it, but I could make out the cover.\n\t\n\t*page_break\n\t\n\tIt depicted a shirtless man holding onto both a woman, and a length of rope. They\n\tstood on the deck of a ship. Rain poured down on both of them.\n\t\n\t'Lovers on the Sea'\n\t\n\t*page_break\n\t\n\tI raised a brow at the book. \"So that's what you're into, huh?\"\n\t\n\t\"What?\" She followed my gaze to her book, and immediately hid it on her lap. \"Oh, um.\"\n\tShe blushed a little. \"I only read these occasionally... They're really quite mature\n\tstories.\"\n\t\n\tI nodded. \"I can only imagine.\"\n\t\n\t\"No, I didn't mean it like that!\"\n\t\n\tShe was comically flustered. I couldn't get enough of it.\n\t\n\t\"They're just... good stories. I enjoy them.\"\n\t\n\t\"Again.\" I nodded. \"I can only-\"\n\t\n\t\"And what sort of stories are you into?\" she asked.\n\t\n\t\"Changing the subject?\" I asked. \"Fine. I...\"\n\t\n\t*page_break\n\t\n\t[i]Do self-help books qualify as 'stories'?[/i]\n\t\n\t*page_break\n\t\n\t\"...Stories that show how an individual can overcome specific hardships through\n\tthe correct application of technique.\"\n\t\n\tShe raised a brow. \"I see...\"\n\t\n\t*page_break\n\t\n\tI couldn't figure out how to pad the conversation out any further, so I returned\n\tto my work, and she returned to her reading/nap.\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (ElizabethEvents = 2) and (Elizabeth >= 40)\n\t*set ElizabethEvents 3\n\t*set Elizabeth + 5\n\t\n\tI wandered into the dining room and found my mother and Elizabeth chatting\n\tabout something.\n\t\n\t*page_break\n\t\n\tA sinking feeling hit my stomach immediately.\n\t\n\t*page_break\n\t\n\tMy mother was holding a photo album in her hand. She was showing it to\n\tElizabeth.\n\t\n\t\"Mom?\" I approached them. \"What are you doing with Elizabeth?\"\n\t\n\t\"Oh, hey,\" my mother said. \"Elizabeth and I got to talking, and... I\n\tended up grabbing our old pictures.\"\n\t\n\tElizabeth smirked. \"There's actually quite a few of you in here.\"\n\t\n\tI tentatively walked around them to see the photos.\n\t\n\t*page_break\n\t\n\t[i]Dear god. I thought the fire destroyed those.[/i]\n\t\n\t*page_break\n\t\n\t\"I think ${He} was in the fourth grade,\" my mother said. \"$!{He} was playing\n\tRudolf. Isn't that costume just adorable?\"\n\t\n\tElizabeth was clearly trying not to laugh.\n\t\n\tMy eye twitched.\n\t\n\t\"Why don't we look at these more often?\" mom asked. \"We could have easily lost\n\tthese when the house burned down.\"\n\t\n\tElizabeth giggled.\n\t\n\t\"Oh! Here's one of you visiting Uncle Jack.\"\n\t\n\t\"Mom...\" I pinched the bridge of my nose. \"I really don't want to reminisce about my childhood\n\tphotos.\"\n\t\n\tMom frowned. \"Oh, but you never know-\"\n\t\n\t\"How do you know my mother and father?\" Elizabeth asked.\n\t\n\t*page_break\n\t\n\tBoth mom and I stared at her.\n\t\n\t\"Huh?\" I raised a brow.\n\t\n\tElizabeth glanced away. \"Your mom, and my parents, they seem to know each other pretty\n\twell. How come I've never seen you around before? How come they haven't mentioned you?\"\n\t\n\t\"Well...\" My mom closed the album. \"They probably didn't want you to know about how things\n\tused to be.\"\n\t\n\tElizabeth frowned. \"What do you mean?\"\n\t\n\tMy mom sighed. \"It wasn't that long ago when vampires revealed themselves to the world, alongside\n\ta bunch of other creatures. Things were really bad at first.\" \n\t\n\tElizabeth and I exchanged a glance.\n\t\n\t\"I mean, there were a lot of people that were intrigued by them.\" Mom smiled. \"Vampires have been pretty popular\n\tin fiction for a while now.\" Her smile faded. \"But, not everybody was so welcoming. They got death threats.\n\tSometimes people actually attacked them.\"\n\t\n\t\"Where did you fit in to all of that?\" I asked.\n\t\n\t\"I was a bit of an activist back in the day.\" She smiled. \"I'm not as active on the scene anymore, but I\n\tformed a lot of connections with all sorts of people. I still keep in touch with a lot of them, even to\n\tthis day.\"\n\t\n\t\"I guess you were lucky you kept a link to my parents,\" Elizabeth said.\n\t\n\tMom nodded. \"We would have been in a bad way if your family hadn't been there to help us.\"\n\t\n\t*page_break\n\t\n\t\"You know...\" Mom looked between us. \"I'm happy to see you two growing closer together. It really makes\n\tme think all that fighting I did made some difference.\"\n\t\n\t\"I...\"\n\t\n\t\"Though,\" she continued. \"I guess it goes without saying that my $!{Son} would get along just fine\n\twith a vampire.\"\n\t\n\tI stared at Elizabeth for a long while.\n\t\n\tElizabeth stared back.\n\t\n\t*page_break\n\t\n\tI made an excuse to leave shortly after that.\n\t\n\t*return\n*comment\n\n\n\n\n\n*if (ElizabethEvents = 3) and (Elizabeth >= 60)\n\t*set ElizabethEvents 4\n\t*set Elizabeth + 5\n\t\n\tI decided I wanted to do some work that day, and headed toward the Leavitt\n\tManor.\n\t\n\tTo my surprise however, I found Elizabeth still in front of the school.\n\t\n\tTwo girls were talking to her. One was a red head, the other blond. I didn't recognize either of them.\n\t\n\t*page_break\n\t\n\t\"Why do you even come to school?\" the red head asked. \"Nobody wants you here.\"\n\t\n\tThe blonde spoke up. \"Why don't you just stay in your fancy little mansion? At least\n\tno one would have to see you then.\"\n\t\n\t*page_break\n\t\n\t[i]Seeing those two get their heads bitten off by a pissed off Elizabeth aught to be fun.[/i]\n\t\n\t*page_break\n\t\n\tElizabeth meekly replied, \"I'm just trying to go home.\"\n\t\n\tthe blond responded. \"We know,\"\n\t\n\t\"We just don't get why you won't stay there.\"\n\t\n\tElizabeth glanced off to the side. \"Sorry.\"\n\t\n\tI blinked. \"...What?\"\n\t\n\t*page_break\n\t\n\tThey all looked my way.\n\t\n\tElizabeth's eyes went wide the moment she realized who I was. She scurried\n\taway.\n\t\n\t\"About time...\" the red head said. \"Let's go.\"\n\t\n\tThe blond followed her friend as they left.\n\t\n\t*page_break\n\t\n\tI crossed my arms. \"What. The. Hell?\"\n\t\n\tI immediately headed toward the manor, hoping that Elizabeth was headed there too.\n\t\n\t*page_break\n\t\n\tShe was. Specifically, she was in the still-not-quite-repaired library. Her nose was\n\tdown in a book.\n\t\n\tShe seemed okay. As much as she ever was.\n\t\n\tI approached slowly and quietly.\n\t\n\tI sat down across from her.\n\t\n\tIf she heard me, she didn't acknowledge it. She just flipped through another page of her book.\n\t\n\tI mulled over the many different ways I could beat around the bush, refusing to acknowledge what\n\tI just saw, while still trying to talk about it.\n\t\n\t*page_break\n\t\n\tThen I decided to grow a spine. \"What was that all about?\"\n\t\n\t\"What do you think?\" she asked.\n\t\n\t\"I didn't mean 'why were they being mean to you', that part was obvious.\"\n\t\n\tShe glared at me. At least she was looking at me now.\n\t\n\t\"Why did you do that?\"\n\t\n\t\"What?\" she asked. \"Dare to show up to school?\"\n\t\n\t\"No,\" I said. \"Why did you just sit there and take that? You never would have taken that crap\n\tfrom me.\"\n\t\n\tShe flipped the book shut. \"I don't have any blackmail I can use to force them to leave me alone.\"\n\t\n\tI got the distinct feeling I was treading on thin ice. \"So, what? You'd let me get away with that\n\tif you didn't?\" So naturally, I pushed my luck.\n\t\n\t*page_break\n\t\n\t\"Yes.\"\n\t\n\t*page_break\n\t\n\tI tilted my head. All the little gears were turning as I tried to piece what she meant together.\n\t\n\t\"I... what?\"\n\t\n\t\"Yes.\" Elizabeth took a deep breath. \"If I didn't have that blackmail to hold over your head, I would\n\tliterally do nothing to you.\"\n\t\n\t*fake_choice\n\t\t#\"Why?\"\n\t\t\t\n\t\t\t\"What would be the point?\"\n\t\t\t\n\t\t\tBefore I could answer, she was on her feet and out the door.\n\t\t\t\n\t\t#\"Stand up for yourself.\"\n\t\t\t\n\t\t\tHer face hardened. \"How? By beating them up? Yeah, I'm sure the school, or if it came\n\t\t\tdown to it, the police, would be really sympathetic toward a monster beating up one of\n\t\t\ttheir own.\"\n\t\t\t\n\t\t\t\"You don't have to brawl with them, but-\"\n\t\t\t\n\t\t\t\"Go screw yourself,\" Elizabeth stood up, and grabbed her book. \"You don't know anything.\"\n\t\t\tShe took off.\n\t\t\t\n\t\t#\"Tell somebody.\"\n\t\t\t\n\t\t\t\"Tell who?\" Elizabeth asked. \"The school? They aren't going to care.\"\n\t\t\t\n\t\t\t\"Have you tried?\"\n\t\t\t\n\t\t\t\"I don't need to,\" she said. \"I know what they all really think of me. The students. The\n\t\t\tteachers...\"\n\t\t\t\n\t\t\tI glared at her. \"And your parents?\"\n\t\t\t\n\t\t\tShe glared right back. \"I'm not dealing with anything they aren't. Why should they have to\n\t\t\tsort out my problems for me, when they're still dealing with their own?\" She stoop up, grabbed\n\t\t\ther book, and made for the door. \"I can handle this without their help. And without yours.\"\n\t*return\n*comment\n\n\n\n\n\n*if (ElizabethEvents = 4) and (Elizabeth >= 80)\n\t*set ElizabethEvents 5\n\t*set Elizabeth + 5\n\t\n\tI wandered through a hallway in the Leavitt Manor. I took my time looking over various\n\tpaintings.\n\t\n\tI thought back to what I saw happen to Elizabeth. It seemed like she had been getting bullied for quite\n\ta while.\n\t\n\tMaybe I shouldn't have been so surprised by that, given my own actions against her. Perhaps I had\n\tspent a little too much time dehumanizing her. It hadn't occurred to me what living like that is like.\n\t\n\tI wanted to help, but a question lingered in my mind.\n\t\n\tWas it really any of my business to get involved?\n\t\n\tShe didn't want my help.\n\t\n\t[i]We aren't even really friends.[/i]\n\t\n\t*page_break\n\t\n\t[i]Or... I think we're not. I would know if we were. I think.[/i]\n\t\n\t*page_break\n\t\n\tI accidentally bumped into someone.\n\t\n\t\"Oh! Hello, $!{Name}.\"\n\t\n\t\"Sorry,\" I looked up to see Mr. Leavitt looking down at me. \"I wasn't watching where I was\n\tgoing.\"\n\t\n\t\"It's alright,\" he said. \"You seemed worried about something. Is something wrong?\"\n\t\n\t\"Uh...\"\n\t\n\t*page_break\n\t\n\tElizabeth was never going to tell anybody on her own.\n\t\n\t*page_break\n\t\n\tBut, that didn't mean I had to be the one to do it.\n\t\n\t*page_break\n\t\n\tDid I have the right to do that?\n\t\n\t*page_break\n\t\n\tShe'd probably be pissed...\n\t\n\t*page_break\n\t\n\t\"Sir... I was just a little concerned,\" I said.\n\t\n\tHe crossed his arms.\n\t\n\t\"About Elizabeth.\"\n\t\n\tHe frowned. \"Did something happen between you two?\"\n\t\n\tThat was uncomfortably close to implying we were dating, but I let it go. \"No,\n\tno, no. We're doing fine.\"\n\t\n\tHe smirked.\n\t\n\t\"And not dating.\" I suppressed the urge to roll my eyes. \"I'm just a little concerned\n\tabout her school life.\"\n\t\n\tHe raised a brow. \"What do you mean?\"\n\t\n\t\"I think she may be getting harassed by some of the other students.\"\n\t\n\t\"She's being bullied?\" he asked.\n\t\n\tI nodded. \"I think so. Yeah.\"\n\t\n\t*page_break\n\t\n\t\"Is it severe enough to warrant coming down there?\"\n\t\n\t*page_break\n\t\n\tIt took me a while to process that.\n\t\n\t*page_break\n\t\n\t\"I... your daughter is being bullied, Mr. Leavitt.\"\n\t\n\tHe sighed. \"If I can be frank, unless it's extreme, there's very little we can do.\"\n\t\n\tMy jaw nearly hit the floor from the remark.\n\t\n\t\"Mr. Leavitt, she's your daughter. You can't just-\"\n\t\n\t\"You know what we are, correct?\" he asked.\n\t\n\t\"She... well, yes. Your vampires, but-\"\n\t\n\t\"Our kind are not accepted amongst a large portion of your population. We all face\n\tdiscrimination.\"\n\t\n\t\"So you're just going to sit there and do nothing?\" I asked.\n\t\n\t\"What would you have me do?\" he asked. \"Go down to the school, schedule a meeting, get all\n\tthe staff - some of whom may not be on our side - to protect my daughter?\"\n\t\n\t\"It's something,\" I said.\n\t\n\t\"We tried that once.\" He frowned. \"It didn't work. And in some ways, it made things worse for her.\"\n\t\n\tI crossed my arms. \"So... that's it. We do nothing?\"\n\t\n\t\"I didn't say do nothing,\" Mr. Leavitt said. \"I just said we can't stop people from harassing her.\n\tWe can still be there for her, and we can still try to change those people's minds. I know that's\n\tnot the answer you want to hear, but that is the reality we live in.\"\n\t\n\tI gritted my teeth, and stormed away. \"Unbelievable.\"\n\t\n\tHe shook his head. \"Change takes time. Things will get better someday, you'll see.\"\n\t\n\t*retu
