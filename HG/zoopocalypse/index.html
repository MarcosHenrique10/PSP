<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zoo-pocalypse — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "zoopocalypse", "title": "Zoo-pocalypse", "scenes": {"cheetah_death": "*comment Used to be called dog death then I realized that was wrong\n\nThis was your most successful hunt in recent memory. You and the dog were finding your rhythm as a team. You got two turkeys, so big you couldn’t carry both by yourself. You return to the zoo dragging the first behind you in hopes that James will help you carry the second one.\nUpon arrival at the zoo, you make your way past the cheetah exhibit to tell James the good news. As you pass the cheetah exhibit, you hear whimpering from behind you. At first, you figure it to just be the dog greeting his friend the cheetah, until the whimpers evolve into yelping sobs. \n\nYou sprint back to the exhibit you had ignored on first pass. The dog is howling in terror by the time you return to the cheetah exhibit to see the cheetah motionless on the ground, with blood leaking from its belly. \n\nYou immediately know what James has done.\n\nCrossed the line.\n\n*page_break Hunt your prey\n\nIn your rage, you only see flashes of violence behind a curtain of red. Your memory and context clues suggest you found James, knocked him unconscious with your bare hands or perhaps a weapon, and dragged him to the cheetah exhibit.\nWhen you are able to fully orient yourself, you realize you have locked broken-nosed, busted-lip James in the cheetah cage. Not the cheetah exhibit…the cheetah cage. Where they can only walk in small circles. Where they can only stay for eight hours or their sanity is sacrificed. \nIt is an eighth the size of a prison cell, meanwhile a cheetah’s natural habitat can span over five-hundred square miles. \n\nGrowling awakes your aching body, your tired arms lifting you from a seated position. The dog is just outside the cage, snarling at its best friend's murderer. If you open the door, James would have to fight the dog in a small space. With the dog so angered and James still recovering, it could go either way.\n\nThough the dog lost its friend, [i]your[/i] position is more dire. After this, there is no way you'll both be able to live in this zoo together. Regardless of the outcome, only one of you can lay claim to the venue.\n\n*choice\n\n\t#Sick the dog on James\n\n\t\tYou don't bother granting James the benefit of a warning. After all, he never warned you about his decision to slaughter the innocent cheetah. \n\t\t\n\t\tBefore you can fully open the door to the cage, the dog sprints through and offers James little opportunity to defend himself. He lifts his hand, and the dog immediately locks onto his forearm. A scream leaves his mouth, the first of many, as he tries to fight off the dog with his other fist.\n\t\t\n\t\tIt becomes evident rather quickly that James will succumb to the raw power of the dog. The swinging of his fist is slowing and weakening, and even his screams are less strong than they were earlier.\n\n\t\t*choice\n\n\t\t\t#Keep watching\n\n\t\t\t\tJames drops both arms to the ground, hardly staying up on all fours. At this point, the dog literally goes for the jugular. But the jugular is just a vein. It is the carotid artery which spurts blood when ruptured.\n\n\t\t\t\tThe dog's jaw locks around James's neck, blood dripping down onto the concrete floor. Shaking its head from side to side, the dog tries to shred the skin further. James's screams change to gurgles, and you watch his entire body go limp. Too heavy for the dog to keep up, both of their heads fall to the ground. But the dog does not release.\n\n\t\t\t\tNot until it is sure the job is done. Not until you see the life leave James's eyes. The sight will remain in your head forever, right next to the image of the cheetah still lying only twenty feet away from you. Even after the dog exits the cage, you stare a bit longer at the human corpse.\n\n\t\t\t\tYou feel an excessively wet tongue contacting your hand, then look down to find the dog licking your hand as if wanting approval for its actions. You feel the red liquid between your fingers before using the hand to pet the dog's head.\n\n\t\t\t\tNow that blood is on both your hands, you have a new bond in trauma. Perhaps this dog was always the only one you could trust. No matter now, because it would only be the two of you from now on.\n\n\t\t\t\tSomehow, you find comfort in this truth. \n\n\t\t\t\t*finish The End\n\n\n\t\t\t#Walk away\n\n\t\t\t\tYou've seen enough at this point. You know the job will be done, so there is no point to tattooing the final image in your brain. You've already seen enough dead bodies today. For it to evolve from turkeys, to a cheetah, to a human is overwhelming.\n\n\t\t\t\tAmbling away, you hear James's screaming grow quieter. A combination of you moving further away and his having less of a breath to use. You leave the door to the exhibit open as you exit so that the dog may do the same, then make your way to the flamingo pond.\n\n\t\t\t\tThere are still a few specks of flamingo blood from when James made an earlier mistake. Back when that was the worst thing he could possibly do. You wonder when, or how many times, you went wrong with him. Or perhaps his death was the first correct decision you made since he first approached your front door.\n\n\t\t\t\tThe dog meets you at the pond and sits next to you, allowing you to make the next move. You take a look at his bloodied snout and paws, then grab a towel from nearby. First dipping it in the pond, you use it to wipe the red fluid from everywhere it is readily visible.\n\n\t\t\t\tOnce finished, you feel the dog walk into your chest. Understanding its desire for approval, you wrap your arms around it and squeeze an embrace.\n\n\t\t\t\t\"It's just us now,\" you say as you pet its back. \n\n\t\t\t\tIt is unlikely you'll forget what either of you did today. All you can do now is find a way to move on. Find a way to survive.\n\n\t\t\t\t*finish The End\n\n\n\t#Fight James yourself\n\n\t\tTo make sure the dog does not interrupt what you are about to do, you lead it outside the exhibit and lock it out. Now it is just you and James, and only one of you will leave this exhibit alive.\n\n\t\tJames is coming to by the time you return to his cage. He knows exactly why he is in this position, yet he still asks, \"What's going on?\"\n\n\t\t\"What's going on is I'm giving you one last chance to make it out of here alive,\" you say. \"It's more chances than you deserve, all things considered, but unfortunately I'm more civil than you. Now, I'm going to unlock this cage here, and I want you to count to ten before exiting.\n\t\tI'll give you enough time to get out, but then you're gonna have to fight me. If you want to leave this exhibit, you're gonna have to go through me. You can kill a defenseless animal, but I won't be so easy. Even if you get through me, you'll have the dog outside the exhibit. But if you make it past both of us I suppose it means you've earned your place here. Survival of the fittest.\"\n\n\t\t\"Why are you even giving me this chance?\" James asks.\n\n\t\t*fake_choice\n\n\t\t\t#\"Because I'm a nice person.\"\n\t\t\t#\"Because I'm stupid.\"\n\t\t\t#\"Because I'm gonna enjoy beating you to death.\"\n\n\t\tYou do just as you said, unlocking the door and walking backwards to keep track of his movements. You want to be ready in case he moves early, but he doesn't. He waits the whole ten seconds, and when he exits the cage you are already twenty paces away.\n\n\t\tPutting one foot in front of the other, you put your fists up and prepare to fight for your life. James doesn't quite do this, first reaching for something in the back of his pants. When his eyes widen, the two of you have an epiphany at the same time.\n\n\t\tYou never checked him for weapons.\n\n\t\t*page_break\n\n\t\tJames sprints toward you, giving little time to search for a weapon of your own. The glint of a knife shines as it swings toward your gut, but you backpedal and create enough space to avoid it. After another swing, you pick your moment to kick James in the stomach and knock him back a few steps.\n\t\tWhile he is a bit stunned, you scan your surroundings to level the fighting field. Wasting no time, you grab a rock the size of a baseball in time to prepare yourself for the next assault. The dog barking reminds you that you are not only fighting for yourself, but the other animals still living in this zoo. \n\n\t\tThis time you take the offensive when James is not expecting it. You reach him in a blink and crack the rock into his cheekbone. He lets out a yelp, but is not knocked out. When you both face each other again, one of his eyes is swollen and a streak of blood flows down the side of his face.  His equilibrium is off, and you think you might be able to finish him if you time it right.\n\n\t\tThis turns out to be easier than you expected. James hardly harnesses the strength to pursue you, and his next attack opens him up to a vulnerable position. With your next strike, the knife drops. One more strike and so too does James. \n\n\t\tYou straddle James and continue hitting him, first with the rock and then with just your fists. You have to be sure, without a doubt, that James will not come back from this. To ensure this, you continue hitting him until you can hardly lift your arms. James's face is hardly recognizable as a face.\n\n\t\t*choice\n\t\n\t\t\t#Take a trophy\n\n\t\t\t\tYou can't leave this debacle empty handed. You use the knife James brought to the fist fight (and lost) and get to work.\n\n\t\t\t\t*page_break One week later\n\n\t\t\t\tFinally, your arms are no longer feeling the soreness from the fatal fight with James. Not only can you lift your arms above your head, but you can lift James's head above the pike you set up outside the entrance to the zoo.\n\n\t\t\t\tNot only would the head on a pike be a trophy for your victory, it would act as a warning to anybody else who would ever try to encroach on your territory.\n\n\t\t\t\tIf an enemy came inside, they'd have to deal with more than just the animals. They'd have to deal with you.\n\n\t\t\t\tAnd in this world, [i] you[/i] are the apex predator.\t\n\n\t\t\t\t*finish The End\n\t\n\t\t\t#Go home\n\t\t\t\t\t\t\n\t\t\t\tYou don't need to dwell on the moment. What's done is done, and you have to move on as soon as possible.\n\n\t\t\t\tThe dog is waiting for you as you leave the exhibit, in a manner reminding you of how dogs await the arrival of their owner at home. Tail wagging with either excitement or pride, the dog greets you by jumping on you. You're still a little jumpy from the fight, but you resist enough for a proper return of a hug.\n\n\t\t\t\tYou realize in this moment that the two of you have been through too much for you to just keep referring to the dog as \"the dog.\" The only friend you have left deserves a name.\n\n\t\t\t\t*input_text dog_name\n\t\t\t\t\"It's okay, ${dog_name},\" you say. At this, ${dog_name} perks their ears up and looks at you as if they recognize the name. You receive an excited lick before the hug continues.\n\n\t\t\t\t\"He can't hurt us anymore,\" you provide reassurance. \"We're safe.\"\n\n\t\t\t\t*finish The End\n\n\t#Do nothing\n\t\tThere is nothing more to do or say. Not for you at least. James comes to as you are walking away from the cage. \n\n\t\t\"Hey, where are you going?\" he asks, though it might be rhetorical. \"You're not going to just leave me here, are you?\"\n\n\t\tHe is of course trying to reason with you, but this time you are deaf as a squid. Your decision has been made.\n\n\t\tYou stick to your decision, even at night when you can hear him continuing to yell for you to let him out and makes it difficult to sleep. No matter what, you know he brought this on himself. So you stick to your guns.\n\n\t\tA human can live twenty-one days without food.\n\t\n\t\tJames survived for eighteen.\n\n\t\t*finish The End\n", "corn": "*comment Corn \n\nYour weekly routine is to trade a portion of your harvest with each other. Each of you has specific areas of the zoo you are in charge of maintaining. You, of course, have more tasks which are higher in difficulty. But as long as James continues his mediocre job you are likely to get along fine. Establishing a trade, even between yourselves in this community of two, was a great way of creating a sense of normalcy. Furthermore, it helps you keep track of how each other is rationing food. \n\nJames's most populous resource is corn, while yours is eggs. On average, you can give him a half dozen eggs for three ears of corn among all the other groceries.\nEach of you tends to come up with a milk crate's worth of food each time, to be taken to your respective bedrooms and be used as you please.\n\n\n*if (James_Friendship \u003c 40)\n\tAs he hands you the crate of typical foodstuffs, you notice it feels heavier than usual. You scan the contents, and they don't appear to be any different than usual. You thank James and return to your place. \n\n\t*page_break\n\n\tTwo days later, you have a hankering for corn that only comes bi-weekly. You start a fire to boil some water, then reach into the stash provided to you by James and grab a husk. \n\n\tAs you lift the ear of corn from the crate, you notice it is much heavier than previous ones. The discrepancy is odd, but you don't find any explanation for the issue until you tear through the layers of the husk. \n\n\tThe corn was not corn at all. Instead you find small rocks mushed together and wrapped in some kind of hay from James's side of the zoo. A terrible job, you should have noticed much sooner. Still, it wasn't until now that it all came together.\n\n\tBecause it wasn't just the corn. He had been performing small acts of sabotage for the last two weeks. You somehow found poison ivy in your garden the hard way, despite no storm passing through, and still have a rash on your forearm. Some of your flowering plants were not growing as you expected. Now you know why.\n\t\n\t*choice\n\t\t#Confront James calmly\n\n\t\t\tSuppressing your rage, you storm over to James. He happens to be working in the cornfield, which makes you wonder if he is ever actually working.\n\n\t\t\t\"James, can we talk for a minute?\"\n\t\t\n\t\t\t\"Yes,\" he says, not looking up from his \"work.\"\n\n\t\t\t\"In our trade the other day, there were some false corn husks. Was that on purpose?\"\n\n\t\t\t\"Well, yeah,\" James says, as if the reason is obvious. \"You told me not to tell you if we were gonna run out of food. Technically, I didn't tell you. So I did exactly as you asked.\"\n\n\t\t\t\"It's more important that you communicate with me,\" you clarify. \"I told you to talk to me if there was an issue instead of acting.\"\n\n\t\t\t\"Oh,\" James says.\n\n\t\t\t\"Wait,\" you think for a moment, \"are you telling me we are out of corn?\"\n\n\t\t\t\"No,\" now it is James who must clarify. \"But we are running low. We're eating more than we're growing. I didn't want to scare you, so I thought maybe this would have bought me some more time.\"\n\n\t\t\t\"So there is a bigger problem than just you lying about corn.\"\n\n\t\t\t\"Yes,\" James admits. \"I've been reading about edible plants, though. With less time needed here, I can spend some time gathering more food from around the zoo.\"\n\n\t\t\t\"Okay,\" you say. \"Can you start that tomorrow?\"\n\t\n\t\t\t\"Sure,\" James says.\n\n\t\t\t\"Thanks,\" you say as you leave. Returning to your original task, you make a mental note to double-check any of the plants James brings home to confirm they are not poisonous.\n\n\t\t\t*set James_Friendship +10\n\n\t\t\t*finish\n\t\t\n\t\t#Teach him a lesson\n\t\t\tJames needs to know what you're capable of before he decides to ever mess with you again. You've had a little too much of his stupidity, and this is the last time you'll put up with it. He needs to know you're serious this time.\n\n\t\t\tYou remember how he mentioned a deathly fear of snakes when he first came into the zoo. Contemplating how to use that to your advantage, you make your way over to the snake exhibit conveniently in your district. Searching through the displays, you come across the perfect ones.\n\t\t\tIt probably didn't matter which ones you chose, considering James was afraid of snakes in general and would probably never read a book on how to tell the difference between poisonous snakes and safe ones. On top of that, the snakes in zoos typically had their venomous sacks removed. \n\t\t\tBut this wasn't about the venom. This was about making a statement.\n\n\t\t\t*page_break\n\n\t\t\tYour two snakes of choice: southern pacific and red diamond rattlesnakes. You carry the glass cages carefully. If your arms are shaking this much while carrying two de-venomed snakes who are safely locked within bulletproof glass, imagine being afraid of snakes and waking up to them.\n\n\t\t\tApproaching silently, you find James's sleeping quarters. Easy to get to, which is yet another example of how James is unfit to survive in the new state of the world as a lone wolf. He's more like a domesticated poodle. He's reliant on you, and yet he thinks these pranks will go unpunished. He's in for a literal and figurative wakeup call.\n\n\t\t\tOnce the rattlesnakes are placed on either side of him, you leave James to sleep easy for probably the last time in a good while. You return to your own bed with a pep in your step and a puff in your chest.\n\n\t\t\t*page_break Back to bed\n\n\t\t\tA screeching sound jolts you awake. Your heart is beating as fast as a hummingbird. Was it the sound of the entrance gates opening? Was it one of the animals calling out?\n\n\t\t\tThe high-pitched scream is emitted once more and this time you can place it. James woke up and found the snakes next to his bed. Your plan went as you expected.\n\n\t\t\tYou fall back asleep with a smirk.\n\t\t\t\n\t\t\t*set James_Friendship 0\n\n\t\t\t*page_break Next Chapter\n\n\t\t\t*goto_scene Cheetah_Death\n\t\n*else\n\n\tAs he hands you the crate of typical foodstuffs, you notice it feels heavier than usual. Scanning the contents, you notice an excess of corn husks.\n\n\tBefore you can ask, James answers your question. \"I had a good harvest on corn this time, so I thought I should give you a few extras. Probably doesn't make up for what happened with the flamingos, but just shows I'm trying harder.\"\n\n\t\"Oh,\" you say. \"Great, thank you.\"\n\t\n\t\"In the same spirit,\" James continues, \"I've been thinking about our arrangement with the territories. You of course have more area than I do, which is fine because you were here first and understand more. But I could make things easier on you if I was in charge of more spots.\n\tThe aquarium, for instance, is so out of the way for you during your daily chores, but mine are over in that area. Plus, you're already taking the dog out hunting and that takes up a lot of time. If I was in charge of that space, you could get more rest.\"\n\n\tClearly, James is making a sound argument. The thought of having more time to rest is appealing. However, you're still unsure whether the flamingo assassin can be trusted. \n\tSure, he's put in the effort in the cornfields, but if he is in charge of the aquarium there is always a small chance he'll accidentally pollute the largest water reservoir in the entire zoo.\n\n\t*choice\n\n\t\t#Let James have the aquarium\n\n\t\t\t*set James_Friendship %+20\n\n\t\t\t\"I'm sure that can be arranged,\" you say, \"I could use the additional help. How about we meet there tomorrow morning and I can show you the ropes. We'll take a week training you up, and if you are able to manage on your own, I'll hand it over to you.\"\n\n\t\t\tYou haven't seen James smile so brightly since you first let him into the zoo so long ago. \"Okay!\" he nearly shouts. \"Yeah, okay I can do that for sure!\"\n\n\t\t\t*page_break Weeks later\n\n\t\t\tJames has been learning how to run the aquarium for the last two weeks and is picking things up rather quickly. He even came up with an idea that may help keep the tanks clean more efficiently. After how rough your first interactions were, James doesn't seem like quite the hassle he originally presented himself as.\n\n\t\t\t*finish\n\t\t\n\t\t#Keep the aquarium for yourself\n\n\t\t\t*set James_Friendship %-20\n\n\t\t\t\"I appreciate the offer,\" you say, hoping it lessens the blow, \"but I don't think I'm comfortable giving you full reign of the aquarium just yet. It is a fragile ecosystem, and if something goes wrong it could be worst case scenario for both of us.\"\n\n\t\t\t\"Oh, I see,\" James says, downcast.\n\n\t\t\t\"It's not that I don't trust you,\" you lie. \"It's just that I have invested a ton of time in getting it to where it is now, and I do like to have it a certain way. If I think of a way you can contribute more around here, especially now that I know you're interested, I'll do my best to bring you in.\"\n\n\t\t\t\"Thanks,\" James says. But you believe his gratitude about as little as he believes your sincerity.\n\n\t\t\t*finish", "flamingo": "*comment Flamingo Assassin\n*temp pondinvestigation 0\n\nIt has been a month since James started leasing space in the zoo. You know this because you have been keeping a calendar in your ${Home} home ever since day three of moving in here yourself. Quite a variety of options covered a rack in the gift shop. Narrowing down to only animals that did not have exhibits in this zoo, you still had a few to choose from.\n\n*fake_choice\n\n\t#Butterflies\n\t\tThis calendar had the most vibrant colors compared to the others. A necessary addition to your home, considering the dire circumstances in which you found yourself. In the time since James' arrival, you've switched from a zoomed-in image of a monarch butterfly to a cluster of a couple dozen American snouts.\t\n\t#Pandas\n\t\tBeing so cute and photogenic worked to their advantage when they were an endangered species. Now you wonder whether there are more pandas on the planet than there are humans. In the time since James' arrival, you've switched from a closeup of a six-month-old panda cub to a family of four.\n\t#Camels\n\t\tA surprising ommission from the zoo, considering how adaptive this animal is to varying environments. In the time since James arrived here, you've switch from a typical image of a camel in a hot desert environment to a photo of bactrian camel in the snow.\n\n*page_break\nAt this point, you feel as if you've taught James everything you could about surviving in this town. Unfortunately, you cannot tell just how much information he retained. Yet more unfortunate, he seems to not grasp the concept of rationing his food.\nWith the extra hands working the vegetable fields you had planted before his arrival, you figure there would be enough to sustain his gluttony.\n\nOutside of work, you and James have rarely reached out to each other for companionship. You would have plenty of talking points based on the books from the gift shop you have been reading. But that would lead to a rather boring conversation.\nThe signs near the animal exhibits have much more interesting information than the animal books. Facts like: wombats poop in cubes, a baby giraffe falls six feet to the ground when it is born, or a group of tigers is called an ambush. \nMost interesting of all is why there are dogs in the cheetah exhibit. You think at first the dog might be used as food, but this is far from the case. Cheetahs are often shy around humans but can mimic the dogs’ behavior and become calmer as long as the dog is calm. \nHaving learned this, you kept both animals alive and well-fed. You are even in the process of teaching the dog to help you hunt. For now you can't hunt big game because all you have is birdshot for your shotgun. But this would have to do until you can find your way into the weapons room of the security building.\n\n*page_break\n\nOn your way to the chicken coop one afternoon, you notice the flamingo pond is empty. A surprising sight because they've never left before. Could it have been a lack of food? You make your way over to investigate what may have caused them to leave. You scope out what things may help you find answers.\n\n\n*label investigate\n*choice\n\t\n\t*disable_reuse #The pond\n\t\t*set pondinvestigation +1\n\t\tThe water provides a nice reflection of yourself, probably better than the dirty mirrors in the bathrooms. Peering further into the water, you can see that there are still small shrimp floating around. This would suggest that the flamingos did not leave due to a lack of food. You wouldn't think so anyway, because even just yesterday they still had a pink hue. If they were turning white, you might have thought differently.\n\t\t*goto investigate\n\n\t\n\t*disable_reuse #The grass\n\t\t*set pondinvestigation +1\n\t\tThere is a pattern of depressions made in a part of the grass surrounding the pond. Upon closer inspection, you can tell that there are shoeprints leading away from the water and toward the far end of the zoo. Alongside the footprints is a thick line in the grass. The direction of the blades of grass would suggest something has been dragged through it.\n\t\t*goto investigate\n\n\t\n\t*disable_reuse #The bench\n\t\t*set pondinvestigation +1\n\t\tThere is a green wooden bench which patrons could use to watch the flamingos from afar. You've sat at this bench from time to time, as the flamingos have offered an example of the simple life. It tends to calm you. At first there is nothing remarkable about the bench. When you investigate further, though, you see there are a few pink splotches on the corner where someone might rest their hand. If you look close enough, you may be able to even find a trail of these pink dots.\n\t\t*goto investigate\n\n\t*if (pondinvestigation >1) #Inquire with James\n\t\t*goto Inquire\n\n\n*label Inquire\n\n*if (Roommates = false)\n\n\tA line of pink dots creates a trail to the Arctic Exhibit. This was James' choice of where to stay when you told him he could not stay with you. Not too bad of an idea, considering there were places where it was insulated enough to stay warm. And most people (including you) wouldn't expect to go searching for survivors there. Ambling up to the Arctic Exhibit, the pink spots grow more frequent. The door to the exhibit is cracked, suggesting James is home.\n\t*goto Arctic\n*else\n\t\n\tA line of pink spots leads you toward the Arctic Exhibit. This is a suspicious location, because you and James do not spend much time here. Your main indoor home is ${Home}. Ambling up to the Arctic Exhibit, the pink spots grow more frequent. The door to the exhibit is cracked, suggesting James has decided to come here for some reason.\n\t*goto Arctic\n\n*label Arctic\n*page_break Enter\n\n\"James?\" you call out to announce your presence upon entry. \"You in here?\"\n\nYou do not receive a verbal response, but panicked rustling confirms your suspicion. Like a dolphin, you follow the reverberating sounds to echolocate James.\n\nBut James is not exactly alone.\n\nWhen you finally find him, you see why there was a trail of pink spots leading up to the exhibit. The whole time, you have been following a trail of blood. \n\nFlamingo blood.\n\n*achieve flamingo\n\nAnd James was likely in the process of trying to hide the body before you caught him pink handed.\n\nHe looks up at you with shame in his eyes. Either he is breathing hard because he was lugging the bird uphill, or because he is panicked about how you might react.\n\n\"I'm so sorry,\" he said. \"I was just so hungry, and I was craving chicken. But you said we can't eat the chickens because they are more useful alive because then we can get eggs and if we kill a chicken it won't stay fresh but eggs that come regularly will be fresh.\nSo I thought it would be a better idea to kill this flamingo than to kill a chicken.\"\n\n\"And you were willing to kill a single flamingo for meat and lose all the other ones in the pond?\" you ask, allowing your frustration to be witnessed.\n\n\"I...\" James says, hesitant to speak. \"I didn't realize they could fly.\"\n\nYou tilt your head and stare through narrow eyes at your cohabitant. \"You're telling me you thought flamingos were flightless birds,\" you say through gritted teeth.\n\n\"You're not mad, are you?\" \n\n*choice\n\t#\"You fucking idiot!\"\n\n\t\t*set James_Friendship %-25\n\n\t\t\"You fucking idiot!\" the insult spews out of you like the blood must have spewed from the flamingo. Maybe the last flamingo you'll ever see. Maybe one of the last flamingos on the planet. \"It's not a penguin or an emu or Kiwi,\" you stop yourself from listing every flightless bird because you don't want to lose track of your anger.\n\t\t\"The flamingos were supposed to be our last resort in case we struggle for food in the winter. Now we have one less week of food if it comes down to it.\"\n\n\t\t\"I'm sorry,\" James repeats, face in his hands and on the verge of tears.\n\t\n\t\t\"Sorry doesn't cut it when you're starving, James,\" you say, the cathartic yelling on the decline. \"Never, ever, do something like that without my approval.\n\t\tRemember, I let you into this zoo. I won't hesitate to kick you out. Do you understand?\"\n\n\t\tJames stiffens up as if he is about to fight back on instinct. He clearly does not appreciate your threat, but he lacks leverage. Instead he inhales deeply and sighs as he stares at the space between your feet and the flamingo's. Somewhere between anger and sadness. \"Yes, I understand.\"\n\n\t\t\"Good,\" you say and stomp all the way back to your exhibit.\n\n\t\t*finish\n\t\n\t#Deep breath. \"I'm upset, but it's okay.\"\n\n\t\t*set James_Friendship %+25\n\n\t\tKnowing James is in a vulnerable place, you take a deep breath to calm yourself. Fighting the urge to scream, you know it is important to maintain a symbiotic relationship. \n\n\t\t\"I'm upset,\" you admit, \"but it's okay. We all make mistakes when we're hungry. Plus, I'm sure I learned from a lot of mistakes on my own before you arrived here. \n\t\tI was hoping to save the flamingos in case of a food shortage over the winter, but for all I know they might have migrated further south as soon as the weather turned cold.\n\t\tPlus, there's a chance we'll have more shrimp in that pond now because they don't have any predators thinning the herd. Maybe it's for the better. \n\n\t\t\"Phew!\" James expresses his immense relief. \"Thanks. I'll make it up to you somehow. I promise.\"\n\n\t\t\"I'll hold you to it,\" you say with a hint of a smile.\n\n\t\t*finish", "invasion": "*comment This one's gonna take a while\n\nEven while rationing food as best you can, you and James are likely to run out within the next month if you don't think of something fast. \n\nYou feel like lookout duty should be the least of your worries. But at the same time your hunger has you thinking differently. You've half-convinced yourself that you might look through the binoculars and find a hidden treasure filled with food.\n\nWhile you don't find a hidden food treasure scanning the surroundings, you catch yourself feasting your eyes on something even less likely. \n\nA group of people.\n\n*page_break\n\nAt least a half dozen people were down the road and walking toward the zoo like a pack of wolves ready to attack. The hairs on your back stand up like a scared cat. And not a big cat like a lion or a jaguar. A house cat that has never left the yard. \n\nYour instincts tell you these aren't nomads looking for a safe haven. They are hyenas. Hyenas can scavenge or hunt, and these ones are seeking another animal to prey on.\n\nYour suspicions are confirmed when you bear witness to the scalps hanging from the hands of the large man leading the group. \n\nFor just one moment, you get the sense he looks up and sees you staring back at him.\n\n*page_break\n\nThe group is already making a beeline for your habitat, suggesting the zoo is their specific destination. You wonder if they had the epiphany of coming to the zoo after seeing the flamingos in the sky. If they were close enough, and the flamingos fled in their general direction, it might have sparked the idea in one of their heads.\n\nYou don't have much time to ponder their origin. There is hardly enough time to think of what action you will take in light of the imminent hostile guests.\n\n*choice\n\n\t#Go to James and strategize\n\n\t\tYou couldn't even think of abandoning your home of the last few months. You've built this fragile ecosystem, and you don't want it to go to waste on some random outsiders.\n\n\t\tBut you are going to need help if you're going to protect your home. Wasting little time, you find James to make him aware of the emergency.\n\n\t\t\"James!\" you say, running up to him in urgency. \"We're about to be under attack!\"\n\n\t\t\"What?\" James asks, failing to fathom your freakout. \"Attack? By what?\"\n\n\t\tYou take a moment to realize why he's asking \"what\" and not \"who.\" He was just as surprised to find you as you were to meet him in this world. Now you're coming to him and telling him you aren't the last two survivors on this earth. Moreover, there might be a group of people ready to take you out.\n\n\t\t\"There's a group coming straight to the zoo,\" you explain. \"They've got weapons, and they've taken scalps off people's heads already.\"\n\n\t\t\"Oh, fuck,\" James says, the fear finally in his eyes. \"And you know they're gonna attack us?\"\n\n\t\t\"I mean,\" you begin, \"I don't know for sure. But should we wait around to find out?\"\n\n\t\t\"How many of them are there?\"\n\n\t\t\"I think I counted eight,\" you say.\n\n\t\t\"I'm not sure we can fight off that many,\" James admits. \"Do you think you can just talk to them?\"\n\n\t\tJames brings up valid points. Talking to the group may make you more vulnerable to attack but may also prevent an attack altogether. You may even be able to convince the group not to come into the zoo at all. But you've taken up much time speaking with James and must decide on an approach immediately.\n\n\t\t*choice\n\n\t\t\t#Talk\n\t\t\t\t*achieve hyenas\n\t\t\t\t*if James_Friendship > 50\n\t\t\t\t\t\"You bring up a good point,\" you say, \"maybe I can talk to them. But I don't think a negotiation is what they're looking for. We have to hope we can intimidate them enough to not come in.\"\n\n\t\t\t\t\t\"What can I do to help?\" James asks, anxious to be of assistance.\n\n\t\t\t\t\t\"Well, all we need is for them to think they're outmanned or outgunned,\" you say. \"Take my shotgun and go inside the gift shop. Behind the cashier's desk, you should find a door with a staircase up to the roof. Go up there and hide. When I whistle, cock the gun and aim it at them.\"\n\n\t\t\t\t\t\"Okay,\" he says, \"and if that doesn't work?\"\n\n\t\t\t\t\tYou pause ever so briefly before saying, \"Shoot them.\"\n\n\t\t\t\t\tJames looks at the ground. He has not been the hunter out of you two, and you hope he's willing to pull the trigger if it means saving you. \"Okay,\" he says with trepidation.\n\n\t\t\t\t\t*page_break Meet the attackers\n\n\t\t\t\t\tYou have the brilliant idea to swing by the cheetah exhibit. You've never taken the cheetah out, but you've taken out the dog companion plenty of times. However, this calls for an exception to the rule. You guide the cheetah to come with you alongside the dog. Together the three of you approach the front gate just in time to greet the invaders.\n\n\t\t\t\t\tBefore a member of either party speaks, you can see their surprised expressions when they recognize the big cat at your side. Towering over the dog, the feline sits and is as high as your waist. You yourself are often mesmerized by its appearance, but for now it is important that these animals make an intimidating impression.\n\n\t\t\t\t\t\"Hello,\" you say in ambiguous greeting. \"We are no longer taking in any more people. We do not have enough food for anyone else. Find another place to go.\"\n\n\t\t\t\t\t\"We want in,\" the man in front says. He wastes no words. A simple and clear message.\n\n\t\t\t\t\tYou choose to use the same speech pattern just in case these people wouldn't understand a complex sentence. \"No,\" you say, \"leave or die.\"\n\n\t\t\t\t\tYou didn't expect to say it, but you did.\n\n\t\t\t\t\t\"Or you die,\" the man says.\n\n\t\t\t\t\tYou whistle as soon as the final word leaves his mouth. To your right and just behind you, you hear the obvious click of a shotgun being cocked. \n\n\t\t\t\t\tTo your left, the dog begins to growl.\n\n\t\t\t\t\tEven the cheetah creeps forward, as if stalking its prey from tall, dried grass of the savanna.\n\n\t\t\t\t\tThe enemies do not know which threat to focus on, but their leader is incredulous still. He takes a step forward, stalking in a similar manner to the cheetah.\n\n\t\t\t\t\tBANG!\n\n\t\t\t\t\tA gunshot rings out and the rightmost enemy falls back and to the ground. All but the victim and the leader scatter and flee. The man does not flee, but he raises his hands and bows slightly.\n\n\t\t\t\t\t\"Okay,\" he says, his tone shifting higher, \"we leave.\"\n\n\t\t\t\t\tHe backs away respectfully. Noticing the woman on the ground is still alive, he goes over to her and lifts her to her feet. You realize they must not have any firearms, otherwise they would have been more optimistic. \n\n\t\t\t\t\tOnce all the members of the invasion are out of site, you give James the thumbs up. The two of you meet at the entrance to the gift shop.\n\n\t\t\t\t\t\"I can't believe that worked,\" you said.\n\n\t\t\t\t\t\"Neither can I,\" James says, \"I wasn't even aiming for that one. I was trying to hit the big guy.\"\n\n\t\t\t\t\t\"I'm just impressed you had the guts to fire a shot,\" you admit, giving him a fist bump. This is a gesture you've never made before.\n\n\t\t\t\t\tYou may have had the wrong first impression of James. He's made some terrible, terrible mistakes, but he was able to make the executive decision and do what it takes to survive in this world. Not at all what he seemed to be leading up to today. Just like when you found out how hygienic pigs actually are.\n\n\t\t\t\t\t*page_break\n\n\t\t\t\t\tYou and James continue to live peacefully. After the run-in with the assailants, you have a stronger relationship and think you'll have what it takes to get through whatever next challenge comes your way.\n\n\t\t\t\t\tAnd the enemy group never tried to enter your home again.\n\n\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\"Fine, I'll talk to them,\" you say, although you can't be sure whether or not it will work.\n\n\t\t\t\t\"What can I do to help?\" James asks, willing to assist if it is possible.\n\n\t\t\t\tUnfortunately, you hesitate. After all the things James has done to make things worse, your instinct tells you the best thing he can do is stay the hell out of your way. If he comes along, there is no telling what kind of bind he'd put you in.\n\n\t\t\t\tAll these thoughts show up on your face as soon as James asks to provide assistance, and he recognizes the reaction immediately. Without words, you've told him what he didn't want to hear.\n\n\t\t\t\t\"Oh, I get it,\" he says, a combination of disappointment and anger on his face. \"You don't trust me.\"\n\n\t\t\t\t\"It's not that, it's just...\"\n\n\t\t\t\tBut it was that. How could you trust him? Need you go down the list of all the reasons? Even if you chose to, there wouldn't be enough time. It was probably important you meet the intruders at the gate. \n\n\t\t\t\t\"Let me just handle it my way, okay,\" you say, drawing little attention to James's incompetence. \"You can even have my shotgun. It's got birdshot in it. You can fire away if you need to protect yourself.\"\n\n\t\t\t\tNot that it would matter at that point, but you point it out on your way to the front gate.\n\n\t\t\t\t*page_break Meet the intruders\n\n\t\t\t\tYou can hear the grumbling voices not too far off when you make it to the entrance. As you suspected, they seem excited about the new prospective home. Chickens coming home to roost.\n\n\t\t\t\t\"Don't come any closer,\" you shout before they can get within striking distance. \n\n\t\t\t\tTo your surprise, the group does halt. Surprised looks fall on you as they realize the zoo was not completely abandoned. Possibly a good sign they don't know much about the facility.\n\n\t\t\t\t\"This zoo is already claimed,\" you say. \n\n\t\t\t\tThe man holding what you can now clearly identify as a scalp takes two steps forward. \"We want in,\" he says.\n\n\t\t\t\tHis simplified speech suggests their group has already devolved the same way society did not too long ago. Would this mean they are unable to negotiate? Would they be more responsive to another tactic? Gorillas view beating your chest as aggression, but may also stop mid-charge if that is viewed as the best course of action.\n\n\t\t\t\t*choice\n\t\t\t\t\t#Intimidate\n\n\t\t\t\t\t\t\"If you try to come in, we will fight,\" you say, trying to simplify your speech. Even if you spoke normally, they'd probably understand your message simply from your tone.\n\n\t\t\t\t\t\t\"How many?\" the man asks. He is doing some kind of mental math to determine whether it is worth attacking anyway.\n\n\t\t\t\t\t\t\"Too many,\" is all you can say, afraid putting a number on it would set you up to be caught in a blatant lie. \n\n\t\t\t\t\t\tThe man looks back at his comrades, who return looks of disapproval. The man's chest puffs out as he returns to your conversation. \"Prove it.\"\n\n\t\t\t\t\t\tHe's calling your bluff, but you have nothing to show otherwise. \n\n\t\t\t\t\t\t\"Uhmm...\"\n\n\t\t\t\t\t\tBefore you can think of a way to deflect, the ambush approaches at once. They are cautious, but they have decided to test the boundaries.\n\n\t\t\t\t\t\tBoundaries you won't be able to defend.\n\n\t\t\t\t\t\t*page_break Run!\n\n\t\t\t\t\t\tThere's no use in trying to stop them at this point. You're a gazelle trying to escape a pack of lions at this point. \n\n\t\t\t\t\t\tWhat would be an uphill battle is now a downhill sprint. \n\n\t\t\t\t\t\tYou stride in James's direction, and his concerned look lets you know he understands the gravity of the situation. \"Are we fighting?\" he asks.\n\n\t\t\t\t\t\t\"I'm running,\" you say, saving your breath as much as possible, \"you can do what you want.\"\n\n\t\t\t\t\t\tJames drops the gun from his hands and spins, not wanting to be weighed down by the best weapon you have to defend yourselves.\n\n\t\t\t\t\t\t\"No, don't-\" you start, but he is already in full stride before you'd be able to finish the sentence.\n\n\t\t\t\t\t\t*page_break Grab the gun\n\n\t\t\t\t\t\tPausing to grab the gun yourself, you hear the distant footfalls making their way over. The group has cleared the fence and are zoning in on you. \n\n\t\t\t\t\t\tPeeking over your shoulder, you can see the first three invaders in hot pursuit. \n\n\t\t\t\t\t\tGun in hand, you take aim at the large man who is running the fastest.\n\n\t\t\t\t\t\t*page_break Pull the trigger\n\n\t\t\t\t\t\tThe birdshot escapes the barrel and collides with the man's chest, dropping him to the ground. The other two assailants stop and stare at the man writhing in pain on the ground, reconsidering their decision to attack.\n\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Shoot again\n\n\t\t\t\t\t\t\t\tYou reload the gun while the other two enemies are still in shock. Taking aim at the woman on the left, you pull the trigger.\n\n\t\t\t\t\t\t\t\tBut the gun jams. Likely a problem caused from James dropping it on the ground.\n\n\t\t\t\t\t\t\t\tThe flanking assailants restart their approach toward you, but that is not your biggest concern. To your left, right, and behind you, other members of the group make an appearance.\n\n\t\t\t\t\t\t\t\tIt turns out they were not falling behind the others. They were surrounding you.\n\n\t\t\t\t\t\t\t\tThey converge on you, and you swing the gun at the one on your left. You knock them down but get tackled from behind.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tTwo of the assailants are holding you down while another grabs the gun. From your limited visual field you can see the big man has somehow recovered from the slug in his chest. He is not in good shape, and he is in an even worse mood.\n\n\t\t\t\t\t\t\t\t\"Gun jam,\" the woman with the weapon explains briefly, and you can't believe your home has been successfully raided by a group of people who communicate so poorly.\n\n\t\t\t\t\t\t\t\tAfter a few moments of clicking and metal on metal, the same woman says, \"I fix.\"\n\n\t\t\t\t\t\t\t\tPerhaps you were wrong. Like prairie dogs, what may seem to be simple noises at the surface may have more sophistication at a deeper level. These people used simple language, but it did not mean they were simple minded. After all, they knew how to flank you and have knowledge of firearms.\n\n\t\t\t\t\t\t\t\tThe big angry man takes the gun. You can't move your head much from your position on the ground, but you don't want to see what's about to happen. You turn your face to the ground and push your forehead into the concrete as if you could escape through it.\n\n\t\t\t\t\t\t\t\tAs you feel the cold metal against the back of your neck, you have an ironic hope that you provided enough distraction to successfully escape. At least then your death would not be in vain.\n\n\t\t\t\t\t\t\t\tThen, a loud noise and a searing pain in your neck.\n\n\t\t\t\t\t\t\t\tThen...nothing.\n\n\t\t\t\t\t\t\t\t*goto_scene ending bad_ending\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Keep running\n\n\t\t\t\t\t\t\t\tThis time as you run, you think they may be hesitant to continue chasing after you. If you could take the biggest one of them down with a single shot from a distance, you would likely kill any of the others from close enough range. \n\n\t\t\t\t\t\t\t\tTo your right you can see another villain trying to cut you off. They must have been trying to flank you.\n\n\t\t\t\t\t\t\t\tReflexively, you swing the gun without breaking stride. It connects with the man who nearly stopped you, and you continue to flee. You don't slow down until you are through the employee entrance and off the premises completely.\n\n\t\t\t\t\t\t\t\tOne-hundred yards further, and you catch up with James. Both panting, you have a conversation between deep breaths.\n\n\t\t\t\t\t\t\t\t\"You made it,\" James says, \"and you kept the gun.\"\n\n\t\t\t\t\t\t\t\t\"Yeah,\" you say, suppressing the urge to say [i] thanks, Captain Obvious[/i]. \n\n\t\t\t\t\t\t\t\t\"Now what?\" he asks, attempting to remove his hands from his knees and stand up straight.\n\n\t\t\t\t\t\t\t\t*choice\n\n\t\t\t\t\t\t\t\t\t#Find shelter together\n\n\t\t\t\t\t\t\t\t\t\t\"Now we try to find a place to stay for the night. Somewhere safe, so we can get some sleep. We are going to need our rest if we want to find food and a new home.\n\n\t\t\t\t\t\t\t\t\t\t\"Okay,\" James says, accepting you as the alpha in this group. \"Lead the way.\"\n\n\t\t\t\t\t\t\t\t\t\tLater in the evening, you find yourself lying on the couch of an empty house. After the wild day you've had, you're happy you and James have each other and your lives.\n\n\t\t\t\t\t\t\t\t\t\tOr, at least, you're happy to have your life.\n\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t\t\t\t\t#Go your separate ways\n\n\t\t\t\t\t\t\t\t\t\t\"I think it's time we say goodbye,\" you say.\n\n\t\t\t\t\t\t\t\t\t\tConsidering how often he's disappointed by these types of statements, he appears to be more accepting of this. \"Okay,\" he says, nodding.\n\n\t\t\t\t\t\t\t\t\t\tIt is possible he understands your sentiment. It is already a miracle either of you survived so long to find each other in a world where at least 90% of the population has perished. Together, you've had quite a few run-ins with your own demise. \n\t\t\t\t\t\t\t\t\t\tPerhaps it is best for you both to have the freedom of solitude, like the rhinoceros or the koala.\n\n\t\t\t\t\t\t\t\t\t\tJames walks in one direction perpendicular to the direction of the zoo, and you select the opposite direction. Whether you'd ever cross paths again was unlikely. Whether it was the right decision, you may never know. \n\n\t\t\t\t\t\t\t\t\t\tBut you take a moment to feel gratitude for the companionship, no matter the hassle.\n\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t#Negotiate\n\n\t\t\t\t\t\t\"We cannot let you in,\" you say with as much gusto as you can muster, \"but we are willing to trade.\"\n\n\t\t\t\t\t\tThe group looks among themselves. Whereas you thought they were using few words before, this time they seem to have a conversation using some form of telepathy.\n\n\t\t\t\t\t\tWhen they are finished with their silent debate, a woman on the left removes the pack from her back. Reaching in, she pulls out a couple boxes just small enough to each fit comfortably in her hands. She kneels down and slides one of the boxes on the ground to the outside of the gate, close enough for you to reach without opening. \n\n\t\t\t\t\t\tBy the time your hand touches the thin boxboard, the smell has already reached your nose. Sweet vanilla mixed with honey, and perhaps lemon. It is not food, but your mouth waters. Your eyes nearly water when you bring it to your eyes and confirm your yearning.\n\n\t\t\t\t\t\tBody soap.\n\n\t\t\t\t\t\tYou haven't seen or smelled soap in as long as you can remember, and you've been limited to bathing in pond water. To your knowledge, you are actually dirtier from going into the water than you would be if you stayed away from it. But this single bar changes your whole outlook on hygiene. It wasn't until now you realize just how disgusted you should be by yourself. Cleanliness has not been your priority, but not by choice. Now you have a choice. Or you would if you chose to accept the trade.\n\n\t\t\t\t\t\tWhen you rise to standing again, you notice the same woman holding a tube in her hand. This she does not need to throw over for you to recognize. You feel the front of your teeth with your tongue just thinking about brushing them with actual toothpaste. You swallow a gulp and wonder just how bad your breath must smell.\n\n\t\t\t\t\t\t\"Five soap, two paste, two brush,\" the man offers.\n\n\t\t\t\t\t\tYou try to pause long enough to hide your desperation. \"What do you want for it?\"\n\n\t\t\t\t\t\tAnother few moments of silence while your counterparts discuss. \"Five meat, five veg, and five book.\"\n\n\t\t\t\t\t\tThe final request surprises you. But you almost just cried over a bar of soap, so you are not one to judge. More importantly, this sounds like a request you can fulfill. \n\n\t\t\t\t\t\t\"Wait here,\" you say nodding. Hoping you can collect everything while the deal is still on the table, you search for James to help you fulfill the request.\n\n\t\t\t\t\t\t\"How did it go?\" he asks. \"Did you scare them off?\"\n\n\t\t\t\t\t\t\"No,\" you say, \"but I offered to trade with them and it seems like they won't attack if we give them what they want. So, I need you to grab five ears of corn while I catch five fish and meet me at the gift shop.\"\n\n\t\t\t\t\t\t\"Corn?\" he says. \"But we don't have a lot of corn. We can't give it to them. Tell them you can't make the trade.\"\n\n\t\t\t\t\t\t\"We're making the trade, James.\"\n\n\t\t\t\t\t\t\"No,\" James says, gripping the shotgun tighter and lifting it slightly, \"we're not.\"\n\n\t\t\t\t\t\t*choice\n\n\t\t\t\t\t\t\t#Reason with James\n\t\t\t\t\t\t\t\t\"It's not for nothing,\" you clarify after a deep inhalation. \"It's a trade. Not like a...we-give-you-this-and-we-get-to-keep-our-lives...trade. They are willing to give us stuff too. Like soap.\"\n\n\t\t\t\t\t\t\t\tJames's eyes grow into saucers at the word. Yours probably did too, but his you can see. \"Soap? Like, body soap? For cleaning?\"\n\n\t\t\t\t\t\t\t\t\"Yes,\" you say smiling, \"like for cleaning our bodies. They have toothpaste, too. They must have come across a store and stashed some away. Or better yet, they could have cleaned out a pharmacy. If we can open up a trade with them, we could get medicine. All they've asked for is food and books.\"\n\n\t\t\t\t\t\t\t\t\"They want books?\"\n\n\t\t\t\t\t\t\t\t\"I know,\" you say, \"I thought it was weird, too. Fortunately for us, we have plenty. So, what do you say we make this trade and actually get clean for the first time ever?\"\n\n\t\t\t\t\t\t\t\t\"Okay, fine,\" James says, putting the gun down. \"You said five corn?\"\n\t\n\t\t\t\t\t\t\t\t\"Five corn, five meat, and five book.\"\n\n\t\t\t\t\t\t\t\tJames takes off jogging to the cornfields. \"See you there.\"\n\n\t\t\t\t\t\t\t\t*page_break Back at the entrance\n\n\t\t\t\t\t\t\t\tYou doubled the number of books for the trade. All different types of animals, for varying age groups. You don't see any children in the group, but the thought of it makes you hopeful for the future. \n\n\t\t\t\t\t\t\t\tA small bag is waiting for you just outside the gate, and the group is far enough back for you to feel comfortable opening the gate. You crack it open just enough to exchange the bag with your milk crate of offerings. Once you close the gate and confirm the contents of the bag, you watch the outsiders grab the milk crate. \"Thank you,\" the towering man says as he lifts the contents. He may have even cracked a smile.\n\n\t\t\t\t\t\t\t\t\"Thank you,\" you say back.\n\n\t\t\t\t\t\t\t\t\"Again, one week?\" the man asks.\n\n\t\t\t\t\t\t\t\tYou're unsure whether you'd be able to keep a standing appointment, especially with how difficult it was to get to the sustainability of the zoo you have now. But the prospect of trade is too exciting to be pessimistic. \"One week,\" you respond.\n\n\t\t\t\t\t\t\t\tThe man nods and the group is off on its merry way. \n\n\t\t\t\t\t\t\t\tMaybe this is the way the world is now. Simple bartering for body wash and books. Perhaps a simple life is all you need. Plenty of animals have thrived on the simple life: from the blue whale to the Trichoplax. You could learn a thing or two from them.\n\n\t\t\t\t\t\t\t\tAnd the new group may learn a thing or two from you and your books. After enough honest bartering, you may even consider actually taking them into your zoo if they need it.\n\n\t\t\t\t\t\t\t\tThey just have to get rid of the scalps first. \n\n\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t\t\t#Take by force\n\t\t\t\t\t\t\t\tAfter breathing out a sigh of exasperation, you grab the shotgun out of James's hands unexpectedly and use the butt end to bash him in the forehead. Not hard enough to knock him unconscious, but hard enough to make a statement. He drops to one knee, hand on his head.\n\n\t\t\t\t\t\t\t\t\"It wasn't a request,\" you say as you walk past him. It will take you much longer to collect the products than you would have liked, but James is once again not very helpful.\n\n\t\t\t\t\t\t\t\tThe recipients of the gifts are a little antsy when you return to the entrance. As expected, you took a little too long. Still, there is a bag at the outside of the gate. So they at least aren't so impatient as to leave before you can complete the order. You open the gate and watch the movements of the group as you replace the bag with your milk crate of five fish, corn ears, and books. They are leaning forward, as if waiting for a moment to strike, but do not take the risk. Fortunately for you, they do not realize how vulnerable you are in this moment.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou close and lock the gate, double-checking that it can't be easily opened. You also double-check the bag to ensure there are all the components promised to you.\n\n\t\t\t\t\t\t\t\tA man approaches the gate, stares at you for a moment, then reaches down to retrieve their take from the trade. He counts through everything the same way you did and seems satisfied. He leaves without so much as a thank you. All things considered, you are fine with it. The entire interaction could have gone exponentially worse.\n\n\t\t\t\t\t\t\t\tWhen the visitors are out of eyesight, you trek to return to your inhabitance. On the way, you run into James, who is carrying a milk crate of his own. He looks like an employee of a pre-apocalyptic corporation who has cleaned out his office.\n\n\t\t\t\t\t\t\t\t\"What is this about?\" \n\n\t\t\t\t\t\t\t\tYou don't exactly care, but curiosity takes over.\n\n\t\t\t\t\t\t\t\t\"Clearly, you don't need me,\" James says. \"I'm just a waste of space, and I don't have any say in what is done. Even with the parts of the zoo you put me in charge of. So, I think we're both just better off if I just leave.\"\n\n\t\t\t\t\t\t\t\t*choice\n\n\t\t\t\t\t\t\t\t\t#Offer a parting gift\n\t\t\t\t\t\t\t\t\t\tYou pause, finding a way to be civil. \"Look, I'm not going to stop you if you want to go,\" you say. You reach into the bag that was just left by the guests. You grab a box of body soap, a toothbrush, and a tube of toothpaste. \"You should add these to your box. Those people traded me for these.\"\n\n\t\t\t\t\t\t\t\t\t\tCatching sight of the goose egg on his forehead, you wish the visitors had come across a pharmacy and could have offered you some kind of anti-inflammatory medication. \n\n\t\t\t\t\t\t\t\t\t\t\"Uhmm...thanks,\" James says. He seems to be a mixture of frustration you don't ask him to stay and surprise you were able to and willing to offer such sanitary products. \n\n\t\t\t\t\t\t\t\t\t\t\"I wish you the best of luck, James,\" you say. You actually mean it, and James seems to notice.\n\n\t\t\t\t\t\t\t\t\t\t\"You too,\" James responds.\n\n\t\t\t\t\t\t\t\t\t\t*page_break One week later\n\n\t\t\t\t\t\t\t\t\t\tYou have struggled with the solitude and are having difficulty keeping up with the tasks to maintain the food supply. There is only you now, but it is still difficult to feed yourself long-term. Parting with James was necessary, but you are feeling the ramifications now.\n\n\t\t\t\t\t\t\t\t\t\tIt is as if you have resorted to autophagy yourself. Eating at your own body tissue to survive. Something that may not be possible in humans. But this is a new world.\n\n\t\t\t\t\t\t\t\t\t\tAnd in a new world, you either adapt or you die.\n\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t\t\t\t\t#\"Good riddance.\"\n\t\t\t\t\t\t\t\t\t\t\"Good riddance,\" you say, not holding back your contempt.\n\n\t\t\t\t\t\t\t\t\t\tJames looks like he is about to drop his milk crate and attack you in anger, but must decide against it based on his previous experience and current state of injury. You can see the bulge on his forehead from where you struck him. He certainly feels it every time he considers being aggressive toward you. Due to this, he takes a deep breath and continues on his way without a word.\n\n\t\t\t\t\t\t\t\t\t\t*page_break Two days later\n\n\t\t\t\t\t\t\t\t\t\tYou are without James, but the solitude seems to be better than dealing with his incompetence. It is hard to keep up with all the inner workings of the zoo by yourself, but you think you've got it all under control\n\n\t\t\t\t\t\t\t\t\t\tThat is, until you take a closer look at the aquarium.\n\n\t\t\t\t\t\t\t\t\t\tHalf of the tanks have a small crack or leak, meaning they will be completely drained by the end of the week.\n\n\t\t\t\t\t\t\t\t\t\tFurthermore, the fish are completely mixed up. Predators have been placed with prey, and the food chain is already completely out of wack by the time you realize anything was out of place. It appears James had one last task before leaving. He sabotaged as much as he could with your primary source of protein, as well as your main export in the trade route you hoped to create with the visitors.\n\n\t\t\t\t\t\t\t\t\t\tAt this rate, you'll be dead within a month. If not by angry traders, then by starvation.\n\n\t\t\t\t\t\t\t\t\t\tWhy did the first smart thing James did have to be against you?\n\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending bad_ending\n\n\t\t\t#Fight\n\n\t\t\t\t*if James_Friendship \u003c 40\n\n\t\t\t\t\t\"We're gonna fight 'em,\" you say, trying to hide your nervousness. \"If we wait for the right moment to strike, we may be able to get the jump on them and take a few out before they even realize we're here. \n\n\t\t\t\t\t\"Can I use the gun?\" James asks.\n\n\t\t\t\t\t\"Sure,\" you say, hoping he's a good shot. \"As a matter of fact, I may grab the dog and the cheetah in case they can help us. Can you release the primates from their exhibit? They'll know we feed them, so I think they won't attack us. But if the other group tries to fight them maybe we'll have the animals on our side.\"\n\n\t\t\t\t\t\"Okay,\" he says.\n\t\n\t\t\t\t\t\"Great, then go to the bridge leading to the Out of Africa exhibit. We'll converge on them there when they can't maneuver in the small space.\"\n\n\t\t\t\t\t\"Okay.\"\n\n\t\t\t\t\t*page_break To the cheetah exhibit\n\n\t\t\t\t\tThe dog is quick to follow you, but the cheetah is hesitant. With enough goading, the cheetah finally joins. You just hope you have enough time to get to the bridge to Africa.\n\n\t\t\t\t\tYou arrive at the bridge and there is nobody there. You take the south side of the bridge, thinking that James will take the north side because that is the direction he is coming from. The dog and the cheetah sit quietly by your side, awaiting your instruction from a hidden vantage point of the bridge.\n\n\t\t\t\t\tYou can see that the intruders have made their way into the zoo and are approaching the bridge. At this point, all you need to do is figure out when to attack.\n\n\t\t\t\t\t*achieve cheetah\n\n\t\t\t\t\t*choice\n\n\t\t\t\t\t\t#Attack first\n\n\t\t\t\t\t\t\tIf only you had your gun, you'd be able to pick one off with your first shot. Instead, all you have is an old knife you've been using to prepare food. At least you've been sharpening it, so you know it should be able to pierce skin.\n\n\t\t\t\t\t\t\tWhen the majority of the intruders are on the narrow bridge, you sneak up behind the one in the rear and stab him in the back.\n\n\t\t\t\t\t\t\t\"Aaahhhwwwwaaa!\" the man screams in pain, alerting his comrades. The woman behind him swings around, eyes wide at not only you but the four-legged fighters with you. The dog naturally attacks the woman, and another man whips out a crowbar to fight off the dog. These three are taking up space, making it difficult for any of the others to get around to you. They must go in the other direction or wait.\n\n\t\t\t\t\t\t\t\"Now, James!\" you yell. This is the perfect time for him to pick one or two of them off while they can only go one way. But he must not take this chance to fire, you are unsure why.\n\n\t\t\t\t\t\t\t\"James! Shoot! Shoot them!\" you continue to cry out in vain.\n\n\t\t\t\t\t\t\tLooking over where you expected him to be, you quickly realize something.\n\n\t\t\t\t\t\t\tHe's not there.\n\n\t\t\t\t\t\t\tHe's not even in the zoo anymore. He abandoned you, leaving you with no gun and no advantage in this fight.\n\n\t\t\t\t\t\t\tThe dog is losing the fight against the two humans, so the cheetah rushes in. You are close on its tail.\n\n\t\t\t\t\t\t\tJust as the cheetah is about to pounce, a towering man pushes past the entangled humans and dog. In his hand is a small axe, which he swings underhand directly into the cheetah's chest. The cheetah's limp body flies over the edge of the bridge, the axe still in its body and followed by a trail of blood. The cheetah now out of the way, the large man now sets his sights on you.\n\n\t\t\t\t\t\t\t*page_break Run!\n\n\t\t\t\t\t\t\tYou stop your assault on the intruders, realizing the cheetah and dog are no longer able to fight on your side. You are vastly outnumbered. You spin to make your escape.\n\n\t\t\t\t\t\t\tYou are barely off the bridge when you feel a pull. The man has grabbed your shirt.\n\n\t\t\t\t\t\t\tYou try to continue running but only swing around toward the river running under the bridge. There is no longer a pull on your shirt, but now you feel a push from behind. Strong arms, wrap around you and squeeze like an anaconda. But the man doesn't plan to kill you by constriction. You deduce he wants to drown you, as the arms are now bringing you toward the water.\n\n\t\t\t\t\t\t\tYour face is plunged into the water, and you fight the urge to inhale from the sudden cold. Flailing your arms, you can't get enough leverage to push the big body off you. \n\n\t\t\t\t\t\t\tHaving never trained for this, you take in water much sooner than in the movies. Naturally, you swallow so the water doesn't go to your lungs. But it doesn't take long before the next breath takes water in and your body is writhing for a different reason.\n\n\t\t\t\t\t\t\tParts of your life flash before you as the corners of your mind start closing in. The last few are about the zoo. Your decision to let James in. To fight the intruders. To let James have the gun. Would it have made a difference? Or would you have died at the hands of the intruders no matter what?\n\n\t\t\t\t\t\t\tUnfortunately, you'll never know.\n\n\t\t\t\t\t\t\t*goto_scene ending bad_ending\n\n\t\t\t\t\t\t#Wait for James to attack first\n\n\t\t\t\t\t\t\tYou wait for what feels like forever. After a while, you notice all the intruders are almost off the bridge, but James still has not launched the attack. Your window to strike closes, and you wonder if something caused James to have a change of heart.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe intruders are now out of eyesight, further into the zoo. You cross to the other side of the bridge to search for James, cheetah and dog in tow. \n\n\t\t\t\t\t\t\tChecking the three ideal spots where you would expect a sniper to post up, James is nowhere to be found. At first you think to check for him somewhere else in the zoo, but a realization sets in.\n\n\t\t\t\t\t\t\tJames is no longer in the zoo. He took your gun and split, expecting to fend for himself and leave you to the intruders as a sacrifice. Snuck out the back employee entrance before the intruders would make it through the entire zoo. An option that is currently unavailable to you.\n\n\t\t\t\t\t\t\tFighting the intruders with James on your side was already a long shot. Now you have no choice but to slip out the front gate and into the world. The zoo belongs to the intruders now.\n\n\t\t\t\t\t\t\t*page_break Leave the zoo\n\n\t\t\t\t\t\t\tYou grab whatever you can silently assemble and escape into the outer world with your two pets. Although you left out the opposite side of the zoo as James did, you feel the need to walk around the zoo and search for him. You're not much of a tracker, but you'd love to accidentally run into him in the streets somewhere. \n\n\t\t\t\t\t\t\tOne day later, you and your companions are both hungry. If you don't figure out a big meal for all of you soon, the four-legged ones will turn on you. Best case scenario, they just abandon you the same way James did. Worst case...you don't want to think about worst case.\n\n\t\t\t\t\t\t\tThen the moment you've been waiting for occurs.\n\n\t\t\t\t\t\t\tYou find James walking from one house to another, clearly identified by the gun he is still holding with both hands. Must be his most prized possession, considering he was in too much of a hurry to grab anything else on his way out. \n\n\t\t\t\t\t\t\t*page_break That night\n\n\t\t\t\t\t\t\tThe house is dark and quiet. You'll surely scare the shit out of James when you wake him up. But for now you just want to enjoy the silence. [i]Just two more minutes[/i], you say to yourself.\n\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Kill James in his sleep\n\n\t\t\t\t\t\t\t\t\tYou grab the shotgun silently and aim it at James's head. \n\n\t\t\t\t\t\t\t\t\tLet him die thinking he pulled the wool over your eyes and got away with your gun. The last thing he'll remember is falling asleep in what he thought was a perfectly secure little house. \n\n\t\t\t\t\t\t\t\t\tYou pull the trigger and the gun recoils into your shoulder at an awkward angle. It will probably leave a bruise, but nothing as bad as what's left of James's face.
