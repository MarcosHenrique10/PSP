s the intruders are wielding from this high up. Mostly blunt objects, but the large man who is now in the front because of his speed is carrying a hand axe. This is certainly the biggest threat, considering you only have a knife on you.\n\n\t\t\t\t\t\t\tThe first man lets out a bellowing scream as he nears you and the zebra. The sound makes your heart leap, but it also does the same for the zebra. He squeals and raises up onto his hind legs, punching at the man with the fore legs. This takes the man by surprise and momentarily stuns him. The zebra takes this moment to bite at his face, making the man drop the axe and forcing him to fight with hands only.\n\n\t\t\t\t\t\t\tOther intruders join, but they have their eyes set on you. One comes at you from the left while the other comes from the right. You are able to stab one in the shoulder, a fatal wound, but the other pulls you off the zebra and down to the ground.\n\n\t\t\t\t\t\t\tYou are on the ground looking up, and slide the knife into the belly of the man above you before he can swing his crowbar. The wound makes him drop his crowbar, and you fight him off you to get ready to take on another wave of enemies.\n\n\t\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t\tA female invader attacks you with a baseball bat. You only have enough time to put an arm up to protect your head. The sudden crack and searing pain suggest your forearm is bruised if not broken. The force pushes you into the side of the zebra, an accidental stick with the knife barely avoided. Turning the knife on the woman, you dodge her next swing and pounce on her like a fox. You stab the knife through her neck, then turn away. Not because of the gruesome sight, but because of a blood-curdling scream you hear from the zebra.\n\n\t\t\t\t\t\t\tLooking over, you see the zebra has received a wound not unlike the woman you just stabbed. The sixth and final intruder apparently picked up the axe and slashed the zebra while it was fighting other intruders. The zebra was able to bite and trample two enemies to death, including the large man who had started with the axe, but the third opponent did him in.\n\n\t\t\t\t\t\t\t\"No!\" you scream as you run at the final assailant. He brings the axe back to swing, but his speed is no match for yours. You jump on him and both of you fall to the ground. You stab and stab and stab. On the third stab, the enemy makes a final attempt to swing the axe. It connects with your shoulder, but you power through it until he is completely gone.\n\n\t\t\t\t\t\t\tWhen it's over, you find your bearings. It hurts to lift your arm between the cut shoulder and the bruised forearm. However, you don't seem that either injury is going to be fatal. This is more than you can say about any other member on either side of the battle. \n\n\t\t\t\t\t\t\tThe zebra, for instance, is among the perished. He is a sore sight considering the critical role he played in you protecting your land. Does he know his death was not in vain?\n\n\t\t\t\t\t\t\tYou sure hope so.\n\n\t\t\t\t\t\t\t*page_break One week later\n\n\t\t\t\t\t\t\tYour injuries are healing slowly. Whether or not they are infected, you will surely find out soon. In the meantime you are just enjoying the fact you survived the fight with the intruders. Your work around the zoo has been limited, and you spend more time reading.\n\n\t\t\t\t\t\t\tAs of late, you've spent most of your time trying to find books that talk about which cultures eat which animals. You know there are some out there that eat horses.\n\n\t\t\t\t\t\t\tBut even if you find indisputable evidence, it may never completely rid you of your guilt regarding how you've been feeding yourself this week.\n\n\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t\t#Jump off the zebra and run\n\t\t\t\t\t\t\tIf the zebra refuses to listen to you, you have little attachment to him. If he doesn't want to move, that should not stop you from getting the hell out of here. The zebra does not put up much of a fight as you slide one leg over and jump of his back. \n\n\t\t\t\t\t\t\tMeanwhile, the group gets closer and closer. Knowing you are unlikely to take all of them on, you run toward the back of the zoo. On your way, you hear a commotion behind you.\n\n\t\t\t\t\t\t\tFor just a moment, you turn around to observe what exactly the commotion is. It appears the intruders were likely running toward you, but were interrupted by the zebra. The striped equine attacks as if it is the target of the predators. But he is vastly outnumbered and will succumb to the group in little time.\n\n\t\t\t\t\t\t\tOf the six assailants, five of them are thoroughly distracted by the zebra. One instead tracks you and departs from the group. \n\n\t\t\t\t\t\t\tYour knife is not a throwing knife...but your best bet is to throw it and hope for the best. You take it out and aim at your target. When the intruder is close enough you think you might be accurate, you wind up and throw it end over end.\n\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShank!\n\n\t\t\t\t\t\t\tTo your surprise, it hits the man before he can dodge. He falls forward, and his inability to stop himself drives the knife further into his chest. He slides to your feet without life. You roll him over and remove the knife in case any other intruders are on their way toward you.\n\n\t\t\t\t\t\t\tSurprised once more, the intruders are still busy with the zebra. Odd, because they have certainly killed it. The body is just lying on the ground.\n\n\t\t\t\t\t\t\tThe group of intruders is opting to beat a dead zebra.\n\n\t\t\t\t\t\t\tThe irony is not important to you. What's important is that you conclude your escape before they can make sense of exactly what happened.\n\n\t\t\t\t\t\t\t*page_break That night\n\n\t\t\t\t\t\t\tA nightmare jolts you awake from the middle of your sleep. You were in shallow waters, thinking you were safe. Suddenly, two floating eyes present themselves in front of you, just above the water. You have no time to realize it is a crocodile before the humongous reptile explodes out of the water and surrounds your head with its jaws like a vice grip. You hear a snapping sounds just as you wake up.\n\n\t\t\t\t\t\t\tFear suggests to you that the snapping sound was not from your dream, and that it was from a twig or a branch outside. Perhaps it is the group of invaders, come to avenge their fallen soldier. Instead, you hope your taking of one of their lives is considered an even trade with the zebra. They will certainly eat well tonight. You wonder if they will choose to venture out and find you. Even if not tonight or tomorrow, it could happen at any time. You will run, you will hide, but you will never relax.\n\n\t\t\t\t\t\t\tSure, maybe the group of invaders is happy with their new digs and have no interest in finding you. They are unlikely to need to venture out to find food in the near future.\n\n\t\t\t\t\t\t\tBut then again, a crocodile can survive a year without eating. Yet it is still a predator.\n\n\t\t\t\t\t\t\t*goto_scene ending\n\n*elseif (Animal = \"Wolf\")\n\n\tThe wolves you have been working with are not quite as docile and domesticated as a house dog, but you clearly don't have time to waste trying to train them any more. If you can fight the intruders as a pack of your own, you might have a chance. Plus, you can choose which weapon you'll use in the battle.\n\n\t*choice\n\n\t\t#Shotgun (long range)\n\t\t\tJust because the wolves need to get up close and personal to fight doesn't mean you need to. It may be in your best interest to shoot the intruders from afar while the wolves attack head on. \n\n\t\t\tThe bridge that takes patrons to the Out of Africa exhibit could be your best spot to make your stand. If the wolves can attack (or better yet, surround) the intruders on the bridge, they will have little mobility to avoid your aim. \n\n\t\t\tDuring your habitation of the zoo, you've only had the wolves out of their exhibits a handful of times. Each time, you've fed them meat so they'd be somewhat satisfied. At this point, they know you are their primary source of food. But each time you've led them back to their exhibit for the last piece of meat. This time you cannot. Instead, you lead them as close to the bridge as you can, then make your way over to a hiding spot with higher ground with a great view of the bridge to Africa. You don't exactly know if or when the group of invaders will reach this spot of the zoo, but it would be worse if you were moseying around like a grazing elk when they cross your path.\n\n\t\t\tAfter what feels like an hour, you finally find that the group of intruders is approaching the bridge to Africa. They remain together like a pack of wolves themselves, which you begin to wonder whether you should have done. As you peer down the barrel of your shotgun, you realize the wolves you released are nowhere in sight.\n\n\t\t\t*choice\n\n\t\t\t\t#Shoot at the intruders\n\t\t\t\t\tYou fire a shot at the closest one to you, hitting your target with terrific accuracy. The man is knocked backward into the railing of the bridge. At this the rest of the intruders take cover, but they have no idea where the bullet came from. A couple of them take cover on the wrong side, and are still in your line of sight. Firing at another enemy, you know for sure this one is not going to get back up.\n\n\t\t\t\t\tNow all the intruders have actually figured out the direction from which the bullets are flying, communicating in some kind of broken English and pointing in your general direction. You may be able to shoot one more before your exact location is detected.\n\n\t\t\t\t\t*choice\n\n\t\t\t\t\t\t#Shoot again\n\n\t\t\t\t\t\t\tThe invaders are already creeping up the hill toward you. You reload and fire another shot, taking out a woman while the others break into an all out sprint. Two of them are certain to reach you before you can fire off another shot.\n\n\t\t\t\t\t\t\tWith no other choice, you wield the gun like a baseball bat and swing for the fences.\n\n\t\t\t\t\t\t\tThe first swing is a home run, knocking the first opponent to the ground and down the hill. But before you can wind up again the next assailant reaches you and knocks you to the ground. You feel a rock jab into your back, sending sharp pains throughout your whole abdomen and leaving you breathless.\n\n\t\t\t\t\t\t\tIf it were only the one enemy, you might be able to pry him off of you. But two more join in and dogpile you. Not the dogpile as a celebration, but more like a dogpile to keep you from standing up again. Theres no chance you'll be able to while you're in this much pain and have this much weight on you. You can only hope they'll decide to show you some mercy.\n\n\t\t\t\t\t\t\tOf course they won't. You have killed at least two of their friends at this point. All of them are speaking with each other in a way that may not quite resemble human language as much as it sounds like animal calls. Over all the commotion, you still hear the Chk-Chk of your shotgun being reloaded.\n\n\t\t\t\t\t\t\tYou turn your head to the side not wanting to see your own death coming. Between the legs and arms of the enemies holding you down, you see some surprising eyes staring back at you.\n\n\t\t\t\t\t\t\t\"No fucking way,\" you say to yourself when you realize the wolves are hiding in the bushes, watching everything happen. It is possible they were looking for an opportunity to strike, but have decided against it now that there is no hope for you. \n\n\t\t\t\t\t\t\tJust like you turned away so you would not see your death coming, the wolves turn away and make a silent escape before they can see your death as well.\n\n\t\t\t\t\t\t\tAnd then you hear the gunshot at the side of your head.\n\n\t\t\t\t\t\t\t*goto_scene ending bad_ending\n\t\t\t\t\t\t#Run away\n\t\t\t\t\t\t\tLike a sprinter at the beginning of a race, the gunshots are now followed by a beeline in a single direction. Your enemies have to run uphill, but you are at the top with flat land ahead of you. What you think is an advantage does not make much of a difference, because you can hear at least one set of footsteps gaining on you.\n\n\t\t\t\t\t\t\tThen out of the corner of your eye you see gray flecks grow larger and larger.\n\n\t\t\t\t\t\t\tIt appears the wolves have finally decided to show up!\n\n\t\t\t\t\t\t\tNot in time to keep you from being tackled, but at least they may provide some help.\n\n\t\t\t\t\t\t\tFrom the ground you can see the wolves are taking care of the back two humans. All you have to do is take care of hte one who tackled you and the one that is incoming. The first is rather easy, you are able to rotate your body and get on top of the man. From here you can take the empty gun and beat his face in. While you are doing this, though, another enemy comes from behind and tackles you to the ground once more. This man is a great deal heavier and stronger. You try to swing your gun but he grabs is and rips it from your hands. He cracks it into your skull, stunning you for a few seconds.\n\t\t\t\t\t\t\tWhen you come back to, you realize he is no longer using the gun and is now holding an axe. He raises it up in the air and you close your eyes to brace yourself for the blow.\n\n\t\t\t\t\t\t\tSuddenly, the weight is lifted off you. The sharp bite of the axe still hits your shoulder, but you open your eyes to see the man is no longer on top of you. To your side, the man is now in trouble with a wolf. \n\n\t\t\t\t\t\t\tThere are no more enemies alive around you. The wolf is likely to finish off the last of the intruders, which offers you ample time to assess your injuries.\n\n\t\t\t\t\t\t\t*page_break\t\t\t\t\t\t\t\n\n\t\t\t\t\t\t\tYour adrenaline minimized the pain you were feeling, but it all rushes in as you look down at your shoulder and see the deep gash in it. Blood is already soaking your clothes. You are feeling woozy. Not from the sight of blood, but from the loss of it. You feel like the heavy man is still on top of you, unable to get your body off the ground.\n\n\t\t\t\t\t\t\tBoth the wolves ambled toward you with injuries of their own. Unlike yours, though, theirs are not fatal. Your vision is already blurring, and all of you are realizing you won't be there to feed them anymore. \n\n\t\t\t\t\t\t\tThey are giving you puppy eyes, but you are not sad. As the world around you turns to black, you are happy the pack was able to stop the intruders from taking over.\n\n\t\t\t\t\t\t\tIf you can't have the zoo, nobody can have the zoo.\n\n\t\t\t\t\t\t\t*goto_scene ending bad_ending\n\n\t\t\t\t#Wait for the wolves\n\t\t\t\t\tYou should have known the wolves were unlikely to take the lead without your explicit example. The intruders are already at the other end of the bridge, leaving you with little advantage if you were to make an attack. Will they even attack at all?\n\n\t\t\t\t\tJust as you're wonering, you hear a distressed screech. Revisiting the barrel of the gun, you look down to see if the squeel came from any of the invaders. They all appear to be on high alert, but none of them are in immediate distress.\n\n\t\t\t\t\tThe sound resonates through the zoo once more, this time more recognizeable. Not a human at all.\n\n\t\t\t\t\tThe wolves have found the bull elk exhibit. It makes perfect sense. They fall within the category of wolves' natural prey. Apparently the intruders do not come to this exact conclusion. Or if they do, they know they may be in for a fight with some type of animal at the top of the food chain. Either way, they all pull out blunt trauma weapons and prepare for any fight that may be coming their way. \n\n\t\t\t\t\tAs the group of intruders continues deeper into the zoo, you stalk behind them. They move in the direction of the screams, and you have to admit yourself that you are also a bit curious. As a group (you always just out of earshot and eyesight), you travel toward the elk exhibit.\n\n\t\t\t\t\tIt is an open exhibit, where you'd be able to pet the animal from the barrier if they ever came that close (but they never did). Even from your vantage point behind the group of invaders you can see the wolves have successfully made their kill. The two are chowing down on the elk, a feast you've never been able to offer them with your little rations.\n\n\t\t\t\t\tWhen they realize the intruders are approaching, they immediately see the group as threats trying to steal their food. The snarls and growls are enough to send chills down your spine. Neither the wolves nor the intruders back down from the fight, each trying to scare off the other. But each views themselves as the alpha in this situation, and it can only end one way.\n\n\t\t\t\t\tBloodshed.\n\n\t\t\t\t\t*page_break\n\n\t\t\t\t\tThis is practically the scenario you had hoped for at the bridge. But with the open space it is more likely the humans will surround the wolves than the other way around.\t\t\t\t\t\n\n\t\t\t\t\tSimultaneously, the two groups charge at each other like a scene from a midieval war movie. The wolves make the first successful attack, tearing at the arm of one of the men in the group. But the single act is overshadowed by the counter attack of the numerous enemies.\n\n\t\t\t\t\tYou are tempted to save the wolves, but with how quickly the tables are turning you know it would just draw more attention to you. As of right now, the intruders have no idea you are in the zoo. It may be in your best interest to keep it that way. In fact, it may be in your best interest not to be in the zoo at all.\n\n\t\t\t\t\tAfter the battle is over, there are two casualties on each side. Considering there were only two wolves to begin with, the humans are the clear victors. They leave the site as a group and return in the direction where you first saw them. This leaves you with the opportunity to sneak out an employee entrance at the back side of the zoo.\n\n\t\t\t\t\t*page_break Three weeks later\n\n\t\t\t\t\tSurprisingly, you have been rather self-sufficient while surviving outside the zoo. Though you were more comfortable in your previous home, the reading material of the gift shop taught you much about edible plants, fishing, and other tidbits about survival. You are a sophisticated caveman at this point.\n\n\t\t\t\t\tIt's not like you are better off now. You would definitely prefer to be in the zoo. In a perfect world, you'd build your numbers and attack the zoo once you find a pack where you can fit in.\n\n\t\t\t\t\tBut in the meantime, you are doing fine as a lone wolf.\n\n\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\n\t\t#Pistol (short range)\n\t\t\tYou want to get in close, but not so close that the intruders can attack you directly. Plus, the wolves may be able to take care of that anyway. With enough coordination you might be able to fight off the invaders and stay in the zoo.\n\n\t\t\tThe bridge leading to the Out of Africa exhibit could prove to be a viable choke point for your attack. They would have difficulty maneuvering on the narrow walkway, and you and the wolves may be able to surround them.\n\n\t\t\tDuring your habitation of the zoo, you've only had the wolves out of their exhibits a handful of times. Each time, you've fed them meat so they'd be somewhat satisfied. At this point, they know you are their primary source of food. But each time you've led them back to their exhibit for the last piece of meat. This time you cannot. Instead, you lead them as close to the bridge as you can without being out in the open. \n\n\t\t\tIt takes some time before the group of unwelcomes reaches the bridge. They were probably exploring other parts of the zoo, but haven't separated into multiple groups yet. When you fight them, you will fight all of them. \n\n\t\t\t*page_break\n\n\t\t\tHidden in the foliage of the zoo, you are flanked on either side by each wolf. They are much less likely to be camouflaged in the foliage off the beaten path of the zoo, but you do not plan to hide for long. Once the group of intruders is all gathered on the bridge, you take aim and fire a shot at the closest target.\n\n\t\t\tAt this, all the intruders turn in your direction. The only one who doesn't was struck by your bullet and is now on the ground. Beyond this, the wolve also seem to be tracking you now instead of the group of intruders. They stare menacingly at you, backing away slowly as they growl. Neither of you is completely sure whether the other will launch an attack. You feel like they should know you don't have plans to hurt them, but right now you may also appear to be the biggest threat to them. What you do know is that the invaders have figured out your location and are makign their way over to avenge their fallen soldier.\n\n\t\t\t*choice\n\n\t\t\t\t#Keep shooting the intruders\n\t\t\t\t\tIf you shoot at the intruders, hopefully the wolves will realize you are not their enemy. Another bullet flies and collides with an enemy. Two down, four to go. Peeking down at the wolves, you notice they are continuing to back away from you. Neither you nor the intruders have fully established yourselves as a threat to the wolves. Before you know it, they've turned and distanced themselves from the entire chaotic mess.\n\n\t\t\t\t\tThe fight seems a little less even now. Sure, you have a gun, but only two more bullets against four opponents. They are approaching you from multiple angles, but don't know where exactly you are yet.\n\n\t\t\t\t\tYou remain in your hiding spot and pick off two more enemies. No more bullets, but all you have to do to protect your land is resist two final intruders. Like the wolves, this time the humans are on either side of you. Unlike the wolves, they have made it quite clear they are your enemies. \n\n\t\t\t\t\tIt's not like the movies, where the opponents lunge at you one at a time so you can fight each of them off. Both intruders converge on you at once, one taking out your knees while the other runs directly into your chest. You don't know how many flips you do, because you get disoriented in the air. Next thing you know, you are lying on your stomach with both your arms pinned to the ground. One large hand is on your head shoving your cheek into the soil. \n\n\t\t\t\t\t\"Get off me!\" you scream in vain. Of course they aren't just going to get up because you demand it. You writhe under their heavy weight but make no progress in freeing yourself. \n\n\t\t\t\t\tThen a sudden and sharp pain enters your shoulder, spanning from the top of your shoulder to the middle of your back. In the corner of your eye you can see an axe has just been cleavered into your back like a butcher knife. The pain hasn't hit you yet, but you know it is coming.\n\n\t\t\t\t\tJust like you know another strike is coming when the axe is removed from your skin.\n\n\t\t\t\t\t*page_break\n\n\t\t\t\t\tYou brace yourself for the final blow of the axe, but then you hear a barking noise in the opposite direction you are facing. Just in time, the two wolves jump into the action and attack the two remaining intruders. The weight is lifted off your body, but you still can't move the arm that has been mangled.\n\n\t\t\t\t\tBlood from your shoulder continues to run down your neck and back as you realize the wound is lethal. Quick calculations would suggest you will bleed out in a matter of minutes. The good news is: you get to survive long enough to watch the wolves win the fight against the intruders. Hopefully a wolf tearing at ones flesh is just as painful as nearly having your shoulder severed off by an axe. Pretty likely, considering the screams you hear from each of them. \n\n\t\t\t\t\tMusic to your ears.\n\n\t\t\t\t\tThe world starts closing in around you, and your vision goes blurry and dark. Still, you can make out the wolves making minced meat of your murderers. \n\n\t\t\t\t\tYou die happy knowing (technically) you defended the zoo from the intruders, even if you are included as one of the casualties. \n\n\t\t\t\t\tThe zoo belongs to the animals now. As it always should have.\n\n\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t#Shoot one of the wolves\n\t\t\t\t\tYou turn to your right and fire on the male wolf, twice just in case it survives the first one. A behavior you immediately regret. Partly because you feel guilty shooting an animal in cold blood, but especially because you feel a bite at your leg before the animal hits the ground. Looking down, you see the second wolf is latched onto your calf. The searing pain and the yank of the strong quadruped animal pulls you to the ground. Just as the animal is about to launch for your throat you instinctively fire one last shot and take this one out.\n\n\t\t\t\t\tNow you don't have any more wolves to fight. But you also don't have any more bullets. And the intruders are full force.\n\n\t\t\t\t\tThey stalk toward you cautiously, knowing you just fired a gun so many times. Thinking better than to pretend you have any bullets left, you drop the gun and raise your hands up in supplication. Your only hope is that they'll forgive you and show mercy. Not likely, but your only hope.\n\n\t\t\t\t\tYou find yourself surrounded by the intruders. They might not know what they're going to do with you either. You stare at the ground in front of you. Most animals view eye contact as an aggressive behavior and view a downcaste look as a sign of inferiority.\n\n\t\t\t\t\tThey are all silent, but something tells you they are having a telepathic discussion about what your punishment should be. After what feels like hours, you feel two of them lift you up by the arms. Your leg is still in much pain, but they do not seem to care. They are not assisting you with your walking. Instead, they are pulling you along by the arms like you've been arrested and handcuffed.\n\n\t\t\t\t\t\"Where are you taking me?\" you ask.\n\n\t\t\t\t\t\"Quiet,\" the largest man of the group says. Probably the alpha male.\n\n\t\t\t\t\tYour question is answered without words. The wolf exhibit is a familiar sight, and apparently it is your new home. You have come full circle. The circle of life.\n\n\t\t\t\t\t*page_break\n\n\t\t\t\t\tThe invasion was a success. The intruders throw you into your cage, where you will stay for who knows how long. \n\n\t\t\t\t\tWill they hold you prisoner forever? Will you await trial, or go straight to an execution? Are they showing mercy? Or are they just keeping you alive in case they need you for food later?\n\n\t\t\t\t\tYou have plenty of time now to ponder these questions and more. Such as: are you a prisoner or a pet?\n\n\t\t\t\t\tNow that you are in this cage, from the perspective of the animal themself, you start to wonder if there is even a difference.\n\n\t\t\t\t\t*goto_scene ending bad_ending\n\n\t\t#Knife (up close and personal)\n\t\t\tEvery pack of wolves needs a leader. If you want the fight to go in your favor, you need to lead the wolves right up to the enemy and get in close for the kill. You may even need to lead by example and draw first blood. But you'll need to be ready to do that anyway.\n\n\t\t\tIf you're going to attack, you need to find the best spot to create an advantage. One of the best spots you can think of is the bridge that leads to the Out of Africa exhibit. Attacking at the right time may create a choke point where you can take on a few enemies at a time without needing to deal with all of them at once. \n\n\t\t\tDuring your habitation of the zoo, you've only had the wolves out of their exhibits a handful of times. Each time, you've fed them meat so they'd be somewhat satisfied. At this point, they know you are their primary source of food. But each time you've led them back to their exhibit for the last piece of meat. This time you cannot. Instead, you lead them as close to the bridge as you can without being out in the open. From your hiding spot, you wait for the arrival of the intruders.\n\n\t\t\tAs expected, the intruders eventually make it to the bridge to Africa. You and your companions creep up as a unit, the wolves on either side of you. From the way they crouch they must be aware of the gravity of the situation. Without noise, you get to within twenty feet avoiding detection.\n\n\t\t\tThen you hear the crunch of a stick beneath your foot.\n\n\t\t\t*page_break\n\n\t\t\tBy the time the intruders turn their heads to find you, the wolves are already launching their attack. They sprint full speed at the nearest two invaders. One of them is thrown off by the very large man they attacked, and now the man is coming for you.\n\n\t\t\tWith just your knife to fight, you are not too excited when the man pulls out a hand axe. Evasion may be the best technique until you can find a pattern in his moves.\n\n\t\t\tHe comes at you aggressive, thinking he might be able to intimidate you with sheer force. You stay just out of reach of his first two strikes, and just as you're about to make your first attack you see that the wolf is at his back. The animal chomps down on his leg. He isn't completely debilitated, but is in enough pain to be distracted. He changes his attack and swings at the wolf, but even after being cut by the sharp metal the wolf remains latched onto his leg.\n\n\t\t\tThis is the time when you make your move. While the man is distracted you jam the knife as deep into his lower back as you can. Then you remove it and insert once more. Between your knife and the wolf's teeth piercing his flesh, he drops in a matter of seconds.\n\n\t\t\tAs you check on the other wolf you see them surrounded by multiple intruders. Not all of them, because the bridge is too narrow, but too much for the creature to handle alone. It's a good thing you and your wolf are looking for something to do. \n\n\t\t\tAs a team, you and the two wolves start taking out the intruders one-by-one. The melee weapons they came with are no match for the sharp metal and even sharper teeth you brought with you.\n\n\t\t\tYou take a pause from the bloodfest to gather your surroundings. It appears only four of the original six intruders are still in the general vicinity of the bridge. Two, a man and a woman, have decided to hightail it out of the zoo. That is, of course, if you let them escape.\n\n\t\t\t*choice\n\n\t\t\t\t#Let them go\n\t\t\t\t\tThere has been enough death today, but you still must makes ure these invaders will never choose to invade again. Leave them with a chilling reminder that the zoo is and always will be yours.\n\n\t\t\t\t\tIn true wolf fashion, you take a deep breath and howl as loud as you can into the sky. You continue until you are out of breath, but by that time the other wolves have joined in and created a chorus of spine-chilling ululations. You can tell the invaders (who are now refugees) pick up the pace just a little bit following your warning. They accept that you have marked your territory.\n\n\t\t\t\t\tOnce the enemy is either deceased or outside the zoo completely, you have a moment to determine the casualties on your own side. To your pleasant surprise, the only injury one your side was the axe to one of the wolves' legs. A large gash, but one it was likely to survive, especially with its partner licking the wound to maximize the healing process. Considering how many human foes you were able to take out, this is certainly a win.\n\n\t\t\t\t\t*page_break Two days later\n\n\t\t\t\t\tThe leg is healing up nicely, and both wolves are clearly happy to be freeroaming around the zoo. You don't care to bring them back to their exhibit after the help they just gave you. \n\n\t\t\t\t\tAs a group, you have a tradition every night now. Right around the same time every evening you all howl at the moon. A wolf's howl can be heard for miles. Now anyone for miles will know better than to encroach on your habitat.\n\n\t\t\t\t\tOtherwise, they'll feel the wrath of the wolf.\n\n\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t#Chase them down\n\t\t\t\t\tYour thirst for blood is still yet to have been quenched. And wolves would never waste an opportunity to kill. You sprint as fast as you can toward your prey, but they are so far ahead you may not reach them.\n\n\t\t\t\t\tBut the wolves will.\n\n\t\t\t\t\tThey run past you and track down the two scaredy cats in a matter of seconds. One of them, the man, turns around to make one final effort in the fight. He has a crowbar, but doesn't exactly know how to wield it. The male wolf jumps on him with an arrogance that it will be an easy kill. Unfortunately, though, the man has a breif moment of luck. He holds the crowbar like a staff and thrusts it at just the right time and place. The end enters the wolf's mouth, causing irreparable damage. The wolf drops to the ground with no hopes of getting back up.\n\n\t\t\t\t\t\"No!\" you scream in anger as you continue your pursuit. The man is now running away again, but is not as far away. You throw the knife in hopes it will lodge in his back.\n\n\t\t\t\t\tIt does not reach his back, but falls lower and gets caught up between his legs. The pointy end punctures his calf and he falls to the ground. By the time he rolls over to defend himself, you're already on top of him with the knife gripped firmly in your hand. \n\n\t\t\t\t\tWolves have a total of 42 teeth. When you are done with this man, he likely has an equal number of puncture wounds.\n\n\t\t\t\t\tAs you rise up, you notice only one of the wolves is able to rise with you. The two of you gather around the fallen soldier. \"I'm sorry,\" you say to the female wolf.\n\n\t\t\t\t\tThe wolf looks at you for a moment, then sets off in another direction. You find her later in the wolf exhibit, but choose not to close her in. She is welcome to roam the zoo as she pleases.\n\n\t\t\t\t\t*page_break Three weeks later\n\n\t\t\t\t\tYou and the she-wolf crossed paths on occasion, but you didn't want to intrude on her space after she helped you fight the invaders. Which is why it took a few days before you realized she was pregnant.\n\n\t\t\t\t\tToday she had her litter, and you aren't worried about how it will affect your food rations. It doesn't matter when you've witnessed such a miracle.\n\n\t\t\t\t\tYou think about the irony of the phrase \"raised by wolves.\" It certainly does not fit in this instance.\n\n\t\t\t\t\tYou weren't raised by wolves. Instead, these wolves will be raised by you.\n\n\t\t\t\t\t*goto_scene ending", "james_attack": "*comment James Attack Scene \n\nOver one-hundred animals still survive under your tutelage at this zoo (if you include the fish in the aquarium), which is an impressive feat if anyone was to ever learn of your new endeavor as an inexperienced zookeeper. \n\nIf you had allowed James to stay, perhaps he would have kept you company, listened to your stories, and applauded your effort at maintaining the ecosystem of the zoo. At the time of his first visit, it was to early to trust anyone. But a companion may have done more than just cured loneliness.\nFor instance, the vegetable garden in what was previously the elephant habitat is overgrowing. A second set of hands could harvest and eat any leftovers. In addition, one person could constantly be the lookout. Instead, you're stuck as your own lookout, hoping that if somebody attacks it will be while you're watching from the giraffe feeding box.\n\nWhat is your book of choice to read today as you sit lookout?\n\n*fake_choice\n\n\t#Smartest Animals in the World\n\t\tThe octopus is a surprise entry for you, but it seems to make sense considering your own experience. There is an octopus exhibit in the zoo, but it was empty by the time you arrived here. This supports the staementes in the book about how octopuses (which you realize is the preferred English plural) have often been found to escape their enclosures in zoos. Then again, you're unsure how it would have survived outside the tank. It was unlikely to have found a drain that leads to the ocean. You are different, because you plan to stay in your zoo enclosure as long as possible.\n\n\t#Animals of the Arctic\n\n\t\tSkipping over the polar bear, you find an arctic fox to be a more interesting creature. Beyond the fact that they are so cute and snuggly, their furry tails can be used as another layer of protection from the cold. Once the winter comes, you may have to make the arctic fox your mascot.\n\n\t#Flightless Birds\n\n\t\tThis book caught your attention due to its width. You could only name a few species of birds who couldn't fly, but by the end of the book you'll be able to list more than fifty. This includes the steamer duck, a vicious animal known for being so territorial they will take on animals much larger than themselves in a fight to the death. If you are put in this situation, you wonder if you would have the courage.\n\nToo bad the apocalypse doesn't offer trivia night.\n\n*page_break\n\nYou're about to leave your post to begin your feeding schedule when you notice some movement in the distance. Peering through the binoculars you finally decided to start using, a recognizable face is making its way toward the zoo again.\nJames is walking with a purpose. He is too far away to decipher his specific facial expression, but his posture is as aggressive as a wild boar. \n\nMore concerning, he makes a gesture with his hands to suggest he is holding and cocking some kind of weapon. The way the sun reflected off the black metal suggested a handgun. Considering the only ammo you have for your shotgun is birdshot, you're unsure whether fighting firearm with firearm would be the best idea.\nJames will be at the boundary in under two minutes, so you must decide and act fast.\n\n*choice\n\t# Cut your losses, leave the zoo.\n\t\tAfraid you wouldn't have enough time to avoid the fight, you only take the chance to grab two bags of supplies on your way out through an employee entrance. You're sad you won't be able to stay in the zoo any more, but the saddest is the uncertainty of the animals left behind.\n\t\tNot all of them are like snakes, able to survive in their environment after being abandoned by their parents. Would James be a worthy replacement for you, or would their environment become uninhabitable? It is no longer for you to decide.\n\t\t\n\t\t*achieve snake\n\t\t*page_break\n\t\n\t\tYou left your nest a week ago, but it feels like much longer. You have certainly lost your way, metaphorically and literally. The zoo was familiar to you, but you hardly left and you were too distraught to pay attention when you migrated outside of your home.\n\n\t\tThe first three houses you stayed in ran out of resources quickly. On your trek to find a fourth house that may be more ecologically valid, you run into a group of people. About a dozen in total, this is the largest group of humans you've seen in as long as you can remember. \n\t\tOne of the members catches sight of you in their peripheral vision and suddenly they all turn toward you simultaneously like a school of fish. The eerie feeling you get from this is only compounded when they appear to pull out weapons such as bats, crowbars, and axes. You realize these are no longer humans dealing with the apocalypse. These are animals evolved to fight together.\n\n\t\t*choice\n\t\t\t#Run away\n\t\t\t\tYou sprint in the other direction like a gazelle from a lion. All the while you hear laughter and what can only be described as growling behind you. Without your bearings, you find yourself in a cul-de-sac with little knowledge of a safe route. Quickly, but not quickly enough, you realize you are not a gazelle running from a lion.\n\n\t\t\t\tYou are a gazelle running from a pack of hyenas. Hyenas are the animals known for their laugh, but are actually a vicious predator who hunts in packs. They maintain a pursuit until their prey succumbs to exhaustion. An exhaustion you find yourself suffering from now.\n\n\t\t\t\tMaybe you should have ditched your bags when you started running. Perhaps you should have fought James instead of leaving. Perhaps you never should have chosen to stay at that fucking zoo.\n\n\t\t\t\tNone of this matters now. All that matters is the largest member of the group walking toward you with a baseball bat. A true sign of an absence of civility. The axe would have been a quicker death. All you can hope for now is that the first hit will knock you out.\n\n\t\t\t\tIt does.\n\t\t\t\t\n\t\t\t\tAnd you never wake up.\n\t\t\t\t*page_break The End\n\t\t\t\t*goto_scene ending bad_ending\n\n\t\t\t#Put up a fight\n\t\t\t\tEven the most docile animals will put up a fight when cornered. A man with a bat attacks you first, but you dodge his swing and apply a swift kick between his legs. He drops to his knees, and the bat drops to the asphalt. You pick it up and slam it into his face.\n\t\t\t\tOnce the first opponent has fallen, you notice two more coming at you at once. You are able to take them down too, but it is much more difficult and you are already fatigued. \n\n\t\t\t\tThe group is like a hydra. The number of attackers doubles with each round. At four, you have found your match. One takes out your knee as you swing at another, then your last effort is met with a forceful crack of metal against your arm. The bat drops and you feel a searing pain in your forearm.\n\n\t\t\t\tBut the pain does not last long.\n\t\t\t\t\n\t\t\t\tThe last thing you see is the sharp end of an axe slicing through the air just before it slices through your head.\n\t\t\t\t*page_break The End\n\t\t\t\t*goto_scene ending bad_ending\n\t\t\t\t\n\t\t\n\t# Find a place to hide. No time to grab your gun.\n\t\tYou secure yourself in the gift shop and silence yourself in time to hear James lift himself over the fence at the entrance. A thud lets you know he did not come down easy.\n\n\t\t\"Ouch! Fuck!\" he shouts, but must have been able to lift himself up to his feet. His shouting continues, as if he expects you to be in earshot (which you are, but hopefully he doesn't know that. \"Where are you, asshole? I know you're probably still here. You've got everything you need. Wouldn't even let me in. Well, now I've let myself in. What are you going to do about it?\"\n\n\t\tYou find yourself wondering the same thing.\n\n\t\tYou peek through the window of the gift shop and James hobbles into view. He must have injured himself falling over the entrance gate, but you can see he has not dropped the gun. In his anger, he is likely to use it if given the opportunity. You may be able to get an advantage if you make a surprise attack, but it would certainly be risky.\n\t\t*choice\n\t\t\t#Pounce when he is not looking\n\t\t\t\tYou quietly grab a shirt from a rack and remove the wooden hanger. It is the closest thing to a weapon you can think to use.\n\n\t\t\t\tWith your knowledge of the zoo, you stalk your prey from the best hiding spots possible. When the time comes, you make your move.\n\n\t\t\t\tYou notice James freeze just before you strike, as if he realizes for a brief moment you are about to attack. This does not prevent you from swinging your hanger at the back of his head. \n\n\t\t\t\tThe hanger connects with a loud CRACK! It breaks on James's head and he stumbles to the side. \"Woah!\" he yells as he spins around at you with his gun drawn. You swing once more, this time at his face with a shattered hanger. When the wood connects with bone, you hear a much louder CRACK from lower down. The gun went off, but you ignore it and jump on James to tackle him to the ground. \n\t\t\t\tA sudden adrenaline rush overcomes you and you continue swinging on James as he lies on the ground below you. Some swings are to hit, while others are to stab. The result is the same, bringing James closer and closer to death until his body is motionless. A victim of a crime you never would have envisioned yourself committing. Then again, you never envisioned the apocalypse. And in this world, it may no longer be a crime.\n\t\t\t\tBy the time you are done, the object in your hand no longer resembles a hanger.\n\t\t\t\t\n\t\t\t\tAs you come out of your fit of rage, you peer down at your abdomen to realize James shot you in the gut. There is as much blood coming from your stomach as there was from James's face. Maybe even more.\n\n\t\t\t\tThis is not good. Not at all.\n\n\t\t\t\tEven if you were to find a medical kit, it would only do so much. You'd still need a hospital for surgery, wound care, and to replace blood lost. It appears you did not win the fight against James, you just happened to lose last. All that is left is to decide how the last moments of your life will be spent.\n\n\t\t\t\t*choice\n\t\t\t\t\t#Feed one of the animals\n\t\t\t\t\t\tThe world is closing in around you, and your vision is blurry. However, you're still able to make your way to the bear exhibit. Likely the hungriest animal in the zoo at this moment, you hope to provide a sustaining last meal. \n\t\n\t\t\t\t\t\tUpon entry into the exhibit, the bear stares at you with anticipation. You have fed it some of the dead fish from the aquarium before, but it probably expects the same thing in this moment. You come to it empty handed, and it pauses to await understanding.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Ah!\" you yell, waving your hands and taunting the animal. \"Kill me! Eat me!\" Your voice loses its power as your energy is pulled from the wound in your belly.\n\n\t\t\t\t\t\tThe bear approaches you, but not aggressively. It seems to be observing your pain and your injury, more concerned with your health than its own food.\n\n\t\t\t\t\t\tThe exhaustion from fighting the injury becomes too much to bear. You fall to one knee as it evolves into severe pain. \"Please,\" you whisper, begging the bear to take you out of your misery.\n\n\t\t\t\t\t\tInstead, the bear walks to your side and sticks its snout under your arm. Walking against your torso, it presents a soft body pillow for you to fall into when you succumb to weakness. You land on the huge ball of fur, which itself lands on the ground. You roll onto your back and stare into the sky above. Your body should feel much colder, but the warm blanket of the bear provides unexpected comfort.\n\t\t\n\t\t\t\t\t\tWhen the weight of your eyelids becomes too much, you close your eyes and focus on the breathing of yourself and the animal below you. Your breathing so shallow, you take three for every one of the bear. It is the least alone you've felt in this hell. To think, your best friend at your time of death is neither human, nor dog, but a bear.\n\n\t\t\t\t\t\tWith your last breath, you thank your new and last best friend.\n\t\t\t\t\t\t*achieve bear\n\t\t\t\t\t\t*page_break The End\n\t\t\t\t\t\t*goto_scene ending bad_ending\n\n\t\t\t\t\t#James's gun\n\t\t\t\t\t\tYou take the gun in your hand and determine whether there is a bullet in the chamber. You'd hate to hope for death only to find out the hard way that you are stuck suffering. Fortunately (or maybe unfortunately), you find three bullets left. But you'll only need one.\n\t\t\t\t\t\t\n\t\t\t\t\t\tLike a horse with a broken leg. You just need to put yourself out of your misery.\t\t\t\t\t\t\n\n\t\t\t\t\t\tYou stick the barrel of the gun under your chin, only because that's what you see in the movies. If you are to die, you prefer it be by your own hand than some random asshole who couldn't handle rejection.\n\n\t\t\t\t\t\t\"Asshole,\" you say as if James can hear you.\n\t\t\t\t\t\t*page_break The End\n\t\t\t\t\t\t*goto_scene ending bad_ending\n\n\t\t\t#Wait it out\n\t\t\t\tOnce darkness falls on the zoo at night, you feel more confident in your ability to navigate in the darkness without being detected. You just can't make too much noise, and have to stay off the designated paths so you don't run right into him. \n\n\t\t\t\tIt's getting late, so you think there is a chance James has found a place to sleep for the night. If this is the case, he'd be vulnerable and you could get the jump on him. But it is a large zoo. Hopefully you find his hiding place before sunrise.\n\n\t\t\t\tOn your search, you make time to grab your shotgun. You didn't have time before, but it would definitely be best to grab it in case you can find an advantageous position.\t\t\t\t\n\n\t\t\t\tAfter an estimated hour and a half, you feel as if you've searched all the best sleeping quarters in the zoo. But then again, you've been living at the zoo and have had time to seek out the best spots. James may not have had the time or energy to do this. He probably just wanted a flat surface off the ground that was minimally protected.\n\n\t\t\t\tThat's when it hits you. He must be in the cafeteria. Especially considering the possibility of finding food, this must be his resting place.\n\n\t\t\t\tHis final resting place, if you have anything to say about it.\n\n\t\t\t\t*page_break\n\n\t\t\t\tThrough the floor-to-ceiling windows of the cafeteria, you can see that James is just as you suspected. As tired as you are, you understand how the cafeteria tables could appear as beds. James is sleeping on one of those table/beds now, possibly assuming you left the zoo. But instead he is in for a rude awakening.\n\n\t\t\t\tThe entryway to the cafeteria is an open tunnel, so you don't have to worry about waking James with any creaking doors. You just have to sneak through the passageways and past the food counters without detection.\n\n\t\t\t\tOnce in the cafeteria, you find James has placed his pistol on another table along with another bag of supplies he came with. You're tempted to search through it, or to see how many bullets are in the pistol, but you think better of it considering the most immediate threat. Though he's not much of a threat in the moment, you can't expect him to stay asleep forever.\n\n\t\t\t\tAs you approach the bed/table, you are reminded of squirrels. James is sleeping so heavily he might as well be hibernating. This provides you the advantage of pointing the gun directly at the side of his head before he stirs awake.\n\n\t\t\t\t*page_break Shoot him\n\n\t\t\t\tThe sound of the gun going off causes a ringing in your ears, not to mention the echo of the sound ricocheting throughout the cafeteria. You even hear some of the animals stirring from the sudden noise in the night. When you are able to reorient yourself to the circumstances, you see that James has perished. Your assassination attempt was a success.\n\n\t\t\t\tWith the threat neutralized, you seek out the spoils of war. In the dim light of the moon, you can see three bullets in the clip and one in the chamber of the pistol. This could be a slight upgrade compared to the birdshot you have for your shotgun. The bag of supplies is rather disappointing, but what else should you expect from someone who was trying to take over the zoo? You find a chef's knife that may be too dull to use for its original purpose. In addition, there are a couple snacks you can choose from as your celebratory meal for the night.\n\n\t\t\t\t*fake_choice\n\n\t\t\t\t\t#Chocolate and peanut granola bar\n\t\t\t\t\t\tYour first dessert you've had in this new version of the world. The last time you had sugar was in your birthday cake. The granola bar is the perfect combination of crunchy and chewy, and your body relaxes as you moan in enjoyment. The idea of chocolate releasing endorphins in your body and making you feel like you're in love rings true in this moment. You eat, chew, and swallow slowly, savoring every moment of this treasured treat.\n\t\t\t\t\t#Dried strawberries and bananas\n\t\t\t\t\t\tConsidering how you might be at risk of scurvy, this is a great decision. You let the saliva in your mouth mix with the chewed bits of fruit so it feels like you are in your favorite smoothie spot. The juice is so refreshing you feel like you should enjoy the rest in the aquarium, closing your eyes and pretending you're at the beach. Instead, you just close your eyes in place and picture it as best you can.\n\t\t\t\t\t#Teriyaki-flavored beef jerky\n\t\t\t\t\t\tIt just makes sense to eat meat after a kill. It's what happens in the animal kingdom. But you know better than to eat human flesh, so beef will do. The seasoning of the jerky packs a punch, considering you don't have much at your disposal for flavoring your food right now. You even decidde to keep some of the leftover seasoning at the bottom of the bag for future use.\n\t\t\t\t\n\t\t\t\tWith your stomach satiated and your heart rate decelerated, you finally return to your own sleeping quarters. You won't get much sleep tonight, but it would be worse to try and stay up through tomorrow.\n\t\t\t\t*finish\n\n\n\t# Grab your gun and fight James to keep him from coming inside the zoo.\n\t\tYou make a quick detour to grab your shotgun and some bird shot. In a rush, you make your way to the entrance. \"Stop right there!\" you yell as James is about twenty yards away. You point your gun at him to show how serious you are.\n\n\t\tJames notices you and regards your gun, but doesn't show any intention of backing down. \"You gonna let me in this time, or do I need to force my way in?\"\n \n\t\tYour gun still trained on him, you communicate your position. \"You need to find somewhere else. You're not welcome here.\"\n\t\n\t\t\"I don't care if I'm welcomed or not!\" James shouted, stepping forward.\n\n\t\t\"DO NOT MOVE!\" you scream. \"Take one more step and I shoot.\"\n\n\t\t\"Then I won't take another step,\" James says. \"I'll just do this.\"\n\n\t\tHe raises his gun.\n\n\t\t*choice\n\t\t\t#Shoot him\n\t\t\t\tThe metal springs from your shotgun and hurtles toward James. As it makes contact, James is knocked back onto his back without a sound. On the ground, he has no sign of motion.\n\n\t\t\t\tYou take the key and open the gate to investigate him. You don't get too close before noticing how many tears are in his shirt and body. The sight is disturbing. You've never killed anyone before. It is distinct from the many animal bodies you have seen, especially because of how directly responsible you are. The picture, tattooed in your mind, will make it difficult to sleep tonight.\n\n\t\t\t\tThe body you don't plan to move, but you do bring the pistol and the bag of supplies slung over his shoulder back into the zoo with you. It would be a waste to leave the pack with James, and it is not like he would end up using any of the supplies inside. What little you find is a few backs of non-perishable snacks you can save for a rainy day and a dull chef's knife. A decent back up plan as far as weapons go, considering the pistol James brought only has a total of four bullets.\n\n\t\t\t\tBut you can't complain. It's four bullets and a gun more than you started the day with.\tPlus, the bullets are stronger than the birdshot in your shotgun.\t\t\t\n\n\t\t\t\t*finish\n\n\t\t\t#Pause\n\t\t\t\tJames fires at you and you feel a painful thud in your chest. You fall onto your back, staring up at the sky and the top of the gate. The gate which James climbs over into the space you've called home.\n\n\t\t\t\tHe hardly looks at you, perhaps assuming you're dead or unable to put up a fight. Instead, he takes in the sights of the inside of the gate. Putting his arms out in the air as if presenting the entire zoo to himself, he says, \"I am the new king of the jungle.\"\n\n\t\t\t\tHis taunting angers you enough to make one final move. The shotgun still in your hand, you tilt it up and aim it at his head. Pulling the trigger, you feel the gun jump out of your weakened grip. More importantly, you witness his head jolt back and his body collapse to the ground.\n\t\t\t\tFrom this distance, there is no way he survived.\n\n\t\t\t\tYou think about the mammalian urge to kill to protects your territory. You fall into this category, even though the zoo will not be something you will be able to claim.\n\n\t\t\t\tAll you've claimed now is James's life. Just as he did yours.\n\t\t\t\t*page_break The End\n\t\t\t\t*goto_scene ending bad_ending", "lonely": "*comment Lonely. I think this is the start of the player being able to work with a specific animal species or something. But need to know how it would actually work out in the end before I implement it.\n\nYou are not alone, but you feel lonely.\n\nOr is it better to consider yourself to be alone, considering there are no humans with you. All these animals, but none of them speak English. The two exceptions being two birds: the Amazon parrot and eclectus. But they have said little more than the redundant plea for a cracker. If they asked for the damn thing one more time, you might kill them before they have a chance to starve from not receiving one.\n\nDue to the lack of company and the monotony of your tasks to upkeep the zoo, the days have been going by much slower. You know this because you have been keeping track of the days using a calendar from the gift shop. You decided to pick a calendar off the rack based on an animal that wasn't already in this particular zoo. Otherwise, there would be no need to see the calendar when you have the real thing to look at. Once you narrowed down to these options, you still had a few to choose from.\n\n*fake_choice\n\t#Butterflies\n\t\tThis calendar had the most vibrant colors compared to the others. A necessary addition to your home, considering the dire circumstances in which you found yourself. It feels like you have been stuck on this zoomed-in image of a monarch butterfly for over a decade. You can't wait until the day you can switch over to the image of a cluster of a couple dozen American snouts.\t\n\t#Snow leopard\t\n\t\tIf only you had been as elusive as this animal, you may have been able to avoid being discovered by James. Now you waste the days away staring at a snow leopard high in the mountains. It feels like it will be forever before you can switch to the next month and see the baby leopard playing in the snow.\n\t#Red panda\n\t\tArguably cuter (and more endangered) than the [i]giant[/i] panda everybody cared to preserve so much, this is a face you are happy to wake up to. Although they are technically more related to foxes and weasels than giant pandas, you ignore this truth to enjoy the cuteness. But you are excited to switch from the image of an adult red panda in a tree to a parent with its cub, if next month ever comes.\n\n*page_break\n\nYou try to keep yourself busy so you can avoid being one of those people who has full conversations with their pets. But the only entertainment is the books from the gift shop. And some of those animal books are boring as shit. But perhaps they can be more practical. Quite a few of the animals in the zoo have the potential to be tamed, you just have to pick one to focus on.\n\nThis is a pivotal decision, because you are still in the process of deciding which animals you are able to feed. Chances are, you will have to choose one group and leave the other ones to die. Moreover, you may even need to use whatever animals you sacrifice as food for the ones you keep alive.\n\n*fake_choice\n\n\t#Birds of Prey\n\t\t*set Animal \"Bird\"\n\t\t*achieve hawk\n\t\tWho would have thunk there was an entire sport based on hunting with the help of birds of prey? Falconry books are more avaialble than the other animals, which suggests the ease with which they can be trained. \n\n\t\tThere are four birds in total at your disposal. One kestrel, two Harris hawks, and an owl. By day two, you already feel like the Harris hawks have grown comfortable with you. You start bringing them near the entrance of the zoo, which provides a nice open area where you can train them. By day four, they are consistently landing on the perch you have set up, and are also returning to the makeshift gauntlet you place over your hand. It takes just over a week before you're about to let them off their line and allow them to fly free. There is always a chance they'll get lost, but for now they may be promising aids in your hunting efforts.\n\n\t#Zebras\n\t\t*set Animal \"Zebra\"\n\t\t*achieve zebra\n\t\tIt's a good thing you decided to read about them before trying! Sure, zebras are close relatives of the horse. But there is a reason horses are more likely to be domesticated. It turns out zebras (as cute as they are) are not the nicest animals. They are far more likely to attack humans.\n\n\t\tKnowing what you know, you are far more cautious trying to build a relationship with this zebra. It helps that this animal was near starvation when you made the decision to feed it.\n\n\t\tHim. It's definitely a him.\n\n\t\tAnd it is probably going to be a while before he let's you ride him...if that's even possible.\n\t\t\n\t#Wolves\n\t\t*set Animal \"Wolf\"\n\t\t*achieve wolf\n\t\tFunny how the phrases \"lone wolf\" and \"wolfpack\" both exist. No matter, because you know which is the one you are going with. Likely bred in captivity, you're hoping the two wolves in the exhibit are closer to dogs than anything. Not that you want them to roll over so you can rub their belly, but they may not attack you when you have your back turned. \n\nYou're certainly not ready to say you have a \"pet\" yet, but you don't have a human companion so this is a consolation prize. Eventually, you'd like to have assistance when you go hunting. Until you can find a way deeper into the security building, your best weapon is a shotgun with birdshot. No chance against big game, but small game could be enough to feed you for a few days at a time. And even then, it would be easier if you had a partner or two.\n\n*finish\n", "mfk": "*comment Marry, Fuck, Kill, but with animals. Also, different options...no bestiality.\n\nYour head is still reeling from James's attack. You were defending your territory, as any normal animal or human would do. But there is still something about it that makes you sick to your stomach. Plenty of animals do just what you did on a regular basis. Do they feel guilt? Do they have nightmares?\n\nWith the lack of coping mechanisms following the altercation with James, you have been a bit negligent of the daily duties around the zoo. Having bitten off more than you can chew, the drawl with which you have been keeping up the place is showing in the health of many animals.\n\nHolding so many of these helpless animals within the confines of the zoo is revealing itself to be more and more of a disservice. Or worse, you may be torturing these animals. How many of them are lonely? Or depressed? Or starving?\n\nConclusion: not all the animals will survive in the zoo for much longer. In order to maintain any level of sustainability, you'll have to make some extremely difficult choices. \n\n*page_break\n\nThe first decision is actually the easier of the two you have to make. Though it will be impossible to ensure all the animals survive in the zoo, certain animals should be able to survive on their own in the wild. It is common practice to release animals once they have reached maturity. \nThere is no need to keep animals here if they are a burden to take care of and you have no patrons to show them off to.\n\nSo the time has come to decide which species will no longer be a tenant in your zoo. It should be for the greater good, but you may never know for sure. All you can do is make a decision and hope it works out.\n\n*fake_choice\n\t\n\t#Koalas\n\t\tTheir cuteness is no longer a strong enough reason to keep the koalas in the zoo. The eucalyptus they normally eat is dangerously low in here, so it is in their best interest to leave them somewhere they might find more.\n\n\t\tIt is rare you leave the zoo, which puts you in an even more vulnerable position than staying, but it is possible you came across a few eucalyptus trees a couple miles from home. Whether or not they are actual eucalyptus trees, or whether they are of the species koalas actually eat, but none of that really matters.\n\t\tRemaining in the zoo is as much of a death sentence as anything else. This is probably their best bet. This is [i] your[/i] best bet. Keeping the koalas in the zoo will ultimately lead to their death as well as your own from trying to take care of them.\n\n\t\tAs you lift each of the two koalas into their new homes, there is some level of understanding between all of you. They can tell that this is the last time you're taking them out of the zoo, despite being the first time. A moment of pause from all of you sets the tone for the fact that they will not be returning.\n\n\t\tBoth koalas turn and watch you leave. For how small and vulnerable they usually appear, this time they do not seem so scared. They may even be happy you have made the decision to free them and leave them to their own devices. After all, this is their \"natural\" habitat. They may have a better chance of survival than you do.\n\n\t\tWhen you return to the zoo, you have an idea to bring the platypuses to the flamingo pond. As long as these animals can play nice, they'll be able to share the shrimp in the water and have a good chance of all surviving.\n\n\t#Platypuses\n\t\tTechnically, would releasing the three platypuses be like releasing nine different animals? If the world ever returns to normal, it is unlikely anybody will believe these duck-otter-beaver hybrids actually existed without seeing one for themselves. If the three you've been maintaining can make it on their own, it will be a miracle on top of the miracle they are a real animal.\n\n\t\tIt is a long walk to the slow-moving river where you will leave the animals. Not just in distance, but because you spend so much of the walk wondering if this is the right decision. These are not birds, but it is as if they are leaving the nest. More like, they are being kicked out of the nest. \n\n\t\tWhat other choice do you have? The chimera animals look exhausted all the time from hunger.\n\n\t\tYou approach the river with the three animals in tow. As you drop each of them into the water, they paddle and swim off as fast as you've ever seen them go. Maybe they suspect they'll find food quickly here, so you do not blame them for such the brief salutations. \n\n\t#Bats\n\t\tThese are the ones you are least likely to notice are gone. They are active while you are asleep, and even then they are in a rather dark building. Not anymore, though, because you set them free at dusk this evening.\n\n\t\tAnother important aspect of the decision is their diet. With how many fruits they need to consume, you need to get rid of them or else risk scurvy.\n\n\t\tFour bats in total are each left fluttering in their odd flight pattern to leave the confines of the zoo. Of the three animals you could have chosen to release, these are the ones who have the most means to return if they choose. But that may actually be a welcome decision, especially if by then you are more able to provide for them.\n\n\t\tUntil then, you just have to focus on the animals under your care right now.\n\n*page_break\n\nNow that the easy part is done, it is time to move on to the more difficult decision. While there are some animals who can survive outside, you need to make another sacrifice so that the animals inside the zoo can have enough food. This is a decision you hope to only have to do this one time while you recover and find a routine after James's attack. But even though you'll do it once, it won't be easy.\n\nThere are plenty of carnivores in this zoo, and there is a chance they may come in handy if there is another time you need to protect your territory. Therefore, you must choose an animal to sacrifice. \n\nYou will be using these animals to feed the carnivores, and perhaps yourself.\n\n*fake_choice\n\t\t#Binturong\n\t\t\tOf course you would choose this animal, it smells like popcorn! But you're unsure whether this is a real thing or if your hunger has made you delusional. Either way, you hope the big cats you plan to feed it to sense a similar scent. After all, they'll be the ones dining on the bearcat.\n\n\t\t\tKilling James may have desensitized you to the sight of death. Despite this, the devilish eyes of the binturong pierce you as if you have betrayed them with your decision. The look before their death will haunt you just as much as James.\n\n\t\t#Frogs\n\t\t\tThe smallest of the animals to choose from, which hopefully meant they'd be the smallest sacrifice. Besides, frogs are all over the place. Probably not a concern whether they'll go extinct. Humans are more at risk than frogs. \n\n\t\t\tYou take some of the meat for yourself on top of serving some to the big cats. The taste of the cooked meat is somewhere between fish and chicken. But better than both! Which may be more a function of your hunger than it actually being better. It certainly is fresh, though.\n\n\t\t\tAs you enjoy the flavor of the juicy flesh, you wonder whether frogs would be considered a delicacy in this world. A zoo-themed restaurant would probably make a killing.\n\n\t\t\t\"Cater to Zoo.\"\n\n\t\t#Llamas\n\t\t\tThis decision is about more than just a meal for you and the big cats around the zoo. You plan to use every part of the llama. The winter will be here before you know it, so you know it may be beneficial to use the llama fur to make a blanket or a fur coat. Not something you would normally wear every day. But these are not everyday circumstances.\n\n\t\t\tAfter using the cafeteria as an impromptu slaughterhouse, you are sure to spread the food around in even rations. Hopefully you'll find a new groove after all the surviving carnivores are well-fed.\n\n*page_break\n\nWith the hard decisions out of the way, you are now hoping to move forward more efficiently with your food chain. The apex predators are content, as are you. This is where you'd like to stay.\n\nYour only hope is that when your head stops spinning and you actually get some sleep after your curfuffle with James, you still feel like you have made the right decisions.\n\n*finish_advertisement", "mfk_james": "Two weeks after the flamingo incident that led to your discussion in the Arctic, James does appear to be making progress as a cohabitant. The bar was set rather low, as he is the last human you know. And it was an improvement compared to past behavior, because he has since managed not to destroy another food source.\nStill, something resembling a homeostasis was found within your living arrangement.\n\nUnfortunately, the homeostasis required a slow and miserable loss of food sources. Trying to feed all the surviving animals in the zoo may lead to your own survival becoming impossible.\n\nThis time, it may not actually have anything to do with the way James is rationing the food. This time around, it just seemed to be too high of demand and not enough supply.\n\n\"I don't know what we're doing wrong,\" James says to you as he recognizes the possible collapse of this fragile ecosystem.\n\n\"I don't think it is something wrong with what we're doing,\" you say. \"It's just the situation we're in. Too many mouths to feed.\"\n\n\"Are you suggesting we get rid of a few mouths?\" James asks, clearly fearful of the implications.\n\n\"It's not something I want, but we're not gonna survive if we don't make hard decisions. I don't think we need to just kill off a ton of animals without giving it any thought. Smaller animals can be used to feed some larger ones. Better yet, there may even be a few animals that can survive in the wild if we release them.\"\n\n\"I like the thought of that,\" James says, \"can we start there?\"\n\n\"We'll still have to make some sacrifices, but sure.\"\n\n\"Which animals do you think have the best chance to survive in the wild?\" James asks.\n\nYou count on your fingers as you picture the animals in your mind. \"There's the desert tortoise, the llama...and the anteater I guess. They all look like they're struggling, so maybe letting them go will give them a better chance at survival.\"\n\n\"I had a pet turtle growing up, so I definitely have a soft spot for the tortoise. I want to keep him around if we can. My vote is for the anteater. It gives me the heebiejeebies.\"\n\nIn the end, it is your decision which animals will be released.\n\n*fake_choice\n\n\t#Tortoise\n\t\t*set James_Friendship %-10\n\t\t\"We need to release the tortoise,\" you say after adamant discussion with yourself.\n\n\t\tJames's expression saddens. You might as well have said you're kicking [i]him[/i] out.\n\n\t\t\"But,\" he starts, \"but I want to keep him.\"\n\n\t\tYou feel like you're scolding a child, but can't change your tone to be anything else. \"It's not about what either of us wants, James. It is about what is best for the entire group. Now, he's pretty heavy, are you going to help me carry him or not? \n\n\t\tJames continues with his pouting, but nods his head.\n\n\t\t*page_break\n\n\t\tThe whole time carrying the tortoise, James sniffles and tears slowly run down his cheek. He asks for breaks often. You're unsure if it is because the tortoise is so heavy, or if he just can't multitask and carry while crying.\n\n\t\tEventually, you leave the tortoise in a dry grassy area where you and James both agree he is likely to survive on his own. You offer a little reassurance to James, telling him he can visit the tortoise whenever he needs as long as he does his chores. Once again, treating him like a child.\n\n\t\tAnd like a child, you expect he'll forget all about it soon enough.\n\n\t#Llamas\n\t\t\"It is best we get rid of the llamas,\" you say. \"There are a lot of them, so if they all go then they won't feel as alone. Plus, I don't think it will be as difficult to take them somewhere else.\"\n\n\t\tJames nods, not seeming to care one way or another about the decision.\n\n\t\tFor an afternoon walk outside in the afternoon, you have three llamas on leashes like you have a side gig as a dog walker. James is controlling one of them, and you feel as if the llama could run off at any moment. Not that it would matter too much if they did.\n\n\t\tYou find an open field where you imagine the llama family could graze. Petting their soft fur one last time, you unleash them and walk away. Before they are too far away to be seen, you notice they have already begun grazing the area for feed. This sight makes you feel as if you have made the right decision which which animals to release.\n\t\n\t#Anteater\n\t\t*set James_Friendship %+10\n\t\t\"I have to agree with you about the anteater,\" you say. \"Not that I get creeped out, but the anteater is probably the best choice to release. After all, it eats ants. It can find food pretty much anywhere.\"\n\n\t\t\"Cool,\" James says. \"You don't need any help wrangling it, do you?\"\n\n\t\tYou roll your eyes, even though it's not a huge deal. \"I'll take care of it,\" you say with a hint of a smile.\n\n\t\t\"Phew!\" James says.\n\n\t\t*page_break\n\n\t\tThe anteater does not display any aggressive behavior when you approach, but the leash you put on does look a little uncomfortable. Fortunately, it won't be wearing the leash for long.\n\n\t\tA short walk away from the zoo is the closest thing to a real forest you can find. This is where you unleash the anteater and allow it to roam freely. In little time, it seems to be happy with its new home. A liveliness you hadn't seen in a while enters the animal. From this, you feel as though you have made the right choice.\n\n\t\tJames is also happy with the decision, which is a plus.\n\n*page_break\n\nThe day after deciding which animal(s) to release, you come to James with the more difficult decision. This one is a more immediate life-and-death decision. Not necessarily for you, but for a particular species at the zoo.\n\n\"I guess I knew this day was coming,\" James admits. \"What are the options?\"\n\n\"The platypuses, a bull elk, and the parrots.\"\n\n\"Well the parrots are annoying as hell,\" James says without hesitation. \"They can definitely go. They won't shut up otherwise, and it's giving me a raging headache. But as long as you don't choose a bull elk I think it is fine.\"\n\nThis time he seems to be more aware of how the final decision rests on your head and not his.\n\n*fake_choice\n\n\t#Platypuses\n\t\t\"I have always wondered whether platypus tastes like duck,\" James says, practically licking his lips.\n\n\t\t\"I guess I've wondered that myself,\" you admit. \"But we can't get too ahead of ourselves. These are small animals, and we may have to feed them to the big cats. If there are any leftovers, we'll split them and solve the mystery.\"\n\n\t\t\"Sounds like a deal.\"\n\n\t\t*page_break\n\n\t\tAs far as you can tell...platypus tastes like chicken.\n\n\t#Bull Elk\n\t\t*set James_Friendship %-10\n\t\t\"I know you said you wanted to keep the bull elks, but I think that's what need to sacrifice.\"\n\n\t\tJames's chest deflates as he hears your decision.\n\n\t\t\"Sacrificing one will be the best bet,\" you say, trying to save him some pain. \"They are the biggest of the animals, so one should be able to feed us and the big cats without killing off an entire species.\"\n\n\t\t\"Are there no other platypuses in the world?\" James asks.\n\n\t\t\"I have no idea, but if we kill them then there won't be any in this zoo. And I don't like the thought of that.\"\n\n\t\tJames scoffs in disgust. He can no longer look at you. \"Well I hope you've got it under control by yourself. I don't agree with this, so you'll have to do it on your own.\"\n\n\t\t\"You're sure?\"\n\n\t\t\"Yeah,\" James says as he walks away.\n\n\t\t*page_break\n\n\t\tSlaughtering the bull elk is more work than you expected, but you are successful. You didn't recieve any help from James in the matter, but you got the job done.\n\n\t\tAnd as far as James knows, you gave all the meat to the big cats without saving any for yourself.\n\n\t#Parrots\n\t\t*set James_Friendship %+10\n\t\t\"You make a good point with the parrots,\" you say. \"I think those will have to be the first animals we sacrifice.\"\n\n\t\t\"Yes!\" James cheers with a smile wider than a quokka's. He seems relieved to hear you've made this decision. \"Don't even worry about doing it, I'll take care of them. Who do we get to...I mean need to...feed them to?\"\n\n\t\tYou smother a laugh, considering the gravity of the situation for the parrots. \"Take one to each of the big cat exhibits.\"\n\n\t\t\"You got it,\" he says with a wink and a point. Then he skips away toward the tropical bird exhibit. \n\t\t\n\n*page_break\n\nWith the extra buffer your executive decisions gave you, you feel like you have reached a more sustainable set up. At the same time, though, you know you have to be ready to make the same decision again if needed. \n\nThe big cats in particular will be happy with you if you are able to be so ruthless. \n\nJames, on the other hand, will still be picky. But he needs to be ready to fall in line. If he wants to be the leader, it won't be in your zoo.\n\n*finish_advertisement", "settle_in": "A human can survive twenty-one days without food. A snake can survive months, a crocodile a year. \n\nYou went eight days without food before coming upon the local zoo and realizing it might be the best place to survive the apocalypse. \nForget the tropes. Malls, prisons, and what not. You've seen so many of those movies you might as well have a PhD in apocalypse survival (which is probably the only PhD that matters anymore). You expect somewhere like a mall will be the most popular destination for the exact reason that it is in the media. \nYou have no interest in the apocalyptic clichés. Anyone who does is probably gonna die from drinking unfiltered water anyway.\n\nPlus, the zoo is a perfectly logical home. Back up generators were already installed in case of a blackout, so there is some modicum of electricity in case you absolutely need it. But most of the electricity needs to be conserved, so you spend most of the day in the natural light. On top of the comfort of indoor lighting and shelter for the night, you do have some company. Many of the animals died before your immigration into the zoo, but there are enough for you to not be stuck in silence. Something wildly important for your own sanity.\n\nAfter exploring the map of the premises, you rea
