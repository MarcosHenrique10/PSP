lize you have plenty of potential humble abodes at your disposal. Narrowing down to the best option takes some time. Eventually you feel like you have picked out the best possible exhibit for your post-apocalyptic habitat.\n\n*fake_choice\n\t#Welcome to the Jungle\n\t\t*set Home \"Welcome to the Jungle\"\n\t\tYou chose this for reasons beyond the clever song reference in the name. From the lions, to the tigers, to the...hippos, the jungle is home to the most iconic of animals. Many of the animal exhibits are outside, but there is a building where you can enjoy the ideal tropical climate which remains hospitable with the changing seasons. Great to be in a comfortable environment, which may not be possible when the weather gets cold. The building has skylights, which allows you to admire how the sun shines down through openings in the canopy of trees. For all these reasons, you know this should be your home.\n\n\t#Out of Africa\n\t\t*set Home \"Out of Africa\"\n\t\tThe largest continent on the planet is also the largest exhibit in the zoo, primarily because of the space needed for the elephants. From the courageous lion, to the unforgetting elephant, this area of the zoo also has some of the largest animals. Fortunately, you don't have to survive the desest landscape, for there is a building where you can escape the drought. With all the fond childhood memories of watching the Discovery Channel, you're excited to have a safari of the Sahara in your backyard. For all these reasons, you know this should be your home.\n\t\t\n\t#Rainforest\n\t\t*set Home \"Rainforest\"\n\t\tThough it doesn't have a catchy title like the others, it is the most appealing. Roaming the outdoor exhibits harkens back to the picturesque hikes available at these locations throughout the world. The sounds you hear as you walk through elicit pleasant memories of background noise machines that play music of rain and birds. As you enter the door to the indoor exhibits, the humidity that makes you forget about your dire need to quench your thirst. For all these reasons, you know this should be your home. \n\n*page_break Settle in\n\nAfter three weeks of settling into your new home, well-fed and well-rested for the first time since the collapse of society, you feel as if you'd be fine living here alone indefinitely.\nJust when you think you've found a homeostasis, you hear a voice in your head.\n\n\"Hello?\" you hear. \"Hello, is anybody in there?\"\n\nSuch a weird thing to hear from a voice in your head. After some time, though, the voice continues. Having gone so long without seeing another human, logic would suggest this is not a real voice. However, you can tell the voice is coming from a specific direction. You make your way toward the entrance of the zoo, where a gate rising somewhere between 12 and 15 feet creates the barrier between your home and the rest of the world. \n\nAt the entrance stands a random patron who is waiting as if they would like to buy a ticket for entry to the zoo. You did not see him coming because you hadn't felt the need for the binoculars you found on day three. \nBut now you understand the need for the sentinel equipment. Even when you are the only living person in the world, you still need a lookout.\n\nThe man appears as if he hasn't eaten in quite some time either, but you are unsure whether that is just how he is built. Beyond eating, he hasn't shaved or showered according to the look and the smell of him. His brown hair unkempt, and his clothing probably the same he's been wearing for days, you feel more fortunate to have found a place with certain amenities that are nearly impossible to find now.\n\n\"Hello,\" the intruder says when he finally discovers your presence. \"I'm James. What's your name?\"\n\nYou wonder whether it would be a good idea to give him your real name. It's not like you're a spy or anything. But the world is completely different, so you could be completely different. Now is the chance to create a new identity for yourself if you wanted to. And there is little to no chance you'll be caught in a lie.\n\n\"My name is...\"\n\n*input_text Player\n\n\"Well, it's nice to meet you, ${Player}. I didn't expect anyone to be here. Figured most people would go to the nearest shopping mall or something. Is it as livable as I thought it would be? I don't know how long you've been staying here, or if any of the animals are still alive. Could I join you and your settlement? I promise to pull my weight. I just need somewhere protected to rest my head at night.\"\n\nClearly you and James are of like mind for coming here, but does that mean he can be trusted. An ally could be of great benefit, but there is no guarantee he is such an ally.\n\n*choice\n\t#Let James in\n\t\t*set James_In true\n\t\t\"Thank you!\" he said as you open the gate for him. \"I promise you won't regret this.\"\n\t\t\n\t\tJames spends a few moments to collect his bearings upon entry. It does not take him long to realize how few people were in this supposed settlement.\n\n\t\t\"You're here alone, aren't you?\"\n\t\t\n\t\t\"Yes,\" you admit. \n\n\t\t\"Shit,\" he says. \"I haven't seen anyone in weeks, but I had hopes this was the last safe haven people were coming to. Guess the world is in a worse place than we thought.\"\n\n\t\t\"Yeah,\" you agree. \n\n\t\t\"Any chance you can give me a tour of the place?\"\n\n\t\t*fake_choice\n\t\t\t#Do not give a tour\n\t\t\t\t\"I'm sorry, but I can't give you a tour,\" you say. \"I've got a lot I need to do every day, I don't have much time. Feel free to explore on your own and let me know if you have any questions later.\"\n\n\t\t\t\t\"Yeah,\" James says, but he is not appearing too excited. \"Okay sure, I'll do that.\"\n\n\t\t\t\tYou return to your daily activities, and do not run into James again until the evening.\n\n\t\t\t\t\"Hey ${Player}, I think I'm done getting the lay of the land. But I do have a question for you.\"\n\n\t\t\t\t\"Sure, what's up?\"\n\n\t\t\t#Give a tour\n\t\t\t\t*set James_Friendship %+25\n\t\t\t\t\"Sure,\" you say, \"I'll give you a tour.\"\n\n\t\t\t\tJames does a weird fist pump, but you can understand the lack of social charisma. You are likely to do some socially awkward stuff too, considering your only audience has been non-human beings.\n\n\t\t\t\tYou take an hour-long break to walk in tandem through the facility. Because he offered to pull his weight, you don't hesitate to talk about the many tasks you have been performing every day. A new edition to this set of tasks is to sit lookout, which is more feasible when there is more than one person. Beyond this, you show him the vegetable garden, explain the best ways to get rid of waste (it turns out the restrooms don't have the best plumbing), and talk through how to feed many of the animals without starving yourselves.\n\n\t\t\t\tAt the end, James first thanks you for your hospitality once more. Then he proposes a question.\n\t\t\n\t\t\"I don't want to be too intrusive, but I'm not sure I am comfortable staying somewhere by myself. Any chance I can stay in the same exhibit as you?\"\n\t\t\n\t\tThe request is logical, considering you are the only two humans in a city full of animals. But do you trust James enough to let him sleep so close to your own bed?\n\t\t\n\t\t*choice\n\t\t\t#\"Yes, you can stay in my exhibit with me.\"\n\t\t\t\t*set James_Friendship %+25\n\t\t\t\t*set Roommates true\n\t\t\t\t\"Phew!\" James says. \"Great, because I thought you were going to make me stay somewhere else, like the aquarium. I can't stand the idea of sleeping with the sharks. Although, snakes are way worse. I'm, like, deathly afraid of snakes. Anyways, thanks ${Player}.\"\n\t\t\t\t*finish\n\t\t\t#\"No, find your own exhibit.\"\n\t\t\t\t*set James_Friendship %-25\n\t\t\t\t\"Sure, okay I understand,\" James says, failing to hide his disappointment. \"As long as I don't have to stay in the aquarium. I can't stand the idea of sleeping with the sharks. Although, snakes are way worse. I'm, like, deathly afraid of snakes. Anyways, ${Player}, thanks for letting me in at least.\"\n\t\t\t\t*finish\n\t\t\t\n\n\t\t\n\t#Refuse to let James in\n\t\t*set James_In \"false\"\n\t\t*set James_Friendship 0\n\t\t\"No,\" you say, trying to show some sympathy even though you have the ability to change the circumstances that make you sad. \"I don't think I can afford to let anyone else inside at this time. You'll have to find somewhere else.\"\n\n\t\t\"I...not we?\" James says.\n\n\t\t\"I, we, it's the same thing,\" you say, hoping you didn't just let it slip that you are living alone here.\n\t\t\n\t\t\"Oh,\" James says, his demeanor immediately less friendly. \"I see how it is, ${Player}. You're not taking anyone else in, huh? Fine. You're gonna regret that.\"\n\t\t\n\t\tHe walks away without another word, but you fear that won't be the last you see of this James character. \n\t\t*page_break Next Chapter\n\t\t*goto_scene Lonely", "choicescript_description": "If you're surrounded by animals, are you truly alone?\n\nPlay as a survivor of the apocalypse in Zoo-pocalypse, my first interactive fiction story. In this game, you make your post-apocalyptic home in a unique venue: a local zoo. \n\nThis 50,000 word interactive fiction novella is written by Tyler S. Harris. The story is broken up into 3-4 chapters depending on how it is played. It is completely text-based, with no sound effects or graphics. Vastly different endings can occur based on the decisions you make. \n\n• Play as any gender! There are no references to your gender, so play as yourself or anyone else. You do get to pick your name.\n• Explore the many exhibits at the zoo, and even the gift shop. \n• The end of the story depends on the choices you make, even early decisions can lead to completely different endings.\n• Different endings lead to the discovery of animals (achievements). Can you find all of them?\n\nWill you reign over this animal kingdom, or will you find yourself at the bottom of the food chain?\n\n[b]Content Warning:[/b] Dark themes throughout, even for a post-apocalypse story. Heavy violence: humans and animals may die, sometimes violently.", "choicescript_stats": "Below shows your current stats.\n\n\n*stat_chart\n\ttext Player Name\n\ttext Home Your Home Exhibit\n\n\n*if (James_In = \"true\")\n\tJames:\n\t*stat_chart\n\t\topposed_pair James_Friendship \n\t\t\tFriends\n\t\t\tEnemies\n\t\ttext Roommates\n\n*if (James_In = \"false\")\n\t*stat_chart\n\t\ttext Animal Animal Companion\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Turn off all ads and delays.\n  \n  *purchase_discount adfree 2023-06-08 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to turn off all ads and delays.\n", "ending": "*page_break End\nThank you for playing Zoo-pocalypse, my first attempt at interactive fiction! There are many endings, and whether you even decide to let James in can set you on a completely different path! Please feel free to go back and play again to find all the unique endings.\n\nThis is actually based on a short story I wrote years ago called \"Autophagy.\" It was the first episode of my podcast, Science Fiction Monologues. To listen to the story (which includes a possible ending for this game), follow the link below:\n\n*link https://open.spotify.com/episode/5pj7n1egv0QWzUzCBJ27uF?si=1577459bee9c4335\n\nEvery episode of Science Fiction Monologues is a self-contained story under 10 minutes in duration, so you can jump in and listen to any episode. Being monologues, each episode is performed by a single voice actor. Some are in the form of speeches, while others can be letters, voicemails, or streams of consciousness. Some are comical, such as The Breakup, while others are rather dark, such as Clone Carnival. \nWhat started as a pet project is now a platform for many science fiction authors to share their work. If you have a piece you'd like featured on Sci-Fi Monologues, you can submit them at tyler@tylersharris.com. I'm also always looking for interested voice actors who would like to voice a character. Prospective voice actors can also inquire by email.\n\nThank you again for playing!\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $2.99 $0.99\n\n*label bad_ending\n*page_break End\nYou have met an unfortunate demise! Play again?\n\n*delay_ending 1200 $2.99 $0.99", "screenshots": "*comment Scene 1, choice of exhibit\n\n*set Player \"Carman\"\n*set James_Friendship 50\n*set Roommates false\n*set Home \"\"\n*set James_In \"\"\n\nAfter exploring the map of the premises, you realize you have plenty of potential humble abodes at your disposal. Narrowing down to the best option takes some time. Eventually you feel like you have picked out the best possible exhibit for your post-apocalyptic habitat.\n\n*fake_choice\n\t#Welcome to the Jungle\n\t#Out of Africa\n\t#Rainforest\n\t\t\n\n\n*comment Scene 2, Let James in\n\n*set Player \"Afari\"\n*set James_Friendship 50\n*set Animal \"Wolf\"\n*set Home \"Rainforest\"\n*set James_In \"false\"\n\n\"I didn't expect anyone to be here,\" James says. \"Figured most people would go to the nearest shopping mall or something. Is it as livable as I thought it would be? I don't know how long you've been staying here, or if any of the animals are still alive. Could I join you and your settlement? I promise to pull my weight. I just need somewhere protected to rest my head at night.\"\n\nClearly you and James are of like mind for coming here, but does that mean he can be trusted. An ally could be of great benefit, but there is no guarantee he is such an ally.\n\n*fake_choice\n\t#Let James in\n\t#Refuse to let James in\n\n\n\n*comment Scene 3, animal companion\n\n*set Player \"Derek\"\n*set James_Friendship 50\n*set Roommates false\n*set Animal \"\"\n*set Home \"Out of Africa\"\n*set James_In \"false\"\n\nYou try to keep yourself busy so you can avoid being one of those people who has full conversations with their pets. But the only entertainment is the books from the gift shop. And some of those animal books are boring. But perhaps they can be more practical. Quite a few of the animals in the zoo have the potential to be tamed, you just have to pick one to focus on.\n\nThis is a pivotal decision, because you are still in the process of deciding which animals you are able to feed. \n*fake_choice\n\n\t#Birds of Prey\n\t#Zebras\n\t#Wolves\n\t\n\n\n*comment Scene 4, James attack\n\n*set Player \"Guo\"\n*set James_Friendship 0\n*set Roommates false\n*set Animal \"Bird\"\n*set Home \"Welcome to the Jungle\"\n*set James_In \"false\"\n\nYou make a quick detour to grab your shotgun and some bird shot. In a rush, you make your way to the entrance. \"Stop right there!\" you yell as James is about twenty yards away. You point your gun at him to show how serious you are.\n\nJames notices you and regards your gun, but doesn't show any intention of backing down. \"You gonna let me in this time, or do I need to force my way in?\"\n \nYour gun still trained on him, you communicate your position. \"You need to find somewhere else. You're not welcome here.\"\n\n\"I don't care if I'm welcomed or not!\" James shouted, stepping forward.\n\n\"DO NOT MOVE!\" you scream. \"Take one more step and I shoot.\"\n\n\"Then I won't take another step,\" James says. \"I'll just do this.\"\n\nHe raises his gun.\n\n*fake_choice\n\t#Shoot him\n\t#Pause\n\n\n\n*comment Scene 5, Invasion\n\n*set Player \"Luna\"\n*set James_Friendship 80\n*set Roommates true\n*set Home \"Welcome to the Jungle\"\n*set James_In \"true\"\n\n\"How many of them are there?\"\n\n\"I think I counted eight,\" you say.\n\n\"I'm not sure we can fight off that many,\" James admits. \"Do you think you can just talk to them?\"\n\nJames brings up valid points. Talking to the group may make you more vulnerable to attack but may also prevent an attack altogether. You may even be able to convince the group not to come into the zoo at all. But you've taken up much time speaking with James and must decide on an approach immediately.\n\n*fake_choice\n\n\t#Talk\n\t#Fight\n\t#Run", "startup": "*comment Hope this works\n\n*comment Below is the Interactive Fiction Identifier. Basically all games should have one of these for record-keeping purposes.\n\n*comment ifid 201899cc-a90a-4a34-bbf5-cf73e0530289\n\n*title Zoo-pocalypse\n*author Tyler S. Harris\n*scene_list\n\tstartup\n\tSettle_In\n\tFlamingo\n\tMFK_James\n\tCorn\n\tInvasion\n\tending\n\tLonely\n\tJames_Attack\n\tMFK\n\tInvasion_Solo\n\tending\n\tCheetah_Death\n\tending\n\n*create Player \"\"\n*create James_Friendship 50\n*create Roommates false\n*create dog_name \"\"\n*create Animal \"\"\n*create Home \"\"\n*create James_In \"\"\n\n*achievement flamingo visible 1 Animal 1\n\tTBD (To Be Discovered)\n\tPinkey the Flamingo\n*achievement hawk visible 1 Animal 2\n\tTBD (To Be Discovered)\n\tHelios the Harris Hawk\n*achievement wolf visible 1 Animal 3\n\tTBD (To Be Discovered)\n\tBonnie and Clyde the Wolves\n*achievement zebra visible 1 Animal 4\n\tTBD (To Be Discovered)\n\tDengele the Zebra\n*achievement snake visible 1 Animal 5\n\tTBD (To Be Discovered)\n\tSnake in the grass\n*achievement bear visible 1 Animal 6\n\tTBD (To Be Discovered)\n\tBubba the Black Bear\n*achievement cheetah visible 1 Animal 7\n\tTBD (To Be Discovered)\n\tVelo the Cheetah\n*achievement dodo visible 1 Animal 8\n\tTBD (To Be Discovered)\n\tDodo bird\n*achievement gorilla visible 1 Animal 9\n\tTBD (To Be Discovered)\n\tHulk the Gorilla\n*achievement lion visible 1 Animal 10\n\tTBD (To Be Discovered)\n\tAslan the Lion\n*achievement giraffe visible 1 Animal 11\n\tTBD (To Be Discovered)\n\tCervico the Giraffe\n*achievement hyenas visible 1 Animal 12\n\tTBD (To Be Discovered)\n\tHellraising Hyenas\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tIf you're surrounded by animals, are you truly alone?\n\n\tPlay as a survivor of the apocalypse in Zoo-pocalypse, my first interactive fiction story. In this game, you make your post-apocalyptic home in a unique venue: a local zoo. \n\n\tThis 50,000 word interactive fiction novella is written by Tyler S. Harris. The story is broken up into 3-4 chapters depending on how it is played. It is completely text-based, with no sound effects or graphics. Vastly different endings can occur based on the decisions you make. \n\n\t• Play as any gender! There are no references to your gender, so play as yourself or anyone else. You do get to pick your name.\n\t• Explore the many exhibits at the zoo, and even the gift shop. \n\t• The end of the story depends on the choices you make, even early decisions can lead to completely different endings.\n\t• Different endings lead to the discovery of animals (achievements). Can you find all of them?\n\n\tWill you reign over this animal kingdom, or will you find yourself at the bottom of the food chain?\n\n\t[b]Content Warning:[/b] Dark themes throughout, even for a post-apocalypse story. Heavy violence: humans and animals may die, sometimes violently.\n\n\t*if choice_is_advertising_supported\n\t\t[i]${choice_title}[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase_discount adfree 2023-06-08 $2.99 $1.99 purchased\n\t\t*page_break_advertisement\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t*purchase_discount adfree 2023-06-08 $2.99 $1.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n*if ch
