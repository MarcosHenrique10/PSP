 You'll come away with a bruised shoulder and just a small splatter of blood on your shoes and pants. Everything else is plastered onto the couch where he will have his final resting place.\n\n\t\t\t\t\t\t\t\t\tThe dog and cheetah did not budge from the noise of the gunshot. Perhaps they knew what to expect. Perhaps they even know what to expect from you in the future.\n\n\t\t\t\t\t\t\t\t\t*page_break Exit\n\n\t\t\t\t\t\t\t\t\tLeaving the house to find your own for the night, you feel a sense of satisfaction. You survived every obstacle that has presented itself to you thus far. Any other obstacle you are likely to surpass. You have your life, your gun, and your four-legged companions.\n\n\t\t\t\t\t\t\t\t\tAnd now you have an affinity for blood.\n\n\t\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t\t\t\t#Play mind games first\n\n\t\t\t\t\t\t\t\t\t\"Hello, James,\" you say, as sinister as you possibly can. \n\n\t\t\t\t\t\t\t\t\tJames jolts awake as if from a nightmare. Was he already sweating in his sleep? Not that it matters, really.\n\n\t\t\t\t\t\t\t\t\t\"You thought you could just leave me for dead, huh?\" you ask. He seems to be searching his mind for an answer, not realizing it was a rhetorical question. \"Thought you could just take my gun without consequences? That I wouldn't survive, wouldn't be upset, or wouldn't come back for it? Come back for you?\"\n\n\t\t\t\t\t\t\t\t\tHis breathing turns to panting. He knows what you came here to do. You, the dog, and the cheetah can smell the fear on him.\n\n\t\t\t\t\t\t\t\t\tJames glances at the gun adjacent to the couch he is sleeping on. You know what he thinks to do, but it doesn't concern you despite being across the room from him.\n\n\t\t\t\t\t\t\t\t\tThe next sequence of events occurs over the course of only a few seconds, but in your state of time dilation it feels longer. James reaches down for his gun. By the time he lifts it up, the dog and cheetah are pouncing. James takes aim at nobody in particular, probably assuming he is bound to hit something if he aims in the general direction. He pulls the trigger, but the quiet click of an empty barrel is drowned out by the growls of the cheetah and dog.\n\t\t\t\t\t\t\t\t\tJames cannot hide his confusion as the two animals clench their jaws around his arms. You choose to lift your hand and reveal the ammunition you removed from the gun before waking him up. Too heavy of a sleeper for the apocalypse. \n\n\t\t\t\t\t\t\t\t\tOnce the gun drops to the floor, you grab it with mischievous nonchalance and reload it with ammunition.  You let the animals have their way with James. They are certainly hungry, and you would hate to waste a bullet on him.\n\n\t\t\t\t\t\t\t\t\t*page_break Exit\n\n\t\t\t\t\t\t\t\t\tYou leave with your four-legged comrades once the job is complete. The search for a new home begins, and you are optimistic. You don't have the zoo anymore, but you don't need it. You have your life, your gun, and two animals with a taste for human blood. \n\n\t\t\t\t\t\t\t\t\tAnd you're starting to like the new, apocalypse version of yourself.\n\n\t\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t*elseif James_Friendship \u003c 75\n\t\t\t\t\t*comment THE LINE BELOW THIS IS THE INDENT FOR JAMES FRIEDNSHIP \u003c 80.\n\n\t\t\t\t\t\"Fighting might be our best option,\" you say, hoping to receive support from James.\n\n\t\t\t\t\t\"Okay,\" James says, which is little support but it will have to do.\n\n\t\t\t\t\t\"Okay,\" you say, \"I'll take the gun to the north end of the bridge. I should be able to get a good angle on them. If you want to grab the cheetah and dog, you can take them to the south end and attack from the other side.\"\n\n\t\t\t\t\tThere is not enough time to wait for his confirmation. You grab your gun and make your way to the described hiding spot with a view of the bridge to Africa. After a few minutes of waiting, you notice the intruders have made their way into the zoo and are rapidly approaching the bridge.\n\n\t\t\t\t\tEyeing the bridge down the barrel of your shotgun, you try to spot James on the opposite side. It feels like a search for a needle in a haystack, but eventually you find out where James is.\n\n\t\t\t\t\tBecause he is walking up to the same spot as you. \n\n\t\t\t\t\t*page_break Turn around\n\n\t\t\t\t\t\"What the hell are you doing here?\" you whisper, hoping the intruders do not hear your conversation.\n\n\t\t\t\t\t\"Oh shoot,\" James says, the dog the only one tagging along with him. \"Did you say north side or south side?\"\n\n\t\t\t\t\t\"It doesn't matter now, does it?\" you ask sarcastically. \n\n\t\t\t\t\tAn odd grunting noise reaches your ears. Searching your surroundings, you see that the group of intruders has spotted you. A woman in the middle of the pack even makes eye contact and points directly at you. More grunting noises, followed by shouts and howls, and the entire group stalks toward you.\n\n\t\t\t\t\t\"Shit!\" James says, no longer whispering. \"What do we do?\"\n\n\t\t\t\t\t*achieve dodo\n\n\t\t\t\t\t*choice\n\n\t\t\t\t\t\t#Stay and fight\n\t\t\t\t\t\t\t\"We fight for what's ours,\" you say with determination as you lift the shotgun and take aim. First in your sights is the woman who initially alerted her companions to your existence. Squeezing the trigger with urgency, you watch the woman take the birdshot to the chest and fall backwards over the railing of the bridge. A quiet splash in the background is followed by the slightest hesitation from the rest of the group. But they are not completely deterred. Especially not the large man appearing to be their leader. He breaks into a full sprint and lifts an axe.\n\n\t\t\t\t\t\t\tThe dog and James run downhill toward the field of battle as you reload your gun. The dog reaches the large man first, but he swings his axe and slices at the dog with the strength of an orangutan. You can't tell where exactly he hits the dog, but you hear whimpering as James closes in on the man.\n\n\t\t\t\t\t\t\tJames is even more unlucky.\n\n\t\t\t\t\t\t\tThe axe, on the man's backswing, gouges into James's thigh. So deep it gets stuck, and James falls onto him. The two tumble down the hill a bit, allowing you time to fire at another assailant. You take out three more before one reaches you.\n\n\t\t\t\t\t\t\tYou take your gun and wield it like a baseball bat. Ironically, the man coming after you is also holding a bat. But you are more swift after not having to climb a hill. The butt of the gun collides with his skull, and his limp body collapses and rolls back down the hill he just ascended.\n\n\t\t\t\t\t\t\tFurther down the hill, you see a woman thumping the ground like an angry gorilla. Out of ammo, you have no choice but to approach with your makeshift bat. As you get closer, you can hear the muffled cries of the man at her feet. \n\n\t\t\t\t\t\t\tIt's James! Somehow still alive.\n\n\t\t\t\t\t\t\t*page_break Tackle the woman\n\n\t\t\t\t\t\t\tFull sprint, you tackle the woman to the ground before she can do any more damage to James. As you both stand, you catch sight of the large man who wielded the axe. He must have taken a terrible fall, because his neck twisted awkwardly and he does not seem to have moved from where he and James tumbled to.\n\n\t\t\t\t\t\t\tThe woman is crying, but she is not choosing to attack you.\n\n\t\t\t\t\t\t\t*fake_choice\n\n\t\t\t\t\t\t\t\t#Kill the woman\n\t\t\t\t\t\t\t\t\tThe rage within you has not completely been released. You grip the gun, this time so that the metal barrel will be the part to make contact with a skull. As you bring it across the woman's face, the gun snaps into two pieces. You pick up the barrel from the ground and return to the woman, who might still be breathing. Lifting and striking down twice more, you make sure the woman will not wake up.\n\n\t\t\t\t\t\t\t\t\tAs you stand, you take a moment to stare at the blood on your hands. Too much blood for one day. It is James's pained voice that brings you back to the real world.\n\t\t\t\t\t\t\t\t#Let the woman leave\n\t\t\t\t\t\t\t\t\t\"Go!\" you shout, as if she is some animal who cannot be reasoned with.\n\n\t\t\t\t\t\t\t\t\tShe sniffles, then stumbles back in the direction the group came. When she is a safe distance away, you wish you could rest. But instead, you go to James.\n\n\t\t\t\t\t\t\tYou've never seen James so pale. He is shivering and his breathing is shallow. He's lost too much blood. You both come to the conclusion he will not survive the day.\n\n\t\t\t\t\t\t\t\"We did it,\" James says, forcing a smile through his grimace. \"We fought for what's ours. And we won.\"\n\n\t\t\t\t\t\t\t\"Yeah,\" you say, \"we did.\"\n\n\t\t\t\t\t\t\t\"Awesome,\" James says. He closes his eyes. His life leaves him, but his smile doesn't.\n\n\t\t\t\t\t\t\t*page_break Two days later\n\n\t\t\t\t\t\t\tIt takes quite some time to give everyone a proper burial. You don't have helping hands anymore. Even the dog, who survived the attack, is now missing its front right leg and cannot dig. Fortunately, it was not one of the fatalities.\n\n\t\t\t\t\t\t\tThe burials were not your first thought. It would have been more convenient to drag them into a carnivore's exhibit and save some of the food for yourself. But you were unsure how they would react to the taste of human blood.\n\n\t\t\t\t\t\t\tAnd if you're being honest with yourself, you're still unsure how you will live now that you've had a taste for yourself.\n\n\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t\t#Make a run for it\n\t\t\t\t\t\t\t\"Run!\" you shout, turning to escape in no particular direction.\n\n\t\t\t\t\t\t\tJames and the dog follow your lead, but the dog quickly sprints ahead. In little time, you see the dog squeeze through the bars of the gate. You and James are unlikely to fit, and will have to climb over the entrance like the intruders must have done. With your head start, you'll make it to the gate before James.\n\n\t\t\t\t\t\t\tReaching the gate, you use your running start to jump as high as you can. The top of the gate is just within your reach so you can pull yourself up and over.\n\n\t\t\t\t\t\t\tA blood-curdling scream shakes you so much you think it might be shaking the gate instead. One leg stretches over the top of the gate, and you pause a moment to find the source of the scream.\n\n\t\t\t\t\t\t\tJames has fallen to the ground, and from your vantage point you can see a hand axe sticking out of his leg. He is still trying to crawl his way in your direction, but at a much slower pace now.\n\n\t\t\t\t\t\t\tMost concerning is the man barreling down on him. Likely the one who threw the axe, because the other invaders are still specks in the background. \n\n\t\t\t\t\t\t\t\"Help!\" he screams.\n\n\t\t\t\t\t\t\tIf you turn back now, there might be a chance you can fight off the attacker and get him to safety before the rest of the group reaches the two of you. \n\n\t\t\t\t\t\t\t*choice\n\n\t\t\t\t\t\t\t\t#Try to save James\n\n\t\t\t\t\t\t\t\t\tDropping back on the inside of the zoo, you take a deep breath and hope you've made the right decision. Lifting the gun in your hand, you take aim at the barrel chest of the man who had thrown the axe. When you shoot, he collapses just a few feet behind James. You run to James and lift him up by the shoulder.\n\n\t\t\t\t\t\t\t\t\t\"Ow! Ow!\" he says with each step, the axe shifting in his leg until it falls out as you near the gate. You don't look back, but you don't need to. You can hear the footdrops of half a dozen assailants on your tail.\n\n\t\t\t\t\t\t\t\t\tYou climb the gate, and once you are on the other side it is uncertain whether James will be able to do the same. The two of you look up at the gate, which would definitely require use of legs to overcome. James shakes his head and looks at you. \"I think I'm gonna try and squeeze through.\"\n\n\t\t\t\t\t\t\t\t\tHe drops a bag to his side to make himself slimmer, but you can't tell if the bag was the real issue. James pokes his head through the bars rather easily, which is a good sign. Rodents are not the only animals able to squeeze their bodies through any hole that can fit their head, but James is not nearly as slick to finesse this space. He gets as far as slipping his shoulders and torso through, but the blockage seems to occur at his hips.\n\n\t\t\t\t\t\t\t\t\t\"Shit,\" he says.\n\n\t\t\t\t\t\t\t\t\tPast him, you see the intruders approaching. They have surpassed the large man who is now struggling to his feet. You only have about ten seconds before they arrive.\n\n\t\t\t\t\t\t\t\t\t\"I'll pull you,\" you say to James, hoping he is ready to endure the pain you're about to put him through. Hopefully the pain in his leg will distract him. \"Hold on tight.\"\n\n\t\t\t\t\t\t\t\t\tHe grabs your hands, and you put your feet up against the two bars forming a vice around James. Now in the position of a horizontal squat, you use all the strength in your legs to pull on James's arms. He lets out a painful shriek as you release a forceful grunt, and suddenly the weight disappears. \n\n\t\t\t\t\t\t\t\t\tYou and James fall back on the outside of the gate, free from the zoo. But you may not be free of the assailants. Helping James to his feet, you create a makeshift three-legged race team and hobble together as quickly as you can in your current state. Behind you, the invaders are climbing up the gate.\n\n\t\t\t\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t\t\t\tThe noise of climbing recedes, and you give in to the desire to see what's going on. In your curiosity, you find out the intruders have not left the zoo at all. They are standing on the inside of the gate, staring at you. The large man, clearly wounded, has his hand on one of their shoulders. As their leader, he must have convinced them to stop chasing you. \n\n\t\t\t\t\t\t\t\t\tHis expression is not friendly, but it gives the impression you easily understand.\n\n\t\t\t\t\t\t\t\t\tThe zoo belongs to them now.\n\n\t\t\t\t\t\t\t\t\tIn your silence you agree to their terms. For all you know, they could easily catch up to you and James, but chose not to. You are grateful to leave the battle with a single casualty and no fatalities.\n\n\t\t\t\t\t\t\t\t\t*page_break That night\n\n\t\t\t\t\t\t\t\t\tJames is completely patched up and should be able to survive and keep his leg. But he won't be walking on his own for quite some time. \n\n\t\t\t\t\t\t\t\t\t\"I'm not sure why you're doing all this for me,\" James says as he takes his time with the berries you picked for dinner. \"All the things I did wrong, I didn't deserve it. And you took a huge risk coming back for me.\"\n\n\t\t\t\t\t\t\t\t\t\"It didn't feel right to just leave you there,\" you say. \"I didn't know what those monsters would do to you if I left you behind.\"\n\n\t\t\t\t\t\t\t\t\t\"True,\" James says. \"But now you're kind of stuck with me. I'll only slow you down and put you in more danger. My leg is busted and I'm in a lot of pain. You may be better off just putting me out of my misery.\"\n\n\t\t\t\t\t\t\t\t\t\"You're not a racehorse, James,\" you say, consoling him in his time of need. \"And I'm not a monster. Human's capacity for compassion is what separates us from the animals. And it's the one thing we need more of at the end of the world.\"\n\n\t\t\t\t\t\t\t\t\t\"Amen to that,\" James says. \"Well, thank you. For everything.\"\n\n\t\t\t\t\t\t\t\t\tYou nod your head silently.\n\n\t\t\t\t\t\t\t\t\t\"And if you do decide to get rid of me,\" he says, \"just Old Yeller me so I don't see it coming.\"\n\n\t\t\t\t\t\t\t\t\tYou laugh. You can't remember the last time you laughed. \"Will do,\" you say.\n\n\t\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t\t\t\t#Save yourself\n\t\t\t\t\t\t\t\t\tEven if you could reach James in time, you can't imagine a way for him to climb over the gate like you just did. You drop to the outside of the entrance, feeling a twinge in your knee when you don't stick the landing. As much pain as you feel in your leg, you know it can't be as bad as James.\n\n\t\t\t\t\t\t\t\t\tAfter taking a few steps away you hear James back in the direction you came from. \"No! NO!\" he screams.\n\n\t\t\t\t\t\t\t\t\tYou turn around and see the same big guy hovering above James. An axe is in his hand, but you can't tell whether it was the same one he threw at James or if he just has a plethora of them at his disposal. James has a hand up, pleading, begging for his life. Either the man doesn't understand him or is completely ignoring him. He only stares, absorbing the fear emanating from James. After having enough, he raises the axe in the air.\n\n\t\t\t\t\t\t\t\t\tAverting your eyes before the axe comes down, you continue your escape from the zoo. The flee continues until you are too tired to continue and need to stop into a local neighborhood for the night. If you had the proportionate lung capacity of the average bird, you'd be able to continue your trek. Instead, you just need to rest.\n\n\t\t\t\t\t\t\t\t\t*page_break That night\n\n\t\t\t\t\t\t\t\t\tA nightmare jolts you awake from the middle of your sleep. You were in shallow waters, thinking you were safe. Suddenly, two floating eyes present themselves in front of you, just above the water. You have no time to realize it is a crocodile before the humongous reptile explodes out of the water and surrounds your head with its jaws like a vice grip. You hear a snapping sounds just as you wake up.\n\n\t\t\t\t\t\t\t\t\tFear suggests to you that the snapping sound was not from your dream, and that it was from a twig or a branch outside. Perhaps it is the group of invaders, come to finish the job they started in your old home. Flashes of James's body enter your head even though he was alive the last time you saw him. You wonder if that will be your fate as well. Even if it is not, you will always be afraid of such fate. You will run, you will hide, but you will never relax.\n\n\t\t\t\t\t\t\t\t\tSure, maybe the group of invaders is happy with their new digs and have no interest in finding you. They no longer need to take your home now that they have theirs.\n\n\t\t\t\t\t\t\t\t\tBut then again, a crocodile can survive a year without eating. Yet it is still a predator.\n\n\t\t\t\t\t\t\t\t\t*goto_scene ending bad_ending\n\t\t\t\t\t\t\t\t\t\n\n\t\t\t\t*comment THE LINE BELOW IS THE INDENTATION FOR JAMES FRIENDSHIP > 80. IT IS THE SAME INDENTATION AS THE CHOICE TO FIGHT, WHICH I THINK IS CORRECT.\n\t\t\t\t\"I think we need to fight,\" you say, hoping James is in accord. \"Together, we should be able to fend them off.\"\n\n\t\t\t\t\"I'm glad you said that,\" James says, a sinister grin crossing his face. \"What do you need me to do?\"\n\n\t\t\t\t\"Hmm,\" you think, trying to come up with the best plan you can in a matter of seconds. \"If one of us uses the gun, and we wait until they are all on the bridge to Out of Africa, they will all be in the same place and won't be able to move or find protection as easily. Maybe we can take out a couple before they even know where the bullets are flying in from.\"\n\n\t\t\t\t\"Like shooting fish in a barrel,\" James adds, at which you both smile. \"Maybe the other one can bring the cheetah and dog with them. Or we could even let out some of the animals we've been feeding.\"\n\n\t\t\t\t\"Good thinking,\" you say. \"They'll recognize us, but if the enemy attacks it will start a frenzy we can use to our advantage.\"\n\n\t\t\t\t\"Sound like a plan,\" James says as he gives you a fist bump, \"which job do you want?\"\n\n\t\t\t\t*choice\n\n\t\t\t\t\t#Take the gun\n\t\t\t\t\t\t\"I'll take the gun and let out the primates. You grab the cheetah and dog and let out as many of the big cats as possible. Then I'll head to the north side of the bridge. There are some spots where I can hide and see the bridge from a distance. You take the south side of the bridge and attack when they're too busy trying to take cover.\"\n\n\t\t\t\t\t\tYou do not bother waiting for his confirmation because there is no time.\n\n\t\t\t\t\t\tAs you reach the ideal vantage point from the north side of the bridge to Africa, you peer down the barrel of your shotgun to where you expect James to be. He is there, across the bridge with the cheetah and dog. You are both in your place in time for the intruders to arrive at the bridge.\n\n\t\t\t\t\t\tIt appears the entire group is still together at the bridge, led by a man who is the largest target of the entire group. Taking aim, you inhale deeply and hold your breath to steady the gun.\n\n\t\t\t\t\t\t*page_break Pull the trigger\n\n\t\t\t\t\t\tThe thunderous CRACK! of the gunshot makes all the intruders jump except for the one you hit. The man who is struck with the slug falls back into the railing of the bridge but appears he will survive. Meanwhile, the rest of the group panicked as they searched for the source of the gunfire. A woman at the opposite end from where the leader is stares in your exact direction. Therefore, she must be the next target. \n\n\t\t\t\t\t\t\"There!\" the woman shouts as she points a menacing finger right at you. Firing the gun once more, you see her fall to the ground like a possum. But she might not be just playing dead. The other intruders may have figured out where you are, but have decided to take cover rather than rush you. By the time you have another bullet ready, they are all hidden from you.\n\n\t\t\t\t\t\tRight on time, James pops out from behind thick greenery from where he was previously hidden from sight. You hear him at the same time that you see him, as he ululates a ridiculous war cry that almost makes you laugh instinctually. What you find oddly whimsical, the intruders find absolutely terrifying. \n\n\t\t\t\t\t\tBut it may not be the war cry causing the fear. Perhaps it is the medium-sized dog and large cat bearing down on the bridge that has the group quivering in fear from their inadequate hiding spots. \n\n\t\t\t\t\t\tFirst, the dog attacked one man. Then the cheetah reached one of the surviving women. Finally, James rushes in with no more than a rock as a weapon. The man he attacks is able to take a bat to swing in the fight, which is not a good thing for James. Worse, there is another intruder who could outnumber him. You fire once more and take out the additional intruder, then make your way down the hill and toward the bridge.\n\n\t\t\t\t\t\t*page_break At the bridge\n\n\t\t\t\t\t\tBefore you reach the bridge, you see a flash of movement in your peripheral vision. Peering over to your right, you see a lion has entered the battlefield. The female lion, which does all the hunting in the wild, leaps at the same opponent that is in a fight with the cheetah. The two big cats together will be able to finish off that intruder in no time.\n\n\t\t\t\t\t\tThere is still one woman who hasn't made an attack on anyone yet. As she turns to realize you are at the bridge, a fit of rage overtakes her. Making a beeline for you, the only thing you can think to do is brace yourself for the tackle. She knocks you to the ground with her arms around you, but the momentum rolls you over and you find yourself on top of her. You punch down into her face as she claws at your face and neck, her nails as sharp as a badger's. The sting of the scratching decreases as her arms grow weaker. You are close to finishing her off when a shoulder surprisingly enters your ribcage.\n\n\t\t\t\t\t\tNow you are the one on your back, the large man who was the recipient of your first gunshot now on top of you. You try to push him off but cannot. He is heavy and strong. You feel more of his strength when he punches you through your blocking forearms. On the second punch, the back of your head hits the bridge floor and you start to feel woozy.\n\n\t\t\t\t\t\tThere is a pause in the man's punches as he pulls something from his waistband. Your vision is blurry, but when he raises his hand you can recognize the axe he is about to bring down on you.\n\n\t\t\t\t\t\tJust before the axe comes down, a male lion crosses your field of vision and removes the large man from sight. The sun shines directly in your eyes, making your vision even worse for the first few moments you turn away from it. Next to you, the lion has overpowered the man who was overpowering you. His screams are silenced rapidly, as the lion bred in captivity still knows how to go for the kill. \n\n\t\t\t\t\t\tOrienting yourself to the rest of the battle, you see the dog limping and James is leaning up against the railing of the bridge exhausted. But they are both still alive, which is more than you can say about the invaders whose bodies filled the space between you all. \n\n\t\t\t\t\t\t*page_break Stand up\n\n\t\t\t\t\t\tAfter struggling to your feet, your vision clears and you believe you can walk without falling over. The two lions who saved your lives approach you, and for a moment you wonder if they might attack. Instead, they make a subtle gesture resembling a bow or a nodding of the head. Their stature harkens to Aslan, which makes you wish there was a copy of The Lion, the Witch, and the Wardrobe in the gift shop. \n\n\t\t\t\t\t\tThe lions leave the battle site. To return to their exhibit or to leave the zoo completely, you are unsure. But it doesn't much matter. \n\n\t\t\t\t\t\t\"Well, that was fun,\" James says, not bothering to get up to his feet.\n\n\t\t\t\t\t\t\"You could say that,\" you say, \"but it was necessary.\"\n\n\t\t\t\t\t\tJames nods his agreement, along with a wink and a point.\n\n\t\t\t\t\t\t*page_break The next day\n\n\t\t\t\t\t\tIt is taking quite a while to bury all the bodies, but you know it is necessary to prevent the spread of infection. As you walk between the various areas of the zoo, you notice that any time you pass the lion exhibit, the lions make the same gesture as they did following the battle yesterday.\n\n\t\t\t\t\t\tYou accept it as a sign of respect, and learn to welcome it.\n\n\t\t\t\t\t\tThe king of the jungle has just recognized you as king of the zoo.\n\n\t\t\t\t\t\t[i]Long live the king[/i], you think to yourself.\n\n\t\t\t\t\t\t*achieve lion\n\n\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t \n\t\t\t\t\t#Take the cheetah and dog\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I'll take the cheetah and dog. While I'm there, I'll let out a few of the big cats. You take the north where there is a better vantage point. You grab the gun and let out the primates. They're de-venomed, but the other guys don't know it.\"\n\n\t\t\t\t\t\t\"Okay,\" James agrees, \"I'll shoot first and that will be the signal.\"\n\n\t\t\t\t\t\tYou give a thumbs up as you run to do your part. The dog and cheetah are waiting by the entrance to the exhibit, as if they could already sense something was up. This is good, because it saves you time to try and release more big cats. You're able to let out the lion and lioness, as well as the lone tiger. You don't have time to literally herd all the cats toward the bridge to Africa, but the cheetah and dog are willing to follow you and that will have to be enough. \n\n\t\t\t\t\t\t*page_break To the bridge\n\n\t\t\t\t\t\tYou, the dog, and the cheetah arrive at the south end of the bridge the same way you said you would. All you can do now is hope James will be in his place before the intruders are there. The three of you await the arrival of the invaders.\n\n\t\t\t\t\t\tAs you had hoped, the intruders make their way toward the bridge. A big man is leading them, and he seems to be the biggest threat. You wouldn't be able to fight him by yourself, so your hope is that James will be on the same page as you and take him out first. You and your four-legged partners crouch like a recoiling snake before a strike.\n\n\t\t\t\t\t\tBANG!\n\n\t\t\t\t\t\tYou don't see where James took the shot from, but you are able to see the aftermath. A woman in the middle of the pack topples over the bridge and into the creek running below it. The rest watch in shock, unable to think clearly in all the chaos. Like a group of ants who have just had a foot run through the middle of their marching line, the intruders spin in circles trying to find their way. Trying to find a hiding place but still unable to know who, what, or where they are hiding from. \n\n\t\t\t\t\t\tHoping to take advantage of their discombobulation, you exit your hiding place and run up the hill wielding the knife you have previously designated for preparing food. You approach one side of the bridge while the cheetah and dog flank the group.\n\n\t\t\t\t\t\tYou make a little too much noise in your hurry, drawing the attention of the big man you are running towards. He doesn't even flinch at the next gunshot from James, because now his eyes are set on you. He pounds his chest and shouts, \"Come on!\" as he walks confidently in your direction. If only you had as much confidence as him in this situation.\n\n\t\t\t\t\t\tAs you come closer, you see just how much of a behemoth this man is. More concerning, he reaches behind himself and pulls out a hand axe. The man and the weapon are each much larger than you and yours. In this fight or flight scenario, your legs have already chosen to fight. They are continuing to carry you toward the man and likely death.\n\n\t\t\t\t\t\tUntil a massive figure enters your field of view.\n\n\t\t\t\t\t\t*page_break Look over\n\n\t\t\t\t\t\tTo your right, a gorilla from the primate exhibit is running full speed at the large man. Originally you had considered the large man to be comparable to a gorilla, especially after he beat his own chest. But now that a real gorilla has seen the gesture and interpreted it as a sign of aggression, you are able to compare side by side. \n\n\t\t\t\t\t\tOr rather, top and bottom. Because the ape has just tackled the man and is beating him senseless on the ground. Beating him lifeless. This leaves you the freedom to continue to the bridge.\n\n\t\t\t\t\t\tJames is at the bridge when you reach it, holding his gun and watching you as you join him. He does not seem to be preoccupied with the battle you expected to find. Searching for the enemies, you realize most of them are lying motionless in your immediate area, but one is running frantically back toward the entrance of the zoo. He is the final one standing, and is hoping to escape with nothing more than his life.\n\n\t\t\t\t\t\tJames lifts the shotgun in his hands and takes aim. He does not fire yet. \"On your signal,\" he says, waiting for you to confirm that all invaders must die.\n\n\t\t\t\t\t\t*achieve gorilla\n\n\t\t\t\t\t\t*choice\n\n\t\t\t\t\t\t\t#Let him live\n\n\t\t\t\t\t\t\t\t\"No,\" you say with added sympathy, \"let him go.\"\n\n\t\t\t\t\t\t\t\tJames lowers the gun on a deep exhale. \"Fine,\" he says, \"I guess we've done enough damage already.\"\n\n\t\t\t\t\t\t\t\tTurning away from the fleeing enemy to get back to your day, the same silverback gorilla is now just twenty feet from you.\n\n\t\t\t\t\t\t\t\t\"Shit,\" you hear James say under his breath. He slowly begins to raise his gun, afraid to make any sudden movements.\n\n\t\t\t\t\t\t\t\t\"No,\" you whisper, reaching over and putting your hand on top of the barrel of the gun. Both of you are having as quick and as loud a conversation as can be had while trying not to startle one of the strongest animals on the planet. Even after James acquiesces to your recommendation, the silverback takes many steps toward you.\n\n\t\t\t\t\t\t\t\t*page_break Kneel\n\n\t\t\t\t\t\t\t\tThe closer the gorilla comes, the further down you go. By the time he is within arm's reach, you and James are both on your hands and knees. You offer your hand, palm up, which is a gesture you think you might have seen in a movie once. James releases his gun to the ground and emulates you.\n\n\t\t\t\t\t\t\t\tYou feel the gorilla's ginormous hand envelop yours and pull it to his mouth. You feel his hot breath on your fingertips and the vice grip of his jaw on your knuckles. With little pressure on his part, he could crush your bones and tear off half your hand. Your body trembles as you brace yourself for the immense pain.\n\n\t\t\t\t\t\t\t\tBut the pain does not come. The gorilla releases your hand to you and moves on to James. When the gorilla grabs his hand, he whimpers quietly.\n\n\t\t\t\t\t\t\t\t\"Shhh,\" you say, \"it's okay.\"\n\n\t\t\t\t\t\t\t\tThe gorilla repeats the same establishment of dominance with James, who hyperventilates when his hand is returned. After this, the gorilla scuffles away leaving you and James to make some attempt at breathing easy. \n\n\t\t\t\t\t\t\t\t*page_break One week later\n\n\t\t\t\t\t\t\t\tIt is no longer just you and James inhabiting the zoo alone. All the intruders perished, and you spent a few days burying them out of respect and sanitary concerns. However, the apes have not returned to their exhibits. They have upgraded their lodging from captivity to roommates. They just kind of roam the facility at their leisure, seeming to do a better job rationing food than James. It is still more food than you would have hoped to use, but it is an acceptable price to pay for the added security you now have from the gorillas in particular.\n\n\t\t\t\t\t\t\t\tBesides, are you going to be the one to confront the silverback gorilla about his food intake?\n\n\t\t\t\t\t\t\t\tExactly.\n\n\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t\t\t\t#Shoot him\n\t\t\t\t\t\t\t\t\"Take him out,\" you say like a general barking orders to a firing squad. James complies.\n\n\t\t\t\t\t\t\t\tThe closeness of the gunshot leaves a ringing in your ears. You almost don't hear James when he says, \"I'll make sure the job is finished.\" The birdshot did quite a bit of damage in the battle, but this man was much further away and would likely need to be put out of his misery. You choose not to watch and turn the other way.\n\n\t\t\t\t\t\t\t\tAs you turn, you see the gorilla just a few feet away from the bridge, staring at you. The one thing you know not to do is beat your chest in this moment. Instead, you decide to avert your eyes down and lower your stature. It is the best method you can think of to show you are not interested in a fight.\n\n\t\t\t\t\t\t\t\tThe distant bang of a gunshot makes you jump. The gorilla looks past you to see James, who must have just finished off the last of the intruders, and calmly leaves. \n\n\t\t\t\t\t\t\t\t*page_break Two days later\n\n\t\t\t\t\t\t\t\tIt doesn't take long to return to the normalcy of before. None of the zoo was disturbed in the battle, and you and James left with little damage to your bodies. Though you may have to struggle with PTSD for some time, which makes you wonder if the same could be said about the animals involved.\n\n\t\t\t\t\t\t\t\tInterestingly, the gorilla returned to his exhibit following the battle with the invaders. Perhaps he is aware of the location where he is most likely to receive food, and doesn't mind staying within the comfort of familiarity. You feel the same way, but you have made a couple of changes. Most important is the amount of food that goes to the gorilla each day.\n\n\t\t\t\t\t\t\t\tAnd considering he basically saved your life, he deserves every bite.\n\n\t\t\t\t\t\t\t\t*goto_scene ending\n\n\t#Save yourself and leave the zoo\n\n\t\tEven if you were to work with James, there would be little chance of you and a mildly competent companion successfully staving off an onslaught of invaders. \n\n\t\tAll you have time for is to grab two emergency bags with some supplies and the last trade of food you received. Last you checked, the incoming group was heading toward the front entrance. Rather than walk right into them, you go find an employee entrance to escape through.\n\t\tNot only is it in the opposite direction of your incoming enemies, it is also in the opposite direction of James. For all you know, he is completely oblivious to what is about to come. You could warn him, but then you'd be stuck in the same spot as him. \n\n\t\tLike a black bear who abandons a single cub, you made the difficult decision that supporting James was not worth the effort or survival risk. All on his own, he's susceptible to attack. But the most important thing is that you will be safe.\n\n\t\t*page_break Two days later\n\n\t\tYou're relieved to have escaped the crowd of invaders, but are curious about the state of the zoo. From a safe distance with a bit of elevation, you peer through the binoculars that were still on you when you left your lookout post so hastily. \n\n\t\tThrough the lenses, you find the very tower where you would watch for predators. From this vantage point, the sad truth hits you.\n\n\t\tJames has perished.\n\n\t\tHis body is hanging from the scaffolding of the giraffe feeding tower. The group of scavengers were just as ruthless as you had imagined them to be. \n\n\t\tWith the sad resolution now behind you, and no expectation of being able to return to the zoo, you continue in your trek. South, you feel, is the best option. Especially considering the cooling weather. Birds make the migration, so why shouldn't you?\n\n\t\tBesides, maybe you'll even catch up with those flamingos again.\n\t\t*achieve giraffe\n\t\t*goto_scene ending", "invasion_solo": "You can estimate it has been about a month since the fight with James. You feel as if you've recovered physically and mentally about as much as you can.\n\nWhile filtering water through sand so you can boil and drink it later, you hear unique animal noises from outside the barriers of the zoo. At first, you assume it to be some local birds, but the noise is not that high-pitched.\n\nSuddenly, a knot forms in your stomach as you think it might be humans nearby. After what happened with James, you need to assume any visitors to be hostile.\n\nClimbing up the giraffe feeding tower as quickly and quietly as you can, you grab your binoculars and scan the area where you believe the sound came from.\n\n*page_break \n\nYour nightmare becomes a reality.\n\nHalf a dozen people are down the road and walking toward the zoo like a pack of wolves ready to attack. The hairs on your back stand up like a scared cat. And not a big cat like a lion or a jaguar. A house cat that has never left the yard. \n\nYour instincts tell you these aren't nomads looking for a safe haven. They are hyenas. Hyenas can scavenge or hunt, and these ones are seeking another animal to prey on.\n\nYour suspicions are confirmed when you bear witness to the scalps hanging from the hands of the large man leading the group. \n\n*page_break\n\nYou've had some experience with this, but fighting one-on-one is much different from fighting against a group. You'll have to use everything at your disposal to get whatever advantage you can. But you can't give up this zoo.\n\nOne possible advantage you have is the animal training you've completed since starting to live here. What started as a pet project to pass the time by yourself might now be the difference between your survival and death.\n\n*if (Animal = \"Bird\")\n\n\tBy this point, you have trained three of the four birds of prey in the zoo to fly free, and they have always returned to your makeshift gauntlet. Perhaps you can use this to your advantage. In addition, you can pick from the available weapons for yourself.\n\n\t*choice\n\n\t\t#Shotgun (long range)\n\t\t\tBest case scenario, the birds can launch an aerial attack while you try to pick off some of the intruders from afar. There is the spot where you started off training the birds, and the perch is still set up at the entrance to the zoo. That will be the battlegrounds where you will make your stand.\n\n\t\t\tIn the little time you have, you bring the three best-trained birds with you to a hiding spot half a football field away from the entrance and the perch. Each of the birds will expect a small treat to be on the perch, just like you trained them.\n\n\t\t\tFrom your post, you watch the first three invaders climb the gate and enter the zoo. This may be your best chance to initiate the attack.\n\n\t\t\t*page_break Send in the birds\n\n\t\t\tYou take the first Harris hawk and put it on your gauntlet. Just before the lead man reaches the perch, you push your hand up so the hawk can fly. As you hoped, the hawk begins to fly toward the perch like you trained it to. With the man now blocking its path, the approach appeared like a calculated attack.\n\n\t\t\tHawk 1 catches the man off guard, and he jumps back from the direction the bird was coming from. He bumps into the perch accidentally, then instinctively reaches back to keep it from falling. Big mistake, because now Hawk 1 views him as encroaching on its territory. The hawk makes agressive kac-kac-kac sounds while avoiding the man's swatting.\n\n\t\t\tYou take this time to repeat the same gesture with the kestrel, who flies in a similar pattern but is intercepted by a woman who sees it coming. Now they are locked in a fight.\n\n\t\t\tYou don't even need to do anything with the other Harris hawk, who flies in unprompted to protect its own kind. The three birds swarming the humans reminds you of an Alfred Hitchcock movie. While the scene unfolds, you pick up your shotgun and must now decide who to take aim at first. The man engaged in a fight with the two hawks is the largest target and the most distracted, but may be difficult to hit with the birds in the way. A second man is planning to come to his aid. It also appears the rest of the group os in the process of climbing the gate separating you from the outside world.\n\n\t\t\t*choice\n\n\t\t\t\t#Shoot the man through the hawks\n\t\t\t\t\tYou take aim and pray you time your shot right. Your finger pulls backward and the bullet moves forward. Birdshot scatters in the air, and you notice you've hit more than just your target. You've clipped Hawk 2 in the wing, and it awkwardly lands with a slanted stance on the concrete. The large man is worse off, as the majority of the pellets have hit him in the chest. He falls back, and while he is writhing in pain Hawk 1 swoops down for the kill. Tearing with its beak and talons, it won't be long before the man has vanquished.\n\n\t\t\t\t\tIn this time, the other three members of the group have surpassed the zoo barrier. They are now within the zoo limits, and you have to take another shot at one of them.\n\n\t\t\t\t\tYou take one down easily. The other two freeze for a second to decide their next step as you are reloading. They have opposite motivations, one flees while the other prepares to fight. The woman returns to the gate to climb over and escape, but the man is running in your general direction. He may not know exactly where you are just yet, but it won't be long before he sniffs you out like a shark sniffs out blood in the ocean. He is on you in a matter of seconds, but you are fortunate enough to reload just a smidge faster. \n\n\t\t\t\t\tThere isn't enough time to aim downsight, you just need to line the barrel up and squeeze the trigger. As you do, the recoil knocks you back almost as much as the bullet knocks your assailant back. Ten hummingbird wing beats later, and it would have been the end of you. Instead, you have the chance to continue the fight.\n\n\t\t\t\t\tAs you rise up to view the main battlefield, you see that there is not much more of a battle going on anymore. One more intruder has followed in the footsteps of the woman who fleed, and they are both now on the outside of the zoo. Once the large man was taken care of, it appears all the birds converged on the final intruder who you did not shoot.\n\n\t\t\t\t\t*page_break Assess the damage\n\n\t\t\t\t\tApproaching the battlefield, you see the two humans who succumbed to bullet wounds and the two who succumbed to bird wounds. The hawks and the kestrel are skittish when you come near, but they recognize you as their trainer and do not attack. Even Hawk 1 flies to your gauntlet when you present it. \n\n\t\t\t\t\t\"Thank you for your help,\" you say calmly as you stroke the bird's belly. You reach down to help the maimed Hawk 2 onto your bare hand. It is easier now that Hawk 1 has set the example. \"Let's get you cleaned up.\" The hawks respond to this with more pleasant sounds.\n\n\t\t\t\t\t*page_break One week later\n\n\t\t\t\t\tYou've been pampering the birds of prey ever since they participated in your fight against the invaders. Well deserved, considering the sacrifices they made. Bottomless baths, endless feasts of whatever food they want, and they can fly free as much as they want. If they were to leave, which is always a risk, you do not mind anymore. Maybe they have served their purpose, and they always say if you love something you should let it go.\n\n\t\t\t\t\tLove is a strong word in this case. But in some way, you kind of owe these birds your life. So you are willing to spend your life (however long you end up living) serving them for as long as they are willing to accept it.\n\n\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t#Shoot the second man coming to help\n\t\t\t\t\tWith a moving target, you hope your minimal target practice pays off. When you squeeze the trigger and watch the man get knocked bac from his stride, you realize it did. One down, five to go.\n\n\t\t\t\t\tThe other three intruders have eclipsed the entrance, and seem to be coming to the aid of the kestrel's opponent. But the kestrel has already scratched at the man's eyes, so when he pulls out some sort of crowbar he swings it blindly. He makes contact, but not with the kestrel. You witness something that resembles a child missing the piñata at a birthday party and accidentally striking the parent holding the wire. He actually takes out two of his own friends before realizing the kestrel has already flown away. The last one to climb over the fence finally grabs his attention to tell him not to swing any more, causing him to pause long enough for you to reload and fire upon him. \n\n\t\t\t\t\tAt this point, the only two live/conscious intruders are the last woman in--who is now the first woman out of the zoo because she is running away--and the first man who is still putting up a fight against the hawks. In fact, he appears to pull out a handaxe and swing much more effectively than the man with the crowbar. The first swing is a complete miss, but the second connects with Hawk 1. \n\n\t\t\t\t\t\"No!\" you scream as you witness an explosion of feathers create a cloud around the killer. In record speed, you reload the shotgun and shoot the asshole, hoping that if it doesn't kill him it stings like hell. Meanwhile, Hawk 2 recognizes its time to strike. Seizing the opportunity to strike, Hawk 2 descends and goes for the throat. Teh awkward high-pitched shreiks could be coming from the man, the hawk, or both. After long enough, you are certain the sound is not coming from the man.\n\n\t\t\t\t\t*page_break Approach the battlefield.\n\n\t\t\t\t\tOne of the two who were hit with the crowbar still moves. This one is responsive, but won't be able to defend themselves. Still angry from the death of Hawk 1, you do not hesitate to put the barrel of the shotgun against their temple. Pulling the trigger is probably as satisfying for you as tearing the man's throat out was for Hawk 2.\n\n\t\t\t\t\tThe loud gunshot this closeby sends the kestrel and Hawk 2 flying away even though they know you. Whether they will return to their exhibit or not is still to be determined, but they may have already served their purpose anyway.\n\n\t\t\t\t\t*page_break Three days later\n\n\t\t\t\t\tYou've finally cleaned up the mess that was the fight with the intruders. You haven't been able to properly thank Hawk 2 and the kestrel for the role they played in defending the zoo. They still haven't returned, which suggests they never will.\n\n\t\t\t\t\tPerhaps it is for the best.\n\n\t\t\t\t\tYour breath has smelled like Hawk 1 for the last two nights.\n\n\t\t\t\t\t*goto_scene ending bad_ending\n\n\t\t\t\t\t\n\t\t\t\t#Shoot someone off the top of the gate\n\t\t\t\t\tThis invader is the furthest away, but they are also moving the least because they are at the top of the gate. He straddled the top of the gate, presenting a broad target for your bullet. You fire, and your aim is true. The slug strikes the man in the chest, and he falls backward to the outside of the zoo. On the way down, he first lands on one of his comrades. Unaware of the incoming threat, the woman did not brace herself. The heavy load, combined with the distant fall, are too much for the woman's neck. Both bodies collapse to the ground, unlikely to rise again.\n\n\t\t\t\t\tThe sight scares the third outsider away, but the three on the inside are still in full fight mode with the three birds. The kestrel is now double-teamed, and the two injured men are taking the upper hand. Each has a fistful of a wing and are playing a deadly tug of war with each other. And it's the kestrel who is going to lose.\n\n\t\t\t\t\tIn a desperate attempt to save the kestrel, you fire at the human on the right. He falls, wing still in hand, and the one on the left lets go. This one rushes back to the gate to follow their friend who must be a few hundred yards away now. \n\n\t\t\t\t\tThe last one standing is the large man, but he refuses to go down. In fact, he has an axe in his hand that he uses to slice through Hawks 1 and 2 in consecutive swings. You want to pause and mourn the losses, but the man walks through the cloud of feathers in the air. There is no time to mourn, only time to reload before the man can reach you.\n\n\t\t\t\t\t*page_break\n\n\t\t\t\t\tHis footsteps grow louder and closer, almost distracting you from the matter at hand. You focus your eyes and hands at reloading the shotgun. When you bring the barrel up, the man is within a few strides of you. Ten hummingbird wing beats later, and it would have been the end of you. Instead, you pull the trigger and the birdshot spreads through the man's chest and face. His forward momentum continues, and you are unable to move out of the way before his limp body falls on yours. \n\n\t\t\t\t\tYou find yourself pinned under the man, wind knocked out of you but able to slide yourself free. A shooting pain attacks your right wrist as you realize the man or the gun crushed it and may have broken a bone. Hopefully this group raided a pharmacy and you will find painkillers in one of the bags they left behind. Though at this time you are most concerned about the kestrel clinging to life. You scoop it up cautiously with your uninjured arm, making cooing noises that you hope are as soothing for a bird as they are for a human child. It's eyes are wide like a dog about to attack, but it is not trying to escape from your grasp.\n\n\t\t\t\t\tThere are no introductory veterinarian books in the gift shop. All you can think to do is bring the kestrel to a the nearest body of water. You put it in the birdbath near the falconry demonstration area of the zoo, then just wait with it and hope it pulls through.\n\n\t\t\t\t\t\"I'm sorry,\" you say. What exactly you're sorry about, you don't know. But there is a long list. You could apologize for not protecting the kestrel. You could apologize for the loss of the hawks. You could apologize for ever training the birds in the first place and thinking they were prepared for battle. Rather than take a pick, you just apologize for them all.\n\n\t\t\t\t\t*page_break Two weeks later\n\n\t\t\t\t\tYou have a new routine every morning. One which includes single-handed harvesting of plants and attending to the needs of the brutally injured kestrel. It appears you will both pull through with your lives. \n\n\t\t\t\t\tIt is one thing to mend your broken wings. It will be another thing to mend your broken relationship. Funny to think your strongest relationship is with a bird, but there don't seem to be any other prospective friends. Nobody who has enterred the zoo after you has been a welcome guest, and it is likely to stay that way.\n\n\t\t\t\t\tMaybe you are meant to be among the animals. A veritable Ace Ventura. \n\n\t\t\t\t\tThe thought brings you comfort, and you smile for the first time you can remember.\n\n\t\t\t\t\t*goto_scene ending\n\n\t\t#Pistol (short range)\n\n\t\t\tIf the birds launch an aerial attack, you can come in and kill off any stragglers. \n\n\t\t\tThere is the spot where you started off training the birds, and the perch is still set up at the entrance to the zoo. That will be the battlegrounds where you will make your stand.\n\n\t\t\tFrom your post, you watch the first three invaders climb the gate and enter the zoo. This may be your best chance to initiate the attack.\n\n\t\t\t*page_break Send in the birds\n\n\t\t\tYou take the first Harris hawk and put it on your gauntlet. Just before the lead man reaches the perch, you push your hand up so the hawk can fly. As you hoped, the hawk begins to fly toward the perch like you trained it to. With the man now blocking its path, the approach appeared like a calculated attack.\n\n\t\t\tHawk 1 catches the man off guard, and he jumps back from the direction the bird was coming from. He bumps into the perch accidentally, then instinctively reaches back to keep it from falling. Big mistake, because now Hawk 1 views him as encroaching on its territory. The hawk makes agressive kac-kac-kac sounds while avoiding the man's swatting.\n\n\t\t\tYou take this time to repeat the same gesture with the kestrel, who flies in a similar pattern but is intercepted by a woman who sees it coming. Now they are locked in a fight.\n\n\t\t\tYou don't even need to do anything with the other Harris hawk, who flies in unprompted to protect its own kind. The three birds swarming the humans reminds you of an Alfred Hitchcock movie. The first three intruders are now thoroughly distracted, which means it is time for you to bring a gun to a birdfight.\n\n\t\t\t*page_break Get closer\n\n\t\t\tSprinting to a manageable shooting distance, you get a better visual of the intruders. The man fighting the two hawks would tower over you if you were on level ground. The other two, a man and a woman, are less of a threat to you, but are now tagteaming against the kestrel.\n\n\t\t\t*fake_choice\n\n\t\t\t\t#Shoot the large man\n\t\t\t\t\tFrom a distance of thirty feet you fire off two rounds at the man's chest. Fortunately for you, this man shrugs off the first bullet but is taken down by the second. \n\n\t\t\t\t\tUnfortunately for you, the loud gunfire disturbs the birds and takes their focus away from the matter at hand. All three of them fly up into the air and away from the battlefield. Leaving you and two remaining bullets to continue.\n\n\t\t\t\t\tThere are enough bullets for the first wave of intruders, but the second wave has certainly climbed the gate into the zoo by now.\n\n\t\t\t\t#Shoot the others\n\t\t\t\t\tYou fire two of your four bullets into the kestrel assailants. Both of them drop lifeless to the ground. The kestrel, however, moves in the opposite direction. It flies up and away from the battlefield.\n\n\t\t\t\t\tMore unfortunate, the two hawks have decided to do the same thing. Apparently, birds do not like the sound of a gun fired in close range.\n\n\t\t\t\t\tYou are now left alone to continue the fight or flee yourself. You can definitely take out the large man with your last two bullets, but the second wave of invaders is likely over the gate by now.\n\n\t\t\t*choice\n\n\t\t\t\t#Use your gun\n\t\t\t\t\tTwo more gunshots, and the first three assailants are all taken care of. From the corner of your eye, you can see your expectations are met. The other three assailants have enterred the zoo, and are running at you in full stride.\n\n\t\t\t\t\tBy reflex, you try shooting them. In your panic you forgot how many bullets you have already used, and the gun clicks empty. \n\n\t\t\t\t\tYou throw your gun like a tomahawk, but it does little to stop the momentum of the incoming attack. Turning to run makes little difference, as two of the assailants jump on you like a pack of lions on a wildebeest. Falling victim to your newly-discovered predators, you glance up to see two of the birds circling in the sky. Whether they are trying to find a time to swoop in and save you or are hoping to get a meal out of your death, you cannot tell.\n\n\t\t\t\t\tIn some ways, you do hope the birds get a meal out of this. At least then your death would not be in vain. \n\n\t\t\t\t\tAs two predators hold you down, one of them takes out a knife sharp and long enough to go through your chest cavity. It does just that.\n\n\t\t\t\t\tYou death is quick, but not painless.\n\n\t\t\t\t\t*goto_scene ending bad_ending\n\n\t\t\t\t#Run like hell\n\t\t\t\t\tThere's no way the couple bullets you have left will help you take on this ambush alone. You whirl and sprint away from the pack of hungry piranhas, hoping there is enough distance already between you to catalyze your escape.\n\n\t\t\t\t\tYou don't need the hearing ability of a bat or the 360 degree head rotation of an owl to know the group is gaining on you. Too bad the birds of prey were the only ones who could fly in the fight.\n\n\t\t\t\t\tSpeaking of birds, you suddenly see a brown figure swooping in from your left. A glance in its direction let's you know it is Hawk 2, come back to the fight. As you continue running, you see Hawk 2 and the kestrel joining. The gaining footsteps behind you evolve into sliding feet and shouts as the invaders stop to deal with the immediate threat. \n\n\t\t\t\t\tFrom a safe distance, you turn back and see the birds with a second wind actually making it difficult for the intruders to continue forward. But you've already learned your lesson, and use this opportunity to move further into the zoo. It is unlikely the birds will survive if they keep fighting, but their deaths will be in vain if you do not escape with your life. In the breif moments provided to you, you make your way to the opposite end of the zoo and exit through an employee entrance.\n\n\t\t\t\t\t*page_break Two days later\n\n\t\t\t\t\tIt is still difficult to think of how your life will be now. You had found comfort in the zoo, with the expansive space all to yourself. Now you are confined to the first house you found that didn't smell like death. You suppose it beats being dead yourself, but it's certainly not your preferred way to live.\n\n\t\t\t\t\tA vicious tapping at the window rouses you in the morning. Unsure whether it is the intruders coming to finish you off, you hesitate to answer. That is, until a familiar sound breaks the dead silence.\n\n\t\t\t\t\tBird calls.\n\n\t\t\t\t\t*page_break Go to window\n\n\t\t\t\t\tJust as you had hoped, the three birds have found you and are outside your house. You do not go outside for fear of exposure, but they seem to understand. They have no expectation of joining you, just wanting to come to a mutual understanding that everyone is alive.\n\n\t\t\t\t\tThe three birds fly away, but they know they have made their message pretty clear.\n\n\t\t\t\t\tDon't worry about a thing.\n\n\t\t\t\t\t'Cause every little thing is gonna be alright.\n\n\t\t\t\t\t*goto_scene ending\n\n\t\t#Knife (up close and personal)\n\t\t\tIf the birds can launch an aerial attack, you may be able to rush in and kill off whoever is leftover.\n\n\t\t\tThere is the spot where you started off training the birds, and the perch is still set up at the entrance to the zoo. That will be the battlegrounds where you will make your stand.\n\n\t\t\tFrom your post, you watch the first three invaders climb the gate and enter the zoo. This may be your best chance to initiate the attack.\n\n\t\t\t*page_break Send in the birds\n\n\t\t\tYou take the first Harris hawk and put it on your gauntlet. Just before the lead man reaches the perch, you push your hand up so the hawk can fly. As you hoped, the hawk begins to fly toward the perch like you trained it to. With the man now blocking its path, the approach appeared like a calculated attack.\n\n\t\t\tHawk 1 catches the man off guard, and he jumps back from the direction the bird was coming from. He bumps into the perch accidentally, then instinctively reaches back to keep it from falling. Big mistake, because now Hawk 1 views him as encroaching on its territory. The hawk makes agressive kac-kac-kac sounds while avoiding the man's swatting.\n\n\t\t\tYou take this time to repeat the same gesture with the kestrel, who flies in a similar pattern but is intercepted by a woman who sees it coming. Now they are locked in a fight.\n\n\t\t\tYou don't even need to do anything with the other Harris hawk, who flies in unprompted to protect its own kind. The three birds swarming the humans reminds you of an Alfred Hitchcock movie. The first three intruders are now thoroughly distracted, which means it is time for you to bring a knife to a birdfight.\n\n\t\t\t*page_break Rush in\n\n\t\t\tKnife in hand, you run full speed toward the intruders to protect your claimed land. From a distance, you are confident you will be able to take them out if not just scare them off. As you run closer, you start to question this theory. Two of the intruders are now tearing the kestrel apart, and the large man fighting the two hawks now wields a hand axe with deadly force.\n\n\t\t\tYou try to slow yourself down before reaching them, witnessing the axe slice through the hawks like a samurai sword through goat cheese. By the time you come to a complete stop, all the birds have been killed and you are practically within reach of the intruders.\n\n\t\t\t*choice\n\n\t\t\t\t#Take out as many as you can\n\n\t\t\t\t\tYou run for the large man with the axe before he has time to wield it against you. Stabbing the chef's knife into his neck, you feel blood run down your arm as the two of you begin to fall over. Pulling out the knife, you turn to the other intruders. But by now the rest of the group has surpassed the zoo gate. As you absorb your surroundings, you see that the invaders block any direction you might go. They close in on you, and you swing violently with the knife hoping you'll take them out.\n\n\t\t\t\t\tBut they are not mindless. You cut two while the others tackle you to the ground. They overpower you and hold you down while one grabs the axe from the big guy. While on your back, you see the executioner approach you.\n\n\t\t\t\t\t*fake_choice\n\n\t\t\t\t\t\t#\"Hey guys, is it too late to talk this over?\"\n\t\t\t\t\t\t\t\"Hey guys, is it too late to-\"\n\t\t\t\t\t\t#\"Burn in hell, you rotten scum of the earth!\"\n\t\t\t\t\t\t\t\"Burn in hell, you-\"\n\n\t\t\t\t\tYour words are cut short by the axe falling upon you.\n\t\t\t\t\t*goto_scene ending bad_ending\n\t\t\t\t#Turn and run\n\n\t\t\t\t\tThis was a terrible idea. Hopefully it is not to late to abort mission. You sprint in the other direction, hoping you are fast enough to reach the employee entrance at the opposite end of the zoo.\n\n\t\t\t\t\tBut your journey is cut short. Literally, because you feel a large sharp bite in the back of your thigh. You feel like a hippo has bitten your thigh with its hinged jaw, but when you lands on your stomach and peek back you see that an axe is sticking out of your leg!\n\n\t\t\t\t\t\"Shit,\" you shout in pain as the large man approaches you. He pulls out the axe, and you take the chance to swing the knife at him. From the ground, you only have enough reach to cut his arm, but he is unfazed. Swinging once more, you feel another razor sharp bite on your wrist as the knife flies away and you bring back a mangled hand.\n\n\t\t\t\t\tThe man hovers over you like a bee over a flower. He waits for you to stop squirming before speaking.\n\n\t\t\t\t\t\"Axe beats knife,\" he says.\n\n\t\t\t\t\t*fake_choice\n\n\t\t\t\t\t\t#Scoff\n\t\t\t\t\t\t#Spit in his face\n\t\t\t\t\t\t#Laugh\n\t\t\t\t\tThe man shows little joy in your response. Unfazed again, he stands up and swings the axe above him.\n\n\t\t\t\t\tYou raise a hand up as if you might block the axe, but all it does is prevent you from seeing your inevitable demise.\n\n\t\t\t\t\tYou do not see it. Nor do you feel it.\n\n\t\t\t\t\tYou simply cease to live.\n\t\t\t\t\t*goto_scene ending bad_ending\n\n*elseif (Animal = \"Zebra\")\n\n\tYou have slowly been training the zebra to be comfortable around you, even to the point of riding it like a horse on a few occasions. If you can manage to ride it into battle, its speed and agility could offer you an advantage against the group. Plus, you have the choice between three weapons you can bring with you.\n\n\t*choice\n\n\t\t#Shotgun (long range)\n\t\t\tWith a longe range weapon, you may be able to ride the zebra to quickly move from spot to spot. This way, the intruders will never know which direction to hide from until it's too late.\n\n\t\t\tJust inside the entrance to the zoo is a fork in the road leading three different directions deeper into the zoo. Your plan is to meet the invaders in this spot, creating a bottleneck effect around which you can travel and attack from any of the many paths. \n\n\t\t\tYou find a spot down one path that is far enough away to keep your distance but close enough for the shotgun to be effective. You reach your spot just in time. It appears the six intruders have entered the zoo and are organizing themselves at the bottleneck. This is your time to strike.\n\n\t\t\tThe zebra stops and you hope it remains steady long enough for you to keep the enemy in your imaginary crosshairs. You lift the barrel of the shotgun up and aim downsight. The nearest target is a woman carrying a sling of supplies over her shoulder. \n\n\t\t\tIt's a good thing you have her in your sights, because now she has you in hers. Fortunately, she is not holding a gun. Unfortunately, she is about to alert her comrades about your existence.\n\n\t\t\t*page_break Take the shot\n\n\t\t\tYou shoot, and barely have enough time to see your bullet reach its target. In the meantime, you feel your entire body falling backward. The zebra did not react well to your loud gunshot, and you don't have the handholds to avoid being bucked off.\n\n\t\t\tTo make things worse, as you're falling head first toward the ground, you feel something like a bullet hit you in the leg. For a split second, you're reminded that a zebra's kick is stronger than a horses. Then you feel your head slam against the ground.\n\n\t\t\tA few precious seconds are spent coming to, and you are woozy when you try to get back on your feet. When you do, your vision is blurry. But you can still tell that the zebra is nowhere to be found. Furthermore, the intruders have figured out where you are, and are closing the distance nearly as fast as the zebra is running away.\n\n\t\t\t*choice\n\t\t\t\t#Use the shotgun\n\t\t\t\t\tLifting the shotgun again, your vision is so blurry it is hard to focus on a single target. The good thing is that they are getting bigger, the bad thing is that means they are getting closer. You fire a shot, and honestly can't tell whether you hit somebody or not. All you know is there are a few of them who are already too close for you to reload in time. \n\n\t\t\t\t\tTurning the gun around in your hands, you take the baseball bat approach to the fight. The first pitch thrown to you is a man who is about your height. You swing with all your might, but connect with nothing. And this isn't baseball, so you don't get three strikes. You only had one chance, and you whiffed on it. \n\n\t\t\t\t\tThe man, who ducked under your swing, tackles you to the ground. Your head doesn't hit the ground again, but the forces of being knocked back blurr your vision even further. On top of everything, the wind is knocked out of you. There is little energy for you to expend trying to get this man off of you. Even if you had a chance, the reinforcements come in and swarm you like a mass of bees around their hive. The weight of them all is so heavy they might crush you before they can shoot you.\n\n\t\t\t\t\tAs the picture slowly comes into focus, the last thing you see is a figure walking up to you, pointing the barrel of your shotgun in front of your face, and pulling the trigger.\n\n\t\t\t\t\t*goto_scene ending bad_ending\n\t\t\t\t#Follow the zebra\n\t\t\t\t\tYou turn to run in the direction of the zebra, who is nowhere in sight by this point. But with your head injury you have less control of your legs. Your wobbly legs are less like a zebra and more like a baby giraffe. Considering you are being hunted by a pack of dingos, you have little chance of escape. They are all on you in a matter of seconds. \n\n\t\t\t\t\tA last ditch effort to point the shotgun proves worthless. The weapon is yanked from your grip before you have time to aim, let alone pull the trigger.\n\n\t\t\t\t\t\"You kill,\" the figure floating above you says, \"we kill.\"\n\n\t\t\t\t\tThe simplified language is an odd way to phrase that they are avenging their friend's death, but it may be a greater explanation of what the world has come to. Simplified language is necessary for survival, so even though these people are more like animals than humans, they are the ones who now have control of the zoo.\n\n\t\t\t\t\tThe inmates are now running the asylum.\n\n\t\t\t\t\tAnd the head inmate puts the gun to your head, killing off the last bit of sanity left in the world.\n\n\t\t\t\t\t*goto_scene ending bad_ending\n\t\t\t\t\t\n\t\t#Pistol (short range)\n\t\t\tRiding the zebra like a horse may give you the opportunity to get close enough to fire your pistol without getting too close. Just as long as the zebra doesn't attack you first.\n\n\t\t\tAll signs are positive when you approach the zebra. No showing of the teeth. No aggressive noises. Completely patient as you place the saddle on. Likely unaware of what you are about to ask of it.\n\n\t\t\tRaising yourself up onto the zebra's back, you feel a connection with the animal. Your movements are in sync with each other, and you feel comfortable as you find your spot.\n\n\t\t\tJust inside the entrance to the zoo is a fork in the road leading three different directions deeper into the zoo. Your plan is to meet the invaders in this area, creating a bottleneck effect around which you can travel and attack from various angles. \n\n\t\t\tYou are ready in time for the intruders to collect themselves exactly where you need to attack. One hand raising the pistol and the other still holding onto the saddle, you take aim just as one of the women in the group notices your presence.\n\n\t\t\tShe points at you and lets out a maniacal screech just as you fire the first of your four bullets. Just as the bullet flies through the air and collides with its target, you feel yourself being lifted up in the air.\n\n\t\t\tThe zebra has gone up on his hind legs in response to the gunshot you just took right by his head. He lets out a squeel and takes off running. If you didn't have your second hand free, you'd fall backwards into the ground. Instead, you and the zebra are running full speed into the danger.\n\n\t\t\tYou've only ever gone this fast in some kind of vehicle. This amount of force is new, and the wind in your face forces you to squint just to know you're not heading over a railing soon. Once your eyes adjust, you realize you are still heading directly for the group of intruders.\n\n\t\t\t*choice\n\t\t\t\t#Jump off the zebra\n\n\t\t\t\t\tYou gotta know when to hold 'em and when to fold 'em, and you're choosing to fold 'em before you're too late. You slide one leg over the top of the zebra and throw yourself to the ground. With a successful tuck and roll, you are only a little bruised up from the landing. Taking no time to dust yourself off, you watch the zebra continue into the pack of intruders. While the enemies are thoroughly distracted, you run back in the direction you came.\n\n\t\t\t\t\tMaking your way toward the far end of the zoo, you sneak through the employee entrance and outside the zoo. \n\n\t\t\t\t\t*page_break Two days later\n\n\t\t\t\t\tYou haven't gone this long without food in a while. You were a bit spoiled in the zoo, all the food to yourself. Now you scavenge for minimal return, and haven't really found anything in the immediate vicinity of the zoo. A heavy price you had to pay for your life.\n\n\t\t\t\t\tMeanwhile, you can only imagine how tasty the zebra must be to the intruders.\n\t\n\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t#Keep shooting\n\t\t\t\t\tLike a cowboy in the wild wild west, you keep firing. Two more direct hits let them know there you're the sheriff in town, and they need to get the hell out of Dodge. \n\n\t\t\t\t\tEven the zebra with no name takes part in the action, rearing up again and using its forelegs to knock another intruder to the ground. While on the ground, the zebra digs in with his teeth. He chomps at the screaming victim who is helpless against the four-legged foe.\n\n\t\t\t\t\tAnother enemy starts for the zebra with some kind of blunt weapon. You protect your mate with another accurate shot to the enemy's chest. \n\n\t\t\t\t\t[i]There's one more[/i], you think to yourself. But you don't see the sixth enemy in front of you. Rotating your torso, you find the final opponent behind you and the zebra. He is huge, nearly the size of the zebra. Worst of all, he is coming at you with a handaxe. He'll certainly be able to reach you, even from your height on the zebra.\n\n\t\t\t\t\tWith hubris, you smirk and raise your pistol. A single twitch of the finger and...\n\n\t\t\t\t\tNothing...\n\n\t\t\t\t\tYou're out of bullets.\n\n\t\t\t\t\t*page_break\n\n\t\t\t\t\t\"Shit,\" you say.\n\n\t\t\t\t\tThe big scary man's eyes light up when he realizes you can't stop him. He brings himself just within reach and winds up his axe like a rattlesnake recoiling.\n\n\t\t\t\t\tThen the zebra's leg extends backward with the force of a jackhammer. He kicks the man in the face, crushing it inward. The man's head barely stays on his body, which lands eight feet back from where the man was standing. \n\n\t\t\t\t\t\"Woah,\" you say, and not as a means of halting the zebra. You are just surprised by the damage done. \n\n\t\t\t\t\t\"Remind me to never make you mad,\" you say to your friend. Looking around reinforces your statement. Just you and a damn zebra, taking out six intruders in under a minute. \n\n\t\t\t\t\t*page_break One week later\n\n\t\t\t\t\tThe zebra is no longer skittish when you approach him. After what you've been through, he knows you're there to protect each other. A zebra would have been last on your list of expected closest friends in the apocalypse, and not just alphabetically. Just because it doesn't seem normal.\n\n\t\t\t\t\tBut then again, there's no normal life. Not anymore, at least. It's just life.\n\n\t\t\t\t\tAnd you've gotta get on with it.\n\n\t\t\t\t\t*goto_scene ending\n\n\t\t#Knife (up close and personal)\n\n\t\t\tWith the speed of the zebra, there is a chance you can slice and dice with the ability to escape from being injured yourself. \n\n\t\t\tYou make sure the zebra does not see the knife when you are trying to ride him. It would not be pretty if he saw your knife and thought you had dangerous intentions. Fortunately, the zebra is calm when you approach. Nothing to suggest you will be attacked. \n\n\t\t\tThe best location for your battle ground is in the center of the zoo, where many paths converge at different angles. This presents you with mulitple options for attacking and fleeing strategies. \n\n\t\t\tFrom your vantage point near the flamingo pond, you see all the intruders have started exploring the zoo. All of them have stayed together like a school of fish. Smart move, because they are likely to be stronger together than if they were to split the party. It may have been easier if you could ride the zebra between one enemy at a time. No matter now, because whether or not they are together you are going to need to take them out.\n\n\t\t\t*page_break Start the fight\n\n\t\t\tYou grab onto the reins of the zebra so hard your knuckles are as white as an mute swan, then kick your heels into the zebra's ribs. \n\n\t\t\tAnd nothing happens. \n\n\t\t\tYou kick again and the zebra rotates his head to put you in his eyesight. You've been on the receiving end of this look before, but not from a zebra and not in many years. It is a parental look as if to say, \"You better not do that again.\" It may be in your best interest to stay on the zebra's good side, but it won't matter if you don't successfully defend yourselves against the intruders.\n\n\t\t\t*choice\n\n\t\t\t\t#Kick again\n\t\t\t\t\tYou slam the inside of each foot into the zebra's ribs to assert your dominance. But the zebra has other ideas about who is dominant. Your body is pushed forward as the zebra pushes with his hind legs. If you weren't holding the reins hard before, you are now to avoid getting bucked off. But it isn't like a bull-riding competition, because eight seconds won't be enough. The zebra bucks and spins around two-and-a-half times, then speeds off in a direction opposite the invaders.\n\n\t\t\t\t\tYou're a bit dizzy from the spinning, but you are able to hold on a bit longer while the zebra speeds to over thirty miles per hour. As your vision clears, you see the flamingo pond just a few feet in front of you. The zebra stops abruptly and you go flying forward. After a full front flip, you splash into the water. It is shallow enough to stand. As you rise and rush to the edge, you see the zebra running off away from you. Further away you can see the intruders are on their way over to you. Having ridden the zebra for a few seconds, you are quite a great distance away. Thus, you leave the pond and run sopping wet to the employee entrance at the other end of the zoo.\n\n\t\t\t\t\t*page_break That night\n\n\t\t\t\t\tYou're happy to have escaped from the intruders, considering how horribly it could have gone. That being said, you've been miserable ever since. Your wet clothes started chaffing against your skin, and the cooling temperature of the evening is giving you hypothermia. You've had to remove your clothes for now, until they dry completely. In the meantime, you are naked in the first empty house you could find. Sadly, it appears all clothing that existed here was taken with whatever family chose to abandon their home at the time of the collapse.\n\n\t\t\t\t\tReflecting on what has occurred over the last day, you think about it as a de-evolution of yourself. First, as a member of a flourishing city, even if that city was contained within the confines of a local zoo. Then as someone whose weapons of choice were a four-legged animal and a knife. Now, you're naked and bearing the harsh conditions with little more than you were born with. \n\n\t\t\t\t\tFrom this, you hope you can be more in tune with your ancestors. If they could do it, so can you. You're just as strong as them, and you have something the cavemen didn't.\n\n\t\t\t\t\tA vision of what life could be.\n\n\t\t\t\t\t*goto_scene ending\n\n\t\t\t\t#Don't kick\n\t\t\t\t\tAs much as you feel like you should, you decide against an action that could create one more enemy for yourself. With the invaders in the zoo, you already have all the opposition you need.\n\n\t\t\t\t\tOn the subject of the intruders, they seem to have come closer during your interaction with the zebra. You didn't make much noise, but you didn't need to. A woman in the group finds you with her eyes and not her ears. She points in your direction, then speaks something inaudible from your distance. It doesn't take a genius to find out what she is saying. Especially when every other member of her group turn their heads and spot you.\n\n\t\t\t\t\tIn the moment they see you, all the intruders begin their assault. You must think fast on what to do. The zebra may not know what is about to happen, so you probably shouldn't try kicking it again. But what, then?\n\n\t\t\t\t\t*choice\n\n\t\t\t\t\t\t#Stay on the zebra and fight\n\t\t\t\t\t\t\tIt feels odd not to flee when there are six enemies all coming at you, but you do have the height advantage from the top of the zebra. You can see all the weapon
