From there, you can see a huge, thick, dark-red blood trail leading to the warehouse door. It sends shivers down your spine. ${leftsurvivor} slides down the hill, and you do the same. Sliding down doesn't feel very good with your fresh wound, and you make sure it doesn't open up again. You step over the dead aviatrix and head into the warehouse. ${leftsurvivor} readies his pistol as you follow the blood trail between the shelves.\n\nWhen you reach the end of the corridor, ${leftsurvivor} looks at you with a raised gun before he steps out of cover. You do the same and look left to right. Dried blood is everywhere, and a disgusting rotten smell fills your lungs. No matter how hard you search, you can't find the guns anywhere.\n*if (wackwound)\n   \n You turn your head to the left and see what's left of ${deadsurvivor}. It doesn't only remind you, but makes you relive the events for a quick moment. ${leftsurvivor} pats your back and turns you away from the sight.\n   \n \"Okay. I don't know where the guns are, but…you seriously have to learn how to shoot. We can't have another situation like this. I mean, if you knew how to shoot, maybe both of us would still be alive.\" He lowers his pistol and scratches his head.\n *choice\n  #\"You both had guns…\"\n   *set Ryan %-8\n   \"You both had guns…and knew how to shoot,\" you say, slightly offended and crossing your arms.\n\t \n   \"Hey! We got ambushed, and it all happened so quick! You can't blame us!\" He crosses his arms too. \"My point is…you have to learn how to defend yourself. And I have an idea, but…don't freak out,\" he says as he glances over at the tall, skinless creature lying dead on the ground, then looks back at you. \"Help me move it.\"\n   *goto ryancont\n  #\"Yeah. Okay.\"\n   *set Ryan %+8\n   \"I'm glad you agree. Don't blame yourself though, okay?\" He pats your back a couple of times. \"You just have to learn how to defend yourself. And I have an idea, but…don't freak out,\" he says as he glances over at the tall, skinless creature lying dead on the ground, then looks back at you. \"Help me move it.\"\n   *goto ryancont\n  #Remain silent.\n   \"I'm—I'm sorry, I didn't mean it like that. Don't blame yourself, okay? You just have to learn how to defend yourself.\" He pats your back a couple of times. \"And I have an idea, but…don't freak out,\" he says as he glances over at the tall, skinless creature lying dead on the ground, then looks back at you. \"Help me move it.\"\n   *goto ryancont\n*else\n *goto malcolm1\n   \n\n  \n \n*label ryancont\n\nAfter slowly walking to the creature, ${leftsurvivor} kneels down next to it and looks at you. \"All right. The plan is, we move it to the wall where the shelves are, then we use my knife to fix it to the wall by its arms. Lift on three. One…two…three!\"\n\nHe grabs hold of the creature's left arm, and you do the same with its right arm. The feeling of the bare, cold muscles and meat puts a disgusted look on your face. You begin to lift it, and the gooey blood runs down your hand. As quick as you can, you drag it to the wall. It goes rather fast, despite its size. \n\nWhen you slam it against the wall, ${leftsurvivor} nods once, then looks at its arm. You push its right arm against the wall, and ${leftsurvivor} passes his knife to you. You jab it into its arm, but it doesn't get stuck in the wall, so you do it one more time with all your strength. ${leftsurvivor} picks up a glass shard lying nearby and does the same. It breaks in the process and leaves a small cut in his palm. \n\nYou both pant and wipe the gooey, dark-red blood off as you walk further back between the shelves.\n*label practiceshot\n*page_break\n\n\"All right, we don't have much ammo, so we'll use a maximum of one mag. That means ten bullets. Okay, take your gun out and hold it like this,\" he says and holds his pistol at his face, with his elbows slightly bent. You look at him and copy his position. \n\n\"Now, spread your legs a little. It helps when you shoot. Then hold it like this, close one of your eyes, hold back your breath for a moment until you shoot and…\" He sends a bullet right into the head of the creature. \"Your turn.\"\n\nYou spread your legs a little and aim down the sight. You hold your breath back, then squeeze the trigger. It kicks back hard and almost hits your face. The bullet pushes into its left shoulder.\n\n\"Be careful, and hold it tight so it doesn't hit you in the face. Not bad though, at least you hit it. Try again.\"\n*choice\n\n #Aim slightly right and up.\n  *label wrong\n  You aim down the sight again, squeeze the trigger…and hit the wall farther away from its head.\n  \n  \"The height was right. You just have to move it in the right direction. Try it again.\"\n  *choice\n   #Aim a lot to the left.\n    You aim down the sight and squeeze the trigger. A smile appears on your face when the bullet goes right between its eyes. \n\t\n    \"Good one. Do it one or two more times.\" He crosses his arms, and you carefully shoot it in the head two more times.\n    *goto cont3\n   \n   #Aim a lot to the right.\n    *set Ryan %-5\n    You aim down the sight and squeeze the trigger. It hits the wall even farther away. ${leftsurvivor} shakes his head and stands behind you. He helps you aim until you finally hit it in the head. \n\t\n    \"Do it a couple more times.\" He crosses his arms, and you carefully shoot it in the head two more times.\n    *goto cont3\n\n\t\n \n #Aim slightly left and up.\n  *set Ryan %+5\n  You aim down the sight and squeeze the trigger. A huge smile appears on your face when the bullet pushes deep inside its head, right between the eyes. \n  \n  \"Wow. Not bad, champ. You might be a natural. Do it one or two more times.\" He crosses his arms, and you carefully shoot it in the head two more times.\n  *goto cont3\n \n #Aim up.\n  *goto wrong\n \n\n\n \n \n \n*label malcolm1\nYou turn your head to the right and see what's left of ${deadsurvivor}. It doesn't only remind you, but makes you relive the events for a quick moment. ${leftsurvivor} pats your back and turns you away from the sight.\n   \n\"This is odd. I don't see the guns. Anyway, you seriously gotta learn how to shoot. We can't have another situation like this. I mean, if you knew how to shoot, maybe both of us would still be alive, kid.\" He lowers his pistol and scratches his head.\n*fake_choice\n #\"You both had guns…\"\n  *set Malcolm %-8\n  \"You both had guns…and knew how to shoot,\" you say, slightly offended and crossing your arms.\n\t \n  \"Well, we got ambushed, there was nothing we could do!\" He crosses his arms too. \"My point is, though, you gotta learn how to defend yourself. We'll just have to find out how…\" He rubs his chin.\n  *goto malcolmcont\n\t \n\n\t\n #\"Yeah. Okay.\"\n  *set Malcolm %+8\n  \"I'm happy you agree. Don't blame yourself though, okay kid?\" He pats your back a couple of times. \"You just gotta learn how to defend yourself. That's all. We'll just have to find out how…\" He rubs his chin.\n  *goto malcolmcont\n\t\n\t\n #Remain silent.\n  \"Look…I'm sorry, I didn't mean it like that. Don't blame yourself, okay kid? You just gotta learn how to defend yourself.\" He pats your back a couple of times. \"We'll just have to find out how…\" He rubs his chin.\n  *goto malcolmcont\n\n\t \n\t \n*label malcolmcont\n\nYou hear a loud grunting sound coming from above, and ${leftsurvivor} pushes you to the ground. Your arm burns with pain, and blood drips through your bandage. You glance up and see the tall, skinless creature holding a long, sharp knife and looking down at you. ${leftsurvivor} stands behind him and fires his pistol a couple of times. You roll away, and the creature falls to the ground. It grunts for a while, then stops moving.\n\n\"You…\" ${leftsurvivor} walks over to it and kicks it a couple of times, then he curses and glances over at the body of ${deadsurvivor}. He stops to breathe hard, with an angry look on his face. You get up, and he looks at you. \n\n\"I have an idea, but…don't freak out, okay?\" he says as he glances over at the tall, skinless creature lying dead on the ground, then looks back at you. \"Help me move it.\"\n\nAfter slowly walking up to the creature, ${leftsurvivor} kneels down next to it and looks at you. \"All right. The plan is, we move it against that wall.\" He points to the wall, where the shelves meet the corridor. \"Then, we'll use my knife to fix it to the wall by its arms. Lift it on three. One…two…three!\" He grabs hold of the creature's left arm, and you do the same with its right arm. \n\nThe feeling of the bare, cold muscles and meat puts a disgusted look on your face. You begin to lift it, and the gooey blood runs down your hand. As quickly as you can, you drag it to the wall. It goes rather fast, despite its size. \n\nWhen you slam it against the wall, ${leftsurvivor} nods once, then looks at its arm. You push its right arm against the wall, and ${leftsurvivor} passes his knife to you. You jab it into its arm, but it doesn't get stuck in the wall, so you do it one more time with all your strength. ${leftsurvivor} picks up a glass shard lying nearby and does the same. It breaks in the process and leaves a small cut in his palm. \n\nYou both pant and wipe the gooey, dark-red blood off as you walk further back between the shelves. You take a good look at it. The combination of meat, muscles, and bone looks terrifying.\n*goto practiceshot\n \n \n\n*label cont3\n*page_break\nYou turn around, and you're about to put your pistol back in your waistband when you see movement on top of the shelf to your left. \n\n\"You have three seconds to get down from there if you're human. Otherwise, I'll start shooting.\" ${leftsurvivor} aims his gun at the figure, so you do the same. The figure sighs and jumps down from the shelf. Someone with dark skinny jeans, a motorcycle jacket, black leather gloves, and a scarf wrapped around their neck partly covering a gas mask stands in front of you with a small backpack.\n\n\"Hands up. What are you doing here?\" ${leftsurvivor} aims his pistol at the person.\n\n\"Just…getting by. You know how it is,\" the mysterious figure says with a female voice.\n\n\"You're a girl?\" ${leftsurvivor} asks, still pointing the gun at her.\n\n\"What do you think? Duh,\" she says, shrugging with her hands still in the air.\n\n\"What should we do with her?\" ${leftsurvivor} mumbles and looks at you from the corner of his eye.\n*fake_choice\n #\"Check her for loot.\"\n  *set Evil %+5\n  ${leftsurvivor} nods and walks closer to her, still aiming his gun at her.\n  \n  \"Hey! Don't hurt me, I'll just give you all I have on me,\" she says and slowly lowers her hands. \n  \n  All of a sudden, she grabs ${leftsurvivor}'s hand and punches the pistol out of it, sending it to the ground. She reaches behind herself, pulls a similar pistol from the back of her jeans, and pushes ${leftsurvivor} away with the barrel of it. You aim your pistol at her, and she does the same to you. \n  \n  \"I think we both know who would win this fight. Especially if I start moving. I'm not a dead monster. I can move around. I could still shoot you then, but you…you haven't had the proper target practice. Unless you call what you did back there one,\" she says and steadily puts her gun back. \"Look, if I wanted to kill you, I would've done it a while ago.\" She walks over to ${leftsurvivor}'s pistol and kicks it to him.\n  \n \n #\"Let her go.\"\n  *set Evil %-5\n  \"What? We can't just let her go!\" ${leftsurvivor} glances at you.\n  \n  \"Yeah, because I obviously wanted to lay waste to you. Look, if I wanted to kill you, I'd have done that by now. Without any problem. I only would've had to take you out first.\" She points at ${leftsurvivor}, then looks at you. \"No offense, kid, but that thing you did back there isn't nearly enough to keep you alive when they run at you. That's not proper target practice.\" \n \n\n\n #\"I don't know.\"\n  \"You don't know? Heh, I wonder how you could still be alive. Being indecisive out here isn't really a helpful trait. You must've gotten lucky along the way. Can I put my hands down now?\" \n  \n  \n  \n*line_break  \n*line_break  \n\n${leftsurvivor} puts his pistol away, and you do the same. \n\n\"I think we're off to a bad start. I'm ${survivor3}.\" She offers a hand. ${leftsurvivor} gives you a suspicious look, but you both shake her hand and share your names with her. \"So…what's you guys' story? And how old are you?\" she asks and leans against the shelf with her arms crossed, looking at you.\n*achieve lizzie\n*set rep5 1\n\nEventually, you sit down and tell her about your life before the bomb, the bunker, ${capturer1}, and ${base}. ${leftsurvivor} mentions the recent events. All without getting too much into the details and glancing over at ${deadsurvivor} every now and then.\n\n\"Wow, it seems like you guys have been through a lot.\" She shrugs a little and rubs her arm. \"I've found my place with these scientists. In return, I go out and gather the things they need. They're good guys, since they want to put the district back the way it was, but they can be obsessed over some things. \n\n\"Also, it would be nice if you guys kept our existence a secret. Not many people know where our base is, and we prefer it to stay that way. I know the peeps back at ${base} all too well…but judging by your story and that you're not dragging me back there to work against my will, I guess you can be considered okay. So, if you can wait a couple of minutes, I'll bring back something for you, so you don't have to go back empty-handed. As I said, I know how things work there. I'll be right back.\" She stands up and walks towards the exit.\n\n${leftsurvivor} rips the knife out of the creature and holsters it. The glass in its other arm breaks, and it slams on the ground. \"So…do you think she can be trusted? Or should we just head back? I'm pretty sure there's something in at least one of the crates we didn't look at. Or…in the staff room.\" He looks down and scratches his head. \n*fake_choice\n\n #\"I trust her.\"\n  *set Lizzie %+5\n  *set warehouse true\n  \"All right. Fair enough, I guess. Besides, what's the worst that could happen? They kidnap us and do experiments on us?\" ${leftsurvivor} chuckles, then his smile fades as he turns to you. \"Don't panic, that's…probably not the case.\"\n  *page_break\n  \n  After about an hour of waiting, she walks into the warehouse and puts her backpack down in front of you. She takes out some canned food and bottled water. While ${leftsurvivor} packs them into his backpack, she leans closer to you. \"So, you're an Arkadian scavenger, huh?\" she whispers with a slight chuckle, then turns to ${leftsurvivor}. You stand up and thank her, then walk towards the exit.\n  \n  \"If you guys wander around here tomorrow, I'll…probably be here. Just saying,\" she says and walks towards the exit too. When you reach the exit, you part ways and head home.\n  *page_break\n  \n\n \n #\"I don't trust her.\"\n  *set Lizzie %-5\n  \"Yeah, me neither. I'll go through the staff room, you open crates, and we'll be done in no time, okay?\" he says as he jumps to his feet and flips his knife out. You nod and get up, then he heads into the staff room. You kneel down next to some unopened crates and force them open one by one with your hands. \n  \n  You don't find anything useful until you open the last crate. It doesn't seem like an ordinary crate. It's packed with a couple of cans, bottled water, and some stuffed animals. You put everything useful in your backpack as quickly as you can.\n  \n  \"No luck for me. Only scrap in there. What about you?\" ${leftsurvivor} asks, already heading towards the exit.\n  \n  \"Just a couple of things,\" you say and follow him. When you reach the exit, you release a sigh and head home.\n  *page_break\n  \n  \n\n\n\nWhen you step out of the decontamination chamber and take the gas mask off, ${capturer1} is already standing in front of you. \"Hey, guys! It's good to see you and all that. ${firstname}, in my office after you're done unpacking,\" he says with a grin and heads up the stairs. You unpack, and ${leftsurvivor} pats you on the back before you head upstairs and enter his office. You sit down in the usual chair, and he sits in his armchair.\n\n\"So, how was your first day back in business? Good? Good! Anyway, you've been sitting in that chair more times now than anyone before you. Now, that's not going to change, and this is the part where you get excited: I plan for you to come here after every day and do your daily report. It'll give our friendship a kick-start! Oh boy, am I eager to listen! So, anything interesting happen today?\" he asks and leans back with a smirk on his face.\n*fake_choice\n\n #\"We found a girl living with scientists.\"\n  *set Ivan %+5\n  *set report2 true\n  *set reportedtimes +1\n  *set Evil %+5\n  \"Well, that's something. If only we knew where those fanatics are hiding…\" His eyes look sharply into yours. \"You know what to do, kiddo. Make ol' ${capturer1} proud, will ya?\" He takes a small bottle of whiskey out of the bottom drawer and puts it on the table. He's about to open it but stops and keeps looking at you.\n  \n  \"I thought this was a clear sign that we're finished.\" He twists it open, and you stand up to leave.\n  *page_break\n  \n \n \n #\"Nope, nothing.\"\n  *set Ivan %-5\n  *set Evil %-5\n  He looks sharply into your eyes. \"I have a hard time believing that. But hey! Maybe tomorrow you'll make me proud, right? I certainly do hope so.\" He takes a small bottle of whiskey out of the bottom drawer and puts it on the table. He's about to open it but stops and keeps looking at you.\n\n  \"I thought this was a clear sign that we're finished.\" He twists it open, and you stand up to leave.\n  *page_break\n  \n  \nYou go to the basement, where ${capturer2} gives you a firm push towards the ladder. You climb down the basement ladder and turn towards ${leftsurvivor}, who's yawning on his bed. You smile and collapse onto your own bed. You let your feet dangle off the bed as your eyes slowly begin to close. \n\n\"${firstname}.\" ${currentbf} shakes your shoulder gently. \"Do you like being a scavenger? I mean, I'm working in the greenhouse, and it's boring as hell, but…I don't know if I could be a scavenger. Just looking at your wound and…and things with ${capturer1}. Be honest with me, do you like being a scavenger?\" ${currentbf} asks, ${hisher} fingers poking at your legs.\n*fake_choice\n\n #\"Yup. It's fun.\"\n  \"Ah, I see…okay, well who knows, I might apply to be a scavenger too one day.\" ${currentbf} giggles and hops into ${hisher} bed. \"Good night.\"\n  \n #\"No, I hate it.\"\n   \"Ah…that's what I thought. Well, good night.\" ${currentbf} pats your leg and hops into ${hisher} bed.\n   \n\nYou mumble a 'good night' and fall asleep in no time.\n*page_break\n\nThe next morning, you do your usual routine and put on your gas mask at the decontamination chamber. You look behind yourself and see ${capturer1} walking down the stairs, giving you a wink followed by a grin. You turn back and walk into the decontamination chamber. After the usual procedure, you stand outside the fence.\n\n*if (warehouse)\n \"So…I guess back to the warehouse, then? I mean, I don't mind if she brings us loot, and we don't have to risk our lives. I've had more than enough excitement already. I just wonder what she gets out of all this,\" ${leftsurvivor} says as you walk down the all too familiar path. A couple more days, and you'll master the art of sliding down hills.\n \n You enter the warehouse and find ${survivor3} sitting on a shelf, spinning the backpack around from yesterday.\n \n \"About time,\" she says and throws the small backpack towards you, then jumps down. \"You guys don't know what looting is about. I found this inside one of the crates on the top shelves. So, what's the plan for today?\" she asks and walks next to you.\n\n \"Nothing. We wait until sunset and head back with the loot,\" ${leftsurvivor} says, already stuffing the contents of the smaller backpack into his own.\n\n \"That's…actually not a lot of fun. But safe, I guess. All right, you got it,\" she says and slides down into a sitting position. \"Since you don't have to do anything now, how about we chat a little? I don't get to talk about anything except scientific stuff back there, but I've always been bad at science, so…\" She shrugs, then looks at you as you and ${leftsurvivor} sit down. He hands her the bag, and she puts it down next to herself.\n \n You talk for a while, and she mostly tells about life back at the scientist base. When the sun begins to go down, she stands up with the backpack in her hands and stretches her limbs. \"Come find me tomorrow at the same time,\" she says and heads outside. You stand up and stretch your limbs too, then head home.\n *goto cont4\n\n\n\n\n\n\n\n*else\n \"So…I guess we'll go there.\" ${leftsurvivor} points towards the main road, and you head that way. You're not so eager to do the long walk until you find something again, but you don't complain. After you pass a small truck, a backpack smashes hard against the ground.\n\n \"It's not like I waited until dawn back there for you or anything…jerks.\" ${survivor3} jumps down from the top of the truck in front of you, and picks up the backpack. After murmuring something, she pushes it firmly against ${leftsurvivor}. You both look at each other, then ${leftsurvivor} kneels down to put the contents of the backpack into his own.\n \n \"So…what now?\" she asks with her arms crossed.\n \n \"Nothing. We wait until sunset and head home. I've had more than enough excitement for a lifetime.\" ${leftsurvivor} hands her the empty backpack.\n \n \"That's…actually not a lot of fun. But safe, I guess. All right, you got it.\" She shrugs a little, then climbs on top of the truck. \"Since you don't have to do anything now, how about we chat a little? I don't get to talk about anything except scientific stuff back there, but I've always been bad at science, so…\" she says and offers you a hand. You grip her arm tightly, and she helps you climb up on top of the truck. You sit down, and ${leftsurvivor} does the same. \n \n You talk for a while, and she mostly tells about her life back at the scientist base. When the sun begins to go down, she stands up with the backpack in her hands and stretches her limbs. \n \n \"Come find me tomorrow at the same time around the warehouse. But this time, do come,\" she says and jumps off the truck. You stand up and stretch your limbs too. ${leftsurvivor} jumps down, and you do the same. It hurts your ankle a little, but you shake it off and head back to the base.\n *goto cont4\n   \n\n\n   \n\n   \n   \n*label cont4\n\nYou put your gear down as usual and head towards the basement. You look to your left and see ${capturer1} looking at you with raised eyebrows. You shake your head a little, and he turns around to walk up the stairs. You have dinner, which is some herbs and vegetables as usual, then climb into bed, where you pass out instantly.\n*page_break The following morning…\n\n\"I hope she'll bring us free loot every day. I'm not so eager to fight off mutants and wander around new places,\" ${leftsurvivor} says as he opens the warehouse door. \n\n${survivor3} is laying on a crate on her back, and only sits up when you're close to her. \n\n\"Finally! I was afraid I'd have to go look for loot on my own. So, what are we waiting for?\" She jumps to her feet and gives you and ${leftsurvivor} a pat on your backs as she walks past you. \"What? You didn't think I'd bring you loot every day, right? And besides, strength is in numbers!\" She laughs and walks out the door.\n\n\"So much for the plan.\" ${leftsurvivor} sighs and looks at you, before you head outside and follow her.\n\nYou keep on walking and talking for a while on the dirty narrow road leading in the opposite direction from where you came. ${leftsurvivor} walks faster than the two of you. He peeks into the small wooden houses and checks for threats.\n*if (wackwound)\n \"So, he's your brother or something?\" she asks, glancing at you.\n *fake_choice\n  #\"Yes.\"\n   *set Ryan %+10\n   *set leftsurvtoldtobe \"brother\"\n   \"That's cool. At least you guys have each other. It's good to have family,\" she says, and you notice ${leftsurvivor} peeking back at the two of you.\n   *goto cont5\n  \n  #\"No, he's my neighbour.\"\n   *set leftsurvtoldtobe \"neighbour\"\n   \"Ah, I see. Well, at least you guys know each other. It's good to have someone looking out for you,\" she says, and you notice ${leftsurvivor} peeking back at the two of you.\n   *goto cont5\n  \n  #\"No, he's just someone.\"\n   *set leftsurvtoldtobe \"someone\"\n   \"Ah…I see. Well, at least you guys take care of each other now, right?\" she says, and you notice ${leftsurvivor} peeking back at the two of you.\n   *goto cont5\n \n*else\n \n \"So, he's your dad or something?\" she asks, glancing at you.\n *fake_choice\n  #\"Yes.\"\n   *set malcolm %+10\n   *set leftsurvtoldtobe \"dad\"\n   \"That's cool. At least you guys have each other. It's good to have family,\" she says, and you notice ${leftsurvivor} peeking back at the two of you.\n   *goto cont5\n  \n  #\"No, he's my neighbour.\"\n   *set leftsurvtoldtobe \"neighbour\"\n   \"Ah, I see. Well, at least you guys know each other. It's good to have someone looking out for you,\" she says, and you notice ${leftsurvivor} peeking back at the two of you.\n   *goto cont5\n\n  \n  #\"No, he's just someone.\"\n   *set leftsurvtoldtobe \"someone\"\n   \"Ah…I see. Well, at least you guys take care of each other now, right?\" she says, and you notice ${leftsurvivor} peeking back at the two of you.\n   *goto cont5\n  \n  \n  \n  \n\n\n  \n*label cont5\n\nYou pass a couple of small houses and take a right turn, when ${leftsurvivor} crouches down behind a bush and motions fir you to do the same. You both sneak behind the bush and peek over to see a tall, skinless creature fighting with a flying ray-like creature. It holds a large, broken glass piece and growls loudly. The flying creature stings it a couple of times with its tail, then flies high and takes a dive at it. The creature raises the glass and jumps on the creature in mid-air, sending it down on the ground.\n\nThe ray-like creature struggles and stings it a couple more times. Blood splashes around them, and the skinless creature stabs the glass shard deep into it, until it stops moving. Blood runs down its body. The creature throws the glass shard away and begins to feast upon the creature.\n\n${leftsurvivor} clenches his fists and grips his pistol tight. ${survivor3} looks at him and takes out a long ice pick. \n\n\"Lemme show you how it's done. The professional way.\" She chuckles and moves out from the bush to sneak behind the creature. It's crouching over the dead body and takes a bite out of it every now and then. ${survivor3} readies herself, then jumps on it and stabs it in the top of its head a couple of times. When it falls to the ground, she kicks herself off of it and walks towards you. She puts the ice pick away and giggles.\n\n\"The top of their heads are the most vulnerable. Just like babies.\" ${leftsurvivor} looks at you before you stand up and follow her on the long road. Eventually, you arrive at a huge house with a huge broken metal fence out front with spear-like ends. \n*page_break\n\n\"Look at that mansion! It looks untouched to me. Might be our lucky jackpot here,\" she says as she squeezes herself through the broken fence. You do the same, but ${leftsurvivor} stays outside. You look at him as he takes his pistol out. \n\n\"I'll wait here. I don't think I can push myself through that gap. And someone has to watch out. Just hurry up.\"\n\nYou and ${survivor3} walk down the long path leading to the house. The warm, steaming ground, the extremely high humidity, and the big dark-green plants and trees remind you of a jungle. You walk past the huge fountain. It's broken in several places, and shiny red water pours from it. You walk around it and stop at the front of the house.\n\nA huge statue with a sword in its hand greets you, its head missing. Stairs lead up to the entrance left and right, and you see closed garage doors on both sides of the stairs.\n\n\"Imagine if there were fully working cars in there. Our opportunities would be doubled.\" She shakes her head slightly and sighs. \"Keep on dreaming, ${survivor3}, keep on dreaming.\" She heads up the stairs to the right, and you follow her. The front door seems to be intact, except for the window in the middle. She tries to open it, but it doesn't budge. She takes the ice pick out and jabs it between the frame and the door. After a couple of seconds, the door breaks open. \n\n\"It's a handy little tool.\" She smiles, and you walk inside. The glass crackles under your feet as you look around.\n\nThe inside of the house is very dark. On your left, you see a large kitchen, on your right seems to be a room with a pool table, darts, and other games. In front of you is a huge hallway leading to what seems to be a living room. On the left side of it is a big staircase leading up.\n\n\"Did we…pass a district? Or it's the mansion of one of the higher-ups? God…\" She wanders into the kitchen. A huge rat with glowing red eyes runs past you. You search through a couple of cupboards and drawers, putting everything that's not spoiled into your backpack. She does the same and walks over to the fridge. \n\n\"Do I really want to know what's inside?\" She opens the door, but quickly smashes it back. \"I shouldn't have.\" \n*page_break\n\nYour backpack feels heavy, but you still can't take all the food. \"This is a gold mine. For real!\" She walks out to the hallway and drops her backpack. With a slight chuckle, she walks into the room with the billiards and other bar games. \n\n\"Come, let's play a round of billiards. I'll teach you,\" she says, already picking up the cues. You drop your backpack next to hers and walk into the room.\n\n\"Not bad. For a first timer,\" she chuckles when you score the 4th ball in a row. \"Is this your payback for winning three times already?\" She laughs, and you do the same. You've been at it for a while now, and this is the first time in a while that you've actually felt happy. You miss the ball, and she takes your place. You lean back against the wall and watch her.\t \t\n\n\"I've been meaning to ask you…what's with the bandage and the torn shirt?\" She glances at you, then focuses back on the game. You rub your wound slightly and feel it burning. You clear your throat and start telling her the story. You take turns at the pool table, but eventually you finish your story as she puts a ball in. \n\n\"And you survived?\" She raises her eyebrows and looks at you, then pays attention to the game again. \"Christ. I'm sorry you had to go through so much. ${leftsurvivor} is obviously not capable of taking care of you. No offense, but…yeah, never mind me. I'm just blabbering around.\"\n\nHer eyes widen as she puts in another ball. \"Hey, erm…let's call this one a draw and go. I totally forgot about ${leftsurvivor} waiting outside,\" she says and picks up her backpack. You can't help but smile a little about the situation, but you pick up your own backpack and follow her outside. \n\n\"This house is in pretty good condition, and full of loot. I don't think we can take it all back home. We could come back here tomorrow, it was fun anyway. It reminded me of…never mind.\" She looks away and walks towards the fence in silence, until you arrive there. You squeeze through, and she does the same. ${leftsurvivor} can't be seen anywhere. A couple of rabid dog and boar corpses lie on the ground.\n\n\"Well, this is awkward.\" She crosses her arms and walks around. \"Let's hope none of this blood is his. I'll assume he got tired of waiting. I hope so, at least. Do you know the way back to your base?\" She stops in front of you and fixes the strap of her backpack. You look down the path and work on getting a clear way back to ${base} in your head, but you're unsure.\n\n\"I'm not really sure,\" you say and shrug a little.\n*page_break\n\n\"Well…I'm not sure, either. And I'd rather not take the risk of being wrong this close to sunset.\" She rubs her chin, then snaps her fingers with eyes wide. \"I have an idea. I could show you around the base. It would be a cool way to get to know each other. I mean…if you want to.\" She looks away and scratches her head.\n\n\"And besides, you don't have any other choice. I won't let you set off searching for the base on your own.\" She shrugs slightly and starts walking backwards a little before turning around, so you follow her.\n\nYou head down paths you've never seen before for a while. ${survivor3} sticks to narrow and dark roads. The sunset is very slow. You walk on a muddy road for a while, until it ends at the opening of a dark forest. She stops you and points to a tall, skinless creature sleeping under a huge tree at the entrance to the forest.\n\nShe takes her ice pick out, then hands it to you. \"You do this one. Remember, aim for the top of its head.\"\n\nYou nod, take the ice pick, and begin to sneak towards the creature. She sneaks behind you, and you stop when you reach its back. You can see its lungs moving through its ribs and its heart beating. The smell makes its way through your gas mask's filter somehow, and the sight of its bloody meat, muscles, and bone makes you nauseous. You frown and raise the ice pick.\n\nAs hard as you can, you smash the tip of the ice pick through its skull, causing it to jump up and growl. It struggles a little, then falls onto the ground and stops moving. \"Good one. Don't leave the ice pick or knife, or whatever you have in its head, though.\" She rips it out of its head and wipes the blood off on her jeans, then holsters it.\n\nYou walk through the thick forest until you can barely see, then she stops. \"We're here.\" She puts her hands on her hips, and you take a look around. You raise your eyebrows, as you don't see anything but trees in the middle of nowhere. She chuckles and reaches down. \"I can only imagine your face right now. Or actually…I can't. But that'll change soon.\" She giggles and reaches down, then pulls up a thick layer of fake grass, revealing a code pad, faintly lit up. \n\nIt beeps a couple of times when she presses some buttons on it, then it beeps one more time and flashes green. She rolls a valve-looking thing to the right and lifts the lid, revealing a ladder. \"After you.\" She stands up, and you peek down the hole.\n\nYou climb down carefully, then drop down onto the last step and walk to the door. It looks very familiar. She shuts the lid, and the valve rolls to the left on its own. She drops down next to you and closes another lid. She walks over and presses the green button on the door, and it opens with a loud hissing sound. You walk inside, and the door closes behind you. As soon as you step in, you realize it's a decontamination chamber. It sucks the air out with much more force than the one back in ${base}. When you step out, a bald guy with a long, white beard walks up to you.\n*page_break\n\n\"${survivor3}. What's the meaning of this?\" He points at you.\n\n\"Calm yourself. He's fine.\" She shrugs slightly.\n\n\"What if he's a spy? Have you thought about that? Our very existence is at risk here.\" He crosses his arms and frowns.\n\n\"I said he's fine, he's not a spy.\" She walks past him and glances back at you from behind the scientist.\n\nHe smiles and shakes his head a little, then turns to her. \"Do you vouch for him?\"\n\n\"Yes.\" She nods.\n\n\"Good. But I have to tell you, I still don't agree. But now the responsibility is on you only, in case something happens. Evening,\" he says and walks away with his hands behind his back.\n\n\"Don't mind him. Come,\" she says and walks down the stairs.\n\nYou walk through a long, iron corridor with locked metal doors on both sides and stairs leading up and down. The whole building seems to be made out of iron and metal. At the end of the corridor, you walk down the stairs and see a small, rusty door. \n\nShe closes the door behind you, and you drop your backpack on the ground. She takes her gas mask off, revealing her short blonde hair, green eyes, and bright-red smiley cheeks. You take your gas mask off too and drop it next to your backpack.\n*if (swolleneye) and (cheekwound)\n\n\n She looks at you with a smile on her face, raises her eyebrows, and crosses her arms. \"Can't stay out of trouble, I see. The left side of your face looks pretty roughed up. You'd be a handsome little fella otherwise.\" She laughs and ruffles your hair.\n *goto woundscont\n \n*elseif (swolleneye) and not (cheekwound)\n *label wound\n\n She looks at you with smile and crosses her arms. \"You'd be a handsome little fella, if not for that wound on your face. I wonder what kind of trouble got you that one.\" She laughs and ruffles your hair.\n *goto woundscont\n \n*elseif not (swolleneye) and (cheekwound)\n *goto wound\n \n*else\n\n She looks at you with a smile and crosses her arms. \"Well, you are a handsome little fella. Like I thought you'd be.\" She giggles and ruffles your hair.\n *goto woundscont\n\n\n*label woundscont\n*page_break\n\nIn the relatively large room, you see two white chairs, a table on your left, a double-sized bed in front of you, a small television, and a wardrobe next to them. To your left, there's a door, currently closed, probably the bathroom.\n\n\"So, this is my chamber. Make yourself at home. I don't know if you had the chance to have sleepovers before…all this happened, but this just feels like one.\" She laughs and drops her backpack. \"Let me take a shower before I show you around, okay? It won't take long,\" she says as she walks into the bathroom and closes the door behind herself.\n\nYou take a seat in one of the white chairs and hear the sound of water splashing for a while. You whistle a little and look around the room. You imagine how amazing it would be if the TV worked. As you keep looking around in slight boredom, you glance at her backpack. Its zipper is slightly open.\n*choice\n\n #Go through her backpack.\n  *set wentthrough true\n  *set Evil %+5\n  You slowly get off the chair and kneel next to her backpack. With excitement, you open it and go through it. As you scramble through her things, you find a couple of spare magazines, a mask filter, and other supplies. As you dig deeper, you find a picture. It shows a boy around your age. He's wearing a red cap and holds his middle and index finger up with a wide smile. You put it back into her backpack and find her ID card. \n  \n  Her name and age is scratched off, and the card lights up red. You drop it back and sink your hand deeper into her backpack, when something pokes your finger at the bottom of it. You take it between your fingers and pick it up. It looks like a small knife. You take the black leather sheath off, and it reveals a small knife. It feels very light, and both of its sides look very sharp. On the handle, you see 'R.B.' engraved into it.\n  *choice\n   \n   #Take it.\n    *set Evil %+5\n    *set tookknife true\n    *set Knife true\n    *achieve thief\n    You put the sheath back on it and put it in your pocket. You scramble the stuff in her backpack to make it look the way it was before, zip it up, then jump back into the chair. She keeps on showering for a good while, and you begin to feel very bored.\n\t\n\t\n    *goto sciencebasecont\n\t\n   \n   #Leave it.\n    You decide that going through her backpack is more than enough. You scramble the stuff in her backpack to make it look the way it was before, zip it up, then jump back into the chair. She keeps on showering for a good while, and you begin to feel very bored.\n   \n    *goto sciencebasecont\n  \n  \n  \n  \n  \n \n #Leave it alone.\n  *set Evil %-5\n  You look away from the backpack and cross your arms. You decide not to invade her private property. You listen to the splashing sounds for a while, and you begin to feel very bored.\n  *goto sciencebasecont\n  \n  \n\n*label sciencebasecont\n*page_break\n\nThe water and splashing sounds finally stop. A couple of minutes later, she comes out with a towel around her hair, wearing tracksuit pants and a top.\n\n\"Sorry, I got a bit carried away…we can't take a shower every day, but when we are allowed to, I try to make the most out of it. It feels great. For a moment, I even forgot you were here. Say, don't you want to take a shower too? It's amazing, and I have a feeling it's time you took a shower.\" She drops onto the bed. \n\nYou glance at the bathroom door, then at your backpack. \n\n\"Don't worry, I won't touch your backpack. And don't worry about what to wear for the night. I can give you a shirt and a tracksuit bottom, but that's all I can do for you. We don't really have clothes your size around here, so…yup, tomorrow the same old clothes await you. So, what do you say?\"\n*fake_choice\n\n #\"A shower sounds good.\"\n  *set Lizzie %+5\n  \"That's the spirit!\" She jumps up and spreads the wardrobe doors wide. A couple seconds later, she drops a white shirt and a grey tracksuit bottom in your hands. \n  \n  \"You're ready, I think.\" She giggles and drops back onto the bed. \"You'll find everything else you need in there. Try not to take too long, though. I don't want to get lectured again.\"\n  \n  She was right. It feels like you're in heaven as the warm water runs down your body. The water turns black at your feet from all the dirt and blood stuck on you. You keep enjoying the warm water and the daydreaming session you have in the meantime, not knowing how much time has passed. \n  \n  Eventually, you hear knocking on the door. \"I know, it's amazing, but you've been in there for a good while now, so…it's time!\" she shouts, and you quickly turn the water off. You dry yourself and put the clothes on. They feel weirdly big on you, but you shrug and leave the bathroom.\n  *page_break\n \n \n \n #\"I think I'll skip it.\"\n  *set Lizzie %-5\n  \"Well…I don't know if you just don't feel like it, or it's simply a lack of trust…but okay, you know what's best for you. I won't let you hang around in those dirty clothes, though.\" She jumps up and spreads the wardrobe doors wide. A couple seconds later, she drops a white shirt and a grey tracksuit bottom into your hands. \"It'll feel good just to change, I bet.\" She turns around, and you quickly change your clothes.\n  *page_break\n  \n  \n\nShe looks at you and covers her mouth. She keeps looking at you with wide eyes, then bursts out laughing. \n\n\"I—I'm sorry. It's not you, it's just…\" She laughs a little more, then lowers her hands and still smiles widely. \"So they're not your size, but you look okay. Better than in that shirt, at least.\" \n\nYou take a look down at yourself. The shirt looks ridiculously big on you, and it reaches down to your thighs. The tracksuit bottom is no different. It feels really baggy on you, and you keep stepping on the hems. She keeps smiling and giggling for a little while, then ruffles your hair. \n\n\"Don't worry, you'll get your dirty, ripped clothes back tomorrow.\"\n\n\"So, it's time I showed you around the base, right?\" She throws the towel onto her bed and styles your hair. You smile and nod, and she turns you around. She walks out of the room along with you, then locks the door and takes the lead.\n\nYou walk around the corridor, and she shows you everything from the chambers to the kitchen. The scientists wear all kinds of different gear, but they usually seem to be some kind of protective suit. Some of them look at you longer than they should. You walk past some stairs that you haven't been down. \n\n\"There's another floor below this one, and it's usually just for boring chemical experiments. And things like that. We're forbidden to go there, but…we could take a peek. Just stick close to me.\" She walks down the stairs, and you follow her into the dark, narrow corridor. \t\n\nYou crouch down a little and peek through the little windows in the middle of the metal doors. Scientists are pouring liquids into test tubes, picking plants apart, and growing mushrooms. One scientist is making a deep cut into a rabid dog's stomach. \n\n\"All right, that's enough. Let's head back up now.\" ${survivor3} pushes you slightly towards the stairs. Suddenly, everything goes black and the ground shakes wildly. You lose your balance and fall backwards. ${survivor3} screams a little, and you roll back until you slam against the wall at the end of the corridor. Everything is pitch black, with only a small light coming from the laboratory door on your left.\n*page_break\n\nYou stand up and dust yourself off, then peek through the small window. A small blue backup light shines from the corner of a counter, which holds several tools. A scientist in a yellow haz-mat suit is holding up a syringe containing a thick, black liquid. \n\nHe walks closer to the white bed. A long-haired dirty male is strapped to it. His mouth is wide open, along with his eyes, and the veins in his neck can be seen clearly. He seems to be shouting, but you can't hear a thing. The scientist sticks the tip of the syringe into his arm and steps away.\n\nThe dirty guy shakes and shouts wildly, then smashes his head back on the bed a couple of times. His eyes snap back, and black veins run up and down his arm where the needle stuck him, slowly forming a deformed black sun. You take a peek at your wound and give it a slight rub. It aches as you glance back inside. The dirty guy stops moving for a minute, then screams and furiously tries to break free. His hair falls out, and he smacks his head back on the bed. \n\nHis hair falls out so quickly that he turns bald in a second. His glowing black eyes can be seen even in the darkness. His limbs begin to grow slightly, and his skin begins to wrinkle up and rip. His teeth and head grow larger, and the scientist stabs a syringe containing a yellow liquid into the middle of his chest. The dirty guy stops moving, and his skin just drips down on the floor before his limbs start to grow again. He rips a strap open, grasping at the air and screaming with black eyes.\n\nThe scientist jumps back and grabs a scalpel. Steadily, he walks behind his back and slams the scalpel into the top of his head. The dirty guy shakes a little, then stops moving. He looks too big for a human, and more like the tall, skinless creatures you've seen. You can see his bones and meat, as there's no skin on him anymore. The sight is all too familiar. The scientist puts the scalpel down and writes something down on the notepad next to it, then crosses his arms. He turns around and looks at the window.\n\nYou feel a pair of hands pulling you away. You look up and make out ${survivor3} in the darkness. She drags you behind her up the stairs as fast as she can, and you stop at her chamber. The light turns back on with a loud buzz, and she opens the chamber. She pushes you inside, then locks the door and turns to you. \"Okay, what have you seen?\" she asks, looking nervous with her arms crossed.\n*fake_choice\n #\"Nothing.\n  *set Lizzie %-5\n  \"Please don't lie to me…I saw your head in the light of the room. I know you've seen something horrible, and you want an explanation at least, right?\" \n \n \n \n #\"Everything.\"\n  *set Lizzie %+5\n  She sighs and rubs her eyebrows. \"Well…I'm glad you didn't lie, at least. You want an explanation, I guess.\" \n  \n\nShe sits down on the bed and looks at you. \"So…I don't even know where to start. They're doing experiments on humans too, and I pretend like I don't know about it. But they're people who would be dead anyway.\" She lays back on her bed and looks at the ceiling. \"They're searching for a cure, that's all there is to it. They aren't some crazed psychos. But like I said, they can be obsessed with some things.\" \n\nShe turns her head towards you. \"So, it would be wise not to tell them about your wound. I don't think they would mess around with you, but…I'd rather not find out. It really is a miracle that you're alive and didn't turn yet. I don't know if you ever will, but…chin up. They usually turn within a couple of days. Maybe you're resistant or something.\"\n\nShe sits up and pats the bed next to her. \"Come on, don't let this ruin the mood. We'll just pretend like we haven't seen anything. Let's watch some TV. They're all recorded things from the past, but they're better than nothing. Aaaand, I've got some snacks hidden that I'm willing to share with you. Trust me, you should consider yourself special. I don't share my secret stash with just anyone. Especially now, when they're worth as much as gold.\" She laughs and takes out a small bag of crisps.\n\nThe rest of the night goes better than expected. You force yourself to forget about the whole incident for a while and enjoy the snacks, then the dinner they serve. It's the best meal you've had for a good while now. The meat melts in your mouth, and it has a strong flavor, but it goes well with the spicy sauce. It tastes a little sweet. You find it weird, but the taste is just enough to make the whole meal an unforgettably good memory.\n\nAfter dinner, you lay back and rub your belly slightly. You are filled with joy and a slight tiredness. ${survivor3} lays back too and crosses her arms. \"Pretty good, huh? Let's try not to stay up too late, though. We've got work to tomorrow. As always.\" She stretches her limbs, and you keep watching TV for a while. You talk for a while, then continue watching old TV shows and news broadcasts. It feels weirdly good and reminds you of the old times. Some shows remind you of your parents. Eventually, your eyes get really tired, and you don't know when, but you fall asleep.\n*finish The following day…\n", "ch4_2": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Doomsday on Demand[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase adfree $4.99 purchased\n  *delay_break 1200\n\n*label purchased\n\n*if (wackwound)\n \"Daddy? Are you okay?\" A little girl kneels next to your head as you open your eyes and sit up. Dust falls on you from above, and you stand up to look at the light bulb hanging from the ceiling.\n \n [i]\"Did you find the switch?\"[/i] You look around the small, cold, concrete room. There are two shelves packed with food and water and two dirty beds. Your back aches as you take a can of corn off the shelf and sit on the bed. You open it up, and the little girl sits next to you. You pour some into her hands and start eating it out of the can.\n \n \"So…what's happened? Is Mum okay?\" she asks, barely eating any of it.\n \n [i]\"Don't worry, I'm sure she's fine. I don't know what happened, but we'll find out, okay? I promise.\"[/i] You fake a smile and finish the can off as she lays her head on your shoulder. You wrap your arms around her and lay back against the wall. You're about to doze off when loud banging and grunting comes from the other side of the door. She jumps up, and you do the same. You walk to the bottom of the stairs and look up. The door shakes as the banging intensifies. You motion her to stop, then slowly make your way up the stairs.\n *goto cont\n\n\n\n*else \n \"Mommy? Are you okay?\" The little girl shakes her mom awake in the cold concrete room. There are two shelves packed with food and two dirty beds. You watch them from one of the shelves, next to a can of beans. She stands up and gives the little girl a hug, then takes the canned beans off the shelf and opens it up on the bed. \n \n \"So what happened? Is Daddy okay?\" the little girl asks her mother as they start eating.\n\n \"I don't know, but I'm sure he's fine. Don't worry, okay honey?\" She nods, and they empty the can. She puts her head down on the shoulder of her mother, and they fall asleep. They keep sleeping for a while in silence, until the ground shakes again, and you hear loud banging sounds. The little girl screams as the room goes dark.\n *goto cont\n\n\n\n\n*label cont\n*page_break\n\"${firstname}!\" You awaken to ${survivor3} shaking you wildly. You sit up with your clothes soaked in sweat and breathing hard. \n\n\"That must have been an intense nightmare. Feel free to change, I'll do the same. Unless you got fond of my clothes so much you want to go out in them.\" She giggles and walks into the bathroom.\n\nYou stand up and give your head a slight rub, fixing your sweaty hair. Despite the nightmare, you've had a good night. The bed was very comfortable. You stretch your limbs and yawn, then change back into the same old clothes. They feel weirdly dirty on you after wearing clean clothes. She comes out and throws her clothes onto the pile of yours. \"Let's roll!\" She puts on her gas mask and backpack, and you do the same.\n\nYou step out of the decontamination chamber and climb the stairs leading up. She slams the cover tight and rolls the valve shut. You walk out of the dark forest and head down the dirt path leading to the warehouse. \"So…that was fun. We could repeat it someday. I mean, if you want to.\" She scratches her head and looks at you.\n\nAs you walk down the path, she pulls you behind a wrecked car and points towards a huge boar-like creature feasting on a small body not far from you. \"You'll shoot this one down. This'll prove to be the real target practice, not that lifeless thing. Don't worry, if things go south, I'll help.\" She pats your back and backs a couple feet away. \"Go for it.\"\n\nYou take the pistol out of your waistband and stand up from behind the wreck. You raise the pistol and take some deep breaths as you try to calm yourself.\n*fake_choice\n\n #Aim down the sight and take a deep breath.\n  You close one of your eyes, take a deep breath, then aim down the sight.\n \n  *fake_choice\n   #Spread my legs and bend my elbows.\n    *set Lizzie %+5\n    You aim down the sight, fixing it upon the creature, then take a deep breath and squeeze the trigger. The bullet flies into its chest, but the gun kicks back and drops onto the ground after it smacks you in the face. \n\t\n    The boar grunts wildly and charges towards you, leaving a trail of blood behind it. When it's about to smash head-first into your stomach, ${survivor3} sinks her boot deep into its head, pushing it down to the ground. She keeps pushing it down with her foot, while it wiggles its legs and growls loudly. She spins her gun out and sends a couple of bullets into its head. It stops moving, and she pushes off of it. \n    *page_break\n\t\n    \"Well, that was…okay. You hit it once, at least. I think you held your breath too early, for too long. Cheer up though, and lemme teach you how to shoot properly. Now, I'm pretty sure ${leftsurvivor} isn't capable of taking care of you,\" she says and walks backs with you. She goes over the steps with you. \n\t\n    She spreads your legs and helps you bend your elbows. You aim down the sight and hold your breath in, then she pulls the trigger. The bullet flies into its head. You do it again on your own a couple of times. \"Way to go! Just remember the steps, all right? Don't mix them up.\" She pats your back, and you put the gun back in your waistband before you continue walking.\n\n    *goto cont1\n   \n   \n   #Shoot\n    *goto shootmessedup\n   \n \n #Bend my elbows and spread my legs.\n  *set lizzieshotorder true\n  You bend your elbows and spread your legs, then grip the handle tight.\n  *fake_choice\n  \n   #Aim down the sight and take a deep breath.\n    *set Lizzie %+8\n    You spread your legs and bend your elbows, then pull the trigger. The bullet sinks deep into its chest. It turns and charges towards you. You aim at it again and fire a couple of times as it gets dangerously close.\n\t\n    Your bullets fly into its head, and it falls on the ground and slides up to your feet. It stays there, lifeless, with blood pouring out of its head. You pant heavily and smile widely as you lower the gun and slowly put it in your waistband.\n\t\n    \"That was so awesome to watch. You're a natural! It's good to be able to protect yourself out there.\" She pats your back and pushes the boar away with her boot. \"Are you sure this is your first time shooting? You hit it in the head. Twice. Good job, really.\" She pats your back again, and you continue walking.\n    *goto cont1\n   \n   #Shoot.\n    *goto shootmessedup\n \n #Shoot.\n  *label shootmessedup\n  You squeeze the trigger tightly. The gun kicks back and hits you hard in the face. The bullet pushes into the ground next to the boar, which charges towards you. You pick the gun up and shoot at it a couple of times. A bullet pushes into its chest, but it keeps charging at you nevertheless. \n  \n  It's about to smash head-first into your stomach when ${survivor3} sinks her boot deep into its head, pushing it down to the ground. She keeps pushing it down with her foot, while it wiggles its legs and growls loudly. She spins her gun out and sends a couple of bullets into its head. It stops moving, and she pushes off of it.\n  \n  \"Well, that was…okay. You hit it once, at least. Cheer up, and lemme teach you how to shoot properly. Now, I'm pretty sure ${leftsurvivor} isn't capable of taking care of you,\" she says and walks back with you. She goes over the steps with you. She spreads your legs and helps you bend your elbows. You aim down the sight and hold your breath in, then she pulls the trigger. \n  \n  The bullet flies into its head. You do it again a couple of times on your own. \"Way to go! Just remember the steps, all right?\" She pats your back, and you put the gun back in your waistband before you continue walking.\n  *goto cont1\n  \n  \n  \n  \n  \n*label cont1\n*page_break\nAfter a while, you arrive at the warehouse. \"I hope he's here,\" she says as she pushes the warehouse door open to find ${leftsurvivor} sitting on a crate. He immediately jumps off and walks towards you when he sees you. He crosses his arms and stops in front of you. \n\n\"Are you out of your damn minds? Do you know how long I waited before I got swarmed by those mutants?\" He turns to you. \"Don't you know what ${capturer1} is capable of? Do you want another situation like before? No, this won't happen again. We're done with you.\" He turns to ${survivor3}. \"You're obviously a bad influence, and we won't ever see you again. Now, let's go,\" he says and walks past both of you, then turns around.\n\n\"I might be a bad influence, but at least I know how to protect him. \n*if not (lizzieshotorder)\n And I'm also capable of teaching him ways to protect himself, unlike you. If it weren't for me, he would be long dead.\"\n *goto cont3 \n \n*else\n And if it weren't for his natural skill to take care of himself, he would already be dead.\" \n *goto cont3\n\n \n*label cont3\n\nShe turns to him and crosses her arms. \"You're obviously not capable of taking care of yourself, let alone him.\"\n\n\"You just shut up! You don't know a damn thing! And it's your fault we're having this argument anyway!\" He steps forward and points his finger at her.\n\n\"What argument? The argument about your incompetence?!\" She steps forward too and clenches her fists.\n\n${leftsurvivor} clenches his fists too, then looks at you. \"Let's go,\" he says and storms off towards the entrance.\n\n\"Well…that could've gone better. I hope you had a good time. And think about…what I said. See you tomorrow, laddie.\" She pulls you into a hug with her right arm only and rubs your back. \"Go, before his head explodes with anger.\" She forces a smile, and you can't help but smile back before you run over to him.\n\nYou wander into nearby houses and cars with ${leftsurvivor}, but only find a couple of supplies. Before you know it, sunset comes.\n\nThe way back is awkwardly silent, and he doesn't even look at you. As you step out of the decontamination chamber, you take your gas mask off and put your backpack down. ${capturer1} walks down the stairs and crosses his arms. ${leftsurvivor} glances back at you and stops.\n\n\"${lastname}. Office. ASAP.\" ${capturer1} turns around and walks up the stairs.\n\n\"Good luck.\" ${leftsurvivor} turns around, then heads to the door.\n\nYou sigh and head up the stairs. With nervousness filling your body, you knock on his door and enter his office. He stands with his back to you, leaning against his armchair. You sit down, and silence falls on the room.\n*page_break\n\n\"So!\" He turns around suddenly and drops into his armchair. \"How is my favorite scavenger? Awesome! I'm glad you're feeling good. You look refreshed. Someone must have slept good last night.\" He chuckles. \"Speaking of last night, where have you been? I asked ${leftsurvivor}, and he said he lost you while you were searching for supplies. Would you imagine that? He lost you! Like a keychain!\" He bursts out laughing and smacks the table a couple of times. \n  \n\"Now, if I weren't the clever, calm person that I am, I would have smashed his head in with the nearest object. But you know me better. Right, kiddo? And besides, I bet you have something interesting to report. I mean, a whole night is a lot, isn't it? I'm eager to hear all about it.\" He leans forward and grins.\n*choice\n #\"I've been in the scientist base.\"\n  *set Report3 true\n  *set ivan %+5\n  *set reportedtimes +1\n  *set evil %+5\n  \"I'm glad you didn't let me down! And I'm sure ${leftsurvivor} is glad, too. I mean, his skull stays intact. Isn't that, like, something to be happy about?\" He leans back in the armchair before he takes out a small bottle of dark brown liquid and puts it on the table. \"Be a good boy, and tell me all about this base now, kiddo.\"\n   \n  You tell him everything from the start, and he grins through the story. \"Fascinating.\" He grips the bottle and twists it open.\n  *goto reportcont\n   \n   \n  \n #\"I got lost and slept in an abandoned house.\"\n  *set Ivan %-5\n  *set Evil %-5\n  \"That's a fascinating story. Please tell me more about it. I'm so eager to hear.\" He scratches his chin and leans back in the armchair before he takes out a small bottle of dark brown liquid and puts it on the table. \n  \n  \"You know, I don't like to be disappointed. I really don't. Maybe you should stop doing that, huh?\" He grips the bottle and twists it open.\n  *goto reportcont\n  \n  \n  \n  \n  \n  \n*label reportcont\n*page_break\n*if (((report1) and (report2)) and (report3))\n *set Ivan %+8\n \"You know, I'm very satisfied with your reports so far. You've been a good boy and didn't let me down. I'd give you a candy, but I just happen to be all out of candies.\" He laughs and raises the bottle to take a sip. \n \n \"You know, we have something great brewing between the two of us. Mark my words, change is coming. Can't you feel it, kiddo?\" He laughs and takes another sip, then offers the bottle to you. \"Take a sip. Real men drink this stuff.\"\n *fake_choice\n  #Drink.\n   *set Ivan %+2\n   *set triedwhiskey true\n   You take a sip and swallow the bitter liquid. It stings your tongue and burns your throat so bad, you burst out coughing.\n   \n   \"Good lad.\" He laughs and takes another sip. \"In a couple of years, you'll drink whiskey like water. Trust me, I know it. You can go now, and keep up the good work.\" He leans closer to you. \n   \n   \"I'm counting on you, kiddo. Not many people can say that, so don't mess this up. For your sake.\" He grins wide and looks deep into your eyes as he leans back. He takes another sip as you stand up with a still-burning throat and leave the office.\n   *goto cont4\n  \n  \n  #Refuse.\n   *set Ivan %-2\n   You shake your head to refuse it, and he raises an eyebrow. \"I took you for a tough boy after all this, kiddo. Maybe I was wrong about the tough part, huh?\" He takes another sip. \n   \n   \"It doesn't matter, though. In a couple of years, you'll drink whiskey like water. Trust me, I know it. You can go now, and keep up the good work.\" He leans closer to you. \n   \n   \"I'm counting on you, kiddo. Not many people can say that, so don't mess this up. For your sake.\" He grins wide and looks deep into your eyes as he leans back. He takes another sip as you stand up and leave the office.\n   *goto cont4\n\n\n*elseif (report1) and (report3)\n *goto whiskeycont\n \n*elseif (report2) and (report3)\n *goto whiskeycont\n\n*elseif (report1) and (report2) \n *goto whiskeycont\n\n *label whiskeycont\n \"You know, I'm not very satisfied with your reports so far. I feel like there's more, you know? But I'm sure you're not holding anything back. Right, kiddo? I mean, you can understand how [i]fatal[/i] that mistake would be, right?\" He laughs and raises the bottle to take a sip. \n \n \"You know, I keep thinking that we have something good in common. Soon, you'll realize that change is here. Because mark my words, it's coming. Can't you feel it, kiddo?\" He laughs and takes another sip, then looks from the bottle to you. \"Want a sip? Real men drink this stuff.\"\n *fake_choice\n  #\"I do.\"\n   *set Ivan %+2\n   *set triedwhiskey true\n   You take a sip and swallow the bitter liquid. It stings your tongue and burns your throat so bad, you burst out coughing.\n   \n   \"Good lad.\" He laughs and takes another sip. \"In a couple of years, you'll drink whiskey like water. Trust me, I know it. Go now. And don't let me down the next time we have this chat.\" He leans closer to you.\n\n   \"Because I put some trust in you, kiddo. Not many people can say that, so don't mess this up. And I'm sharing this friendly advice with you, for your sake.\" He grins wide and looks deep into your eyes as he leans back. He takes another sip as you stand up with a still-burning throat and leave the office.\n   *goto cont4\n  \n  \n  #\"No, thanks.\"\n   *set Ivan %-2\n   You shake your head to refuse it, and he raises an eyebrow. \"I thought so. Too much for you, huh?\" He takes another sip. \"It doesn't matter, though. In a couple of years, you'll drink whiskey like water. Trust me, I know it. Go now. And don't let me down the next time we have this chat.\" He leans closer to you. \n   \n   \"Because I put some trust in you kiddo. Not many people can say that, so don't mess this up. And I'm sharing this friendly advice with you, for your sake.\" He grins wide and looks deep into your eyes as he leans back. He takes another sip as you stand up and leave the office.\n   *goto cont4\n\n\n*else\n *set Ivan %-8\n \"You know, I'm not satisfied with your reporting duty. At all. I have this urge to, like, you know, shoot your brains out. I don't like when people hide things from me. You know, I have this weird itch inside, and it usually only stops when they bleed and scream and yadda yadda. Nasty things like that.\" He grins and raises the bottle to take a sip. \n \n \"You know, I keep thinking we have something good in common. Maybe I've been wrong, after all? Now, that would be a shame. A real shame. Especially now, with change coming. Because mark my words, it's coming. Can't you feel it, kiddo?\" He chuckles and takes another sip, then looks from the bottle to you. \"Want a sip? Too bad. Bad boys don't get treats. Especially not my whiskey.\" He takes another sip.\n\n \"Go now. And don't disappoint me. Like, ever again. That would be a [i]deadly[/i] mistake. Especially after all the trust I've put in you. Shame on you, kiddo, shame on you. Leave.\" He grins and looks deep into your eyes as he leans back. He takes another sip as you stand up and leave the office.\n *goto cont4\n\n\n   \n*label cont4\n*page_break\nYou walk through the door to the kitchen and pick up your daily rations, then head towards the ladder.\n\n[i]\"Staying out another night, huh? I hope ${capturer1} has finally beaten some sense it your thick skull this time.\"[/i] ${capturer2} grins as he rubs his beard, then opens the basement door when you arrive.\n*fake_choice\n #\"Do I look like someone beaten?\"\n  *set Carl %-5\n  [i]\"Then you won't be needing this, I'm sure of it,\" [/i] he says and takes your rations away, then gives you a firm push towards the ladder.\n \n #\"That's exactly what happened.\"\n  *set Carl %+10\n  [i]\"Good. You gotta learn your place, boy,\"[/i] he says and points towards the ladder.\n \n  \n #Climb down the stairs.\n  You shrug once and head towards the ladder. He chuckles a little, but stays quiet.\n  \n  \nYou climb down the stairs into the dim basement with a small candle dying between the two bunk beds, but still emitting a little light. You look towards the bed and see ${leftsurvivor} pushing a creased shirt on the side of ${currentbf}'s head. Blood runs down ${hisher} cheek and drips down on the floor. ${leftsurvivor} releases the shirt and climbs into his bed, barely looking at you. He clears his throat and pulls the cover over his head. \n\nYou walk over to them and see ${currentbf} sitting on the edge of the bottom bunk holding and pushing the creased shirt tight, and only looks up when you arrive there.\n\n*if bunk = \"top\"\n\n \"Hey. Sorry, I don't mean to block the way. I'll lay down soon if you want to sleep. I'm just waiting for this bleeding to stop.\" \n *goto cont5\n \n*else\n\n \"Hey. Sorry I'm sitting on your spot. I'll get up soon if you want to sleep, I just want this bleeding to stop.\" \n *goto cont5\n \n \n*label cont5\n${currentbf} checks the shirt before ${heshe} gives it a firm push again and looks down. \"I don't know how long I can take this. I got my head bashed in for literally no reason. I've been wondering, you know…have I been too slow? Or did I mess something up? But I don't know. I asked ${capturer2}, but he just hit me with his revolver again.\"\n\n${currentbf} turns his head towards the candle and wipes ${hisher} eyes as ${heshe} sniffles lightly. For a couple of seconds, ${heshe} stays silent, then continues. \n\n\"You know, we're exactly like that candlelight. It's just fighting, struggling. You can see it. It doesn't want to get extinguished. But we both know that it doesn't have much time left. And like us, it'll go out quietly.  Without anyone knowing. Or caring.\" ${currentbf} turns ${hisher} head away from the candle and keeps looking down. You keep staring at the candle. It barely lights the corner anymore.\n*page_break\n\n\"I've been trying my best to stay optimistic, but…I can't anymore. I can't take this any longer. There has to be a way out, we have to do something. ${leftsurvivor} and ${deadsurvivor} had already been working on it. I know it because I heard them talking about it before…you know what happened.\" With tears in ${hisher} eyes, ${heshe} looks up at you, still pushing the shirt on ${hisher} head. \n\n\"Tell me, ${firstname}. When the time comes, can I count on you? Do we make our escape together? Can I count on you to leave all this behind and find a better place? A home, or something?\" After ${heshe} wipes ${hisher} eyes with ${hisher} sleeve, ${heshe} looks into your eyes.\n*choice\n #\"Sure, we'll leave together as soon as possible.\"\n  *set bfpromise true\n  *if currentbf = Bradley\n   *set bradley %+15\n   *set Evil %-5\n   *label bunkbedcont\n   \n   Tears fill ${hisher} eyes, and ${heshe} smiles weakly at you. \"I knew I could count on you. I knew this place and ${capturer1} wouldn't change you. Thank you, ${firstname}. Thank you!\" Suddenly, ${heshe} jumps up and hugs you tight. ${currentbf} lays ${hisher} head on your shoulder. Tears soak through your clothes, and ${heshe} lets go of you after a couple of seconds. With shaking hands, ${heshe} takes the clothing away from ${hisher} head and climbs into ${hisher} bed. You do the same and turn onto your side. \n   \n   \"Good night, ${firstname}, and…thank you again. I don't know what I'd do without you. Really,\" ${currentbf} says, and you hear some muffled sounds, then ${heshe} goes quiet. You stare at the dying candlelight. It flickers from left to right for a couple of seconds, then it blows out and darkness fills the room. You close your eyes and fall asleep rather quickly.\n   *goto cont6\n   \n   \n  *else\n   *set Abbie %+15\n   *set Evil %-5\n   *goto bunkbedcont\n \n \n \n #\"${base} is my home now.\"\n  *if currentbf = Bradley\n   *set bradley %-15\n   *set Evil %+5\n   *label bunkbedcont2\n   \n   Tears fill ${hisher} eyes as ${heshe} looks at you. \"I—I…\" With clenched fists, ${heshe} stutters and shakes ${hisher} head. \"But…but I can't call this place my home. It's not close to anything like home. I don't know how you could call it your home.\" ${currentbf} sniffles and wipes ${hisher} tears away, then sighs loudly. \n   \n   \"I thought I could count on you. I thought we'd leave all this behind, together. You're the only one I have—had left. This place…${capturer1}…changed you. And now I'm on my own.\" ${currentbf} throws the bloody shirt away and keeps staring down at ${hisher} feet. You reach towards ${hisher} shoulder with one hand, but ${heshe} shakes it off with clenched fists, then climbs into ${hisher} bed.\n   \n   Quietly, ${heshe} turns onto ${hisher} side and pulls ${hisher} knees up. You hear soft sniffling and see ${hisher} body moving back and forth rapidly. You climb into your bed and stare at the dying candlelight. It flickers from left to right for a couple of seconds, then it blows out. Darkness and quiet sniffling fills the room. You close your eyes and fall asleep rather quickly. \n   *goto cont6\n   \n   \n  *else\n   *set Abbie %-15\n   *set Evil %-5\n   *goto bunkbedcont2\n\n \n \n\n \n*label cont6\n*page_break The Next Morning…\n\nYou open your eyes to find ${leftsurvivor} climbing up the ladder. You jump to your feet and get ready as quickly as possible. You glance back at ${currentbf} from the ladder. The cover is pulled over ${hisher} head, and it moves slightly. You keep looking at ${himher} for a while, then climb up the ladder.\n\nYou quickly pick up your gear and run to the decontamination chamber, where ${leftsurvivor} is already waiting for you. You glance back and see ${capturer1} walking down the stairs. He glances over to you and grins. ${leftsurvivor} puts on his gas mask in the process, and you do the same. \n\nWhen the fence slams behind you, ${leftsurvivor} stays still and silent for a couple of seconds. You stand next to him in silence. After a couple of seconds, he turns to you. \n\n\"All right. I want you to know that I'm not angry, but we have to agree on one thing. No more ${survivor3}. She means trouble, and staying out of trouble is our best chance of survival right now. I hope you agree with me. It's okay if you don't right now, but think about it, okay?\" he says and turns towards the highway. \n\n\"Let's go. We'll go down the highway, then see if there's a path we haven't been on yet.\"\n\nYou head down the highway for a while, avoiding the rabid dogs and flying creatures. You pass by some cars and get to two burned-out trucks, blocking the way completely. You stop and give each other a look, then decide to sneak between them. ${leftsurvivor} goes first, and you follow him. When you get to the narrowest part, you hear something from behind you. \n\nYou take the pistol out of your waistband and turn around, aiming it at ${survivor3}, who pushes her arms up in the air. \n\n\"Whoa there! All that practice I gave you is finally paying off?\" She chuckles and crosses her arms, then leans closer to you. \"Imagine if I could have given you more training. It's still not too late,\" she whispers.\n*page_break\n\n${leftsurvivor} pushes through, followed by you and ${survivor3}. \"Phew, that was narrow. Lucky we're not fat, right? Let's roll.\" She pats your back and giggles. ${leftsurvivor} turns around and looks at her. \n\n\"No, no. There's no way in hell you're coming with us.\"\n\n\"Sorry to break it down to you, but I will. Do I look like the one to change my mind?\" She puts her hands on her hips.\n\n\"You should. Nobody wants you around, so you might as well take a hundred-and-eighty-degree turn and walk back to your scientists, or wherever you prefer,\" ${leftsurvivor} says as he points behind her.\n\n\"Heh, speak for yourself. I'm not here because of you. I thought that was obvious. I'm not going to leave. You better put up with it.\" She crosses her arms.\n\n${leftsurvivor} frowns and clenches his fists, then turns around and continues to make his way down the highway.\n\n\"Heh. Let's go. We don't want to fall behind, grumpyface.\" ${survivor3} chuckles and pats your back a couple of times, giving you a slight push.\n\nYou keep walking down the highway for a long while, until you get to the point where you don't know where you are anymore. ${leftsurvivor} is still taking the lead and barely glances back at you every now and then.\n \n\"Where are we going, exactly? We've had more than enough chances to stop and search for loot,\" ${survivor3} asks.\n\n\"Somewhere we haven't been before. You should stay quiet, unless you've been a scavenger for as long as me and…${deadsurvivor}. We've been through these places before. It gets harder and harder to find loot,\" he mumbles and glances back, then shrugs a little and keeps moving. \n\nEven though ${survivor3} keeps talking to you, the walk begins to get very boring. ${leftsurvivor} casually kills the rabid animals on the way. You get close to a skinless creature, but ${survivor3} kills it the fancy way, showing off her skills. You sense she's more eager to show them to ${leftsurvivor}, as it seems to anger him.\n*page_break\n\nThere seems to be a roadblock in the distance, along with some trucks and cars blocking the way. \"Cool. Finally, some loot for us.\" ${survivor3} walks faster. With a clicking sound, unbearably heavy light blinds your eyes. You stop next to ${leftsurvivor} and ${survivor3}. You try to cover the light with your palm and see what's behind it, but you can barely make out a couple of people standing on the trucks.\n\n\"Freeze!\" A voice comes through the megaphone. \"Sir, we've got three civilians in sight. Probably marauders from ${base}, by the look of them. I can't confirm that, though. Awaiting orders.\" You hear the person in military uniform speaking into his walkie-talkie. \"Are you sure? I…all right. I see. Got it. Over and out.\" He leans away from the walkie-talkie and puts the megaphone down. He seems to reach for something on his back. You hear a cocking sound, then see a brown-and-black rifle in his hands. \n\n\"Is it…\" ${leftsurvivor} steps to the side and ${survivor3} does the same, leaving you in the middle.\n\nLoud gunshots echo in your ears, and tiny asphalt pieces fly everywhere. Your heart beats in your throat and you jump back, then look at ${survivor3} on your left, shouting. \"Come! We'll jump to safety!\"\n\n\"What are you waiting for?! Come already!\" ${leftsurvivor} shouts, and they both make their way to the edge of the highway. Without a moment to think, you decide in a split second to go with…\n*choice\n #${survivor3}.\n  *set Lizzie %+8\n  *set Ryan %-8\n  *set Malcolm %-8\n  *goto lizziejumpcont\n\n  \n\n #${leftsurvivor}.\n  *set Lizzie %-8\n  *set Ryan %+8\n  *set Malcolm %+8\n  *goto leftsurvjumpcont\n   \n\n   \n   \n*label lizziejumpcont\nAs fast as you can, you catch up with ${survivor3}. When you arrive at the edge, she pushes you over and jumps after you. Time seems to slow down as you get closer and closer to the muddy ground. You hear screaming before you hit the ground, and everything goes black.\n*page_break\n   \nYou open your eyes and wipe the dirt off your gas mask. When you can fi
