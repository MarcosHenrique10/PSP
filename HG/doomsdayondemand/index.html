 ${capturer1} proud just now.\" He laughs and pats you on the back a few times before he heads upstairs. Halfway up, he looks at ${capturer2}, then points at ${survivor2}.\n  \n  ${survivor1} walks towards you with lowered eyebrows and shakes his head a little. \"That was…I mean, how could you? I know he didn't give you much choice, but…still.\" He shakes his head. \"Anyway, let's get you to bed,\" he says, and you follow him down to the basement.\n  \n  \"${firstname}! Finally, you're back. But where's ${survivor2}?\" ${currentbf} asks, sitting on the couch. Before you have a chance to speak, ${survivor1} gives you a slight push towards your bed. \"Go to bed, I'll tell the whole story to your friend.\"\n  \n  You climb into your bed and glance at them walking to the couch. For a couple of seconds, you see their mouths moving, and ${currentbf} glancing at you a couple of times. Eventually, your eyes shut and you fall asleep.\n\n  *page_break The following day…\n  \n  \"Hey. It's time. You slept through yesterday.\" You awaken to ${survivor1} shaking your shoulders, then making his way up the ladder already. You stretch your limbs and \n  *if bunk = \"top\"\n   jump down from the top bunk. You glance at the bottom bunk, \n   *goto ryanblamed\n   \n  *else\n   sit up, then get out of bed. You stand on your toes and glance up at the top bunk, \n   *goto ryanblamed\n   \n   \n #\"It's my fault.\"\n  *set swolleneye true\n  *set Ryan %+8\n  *set Ivan %-8\n  *set Evil %-10\n  \n  \"Is it now?\" He walks closer to you and smiles. \"That's a real disappointment,\" he says, and the next thing you see is his fist smashing hard against your face before you fall to the ground. ${survivor1} and ${survivor2} step towards you, but ${capturer2} pulls out his revolver. [i]\"I'd stay still if I were you.\"[/i]\n  \n  Your head feels dizzy, and you begin to feel something warm running down your cheek. ${capturer1} kneels down next to you and leans close to your ear. \"That was disappointing.\" He pats you on the back. \n  \n  \"Stop it! It was my fault!\" you hear ${survivor2}'s voice echoing in your ears, and ${capturer1} stands up. \"Oh. I damn well know that.\" He turns to ${survivor2} and suddenly headbutts him. He falls to the ground, and ${capturer1} kneels over him. Your head feels dizzy, and the left side of your face burns, but you turn your head towards them. \n  \n  \"You were supposed to show him how to be a good scavenger.\" He punches ${survivor2} in the face several times until ${survivor2} lowers his hands, then kicks his body a few times as he stands up and pants. ${survivor2} lays there, probably passed out, and his swollen face looks worse than yours.\n  \n  \"Well, justice has been served.\" He pants heavily before he heads upstairs. Halfway up, he looks at ${capturer2}, then points at ${survivor2}.\n  \n  ${capturer2} drags ${survivor2} by his legs out of the room, and you slowly sit up. Your head is spinning, and you can't see with your left eye from the swelling. ${survivor1} runs over to you and wipes the warm blood off your face. \n  \n  It feels as if hundreds of warm needles are poking into the left side of your face. \"That was brave. Stupid, but brave nonetheless. Though he didn't give you much choice.\" He sighs and helps you up by your arms. \"Let's get you to bed.\" With that, he escorts you downstairs and lifts you into bed, then gives your face another wipe with the sleeve of his shirt.\n  *page_break\n  \n  \"Jesus Christ, ${firstname}! What happened?\" ${currentbf} runs to your bed, but ${survivor1} puts a finger to his lips. \"Shh. Come sit down. I'll tell you.\" You glance at them walking to the couch. For a few seconds, you see their mouths moving and ${currentbf} glancing at you a couple of times, but eventually your eyes shut and you fall asleep.\n\n  *page_break The following day…\n  \n  \"Hey…${firstname}. We have to go now. You slept through the whole day.\" You awaken to ${survivor1} shaking your shoulder gently, then taking a good look at your face. He pokes your still-swollen eyes, and you hiss in pain. \n  \n  \"Sorry. Damn…that looks…\" He looks at your eye. \"Better than yesterday, actually. Come now, we really have to go.\" He fakes a smile, then turns around to make his way up the ladder. You stretch your limbs and \n  *if bunk = \"top\"\n  \n   jump down from the top bunk. You glance at the bottom bunk, \n   *goto tookblame\n   \n  *else\n  \n   sit up, then climb out of bed. You stand on your toes and glance up at the top bunk,\n   *goto tookblame\n   \n *disable_reuse #\"It's no one's fault.\"\n  \"I'm sorry, but I thought I heard you say it was no one's fault.\" He chuckles and combs his hair back. \"There's always someone to blame. And if not, you make someone take the blame. So, I ask again, for the last time, whose fault was it? And you better say a name.\"\n  *goto faultchoice\n  \n   \n   \n*label ryanblamed\nand ${currentbf} turns around and yawns loudly. \n\n\"Hey, ${firstname}…take care. I mean…that could have been you yesterday. And I don't fancy sharing my bunk with someone else. So…don't die.\" ${currentbf} giggles and gives you a wink before turning back around.\n   \n\"I'll try not to.\" You laugh and rub your eyes a little before you make your way up the ladder too.\n*goto malcolmday\n\n\n  \n  \n   \n   \n*label tookblame\nand ${currentbf} turns around and yawns loudly. \n\n\"Hey, ${firstname}…take care. I mean…you look terrible. And I don't fancy sharing my bunk with someone else. So…don't die.\" ${currentbf} giggles and gives you a wink before turning back around.\n   \n\"I'll try not to.\" You laugh and rub your eye, then gently touch the swelling a little before you make your way up the ladder too.\n*goto malcolmday\n  \n  \n\n*label malcolmday\n*page_break\n\nYou follow ${survivor1} to the rusty iron table and pick up your pistol and knife, then put them in their usual places. As you wiggle your backpack on, you glance at ${survivor2}'s untouched gear. \n\n\"You'll go with ${survivor1} today. ${survivor2} doesn't feel…too well.\" ${capturer1} laughs and walks down the stairs. \"Maybe he caught a flu or something. Who knows? But I recommend you get back in time today. And with some supplies, you know. I mean, that's what scavenging is all about, in case you didn't know.\" He pats you on the back and laughs as he walks off to the kitchen.\n\nThe decontamination process goes in silence, as well as leaving the base. The fence slams shut behind you, and ${survivor1} looks at you as he fixes his gas mask. \n\n\"So. We have to wander closer to the impact zone today, since we're starting to struggle to find supplies around the places we usually go to. As I said, the radiation is extremely high there, so we'll avoid heading directly towards it. I wish we had a Geiger Counter. There aren't many places known to have radiation, but it's better safe than sorry when we're heading into the unknown, right? I also have no idea what's awaiting us out there, so be on your guard. Let's go.\" He smacks his rifle in his hands and you make your way down the main road, in the opposite direction as yesterday.\n\nGreen moss covers the cars and abandoned buildings along the way. ${survivor1} takes a sudden sharp turn into a dark street crowded with cars. You quickly follow him as you notice a pack of Aviatrixes attacking some Wacks in the distance. The dark street is filled with black, burnt corpses, and they seem to be still warm. \"So, what happened last night? I bet you had a good reason to stay out.\" ${survivor1} sneaks forward.\n\nYou give him a quick rundown of what happened last night, and he shakes his head. \"That one…seems to be a new type. I mean, we haven't heard about that before.\" He clears his throat, then puts his hand on your shoulder to stop you before he turns towards you.\n\n*if Swolleneye = true\n\n \"How's that eye of yours doing?\" he asks, and you can clearly see that he's trying to make something out through the gas mask.\n \n \"Fine.\" You shrug and get a couple of pats on your shoulder. \n \n \"Don't worry, we'll get our revenge sooner or later. If you don't consider being on ${capturer1}'s team. He is going to fall, it's only a matter of time. If only we could get the guards out of the base…\" He slowly shakes his head and continues to walk.\n *goto malcolmday2\n \n*else\n\n \"Listen, kid. About yesterday. The way you passed the blame on ${survivor2}…things don't work like that. We're supposed to be a team now, and you should act like that. Unless you fancy being on ${capturer1}'s team, which I'm hoping you don't. Because he's going to fall, sooner or later. If only we could get the guards out of the base…he couldn't stop us from taking our revenge.\" He slowly shakes his head and continues to walk.\n *goto malcolmday2\n \n \n \n*label malcolmday2\n*page_break\nYou and ${survivor1} check out the cars and buildings you pass in the dark, steaming street crowded with corpses, searching for loot without any luck. When you arrive at the end of the street, a huge building can be seen with lots of windows, and a pathway to a small, deserted field leading from both sides of the entrance.\n\n${survivor1} kneels down next to a rusty red car crashed into a truck, and you do the same. He points at your face, then the building, then back at you. You stand up steadily and take a look around, then kneel back down with eyes wide. A small pack of rabid mutated animals, dogs and boars, separates you from the building. \n\n\"So, is our situation here bad?\" he whispers.\n\nYou slowly nod, and he flips his knife into his hand. \"I'll see if I can do it the easy way. The hard way…\" He grips his rifle. \"It's loud, so it should be considered our last option. Stay here, I'll deal with them.\"\n*fake_choice\n\n #\"All right.\"\n  *set Malcolm %-5\n  \"It shouldn't take too long.\" He sneaks towards them, and you sneak closer to the truck, then peek out. Right on the other side of the truck, there's a sleeping dog without a jaw, its chest cut open. It snores loudly until ${survivor1} kneels down next to it and stabs it in the neck. With a swift move, he cuts it open. The dog whimpers for a second, then goes completely silent.\n  \n  You watch him taking on a couple of boars and dogs on his own, with moves that make you smile involuntarily. He's jumping around, trying to avoid all of the attacks and waiting for a chance to make a move. You smile and begin to cheer for him quietly, when you hear a growl behind you. \n  \n  You freeze for a second, then turn around. You jump a little when a dog with blood dripping out of its mouth grunts towards you. It has glowing red eyes, and before you know it, the only thing you can see is the dog launching itself at you.\n  \n  You fall into a sitting position, and your back smacks hard on the truck. The dog furiously bites at your face. You sink your hand deep into your pocket, searching for the knife. You hold it away by its neck with your other hand, but it spits blood on your gas mask as it bites at the air. \n  \n  Your arm is about to give in when you find the knife and shake the sheath off of it, then jab it into its neck as hard as you can. It whines and grunts for a couple of seconds, then drops on you and stays still as blood pours out of its neck, right onto the sleeve of your shirt.\n  \n  \"Not bad. But try not to fall down next time, it's hard to make an advantage out of that.\" ${survivor1} pushes the dog off you and wipes his knife on its fur. You pant hard, and he offers a hand. You grip it as blood drips from your own hand, and he pulls you up. You put the knife back into the sheath and drop it in your pocket.\n  \n  \"Don't worry, killing them will get easier with time.\" He smiles, and you walk down the road and onto the pathway. The sight of dead mutated animals draws a smile to your face.\n  *goto schooljoinin\n  \n  \n \n #\"I'm coming too.\"\n  *set Malcolm %+5\n  *set knifeexperience true\n  \"You sure? You'll have to be able to kill some on your own. I can't always be there to protect you, especially if I get overrun. Do you still want to tag along?\" he asks, already sneaking out.\n  \n  \"Yup.\" You nod and sneak behind him.\n  \n  \"Good, get your knife out then.\" He glances back at you. You pull the knife out of your pocket and take the sheath off of it, which you then stuff back into your pocket. It feels heavy but weirdly good in your hand. You follow ${survivor1} as he sneaks up behind a sleeping dog, right on the other side of the truck. Its bottom jaw is missing, and it snores loudly. You can see the lungs moving through its open chest.\n  \n  \"I'll let you have this one. Jab it in the neck firmly, that's the most effective way,\" he says as he points his knife at its neck. You raise the knife to eye level, and your heartbeat quickens. After taking a deep breath, you swiftly stab it in the neck.\n \n  A shiver runs down your spine as you feel the knife pushing through the thick layers of skin and meat. Immediately, blood pours out of its neck. It jumps a little and growls, but ${survivor1} quickly stabs it in the neck a couple more times. After a quiet whimpering sound, it stays still. You might even throw up, if it didn't mean taking the gas mask off.\n  \n  \"That was a good one for your first kill. And you didn't even throw up. Nice job, kid. Try pushing it in deeper next time, though. You can also yank it left or right, leaving a small cut at the same time. It's sure as hell deadly.\" He pats your back firmly and wipes his knife on the small chunk of fur on the dog's side.\n  \n  You sneak forward through the road and kneel down by a blown-up military car, then peek over its hood towards the small field between you and the entrance. \"All right, there's a boar on the left side and a dog on the right. Behind them are more, but they're far enough to kill these first without getting any unwanted attention just yet. Boars are slower, but very tough. The dogs are usually faster and know how to put up a fight, but easier to take down if you know what you're doing. Which one do you want to take out?\"\n  *choice\n  \n   #\"I'll take out the boar.\"\n    \"All right, go for it. Good luck, and don't forget the neck,\" he says as he taps his own neck with his knife a couple of times. You swap sides and step out from cover. After taking a deep breath, you head for your target, along with ${survivor1}. \n\t\n    The boar notices you as soon as you take a few steps towards it. The body looks very large, but its legs seem smaller than they should be. Its horns and teeth look dangerously big and sharp as it runs towards you with its mouth open. Blood drips down its face, and the eyes glow red. It growls loudly, and before you know it, the only thing you can see is the boar launching itself at you.\n\n    You grip the handle of your knife before it launches itself head-first towards you. You tighten the grip on your knife and hold it in front of yourself. The boar pushes you down to the ground and falls on top of you, with a small cut on its face. \n\t\n    It growls wildly and furiously bites at your face, but you keep pushing it away by its neck. From its mouth, blood drops onto your gas mask. It bites dangerously close to your face, when you lift the knife with your other hand and jab it hard into its neck. The skin and meat snap loudly as it grunts wildly. A moment later, it lays dead on top of you with blood pouring out of its neck, right on the sleeve of your shirt.\n\t\n    \"Good job there. Though I don't recommend going down on the ground like that. It's hard to make an advantage out of it.\" He chuckles and pushes the boar off of you with his foot, then helps you up to your feet.\n    *goto malcolmday3\n\t\n\t\n   \n   \n   \n   #\"I'll take out the dog.\"\n    \"All right, go for it. Good luck, kid, and don't forget the neck,\" he says as he taps his own neck with his knife a couple of times, then steps out of cover and heads for the boar. After taking a deep breath, you head for your target, along with ${survivor1}.\n\t\n    The dog notices you as soon as you leave your cover and take a few steps towards it. It growls wildly, revealing its sharp teeth. There's too many of them, and they're bigger than they should be. There's dried blood on its fur, and it drips out of its mouth. Before you know it, the only thing you can see is the dog launching itself at you.\n\t\n    You grip the handle of your knife tightly as it grunts and launches itself towards you. It pushes you down to the ground with its bony paws and furiously bites at your face. You keep it away by its neck. Blood drips from its mouth right onto your gas mask, blocking some of your vision. \n\t\n    Your arm feels as if it's about to give under the weight of the dog, and it begins to get dangerously close to your face. You raise the knife with your other hand and jab it into its neck as hard as you can. The skin and meat snap as the knife goes in. It grunts and whines for a second, then drops down on top of you and lays still. Blood pours out of its neck, right onto the sleeve of your shirt.\n\t\n    \"Good job there. Though I don't really recommend falling back on the ground like that. It's hard to make an advantage out of it when a wild mutated dog is trying to eat your face off.\" He chuckles as you push the dog off of you, then he helps you up to your feet.\n    *goto malcolmday3\n\t\n\n\n\n*label malcolmday3\n*page_break\n\nDealing with the other couple of animals goes easier. You take down a couple more of them without falling on the ground. ${survivor1} keeps glancing at you throughout the process. When you finish the last one off, you both stop and pant a little over the dead bodies. Your arms shake a little as you realize how you've taken down a couple of them, completely on your own. \n\nYou glance down at your shirt and notice hundreds of small drops of blood all over it. Then you glance over at the sleeve soaked with cold blood, and it gives you goosebumps.\n\n\"You'll get used to it. Especially because it's rare to be able to wash or get fresh clothes.\" He chuckles and pats you on the back as he holsters his knife. You do the same and put it in your pocket. \n*label schooljoinin\n*page_break\n\nAs you take a look at the huge building, it reminds you of a school. With ${survivor1}'s lead, you enter the building, confirming that it's a school. It's very dark inside. From the lobby, you decide to make your way down the huge, dark corridor on the left, since the rest of the paths are blocked by debris. You pass a couple of classrooms and closed or demolished doors. \n  \n\"Wow!\" ${survivor1} suddenly runs forward into the darkness. You stop for a second in surprise, then begin walking the way he went, while you call out for him quietly a couple of times.\n\nQuiet sobbing catches your ears as you pass a classroom with an open door. You peek inside and make out a small figure sitting in the darkness. As you look further inside, you realize it's a little girl. She looks at you and jumps behind a table. She peeks out at you as she continues sniffling.\n*fake_choice\n\n #Approach her.\n  *set Malcolm %-5\n  \"I'm not going to hurt you,\" you say and carefully make your way inside. She falls back and keeps looking at you. When you reach her, you kneel down and she slowly sits up.\n\n  \"You're not going to hurt me?\" she asks with a shaky voice.\n  \n  \"Nope.\" You shake your head and continue, \"Are you alone?\" \n  \n  She nods and begins to tell you a long story about her life. \n  *page_break\n  \n  \"…and that's how I got lost a week ago, and hid here from the monsters.\" She takes her gas mask off and wipes her tears away. Your eyes widen as she puts the gas mask down next to herself. \"Do you have your gas mask on all the time? Have you ever taken it off? You don't have to wear it around here. Take it off.\"\n  \n  Her bright, yellow eyes look deep into your own through the gas mask, and an overly calm feeling takes hold of you all of a sudden. Your arms move uncontrollably and begin to pull the gas mask off your head. You take a couple of deep breaths and feel warm air filling your lungs. \n  \n  \"Feels good, doesn't it?\" She smiles, and you can't help but nod with a wide smile on your face. \"Why don't you take that knife out and make a small cut on your neck? It won't hurt, and it helps with breathing!\" She giggles, and you put your hand in your pocket. A gunshot echoes through the room just before blood spills onto your face and she falls back on the ground, a growing puddle of blood under her head. \n  \n  *if gmaskproblem = true\n  \n   Suddenly, a well-known feeling hits you. \n   \n   You try to breathe, but some blood comes up. You spit it out before quickly putting the gas mask back on. Your lungs are still burning, so badly that it makes you grip your chest through your clothes as you take some deep breaths. \n   *goto tricked\n   \n  *else\n  \n   You try to keep breathing, but you gasp and rattle as you breathe in. \n   \n   It feels like hot knives stabbing your lungs from the inside. Some blood comes up into your mouth. You spit it out before you put the gas mask back on as quickly as you can. Your lungs are still burning, so bad that it makes you grip your chest through your clothes as you take a few deep breaths in.\n   *goto tricked\n   \n  \n \n #Keep walking.\n  *set Malcolm %+5\n  You turn your head towards the long, dark corridor and decide to walk after ${survivor1}. Quick, hopping footsteps can be heard behind you, along with light giggling, but whenever you turn around, you don't see anyone in the darkness. A light humming catches your ears, and it sends shivers down your spine, so you quicken your pace.\n  \n  [i]\"Ran and ran the little dummy,[/i]\n  *line_break  \n  [i]From a little girlie,[/i] \n  *line_break\n  [i]He thought he's going towards safety,[/i]\n  *line_break\n  [i]Pop! Goes the dummy!\"[/i]\n  *line_break\n\n  [i]\"Down he went the dark corridor,[/i]\n  *line_break\n  [i]Scared like a baby,[/i]\n  *line_break\n  [i]I will carve his eyeballs out,[/i]\n  *line_break  \n  [i]Pop! Goes the dummy!\"[/i]\n  \n  Her voice and giggles echo through the corridor. You begin to run, until you bump into ${survivor1}. You keep looking back down the corridor as you pant.\n  *page_break\n  \n  \"Watch where you're going, kid. What's gotten into you?\" he murmurs and kneels down next to two dead bodies holding hands. One of them has its gas mask off, while the other has a bullet hole in its head and holds a gun. A backpack, cans, bottled water, and other scraps are scattered around them. ${survivor1} begins to put the cans and bottled water into his backpack. \"Take this backpack, it has some loot inside,\" he says, and you pick it up from the ground, then put it on too.\n  \n  \"Hey, come here, kid.\" You walk over to him, and he's holding a vest in his hands. \"Put it on. It's a kevlar vest. This is why I ran forward, but it's way too small for me. It'll feel heavy and will probably hold you back from running significantly, but it should protect you from getting shot and things like that.\" \n  \n  He lifts it up and helps you put it on. You walk around a little to test your new gear, and it feels harder to move with the kevlar on. \"Way to become a soldier, eh? A couple more things like that, and you'll get confused for one!\" He laughs, then claps once.\n  \n  \"Anyway, that's all we can do here.\" He stands up and beings to walk down the dark corridor. You stick close to him, and no matter how hard you try, you can't shake off the feeling of being watched. Around halfway through, you can hear soft giggling. \"Is this why you've been running?\" ${survivor1} asks, looking around.\n  \n  \"Yup.\" You nod and keep glancing back.\n  \n  Finally, you get out of the dark corridor and head towards the exit. A little girl is sitting there, humming quietly. ${survivor1} stops, so you do the same. She takes her gas mask off as you get closer to her, then she looks deep into your eyes. \"Come here, dummy, and take the gas mask off. It's perfectly safe to do so!\" She giggles. \"Did you know that your pistol isn't loaded? The best way to check it is to look down the barrel!\" She smiles and hums again.\n  \n  You walk over to her and sit down. Her bright, yellow eyes look deep into your own, and then an overly calm and happy feeling takess hold of you all of a sudden. You're about to take the gas mask off and grab your pistol when you hear a gunshot. Blood spills onto your gas mask, and she falls back on the ground with a growing puddle of blood under her head. You blink a couple of times and stand up.\n  \n  \"That's Theurgist for you. Just so you know, I'd put a bullet in your head if I saw you out on the street alone. I'd think you were one of them. But since ${capturer1} and his lot brought you back, I have no intention to. I hope you get what I mean. Kill anything that's suspicious. On sight. Let's go,\" he says and heads outside, so you follow him.\n  *goto leftbuilding\n  \n  \n \n \n*label tricked\n*page_break\n\n\"Goddammit kid, do you have a death wish or something?!\" ${survivor1} walks over to the dead girl with something in his hand and aims his rifle at her. Carefully, he pokes her with his foot. \"I told you to stay away from these Theurgists the very first day!\" He walks over and helps you up, then hands you a vest. It feels unexpectedly heavy, and it pull your hands down as he drops it into them.\n\n\"Anyway…I ran off because I found a stash of supplies in very good condition. Can't say the same about the poor guys around it. Found this kevlar vest there, too. It's way too small for me, so put it on. It'll feel heavy and will probably hold you back from running significantly, but it should protect you from getting shot and things like that.\"\n\nHe takes it out of your hands and helps you put it on. You walk around a little to test your new gear, and it feels harder to move with the kevlar on. \"A couple more things like that, and you'll look like a complete soldier. Let's go, we have to pack the supplies.\" He gives you a small pull by your kevlar, and you head down the dark corridor.\n\nThe supplies he mentioned are a small backpack, a couple of other cans, bottled water, and other scraps ${survivor1} drops on the ground. You put the other backpack on and feel funny carrying two backpacks. ${survivor1} throws the cans and bottled water into his own backpack. \n\n\"That's all we can do here.\" He shrugs and turns around. You follow him down the dark corridor, but can't shake off the feeling of being watched. You keep glancing behind you until you reach the exit and leave the building. \n*label leftbuilding\n*page_break\n\nAs you leave the building, ${survivor1} pulls you to the side and points at the Aviatrixes circling around the corpses. \"They're waiting for us. They know those bodies died recently. Be quiet,\" he whispers, and you both sneak away. You follow him through the deserted field behind the school. You keep walking for a while in silence until ${survivor1} turns to you.\n\n\"So…did ${survivor2} tell you about Tiff?\" He clears his throat.\n\n*if tiffanyknow = true\n\n\n You nod slowly, and he chuckles slightly. \"Wow, I didn't think he would. He just told me recently as well. He's either more open about it now, or he likes you, kid.\" \n *goto cont6\n\n\n*else\n\n \"Oh…well, that's nothing new. He only told me recently as well. Tiffany was his little sister. He said he was supposed to take care of her. They were searching for a way out of the district when they got ambushed by Wacks. He lost her and couldn't find her for days. When he found her…well, she wasn't the same. He had to kill her to survive. Long story short, after that he went on a rampage. He says he killed lots of them before he fell from a roof, right after they cornered him. He was ready to die and was about to, but ${capturer1} and his crew got to him first. It's a sad story,\" he says and lets out a big sigh.\n *goto cont6\n\n\n\n*label cont6\n\nBy the time he finishes talking, you arrive at a muddy swamp with an unusual amount of plants and small trees. It looks like a messed-up version of a jungle.\n\n\"Something tells me there's a bit of radiation here. I don't think it's anything serious, but I'll go first, and if it gets crazy, we'll turn back.\" He goes first, holding his rifle up above his head. It reminds you of the soldiers in the war movies you've seen. It feels as if every step drags you deeper down into the mud, but you're only knee-deep in it. The kevlar vest doesn't make it any easier, but eventually you step out of the mud and stop to breathe for a second.\n\nThe sky seems darker than before, and the amount of small trees and plants don't seem to lessen. You keep walking through the thick jungle until you see a big concrete fence with barbed wire in the distance. ${survivor1} murmurs a little and begins to walk faster towards it. \n\nThe metal fence looks bigger and bigger the closer you get, and you see a pair of huge metal doors with a small watchtower built above them. When you're relatively close to it, a bullet lands just before your feet, forcing you to stop in surprise.\n\nA guy in military armor speaks into a megaphone and holds a rifle in the watchtower. \"That's close enough. And if you don't want the next one in your heads, put your hands up. You're on military ground, what's your business here?\" He glances over to ${survivor1}. \"Say, don't I know you?\" \n\n\"Military?! Don't even expect a response from me, you…\" ${survivor1} murmurs and grunts quietly as you both put your hands up.\n\n\"I'm not going to ask you again. Where are you guys from, and what are you doing here?\" he asks as he fixes the scope on his rifle. You glance over to ${survivor1}, who has his fists clenched, then look back at the soldier.\n*fake_choice\n \n #\"We're from Base ${base}.\"\n  *set militarytold \"base\"\n  *set Malcolm %-5\n  \"${base}?\" He aims his rifle at you. \"You have five seconds to turn around and go, you filth. And be grateful I don't just blow your heads off right away. Five…four…\" ${survivor1} pulls you away by your kevlar. You head back to the mud you came from.\n  \n  \"You don't go telling people where you're from, kid. That's a basic rule; what were you thinking? That they'd just like some bandits?\" He storms deeper into the mud.\n  *goto cont7\n \n \n #\"We're just wanderers looking for supplies.\"\n  *set Malcolm %+5\n  *set militarytold \"wanderer\"\n  \"I see. You're well armed for some wanderers, but I'll play along and believe that. The base is off-limits for civilians, but…\" He reaches down and tosses a small bag to your feet. \"It has water and food, enough for a couple days for you two. Now go.\" He slowly lowers his rifle.\n  \n  ${survivor1} turns around and leaves the bag behind, already heading into the mud. You murmur a 'thank you' and nod a little before you pick up the backpack. It's heavy, but you run after him.\n  *goto cont7\n  \n \n \n #\"There's more of us around here. You're surrounded.\"\n  \"Then maybe I should waste you before we get overrun. Right? Scram, kiddo. The base is off-limits to civilians and bullshitters. Now go. Before I introduce you to the ancient trigger finger,\" he says, raising his rifle.\n  \n  You and ${survivor1} head back to the mud. \"It was a nice try, but it doesn't matter because we won't ever come near this place again.\" ${survivor1} shakes his head and walks faster through the mud.\n  *goto cont7\n  \n \n \n \n \n #Remain silent.\n  \"Are you both deaf or something? All right, scram before I put a bullet through your heads,\" he says with a raised rifle, and you both turn around and walk back into the mud.\n  *goto cont7\n  \n  \n*label cont7\n\n\nThe walk back to the base feels twice as long, and twice as exhausting, too. It might be because of the kevlar vest. Time proves you right, as it's already dusk. When you turn onto the main road, a flock of Aviatrixes is circling ahead. \n\n${survivor1} freezes and pulls you onto a smaller road to take a detour. You keep walking when you hear noise behind you. You glance back to see them chasing you. He tells you to run, so you run as fast as you can. You can't help but to keep glancing back at the disgusting ray-like creatures. They get so close that you can feel them flapping around you, and ${survivor1} shouts to the guards at the base to open the gate. \n\nThey open the gate and quickly slam it shut after you as they fire at them. You can hear the gunshots even in the decontamination chamber. You walk out of the chamber towards the iron table, still panting a little. You take your gas mask off and put your gear on the table, along with the kevlar and your backpack under it. \n\nYou put the backpack of supplies on the table and are heading for the door as ${survivor1} puts the canned food and bottled water next to the backpack. You're about to walk through the doorway when a voice from behind stops you. \n\n\"Hey, my favorite scavengers! I hear you gave my guards some work to do. Good. They were getting lazy,\" ${capturer1} says as he stands halfway down the stairs. \"${firstname}, I'd like to talk with you in my office, so get moving,\" he says as he turns around to walk upstairs, then looks back at you. \"And don't take the 'I'd like to' part literally. That was on order.\" He chuckles and continues to go upstairs.\n\n${survivor1} gives you a worried look, then smiles a little. \"Don't worry, everything will be fine. See you downstairs.\" He pats you on the back and closes the door. You release a sigh and head upstairs into a short corridor with two offices. One has ${capturer1}'s name painted on the glass in black, and the other has ${capturer2}'s name carved into the glass. You hesitate for a moment or two, then enter his office.\n*page_break\n\n\"Why don't you take a seat?\" he says, already sitting in his armchair with his legs on the table. You sit down and look around, waiting for the silence to pass. \n*if swolleneye = true\n\n \"So! How's that eye of yours doing, champ? It looks, you know, horrible. I mean, you'll be lucky if you can see with it, like, ever again!\" He laughs and winks at you. \"Just kidding. Or am I?\" He chuckles. \n \n \"I bet girls are lying at your feet already and asking about that wound of yours. I know it might seem like we lack a number of females around here, and it's because we do. Some of them work in the kitchen, some of them are actually guards. Don't forget to leave out dear old me from the story, though.\"\n \n He leans closer and grins. \"You must agree that it was a necessary move from me. Even if it hurt. It did, you know…my fingers ached for a few good hours after that. You either have a thick skull, or that other whatever-his-name-is guy's face is thick. But that disappointed me a little. You know, don't think for a moment that he would've done the same for you. It's a dog-eat-dog world out there. And you might as well learn how things work now. If you don't know how to fend for yourself, and you don't have the wits, you can't survive. Keep that in mind the next time you play hero, kid.\" He taps the desk a couple of times, then claps once and sits there in silence for a couple of seconds.\n *goto ivancont2 \n \n \n*else\n\n \"So! How's that other guy doing? You know, the one with the thick skull. Seriously, my fingers ached for hours after that. Can you believe it? It's almost like he punished me or something.\" He laughs and rubs his eyebrows. \n \n \"I bet girls dig his scar now. Though it might seem we're low on the number of females around here. That's because we are. But you can find some in the kitchen, and some are actually guards. You know how it is. Anyway, you made dear old me proud back there.\" He grins and leans forward slightly. \n \n \"You did well. This is how exactly the world works now. Kill or be killed. You have to know what's necessary to get by. You have to know how to fend for yourself and have the wits to get by, kid. And I hope you're not feeling guilty. Trust me, he would have done the same thing in a heartbeat.\" He taps the desk a couple of times before sitting in silence for a couple of seconds.\n *goto ivancont2\n\n\n \n*label ivancont2\n\n\"So, what's the story behind staying out for a whole night, anyway? Fancied staying out with the mutants, did you?\" He grins, and you're about to speak when he claps loudly. \"Wow, that was a fascinating story! Please do tell it again later. I'm amused.\" He chuckles. \"But boy, oh boy. I would take it to heart if you got lost for a night again.\" He laughs, then takes something out of the drawer and slides it towards you. \n\n\"That's why I'm giving you this walkie-talkie. In case you get lost, you can use it, and we'll get you home. Believe me, it's for your own safety. It's not like I'm more concerned about the loot and the hassle of finding new scavengers, or anything like that.\" He waves his hands and rolls his eyes before laughing as he combs his hair back with his hand. You put the small, green, military-looking walkie-talkie in your pocket.\n\n*if ivanliked = true\n\n \"You know, I saw potential in you from the very first time. That's why I had the scavenger job in mind for you.\" He chuckles and mumbles, \"Like you had any other choice. Anyway!\" He claps once. \"I knew you'd come back alive for the second day. More or less.\" \n\n He leans closer. \"You know, kid, we're very much alike. You remind me of myself back in the day. Admit it, you know I'm right. We have the beginning of a great friendship right here. We'll just have to seal it somehow. But! That's for the future to tell. Or is there anything you'd like to tell me?\" He grins and leans back in his armchair.\n *fake_choice\n \n  #\"I'm nothing like you.\"\n   *set Ivan %-5\n   *set Evil %-8\n   He frowns, then chuckles a little as he stands up steadily and looks at you. \"Wow, that hurts. I'm actually offended now.\" He grins. \"Who are you trying to convince here? We both know the truth. Even if you don't see it…yet. Anyway, what are you waiting for, exactly?\" He chuckles and walks to the reinforced window behind him.\n   *goto cont8\n   \n  #\"I'll be just like you.\"\n   *set Ivan %+5\n   *set Evil %+8\n   \"Well now, isn't it good to hear that? Let's just hope you don't…you know, fail my expectations. One way of doing that would be, like, dying. You don't want that to happen, do you? Anyway, you can go now. And feel free to leave the 'you can' part out of it.\" He chuckles and walks to the reinforced window behind him.\n   *goto cont8\n   \n  #\"We found a military base.\"\n   *set Ivan %+5\n   *set report1 true\n   *set reportedtimes +1\n   \"Well, now that's something, isn't it?\" He chuckles and stands up. \"Where was this base, exactly?\" \n   \n   You tell him as accurately as you can, and he walks to the reinforced window behind him. \"So they're not that far away, after all! Very well, you can go now. And feel free to leave the 'you can' part out of it.\" He chuckles.\n   *goto cont8\n  \n  #\"Nope, nothing.\"\n   *set Ivan %-5\n   \"Well, that's boring. Please do tell me if you feel like you're living an uneventful life. I'd be more than happy to help you with that.\" He fakes a yawn and chuckles before walking to the reinforced window behind him. \"You can go now. And feel free to leave the 'you can' part out of it.\"\n   *goto cont8\n  \n  \n \n\n\n\n*else\n \n \"You know, kid, I didn't think you'd survive the first night. You were exactly like the others. Honestly, we were one man too much, that's why I chose you to be a scavenger no matter what. Silly me, right?\" He chuckles. \"But you surprised me and survived. Two days now.\"\n \n He shakes his head slightly and crosses his arms. \"We have things in common, y'know. Admit it, you know it too. Who knows, maybe this is the start of a bright friendship? It's not too late. But that's for the future to tell. Or is there anything you'd like to tell me?\" He grins leans back in his armchair.\n *fake_choice\n \n  #\"I'm nothing like you.\"\n   *set Ivan %-5\n   *set Evil %-8\n   He frowns, then chuckles a little as he stands up steadily and looks at you. \"Wow, that hurts. I'm actually offended now.\" He grins. \"Who are you trying to convince here? Although I might truly be wrong if you do something stupid like, I don't know, dying would be pretty stupid, huh? Well! Better not do something stupid that would leave you wasted, right?\" He chuckles and walks to the reinforced window behind him. \"What are you waiting for exactly?\"\n   *goto cont8\n   \n  #\"I'll be just like you.\"\n   *set Ivan %+5\n   *set Evil %+8\n   \"Such enthusiasm! See? This is what I missed! I mean, really, who wouldn't want to be like me?\" He chuckles slightly. \"Let's just hope you don't do something stupid that gets you killed. I mean, dying would be pretty stupid, after all.\" He grins and walks to the reinforced window behind him. \"You can go now. And you can leave the 'you can' part out of it.\"\n   *goto cont8\n   \n  #\"We found a military base.\"\n   *set Ivan %+5\n   *set report1 true\n   \"Well, now that's something, isn't it?\" He chuckles and stands up. \"You might even prove useful! Where was this base, exactly?\" \n   \n   You tell him as accurately as you can, and he walks to the reinforced window behind him. \"So they're not that far away, after all! Good boy, you can go now. And feel free to leave the 'you can' part out of it.\" He chuckles.\n   *goto cont8\n  \n  \n  \n  #\"Nope, nothing.\"\n   *set Ivan %-5\n   \"Yeah, that's what I thought. Boring.\" He fakes a yawn. \"You see, this isn't how you keep a proper conversation going. Let me explain to you how it goes. Okay, I say something, and you, you do the same. And we keep repeating that until we both feel like we've had a good conversation. You know, I'm beginning to blame myself here. You might live a very boring and uneventful life. Feel free to tell me if that's the case, though. I'd be more than happy to help with that.\" He grins and walks to the reinforced window behind him. \"You may go now. And feel free to leave the 'you may' part out of it.\n   *goto cont8\n\n\n \n \n \n \n*label cont8\nYou get up from the chair and leave his office, then walk down the stairs. After that, you head towards the basement, where ${capturer2} is standing, holding his revolver. \n\n[i]\"Stop wasting my time and get moving. What took you so long, anyway?[/i]\"\n*fake_choice\n #\"That's none of your business.\"\n  *set Carl %-5\n  [i]\"That's where you're wrong. Everything you do is my business. Are you deaf? I said, get yourself down there.\"[/i] he says, firmly pulling you towards the ladder by the hand. You take the ladder down, and he slams the trap door shut. You glance towards ${survivor1} and ${survivor2} sitting on the couch, and ${currentbf} sitting on the mattress. They're sharing a can of beans.\n  *goto cont9\n  \n \n #\"We were talking about you.\"\n  *set Carl %-10\n  *set Evil %+5\n  \"We were talking about you. ${capturer1} isn't satisfied with your performance,\" you say and shake your head with a slight grin.\n  \n  [i]\"That's very funny. Want to know what I hate? Stupid, sassy brats like you,\"[/i] he says and grabs you by the hair. [i]\"You better learn your place, kid. Let me help you with that,\"[/i] he says and pushes you down into the basement by your hair.\n  *page_break\n  \n  You fall on your back and see the trap door slamming shut. You cough a couple of times and sit up. ${survivor1} and ${survivor2} are sitting on the couch, while ${currentbf} is sitting on the mattress. They're sharing a can of beans.\n  \n  \"Ouch. Trouble always finds you, ${firstname}.\" ${currentbf} smiles as he stuffs some beans into his mouth with his fingers.\n  \n  \"Or maybe it's the other way around.\" ${survivor2} smiles slightly, a couple of large Band-Aids on his face.\n  *goto cont9\n \n\n #\"We were just talking about scavenging.\"\n  *set Carl %+5\n  *set Evil %-5\n  [i]\"Good. You obviously need that, considering what happened the other day. What are you, deaf? Get down there,\"[/i] he says and points at the ladder with his revolver. You take the ladder down, and he slams the trap door shut. You glance towards ${survivor1} and ${survivor2} sitting on the couch, while ${currentbf} sits on the mattress. They're sharing a can of beans.\n  *goto cont9\n \n \n \n \n*label cont9\n*page_break\n\nThey all smile slightly, and ${survivor1} lights a small candle. He puts it on the ground and looks at you. \"Why don't you join us? I snatched this one from my backpack. Don't ask me where I hid it, though.\" He chuckles, and ${currentbf} stops chewing to give him a weird look. \n\n\"And besides, we need energy for tomorrow. I know it's late, and it's just beans, but this is still better than the stuff they call food up there. So, what do you say?\" ${survivor1} shakes the can lightly.\n\n*choice\n #\"Maybe some other day.\"\n  *set Ryan %-7\n  *set Malcolm %-7\n  \n  *if currentbf = Bradley\n   *set Bradley %-7\n   *goto refusedcont\n   \n  *else\n   *set Abbie %-7\n   *goto refusedcont\n   \n   \n   \n\n \n \n #\"Sure, why not?\"\n  *set Ryan %+7\n  *set Malcolm %+7\n  *if currentbf = Bradley\n   *set Bradley %+7\n   *goto acceptedcont\n   \n  *else\n   *set Abbie %+7\n   *goto acceptedcont\n \n \n \n*label acceptedcont\n\"Sure, why not? I'm hungry anyway.\" You smile and sit down on the mattress next to ${currentbf}. \"That's what I'm talking about.\" ${survivor1} tilts the can towards you, and you take a handful of beans out. They smell slightly odd, but you start to eat them. You glance over at ${survivor2}, and he smiles slightly. \n*if ryanblamed = true\n\n \"What you did back there wasn't nice. I can understand why you did it, but we're supposed to be a team. Unless you don't want to join the other side. Keep that in mind.\" He smiles and nods once.\n \n ${currentbf} turns towards you and smiles. \"I really hope you're not thinking about being with…them. I'm planning to leave whenever we—I mean, you guys can find a safe place for us. Man, it's still so shocking that you're a scavenger now.\" \n *goto acceptedcont2\n \n*else\n\n \"Hey, I appreciate what you did back there. Really. It wasn't necessary to risk your life like that, and I wish I could've stopped him or—or helped you or something.\" He sighs. \"But thanks anyway, it means a lot, we're a team.\" He smiles and nods once.\n \n ${currentbf} turns towards you and smiles. \"Yup. I can't wait until we—I mean, you guys find a place where we can be safe. I still can't believe you're a scavenger now. How cool is that?\" \n *goto acceptedcont2\n \n \n \n \n \n*label acceptedcont2\n\nYou continue talking and laughing through the night. It feels good to finally have a nice, comfortable time and forget about the whole situation for a while. The canned beans prove to be more and more delicious with every mouthful. When the candle dies out and yawns fill the room, everyone agrees that it's time to go to bed. \n\nEveryone knows you only have a few hours left to sleep, but no one seems to care, since it was worth it. You smile once more in your bed before you close your eyes and fall asleep.\n*goto cont10\n\n\n \n\n \n \n \n \n\n*label refusedcont\n\"Maybe some other day. I'm tired,\" you say and head towards your bed. \n*if bunk = \"top\"\n They remain silent for a while until you climb to the top bunk and turn your back to them. \n *goto refusedcont2\n   \n*else\n They remain silent as you jump onto the bottom bunk and turn your back to them.\n *goto refusedcont2\n  \n  \n \n*label refusedcont2\n\nYou hear ${survivor1} and ${survivor2} chattering quietly. You turn around slightly and peek over at them. You meet ${currentbf}'s eyes, and ${heshe} looks at you with a sad face. After a couple of seconds, ${heshe} looks down before turning back to them and rejoining the conversation. You turn back and close your eyes. Voices can be heard for a couple of minutes before you fall asleep.\n*goto cont10\n\n\n\n\n  \n  \n  \n  \n*label cont10\n*page_break The following day…\nYou awaken to a hand on your back giving you a slight shake. ${survivor1} tells you to get up as you turn around. You get out of bed and release a large yawn as you head towards the ladder. When you arrive there, you glance back at the sleeping ${currentbf} and head up the ladder. After ${survivor1} and ${survivor2} pick up their gear, you do the same and follow them to the decontamination chamber. \n\nYou put the gas mask on in silence, and ${survivor2} sighs. You yawn a couple of times as you leave the base. ${survivor1} and ${survivor2} seem very tired, as well. They begin to walk down the main road to the right, and you do that for a while. \n\n\"Let's go…that way. I guess. We've never gone there.\" ${survivor1} points down a dirt road with huge trees on both sides, making the road darker than it should be, and you begin to head that way.\n\n\"So…you guys found a military base?\" ${survivor2} turns his head towards you, and you nod in response.\n\n\"But we'll never go there again,\" ${survivor1} mumbles.\n\n\"Why not, what if we—\" ${survivor2} begins.\n\n\"I said no!\" ${survivor1} snaps at him and quickens his pace, leaving you two behind as he walks ahead.\n\n${survivor2} turns his head towards you and shrugs. Out of nowhere, a loud buzzing noise comes from above. You all glance up at the sky, where a military helicopter with three rotors is flying past you. You shake it off and continue walking, when you see the flock of Aviatrixes following the helicopter. ${survivor1} glances back at you, when they suddenly stop chasing the helicopter and make their ways towards you.\n\n\"Move, move!\" ${survivor2} gives you a slight pull by your kevlar. They start running, and you follow them, chased by the flock.\n*page_break\n\nYou keep running until your lungs feel like they're about to explode. You can feel a ray-like creature's presence dangerously close to your back, when ${survivor2} turns back and fires a couple of bullets past you, leaving you with ringing ears. You force yourself to keep running, and after a short while you see a hill leading down to a large warehouse in the distance. ${survivor1} runs faster and slides down the hill, then makes his way towards the warehouse.\n\n${survivor2} keeps glancing back at you, then slides down the hill too. When you arrive at the hill, you try to do the same, but around halfway down, you end up tumbling. ${survivor2} helps you up at the bottom, and you make your way to the warehouse. The overturned and ripped-apart trucks make it harder to reach the entrance. \n\n${survivor1} is already standing there, holding the door open. ${survivor2} stops to fire a couple of times at the same wounded Aviatrix that got close to you. He pushes you inside before jumping in and helping ${survivor1} pull the door shut, then locking it with the latches. You can hear the creatures smashing loudly against the closed door.\n\n\"Goddamn the military once again!\" ${survivor1} sits down on one of the huge crates. It looks as if a tornado passed through the big warehouse. Shelves and crates are scattered everywhere. The only light source currently is coming from the windows in the roof, and it's not much. You wonder how the windows could still be intact. You sit down on the floor and pant hard in the half light, while ${survivor2} slides down against the door.\n\n\"I would kill for a smoke right now.\" ${survivor1} messes with the pocket of his shirt.\n\nYou remain silent for a couple of minutes, and when everyone seems to have relaxed a little, ${survivor2} speaks up. \"So…how about we search the warehouse for loot? There must be something in at least one of these crates, right?\"\n\n${survivor1} nods, and they stand up. You do the same and take a look around the huge warehouse. It seems to get darker the further you go inside. ${survivor2} stretches his limbs, and you begin to search the crates, with no luck. They all are either empty or contain useless things.\n\n\"Let's keep looking.\" ${survivor1} points deeper into the warehouse, and you both follow him. You find the warehouse even darker as you head deeper inside, but you keep searching the crates. You snap a crate open and find it filled with chocolate. You smile wide and glance over at ${survivor1} and ${survivor2}. They found some cereal, but nothing else. \n\nThey stand up and walk further into the warehouse. You're stuffing the chocolate into your backpack when the ground shakes a little. You don't give it much thought and keep packing your backpack. A second later, the ground shakes even more, and you see a door flying past you.\n\nYou rush from the cover of the shelves after ${survivor1} and ${survivor2}. When you reach the end of the warehouse, you end up in a long, dark corridor leading off to both sides. You peek left and see a giant hole with a red 'staff only' sign above it. On the ground lays ${survivor1}'s rifle. ${survivor2} runs next to you with his SMG ready. \"What the hell happened?\" He turns on his flashlight, and you shake your head slightly, followed by a small shrug.\n\nIn the dim light, you see six legs and two giant slimy arms walking slowly towards ${survivor1}. \"I—I only wanted to check what's inside this room,\" he says as he walks backwards. ${survivor2} aims his SMG and takes a deep breath. You're about to reach into your waistband for the pistol when you hear glass shattering above you. \n\nYou start to look up, but something falls and hits you on the head, hard, and you fall to the ground.\n*page_break\n\nAfter you blink a couple of times, you slowly stand up and glance over to your right with a still slightly dizzy head. A huge, humanoid creature with no skin on it is standing in the distance. It's much taller than a human, and blood drips from its skinless bone and muscles. \n\nIt's holding a long, thin, and sharp knife. The sight sends a shiver down your spine, but you get ahold of yourself when ${survivor2}'s SMG crackles under its feet. You can see its bare spine moving as he walks closer to ${survivor2}.\n\n\"I need some help over here!\" ${survivor2} shouts as he backs away, holding his knife.\n\n\"Help me, dammit!\" You glance over to your left and see ${survivor1} walking against the wall. He's cornered, and the slimy creature is walking towards him with its arms outstretched. It has a knife sticking out of its arm, and ${survivor1} is furiously going through his pockets.\n\nYou quickly look to your right as ${survivor2}'s knife falls to the ground as the creature smacks it out of his hands. It pushes him up against the wall by his neck. ${survivor2} gasps for air and tries to break free. The creature licks the long, sharp knife and lets out a big grunt.\n\nYou look from left to right as chaos quickly fills the warehouse. They try to break free and shout at you for help at the same time. Your heartbeat quickens to the point where you think it'll explode. You breathe faster than ever and look from left to right at the struggling ${survivor1} and ${survivor2}.\n*label ch3endingchoice\n\nIt feels like time itself has slowed down. Everything goes silent for a second, and apart from your own heartbeat, you can't hear anything. You close your eyes for a second, take a deep breath, and…\n\n*choice\n\n #Help ${survivor1}.\n  *set leftsurvivor \"Malcolm\"\n  *set deadsurvivor \"Ryan\"\n  *set Rep4 0\n  *set Knife false\n  *set Slimerwound true\n  *achieve malcolm\n  You quickly take the knife out of your pocket and throw the sheath away, then begin to run towards ${survivor1} as fast as you can. The huge slimy thing is dangerously close to him, and it raises its hand to strike. \n  \n  You stop behind it, hands shaking. A slight shout leaves your mouth as you stab it in the neck. It screams so loud that your ears ring, then stumbles back and throws itself on the floor. It struggles hard as black blood pours out of its neck.\n  \n  You breathe heavily and force a slight smile at ${survivor1}.\n  \n  You're turning around when an unbearable pain strikes into your left arm. You look down to see the black slime covering your chest and arm. It's already corroding through your sleeve, and in no time you feel it on your arm. \n  \n  You try hard to shake it off, without luck. It smells horrible, and both the sound and the sight of your arm corroding makes you nauseous. You fall to the ground, breathing fast as your arm burns in pain. The slimy creature seems to be getting ready to spit again when ${survivor1} jumps over there, rips your knife out of its neck, and stabs it again a good number of times with a scream.\n  *if Malcolm >= 28\n   *page_break\n   \n   Your eyes begin to feel heavy, and your vision goes blurry. \"Goddammit, kid!\" you hear as ${survivor1} runs over to you, and his lips seem to be moving, but you don't hear anything after that apart from a dull, ringing sound in your ears. He picks you up in his arms and lets your right hand hang towards the ground.\n \n   Your head bounces up and down as he runs down the corridor. Before he takes the sharp turn right to the shelves, you see ${survivor2} from the corner of your eye. \n   \n   The tall, skinless creature grunts and sticks the long, thin knife through his chest. ${survivor2} struggles hard as blood soaks through his jacket. The creature licks the thin knife off and stabs him again, this time in the stomach. ${survivor2} glances at you and coughs up some blood as he still tries to struggle.\n   \n   ${survivor1} stops for a second and mumbles something, then continues to run for the exit. When he arrives, he smashes the door open with his shoulders. It feels as if the sun burns your arm even more, and you move your eyes to ${survivor1}. \n   \n   He glances down at you, and your eyes get heavier and heavier, until you can't help but shut them, replacing everything with darkness.\n   *finish\n   \n   \n  *else\n   *page_break\n   \n   Your eyes begin to feel heavy, and your vision goes blurry. \"Goddammit!\" you hear ${survivor1}'s voice as he runs past you into the corridor. You glance towards him and see ${survivor2} from the corner of your eye. \n   \n   The tall, skinless creature grunts and sticks the long, thin knife through his chest. ${survivor2} struggles hard as blood soaks through his jacket. The creature licks the thin knife off and stabs him again, this time in the stomach. Still struggling, ${survivor2} glances in your direction as you cough up some blood.\n   \n   ${survivor1} stops for a second. You can see his lips moving and his mouth opening wide to scream, but you can't hear anything apart from the dull, ringing sound in your ears. He kneels down as the skinless creature lowers ${survivor2} and begins to feast on him. The sight makes you even more nauseous. ${survivor1} slowly stands up and walks over to you with wet eyes and an angry look on his face. \n   \n   He picks you up in his arms and lets your right hand hang towards the ground. Your head hangs back and bounces as he begins to run. He slows down and glances at ${survivor2} as he takes a sharp turn to the shelves, then runs towards the exit. He smashes the front door open. Sun shines on your arm, and it burns with such pain you feel like screaming. \n   \n   You look at him from the corner of your eye. He glances down at you, and your eyes get heavier and heavier, until you can't help but shut them, replacing everything with darkness.\n   *finish\n   \n   \n   \n   \n   \n \n #Help ${survivor2}.\n  *set leftsurvivor \"Ryan\"\n  *set deadsurvivor \"Malcolm\"\n  *set Rep3 0\n  *set Knife False\n  *set Wackwound true\n  *achieve Ryan\n  You quickly take the knife out of your pocket and throw the sheath away. With a sharp right turn, you begin to run as fast as you can towards ${survivor2}. He's being choked and tries to break free from the grasp of the creature as it raises its thin knife. When you arrive at the disgusting creature, you raise your knife and take a deep breath before striking down with a scream. \n  \n  You stab it in its side a couple of times, then jump up and jab it once in the neck. Blood splashes on you, and your knife gets stuck in its neck as it falls to the ground with a loud thud. It grunts loudly and throws itself around for a couple of seconds. The dark, red blood splashes everywhere before it stops moving. \n  *page_break\n  \n  ${survivor2} falls on the ground and gives his neck a slight rub. You give him a small smile as you pant heavily. You're about to turn around when a sharp pain burns through your whole body. Your insides sting and ache. Something warm begins to run down your belly, and you glance down. A long, thin knife tip is sticking out of your stomach. \n  \n  You fall to the ground and grab hold of your wound. A small pool of blood appears under you, and it grows in size with every second. You begin to feel very nauseous. You glance at the creature from the cold ground, and it seems to be ready to strike again. ${survivor2} jumps up and rips the knife out of the creature's neck. He screams and stabs it a couple of times.\n  *page_break\n  \n  *if Ryan >= 30\n  \n   Your eyes begin to feel heavy, and your vision goes blurry. Your whole body burns, and the pool of blood under you becomes darker. \"Dammit, kid, don't you die on me!\" uou hear ${survivor2} shouting as he runs over to you and picks you up in his arms. You can feel blood dripping down your arms and legs, leaving a trail behind you. \n   \n   ${survivor2} seems to be talking, but you can't hear anything apart from the dull, ringing sound in your ears. Your head hangs back and bounces as he runs. It feels as if you don't have enough energy to move a finger.\n\n   He stops for a second before taking the sharp turn left at the shelves. ${survivor1} is cornered, and the big slimy creature stops for a second. It growls quietly, then all of a sudden it spits a big ball of slime right onto his face. He struggles hard to get it off. You can hear his face sizzling and melting away, revealing his meat and bones. He screams louder and louder, and it only intensifies when the slimy creature bites a chunk out of his face.\n   \n   ${survivor2} mumbles something and turns his head away, then continues running for the exit. He kicks the door open wide and continues running. The sunlight makes your body feel like it's burning. You try hard to focus and keep your eyes open. \n   \n   You look at ${survivor2}, and he glances down at you. Your eyes begin to feel heavier and heavier, until you can't keep them open anymore. They close, replacing everything with darkness.\n   *finish\n  \n  *else\n\n   Your eyes begin to feel heavy, and your vision goes blurry. Your whole body burns, and the pool of blood under you becomes darker. \"Goddammit, no!\" you hear ${survivor2}'s voice say as he runs past you, out to the corridor.\n   \n   You move your head slightly to the corridor and see ${survivor1} at the far end of it. The big slimy creature stops when it reaches him, then spits a big ball of goo onto his face. He screams loudly and tries to get it off. You can hear the sizzling sound of it, then see his face melting away, revealing his meat and bones.\n   \n   ${survivor2} stops for a second. You can see his lips moving and his mouth opening wide to scream, but you can't hear anything apart from the dull, ringing sound in your ears. He kneels down as the slimy creature takes a chunk out of his face. You're already nauseous as it is, and you have to try hard not to throw up at the sight. ${survivor2} slowly stands up and walks over to you with wet eyes and an angry look on his face. \n   \n   He picks you up in his arms. You can feel blood dripping down your arms and legs, leaving a trail behind you. Your head hangs back and bounces as he runs. It feels as if you don't have enough energy to move a finger. \n   \n   When he arrives at the shelves, he stops for a second and takes a look at ${survivor1} as the slimy creature feasts upon him. He wipes his eyes on his shoulder, then continues to run for the exit. \n\n   He kicks the door open wide and continues running. The sunlight makes your body feel like it's burning. You try hard to focus and keep your eyes open. You look at ${survivor2}, and he glances down at you.\n   \n   Your eyes begin to feel heavier and heavier, until you can't keep them open anymore. They close, replacing everything with darkness.\n   *finish\n   \n\n *disable_reuse #Radio home for help.\n  You quickly smash your backpack down on the ground and rip it open. You rummage through it until you find the walkie-talkie and lift it to your mouth. As fast as you can, you hold down the button and explain the situation, then release it when you're done. Nothing apart from a slight buzzing sound can be heard for a couple of seconds.\n  \n  \"You forgot to say 'over.' How do I know that's all you wanted to say, hmm?\" you hear ${capturer1}'s voice say from the walkie-talkie.\n  \n  \"We're trapped in a warehouse with Slimers, Wacks, and there are Aviatrixes outside! Over!\" you say as fast as you can, then release the button.\n  \n  \"Whoa, whoa, slow down there for a moment. All right, I'm just going to send all of the guards and ${survivor2} to find you and rescue you, okay? No. Not going to happen. Are you lost? Exactly. You're not. You're a scavenger, deal with it. Over and out.\" You hear a small clicking sound, and the walkie-talkie goes silent. You stash it back into your backpack and stand up, then glance over at them.\n  *goto ch3endingchoice\n", "ch4": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Doomsday on Demand[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase adfree $4.99 purchased\n  *delay_break 1200\n\n*label purchased\n\n[b][i]Chapter 4 - To Say Goodbye is to Die a Little[/i][/b] \n\n*if (wackwound)\n [i]\"Honey, I'm home!\"[/i] you shout as you enter the small wooden house and put your black leather office bag on the dining table.\n \n \"Finally! We've been waiting for ages!\" A young girl runs to you and gives your legs a hug.\n \n [i]\"Where's your mother?\"[/i] you ask, giving her head a rub.\n \n \"In the shower, she said she's getting ready for your anniversary.\" She sits down at the dining table. You walk over to the counter and start brewing coffee. \n\n \"Daddy? What's that?\" You turn around to see the young girl pointing out the window. Unbearable light flashes a couple of times from different places, then a mushroom cloud forms in the distance. You throw the coffee away with wide eyes and pick up the young girl. You jump down the stairs and bash the wooden door open with your shoulder. Without hesitation, you spin to the right, opening a small but very thick metal door.\n \n \"What about Mommy!\" the young girl shouts. The ground shakes as smoke rushes into the house, before you push the metal door shut. As it slams closed, you fall back and roll down the stairs as the whole building shakes wildly.\n *page_break\n \n \"Look! He blinked!\"\n \n \"Not the best time to play jokes.\"\n \n \"No, really! He did, look!\"\n \n You hear distant voices as you slowly open your eyes and blink a couple of times due to the heavy light coming from the ceiling. Your head feels like a truck ran into it. When you try to sit up, your stomach aches so much you feel like screaming out in pain, so you quickly decide against getting up.\n \n \"About time you stopped napping.\" You turn your head to the right and see ${currentbf} smiling at you with crossed arms. ${leftsurvivor} sits on a rusty white chair. You take a look around when the light stops blinding you. \n \n The room is more or less white, and your bed looks very much like those seen in hospitals. Or like the ones seen in laboratories, where they perform human experiments in the movies you've seen. It's yet to be decided. Apart from your bed, a sink, the rusty chairs, and some shelves and cabinets, there's nothing else inside the small room.\n \n \"How are you feeling, champ?\" ${leftsurvivor} gets up from the chair and stretches his limbs before letting out a big yawn. You would answer, but pain stings in your stomach. You're still wearing the same long-sleeved shirt. The only difference is the big hole in it, and the dark red blood dried in it. You pull your shirt up carefully and jump a little, eyes open wide from shock. You can still see where the knife came out. \n \n The middle of the wound is black as coal, and it's the same around it. The veins around it seem to shoot in different directions from the wound, and they all share the same coal-black color. It reminds you of a black sun someone would draw.\n \n \"Don't fret it.\" ${leftsurvivor} pulls your shirt down. \"It's a miracle you're alive. You've been out for a month. We thought…well, you know.\" He yawns again. \"I'm glad you're fine though. I'll go and get some sleep now. Haven't had a good night's sleep since. Take care of him, ${currentbf}.\" He fakes a smile and leaves slowly, looking down at the ground. \n  \n \"So…what happened? He didn't tell me anything.\" ${currentbf} pulls the rusty chair closer and sits down, looking at you eagerly. You smile slightly and glance from the backpack to the kevlar in the corner of the room. You begin to tell ${himher} the story quietly, so your wound doesn't hurt too much.\n *goto cont\n \n \n \n \n \n \n*elseif (slimerwound)\n \"Look, Mum! It's so cute! Can I keep it?\" a young girl asks with a wide smile on her face as she holds you.\n \n \"All right honey, just hurry up, okay? It's getting late as it is.\" An older, tired-looking woman walks past you. The young girl turns around and walks after her with you in her hands. Eventually, she walks through a small door leading into a wooden house. She puts you down in a small aquarium and sits down at the dining table.\n \n \"When is Dad coming home?\" she asks, playing with her fork on the table. The older woman shrugs and begins to cook in a pan.\n \n \"Mom? What's that?\" The young girl points out the window. The older woman turns around and looks out the window. Unbearable light flashes a couple of times from different places, then mushroom clouds form in the distance. She throws the pan away with wide eyes and picks up the young girl. She jumps out of her grip and runs towards you. \"I'm not leaving Ribby behind!\" She picks you up before the older woman drags her down the stairs. \n \n She bashes the wooden door open with her shoulder and spins to the right, opening a small but very thick metal door. \"What about Daddy!\" the young girl shouts. The ground shakes, and smoke rushes into the house before the older woman pulls the metal door shut. As it slams closed, they both fall back and roll down the stairs as the ground continues to shake.\n *page_break\n \n \"Look! He blinked!\"\n \n \"Don't joke around.\"\n \n \"No, really! He did, look!\"\n \n You hear distant voices as you slowly open your eyes, and blink a couple of times from the heavy light on the ceiling. Your head feels like a truck ran through it as you try to sit up. Your arm burns so much you feel like screaming in pain, so you quickly lay back in the bed.\n \n \"About time you stopped napping.\" You turn your head to the right to see ${currentbf} smiling at you and ${leftsurvivor} sitting on a rusty white chair. You look around when the light stops blinding you. The room is more or less white, and your bed looks very much like those seen in hospitals. Or like the ones seen in laboratories, where they perform human experiments in the movies you've seen. It's yet to be decided. Apart from your bed, a sink, the rusty chairs, and some shelves and cabinets, there's nothing else inside the small room.\n  \n \"How are you feeling, kid?\" ${leftsurvivor} stands up from the chair and stretches his limbs before letting out a large yawn. You would answer, but pain stings in your arm. You're still wearing the same long-sleeved shirt. The only difference is the missing sleeve. You can see corrosion marks on the chest of your shirt and on what's left of the sleeve. There's also dark red blood dried in it.\n \n You glance over to your arm and jump, eyes wide from shock. It's bandaged up, but you see blood soaked through it. It seems to be deformed, and much thinner than your other arm. The veins that run up from your arm to your shoulder seem to be black, and they give you the chills. It reminds you of the edge of a black sun someone would draw. You would try to move it a little, but it just burns in pain.\n  \n \"Don't get disappointed now.\" ${leftsurvivor} pulls the cover up to conceal your arm. \"It's a miracle you're alive. You've been out for a month now. We thought…you know.\" He yawns and scratches his goatee. \"I'm glad you're okay though. I'll go and get some rest. Haven't had a good night's sleep for weeks. Take care of him, ${currentbf}.\" He turns around and leaves slowly, looking down at the ground. \n  \n \"So…what happened? He didn't tell me anything.\" ${currentbf} pulls a rusty chair closer and sits down, looking at you eagerly. You glance from the backpack to the kevlar in the corner of the room. You smile slightly and begin to tell the story.\n *goto cont\n \n \n\n \n*label cont\n*page_break\n*set Clothing 2\nYou're just finishing the story when ${capturer1} opens the door wide. \"He-e-ey, you,\" he points at ${currentbf}. \"Out. Now.\" ${currentbf} nods and wishes you well again before leaving the room, and ${capturer1} takes the seat. \n\n\"So! How's that wound of yours doing, kiddo?\"\n*fake_choice\n #\"Hurts like hell.\"\n  *set Ivan %-5\n  *set Evil %-5\n  \"Well, boo and hoo now. Life of a scavenger. Either get used to it, or stop playing the hero unnecessarily. Your choice.\"\n #\"It's nothing. I can barely feel it.\"\n  *set Ivan %+5\n  *set Evil %+5\n  \"Heh, good. Because you'll probably have to stare death in the face a couple of times. Scavenger life and stuff. Get used to it.\" \n\n  \nHe shrugs and smirks a little. \n*if (wackwound)\n \n \n \"Someone patched you up nicely though, huh? One must wonder who that person could be. You may call me Dr. ${capturer1} from now on.\" He chuckles and looks at the kevlar in the corner. \n \n \"It shanked through the kevlar. That's something, isn't it? Say, are you on a quest to collect wounds or something? I mean, you shouldn't take what I said about girls and wounds that serious!\" He grins and combs his hair back, then pulls your shirt up and tilts his head to the right with a disgusted look on his face. \n \n \"Well, that's…certainly…different than before. Oh well, you have a sun on your belly now. It's dark, and ugly, and infected, but hey, it's a sun. To be honest, I don't really know how you survived that, but I'm pretty sure it's thanks to my doctoring skills. Anyway, what I don't understand most of all is, why did you endanger yourself? Hmm? You could have just turned around and left. Do you really believe that even one of them would have saved you? Especially if they had the chance to save one another. See, we're having this talk again. Think about it, kiddo.\"\n\n He pats your belly a couple of times, and you hiss in pain. \n \n *goto cont2\n \n\n \n*else\n\n \"Someone patched you up nicely though, huh? One must wonder who that person could be. You may call me Dr. ${capturer1} from now on.\" He chuckles and looks at the kevlar in the corner. \n \n \"You were lucky to have that on. Otherwise, there wouldn't have been much to do if that thing corroded through your chest. Apart from burying you. And I just so happen to hate digging. Say, are you on a quest to collect wounds or something? I mean, you shouldn't take what I said about girls and wounds that serious!\" He grins and combs his hair back, then rolls the bandage off your arm and tilts his head to the right with a disgusted look on his face. \"Well, that's…certainly…different than before.\"\n \n You look down at your arm and almost throw up. It's deformed, and corroded unevenly. At some places, you can see your meat and muscles. You turn your head away and frown a little. He takes his time changing the bandage on it, then sits back in the chair. \n \n \"Cheer up, kiddo, at least you're alive, huh? Tell me something though, will ya? To be honest, I don't really know how you survived that, but I'm pretty sure it's thanks to my doctoring skills. Anyway, what I don't understand most of all is, why did you endanger yourself? Hmm? You could have just turned around and left. Do you really believe even one of them would have saved you? Especially if they had the chance to save one another. See, we're having this talk again. Think about it, kiddo.\" \n \n He pats your arm a couple of times, and you hiss in pain. \n *goto cont2\n  \n  \n*label cont2\n*page_break\n\n\"Focus on getting better now. We're running low on supplies, and you honestly can't expect us to live on chocolate, right? If you need something, well, figure out how to tell us or something. Or better, get it for yourself.\" He winks and leaves the room, slamming the door closed behind himself.\n\nFor the next couple of days, you sleep most of the time. When you are awake though, ${currentbf} is there to keep you entertained. ${leftsurvivor}, however, doesn't check on you. ${capturer1} comes and treats your wound every now and then. Eventually, your wound doesn't burn every second and at every movement. \n\nAfter about a week, one morning, ${capturer1} bursts in. \"Morning! Ready to start scavenging? Good. ${capturer2} is sick of going out himself, you know. He's long past those days when his duty was to go out.\" He bandages your wound quickly and picks up your backpack from the corner. \n\n\"You lost your knife, and that's what you call tough luck. You know, we aren't stocked with weapons here, despite how it may look.\" He takes a look at your shirt as you stand up carefully. \"Same can be said about clothes your size. Oh well, your shirt is still fine. More or less. Feel free to change it if you find something outside. Oh, and I've also taken your walkie-talkie. It was a mistake giving it to you. Get going now. ${leftsurvivor} is waiting for you.\" He gives your back a slight push as you sit up.\n\nYou stand up and put the backpack on. It doesn't weigh much, but it still burns your wound as you put it on. You walk up the stairs and through the kitchen, where ${leftalonebf} hands you a huge piece of chocolate. \"I know I'm not supposed to just give these away, but…it'll help you heal.\" ${leftalonebf} smiles, and you take the chocolate before heading towards the decontamination chamber. On the way, you start eating it, and it feels amazing. It's been a while since you tasted chocolate.\n*page_break\n\n${leftsurvivor} awaits you at the decontamination chamber, with his gas mask already on. You put yours on too, then step into the chamber. It almost feels like you're getting used to the process. Outside, the guard pulls the fence open and slams it behind you, as usual. You begin to walk in silence. Your wound still hurts like hell, but you manage to keep up the pace.\n\n\"So…\" ${leftsurvivor} turns to you, with a small pistol similar to yours in his hands. He shrugs a little when you look at it. \"That's what you get for losing your gun. Anyway, let's…check out the place. I really want my gun back and stuff,\" he says with a slight shrug and clears his throat. You nod slightly and head down the same path you did last time. You walk down the dirt road for a while, until you see the hill. \n\n
