 You have to be taught a lesson,\" he says and takes out the bottle with the brown liquid. He opens it and slams it down on the table. \"You have to drink this in one gulp.\"\n\n \"Just kidding.\" He stands up and walks next to you, then turns you towards him by the chair. \"Take your top off. Unless you want me to cut it off. I believe it would be very unpleasant to go out shirtless,\" he says and flips out his big, sharp, green hunting knife.\n *goto precont\n \n *label precont\n *page_break\n *if clothing = 3\n  \"Nice hoodie. Not.\" He laughs and scratches his face with the tip of his knife. \"I wonder where you got that one. Must have had a blast out there. Take it off. I won't say it again.\"\n  *goto ivancont\n  \n *elseif (clothing = 1) or (clothing = 2)\n  \"I see you're still rolling with this amazing shirt. It's become very stylish. Truly.\" He laughs and scratches his face with the tip of his knife. \"Take it off. I won't say it again.\"\n  *goto ivancont\n  \n  \n  \n  \n  \n  \n *label ivancont\n\n You slowly pull your shirt over your head and rest it on the table. He smirks and pokes your bandage with the tip of his knife. It makes your wound tingle and sends an uncomfortable shiver up your spine. \n \n \"So! Since you're such a bad boy and think you can stay out for nights, even though I said not to, and see? That's the problem. I tell you not to do something, and you just go ahead and do it. So, there's a lesson to be learned here,\" he says and pours some of the brown liquid on your chest, then holds the tip of the knife against your throat. \n \n \"We can do this the easy way, or the hard way. You decide which one it is. I prefer the hard way, because, oh boy, it would just fill the room with excitement. The easy way, you stay put and let me do my thing. The hard way is, you struggle and fight back, and I'll be forced to calm you down. I have my ways.\" He winks and puts the tip of the knife to your chest. \n \n \"You know what? I'll just start doing my thing, and we'll see which one you choose.\"\n\n He grips your shoulder with his other arm and sinks the tip of the knife into the right side of your chest. He moves it down, leaving a small, bleeding line. He chuckles and continues to make small cuts on your chest. \n \n It sends a sharp pain down your chest, and you move a little uncontrollably. You're breathing as hard as you can. Pain spreads through your whole chest as you feel the sharp knife cutting through your skin.\n *choice\n   #Fight back.\n    *set Ivan %+5\n    You push his hand off your shoulder and grab his other hand. You try to stand up and make a run for it, but he holds you back by your throat as you struggle to break free. \"Attaboy!\" He laughs and pulls you up to your feet. He lifts you by your throat and back, then slams you hard on the table. He keeps gripping your neck tightly. \n\t\n    You begin to feel dizzy, and your vision goes blurry from the impact. He keeps cutting into your chest. You struggle and punch his hand on your throat. It feels as if hours have passed when he releases your neck, and you gasp for air. Blood runs down from several cuts on your chest. He grips the neck of the bottle and pours some of the brown liquid on you. Tears roll down your cheeks as you feel it stinging your flesh. \"Phew, that was something! Did you enjoy it as much as I did?\" He pulls you up to your feet.\n    *goto ivancont_1\n    \n    \n   \n   \n   \n   #Sit still and endure it.\n    *set ivan %-5\n    You sit still as the tip of the knife sinks into your skin, again and again. You breathe hard but hold back your tears. You have the urge to scream and fight back, but you take hold of yourself. It feels as if hours have passed when he releases your shoulder and steps away from you. The small cuts on your chest burn like hell, and blood runs down from several of them. He grips the neck of the bottle and takes a sip from it, then splashes some on your wound. \n\n    Tears roll down your cheek uncontrollably as you feel it sting your flesh. \"That was rather boring. Apart from the excitement to punish you for being a bad boy, you just sat there like a stump.\" He pulls you up to your feet.\n    *goto ivancont_1\n\t\n \n \n *label ivancont_1\n *set Chestwound true\n \n Your legs tremble, and blood runs down to your jeans from the several small cuts on your chest. ${capturer1} smirks and raises one of his eyebrows. \"I could be a good tattoo artist. Oh well, maybe as a secondary job when I'm done ruling ${base}.\" He chuckles and points at your chest. \n \n You glance down and see that the cuts spell out letters. It takes a while, but you manage to read it through the fresh blood running from them. [i]Ivan's property![/i] Your eyes widen, and he chuckles. He licks the knife, then wipes it on your clothes and puts it away.\n \n \"This way, they'll know where to return you. In case you get lost for a night again.\" He pats your back roughly and leans against the table. \"Don't take this personal, kiddo. But I can't let you, or anyone, ruining all that I've been working at. I built this society from nothing. And believe it or not, I have plans. Big plans. And I won't let you, or anyone for that matter, get in the way of that, kiddo.\" He pats your cheek as he chuckles, and you take a look at your chest again. \n \n \"I hope my message has gotten through. You know, we could have had a great thing together. But you're on the way to ruining it. That's a shame. A real shame. Anyway, you can leave now. And to show my generosity, you can take the day off. Leave your gear here. I hope there are supplies in there. For your sake.\" He sits back in his armchair, and you reach for your clothes. He pulls them away and shakes his head slightly. \n \n \"Nope, you'll stay like this for the rest of the day. I'll return them to you when the time is right. It's part of the lesson. And tell ${leftsurvivor} to go out on his own today.\" He takes another sip of the brown liquid and waves you off.\n\n You open the door and walk out as the blood drips down your chest. You tell ${leftsurvivor} to go out on his own. He nods and shakes his head a little when he sees your wounds. You walk through the lobby and the kitchen, where all the guards and workers stare at you. They mumble and shout, some of them laughing. You reach ${capturer2}, and he just bursts out laughing. [i]\"You finally got what you deserve, punk,\"[/i] he says, then firmly pushes you down to the basement.\n *finish Later that day…\n \n \n\n \n*elseif reportedtimes >= 3\n *set Leftsurvwound true\n *goto leftsurvwound\n  \n  \n *label leftsurvwound\n *check_achievements\n *if (reportedtimes = 4)\n  *achieve report\n  *goto leftsurvwound2\n  \n *label leftsurvwound2\n \"You know what, kiddo? Let's say I'm satisfied with your reports. So far, so good. You're balancing between meeting my expectations and disappointing me, but…hey, you're still alive, aren't you? And if you keep up the good work, we might have something special one day. Together. Doesn't that just sound lovely? But…know that I can't let anyone ruin everything I've been working on,\" he says, taking the bottle with brown liquid out. He twists it open and takes a sip. \n \n \"I built this society from nothing. And believe it or not, I have plans. Big plans. And I won't let anyone, or you, for that matter, get in the way of that, kiddo. You know what would have happened if you fell below my expectations? Wanna hear it? You know what? I'll demonstrate it for you.\" He stands up and walks out of the door.\n \n Moments later, he returns with ${leftsurvivor} at his side. They stop at the table, and ${capturer1} crosses his arms. \"All right! You've caused more disappointment than a ${age} year old. What do you have to say in your defense, um…what's your name again?\" \n \n \"${leftsurvivor}.\" He mumbles and glances at you.\n\n \"Yeah yeah, whatever.\" ${capturer1} grips the bottle and takes another sip. ${leftsurvivor} glances at you with a worried look on his face, and your heartbeat quickens. \"Listen closely, because I'll only say this once. We can do this the easy way, or the hard way. You decide which one it is. I prefer the hard way, because oh boy, it would just fill the room with excitement. The easy way, you stay put and let me do my thing. The hard way is, you struggle and fight back, so I'll be forced to calm you down. I have my ways. Now, be good and take your shirt off. Then lay back on the table.\"\n\n He grins and flips out his large, sharp, green hunting knife. ${leftsurvivor} gives you a worried look, then takes his shirt off.\n\n ${capturer1} nods and grips his shoulders, then pushes him onto the table. He puts the tip of the knife to his chest and makes a small cut. Blood drips down, and ${leftsurvivor} struggles, but ${capturer1} pushes the knife to his neck. He glances at you and smirks. \"Be a good boy, and give me a hand here.\"\n\n ${leftsurvivor} looks at you and frowns. \"Don't do anything, just stay where you are.\"\n *fake_choice\n \n  #Help ${capturer1}.\n   *set helpedmutilate true\n   *set Ivan %+10\n   *set Ryan %-10\n   *set Malcolm %-10\n   *goto lefthelp1\n\t\n   *label lefthelp1 \n   You jump up from the chair and rush over to them. You slam your hands on ${leftsurvivor}'s left hand, holding it down. He frowns and swears, then punches you with his other hand. ${capturer1} takes a small pistol out of his drawer and pushes the barrel into ${leftsurvivor}'s mouth. \n   \n   \"Now now, you don't hurt my assistant. He's becoming something greater than all of you. Lay a finger on him again, and I'll end you. Got it?\" \n   \n   ${leftsurvivor} nods, an angry look on his face. \"Now, stay still.\" ${capturer1} gives his head a slight push with the barrel.\n   \n   He continues carving into his chest. ${leftsurvivor} moans in pain. When ${capturer1} takes the end of the pistol out of his mouth and lets go of him, you do the same and stand up. ${capturer1} grips the bottle and pours some of it onto his fresh, bleeding wound. Tears roll down his cheeks uncontrollably, and he screams in pain a little. \n   \n   He stands up slowly and looks down at his chest. Blood runs down his stomach, and you look at his chest too. You make out some letters under the fresh blood. [i]Disappointment.[/i]\n   \n   ${capturer1} leans against the wall with arms crossed and shakes his head a little. \"Don't take this personal. There was a lesson to be learned here, and I hope it's gotten through.\" He looks at you. \"You can leave now. Thanks for the help, kiddo. We might have a future together, eh? And to show my generosity, you can take the day off. Leave your gear here. I hope there are supplies in there. For your sake.\"\n   \n   ${leftsurvivor} puts his hand on his shirt. \"Nope, you and your clothes stay here. I want to talk with you. And don't think for a second that I'll let you leave with your shirt on. It's part of the lesson.\" ${capturer1} pushes himself off the wall. He looks at you, so you leave the room and head towards the basement.\n   *finish Later that day…\n  \n  #Help ${leftsurvivor}.\n   *set Ivan %-10\n   *set Ryan %+10\n   *set Malcolm %+10\n   *goto lefthelp2\n\n\t\n   *label lefthelp2\n   \n   You jump up from the chair and rush over to them. You push ${capturer1} away, so he steps back and reaches into his drawer. He pulls out a small pistol and aims it at you. \n   \n   \"That was highly disappointing. You know, I should just shoot you right where you stand. I thought you were becoming something greater. Oh, well.\" He quickly walks up to you and suddenly sinks his foot into your stomach. You fall back, gasping for air.\n   \n   \"I'll consider this a result of temporary confusion, okay? But if you turn your head away and don't look at this, I'll do it to you too. Don't move an inch,\" he says, pushing the pistol against ${leftsurvivor}'s head.\n   \n   He looks at ${capturer1} angrily. ${capturer1} smirks and continues carving into his chest. ${leftsurvivor} moans in pain. A minute later, ${capturer1} takes the end of the pistol away from his head. \n   \n   You stand up and give your stomach a slight rub. ${capturer1} grips the bottle and pours some of it onto his fresh, bleeding wound. Tears roll down his cheeks uncontrollably, and he screams a little in pain. He slowly stands up and looks down at his chest. Blood runs down his stomach, and you look at his chest too. You make out some letters under the fresh blood. [i]Disappointment.[/i]\n   \n   ${capturer1} leans against the wall with arms crossed and shakes his head a little. \"Don't take this personal. There was a lesson to be learned here, and I hope it's gotten through.\" He looks at you. \"You better leave now, before I change my mind. I thought you were becoming something better than these lads. You don't deserve it, but to show my generosity, you can take the day off. Leave your gear here. I hope there are supplies in there. For your sake.\"\n   \n   ${leftsurvivor} puts his hand on his shirt. \"Nope, you and your clothes stay here. I want to talk with you. And don't think for a second that I'll let you leave with your shirt on. It's part of the lesson.\" ${capturer1} pushes himself off the wall. He looks at you, so you leave the room and head towards the basement.\n   *finish Later that day…\n \n   \n  \n  \n  \n  #Stay put.\n   You shake your head and look at both of them. ${leftsurvivor} looks at you, his face pleading for help, but ${capturer1} shakes his head. \"Shame, kiddo, a real shame,\" he says and takes a pistol out of his drawer, then pushes it hard against the side of the still struggling ${leftsurvivor}'s head. \n   \n   \"Now, stay still.\" ${capturer1} gives his head a slight push with the barrel.\n   \n   He continues carving into his chest as ${leftsurvivor} moans in pain. Not long after, ${capturer1} takes the end of the pistol away from his head and lets go of him. ${capturer1} grips the bottle and pours some of it onto his fresh, bleeding wound. \n   \n   Tears roll down his cheeks uncontrollably, and he screams a little in pain. He slowly stands up and looks down at his chest. Blood runs down his stomach, and you look at his chest too. You make out some letters under the fresh blood. [i]Disappointment.[/i]\n\n   ${capturer1} leans against the wall with arms crossed and shakes his head a little. \"Don't take this personal. There was a lesson to be learned here, and I hope it's gotten through.\" He looks at you. \"You can leave now. After all, you just sat there like a wimp. I really expected more from you. Anyway, to show my generosity, you can take the day off. Leave your gear here. I hope there are supplies in there. For your sake.\"\n   \n   ${leftsurvivor} puts his hand on his shirt. \"Nope, you and your clothes stay here. I want to talk with you. And don't think for a second that I'll let you leave with your shirt on. It's part of the lesson.\" ${capturer1} pushes himself off the wall. He looks at you, so you leave the room and head towards the basement.\n   *finish Later that day…\n", "ch5_2": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Doomsday on Demand[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase adfree $4.99 purchased\n  *delay_break 1200\n\n*label purchased\n\n*if (Leftsurvwound)\n \"I…I don't know what to say. We have to get out of here, and fast. I'm fed up. Don't tell me you're not. This is the second time ${leftsurvivor} got punished for you. Don't take it wrong, it's not your fault, ${capturer1} just makes it look like it is.\" ${currentbf} bites ${hisher} lip and shakes ${hisher} head. \"He's an animal. When is he coming back? It's getting dark already.\" ${currentbf} wraps ${hisher} cover around himself and sits down next to you with a sigh. Without a word, ${heshe} lights a small candle and puts it in the corner. You glance down at it and can't stop staring at it.\n \n After a while, ${leftsurvivor} climbs down the ladder, holding his clothes. He quickly puts them on and climbs into bed without a word. He turns his back to you and pulls the cover over his head. ${currentbf} glances at you, then stands up and gives his shoulder a slight shake. \"Not. Now.\" ${leftsurvivor} shakes ${hisher} hand off. ${currentbf} shrugs a little, then you both climb into your bed. You close your eyes and try to sleep.\n \n \"${firstname},\" ${currentbf} whispers, \"we have to talk about something.\"\n\n \"${currentbf}…no.\" ${leftsurvivor} mumbles.\n\n \"Sorry,\" ${currentbf} whispers. \"Soon. When it's time. Just…try not to get into any more trouble. Okay?\" ${currentbf} clears ${hisher} throat. \"Good night.\"\n \n You don't know whether you answered or not, as you fall asleep right after ${heshe} finishes.\n *goto cont1\n \n \n\n\n*else\n \"I…I don't know what to say. We have to get out of here, and fast. I'm fed up. Don't tell me you're not.\" ${currentbf} bites ${hisher} lip and shakes ${hisher} head. \"He's an animal. When does he give your clothes back? It's getting dark already.\" ${currentbf} wraps ${hisher} cover around you and sits down next to you with a sigh. Without a word, ${heshe} lights a small candle and puts it in the corner. You glance down at your chest. You can still see what he carved into it under the dried blood. It still hurts, but you can bear the pain.\n \n After a while, ${capturer1} comes down and stands in front of you. \"Hey, there's something on your chest. Oh, wait.\" He laughs and throws your clothes at you. \"I hope you've learned your lesson now. Next time, I'll have to take more drastic steps. I don't think any of us want that. Al right, I'm not going not lie. I'd enjoy it, but I'm pretty sure you wouldn't.\" He combs his hair back and heads for the ladder. Before he begins to climb up, he turns his head to you. \n \n \"Let's hope ${leftsurvivor} comes back in time. I don't want to dull my knife on you boys.\" He laughs and climbs up. You put your clothes back on. You and ${currentbf} both climb into your bed. It feels very uncomfortable to lie down with the cuts on your chest, but you close your eyes and try to sleep.\n\n \"${firstname},\" ${currentbf} whispers, \"we have to talk about something…soon. When it's time. Just…try not to get into any more trouble. Okay?\" ${currentbf} clears ${hisher} throat. \"Good night.\"\n \n You don't know whether you answered or not, as you fall asleep right after ${heshe} finishes.\n *goto cont1\n \n \n*label cont1\n*page_break\n\n*if (wackwound)\n\n \"Are they…dead?\" the little girl asks as she slowly walks behind you, dragging her backpack on the dusty ground and looking down.\n \n \"No. And put your backpack on your back,\" you say, wiping the blood from your hand onto your shirt, then checking the bullets in you pistol. You glance back at the house once more, then keep walking down the dark street.\n \n \"I know you killed them. It was their food and house, and you killed them.\" The little girl lifts her backpack up from the ground and puts it on her back unwillingly.\n \n \"This is how the world is now. They would have done the same thing. We have to do anything to stay alive.\" You check the door on another house. It's locked, so you try the window, but the blinds are down.\n \n \"Well, I won't do anything like that. Ever,\" she says and shakes her head.\n \n \"I'll do it, then. Don't worry about it, honey. I'll keep you safe.\" You try to pry the blinds open when you hear grunting and growling. You look around but can't see much in the darkness. You hear swift footsteps coming in your direction. \n \n \"Honey, be good and check that door.\" You point towards the house on the other side. She begins to run towards it. You raise your pistol and aim it in the direction where the footsteps are coming from. \"I'm going to shoot!\" you say with shaking hands. The footsteps come closer and closer until a bloody, screaming face knocks you to the ground.\n *goto awake\n \n*else\n\n \"Is he…dead?\" the little girl asks, walking slowly behind her mother. She drags her backpack on the dusty ground and looks down, while you sit in her pocket.\n \n \"No. And put your backpack on your back,\" she says and wipes the blood from her hand onto her shirt, then checks the bullets left in her pistol. She glances back at the store once more and continues walking down the dark street.\n \n \"I know you killed him. It was his store and food, and you killed him.\" The little girl lifts her backpack up off the ground and puts it on her back unwillingly.\n \n \"This is how the world is now. He would have done the same thing. And he was even about to. I had no other choice. We have to do anything to stay alive,\" she says and checks the door on another house. It's locked, so she tries the window, but the blinds are down.\n \n \"Well, I won't do anything like that. Ever. I won't hurt innocent people,\" she says and shakes her head.\n \n \"You don't have to. I only hurt people who deserve it, okay? I promise. Don't worry about it, honey. I'll keep you safe.\" She's trying to pry the blinds open when grunting and growling can be heard from a distance. The little girl looks around but can't see much in the darkness. You hear swift footsteps coming in your direction. \n \n \"Honey, be good and check that door.\" The mother points towards the house on the other side, next to a small swamp. She begins to run towards it and keeps glancing back. The mother raises her pistol and aims it in the direction the footsteps came from. \"Who are you? Show yourself, or I'll shoot!\" she says with shaking hands. The little girl opens the door and looks back at her mother. You see a screaming, bloody face in the darkness, rushing towards the mother. You slip out of the grip of the little girl when she falls on the ground. The little girl screams a little, and you roll into the muddy swamp behind the house. The swamp swallows you in no time.\n *goto awake\n \n \n\n*label awake\n*page_break\nYou awaken to ${currentbf} shaking you and pointing towards the ladder. ${leftsurvivor} is there; he stretches his limbs and climbs up. You quickly jump out of bed and follow him. You find your gear at the usual placed and catch up with him in the decontamination chamber. He puts his gas mask on without a word, then leaves. You follow him outside. He turns left as the fence slams behind the two of you, then walks down the road without hesitation. You adjust your backpack and follow him.\n \nYou head down the main road for a while. You're getting close to the warehouse when you see a large, dark, slimy creature standing in the distance. It's chewing furiously upon a big ray-like creature. ${leftsurvivor} stops and climbs over the bent guardrail on the side of the road. You climb after him and slide down a steep, deserted hill. \n\nWhen you reach the bottom of it, unbearable heat emerges from the small pond in front of you. It's stuffed with yellow and green reeds. ${leftsurvivor} sighs and pushes them away, making his way through the pond. The dark, gooey water only reaches up to your knees, but your feet get stuck in the bottom of it, making it even more challenging. The unbearable heat steaming from the pond doesn't help either.\n\nFog begins to form on the glass of your gas mask. Walking becomes very tiring very fast, and you pant as you push the reeds away. ${leftsurvivor} stops to breathe too, then turns to you.\n\n*if (markedwound)\n\n \"Listen…I'm sorry about what happened the other day. And I don't know how much longer I can take ${capturer1}. I'm fed up with him, and I'd be surprised if you weren't. Just…hold out a little longer, okay? We're working on something. ${currentbf} and I.\" \n \n He pats your back and turns back around. \"Let's go.\"\n *goto cont2\n \n \n\n*elseif ((leftsurvwound = true) and (helpedmutilate = false))\n\n \"Listen…about the other day. I want you to know that I'm not angry at you. I'm just…frustrated. There's been so many things the past few weeks, and I'm getting tired of it. I'm fed up with ${capturer1} and ${base}. I'd be surprised if you weren't. Just…hold out a little longer, okay? We're working on something. ${currentbf} and I.\" \n \n He pats your back and turns back around. \"Let's go.\"\n *goto cont2\n\n*elseif ((leftsurvwound = true) and (helpedmutilate = true))\n\n \"Listen…about the other day. I don't know why you did what you did. I don't know what reason you could have had to do such a thing. I want you to know that I'm not angry at you. I'm just…frustrated. I hope you're not becoming like ${capturer1}. That would be horrible. Anyway, I just want you to decide which side you're on…and you'd better do it fast.\" \n \n He nods and turns back around. \"Let's go.\"\n *goto cont2\n \n \n \n \n*label cont2\n\nThe reeds cut into your clothes every now and then, so you're filled with happiness when you finally get past them. You and ${leftsurvivor} both stop for a second to catch your breath. You wipe the fog off of the outside of your gas mask, then take a deep breath and hold it in as you stick a finger inside. Swiftly, you wipe the inside too. It feels good to finally be able to see again. \n\nHouses with gardens and fences surrounding them stand in the distance. Surprisingly, most of them are in pretty good condition. Some of them are broken or missing, but most of them look only slightly bent. After walking past a smaller house, you take a left turn after ${leftsurvivor}.\n\nYou freeze when you find yourself in the suburbs. There are houses to the left and right, each surrounded by a barbed fence and a gate out front. Your heartbeat quickens, and strange feelings get hold of you as memories strike you. ${leftsurvivor} turns around. \"Is everything okay?\" You nod and catch up to him. He looks around and crosses his arms. \"Finding houses like these is always golden. I hope we can find some good loot in them.\" He chuckles and walks past some houses with broken front doors and gates. \n\n\"Well, let's get looting,\" he says and walks into the house on the right.\n\nYou dig through a couple of houses, but only find an insignificant amount of supplies, including a couple of small candy bars, boxes of cereal, and canned food, so you keep digging through the houses. They're mostly demolished. In most of them, it's impossible to get upstairs, as the stairs and roof have fallen to the ground. You leave the house and proceed forward towards a light-green house. As you get closer, your heartbeat quickens again. You freeze as ${leftsurvivor} walks into the house. \n\n\"Yeah, ${leftsurvivor}, so golden with all the loot…goddammit, why didn't we find this earlier? Maybe before others emptied them.\" He comes out and murmurs, then looks at you. \"Are you feeling okay?\" \n\nYou keep glancing at this orange house. Its fence is bent, and the gates are slightly open. The garden is dried up. The front door is closed, and the windows are broken. Its red roof has several cracks in it. Some parts of it are broken and fallen inside the top floor, some next to the house. \n\nYour heart beats quicker, and you can feel it pounding in your chest. Your breathing gets faster as you stand still and just stare at the house. Your eyes get wet, and ${leftsurvivor} puts his hands on your shoulder, then turns you toward him. \n*page_break\n\n*if (leftsurvivor = Ryan) and (goal = \"parents\")\n\n \"I know what's going on here. And trust me, I know what it feels like.\" He grips your shoulders a bit tighter and looks into your eyes. \n \n \"I remember what you said when I asked about your goal, but I also told you that some mysteries are better if they stay that way. Just…think about my Tiff. But the decision is all yours, I won't hold you back. Moreover, I'll stay by your side. So, what's it going to be?\"\n *goto cont3\n\n\n*else\n\n \"I think I know what's going on here. I can only imagine what it must feel like.\" He grips your shoulders a bit tighter and looks into your eyes. \n \n \"Do you want to go inside? I understand if you do. I can't and won't hold you back. But…what you find inside might not be worth it. You have to decide whether you want to take that risk or not. So, what's it going to be?\"\n *goto cont3\n\n\n\n*label cont3\n*choice\n\n #Go inside.\n  *set wentinside true\n  *set wentinsides +1\n  \n  You nod, and your heartbeat quickens. ${leftsurvivor} turns towards you. \"All right. Let's go. I won't let you do it alone.\" He pats you on the back, and you slowly make your wary towards the gate. With a slight push, the gate snaps open. It creaks, then falls on the ground when the screws break. You walk to the closed door, then stop to take another deep breath. ${leftsurvivor} gives your back a slight rub and takes his pistol out. You grip the handle and push the door open. It screeches and shakes along the way, but it opens all the way.\n  \n  You find yourself staring at the stairs. Feeling nervous, you step inside and look from your parents' room and the living room on the left to the kitchen on the right. Your legs tremble as you see your once tidy and neat house, now dirty and in ruins. Sand and dust cover everything. Larger and smaller pieces of the house lay everywhere. The furniture is all broken into pieces. It's almost as if the house itself got scrambled. ${leftsurvivor} steps out from behind you and walks into the kitchen. He starts to go through the kitchen cabinets, drawers, and the fridge. \n  \n  \"Feel free to browse around. I'll search for stuff, if that's okay. Just shout if something is wrong.\" \n  \n  You walk through the living room and glance back at the TV. Its screen is shattered, the pieces scattered on the floor. You step over the fallen couch and walk to your parents' closed door. You try to open it, but it doesn't budge. You try the handle again, but it seems to be locked. \n  You kneel down until you're eye level with the keyhole and try to peek inside. You can't see anything and notice there's something broken in the lock.\n  \n  You dust your jeans off and turn around. ${leftsurvivor} is still searching around in the kitchen. You hold onto what's left of the stairway railing and head upstairs, stepping over the debris.\n  *page_break\n  \n  You find your door broken in half but still standing in the doorway. As you push it open, it breaks and falls to the ground. The impact sends a big pile of dust and sand into the air. You walk over the door and stand in the middle of your room. \n  \n  Strange feelings run through you again. Anger, fear, sadness. All those feelings fighting inside you, but you can't get ahold of just one feeling. Your bed looks dirty but otherwise intact. The wardrobe has several tiny cracks running through it, and it's a miracle it's still standing. Your mirror in the bathroom is shattered to tiny pieces, along with your window.\n  \n  You walk to your wardrobe and pull its door open. You find your clothes mixed up inside the wardrobe. You take the ones still in good shape and put them on your bed. You lay them next to each other on the left and right side of your bed, then see a long-sleeved shirt similar to the one you're wearing. The memory of purchasing clothes with your mother flashes before your eyes. \n  \n  You clench your fists for a second, then take a look at the green-and-blue long-sleeved shirt and the brown jeans on the left. \n  \n  On the right, you see a dark-blue shirt with a dark-brown jacket and the same blue jeans as you currently have on, only a bit lighter blue. You glance from the clothes on the bed to yourself. \n  \n  Your clothes look overused as it is, so you wonder if it's time to change them.\n  *choice\n   \n   #Go with the long-sleeved shirt.\n    *set Clothing 4\n\t\n    You undress and throw your old clothes into the corner of your room. It feels weirdly good to be able to finally take the dirty clothes off. A cold breeze passes through your room, giving you a slight shiver. You slide the green-and-blue long-sleeved shirt over your head, then sit on the bed and put on your brown jeans. \n\t\n    A sudden feeling of being clean hits you, even though you haven't had the chance to use water to actually clean yourself in a while. You glance down at your poor, overused shoes, and it draws a smile to your face. You give your fresh clothes another tug and leave the room. You glance back one more time from the doorway. Both happiness and sadness fight inside you. It feels hard to leave, but you turn around and head down the stairs.\n    *goto housecont\n   \n   #Go with the jacket.\n    *set Clothing 5\n\t\n    You undress and throw your old clothes into the corner of your room. It feels weirdly good to be able to finally take the dirty clothes off. A cold breeze passes through your room, and you get a slight shiver. You slide the dark-blue shirt over your head, then put on the dark-brown jacket. You sit down on the bed and put on the blue jeans, too. \n\t\n    A sudden feeling of being clean hits you, even though you haven't had the chance to use water to actually clean yourself in a while. You glance down at your poor overused shoes, and it draws a smile to your face. You give your fresh clothes another tug and leave the room. You glance back one more time from the doorway. Both happiness and sadness fight inside you. It feels hard to leave, but you turn around and head down the stairs.\n    *goto housecont\n   \n   #Don't change my clothes.\n    You turn your head away from the clothes, then throw them in the corner of your room. You glance down at your dirty, overused clothes, but somehow you don't regret your decision. You even feel some happiness filling the sadness within you. \n\t\n    You give your dirty clothes a small rub and leave the room. You glance back one more time from the doorway. Both happiness and sadness fight inside you. It feels hard to leave, but you turn around with a sigh and head down the stairs.\n    *goto housecont  \n  \n  \n  \n  *label housecont\n\n  You walk down the stairs and find ${leftsurvivor} standing in the doorway. He leans against the door frame and looks at you.\n  *if (Clothing = 4) or (Clothing = 5)\n  \n   \"I see you've found yourself some new clothes. It was about time, I'd say. You look a hundred percent better now.\" He chuckles a little.\n   *goto housecont2\n   \n  *else\n  \n   \"I see you haven't found anything useful, not even clothes. Well, maybe at some other place we can. You really need some new clothes.\" He chuckles a little.\n   *goto housecont2\n   \n  *label housecont2\n  \n  He turns around to walk through the door, and you're about to do the same when you hear rumbling noises coming from your parents' bedroom. You and ${leftsurvivor} turn your heads towards it, then he looks at you. \n  \n  \"I thought you checked out the rest of the house.\"\n  \n  \"I did. It was locked, and a key is broken inside the lock,\" you say, scratching your arm.\n  \n  \"We could…try to pry it open. If you want to. But you know what my advice would be.\" He rests his hand upon your shoulder.\n  *choice\n  \n   #\"Pry it open.\"\n    *set wentinsides +1\n    *check_achievements\n    *if (goal = \"parents\") \n     *achieve parentgoal\n     *goto wentinsidecont\n\t  \n    *label wentinsidecont \n    \"All right.\" ${leftsurvivor} walks to the door with you by his side. He kneels down and takes his dirty knife out. With a sigh, he jabs the tip of it between the door and the frame. He keeps prying it for a while, until a big chunk of wood falls to the ground. \n\t\n    \"You ready?\" he asks as he stands up. You nod, and he steps back, then kicks the door open.\n    \n    The door creaks and slams against the wall. The room looks like a storm went through it. You can't see anything from the slight dust storm the door has caused, only a dark figure inside the room. When the air finally clears, you stumble back.\n\n    Blood drips from the mouth of the skinless creature as it grunts slightly. It looks rather thin. It steps on a broken TV as it walks closer to you, which cracks and breaks under its feet.\n    *if (wackwound)\n\t\n     It walks close to you and crouches down. It pokes your wounded stomach with its bloody, skinless finger, leaving a trail of blood on your clothes as it lets its finger slide down you. It looks into your eyes with its big, red eyeballs. You stare at it, motionless. It keeps staring at you, without blinking as it doesn't have eyelids. You can see all of its uncovered teeth, skin, and muscle. In some places, even the bone, too. You're shaking, and your eyes get wet. \n\t\n     It groans louder and puts its gooey palm on your head. It looks behind you and growls wildly, clenching its teeth. \n\t \n     Blood splashes on your gas mask and the surrounding walls. It falls back on the ground with blood running out of its forehead, back into the bedroom. It feels as if a thousand knives are sticking into your chest. You fall on your knees and keep staring at it with eyes wide. \n\t \n    ${leftsurvivor} walks into the bedroom, and moments later he returns with a bloody scrap of paper. He clears his throat and speaks quietly. \"I…think you should see this.\"\n    *goto backinbase\n\t \n\t \n\t\n    *else\n     It walks close to you and crouches down. It pokes your wounded arm with its bloody, skinless finger, leaving a trail of blood on your sleeve as it lets its finger slide down. It crawls back and looks into your eyes with its big, red eyeballs. You stare at it, motionless. It keeps staring at you, without blinking as it doesn't have eyelids. You can see all of its uncovered teeth, skin, and muscle. In some places, even the bone, too. You're shaking, and your eyes get wet. It groans louder and clenches its fists, then it crawls back and forth and howls loudly. It picks up a glass piece of the TV screen and stands up. \n\t \n     Blood splashes on your gas mask and the surrounding wall. It falls back on the ground with blood running out of its forehead, back into the bedroom. It feels as if a thousand knives are sticking into your chest. You fall on your knees and keep staring at it. \n\t \n     ${leftsurvivor} walks into the bedroom, and moments later he returns with a bloody scrap of paper and clears his throat. \"I…think you should see this.\"\n     *goto backinbase\n   \n   \n   #\"Let's just leave.\"\n    \"It's probably for the best. Don't feel bad about it for a second, okay? Curiosity is good, until you're not overly curious.\" He rubs the back of your head, and you leave the house as the rumbling sound in the room intensifies. \n\t\n    \"Let's go. We're already close to dusk as it is. Come,\" he says. The sun dimly lights the streets. You keep staring at the ground as ${leftsurvivor} drags you slightly with his arm around you.\n    *goto backinbase2\n   \n  \n  \n #Don't go inside.\n  You slowly shake your head and turn around. ${leftsurvivor} gives the top of your head a slight rub. \"It's probably for the best. Chin up, okay?\" He puts his arm around you, and you begin to head back to the street. \n  \n  \"Let's go. We're already close to sunset as it is. Come,\" he says. The sun dimly lights the streets. You keep staring at the ground as ${leftsurvivor} drags you slightly with his arm around you.\n  *goto backinbase2\n  \n  \n  \n  \n  \n*label backinbase\n*page_break\n\nYou grip the piece of paper tightly as you read it. \n\n[i]\"Honey, if you ever do come back, I want you to know that this was the right thing to do. Never feel guilty about what you had to do. I'll love both of you, until the very end. And even after that. Find ${firstname}, make sure he's safe.[/i]\n\t\n[i]Calvin.\"[/i]\n\t\nYou hold the letter and sink it deep into your pocket as you sit back on your knees, tears running down your cheeks. \n\n\"I'm sorry, ${firstname}, I really am. But it was about to hurt you. I had to…you know. We have to go. We're already close to dusk as it is. Come,\" he says and drags you up to your feet. \n\nThe tears keeps running down your cheeks as you walk out of the house. It feels as if your legs are about to give up at any second. The sun dimly lights the streets. You keep staring at the ground as ${leftsurvivor} drags you with his arm around you.\n\n*label backinbase2\n*page_break\n\nThe way back to ${base} passes by fast, as you're entangled in your own thoughts. They pull the fence open, and you walk into the decontamination chamber. You remember the first time you stepped into it. Now you're used to it, standing your ground through the whole process with ease. \n\nYou leave the chamber and put your stuff in its usual place. You take the gas mask off and give your head a slight rub. You tug on your sleeve a little and give your eyes a small wipe with it. You're walking to the door with ${leftsurvivor} when you hear footsteps behind you.\n\n\"Wow, ${firstname}, I'm highly offended now. You'd just walk past me. We agreed on something. I thought I was clear yesterday. Do I have to teach you another lesson? Huh?\" He chuckles and crosses his arms.\n\n\"Leave him alone, ${capturer1}. We had a rough day.\" ${leftsurvivor} turns around and shakes his head.\n\n\"Excuse me, Mr. I Still Don't Know Your Name But I Don't Even Care, but I thought I heard you speaking. To me. Without my allowance. Know your place,\" he says as he points a finger at his face, then turns around and waves his hand. \n\n\"${lastname}. Into my office. Chop chop,\" he says and walks towards the stairs, taking something from the iron table.\n\n\"Don't worry. It'll be fine. And if not…well, we'll think about that then. Chin up, champ,\" ${leftsurvivor} says and rubs the top of your head. \n\nYou sigh, walk up the stairs, and into his office.\n*page_break\n\nYou sit down in the chair. He hops into his armchair, then puts his legs up on the table. \n\n\"So! You're back in time. Now that's something. Don't get me wrong, I'm glad. That means I'm not only a prime leader, but also a prime teacher.\" He chuckles and rubs his eyebrows, then slides down his armchair. \n\n\"Anyway! Anything interesting happen today? Don't keep me waiting, I'm itching for something interesting today!\" He loudly slams the half-empty bottle with the brown liquid onto the table and smirks as he crosses his arms.\n*choice\n *selectable_if (wentinsides = 2) #\"I saw my…father.\"\n  *set report5 true\n  *set Ivan %+5\n  *set reportedtimes +1\n  \n  \"Ooh, fancy. Tell me all the juicy details!\" He taps his chin and you begin to tell him the story. When you finish it, he opens the bottle and takes a sip. \n  \n  \"Well, all my boos and hoos. Yeah, what did I tell you in the beginning? Your folks are dead. Exactly. Don't act so surprised. I'm sorry you had to see ol' Papa ${lastname} like that. Truly. All my apologies.\" He slams the bottle on the table again after he takes another sip, then wipes his lips off. \"Now, I didn't call you in here to chitchat about silly things like family. Where are they when you need them, right?\" \n  *goto ivanreport\n \n \n *selectable_if (wentinsides >= 1) #\"I've been at my house.\"\n \n  \"Yeah? I expected more. That's kind of boring. Felt like home though? I hope you're not feeling homesick now, but what I hope more is that you brought back some supplies for us. I don't pay you to wander into your old home whenever you feel homesick. Wait a minute…hah! Silly me, I don't even pay you. But you don't need such things. You're grateful enough just to take part in the development and survival of our awesome expanding community. Right?\" He slams the bottle onto the table again after he takes another sip, then wipes his lips off. \n  \n  \"Anyway, I didn't call you here to chit-chat about something like that. It would be dumb.\"\n  *goto ivanreport\n \n #\"I saw my house.\"\n \n  \"Wow, that's really…something. Right? Did it feel like home? I hope not. This is your home now. And by the way, it's not your house. Technically, It's your parents'. Am I right here, kiddo? Of course I am! And I wouldn't let you go. Not in one piece, anyway.\" He slams the bottle onto the table again after he takes another sip, then wipes his lips off. \n  \n  \"Oh well, I didn't just call you in here to chat about such silly things.\"\n  *goto ivanreport\n \n \n #\"Nope, nothing interesting happened.\"\n  *set Ivan %-5\n  \n  \"Really? Did you go out into the open? To the world I know too? There's always something interesting. Just think about all the recent events!\" He winks and grins. \"This might make me think you aren't doing your job well enough. But that's silly, right? You do your best to bring satisfaction into my big heart.\" He chuckles.\n\n  \"Otherwise, I'd have to switch you out and have someone else do your job. It'd be nothing serious, just me chopping you up, finding new scavengers. Argh, the hassle to find scavengers.\" He slams the bottle onto the table after he takes another sip, then wipes his lips off. \"Oh well, I didn't just call you in here to chat about such foolish things.\"\n  *goto ivanreport\n\n  \n  \n \n*label ivanreport\n\nHe takes his leg off the table and leans closer to you. \"The matter is much more serious now.\" He gives the scar on his face a small rub, then he takes a deep breath.\n*if Ivan >=51\n \n \"Listen, kiddo, I'm going to be very honest with you now. But only because I see potential in you. Potential to be like me, one day. And let's be honest, who wouldn't want to be like me? You could rename yourself to ${capturer1} ${lastname} someday. If you live up to the glorious name, that is. And after I'm dead. Which will be a very long time. And now, listen to me very closely.\"\n *goto ivancont \n \n\n\n*elseif ivan >=47\n\n \"Listen, kiddo, I'm going to be very honest with you now. You could have the potential to be someone like me, but you're heading the wrong way. Ignore the people pulling you down. And we both know who I'm talking about. Be like me. Let's be honest, who wouldn't want to be like me? And you could have the chance. Just get rid of the people pulling you down and release your inner beast. Let's start now, by listening to me very closely.\"\n *goto ivancont\n \n \n*elseif ivan \u003c=46\n\n \"Listen, kiddo, I'm going to be very honest with you now. I thought you had potential in yourself to be someone better. Someone like me. But you keep continuing to score under my expectations and disappoint me. You might even turn out to be a failure. That would be disappointing. After all the trust I've given you to prove that you can be someone like me, could you keep failing? How cruel is that? Let's be honest, who wouldn't want to be like me? And that's why I'm giving you another chance to prove your worth and release your inner beast. You can start by listening to me very closely.\" \n *goto ivancont\n\n\n\n*label ivancont\n*page_break\n\nHe takes his green hunting knife out and spins it around. \"You could be my successor one day. You know, I've worked very, very hard to get where I am now. People have always wanted to screw me over, and will always want to. Do you know how I deal with those people? I think you do. And you know, I don't blame them. And I don't fret over them. I even enjoy it when the life fades from their eyes. But when my own friend does it!\" \n\nHe smacks his knife deep into the table and chuckles with a wide grin as you jump a little in surprise. \"That, ${firstname}, that is very disappointing. And you know how I feel about disappointment. That's why I'm going to assign you to a very serious secret mission now. You have to kill ${capturer2}.\" \n\nIt feels as if your heart just skipped several beats in a row. \n\n\"You might wonder why I don't do it. Well, at first I thought I'd just go out and demonstrate to him what I'll do with those who cross me in front of everyone. But then I realized, I've already done that. Several times. It'll be a good test of your skills and the potential I believe you have. The other reason is, it's not bad if the others think it was an act of loyalty. And I truly hope that's partly true. For your sake.\" He reaches down and slides your knife and pistol over to you on the table, but rolls a longer, thick, black barrel next to them. It has several numbers carved into it, then crossed out. The last one, uncrossed, says '56'.\n \n\"That's a silencer. I've gotten fond of it over the years. You might wonder why. Well, the number 56 carved into it is the kills I've gotten while it was on. Excluding the mutants. Get the job done, and you get to keep my silencer. No need to get all emotional now, just consider it as an investment in you.\" He clears his throat and grins slightly.\n*page_break\n\n\"I don't care whether you use the knife or the pistol, but if you use the pistol, attach the silencer. Stuff them in the back of your jeans, cover it with your clothes or whatever, and he probably won't see them when you're climbing down the ladder. Improvise if you have to, I couldn't care less. I hope I've made myself clear. You don't have a choice in this matter. I don't want to see him alive tomorrow. Oh, I almost forgot.\" He slides a rusty yellow key to you. \n\n\"To get out of the basement. I advise doing it sometime in the middle of the night. His chamber is number 25. And not a single word to anyone about this. I don't want to cut your tongue out, as much as I crave some excitement nowadays. That's all for now.\"\n\nYou stand up and stuff the pistol and the knife into the waistband at the back of your jeans. You sink the key deep into your pocket and turn to leave.\n*if Ivan >=51\n \n \"I hope you realize how important this is. Make me proud, kiddo, I'm counting on you. Don't disappoint me. I don't want to kill you, or anyone you love. But I will if I have to. You don't want to end up as the next ${capturer2}, right? If you were smart, you'd want to end up as my wingman.\" He chuckles as you leave his office. \n \n You slowly close the door behind yourself with your heart pounding in your chest.\n *goto ivancont2\n\n*elseif ivan >=47\n\n \"I hope you realize how important this is. I've advanced this trust in you. Do not fail me. I don't think I have to mention how much I hate being disappointed. I don't want to kill you, or anyone you love. But I will if I have to. You don't want to end up as the next ${capturer2}, right? If you were smart, you'd want to end up as someone better, and more worthy.\" He chuckles, and you leave his office.\n \n You slowly close the door behind yourself, with your heart pounding in your chest.\n *goto ivancont2\n \n*elseif ivan \u003c=46 \n\n \"I hope you realize how important this is. Do not fail me. If, however, you end up doing that…well, I don't have to mention how much I hate being disappointed. I might end up, you know, killing you. Or someone you love. It's not an issue. If you were smart, you'd want to end up on my good side. Especially now, with all the recent disappointment you've caused.\" He chuckles, and you leave his office.\n \n You slowly close the door behind yourself, with your heart pounding in your chest.\n *goto ivancont2\n \n*label ivancont2\n\nYou walk down the stairs and give the items a small push to keep them in place, then cover them with your clothes. You pass the living room and the kitchen. You begin to feel even more excited when you get to the basement trap door, where ${capturer2} is already holding it open.\n\n[i]\"And what are you waiting for? Get down there. Or do I have to throw you down? I'll gladly do it. You ought to get some real punishment by now.\"[/i] He grips the handle of his revolver tightly. \n\nYou approach the ladder facing towards him to hide the weapons, then climb down. You find ${leftsurvivor} and ${currentbf} sitting in their own beds, talking to each other. When ${capturer2} slams the trap door shut, they go quiet and look at you. You walk closer to your bed, curious. ${currentbf} pulls ${hisher} legs up, and you climb onto your bed. \"Hey…${firstname}.\" ${leftsurvivor} clears his throat. \n\n*if (markedwound)\n\n \"I'm glad you made it back in one piece today. It took kinda long. We were worried here. I hope your chest is doing fine…at least we can get a quiet night. We'll surely need it. You never know what tomorrow brings.\" ${leftsurvivor} lays back in his bed, but keeps looking at the two of you. \n \n \"Yeah…I thought you'd come back, like…wounded. But I'm glad you're fine, too.\" ${currentbf} climbs into ${hisher} own bed. They both say their good nights. You do the same and lie down in your bed. You lift your clothes to peek at your chest. It's covered in dried blood, and it's bright red around the letters ${capturer1} carved into your chest. You touch it slightly, and it burns in pain. \n *goto ivancont3\n \n \n*elseif (leftsurvwound = true) and (helpedmutilate = false)\n\n \"I'm glad you made it back in one piece today. Whatever you did with ${capturer1} took kinda long. We were worried here. I was waiting for one of them to come down and bring me up there. My chest still hurts, but…at least now we can get a quiet night. We'll surely need it. You never know what tomorrow brings.\" ${leftsurvivor} lays back in his bed but keeps looking at the two of you.\n\n \"Yeah…I was pretty nervous, too. I hate seeing you guys hurt. But I'm glad you're fine, too.\" ${currentbf} climbs into ${hisher} own bed. They both say their good nights. You do the same and lie down in your bed. \n *goto ivancont3\n \n \n*elseif (helpedmutilate)\n \"I'm glad you made it back in one piece today. It took kinda long. We were worried here. I was waiting for one of them to come down and bring me up there. I only knew that if he needed help, you would rush to aid him. Anyway…my chest still hurts, but at least now we can get a quiet night. We'll surely need it. You never know what tomorrow brings.\" He lays back in his bed but keeps looking at the two of you. \n \n \"Yeah…I was pretty nervous, too. I hate seeing you guys hurt. I just…I don't know how you could have done that, ${firstname}. I just can't believe it. It's so unlike you.\" Silence befalls the basement, and ${currentbf} sighs. \"But I'm glad you're fine, too.\" ${currentbf} climbs into ${hisher} own bed. They both say their good nights. You do the same and lie down in your bed. \n *goto ivancont3\n\n\n \n*label ivancont3\nYou close your eyes for a moment, then open them up again and keep staring at the ceiling, waiting for the right time.\n*page_break\n\nYour eyelids feel as if they're about to close every now and then, until the point that it becomes unbearable. You almost fall asleep, so you decide to sit up, partly because of being afraid to fall asleep, and partly because of the weapons being uncomfortable in the back of your jeans. You sit up as quietly as you can, and begin to think about what ${capturer1} said. Your eyes begin to feel very heavy in the silent basement, even in the sitting position. Weirdly, a somewhat safe and secure feeling gets hold of you in the silence for a moment. If it weren't for the obvious, you wouldn't know that the world as you knew it ended a short while ago.\n\nYou find yourself sitting and imagining what it would be like if the world hadn't changed. If you hadn't ended up alone. If only you could go back in time and warn your parents. You find yourself getting angry and sad at the same time. After releasing a large sigh, you play through in your head what you're going to do, and how you're going to do it. The whole scene makes you very nervous. You find yourself sweating and breathing faster. \n\nEventually, when you feel like enough time has passed, you carefully push the cover off and slide out of the bed.\n\nYou fix the weapons in the back of your jeans, and as quietly as you can, you make your way towards the ladder. You reach the ladder and grip the step at eye level.\n\n\"What are you doing?\" You hear whispering behind you. You turn around and find ${leftsurvivor} quietly sitting up in his bed and looking at you. \"I don't know what it is that you want to do, but you can't get out. Make enough noise, and ${capturer2} comes down to punish you…if not ${capturer1}. So just go back to bed. Unless…there's something shady going on between you and ${capturer1}.\"\n*choice\n\n #\"I have to kill ${capturer2}.\"\n \n  \"You what now?!\" ${leftsurvivor} slides out of the bed and walks closer to you. \"Are you out of your mind? That's wrong on so many levels. I'm not saying that I wouldn't like to see him dead, but it's ${capturer1} I'd like to see dead first. And even if you got out somehow, then why wouldn't you…ah…I think I get it now.\" He rubs his eyebrows and shakes his head slightly. \n  \n  \"Look…it's completely different to kill a mutant than killing a human. Even different than having to kill a human just to stay alive. This is not a kill-or-be-killed situation, ${firstname}. This would just be cold-blooded murder. It's not the same. Something like that can change a person. Forever. I'm sorry, ${firstname}, but I can't let you do it. Not even if ${capturer1} asks you to. Just go back to bed, and we'll figure something out, okay? This isn't going to happen tonight,\" he says and puts his hand on your shoulder, then blocks the ladder with his other hand.\n  *label gunchoice\n  *if (Leftsurvivor = \"Ryan\")\n   *choice\n  \n    #Draw my pistol.\n     *set Evil %+5\n     *set Ryan %-15\n     *goto drewgun\n\t\n\t\n    #Go back to bed and wait some more.\n     *label bed\n\t \n     You shake your head, then walk back to your bed. He follows you, then climbs into his own bed. You lie down quietly and turn onto your side. \"Hey, I'm glad you decided not to cause any trouble. It's for the best. It's not worth going insane over an already insane person. We'll deal with him, okay? Don't worry, change is coming. Sleep well, ${firstname},\" ${leftsurvivor} says and pulls the cover up to his neck.\n     *label bedcont\n\t\n     Your eyes already feel heavy, but not heavy enough to forget about the consequences. You keep laying in bed, and you keep on yawning. Maybe you even dozed off for a second. Eventually, when you feel enough time has passed, you decide to get up. You slide out of the bed steadier than before and head towards the ladder. It takes twice as long, but you make sure no one wakes up this time and head up the ladder.\n\n     You climb up and turn back around when you reach the top to make sure no one spotted you. You reach down and find the key, then put it in the padlock and open it. With a slight push, the trap door opens, and you climb out. You slowly lower the trap door, feeling excitement and nervousness taking control of your whole body. You glance down, then begin to sneak through the kitchen.\n     *goto carldead\n   \n   \n   \n    *selectable_if (Ryan >= 45) #Convince him to do it for me.\n     *set leftsurvkilledcarl true\n     *set Ryan %-15\n     *set deadcarl true\n     *set Evil %+5\n     *label leftsurvkill\n     You tilt your head and ask him to do it for you. His eyes widen, and he stands up as he shakes his head wildly. \n\t\n     \"No way. I told you why this would be different than the other things I had to do. This would just be cold-blooded murder. Especially if he's asleep! Just think about it! I—I can't do it. I played it through so many times in my head, but I just can't. If it was ${capturer1} in question, though…I would think about it.\" He sighs and rubs his eyebrows. You tell him how much it would mean to you, and that your life might be on the line if ${capturer1} is still alive in the morning.\n\t\n     He buries his head in his palms. \"Goddammit. Fine. How am I supposed to do it, though?\" He walks closer, and you hand him the pistol, along with the knife and the key. He stares at the items before pocketing them, still shaking his head slightly. \n\t\n     \"I can't believe I'm doing this…if I don't return…well, I guess we're screwed then. Wish me luck, ${firstname}.\" He gives your back a few light pats, then climbs up the ladder. He fiddles with the lock until it flicks open. He pushes the trap door open and climbs out, then glances back at you from the top of the ladder. He shuts the trap door before he leaves.\n     *page_break\t\n     *set Rep2_2 0\n\t\n     You wait by the ladder for a while, until you begin to get tired of waiting. You lean against the wall, walk around, but he still doesn't come. Eventually, you get bored and sit down by the ladder. You pull your knees up and rest your head on them. It doesn't take long for you to unintentionally pass out. You open your eyes and jump a little when you hear someone dropping down next to you. ${leftsurvivor} drops the knife and pistol next to you, along with the key. \n\t\n     \"Done. I don't want to talk about it. You owe me, kid. Big time.\" He points his bloody finger at you, then heads towards the bed. You stand up and yawn.\n\t\n     You begin to stuff the pistol and the knife into the back of your waistband. Something warm and sticky gets stuck on your palm as you put the knife away. You scratch your face and it feels as if you just smeared something on it. You rub your palm with your other hand, but it doesn't come off, just feels like it's smearing all over your palm, too. You shrug and sink the key into your pocket. ${leftsurvivor} mumbles and scratches some dried blood off his hands. You slowly climb into bed and pull the cover up to your neck. It feels distressingly soothing to lie in your bed with a task done, when you didn't have to do anything.\n\n\t\n     \"Good night…that is, if you can sleep with the thought,\" ${leftsurvivor} mumbles. Your eyes already feel heavy, and it takes no time for you to fall asleep.\n     *goto carldead2\n\t \n  *else\n   *choice\n  \n    #Draw my pistol.\n     *set Evil %+5\n     *set Malcolm %-15\n     *goto drewgun\n\t\n\t\n    #Go back to bed and wait some more.\n     *goto bed\n\n    *selectable_if (Malcolm >= 45) #Convince him to do it for me.\n     *set leftsurvkilledcarl true\n     *set Malcolm %-15\n     *set deadcarl true\n     *set Evil %+5\n     *goto leftsurvkill\n   \n\n #\"Mind your own business.\"\n \n  \"What? No. You don't think I'll just let you cause trouble, right? It would bring trouble not only for you, but for ${currentbf} and me, too,\" he says and climbs out of the bed. He gives his limbs a small stretch and walks closer to you, then pushes his palm against the ladder. \n  \n  \"Don't be selfish and reckless. Just go back to bed and tell me what this is all about, okay? I'm sure we can work it out, and I don't want to stay up all night just to stop you from doing something stupid.\"\n  *goto gunchoice\n   \n  \n #Go back to bed and wait some more.\n \n  You shake your head and slowly walk back to your bed. You climb in quietly and turn onto your side. \"I don't know what it is that you wanted to do, but I'm glad you decided not to cause any trouble. I'm not going to ask, as long as you behave. It's for the best, though. We don't want ${capturer1} all over us, right? Sleep well, ${firstname},\" ${leftsurvivor} says and lies back in his bed.\n  *goto bedcont\n \n  \n\n  \n*label drewgun\n*set drewgunonleftsurv true\n\nYou reach back and swiftly yank the pistol out of the back of your jeans. ${leftsurvivor} steps back in surprise, then puts his hands in the air. \n\n\"Whoa there…really? You pull your gun on me? You know what? Do whatever you want. I don't care what happens to you anymore. But don't you dare bring trouble on us, or I'll be the one to draw my gun on you next time…\" He shakes his head and lowers his arms. \n\nHe keeps mumbling as he climbs into his bed with clenched fists. You holster your pistol, then take the key out of your pocket and turn to the ladder. \n\nYou climb up and turn back around when you reach the top to see ${leftsurvivor} pulling the cover over his neck and watching you. You put the key into the padlock and open it, then push the trap door open to climb out. You slowly lower the trapdoor and feel excitement and nervousness taking control of your whole body. You glance back down once again, then sneak towards the chambers.\n*goto carldead\n  \n \n  \n*label carldead  \n*page_break\nYou walk through the dark kitchen and can barely find your way to the chamber's door in the darkness. When you find it, you push it open quietly and close it behind yourself. You almost jump back when a couple of flashlights light up on the other side of the chambers, right at the door to the lobby. They're only guards, talking through their night duty. You stick to the wall and slowly sneak past the chamber doors until you see the number 25.\n\nYou quietly grip the handle as your heart beats in your throat, then push it down. It creaks a little, and you pull it open. You freeze for a moment and make sure the guards didn't spot you, then slide inside the chamber. You pull on the door gently until it closes. You make sure it won't open on its own, then turn around.\n\nThe chamber looks bigger on the inside than on the outside. A huge brown carpet lays under your feet, leading across the chamber. On your left is a small dining table with a chair, and on your right is a red couch. As you go further inside, you see an open door on the left at the end of the room, leading into a weird-smelling bathroom. You stop in front of it and turn to your right, where you see a wide-open door. As you walk closer and peek further inside, you see a pair of feet on an averag-sized bed in front of you, peeking out from the dirty white cover. \n\nYour heartbeat quickens when you see ${capturer2} snoring quietly. His back is against a nightstand with a familiar revolver on it. He shuffles around a little, then continues snoring quietly. You find yourself breathing faster and faster as you look down at him. You walk over to the side of the bed, where his head is. You know you have to do something now, and there's no going back. ${capturer1}'s words keep repeating in your head. You know that if you don't do it, you or someone you love could get hurt. \n\nYou take a deep breath and reach back into the waistband and let your hand rest there for a couple of seconds before you make a decision and feel ready to do what you're going to do.\n*choice\n\n #Use the pistol.\n  *set Rep2_2 0\n  *set Killedcarl true\n  *set deadcarl true\n  *achieve carl\n  You pull the pistol out of your waistband and the silencer from your pocket. Your hands begin to shake, but you manage to roll the silencer onto the pistol. You raise the pistol and aim down the sight, aiming at the middle of his forehead. Your hands and legs are shaking wildly, and you breathe faster and louder. After taking a deep breath, you hold it for a second. You squeeze the trigger tighter, getting ready to pull it. \n  \n  His eyes snap open, then they widen in surprise. He swallows hard, and you keep staring at each other for a couple of seconds, which feels like an eternity.\n  \n  Suddenly, he frowns and swiftly reaches back for his revolver. He grabs it, and you squeeze the trigger twice. His head snaps back on his pillow, and blood splashes on the walls around you. Blood soaks the bed as he lies still. You jump a little when you realize that you don't have the gas mask on to protect you from the blood dripping down your face. You glance down and notice blood dripping from your clothes, too.  \n  *goto carldead2\n  \n \n  \n  \n #Use the knife.\n  *set Rep2_2 0\n  *set Killedcarl true\n  *set deadcarl true\n  *achieve carl\n  You pull the knife out and walk closer to his bed. Your hands begin to shake as you kneel by his bed and hold the knife in front of yourself. You breathe faster and louder, then hold your breath for a second. You lean closer and push the tip of the knife against his throat. \n  \n  His eyes snap open, then they widen in surprise. His breathing quickens, moving the knife at his throat as a result. He freezes, and you keep staring at each other for a couple of seconds, which feels like an eternity. Suddenly, he frowns and swiftly reaches back for his revolver. He grabs it, and you give the knife a slight push. He wraps his arm around you and raises the revolver, but it falls out of his hand. He grips his throat with his other hand, grunting as blood squirts on the wall around you. You jump a little when you realize that you don't have the gas mask on to protect you from the blood squirting onto your face and clothes. \n  \n  Eventually, you break free from his grasp and fall off the bed, back onto the floor. He struggles for a couple of seconds, then lays still with blood soaking the bed. You slowly stand up and pull your knife out of his throat, sending another trail of blood over the wall. You wipe the knife on the cover and stand up.\n  *goto carldead2\n  \n  \n *selectable_if (Carl >= 22) #Warn him about ${capturer1}'s plan.\n  *set helpedcarl true\n  *set Carl %+50\n  *set Evil %-10\n  You slowly take your left hand out of the back of your waistband and put it on his shoulder. You give him a couple of slight shakes, and his eyes snap open. He immediately pushes you away and grabs his revolver, then sits up and aims it at you. \n  \n  [i]\"You know, I could kill you right where you stand, boy. No one would care, you filthy intruder. What were you even thinking, coming in here? And how did you get out? Keep your distance, if you know what's good for you.\"[/i] He shakes his head slightly as he grips his revolver tightly.\n  \n  You explain everything as fast as you can, from the beginning to the end. He frowns and asks a couple of questions, still aiming the revolver at your head. You answer everything, fill in the gaps in the story. He thinks for a couple of seconds, then lowers his revolver but still aims at you.\n\n  [i]\"That…kinda makes sense. Especially the screwing him over part. But I still don't know if I can trust you.\"[/i] He looks away for a couple of seconds, then looks back at you. [i]\"I'll advance my trust for you. I have a plan to get out of this mess. Both you and I. But no sudden moves. I'm watching you, boy. And I'll gladly pull the trigger.\"[/i] He finally lowers his revolver and climbs out of the bed, still holding it in his hand.\n  \n  [i]\"As much as I'd like to take out ${capturer1}, I believe it's impossible. I don't know if you've seen his room, but it's guarded day and night. Also, now that he wants to get rid of me, I think they have a…kinda shoot-on-sight rule if I get close to him. I'm not so keen on dying, so we won't go and find out.\"[/i] He sneaks towards the front door, and you follow him.\n\n  [i]\"So, my plan is simple. I believe the two lazy guards outside are, as usual, doing nothing. You make some noise, one of them goes to check it out, because I'm sure one of them will just stay back. I get him, drag him in here, put a couple of bullets through his skull until you can't recognize who it was. Then I write a goodbye letter, saying I can't take this anymore, so I abandon ${base}, and the usual things. Should go smoothly. Everything get through your thick skull? Because I'm not going to repeat myself.\"[/i] \n  \n  You nod, and he pushes the door slightly open. [i]\"Go, make some noise, wherever.\"[/i] He points, and you sneak out and head into the kitchen. You leave the door open on purpose and climb over the counter. After taking a look around, you find some funny-smelling pans and plates. With a lack of options, you take a plate and smash it on the floor. It shatters to pieces, and you sense it might be louder than you intended. You peek over the counter, expecting someone to come, but see nothing. You're turning around to grab another plate when a flashlight blinds you. \n  \n  You gasp and drop to the floor, then roll under the counter. You immediately regret it, as an unbearable reeking smell chokes you, and you see dried black liquid stuck to the bottom of it, slowly stretching towards you. You hear a couple of footsteps around you and see a flashlight pointing here and there. It takes a while until he leaves, quietly mumbling. When he does, you roll out and feel the sticky dirt releasing your clothes from the floor. You peek out, then head back to the chamber.\n  \n  The chamber door is closed, so you sneak inside to find one of the guards tied to the bed with a rag in his mouth. He wiggles around and mumbles in ${capturer2}'s clothes, who's spinning the revolver around in lightweight armour. [i]\"You're back. Good. I suspect you brought some weapon to kill me. Give it to me. We want to make this realistic, don't we? I know we didn't clarify this before, but I hope you didn't just bring a knife. That would raise difficulties,\"[/i] he says with his palm open.\n  \n  You hand him the pistol and the silencer. He smiles as he rolls the silencer on. [i]\"Good. Want to stay and watch, or would you rather leave until I'm done with it?\"[/i]\n  *fake_choice\n  \n   #\"I'm staying.\"\n    *set Evil %+5\n    \n    [i]\"As you wish. It won't be pretty.\"[/i] He immediately aims it at the guard and puts a bullet through his head. His head snaps back and blood splashes on the walls. He takes the rag out of his mouth and keeps shooting his head until it looks like a bloody, messy pulp. Blood and meat splatters everywhere, and your stomach rumbles. You begin to feel nauseous as a big chunk of flesh flies onto your cheek. You force yourself to flick it off as disgust fills you. He stops shooting when the pistol clicks. \n\t\n    He takes a magazine out of his drawer and reloads your pistol, then hands it to you. \n   \n   \n   #\"I'm leaving.\"\n    *set Evil %-5\n   \n    [i]\"Sure thing.\"[/i] He immediately aims it at the guard and puts a bullet through his head. You leave the room and lean against the wall outside. The guard can't be seen anywhere, probably searching for his partner. You hear very silent gunshots, followed by clicking sounds. [i]\"Come in. I don't really know what the deal was, though. You would have seen the results anyway,\"[/i] he says as you walk in. You freeze when you see the walls covered in blood and meat, and the big messy pulp that was once his head. Blood and chunks of meat are splattered everywhere. The sight makes your stomach rumble. \n\t\n    You begin to feel nauseous. He takes a magazine out of his drawer and reloads your pistol, then hands it to you.\n\t\n\t\nYou take it with a shaking hand and put it in the back of your waistband. Blood pours out from his destroyed head, and it looks so disturbing that you begin to feel dizzy. \n\n[i]\"All right, plan's good so far. I'll write a letter. But before that, there's one thing left to do.\"[/i] He mashes both of his palms into the pool of blood on the bed, then wipes them on your face and clothes, then repeats it once more. You jump back and cough heavily. You lean down and put your palms on your knees as you almost throw up. It drips down your face, and he smears some on your clothes too.\n\n[i]\"There you go. In the end, you killed me, didn't you? I gave you a real big fight, but you pulled through and killed me. Good boy. You'll make ${capturer1} proud with that story I bet. Now, all that's left is to write the letter, take some stuff from his chamber, which I would take anyway, and then use my connections to get out. Let's get on with it, shall we?\"[/i] He kneels down at the drawer and takes a small piece of paper out. After digging around in it some more, he takes a very small pencil out of the drawer and slams it on the nightstand, then slams the revolver next to it.\n\n[i]\"Dear everyone, I'm pretty tired of ${capturer1} and ${capturer2}'s way of ruling things here, and I can't take it anymore. I'm too scared of death, so suiciding is not an option. That's why I'll leave the base quietly tonight. I advise all of you to follow my example. Farewell, and may you all have the strength to cope with ${capturer1} and ${capturer2}.\"[/i] He puts the pencil down.\n\n[/i]\"There. All done. Let's get going.\"[/i] He stands up and stuffs the revolver into his waistband at the front, then drags you by your arm towards the door.\n\nThe guard is nowhere to be seen as you sneak out, making it easier to take a small detour to the other guard's chamber. ${capturer2} takes some of his clothes and items, then leaves the letter on his bed. You leave and sneak past the remaining guards separating you and the lobby. You reach the lobby and look at the decontamination chamber, where another couple of guards are standing. You crouch down at the door. ${capturer2} steps forward and talks with them, then waves to you to follow him. You approach them carefully, putting your gas mask on while he chats a little with the guards. \n\n\"You take care now. We'll follow you soon if we're lucky,\" one of them says as you step into the decontamination chamber. It feels louder than it should be on the inside. You step outside and find four guards there: two on top of the watchtowers, and two at the fences. You approach the two guards on the ground, and they greet ${capturer2} with a laugh. They chat for a while, glancing at you every now and then.\n\n[i]\"Don't worry about the boy. He's okay. He either didn't have the guts to kill me, or he was just cool enough not to do it. Either way, I'm alive, and that's what matters. Thanks for the help, guys, but it's highly unsafe for me to stay here any longer. Don't give up on the whole plan, though. You'll know where to find me.\"[/i] He shakes hands with the two guards, then turns to you.\n*page_break\n*achieve carlfree\n\n[i]\"And you. Thanks, for whatever reason you helped me out. I appreciate it. Even if I don't look like it. I knew we had some rough times with one another, but I had to keep playing that way so I could take a place by his side. Don't get me wrong, I'll end anyone who crosses my path without a problem. I'm just not as evil as you might think I am. That might sound weird, considering the fact that I murdered your whole class the first time you saw me. Word of advice, though, keep your distance from ${capturer1}. Befriend him, but never be like him. He's out of his damn mind. I won't take you with me, because I can't, and honestly, don't even want to. So that's it, we'll probably see each other again if we're lucky. Take care.\"[/i] He nods towards the guards, and they open the fence for him. He walks through and sneaks away, watching for the guards at the watchtowers. The guards push the fences closed as quietly as they can. \n\n\"Yeah, you can go now. I lost a mag on that bet about you returning,\" one of them says with an angry tone of voice, and the other guard laughs as they send you inside. \n\nAs you wait for the decontaminating process to be over, you only hope it's not as loud on the outside as it is on the inside. When you step out, the two guards don't say a word, just put their fingers to their lips and point towards the door. You take your gas mask off and put it on the table as quietly as you can, then sneak towards the basement. You get past the chambers and notice the guard just returning to his position from the chamber of the other guard, holding the small piece of dirty paper. \n\nYou gently close the kitchen door behind yourself, then raise the trap door. You climb down and pull it shut. You lock it with the key and climb down steadily. You quietly climb into your bed and pull the cover up to your neck. It feels weirdly good and soothing to lie in your bed with a task done with such efficiency, while you didn't have to hurt anyone. You scratch your face and feel the dried blood getting stuck under your fingernails, but you try not to think about anything disturbing now. You feel very tired, and your eyes feel very heavy, so you pass out as soon as you close them.\n*goto carldead3\n\n \n \n
