gs down and whatever. Get yourself comfortable…I guess.\"\n\nYou take a look around the rather small basement. There are two bunk beds on the left. Tiny barred windows catch your eye on the wall in front of you, very close to the ceiling, letting just a little light in. Under the window is a small mattress and a very old-looking couch. There are unlit candles next to it. \n\nTo your right, you see a small, dirty wooden door with a sink next to it. That must be the bathroom. There are also other scraps lying around, but you don't pay much attention to them.\n\nYou walk towards the bunk bed that's further from the wall, and ${currentbf} stands next to you. \"Top or bottom bunk?\"\n*fake_choice\n #\"Top.\"\n  *set bunk \"top\"\n  \"All right.\" ${currentbf} laughs as ${heshe} sits down on the bottom bunk and takes off ${hisher} gas mask. \"Oh my god, this feels so good to have off!\"\n   \n  You giggle, climb up the small ladder, and put your backpack down, then take your gas mask off and stuff it into your backpack.\n  \n #\"Bottom.\"\n  *set bunk \"bottom\"\n  \"All right. Afraid of heights?\" ${currentbf} laughs as ${heshe} sits down on the bottom bunk and takes off ${hisher} gas mask. \"Oh my god, this feels so good to have off!\"\n   \n  You giggle as you climb up the small ladder and put your backpack down, then take your gas mask off and stuff it into your backpack. \n  \n  \n*page_break  \n${currentbf} wasn't lying. You give your face and the back of your head a small rub and smile with joy for a second.\n\n\"Do you guys know what's going to happen tomorrow?\" ${survivor1} comes closer, while ${survivor2} lights a couple of candles.\n\n\"I guess we'll have to work something out,\" you answer as you put your backpack down on the cold ground.\n\n\"You're right. Partly. You'll get assigned to work somewhere. Greenhouse, power plant, things like that. I wouldn't worry about it, but I must advise you to do your job as well as you can. Whatever it might be. Also, it nd other harsh things like that by the rest of the people or the mutants and monsters outside, and yada yada. Things like that. Chop chop now, you might be able to catch…what are their names? Dammit.\" \n \n He scratches his head and taps the desk. \"You know the two other guys in the basement, yeah? Off you go now. And try not to get killed. I don't want to go out hunting for sla—workers again. ${capturer2} will give you the stuff you need downstairs.\"\n *goto cont4_2\n\n\n\n\n*label scavenger2\nI mean, I offered you to choose, but I expected you to actually choose the…you know, scavengers? I thought it was obvious. Jesus…\" He rubs his eyebrows. \"Anyway! Now that that's settled, are you happy about it? Yes, of course you are. Good!\"\n*goto scavengergud  \n  \n  \n  \n  \n  \n*label cont4\n\nYour eyes widen at the 'mutants and monsters' part, but you nod, stand up, and head towards the door.\n\n\"Hey, kid. Prove me right.\"\n\nYou nod and open the door, then head downstairs as you feel excitement and fear filling your whole body.\n*finish\n\n\n*label cont4_2\n\nYour eyes widen at the 'mutants and monsters' part, but you nod, stand up, and head towards the door.\n\n\"Hey, kid. Try and prove me wrong, be worthy. I'd be pretty surprised, though, to be honest.\"\n\nYou nod and open the door, then head downstairs as you feel excitement and fear filling your whole body.\n*finish \n", "ch3": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Doomsday on Demand[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase adfree $4.99 purchased\n  *delay_break 600\n\n*label purchased\n\n[b][i]Chapter 3 - Out of the Frying Pan, Into the Fire[/i][/b]\n\n[i]\"Two extra filters for your gas mask, a pistol with two extra magazines, and a small knife,\"[/i] ${Capturer2} says as he drops them in your hand.\n\n[i]\"I don't know why I have to give you this stuff. You'll be dead within a week anyway. Oh, by the way, you might experience some…side effects. You know, we aren't stocked with gas masks and filters. That's why we modify the used filters a little, giving them a longer lifespan. But some things might go through the filters this way. If it feels hard to breathe, or you start to feel dizzy, just run as fast as you can and pray to get here before you collapse,\"[/i] he says and walks past you.\n\nYou drop the filters into your backpack along with the magazines, and feel the pistol in your hand. You find it rather heavy, then put it under the waistband of your pants. You pull your shirt over it to cover it, just like in the movies. You grip the small holstered hunting knife, then decide to just put it in your pocket.\n*page_break\n\nYou walk towards ${survivor1} and ${survivor2}. They give each other a worried look before you follow them to the decontamination chamber. \"You might want to put your gas mask on now, kid,\" ${Survivor1} says, and he and ${survivor2} are already putting theirs on. \n\nYou do the same as fast as you can, then step into the decontamination chamber. The process still feels weird and you hold your ground, but soon you come out of the other side. You follow them to the fence without saying a word. The guard nods once and opens the fence. You can feel your heart throbbing in your throat, and you try to steady your breathing as you walk through and hear the fence closing behind you.\n*set Pistol true\n*set Knife true\n*set Maskfilter +2\n*set Magazine +2\n*page_break\n\nYou fix the backpack before you follow them for a while down the main road, avoiding the government vehicles. At least, what's left of them. After a while, they turn into a dark alley. Smoke catches your eyes from a building nearby, then you glance back at them. ${survivor1} is holding his brown, rusty rifle, and ${survivor2} has had his small SMG in hand since the fence closed behind you.\n\n\"…but Jesus Christ, he's just a kid.\"\n\n\"And a liability…\"\n\n\"Which one of them thought it would be a good idea?\"\n\n\"…and he doesn't even know anything about the outside world. Imagine if he was Tiff, though.\" ${survivor1} glances at ${survivor2}.\n\n\"Don't you say that!\" ${survivor2} snaps back at him.\n\nYou hear them mutter similar things to each other as you walk behind them.\n*fake_choice\n\n #\"I can hear everything, you know.\"\n  They look at each other, then back at you.\n  \n  \"Hey, sorry, okay? But it's the truth. Can you even shoot?\" ${survivor2} asks, glancing back at you over his shoulder.\n  \n  \"No, I can't,\" you answer and think about the gun at your waistband.\n  \n  \"Do you know anything about the things lurking out here? The danger we have to face here every day?\" he asks, shaking his head a little. You shrug and shake your head as you take a peek behind yourself.\n  \n  \"All right, I think we should start with the basics then,\" ${survivor1} sighs. \"What awaits you out here.\"\n  \n #\"I know about the monsters.\"\n  *set Ryan %+5\n  *set Malcolm %+5\n  \"Oh, yeah?\" ${survivor2} asks, glancing back at you over his shoulder. \"What do you know about them?\"\n  \n  \"That…they exist?\" you say, scratching your arm.\n  \n  \"Well, that's not nearly enough to survive out here. Do you know anything about the things lurking out here? The danger we have to face here every day? Can you even shoot?\" he asks, shaking his head a little. You shrug and shake your head as you take a peek behind yourself.\n  \n  \"All right, I think we should start with the basics then,\" ${survivor1} sighs. \"What awaits you out here.\"\n  \n  \n #\"Who is Tiff?\"\n  *set Ryan %-5\n  \"That's none of your business!\" ${survivor2} shakes his head. \"Do you know anything about the things lurking out here? The danger we have to face here every day? Can you even shoot?\"\n  \n  You shrug and shake your head as you take a peek behind yourself.\n  \n  \"All right, I think we should start with the basics then,\" ${survivor1} sighs. \"What awaits you out here.\"\n  \n  \n #\"I'm not a liability!\"\n  *set Ryan %-5\n  *set Malcolm %-5\n  \"Oh, yeah?\" ${survivor1} asks, glancing back at you over his shoulder, \"Do you know how to shoot? Can you protect yourself? Do you know anything about the things lurking out here? The danger we have to face here every day?\" he asks, shaking his head a little. You shrug and shake your head as you take a peek behind yourself.\n  \n  \"All right, I think we should start with the basics then,\" ${survivor1} sighs. \"What awaits you out here.\"\n  \n #Remain silent.\n  They keep muttering for a while, then they glance back at you. \"Are you all right back there?\" ${survivor2} asks, then looks back at ${survivor1}.\n  \n  \"Sorry, all right? But it's the truth. You don't know anything about the things lurking out here. The danger we have to face here every day. I bet you can't even shoot,\" ${survivor2} says, shaking his head a little.\n  \n  \"All right, I think we should start with the basics then,\" ${survivor1} sighs. \"What awaits you out here.\"\n\n\n\nYou keep walking until you find a small grocery store with half of its roof missing. Moss hangs from the doorway, and the wind begins to blow heavily. ${survivor1} motions with his hands to go inside. As you walk inside, ${survivor1} leans against a wall and ${survivor2} begins to search for supplies. You take a look around and hop onto the counter. You lean back slightly and put your palms behind yourself, then look at them.\n\n\"So, I don't know how much you know about the nuclear bomb that fell, but it was no ordinary one, I'm telling you,\" ${survivor1} says as he puts his chin down on the rifle's end. \"For some strange reason, there's no radiation anymore. When they fell, the radiation was sky high, but now it's only around the impact zone. The air, however, isn't breathable. Don't ask me why, I don't know either. As I said, it wasn't an ordinary bomb. And it didn't kill everyone. Those who were left alive on the surface, mutated. Humans and animals alike. Now, I'm going to tell you what we know about these mutants or whatever. Pay attention, because I'm only going to tell you once. Capiche?\"\n\nYou nod, and he blows into the barrel once. \"Good. It's important to have your wits about you out here.\"\n*page_break\n\n\"There are the [b]Slimers[/b]. They were once something like frogs, probably, but now they're big, dark, ball-shaped creatures with long tongues, six legs, acidulous and sticky saliva that they like to spit at you and leave behind wherever they go. Luckily, it doesn't eat through your shoes. But if it touches your clothes or skin…well, you can imagine,\" he says as he snaps his fingers.\n\n\n\"The [b]Wacks[/b]. They were fellow humans once, but somehow didn't die. Instead, they evolved into something…different. The easiest way to tell the difference between them and regular humans is to look at them. They don't have any skin left, they're very thin, and they can't speak. Instead, they grunt and growl, not to mention that they're very fast and agile. They're also very aggressive, and can be surprisingly intelligent, so don't underestimate them.\" \n\n\"And the damn things love sharp objects.\" ${survivor2} walks to another shelf as he throws away an empty can. ${survivor1} nods and looks outside. \"What's with the wind today? If it doesn't stop, there's a good chance of a sandstorm.\" He sighs and continues.\n\n\"[b]Aviatrixes[/b]. Imagine a huge eagle with deadly claws, but they look like a ray with a tail ending in a spear. That's an aviatrix for you. Fast and deadly. Loud when it dies, so it's better to wound it and leave it harmless to bleed out. Noise draws unwanted attention. It's always better to keep quiet. Keep that in mind.\" He clears his throat and keeps glancing outside, where the wind is beginning to intensify. \"Are you with me so far?\"\n\n\"Yep. I'm following.\" You nod and stretch your arms.\n*page_break\n\n\"All right. Good. I left the last two especially for the end. [b]Theurgists[/b]. You might see kids like yourself out here. Whatever you do, do not approach them! The wicked creatures drive you insane! I can only tell you this much about them: Keep. Your. Distance.\" He glances over to ${survivor2}, then back at you.\n\n\"And lastly, the [b]Trappers[/b].\"\n\n\"Stalkers.\" ${survivor2} looks up as he tries to crack a vending machine open with his knife.\n\n\"Don't mind him. That's just what he calls them.\" ${survivor1} smiles slightly and looks back at you. \"They only come out after sunset. They look like pure darkness with lightly glowing pink eyes. At first, you can feel someone watching you. Just a presence. Then you can hear them following you. It sounds like bare feet on cold pavement. The more you try to escape, the more of them come. After they corner you…\" He scratches his head. \"Well, I don't know, no one ever got back to tell us what happens after they get you.\" He looks down and glances at ${survivor2} from the corner of his eye, then looks back at you after a moment of silence. \n\n\"Word of advice, though, don't let the fear take control of you, and always find a shelter with light after sunset. They're more in control the darker it gets.\" ${survivor1} takes a deep breath and keeps glancing outside.\n*page_break\n*set inform true\n\n${survivor2} turns towards you for a second. \"There are several others, though. You might see other things, like rabid dogs and other wild animals with unusually large or extra body parts, too: sharp claws, fangs, things like that. What ${survivor1} mentioned are the 'special' ones we know of. As I said, it's a rough world out there, and we don't have all day to tell you about it. Besides, it would probably take more than just a day. You'll have to find out the rest for yourself. They're not going to be pleasant surprises, I can tell you that much,\" ${survivor2} says as the vending machine snaps open. \"Bingo!\"\n\n\"What's up with the wind, goddammit?\" ${Survivor1} stands up, walks to the entrance, and pushes the moss away, then runs to you and pulls you off the counter by your hand. You almost fall down when he does that. \"We have to go.\"\n\n\"What's with the rush? We can't leave in a sandstorm like this,\" ${survivor2} says as he tries to pop a can of soda open.\n\n\"Wacks. Lots of them.\" ${survivor1} nods, and they both ready their guns, then give you a slight pull before they run off. With your legs shaking, you run after them.\n*page_break\n\nYou leave the grocery store and immediately start running. You run past a couple of cars and poles. The sandstorm gets out of control very quickly, and you can't see your own hand in front of your face. \n\nNevertheless, you keep running. You can hear ${survivor1} and ${survivor2} shouting something in the distance. You also hear grunting and growling from all directions. Your heart throbs in your chest so fast, you're afraid it might explode. Your legs are shaking from both fear and exhaustion, but you keep on running. \n*page_break\n\nGunshots echo in your ears, and you turn your head towards the direction, which results in you bumping into something. For a second, you think it's either ${survivor1} or ${survivor2}, but the screams and groans shatter that hope. Your eyes widen, and you run faster than ever, until you arrive at a huge building. Finally, you think to yourself, pushing its front door open and then slamming it tight with your back against it, slowly sliding down into a sitting position.\n\nYou begin to pant heavily and keep sitting there for a while, but peek outside every now and then. You don't know how long you've been sitting there, but your heartbeat isn't going back to normal. Especially after you hear voices further inside the building.\n\nIn front of you is a dirty grey-and-blue wall, spreading left and right, probably to two corridors. You can't quite make out what they're saying, and you wonder what you should do.\n*choice\n\n #Check out where the voices are coming from.\n  You get up with trembling legs and walk to the end of the wall. After hearing the voices coming from the right, you sneak down the corridor, sticking to the wall. You pass by a couple of office doors and rooms without doors. Slime gets stuck on your feet, and you stop to take a deep breath before you reach the end of the corridor. The voices are coming from right there, and a light shines with crackling sounds, as if there was a campfire there. You continue eavesdropping on their conversation and make out that there are probably no more than two people there, when they suddenly go quiet.\n  \n  A firm grip on your neck pulls you down to the ground, and you land next to a campfire with something roasting on top of it. You sit up in the huge office room and see a large, frog-like creature with five legs lying dead in the corner.\n  \n  \"And who the hell are you?\" asks the fat guy who pushed you down to the ground, his half-unbuttoned shirt revealing his rich chest hair. He looks at your backpack. \"Hand me your backpack. Now.\"\n  \n  \"Come on, he's just a kid. You aren't a threat to us, yes? We don't want any trouble.\" The other guy stands up. He's a tall man with a knitted sweater, and he has a strong Russian accent. \"Why are you even here?\"\n  *choice\n  \n   #\"I'm just lost.\"\n    *set Magazine -1\n    \"Are you? Well, hand me the damn backpack already, and you can be on your way,\" he says, already walking towards you. You crawl back until you reach the wall and cover your backpack with your arms. He pushes you away and rips the backpack out of your grasp, then yanks it open.\n\t\n    \"What do we have here,\" he says as he takes out his pistol and lets the empty magazine drop on the ground before he replaces it with the new one. \"Ah, needed this for a while now. Get out of here, before I change my mind. But the backpack stays.\"\n    *goto stepup\n\t\n   \n   #Remain silent.\n    *set Magazine -1\n    \"Are you a damn mute? Hand me the backpack. Or are you deaf, too?\" he asks, already walking towards you. You crawl back until you reach the wall and cover your backpack with your arms. He pushes you away and rips the backpack out of your grasp, then yanks it open. \n\t\n    \"What do we have here,\" he says as he takes out his pistol and lets the empty magazine drop on the ground as he replaces it with the new one. \"Ah, needed this for a while now. Get out of here, before I change my mind. But the backpack stays.\"\n    *label stepup\n\t\n    \"No it doesn't.\" You hear a clicking sound, then see ${survivor2} aiming his SMG at him. The fat guy steps back and aims his gun at him, while the other guy in the sweater looks around with a scared look on his face. He hesitates, then draws his gun and also aims it at ${survivor2} with trembling hands.\n\t\n    ${survivor2} looks at you from the corner of his eye. \"${firstname}, a little help would be appreciated.\"\n\t\n    You breathe faster and nod, then steadily reach into your waistband and draw your gun, aiming it at…\n    *choice\n\t\n     #The fat guy.\n      *set encounterleft \"sweater\"\n      You aim your gun at the fat guy, and he immediately aims his pistol at you. \"I'm going to shoot his brain out, don't mess with me.\" He keeps on talking, then ${survivor2} joins in with the one in the sweater. \n\t  \n      Chaos emerges, and everyone keeps talking and threatening each other, until the fat guy pulls the hammer back and straightens his arm with the pistol towards you. Your eyes widen, and you jump a little when you hear a gunshot. A second later, you see him falling to the ground, his blood slowly flowing towards you.\n\t  \n      Your ears ring for a moment as ${survivor2} aims the gun at the other guy and commands him to throw his gun away, pointing his SMG at him. \n\t  \n      \"We have to go.\" He pulls you up to your feet and gives your hand a firm tug. You walk after him as he drags you. You keep looking at the dead guy and the one in sweater kneeling next to him.\n\n      \"No…this can't be,\" he mutters before he buries his head in his hands, then looks into your eyes before you disappear into the corridor. \"${firstname}, right? You'll pay for this.\"\n      *goto cont1\n\t  \n\t \n     #The one in the sweater.\n      *set encounterleft \"fat\"\n      You aim your gun at the one in the sweater, and he stumbles backward before aiming back at you. \"D-don't aim it at me. I-I'll end you,\" he says as the fat guy begins to talk too, then ${survivor2} joins in.\n\n      Chaos emerges, and everyone keeps talking and threatening each other, until the one in the sweater pulls the hammer back and straightens his arm with the pistol towards you. Your eyes widen, and you jump a little when you hear a gunshot. A second later, you see him falling to the ground, his blood slowly flowing towards you.\n\t  \n      Your ears ring for a moment as ${survivor2} punches the gun out of his hands and aims his SMG at him. \"We have to go.\" He pulls you up to your feet and gives your hand a slight tug. You walk after him as he drags you, and you keep looking at the dead guy and the fat guy kneeling next to him.\n\n      \"No…you can't do this to me,\" he mutters as he looks up into your eyes before you disappear into the corridor. \"${firstname}, right? I will find you. And finish you painfully.\"\n      *goto cont1\n    \n   #Draw my gun.\n    He walks towards you slowly, and you crawl backwards until your back reaches the wall. With shaking hands, you pull your gun out from your waistband and aim it at him. He stops for a moment and smiles. \n\t\n    \"Whoa, let's just calm down, kid,\" he says as he takes another step towards you. \"You wouldn't shoot me now, would you? You know, this makes me want to have that backpack more than before. And I'm going to take it, even if it's by force.\"\n\n    \"No, you won't.\" You hear a clicking sound, then see ${survivor2} aiming his SMG at him. He steps back and switches his aim from him to you a couple of times, then he decides to keep aiming at ${survivor2}. The other guy in the sweater looks around with a scared look on his face, then draws his pistol and aims it at you with trembling hands.\n    \n    \"${firstname}, we're both aiming at the same target. That's not…very effective,\" ${survivor2} mumbles, his teeth clenched. You breathe faster and nod, then decide to…\n    *choice\n\t\n     #Keep aiming at the fat guy.\n      *set encounterleft \"fat\"\n      You keep aiming at the fat guy, and he does the same to ${survivor2}, who's aiming at the one in the sweater. \"D-don't aim it at me. I-I'll end him,\" he says and keeps on talking until the guy in the sweater and ${survivor2} join in, too. \n\t  \n      Chaos emerges as they keep on arguing and threatening each other, until the one in the sweater pulls the hammer back on his pistol and straightens his arms towards you. Your eyes widen, and you jump a little when you hear a gunshot. A second later, you see him falling to the ground, his blood slowly flowing towards you.\n\t  \n      Your ears ring for a moment as ${survivor2} punches the gun out of his hands and aims his SMG at him, sending it flying high. \"We have to go.\" He pulls you up to your feet and gives your hand a slight tug. You walk after him as he drags you, and you keep looking at the dead guy and the fat guy kneeling next to him.\n\n      \"No…you can't do this to me,\" he mutters as he looks up into your eyes before you disappear into the corridor. \"${firstname}, right? I will find you. And finish you. Painfully.\"\n      *goto cont1\n\t \n     #Aim at the one in the sweater.\n      You switch your aim to the one in the sweater as he keeps aiming at you. \"D-don't aim that at me. I-I'll finish you,\" he mutters as ${survivor2} aims at the fat guy and they begin to threaten each other. \n\t  \n      Eventually, the guy in the sweater joins in too, and chaos emerges quickly as they keep on arguing and threatening each other, until the fat guy pulls the hammer back on his pistol and aims at you. \"I swear to god, I'll end him if you don't back off.\" He grips the trigger tighter. Your eyes widen, and you jump a little when you hear a gunshot. A second later, you see him falling to the ground, his blood slowly flowing towards you.\n\t  \n      Your ears ring for a moment as ${survivor2} aims the gun at the other guy and commands the one in the sweater to throw his gun away, pointing his SMG at him. \"We have to go.\" He pulls you up to your feet and gives your hand a firm tug. You walk after him as he drags you, and you keep looking at the dead guy and the one in the sweater kneeling next to him.\n\n      \"No…this can't be,\" he mutters before he buries his head in his hands, then looks into your eyes before you disappear into the corridor. \"${firstname}, right? You'll pay for this.\"\n      *goto cont1\n\t\n\n \n #Stay put.\n  You aren't eager to find out what might be deeper inside the building, so you keep sitting and peeking outside, waiting for the sandstorm to pass. Eventually, you pull your knees up and rest your head on them. You're about to fall asleep when someone smashes the door at your back and pushes you belly-down to the ground. You turn to look and see ${survivor2} standing above you. \"My god, kid, I thought we lost you for good.\"\n  \n  \"Shh!\" You put your finger to your lips. \"I heard voices.\"\n  \n  \"Ah.\" He nods and moves his eyes from left to right, then shrugs. \"Want to check it out?\"\n  *choice\n  \n   #\"What? No!\"\n    \"All right, I was just asking, calm down. Let's go and find ${survivor1}, then. The sandstorm isn't unbearable now,\" he says as he helps you up and opens the door. You leave and let the door slam behind you.\n    *goto cont2\n   \n   #\"Sure, why not?\"\n    He smiles. \"They might have something valuable.\" You look at him with a raised eyebrow.\n\n    \"Or they might be friendly.\" He looks at you. \"Come on, I can imagine what kind of look you're giving me right now,\" he says, already going ahead. You catch up to him while he readies his SMG, then sneaks down the corridor, sticking to the wall. You try to do the same and follow him as you pass by office doors and demolished offices without doors. Slime gets stuck on your feet, and you stop to take a deep breath before you reach the end of the corridor. \n\t\n    As you arrive at the end of the corridor, you notice crackling sounds and light coming from there. It reminds you of a campfire. Suddenly, the talking stops, and ${survivor2} gives you a look and shrugs. Then he peeks around the corner, and you can see a hand reaching out for his neck and pushing him down to the ground.\n\t\n    \"And who the hell are you two?\" asks the fat guy who pushed him to the ground, his half-unbuttoned shirt revealing his chest hair. He looks at the SMG and draws his gun, pointing it at him.\n    \n    \"Come on, he has a kid with him. You two can leave in peace, yes? We don't want any trouble.\" A taller guy with a knitted sweater stands up and speaks with a strong accent. You look at the campfire and notice something roasting on it, then peek at the corner of the large room and see a big, frog-like creature with five legs lying dead in the corner.\n\t\n    \"They aren't going anywhere. The kid has a backpack. Hand it to me!\" You snap back to reality as he turns towards you, and ${survivor2} aims his SMG at him in a half-sitting position. The guy in the sweater also pulls out a pistol and aims it at ${survivor2} with trembling hands.\n\t\n    \"${firstname}, a little help would be appreciated,\" ${survivor2} says as he changes targets rapidly. You nod and grip the pistol in your waistband, then pull it out and aim it at…\n    *choice\n\t\n     #The fat guy.\n      *set encounterleft \"sweater\"\n      You aim at him, and he does the same to you. \"Don't test me, or I'll blow your brains out!\" he threatens, then ${survivor2} begins to threaten him, so the one in the sweater does the same. Soon, chaos emerges as they threaten and argue with each other, until the fat guy pulls the hammer back on his pistol. \"I swear to god, I'll end him if you don't back off.\" He grips the trigger tighter. Your eyes widen, and you jump a little when you hear a gunshot. A second later, you see him falling to the ground, his blood slowly flowing towards you.\n\t  \n      Your ears ring for a moment as ${survivor2} jumps to his feet and commands the one in the sweater to throw his gun away, pointing his SMG at him. As soon as he does, he rushes behind you, giving your shoulder a firm pull. \"We have to go,\" he says, giving your shoulder another tug and hurrying towards the corridor. You walk after him, and you keep looking at the dead guy and the one in sweater kneeling next to him. \n\n      \"No…this can't be,\" he mutters before he buries his head in his hands, then looks into your eyes before you disappear into the corridor. \"${firstname}, right? You'll pay for this.\"\n      *goto cont1\n\t \n     #The one in the sweater.\n      *set encounterleft \"fat\"\n      You aim at him, and he does the same to you. \"P-put that gun away. Or I-I'm going to hurt you,\" he threatens, then ${survivor2} begins to threaten him, so the one in the sweater does the same. Soon, chaos emerges as they threaten and argue with each other, until the one in the sweater pulls the hammer back on his pistol. \"I-I'm going to kill him if you don't leave, yes?\" He grips the trigger tighter. Your eyes widen, and you jump a little when you hear a gunshot. A second later, you see him falling to the ground, his blood slowly flowing towards you.\n\t  \n      Your ears ring for a moment as ${survivor2} jumps to his feet and punches the gun out of his hands and aims his SMG at him, sending it flying high. Then he rushes behind you, giving your shoulder a firm pull. \"We have to go,\" he says, giving your shoulder another tug and hurrying towards the corridor. You walk after him, and you keep looking at the dead guy and the fat guy kneeling next to him.\n\n      \"No…you can't do this to me,\" he mutters as he looks into your eyes before you disappear into the corridor. \"${firstname}, right? I will find you. And finish you. Painfully.\"\n      *goto cont1\n \n \n\n*label cont1\n*page_break\nYou burst out of the front door and let it slam behind you, while ${survivor2} still drags you. The sandstorm still hasn't passed, but it's better than it was before. At least you can see where you're going. \n\n\"Move it…we just made lots of noise back there. We shouldn't attract unwanted attention to ourselves,\" he says as you both go through the small deserted field. You step over various rotting, dead animals. After passing a government car smashed against a pole, you head towards the highway.\n*fake_choice\n\n #\"[i]We[/i] made lots of noise?\"\n  *set Ryan %-8\n  \"Hey! You were about to get shot, and you weren't about to pull the trigger. What was I supposed to do? Just let you get shot and suffer the same fate myself? You should be thanking me instead. Don't be ungrateful,\" he says, holstering his SMG.\n  \n #\"Why did you kill him? He wasn't going to shoot us.\"\n  \"I don't know if you saw what I saw. The guy pulled the hammer back. You don't do that unless you want to kill someone. I think you'll find that out sooner or later,\" he says, holstering his SMG.\n \n \n #\"Thanks for the help.\"\n  *set Ryan %+8\n  \"Hey, no problem, kid,\" he says, giving your head a couple of small pats. \"But you ought to learn how to protect yourself, sooner rather than later. You don't want it to be too late,\" he says, holstering his SMG.\n\n  \n*label cont3\n\n\"Anyway, I wonder where ${survivor1} could be. I think we lost each other around…there, maybe?\" he says as he points beyond the highway. You wish you could make more out of it, but the sandstorm only lets you see a small hill. \"Get down.\" He pushes you on the ground and lays next to you, then turns his head to you. \"Keep your eyes open and don't move.\"\n\nYou do as you're told, wondering what it's about. A few seconds later, you see a couple of giant, ray-like creatures with spear tails flying dangerously close and circling around you. One of them lands next to you and looks into your eyes. Its white, glowing eyes without pupils give you the chills. It smells your gas mask, and you can feel its sharp tail laying across your legs. Your heart beats fast in your chest, and you can feel your limbs tingling. It suddenly turns its head away and hops over to the rotting animal corpse. It grips the corpse with its claws and flies away. \n\n${survivor2} jumps to his feet and sighs as he puts his hands on his hips. \"Aviatrix for you. They prefer rotten meat over the freshly dead ones. I'm telling you, it'll be the end of them. It'll be surprised and disappointed to not see us here later. Are you okay? We should move. We have to find ${survivor1} before sunset,\" he says, looking down at you.\n\nYou nod and get up with shaking legs, before both of you head towards the highway. You follow him and climb onto a blown-up truck's hood. Its platform partly hangs off the edge. You walk on its roof over to the platform, stopping when you reach a huge gap between the platform's end and the other part of the highway. \"I know I can make this jump, but…I'm not so sure about you. Do you think you can make it?\" he asks, scratching his head.\n\n*choice\n #\"Of course I can.\"\n  *set Ryan %+5\n  \"All right. I trust you. I'll go first then, and catch you if you happen to be just an arm shorter.\" He walks backwards on the platform, takes a deep breath, then runs towards the edge and kicks himself off. He lands on the other side with a somersault. He stands up to dust himself off and kneels down near the edge. \"Your turn, kid.\"\n  \n  You take a deep breath and do as he did. You walk back on the platform, then run as fast as you can until you reach the end of the platform and launch yourself towards the highway. There's a moment when excitement fills your whole body, but it passes fast when you notice that you might be landing sooner than planned. The gap between the platform and the highway is way too big. \n  \n  You glance down, and fear now replaces your excitement. You smack onto the highway with your chest and quickly begin to slide down, as there's nothing to grip onto, until ${survivor2} takes hold of your forearm.\n  \n  \"Hang in there, buddy,\" he chuckles and pulls you up. When he does, you roll onto your back and pant. \"Nice landing.\" He looks at you as you're lying on your back, then offers a hand and pulls you up to your feet. He pats you on the back, and you step over a rotten corpse covered with worms.\n  \n  \"You know, that was actually pretty funny. Don't tell me it wasn't, now that you think back!\" he says, chuckling again. You look at him and shake your head a little, but smirk at the thought. Luckily, he can't see that through the gas mask. \"All right. Sorry. I'll stop laughing.\"\n  \n  You head horizontally through the highway, climbing over all of the cars and rotten corpses in your way. ${survivor2} often peeks into the cars for loot, but always ends up mentioning that it's getting late. You meet some rabid dogs on your way, but it's nothing ${survivor2} can't handle, as he swiftly stabs them.\n  *goto cont4\n  \n  \n #\"I don't think so.\"\n  \"All right then, hmmm…\" He looks around and rubs his hands together. \"You know what? You do the first jump, and when you're at the edge, I'll give you a boost so you jump higher. Just don't forget to land in a somersault. Got it?\"\n  \n  Your eyes widen, and you take a deep breath but nod rapidly, hoping that it'll work. You walk back on the platform and stop for a moment until ${survivor2} nods his head once. Taking a deep breath, you begin to run as fast as you can. As you reach the end of the platform, you launch yourself off towards the highway and feel a pair of hands on your back and lower back, giving you a slight push. Excitement fills your whole body as you fly high, but it passes as soon as you hit the ground. You try to do a somersault, but you just end up rolling away.\n  \n  You glance back at the chuckling ${survivor2} as you sit down and he makes the jump himself. He ends it with a somersault as he lands. He stands up to dust himself off and keeps chuckling. \"Nice landing.\" He looks at you as you keep sitting, then offers you a hand and pulls you up to your feet. He pats you on the back, and you step over a rotten corpse covered with worms. \n  \n  \"You know, that was actually pretty funny. Don't tell me it wasn't, now that you think back!\" he says, chuckling again. You look at him and shake your head a little, but smirk at the thought. Luckily, he can't see that through the gas mask. \"All right. Sorry. I'll stop laughing.\"\n  \n  You head horizontally through the highway, climbing over all of the cars and rotten corpses in your way. ${survivor2} often peeks into the cars for loot, but always ends up mentioning that it's getting late. You meet some rabid dogs on your way, but it's nothing ${survivor2} can't handle, as he swiftly stabs them.\n  *goto cont4\n  \n  \n #Try to make the jump.\n  *set Maskfilter -1\n  *set Ryan %-5\n  *set gmaskproblem true\n  Without a word, you walk back on the platform, then run as fast as you can until you reach the end of it. You launch yourself off towards the highway. There's a moment when excitement fills your whole body, but it passes fast when you notice that you might be landing sooner than planned. The gap between the platform and the highway is way too big; you glance down, and fear now replaces your excitement. \n  \n  You smack onto the side of the highway with your chest and quickly begin to slide down, as there's nothing to grab onto. You fall for a second, then hit the small hill covered with waste and bounce face-first on the ground as everything goes dark.\n  *page_break\n  *set nosewound true\n  \n  You open your eyes, and your vision starts to come back, though you feel dizzy and your back hurts. You immediately feel something running down your lips and chin. It flows into your mouth and tastes like blood. Suddenly, you begin to feel just how bad your nose hurts. You try to breathe, but you gasp and rattle as you breathe in. It feels like hot knives are stabbing your lung from the inside. \n  \n  Panic takes control of you as you notice ${survivor2} kneeling down and looking at you, already on the other side of the highway. \"Keep calm! Don't breathe, and put another filter in. I don't know how hard you hit the ground, but damn, it flew high,\" he says loudly, but you notice that he's still trying to keep it somewhat quiet.\n  \n  You nod and quickly kneel to yank open the backpack next to you. You reach in for a filter and screw it into the right side of your mask. You take some deep breaths and sit back on your heels. \n  \n  \"All right, now. Don't panic, but…I don't really know how to get you up here. Take a look around, maybe?\" he says, and you stand up. Your insides hurt from the impact, and you can't help but swallow some of your own blood every now and then, as it's still dripping from your nose. \n  \n  As you take a good look around, you notice a broken ladder in the distance that leads up to a small trussed box where the fusebox is. It's close to the highway, too. You're about to make your way towards it, but stumble back when you see a dog with its ribs sticking out of its body walking over to a dead body at the bottom of the ladder. It sniffs around the body, then begins to chew on its face. You put your finger to the front of your gas mask and point towards the dog. ${survivor2} shrugs, and you try to mimic the dog at the ladder that leads up to the trussed box.\n  \n  He nods once, then turns around and disappears. You keep looking up, waiting for him to reappear. Your eyes widen when the dog looks at you. It growls, and you notice the unusual amount of teeth it has in its mouth. It lowers its head and slowly steps forward. Then ${survivor2} drops on it from halfway down the ladder and stabs it in the neck a couple of times, then waves for you to come. You release a 'phew' and head towards him.\n  \n  \"So much detour because you've been feeling like a superhero,\" he says as he boosts you up the broken ladder. You climb up and wait for him in the trussed box, where he boosts you up again. \"Let's not do anything like that again, okay?\" he asks as you're crossing through the highway. You nod, and before you have the chance to say anything, he nods too. \"Good.\"\n  \n  You climb over all of the cars and rotten corpses in your way. ${survivor2} often peeks into the cars for loot, but always ends up mentioning that it's getting late. You meet some rabid dogs on the way, but it's nothing ${survivor2} can't handle, as he swiftly stabs them.\n  *goto cont4\n\n \n \n\n\n\n\n*label cont2\n*set encounterleft \"both\"\nYou leave the building and let the door slam behind you. \"The sandstorm didn't pass yet, but at least you can see where you're going,\" he says as you both go through the small deserted field, stepping over various dead animals, and head towards the highway. You climb over a government car smashed against a pole. \n\nYou glance back at the building and see light emerging from one of the missing windows and two guys watching you.\n*goto cont3\n\n\n*label cont4\n*page_break\n\nWhen you reach the end of the highway, it's already sunset. He wipes his knife off on the back of his trousers. You both stop at a ripped-apart fence, its wires pointing in every direction like sharp knives. \n\n\"Careful now,\" he says as he pushes some of it away so you can fit through. You do the same on the other side for him, then you head down the hill towards a small dairy house with dead horses and cows rotting outside. ${survivor2} coughs and looks away from the dead animals as he tries to kick the door down. \"God, this smell.\" \n*if (nosewound)\n You try to smell the air but realize your nostrils are filled with dried blood. For once, you're kind of glad for a wound like this, and you're also happy it's not bleeding anymore.\n *goto cont5\n \n*else\n\n\n You cough hard and turn your head away as you clench your eyes closed. You can feel tears rolling down your cheeks from the unbearable smell.\n *goto cont5\n \n \n\n*label cont5\n\n*page_break\nThe door finally gives up and breaks into lots of pieces, and you walk into the small dairy house. You walk around and notice that there are two small bedrooms, a kitchen, and a basement. ${survivor2} keeps calling out for ${survivor1}, as if he hasn't heard it already in this small house, then walks to the kitchen. \n\n\"Dammit!\" He smashes the dusty kitchen counter, filling the room with dust. You walk up to him and read the words engraved into it. 'Back to ${base}. Found supplies. Follow ASAP.' ${survivor2} walks to the window frame with no glass and looks outside. \"The sun is barely lighting anything now. We don't have much time left.\"\n\nYou sit on the counter and open the fridge next to it, but quickly close it when an enormous rat with five eyes hisses at you. The room feels darker than when you entered it, proving ${survivor2} right. He rubs his eyebrows through the gas mask and turns around to sit in the window. He keeps staring outside, then shrugs a little. \n\n\"At least he found supplies. Things aren't entirely bad. Goddammit!\" He smacks the wall with the bottom of his fist. \"Darkness is bad. Really bad. All right. We have two options. We either set off now and hope to get back before it goes entirely dark, or we hide somewhere and hope to make it through the night. I don't know which one would be the better choice.\" He looks back out the window. The sun can barely be seen, and he begins to chew his bottom lip. \"Opinion?\"\n*choice\n\n #\"I think we should head back.\"\n  \"I think we should head back before it gets dark,\" you say, scratching your arm.\n  \n  He nods rapidly and messes with his fingers. \"Mhm. Yeah. Okay. Let's do that, then,\" he says as he jumps to his feet and heads towards the exit. You jump off the counter and follow him. It seems to be a long walk through the empty field, since you can't see the end of it. \"The sandstorm. It's never been this bad. And now this. I'm seriously getting tired of this,\" he sighs and jumps over a steaming corpse. \n  \n  You do the same but keep glancing back at it. You keep on walking through the empty field, eventually having to cross through thick yellow-and-red plants reaching up to your waist. It's exhausting to keep walking and pushing plants away in silence, with the sun gradually disappearing from the sky.\n  \n  \"You know, I've been wondering. What do you want to do now? Or, when it's all over…I mean, do you have a goal at the end of this, or something you really want to do?\" he asks, panting and pushing the plants aside.\n  *fake_choice\n   #\"Finding my parents.\"\n    *set goal \"parents\"\n    *achieve parents\n    \"Ah, I can understand that, and I'd even offer to take a little detour from our scavenging if it's not so far. Someday, maybe. But…\" He shakes his head and pants, then stops for a second to look at you. \"Look, kid. I don't mean to be a bummer here, but…well, you know there's a good chance that even if you found them, they're either dead or…worse. It might be better to leave this mystery a mystery. Trust me. I know it from first-hand,\" he says as he begins to move again, pushing the plants aside.\n    *goto moved\n\t\n\t\n   #\"Finding a safe place.\"\n    *set goal \"safe\"\n    *achieve safe\n    \"Well, feeling safe is one of the rare feelings to possess now. I can imagine why you'd want that. It would be nice to feel safe again, for a change. I'm getting pretty tired of having to look behind my back all the time. But I wouldn't get my hopes up, if I were you.\" He pushes some plants aside and stops for a second to pant hard. \"Things don't look too bright, and I don't think it'll change. At least for a good while,\" he says as he begins to move again, pushing the plants aside.\n    *goto moved\n  \n   #\"Killing ${capturer1}.\"\n    *set goal \"murder\"\n    *achieve murder\n    \"Really? Is that all? I mean, you've got a point there. I'd like to see him dead too, but…is that it? I mean, what happens after you succeed? Listen…\" He stops for a second to breathe and wipe the sweat off his forehead. \"I know revenge is best served cold, and believe me, I'd like to see him dead too, but…don't let anger drive you. Too much hatred always brings more trouble,\" he says as he begins to move again, pushing the plants aside.\n    *goto moved\n   \n   #\"I don't have a goal.\"\n    *set goal \"none\"\n    He stops to pant heavily, then turns to you. \"Really? Nothing at all?\" He takes a deep breath. \"I can relate to that somehow. I'm tired of having to look behind my back all the time. But listen, I know this might seem like a pretty bad situation, and that's probably because it is. But don't think it won't ever get better. Let hope be the last thing you lose. All right?\" He stretches his arms before he pats you on the back a couple of times, then starts pushing plants aside and begins to move.\n    *goto moved\n  \n \n \n #\"I think we should stay here.\"\n  \"Maybe we should stay here. I saw a basement in the other room,\" you say, scratching your arm.\n  \n  He nods rapidly and messes with his fingers. \"Mhm. Yeah. Okay. Let's do that, then.\"\n  *goto stayed\n  \n  \n  \n  \n*label moved\n\n\n\"Do you want to know what I want?\" He takes a deep breath and looks at you. \n\nYou nod at him and quietly say, \"Yup.\"\n\n\"As stupid as it might sound, I want to help the district. I want to make things better. The other option I could settle with, is peace. I want things to be like they were before. I want to go somewhere safe and settle down. But getting out of this place is, well, not as easy as it sounds. Trust me…I know what I'm talking about. It's funny though, isn't it?\" He chuckles. \"Things back then were so horrible, we were wishing for something. Anything to bring change. I guess none of us expected this.\"\n\nYou keep on walking for a while through the field, and your arms and legs tremble from exhaustion. When you finally reach the end of it, ${survivor2} pushes the last plants aside and drops to his knees, panting. You sit down next to him and do the same. \n\n\"All right, there's no time to rest, we have to keep pushing. It's already pitch black, so we're way behind our planned schedule,\" he says as he stands up and pulls you to your feet by your arms. With a quiet clicking sound, he turns on the small flashlight on his SMG. It's not much, but at least you can see where you're going.\n\nAt the end of the deserted field, you arrive at a long fence with buildings left to right as far as you can see. The alleyway in front of you seems to be the only way in for miles. Having no other option, you climb over the small fence to land in a dirty, long, and narrow alley. Something crackles under your feet as you and ${survivor2} make your way down the alley. \n\nThe walls seem to be ridiculously close, and the dirt and trash you see along the way makes the whole scene look uncomfortable. If the world wasn't the way it is, you'd be afraid of catching something. You keep on walking for a long while and begin to feel very tired. Suddenly, you feel someone's breath on the back of your neck. It makes you jump forward, but you immediately glance back and see nothing, only darkness.\n\n\"Okay, ${firstname},\" ${survivor2} says as he stops you. \"Call me crazy, but…we've passed by this same exact trash can three times now.\" He points at the trash can and pulls out his knife. \"I know I'm not crazy…this walk has already taken an incredibly long time. I mean, it's an alley, not a highway.\" He kneels down and stabs a hole into the side of the trash can, then looks at you. \"You don't think I'm crazy, right?\"\n*fake_choice\n #\"Not at all.\"\n  *set Ryan %+5\n  \"No, I felt someone breathing behind me not long ago,\" you say and look behind yourself.\n   \n  He nods and stands up with wide eyes. \"Something really weird is going on here. Keep your eyes open. And, um, don't panic, okay?\" he says with a slightly shaking voice. He stands up and you continue to follow him. He points his flashlight down the alley, but it doesn't seem to light up the path ahead.\n  \n \n \n \n #\"Now that you mention it…\"\n  *set Ryan %-5\n  *set Evil %+5\n  \"We're just tired. That's all. There's no way to not reach the end of something.\"\n  \n  He shakes his head and stands there, frowning. \"Thanks a lot! I know I'm not crazy. Something really weird is going on here,\" he says with a slightly shaking voice. He jumps up, then continues to walk. You follow him as he points his flashlight down the alley, but it doesn't seem to light up the path ahead.\n  \n  \n \n\n\"No way…\" He stops and points at the trash can. There's a hole in it, and it looks entirely the same as the one ${survivor2} stabbed into the trash can you saw not long ago. He puts down his SMG with shaking hands and picks up the neck of a small broken bottle. \n\nAfter cursing a little, he throws it far away deep into the alley. For a couple of moments, you stand there in complete silence. \"Sorry…I—I shouldn't have,\" he mumbles before you hear a loud shattering noise coming from behind you and feel glass shards smashing into the back of your leg.\n    \n\"Okay. I'm not going to lie. This is pretty scary,\" he says as you both turn around and stare at the broken bottle neck. He picks up his SMG and begins to walk in a fast pace backwards. You follow him and can hear him murmuring something. \n\nHe keeps on quickening the pace until you have to run after him, then he suddenly stops. You bump into him and fall back. When you stand up and walk next to him, you see ${survivor1} at the fence you climbed over not long ago, waving at you.\n*fake_choice\n #\"${survivor1}! You came back!\"\n  *set Ryan %-2\n  ${survivor2} frowns and holds you back from going to him, then whispers with clenched teeth. \"Something smells fishy here.\"\n  \n \n #\"${survivor1}? How could you be here?\"\n  *set Ryan %+2\n  ${survivor2} raises his eyebrows and whispers to you with clenched teeth. \"Exactly. First the alley, now this. Something's not right here.\"\n  \n\n\n\"Hey boys! You're going in the wrong direction,\" ${survivor1} says and walks past you. He opens a small, rusty metal door leading downstairs under the huge building. \"This sight confused me at first, though.\" He leans against the wall.\n\n${survivor2} gives you a suspicious look, then walks over there and looks down. He keeps looking down for a couple of seconds, then gasps and stumbles back, slipping on the broken glass and falling on the ground hard. \n\n\"Whoa, are you all right there?\" ${survivor1} kicks some of the glass shards away. Steadily, you walk over there and glance downstairs too. Your legs begin to shake, and you fall to your knees at the sight.\n\nSomeone with a long-sleeved shirt, dark blue jeans and a dark red backpack is kneeling in a puddle of blood, holding a pistol. You follow the trail of blood with your eyes, and it leads to a hanged corpse which looks like ${survivor2}. He slowly swings from left to right. You turn your head back to the boy in the puddle of blood, who's gripping the pistol tighter while muttering and rocking back and forth. \"There's no way out. No. Way. Out.\" Then he suddenly looks at you and crawls towards the broken stairs which make it impossible to come up. His eyes widen, and he looks up at you. \n\nThe left side of his gas mask is ripped off, and he looks directly into your eyes. \"No way out. Or is there?\" He raises his pistol and pushes it hard against his own head. \"One way out.\" He suddenly begins to laugh like a maniac and screams. \"ONE. WAY. OUT!\" He keeps on laughing as he tightens his finger on the trigger. The corpse's eyes snap open and does the same, spitting out blood as he does so.\n\nYour back aches as you blink up at the dark sky, lying on your back on the dark, cold ground. ${survivor2} looks at you and pulls you up by your hand. \"${firstname}…\" He shakes your shoulder gently. \"Are you with me?\" You nod slowly and raise your hand, still confused. It feels heavy, and you realize you're holding your pistol in your hand. You quickly put it in your waistband and try to wipe the tears off your face. It proves to be a hard task through the gas mask.\n\n\"Well, I told you it's confusing. Anyway, the way home is this way.\" ${survivor1} pushes himself off the wall.\n\n\"What home, exactly?\" ${survivor2} grips his SMG tighter and glances at you. \n\n\"Our home. Come on, don't play stupid.\" He laughs and puts his hands in his pockets.\n\n\"What's the name of it again? I kinda forgot,\" ${survivor2} asks and aims at him. You have to blink swiftly when the darkness flickers, and you catch a glimpse of light every now and then replacing the darkness surrounding you, but it keeps coming back.\n\n\"Well…that's a real shame.\" ${survivor1} chuckles and looks down, then looks back at ${survivor2} with glowing red eyes and runs towards him. ${survivor2} grips your shirt at the chest and pushes you against the wall. You slide down next to a huge green dumpster, covering the sight of ${survivor1} with it. \n\n${survivor2} fires his SMG, when something jumps on him, and buries him underneath its huge body. He lays still, buried under the creature's body. There's a moment of silence before you slowly stand up, walk towards them, and take a peek at ${survivor2}.\n\n*page_break\n\"Could you, you know, help roll this thing off of me?\" ${survivor2} breaths hard, and you help him push it off. It lands on its back, and you both look at it. It has a weirdly big body and head, and big, dark, and now dead eyes. Several tiny fangs stick out of its mouth. The hand parts end in long, sharp claws that replace the fingers. The sight sends a shiver down your spine. \n\n\"You haven't told me about this one.\" You look at him as he covers a small bleeding wound on his arm and stands up.\n\n\"That's because we hadn't seen this one yet.\" He sighs. The darkness suddenly fades, and you catch the sun from the corner of your eyes, along with the end of the alleyway.\n\n\"It's been sunrise all along?!\" ${survivor2} smashes his fist against the wall and pulls on your hand before he begins to run down the alley. You're very confused, but you decide to follow him. Uncontrollably, you glance back one more time at the creature when you pass the trash can. The creatures don't give you much trouble on the way back, as ${survivor2} either kills them or avoids them. You have a hard time keeping up with him, but eventually you arrive at the base.\n*goto arrived\n\n\n\n\n\n*label stayed\n\nHe turns around and looks out of the window once again. \"I'd say the full moon is beautiful, if things weren't like…this.\" He jumps to his feet and paces around the room, then walks to the fridge. \"Help me move this. We have to block the door,\" he says, gripping both sides of it.\n\n\"Just don't open it.\" You nod and jump off the counter, then grip the back of it as ${survivor2} tilts it forward. He keeps pulling and you keep pushing it until it's at the empty doorway. The fridge fits the doorway perfectly. ${survivor2} gives it a couple of slight pushes to make sure it's in place and chuckles. He turns around and looks at all the window frames without glass in them, and his chuckle quickly fades. \n\n\"Don't…think it was all in vain, though. At least they can't get in from the big hole at the entrance…right?\" He pats you on the back and walks through the kitchen towards the room with the small wooden trap door leading down to the basement.\n\nHe sits down and tries to open it, but it doesn't budge. He pulls out his knife and slips the edge of it into the small gap between the door and the frame. It doesn't take long before it snaps and he pulls the door open, which results in a small ladder unfolding and banging on the basement floor when it's done. \n\nHe spins the knife back into his holster and peeks down, then grips the first step tightly and carefully climbs down the ladder. You crouch down, getting ready to do the same as he pulls his SMG into his hands. With a small clicking sound, he turns the flashlight on. You climb down the ladder and decide to jump down when you arrive at the last three broken steps. The small basement echoes as you land.\n\n${survivor2} jumps up and pulls the trap door down before he uses the flashlight to scan the room from the left side. There's basically nothing in the small basement but moss on the walls and ceiling. A light bulb hangs from the ceiling, but it seems to be broken. He scans the basement, and some dark, dried blood catches your eye. \n\nHe follows the trail to a small sleeping bag in the corner, and you gasp at the sight. A skeleton about your size has its arm wrapped around another, smaller skeleton, which hugs a teddy bear. The sleeping bag and the teddy bear are both soaked in blood, and ${survivor2} walks to the wall on your right. He slides down into a sitting position and covers his face in his palms.\n*page_break\n\n\"Is…everything okay?\" you ask in a shy tone of voice.\n*set Tiffanyknow true\n\nHe lets out a big sigh and rests his hands upon his pulled-up knees. \"Yeah, it's just…\" He clears his throat. \"They remind me of me and Tiffany. She was my sister, and I was supposed to take care of her. As you can see, I failed. We were searching for a way out of this hell when we got hit by a pack of wacks. I lost her, and no matter how hard I searched, I couldn't find her for days. \n\n\"I knew that she was out there in the dark, without light. With the stalkers all around. After a couple of days, I found her in an abandoned sawmill, and…she wasn't dead. But she wasn't my Tiff anymore. I had to…\" His voice trembles. \n\n\"I had to kill her. She was one of them. It was either her or me. I went on a rampage after that. I slaughtered many of these…monsters, before I got cornered and fell down a roof. I was lying on the ground, bleeding out, ready to die. That's when they captured me.\" He glances at them again and remains silent for a couple of seconds. \"One of them could even be you.\"\n\nHe keeps looking down at the ground, and you decide to sit across from him. You lean back against the wall and think about everything that's happened so far. ${survivor2}'s flashlight points towards the dead bodies. After a while, he clears his throat and looks at you. \"So…I've been wondering. What do you want to do now? Or when it's all over…I mean, do you have a goal at the end of this, or something you really want to do?\" he asks with a scratchy and tired voice.\n*fake_choice\n #\"Finding my parents.\"\n  *set goal \"parents\"\n  *achieve parents\n  \"Ah, I can understand that, and I'd even offer to take a little detour from our scavenging if it's not so far. Someday, maybe.\" He sighs and pants, then stops for a second and looks at you. \"Look, kid. I don't mean to be a bummer here, but…well, you know there's a good chance that even if you found them, they're either dead or…worse. It might be better to leave this mystery a mystery. Trust me. I know it from first-hand,\" he says as he glances at the corpses again.\n\t\n\t\n #\"Finding a safe place.\"\n  *set goal \"safe\"\n  *achieve safe\n  \"Well, feeling safe is one of the rare feelings to possess now. I can imagine why you'd want that. It'd be nice to feel safe again, for a change. I'm getting pretty tired of having to look behind my back all the time. But I wouldn't get my hopes up, if I were you.\" He looks down again. \"Things don't look too bright, and I don't think that'll change. At least for a good while,\" he says as he lets out a large sigh.\n   \n  \n #\"Killing ${capturer1}.\"\n  *set goal \"murder\"\n  *achieve murder\n  \"Really? Is that all? I mean, you've got a point there. I'd like to see him dead too, but…is that it? I mean, what happens after you succeed? Listen…\" He pats the SMG with his fingertips. \"I know revenge is best served cold, and believe me, I'd like to see him dead too, but…don't let anger drive you. Too much hatred always brings more trouble,\" he says, sighing.\n   \n #\"I don't have a goal.\"\n  *set goal \"none\"\n  He looks up from the ground. \"Really? Nothing at all?\" He sighs. \"I can relate to that somehow. I'm tired of having to look behind my back all the time. But listen, I know this might seem like a pretty bad situation, and that's probably because it is. But don't think it won't ever get better. Let hope be the last thing you lose. All right?\" He nods slowly before looking down at the ground again.\n\n\n\n\n\n\nFinally, he spins the SMG so it's pointing at the ladder instead of the corpses. \"So, I think we're way past sunset now, but I wouldn't advise going to sleep. One of us has to stand guard for the night, in case something happens. We could also switch halfway through the night, though we'd have no way of telling when that is. So…yeah, you can sleep, I'll do it,\" he says, followed by a large yawn.\n*fake_choice\n #\"All right.\"\n \n  \"All right, thank you.\" You nod and slide your backpack off your back, then lay on your side. To make the cold, dirty, and uncomfortable floor somewhat bearable, you slide the backpack under your head and curl up into a fetal position. ${survivor2} sits there quietly with the SMG in his hands, pointing the flashlight at the ladder. You keep looking at him for a while, until your eyes close and you fall asleep.\n\n  You wake up after what feels like a good amount of sleep, but it still doesn't prove to be enough. After letting out a yawn, you stretch your limbs. On the other side of the room, ${survivor2} is snoring quietly. You clear your throat a couple of times, increasing the volume each time. He eventually looks up and jumps a little. \"I wasn't sleeping. Honest.\" Silence fills the room as you look at each other for a couple of seconds, then you both burst out laughing. \"I think we're close to sunrise. Let's go!\" He claps once, then jumps to his feet.\n  \n  He walks to the ladder, and with a jump he pushes the trap door open and grips the fourth, unbroken step. Before he begins to climb, you walk next to him, and he releases the step, realizing you need a boost. After he does that, you climb up as fast as you can. You walk into the kitchen, where ${survivor2} follows you and turns the flashlight off before he looks out the window. You glance out too, and the full moon shines down on the both of you.\n\n  \"I don't…really get it. You've been sleeping for, like…hours. Then I fell asleep too, for…I don't know, probably more hours, because I'm not tired at all.\" He rubs his chin through the gas mask. \"Whatever. We have to go. Help me move the fridge,\" he says, gripping both sides of it tightly and tilting it towards himself. \n  \n  You firmly grip it on the other side and help him push it aside. He pulls his SMG into his hands and clicks the flashlight on. \"Huh?\" He turns it on and off again a couple of times, but it still doesn't seem to light the path ahead of you the way it should. It seems as if the darkness is swallowing the light.\n  \n  He looks at you and shrugs, then you follow him outside and step over a skeleton not long after that.\n  *goto stayed2\n\n  \n  \n  \n  \n  \n #\"I'll do it.\"\n  *set Ryan %+5\n  \"No way,\" he says, shaking his head.\n  \n  \"Why not? I can do it,\" you say and shrug a little.\n  \n  \"All right. If you insist…but I better not wake up to something gnawing my face off,\" he says, then he slowly slides further down and rolls onto his side. He puts his backpack under his head. \"G'night,\" he mumbles and leaves the flashlight pointing towards the ladder.\n  \n  After a while, he begins to snore quietly. You pull your knees up and hug them, then put your head on them. This is proving to be more boring than you thought it'd be. Thoughts run through your head as you focus hard to stay awake. Your knees feel surprisingly comfortable, but you manage to remain conscious.\n  \n  Your head is beginning to feel very heavy when finally, ${survivor2} sits up and stretches his limbs. \"Morning.\" He stands up and grips his SMG tightly. You stand up too and let out a yawn. \"Well, that felt good. Thank you. And you made it through the night, that's something.\" He walks under the trap door, and with a slight jump he pushes it open. He claps once and grips the fourth, unbroken step.\n  \n  Before he begins to climb up, you walk next to him and he releases the step, realizing you need a boost. After he does that, you climb up as fast as you can. You walk into the kitchen, where ${survivor2} follows you and turns the flashlight off before looking out the window. You glance out too, and the full moon shines down on the both of you.\n  \n  \"I don't…understand this. How long have I been asleep for?\" He looks at you.\n  \n  \"I don't know, ages.\" You shrug and yawn again.\n  \n  \"Yeah, it felt like that. And you look like that, too.\" He rubs his chin through the gas mask. \"Whatever. We have to go. Help me move the fridge,\" he says, gripping both sides of it tightly and tilting it towards himself. You firmly grip it on the other side and help him push it aside. \n  \n  He pulls his SMG into his hands and clicks the flashlight on. \"Huh?\" He turns it on and off again a couple of times, but it still doesn't seem to light the path ahead of you the way it should. It seems as if the darkness is swallowing the light.\n  \n  He looks at you and shrugs, then you follow him outside and step over a skeleton not long after that.\n  *goto stayed2\n  \n  \n  \n  \n\n  \n  \n  \n  \n*label stayed2\n*page_break\nYou keep walking through a field filled with dead plants for a good while, and you begin to feel either tired or bored, but you're not sure which. You;re about to yawn when you feel someone's breath on the back of your neck. It makes you jump forward, but you immediately glance back and see nothing, only darkness and the small house in the distance. \n\n\"Okay. Call me crazy, but…we just stepped over the same corpse for the fifth time now. And we don't seem to get farther away from the house!\" He points towards it with his SMG. \"We've been walking for, I don't know, probably an hour now. Jesus!\" He kneels down and takes his knife out, then carves an X into the back of the corpse's head. \"You don't think I'm crazy, right?\"\n\n*fake_choice\n #\"Not at all.\"\n  *set Ryan %+5\n  \"No, I felt someone breathing behind me not long ago,\" you say, looking behind yourself.\n   \n  He nods and stands up with wide eyes. \"Something really weird is going on here. Keep your eyes open. And, um, don't panic, okay?\" he says with a slightly shaking voice, and you follow him down the field. He keeps pointing his flashlight down the road, but it still gets swallowed by the darkness.\n  \n \n \n \n #\"Now that you mention it…\"\n  *set Ryan %-5\n  *set Evil %+5\n  \"We're just tired. That's all. There's no way to not get farther away from something.\" You shrug a little.\n  \n  He shakes his head and stands, frowning. \"Thanks a lot! I know I'm not crazy. Something really weird is going on here,\" he says with a slightly shaking voice and jumps up, then begins to walk down the field. You follow him as he points his flashlight down the road, but it still gets swallowed by the darkness.\n  \n  \n  \n  \n  \n\"No…way.\" He stops, and you step next to him. A rotten corpse lies at his feet, with an X carved into its skull. He slowly looks at you, then lowers his SMG and begins to kick the corpse's head while he curses heavily, until it falls off. He picks it up and throws it far away, into the darkness.\n\nHe pants and shakes his head. For a couple of moments, you stand there in complete silence. \"Sorry. I—I shouldn't have,\" he mumbles before something hits his back and falls down at his heels. He turns around, and you both look at the skull with the X carved into it. He looks at you. \"Okay. I'm not going to lie. This is pretty scary.\" He raises his SMG and begins to walk in a fast pace backwards. \n\nYou follow him, and you can hear him murmuring something. He keeps on quickening the pace until you have to run after him, then he suddenly stops, and you bump into him and fall down. When you stand up and walk next to him, you see ${survivor1} waving at the small house's door.\n*fake_choice\n #\"${survivor1}! You came back!\"\n  *set Ryan %-2\n  ${survivor2} frowns and holds you back from going to him, then whispers with clenched teeth. \"Something smells fishy here.\"\n  \n  \n \n \n #\"${survivor1}? How could you be here?\"\n  *set Ryan %+2\n  ${survivor2} raises his eyebrows and whispers to you with clenched teeth. \"Exactly. First the field, now this. Something's not right here.\"\n  \n\n\"Hey, boys! It's not safe out there in the dark. Come inside,\" he says and walks into the house. You can see a small light coming out from its windows and doorway. ${survivor2} grips his SMG tighter, and you both follow him inside. ${survivor1} lit a small candle, which sits on the table in the middle of the kitchen. \n\n\"This scenery down here really confused me when I first came here,\" he says, standing next to the trap door. ${survivor2} peeks down the trap door for a couple of seconds, then steps back swiftly, pushing the candle off the table as he gets a hold of the table. \"Whoa, you all right there?\" ${survivor1} picks the candle up and lights it again with a match.\n\nYou take a few steps forward and peek down the trap door too. Your eyes widen as your legs begin to shake, and you fall to your knees at the sight.\n\nSomeone with a long-sleeved shirt and dark red backpack is sitting in a puddle of blood on the ground. He grips a pistol and rocks back and forth as he mumbles and shakes. \"There's no way out. No. Way. Out.\" He suddenly looks at you and crawls towards the trap door, with the ladder missing.\n\nThe left side of his gas mask is ripped off, and he looks directly into your eyes. \"No way out. Or is there?\" He raises his pistol and pushes it hard against his own head. \"One way out.\" He suddenly begins to laugh like a maniac and screams. \"ONE. WAY. OUT!\" He keeps on laughing as he tightens his finger on the trigger, and the corpse next to him does the same, spitting out blood as he does so.\n\nYour back aches as you blink and look up at the dark wooden ceiling. ${survivor2} quickly pulls you up to your feet, and you look down at the broken table. \"${firstname}…\" He shakes your shoulder. \"Are you with me?\" You blink and raise your hand. It feels heavy, and you realize you're holding your pistol in it. You quickly put it in your waistband and try to wipe the tears off your face. It proves to be a hard task through the gas mask.\n*page_break\n\n\"Well, I told you. It's confusing. Let's get home now, shall we?\" ${survivor1} walks towards the doorway and leans against it.\n\n\"What home, exactly?\" ${survivor2} grips his SMG tighter and glances at you. \n\n\"Our home. Come on, don't play stupid.\" He laughs and puts his hands in his pockets.\n\n\"What's the name of it again? I kinda forgot,\" ${survivor2} asks and aims at him. You have to blink swiftly as the darkness flickers, and you catch a glimpse of light every now and then replacing the darkness, until it comes back again as you hear laughter, which is replaced by silence, then laughter from the basement again.\n\n\"Well…that's a real shame.\" ${survivor1} chuckles and looks down, then looks back at ${survivor2} with glowing red eyes and runs towards him. ${survivor2} grips your shirt at your chest, then pushes you to where the fridge was. Your back slams against the wall, and you slide down. The wall covers the sight of ${survivor1}. ${survivor2} fires his SMG, when a huge creature jumps on him, covering him with its whole body. You slowly stand up and walk towards them, then peek over the creature's shoulder at ${survivor2}. \n\n\"Could you…you know, help me roll this thing off?\" He's breathing hard, and you help him push it off. It lands on its back, and you both look on it. It has a weirdly large body and head, and big, dark, and now dead eyes. Several tiny fangs stick out of its mouth. The hand parts end in long, sharp claws that replace the fingers. The sight sends a shiver down your spine. \n\n\"You haven't told me about this one.\" You look at him as he covers the small, bleeding wound on his arm and stands up. \"It's because we hadn't seen this one yet.\" He sighs. The darkness suddenly fades, and you cover the slight sunshine coming in from the window with your palm.\n\n\"It's been sunrise all along?!\" ${survivor2} smashes his fist against the wall and pulls on your hand before he begins to run outside. You're very confused, but you decide to follow him. You can't help but glance back one more time at the creature as you run through the doorway. \n\nThe creatures don't give you much trouble on the way back, as ${survivor2} either kills them or avoids them. You have a hard time keeping up with him, but eventually, you arrive at the base.\n*goto arrived\n\n\n\n*label arrived\n*finish On the run towards ${base}\n", "ch3_2": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Doomsday on Demand[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase adfree $4.99 purchased\n  *delay_break 900\n\n*label purchased\n\nThe sun is already up by the time you arrive. You pant hard as the guard pulls the fence open, and only begin to feel tired when you enter the decontamination chamber. You still have to get used keeping your balance as the air gets sucked out. ${survivor2} steps out of the chamber first and takes the gas mask off. \n*set inform2 true\n\nYou follow him and do the same. It still feels surprisingly nice to take it off. He wipes his forehead as you both walk into the lobby. He puts his SMG and knife on top of the small, rusty iron table and his backpack under it. The table is next to the stairs leading up to ${capturer1}'s office.\n*set nosewound false\n\nYou find another set of scavenger equipment under there. You nod once when you realize it's ${survivor1}'s. You grab the gun from your waistband, take the knife out of your pocket, and put them under the table. A yawn leaves your mouth as you wiggle the backpack off your back and put it next to your gun and knife.\n\n*if Ryan >= 25\n \"I say we call it a day and go to bed. I don't know about you, champ, and I know I'm real tough, but to be honest, I can barely stand right now.\" He smiles and pats you on the back a couple of times.\n *goto ryancont\n \n*else\n \"Let's call it a day and go to bed. This day has been far too long, and you accompanying me didn't help much either. No offense.\" He stretches his arms.\n *goto ryancont\n \n \n*label ryancont\n\n\nYou're about to walk towards the door when ${capturer2} stands in front of you and blocks your way. He shakes his head slightly with his arms crossed, and a slight smile appears on his face. [i]\"You guys are neck deep in trouble right now.\"[/i] He chuckles softly and scratches his large beard.\n\n\"Well, lookie at them! My two favorite scavengers are back!\" ${capturer1} walks down the stairs, stops at the bottom, and smiles.\n*if (ivanliked)\n\n \"And hey, you made it back, kid! I knew you would, just didn't expect you to take all night.\" He chuckles.\n *goto ivancont\n \n*else\n\n \"And even you made it back, kid. What a surprise! You might last a few more days than expected, huh?\" He raises his eyebrows and chuckles.\n *goto ivancont\n\n\n*label ivancont\n\n\n\"Ah, well I suppose you already put the supplies on the iron tab—\" He glances at it, then looks back at you with wide eyes and a grin. \"Correct me if I'm wrong, but that table looks very empty to me. I mean, you've been out for the whole night, using the filters and ammo we so generously gave you. I almost had to send ${capturer2} and his crew after you. Imagine the confusion if they went out to find you, and a bit later you arrived! Hah!\" He laughs, then his face suddenly becomes serious, and he turns his head to you.\n\n\"Which one of you is to blame here? And I want the truth. Now,\" he says looking into your eyes, and you can see ${survivor1} appearing behind them at the doorway. He stops at the sight.\n*label faultchoice\n*fake_choice\n\n #\"It's ${survivor2}'s fault.\"\n  *set ryanblamed true\n  *set Ryan %-8\n  *set Ivan %+8\n  *set Evil %+10\n  \n  \"What?!\" ${survivor2} bursts out. \"It's your fault just as much as it is mine! And ${survivor1} brought supplies back anyway!\"\n  \n  \"That he did. Though I can't say the same about you.\" ${capturer1} steps closer to him and suddenly headbutts him. He falls back on the ground, hard. ${survivor1} and you step towards him, but ${capturer2} pulls out his revolver. [i]\"I wouldn't if I were you. Unless you wanna join the party.[/i]\n  \n  You both stop and watch as ${capturer1} kneels over him to punch him in the face several times, until ${survivor2} lowers his hands. He stands up and kicks his body a few times as he pants. \"You were supposed to show him how to be a good scavenger.\" \n  \n  ${survivor2} lays there with a swollen face, probably passed out. \n  \n  \"Well, justice has been served. Right, kid?\" He takes some deep breaths and throws a wink towards you. \"Oh, by the way. You made ol'
