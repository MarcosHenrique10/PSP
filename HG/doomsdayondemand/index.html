\n*label carldead2\n*page_break\n\nYour legs tremble as if they were about to give up right where you stand. You put your weapon back in the waistband and keep staring at ${capturer2}. Your stomach rumbles as you begin to feel very nauseous and dizzy at the sight. A big lump forms in your throat, making it hard to swallow or even breathe. You try to take some deep breaths and calm your shaking limbs. You take one last look at ${capturer2}. His eyes are wide open, staring at the ceiling. You turn around and walk out of the room, heading towards the door of the chamber. You push it slightly open and peek out. \n\nYou see the two guards in light armour playing cards by the light of their guns' flashlights, laughing away. You slowly pull the door towards you, then grip the handle to shut it. As you close it tight, your palm slides off of the handle, leaving a smeared trail of blood behind. You quietly sneak back to the basement and flip the trap door open. \n\nTaking deep breaths, you climb down and pull the trap door shut. You go through your pockets with shaking hands, then lock the padlock. You climb down steadily and sneak back to your bed in your bloody clothes. Your limbs are trembling under the covers for a while. You can't help but think about what you've done, and how you did it. Even as tired as you are, it takes a while to pass out.\n\n*label carldead3\n*page_break The Following Morning…\n*set Ivan %+15\n\n\n\"He-e-eey! Good morning everyone, how are you? Oh well, awesome, please tell me more about it later. ${firstname}! My kiddo! Get out of bed. Scavenging awaits.\" \n\nYou open your eyes to find a smirking ${capturer1} standing next to your bed. You sit on the edge of your bed and stretch your limbs. You feel very tired and exhausted. You give your eyes a small rub and notice the dried blood on your palms. You see ${leftsurvivor} and ${currentbf} sitting up in their beds. \n\n\"That's quite the mess! Nevertheless, I'm proud of you, kiddo! You've shown which side you stand on and where you belong. Needless to say that if a word of whatever speculation about why my dearest friend ${firstname} is covered in ketchup leaks out, well, I guess neither of you wants to find out what happens then. Am I right? Of course I am. So, chop chop, and get scavenging. And don't forget to do your daily duty after that. Hint hint. But seriously though, get going.\" He looks at you and smirks before he leaves the basement.\n\n${leftsurvivor} jumps out of the bed and follows him, not even looking at you. You slowly get out of bed and head after him. \n\n\"I…what was that about?\" ${currentbf} frowns and looks at you with a confused expression on ${hisher} face. \"What's up with the blood on you?\" \n\nYou climb up the ladder after ${leftsurvivor} and head towards the kitchen door, pretending you didn't hear ${himher}.\n\n*if (deadcarl)\n\n As you open the kitchen door, you find the chambers section completely empty, with all doors closed. You walk through the chambers and enter the lobby, where you see two guards standing in lightweight armour and several others around them.\n\n \"And how come someone got into the chambers and successfully pulled off something like that, hmm?\" ${capturer1} smirks and paces back and forth in front of them. The guards from last night mumble and look at one another. \"Ah, I thought so. Well, as many of you probably know already, my dearest friend, ${capturer2}, was trying to screw me behind my back. So thank you, whoever that person might be.\" He walks around giving a speech, and more guards begin to glance over at you with a suspicious look. They begin to mumble as ${capturer1} continues his speech. \n\n \"So, you might think no harm was done, right?\" He turns to the guards, and both of them force a smile. \"Wrong! You failed to do your simple task. You had one job!\" he says and pulls his pistol out, then swiftly shoots both of them in the head. The crowd goes silent as they bleed on the floor with their eyes wide open. \"Someone clear that up by lunchtime. Anyway, back to work, lads! Demonstration is over!\" He claps a couple of times and heads upstairs. The crowd slowly heads back to their positions, and you find yourself staring at the dead bodies.\n\n \"Two more dead people on your plate because of your stunt. What does it matter amongst all those dead bodies, huh? Very good job,\" ${leftsurvivor} mutters and walks past you.\n *finish\n\n*else\n\n When you open the kitchen door, you find the chambers section completely empty and all doors closed. You walk through the chambers and enter the lobby, where you see a guard standing in lightweight armour with a scared look on his face. Several others are standing around him, staring at him.\n \n \"And how come someone got into the chambers and successfully pulled off something like that, hmm?\" ${capturer1} smirks and paces back and forth in front of him. The guard from last night mutters and looks at the others for support.\n \n \"Ah, I thought so. Well, as many of you probably know already, my dearest friend, ${capturer2}, was trying to screw me behind my back. So thank you for getting rid of him. Whoever that loyal person might be.\" He walks around giving a speech, and more guards begin to glance over at you with a suspicious look. They begin to mumble as ${capturer1} continues his speech.\n\n \"So, you might think no harm was done, right?\" He turns to the guard, who forces a smile. \"Wrong! You failed to do your simple task. You had one job! One single job! And it was to protect the damned base!\" he says and pulls his pistol out, then swiftly shoots him the head. The crowd goes silent as he bleeds on the floor with his eyes wide open. \n \n \"Someone clear that up by lunchtime. Anyway, back to work, lads! Demonstration is over!\" He claps a couple of times, then heads upstairs. The crowd slowly heads back to their positions, and you find yourself staring at the dead body.\n\n \"One more dead person on your plate because of your stunt. What does it matter amongst all those dead bodies, huh? Very good job,\" ${leftsurvivor} mutters and walks past you.\n *finish\n", "ch6": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Doomsday on Demand[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase adfree $4.99 purchased\n  *delay_break 1200\n\n*label purchased\n\n[b][i]Chapter 6 - All Roads Lead to $!{base}[/i][/b]\n\nYou walk down the deserted street in silence. ${leftsurvivor} checks the buildings and vehicles. You keep walking after him, stepping over the scraps and debris. It's hard as it is, and the heavy wind doesn't help. It sends dust flying everywhere, making it harder to see at a distance too. He climbs into the back of a transporter truck without wheels, while you stay outside guarding. \n\nYou see someone walking closer to you in the distance, so you take your pistol out. You aim it at the figure as it gets closer.\n\n\"What's up with you and aiming weapons at me, huh?\" She laughs and gives the top of your head a slight rub, and you lower your pistol.\n*if (swolleneye)\n *set swolleneye false\n \n \"Say, how are your wounds doing? As much as I can see through your mask, the swelling on your eye seems to be going down. Anyway, how are you doing, champ?\" she asks, crossing her arms.\n *goto cont\n \n*else\n\n \"Say, how are you doing, champ?\" she asks, crossing her arms.\n *goto cont\n \n\n*label cont \n\n\"I'll tell you how he's doing. He feels exactly like a cold-blooded murderer. Don't you?\" ${leftsurvivor} jumps out of the back of the truck and dusts himself off. ${survivor3} tilts her head and stands there, confused. \n\n\"Are you out of your mind? What are you even talking about? That wasn't funny, at all.\" She crosses her arms.\n\n\"Oh, yeah? Go on, tell her what happened yesterday. Don't be embarrassed. I bet she'll be thrilled to find out just how well you got rid of ${capturer2}. And make sure you tell her everything. We aren't taking another step until you do.\" ${leftsurvivor} slams the back door of the truck.\n*fake_choice\n\n *selectable_if (killedcarl) #\"I killed ${capturer2}.\"\n  *set Lizzie %-10\n  \n  You tell them everything from the beginning, until the moment you climbed into your bed.\n \n  \"See? I wish I was kidding. But I wasn't.\" He crosses his arms.\n  \n  \"Well…that sounds awful. Though I don't care about any of them at ${base}, I care about you. I know you're better than that…than…to just kill someone. That whole place is clearly a bad influence on you. Just like someone else.\" She glances over at ${leftsurvivor}.\n  \n  \n  \n \n *selectable_if (helpedcarl) #\"I helped ${capturer2} escape.\"\n  *set Ryan %+10\n  *set Malcolm %+10\n  *set Lizzie %+10\n \n  You tell them everything from the beginning, until the moment you climbed into your bed.\n \n  \"Well…that sounds awful. Really. I don't see anything wrong with that, apart from letting a big boss of ${base} escape.\" She glances over at ${leftsurvivor} and crosses her arms.\n  \n  \"I—I didn't know that! He was covered in blood, and I thought…\" he mumbles, spreading his arms wide.\n  \n  \"Maybe you should consider asking rather than accusing him next time. Politely, you know. You might think ${base} is the only bad influence on him around here.\" ${survivor3} gives him a sharp look.\n  \n  \n \n *selectable_if (leftsurvkilledcarl) #\"I convinced ${leftsurvivor} to kill ${capturer2}.\"\n  *set Lizzie %+10\n \n  You tell them everything from the beginning, until the moment you climbed into your bed.\n  \n  \"You made me kill someone, and let the consequences lead to the death of more innocent people.\" He crosses his arms and tells her the story. Your eyes widen at some parts, as you hear how he got rid of ${capturer2} for the first time. It's very detailed, and you have a feeling he's adding a bit to it, just to make it look worse.\n \n  \"Well…that sounds awful. Though I don't care about any of them at ${base}, I care about ${firstname}. So I'm glad you did it yourself. So, that's why I don't understand what your problem is. You should be glad he didn't have to do it. That whole place is clearly a bad influence on him. Just like someone else.\" She glances over at ${leftsurvivor} and crosses her arms.\n\n \n \n #\"I didn't do anything. Honest.\"\n  *set Ryan %-10\n  *set Malcolm %-10\n  \n  You claim that you don't know what he's talking about and keep denying that you had anything to do with ${capturer2}'s death.\n  \n  \"Oh, yeah? Well, guess who made me kill someone? And let the consequences lead to the death of more innocent people? And on top of that, you're lying. I'll tell you what happened.\" He crosses his arms and tells her the story. Your eyes widen at some parts as you hear how he got rid of ${capturer2} for the first time. It's very detailed, and you have a feeling he's adding a bit to it, just to make it look worse.\n  \n  \"Well, that's a great story there. I'll keep believing ${firstname}, though. If you wanted to get rid of a boss of ${base}, just say so. You don't have to pass the blame onto him. Clearly, you and that place are bad influences on him.\" She crosses her arms and glances over at ${leftsurvivor}.\n \n \n \n\n\n${leftsurvivor} mutters and slams the truck's back door loudly before he heads down the road. ${survivor3} looks at you. \n\n\"What's up with your '${leftsurvtoldtobe}?' I'm getting tired of his whining.\" She shakes her head and pats you on the back. You head after him down the sloping road surrounded by demolished buildings and trees, in the slight sandstorm. You have to watch out not to lose sight of him, but he doesn't slow his pace.\n\n\"I'm actually glad we got to talk alone for a bit. You know, I care about you, ${firstname}. And…I know you're not like…them. No matter what, don't let them change you, okay?\" She gives your back a few light pats.\n\n*if (lizziebase)\n\n \"There's another reason I wanted to talk with you…since our last time, I've been pushing the folks back at base about you moving there. I told them how it would be better for everyone, and how their research is making great progress. Which is, for the record, true. And guess what? They said yes! Isn't that awesome? Like, you could even move tomorrow. How to do it is a whole different question, but we'll do it. \n *label acceptedbase\n \n \"I had and will have to endure a lot for this, but it was worth it. I'll also have to vouch for you, but I know that's no problem. And what's even better is, they're talking about doing some breakthrough research! Isn't that amazing? All the hard work finally paying off!\" She giggles and wraps an arm around you to give you a tight hug. \n \n You think about what life would be like in a calm environment with food, water, and even television. Away from all the problems and ${capturer1}'s unpredictable behavior. A wide smile appears on your face just from the thought, and ${survivor3}'s tight grip on your shoulder feels reassuring too. You follow ${leftsurvivor} in the slight sandstorm, already thinking about the new life you'll soon begin.\n *goto cont3\n \n*else\n\n \"There's another reason I wanted to talk with you. Since you refused my offer to move into the base with me, which would obviously be a lot better for you, I've been wondering…do you enjoy this lifestyle? The constant danger? Or do you just enjoy…${base}, and ${capturer1} in general? Do you want to become like him? Yes, I know what he's like. Do you like the way things are in there? Don't you wish for a better life? \n \n \"I'm asking this because despite what you said, I've been pushing the folks back at base about you moving there. I told them how it would be better for everyone, and how their research is making great progress, which is, for the record, true. And guess what? They said yes! Isn't that awesome? Like, you could even move tomorrow. How to do it is a whole different question, but we'll do it. If you want to, that is. It's fine if you don't though, but it would be better for you. Trust me. So…we've had this conversation before. And I'm afraid of the answer, so don't keep me waiting. What do you say? Do you want to be part of the base?\"\n \n \n *choice\n \n  #\"Yes.\"\n   \"Thank god! I was expecting a no! You don't know how happy you just made me! \n   \n   She pats you on the back a couple of times, then gives it a small rub. You walk in silence after ${leftsurvivor} in the slight sandstorm.\n   *goto acceptedbase\n  \n  #\"Still no.\"\n   \"I see…well, that didn't surprise me too much. I was still hoping for a different answer, though. Oh, well…no hard feelings. I don't understand your decision, but I'll accept it. I just…hope you know what you're doing. And you should hope for the same.\"\n   \n   She pats you on the back a couple of times, then gives it a small rub. You walk in silence after ${leftsurvivor} in the slight sandstorm.\n   *goto cont3\n \n \n \n*label cont3\n*page_break\nYou reach a truck turned on its side with its tires missing in the intensifying sandstorm, and you see ${leftsurvivor} crouching behind it. He looks at you and motions to do the same. Both of you quickly kneel next to him and peek over.\n\n\"Damn Aviatrixes. They're blocking the way. And there's no way I'm turning around. How about we all just take our pistols out and lay waste to them?\" ${leftsurvivor} says angrily, and you peek over to see a small pack of three Aviatrixes ripping apart the corpse of a huge, skinless creature.\n\n\"That wouldn't be wise. We should approach them carefully and silently. I just don't know how yet, but we'll figure that out, if you let me think for a second.\" ${survivor3} looks at him, and they just stare at each other.\n\n\"And how do you imagine doing that, huh? Want to sneak behind them? Go ahead and try it. I dare you. Maybe it would be for the best.\" ${leftsurvivor} clenches his fists.\n\n\"I told you to give me a damn second to think it over! You would like to see me dead, wouldn't you? Well, you can see all of us dead if we go with your stupid idea.\" She shakes her head and clenches her fists. \n\nThey keep arguing, and they end up getting louder and louder. You peek over to see one of the big ray-like creatures turning its head towards you and slowly beginning to hop closer. You glance from ${leftsurvivor} to ${survivor3}. They keep throwing words and pointing at each other. In the distance, you see the creature hopping closer and closer, until you can totally make it out in the moderate sandstorm.\n*choice\n\n #Warn ${leftsurvivor} and start shooting at them.\n  *set Ryan %+10\n  *set Malcolm %+10\n  *set Lizzie %-10\n  \n  \"They're coming!\" you say, already taking your pistol out, and you start shooting at them. You hit the one approaching in the head, and it falls to the ground. It twitches a little with a loud, horrifying combination of screaming and whining. ${leftsurvivor} rips his pistol out and begins pulling the trigger rapidly. ${survivor3} steps back and shakes her head at you, then takes her pistol out and carefully aims down the sight. She pulls the trigger a couple of times. \n  \n  You see bullets flying, and your ear already hurts from the sound. You see them hopping and flying closer, but they fall to the ground. One of them pushes itself off the ground and flies away. Its wound is bleeding heavily, so it leaves a trail of blood where it flies. You stop shooting and hear the two remaining on the ground screaming heavily as they twitch. They scream so hard that your ears ring. When they stop moving and screaming, you hear a couple of howls and screams similar to them.\n  \n  \"That's exactly why I wanted to do this quietly. Now more of…everything will come. Nice job…both of you,\" she says and gives you a sharp look, then turns on her heels and walks towards the corpses. \"Let's go, quick. We can't stay here,\" she mutters and heads out of the cover of the truck to walk towards the corpses. \n  \n  \"Don't mind her. You did well. We showed them who's boss and saved some precious time. Let's go.\" ${leftsurvivor} pats you on the back, and you head after her to catch up.\n  *goto aviatrix\n  \n \n #Carefully attach the silencer and kill the one approaching.\n  *set Ryan %-10\n  *set Malcolm %-10\n  *set Lizzie %+10\n  \n  As they keep arguing, you take your pistol and silencer out. You keep looking at the creature as you quietly roll the silencer onto your pistol. After carefully lining up the sight, you aim between its eyes. You hold your breath for a second, then pull the trigger twice, sending the creature down to the ground. It twitches a little, sending blood everywhere, but stops moving soon after.\n  \n  ${leftsurvivor} looks at you sharply, and ${survivor3} chuckles before she gives the top of your head a slight rub. \"That's exactly what I meant by doing it silently. And that's exactly why.\" She points at the remaining two, still feasting. \"Kill them. You can do it without any problem.\"\n\n  ${survivor3} crosses her arms, and you aim down the sight with a bit of excitement. You pull the trigger twice, sending the other one to the ground too, with two bullets straight into its head. The other one jumps back and pushes itself up into the air. It flies towards you as it flicks its sharp tail left and right. You aim your pistol at it and pull the trigger a couple of times. Blood splatters, and it crashes into the truck, dead.\n  \n  \"Yeah…well, my plan would have worked out just fine,\" ${leftsurvivor} mutters and heads out from the cover of the truck to walk towards the corpses. \n  \n  \"Don't mind grumpy him. You did well. We avoided more unwanted attention. Let's roll.\" ${survivor3} pats you on the back, and you head after him to catch up.\n  *goto aviatrix\n  \n  \n*label aviatrix\n\nYou keep walking through the intensifying sandstorm until you can barely see each other. The wind is blowing so hard that you have to focus on staying upright. \n\n\"All right, screw this, let's go back!\" ${leftsurvivor} shouts and turns around in the sandstorm. He walks forward with his pistol ready in his hand, and ${survivor3} slows down until you get next to her.\n\n*if (lizziebase)\n\n \"All right, so I don't know how much stuff you have besides what's in your backpack, but pack it and be ready tomorrow. I wish we could just abandon ${leftsurvivor} and head to the base now, but I still have to talk some things over with them. Don't tell this to anyone, okay? And if you want to say goodbye to someone, well…I'd advise you to think twice about it, and do it before you leave tomorrow morning. So, tomorrow! I'm looking forward to it. Catch up to your '${leftsurvtoldtobe}.' I don't want to find my way home alone when this sandstorm unfolds. Take care.\" She rubs the back of your head and runs off to the right.\n *goto cont5\n \n*else\n\n \"All right, I'll take my leave now. I don't want to have to find my way home in the unfolding sandstorm. I still wish I could convince you to think it over, but…I'm not going to push you. See you tomorrow, ${firstname}. Take care. I mean it. And good luck. You're going to need it at a place like ${base}.\" She rubs the back of your head and runs off to the right.\n *goto cont5\n\n\n\n*label cont5\n*page_break\n\nYou catch up to ${leftsurvivor}, and he grabs your arm. He drags you through the streets in the heavy sandstorm. You don't know long you've been running for, but your lungs burn from tiredness. You're glad to be able to finally slow down when they open the fence. \n\n\"You do realize we ran…for miles, right? I'm pretty proud of you right now.\" ${leftsurvivor} pats you on the back as you lean down and pant heavily in the decontamination chamber. You step out, walk to the usual table, and put your gear where it belongs, still breathing heavily. \n\n\"Back so soon? Hope it's because your backpacks are full of goodies.\" ${capturer1} walks down the stairs and crosses his arms.\n\n\"There's a sandstorm brewing out there. You can't expect us to scavenge in that!\" ${leftsurvivor} walks towards the door, and you head after him.\n\n\"This is the second time you've spoken to me without my permission. And you don't go around telling me what to expect. Do you have to be taught a lesson here? You…someone.\"\n  \n\"${leftsurvivor}. It's ${leftsurvivor}…\" He shakes his head slightly.\n\n\"Don't expect me to act like I care. Because I don't. Frankly, I've already forgotten it. No dinner for you, and thank me for my generosity for not shooting you where you stand. It's mainly because I'd have to find some real scavengers, now that poor old ${capturer2} is dead. Anyway, ${firstname}, into my office,\" he says and walks up the stairs. \n\n${leftsurvivor} looks at you, then opens the door and walks through it. You walk up the stairs into his office to find him already sitting in his armchair with his legs on the table. You sit down on the other side, in the chair you've sat in so many times already.\n*page_break\n\n\"What can a man say to a job well done, huh? I'm impressed, kiddo, really. I had my doubts, but you've done it. And scored better than my expectations, which are, to be honest, very high. People suspect it was you, though. Word's going around about that. Oh, well…I thought I'd find your corpse somewhere in the morning, but hey, you didn't die. That's something now, isn't it? That's why I've decided to move on with my plan. Sooner than expected. Now that good old ${capturer2} is dead and out of the way, I can choose a new trustworthy underboss. But who's it going to be? That's for the future to tell, isn't it?\" He grins and takes out the familiar bottle, which barely has any brown liquid remaining in it.\n\n\"Hand me the silencer.\" He takes a sip as you roll it to him over the table. He flips his knife out and crosses the number off. He carves something into it, then rolls it back to you. You lift it up and read '${firstname} - 1'. It uncontrollably draws a small smile to your face, and you put it in your pocket.\n\n\"As promised. So! Onwards with my plan,\" he says and takes another sip.\n\n*if (report1)\n\n \"The military base you told me about the first time. We'll start with that. It won't be easy, but I know their weaknesses by now. Just imagine having access to all that military-grade equipment. After we take control of them, there's no way to stop our expansion. Just don't get flashbacks from 'nam when we get there.\" He takes a small sip and grins wide.\n *goto ivan\n*else\n *goto ivan\n \n*label ivan\n\n\n*if (report2 = true) and (report3 = false)\n\n \"You know that scientist girl you mentioned? We'll find her and have her lead us to their base. We'll ask her nicely, or something. Their research and all that nerdy stuff might prove useful. And hey, if we get to enslave them—sorry, I meant to say befriend them, they could do all the scientist tricky bricky for us. That's even better.\" He spins the bottle around and smiles. \n *goto ivan2\n \n*elseif (report2 = true) and (report3 = true)\n\n \"You know, that scientist base has been in the back of my mind. You've been there. So obviously, you'll lead us there. And if you can't, well, I'll be very disappointed, but we'll find it. We have to. Their research and all that nerdy stuff might prove useful. And hey, if we get to enslave them—sorry, I meant to say befriend them, they could do all the scientist tricky bricky for us. That's even better.\" He spins the bottle around and smiles. \n *goto ivan2\n*else\n *goto ivan2\n \n*label ivan2\n\n*if (report4)\n \"Now, about that mansion you mentioned. If it's really full of loot and is intact, we have to get ahold of it. And we will. Before someone else does. I mean, we could still take it by force, of course, but it would just make things harder.\" He rubs his chin with a wide grin.\n *goto ivan3\n*else\n *goto ivan3\n \n \n*label ivan3\n*if reportedtimes = 4\n \n \"So, that's the plan in a nutshell. You've been a good kid and informed me about everything, just as I expected you to. You know, I have a lot of things to think about now. There's this open position as my underboss, and I'll have to dominate the whole district. Hey, you might say it's too much for a humble man like me, but it's not. Tomorrow is a big day for us.\" He takes a big sip from the bottle, then slams it on the table. \"Dismissed.\"\n *goto ivan4\n\n*elseif reportedtimes \u003c= 3\n \n \n \"So, that's the plan in a nutshell. Apart from taking control of the whole district, of course. We have many things to do, kiddo. You know, I have a lot of things to think about now. There's this open position as my underboss, I have to take control of the district—you know, things like that. Tomorrow, kiddo. Tomorrow is a big day for us.\" He takes a big sip from the bottle, then slams it on the table. \"Dismissed.\"\n *goto ivan4\n \n*elseif reportedtimes = 0\n\n \"We unleash hell on the whole district. Take everything by force. March through the streets. Take control of everything and enslave anyone we see. If they're fit to be soldiers, they get to be soldiers; if they're fit to work inside, they'll do that. But if they don't fit anywhere…oh well, that's tough luck for them I guess. You know, I have a lot of things to think about now. There's this open position as my underboss, I have to properly take control of the whole district—you know, things like that. Mark my words, kiddo, tomorrow is a big day for us.\" \n \n He takes a big sip from the bottle, then slams it on the table. \"Dismissed.\"\n *goto ivan4\n \n \n \n \n \n \n*label ivan4\n\nYou stand up to take your leave. \"Hey. Key.\" He points at the table. You stand there confused for a second, then take the basement trap door key out of your pocket and put it on the table. \"Good.\" He grins as you leave. \n\nYou walk through the lobby and the kitchen to the trap door. For a moment, you expect to see ${capturer2} standing there. Instead, you find a new guard in light armour standing there, holding a small pistol. It looks smaller than yours, and he looks very nervous, maybe even scared.\n\n\"Down you go. Don't make me ask again.\" He rubs the side of the small pistol in his hand with his fingers. You look at him one more time. He doesn't convince you, but you still climb down the ladder. He slams the trap door shut after you, then locks it. When you reach the bottom of the ladder, you turn around to find ${currentbf} and ${leftsurvivor} sitting on the dirty couch, whispering heavily. They suddenly go silent when they notice you.\n\n\"Oh, hey. You're back already.\" ${currentbf} fakes a smile and stuffs a piece of paper into ${hisher} pocket. \"We didn't expect you back so soon. Is everything fine?\" ${currentbf} keeps ${hisher} hands in ${hisher} pockets, still smiling. ${leftsurvivor} nods and stuffs something in his own pocket, then walks to his bed, where he sits down. They both keep looking at you.\n*page_break\n  \n\"All right, I can't do this anymore.\" ${currentbf} lights a small candle and puts it down in front of the couch. It barely lights the nearby wall. ${currentbf} pats the couch next to ${himher}, and you sit down. \n\n\"${currentbf}…\" ${leftsurvivor} glances over at you, then lays back down on his bed and just stares at the two of you. \n \n\"So…\" ${currentbf} scratches ${hisher} head and glances at ${leftsurvivor}. \"I know I'm supposed to keep this a secret, but…I've known ${firstname} since the beginning of everything. I can trust him without any problem, I know it. I bet he wants to get out too.\" ${currentbf} turns back to you and takes the small paper out of his pocket. \n \n\"Remember when we talked, and I said it's close? Well…it's happening. And we're doing it tomorrow. We—we have a plan. I mean, it's mostly ${leftsurvivor}'s plan, but I helped with some parts. \n\n*if (bfpromise)\n \"And there's no way I'm leaving you behind, 'cause you promised you would come with me, and I know you didn't change one bit. You're still my best friend,\" ${currentbf} says excitedly and keeps rubbing ${hisher} arms. \n \n \"We were a bit worried that you might be with…them. I mean, you've spent a lot of time with ${capturer1}, but I know you didn't change, so…we're doing it tomorrow. The plan is on this paper. Are you still with us?\" ${currentbf} smiles but breathes fast and chews on ${hisher} lip.\n *goto choicecont\n\n *else\n  \"And there's no way I'm leaving you behind. I know what you said last time, but you might have changed your mind since then. I'm hoping that, at least. I don't know how you feel, but you're still my best friend,\" ${currentbf} says excitedly and keeps rubbing ${hisher} arms. \n  \n  \"We are a bit worried that you might be with…them. I mean, you've spent a lots of time with ${capturer1} and all that. That's why we didn't discuss anything about the plan with you, but…I just couldn't leave without talking with you. I'm hoping you didn't change a bit. So…we're doing it tomorrow. The plan is on this paper. Are you with us? Please be with us.\" ${currentbf} breathes fast and chews ${hisher} lip.\n  *goto choicecont\n \n \n*label choicecont\n*choice\n  \n #\"Sure, I'm in.\"\n  *set endleftsurv true\n  *set Ryan %+15\n  *set Malcolm %+15\n  \n  \"I knew it!\" ${currentbf} wraps his arms around you all of a sudden, squeezing you tighter than ${heshe} intended to. ${currentbf} pulls away a couple of seconds later and scratches ${hisher} head. \"Sorry. I'm just so happy now! We can leave all this behind, all of us, together. So, the plan.\" After clearing ${hisher} throat, ${heshe} lays the piece of paper between you and ${himher}. \n   \n  \"So, we do it tomorrow. ${leftsurvivor} said the security isn't like it was before, with this new guard. So now we have a chance to get out. He bribed him with…I don't know, a mag or something. I don't remember.\" ${currentbf} clears ${hisher} throat.\n\n  \"It wasn't hard…especially after last night.\" ${leftsurvivor} walks to the couch and stops in front if you with crossed arms. He gives you a sharp look but smiles slightly. \"So I bribed him. His only term was to bring him with us. So, we go out scavenging as usual, but he'll leave the trap door open and wait for us in the kitchen. We either put our gear down, or we don't. That doesn't matter, but we get ${currentbf} out. After that comes the hard part. Since all the windows are reinforced and probably bulletproof, with the only way out being through the front, we'll probably have to shoot our way out.\" He smiles.\n\n  \"That's where you would come in handy. I've been teaching ${currentbf} how to, but ${heshe} obviously can't shoot until ${heshe} practices it. Alternatively, we could sneak our way out, as it'll probably be close to dusk, but that would be really hard. Though a lot less risky. We'll improvise there. After that's done, we'll head to that mansion we found before, pack our backpacks full of loot, and find a way to leave this district. I have some ideas about that too, but we'll talk that through when we're at that point. Hopefully, soon enough. So, you guys get ready for tomorrow. Because we will do it. Get some rest, because it won't be easy. And I'm glad you're with us after all. It's good to have a reliable gunner watching your back.\" He gives ${currentbf} and you a couple of small pats on the back and walks back to his bed.\n  \n  \"There's…something else, though.\" ${currentbf} turns to you with a worried look on ${hisher} face. \"We have to leave ${leftalonebf}. That section is guarded by different guards, and it would take a lot more risk to get there. We'd have to break the lock and all that. It makes me really sad, but ${leftsurvivor} said we can't take that risk.\" ${currentbf} looks over to ${leftsurvivor}. \n  \n  \"Anyway, let's sleep.\" ${currentbf} blows the candle out, then walks to ${hisher} bed and lies in it. \"Good night.\" ${currentbf} turns onto ${hisher} side and leaves you in complete darkness. You sit there, thinking for a couple of minutes about everything that's been said. You could get to leave ${base} sooner than expected. You even have a slight hope for a good life now. Eventually, you get up and climb into bed. You turn onto your side and try to fall asleep, but it's difficult. Nevertheless, it doesn't take long.\n  *goto choicecont2\n  \n  \n #\"No. ${base} is where I belong now.\"\n  *set Ryan %-15\n  *set Malcolm %-15\n\n  *if (bfpromise)\n   \"I…you lied to me. When I was at my most desperate, you lied to my face…\" ${currentbf} frowns and keeps looking at you as ${heshe} breathes harder.\n   *goto refusedcont\n\t\n  *else\n   \"I…I wasn't hoping for that answer. I was really hoping that you'd changed since the last time we spoke, but…you're just out of your mind.\" ${currentbf} frowns and keeps looking at you as ${heshe} breathes harder.\n   *goto refusedcont\n   \n   \n *selectable_if (lizziebase) #\"I'll leave with ${survivor3}.\"\n  *set Ryan %-15\n  *set Malcolm %-15\n  *if (bfpromise)\n   \"I…you lied to me. When I was at my most desperate, you lied to my face…and you'll leave with someone you just met!\" ${currentbf} frowns and keeps looking at you as ${heshe} breathes harder.\n   *goto refusedcont\n  \n  *else\n   \"I…I was hoping that you'd changed since the last time we spoke. You say no to leaving with us, with me, but you say yes to a random girl you met only a couple of days ago! ${currentbf} shakes ${hisher} head and breathes faster, ${hisher} eyes wet.\n   *goto refusedcont\n  \n   \n   \n*label refusedcont\n*if Currentbf = \"Bradley\"\n *set Bradley %-15\n *goto refusedcont2\n \n*else\n *Set Abbie %-15\n *goto refusedcont2\n \n \n*label refusedcont2\n\n\n\"I trust you won't do anything to sabotage our plan, right? Because I won't allow you to.\" ${leftsurvivor} walks up to the couch and stops in front if you with crossed arms. He gives you a sharp look.\n   \n\"I won't tell anything to you…ever.\" ${currentbf} stands up and keeps looking at you, eyes wet. He shakes ${hisher} head and kicks the candle away, extinguishing it. After releasing a large sigh, ${heshe} climbs into ${hisher} bed and rolls onto ${hisher} side, showing ${hisher} back to you. You hear footsteps, then ${leftsurvivor} climbs into his own bed. \n\n\"Don't cross us. Take this both as friendly advice and as a warning. You've clearly stated where you've always belonged, ${firstname}. So take this advice now. Night,\" he says and pulls the cover up.\n   \nYou sit there, thinking for a couple of minutes about the following day and everything that's been said, then you get up to climb into bed. You turn onto your side. You have trouble falling asleep, but eventually you do anyway.\n*goto choicecont2\n   \n   \n   \n   \n   \n   \n*label choicecont2\n*page_break\n\n*if (wackwound)\n You wake up and stand up in the dark moonlight. Blood has been splashed under your bare feet. You're seeing the world from a weird perspective now, as if you've grown taller. Your insides itch, and a weird craving to hold something sharp takes hold of you. You growl, smash the window of the nearby house in, and hold up a sharp piece of glass. \n \n \"Daddy?\" A little girl peeks from a wooden door, slightly open, with tears rolling down her cheeks.\n \n You turn around as pieces of your melting skin flop on the ground every now and then. You grin wide and growl. You grip the sharp glass tightly, sinking the sides of it deep into your hand as you raise it and begin to walk towards her with hunger filling your body.\n *goto awaken\n \n*else\n You open your eyes to see darkness surrounding you. You climb out of the swamp, pushing a sign away. It went easy, as if you grew in size and also an extra pair of limbs. Your insides itch, and the saliva dripping from your mouth corrodes through the sign. \n \n \"Mommy?\" A little girl peeks out of a wooden door, showing her back to you.\n \n You look into the distance to see the woman lying on the ground, a large pool of blood underneath her. You turn back to the little girl and growl slightly. You begin to climb closer to her. Your stomach rumbles as you collect saliva in your mouth, ready to spit.\n *goto awaken\n\n \n*label awaken\n*page_break\n\nThe following morning, you do your usual routine. As you climb out of bed, a weird feeling strikes you. This day is like any other, except that something feels very different. You can't quite put your finger on it, but you have a feeling that this day might not like the previous ones. It might be the result of recent events. \n\nYou shrug once and shake it off. You walk through the lobby and get your gear with ${leftsurvivor}. ${capturer1} is standing at the bottom of the stairs with a wide smirk on his face. He gives you a wink before you leave.\n\nYou keep walking down the road in the slight sandstorm. You're so deep in your thoughts, you only realize you've been walking down the same road as yesterday when you see ${survivor3} walking towards you. She stops in front of you and crosses her arms. \n\n\"What? No gun pointed at me? I'm disappointed!\" She chuckles.\n\n\"We can help that, if you want.\" ${leftsurvivor} shakes his head slightly.\n\n\"I'd be more worried about the sandstorm brewing already.\" She crosses her arms.\n\n\"It's nothing. You can go, we'll keep moving.\" ${leftsurvivor} pushes past her, and you both follow him. The wind is blowing very loudly, and you begin to see less and less of where you're going.\n\n*if (Lizziebase)\n \"So…today is our big day. When do you want to do it? I say we should do it when he wants to go back to ${base}. We could even escort him for a while. Then, I don't know about you, but I'll be a lot happier.\" She chuckles.\n *goto cont6\n \n*else\n \"So…today could have been our big day. But I'm done feeling bad about that. You've decided, and I'll respect your decision. I just hope we can see each other until…one of us leaves. And I think it'll be me, as our research is going well.\" She sighs.\n *goto cont6\n \n\n*label cont6\n\nYou keep pushing through the sandstorm. It feels harder and harder to push against the wind in the already heavy sandstorm, which now makes it difficult even to see ${survivor3} next to you. You bump into ${leftsurvivor} and stand next to him. He keeps staring into the sandstorm with eyes wide. You stretch out your arms. The sandstorm is so heavy, you can't even see your outstretched hands in it. You look forward to where ${leftsurvivor} seems to be looking, and suddenly you see through the sandstorm as if an invisible tunnel was in front of you. \n\nAt the end of it, four figures seem to be approaching. As they get closer, you make out a little wounded boy, a girl with heavy cut wounds all over her, and a couple which looks weirdly familiar to you. They get closer and closer until you recognize the couple in front of you. Your jaw drops when you realize they're your parents. They're wearing bloody, ripped clothes and have gunshot and cut wounds all over them.\n\nThey come closer, dragging a trail of blood behind themselves. Your eyes get wet as your parents shake their heads as if they're disappointed. \n\n\"Tiff…\" ${leftsurvivor} clenches his fists and takes a couple of steps closer. You want to look away, but you just can't. They keep looking into your eyes, and then open their arms wide. \n\nUncontrollably, you take a couple of steps closer. It feels soothing to finally see your parents. You think about how everything will change, now that you're together again.\n*page_break\n\nA gunshot breaks the moment, and you see the younger girl falling to the ground. After a couple more gunshots, you see all of them falling down. The sandstorm buries them, taking the invisible tunnel with it. \n\nYou find yourself standing in the heavy sandstorm, barely able to make out ${survivor3} putting her gun away with shaking hands. \"Not again…\" She shakes slightly and puts her hand over her face to cover it from the unbearable sandstorm.\n\nYou catch a glimpse of ${leftsurvivor} turning around and hear him shouting. A second later, you see both of them falling to the ground. You force yourself closer to them and find ${leftsurvivor} kneeling over ${survivor3} with his hands around her throat. \n\n\"YOU KILLED HER!\" he shouts, tightening the grip on her throat. She struggles and tries to pry his fingers off.\n\n\"Get…ahold of yourself…idiot. They were…illusions!\" She chokes and tries to push him off with her hands and legs. You hear loud growling and screaming sounds coming closer, both from the ground and the sky. You realize they might be mutants, also trying to escape from the sandstorm and coming right your way.\n*fake_choice\t\n\n #\"We have to go!\"\n  *set leftsurvstabbed true\n  \"We have to go! They're coming!\" you shout and hope they could hear it in the sandstorm. ${survivor3} glances at you, but ${leftsurvivor} just tightens his grip. ${survivor3} punches him in the face a couple of times, but he keeps squeezing her throat. She clenches her fists and reaches back.\n\n  A second later, she sinks a knife deep into his arm. He screams in pain and releases her throat. She yanks the knife out and kicks him off her, then jumps up. She gives him a couple of hard kicks to the stomach. He lies on the ground, bleeding and coughing.\n  \n  \"You damned idiot!\" She holsters her knife and grabs your arm, then starts running from the growling sounds.\n \n #Help ${survivor3}.\n  *set Lizzie %+10\n  You jump behind ${leftsurvivor} to wrap your arm around his neck and head. You begin to pull him back, off of ${survivor3}. He doesn't move, but the grip on her throat seems to loosen. She clenches her fists and punches him in the ribs a couple of times as hard as she can. ${leftsurvivor} falls off her and onto the ground, breathing hard, and you fall next to him. ${survivor3} coughs heavily and jumps up.\n  \n  \"You damned idiot!\" She gives him a couple of hard kicks to the stomach. He lies on the ground and coughs hard as he gasps for air. She roughly pulls you up to your feet. \"Thanks, champ,\" she mutters and grabs your arm tight, then starts running from the noises.\n  \n*page_break\nYou keep running in the heavy sandstorm and have to be careful not to fall or let the wind push you down. You don't know whether it's the recent running or the adrenaline in your body, but you don't have any trouble keeping up with her. You still slip every now and then, as you can barely see anything. You only hope the figure you see in front of you is really ${survivor3}. \n\nIt turns out you were right when you bump into her from behind, sending both of you slamming hard against a fence. You're about to apologize when you feel a pair of hands wrapping tightly around your back and neck. You see ${survivor3} being trapped the same way. You get pushed like this through an open fence. The sandstorm is unbearable, and the way you're being held in a lock without being able to use your hands feels very uncomfortable. You're somewhat glad when you see a door opening. You walk in, and now you can finally see each other.\n\nThe place looks dangerously close to the decontamination chamber back in ${base}. ${survivor3} looks at you, then looks down with a worried look on her face. You get dragged out of the decontamination chamber, and you're shocked to find ${capturer1} standing in the middle of the lobby with crossed arms.\n\n\"Well now, am I surprised to see you, ${firstname}. I'm damn sure that's not…whoever that other guy is.\" He grins and tilts his head slightly. \"Unless he went through some drastic changes. Very drastic changes.\" He laughs and crosses his arms. \"Take the masks off.\"\n\nThe guard behind you releases you from the lock and takes your gas mask off. He pats your body and limbs for any weapons but doesn't touch the gun at your waistband. Despite the situation, you're glad to be free. The other guard on your right holding ${survivor3} does the same with her, then throws her pistol on the small, rusty table by the stairs. She rubs her neck and arms when she's released. She mutters, then looks at ${capturer1} angrily. \n\n${capturer1} is just about to speak when you hear the decontamination chamber's doors sliding open. You glance back to see ${leftsurvivor} getting dragged in the same way you were. When they stop between you and ${survivor3}, the guard releases him and takes his gas mask off. He throws his pistol on the table, too. ${leftsurvivor} looks from you to ${survivor3}, then to ${capturer1}. The three armed guards behind you feels very uncomfortable.\n*page_break\n\n\"Isn't it good to see you! Whatever your name might be. And don't tell it again. I couldn't care less. One must wonder, how did you end up with someone like her?\" He points to ${survivor3}, then lowers his arm with a grin.\n*if (report2)\n *set Lizzie %-15\n *set Ryan %-15\n *set Malcolm %-15\n \n \"Is this the scientist girl you've been talking about, ${firstname}? You've finally brought her to me!\" ${capturer1} chuckles.\n\n ${leftsurvivor} and ${survivor3} both look at you, one giving you an angrier look than the other.\n *goto capturedcont \n \n*else\n *set Ivan %-10\n \n \"You've got some explaining to do, ${firstname} and…other dude. Like, who are you making friends with out there? In the time you should have been getting supplies for us, you go out to sip tea and chat the day away? Also, you didn't mention her in any of your reports, ${firstname}. That's disappointing. Truly.\" He shakes his head.\n \n ${leftsurvivor} and ${survivor3} both look at you, one giving you a more suspicious look than the other.\n *goto capturedcont\n \n*label capturedcont\n\n\"For a moment, though, I thought I recognized her. There was a woman like you around here once. But she tried to rebel. Then somehow escaped. She had a little brother too, if I recall correctly. One must wonder what happened to them. Especially the brother.\" ${capturer1} grins, and you see ${survivor3}'s face getting more and more red as she clenches her fists and teeth.\n\n\"So, you might wonder what's going to happen now,\" ${capturer1} continues. \"Well, obviously, you'll explain yourselves. Very, very, detailed. And then you'll join our crew!\" He points to ${survivor3} with a smirk. \"We'll find some good work for you…something fun, and obviously not dangerous at all. You'll fit in well with the other slaves.\" He claps once.\n\n\"I'd rather die,\" she says and lifts her left knee up. She takes a small handgun out from the shaft of her boot, then cocks it and aims it at ${capturer1}. She takes a few steps closer, and the three guards behind you raise their pistols, aiming them at her.\n*page_break\n\n\"Well…what an unpleasant turn of events. I thought these imbeciles I employ as guards checked you for any hidden weapons. I'm disappointed to see they are this incompetent.\" ${capturer1} shrugs a little and puts his hands in his pockets, still smirking. He looks at the guard on the left and nods once. The guard nods too, then turns to the one in the middle, then puts a bullet through his head. \n\n\"Now that that's done, back to the topic at hand. Your wish to die might become a reality sooner than you would expect. Just keep aiming that…whatever that might really be. Look, look, it's so tiny. Does it, like, you know, shoot real bullets or something?\" He chuckles.\n\n\"Wanna find out? You and your base…you ruin and corrupt everything and everyone! You…mentally deranged freak! You should get what you deserve!\" She grips the handle tighter.\n\n\"Thanks for the compliments, lassie. All right!\" He tilts his head and turns to you. \"I promote you to my underboss for handling the little incident with ${capturer2}. The mess you made back there just made me tingle. Now, what I want you to do is, draw your gun, gently aim it at her, and do the same. All right? And I know you have a pistol on you. Don't bother lying.\" He takes his hands out of his pockets and tugs the sleeves up, revealing his forearms. Both of them are covered in tattoos. He smirks, then puts his hands behind his back.\n\n\"What?! He'll obviously help me! If you really do have a gun, help me!\" ${survivor3} glances at you and grips the handle tighter. She looks around nervously, then wipes the sweat off her forehead with the sleeve of her jacket.\n\n\"That's for him to decide. Isn't it? ${firstname}, my new underboss. My wingman. My right hand. Just imagine all the great many things we could do together. The whole district under [b]our[/b] command. Then, we slowly begin our expansion to control all three districts. Imagine the life we could have, kiddo.\" He grins and shrugs a little. \"Do what you have to.\"\n\n*if (goal = \"murder\")\n\n \"Do you remember what you told me about your goal? Now's your chance, ${firstname}…\"\n *goto cont7\n \n*else\n\n \"And we both know what you have to do…\" \n *goto cont7\n \n*label cont7\n\n${leftsurvivor} nods and looks back at the guards holding their pistols, then at the corpse bleeding out in between them.\n\nYour heartbeat quickens as the whole room fills with tension. You feel the most nervous you've ever felt. You grip the handle of the pistol carefully and take a deep breath. You give everyone in the room a look, then pull the pistol out. \n\nYou lower your hand and let it point at the floor for a second as your heart throbs in your throat. You're sweating so bad that it feels like you're in hell. You know that everything that's about to happen is very serious, and entirely up to you. Your hands begin to shake, and you take one more deep breath.\n*choice\n \n #Aim at ${capturer1}.\n  *set Ivan %-50\n  *set Ryan %+20\n  *set Malcolm %+20\n  *set Lizzie %+20\n  *set Ivandead true\n  *set Evil %-15\n  You raise the pistol and aim it at ${capturer1} too. The guards behind you swiftly aim their pistols at you. ${leftsurvivor} turns around to punch one of the guards, sending him to the floor and his pistol flying away. The other guard turns towards him, but ${survivor3} swiftly sends a couple of bullets through his body. He falls to the ground, a pool of blood soon growing underneath him.\n  \n  \"I would have done the same after we're done here. They were never fit to be guards. Ah well, surprising turn of events. I must say, I'm not entirely surprised, though. Be with the scum, be like the scum. I would've been offended if you didn't try to get rid of me at some point. Nevertheless, it's been a pleasure, kiddo.\" He chuckles and grins at you.\n  \n  \"Any last words?\" ${survivor3} aims her pistol at him as ${leftsurvivor} picks the other pistol up from the ground and aims it at the guard on the floor.\n  \n  \"Yeah, they would be something among the lines of…well…let me think for a moment, all right?\" He rubs his chin, then turns to you with an evil look on his face. \"See you in hell.\" The building shakes slightly from the sandstorm, and the lights go out. He grins as you hear two clicking sounds, then see a grenade flying towards you and another one towards ${survivor3}.\n  \n  It feels as if everything starts moving in slow motion. The grenade flies towards you, then hits your chest. The other one hits ${survivor3}. She tries to grab it and throw it back. You hear two small explosions. You close your eyes and brace yourself, when the grenades begin to vomit out thick, grey smoke. You snap back into reality and fall to the ground as the whole room fills with smoke very quickly. You cough and gasp for air, and hear both ${leftsurvivor} and ${survivor3} doing the same. You hear quick footsteps, moving farther away from you.\n  \n  \"He's getting away!\" ${survivor3} chokes. You try to open your eyes and breathe, but the smoke burns your eyes and lungs. You stand up swiftly and stumble into someone. You try to wave the smoke away, but it doesn't seem to help, as everyone in the room, including you, coughs heavily and tries to find their way out of the smoke.\n  \n  Eventually, you see the end of it, then just fall on the floor next to ${leftsurvivor} and cough heavily. ${survivor3} pants and pulls you up on your feet. \n  \n  \"Let's go. We've no time to lose. Let's get him. This ends here, once and for all,\" she says and runs up the stairs. You follow her in the darkness, your eyes still burning from the smoke. You glance back down to see ${leftsurvivor} rubbing his eyes and coughing heavily, and quicken your pace when you hear more guards banging and shouting behind the closed doors.\n  *page_break\n  \n  You arrive at the top of the stairs and try to open his office door, but it doesn't budge. ${survivor3} takes a step back and gives the door a couple of hard kicks. The door creeks and eventually breaks in half. One half lies on the floor, while the other one hangs from the door frame. You both take cover behind the wall on both sides. \n  \n  \"We go in on three. One…two…three!\" You both step inside with guns raised. It looks as if a grenade blew up in the room. The chair you used to sit in is pushed over, and the armchair is pushed over along with his desk. The desk has been pushed onto its side. The room seems darker from the blinds that are halfway down, only letting a little light in.\n \n  \"Only a fool would hide behind a desk like that!\" ${survivor3} mutters and starts firing at the table. The bullets go through, and you hear them crashing into the floor.\n  \n  \"And only a fool would expect me to actually hide there.\" You hear ${capturer1}'s voice coming from behind. You quickly turn around and hear a loud banging noise. \n  \n  You freeze for a second before you feel yourself falling to the ground. Sharp pain strikes your left shoulder, and something warm soaks your clothes.\n  \n  ${capturer1} swiftly aims his pistol at ${survivor3}, but she turns around faster and sends a bullet through his arm. He drops the pistol, and she shoots him in the leg. ${capturer1} falls on the floor and holds his wounds as he leans back against the door frame. \n  \n  \"Good shot, for a girl. Despite that sorry excuse of a pistol you're using. Try handling my desert eagle. The kickback will send you flying.\" He chuckles and squeezes his wounds tighter. Blood runs down his arm and leg, down onto the floor.\n  \n  \"What does it feel like to get shot, huh? You had it coming, kiddo.\" He looks at you and grins. \"You don't know what you just threw away. We could have been rulers. We could have ruled everything and had a life everyone would envy. Maybe you'll think back to this moment and wish you had chosen differently. If you don't bleed to death, anyway. Which, to be honest with you, has very high odds. Hey, wanna bet a mag on it, kiddo?\" He chuckles and coughs up blood as he does so. He spits it out and leans back against the door frame. \n  *page_break\n  \n  \"So, what are you waiting for? You don't have the guts, or something?\" He smirks at ${survivor3}, blood running out of his mouth and down his chin.\n  \n  ${survivor3} kneels next to you and presses on your wound tightly but keeps aiming her pistol on ${capturer1}. Blood runs through her fingers. She looks at you with a worried expression on her face and wet eyes. \"I'm—I'm sorry, ${firstname}. You'll be fine in no time, though. I promise. Just keep pushing on it, okay?\"\n  \n  \"Lovely. Can you two just stop the drama now, and you know, just be done with whatever you have planned? You'll bleed to death anyway. Do you feel dizzier, do you feel colder, your eyes heavier? Just shut them, and feel your precious little worthless life fading away.\" ${capturer1} smirks. \n  \n  \"What do you think is going to happen after you get rid of me, anyway? Do you think you can restore peace and order? Do you think you'll unite people and give them equality? Please don't make me laugh, as that would make me feel uncomfortable right now. Wanna know what happens if you give people equal rights? Chaos. So go ahead and be the hero of the revolution. Just think about ol' ${capturer1} when you get overthrown in your perfect society. I expected better from you, kiddo.\" He frowns.\n\n  ${survivor3} clenches her fists and glances at her pistol, then at you. She lowers her own pistol slightly and looks into your eyes.\n  *choice\n  \n   #\"Let me do it.\"\n    *set rep2 0\n    She nods and spins the pistol around so that she's holding it by the barrel. You slowly take the handle with your other hand. You release your wound, and try to stand up steadily, but you fall back on the ground with a horrible burning pain numbing your whole left side.\n\t\n    ${survivor3} helps you up to your feet and wraps her arms around you. You limp closer to ${capturer1}, and she releases you when you're close enough. You sweat heavily and feel dizzy, but you raise the pistol and aim it at him.\n    *if (threaten)\n\t \n     \"I told you it'll be funny to kill you.\" You smile uncontrollably and wiggle your index finger on the trigger.\n\t \n     \"Heh, see, kiddo? We've always been the same. You're happy to kill me, aren't you? And let me tell you something. You'll feel even better after doing it. You'll wish you could rewind and do it again. Trust me, I know this feeling well enough. \n     *goto ivancont\n \n    *else\n\t\n     \"Heh, you and I, kiddo. \n     *goto ivancont\n\n     *label ivancont\n\n\n     \"We are very much alike. You'll realize it sooner or later. Just look at yourself now. Go ahead, pull the trigger, and you'll get there sooner. The lass behind you is starting to realize it. But oh well, you'll only profit from being like me. Now, be a good boy, and pull the trigger. I know you want to do it. Your body itches for it, doesn't it? I know the feeling too. It's been a pleasure though, kiddo,\" he says, smirking.\n\t \n     You look deep into his eyes and squeeze your finger on the trigger tighter. It feels harder to pull it than anytime before. You keep squeezing your finger until a gunshot echoes through the room. ${capturer1} slides further down the wall and stops moving as blood runs down his face from the bullet wound on his forehead. You keep looking at his lifeless body with joy filling you. It's over, you think, smiling slightly. You hear the gun dropping on the floor. \n\t \n     You glance down and see that it has fallen out of your hand. You blink a couple of times, then feel yourself falling backwards as your eyes shut down.\n     *page_break\n     *goto_scene ivandeathending\n   \n   #\"Just do it.\"\n    *set Rep2 0\n    She nods slowly and gives your cheek a small rub, leaving bloody fingerprints on it. She stops pushing on your wound and stands up. She walks closer to ${capturer1} and cocks the pistol.\n    *if (threaten)\n\t\n     \"Heh, remember what you said the first time we met, kiddo? That you'll kill me. Now, where did that side of you go? Or maybe you never had one like that? Way to get my hopes up…\" He chuckles.\n     *goto ivancont2\n\t \n    *else\n     *goto ivancont2\n\t\n\t\n\t\n\n \n #Aim at ${survivor3}.\n  *set Ivan %+15\n  *set Ryan %-50\n  *set Malcolm %-50\n  *set Lizzie %-50\n  *set Lizziedead true\n  *set Evil %+15\n  \n  You slowly raise your pistol and aim it at ${survivor3}. \n  \n  \"W—what? Are you for real?!\" She looks at you with eyes wide.\n  \n  \"I expected no less from you. Come over here.\" ${capturer1} chuckles as you walk next to him, still aiming at ${survivor3}.\n  \n  \"After all we've been through, you decide to deal with the devil himself?\" ${leftsurvivor} mumbles and shakes his head. He looks away for a couple of seconds, then raises his pistol and aims it at you. \"I'm sorry…even just one of ${capturer1}'s kind is enough.\" He sighs.\n  \n  \"You mean, there's not enough of me, right? Let's not get too hasty.\" ${capturer1} reaches back and pulls out two slim pistols with engraving on both barrels. He aims one at ${leftsurvivor} and one at ${survivor3}. \"I'd like to introduce you to my Berettas. They're my precious little twins. They've never let me down. Unlike many of you have, several times.\"\n  \n  The sight of five pistols makes you nervous. You get even more nervous when you think about ${survivor3} aiming her pistol at you.\n  \n  \"Put the gun down, ${firstname}. There'll be no consequences, just think straight. Put it down.\" ${survivor3} looks at you with eyes wide.\n  \n  \"No, we both know what to do here. Shoot her. Just pull the trigger. Lots of times. And just let her lifeless body smash on the ground. Do it!\" ${capturer1} says as the building suddenly shakes slightly from the sandstorm, and the lights go out. You catch your balance and hear a loud gunshot echoing through the whole lobby. You freeze for a second before you feel your body falling to the ground. Sharp pain strikes your left shoulder, and something warm soaks through your clothes.\n  \n  You glance down at the rapidly growing puddle of blood underneath you, then look up at ${survivor3}. Smoke emerges from the barrel of her pistol. She stands there frozen, with wet eyes. \"I'm…so…sorry,\" she mumbles after a couple of seconds, then lowers her pistol. She lets it fall out of her hand and turns to ${capturer1} as her pistol hits the ground.\n  \n  ${capturer1} grins and pulls the trigger a couple of times, then aims both of his pistols at ${leftsurvivor} in the darkness. It feels as if everything starts moving in slow motion as ${survivor3} falls to the ground, looking into your eyes as she does so. She hits the ground hard with several bullet holes in her chest. Her chest moves up and down for a few seconds, then she stops moving. Her lifeless eyes stare into nothingness as a puddle of blood grows underneath her and flows in your direction.\n  \n  \"I'll tell you what's going to happen now…\" ${capturer1} chuckles, aiming both of his pistols at ${leftsurvivor}, who grips his pistol tightly, still aiming it at ${capturer1} and breathing heavily. Tears roll down his cheeks as he glances from ${survivor3} to you. He keeps looking into your eyes, then frowns and looks back at ${capturer1} with clenched teeth. You sweat heavily and feel dizzy. You hear both of them talking for a while. Eventually, their voices fade as you feel yourself slowly laying back and closing your eyes.\n  *page_break\n  *goto_scene survivordeathending\n  \n*label ivancont2\n\"Heh, I might have been wrong, kiddo. You and I…we're nothing alike. You are a wimp. A coward. And you always have been. You have a lass doing the dirty work for you. Once again, I'm disappointed. Oh well, it's been a pleasure, kiddo. We'll see each other in hell. Now, can we be done with it? This floor is uncomfortably cold.\" He smirks and looks at ${survivor3}. \n\nShe grips the handle tightly and aims it on him. She squeezes the trigger tighter and tighter until a gunshot echoes through the room. ${capturer1} slides further down the wall and stops moving as blood runs down his face from the bullet wound on his forehead. It's over, you think, smiling slightly as a horrible, sharp pain strikes your left side. You sweat heavily and feel dizzy. She lowers her gun and turns to you. She drops the gun and runs over to you as you feel yourself slowly laying back and closing your eyes.\n*page_break\n*goto_scene ivandeathending\n", "choicescript_description": "Survive in the demolished district after the nuclear bombings. Face mutants born of the nuclear radiation, while dealing with what humans are left in the struggle for the hope to end your living nightmare. Decide who you'll trust, and overcome the challenges that await you.\n\n\"Doomsday on Demand\" is an interactive novel by Norbert Mohos. Your choices control the story. It’s entirely text-based—102,000 words, without graphics or sound effects–and fueled by the vast, unstoppable power of your imagination.\n\n• Enjoy a 102,000-word novel filled with action, drama, and tough decisions.[n/]\n• Face deadly enemies, varying from humans to mutants.[n/]\n• Learn to overcome and adapt to the danger that lurks around every corner.[n/]\n• Decide who you'll trust. Build and strengthen friendships or make enemies.[n/]\n• Choose your personality. Let your conscience guide you to goodness, or turn evil and only look out for yourself.[n/]\n", "choicescript_stats": "Your stats:\n\n*stat_chart\n\n text Name\n\n text Age\n\n*temp Clothes \"\"\n*temp comma false\n*if (Clothing = 0)\n    *set Clothes &\"Pyjamas\"\n    *set comma true\n*if (Clothing = 1)\n    *if comma\n        *set Clothes &\", \"\n    *set Clothes &\"Black and red long-sleeved shirt, dark blue jeans\"\n    *set comma true\n*if (Clothing = 2)\n    *if comma\n        *set Clothes &\", \"\n    *set Clothes &\"Ripped, dirty, black and red long-sleeved shirt, dark blue jeans\"\n    *set comma true\n*if (Clothing = 3)\n    *if comma\n        *set Clothes &\", \"\n    *set Clothes &\"Sky-blue hoodie, dark blue jeans\"\n    *set comma true\n*if (Clothing = 4)\n    *if comma\n        *set Clothes &\", \"\n    *set Clothes &\"Green and blue long-sleeved shirt, brown jeans\"\n    *set comma true\n*if (Clothing = 5)\n    *if comma\n        *set Clothes &\", \"\n    *set Clothes &\"Blue shirt, dark brown jacket, blue jeans\"\n    *set comma true\nClothes: ${Clothes}.\n\n\n\t\n\t\n \n*if Rep = 1\n [b]Reputation:[/b]\n *stat_chart \n  percent Bradley\n  percent Abbie\n  \n*if Rep2 = 1\n *stat_chart \n  percent Ivan\n  \n*if Rep2_2 = 1\n *stat_chart \n  percent Carl\n  \n*if Rep3 = 1\n *stat_chart\n  percent Malcolm\n \n*if Rep4 = 1\n *stat_chart\n  percent Ryan\n\n*if Rep5 = 1\n *stat_chart\n  percent Lizzie\n  \n[b]Personality:[/b]\n*stat_chart\n  opposed_pair Evil\n    Good\n \n \n\n*temp Backpack \"\"\n*temp comma false\n*if (Gasmask)\n    *set Backpack &\"A gas mask\"\n    *set comma true\n*if (Books)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"some books\"\n    *set comma true\n*if (Pistol)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"a pistol\"\n    *set comma true\n*if (Knife)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"a small knife\"\n    *set comma true\t\n*if (Maskfilter = 2)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"2 filters\"\n    *set comma true\n*if (Maskfilter = 1)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"1 filter\"\n    *set comma true\t\n*if (Magazine = 2)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"2 magazines\"\n    *set comma true\t\n*if (Magazine = 1)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"1 magazine\"\n    *set comma true\n*if (idcard)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\" and an identification card\"\n    *set comma true\t\nBackpack: ${Backpack}.\n\n\n\n*temp Wounds \"\"\n*temp comma false\n*if (Cheekwound)\n    *set Wounds &\"Small wound on left cheek\"\n    *set comma true\n*if (Nosewound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Bleeding nose\"\n    *set comma true\n*if (swolleneye)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Swollen left eye\"\n    *set comma true\t\n*if (wackwound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Infected black wound on belly\"\n    *set comma true\n*if (slimerwound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Corroded right arm\"\n    *set comma true\n*if (trapperwound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Stab wound on right shoulder\"\n    *set comma true\t\n*if (markedwound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Small cuts on chest\"\n    *set comma true\t\t\t\nWounds: ${Wounds}.\n\n*if (inform)\n [b]Glossary:[/b]\n *stat_chart\n  text Slimer\n \n  text Wack\n  \n  text Aviatrix \n  \n  text Theurgist\n   \n  text Trapper\n  \n*if (inform2)\n *stat_chart\n \n  text Unknown", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "deathend": "[b][i]Chapter 7 - Death Is But The Next Great Adventure[/i][/b]\n\n\"Wait! There's a Wack over there!\"\n*set deadend true\n\n[i]\"That's weird. It's the second one today. Let's kill it, then find out if they've breached in somewhere.\"[/i]\n*achieve deathend\n\n\"All right,\" says a young but strong-looking person with black jeans, a black jacket, and gloves. The gas mask on ${himher} has blue and red lines painted across it, and ${heshe} whips out a small, silenced pistol. Swiftly, ${heshe} aims it at the creature, then pulls the trigger twice. The bullets hit its neck and head, making it fall dead to the ground silently. With a smile on ${hisher} face, ${heshe} puts the pistol back into the black pistol holster on ${hisher} hip. \n\n[i]\"Good one. Again.\"[/i] An older-looking man with camouflaged trousers and an unbuttoned shirt fixes his own holstered weapons, then crosses his arms. [i]\"Let's check the fences, okay?\"[/i] He wraps an arm around ${himher} as they walk through the enormous field with large green and yellow plants everywhere. They get past a couple of benches, grills, and various other old rusty outdoor items. The sun shines bright, but the wind blows heavily. They walk by the fence on the left, following it all the way to the end. They continue walking by the fence and stop at a bent part with a tall, skinless creature stuck on the barbed wires on top, pushing the whole fence in.\n\n[i]\"Well…we've found the cause of the problem. Help me get it down,\"[/i] he says as they begin to push the creature off the fence.\n\nWhen they finish, they look over the fence. There's nothing but desert separating them and a couple of mountains in the distance. The scant green life behind the fence makes the whole scene look funny. The wind blows heavily, but the sun still manages to keep the weather warm enough. They turn around to walk through the field, then arrive at a huge, reinforced fence with watchtowers on both sides. They open the door and walk through some more heavily guarded, reinforced fence doors. \n\nThey step out into a bright, green field and begin walking through it. They pass several watchtowers on both sides, smaller buildings, and tents. Chattering comes from the buildings and tents around them. They keep walking through the freshly mown bright-green grass, and a tall moustached man with a military uniform walks towards them.\n*page_break\n\n\"Corporal ${leftsurvivor}, found anything, or was it a false alarm again?\" He fixes his hat and crosses his arms.\n\n[i]\"Sir, a Wack's been trying to get in desperately, thus bending the fence. Repairs will be needed.\"[/i] He salutes, along with the younger person next to him.\n\n\"I'll get the team on it.\" He glances at the younger person. \"What's the progress on Private ${currentbf}'s training?\"\n\n[i]\"Everything's going better than expected, sir; ${heshe}'s capable of completing tasks on ${hisher} own.\"[/i] ${leftsurvivor} smiles slightly.\n\n\"Very well. He'll have an independent mission assigned to ${himher} soon. Today, though, you two will head out and scout the area. There have been reports of Arkadian rebels expanding in the nearby areas. Don't interfere with them until it's necessary. I expect a clean and very detailed report, as usual. Dismissed.\" He nods once and begins to walk past the two of them.\n\n[i]\"Sir, yes sir!\"[/i] ${leftsurvivor} salutes once again, along with ${currentbf}. They begin to walk inside the enormous military building's decontamination chamber. The metal door slowly slides open automatically with a hissing sound. They step inside. The decontamination process is quick and quiet. They step out into a huge lobby filled with soldiers. Some of them sit around on a couch watching TV, while others play cards at a round table. Most of them are walking into the huge kitchen on the right with huge, long, white tables and benches on both sides. The smell of cooked food fills the whole kitchen and lobby. \n\nSome more soldiers open the creaking metal door in front of them, leading to the chambers. They walk inside the kitchen, grab a prepared plate with warm soup and a couple of small pieces of meat with a slice of pale bread next to it. They walk to the empty table at the back and sit down. They tug their sleeves up and take the gas masks off.\n*page_break\n\n${currentbf} combs ${hisher} mid-length hair over ${hisher} left eye, covering the knife wound going across ${hisher} white, blind eye. ${currentbf} takes the pistol out and puts it on the table. Motionless, ${heshe} freezes and stares at the silencer. Carefully, ${heshe} rubs ${hisher} finger on the letters carved into it. Tears quickly fill ${hisher} eyes as ${heshe} keeps staring at it.\n\n[i]\"Hey, is everything okay?\"[/i] ${leftsurvivor} scratches his small beard and leans closer to ${himher}.\n\n\"Y—yeah, sure. I just…miss him.\" A single tear falls on the table before ${heshe} wipes ${hisher} eyes and takes a deep breath.\n\n[i]\"Me too…he was a cool kid. But hey, there's no point in mourning now, okay? Just remember him for all the best he had inside him, and focus on changing this world for the better. All right?\"[/i] He reaches across the table and pats ${hisher} hand.\n\n\"All right. I will, I will change this world. For the better. And wipe ${base} off the map, along with every one of them. I will avenge you, ${firstname}.\" A smile appears on ${hisher} face as ${heshe} grips the handle of the pistol.\n*page_break\n*goto_scene ending\n", "ending": "[b][i]Chapter 8 - Epilogue[/i][/b]\n\nThis is how your journey has been. The journey of ${name}. Your story, that someone might have written down in the process. You might be remembered by some, or you might be forgotten by all. It only depended on you.\n\n\n*if (cheekwound)\n You stood up for yourself the very first time against an officer, bearing the wound on your cheek as a result until the end.\n *goto recap\n \n*else\n You decided not to stand up against the officer on the very first day, and underwent the random search in front of the school.\n *goto recap\n\n*label recap\n\nThat day you walked into the school as if it was a regular school day, not knowing what awaited you. You'll never forget what it felt like to watch the whole district disappearing in front of your eyes on the television screen. You lasted two long years there, mostly being on cleaning duty. You built a society with your classmates. Your rations were running low when ${capturer1} and ${capturer2} breached the bunker door.\n\nThey killed your classmates that counted as expendable in front of your eyes, then walked you outside. The first view of the district was a shocking experience.\n\n*if (threaten)\n\n You threatened to kill ${capturer1} on the way, but he laughed it off.\n *goto recap2\n \n*else\n\n You obeyed them on the way and didn't give them any reason to pick on you.\n *goto recap2\n \n \n*label recap2\n\nWhen you first saw ${base}, you were amazed, but you didn't expect half of what awaited you in the following years.\n*page_break\n\nYou were put into a basement as your new home, and you chose ${currentbf} to come with you, leaving ${leftalonebf} alone. In the basement, you met ${survivor1} and ${survivor2}. You ended up as a scavenger by their sides. They weren't happy about it, especially when you got separated the first day in the sandstorm. You hid in the abandoned offices.\n*if (encounterleft = \"both\")\n\n ${survivor2} found you eventually, and you left the building. Though you swore you saw a couple of people standing in the window when you left, you're not entirely sure.\n *goto recap3\n \n*else\n\n ${survivor2} found you eventually, but you encountered two survivors. They had guns as well, and tried to rob you. Both of you managed to get away alive, but it cost a life on their side.\n *goto recap3\n \n *label recap3\n \n \n You were ambushed in an empty warehouse by mutants. Both ${survivor1} and ${survivor2} required your help, but you decided to save ${leftsurvivor}, resulting in ${deadsurvivor}'s life ending. While you were saving ${leftsurvivor}, you got fatally wounded and passed out. Ever since then, weird, vivid dreams have haunted you, and your wound never healed properly.\n *page_break\n \n You woke up a month later. ${capturer1} attended to your wound, and it took a couple of months to recover. You had to get back into business as soon as you woke up. That's when you met ${survivor3}.\n \n *if (triedwhiskey)\n \n  You got to try whiskey. It wasn't a pleasant experience, but an experience nonetheless.\n  *goto recap4\n  \n *else\n \n  You didn't try whiskey, and you suspect you didn't miss anything.\n  *goto recap4\n  \n*label recap4\n\nYou went through hell with ${leftsurvivor} and ${survivor3}. T
