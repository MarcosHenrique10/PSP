heir hate for each other slowly began to unravel.\n\n*if (chestwound)\n You didn't fulfil ${capturer1}'s request about reporting back daily, so he carved his name into your chest as punishment. It was a painful process, and the mark never really healed.\n *goto recap5\n \n*else\n You fulfilled ${capturer1}'s request about reporting back daily. He showed what fate would have awaited you if you hadn't obeyed him, as he carved his name into ${leftsurvivor}'s chest.\n *goto recap5\n\n\n*label recap5\n\n\n*if (goal = \"parents\") and (wentinsides > 1)\n\n You set your goal to find your parents, which you eventually did. You slightly regret your decision, but it's also a relief to know that they aren't searching for you.\n *goto recap6\n \n*elseif (goal = \"parents\") and (wentinside = false)\n\n You set your goal to find your parents, but when the time came, you backed off. You couldn't risk seeing them like that, if they had turned.\n *goto recap6\n \n \n*elseif (goal != \"parents\") and (wentinsides > 1)\n When you had the chance to wander around inside your house, you did so. You saw your father, which you slightly regret, but it's also a relief to know that they aren't searching for you.\n *goto recap6\n \n*elseif (goal != \"parents\") and (wentinside = false)\n When you had the chance to wander around inside your house, you backed off. You couldn't risk seeing them like that, if they had turned.\n *goto recap6\n\n*else\n *goto recap6\n\n\n*label recap6\n*page_break\n\n${capturer1} ordered you to kill ${capturer2} no matter what, with no strings attached.\n \n*if (killedcarl)\n\n You obeyed his commands and killed ${capturer2} in his sleep. It was a tough mission, but you pulled through and impressed even yourself.\n *goto recap7\n\n*elseif (leftsurvkilledcarl) and (deadcarl)\n\n You didn't want to do it yourself, so you convinced ${leftsurvivor} to do it for you. He hesitated a little, but he did it.\n *goto recap7\n \n*elseif (helpedcarl)\n\n You couldn't bring yourself to do it, so you warned him about what you were supposed to do. He didn't believe you at first, but you managed to convince him. He thanked you and successfully escaped with a trick, making ${capturer1} think he was dead.\n *goto recap7\n \n \n \n*label recap7\n*page_break\nIn the end, things went downhill sooner than you expected.\n \n*if (goal = \"murder\") and (ivandead)\n\n You set your goal to kill ${capturer1}, which you managed to do. It filled you with joy, but you passed out from the gunshot wound he inflicted upon you.\n *goto recap8\n  \n*elseif (goal != \"murder\") and (ivandead)\n\n You saw ${capturer1} die, then you passed out from the gunshot wound he inflicted upon you.\n *goto recap8\n  \n*elseif (lizziedead)\n\n When you had to face the tough decision of whom to spare, you chose to kill ${survivor3}.\n *goto recap8\n  \n*elseif (ryandead) and (malcolmdead)\n\n When you had to face the tough decision of whom to spare, you chose to kill ${leftsurvivor}.\n *goto recap8\n  \n*elseif (bradleydead) or (abbiedead)\n\n When you had to face the tough decision of whom to spare, you chose to kill ${currentbf}.\n *goto recap8\n  \n  \n*label recap8\n*page_break\n\n*if (died)\n\n  When you had to face the tough decision of killing either ${leftsurvivor} or ${currentbf}, you decided to turn against ${capturer1}. He was expecting your move and shot you. You managed to save your friends, but you died for them.\n  *goto recap9\n  \n*elseif (aloneend)\n\n You shot both ${leftsurvivor} and ${survivor3}, then decided to try your luck alone. You've been living a thief's life, holed up in the secret bunker under the mansion ever since.\n \n *goto recap9\n\n*elseif (ryanend) \n\n You ended up as the co-leader by ${leftsurvivor}'s side, leading a democratic ${base}. You save survivors and fight against the outside world, but it still doesn't seem to be enough for them.\n  \n *goto recap9\n \n*elseif (malcolmend) and (goal != \"safe\")\n\n You ended up in the Dimes district as one of the barons. Slaves follow your every command, and ${leftsurvivor} can't stop telling you to feel good about where you are.\n  \n *goto recap9\n  \n*elseif (malcolmend) and (goal != \"safe\")\n\n You ended up in the Dimes district as one of the barons. Slaves follow your every command, and ${leftsurvivor} can't stop telling you to feel good about where you are. Your goal was to find a safe place, and you dare to call it that.\n  \n *goto recap9\n  \n  \n*elseif (ivanend)\n\n You ended up as a co-leader by ${capturer1}'s side. You've been building up your own leadership in the district, enslaving survivors and killing anyone who dares to speak up.\n\n*goto recap9\n \n\n*label recap9\n*if Evil \u003c 35\n Despite everything that has happened around you, you've managed to stay on the honest, good path.\n *goto recap9_2\n \n*elseif Evil > 70\n After everything that has happened around you, you've ended up on the evil side of your personality.\n *goto recap9_2\n  \n*else\n Despite everything that happened around you, you've managed to stay on a neutral moral path.\n *goto recap9_2\n\n*label recap9_2\n\nYour life has been anything but uneventful. You've gone through heaven and hell. You've done things you regretted right afterwards, and you've done things you have never regretted. But looking back, there are only a few things, if any, that you would change.\n*if (deadend)\n\n Your life ended protecting those you loved. And no one knows what the future will bring.\n *goto recap10\n  \n*else\n\n Your life turned out to be more or less what you wanted it to. And no one, not even you, knows what the future will bring.\n *goto recap10\n  \n*label recap10\n\n*achieve finalend\n*page_break End\nWe hope you've enjoyed playing [i]Doomsday on Demand.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "invandeathending": "\"So much for your plan. Yet again. By the way, thanks for the help! But I swear to god, if he doesn't make it…\"\n\n\"I've been choking to death from the smoke. Did you just threaten me?\" \n\nYou hear voices in an arguing tone around you. Somehow, it feels safer to stay in whatever position you're in. You feel your legs and arm hanging down, and your gas mask feels very uncomfortable on your face. You bounce up and down every now and then. You're not yet fully awake, nor do you want to open your eyes. Slowly, you begin to feel a horrible, dull pain striking into your whole top-left side. You slowly open your eyes and glance up to see ${leftsurvivor} carrying you, still arguing wildly with ${survivor3}.\n\n\"He's awake!\" ${survivor3} stops ${leftsurvivor}, and he slowly puts you down on your feet. Your arm burns like hell and you feel dizzy, but you manage to keep your balance. Even in the slight sandstorm. You give your wound a slight rub and feel the dried blood under your fingers.\n\n\"We have to get to the scientist base. They have all the supplies you need and also a better place for you in general.\" ${survivor3} fixes her backpack and steps forward.\n\n\"To hell with that! We get to the mansion, fix him up, get the loot, and leave this damned place for good!\" ${leftsurvivor} steps next to her.\n\n\"Yeah, because you've done so well at protecting him all along! Look where your parental skills led us, 'mighty ${leftsurvtoldtobe}.'\" ${survivor3} turns towards him and clenches her fists.\n\n\"I won't stand this anymore! I've had enough of you for one life!\" ${leftsurvivor} shouts, then he punches ${survivor3} in the face, and she falls to the ground.\n*page_break\n\n${leftsurvivor} tries to climb on top of her and give her a couple of punches, but she kicks him off and jumps up to her feet. \n\n${leftsurvivor} stands up, pulls out a pistol, and aims it at her. \n\n\"Oh, you wanna play like that, big boy? You've just proven me right. You've always been a liability, and a pathetic excuse for a caretaker.\" ${survivor3} reaches back and sends a knife flying into his arm. He screams and drops the pistol. She takes her pistol out as ${leftsurvivor} stumbles closer and smashes it out of her hands. She grips the handle of the knife stuck in his arm and rips it out. ${leftsurvivor} screams in pain and punches her once again. She stumbles back and flings her knife around, making ${leftsurvivor} jump back.\n\nYou try to step between them, but ${leftsurvivor} firmly pushes you back. You fall back hard, and your fresh wound burns in pain as you slowly sit up and feel blood dripping down your arm, your vision becoming blurry. It's a hard task to keep track of them in the sandstorm, but you manage to do so. You sense them talking, but you can barely hear them arguing anymore. ${survivor3} flings her knife a couple of times and makes a move towards him. ${leftsurvivor} reaches into his pocket and throws a magazine at her, then charges at her and pins her to the ground. ${survivor3} stabs him in the arm once again, but he rips it out and throws it away. ${survivor3} punches him a couple of times and tries to break free.\n\n${leftsurvivor} punches back and manages to kneel down on her left arm. He wraps his hands around her neck and begins to squeeze it as tight as he can. She struggles and tries to break free. She keeps punching his arm and face with her right hand, but ${leftsurvivor} doesn't back down. \"You had this coming!\" you manage to catch ${leftsurvivor} shouting as he squeezes her throat. You look at ${leftsurvivor} focusing all his strength down on ${survivor3}'s neck. She struggles wildly and tries to break free. You shake your head from feeling dizzy and notice a pistol lying next to you, probably ${leftsurvivor}'s. You glance at it, then back at both of them. You feel very tired and dizzy. Suddenly, you begin to sweat and feel very nervous. Your heart almost explodes through your chest as you glance from the pistol to them. You know this has to end, one way or another.\n*choice\n \n #Shoot ${leftsurvivor}.\n  *set Lizzie %+20\n  *set Ryandead true\n  *set Malcolmdead true\n  You slowly lean towards the pistol and pick it up off the ground. You breathe faster and faster as you raise it and aim down the sight at ${leftsurvivor}. ${survivor3} struggles and glances at you. Tears roll down your cheek as you pull the trigger. ${leftsurvivor} falls off of ${survivor3}. She crawls backwards and gasps for air. You slowly lower the pistol and force yourself up off the ground. You drag yourself over to ${leftsurvivor} and drop on your knees. You sit back on your knees and feel tears running down your cheeks as he lays on his side with a heavily bleeding wound in his chest. He breathes slowly and looks at you. \n  \n  \"That was…too much, wasn't it?\" He smiles slightly. \"No hard feelings, kid. It's better like this. I can get some well-deserved rest now. It's for the best…considering what I turned into recently. I can leave knowing that you can take care of yourself. It's weird, it feels like I've longed for this for a while now. And it just feels…very calm. Take care of yourself, ${firstname}. And choose the few people you can trust, all right? Be someone you know your parents and I would be proud of.\" He chuckles slightly and pats your hand, then looks away and closes his eyes.\n  *page_break\n  \n  You sit there for a while, just staring at him with tears rolling down your cheeks. ${survivor} slowly walks closer to you. She helps you up and buries you in a tight hug. You can barely stand, as your legs are still shaking wildly. She rubs the back of your head. She slowly releases you and lifts your head by your chin, making you look into her eyes. \"I'm so sorry, ${firstname}. But…thank you. Let's go, all right?\" She looks into your eyes, and you blink once, agreeing with her. She wraps an arm around you and helps you fight your way through the sandstorm. You glance back at ${leftsurvivor}, but ${survivor3} turns you back towards the road.\n  \n  As you limp next to her with your wounds burning and dizzy head, something hits you. You realize everything you had so far is gone, again. You begin to think about what awaits you. What are you going to do now; will you fit in, wherever you end up? Will you find peace if you move into the scientist base, or will you have to struggle to stay alive again? Is anything ever going to change? And if so, will it change for the better or for the worse? With tears rolling down your cheeks, you slowly look up to the sky, as much as you can through the sandstorm, almost as if you were waiting for someone up there to reassure you. To tell you that finally, everything's going to be all right. \n  \n  You desperately keep looking up, breathing fast. After a couple of seconds, you let your head down, just staring at the ground. Several feelings and emotions fight inside you, but you can't get hold of any of them. Your wounds burn in pain, and it feels very hard to put one leg after the other. You clench your fists and just close your eyes. Suddenly, everything goes silent. You hear your heart beating. Just you two, in the peaceful, calm darkness, as you get dragged into the unknown.\n  \n  \n  *page_break\n  *goto_scene Lizzieend\n \n \n #Look away.\n  *set Ryan %+20\n  *set Lizziedead true\n  You look at them and see ${survivor3} looking into your eyes. She reaches towards the pistol and keeps looking at you. You slowly force yourself to look away. You hear some struggling sounds, but eventually they stop, and you look back on them. ${leftsurvivor} is panting, his hands down, still kneeling over ${survivor3}. Tears roll down your cheeks as you kneel and keep looking at her. Her lifeless, dead eyes keep staring into nothingness.\n  \n  ${leftsurvivor} slowly stands up. He picks up and holsters his pistol, then slowly walks over and crouches down next to you. \"I…\" He wraps an arm around you and pulls you closer. \"I'm sorry, ${firstname}…I'm so sorry. But…I thank you for your loyalty. I…I know that you saw the pistol and might have even thought about…you know. But I'm glad you didn't. Thank you, ${firstname}.\" He gives your shoulder a slight rub and helps you up. Your legs and arms shake wildly. \"Let's go, okay?\" He pats you on the back. You nod with wet eyes. You begin to walk down the road and glance back at ${survivor3} once more. He turns you away and pulls you closer. You continue to walk with shaking limbs and his arm still around your shoulder to support you.\n  \n  As you limp next to him with your wounds burning and a dizzy head, something hits you. You realize everything you had so far is gone, again. You begin to think about what awaits you. What are you going to do now? Where will you go? Will you find peace somewhere, or will you have to struggle to stay alive again? Is anything ever going to change? And if so, will it change for the better or for the worse? You look away with tears rolling down your cheeks. You slowly look up at the sky, as much as you can through the sandstorm, almost as if you were waiting for someone up there to reassure you. To tell you that finally, everything's going to be all right.  \n  \n  You desperately keep looking up, breathing fast. After a couple of seconds, you let your head down, just staring at the ground. Several feelings and emotions fight inside you, but you can't get hold of any of them. Your wounds burn in pain, and it feels very hard to put one leg after the other. You clench your fists and just close your eyes. Suddenly, everything goes silent. You hear your heart beating. Just you two, in the peaceful, calm darkness, as you get dragged into the unknown.\n  \n  \n  \n  *page_break\n  *if leftsurvivor = Ryan\n   *page_break Some years later…\n   *goto_scene Ryanend\n   \n  *else\n   *page_break Some years later…\n   *goto_scene Malcolmend\n  \n  \n  \n *selectable_if (((Ryan \u003c 36) and (Malcolm \u003c 35)) and (Lizzie \u003c 27))) #Shoot both of them.\n  *set Lizziedead true\n  *set Ryandead true\n  *set Malcolmdead true\n  \n  You close your eyes for a second, then grip the pistol tightly and raise it to aim at ${leftsurvivor} first. He turns to you and freezes for a second. You squeeze the trigger until you hear a loud gunshot. He falls off ${survivor3}, a pile of blood quickly growing under her. She pants heavily and looks up at you. She smiles slightly, but it quickly fades when you aim your pistol at her. She frowns and shakes her head a little. You squeeze the trigger again and hear the loud gunshot. Her head snaps back. You see her lifeless eyes staring into nothingness as her blood runs down towards ${leftsurvivor}. \n  \n  The pistol falls out of your hand, and you sit back on your knees. Tears roll down your cheeks uncontrollably, and you keep staring at them for a while. You slowly stand up with shaking limbs and pick up the pistol. You holster it, close your eyes for a moment, and then turn around. You slowly begin to walk down the road in the sandstorm. You turn around once again and glance at both of them. You begin to sweat heavily, and your eyes get wet, but you turn around and continue walking down the road.\n  \n  As you limp through the heavy sandstorm alone, with your wounds burning and a dizzy head, something hits you. You realize everything you had so far is gone, again. But you're on your own now. No one can help you, nor can they tell you what to do. You begin to think about what awaits you. What are you going to do now? Where will you go? Will you find peace somewhere, or will you have to struggle to stay alive again? Is anything ever going to change? And if so, will it change for the better or for the worse? You look away tears rolling down your cheeks. You slowly look up at the sky, as much as you can through the sandstorm, almost as if you were waiting for someone up there to reassure you. To tell you that finally, everything's going to be all right.  \n  \n  You desperately keep looking up, breathing fast. After a couple of seconds, you let your head down, just staring at the ground. Several feelings and emotions fight inside you, but you can't get hold of any of them. Your wounds burn in pain, and it feels very hard to put one leg after the other. You clench your fists and just close your eyes. Suddenly, everything goes silent. You hear your heart beating. Just you, in the peaceful, calm darkness, as you walk into the unknown.\n  *page_break Some years later…\n  *goto_scene alonecont\n  \n  \n \nivanend everyone who can or wills to fight can come, who doesn't…well…\n ", "ivandeathending": "*if (wackwound)\n You're walking barefoot on the wet roof of a huge building. Your stomach rumbles with hunger as noises come from inside the building. You walk to the intact window on top of the warehouse and peek down. A man with a university jacket holds his SMG, and a younger boy with a black-and-red long-sleeved shirt stands next to him. You grip the long, thin knife and stomp through the window. It explodes and sends glass shards flying everywhere. You kick the young boy in the head as you land inbetween them, sending him to the ground.\n \n The SMG falls out of the man's hands, and he quickly backs away when he sees you. You step on his SMG, shattering it to pieces. He keeps backing away as you grip the thin knife tight. He takes a knife out and waves it around in your direction as he continues walking backwards. He backs against a wall and waves the knife around at you. With a loud growl, you smack it out of his hands and grip his neck tightly. He feels very light as you push him up against the wall, just like a ragdoll. The man desperately gasps for air. The sight makes your stomach rumble even more. You let out a big grunt and raise your sharp knife.\n \n A scream echoes in your ears. A second later, a knife gets stuck into your neck, sending horrible pain throughout your body. You fall loudly to the ground, as blood splatters around. The re of yourself, ${firstname}. And choose the few people you can trust, all right? Be someone you know your parents and I would be proud of.\" He chuckles slightly and pats your hand. He gives you a slight wink, then looks away and closes his eyes.\n  \n  You sit there for a while, just staring at him with tears rolling down your cheeks. ${survivor3} limps closer to you, blood running down her face. She helps you up and buries you in a tight hug. You can barely stand with your legs still shaking wildly. She rubs the back of your head. She releases you slowly and lifts your head by your chin, making you look into her eyes. \n  \n  \"I'm so…sorry, ${firstname}. But…thank you. You saved me. Let's go, all right?\" She looks into your eyes, and you blink once, agreeing with her. She wraps an arm around you and helps you fight your way through the sandstorm. You glance back at ${leftsurvivor}, but ${survivor3} turns you back towards the road.\n  \n  As you limp next to her with your wounds burning and your dizzy head throbbing in pain, something hits you. You realize everything you had so far is gone, again. You begin to think about what awaits you. What are you going to do now? Will you fit in, wherever you end up? Will you find peace if you move into the scientist base, or will you have to struggle to stay alive again? Is anything ever going to change? And if so, will it change for the better or for the worse? You look away with tears still rolling down your face. You look up at the sky, as much as you can through the sandstorm, almost as if you were waiting for someone up there to reassure you. To tell you that finally, everything is going to be all right. \n  \n  You desperately keep looking up, breathing fast. After a couple of seconds, you let your head down, just staring at the ground. Several feelings and emotions fight inside you, but you can't get hold of any of them. Your wounds burn in pain. It feels very hard to put one leg after the other. You clench your fists and just close your eyes. Suddenly, everything goes silent. You hear your heart beating. Just the two of you, in the peaceful, calm darkness, as you get dragged into the unknown.\n  *page_break Some years later…\n  *goto_scene lizzieend\n \n \n #Look away.\n  *set Ryan %+20\n  *set lizziedead true\n  *set rep5 0\n  *achieve friend2\n  You look at them and see ${survivor3} looking into your eyes. She reaches towards the pistol and desperately keeps looking at you. You force yourself to look away. You hear some struggling sounds, but eventually, they stop. You force yourself to look back at them. ${leftsurvivor} is panting with his hands down, still kneeling over ${survivor3}. Tears roll down your cheek as you sit up and keep looking at her. Her lifeless, dead eyes keep staring into nothingness. ${leftsurvivor} slowly stands up, blood dripping down his arm. He picks up his pistol and holsters it, then walks next to you and crouches down. \n  \n  \"I…\" He wraps an arm around you and pulls you closer. \"I'm sorry, ${firstname}…I'm so sorry. But…I want to thank you for your loyalty. I…I know that you saw the pistol, and might have even thought about…you know. But I'm glad you didn't. Thank you, ${firstname}.\" He gives your shoulder a slight rub and helps you up. Your legs and arms shake wildly. \n  \n  \"Let's go, okay?\" He pats you on the back. You nod with wet eyes. You begin to walk down the road, but glance back at ${survivor3} once more. He turns you away and pulls you closer. You continue to walk with shaking limbs and his arm still around your shoulder to support you.\n  \n  As you limp next to her with your wounds burning and your dizzy head throbbing in pain, something hits you. You realize everything you had so far is gone, again. You begin to think about what awaits you. What are you going to do now? Where will you go? Will you find peace somewhere, or will you have to struggle to stay alive again? Does ${leftsurvivor} have a plan? Is anything ever going to change? And if so, will it change for the better or for the worse? You look away, tears still rolling down your face. You slowly look up at the sky, as much as you can through the sandstorm, almost as if you were waiting for someone up there to reassure you. To tell you that finally, everything is going to be all right.  \n  \n  You desperately keep looking up, breathing fast. After a couple of seconds, you let your head down, just staring at the ground. Several feelings and emotions fight inside you, but you can't get hold of any of them. Your wounds burn in pain. It just feels very hard to put one leg after the other. You clench your fists and just close your eyes. Suddenly, everything goes silent. You hear your heart beating. Just the two of you, in the peaceful, calm darkness, as you get dragged into the unknown.\n  *if (leftsurvivor = \"Ryan\")\n   *page_break Some years later…\n   *goto_scene ryanend\n   \n  *else\n   *page_break Some years later…\n   *goto_scene malcolmend\n  \n  \n  \n *selectable_if (((Ryan \u003c 40) and (Malcolm \u003c 40)) and (Lizzie \u003c 40)) #Shoot both of them.\n  *set lizziedead true\n  *set ryandead true\n  *set malcolmdead true\n  *set rep3 0\n  *set rep4 0\n  *set rep5 0\n  \n  You close your eyes for a second, then grip the pistol tight as you raise it up to aim at ${leftsurvivor} first. He turns to you and freezes for a second. You squeeze the trigger tighter until you hear a loud gunshot. He falls off of ${survivor3}, a pool of blood quickly growing under him. She pants heavily and looks up at you. She smiles slightly, but it quickly fades when you aim the pistol at her. She frowns and shakes her head a little. You squeeze the trigger and hear the loud gunshot once again. Her head snaps back. You see her lifeless eyes staring into nothingness as her blood runs down towards ${leftsurvivor}. \n  \n  The pistol falls out of your hand as you sit back on your knees. Tears roll down your cheeks uncontrollably, and you keep staring at them for a while. You stand up carefully with shaking limbs and pick up the pistol. You holster it and can't help but close your eyes before you turn around. You slowly begin to walk down the road in the sandstorm. You turn around once again and glance at both of them. You begin to sweat heavily and your eyes get wet, but you turn back and continue walking down the road.\n  \n  As you limp through the heavy sandstorm alone, with your wounds burning and your dizzy head throbbing in pain, something hits you. You realize everything you had so far is gone, again. But you're on your own now. No one can help you, nor can they tell you what to do. You begin to think about what awaits you. What are you going to do now? Where will you go? Will you find peace somewhere, or will you have to struggle to stay alive again? Is anything ever going to change? And if so, will it change for the better or for the worse? You look away, tears still rolling down your cheeks. You slowly look up at the sky, as much as you can through the sandstorm, almost as if you were waiting for someone up there to reassure you. To tell you that finally, everything is going to be all right.  \n  \n  You desperately keep looking up, breathing fast. After a couple of seconds, you let your head down, just staring at the ground. Several feelings and emotions fight inside you, but you can't get hold of any of them. Your wounds burn in pain, and it feels very hard to put one leg after the other. You clench your fists and just close your eyes. Suddenly, everything goes silent. You hear your heart beating. Just you, in the peaceful, calm darkness, as you walk into the unknown.\n  *page_break Some years later…\n  *goto_scene aloneend\n", "ivanend": "[b][i]Chapter 7 - Control Of The Flow[/i][/b]\n\nThe desert crackles under your feet as you walk next to ${capturer1}. You're walking on a long, badly paved path, with guards on both sides every now and then. Each set of guards bows with their heads and greet you as you pass them. You glance back at the mansion. It has heavily reinforced fences and guards covering the hundreds of seemingly new crates inside.\n*set Age +2 \n*achieve ivanend\n\n*if reportedtimes >= 2\n\n Your path leads into the dark forest, with a huge fence around the valve-covered lid. You both go down the stairs and make sure everything is in order. Fear can be seen on the scientists' faces. They mumble and stutter when you ask about their progress, and sweat heavily when you leave. ${capturer1} stays back for a second. You glance back to see him giving the slowest scientist a punch in the face, then leaving the room. He grins at you, and you climb back onto the paved road.\n *goto cont\n \n \n*else\n\n Your path leads by a dark forest with some movement coming from within. You keep glancing inside as you walk by. You spot some figures in black, and some in white lab coats holding various tubes, mutants on chains, and geiger counters. ${capturer1} glances at you, and you swiftly pass by.\n *goto cont\n \n*label cont\n*page_break\n*set ivanend true\n\nYou chat with ${capturer1} about plans and tactics to overcome your foes on the long walk. You reach a muddy swamp with lots of plants and a freshly built wooden bridge over it. You walk through it proudly, glancing at the guards. You walk into the huge concrete military base and feel the guards and forcefully transformed soldiers gazing at the two of you. You startle the people inside, then leave on the same path. \n\nYou keep walking for a while on the well-known path to ${base}. ${capturer1} stops you and points into the distance. You glance over to where he's pointing and see two figures disappearing in the distance between some demolished buildings and vehicles. You jog after ${capturer1} until you turn onto the street where you last saw them. You carefully walk down the street, searching for them. \n\nIt's filled with previously killed, rotting human and mutant corpses. You hop over a mossy, black police car and see the same two figures in a store on your left, jumping behind the counter. ${capturer1} laughs and bursts inside the shop. You follow him inside and stop in the middle. You spin your silenced pistol around and give your leather gloves a slight pull. \n\n[i]\"Don't make me get behind that counter. I'm kind of lazy today. I'll count until ten in my head. No, no, let's say I'll count until five. If you don't come out before then, we'll empty our mags on you!\"[/i] ${capturer1} shouts and spins both his pistols around.\n\n\"A—all right, don't…we're co—coming.\" An older, grey-haired woman stands up by the side of a younger, middle-aged man. They're both wearing ragged clothes and staring at the two of you.\n\n\"I would leave us alone if I were you. You don't know how dangerous we are!\" The middle-aged man next to her clenches his fists.\n\n\"Please do show it. I'm eager to find out.\" You stop spinning your pistol around and aim it at him with one hand. He steps back, and they put their arms up. ${capturer1} chuckles and holsters his pistols.\n\n\"I'd be careful. You know how mad these sassy teenagers can get. You'll make good slaves—workers, or whatever, though.\" He turns to them. \"You'll work for us, and in exchange, you'll get a place to stay. But you'll work. All the time. And this isn't an offer. I've stated this. If you don't like it, you can swallow a bullet. So! Happy new volunteers! Let's get going, shall we?\" He claps once and chuckles.\n\n\"I'll choose the latter. I don't fancy getting enslaved, sorry. If you can sleep at night for killing an old lady just because she didn't want to get enslaved, go ahead. World's bad as it is already, I'm not going to work myself to death. Do what you must,\" the older lady mumbles, shaking her head slowly.\n*page_break\n\nYou release the trigger as she falls back on the counter. You aim at the man next to her, currently standing there shocked. \n\n\"Don't be rude. Accept the generous offer.\" You grin and step closer to him. He buries his head in his palms but walks closer. You lower your pistol and tell him to follow you. He steps between you and ${capturer1}, sobbing and shaking quietly. You keep your pistol ready as you walk back to ${base}. \n\nIt's heavily guarded, and a couple more watchtowers stand with heavily reinforced fences. You step into the decontamination chamber. The process is faster and quieter than it was before. You step out and stretch your arms as ${capturer1} turns to you and grips the man's shoulder.\n\n\"I'll assign our new slave to his new position. I'll be up in a second. Do whatever it is we had planned today. Honestly, I don't remember, but if I want to be extra honest, I don't even care.\" He chuckles and takes his gas mask off. \"Get moving.\" He shoves the man towards the metal door at the end of the lobby, then follows him.\n\nYou take your gas mask off and head upstairs to the office next to ${capturer1}'s, where you put your gas mask down on the dark brown dirty table along with your pistol. You sit down in the dark-red office chair with tape holding the soft back part together. You put your feet up on the table and lean back, staring out the reinforced window. \n\nYou hear a knock on your door, then a young boy enters. He's wearing blue jeans and a black tracksuit top. His clothes are very dirty, and splattered blood is dried on them. He looks nervous and shy, but he takes a seat in front of you on the creaking wooden chair.\n*page_break\n\n\"So…anything interesting happen today?\" You glance from him to the window. \"How do you like scavenging so far? You get to face danger, kill things, and explore places we don't own…yet.\" \n\n\"It's…cool. I guess. I shot someone today. It felt…weird,\" he mumbles as he tries to rub the blood off his fingers.\n\n\"Very good. Don't worry, the feeling will pass. It's kill or be killed out there. There are no rules anymore. It's survival of the fittest. Do you get that?\" You crack your knuckles.\n\n\"Yeah, I get it. We brought back lots of stuff, too.\" He nods and glances at your pistol. \"What's carved into it?\"\n\n\"My name and the amount of kills I've gotten with it. And I'm not counting mutants. Maybe if you end up by my side, I'll pass it on to you. But you have to be loyal to me. I have to know I can count on someone who's got my back. Someone I have on my side to go against the world with. We can have that together. We could be kings of the world. You only have to report everything that happens, both inside and outside. Also, you have to trust and obey me. And only me. Fair deal?\" You run your finger along the '${firstname} - 28' carved into the silencer of your pistol.\n\n\"Yup. I'll be loyal, and I'll learn to shoot better. I like your gun a lot.\" He smiles and looks excitedly at it. \n*if (bradleydead)\n \"Who's ${bf1}? That name is carved into your silencer, too.\" He taps the table a couple of times.\n *goto fix\n \n*elseif (abbiedead)\n \"Who's ${bf2}? That name is carved into your silencer, too.\" He taps the table a couple of times.\n *goto fix\n \n*label fix\n\n\n\"A very special someone. The first person I killed with this beauty.\" You grip your pistol and spin it around with a wide grin on your face as you lean closer. \"You know, we're very much alike, you and I. You might not realize this yet, but trust me on this one. Keep up the good work, and good things will come to you. Like a place by my side when I take over the leadership here. Because trust me, kiddo. Change is about to come.\"\n\n*page_break\n*goto_scene ending\n", "lizzieend": "[b][i]Chapter 7 - No Two Snowflakes Are Alike[/i][/b]\n\nThe sun shines so bright, it makes the sky even more blue and the air shinier as it reflects back from the thick snow covering the ground. Even the dead, twisted trees look somewhat appealing with snow covering them. Pleasant cold air fills your nostrils as you crouch in all white in the snow. A white rabbit hops not far from you. It looks bigger, almost four times bigger than the ones you remember. It also has two brown, weirdly shaped horns and sharp fangs sticking out of its mouth. You flip your knife out and hold it by its blade. You raise it and swiftly throw it at the rabbit. The blade goes right through its head, sending it to the ground.\n*set Age +2 \n*set lizzieend true\n*achieve lizzieend\n\n\n[i]\"That's a good one. It's not much, but it'll make a nice dinner for us. At least you caught something.\"[/i] ${survivor3} sneaks over to you in all white too as you rip your knife out of it, leaving a bloody mess in the snow. You take a rope out of your pocket and wrap it around its paws, then stand up. You stop for a second to look around the bright, snowy forest. The harmony of the dark-brown trees, yellow bushes, and white snow brings a smile to your face. Fresh snow crunches under your boots as you make your way out of the forest.\n\nThe narrow road you arrive to leads through an empty, dead field. It still looks good, thanks to the thick layer of snow. After you walk and chat for a while, a big fence with barbed wire on top of it can be seen. You stop at the entrance when you see a tall, skinless creature stumbling slowly towards you. You flip your silenced pistol out, aim it swiftly at him, and pull the trigger several times until it falls back on the ground.\n\n[i]\"Another one. That's weird. It's the second one today. Imagine if they weren't slowed down by the cold. Nice shot, though.\"[/i] ${survivor3} unlocks the padlock on the chain that's holding the entrance shut. She locks it behind her, and you walk into the wooden house. You step into the living room that opens into the kitchen, then walk up the stairs into your room. You put your gear down next to your small bed. \n\nYou comb your hair back with your fingers and smile when you think about how long it's been since you had to wear a gas mask. You pick the rabbit up and walk down the stairs. You glance at the two dirty gas masks next to the two grey haz-mat suits with glass face protection hung up on the wardrobe. A sigh leaves your mouth as you walk towards the door on the other side of the room, leading outside.\n*page_break\n\nYou step out into the garden and find ${survivor3} sitting on a log. She's lighting a campfire, and you sit down in front of her on a log too, already passing the rabbit to her. [i]\"You'll have to learn how to cook things like this on your own. By a campfire, I mean.\"[/i] She skins the rabbit and sticks a piece of wood through it. She puts it above the campfire and lets the two branches hold it.\n\n\"I will, but you make the best roasted meat. And I'm hungry as hell.\" You smile and glance over the fence at the wreck of a helicopter, barely sticking out from under the snow. You look past that, far into the distance to see the district burning and glowing dark red, with everything that can be seen demolished.\n\n[i]\"I'm glad we got out when we did. Sometimes…I feel bad about tricking them like this. I often tell myself that it was the only way, that we had to release that nuclear attack on the whole district, but…sometimes it's hard. Hard for me to even believe it. I just…couldn't let them do research on you. We shouldn't have told them about your wound. But we showed them who's boss, right?\"[/i] She slowly spins the rabbit around. \n\n[i]\"And ${base} is gone, too. Along with the military. It's just us now. I don't think the other districts can find us here. Not until they realize that further up the air is breathable and start looking for places high enough. Let's just hope this mountain holds everything we need to last for a while. I don't think we can leave with the helicopter in a condition like that. And I don't fancy teaming up with anyone else again. I don't know about you, but I'm done with groups.\"[/i] She giggles slightly and looks at you. \n\n[i]\"Hey, is everything okay? You've never really told me how you like it here. This was the best I could come up with. I had to think of a plan, and fast. I know it's similar to the district. We have to hunt our own food, make our own…well, anything we want to build. But at least there are only a couple of mutants, and they can barely move in the cold anyway. And look at our house…I'd say we're making great progress. ${firstname}…everything I did, I did for you. And it's just us now, there's no one else we can trust or go to. It's just us…we're what's left, okay?\"[/i] She looks worried but forces a smile as she looks at you.\n\n\"Sure…we'll manage. Let's worry about what to do if something happens, when it happens. And…thank you for everything. There's always something. It might be hard, but we'll survive. We always did.\" You smile at her as the scent of roasted meat fills your nostrils, then glance down at the dark-red magma-like demolition of what's left of the district and wonder what tomorrow will bring.\n*page_break\n*goto_scene ending\n", "malcolmend": "[b][i]Chapter 7 - History Written In Gold[/i][/b]\n\n\"Good morning, sir. The others have already gathered around the table for breakfast. They're waiting just for you.\" A tall, thin male with ragged clothes pulls the blinds up, letting some sun shine onto you through the thick window. You climb out of your comfortable double bed in the middle of the neatly painted dark-red room. You walk to the table next to the big wardrobe at the far end of the room and find your clothes neatly folded on top of it. \n*set Age +2 \n*set malcolmend true\n*achieve malcolmend\n*achieve safe2\n\nThe thin male leaves the room before you get dressed. You walk to the window as you give your eyes a small rub and look outside. Most of the new district can be seen from your high-floor window. It's surrounded by a huge wall with a large number of watchtowers. The buildings are more or less repaired, and people walk by. On the other side of the wall is the demolished district you know well already, with mutants scattered about in the distance. You turn around with a yawn and leave your room. You walk through the hotel-like hallway and get into the elevator. The guards on both sides greet you, and you press the bottom button.\n\nThe electricity turns off a couple of times as you go down, but you're used to it by now. It emits a fading 'ding' sound, and the door opens on the bottom floor. You walk over the dirty red carpet out into the hotel lobby. The guards at the front door greet you, and you walk past them to the huge cafeteria, where another set of guards greets you at the entrance. You step inside and walk to the big, round, wooden table where people are already seated. You sit down next to ${leftsurvivor} and peek into the kitchen on the other side of the cafeteria. \n*page_break\n\n\"Morning, ${firstname}. How did you sleep?\" ${leftsurvivor} smiles at you.\n\n\"Good, I guess.\" You nod and look at the others sitting around the table. They chatter and laugh. They're adults, but their ages vary from young adult to elderly. Most of them are wearing jewelry and fancy clothes. They puff on their cigars as two younger men with ragged clothes put meals in front of everyone. They start feasting on the small amount of food, and you begin to eat along with ${leftsurvivor}. It doesn't take long to get through the small portion, but it feels good even though it didn't have much meat in it. The men come back and take the plates away.\n\nThe others chatter as a young figure about your age with dark, dirty clothes, a dark hoodie, and a bandana around ${hisher} face gets dragged in by a couple of guards. They all turn towards them with a confused look on their faces. The guards salute, then one of them clears his throat. \"We found this one sneaking inside. Probably a thief and not ${hisher} first time getting in. What should we do with ${himher}?\"\n\nThey look at each other and shake their heads, then turn to ${himher} with a disgusted look on their faces.\n\n[i]\"Get rid of ${himher}.\"[/i]\n\n[i]\"Yeah, to the pit with ${himher}.\"[/i]\n\n[i]\"Force ${himher} to work for us, that's the least he can do.\"[/i]\n\n[i]\"He'd just leave, are you out of your mind?\"[/i]\n\n[i]\"I vote on putting ${himher} down too.\"[/i]\n\nThey nod and turn towards the guards. \n*page_break\n\nThe young person frowns and clenches ${hisher} fists. After chuckling slightly, ${heshe} looks down as ${heshe} shakes ${hisher} head. After a couple seconds of silence, ${heshe} keeps looking down as ${heshe} speaks up quietly. \n\n\"Do you even hear yourselves…you discuss how to murder me like you're choosing which one of your fancy clothes to wear today. And put me down, really, like some rabid animal? The Pauper and Ignobilis districts are suffering, as they always have. It's filled with all kinds of horror. I only needed some supplies so we can survive another day.\" They keep looking at ${himher} as ${heshe} looks up at you. When ${heshe} meets your eyes, they widen, and ${heshe} fixes ${hisher} wet eyes upon you.\n\n[i]\"Heh, the Dives have always ruled for a reason.\"[/i]\n\n[i]\"If a nuclear attack couldn't destroy us, do you think you can?\"[/i]\n\n[i]\"Stealing isn't the way to go. It's been punished before, as well as now.\"[/i]\n\n[i]\"Let's just get this over with, ${heshe}'s wasting our time.\"[/i]\n\n[i]\"So, we all agree. This has to be dealt with.\"[/i]\n\nThey nod, and the guards begin to drag ${himher} away. They keep dragging ${himher}, and ${heshe} doesn't resist. Oddly, ${heshe} keeps looking at you with widened eyes and tears rolling down ${hisher} face onto ${hisher} bandana.\n\nThey reassure each other about their decision, then a fat woman looks from you to ${leftsurvivor}.\n\n[i]\"You two didn't really say anything.\"[/i]\n\n[i]\"Come on, we don't pick on one of our own.\"[/i]\n\n[i]\"I heard they're only here because ${leftsurvivor} here is some ex-high-ranking military personnel.\"[/i]\n\n[i]\"Is that really true?\"[/i]\n\n[i]\"I find that hard to believe, ${leftsurvivor} here is a good friend of mine, and the kid certainly means no harm.\"[/i]\n\nThey argue with each other for a little while, until ${leftsurvivor} stands up. \"That's not true…we both are Dives, and I've known him ever since he was born. He is a hundred percent Dive. Just like me. Come on, we've been here for a while now. Don't tell me you're beginning to have doubts now. At least us Dives stick together.\" He glances down at you from the corner of his eye.\n\n\"Yeah, we are Dives. And I feel a bit offended now.\" You sigh and glance back at ${leftsurvivor}. They look at each other, and some of them look confused.\n\n[i]\"All right, all right. Sorry about that.\"[/i]\n\n[i]\"Indeed, don't mind Caroline. Her manners can be a bit off. How about we play some darts and poker later, then hop into the jacuzzi afterwards?\"[/i]\n\n[i]\"Sounds reassuringly comfortable enough. With some champagne from the good old days.\"[/i]\n\n[i]\"No champagne for the kid, though, we'll find something else for him.\"[/i]\n\n[i]\"What they mean by this is an apology. We shouldn't argue with each other. Let's just enjoy what we have, and will always have. All right, let's meet in the game room in an hour.\"[/i]\n\nThey nod and drink their wine, then everyone gets up from the table, including the two of you. They walk towards the elevator. You walk after them, but ${leftsurvivor} pulls you back slightly, so you keep a good distance.\n*page_break\n\n${leftsurvivor} peeks over you at them as they get into the elevator and take the stairs. \n\n\"Okay, that was close. I don't fancy everything…okay, most of what they do. Some of them can be acceptable at times, or even cool. But…${firstname}…we got what we wanted. We don't have to wake up early, we don't have to obey anyone, we don't have to…risk our lives. I'm too old for that kind of stuff. And I'm sure that's not the life you want for yourself, either. We have everything we want here. Believe me, there's a reason why I left the military when I did. But pulling the strings I had was our only way out. Pulling off something like this was a great mental and physical challenge. Especially…leaving ${currentbf} behind. That kid back there…${heshe} was so like…\" He looks down and shakes his head.\n\n\"I'm deeply sorry, ${firstname}, I've already told you that a hundred times. I can't make that right, I know, but there were only two spots left. And I chose you. Doesn't that…mean something?\" He looks deep into your eyes. \"And…this is the time when I can finally say it was worth it. This is the life we've always wanted…and I think we deserve it. Hey, if the whole world gets you down, you can come to me, okay? I won't change. And I'm pretty sure you won't, either. After all we've been through, ${firstname}…let's just try to enjoy it, okay? Will you try?\" He smiles slightly.\n\n\"Yeah…sure. I will.\" You smile slightly.\n\n\"Thank you. I'm sure you'll come to terms with it, eventually.\" He ruffles your hair and wraps an arm around you. \"You know what? Let's beat them at darts. And poker too. Let's show them what we're made of. Let's beat them, and I'll let you take a sip of my champagne. Deal?\" He chuckles.\n\n\"Sure, sounds like fun.\" You laugh as you slowly walk out into the lobby with his arm around you, chatting and laughing on the way. \n\nNo matter how bad things are, ${leftsurvivor} can still draw a smile to your face. You can only hope that if nothing else, it's going to be enough. \n*page_break\n*goto_scene ending\n", "ryanend": "[b][i]Chapter 7 - Tyranny Of The Majority[/i][/b]\n\nShattered glass crackles under your feet as you approach ${base}. The guards pull the fence open, and you walk through with some others, escorting a couple of unarmed people. The guards greet you as you walk into the decontamination chamber. You don't even notice the process anymore. You step out into the lobby, where people are walking around and talking. The doors leading to the chambers and kitchen are both open. \n*set Age +2 \n*set ryanend true\n*achieve ryanend\n\n\"All right, we have four more survivors, one slightly wounded. Do the usual process of checking them. And treat them the same, as well. Then they can take their places,\" you say as you walk up to an old-looking male with a guard uniform on. He nods and escorts the survivors through the open doors.\n\n${currentbf} waves at you from the corridor in ${hisher} guard uniform, holding ${hisher} pistol proudly. You wave back and take your gas mask off. After letting out a big sigh, you walk upstairs into the office you know well. You knock a couple of times, then enter and take a seat.\n\n[i]\"${firstname}. You're back, good. It seems the marching duty will change every week now. Also guard duty. And people working at the powerplant want days off, along with the greenhouse.\"[/i] ${leftsurvivor} sighs and rubs his eyebrows. [i]\"You know…I worked hard to get this society working nice and democratically. Taking it over was hard enough…and thanks again for helping. That's why you're the leader of the 'ones with guns.' Remember when we took over, and people were amazed? They praised us. Now they refuse to work, and they whine…act like the world isn't over. I mean, how many hours of free time did they even have with ${capturer1} and his guards watching them? Hmm? Now they have one every week, and there are even shifts and schedules to exchange with each other. What more can I give them, huh? Tell me, ${firstname}, what more can I give? I feel like my plan to save this district is slowly…just fading away.\"[/i] He shakes his head and buries his head in his palms.\n\nYou put your hand on his forearm. You're about to speak up to try and comfort him when you begin to hear voices chanting and shouting behind you. He uncovers his face and slams his fists on the table. \n\n[i]\"Wanna guess what that is? Another damned riot. But I won't stand for it any longer!\"[/i] He stands up and pulls open a drawer. A big brown pistol slides out, and he stuffs it into the back of his jeans. He slams the drawer shut, and something shatters on the ground. He storms out, smashing the door open. You stand up and look at the shattered whiskey bottle as its scent fills the room. \n*page_break\n\nYou fix the silenced pistol in your waistband, then walk out of the room after ${leftsurvivor} to help him, out into the noise. Without looking back, you give the door a slight pull. It slowly closes behind you, trapping silence in the dark room. ${currentbf} stands by the guards at the bottom of the stairs, holding the shouting people back from going up the stairs. ${leftsurvivor} stands on the middle of the stairs, clenching his fists and sweating with a frustrated look on his face. You take a deep breath and walk next to him. \n\n\"Everything will be fine. We'll manage, whatever happens. We always do,\" you whisper to him, then turn towards the crowd. They're trying to push through the guards as they point and shout at ${leftsurvivor}.\n\n[i]\"I know that…I damn well know that…but they don't. Besides…what could go wrong, right?\"[/i] ${leftsurvivor} grips the handle of his brown pistol and takes a few steps down the stairs.\n*page_break\n*goto_scene ending\n", "screenshots": "screenshots!\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Firstname \"Kieran\"\n*set Lastname \"Lyfeld\"\n*set Name (Firstname&\" \")&Lastname\n*set Clothing 1\n*set Rep 1\n*set Gasmask true\n*set Books true\n*set idcard true\n*set Cheekwound true\n*set Abbie 20\n*set Bradley 37\n\n\nAs you arrive at the school, you sigh at the sight of the barbed fence surrounding it. The extreme amount of guards patrolling around it are upsetting too. You're approaching the barbed fence surrounding your school's entrance when a familiar face smiles at you from the school hallway. ${bf1}, your oldest friend, and your new friend, ${bf2}.\n\nYou smile back and are about to make your way inside when a hand on your shoulder from behind stops you at the entrance.\n\n\"You've been selected for a random search. Step aside and put your hands on the wall,\" a firm voice says and gives you a slight push.\n*fake_choice\n #\"What do you think I'm hiding? A gun?\"\n #Cooperate.\n #Resist.\n\n*script changeBackgroundColor(\"black\")\n \n*set Firstname \"George\"\n*set Lastname \"Lyfeld\"\n*set Name (Firstname&\" \")&Lastname\n*set Clothing 1\n*set Rep 1\n*set Rep2 1\n*set Rep2_2 1\n*set Evil -8\n*set Gasmask true\n*set Books true\n*set Pistol true\n*set idcard true\n*set Cheekwound true\n*set Abbie 25\n*set Bradley 23\n*set Ivan 17\n\"${Lastname}? I know a couple of fellows back at the base named that.\" Your heartbeat quickens when you hear that, and you can't help but smile widely under your gas mask.\n\nHe bursts out laughing. \"Ha! Just kidding. The majority of the population died when the bombs fell. Those who were lucky enough to have their own packed shelter, or could run fast enough to the nearest one, of course, survived. I guess I don't have to tell you how rare it was to have your own shelter. Even I had to, you know, kindly ask my neighbour to let me in. Because I'm just that nice example of a human being. Don't lose faith though, they might still be alive. Or not. Oh, well.\" He shrugs and keeps laughing as you walk through a dark alley. You clench your fists, and your smile fades quickly. Your feet get stuck every now and then in something sticky, but you still manage to step over a couple of rotting animal corpses. Some of them look bigger than they should be.\n\nHe glances back at you again. \"Watch out for that slime under your feet. Don't let it touch your skin. Let alone its owner, or you might end up like them.\" He chuckles, then peeks back at you. \"No hard feelings, right? It was a harmless joke. A good one at that, you must agree.\"\n*fake_choice \n #\"It will be funny when I kill you.\"\n #\"Yes, it was.\"\n #Remain silent.\n\n*script changeBackgroundColor(\"sepia\")\n \n*set Firstname \"Zack\"\n*set Lastname \"Lyfeld\"\n*set Name (Firstname&\" \")&Lastname\n*set Clothing 2\n*set Rep 1\n*set Rep2 1\n*set Rep2_2 1\n*set Rep3 1\n*set Rep4 0\n*set Rep5 1\n*set Gasmask true\n*set Books true\n*set Pistol true\n*set Knife true\n*set Maskfilter 1\n*set Magazine 2\n*set idcard true\n*set Slimerwound true\n*set swolleneye true\n*set inform true\n*set inform2 true\n*set Evil 83\n*set Malcolm 46\n*set Abbie 23\n*set Bradley 65\n*set Carl 6\n*set Ivan 13\n*set Lizzie 34\n\"So, this is my chamber. Make yourself at home. I don't know if you've had the chance to have sleepovers before…all this happened, but this just feels like one.\" She laughs and drops her backpack. \"Let me take a shower before I show you around, okay? It won't take long,\" she says as she walks into the bathroom and closes the door behind her.\n\nYou take a seat in one of the white chairs and hear the sound of splashing water for a while. You whistle a little and look around the room. You imagine how amazing it would be if the TV worked. As you keep looking around in slight boredom, you glance at ${survivor3}'s backpack. Its zipper is slightly open.\n*fake_choice\n\n #Go through her backpack.\n #Leave it alone.\n\n \n \n \n \n \n*set Firstname \"Zack\"\n*set Lastname \"Lyfeld\"\n*set Name (Firstname&\" \")&Lastname\n*set Clothing 2\n*set Rep 1\n*set Rep2 1\n*set Rep2_2 1\n*set Rep3 0\n*set Rep4 1\n*set Rep5 1\n*set Gasmask true\n*set Books true\n*set Pistol true\n*set Knife true\n*set Maskfilter 2\n*set Magazine 1\n*set idcard true\n*set Wackwound true\n*set swolleneye true\n*set inform true\n*set inform2 true\n*set Evil 32\n*set Ryan 75\n*set Abbie 69\n*set Bradley 20\n*set Carl 5\n*set Ivan 42\n*set Lizzie 35\nRyan aims his gun at the creature and pulls the trigger. It clicks a couple of times, but nothing happens. He tries to get to his backpack, but it seems to be out of reach. He looks at you and freezes, then takes the empty magazine out of his pistol. You smash the backpack from your back to the ground and begin to dig deep in it. You feel a single magazine remaining at the bottom of your backpack. You grip the last one tight, then look at him. \n*fake_choice\n\n #Give the magazine to him.\n #Keep the magazine for myself.\n\n \n \n\n*set Firstname \"Markus\"\n*set Lastname \"Lyfeld\"\n*set Name (Firstname&\" \")&Lastname\n*set Clothing 3\n*set Rep 1\n*set Rep2 1\n*set Rep2_2 1\n*set Rep3 0\n*set Rep4 1\n*set Rep5 1\n*set Gasmask true\n*set Books true\n*set Pistol true\n*set Knife true\n*set Maskfilter 2\n*set Magazine 2\n*set idcard true\n*set Wackwound true\n*set swolleneye true\n*set inform true\n*set inform2 true\n*set Evil 65\n*set Ryan 42\n*set Abbie 13\n*set Bradley 43\n*set Carl 8\n*set Ivan 23\n*set Lizzie 46\nIn a pile of blood, a little girl without a gas mask sits with her back to you. She hugs a headless teddy bear and hums quietly as she rocks back and forth. ${survivor3} looks at you and leans closer. \n\n\"I think we both know this type, but…I just can't do this now. I can't. I'll let you decide whether you want to do it or not. I'll be at the other door. Just make it quick if you decide to…you know.\" She turns around. You glance back and see her leaning on the other door with her forehand against it. You glance back at the little girl on the floor.\n*fake_choice\n\n #Kill her.\n #Spare her.\n  \n\n\n*set Firstname \"Chad\"\n*set Lastname \"Lyfeld\"\n*set Name (Firstname&\" \")&Lastname\n*set Clothing 4\n*set Rep 1\n*set Rep2 1\n*set Rep2_2 1\n*set Rep3 1\n*set Rep4 0\n*set Rep5 1\n*set Gasmask true\n*set Books true\n*set Pistol true\n*set Knife true\n*set Maskfilter 2\n*set Magazine 2\n*set idcard true\n*set Cheekwound true\n*set Slimerwound true\n*set swolleneye true\n*set markedwound true\n*set inform true\n*set inform2 true\n*set Evil 32\n*set Malcolm 66\n*set Abbie 16\n*set Bradley 69\n*set Carl 16\n*set Ivan 13\n*set Lizzie 56\n\"We can do this the easy way or the hard way. You decide which one it is. I prefer the hard way, because, oh boy, it would just fill the room with excitement. The easy way, you stay put and let me do my thing. The hard way is, you struggle and fight back, and I'll be forced to calm you down. I have my ways.\" He winks as he pours some of the brown liquid on your chest, then holds the tip of the knife against your throat. He smirks and slides it down your chest. \"You know what? I'll just do my thing, and we'll see which one you choose.\"\n\nHe grips your shoulder with his other arm and sinks the tip of the knife into the right side of your chest. He moves it down, leaving a small bleeding line. He chuckles and continues to make small cuts on your chest. It sends a sharp pain down your chest, and you move a little uncontrollably. You breathe hard as you feel the sharp knife cutting through your skin.\n*fake_choice\n #Fight back.\n #Sit still and endure.\n \n \n \n \n\n*set Firstname \"Chad\"\n*set Lastname \"Lyfeld\"\n*set Name (Firstname&\" \")&Lastname\n*set Clothing 5\n*set Rep 1\n*set Rep2 1\n*set Rep2_2 1\n*set Rep3 0\n*set Rep4 1\n*set Rep5 1\n*set Gasmask true\n*set Books true\n*set Pistol true\n*set Knife true\n*set Maskfilter 2\n*set Magazine 1\n*set idcard true\n*set Cheekwound true\n*set Wackwound true\n*set swolleneye true\n*set markedwound true\n*set trapperwound true\n*set inform true\n*set inform2 true\n*set Evil 86\n*set Abbie 4\n*set Bradley 6\n*set Carl 20\n*set Ivan 46\n*set Lizzie 54\n*set Ryan 43\n\"What are you doing?\" You hear whispering behind you. You turn around and find ${leftsurvivor} quietly sitting up in his bed and looking at you. \"I don't know what it is that you want to do, but you can't get out. Make enough noise, and ${capturer2} comes down to punish you…if not ${capturer1}. So just go back to bed. Unless…there's something shady going on between you and ${capturer1}.\"\n*fake_choice\n #\"I have to kill ${capturer2}.\"\n #\"Mind your own business.\"\n *selectable_if (Ryan >= 47) #Convince him to do it for me.\n #Go back to bed and wait some more.\n \n  ", "startup": "*title Doomsday On Demand\n*author Norbert Mohos\n*scene_list\n  ch1\n  ch2\n  ch3\n  ch3_2\n  ch4\n  ch4_2\n  ch5\n  ch5_2\n  ch6\n  ivandeathending\n  survivordeathending\n  lizzieend\n  ryanend\n  malcolmend\n  aloneend\n  ivanend\n  deathend\n  ending\n\n\n*create Firstname \" \"\n\n*create Lastname \" \"\n\n*create Name \" \"\n\n*create Age \"10\"\n\n*create Wearing \" \"\n\n*create Clothing \"0\"\n\n*create Clothes \" \"\n\n*create Backpack \" \"\n\n\n\n\n*create inform false\n\n*create inform2 false\n\n*create Slimer \"Formerly a frog, now a big slimy creature with six legs and acidulous saliva.\"\n\n*create Wack \"Once human, now a tall creature without any skin, with an obsession about sharp objects.\"\n\n*create Aviatrix \"A combination of a ray and an eagle, with deadly claws and a tail ending in a sharp, deadly spear.\"\n\n*create Theurgist \"Young kids who drive you insane. Not much known about them.\"\n\n*create Trapper \"They lurk in the dark and corner their targets. Also not much known about them.\"\n\n*create Unknown \"An unknown mutant who plays with the victim's minds, using deception.\"\n\n\n\n\n\n\n*create Gasmask false\n\n*create Filters false\n\n*create Maskfilter \"0\"\n\n*create Magazine \"0\"\n\n*create Books false\n\n*create Pistol false\n\n*create Knife false\n\n*create evil \"50\"\n\n\n\n*create Wound \" \"\n\n*create Cheekwound false\n*create Nosewound false\n*create Swolleneye false\n*create Wackwound false\n*create Slimerwound false\n*create Bonewound false\n*create Markedwound false\n*create Leftsurvwound false\n*create Helpedmutilate false\n*create Chestwound false\n\n\n\n*create bf1 \"Bradley\"\n*create bf2 \"Abbie\"\n*create survivor1 \"Malcolm\"\n*create survivor2 \"Ryan\"\n*create currentbf \" \"\n*create leftalonebf \" \"\n*create leftsurvivor \" \"\n*create deadsurvivor \" \"\n*create survivor3 \"Lizzie\"\n*create survivor3bro \"Raymond\"\n*create survivor3family \"Blackwood\"\n\n*create Bradley \"30\"\n*create Abbie \"30\"\n*create Malcolm \"15\"\n*create Ryan \"15\"\n*create Lizzie \"15\"\n\n*create teacher1 \"Shannon\"\n*create classmate1 \"Peter\"\n*create classmate2 \"Philip\"\n\n*create capturer1 \"Ivan\"\n*create capturer2 \"Carl\"\n*create capturer1dead false\n*create capturer2dead false\n*create Ivan \"10\"\n*create Carl \"10\"\n*create threaten false\n*create base \"Arkadios\"\n\n*create Reputation \" \"\n\n*create Rep \"0\"\n*create Rep2 \"0\"\n*create Rep2_2 \"0\"\n*create Rep3 \"0\"\n*create Rep4 \"0\"\n*create Rep5 \"0\"\n\n*create bunk \" \"\n\n*create encounterleft \"both\"\n*create gmaskproblem false\n*create idcard false\n*create goal \" \"\n*create tiffanyknow false\n*create ryanblamed false\n*create ivanliked false\n*create knifeexperience false\n*create reportedtimes \"0\"\n*create report1 false\n*create report2 false\n*create report3 false\n*create report4 false\n*create report5 false\n\n*create lockpick false\n*create flaregun false\n*create leftsurvtoldtobe \" \"\n*create wentthrough false\n*create tookknife false\n*create lizzieshotorder false\n*create triedwhiskey true\n*create militarytold \" \"\n\n\n\n\n*create bfpromise false\n*create lizziebase false\n*create emptymag false\n*create shotillusion false\n*create trapperwound false\n*create wentinside false\n*create wentinsides \"0\"\n*create warehouse false\n\n\n\n*create killedcarl false\n*create leftsurvkilledcarl false\n*create helpedcarl false\n*create deadcarl false\n*create drewgunonleftsurv false\n*create ivandead false\n*create lizziedead false\n*create ryandead false\n*create malcolmdead false\n*create bradleydead false\n*create abbiedead false\n*create deadend false\n\n\n*create died false\n*create aloneend false\n*create ryanend false\n*create malcolmend false\n*create ivanend false\n*create lizzieend false\n\n\n\n\n*create satwithbradley false\n*create satwithabbie false\n*create resist1 false\n*create resist2 false\n*create resist3 false\n\n\n\n*create hisher \" \"\n*create heshe \" \"\n*create himher \" \"\n\n*create leftsurvstabbed false\n*create endleftsurv false\n\n\n\n\n*achievement bday visible 10 Birthday!\n A special day.\n Today is your 12th birthday. What could go wrong?\n\n*achievement meetem visible 10 New people\n Meet some new people.\n Meet Ivan and Carl.\n\n*achievement threaten hidden 25 Intimidating\n Hidden\n Threaten Ivan to kill him the first day.\n\n*achievement bradleybf hidden 20 Friendship with Bradley\n Hidden\n Pick Bradley as your best friend.\n\n*achievement abbiebf hidden 20 Friendship with Abbie\n Hidden\n Pick Abbie as your best friend.\n\n*achievement meetthem visible 10 New guy\n Meet people with a similar fate.\n Meet Malcolm and Ryan.\n\n*achievement parents hidden 20 Goal to find your parents\n Hidden\n Set your goal to find your parents.\n\n*achievement safe hidden 20 Goal to find a safe place\n Hidden\n Set your goal to find a safe place.\n\n*achievement murder hidden 20 Goal to kill Ivan\n Hidden\n Set your goal to kill Ivan.\n\n*achievement malcolm hidden 20 Saviour of Malcolm\n Hidden\n Save Malcolm from the Slimer.\n\n*achievement ryan hidden 20 Saviour of Ryan\n Hidden\n Save Ryan from the Wack.\n\n*achievement lizzie visible 10 A rough start\n Meet someone new.\n Meet Lizzie.\n\n*achievement parentgoal hidden 25 Find your father\n Hidden\n Complete your goal of finding your parents.\n\n*achievement thief hidden 20 Thief\n Hidden\n Steal Lizzie's knife.\n\n*achievement report hidden 20 Snitch\n Hidden\n Report to Ivan every time.\n\n*achievement carl hidden 20 Murderer\n Hidden\n Kill Carl.\n\n*achievement killedivan hidden 20 A promise is a promise…\n Hidden\n Kill Ivan as promised.\n\n*achievement carlfree hidden 20 Still a saviour\n Hidden\n Help Carl escape.\n\n*achievement friend hidden 25 A friend in need\n Hidden\n Save Lizzie.\n\n*achievement friend2 hidden 25 A friend in need…\n Hidden\n Let Lizzie die.\n\n\n\n*achievement safe2 hidden 20 Safe\n Hidden\n Find a safe place where no harm can find you.\n\n\n*achievement malcolmend hidden 30 Dive\n Hidden\n Ending 1 - Live a rich, problem-free life with the Dives.\n\n*achievement ryanend hidden 30 Co-Leader\n Hidden\n Ending 2 - Rule a democratic Arkadios with Ryan.\n\n*achievement lizzieend hidden 30 Safe in the mountains\n Hidden\n Ending 3 - Live peacefully with Lizzie after destroying the district.\n\n*achievement aloneend hidden 30 Alone\n Hidden\n Ending 4 - Fend for yourself on your own.\n\n*achievement deathend hidden 30 Dead\n Hidden\n Ending 5 - Death.\n\n*achievement ivanend hidden 30 Leader\n Hidden\n Ending 6 - Lead Arkadios and the district in an autocratic way with Ivan.\n\n*achievement finalend hidden 50 End Of Journey\n Hidden\n Finish the game.\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Survive in the demolished district after the nuclear bombings. Face mutants born of the nuclear radiation, while dealing with what humans are left in the struggle for the hope to end your living nightmare. Decide who you'll trust, and overcome the challenges that await you.\n\n  \"Doomsday on Demand\" is an interactive novel by Norbert Mohos. Your choices control the story. It’s entirely text-based—102,000 words, without graphics or sound effects–and fueled by the vast, unstoppable power of your imagination.\n\n  • Enjoy a 102,000-word novel filled with action, drama, and tough decisions.[n/]\n  • Face deadly enemies, varying from humans to mutants.[n/]\n  • Learn to overcome and adapt to the danger that lurks around every corner.[n/]\n  • Decide who you'll trust. Build and strengthen friendships or make enemies.[n/]\n  • Choose your personality. Let your conscience guide you to goodness, or turn evil and only look out for yourself.[n/]\n\n  *if choice_is_steam\n    *if choice_is_advertising_supported\n      [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2018-06-28 $4.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n    *goto purchased\n  *else\n    *if choice_is_advertising_supported\n      [i]Doomsday on Demand[/i] is supported by advertisements, but you can buy the unlimited version\n      to turn off the ads forever.\n\n      *purchase adfree $4.99 purchased\n      *page_break_advertisement\n\n      *goto purchased\n    *else\n      [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n      *purchase adfree $4.99 purchased\n      *page_break Play Now for Free\n      *goto purchased\n\n*label purchased\n", "survivordeathending": "*if (wackwound)\n You're walking barefoot on the wet roof of a huge building. Your stomach rumbles with hunger as noises come from inside the building. You walk to the intact window on top of the warehouse and peek down. A man with a university jacket holds his SMG, and a younger boy with a black-and-red long-sleeved shirt stands next to him. You grip the long, thin knife and stomp through the window. It explodes, sending glass shards flying everywhere. You kick the young boy in the head as you land inbetween them, sending him to the ground.\n\n The SMG falls out of the man's hands, and he quickly backs away when he sees you. You step on his SMG, shattering it to pieces. He keeps backing away as you grip the thin knife tight. He takes a knife out and waves it around your direction as he continues to walk backwards. He backs against a wall and waves the knife around at you. With a loud growl, you smack it out of his hands and grip his neck tightly. He feels very light as you push him up against the wall, just like a ragdoll. The man desperately gasps for air. The sight makes your stomach rumble even more. You let out a big grunt and raise your sharp knife.\n \n A scream echoes in your ears. A second later, a knife gets stuck into your neck, sending horrible pain throughout your body. You fall loudly on the ground as blood splatters around. The man slides down the wall and gasps for air as the young boy attends to him. Anger fills your body as you hold the long, sharp knife. You sit up in a pool of blood and push the knife through his stomach with all your strength. He gasps and falls to the ground as you pull your knife out. With a loud grunt, you raise it and get ready to strike again.\n \n The man jumps up and rips the knife out, then sinks it deep into your neck a couple of times. Blood drips down your neck as you fall back and feel the life fading from your eyes.\n *goto wakeup\n\n*else\n You're lying down and growling quietly in a dark, empty room. The wall next to you has been destroyed. That's where you came in. Mumbling can be heard at the other end of the room, on the other side of a small, red door. Eventually, it opens and an older-looking male with grey hair and a camouflage shirt walks in, then closes the door behind him. With your stomach rumbling loudly, you get up in the darkness and walk towards him. \n\n When you're close enough, he looks up at you. He gasps and backs up against the red door. You raise your big, slimy arms and smash them against the door as he bends down to avoid you. You send the red door flying, out into a dark warehouse corridor. The man backs up against a wall, and you slowly walk towards him with outstretched arms. Your stomach rumbles loudly, and you can't wait to take a bite out of him. You raise your arms once again, ready to strike.\n\n A scream echoes in your ears. You turn to your right and catch sight of a young boy with a black-and-red long-sleeved shirt jabbing a knife deep into your neck. You scream in pain and fall to the ground, a pool of black blood forming around you. You struggle as the young boy walks closer to the man. You collect saliva in your mouth as they mess around. When the boy turns around, you spit the acidulous goo at him. With all your strength, you collect some more saliva as he falls back on the ground. \n \n You're about to spit again when the male jumps in front of you. He rips the knife out of your neck, sending horrible pain throughout your body. He strikes a couple of times, sinking the knife deep into your neck. Saliva drips down your chin as you feel the life fading from your eyes.\n *goto wakeup\n\n\n\n\n*label wakeup\n*page_break Wake up…\nYou hear a fading voice somewhere in the distance. Somehow, it feels calm to stay in whatever position you're in. Your legs and arm hang down. You're not yet fully awake, nor do you want to open your eyes. Horrible, dull pain strikes your whole top-left side. \"Wakey, wakey. I don't fancy losing two underbosses in two days. That would make my statistics look bad.\" You slowly open your eyes and glance up to see ${capturer1} sitting next to you in his armchair, spinning both his pistols around in a fancy way. You blink a couple of times and notice you're on the table in his office.\n\n\"There you go. I was about to pour some of the magic stuff on you. Whiskey.\" He grins and takes a sip from the small bottle, which is almost empty. \"You should feel special, kiddo, I wasted most of the stuff to clean your wound. No problem, by the way, no need to thank me. I just saved your life for the third time now. But who's counting, right? Anyway! Up you go. We have work to do.\" He claps and jumps to his feet. He grabs your forearm and pulls you up into a sitting position. \n\nYou begin to feel dizzy, and it feels hard to focus. You sweat heavily, and your mouth feels as dry as ever. You give your head a slight rub and get off the table. Your legs and arms feel weak and shaky, but you manage to keep your balance. \"Let's get to work, ${firstname}. We have a lot to do. Chop chop!\" he says and walks swiftly out of the room, slamming the door open. You give your wound a small rub and follow him.\n\nYou walk down the stairs and stop next to him to find guards marching out after one another. \"This is where everything starts, ${firstname}. And we'll do it together. You're my wingman now. And I expect you to act like one. Pull the trigger when you have to. I won't do it for you. That's why I've prepared a surprise for you. Come!\" he says as he walks through the lobby. You follow him until you reach the basement. He unlocks the padlock and climbs down the ladder. You climb down after him and freeze at the bottom of it. You see ${leftsurvivor} and ${currentbf}, tied up and on their knees.\n\n\"I think the situation here is obvious. Or, isn't it?\" He grins. \"You'll kill one of your buddies, and I'll let the other one go. And I've overdone it here, believe me.\" He hands you your pistol and steps back with crossed arms. You look at both of them. They kneel next to each other with tied arms and tape over their mouths. They look at you and mumble as they shake their heads. \n\n\"I don't want to ask you again,\" ${capturer1} mutters behind you. Still feeling very dizzy and sick, you grip the pistol and look at both of them.\n*choice\n\n #Shoot ${leftsurvivor}\n  *set ryandead true\n  *set malcolmdead true\n  *set Bradley %-50\n  *set Abbie %-50\n  *set rep3 0\n  *set rep4 0\n  *set Evil %+20\n  You slowly raise your pistol with a shaking hand and aim it at ${leftsurvivor}. His eyes widen, and he begins to mumble wildly. You keep squeezing the trigger until a loud gunshot echoes through the basement. Blood splatters on the wall behind him, and he falls back against it as blood runs down the wall from the wound in his head.\n \n  ${currentbf} drops onto his side and shakes wildly as he whimpers. You lower your pistol, and it slides out of your hand. \"Nice shot, kiddo. Right between the eyes.\" ${capturer1} chuckles and pats you on the back. \"Your pistol jumped out of your hand, though. I won't assume that you had some feelings towards them. Because you're loyal to me. Isn't that right, kiddo?\" He grins wide and picks up the pistol, then slams it into your hand.\n \n  \"You.\" He points to ${currentbf}. \"You can decide whether you want to join us, or leave forever. But if you choose the latter, we'll have a shoot-on-sight rule for you. And do thank me for my generosity. See? I'm not so evil. I gave you an ultimatum. So, what's it gonna be? Clock's ticking, and you don't want me deciding for you.\" He rips the tape off ${hisher} mouth and unties ${himher}.\n  *page_break\n \n  \"I—I'll stay…I guess.\" ${currentbf} carefully stands up with shaking limbs and wet eyes. Tears roll down ${hisher} cheeks as ${heshe} glances at ${leftsurvivor}. \"${firstname}…I…I thought…\"\n\n  \"Well, you thought wrong! Let's get going then!\" ${capturer1} turns around and pulls you slightly after him. ${currentbf} follows the two of you very slowly, ${hisher} head down and glancing back at ${leftsurvivor} every now and then. ${currentbf} sniffles and keeps wiping ${hisher} eyes on ${hisher} sleeve. \n  *goto ivancont\n\n\n #Shoot ${currentbf}\n  *set Ryan %-50\n  *set Malcolm %-50\n  *set rep 0\n  *set Evil %+30\n  *if currentbf = \"Bradley\"\n   *set bradleydead true\n   *goto shotcont\n  *else\n   *set abbiedead true\n   *goto shotcont\n   \n   \n   \n   \n   \n #Shoot ${capturer1}\n  *set Bradley %+30\n  *set Abbie %+30\n  *set Ryan %+30\n  *set Malcolm %+30\n  *set Evil %-30\n  \n  You look from ${currentbf} to ${leftsurvivor}. They look at you with a worried look on their faces. Still feeling very dizzy and sick, you grip the handle tight. As fast as you can, you turn around and aim it at ${capturer1}. He grabs your hand as if he had expected it, then punches you across the jaw with his other hand.\n  \n  You smack into the ground on your back and see your pistol flying to the other side of the basement. Your vision
