nally see, you look around as you lie on your stomach. The ground is covered with mud. Scraps, garbage, and waste lies everywhere. A huge fence stands behind you, separating the two sides of the highway. Rotten human and animal remains lie not far from you. They make your stomach rumble, but you try not to feel too nauseous.\n\nYou push yourself up to a kneeling position and gasp when your wound hurts as if hot knives were sticking out of it. Blood soaks through the bandage, and you can't help but give it a small rub. You carefully push yourself into a standing position, then look up at the highway. \n\nThe height sends a shiver down your spine, and you wonder how could you still be alive. You take a look around the dirty, muddy place, but can't see ${survivor3} anywhere. You make your way forward, towards the edge of the hill. It frightens you to even think about jumping down. You were lucky enough to survive this fall, and you don't want to try your luck with a height double or triple of it.\n   \nYou take one more peek down to see the wreckage of a helicopter and probably more mutated creatures chasing each other. You shake your head as a sign of saying no to yourself, then turn around. With a lack of any other opportunity, you make your way towards the fence.\n   \nThe fence has seen better days, but it still stands. Aside from the bent top side, it stands its ground even when you shake it. You notice it's not electrified by the fact that you're still alive. You see a huge round entrance behind the fence, like the ones leading to the sewers in the movies you've seen.\n\n*if (knife)\n\n Having no other option, you flip the knife out of your backpack and start cutting it. It takes a while, but eventually you cut a big enough hole for you to fit through.\n *goto lizziejumpcont2\n\t\n*else\n\n Having no other option, you begin to climb over the fence. It's slippery, and something warm and gooey gets stuck on your fingers. Eventually, you make it to the top and hurl yourself over. The fall stings your wound even more, and you see more blood dripping through the bandage.\n *goto lizziejumpcont2\n\t\n\t\n\t\n\n*label lizziejumpcont2\n*page_break\n\nYou stand at the huge opening, then walk inside the sewer. It's pitch black inside. You're making your way forward when your leg slips and you find yourself falling over, splashing into a pile of dirt. It doesn't hurt that much, but your wound is now bleeding heavily. \n\nThe pile smells so bad, you jump up and dust yourself off as quickly as you can. Slimy, sticky dirt gets stuck on your hands and clothes. Just thinking about what could be stuck on you sends shivers down your spine. Without hesitating much, you begin to walk, holding your wound with one hand. Water can be seen and heard running down next to you. It's not as dark anymore, but you still have to be careful where you step. Your feet get stuck in something every now and then, but you keep pushing through. \n\t\nLight gasping sounds catch your ears. You slowly take your pistol out and make your way towards the sound. You turn a corner and aim your pistol where the gasping sound is coming from.\n\n${survivor3} is sitting there, holding her throat and going through her backpack wildly. Some of her belongings fly out from the backpack. You lean closer and notice the cracked gas mask, the filter missing from it. She looks at you and breathes heavily. Her lungs make wild rattling sounds. She points at her gas mask and puts her hands together. You yank your backpack open and reach into the bottom of it.\n*if maskfilter = 2\n You feel both of the filters at the bottom. You grip one of them and look at her. \n *goto lizziejumpchoice\n*else\n You feel a single filter remaining at the bottom of your backpack. You grip the last one tight, then look at her. \n *goto lizziejumpchoice\n \n*label lizziejumpchoice\n*choice\n\n #Give the filter to her.\n  *set Lizzie %+8\n  *set Evil %-8\n  \n  You rip it out of your backpack and push it into her hands as fast as you can. She screws it in with tears in her eyes and bright-red cheeks, then breathes heavily and coughs wildly. She lays back with her hands on her chest. \n  \n  \"Th…thank you. You just saved my life. Literally. I saw the light.\" She chuckles and rubs a strip of white duct tape onto her gas mask where the crack is. \"I'm lucky this didn't break. Give me a couple of seconds to pick myself up off the ground. And stop shaking.\" She giggles, still breathing hard.\n  *goto lizziejumpcont3\n \n \n #Keep the filter for myself.\n  *set Lizzie %-8\n  *set Evil %+8\n  \n  You shake your head slowly and shrug slightly. Her eyes widen, and she digs deep into her backpack with both hands before she pours it all onto the ground. A filter falls out and rolls away. She jumps after it and screws it wildly into her gas mask, tears in her eyes. She rolls onto her back and pulls her knees up. She breathes heavily and coughs wildly.\n\n  \"I—I thought I'd die. For real. I saw the light. No thanks to you, though. You either didn't have a spare filter, which is dumb, or…\" She sighs and buries her head in her palms, then rubs a strip of white duct tape onto her gas mask where the crack is. \"Anyway, I'm lucky this didn't break. Give me a couple of seconds to pick myself up off the ground. And stop shaking.\" She laughs, still breathing hard.\n  *goto lizziejumpcont3\n \n \n*label lizziejumpcont3\n\n\"All right. I think I'm ready.\" She puts her belongings from the ground into the backpack, then pushes herself up off the ground. She pushes her palm against the wall as she begins to walk. \n\nYou glance at her as she tries to walk after you as fast as she can. \"I'm fine, just feeling a bit dizzy. Don't worry about me. Just go, I'll keep up. Let's find a way out of here.\" She stays by the wall and tries to keep up with you.\n\nYou walk through the dirty tunnel for a while, until the smell becomes so unbearable that you have to stop.\n\n\"Let's not throw up now. It would be challenging in a gas mask. And you don't want to take it off. Trust me,\" she says, still supporting herself with one hand against the wall. You take a second break, but keep moving. At the end of the tunnel, you see a ladder. It looks grey and dirty. Some steps are missing, and it seems to be a long way up. \n\n\"Well, I don't think I can give you a boost right now, no matter how hard I want to. Sorry, but you'll have to make this jump and climb up on your own.\" She pats your back.\n\nYou jump up a couple of times, then finally take hold of the sixth, unbroken step and pull yourself up. Your wound aches in pain, but you force yourself to climb your way up.\n*page_break\n\nYou climb the ladder and wipe the sweat off your forehead. It proves to be a difficult task with all the missing steps. Some fall out from under you as you step or grip them, but you manage. Around the halfway mark, you look down at ${survivor3}. She climbs slowly, stopping every now and then to lightly rub her head. Your wound burns in pain too, and blood sticks to your fingers when you touch the bandage. You look up and sigh as you continue to climb the long ladder.\n\nWhen you finally reach the top, you try to push the manhole open, but it doesn't budge. It takes all your strength, but it finally pops open with a loud creak. You climb up with shaking arms and fall onto your stomach. You crawl away and turn onto your back, panting on the cold, muddy ground. \n\nIt's getting dark outside; you sense that it's dusk already. You look to your right and see ${leftsurvivor} mending the wound on his leg. Blood drips from it, and he jumps a little. He puts his hand on the pistol laying next to him, then takes a deep breath and releases it.\n\n\"Damn. You scared me a lot. I'm glad you're in one piece, though.\" He slowly stands up and limps over to you, then helps you up.\n\n${survivor3} climbs out and lies against the wall as she pants heavily.\n\n\"You again…\" ${leftsurvivor} mumbles.\n\nDon't tell me it was my fault now. In fact…I don't know whose idea it was to wander to unknown places.\" She looks at your bloody bandage.\n\n\"Don't…mess with me. I'm not in the mood right now.\" ${leftsurvivor} limps closer to her.\n\n\"Oh, yeah? Test me. You're no match, even when I'm dizzy.\" She steps closer too, then looks from you to him. \"You should focus on getting back before the both of you collapse from blood loss. Tough guy.\" She shakes her head and turns around, then makes her way through the deep mud. \"See you tomorrow.\"\n\n\"Don't even think about it. We're done. For real.\" ${leftsurvivor} limps in the opposite direction. You jog after him, and eventually you arrive at ${base} before the sun goes down completely.\n*goto backinbasecont\n\n\n\n\n\n\n*label leftsurvjumpcont\n\nWith all your strength, you push yourself towards ${leftsurvivor}. When you arrive at the edge, he picks you up by your shoulders and throws you over, then jumps after you.\n\nTime seems to slow down as you get closer and closer to the jungle-like ground filled with huge plants. You hear shouting before you hit the ground, and then everything goes black.\n*page_break\n\nYou open your eyes and wipe the dirt off your gas mask. When you can finally see, you try to look around as you lie on your stomach. You are surrounded by huge trees, bamboo, and other plants you can't make out, but know that they shouldn't be a few feet tall. You push yourself up to a kneeling position and gasp when your wound hurts as if hot knives were sticking out of it. \n\nBlood soaks through the bandage, and you can't help but give it a small rub. You can finally see a little more from the kneeling position. In the jungle-like environment, you see scraps, garbage, and waste lying everywhere. A huge fence stands in front of you, separating the two sides of the highway. Rotten human and animal remains lie not far from you. They make your stomach rumble, but you try not to feel too nauseous.\n\nYou slowly push yourself into a standing position, then look up at the highway. The height sends a shiver down your spine, and you wonder how you could still be alive. You take a look around as much as you can in the jungle, but can't find ${leftsurvivor} anywhere. You make your way forward, towards the edge of the hill. You push the plants aside and look down. \n\nIt's frightening to even think about jumping down. You were lucky enough to survive this fall, and you don't want to try your luck with a height double or triple of it.\n   \nYou take one more peek down and see the wreckage of a train, surrounded by more mutated creatures chasing each other. You shake your head as a sign of saying no to yourself, then turn around. With a lack of any other opportunity, you make your way towards the fence.\n\nThe fence has seen better days, but it still stands. Aside from the bent top side, it stands its ground even when you shake it. You notice it's not electrified, by the fact that you're still alive. Behind it, you see a huge, rusty, half-demolished building with broken windows. Its metal doors dangle from the few screws barely holding in place.\n\n*if (knife)\n\n\n Having no other option, you flip the knife out of your backpack and start cutting a small hole in the fence. It takes a while, but eventually you cut a big enough hole for you to fit through.\n *goto leftsurvjumpcont2\n\t\n*else\n\n\n Having no other option, you begin to climb over the fence. It's slippery, and something warm and gooey gets stuck on your fingers. Eventually, you make it to the top and hurl yourself over. The fall stings your wound even more, and you see more blood dripping through the bandage.\n *goto  leftsurvjumpcont2\n\n \n*label leftsurvjumpcont2\n*page_break\n\nYou push the creaking metal door aside. Something slimy and gooey gets stuck on your fingers. Your footsteps echo as you walk inside the dark building. Huge pillars and machines are broken into several pieces. As you walk deeper inside, your leg slips and you find yourself falling over, splashing down into a pile of dirt.\n\nIt doesn't hurt that much, but your wound is now bleeding heavily. Dust and tiny rocks fall right onto your back. The pile smells so bad, you jump up and try to dust yourself off in disgust. The sticky, smelly dirt gets stuck on your clothes, and it sends a shiver down your spine. You hold your wound with one hand and feel blood dripping through the bandage. You look up and notice the huge hole in the ground you just fell through. \n\nCarefully, you make your way forward into the basement of the building. It's not as dark anymore, but you still have to be careful where you step. Your feet get stuck in something every now and then, but you keep pushing through. The narrow basement is separated by dirty water running down the middle. You stick to the wall and pass by a couple of concrete blocks, but there's mostly just dirt and rotten corpses. \n\nYou're stepping over a skeleton when gunshots echo through the basement. You start to run in the direction you heard them coming from. You hear shouting and loud growling as you get closer to the sound. When you turn a corner, you see ${leftsurvivor} crouching against a wall. A tall, skinless creature walks towards him from the other side, splashing the water in the middle high up into the air. ${leftsurvivor} aims his gun at the creature and pulls the trigger.\n\nIt clicks a couple of times, but nothing happens. He tries to reach into his backpack, but it seems to be out of reach. He looks at you and freezes, then takes the empty magazine out of his pistol and looks back at you. You smash your own backpack onto the ground and begin to dig deep in it. \n*if magazine = 2\n You feel both of the magazines at the bottom. You grab one of them and look at him. \n *goto leftsruvjumpchoice\n*else\n You feel a single magazine remaining at the bottom of your backpack. You grab the last one tight, then look at him. \n *goto leftsruvjumpchoice\n \n*label leftsruvjumpchoice\n*choice\n\n #Give the magazine to him.\n  *set Ryan %+8\n  *set Malcolm %+8\n  *set Evil %-8\n  *goto gavemag\n\n \n #Keep the magazine for myself.\n  *set Ryan %-8\n  *set Malcolm %-8\n  *set Evil %+8\n  *goto refusedmag\n\n\n\n*label gavemag\nYou pull the magazine out and throw it towards him. It flips a couple of times in the air. He leans to the side and catches it, then pushes it into his pistol with shaking hands. He cocks it, then aims the pistol at the creature as he falls onto his side. When he pulls the trigger, a gunshot echoes through the basement and the creature growls wildly.\n\nHe keeps pulling the trigger, and blood splatters everywhere until the pistol clicks, showing that it's out of bullets. The creature falls on the ground loudly. It throws itself around for a while, until it stops moving and its blood pours into the dirty water. ${leftsurvivor} lays on his back and pants heavily. \n   \n\"Th—thanks, kid. You saved my life. Literally. Goddammit, it was so close.\" He buries his face in his palms. \n*goto leftsurvjumpcont3\n\n   \n*label refusedmag\nYou sink the magazine back into your backpack and look at him. You shake your head slowly and shrug once. His eyes widen, and he looks at the creature already launching itself towards him. He pushes himself up and jumps towards his backpack. He slams hard next to it with a shout, then pours everything out of it. Its contents slide in every direction, along with a magazine. He crawls after it quickly and pushes it into his pistol. He turns around on his back and cocks the pistol.\n\nThe creature launches itself towards him. He pulls the trigger, and the gunshot echoes through the basement. He keeps pulling the trigger, and blood splatters everywhere until the pistol clicks, showing that it's out of bullets. The creature growls wildly and falls on the ground loudly. It throws itself around for a while, then stops moving, and its blood pours into the dirty water. ${leftsurvivor} drops back onto his back and pants heavily. \n\n\"I—I thought that was it for me. Goddammit, that was close. No thanks to you, though.\" He buries his face in his palms. \"Now, I'm not sure whether you didn't have any left, or just…well…doesn't matter.\" He takes a deep breath.\n*goto leftsurvjumpcont3\n   \n\n\n\n\n*label leftsurvjumpcont3\n\n\"Give me a couple of seconds to pick myself up off the ground. My legs are still shaking.\" He stands up slowly, gathers his belongings, then stuffs them back into his backpack. He limps towards you. Blood runs down his leg, leaving a trail of blood behind him. \n\n\"Don't worry. It's just a scratch. I'll be fine in no time. Let's just focus on finding a way out of here now. I'll keep up,\" he says and limps after you, hissing in pain a couple of times.\n\nYou keep going in the dark basement, and it gets harder for ${leftsurvivor} to walk. He holds his leg tight until you reach a grey ladder covered with moss. Several steps of it are missing, and it's a long way up. \"Sorry, kid, but I can't give you a boost now. It'll be hard enough to climb it on my own. You'll have to climb this one yourself.\"\n\nYou jump a couple of times, then finally grip the sixth, not-missing step and pull yourself up. You climb the ladder and wipe the sweat off your forehead. It proves to be a difficult task with all the missing steps. Some fall out as you step or grip them, but you manage. Around halfway, you look down at ${leftsurvivor}. He's climbing slowly, blood dripping from his leg. Your wound burns in pain too, and blood sticks to your fingers when you touch the bandage. You look up and sigh as you continue to climb the ladder.\n*page_break\n\nWhen you finally reach the top of the ladder, you push yourself up with shaking hands and fall onto your stomach. You crawl away and turn onto your back to pant on the cold ground. Dust fills the air as you pant in the same dark, cold building, but you don't mind that right now. After a while, ${leftsurvivor} falls next to you and pants too, with his knees pulled up.\n\n\"That was one hell of a climb. No time to rest, though. Let's go.\" He stands up and limps deeper into the darkness of the building.\n\nAfter a while, you find the exit. It's blocked by a metal shelf, but you push it away rather easily. The door itself stands, but it takes a lot of strength to open. Your wound is hurting badly now, but you give it all your strength and push on it. It opens with a loud creak, and you fall on the ground. You lie on your stomach and want to scream in pain. \n\nIt's getting dark outside, and you sense that it's dusk already. You look to your right and see ${survivor3} mending her cracked gas mask with a strip of white duct tape strip. She jumps a little when she sees you. She puts her hand on the gun laying next to her, then blows the air out.\n\n\"If only you knew how much you scared me. I'm glad to see you in one piece, though.\" She giggles and holsters her pistol, then stands and helps you up. ${leftsurvivor} limps out and looks at her. \"You again…\"\n\n\"Don't tell me it was my fault now. In fact…I don't know whose idea it was to wander to unknown places.\" She looks at your bloody bandage.\n\n\"Don't…mess with me. I'm not in the mood right now.\" ${leftsurvivor} steps closer.\n\n\"Oh, yeah? Test me.\" She steps closer too, then looks from you to him. \"You should focus on getting back before both of you collapse from blood loss. Tough guy.\" She shakes her head and turns around, then makes her way through the field. \"See you tomorrow.\"\n\n\"Don't even think about it. We're done. For real.\" ${leftsurvivor} walks in the opposite direction.\n\n\"You don't really have a say in this matter. Better put up with my presence soon.\" She shrugs and disappears into the dark jungle-like field.\n\n${leftsurvivor} mumbles a little and keeps moving in the opposite direction. You run after him as fast as you can, and eventually arrive at ${base}. Luckily, before the sun goes down completely.\n*goto backinbasecont\n\n\n\n\n*label backinbasecont\n*page_break\nBy the time you put your gear down and take your gas mask off, you've begun to feel very dizzy. The bandage is completely soaked with blood by now, and ${leftsurvivor} is still limping and leaving behind a small trail of blood. ${capturer1} comes down the stairs and fakes a yawn. \n\n\"Do you know what time it is, lads? You were almost too late. Again.\" He laughs and frowns a little, then looks from you to ${leftsurvivor}. \"You're making a mess, dude. Goddammit, can't I assign you two to a simple task? I mean, go out, get supplies, come back. Why is that so hard?\" He chuckles and walks down the stairs as he looks at you. \n\n\"Look at you. Wounded, again. I'm really starting to think you took my wounds and girls metaphor too seriously. Anyway, get down to sick bay. Now.\" He puts his hands in his pockets, then walks closer to ${leftsurvivor} and begins to talk with him. No matter how hard you'd like to, you can't make a word out.\n\nYou're happy you can drag yourself down to sick bay without fainting. You open its door, turn the lights on and climb onto the bed. The ceiling spins around and you begin to feel nauseous, constantly getting shivers.\n\nSweat is rolling down your forehead by the time ${capturer1} enters the room. \"Lookie there. One of us is as pale as this wall. And I'm sure it's not me.\" He chuckles and walks closer to you. \"All right, let me see what all the unnecessary fuss is about.\" He pulls the chair closer and sits down on it.\n\n*if (wackwound)\n \n He pushes your shirt up, then flips a sharp medical scissors out to cut the bandage open. When the bandage falls away, the strong black sun is staring back at you. It's a strong coal black. It throbs with every heartbeat, and blood pours out of the wound with every throb. \"Stop staring at it. You're upsetting the sun.\" He laughs and takes some chemicals, cotton wool, and bandages out. \n \n You lay your head back and look at the ceiling. He taps your arm. \"No, no…no resting now. You're going to watch this, so heads up.\" He grins, and you slowly lift your head to look at the wound again.\n *goto sickbaycont\n\n*else\n\n He pushes what's left of your sleeve up, then flips a sharp medical scissors out and cuts the bandage open. When the bandage falls away, you turn your head to the deformed, bleeding arm. The edge of the black sun is staring back at you. It's a strong coal black. It throbs with every heartbeat, and blood pours out of the wound with every throb. \"Stop staring at it. You're upsetting the arm.\" He laughs and takes some chemicals, cotton wool, and bandages out. \n \n You lay your head back and look at the ceiling. He taps your arm. \"No, no…no resting now. You're going to watch this, so heads up.\" He grins, and you slowly lift your head to look at the wound again.\n *goto sickbaycont \n\n*label sickbaycont\n*page_break\n\nHe pours something brown onto the cotton wool, then looks at you. \"All right, so this might sting a little. Just kidding, it'll hurt like hell.\" He chuckles and pushes it several times onto your wound. You don't know whether it sizzles for real, or you're just imagining it. You clench your teeth and close your eyes. It burns as if someone was poking your wound with hot needles. \"Nuh uh-uh, eyes open.\" As he continues cleaning your wound, he pulls your left eyelid open with one hand.\n \nAfter he's done with the cleaning process, he sews it shut. The black sun doesn't stop throbbing. You feel dizzier than before from having to look, but you push through. He whistles as he applies the bandage. When he's done, he stands up and puts the medical equipment away. Then, he walks closer to you and begins to talk. You can't hear what he's saying, and your vision goes blurry, then you don't see anything.\n\n\"Wakey, wakey,\" a familiar voice rings in your ears. You wake up with a horrible headache and a very dry mouth. Your wound is burning in pain, but it's better than it was before. You look up to see ${capturer1} standing next to your bed.\n\n\"You just have to misbehave every time, don't you? I told you to stay awake, and you just pass out on me.\" He chuckles and pats your wound a little. You hiss in pain, and he smirks. \"Better make the most out of your sleep tonight. You'll have to go scavenging on your own tomorrow.\"\n\nYour eyes widen, and he shrugs. \"Don't be so surprised. ${leftsurvivor} isn't feeling too well. Again. I think it has something to do with him disappointing me again. Oh well, he's getting reckless. And besides, it's better for you to practice doing it on your own. You know, he might grow out of it soon. And you never know what happens tomorrow. So get ready. And don't disappoint me. You know, I just hate being disappointed. I'll leave you to get your beauty sleep with that thought.\" \n\nHe grins wide and combs his hair back with his fingers, then stands up. He switches the lights off and leaves the room whistling.\n\nYou lie still in the dark room for a while with your eyes open, staring at the ceiling. You feel nervous about the following day. You don't know how much time passes until you fall asleep, but eventually you do.\n*finish\n", "ch5": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Doomsday on Demand[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase adfree $4.99 purchased\n  *delay_break 1200\n\n*label purchased\n\n[b][i]Chapter 5 - Scars Are Just Another Kind of Memory[/i][/b] \n\n*if (wackwound)\n \"W—why did you hurt Mommy?\" The little girl sits and sobs next to a tall dead woman with long, deformed limbs, lying on the ground. Her eyeballs are too big for her skull, and she stares at the ceiling. The skin on her face and limbs is melted and loose. You kneel over her with two bloody cans of beans in your hands, panting and staring at her. \n \n The little girl shakes her, and the canned beans fall out of your hand. Your ears ring as the little girl sobs and shakes her wildly. You drag the girl away from her. Tears roll down your face. You shove two of the three gas masks into your backpack, along with as much food and water as you can. You grip her hand and drag her up the stairs. \n \n She's still sobbing and trying to break free. When you reach the top of the stairs, the backpack falls out of your hand, and both of you stop for a moment as your lungs begin to burn. She drops to the ground, and you take the gas masks out. You overcome the horrible feeling of your lungs burning and put her gas mask on first, then your own. She pulls her knees up and buries her head in them, then wraps her arms around her legs. You take a look around the demolished house, then outside to see the destroyed district.\n \n You look away, take a deep breath, and smash the metal door shut. You put the backpack on your back and pick her up from the dusty floor, then begin to walk outside.\n \n \"Leave me alone, I hate you!\" She kicks the air and slaps your back.\n *goto cont\n\n\n*else\n You open your eyes to see light coming from the stairs. It reveals the mother kneeling over a taller man, holding two bloody cans of beans. \"W-why did you hurt Daddy?\" The little girl sobs and shakes him wildly. The man lies there with long, deformed limbs. His eyeballs are too big for his skull, and he's staring at the ceiling. The skin on his face and limbs is melted and loose.\n\n The little girl keeps sobbing and shaking him, and the canned beans fall out of the mother's hands. With tears rolling down her face, she walks to the shelves and puts two out of the three gas masks and as much food and water as she can into her backpack. She jumps up to grab the little girl's hand, then begins to drag her up the stairs. The little girl sobs and breaks free, running towards you. \n \n She picks you up, and the mother grabs her arm again to drag her up the stairs. When you reach the top, the backpack falls out of her hand, and both of them stop for a moment as they gasp and hold their throats. The little girl drops to the ground, and the mother takes the gas masks out. She seems to be suffering, but she puts it on the little girl first, then herself.\n \n The little girl pulls her knees up and buries her head in them, then wraps her arms around her legs. The mother takes a look around the demolished house, then outside to see the destroyed district. She looks away and takes a deep breath, then smashes the metal door shut. She puts the backpack down and sits next to the little girl on the dusty floor. She tries to wrap an arm around her, but she pushes her off and looks away.\n \n \"Leave me alone, I hate you!\" \n *goto cont\n\n \n \n \n*label cont\n*page_break Wake Up\n\nYou sit up in a pool of sweat, then lay back when your wound burns. \n\n\"Having nightmares, are we?\" ${capturer1} grins with crossed arms, leaning against the wall. \"I don't mean to rush you, but what are you waiting for, exactly? Get up and do your stuff.\" He gestures for you to get up, then leaves the room.\n\nYou slowly climb out of bed and give your wound a small rub. You stretch your limbs before leaving the sick bay. You walk upstairs to pick up your gear. ${leftsurvivor} can't be seen anywhere. As you put on your gas mask and step into the decontamination chamber, you glance back and see ${capturer1} standing at the top of the stairs with crossed arms. He grins a little and nods once. You turn back to the decontamination chamber and walk inside.\n\nWhen you walk down the stone path alone, all the guards turn to you. You look around the yard as they mumble to one another. Some of them laugh, some of them shake their heads, but they pull the gate open when you arrive. You walk through, and they loudly smash it closed behind you. \"This is the last time we see him. Wanna bet a mag on it?\" You hear a guard laughing behind the gate.\n\nYou adjust the backpack and look around with nervousness and excitement both filling your body. You look left and right, then head to your right onto the highway.\n\nYou keep walking for a while in silence, avoiding conflict with the mutants. You're passing a car in pretty good condition when you hear growling and grunting from the distance. You freeze for a moment, then take the pistol out of your waistband. Your legs and hands are shaking a little, but you keep on walking past the wrecks. You grip the handle and the trigger tight, then take a sharp left turn to the road leading off the highway.\n\nAround halfway down, you see a huge gap between the two sides, and the wreck of a tanker truck when you peek down. The gap is too big, so you decide it's best to turn around and head back up the highway. You turn around, and a huge skinless creature is standing in front of you with a sharp metal bar in its hands.\n*page_break\n\n*if (wackwound)\n\n It leans closer, bloody drool running down its chin. It grunts a little and steps even closer. It's so close that you can smell it through your gas mask. It grips your hands with the pistol in them, pushes them down, and raises the metal bar. Gently, it pokes the bandage on your stomach, then leans closer to smell it.\n \n It grunts quietly and tilts its head. Your heart beats in your throat, and you breathe faster than ever. Its skinless, warm, bloody, gooey hand feels disturbingly unpleasant to the touch. \n \n A couple of seconds later, it releases your hands and turns around.\n *fake_choice\n \n  #Shoot it.\n   You raise your pistol and point it at the creature. You aim down the sight, hold your breath, and pull the trigger a couple of times. Blood splatters on your gas mask. You blink hard and wipe your mask off, then see the creature falling to the ground. It throws itself around with bullet holes in its head, when an ice pick penetrates its skull and it stops moving. \n   \n   \"Nice shot. Someone taught you well, and I believe that someone is standing right in front of you.\"\n   *goto shotcont1\n   \n  \n  \n  #Leave it.\n   You're lowering your pistol when blood spatters on your gas mask. You blink hard and wipe your face off, then see the creature falling to the ground with an ice pick in its skull. \n   \n   \"What the hell? You were just gonna let it kill you? Do you have a death wish or something?!\" ${survivor3} rips the ice pick out of its skull and wipes it on her jeans. \n   *goto shotcont1\n \n \n *label shotcont1\n \"Anyway…what the hell was that? It wasn't interested in hurting you. At all. What's going on?\"\n *goto cont2\n \n \n \n*else\n\n It leans closer, bloody drool running down its chin. It grunts a little and steps even closer. It's so close that you can smell it through your gas mask. It grips your hands with the pistol in them. Its skinless, warm, bloody, gooey hand feels disturbingly unpleasant to the touch. Gently, it pokes the bandage on your arm and leans closer to smell it.\n\n As soon as it does that, its already large eyes grow even wider. It growls loudly and jumps away, smashing the iron bar on the ground several times. It jumps around and grunts. It seems to get ready to attack you, then steps back. It does that a couple of times and keeps smashing the iron bar on the ground. You raise your pistol, and it bites at the air a couple of times.\n *fake_choice\n \n  #Shoot it.\n   You raise your pistol and point it at the creature. You aim down the sight, hold your breath, and pull the trigger a couple of times. It growls even louder, and blood splatters on your gas mask. You blink hard and wipe your gas mask off, then see the creature falling to the ground. It throws itself around with bullet holes in its head, then an ice pick penetrates its skull and it stops moving. \n  \n   \"Nice shot. Someone taught you well, and I believe that someone is standing right in front of you.\"\n   *goto shotcont2\n   \n  \n  \n  #Leave it.\n   You lower your pistol, and it's raising the metal bar when blood spatters on your gas mask. You blink hard and wipe your mask off, then see the creature falling to the ground with an ice pick in its skull. \n  \n   \"What the hell? You were just gonna let it kill you? Do you have a death wish or something?!\" ${survivor3} rips the ice pick out of its skull and wipes it on her jeans. \n   *goto shotcont2\n \n \n*label shotcont2\n\"Anyway…what the hell was that? I've never seen one of these things terrified. What happened?\"\n*goto cont2\n \n \n \n \n \n*label cont2\n\n\n\"I don't know,\" you mumble and put your pistol away with slightly shaking hands. She puts the ice pick away and crosses her arms. \n\n\"I might have an idea, but…I don't want to frighten you, so I'll just keep it to myself. For now.\" She motions you to follow her, and you begin to walk back towards the highway. \"So…where's that good caretaker of yours? What could be so important to leave you on your own with a mutant?\"\n\nYou tell her he's not feeling too well, and that you haven't seen him at all today. She shakes her head as you take a left turn, heading off the highway. You follow her through alleyways and dark areas in silence.\n\n\"About yesterday…did you hear what the guard said up there? We were considered a threat. From ${base}. There's a reason why I warned you about ${base}, and there's a reason why the military considers everyone from there a threat. It's a horrible place to be. Especially for someone your age. Listen.\" She turns to you, and you both stop. \n\n\"I'm working on getting you into our base. You'd have to work, of course, but we could keep you safe. And you wouldn't have to go looting with me. But I wouldn't say no if you wanted to, of course. They aren't fond of the idea, yet. But I feel like I can convince them. I'll just need some more time. Anyway, my point is, think about your answer. This is serious now. Do you want me to keep working towards that? Do you want to join us, join me, or…are you comfortable at ${base}?\"\n*choice\n \n #\"I do, I want to.\"\n  *set Lizzie %+10\n  *set Lizziebase true\n  She giggles and locks you into a hug, then lets you go and scratches her head. \"Sorry…yeah…I'll keep pushing them. It'll happen, I just don't know when. Hold on though, ${survivor3}'s got it all under control!\" She pats you on the back, and you walk into a dark, steamy alleyway.\n  *goto cont3\n \n #\"Thanks, but no thanks.\"\n  *set Lizzie %-10\n  She stays silent for a couple of seconds, then shrugs and pats you on the back. \"Well…I'm not going to force anything on you. I'll stop pushing them. I just don't understand how…never mind. Let's just go.\" She turns around to keep walking, and you go into a dark, steamy alleyway.\n  *goto cont3\n\n\n\n*label cont3\n\nThe apartment blocks seem weirdly large and intact on both sides, along with the windows. You follow her down the alley and notice the wind intensifying. It blows sand through the alley. She takes a sharp left turn and opens a red door with a broken sign above it. You walk through the door, and she crosses her arms at the sight of cereal, canned food, chocolate, and bottled water and juice scattered around on the floor, along with the fallen, broken white shelves. \n\n\"Bingo! I wonder when your ${leftsurvivor} finds anything like this. He'd rather run into the arms of the military. Let's halve the loot,\" she says, already putting her backpack down on the ground. You gather half of the loot and stuff it into your backpack. It's hard to fit, but after trying it a couple of times, you pull the zippers closed.\n\nShe walks to the red door you came in through,and pushes it open. The wind gusts loudly, blowing sand into the store. You can't see anything beyond the door, only dust. She pulls the door shut and turns to you. \n\n\"Well…it looks like we have to stay here for a while. I just don't know what's with all the sandstorms these days…it hasn't been like this before.\" She shakes her head and sits on a fallen shelf. She pats the space next to her and looks at you. You sit down next to her and lean back.\n\n\"You know…we oughta find some new clothes for you. The sooner the better,\" she says, opening a bag of cereal. She reaches in to take some out, but freezes when she lifts it to eye level. \"So…I didn't think this through now, did I?\" She giggles and pats her gas mask before throwing the small pieces of cereal away.\n*if (knife)\n\n \"I've been meaning to ask you something. Don't take this as an accusation or anything, but…didn't you, for some reason, take something from my backpack?\"\n \n *choice\n  #\"Nope.\"\n   *set Lizzie %-5\n   *set Evil %+5\n   \"Not even a knife? Listen, I'm not sure that you took it, but…who else could've taken it? And the outline of that bump in your pocket reminds me of exactly that knife. I didn't take you for someone who steals things, I want to trust you, but…you can't do that. If you have taken it.\" She shrugs a little and taps her knees. \n   \n   \"You know, if only you'd asked for it, I would've given it to you. That knife meant a lot to me. You can keep it now if you have it, just…think about what I said.\"\n   *goto cont4   \n  \n  #\"I took the knife.\"\n   *set Evil %-5\n   \"Well…at least you're honest. I knew it. Who else could've taken it? And the outline of that bump in your pocket looks exactly like that knife. I didn't take you for someone who steals things. I know we're in a dire situation, but don't steal things. At least from people who mean something to you, or you mean something to them. You know, if only you'd asked for it, I would've given it to you. That knife meant a lot to me. You can keep it now, just…think about what you've done, okay? I'm not mad or anything, though. I like that you were honest.\"\n   *goto cont4\n\n  \n*else\n *set Lizzie %+5\n \"You know, I've been meaning to tell you something. After that night in the base, I checked my backpack and found that nothing was missing. Don't take it the wrong way, but I know how dire our situation is. I was just curious if you could be trusted. I mean, I wanted to trust you, and I didn't take you for someone who steals things. Especially not from someone who means something to you, or you mean something to them. But it was just reassuring to find everything in place. But again, I expected nothing less from you. Good traits are rare to possess these days, so hold onto those. But be on your guard. Most people aren't like us.\" She rubs your back and taps her fingers lightly on the cereal box.\n *goto cont4\n\n  \n*label cont4\n\nYou take a couple of small pieces of cereal out. They feel very dry under your fingers. The actual taste of it remains a wonder. After a while, she gets up and walks to the door. With her pistol in hand, she opens the door and looks around. \n\nThe alley is filled with dust, but the wind has calmed down. The sun barely shines light into the shop anymore. \"I think we're safe to go out. And we better do it fast,\" she says, holding the door open until you get up and walk over to her.\n\nThe red door slams shut behind you, and she turns left. You follow her down the alley. The sun barely lights the streets anymore, and you begin to feel very tired, so you quicken the pace. You keep walking with her as it gets darker and darker. \n\nTiredness takes hold of you, but you keep walking. The alleyway turns left, then right after a straight bit. Then left and right again after a while. After the fifth of the same turns, you get a disturbingly familiar feeling on the straight bit. \n\nLarge, dark clouds suddenly fill the sky, and everything gets darker. You see a small figure in the darkness, walking closer to you. ${survivor3} grips the handle of her pistol with both hands and points it down at the ground as you walk closer to the figure. \n\nWhen you get closer, you notice it's a boy around your age. His gas mask is bloody, and a big piece of glass is missing diagonally from the top to the bottom of it. His shirt is filled with bullet holes. A couple can be seen on his chest, too. The bottom of his jeans are ripped up to the knees. He's not wearing any shoes. His feet are very dirty, and he leaves bloody footprints after himself. ${survivor3} freezes, and you stop next to her. \"R—${survivor3bro}?\" she mutters and gasps. She releases her pistol with one hand and points it at the ground with her right arm.\n*page_break\n\n[i]\"Why have you abandoned me, sister?\"[/i] He tilts his head to the right.\n\n\"I—I haven't! I—I…\" ${survivor3} shivers and sniffles.\n\n[i]\"It's all your fault, you know it. I was in unbearable agony. I suffered. It's all your fault. You know it, too,\"[/i] he says and takes the gas mask off, revealing the horrible burn mark, covering the left side of his face.\n\n\"I know it's my fault. Can you forgive me? I—I didn't mean to. I'm sorry for all the pain you had to go through. Can you forgive me?\" Her voice falters and she looks down before she sniffles some more.\n\n[i]\"I can't just yet. There's only one way to find salvation, sister. It's in your hand. You can find peace. Then I'll forgive you.\"[/i] He blinks softly and rubs the bullet hole in his chest.\n\n${survivor3} looks down at her pistol and keeps staring at it. You glance back at the boy and see the smirk on his face. Thoughts run through your brain, and you put your hand on the handle of the pistol in your waistband.\n*choice\n \n #Shoot him.\n  *set Lizzie %-8\n  *set shotillusion true\n  *set emptymag true\n  Without hesitation, you grip the handle firmly and pull your pistol out. You don't think about the proper position to fire your pistol, just swiftly aim it at him and keep pulling the trigger, until no more bullets are in the magazine and the pistol clicks. He falls back on the ground and lies there in a pile of blood. The tall buildings on both sides begin to flicker. ${survivor3} breathes fast and keeps staring at him. Her hands shake, and she slowly turns to you.\n  \n  \"You…you killed him.\" She raises her pistol at you and sniffles.\n  \n  \"It was only an illusion. A monster did it,\" you say and put your hands in the air.\n  \n  \"I know all the mutant types…that—that was no mutant.\" She sniffles and the trigger creaks under her finger.\n  \n  The intact buildings disappear from both sides and are replaced with pale, demolished blocks. The dark clouds disappear, and they get replaced with stars and the moon. The boy on the ground is now a creature with a large head and pitch-black eyes. His tiny fangs are covered in blood, and his hands are now elongated and end in sharp claws. \n  \n  ${survivor3} keeps squeezing the pistol for a while, even though she's staring at the creature. You carefully lower your hands. She keeps staring for a couple of seconds, then lowers the pistol and sits down on the ground. She buries her head in her palms and starts sobbing quietly. You walk close to her when she puts her left palm up and looks away. \"You…you had no right,\" she mutters, and you walk back to sit down at a distance from her.\n  \n  She keeps sitting like that for a while, until eventually it gets even darker, and very cold. She slowly stands up and walks over to you. She holsters her pistol and offers a hand. You grip it, and she pulls you up to your feet. \"We have to go. It's already very dark.\"\n  *goto cont5\n  \n\n \n #Leave him.\n  *set Lizzie %+8\n  You release the handle of the pistol and watch him walking closer to her.\n  \n  [i]\"Do it. You know you have to. You're guilty. Set yourself free.\"[/i] He grins wide and puts his hand on hers. \n  \n  She raises the pistol slowly, with shaking hands. \"You…you're not my ${survivor3bro}. You would never be like this.\" She looks into his eyes and breathes hard. \"You're right, though…I have to let you go.\"\n\n  She puts the end of the pistol to his head. He frowns and growls quietly, then ${survivor3} swiftly pulls the trigger a couple of times until the magazine empties and her pistol clicks. Blood splatters all over her gas mask, making her jump a little. He falls back on the ground and lies there in a pile of blood. The tall buildings on both sides begin to flicker. ${survivor3} breathes fast and keeps staring at him. \n  \n  The intact buildings disappear from both sides and are replaced with pale, demolished blocks. The dark clouds disappear and are replaced with stars and the moon. The boy on the ground is now a creature with a large head and pitch-black eyes. His tiny fangs are covered in blood, and his hands are now elongated and end in sharp claws.\n\n  She shivers, and she keeps staring in front of herself for a while, then lowers the pistol and sets it down on the ground. She buries her head in her palms and starts sobbing quietly. You walk close to her cautiously.\n  \n  She glances at you from the corner of her eye and wraps an arm around you. She pulls you closer immediately. Your head gets buried in her shoulder. She keeps hugging you and sobs quietly. She sits like that for a while, and eventually it gets even darker, and very cold. She slowly releases you and looks away. \n  \n  \"I'm sorry, I…I thought I knew all of the mutants,\" she mumbles, then stands up and holsters her pistol. She offers a hand, and you take it, so she pulls you up to your feet. \"We have to go. It's already very dark.\"\n  *goto cont5\n  \n  \n  \n  \n  \n*label cont5\n*page_break\n\nYou get out of the alley and follow her silently for a good long while. You sneak through the streets and end up in a field. \"I don't really know where we are. To be honest, I don't really care, either.\" She shrugs and keeps walking through the field. It's late as it is, and walking through the field is challenging. The tall, dry plants scratch your skin and get stuck in your clothes.\n\nWhen you step out from the grasp of the plants, you have to stop and take a breath. She doesn't stop for a second and is already making her way up a hill. You're panting, but you keep pushing through to follow her. As you climb the hill, you see a huge metal fence at the top of it, surrounding a rather large building. When you reach the top, ${survivor3} rubs her head. \n\n\"This place looks familiar,\" she says, and you follow her around the fence. The bumpy ground proves hard to walk on. When you turn left at the end of the fence, the sight becomes familiar to you too.\n\n\"I knew it was familiar,\" she says as you walk up to the entrance of the mansion you've been in before. \"Do we go inside, or risk finding our way back to base?\" She puts her hands on her hips as you think about what would be the best thing to do. Suddenly, a weird feeling hits you, the feeling of a presence watching you. You turn your head towards the road leading up to the mansion. You don't see anything but a pair of glowing pink eyes in the darkness. They don't blink, and another pair appears next to them. \n\n\"Well, that answers my question. Go, quick.\" She pushes you towards the fence, and you squeeze through. She follows you as fast as she can and points towards the door as she begins to run. \n\nYou don't know why she's running, but you run after her. She pushes the already open door wider and closes it behind you. It doesn't get stuck in the door frame, but wooden pieces stick out of the side of it where ${survivor3} cracked it open the last time. She sticks the back of a chair under the doorknob.\n*page_break\n\n\"As I said, we can't really go back to the base right now. Even if I knew where to go in the darkness, there's a big chance they wouldn't let you in. Anyway, have you ever dealt with one of those shadow walkers before?\" she asks, and you shake your head. \"That's good. I hope you never have to. They're the worst.\"\n\nYou look into the same dark house, then walk into the kitchen. \"Well, our backpack is full already. At least, mine is, so maybe some other day we'll finish what's left here.\" She walks to the bottom of the stairs, and you follow her. She glances at the game room with the pool table, then looks up the stairs. \"Let's find out what's up there,\" she says, already walking up the creaking stairs. Dust fills the air as you walk up. When you reach the top, you find yourself in a narrow corridor opening to the left and right, both leading to closed doors. Behind you, past the stairs, another set of stairs leads up to a closed trapdoor. Behind that, an even bigger corridor opens up, with a couple more doors.\n\n\"Let's start with this one,\" she says and carefully pushes the door on the left open. You find yourself standing in a pink room. The wardrobe is broken, and the curtains and big yellow bed are ripped apart. Small pieces of cotton are stuck in the blood that's splattered everywhere. In a puddle of blood, a little girl without a gas mask is sitting with her back to you. She's hugging a headless teddy bear and humming quietly as she rocks back and forth. ${survivor3} looks at you and leans closer. \n\n\"I think we both know this type, but…I just can't do this right now. I can't. I'll let you decide whether you want to do it or not. I'll be at the other door. Just make it quick if you decide to…you know,\" she says and turns around. You glance back and see her leaning on the other door with her forehand against it. You glance back at the little girl on the floor.\n*fake_choice\n\n #Kill her.\n  *set Lizzie %-5\n  *set Evil %+8\n  *if (((emptymag = true) and (magazine = 0)) and (knife = true))\n   You glance at the girl sitting on the ground. She's slowly ripping the teddy bear apart, piece by piece, as she hums quietly. You take your pistol out, aim it at her, and pull the trigger. Your weapon clicks, but nothing else happens. You quietly bring your backpack to the front and start digging in it. No matter how hard you dig, you can't find a magazine.\n   \n   You quietly roll the backpack onto your back and take the knife out of your pocket. You carefully slide the sheathe off of it and roll it around in your hand once again. You bend your knees and slowly sneak up to her. When you're close enough, she turns around and looks into your eyes. You begin to feel a little bit dizzy but try to shake it off. It's challenging, but eventually you take hold of yourself. You flip the knife around and swiftly make a deep cut in her throat. Blood squirts everywhere, and you step away as she struggles to breathe.\n  \n   You wipe the knife on your jeans, just like ${survivor3}. You put the sheathe back on it, then put it in your pocket before you walk over to ${survivor3}. She glances back into the room, then looks down and opens the door.\n   *goto cont7\n   \n  *elseif (((emptymag = true) and (magazine = 0)) and (knife = false))\n   *set emptymag false\n   You glance at the girl sitting on the ground. She's slowly ripping the teddy bear apart, piece by piece, as she hums quietly. You take your pistol out, aim it at her, and pull the trigger. Your weapon clicks, but nothing else happens. \n   \n   You quietly bring your backpack to the front and start digging in it. No matter how hard you dig, you can't find a magazine. You quietly roll the backpack onto your back. You turn around and walk over to ${survivor3}, telling her you're out of magazines. She looks away and hands you a magazine from her back pocket.\n   \n   You thank her and change the magazine in your pistol. You cock it, then walk back into the room, closer to her. You aim the pistol at the back of her head. When you're about to pull the trigger, she turns around and looks into your eyes. You begin to feel a little bit dizzy. She begins to speak quietly, and the pistol in your hand trembles. You shake the feeling off and pull the trigger as fast as you can. \n   \n   The gunshot echoes through the room as she falls back on the ground. Blood runs down her face and into the already growing puddle beneath her. You put the pistol back in your waistband and walk to ${survivor3}. She glances back into the room, then looks down and slowly opens the door.\n   *goto cont7\n   \n  *elseif (emptymag = true) and (magazine > 0)\n   *set emptymag false\n   You glance at the girl sitting on the ground. She's slowly ripping the teddy bear apart, piece by piece, as she hums quietly. You take your pistol out, aim it at her, and pull the trigger. Your weapon clicks, but nothing else happens. \n   \n   You quietly bring your backpack to your front and start digging deep in it, pulling out a magazine not long after. You quietly roll the backpack onto your back and load the magazine into your pistol. You cock it and walk closer to her. You take a deep breath and aim the pistol at the back of her head. \n   \n   When you're about to pull the trigger, she turns around and looks into your eyes. You begin to feel a little bit dizzy. She begins to speak quietly, and the pistol in your hand trembles. You shake the feeling off and pull the trigger as fast as you can. \n   \n   The gunshot echoes through the room, and she falls back on the ground. Blood runs down her face and into the already growing puddle beneath her. You put the pistol back in your waistband and walk to ${survivor3}. She glances back into the room, then looks down and slowly opens the door.\n   *goto cont7\n  \n  \n  *elseif (emptymag = false)\n   You glance at the girl sitting on the ground. She's slowly ripping the teddy bear apart, piece by piece, and humming. You take your pistol out and coock it. After taking a deep breath, you walk closer to her.\n   \n   Quietly, you aim the pistol at the back of her head. When you're about to pull the trigger, she turns around and looks into your eyes. You begin to feel a little bit dizzy. She begins to speak quietly, and the pistol in your hand trembles. You shake the feeling off and pull the trigger as fast as you can.\n   \n   The gunshot echoes through the room, and she falls back on the ground. Blood runs down her face and into the already growing puddle beneath her. You put the pistol back in your waistband and walk to ${survivor3}. She glances back into the room, then looks down and opens the door slowly.\n   *goto cont7\n  \n  \n #Spare her.\n  *set Lizzie %+5\n  *set Evil %+8\n  You glance at the girl sitting on the ground. She's slowly ripping the teddy bear apart, piece by piece, and humming. You look at her for a while, then grip the doorknob and pull the door shut quietly. You turn to ${survivor3} and walk over to her. She looks at you and gives your back a rub, ending it with a few pats. She turns back to the door, smiling slightly, and slowly opens it.\n  *goto cont7\n  \n\n\n\n\n  \n  \n*label cont7\n*page_break\nThe door creaks loudly as she pushes it open. Dust and sand fly into the air, filling the green room inside. ${survivor3} walks into the room, along with you. You stand next to the single brown bed and look at the boarded windows. ${survivor3} looks at the large wardrobe and pulls its doors open.\n\nYou're surprised to see it standing, along with the fan on the ceiling. Posters hang from the wall, and there's no sign of blood anywhere. Clothes, sheets, pillows, and other scraps you can't make out lie on the floor. ${survivor3} keeps digging in the wardrobe, then turns around with something behind her back.\n\n\"I found something for you!\" she says and reveals a sky-blue hoodie with two angel wings separated by yellow lightning on the front. \"Do you like it?\"\n*choice\n #\"Yes, sure.\"\n  *set Lizzie %+5\n  *set Clothing 3\n  \"Good! I'm glad I could help!\" She hands it to you. \"Put it on, then. It'll keep you warm.\"\n  \n  You carefully slide it over your dirty, ripped shirt and take a look at yourself. It's around your size, more or less. It feels warm, but you're not sure about the color. It's not good for hiding and maybe a bit too light for your taste. \"There, you look like a handsome little guy now. Not like you didn't before.\" She laughs and pats you on the head, then walks out the door, and you follow.\n  *goto cont8\n \n \n #\"Not really. It's ugly.\"\n  *set Lizzie %-5\n  \"Oh…I see. Well, it was worth a try, I guess.\" She throws it back into the wardrobe and walks out of the room without looking at you. You sigh and follow her to the corridor.\n  *goto cont8\n  \n  \n*label cont8\n\nThe other two doors seem to be barricaded from the other side. No matter how hard ${survivor3} and you try to break them open, they remain shut. \"When my ice pick can't help, there's nothing else to do.\" She laughs and looks up to at trapdoor, then sighs and looks at you. \n\n\"Okay. Attics give me the creeps. They're mostly bad experiences. One thing I know is, attics are never a good sign. Especially if they're locked. But I guess we have no other option. I don't fancy sleeping with an open door down there, so…let's go for it.\"\n\nShe climbs the stairs leading up to the attic and tries to push the door open. It doesn't budge, and she glances back at you while she takes her ice pick out. She fights with the trapdoor for a while, then it cracks open and she gives it a firm push. It slams on the floor of the attic, and she climbs up. You follow her into the attic on the creaking, decayed stairs.\n\nYou stand up next to ${survivor3} and look at her. She stands frozen, and soft grunting catches your ears. You look forward but can't make anything out until your eyes adjust to the darkness. When it does, you jump a little. You see a very thin but tall skinless creature kneeling on the ground. Its neck, wrists, and ankles are chained to the wooden support beam.\n\nIt barely has any meat and muscles on it, and it grunts softly at you. Apart from a couple of thin teeth, you can't see anything else in its mouth. Next to it lies a smaller body on a dirty mattress, holding a pistol on his chest. His skin is dried on his bones, and he's not breathing. \n\n${survivor3} shakes her head slightly. \"They must have died recently…at least the boy. I think his father, or whoever that…creature is, helped him chain himself there. Then, I don't know, maybe they got trapped or something. Maybe the boy didn't want to leave. This is sad. Very sad. Now you know why I don't fancy attics…\" \n\nShe slowly walks over to the young boy and pries the pistol from his hands. \"I'm sorry. We need anything useful we can find. I hope you understand.\" She takes the magazine out and throws it to you. \"Take it.\"\n*set magazine +1 \n*if (emptymag)\n You thank her and change the magazine in your pistol, then cock it.\n *goto cont9\n\n*else\n You thank her and put the magazine in your backpack.\n *goto cont9\n\n*label cont9\n*page_break\n\n\"What do you say to a game of pool before we go to sleep?\" she asks, turning away from them. The chained creature is still grunting softly. You're about to answer when you hear a loud banging and cracking noise coming from downstairs. Your heart almost stops, and ${survivor3} jumps too.\n\nShe looks at you and rushes to the trapdoor. She closes it as quietly as she can, then puts a finger to her lips. \"Shh…can't lock it. The curse of having to break everything open,\" she whispers.\n\nYou hear noise coming from below, followed by quiet hissing sounds. Silence fills the building for a while, until quiet footsteps come from below, as if someone was walking around barefoot. ${survivor3} backs away from the trapdoor and sits down on the other side of it. You sit down too and keep listening to the quiet noises coming from below. Your heart is beating so hard that you have to take some deep breaths to calm yourself down.\n\nThe noises fade away, and silence fills the room, except for the chained creature's quiet grunts. The trapdoor unexpectedly snaps open, with a pair of deep, pink eyes emerging from the stairs.\n\nIts body and legs are very dark, almost mist-like as you can see through them somewhat. Its long arms end in three large fingers, and its long legs end in two large toes. You can't see through those, as they're pitch black, along with its head. You can't make out any features on its face. The light from its disturbingly glowing pink eyes covers the rest of its face. You crawl backwards and take the pistol out of your waistband. \n\nYou aim it at the dark creature, still backing up. It walks closer to you with the same slapping sound. Through the creature, you see another one emerging from the stairs and turning to ${survivor3}. She's shouting something at you and gesturing with her fingers, but you can't hear her. You can't hear anything, apart from a loud ringing in your ears. The ringing is so bad, your whole head and eyes hurt from it, along with your ears.\n\nThe dark creature keeps walking towards you until it's dangerously close, and it keeps looking down at you without even blinking once. The ringing in your ears intensifies as it gets closer, and it feels as if the whole room is spinning. You lay back and aim your gun at it.\n*choice\n \n #Shoot it.\n  *set trapperwound true\n  Without hesitation, you squeeze the trigger a couple of times. If it weren't for the kickback, you wouldn't know that you'd really fired the gun. The bullets go through the creature, bending its mist-like body for a second where they pass through. It tilts its head, and the glowing of the pink eyes intensifies. Just by raising its hand, it sends the pistol flying out of your hand. \n  \n  With another flick of its fingers, the knife flies out of your pocket and the sheathe drops to the ground. The knife hovers in the air as the creature stretches its arm out. Its three thick, long fingers stretch, and the knife flies towards you.\n  \n  You scream in pain and feel warmth filling your whole right arm, forcing you to stop crawling and fall back. Blood runs down your arm, and you can't help but scream as it burns in pain. With every small move you make, you can feel the knife scratching at your shoulder bone.\n  *goto trappercont\n \n \n #Don't shoot.\n  You lower the pistol and keep crawling backwards until you hit the wall. It tilts its head and raises its hand. The three thick, long fingers stretch, and the pistol flies out of your hand.\n  *goto trappercont\n\n*label trappercont\n*page_break\n\nYou glance over at the chained creature, and its mouth is wide open, but all you can hear is the unbelievable ringing sound. It steps closer and reaches down, then wraps its long, thick fingers around your neck and slowly lifts you up by it. You can feel something cracking, and it's getting harder and harder to breathe. \n\nYou grip its hand, and it feels as if you grabbed a sponge, but it somehow still feels solid and strong. You try to kick it, but your legs go through, bending the mist-like body. You punch it in the head a couple of times. It feels hard to pull your fists out, as if you punched thick tar. Saliva runs down your chin as you struggle. You can barely breathe now, and your lungs burn in pain. \n\nYour heart beats faster than ever, and you begin to feel very dizzy. You glance at ${survivor3} and see her crawling back against a wall too. Your head begins to feel very heavy, and you let your head tilt to the right. The chained creature stares at you with its mouth wide open and bulging veins in its neck. It struggles and shakes wildly, sending dust and wooden pieces everywhere. Your vision starts to get blurry. You blink a couple of times, and you can barely keep your eyes open.\n\nBlood splatters on your face, and you see the skinless creature charging towards you with a missing arm. Its complete left arm is still held by the chains. It keeps charging towards you, mouth wide open. You close your eyes as your throat and lungs burn with an unbelievable tingling pain.\n\nYou open your eyes as you hit the ground hard, immediately gasping for air. When you glance up, you see the skinless creature with blood squirting from his missing arm holding the dark figure by its head. As it keeps tightening the grip on the dark creature's head, the ringing in your ears intensifies. The dark figure's head explodes under the grip. A horrible scream rips into your ears. You cover your ears and feel blood sticking to your fingers from them. \n\nThe skinless creature throws the lifeless misty creature at the other one. It looks back and rushes down the stairs, leaving the other one rolling away with a trail of blood after itself. The ringing in your ears made you very dizzy, but it's fading away with every step the dark creature takes.\n\nWith blurry vision, you see the skinless creature walking towards you. It kneels down and wraps its remaining arm around you, then lifts you up. It walks to the stairs as ${survivor3} reaches towards you with one arm and holds her head with the other. The skinless creature walks down the stairs with you, heading straight into the green room, where it puts you down on the brown bed. It grunts a little and rests its hand on your bandaged wound.\n*page_break\n\n${survivor3} slams against the door frame, seemingly dizzy. The skinless creature turns around and growls as it walks towards her with clenched fists. She raises her pistol and pulls the trigger a couple of times. Its head snaps back, and it falls to the ground. Blood splatters on the walls. She holsters her gun and sits down next to you on the bed with trembling legs. Your head throbs and feels like it's about to explode. You still feel dizzy and very tired, so it feels good to finally be able to lay down. She remains sitting next to you, looking down.\n\n\"You know…I thought that was it. That was the end for us.\" She speaks quietly and still doesn't look at you. \"Do you know what the first thing that popped into my head was when I saw you getting pushed up against the wall? That I let it happen again.\" She stops for a second and chokes back her tears. \"Back in the alley, that boy, that was my brother…I mean, the form of that creature. His name is ${survivor3bro}. I'm not going to get too much into the details because I don't want to end up soaking this bed with my tears, but…${base} played a big part in his disappearance. \n\n\"I—I'm not sure he's…gone. But what's the chance of a thirteen-year-old surviving alone on his own? I'd like to believe he's still alive, but…we both know that would be very surprising. Even you—you're someone who can fend for himself. But I wouldn't bet my money on your survival either. Don't take that the wrong way.\" She forces a smile as she sniffles and sighs quietly, the continues with a shaky voice. \"I'm going to be honest with you. You remind me so much of him. So much.\" \n\n*if (knife)\n She rubs your head and reaches into her backpack, then puts a pistol and a sheathe next to you.\n *goto trappercont2\n\n\n\n*else\n She rubs your head and reaches into her backpack, then puts a pistol next to you. \n *goto trappercont2\n\n\n\n\n*label trappercont2\n*page_break\n*if (trapperwound) and (Clothing = 3)\n \"Look at your new hoodie. It's messed up already.\" She squeezes out a laugh and sniffles. \n *goto trappercont3hurt\n \n*elseif not (trapperwound) and (Clothing = 3)\n \"At least your new hoodie is keeping you warm.\" She laughs quietly and sniffles, then pats your head.\n *goto trappercont3\n \n*elseif (trapperwound) and (Clothing != 3)\n \"Your poor clothes. They're so overused. And this doesn't make them look any better, either.\" She laughs quietly and sniffles, then pats your head.\n *goto trappercont3hurt\n \n*elseif not (trapperwound) and (Clothing != 3)\n *goto trappercont3\n \n \n*label trappercont3hurt\n\n\"Okay, I have to take that knife out. I'm not going to lie. This'll hurt. A lot. Are you ready?\"\n\nYou nod, despite the fact that you're not ready at all. But you'd like to have it out already. She takes a deep breath and grips the handle of the knife in your shoulder. You close your eyes and take a deep breath. She takes a deep breath too, then rips it out. \n \nYou can feel it sliding through your bones and meat. It sends a sharp pain through your whole body, and warm blood runs down your arm. You scream in pain and grip the bed tighter than anything before in your whole life. She stabs the knife into the bed next to you, releases it, and rips off a piece of the brown covers. She wraps it around your wound tightly, using it as a bandage. Sweat rolls down your forehead as you breathe hard.\n\nYou keep panting for a while. The wound still hurts very much. You keep trying to calm your breathing, and a long silence falls upon the room.\n*goto trappercont3\n \n*label trappercont3\n\n\"I'm sorry. I didn't mean to bring all this down on you.\" She breaks the silence and looks at the skinless creature. \"That was…definitely weird, though. How it saved you, but only you. And how it brought you to this bed. Maybe…some of them keep their instincts. Maybe there's still hope for things to be normal again. At least, that's what I'd like to believe.\" She looks at you and shrugs a little. \n\n\"Look at me blabbering again. Sorry, I'll let you sleep. You need it, obviously. I'll keep watch for the night. Sleep well, R—${firstname}.\" She scratches her head and quickly gets up. She drags the dead skinless creature out of the room and closes the door. You lie in bed for a while, listening to the creaking and other small noises. Your head still throbs in pain, but it doesn't take long to fall asleep.\n\n*if (wackwound)\n\n \"How long until we get there, Daddy? I'm really hungry now,\" the little girl asks as she walks next to you holding a backpack.\n \n [i]\"Me too, honey, but I have no idea. Just keep quiet and let's go into that house,\"[/i] you say as you point to a small red house.\n \n You try the front door, but it's locked. You look at the broken window, then break off the remaining glass shards with your backpack. You climb through and lift the girl over, then put a finger across your lips, telling her to be quiet. You find yourself in the kitchen. As you go through the drawers, you find a large kitchen knife and slide it up your sleeve.\n\n The little girl opens the fridge and gasps at all the food. She begins to stuff all the food into her backpack. After she's done, she stops and looks at you. \"Daddy, is this right to do? This isn't our food. What if someone's going to starve because of us?\"\n \n [i]\"It's okay, honey, we're starving more. And I'm sure no one lives here anymore. Don't feel guilty for a second, okay? Things aren't like before. We take what we need. This is how the world is now.\"[/i] You give her a slight hug and walk deeper into the house. You find a huge closed double door. You try to open it, but it doesn't budge. You tell her to step back and keep kicking the door until it breaks open.\n\n You find an old couple sitting in their armchairs, along with a man your age with a long, black beard sitting at a small table, quickly loading bullets into his revolver. Time seems to stop as everyone freezes. You step back once, and the man at the table pushes the last bullet in. He snaps the clip back into place as you glance at the little girl next to you. You clench your teeth and tell her to run for the door.\n\n You start running towards the table, sliding the knife out of your sleeve as you do so. The man raises the pistol as you raise the knife high and jumps towards him with a yell.\n *goto trappercont4\n \n*else\n \"I'm really tired and hungry now. How long do we have to walk for?\" the little girl asks, a small backpack on her back, and you peek out from a pocket. \n \n \"I don't know. Just be careful and quiet, okay?\" her mother says, walking next to her in the dark street.\n \n They keep walking for a while, until they pass a small grocery shop. The mother tries the door, but finds it locked. She looks through the small, broken window, then picks up a large piece of wood from the ground and breaks the remaining glass. \n \n She climbs inside, then lifts the little girl and brings her in. The little girl gasps when she finds food on the shelves. She kneels down with you and starts stuffing them into her backpack. When she's done, she looks at her mother.\n \n \"Mum? Is it okay to take these things? They're not ours,\" she says and pats your head.\n\n \"It's completely okay. The world has changed, and now we take what we need to stay alive, okay? Don't feel bad about it,\" she says and turns towards the noise coming from the door labeled 'Staff Only' behind the counter. After a couple of seconds, it bursts open, and an old-looking man with grey hair steps out. They stare at each other for a while. Time seems to stop, and everyone freezes. He begins to sputter in a foreign language you don't understand. The mother steps back. He reaches down below the counter and starts searching for something. \n \n She turns to the little girl and tells her to run for the door. She does so but stops to turn around at the window. You see the man behind the counter taking out a small pistol, and the woman raising the piece of wood. She starts running towards him, then pushes herself off the ground and flies towards him with a scream as he raises his pistol.\n *goto trappercont4\n\n\n\n*label trappercont4\n*page_break Wake Up\n\nYou awaken in the pitch-black room and rub your eyes. \n*if (trapperwound)\n Your shoulder is stinging in pain, and you have trouble lifting it up. Apart from that, you feel relatively okay.\n *goto cont10\n\n*else\n You feel relatively okay, apart from the dizzy head, and you get out of the bed. \n *goto cont10\n\n*label cont10\n\nYou sit up steadily, and get out of the bed. Dried blood scratches under your shoes as you make your way to the door and open it. ${survivor3} rolls back on the ground with her pistol in her hand. Her eyes snap open, and she jumps to her feet, then clears her throat. \n \n\"I—erm, I wasn't sleeping. Honestly.\" She laughs and stretches her limbs. \"Okay, I was, but it only happened recently. Let's get back to our bases. There's not much use in searching for loot when our backpacks are full. Let's roll.\" She pats you on the head, and you both head down the stairs. You know that a long walk awaits you, and you try to prepare for it as best as you can.\n\nShe accompanies you to a building which is just around the corner from ${base}. \"All right. Take care, and see you tomorrow, I guess. I'm sure I won't go out today, and I hope you don't have to either. So, see you tomorrow, ${firstname}.\" She chuckles slightly and gives you a hug with one arm, then turns around and jogs away. \n\nYou walk around the corner, and they pull the fence open. \"Hah! In the end, I won the bet. So give my mags back! He's here, isn't he?!\" you hear an angry guard saying to another.\n\nYou step out of the decontamination chamber and see ${leftsurvivor} putting his backpack on at the table. He walks closer to you, limping even more than he was before. \"Jesus Christ! Don't you ever do that to me again! I was worried sick, goddammit!\" He looks at you with a serious face, then smiles slightly. \n*page_break\n\n\"Look who showed up! You're not dead, after all. I have to stop betting on things. I appear to be a terrible gambler.\" ${capturer1} walks down the stairs and pulls you by your gas mask. \"${leftsurvivor}, stay, wait. Good boy.\" He slams the door behind you and pushes you into the chair. You almost fall off, then take your gas mask off and put it next to your backpack on the floor.\n\n\"Soooooo, ${firstname}. ${name}. What should I do with you now? What don't you understand when I say don't stay out for the night? Look, look. Let's play a game. I'll say some words, and you raise your hand when you hear a word you don't understand. All right? All right. Here it comes. \n\n\"Don't…stay…out…for…are you still following? Good. The…night…dead. What? Where did that come from? Anyway, call me a fool now…\" He chuckles. \"But you didn't raise your hand at any of those words. So, what's the deal kiddo, hmm? I'm surprised to see you, to be honest. Maybe you had some help, huh? Let's try this from another angle. This might save you here. Anything you want to report to ol' ${capturer1}?\" He combs his hair back and folds his arms.\n*fake_choice\n\n #\"There's an intact mansion full of loot.\"\n  *set report4 true\n  *set Ivan %+8\n  *set reportedtimes +1\n  *set Evil %+5\n  \"Now, that sounds interesting. Very interesting. A building intact, [i]and[/i] also full of loot. The two things I love to hear in a sentence. Consider yourself a good boy.\" He pats the table and rubs his chin. \"A very good boy, at that. This'll come handy when the time is right.\" \n  \n \n #\"I found a new type of monster.\"\n \n  \"I found a new type of monster, that's why I had to stay out all night,\" you tell him and clear your throat.\n  \n  \"Wow, so interesting, please tell me more about it. Not. You see, I barely go out anymore. When I do, I either kill, or I enslave anything I see. It's that simple. Sometimes both. Don't ask me how, though. See, see the problem here? Your information is quite useless to me. And I just find that disappointing.\"\n \n \n \n #\"No, nothing.\"\n  *set Ivan %-8\n  *set Evil %-5\n  \"So, you're telling me that you stayed out all night for…what, exactly? And why? I sense some slight bending of the truth here, kiddo. I hope that's not the case, because that'd be highly disappointing. For real. \n  \n  \"You have a party in the outside world, while here, we worry ourselves sick about supplies. That's also highly irresponsible. And I hope I don't have to say how disappointed it makes me. Oh, have I said that I'm disappointed?\"\n  \n  \nHe rubs his eyebrows and taps the table a couple of times with his fingertips, then slams down on it hard.\n*if reportedtimes \u003c= 2\n *set Markedwound true\n \n \"You know, I'm very dissatisfied with your reports, and just everything. In general. You're a disappointment, and highly under my expectations. You're disobeying me. What do you expect me to do now, huh? I think we both know what has to be done.
