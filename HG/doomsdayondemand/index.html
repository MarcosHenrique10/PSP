<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doomsday On Demand — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>

      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "doomsdayondemand", "title": "Doomsday On Demand", "scenes": {"aloneend": "[b][i]Chapter 7 - Let's Be Alone Together[/i][/b]\n\n\"Oi, thief!\" You hear them shouting behind you as you sneakily climb out the window of the military base. You glance back before jumping down with a stuffed backpack on your back. You start running in the dim sunrise through the muddy swamp. You hear gunshots behind you and hear bullets striking the ground and trees around you. \n\n\"Come on, you're getting sloppy…you've never been caught before…\" you whisper to yourself as the swamp drags your feet deeper and deeper down. You try to run as fast as you can, and eventually, you get past the swamp. You keep jogging and glancing back, getting further and further into the deserted field. You cross the field and make a slight detour to get onto the highway, so that you'll avoid the military checkpoint set up on it.\n*set aloneend true\n*achieve aloneend\n\nYou walk down the highway and head towards the empty streets. You cross a couple of streets and stop to peek around a corner. You stare for a while at Base ${base}. Guards are walking around inside and watching over the base from the watchtower. A couple of people with backpacks on their backs enter the base. You put your black hoodie on and give your black leather gloves a small tug. You wonder who's in charge now, but you're not curious enough to find out. Mostly because they have a shoot-on-sight rule for you, along with the military. You've also wondered what could be going on with ${currentbf} and ${leftalonebf}.\n\nYou continue your way through the empty streets, taking turns here and there to avoid places you know mutants lurk in. After walking through the forest and sliding down a hill, you take a long dirt road. The sun keeps coming up as you walk, until the mansion you call home comes into view. You approach the huge fence. The gap in it has been patched up and barricaded with wooden shielding that has nails sticking out in every direction. Barbed wire runs across the whole fence, more or less in good condition. You walk to the only small gate in the middle and open it, then shut it behind you. You fix the chain holding it tight, then lock the padlock.\n*page_break\n\n*if (helpedcarl)\n You walk through the garden and glance at the barricaded front door. You walk past it towards the left side of the mansion and begin to climb up the wall. You drop inside a window, panting a little. You barricade the window, then sit down on the bed in the same green room ${survivor3} found the hoodie in. You give your forehead a slight rub through the gas mask.\n \n You hear quiet footsteps coming from downstairs. You slowly put the backpack down and whip your silenced pistol out. Quietly, you walk down the stairs, peeking around the corner as you do so. Around the kitchen corner, you see someone opening the cupboards. You step out and aim your pistol at the figure. He turns around quickly and points his revolver at you.\n \n [i]\"I'm not afraid to pull the trigger. Even if you are a kid. So put that thing down and let me be on my way, if you wanna live.\"[/i] He grips the revolver tighter.\n \n \"Well, I'm not going to let you rob me. And I'm a pretty good shooter. You'll go down with me.\" You aim down the sight.\n \n He tilts his head a little and frowns. [i]\"That voice…it's different, but…${lastname}?\"[/i]\n \n Your eyes widen, then you frown and shake your head as you grip your pistol tighter.\n \n [i]\"Come on, boy, your hesitation gave it away. It's me…${capturer2}.\"[/i] He chuckles and lowers his revolver. [i]\"Honestly, I never thought I'd see you again.\"[/i] He looks around, then looks at you. [i]\"Come on, put that thing down and tell me everything. I suspect we have a lot to talk about.\"[/i] He leans back on the kitchen counter, and you carefully lower your pistol.\n\n [i]\"Well…I don't know what to say. You've been through a lot. But you fend for yourself now, and it's been going well for you. I knew you could take care of yourself. That night, you convinced me. Just be careful. If I found this, and a way inside, others can do that too.\"[/i] He sips a beer he found in the cupboard. \n \n [i]\"Anyway, I don't have a place to stay yet. I wander around and hope for the best. The people I trusted ended up being Arkadians. I'm like you, actually, both the military and them want my head. Say, do you fancy protecting this mansion together? We could add some fortifications, too. Besides, we could take on the world together. What do you say?\"[/i] He finishes his beer and puts the can on the counter.\n \n \"No. I won't be in a group. Not anymore.\" You shake your head.\n \n [i]\"Well, two people aren't a group yet, but all right, boy, I respect your decision. I'll also leave your stuff here. You saved my life, that's the least I can do. I'll take a couple of beers, though. You don't need them anyway.\"[/i] He puts a couple into his backpack, and you both walk upstairs. He removes the barricade and turns to you. \n \n [i]\"Well, this is our goodbye, then. Once again. Who knows, we might bump into each other again. I hope we'll be in a better situation by then. Or at least me, you don't seem to be struggling too much. You're a smart kid. Take care, ${firstname}.\"[/i] He nods once and begins to climb down. You watch him disappear into the distance, then put the barricades back.\n \n You walk down the stairs and crouch under them to pick up a small red carpet, revealing a trap door. It's heavy, but you lift it open. You climb down into a small but loud decontamination chamber. You step out and go down some more stairs into a small, grey room with a couch and supplies stocked on the weak wooden shelves. You sit down on the couch in front of a small television. It plays back old, captured movies and shows. The small generator that it's attached to hums quietly in the corner. You glance at the television and put your backpack on the ground. After releasing a sigh, you lay down on the couch. It feels good to finally take your gas mask off. You slowly put it down next to you and let your hand hang off the couch. \n *label cont\n  \n You glance at the supplies you've stored, and they draw a smile on your face. You keep looking at the ceiling and listening to the silence. Apart from the television, darkness and loneliness has become your friend over the years. But you don't plan to get rid of them. You've lived better than with the group at ${base}. You try to lure peaceful and calm thoughts into your head. As you do so, you turn onto your side and close your eyes. It's been a long night. A long night that many more will follow. Besides, what could go wrong now?\n *page_break\n *goto_scene ending\n  \n*else\n\n You hear footsteps behind you, so you immediately turn around.\n \n [i]\"Hey there! Calm down, we mean no harm!\"[/i] An older man with a woman next to him shakes his head. [i]\"We don't mean no harm. We would just like to ask if you had some supplies to spare. Are you on your own here? Aren't you a bit too young to be all alone?\"[/i] He steps closer to the fence.\n \n \"Nope, sorry. We don't have many supplies, and my group wouldn't let me give anything to you anyway. They're waiting for me inside. I was just out to get some stuff. So, you can leave now. Sorry.\" You rub your forehead through the gas mask.\n \n The older man frowns and steps closer. [i]\"Listen, I know very well that you're alone. No one in their right mind would send out a kid to find 'stuff.' And they wouldn't have whatever this poor solution of locking the gate is. So don't play games with me, kid. I don't want to hurt you, but I will if I have to. Just give me what I want, and I'll leave you alone. Don't think a fence can keep me away.\"[/i] He clenches his fist and grips the fence.\n \n You look at him and frown. Without a word, you whip your pistol out and aim it at him with one hand. \"Getting past my fence isn't the only thing you should worry about. Leave, and never come back if you know what's good for you.\"\n \n [i]\"You don't threaten me! I won't leave until I get what I want. You won't pull the trigger. I'm pretty sure it's not even loaded. Who would give a pistol to a kid? We're starving. I'm not going to ask again!\"[/i] He gives the fence a slight shake.\n \n You pull the hammer back on the pistol and step closer. \"Want to find out, or are you going to leave? I'm not going to ask again either.\"\n \n He growls and punches the fence, leaving a small cut on his hand from a nail, then he pushes himself away from it. [i]\"This isn't the last time you've seen us. I'll have my revenge, you know. And you'll suffer when my wrath strikes you!\"[/i] he says as the woman next to him pulls him away by his arm. He keeps shouting at you as he walks after her.\n \n \"Yeah, yeah, welcome to the club. Don't forget to leave a wound somewhere, too. I'll pass the shoot-on-sight rule for you back to the base.\" You lower your pistol when they get far enough away, then you walk towards the mansion.\n \n You walk through the garden and glance at the barricaded front door. You walk past it towards the left side of the mansion and begin to climb up the wall. You drop inside a window, panting a little. You barricade the window, then sit down on the bed in the same green room ${survivor3} found the hoodie in. You stretch your limbs, then walk downstairs to the kitchen. You open the cupboard and dust off a small bag of crackers.\n \n You walk behind the stairs and crouch under them to pick up a small red carpet, revealing a trap door. It's heavy, but you lift it open. You climb down into a small but loud decontamination chamber. You step out and go down some more stairs into a small, grey room with a couch and supplies stocked on the weak wooden shelves. You sit down on the couch in front of a small television. It plays back old, captured movies and shows. The small generator that it's attached to hums quietly in the corner. You glance at the television and put your backpack on the ground. After releasing a sigh, you lay down on the couch. It feels good to finally take your gas mask off. You slowly put it down next to you and let your hand hang off the couch. \n *goto cont\n", "ch1": "[b][i]Chapter 1 - A New Dawn[/i][/b]\n\nEverything is calm and beautiful. The sun is shining so bright, you can feel it on your skin; you can even breathe it in. The birds are chirping, and the grass tickles your ankle just enough to make you smile. Still, something seems a bit off. You take a final deep breath from the beautiful field before a loud alarm rings in your ears.\n*page_break\n\nYou open your eyes and quickly snap back into reality right before you smack the ringing alarm clock on the nightstand to your left. As you lazily sit up in your bed and rub one eye with your wrist, you look out of the window to your right. After double-checking the alarm clock, you notice how the sun should have already been up by 7:17 AM. \n\nThe mornings have slowly been getting darker every day since the war started. Thick, grey, foggy pollution blocks out the sun more and more each day, with new nuclear weapons being tested daily. You remember catching bits of information about the current state of the world. Things about breaking points, bombings, terrorist attacks, and many other things you either didn't care about, or didn't understand. Maybe both, in some cases, as a ten-year-old.\n\nYou quickly shrug the thought off and decide to get ready for school. A joyful moan leaves your mouth as you sit on the edge of your bed and stretch your limbs. You then get up and walk towards your wardrobe, which is located right next to your currently closed door. Without hesitation, you open its doors wide and put on your favourite long-sleeved shirt.\n*set Clothing 1\n\nThe sleeves are red, but the rest is black, so it looks like there are sleeves coming out from under a regular T-shirt. Then, you put on your dark blue jeans before you head to the other side of the room, into your bathroom to wash your face. If nothing else, the lack of warm water wakes you up a little. You pick up your dark red backpack from the foot of your bed. It's heavy, since you not only have to bring books to school but survival equipment too. You double-check if you packed everything, then head downstairs.\n*set Gasmask true\n*set Books true\n\n\nLeaving the door to your room open, you make your way down the stairs. You keep staring at the entrance of the house as you do so, then turn left and walk into the kitchen to find your breakfast ready on the table, but your parents are nowhere to be seen. You drop your backpack on one of the empty chairs and hear some quiet chattering behind you, from your parents' room.\n*choice\n #Sit down and eat.\n  They must have a good reason for not coming out of their room just yet. You glance once more across the living room at your parents' closed bedroom door. With your footsteps muffled by your socks, you take a seat and begin to shovel in your breakfast.\n  \n  As you take the last few bites, the door to your parents' room bursts open and you hear your parents coming in.\n  \n  \"I'm telling you, Greta, the government isn't in control anymore, and I wonder if they ever have been. We are [i]this[/i] close to having a nuclear war; have you taken a look outside?\" You hear your dad's voice.\n  \n  \"Calvin, all I'm saying is—\" Your mother stops for a second when they reach the kitchen, and you turn around to look at them, then she continues. \"All I'm saying is, everything [i]is[/i] fine. It is perfectly safe to go outside. The government keeps everything under control.\" She gives your father [i]that[/i] look. You know [i]that[/i] look well. They do that when something is probably not exactly the way they tell you it is, but even though you know that, it still feels good to hear that everything is fine.\n  \n  You push the plate away and thank your mother for the breakfast, grab your backpack, and head towards the door.\n  *label watch\n  *page_break  \n  \n  \"Hey, son! Didn't you forget something?\" Your dad walks over to you and pushes a small, thick, yellow card into your hand. It emits a loud beeping sound, and a green light suggests that it's on.\n  \n  \"This is the second time you've almost forgotten to bring your identity card. If they ever catch you outside without it, they'll either take you to the refugee camp or implant it under your skin and seal it around the chip so it can never be taken out. Do you want any of that?\" Your dad rubs your back after he finishes.\n  \n  Ouch. You've heard stories about that. It's not the implantation process that hurts, but the sealing. Especially if you attempt to take it out. \"No, it won't happen again. I'm sorry,\" you say and open the door to leave.\n  \n  \"Take care, honey, and be good today, I'm making your favourite meal for you. We love you,\" your mom says. \n\n  \"Yup,\" your dad adds, now sipping coffee.\n  *choice\n   #\"I always take care.\"\n    \"I always come home in one piece. Don't worry about me.\" With that, you close the door behind you.\n    *goto outside\n   #\"I love you, too.\"\n    \"I love you, too, Mom and Dad.\" You smile, and with that, you close the door behind you.\n    *goto outside\n   #Just leave.\n    You smile, and with that, you close the door behind you.\n    *goto outside\n   \n  \n  \n\n #Check it out.\n  You turn around and make your way across the living room towards their bedroom. After knocking politely a couple of times, you put your ear to the door.\n  \n  \"Come in, honey.\" \n\n  You gently push the door open to find your parents sitting on the edge of the bed and watching the news, which is muted now.\n  \n  \"Unbelievable. I'm telling you, Greta, the government isn't in control anymore, and I wonder if they ever have been. We are [i]this[/i] close to having a nuclear war; just take a look outside!\" Your dad turns the television off and rubs his eyebrows.\n  \n  \"Calvin…\" Your mother stops for a second and looks at your dad. \"Everything [i]is[/i] fine. It is perfectly safe to go outside. The government keeps everything under control.\" She gives your dad [i]that[/i] look. You know [i]that[/i] look well. They do that when something is probably not exactly the way they tell you it is, but even though you know that, it still feels good to hear that everything is fine.\n  \n  \"Come, honey, there's no time for breakfast. You should have eaten instead.\" Your mother rubs your head, and they escort you to the kitchen. You shrug a little with an empty stomach and head towards the door with the backpack in your hand.\n  *goto watch\n\n  \n*label outside\n*page_break\nAs you step outside, a bad mixture of a burning and rotting smell fills your nostrils. You're getting used to it though, as much as one can get used to something like that. You make your way towards the fence, walking through a garden that has no living plants in it. You look at it and can't help but smile at how they made your regular fence into a barbed fence, with two guards standing on each side of the entrance. You glance back at your orange-coloured house, with a red roof.\n\nWhile you're walking, you look down at your yellow identity card. It contains all the information about you, starting with your name. You read it, and maybe even whisper it.\n*choice\n #\"David.\"\n  *set Firstname \"David\"\n  *set Lastname \"Lyfeld\"\n  *set Name (Firstname&\" \")&Lastname\n  *goto outside2\n #\"Adam.\"\n  *set Firstname \"Adam\"\n  *set Lastname \"Lyfeld\"\n  *set Name (Firstname&\" \")&Lastname\n  *goto outside2\n #\"Jack.\"\n  *set Firstname \"Jack\"\n  *set Lastname \"Lyfeld\"\n  *set Name (Firstname&\" \")&Lastname\n  *goto outside2\n #\"Carl.\"\n  *set Firstname \"Carl\"\n  *set Lastname \"Lyfeld\"\n  *set Name (Firstname&\" \")&Lastname\n  *goto outside2\n #\"Alan.\"\n  *set Firstname \"Alan\"\n  *set Lastname \"Lyfeld\"\n  *set Name (Firstname&\" \")&Lastname\n  *goto outside2\n #None of these are my name.\n  *input_text Firstname\n  *set Lastname \"Lyfeld\"\n  *set Name (Firstname&\" \")&Lastname\n  *goto outside2\n\n  \n*label Outside2\n\"${Name},\" you whisper, then continue reading. [i][b]${Lastname}; ${Firstname};[/i][/b] Gender: [i][b]Male;[/i][/b] Age: [/i][b]10;[/i][/b] District: [i][b]Ignobilis[/i][/b]\n\nThe word \"Ignobilis\" always catches your eye, and for some reason it also makes you smile. You've always had trouble pronouncing it. You remember when you asked your parents its meaning. They said that when things went south, people got put into districts based on their income and the quality of their lives.\n\nThe \"Pauper\" district is the lowest. People have almost no rights there, and they mostly live in small, crowded flats. There are more guards there than in any other district.\n\nThe \"Dives,\" on the other hand, are at the top. They have all the rights, and the guards are there to protect them from whatever might come into their villas, unlike the lowest districts.\n\nAnd lastly, the \"Ignobilis.\" It's the largest district, and stands somewhat between the other two districts. It's crowded with families who have had an average income and quality of life. Now they live in flats and houses with small gardens, including you.\n\nThe three districts are only separated by huge walls surrounding each other. The only way to cross them is by the gates leading from one district to another. As expected, they're heavily guarded. As you slowly approach the gate, a familiar guard walks closer to you.\n\n\"Your IDC,\" he says, holding up a small machine that reminds you of the handheld scanners they used in the airports until all travelling options outside the district were shut down. He keeps looking at you in his lightweight armour with no helmet. The other guard with heavyweight armour from the gate keeps looking at you, or at least you think he does; you can't see through his helmet with black eyeshades.\n*fake_choice\n #\"My what?\"\n  \"Your Identification Card. You should get used to IDC, because I'm not going to say the whole long thing ever again.\" He firmly grips your arm, then scans your card. His machine beeps three times, and he nods towards the gate. \"All right, ${Firstname}, you can go.\" He walks to the gate with you, then you take a left turn and head towards your school.\n  \n #\"You've been here for a while, still don't know me?\"\n  *set resist1 true\n  He frowns and grips your arm firmly, then scans your card. His machine beeps three times, and he nods. \"Just imagine what would happen if I had to remember all the scum around here.\" He grins and continues, \"So I take it the ${Lastname} family is the sassy and disobeying type, right? Maybe I'll let the commander know, so you can be taught some manners. With the Paupers, maybe. You can go now, ${Firstname}.\" He laughs and gives you a firm push on your back with his scanner.\n  \n  \"Ow,\" you murmur to yourself and take a left turn as you arrive at the gate and head towards your school.\n  \n #Extend my hand with the Identification Card towards him.\n  He puts the scanner above your card, and it beeps three times. He nods and gives your back a couple of firm pats. \"All right, ${Firstname}, you can go,\" he says, and you both walk towards the gate. \"You know, we need some more obedient citizens like you. Maybe I'll let the commander know that the ${Lastname} family is one of those.\"\n  \n  You nod and give a small smile. When you arrive at the gate, you take a left turn and head towards your school.\n  \n\n\n\nAs you walk down the pavement, you pass some houses with two guards out front, similar to yours. You walk past the neighbour's light-green house, and the guards don't even look at you. The houses look very similar to one another, and the sun is still not up. It's not pitch black, but you could use some light right about now. \n\nYou walk deeper into the city, where the flats, apartments, stores, workplaces, and taller buildings are. Taking a look at the old shops makes you frown. The vendors have become very pushy, and everyone seems to work harder than ever.\n\nEven the once always-smiling office workers run in and out of the building, their smiles now absent. They are run by government officers and overseers watching their every step; maybe that's the reason. You check left and right when you cross the road to your school. Some cars and bikes pass by, nothing unusual. Then a couple of army trucks speed past you, packed with what seem to be soldiers.\n\nAs you arrive at the school, you sigh at the sight of the barbed fence surrounding it. The extreme amount of guards patrolling around it are upsetting too. You're approaching the entrance when familiar faces smile at you from the school hallway. ${bf1}, your oldest friend, and your new friend, ${bf2}.\n\nYou smile back and are about to make your way inside when a hand on your shoulder from behind stops you at the entrance.\n\n\"You've been selected for a random search. Step aside and put your hands on the wall,\" a firm voice says and gives you a slight push.\n*set Rep 1\n*fake_choice\n #\"What do you think I'm hiding? A gun?\"\n  The guard pushes you firmly against the wall. \"You could be, for all I know. Scum.\" He searches you thoroughly, then yanks your backpack open. \"All right, you're clear.\" He grips your shoulder and scans your card before you have a chance to enter your school. \"I'd consider what to say the next time. ${Lastname}.\"\n  \n  You nod and shake his grip off, then walk into the school and towards your friends.\n  \n  Inside, ${bf1} greets you with a friendly hug and mentions that he's still taller than you, making you both smile. ${bf2} stands there shyly messing with her long blonde hair, as usual. \"My dad said it's better if you just do what they say. You know Aaron? He always gave the guards a hard time, and now he's gone! Creepy stuff,\" ${bf1} says.\n\n  $!{bf2} nods. \"Yup. Scary.\"\n\n  You nod as you head up the stairs to your first lesson.\n  \n  \n #Cooperate.\n  You obey and put your hands on the wall. He searches you thoroughly, then yanks your backpack open to take a look around in it. \"All right, you're clear. Scum. Go now, and stop wasting my time.\" With that, you nod and walk inside the school and towards your friends.\n  \n  Inside, ${bf1} greets you with a friendly hug and mentions that he's still taller than you, making you both smile. ${bf2} stands there shyly messing with her long blonde hair, as usual. \"You did good back there. My dad said it's better if you just do what they say. You know Aaron? He always gave the guards a hard time, and now he's gone! Creepy stuff,\" ${bf1} says\n\n  $!{bf2} nods. \"Yup. Scary.\"\n  \n  You nod as you head up the stairs to your first lesson.\n   \n  \n #Resist.\n  *set resist2 true\n  *set Cheekwound true\n  \"Not going to happen,\" you say and try to enter the school, but he grips your shoulder tighter and pulls you back. \"You have no righ-\" You open your mouth to speak, but he slams you hard against the wall and kicks your legs wide. You feel something heavy pushing against the back of your head. Suspecting that it's a gun, you freeze as he searches you, then yanks your backpack open. \n  \n  \"I have all the rights in the world, kid.\" You feel his hand pushing deep into your backpack, then he pulls it out and flips you around to face him.\n  \n  \"Look what we have here,\" he says, holding a very sharp-looking knife in his hand. \"What were you planning to do with this?\"\n  \n  \"But that's not even mine!\" You raise your eyebrows. He grins, raises the hand with the gun, and smacks your face with the handle. After not knowing how much time has passed, you open your eyes with him standing above you and scanning your card. \"The commander will hear about this, ${Lastname},\" he says, then walks off.\n  \n  Unsteady, you get up and touch your left cheek. It feels pretty swollen below your eye, and you see some blood on your fingers. \"Great,\" you say to yourself as you head inside the school, still feeling a little dizzy.\n  \n  Inside, ${bf1} greets you with a friendly hug and mentions that he's still taller than you, making you both smile. ${bf2} stands there shyly messing with her long blonde hair. \"That looks like it hurts…like hell,\" ${bf1} says, and ${bf2} hisses from the thought. \n  \n  \"It's better to just do what they say. You know Aaron? He always gave the guards a hard time, and now he's gone! Creepy stuff,\" ${bf1} says. \n\n  $!{bf2} nods. \"Yup. Scary.\"\n  \n  You nod as you head up the stairs to your first lesson.\n  \n\n\n\n*page_break\nAs you walk up the creaking stairs, you take a look at the walls and the floors above you. It's a wonder how this school is still in one piece. You walk into the classroom and sit down next to…\n*fake_choice\n #${bf1}.\n  *set Rep 1\n  *set Bradley %+10\n  *set Abbie %-10\n  *set satwithbradley true\n  You sit down next to ${bf1} and pay attention every now and then, but chatter away whenever the teacher isn't looking at you. From the corner of your eye, you see ${bf2} glancing at you once in a while.\n  \n  \n #${bf2}.\n  *set Rep 1\n  *set Bradley %-10\n  *set Abbie %+10\n  *set satwithabbie true\n  You sit down next to ${bf2} and pay attention every now and then, but chatter away whenever the teacher isn't looking at you. From the corner of your eye, you see ${bf1} glancing at you once in a while.\n  \n\nHow would you manage to sit through all the boring lessons if you were alone?\n*page_break\n\nThe dull sound of the bell indicates that the lesson has reached its end.\n\n*if (satwithabbie)\n\n \"Finally. Hey, wanna sit next to me and suffer together through the remaining lessons? It would be fun.\" She chuckles. You nod and pack your book into your backpack. After swiftly putting it on your back, you head out of the classroom. \n \n You sit through lesson after lesson with ${bf2}. They go better than expected, somewhat resulting in a good time with her. \n *goto schoolcont\n \n*elseif (satwithbradley)\n\n \"About time. I was about to fall asleep. Wanna suffer through the day by my side? I think it would be fun.\" He laughs. You nod and pack your book into your backpack. After swiftly putting it on your back, you head out of the classroom. \n \n You sit through lesson after lesson with ${bf1}. They go better than expected, somewhat resulting in a good time with him. \n *goto schoolcont\n \n*label schoolcont\n\nBefore you know it, another day of school is over. The quiet halls fill with laughter and chatter as you walk down the stairs and out the front doors. \n\n\"So…same time tomorrow?\" ${bf2} asks with her arms crossed.\n\n\"Yup. See you guys tomorrow! Or at least you, ${firstname}. ${bf2} lives relatively close to me,\" ${bf1} chuckles.\n\n*if (resist2)\n\n \"And try to cooperate with the officers until then.\" ${bf1} smiles as you part ways.\n *goto schoolcont2\n \n*else\n\n \"Shame you don't live closer to us, we could walk home together.\" ${bf2} smiles as you part ways.\n *goto schoolcont2\n \n \n*label schoolcont2\n\nYou begin your walk home on the busy streets. Officers run around, along with businessmen. They shout at one another, seemingly filling the district with life. Then the sun barely lights the streets through the pollution anymore. You're about to cross the road on the well-worn crosswalk when a slim man almost knocks you off your feet as he runs past you. [i]\"It's here! You can't stop them now! Don't believe them! Hide, get your own shelter before it's too late!\"[/i] he shouts as he holds a small, rusty, and bloody knife.\n\nThree officers with lightweight armour and small handguns run past you, then aim their guns at him. The man drops the knife and puts his hands up. The officers keep aiming their guns at him, then they press on their earpieces and seem to listen to them. They nod once, and without a word, they start firing. The man stumbles back with bullet holes in his clothes and blood pouring out of his wounds. The sight makes you feel…\n*fake_choice\n\n #Scared. I've never seen anything like this before, and it terrifies me.\n  You stumble back as overwhelming fear runs through your body. The sight of a dead body lying in a pool of blood gives you the chills.\n \n #Angry. The man was obviously no threat, and they shot him.\n  *set Evil %-5\n  You clench your fists and frown as you take a step closer to the dead body lying in a pool of blood.\n \n #Joy. I've seen things like this many times on television, and I've wanted to see something like that in real life ever since.\n  *set Evil %+5\n  A wide grin draws over your face as the pool of blood under the dead body gets bigger and bigger.\n\n\n\nTwo of them walk over to the body and talk as they press on their earpieces. One of them walks towards you and gives you a firm push. \"Get going, nothing to see here. Unless you want trouble, scum.\"\n*choice\n #\"He wasn't a threat, and you shot him.\"\n  *set resist3 true\n  \"Hmpfh. I'd let us decide who's considered a threat and who isn't, if I were you. Or you can find yourself with the Paupers soon.\" She grips your arm and scans your card. \"Ah, ${name}. And you don't even live that far. How about I escort you home, huh? I'll have a talk with your parents before I consult with the commander about your fate. I'll give him some [i]very[/i] good advice.\" She laughs and grips your shoulder tight, then pushes you forward down the street. The neighbours stare at you as you get pushed down the street by your shoulder. Her grip begins to feel uncomfortable just as you get to your fence.\n  \n  *if (resist1 = false) and (resist2)\n\n   The guards stand at the fence and chuckle slightly. You walk down the path to your house and find the officer from school currently talking with your parents in the doorway. They shake their heads as they give you a disappointed look.\n   \n   \"And there he is. He must have done something again. We found a big, sharp pocket knife in his backpack. And he threatened me, actually, then threatened to blow up the headquarters. I feel sorry for you folks. I have to report it to the commander, and with the current state…well…you know, there are quite a few vacant slots at the Paupers.\" He winks and grins at you.\n   \n   \"He also likes to interfere with official business and pass judgement on us. There's quite a few problems with you, eh, ${firstname}? I'll have to report all this to the commander and have him decide your fate.\" She lets your shoulder go, and you give it a rub in relief.\n   *label scold\n   \n   They walk off with a laugh and give your back some rough pats as they do so. You walk inside and turn around to face your parents. They stand at the closed door with crossed arms, giving you an angry look.\n   \n   \"Why is it so hard to behave? Am I asking a lot? You simply have to cooperate! Do you want to end up in the Pauper district? We'll die there!\" Your father slams the door and rushes off to his room.\n   *label scold2\n   \n   Your mother turns to you and gives your head a slight rub. \"Please, ${firstname}…just behave, okay? I know the officers are capable of exaggerating, I know them well. But these times are rough…try to behave. It's not easy for us, so don't make things harder, okay? Will you behave?\" \n   *choice\n    #\"All right.\"\n     \n     \"Thank you, ${firstname}. Your lunch is on the table. I'll go and calm your father down in the meantime.\" She smiles and gives your head another slight rub as you walk to the kitchen and sit down before the hot, steaming food. Despite how hot it is, you finish eating rather fast. The warm, fresh food feels refreshingly good as you walk up the stairs to your room.\n     *goto schoolcont3\n\t \n\t\n    #\"No way.\"\n     \"I'm disappointed now. Very disappointed. I expected better from you. You're grounded. Get to your room, I don't want to see you for the rest of the day. I'll calm your father down…and tell him the bad news.\" She gives you a slight push towards the stairs. You glance at the hot, steaming food on the plate to your left and head up the stairs with an empty stomach.\n     *goto schoolcont3\n   \n   \n  *elseif (resist1) and (resist2 = false)\n  \n   One of the guards greets you at the fence and chuckles slightly. You walk down the path to your house and find the other guard currently talking with your parents in the doorway. They shake their heads as they give you a disappointed look.\n   \n   \"And…and there he is. See? He must have done something again. I'm telling you, he cannot behave, simply can't. And I feel sorry for you folks. I have to report it to the commander, and with the current state…well…you know, there are quite a few vacant slots at the Paupers.\" He winks and grins at you.\n   \n   \"He also likes to interfere with official business and pass judgement on us. There's quite a few problems with you, eh, ${firstname}? I'll have to report all this to the commander and have him decide your fate.\" She lets your shoulder go, and you give it a rub in relief.\n   *goto scold\n  \n  \n  \n  *elseif (resist1) and (resist2)\n  \n   One of the guards greets you at the fence and chuckles slightly. You walk down the path to your house to find the other guard and the officer from school currently talking with your parents in the doorway. They shake their heads as they give you a disappointed look.\n   \n   \"And…and there he is. See? He must have done something again. I'm telling you, he cannot behave, simply can't. And I feel sorry for you folks. I have to report it to the commander, and with the current state…well…you know, there are quite a few vacant slots at the Paupers.\" The guard shakes his head.\n\n   \"We also found a big, sharp pocket knife in his backpack. And he threatened me, actually, then threatened to blow up the headquarters. I have to report it to the commander as well.\" He winks and grins at you.\n   \n   \"He also likes to interfere with official business and pass judgement on us. There's quite a few problems with you, eh, ${firstname}? The commander won't be happy about this.\" She lets your shoulder go, and you give it a rub in relief.\n   \n   They walk off with a laugh, giving your back some rough pats as they do so. You walk inside and turn around to face your parents. They stand at the closed door with crossed arms, giving you an angry look.\n   \n   \"Are you trying to kill us?! Are you out of your mind? Do you know what happens if we get sent to the Paupers? We'll die! That's what!\" Your father shouts and slams the door before he rushes to his room.\n   *goto scold2\n   \n   \n  \n  \n  \n  *elseif (resist1 = false) and (resist2 = false)\n  \n   The guards stand at the fence and chuckle slightly as you get pushed past them. The officer slams you hard against the door, then knocks on the door roughly with her fist. Your parents open the door, and a surprised look draws over their faces. They're about to say something when the officer speaks up loudly.\n   \n   \"Afternoon. Apparently, ${firstname} here thinks he can interfere with anything he wishes to, and judge us. I keep convincing myself that's not how he was raised. I hope I'm not wrong here. I'll just report it to the commander and let him decide your fate. And I recommend teaching some discipline here. Have a good day.\" She turns on her heels and gives your back a few rough pats before your parents have a chance to answer.\n  \n  You walk inside and turn around to face your parents. They stand at the closed door with crossed arms, giving you an angry look.\n   \n  \"${firstname}, what was that? Am I asking a lot? You simply have to behave! Do you want to end up in the Pauper district? Keep this attitude up, we might get there!\" Your father slams the door and rushes off to his room.\n  *goto scold2\n  \n\n  \n  \n  \n  \n #\"Sorry, I'll get going.\"\n  \"Good. Obey like the good peasant you are, and you might get to stay in this district. It's overflowing with citizens as it is. So we either move the worst, or…\" She glances back with a laugh. \"You get the idea. Get moving.\" She gives you a firm push to your shoulder, and you head down the street. The neighbours greet you as you walk down the pavement towards your fence.\n  \n  \n  *if (resist1 = false) and (resist2)\n\n   The guards stand at the fence and chuckle slightly. You walk down the path to your house and find the officer from school currently talking with your parents in the doorway. They shake their heads as they give you a disappointed look.\n   \n   \"And there he is. He must have done something again. We found a big, sharp pocket knife in his backpack. And he threatened me, actually, then threatened to blow up the headquarters. I feel sorry for you folks. I have to report it to the commander, and with the current state…well…you know, there are quite a few vacant slots at the Paupers.\" He winks and grins at you.\n   *label scold_1\n   \n   He walks off with a laugh, giving your back some rough pats as he does so. You walk inside and turn around to face your parents. They stand at the closed door with crossed arms, giving you an angry look.\n   \n   \"Why is it so hard to behave? Am I asking a lot? You simply have to cooperate! Do you want to end up in the Pauper district? We'll die there!\" Your father slams the door and rushes off to his room.\n   *goto scold2\n   \n   \n   \n   \n  *elseif (resist1) and (resist2 = false)\n  \n   One of the guards greets you at the fence and chuckles slightly. You walk down the path to your house and find the other guard currently talking with your parents in the doorway. They shake their heads as they give you a disappointed look.\n   \n   \"And…and there he is. See? He must have done something again. I'm telling you, he cannot behave, simply can't. And I feel sorry for you folks. I have to report it to the commander, and with the current state…well…you know, there are quite a few vacant slots at the Paupers.\" He winks and grins at you.\n   *goto scold_1\n  \n  \n  \n  *elseif (resist1) and (resist2)\n  \n   One of the guards greets you at the fence and chuckles slightly. You walk down the path to your house to find the other guard and the officer from school currently talking with your parents in the doorway. They shake their heads as they give you a disappointed look.\n   \n   \"And…and there he is. See? He must have done something again. I'm telling you, he cannot behave, simply can't. And I feel sorry for you folks. I have to report it to the commander, and with the current state…well…you know, there are quite a few vacant slots at the Paupers.\" The guard shakes his head.\n\n   \"We also found a big, sharp pocket knife in his backpack. And he threatened me, actually, then threatened to blow up the headquarters. I have to report it to the commander as well.\" He winks and grins at you.\n   \n   They walk off with a laugh, giving your back some rough pats as they do so. You walk inside and turn around to face your parents. They stand at the closed door with crossed arms, giving you an angry look.\n   \n   \"Are you trying to kill us?! Are you out of your mind? Do you know what happens if we get sent to the Paupers? We'll die! That's what!\" your father shouts and slams the door before rushing into his room.\n   *goto scold2\n   \n   \n  \n  \n  \n  *elseif (resist1 = false) and (resist2 = false)\n  \n   The guards stand at the fence and nod once as you walk past them. You walk to the door and enter the house. You find your parents talking in the living room to your left.\n   \n   \"Hey there, I hope you had a good day. Excuse us for a moment.\" Your father fakes a smile as he walks into his room and waits for your mother. She gets up from the couch and walks over to you. She gives your head a slight rub and smiles.\n   \n   \"Lunch is ready in the kitchen. Be good and eat while I calm your father down. Or at least try to. He's worried about so many things these days. Sometimes, he even suspects you'll get dragged in by officers. I'm proud of you for proving him wrong.\" She gives the top of your head a kiss and walks into their room. You walk to the kitchen and sit down before the hot, steaming food. Despite how hot it is, you finish eating rather fast. The warm, fresh food feels refreshingly good as you walk up the stairs and into your room.\n  *goto scold2\n\n\n\n\n\n\n\n\n\n\n\n\n*label schoolcont3\n*page_break The Following Day…\n\nThe same sharp alarm rings you awake. You smack on it and get up as you give your eyes a small rub. You walk to your wardrobe and put on your clothes, then wash your face before heading down the stairs with your backpack on. You find the kitchen empty. Suspecting your parents are in their room again, you turn towards it but find the door wide open. As confusion fills the house, you walk towards the front door just as your parents open it to walk inside. You take a peek outside between them to see a man in all black and a fedora walking away swiftly, with two heavily armoured guards by his side.\n\nYour father closes the door, and they both turn to you with their arms crossed.\n\n*if (((resist1 = false) and (resist2 = false)) and (resist3 = false))\n\n \"Well…that was the commander in person. And he found us an exceptionally well-behaving family. So, as a reward, we're being assigned to one of the bunkers! It's currently under construction, but they should finish tomorrow, and then, even if everything goes south, we have a place.\" Your father laughs and pulls you and your mother into a hug. He squeezes you so tight, it begins to feel uncomfortable. \"Thank you, son. I knew you could behave, I knew it all along.\" He lets you go and opens the door for you. \"Be good today, as usual. We love you.\"\n \n They smile widely from the doorway and shut the door after you.\n *goto schoolcont4\n \n \n*elseif (((resist1) and (resist2)) and (resist3))\n\n \"Well…that was the commander in person. And…there are a couple of new bunkers under construction in case things go south. Too bad we're not eligible to be assigned to one of those. And we'll probably be moved to the Paupers.\" He glances at you and smacks the door with his fist. \"You only had to behave! Nothing more, just to behave! I don't want to see you, get out! Get out!\" Your father opens the door before giving you a firm push on your back to shove you outside. You glance back to see your mother shaking her head slowly, then your father slamming the door shut.\n *goto schoolcont4\n \n*else\n \n \"Well…that was the commander in person. And…there are a couple of new bunkers under construction in case things go south. Too bad we're not eligible to be assigned to one of those.\" He glances at you and smacks on the door with his fist. \"You only had to behave! Nothing more, just to behave! I hope you're happy. I don't know what we'll do now.\" Your father sighs, then opens the door wide. \"Anyway…we love you. Have a good day at school, and…please try to behave. Don't do more harm, okay?\" You walk through the door and glance back to see your mother shaking her head slowly, then your father slamming the door shut.\n *goto schoolcont4\n \n \n\n \n*label schoolcont4\nThe pollution covers most of the sun, so the streets are barely lit. You reach the crosswalk to see five military trucks speeding by with such speed they almost crash into one another. As you walk on the crossway, dried blood can still be seen on the road to your left. You walk towards your school and try to blend in with the crowd of students as you walk to the front door. \n\n*if (resist2)\n The officer from yesterday glances over at you and laughs. \"Ah, ${lastname}. I hope you're not hiding anything illegal today.\" He laughs again and turns back to the rest of the officers as you walk through the front door. \n *goto schoolcont5\n \n*else\n The officer from yesterday glances over at you and frowns before turning back to the rest of the officers as you walk through the front door.\n *goto schoolcont5\n \n \n*label schoolcont5\n\n\nInside, ${bf1} and ${bf2} greet you, and you head up to your first lesson. \n\n*if (satwithabbie)\n\n Of course, you sit next to ${bf2}. \"Well, it's up to us now to make the most out of this day. And don't die of boredom. Right?\" She laughs and draws a smile to your face, too. \n *goto schoolcont6\n \n*else\n\n Of course, you sit next to ${bf1}. \"Well, another boring day in the boring life of a boring school. Maybe we can make something fun out of it though, right?\" He laughs and draws a smile to your face, too. \n *goto schoolcont6\n \n \n*label schoolcont6\nJust like yesterday, the lessons pass by faster with a good friend by your side.\n*page_break\n\nAnd eventually, the last lesson is about to end. About time, you think to yourself as you shove the book into your backpack. When the bell rings, you stand up but suddenly fall back into your chair as the ground begins to shake. You can even feel the vibrations inside your body.\n\nYou hear an alarm go off inside the school, then one outside, then one more in the distance…soon, all you can hear are alarms from all around the district. They echo with such volume that your ears ring, and the already unfolding chaos throughout the entire school isn't helping either, but you manage to read the lips of your teacher, Miss ${teacher1}. \"Downstairs.\" She repeats it a couple of times, then makes a run for it. You quickly jump over your desk and motion ${bf1} and ${bf2} to follow you.\n\nYou try to catch up with the teacher as fast as you can, while paying attention to your friends. It proves to be a hard task, as every second someone else screams into your already pained ears or bumps into you, almost knocking you off your feet. It's a long way down, or at least it seems like it. As you arrive on the main floor, you notice how everyone is running about everywhere, even outside. Some teachers try to gather students, while others push them aside to run for their lives.\n\nEventually, you arrive on the lowest floor, which looks like a long, dark corridor. You were expecting a bigger crowd. There only seems to be around twenty students, including yourself, down here. The smell reminds you of old, mouldy cheese, and it looks more wrecked than the rest of the school. \n\nYou and the others are standing in front of a big, thick, rusty door as Miss ${teacher1} scans her card on a tiny computer attached to the wall, then she begins hitting the keys, probably inputting the password. You glance at the white writing above the door: Bunker #D;IG;575;\n\nYou turn your head to the right and notice there are at least two more bunkers similar to this one. \n*page_break\n\nBefore you have any more time to think about it, someone gives you a push from behind, and you find yourself in a huge elevator. \"Stop dawdling!\" You glance at the tall student for a moment, before you turn your head back to ${teacher1}. She looks inside, then begins to shut the door. \"I'll bring the others.\" With that said, she shuts the door tight from the outside and turns the wheel on the door, resulting in a loud cranking noise. The lights turn on and the elevator begins to go down slowly. You notice there are stairs to your right as the elevator arrives after what feels like years, in complete silence.\n\nAs you step out of the elevator, you find yourself in a huge room that reminds you of a living room. The others scatter, and you walk through what seems to be the layout of the bunker. Next to the living room are the living quarters and the restrooms, and after that is the kitchen.\n\n\"I found the remote!\" You turn around to find one of your classmates, nerdy ${classmate1}, holding a remote and turning on the television on the other side of the room. It seems show your district from a camera placed on the roof of the school. \n\nYou can hear the alarms, the people screaming, shouting, cars bumping into each other and even see officers hijacking cars. There seems to be complete chaos. Others around you are asking the questions you yourself would like to know the answers to, as well. \n\n'What's going on? What's happening? Why are we here…?' Everyone is focusing on the screen when a huge light emits from somewhere in the district. The television goes silent, and the ground shakes even more. A second later, you begin to see something that looks like a mushroom made out of smoke, then something that seems to be a huge wave coming right in your direction.\n\nThe television goes black, and a loud explosion can be heard coming from the surface. You can feel the bunker itself shaking and see dust falling from the ceiling and the cracks. ${classmate1} keeps pressing the buttons on the remote, expecting it to come back. After minutes of silence, ${classmate2}, the well-known oldest member and bully of the school, who has pushed you into the elevator, turns around. His eyes widen and he mumbles, \"My…parents.\"\n\nYou ignore the immediate noise around you, and your eyes widen as your heart suddenly throbs as fast as it can, feeling it in your throat. Uncontrollably, tears roll down your cheeks as you keep staring off into nothingness.\n*page_break The following day…\n\n\"I can't believe they're gone…\" ${bf2} wipes her eyes on the small green bed in your chamber.\n\n\"Don't say that…maybe they found a safe place or something!\" ${bf1} snaps at her across the small room, then turns to you. \"What do you think?\"\n\n*fake_choice\n\n #\"I think they're alive.\"\n  *set Bradley %+5\n  *set Abbie %-5\n  \n  You're sitting on your own bed, in between their beds, and you lean back. ${bf1} crosses his arms, and ${bf2} releases a big sigh.\n  \n #\"They're gone, ${bf1}.\n  *set Bradley %-5\n  *set Abbie %+5\n\n  You're sitting on your own bed, in between their beds, and you lean back. ${bf2} crosses her arms, and ${bf1} releases a big sigh.\n  \n  \n  \nA loud banging noise startles the whole bunker. Your friends jump on their beds, and you rush to the door. When you open it, you find ${classmate2} banging on a pan in the living room. The others come out of their chambers, and confused chattering fills the room as you follow them.\n\n\"So, since I'm the oldest and obviously the most capable of organizing things here, I'll happily elect myself as the leader. This is our only and best chance for survival, until we come up with something to get out of here.\" He throws the pan away.\n\n\"You're only 16. What makes you better than us?\" ${bf1} shrugs and crosses his arms next to you. ${classmate2} steps closer and gives him a firm push on the chest. \n\n\"What doesn't? I think I've found the best person for toilet cleaning duty.\" He laughs and looks around. \"I'll assign everyone to do something. We'll get this community working. We'll survive, I'll make sure of that. Enjoy your day off, it's the last one. That's all.\" He crosses his arms and keeps smiling as all of the students walk into their chambers, along with you.\n\n\"Screw him…\" ${bf1} jumps onto his bed and frowns.\n\n\"You shouldn't have spoken up.\" ${bf2} leans against the wall and glances over at you.\n\n\"Whatever…he won't be able to organize anything. He's still a bully, nothing more. I just hope we can get out soon, or I have a feeling that rough times await us…\" He glances at the closed door. A worried, uncertain feeling about the future fills the room.\n*finish Two Years Later…\n", "ch2": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Doomsday on Demand[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase adfree $4.99 purchased\n  *delay_break 300\n\n*label purchased\n\n[b][i]Chapter 2 - Today is Always Gone Tomorrow[/i][/b]\n\n\n\"Well, happy birthday,\" you murmur to yourself as you tap on the small pixel candle on your Identification Card and watch as it blows out. The lights flicker on the card. The battery in it has to be replaced every year, so it's a wonder how it could still be working. \n\nYou glance at the information section and smile as the number 11 at the age section fades away and switches to 12. You stuff it into your backpack and release a slight sigh when you think about the past two years down here, without any information about the outside world. You've been trying to get out, but without the password to the door, it seems to be impossible. ${classmate1} somehow came up with a calculation which got everyone's hopes up. Until the variation of the password came to 387420489.\n*set Age 12\n*set idcard true\n*achieve bday\n*page_break\n\nYou leave the room you share with ${bf1} and ${bf2}, then take a look at the 'assignment' chart. Cleaning duty in the living room, again. Your frown turns to a slight smile when you see ${bf1}'s toilet cleaning and ${bf2}'s ration handout duty. The latter has been harder, since the stock is running low on food. Ever since ${classmate2} elected himself as the leader, he's taken his duties very seriously. He's still a bully, but no one can question his ability as a leader, since the community goes more or less smoothly. With that thought, you make your way towards the living room.\n\n\"Finally. Get to work!\" ${classmate2} walks by proudly. \"This room isn't going to clean itself, you know.\" \n*fake_choice\n #\"Why don't you do it yourself, then?\"\n  \"Because I can do nothing while you do the work. Obviously. Now get to it, before I get mad.\" He shrugs and grins.\n  \n #\"Nobody chose you as the leader.\"\n  He stops and pushes you against the wall. You hit it hard with your back and release a quiet 'oof.'\n\n  \"This is why I'm the leader. And not you, for example.\" He grins and folds his arms.\n\n #\"Okay I'll get to it. I'm sorry for being late.\"\n  \"Whatever, just do what you're assigned to. And don't be late again.\" He shrugs and grins, not even looking at you.\n\nHe walks past you quickly, murmuring something. You pick up the broom and mop, then start cleaning the living room.\n*page_break Hours later…\n\nThis is probably the most boring job ever, you think as you almost pass out from boredom, when ${classmate2} walks around and rings a hand bell. As much as you hate him doing that, you know it means it's finally lunchtime. You drop the broom and mop to head down the corridor. You pass the living quarters and head towards the kitchen. where you stand in line.\n\n\"I swear, if I have to work there one more day, I'll kill him!\" You look to your right and see ${bf1} frowning with bright red cheeks.\n\n\"At least it's entertaining,\" you chuckle. \"Try cleaning the living room for hours.\"\n\nYou keep chattering until you're next. ${bf2} hands you a plate with smaller rations than yesterday, and you give her a disappointed look unintentionally. \"Sorry, ${firstname}, we're low on stock. You know that.\"\n\nYou nod and force a smile, then head to the table and sit down. Seconds later, ${bf1} accompanies you. \"I don't know how long I can take this horrible thing they call food. I'm actually glad we're low on stock,\" he says, poking his food with his fingers.\n\n\"You realize we'll die if we run out, right?\" you say as you close your eyes and swallow a mouthful of green pottage. ${bf1} shrugs and does the same. \"We can always eat each other. I'd start with ${classmate2}.\" He smiles. \"I hope ${classmate1} will find out the password real s-\"\n\nA loud explosion interrupts him, and the whole bunker shakes for a minute. \"It came from upstairs!\" ${bf1} says and jumps up running towards the living room with the others. The alarms go off, and the whole bunker flashes in red. Memories strike you unexpectedly, but you get up from your seat and follow the others to the living room and gasp.\n\nTwo armed people with gas masks step out of the smoke and walk down the stairs.\n\n\"Look what we have here. A kindergarten party! Looks like they've got themselves a working community. How cute is that?\" says a tall man as he waves his rifle around.\n\n[i]\"They would be good for labour,\"[/i] a shorter man says, scratching his head with his revolver.\n\n\"All right,\" he nods. \"Round up the tough ones, and the ones with working gas masks. And kill the rest,\" he says as he walks into the living quarters.\n*page_break\n\nMinutes later, a handful of you are standing behind the tall man, with tied hands and gas masks on, ready to leave. You're the first in line and keep glancing back at the ones that count as expendable. They beg and cry heavily. You can feel your stomach tie up in knots, but knowing that both ${bf1} and ${bf2} are with you is reassuring.\n\nGunshots and screams echo from the bunker as you walk up the stairs into the school. Your insides tremble just from imagining what could be happening down there. Quiet sobbing can be heard from your other classmates behind you as the shorter man walks up the stairs, reloading his revolver. He motions towards the other man, and you begin to walk. On the left side, the remaining couple of bunkers are either still closed or seem to have been opened from the inside. The rest of the floors are demolished, and you gasp as you step over the dozens of bones and skeletons scattered around. You walk out into the open and have to cover your eyes. It's been a while since you've seen and felt real light. Though it's close to sunset, when you can finally bear to look, you can't help but stop at the sight.\n\nThe once crowded district full of lives, small suburban areas, stores, and various other buildings is now in ruin. It looks as if it was a totally different area. You can count the standing and half-standing buildings on both hands. Even the sky is darker than it was before. There seem to be deserted areas and no sight of living plants or creatures. Except the few walking and flying creatures you can't identify in the distance.\n\n[i]\"Oi, ${capturer1}. We don't have time for this. It's getting dark.\"[/i] He points from the back of the line with his revolver towards you, and you can feel a firm grip on your hand giving you a rough pull.\n\n\"Stop to idle again and I'll end you. Understood?\" he says, glancing at you over his shoulder.\n*fake_choice\n #\"Try me.\"\n  *set Ivan %+10\n  \"Keep this attitude up, and that day will come sooner than you can imagine.\" He keeps glancing at you over his shoulder, then chuckles. \n\n #\"Understood.\"\n  *set Ivan %-10\n  \"Good. I was hoping I wouldn't have to deal with some halfwit.\" He nods slightly, then looks forward.\n\n\n\"You know what, I think we're off to a bad start. My name is ${capturer1}, and that one at the back is ${capturer2}. How long have you been down there?\" he asks as you walk past a small green steaming and bubbling pond with half-rotten corpses halfway submerged in it. Luckily, the gas mask saves you from the smell. \n\n\"Two years,\" you answer, turning your head away from the pond.\n*achieve meetem\n*set rep2 1\n*set rep2_2 1\n*page_break\n\n\"Well kid, it's a dog-eat-dog world out there now. And the ones that have guns rule. See, that's why you're the one walking tied up, and not me. I have a gun, and I can shoot. You possess neither a gun nor the skill to shoot.\" He chuckles and turns his head towards you for a second before you crouch down to avoid a moss-covered wreck, which was once a tower. \n\n\"By the way,\" he says as you straighten up, and he pokes your chest with the end of his gun. \"What's your name again?\"\n\nYou glance down at the barrel of the gun and swallow hard. \"I'm…${firstname}, ${Name}.\"\n\n\"${Lastname}? I know a couple of fellows back at the base named that.\" Your heartbeat quickens when you hear that, and you can't help but smile widely under your gas mask.\n\nHe bursts out laughing. \"Ha! Just kidding. The majority of the population died when the bombs fell. Those who were lucky enough to have their own packed shelter, or could run fast enough to the nearest one, of course, survived. I guess I don't have to tell you how rare it was to have your own shelter. Even I had to, you know, kindly ask my neighbour to let me in. Because I'm just that nice example of a human being. Don't lose faith, though, they might still be alive. Or not. Oh, well.\" He shrugs and keeps laughing as you walk through a dark alley. You clench your fists, and your smile fades quickly. Your feet get stuck every now and then in something sticky, but you still manage to step over a couple of rotting animal corpses. Some of them look bigger than they should be.\n\nHe glances back at you again. \"Watch out with that slime under your feet. Don't let it touch your skin. Let alone its owner, or you might end up like them.\" He chuckles, then peeks back at you. \"No hard feelings, right? It was a harmless joke. A good one at that, you must agree.\"\n*fake_choice \n #\"It will be funny when I kill you.\"\n  *set threaten true\n  *set Ivan %+15\n  *achieve threaten\n  \"I like your enthusiasm. I really do. Let's just hope it won't get you killed. You see, the problem is that I'm the one holding the gun here. I'm the one giving commands, and good puns.\" He chuckles and pats your face through your gas mask.\n  \n #\"Yes, it was.\"\n  *set Ivan %-15\n  \"I knew you'd recognize a good joke! I'd be very disappointed if you didn't. I'm not good company when I'm disappointed.\" He chuckles.\n  \n #Remain silent.\n  \"Come on, it was a good one! Start laughing!\" He chuckles and puts his palm on your head, then gives it a slight shake. \"You better start appreciating my jokes real soon.\"\n\n\n*page_break\nYou travel in silence for the rest of the time. They kill dogs and other frightfully deformed aggressive creatures, even something that was probably once a pig. You step over them and eventually arrive at a huge building with at least a dozen factory smokestacks at first glance. It seems to be in very poor condition, but surprisingly it still stands. You're surprised to see a reinforced barbed fence standing around it, with watchtowers here and there.\n\n\"Gentlemen! Welcome to base Arkadios! Please enjoy your stay. You'll be here for a while.\" ${capturer1} spreads his arms wide and pokes your head with the barrel of his rifle. \"Get excited, kid, you'll spend the rest of your life here. Working. Isn't that fun?\"\n*fake_choice\n #\"Stop doing that.\"\n  *set Ivan %+15\n  \"Stop pointing that at me. It's not safe,\" you say and tilt your head to shake the end of the gun off.\n  \n  He remains silent for a while, then pushes the barrel harder on your forehead and puts his finger on the trigger. \"Pew pew. Splat.\" He bursts out laughing and waves at everyone to follow him. \"I know what I'm doing, kid. If I wanted you dead, I would have killed you.\" He scratches his gas mask at his chin. \"I don't know. Probably a long time ago.\"\n \n #\"I am excited.\"\n  *set Ivan %-15\n  He remains silent, then slams his rifle onto his shoulder and waves at everyone to follow him. \"Good. You better be. Chop chop, now! Hard work awaits!\"\n \n #Remain silent.\n  He pokes your head again with the barrel. \"I said get excited. Have you gone deaf or something?\" He pokes your head a couple more times, then leans in close to your face and remains there for a couple of seconds. Eventually, he straightens back up. \"That's the excitement I'd like to see!\" He laughs and waves at everyone to follow him.\n  \n\n\"Open sesame!\" he says, and a guard pulls the fence open. It looks like a huge property with more than enough space, and a couple of other buildings here and there. You walk down the dirty narrow stone path to the factory entrance and notice a greenhouse on the other side of the property. It draws a smile to your face to see a greenhouse surrounded by demolition and dead wildlife.\n\nOn the other side of the greenhouse, you see dark smoke clouds emerging from a couple of small smokestacks, leading to a smaller but heavily reinforced building.\n  \nHe opens the rusty factory door, and you walk directly into a chamber. A loud buzzing sound catches your ears, and you get sprayed with something yellow. \"Decontamination chamber, kiddo. Are you scared?\" He laughs, and you shrug his comment off. \n\n\"Now comes my favourite part. Lookie, lookie!\" he continues as the air gets sucked out of the chamber with such force you have to hold your ground. \"Ha! Wasn't that amazing?\" He slaps you hard on the back. You release a quiet 'oof' and the door opens. \"Onwards!\" He points with his rifle and steps out of the chamber.\n\nAs you step outside, ${capturer1} and ${capturer2} motion you to stop, and they walk next to one another. You glance behind him and notice that this wide-open place is the living room. \n\n\"And I was eager to leave the bunker.\" ${bf1} looks around.\n\n\"We can go back, but you'll handle the rations.\" ${bf2} crosses her arms.\n\n\"All right, lads. This is your new home now.\" ${capturer1} spreads his arms wide. \"This is the living room. Behind that closed door are the small living chambers to the left and right. After that is the kitchen and yada yada. But that doesn't concern you. What should is, that after those is the basement, as in your new home! Yay! Get excited, because that's where we'll keep you. That means you'll get to spend a long time there. Your work will vary, but we'll get to that tomorrow.\" He chuckles and takes the gas mask off. \n\n*page_break\nHe grins, a scar stretching from the bottom of his left eye to his chin. He brushes his long hair back with his hand, and you might even say he was a nice and handsome guy once. Suddenly, he grips his own throat, gasping for air, then bursts out laughing. \n\n\"Aw, you should've seen your faces! Though some of you were laughing. I don't know why. Choking isn't funny. An
