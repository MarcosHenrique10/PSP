<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Oldest Dream — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>

  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>

    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>

        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "oldestdream", "title": "The Oldest Dream", "scenes": {"choicescript_description": "Time for a break from your uneventful life. Ancient knowledge that is too risky to keep in your memory calls for you once again. Will you be able to learn the things you knew in the past and chose to forget all the while not losing yourself to madness? No matter what, your will must be strong.\n\nThe Oldest Dream is a 34,000 word interactive horror novel by Onurhan T, where your choices control the story. It’s entirely text-based-without graphics or sound effects-and fueled by the vast, unstoppable power of your imagination.\n\n· Play as male, female, or other; straight, gay, or other.[n/]\n· Delve into the past that you chose to forget before.[n/]\n· Try to stay sane on a path no one came back from.[n/]\n· Watch reality distort in front of your eyes.[n/]\n· Don’t give your trust freely, it is not easy to know who deserves it.[n/]\n· Learn as much as you can, your primary intent is seeking knowledge.[n/]\n· Meet a creature stronger than god and live to tell it.[n/]\n\n", "choicescript_stats": "*if sanity \u003c 0\n    *set sanity 0\n*if sanity > 100\n    *set sanity 100\n*set fullname (name&\" \")&surname\n*stat_chart\n    text fullname Name\n    opposed_pair Sanity\n        Insanity", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]The Oldest Dream[/b]\n\n  Time for a break from your uneventful life. Ancient knowledge that is too risky to keep in your memory calls for you once again. Will you be able to learn the things you knew in the past and chose to forget all the while not losing yourself to madness? No matter what, your will must be strong.\n\n  The Oldest Dream is a 34,000 word interactive horror novel by Onurhan T, where your choices control the story. It’s entirely text-based-without graphics or sound effects-and fueled by the vast, unstoppable power of your imagination.\n\n  · Play as male, female, or other; straight, gay, or other.[n/]\n  · Delve into the past that you chose to forget before.[n/]\n  · Try to stay sane on a path no one came back from.[n/]\n  · Watch reality distort in front of your eyes.[n/]\n  · Don’t give your trust freely, it is not easy to know who deserves it.[n/]\n  · Learn as much as you can, your primary intent is seeking knowledge.[n/]\n  · Meet a creature stronger than god and live to tell it.[n/]\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]The Oldest Dream[/b]\n\n  Time for a break from your uneventful life. Ancient knowledge that is too risky to keep in your memory calls for you once again. Will you be able to learn the things you knew in the past and chose to forget all the while not losing yourself to madness? No matter what, your will must be strong.\n\n  The Oldest Dream is a 34,000 word interactive horror novel by Onurhan T, where your choices control the story. It’s entirely text-based-without graphics or sound effects-and fueled by the vast, unstoppable power of your imagination.\n\n  · Play as male, female, or other; straight, gay, or other.[n/]\n  · Delve into the past that you chose to forget before.[n/]\n  · Try to stay sane on a path no one came back from.[n/]\n  · Watch reality distort in front of your eyes.[n/]\n  · Don’t give your trust freely, it is not easy to know who deserves it.[n/]\n  · Learn as much as you can, your primary intent is seeking knowledge.[n/]\n  · Meet a creature stronger than god and live to tell it.[n/]\n\n", "screenshots": "*set name \"Howard\"\n*set surname \"Williams\"\n*set fullname \"Howard Williams\"\n*set sanity 42\nYou step into what seems to be a corridor. You can't see the end of it. You start walking and realize that the walls of this corridor look weird. You get closer to them, it looks as though this place was a block of stone and millions of small human hands clawed into it to make this tunnel. You take a step back and continue walking down the tunnel. As you are walking down, you hear a voice. You can't tell where it's coming from. It's omnipresent. It's like hundreds of people making noises at once to form sentences for you to hear but it's as loud as a whisper.\n\n\"Why don't you look behind you for a second. Just to make sure.\"\n\nWhat do you do?\n*fake_choice\n    #Look behind you\n    #Keep walking down\n\n\n\n\n*set name \"Howard\"\n*set surname \"Williams\"\n*set fullname \"Howard Williams\"\n*set sanity 12\nIt's almost like they are not real, they are all around you. You keep taking quick steps and not soon after, you see something. It draws your eye like a terrible dream, unable to look away upon noticing it is an impossible colossal tower of black iron and bones stretching for hundreds of miles into the sky before vanishing into the dark clouded expanse above you. You blink and turn around to look at the other side of the horizon but there stands the exact same tower. You shift around but no matter your view of this horrid horizon, there you see the tower standing ever vigilant. You move closer to it whichever path you decide to take.\n\nSuddenly out of the trees, four misshapen creatures jump into your sight. They resemble giant wolves but they stand on two feet like people, their fur jet black with shocks of green. Glowing bright yellow eyes staring down at you with their long tongues swinging around like they are tasting your air. You can see their rib cages showing through their grotesque flesh. It seems like they haven't eaten anything in months. They don't look happy.\n\nWhat do you say?\n*fake_choice\n    #I'm just trying to get out of here.\n    #What is a dog doing in my face?\n    #My name is Howard and I would like to leave this place thank you.\n\n\n\n\n*set name \"Howard\"\n*set surname \"Williams\"\n*set fullname \"Howard Williams\"\n*set sanity 40\nYou walk inside as the rotten wood under your feet asks for mercy. You are in a small space with nothing but three doors in front of you. You could touch the ceiling if you reached for it. You look at the doors to see beautiful carvings of images and sentences on them.\n\nThe door to your left reads, \"Path of the Artist\" and under it \"If your mind is clear and your thoughts untouched\". The door in front of you reads, \"Path of the Curious, If the knowledge you seek keeps you awake at night\". The last door to your right reads, \"Path of the Wise, If you already know more than you should\".\n*line_break\nYou see Henry hold his throat and gasp for air as he turns to you.\n     \n\"I can't be here. I'm sorry, go on without me.\" he says as he goes back outside.\n\nWhich door do you go through?\n*fake_choice\n    #Path of the Artist\n    #Path of the Curious\n    #Path of the Wise\n\n\n\n*set name \"Howard\"\n*set surname \"Williams\"\n*set fullname \"Howard Williams\"\n*set sanity 84\nThe steps twist and bend in ways that are not possible. You see floating creatures that are so slow that you don't understand how they do it. The creatures look like crows but have one single eye at the size of their heads where their actual heads should be and two small squid tentacles where their feet should be. They are not flapping their wings but are still drifting in the air. When they blink you feel like throwing up.\n\nYou start climbing the steps once again, trying to not look at the horrid creatures. After a while you hear things. They are coming from the creatures floating around when they don't even have mouths. Whispers. Words. Questions.\n\n\"Yes.\", \"Intriguing.\", \"What a creature!\", \"I wonder what's inside it.\"\n\nIt's as though little children that are too young to be able to speak screaming and whispering at the same time.\n\nWhat do you do?\n*fake_choice\n    #Scream at them\n    #Ignore them and keep climbing\n    #Mimic them\n    #Look closer\n\n\n\n*set name \"Howard\"\n*set surname \"Williams\"\n*set fullname \"Howard Williams\"\n*set sanity 56\nYou come closer and start hearing the beat of a drum from inside this wooden building. You step through the open door to find yourself in some sort of a tavern. About a dozen people sit around in groups drinking, eating and talking to each other. Two people in the corner by the fireplace play two drums with sticks made out of bones. A man, almost so tall that he needs to lean down to not touch the ceiling gives you a brief nod from behind the counter, seemingly the owner of this establishment.\n\nWhat do you do?\n*fake_choice\n    #Approach the owner\n    #Approach a friendly looking table\n    #Approach the musicians\n", "startup": "*title The Oldest Dream\n*author Onurhan T\n*scene_list\n    startup\n    the_letter\n    the_pit\n    the_past\n    the_tower\n    the_vision\n    the_friend\n    the_end\n*create name \"\"\n*create surname \"\"\n*create fullname \"\"\n*create gender \"\"\n*create orientation \"\"\n*create sanity 70\n*create trust 60\n*create fear \"\"\n*create companion \"\"\n*create her \"her\"\n*create she \"she\"\n*create hers \"her\"\n*create alive true\n*create wolves false\n*create death false\n*create cultist false\n*create end false\n*create letter1 0\n*create letter2 0\n*create letter3 0\n*create letter4 0\n*create woman \"woman\"\n*achievement hatred visible 50 Mean Person\n    Why would you do that?\n    Be mean to Emma.\n*achievement mean visible 100 Really Mean Person\n    You really did that?\n    Be really mean to Emma.\n*achievement riddler visible 50 Good With Letters\n    You know your way around letters.\n*achievement riddlertwo visible 50 Good With Words\n    You know your way around words.\n*achievement riddlerthree visible 50 Good With Sentences\n    You know your way around sentences.\n*achievement riddlerfour visible 50 God of Riddles\n    You rule over the domain of riddles.\n*achievement murderer visible 100 Murderer\n    hidden\n    You killed someone.\n*achievement companion visible 50 Not Alone\n    Chose to trust someone else.\n*achievement cultist visible 100 The More The Merrier\n    Allied with a cultist.\n    Loretta walked with you.\n*achievement artist visible 50 Artist\n    Took the path of the artist.\n*achievement curious visible 50 Curious\n    Took the path of the curious.\n*achievement slumber visible 50 Slumber\n    hidden\n    You sleep.\n*achievement powerful visible 50 Him\n    hidden\n    You are Him.\n*achievement humanity visible 50 Human\n    hidden\n    You are still human.\n\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Time for a break from your uneventful life. Ancient knowledge that is too risky to keep in your memory calls for you once again. Will you be able to learn the things you knew in the past and chose to forget all the while not losing yourself to madness? No matter what, your will must be strong.\n\n  The Oldest Dream is a 34,000 word interactive horror novel by Onurhan T, where your choices control the story. It’s entirely text-based-without graphics or sound effects-and fueled by the vast, unstoppable power of your imagination.\n\n  • Play as male, female, or other; straight, gay, or other.[n/]\n  • Delve into the past that you chose to forget before.[n/]\n  • Try to stay sane on a path no one came back from.[n/]\n  • Watch reality distort in front of your eyes.[n/]\n  • Don’t give your trust freely, it is not easy to know who deserves it.[n/]\n  • Learn as much as you can, your primary intent is seeking knowledge.[n/]\n  • Meet a creature stronger than god and live to tell it.[n/]\n\n\n  *if choice_is_advertising_supported\n    [i]The Oldest Dream[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n    \n    *purchase_discount adfree 2019-10-24 $4.99 $2.99 purchased\n    *page_break_advertisement\n\n    *goto purchased\n  *else\n    [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n    *purchase_discount adfree 2019-10-24 $4.99 $2.99 purchased\n    *page_break Play Now for Free\n\n*label purchased\n\nBefore you step into this adventure, let it know what kind of character you are going to be.\n*page_break Go on\nWhat are your pronouns?\n*fake_choice\n    #He/Him\n        *set gender \"male\"\n    #She/Her\n        *set gender \"female\"\n    #They/Them\n        *set gender \"other\"\n\nWhat is your name?\n*if (gender=\"male\")\n    *fake_choice\n        #Howard\n            *set name \"Howard\"\n        #Alan\n            *set name \"Alan\"\n        #Brian\n            *set name \"Brian\"\n        #Input your own name\n            *input_text name\n*if (gender=\"female\")\n    *fake_choice\n        #Ellen\n            *set name \"Ellen\"\n        #Mary\n            *set name \"Mary\"\n        #Elizabeth\n            *set name \"Elizabeth\"\n        #Input your own name\n            *input_text name\n*if (gender=\"other\")\n    *input_text name\n\nWhat is your surname?\n\n*fake_choice\n    #Williams\n        *set surname \"Williams\"\n    #Miller\n        *set surname \"Miller\"\n    #Input your own surname\n        *input_text surname\n\nWhat kind of people are you into?\n*fake_choice\n    #Men\n        *set woman \"man\"\n        *set companion \"Philip\"\n        *if (gender=\"male\")\n            *set orientation \"gay\"\n        *if (gender=\"female\")\n            *set orientation \"straight\"\n    #Women\n        *set companion \"Anna\"\n        *if (gender=\"female\")\n            *set orientation \"gay\"\n        *if (gender=\"male\")\n            *set orientation \"straight\"\n    #Anything goes really\n        *set companion \"Anna\"\n        *set orientation \"bisexual\"\n    #Not interested\n        *set companion \"Anna\"\n        *set orientation \"asexual\"\n\nWhat is your greatest fear?\n*input_text fear\nGood luck.\n*finish Delve In", "the_end": "Their bodies move with unbelievable speed to make clapping and cracking sounds which form into words which form into sentences.\n\n\"We were expecting you, ${name}. You have done well. Here is your final choice before you get out of here. Do you want to free Him? If He wakes up, humanity will be free and wild beyond good and evil, laws and morals thrown aside and all men shouting and killing and reveling in joy, or maybe He just lets you go like nothing ever happened.\"\n*label finalchoice\n*choice\n    #Free him\n        *goto free\n    *disable_reuse #Don't free him\n        *set end true\n        *goto_scene the_letter\n    *disable_reuse #Ask your companions first\n        *if alive\n            \"Do not do it, ${name}. This is not just a simple thing to do. You can't just destroy the world forever.\" says ${companion}.\n            *if (trust > 89)\n                \"Even if you do it, I think I'll be fine as long as we are together.\" \n            \n        \"You should do it. You saw a glimpse of what can happen in this place. What if everywhere around the world was like it? This could put humanity on the next level. We would ascend into greater beings and even if we as a whole didn't, we, in this room would. He will reward us, no doubt.\" says Henry.\n        \n        *if cultist\n            \"I won't try to influence your choice but if you free him, you will not be you anymore, you will be something much greater. If you don't, we walk out of here with nothing in our hands and no one to believe what we saw.\" says Loretta.\n            \n        *if wolves\n            You speak the words \"Iunis\" and hear a howl. Not seconds pass before they are right next to you, growling at the creatures in front of you. You can see that they are not okay with being in this place. Their bodies shake and eyes wander around. It's almost like if you touched them they would break into a million pieces. Suddenly, your vision goes bright and you see a forest. Under the shade of a big tree sits four people, one of them reading a book to the others. You see that one of them falls unconscious as the others grab and start carrying her. The man that was reading the book whispers to her ear, and you hear it as if he is whispering to yours. \"I will find a way to save you, Lucy. Just hang on a little longer, I know where to go.\" Your vision comes back to normal as you open your eyes and see the creatures again. You tell them about the situation.\n            \n            \"We trust you on choosing the right path. We would prefer Him to never wake up but your judgment is above our opinions. If you know better, go for it. All we ask is to get out of here. We are ready.\"\n        *goto finalchoice\n*label free\nThe creatures step closer to you and take your hand. You are dancing with them around the sign. The ground shakes and you feel like the tower is about to fall but no one stops dancing. Moments later it stabilizes and you feel something. You can't tell what exactly you are feeling but there is something different. You feel small and weak. You feel a presence. You don't see Him but He is here and He is beautiful. You want to dedicate your life to worshiping Him but He ignores you. This moment seems to stretch forever before it's broken. He speaks and He speaks directly to you. The sourceless voice fills your heart with dread and joy.\n\n\"${name}.\", \"Gratitude.\", \"Power.\"\n\n\"${name}.\"\n\nHe calls out your name again but the moment He calls you ${name}, you are not ${name} anymore. Your consciousness leaves your body and you can finally see the world for what it is. You see your weak human body, that you don't need anymore, collapse. You come to the understanding that time does not matter anymore, nor does anything you cared about before. The world only exists as long as you imagine it exists but it doesn't stop existing when you don't. You can be anywhere you want, anything you want and any time you want. You are not god. This is beyond godhood. You can create a better world and populate it with your imagination or make a worse one and watch it suffer. You can destroy the world that was unfair to you all your mortal life or just watch it destroy itself within seconds. You can undo everything you did, forget everything that happened and go back to your human life. You can do anything you want. There is no other being that has your power or could hold your power. You can even make Him disappear. Did He make a mistake or is this all still in His dream. It doesn't matter. Nothing could ever matter to you anymore. You can end everything that ever worries you or create things to worry you when you are bored.\n*label creation\n\nWhat do you do with your powers?\n*choice\n    *disable_reuse *selectable_if (sanity > 50) #Create heaven on earth\n        *goto heaven\n    *disable_reuse *selectable_if (sanity \u003c 51) #Create hell on earth\n        *goto hell\n    *disable_reuse #Create a world where everyone worships you\n        *goto god\n    *disable_reuse #Watch this world from beyond\n        *goto watch\n    #That is all.\n        *goto finale\n*label finale\nWhat will your final choice be?\n*choice\n    #Undo everything and live as a human\n        *achieve humanity\n        *goto undo\n    #Spend the rest of time enjoying your powers\n        *achieve powerful\n        *goto great\n    *selectable_if (sanity \u003c 80) #Go to sleep\n        *achieve slumber\n        *goto sleep\n    #(Go back)\n        *goto creation\n\n*label heaven\nYou imagine a world where peace is eternal and happiness fills every being. It comes into existence. Humanity loves the world and everything within it. Every living creature is inherently good and lives life to its fullest. People create the most beautiful kinds of art by pouring their unending love into them. There is not a single corner of the world where light doesn't touch and vile things exist. Not a single soul in the world suffers. There is no word to explain hate in human language as such a concept doesn't even exist. Love is held above everything else and harmony is unbroken until the end of time but the end of time comes sooner than you thought. People become so attached to the beauty of the world that they don't ever want to let go. No one believes in afterlife, even though you already created the perfect version of it. If you communicated with them or showed yourself to them, there is no way that they could live their own lives anymore. In time, their love evolves into selfish desires. They learn resentment. They learn to be jealous. All of their love that went into making the world a better place turns into hatred that drives them to kill each other. The world starts to burn and wither but so few people care about it anymore that there's nothing they can do. By destroying each other, they start destroying everything else, even themselves but their animosity becomes so strong that they don't even remember why they started to hate each other in the first place. It is too late before they realize that none of this is worth it. The last person standing takes their own life after seeing how having everything in the world doesn't bring them the slightest joy. You try countless different versions of a perfect world but it ends the same way every time. Having power to do anything you can imagine, you can't make a world where people live in peace.\n*goto creation\n*label hell\nYou imagine a world where screams are listened to like they are music and it rains blood when it rains at all. It comes into existence. Humanity suffers with each breath they take. Every living creature is inherently evil and lives life to make others suffer more than themselves. People create the most hideous kinds of tools to torture each other. There is not a single corner of the world where darkness doesn't prevail. People form into groups to try and have more power upon each other. The fires of war and the cries of agony never stop. In time, after all the bloodshed, there stands only two societies left and they structures themselves to live without suffering. They succeed. The hunger for power is still so strong that they want to become more than just human. Their curiosity blooms and starts holding a stronger place than hate in their hearts. They question the world around them every second they can as one of them reaches the ultimate point and finds out about your existence. Temples are built to worship you and prayers are given every waking day. One of them puts his entire existence into his faith in you and finally finds a way to communicate with you, if you allow him.\n*choice\n    #Let him speak\n        \"Oh, great one. You made us out of nothing and put us into this world of torment. We are thankful nonetheless for being alive at all. We just want a comfortable world so that we can pray in peace to your greatness. I am asking so much without giving anything in return but surely It's nothing for your immense power. Please, great one, will you show this weak soul mercy and save us from ourselves? We can't stand this suffering any longer.\"\n        *fake_choice\n            #Create a comfortable world for them\n                *goto hellgod\n            #Watch them die out\n                *goto dieout\n    #Watch them die out\n        *goto dieout\n*label dieout\nYou sit back and observe. They cry tears of desperation. They look for ways to gain your favor. \"What did we do wrong that our god abandoned us?\" they think. They start sacrificing themselves under your name in hopes of an afterlife that isn't as agonizing. They devote their entire lives into finding ways of escaping. Everyone knows death is the only solution but no one wants to accept it. It takes them centuries before they give up. They give up on life. They give up on each other and they give up on themselves. The last person to ever stand screams up to you. \"Why did you give us such suffering, was it only for your joy. Why did you not give us an escape, was it because you didn't have one yourself. Why didn't you let us live in the ways we wanted and filled us with hate instead, was it because you hated everything yourself. I am not dying here to save myself but I am doing it because I refuse to be your toy.\" she says as she takes her own life. You are left with a world where nothing exists. No happiness. No suffering. No light nor dark. Nothing. No matter how many times you retry to make a hell to watch people suffer, it always ends the same way.\n*goto creation\n*label hellgod\nYou give them redemption. You save them. They are grateful for the opportunity and they swear they will look after this world. They reach peace and start living in harmony. They use all their effort into making the world a better place while praying to you every moment. There are setbacks here and there but they climb the stairs to a world where people live in serenity. In time, they become somewhat stable and you realize how much it resembles the world you were living in when you were human yourself. There are times when good things happen and times when they don't but people prefer to focus on the good ones and it helps them get through the day. Time goes on and on. It will go on until you decide that it shouldn't.\n*goto creation\n*label god\nYou imagine a world where people know and feel your presence and worship you. It comes into existence. They pray to you before and after everything they do and anything they do is to show you gratitude. You feel their happiness about being able to sense you. You feel their fear about how you could destroy them all without any effort. You feel their love for each other because of how they are all some form of embodiment of your imagination. They take good care of everything thinking how you made each thing to be perfect. They do everything to lengthen their lifespan so that they can experience the world you created for them, longer. So starts their journey to achieve immortality, not because of the fear of death but for the love of life. When they find out that it is not possible, or that you made it impossible, they cry. They do not cry because they failed but they cry because they think they solved one of the problems you provided them and they are one step closer to you. Anything that happens, good or bad, is always thought of as your work. They know they have their own choices and the power to change the world in any way they want but all they want is to live a life filled with you and the things you created. No one ever is selfish, no one ever feels envious. They create new things, music that has never been heard before, sculptures that have never been seen before, paintings that even you are surprised by. They do everything to experience and enjoy the world that was made for them and it seems to go on until the end of time, which happens when you decide it should.\n*goto creation\n*label watch\nYou decide to sit back and observe. You look at the people you knew, the people you were going to know and the people you would have never known. You see everything and everywhere at the same time and at any pace you want. You see how Emma spends her days grieving. You maybe didn't realize how much you helped her life become better. She refuses to create relationships with anyone else working in the library. You see Henry, forgetting everything and living his life with his family. He becomes a popular author, the dreams of the jungle giving him creativity without him realizing. You see how your neighbor, an old gentleman who you spoke to less than a handful of times, cry for you. You don't even know his name but turns out he cares. You see that one ${woman} who you occasionally saw while you were walking to work and then wondered why, if your schedules matched you didn't see each other more or ever talked to each other, her eyes wander around to find you for a while. You see Arthur, he always keeps you in his memory, remembers you and how fun you were to be around. He doesn't sleep well at nights anymore and the smiles become a rare occurrence in his life.\n*if alive\n    You see ${companion}, ${she} never forgets you and locks ${hers}self in ${hers} house for a while but then thinks that you would want ${her} to live a good life. Which you do. $!{she} swears to always keep you in some part of ${hers} heart as ${she} makes friends, loses friends, experiences new things, goes through tough times, becomes happy again. Some nights ${she} talks to you, knowing you listen.\n    \n    \"${name}, I hope you are fine, I am fine.\n    *if (trust > 80)\n        I don't know where you went but I'm still here if you wanted to come back. Everything is going to be alright, right? Please come back,\n    I miss you.\"\n    \n*if wolves\n    You see the creatures that resembled wolves, they are back to their human selves and go back to their stable lives even though it takes them a while. You know it's them because they occasionally talk to you at nights. \"I hope you are doing fine, ${name}.\" They often visit the library that you worked at to sit around and read books. They are mostly happy, they have been in there far too long and every breath they take, they are thrilled to be alive.\n    \n    \"You know, you can come back if you wanted. I don't know what it's like for you but we'd love to spend some time together.\"\n    \n*if cultist\n    You see Loretta, slowly goes back to a normal life. It takes them a while to trust people again but they get there. One of the nights you hear them speak.\n    \n    \"Things turned out great. Thank you for saving me, ${name}. I'm sure you are having fun wherever you are. I've had glimpses of it. You can come back anytime and join us here.\"\n    \nTime goes on with only little unpredictable events, nothing could surprise you anyway. You can continue watching the world whenever you feel like it.\n*goto creation\n\n*label undo\nYou wake up to the sun hitting your face through the curtains of your small wooden house. It's one of those days where you had an interesting dream that you didn't want to forget but immediately did. You start getting ready for work. It's somewhat uneventful for you between your bed and your desk but you like the peace of predictability in your life. Today is Emma's birthday, you hope she likes your present. You get some coffee, have a quick breakfast and head out.\n*page_break\nIt's raining again. Well it doesn't really matter since you are well used to it so you already got out with your umbrella and the library you work at is not that far either. You start heading towards the library, the sound of rain hitting the pavement is soothing. You see all kinds of people going about their businesses. Couples holding hands, looking up to the sky and letting the rain hit their faces. A man in a suit with a briefcase in his hand walking very quickly, almost like he is being chased. You see your friend Arthur who works at a small café wave at you as you go by. You see someone drenched in the rain so you go up to them and share your umbrella.\n\n\"Oh, thank you so much.\" ${she} smiles.\n\n\"I'm ${companion}, nice to meet you.\"\n*if wolves\n    \n    Life goes on well, you meet four people who come to your library to read books together, it's like you knew them for a long time even after just meeting them.\n*goto ending\n\n*label great\nYou decide to spend the rest of time, which is forever unless you deem it otherwise, enjoying your powers. You create things, you destroy things, you watch things bloom, watch them wither. You and only you matter. Your existence is what makes the sun rise in the morning and the rivers flow. You make the birds sing and the flowers feel. The blind dream and the mute speak. The deaf hear the music of your creation. You watch people live, people die. People work for things, make relations, leave legacies. You make some of their lives worse and some of them better, just to see how they react. You create things to talk to, things to love you, to hate you. You feel every emotion in its core. You will live until you decide to not live anymore, or maybe even you can't kill you. You have unlimited power to spend. You have forever to do anything you can ever imagine to do. You are the perfect version of you and nothing will ever change that.\n*goto ending\n\n*label sleep\nYou decide to sleep. You dream of the world. You dream of yourself waking up to the sun hitting your face through the curtains of your small wooden house. You go to work, you meet new people, you read books, you spend time with your friends, you have fun. Sometimes you are sad, but you know it will pass. Sometimes you are happy but you know it is not real. You live life like normal, just now, another you knows that this body is not yours. Maybe it was like this all along. Maybe before all of this, you just chose to not remember your power so you could have some fun. Either way, you have your mortal life to live before you start dreaming another life, and then another one until stars align and you wake up again.\n*goto ending\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]The Oldest Dream.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "the_friend": "You are back at the tower. You look around expecting something different to have happened again. You see the first tower you went into. There are two figures on it looking at your direction. One of them seems oddly similar to you. You look the other way to see if there is anything visible through the mist and there you see another one of these towers. It seems that if you would draw lines between these towers you would make a perfect triangle. You go down and start walking towards it.\n*if alive\n    ${companion} stops you for a moment.\n    \n    \"Do you want to talk about it?\"\n    *fake_choice\n        #Tell ${her} what you saw\n            You tell ${her} about the books, the things you did with Henry and how it links with the things you have been seeing around.\n            *set trust +4\n        #Tell ${her} but be evasive\n            You tell ${her} about the things you did and how some of the things you have been experiencing could link with them.\n            *set trust +2\n        #Tell ${her} it's nothing and move on\n            \"It's nothing. Let's just move on.\"\n            *set trust -2\n    *line_break\n    \"Seems like things start to make a little bit more sense. Do you want to hear about what I saw?\"\n    *fake_choice\n        #Tell ${her} that you do\n            \"I don't remember this happening before but I was a little kid again. I was alone in the house while my father was at work and my mother had gone to get groceries. It was a fairly big house. There was a room that my dad always kept locked and never let any of us enter. I was always curious of what was in there. This day the door was open and I couldn't just not go in and take a look. I saw books standing on other books, ink spilled all over the room, hundreds of papers filled up with words. It looked boring to me at the time, not what I had imagined. I started reading one of the papers.\" $!{she} stops for a second. \"It told about this place. The jungle of death and the being that ruled over it. There were illustrations to show what He looked like but I can't remember what it was right now.\"\n        #Tell ${her} that there is no point\n            \"There is no point. The more we think on the things that happen, the more we give in.\"\n    *label ann\n    \n    Is there anything else you want to talk about?\n    *choice\n        *disable_reuse *selectable_if (trust > 39) #What will you do when we are out of here?\n            \"Just go back to a normal life and try to forget about all this.\"\n            *if (trust > 79) \n                ${she} stops for a second. \"Maybe except the parts with you in it.\"\n            *set trust +4\n            *goto ann\n        *disable_reuse *selectable_if (sanity > 59) #Do you think there is any explanation to the things here?\n            \"I can't tell there is but I have been for a lot longer than you have and I can tell you that the more you try to come up with a logical explanation the more you lose your mind and we must stay strong if we want to survive.\"\n            *if (trust > 79)\n                ${she} stops for a second. \"Good thing we have each other to lean on when we feel like we really can't continue.\"\n            *set sanity +5\n            *goto ann\n        *disable_reuse #Do you think we will get out of here alive?\n            \"I know we will. No matter what this place throws in our faces, as long as we are together we should be fine. We did well against the things that happened until now considering we haven't gone mad yet.\" ${she} gives a worried smile, you can see ${she} isn't sure if ${she} is crazy or not.\n            *fake_choice\n                #Comfort ${her}\n                    \"You are right, ${companion}. We will get out of here and return to our normal lives.\"\n                    *set sanity +5\n                    *set trust +4\n                *selectable_if (trust > 69) #Tell ${her} you want to keep in touch when you are out.\n                    \"I would like to stay in touch when we are out of here, ${companion}. I really enjoy your company.\" ${companion} gives you a warm smile, which also fills you with a warm feeling.\n                    *set trust +10\n                    *set sanity +8\n                #Stay quiet\n                    *set trust -2\n            *goto ann\n        #No that's all.\n            *goto henry\n*if ((alive = false) and (wolves = false))\n    You kind of wish you weren't alone right now and instead had someone to talk to so it wouldn't be as heavy as it is to keep it to yourself. For a moment you recall everything went on. The things you saw, the things you experienced. You feel like someone is right behind you but you are too scared to look. You breathe really slowly. Your muscles tense. Your heart stops for seconds then beats faster than you ever remember. You wish none of this ever happened. You wish you could go back in time and not do any of it. You wish you could wipe your memory so you could feel better. Your eye is twitching and breathing is hard. You bury the feeling inside your stomach and keep walking.\n    *set sanity -15\n    *goto henry\n*if wolves\n    \"We feel it. The time is soon. He thinks you are the one. He didn't think that with us. You can get us out of here. We will forever be in your debt. What happened when you rang the bell again?\"\n    *fake_choice\n        #Tell them what you saw\n            You tell them about the books, the things you did with Henry and how it links with the things you have been seeing around.\n        #Tell them but be evasive\n            You tell them about the things you did and how some of the things you have been experiencing could link with them.\n        #Tell them it's nothing and move on\n            \"It's nothing. Let's just move on.\"\n    *line_break\n    \"We know one more person who is here. He has been here longer than us but he is mad. Judging by the direction we are taking, we think we will meet him. He might have some answers you seek but do not fully believe him for he has seen too much to stay sane.\"\n    *label wol\n    \n    Is there anything else you want to walk with them?\n    *choice\n        *disable_reuse #What's his name?\n            \"We did not ask his name. He has long hair on his head. White as the moon we forget. He would not speak to us without asking a question first. He speaks to himself too much.\"\n            *set sanity -1\n            *goto wol\n        *disable_reuse *selectable_if (sanity > 59) #Do you think there is any explanation to the things here?\n            \"Do not try to explain. That's what he did and what we did not. You will go mad and want to stay here. You need to leave just like us.\"\n            *set sanity +2\n            *goto wol\n        *disable_reuse #Will you go back to normal if we leave?\n            \"We think we will. We still see ourselves as humans when we sleep. We still want to go back to our lives if we could. We don't want to be like this. If we can't, we will just come back here and keep us from others.\"\n            *set sanity +5\n            *goto wol\n        #That is all\n            *goto henry\n*label henry\nYou continue and you see something before you reach the tower. It's a small wooden hut. Outside it is an old man whose long white hair falls over his face, a red scarf over which his white beard hangs down beneath his waist. What skin you can see on his face is covered with long dried blood. He seems to be muttering words to himself while rocking his chair back and forth. You move closer and hear the words.\n*page_break\n*goto hen\n*label hen\n*temp henp\n\"We have it\n*line_break\nWe need it\n*line_break\nWhen we see it\n*line_break\nWe don't like it\"\n*input_text henp\n*if (\"$!!{henp}\" = \"BLOOD\")\n    *goto correct\n*else\n    He doesn't react. Keeps muttering the words.\n    *set sanity -1\n    *page_break\n    Do you need a hint?\n    *choice\n        #No\n            *goto hen\n        #Yes\n            *goto riddlehint\n*label riddlehint\n*if (letter4 = 0)\n    You see the man point to five trees around him and a letter carved on the first one, it reads \"B\"\n    \n    *set letter4 +1\n    *goto hen\n*if (letter4 = 1)\n    A second letter appears and it reads “Bl”\n    \n    *set letter4 +1\n    *goto hen\n*if (letter4 = 2)\n    A third letter appears and it reads “Blo”\n    \n    *set letter4 +1\n    *goto hen\n*if (letter4 = 3)\n    A fourth letter appears and it reads \"Bloo\"\n    \n    *set letter4 +1\n    *goto hen\n*if (letter4 = 4)\n    A fifth and final letter appears and it reads \"Blood\"\n    \n    *set letter4 +1\n    *goto hen\n*if (letter4 = 5)\n    *goto correct\n*label correct\n*achieve riddlerfour\nThe man's eyes suddenly light up and look at you.\n\n\"$!{name}? Is this you?\"\n\nThis must be the person who sent you the letter, you think. You were friends according to it.\n*fake_choice\n    #Yes it's me.\n        \"I can't believe you are here. It's me Henry. Wait. Why are you here?\"\n    #Henry?\n        \"Yes it's me Henry. I can't believe you are here. Wait. Why are you here?\"\n\nWhat do you say?\n*fake_choice\n    #Didn't you call me here with a letter?\n        \"Did I? I can't remember. I don't think I could, even if I wanted to. Let's just get inside, we have some catching up to do.\"\n    #I don't think it matters now.\n        \"I see what you mean. Let's get inside, I think we have some catching up to do.\"\n*if alive\n    ${companion} holds your arm for a second.\n    \n    \"Should I stay here or come in with you?\"\n    *fake_choice\n        #Come in with me, you need to hear this.\n        #Stay here, I don't think you want to hear this.\n\n    \"Who are you talking to?\" says Henry, looking right through ${companion}.\"\n    \n    It seems as though Henry is not acknowledging the existence of ${companion}. You freeze for a second. Take a step back.\n    *fake_choice\n        #I'm talking to ${companion}.\n            \"What do you mean you are talking to ${companion}? Who is ${companion}? Have you gone mad ${name}?\"\n            \n            ${companion} takes a step back.\n            \n            \"He is gone mad. Maybe it's better we let him believe in his reality.\" says ${companion}.\n            *line_break\n            \"I asked you a question ${name}. Who is ${companion}?\"\n            *fake_choice\n                #Tell him about ${companion}\n                    \"${companion} is right here next to me. Are you blind Henry?\"\n                    *line_break\n                    \"There is no one there ${name}. Who else are you seeing. It's only you and me here.\"\n                    \n                    ${companion} turns to you.\n                    \n                    \"Just go, I will wait here.\"\n                    \n                    You walk inside the hut to talk. You think to yourself for a moment. What do you believe?\n                    *fake_choice\n                        #${companion} is real\n                            *set trust +10\n                        #${companion} isn't real\n                            *set trust -10\n                        #You don't know what to believe\n                            *set sanity -10\n                #Tell him it's nothing and get inside\n                    \"I thought you had lost your mind for a second there. You scared me ${name}. Don't do that again.\"\n        #I didn't say anything.\n            \"I thought you had lost your mind for a second there. You scared me ${name}. Don't do that again.\"\n            *line_break\n            ${companion} stares at you.\n            \n            \"He is gone mad. Maybe it's better we let him believe in his reality.\"\n*if wolves\n    The creatures take couple steps away.\n    \n    \"We will wait here. We are not sure if he is safe to us and we do not want to hurt him.\"\n\nYou sit in one of the three chairs inside. There is a bed made out of leaves and a shelf filled with dried meat of an animal you are unfamiliar with.\n\n\"Okay, I will make you a bed here or make another hut if you want. I know what to eat and what not to eat. We have good source of food but getting water is not that easy. Since we are stuck together we can help each other out.\"\n*fake_choice\n    #I am leaving here and you are coming with me.\n        *set trust +2\n    #I am leaving here Henry.\n\"We can't leave here, ${name}. Do you not understand? I tried everything. I've been here for years. There is no way of going back. We have it. He tricked you into coming here because my mind is far gone and He needed another one. I can only speak to you now because I sacrificed so much to keep some of my memory for this exact situation. We need it. So that I wouldn't kill you. If you go and ring the third and final bell, not only will we die but also everyone we love. When we see it. Everyone we know, everyone we could have known will.\"\n*fake_choice\n    #There has to be a way.\n        *set sanity +5\n    #Do we have absolutely no chance?\n\"Well there is a chance that ringing the third bell ends up taking us out of here but it is very small. It isn't worth the risk at all.\" Henry stops for a moment, looks down to the ground and then looks up back at you. \"I am bored let's go do it.\" He leaves the hut and you follow. You start walking towards the third tower. That was unexpected but you can tell even from the way he moves that he is not sane.\n*if alive\n    ${companion} walks with you but this time keeps a distance.\n    \n    \"So Henry thinks I don't even exist. It seems like he doesn't even see me. What about you ${name}?\"\n    *fake_choice\n        *selectable_if (trust > 59) #I see you and I know you are real.\n            \"Thank you ${name}. I was really worried. I don't want to be alone in this place.\"\n            *set trust +8\n        #I see you fine.\n            \"Thank you ${name}. I was worried. I don't want to be alone in this place.\"\n            *set trust +6\n        #I am not sure if you are real anymore.\n            \"Are you kidding me ${name}? After all we did? Can I at least still come with you?\"\n            *set trust -10\n            *fake_choice\n                #Yes\n                    \"Thanks. I will help however I can. I don't want to be alone or be left behind.\"\n                #No\n                    \"Fine I will leave myself then.\"\n                    \n                    ${companion} runs ahead of you towards the tower and soon leaves your sight.\n                    *set alive false\n                    *set death true\n*if alive\n    \"Do you think we can just continue like this? He seems insane, I don't think there is much Henry left in him.\"\n    *fake_choice\n        #Let's just see where it goes.\n            \"If you say so. I trust you but I don't trust him, keep that in mind.\"\n            *set trust +2\n        #Maybe go hold him and talk to him?\n            \"I am not doing that. He could attack me any moment. If he wants to believe I'm not real that's his problem not mine.\"\n            *set trust -2\n*if wolves\n    Henry looks at the creatures.\n    \n    \"Oh you are here too? You still believe that you can get out so you helped ${name}?\"\n    *line_break\n    \"We know we can get out now. ${name} pleases Him. He is interested. He will want it too.\"\n    *line_break\n    \"Well that's great to hear from four humans that don't look human at all that were stuck here for how long who knows.\"\n    *line_break\n    \"You know not to anger us old man.\"\n    *line_break\n    \"Yeah what are you going to do? Kill me?\"\n    *line_break\n    \"If you keep talking.\"\n    \n    Henry goes quiet.\n\nYou keep walking for a while and Henry speaks again.\n\n\"So you probably don't remember anything at all considering you are here right now. Let me tell you what you chose to forget. We used to work at the same library. One day we came upon this fiction book talking about monsters, higher beings. We both read it and it was a nice book, very finely written but it all seemed a little bit weird. It talked about this woman going to a place and meeting something but the book also had directions to this place and it was pretty close to where we lived and worked. We decided one day we would go there, like maybe the author left something cool for the reader to find. When we arrived, it was a hole going down, you know the place. We didn't go deeper than the first room at first because we were really scared that the book was not fiction but reality. There were couple other books, well more like diaries with only a few pages on them. They talked about some other beings, all with pictures and such. We spent some days going there after work and reading. After some time, we decided we would go through the door but when we were at that corridor before the riddle door, we always heard someone else. When it was our third time, I remember like it was yesterday, we saw who the footsteps were coming from. We were always too scared to continue. One day I got there alone and saw the door but I couldn't solve it. I'm just not fit for riddles. I wanted to go deeper but I didn't want you to come because of one of the books I had read. It's contents are too frightening to tell you even now but I didn't want you to experience what you would experience according to it. That's why I always kept it a secret.\"\n*temp book false\n*label ourselves\n\nDo you say anything before Henry continues?\n*fake_choice\n    *disable_reuse #Ask who you saw in the corridor\n        \"It was ourselves ${name}. We met ourselves. I won't go into any more detail.\"\n        *set sanity -5\n        *goto ourselves\n    *disable_reuse #Ask for the book\n        Henry reaches inside his clothes, takes out a leather notebook and hands it to you.\n        \n        \"Read it after I'm done talking, if you dare.\"\n        *set book true\n        *goto ourselves\n    *selectable_if (book) #Keep listening\n\n\"We had a back-up plan. It was instructions about how to forget everything about this place, written by the author of the first book but of course you didn't do it then. I told you to do it after you opened the door for me. I had to go alone and stay alone. I was hoping to get to this jungle but the twin labyrinth didn't let me go alone. Skip forward and we go to the first tower but He doesn't accept us. We go up and up but we can't go higher than the first floor. It became a routine to continue our studies in the tower so we moved our books there. We had a whole forest to explore. Weirdly, we both saw a different forest. I quit the library work to just living here and studying. More and more words kept appearing for us to read. I had to learn it, it called me all the time, it told me to acquire the knowledge and keep it with me. It spoke to me. He spoke to me. I went up the stairs alone and He accepted me. I could go up and ring the bell. I saw the second tower but I got scared after seeing the vision the bell showed me. It was terrifying. You couldn't stand it. I knew you couldn't. I forced you to do the ritual to forget and continued going alone. I rang the second bell and at that moment I saw Him. Just a glimpse but it was enough to devour my mind. He didn't like that. He didn't like that I was weak. He didn't let me climb the third tower. I didn't want it either because I knew what would happen. I knew that I wouldn't be me anymore and what if it made even worse things happen? I decided to start living here. My life given away for so many others to live without His gaze upon them. I was fine with it.\"\n*temp readbook false\n*label anything\n\nDo you say anything?\n*fake_choice\n    *disable_reuse #Ask who He is\n        \"I can't describe Him. He doesn't let me. You need to see for yourself and if you do, Ainozh'ithalth forgive your soul.\"\n        *set sanity -8\n        *goto anything\n    *disable_reuse #Read the notebook\n        It seems to be written in some sort of dark red ink on very old paper.\n        *line_break\n        \"Visions of possibilities will be given to those who dare walk the path through the jungle of death. He will be watching, hiding in the darkness inside your flesh. Enter here as two, you will stay as one and leave as none. He knows what you think, what you will think. He looks through your eyes, feels through your skin. He won't show mercy for he doesn't know it. He won't speak your tongue for he is not stupid. Do not trust the breath you take or the steps you hesitate. Show Him what He wants and maybe He is pleased. Only then can you continue. Only then can you leave. If He wills it, no one will live. If He is bored, no one will breathe. Thousands have failed, thousands more will. If you wish to make a difference all you need to do is ascend and ring His ears. Pray that you are the one He hears. He is the one to create and he will be the one to watch it wither after years. Do not think yourself as special for you are just another mortal. If you venture into the jungle of death, you must leave your hope. Do not look behind or you will be judged. Do not look too forward or you will go blind. If the time is right, the bells shall be rung. Centuries have gone by but the stars are almost aligned. Forget one thing and you will forget it all. Show Him your gratitude or you will fall. Into the unending madness of His crawl.\"\n        *line_break\n        Under these words, you see numbers either appear or you couldn't see before. They read \"46155252\", they don't seem to mean anything.\n        *line_break\n        Looks like everything else has been lost to blood splashing across the pages. Maybe for the better. The cryptic words bounce around your mind and the little sense they have make you uncomfortable.\n        *set sanity -5\n        *set readbook true\n        *goto anything\n    #That's all\n\n*if alive\n    ${companion} comes closer.\n    \n    \"Can I read the notebook? I also need to know more about what we are doing here.\"\n    *fake_choice\n        *selectable_if ((trust > 79) and (readbook = true)) #Tell ${her} what's in it instead\n            You tell ${her} about the things you just read.\n            \n            \"Thank you for not leaving me out of this. We are a team and we will get out of here together.\"\n            *set trust +2\n        #Let ${her} read it\n            $!{she} reads the notebook.\n            \n            \"Okay that's pretty unsettling. Now I have more of an idea about what we are dealing with here so that's good news.\"\n        #Do not let ${her} read it\n            \"You really think you can keep bossing me around like this? You know we are a team right? If we are getting out of here, we are getting out of here together. I don't think either of us would be here without the other so maybe you should trust me more.\"\n            \n            $!{she} walks ahead.\n            *set trust -8\n    \n    *if (sanity \u003c 51)\n        You watch ${companion} walk ahead and see that every few moments, ${she} just looks different for a split second. You can't tell if its your vision but you swear ${she} just disappears out of your sight sometimes.\n*if wolves\n    \"We know that book. We had it when we were human. We wrote some parts of it. It is all true. If He does not like us, we won't exist anymore. If He lets us ring the bell that means He does not hate us. We think we have a good chance but no one can be sure for He thinks in mysterious ways.\"\n    \n    \"Do you know anything about Him that you are keeping secret?\" says Henry in an angry tone.\n    \n    \"We only keep secrets if those secrets are to help you stay you. We are with you because we want to leave and ${name} is trustworthy, unlike you old man. We wouldn't think twice before sating our hunger with your flesh if it wasn't for ${name}. We remember more about our past lives with each step we take. This is the right path but be careful. The true self of Taioggi is inside the final one. Do not take it for just a tower. It holds the hatred of a million souls.\"\n\nYou get closer to the tower and see the entrance again. You hear some rustling from behind one of the trees as a figure comes out in front of you. They have very finely made dark green robes, ones that nobles would wear but you can tell it has been very long since they were cleaned. Their hood is up and a porcelain mask, that is completely white with no expression, covers their face. They keep touching their forehead and then their chest with their right hand continuously. You can see their hand, very old with wrinkles on it, the skin pulled back showing the paleness between countless veins.\n*temp cultorino false\n*label culter\n*if cultorino\n    \"I told you. You can't continue without me letting you. Do not take me as a fool, this can continue for eternity.\"\n    *goto cultor\n*if not (cultorino)\n    \"You come to meet Him?\" says a broken and bent old woman's voice.\n    *fake_choice\n        #Who are you?\n            \"It doesn't matter who I am, we are all weaklings under His gaze.\n        #I am just trying to get out.\n            \"There is no out and if there was, it definitely isn't on top of this tower.\n        *selectable_if (sanity \u003c 21) #Yes, I come to meet Him.\n            \"You come to the right place then. My apologies for mistaking you with another soul to get bound by Taioggi.\n    I can not let you pass either way if you don't earn it.\"\n*label cultor\n*fake_choice\n    *selectable_if (sanity > 94) #Why don't you come with me?\n        *goto saving\n    #How do I earn passage?\n        You see the them finally break the cycle of doing whatever they were doing with their right hand and produce a piece of paper from within their robes.\n        \n        \"You must bring me my ring, it was stolen from me thousands of sleeps ago and I need it back.\" they look at the paper for a second and then point their finger off to the side. \"If you walk this way, you will be there in no time. Look for a wooden mansion.\"\n        *fake_choice\n            #Accept\n                \"\"Be watchful. Be vigilant. I will be waiting here for when you come back.\"\n                \n                You start walking towards where they pointed.\n                *goto quest\n            *disable_reuse #Walk past without helping\n                *goto cult\n    #I can just walk past you.\n        \"Yes you may walk past me but I act as His fingers on this plane. You can't continue without me letting you.\"\n        *fake_choice\n            *disable_reuse #Walk past anyway\n                *goto cult\n            #Ask how to earn passage\n                You see the them finally break the cycle of doing whatever they were doing with their right hand and produce a piece of paper from within their robes.\n                \n                \"You must bring me my ring, it was stolen from me thousands of sleeps ago and I need it back.\" they look at the paper for a second and then point their finger off to the side. \"If you walk this way, you will be there in no time. Look for a wooden mansion.\"\n                *fake_choice\n                    #Accept\n                        \"Be watchful. Be vigilant. I will be waiting here for when you come back.\"\n                        \n                        You start walking towards where they pointed.\n                        *goto quest\n                    #Walk past without helping\n                        *goto cult\n*label cult\n\nYou walk past and continue towards the tower. You step inside it and light up your lantern again. The heat emanating from the iron interior warms up your face. There are words on the walls. Written with what seems to be a white paint so it's very visible.\n\nYou get closer to the tower and see the entrance again. You hear some rustling from behind one of the trees as a figure comes out in front of you.\n*set cultorino true\n*goto culter\n*label quest\nIt doesn't take you long before you are in front of a big mansion.\n*if cultist\n    \n    \"Here we are. I cannot come in with you. If I could, I wouldn't ask for your help in the first place. Good luck, chosen one.\"\n    \nYou walk inside as the rotten wood under your feet asks for mercy. You are in a small space with nothing but three doors in front of you. You could touch the ceiling if you reached for it. You look at the doors to see beautiful carvings of images and sentences on them.\n*label door\n*temp henray true\nThe door to your left reads, \"Path of the Artist\" and under it \"If your mind is clear and your thoughts untouched\". The door in front of you reads, \"Path of the Curious, If the knowledge you seek keeps you awake at night\". The last door to your right reads, \"Path of the Wise, If you already know more than you should\".\n*if henray\n     You see Henry hold his throat and gasp for air as he turns to you.\n     \n     \"I can't be here. I'm sorry, go on without me.\" he says as he goes back outside.\n     *set henray false\n\nWhich door do you go through?\n*choice\n    *disable_reuse #Path of the Artist\n        *goto artist\n    #Path of the Curious\n        *goto curious\n    *disable_reuse #Path of the Wise\n        *goto wise\n*label artist\nYou go through the door as it slams shut behind you, the air pushing you a couple steps forward. You are in a narrow corridor lit with candles in sconces on the wooden walls every few steps. You walk forward and you feel as though with each step you take, the walls push in and the way gets narrower and longer. You can't see the end of it. After a little while, you start seeing paintings hung around. You look at the first one you come upon and you see a man sitting in a chair towards his right next to a fireplace, resting a whip in his left hand. There is another man on the ground, flattened out like a bearskin rug in front of the fireplace. You see two heads of beautiful women sticking out of the wall above the fire, hung like trophies. You keep walking as you come upon the second painting. It's the same one except this time the man has his eyes open, you swear he is looking right at you. You go on to the next one and you see the man curiously looking at you while getting up from the chair. It is unsettling how real it looks. You continue walking and the next one is the same as the first one, it doesn't make sense how long this corridor is, it should have come to an end by now. You come upon the next painting and this one is the same but the man is not there. You hear footsteps coming from the way you came from. You look and you can see all the way to the beginning of the corridor but there is no one there. The sound is coming from behind the walls.\n*fake_choice\n    #Walk without making a sound\n        *if alive\n            ${companion} takes off ${hers} boots as you do the same and you continue walking without making any sounds.\n        It seems to be a good choice as the footsteps stop. A few more moments pass before you can see a door at the end.\n    #Make a run for it\n        *if alive\n            ${companion} takes off running as you do the same.\n        It seems to be a good choice as the footsteps don't seem to be as fast as you. A few more moments pass before you can see a door at the end.\nYou come next to it and open the door. A man greets you behind it. He looks like the man from the paintings. His voice comes out as if he didn't speak to anyone for years so he is having a hard time making sounds, he stops a little longer after every few words and looks surprised of himself. He waves his gaze around and doesn't seem to be able to make eye contact.\n\n\"Hello! Please don't be afraid, I only wish to talk. My name is Charles.\" He takes a step forward as you take a step back. Something about him doesn't look inviting.\n\n\"My apologies, could you wait for a second before I get my room ready to receive guests? I was not expecting anyone today.\" He goes back inside and shuts the door behind him but you catch a glance of the room and see the fireplace, much like the one in the paintings, and something laid in front of it.\n*if alive\n    \n    \"I'm not sure about this but he doesn't seem too bad.\" says ${companion}\n*temp charles false\nDo you wait for him?\n*fake_choice\n    #Wait for him\n    #Go back for another door\n        You walk back to the first room to go for another door.\n        *goto door\n\nAfter a few minutes, he opens the door and invites you inside.\n*if (sanity > 79)\n    You get in the room and realize that it's a really big one. You see the fireplace on the side, a bearskin rug in front of it, two deer heads staring at you with desperate eyes on top of it. There are chairs around the fireplace and around a table on the other side of the room. You see another door at the other end of the room from the one you came from and a bed in one of the corners with a wardrobe that catches your attention with a lock reflecting the light from the fireplace into your eyes. The room seems fairly clean other than the little bit of dust flying around, probably from the man just tidying it up. You see a steaming teapot on the table as the man walks over to serve some. You sit on the table, ${companion} sits right next to you and the man sits on the other end.\n*if (sanity \u003c 80)\n    You get in the room and realize that it's a really big one. You see the fireplace on the side, a man flattened out like a bearskin rug in front of it, two heads of beautiful women sticking out of the wall above the fire, hung like trophies, staring at you with desperate eyes. You see another door at the other end of the room from the one you came from and a bed in one of the corners with a wardrobe that catches your attention with a lock reflecting the light from the fireplace into your eyes. The room seems fairly clean other than the little bit of dust flying around and a trail of blood going from the other door to inside the wardrobe. You see a steaming teapot on the table as the man walks over to serve some. You sit on the table, ${companion} sits right next to you and the man sits on the other end.\n\n\"So, you've come from the outside I assume?\" says the man.\n*fake_choice\n    #How did you know?\n        \"Well, the way you look around the room tells me that you see it differently than I do.\"\n    #Where did you come from?\n        \"I came from the outside. One day I just found this book that spoke about immortality, you know a fantasy tale of sorts but it had a real map with a mark on it. I was curious, nothing more so I followed the path. That's basically how I ended up here, and since there is no way out I made a safe place to live.\"\n\nYou hear a thumping sound come from inside the wardrobe as the man coughs very loudly right after it. \"There are others like me living in here but what is your purpose?\"\n*fake_choice\n    #Tell him about the ring\n        \"Oh, I hope it's not Richard that has the ring. He is very… peculiar about his possessions.\"\n    #Tell him you are just wandering around\nThe man gets up and walks towards the other door.\n\n\"Well, I shouldn't be holding you here any longer, if you run into too much trouble you can say that you are Charles' friends.\"\n*fake_choice\n    #Ask him what to expect\n        \"If I told you it wouldn't be any fun, would it?\" he says as he guides you out of the door.\n    #Thank him and leave\n        He guides you out of the door with a smile.\nYou hear him lock it after you.\n*if alive\n    \"Well, that was interesting but he seems like a good person.\" says ${companion}\n*set charles true\n*achieve artist\n*goto tavern\n*label curious\nYou go through the door as it slams shut behind you, the air pushing you a couple steps forward. Wherever you are, the only thing you can see is a torchlight hanging from the wall right next to you in this narrow hallway. You take it and start walking forward. Not too many moments after that you realize that something is not right about the walls. They are made of something strange. You go closer to the wall and take a look. These walls are made of flesh. You can see blood trickling down on some places. It expands and then contracts, almost breathing. It's as if you are inside a giant creature.\n*if alive\n    \n    \"Don't pay too much mind to these, ${name}, just keep walking. We are going to be fine.\" says ${companion}
