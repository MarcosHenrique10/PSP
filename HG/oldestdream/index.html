r not, best to leave it be.\n            *set sanity +2\nSeveral minutes pass as you walk through the seemingly endless tunnels. You hear something and immediately stop to listen and understand what it is. It's footsteps coming closer. You hear bare feet flapping against the stone floor.\n*fake_choice\n    #Right\n    #Left\nYou continue as quick as possible without making any sounds. Identical forks pass as you randomly go for one and then finally you see small bit of light at the end of the tunnel you are in. You look behind after leaving the tunnel and you see the outline of stag antlers on a humanoid body inside the tunnel but the second you try to focus on it to ascertain what it is, it vanishes.\n*page_break Escape?\n*label forest\nYou find yourself in some sort of a forest. You only went deeper underground but now you are outside.\n*if alive\n    \"I tried this route but I hadn't seen something like this or heard any footsteps. Maybe something wanted there to be two people traversing the tunnels.\"\n    *fake_choice\n        #I'm glad we are together.\n            *set trust +2\n        #Maybe you don't remember correctly.\n            *set trust -2\n*if sanity \u003c 0\n    *set sanity 0\n*if sanity > 100\n    *set sanity 100\n*if sanity \u003c 41\n    You look around and see red trees made out of flesh and thousands of writhing minuscule gray hands that have their flesh pulled back to their bones on the ground trying to grab onto your feet and stop you from moving. You walk further in and you can feel the cracking of bones under your feet. There is a faint mist hovering a little bit above the ground that makes it even harder to see where you are. It seems like the sun is setting.\n*if sanity > 40\n    You look around and see trees everywhere and grass covering the ground. You feel your feet stick to the ground as you walk, like the grass is trying to stop you from moving. You push some branches away to move further in and they feel sticky, soft and moist. The best explanation you make in your head is that it's like they are sausages somehow shaped into trees. There is a faint mist hovering a little bit above the ground which makes it even harder to see where you are. It seems like the sun is setting.\n*label trusting\n*if alive\n    \n    Do you want to talk to ${companion}?\n    *fake_choice\n        *disable_reuse *selectable_if (sanity > 59) #Tell ${her} that you will get you both out of here\n            \"Thank you ${name}, I'm glad you are the person I'm here with.\"\n            *set trust +10\n            *goto trusting\n        *disable_reuse #Ask ${her} if ${she} saw the weird creature inside the tunnel\n            \"This place makes you see things, better not think about them too much.\"\n            *set sanity -5\n            *goto trusting\n        *disable_reuse #Ask ${her} about ${hers} friends and family\n            \"I have many friends overseas that I exchange letters with but other than that I've been alone pretty much my whole life.\"\n            *set trust +2\n            *goto trusting\n        *disable_reuse #Ask ${her} if ${she} knows what is going on in this place\n            \"I know as much as you do, nothing makes sense anymore. At least we are making progress.\"\n            *set trust +2\n            *goto trusting\n        #That's all.\n\nYou see a beaten path start from where you are and begin walking in that direction, getting lost in this place is the last thing you want to do. You feel like people hidden around are watching you. You just want to go back to your life. You regret everything you did that led up to you being in this moment. You can't stop yourself from feeling this. You become aware of your breathing as your chest tightens and you feel like suffocating. You feel your heart beat stronger, your body tingle. Are you dying? Where are you? Why are you here? How do you get out? You just want to get out. This is not where you are supposed to be or what you are supposed to be doing.\n*page_break Calm Down\n*if alive\n    *if (sanity \u003c 70)\n        ${companion} tries to help you calm down but you are scared of ${her}. Is ${she} trying to kill you? How will you know? How can you tell ${she} is not another maddening creature in disguise. It takes you what feels like eons to calm down but you get there. It's time to start moving. The more time you spend in this place, the worse you feel.\n    *if (sanity > 69)\n        ${companion} hugs you to help you calm down. You are lucky that ${she} is here. Feeling another person breathe is incredibly reassuring. You stand there for a while but it's time to start moving now. The more time you spend in this place, the worse you will feel.\n    *set sanity -2\n*if not (alive)\n    You wish you weren't alone in this place. You wish there was someone helping you. Being by yourself is driving you insane. It takes you what feels like eons to calm down but you get there. It's time to start moving. The more time you spend in this place, the worse you feel.\n    *set sanity -5\n\nYou walk along the path for hours as the sun sets and it gets darker. You can still see that the sun hasn't moved but unnatural clouds gathered above you to block it. Everything you can see is painted in a blood red, you feel like you are inside of a painting.\n*if alive\n    All the while, ${companion} doesn't say a word. $!{She} seems stressed but not as much as you.\nYou hear some sticks breaking and multiple footsteps close by. You stop for a second to listen but when you do so, it stops. You move for few more steps and you can hear it again. Something is very close and following you without showing themselves.\n\nWhat do you do?\n*fake_choice\n    #Ignore it and continue\n        You ignore it and continue, the more attention you give to it the weaker you are going to feel but the footsteps don't stop.\n        *set sanity +2\n    *selectable_if (alive) #Ask ${companion} about what to do\n        \"We should start moving faster and maybe follow the path from within the trees instead of being in plain sight.\"\n        \n        You continue your journey slower but what feels like safer. You still hear the footsteps.\n        *set sanity +5\n    #Start running\n        You start running. You don't know what is out there but you hope it's slower than you. You hear the footsteps get faster too.\n        *set sanity -2\n    #Climb a tree and wait\n        You climb a tree and wait. It's the same as not moving. You don't hear any footsteps but nothing else happens. After some time you decide to go back down but the tree grabs you with its branch. It sticks to your skin. It takes you a few minutes to fight off and continue walking. You hear the footsteps again.\n        *set sanity -4\nIt's almost like they are not real, they are all around you. You keep taking quick steps and not soon after, you see something. It draws your eye like a terrible dream, unable to look away upon noticing it is an impossible colossal tower of black iron and bones stretching for hundreds of miles into the sky before vanishing into the dark clouded expanse above you. You blink and turn around to look at the other side of the horizon but there stands the exact same tower. You shift around but no matter your view of this horrid horizon, there you see the tower standing ever vigilant. You move closer to it whichever path you decide to take.\n*goto Iunis\n*label Iunis\n\nSuddenly out of the trees, four misshapen creatures jump into your sight. They resemble giant wolves but they stand on two feet like people, their fur jet black with shocks of green. Glowing bright yellow eyes staring down at you with their long tongues swinging around like they are tasting your air. You can see their rib cages showing through their grotesque flesh. It seems like they haven't eaten anything in months. They don't look happy.\n\n*if alive\n    What do you do?\n    *fake_choice\n        #Try to run\n            You set off running away from the creatures, you look back for a second to see ${companion} throw a dagger at one of them and slice the throat of a second one in a swift motion, you hear their screeches as life leaves their bodies. The other two cower in fear and run away. ${companion} looks back at you disappointed.\n            *set trust -10\n        #Play dead\n            You drop on the ground and play dead, suddenly you see ${companion} throw a dagger at one of them and slice the throat of a second one in a swift motion, you hear their screeches as life leaves their bodies. The other two cower in fear and run away. ${companion} looks back at you disappointed.\n            *set trust -4\n        *selectable_if (sanity \u003c 66) #Offer ${companion} as sacrifice and run\n            You push ${companion} at them and start running, you hear screeches behind you and as you look back you see ${companion} throw a dagger at one of them and slice the throat of a second one in a swift motion, you watch the life leave their bodies. The other two cower in fear and run away. ${companion} looks at you in disgust.\n            \n            \"Really? I will forgive you this time but if this happens again, you won't have legs to run away.\"\n            *set trust -18\n        #Attack them\n            You rush forward and kick one of them in the face, you see ${companion} throw a dagger at one of them and slice the throat of a second one in a swift motion, you hear their screeches as life leaves their bodies. The last one cowers in fear and runs away. ${companion} looks at you and smiles.\n            *set trust +10\n    *goto towerwalk\n*if not (alive)\n    *set wolves true\n    One of them steps forward closer to you, you can't move a muscle in its presence.\n    \n    \"What is a two-feet doing in our forest?\"\n    \n    What do you say?\n    *fake_choice\n        #I'm just trying to get out of here.\n            \"Get out? You think you can get out? Well we are not here to hurt you, hop on my back and I'll get you to that tower.\" The beast gets closer to the ground for you to climb on its back.\n        #What is a dog doing in my face?\n            The beast cackles, \"I like that, why don't you join us and we will help you get to that tower.\" The beast gets closer to the ground for you to climb on its back.\n        #My name is ${name} and I would like to leave this place thank you.\n            \"Leave? You think you can leave? Well we are not here to hurt you, hop on my back and I'll get you to that tower.\" The beast gets closer to the ground for you to climb on its back.\n    It doesn't really seem like it's much of a choice so you hop on its back and start riding towards the tower.\n    \n    \"We were just like you before we got stuck in here. We too tried to get out. He won't let anyone leave.\"\n    *goto wolfback\n*label wolfback\n\nDo you say anything?\n*fake_choice\n    *disable_reuse #What happened to you?\n        \"This place does weird things. We do not know how to make you understand. We do not remember much of the normal world. If you do not leave, which you will not, you will see soon enough. That is why we want to help you\"\n        *set sanity -2\n        *goto wolfback\n    *disable_reuse #What is that tower?\n        \"That tower only exists as long as you exist here. When we first came, we too tried to find out about it. We do not remember now. If He left a way to go back, it has something to do with that tower. We feel ourselves connected to it somehow. We sensed your arrival.\"\n        *set sanity -2\n        *goto wolfback\n    *disable_reuse #Who is He?\n        \"We cannot tell you. Your weak mind cannot bear the knowledge. We hope you never find out. We hope at least you can get out but you will not. He will not let you.\"\n        *set sanity -4\n        *goto wolfback\n    #No, that's all.\n        *goto towerwalk\n*label towerwalk\n*if alive\n    \n    You continue walking towards the tower. ${companion} says nothing to you on the way. You don't hear anything unusual happening around you but this time you wish it did. The silence is deafening.\n\nThe closer you get to the tower the taller it seems to become. You eventually get near enough to see an archway leading into it. You can see countless skulls of unknown nature affixed on it. \n*if wolves\n    \n    \"We cannot come closer. We are too scared to do so. We will be waiting right here if you manage to get out. Be careful.\"\n\n*page_break Walk Inside\nYou walk inside and lift your lantern up to see. It's a big room with spiral stairs connected to the walls around it. The iron walls are uncomfortably warm to the touch almost like it's another person. You see bookcases filled with old books, an old, tattered rug on the ground that hasn't been stepped on in years.\n*goto morebooks\n*label morebooks\nIs there any particular book you want to know more about?\n*choice\n    *disable_reuse #Anyg'lith\n        You see a picture drawn before any information is given. It's just a beautiful naked woman with long hair. Upon closer look, you see needles attached at the end of each strand. The book tells about Anyg'lith being the demon that made married men seek out women other than their wives. She would possess women and seduce these men with whoever she possessed and gain power from feeding on this lust. The book also tells about how to protect oneself from this demon, there are instructions on making some sort of a knot out of the fabric taken from the clothes you were wearing when you first met your husband. That's why women would keep these clothes hidden and safe.\n        *set sanity -5\n        *page_break\n        *goto morebooks\n    *disable_reuse #Taioggi\n        You see a picture drawn before any information is given. It's a long tower with skulls attached to it. There is only one page, it seems like someone's records and it reads: \"Taioggi. This name came to me. I know it came to me from that tower. It is calling me but I never gave in. When in absolute silence, I hear screams and laughter coming from it. This can't be real. This should not be real. I must be dreaming but I haven't woken up in quite a long time. Sometimes I want to go into it just so I could finally be free of it but I know that is exactly what it wants. That is what it makes me think. It doesn't matter. I don't think I can handle another minute without knowing what is in it or what it wants from me. I want to return to my home. Gods help me stay strong, I am walking in. I love you Lucy.\"\n        *set sanity -5\n        *page_break\n        *goto morebooks\n    *disable_reuse #Edward\n        You see a picture drawn before any information is given. It's a child lying down in a crib looking at you. It's weird how realistic the eyes are. The words in the book are very poorly written, almost like it's their first time writing. \"The child with a pure mind who brings eternal peace to the ones he cares about. A worm in the minds of the unworthy and a needle in the hearts of the cruel. Hope in the hands of the desperate and poison in the presence of the hateful.\"\n        *set sanity -4\n        *page_break\n        *goto morebooks\n    *disable_reuse #Kthithro\n        You flip the pages but all you see is ink thrown onto them. There is nothing that makes sense or resembles a language but each page has different kinds of shapes.\n        *set sanity -2\n        *page_break\n        *goto morebooks\n    *disable_reuse #Lir'ithih\n        *if (sanity \u003c 80)\n            You try to reach for this book but feel your muscles tense as you do so. No matter how hard you try you can't endure the pain it gives you as you try to open the book. You feel your sanity slip away and decide to leave it be.\n            *set sanity -10\n            *page_break\n        *if (sanity > 79)\n            You feel something at the back of your head try and stop you from reading this particular book but you overcome it and start reading. It tells about a being so weird that no human can even begin to comprehend its nature let alone try to put it into words inside a book. There is only one part that actually tells anything. \"Lir'ithih, in his jungle of death, sleeps until waken by the screams of death. None shall see him, none should escape. If you ring the bells, he will speak. You must be respectful, or he will bring. The death, from his jungle.\"\n            *set sanity -2\n            *page_break\n        *goto morebooks\n    #No, That is all.\n        *goto stairs\n*label stairs\nYou start climbing the stairs. You oddly feel like you took these steps before. You see paintings hung on the wall with the light from your lantern as you walk up. They seem to be very finely made, one of them looks like a very cute cat drawn like a nobleman, another one is two people on horseback in a beautiful field. After a little while, you see portraits of people. A man with short brown hair, a pointy chin and a mustache under a long nose, smiling. A woman with long silver hair covering her face with her hands in a sad manner.\n*if alive\n    ${companion} gasps in horror behind you on the steps. You look back to see that ${she} has ${hers} gaze stuck on one of the paintings and looks very scared.\n    \n    \"Keep moving and do not look at the walls anymore.\"\n    *line_break\n    What do you do?\n    *fake_choice\n        *selectable_if (sanity > 59) #Hold ${hers} hand and keep walking\n            You hold ${hers} hand and keep climbing the stairs. $!{she} holds your hand very firmly, you can tell that ${she} trusts you. ${companion} slowly gets calmer as you continue.\n            *set trust +12\n        #Do as ${she} says\n            You look at the ground and keep climbing the stairs. You can hear that ${companion} is in distress from the way ${she} is breathing.\n            *set trust +4\n        #Look at what ${she} is looking at\n            Curiosity gets the better of you and you turn your head towards wherever ${she} is looking. You see a perfect painting, it feels almost like you are looking through a window. It's a woman hung on a tree in a forest painted with blood red. Her long red hair covering most of her pale lifeless face. \n            *if sanity \u003c 50\n                You swear you see the painting move as the body swings around from the wind.\n            ${companion} pushes you to move forward and refuses to speak about it.\nYou continue climbing the stairs, it's kind of weird that the stairs climb this long without reaching any floors. Suddenly you hear a laughter behind you and instinctively turn your head to see what it is. You see a figure pointing at you and impishly laughing. You hold the lantern closer to see what is going on and realize that it's Emma. She is in tears from laughing but then suddenly stops and looks at you. There, unmoving, just staring at you is Emma.\n*page_break What is happening?\n*if alive\n    ${companion} turns behind to see what you are looking at and as ${she} does, Emma vanishes.\n    *if sanity \u003c 76\n        Your sanity is too fragile to even comment on it so you continue walking.\n    *if sanity > 75\n        *fake_choice\n            #Tell ${her} about Emma\n                You tell about what just happened but ${companion} chooses to not talk about it any more for the better of both of you.\n                *set trust +4\n            #Don't say anything\n                You remember about ${companion} telling you to not think about what this place makes you see so you give a small nod and continue walking.\n                *set sanity +5\n*if not (alive)\n    What do you do?\n    *fake_choice\n        *selectable_if (sanity > 49) #Ignore her and keep walking\n            You are sure this isn't real and it shouldn't be. You turn around and continue walking.\n            *set sanity +5\n        #Ask her how she came here\n            \"Emma? How did you get here?\"\n            *line_break\n            She doesn't say a word. A moment passes and her eyes open even wider as she vanishes into thin air in front of your very eyes.\n            *set sanity -2\n        *selectable_if (sanity \u003c 51) #Choke her to death\n            You jump at her and grip her by the throat with your hands. You hold her down. She doesn't even flinch but her eyes look directly into yours without a blink and her face starts twitching. It seems like she isn't even trying to fight back. It doesn't take as long as you wished to watch her suffer before life leaves her body. You feel much better as you continue walking, not wanting to stay near the corpse.\n            *achieve murderer\n            *set sanity -10\n\nYou keep climbing and you come up into another room. The rest of the stairs are blocked with a locked door.\n*line_break\n\"Leave at once!\" says a trembling, old man's voice. You look to see a room lit with pleasant candles. A small wooden table and couches around it. There is a tea set on the table, the pot gives off the slightest steam to show you that it's ready to be enjoyed. Everything looks inviting other than the smell of death and decay around you. You see the man, his slender shape is covered with his ragged clothes that are maybe older than himself. He is in the corner of the room where you can't see him clearly, clutching something close to his chest between his hands.\n\n\"I said leave!\" he says again, shaking in terror or anger.\n*fake_choice\n    #I want to leave but the door is locked.\n        *goto top\n    #I just need the key, I'm not here for you.\n        *goto top\n    *selectable_if (sanity > 49) #Please calm down I'm not here to hurt you.\n        *set sanity +5\n        *goto top\n    *selectable_if (sanity \u003c 50) #Kill the man and search the room\n        *set sanity -5\n        *achieve murderer\n        *goto killman\n\n*label killman\nYou lunge towards the man and start punching him. He doesn't even defend himself. He tries to protect whatever it is clutched between his hands. You don't even see what it is. You only see red. Soon he is on the ground and you are kicking him. Your arms are tired. It seems like he is already unconscious but you want to make sure he stays that way forever. You hear his bones break. Your legs are tired now. You bring out a final strength from within you and snap his neck. He is for sure dead. You fall on the floor and can't move for a while. There is blood all over your hands. This is not a feeling you are too familiar with and you are not sure how to process it.\n*if not (alive)\n    \n    You take a moment to collect yourself. Are you becoming a monster? Will you be stuck here forever? Do you even want to leave? These questions can not be answered right now. This is a critical point for you to be calm. You get up and start searching the room.\n    *goto killsearch\n*if alive\n    ${companion} stares at you. You can hear ${hers} thoughts. You can smell ${hers} fear.\n    \n    \"What is wrong with you? What are you doing? Why are you doing this? I am done. Good luck.\" ${she} says as ${she} starts walking out of the room and down the stairs.\n    *choice\n        *selectable_if (trust > 69) #Apologize and make ${her} stay\n            \"I am sorry. I don't know what came over me. Please stay, I need you.\"\n            *goto argue\n        #Let ${her} leave\n            You hear ${hers} footfalls disappear in a few quick moments. Being alone is for the better. You can't trust anyone but yourself. You start searching the room.\n            *set sanity -5\n            *set alive false\n            *goto killsearch\n        #Try to convince ${her} to stay\n            \"Please stay. We need each other to get out of this place.\"\n            *set trust -5\n            *goto argue\n        *selectable_if (sanity \u003c 5) #Kill ${her} too\n            You run towards ${her}. You want to see what ${she} looks like when ${she} isn't breathing. The voices stop for seconds when you kill someone and those seconds are worth this thing's insignificant life. You want your mind to be free and you will do anything to get what you want. You see ${her} down a few steps. You jump but ${she} hears you do it and quickly steps out of the way. You tumble down a few steps but luckily catch yourself. $!{she} holds ${hers} dagger pointed towards you again.\n            \n            \"What are you doing? What happened to you? Can you stop for a moment and think? Do you see what this place has done to you or were you always like this? Either way I can kill you right here right now and you can't do anything about it. I won't do it because I am still myself. I am finding another way out and I am doing it alone. Get out of my way.\"\n            \n            \"GET OUT OF MY WAY.\"\n            \n            $!{her} words make sense for a moment and you feel like struck by lightning. Are you becoming a monster? Will you be stuck here forever? Do you even want to leave? When you come back to your senses, ${she} is already gone. You get back up to the room to find the key and continue.\n            *set sanity +5\n            *set alive false\n            *goto killsearch\n*label argue\n\n\"Is this some sort of a joke? You just killed a man, ${name}. How do I know you won't try to kill me next?\"\n*fake_choice\n    *selectable_if (trust > 79) #I would never do that to you.\n        \"That's something I'm not sure of anymore. You need to collect yourself. I don't think either of us are able to get out of here alone and I want you to escape. Not a murderer.\"\n        *set trust -2\n    #I don't think I could even if I tried to.\n        \"You are right but I don't want any killing done. You need to collect yourself. Neither of us are going to get out of here alone but if you keep doing this maybe I would rather not leave this place.\"\n        *set trust -4\n    #I was protecting us.\n        \"Oh you were protecting us from a man that couldn't even defend himself? Do you even hear what you are saying? You need to collect yourself and you need to do it right now. I don't think either of us are going to get out of here without the other but if you keep doing this maybe I would rather you not leave this place ever.\"\n        *set trust -6\n\nShe stops for a moment and thinks.\n\n\"I will let it go for the last time. If you attack me or any harmless people again, I won't hold back. Maybe dying is better than losing your mind and becoming a slave of this place for you.\"\n\nYou get back up to the room to find the key and continue.\n*goto killsearch\n*label killsearch\nYou look around for a while but nothing. Finally you search the body of the man. You find out that he is clutching a skeleton of an infant child wrapped in cloth and that's what he was trying to protect all this time. It's now clear where the smell was coming from. You see a rope amulet tied around where its neck would have been with a key attached to it. You take the key and unlock the door. You are exhausted from all the things happening but you continue. Thousands of different thoughts dance around your mind as you climb the stairs but they all stop when you hear it. The voice of a baby coming from the room you were just in. Crying. Screaming. It's daunting. You start humming to yourself to not hear it. You try to think of happy times but there were none. You were never really happy. You just slowly keep climbing the stairs all the while being terrorized by the sounds.\n*goto uptop\n*label top\n\"Stop lying to me. You came for my boy didn't you? My beloved Edward. Well, I will not give him up, for he is all that I have. If you take one more step, I will curse you for centuries to come just like I did to all the others that tried to steal my dear little Edward.\"\n*fake_choice\n    #I just need a key.\n        \"Oh that's what others called him too. A key. No, he is mine, leave this place at once.\n    #Can you just open the door?\n        \"Why would I open the door for a murderer?\n    #Can we just sit down and talk please?\n        \"No. I don't want anything to do with you.\nYou may search the room if you like. Although I assure you there is nothing of interest.\"\n\nYou start looking around the room for a key. You hear the man speak to himself.\n\n\"It's okay Edward. There is nothing to be afraid of. Father will protect you and you will protect father when the time comes. No one can separate us. Oh, I know, Edward. I know I can't trust them. I will just speak the words again if they do anything funny. Yes, Edward you are right but it's fine.\"\n*fake_choice\n    #Ask who Edward is\n        \"What do you want to know about my Edward? Why do you care? Just get out already.\" the man holds whatever he is holding to his side, seemingly protecting it from your gaze.\n    #Look at the man closely\n        You see the man look at the thing in his hands while speaking. Now that you are closer, you realize that he is holding what seems to be a baby wrapped in cloth.\n    #Keep searching the room\nYou search the room for a little more while the man keeps talking.\n\n\"What? Are you sure Edward? Do you think they are safe? I could always just tell them. Alright,  my little Edward, whatever you say.\" the man steps closer to you and holds the thing he was clutching all this time towards you.\n\n\"Well, go ahead Edward. Talk to them.\"\n\nYou see the man holding a skeleton of an infant child wrapped in cloth and seemingly expecting you to answer to it like it spoke to you. You also see a rope amulet tied around where its neck would have been with a key attached to it.\n\nWhat do you say?\n*fake_choice\n    #Can I have that key Edward?\n        Moments pass as the man seems to be listening to the silence of Edward and then he speaks again.\n        \n        \"Now you are just being spoiled Edward. That is no way to speak to a stranger. Haven't I taught you your manners? This calls for a punishment. Give them the key.\" he says as he hands you the key from around Edward's neck.\n        \n        \"Just because they asked for your key doesn't mean you can say those words. Let's see how you feel when you don't have it.\" he turns to you, \"Please don't bring the key back here, he needs a lesson.\"\n        \n        You go ahead and unlock the door.\n    #Yes.\n        The man seems happy about you answering positively to whatever question he made up in his mind. Moments pass as he seems to be listening to the silence of Edward and then he speaks again.\n        \n        \"You really want to give him the key? Isn't that your most valuable possession? Well, I will not judge your decision, you will learn by making mistakes from time to time. No one is perfect but maybe you know something that I don't, my dear little Edward.\" he hands you the key from around Edward's neck.\"Do not lose it. Leave us alone already.\"\n        \n        You go ahead and unlock the door.\n    #No.\n        The man seems happy about you answering negatively to whatever question he made up in his mind. Moments pass as he seems to be listening to the silence of Edward and then he speaks again.\n        \n        \"My dear Edward, they seem trustworthy, I don't feel like they are lying, maybe we can just give them the key. I will get you a much better one and I'm really tired of their presence.\" he hands you the key from around Edward's neck. \"We should go rest, Edward. It's too late for tea time now, they wasted our time.\"\n        \n        You go ahead and unlock the door.\n    #Are you crazy? This is a skeleton.\n        \"Are you crazy yourself? What do you mean by that? You can't disrespect me in my own house. You must leave. The door is right there.\" he points to the locked door which opens itself as he does so. \"I do not wish to speak to you or look at you anymore. Be gone or I will be very angry. Look at this, Edward. I don't want you to grow up to be someone like this. Oh, you are right my dear Edward, you are not that kind of person, I know, please forgive me.\"\n        \n        You go ahead and walk through the door.\n        *set sanity -5\nYou feel exhausted from all the things happening but you continue until you hear it. The voice of a baby coming from the room you were just in. Crying. Screaming. It's daunting. You start humming to yourself to not hear it. You try to think of happy times but there were none. You were never really happy. You just slowly keep climbing the stairs all the while being terrorized by the sounds.\n*goto uptop\n*label uptop\nAfter some time, you see the red of the sky again. The stairs finally lead up to the top of the tower. It seems weird because you should have taken more steps to reach to the top and why weren't there any other rooms in this tower? You step outside and find yourself next to a huge bell. You can't see further than your hand can reach because of the mist around you. You step on something as you walk around the bell and when you look down you see a big mallet.\n*line_break\nYou suddenly start hearing voices in your head.\n\n\"Ring the bell, just ring the bell, this will get you home. This is the way out.\"\n\n*if (sanity \u003c 65)\n    Your hands move out of your control as you pick the mallet up from the ground and start banging it against the bell. The ringing hurts your ears but you can't stop yourself from doing it. It's like some unknown power is controlling your body and you can't fight back. The bell rings with great intensity. You can feel it vibrate the bones inside of you. You realize that with each hit, some part of your vision goes black. Within seconds you find out that it's not your vision but it's what this sound is doing to the world around you. It's like you are opening a gateway to the dark between the stars. The fabric of space warps into spheres of void around you.\n    *if alive\n        ${companion} looks at you in horror and tries to make you stop but fails. You are stronger than you normally are. Your vision goes completely black after a final bang against the bell.\n*if (sanity > 64)\n    You feel a strong urge to pick up the mallet and ring the bell but you hold yourself.\n    *if alive\n        It seems like ${companion} isn't able to do the same as you. $!{she} picks the mallet up from the ground and starts banging it against the bell. The ringing hurts your ears. You can feel the intensity of the sound vibrate the bones inside of you. You realize that with each hit, ${companion} seems to become more excited to hit it for another next time. After a final bang against the bell ${she} falls to the ground unconscious but ${she} still breathes. Suddenly you see a vision. It's like remembering something that happened but very slowly.\n    *if not (alive)\n        Emma suddenly appears in front of you again, picks up the mallet from the ground and starts banging it against the bell. You reach to stop her but your hand moves through her. You don't know how that just happened but now you are sure this isn't Emma and it's just this place trying to play tricks on your mind. All of a sudden you start seeing a vision. It's like remembering something that happened but very slowly.\n*finish Why?", "the_tower": "You wake up. You are back at the top of the tower but this time mist doesn't block your vision as much. You think that but you realize that you can only see one thing through it and everything else is still not visible. You look far away and see another tower, it looks identical to the one you are standing on right now.\n*if alive\n    ${companion} seems to wake up at the same time as you and looks at it.\n    \n    \"I guess we know where to go next.\"\n\nYou slowly take the steps down and outside, thinking about the things you just saw or remembered.\n*if alive\n    You wonder what ${companion} saw. Both of you are too overwhelmed to talk about them so you stay quiet. You start walking towards the other tower. It doesn't take much time before ${companion} speaks again.\n    \n    \"Okay I am not going to be able to continue if we don't talk about what we just did. What happened to you after you rang that bell?\"\n    *fake_choice\n        #Tell ${her} what happened in detail\n            \"I saw myself but from before, I think. I woke up, I was going to the library and right as I was about to enter, I heard someone scream. When I got closer, I found out that it was Henry.\n            \n            \"Who is Henry?\"\n            \n            \"Well I don't know who Henry is but it felt like I knew him for years. He told me that I needed to go with him and that it couldn't wait any longer. I felt like I knew what he was talking about but I was learning as the vision kept going. It was almost like a dream in which I wasn't controlling myself but at the same time I was.\"\n            \n            \"I know exactly what you mean. What happened after?\"\n            \n            \"We came here, well the beginning of wherever we are. The room with the books. That room was our room. Henry wrote the things in it. He told me that we needed to go in deeper so we did. We came upon the door with the riddle on it but the riddle was different this time. Henry couldn't solve it himself so he waited for me to do it. When I got it right, we went through and saw the stairs but then Henry forced me to go back, burn the books and forget everything by doing the things in the note that he gave me before.\"\n            \n            \"What did you do?\"\n            \n            \"I just went back, read the notes in the room with the books in it and started walking out.\"\n            \n            \"What did you read?\"\n            \n            \"I can't tell you.\"\n            *set trust +8\n        #Tell ${her} but be evasive\n            \"I saw myself but from before, I think. I woke up, I was going to the library and right as I was about to enter, I heard someone scream. When I got closer, I found out that it was someone I knew.\"\n            \n            \"Who was it?\"\n            \n            \"I can't remember who it was now but it felt like I knew him for years. We started walking towards here. We came upon the door with the riddle but he couldn't solve it himself so he waited for me to do it. When I got it right, we went through and saw the stairs but then he forced me to go back and I woke up as I was leaving.\"\n            *set trust -2\n        #Don't tell ${her} anything\n            \"Fine, at least hear what I have to say because I need to get this out of my chest.\"\n            *set trust -6\n    *goto compast\n*if wolves\n    You see the wolf-like creatures waiting at the same place. They seem to be relieved that you are alive and well.\n    \n    \"We were scared. We heard the bell. We hoped that you were fine. You seem fine to us.\"\n    \n    One of them comes closer to you and licks the side of your face. It's kind of horrifying for a moment but also comforting. \n    \n    \"It is time for you to go for the next tower. It started existing after you rang the bell. We have never seen it before. It must be the place to go.\"\n    \n    What do you say on the way?\n    *label wolfq\n    *fake_choice\n        *disable_reuse *selectable_if (sanity > 59) #I will get all of us out of here.\n            \"We believe in you as much as we can believe in anything. We hope we can go back. We will owe our lives to you.\"\n        *disable_reuse #What were your names before?\n            \"We do not remember them. You can give call us with names if you want but we do not need them anymore. There is very little humanity left in us.\"\n            *goto wolfq\n        *disable_reuse #How long have you been here?\n            \"We slept hundreds of nights. We did not keep count because it does not matter if we do. We live here now and we wished only to survive until you arrived.\"\n            *goto wolfq\n        *disable_reuse #How did you transform into the beings you are now?\n            \"The food made us like this. There is not much to safely eat here. We learned it the hard way. If you are hungry we can find you food.\"\n            \n            You realize now how hungry you are. You haven't eaten in a long while. They stop for a second and smell the air around them. They start running into the trees rather than the path for just couple of minutes before you can see some sort of berries you have never seen before. You all take a moment to eat, the berries are really sweet.\n            *set sanity +2\n            *goto wolfq\n        *disable_reuse #Why did you come here?\n            \"We do not remember the reasons for our arrival. All we know is that we did not come here by ourselves. He tricked us into thinking that we should come here and so we did.\"\n        #That is all\n            *goto towertwo\n        \n\n*label compast\n*if alive\n    \"I woke up and I was getting ready to leave again. I was going to visit my father. I left and started walking. I saw the same things I saw at the day I came in here weeks ago. The same birds, the same people talking to each other. I wanted to do different things and not come back here, I thought it was some sort of a time travel. I know it sounds silly but anything can sound reasonable from where we are standing right now. I arrived at the graveyard and walked in front of my father's headstone. I was praying and when I was done, I saw a box buried next to his grave. I opened it. It had directions to this place. The note told that the truth of my father's death would be revealed to me if I got here. It was in his handwriting.\"\n    \n    Do you say anything?\n    *fake_choice\n        *selectable_if (sanity > 59) #Comfort ${her} for a moment\n            You hold ${hers} hand for and look at ${her} in the eyes for a moment to calm ${her} down. It seems to work and ${she} gives you a smile, maybe the first one ever.\n            *set trust +8\n        #Ask how ${hers} father died\n            \"How did your father die?\"\n            \n            \"He took his own life one day. He never seemed like the person that would do that either.\"\n            *set sanity -2\n        #Keep listening\n            \"What did you do then?\"\n\n    \"I got some equipment and headed right here. There were three people already inside so I had to sneak by but I saw their faces. I recognized them this time. One of them. It was you. You three were sitting there reading books and writing things on papers. You were so occupied that I could just walk by quietly. The other door was open. I didn't want to talk to you because I was scared. I was more paranoid than usual that day because of how surreal everything was. I woke up back here suddenly when I was in the tunnels. Can we just leave this place? I don't want anything to do with it anymore.\"\n\n    Right as ${companion} finishes ${hers} sentence, you see vines shoot out from under the ground and hold ${her} down like the very earth is trying to consume her you need to act quick if you are going to.\n    *fake_choice\n        #Free ${her}\n            You grab the vines and try to hold them apart for ${her} to get away but you are not strong enough.\n            \n            \"My dagger, use it to cut it, I can't move my hands\"\n            \n            You get ${hers} dagger and try cutting ${her} free.\n            *page_break\n            It takes you longer than it should but you manage to do it. You help ${companion} get up and ${she} hugs you. You can feel ${hers} breathing slowly go back to normal as you both start to breath at the same time. For a moment you forget where you are and just feel comfort. \n            *if (trust > 89)\n                *fake_choice\n                    #Kiss ${her}\n                        You embrace ${her} as ${she} does the same. You forget everything but ${companion} and ${hers} soft lips touching yours. You can tell how important and beautiful this moment is for both of you. $!{she} holds your hand as you continue walking.\n                        *set trust 100\n                    #Continue\n                        You stay there for minutes before you continue.\n                        *set trust -5\n        *selectable_if (sanity \u003c 26) #Watch ${her} suffocate\n            You stand there and just watch ${her} suffer. $!{her} eyes wide as it can be with blood vessels forming one by one as seconds go by. $!{she} to fight but ${she} can't even move a muscle from all the vines covering everything but ${hers} head.\n            \n            \"Help me you monster!\" are ${hers} final words before no more air fills ${hers} lungs and the millions of hands seeming like the grass claw into ${hers} body and consume ${her}. ${companion} is no more.\n            *set sanity -5\n            *set alive false\n    *goto towertwo\n*label towertwo\nYou enter the tower. It seems identical but there's a feeling you can't describe telling you that this is a different place. You lift your lantern up again to see what's inside.\n*if (sanity > 59)\n    You see beds scattered around the room. It looks like they haven't been used in years. They all have similar white sheets. You realize that you are tired only after seeing the opportunity to rest.\n    *fake_choice\n        #Rest a little bit\n            You lie down in one of the beds.\n            *if alive\n                *if (trust > 100)\n                    ${companion} lies down next to you and you get a peaceful rest.\n                    *set sanity +10\n                *if (trust \u003c 100)\n                    ${companion} lies down in another bed and you get a peaceful rest.\n                    *set sanity +5\n            *if not (alive)\n                You get a peaceful rest even though you feel like something bad is going to happen at any minute.\n        #Climb the stairs\n            You are tired but you can't\n*if (sanity \u003c 59)\n    You see beds scattered around the room and humanoid figures under blankets on them. They don't seem to be breathing and judging by the smell, you choose not to look further into it.\n\nYou start climbing the stairs. A few steps and this time you come upon another room. You see unlit lanterns hanging from the walls, a bed on the side, a rug on the floor, a wardrobe and a desk in the corner. It seems like someone lived here before. You lift your lantern up and look around the room. The first thing you notice is the tally marks on the walls. Someone counted their days here by scratching them. The wall is completely covered in them so you can't tell exactly how long it was. The dust around the room points out that they haven't been in here for months if not years. You look around the desk to see if there is anything interesting and while you are doing so, you see something move on the bed out of the corner of your eye. You bring your lantern closer to it to see but there is nothing there. You look around the room for a moment and you hear something. It sounds like breathing. It is coming from above you, the ceiling.\n*page_break\n*if alive\n    You look at each other with ${companion} for a split second, realizing the situation.\n    \n    What do you do?\n    *fake_choice\n        *selectable_if (trust > 54) #Grab ${companion} and run out of the room\n            You grab ${companion} and start running, after a minute of going up the stairs you look back and see nothing. It seems like you are safe for now.\n            *set trust +2\n        #Look at what it is\n            You look up. All you see is shadows dancing around. It seems like a humanoid figure with tens of thin arms flapping around.\n            \n            \"Run!\" says ${companion} as you both start running up the stairs. You look back after a minute and see nothing. It seems like you are safe now.\n        #Run out of the room\n            You run out of the room, ${companion} follows right after you. After a minute of going up the stairs you look back and see nothing. It seems like you are safe for now.\n*if not (alive)\n    You freeze for a split second, realizing the situation.\n    \n    What do you do?\n    *fake_choice\n        #Look at what it is\n            You look up. All you see is shadows dancing around. It seems like a humanoid figure with tens of thin arms flapping around. You start running up the stairs. You look back after a minute and see nothing. It seems like you are safe now.\n            *set sanity -5\n        #Run out of the room\n            You run out of the room. After a minute of going up the stairs you look back and see nothing. It seems like you are safe for now.\n            *set sanity +4\n\nYou continue going up the stairs for a couple of minutes before you come upon another room. You get into it and wave your lantern around to see. You see one thing and one thing only in the room. It's a gravestone. It reads \"${name}\". You have been in this room for seconds but you have already seen enough.\n\nYou get out and continue climbing the stairs. You see another room and get in it. You wave around your lantern again to quickly see what lies inside this one. This room seems familiar to you. Theres a desk and a bed near each other. A wardrobe next to the left wall, a bookcase next to the right one. This is your room. You bring your lantern near the notes on the desk and you see the notes you made and your diary. You skim through to make sure it's real because this can't be real but it is your notes and diary.\n*if alive\n    *if (trust > 89)\n        ${companion} realizes what's going on and holds you by the arm. It's assuring and helps you keep your calm. $!{she} guides you out of the room and you continue going up the stairs again.\n    *if (trust \u003c 90)\n        ${companion} realizes what's going on.\n        \n        \"This is just another trick. This place is trying to make you mad. Please keep calm.\"\n        \n        This actually helps you keep your calm and soon you just leave the room and start going up the stairs again.\n*if not(alive)\n    *if (sanity > 69)\n        You keep calm knowing that it's just another one of the tricks this place plays with you to make you mad. It's still unnerving to see your room in this hideous place. You quickly leave and continue going up the stairs again.\n    *if (sanity \u003c 70)\n        How can this happen? Your room in this place? Gravestone with your name on it just minutes ago? You can't escape this place. It's eating you alive. You want to scream but you are too scared to do so. What if something hears you and comes for you? The air is sucked out of you. You can't breathe. You are suffocating. You will die here and no one will ever know.\n        *set sanity -5\n        *page_break\n        It takes you about half an hour to compose yourself but you manage it. You get up and continue going up the stairs again.\nYou can't tell how much time passes on these stairs. It could even be days that you just go up step by step but you finally see something different. There is a wooden door before the stairs continue.\n*choice\n    #Go in\n        *goto appointment\n    #Keep climbing\n        You start climbing but something tells you to go back and check that room. You don't know why but suddenly you are very curious.\n        *choice\n            #Go back and enter the room\n                *goto appointment\n            #Keep climbing\n                You shrug it off and continue.\n                *goto belling\n*label appointment\nYou open the door and get in. The room is empty other than a table and two chairs on opposite sides of it. On one of them sits a woman on her twenties, long brown hair, paler than the moon you remember, her hand playing with her chapped lips. She raises her head from the papers on the table to you and through the dark circles, her impossibly bright green eyes meet yours.\n\n\"You didn't knock on the door but no matter, please sit down.\"\n\nBefore you can think of what to say you are sitting down in front of her.\n\n\"Do you have an appointment?\" she says in the most gentle voice you have ever heard.\n*fake_choice\n    #Yes.\n        \"May I please see it.\"\n        *fake_choice\n            #I don't have an appointment.\n            #I lost it.\n                \"Well, no matter. I am free right now, just give me a moment.\" she writes down things on a piece of paper.\n    #No.\n        \"Well, why are you here then?\" she shouts in a scarily angry voice. \"I am sorry, please excuse my temper. No matter. I am free right now, just give me a moment.\" she writes down things on a piece of paper.\n\nA few moments pass before she speaks again.\n\n\"Now I am going to ask you questions and you will answer with a yes or a no, is that clear?\"\n*fake_choice\n    #Pretty clear.\n        \"I said with a yes or a no, how can I convey it in a simpler way for you to understand what I am saying?\" she shouts in a scarily angry voice. \"Well, no matter, let us continue.\"\n    #Yes.\n        \"Good, let us continue.\"\n    #I don't understand what is happening.\n        \"I just told you that you will answer with a yes or a no, how can I convey it in a simpler way for you to understand what I am saying?\" she shouts in a scarily angry voice. \"Well, no matter, let us continue.\"\nshe picks up another piece of paper and inks her quill.\n\n\"Answer these questions according to the past four weeks. Have you felt anger towards anything?\"\n*fake_choice\n    #Yes\n    #No\n\"Have you felt like everything was an effort?\"\n*fake_choice\n    #Yes\n    #No\n\"Have you experienced feelings of worthlessness?\"\n*fake_choice\n    #Yes\n    #No\n\"Have you experienced a feeling of being trapped or caught?\"\n*fake_choice\n    #Yes\n    #No\n\"Were you ever not able to stop or control worrying?\"\n*fake_choice\n    #Yes\n    #No\n\"Have you ever heard voices that other people could not hear? Not in a sense of having good hearing but rather hearing things that other people said did not exist like voices coming from inside your head talking to you or about you, or voices coming out of the air when there was no one around.\"\n*fake_choice\n    #Yes\n    #No\n\"Have you ever felt that some mysterious force was inserting thoughts, that were definitely not your own thoughts, directly into your head?\"\n*fake_choice\n    #Yes\n    #No\n\"Have you ever felt that someone or something was trying to communicate directly with you by sending special signs or signals?\"\n*fake_choice\n    #Yes\n    #No\n\"If you were to be scared of anything, would it have any correlation with ${fear}?\n*fake_choice\n    #Yes\n    #No\n        *set sanity -10\n\"Were you always like this, ${fullname}?\n*fake_choice\n    #Yes\n    #No\n    #Like what?\n\"I see, well, no matter. This is all the time we can spend for today, I strongly suggest that you come back later. This is definitely not looking good at all. Please leave now.\"\n\nShe gets up and guides you out of the room. Before you can process what just happened, you are going up the stairs again. You try to pay as little mind as you can to it.\n*goto belling\n*label belling\nIt takes minutes but you finally reach the top again. There is the bell. It's identical to the last one you saw. You know what's going to happen and you are ready for it this time so you just pick up the mallet and ring the bell.\n*finish Brace Yourself", "the_vision": "You wake up to the sun hitting your face through the curtains of your small iron house. You start getting ready for work. It's somewhat uneventful for you between your bed and your desk apart from the things you do with Henry. You get your pills, have a quick breakfast and head out.\n*page_break\nIt's raining again. Well it doesn't really matter since you are well used to it and the library you work at is not that far either.\n*fake_choice\n    #Enjoy the rain\n        *set sanity +2\n    #Walk quickly\n    #Go back and get your umbrella\n        *set sanity -2\nYou start heading towards the library, the sound of blood hitting the pavement is soothing. You see all kinds of people going about their businesses. Couples holding hands, looking up to the sky and letting the rain hit their faces. A man in a suit with a briefcase in his hand walking very quickly, almost like he is being chased. You see your friend Arthur who works at a small café wave at you as you go by.\n*page_break\nYou soon arrive at the library, its a small room but it's enough to do your research. You see that Henry is already there waiting for you.\n\n\"Hey ${name} I think we really are getting closer. Look at all these books i found.\"\n\nHenry hands you a book with the title \"Kthithro\" on it.\n\n\"This one tells about the being that feeds on insanity. It is said that she works for another being called Lir'ithih. I think these are very close to what we are dealing with here. You read it too and I think we can just start going deeper and yes I promise I won't do that again.\"\n\nYou quickly read the book while Henry gets everything ready for a journey.\n\n\"Alright, let's do this.\"\n\nYou go through the familiar places again and the riddle door, as you call it, changed once again but you are confident you can solve it.\n*page_break\n*goto riddlu\n*label riddlu\n*temp riddlu\n\"I appear only in the dark\n*line_break\nI bring fear with light\n*line_break\nI stretch through time\n*line_break\nI happen just overnight\"\n*input_text riddlu\n*if (\"$!!{riddlu}\" = \"NIGHTMARE\")\n    *goto correct\n*else\n    Nothing happens. You hear the footsteps get even closer than usual.\n    *line_break\n    \"Come on, ${name} I don't think we have much time\" says Henry in a worried tone.\n    *set sanity -2\n    *page_break\n    Do you need a hint?\n    *choice\n        #No\n            *goto riddlu\n        #Yes\n            *goto riddlehint\n*label riddlehint\n*if (letter3 = 0)\n    You see nine carved squares appear on the door and the letter \"N\" inside the first one.\n    \n    *set letter3 +1\n    *goto riddlu\n*if (letter3 = 1)\n    A second letter appears and it reads “Ni”\n    \n    *set letter3 +1\n    *goto riddlu\n*if (letter3 = 2)\n    A third and a fourth letter appears and it reads “Nigh”\n    \n    *set letter3 +1\n    *goto riddlu\n*if (letter3 = 3)\n    A fifth letter appears and it reads \"Night\"\n    \n    *set letter3 +1\n    *goto riddlu\n*if (letter3 = 4)\n    A sixth letter appears and it reads \"Nightm\"\n    \n    *set letter3 +1\n    *goto riddlu\n*if (letter3 = 5)\n    A sevent letter appears and it reads \"Nightma\"\n    \n    *set letter3 +1\n    *goto riddlu\n*if (letter3 = 6)\n    An eighth letter appears and it reads \"Nightmar\"\n    \n    *set letter3 +1\n    *goto riddlu\n*if (letter3 = 7)\n    A ninth and final letter appears and it reads \"Nightmare\"\n    \n    *set letter3 +1\n    *goto riddlu\n*if (letter3 = 8)\n    *goto correct\n*label correct\n*achieve riddlerthree\nYou hear a click from inside the door and it slowly creeks open.\n*page_break\nYou go through the steps and find yourself in a maze. It takes you and Henry about half an hour to finally get out of the maze. This is your first time going this far.\n\n\"Whatever happens here, our main goal is to learn. Don't forget that, ${name}.\"\n\nYou find yourself in some sort of a forest. You only went deeper underground but now you are outside. You look around and see red trees made out of flesh and thousands of writhing minuscule gray hands that have their flesh pulled back to their bones on the ground trying to grab onto your feet and stop you from moving. You walk further in and you can feel the cracking of bones under your feet. There is a faint mist hovering a little bit above the ground that makes it even harder to see where you are. It seems like the sun is setting. You see a beaten path start from where you are and begin walking in that direction, getting lost in this place is the last thing you want to do. You walk along the path for hours as the sun sets and it gets darker. You can still see that the sun hasn't moved but unnatural clouds gathered above you to block it. Everything you can see is painted in a blood red, you feel like you are inside of a painting.\n\nYou keep walking with Henry and not soon after, you see something. It draws your eye like a terrible dream, unable to look away upon noticing it is an impossible colossal tower of black iron and bones stretching for hundreds of miles into the sky before vanishing into the dark clouded expanse above you. You blink and turn around to look at the other side of the horizon but there stands the exact same tower. You shift around but no matter your view of this horrid horizon, there you see the tower standing ever vigilant. You move closer to it whichever path you decide to take.\n\n\"That must be Taioggi. If He accepts us we will be able to go and ring the bell. Let's not think about what will happen if He doesn't.\"\n\nThe closer you get to the tower the taller it seems to become. You eventually get near enough to see an archway leading into it. You can see countless skulls of unknown nature affixed on it. You walk inside and lift your lantern up to see. It's a big room with spiral stairs connected to the walls around it. The iron walls are uncomfortably warm to the touch almost like it's another person. The room is completely empty.\n\n\"I guess we climb the stairs.\"\n\nYou climb the stairs for about half an hour to no end.\n\n\"Okay. We go another half an hour and if we don't reach anything we should go back down.\"\n\nYou spend another half an hour but no luck. You are still just climbing stairs that look the exact same. You decide to go back down and you just find yourself in the room just seconds after.\n\n\"Well this doesn't mean He didn't accept us but it also doesn't mean that He did. I guess we have a new library now\" says Henry, gesturing towards the empty room you are in.\n*finish Pieces Coming Together"}};
