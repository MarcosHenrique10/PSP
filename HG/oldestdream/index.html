.\n\nYou continue walking as you hear the blood trickling down the walls. A few minutes pass without any change until you hear a broken feminine voice.\n\n\"Welcome, walkers.\"\n\n*temp flesh false\n*if not (flesh)\n    It's coming from the way you are walking towards. You take a few more steps to see a door, made of flesh just like the walls, and a face sticking out of it in the middle, looking at you. It's a woman with short raven hair and eyes like the void, pulling you inside them.\n    \n    \"Don't be shy now, you've come this far. Come closer so I can see you.\" says the woman.\n    *if alive\n        \n        ${companion} walks forwards and you follow.\n    \n    \"Oh! I was not expecting this. No, not at all. I do not expect many things but this one, I did not expect the most. Are you here to enter and meet the landlord?\"\n    *fake_choice\n        #Yes.\n            \"Very well.\"\n            *goto enter\n        #No, just wandering.\n            \"Oh, but no wanderer can come and find me. I am not the one to judge others, just merely curious. If you still wish to enter, you must tell me. I am the keeper of this path.\"\n            *choice\n                #Tell her you wish to enter\n                    *goto enter\n                #Go back for another door\n                    \"I hope we meet again.\" she says as you slowly walk back.\n                    *set flesh true\n                    *goto door\n        #I have some questions first.\n            \"Interesting. I don't have much knowledge but if that is what you seek, I shall guide you.\"\n            *goto fleshask\n*if flesh\n    \"Oh, it's you again. Did you change your mind? Do you wish to enter now?\"\n    *choice\n        #Yes.\n            \"Very well.\"\n            *goto enter\n        #No, I have some questions first.\n            *goto fleshwall\n*label fleshwall\n\"Interesting. You do not wish to enter, yet you come to me. I don't know what it is you seek but I assure you I do not have much to offer.\"\n*label fleshask\n*fake_choice\n    *disable_reuse #Ask her about herself\n        \"Oh, another curious one, I see. I must warn you, it is not a pleasant story and not a short one either. Do you still wish to listen?\"\n        *fake_choice\n            #Yes.\n                \"I used to be a person, just like you are. I was not here. I was living in the normal world. When I was little, my parents would always put me to bed early. One day I couldn't sleep and so I decided to get out of my room and see what my parents were doing because every night I would hear them say things but I wouldn't understand the tongue. I found out that they locked me in my room. I got the spare key the other night to get out. When I came closer to the sound of my parents it felt like as if the ground beneath my feet were shaking and I thought there was an earthquake but it was something different. It's hard to put to words what really happened. I looked through the keyhole of my parents' room and I saw them both have some sort of scrolls on their hands reading it out loud but it wasn't a language, it was more like screams put into a structure, if that makes sense. Days go by as I could never stop thinking about this so another day I stole one of the scrolls and when I looked at it, the words didn't make any sense. It was just weird symbols. They didn't have any arrangement that made sense, some parts were stained with what seemed to be tea and coffee and blood. As I looked at it, my lips began moving by themselves, I was reading it out loud just like my parents but it wasn't really me reading the words. The ground started shaking again but this time also the space around me was changing. I was not in my room anymore, I was in a forest, or a jungle, I couldn't tell much. Then I saw Him. I do not remember what He looked like now, even then, every time I blinked, I saw Him for the first time again. I felt many things but the feeling that stays with me still is dread. I closed my eyes, I didn't want to be there so I screamed out loud 'I wish I was somewhere else!' and then I was somewhere else. I was here. I became this. A face on a wall in a place I do not know. Decades pass, I do not sleep, I do not eat, I do not walk, I do not live. I never wanted this.\"\n                \n                You see a tear comes down her left cheek but it is the same color as the blood trickling down the walls made of flesh around you.\n                \n                \"That is my story, all of it. There is nothing about me as a person. No other experience. Do you have other questions, walker?\"\n                *set sanity -5\n                *goto fleshask\n            #No.\n                *goto fleshask\n    *disable_reuse #Ask her about this place\n        \"You probably know more than me. The moment I came here, I was right here, a face on a door and my body are walls.\"\n        *goto fleshask\n    *disable_reuse #Ask her about the landlord\n        \"His name is Richard. He comes to talk to me sometimes. He doesn't want to be here, no one does. He is an old man. Weak in his bones but knows about this place more than anyone. He is very welcoming, is what I heard from other walkers like yourself but he has odd reactions to people asking him to do things for them. I haven't seen that side of him. I do not need much.\"\n        *goto fleshask\n    *disable_reuse #Ask her about the paths\n        \"Richard told me about them once. He said that I was one of the paths created thanks to his prayers. Apparently Richard asked Him for safety and so He bent fate to create these paths to make sure no evil gets in. You are no inherent evil, I can tell.\"\n    #Ask for entry\n        \"Very well.\"\n        *goto enter\n    #Go back for another door\n        *goto door\n*label enter\nYou see her clench and grind her teeth as the door opens. She watches you walk through before closing again.\n*achieve curious\n*goto tavern\n*comment eating table at tavern\n*label wise\nYou go through the door as it slams shut behind you, the air pushing you a couple steps forward. You find yourself in a room lit with candles all around and thousands of tomes. You look up to see the bookcases start spiraling, going on and on until they reach outside your vision. You hear cats purr as a black one comes and rubs its head against your leg.\n\n\"Who is it?\" rings an old and soft voice, soothing your ears.\n\nYou take a few steps towards it to see a man sitting behind a desk and in front of a door. Wrinkles cover his earth-brown skin. His gray beard, yellow at the tips, conceal most of his chest. He closes the book in front of him as a bit of dust flies out and he removes his glasses from in front of his big brown eyes to look at you. The smoke coming out of a burning incense stick on his desk gives off a pleasant smell.\n\n\"Who is it I said, that comes into my chambers while I'm studying?\" says the man as he scratches his bald head.\n*temp alfred false\n*temp fakename \"\"\n*fake_choice\n    #Tell him your name\n        \"${name}? I don't recall ever knowing a ${name}.  I believe this is our first meeting, I am Alfred. Pleased to make your acquaintance. What is your business here?\"\n    #Make up a random name\n        *input_text fakename\n        *set sanity -2\n        \"${fakename}? I don't recall knowing a ${fakename} of your appearance. I believe this is our first meeting, I am Alfred. Pleased to make your acquaintance. What is your business here?\"\n*label alfred\n*choice\n    *disable_reuse #Ask him about himself\n        \"Like I said, I am Alfred and I am the keeper of this path. Although I don't remember how I came to be a keeper, I live here and pass my time reading books.\"\n        *goto alfred\n    *disable_reuse #Ask him about this library\n        \"Half the tomes I wrote myself, half of the rest were here already and the remaining were given by people like you. I'm a man of literature.\"\n        *goto alfred\n    *disable_reuse #Ask who else came here\n        \"There hasn't been anyone for years, the one before you was someone called Herman. I don't know his whereabouts now.\"\n        *goto alfred\n    *disable_reuse #Ask him about the landlord\n        \"His name is Richard, a good fellow, brings me ink and paper whenever I ask him to and I do ask him quite often. I believe he is very hospitable since not everyone who comes in here gets to meet him. The paths are made for a reason.\"\n        *goto alfred\n    *disable_reuse #Ask him for entry\n        \"Well, I can't just let you go through, I am a keeper after all. You must answer this question and you only have one try at it. Who is it that none shall see and none should escape. Who sleeps high in the sky dreaming our future. Whose eye shall open when the stars align to question our devotion?\"\n        *fake_choice\n            #Taioggi\n            #Lir'ithih\n                \"That is correct, please come this way\" he says as he stands up and unlocks the door behind him with a key he produces from inside his robes. \"And when you meet Richard, you can tell him that I vouch for you.\" he watches you leave and locks the door again.\n                *set alfred true\n                *set sanity +15\n                *goto tavern\n            #Anyg'lith\n            #Omluitloth\n            #Edward\n        \"My apologies, that is not correct and so I can't let you enter, the rules are the rules, nothing I can do about it.\"\n        *fake_choice\n            #Go back for another door\n            #Force entry\n                You start walking towards behind the desk as two cats jump down from nearby bookcases and hiss at you. You see them grow bigger and bigger almost the sizes of lions. This doesn't seem to be a good idea anymore so you walk back for another door.\n                *set sanity -2\n        *goto door\n    #Go back for another door\n        *goto door\n*label tavern\nYou find yourself outside in a garden. The clouded sun in the sky trying to imitate the night time paints a beautifully crafted fountain's water into a deep red in front of you. Small songbirds flutter around and their horrible shrieks almost unite into a calming song. There is a beauty about this place. You see another building at the other end of the garden and start walking towards it.\n*if alive\n    ${companion} stops where ${she} is standing for a second and closes ${hers} eyes.\n    \n    \"This place reminded me of good times, sorry\" she says as she starts following you again.\n    \nYou come closer and start hearing the beat of a drum from inside this wooden building. You step through the open door to find yourself in some sort of a tavern. About a dozen people sit around in groups drinking, eating and talking to each other. Two people in the corner by the fireplace play two drums with sticks made out of bones. A man, almost so tall that he needs to lean down to not touch the ceiling gives you a brief nod from behind the counter, seemingly the owner of this establishment.\n*line_break\n*label inn\nWhat do you do?\n*choice\n    #Approach the owner\n        *goto keeper\n    *disable_reuse #Approach a friendly looking table\n        *goto table\n    *disable_reuse #Approach the musicians\n        *goto bard\n*label keeper\n*temp waiting false\n\"What can I do for you?\" says the man, hiding his own drink just under the counter and giving you a smile with his red cheeks glowing through his scruffy beard.\n*label keep\n*fake_choice\n    *disable_reuse #Ask for a drink first\n        *if not (alive)\n            You watch as he fills a tankard of ale and hands it to you. \"You look weary and I haven't seen you before. This one's on me.\"\n        *if alive\n            You watch as he fills two tankards of ale and hands them to you. \"You two look weary and I haven't seen you around before. This one's on me.\"\n        *set sanity +5\n        *goto keep\n    #Tell him you have some questions\n        \"Sure, lay them on me.\"\n        *goto keeperquestion\n*label keeperquestion\n\n\nWhat do you ask?\n*choice\n    *disable_reuse #Ask about himself\n        \"I am Victor and I am the head of this tavern.\" he points at the barmaid going around the tables \"That's my wife, Laura. I have been here since birth and met my wife one day when she came in. Never had a father and my mother died giving birth to me.\" he clutches what you assume is a necklace through his clothes, \"Still wish I was the one to pass. Sorry for being dark, it's just not much light around here unless new people like you come in.\"\n        *set sanity +2\n        *goto keeperquestion\n    *disable_reuse #Ask how he has a tavern in this place\n        \"Family business, came to me by blood but I am happy it did. Talking to people is my favorite thing.\"\n        *goto keeperquestion\n    *disable_reuse #Ask how he gets supplies\n        \"The food we pay hunters, the drinks we make ourselves. Not many people come and go so it's always been enough.\"\n        *goto keeperquestion\n    *disable_reuse #Ask if he knows a way to escape\n        \"What do you mean escape? If someones following you, you can be sure they can't get in here.\"\n        *fake_choice\n            #Tell him it's nothing\n                *goto keeperquestion\n            #Ask for a way into the normal world\n                \"I don't get what you mean, friend.\" You get the sense that he has never been out of this place.\n                *set sanity -5\n                *goto keeperquestion\n    *disable_reuse #Ask for Richard\n        \"Oh yeah, he's upstairs. I'll let him know he has visitors. Just wait here for a moment.\" he climbs the stairs on the side and comes back after a few moments.\n        \n        \"He will be ready to receive guests in ten minutes is what he said.\"\n        *set waiting true\n        *goto keeperquestion\n    *selectable_if (waiting) #Go to Richard's room\n        *goto richard\n*label table\nYou approach a table where a man and a woman sit facing each other, their hands intertwined over the table. The man runs his hand over his face to pull his blond hair away from his sparkling green eyes to see you as you approach. He invitingly moves the empty chairs, giving you a warm smile. \n\n\"Looking for company?\" says the woman with the grace of a lady, playing with her wavy auburn hair that falls across her shoulders, fighting for attention with her overly complicated dress that tells you she has maids at her command.\n\nWhat do you do?\n*choice\n    #Join their table\n        *goto elizabeth\n    #Go back and approach the owner\n        *goto keeper\n*label elizabeth\n*if alive\n    The woman speaks, \"Are you a couple too? This is exciting, let us share our stories with each other!\"\n    *fake_choice\n        #Yes, we are a couple\n            *set trust +10\n        #No, we are just friends\n            *set trust +4\n    \"Well, what are your names?\" she answers as ${companion} speaks up.\n    *line_break\n    \"My name is ${companion} and this is ${name}. We are very confused and were hoping you could help us.\"\n    *line_break\n    \"You look hungry more than confused.\" says the man as he turns his head towards the owner of the tavern and shouts, \"Some food and a bottle of your finest wine, Victor, I have new friends waiting.\" You can see ${companion} heave a sigh of relief.\n    *line_break\n*if not (alive)\n    The woman speaks, \"Are you one of the travelers that come here to meet Richard?\"\n    *fake_choice\n        #Yes.\n        #No.\n    The man cuts you off right as you are about to answer, \"My lady, we should let them eat first. Look at their face, I've never seen someone look this weary before.\" he says as he turns his head towards the owner of the tavern and shouts, \"Some food and a bottle of your finest wine, Victor, I have a new friend waiting.\"\n    *line_break\nThe woman starts speaking again and you realize that it's almost as if every other sound in the room vanishes when she does. \"My name is Elizabeth and this is my husband, Vincent. We would be glad to spend our time with you tonight.\"\n\nThe food arrives quickly and in a few moments you see a complete feast in front of you. Different types of meats and vegetables all cooked in different styles with different spices, you almost can't find a fork and a knife under the plates that cover the table. The smell of grilled rabbit from one of the plates cuts through all others to remind you of the times your friend Arthur would hunt and cook for you in fall and winter. You briefly wonder what he is doing now.\n\n\"Please go ahead, we already had some.\" says Vincent as he fills the glasses with wine.\n*if alive\n    \n    You can see the satisfaction on ${companion}'s face as ${she} hardly even gives ${her}self time to breathe. Vincent feeds Elizabeth some grapes and they playfully smile. You enjoy the food too, it's been a long time since you had anything to eat.\n    \n*if not (alive)\n    \n    You see Vincent feed Elizabeth some grapes and they playfully smile. You enjoy the food like you are eating for the first time, it's been long since you had anything.\n    \nElizabeth speaks up again, \"So, I assume you are here for Richard. I know him well, I can call him here if you wish.\"\n*choice\n    #Yes\n        Elizabeth leaves the table and climbs up the stairs. You see her return in a few minutes with a man by her side.\n        *goto richardtable\n    #No, wish to speak to him alone\n        \"That's fine too, I will let him know you are here.\" Elizabeth leaves the table and climbs up the stairs. You see her return in a few minutes. \"He is waiting for you upstairs. I told him you are my friend, I hope you don't misbehave.\"\n        *goto richard\n*label bard\nYou go up to them but see that they are too busy to pay you any mind so you decide not to disturb the atmosphere.\n*goto inn\n*label richardtable\nYou see the man as he comes closer to the table. Blue and white robes hide his frail and old body. His hair, parted down the middle, reveals his brown eyes. They look so sad, so much pain in them. He extends his arm and you shake hands. You can feel his hands tremor.\n\nWhen he speaks, the voice, it is as though it comes from the depths of the earth. \"I believe you wanted to meet me, child?\"\n*choice\n    #Ask for the ring right away\n        \"Elizabeth, child, you bring me here to meet with your so called friend and the first thing I hear is another request about my ring.\"\n        *line_break\n        \"I am sorry, Richard. I didn't know they were going to ask for it. We have just met.\"\n        *line_break\n        \"Okay, child, I trust this isn't your fault. I also trust your judgment of other people so I will listen to them.\"\n        *goto richardq\n    #Talk to him first\n        *goto richardq\n*label richard\nYou go up the stairs to see one of the doors on this floor already open. You step through to see a man expectantly waiting. Blue and white robes hide his frail and old body. His hair, parted down the middle, reveals his brown eyes. They look so sad, so much pain in them. He extends his arm and you shake hands. You can feel his hands tremor.\n\nWhen he speaks, the voice, it is as though it comes from the depths of the earth. \"I believe you wanted to meet me, child?\" You can still hear the muffled sounds of the drums coming from downstairs.\n*choice\n    #Ask for the ring right away\n        \"Normally this would be the time I kick you out of my room while you try to forcefully take my ring from me, but I will listen to why you want it this time. I know the path you took to come here and I trust the people that let you in here.\"\n        *goto richardq\n    #Talk to him first\n        *goto richardq\n*label richardq\n\nWhat do you say?\n*choice\n    *disable_reuse #Ask who he really is\n        \"I am Richard, you know as much. I am the first person to ever come into this place from the real world. People see me as their leader since I know more than anyone. I have mastered the ways of this place. It took a toll on me but I have people who are trustworthy enough to take my place when I am gone. I have seen too many people suffer. I watched hundreds fail to cross the paths and either transform into mad creatures or die. I keep their memories with me always, just in spite. This place will not destroy them. As long as I remember them, they still live.\"\n        *set sanity -2\n        *goto richardq\n    *disable_reuse #Ask if he ever tried to escape\n        \"Of course I did, child. Who wouldn't try to escape this place after being here longer than an hour. There is no escape. None.\"\n        *goto richardq\n    *disable_reuse #Ask about this building and the paths\n        \"Soon after I realized that there is no escape, I made this place so others like me could take refuge here. The paths keep the corrupted away so that we are undisturbed. Although all three of them suffer a great deal, they must do it if we are to be protected.\"\n        *goto richardq\n    *disable_reuse #Ask about Him\n        \"I can't talk about Him, child. If I do, He will listen to us and try to claw into our minds. Trust me when I say you don't need to know anything about him.\"\n        *set sanity +5\n        *goto richardq\n    *disable_reuse #Ask how people here can stay normal\n        \"As long as we have each other, we will never lose to the madness this world brings. Everyone who comes here is a person that seeks knowledge so there hasn't been a single day a conversation was stale. When you give up trying to escape like everyone else, if you can still cross the paths, you are more than welcome to stay with us.\"\n        *set sanity +4\n        *goto richardq\n    #Tell him the ring is stolen and you wish to return it\n        \"This ring is not stolen, my child. It is just a simple ring. It is the only memory I have left of my wife and so He tricks people into taking it away from me. He doesn't want me to keep being here but you have come a long way and you bear the mark of the chosen. There truly is a chance you get out. I will give it to you but heed my words. If you fail your quest, you have to bring it back to me. Go now, you can't stay here for longer.\n        *goto tavernioggi\n    #Tell him you need the ring to escape\n        \"This ring will not help you, my child. It is just a simple ring. The only memory I have left of my wife and so He tricks people into taking it away from me. He doesn't want me to keep being here but you have come a long way and you bear the mark of the chosen. There truly is a chance you get out. I will give it to you but heed my words. If you fail your quest, you have to bring it back to me. Go now, you can't stay here for longer.\n        *goto tavernioggi\n*label tavernioggi\nRichard doesn't speak any other words while he leads you outside. Soon you are out and next to Henry\n*if cultist\n    and Loretta\nagain.\n*if cultist\n    Loretta takes the ring from you and lets out a sigh of relief.\n    \n    \"Thank you, chosen one. You gain my unending trust. I owe my life to you.\"\n    \nYou start walking towards the third tower.\n*if not (cultist)\n    You see the person that asked for the ring again. They step closer to you as you give them the ring.\n    \n    \"Thank you, chosen one. You gain my unending gratitude. I owe my life to you. I will bless the ground you walk on. Good luck.\"\n    \n    You continue to walk.\n*goto taioggi\n*label saving\n*achieve cultist\nYou see them taken aback by the order of words you just spoke.\n\n\"You are the one? Does my mind deceive me because of my old age or are you actually the one? I will indeed come with you if that is what you really ask. There is still the tiniest part in me who can walk the path of the chosen. I will help us move unnoticed if I can. My human name is Loretta. I can't let any of us continue without having my ring either way. You have to bring it back to me. It's this way.\"\n\nThey take the lead and start walking.\n*set cultist true\n*goto quest\n*label taioggi\n*if wolves\n    *if cultist\n        \"We do not trust Loretta.\", \n        *line_break\n    \"We will be waiting outside for your call. If you need help you only need to speak the word. Iunis. We do not give our true name lightly, ${name}. We will not be pleasant if you use it without care. Good luck, even though you don't seem to need it.\"\n*if alive\n    *if cultist\n        ${companion} comes close to you and whispers in your ear.\n    \n        \"I will keep an eye on Loretta. I don't trust them. You shouldn't either.\"\n\nYou step inside the tower and light up your lantern again. The heat emanating from the iron interior warms your face. There are words on the walls. Written with what seems to be white paint so it's very visible. You get closer to read them and you see the words shift around. You can't believe what you are seeing for a second but it's real and it says \"Do not go further.\" You look at them from a different angle as they seem to shift around again to form a new sentence. \"There is no way out.\" They do it again. \"Death is the only freedom here.\"\n\nDo you say anything?\n*fake_choice\n    #Who are you?\n        A new sentence forms. \"I am you, ${name}. I shouldn't have done it.\"\n        *set sanity -4\n    #How is this happening?\n        A new sentence forms. \"You see me because you want to, ${name}.\"\n        *set sanity -2\n\nHenry pats you on the shoulder.\n\n\"We can't just stand here. There is nothing but this thing trying to feed on your mind.\"\n\nYou start climbing the stairs. You feel heavier with each step. Your legs become weak but you push through. After a while you realize that the walls and the steps have become stone. It's unsettling that you didn't realize when exactly they changed. Soon you are not on the spiral stairs anymore. You are still going up but it's straight. The walls around you fade away into darkness. You touch them to see if they are still there and yes they are but they are invisible. Your lantern flickers out so you throw it away and hear it tumble down the stairs. You are in pitch black now. You can't see anything but you keep climbing the stairs. You get the feeling that you are far from the tower.\n*if alive\n    \n    \"What is happening? I don't like where this is going.\" says ${companion}, then Henry speaks up.\n    \n    \"Whatever happens, do not forget that this place is not normal. It will try everything to keep you away from the top. Trust each other.\"\n    \n    *if (trust > 79)\n        You feel ${companion} grab the back of your clothes as you keep climbing.\n        *fake_choice\n            #Hold ${hers} hand instead\n                *set trust +10\n                *set sanity +4\n            #Keep climbing\n*if cultist\n    \n    Loretta speaks up.\n    \n    \"Do not fear anything, I do not remember the time I went through this place but there is nothing to worry about. You can rely on me. I will try to make it easier but brace yourselves for anything to happen.\"\n    \n    Henry answers.\n    \n    \"Anything to happen? Thank you Loretta that's very helpful. Why didn't I think of this? Anything to happen. You just saved our lives and I don't know how I can ever repay you.\"\n    *set sanity +4\n    \n*if death\n    \n    You smell blood. You don't know how you can do it but you pick the scent so easily. You know this scent. It's ${companion}.\n    *set sanity -10\n\nYou continue climbing and with each step, you look back to your life. The good moments you had. The bad ones. The friends you made.\n*if (sanity \u003c 71)\n    You are content with the way you lived your life. You wouldn't regret anything if you were to die right now, which seems highly probable. You remember the time you were in an awkward situation years ago and immediately stop feeling good about yourself. You drift off to all the other times you wish you hadn't done something or said the things you said. Your life sucked. You can't believe how you could mess everything up this much. How can you be this stupid? At least death will stop your existence and free you from the weight of your past actions. You accept it. You accept death. You are ready for whatever to happen now.\n    *set sanity -10\n*if (sanity > 70)\n    Your thoughts drift off to all the times you regretted having done the things you had done but you realize that even those moments helped you become you. Every mistake you made gave you experience to be a better person. You are content with the way you lived your life and you want to keep living no matter what. This place can't break your will. You are going to get out of here and continue living your life to the fullest. You are ready for whatever to happen now. You will overcome anything and leave here safely.\n    *set sanity +2\n*page_break\n\nYou keep on climbing and as you blink, you find yourself in a room. It's a small room lit with lanterns on the walls. There are no doors or windows. No air coming in or out. You realize that you are standing on something and as you look down you see dozens of bodies, some new, some very old, scattered around on piles and you standing on one of them. You try to take a step back so that you are not on it anymore but there isn't a place not occupied by someone's corpse. You run around the walls and hit them with the inside of your palm to find a way out but no, you are trapped here. You look at the bodies even if you don't want to. The shock of the situation slowly leaves your, now tired, body and the smell of decay clawing its way through your nose makes you nauseous. You recognize the clothes on one of the bodies that you can't see the face of. It looks like one of the newer ones. You go towards it and turn its face up to find out that it belongs to someone you know, just as you feared.\n*page_break It Can't Be\nYou rub your eyes to make sure you are not just imagining this and when you open them back again, you are in a different place. Not in a room or on stairs but in what seems to be a stone pit. It's narrow to a point where it's hard for you to even shift around and the walls are too smooth to climb out. You look up to see that you are in some sort of a wooden room. You see figures at the edge out of the pit holding candles to chase away the shadows around, looking at you and laughing at themselves with their hands lightly covering their mouths like they don't want you to see but at the same time they do. There are three of them. One points at you and whispers something that you can't hear clearly to the other ones and they keep laughing. You feel their eyes judging you, despising you. You can tell that you disgust them. They wish you weren't alive. They wish that you never existed. One of them, an old woman's voice says \"Just look at that face.\" and they all silently laugh again. \"I can't imagine myself doing the things this creature did.\" says an old man's voice, almost being unable to finish the sentence as his audible disgust strangles his words.\n\nWhat do you do?\n*fake_choice\n    #Ignore them\n        They keep going and you are stuck here. Maybe forever.\n    #Tell them to stop\n        It seems like they don't even hear you or they ignore you too well. They keep going and you are stuck here. Maybe forever.\nThe third figure speaks, ${she} says \"Is this thing even human?\" as one of them steps away from the pit you are in, out of your sight. You hear the sounds of retching and vomit splattering on the ground. You make them sick. They wish you weren't this gruesome. You wish you weren't this gruesome. You fall into the spiraling hopelessness of hatred towards yourself. You think about freeing yourself from the dreadful weight of being alive but you can't even accomplish that, being in the position you are. You never could do anything you wanted anyway. Why are you even wasting the space that someone else could use. No matter how strong you try to be, it doesn't help. You feel the beads of tears touching your cheeks. You can't even cry properly.\n*page_break Despair\nYou are in a different place now but you are not actually here. You are watching someone, much like remembering a memory that isn't yours. It's an older man, maybe in his fifties, you can't focus on the details too much. He is in front of the tower that you are inside of right now. Shouting at it with the expression that he knows someone is listening.\n\n\"No. We had a deal. You can't do this to me. I gave you everything you wanted. I brought enough people for you to live for centuries. It's the only thing I ask for. Just stay away from ${surname} bloodline.\"\n\nYou then hear words that you can't understand but feel oddly familiar with in a voice that's the calmest one you ever heard in your life and then the man speaks again.\n\n\"Okay, I accept. Anything to keep my families away from this.\"\n\nThe man steps inside the tower and vanishes. A moment passes and you hear him scream in terror. You can't even imagine what happened inside. Your vision suddenly blurs and clears back again but in another place. It looks like some sort of a room. In seconds you realize that this is your house. You see yourself sleeping in your bed but you also see a shadowy figure, standing at the corner of the room. It's too dark to make out what or who it is. It's not making a sound, not moving, watching your sleeping body with great interest.\n\nYou find yourself back on the stairs again. You find yourself in front of a door. It's the only visible thing between all the darkness. It is the riddle door. You look at the words to see what it is this time but there are no words that can be spoken in human tongue. Just letters next to each other with the occasional apostrophe. Moments pass as you try to make sense of it all and the door just opens itself.\n*page_break Step Inside\nYou find yourself entranced by the sight you see inside. You take very slow steps closer to it. The room is lit with candles on the ground that emit light bloodier than usual. You hear the muffled, monotonous piping of demoniac flutes ringing from inside your head but having a hard time reaching your ears at the same time. Around the candles, that seem to be put in carefully picked positions, on some sort of a sign on the ground that is drawn with a black liquid which smells like boiling blood are about a dozen humanoid figures. As tall as six year olds but they are clearly not human. Robes that are darker than the shadows around cover their bodies where, in some places, you can see eyes embedded in their skin peeking through, almost trying to breathe. There are old sacks over their heads, covering their faces. They have their hands linked as they spin around in a circle, dancing to the blasphemous flutes that do not follow any recognizable pattern. They finally notice you and all stop to turn directly at you.\n*finish Silence", "the_letter": "*temp cat false\n*temp cat_name \"\"\n*set fullname (name&\" \")&surname\nYou wake up to the sun hitting your face through the curtains of your small wooden house. You start getting ready for work. It's somewhat uneventful for you between your bed and your desk but you like the peace of predictability in your life. You get some coffee, have a quick breakfast and head out.\n*page_break\nIt's raining again. Well it doesn't really matter since you are well used to it and the library you work at is not that far either.\n*fake_choice\n    #Enjoy the rain\n        *set sanity +2\n        *if end\n            *set sanity -2\n    #Walk quickly\n    #Go back and get your umbrella\n        *set sanity -2\n        *if end\n            *set sanity +2\n    *selectable_if (end) #Change your mind\n        *goto_scene the_end finalchoice\nYou start heading towards the library, the sound of rain hitting the pavement is soothing. You see all kinds of people going about their businesses. Couples holding hands, looking up to the sky and letting the rain hit their faces. A man in a suit with a briefcase in his hand walking very quickly, almost like he is being chased. You see your friend Arthur who works at a small café wave at you as you go by.\n*page_break\nYou soon arrive at the library, its a big building and it has been there for decades. Just as you are about to enter, you hear something unusual.\n*choice\n    #Look for the source of the sound\n        *set sanity +2\n        *if end\n            *set sanity -2\n        *goto cat\n    #Ignore it\n        *set sanity -2\n        *if end\n            *set sanity +2\n        You decide to ignore it and go inside.\n        *goto emma_two\n    *selectable_if (end) #Change your mind\n        *goto_scene the_end finalchoice\n*label cat\nYou look around and soon realize that it is a small kitten meowing. Seems like its a stray cat and doesn't have a collar around its neck. It's wet from the rain and doesn't look like its going to stop meowing any time soon.\n*choice\n    #Take it inside\n        *set sanity +5\n        *set cat true\n        *if end\n            *set sanity -5\n        *goto library\n    #Ignore it and go inside\n        *set sanity -5\n        You decide to ignore it and go inside.\n        *page_break\n        *if end\n            *set sanity +5\n        *goto emma_two\n*label library\n*if (cat = true)\n    You pick the kitten up and bring it inside with you. There are already a few people in the library reading books, you hope the kitten doesn't make any more sounds. Would you like to name the kitten?\n    *choice\n        #Yes\n            *input_text cat_name\n            *set sanity +2\n            *if end\n                *set sanity -2\n            *goto kitten\n        #No\n            *set cat_name \"the kitten\"\n            *set sanity -2\n            *if end\n                *set sanity +2\n            *goto emma\n*label kitten\n${cat_name} is a great name for it.\n*page_break\n*goto emma\n*label emma\nEmma, the only other person who helps keep this library standing, gives you a weird look for a second after seeing ${cat_name} but then her lips curl into a warm smile. Emma always looks inviting with her long half-up crown braided hair and her shining blue eyes always looking to help people.\n*choice\n    #Smile back\n        *set sanity +2\n        You smile back, Emma turns back to her business.\n        *if end\n            *set sanity -2\n        *page_break\n        *goto book\n    #Try to stay out of Emma's sight\n        *set sanity -2\n        You quickly walk a little further away, it's better if you didn't put more attention on ${cat_name}.\n        *if end\n            *set sanity +2\n        *page_break\n        *goto book\n    #Throw ${cat_name} at Emma's face\n        *set sanity -10\n        *achieve hatred\n        You think about throwing ${cat_name} at her face but quickly decide not to. Why would you ever do such a thing?\n        *if end\n            But you think again and decide to go through with it. You throw ${cat_name} at her face and it scratches her in the eye. She falls on the ground and starts crying in pain, there is blood everywhere and it looks delicious.\n            *achieve mean\n            *set sanity +10\n        *page_break\n        *goto book\n*label emma_two\nEmma, the only other person who helps keep this library standing, gives you a warm and welcoming smile. Emma always looks inviting with her long brown half-up crown braided hair and her shining blue eyes always looking to help people.\n*fake_choice\n    #Smile back\n        *set sanity +2\n        You smile back, Emma turns back to her business.\n        *if end\n            *set sanity -2\n        *page_break\n    #Go up to her and punch her in the face\n        *set sanity -10\n        *achieve hatred\n        You imagine yourself going up to her and punching her right in the face but you decide not to do it. Why would you ever do such a thing?\n        *if end\n            But you think again and decide to go through with it. You punch her straight in the face. She falls on the ground and starts crying in pain, there is blood coming out of her mouth and it looks delicious.\n            *achieve mean\n            *set sanity +10\n        *page_break\n*goto book\n*label book\n*if (end = true)\n    You can't go on like this.\n    *page_break\n    *goto_scene the_end finalchoice\n*if (cat = true)\n    You quickly set up a small corner of the library for ${cat_name} to sleep and go back to the front desk.\n*if (cat = false)\n    You go to the front desk.\nToday is going to be quite easy since you are taking a day break from organizing the books, which you have been doing for a couple weeks with Emma now, so you decide to pick up a book yourself and start reading it. What genre of book do you choose?\n*fake_choice\n    #Horror\n        *set sanity -5\n        You pick up a random horror book and start reading it. First couple chapters tell you about a house that is a portal to a place beyond human understanding. Main character goes into it and the book describes things you could never have imagined yourself, touching on the fear of the unknown.\n    #Romance\n        *set sanity +2\n        You pick up a random romance book and start reading it. First couple chapters tell you about a man reminisce about the time he saw a woman when he was traveling the world to find himself. Although he never even went up to her, the man decides he has nothing to lose to go to the same place he saw the woman. The book describes the journey of the man traveling on horseback as he falls in love with a man before reaching his destination and is confused on what he is going to do next.\n    #Adventure\n        *set sanity +5\n        You pick up a random adventure book and start reading it. First couple chapters tell you about the main character finally breaking out of his slavery as a prop on a freak show because of how he looks, being half-lizard, finding out that there are more people like him while he is forced to hide in the shadows to stay safe. Eventually embracing himself and gaining the confidence to show the world he lives in that he is just another person like everyone else. The book describes the hardships of his journey and things he must do to gain peace.\n*page_break\n*goto calling\n*label calling\nThe day goes on, people come in and out as you continue reading your book. When it's soon time to close up and head back home, one more figure enters the library. It's a female figure in a long black wedding dress that completely covers her. You tilt your head to one side in confusion as this isn't something you see every day. Why would a bride come into a library and why is she walking so slow? Her golden hair hangs out of her veil and dances on her shoulders as she comes up to the desk. It's almost like as she comes closer to you, the sunlight dims. You suddenly feel like you have seen her before.\n\n\"Are you ${name}?\" she says in a very soft and calming voice,\n*line_break\n\"Excuse me, my vision is not the same.\"\n\nWhat do you say?\n*choice\n    #Yes, who are you?\n        \"It is me, do you not remember?\" she replies in the same tone, you are not sure if you saw her before.\n        *goto yes\n    #No I'm sorry you are mistaken.\n        \"I see, then could you please reach this letter to ${name}? I'm sure they will be here at one point in time.\"\n        *goto letter\n    #I'm sorry, have we met?\n        \"Yes, I'm quite sad that you don't remember me to be honest. Please take this letter, I don't have much time to hang around.\"\n        *goto letter\n*label yes\n\nWhat do you say?\n*fake_choice\n    #I feel like I know you but I'm not sure.\n        *set sanity -2\n        \"If you are not sure then it doesn't really matter, please take this letter.\" she replies.\n    #No I don't.\n        \"Oh, that is very saddening, please take this letter, I'm sure it will make sense.\"\n*goto letter\n*label letter\n\nShe puts a letter on the desk, this is the first time you see her hand, you are entranced on the sight of her smooth pale skin, it doesn't seem like she has seen much sunlight but it is beautiful. As she is reaching away, you almost feel an urge to hold her hand.\n*line_break\nYou look at the letter, it has a wax seal with the shape of a tree, it writes, \"to ${fullname}\", it's clearly addressed to you. You look back up to see her already gone. You didn't even see her face and you didn't recognize her voice but something about her scratches the back of your skull. You know her.\n\n\"Well, are you going to stand there the whole night or do you want to sleep in a bed tonight?\" says Emma, giving you a cheeky smile right as she leaves.\n*if (cat = true)\n    You should leave now but what do you do with ${cat_name}?\n    *fake_choice\n        #Take it home with you\n            *set sanity +5\n            You take it with you and leave the library, it seems happy.\n        #Leave it outside the library\n            *set sanity -2\n            You leave it outside the library but it still seems happy now that it's not raining anymore.\n        #Make a space for it to stay in the library\n            *set sanity -2\n            You make a little space that it can't leave, give enough milk for the night and head home.\n*goto home\n*label home\n*page_break\nYou start walking towards your house with the letter in your hand trying to remember if you have seen the seal before but you can't remember anything.\n*line_break\nYou try harder to see if you can remember the woman you saw in the library but as you try to reach into your mind, you can't recall what she sounded like. You heard her just minutes ago but it's almost like it was years ago and your memory is vague. You are sure you haven't seen the dress she was wearing before because it stands out quite a bit from what you normally see people wear so you would know if you had.\n\nYou walk on wet stone roads listening to your own footsteps, there are no other sounds around and it's not raining anymore so the air fills you with peace even though you are fighting with your brain to help you with what you are thinking.\n*line_break\nYou soon arrive home. You can't wait to read what the letter says.\n*page_break Open The Door\n*temp go1 \"Go to the place in your note\"\n*temp go2 \"Go to the place in your note\"\n*temp go3 \"Go to the place in your note\"\nYou close the door behind you. Everything in your house is the same as you left this morning. You sit on your little desk and put the letter in front of you, carefully open the envelope and pull out the letter inside it. It's a fairly shaky handwriting on a clean parchment and it reads:\n\n\"Dear ${name},\n\nThis most likely will sound very unbelievable for you but you must put great attention to what you read on this letter today and I know you would never be willing to desert a companion in peril.\n\nI am certain that you would not remember who I am even if I told you in great detail but you and I once did great things together. You helped me survive things that are in beyond my capabilities to describe or even understand and I did the same for you. If we are alive today, it is because we had each other before. I, however, could never forget the hideousness of that damned pit we were in and it drove me more mad the longer I stayed away from it. I knew I should have done the same thing as you did and forgot all of it but my hunger for otherworldly knowledge kept me from living a normal life like you probably have been for the past two years.\n\nBy the time this letter reaches you, I assume I will have been gone for three days. I do not think I can survive the things that dwell in there alone but I can not keep myself away from it any longer. That is why I need you to come help me once again. I know you probably have a lot of questions but I am ready to answer them all and make you remember the things that we laid our gazes upon. The way to reach this frightful place is buried underneath the tree right outside your house, or at least that is where you said you buried it to me just for the probability of a situation like this. I will be needing your help, friend.\"\n*page_break\nWithout even being able to process everything that is written in that letter, you quickly walk outside and look at the bottom of the tree right in front of your doorstep. You dig into the wet ground for a few seconds and find a small wooden box. You open it and see a piece of paper inside giving directions to a place. It has your own handwriting.\n\nIt is very late at night. What do you do?\n*choice\n    #Sleep the night and decide in the morning\n        *set sanity +2\n        You get back in and eventually fall asleep after a couple hours of your mind not letting you.\n        *page_break\n        *goto morning\n    #Immediately start walking towards the address\n        *set sanity -2\n        You get your coat and start walking. You now realize that more time has passed than you thought it did. It's not that far from morning.\n        *page_break\n        *goto walking\n*label morning\nYou wake up for the last time in the morning after countless times of waking up in the middle of the night for no reason. It's earlier than when you normally wake up but you are sure you can't go back to sleep this time. You can't find the courage to get out of your bed yet so you just sit cross-legged inside it.\n\nWhat are you thinking?\n*choice\n    #How would I forget these things?\n        How would you forget someone? It's not like you have such a bad memory. The letter pointed that you forgot things from two years ago. You can recall almost everything important that happened in the past three years because of how uneventful you made your life to be. You spend some time in the bed thinking and then you feel like it's time to decide where to go next.\n        *goto wanting\n    #Is this some sort of a prank?\n        You think all of this has to be some sort of a joke. Maybe the woman was one of your friends hiding herself and that's why you thought you recognized her. Someone you sent a letter to could forge a note with your handwriting and bury it under that tree. Everything seems reasonable now. You should decide where to go next.\n        *set sanity +2\n        *goto wanting\n    #Who was that woman?\n        *if ((((gender=\"male\")and (orientation=\"straight\")) or ((gender=\"female\") and (orientation=\"gay\"))) or ((orientation=\"bisexual\")))\n            Who was that woman? You can vividly remember the time you saw her now. Her voice was so beautiful. Her skin so smooth and pale. Her golden hair warming your heart. You want to find her and talk to her once more. Just once more. She could be the one you want to spend your life with. You would do anything to see her again. After some time you shake your head and wonder why you thought of her like this. You should decide where to go next.\n            *set sanity -5\n            *goto wanting\n        *else\n            Who was that woman? You still can't remember what her voice was like or if you had met her before. You try and try but nothing comes back to your mind. Why was she wearing a wedding dress? Why didn't she show her face to you? After some time you feel like it's time to decide where to go next.\n            *goto wanting\n    #Who wrote that letter?\n        Who wrote that letter to you? You look at all the other letters you got from your friends before to see if any of them match the handwriting of that one but no luck. They must know you since they knew about the wooden box underneath the tree. You think about thousands of people you saw coming in and out of the library in the past years but can't link anyone with that letter. You should decide where to go next.\n        *goto wanting\n    *selectable_if (sanity \u003c 60) #Should I kill Emma?\n        You think about the ways you could kill Emma and get away with it. You come up with enough ways to do it. If you decided to do it right now you would be able to. You have all the tools you need. You think right before closing up the library would be the perfect moment to do it. You feel confident enough on this topic, now you should decide where to go next.\n        *set sanity +2\n        *goto wanting\n*label wanting\n*page_break\nWhere will you go?\n*fake_choice\n    #Go to the place in your note\n    #${go1}\n    #${go2}\n    #${go3}\nYou decide that you should go to the place. That is the most reasonable thing to do. Why would you go anywhere else?\n*set sanity -4\n*page_break\n*goto walking\n*label walking\nYou start following the directions in the note. It's quite easy to do since you are the one who wrote it. The sun is just coming up. It's not raining today and you hear birds chirping. You see some people walking their dogs. Some shops just getting ready to open up for the day. An old man selling newspapers and yelling about a collapsed mine. It's going to take about two hours to reach this place and as time goes on you find out that it's taking you somewhere in the woods. You feel your mind ease thanks to the morning air and the walk.\n*set sanity +5\n*page_break\nEventually you reach the woods, it's pretty thick so the sunlight has a hard time reaching through all the trees to touch your face. You look at the note again and find where it was pointing after twenty minutes or so. You find yourself in a small clearing after walking south fifteen steps of the eighteen from the big hollowed tree and see the red wildflowers as the note tells you. Further following it, you pluck the grass where the flowers are and soon you find a hole on the ground going down. It's a pretty big hole that descends down gradually rather than being a hard drop. The earth inside and around the hole is very smooth, it's almost like a gigantic worm went under the ground from this very point.\n*goto cycle\n*label cycle\n\nWhat do you do?\n*choice\n    #Go inside\n        You take a deep breath and start walking down.\n        *finish Into The Pit\n    #Come back later more prepared\n        You turn around and start walking back the way you came.\n        *goto forest\n*label forest\nThere is no way you can go into that hole. The letter told you about some pit and it being hideous. Why would you follow some random letter and a note. Your life has been under your control for all your life and this is not the time to throw it away for something you don't even understand.\n*page_break\nYou spend about an hour walking back towards your house and find yourself in a small clearing after walking south fifteen steps of the eighteen from the big hollowed tree and see the red wildflowers as the note tells you. Further following it, it tells you to pluck the grass where the flowers are but it seems like someone has already done that. You see a pretty big hole that descends down gradually rather than being a hard drop. The earth inside and around the hole is very smooth, it's almost like a gigantic worm went under the ground from this very point.\n*set sanity -2\n*goto cycle", "the_past": "You wake up to the sun hitting your face through the curtains of your small wooden house. You start getting ready for work. You realize that you are younger than before, you wonder what year it is. The colors are dull and it's almost like you are dreaming but everything is so real that you are not sure if you were dreaming before and you woke up now or if it's the other way around. It's somewhat uneventful for you between your bed and your desk apart from the things you do with Henry. You get some coffee, have a quick breakfast and head out.\n*page_break\nIt's raining again. Well it doesn't really matter since you are well used to it and the library you work at is not that far either.\n*fake_choice\n    #Enjoy the rain\n        *set sanity +2\n    #Walk quickly\n    #Go back and get your umbrella\n        *set sanity -2\nYou start heading towards the library, the sound of rain hitting the pavement is soothing. You see all kinds of people going about their businesses. Couples holding hands, looking up to the sky and letting the rain hit their faces. A man in a suit with a briefcase in his hand walking very quickly, almost like he is being chased. You see your friend Arthur who works at a small café wave at you as you go by.\n*page_break\nYou soon arrive at the library, its a big building and it has been there for decades. Just as you are about to enter, you hear someone screaming for help. You turn around to see what is happening and you see a man in his late thirties. His long white hair falls over his face as he holds his head between his hands, panting on the ground. You step closer to see if everything is alright. He quickly gets up and puts his hands on your shoulders. You see his face now, a red scarf over which his white beard hangs down to his waist, his brown eyes staring into your soul through a dirty face. It's Henry.\n\n\"Are you real? How do I know you are real?\"\n\nWhat do you say?\n*fake_choice\n    #Answer calmly\n        \"Yes I am real, Henry, are you okay?\n    #Slap him to snap him out of it\n        You slap him lightly on the cheek to snap him out of whatever he is in.\n\n\"Okay, I need you to come with me. It can't wait any longer.\"\n*line_break\nYou know what he means so you let Emma know that you can't be working today.\n*line_break\n\"Alright but you owe me one, ${name}.\" she says giving you a playful smile.\n\nYou start walking and get there in about two hours. Henry lights his lantern as both of you take a deep breath and start walking into the pit. After what feels like hours of walking down, it finally becomes a straight ground rather than going further down. You go through a heavy wooden door that screams in agony as you open it. You are in your library again. Henry sits on the desk in the corner of the room and writes some things while occasionally checking his notes on the walls.\n\n\"We need to go in deeper, we need to know what is in there ${name}! No looking back this time. I am going in whether you stay or not.\"\n\nWhat do you say?\n*temp c1 \"Alright Henry, let's do this.\"\n*fake_choice\n    #Alright Henry, let's do this.\n    #${c1}\n\"I thought you would say that.\"\n\nYou start walking deeper into this place to find out what is going on. You step into what seems to be a corridor. You can't see the end of it. The weird walls claw at your brain again. You hear the same voice. It's omnipresent. It's like hundreds of people making noises at once to form sentences for you to hear but it's as loud as a whisper.\n\n\"Why don't you look behind you for a second. Just to make sure.\"\n\nHenry looks at you for a moment and then looks forward again.\n\nWhat do you do?\n*fake_choice\n    #Look behind you\n        You don't see anything other than darkness. Your lantern can't help you see much far. If there were someone hiding ten steps away from you, you wouldn't be able know.\n        *set sanity -15\n    #Don't look back\n        You hope Henry knows what he is doing this time and keep walking.\n        *set sanity +5\n\nYou eventually end up in front of another heavy wooden door. This time it has carvings on it. A snake going around it, humanoid figures at the bottom kneeling with their hands up and their faces down, ravens flying around, random shapes and figures being in some sort of pattern you can't put your finger on.\n\nAs you take your first step inside you hear footsteps from behind you. You feel like they are echoing from your library. You quickly get inside and try closing the door behind but it weirdly closes itself. You look around the room you just got into. It's a small round chamber that you can see all around. There is nothing other than another door at the other end which is only three steps away from the door you got in from. You see some words carved into the other door. You get closer to read it and you can hear the footsteps getting closer from the tunnel behind you.\n\nYou try to open the door but it won't budge. There is a realistically drawn ear on it and under it is a riddle.\n\n\"It looks like it is connected to a mechanism, ${name}. I think we need to say the answer into the ear carving for it to open up.\"\n*page_break\n*goto puzzle\n*label puzzle\n*temp pastdoor\n\"You can't see me\n*line_break\nYou cant feel me\n*line_break\nYou can't hear me\n*line_break\nYou can't smell me\n\nYet here I am\n*line_break\nIn front of you\n*line_break\nBehind you\n*line_break\nIf you close your eyes\n*line_break\nI will catch you\"\n\nWhat do you say?\n*input_text pastdoor\n*if (\"$!!{pastdoor}\" = \"DARKNESS\")\n    *goto correct\n*else\n    Nothing happens. You hear the footsteps get closer.\n    *line_break\n    \"I have no idea ${name}, you must do this.\" says Henry in a worried tone.\n    *set sanity -2\n    *page_break\n    Do you need a hint?\n    *choice\n        #No\n            *goto puzzle\n        #Yes\n            *goto riddlehint\n*label riddlehint\n*if (letter2 = 0)\n    You see eight carved squares appear on the door and the letter \"D\" inside the first one.\n    \n    *set letter2 +1\n    *goto puzzle\n*if (letter2 = 1)\n    A second letter appears and it reads “Da”\n    \n    *set letter2 +1\n    *goto puzzle\n*if (letter2 = 2)\n    A third letter appears and it reads “Dar”\n    \n    *set letter2 +1\n    *goto puzzle\n*if (letter2 = 3)\n    A fourth letter appears and it reads \"Dark\"\n    \n    *set letter2 +1\n    *goto puzzle\n*if (letter2 = 4)\n    A fifth letter appears and it reads \"Darkn\"\n    \n    *set letter2 +1\n    *goto puzzle\n*if (letter2 = 5)\n    A sixth letter appears and it reads \"Darnke\"\n    \n    *set letter2 +1\n    *goto puzzle\n*if (letter2 = 6)\n    A seventh letter appears and it reads \"Darnkes\"\n    \n    *set letter2 +1\n    *goto puzzle\n*if (letter2 = 7)\n    An eighth and final letter appears and it reads \"Darkness\"\n    \n    *set letter2 +1\n    *goto puzzle\n*if (letter2 = 8)\n    *goto correct\n*label correct\n*achieve riddlertwo\nYou hear a click from inside the door and it slowly creeks open.\n*page_break\nThe door closes behind you and you find yourself outside. The wind howls in excitement. You see the moon and the stars high above in the sky and darkness beyond your vision under you. It's like you are on the side of a mountain. There are old stone steps seemingly not attached to anything going up in front of you. If you took a wrong step you could fall down into the unknown.\n\n\"Okay this is enough, I don't think we can go any further, this place is messing with our minds. I need to go alone ${name}. I am sorry that I have to do this.\"\n\nHenry reaches into his pocket and takes out a dagger and points it towards you.\n\n\"Go back ${name}, You are too young for this. You can not handle the things we are about to see. The books ${name}, the books. Burn them and do the things I wrote in the note I gave you. Forget all of this happened. I know you can do it. I just needed your help with the door.\"\n\nHe pushes you back inside the door and you hear a click again. There are no words carved into the door anymore. You go back to your library again and read the notes of Henry for the last time. You start walking back up to the surface but you don't have a lantern so you are in pitch black.\n*finish Nothing Makes Sense", "the_pit": "You walk down for a few minutes and it becomes pitch black. You can't see anything. You put your hands on the wall and walk slower. After what feels like hours in this dark tunnel, it finally becomes a straight ground rather than going further down. You see a light flickering on the floor in the distance. You walk closer to it to find out that it's a heavy wooden door and the light is coming from the gap under it. It seems like there are lit lanterns inside. The door screams in agony as you open it.\n\nInside the room, walls are made out of stone. You see books illuminated by the light of the lanterns that are on the walls. a few bookshelves, a desk in the corner of the room with parchment and a quill in an ink pot. There are scribblings on the walls that make no sense at all. You skim through some of the books and it turns out that all of them share the similarity of being about the higher beings that ancient civilizations put their faith in. You see another door at the other end of the room and the moment you perceive it, you hear the door you just came from close in the same shriek. You run towards it to find out that it can't be opened from this side.\n\n*goto books\n*label books\nIs there any particular book you want to know more about?\n*choice\n    *disable_reuse #${companion}\n        You open this tome and flip through the pages but theres only one page that says anything. All the other pages have weird marks like someone scratched them with long nails. \"Do not trust ${her}.\" It says.\n        *set sanity -5\n        *page_break\n        *goto books\n    *disable_reuse #Omluitloth\n        You see a picture drawn before any information is given. It's a creature with the head of a raven and the body of a what looks like a giant worm with dozens of insect-like arms. The book tells about Omluitloth being worshiped as the god that feeds upon the soul of the children. At times when giving birth would be a more dangerous thing than it is today, they believed that Omluitloth would be the one to bring the death of a baby or a mother that loses her life during labor. The old families would give offerings to Omluitloth in forms of their blood so that his hunger would be sated and he would not bring misfortune upon their child.\n        *set sanity -5\n        *page_break\n        *goto books\n    *disable_reuse #Inithrhuh\n        You see a picture drawn before any information is given. It's a giant bloodshot eye with a diamond shaped pupil in the hands of a beautiful woman whose body is covered in sores. The book tells about Inithrhuh being worshiped as the god of disease and mother of all plagues. This old civilization that believed in her would eat meat that was rotten or drink water that was too polluted to drink twice a year to try and gain her favor and keep diseases away from themselves. It was believed that the elders of the group gained wisdom from eating the bodies of people that died from any form of disease.\n        *set sanity -5\n        *page_break\n        *goto books\n    *disable_reuse #Yaghoudreg\n        You see a picture drawn before any information is given. It's a bald man covered in blood and lash scars whose nose and tongue have been cut off. The book tells about Yaghoudreg being the god of resentment and vindication. People who secretly want the downfall of someone stronger than themselves would give offerings to Yaghoudreg in hopes that he would bring death upon them.\n        *set sanity -2\n        *page_break\n        *goto books\n    #No, try leaving the room\n        You pick up one of the lanterns off the wall and go through the other door.\n        *goto voice\n*label voice\nYou step into what seems to be a corridor. You can't see the end of it. You start walking and realize that the walls of this corridor look weird. You get closer to them, it looks as though this place was a block of stone and millions of small human hands clawed into it to make this tunnel. You take a step back and continue walking down the tunnel. As you are walking down, you hear a voice. You can't tell where it's coming from. It's omnipresent. It's like hundreds of people making noises at once to form sentences for you to hear but it's as loud as a whisper.\n\n\"Why don't you look behind you for a second. Just to make sure.\"\n\nWhat do you do?\n*fake_choice\n    #Look behind you\n        You don't see anything other than darkness. Your lantern can't help you see much far. If there were someone hiding ten steps away from you, you wouldn't be able know.\n        *set sanity -5\n    #Keep walking down\n        You have read enough horror books to know not to look behind. You keep walking down.\n        *set sanity +5\n*page_break\nYou eventually end up in front of another heavy wooden door. This time it has carvings on it. A snake going around it, humanoid figures at the bottom kneeling with their hands up and their faces down, ravens flying around, random shapes and figures being in some sort of pattern you can't put your finger on.\n\nAs you take your first step inside you hear footsteps from behind you. You feel like they are echoing from the room with the books in it. You quickly get inside and try closing the door behind but same as before it weirdly closes itself. At least whatever is out there can't come in. You turn back around to look around the room you just got into. It's a small round chamber that you can see all around. There is nothing other than another door at the other end which is only three steps away from the door you got in from. You see some words carved into the other door. You get closer to read it and you can hear the footsteps getting closer from the tunnel behind you.\n\nYou try to open the door but it won't budge. There is a realistically drawn ear on it and under it is a riddle.\n*page_break\n*goto puzzle\n*label puzzle\n*temp answer\n\"I come slowly\n*line_break\nYou can't stop me\n*line_break\nThe more you think\n*line_break\nThe more you worry\n\nYou can try to hide\n*line_break\nYou can try to cheat\n*line_break\nBut it doesn't matter\n*line_break\nIn the end we'll meet\"\n\nWhat do you say?\n*input_text answer\n*if (\"$!!{answer}\" = \"DEATH\")\n    *goto correct\n*else\n    Nothing happens. You hear the footsteps get closer.\n    *set sanity -2\n    *page_break\n    Do you need a hint?\n    *choice\n        #No\n            *goto puzzle\n        #Yes\n            *goto riddlehint\n*label riddlehint\n*if (letter1 = 0)\n    You see five carved squares appear on the door and the letter \"D\" inside the first one.\n    \n    *set letter1 +1\n    *goto puzzle\n*if (letter1 = 1)\n    A second letter appears and it reads “De”\n    \n    *set letter1 +1\n    *goto puzzle\n*if (letter1 = 2)\n    A third letter appears and it reads “Dea”\n    \n    *set letter1 +1\n    *goto puzzle\n*if (letter1 = 3)\n    A fourth letter appears and it reads \"Deat\"\n    \n    *set letter1 +1\n    *goto puzzle\n*if (letter1 = 4)\n    A fifth and final letter appears and it reads \"Death\"\n    \n    *set letter1 +1\n    *goto puzzle\n*if (letter1 = 5)\n    *goto correct\n*label correct\n*achieve riddler\nYou hear a click from inside the door and it slowly opens.\n*page_break\nThe door closes behind you and you find yourself outside. The wind howls in excitement. You see the moon and the stars high above in the sky and darkness beyond your vision under you. It's like you are on the side of a mountain. There are old stone steps seemingly not attached to anything going up in front of you. If you took a wrong step you could fall down into the unknown.\n*line_break\nYou start slowly climbing the steps, as you do, you find yourself descending. The moon is further away and the door you just came from is behind and above you. You are just climbing the stairs but you are going down. You keep going for a few minutes and as you look behind, you realize that the steps you just took are spiraling. You haven't felt or seen them change before. You look up to the door you came from and see a figure. It's you, looking around. You raise your hand to see if it's some sort of a mirror and the figure raises its hand too but you are sure that it's not just a reflection. You turn back around and see that you are back where you started. When you look up to where you just were, you see yourself in confusion but this time it doesn't mirror what you do. The other you jumps down and you hear your scream slowly disappear. It's horrifying.\n\nYou are at where you just came into this place but this time you can see clearer. The steps twist and bend in ways that are not possible. You see floating creatures that are so slow that you don't understand how they do it. The creatures look like crows but have one single eye at the size of their heads where their actual heads should be and two small squid tentacles where their feet should be. They are not flapping their wings but are still in the air. When they blink you feel like throwing up.\n*page_break\nYou start climbing the steps once again, trying to not look at the horrid creatures. After a while you hear things. They are coming from the creatures floating around when they don't even have mouths. Whispers. Words. Questions.\n\n\"Yes.\", \"Intriguing.\", \"What a creature!\", \"I wonder what's inside it.\"\n\nIt's as though little children that are too young to be able to speak screaming and whispering at the same time.\n\nWhat do you do?\n*fake_choice\n    #Scream at them\n        You scream at the top of your lungs but no sound comes out. The creatures simultaneously twitch and snap their heads towards you. You freeze in fear for a second but it doesn't seem like anything else happens.\n        *set sanity -2\n    #Ignore them and keep climbing\n        You ignore them and keep climbing. If you pretend like you still can't see them maybe they will leave.\n        *set sanity +5\n    #Mimic them\n        You mimic what they said with the best impression you can do and see their bodies twitch randomly. You are not familiar with these creatures to know what that means but it looks like you are safe.\n        *set sanity +2\n    *selectable_if (sanity > 69) #Look closer\n        You look closer to them and realize that when you do so, they are not real. You can even see through them. You don't know how they appear so real but you feel safer knowing that they can't harm you.\n        *set sanity +2\n*page_break\nEventually you climb at the top of the stairs which opens up to a room through an archway. You are too afraid to look back so you just continue.\n\nNow you are in a room with a badly made wooden table, a chair and a lantern on the wall. There are parchments on the table. You start looking at one of the parchments and realize that it's a diary of some sort.\n\n\"This is day 17, I think. Can't really tell since there is no day and night cycle down here. I got used to eating them but it still feels weird. The voices didn't stop. If I hear the…\"\n*page_break\n*if (companion = \"Anna\")\n    \"Do not move. Who are you?\" says a woman's voice. You feel something sharp at the back of your neck as you drop the papers back on the table.\n    *goto comp\n*else\n    *set her \"him\"\n    *set she \"he\"\n    *set hers \"his\"\n    \"Do not move. Who are you?\" says a man's voice. You feel something sharp at the back of your neck as you drop the papers back on the table.\n    *goto comp\n*label comp\n\nWhat do you do?\n*choice\n    #Answer ${her} peacefully\n        \"I am ${name}, ${fullname}. I am not here to harm you. I am just trying to get out.\"\n        *set trust +4\n        *goto compact\n    #Answer ${her} angrily\n        \"I am ${name} and if you do not let me free right now you will be very sorry.\"\n        *set trust -2\n        *goto compact\n    *disable_reuse #Run away\n        You slightly move but immediately feel the knife push deeper into your neck. It stops seeming like a good idea.\n        *set trust -2\n        *page_break\n        *goto comp\n    *disable_reuse #Scream for help\n        You scream but there is no one else to hear you do it. It also sounds like ${she} is getting impatient.\n        *set trust -2\n        *goto comp\n*label compact\n\"Okay, at least you are human. My name is ${companion}. If you are really trying to get out of here, I am doing the same, we could work together.\"\n\n*if (companion = \"Anna\")\n    She lets you free of her hold and you turn around. She is a woman about your age, has blood red hair and bright bright green eyes. Her clothes are tattered and dirty. She looks to be in shape with survival gear attached to her belt.\n    *goto killing\n*else\n    He lets you free of his hold and you turn around. He is a man about your age, has long light brown hair and bright blue eyes. His clothes are tattered and dirty. He looks to be in shape with survival gear attached to his belt.\n    *goto killing\n*label killing\n\nWhat do you do?\n*choice\n    #Tell ${companion} that you will join ${her}\n        \"Okay fine, I don't like being alone in this place anyway.\" you say as ${she} starts walking towards the door at the other end of the room with you.\n        *goto labyrinth\n    #Tell ${companion} that you will go alone\n        \"No thank you, I will go alone.\" you say as you continue to the other end of the room and open a door. ${companion} shouts from behind you.\n        \n        \"Are you sure? I don't think you can survive alone\"\n        *choice\n            #Yes, I am sure.\n                *set alive false\n                *goto labyrinth\n            #No, you are right let's go together.\n                \"Smart choice, I need help as much as you do.\" ${she} says as you open the door and continue.\n                *goto labyrinth\n    *selectable_if (sanity \u003c 60) #Take ${hers} knife and kill ${her} with it\n        You take ${hers} knife with inhuman speed and start stabbing ${her}. There is blood everywhere. You hear ${hers} screams and it soothes you. You look ${her} in the eye as life leaves ${hers} body. You feel as though you steal it for yourself. You feel much better.\n        \n        Do you feel any remorse?\n        *choice\n            #No, continue\n                *achieve murderer\n                *set sanity -10\n                *set alive false\n                *goto labyrinth\n            #Yes, I didn't want this to happen\n                *goto killing\n        \n*label labyrinth\nYou start walking through a tunnel with stone walls. After some time you find yourself in front of two different paths to take. The tunnel continues to your left or to your right. There doesn't seem to be any difference at all on the two paths.\n\n*if alive\n    *achieve companion\n    \"Well, which path would you like to take? I've been trying to get out of this place for weeks. There is going to be two paths to choose from every five minutes we travel and when we walk back for five minutes we will return to the room however long we traveled. I've tried a lot of combinations but none of them worked. Why don't you do the choosing this time?\" says ${companion}.\n    \nWhere do you go?\n*fake_choice\n    #Left\n    #Right\n*if alive\n    \"So where did you come from?\"\n    *fake_choice\n        #Tell ${her} the truth\n            You tell ${her} about the woman, the letter and the wooden box.\n            *set trust +6\n        #Make something up\n            You tell ${her} that you were out on a walk in the forest and stumbled on a hole. It seems like ${she} believes you.\n            *set trust -4\n    \"I found a letter and directions to this place on my desk when I woke up and curiosity got the best of me\"\n\nFive minutes later you find yourself in front of another fork. You see the tunnel get narrower.\n*fake_choice\n    #Right\n    #Left\n*if alive\n    \"Do you see those?\" ${she} points at the wall that has faintly glowing blue mushrooms growing through the cracks.\n    *line_break\n    \"This is the first time I'm seeing them and I've been here before. This is either very good or very bad.\"\n*if not (alive)\n    You continue for a few steps and then see faintly glowing blue mushrooms growing through the cracks of the walls around you.\n    *fake_choice\n        #Eat one\n            You grab one and eat it, it tastes rather good actually.\n            *set sanity -5\n        #Ignore and continue\n            You don't know if it's poisonous o
