<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dead Already? — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "deadalready", "title": "Dead Already?", "scenes": {"choicescript_description": "Life is not fair, neither is this game. Another short murder mystery for you to solve following ChoiceScript multiple-choice text-based format. The murderer is randomly selected at the beginning of each game for a greater challenge.\n\n[i]Dead Already?[/i] is a 7,000-word interactive novel by Kie Brooks. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "These are your statistics!\n\n*stat_chart\n\tpercent recall Recall\n\tpercent strength Power\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  ADVERTISING\n  \n  Remove advertisements.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n  *goto purchased_list\n*elseif choice_restore_purchases_allowed\n  RESTORE TRANSACTIONS\n  \n  If you've made purchases on another device, click here to transfer and restore your purchases on this device.\n  \n  *restore_purchases start\n\n*label purchased_list\n\n*if choice_purchased_adfree\n  ADVERTISING\n  \n  You've paid to remove advertisements.\n", "dead_already_begins.choice": "*reset", "dead_already_intro.choice": "*reset", "dead_already_plan.choice": "*comment Copyright 2011 by Kie Brooks\n*disable_reuse\n\n*temp murderer_guess\n*set murderer_guess \"\"\n*temp murderer_guess_full\n*set murderer_guess_full \"\"\n\nSo you figure that you know enough of your past to have a stab at finding out how you died.\n\nHow did you die? Who is the murderer? Here you can review suspects (but only once).\n*label label_suspects\nThe suspects are:\n*fake_choice\n\t#The lawyer.\n\t\tDid the lawyer work in collusion with your wife? Or did he just want you out of the scene.\n\n\t#Your widow.\n\t\tDid your wife murder you for the insurance money?\n\n\t#Your old girlfriend.\n\t\tDid your girlfriend murder you in a fit of jealousy?\n\n\t#Your old boss.\n\t\tDid your old boss murder you to claim your work as his own? Or was he paid by the corporation?\n\n\t#The detective.\n\t\tDid the detective murder you so that your girlfriend would look to him instead?\n\n\t#The corporation.\n\t\tDid the corporation murder you because of your work?\n\n\t#Your old colleague.\n\t\tDid your colleague murder you for better promotional prospects? Or was he paid by the corporation?\n\n\t#The man in the gorilla-suit.\n\t\tDid the man in the gorilla-suit murder you because of professional rivalry?\n\n\t#It was an accident.\n\t\tWas your death merely an accident?\n\n\t*allow_reuse #The butler.\n\t\tIt's always the butler! Hold on a second there is no butler in this game.\n\n\n*label after_suspects\n\nPick the person you feel is the most likely culprit and use your remaining strength to try to draw out some clues and get your revenge.\n\n*choice\n\t*allow_reuse #Review the list of suspects.\n\t\tBack to the line up.\n\t\t*goto label_suspects\n\t*if (strength > 25)\n\t\t*allow_reuse #Pick one of the suspects to investigate.\n\t\t\t*goto suspect_testing\n\t#Take revenge.\n\t\t*goto label_revenge\n\n\n*label suspect_testing\n\nYour current strength is ${strength}.\nYou feel strong enough to interact with the suspects but every time you do it will drain your strength.\n*set strength -25\n\n*choice\n\t#The lawyer.\n\t\tYou find the lawyer in his offices looking over various legal documents.\n\t\tHe receives a call on his mobile. He checks the caller and having seen that it is your wife, he begins to look harried.\n\n\t\tYou would like to say something to the lawyer but you are unable to get a word in over your wife (or more accurately your widow);\n\t\tneither for that matter is the lawyer.\n\n\t\t*if (murderer = \"lawyer\")\n\t\t\tAt the end of the unpleasant telephone harassment the lawyer hangs up with a sigh.\n\t\t\t\"Aargh, why did I do it?\", he cries. You wonder if he is speaking of murder.\n\t\t\t*goto after_suspects\n\t\t*else\n\t\t\tAt the end of the unpleasant telephone harassment the lawyer hangs up with a sigh.\n\t\t\t\"Life was so much more pleasant when your husband was still alive\", he whimpers.\n\t\t\tYou do not think that the lawyer was responsible for your death.\n\t\t\t*goto after_suspects\n\n\t#Your widow.\n\t\t*comment You find your widow lying in the bedroom painting her toenails, much richer from the insurance money now that you are deceased.\n\t\tYou find your widow lying in the bedroom painting her toenails.\n\n\t\tYou whisper in her ear, \"do you miss me?\".\n\n\t\t*if (murderer = \"wife\")\n\t\t\tHer eyes widen and she turns pale. She swallows and tries to speak.\n\t\t\t\"Oh darling, I'm so happy to hear your voice\", she says in a strained voice.\n\t\t\tYou wonder if she had a hand in your murder.\n\t\t\t*goto after_suspects\n\t\t*else\n\t\t\tTears begin streaming down her eyes, she is obviously upset.\n\t\t\tYou are convinced that she was not involved in your untimely demise.\n\t\t\t*goto after_suspects\n\n\t#Your old girlfriend.\n\t\tYou find your old girlfriend back in her flat resting on the couch.\n\t\tYou whisper in her ear, \"I will be with you even from the grave\".\n\n\t\t*if (murderer = \"girlfriend\")\n\t\t\tShe turns a shade of white and trembling replies \"Errr, I miss you too\".\n\t\t\tIt does not seem sincere. You wonder if she had a hand in your murder.\n\t\t\t*goto after_suspects\n\t\t*else\n\t\t\tShe bursts into tears and you feel bad for upsetting her.\n\t\t\tYou feel convinced that she is innocent of any foul play.\n\t\t\t*goto after_suspects\n\n\t#The detective.\n\t\tYou find the detective sitting at a desk by the whiteboard in the police station.\n\t\tYou whisper in his ear, \"Who are you trying to pin the blame on?\".\n\n\t\t*if (murderer = \"detective\")\n\t\t\tThe detective seems to keep his composure but you can tell that he is shaken.\n\t\t\tIt is as if he accepts that someone knows that he did it.\n\t\t\t*goto after_suspects\n\t\t*else\n\t\t\tThe detective angrily retorts, \"I don't know who you are, but you have some nerve accusing me\".\n\t\t\tYou feel that it is not the response of a guilty man.\n\t\t\t*goto after_suspects\n\n\t#The corporation.\n\t\tYou look at the black tower that is the HQ of a mega-corporation.\n\t\tYou find your way back to the 37th floor and find the corporate men that were at your funeral.\n\n\t\tYou whisper, \"Even if you kill me, my code is licensed under the GPL, it can not be kept secret.\"\n\n\t\t*if (murderer = \"corporation\")\n\t\t\tThey look nervously at each other. One stammers, \"You can't tell the source from a binary file can you?\"\n\t\t\tThe other one says \"I don't know, I don't know\".\n\n\t\t\tHmmm, it seems they are not so innocent after all.\n\t\t\t*goto after_suspects\n\n\t\t*else\n\t\t\tYou see them look at each other and laugh. The code is already available for download from our web servers.\n\n\t\t\t\"Oops\", it seems they were doing the right thing after all.\n\t\t\t*goto after_suspects\n\n\t#Your old boss.\n\t\tYou find your old boss sitting at his desk playing solitaire. He seems deep in concentration.\n\n\t\tYou whisper in his ear, \"Project slick, was it really worth killing for?\".\n\n\t\t*if (murderer = \"boss\")\n\t\t\tHe gives a sly smile. \"Interesting, I didn't believe in ghosts... until now.\"\n\t\t\tIf you were not already dead, your are sure that you would feel a shiver down your spine.\n\t\t\t*goto after_suspects\n\t\t*else\n\t\t\tHis eyes grow wide, \"I never thought anything untoward would happen to you.\"\n\t\t\tHe seems frightened and regretful.  You think that he was unlikely to have been involved in your demise.\n\t\t\t*goto after_suspects\n\n\t#Your old colleague.\n\t\tYou find your old colleague, pulling his hair out at your place of work wondering why his screen has turned blue again.\n\t\tYou wonder, could he really have had anything to do with your murder.  Sometimes it is difficult to judge a book by its cover.\n\n\t\tYou will need to make this one extra geeky.\n\t\tYou whisper in his ear, \"Even if you kill me, my ghost lives on in this machine, you cannot get rid of me.\"\n\n\t\t*if (murderer = \"colleague\")\n\t\t\tYou see him turn a shade of white and starts shaking, \"But you are dead, I reformatted your drive, how can this be?\".\n\t\t\tHe has obviously not heard of network storage.\n\t\t\t*goto after_suspects\n\t\t*else\n\t\t\tHe looks puzzled, he picks up his mouse and tries to use it as a microphone.\n\t\t\t\"Computer can you hear me?\", he asks.\n\t\t\tYou wonder how he managed to get a job in the IT department.\n\t\t\tYou doubt he could carry out a murder.\n\t\t\t*goto after_suspects\n\n\t#The man in the gorilla-suit.\n\t\tYou track down the man in the gorilla costume who attended your funeral. You see him sitting by the side of the road in a less than sober state.\n\t\tHe is still muttering \"...best performer...\", \"...agency...\", \"...told him...\".\n\n\t\tYou whisper in his ear, \"Even if you kill me, you will never be the best gorilla-gram, never... NEVER!!!\".\n\n\t\t*if (murderer = \"gorilla-suit\")\n\t\t\tHe bolts upright and snarls, \"Get away from me. I am the best performer... You are dead. You are dead!\".\n\t\t\tYou see the rage and hate seething through his eyes.\n\t\t\t*goto after_suspects\n\t\t*else\n\t\t\tHe breaks down in tears, \"I warned you, I told you that they would kill you. Why didn't you listen to me?\".\n\t\t\tHis ravings become incomprehensible, you wonder if your suspicions are misplaced.\n\t\t\t*goto after_suspects\n\n\n*label label_revenge\nChoose on whom you wish to exact your revenge.\n(Please try to pick the guilty party).\n\n*choice\n\t#The lawyer.\n\t\tYou find the lawyer in his offices looking over various legal documents.\n\t\tHe receives a call on his mobile. He checks the caller and having seen that it is your wife, he begins to look harried.\n\n\t\tTime passes. You watch as the lawyer reluctantly marries your widow.\n\t\tHe reads the marriage speech that she wrote, gets into the car that she picked to go on a honeymoon that she chose\n\t\tin the clothes that she decided on for him. You shudder.\n\t\t*set murderer_guess \"lawyer\"\n\t\t*set murderer_guess_full \"the lawyer\"\n\t\t*goto evaluation\n\n\t#Your widow.\n\t\tYou find your widow lying in the bedroom painting her toenails.\n\n\t\tYou feel that pecuniary punishment will fit the crime given that she murdered you for the money.\n\n\t\tYou remove and destroy the insurance document and the lawyer's copy.\n\t\tYou transfer out all of the savings to various charities using the online banking.\n\t\tGiven the heavy mortgage on the house, the transformation from fortune to financial ruin is complete.\n\t\t*set murderer_guess \"wife\"\n\t\t*set murderer_guess_full \"your wife\"\n\t\t*goto evaluation\n\n\t#Your old girlfriend.\n\t\tYou find your old girlfriend back in her flat resting on the couch.\n\n\t\tYou possess her cat and wander over to her.\n\t\tYou (as the cat) say \"Miaow, I can see the ghost of your old boy friend, miaow\".\n\t\tShe is completely freaked out.\n\t\t*set murderer_guess \"girlfriend\"\n\t\t*set murderer_guess_full \"your girlfriend\"\n\t\t*goto evaluation\n\n\t#The detective.\n\t\tYou find the detective sitting at a desk by the whiteboard in the police station.\n\n\t\tYou ponder your revenge for a long time while observing the detective.\n\n\t\tYou notice that he is the obsessive compulsive type and obsessively collects 80's detective shows on VHS tape.\n\t\t\"Hill Street Blues\", \"Cagney and Lacey\", \"CHIPS\", \"T.J.Hooker\", he has them all.\n\t\tYou overwrite them all with \"Sledgehammer\" and \"Police Squad\".\n\t\t*set murderer_guess \"detective\"\n\t\t*set murderer_guess_full \"the detective\"\n\t\t*goto evaluation\n\n\t#The corporation.\n\t\tYou look at the black tower that is the HQ of a mega-corporation.\n\t\tYou find your way back to the 37th floor and find the corporate men that were at your funeral.\n\n\t\tHow can you take revenge on a faceless corporation?\n\n\t\tWhile you wonder these thoughts, it seems that some bad publicity is rocking the company's public image and its share price.\n\t\tNo doubt the result of their unsavoury practises. Your revenge is accomplished and you did not even have to raise a finger.\n\t\t*set murderer_guess \"corporation\"\n\t\t*set murderer_guess_full \"the corporation\"\n\t\t*goto evaluation\n\n\t#Your old boss.\n\t\tYou find your old boss sitting at his desk playing solitaire. He seems deep in concentration.\n\n\t\tYou ponder your revenge for quite a while.\n\t\tYou think about uninstalling minesweeper from his machine, but such a punishment seems far too light.\n\t\tYou post an insulting description of the CEO from his computer using his facebook page and change the password.\n\t\tThe post gets a lot of attention and the manager is fired shortly after that.\n\t\t*set murderer_guess \"boss\"\n\t\t*set murderer_guess_full \"your old manager\"\n\t\t*goto evaluation\n\n\t#Your old colleague.\n\t\tYou find your old colleague, pulling his hair out at your place of work wondering why his screen has turned blue again.\n\t\tYou wonder could he really have had anything to do with your murder.  Sometimes it is difficult to judge a book by its cover.\n\n\t\tYou see him finding the Windows CDs to reinstall the machine again.\n\t\tYou realise that he is already in Microsoft hell and you need punish him no further.\n\t\t*set murderer_guess \"colleague\"\n\t\t*set murderer_guess_full \"your I.T. colleague\"\n\t\t*goto evaluation\n\n\t#The man in the gorilla-suit.\n\t\tYou track down the man in the gorilla costume who attended your funeral. You see him sitting by the side of the road in a less than sober state.\n\t\tHe is still muttering \"...best performer...\", \"...agency...\", \"...told him...\".\n\n\t\tWith your remaining strength you transform his gorilla-suit into a \"Hello-Kitty\" costume.\n\t\tThis is surely a punishment beyond what is deserved but revenge is yours.\n\t\t*set murderer_guess \"gorilla-suit\"\n\t\t*set murderer_guess_full \"the man in the gorilla-suit\"\n\t\t*goto evaluation\n\n\t#An accident.\n\t\tYou come to the conclusion that your death was accidental.\n\t\tIt was a party, and being a gorilla-gram is an extreme activity.\n\t\tAccidents happen.\n\t\t*set murderer_guess \"accident\"\n\t\t*set murderer_guess_full \"an accident\"\n\t\t*goto evaluation\n\n\n\n*label evaluation\n*page_break\n*if (murderer_guess = murderer)\n\tCongratulations, your correctly identified the murderer and had your revenge.\n\n\tThis is no mean feat as the murderer is randomly determined at the beginning of each game.\n\t*goto label_end\n\n*else\n\tOh dear, you wrongly identified the murderer as ${murderer_guess_full}, the murderer was actually ${murderer_full}.\n\tI guess this means you are going to hell :(\n\n\tWhy not try again? The murderer is randomly determined at the beginning of each game.\n\t*goto label_end\n\n*label label_end\n\nPlease support our work by sharing this game with friends!\nThe more people play, the more resources we'll have to work on the next game.\n*goto_scene ending.choice\n", "ending.choice": "*comment Copyright 2011 by Kie Brooks\n\nGame Over.\n\n*comment *page_break\n*comment Please support our work by sharing this game with friends!\n*comment The more people play, the more resources we'll have to work on the next game.\n\n*page_break End\nWe hope you've enjoyed playing [i]Dead Already?[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set recall 10\n*set strength 15\nYour coffin is taken from the main hall and the attendees begin to depart.\n\nEverybody begins to leave.  What are you going to do?\n*fake_choice\n\t#Follow the coffin.\n\t#Wander randomly around the (fairly bleak) landscape.\n\t#Follow one of the people that attended my funeral.\n*script changeBackgroundColor(\"black\")\n*set recall 18\n*set strength 22\nYou are in Starbucks.\n\nYou notice a dishevelled man sitting in the corner in a gorilla suit.  The head of the gorilla costume sits on the seat beside him and he seems to be drinking something from a paper bag which is stronger than the normal caffeine related products served there.\n\n*fake_choice\n\t#Check out the man in the gorilla suit.\n\t#Wait around in Starbucks and enjoy the ambience.\n\t#Leave this coffee house and go somewhere else.\n*script changeBackgroundColor(\"sepia\")\n*set recall 27\n*set strength 34\n\nYou go into the police station past the front desk and look for the detective in\nvestigating your case.\n\nYou wander through the station perusing photos of wanted criminals posted on the walls.  In one room you see a photo of yourself up on a whiteboard with a number of other photos and scribblings.\n\n*fake_choice\n\t#Examine the whiteboard.\n\t#Examine the files on the desk nearby.\n\t#Leave the police station.\n\n*ending", "startup": "*title Dead Already?\n*author Kie Brooks\n\n*comment Copyright 2011 by Kie Brooks\n\n*scene_list\n\tstartup\n\tdead_already_plan.choice\n\tending.choice\n\n\n\n*create recall 0\n*create strength 0\n*create murderer \"\"\n*create murderer_full \"\"\n\n*comment Copyright 2011 by Kie Brooks\n\n*temp recall_name\n*set recall_name false\n*temp lawyer_file\n*set lawyer_file false\n*temp home_visited\n*set home_visited false\n*comment *temp bedroom_photo\n*comment *set bedroom_photo false\n*temp work_place_visited\n*set work_place_visited false\n*temp computer_accessed\n*set computer_accessed false\n*temp project_slick\n*set project_slick false\n*comment *temp project_slick_visited\n*comment *set project_slick_visited false\n*temp insurance_file\n*set insurance_file false\n*temp graveyard_visited\n*set graveyard_visited false\n*temp party_visited\n*set party_visited false\n*comment *temp whiteboard_visited\n*comment *set whiteboard_visited false\n*temp starbucks_visited\n*set starbucks_visited false\n*temp gfhome_visited\n*set gfhome_visited false\n*temp cats_fed\n*set cats_fed false\n\n\n*comment location known?\n*temp graveyard\n*set graveyard false\n*temp home\n*set home false\n*temp gf_home\n*set gf_home false\n*temp lawyer_office\n*set lawyer_office false\n*temp work_place\n*set work_place false\n*temp police_station\n*set police_station false\n*temp corporation\n*set corporation false\n*temp party\n*set party false\n*temp church\n*set church false\n*temp starbucks\n*set starbucks false\n\n*comment people known?\n*temp lawyer\n*set lawyer false\n*temp corporate_types\n*set corporate_types false\n*temp detective\n*set detective false\n*temp boss\n*set boss false\n*temp gorilla\n*set gorilla false\n*temp girlfriend\n*set girlfriend false\n*temp wife\n*set wife false\n*temp colleague\n*set colleague false\n\n*comment who is the murderer?\n*temp die_roll2\n*rand die_roll2 1 9\n*if (die_roll2 = 1)\n\t*set murderer \"lawyer\"\n\t*set murderer_full \"the lawyer\"\n\t*goto first_sentence\n*elseif (die_roll2 = 2)\n\t*set murderer \"wife\"\n\t*set murderer_full \"your wife\"\n\t*goto first_sentence\n*elseif (die_roll2 = 3)\n\t*set murderer \"girlfriend\"\n\t*set murderer_full \"your girlfriend\"\n\t*goto first_sentence\n*elseif (die_roll2 = 4)\n\t*set murderer \"corporation\"\n\t*set murderer_full \"the corporation\"\n\t*goto first_sentence\n*elseif (die_roll2 = 5)\n\t*set murderer \"detective\"\n\t*set murderer_full \"the detective\"\n\t*goto first_sentence\n*elseif (die_roll2 = 6)\n\t*set murderer \"boss\"\n\t*set murderer_full \"your old manager\"\n\t*goto first_sentence\n*elseif (die_roll2 = 7)\n\t*set murderer \"colleague\"\n\t*set murderer_full \"your I.T. colleague\"\n\t*goto first_sentence\n*elseif (die_roll2 = 8)\n\t*set murderer \"gorilla-suit\"\n\t*set murderer_full \"the man in the gorilla-suit\"\n\t*goto first_sentence\n*else\n\t*set murderer \"accident\"\n\t*set murderer_full \"an accident\"\n\t*goto first_sentence\n\n\n*comment random first sentence for more confusion\n*label first_sentence\n*temp die_roll1\n*rand die_roll1 1 5\n*if (die_roll1 = 1)\n\tAnother day, and life is good.... wait a second, is that a coffin over there?\n\t*goto start\n*elseif (die_roll1 = 2)\n\tYou ponder the quote \"Every man dies, few men get to really live\" before your attention is distracted by a coffin.\n\t*goto start\n*elseif (die_roll1 = 3)\n\tYou find yourself crying, but you have forgotten why.  You look up at a coffin in front of you.\n\t*goto start\n*elseif (die_roll1 = 4)\n\tYou hear the words \"May he rest in peace\", and you notice a coffin in front of you.\n\t*goto start\n*elseif (die_roll1 = 5)\n\tYou hear the words \"I can't believe he has gone\".\n\t*goto start\n*else\n\tYour whole body feels strange, it lacks sensation. You wonder why before slowly noticing a coffin.\n\t*goto start\n\n*label start\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n\tThis game is supported by advertisements, but you can buy the unlimited version\n\tto turn off ads forever.\n\n\t*purchase adfree $4.99 purchased\n\t*page_break_advertisement\n\n*label purchased\n\nYou look at the corpse lying in the coffin, the face looks familiar.\n\nYou try to work out who it is, however you are having trouble remembering.\nIt can't be, but it is.  It is you.\n\n\n*label coffin\nYou are dead! You look down on your body in the coffin.\n\n*choice\n\t*disable_reuse #That's not very fair, I only just started playing.\n\t\tLife isn't fair and it seems that death may not be fair either.\n\n\t\tMaybe you should consider why you are still hanging around here.\n\t\t*goto coffin\n\n\t*disable_reuse #Is it game over already? I only just started.\n\t\tNo, it is not 'Game Over', it is only the beginning... of your death.\n\t\t*goto coffin\n\n\t#Look around.\n\t\t*label look_around\n\t\tYou appear to be in some kind of church.\n\t\t*set church true\n\t\tYou survey the guests attending your funeral but you do not recognise any of the faces.\n\t\t*comment\t\tYou see a motley crew assembled at your funeral.\n\t\tFrustratingly you seem to have little or no memory of your (previous) life.\n\n\t\t*choice\n\t\t\t#Wander over to some of the guests and listen in to what they are saying.\n\t\t\t\tWho are you going to wander over to?\n\t\t\t\t*fake_choice\n\t\t\t\t\t*comment \"lawyer\" and \"wife\"\n\t\t\t\t\t#A gentleman dressed in a suit talking to a woman in a black veil.\n\t\t\t\t\t\tThey are discussing a will.  You surmise that the man in the suit is a lawyer and the woman in the black veil, who refers to her late husband most likely was your wife.\n\t\t\t\t\t\t*set lawyer true\n\t\t\t\t\t\t*set wife true\n\n\t\t\t\t\t*comment \"girlfriend\" and \"detective\"\n\t\t\t\t\t#An unshaven man dressed in a trench coat talking to a tearful young woman.\n\t\t\t\t\t\tThe unshaven man is asking the young woman questions and taking notes.\n\t\t\t\t\t\tIt seems that he is a detective and the young woman may have been your girlfriend, sister or perhaps a close friend.\n\n\t\t\t\t\t\tWhy is there a detective here? You wonder how you died.\n\t\t\t\t\t\t*set detective true\n\t\t\t\t\t\t*set girlfriend true\n\n\t\t\t\t\t*comment \"corporation\"\n\t\t\t\t\t#Two men dressed in suits and sunglasses who seem to have distanced themselves from the other guests.\n\t\t\t\t\t\tYou have no idea what their relation with the deceased was, but they seem like corporate types.\n\t\t\t\t\t\t*set corporate_types true\n\n\t\t\t\t\t*comment \"boss\" and \"colleague\"\n\t\t\t\t\t#An overweight man dressed in a suit and a nerdy looking younger man in a shirt and jeans.\n\t\t\t\t\t\tThe overweight man berates the younger man for some reason or other and is complaining about some lost research.\n\t\t\t\t\t\tYou guess that this may have been your boss and a colleague.\n\t\t\t\t\t\t*set boss true\n\t\t\t\t\t\t*set colleague true\n\n\t\t\t\t\t*comment \"gorilla-suit\"\n\t\t\t\t\t#A man sitting by himself dressed in a gorilla suit.\n\t\t\t\t\t\tYou float over to the man dressed in the gorilla suit. The head of his tattered costume sits by his side and he is mumbling to himself.\n\t\t\t\t\t\tYou can barely make out what he is saying but you manage to catch a few words, \"...best performer...\", \"...agency...\", \"...told him...\".\n\n\t\t\t\t\t\tIt appears that these are his work clothes, and that your funeral is not a fancy dress party.\n\t\t\t\t\t\t*set gorilla true\n\n\t\t\t\t*goto leaving_funeral\n\n\t\t\t#Try to attract attention.\n\t\t\t\tNobody seems to notice you and you seem unable to interact with the physical world.\n\n\t\t\t\t*goto leaving_funeral\n\n\t\t\t*disable_reuse #Try to reinhabit your body.\n\t\t\t\tHmmm, it doesn't seem to work like in the films.\n\t\t\t\tYour old body is inanimate.\n\n\t\t\t\t*goto look_around\n\n*label leaving_funeral\nYour coffin is taken from the main hall and the attendees begin to depart.\n\nEverybody begins to leave.\nWhat are you going to do?\n*choice\n\t#Follow the coffin.\n\t\t*comment You remain with your corpse.  The undertaker closes the lid of the coffin.  Your coffin is buried in the graveyard.\n\t\t*label graveyard\n\t\tYour coffin is buried in the graveyard at the back of the church.\n\t\t*set graveyard true\n\n\t\tAbove your grave is a small black tombstone.\n\t\t*line_break\n\t\tIt reads: Gregor Polinchovitch, R.I.P.\n\n\t\tDamn it, they even misspelled your name.\n\t\t*if (graveyard_visited = false)\n\t\t\t*set recall +15\n\t\t\t*set recall_name true\n\t\t\t*set graveyard_visited true\n\t\t\t*set strength +20\n\t\t\tYou feel angry and seemed to have gained a little strength to interact with the living world.\n\n\t\t\tIn addition you remember your name and you gain some memory of your previous life.\n\n\t\t\t*goto location_choice\n\t\t*goto location_choice\n\n\n\t#Wander randomly around the (fairly bleak) landscape.\n\t\tYou drift this way and then drift that way.\n\n\t\tYou are bored.  An eternity like this would drive you crazy.\n\t\tYou determine to find out about your past life so that you may rest in peace.\n\n\t\t*goto location_choice\n\n\n\t#Follow one of the people that attended my funeral.\n\t\tWho are you going to follow?\n\t\t*choice\n\t\t\t*comment \"lawyer\" and \"wife\"\n\t\t\t*if (lawyer)\n\t\t\t\t#The lawyer.\n\t\t\t\t\tYou follow the lawyer to his office.\n\t\t\t\t\t*goto lawyer_office\n\t\t\t*else\n\t\t\t\t#The gentleman dressed in a sharp suit.\n\t\t\t\t\tYou follow him to an office building.\n\t\t\t\t\tIt seems that he was your lawyer.\n\t\t\t\t\t*set lawyer true\n\t\t\t\t\t*goto lawyer_office\n\n\t\t\t*if (wife)\n\t\t\t\t#My wife.\n\t\t\t\t\tYou follow your widow back to her home.\n\t\t\t\t\t*goto home\n\t\t\t*else\n\t\t\t\t#The woman in a black veil.\n\t\t\t\t\tYou follow the woman back to her home.\n\t\t\t\t\t*goto home\n\n\t\t\t*comment \"girlfriend\" and \"detective\"\n\t\t\t*if (detective)\n\t\t\t\t#The detective.\n\t\t\t\t\tYou follow the detective back to the police station.\n\t\t\t\t\t*goto police_station\n\t\t\t*else\n\t\t\t\t#The unshaven man dressed in a trench coat.\n\t\t\t\t\tYou follow the man back to the police station. He is probably a detective.\n\t\t\t\t\t*set detective true\n\t\t\t\t\t*goto police_station\n\n\t\t\t*if (girlfriend)\n\t\t\t\t#The upset girl.\n\t\t\t\t\tYou follow the attractive girl back to her home.\n\t\t\t\t\t*goto gf_home\n\t\t\t*else\n\t\t\t\t#The tearful young woman.\n\t\t\t\t\tYou follow the young woman back to her home.\n\t\t\t\t\t*goto gf_home\n\n\t\t\t*comment \"corporation\"\n\t\t\t*if (corporate_types)\n\t\t\t\t#The corporate men.\n\t\t\t\t\tYou follow the corporate men back to some offices.\n\t\t\t\t\t*goto corporation\n\t\t\t*else\n\t\t\t\t#The two men dressed in suits and sunglasses.\n\t\t\t\t\tYou follow the men back to some offices.\n\t\t\t\t\t*goto corporation\n\n\t\t\t*comment \"boss\" and \"colleague\"\n\t\t\t*if (boss)\n\t\t\t\t#Your old boss and colleague.\n\t\t\t\t\tYou follow your boss and colleague back to their work place.\n\t\t\t\t\t*goto work_place\n\t\t\t*else\n\t\t\t\t#The overweight man and the nerdy looking man.\n\t\t\t\t\tYou follow the men back to some buildings.\n\t\t\t\t\t*goto work_place\n\n\t\t\t*comment \"priest\"\n\t\t\t#The priest.\n\t\t\t\tYou follow the priest in to a small room at the back of the church.\n\t\t\t\t*goto church\n\n\t\t\t*comment \"gorilla-suit\"\n\t\t\t*if (gorilla)\n\t\t\t\t#The gorilla-gram.\n\t\t\t\t\tYou follow the gorilla-gram to a residential house.\n\t\t\t\t\t*goto party\n\t\t\t*else\n\t\t\t\t#The man dressed in a gorilla suit.\n\t\t\t\t\tYou follow the man to a residential house.\n\t\t\t\t\t*goto party\n\n\n*label location_choice\nWhere to now?\n*choice\n\t*if (church)\n\t\t#Church.\n\t\t\tYou wander back to the church, the somber scene of your funeral.\n\t\t\t*goto church\n\t*if (graveyard)\n\t\t#Graveyard.\n\t\t\tYou go to the graveyard.\n\t\t\t*goto graveyard\n\t*if (home)\n\t\t#Wife's home.\n\t\t\tYou go to your widow's house.\n\t\t\t*goto home\n\t*if (gf_home)\n\t\t#Girlfriend's home.\n\t\t\tYou go to your girlfriend's house.\n\t\t\t*goto gf_home\n\t*if (lawyer_office)\n\t\t#Lawyer's offices.\n\t\t\tYou go to the lawyer's offices.\n\t\t\t*goto lawyer_office\n\t*if (work_place)\n\t\t#Work place.\n\t\t\tYou visit your old work place.\n\t\t\t*goto work_place\n\t*if (police_station)\n\t\t#Police station.\n\t\t\tYou go to the police station.\n\t\t\t*goto police_station\n\t*if (party)\n\t\t#Residential address.\n\t\t\tYou go to a house in the suburbs.\n\t\t\t*goto party\n\t*if (corporation)\n\t\t#Corporate headquarters.\n\t\t\tYou go to the offices of Techroid Inc.\n\t\t\t*goto corporation\n\t*if (starbucks)\n\t\t#Starbucks.\n\t\t\tYou go to the local coffee house.\n\t\t\t*goto starbucks\n\t*selectable_if (recall > 69) #Enough wandering, I know enough to form a plan.\n\t\t*goto_scene dead_already_plan.choice\n\n*comment work out why, how you died perhaps so that you can rest in peace\n*comment very limited physical interaction, but will improve as progress in the game.\n*comment find out how died and do something to remedy it so that your soul can rest in peace.\n\n*label home\n*set home true\n*if (home_visited = false)\n\t*set home_visited true\n\t*set recall +10\n\t*goto home_visited_endif\n*label home_visited_endif\nYou look around your house, it seems familiar and you vaguely remember having lived there.\n\n*if (wife)\n\tIn the hall you see an old wedding photo of yourself and your wife (now your widow).\n\t*goto wife_endif\n*else\n\tIn the hall you see an old wedding photo of yourself and the woman who was wearing the black veil.  She must have been your wife (now your widow).\n\t*set wife true\n\t*goto wife_endif\n\n*label wife_endif\nThere is some mail on a small table by the phone.\n\n*label label_home_choice1\n*choice\n\t*disable_reuse #Look around the whole house.\n\t\tYou wander around the house trying to remember what once was.\n\n\t\t*if (lawyer)\n\t\t\tIn the bedroom you notice a picture of your wife and the lawyer.\n\t\t\tHe is clearly providing more than legal services.\n\t\t\tIt also gives him a motive to get rid of you.\n\t\t\t*goto label_home_endif\n\n\t\t*else\n\t\t\tIn the bedroom you notice a picture of your wife and another man.\n\t\t\tYou recognise him as the man that was talking to your wife at the funeral.\n\t\t\t*goto label_home_endif\n\n\t\t*label label_home_endif\n\t\tYou feel angry and knock the photo over.\n\t\tOh, you seem to have gained a little strength to interact with the living world.\n\t\t*set strength +20\n\t\t*goto label_home_choice1\n\n\t*if (strength \u003c 40) #Look through the mail.\n\t\tTry as you might you are unable to move the letters.\n\t\tYou feel that you could accomplish this if you were stronger, but you are too weak.\n\n\t\tYou can however see the return address which is printed on the uppermost letter, it is the address of a law firm.\n\n\t\t*set lawyer_office true\n\t\t*goto label_home_choice1\n\n\t*if (strength > 39)\n\t\t*disable_reuse #Look through the mail.\n\t\t\tYou look through the mail, junk, junk, reader's digest...\n\t\t\tA letter from a law firm confirming receipt of documents addressed to your wife,\n\t\t\ta letter from a company where you must have worked detailing some change to your pension fund\n\t\t\tand a party invitation; wait, it's actually a job at a party.\n\n\t\t\tDid you have two jobs?\n\t\t\tYou make a mental note of the addresses.\n\t\t\t*set lawyer_office true\n\t\t\t*set party true\n\t\t\t*set work_place true\n\t\t\t*goto label_home_choice1\n\n\t#Leave the house.\n\t\tYou leave your old home.\n\n\t\t*goto location_choice\n\n\n*label lawyer_office\n*set lawyer_office true\nThe building is marked \"Lamniformes & Co. Attorneys\".\n\n*if (lawyer = false)\n\tYou recognise the man that was talking to your wife at the funeral.  He must have been your lawyer.\n\t*set lawyer true\n\n*label label_lawyer_office\nThe lawyer goes in and out of his office, conducting his day to day business.\nHis room is filled with client files and some legal books.\n\n*if (recall_name)\n\tYou see a file on his desk marked with your name.\n\t*choice\n\t\t*if (strength > 39)\n\t\t\t*disable_reuse #Look through the file.\n\t\t\t\tYou peruse your file when the lawyer is not in the room.\n\t\t\t\tIt seems that your wife was due to receive an insurance payout on your death.\n\t\t\t\tYou notice that none of the documents have your signature, only the signature of your wife.\n\t\t\t\tYou note the address of the claimant.\n\t\t\t\t*set home true\n\n\t\t\t\tYour widow might be innocent but she also had motive to kill you.  The lawyer could possibly be involved too.\n\t\t\t\t*if (insurance_file = false)\n\t\t\t\t\tYou feel angry at the betrayal.\n\t\t\t\t\tYou seem to have gained more strength to interact with the living world.\n\t\t\t\t\t*set strength +20\n\t\t\t\t\t*set insurance_file true\n\t\t\t\t\t*goto label_lawyer_office\n\n\t\t\t\t*goto label_lawyer_office\n\n\t\t*if (strength \u003c 40) #Look through the file.\n\t\t\tTry as you might you are unable to open the folder.\n\t\t\tYou feel that you could accomplish this if you were stronger, but you are so weak.\n\t\t\t*goto label_lawyer_office\n\n\t\t#Leave the office.\n\t\t\tYou leave the lawyer's offices.\n\t\t\t*goto location_choice\n\n*goto location_choice\n\n\n\n*label work_place\n*set work_place true\n*if (work_place_visited = false)\n\t*set work_place_visited true\n\t*set recall +5\n\t*goto work_place_visited_endif\n\n*label work_place_visited_endif\nYou look at the glass fronted doors of Techroid Inc.\nYou drift through the glass doors past reception and into cubicle-ville.\nThe layout seems familiar and you find yourself being drawn to a cubicle and what may have been your old desk.\n\n*if (boss)\n\tYour old manager is haranging your old work colleague.\n\t*goto boss_endif\n*else\n\tThe unkempt young man is staring in a confused state at the screen while a sweaty manager harangs him.\n\tThe scruffy man you recall was your colleague and his boss was your boss.\n\t*set boss true\n\t*set colleague true\n\t*goto boss_endif\n*label boss_endif\n\nWhy are they sitting at your cubicle and what is all the fuss about.\nYou look at the screen, what on earth is that?  You are filled with revulsion as you see that your old screen now has the flavour of Microsoft windows.\nThey are trying to find something that you were working on, but you can not recall what it was.\n\n*label work_place_choice\nNow that you are settled back in your old work place (albeit in a ghostly ethereal form), what do you want to do?\n*fake_choice\n\t*if (strength > 19)\n\t\t#Sit down at an empty cubicle and try to login.\n\t\t\tYou type in your login and password, which appear to still be working.\n\t\t\t*if (computer_accessed = false)\n\t\t\t\t*set computer_accessed true\n\t\t\t\t*set recall +5\n\t\t\t\t*goto computer_accessed_endif\n\t\t\t*label computer_accessed_endif\n\t\t\t*goto label_workplace_login\n\n\t*if (strength \u003c 20) #Sit down at an empty cubicle and try to login.\n\t\tTry as you might you are unable to press the keys.\n\t\tYou feel that you could accomplish this if you were stronger, but you are too weak at the moment.\n\t\t*goto work_place_choice\n\n\t*if (computer_accessed)\n\t\t*disable_reuse #Have some fun with your old colleagues.\n\t\t\tYou decide to change the login motd (message of the day).\n\n\t\t\t\"A sysadmin message from beyond the grave: windows users you are going to hell, convert to linux before it is too late!\".\n\n\t\t\tYou were never very good at coming up with practical jokes.\n\t\t\tThey probably won't even read it, they never did when you were alive.\n\n\t\t\t*goto work_place_choice\n\n\t#Time to leave the office.\n\t\tYou decide not to spend any more time at your old work place, it was bad enough when you were alive.\n\t\t*goto location_choice\n\n\n*label  label_workplace_login\n*choice\n\t*disable_reuse #Check your backup server.\n\t\tYou remember your backup server details but little else, you browse around to find what you were working on.\n\t\tYou find game files. A game? That makes no sense. You do not remember working on a game.\n\t\t*goto label_workplace_login\n\n\t#Check your email.\n\t\tYou decide to check your email, that should answer some questions.\n\n\t\tHmmm, it looks like everything was deleted by a script... ah yes written by you.\n\t\tWell you can be forgiven for not anticipating this set of circumstances.\n\n\t\tOh wait you just received a new message, perhaps you are in luck after all.\n\n\t\t*page_break\n\n\t\tThe email reads\n\t\t*temp die_roll_email\n\t\t*rand die_roll_email 1 4\n\t\t*if (die_roll_email = 1)\n\t\t\t\"Enlarge your member\".\n\t\t\t*goto delete_email\n\t\t*if (die_roll_email = 2)\n\t\t\t\"Get a degree without study\".\n\t\t\t*goto delete_email\n\t\t*if (die_roll_email = 3)\n\t\t\t\"A barrister from Nigeria wishes to transfer 14.5 million dollars to your account\".\n\t\t\t*goto delete_email\n\t\t*if (die_roll_email = 4)\n\t\t\t\"Buy a genuine fake rolex\".\n\t\t\t*goto delete_email\n\n\t\t*label delete_email\n\t\tYou curse all spammers and delete the email.\n\t\t*goto label_workplace_login\n\n\t*disable_reuse #Check someone else's computer.\n\t\tYou take a quick peek at your bosses computer screen.\n\t\tHmmm, an email from his boss demanding the status on project \"Slick\",\n\t\tand you thought he only used his computer for playing minesweeper.\n\t\t*set project_slick true\n\t\t*goto label_workplace_login\n\n\t#Logout.\n\t\tYou logout\n\t\t*goto work_place_choice\n\n*label police_station\n*set police_station true\nYou go into the police station past the front desk and look for the detective investigating your case.\n\nYou wander through the station perusing photos of wanted criminals posted on the walls.\nIn one room you see a photo of yourself up on a whiteboard with a number of other photos and scribblings.\n\n*label label_police_choice\n*choice\n\t*disable_reuse #Examine the whiteboard.\n\t\tYou carefully examine the whiteboard.\n\t\tYou recognise the other photos on the board as being from the funeral.\n\t\tThis detective seems to have potential.\n\n\t\tAs you look at the names and faces, you remember a little more of your past.\n\t\t*set recall +5\n\n\t\tYou read the notes. Hmmm, it seems that everyone at your funeral had a motive to kill you,\n\t\tincluding your lawyer, widow, girlfriend, a large conglomerate, your firm and your colleagues.\n\t\tWhat a popular fellow you must have been.\n\t\tAlso why did you have both a wife and a girlfriend?\n\t\t*set wife true\n\t\t*set lawyer true\n\t\t*set corporate_types true\n\t\t*set detective true\n\t\t*set boss true\n\t\t*set colleague true\n\t\t*set detective true\n\n\t\t*goto label_police_choice\n\n\t*if (strength > 39)\n\t\t*disable_reuse #Examine the files on the desk nearby.\n\t\t\tYou look through the files on the desk.\n\t\t\tThings might have just become a lot easier...\n\n\t\t\t*page_break\n\t\t\tWhat? None of the files relate to this case.\n\t\t\tPerhaps the detective on the case took the files with him.\n\n\t\t\t*goto label_police_choice\n\n\t*if (strength \u003c 40) #Examine the files on the desk nearby.\n\t\tUnfortunately you do not seem to be able to open the files.\n\t\tYou feel that you could accomplish this if you were stronger, but you are too weak.\n\n\t\t*goto label_police_choice\n\n\t#Leave the police station.\n\t\tNo bars can hold you now.\n\t\t*goto location_choice\n\n\n*label party\n*set party true\nYou arrive at a terraced house which has two partially deflated balloons attached to the front door.\nIt must have been the venue for a party.\n\nYou survey the 'after-party' which is not pretty.\nThere are party streamers, crushed beer cans and half empty beer bottles.\nCigarette butt ends, burns in the carpets, various vomit and other stains.\n\nMore chilling are the blood stains and chalk outline in the middle of the living room.\nYou wonder if this was the scene of your death.\n\n*label party_choice\n*choice\n\t*disable_reuse #Search the post apocalyptic scene.\n\t\tYou notice that there is a sign on the wall.\n\n\t\tCRIME SCENE DO NOT DISTURB.\n\t\tIf you have information relating to the events that took place please contact the detective in charge at the station.\n\n\t\tYou wonder why you did not notice that when you first came in.\n\t\t*set police_station true\n\t\t*goto party_choice\n\n\t*if (police_station)\n\t\t*disable_reuse #Carefully search for clues.\n\t\t\tJudging by the blood stains and the chalk outline, you did not have  natural death.\n\t\t\tMaybe there will be more in the police report.\n\n\t\t\tYou notice some tufts of blue material in the dried blood stains.\n\t\t\t*if (gorilla)\n\t\t\t\tYou recognise the colour and material as belonging to a gorilla suit.\n\t\t\t\t*if (party_visited = false)\n\t\t\t\t\t*set recall +5\n\t\t\t\t\t*goto label_gorilla_recognised\n\t\t\t\t*goto label_gorilla_recognised\n\n\t\t\t*else\n\t\t\t\tThe colour and material seem vaguely familiar but you can not put your finger on it.\n\t\t\t\t*goto label_gorilla_recognised\n\n\t\t\t*label label_gorilla_recognised\n\t\t\t*if (party_visited = false)\n\t\t\t\t*set recall +5\n\t\t\t\t*set party_visited true\n\t\t\t\t*goto party_choice\n\n\t\t\t*goto party_choice\n\n\t#Leave the house.\n\t\tYes, this party is long since over, time to leave.\n\t\t*goto location_choice\n\n\n*label church\n*set church true\nThe church is quiet and peaceful.\n*if (graveyard = false)\n\t*set graveyard true\n\tYou notice some doors that lead into a graveyard.\n\nYou wander around through the main hall and then go into a back room, where you see the priest.\n*line_break\nThe priest is drinking from a silver hip flask and muttering to himself in a very disconcerting manner.\n\n*label church_choice\n*choice\n\t*disable_reuse #Listen to the priest.\n\t\t\"Remember his funeral yes, but not my birthday\"... grumble, grumble, \"bloody atheists\"...\n\t\tmumble, mumble, \"witch burning\"... mutter, mutter, \"tea and biscuits\"...\n\n\t\tYou tune out his rantings.\n\t\t*goto church_choice\n\n\t*if (recall_name = false) #Search the little room.\n\t\t*if (starbucks = false)\n\t\t\t*set starbucks true\n\t\t\tYou see an old voucher for Starbucks, which lies unused.\n\t\t\tYou wish that you had used your stamped coffee coupons while you were still alive.\n\t\t\t*goto endif_coupon\n\t\t*label endif_coupon\n\n\t\tYou see a lot of papers on his desk including hyms, and notes for sermons.\n\t\t*line_break\n\t\tThey are so boring that you can not bring yourself to look through them all.\n\n\t\t*goto church_choice\n\n\n\t*if (recall_name)\n\t\t*disable_reuse #Search the little room.\n\t\t\t*if (starbucks = false)\n\t\t\t\t*set starbucks true\n\t\t\t\tYou see an old voucher for Starbucks, which lies unused.\n\t\t\t\tYou wish that you had used your stamped coffee coupons while you were still alive.\n\t\t\t\t*goto label_desk_continue\n\t\t\t*label label_desk_continue\n\n\t\t\tAmong the papers on his desk you see a copy of your death certificate along with an invoice for the funeral.\n\t\t\tYou make a mental note of the address.\n\t\t\t*set home true\n\t\t\t*goto church_choice\n\n\t#Leave the church.\n\t\t*goto location_choice\n\n\n*label starbucks\n*set starbucks true\n\nYou are in Starbucks.\n*if (starbucks_visited = false)\n\tAmazingly the strong smell of caffeine gives you a boost even despite the fact that you are dead.\n\tYou feel slightly stronger.\n\t*set strength +10\n\t*set starbucks_visited true\n\n*label starbucks_choice\nYou notice a dishevelled man sitting in the corner in a gorilla suit.\nThe head of the gorilla costume sits on the seat beside him and he seems to be drinking something from a paper bag\nwhich is stronger than the normal caffeine related products served there.\n*set gorilla true\n\n*choice\n\t*if (party = false) #Check out the man in the gorilla suit.\n\t\t*goto label_gorilla_check\n\n\t*if (party)\n\t\t*disable_reuse #Check out the man in the gorilla suit.\n\t\t\t*label label_gorilla_check\n\t\t\tHe seems fairly unhappy, less than sober and smells bad (the warm gorilla suit probably does not help).\n\t\t\tEven as a ghost, you decide to keep your distance.\n\n\t\t\tAfter a while the man in the gorilla suit leaves.\n\t\t\t*choice\n\t\t\t\t*disable_reuse #Follow him.\n\t\t\t\t\tYou follow the costumed man to a residential house.\n\t\t\t\t\t*goto party\n\n\t\t\t\t#Wait around in Starbucks and enjoy the ambience.\n\t\t\t\t\t*label label_coffee_house_wait\n\t\t\t\t\tYou hang around in Starbucks.\n\n\t\t\t\t\t*comment see if anyone else turns up\n\t\t\t\t\t*temp die_roll3\n\t
