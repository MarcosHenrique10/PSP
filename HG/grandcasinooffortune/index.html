<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grand Casino of Fortune — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

oth an ace and a 10, jack, queen or king, you win automatically with a Blackjack.\n\n\nOtherwise you can choose from several options:\n\n\n[b]Stand[/b]: finish the round and deal cards to the dealer.\n\n\n[b]Hit[/b]: deal a new card to your hand in addition to the ones you currently have.\n\n\n[b]Double Down[/b]: double your bet and deal exactly one more card to your hand, then stand.\n\n\n[b]Split[/b]: double your bet and play two rounds by splitting your initial cards (that must have had the same value such as 10 and 10) into two separate hands (that each get one random extra card). After splitting once, no further splitting is allowed in this version of the game.\n\n\nThe following options are disabled in this version of the game: surrender, insurance.\n\n\nYou bust (lose automatically) if the total value of your hand is ever over 21. The dealer also loses if that happens to them.\n\n\nThe dealer must hit until the total value of their hand is 17 or higher.\n\n\nThe total value of any hand is determined by adding together the values of all cards included in it. For example, the value of a card like 2 of hearts is simply 2. The values of jacks, queens and kings are always 10. The value of an ace is normally 11, but if you would otherwise bust (total value of cards over 21), the value of an ace is counted as 1.\n\n\nYou need to win four rounds in a row at least once to clear this game. If the result is a tie (push), it does not count at all. Winning a round while doubling down counts as winning two rounds in a row. \n\n\nOne round has a roughly 50% chance to win; 2x initial bet will be returned upon winning (except 4x if doubling down or 2.5x if won with a Blackjack hand).\n\n*page_break\n\n*goto game_start", "choicescript_description": "As you enter the Grand Casino, you have only one goal: reach the top floor and claim unimaginable wealth for yourself. Can you succeed where many others have failed?\n\n\"Grand Casino of Fortune\" is a thrilling 55,000-word interac \n\n[b]Round lost![/b]\n\n*goto game_start\n\n*label rules\n\nCommander is a card game played with a single pack of 54 cards (52 standard cards + 2 jokers).\n\n\nStarting the game costs 100 tokens, but you can play rounds of the game until you either lose or withdraw. If you lose, you lose your whole bet. If you withdraw, you receive your current bet as a reward. After every new round, your bet is tripled from its previous amount. If your bet reaches 30 000 tokens, you must withdraw.\n\n\nEach round of the game you play, both you and the dealer receive 10 random cards. You must both place these cards into 5 piles, and then the piles fight each other (your pile 1 vs dealer's pile 1, your pile 2 vs dealer's pile 2 etc.). Three of the dealer's piles are partly revealed to you, showing the amount of cards in each of the revealed piles. If you win 3 of these battles, you win the round — otherwise you lose.\n\n\nThe winner of a battle is mainly decided by the total point value of each pile: the higher value wins. Number cards (2-10) are worth their own value in points. Aces are worth 1 point each. Jacks, queens and kings are worth 10 points. Jokers are not worth any points.\n\n\nAnother way to win a battle is by having a king in your pile, which makes you win instantly — unless your opponent has an ace, in which case you lose. If you have an ace and your opponent doesn't have a king in their pile, on the other hand, you lose instantly. If both piles have a king, or if both piles have an ace, they have no effect on the result.\n\n\nJokers cause you to swap your pile with your opponent. Jokers have no effect, however, if they're the only card in your pile.\n\n\nAfter the piles are set up, you must choose one pile you predict will win. If your prediction is correct, your current bet is doubled. If your prediction is wrong, your current bet is halved.\n\n\nYou need to win three rounds in a row at least once to clear this game.\n\n*page_break\n\n*if (rules_origin = \"pile1choi ith 3 troops)[/b]\n    \n    \n    [b]Game lost![/b]\n    *page_break\n    *goto game_start\n\n*if (attack_target = \"home\")\n    *if (attack_origin = \"neutral2\")\n        *if (home_area_troops = 1)\n            *set home_area_troops -damage_done_by_prophet_1_roll\n            *set neutral_area_2_troops -damage_done_by_player_1_roll\n            [b]Prophet marched to your home territory from neutral territory 2! (you lost ${damage_done_by_prophet_1_roll} troops and Prophet lost ${damage_done_by_player_1_roll} troops)[/b]\n        *if (home_area_troops = 2)\n            *set home_area_troops -damage_done_by_prophet_2_rolls\n            *set neutral_area_2_troops -damage_done_by_player_2_rolls\n            [b]Prophet marched to your home territory from neutral territory 2! (you lost ${damage_done_by_prophet_2_rolls} troops and Prophet lost ${damage_done_by_player_2_rolls} troops)[/b]\n            *if (damage_done_by_prophet_2_rolls >= 1)\n                *set home_area_troops +1\n                [b]… one of your troop losses was prevented by home territory defensive advantage![/b]\n        *if (home_area_troops >= 3)\n            *set home_area_troops -damage_done_by_prophet_3_rolls\n            *set neutral_area_2_troops -damage_done_by_player_3_rolls\n            [b]Prophet marched to your home territory from neutral territory 2! (you lost ${damage_done_by_prophet_3_rolls} troops and Prophet lost ${damage_done_by_player_3_rolls} troops)[/b]\n            *if (damage_done_by_prophet_3_rolls >= 1)\n                *set home_area_troops +1\n                [b]… one of your troop losses was prevented by home territory defensive advantage![/b]\n\n*goto before_ai_actions\n\n*label rules\n\nConquest is a strategy game for two players who must conquer the home territory of their opponent to win. Between their territories are three neutral territories that are initially not controlled by either player.\n\n\nBoth players have 10 troops in their home territory at the start of the game. The neutral territories have no troops to begin with. The players then take turns where they can take at most 10 actions per turn.\n\n\nAt the start of every turn, the players receive 2 new troops to every territory they currently control (and 3 new troops to their home territory). After that, they can freely move troops to other territories in groups of exactly 3 troops per move. If there are no troops left in the targeted territory, the attacker claims control of the territory and the 3 troops move over to occupy it. Otherwise, combat occurs (explained later).\n\n\n- Home territories: can move to all neutral territories\n\n\n- Neutral territory 1: can move to neutral territory 2 and both home territories\n\n\n- Neutral territory 2: can move to all neutral territories and both home territories\n\n\n- Neutral territory 3: can move to neutral territory 2 and both home territories\n\n\nCombat works by having 3 troops from both the defender and the attacker fight each other at a time. The attacker will always have 3 troops fighting, but the defender may also have 1 or 2 troops fighting if there aren't 3 troops left to defend. For each troop on their side fighting, the player rolls one dice. The highest 1-3 results for both sides (depending on the amount of troops fighting for the defender) are compared to each other in descending order. For every tie result, nothing happens, and for every loss, one of the losing side's troops is lost. When defending a home territory, one troop loss per every combat round is prevented (unless only one troop is left).\n\n\nA turn only ends when the player chooses to end it. The cycle of turns continues until one of the players is defeated by losing their home territory, or you can also lose by running out of turns to act.\n\n\nYou only need to win this game once to clear it. However, the Prophet's luck factor is 8 — this time, the odds are not in your favor!\n\n\nFortunately, you can lose 7 times without failing the trial.\n\ floor_start\n\n*if (floor1_started = false)\n    *set floor1_started true\n    \n    *rand wheel_of_fortune_spin1 1 1000\n    *rand wheel_of_fortune_spin2 1 1000\n    *rand wheel_of_fortune_spin3 1 1000\n    *rand wheel_of_fortune_spin4 1 1000\n    *rand wheel_of_fortune_spin5 1 1000\n    *rand wheel_of_fortune_spin6 1 1000\n    *rand wheel_of_fortune_spin7 1 1000\n    \n    *rand russian_roulette_bullet_position 1 6\n    *rand russian_roulette_player_position 1 5\n\t\n    [i]Recommendation: turn off animations between pages in the settings. There will be extreme amounts of consecutive page switches![/i]\n    \t\n    *page_break\n    \n    [b]Floor 1: Blind Luck[/b]\n    \n    \n    As you enter the Grand Casino of Fortune, you can't help but feel like this is the culmination of your journey.\n    \n    \n    There's no turning back anymore.\n    \t\n    *page_break\n\n[b]Floor 1: Blind Luck[/b]\n\n*choice\n    #Game: Roulette\n        *goto_scene roulette\n    #Game: Baccarat\n        *goto_scene baccarat\n    #Game: Jackpot\n        *goto_scene jackpot\n    #Talk: Fortune-teller\n        *goto fortune_teller\n    #Talk: Lender\n        *goto lender\n    #Talk: Bouncer\n        *goto bouncer\n    #Talk: Broke gambler\n        *goto broke_gambler\n    #Talk: Gossiper\n        *goto gossiper\n    #Talk: Beggar\n        *goto beggar\n    #Memory: Destitution\n        *goto destitution\n\n*label fortune_teller\n\nA mysterious robed figure offers you a chance to play a game.\n\n*choice\n    #Return\n        *goto floor_start\n    #Play luck catcher\n        *goto_scene luck_catcher1\n\n\n*label lender\n\nYou can borrow an unlimited amount of tokens without interest here.\n\n\nHowever, you can't leave this floor until you repay your whole debt. If you can't repay… the consequences are omitted.\n\n*choice\n    #Return\n        *page_break\n        *goto floor_start\n    #Borrow 100 tokens\n        *set borrowed_tokens +100\n        *set tokens +100\n        [b]100 tokens borrowed![/b]\n        *goto lender\n    #Repay all borrowed tokens\n        *if ((tokens >= borrowed_tokens) and (borrowed_tokens > 0))\n            *set tokens -borrowed_tokens\n            *set borrowed_tokens 0\n            [b]Debt erased![/b]\n            *goto lender\n        *elseif ((tokens >= borrowed_tokens) and (borrowed_tokens = 0))\n            [b]No debt to erase![/b]\n            *goto lender\n        *else\n            [b]Not enough tokens to erase debt![/b]\n            *goto lender\n\n\n*label bouncer\n\nIn order to advance to the next floor, the following requirements have to be met:\n\n\n[b]1) Roulette cleared[/b]\n\n\n[b]2) Baccarat cleared[/b]\n\n\n[b]3) Jackpot cleared[/b]\n\n\n[b]4) No remaining debt[/b]\n\n\nYou can't take any tokens with you to the next floor.\n\n*if ((((roulette = \"Cleared\") and (baccarat = \"Cleared\")) and (jackpot = \"Cleared\")) and (borrowed_tokens = 0))\n    Enter the second floor?\n    \n    *choice\n        #Return\n            *goto floor_start\n        #Enter\n            *check_achievements\n            *if not(choice_achieved_floor2)\n                *achieve floor2\n            *set wheel_of_fortune_spins +1\n            *set tokens 100\n            *finish\n\n*page_break\n\n*goto floor_start\n\n\n*label broke_gambler\n\n*rand win 1 1000\n\n*if (broke_gambler_bet_done = false)\n    A broke gambler wants to bet their borrowed 100 tokens against your 100 tokens.\n    \n    \n    *if (tokens >= 100)\n        Do you dare to answer the challenge?\n        \n        *choice\n            #Return\n                *goto floor_start\n            #Bet 100 tokens (double or nothing)\n                *set broke_gambler_bet_done true\n                *set wheel_of_fortune_spins +1\n                *if (win \u003c= 525)\n                    *set broke_gambler_bet_won true\n                    *set tokens +100\n                    [b]Won 100 tokens![/b]\n                    *goto broke_gambler\n                *else\n                    *set tokens -100\n                    [b]Lost 100 tokens![/b]\n                    *goto broke_gambler\n    *else\n        But you do not have 100 tokens.\n        *page_break\n        *goto floor_start\n\n*else\n    *if (broke_gambler_bet_won = true)\n        The broke gambler is despairing and ignores you.\n        *page_break\n        *goto floor_start\n    *else\n        The broke gambler appears elated and ignores you.\n        *page_break\n        *goto floor_start\n\n*label gossiper\n\n*rand win 1 1000\n\n*if (win \u003c= 200)\n    Have you heard that the owner of this casino may be the Prophet of the God of Fortune? I heard someone saying that they're staying at the top floor. Their luck must be divine to reach all the way there!\n    *page_break\n    *goto floor_start\n*elseif (win \u003c= 400)\n    Apparently most people who enter this casino are never seen again. I wonder where they all disappeared? And why isn't anyone trying to solve this mystery?\n    *page_break\n    *goto floor_start\n*elseif (win \u003c= 600)\n    I must respect the players who managed to enter the second floor. They must be blessed with amazing luck by the God of Fortune. Otherwise it's clearly impossible to win at these rigged games of luck, no matter how much money you have!\n    *page_break\n    *goto floor_start\n*elseif (win \u003c= 800)\n    Some say that even the king can't touch this casino. I wonder how that can be possible… Maybe the Prophet is truly connected to this casino?\n    *page_break\n    *goto floor_start\n*else\n    The God of Fortune is too harsh. Some of us have such bad luck that we will fail, no matter what we try. Some will easily succeed at everything they try. I suppose that god simply detests hard work. What could be more random than blessing a child at birth — or not — depending on their luck at that moment?\n    *page_break\n    *goto floor_start\n\n*label beggar\n\n*if (beggar_donations >= 3)\n    The beggar has disappeared from view.\n    *page_break\n    *goto floor_start\n*elseif (tokens >= 10)\n    A beggar looks at you pleadingly.\n    *choice\n        #Return\n            *goto floor_start\n        #Give 10 tokens\n            *set tokens -10\n            *set beggar_donations +1\n            [b]Gave 10 tokens to the beggar![/b]\n            *goto beggar\n*else\n    A beggar stares at you, but you don't have any tokens to give.\n    *page_break\n    *goto floor_start\n\n\n*label destitution\n\nFor many years, I was extremely poor.\n\n\nI had no home. I had no money. I barely even had any food.\n\n\nIt was a miserable existence. Hunger was easily the worst part about it.\n\n\nAll that started to change when I heard about the Divine Lottery.\n\n\nBut that is a story for another time…\n\n*page_break\n\n*goto floor_start", "floor2": "*gosub_scene ending checkpurchase\n\n*set floor \"floor2\"\n\n*label floor_start\n\n*if (floor2_started = false)\n    *set floor2_started true\n    \n    [b]Floor 2: Advanced Gambling[/b]\n    \n    \n    The first floor was easier to deal with than you had expected. All it required was pure luck, and that was something you certainly didn't lack now.\n    \n    \n    The real challenge would begin here. Everyone who reached the second floor was already more or less blessed by luck — could you still stand apart from the crowd, even if having blind luck alone was not enough?\n    \n    *page_break\n\n[b]Floor 2: Advanced Gambling[/b]\n\n*choice\n    #Game: Blackjack\n        *goto_scene blackjack\n    #Talk: Lender\n        *goto lender\n    #Talk: Bouncer\n        *goto bouncer\n    #Talk: Bragging gambler\n        *goto bragging_gambler\n    #Talk: Envoy of Fortune\n        *goto envoy_of_fortune\n    #Memory: Divine Lottery\n        *goto divine_lottery\n    #History: The Kingdom of Fortuna\n        *goto founding_of_fortuna\n    \n*label lender\n\nYou can borrow an unlimited amount of tokens without interest here.\n\n\nHowever, you can't leave this floor until you repay your whole debt. If you can't repay… the consequences are omitted.\n\n*choice\n    #Return\n        *page_break\n        *goto floor_start\n    #Borrow 100 tokens\n        *set borrowed_tokens +100\n        *set tokens +100\n        [b]100 tokens borrowed![/b]\n        *goto lender\n    #Repay all borrowed tokens\n        *if ((tokens >= borrowed_tokens) and (borrowed_tokens > 0))\n            *set tokens -borrowed_tokens\n            *set borrowed_tokens 0\n            [b]Debt erased![/b]\n            *goto lender\n        *elseif ((tokens >= borrowed_tokens) and (borrowed_tokens = 0))\n            [b]No debt to erase![/b]\n            *goto lender\n        *else\n            [b]Not enough tokens to erase debt![/b]\n            *goto lender\n\n\n*label bouncer\n\nIn order to advance to the next floor, the following requirements have to be met:\n\n\n[b]1) Blackjack cleared[/b]\n\n\n[b]2) Passed the Envoy of Fortune's test[/b]\n\n\n[b]3) No remaining debt[/b]\n\n\n[b]4) Pay 250 tokens[/b]\n\n\nYou can't take any tokens with you to the next floor.\n\n*if (blackjack_rounds_played > 800)\n    *set blackjack \"Cleared\"\n    *set tokens 300\n    *set borrowed_tokens 0\n\n*if ((((blackjack = \"Cleared\") and (envoy_test = \"Cleared\")) and (tokens >= 250)) and (borrowed_tokens = 0))\n    Enter the third floor?\n    \n    *choice\n        #Return\n            *goto floor_start\n        #Enter\n            *check_achievements\n            *if not(choice_achieved_floor3)\n                *achieve floor3\n            *set wheel_of_fortune_spins +1\n            *set tokens 250\n            *finish\n\n*page_break\n\n*goto floor_start\n\n*label bragging_gambler\n\n*if (rps_game_won = true)\n    The previously overly confident gambler now appears defeated. All you can do is walk away.\n    *page_break\n    *goto floor_start\n\nAn especially confident gambler challenges you to a game.\n\n*choice\n    #Return\n        *goto floor_start\n    #Play rock paper scissors\n        *goto_scene rock_paper_scissors\n\n*label envoy_of_fortune\n\n*if (envoy_test = \"Cleared\")\n    The envoy no longer shows interest in you.\n    *page_break\n    *goto floor_start\n\nAn imposing envoy of the God of Fortune looks at you. \n\n\nThey appear to have some interest in you — even though their veiled face makes it difficult to discern.\n\n*if (tokens >= 50)\n    Try the gambling knowledge test required to reach the third floor?\n    \n    *choice\n        #Return\n            *goto floor_start\n        #Begin Examination\n            *goto_scene envoy_test\n*else\n    Unfortunately, you do not have enough tokens to try passing the test prepared by the envoy.\n    *goto floor_start\n\n\n*label divine_lottery\n\nThe Divine Lottery was what turned my life around.\n\n\nAt irregular times, the God of Fortune would hold a special lottery. The rewards would be amazingly rare and equally sought after. The full details were unknown, but only one ticket was available per person.\n\n\nI had exhausted all of my efforts to be able to buy a ticket. It was my last attempt to have a better life. The chance was almost non-existent, but it was all I had.\n\n\nThen, a miracle happened.\n\n\nI won the Divine Lottery.\n\n*page_break\n\n*goto floor_start\n\n*label founding_of_fortuna\n\nThe name of this nation was Kingdom of Fortuna, though it would be more accurate to call it a city-state. It was the main center of trade and culture on the whole continent: a vast city full of wealth, vice and opportunity. \n\n\nDespite its wealth, this kingdom had never been invaded. It was not thanks to its kings — who were practically ceremonial leaders — but due to the God of Fortune. A god had directly blessed and protected a city. Who would dare invade? Even more so since it was a god notorious for its merciless tricks and cruel punishments.\n\n\nNobody is exactly sure how or when this city was founded. It is only known that since the beginning of recorded history, it has always existed, and has always been the God of Fortune's center of influence.\n\n\nIt is rumored that the real power in the shadows is the Prophet who acts as a proxy for the God of Fortune. Nobody has ever seen them or shared plausible details, but the rumors have only gathered strength over time.\n\n*page_break\n\n*goto floor_start\n", "floor3": "*gosub_scene ending checkpurchase\n*set floor \"floor3\"\n\n*label floor_start\n\n*if (floor3_started = false)\n    *set floor3_started true\n    \n    [b]Floor 3: Competitive Gambling[/b]\n    \n    \n    Playing against the dealers of the casino was challenging enough, but it might be even more difficult to prevail against other players.\n    \n    \n    That's what the third floor seemed to be about: defeating the competition directly.\n    \n    \n    You enter the third floor and look around.\n    \n    *page_break\n\n[b]Floor 3: Competitive Gambling[/b]\n\n*choice\n    #Game: Poker\n        *goto_scene poker\n    #Talk: Fortune-teller\n        *goto fortune_teller\n    #Talk: Lender\n        *goto lender\n    #Talk: Bouncer\n        *goto bouncer\n    #Memory: Meeting a God\n        *goto meeting_god\n\n*label fortune_teller\n\nA mysterious robed figure offers you a chance to play a game.\n\n*choice\n    #Return\n        *goto floor_start\n    #Play luck catcher\n        *goto_scene luck_catcher2\n\n\n*label lender\n\nYou can borrow an unlimited amount of tokens without interest here.\n\n\nHowever, you can't leave this floor until you repay your whole debt. If you can't repay… the consequences are omitted.\n\n*choice\n    #Return\n        *page_break\n        *goto floor_start\n    #Borrow 100 tokens\n        *set borrowed_tokens +100\n        *set tokens +100\n        [b]100 tokens borrowed![/b]\n        *goto lender\n    #Repay all borrowed tokens\n        *if ((tokens >= borrowed_tokens) and (borrowed_tokens > 0))\n            *set tokens -borrowed_tokens\n            *set borrowed_tokens 0\n            [b]Debt erased![/b]\n            *goto lender\n        *elseif ((tokens >= borrowed_tokens) and (borrowed_tokens = 0))\n            [b]No debt to erase![/b]\n            *goto lender\n        *else\n            [b]Not enough tokens to erase debt![/b]\n            *goto lender\n\n\n*label bouncer\n\nIn order to advance to the next floor, the following requirements have to be met:\n\n\n[b]1) Poker cleared[/b]\n\n\n[b]2) No remaining debt[/b]\n\n\nYou can't take any tokens with you to the next floor.\n\n*if (poker_rounds_played > 800)\n    *set poker \"Cleared\"\n    *set tokens 100\n    *set borrowed_tokens 0\n\n*if ((poker = \"Cleared\") and (borrowed_tokens = 0))\n    Enter the second floor?\n    \n    *choice\n        #Return\n            *goto floor_start\n        #Enter\n            *check_achievements\n            *if not(choice_achieved_floor4)\n                *achieve floor4\n            *set wheel_of_fortune_spins +1\n            *set tokens 100\n            *finish\n\n*page_break\n\n*goto floor_start\n\n*label meeting_god\n\nAfter winning the Divine Lottery, I couldn't digest what had happened for several days.\n\n\nEventually I made my way to Fortuna, to the Temple of Fortune. There, I received a divine blessing that increased my luck drastically as a reward. After that, I even witnessed a brief revelation directly from the God of Fortune.\n\n\nI had become a candidate to become the next Prophet representing the God of Fortune. However, this was only the first step. I would need to prove my worth in several trials over many years in order to have a chance of succeeding the current Prophet.\n\n\nI gladly accepted the offer. Even a small chance at such glory was worth giving up my past life — several times over.\n\n\nSo began my long journey to overcome the trials.\n\n*page_break\n\n*goto floor_start", "floor4": "*gosub_scene ending checkpurchase\n*set floor \"floor4\"\n\n*label floor_start\n\n*if (from_russian_roulette = true)\n    *goto reckless_gamblers\n\n*if (floor4_started = false)\n    *set floor4_started true\n    \n    [b]Floor 4: Tactical Gambling[/b]\n    \n    \n    After overcoming the competition on the third floor, it was time to…\n    \n    \n    … what was this familiar presence on the fourth floor?\n    \n    *page_break\n\n[b]Floor 4: Tactical Gambling[/b]\n\n*choice\n    #Game: Commander\n        *goto_scene commander\n    #Talk: Divine Presence\n        *goto divine_presence\n    #Talk: Reckless Gamblers\n        *goto reckless_gamblers\n    #Talk: Lender\n        *goto lender\n    #Talk: Bouncer\n        *goto bouncer\n    #Memory: One Last Chance\n        *goto last_chance\n\n*label divine_presence\n\n*if (wheel_of_fortune_spins = 0)\n    The mysterious being has disappeared. Was it even real in the first place?\n    *page_break\n    *goto floor_start\n\nAn eerie presence can be felt on the floor. It is too unnatural to even look at — like a being out of this world. It offers you a mysterious object to touch.\n\n*choice\n    #Return\n        *goto floor_start\n    #Spin the Wheel of Fortune\n        *goto_scene wheel_of_fortune\n\n*label reckless_gamblers\n\n*set from_russian_roulette false\n\n*if (russian_roulette = \"Cleared\")\n    The group of gamblers has disappeared from view.\n    *page_break\n    *goto floor_start\n\nA group of advanced gamblers have gathered to play a life-threatening game: russian roulette. Some gamblers would even go so far as to gamble with their own lives… They invite you to join them.\n\n*choice\n    #Return\n        *goto floor_start\n    #Play Russian Roulette\n        *goto_scene russian_roulette\n\n\n*label lender\n\nYou can borrow an unlimited amount of tokens without interest here.\n\n\nHowever, you can't leave this floor until you repay your whole debt. If you can't repay… the consequences are omitted.\n\n*choice\n    #Return\n        *page_break\n        *goto floor_start\n    #Borrow 100 tokens\n        *set borrowed_tokens +100\n        *set tokens +100\n        [b]100 tokens borrowed![/b]\n        *goto lender\n    #Repay all borrowed tokens\n        *if ((tokens >= borrowed_tokens) and (borrowed_tokens > 0))\n            *set tokens -borrowed_tokens\n            *set borrowed_tokens 0\n            [b]Debt erased![/b]\n            *goto lender\n        *elseif ((tokens >= borrowed_tokens) and (borrowed_tokens = 0))\n            [b]No debt to erase![/b]\n            *goto lender\n        *else\n            [b]Not enough tokens to erase debt![/b]\n            *goto lender\n\n\n*label bouncer\n\nIn order to advance to the final floor, the following requirements have to be met:\n\n\n[b]1) Commander cleared[/b]\n\n\n[b]2) Russian Roulette cleared[/b]\n\n\n[b]3) No remaining debt[/b]\n\n\n[b]4) Pay 30 000 tokens[/b]\n\n\nYou can't take any tokens with you to the final floor.\n\n*if (commander_rounds_played > 500)\n    *set commander \"Cleared\"\n    *set tokens 50000\n    *set borrowed_tokens 0\n\n*if ((((commander = \"Cleared\") and (russian_roulette = \"Cleared\")) and (tokens >= 30000)) and (borrowed_tokens = 0))\n    Enter the final floor?\n    \n    *choice\n        #Return\n            *goto floor_start\n        #Enter\n            *check_achievements\n            *if not(choice_achieved_floor5)\n                *achieve floor5\n            *set tokens 0\n            *finish\n\n*page_break\n\n*goto floor_start\n\n*label last_chance\n\nAfter years of effort, I had succeeded. I had passed various trials around the continent and finally reached the Grand Casino of Fortune.\n\n\nThere would be no second chances. If I failed here, there was no telling what my fate would be. It couldn't be much worse than my past life, but even returning to that time was a terrifying thought.\n\n\nOn the other hand, passing this final challenge could grant me unimaginable rewards.\n\n\nThis would be the ultimate chance to bet my life for a glorious future.\n\n*page_break\n\n*goto floor_start", "floor5": "*gosub_scene ending checkpurchase\n*set floor \"floor5\"\n\n*label floor_start\n\n*if (conquest = \"Cleared\")\n    *check_achievements\n    *if not(choice_achieved_gameclear)\n        *achieve gameclear\n    [b]Floor 5: Seat of the Prophet[/b]\n    \n    \n    \"You have proven your worth. Now, it is time for me to retire.\"\n    \n    \n    The Prophet stood up from their throne and started walking away.\n    \n    \n    You still couldn't believe how lucky you had been to win the Divine Lottery — and to clear all these trials.\n    \n    \n    The past filled with hunger and despair was long gone. From now on, you would be the one controlling the fate of the world, through the power of wealth and luck, as a proxy for the God of Fortune.\n    \n    *if (special_blessing = true)\n        *if (spins_count = 7)\n            \n            *page_break\n            *check_achievements\n            *if not(choice_achieved_gamebonusclear)\n                *achieve gamebonusclear\n            [b]Floor 5: Seat of the Prophet[/b]\n            \n            \n            After you had sat on the Prophet's throne for a moment, an eerie yet familiar presence could be felt all around you.\n            \n            \n            \"You have especially pleased me with your performance in the Grand Casino. You were even fortunate enough to earn my special blessing during your trials. As a reward, I will grant you the rank of a demi-god. It is the highest rank ever reached among my envoys.\"\n            \n            \n            You couldn't see the God of Fortune directly, but the words were clear. As soon as they had been said, you started feeling something was very different about your body. It was as if you were starting to be detached from the mundane reality.\n            \n            \n            This was beyond your wildest dreams. Not only had you reached the top of the world, but even exceeded it.\n            \n            \n            In the end, every life was one huge gamble with varying results. Was there any way to surpass this result?\n    \n    *goto_scene ending\n\n*if (floor5_started = false)\n    *set floor5_started true\n    \n    [b]Floor 5: Seat of the Prophet[/b]\n    \n    \n    You had finally reached it. The end of your long journey.\n    \n    \n    The Prophet of the God of Fortune.\n    \n    \n    They were sitting calmly on a golden throne. It was impossible to see their features, due to them wearing a mysterious mask as well as a large robe. The surrounding audience room was luxuriously decorated — filled with symbols of wealth and power.\n    \n    *page_break\n    \n    [b]Floor 5: Seat of the Prophet[/b]\n    \n    \n    \"You have arrived. I have been waiting for you ever since you won the Divine Lottery two years ago.\"\n    \n    \n    You couldn't help but feel some shock after the Prophet spoke. They had waited for you? For years?\n    \n    \n    \"You may have thought that the Divine Lottery gave you a small chance to succeed me, among many candidates. But that is not the case. The Grand Casino is only a place to enslave with debt the souls of those who were not chosen by the Divine Lottery. You are the only one truly given this opportunity. The choice by the Divine Lottery is absolute: having such luck to win it is essential to become the Prophet. Only if you ultimately fail your trials, will another Divine Lottery be held to find a new candidate. \"\n    \n    \n    You were… the only candidate?\n    \n    *page_break\n\n[b]Floor 5: Seat of the Prophet[/b]\n\n\n\"You have done well to reach here. Now, only one final test is left. If you win a game of Conquest against me, I will allow you to become the Prophet. You can try several times, but my patience is not unlimited. If you cannot win, I will sentence your soul to eternal slavery as punishment for disappointing the God of Fortune.\"\n\n\nThe final test awaits you.\n\n*choice\n    #Game: Conquest\n        *goto_scene conquest\n", "jackpot": "*temp jackpot_1_desc\n*temp jackpot_2_desc\n*temp jackpot_3_desc\n\n*temp win\n\n*temp common_prize_odds\n*temp rare_prize_amount\n*temp jackpot_amount\n\n*label game_start\n\n*if (jackpot_common_prize_won = true)\n    *set jackpot_1_desc \"Common prize won at least once: yes\"\n    *goto after_description_set1\n*else\n    *set jackpot_1_desc \"Common prize won at least once: no\"\n    *goto after_description_set1\n\n*label after_description_set1\n\n*if (jackpot_rare_prize_won = true)\n    *set jackpot_2_desc \"Rare prize won at least once: yes\"\n    *goto after_description_set2\n*else\n    *set jackpot_2_desc \"Rare prize won at least once: no\"\n    *goto after_description_set2\n\n*label after_description_set2\n\n*if (jackpot_jackpot_won = true)\n    *set jackpot_3_desc \"Jackpot won at least once: yes\"\n    *goto after_description_set3\n*else\n    *set jackpot_3_desc \"Jackpot won at least once: no\"\n    *goto after_description_set3\n\n*label after_description_set3\n\nTokens: ${tokens}\n\n\nCurrent bet: ${bet}\n\n\n${jackpot_1_desc}\n\n\n${jackpot_2_desc}\n\n\n${jackpot_3_desc}\n\n*rand win 1 1000\n\n*choice\n    #Buy one round with your current bet\n        *if (bet > tokens)\n            [b]Not enough tokens left - you can borrow more from the lender![/b]\n            *goto game_start\n        *set tokens -bet\n        *goto game_round\n    #Change your bet\n        How many tokens do you want to bet per round?\n        *choice\n            #5\n                *set bet 5\n                [b]Bet set to 5 tokens![/b]\n                *goto game_start\n            #10\n                *set bet 10\n                [b]Bet set to 10 tokens![/b]\n                *goto game_start\n            #25\n                *set bet 25\n                [b]Bet set to 25 tokens![/b]\n                *goto game_start\n            #50\n                *set bet 50\n                [b]Bet set to 50 tokens![/b]\n                *goto game_start\n    #Rules\n        *goto rules\n    #Return\n        *goto_scene floor1\n\n*label game_round\ nt_bet_bot_1)\n        *set stack_bot_2 (orig_bot_2_stack - current_bet_bot_2)\n        *set stack_bot_3 (orig_bot_3_stack - current_bet_bot_3)\n        *set stack_bot_4 (orig_bot_4_stack - current_bet_bot_4)\n        *set stack_bot_5 ((orig_bot_5_stack - current_bet_bot_5) + pot)\n        [b]Opponent 5 won the pot (${pot} tokens) (with ${bot_5_win_condition})![/b]\n        *goto game_round\n\n*if ((bot_5_out = false) and (bot_5_poker_hand_points = highest_poker_hand_points))\n    *set pot (round(current_bet_bot_5 / highest_bet) * pot)\n    *set stack (orig_own_stack - current_bet)\n    *set stack_bot_1 (orig_bot_1_stack - current_bet_bot_1)\n    *set stack_bot_2 (orig_bot_2_stack - current_bet_bot_2)\n    *set stack_bot_3 (orig_bot_3_stack - current_bet_bot_3)\n    *set stack_bot_4 (orig_bot_4_stack - current_bet_bot_4)\n    *set stack_bot_5 ((orig_bot_5_stack - current_bet_bot_5) + pot)\n    [b]Opponent 5 won the pot (${pot} tokens) (with ${bot_5_win_condition})![/b]\n    *goto game_round\n\n*label rules\n\nPoker is a card game played with a single pack of 52 cards.\n\n\nThis is a cash game, so you can enter or leave the game at any time between rounds. There are always 6 players playing at the table. If a player is eliminated from the table or leaves it, they will be immediately replaced by another player with a fresh stack of 100 tokens.\n\n\nThis poker table requires a buy-in (entry fee) of exactly 100 tokens and mostly uses the rules of a normal no-limit Texas Hold'em game.\n\n\nEach round of the game you play, you first receive 2 random cards that are hidden from all other players. At the same time, 5 random community cards are placed on the table that are hidden for now. This stage of the game is called the [b]pre-flop[/b]. The players then take turns to make increasingly bigger bets without any limits until nobody wants to raise the stakes anymore, or if only one player has not [b]folded[/b] (given up), they instantly win the round. If one of the players makes a bigger bet, other players must either match the increase or fold. If a player can't match the highest bet otherwise, they can still go all in and bet their whole stack of tokens.\n\n\nAssuming the game is not over at this stage, 3 of the community cards are revealed and the [b]flop[/b] stage begins. Here the players can again make bigger bets if they wish. Then the game continues to the [b]turn[/b] stage where the fourth community card is revealed, and again to the [b]river[/b] stage where the final community card is revealed. If the game is still not over, it proceeds to the [b]showdown[/b] stage where all remaining players compare their poker hands.\n\n\nYour private cards can only be used by you, but the community cards on the table can be used by any player. Together, your private cards and the community cards are used to form the strongest possible combination (poker hand) of cards. The best poker hand at the showdown stage wins the [b]pot[/b] (the combined bets of all players during the round).\n\n\nHere are the possible poker hands, from best to worst:\n\n\n[b]Straight Flush[/b]: This is the highest possible poker hand. It consists of five cards of the same suit in sequence, such as 10, 9, 8, 7 and 6 of hearts.\n\n\n[b]Four of a Kind[/b]: This is the next highest hand. An example is four aces or four 3s.\n\n\n[b]Full House[/b]: This hand is made up of three cards of one rank and two cards of another rank, such as three 8s and two 4s.\n\n\n[b]Flush[/b]: Five cards of the same suit, but not in sequence, is a flush. An example is Q, 10, 7, 6, and 2 of clubs.\n\n\n[b]Straight[/b]: Five cards in sequence, but not of the same suit is a straight. An example is 9 of hearts, 8 of clubs, 7 of diamonds, 6 of diamonds and 5 of spades.\n\n\n[b]Three of a Kind[/b]: This hand contains three cards of the same rank, and the other two cards each of a different rank, such as three jacks, a seven, and a four.\n\n\n[b]Two Pairs[/b]: This hand contains a pair of one rank and another pair of a different rank, plus any fifth card of a different rank, such as Q, Q, 7, 7 and 4.\n\n\n[b]One Pair[/b]: This hand contains just one pair with the other three cards being of different ranks, such as 10, 10, K, 4 and 3.\n\n\n[b]High Card[/b]: If none of the previously mentioned combinations apply, the hand is ranked by the highest card it contains, so that a high ace hand beats a high king hand etc.\n\n\nAll players are required to bet exactly 2 tokens at the start of every round (unlike with standard poker rules where the players take turns making forced bets).\n\n\nYou need to reach a stack size of 250 tokens at least once to clear this game.\n\n\nHINT: Fold unless you have a decently strong hand (a pair like 7, 7 or two high cards like K, Q). If you do have a decent starting hand, do not go all in right away, but raise first to increase the size of the eventual pot you aim to win. Be wary if your opponents are raising the stakes; that usually means they have a strong hand!\n\n*page_break\n\n*if (rules_origin = \"preflop\")\n    *goto preflop\n*elseif (rules_origin = \"flop\")\n    *goto flop\n*elseif (rules_origin = \"turn\")\n    *goto turn\n*else\n    *goto river\n", "rock_paper_scissors": "*temp win\n*temp hand_choice\n*temp opponent_hand_choice\n*temp won\n\n*label game_start\n\nTokens: ${tokens}\n\n\nWins (out of 10 rounds): ${rps_wins_count} (${rps_result1} / ${rps_result2} / ${rps_result3} / ${rps_result4} / ${rps_result5} / ${rps_result6} / ${rps_result7} / ${rps_result8} / ${rps_result9} / ${rps_result10})\n\n*rand win 1 1000\n\n*choice\n    #Play a round (Rock) (cost: 10 tokens)\n        *if (tokens \u003c 10)\n            [b]Not enough tokens left - you can borrow more from the lender![/b]\n            *goto game_start\n        *set hand_choice \"Rock\"\n        *set tokens -10\n        *goto game_round\n    #Play a round (Paper) (cost: 10 tokens)\n        *if (tokens \u003c 10)\n            [b]Not enough tokens left - you can borrow s_result9 \"Lost\"\n        *goto handle_wins_count_finish\n*elseif (rps_wins_tracker = 10)\n    *if (won = true)\n        *set rps_result10 \"Won\"\n        *set rps_wins_count +1\n        *goto handle_wins_count_finish\n    *else\n        *set rps_result10 \"Lost\"\n        *goto handle_wins_count_finish\n    \n*label handle_wins_count_finish\n\n*if (rps_wins_count = 6)\n    *set tokens +300\n    *set rps_game_won true\n    *set wheel_of_fortune_spins +1\n    \n    [b]You won the challenge and received 300 tokens![/b]\n    *check_achievements\n    *if not(choice_achieved_precognition)\n        *achieve precognition\n    *page_break\n    \n    *goto_scene floor2\n\n*set rps_wins_tracker +1\n\n*if (rps_wins_tracker = 11)\n    *set rps_wins_tracker 1\n    *set rps_wins_count 0\n    *set rps_result1 \"-\"\n    *set rps_result2 \"-\"\n    *set rps_result3 \"-\"\n    *set rps_result4 \"-\"\n    *set rps_result5 \"-\"\n    *set rps_result6 \"-\"\n    *set rps_result7 \"-\"\n    *set rps_result8 \"-\"\n    *set rps_result9 \"-\"\n    *set rps_result10 \"-\"\n\n*goto game_start\n\n*label rules\n\nRock paper scissors is a game where you and your opponent choose one of three options per round: rock, paper or scissors. If you both choose the same option, the result is a tie. Rock beats scissors, paper beats rock and scissors beats paper.\n\n\nThis challenge requires you to win 6 out of 10 rounds (ignoring all tie results). If you succeed, you will receive 300 tokens. If you fail, you can try again until you succeed.\n\n\nPlaying a round costs 10 tokens. If the result is a tie, the tokens are refunded.\n\n\nThe choices of the opponent aren't random — try to guess their patterns to win more rounds!\n\n*page_break\n\n*goto game_start", "roulette": "*temp roulette_1_desc\n*temp roulette_2_desc\n*temp roulette_3_desc\n*temp roulette_4_desc\n\n*temp win\n\n*temp odds_limit_oddeven\n*temp odds_limit_columndozen\n*temp odds_limit_rowsplit\n*temp odds_limit_singlenumber\n\n*temp oddev
