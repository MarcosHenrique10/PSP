<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rain King — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>

  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>

    <button id="btn-load" class="btn small">Load</button>

        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "rainking", "title": "Rain King", "scenes": {"action": "*comment ACT 1 SCENE 7\n\n[Remember to check stats to see how you are doing.]\n\n[i]The day the Rain King died…[/i]\n\nCloudy. You are sitting in the driver seat. Parked before the black cathedral. In your open palm you have a dark red pill. It's price, almost as much as your home's. You feel like you are holding a microscopic atomic bomb. This is the only way to do this. You swallow the pill. You don't feel anything, but a faint stomach ache…\n\nIt starts. A screeching sound like that of a metro train but much louder. You feel like you are going deaf. The vision blacks out for a second. You don't feel gravity. You can't breathe enough. Your hearing starts to resort to normal. Your nose starts to bleed a little. You get out of the car. The ground is shaking. Now you know why this pill works. All your senses are enhanced. Even in life or death situations in war, you have never felt this alive. A tiny drop of rain hits your face.\n\nIt's time to kill the Rain King.\n\n*page_break\n\nTwo guards stand before the mighty cathedrals entrance. Their armor represents the typical royal armor. They are conversing with each other, not paying attention to you.\n\n*fake_choice\n    #Use hand-to-hand combat.\n        You approach the guards, holding all the energy inside. One of them puts his hand up to stop you as he says -Hey, you - you grab his hand and hammer his fingers with your other hand, breaking most of them. He lets out a scream. The other guard tries to point the gun at you, but you quickly disarm him and kick him on the side of his leg, making him fall on one knee. You punch the first guy on the face and turn to the second to spin his head and break his neck. The first one watches terrified as you knee him on the chin, slamming him on the floor. You kick the door open and enter inside.\n    #Use your handgun.\n        With a swift motion of your hand, your half sphere bracelet is transformed in your handgun. As the guards notice this, it is too late. You shoot the first in his head and the second one in his hand preventing him from using his firearm. You shoot again the second one in the head while he holds his bloodied hand. The doors are washed in blood and brains now. You kick the door open and enter inside.\n    *if (sub_m) #Use submachine guns.\n        As you get close enough for the two guards to notice what you are holding you spread your arms and do a double headshot leaving the doorway sides washed in blood. You kick the door open and enter inside.\n    *if (rocket) #Use rocket-launcher.\n        The guard can't even believe what you pull out. You press the four-finger button and the projectile launches. You're pushed back a little as the guards and the doorway are utterly destroyed by an explosion you didn't quite expect. As the smoke and dust falls you approach the shattered entrance.\n    *if (katana) #Use katana.\n        You approach the guards, holding all the energy inside. One of them puts the hand to stop you as he says -Hey, you - you carve him diagonally with your sword. As blood begins to pour on his armor, you cut the other guards head off, just as easily. Blood spurs from his neck like a small fountain. Both the bodies fall down speechless. You kick the door open and enter inside.\n    *if (throwing) #Use throwing knives.\n        You approach the guards, just enough for them to not doubt what is about to happen, and you throw two knives at them. Both hit their throats. They try to talk but all they can do is make low sounds of pain as they fall dead on the floor making pools of blood. You kick the door open and enter inside.\n    *if (grenades>0) #Throw grenade.\n        *set grenades -1\n        They keep conversing until they see what rolls between their feet. They don't have time to act as the grenade explodes leaving them both frozen and clashing their cold bodies on the sides of the doorway. Some tiny frozen pieces of them fall to the ground. You approach the cold air and kick the door open.\n        \n\nOnce inside, you waste a split second to see three guards and many people in suits. Two of the guards have pointed the gun at you. You dash down one of the sofas used as a resting place in the middle of the cathedrals main hall, which, as you realize, is used as a comfortable, yet uncanny lobby. As you take cover one of the witnesses starts to run the other way scared, but she is shot before your eyes by the guards who missed you. One of the guards yells at the people to evacuate. If you don't act soon they will pin you down.\n\n*fake_choice\n    #Use hand-to-hand combat.\n        You wait for the guards to approach and then you strenuously push the sofa towards the middle guard, neutralizing him for the moment, and immediately launch yourself to the one on the left and do a sweep kick. You grab his body, not letting it hit the floor, and use it as a human shield. The last guard shoots at you, but luckily all bullets hit his friend. You do fall back though. Using the dead guards firearm, you turn back fire killing the attacker and causing an outburst of blood. The last alive, still laying screams:\n        \n        -I NEED THE FUCKING REINFORCEMENTS!\n        \n        He tries to shot you and manages to hit you on your chest, your body armor preventing any serious injury. You kick his gun out of his hands and then kick his face hard, finishing him.\n    #Use your handgun.\n        You use one of the many glasses in the building to pinpoint their location and then quickly go up shoot one of them in the head and take cover again. They fire just late enough for you to not meet any bullets. The sofa is barely usable as a concealment anymore. You slide to one of the cathedrals colons blowing another guards head, and getting a few scratches from the broken glass along the way. The last alive screams:\n        \n        -I NEED THE FUCKING REINFORCEMENTS!\n        \n        Knowing that he has his gun pointed at your location, you drop low and shoot him on his leg, forcing him to fall and miss, but you don't miss.\n    *if (sub_m) #Use submachine guns.\n        You fire above the coach blindly and you hear the grunts of the guards, meaning you have hit them. Using this momentary advantage you jump over the sofa, shooting two edgewise guards in the head and jumping over the middle one. Pointing both guns at his head while he is under you. He makes a futile attempt to escape but you fire again, his blood splattering all over your face and armor.\n    *if (shotgun) #Use shotgun.\n        You pull out the shotgun and use the sofa to jump high in the air shooting the guard on your left and falling right above the middle one. Your knee hits his head mid-air, and by the time you reach the ground you can hear the snap of his neck on your knee. Turning to the last alive you are grazed by a bulled while he is hit by the scattered barrel, his body sent slamming on the front desk, breaking in half.\n    *if (minigun) #Use minigun.\n        You pull out the heavy gun and as the barrels start spinning you lose cover and unleash a hail of bullets. While you do take two or three hits yourself, nothing your body armor can't handle, you have unleashed hell upon those bastards killing them and everyone in between. You finish the bloodbath as the room falls silent.\n    *if (grenades>0) #Throw grenade.\n        *set grenades -1\n        Knowing now their position you throw a grenade, you can hear their surprise as they are thrown apart from the cold. Two of them fall down totally frozen. The last one having lost only his arm screams:\n        \n        -I NEED THE FUCKING REINFORCEMENTS!\n        \n        He tries to shot you and manages to hit you on your chest, your body armor preventing any serious injury. It's the last time he fires as his head is blown by your shot.\n\nThe alarm activates and fire sprinkles begin watering the whole room.\nYou hear steps. Lots of steps. On the platform above you see people approaching, strategically, carefully. Hiding behind a dark cathedral colon, you count at least five. You hear the elevator doors opening and radio talking on the floor below, where you also are. More guards. No, taking a glimpse at one of them, you perceive that these are full military personnel, even their armor differs. They do not ask for you to surrender yourself, meaning you are now a kill-only target. Knowing the elevated point gives them advantage, you decide is better to take care of the enemies above first.\n*fake_choice\n    #Use your handgun.\n        Starting with the one who has his leg out of cover you shoot at it. His head falls out of cover and another bullet goes through it. You can hear his friends communicating. You use this split second to change your cover. Two of them get out and start firing at the colon you were previously hiding. You fire the first one in the head but manage to only injure the second one as he is pulled back by his friend. You wait for the other two guards to show themselves, laying down on the ground you shoot them both, with unnatural speed. The other enemies, on the other hand, are close enough. You realize this as you take shots in your abdomen, your body armor absorbing them, not without damage. You retreat behind the colon.\n    *if (assault) #Use assault gun.\n        You pull out this versatile weapon. And calmly wait for them to show themselves. When it happens, you roll and start dodging their bullets. Moving cover to cover, with unnatural speed. Precisely firing and eliminating them one by one. You are a death machine.\n    *if (minigun) #Use minigun.\n        The barrels of the minigun start spinning and the noise of discharge and screams of death fill the area. Their cover cannot stand against the storm of bullets. You release the trigger and the red hot barrels slowly come to a halt while the platform above barely stands, cement dust covering the bloodied, unmoving bodies.\n    *if (rocket) #Use rocket-launcher.\n        This is exactly the situation to use this demon. You fire a rocket, which is destructive enough to crumble the platform, and everybody on it. You shoot again, this time the blazing explosion causing a furore of smoke and dust. Where once stood the platform now stands burned cement and limbs.\n    *if (grenades>0) #Throw grenade.\n        *set grenades -1\n        Quickly calculating the explosion range of the grenade, you throw it at the exact position to hit all of them. Cold fills the air and frozen sculptures stand where once the soldiers stood.\n\nTaken care of the soldiers above, you find yourself half surrounded by the others. They are close and some of them have electric bats. The situation is severely dangerous. It's time to act. You take a deep breath.\n\n*fake_choice\n    #Use hand-to-hand combat.\n        Moving swiftly and stealthy, you sneak behind one of them and break his neck. You kick the gun out of the hand of the one in front of you and dodge the electric bat of another trying to hit you on your side, grabbing his wrist in the process. You hit his arm from below breaking his elbow and turn your attention to a third guard going low just before he swings with his electric bat and punching him in the stomach. Two more guards start shooting on your direction. You do a leg swing on the first guy, now unarmed, get up and punch at the throat the other one using his body as cover for the shots. The third one grapples you, making using your arms impossible. He is surprisingly strong. You climb the wall and push back, also hitting him with the back of your head and dodging bullets meanwhile. Using bodyweight to get up you throw a helmet to one of the armed guards and dash towards them ducking his friend trying to bash his gun on your face and uppercutting him, his feet going off the ground. The other one punches you in the nose. Pain. You dodge his second punch and knock him out with your elbow. You jump high just as the last one behind you tries to hit your legs. With a kick on his face the last soldier falls to the ground.\n    #Use your handgun.\n        You quickly run to one of the guards carrying an electric bat and triple kick him. Shooting another armed guard in the process. Using your bodyweight to quickly get off the ground, you do two headshots, just before a soldier almost hits you behind with an electric bat. Using your gun as melee weapon you punch him in the face and then quickly spin your gun in your hand to shoot two other guards. The last guard grapples you from behind, making using your arms impossible. He is surprisingly strong. You stretch just enough to shoot his leg, forcing him to release you. With a last gunshot you end the finals soldier life. \n    *if (sub_m) #Use submachine guns.\n        You start sprinting behind the colons firing mercilessly, yet oddly accurately, at the guards. As the area becomes a blood bath, you take a few deadly shots yourself, if it wasn't for the body armor. You run is stopped by an electric bat hitting your fingers, forcing you to release one of your guns. You throw the other one at the attacker neutralizing him for the moment, ducking his friend trying to bash his gun on your face and uppercutting him, his feet going off the ground. The other one punches you in the nose. Pain. You dodge his second punch and knock him out with your elbow. You use your leg to kick your submachine gun back to your hand and do a final headshot.\n    *if (shotgun) #Use shotgun.\n        You start sprinting behind the colons firing mercilessly, yet oddly accurately, at the guards. As their bodies fly far back and the area becomes a blood bath, you take a few deadly shots yourself, if it wasn't for the body armor. You run is stopped by an electric bat hitting your fingers, forcing you to release the shotgun from one of your hands. Using your other hand you point the gun at the attacker and blow his brains up, his head ing your knife in your other hand you cut his throat. He holds his throat and falls to the ground, speechless. You start to bleed from your ear.\n    *if (katana) #Use katana.\n        Before he has a chance to move his finger, you cut his arm off with terrifying speed. Next, his head.\n\n\nYou keep walking forward, feeling no tiredness whatsoever. Corpses are scattered around the cathedrals ground floor. You pass above one of them, stepping in blood. You can't help but feel amazed at your skills as a fighter. As you approach the elevator you hear a panted breathing from the side. One of the soldiers that came on the platform up has survived. He doesn't seem able to move or talk.\n*fake_choice\n    #Help him.\n        As you approach, you hear his breathing getting faster. He manages to mumble some words:\n        \n        -Please! I have-\n        \n        He coughs blood. You get him in a better position and bandage some of his wounds.\n        *set honor %+10\n        *set altruism %+30\n        *set obstinate %-20\n        *set tenderness %+20\n    #Keep moving.\n        *set honor %-10\n        *set altruism %+5\n        *set obstinate %+20\n        *set tenderness %+5\n    #Put a bullet in his head.\n        As you approach, you hear his breathing getting faster. He manages to mumble some words:\n        \n        -Please! I have-\n        \n        His head explodes in blood.\n        *set honor %+10\n        *set altruism %-5\n        *set obstinate %+10\n        *set tenderness %-5\n    #Punch him to death.\n        As you approach, you hear his breathing getting faster. He manages to mumble some words:\n        \n        -Please! I have-\n        \n        You punch him in the face. And again. And again. And again. Some of his blood getting in your mouth. And again. And again. And again. And again. He has now stopped breathing. Your hands are washed in fresh blood.\n        *set honor %-20\n        *set altruism %-20\n        *set obstinate %-10\n        *set tenderness %-20\n\nYou enter the elevator and press the button. The doors close, blocking the image of the catacomb you caused from your view. You see a beast in the mirror before you. You turn your back. Outside a heavy rain has started. Suddenly the elevator changes the floor destination. They have prepared a trap. The floor will be pitch black and they will be waiting for you. But you expect this. What they don't expect is you are prepared for this. You put on dark vision lens. After a few seconds of nothing but the noise of the cables, the elevator comes to a stop. The wide corridor is filled with armed guards. The doors open calmly and you decide your strategy.\n*fake_choice\n    #Use hand-to-hand combat.\n        No one is inside the elevator. One of the guards approaches, carefully, slowly. He is pulled up. A few on the corridor shoot. When they stop firing you throw their friends body at them. You run on the wall and kick one of the attackers. Then, start sprinting on the corridor punching and kicking through the way. Your body is a weapon and it's too fast for them to hit it. One side of the corridor is wall made of glass that offers a dim view of the city. The inside of this glass quickly gets dirty in blood and gunshots. You keep dodging and breaking bones. Bodies are thrown on the ground and on the walls. After a some exhausting seconds you break the neck of the last one.\n    #Use your handgun.\n        No one is inside the elevator. One of the guards approaches, carefully, slowly. He is pulled up. A few on the corridor shoot. When they stop firing you lower yourself backwards and shoot at some of their heads. You release down as they return fire. You run on the wall and kick one of the attackers, while shooting another one. Then, start sprinting on the hallway only your gunfire lighting the way. You are too fast for them to hit. One side of the corridor is wall made of glass that offers a dim view of the city. The inside of this glass quickly gets dirty in blood and gunshots. You keep dodging their bullets and using yours to hit them in their weak spots. The ground and walls turn red. After a some exhausting seconds the last gunshot is heard.\n    *if (sub_m) #Use submachine guns.\n        No one is inside the elevator. One of the guards approaches, carefully, slowly. He is pulled up. A few on the corridor shoot. When they stop firing you lower yourself backwards and using your two guns rapid fire at them. You release down as they return fire. You run on the wall and kick one of the attackers, while keeping firing with one hand. Then, start sprinting on the hallway only gunfires lighting the way. You are too fast for them to hit. One side of the corridor is wall made of glass that offers a dim view of the city. The inside of this glass quickly gets dirty in blood and gunshots. You keep dodging their bullets and using yours to put holes in them. The ground and walls turn red. After a some exhausting seconds you release the trigger.\n    *if (shotgun) #Use shotgun.\n        No one is inside the elevator. One of the guards approaches, carefully, slowly. He is pulled up. A few on the corridor shoot. When they stop firing you lower yourself backwards and using your shotgun you return fire. You release down as they return fire. You run on the wall and kick one of the attackers, while shooting his friend. Then, start sprinting on the hallway, your gunfires lighting the way. You are too fast for them to hit. One side of the corridor is wall made of glass that offers a dim view of the city. The inside of this glass quickly gets dirty in blood and gunshots. You keep dodging their bullets and shoot them, the impact flying them away. The ground and walls turn red. After a some exhausting seconds the last shotgun shot is heard.\n    *if (rocket) #Use rocket-launcher.\n        No one is inside the elevator. One of the guards approaches, carefully, slowly. He is pulled up. A few on the corridor shoot. When they stop firing you lower yourself backwards and shoot a rocket at the corridor. The explosion lights the hallway with an angry sound. One side of the corridor is wall made of glass that offers a dim view of the city. This side is shattered into pieces of burned glass. You walk out of the smoky elevator and finish the last few gravely injured survivors.\n    *if (grenades>0) #Throw grenade.\n        *set grenades -1\n        No one is inside the elevator. One of the guards approaches, carefully, slowly. He is pulled up. A few on the corridor shoot. When they stop firing you throw a grenade at their legs. One of them tries to catch it and throw it back, but he is not fast enough. The explosion fills the hallway with chill. One side of the corridor is wall made of glass that offers a dim view of the city. This side is now covered in a cold mist. You walk out of the elevator in the icy corridor to see that everyone is frozen to death or gravely injured and shaking. You easily finish the surviving threats.\nThe hallway has become a valley of death.\n\nYou start walking towards the stairs, trying to ignore the silent bodies behind you. You stop. There is a red dot on your chest. A sniper. You quickly throw yourself in the ground and find cover. The sniper shoots and a hole the size of a fist is engraved on the wall. There is no way to find where that came from. A thunder lights the bloodied hallway. You know the sniper is waiting for your move. You have no choice but to dart.\n*choice\n    #Run.\n        *if (quinta_help)\n            You run as fast as you can. As you find yourself behind cover and the blur on your eyes goes away, you ascertain that no shots were fired. You smile at yourself, knowing that somewhere out there Quinta is taking care of you. She has taken care of this sniper.\n            *goto stairs\n        *else\n            You run as fast as you can. It is not enough. One bullet pierces through your forearm. As you find yourself behind cover and the blur on your eyes goes away, you check your forearm. Luckily the shot only grazed the bone, otherwise you would have lost your arm. You rapidly bandage your open flesh. Even moving your fingers hurts, but it will do. It has to do.\n            *set health -1\n            *goto stairs\n*label stairs\n\nYou start climbing the stairs as you hear the echo of the radios and steps of other soldiers. The king has thrown his last brawn at you. You decide how will you deal with this.\n*fake_choice\n    #Use hand-to-hand combat.\n        You sprint through the stairs, wall running at the last moment before kicking one of the enemies in the head. You slide down, just before the other shoots and kick him from below. Keeping your momentum, you use the handrail to jump yourself up and step on another guards head. Using your knees you break another ones neck. You keep sprinting, your breathing becoming louder. One of the guards tries to punch you. You dodge his blow and push him away using his own momentum to throw him off. A kick almost hits you, only just touching your ear. You pull the kicker from his leg and bash his head on the handrail. The last one fires directly at you. You do a backflip, managing to dodge his shots. You then jump to the handrail, next to the wall and then do a critical punch to the last one.\n    #Use your handgun.\n        You sprint through the stairs, wall running at the last moment before kicking one of the enemies in the head. You slide down, just before the other shoots and return fire. Keeping your momentum, you use the handrail to jump yourself up and step on another guards head, while shooting another at his face. You keep sprinting, your breathing becoming louder. One of the guards tries to punch you. You dodge his blow and shoot him just enough to throw him off. A kick almost hits you, only just touching your ear. You pull the kicker from his leg and bash your gun in his mouth, firing inside. The last one fires directly at you. You do a backflip, managing to ts and throw two knives at his chest. Keeping your momentum, you use the handrail to jump yourself up and step on another guards head, while throwing a knife at another ones head. You keep sprinting, your breathing becoming louder. One of the guards tries to punch you. You dodge his blow and thrust a knife in his throat. A kick almost hits you, only just touching your ear. You pull the kicker from his leg and thrust a knife on his eye. The last one fires directly at you. You do a backflip, managing to dodge his shots, while throwing two other knives at his body. You pull one those knives out, using it to kill the last one.\n\n\nHaving no time to spare you keep running through all the floors, effortlessly. Minutes pass by, but you don't feel anything, not even time. Finally you arrive at the last floor, the royal floor. Even through decorated by designers and artists from all around the Sacred Kingdom, the colorful trinkets and paintings can not obscure the dark heart of the cathedral. The atmosphere remains uneasy. You open the splendid door, and quickly pull yourself to cover as a soldier with a heavy mechanical suit starts firing its two miniguns at you, destroying most ornaments in its way. Even this last room is guarded. You have to find a way to eliminate this last guardian and you know they have bullet proof armor and systems against frost grenades.\n*fake_choice\n    #Use hand-to-hand combat.\n        You wait until the attacker stops firing for a moment and use the doors upper casing to swing yourself at the robotic armor. You are close enough to make his guns useless and you use your whole strength to rip off one of it's electric control system components, hurting your fingers badly along the way. You try to rip off another component but you are thrown on the wall and you fall down. Your back hurting a lot. You can barely pull yourself up as the enemy approaches.\n        *page_break\n        You hardly manage to dodge one of it's blows and use all your remaining strength to kick him in his feet and throw him off balance. You immediately grab one of the ornaments, what looks like a golden trophy and start thrusting it like a madman at the glass that protects the pilots head. You feel your ankle start to ache. He gets up just as the glass gives up. You grab one of the sharp glass pieces, cutting your hand in the process and thrust it at the guards face. You fall back from the mechanical suit. Lying in the ground covered in a mix of your blood, and that of the dead guardian.\n    #Use your handgun.\n        You wait until the attacker stops firing for a moment and drop cover for a split second to make an accurate shot at one of it's primary electric control system components. Using his brief shock you approach him, making a number of shots at the glass that protects the pilots head, no one piercing through. He speedily gets close to you and throws you at the wall. You fall down. Your back hurting a lot. You can barely pull yourself up as the enemy approaches.\n        *page_break\n        You hardly manage to dodge one of it's blows and use two shots to fire at his feet and throw him off balance. You immediately throw yourself on top of him and start shooting at the same point of glass that protects the pilots head. He gets up just as the glass gives up. One bullet manages to get through the hole hitting him in the face, filling the glass with blood on the inside. You fall back from the mechanical suit.\n    *if (assault) #Use assault rifle.\n        You wait until the attacker stops firing for a moment and drop cover for a split second to make a series of accurate shots at it's primary electric control system components. Using his brief shock you approach him rapidly firing at the glass that protects the pilots head, no bullet piercing through. He speedily gets close to you and throws you at the wall. You fall down. Your back hurting a lot. You can barely pull yourself up as the enemy approaches.\n        *page_break\n        You hardly manage to dodge one of it's blows and grab your rifle to shoot him on one feet and throw him off balance. You immediately throw yourself on top of him and start firing without break at the same point of glass that protects the pilots head. He gets up just as the glass gives up. Bullets manage to get through the hole hitting him in the face, filling the broken glass with blood on the inside. You fall back from the mechanical suit. Lying in the ground covered in a mix of your blood, and that of the dead guardian.\n    *if (minigun) #Use minigun.\n        You wait until the attacker stops firing for a moment and drop cover for a split second to hit him with a shower of bullets. Using his brief shock you approach him slowly, focusing your fire at the glass that protects the pilots head, no bullet piercing through. He speedily gets close to you and throws you at the wall. You fall down. Your back hurting a lot. You can barely pull yourself up as the enemy approaches.\n        *page_break\n        You hardly manage to dodge one of it's blows and grab your minigun and swing it at one of his feet throwing him off balance. You immediately throw yourself on top of him press the barrels against the glass that protects his head and start firing. He gets up just as the melting glass gives up. Bullets get through drilling through his face, filling the broken glass with blood. You fall back from the mechanical suit. Lying in the ground covered in a mix of your blood, and that of the dead guardian.\n    *if (rocket) #Use rocket-launcher.\n        You wait until the attacker stops firing for a moment and drop cover for a split second to shoot a rocket at it's face. As the smoke from the fiery explosion dissipates, the figure of the huge robotic suit on fire, laying on the ground shows itself. The soldier on the inside is still alive, but not for long. You get on the back of the burned suit and \"fix\" a few things. You walk away as another explosion, much larger, coming from the suit, throws you on the ground.\n    *if (throwing) #Use throwing knifes.\n        You wait until the attacker stops firing for a moment and drop cover for a split second to throw one knife accurately at it's primary electric control system components. Using his brief shock you approach him throwing a few knives at the glass that protects the pilots head, no one piercing through. He speedily gets close to you and throws you at the wall. You fall down. Your back hurting a lot. You can barely pull yourself up as the enemy approaches.\n        *page_break\n        You hardly manage to dodge one of it's blows and use one of the knives on the floor to thrust it at his feet and throw him off balance. You immediately throw yourself on top of him and start thrusting your knife like a madman at the glass that protects the pilots head. You feel your ankle start to ache. He gets up just as the glass gives up. You push the knife in the guards face, cutting your hand in the process. You fall back from the mechanical suit. Lying in the ground covered in a mix of your blood, and that of the dead guardian.\n*set health -1\nYou gradually get up, cough hurting your lungs. Your body begging you for a break. Outside, you can hear a rainstorm has introduced itself.\n\nYou open the door of the King's room.\n*finish\n", "aftermath": "*comment ACT 1 SCENE 8 (final)\n\n[Remember to check stats to see how you are doing.]\n\n[i]Present…[/i]\n\nThe Rain King is dead.\n*achieve rk_dead\n\nYou feel a liquid in your face. It's your blood. You stand on your feet, before the shattered wall. Gazing in the heavy storm... Thunders, like veins of God light the silhouette of Megalopolis. You can discern fires blooming on the tall skyscrapers. You feel like even in the clatter of the storm you can hear the sirens of police cars, the clamor of rebels.\n\nThe revolution has started.\n*gosub trial_end\n\n*page_break\n\n*if (explosion)\n    You hear, what you think is an explosion, followed by a slight tremble in the ground. You watch down to see indeed fire fighting the heavy rain. You fall on the floor as the whole tower you are in begins to fall. Tens of floors below a bomb has detonated causing the cathedral spire to crumble. Everything falls with frightening speed, you grabbing on to anything you can. You are hit by a block of stone on your shoulder and sent slamming on the wall in front of you. Then you slip out of the room. Before you only darkness and rain. You think to yourself: this is it. This is your end. There is no way to get out of this.\n    \n    \n    You than fall over a drone, breaking a rib or two, and rolling on the side, gliding on the symmetric cathedral wall. You now are close to the ground, but moving too fast.\n    *set health -2\n    *page_break\n    You start to regain senses. Your whole body in agony. You open your eyes, blackness. You try to breath but water enters in your lungs. Or is it blood? You try to move, but your body is covered in ruins. You are mostly under water. You manage to stretch your neck and breathe some dusty air, followed by painful coughing.\n    \n    Suddenly a relief, as some of the stones are pulled away from your body. Your face is covered in blood and dirt, but you can see somebody is helping you. Finally she pulls you out of the puddle of rainwater and blood, as the pain in your muscles and bones repels. You see now clearly before your face Melody ${surname}.\n    \n    [b]End of Act I[/b]\n    *achieve c_act1\n    *finish\n*else\n    You see an explosion on another spire, adjacent to yours. Looks like the renegades are doing their job fine. The tower, tall tens of floors, begins to crumble and fall before your eyes, taking a last look thanks to a thunder, before disappearing in the darkness below. You start to descend the disfigured cathedral. The effect of the pill is ending and the agony is kicking in. You limp out of the ghostly halls, into the streets, only to see before you a hooded figure f (armed)\n    On your wrist, your handgun is locked.\n    *goto elev\n*label elev\nYou feel tired and resolute at the same time.\n\nAt last the elevator arrives. You have to climb the last two floors as construction isn't over. When you get to the open roof a strong wind hits you, almost sending you off balance. It's chilly in here, and not easy to breath. The roof it's the size of two pitches, but more than half of it is unfinished, only the steel skeleton completed. You get closer to the man in the red coat, the only person here except you. Vittorio Ziat turns towards you.\n\n-The Black Cathedral is a wonder made by mankind's hands. To live in it, nah, to own it is something unimaginable by most people. Yet, the Rain King choose to build this. Apex Crown. Something so ridiculously great, it makes the Cathedral seem tiny. You can never satisfy human appetite, can you?\n*fake_choice\n    #-You can't.\n        -We just want more and more and more…\n        *set honor %-5\n        *set altruism %-5\n        *set obstinate %-5\n        *set tenderness %+5\n    #-You're wrong.\n        -Am I really? You believe otherwise. Unfortunately I can't say I enjoy your optimism.\n        *set honor %+5\n        *set altruism %+5\n        *set obstinate %-5\n        *set tenderness %+5\n    #-You couldn't satisfy Rain King's appetite.\n        -Hehehe. On that we agree.\n        *set honor %-20\n        *set altruism %-5\n        *set obstinate %-5\n        *set tenderness %-5\n    #-Why did you call me here?\n        *set obstinate %+10\n        *set tenderness %-10        \n\nHe takes a loud breath.\n\n-FUCK YOU MEGALOPOLIS!\n\n-Sorry, I needed to let that one out.\n*if (explosion)\n    You did a great job ${name}. An unbelievable job. You set the wheel in motion.\n    \n    *if (armed)\n        He takes a look at your gun.\n        *goto tl\n    *label tl\n    He has a gun locked on his arm.\n    \n    -The question is: What are you going to do now? You don't want to reign do you?\n    *goto wheel\n*else\n    We did a great job together ${name}. An unbelievable job. We set the wheel in motion.\n    \n    *if (armed)\n        He takes a look at your gun.\n        *goto tl2\n    *label tl2\n    He has a gun locked on his arm.\n    \n    -The question is: What are we going to do now? You don't want to reign do you?\n    *goto wheel\n\n*label wheel\n*choice\n    #-Yes, I do actually.\n        -Oh, I see.\n        \n        *label shoot\n        *if (armed)\n            He tries to shoot you, but you are the better marksman. He looks at his bloody hand and then you.\n            \n            *if (explosion)\n                *goto fall\n            *else\n                -We helped you. The renegades…\n                *goto fall\n            *label fall\n            \n            He falls back, blood flowing from him, until he disappears in the city smog.\n            *finish\n        *else\n            *goto hanging\n    #-No, I don't.\n        *if (armed)\n            -And how can we trust you exactly, with such an overwhelmingly important thing, when we had one little request from you, and you didn't respect it at all.\n            \n            He is looking at your gun.\n            \n            -If you don't trust me, than why should I trust you. If you wanted to be safe, than I also want to be safe.\n            \n            *goto shoot\n        *else\n            *if (explosion)\n                -The problem is, my dear friend, we never worked together. And we cannot put all our faith in your negligible word. I'm sorry it has to end this way.\n                *goto hanging\n            *else\n                -Exceptionally well. Everything is going according to the plan then. We are putting a lot of faith in your candid word ${name}. Please do not disappoint us.\n                \n                He leaves.\n                *finish\n    #-Maybe.\n        -What we are discussing is absolutely no joke ${name}! Now, be good and decide your life's worth.\n        *goto wheel\n    *selectable_if (armed) #-Shoot him. [Have gun]\n        *goto shoot\n\n*label hanging\nHe starts shooting at you. You jump, trying to dodge his bullets. You roll, but he is a good shooter. In this life-or-death chaos you fall off the edge. You instinctively turn and grab at one of the steel bars. Barely holding on to the cold steel as the wind tries to blow you off. Your fingers ache. Vittorio appears above. He points the gun at you.\n*page_break\nBefore he is able to press the trigger something pushes him from behind. He falls back with a scream, until he disappears in the city smog. After you get up with difficulty, you check for any sign of who helped you. Nothing. Even the elevator is where you left it.\n                \n", "awake": "*comment ACT 2 SCENE 9\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nYou feel like your eyes are being pushed inside your head. Your vision is speeding. You open your eyes. You are in a narrow submarine corridor. There is only a red light above. Both ends of the corridor are dark. You feel wetness in your feet. The corridor is begging to fill up with water. This is happening too fast.\n*fake_choice\n    #Stay in the light.\n        *set obstinate %+10\n        *set tenderness %+10\n    #Run in the darkness\n        *set obstinate %-10\n        *set tenderness %-10\n\nYou take one last big breath as the water reaches the ceiling… You are running out of breath… You are drowning…\n\n*if (project)\n    You start hearing voices:\n    \n    -What's happening? Is waking.\n    \n    -It wasn't supposed to happen like this.\n    \n    -Yes, but we don't have time. Why is-\n    \n    You open your eyes. You are in a covered bed, like a pod. You take deep breaths. You feel… Alive. Everything feels so real. The cover is opened and you see a face above your head, Melody.\n    \n    -We have less than a minute so listen very carefully. Everything you lived until now was a simulation. It was based on your real memory. That's why your recollection of memories has holes. You did an amazing job in the simulation ${name}. This, now, is reality. Whatever you do, remember, things here don't work like when you were in the simulator. Mistakes are deadly and you are not a superhero.\n    \n    The whole building you are in moves, like a it was struck by something. You see another girl in front of your sister. Melody continues.\n    \n    -Clody and I have to do something before leaving the building. You'll have to leave now. Out there, they will try to exploit you. Do not believe anything they say. And always protect Project Cognition.\n    *goto elevator\n*else\n    You start hearing a voice:\n    \n    -Come on, come on! Wake up! What are you doing? We don't-\n    \n    You open your eyes. You are in a covered bed, like a pod. You take deep breaths. You feel… Alive. Everything feels so real. The cover is opened and you see a face above your head, Melody. She has blood on her face and seems to be holding a wound.\n    \n    -We have less than a minute so listen very carefully. Everything you lived until now was a simulation. It was based on your real memory. That's why your recollection of memories has holes. Why couldn't you just protect the damn project ${name}! Anyway, this, now, is reality. Whatever you do, remember, things here don't work like when you were in the simulator. Mistakes are deadly and you are not a superhero.\n    \n    The whole building you are in moves, like a it was struck by something. Melody let's out a groan of pain.\n    \n    -I have to finish something before leaving the building. You'll have to leave now. Out there they will try to exploit you. Do not believe anything they say. And… rethink about Project Cognition.\n    *goto elevator\n*label elevator\nMelody helps you get up and accompanies you to the elevator. You feel weak.\n*fake_choice\n    #-I'm coming with you.\n        *set honor %+10\n        *set tenderness %-10\n        *set obstinate %+10\n        *set altruism %+10\n        -No you're not.\n        \n        She presses the button. You try to get out but fall in the ground as your knees are still shaky.\n    #-I need more answers.\n        *set honor %-5\n        *set tenderness %+5\n        *set obstinate %+10\n        *set altruism %-10\n        -You'll find them.\n        \n        She presses the button. You try to get out but fall in the ground as your knees are still shaky.\n    #Go.\n        *set honor %-10\n        *set tenderness %+10\n        *set obstinate %-15\n        *set altruism %-5\nThe elevator goes down. You see yourself in the mirror. You are wearing very thin cloth covering, next to nothing, and notice you have no wounds.\n*set health 7\nThe elevator gets stuck at the second floor. You hear the cables cracking. You quickly fall down hitting the last floor hard. You get up, your legs still weak.\n*fake_choice\n    #Haul elevator door.\nYou use your still awakening strength to open the door and walk out in the hall. You don't remember ever being inside this building. You get out on the streets.\n\nIt's snowing. Chilly. This is not Megalopolis. You have never been in this city. It's technological, overpopulated and opulent. It's also under attack. You see aircrafts fighting in the air and hear the sounds of explosions and gunfire all around. You walk in the snow as the city is being destroyed, not sure what is happening around you or why. You seem to be in one of the main streets. Before you soldiers are coming.\n\nThere are a dozen of them, all wearing mechanical suits. Three distinct stand in the middle. A white young woman with shaved head and a vertical stripe in her face tattooed as a skull. She is wearing all black, except white sneakers. An slim guy with a prosthetic hand, who seems surprised to see you. And a another soldier, this one with armor decorated with gold and silver combined with intricate technology. His face cover is down, revealing graying hair with an elegant beard. His eyebrows are locked in a position showing whether irritation or attentiveness. This last individual speaks to you with a strong voice:\n\n-Who are you?\n\n*fake_choice\n    #-${name} ${surname}.\n        *set honor %+15\n        *set altruism %-5\n        *set obstinate %+5\n        *set tenderness %-5\n        -So, aren't you happy to see your Rain King alive and well?\n    #Give a fake name.\n        *set honor %-10\n        *set altruism %+0\n        *set obstinate %-10\n        *set tenderness %-5\n        -Really? I'm the Rain King.\n    #-I don't know.\n        *set honor %-5\n        *set altruism %+5\n        *set obstinate %-10\n        *set tenderness %+10\n        -Do you know who I am? I'm the Rain King.\n    *if (gender) #-Rain King.\n        *set honor %-10\n        *set altruism %-5\n        *set obstinate %-5\n        *set tenderness %-5\n        -Hem. I believe that title belongs to me.\n    #-Who are you?\n        *set honor %-5\n        *set altruism %-5\n        *set obstinate %+5\n        *set tenderness %-5\n        -Hem. I'm the Rain King.\n\n*achieve c_act2\n[b]End of Act II[/b]\n*finish\n", "ballroom": "*comment ACT 1 SCENE 2\n[Remember to check stats to see how you are doing.]\n\n[i]6 months ago…[/i]\n\n…Sleeping. You are sitting somewhere. Somewhere comfortable. Also moving. But you don't feel wind or anything. A train maybe? A slight bump. So not a train. A car then. You open your eyes. You are inside a classic, but luxurious automobile. You feel calm. The air is crisp and moist. It rained earlier today but it's clear now during the sunset. Everything has an orange shade to it. You are far away from the megalopolis now. You see from the window nature. Most of it is artificial. Very few people on the acreages. Almost everything is run by the machines nowadays. You turn your head. The driver, a small, dark-skinned, formally-dressed young boy, is silent.\n*label driver\n*choice\n    #Remain silent.\n        *set obstinate %+5\n        *set honor %+5\n        *set tenderness %+10\n        *goto arrival\n    *hide_reuse #-Where are we?\n        -We are really close now, Margrave ${surname}.\n        *set obstinate %-5\n        *goto driver\n    *hide_reuse #-Where are we headed?\n        -To the ballroom of course, Margrave ${Surname}. May I add that you are looking particularly well today.\n        *fake_choice\n            #Thank you.\n                *set tenderness %+10\n                *set altruism %+10\n            #I know\n                *set tenderness %+5\n                *set altruism %-20\n            #I didn't ask for your opinion\n                -Of course, I ask forgiveness.\n                *set altruism %-15\n                *set tenderness %-10\n            #Don't answer\n                *set obstinate %+10\n                *set tenderness %+5\n        *goto driver\n    *hide_reuse #-Where the fuck am I?\n            -I am sorry if I woke you up Margrave ${surname}. We are almost there, you need not to worry. \n            *set tenderness %-10\n            *set believer %-5\n            *goto driver\n            \n*label arrival\n\nThe vehicle comes to a halt. The young gentleman quickly goes out and opens your door. You get out. Before you stands the Regius Palace. Enormous and magnificent. You have heard a lot about this palace. Yet, its grandeur astonishes you. This is where the most expensive and wild parties are held in the name of the crown.. Unmatched in opulence, perfected by generations of architects, each of which left a subtle detail in its exterior. Regius Palace defines splendor.\n\nA wide path made of beautifully engraved marble leads the way to the entrance where a triple store tall door is open. The garden, which consists of short grass, a few well cut plants and many bizarre sculptures, is full of active people, guests and butlers. You walk towards the palace. A lot of individuals with colorful unique clothing, although all formal and adorned, and distinct titles, of which most under yours, some about equal, and very few above, are walking and talking about. You get a few salutes.\n*fake_choice\n    #Respond warmly\n        *set honor %-10\n        *set tenderness %+10\n        *set altruism %+10\n        *set obstinate %-5\n    #Respond respectfully\n        *set honor %+10\n        *set tenderness %+10\n        *set altruism %+5\n        *set obstinate %-5\n    #Respond shortly\n        *set honor %-5\n        *set tenderness %-5\n        *set altruism %-5\n    #Ignore them\n        *set honor %-15\n        *set altruism %-10\n        *set obstinate %+10\n        \nThis keeps going for a while. When you approach the entrance you see the royal guards. White armor decorated with gold rings. Highly advanced. You don't remember even the most avant-garde  specialists having something near this. The weapons on the other hand seem standard military automatic rifles. A better look tells you they are modified. You walk in. As the powerful yellow lights inside the palace clash on you, a familiar feminine voice calls you out.\n\n-${nickname}!\n\nFinally a face you were looking forward to see. The voice belongs to your sister, Melody. Shorter than you, with black hair, a common hairstyle and an athletic, trained body, Melody ${surname} was never considered ugly. Her personality however is almost as interesting as your own. Melody has the highest war diplomat rank possible, the one the King gave her himself. She told you she was going to wait for you here and did as she said it seems.\n\n-Tell me, tell me, didn't the palace make you feel small? It's your first time here after all.\n*fake_choice\n    #-Hahaha yeah, yeah it did.\n        -Same thing happened to me the first time I was here.\n        *set honor %-10\n        *set altruism %+10\n        *set obstinate %-5\n    #-Not at all.\n        -Really?\n        *set honor %+10\n        *set altruism %-10\n    #-A little, yes.\n        -C'mon. You can be open with me.\n        *set honor %+5\n        *set altruism %+5\nI mean look at this place.\n\nYou explore a little with your eyes. The palace looks even better inside. On the high ceiling huge chandeliers illuminate the enormous ballroom. They can barely be seen from the distance. The floor is brilliant. Thousands of ornaments and decorated tables cannot fill the spacious area. Everything gleams.\n\n-Anyway I wanted to present to you my fiancee. ${name} meet Josef Angert.\n\nA tall but not very muscular man stands on your sisters side. Grey hair and a well-kept beard. You inquired on a few rumors when you heard your sister was interested on him. A brilliant businessman. He works for money, but some say that money works for him. Nevertheless those who speak ill of him are not people you would consider trustworthy. Josef stretches out his hand with a generic smile on his face.\n\n-Margrave ${name} ${surname}, pleasure to meet you.\n\n*fake_choice\n    #-The pleasure is all mine.\n        A faint smile in his face. This one original.\n        *set honor %+5\n        *set altruism %+5\n        *set obstinate %-5\n    #Just shake his hand.\n        *set honor %-5\n        *set obstinate %+5\n    #-Hm.\n        He seems astounded.\n        *set honor %-15\n        *set altruism %-10\n        *set obstinate %+10\n\n\n-I must say I didn't know a person of your hierarchy got paid so little that it would be necessary to present yourself in such an event dressed so poorly.\n*fake_choice\n    #-The gentleman in front of me is desperate for bigger appearance necessities.\n        He laughs quietly.\n        \n        -Well I'm happy to see we have the same type of humor.\n        *set honor %-15\n        *set altruism %-10\n        *set obstinate %-10\n        *set tenderness %-10\n    #-Thank you.\n        -I was joking. I would like to believe you figured that out.\n        *set honor %-20\n        *set altruism %+20\n        *set obstinate %-15\n        *set tenderness %+20\n    #-That's a good first impression.\n        -I'm sad to see we don't have the same type of humor. I would like to excuse myself if I offended you in any way.\n        *set honor %-10\n        *set altruism %+10\n        *set tenderness %+10\n    #-For some of us money and looks aren't the most important thing.\n        He seems unsettled.\n        \n        -It was just a joke Magrave ${name} ${surname}. We don't want to start off with the wrong foot do we?\n        *set honor %+20\n        *set altruism %-10\n        *set obstinate %+10\n        *set tenderness %-15\n    #-What the fuck did you just say?\n        -Whoa, whoa no need for irritation. It was just a joke. I would never offend you my dear.\n        *set honor %+10\n        *set altruism %-10\n        *set obstinate %+15\n        *set tenderness %-25\n        *set believer %-5\n    #Blush.\n        He tries to maintain control of himself, but a little laugh escapes him.\n        \n        -Hahaha, it was just a joke. You look like red pepper. I'm sorry dear you actually look fabulous tonight.\n        *set altruism %+5\n        *set obstinate %-5\n        *set tenderness %+25\n    #Laugh.\n        He laughs a little also.\n        \n        -I'm happy to see we have the same kind of humor.\nAnyway I need to meet a few individuals during the course of the evening. After all the balls of the Regius Palace are more than just parties. Business, conspiracies, politics and diplomacy. Isn't that right my love?\n\nHe looks at your sister. Maintaining eye contact with you she nodes slowly. Josef continues.\n\n-Oh may I add that you must visit the other room. It's even bigger than this one. It has glass ceiling and during the night the constellations look amazing. Have a good time!\n\n*page_break\n\nHe leaves in slow steps. Your sister turns towards you.\n\n-Don't decide your opinion about him yet. He is more than looks and money. You know I know how to choose. Anyway there are a few interesting personas in this evening you may like to approach if you would like to help your big sis with some diplomatic matters. You see that tall thin woman with short hair standing alone at the side of the wall. She is Mother Eliana. One of the major theological players in the court. She wants to revolutionize the religion, allowing herself, a female, to get the highest title of faith. No one approaches her because those of belief are afraid to support her but neither do they want to confront her, after all she might actually achieve her goal. The others are just too confused to join a fight not even the major participants know how to act. In other words, no one wants to be seen with her. Those two over there. The fatter-than-taller one and the slim one, that are conversing together, are strong economical figures. The short one is the richest contributor to the war cause. He has multiple businesses, many of which have dark roots. A helping hand to the king. The tall, young one on the other hand is a newcomer. I have been told he is very ambitious but even more dangerous. Their relationship intrigues me. Now the last one I want you to check is that lively fella over there talking to the crows. Vittorio Ziat. An energetic extrovert that one. We actually think he might be a renegade spy.\n\nShe says the last sentence with a lowered voice.\n\n-Enjoy the evening ${nickname}! I have a few matters I need to …\n\nWhile she starts describing her itinerary you see a butler with a silver plate where a drink similar to champagne stands. The color of the drink is a special soft green. A green which sends you in memories. Memories of a past life … \n\n*page_break\n\n*comment ktu eshts skena e luftes.\n*gosub_scene hill\n\n*comment *label part_2\n\n\n\nYou get back to your senses. Your sister has left you alone. The guests are amusing themselves. You can even hear a faint melody playing in the background. Before your eyes a big fly passes. No there could be no flies in here. What you see is a bio-mechanical insect, if you would call it that. The King has ears and eyes everywhere, no less in his own place.\n\n*if (federik_alive = false)\n    *goto ball\n\nYou discern entering in the palace a man in a wheelchair. Federik. Wherever he sees you he starts thanking you loudly for saving his life. He has done that more than a thousand times now. He hasn't noticed you yet.\n*fake_choice\n    #Hide from his view.\n        You try your best not to attract attention but he finds you. He probably has been looking for you the moment he heard you were here. He starts thanking you again… A few heads turn your way. After a few minutes he finally leaves.\n        *set honor %-10\n        *set obstinate %-20\n        *set tenderness %+10\n        *set altruism %+20\n    #Go salute him as quickly as possible.\n        You try your best not to attract attention but he still manages to make you famous in the eyes of the few people nearby, who hear impressed. After some minutes you leave.\n        *set honor %+20\n        *set obstinate %-10\n        *set tenderness %+20\n        *set altruism %+30\n    #Make sure everybody hears how much he will thank you.\n        Chest up, you go towards him. He starts thanking you as always, making you a hero. You act all humble while everyone around listens. After everyone has been blabbering about you, you leave content.\n        *set honor %-30\n        *set obstinate %+10\n        *set tenderness %-10\n        *set altruism %-30\n\n*label ball\n*page_break\nYou remember what your sister told you. Glancing around you notice the aforementioned.\nWhich one would you like to approach?\n\n*choice\n    *hide_reuse #Mother Eliana, the women of faith.\n        The tall woman notices you moving towards her immediately. Her sharp facial features show content with her party not being a lonely silence. You can place that she is old, but keeps herself well. She is dressed accordingly but not expensively. After the unnecessary presentations, after all, you both know each other, she begins with a clear accent.\n        \n        -Margrave ${surname}. May I ask what bought you to do such a bold move to come speak to me. After all I thought I would spend the whole night alone.\n        *choice\n            #-Maybe I just like company.\n                -Oh but we both know you didn't come here for my company. You are not that dumb. Now tell me what is your real plan. Are you here to help me?\n                *label company\n                *choice\n                    #-Yes, I want to help you achieve your goal.\n                        *label help\n                        -Very well, you already have by coming here and being seen with me. I suppose you want something in return?\n                        *choice\n                            #-I want a friend in the faith business.\n                                -Well, I wouldn't mind a friend in the war business neither. You will help me get closer to god and I will [i]bless[/i] your campaign. We have a deal than.\n                                *set honor %-20\n                                *set obstinate %-10\n                                *set tenderness %+15\n                                *set believer %-10\n                                *set eliana_deal true\n                                *goto ball\n                            #-I want to be closer to god.\n                                -I can help you with that of course, but right now god wants you to help me. You do this for him and he will reward you for your belief… or forgive you of your sins.\n                                *choice\n                                    #-I will act upon god's will.\n                                        -Very good. I am sure he will close to you when it matters.\n                                        *set honor %+20\n                                        *set obstinate %-20\n                                        *set believer %+40\n                                        *set altruism %+20\n                                        *set eliana_deal true\n                                        *goto ball\n                                    #-You are a manipulator, I will not help you.\n                                        -You may not help me. But you must not judge me. Only god has that right. We will see how he will judge you.\n                                        *set honor %+20\n                                        *set obstinate %+20\n                                        *set believer %+10\n                                        *set eliana_help false\n                                        *goto ball\n                            #-Nothing at all.\n                                -I can't say I'm not surprised. Are you doing this only based on good will?\n                                *choice\n                                    #-Yes.\n                                        Very well than. God bless you. My goal shouldn't be far away now that I have your support ${name}.\n                                        *set honor %+30\n                                        *set believer %+30\n                                        *set altruism %+40\n                                        *goto ball\n                                    #-I have my own reasons.\n                                        -I can do secrecy. Your support is all I need. I am grateful for your help.\n                                        *set honor %-30\n                                        *set believer %+10\n                                        *set altruism %-20\n                                        *set tenderness %-10\n                                        *goto ball\n                                    #-I want a faithful female to get the title and respect males have had.\n                                        -While I do understand and approve of your cause, I must be honest with you and say that I am not doing this for the women. My incentive is only God. Nevertheless I am thankful for your support.\n                                        *set honor %+20\n                                        *set believer %-10\n                                        *set altruism %+20\n                                        *set tenderness %+20\n                                        *goto ball\n                                    #Do you want my help or not?\n                                        -I apologize. I just wanted to know my benevolent supporter better. Anyway I couldn't possibly refuse your help. Thank you Margrave.\n                                        *set honor %-20\n                                        *set believer %-10\n                                        *set tenderness %-20\n                                        *set altruism %+10\n                                        *goto ball\n                    #-No I'm not\n                        -Than please leave. Right now the only thing I'm focused is my holy quest.\n                        *label pleaseleave\n                        *choice\n                            #Leave\n                                *set honor %-10\n                                *set tenderness %+10\n                                *set believer %-20\n                                *set altruism %-10\n                                *set eliana_help false\n                                *goto ball\n                            #Laugh at her [i]holy quest[/i]\n                                Disappointed, she makes no remarks but with her head held high walks away.\n                                *set honor %-30\n                                *set tenderness %-10\n                                *set believer %-40\n                                *set altruism %-30\n                                *set eliana_help false\n                                *goto ball\n                            #Ask forgiveness for wasting her time\n                                -Don't worry. You have been the most interesting thing that will probably happen to me this whole night.\n                                *set honor %+20\n                                *set tenderness %+20\n                                *set believer %-10\n                                *set altruism %+20\n                                *set eliana_help false\n                                *goto ball\n                    #-Why should I help you?\n                        *label why\n                        She thinks for a second.\n                        \n                        -Well the faith has a long history of helping their supporters. I am sure a person of a high military rank like you would like to get involved in faith. Maybe someday you would like to change the direction of your career. Or maybe you will need the massive aid of the religious population. Whatever it is I will help you get what you want in the future if you help me today. What do you say?\n                        *choice\n                            #-You convinced me.\n                                -Very well than. This is a most useful alliance.\n                                *set honor %-30\n                                *set tenderness %+10\n                                *set believer %-15\n                                *set altruism %-30\n                                *set obstinate %-30\n                                *set eliana_deal true\n                                *goto ball\n                            #-I am sorry the risk is not worth it.\n                                -Well you wouldn't be the first to decline. I won't hold grudges.\n                                *set honor %-10\n                                *set tenderness %+20\n                                *set believer %-25\n                                *set altruism %-30\n                                *set obstin We can negotiate.\n                        \n                        \n                        *goto why\n    *hide_reuse #The two magnates.\n        *set met_magnates true\n        Only when you are really close they notice you. The tall one first. He puts on a pair of glasses and makes you a vertical scan with his eyes. The other one is older, but well groomed. He turns slowly and starts talking with a loud voice.\n        \n        -Waa, Margrave ${name} ${surname}. To what do we own the honor? As you may already know, I am Florian Delic, the biiigest moneybag who stays with the King. While this here is a recent friend of mine, Simon Rhys. So why are you here? Are you thinking of joining our noble cause? Do you know that my friend here wants to become Margrave, just like you.\n        *label cont_talk\n        *choice\n            *hide_reuse #-That title is not so easy to achieve, Mr Rhys.\n                The young one starts talking. His voice is low, contained.\n                \n                -I know. But you gained the title of Margrave by playing fair and square, while I on the other end like to play dirty.\n                *choice\n                    #-What are you going to do exactly?\n                        -I am going to threaten the Rain King. Yes, I know my power is not even close to his, but that is precisely my advantage. While we both have weapons of mass destruction, only one of us has things that he can loose. If I cease to exist nobody would give a damn, but the King has so much to lose he will just give me the title. It would be easier. For both of course.\n                        *choice\n                            #-You are a genius.\n                                -Finally someone who appreciates my pure intelligence. Thank you for your compliment.\n                                *set honor %-20\n                                *set obstinate %-30\n                                *set tenderness %+5\n                                * n                        *label shit\n                        *choice\n                            #-So you want him out?\n                                *label overthrow\n                                -For the moment, he is a necessary evil. I would want him dead [b]if[/b] a better alternative appears. Anyway you only ask, what is your opinion of the Rain King?\n                                *label king_opinion\n                                *choice\n                                    #-I esteem him.\n                                        -Of course you do. You are his Margrave.\n                                        *set honor %+20\n                                        *set obstinate %+30\n                                        *set tenderness %+10\n                                        *set altruism %+10\n                                        *goto cont_talk\n                                    #-Just like you.\n                                        -Naturally. I expected that much. His reign of crime is about to end.\n                                        *set honor %-30\n                                        *set obstinate %-20\n                                        *set tenderness %+20\n                                        *set altruism %+10\n                                        *goto cont_talk\n                                    #-I hate him.\n                                        -You are not the only one. You have no idea…\n                                        *set honor %+5\n                                        *set obstinate %-10\n                                        *set tenderness %-10\n                                        *set altruism %-10\n                                        *goto cont_talk\n                                    #-I'm not sure.\n                                        -You are not sure?! You must be sure. He is not a man to be liked. Are you afraid to curse him. Anyway I won't impose
