   *set altruism %-5\n        *set honor %+10\n        -Ha. You know what's funny? Those are the exact same words his last victim said. He is the crazy version of you, ${name} ${surname}. I warned you. \n        *goto hell\n    #Talk about something else.\n        *goto help\n\n*label help\n*choice\n    #-Who are you exactly?\n        -The Red Frog, I told you. You don't need to know my story. You probably wouldn't want to. If you press further I will just lie.\n        *goto help\n    #-I want to reign.\n        *label king\n        *set honor %-15\n        *set obstinate %-10\n        *set altruism %-10\n        *set tenderness %-5\n        \n        *if eliana_deal\n            -In the eyes of most people, you already are. Follow me to the Black Cathedral, and will take care of all the bureaucracy. You will reign the Sacred Kingdom. The title is on a silver plate, you just need to seize it.\n            *goto bc\n        *else\n            -It's not that easy. You are a murderer. You have no legitimate rights to the throne. For now you are the most hated person in the Sacred Kingdom. That's why I came to meet you privately.\n            *goto help\n    *if (eliana_deal) #-I don't want to reign.\n        -You don't want the throne?! Why the hell did you kill the Rain King for than? Oh, I remember. Revenge. You won't get this chance again ${name} ${surname}. Are you a hundred percent sure you don't want to rule the sacred Kingdom? If you won't rule, who will?\n        *choice\n            #-I want to rule.\n                *goto king\n            #-There will be no more Kings.\n                *set honor %+10\n                *set obstinate %+10\n                *set altruism %+20\n                -Ah, democracy. There is always somebody who makes all the choices ${name}, be it chosen or self-proclaimed… The people will be more than happy with your choice, but you don't know what you are doing.\n                *goto help\n            #-There will be another King.\n                *set honor %-5\n                *set obstinate %-10\n                *set altruism %+10\n                -Hm. [i]Who?[/i] would be my first question, but if you are not, the others will need to wait. The situation is not very friendly now.\n                *goto help\n            #-I don't care what happens.\n                *set honor %-10\n                *set obstinate %-10\n                *set altruism %-5\n                *set tenderness %+5\n                -Hm. Alright. I will take care of that. Is there anything else you need?\n                *goto help\n    #-Why do you want to help me?\n        -I knew sooner or later you would find me, so I thought we should just meet as soon as possible. I have seen that not even the Rain King could escape you.\n        *goto help\n    #-How long have you been standing there?\n        -Long enough for you to wake up. I saw you were tired. I didn't want to interrupt your dreams.\n        *goto help\n    #-What is Project Cognition?\n        -How do you know that exists? Anyway it's a classified secret project. Not even I knew what it was about. I tried hacking the labs, but I couldn't. There were only two people who had access. The Rain King, which unfortunately is dead, and Galatia De Smet.\n        \n        Who hasn't heard of Galatia De Smet. She is the most brilliant scientist of the current era. She wrote mathematical theorems when she was only 12. She is a genius in many branches of studies, and has 5 PhD-s, including computational neuroscience and cognitive psychology. Lately Dr. De Smet has disappeared from the public eye. The Red Frog continues:\n        \n        -Anyway the project was abandoned not long ago and Galatia retired. I'm giving you her location. Ask her if you want to know more.\n        *set project true\n        *goto help\n    #-I want to see Florian Delic.\n        -Florian Delic. Did he try to kill you? Or your sister? He always was ruthless. That's why he is where he is. If you were to reign, you could eliminate him with a simple order. In your current state, you should try to hide from him, not find him.\n        *goto help\n    *selectable_if (simon_alive) #-I want to see Simon Rhys. [Simon is alive]\n        -Why would you need to see him? Anyway he disappeared. He is a sneaky son of a bitch.\n        *goto help\n    #-I want to see my friends.\n        -Your friends?! You changed the course of history of this planet. You have no friends. Everyone you love is whether dead or will be after you meet him. I risked my life coming here to see you. You want to change this. Fine. But you can't duel the universe and be home for dinner.\n        *goto help\n    *if (project) #-I'm going to meet Dr. Galatia De Smet.\n        -We will meet again. Good luck ${name}!\n        *finish\n\n*label bc\n*page_break\nYou follow the Red Frog back to the Black Cathedral. You can see flags of the the Sacred Kingdom burned and torn. On the outside wall of the cathedral the skull symbol of the renegades has been painted in a rush, left uncompleted. You see new soldiers standing guard before the cathedral entrance. As they see you approaching you can see the awe on their faces. They don't know how to react, but they don't have time as both of you enter the haunting place. Although the signs of a fight are irreparable, they have cleaned on the inside.\n*achieve reign\n\n*if (simon_alive)\n    After reliving parts of the nightmarish massacre you committed, you finally enter the throne room. Inside it's filled with guards and two very familiar faces: Florian Delic and Simon Rhys. You can sense the fear in their eyes when they see you. The Red Frog gives a short inspirational speech which, judging by its dullness, was made up at the moment. He then declares your sovereignty. There is a long pause of silence as all the participants are dumbfound. Then one of the guards shouts:\n    *goto long\n*else\n    After reliving parts of the nightmarish massacre you committed, you finally enter the throne room. Inside it's filled with guards and a very familiar face: Florian Delic. You can sense the fear in his eyes when he sees you. The Red Frog gives a short inspirational speech which, judging by its dullness, was made up at the moment. He then declares your sovereignty. There is a long pause of silence as all the participants are dumbfound. Then one of the guards shouts:\n    *goto long\n*label long\n*if (gender)\n    -Long live the new king!\n    \n    A few others join in.\n    \n    -Long live the new king!\n    \n    You it in the throne. Now the whole enormous room shouts.\n    \n    -LONG LIVE THE NEW KING!\n    *goto sit\n*else\n    -Long live the new queen!\n    \n    A few others join in.\n    \n    -Long live the new queen!\n    \n    You it in the throne. Now the whole enormous room shouts.\n    \n    -LONG LIVE THE NEW QUEEN!\n    *goto sit\n*label sit\n*page_break\n*set king true\nYou sit in the throne. The taste of blood still in your mouth. Before you, a room of soldiers. Your soldiers. You have killed more than these to earn your title. You are the most powerful human on the Sacred Kingdom, probably on the world. It took you so so much to sit in this throne. But now that you do, it doesn't feel that comfortable.\n\nThe Red Frog talks to you with a low voice:\n\n-Your majesty, I will take care of the bureaucratic stuff and media, but first I need to ask you a few things. Just the most important ones.\n\n-Let's start with Apex Crown. The huge tower that caused a big conflict between the old King and the population. What are you going do about it? On one hand is a relic of the old regime, on the other it cost so much to bring it up, why not just finish it?\n*fake_choice\n    #-Keep building it.\n        *set honor %+10\n        *set altruism %-10\n        *set obstinate %+10\n        -Of course. It's your tower now, your majesty.\n    #-Halt the construction.\n        *set obstinate %-5\n        -Shall be done, until further notice from you, your majesty\n    #-Destroy it.\n        *set honor %-10\n        *set altruism %+10\n        *set obstinate %-10\n        -Such a waste… It's your choice your majesty, it shall be done.\nNow, about the renegades. They will keep fighting the current reign, yours. What shall our response be?\n*fake_choice\n    #-Try to make peace.\n        *set honor %-5\n        *set altruism %+15\n        *set obstinate %-10\n        *set tenderness %+15\n        -They have repeatedly shown that's not what they want, but we will do our best.\n    #-Just keep them back.\n        *set honor %-5\n        *set altruism %+10\n        *set obstinate %-10\n        *set tenderness %+10\n        -A wise choice, your majesty.\n    #-Fill the streets with blood if necessary.\n        *set honor %+5\n        *set altruism %-20\n        *set obstinate %+15\n        *set tenderness %-10\n        -This matter will end soon.\nOne more thing. This is truly important. What about the war? I mean the long war with e-conglomerate.\n*fake_choice\n    #-Attack harder than ever. I will win this war.\n        *set honor %+15\n        *set altruism %-10\n        *set obstinate %+15\n        *set tenderness %-15\n        -I will gather the generals later. This war should have ended long ago, but is not that easy.\n    #-We will negotiate peace.\n        *set honor %-10\n        *set altruism %+15\n        *set obstinate %-15\n        *set tenderness %+15\n        -Of course. I will arrange a diplomatic meeting. This war should have ended long ago, but is not that easy.\n    #-For now, just defend.\n        *set honor %-5\n        *set altruism %+5\n        *set obstinate %-10\n        *set tenderness %+10\n        -Of course, but we can't stay forever in this state. This war should have ended long ago, but is not that easy.\n*label anything\nIs there anything else I can do for you, your majesty?\n*choice\n    #Execute Florian Delic.\n        Florians face becomes pale.\n        \n        -${name}, your majesty, why me? I have, haven't done anything. I did not kill, kill your sister. It was, it was Simons plan. He talked me to it. I don't deserve this. That backstabbing bastard was responsible for everything. I, I swear.\n        \n        *if (simon_alive)\n            Simon replies with his abnormally calm voice:\n            \n            -Obviously everything this man said was a lie. I never intended to kill your sister and was not plan of Mr. Delics conspiracy, although if I had been I would have told these same things, this is not the case. I am telling the truth.\n            \n            -What?! This fuckface is lying! Please, your majesty!\n            *goto swear\n        *label swear\n        *choice\n            #Carry on with your order.\n                -What?! No! Please! Wait! WAIT! Just one thing. Don't hurt my family, please!\n                *choice\n                    #-I will.\n                        -You soulless bastard son of a - he is pulled outside by the guards.\n                        *set honor %-15\n                        *set tenderness %-20\n                        *set obstinate %+10\n                        *set altruism %-15\n                        *goto anything\n                    #-I won't.\n                        -Thank you, thank - he is pulled outside by the guards.\n                        *set honor %+15\n                        *set tenderness %+15\n                        *set obstinate %-5\n                        *set altruism %+5\n                        *goto anything\n            #Let him live.\n                Oh thank you, ${name}, your majesty. Thank you very much.\n                *set honor %-5\n                *set tenderness %+5\n                *set obstinate %-15\n                *set altruism %+10\n                *goto anything\n    *if (simon_alive) #Execute Simon Rhys.\n        He talks, his abnormally calm voice finally cracking a little:\n        \n        -I don't understand why am I being punished, so everything I say in my defense might be useless. I won't waste my last breaths and your majesty's time. I will say this though: You ${name} ${surname} are just a tool used fix a complex mechanism. When the mechanism is finished, the tool becomes useless.\n        \n        He is pulled out by the guards.\n        *set honor %+10\n        *set altruism %-10\n        *set obstinate %+10\n        *set tenderness %-10\n        *goto anything\n    #-What is Project Cognition?\n        -How did you know that existed? Anyway it's a classified secret project. Not even I know what it is about. I tried hacking the labs, but I couldn't. There were only two people who had access. The Rain King, which unfortunately is dead, and Galatia De Smet.\n        \n        Who hasn't heard of Galatia De Smet. She is the most brilliant scientist of the current era. She wrote mathematical theorems when she was only 12. She is a genius in many branches of studies, and has 5 PhD-s, including computational neuroscience and cognitive psychology. Lately Dr. De Smet has disappeared from the public eye. The Red Frog keeps talking.\n        \n        -Anyway the project was abandoned not long ago and Galatia retired. I'm giving you her location. Ask her if you want to know more. I wouldn't recommend bringing her here with force. She didn't exactly leave with good terms with the Rain King.\n        *set project true\n        *goto anything\n    *if (project) #-I'm going to meet Dr. Galatia De Smet.\n        *finish\n", "parkour": "*comment ACT 3 SCENE 3\n\n*hide_reuse\n*temp late false\n\n[Remember to check stats to see how you are doing.]\n\nThe sun is rising. The sky has begun to brighten. By the means of a young forest, nature has taken control the ruins of the city. The dark cold is beginning to calm down. Your body is beginning to accept it's new reality.\n\nFireshots can still be heard. Rain Kings last forces have been attacked. Part of the assault team has been your sister, which you now find before you. You have never seen her like this, in a military uniform. Her face shows relief for having found you mixed with fear, after all you are holding your gun against her.\n*label against\n*choice\n    #Shoot her.\n        You press the trigger. She takes half a breath before the bullet goes through her skull. Melody is dead. This has been the hardest shot you have ever taken. You are psychologically debilitated. It had to be done you reassure yourself. She lied to you for her own benefit.\n        *set honor %+10\n        *set altruism %-10\n        *set obstinate %+15\n        *set tenderness %-15\n        *goto run\n    #-You lied to me.\n        She takes in a breath.\n        \n        -Yes, but it was for your own good… for the worlds good. I did it because… because you are much more important than you think right now.\n        *if (project)\n            You protected the project and that was very important. Whatever they tell you, you should do it again.\n            *goto breath\n        *else\n            I let you out, remember. I took an enormous risk myself.\n            \n            She shows you a large scar in her belly.\n            \n            -I did this to let you out, because I believe in you.\n            *goto breath\n        *label breath\n        *set honor %+5\n        *set obstinate %+5\n        *set tenderness %+5\n        *goto against\n    #-Are you really my sister?\n        -…We… have no blood relation whatsoever. But we are still on the same team. We fight for each other, we are together.\n        *set honor %+10\n        *set obstinate %+5\n        *set tenderness %+5\n        *goto against\n    #-Why are you here?\n        *set honor %-5\n        *set obstinate %-5\n        *set tenderness %+5\n        *label here\n        \n        -We're here for you. I need you to come back with me. Not to the simulation. This will be real. The world needs you ${name}. Come with me ${nickname}.\n        *choice\n            #Go with Melody.\n                *set honor %-10\n                *set obstinate %-15\n                *set tenderness %+5\n                *set altruism %+10\n                You lower your gun. You can see the relief and content in her eyes. It's the last image of her you will ever see. A bullet goes through her skull and she falls to the ground. Melody is dead.\n                *goto run\n            *allow_reuse #No.\n                *set honor %+10\n                *set obstinate %+15\n                *set altruism %-10\n                *goto against\n    #-Sister, you are alive!\n        *set honor %+10\n        *set obstinate %-10\n        *set tenderness %-5\n        *set altruism %+5\n        She takes a breath smiling.\n        \n        -Yes, I am. I'm happy to see you alive too, sibling.\n        *goto here\n    #-You need to go.\n        -No, I'm not going without you.\n        \n        This is the last sentence of Melody. A bullet goes through her skull and she falls to the ground. Melody is dead.\n        *set honor %-10\n        *set obstinate %-10\n        *set tenderness %+5\n        *set altruism %+15\n        *goto run\n*label run\nYou see, hidden in the bushes on your side, a reflection of a gun. The disguised gets up, throws her improvised sniper down and starts running away. You sprint after. You are too far away to use your gun precisely.\n*fake_choice\n    #Run faster.\nYou are both running as fast as you can in this awakening forest. Your feet are starting to hurt, stepping on the detritus. You dodge the trees while keeping your momentum. Jump over an old piece of a scrapped tank. Breathing loudly. The trees begin to become less common. You are entering the city. The dark brown forest is replaced by the artificial gray structures. The covered female you are chasing uses a tree that has fallen to slowly climb up to the terrace of an abandoned building. The building is less than two stores tall.\n*fake_choice\n    #Follow her through the tree.\n        You climb the tree barely holding your balance while also not sacrificing your momentum.\n    #Try to climb the wall.\n        *set late true\n        You climb three feet in the wall using your momentum, but is still not enough for your hand to reach the terrace. You try again this time using one of the windows to help you up and manage to get up.\n        \nYou keep chasing her with all your strength. She leaps to another building and starts climbing up. You follow. Easy. As she reaches up she makes another jump from the current to another. Her feet barely reaching the other building. She turns her head towards you. Her face is covered but you recognize her eyes. You just don't remember where you have see them. She is waiting to see if you will make the jump. You are a few floors high now. A mistake could lead to a painful death.\n*choice\n    #Don't jump.\n        *set tenderness %+15\n        *set obstinate %-10\n        You decide is not worth to risk your life for this person. She keeps running away.\n        *goto away\n    #Jump.\n        *set tenderness %-15\n        *set obstinate %+10\n        You go back use all the inertia and jump, rolling as you reach the other building safely. The chase continues.\n        *goto chase\n*label chase\nShe is really, really fast. You might lose her. She passes the explosion gap caused in the building by wall running on the side, reaching the other side just by her arms, getting up and continuing the run. You notice there is also an iron bar above. You don't have time do consider whether it holds. How do you want to pass the gap?\n*fake_choice\n    #Wall running.\n        *set late true\n        You do the same thing as her, barely reaching the other point. Getting up and continuing. She is far away.\n    #Use the iron bar as a swinger.\n        *set tenderness %-5\n        The bar curves a little but holds enough for you to swing to the other side. You land on your feet and keep running.\n\nYou keep following her. Your stamina is running out. She jumps in a lower platform and rolls on the landing. You follow. Next she uses fire exit stairs to get up another building. She climbs the stairs furiously.\n*fake_choice\n    #Climb the stairs.\n        *set late true\n        You climb the stairs, but you are slower as you have no more breath and your energy is failing you.\n    #Jump between the two building.\n        You jump from one building to the other using the small distance between them to your advantage.\n*if (late)\n    You're late. She is already far. You can't keep doing this. You can't run after her anymore. You have to whether let her go or shoot at her. You have to decide this instance.\n    *choice\n        #Let her go.\n            She disappears in the horizon\n            *set tenderness %+10\n            *set obstinate %-10\n            *set altruism %+10\n            *goto away\n        #Shoot.\n            *achieve shoot\n            *set tenderness %-10\n            *set obstinate %+10\n            *set altruism %-5\n            You shoot her in the leg. She falls dawn and begins to crawl, but soon understands that it won't bring her anywhere. You grab her by the head and remove the cover from her face. It's Quinta. She has a long scar in her face, through her lips, almost reaching her eye.  She talks to you between her breaths of exhaustion and pain.\n            \n            -The bullet passed through the femoral artery. I'll die very soon.\n            \n            *fake_choice\n                #-Oh my god I'm sorry!\n                    *set tenderness %+10\n                    *set honor %+5\n                    *set altruism %+10\n                    *set obstinate %-5\n                    -Well, no point in crying now. I-I should have told you it-it was me. Li-Listen. Do-Don't trust e-government. De-destroy Project Co-   \n                #-Why did you do this?\n                    *set tenderness %-5\n                    *set honor %+5\n                    *set altruism %-5\n                    *set obstinate %+5\n                    -Melody was to be-be killed. I-I was afraid you-you wouldn't trust me. Li-Listen. Do-Don't trust e-government. De-destroy Project Co-\n                #-What should I do?\n                    *set tenderness %+5\n                    *set honor %-5\n                    *set altruism %+5\n                    *set obstinate %-5\n                    Do-Don't trust e-government. De-destroy Project Co-\n                    \n           She falls silent. She has lost consciousness. In a matter of seconds she stops breathing…\n           *goto away       \n*else\n    *achieve run\n    You arrive up just as she does and jump over hear. You put your knee over her arm and get her under control. You remove the cover only to reveal the face of Quinta. She has a long scar in her face, through her lips, almost reaching her eye. She talks to you between her breaths of exhaustion.\n    \n    -${nickname}!\n    \n    *label nick\n    *choice\n        #-Why did you do this?\n            *set tenderness %-5\n            -Melody had it coming. She did use us heartlessly don't you think? I ran because… I was afraid. I don't trust you… I should have told you it was me.\n            *goto nick\n        #-They told me you were dead.\n            *set tenderness %+5\n            *set altruism %+5\n            -Keep it this way, please. When we were captured I thought we were all gonna die. I'm happy to see I'm not the only survivor, but it's too dangerous if they know about me.\n            *goto nick\n        #-Which side are you on?\n            *set tenderness %-5\n            *set altruism %-5\n            -Certainly not with e-government. Not after what I've seen. Whatever Rain King is doing, it's the only choice you have right now. Go with it.\n            *goto nick\n        #-Tell me what you remember.\n            *set tenderness %-5\n            *set altruism %-5\n            -You… The simulation…It was your turn. ${nickname} whatever you do, destroy the goddamn Project. I'm sorry about this.\n            \n            You feel an electric shock in your stomach as you lie in the ground paralyzed. Quinta gets up.\n            \n            -We didn't start this, but we are the only ones that can end it.\n            \n            She starts running away.\n            *goto away\n        #Kiss.\n            *set tenderness %+10\n            *set altruism %+5\n            She puts her head away.\n            \n            -${nickname} what are you doing. I'm sorry… Maybe it's the simulation, but this is not us… I'm sorry.\n            *goto nick\n*label away\n*finish\n", "prison": "*comment ACT 3 SCENE 7\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nWhile the aura is definitely unwelcoming, the inside of the prison is not as you would have thought. Everything is clean and precise. The main construction is metallic, but there are some plants who even look like they have been taken care of. Some rooms look almost like lounges. They seem to really care for their prisoners, offering them services many hotels you know don't provide. It seems as if the protest for better conditions of the convicted has passed the limits. Since the facility is now unprotected the Rain King slowly goes to the control panel to and starts looking for the only inmate you are interested in.\n\n*page_break\n\nDr. Galatia De Smet has been released. She looks mostly like in the simulation. Maybe a little older or more tired. She starts talking about how happy she is she is alive. Thanking the Rain King and you about the rescue. You ask questions, but she mostly evades them or doesn't know the answer. Something is amiss. If the prison was abandoned, how did she survive inside all alone? Where are the other prisoners? She thanked you, yes, but she didn't express much emotion about it. Is she made this way or is she… Of course. It makes sense. She is a bio-copy. That's not fair. You are tired. You can't keep going. You yell at the others about your uncovering. Rain King verifies it by asking a simple private question she could not answer. You have been fooled.\n\n-She is a bio-copy. Your detection is correct.\n\nYou turn your head, from where the voice came. It's her. It's the real Galatia De Smet. She is in a e-conglomerate typical suit and accompanied by another man, well dressed. He is armed. They approach you.\n\n-You are alive!\n\nShe looks at you with eyes you can't discern the meaning of.\n\n-I must begin with some explications. I was never taken prisoner. I made an accord with e-conglomerate. The reason behind this is The Sacred Kingdom, or to be more precise, the Rain King was not able to opportunely fund my research capabilities, especially in the fields of study required for the progress of Project Cognition.\n\nYou know recognize the armed man. He is the one who presented himself as the Red Frog in your simulation. He says to De Smet:\n\n-Keep it short.\n\nGalatia continues:\n\n-At the terminus Project Cognition was accomplished, but not exactly what we were expecting. You ${name} ${surname} were the only survivor. Your mind established the success of the project. The complication is… this produced a, I'll endeavor to explicate in the simplest terms, an artificial clone of yourself. A copy of your mind with the processing power of a computer. It's a conscious machine… This machine killed 53.64% of the researchers working in the facility in the first minutes of its becoming. Your survival despite the extremely low probability is a phenomenon. The machine has already passed level 1 and 2 security measures. The facility is in total lock down. If it breaks out, the whole world is in peril.\n\nShe gulps.\n\n-You are the only one who can stop it. If your consciousnesses collide again, you may be able to put an end to it, before it's too late.\n\nThe Red Frog takes over.\n\n-Hello! I'm the negotiator and now you need to come with us.\n\nRain King finally speaks:\n\n-${name} ${surname} will come nowhere. ${surname} has pledged loyalty to me and will follow me, not our enemies.\n\nThe negotiator points the gun at the Rain King, ready to shoot, but using this moment of distraction you quickly disarm him. Even now, at the edge of life, your fighter skills have not abandoned you. You have the gun now. The Red Frog talks again:\n\n-${nickname}! We have the means to transport you to the facility as quickly as possible. We have the capital to help you after. We can offer you possibilities the Rain King will never be able to offer.\n\n-SHUT UP! ${surname} has made on oath to follow me and die for the Sacred Kingdom if necessary. You think ${surname} will throw all that away for the fake promises of the people that imprisoned.\n\n-Yes, you worked for the Rain King and we imprisoned you. But this is not a time for holding grudges and clinging to the past. This is about the future. Yours and that of the whole world.\n\n-After all that we went through together. I saved you from them for gods sake.\n\n-Dr. De Smet made the right choice ${nickname}, will you?\n\n-${surname} I order you to shoot this man. Now!\n\n*choice\n    #Shoot the Rain King.\n        *achieve shoot_king\n        *set honor %-15\n        *set obstinate %-40\n        The Rain King falls to the ground, bloody.\n        \n        -We could have saved the world together…\n        \n        He falls dead. The Rain King is dead… \n        *if (mia_alive)\n            Mia covers her mouth. She is speechless.\n        Galatia speaks in a low voice:\n        \n        -We really need to go.\n        *goto traveling\n    #Shoot the Red Frog.\n        *set honor %+20\n        *set obstinate %+40\n        The negotiator falls to the ground, bloody. He looks toward Galatia for help or condolence. She is shocked, but shows no remorse. He falls dead. \n        *if (mia_alive)\n            Mia lets out a breath of relief.\n        Galatia speaks in a low voice:\n        \n        -We really need to go. The world needs you and you need me.\n        *goto traveling\n    #Shoot them both.\n        *achieve shoot_both\n        *set altruism %-20\n        You shoot them both quickly in their heads. They both fall to the ground. The Rain King is dead…\n        *if (mia_alive)\n             Mia covers her mouth. She is speechless.\n        Galatia, who is visibly shocked, speaks in a low voice:\n        \n        -We really need to go. The world needs you and you need me.\n        *goto traveling\n*label traveling\n*page_break\nAlong the way Dr. De Smet\n*if (mia_alive)\n    , with the help of Mia, \nimplements synthetic material in your palm and fingers. It is a technology of a kind you have never seen before.\n\n-This will help you connect to the machine. The moment you physically contact a link will be created between your minds. Then, it's up to you. I lack further research to assist you in this war. The cognitive machine is a representation of yourself. I estimate it has shaped it's consciousness based on your character. You character has led to your decisions. Your decisions have shaped it's character. It's character will shape the world. Whatever the case, you must destroy it. Your failure will have catastrophic consequences.\n\nYou fly over the white desert. The sun is watching and waiting for what will happen. There it is. The underground facility. Just a circle below the sand dunes. You are hurt. You are tired. You have no desire to do this. This is not a matter of will. You simply have no choice. You will do what needs to be done.\n\nGalatia takes a breath and you think you see her for the first time in a thoughtful state.\n\n-When I was little I never thought my exceptional intellect would lead to the salvation of the human race. But I did not think it might lead to the destruction of it either.\n\nYou're not sure if her face conveyed worry or sadness. \n\n-It's a pattern in human society of validating countless work in an instant. A student will get his studying validated in an exam. An artist, his art in a sight. A soldier, his training in a duel. Now our fate will be decided in an exchange. When you open the gate there will be no turning back. Whenever you are ready.\n\nA ladybug flies to your finger. You have seen this somewhere… but they all look the same don't they?\n\n*fake_choice\n    #ENTER THE FACILITY.\n*finish", "remember": "*comment ACT 3 SCENE 4\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nGray. Gray weather. Gray roads. Gray structures. Gray city. You are walking through the abandoned city. Alone. The only breathing thing for kilometers. Your body has now fully accepted it's new reality. You are worn out, but your organism feels fully awakened now. You hear the sound of a motorcycle. It speedily finds it way before you. The red sporty vehicle is overloaded with stickers. The female driver gets off and removes her helmet. It's Mia.\n\n-Hey!\n\n*fake_choice\n    #Point the gun at her.\n        *set obstinate %+5\n        *set tenderness %-10\n        -Oh please, put that thing away. I've come in peace. Even if we killed each other what would we achieve?\n    #How did you find me?\n        *set obstinate %-5\n        *set tenderness %+5\n        -What, you really thought we didn't put any GPS in you. Don't ask me where it is.\n    #Why are you here?\n        *set obstinate %+5\n        *set tenderness %+5\n        -For you, of course.\n    #I don't need your help.\n        *set obstinate %+10\n        *set tenderness %-5\n        *set altruism %-5\n        -Who said I've come here to help?\n    #Finally, I was getting bored.\n        *set obstinate %-10\n        *set tenderness %-5\n        -I believe you. But not so fast cowboy.\n    #Where are the others?\n        *set obstinate %+5\n        *set tenderness %+5\n        -Waiting for us.\n\nThere is a slight moment of pause\n\n-Do you believe in signs or visions?\n\n*fake_choice\n    #Yes.\n        -Right…\n        *set honor %+5\n        *set believer %+30\n    #No.\n        -Well, then I'm about to do something stupid…\n        *set believer %-30\n        *set honor %+5\n    #What's it to you?\n        -Sorry MacSecret. I was jut asking. Anyway…\n        *set honor %-5\n    #Maybe.\n        -Well, then, maybe, I'm about to do something stupid…\n        *set believer %+15\n        *set honor %-5\n    #What do you mean exactly?\n        -Never mind…\n\nShe pulls something out of a pocket in her black coat. It seems to be a powder of some sort.\n\n-I got this from a friend. It's very, very illegal, and it cost so much to acquire. It won't restore your whole memory back, we're not in the simulation, but it will surely help.\n\nShe extends her arm towards you and then pulls it back.\n\n-This is a very dangerous drug that might have horrible side effects. Only suck in if you are sure about this.\n\n*choice\n    #Take it.\n        *achieve drug\n        *set honor %-10\n        *set tenderness %-20\n        *goto drugged\n    #Leave it.\n        *set honor %+10\n        *set tenderness %-20\n        *goto nope\n\n*label drugged\nYou take the drug in your hand and snuff at it. Mia starts talking.\n\n-OK calm down now. Sit down. Relax. You have to be really chill for it to work. Breath in breath out. Imagine you are in a bath…\n\nHer voice starts to blur out. You are in a bath. The water is warm. It feels so good. You start to go lower. Deeper. You are underwater but you can breath. Going deeper and deeper. It's getting darker. You remember.\n*page_break\nYou remember the war. You remember being taken prisoner. Quinta is also there.\n*if (federik_alive)\n    Federik also.\nThey are all prisoners. You remember the prison cleaner. It's your housemaid. The guards, you remember them, they're Simon and Florian. Eliana was the priestess who came to talk to you. There were other prisoners. Vittorio and Josef are in the prison in front of you. They were all taken one by one. Your turn came. They put you under something… something you can't remember. The harder you try the harder it gets. The tormentor, his face you remember. The Hell Walker. In the background you also see a familiar face. It's too blurry. Who is she? Is she Galatia De Smet? You also remember the head of the project, it was… Melody.\n*page_break\nYou wake up from this dream state coughing. You are coughing so hard you can't seem to find space to breath. After some unpleasant seconds you manage to catch your breath. Mia is standing there above you watching you suffering, not trying to help.\n\n-You OK, there? Come now we need to go. They're waiting for us.\n*label come\n*choice\n    #Go.\n        *set tenderness %+5\n        *set obstinate %-5\n        *goto motorc\n    #-I'm not coming.\n        -Look, you don't have much choice. The only way for you to go to the end is with us. Then you decide what are you going to do. Refusing will only make Rain King take you as a prisoner.\n        *set tenderness %-5\n        *set obstinate %+5\n        *goto come\n    #-I'm not riding with you.\n        *set honor %+5\n        *set tenderness %-5\n        *set obstinate %+5\n        -Oh don't worry about that.\n        *goto motorc\n    #-Thanks for the drug.\n        -Yeah, yeah, sure. Now move.\n        *set tenderness %+10\n        *set obstinate %-5\n        *set altruism %+5\n        *goto motorc\n    #-Why didn't you help me?\n        -I warned didn't I. What did you want me to do? Pet you on the shoulder?\n        *set tenderness %-5\n        *goto come\n*label motorc\n\nAnother black motorcycle comes, driving in autopilot. You can't deny you like it. You hop on the motorcycle and the two of you start riding parallel, leaving a trail of smoke behind the colorless city.\n*finish\n\n*label nope\n-Really? Alright, all that was for nothing than. Whatever. Come we need to go. They're waiting for us.\n*choice\n    #Go.\n        *set tenderness %+5\n        *set obstinate %-5\n        *goto motorc\n    #-I'm not coming.\n        -Look, you don't have much choice. The only way for you to go to the end is with us. Then you decide what are you going to do. Refusing will only make Rain King take you as a prisoner.\n        *set tenderness %-5\n        *set obstinate %+5\n        *goto come\n    #-I'm not riding with you.\n        *set honor %+5\n        *set tenderness %-5\n        *set obstinate %+5\n        -Oh don't worry about that.\n        *goto motorc\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*comment Screenshot 1\n*set name \"Dalinar\"\n*set surname \"Kutuzov\"\n*set honor 50\n*set tenderness 50\n*set altruism 50\n*set obstinate 50\n*set believer 50\n*set health 7\n*script changeBackgroundColor(\"sepia\")\n\nYou walk with heavy steps. Exhausted. Breathing in the cold, humid air. The blood inside your body veins is boiling. Filled with rage. You have long lost control of yourself. But now it's almost over. On your hand you have the gun, still hot. Locked with your wrist. Hand shaking a little. As you step in the puddles of blood mixed with water, you notice on your side the Kings bio-copy. Dead, just like the rest. Before you, the opening. The real Kings silhouette is visible near the edge of the floor. You approach. Finally the end of your duty is before you. Sitting down, unarmed, the King sees you in the eye. He starts talking with an old, tired, yet strong and royal voice.\n*fake_choice\n    #End this now.\n    #Let him talk. \n \n*comment Screenshot 3\n*set name \"Dad\"\n*set surname \"Caca\"\n*set honor 67\n*set tenderness 56\n*set altruism 55\n*set obstinate 68\n*set believer 75\n*set health 6\n*script changeBackgroundColor(\"black\")\n\nYou start sprinting down the hill. Your gun connected through a cable with your temple recognizes your alarming thoughts and activates. Your heartbeat is exploding your rib cage. The sound of machinery, guns and screams is boiling up. Everything is happening so fast. A frost grenade explodes near you. You feel the cold hitting on your side. You almost fall. You were far enough. Your friends are running in front of you. You jump over a dead body and keep running.\n\nJimi gets shot. His whole upper body obliterated. You don't have time to contemplate. An MTD comes, not far before you. An intricate mechanical metallic wheel, three times your size, assembled with pipes and LEDs. It quickly transforms itself. Two short, thick, spider-like legs take shape forward. It now leans on three points. Underneath and above it, turrets start firing. You are almost deafen. A line of fire cuts through Federiks legs. He falls down screeching. You hear Quinta shouting at you from the other side.\n\n-We … to retreat … the order …\n*fake_choice\n    #Go grab Federik.\n    #Retreat.\n        \n\n*comment Screenshot 4\n*set name \"Giulia\"\n*set surname \"Calidonna\"\n*set honor 26\n*set tenderness 80\n*set altruism 54\n*set obstinate 39\n*set believer 23\n*set health 7\n*script changeBackgroundColor(\"sepia\")\nYou sit on the side of the wall alone. So many people in this venue. So much noise. Suddenly the noise stops. There is only a faint continuous beep. It is as if you were gone deaf. Everything stops moving. All the people start turning black. Your vision starts to smudge. From the participants black water starts to derive on the opposite of gravity. Every person is a source of a reverse black rain. Except one. You can hardly see a feminine figure in the middle of the room. Just like the others, except white. Blinding white. You walk towards her, dizzy. She slowly turns her head towards you. She doesn't have features, like a manikin. A stinging voice:\n\n-I am the bug.\n\nEveryone else starts running and jumping towards her, obstructing the light.\n*fake_choice\n    #Stay.\n    #What do you mean?\n    #Help her.\n    #What's going on?!\n    #Run away.\n\n\n*comment Screenshot 5\n*set name \"Ilda\"\n*set surname \"Sheikh\"\n*set honor 56\n*set tenderness 60\n*set altruism 54\n*set obstinate 51\n*set believer 52\n*set health 1\n-I lost it to a frost grenade. It was on the ground, I quickly removed my helmet put it over and used it to absorb the blast. I lost my hand in the process. Hey, better than losing my life and that of my team, no? \n            \nHe puts the robotic hand inside for you to see. It's silver in color with a little blue for design.\n            \n-By the way are you starting to worry about me again?\n*fake_choice\n    #Touch his hand.\n    #What do you mean?\n    #I'll always care about you.\n    #Of course not.\n    #We'll see.\n    #I only worry about myself.\n\n*comment Screenshot 7\n*set name \"Markus\"\n*set surname \"Drake\"\n*set honor 25\n*set tenderness 88\n*set altruism 67\n*set obstinate 60\n*set believer 86\n*set health 0\n[i]Never…[/i]\n\nYou are in a desert. It's night. The sky is almost clear, starts dancing in it's dark nakedness. The grayish sand in your feet is cold. A breeze sends grains of sand twirling in harmony. Before you a small, dark purplish blue tent breaks tediousness of the dunes. Silver stars are sewed on it's sheets. You touch the fine material of the sheets covering the entrance to the tent and set foot in.\n\nInside, incense is being burned. Your nose notifies you of it before your eyes. Inside it is as dark as outside. There is a rug with three cards before you. On the other side of the rug it's seated a very old and skinny woman wearing a black wedding dress. The dark veil covers her eyes, but you can see her razor sharp, pointy teeth. There are also innumerable pieces of cloth, trinkets and knick-knacks ornamenting the hazy shelter.\n\nThe unnerving creature conveys what you think is a smile. She then speaks with a slow voice, spit coming out of her mouth. Her voice is rusty, you can swear you hear echoes of her voice from all directions.\n\n-I… have… been… waiting… for… you… Sit… down…\n*fake_choice\n    #Sit.\n    #Say something.\n\n\n*comment Screenshot 8\n*set name \"Napoleone\"\n*set surname \"Attano\"\n*set honor 51\n*set tenderness 33\n*set altruism 21\n*set obstinate 54\n*set believer 40\n*set health 4\nThe reddish sun opposes the black monolith, casting a shadow in the deserted district below. You are in the elevator, going up. It will take you a few minutes to reach the top. On your wrist, your handgun is locked. You feel tired and resolute at the same time.\n\nAt last the elevator arrives. You have to climb the last two floors as construction isn't over. When you get to the open roof a strong wind hits you, almost sending you off balance. It's chilly in here, and not easy to breath. The roof it's the size of two pitches, but more than half of it is unfinished, only the steel skeleton completed. You get closer to the man in the red coat, the only person here except you. Vittorio Ziat turns towards you.\n\n-The Black Cathedral is a wonder made by mankind's hands. To live in it, nah, to own it is something unimaginable by most people. Yet, the Rain King choose to build this. Apex Crown. Something so ridiculously great, it makes the Cathedral seem tiny. You can never satisfy human appetite, can you?\n*fake_choice\n    #You can't.\n    #You're wrong.\n    #You couldn't satisfy Rain King's appetite.\n    #Why did you call me here?", "shore": "*comment ACT 3 SCENE 5\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nThe sun has already set. The pink clouds are the witnesses. If it wasn't for the nerve-cracking noise of the helicopter, the whole atmosphere would have been so relaxing. You are sitting on the the edge of the colossal transport aircraft, flying above the ocean. The smell of the sea combined with the breeze makes a welcoming addition to the mood. The Rain King himself comes and sits beside you.\n\n-I believe you won't give me the [i]your majesty[/i] just yet.\n\nHe seems friendlier than other times.\n\n-I know you have questions. I have too, trust me. I can only promise that after this we will have answers.\n\n*fake_choice\n     #-I hope so.\n        He nods.\n        \n        -\n        *set believer %+5\n        *set obstinate %-5\n        *set tenderness %+5\n     #-That's what everyone has been saying.\n        -I believe you.\n        *set tenderness %+5\n     #-After what?\n        -After we take control of the seaport and liberate Dr. Galatia.\n        *set obstinate %-5\n        *set tenderness %+5\n     #-I don't trust you.\n        -Surprising, considering you trusted the one who put you in the simulator. I don't need your trust, only your loyalty.\n        *set obstinate %+5\n        *set tenderness %+5\n     #-What if we don't?\n        -I'm the Rain King. If I say something, it's done.\n        *set obstinate %-5\n        *set tenderness %+5\n     #-Fuck you!\n        -I'm the fucking Rain King. I don't need to remind you where we stand. I understand what you have been through…\n        *set obstinate %+5\n        *set tenderness %-15\nAnyway, I need you to get ready. They are preparing the suit. We'll need every one we can for this next attack.\n*choice\n    #-Of course.\n        *label ofco\n        *set obstinate %-5\n        *set tenderness %-10\n        *set honor %+5\n        *set altruism %+5\n        *goto ready\n    #-I'm not coming.\n        -This is above you ${surname}. Do you really want to stay here and watch your people get slaughtered for you? Today is the day heroes are made. Your cowardice will be written in history.\n        *set obstinate %+5\n        *set tenderness %+10\n        *set honor %-5\n        *set altruism %-5\n        *choice\n            #-Alright.\n                *goto ofco\n            #-You can't persuade me.\n                *goto nodo\n\n*label ready\nKoa, which seems alive and well, starts to brief you.\n\n-The attack will be during the night. We have some extreme heavy armors for you remaining, but those are the last ones so you should be very careful. The point is to take control of the seaport, which is the main district of the city and the only way to take control further.\n\nAfter this he shows you the armor. It's big. It's so big it's impossible to operate without it's mechanisms and a operating electronic system. The black, thick plates of steel look and feel heavy. This is practically a tank turned into a suit.\n\n-You like it, don't you, ${nickname}.\n\nHe starts helping you get inside. Although the armor seems slow, it's presence is above intimidating. Inside it's made of soft material, like pillows.\n\n-Oh [i]that[/i], that's because in the old times we found out the the primary cause of death in this armor was concussion. Drowning was a close second. You now have full control of this monster. Except the two main guns, you also have rocket launchers in the back, hidden unless you choose otherwise and a flamethrower system distributed through the whole body, in order to keep warm in extreme situation, or you know, burn the enemies if they get close. The built-in GPS will help you navigate through the unknown territory, and will also show you and your allies where you are… Good luck ${nickname}. You'll undoubtedly need it.\n\nThe sea is lit only by the moonlight. The weather doesn't look promising. You can see the shore now. You are really close. It looks like this side of the shore was used as a beach before. Wait. Is that a rocket coming this-\n*page_break\nThe aircraft you are in is hit. The explosion light contrasting the darkness of the night. Koa is sent out of the helicopter. You start to go after him. But you hear Mia shouting:\n\n-No! Help the King! Inside the armor!\n\nYou turn your head to see the King in a same type of armor as you, but not fully merged. The aircraft starts to spin.\n*fake_choice\n    #Jump out to save Koa.\n        *set obstinate %+5\n        *set tenderness %-5\n        *set honor %+5\n        *set altruism %+10\n        You throw yourself out of the helicopter. Your armor has lights build, just like an automobile. You manage to see Koa in the air but you don't have enough time to figure out how to send yourself near him.\n    #Help Rain King get inside his armor.\n        *set obstinate %-5\n        *set tenderness %+5\n        *set honor %+10\n        *set altruism %+10\n        You approach rain King and start helping. After some precious seconds he understands this is not working, in these difficult circumstances. He pushes you away before it's too late. You find yourself out of the aircraft, in the air.\n    #Save yourself.\n        *set obstinate %+5\n        *set tenderness %+5\n        *set honor %-5\n        *set altruism %-10\n        You throw yourself out of the helicopter. Your armor has lights build, just like an automobile. You see Koa in the air but even if you wanted to, you couldn't figure out how to go towards him. There is no time to think.\nYou hit the water. It was just a bit deeper than your size, so you hit the sand below too. Salty water begins to fill your suit. You get up and start walking towards the beach. You feel the not so small waves hitting you from behind. Forcing you to face destiny. You can't feel, but you can see the small droplets of a rain hitting the outside of your armor. The, now familiar, noises and screams of war have begun.\n\nYou reach the sand beach and are immediately greeted by a frost grenade. You activate the flamethrowers, nullifying the attackers attempt, but also attracting attention from his allies. The next hour is the darkest, bloodiest, hour of your life.\n*page_break\nYour ears still hurt from the powerful noises of combat. Your armor is washed in bullet holes. It holds, unshaken, but far from untouched. You have reunited with your allies. Rain King and Koa are still missing. Mia speaks to you through the radio.\n\n-We have to keep going. We have control of the seaport. We have to find the prison.\n\nYou keep walking in the city of corpses. You have spent much more time in this armored suit now, than you would have ever wished.\n*page_break\n\nIt's early morning. The sky has brighten, but the sun has not yet introduced itself. The armor keeps the temperature inside optimal. With heavy steps you keep  trudge through the small seaside city. It's style much different from the last. The architecture has a classical heart and the cobbled streets are it's veins. The uninviting sculptures hanging from the buildings look almost as if they have foreshadowed the fall of this alluring city. Except the metallic noise of your armor  the streets are silent. A rooster is heard from away crowing. You keep moving. You see a family running away behind buildings. Not every citizen has had the chance to escape the city under attack.\n\n-Do you hear that?\n\nMia speaks through the radio. You try to hear. Nothing. You keep moving. Then, you hear. It's a noise. Like something is falling from the sky.\n\n-ARTILLERY!\n\nIt hits. Dirt and concrete reaching the sky. You are thrown spinning from the impact, your body still intact.\n\n-REMOVE THE ARMOR SO IT CANNOT -\n\nAgain. This time you are sent hitting the stone building nearby in the third floor and then falling down. Blood begins to pour on your face. You open the armor and try to get out, but your whole body is in bruises. You're stuck. You can already hear the sound of the next wave coming. Somebody is here. He is helping you. It's Koa he helps you get out and pulls you away from the fire zone. While you are being pulled, you see another armored ally thrown to pieces by the strike.\n*set health -1\n*goto saved\n\n\n*finish\n\n*label nodo\n-Oh yes I can, but in this case I don't need to. The biggest price here it's being payed by you.\n\nHe gets up and starts ordering everybody else to get in their armors. You take a look at one of the suits. It's big. It's so big it's impossible to operate without it's mechanisms and a operating electronic system. The black, thick pl  you hit the sand below too. It hurts. A lot. You swim above and take long breaths. Salty water enters in your mouth. It's cold. You start swimming towards the beach. The not so small waves push you from behind. Forcing you to face destiny. You can't see, but you can feel the small droplets of a rain hitting your face. The, now familiar, noises and screams of war have begun.\n\nYou reach the sand beach and start walking. A frost grenade hits nearby. A chill goes down your spine. The next hour is the darkest, bloodiest, hour of your life.\n*page_break\nYour ears still hurt from the powerful noises of combat. Surprisingly, even at a clear disadvantage, you have managed to keep your body uninjured. You are reunited with your allies. Rain King and Koa are still missing. Mia speaks to you through the radio of her armor.\n\n-We have to keep going. We have control of the seaport. We have to find the prison.\n\nYou keep walking in the city of corpses. You have seen much more of war, than you would have ever wished.\n*page_break\nIt's early morning. The sky has brighten, but the sun has not yet introduced itself. Without the medicine your body feels… bad. The grudges, injuries and fatigue are not negligible. You almost feel old. An ugly reminder of the sufferings of the real world. The armor keeps the temperature inside optimal. With heavy steps you keep trudging through the small seaside city. It's style much different from the last. The architecture has a classical heart and the cobbled streets are it's veins. The uninviting sculptures hanging from the buildings look almost as if they have foreshadowed the fall of this alluring city. Except the metallic noise of your allies armor the streets is silent. A rooster is heard from away crowing. You keep moving. You see a family running away behind buildings. Not every citizen has had the chance to escape the city under attack.\n\n-Do you hear that?\n\nMia speaks through the radio. You try to hear. Nothing. You keep moving. Then, you hear. It's the a noise. Like something is falling from the sky.\n\n-ARTILLERY!\n\nIt hits. Dirt and steel reaching the sky. You are thrown spinning from the impact, your body still intact. Mia is shouting at the others.\n\n-REMOVE THE ARMOR SO IT CANNOT -\n\nAgain. This time you are sent hitting the stone building nearby and then falling down. Blood begins to pour on your face. You try to get up, but you are too shaken. You're stuck. You can already hear the sound of the next wave coming. Somebody is here. He is helping you. It's Koa he helps you get out and pulls you away from the fire zone. While you are being pulled, you see another armored ally thrown to pieces by the strike.\n*set health -1\n*goto saved\n\n*label saved\nKoa pulls you behind a structure. Standing there it's also Rain King. You had never seen him covered in dirt and blood. He was talking to himself:\n\n-…here I thought Bravo team had done it's job.\n\nKoa talks to you:\n\n-You're safe now.\n*fake_choice\n    #-Thank you.\n        *set honor %+5\n        *set altruism %+5\n        *set tenderness %+5\n        -Hem. You're welcome. After all we need you don't we?\n    #-I don't need your help.\n        *set honor %+5\n        *set altruism %-5\n        *set obstinate %+5\n        *set tenderness %-5\n        -I thought I saved your life there.\n    #-I'm happy to see you alive.\n        *set altruism %+5\n        *set tenderness %+5\n        He holds your hand.\n        \n        -So am I.\n    #-So, you two survived.\n        *set honor %-5\n        *set obstinate %-5\n        The Rain King answers.\n        \n        -We did. Thank you for your interest.\nYou can rest here. The artilleries won't strike this close to the prison.\n\nYou spend the next minutes catching your breath and quickly bandaging any repairable wound. After a few minutes Mia shows where you are hiding, covered in sweat and blood.\n\n-Any other survivors?\n\nKoa asks hurriedly. She shakes her head.\n*page_break\nYou are in the terrace. The sun above your heads. Rain King is holding a binocular.\n\n-Watch.\n\nHe passes it to you. After searching a little you find the entrance to the prison. It's a five sided pyramid, made with glass and iron. A beautifully carved technological door blocks the entrance. Not far away from it, under a merchant tent you see two people. One in a suit and another with braids. Around them there are dogs. Not ordinary dogs. Almost more machine than flash these types of cyborg dogs have been used before. Their limbs are replaced with mechanical parts, their body is covered in thin but efficient armor and their teeth and eyes have been exchanged for a better military use. The two men seem to be making a deal. They shake hands. The gentleman in the suit makes a movement. The dogs attack the other. They tear him to pieces. So, the gentleman controls the dogs. You have seen his face before, but can't remember. He probably is an important figure of e-conglomerate.\n\n-He has spread the dogs through the area. Our only choice is stealth. We have to reach the entrance of the prison as quickly as possible.\n\n*finish\n        ", "sister": "*comment ACT 2 SCENE 2\n\n*hide_reuse\n[Remember to check stats to see how you are doing.]\n\n\n[i]Present…[/i]\n\nNight. Like the soothed thoughts after an angry argument has finished, the storm has started to calm down. The gigantic Black Cathedral, assaulted, degenerated and missing it's sovereign, is barely holding itself up.\n\n*if (explosion)\n    Below, in the ruins, you sit. Weary and hurt, but above all surprised. Seeing the lively face of your sister before you gives you a little boost of vigor. You get up.\n    *goto vigor\n*else\n    You stand below it. Behind you, your shadow touching the cathedrals entrance. Before you, your sister, Melody.\n    *goto vigor\n*label vigor\n\nWith an emotionally burdened voice she opens her mouth:\n\n-${nickname}!\n\n*choice\n    #-You are alive!?\n        *set tenderness %+10\n        *set obstinate %-5\n        \n        -Yes, -she gulps -I am. And so are you!\n        \n        She hugs you.\n        *goto hug\n    #-Am I dead?\n        *set tenderness %+15\n        *set obstinate %+10\n        \n        -No, you're not.\n        \n        She gulps.\n        \n        -We are both alive.\n        \n        She hugs you.\n        *goto hug\n    #-No, this can't be real. You are a bio-copy.\n        *set obstinate %+15\n        *set tenderness %+5\n        \n        -Hah! No, the one the king executed was a bio-copy. I am your sister, -she gulps -Melody.\n        \n        She hugs you.\n        *goto hug\n    #Hug her.\n        *set tenderness %-10\n        *set obstinate %-10\n        \n        She hugs you back.\n        *goto hugback\n    #Push her away.\n        *set tenderness %-10\n        *set obstinate %+15\n        \n        *goto pushaway\n\n*label hug\nShe hugs you so hard it starts to hurt a little.\n*choice\n    #Hug her.\n        *set tenderness %+5\n        *set obstinate %-10\n        *set altruism %+10\n        *label hugback\n        You two hug each other for a few seconds.\n        *goto quick\n    #Push her away.\n        *set tenderness %-10\n        *set obstinate %+15\n        *set altruism %-10\n        *label pushaway\n        She looks you with a downhearted face.\n        \n        -I suppose I asked for too much.\n        *goto quick\n*label quick\n\n-Look, I know you're tired and have a mountain of questions, but we need to move. Please, make it quick.\n\n*label questions\n\n*choice\n    #-How are you alive?\n        -It took me almost all my wealth and a lot of time, but I managed to corrupt the most important servants of the King. Or better, the ones I needed to put my plan in action. Than I did something the Rain King would not let pass without my head. Using my new made friends I switched myself with an unique bio-copy, which was executed in my place. Everyone thought I was dead, including you, and it was the only way. If there was another way, an easier way, I would have done that, I swear.\n        *goto questions\n    #-Where were you all this time?\n        -I was hiding in my safehouse. Don't worry we will drive there now and you will see for yourself. I just came here, because I wanted to see you victorious, and… alive.\n        *goto questions\n    #-Why did you do this?\n        -There are things at play far greater than me, you and the Rain King. I can't explain everything to you here. For all I know, this was the only way.\n        *goto questions\n    #-I could have died there.\n        -… I know. It was a risk I had to take. I trusted you. You didn't let me down. I knew you wouldn't.\n        *goto questions\n    #-People died for you.\n        -Yes ${nickname}! This is a revolution, people will die. And if we don't get moving the numbers will be unimaginable.\n        *goto questions\n    #-Why didn't you help me?\n        -No. You needed to do this alone. Even if I had joined, I would have only slowed you down.\n        *goto questions\n    #-Why did you want to kill the Rain King?\n        -The Rain King was one of the principal… but lately he had become an obstacle. His death was the catalyst of what is about to come.\n        *goto questions\n    #-Is this about the war?\n        -No, this is bigger. I am not sure if this was a fruit of the war or what caused it.\n        *goto questions\n    #-Are you a renegade?\n        -No, never. I'm not with e-conglomerate either. I am myself.\n        *goto questions\n    #-How can I trust you?\n        -${nickname}, everything I did, everything you did, we did it for us. If there was a better way, I would have done that. You have to understand the importance of this. Please come with me!\n        *goto questions\n    #-Explain everything.\n        -I can't. How can I explain everything here? Come with me. I'll show you.\n        *goto questions\n    #-Let's go.\n        *label letsgo\n        *set tenderness %+10\n        *set obstinate %-15\n        *set altruism %+10\n        Your sister sits on her voguish electric motorcycle. You sit behind. As she starts the engine, an unwashed black cat, scared by the noise, dashes before you to a garbage can.\n        *goto promise\n    #-I won't come with you.\n        -${nickname}, please think about it. What happened to you hurts me too and I am sorry about it, but there is no other way. You must find a way to forgive me. Come with me, please!\n        *choice\n            #-I'm coming.\n                *goto letsgo\n            #-I'm not coming.\n                *set forgiven false\n                *set tenderness %-10\n                *set obstinate %+15\n                *set altruism %-10\n                She looks dejected. Without saying another word she sits on her voguish electric motorcycle. As she starts the engine, an unwashed black cat, scared by the noise, dashes before you to a garbage can.\n                *goto promise\n*label promise\n\n-Drink this. It's for your health.\n\nMelody throws you a vial holding a white liquid inside, reminding you of milk.\n\n-Hey, can you promise me one thing. Don't tell Josef about me, okay?\n*choice\n    #-I promise.\n        -Thanks.\n        *finish\n    #-I won't promise you that.\n        -Oh come on! Please!\n        *label prom\n        *choice\n            #-Alright, I promise.\n                -Thanks.\n                *finish\n            #-I can't.\n                -Urrrghhh. Alright!\n                *finish\n    #-Why?\n        -Just promise me, that's all I ask.\n        *goto prom\n            ", "sleepy": "*comment ACT 3 SCENE 2\n\n*hide_reuse\n*set kiss false\n\n[Remember to check stats to see how you are doing.]\n\n*if (prisoner)\n    You can tell time has passed. You have a disgusting taste in your mouth, like rotten blood. You open your eyes. Darkness. You have your eyes wide open, but still can't see anything. Pitch black. You calm your breath and focus for a moment ontemplates looking at the fire.\n    \n    -They have really brainwashed you there haven't they. If only there was a way to bring you back on our side. We need you now more than ever.\n    \n    He starts scratching his robotic hand.\n    \n    *label robotic\n    \n    *choice\n        #-You can let me out.\n            -If only. It's too risky. I might get hanged if you run away again.\n            *label let_me_out\n            *choice\n                #-Please!\n                    -I'm sorry ${nickname}. You know what I would give my life for you, but I'm doing you a favor by keeping you locked. We'll let you out when you regain your senses.\n                    *goto let_me_out\n                #-I said let me the fuck out!\n                    *set believer %-5\n                    *set tenderness %-5\n                    -If you're gonna keep screaming I'm just gonna leave and put the cover back.\n                    *goto let_me_out\n                #-I promise I won't run away.\n                    -Not long ago I would have trusted you with my life. Right I can't trust you. Not until you start reasoning again.\n                    *goto let_me_out\n                #-Alright.\n                    *goto robotic\n        #-What happened to your hand?\n            -I lost it to a frost grenade. It was on the ground, I quickly removed my helmet put it over and used it to absorb the blast. I lost my hand in the process. Hey, better than losing my life and that of my team, no? \n            \n            He puts the robotic hand inside for you to see. It's silver in color with a little blue for design.\n            \n            -By the way are you starting to worry about me again?\n            *choice\n                #Touch his hand.\n                    It's cold. Under the metallic covers you can spot the wires and strings.\n                    *label hand_above\n                    He puts his other hand above yours.\n                    *choice\n 's what kept us alive and going. Too bad we got divided in the military.\n                    *choice\n                        #-We can still care for each other.\n                            *set altruism %+5\n                            -Of course, that's what I'm doing. In the meantime try to become ${name} ${surname} again for me, please.\n                            *goto robotic\n                        #-I don't see you caring for me.\n                            -As a matter of fact, that's exactly what I'm doing. In the meantime try to become ${name} ${surname} again for me, please.\n                            *goto robotic\n                        #-I don't care for you.\n                            *set altruism %-5\n                            He stays silent for a second, his lips portraying sadness.\n                        \n                            -This is not you talking. You will change your mind. Whatever happens, I will care for you.\n                            *goto robotic\n                        #-Whatever.\n                            *goto robotic\n                #-I'll always care about you.\n                    *set altruism %+5\n                    *goto hand_above\n                #-Of course not.\n                    -Disappointment. I almost thought you were connecting to your old self.\n                    *goto robotic\n                #-We'll see.\n                    -Oh I'm sure we will be best friends again, it's just a matter of time.\n                    *goto robotic\n                #-I only worry about myself.\n                    *set altruism %-15\n                    -Hm. You still remember things, but you don't know you remember them. They couldn't change your values. That was our motto ${nickname}. We always used to tell ourselves we only care about us.\n                    *goto robotic\n        #-Is he really the Rain King?\n            -Hehe. I would say so yes. You were never a strongly sympathetic towards him, but hey he isn't the one who made you prisoner of war and put you in a simulation. OK, he put you in a jail but just because you were acting crazy.\n            *goto robotic\n        #-Why are we looking for Dr. Galatia De Smet?\n            -It's about Project Cognition, which I assume you are familiar with now. Dr. De Smet was head of the project, working for us. During the e-conglomerate advances the city was captured and she was taken prisoner. We are looking to rescue her, you do know how important she is in the course of the history. Scientific research has always had a great contribute in warfare.\n            *label warfare\n            *choice\n                #-Do you know where she is?\n                    -Yes. It's another city nearby, not very known. We know she is alive but we don't know what she has been through or whether she would be able to work again.\n                    *goto warfare\n                #-What about Project Cognition?\n                    -That's the reason Dr. De Smet was taken prisoner. Our advancements in that project were far from successful, but e-conglomerate was also working… we don't know… much.\n                    *goto warfare\n                #-What aren't you telling me?\n                    -Can we change subject please, I still don't know if you believe us.\n                    *goto robotic\n        #-Why am I here?\n            -What do you mean? We want you. You were prisoner and we came to rescue you.\n            *fake_choice\n                #-Drop the bullshit!\n                    *set obstinate %+5\n                    *set tenderness %-5\n                    *set believer %-5\n                    He stays silent for a second. Just as he opens his mouth to talk\n                #-Don't lie to me!\n                    *set obstinate %+5\n                    *set tenderness %-5\n                    *set honor %+5\n                    -What, I'm not lying, I really\n                #-I'm not that important.\n                    *set altruism %+5\n                    *set tenderness %+5\n                    *set honor %-5\n                    -You're much more important than\n                #-Fine.\n                    *set obstinate %-5\n                    *set tenderness %+5\n                    He stays silent for a second. Just as he opens his mouth to talk\n            *goto raid\n*else\n    You can tell time has passed. You have a disgusting taste in your mouth, like rotten blood. You open your eyes. Night. You are laying near a huge campfire. There are other military personnel nearby talking and wandering around. Some are resting. You are covered in warm sheets. You get closer to the pleasant fire. Just as you are thinking about any possibility of you leaving the camp without being noticed you hear a voice.\n    \n    -Here, I brought you some food. I thought you might be hungry.\n    \n    It's Koa. He holds in the hand what looks like a standard military ration.\n    \n    *choice\n        #-Thanks.\n            *set honor %+5\n            *set altruism %+5\n            *set obstinate %-10\n            *set tenderness %+5\n            -You're welcome.\n            *goto conv2\n        #-No thank you.\n            *set honor %+5\n            *set altruism %-5\n            *set obstinate %+10\n            *set tenderness %+5\n            -Eat it. It will help you recover. You have been through some shit.\n            *fake_choice\n                #Take it.\n                    *set obstinate %-10\n                #Leave it.\n            *goto conv2\n        #-Put it up your ass!\n            He puts the food away.\n            \n            -Look I understand you're confused ${nickname}, but being stubborn won't help. We came here to help you.\n            *set honor %-5\n            *set altruism %-5\n            *set obstinate %+10\n            *set tenderness %-5\n            *set believer %-5\n            *goto conv2\n        #Just take it.\n            *set honor %-5\n            *set altruism %+5\n            *set obstinate %-10\n            -You're welcome.\n            *goto conv2\n    *label conv2\n    \n    He sits beside you. He contemplates looking at the fire.\n    \n    -They have really brainwashed you there haven't they. If only there was a way we could regain your full trust. We need you know more than ever.\n    \n    He starts scratching his robotic hand.\n    \n    *label robotic2\n    \n    *choice\n        #-You can run away with me.\n            -Haha. The offer is tempting, I will say.\n            *label let_me_out2\n            *choice\n                #-Let me go then.\n                    -I'm sorry ${nickname}. You know what I would give my life for you, but I'm doing you a favor by not letting you go. We'll let you do whatever you want when you regain your senses.\n                    *goto let_me_out2\n                #-I'm serious.\n                    -I'm really sorry, there is nothing I can do. You are safer here until you start reasoning straight again.\n                    *goto let_me_out2\n                #-Alright.\n                    *goto robotic2\n                #Run away now.\n                    He realizes what you are about to do and puts his robotic hand on your shoulder.\n                    \n                    -Don't. Not now. You will just make things worse and end locked up.\n                    *goto robotic2\n        #-What happened to your hand?\n            -I lost it to a frost grenade. It was on the ground, I quickly removed my helmet put it over and used it to absorb the blast. I lost my hand in the process. Hey, better than losing my life and that of my team, no? \n            \n            He puts the robotic hand before you for you to see. It's silver in color with a little blue for design.\n            \n            -By the way are you starting to worry about me again?\n            *choice\n                #Touch his hand.\n                    It's cold. Under the metallic covers you can spot the wires and strings.\n                    *label hand_above2\n                    He puts his other hand above yours.\n                    *choice\n                        #-Cool.\n                            -Haha. Yeah, kinda. It steel feels weird though… and I miss my real hand.\n                            *goto robotic2\n                        #-I'm sorry you lost your hand.\n                            He removes his hands.\n                            \n                            -As I said, there wasn't much of a choice. There are others who have lost more more because of the war.\n                            *goto robotic2\n                        #Kiss him.\n                            *set kiss true\n                            He kisses you passionately but than removes his head and closes the glass.\n                            \n                            -This isn't you. Not like this. You are not yourself.\n                            *choice\n                                #-I love you.\n                                    No. I won't speak to you about this. Not until the real ${nickname} regains control of the actions.\n                                    *achieve love\n                                    *goto robotic2\n                                #-It is me.\n                                    No. I won't speak to you about this. Not until the real ${nickname} regains control of the actions.\n                                    *goto robotic2\n                                #-Come with me.\n                                    No. I won't speak to you about this. Not until the real ${nickname} regains control of the actions.\n                                    *goto robotic2\n                                #-Gotcha.\n                                    You are… Whatever.\n                                    *goto robotic2\n                        #Remove your hand.\n                            *goto robotic2\n                        #-It's so ugly.\n                            -Haha. Fuck you! I missed you.\n                            *goto robotic2\n                #-What do you mean?\n                    -We always cared for each other. That's what kept us alive and going. Too bad we got divided in the military.\n                    *choice\n                        #-We can still care for each other.\n                            *set altruism %+5\n                            -Of course, that's what I'm doing. I'm sure we will be best friends again, it's just a matter of time.\n                            *goto robotic2\n                        #-I don't see you caring for me.\n                            -As a matter of fact, that's exactly what I'm doing. I'm sure we will be best friends again, it's just a matter of time.\n                            *goto robotic2\n                        #-I don't care for you.\n                            *set altruism %-5\n                            He stays silent for a second, his lips portraying sadness.\n                        \n                            -This is not you talking. You will change your mind. Whatever happens, I will care for you.\n                            *goto robotic2\n                        #-Whatever.\n                            *goto robotic2\n                #-I'll always care about you.\n                    *set altruism %-5\n                    *goto hand_above2\n                #-Of course not.\n                    -Disappointment. I almost thought you were connecting to your old self.\n                    *goto robotic2\n                #-We'll see.\n                    -Oh I'm sure we will be best friends again, it's just a matter of time.\n                    *goto robotic2\n                #-I only worry about myself.\n                    *set altruism %-15\n                    -Hm. You still remember things, but you don't know you remember them. They couldn't change your
