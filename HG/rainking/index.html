 values. That was our motto ${nickname}. We always used to tell ourselves we only care about us.\n                    *goto robotic2\n        #-Is he really the Rain King?\n            -Hehe. I would say so yes. You were never a strongly sympathetic towards him, but hey he isn't the one who made you prisoner of war and put you in a simulation. He is stern, but reasonable.\n            *goto robotic2\n        #-Why are we looking for Dr. Galatia De Smet?\n            -It's about Project Cognition, which I assume you are familiar with now. Dr. De Smet was head of the project, working for us. During the e-conglomerate advances the city was captured and she was taken prisoner. We are looking to rescue her, you do know how important she is in the course of the history. Scientific research has always had a great contribute in warfare.\n            *label warfare2\n            *choice\n                #-Do you know where she is?\n                    -Yes. It's another city nearby, not very known. We know she is alive but we don't what she has been through or whether she would be able to work again.\n                    *goto warfare2\n                #-What about Project Cognition?\n                    -That's the reason Dr. De Smet was taken prisoner. Our advancements in that project were far from successful, but e-conglomerate was also working… we don't know… much.\n                    *goto warfare2\n                #-What aren't you telling me?\n                    -Can we change subject please, I still don't know if you believe us.\n                    *goto robotic2\n        #-Why am I here?\n            -What do you mean, we want you. You were prisoner and we came to rescue you.\n            *fake_choice\n                #-Drop the bullshit!\n                    *set obstinate %+5\n                    *set tenderness %-5\n                    *set believer %-5\n                    He stays silent for a second. Just as he opens his mouth to talk\n                #-Don't lie to me!\n                    *set obstinate %+5\n                    *set tenderness %-5\n                    *set honor %+5\n                    -What, I'm not lying, I really\n                #-Really?\n                    *set obstinate %+5\n                    *set tenderness %+5\n                    -Uh.. Yes of\n                #-I'm not that important.\n                    *set altruism %+5\n                    *set tenderness %+5\n                    *set honor %-5\n                    -You're much more important than\n                #-Fine.\n                    *set obstinate %-5\n                    *set tenderness %+5\n                    He stays silent for a second. Just as he opens his mouth to talk\n            *goto raid\n        \n\n\n*label raid\n-A white light in the black sky interrupts him. It appears to be a drone. All the soldiers nearby get up confused and alarmed and prepare for battle. Between the screams of turmoil the drone is playing a recording on repeat:\n\n-Surrender peacefully and you will be treated fair. Fail to do so and you will be killed.\n\nThe sounds of gunfire begin.\n\n*if (prisoner)\n    Koa focuses on you hesitating.\n    \n    -If I let you out will you run away?\n    *choice\n        #-I'll help.\n            *goto release\n        #-No.\n            *goto release\n        #-No, I promise.\n            *goto release\n        #-Maybe.\n            *goto locked\n        #-Yes.\n            *set honor %+10\n            *goto locked\n        #-If you don't let me out, I'll die.\n            -No you won't.\n            *goto locked\n*else\n    *goto hands\n    \n*label release\nHe presses a few LEDs on the glass and the prison opens.\n*label hands\nKoa hands you a gun. As you take the gun he is shot from behind. He falls to the ground with a cry, but there is no blood. He is probably wearing a bulletproof vest. He shouts at you to hide.\n*label attacker\nThe attacker fires again and you hide behind a stone, his shots missing dreadfully close. You feel something. Something you haven't felt in a really long time. It's fear for your life. You could die any moment in this place. Your whole body is protesting against this horrible feeling. Your panic is only hold in the cage of your experience. The attacker keeps firing at your cover.\n*choice\n    #Hide.\n        *set honor %-10\n        *set altruism %-5\n        *set obstinate %-5\n        *set tenderness %+15\n        You start crawling in the ground, hiding behind stones, trees, abandoned remains and dead bodies. After what seems like a lifetime you find yourself outside the danger zone.\n        *goto caller\n    #Run away.\n        *set honor %-15\n        *set altruism %-5\n        *set obstinate %-5\n        *set tenderness %-5\n        *set health -1\n        You immediately sprint in the opposite direction of the campfire. You hear a few shots and a bullet scratches you from behind your left arm, gravely injuring your triceps. After a minute that seemed like a lifetime you find yourself outside the danger zone and start regaining your breath and calming your exploding heart rate.\n        *goto caller\n    #Fight back.\n        *set honor %+20\n        *set altruism %+10\n        *set obstinate %+10\n        *set tenderness %-20\n        *set health -1\n        You drop cover and shoot the other in the torso but he refuses to go down and fires back. You return fire once again this time hitting him on the head as he falls dead on the ground. You hear another gunshot from your side and quickly change cover hiding behind an old grown tree. The gunfire light lets you spot the other enemy and you start firing blindly, but are not lucky. He is getting closer until he is shot by another ally. You change position again, walking what you think is stealthily. You hear a few shots and a bullet scratches you from behind your left arm, gravely injuring your triceps. You fall down and return fire like crazy, neutralizing the damager. You get up again and try to regain your breath while your heart rate is exploding.\n        *goto caller\n        \n        \n*label caller\n\n-${name}!\n        \nYou immediately turn around and point the gun at the caller.\n        \nIt's Melody.\n*finish\n\n*label locked\nHe presses a few LEDs on the glass and the prison platform goes up. You spot four mechanical legs under the cell. The prison is now a tiny mobile room with you inside. He presses the last button and, using the insect-like legs, the prison starts moving away, before you have a chance to react to the situation you find yourself within.\n\nThe mobile prison is shot repeatedly, but bullets don't pierce through. Ultimately one of the legs is broken. Without losing motion, the prison switches to three legs. An explosive projectile puts an end to this jail machine. The cell is send spinning on the side, rotating towards the campfire. It stops unbearably close. Inside it's starting to get extremely hot. You feel like you are inside an oven, barely able to breath.\n*fake_choice\n    #Break out.\nThe glass is unbreakable despite the cracks from the shots. The only way is using the damage the explosion did to the lower, metallic, part of the cell. You kick it until it opens an then get out quickly, sweating from this cursed adventure. You take a gun from a dead soldier nearby. Shots are fired towards you.\n*goto attacker\n", "startup": "*title Rain King\n*author Marvin K\n*comment per nucen\n\n\n*scene_list\n  cathedral\n  ballroom\n  home\n  team\n  black_market\n  action\n  aftermath\n  $ kid\n  $ sister\n  $ trap\n  $ apex\n  $ dream\n  $ longlive\n  $ galatia\n  $ hellwalker\n  $ awake\n  $ lies\n  $ sleepy\n  $ parkour\n  $ remember\n  $ shore\n  $ entrance\n  $ prison\n  $ endings\n  end\n\n*create name \"?\"\n*create surname \"?\"\n*create nickname \"?\"\n\n*create gender true\n*comment true stands for male, false for female\n*create noun \"sir\"\n\n\n*create honor 50\n*create tenderness 50\n*create altruism 50\n*create obstinate 50\n*create believer 50\n\n*create health 7\n\n*create met_magnates false\n*create eliana_help true\n*create eliana_deal false\n*create renegade false\n*create kiss false\n*create explosion true\n*create federik_alive false\n*create vittorio_alive true\n*create quinta_help false\n\n*create forgiven true\n*create project false\n*create simon_alive true\n*create king false\n*create walker false\n\n*create prisoner false\n*create mia_alive true\n\n*create asked_help false\n\n*comment not that important\n*create nottalked true\n\n*comment guns\n*create guns 3\n*create sub_m false\n*create shotgun false\n*create assault false\n*create minigun false\n*create rocket false\n*create katana false\n*create combat false\n*create throwing false\n*create grenades 0\n\n*achievement c_act1 visible 1 Hello there\n    Finish Act I\n    Finished Act I\n*achievement kiss visible 3 Love at first sight\n    Kiss.\n    You kissed Quinta. \n*achievement friend visible 2 Comrade\n    Save your friend.\n    You saved Federik.\n*achievement namel visible 3 Nameless\n    Find out why the Rain King is called so.\n    In a discussion you found out about the Rain Kings name .\n*achievement loner visible 7 Lone Wolf\n    Do not ask anybody for help.\n    You went against the Rain King alone.\n*achievement renegade visible 5 Rebel\n    Join forces with the renegades.\n    You made a deal with the renegades.\n*achievement rk_dead visible 1 Crown killer\n    Kill the Rain King.\n    The Rain King is dead thanks to you.\n\n*achievement c_act2 visible 2 Time to shine\n    Finish Act 2\n    Finished Act 2\n*achievement apex visible 3 Skyrise\n    Meet Victorio in the Apex Crown.\n    You met Victorio in Apex Crown.\n*achievement reign visible 8 Bow before me\n    Become King/Queen.\n    You reign.\n*achievement hellwalker visible 4 Heavenwalker\n    Send Hellwalker where he walks.\n    You send Hellwalker to hell.\n    \n*achievement c_act3 visible 3 The end\n    Finish Act 3\n    Finished Act 3\n*achievement love visible 9 ILY\n    Say the L word.\n    You said I love you to Koa\n*achievement shoot visible 4 Some shots are better left untaken\n    Take the shot.\n    You killed Quinta.\n*achievement run visible 9 Parkour\n    Catch the runner.\n    You were quicker than Quinta in parkour.\n*achievement drug visible 5 Addict\n    Take the drug.\n    You took the drug.\n*achievement lion visible 5 Lionheart\n    Take the jump.\n    You took the life threatening jump.\n*achievement shoot_king visible 9 I never liked you anyway\n    Shoot your liege.\n    You killed the Rain King, this time for real.\n*achievement shoot_both visible 9 I do not need you\n    Shoot everybody.\n    You killed both the Rain King and the red frog.\n    \n*achievement end1 visible 10 Not afraid of death\n    Ending number 1\n    You arrived here thanks to being glorious till death.\n*achievement end2 visible 10 Cheater\n    Ending number 2\n    You arrived here thanks to cheating in order to win the final fight.\n*achievement end3 visible 10 Godly\n    Ending number 3\n    You arrived here thanks to your adaptability and desire for power.\n*achievement end4 visible 10 I'm only human after all\n    Ending number 4\n    You arrived here thanks to your adaptability and humility.\n*achievement end5 visible 10 The truce\n    Ending number 5\n    You arrived here thanks to your ferocity and altruism.\n*achievement end6 visible 10 Utter obliteration\n    Ending number 6\n    You arrived here thanks to your ferocity and selfishness.\n*achievement end7 visible 10 Pray to the Machine\n    Ending number 7\n    You arrived here thanks to being faithful and accepting your new God.\n*achievement end8 visible 10 Devoted servant of God\n    Ending number 8\n    You arrived here thanks to being faithful and sacrificing yourself.\n*achievement end9 visible 10 I care\n    Ending number 9\n    You arrived here thanks to being truly altruistic.\n*achievement end10 visible 10 Prisoner of my mind \n    Ending number 10\n    You arrived here thanks to an overall balance to your character.\n\n    \n*if choice_is_omnibus_app\n    *comment skip description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    In an alternate future where medieval laws coexist with scientific and technological advancements, a revolution is boiling. Personal reasons will force you to be at the forefront of it. Your place in this world is a simple yet powerful role, granted to you thanks to your haunting past and the current political situation in the empire. A long war threatens the autocracy of your ruler and soon you will find your life thrown upside down, engaging in an emotionally fueled conflict you never wished to be part of. As you dig deeper, you will find untold truths.\n \n    [i]Rain King[/i] is a 50,000-word science-fiction interactive novel by Marvin K. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n     \n    Inside this unique world you will have to deal with a lot of characters, each with their own goals and mentality. They might be part of your plan, or you theirs. Decisions will have to be made. Power or catastrophe might be the consequence. Your true nature will be exposed in this game of philosophy, drama, action, faith, death, family, friendship and love. As you forge your own prism of reality you might watch it shatter to pieces. After all, truth is but a fly caught in a web of lies.\n\n    • Play as male or female; as gay, straight, bisexual, or asexual.[n/]\n    • Explore a fantastical world reaching the limits of human advancements but being far from an utopia.[n/]\n    • Make allies that would give their life for you and try to manipulate and win the favor of your acquaintances.[n/]\n    • In retribution change your life and that of the biggest empire on the planet.[n/]\n    • Try not to get deceived. Choose which truths to believe.[n/]\n    • Help and care for others or think about your own life and let them die.[n/]\n    • Choose your arsenal and unleash your inner demon in the action sequences.[n/]\n    • Follow your heart and fall in love or use your admirers’ feelings for your own purposes.[n/]\n    • Open your eyes and find a meaning to it all.[n/]\n\n    As you forge your own prism of reality, you might watch it shatter to pieces.\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first six chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first six chapters now for free.\n                *goto purchased\n\n    [i]You can play the first six chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2021-09-30 $3.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n\n*label purchased\n\n*if choice_is_omnibus_app\n    *comment CONTENT WARNING?\n    *page_break\n\n\nYour name:\n*input_text name\nYour surname:\n*input_text surname\nYour nickname (what family and friends call you):\n*input_text nickname\n\n*finish", "team": "*comment ACT 1 SCENE 5\n\n*comment this part you get allies if possible\n*comment allies: renegades, old army friends, florian !, simon !, eliana, josef.\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nThe king doesn't come after you. You just lose your title, and everything that came with it. You spend the next months laying low, training, preparing for what is about to come. You don't talk to anyone. No aggression towards the King whatsoever. Until the time comes. Time for justice.\n\nYou may need help to terminate the Rain King.\n*label help\n*page_break\nDo you wish to ask for help anybody?\n\n*choice\n    #Old army friends\n        *set asked_help true\n        After scouting for a while you manage to get in contact with Quinta. You two decide to meet at Q2, an underground pub, not very known.\n        \n        Evening. You find the place easily. As you are going down the stairs you start to hear a drowned music in the background. It's a small place but it's hard to see because it's filled with smoke and green lights. The whole atmosphere is a little claustrophobic. You spot two friends arguing, a couple kissing, another man standing alone, a guy playing in an old computer and finally at a corner, your old friend Quinta.\n        *if (kiss)\n            She notices you and immediately gets up and hugs you. She shows empathy and asks how you have been doing.\n            *goto coping\n        *else\n            When she notices you she gets up and greets you platonically. She asks how you have been coping.\n            *goto coping\n        *label coping\n        *choice\n            #-What do you do now?\n                -I work as a drill sergeant now. It's not an easy job, but at least I don't get to see the battlefield again. They went soft on us after the \"Greenhill battle\". I didn't want to ever be forced to take a life again, so that's what I choose to do.\n                *set altruism %+15\n                *set obstinate %-8\n                *goto coping\n            #-I need your help.\n                You explain your intention. She doesn't seem satisfied. After a long pause she asks:\n                \n                *if (federik_alive)\n                    -You met Federik? He always talks about you when he meets us. He is so thankful.\n                    *goto jimi\n                *else\n                    -Do you remember Jimi and Federik?\n                    *goto jimi\n                    *label jimi\n                    *fake_choice\n                        #-Yes.\n                            -Federik and Jimi didn't deserve what they got. It's not fair. It not fair at all ${nickname}!\n                            \n                            \n                            *set altruism %+10\n                            *set obstinate %-10\n                            *set honor %+10\n                            *set tenderness %+10\n                        #-No.\n                            -Our old friends, at the army, Jimi and Federik. They died at \"Mill Battle\". You don't remember.  I don't blame you, it was a while ago. I almost envy you.\n                            *set altruism %-10\n                            *set obstinate %+5\n                            *set honor %+15\n                            *set tenderness %+10\n                        #-Don't change the subject.\n                            She takes a long breath.\n                            \n                            \n                            *set altruism %-15\n                            *set obstinate %+15\n                            *set honor %-10\n                            *set tenderness %-10\n                -I want to help you ${nickname}. But I can't. Not because what you hope for is madness, no we have been through madness before. I just can't do this again. Not again.\n                *label again\n                *choice\n                    #-I won't push you.\n                        -I'm sorry ${nickname}.\n                        \n                        A tear slides from her eye.\n                        *set honor %+20\n                        *set obstinate %-20\n                        *set altruism %+15\n                        *set tenderness %+20\n                        *goto outside\n                    #-Please, Quinta.\n                        *if (federik_alive)\n                            -You were there when we needed you. You saved Federik from death. I will try to do the same for you. I was sure I would never have to pull the trigger again, but it looks like destiny had other plans for me. You have my support.\n                            \n                            She breaths heavily.\n                            *set quinta_help true\n                            *set honor %-10\n                            *set obstinate %+10\n                            *set altruism %+10\n                            *set tenderness %+10\n                            *goto outside\n                        *else\n                            -I'm sorry ${nickname}. I really am, it's just that I have had my fair share in war. I can't experience those things again.\n                            *set honor %-10\n                            *set obstinate %+10\n                            *set altruism %+10\n                            *set tenderness %+10\n                            *goto again\n                    #-I thought you loved me.\n                        *if (kiss)\n                            -I… I…\n                            \n                            She kisses you.\n                            \n                            -I still do. I will help you ${nickname}. I will always be with you.\n                            *set quinta_help true\n                            *set obstinate %+20\n                            *set altruism %-10\n                            *goto outside\n                        *else\n                            She gulps. \n                            \n                            -Maybe I did one time. But now, now you can't use my love for you to make me suffer through the dark side of the humanity again.\n                            *set honor %-20\n                            *set obstinate %+10\n                            *set altruism %-10\n                            *goto again\n                    #-If you don't help me, we are not friends anymore.\n                        She frowns.\n                        \n                        -Very well than ${name}. If this is what friendship is to you I don't want to be your friend either… Have a good day!\n                        \n                        She walks out of the pub.\n                        *set obstinate %+10\n                        *set altruism %-10\n                        *set tenderness %-20\n                        *goto outside\n            *selectable_if (kiss) #I still love you.\n                 She kisses you with a smile\n                 \n                 -So do I. I guess this isn't the only reason you came here.\n                 *set honor %+10\n                 *set obstinate %+15\n                 *set tenderness %-10\n                 *goto coping\n        *label outside\n        *page_break\n        When you get outside the pub, you take a deep breath. The air was so dense down there. You almost have a mild headache. The door opens again. The man who was standing alone inside the pub also walks out. He leans on the wall. You have a feeling he is keeping an eye on you.\n        *choice\n            #Keep walking.\n                You get on with your business. As you are walking away he doesn't seem to follow…\n                *set tenderness %+20\n                *set obstinate %+10\n                *goto help\n            #-Is there anything to see?\n                You shout at him. He seems a little intimidated. He salutes you with his hand and goes the other away. By the way he walks, you can say he is intoxicated.\n                *set altruism %-10\n                *set honor %+5\n                *set tenderness %-10\n                *set obstinate %-5\n                *goto help\n            #Approach him.\n                He raises his head when you approach him. He is wearing old, unwashed clothes. Some even have stains on them. By the smell and the redness in his eyes you can tell he is intoxicated.\n                *set obstinate %-10\n                *choice\n                    #Leave.\n                         There is no way this guy is spying on you. You decide to get on with your business.\n                         *set altruism %-10\n                         *set honor %+5\n                         *set tenderness %+10\n                         *set obstinate %-10\n                         *goto help\n                    #Search him.\n                         You start to search him, but he pushes you back. He falls in the ground afterwards, half asleep. A quick check tells you that he is an ex-militia. He doesn't seem to have any relation to the King or any organization of sorts. You leave tranquil.\n                         *set altruism %-5\n                         *set honor %-10\n                         *set tenderness %-10\n                         *set obstinate %+10\n                         *goto help\n                    #-Don't do drugs.\n                         He replies with a befuddled voice.\n                         \n                         -Who the fuck are you, my mom? Get fucked!\n                         \n                         You decide it's not worth arguing with this person. You have important things to do.\n                         *set altruism %+15\n                         *set honor %+10\n                         *set tenderness %-10\n                         *goto help\n    #Josef Angert, your brother in law\n        *set asked_help true\n        Asking around, you gather that Josef stays more at home nowadays, which is strange for a man like him, who spends most of his nights sleeping in his office.\n        You decide to visit him in his home, even though to go there you have to pass through one of the so called sludge neighborhoods.\n        \n        Sunset, passing through the alleys surrounded by the high buildings. The streets are littered with cigarettes fag-ends, bubblegums and pieces of shattered beer bottles. The walls are all stained with offensive graffiti. A man is pissing in one of the walls, not even in a corner. A group of dogs barking is heard. The whole place smells like weed. This is definitely one of the worst quarters to live. How do you feel?\n        *fake_choice\n            #Scared.\n                You pass through the cesspool as quickly as possible.\n                *set altruism %+10\n                *set honor %-10\n                *set tenderness %-5\n            #Calm.\n                You keep walking normally.\n                *set altruism %-5\n                *set honor %+5\n                *set tenderness %+10\n            #Disgusted.\n                You pass through the cesspool as quickly as possible.\n                *set altruism %-10\n                *set honor %+10\n                *set tenderness %-5\n            #Home.\n                You remember growing up in one of this shitholes. You have many memories, some actually good.\n                *set honor %-5\n        An old woman in shreds of clothes comes quickly at you begging loudly for money.\n        *fake_choice\n            #Ignore her.\n                As you walk away she starts unleashing an arsenal of curses at you. The words coming out of her mouth…\n                *set altruism %-10\n                *set honor %+5\n                *set tenderness %+10\n                *set obstinate %+10\n            #Give her a coin.\n                She takes it eagerly and runs away quickly, laughing loudly.\n                *set altruism %+5\n                *set honor %-5\n                *set tenderness %+5\n                *set obstinate %-5\n            #Give her a lot of money.\n                She hesitates at first, but then eagerly grabs it. She starts blessing you.\n                *set altruism %+10\n                *set honor %+5\n                *set tenderness %+10\n                *set obstinate %-10\n            #Push her away.\n                As she falls to the ground she starts unleashing an arsenal of curses at you. The words coming out of her mouth…\n                *set altruism %-10\n                *set honor %-10\n                *set tenderness %-10\n                *set obstinate %+10\n        \n        \n        Fortunately you pass through the sludge neighborhood without any events and arrive before the building where Josef lives. Its architecture is heard of. It resembles a thin and tall stair pyramid cut in half vertically. On each of the stairs gardens are planted with exotic trees adding a green nuance to the otherwise white structure.\n        \n        The inside seems to favor a lot technology and ecology. Everything is clean and precise. There are pots of plants and vast screens marketing products on the wall. Everybody seems in the hurry on the ground floor, which is mostly used as a place of business.\n        \n        You enter the elevator and just when its doors are about to close it seems like everybody in the ground floor disappeared. It must have been a trick of your eye of course. You haven't gotten much sleep lately. The cutting edge elevator lifts with a frightening speed as you feel the weight of your body almost double. It hurriedly arrives at the 68th floor and opens the door. You walk out on the rather dark corridor, lit only by faint, sky blue neons, searching for the place where Mr. Angert lives.\n        \n        *page_break\n        \n        You ring the apartments bell. The door opens, but before you, instead of finding fine businessman in suit, you are greeted by drunk Josef Angert with an undershirt.\n        \n        *choice\n            #-I need to talk to you.\n                -Oh. Yeah. Sure. Please comon. Come in.\n                \n                The modest apartment looks tidy on the inside for the most part, although it reeks with cigarette smoke.\n                \n                *label modest\n                *choice\n                 #-I thought you were rich, how come you live here?\n                    -Oh, I own the entire building. Yeah don't worry about it. I just prefer this … room.\n                    \n                    And he watches over the window.\n                    \n                    *goto modest\n                 #-What happened to you?\n                    *label what\n                    -Same thing that, that happened to you. We lost Melody, we lost the most important thing in our lives.\n                    \n                    He is almost weeping.\n                    \n                    -You know, they all said the only thing I care about is money, money. But I loved her, I loved her more than all the money in the world. And now she is dead. He took her from me! You know maybe it's supposed to be so. Maybe I should care about only money. Maybe God doesn't want me to love anything else.\n                    \n                    *label emotional\n                    \n                    He is very emotional.\n                    \n                    *choice\n                        #-Are you gonna cry or are you going to help me avenge her.\n                            *set altruism %-10\n                            *set obstinate %+10\n                            *set honor %+5\n                            *set tenderness %-5\n                            *label avenge\n                            -What's the point of avenging her? We're just going to lose time and money for nothing.\n                            *choice\n                                #-The point is to make the person who hurt her pay the price.\n                                    *set tenderness %-5\n                                    *set altruism %-10\n                                    *set obstinate %+10\n                                    *set honor %-10\n                                    \n                                    *label drink\n                                    -That is not going to change anything. I would rather just cry and drink, thank you.\n                                    \n                                    You see a lost cause before your eyes. You leave, but before you close the door, he says to you:\n                                    \n                                    *label bring\n                                    \n                                    -You know nothing is going to bring her back, right?\n                                    \n                                    *choice\n                                        #-I know.\n                                            *set honor %+5\n                                            *set obstinate %+5\n                                            *set altruism %-5\n                                            *set tenderness %+5\n                                            *goto help\n                                        #Leave\n                                            *set honor %-5\n                                            *set obstinate %-5\n                                            *set tenderness %-5\n                                            *goto help\n                                #-To serve justice.\n                                    *set altruism %+10\n                                    *set obstinate %+5\n                                    *set honor %+15\n                                    -You really believe in justice don't you?\n                                    \n                                    He touches your chin. \n                                    \n                                    *goto drink\n                                #-Please! Help me avenge my sister!\n                                    *set tenderness %-10\n                                    *set altruism %+5\n                                    *set obstinate %-5\n                                    *set honor %-10\n                                    He pauses for a long moment… Shakes his head.\n                                    \n                                    -No.\n                                    \n                                    *goto drink\n                                #-Really? You're not going to help me?\n                                    *set tenderness %-5\n                                    *set obstinate %-5                                   \n                                    -Sorry dear.\n                                    \n                                    *goto drink\n                                #-You are right. There is no point. But I'm still going to do it. Will you join me?\n                                    *set tenderness %+5\n                                    *set altruism %-5\n                                    *set obstinate %+15\n                                    *set honor %-5\n                                    -No, I don't want to join the crazy train.\n                                    \n                                    *goto drink\n                        #-If you really loved her, help me avenge her.\n                            *set altruism %+5\n                            *set obstinate %+10\n                            *set honor %-5\n                            *set tenderness %+5\n                            *goto avenge\n                        #-God had nothing to with this.\n                            *set obstinate %-5\n                            *set tenderness %-5\n                            *set believer %+20\n                            -OK, whatever. Can't you see? I'm not supposed to love anything else except money. It's what he made me for…\n                            I miss her.\n                            *goto emotional\n                        #-You really do only care about money don't you? I shouldn't have come here.\n                            *set obstinate %-10\n                            *set honor %+5\n                            *set tenderness %-5\n                            *goto bring\n                 #-I need your help to avenge my sister.\n                    *goto avenge\n            #-What happened to you?\n                *goto what\n            #Leave. There is nothing you can gain from him.\n                *goto help\n    *selectable_if (eliana_help) #Mother Eliana, the woman of faith [You're in good relations with Eliana]\n        *set asked_help true\n        As time passed Mother Eliana did manage to get what she wanted. Was it through prayers or manipulation, you never knew. She accepted the offer to see you. She actually invited you inside the Great Basilica where she now heads.\n\n        Today is the day you are going to meet her. It's midday and it's sunny, but not hot. You are dressed:\n        *fake_choice\n            #Simply.\n                *set altruism %+20\n                *set honor %-10\n                *set believer %+10\n            #Fashionably.\n                *set altruism %-10\n                *set honor %+5\n            #Provocative.\n                *set altruism %-10\n                *set honor %-20\n                *set believer %-20\n            #Adequately.\n                *set altruism %+15\n                *set honor %+20\n                *set believer %+15\n        Walking in the wide open square before the Great Basilica, near one of the two fountains, a little girl, barely old enough to be walking is holding her mothers hand. As you cross path with the two strangers, the little girl waves at you.\n        *fake_choice\n            #Wave back.\n                You wave back as she gives a genial smile. You keep walking forward.\n                *set altruism %+10\n                *set honor %-10\n                *set obstinate %-15\n                *set tenderness %+20\n            #Smile.\n                You smile at her, and keep walking forward.\n                *set altruism %+5\n                *set obstinate %-5\n                *set tenderness %+10\n            #Ignore her.\n                You just keep walking forward.\n                *set altruism %-10\n                *set tenderness %-15\n                *set honor %+5\n                *set obstinate %+15\n        *page_break\n        You enter the tall, white structure. On the inside it truly is a work of art. You count hundreds of sculptures made of gold or silver fixated on the columns and walls. Perfectly stained windows let different hues of light in. All the walls, including the ceiling, are with murals. You hear music coming from a large pipe organ. This place would make even the Rain King himself envious.\n        \n        Mother Eliana stands seated in a chair, which looks almost like a throne, in the center of the opposing wall. She is well dressed and has changed a a lot. You can't place if for better or worse. After the prolonged greetings and your solicitation she asks:\n        \n        -Tell me ${name}, why do you think I should help you? Truly?\n        *label truly\n        *choice\n            *selectable_if (eliana_deal) #-We had a deal. [Made deal with Eliana]\n                -Indeed we had. Well I won't deny it, and I will honor my word. You helped me when I was in need and I will aid you on your treacherous quest.\n                *label kill_help\n                You kill the Rain King and I will make him a villain in the eyes of the people, and you, a savior.\n                *set believer %-10\n                *set honor %+20\n                *set obstinate %+15\n                *set eliana_deal true\n                *goto turn\n            #-God wants it.\n                -You have no right to speak in his name. All the more in this holy place. If God truly wants you to succeed, you won't need my help, just like I didn't need yours. If he wants me to help you, he would have told me, not you.\n                *set believer %+40\n                *set honor %-20\n                *set obstinate %-10\n                *set tenderness %+15\n                *goto truly\n            #-If you don't help me, you will be next.\n                You can see in her face that your words shocked her. After a few seconds answers.\n                \n                -My God! You are so convinced you will succeed. You talk like you have seen the future. Such confidence. Maybe it is true, maybe you will kill him. What if God is pushing you to act so? I will help you ${name} ${surname}.\n                *set believer %-50\n                *set honor %-20\n                *set obstinate %-10\n                *set altruism %-20\n                *set tenderness %-30\n                *goto kill_help\n            #-Will you help me? Yes or no?\n                -So you have no good reasons. Well, in that case, no. No, I will not help you. I have what I want now and I don't have to risk it all for you. You may leave.\n                *set obstinate %+10\n                *set tenderness %-10\n                *set eliana_deal false\n                *goto turn\n            #-I beg you.\n                -I'm really sorry child, but you don't have to beg me. Begging will lead you nowhere. Why don't you start praying to God, he may help you in your treacherous quest. You may leave.\n                *set obstinate %-20\n                *set tenderness %+30\n                *set honor %-30\n                *set altruism %+20\n                *set eliana_deal false\n                *goto turn\n            #-It's the right thing to do.\n                -I'm afraid this is not going to be enough. Of course that it is fair in your eyes, but in mine? Helping an ex-Margrave to kill the King by betrayal, just because he killed one of your kin. Your motive is revenge and in the eyes of God that is definitely not just. \n                *set obstinate %+10\n                *set tenderness %+15\n                *set honor %+20\n                *set altruism %+15\n                *set believer %+20\n                *goto truly\n        *label turn\n        \n        As you turn and start leaving mother Eliana speaks again.\n        \n        -May God be on your side!\n        *fake_choice\n            #-Thank you!\n                *set believer %+15\n                *set honor %+10\n                *set obstinate %-5\n                *set altruism %+5\n                *set tenderness %+10\n            #-He is.\n                *set believer %+50\n                *set obstinate %+15\n                *set altruism %-5\n                *set tenderness %+5\n            #- I don't need God.\n                *set believer %-30\n                *set honor %-10\n                *set obstinate %+25\n                *set altruism %-35\n                *set tenderness %-10\n            #-Fuck you!\n                *set believer %-45\n                *set honor %-10\n                *set obstinate %+10\n                *set altruism %-15\n                *set tenderness %-25\n            #Don't answer.\n                *set believer %-25\n                *set honor %-10\n                *set obstinate %+5\n                *set altruism %-5\n                *set tenderness %+10\n        You continue walking outside while thousands of clerics enter in the huge building from all entries. Soon you are lost in the sea of brown robes, then you emerge out of the Basilica into the sunlight.\n        *goto help\n    *selectable_if (met_magnates) #Florian Delic, the magnate and financier of the Rain King [You have met Florian]\n        *set asked_help true\n        You try to get in contact with him, but all calls are answered by secretaries. They always give justifications for Mr. Delic being too busy or not being able to talk now. This is not going to work so you decide to go on his own home. He lives in a huge mansion on the rich part of megalopolis. When you arrive outside the gates of the highly secured garden you notice that royal guards are part of the defense. The king is giving him protection. You can hear from inside the gates the voices and shouts of his children having fun in a pool.\n        \n        Outside the gate, from a panel nearby, a technological voice speaks.\n        \n        -Identification.\n        \n        The loud voice came from the electronic panel and is waiting for you to ID yourself.\n        *label id\n        *choice\n            #- ${name} ${surname}.\n                After a short pause and a beep the voice continues:\n            \n                -Mr Delic doesn't want to speak to you. Please leave immediately. If you return to his house again, you will be arrested and prosecuted accordingly.\n                *set altruism %-10\n                *set obstinate %-10\n                *set honor %+20\n                *set tenderness %+5\n                *choice\n                    #Leave.\n                        *goto leave_mansion\n                    #-Fuck you!\n                        *goto fuck_you\n                    #-Please, it's really important.\n                        A few guards start approaching. You are in no condition to fight them. Not in his own home. You decide it's better to leave. That pig doesn't even want to be seen with you. It doesn't matter though, it was worth giving it a shot.\n                        *set altruism %+5\n                        *set obstinate %+20\n                        *set honor %-15\n                        *set tenderness %+5\n                        *goto help\n            #-An old friend of Florian.\n                -Name and surname.\n                \n                The panel seems stubborn in not letting you in.\n                *set altruism %-5\n                *set obstinate %+10\n                *set honor %-20\n                *set tenderness %+5\n                *goto id\n            #Leave.\n                *label leave_mansion\n                Considering the safeguarding you decide is not worth making a scene. That pig doesn't even want to be seen with you. It doesn't matter though, it was worth giving it a shot.\n                *set altruism %+10\n                *set obstinate %-20\n                *set honor %-10\n                *set tenderness %+10\n                *goto help\n            #-Fuck you!\n                *label fuck_you\n                After expressing your thoughts, you decide to leave, considering the safeguarding it's not worth risking. That pig doesn't even want to be seen with you. It doesn't matter though, it was worth giving it a shot.\n                *set altruism %-20\n                *set obstinate %-10\n                *set honor %-15\n                *set tenderness %-20\n                *set believer %-5\n                *goto help\n            #-Tell Florian it's about the Rain King.\n                -Name and surname.\n                \n                The panel seems stubborn in not letting you in.\n                *set altruism %+10\n                *set obstinate %+10\n                *set honor %+10\n                *set tenderness %-5\n                *goto id\n    *selectable_if (met_magnates) #Simon Rhys, the margrave who took your place [You have met Simon]\n        *set asked_help true\n        Surprisingly enough Simon Rhys did manage to get the title he was after and accepted your request to see him. He invited you at the Black Cathedral, where he now dawdles.\n        As you stand before the black walls of the tall grotesque structure, a mist starts to form. The cloudy weather lends a hand to the eerie atmosphere. You enter the massive building while the screams of crows fade outside. Inside the chilling cathedral most of the guards don't seem to notice you, although, as you approach the doorway which leads to the Margraves workplace, two guards step before you. One talks with confidence.\n        \n        -Margrave Rhys is waiting for you. Surrender your weapons and go in.\n        \n        *label relinquish\n        \n        *choice\n            #Surrender weapons.\n                As you relinquish them, one of the guards \"accidentally\" falls off your gun.\n                *set altruism %+5\n                *set obstinate %-15\n                *set honor %+10\n                *set tenderness %+15\n                *goto doorway\n            #-I'll relinquish one bullet. Where do you want it?\n                -Very funny. Do you want to stay here all day?\n                *set altruism %-5\n                *set obstinate %+15\n                *set honor %-5\n                *set tenderness %-10\n                *goto relinquish\n            #-I'm not armed.\n                -We already scanned you. There is no point lying ${noun} ${surname}.\n                *set altruism %-5\n                *set obstinate %+10\n                *set honor %-10\n                *set tenderness %+10\n                *goto relinquish\n            #-Do you really expect me to enter unarmed?\n                -All we know is that you are not going to enter armed.\n                *set altruism %+5\n                *set obstinate %+5\n                *set honor %+5\n                *set tenderness %-5\n                *goto relinquish\n            #Leave.\n                \"Whatever\" you think as you leave the Black Cathedral. The risk was not worth it.\n                *set altruism %+5\n                *set obstinate %-20\n                *set tenderness %-5\n                *goto help\n        *label doorway\n        *page_break\n        You are walking inside the narrow but tall corridors of the cathedral. It is dark and the walls have a shade of sinister blue.\n        Finally a large open area lit by a flickering vermilion light. Inside there is a sumptuous chair, where Margrave Simon Rhys sits. On each side an almost naked girl accompanies him. One blonde and one brunette. You also count six guards, but these are different from the others, wearing black armor and a dark purple cape.\n        \n        With no facial expression at all, the host starts talking to you.\n        \n        -Look, I don't care what our relation has been in the past. Honestly I don't even remember. I am a person which cares about the future and the present.\n        \n        He takes a breath.\n        \n        -If you have come here to beg for help against the Rain King, you might as well leave now.\n        \n        *label breath\n        \n        *choice\n            #-But, please you must help me!\n                -Ugh, you are an ignorant.\n                \n                He turns toward two of the guards.\n                \n                -Escort out!\n                \n                *label escort\n                \n                You keep talking but he doesn't seem to listen. You find yourself kicked outside the Cathedral.\n                *set altruism %+15\n                *set obstinate %+20\n                *set honor %-15\n                *set tenderness %-5\n                *goto help\n            #-What do you want in return?\n                *label in_return\n                -Ah, straight to the point. I like it. You know what I don't like though? You not having thought this thorough. Because I reflected upon this matter and I could not find a single thing which would make me risk all this I have- he opens his arms wide -for you. I thought you would have thought of something, so I gave you a chance. But, as always, I am right and here we are. What are you going to offer? Money? I have more than you. Your life? Worthless. I have an army of people stronger than you. Anything? That's what those who have nothing say. So? Speak or leave.\n                *label speak\n                *choice\n                    #-You are right. There is nothing I can offer.\n                        -I knew…\n                        *set altruism %+10\n                        *set obstinate %-20\n                        *set honor %+10\n                        *set tenderness %+10\n                        *goto help\n                    #-I'll make you King.\n                        He seems astounded.\n                        \n                        -I did not expect that. Excellent proposal, I'll give you that. Unfortunately, for you, there are two problems in your offer. First I do not really believe that you will achieve your goal. As assertive as you are, you are but one. Secondly, I do not want to be king. You see it gives way to so many troubles. You are a perfect example of that. If that is the best you came up with, you can leave.\n                        *set altruism %+20\n                        *set obstinate %-10\n                        *set honor %-10\n                        *set tenderness %+5\n                        *goto speak\n                    #-I offer your life. If you don't help me, I will kill you.\n                        *label dazed\n                        He is dazed for a second.\n                        \n                        -I don't know if I should get angry or laugh. Right now you are in my palm and you have the balls to threaten me. You are far braver and stupider than I presumed.\n                        \n                        He leans forward.\n                        \n                        -I could have you executed right now. I'm sure the King would be more than happy. But I understand your audacity, considering what you must have been through. I'll act like this never happened.\n                        \n                        He signals the guards to take you out.\n                        *set altruism %-20\n                        *set obstinate %+15\n                        *set honor %-5\n                        *set tenderness %-25\n                        *goto help\n            #-So you got the title you wanted after all.\n                -Yes, I did. Your misfortune was fortune to me. It left the exact place I wanted vacant. Although you know I had nothing to do with it. I would have gotten the place I wanted anyway. My way.\n                *set tenderness %+5\n                *label after_all\n                *choice\n                    #-You killed her!\n                        -Oh please don't act like an idiot. I killed your sister so the King fired you and I got the position. Does that really make sense to you? Admit it, this was the work of the Rain King. If you want to use that brainless head, try to find why he did it. In that, sadly, even I can't help. Get this fool out of my office!\n                        *set altruism %-15\n                        *set obstinate %+10\n                        *set honor %+10\n                        *set tenderness %-20\n                        *goto escort\n                    #-I believe you.\n                        -That's smart. Anything else?\n                        *set tenderness %+5\n                        *set altruism %+5\n                        *set obstinate %-5\n                        *set honor %+5\n                        *goto after_all\n                    #-What do you want to help me avenge my sister?\n                        *goto in_return\n                    #-Your fortune might turn in misfortune if you don't help me.\n                        *goto dazed\n                    #Leave.\n                        *goto help\n            #-Nice girl friends you have there.\n                -Thanks, but I don't want to waste my time chatting with you for frivolous things. Talk serious or leave.\n                *set honor %-10\n                *set obstinate %-10\n                *set altruism %+5\n                *set tenderness %-5\n                *goto breath\n            #-Beg you? You better help me or you will be the one begging.\n                *goto dazed\n            #Leave.\n                *set obstinate %-20\n                *goto help\n    *selectable_if (renegade) #The renegades, through Vittorio Ziat [You have connections with Vittorio Ziat]\n        *set asked_help true\n        You contact Vittorio Ziat.\n        \n        It's dark and cold. You are wandering in the side of a street, light poles casting your shadow on the ground. As you walk shadows move, dark versions of yourself, coming and going. A black automobile comes before you. Vittorio is sitting in the passenger seat. You enter in the back seat. The interior is in a dark maroon color. Vittorio speaks. His intonation is different from your previous encounter.\n        \n        -You are going to discuss with the Prime Man. We are going to drive you there.\n        \n        *label prime\n        \n        *choice\n            #Stay silent.\n                *set tenderness %+10\n                *goto driving\n            #-Who is he?\n                -Our leader. You want to meet him, and he wants to meet you.\n                *goto prime\n            #-Where exactly are we going?\n                -You will see.\n                *goto prime\n            #-I don't trust you.\n                *set tenderness %-15\n                -You came to us and we want to help. This is not a matter of trust.\n                *goto prime\n        *label driving\n        The automobile drives in the city at night. So many lights of different colors. So many people of different looks. Megalopolis at night is even brighter and more lively than during the day. Advertisements and posters leave no building naked. After you drive about one hour the automobile comes to a stop, before an old small observatory. You, Vittorio and the driver, a short, bald man with little facial hair, get out of the car.\n        \n        There are other people dressed like thugs outside. They keep staring at you. Vittorio salutes a few as you enter inside. It's really dark. Your eyes get used to, as you climb the stairs. It smells old in here. Vittorio opens a door and points you to enter in. Inside the half spherical room a wide window which extends to the ceiling allows the panorama of Megalopolis and the stars. The city emits a glowing aura from this viewpoint. In the middle of the room a tall thin man is standing with his back towards you, looking from the window. Judging by his white hair and bad posture, he should be very old. His voice confirms it.\n        \n        -Breathtaking, isn't it? The universe. The stars.\n        \n        *fake_choice\n            #Stay silent.\n                -I fathom your interest stands elsewhere now.\n                *set tenderness %+10\n                *set obstinate %-10\n            #-It is.\n                -So vast is the cosmos. We are infinitesimal before it. Yet, when a single human being ceases to exist, our whole reality is annihilated. We are but microscopic insects fighting for a bitty nest.\n                *set tenderness %+10\n                *set altruism %+10\n                *set obstinate %-10\n            #-Can we talk about the assassination.\n                -Yes.\n                *set obstinate %+10\n            #-I didn't come here for your philosophy.\n                -No. But you did come here. You should show more respect.\n                *set tenderness %-15\n                *set altruism %-10\n                *set obstinate %+15\n            #-Who are you?\n                -Ah, of course. I ask forgiveness. The renegades have presented me to you as the Prime. My real name is Ahab Euler. I do ask for your secrecy. Since I knew your name it only seemed fair for you to know mine.\n                *set tenderness %-10\n                *set obstinate %-5\n        \n        He turns towards you. He looks overly old. He has a long white bread with mustache and yellow irises.\n        \n        -You want our help, but you know you don't need it. Anywise we will help you. I only ask from you one condition, that this will be the last king.\n        *fake_choice\n            #-Done.\n                -You please me. We will make sure to cause harm without standing in your way. You make sure he stops subjugating our tiny world. Vittorio will take care of the details of the plan.\n                *achieve renegade\n                *set explosion false\n                *set tenderness %+10\n                *set obstinate %-10\n                *set altruism %+10\n            #-You brought me here only for this?\n                -Only for this. You may not appreciate the importance of this condition but, thankfully, for us it's enough that you act upon it. You may leave now.\n                *achieve renegade\n                *set explosion false\n                *set tenderness %-10\n            #-I'm afraid I can't promise you that.\n                -Too bad. Than you are on this alone I fear. If we do meet again I do hope it is not like I am thinking it will be. Anywise we have nothing else to discuss.\n                *set tenderness %+10\n                *set obstinate %+10\n            #-I will kill the Rain King, I don't care what happens after.\n                -What happens after is far more important than this assassination. Anywise you do as you wish, we will do our part. If we do meet again I do hope it is not like I am thinking it will be. We have nothing else to discuss.\n                *set tenderness %-10\n                *set obstinate %+10\n                *set altruism %-15\n        *goto help\n    #I'm good\n        *if not (asked_help)\n            *achieve loner\n        *finish", "trap": "*comment ACT 2 SCENE 3\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nThe sun is rising now, but you can't see it, surrounded by the tall buildings. The sky begins to ignite accentuating the Megalopolis skyline. A new day. This one is not like the rest. This is a day without Rain King, or any king for that matter. A day of anarchy and freedom. This is the first crownless day.\n\nThe storm has moved. You can see the dark clouds in the horizon. On your location only a gentle rain has prevailed. The city streets are filled with signs of a fight. There are symbols and expressions painted on the buildings. Wall screens are broken. Remains of flames can be seen and smelled. You can find blood on the pavements. You can even hear the occasional gunfire. Through the whole city, is being transmitted mother Eliana speaking:\n\n*if eliana_deal\n    [i]… a reign of terror and corruption has come to an end. The unholy ruling of the heretic Rain King has been stopped by a hero. This devoted brave person is ${name} ${surname}! Once a Margrave, who was treated unjustly by our merciless ruler. But don't misunderstand, the Rain King has done wrong to all of us my children. Do not worry! We now have a new leader. We are free. Our savior is ${name} ${surname}!…[/i]\n    *goto radio\n*else\n    [i]… a dark day for the Sacred Kingdom. Our beloved and devoted Rain King has left us for another life. He will always be on our hearts and minds. The Rain King was assassinated! He was killed by heretics! But we will not let his martyrdom go to waste. Gather my children and fight! Do not lose hope! Fight for your freedom…[/i]\n    *goto radio\n\n*label radio\n\n*if (forgiven)\n    You keep riding with your sister. Passing on a bridge above a wide dry river. You have so many things to think about. Mainly your life. How it was reshaped. Many times. You were supposed to be a effective, common Megalopolis citizen. Then the war, then your sister, then the king… You are starting to fall asleep… BLAM!\n    *set health -1\n    \n    An explosion. A mine triggered. A trap. The motorcycle is thrown in the air sideways gyrating in the asphalt as it lands. You ,detached from it by the hot wave, are sent rotating in the ground, your limbs suffering the punishment. \n    \n    You open your eyes. You are at the edge of the bridge. If the blast had thrown you just a little further away, you wold have fallen to your certain death. You try to get up, but your overtired muscles fail you. With your bloodied eyes you attempt to look. Far away from you it's the blazing motorcycle. Near it, Melody, laying still.\n    \n    Two man, wearing black jeans and shirts, are approaching her. They are talking to each other, but your hearing is still impaired from the blast. You can't make out any words. Suddenly, one of them transforms his gun and points it at Melody. You instincts kick in and you immediately transform your gun and shoot him in the head. You shoot the other one on his leg and next on his arm, sending him bleeding on the floor. You spend the next seconds gathering all your strength and getting up. You go check your sister. Her pulse is alright, but she is hurt badly in her head. You hear vehicles approaching. The injured attacker is still on the ground, cursing in his pain. You have only a few seconds if you want to get something out of the incapacitated man.\n    *label torture\n    *choice\n        #Question him.\n            -I'll tell you shit.\n            \n            He spits blood on your face.\n            \n            *choice\n                #-I'll ask you only one time. Who sent you?\n                    -Then what, you gonna kill me?\n                    *choice\n                        #-Yes.\n                            -I'm waiting.\n                            \n                            *label close\n                            \n                            He says that laughing. The enemy vehicles are too close now. You need to leave\n                            *choice\n                                #-Shoot him.\n                                    *label shoot\n                                    *set honor %+5\n                                    *set tenderness %-5\n                                    *set altruism %-10\n                                    *set obstinate %+10\n                                    -Oh, f- you shoot him in the head.\n                                    *goto sis\n                                #-Leave him.\n                                    *set honor %-5\n                                    *set tenderness %+10\n                                    *set altruism %+10\n                                    *set obstinate %-15\n                                    *goto sis\n                        #Shoot him.\n                            *set tenderness %-10\n                            *goto shoot\n                        #Punch him.\n                            *label punch\n                            *set tenderness %+5\n                            You punch him as hard as you can, even your hand hurts. Blood begins to pour from his nose.\n                            \n                            -I thought you were gonna kill me!\n                            \n                            *goto close\n                        #Thrust your finger in his eye.\n                            *label thrust\n                            *set tenderness %-5\n                            *set altruism %-5\n                            He lets a loud scream as he is blinded from one eye.\n                            \n                            -You're crazy! You! OK, OK, it was Delic. It was Florian. He will make you pay, you crazy asshole!\n                            *goto close\n                #Punch him first.\n                    You punch him in the face, then ask him.\n                    \n                    -You hit like a baby.\n                    *choice\n                        #Punch him again.\n                            *goto punch\n                        #Shoot him.\n                            *goto shoot\n                        #Thrust your finger in his eye.\n                            *goto thrust\n                #Thrust your finger in his eye. (torture him)\n                    *goto thrust\n                #Shoot him directly.\n                    *set tenderness %-10\n                    *goto shoot\n                #Leave him\n                    *set tenderness %+15\n                    *set obstinate %-15\n                    *goto sis\n        #Shoot him.\n            *set tenderness %-10\n            *set obstinate %+10\n            *goto shoot\n        #Leave him.\n            *set tenderness %+10\n            *set altruism %+10\n            *goto sis\n    \n    *label sis\n    *page_break\n    You get your sister and run away. The rest of the day is a blur to you. You go to an elite covert hospital, where you leave Melody in safe hands and get some treatment yourself. You wait there until the responsible doctor meets you. He says everything is alright, your sister is stabilized, but she is in a coma. The doctor tells you she whispered [i]Project Cognition[/i] while she was unconscious. Then, be it from the loss of blood or fatigue, you fall asleep…\n    *finish\n*else\n    Your sister has left you. Sitting in a corner you are taking care of your wounds. It's hard to do this alone, but obviously you have done harder things. You stand for a while to catch yourself, both physically and mentally, only to see before you, on the cathedrals main hall, Simon Rhys. He sees you too. You two lock eyes for a minute. Things have changed. Loyalties, aspirations and the relationship has been shattered for both of you. You spend this moment to reckon your standing in this new world. You can see in Simon's eyes his astonishment in his gory surroundings.\n    \n    You two are the only breathing people in the magnificent, ghostly halls. Things might change. You both have a gun locked in your hand.\n    \n    -Are you going to kill me?\n    \n    He asks you with an abnormally calm voice.\n    \n    *choice\n        #-Yes.\n            *set simon_alive false\n            *set honor %+10\n            *set obstinate %+10\n            *set altruism %-5\n            *set tenderness %+5\n            *label hetries\n            He tries to shoot you, but you are the better marksman. He falls to the ground, breathing heavily and quickly. His body bloodied. He is trying to say something to you.\n            \n            -F-Flor Delic… a trap… your sister is in d-danger… she k-k-k-knows…\n            \n            With that he falls silent…\n            *goto silent\n        #-No.\n            *set honor %+5\n            *set obstinate %-10\n            *set altruism %+5\n            *set tenderness %+5\n            -Unsurprisingly, I was hoping you would say so. We can without doubt work together. Let me return the favor of not killing me. I will tell you a little secret: Florian Delic is trying to kill your sister. Yes, he knows Melody ${surname} is alive, he told me. He has set a trap on the bridge. I believe he was trying to end you too that way, but your sister is more important. She knows things… things that are worth more than the Rain King's life. Maybe you can get her to say anything. You should hurry.\n            *label hurry\n            *choice\n                #Shoot him.\n                    *set simon_alive false\n                    *set honor %-20\n                    *set altruism %-5\n                    *set tenderness %+5\n                    *set obstinate %+10\n                    You shoot him on the chest. He falls to the ground, breathing heavily and quickly. His body bloodied. He looks you with eyes of betrayal and shock. He didn't expect that. He falls silent…\n                    *goto silent\n                #Leave him.\n                    *set honor %+5\n                    *set altruism %+5\n                    *set tenderness %+5\n                    *set obstinate %-5\n                    *goto silent\n        #-Why would I kill you?\n            *set honor %-5\n            *set obstinate %-5\n            *set altruism %+5\n            *set tenderness %+5\n            -You are smarter than I thought. We can without doubt work together. Let me return the favor of not killing me. I will tell you a little secret: Florian Delic is trying to kill your sister. Yes, he knows Melody ${surname} is alive, he told me. He has set a trap on the bridge. I believe he was trying to end you too that way, but your sister is more important. She knows things… things that are worth more than the Rain King's life. Maybe you can get her to say anything. You should hurry.\n            *goto hurry\n        #-Why wouldn't I kill you?\n            *set honor %-5\n            *set obstinate %+5\n            *set altruism %-5\n            *set tenderness %+5\n            -You are smart. We can without doubt work together. Let me make you a favor. I will tell you a little secret: Florian Delic is trying to kill your sister. Yes, he knows Melody ${surname} is alive, he told me. He has set a trap on the bridge. I believe he was trying to end you too that way, but your sister is more important. She knows things… things that are worth more than the Rain King's life. Maybe you can get her to say anything. You should hurry.\n            *goto hurry\n        #Shoot him.\n            *set simon_alive false\n            *set honor %-5\n            *set obstinate %+15\n            *set altruism %-10\n            *set tenderness %-15\n            *goto hetries\n    *label silent\n    You take Simon's automobile keys and drive through the awakening city, quickly reaching the mentioned bridge.\n    \n    There must have been an explosion. Melodys motorcycle is on the ground blazing. She is not far away laying still. Two man, wearing black, are approaching her. They see you and start firing at you. You bump one with the speeding car, get out of the car and shoot the other one on his leg and next on his arm, sending him bleeding on the floor.  You go check your sister. Her pulse is alright, but she is hurt really badly in her head. You hear vehicles approaching. The injured attacker is still on the ground, cursing in his pain. You have only a few seconds if you want to get something out of the incapacitated man.\n    *goto torture\n"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
