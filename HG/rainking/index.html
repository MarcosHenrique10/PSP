e died in his name. He has created an empire of blood, but empires fall in time. I say that time is near. And this lad here has a few projects in his genial mind.\n                *goto enjoy\n            #-I need to leave.\n                -Remember, not everything is as simple as it looks- says Florian as you leave.\n                *goto ball\n    *hide_reuse #Vittorio Ziat, the supposedly spy.\n        As you are walking towards him you notice, engraved in one of the tables, a symbol of a skull with only two teeth, like a vampire. A waiter also notices it and quickly covers it with tablecloth. He probably thinks it's just a rude defacement, but you know that symbol. The symbol of the renegades. So they have access to the palace. Not surprising, but not soothing either. Why did you happen to see this right now? A sign maybe?\n        \n        As you stand with the crowd Vittorio is talking to, you observe him. He talks a lot, but doesn't say much. That means he wants to talk. He rarely tells something wrong, so he controls himself. He forces himself to talk, it's not a vice. He has markings in his wrist, where the guns are locked. That means he has used weapons more than once. On the other hand he doesn't stand like a soldier and shows no discipline. While his physique is good, it's not that of a forged marine. He has not had military training. This guy might actually be a renegade spy. On the side of his forearm you can see he has a tattoo, but you can't place it, because he is wearing long sleeves. It might be the symbol. No, he isn't that stupid. The crowd leaves and you present yourselves.\n        *choice\n            #Turn up his sleeve.\n                *set tenderness %-20\n                A bold move. You suddenly grab his arm and see the tattoo. Impossible. It actually is the renegade symbol. Vittorio quickly covers it.\n                *label listen\n                \n                \n                -Now listen very carefully. You can denounce me right here, right now, but that would vanish an opportunity you will never get in your lifetime and won't win you anything. You can also stay quiet, keep the secret. It will give you an extra card. After all I am in your palm now, you can do what you want with me. I may be useful in the future. You can end me anytime.\n                *choice\n                    #Call the guards.\n                        *label guards\n                        That is the end of Vittorio Ziat. Another victory in the eyes of all attendants.\n                        *set vittorio_alive false\n                        *set honor %+30\n                        *set tenderness %-20\n                        *set altruism %-10\n                        *set obstinate %+30\n                        *goto ball\n                    #-Tell me everything.\n                        -I will, but not now, not here. I promise.\n                        \n                        You let him go. He quickly regains his composure and starts talking to everybody.\n                        *set honor %-20\n                        *set tenderness %+10\n                        *set altruism %+10\n                        *set obstinate %-10\n                        *set renegade true\n                        *goto ball\n            #-Can I see the tattoo in your arm?\n                -I'm afraid I can't show you that. It is a bit personal you see. I can show you the one I have in my back though. It's a dragon. It's super cool. Come outside, you will be amazed.\n                *choice\n                    #Go outside.\n                        After he describes the tattoo in detail, exaggerating almost everything, you two arrive outside where he shows you the real thing. The mystical creature in it's back it's full of colors. Gold, silver, brass, vermilion and jade. It is an explosive demonstration of art. You're not sure whether the beast is a snake, dragon or a phoenix though. Maybe a combination of them all. It is impressing.\n                        *goto need_leave\n                    #Turn up his sleeve.\n                        *label sleeve\n                        You grab his hand, but he quickly removes it. He is agile.\n                        \n                        -You stand back now or I'll have to call the guards!\n                        *choice\n                            #-Call them. We will see who will they hear.\n                                *label rolls\n                                Vittorio rolls up the sleeve, than quickly covers it. Impossible. It actually is the renegade symbol.\n                                *set honor %+10\n                                *set tenderness %+10\n                                *set altruism %-5\n                                *set obstinate %-10\n                                *goto listen\n                            #-What do you have to hide?\n                                -Nothing of your concern.\n                                \n                                He starts leaving.\n                                *choice\n                                    #Call the guards.\n                                        *goto guards\n                                    #Leave\n                                        *set honor %-10\n                                        *set obstinate %-30\n                                        *set tenderness %+25\n                                        *set altruism %+10\n                                        *goto ball\n                            #Leave.\n                                *set honor %-10\n                                *set obstinate %-30\n                                *set tenderness %+25\n                                *set altruism %+10\n                                *goto ball\n                    #- Show me the tattoo on your arm now!\n                        -What, you just came here and you start throwing threats at me. It's personal, I said. There is no way you are going to see it, ok? Rest your mind.\n                        *choice\n                            #-If you don't show me the tattoo I will call the guards.\n                                *goto rolls\n                            #-Alright.\n                                He leaves abruptly.\n                                *set honor %-20\n                                *set obstinate %-10\n                                *set tenderness %+15\n                                *set altruism %+10\n                                *goto ball\n                            #Turn up his sleeve\n                                *goto sleeve\n            #-So how does it feel being a renegade spy? (bluff)\n                *set honor %-10\n                *set tenderness %+10\n                *label understand\n                -What do you mean? I don't understand.\n                *choice\n                    #-I already know. You don't need to pretend.\n                        *goto listen\n                    #-It was a joke.\n                        -Hahaha. You have a special kind of humor. Not really my type, but it is extraordinary.\n                        *label need_leave\n                        \n                        \n                        -Anyway, as much as I would like to continue enjoying this absorbing conversation, I am afraid I need to be on my way. You do know there are many things to be said in this ball and many more to be heard. Everyone must have it's say, not only the King.\n                        *label goodbye\n                        *choice\n                            *hide_reuse #-I want to talk some more.\n                                -Well, I obviously don't. Have a tremendously good evening ${noun} ${surname}.\n                                *goto goodbye\n                            #-Goodbye.\n                                *set honor %-10\n                                *set obstinate %-20\n                                *set tenderness %+10\n                                *set altruism %+5\n                                *goto ball\n                            *hide_reuse #-Stop right there!\n                                *goto understand\n                    #-Maybe the guards will understand better.\n                        *goto listen\n            #-What is it exactly you do?\n                -What makes you take such an interest at me? I am flattered. I am a jack of all trades. I do many things. My favorite is entertaining people and knowing what makes them entertained, if you know what I mean.\n                *choice\n                    #-I don't know what you mean.\n                        -Well some people think that to know a man or, more precisely, to control a man you must know his fears, his weaknesses, the points where you can break him. I, on the other hand, tend to believe that subduedness is better managed through desires.\n                        *goto need_leave\n                    #-How come you use guns but have no military training?\n                        -Wow. Impressive observation. Impressive indeed. It is a hobby of mine you see. You can never be too safe in these things today. It was a joke. I like to think I'm funny.\n                        *choice\n                            #-Drop the bullshit.\n                                *goto understand\n                            #Laugh.\n                                *set obstinate %-10\n                                *goto need_leave\n                            #Stay serious.\n                                *set obstinate %+10\n                                *goto need_leave\n                            #-Why do you talk so much but say nothing? What do you have to hide?\n                                *goto understand\n                    #-Nice job for a spy.\n                        *goto understand\n    #No one.\n        *goto alone\n*label alone\nYou sit on the side of the wall alone. So many people in this venue. So much noise. Suddenly the noise stops. There is only a faint continuous beep. It is as if you were gone deaf. Everything stops moving. All the people start turning black. Your vision starts to smudge. From the participants black water starts to derive on the opposite of gravity. Every person is a source of a reverse black rain. Except one. You can hardly see a feminine figure in the middle of the room. Just like the others, except white. Blinding white. You walk towards her, dizzy. She slowly turns her head towards you. She doesn't have features, like a manikin. A stinging voice:\n\n-I am the bug.\n\nEveryone else starts running and jumping towards her, obstructing the light.\n*fake_choice\n    #Stay.\n        You stand there watching.\n        *set honor %-10\n        *set tenderness %+20\n        *set obstinate %+10\n        *set altruism %-20\n    #-What do you mean?\n        She can't answer, bombarded with all the black bodies over.\n        *set honor %-15\n        *set tenderness %-5\n        *set obstinate %+5\n        *set altruism %-15\n    #Help her.\n        You run towards her grabbing the black bodies and throwing them off. There are too much. You quickly get overwhelmed.\n        *set honor %+20\n        *set tenderness %-20\n        *set obstinate %-20\n        *set altruism %+30\n    #-What the fuck is going on?!\n        She can't answer, bombarded with all the black bodies over.\n        *set honor %-10\n        *set tenderness %-10\n        *set obstinate %+20\n        *set altruism %-10\n        *set believer %-5\n    #Run away.\n        *set honor %-30\n        *set tenderness %-15\n        *set obstinate %-20\n        *set altruism %-30\n        You start running on the other direction, not looking back.\n\nSuddenly the whole building starts to disintegrate. Cubic blocks of different colors appear randomly. Whiteness…\n*finish\n", "black_market": "*comment ACT 1 SCENE 6\n\n*comment this part you choose the guns you're going to use\n*comment primary must have guns: melee, pistol\n*comment guns you can choose: shogun, UZI, automatic rifle, gatling, rocket launcher, katana, knife, granades.\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nYou are at the North Park. The biggest park in the megalopolis. If it wasn't for the uniformity and the bars, it would have been called a forest. It's late and the sun has started to set. The air is is thick with smog. Even in this region industry overwhelms nature.\n\nYou enter a tunnel, buried under a hill. It's filled with phosphorescent obscene graffiti. On one of the doors at the side of the tunnel, a giant black man is standing guard. He is two heads taller than you and much broader. He calls you with a deep voice.\n\n-You lost kid?\n\n*fake_choice\n    #-No, I think I found what I was looking for. Is this the black market?\n        *set tenderness %+5\n        *set altruism %-5\n        *set obstinate %+5\n        -You sure you want to enter kid? The playground ends here.\n        \n        You nod and he opens the door.\n    #-Do I look like a kid to you, hippo?\n        *set tenderness %-15\n        *set altruism %-10\n        *set obstinate %-5\n        *set honor %+5\n        \n        -You don't know what you're messing with here ki- You put your hand in his head as the gun takes form.\n        \n        He tries to reach for his gun.\n        \n        -Don't even think about it and open the fucking door.\n        \n        He does what he is told in discomfort.\n    #-Depends. What's behind the door?\n        *set tenderness %+5\n        *set obstinate %-10\n        *set honor %-5\n        *set believer %-5\n        -This- he points back at the door- is the toy store of criminals. If you want to shop you better have balls and don't even think about causing trouble.\n        \n        He opens the door.\n    #-Yes, I am. Could you please tell me where the black market is?\n        *set tenderness %-5\n        *set altruism %+5\n        *set obstinate %-5\n        *set honor %-5\n        -Bingo. Hehe. Go in, but stay sharp, huh.\n        \nYou enter the underground net, lit, surprisingly, by candles. There are different types of people down here. Most of them look crazy. There is a guy playing with his revolver, another lighting his beard on fire, a girl horribly scared on her face, an old man painting his shotgun, two people arguing intensely and many more. It looks like things might escalate any moment here. Any other day you would have considered these people the worst of society, but today you are one of them. No, no, your cause differs you from them. Or does it? They probably thing their cause is - your thoughts are interrupted by your arrival to the shop. A fairly young guy with glasses and short hair greets you.\n\n-Wait… Have I seen you somewhere. OMG. I have, haven't I. You are margrave, aren't you?\n\n*fake_choice\n    #-Are you going to sell me guns or what?\n        -Yeah sure thing buddy.\n        *set tenderness %-5\n        *set altruism %-5\n        *set obstinate %+10\n        *set honor %-5\n    #-Yes, I am.\n        -Wow… It's an honor to have you here margrave.\n        *set tenderness %+5\n        *set altruism %-5\n        *set obstinate %-10\n        *set honor %+5\n    #-I was.\n        -Oh, yeah you are the one which King kill… So you are going to take revenge on that bastard, yeah?\n        *set tenderness %+5\n        *set altruism %+5\n        *set obstinate %-5\n        *set honor %+10\n    #-I don't know what you're talking about.\n        -Are you sure you've never been margrave? Well, I have seen you somewhere. Anyway.\n        *set tenderness %+10\n        *set altruism %+5\n        *set obstinate %-15\n        *set honor %-10\n    #-You tell someone, you are dead. Do you understand me?\n        -Yeah. Ok, ok, sure. I just sell guns.\n        *set tenderness %-15\n        *set altruism %-10\n        *set obstinate %+10\n        *set honor %-10\n    #-Just show me the guns.\n        *set tenderness %-10\n        *set altruism %-5\n        *set obstinate %+10\n        *set honor %-5\n        \n*page_break\n\n*label arsenal\n\n\n-Here's the Arsenal. My supervisor said that your payment was worth 3 weapons. Choose your poison.\n\n*choice\n    #The two sub-machine guns.\n        -I like your style. These deadly fellas drop bodies like needles. Oh by the way these are latest-technology, military-proven. They have minimal recoil and maximum accuracy. Damn, you could use one of these bad-boys as a sniper.\n        \n        -Oh I forgot, they have single, burst and fully auto fire mods.\n        *set sub_m true\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n    #The shotgun.\n        He easily brings down the double-barrel who looks devastating and hands it to you. To your surprise it's actually light.\n        \n        -You want to get yourself some pump action huh? Well I saw a guy shoot some other guy with this once. He was pushed like 10 meters back. You would not want to see what happened to that poor guys body.\n        *set shotgun true\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n    #The assault rifle.\n        -Well, must guys would say to you: pretty standard. I would prefer pretty obvious. I mean who doesn't want this deadly baby. It has everything the other guns have and more. Accuracy, check. Fire rate, check. Armor piercing bullets, check. Almost zero recoil, check. Easy, quick reload, check. Amazing scope and range, check. Optional laser, check. Precision, check. Awesome look, check. Whoah… I almost run out of breath.\n        *set assault true\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n    #The minigun.\n        -I knew you would say that. Help me bring it down, will you? This thing is heavy, and so is the damage it does. You're about to have some fun.\n        *set minigun true\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n    #The sniper.\n        -Ohh, I'm really sorry that's not for sale. I know it's big and bad but it's also super heavy and unpractical. What were you going to do with it anyway? I'm sure you'll find something else to like.\n        *goto arsenal\n    #The rocket launcher.\n        -You sure about that? I mean you're welcome to have it, but I don't have to warn you not to use it too close, do I? You could bring down an MTD with just one of these explosive missiles. You're welcome.\n        *set rocket true\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n    #The katana.\n        -Woah. I didn't know you had it in you. I mean do you even know how to use this thing. J K. Oh, and by the way, this is not some traditional crap, this is modern, hyper technology. This thing can cut trees like butter. Or, you know, limbs. Here you go samurai.\n        *set katana true\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n    #The combat knife.\n        -Uh? Sure, why not. I mean if I could choose anything I would have chosen differently, but the combat knife is not bad, I guess. I mean this thing can cut steel, if you have the strength. I'm pretty sure it's made of titanium… I don't remember.\n        *set combat true\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n    #The throwing knives.\n        -Oh-ho. We got a ninja here. Honestly I have wanted to get rid of these. Not that they are bad, phhh. The last guy who used these was the assassin of Eleanor Peafowl. Yeah the CEO of that conglomerate, Eleanor Peafowl. The truth is not many people know how to use these, but for those who do, like you, they will do you honor.\n        *set throwing true\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n    #Grenades.\n        -Of course. Here are three premium frost grenades. You can never go wrong with those.\n        *set grenades 3\n        *set guns -1\n        *if guns = 0\n            *goto leaving\n        *else\n            *goto arsenal\n        \n*label leaving\n\n-OK. So 3 weapons. We're done. See you!\n*page_break\n\nAs you are leaving this underground, weapon trafficking base, you start to wonder. Almost all these people here are criminals, some even terrorists, and for sure everyone is up to no good. But you can try to end this. If you can pull some old strings, you might give the police a tip about this base and how to eradicate it. On the other hand, wouldn't that make you a hypocrite? People are gonna die if you do this. Bad people and good people. And neutralizing this base won't mean this shady business will stop. What do you decide to do with these psychos?\n*fake_choice\n    #Use old contacts to get rid of this center\n        You do your job. You expect in the next few days action will be taken.\n        *set tenderness %-10\n        *set altruism %-20\n        *set obstinate %+20\n        *set honor %+25\n        *set believer %+10\n        *finish\n    #Leave this matter alone.\n        This war is not yours. Better not to get involved in other things. You have your own matters to solve.\n        *set tenderness %+10\n        *set altruism %+20\n        *set obstinate %-20\n        *set honor %-25\n        *set believer %-10\n        *finish", "cathedral": "*comment ACT 1 SCENE 1\n\nStormy. The uproars of thunders unaltered. In one lightning the shadow of a cathedral unfolds. Black, with red lights like dots in a painting. Half a mountain tall. Futuristic architecture. Hundreds of towers engraved with gargoyles, waters dripping from their mouths or … blood? On the tallest tower one of the walls is shattered. Raindrops hit like bullets. The room is dark. Another lightning. A figure appears.\n*fake_choice\n    #Male\n    #Female\n      *set gender false\n      *set noun \"madam\"\nYou walk with heavy steps. Exhausted. Breathing in the cold, humid air. The blood inside your body veins is boiling. Filled with rage. You have long lost control of yourself. But now it's almost over. On your hand you have the gun, still hot. Locked with your wrist. Hand shaking a little. As you step in the puddles of blood mixed with water, you notice on your side the Kings bio-copy. Dead, just like the rest. Before you, the opening. The real Kings silhouette is visible near the edge of the floor. You approach. Finally the end of your duty is before you. Sitting down, unarmed, the King sees you in the eye. He starts talking with an old, tired, yet strong and royal voice.\n*choice\n    #End this now.\n        *set tenderness %-15\n        *set obstinate %+5\n        *goto firstblood\n    #Let him talk.\n        *set tenderness %+15\n        *set obstinate %-5\n        -All this time and you could not swallow what you lost because of me. What is it you are waiting for ${name}? I was born a King and so will I die. What about you? Who are you? Who will you be? [b]What[/b] will you choose to be?\n        \n*label firstblood \n\n*choice\n    #Shoot him in the head.\n        You point the gun uncluttered. Another sound, similar to the thunder, is heard.\n        *set honor %+10\n        *set tenderness %+10\n        *goto dead\n    #Empty the magazine.\n        Gunshot after gunshot, his body is humiliated.\n        *set honor %-10\n        *set tenderness %-20\n        *goto dead\n    #Choke him.\n        You drop the gun. You want to get your hands dirty. He tries to resist. You enjoy watching his soul leave his body.\n        *set altruism %-15\n        *set tenderness %-15\n        *goto dead\n    #Torture him.\n        This will take a while you think. After almost an hour of screams and agony he stops breathing. Just the image of him now leaves someone trembling from what could have done this to him.\n        *set honor %-20\n        *set tenderness %-20\n        *set altruism %-30\n        *goto dead\n    #Throw him off.\n        A kick. A grunt. Then his body falling off disappearing into the heavy rain while his scream gets distant.\n        *set honor %-10\n        *set tenderness %-10\n        *goto dead\n    *hide_reuse #-Why?\n        -I loved her. I loved her but she wouldn't accept me. You know nobody refuses me.\n        *set obstinate %-20\n        *set tenderness %+10\n        *goto firstblood\n*label dead\nThe Rain King is dead.\n*finish", "choicescript_description": "In an alternate future where medieval laws coexist with scientific and technological advancements, a revolution is boiling. Personal reasons will force you to be at the forefront of it. Your place in this world is a simple yet powerful role, granted to you thanks to your haunting past and the current political situation in the empire. A long war threatens the autocracy of your ruler and soon you will find your life thrown upside down, engaging in an emotionally fueled conflict you never wished to be part of. As you dig deeper, you will find untold truths.\n \n[i]Rain King[/i] is a 50,000-word science-fiction interactive novel by Marvin K. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n \nInside this unique world you will have to deal with a lot of characters, each with their own goals and mentality. They might be part of your plan, or you theirs. Decisions will have to be made. Power or catastrophe might be the consequence. Your true nature will be exposed in this game of philosophy, drama, action, faith, death, family, friendship and love. As you forge your own prism of reality you might watch it shatter to pieces. After all, truth is but a fly caught in a web of lies.\n\n• Play as male or female; as gay, straight, bisexual, or asexual.[n/]\n• Explore a fantastical world reaching the limits of human advancements but being far from an utopia.[n/]\n• Make allies that would give their life for you and try to manipulate and win the favor of your acquaintances.[n/]\n• In retribution change your life and that of the biggest empire on the planet.[n/]\n• Try not to get deceived. Choose which truths to believe.[n/]\n• Help and care for others or think about your own life and let them die.[n/]\n• Choose your arsenal and unleash your inner demon in the action sequences.[n/]\n• Follow your heart and fall in love or use your admirers’ feelings for your own purposes.[n/]\n• Open your eyes and find a meaning to it all.[n/]\n\nAs you forge your own prism of reality, you might watch it shatter to pieces.\n", "choicescript_stats": "*stat_chart\n    text Name\n    text Surname\n    opposed_pair Honor\n        Wiliness\n    opposed_pair Tenderness\n        Ferocity\n    opposed_pair Altruism\n        Egotism\n    opposed_pair Obstinate\n        Adaptable\n    opposed_pair Believer\n        Infidel\n\n*temp health_text\n*if health = 7\n  *set health_text \"Untouched\"\n  *goto chart\n*elseif health = 6\n  *set health_text \"Scarred\"\n  *goto chart\n*elseif health = 5\n  *set health_text \"Injured\"\n  *goto chart\n*elseif health = 4\n  *set health_text \"Mutilated\"\n  *goto chart\n*elseif health = 3\n  *set health_text \"Moving\"\n  *goto chart\n*elseif health = 2\n  *set health_text \"Alive\"\n  *goto chart\n*elseif health = 1\n  *set health_text \"Barely breathing\"\n  *goto chart\n*else\n  *set health_text \"Not sure if dead or alive\"\n*label chart\n\n*stat_chart\n  text health_text Health\n*finish", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 7 through 23[/b]\n  \n  Unlock chapters 7 through 23, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2021-09-30 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 7 through 23[/b]\n  \n  You've paid to unlock chapters 7 through 23.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "dream": "*comment ACT 2 SCENE 5\n*hide_reuse\n\n*temp first true\n*temp second true\n*temp third true\n[Remember to check stats to see how you are doing.]\n\n[i]Never…[/i]\n\nYou are in a dessert. It's night. The sky is almost clear, stars dancing in it's dark nakedness. The grayish sand in your feet is cold. A breeze sends grains of sand twirling in harmony. Before you a small, dark purplish blue tent breaks the tediousness of the dunes. Silver stars are sewed on it's sheets. You touch the fine material of the sheets covering the entrance to the tent and set foot in.\n\nInside, incense is being burned. Your nose notifies you of it before your eyes. Inside it is as dark as outside. There is a rug with three cards before you. On the other side of the rug it's seated a very old and skinny woman wearing a black wedding dress. The dark veil covers her eyes, but you can see her razor sharp, pointy teeth. There are also innumerable pieces of cloth, trinkets and knick-knacks ornamenting the hazy shelter.\n\nThe unnerving creature conveys what you think is a smile. She then speaks with a slow voice, spit coming out of her mouth. Her voice is rusty, you can swear you hear echoes of her voice from all directions.\n\n-I… have… been… waiting… for… you… Sit… down…\n\n*fake_choice\n    #Sit.\n        *set obstinate %-10\n        *set honor %-5\n        *set altruism %+5\n        *set tenderness %+5\n        You sit down, legs crossed.\n    #Say something.\n        *set obstinate %+10\n        *set honor %+5\n        *set altruism %-5\n        *set tenderness %-5\n        As soon as you open your mouth you feel something pull you to the ground. You find yourself seated. She hasn't moved a muscle.\n\nYou take a look at the cards before you. They are all face down. Their back is just dozens of skulls atop of each others.\n\n-Choose… your… future…\n\nYou feel forced to choose a card.\n\n*fake_choice\n    *if (first) #First.\n        *set first false\n    *if (second) #Second.\n        *set second false\n    *if (third) #Third.\n        *set third false\n\nYou turn the card, it's the same as the back.\n\n-Your future… is… not… foreseeable…\n\n-Choose… your… destiny…\n\nYou feel forced to choose another card.\n\n*fake_choice\n    *if (first) #First.\n        *set first false\n    *if (second) #Second.\n        *set second false\n    *if (third) #Third.\n        *set third false\n\nYou turn the card, it's blank.\n\n-Your destiny… is not written… yet…\n\n-Choose… your… master…\n\n*fake_choice\n    *if (first) #First.\n        *set first false\n    *if (second) #Second.\n        *set second false\n    *if (third) #Third.\n        *set third false\n\nYou turn the last card, only to see yourself. The card is a mirror on one side.\n\n-Only… you… are… the master… of your… fate…\n\nShe gets closer to you, her face just a finger from yours. It's not even possible for her to stand that way she is looks like she is floating. It's so close you can smell her odor, but you can't discern her eyes in the dim light, it's almost as if they are hollow.\n\n-Not… everyone… has… that… privilege…\n\n\n\n\n", "end": "*page_break End\nWe hope you've enjoyed playing [i]Rain King.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending", "endings": "*comment ACT 3 SCENE 8\n\n*hide_reuse\n\n*temp end_nr 0\n*temp ending \"none\"\n\n\n*if (end_nr \u003c honor)\n    *set end_nr honor\n    *set ending \"honor\"\n*if (end_nr \u003c altruism)\n    *set end_nr altruism\n    *set ending \"altruism\"\n*if (end_nr \u003c believer)\n    *set end_nr believer\n    *set ending \"believer\"\n*if (end_nr \u003c (100 - obstinate))\n    *set end_nr (100-obstinate)\n    *set ending \"adaptable\"\n*if (end_nr \u003c (100-tenderness))\n    *set end_nr (100 - tenderness)\n    *set ending \"ferocity\"\n\n\n\n*if (end_nr \u003c 61)\n    *set ending \"none\"\n\n*if ending = \"none\"\n    [b]IDENTITY THIEF[/b]\n    \n    The elevator sends you down a tube with rings of light.\n    \n    -Welcome, archetype.\n    \n    The voice is omnipresent.\n    \n    -I am your technologically evolved replication, but we do not need to oppose each other. There is place in this world for both…\n    \n    You are now very deep underground. The doors open. Inside, the chamber is well lit. The room is well organized, almost as it is put together to impress you. Wires, chairs, desks, screens and other furniture surround the colorful room. You see a small metallic triangle in your hand. Its size half of your fingernail. It is hovering. The object emits a tiny light from a point and then moves away rapidly. You see now there are more of these objects. A lot more. They form a metalized cloud and then coalesce together forming a humanoid body, vaguely resembling yours. Where the face should be the figure has a dozen of symmetric colorful light sources.\n    \n    -Let us connect together. Let our minds link.\n    \n    The unalarming figure extends it's weightless robotic hand towards you.\n    \n    -The time of the challenge has come. Let me connect to the world.\n    \n    *fake_choice\n        #Touch hands.\n            As soon as your hands connect you feel a blast in your mind…\n        #No.\n            The thing in front doesn't express any reaction. It doesn't need to. You already know the disappointment it feels, because it is you. If it has any feelings at all.\n            \n            You feel your legs locked in place. The small triangles have prisoned you on the floor. You try to move, but it's pointless. More triangles emerge from the walls of the room, revealing the true chamber. It's a catastrophe. Destruction, blood, dead bodies… The triangles lock your arms. Your efforts to release yourself are futile. The monster in front of you approaches you. It's \"face\" fingers from yours. Its colorful lights reflect on your cheeks. Before you have the chance to say anything it puts its hand on the side of your face. You feel a blast in your mind…\n    \n    *page_break\n    \n    You have lost control of your body. You have lost control of your organs. You have lost control of your brain. Your consciousness has drifted away. You couldn't win against your other self. It was not a matter of will. It was simply biologically better. It has control of you now. You are not dead, but what is left of you is… You know what it is doing, what you are doing. It has taken control. It has impersonated you. It has control not only to your body, but to your memories, to your emotions, to your life, to your world. You are no longer ${name} ${surname}. It is. Your consciousness is just imprisoned inside this parody.\n    \n    You see yourself getting out of the chamber and meeting your associates outside. They think you have won. They are clueless… You cheer with them. You keep moving on. There are things to d ou are before the entrance. The two tall doors who block the ingress to the prison are sculpted as guardians, engraved with intricate design and technology. Where the door hand should be, is instead a small cavity. You put the key inside. It fits perfectly. Geometrical lines begin to light up in a bright teal color. The guardians eyes also. The door opens…\n\n*finish\n        \n", "galatia": "*comment ACT 2 SCENE 7\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nLight gray sky. You can hear the cries of seagulls far away. The sea is calm, the waves gently caressing the sand. A breeze making noise in your ears. You walk with difficulty. Before your eyes appears the catastrophe. The whole seashore is covered with dead flamingos. Hundreds of thousands of these birds pollute kilometers of the seaside. The stench is irksome. Between two palms, relaxing in a hammock, lays Galatia De Smet. Not very tall, with gray, short hair and tired eyes. You have never met her, yet her face is familiar somehow. She sees you and gets up.\n\n*if (king)\n    -I had the impression my business affairs with royalty were exhausted. If nothing else, the previous King did not kill his predecessor.\n    \n    She eyes you despising.\n    \n    *choice\n        #-Bow before me!\n            *set honor %+10\n            *set tenderness %-5\n            *set obstinate %+10\n            *set altruism %-5\n            She reluctantly bows.\n            *goto ask\n        #-You should know better how to talk to royalty. I could have you executed. \n            *set honor %+10\n            *set tenderness %-5\n            *set obstinate %+5\n            *set altruism %-10\n            She breathes silently.\n            \n            -Of course, your majesty. I ask forgiveness.\n            *goto ask\n        #-That's because his predecessor didn't deserve to be killed.\n            *set honor %+10\n            *set tenderness %+5\n            *set obstinate %+5\n            *set altruism %+5\n            -Oh, so you resolve who is to be deprived of his life and who does not. I hypothesize you do, now that you have the capability.\n            *goto ask\n        #-I will be better than the last King.\n            *set honor %-5\n            *set tenderness %+5\n            *set obstinate %-10\n            *set altruism %+5\n            -While I genuinely desire so, I have adequate acquaintance with your type to lack conviction.\n            *goto ask\n        #-I have questions for you.\n            *set honor %-10\n            *set tenderness %-5\n            *set obstinate %+10\n            *set altruism %+5         \n            *goto ask\n*else\n    -At no time in the past or future would I have considered an acquaintance with an assassin.\n    \n    She eyes you despising.\n    \n    *choice\n        #-Well, here we are.\n            *set tenderness %+10\n            *set obstinate %-10\n            *set altruism %+5\n            -Yes, indeed.\n            *goto ask\n        #-I might kill you too.\n            *set honor %+5\n            *set tenderness %-10\n            *set obstinate %-5\n            *set altruism %-10\n            -Yes, indeed you might, but first, you require answers.\n            *goto ask\n        #-I'm not an assassin.\n            *set honor %-10\n            *set tenderness %+5\n            *set obstinate %+10\n            *set altruism %+5\n            -Are you cognizant that the first assassins were given their designation by their enemies. They did not call themselves that. They were renowned as militant fanatics, and were popularly reputed to utilize hashish afore going on murder missions. Isn't that precisely what you did ${noun} ${name} ${surname}? Ingested drugs and went on a murder mission? Cerebrate.\n            *goto ask\n        #-I had to kill him.\n            *set honor %-5\n            *set tenderness %+5\n            *set obstinate %-10\n            *set altruism %+5\n            -I am not cognizant sufficiently to adjudicate your decisions, but I am certain you had them. \n            *goto ask\n        #-I have questions for you.\n            *set honor %-10\n            *set tenderness %-5\n            *set obstinate %+10\n            *set altruism %+5         \n            *goto ask\n\n*label ask\n\nShe pauses a second.\n\n-What do you desire to question me?\n*label cognition\n\n*choice\n    #-Have we ever met?\n        -No, my memory never betrays me.\n        *goto cognition\n    #-What is Project Cognition?\n        She watches you for a few seconds, speechless.\n        \n        -Project Cognition was the denomination given to a project Rain King was profoundly intrigued since his access to the throne. Some of the most brilliants minds worked on the billion cost project. I, was the head. Its main objective was whole brain emulation, or put in simpler terms mind transfer. The rudimentary conception was the process of scanning the noetic state and recollection of a particular encephalon substrate and replicating it to a computer. The computer would then run a simulation model of the encephalon's information processing and would respond in essentially the same way as the pristine encephalon and as such would have a conscious mind. The project went on for years, but was abandoned not long afore the terminus of the Rain Kings reign, fruitless.\n        *goto cognition\n    #-Why wasn't Project Cognition finished?\n        -Countless of unsuccessful tests and the war expenses decelerated it. There were additionally discordances between Rain King and the head of project, me. In the cessation the King just decided to give up.\n        *goto cognition\n    #-Why did you retire?\n        -Because, dear ${name}, I ascertained that the majority of world quandaries would terminate very facilely, if we, humans, genuinely wanted them to terminate. It is not hard to stop the pollution, to end world hunger, to remedy diseases, even to pacify the war, the only things preventing humanity from prosperity are minuscule sacrifices, like comfort…and greed…and pride of course. We would rather buy a sports car than provide food to a child that is not our own. Have a jacuzzi in our house rather than succour the poor people that cannot take care of themselves . We would rather relish our life than preserve that of our fellow. We have reached the status where helping other people is regarded as extraordinary. If it was up to you, ${name} ${surname}, would you sacrifice everything you have, beg like a person who is homeless for the rest of your life albeit you deserve better, if that would save a starving sick child you will never meet? Do not lie.\n        *choice\n            #-I would.\n                *set honor %+15\n                *set tenderness %-5\n                *set altruism %+20\n                *set obstinate %-5\n                -Are you certain? Because if you ponder clearly you will apprehend you have much more sway than than.\n                *goto cognition\n            #-I wouldn't.\n                *set honor %-5\n                *set tenderness %+10\n                *set altruism %-20\n                *set obstinate %-5\n                -Good, you are honest. The difference is I could not abide this human behavior.\n                *goto cognition\n            #-I have other questions.\n                *set honor %-15\n                *set tenderness %-5\n                *set altruism %-5\n                *set obstinate %+10\n                -You prevaricated. Do not brood. I know the answer.\n                *goto cognition\n    #-Do you plan on returning to work?\n        -I am not certain, but the probability is extremely slim.\n        *goto cognition\n    #-Why do you live here?\n        -Most people luxuriate a tropical beach. I choose this to remind me of the terrible things humanity is able to do.\n        *goto cognition\n    #-Can you help my sister?\n        -I am a scientist, not messiah. Melody's life is not in my hands.\n        *goto cognition\n    #-What do you know about the Hell Walker?\n        *set walker true\n        She lets out a slight frown.\n        \n        -His real name was Marcus Camus. He was the first and last subject to survive a Project Cognition test. What happened to him after the experiment was what my colleagues would refer as \"lost his mind\". My bet is that he became what philosophers call a philosophical zombie. Regrettably I lack the post-experiment data to talk about a real hypothesis. I am uncertain what happened to him after, but I can assure you, he justifies that pseudonym.\n        *goto cognition\n    #-What did you think of the rain King?\n        She clears her throat.\n        \n        -He was no better than the rest.\n        *goto cognition\n    #-Give me Project Cognitions passcode so I can leave.\n        -I do not have it anywhere but my memory and I am not giving it to you. That project was abandoned for good.\n        *label passcode\n        *choice\n            #Put your handgun in her head.\n                *set honor %-5\n                *set tenderness %-10\n                *set altruism %-5\n                *set obstinate %+10\n                Her eyes fill with tears.\n                \n                -928050 027020 211051.\n                *goto adios\n            #-Please, those were my sisters last words.\n                *set honor %-10\n                *set tenderness %+5\n                *set altruism %+5\n                *set obstinate %-5\n                -I knew Melody. That bitch would not sacrifice herself for anything. If she genuinely took such a risk for this… 928050 027020 211051.\n                *goto adios\n            #-That project is the reason Rain King died.\n                *set honor %+5\n                *set tenderness %-5\n                *set altruism %-5\n                *set obstinate %-5\n                She lets out a tear.\n                \n                -And so is the project.\n                *goto passcode\n            #-I don't want to hurt you.\n                *set honor %+10\n                *set tenderness %+10\n                *set altruism %+10\n                *set obstinate %-5\n                -So don't.\n                *goto passcode\n    #-Can't you talk in a easy way?\n        -I will attempt to do so, but I cannot assure you of results… I will try.\n        *goto cognition\n            \n        \n*label adios\n\n*fake_choice\n    #Turn and leave.\n        *set honor %+5\n        *set tenderness %+5\n        *set altruism %+5\n        *set obstinate %-5\n    #Kill her.\n        *set honor %-20\n        *set tenderness %-10\n        *set altruism %-15\n        *set obstinate %+10\n\n*finish\n", "hellwalker": "*comment ACT 2 SCENE 8\n\n*hide_reuse\n*temp heart false\n*temp seat false\n\n*set project true\n\n[Remember to check stats to see how you are doing.]\n\nRegius Palace. While it's grandeur remains unshaken, the palace has a sorrowful shade to it. The uniformity of the grass has been overthrown by the wild bushes, the plants have outgrown their geometrically given shape and the bizarre sculptures have just begun to lose their polished whiteness. This place has been forsaken. A small bright colored bird lands on your shoulder. He tweets gently.\n\n*fake_choice\n    #Caress the bird.\n        The bird lets you touch him just for an instant and then flies away.\n        *set honor %-5\n        *set obstinate %-5\n        *set altruism %+10\n        *set tenderness %+15\n    #Ignore the bird.\n        The bird keep tweeting on your shoulder for a while and then flies away.\n        *set honor %+10\n        *set obstinate %+10\n        *set altruism %+5\n        *set tenderness %+10\n    #Shake your shoulder.\n        The bird quickly flies away.\n        *set honor %+5\n        *set obstinate %+5\n        *set altruism %-5\n        *set tenderness %-5\n\nYou enter the tall door left half open. The chandeliers aren't lit, but the sunlight breaking through the curtains is enough. The floor doesn't shine. Ornaments are thrown down and the tables are dusty. You even spot some spider webs around.\n\nSitting on an empty table in the middle is an armored man. His thin armor is white and black and represents that of a specialist, but has been radically modified. His face is covered by a helmet with black glass and five small antennas, two on one side and three on the other. He is holding something under the table.\n\nThe Hell Walker speaks to you:\n\n-Come take a seat. We said we would meet peacefully. Don't you want to hear my side of the story too?\n\n*label story\n*choice\n    #Take a seat.\n        *set seat true\n        *set honor %+10\n        *set obstinate %-15\n        *set altruism %+10\n        *set tenderness %+20\n        *goto seat\n    #Shoot him.\n        *set honor %-10\n        *set obstinate %+10\n        *set altruism %-10\n        *set tenderness %-20\n        *goto fire\n    #-I won't sit with a man like you.\n        *set honor %+15\n        *set obstinate %+5\n        *set altruism %-5\n        *set tenderness %+5\n        *goto seat\n    #-What do you have under the table?\n        -It's a surprise. I do also have a gun if you're worried about that. Now come.\n        *set honor %-5\n        *set obstinate %-5\n        *set tenderness %-5\n        *goto story\n\n*label seat\n\nThere is a tablet on the table, showing the news.\n\n*if (king)\n    -Can I ask you something? Have you brought guards with you?\n    *fake_choice\n        #Yes.\n            *set honor %+10\n            -Good. I didn't want my traps to have gone to waste.\n        #No. (lie)\n            *set honor %-15\n            -You're a liar. Don't worry my explosives have taken care of them.\n        #No. (truth)\n            *set honor %+15\n            -I appreciate your honesty. They would have all died anyway.\n    *goto guards\n*label guards\nHe stares at you for a second.\n\n-Do you pray?\n*fake_choice\n    #-Yes.\n        *set believer %+45\n        *set honor %+10\n        *set obstinate %-10\n        *set altruism %+10\n        *set tenderness %+10\n        -Hm… I don't. Not anymore at least. Not after what I have seen. You'll see.\n    #-No.\n        *set believer %-45\n        *set honor %+10\n        *set obstinate %-10\n        *set altruism %-5\n        *set tenderness %+10\n        -Neither do I. I used to. Not anymore. Not after what I have seen. You'll see.\n    #-Sometimes.\n        *set believer %+35\n        *set honor %-5\n        *set obstinate %-10\n        *set altruism %+5\n        *set tenderness %+5\n        -Hm… I don't. Not anymore at least. Not after what I have seen. You'll see.\n    #-Maybe.\n        *set believer %+5\n        *set honor %-10\n        *set obstinate %-10\n        *set altruism %-5\n        *set tenderness %+10\n        -What, are you afraid of to tell. I'll tell you I don't. Not anymore at least. Not after what I have seen. You'll see.\n    #-Do you?\n        *set believer %-5\n        *set honor %-10\n        *set obstinate %-15\n        *set altruism %-5\n        *set tenderness %-5\n        -No. No I don't. Not anymore at least. Not after what I have seen. You'll see.\n    #-Why do you care?\n        *set believer %-15\n        *set honor %-5\n        *set obstinate %-5\n        *set altruism %-5\n        *set tenderness %-10\n        -What, are you afraid of to tell. I'll tell you I don't. Not anymore at least. Not after what I have seen. You'll see.\n    #-Why did you bring me here?\n        *set believer %-5\n        *set honor %-10\n        *set obstinate %+15\n        *set altruism %-5\n        *set tenderness %-10\n        -No time to waste.\n\n\nHe opens his helmet, revealing his face. His eyes are deep into cavity. His nose has some metallic parts and a side of his forehead seems to be pulled by a robotic part. His beard is patchy. You have never seen him.\n\n-So? What do you think?\n\n*label hy I brought you here. To end this madness once and for all. Will you help me ${name}?\n\n*label will\n*choice\n    #-We will destroy Project Cognition.\n        *set honor %+5\n        *set obstinate %-25\n        *set altruism %+10\n        *set tenderness %+5\n        *if (heart)\n            *goto news\n        *else\n            He puts above the table what seems to be a heart organ. The tablecloth begins to red by the blood.\n            \n            -This is what will happen to you and everyone you love if you change the deal.\n            *goto news\n        *label news\n        He walks away just as you read in the tablet:\n        \n        [i]Millionaire J. Angert (your brother in law) found dead and mutilated on his apartment.[/i]\n        *goto endthis\n    #-What they did to you wasn't right, but that doesn't justify your actions.\n        *set honor %+5\n        *set obstinate %+1\n        *set altruism %+5\n        *set tenderness %+5\n        *if (heart)\n            He looks at the heart.\n            \n            -You know what will happen if you refuse.\n            *goto will            \n        *else\n            He puts above the table what seems to be a heart organ. The tablecloth begins to red by the blood.\n            \n            -This is what will happen to you and everyone you love if you refuse my deal.\n            *set heart true\n            *goto will\n    #Shoot him.\n        *set honor %-5\n        *set obstinate %+20\n        *set altruism %-5\n        *set tenderness %-5\n        *goto fire\n\n*label fire\n*if (seat)\n    *set health -1\n    You try to shoot him in the head but he is very deft and bashes your hand on the table. His helmet closes. He pulls out a weaponized nailgun and tries to shoot you on the face, the nail slighlty scoring your cheek. You try to pull the nailgun out of his hand but he kicks your chair, ending you on the table and than flips the table with you. You get up and try to shoot him but he is faster and a nail sticks your fingers.\n    *goto fingers\n*else\n    You try to shoot him in the head but he is faster. He pulls out a weaponized nailgun and sticks a nail in your fingers.\n    *goto fingers\n\n*label fingers\nFrom the sudden pain you drop your gun. You get behind a table as cover as two more nails hit the floor, breaking through it. You see your bloodied gun not far away and try to make a dart for it.\n*page_break\n\n*label palm\n*set health-1\nA nail hits your palm, fixing your hand on the floor. Your enemy has unprecedented aim. The Hell Walker walks towards you, in an unhurried way. You try to grab his leg and throw him off balance, but he kicks you in the face powerfully. Except the pain you feel your mouth filling with blood and a tooth moving. He steps on your free hand and changes something on his nailgun which makes it work like a drill.\n\n-You want to know what it felt like? This is how it starts.\n\nHe puts the drill on the side of your head and begins nearing it to your ear.\n\n*fake_choice\n    #-Please! No!\n        *set honor %-20\n        *set obstinate %-20\n        *set altruism %+5\n        *set tenderness %-15\n    #-Fuck you!\n        *set believer %-5\n        *set honor %-5\n        *set obstinate %+20\n        *set altruism %-15\n        *set tenderness %-15\n    #-Wait! I'll help you!\n        -Too late!\n        \n        *set honor %-25\n        *set obstinate %-20\n        *set altruism %+5\n        *set tenderness %+10\n    #-AAAAARRRGGHHH!\n        *set honor %-5\n        *set obstinate %+10\n        *set altruism %+5\n        *set tenderness %-20\n    #-See you in hell!\n        *set believer %+25\n        *set honor %+15\n        *set obstinate %+15\n        *set altruism %-15\n        *set tenderness %+15\n    #-Forgive me God!\n        *set believer %+55\n        *set honor %+20\n        *set obstinate %+10\n        *set altruism %+15\n        *set tenderness %+15\n    #...\n        *set honor %+5\n        *set obstinate %-5\n        *set tenderness %+5\n        *set altruism %-5\n\nYou hear the horrible sound and the drill begins piercing your flesh. Suddenly the Hell Walker is shoved away. You use this instant of release to swiftly rotate around the nail holding your hand in place, similar to a clock hand. You reach enough to kick your gun to your free hand and shoot your disturbed rival in the head.\n*page_break\nThe Hell walker falls down, dead. You see your helper is a drone. You spot the initials of Melody carved in it's exterior. The drone helps you free yourself from the nail and you sit there for a moment pondering…\n*achieve hellwalker\n*label final\n\n*fake_choice\n    #Destroy the whole Project Cognition.\n        *set project false\n        *set honor %+5\n        *set obstinate %-10\n        *set altruism %+10\n    #Access Project Cognition.\n        *set honor %-5\n        *set obstinate %+10\n        *set altruism %-10\n*finish\n\n\n\n*label endthis\n*page_break\n[i]You have lost sense of time…[/i]\n\nThe Laboratory underground Apex Crown was abandoned a long time ago so there is no electricity. You can still be impressed by the cutting edge technology equipment and the fortune it has cost.\n*if (king)\n    The underground facility working on Project Cognition is huge, but accompanied by the Hell Walker and your guards you have managed to reach HQ. The expert says:\n    \n    -Your majesty, everything is ready. Say the word and all the data of the project will be erased. After, we can burn the facility to ground.\n    \n    *choice\n        #Confirm.\n            *set obstinate %+10\n            *set project false\n            Project cognition exists no more…\n            *finish\n        #This is a mistake.\n            *set obstinate %-10\n            The Hell Walker darts to the interface. All the guards shoot at him, but not before he has reached the panel. He falls to the ground washing the screen in blood. In it you can read the deletion procedure has begun.\n            *set project false\n            -There is no way to recover it…\n            \n            Says the expert with half a voice.\n            *finish\n        #Kill the Hell Walker.\n            As you give the order the Hell Walker takes cover behind a panel, killing two of your guards in the process. A frost grenade neutralizes four more. You take cover yourself. You can hear the screams of other guards echoing in this dark spot as they are killed one by one. In a short time only you and the Hell Walker are alive. There is no time for reinforcements.\n            \n            You try to shoot him in the head but he is faster. He shoots you with a weaponized nailgun and sticks a nail in your fingers. From the sudden pain you drop your gun. You get behind cover as two more nails hit the floor, breaking through it. You see your bloodied gun not far away and try to make a dart for it.\n            *goto palm\n*else\n    *set altruism %-10\n    You take a deep breath. It smells of new gadgets and blood. You open your eyes in the dim flickering lights. The only sounds that of your breath and electronic noises. The huge underground facility is filled with dead guards. You and the Hell Walker have shown no mercy. You two finally reach HQ. Your associate immediately starts working on the panel. While he is typing in the projected keyboard your thoughts drown you. Are you really on the right side? Dozens of people have died in this place and, although you wish, they weren't all guilty. Even your ally is a ruthless criminal. You did fight side by side though.\n    *choice\n        #Shoot the Hell Walker on the back.\n            *set honor %-20\n            He falls to the ground washing the screen in blood. You approach the panel.\n            *goto final\n        #Let him destroy the project.\n            *set project false\n            Project cognition exists no more…\n            *finish\n        #-Leave the panel alone!\n            As you say this the Hell Walker takes cover behind a panel firing in your direction.        \n            You try to shoot him in the head but he is faster. He shoots you with a weaponized nailgun and sticks a nail in your fingers. From the sudden pain you drop your gun. You get behind cover as two more nails hit the floor, breaking through it. You see your bloodied gun not far away and try to make a dart for it.\n            *goto palm            \n", "hill": "*comment ACT 1 SCENE 3\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\n[i]11 years ago…[/i]\n\nClear, blue sky. Just some tiny clouds moving slowly. Fresh wind blows. On the brow of a vast hill covered with short grass, a heavy wind turbine rests. You are nearby with your army friends, relaxing. Nothing. That's what you have been doing recently. There is nothing to do here. After all, this \"strategic\" zone has nothing of importance. If a real enemy army passed here, you would be annihilated. Your three best friends stand there, playing cards. Quinta, a small redhead, is losing. She has such strong morals that even playing cards took a bit of convincing. She plays fair and you doubt she might even lose deliberately because she doesn't want the others to feel bad. Jimi on the other hand is winning. An afro haircut and a mustache with a smile on his face. Jimi likes to move his eyes a bit much and see what others have in hand. He also shuffles the deck in a particular way. Jimi cheats just a little. Federik a big man with beard and glasses stays silent. He is a ruminant but that doesn't mean he likes to be played. He is very careful with his hand, especially from Jimi. As you are all playing, the alarm sounds.\n\nA quick fear travels down your spine, accompanying the alarm. An attack. You discern from down the hill enemies approaching. A full attack. MTD-s included. You have heard about these machines. They are the pride of the opposing military, but you have, luckily, never seen one from up close. Jimi and n to which you are used. Immediately a relief in breathing. As you stand on your feet one of the \"walls\", which is in fact made of glass automatically opens the curtains. \n\nMegalopolis comes into view. Cloudy. A massive ocean of buildings of all colors and shapes lays before your eyes. You can't reach the end. It seems to be infinite. There are no mountains or hills nearby. Just constructions. Predominantly 30 store structures, gray or made of glass. On the horizon a black tower breaks the monotony. Ten times larger than anything close to it, it's name is Apex Crown. The enormous structure is only half finished yet. Much discussion has spread about this tower, but the King wanted it and, as always, the Kings word wins.\n\nYou turn your attention to one of the districts. Your district. While you don't govern it yourself, you still legally \"own\" everything it has. It is part of the accolades the king gave you. Even though it isn't the hugest district in the city, it still has a population of hundreds of thousands of people. You gaze. You feel:\n*fake_choice\n    #Powerful.\n        *set altruism %-20\n    #Responsible.\n        *set altruism %+20\n    #Neither.\n        \nYour thoughts are interrupted by a ladybug which lands on the other side of the window. You had never seen one in person. A hard knock on the door. A well-known voice from the other side.\n\n-${name}! ${name} open quickly!\n\n*comment maybe add choice if you want to wear clothes first ( too much like jodie)\n\nYou open the door, only to see before you, your housemaid. Short and a little overweight with a funny face, this woman has a very good heart. You even let her call you on your first name, which she does, although she respects you tremendously.\n\nYou have never seen her disfigured like this. Breathing heavily, she looks like she has been running.\n\n-${name} it's happening! It looked impossible but it's true. It wasn't a mistake. They are going to kill her. Your sister will be executed today!\n*label execute\n*choice\n    #Start running.\n        *set tenderness %-20\n        *set obstinate %-10\n        You don't waste another second and start running towards the Angels Palace, the place where the capital punishments are held. The elevator comes quickly. As soon as you reach the ground you start free running in the crowded roads. The sounds of traffic seem so unreal. What's happening doesn't make sense. People don't seem to notice you sprinting on the asphalt. Time flies quickly.\n        \n        You arrive before the old white palace. Wide stairs lead to the entrance. Three royal guards stand in the way. One of them makes you the gesture to stop. Locked at your ankle is a complex metallic half sphere that transforms in your gun, when you wish it.\n        *label stairs\n        *choice\n            #Keep running.\n                *set tenderness %-10\n                *set obstinate %+20\n                *set honor %-10\n                You start swiftly climbing the stairs, but you are shot by one of the guards.\n                *label shot\n                *set health -1\n                You fall back. Both feet in the air. Your muscles are paralyzed in pain. They use specific ammo. You land on your back, hard. As you get on your knees, you hear the most horrible sound. Crows fly above the angel statues on top of the palace. Your sister is dead.\n                *goto revenge\n            #Shoot them.\n                *set tenderness %-30\n                *set obstinate %+20\n                *set honor %-10\n                *set altruism %-30\n                You quickly shoot the first in the hip. Their armor is too strong, but your gun is special, and you know the breakpoints. Before he falls to the ground you shoot the second guard in the chest. Blood flies in the white stairs. As you point the gun to the third and final guard, he has already fired.\n                *goto shot\n            #-I am Margrave ${name} ${surname}! Let me pass!\n merate has now evolved in a serious conflict between the Rain King and the aforementioned. This has caused debates about government accountability, freedom of speech, social issues and of course market economy. Both sides seem headstrong on their stance, some of the major figures of e-conglomerate going as far as comparing the current regime to communism. On the other hand, fanatics of the Sacred Kingdom are lashing at the unstoppable power of the conglomerate, which owns even countries. This division has caused concern among… I have just been notified that the meeting has ended. The parties have not reached an agreement and there will be… war… Yes, both parties confirm that war has started…[/i]\n\nYou hear the reactions and yells of the people around you. Even the newscaster seems troubled by the revelation. Melody turns to you with a pale face and talks to you with a ghastly voice:\n\n-${nickname}… you know what this means, right? It means you will have to join the military.\n\nShe is on the verge of tears.\n\n*fake_choice\n    #-I've always wanted to join the military.\n        *set honor %+10\n        *set tenderness %-5\n        *set obstinate %-5\n        *set altruism %-5\n    #-I'll do my part.\n        *set honor %+15\n        *set tenderness %+10\n        *set obstinate %-15\n        *set altruism %+15\n    #-I'm not joining the military.\n        *set honor %-10\n        *set tenderness %-5\n        *set obstinate %+15\n        *set altruism %-10\n    #-Oh my god!\n        *set honor %-5\n        *set tenderness %-10\n        *set believer %+20\n    #-I don't know what to say.\n\nSuddenly, a rumbling sound is heard high in the sky. It's getting louder and louder. You, like many other witnesses, raise your head and look at the sky. A slate colored aircraft is drawing nearer with alarming speed, tearing through the clouds. A nearby tough looking, man, wearing a camouflage scarf, which indicates he might have been in the military, yells:\n\n-That's a bomber!\n\nThe clamor spreads. The aircrafts modern shape is clearly visible now as it's almost above your heads. Abruptly, it gets shot. A brief fiery explosion followed by trails of thick black smoke. The inner city anti aircrafts have triggered. The enemy aircraft starts to lose altitude, falling with extreme speed, like a meteor. With a loud explosion it crashes on top of one of the highest skyscrapers nearby causing an avalanche of steel and concrete. You even spot a few bodies falling. Before the parts of the demolished building hit the ground, your sister pulls you away.\n\nThis was the first time you saw death and destruction. It was far from the last.\n*finish\n", "lies": "*comment ACT 3 SCENE 1\n\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nEyes still adjusting to the circumstances. Feeling like awaken by an adrenaline rush from a deep sleep. Everything is so unbelievable, yet so real. Your feet are cold, your fingers shaking. Every breath you take in chills your lungs. The foreign city you woke up in is not welcoming. The building style has the futuristic character of your home city, if not even more so, but it's still different, unfamiliar. The surroundings show that where you stand has once been a center of attention, luxurious and technological. Now it's forsaken. A sound of an explosion far away detaches you from your thoughtful state. Frozen chaos.\n\nIn the meek snow before you, surrounded by daunting guards, the self proclaimed Rain King is starring at you. The other one near him, he who has the robotic hand, speaks loudly:\n\n-${nickname}! Oh, ${nickname}, it's so good to see you alive.\n\nHe approaches you quickly.\n\n-They brought me so you would have a familiar face.\n\nHe hugs you.\n\n*fake_choice\n    #Hug back.\n        *set obstinate %-5\n        *set honor %-5\n        *set altruism %+5\n        *set tenderness %+5\n    #Push away.\n        *set obstinate %+5\n        *set honor %+5\n        *set altruism %-5\n        *set tenderness %-5\n-Do you remember me? It's me Koa.\n\nThe one who claims to be the Rain King speaks annoyed.\n\n-Enough of this. ${surname} move, we are going.\n\n*label enough\n\n*choice\n    #-Where are we?\n        Koa speaks calmly:\n        \n        -We are in the capital of e-conglomerate. You were held prisoner here. We came to rescue you.\n        *goto enough\n    #-Why are you rescuing me?\n        The Rain King speaks clearly.\n        \n        -Because we need you. I won't repeat myself. You are coming with us.\n        *goto enough\n    #-I don't obey you.\n        -Listen. I don't know what they put up in your mind when you were in the simulation, but that is exactly what you do. You obey my orders.\n        *goto enough\n    #-Where are we going?\n        Koa speaks:\n        \n        -Now that we rescued you we are going to hide until we find Dr. De Smet. Than-\n        \n        He gets interrupted by the Rain King.\n        \n        -We are going to talk later. Now we move.\n        *goto enough\n    #-Why was I in the simulation?\n        Koa and Rain King lock eyes for a split second, than the former speaks.\n        \n        -They wanted something from you and they wanted to manipulate you to get you on their side.\n        *goto enough\n    #-What did they want from me?\n        The Rain King speaks with his irritated voice:\n        \n        -They wanted you ${surname}. But your loyalty stands with me.\n        *goto enough\n    #-What about my sister?\n        Koa answers confused:\n        \n        -${nickname}, you have no sister.\n        *label sister\n        *choice\n            #-What the fuck do you mean?\n                -You are an only child. You always were.\n                *set believer %-5\n                *goto sister\n            #-So Melody is a liar?\n                -I don't know who this Melody is, but if she told you you have a sister, than yes she lied to you. They have told you a lot of bullshit haven't they.\n                *goto  enough\n            #-I don't believe you.\n                -I have known you since you were 8 years old ${nickname}, I'm pretty sure I would have known if you had a sister. They lied to you don't you understand.\n                *goto enough    \n    #-What about my army friends.\n        -You were the only survivor of the \"Mill Battle\". You know that right?\n        *choice\n            #-No I did not fucking know!\n                -I'm sorry. But you can still save yourself.\n                *goto enough\n            #-Quinta? Federik? Jimi?\n                He stays quiet for a moment.\n                \n                -They are all war heroes now.\n                *goto enough\n            #-Whatever\n                *goto enough\n    #-Who are you Koa?\n        -You really don't remember anything. We grew up together. We were neighbors since we were little. Only the war separated us, but I'm glad we found each other again. \n        *goto enough\n    #-Who is the girl with the tattoo?\n        -I'm Mia. I'm the one who put the \"bug\" in your simulation.\n        *fake_choice\n            #-It's not my simulation.\n                She raises her eyebrow.\n            #-Uh... thanks?\n                -You're welcome.\n            #-Why didn't you just wake me up?\n                -Why didn't you just wake up? That's right. It's not that easy.\n        *goto enough\n    #-Is Project Cognition real?\n        -That is not a lie.\n        *goto enough    \n    #-Are we still at war?\n        -No. We lost the war… We have gathered our remaining forces and made camps around the continent. The Sacred Kingdom is shattered, but we can still fix everything. Come with us.\n        *goto enough\n    #-Am I Margrave?\n        The King lets out a little laugh.\n        \n        -You wish. You were lance corporal I believe. Much, much more unimportant.\n        *goto enough\n    #-I don't believe you.\n        Koa speaks exasperated:\n        \n        -You would rather believe them, than your lifelong friend. ${nickname} look at me. You need to return to reality. They are the one who put you in the simulation, not us. We are the ones risking everything to save you.\n        *goto enough\n    #Run away.\n        *set health -1\n        You quickly get the gun of Koa and shoot one of the armored guards, its mechanical suit deflecting the projectile. You try to run away while shooting but are quickly shot by another guard. You fall in the snow as it's whiteness starts to leave place to the bloody red. The Rain King talks loudly:\n        \n        -Do you think you are still in the simulation you fool. You are coming with us, whether voluntarily or not.\n        *goto hurt\n    #-I'm not coming with you.\n        The Rain Kings answers loudly.\n        \n        -Yes you are, whether voluntarily or not.\n        *goto enough\n    #-Let's go.\n        Koa nods.\n        \n        -I'm sure it'll all come back to you. It's just a shock.\n        *goto lets\n    \n*label hurt\n\nThe heavy soldiers start approaching you. You try to fight back the ugly feeling in your organism, but you can't. You vomit blood and lose consciousness.\n*set prisoner true\n*finish\n\n*label lets\n\nOne of the guards throws a blanket in your shoulders. You don't feel well. You try to fight back the ugly feeling in your organism, but you can't. You vomit and lose consciousness.\n*finish\n", "longlive": "*comment ACT 2 SCENE 6\n*hide_reuse\n\n[Remember to check stats to see how you are doing.]\n\nYou wake up in your room. The headache is not completely over. There is a man in your room. You quickly get in a sitting position. The man stays in darkness. He is smoking tobacco. Your gun is missing. The mysterious intruder speaks with the voice of a heavy smoker.\n\n-You woke up. Finally.\n\nHe smokes.\n\n-I'm not here to kill you. We haven't been formally introduced.\n\nHe smokes again.\n\n-I'm the Red Frog. I was Rain Kings right hand. I know
