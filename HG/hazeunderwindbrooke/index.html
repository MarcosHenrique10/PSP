d.\" He doesn't look away from the sphere. \"I've seen you before. I'm sure I'll see you again.\"\n\nThere's an awkward silence in the air. Seeing another person here feels significant, but this guy\ndoesn't seem to have much interest in the situation.\n\nI approach slowly. That's still a sphere he's looking at. Destroying it would probably be for the best.\n\n*if (sklFencing = true)\n\t\n\tI generate my rapier.\n\t\n\t*goto lbl_DestroySphere\n*else\n\t\n\tI generate my bow.\n\t\n\t*goto lbl_DestroySphere\n*comment\n\n*label lbl_DestroySphere\n\nHe glances over his shoulder at me. His eyes look so tired.\n\nThe man's expression... he just looks defeated.\n\nHis eyes flicker to my weapon. \"Still struggling?\" He shakes his head, and returns to the sphere. \"Your will\nmust be especially weak.\"\n\n\"...Huh?\"\n\nWith a groan, he stands back up, and steps away from the sphere. \"This place is a melting pot of emotions, thoughts, and ideas.\nA person can wield a great deal of power here solely by asserting themselves.\"\n\nHe holds his hand out, and several little lights gather around it. They gather at the palm of his hand and turn\ninto a spark, which turns into a small flame.\n\n\"Just think it, and it will become so...\" He clenches his fist, and the fire dies. \"You seem to be struggling with the concept.\"\n\nI notice he's looking at my weapon. It looks like pure light, but everyone else's is tangible...\n\nDoes it lack form because I'm not trying hard enough?\n\n*page_break\n\nA dull pulse rumbles through the building.\n\n\"Hm. I believe that's all the time we have.\" The old man starts walking away. \"Your friends are nearly done here. I'll be\nseeing you around. I suppose.\"\n\nAnother pulse tears through the building. Everything around me melts away, and I lose my grip on the surroundings...\n\n*page_break\n\nI wake up back in the real world again. The others are pulling themselves back together too.\n\n*if (location = \"Elrin\")\n\t\n\t\"Are you okay?\" Elrin asks. At some point he got out of the car, and opened my door to look me over.\n\t\n\tI nod. \"What happened?\"\n\t\n\tJoan smirks. \"Can't you feel the difference?\"\n\t\n*if (location = \"Union\")\n\t\n\t\"You disappeared on us...\" Laura states. \"What happened?\"\n\t\n\t\"I could ask you the same thing...\" I look between the three of them. \"Did you destroy the sphere?\"\n\t\n\tJoan smirks. \"Yep! It was easy.\"\n\t\n*if (location = \"Scourge\")\n\t\n\t\"Nice!\" Lucas shoots us a wide smile. \"I can feel the difference already!\"\n\t\n*comment\n\nThe haze around the hospital has been lifted. This area feels immediately better to be in.\n\n\"That's... Great!\" I would have liked to be there for that moment, but... I guess they handled it. \"It'll be the\npolice station next, right?\"\n\nJoan nods. \"Definitely.\"\n\n*page_break\n\nWe don't stick around the hospital for too long after that. This was a good day. As far as I know, the police station\nis the only sphere left.\n\nMaybe it will be the last. I can only hope things stay that simple.\n\n*set itmPotions 3\n*set f_11_UnlockedPolice true\n*set f_11_UnlockedHospital false\n\n*page_break\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_morningactivity": "\n\n\n\n\n\n\n\n\n*if (m_Day = 18)\n\n\t[i]Today is the 18th[/i]\n\t\n\t\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_openingtext": "\n\n\n\n\n\n\n\n\n\n\n\n*comment Monday October 17th\n\n\n*if (location = \"Union\")\n\t*set tobyPartner true\n\t*set lauraPartner true\n\t\n\tA few minutes later and I'm walking across the compound's yard. The sun is finally fully visible on the horizon.\n\tMen in camouflage uniforms are doing exercises.\n\t\n\tFather Albert is overseeing their exercises. He briefly nods at me when he sees me, but seems content\n\tto stay focused on watching his men train.\n\t\n\tMy phone starts buzzing in my pocket.\n\t\n\t\"Oh. It's Raven.\"\n\t\n\tI put the phone to my ear.\n\t\n\tRaven's voice immediately comes out the other side. \"$!{fiName}! Thank god, are you okay!?\"\n\t\n\tI hesitate. \"Yes?\"\n\t\n\tThere's a really long pause on the other end of the line.\n\t\n\t\"YOU'RE 'FINE'? WHERE THE HELL HAVE YOU BEEN!\"\n\t\n\tI wince away from the phone.\n\t\n\t\"I'm with mom and dad,\" I say. \"I'm sorry I didn't get in touch earlier, some stuff happened-\"\n\t\n\t\"You found them.\" Raven's tone is flat. There's a hint of worry. \"How? What were you even doing out there?\"\n\t\n\t\"Uh... I mean, they came to the-\" I pause. \"Did you... did you know where they were?\"\n\t\n\tShe doesn't say anything.\n\t\n\t\"Did you know where they were... this whole time?\"\n\t\n\tShe hesitates. \"Can you get away from them? Are you safe?\"\n\t\n\tI talk more firmly. \"Did you know they were here?\"\n\t\n\t\"I need to talk to you about this in person.\"\n\t\n\tI nod. \"Okay. That's not an answer.\"\n\t\n\t\"$!{fiName}-\"\n\t\n\t\"I'm hanging up now.\" I shove the phone in my pocket.\n\t\n\tI just kind of stand there dumbly trying to process what just happened.\n\t\n\t*page_break\n\t\n\t\"Hey kiddo!\" dad steps up to me from out of nowhere.\n\t\n\tI flinch away from him.\n\t\n\t\"Whoa! Sorry...\" He gives a sheepish smile. \"Didn't mean to scare you there.\"\n\t\n\tI shake my head. \"It's alright. I was just... absorbed into that conversation. How's your morning been?\"\n\t\n\t\"Very good! Very good...\" He seems hesitant. \"I take it you're going to be helping Father Albert?\"\n\t\n\tI nod. \"Yeah. I guess we'll be getting starter sooner rather than later.\"\n\t\n\t\"Right... That's good. It is.\" He nods a little too enthusiastically. \"You know not to tell anyone about this place,\n\tright?\"\n\t\n\t\"Huh?\" I just stare at him. \"I mean... I hadn't really thought about it I guess.\"\n\t\n\t\"I understand,\" dad says. \"But, you have to understand... it would complicate things here if anyone knew about it.\n\tOr... us. So, for the time being, just keep all of this-and us-under your hat?\" He smiles. \"Do you understand?\"\n\t\n\t\"I'm not sure I do,\" I say. \"When you say 'us', what exactly do you mean?\"\n\t\n\t\"I mean, don't tell anyone about finding your mother and myself,\" he says. \"No one. Not your friends.\n\tAnd definitely not Raven.\" He pauses. \"In fact... it might be best if you cut off contact with her for now.\"\n\t\n\tThis isn't the first time they've had a problem with my aunt Raven. They never seemed to like me hanging out\n\twith her. I never fully understood why.\n\t\n\t\"I've got to go.\" I don't see any benefit in having a conversation with either mom or him about this again. \"I'll\n\tsee you soon. I promise.\"\n\t\n\tDad hesitates. \"Okay.\" He wants to press the issue. \"Be safe.\"\n\t\n\tAs I'm walking away from him a sudden realization hits me.\n\t\n\t*page_break\n\t\n\tIt's Monday. Today is a school day.\n\t\n\t*page_break\n\t\n*if (location = \"Elrin\")\n\t*set elrinPartner true\n\t\n\tI wake up groggily in an unfamiliar bed.\n\t\n\tA very pleasant scent fills the air.\n\t\n\t*page_break\n\t\n\tSmells delicious.\n\t\n\t*page_break\n\t\n\tI force myself out of bed. It was actually a pretty comfortable sleep.\n\t\n\tThis is easily the softest bed I've ever laid in. The sheets felt like they\n\twere made of silk.\n\t\n\tIt was quiet here too. Elrin lives in a nice neighborhood.\n\t\n\t*page_break\n\t\n\tI wander down the hall to the kitchen area. Elrin is cooking behind the stove.\n\t\n\tOut the window, I see it's still dark out. I didn't realize it was so early.\n\t\n\t\"Hey, Elrin.\" I approach him.\n\t\n\tHe's making eggs, pancakes and bacon. It's the breakfast we all supposedly eat but I can't remember\n\tever actually having.\n\t\n\t\"Hello! And good morning to you.\" Elrin looks chipper despite how early it is. \"Your timing is excellent,\n\tI'll have this done in just a few minutes.\"\n\t\n\t\"Thank you.\" Not a bad way to start the morning.\n\t\n\t*page_break\n\t\n\tThere's so much going on right now. Someone targeted the store, the haze still needs to\n\tbe dealt with, and there's that group we saw...\n\t\n\tAnd it's monday. I've got school.\n\t\n\tGod dammit...\n\t\n\t\"So I'll be accompanying you today,\" Elrin says. \"So if you have anywhere you need to go\n\tafter school, just say the word, and I'll have you there in no time.\"\n\t\n\t\"Uh...\" That's not okay. \"You... you really don't have to do that.\"\n\t\n\t\"Oh! But I do,\" Elrin says. \"I'm under orders. Raven doesn't want you out of my sight\n\tuntil the situation is resolved.\"\n\t\n\tI already know I can't argue my way out of this. I'm going to have to figure out what\n\tto do about Elrin the next time I want to dive in and clear more of the haze.\n\t\n\t*page_break\n\t\n*if (location = \"Union\")\n\t*set ritaPartner true\n\t*set lucasPartner true\n\t\n\tThe warehouse the Scourge have set themselves up in has a sort of shanty town surrounding it.\n\tThey get me set up in my own tiny room with a thoroughly mediocre bed.\n\t\n\tThis place seems odd. This is their HQ, that exists in its own little world, but they're set up\n\tin a warehouse? And everybody has to sleep in shoddily constructed houses around it?\n\t\n\tThat warehouse was clearly repurposed. I wonder what this place was before they took it over...\n\t\n\t*page_break\n\t\n\tI don't sleep particularly well, and I'm awoken early by Lucas.\n\t\n\t*if (sex = \"ma\")\n\t\t\"Hey there, partner,\" he says with a cheerful smile. \"You ready to tackle that fog?\"\n\t*if (sex = \"fe\")\n\t\t\"Sorry to wake you.\" He gives a sheepish smile. \"We normally start pretty early around here...\n\t\tBut, if you're ready, we can tackle that fog.\"\n\t*comment\n\t\n\tI grumble incoherently into my pillow.\n\t\n\t\"Huh?\"\n\t\n\t\"I just remembered it's Monday,\" I say. \"I have to go to school first...\"\n\t\n\t\"School?\" Lucas raises a brow. \"Your with us now. You don't need to worry about that.\"\n\t\n\tI force myself out of bed. \"If I skip school, Raven will actually murder m-\"\n\t\n\tOh my god. She has no idea where I am.\n\t\n\t\"Crap!\" I leap out of bed. \"My aunt Raven has no clue where I am!\"\n\t\n\tI make a move for the door, but Lucas doesn't budge. \"Whoa... maybe she shouldn't know you're with us.\"\n\t\n\t\"Obviously!\" I shout. \"But I still need to tell her something.\"\n\t\n\tLucas nods, seemingly thinking. \"Angeline can help with that.\" He sighs. \"I wanted to look\n\tinto that fog immediately, but... I understand you still have a life you need to keep up with.\n\tI'll give you my number before you leave for school. Call me when you're ready to roll.\"\n\t\n\t*page_break\n\t\n*comment\n\nI'm glad everyone at school, teachers included, are still going through the motions.\n\nThere's is so much going on right now I literally can't focus during a single class. I actually consider\njust leaving halfway through the day.\n\nOf course I don't. Because I am a rules-following wimp.\n\n*page_break\n\nAs the end of the day nears, I consider my next course of action.\n\nIt's currently the 17th. Monday.\n\nSomething is going down on the 31st.\n\nWe cleared the haze from Skylong mall. It's still coming from the hospital and the police station.\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_policestation": "\n\n\n\n\n\n\n\n*if (location = \"Elrin\")\n\t\n\tThe next day, Joan, Elrin, and I go to scope out the police station.\n\t\n\tIt's... busier than usual.\n\t\n\tMultiple armored cars are all parked around it. The individual officers wear militarized gear.\n\t\n\tMy eyes are drawn to a large hole blown into their station's wall. It looks like the building was on fire at some point,\n\tstarting from that hole.\n\t\n\t\"I really need to watch the news more,\" I mumble to myself.\n\t\n\t\"So what's the plan?\" Joan asks.\n\t\n\tThat's a good question... actually getting in might prove a bit of a challenge. I don't think passing out in\n\tthe car is necessarily a good idea this time. They'll almost certainly notice us.\n\t\n\tIn fact... Multiple officers are staring at our incredibly conspicuous limo.\n\t\n\t\"Give me a second,\" I say. \"I'll figure something out inside.\"\n\t\n\t*page_break\n\t\n\tThe others wait at the limo as I walk through the front door. Every single officer is heavily armed and looking\n\tmy way.\n\t\n\t*goto lbl_Start\n\t\n*if (location = \"Union\")\n\t\n\tThe next day Joan, Toby, Laura and I go to scope out the police station.\n\t\n\tIt's... busier than usual.\n\t\n\tMultiple armored cars are parked around. Police wear militarized gear, both in terms of armor and weapons.\n\t\n\tMy eyes are drawn to a large hole blown into their station's wall. It looked the building was on fire at some point,\n\tstarting from that hole.\n\t\n\t\"I really need to watch the news more,\" I mumble to myself.\n\t\n\t\"So what's the plan?\" Joan asks.\n\t\n\t\"Hm.\" I'm not sure actually. \"We need somewhere we can safely pass out at...\" But I can't even begin to imagine where\n\tthat might be. There are police all over the place, and something tells me they wouldn't appreciate us taking\n\ta nap in their parking lot.\n\t\n\t\"No worries!\" Toby says with a bright smile. \"Just follow me!\"\n\t\n\t*page_break\n\t\n\tJoan and I share a cautious glance as we follow Toby up to the front desk. Even Laura looks puzzled.\n\t\n\t\"Hi, Rick!\" Toby waves to the man at the front desk.\n\t\n\tHe perks up as Toby approaches. \"Toby! Hello!\"\n\t\n\t\"Uh...?\" I stare at Laura.\n\t\n\tShe just shrugs at me.\n\t\n\t*page_break\n\t\n\tAfter several moments of Toby chatting with man he comes back to us. \"He said no.\"\n\t\n\tSeriously...? \"Well, thanks for trying.\"\n\t\n\tToby nods. \"Normally the chief is nicer, but I think he's been having an off mood lately.\"\n\t\n\t\"you don't say.\" I look at the front desk.\n\t\n\tThere's got to be something we can do.\n\t\n\t*page_break\n\t\n*if (location = \"Scourge\")\n\t\n\tThe next day Joan, Lucas, Rita, and I go to scope out the police station.\n\t\n\tIt's... busier than usual.\n\t\n\tMultiple armored cars are parked around. Police wear militarized gear, both in terms of armor and weapons.\n\t\n\tMy eyes are drawn to a large hole blown into their station's wall. It looked the building was on fire at some point,\n\tstarting from that hole.\n\t\n\t\"I really need to watch the news more,\" I mumble to myself.\n\t\n\tI have no idea how we're supposed to find someplace secluded around here. Police are absolutely everywhere...\n\t\n\tLucas looks at me. \"So what's the plan?\"\n\t\n\t\"Uh...\" I start to walk toward the front door. \"Let me get back to you on that.\"\n\t\n\t*page_break\n\t\n*comment\n\nI calmly approach the front desk. There's nobody talking to the man sitting behind it, so he's already looking\nat me.\n\n*page_break\n\nI have NO IDEA what I'm going to say.\n\n*page_break\n\nI slam my hands down on the front desk. \"I NEED to use your bathroom!\"\n\nThe man sitting behind it stares at me.\n\nI stare back.\n\n\"I...\" He glances at the other officers present. \"We don't let-\"\n\n\"YOU DON'T UNDERSTAND THIS IS AN EMERGENCY!\" I shout.\n\n\"Fine!\" The horrified looking man points toward a hall to the right of the desk. \"It's the last door down that way.\"\n\n\"Thank you so much!\" I shout as I take off into a sprint down the hall.\n\n*page_break\n\nI slam the door shut behind me before diving into one of the stalls.\n\nAlright. Now what?\n\nI'm alone, and likely won't be disturbed for a time...\n\nBut the others are outside.\n\nScrew it. We're never finding someplace to sit down alone at a police station. Especially not one with a small\narmy of officers all on edge.\n\nI'm going in alone.\n\n\n\n\n\n\n\n\n\n*label lbl_SkipIntro\n\n\n*if (f_11_CheckpointPolice = \"start\")\n\t*goto lbl_Start\n*comment\n\n\n*label lbl_Start\n\nI'm walking forward. I'm alone.\n\nEndless prison cells surround me on both sides. They stretch forward and backwards, but they also go up.\nThere are no walkways above me, but story after story of cells stretch towards the ceiling, which is\nso far away I can't even see it. This looks less like a police station, and more like a prison.\n\nIt's dark. I can still see, more or less, but not very clearly.\n\nI need to get this over with...\n\n*page_break\n\nI can hear a voice up ahead. It's loud and angry.\n\nIt echoes off the walls, and pounds into my bones. I feel nauseous just hearing it.\n\nThere's something distinctly wrong with the voice. An uncanny edge hangs off of every syllable\nas it bounces up and down this endless hall.\n\nThere's a red light at the end of the hall. The further I walk, the brighter it glows.\n\nNo.\n\nIt's not getting brighter. I just couldn't see it through this otherworld haze. It cuts\nthrough the darkness bit-by-bit. The cells surrounding me are illuminated.\n\nTheir bars cast thick shadows inside them. There are no hard mattresses for prisoners to sleep on. There's\nno faucet or toilet. But, in each and every cell, there's a... mass.\n\nThey look human. Or, maybe just that they were human once. their form is melted and crooked. Their limbs\nare sometimes impossibly elongated, other times they're little more than a fleshy stub.\n\nThey are constantly moving, and gyrating, and vibrating. It's terrible. And it's terrible how silent they are.\n\nNot a one of them makes so much as a squeak, and neither do I.\n\nI proceed as quickly as I can.\n\n*page_break\n\nAs I grow closer, I hear a noise. It sounds like metal squealing...\n\nThose masses of raw flesh throw themselves against their cell door, which slowly\nbegin sliding open.\n\nI take off toward the light in a sprint. Arms stretch out ahead of me, fruitlessly reaching and grabbing. But\neven the longest arms can't quite reach me.\n\nThe cell doors only move by the slightest inch at a time, but even now I can see their pulsing masses\ntrying to fit through the small slits available to them.\n\nI run faster. I run faster until my legs are screaming.\n\nBut I can do more than that can't I? This place isn't real. I don't have any limitations if I don't\nbelieve in them.\n\nI move faster. I [i]make[/i] myself go faster.\n\nThe pain subsides, and my feet keep me propelling forward.\n\nDon't stop. Don't let the arms distract you. Don't look back.\n\nThe light is so close now...\n\n*page_break\n\nThe hall of endless cells finally ends. It lets out into a MASSIVE chamber. It's rounded, and built from\nthick concrete.\n\nThere are three desks in the center of the room. The all surround one mass. The desks are covered in papers,\nforms, and supplies I'd see in any office.\n\nBut that mass... It stretches outward towards all the desks at once. It's many limbs carefully move and organize\npapers. It staples them, and it puts stacks of them in folders. It shuffles its work into various drawers\non its desk, before drawing new papers out.\n\nThe mass is mostly shapeless, except for a single balding head poking out from the front(?) of it. I don't recognize\nthe face, but I see it's wearing a hat that matches the uniform of Windbrooke's police officers.\n\n*page_break\n\nI approach slowly. Well, its face doesn't anyway. It just looks like some guy.\n\nAs I move forward, the silence of the room weighs on me. I look back.\n\nThe hallway I entered from is blocked with thick, writhing masses of flesh. It pulses as if all the bodies\nwere connected to a single, powerful heart.\n\nThank god I wasn't caught in that.\n\n*page_break\n\nWhen I reach the desk, the man's head lets out this unsettling 'squelch' sound as it somehow rolls across\nthe mass to face me.\n\n\"Do you have anything to report?\" His voice is strong and authoritative.\n\nI stare at him. \"What?\"\n\n\"Do you have anything to report!?\" he shouts. \"We've got robberies on West Street! We've got a murder in an alley\noff Broadwick! Do you have any new information about that?\"\n\n\"Er,\" I shake my head. \"I don't.\"\n\n\"Bah!\" The man's face reddens as he sneers at me. \"What good are you new recruits? Back in my day, we would have expected\nyou to have half this city cleaned up by now!\"\n\n\"I, uh...\" Where do I even begin with this? \"I'm not a cop.\"\n\nHe stops and stares at me in silence. His eyes narrow as he studies my face. \"...Right. My apologies. Did you come\nto report a crime?\"\n\nI shake my head. \"I just have a few questions...\"\n\nWe stare at each other for a moment.\n\nI continue when I realize he's waiting for me. \"Who are you?\"\n\n\"I'm Chief Wilter,\" he says. \"I've been proudly serving this community for... for...\" He suddenly looks like he's going\nto be sick. \"Uh... excuse me. Something's not... right...\"\n\nI take a step back as his flesh wiggles and vibrates. I feel a dreadful pulse fill the air. It's coming from inside his\nfleshy mass.\n\n*page_break\n\nRed electricity crackles out of his flesh. I can see a bright light shining through his outer flesh.\n\nI quickly glance around the chamber. There's no where else to go. The sphere has to be in this room...\n\nI look back to his flesh. It's covering something.\n\n\"Sorry,\" Chief Wilter says. \"I've been having these episodes lately...\"\n\nWhatever was happening stops. The chief seems to be regaining his senses.\n\nI cautiously walk around him. The electricity left burns all over his body. When I look closer, I realize\nsome holes were left behind in his flesh.\n\nI lean over one of his desks, and peer inside one of the little flesh tunnels. There's a faint red glow inside\nit, but I can't make out what it is.\n\n*if (sklArchery = true)\n\t\n\tI generate my bow. I'm pretty sure I could fire an arrow inside the tunnel without actually hitting the Chief's flesh.\n\t\n\tNot that anything about this place is real anyway...\n\t\n\t*goto lbl_WeaponReady\n*else\n\t\n\tI generate my sword, and wince as I glance over at Chief Wilters head. This might be painful for him.\n\t\n\tAt least he's not looking at me.\n\t\n\tIn fact, he's gone back to shuffling his papers...\n\t\n\t*goto lbl_WeaponReady\n*comment\n\n*label lbl_WeaponReady\n\nI climb over his desk.\n*if (sklArchery = true)\n\tI line up an arrow that's aimed straight into the hole. Hopefully there's a sphere buried inside him, otherwise it's\n\tgoing to be really weird explaining why I just shot an arrow into his innards.\n\t\n\t*goto lbl_GettingReady\n*else\n\tI reach out and grab onto his... body. I guess.\n\t\n\tI glance over to see if he's reacting, but the chief is still just looking over papers. With one quick motion I\n\tclamber up the side of him until I'm crouched on top of the mass of flesh.\n\t\n\tFeeling all that skin and meat pulsating under me is [i]really[/i] unsettling...\n\t\n\t*goto lbl_GettingReady\n*comment\n\n*label lbl_GettingReady\n\n\"Stop! What are you doing!?\"\n\nI flinch and turn to see the old guy I saw at the hospital.\n\n\"You're here too?\" I ask.\n\nHe marches forward until he's on the other side of Chief Wilter's desk. \"I am. Now what are you doing?\"\n\n\"Uh...\" I shrug. \"I think the chief here is growing around a sphere.\" I pause. \"Maybe.\" I look back at the flesh. \"So...\nI'm going to try destroying it, and seeing what-\"\n\n\"And what of Wilter?\" he asks, his voice grave. \"Have you even considered what this might do to the man?\"\n\n*page_break\n\nChief Wilter?\n\nI look at the chief's head. He's shuffling some folders around one of his desk drawer's.\n\nIt's not like any of this is real. The actual chief is in the real world. Nothing I do here will hurt him.\n\nProbably.\n\n*page_break\n\n\"He'll be fine.\"\n*if (sklArchery = true)\n\tI ready my bow again.\n\t\n\t*goto lbl_AnotherAttempt\n*else\n\tI raise my sword up. Cutting through this is going to be awful...\n\t\n\tI really hope the chief won't feel this.\n\t\n\t*goto lbl_AnotherAttempt\n*comment\n\n*label lbl_AnotherAttempt\n\n\"I can't allow this!\" he shouts.\n\nI sigh. \"Guy, seriously!\"\n\nHe climbs over the desk. \"His current state is too important!\"\n\nI pause. \"Too important?\" I turn to face him. \"Are you... studying him?\"\n\nHe hesitates, before answering, \"Yes. I am. He needs to stay like this so I can understand what's happening to him.\"\n\nI look between the old man and the pulsing flesh before me. There's no way just leaving the chief like this is okay.\nThis place might not be real, but it's having a real impact on our world.\n\n\"Sorry, guy.\"\n*if (sklArchery = true)\n\tI release an arrow.\n\t\n\t\"No!\" He lunges forward, and throws me back over the desk with surprising force.\n\t\n\t*goto lbl_FinalBlow\n*else\n\tI slash downward, tearing open the flesh. There's no blood, just more flesh. Like this whole mass is just layer after layer of skin.\n\t\n\tOddly, the chief himself doesn't react at all. I take that as a sign to keep slicing. I tear through the flesh until my\n\tblade grazes over a hard surface. A bit of red electricity leaps out. Without a moment of hesitation, I drive my blade\n\tstraight down into the gaping wound I've formed.\n\t\n\t\"Stop this!\" He scrambles up the side of chief Wilters and shoves me back with astonishing force. I actually wind up going completely\n\tover one of the desks.\n\t\n\t*goto lbl_FinalBlow\n*comment\n\n*label lbl_FinalBlow\n\nI groan as I stand. Chief Wilters is vibrating oddly, but otherwise there's no change in his behavior.\n\n\"You can't damage the core!\" That old guy is fuming right now. It'd be kind of funny if he wasn't apparently strong\nenough to toss me around like a rag doll.\n\n\"Easy, guy...\" I approach the desk again. \"We can't just-\"\n\n\"Enough.\" The man seems to regain a modicum of composure. \"I can't let you stand in the way. There's far too much\non the line.\"\n\nI don't like where this is going...\n\n*page_break\n\nHe steps across the desk to meet me. There's a fire in his eyes.\n\nHe holds his hand out, and lights dance around it. They form a long shaft of energy that solidifies into a rapier.\n\nIt's not made of solid light. It's material is quite real, and solid. The texture is alien looking. Light refracts off the blade\nin a variety of colors. The metal looks bluish.\n\nHe sneers at me. \"I'll send you back above...\"\n\nStay focused... I can do this...\n\n*comment ---Combat Below---\n\n*temp tmp_Junk false\n*temp tmp_Far false\n\n*label lbl_LoopStart\n\n*if (health \u003c 1)\n\tI fall to my knees.\n\t*goto lbl_NearlyDefeated\n*comment\n\n*if (sklFencing = true)\n\t*set health - 1000\n\t\n\tI make a calculated stab at him. He parries my blade to the side and smoothly steps into a slash\n\taimed at my throat.\n\t\n\tI duck out of the way, but not before he leaves a horrific cut.\n\t\n\t*page_break\n\t\n\t*goto lbl_LoopStart\n*if (sklArchery = true)\n\t*set health - 1000\n\t\n\tI fire an arrow at him. The shot would have landed dead center on his forehead, but some sort\n\tof light flickers around him. My shatters against it.\n\t\n\tThe man points his palm at me. electricity bounces between his fingers before launching forward\n\tat me. Pain sears up and down my body.\n\t\n\tI'm not sure how I manage to avoid blacking out from it.\n\t\n\t*page_break\n\t\n\t*goto lbl_LoopStart\n*comment\n\n*comment ---Combat Above---\n\n*label lbl_NearlyDefeated\n\nThis is going really badly...\n\n*page_break\n\nThere has to be something I can do.\n\n*page_break\n\nI'm capable of more than this here. The others were so much stronger. It came naturally for them.\n\nWell. Maybe not for Joan.\n\nShe pretends to be some heroic knight. It's ridiculous, and clearly just a placebo that shadow woman gave her\nuntil she could find her own strength...\n\nBut it worked for her.\n\n*page_Break\n\nWhat's that phrase?\n\nFake it 'til you make it?\n\n*page_break\n\nI wince as I force myself to stand back up. \"H-hey! Asshole!\" I shout as if trying to get his attention, though when I look\nahead, I can see he's been watching me. \"Uh...\" Everything hurts. \"You're going... down. Yeah!\"\n\nHe's expression barely changes. All I can make out is the slightest tilt of his head.\n\nThis is going terribly. \"I've been holding back.\" This isn't going to work. \"But now...\" I look like an idiot. \"I'm going to show you my true p-\"\n\n\"Your trying to trick yourself,\" the old guy says matter-of-factly. \"You hope that by throwing out some bombast you'll draw\nout some power.\" He shakes his head. \"It won't matter. It won't matter because you simply aren't strong enough. Mentally.\"\n\nWe don't say anything for a while after that. We just stare each other down.\n\nScrew this. I'm getting past him one way or another.\n\n*page_break\n\nI take one step forward, and he points his palm toward me.\n\nI grit my teeth, and brace myself.\n\nElectricity dances around his fingers.\n\nThere has to be something I can do...\n\nThe shocking arcs grow more violent.\n\n*page_break\n\nThe electricity burns through me. My flesh burns and I feel my hold on this world loosen...\n\n*page_break\n\nNo. I can't let this happen.\n\n*page_break\n\nWhat good am I if I can't even handle this?\n\nSomehow, my focus returns and my grip on this world strengthens.\n\n*if (fVampireSeed = true)\n\tI can feel my blood pumping. It courses through my arms and my legs. My burns heal as it\n\tpasses under them.\n*if (fWerewolfSeed = true)\n\tI feel something clawing from within me. My burns regenerate and I feel a terrifying strength fill\n\tmy body.\n*if (fHumanSeed = true)\n\tA force flows through me. It feels... powerful. Like raw energy is coursing through my veins. The burns\n\tfade and a tremendous strength fills me.\n*comment\n\n\"What... what is this?\" I look at myself. I'm better. I'm stronger. I don't look any different.\n\nThe old man quirks a brow. \"Hmph. I see you have a spark in you after all.\"\n\nI need to capitalize on this. \"Yeah, well... I'm gonna destroy Withers now. So... yeah!\" I don't know how to banter while in a fight.\n\n*if (sklFencing = true)\n\t\n\tI create my sword. It's still made of light, but it's much larger now. The blade is no longer tiny in then. It's now\n\ta massive chunk of light.\n\t\n\tEven the old guy looks shocked now. I lunge forward and take one massive swing in his direction.\n\tThe old man ducks down avoiding my blade as it flings a spinning blade of light at Chief Wilter.\n\t\n\tThe blade carves his body completely open. For the briefest moment, I see a sphere inside him, right\n\tbefore it shatters.\n\t\n\t*goto lbl_LimitBreak\n*else\n\t\n\tI create my bow. It's still made of light, but it's absolutely surging now. When I draw an arrow back, it brims\n\twith power. The air around it trembles from the raw force within it.\n\t\n\tEven the old guy looks shocked now. I release the arrow. The old man moves to the side just in time to avoid getting\n\tstruck in his chest. The arrow continues on and hits Chief Wilter.\n\t\n\tThe arrow blasts a hole straight through his mass of flesh. For the briefest moment, I see a sphere inside him, just\n\tbefore it shatters.\n\t\n\t*goto lbl_LimitBreak\n*comment\n\n*label lbl_LimitBreak\n\n*page_break\n\nA powerful shock reverberates through the building. It repeats over and over again. It's coming from\ninside that fleshy mass.\n\n\"No...\" The old quickly moves away as red electricity erupts from Chief Wilters form. The man himself\nstill doesn't react.\n\nHe just keeps shuffling papers around at electricity fries his body to a crisp, inch-by-inch.\n\nThat old guy just throws an angry look my way as the world around us starts to drift away.\n\n*page_break\n\nWait... was that it?\n\nI did it?\n\n*page_break\n\nI did it!\n\n*page_break\n\nA familiar pull drags me down.\n\nMy senses come back to me, and I find my self face-to-face with a shadowy looking woman. The\nsame one as before.\n\n\"Hello...\"\n\nI stare at her. \"...Howdy.\"\n\n\"I see that you've met Simon...\" She circles around me. \"Twice in fact...\"\n\nI stand up, and look around. There's a great nothingness around us.\n\n\"How did that go...?\"\n\n\"Fine. Kind of.\" I sigh. \"Who even is he?\"\n\nShe snickers. \"Just a little... Pest...\"\n\nI smirk. \"You sound like you don't like him.\"\n\n\"That's because I don't...\" she says. \"He's intruding... he has [i]been[/i] intruding here for some time now...\"\nShe leans much closer. \"I don't like it...\"\n\nI hesitate, thinking she's going to continue. When she doesn't say anything more, I ask, \"Why did you keep me from returning?\"\n\n\"Can't I just want to have a little chat...?\"\n\nI cross my arms, and give her an expectant look.\n\n\"Fine, fine...\" she moodily sighs. \"Your time is very limited... Have you given any thought to what we talked about last time...?\"\n\n\"I've learned enough to realize it isn't necessary,\" I say. \"That nonsense you have Joan doing? It isn't necessary at all.\nShe could have done that on her own.\"\n\n\"Maybe...\" she says. \"But there's a difference between what a person [i]could[/i] do, and what they [i]will[/i] do...\"\n\n\"The others developed their weapons just fine,\" I respond. \"I'll be fine too.\"\n\n\"So they did...\" she hums. \"But they still aren't as strong as little Joan, are they?\" she laughs. It's low and condescending.\n\"She's still leagues stronger than all of you... and all because of a little 'nonsense' I gave her...\"\n\n*page_break\n\ndoes any of this even matter...?\n\n*page_break\n\n\"There are no other spheres left,\" I say. \"So... does it matter? I'll be moving on with my life. So will the others.\"\n\nShe just laughs at that. It's not exactly mocking, but it is clearly at my expense. \"You're done are you...? You\nthink you've saved the city...? Well, then... don't let me keep you...\" She places a hand on my shoulder, and\ngently pushes me forward.\n\nWhatever was tethering me to this nothingness ends. And I drift back to the world above.\n\n*page_break\n\nI wake up in that stall. I stumble out of it and head back to the front desk.\n\nThe man behind the desk gives me a concerned look. \"Is everything okay?\"\n\nI nod. \"Definitely! Thanks! You, uh... really saved my life there.\"\n\nAll the other officers present look like they're trying not to laugh. I quickly head out the door.\n\nWith one final glance back I see the guy at the front desk shrugging at the other officers. \"I have no idea what that was about!\"\n\n*page_break\n\nAs I'm returning to the others, Joan steps up and shouts, \"where were you!?\"\n\nI shrug. \"Bathroom.\"\n\n*if (location = \"Elrin\")\n\t\n\tWe don't stick around after that. We all pile into Elrin's limo and hurry on out of there.\n\t\n\tOnce we're a short distance down the road, Elrin speaks up. \"So that's it then?\"\n\t\n\tI nod. \"The police station is taken care of.\"\n\t\n\t\"I figured,\" Joan says. \"We both felt the atmosphere change.\"\n\t\n\t\"Good.\" I smile. \"I... guess that wraps things up. Unless another sphere appears.\"\n\t\n\t\"Wraps things up?\" Elrin looks at through the mirror. \"How do you mean?\"\n\t\n\t\"the haze,\" I say. \"It's gone.\"\n\n*if (location = \"Scourge\")\n\t\n\tWe get back into the van and peel out of the police station's parking lot.\n\t\n\tOnce we've gotten some distance from it, Lucas speaks up. \"Feels like you took care of it?\"\n\t\n\tI nod. \"Yep! We really wrapped it up.\" Well. I did. \"No more haze. And so long as no more\n\tsphere appear... I guess we're done.\"\n\t\n\tI just get confused looks from the others.\n\t\n*if (location = \"Union\")\n\t\n\tWe get back in the truck and leave the station.\n\t\n\tAs we're driving down the road, Toby speaks. \"So... it feels like you handled it, friendo?\"\n\t\n\tI nod. \"It's done. So long as no more sphere appear, the haze is gone and we can all move on with our lives.\"\n\t\n\t\"...Is it gone?\" Toby asks.\n\t\n*comment\n\nAt that moment it hits me.\n\n*page_break\n\nThe haze is still in the air.\n\nIn fact, the city is still choking on it. The atmosphere of the police station was dealt with well enough,\nbut things still feel bad.\n\n*page_break\n\n\"Do you think there are more that we missed?\" Joan asks.\n\n\"Maybe it just takes a while to clear out,\" I respond.\n\nBut... yeah. It couldn't be that easy for us.\n\n\"We'll just have to keep an eye out,\" I say. \"If we find any, we get together again, and we deal with it.\"\n\nJoan nods. \"Right!\"\n\n*page_break\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_trainingadam": "\n\n\n*if (f_11_TrainedAdam = false)\n\t*comment This is the text that plays the first time you decide to train.\n\t\n\tI don't think I'm quite ready to take on the haze yet. But with some help from Adam, maybe\n\tI will be.\n\t\n\t*page_break\n\t\n\t*if (location = \"Elrin\")\n\t\t\n\t\t\"Ah, so you're visiting Mr. Rourke,\" Elrin says with a chirp. \"He's quite the dashing\n\t\tman if I do say so myself. I can see why you look up to him.\"\n\t\t\n\t\tI approach Elrin's car. He pulled it up to the front of the school. That hadn't\n\t\treally bothered me until I noticed a large number of students staring.\n\t\t\n\t\tElrin's car is very fancy, and he obviously isn't human. I can't imagine what\n\t\tthey're all thinking.\n\t\t\n\t\t\"I'm looking to get some training in,\" I say.\n\t\t\n\t\t\"Training?\" Elrin gives me a concerned look. \"He's teaching you to hunt monsters?\"\n\t\t\n\t\t\"No, no,\" I say quickly. \"I just like to practice with the weapons over there. It's... fun.\"\n\t\t\n\t\t\"I see...\" Elrin opens the door for me to step inside, before going around to the front seat. \"And\n\t\twhat has he taught you to use?\"\n\t\t\n\t\t*if (sklFencing = true and sklArchery = true)\n\t\t\t\n\t\t\t\"He's taught me how to fence, and also how to use a bow.\"\n\t\t\t\n\t\t\t\"Fencing [i]and[/i] Archery?\n\t\t\n\t\t*if (sklFencing = true and sklArchery = false)\n\t\t\t\n\t\t\t\"He taught me how to fence.\"\n\t\t\t\n\t\t*if (sklFencing = false and sklArchery = true)\n\t\t\t\n\t\t\t\"He taught me how to use a bow.\"\n\t\t\t\n\t\t*comment\n\t\t\n\t\t\"Really?\" Any concern Elrin had melts away as interest fills his\n\t\teyes. \"He must have better tastes than I predicted. I look forward to meeting him again.\"\n\t\t\n\t\t\"You've met him before?\" I ask.\n\t\t\n\t\t\"Briefly,\" Elrin says. \"He was always more of a friend of your father's, but Raven and him always at\n\t\tleast peripherally knew each other.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tNot having to take the bus is actually pretty nice. I get to Adam's much faster, and I don't have to\n\t\tlook at the general public.\n\t\t\n\t\tWhy don't more people have personal drivers?\n\t\t\n\t\t*page_break\n\t\t\n\t*if (location = \"Scourge\")\n\t\t\n\t\tI call Lucas on my phone. \"Hey, I'm training today with a guy I know. So I won't be coming back for a-\"\n\t\t\n\t\t\"Sweet! Count me in,\" Lucas says. \"I'm already at your school. Meet me out front.\"\n\t\t\n\t\tHe suddenly hangs up.\n\t\t\n\t\tI stare at my phone. \"Okay...\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tIt winds up not being just Lucas. Rita is there with him. They're both standing next\n\t\tto an unmarked black van.\n\t\t\n\t\tPlease tell me they haven't done illegal things with that vehicle.\n\t\t\n\t\t\"Her, Rita.\" I give her a wave as I approach. \"You're coming with?\"\n\t\t\n\t\tShe nods. \"Well, I just figured we're a team now. Might as well train together.\"\n\t\t\n\t\t\"Where were you planning to train at?\" Lucas asks.\n\t\t\n\t\t\"At a hunters lodge out there in the countryside. The owner is a family friend.\" I speak\n\t\twith a hint of pride. \"Adam taught me everything I know.\"\n\t\t\n\t\tI pause, waiting for their response.\n\t\t\n\t\t*page_break\n\t\t\n\t\tOddly, I don't receive it.\n\t\t\n\t\tIt takes a few moments for me to realize they're just staring. \"What?\"\n\t\t\n\t\tLucas tilts his head. \"Hunters lodge? You mean this 'Adam' is a monster hunter.\"\n\t\t\n\t\t\"Uh...\" I clear my throat. \"I mean... he's cool.\"\n\t\t\n\t\tLucas crosses his arms. \"Really?\"\n\t\t\n\t\t\"Yes!\" I say, with a hint of indignation. \"He's not going to have a problem with you. With either\n\t\tof you. That's now what he does. Or what any of the people he trains do.\"\n\t\t\n\t\tLucas and Rita both look skeptical.\n\t\t\n\t\tRita is the first to speak up. \"Well. Let's go meet the man then.\"\n\t\t\n\t\t*page_break\n\t\t\n\t*if (location = \"Union\")\n\t\t\n\t\tAs I'm leaving school, and getting ready to go to Adam's, I'm surprised to find Toby and Laura\n\t\tstanding out front.\n\t\t\n\t\tThey're next to a beat up old truck. Toby smiles and waves immediately.\n\t\t\n\t\t\"Hey friend! What's the plan?\"\n\t\t\n\t\t\"Training,\" I say. \"I want to get some more practice in.\"\n\t\t\n\t\tHe nods. \"Sounds good. You need a lift to Mr. Rourke's? We'd love to join you.\"\n\t\t\n\t\tI stop. \"You know Adam?\"\n\t\t\n\t\t\"Of course!\" Toby says. \"Your father talked about him all the time.\"\n\t\t\n\t\tI hesitate, before moving toward their truck. \"...And you two want to join me?\"\n\t\t\n\t\tLaura must have sensed my hesitation. \"If you're okay with that...?\" Her tone has a hint\n\t\tof concern to it.\n\t\t\n\t\t\"Sorry,\" I say. \"I didn't mean for it to come off like that. If you want to come, you should.\n\t\tWe'll all probably need the practice.\"\n\t\t\n\t\tLaura smiles. \"Very well. Then I suppose we better get going.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe ride there is a bit bumpy. I wouldn't exactly call this truck 'smooth', but it is\n\t\tmuch faster then taking the bus.\n\t\t\n\t\tAnd I don't have to look at the terrible, terrible public masses.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_TrainingText\n*else\n\t*comment This creates the randomizer for seeing a partner's training text.\n\t\n\tAnother round of training couldn't hurt.\n\t\n\t*if (joanTrained = false)\n\t\t*set joanTrained true\n\t\t*set f_11_TrainingPartner \"Joan\"\n\t\t\n\t\tMaybe Joan would like to come along. I think she's got her own training\n\t\tregimen, but visiting Adam wouldn't hurt.\n\t\t\n\t\tAnd it'll be more fun to train with a friend.\n\t\t\n\t\t*goto lbl_TrainingText\n\t*elseif (elrinTrained = false)\n\t\t*set elrinTrained true\n\t\t*set f_11_TrainingPartner \"Elrin\"\n\t\t\n\t\tAs I'm making preparations to go to Adam's I'm surprised when Elrin asks to join me.\n\t\t\n\t\tI don't know that much about his process, or how he trains, but... it couldn't hurt\n\t\tI guess?\n\t\t\n\t\t*goto lbl_TrainingText\n\t*elseif (ritaTrained = false)\n\t\t*set ritaTrained true\n\t\t*set f_11_TrainingPartner \"Rita\"\n\t\t\n\t\tRita asks to tag along as I'm getting ready to head to Adam's. I guess she wants\n\t\tto get some extra practice in too.\n\t\t\n\t\tIt's not like I mind the company regardless.\n\t\t\n\t\t*goto lbl_TrainingText\n\t*elseif (lucasTrained = false)\n\t\t*set lucasTrained true\n\t\t*set f_11_TrainingPartner \"Lucas\"\n\t\t\n\t\tLucas invites himself along just as I'm about to head out to Adam's place.\n\t\t\n\t\tI wonder if he really needs the extra practice. He seems the most experienced\n\t\tout of all of us.\n\t\t\n\t\tStill, if he wants to tag along, I won't turn away the extra company.\n\t\t\n\t\t*goto lbl_TrainingText\n\t*elseif (tobyTrained = false)\n\t\t*set tobyTrained true\n\t\t*set f_11_TrainingPartner \"Toby\"\n\t\t\n\t\tMysteriously I find Toby waiting for me just as I'm about to leave\n\t\tfor Adam's place.\n\t\t\n\t\tHe just shoots me a smile and asks if I'm ready to go train.\n\t\t\n\t\t*goto lbl_TrainingText\n\t*elseif (lauraTrained = false)\n\t\t*set lauraTrained true\n\t\t*set f_11_TrainingPartner \"Laura\"\n\t\t\n\t\tAs I'm getting ready to go to Adam's Laura contacts me, asking to join this\n\t\ttime.\n\t\t\n\t\tLooks like I'll be having a friend along for my training session.\n\t\t\n\t\t*goto lbl_TrainingText\n\t*comment\n\t\n\t*goto lbl_TrainingText\n*comment\n\n\n\n*comment The following choice lets the player select what attribute to improve\n*label lbl_TrainingText\n\nWhen we arrive at Adam's lodge, I think about what I want to work on today.\n\n*choice\n\t#Fencing\n\t\t\n\t\t*if (sklFencing = true)\n\t\t\t*set sklFencingLvl + 1\n\t\t\t\n\t\t\tIf I spend the day practicing with a sword, I should\n\t\t\tbe able to make myself a little sharper.\n\t\t\t\n\t\t*comment\n\t\t\n\t\t*if (sklFencing = false)\n\t\t\t*set sklFencing true\n\t\t\t*set sklFencingLvl + 1\n\t\t\t\n\t\t\tIf I can conjure a bow from nothing in the other world,\n\t\t\tI wonder if I can make a sword too...\n\t\t\t\n\t\t\tNow is a good a time as any to find out.\n\t\t\t\n\t\t*comment\n\t\t\n\t\t*goto lbl_AfterTrainingChoice\n\t#Archery\n\t\t\n\t\t*if (sklArchery = true)\n\t\t\t*set sklArcheryLvl + 1\n\t\t\t\n\t\t\tThere's only so much a single day of training can do, but this should\n\t\t\tgive me a little more of an edge.\n\t\t\t\n\t\t*comment\n\t\t\n\t\t*if (sklArchery = false)\n\t\t\t*set sklArchery true\n\t\t\t*set sklArcheryLvl + 1\n\t\t\t\n\t\t\tI can conjure a sword in the other world... I wonder if I can make a bow\n\t\t\ttoo.\n\t\t\t\n\t\t\tI guess I'm about to find out.\n\t\t\t\n\t\t*comment\n\t\t\n\t\t*goto lbl_AfterTrainingChoice\n\t#Endurance (increases health)\n\t\t*set maxHealth + 20\n\t\t*set health maxHealth\n\t\t\n\t\tI'm not going to spend any time working with an actual weapon. Instead I'll\n\t\tspend the day working on my overall fitness.\n\t\t\n\t\tIt won't make me better at specifically defeating baddies, but it should still make a difference.\n\t\t\n\t\t*goto lbl_AfterTrainingChoice\n*comment\n\n*label lbl_AfterTrainingChoice\n\n*page_break\n\n*if (f_11_TrainedAdam = false)\n\t*set f_11_TrainedAdam true\n\t*comment the following text runs the first time you train with Adam, and show unique scenes for each group.\n\t\n\t*if (location = \"Elrin\")\n\t\t\n\t\tAs I'm training Elrin doesn't really do much. He stays out in the yard, observing everyone.\n\t\t\n\t\tHe and Adam occasionally chat, but otherwise he keeps mostly to himself.\n\t\t\n\t\tI do eventually break away from my training to chat with him.\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"You know...\" I begin. \"You don't have to stick around here just for my sake. I can always\n\t\ttake the bus back home.\"\n\t\t\n\t\t\"Nonsense!\" Elrin says with a chirp. \"It's my sworn duty to serve Mrs. Lilia. And the best way I can do\n\t\tthat is to keep an eye on you.\"\n\t\t\n\t\t\"I just don't want you to be standing around with nothing to do...\"\n\t\t\n\t\t\"It's quite alright,\" Elrin says, surveying the training yard. \"I enjoy the sights.\"\n\t\t\n\t\tI nod. \"The nature is pretty.\" The training yard might be surrounded by fencing, but we can still see\n\t\ta green sea of trees stretching across the hills in the distance.\n\t\t\n\t\t\"Hm?\" Elrin nods. \"Oh yes, the scenery is nice too.\"\n\t\t\n\t\t*page_break\n\t\t\n\t*if (location = \"Scourge\")\n\t\t\n\t\tRita and Lucas have been beyond tense the entire time I've been here.\n\t\t\n\t\tThey look like they're ready to start fighting at any moment.\n\t\t\n\t\tNobody is paying them much mind since they're sticking close to me, but this could\n\t\tget ugly.\n\t\t\n\t\tAdam approaches me part way through my practice. \"So... who are your new friends?\"\n\t\t\n\t\tI shrug. \"Oh... you know. They're just members of a secretive resistance group fighting\n\t\tagainst humans for all of their kind.\"\n\t\t\n\t\tRita and Lucas stare blankly at me.\n\t\t\n\t\tAdam just chuckles. \"I see. Where did you even run into a vampire and werewolf?\" Adam\n\t\tlooks them over a little more closely. \"They look a bit older than you too. Are you two still\n\t\tin high school?\"\n\t\t\n\t\tThey both just kind of stand frozen before Rita suddenly speaks up. \"No. I just graduated last year. And\n\t\thim the year before that. I assume.\"\n\t\t\n\t\t\"I see... How did you all meet?\" Adam just looks at me expectantly.\n\t\t\n\t\t\"Oh. Uh...\" I glance at Rita. \"She graduated from my high school. I was already friends with her last year.\"\n\t\t\n\t\tAdam brows furrow. \"You never mentioned her before...\"\n\t\t\n\t\tI just shrug.\n\t\t\n\t\tEventually Adam looks less concerned. \"Well... if either of you want to join him, I'd be happy to teach\n\t\tyou two as well.\"\n\t\t\n\t\tLucas just nods. \"Sure. Sounds cool.\"\n\t\t\n\t\tAs soon as Adam walks away, Rita turns to me and whisper-shouts, \"Why did you tell him that!?\"\n\t\t\n\t\tI laugh. \"He didn't believe it.\"\n\t\t\n\t\tRita runs her hands through her hair, and gives an exasperated sigh. \"Just don't do that again. You\n\t\tscared the hell out of me.\"\n\t\t\n\t\tI return to my training. I think they got off on the right foot with Adam?\n\t\t\n\t\tThey seem less tense at least.\n\t\t\n\t\t*page_break\n\t\t\n\t*if (location = \"Union\")\n\t\t\n\t\tAs I'm training Toby and Laura make themselves at home.\n\t\t\n\t\tToby keeps going around and chatting to people who aren't actively training. When he's not trying\n\t\tto chat me up anyway.\n\t\t\n\t\tLaura is just sitting off on her own little corner, reading a book.\n\t\t\n\t\tAt some point in my practice, Adam approaches me. \"Hey there kiddo.\" He glances at Toby and Laura. \"Made\n\t\tsome new friends I see?\"\n\t\t\n\t\tI nod. \"Something like that. They're helping Joan and me out with something.\"\n\t\t\n\t\t\"A school project?\" Adam asks.\n\t\t\n\t\t\"...Sure.\"\n\t\t\n\t\tHe pats me on the back. \"Well, your friends are always welcome up here. Maybe they'll even let me show\n\t\tthem a thing or two about how to use some of these weapons.\"\n\t\t\n\t\t\"I'll talk to them about it,\" I say quite noncommittally.\n\t\t\n\t\t*page_break\n\t\t\n\t*comment\n\t\n\t*return\n*else\n\t*comment The following text plays to show each partner character training.\n\t\n\t*if (f_11_TrainingPartner = \"Joan\")\n\t\t\n\t\tUnarmed combat didn't hold much interest to me, but it is something Adam\n\t\tteaches at his lodge.\n\t\t\n\t\tThey have a short sandy pit burrowed into the training yard. I've occasionally watched\n\t\tpeople brawl it out in it.\n\t\t\n\t\tAt some point in my practice, Joan worked up the nerve to enter it.\n\t\t\n\t\tI step up to the edge of the pit to watch her. A couple of other visitors are watching too.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThey've set her up against some guy. He's a bit overweight and short, but he's got quite a bit\n\t\tof muscle on him.\n\t\t\n\t\tOnce they start, neither of them make an immediate move. I get the sense Joan is nervous about\n\t\tfighting someone outside the haze. She doesn't have any armor or gauntlets here.\n\t\t\n\t\tShe takes some sort of boxing class, but that's not what this pit is. Protective gear is minimal, and\n\t\ttheir fighting with their bare knuckles.\n\t\t\n\t\tI sense a similar hesitation from the man. If I had to guess, he doesn't want to attack because of Joan's\n\t\tage and gender. Some of the guys here get weird about fighting women. It's worse when they're just a teenager.\n\t\t\n\t\tEventually, finally, Joan does make a move. Just a quick jab toward his chest.\n\t\t\n\t\tHe blocks it trivially enough.\n\t\t\n\t\tJoan tries another couple of jabs. Very quick.\n\t\t\n\t\tAgain, he blocks them more or less effortlessly.\n\t\t\n\t\tHe makes a hard swing at her. Joan blocks it, but I see her wince. I don't think she's used to\n\t\ttaking hard blows across her bare arm.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe fight continues in a pattern after that. Joan just making or two quick jabs that are trivially blocked,\n\t\tbefore the man goes for a hard hit.\n\t\t\n\t\tJoan consistently blocks them, but it's actually hurting her to do that.\n\t\t\n\t\tAfter several minutes, the man finally gets one very solid blow that sends Joan straight to the ground.\n\t\t\n\t\tAdam calls it after that.\n\t\t\n\t\tAs Joan climbs back out of the pit, Adam moves to meet her.\n\t\t\n\t\t\"Not terrible,\" he says. \"But, you need to be more aggressive with your striking. You should\n\t\talso try to evade blows more often. I'm thinking you were quick enough to keep out of his\n\t\treach if you really wanted to.\"\n\t\t\n\t\tJoan nods. \"Thank you, sir.\"\n\t\t\n\t\tI wave at her as she approaches me. \"You totally could have taken him if you could\n\t\ttransform.\"\n\t\t\n\t\tShe just laughs. \"I think that would have raised WAY too many questions about what we're\n\t\tdoing.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_AfterAction\n\t*elseif (f_11_TrainingPartner = \"Elrin\")\n\t\t\n\t\tAs I'm training, I spot Elrin looking over a few practice weapons laid out\n\t\ton a nearby table.\n\t\t\n\t\tThey're all just made of wood, but that's usually fine for people who are just starting out.\n\t\t\n\t\tHe grabs a long staff from the bench, and it gives it an appraising look over.\n\t\t\n\t\tAdam approaches him from behind. \"Is that your thing?\"\n\t\t\n\t\t\"Hm?\" Elrin turns around. \"Oh! Yes. I was given some basic training when I was younger\n\t\tin the use of staff weapons.\"\n\t\t\n\t\t\"I see.\" Adam sounds unusually intrigued right now. \"Would you like to test your skills\n\t\tout here? It's been a while since I've sparred against anyone. And, it would be interesting\n\t\tto see how people are taught on your side of things.\"\n\t\t\n\t\t\"Oh, I wouldn't want to impose...\"\n\t\t\n\t\tAdam just barks out a laugh. \"You wouldn't be imposing! I live for this sort of thing!\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tAnd so they step onto a large mat set out for people interested in sparring.\n\t\t\n\t\tI take a break from my practice to watch them.\n\t\t\n\t\tAdam is to my left. Elrin is to my right.\n\t\t\n\t\tThey've both got wooden staffs. I've never even touched one myself in all the years I've\n\t\tbeen visiting Adam. I guess I wrote them off as being 'worse' than other weapons in some way.\n\t\t\n\t\tThe fight starts. And both of them move forward simultaneously.\n\t\t\n\t\t*page_break\n\t\t\n\t\tElrin's form disappears in a blur of motion. I don't quite catch what happens, but\n\t\tAdam's staff flies right by my head, and the man himself winds up flattened across the mat.\n\t\t\n\t\tElrin stands above, still in an aggressive stance.\n\t\t\n\t\tWhich he promptly drops. \"Oh my goodness! I'm so sorry!\"\n\t\t\n\t\tI stare blankly as Elrin tries to help a dazed Adam to his feat.\n\t\t\n\t\tApparently Elrin is a ninja. Good thing he's on our side.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_AfterAction\n\t*elseif (f_11_TrainingPartner = \"Rita\")\n\t\t\n\t\tI occasionally look away from my own training to see Rita looking over something\n\t\ton one of the nearby equipment tables. I can't tell what she's actually looking at\n\t\tthough.\n\t\t\n\t\tShe also keeps glancing over at Adam every few moments. No idea why.\n\t\t\n\t\tIt isn't until a long time time passes, so long in fact that I'm nearly done with my\n\t\ttraining, that she suddenly walks over to Adam.\n\t\t\n\t\t\"Do you have anyone who knows how to fight with one of these?\" Rita holds up an odd knife, with\n\t\ta red guard, and a pure white blade and handle.\n\t\t\n\t\tThe colors looks suspiciously close to The Scourge's color scheme. She didn't pick that knife\n\t\tup off the equipment table. She already had it on her.\n\t\t\n\t\t\"Knives?\" Adam gives the blade a curious look. \"They're not very popular, since most creatures\n\t\tare too powerful to easily dispatch with just a knife. That being said... yes.\"\n\t\t\n\t\t\"Who?\" Rita asks.\n\t\t\n\t\t\"Right now?\" Adam looks around. \"The only person here with any experience is right in front of you.\"\n\t\t\n\t\tThere's an odd pause between them before Rita speaks up. \"Show me what you know.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tThey don't use actual knives for practice obviously. We have blades, big and small, with dulled edges.\n\t\tAdam gives her one, and he keeps one for himself.\n\t\t\n\t\tThey square off an a mat set up for sparring.\n\t\t\n\t\t\"Let's make it interesting,\" Adam says. \"Training normally involves instruction, but... I don't\n\t\tthink you need that. How about we just do first to five?\"\n\t\t\n\t\tRita tilts her head. \"First to five... what?\"\n\t\t\n\t\t\"Points!\" Adam chuckles. \"If the knife connects to your opponents body, you get a point. First to five\n\t\twins.\"\n\t\t\n\t\tRita hesitates. \"...Fine.\"\n\t\t\n\t\tWhen they begin, I was expecting a sudden explosion of action. But, that doesn't happen. They take their\n\t\ttime.\n\t\t\n\t\tThey step closer to each other. Adam tests her with a mild stab forward. It's not much of an effort, just\n\t\tenough to force her to push his blade aside. Rita returns the effort.\n\t\t\n\t\tThe entire thing is a slow, ponderous affair.\n\t\t\n\t\t*page_break\n\t\t\n\t\tEventually it does ramp up. Not in speed, but in intensity. Every attack is thrown very deliberately, but\n\t\twith a tremendous amount of effort behind it.\n\t\t\n\t\tAdam is the first to score a point. His dagger cuts just under her wrist. Rita is fine of course, but\n\t\tit still counts.\n\t\t\n\t\tAnd then it happens again. Adam delivers a restrained stab to Rita's ribs.\n\t\t\n\t\tRita's efforts improve. She strikes harder. Faster.\n\t\t\n\t\tBut... Adam doesn't seem fazed. Not even a little. He just keeps taking his time, slashing\n\t\tor striking only when it suits him.\n\t\t\n\t\tHe scores another point. And then another.\n\t\t\n\t\tOne more and he'll win. Rita is at zero.\n\t\t\n\t\tThere's a flicker of genuine aggression from Rita. She picks up her pace. She strikes and slashes\n\t\twith a suspicious degree of strength and speed.\n\t\t\n\t\tI guess Adam never said she couldn't take advantage of her vampirism's enhanced attributes...\n\t\t\n\t\tIt doesn't matter though. Adam grabs her wrist mid-stab, and slashes her across the stomach in\n\t\tone smooth motion.\n\t\t\n\t\tRita flinches as if she was actually cut.\n\t\t\n\t\t*page_break\n\t\t\n\t\tAdam just smiles. \"Well, I think that about settles it. You're not bad.\" I expect him to give\n\t\tsome advice here. \"In fact, you're quite good!\" Oddly, he doesn't give it...\n\t\t\n\t\t\"Yeah...\" Rita's just rubbing her stomach. \"Where did you learn to fight with a knife?\"\n\t\t\n\t\tAdam just shrugs. \"Well, I've spent years training with all sorts of weapons. Though. I imagine\n\t\tI had a similar start with knives that you did.\"\n\t\t\n\t\tRita averts her gaze for a moment, before saying. \"...I got my 'start' with knives fighting people\n\t\tin my neighborhood.\"\n\t\t\n\t\tAdam nods. \"It's getting pretty late.\" He looks over at me. \"You all wrapped up for today, kiddo?\"\n\t\t\n\t\t\"Huh?\" I flinch when I'm addressed. \"Yes! Totally. We should, uh... get moving.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_AfterAction\n\t*elseif (f_11_TrainingPartner = \"Lucas\")\n\t\t\n\t\t\"Yo!\" Lucas saunters up to me, before balling his fists and knocking them together a few times. \"You and me.\n\t\tYeah?\"\n\t\t\n\t\tI just stare at him. \"What?\"\n\t\t\n\t\t\"Let's go at it,\" he says with a grin. \"I can show you a few moves.\"\n\t\t\n\t\t\"What sort of moves?\" I say warily.\n\t\t\n\t\t*page_break\n\t\t\n\t\tWe're both standing in a sandy pit burrowing into the training field. People come down\n\t\there to spar a lot. Usually the unarmed folk.\n\t\t\n\t\t\"Show me your moves!\" Lucas is bouncing between his left and right foot. I don't know why.\n\t\t\n\t\t\"I don't know how to fight without a weapon...\"\n\t\t\n\t\t\"Just try your best!\" Lucas says. \"C'mon!\"\n\t\t\n\t\tI'm wearing protective gear right now (only me), so I guess it can't be too dangerous...\n\t\t\n\t\t*page_break\n\t\t\n\t\tI was wrong.\n\t\t\n\t\tI'm lying on the ground. This armor was completely useless.\n\t\t\n\t\tIt was terrible. Every punch, every kick, possessed crushing force.\n\t\t\n\t\t\"Maybe... next time... hold back a little...\"\n\t\t\n\t\t\"No can do,\" Lucas says. \"That's not how you learn.\"\n\t\t\n\t\tI grumble unintelligible fury under my breath until I'm capable of standing again.\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"So that was fun.\" Lucas is smiling like an idiot while we sit at one of the tables set up inside\n\t\tthe lodge.\n\t\t\n\t\tLucas is eating a ham sandwich. I refused an extra one he offered me. Because I have dignity.\n\t\t\n\t\t\"We should try that again some time.\"\n\t\t\n\t\t\"Pass,\" I mumble.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_AfterAction\n\t*elseif (f_11_TrainingPartner = \"Toby\")\n\t\t\n\t\tAs I'm training Toby is just sitting cross-legged on the ground nearby. His eyes\n\t\tare closed, and I can tell he's breathing slowly.\n\t\t\n\t\tHe's been there for quite a while now.\n\t\t\n\t\tI take a break to approach him. \"I thought you wanted to join me to train?\"\n\t\t\n\t\t\"I am training,\" he says. \"Spiritual training.\"\n\t\t\n\t\t\"Yeah?\" I tilt my head. \"So... you're praying?\"\n\t\t\n\t\tA slight frown tugs at the corner of Toby's mouth. \"Not exactly.\"\n\t\t\n\t\t\"Oh.\" I stand there awkwardly for a moment. \"So you're... just trying to feel closer to god? Or...\"\n\t\t\n\t\t\"Father Albert and I...\" Toby hesitates, almost like he doesn't want to say anything more. \"We don't\n\t\thave the same beliefs about the nature of our abilities.\"\n\t\t\n\t\tI just stare at Toby for a moment. \"I saw an angel...\"\n\t\t\n\t\t\"Yes. I've seen them before too,\" he says. \"I have no doubt they exist. And I believe a higher\n\t\tpower exists in this world.\"\n\t\t\n\t\tI wait. \"But...?\"\n\t\t\n\t\t\"Father Albert worships a book. I do not.\"\n\t\t\n\t\tI'm not really sure what to say to that. I stand there for long enough to notice Toby's breathing\n\t\tslow again.\n\t\t\n\t\tI return to my own training.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_AfterAction\n\t*elseif (f_11_TrainingPartner = \"Laura\")\n\t\t\n\t\tAs I'm training, Laura steps up beside me.'\n\t\t\n\t\t\"Pardon me,\" she says. \"Um. I couldn't find a weapon to practice with?\"\n\t\t\n\t\tI stare at her. \"Oh!\" I break away from my training, and lead her in the direction of the equipment rack. \"Yeah,\n\t\tlet me see what we have...\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tThere are quite a broad selection of weapons. Spears, rapiers and broadswords, axes.\n\t\t\n\t\t\"No sword staffs?\" Laura asks.\n\t\t\n\t\t\"Uh...\" Does she mean a halberd? \"No.\"\n\t\t\n\t\t\"Oh. I see...\" Laura looks a little disappointed.\n\t\t\n\t\tI suppose she should be if she came out here to train, and can't practice with her preferred weapon.\n\t\t\n\t\tI eye a quarterstaff in the weapon rack. \"I might have an idea.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tFifteen minutes and some duct tape later and I've affixed a machete to the quarterstaff.\n\t\t\n\t\tI hand it to her. A hint of pride on my face. \"How's that work for you?\"\n\t\t\n\t\tLaura stares at the blade affixed to the end of the staff.\n\t\t\n\t\tI stare at her, awaiting a response.\n\t\t\n\t\tLaura bursts out laughing. \"Oh my god... That's priceless!\"\n\t\t\n\t\tI frown.\n\t\t\n\t\t\"Hoo... Thanks.\" she smiles. \"I needed that.\" She walks back to the weapon rack. \"I'll just make do\n\t\twith a spear.\" She hands my really nicely made pole-arm back to me. \"Thanks for the pick-me-up.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t*return\n\t*comment\n\t\n\t*return\n*comment\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "badend_albert": "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nI head down into the main part of the church.\n\nFather Albert is pacing back and forth in front of the pew. He's mumbling to himself nonstop, and\nseems especially anxious.\n\nI look back at the Laura and Toby.\n\nThey're just staring at me.\n\nThey can't seriously be dumping his breakdown on me...\n\n*page_break\n\nI cautiously take a step toward the man.\n\nIf he has noticed me, he isn't showing any sign of it.\n\nHe's just... walking back and forth. He keeps mumbling, but even this close I can't make out a word he's saying.\n\n\"Father-\"\n\nHe raises a hand up to stop me. \"Don't.\"\n\nI freeze.\n\n\"I... I have betrayed my faith.\" He finally stops pacing around. \"God... what have I done? I've killed so many...\"\n\nI look back at the others.\n\nThey're all just staring at him.\n\nDid they tell him what happened last night yet?\n\n\"F- Albert. Sir.\" I take a step toward him. \"Do you know what we did last night?\"\n\nHe gives me a confused look.\n\nThat's a no. \"I need to fill you in on some things.\"\n\n*page_break\n\nWhen I'm finished telling father Albert about everything, he's sitting in one of the church pews.\n\nHe doesn't say anything. His eyes are closed.\n\nLaura and Toby took seats behind him at some point. They look really concerned about him.\n\n\"Angeline...\" he sighs. \"She has to be dealt with.\"\n\nI nod. \"Do you know much about her?\"\n\n\"She's killed many of my followers,\" he says. \"And I've killed many of hers. Our pointless struggle has been\ngoing on for...\" he stops. \"I suspect for as long as we've been influenced by that 'other world'.\"\n\n\"Yeah... that's quite a coincidence...\"\n\n\"Indeed.\" For a split second he smirks just a little. \"That haze is troubling, but we must focus\non Angeline for now. The Scourge has to be dealt with.\"\n\nI nod. \"Agreed. Do we have any sort of plan here? where they'll be? Something like that?\"\n\nFather Albert stands up. \"I know where their base is, and how to access it.\"\n\n\"Oh.\" That's weird. Nobody in the compound mentioned anything about it. \"I'm surprised no one around\nhere wanted to go attack earlier.\"\n\n\"Nobody else knows,\" he says.\n\n\"Huh?\"\n\n\"Not a single one of my followers knows where the scourge are hiding right now,\" father Albert explains. \"Only\nmyself.\"\n\n\"Oh. Uh...\"\n\n\"I believe we have a mole somewhere around here,\" he says. \"I believed it was best to keep that information\nto myself until we had sufficiently built up enough forces to defeat them.\"\n\n\"...Have you done... that?\"\n\n\"Hm.\" Father Albert spends a moment contemplating. \"I'm inclined to think no, except...\" He gives me a sharp look. \"You\nsay Angeline has likely been weakened? Mentally at least?\"\n\n\"Kinda,\" I say. \"It's more like you were both weakened the entire time. Only now you've returned to your\nsenses. But she hasn't.\"\n\nHe nods. \"That might just make the difference.\" Father Albert starts walking toward the door. \"I need to address\nmy people. They need to know what we're about to do.\"\n\n\"What about the mole?\"\n\n*page_break\n\nApparently the mole can go screw himself, because father Albert is moving us out.\n\nRight now.\n\nHe's not specifying what we're doing, or where we're going.\n\nHe just told everyone to gear up and move out.\n\nAnd when I say everyone, I mean [i]everyone[/i]. Not a single person who's able and willing\nto fight stays behind.\n\nEveryone piles into jeeps and trucks. They put on various armors, most of which are designed for bullets. Some\nlooks like they're meant to block blades though.\n\nWe head out in one enormous convoy.\n\n*page_break\n\nI end up riding with Toby and Laura, as we head out... somewhere.\n\nLaura is driving. Toby and I are in the backseat of the jeep.\n\n\"So,\" I start. \"About your friends?\"\n\n\"Hm?\" Toby gives me a confused look.\n\n\"You were in contact with the police?\"\n\nHe nods. \"That's right.\"\n\n\"...Are they going to stop us?\"\n\n\"Oh. No, no, no...\" Toby laughs. \"They were ready to arrest us at the end of the month. They don't even have anyone\nwatching the compound right now.\"\n\n\"I see...\" But what's going to happen after everything is said and done?\n\nEven if the Union of Humanity doesn't go through with its initial attack, they were still planning one. Are they\nreally just going to be let off the hook for that?\n\n\"It's okay,\" Toby says. \"I think father knows how this is going to end for him. He's regained his senses, and\nhe knows what he's done.\"\n\n\"Are you okay with that?\"\n\nToby doesn't say anything for a while.\n\nLaura chimes in from the drivers seat. \"We'll worry about that after this.\" She pauses. \"Are you going\nto be okay with this, $!{fiName}?\"\n\n\"Huh? You mean him being arrested?\"\n\nShe shakes her head. \"What we're about to do. It's pretty obvious father Albert is leading us\nto fight the scourge. This is going to be bad. People are going to die.\"\n\nI hadn't thought about that.\n\nI've killed monsters in that other world before, but I've never killed a person.\n\nI don't think I could.\n\n\"If it's going to be an issue,\" Laura says. \"Just hang back away from the fighting. You can leave everything up\nto them.\"\n\n\"You're not going to fight with them?\" I ask.\n\nLaura hesitates. \"No.\"\n\nHuh. At least I'm not the only one who doesn't want to do this.\n\n*page_break\n\nWe aren't headed toward the city. In fact, we don't seem to be heading toward anything.\n\nThe houses are only getting more scarce the further we go. The trees grow thicker around us.\n\nEveryone seems on edge, like they think a bullet is going to come flying at us any second now.\n\nThey might be right.\n\n*page_break\n\nAs we're driving along, somebody calls out that someone's standing in the middle of the road.\n\nOur convoy comes to a screeching halt. In lean out our jeep's window to get a better look\nahead.\n\nAnd I see its her. Angeline.\n\nShe seems to be alone. She's just staring us down. There's an intense look on her face.\n\nI get out of the jeep immediately. Laura and Toby follow.\n\n*page_break\n\nFather Albert has stepped out to meet her, but everyone else it staying in their vehicles.\n\nThere's not a single person here who doesn't look like they're willing to start shooting at any moment.\n\nThere's a moment of recognition between herself and father Albert.\n\nWe quickly move to get beside him, but he holds a hand up, stopping us. He doesn't look back\nat us, or say anything, but I can feel him wanting us to keep back.\n\n\"Albert.\" Angeline smiles. \"It's been a long time, yes?\"\n\nHe says nothing. A lot of our people are stepping out of their vehicles, and taking aim at her.\n\n\"This has to stop,\" he says.\n\n\"And I suppose that's what you came here to do?\" she asks. \"To 'stop' me? By murdering me and my people?\" She gives Albert\nthis [i]look[/i].\n\nShe hates him. I've never seen that sort of fury on anyone before.\n\n\"You think you're special don't you?\" she asks. \"That you're god's personal servant. That you can't do anything wrong. Do\nyou feel absolved for how many of my kind you've slaughtered?\"\n\nAlbert doesn't flinch. \"No.\"\n\nAngeline hesitates.\n\n\"I intend to face the consequences of my actions,\" he says. \"Both in this life and the next.\"\n\nThere's a long silence after that.\n\n*page_break\n\nNobody is making a sound. Everybody is ready to shoot.\n\nAngeline is just standing in front of our convoy. Staring us down.\n\nI keep looking to our surroundings. There are trees and shrubbery on all sides of us. If\nshe has any backup here, I don't see them.\n\n\"How do you want this to end?\" Angeline asks.\n\nAlbert tilts his head just slightly. \"Ideally?\"\n\n\"Of course.\"\n\n\"I want you to come with me,\" he says. \"And we both turn ourselves in for plotting a massacre. We'll go to prison, and\nour followers will hopefully go on with their lives.\"\n\n\"Is that a fact?\" Angeline smirks. \"You're really good with that boyscout act.\"\n\nAlbert steps forward. \"I'm being completely serious.\" Something in his tone shifts. He starts talking to\nAngeline with a degree of familiarity. Even warmness. \"Angeline. It's gone too far. Too many people have died.\nWe have to stop.\"\n\n\"Well, I can agree with that.\" Angeline's posture becomes subtly more aggressive. \"Too many people have died.\nAnd I can't just let that go. I can't just let any of your people go.\"\n\n\"Your hands are as dirty as mine,\" Albert responds. \"We have to take-\"\n\n\"Go screw yourself!\" Angeline wills a wisp of fire between her fingers. \"You and your whole damn 'flock'!\" She\nthrows the spark out, and it grows into a massive flame.\n\nTwo of the front vehicles are roasted as their passengers leap out. Albert himself just holds his arm in front of\nhis face. The flames lick and bite around his body, but he's somehow unharmed.\n\nGunshots blast out all around me. Every single person is shooting at her.\n\nA bullet whizzes by my head. I look to the nearby tree line and make out multiple hidden figures.\n\n\"We're being shot at too!\" I grab Toby and Laura and force them to get to the ground.\n\nWe slam into the pavement has bullets tear through the cars around us.\n\n*page_break\n\nI can't hear anything around us but gunfire. I look to Albert and Angeline.\n\nAngeline is backing away as she throws fire out at Albert. Albert is steadily marching toward her.\n\nThey're getting farther away from us.\n\nSomething metallic lands next to me. It's some sort of metal canister.\n\nLaura grabs my shoulder. \"That's an explosive!\" She throws me away from it and I roll across the pavement.\n\nThere's an explosion...\n\n*page_break\n\nMy ears are ringing.\n\nI look back to see Laura with a long chunk of metal sticking out of abdomen. She's gritting her teeth, but\nseems to be holding it together.\n\nToby is already on top of her. He places a hand on the wound. \"It'll stop hurting soon... just bear with it...\"\n\nHe tears the metal out, and Laura screams. Toby keeps immediately tosses the shrapnel aside and holds her\ndown. He keeps a hand firmly planted against her wound.\n\nThere's a soft light. Laura calms down. Eventually she sits up.\n\nShe's not in pain. She runs a hand over her wound, and smears the blood down to her leg. The wound\nhas vanished.\n\nThe gunfire has died down a little. Potshots are still being traded by both sides, but it looks\nlike there's a lull in the fighting.\n\nI take a look around.\n\n*page_break\n\nA lot of people are hurt or dead. I can see corpses amongst the trees too.\n\nAlbert and Angeline are very far down the road now. It's getting harder to see them. I can\nsee Angeline is still trying to incinerate him.\n\nThere's nothing I can do here. I don't even know how to use a gun.\n\nI look at Angeline. \"Are you okay?\"\n\nShe nods. \"I just need a second.\"\n\n\"Good, good.\" I stay low but quickly scramble towards Angeline and father Albert. \"Stay low!\"\n\n\"Wha!? What are you doing!?\" Angeline shouts.\n\n*page_break\n\nWhat am I doing?\n\nI'm probably about to die.\n\nAlbert and Angeline are having a stand off down the road. Albert himself looks completely fine.\nI don't know how, but Angeline's fire isn't hurting him.\n\nAngeline herself however is openly raging.\n\n\"Just! DIE!\" She throws a massive amount of fire in father Albert's direction. He just stands there. The\nfire whips around him, clinging to his form, but he's not hurt. His clothing isn't even singed.\n\nAngeline is noticeably exhausted. She's heaving as she points her arm forward. The limb shakes\nas sparks form at her fingertips.\n\n\"Angeline,\" Father Albert says firmly. \"This has to-\"\n\nShe screams as she lets another wall of fire loose. It slams into Albert and flows past him.\nI scramble backwards to avoid getting burned.\n\n\"-stop.\"\n\nAngeline collapses to her knees. \"How...\"\n\nFather Albert approaches her. \"Angeline...\" In fact, he's coming alarming close to her. \"Please.\"\nHe gets on one knee in front her. \"Come with me. We can stop this. This can end tonight. No more\ndeath. No more bloodshed. Not tomorrow. Not the day after.\"\n\nAngeline is just staring down at the ground, trying to catch her breath.\n\nI hear footsteps behind me. I glance back to see Laura running up to me. She looks pretty miffed that I ditched\nher.\n\nToby still seems to be back at the vehicles. Hopefully he's tending to the wounded.\n\n\"What were you thinking?\" Laura asks.\n\nI shrug. \"I had to do...\" A haze starts rising up out of the ground. \"...Something.\" I look around.\n\nIt's all around us.\n\n*page_break\n\nIt's the haze. The same kind we've seen from the otherworld. It's everywhere. And it's thick.\n\nA power runs down my arm.\n\n*if (style = \"warrior\")\n\tI generate my sword. We're still in the real world, how is this possible?\n*if (style = \"spellsword\")\n\tI generate my sword. We're still in the real world, how is this possible?\n*if (style = \"spellbow\")\n\tI generate my bow. We're still in the real world, how is this possible?\n*comment\n\nLaura screams, \"Dad!\"\n\nI look ahead, and see father Albert with a blade shoved into his neck. Blood is spilling\nout onto the ground.\n\nHe falls, Angeline stands. She looks toward us.\n\n*page_break\n\nHer eyes are... hollow. They're completely black.\n\nThe haze is drifting toward her body. It's seeping into her skin. I can hear\nbones cracking underneath the surface of her flesh.\n\n\"He's dead... he's dead... he's-\"\n\nLaura lunges forward. \"I'll kill you!\"\n\nI'm worried about Laura not being armed until her spear-ish weapon appears in her hands.\n\nAngeline, unfortunately, doesn't even need that knife. She sends fire rolling forward. Laura leaps to the side, narrowly\navoiding being scorched, before continuing her dash.\n\nShe stabs Angeline directly in the chest, driving her blade deep inside. Black ichor oozes out of the wound.\n\nAngeline freezes, but only for a moment. She lunges forward and wraps her finger around\nLaura's throat.\n\nLaura winces as sparks build up around Angeline's fingers.\n\n*if (style = \"warrior\") or (style = \"spellsword\")\n\tI sprint forward, and slash blindly at Angeline's arm. I completely sever\n\tit in one blow.\n\t\n\tBlack ichor explodes out as Angeline howls. She stumbles backwards, away from Laura.\n\t\n\tLaura seems to be alright, but her neck is looking pretty red.\n\t\n\tPage_break\n\t\n\tShe's standing in front of us. What's left of her arm won't stop bleeding. I can\n\tsee the haze pouring out of the wound.\n\t\n\tShe marches toward us. Her hollow eyes radiate rage and hatred.\n\t\n\tLaura steps forward. She points her weapon forward. \"I'll never forgive you for this...\"\n\t\n\tAngeline's head twitches. \"Forgive...? Me...?\" She laughs.\n\t\n\tAnd laughs.\n\t\n\tAnd laughs.\n\t\n\tHer voice echoes into my bones. Her shrill cackling voice is awful. It's inhuman.\n\t\n\t\"You think... I should be sorry?\" She takes a step forward. Sparks light up\n\taround her body.\n\t\n*if (style = \"spellbow\")\n\tI take aim with my bow. I don't have much time, this shot has to count.\n\t\n\tLaura is really close to Angeline. I can't just her.\n\t\n\tI take a deep breath. You can do this.\n\t\n\tI let a single arrow loose.\n\t\n\tIt plunges into the side of Angeline's skull.\n\t\n\t*page_break\n\t\n\tShe stumbles backwards.\n\t\n\tLaura's neck looks pretty red, but I think she's okay.\n\t\n\tAngeline somehow hasn't fallen yet. Haze is drifting out of her punctured skull.\n\t\n\tShe marches toward us. Her hollow eyes radiate rage and hatred.\n\t\n\tLaura steps forward. She points her weapon forward. \"I'll never forgive you for this...\"\n\t\n\tAngeline's head twitches. \"Forgive...? Me...?\" She laughs.\n\t\n\tAnd laughs.\n\t\n\tAnd laughs.\n\t\n\tHer voice echoes into my bones. Her shrill cackling voice is awful. It's inhuman.\n\t\n\t\"You think... I should be sorry?\" She takes a step forward. Sparks light up\n\taround her body.\n\t\n*comment\n\nLaura spring forward. Angeline doesn't.\n\nLaura swings that spear weapon towards Angeline's throat. the sparks around her body explode into a massive column of fire just\nas Laura reaches her.\n\nI stand frozen as the flames slowly die down.\n\nAngeline lies on the ground. Her head is nearly severed. Disgusting ichor pours out, along with copious amounts\nof haze.\n\nLaura is...\n\nShe's charred.\n\n*page_break\n\nThe fighting slow
