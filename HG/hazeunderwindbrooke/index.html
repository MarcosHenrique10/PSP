wall?\n\t\n*if (fRavensWorld = false)\n\t\n\tAlright... I have no clue what Elrin is doing.\n\t\n*comment\n\n\"Sorry,\" he says. \"It can be a little strange the first time, but bear with me and try to get through.\"\n\n*if (fRavensWorld = true)\n\t\n\tI'll take that as a yes.\n\t\n*if (fRavensWorld = false)\n\t\n\t\"Get through what?\"\n\t\n*comment\n\nWe walk down the hall for a few moments...\n\n*page_break\n\nThe end of the hallway is still so far away.\n\nBut the hallway is so short... It shouldn't have take us more than a few seconds to reach the end.\n\nI rub my eyes. It feels like they can't focus on the far wall.\n\nElrin squeezes my shoulder. \"Just hang in there, and try not to look straight ahead. It can be hard the first time.\"\n\nI lower my gaze to the floor.\n\nStep-by-step, I keep moving forward.\n\nElrin lets go of me. \"There we are.\"\n\nI look up and see a door at the end of the hall. There's just a blank wall behind us.\n\n*if (fRavensWorld = true)\n\t\n\t\"Raven's wasn't nearly that bad,\" I mumble.\n\t\n\t\"I promise it will only be that bad the first time,\" he says. \"It gets easier once you\n\tdevelop some confidence with it.\"\n\t\n\tAs we're approaching the door, Elrin suddenly moves ahead and puts his hands on the knob. \"I've been here\n\tbefore. It's quite a sight. Are you ready?\"\n\t\n*if (fRavensWorld = false)\n\t\n\t\"What just happened?\"\n\t\n\tElrin looks between myself and the door. \"Right, about that... I understand this is your first time\n\twith something like this.\" He quickly walks ahead, and puts a hand on the knob. \"Just brace yourself.\"\n\t\n*comment\n\nI give him a curious look. \"For what?\"\n\nHe flings the door open. I flinch, expecting a sudden bright light to blind me.\n\nHowever, it's actually dark beyond the door, but it leads outside. I can see\ntufts of grass growing beyond it.\n\nI creep forward.\n\nIt's the dead of night. The sun was setting, but it couldn't have gotten this dark that quickly.\n\nThere's a massive mansion sitting atop a hill. Dozens of lit windows are visible from here. The building's five\nstories tall. It's the dead of night, but I can see easily enough thanks to a full moon hanging in the sky.\n\nThere's a stone walkway leading from the door and stretching around the grassy region. There's no sign of\nWindbrooke's tall skyscrapers and urban development. It looks like I'm in some sort of countryside. It's\nnot heavily forested though. Instead, there's sweeping grassland stretching on in all directions around\nthe manor.\n\nSomething about the night atmosphere sends a jolt up my spine. I feel strangely alert.\n\nI cautiously step away from the door.\n\n*page_break\n\n\"Elrin.\" A young woman approaches us as soon as we step outside.\n\nShe's very beautiful. Her black hair is swept back and quite short. Her lipstick is noticeably red,\nand black eyeliner makes her eyes pop. She's wearing a red dress that looks like it costs more than\nmost people make in a year.\n\nShe looks me over. \"You are Raven's relative?\"\n\n\"Yes, ma'am.\"\n\n\"Excellent. Come with me.\" She abruptly turns around and starts for the manor.\n\n\"I'll be waiting to pick you up when you're finished,\" Elrin says, making his way toward\nthe door we came from.\n\n\"Wait,\" I say. \"You're not staying?\"\n\nHe shakes his head, and with a smile says, \"I'm sorry. But, these sorts of meetings are meant for\nvampires. And vampires only.\"\n\nHe starts to head toward the door again, but I follow after him. \"But, I don't know these people.\"\n\nHe pauses, looking between the door and me. \"Well, then you better go say hello.\" He nods, maintaining that\ncheerful smile. \"And then you will.\"\n\nI watch in silence as he leaves.\n\nHe shuts the door behind him.\n\nI turn to see that woman watching me a ways away. Even in the darkness I can see a thoroughly unimpressed look\non her features.\n\nI awkwardly follow after her.\n\n*page_break\n\nIt's very quiet out here. There's a subtle wind blowing through, but aside from the rustling of leaves and grass\nI don't hear anything else.\n\nThe stone pathway leads us to a set of stairs. They stretch on quite a ways, but it looks like they lead to\nthe manor on the hill.\n\nWhen we reach the first steps, that woman finally speaks up. \"My name is Clara Remington. I'm fine with Clara\nor Madam Remington.\"\n\nI stare at her. There's something kind of intimidating about her.\n\nShe glances over at me.\n\n\"Oh.\" I cough. \"I'm $!{fiName}.\" I awkwardly add, \"$!{laName}!\"\n\nShe keeps looking at me, even as we start to ascend the steps.\n\n\"I, uh... you can call me whatever you want.\"\n\nShe keeps an eye on me for a moment longer, before breaking her gaze away and just focusing on the top of\nthe steps.\n\nThe silence doesn't last long before she speaks again. \"What made you decide to change?\"\n\n\"Huh?\"\n\nShe gives me a hard look. \"Why did you want to become a vampire?\"\n\nWhat? \"I... didn't...\"\n\nShe raises a brow. \"Didn't what?\" She sighs. \"Who changed you? A friend?\"\n\n\"I don't know who they were.\" Does it matter?\n\n\"You found some strangers to change you?\" She sighs. \"My gods... it wasn't that long ago the change was\ntreated like a sacred rite.\" She hesitates before speaking again. \"How did you convince them to change you?\"\n\n\"I didn't.\" I can tell she's about to say more, so I cut her off. \"I didn't want to change. I was attacked\nduring the rioting in Windbrooke. They changed me against my will.\"\n\nShe comes to a dead stop.\n\n\"Pardon me?\" She turns completely to face me.\n\nI briefly consider holding my words back. \"They bit me and left me for dead. I didn't actually want this.\"\nShe's giving my an ice-cold stare right now.\n\nAfter what feels like an agonizing eternity, she turns, and continues up the stairs.\n\nA silence hangs between us. As we climb I see Clara's face alternate between anger and contemplation.\n\nJust as we reach the top, she speaks up. \"It's been some time, yes? Since the bite, that is?\"\n\nI nod. \"Yes.\"\n\n\"You don't remember anything about them.\"\n\nShe said it like a statement of fact (which it was), but I answer regardless. \"No. I don't.\"\n\nShe takes a deep breath. \"My apologies. We'll do all we can to get you settled into your new situation.\"\n\n*page_break\n\nThe house is impressive up close. The stone walkway here has various street lamps installed alongside it.\nTheir aesthetics are old-fashioned. I can tell they're electrical, but the overall design makes them look like\nlanterns hanging off metal poles.\n\nThere's flowers growing along the outside of the house. They're quite colorful, with so many deep reds and blues. The\nflowers line the walkway all the way up to the front door.\n\nAs we approach the door, Clara speaks up again. \"From the information we were given, we aren't certain how long it will\nbe until you change. Have you noticed anything strange? About yourself that is.\"\n\nI mull on that.\n\n*choice\n\t#\"I'm not sure.\"\n\t\t\n\t\t\"Mm.\" Clara looks thoughtful. \"What of blood?\"\n\t\t\n\t\tI raise a brow. \"Blood?\"\n\t\t\n\t\t\"Have you been exposed to blood at all?\" she asks, stopping at the front door.\n\t\t\n\t\tWell, I've seen that black ichor from the monsters of the other world, but that didn't look very appetizing.\n\t\t\n\t\t*page_break\n\t\t\n\t\tHealthy. It didn't look very healthy.\n\t\t\n\t\t*page_break\n\t\t\n\t\tMy thoughts briefly drift to Mr. Barrow. He was savagely beaten, and was left bloody.\n\t\t\n\t\tThough, I wasn't really focused on his blood in that moment.\n\t\t\n\t\t\"No,\" I finally answer. \"I haven't.\"\n\t\t\n\t\t\"Hm.\" She reaches for the door knob. \"I suppose you'll have your chance now.\"\n\t\t\n\t\t*goto lbl_Changes\n\t#\"What sort of symptoms should I expect?\"\n\t\t\n\t\tClara wrinkles her nose. \"Your... [i]new state[/i] will have some early signs. You may find yourself developing\n\t\tmore nocturnal habits. A degree of enhanced strength and speed will come. Though, it won't be terribly noticeable\n\t\tat first. Even once you've fully turned.\"\n\t\t\n\t\tI glance away from her. I sense my wording my have offended her.\n\t\t\n\t\t\"Have you been exposed to blood at all?\" she asks, stopping at the front door.\n\t\t\n\t\tWell, I've seen that black ichor from the monsters of the other world, but that didn't look very appetizing.\n\t\t\n\t\t*page_break\n\t\t\n\t\tHealthy. It didn't look very healthy.\n\t\t\n\t\t*page_break\n\t\t\n\t\tMy thoughts briefly drift to Mr. Barrow. He was savagely beaten, and was left bloody.\n\t\t\n\t\tThough, I wasn't really focused on his blood in that moment.\n\t\t\n\t\t\"No,\" I finally answer. \"I haven't.\"\n\t\t\n\t\t\"Hm.\" She reaches for the door knob. \"I suppose you'll have your chance now.\"\n\t\t\n\t\t*goto lbl_Changes\n*comment\n\n*label lbl_Changes\n\n*page_break\n\nShe throws the door open.\n\nI was expecting some sort of regal entrance. A set of dual stairs spiraling along the wall, leading\nup to the second floor. A massive chandelier hanging from the ceiling, covered in dozens of shining\ncrystals.\n\nThe interior actually look like a diner.\n\nSmooth wooden flooring. A bar set up at the far end of the room. Various tables are scattered across\nthe large floor. There's already plenty of people here. The atmosphere is quiet but pleasant.\n\nPeople chat, but they keep their voices down.\n\nI was expecting something more luxurious. Priceless paintings hanging off the walls. Expensive vases\non display.\n\nThis room however, is quite warm, if not a bit bare. It's all dark brown furniture and pale gray walls.\n\nThere are a few other doors that are open. I see a couple of people go through them, so I suppose the rest\nof the house is open.\n\n\"Go mingle.\" Clara puts a hand on my shoulder, and gently nudges me forward. \"There's library further in the back, an indoor\npool, and a game-room. You can get something to eat and drink in here.\"\n\n\"Wait-\" I turn around.\n\n*choice\n\t#\"Eat and drink?\" I'm mostly concerned about that latter...\n\t\t\n\t\t\"Yes?\" she raises a brow. \"I assure you, our kind still has to eat.\"\n\t\t\n\t\t\"Right...\"\n\t\t\n\t\t\"Just relax,\" she says. \"I'm sure you will get along just fine.\"\n\t\t\n\t\t*goto lbl_WhatToDo\n\t#\"Is the entire house open?\"\n\t\t\n\t\t\"More or less,\" she says. \"Just take your time and look around. You'll be fine.\"\n\t\t\n\t\t*goto lbl_WhatToDo\n\t#\"What am I supposed to do?\"\n\t\t\n\t\t\"Whatever you want,\" she says plainly. \"This is just a social outing. Just relax.\"\n\t\t\n\t\t*goto lbl_WhatToDo\n*comment\n\n*label lbl_WhatToDo\n\nClara leaves me, and I'm standing awkwardly near the door. Most people are focused on their\nown conversations, but some are glancing my way.\n\nI need to get somewhere.\n\n*page_break\n\nI nervously find a table in the far corner of the room, far away from anyone else, and sit down.\nThere's nothing on my table, and I didn't order anything.\n\nI should have ordered something. It was weird to just stand by the door, and now it's weird to just at the table.\n\nBut it's too late to stand up now. There's still people glancing my way. If I get up after having just sat down\nI'll look like an idiot.\n\nI pull out my phone.\n\nThere's no reception in here. I was hoping to look busy on my phone. I stare down at my hands. I should\nprobably just get up.\n\nA plate of food is set down in front of me.\n\nI stare at it.\n\nThe plate contains rice with gravy poured over it. There are some carrots on the side. The food is quite hot, and I\ncan still see a steady stream of steam coming off the plate.\n\nI look up to see a girl taking a seat at the other side of the table. I don't understand her hair.\n\nThe side of her head is shaved, with just a thin layer of fuzz on her scalp. The rest of her hair however, is just\nlong enough to reach the bottom of her neck. It's an unnaturally vibrant shade of red, though the fuzz on the\nshaved part of her head is just brown.\n\nShe's wearing a black denim jacket. My eyes are drawn to the large silvery buttons keeping it closed around her. She's\nwearing a gray tie with it. Just before she sat down, I noticed her wearing a black-and-white plaid skirt.\n\nShe's got some nice boots too.\n\n*page_break\n\nShe digs a fork into her plate and brings up to her lips. The fork stops an inch from her mouth. She\nglances up at me.\n\nI sit there, frozen.\n\n\"Eat.\"\n\nI immediately grab my fork and dig it into my rice. \"Uh... thanks.\"\n\nShe nods, chewing a bite. \"No problem. I figured you hadn't done this before.\"\n\n\"I, uh... I haven't.\" I clear my throat. \"I'm actually not one of you. Yet.\"\n\n\"Mm.\" She doesn't quite look my way as she eats. She just kind of lazily looks at her food, or fork, or nothing. \"How long\ndo you have?\"\n\n\"I don't know,\" I say.\n\nShe doesn't show any reaction, until she suddenly stops eating. She suddenly reaches into her pocket.\n\"Try this then.\" She sends a tiny vial sliding toward me.\n\nI barely grab it before it falls off the table. There's something red inside it.\n\nShe nonchalantly digs a fork into her food. \"Try it.\"\n\nI hold the vial up, and wrap my finger around the tiny cap sealing it shut. This is blood isn't it?\n\nIt takes some fiddling, but I manage to get the cap off. I bring the vial up to my nose, and sniff it.\n\nSmells like blood.\n\n*label lbl_BeBrave\n\n*choice\n\t*hide_reuse #Give the vial back.\n\t\t\n\t\t\"I-\"\n\t\t\n\t\t\"Oh my god,\" she says. \"Don't be a bitch. Just taste it.\"\n\t\t\n\t\t*goto lbl_BeBrave\n\t#Take a tiny sip.\n\t\t\n\t\tI hesitantly bring the vial up to my lips. I nervously put a hand in front of the vial, trying\n\t\tto stop anyone else in the room from seeing what I'm doing.\n\t\t\n\t\tThe girl in front of me just smirks at me. An expression of bemusement fills her eyes.\n\t\t\n\t\tThe fluid just barely grazes my tongue.\n\t\t\n\t\t*page_break\n\t\t\n\t\tIt sure is coppery.\n\t\t\n\t\t*page_break\n\t\t\n\t\tI wince as I put the cap back on the vial, and return it to her. \"I don't think it's my thing.\"\n\t\t\n\t\t*goto lbl_TerribleTaste\n\t#Drink from it confidently!\n\t\t\n\t\tI hesitate for only a moment, before bringing the vial to my lips. I let about half the contents spill\n\t\tinto my mouth.\n\t\t\n\t\t*page_break\n\t\t\n\t\tBoy that sure is coppery and not at all pleasant.\n\t\t\n\t\t*page_break\n\t\t\n\t\tI wince as I somehow manage to swallow the blood. I hand the vial back over to the girl and use\n\t\tthe food in front of me to cleanse the taste from my mouth.\n\t\t\n\t\tShe grins. \"So?\"\n\t\t\n\t\tI shake my head. \"Not my thing.\"\n\t\t\n\t\t*goto lbl_TerribleTaste\n\t#HORK IT DOWN!\n\t\t*set ritaFriend + 1\n\t\t\n\t\tHesitation is for the weak. I immediately pour the entirety of the vial down my throat.\n\t\t\n\t\tI barely even have time to appreciate the taste or flavor.\n\t\t\n\t\t*page_break\n\t\t\n\t\tNot that I find it terribly appreciable. The coppery and sticky substance is not even slightly\n\t\tpleasant as it reaches my stomach.\n\t\t\n\t\t*page_break\n\t\t\n\t\tI wince and shake my head as I hand it back to her.\n\t\t\n\t\tShe tilts her head as a bemused smirk plays on her face. \"And?\"\n\t\t\n\t\t\"Not my thing.\"\n\t\t\n\t\t*goto lbl_TerribleTaste\n*comment\n\n*label lbl_TerribleTaste\n\nShe chuckles. \"Fair enough.\"\n\n*page_break\n\nWe sit in relative silence for a few moments. The food is really good. I'll have to thank whoever cooked it.\n\n\"So... what's your story?\" she asks.\n\n*choice\n\t#\"Well, there was some rioting in Windbrooke, and two vampires bit me.\"\n\t\t*set ritaFriend + 1\n\t\t*set f_010_UnwillingVampirism true\n\t\t\n\t\tShe suddenly stops eating. \"How do you mean?\"\n\t\t\n\t\t\"Oh. Uh.\" I shrug. \"They bit me.\"\n\t\t\n\t\t\"As in, they attacked you?\"\n\t\t\n\t\tI nod.\n\t\t\n\t\tShe suddenly puts her fork down, and looks around.\n\t\t\n\t\tNobody seems to have noticed our conversation.\n\t\t\n\t\tShe leans closer, and whispers to me. \"Are you not turning into one of us willingly?\"\n\t\t\n\t\tI shake my head.\n\t\t\n\t\tShe runs a hand through her hair, once again looking around nervously. \"Listen. Just... keep that to\n\t\tyourself.\"\n\t\t\n\t\tI ask, \"Why?\" Clara reacted badly too...\n\t\t\n\t\t\"It could just... cause some drama,\" she says. \"Revenge turning people is a really serious issue. Have\n\t\tyou told anyone else?\"\n\t\t\n\t\tI nod. \"That woman. Uh, Clara. Or Madam Remington. I guess.\"\n\t\t\n\t\tShe looks relieved. \"She'll be cool about it.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_Story\n\t#\"I guess my aunt knew somebody here, and wanted me to mingle before I turned.\"\n\t\t*set ritaFriend + 1\n\t\t*set f_010_MyAuntRaven true\n\t\t\n\t\t\"Who's your aunt?\" she says through a mouth full of food.\n\t\t\n\t\t\"Raven Lilia.\"\n\t\t\n\t\tShe stops chewing. Her eyes narrow at me, like they're searching for something. \"You serious?\"\n\t\t\n\t\tI hesitantly nod.\n\t\t\n\t\t\"From Yggdrasil? She owns a restaurant there? That Lilia?\"\n\t\t\n\t\t*if (fRavensWorld = true)\n\t\t\t*set f_010_RitaKnowsRaven true\n\t\t\t\n\t\t\t\"Yep, that's the one.\" They know her here too?\n\t\t\t\n\t\t\t\"Wow.\" She stares at me.\n\t\t\t\n\t\t*if (fRavensWorld = false)\n\t\t\t\n\t\t\tI stare blankly at her.\n\t\t\t\n\t\t\tShe eventually cracks a grin. \"I'm probably thinking of somebody else right now, aren't I?\"\n\t\t\t\n\t\t\tI slowly nod. She returns to her food.\n\t\t\t\n\t\t*comment\n\t\t\n\t\t*page_break\n\t\t\n\t\t*if (f_010_RitaKnowsRaven = true)\n\t\t\t\n\t\t\t\"That's really cool.\" She grabs a tiny booklet from her pocket, and writes something down in it. Then,\n\t\t\tshe rips the page out, and hands it to me. \"Call me sometime.\"\n\t\t\t\n\t\t\tI take the page from her. \"Uh...\" There's a number written across it. \"Sure thing.\"\n\t\t\t\n\t\t*if (f_010_RitaKnowsRaven = false)\n\t\t\t\n\t\t\t\"You seem cool,\" she says, grabbing a tiny notebook from her pocket. She quickly scrawls something on one of its\n\t\t\tpages, and rips the page out before handing it to me. \"Call me sometime, yeah?\"\n\t\t\t\n\t\t\tI take the page. \"Uh.\" There's a number written across it. \"Yeah.\"\n\t\t\t\n\t\t*comment\n\t\t\n\t\t*goto lbl_Story\n\t#\"Well, it's a really, really long story, but it all began right after the rioting in Windbrooke, you see there was this haze and otherworld filled with monsters...\"\n\t\t*set f_010_RitaAndHaze true\n\t\t\n\t\tI tell her my tale. About the haze, the otherworld, my new friendship with Joan.\n\t\t\n\t\tI even tell her about the strange group we saw, and Mr. Barrow's murder.\n\t\t\n\t\tWhen the conversation is finished she's staring at me.\n\t\t\n\t\tI finish off the last of the food on my plate. \"So... how long have you been coming here?\"\n\t\t\n\t\tShe reaches into her pocket, pulls out a tiny booklet, and slams it down on the table. She rapidly\n\t\twrites something down, before ripping out the page and handing it to me.\n\t\t\n\t\tI hesitantly take it. There's a phone number written on the little page.\n\t\t\n\t\t\"Call me as soon as possible so I'll know your number,\" she says. \"Name's Rita by the way.\" She gets up. \"I have to\n\t\tgo, but we need to talk later.\"\n\t\t\n\t\tBefore I can say anything, she leaves.\n\t\t\n\t\t*goto lbl_Story\n*comment\n\n*label lbl_Story\n\n*page_break\n\nShe just leaves her plate. And I'm a little uncertain what to do with mine until someone approaches my table\nand offers to take them to the kitchen. They aren't wearing a uniform, but I suppose they work here.\n\nMaybe they're volunteers?\n\n*page_break\n\nI've eaten, and I guess I've made a new friend.\n\nI have no idea how long I'm supposed to be here. Nobody gave me an ETA on when this would\nwrap up.\n\nThere's the rest of the house to explore, but I think I'd rather take a stroll outside. It's dark,\nbut I like the surrounding greenery.\n\n*page_break\n\nThe stone walkway winds around the manor. Those same electric lights keep the path lit up. I\ntake my time having a nice little stroll along it.\n\nThere's a high wall surrounding a large space behind the manor. I have no idea what's inside\nthose walls, but I can hear a lot of noise. There are also lights flickering within.\n\nAs I walk closer, I can make out some voices. I have no clue what they're saying. Or rather, shouting.\n\nMy curiosity piqued, I approach a set of heavy metal doors built into one side of the walls.\n\nUnfortunately, they are locked tight.\n\nI hear more yelling. There's a lot of other noises, but I have no clue what they are.\n\nI back away and stare up at the tall wall in front of me. What is this place?\n\n*page_break\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "010_sub_werewolfnight": "\n\n\n\n\n\n\nWe end up driving for quite a while...\n\nAfter a while the tall buildings of the city are left far behind us. We're officially in the countryside.\n\nAdam Rourke lives around these parts. However, I can tell from the way we're going that we're not headed\nanywhere near him.\n\n*page_break\n\nElrin eventually parks the car on the side of the road. I don't see any buildings on this stretch of road.\nThere are just trees all around us.\n\n\"This looks like the place,\" Elrin says, stepping out of the car.\n\nAs I follow his lead, he sets off toward the tree line.\n\nMy eyes are immediately drawn to several blue ribbons hanging from one of the tree's limbs.\n\n\"Do you have your necklace?\" Elrin asks, stopping several feet from the woods.\n\nI hold up the little crescent moon.\n\n\"Perfect,\" he says. \"Just walk under the branches of any trees with blue ribbons on them. A\nlot of people pass through here, so there should be a natural dirt path for you to follow.\"\n\nI look closer and sure enough, there is a dirt trail amongst the tall grass.\n\n\"Wait.\" His words sink in. \"Are you... not coming?\"\n\nElrin shakes his head. \"It wouldn't be appropriate for me to be there. But!\" he smiles. \"I promise\nI'll be there in spirit! Right behind you!\"\n\n\"But...\" I look between him and the path. \"I've never done anything like this before. What am I supposed\nto do when I arrive?\"\n\n\"Oh. $!{fiName}.\" He pats my shoulder a couple of times. \"Just be yourself. And have fun. This is just\na simple get-together. There's no need to be anxious.\"\n\n\"But I [i]am[/i] anxious.\"\n\n\"You'll be fine. Now go along, and I'll pick you up later. Okay?\"\n\n*page_break\n\nThat's all he had to say to me before sending me off into the woods.\n\nThe sun will be setting soon, and these woods already seem kind of creepy.\n\nMultiple trees have those blue ribbons hanging off of them. Though, I don't really need\nthem as a guide given there's only one dirt trail to follow.\n\nThe sun sets as I walk. shadows creep in at all sides.\n\nThe hidden trail ends between two wooden poles. They're thin, and covered in the same blue ribbons\nI've been seeing throughout the woods.\n\nThere's a large grassy hill dead ahead of me. I break away from the tree line and move toward it.\nI look around me and see that, surprisingly, I'm not standing in a clearing.\n\nThe forest is behind me, but it's nothing but wide open space ahead. I can't see any buildings in\nthe distance. We're outside Windbrooke, but we're not [i]that[/i] far.\n\nI climb the hill, and take a look around.\n\n*page_break\n\nRed skies in all directions. No buildings on the horizon.\n\nI do however spot a gravel road on the other side of the hill.\n\n*if (fRavensWorld = true)\n\t\n\tIs this like Yggdrasil? Is this a pocket world?\n\t\n\tIt would explain why I can't see the city.\n\t\n*if (fRavensWorld = false)\n\t\n\t\"What is going on here...?\"\n\t\n*comment\n\n*page_break\n\nI wander down to the road, taking a look at my surroundings as I do.\n\nAren't I expected in some capacity? I kinda thought I would be meeting someone here.\n\nBut, no one's showing up.\n\nNot when I set down the hill. And not when I set foot on the gravel walkway.\n\nThe roads stretches off in two different directions. One heads far to the left, eventually reentering the\nwoods. The other goes right, further into the grassland.\n\nI don't know where to go, but... werewolves dwell in forests right? That's how this works?\n\n*fake_choice\n\t#Right.\n\t\t\n\t#Yep.\n\t\t\n\t#Sounds legit.\n\t\t\n*comment\n\nOf course I follow the path toward the woods.\n\n*page_break\n\nDarkness creeps in as the sunlight finally fades. The moon's\nnot out, so it's getting [i]very[/i] hard to see.\n\nSome lights flicker into existence beyond the foliage.\n\nI follow the trail dutifully, and find myself at some sort of walled compound.\n\nLog cabins are built inside. Well over a dozen of them.\n\nI smile at the sight of them. I've never actually seen a log cabin before, but they look very... rustic.\n\nThere's no one outside, but all the cabins have lights on. I assume everybody is indoors right now.\nI look ahead to one cabin that seems more important than the others.\n\nIt's in the center of the compound, it's slightly larger than all the others, and has a board installed\nin front of it that's filled with various event notices.\n\nI approach it in hopes of finding someone who can explain what this place is to me. It's also the\nonly cabin with an open door, so it's the only one I feel like I'm allowed to enter.\n\n*page_break\n\nThere's a few steps at the door. I gingerly creep up them as I overhear a heated conversation happening inside it.\n\n\"That's not the point.\" It's a woman speaking. \"It's too early. We need to wait.\"\n\n\"They aren't interested in waiting.\" A responds. His voice is deep and rugged. \"I don't even know\nwhen they'll attack. We've got the manpower. We've got the weapons. Let's just-\" He suddenly stops.\n\n*page_break\n\nSilence.\n\nI cautiously move towards the door.\n\nJust as I step directly in front of it, a woman appears in the doorway.\n\nMy eyes widen at the sight of her.\n\nShe has a burn on one of her eyes. But the eye itself looks fine.\n\nShe's the woman who killed Mr. Barrow.\n\nI freeze.\n\n*page_break\n\n\"Ah, you must be $!{fiName}!\" her tone is entirely pleasant, as she looks past me, searching for something. \"Er, where is...\"\n\nI look behind me too, but there's no one around.\n\n\"If somebody was supposed to meet me,\" I force a smile. \"I must have missed them.\"\n\nI need to get out of here.\n\n\"Well, come on in,\" she says, grabbing my arm and forcing me inside.\n\nWell, I shouldn't say 'forcing'. She's entirely gentle and friendly. As is her overall demeanor.\n\nWhen I step inside, I see the man she was talking to.\n\nHis voice made him sound older than he looks. His head is shaved bald, and he has dark skin.\nHe's in incredible shape. I can make out the exact shape of his muscles under his thin white shirt.\n\nHe gives me a slight wave. \"Hey.\"\n\nI nervously wave back.\n\n\"Lucas?\" She finally lets go of my arm. \"Where is Robert? He was supposed to meet\n*if (sex = \"ma\")\n\thim.\"\n*if (sex = \"fe\")\n\ther.\"\n*comment\n\nThe guy, Lucas, looks confused for a moment, until he looks like he realized something. \"I sent him to the edge with\na few others.\"\n\n\"And...?\" She tilts her head. \"You didn't send anyone else to meet our guest.\"\n\nLucas smiles sheepishly. \"Sorry?\"\n\n\"Sorry you had to walk out here on your own.\" She sighs. \"At least you found your way. My name's Angeline. Nice to meet you.\"\n\nI slowly nod. \"...Likewise?\"\n\n*page_break\n\nThe interior of the cabin looks like some sort of office. There's a large desk set up against the wall, though there's no one sitting\nbehind it.\n\nA large painting of a lake hangs on the wall above it. The atmosphere of the room is warm and comforting.\n\nThere's a couple of other doors that lead further into the building. I can see various offices lining the halls\nin the back, but all of them are empty right now.\n\n\"Please, take a seat.\" Angeline motions to a couple of chairs pulled up to the front desk.\n\n\"I'll take that as my signal to get out,\" Lucas says, making a beat for the door.\n\n*if (sex = \"ma\")\n\t\n\tHe doesn't so much as look back as he leaves. Something I'm quite relieved by.\n\t\n\tThis is alright. I'll get through this.\n\t\n*if (sex = \"fe\")\n\t\n\tHe shoots me a smile and waves before stepping out the door.\n\t\n\tThat's one gone. Now I'm just left alone with a woman who set a man on fire.\n\t\n*comment\n\nWhen I look back over to the chairs, I'm surprised to see Angeline hasn't taken a seat behind the\ndesk.\n\nInstead she took the other seat available in front of it.\n\nI shoot a confused glance at the chair set up behind the desk. Am I supposed to take that one?\n\nAfter my moment of hesitation, she laughs. \"It's alright. I just find this more personal.\" She\ncoughs awkwardly. \"Also... that's not my desk. I feel weird sitting at other people's desks.\"\n\nFair enough. \"Right. Thanks.\" I take the seat next to her, rotating the chair around to face her.\n\nShe's just giving me a pleasant smile right now.\n\nWhat am I supposed to do?\n\n\"So... are you're a werewolf?\"\n\n\"Oh, no!\" she laughs. \"I'm human as they come. I do have a... touch of magic in me though.\"\n\nYou don't say. \"Oh. I see...\" Just keep the conversation moving. \"So you work out here with werewolves?\"\n\nShe nods. \"My organization does a lot of volunteer work with groups like this. I like to personally help\nout when I can as well. Especially with...\" She vaguely gestures toward my arm. \"People in your situation.\"\n\n\"So,\" she leans back, and crosses her legs. She's just giving me a warm smile. \"You were bit? And the bite had active regent\nin it?\"\n\nThis is the first I'm hearing the word 'regent', but that sounds right. I nod.\n\n\"We were informed of your condition beforehand,\" she says. \"These aren't the sort of circumstances we\nlike people converting under, but regardless of what happened to you, I want you to know you are welcome here.\"\n\nYou know. If she hadn't set a guy on fire right in front of me... that would have really been nice to hear.\n\nBut she did set a guy on fire. So it's not comforting. At all.\n\nI force a smile. \"Random question here... can you use magic?\"\n\nShe raises a brow. \"That [i]is[/i] a random question.\" She smiles. \"But, as a matter of fact, I can.\"\n\nI nod. \"Really? That's interesting. How do you learn to do that?\"\n\n\"Well...\" she begins. \"They are many different types of magic in the world. And many different\nways to learn.\" She looks me over. \"I take it you haven't been exposed to the supernatural very\noften?\"\n\nI shake my head.\n\n\"Ah, well... you've already got a lot on your plate as it is. Why don't we get you settled in first,\nand if you're still interested in learning... there are people I can arrange for you to talk to?\"\n\n\"Sure, sure...\" I nod a little too quickly.\n\n\"I understand you may not fully understand what this place is,\" Angeline says. \"But... it's not uncommon for people to get\nisolated from their kin. You may find it much harder to get by on your own. So, you can come here to meet other werewolves.\nThe people here can help you while you go through your changes.\"\n\n\"Right...\" I look at my arm. \"When can I expect that to happen?\"\n\n\"Well, the changes are gradual... your lifestyle will change... your friends may change...\" she says. \"Though I\nimagine you're talking about the big change.\" She frowns, her face and tone openly apologetic. \"I'm sorry. We just\ncan't know that. It's different for everybody.\"\n\nI mull that over. \"But... I imagine there's a time frame?\"\n\nShe nods. \"Based on when the bite happen, it could still be a couple of months at the most.\" She pauses. \"Or tomorrow.\"\n\nMy eyes widen. \"Tomorrow?\"\n\nShe shrugs. \"I've heard of people fully transforming the same day they were imbued. Rare as that is.\"\n\n*page_break\n\nI hear someone at the doorway. \"It's so hard to get up these steps in this thing.\" A small girl maybe.\n\n\"I can help you with that.\" Sounds like Lucas?\n\nI turn around to see Lucas carrying a young girl in wheelchair through the door. He sets the wheel chair down as\nsoon as he steps in.\n\nThe girl is very young, about twelve or so, but even then... he wasn't straining to carry her at all.\n\n\"Thanks, Lucas.\" She rolls herself forward. My eyes linger on her.\n\nShe has long green hair. Her right arm is missing.\n\nMr. Barrow supposedly attacked somebody... this girl, she looks like the one from the photo.\n\nI study her face.\n\nI can faintly see some scarring on her face, though it's not nearly as bad as I would have expected given how\nbadly injured she was.\n\nHell, I wouldn't expect her to have even healed yet.\n\nI'm not sure why she's wheelchair bound. She's only missing an arm, though it's possible she suffered some other injuries that\nweren't apparent in the photo.\n\nShe suddenly stops moving and just looks back at me. \"Hi?\"\n\nI keep staring. \"Oh!\" I put my hands up.\n\nShe just chuckles. \"Dude. It's alright.\" She rolls past both Angeline and I, and glances further into the back. \"Is that the newbie?\"\n\n\"Yes.\" I can sense a hint of amused frustration in Angeline's voice. \"And we're still talking here.\"\n\n\"Yeah, yeah...\" the kid says.\n\n\"I told ya,\" Lucas says from the door. \"You were too nice to the kid.\" He looks amused. \"If they sense weakness, they'll walk\nall over you.\"\n\n\"Oh, hush you two,\" Angeline says, before turning her focus back to me. \"This is River. I'm her... caretaker, for the time being.\"\n\nI notice River rub at what's left of her missing arm. She's wincing slightly.\n\nI can't imagine what that must have been like.\n\nShe peeks up at me. \"Sorry. I've been getting pains since... what happened.\"\n\nI'll admit. I don't feel [i]that[/i] bad for Barrow. \"I'm sorry you went through that.\"\n\n\"Oh,\" she stares at me. \"You already know? Sorry!\" she laughs. \"I... thought they said you were some totally disconnected newbie.\"\n\n\"Huh?\" That might be a problem.\n\nRiver stares at me. \"...Do you know?\"\n\nI stare at her. I can [i]feel[/i] my face paling. \"...Noooo?\"\n\nThere's a very long silence. Everybody is staring at me.\n\n*page_break\n\n*label lbl_OhNo\n\nOh no.\n\n*choice\n\t*hide_reuse #Time to bail right the hell on out of here.\n\t\t\n\t\tI look to the doorway.\n\t\t\n\t\tSuper muscular Lucas is still blocking in the damn doorway.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_OhNo\n\t#I'm sure I can talk my way out of this.\n\t\t\n\t\t\"Er, right...\" I slowly look over to Angeline.\n\t\t\n\t\t*goto lbl_NoExplanation\n*comment\n\n*label lbl_NoExplanation\n\n*page_break\n\nWell. I've got nothing.\n\n*page_break\n\n\"River, honey...\" Angeline begins after the longest silence. \"Could you excuse the two of us?\"\n\n\"What... I thought you were going to show me the lake at night?\" she pouts.\n\n\"C'mon, River,\" Lucas says, grabbing her wheelchair, and pushing her to the door. \"They have some business to go over.\"\n\nI silently watch as they leave.\n\nThey shut the door behind them.\n\nAngeline leans back a bit. Crosses her legs. Her eyes glance over me.\n\n\"So,\" she says.\n\n*page_break\n\nI don't say anything. Maybe I could have played off what I said earlier, but I'm sure she's seen through me already.\n\nAngeline walks around behind the desk, and grabs at something behind it. It sounds like she's rustling through a bag\nset behind it. She pulls... some sort of wooden... 'thing' out. It kind of looks like some sort of tiny case. She\nopens it up, and I hear a 'clicking' as she rotates a dial set into it.\n\nWhen she's done, she just sets it down on the desk and takes her original seat. \"What exactly do you know about River?\"\nThere's a subtle shift in the air. I'm not sure what it is, but it's making my skin feel strange.\n\n*temp tmp_Mood 0\n*temp tmp_CantLie false\n\n*choice\n\t#\"Not much.\"\n\t\t*set tmp_Mood - 1\n\t\t\n\t\tHer eyes narrow at me. \"That's not really an answer.\"\n\t\t\n\t\tI keep silent.\n\t\t\n\t\t\"She was injured very badly not too long ago,\" she says. \"What do you know about that?\"\n\t\t\n\t\t*goto lbl_RoundTwo\n\t#\"She was severely injured during the rioting a while back.\"\n\t\t\n\t\tShe's just... looking at me. I can't get a feel for what she's thinking.\n\t\t\n\t\t\"How do you know about that?\"\n\t\t\n\t\t*goto lbl_RoundTwo\n\t#\"Some guy, Mr. Barrow, tried to murder her during the rioting a while back.\"\n\t\t*set tmp_Mood + 1\n\t\t\n\t\t\"Interesting...\" She's smiling, but it doesn't look friendly. \"And how do you know this?\"\n\t\t\n\t\t*goto lbl_RoundTwo\n*comment\n\n*label lbl_RoundTwo\n\n*choice\n\t#\"I saw you kill Mr. Barrow.\"\n\t\t\n\t\tShe looks intrigued. \"You did?\"\n\t\t\n\t\t\"You used magic to set him on fire,\" I respond.\n\t\t\n\t\tAngeline looks curious, though not really in a friendly way.\n\t\t\n\t\t*goto lbl_RoundThree\n\t#\"I saw you and a lot of other people. You set him on fire in a warehouse after showing him a picture of River.\"\n\t\t*set tmp_Mood + 1\n\t\t\n\t\t\"You were all wearing the same colored clothing,\" I continue. \"You asked him if he regretted what he\n\t\tdid, and he said yes. Then you killed him.\"\n\t\t\n\t\tShe doesn't say anything for a while after that. She just looks me over.\n\t\t\n\t\t*goto lbl_RoundThree\n\t*hide_reuse #\"I saw him try to kill her during the riots.\"\n\t\t*set tmp_Mood - 1\n\t\t*set tmp_CantLie true\n\t\t\n\t\tThe words die in my throat. I can't seem to speak them.\n\t\t\n\t\t\"Trying to lie?\" she shakes her head. \"That won't work.\" She smirks. \"Just be honest.\"\n\t\t\n\t\t*goto lbl_RoundTwo\n*comment\n\n*label lbl_RoundThree\n\nShe leans in closer, she studying my face very closely. \"Were you... there?\" It's like she's trying to recognize me. And failing.\n\nIs there really any point in lying?\n\nBut I don't know if she would believe the truth.\n*if (tmp_CantLie = true)\n\tOr maybe she would, I couldn't lie before...\n*comment\n\n*label lbl_TryAgain\n\n*choice\n\t*hide_reuse #\"Yeah, I was spying on your group.\"\n\t\t*set tmp_Mood - 1\n\t\t\n\t\tThe words die in my throat.\n\t\t*if (tmp_CantLie = true)\n\t\t\tAgain.\n\t\t*comment\n\t\t\n\t\tShe just smirks. \"Try again, darling.\"\n\t\t\n\t\t*goto lbl_TryAgain\n\t#\"No... I was in that otherworld. The one the haze is coming from.\"\n\t\t\n\t\tAngeline raises a brow. \"Otherworld...?\"\n\t\t\n\t\t\"I don't know how to describe it,\" I say. \"There's some sort of haze choking Windbrooke. It's making people\n\t\tmore hostile toward each other. I saw... visions... or something, of you and your people there.\"\n\t\t\n\t\tThe door suddenly slams open. Lucas comes barging in. \"I TOLD YOU!\"\n\t\t\n\t\t*goto lbl_LucasEmerges\n*comment\n\n*label lbl_LucasEmerges\n\nI see River sitting as close to the doorway as she can manage. Did they even leave?\n\n\"Lucas... please,\" Angeline says in an exasperated tone. \"I'm trying to interrogate-\"\n\n\"There is more going on here!\" he shouts. \"There's some sort of fog over Windbrooke! I'm telling you right now, it's responsible for\nthe rioting!\" He points out the door. \"It's concentrated at certain placed in town and-\"\n\n\"Enough!\" Angeline's voice, for the first time, is astonishingly hostile. It actually makes all of us flinch. She calms down a moment later.\n\"We can discuss that later.\"\n\n\"Can you...\" I stare at Lucas. \"Can you sense the haze too?\"\n\nHe hesitates, giving a cautious look at Angeline, before nodding.\n\nAngeline looks between the two of us for several moments, before sighing. \"Lucas... just...\n*if (sex = \"ma\")\n\t\"just take him. We're heading back to our headquarters.\"\n*if (sex = \"fe\")\n\t\"just take her. We're heading back to our headquarters.\"\n*comment\n\n\"Of course.\" Lucas walks over, and grabs my shoulder. \"Just come with us. We can help you.\"\n\nAngeline gets up and silently strides toward the door.\n\nI get the distinct sense she's not interested in helping me do anything.\n\n*page_break\n\nThis might end very badly for me.\n\n*page_break\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_octoberfirstweek": "\n\n*comment 011_sub_OpeningText (\u003c--- what were these here for??)\n*comment lbl_ActionChoices\n\n\n\n*comment///\n*comment///// October 17th, Monday\n*gosub_scene 011_sub_OpeningText\n\n*gosub_scene 011_sub_AfterAction17th\n*comment/////\n*comment///\n\n\n*comment///\n*comment///// October 18th, Tuesday\n*gosub_scene 011_sub_Hospital\n\n*gosub_scene 011_sub_AfterHospital\n*comment/////\n*comment///\n\n\n*comment///\n*comment///// October 19th, Wednesday\n*gosub_scene 011_sub_PoliceStation\n\n*gosub_scene 011_sub_AfterPolice\n*comment/////\n*comment///\n\n\n*comment///\n*comment///// October 20th, Thursday\n*gosub_scene 011_sub_FreeDay\n*comment/////\n*comment///\n\n*if (GoodEnd = false)\n\tGoto lbl_BadEnd\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*comment BAD END ROUTE HERE\n*label lbl_BadEnd\n\n*comment///\n*comment///// October 21st, Friday BAD END\n*gosub_scene BadEnd_Contact\n*comment/////\n*comment///\n\n\n\n\n\n*page_break\n\n\n\n\n\n\n\n*label lbl_EndOfDay\n\n[i]It is October ${m_Day}[/i]\n\n[i]The deadline is October 31[/i]\n\n[i]Act carefully. Take your time. The haze must be cleared.[/i]\n\n*page_break Next Morning\n\n*comment lbl_Morning\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_afteraction17th": "\n\n\n\n\n\n\n\n\n\n\n\n*if (location = \"Scourge\")\n\t\n\tJust as school is letting out, I receive a message from Angeline asking me to meet her to talk with Raven.\n\t\n\tI've also got quite a few calls from Raven I somehow missed...\n\t\n\tOddly, I'm instructed to go straight to The Scourge's HQ to do this. They must be planning\n\tto have me trek through that tunnel again to get back to the werewolf world.\n\t\n\tI don't know why. I could just go straight there.\n\t\n\t*page_break\n\t\n\tRaven is standing in front of their repurposed warehouse. Quite a few\n\tpeople seem to be staring at her...\n\t\n\tThe second she sees me she storms over to me. \"Come on. We're leaving.\"\n\t\n\t\"Uh-\"\n\t\n\t\"It's fine, $!{fiName},\" Raven says. \"I know it wasn't your fault, but you're not staying\n\there.\n\t*if (f_008_NightPlans = true)\n\t\tElrin has a place you can stay at for now.\"\n\t\t\n\t\t*goto lbl_ElrinCheck\n\t*else\n\t\tI have an... assistant. Of sorts. His name is Elrin, and you'll be staying with him for now.\"\n\t\t\n\t\t*goto lbl_ElrinCheck\n\t*comment\n\t\n\t*label lbl_ElrinCheck\n\t\n\t\"Elrin?\" I'm staying with someone else? \"Wait... I'm not heading back to the store?\"\n\t\n\tRaven stops abruptly. \"...The store is gone.\"\n\t\n\t\"What? What happened to it?\"\n\t\n\tRaven looks around. \"This isn't-\"\n\t\n\t\"Our enemies burned it to the ground.\" Angeline approaches from their HQ. \"Our [i]mutual[/i] enemies.\" She gives\n\tRaven a pointed look.\n\t\n\tThere's a moment where Raven and Angeline just stare each other down.\n\t\n\tThere's something about the way they're handling each other. A certain... familiarity.\n\t\n\t\"Do you two know each other?\" I ask. Cautiously. Very cautiously.\n\t\n\t\"It was a long time ago,\" Raven answers, not looking away from Angeline. \"Whatever she told you, don't\n\tlisten to her. You're not going to fight with them. You're not a terrorist.\"\n\t\n\t\"Uh... they didn't ask me to.\"\n\t\n\tRaven almost flinches from my words. \"What...?\"\n\t\n\tAngeline just shoots Raven a smug smirk. \"Like I was [i]trying[/i] to tell you earlier. We have no interest\n\tin having your relative here fight our battle for us.\"\n\t\n\t*if (f_008_NightPlans = true)\n\t\t\n\t\t\"Then why did you disappear last night?\" she asks me. \"I've been talking with Angeline here\n\t\tfor a while. It sure SOUNDS like she pulled out of your social meet up to recruit you.\"\n\t\t\n\t\tWell... they kind of did recruit me.\n\t\t\n\t*if (f_008_NightPlans = false)\n\t\t\n\t\tRaven hesitates. \"So she [i]only[/i] rescued you last night. Why didn't you call me after?\n\t\tAnd I've been talking with Angeline for a while now. It sure SOUNDS like she wants you to stick\n\t\taround.\"\n\t\t\n\t\tI suppose they kind of did recruit me.\n\t\t\n\t*comment\n\t\n\tI look between Raven and Angeline. This group, The Scourge, they're probably dangerous. And getting\n\tmixed up with them might be a bad idea, but I need this contact with them.\n\t\n\tI can't have Raven accidentally sabotaging my efforts to clear the haze.\n\t\n\t\"There's a girl here,\" I say. \"She's really young. Her name's River. Her family died during the riots a while back.\n\tShe nearly died.\"\n\t\n\tAngeline quirks a brow at me, but says nothing.\n\t\n\t\"I saw her,\" I say. \"During the riots. I saw a man beat her to death. At least. I thought that's what happened, but\n\tshe lived. She pulled through after Angeline's people rescued her.\"\n\t\n\tRaven crosses her arms. She's studying me closely. \"That's... good. But, what about it?\"\n\t\n\tI hesitate. \"I got to talking with her while I was here. I... sorta... promised I'd stick with her while\n\tshe goes through her treatments.\"\n\t\n\tRaven sighs. \"Well, you really shouldn't have. There's no way you-\"\n\t\n\t*if (sex = \"ma\")\n\t\t\"BIG BROTHER!\"\n\t*if (sex = \"fe\")\n\t\t\"BIG SIS!\"\n\t*comment\n\t\n\tI flinch as River rolls in from seemingly out of nowhere. She must have been close enough to overhear most of this.\n\t\n\tShe shoves her arms down hard enough to launch herself out of her wheelchair, before wrapping her arms around my waist.\n\t\"Where have you been!? I was so scared they were gonna give me the shots and you weren't going to be there!\"\n\t\n\tShe's ACTUALLY crying right now. This child has some acting chops.\n\t\n\t\"Uh... sorry?\" Sadly, I do not.\n\t\n\tRiver looks at Raven. \"Oh my GOSH! Are you\n\t*if (sex = \"ma\")\n\t\this\n\t*if (sex = \"fe\")\n\t\ther\n\t*comment\n\taunt? The really cool one?\"\n\t\n\tRaven just kind of stares at her for a really long time. \"Yes.\"\n\t\n\t\"Are you going to stay with me while I get my shots too?\"\n\t\n\t\"Wha- no.\" Raven runs her fingers through her hair. \"You still can't stay-\"\n\t\n\t\"Raven.\" Angeline steps up to Raven. \"Could I talk to you alone for a moment?\"\n\t\n\t\"I-\" Raven stares at Angeline. \"...fine.\"\n\t\n\tThey go have a chat very far away from us. River settles back down into her chair.\n\t\n\t*page_break\n\t\n\tShe still has tears on her face.\n\t\n\t\"Are you okay?\" I ask.\n\t\n\t\"Duh,\" she says.\n\t\n\t*page_break\n\t\n\tRaven and Angeline eventually return. Though, not until after several minutes have passed.\n\t\n\tNeither Raven nor Angeline look very happy.\n\t\n\t\"I'm going to need you to check in with me,\" Raven says. \"Constantly. When you leave for school. When you\n\tcome back. When you arrive here. I need to know what's happening with you while you're with these people.\"\n\t\n\t\"I understand,\" I say.\n\t\n\t\"Good.\" Raven shoots one last looks at Angeline. \"I have to get back to my work.\"\n\t\n\tShe suddenly walks up to me and hugs me. \"Please stay safe.\"\n\t\n\tI hug her back.\n\t*if (f_008_NightPlans = true)\n\t\t\"Raven... there's something else. When I was with those other people... I saw them. I saw my parents.\"\n\t\t\n\t\tRaven doesn't say anything for a little while, she just holds on to me. As she lets go, she speaks. \"I'm\n\t\tsorry. You shouldn't have had to see what sort of people they became.\"\n\t\t\n\t\t\"Did you know about them?\" I ask.\n\t\t\n\t\tRaven nods. \"I'm sorry. I didn't want you to know.\"\n\t\t\n\t\t*if (fSecretTransformation = true)\n\t\t\t\n\t\t\tRaven looks me over. \"You're not human, huh? Why didn't you tell me?\"\n\t\t\t\n\t\t\tI shrug. \"I didn't know anything was even happening after I got bit.\"\n\t\t\t\n\t\t\tRaven sighs. \"I really don't want to leave you like this...\"\n\t\t\t\n\t\t\tI smile. \"I'll be alright. I can handle this.\"\n\t\t\t\n\t\t*comment\n\t*comment\n\t\n\t*page_break\n\t\n\tThe day hasn't gotten too late yet, but I go to bed anyway. There's just so much going on right now.\n\t\n\tI'm with, I guess, a criminal organization of some sort. They're going on a rampage on the thirty-first?\n\t\n\tI have so little time to deal with all of this...\n\t\n\t*page_break\n\t\n\tThis is going to be a difficult couple of weeks.\n\t\n\t*page_break\n\t\n*if (location = \"Union\")\n\t\n\tRaven has been blowing up my phone all day with calls. There's a million voice mails I haven't\n\teven considered listening to.\n\t\n\tToby makes an unexpected appearance just as school is letting out for the day. He drags me off with him\n\tfor some 'team-bonding' time.\n\t\n\t*page_break\n\t\n\tA couple of hours pass, and I find myself idling around outside an ice cream shop. Toby is still inside.\n\tThe sun will set soon, so we should probably head back to the compound.\n\t\n\t\"$!{fiName}? There you are!\" Joan runs up to me from out of nowhere. \"How come you haven't been getting back\n\tto me?\"\n\t\n\t\"Huh?\"\n\t\n\tJoan holds up her phone. \"I sent you a few messages?\"\n\t\n\t\"Oh...\" Maybe I should have been paying a little more attention to my phone. \"Sorry. Some... stuff happened.\"\n\t\n\tJoan nods. \"I heard. I'm so sorry. Do you have anywhere to stay right now?\"\n\t\n\tI stare at her. \"Uh... Yeah.\"\n\t\n\t\"Oh, good!\" Joan smiles. \"Man, that must have been scary. I don't know what I\n\twould do if I lost my house.\"\n\t\n\tI stare at Joan for an uncomfortably long time.\n\t\n\tJoan tilts her head. \"What?\"\n\t\n\t\"What... happened?\"\n\t\n\t\"Uh...\" Joan gives me this odd look. \"Your Aunt's place. Someone burned it to the ground.\"\n\t\n\tI shout, \"SOMEONE BURNED RAVEN'S PLACE TO THE GROUND!?\"\n\t\n\tJoan flinches back. \"Y-yes? Did you really not know?\"\n\t\n\t\"No!\" I shout. \"I didn't! What happened!?\"\n\t\n\tJoan shrugs. \"I don't know! Maybe you should talk to your Aunt?\"\n\t\n\tI deflate immediately at her suggestion. \"Oh.\"\n\t\n\tToby finally comes back out of the shop. \"You ready to head home, buddy?\"\n\t\n\t\"One second...\" I back away from both of them. \"I need to make a call.\"\n\t\n\t*page_break\n\t\n\tI dial Raven. She answers immediately.\n\t\n\t\"$!{fiName}! Finally I-\"\n\t\n\t\"Did the store burn down!?\" I blurt out.\n\t\n\tRaven hesitates, though only for a moment. \"Yes. Those people burned it down.\"\n\t\n\t\"What people?\"\n\t\n\t\"The ones your with. The ones your parents are with,\" Raven says. \"Are you still with them?\"\n\t\n\t\"Yes?\" They burned the store down? \"That's impossible though. My parents joined them, they're fine!\"\n\t\n\t\"They're not 'fine'!\" Raven shouts. \"They're dangerous and they've killed people! You need to stay away from\n\tthem. Just tell me where you are so I can pick you up.\"\n\t\n\tI hesitate. \"No.\"\n\t\n\t\"No?\" A spark of anger runs through Raven's voice. \"You can't-\"\n\t\n\t\"I'm heading back now,\" I say.\n\t\n\t\"$!{fiName}! Wait-\"\n\t\n\t\"I'll talk to you later.\" I hang up before returning to Toby, who's waiting at the truck.\n\t\n\tJoan and Toby are both staring at me.\n\t\n\tI promise to catch Joan up on what's been going on before I leave with Toby.\n\t\n\t*page_break\n\t\n\tWe don't chat as we're headed back.\n\t\n\tAs much as I'd hate to admit it, I wonder if Raven was right.\n\t\n\tThere's something off about this group. Everybody is decked out in military garb. And honestly, Father Albert\n\tscares the hell out of me.\n\t\n\tStill... I'm not just going to ditch my parents. I need to stay focused on the haze anyway.\n\t\n\tAnd I need to find out what's happening on the thirty-first.\n\t\n\t*page_break\n\t\n\t...This is going to be a difficult couple of weeks.\n\t\n\t*page_break\n\t\n*if (location = \"Elrin\")\n\t\n\tAs the school day draws to a close, Elrin picks me up and we head back to his place.\n\t\n\tWe drive in silence for some time. It takes a while for me to realize we aren't heading\n\ttoward the park.\n\t\n\t\"Uh... say, Elrin?\"\n\t\n\tHe glances at me through the mirror. \"Hm?\"\n\t\n\t\"Where are we going?\"\n\t\n\t\"To my home, of course!\" He smiles.\n\t\n\t\"Right, but this isn't the way to the park...\"\n\t\n\t\"Oh!\" Elrin just laughs. \"No, no! We only went through there last time because Raven wanted you in\n\tYggdrasil as quickly as possible. I can't keep leaving my limo at a random park every day. It would\n\tbe impounded eventually.\"\n\t\n\t\"Right...\" I look out the window. We're still in Windbrooke somewhere, but I don't recognize the\n\tarea. \"Where are we headed then?\"\n\t\n\t\"Somewhere I can transfer this car to Yggdrasil,\" Elrin says. \"I can't just leave it in Windbrooke every\n\ttime I want to go home.\"\n\t\n\t*page_break\n\t\n\tWe eventually arrive at a parking garage. Elrin flashes some sort of pass to the security guard, who motions for him to\n\tgo toward the back.\n\t\n\tThere's a sort of large elevator built in the back of the parking garage. It's so large in fact, Elrin is able to\n\tjust drive inside it and park his car there. We don't get out as the doors close behind us.\n\t\n\tAnd then we wait. I don't feel us moving up or down.\n\t\n\tEventually, the doors open, and Elrin backs out again.\n\t\n\tThe exterior doesn't look like a parking garage anymore. We exit out into a checkpoint with\n\tmultiple armed men in militaristic uniforms waiting.\n\t\n\tOne approaches the driver's side window, and Elrin flashes him the same pass as before. He motions for us to\n\tleave, and Elrin takes off.\n\t\n\t*page_break\n\t\n\tThe streets are now deeply unfamiliar to me. But, I can still see that massive tree growing in\n\tthe center of the island.\n\t\n\t\"So we're in Yggdrasil now?\" I ask no one in particular.\n\t\n\tElrin nods. \"That's right! And I should have us home in no time.\"\n\t\n\t\"Hm.\" I stare out the window, seeing odd signs and shops and people passing by.\n\t\n\tEverything is different on this side. The people are strange. Most are human looking in the sense\n\tthat they have two arms and legs, but that's where the similarities usually end.\n\t\n\tI see demon-like people with dark scales. I see people with fur. I see people with strange skin tones\n\tthat range from deep reds to dark blues.\n\t\n\tI should really explore this island sometime.\n\t\n\t*page_break\n\t\n\tI shouldn't lose focus though. Time is running out. Something is happening on Halloween, and I still barely\n\tknow anything. The faster I work, the better.\n\t\n\t*page_break\n\t\n*comment\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_afterhospital": "\n\n\n\n*if (location = \"Elrin\")\n\t\n\tLater that evening, Elrin and I are eating around his dinner table.\n\t\n\t\"I've been thinking about... everything,\" Elrin says. \"As much as I want to, I won't\n\tbe telling your aunt about this haze, or what you've been doing. For now.\"\n\t\n\tOh. Huh, I thought this was going to be a lot more difficult. \"Yeah?\"\n\t\n\t\"The truth is... your aunt is dealing with a lot right now.\" Elrin sighs. \"A lot more\n\tthan you know. I can't dump this on her too. Especially not when you and Joan seem to be\n\tdealing with the problem efficiently.\"\n\t\n\t\"Well... thanks.\" I'm actually blushing a little under his praise.\n\t\n\t\"However, I will be present the next time you enter that otherworld. No exceptions.\"\n\t\n\tI nod. \"Fair enough.\" Honestly, Elrin is so effective at fighting, it'd be crazy not to involve him.\n\t\n\tWe eat in relative silence after that.\n\t\n\t*page_break\n\t\n\t...Elrin is a really good cook.\n\t\n\t*page_break\n\t\n*if (location = \"Union\")\n\t\n\tLater that day, I'm taking a stroll around the Union group's compound when Toby starts walking beside me.\n\t\n\t\"Hey there, friend!\" he beams at me.\n\t\n\tI nod. \"What's up?\"\n\t\n\t\"I was just curious about your plans...\"\n\t\n\t\"What? For tonight?\" I ask.\n\t\n\t\"No, no. Future plans!\"\n\t\n\tFuture?\n\t\n\tI shoot him a curious gaze. \"You mean after we're through with this haze... stuff?\"\n\t\n\tHe nods.\n\t\n\t\"Well...\" I shrug. \"I hadn't really thought about it.\"\n\t\n\t\"You didn't have any plans before all this happened?\" Toby asks with a frown. \"Not planning on college? Or\n\tsomething like that?\"\n\t\n\tI shrug. \"I mean... I guess I'll do that stuff. I hadn't really thought about it.\"\n\t\n\t\"I see...\"\n\t\n\t*page_break\n\t\n\tWe keep walking for a bit before I speak up. \"And what about you? I take it you're going to keep working with these people?\"\n\t\n\tToby's mouth forms into a tight line. \"No.\"\n\t\n\t\"Oh...\" Very odd. \"Any particular reason?\"\n\t\n\t\"...Father Albert has taken this group in a different direction lately. I don't believe I can see the cause through much longer.\"\n\t\n\tNew direction?\n\t\n\t*page_break\n\t\n\tI think back to the scene we saw at the hospital. Father Albert ordered multiple people killed.\n\t\n\tThey looked like they belonged to that psychotic group that murdered Mr. Barrow, but I could still see why\n\tthat left Toby shaken.\n\t\n\t*page_break\n\t\n\tI look around the compound. There's plenty of people wandering around. Some are training.\n\t\n\tThey seem nice and normal, but...\n\t\n\tThey're all armed to the teeth.\n\t\n\tI think I let the shock of seeing my parents again blind me to how weird this place is. It's a compound\n\tin the woods filled with some sort of armed militia.\n\t\n\tThis is not normal.\n\t\n\t*page_break\n\t\n\tToby breaks away shortly after that, and I spend the rest of my walk mulling the situation over.\n\t\n*if (location = \"Scourge\")\n\t\n\tI'm lingering around the Scourge's HQ.\n\t\n\tThey don't really have much to do here. The shanty town has multiple jerry-rigged televisions set up. One is somehow\n\tgetting channels from the normal world, but it's playing the news and several Scourge members are taking\n\tnotes on it. No idea why.\n\t\n\tThe others televisions are playing channels I've never even seen before, and that I strongly suspect don't originate\n\tfrom the normal world.\n\t\n\tUnfortunately most of those shows aren't in English, and there are no subtitles.\n\t\n\tSo now I'm just lying around in some grass, cloud watching. \n\t\n\tThere are no clouds.\n\t\n\t\"Having fun?\" Rita sneaked up on me at some point.\n\t\n\t\"...Sure.\"\n\t\n\tRita plops down next to me, and looks up at the sky too.\n\t\n\tAfter a long time she finally says, \"What are you looking at?\"\n\t\n\t\"Clouds.\"\n\t\n\t\"...But there aren't any,\" Rita says.\n\t\n\t\"I've noticed.\"\n\t\n\t*page_break\n\t\n\t\"Hmm.\"\n\t\n\tI glance at Rita, and see that she's rolled onto her side, and is now watching me.\n\t\n\t\"Joan's cute,\" she says.\n\t\n\t\"Yeah...\" I raise a brow. \"Are you interested in her?\"\n\t\n\t\"I would have thought I'd made that obvious earlier,\" she says. \"What about you?\"\n\t\n\tI think back to how she reacted to Lucas' flirting, then to Rita.\n\t\n\t*if (sex = \"ma\")\n\t\t\n\t\t*choice\n\t\t\t#\"...I don't think it matters whether I like her or not.\"\n\t\t\t\t\n\t\t\t\t\"Oh! You can actually tell.\" Rita smiles. \"That's good. Lucas is usually too thick to notice.\n\t\t\t\tIt's really annoying. He wouldn't stop flirting with me until I literally spelled it out for him.\"\n\t\t\t\t\n\t\t\t\tRita rolls back over and looks at the sky again. \"...Does she have a girlfriend?\"\n\t\t\t\t\n\t\t\t\tI briefly wonder if Joan would appreciate me talking about this. \"I don't think so.\"\n\t\t\t\t\n\t\t\t\tI see Rita's smile creep a little wider. \"You don't say...\" She abruptly stands up. \"Thanks for the tip.\n\t\t\t\tI'll talk to you later.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tI'm sure Joan will be fine.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto lbl_EndOfDay\n\t\t\t#\"I'm more interested in you.\"\n\t\t\t\t*set rRita true\n\t\t\t\t\n\t\t\t\tRita's brow goes up. \"[i]Really[/i] now? You're pretty bold, aren't you?\"\n\t\t\t\t\n\t\t\t\tI shrug. \"I'm just putting that out there. Doesn't have to mean anything.\"\n\t\t\t\t\n\t\t\t\t\"Well...\" Rita reaches over, and grazes my arm with her nails. \"Maybe I want it to mean something.\"\n\t\t\t\t\n\t\t\t\tI freeze.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tI... I don't know how to flirt.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\"Well... that's... good?\"\n\t\t\t\t\n\t\t\t\tRita's lips curl up just a little bit more.\n\t\t\t\t\n\t\t\t\t\"Right.\" I sit up. \"I, uh... I've got to go do a thing.\"\n\t\t\t\t\n\t\t\t\tI leave a bemused Rita behind as I walk off in a random direction.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto lbl_EndOfDay\n\t*if (sex = \"fe\")\n\t\t\n\t\t*choice\n\t\t\t#\"Yeah... I am.\"\n\t\t\t\t*set rJoan true\n\t\t\t\t\n\t\t\t\t\"Hm.\" Rita nods. \"I see.\"\n\t\t\t\t\n\t\t\t\tI don't say anything, but I do notice Rita suddenly look thoughtful.\n\t\t\t\t\n\t\t\t\t\"We could both share!\" she grins. \"It'll be fun.\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"I think that's my cue to leave.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tRita just does a mock pout as I leave.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto lbl_EndOfDay\n\t\t\t\t\t#\"If Joan's into it. Sure.\"\n\t\t\t\t\t\t*set rJoanRita true\n\t\t\t\t\t\t*set rJoan false\n\t\t\t\t\t\t\n\t\t\t\t\t\tI try not to snicker at the look on Rita's face.\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe either didn't think I'd take her seriously, or she didn't think I'd be down for\n\t\t\t\t\t\tthat. Either way, she's speechless.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Well, this has been nice.\" I get up and wander off into the shanty town. \"I'm gonna take a stroll around.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto lbl_EndOfDay\n\t\t\t\t*comment\n\t\t\t\t\n\t\t\t\t*goto lbl_RitaOrJoan\n\t\t\t#\"I'm more interested in you.\"\n\t\t\t\t*set rRita true\n\t\t\t\t\n\t\t\t\tRita's brow goes up. \"[i]Really[/i] now? You're pretty bold, aren't you?\"\n\t\t\t\t\n\t\t\t\tI shrug. \"I'm just putting that out there. Doesn't have to mean anything.\"\n\t\t\t\t\n\t\t\t\t\"Well...\" Rita reaches over, and grazes my arm with her nails. \"Maybe I want it to mean something.\"\n\t\t\t\t\n\t\t\t\tI freeze.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tI... I don't know how to flirt.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\"Well... that's... good?\"\n\t\t\t\t\n\t\t\t\tRita's lips curl up just a little bit more.\n\t\t\t\t\n\t\t\t\t\"Right.\" I sit up. \"I, uh... I've got to go do a thing.\"\n\t\t\t\t\n\t\t\t\tI leave a bemused Rita behind as I walk off in a random direction.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto lbl_EndOfDay\n\t\t\t#\"I'm not.\"\n\t\t\t\t\n\t\t\t\t\"No?\" Rita asks. \"Hm. Does she have a girlfriend? As far as you know?\"\n\t\t\t\t\n\t\t\t\tI shake my head. \"I don't think so.\"\n\t\t\t\t\n\t\t\t\tRita grins as she stands back up. \"Good to know. I'll talk to you later.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tI'm sure Joan will be fine...\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto lbl_EndOfDay\n\t\t*comment\n\t\t\n\t\t*goto lbl_EndOfDay\n\t*comment\n\t\n*comment\n\n*label lbl_EndOfDay\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_afterpolice": "\n\n\n\n\n\n\n\n\nLater that night I'm lying in my bed thinking.\n\nAre we really making progress? We've been clearing those spheres out well enough, but there's something more happening here.\n\nSomething will happen on the thirty-first. That's not a coincidence.\n\nI groan, and flip myself over so my face is buried in my pillow. \"[i]Why is this so hard....[/i]\"\n\nWe're making good progress though. Maybe it would be nice to take a day for ourselves. We could all just sort of... hang out.\nIt'd be nice.\n\nIt's not like there's anything else to do until we detect another sphere.\n\nI roll onto my side. It's hard to sleep with everything that's happening. I try to quiet the buzzing of my thoughts\nas I settle in for the night.\n\n*page_break\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_freeday": "\n\n\n\n\n\n\n\n\n*if (location = \"Elrin\")\n\t\n\tThe next morning, Elrin is cooking us breakfast.\n\t\n\tI'm seated at the dinner table nearby. Everything he does is very regimented.\n\tTwo plates are already set out on the table, with a fork and a knife sitting on\n\ttop of a folded napkin.\n\t\n\tIt's like eating at a fancy restaurant. \"So... I'm thinking of just hanging out with Joan after school today.\"\n\t\n\t\"Oh?\" Elrin doesn't look up from his cooking.\n\t\n\t\"You should join us,\" I say.\n\t\n\tElrin chuckles. \"I would think that would go without saying. I'll be driving you, and I'm under orders to watch\n\tout for you.\"\n\t\n\t\"I know,\" I say. \"But... I mean you should actually hang out with us. Not as a work thing, just... as a thing.\"\n\t\n\tElrin pauses, though only for a moment. \"I suppose that wouldn't be inappropriate.\"\n\t\n\tI swear, the way Elrin talks... it's like he's twenty years older than I am.\n\t\n\tElrin fills my plate with food, then his, before taking a seat. I study his face.\n\t\n\tHe can't be that old. He looks so young and boyish.\n\t\n\tI pick at my food with my fork. \"...How old are you?\"\n\t\n\t\"Hm?\"\n\t\n\tI quickly take a bite while shrugging. \"Er. How old are you?\"\n\t\n\tElrin stares at me for a moment. \"Twenty two.\"\n\t\n\t\"What!?\" I suppress a startled laugh. \"You look sixteen!\"\n\t\n\tElrin pouts, though I can see a hint of a smirk. \"Did you really think Mrs. Lilia would put a teenager in charge of looking over\n\tyou?\"\n\t\n\tI shrug. \"I don't even know. Everything she does is mysterious.\"\n\t\n\t\"She's just trying to protect you,\" he says.\n\t\n\t\"See,\" I point my fork at him. \"[i]That[/i] is what's throwing me off. You are way to level-headed and responsible to be around my age.\"\n\t\n\t\"I'm half a decade older than you,\" Elrin says.\n\t\n\t\"You're not [i]that[/i] much older.\"\n\t\n\t*page_break\n\t\n\tWe keep talking for as long as we can. But, eventually I have to go to school.\n\t\n\tI don't manage to set up a solid plan for what we'll do today before arriving. I'll just have to\n\twork something out with Joan and tell Elrin about it when he picks me up.\n\t\n\t*page_break\n\t\n*if (location = \"Scourge\")\n\t\n\tI wake up far too early the next morning. The Scourge's shanty town is too damn loud\n\tthis early in the morning.\n\t\n\tI stumble out of my bedroom and nearly run into Lucas. It doesn't look like he was\n\tcoming to see me. I'm pretty sure he was just walking by.\n\t\n\t\"Sup?\" he asks.\n\t\n\tI grumble incoherently.\n\t\n\tHe nods. \"I hear that. Since you're up, do you want to grab some breakfast with me?\"\n\t\n\t\"Breakfast from where?\" I ask. Not that it matter. I need food.\n\t\n\tLucas jerks his thumb behind him. \"The mess hall.\"\n\t\n\tI pause. \"There's a mess hall?\"\n\t\n\t*page_break\n\t\n\tThere's a mess hall. It's just a large open space with a tarp stretched out over it. Several tables\n\tthat I would see in any park are strewn around the space.\n\t\n\tThere's a line of tables filled with food placed in one of the corners. I can see cooks grilling\n\tjust on the other side of it.\n\t\n\tBy the time Lucas and I show up, there's not much of a line, so we at least get our food quickly.\n\t\n\tLucas must know some of these people, so I was expecting him to lead me to a table of his friends. Surprisingly,\n\the makes a point of having us sit in a far corner on our own.\n\t\n\t\"So,\" he begins. \"What's the next step?\"\n\t\n\tI stare at him. \"Huh?\"\n\t\n\t\"With the haze,\" he says. \"How are you going to find the next... thingie.\"\n\t\n\t\"Sphere?\"\n\t\n\t\"Whatever.\"\n\t\n\t\"I don't even know there will be another one.\" I shrug. \"Maybe it's time for a personal day.\"\n\t\n\tLucas raises a brow. \"Yeah?\"\n\t\n\tI nod. \"Joan and I haven't hung our in a while. You and Rita could join us after school.\"\n\t\n\t*if (sex = \"ma\")\n\t\t\n\t\t\"Well...\" Lucas shrugs. \"I guess that sounds cool. Are you really okay with not searching for another one\n\t\tof those spheres though?\"\n\t\t\n\t\t\"I don't think there's any reason to get stressed over it. We'll deal with the next one as it comes.\"\n\t\t\n\t\tLucas hesitantly nods. \"If you say so.\"\n\t\t\n\t\tI get the sense he wanted to press the issue more, but thankfully he lets the conversation die.\n\t\t\n\t*if (sex = \"fe\")\n\t\t\n\t\tHe grins. \"Well... I certainly wouldn't mind spending some personal time with you.\"\n\t\t\n\t\t*choice\n\t\t\t#\"It's a date then?\"\n\t\t\t\t*set rLucas true\n\t\t\t\t\n\t\t\t\tHis grin widens. \"If you want it to be.\"\n\t\t\t\t\n\t\t\t\tI nod, smiling. \"I really haven't hung out with Joan in a little while though, so we should probably\n\t\t\t\tstill make this a group thing.\"\n\t\t\t\t\n\t\t\t\t\"I'm not that worried about it,\" he says. \"I get the sense Rita and her will get along just fine.\"\n\t\t\t\t\n\t\t\t\t*goto lbl_LucasResponse\n\t\t\t#\"Oh yeah. It'll be fun to hanging out with Rita and Joan.\"\n\t\t\t\t\n\t\t\t\t\"Of course!\" he says.\n\t\t\t\t\n\t\t\t\t\"Great,\" I say. \"If you two want to meet us after school, we'll be waiting for you.\"\n\t\t\t\t\n\t\t\t\t*goto lbl_LucasResponse\n\t\t*comment\n\t\t\n\t\t*label lbl_LucasResponse\n\t\t\n\t*comment\n\t\n\tWe don't have that much time left after that to eat before I need to leave.\n\t\n\t*page_break\n\t\n*if (location = \"Union\")\n\t\n\tI spend the next morning in the organization's dining hall. I was expecting them to serve\n\tsome sort of basic grub, but I was pleasantly surprised to receive some incredibly fluffy\n\twaffles.\n\t\n\tApparently these folks have actual cooks at their disposal.\n\t\n\tToby is seated across from me. \"So what is on the agenda for today, friend?\"\n\t\n\tI shrug. \"I haven't spent a day just hanging out with Joan in a while... so I think I'll\n\tjust do that. Laura and you should join us.\"\n\t\n\tHe openly beams at the prospect. \"That sounds like a great idea!\" He nods enthusiastically. \"Team bonding\n\tis important if we're going to defeat the haze!\"\n\t\n\tI quietly add. \"If it still needs to be...\"\n\t\n\t\"Hm?\" Toby tilts his head. \"You think it's finished.\"\n\t\n\tI shrug. \"It... might be? I don't know.\"\n\t\n\tLaura unexpectedly takes a seat at my right. \"Seems too easy.\"\n\t\n\t\"I don't see anything wrong with hoping,\" I say.\n\t\n\t\"I do,\" she says. \"You're just begging to be disappointed.\"\n\t\n\tI roll me eyes and return to my pancakes. \"You two are downers\"\n\t\n\t*page_break\n\t\n*comment\n\nI don't see Joan at school. Though, I pretty much never do due to how different our classes are.\n\nI do however keep texting her in class.\n\n'Yo. You and us are hanging out and having fun after school.' -You-\n\n'Do I get a say in this?' -Joan Catalan-\n\n'No. So be ready.' -You-\n\n'Oh? And what if I have plans already?' -Joan Catalan-\n\n'Just cancel them. Thanks in advance bye! xoxo' -You-\n\n*page_break\n\n*if (location = \"Elrin\")\n\t\n\tElrin is, of course, waiting for us right outside the school when it lets out.\n\tHe opens the door as we approach, and I notice a lot of other students looking our way.\n\t\n\tNow that I think about it, I just showed up to school one day\n\twith my own driver. And a limo.\n\t\n\t\"Hey, Elrin!\" Joan waves at him enthusiastically.\n\t\n\t\"Mrs. Catalan,\" he calmly replies. \"I believe our very own $!{fiName} has some sort of plans for us.\"\n\t\n\t\"That's what I heard.\" She looks at me. \"And  at her. \"...Oh.\"\n\t\t\n\t\tJoan is giving me this look like she's wondering if it was a mistake to say that.\n\t\t\n\t\t\"That's cool,\" I say quickly.\n\t\t\n\t\t\"As a matter of fact...\" Joan smirks \"It absolutely is.\"\n\t\t\n\t\tI look at Elrin myself. He's cute, objectively speaking.\n\t\t\n\t\t*choice\n\t\t\t#\"I could see myself being into him.\"\n\t\t\t\t*set rElrin true\n\t\t\t\t\n\t\t\t\t\"Really?\" Joan asks.\n\t\t\t\t\n\t\t\t\tI nod. \"Yeah... I mean, he's cool isn't he? And he's helped me out a lot.\"\n\t\t\t\t\n\t\t\t\t\"It just seems like a weird dynamic to me, I guess,\" Joan says. \"He practically\n\t\t\t\tacts like your butler half the time...\"\n\t\t\t\t\n\t\t\t\t\"Hey, he's not my butler,\" I say. \"If anything he's Raven's butler. So it's alright.\"\n\t\t\t\t\n\t\t\t\t*goto lbl_ElrinJoanRomance\n\t\t\t#\"So who are you into at school?\"\n\t\t\t\t\n\t\t\t\tJoan just shrugs. \"Not really anyone in particular. I've been so busy lately, I haven't\n\t\t\t\thad that much time to socialize.\"\n\t\t\t\t\n\t\t\t\tI nod, \"That's fair. I know this haze stuff was eating up a lot of your time.\"\n\t\t\t\t\n\t\t\t\t\"Oh no.\" Joan shakes her head. \"Even before that, I have so many advanced classes...\n\t\t\t\tit just took a lot of time and energy to push myself through it, you know?\"\n\t\t\t\t\n\t\t\t\tAdvanced classes? \"I'm not... getting in your way am I?\"\n\t\t\t\t\n\t\t\t\t\"Huh?\" Joan tilts her head. \"What do you mean?\"\n\t\t\t\t\n\t\t\t\t\"It couldn't have been easy to balance all this nonsense and your school work-\"\n\t\t\t\t\n\t\t\t\t\"Hey!\" Joan frowns. \"I made my own choice to get involved in this. And before you\n\t\t\t\tgo too far down that train of thought, I'll remind you, that I was the one who\n\t\t\t\tstarted this whole thing. [i]I[/i] dragged [i]you[/i] into this.\"\n\t\t\t\t\n\t\t\t\tI mull that over for a moment. \"so what you're saying is... you owe me an apology for\n\t\t\t\tcausing me all this trouble?\"\n\t\t\t\t\n\t\t d I wonder if something is wrong.\n\t\n\tThere's a moment where we're idling. Joan goes to the bathroom, Laura immediately follows.\n\t*if (sex = \"fe\")\n\t\tJoan briefly asks if I'm coming, but I decline, telling her I want to talk to Toby for a moment.\n\t\t\n\t\tAnd that I do.\n\t*comment\n\t\n\tthe moment the two of them are out of sight, I slide up next to Toby. He's currently munching on some sort of\n\trock-like candy.\n\t\n\t\"Hello,\" he chirps. \"Is something wrong?\"\n\t\n\t\"Do you know if Laura is upset about anything?\" I ask.\n\t\n\t\"Gasp.\" Toby puts his hands to his cheek in what I very much hope is sarcastic shock. \"Are you worried about\n\ther?\"\n\t\n\tI stare at him for a really long time before finally answering, \"Yeah.\"\n\t\n\t\"Amazing. The team bonding is working already.\"\n\t\n\t\"Please stop,\" I say. \"You know her better than me. Is she... okay?\"\n\t\n\t\"Hm.\" Toby seems to mull that over for a moment. \"I suppose she is. Truth be told, she's always\n\tbeen like this. So distant. I wish I could find a way to bring her more out of her shell. She\n\tcould use more friends. Maybe even a boyfriend.\"\n\t\n\t*if (sex = \"fe\")\n\t\t\n\t\t\"Isn't there anyone at the compound you could introduce her to?\" I ask.\n\t\t\n\t\tToby hesitates. \"I don't think that would be a good idea.\"\n\t\t\n\t\tI raise a brow at him. \"...Because she works with them?\"\n\t\t\n\t\t\"Not exactly.\" Toby's tone suggests he doesn't want to talk about this.\n\t\t\n\t\tI decided to just drop it. \"So what about you? Are you dating anyone.\"\n\t\t\n\t\tToby's eyes widen with shock. \"Are you asking me out?\"\n\t\t\n\t\t\"Uh...\"\n\t\t\n\t\t*choice\n\t\t\t#\"...Sure?\"\n\t\t\t\t\n\t\t\t\t*goto lbl_RomanceToby\n\t\t\t\t\n\t\t\t#\"No.\"\n\t\t\t\t\n\t\t\t\t*goto lbl_NoToby\n\t\t\t\t\n\t\t\t#\"I'm more into Joan honestly.\"\n\t\t\t\t*set rJoan true\n\t\t\t\t\n\t\t\t\t\"Ah! I see.\" Toby nods. \"You two are dating?\"\n\t\t\t\t\n\t\t\t\t\"No, no!\" I shake my head. \"I... actually haven't said anything to her\n\t\t\t\tyet.\"\n\t\t\t\t\n\t\t\t\t\"Why not?\" he asks.\n\t\t\t\t\n\t\t\t\tI just shrug. \"I just... haven't found the right way to it I guess. and there's a lot going on.\"\n\t\t\t\t\n\t\t\t\t*goto lbl_TobyTalk\n\t\t*comment\n\t\t\n\t*comment\n\t\n\tToby looks me up and down. \"Are you into girls?\"\n\t\n\t*choice\n\t\t#\"No.\"\n\t\t\t\n\t\t\t*label lbl_IntoWho\n\t\t\t\n\t\t\t\"In that case,\" Toby says. \"I'll have to keep searching...\" Toby's eyes widen,\n\t\t\tlike he's been struck by a sudden realization. \"Are you into boys?\"\n\t\t\t\n\t\t\t*label lbl_IntoGuys\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"I'm into [i]guys[/i] sure.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Well then!\" Toby smirks. I've never seen him smirk. \"I propose we go on a date!\"\n\t\t\t\t\t\n\t\t\t\t\tI stare at him. \"...Right now?\"\n\t\t\t\t\t\n\t\t\t\t\t\"Of course not!\" he says confidently. \"This is team bonding time.\"\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Sure?\"\n\t\t\t\t\t\t\t*label lbl_RomanceToby\n\t\t\t\t\t\t\t*set rToby true\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Excellent!\" Toby says. \"I'll be sure to arrange a time and place.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Uh... Yeah. sounds good.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto lbl_TobyTalk\n\t\t\t\t\t\t#\"I'm going to have to pass.\"\n\t\t\t\t\t\t\t*label lbl_NoToby\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Darn...\" Toby sighs. \"I suppose I'll have to keep trying to find someone for me as well...\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto lbl_TobyTalk\n\t\t\t\t\t*comment\n\t\t\t\t\t\n\t\t\t\t#\"No.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Darn...\" Toby sighs. \"I suppose I'll have to keep trying to find someone for me as well...\"\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_TobyTalk\n\t\t\t*comment\n\t\t\t\n\t\t#\"Sure?\"\n\t\t\t\n\t\t\t\"In that case,\" Toby says. \"I propose you ask Laura out! I think it would do a lot to help her loosen\n\t\t\tup. Also you two would be cute.\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"Uh... I guess I could try asking her out?\"\n\t\t\t\t\t*set rLaura true\n\t\t\t\t\t\n\t\t\t\t\t\"Fantastic!\" Toby beams. \"I can't wait to tell her!\"\n\t\t\t\t\t\n\t\t\t\t\t\"Uh, hold on a second...\" I say.\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_TobyTalk\n\t\t\t\t#\"I don't think she's my type...\"\n\t\t\t\t\t\n\t\t\t\t\t\"I see... that's a pity.\" He looks sad, though only for a moment. His eyes suddenly widen\n\t\t\t\t\twith excitement. \"Wait! Are you into boys too?\"\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_IntoGuys\n\t\t\t*comment\n\t\t\t\n\t*comment\n\t\n\t*label lbl_TobyTalk\n\t\n\t*if (rToby = true)\n\t\t\n\t\tLaura and Joan approach us.\n\t\t\n\t\tLaura asks, \"Did we miss anything?\"\n\t\t\n\t\t\"Yes!\" Toby says proudly. \"I have secured a date with $!{fiName}. They said 'yes' when I asked them out and everything.\"\n\t\t\n\t\t\"Is that so?\" Laura gives me this look, like she feels bad for me. \"Well, that's... nice?\"\n\t\t\n\t\tIt takes me a moment to realize she's actually asking if I'm fine with this. \"Uh... pretty much?\"\n\t\t\n\t\tLaura hesitates, like she's waiting for me to say more. \"Well. Alright. Sounds fun, I hope you two have\n\t\ta good time.\"\n\t\t\n\t*if (rLaura = true)\n\t\t\n\t\tLaura and Joan approach us.\n\t\t\n\t\tLaura asks, \"Did we miss anything?\"\n\t\t\n\t\t\"Yes!\" Toby says proudly. \"I have secured you a date with $!{fiName}. They'll be taking you out. At some point.\"\n\t\t\n\t\tI glare at Toby. \"Dude. What are you doing?.\"\n\t\t\n\t\tLaura looks between Toby and myself. \"Right. We can talk about that later.\" She's oddly unfazed.\n\t\t\n\t*if (rJoan = true)\n\t\t\n\t\tLaura and Joan approach us.\n\t\t\n\t\tLaura asks, \"Did we miss anything?\"\n\t\t\n\t\t\"Yes!\" Toby says proudly, looking at Joan. \"$!{fiName} would like to go on a date with you.\"\n\t\t\n\t\t\"Toby!\" I glare at him. \"What the hell are you doing?\"\n\t\t\n\t\tHe shoots me a thumbs up. \"You said you couldn't figure out how to ask her out. So I did for you.\"\n\t\tHe beams.
