as doing. She has experience.\n\nAnd destroying that sphere... it made everything better somehow.\n\nHas she done something here to help already?\n\nMy phone buzzes.\n\n'Are you here yet?' -Joan Catalan-\n\nI'm not more than a block away. I send a message back.\n\n*choice\n\t#'Yep. Been there for a while.'\n\t\t\n\t\t'WHAT!?!?!? Why didn't you let yourself in???' -Joan Catalan-\n\t\t\n\t\tI smirk. Seriously?\n\t\t\n\t\t'Oh no. I let myself in. I've been sitting in the corner. Didn't you notice?' -You-\n\t\t\n\t\tThere's a really long pause. I continue down the road.\n\t\t\n\t\tMy phone buzzes.\n\t\t\n\t\t'I don't see you.' -Joan Catalan-\n\t\t\n\t\t*goto lbl_WhereIAm\n\t#'Almost. I'm just down the road.'\n\t\t\n\t\t'Perfect! I can't wait for us to start this thing! It's so exciting getting another member!' -Joan Catalan-\n\t\t\n\t\t'Another member? There are others?' -You-\n\t\t\n\t\tThere's a bit of a pause before I receive another message.\n\t\t\n\t\t'...Not exactly?' -Joan Catalan-\n\t\t\n\t\tMy phone immediately buzzes again.\n\t\t\n\t\t'But, don't worry. We'll get them eventually.' -Joan Catalan-\n\t\t\n\t\tI'm not sure what she means by that, but I go ahead and put my phone away. I'm there.\n\t\t\n\t\t*goto lbl_WhereIAm\n*comment\n\n*label lbl_WhereIAm\n\n*page_break\n\nI was expecting a home. What I find myself in front of is a warehouse.\n\nThere's nothing particularly noteworthy about it. I can see worn paint\non the wall that once showed a logo, but it's so faded that I can't make it out\nanymore.\n\nI approach a set of metal doors, and knock.\n\n\"It's unlocked!\"\n\n*page_break\n\nThe inside of the warehouse is not impressive.\n\nWhich is to say its empty.\n\nLike, actually empty.\n\nThe warehouse must have been completely cleared out at some point. It's just one big empty space.\n\nWith one exception.\n\nA white board set up on wheels sits in the center of the room.\n\n\"What is this?\" I ask.\n\nJoan rushes up to me. \"This is our HQ! The...\" Joan slowly leans closer. \"DELVERS!\"\n\nI tilt my head. \"...Delvers?\"\n\n\"I mean-\" She frowns. \"Shifters.\"\n\nI hesitate for a moment. \"Shifters?\"\n\n\"No, no! Uh-\" Joan seems to be scrambling to think. \"L-leapers?\"\n\nI blink. \"Leapers.\"\n\n\"I- no!\" Joan says indignantly.\n\nI stare.\n\n\"Cut me a break!\" Joan points at the board. \"Names are hard to come up with!\"\n\nLining the bottom of the white board, I see dozens of crossed out words. 'Divers', 'purifiers', and 'cleansers' being amongst them.\n\nI cross my arms. \"Are you really that knight? Your personality seems completely different.\"\n\n\"That's not important right now.\" Joan walks over to the white board, and grabs a black marker. There\nare several others sitting along the small ledge in front of the board.\n\nThere are no chairs, so I just stand several feet in front of the board while Joan doodles something\non it.\n\nI steadily make out what she's drawing as she works.\n\n*page_break\n\nThere's a horizontal line across the board.\n\nThe top space reads, 'Our World'.\n\nThe bottom space reads, 'Other World'.\n\nShe spends several moments drawing what I guess is supposed to be fog.\nShe follows it up by drawing the words, 'The Haze' in the bottom space.\n\nShe then draws an arrow from 'The Haze' to the top space.\n\nJoan steps to the side of the board, and says. \"I think this makes the situation pretty clear.\"\n\n*page_break\n\nI stare at the board for a long while.\n\nJoan waits patiently, apparently expecting a response.\n\nI slowly tilt my head. \"What?\"\n\n\"Ugh.\" Joan marches back in front of the board, she doodles various stick figures in the\ntop space.\n\nThey all have angry expressions.\n\nShe draws more lines from the words 'The Haze' to the figures.\n\n\"Is it clear now?\" Joan asks, stepping away from the board.\n\nI stare. \"Sure.\"\n\n\"Great!\" she beams. \"So, you're gonna help me right?\"\n\n*choice\n\t#\"Sure.\"\n\t\t\n\t\t\"Perfect!\" Joan chirps. \"Let's dive in now.\"\n\t\t\n\t\tI hesitate. \"...Sure.\"\n\t\t\n\t\t*goto lbl_Team\n\t#\"With what?\"\n\t\t\n\t\tJoan sighs. \"There are two worlds both influence the other a strange haze in the other world\n\t\tis making people crazy in ours so we need to go into the other world to destroy\n\t\tthe haze bringing peace to the city and making us heroes in the process.\"\n\t\t\n\t\tI blink. \"Yeah?\"\n\t\t\n\t\t\"Yeah,\" she says. \"So, let's dive in now.\"\n\t\t\n\t\t\"Wait, what?\"\n\t\t\n\t\t*goto lbl_Team\n*comment\n\n*label lbl_Team\n\n*page_break\n\nJoan puts a hand on the top of the board, and spins it around. The back of it is identical to\nthe front, and already has writing and doodles on it.\n\nThe writing is a list of locations, the doodles are poorly drawn imitations of those locations.\n\n[i]Police department - long time - (high density)[/i]\n\n[i]Hospital - long time - (high density)[/i]\n\n[i]High School - recent - (low density) \u003c--- dealt with. Haze gone!!![/i]\n\n[i]Skylong mall - today - (low density)[/i]\n\n*page_break\n\nI raise a brow at the locations. \"All those places have that... other place in them?\"\n\n\"I think all places has that other place in it,\" Joan says. \"But, those places have those haze making spheres.\"\n\n\"What's density mean?\" I ask.\n\n\"It's the density of the haze,\" she says. \"I've noticed the longer a sphere is left alone, the more powerful it becomes. More haze,\nmore monsters in that otherworld.\"\n\n\"Well, in that case we should go to...\"\n\n*choice\n\t#\"The police department. That haze is probably crippling the police force.\"\n\t\t\n\t\t\"Yeah, that's not gonna work out,\" Joan says. \"I already went there earlier. I got\n\t\ttotally creamed. Even with your help, we wouldn't be able to do anything.\"\n\t\t\n\t\t\"So, what?\" I cross my arms. \"We're just not going to even try?\"\n\t\t\n\t\t\"We'll do something,\" Joan says. \"Eventually. After you've had some practice.\"\n\t\t\n\t\tI frown. \"I guess, but-\"\n\t\t\n\t\t\"Because, right now?\" she says. \"You totally suck.\"\n\t\t\n\t\tI stare at her for a long while. \"...Gotcha.\"\n\t\t\n\t\t*goto lbl_OnlyOneOption\n\t#\"The hospital. The haze is choking already suffering victims.\"\n\t\t\n\t\t\"Yeah, that's not gonna work out,\" Joan says. \"I already went there earlier. I got\n\t\ttotally creamed. Even with your help, we wouldn't be able to do anything.\"\n\t\t\n\t\t\"So, what?\" I cross my arms. \"We're just not going to even try?\"\n\t\t\n\t\t\"We'll do something,\" Joan says. \"Eventually. After you've had some practice.\"\n\t\t\n\t\tI frown. \"I guess, but-\"\n\t\t\n\t\t\"Because, right now?\" she says. \"You totally suck.\"\n\t\t\n\t\tI stare at her for a long while. \"...Gotcha.\"\n\t\t\n\t\t*goto lbl_OnlyOneOption\n\t#\"The mall. It'll be easier than the other two.\"\n\t\t\n\t\tJoan smiles. \"My thoughts exactly. Also, I got totally creamed at the other\n\t\tlocations earlier, so we wouldn't be able to help anyways.\"\n\t\t\n\t\t\"Well...\" I scratch the back of my head. \"You wouldn't be alone, you'd-\"\n\t\t\n\t\t\"Have you?\" Joan asks, looking me up and down. \"Yeah, No. You're kinda...\" She pauses\n\t\tfor a long while. \"...new.\"\n\t\t\n\t\tI nod. \"Right, I guess that makes-\"\n\t\t\n\t\t\"So you totally suck at this.\"\n\t\t\n\t\tI stare at her for a long while.\n\t\t\n\t\tShe stares back.\n\t\t\n\t\t\"Right.\"\n\t\t\n\t\t*goto lbl_OnlyOneOption\n*comment\n\n*label lbl_OnlyOneOption\n\n*page_break\n\nFifteen minutes later and we are standing in front of the mall.\n\nAlso, Joan has a car. Which is cool.\n\nIt [i]is[/i] a junker.\n\n*page_break\n\nSkylong Mall is painted in bright golden letters at the front entrance.\n\nJust standing in front of the place is giving me a headache.\n\nThere aren't very many people inside. Those that are look downtrodden. Everybody walks as if a heavy\nweight hangs off their necks.\n\n\"I've noticed something,\" Joan says. \"People who are exposed to the haze carry it with them.\" She turns to look\nat me. \"I know it seems like the entire city is really awful right now, but its not. It's just a few locations\npeople frequent in large numbers.\"\n\nI cross my arms. \"And, what? People are being 'infected' with bad thoughts?\"\n\nJoan raises a brow. \"Are you... seriously acting skeptical right now? You've already dived into that other\nworld once before, and helped cleanse the haze from it.\" Joan gestures around herself. \"Is the obvious not proof enough for you?\"\n\nI stare at the mall for a long while.\n\n*page_break\n\nI can feel it.\n\n*page_break\n\nA dull pulse. It's making my head hurt.\n\n*page_break\n\nI look Joan over. She seems... chipper. In fact, her mood has always seemed pretty peppy despite the city's state.\n\n\"Are you not affected by it?\" I ask.\n\n\"I was,\" she says. \"At first.\"\n\n\"Not now?\"\n\nShe shakes her head. \"I've dived into the other world half-a-dozen times now. The more I did it, the less I was affected.\nI'm pretty sure I'm immune now.\"\n\nI mull that over for a moment, before speaking. \"But I'm not.\"\n\n\"I think... you're resistant to it,\" she says. \"Same thing happened to me after the first time. It'll get easier as it goes on.\"\n\n*page_break\n\nWe stroll through Skylong Mall. I've been here plenty of times before.\n\nIt's usually extremely busy. But there's hardly anyone around right now.\n\nTwo cops watch us from nearby.\n\nI'm noticing a lot more police hanging around too.\n\n\"So, how do we 'dive in', as you put it?\"\n\n\"Well, first things first,\" Joan says. \"We need to find somewhere we can safely stay passed out at. Without anyone bothering us.\"\n\n\"Are we going to be in a coma?\" I ask.\n\nJoan shrugs. \"I haven't quite figured that out yet. I guess so? Though, time seems to move slower in our world while visiting the other.\nI think.\"\n\n*page_break\n\nWe spend some time walking around. If we have to pass out to visit that other world, I'm not sure where we could go to do that.\n\nI eye a couple of benches as we pass them, but I figure that's a bad choice. I doubt we'd be allowed to sleep there for long.\n\n\"Hmm... Oh, hey!\" Joan perks up. \"That might work.\"\n\n\"Huh?\" I glance at her. \"What would?\"\n\n*page_break\n\n\"This is a janitor's closet,\" I say, sitting down.\n\nIt's a cramped space filled with various chemicals. It smells... clean.\n\n\"Alright, you've only gone in once before right?\" Joan asks.\n\n*choice\n\t#\"Yeah.\"\n\t\t\n\t\t*goto lbl_WhyHere\n\t#\"Can we do this somewhere other than a janitor's closet?\"\n\t\t\n\t\t\"No.\"\n\t\t\n\t\t*goto lbl_WhyHere\n*comment\n\n*label lbl_WhyHere\n\nJoan does some stretches before sitting down, legs crossed.\n\n\"Now,\" she begins. \"It took some doing for me to pull it off the first time, but it's\nnot as hard as you think once you know the trick to it.\"\n\nI nod. \"Alright.\"\n\n\"Basically, just try to enter that other world.\"\n\nI tilt my head. \"How?\"\n\n\"Just... just try.\"\n\n\"But, how?\" I ask.\n\nShe sighs. \"Let me put this another way. Just [i]want[/i] to enter that other world. Really, really hard.\"\n\nI stare at Joan as she closes her eyes and takes a few deep breaths. She suddenly falls backwards a few moments later.\n\nI stare at her unconscious form. \"Alright,\" I mumble. \"I can do that.\"\n\nI'm not quite sure what I'm supposed to be doing, so I'll just take a few deep breaths.\n\nIn. My chest expands slowly. I feel my shoulders rise.\n\nOut. They slump. My chest settles.\n\n*page_break\n\nThe silence makes the haze so much more noticeable. I can feel it hanging all around me, clinging\nto everything.\n\nThe longer I pay attention to it, the more the picture seems to fill in.\n\nThe haze has spread everywhere. It hangs over the city like a polluting cloud.\nIt drapes itself across the buildings and seeps inside them.\n\nI realize it's rising. It feels like it's coming out of the ground, from somewhere deep within the earth.\n\n*page_break\n\nI feel strange.\n\nI can feel those depths the haze comes from.\n\nIt feels like I'm standing at the height of a tall cliff, looking over the edge.\n\nIt's like I'm about to fall in.\n\n*page_break\n\n\"So in other words,\" Joan says. \"It doesn't really matter where we start looking. So long as we keep walking we'll\nget somewhere eventually.\"\n\n*choice\n\t#\"But how does that even work?\"\n\t\t\n\t\tJoan shrugs. \"How should I know? I can't even figure out how time works in here, let alone SPACE.\"\n\t\t\n\t\tShe stops walking. I don't remember us walking.\n\t\t\n\t\t*goto lbl_DiveIn\n\t#\"Say... do you remember when we started talking? Or when we even got here?\"\n\t\t\n\t\t\"Nope,\" Joan says, suddenly stopping. Had we been walking?\n\t\t\n\t\t*goto lbl_DiveIn\n*comment\n\n*label lbl_DiveIn\n\nOur surroundings vaguely resemble the mall. I'm actually surprised by how open the space is, given the school\nwas so small and narrow.\n\nAnd just like before, things look... strange. Walls are built at strange angles. The various posters and signs\nhanging around the mall look like indecipherable gibberish.\n\nAnd as always, that haze visibly hangs around us.\n\nJoan cracks her knuckles. The air trembles around her.\n\n*page_break\n\nA flash of golden light blinds me.\n\nWhen I can see again, the light is melding around Joan. Some unseen force lifts her off the ground.\n\nLight melds into plates of golden metal. Piece-by-piece, plate-by-plate, a formidable suit of armor forms around her.\nIts much bigger than she is, her body doesn't even come close to filling it.\n\nBlue light circles around her, drifting around her neck. As it wraps around her throat, it suddenly blasts out behind\nher. The light folds into flowing cloth.\n\nI stare slack-jawed.\n\nThe knight from before stands towering over me.\n\n*choice\n\t#\"Wow.\"\n\t\t\n\t\t\"Wow, indeed,\" Joan says.\n\t\t\n\t\t*goto lbl_TheKnightReturns\n\t*if (sklFencing = true) #\"Why do I only get a sword?\"\n\t\t\n\t\tJoan chuckles. \"Hey, I only had my fists the first time I went in! You're way\n\t\tbetter off than I was!\"\n\t\t\n\t\t*goto lbl_TheKnightReturns\n\t*if (sklArchery = true) #\"Why do I only get a bow?\"\n\t\t\n\t\tJoan chuckles. \"Hey, I only had my fists the first time I went in! You're way\n\t\tbetter off than I was!\"\n\t\t\n\t\t*goto lbl_TheKnightReturns\n\t#\"Are you a magic girl?\"\n\t\t\n\t\tJoan shakes her head. \"I don't think so? I need a dress for that.\"\n\t\t\n\t\t*goto lbl_TheKnightReturns\n*comment\n\n*label lbl_TheKnightReturns\n\nHer voice sounds strange from within the suit, it's still hard to make out tone, but it actually does sound\nvaguely feminine to me.\n\nOr maybe it just seems that way now that I know the knight is a girl.\n\n\"Are you ready?\" The knight boldly proclaims. \"Let us go forth to smite the wicked!\"\n\nAaaand the feminine undertone is gone.\n\n*page_break\n\nWe start making our way into the mall's otherworld. \"Why are you talking like that?\"\n\n\"It's... difficult to explain. I think.\"\n\n\"Try me.\"\n\nJoan shakes her head. \"It's too much information too soon. I promise you'll get an explanation later.\"\n\nShe suddenly takes off.\n\n\"Okay...?\" I follow silently, pouting.\n\n*page_break\n\nWe're walking along the first floor. I can see railing above us, and even more railing above that.\n\nIn fact, I can see that there is floor after floor above us, just stretching on and on. If I look\nstraight up, I can faintly make out some very distant sunlight streaming down toward us.\n\nI imagine that's a glass ceiling, though it's so far away I can't make it out at all.\n\nLooking around, I don't see any obvious way we could climb up. There's no escalators or stairs\nanywhere in sight.\n\n*page_break\n\nAs we move forward, the mall just seems to stretch on. Various shops line the walls, all of them are locked up.\nDisplay cases show strange objects.\n\nSome resemble deformed mannequins, wearing ill-fitting clothing with strange patterns and colors.\n\nOthers look like furniture, though warped as if partially melted under a great heat.\n\n\"Be wary,\" Joan says. \"Trouble has arrived.\"\n\nDead ahead, through the thick haze, I make out several figures. They look the same as the ones\nfrom school, though their clothing is more varied.\n\nThey don't look like monstrous versions of students. Rather, they look like regular people.\n\nWell... freakish people.\n\n*if (sklFencing = true)\n\tIt takes a moment, but I manage to will the rapier into my hands.\n*if (sklArchery = true)\n\tIt takes a moment, but I manage to will the bow into my hands.\n*comment\n\n\"There's quite a few of them,\" I note. \"There were hardly any at school.\"\n\n\"I suspect I had killed quite a few by the time you arrived,\" Joan says. \"These things always appear\nin hordes. Regardless, they are quite trivial to deal with. Just don't let them surround you.\"\n\n*if (sklFencing = true)\n\t\n\t\"Right,\" I point my blade forward. \"Let's get started.\"\n\t\n\t\"Right,\" Joan says. \"[i]Let's[/i].\"\n*if (sklArchery = true)\n\t\n\tI draw a shining arrow back. \"I think I'd rather them not get anywhere near me.\"\n\t\n\t\"[i]Yes...[/i],\" Joan says. \"Best of luck with that.\"\n*comment\n\n\n\n\n\n\n*comment ----- REWRITE IN PROGRESS - REMOVE THIS WHEN READY -----\n*comment ----- REWRITE IN PROGRESS - REMOVE THIS WHEN READY -----\n\n*if (sklFencing = true)\n\t\n\tI'm counting over a dozen of them.\n\t\n\tIt's a good thing I have Joan here, otherwise fighting these things would be a doomed effort.\n\tThe only question now is how to play this.\n\t\n\t*choice\n\t\t#Charge forward! I'll give'em everything I've got!\n\t\t\t*label lbl_Charge\n\t\t\t\n\t\t\tI sprint forward. The creatures are still just lingering\n\t\t\tabout. They don't seem particularly sharp.\n\t\t\t\n\t\t\tI focus on one standing a ways ahead of the others. Its body contorts\n\t\t\tto face me.\n\t\t\t\n\t\t\tThat's still unsettling...\n\t\t\t\n\t\t\tI leap forward, and plant my feet on the ground in front of it. I let my momentum carry my\n\t\t\tupper body forward as I move into a stab.\n\t\t\t\n\t\t\tMy blade effortlessly pierces its skull. A little too easily actually, I don't think these things\n\t\t\tare made of particularly tough stuff.\n\t\t\t\n\t\t\tI tear my blade free as that thing crumples to the ground.\n\t\t\t\n\t\t\tThe others are much more active now, and are all rushing toward me in a violent blur.\n\t\t\t\n\t\t\tI don't have much time to react.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#I just have to fight harder!\n\t\t\t\t\t\n\t\t\t\t\tI stab and slash around blindly.\n\t\t\t\t\t\n\t\t\t\t\tFlesh tears, and terrible black ichor fills the air. My assault doesn't last long before one\n\t\t\t\t\tof those things smashes me into the floor.\n\t\t\t\t\t\n\t\t\t\t\tI glance back just long enough to see Joan doing literally nothing from a HUGE distance away.\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_Strike\n\t\t\t\t#I think it's time to fall back...\n\t\t\t\t\t\n\t\t\t\t\tI make some effort to fall back, but those things are on top of me in an instant.\n\t\t\t\t\t\n\t\t\t\t\tI glance back just long enough to see Joan doing literally nothing from a HUGE distance away.\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_Strike\n\t\t\t*comment\n\t\t\t\n\t\t\t*goto lbl_Strike\n\t\t#Be conservative. I'll let them come to me.\n\t\t\t\n\t\t\tI stand in position, waiting.\n\t\t\t\n\t\t\tThose things are mingling around. Not quite focused on anything.\n\t\t\t\n\t\t\tI keep my legs locked. My torso is held ever so slightly low.\n\t\t\t\n\t\t\tThey're still wandering.\n\t\t\t\n\t\t\tMy grip tightens, I can feel a strain in my arm as my muscles tense.\n\t\t\t\n\t\t\tI flinch as Joan speaks into my ear. \"You know they have really bad eyesight right?\"\n\t\t\t\n\t\t\tI glare at her.\n\t\t\t\n\t\t\t\"Just offering some advice.\" She backs away.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Maybe I should charge them?\n\t\t\t\t\t\n\t\t\t\t\t...I can't think of anything else to do.\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_Charge\n\t\t\t\t#How about I charge forward?\n\t\t\t\t\t\n\t\t\t\t\t...I can't think of anything else to do.\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_Charge\n\t\t\t\t#I've got it! I'll charge them!\n\t\t\t\t\t\n\t\t\t\t\t...I can't think of anything else to do.\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_Charge\n\t\t\t*comment\n\t\t\t\n\t\t\t*goto lbl_Strike\n\t*comment\n\t\n\t*goto lbl_Strike\n*comment\n\n*if (sklArchery = true)\n\t\n\tI'm counting over a dozen of them.\n\t\n\tI've got a great advantage here. They aren't aware of me yet. I should be able to pick off quite a few before Joan\n\tneeds to come in and mop up the rest.\n\t\n\t*choice\n\t\t#I'll take my time. I'll fire carefully placed shots to bring them down one by one.\n\t\t\t\n\t\t\tThey don't know I'm here yet, so I've got all day to get this right.\n\t\t\t\n\t\t\tDrawing the arrow back is strange, now that I'm focused on it. Drawing a real arrow back is hard. It requires\n\t\t\ta lot of strength to do it.\n\t\t\t\n\t\t\tBut this bow weighs nothing. Drawing an arrow back is trivial.\n\t\t\t\n\t\t\tJoan talks right into my ear. \"Are you gonna kill one of them, or what?\"\n\t\t\t\n\t\t\tI flinch, and accidentally release an arrow. It sails far over the heads of the creatures.\n\t\t\t\n\t\t\tI glare at Joan.\n\t\t\t\n\t\t\tShe puts her hands up. \"Sorry.\"\n\t\t\t\n\t\t\tI look back, and see those things approaching.\n\t\t\t\n\t\t\tSo much for taking all day.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tI aim and release an arrow. It pierces through one of those thing's skulls.\n\t\t\t\n\t\t\tIt dies immediately.\n\t\t\t\n\t\t\tI take my time and fire again.\n\t\t\t\n\t\t\tThey drop one by one. But they're also moving fast. I've only taken out four or five before they're on\n\t\t\ttop of me.\n\t\t\t\n\t\t\tIt's a good thing Joan is with me.\n\t\t\t\n\t\t\tI glance back.\n\t\t\t\n\t\t\t...She's standing an enormous distance away.\n\t\t\t\n\t\t\t*goto lbl_Strike\n\t\t#I can rapid-fire these glowing arrows, I'll fire off a flurry of them!\n\t\t\t\n\t\t\tI don't hesitate. I barely even aim.\n\t\t\t\n\t\t\tDrawing a normal bow is hard. It takes a lot of strength to do it. And it's time-consuming to nock an\n\t\t\tarrow.\n\t\t\t\n\t\t\tBut the same isn't true for this bow. The arrows appear instantly, and drawing it back is effortless. The bow\n\t\t\tweighs nothing. And neither do the arrows.\n\t\t\t\n\t\t\tA storm of arrows descends on those things. My aim is bad, but those things are clustered together. Most of my shots\n\t\t\thit them one way or another.\n\t\t\t\n\t\t\tAn arrow to the leg. One falls down.\n\t\t\t\n\t\t\tThe arm. Looks painful, but it's standing.\n\t\t\t\n\t\t\tThe head. Dead.\n\t\t\t\n\t\t\tThere's a brief scramble. Those things contort around in confusion, before slowly shifting to face me.\n\t\t\tIn a flash, they're rushing toward me.\n\t\t\t\n\t\t\tIt's unsettling how fast they can move. At least it's easier to land lethal shots as they approach.\n\t\t\t\n\t\t\tA shot to the neck. It falters, writhing on the ground.\n\t\t\t\n\t\t\tThe chest. It slows, before continuing its stride.\n\t\t\t\n\t\t\tThey're nearly on top of me. I won't be able to fight them off at close range.\n\t\t\t\n\t\t\tIt's a good thing Joan is with me.\n\t\t\t\n\t\t\tI glance back.\n\t\t\t\n\t\t\t...She's standing an enormous distance away.\n\t\t\t\n\t\t\t*goto lbl_Strike\n\t*comment\n\t\n\t*goto lbl_Strike\n*comment\n\n*label lbl_Strike\n\n\"Hey-\" A foot collides with my stomach. The air is knocked out of me.\n\nDid she ditch me?\n\nThey're all on me. A violent storm of punches and kicks fall upon me.\nI can't even tell what's happening.\n\nIt hurts.\n\n*page_break\n\nI feel strange. The pain lessens. My body feels weightless.\n\n*page_break Is this what death feels like?\n\nJoan is standing over me. She's not the knight though, she's just her regular self.\n\nJanitorial supplies surround us once again.\n\n*choice\n\t#\"We're in the closet.\"\n\t\t\n\t\t*if (sex = \"ma\")\n\t\t\t\n\t\t\tJoan raised a brow. \"What do you mean 'we'?\"\n\t\t\t\n\t\t*if (sex = \"fe\")\n\t\t\t*set joanFlirt + 1\n\t\t\t\n\t\t\t\"I don't know about 'we'.\" Joan chuckles. \"But, I could work with you on that if you wanted.\"\n\t\t\t\n\t\t*comment\n\t\t\n\t\tI lie there for a moment before tilting my head. \"What?\"\n\t\t\n\t\tJoan reaches down and takes my arm. \"Don't worry about it.\" She drags me to my feet.\n\t\t\n\t\t*goto lbl_MundaneSurroundings\n\t#\"How did I get back here?\"\n\t\t\n\t\t\"You, uh... 'died'.\" Joan smiles sheepishly. \"It's not permanent in that other world. You die there... you come\n\t\tback here.\"\n\t\t\n\t\tI start to sit up, before Joan grabs my arm, and pulls me to my feet.\n\t\t\n\t\t*goto lbl_MundaneSurroundings\n\t#\"Did you fucking let me die?\"\n\t\t\n\t\tJoan tries to suppress a laugh. \"I'm Sorry?\"\n\t\t\n\t\tI stagger to my feet. \"Seriously?\"\n\t\t\n\t\t*goto lbl_MundaneSurroundings\n*comment\n\n*label lbl_MundaneSurroundings\n\nI'm glaring at Joan as we stumble out of the broom closet.\n\n\"Look, I needed to get a feel for how good you were,\" Joan says. \"It actually takes a while to\nget a grip with that other world. I dived in nearly a dozen times before I killed even one of those\nthings. And I only got that kill after someone taught me something!\" She turns to face me.\n\"So, you're already ahead of the game. You just need to brush up your skills a bit.\"\n\nI cross my arms. \"You don't say. And how exactly would I do that?\"\n\nShe shrugs. \"I took a boxing class.\" She glances at her hands. \"Worked out pretty well for me.\" Joan eyes\nme up and down for a moment. \"Seeing as you can\n*if (sklFencing = true)\n\tcreate a sword out of thin air, I'm assuming you've had some sort of sword training?\n*if (sklArchery = true)\n\tcreate a bow and arrow out of thin air, I'm assuming you've practiced archery?\n*comment\n\nI nod. \"Yeah, you could say that.\"\n\n\"Perfect!\" Joan beams at me. \"Keep practicing some moves, and you'll get even stronger in the other world! After that\nI'll teach you the secret to getting [i]really[/i] strong in there!\"\n\n\"Right, well...\" I stomp away from Joan, back towards her car. \"I think this has been a full day, so I'm\nready to go home.\"\n\n\"Sure, sure,\" Joan says.\n*if (sklArchery = true)\n\t\"Though, one thing? You might want to take a class on some other form of fighting. Don't get me wrong...\" She puts her hands up.\n\t\"Archery is cool and all, but you might want to learn how to fight up close and personal. Consider at least supplementing that\n\ttraining, K?\"\n\t\n\tI nod absently. \"Sure.\"\n*comment\n\n*page_break\n\nSo I need training, huh?\n\nMy thoughts drift to Adam Rourke. He taught me to use a\n*if (sklFencing = true)\n\tsword.\n*if (sklArchery = true)\n\tbow.\n*comment\nBut he teaches people how to use plenty of other weapons too.\n\nIf I could generate a weapon from his training, then I could probably make more from other forms\nof training too.\n\nNot to mention Joan was able to summon a whole suit of armor. I wonder if I could learn to do something like that.\n\n*page_break\n\nThe day has worn on for a while, I need to get back to Raven's for now. I'll go see Adam tomorrow.\n\n*page_break\n\n*goto_scene 006_Training\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*comment ----- REWRITE IN PROGRESS - REMOVE THIS WHEN READY -----\n*comment ----- REWRITE IN PROGRESS - REMOVE THIS WHEN READY -----\n*comment ----- REWRITE IN PROGRESS - REMOVE THIS WHEN READY -----", "006_training": "\n\n\n\n\n\n\nI received a text before I went to sleep last night.\n\nJoan wants me to meet her on the weekend. She wants to try diving back into Skylong mall,\nfor real this time. 'Not as just some test to see how fast I'll die.'\n\nLiterally her words, verbatim.\n\nBut, that's still a few days off. She wants me to spend some time training.\n\n*page_break\n\nBy learning to use a\n*if (sklFencing = true)\n\tsword, I was able to generate one in the other world. I wonder if I could learn to make other weapons...\n*if (sklArchery = true)\n\tbow, I was able to generate one in the other world. I wonder if I could learn to make other weapons...\n*comment\n\nThen again... there's also my aunt Raven. She knows how to use magic, she even showed me a thing or two. Once.\n\n...Years ago.\n\nThere has to be something she could teach me that's applicable to that other world, right?\n\n*choice\n\t#Let's go visit Adam. I think I can learn to generate another weapon if I really try.\n\t\t*gosub trial_end\n\t\t*goto lbl_AdamTraining\n\t#Time to become a wizard!\n\t\t*gosub trial_end\n\t\t*goto lbl_RavenTraining\n*comment\n\n*page_break\n\n*label lbl_AdamTraining\n\nAnd so, I find myself back at Adam's lodge after school today.\n\nIt's a bit busier than it was when I last visited.\n\nI can see a couple of regulars duking it out in a sandy pit. I see a newbie being shown how to properly\nhold a sword by one of the older members.\n\nHe looks pretty young, I suspect he'll drop out once he realizes weapon training is actually kind of boring.\n\nAdam himself is standing nearby. Doesn't look like he's doing anything in particular right now, which is fortunate.\nI didn't mention to him that I wanted to practice today.\n\n*page_break\n\n*if (sklFencing = true)\n\t\n\tI know how to use a sword, but its not the only thing I could learn.\n\t\n\tGiven that I can apparently materialize a sword just by knowing how to use one, the same is probably true of a bow.\n\tIf I could summon one of those, I'd have a ranged attack to balance out my blade.\n\t\n*if (sklArchery = true)\n\t\n\tI know how to use a bow, which is great when I'm at a distance, but not so much up close.\n\t\n\tAs I really, really didn't need to learn the hard way.\n\t\n\tI could always ask for some fencing lessons. If learning to use a bow allowed me to materialize a bow from\n\tnothing, I'm sure it would work the same for a sword.\n\t\n*comment\n\nThat was an oddity actually. She said she was able to make that suit of armor after practicing boxing for a while, but how\nmuch sense does that really make?\n\nIt seemed like the armor was more a reflection of the personality she adopted while in that other world. Except,\nshe only acted that way after she donned the suit.\n\nSo many questions, I should just take this one step at a time.\n\n*page_break\n\nI wave to Adam as I approach. \"Hey!\"\n\n\"Hey there, kiddo.\" he smiles at me. \"Glad you could swing by.\"\n\n\"So... how'd things go yesterday?\"\n\nI tilt my head. \"Huh?\"\n\n\"You were meeting a girl, right?\"\n\nOh. \"Fine.\"\n\nHe nods, but pauses as if he expects me to continue. \"Just fine?\"\n\nI shrug. \"It was weird, but I guess she's cool\"\n\n\"Hm.\" Adam briefly looks... concerned. \"Things are pretty bad right now... people aren't always themselves.\"\n\nI stare at him. \"...yeah?\"\n\n\"Just make sure you don't put yourself in a dangerous situation,\" Adam says. \"Alright?\"\n\n\"She's [i]fine[/i],\" I respond. \"I promise.\"\n\n\"Fine fine... I just want to make sure you're keeping safe.\"\n\n\"Well, it's a good thing I came here today,\" I say. \"I think you can help me with just that.\"\n\n*page_break\n\n\"So,\" Adam begins. \"What were you hoping to work on today?\"\n\n*choice\n\t*if (sklFencing = true) #\"Actually, I'd like to try out the bow.\"\n\t\t*set sklFencingFirst true\n\t\t\n\t\tAdam raises a brow. \"Really?\" He smiles. \"Well, I can definitely help you with that.\"\n\t\t\n\t\t*goto lbl_TrainingBow\n\t*if (sklArchery = true) #\"Can I try out one of the swords? I wanted to try something fresh.\"\n\t\t*set sklArcheryFirst true\n\t\t\n\t\tAdam smirks. \"Honestly, I'm still surprised you didn't ask to learn to use a sword first. The kids\n\t\tthese days always seem to prefer them.\"\n\t\t\n\t\tI nod. \"Swords are cool.\"\n\t\t\n\t\t\"Not as cool as archery,\" Adam mumbles as he looks around. \"Alright, let me find you a practice sword,\n\t\tand we can get started.\"\n\t\t\n\t\t*goto lbl_TrainingSword\n*comment\n\n\n\n\n*label lbl_TrainingSword\n\n*if (sklFencing = true)\n\t\n\tIt doesn't take us long to get set up, I've done this at least a dozen times already.\n\t\n\tWe're outfitted in some body armor to protect us from stabs. The blades are dulled, but they [i]are[/i] made\n\tof metal. And rapiers are made for thrusting. They can still be dangerous if one of us stabs hard enough.\n\t\n\t*page_break\n\t\n\tWe set out to a small grassy space set aside for practice. The ground isn't quite even here, and there's\n\tquite a few large rocks left around.\n\t\n\tThey don't train people to enter fencing tournaments here, so they like to slip in minor things to mess\n\tpeople up.\n\t\n\tOut here, that means being careful not to trip while fighting. You can't always expect nice, even footing\n\tduring a fight. At least, that's what the actual hunters have told me.\n\t\n\t*page_break\n\t\n\tWhen I came out here, I saw myself spending the better part of an hour practicing, maybe two.\n\t\n\tAdam and I wind up exchanging blows until sunset. I've practiced the basics for ages. Stances, guards, strikes.\n\tWe still briefly went over them, but today was almost non-stop sparring.\n\t\n\tI'm absolutely exhausted by the time we stop. So is Adam, but it felt good to come out here.\n\t\n\tI kind of want to stay, but I'm not sure Raven will be cool with that. It'll already be dark before I get home,\n\tand I didn't tell her I'd be gone this long.\n\t\n\t*set sklFencingLvl + 1\n\t\n\t*goto lbl_PostTraining\n*else\n\t\n\tAdam eventually brings some black body armor over to me. It feels like it's made out of some sort of tough\n\tcloth material. I've seen other people wearing it while sparring, but I've never worn it myself.\n\t\n\tI take a deep breath. There's a first time for everything I suppose.\n\t\n\t*page_break\n\t\n\tI feel a little awkward as we step onto a mat Adam has set up in the training area. It's flat and even, though\n\tI've noticed a lot of training is done on uneven terrain. They don't train for tournaments, but for fighting\n\tactual monsters, so Adam tries to keep things less stable.\n\t\n\tRight now he's probably just going easy on me since it's my first time.\n\t\n\t*page_break\n\t\n\tWhen we came out here, I saw myself spending the better part of an hour practicing, maybe two.\n\t\n\tIt's nearly sunset, and Adam has been covering the basics, showing me various stances, strikes, and guards all\n\tday. I feel exhausted. My entire body is sore.\n\t\n\tI can see Adam is straining too, but I can still see enthusiasm pouring off him.\n\t\n\tWe barely touch on actual sparring. I'd actually like to spend more time on that, but it's just not\n\tan option right now.\n\t\n\tI told Raven I'd be out here for 'a while', not all day. I still haven't even called.\n\t\n\tI've made plenty of progress for today regardless. I don't know if it would be enough to summon a weapon in that\n\tother world, but its enough for today.\n\t\n\tI've still got a couple of days before the weekend, I can keep training if I really feel that it's necessary.\n\t\n\t*set sklFencing true\n\t*set sklFencingLvl + 1\n\t\n\t*goto lbl_PostTraining\n*comment\n\n*comment //////////\n\n*label lbl_TrainingBow\n\n*if (sklArchery = true)\n\t\n\tIt feels like it's been ages since I've come out here.\n\t\n\tWooden targets are set up in the distance. I can already see damage done by people practicing before I arrived.\n\tSeveral arrows are laid out on the table. I take a moment to gather some in a small quiver worn at my hip.\n\t\n\tAdam almost gleefully takes a place to my right. The first time I ever came out here, I saw him practicing with\n\ta bow. It's always been his favorite.\n\t\n\tIt feels like I've gone through the motions a million times by now.\n\t\n\t*page_break\n\t\n\tI grab an arrow from the quiver.\n\t\n\tNock it.\n\t\n\tDraw it back...\n\t\n\t...And release.\n\t\n\t*page_break\n\t\n\tIt sails perfectly through the air, striking a target at near dead center. I'm not surprised by my aim, but only because it wasn't that hard\n\tof a shot. After several practice rounds to make sure I'm not rusty, we head off to the more advanced course.\n\t\n\t*page_break\n\t\n\tI doubt more traditional archery practice involves moving targets. But for hunters, monster hunters that is, they try to train for the worst.\n\t\n\tThe more advanced field uses the same wooden targets, but they're installed on machinery that keeps them moving around. Some sway back-and-forth,\n\tothers move to-and-fro.\n\t\n\tEither way, they're much harder to hit.\n\t\n\tAnd in fact... I miss most of my shots. Even on the close ones.\n\t\n\t\"Having some trouble?\" Adam asks.\n\t\n\t\"Just a little rusty.\" Admittedly, it's not like I was a master with a bow before, but I seem to be doing worse than usual.\n\t\n\tIt really has been too long since I've come out here.\n\t\n\t\"Well then,\" Adam says. \"We'll just have to shave some of that rust off.\"\n\t\n\t*page_break\n\t\n\tAnd we do. And then some.\n\t\n\tWe practice and practice for ages. My arms are screaming at me to stop by the end of the day.\n\t\n\tI figured I'd only be up here for an hour or so at first, but now it's nearly sunset. I wouldn't mind\n\tstaying a little longer, for Adam's company at least. I doubt I could handle more training.\n\t\n\tBut, I didn't tell Raven I'd be out here this long, and it'll be dark before I even make it back.\n\t\n\tI made some excellent progress today. I'm confident my skills will be far sharper when I\n\tdive back into that other world.\n\t\n\tAnd, I still have a couple more days left to practice if I feel I really need to.\n\t\n\t*set sklArcheryLvl + 1\n\t\n\t*goto lbl_ArcheryCheck\n*else\n\t\n\tI actually need some help from Adam when I'm gearing up.\n\t\n\tHe ends up handing me a quiver that seems a little too small. I eventually realize it's worn on my hip instead of my back.\n\tHe also gives me some kind of arm guard, I'm not sure what it's for.\n\t\n\tAdam seems almost giddy as we begin. I've learned how to use a sword from him, but what he really loves is the bow.\n\tHonestly, I'm not sure how this is my first lesson from him. He's been pushing for me to learn archery from him for\n\tages.\n\t\n\tI guess swords are just cooler.\n\t\n\t*page_break\n\t\n\t\"Aaaand, like that.\" Adam releases my hand, and I release the arrow.\n\t\n\tThe arrow goes sailing towards a wooden target in the distance. It clips the side of it before bouncing against\n\tthe ground.\n\t\n\t\"Now you try it on your own,\" Adam says.\n\t\n\tIt's a little awkward to 'nock' the arrow. Or whatever Adam called it. I keep the bow pointed straight down as\n\tI struggle to get the arrow into position.\n\t\n\t\"Try to draw the arrow back as you raise the bow up.\"\n\t\n\tI draw the arrow back and aim the bow straight ahead in one, mostly, smooth motion.\n\t\n\t\"And release.\"\n\t\n\tI release the arrow, and it flies freely. It doesn't hit anything but the ground a few feet in front of a target.\n\t\n\t\"Very good.\" Adam seems pleased, despite me not having really done anything. \"We'll just keep at that until you can\n\tgo through the motions instinctively.\"\n\t\n\t*page_break\n\t\n\tAnd we do just that. Again and again. Arrow after arrow.\n\t\n\tWhen I initially came out here, I figured I'd be practicing for an hour or so.\n\t\n\tIt's nearly sunset by the time I'm getting ready to leave. My arms feel AWFUL.\n\t\n\tI feel bad for not calling Raven earlier. She knew I'd be out here, but I didn't say it would be this long.\n\t\n\tIt'll be dark before I even get home.\n\t\n\t\"You should come back up here soon,\" Adam says. \"We can keep working on your form.\"\n\t\n\tI nod. \"Sure. Maybe not tomorrow though?\"\n\t\n\tHe chuckles. \"Fine, fine. I'll get in touch later.\"\n\t\n\t*set sklArchery true\n\t*set sklArcheryLvl + 1\n\t\n\t*goto lbl_ArcheryCheck\n*label lbl_ArcheryCheck\n\n*label lbl_PostTraining\n\t\n*page_break\n\nI'm pretty lucky. The bus back to Raven's neighborhood arrived just as I reached the bus stop.\n\nIt'll still be dark before I get back.\n\nI pull out my phone as soon as I get seated.\n\n*page_break\n\n'Sorry I didn't message you sooner.' -You-\n\nI get a call immediately.\n\nRaven speaks the moment I put the phone to my ear. \"I was about to call. Where are you?\"\n\n\"The bus. I'm headed back right now.\"\n\n\"You were still at Adam's?\" she asks.\n\n\"Yeah,\" I yawn. \"We didn't really hang out though. We just spent all day training. I'm, uh... a bit sore.\"\n\n*page_break\n\nThe ride back to Raven's is long.\n\nThe sun sets. The bus is nearly empty. I watch the city pass me by.\n\n*page_break\n\n*if (fVampireSeed = true)\n\t\n\tAs soon as I step off the bus, I breath in the night air. It feels good.\n\t\n\tIt's weird, but even after all that training, I feel energized. My mind is clear, and my senses\n\tfeel sharp.\n\t\n\tI walk to Raven's place with a slight spring to my step. I'm enjoying the walk.\n\t\n\tThere's some weird desire buried down to prowl around for a bit. I can't quite describe it.\n\t\n\tUnfortunately, I do eventually arrive at her store, and I know I have to settle in for the night.\n\t\n\t*goto lbl_WhatLiesDormant\n*else\n\t\n\tI'm sluggish as I'm walking to Raven's. I trained FAR too much today. I'll need to have a little more\n\trestraint in the future.\n\t\n\tI want to get better, but I won't be able to fight in that other world if I'm completely exhausted when\n\tI dive in.\n\t\n\tI'm relieved when I finally get back to her place. I plan to eat and crash as soon as possible.\n\t\n\t\"Ugh...\" I still have school tomorrow.\n\t\n\t*goto lbl_WhatLiesDormant\n*label lbl_WhatLiesDormant\n\n*set style \"warrior\"\n\n*goto lbl_EndOfTraining\n\n\n\n*comment ---------------------------------------------------------------------------------------------------------------------\n\n\n\n\n*label lbl_RavenTraining\n\nWhen I get back from school, I see the store isn't particularly busy. I doubt Raven would\njust close up on my account, but if she's free this might be the best time to ask.\n\nI can hear Raven working on something in the back. As I stop through the door, the bell rings\nand she immediately steps back out.\n\n\"Back already?\" She tosses a pair of gloves on the counter.\n\n\"Yeah...\" I look around. \"Have you been busy?\"\n\n\"I've just been working on some orders in the back,\" Raven says, as she moves behind the counter\nbefore looking at something on one of the back shelves.\n\nI nod. \"Cool...\"\n\nNeither of us say anything. Raven is looking for something-or-other, and I'm kinda just\nstanding here.\n\nHey, Raven?\" I begin. \"could you... teach me a little about magic.\"\n\nShe pauses for a moment, before turning to look at me. \"You want to know more about making enchantments?\"\n\n\"Yeah,\" I say. \"Or...whatever else you have to teach.\"\n\n\"Uh, sure.\" One of her brows quirk up. \"Is there any particular reason you want to learn more?\"\n\n\"I figure I could help you around the shop.\"\n\nI quickly add, \"It might help to have a second set of hands for making that stuff.\"\n\n\"You shouldn't worry about that right now,\" Raven says. \"You've got a lot going on.\"\n\n\"I just...\" I struggle to think of the right words. \"I need the distraction right now.\"\n\nRaven's quite for a long while after that.\n\n\"It would help me. A lot.\"\n\nRaven frowns. I thought she'd be more open to teaching me, but she actually seems troubled\nby the idea of it.\n\nI consider backpedaling out of the conversation. Maybe Adam can just teach me something new.\n\n\"I'll teach you whatever you want after I close in a few hours.\"\n\nOh.\n\nI smile. \"Thanks, Raven!\"\n\n*page_break\n\n\nI linger around upstairs for the next few hours.\n\nI've been thinking about Raven.\n\nHer store is only open Tuesday through Thursday. The hours aren't particularly long.\nI'm not sure how much money she makes off this place. I get the sense she earns it somewhere else.\n\nRaven was always a little mysterious. When she wasn't tending the store, she was just... gone.\n\nShe's been more available lately after everything that happened, but it wasn't uncommon to lose touch with her for days to weeks at\na time. She'd unexpectedly close her shop and that would be it. I knew I wouldn't be seeing her for a bit.\n\nRaven is always kinda cagey when I ask her about it too. She won't tell me what she's up to, and she won't say why she won't\ntell me what she's up to.\n\nMom and dad... I don't know what their deal was with her. They didn't like me asking Raven questions about where she went.\nThey seemed to know themselves, but didn't want to tell me.\n\nThere was always something odd between Raven and my parents. A certain... tension.\n\nThey cared about each other. My mom and her especially, they're sisters after all. But at the same time,\nit was almost like they didn't approve of something.\n\nThey didn't like it when she disappeared.\n\nThey really didn't like it when Raven once taught me a little about magic. I figured out soon after I should probably\nkeep any lessons she gave me just between us.\n\nNot that it matters. I never wound up picking up on how to actually use magic.\n\nI wonder what they were so worried about. she was just showing me how to make a few enchanted trinkets.\nIt wasn't like I was learning to start fires with my mind or something.\n\n*page_break\n\nI hear the bell chime downstairs. And then the click of a lock.\n\nRaven calls out to me. \"Come here, let's get started!\"\n\n*page_break\n\nThe back of her store is a bit of a mess. There's just so many things.\n\nAnd that is all I can call them. Things.\n\nWooden things. Blocky things. Sharp, metal things. Just shapes, sometimes runes are carved into them,\nsometimes they're plain.\n\nThe plain ones will usually be carved up later by Raven.\n\nShe has a workspace set up. A long metal table with various tools and instruments on it. They mostly range from paint\nbrushes to various small knives. The blades are tiny, but they're well suited to carving symbols into her various items.\n\n\"So... you're hoping to learn more?\" Raven asks. \"I know quite a bit about making rune charms.\"\n\nI shake my head. \"Those 'runes' aren't my thing.\" I never really told her, but I think those runes are a joke.\n\nIt's not like her other magic. They all seem kind of useless, and I'm not really convinced\nthey even work. With most magic, the effect is immediate and obvious. With those runes, who knows? All she\ndid was carve some symbols in and say some gibberish, and that was it.\n\nThey seem like the kind of gimmick that relies on superstition and wishful thinking.\n\n*page_break\n\n[i]'this charm will help you find your soulmate!'[/i]\n\n[i]'Really, how?'[/i]\n\n[i]'Just wear it, and you'll run into them sooner or later.'[/i]\n\nA while later and...\n\n[i]'O.M.G. It totally worked! I just met a guy!'[/i]\n\n[i]'See, I told ya.'[/i]\n\n*page_break\n\nComplete nonsense.\n\n*page_break\n\n\"Well,\" Raven begins. \"What do you actually want to learn?\"\n\n\"Uh...\"\n\nActually, I don't know that much about magic.\n\nRaven stares at me expectantly.\n\n*choice\n\t#\"Something I can help people with.\"\n\t\t\n\t\tRaven just gives me the strangest look.\n\t\t\n\t\t\"Or... whatever,\" I mumble.\n\t\t\n\t\tEventually she asks, \"Help people in what way?\"\n\t\t\n\t\tI shrug. \"Any way I can.\"\n\t\t\n\t\tRaven studies my face for a moment before saying, \"I might know something.\"\n\t\t\n\t\t*goto lbl_YourReason\n\t#\"Something I can defend myself with.\"\n\t\t*set fDefendMyself true\n\t\t\n\t\tRaven pales.\n\t\t\n\t\tAdmittedly, that may have sounded bad.\n\t\t\n\t\t\"Defend yourself?\" she asks. \"From who?\"\n\t\t\n\t\tI shrug. \"Just... I don't know. Anything.\"\n\t\t\n\t\tRaven looks gravely concerned. She looks to the side, suddenly interested in the various doodads lining\n\t\ther workshop's wall.\n\t\t\n\t\tI look at the door. \"...Forget about it. It's not important.\"\n\t\t\n\t\t\"Wait.\" Raven sighs. \"I can teach you something. It might keep you safe.\"\n\t\t\n\t\t*goto lbl_YourReason\n*comment\n\n*label lbl_YourReason\n\n*page_break\n\nRaven gathers up a large water-filled pot, a metal disk with runes engraved on it, three metal cylindrical bottles, and numerous different herbs.\n\n\"I learned magic from my grandmother,\" Raven says. \"She knew a lot. I can pass something onto you too.\"\n\nRaven places something into my hand. \"You'll need an anchor. At least for now.\"\n\nShe gave me some sort of steel ball. I roll it back and forth in the palm of my hand. Various runes are intricately carved\nacross its surface.\n\n\"Open your mind up to it,\" Raven says.\n\nI give her a puzzled look. \"What?\"\n\n\"Just focus on it. Mentally.\"\n\n*temp tmp_Tries 0\n\n*label lbl_AnchorFail\n\n*choice\n\t#Focus intently on the sphere.\n\t\t*set tmp_Tries + 1\n\t\t\n\t\tI stare intently at the sphere.\n\t\t\n\t\t\"No, no.\" Raven shakes her head. \"Don't just stare at it. Open yourself up to it.\"\n\t\t\n\t\t*goto lbl_AnchorFail\n\t#Squeeze the sphere.\n\t\t*set tmp_Tries + 1\n\t\t\n\t\tI tighten my grip around the sphere. Those engraved runes are quite deep. I can feel\n\t\tthem against my skin.\n\t\t\n\t\tRavens shakes her head. \"It's not a physical thing. Think deeper.\"\n\t\t\n\t\t*goto lbl_AnchorFail\n\t*hide_reuse #Study the sphere\n\t\t*set tmp_Tries + 1\n\t\t\n\t\tI carefully look over each rune. I have no idea what any of them mean, but they're spaced out in\n\t\tsuch a way that implies a specific reading of them.\n\t\t\n\t\tRaven waits quite a while before speaking up. \"If you're looking for something on the surface of that sphere,\n\t\twe're going to be here a while. You have to let it in.\"\n\t\t\n\t\t*goto lbl_AnchorFail\n\t#Think about the sphere.\n\t\t\n\t\tI look at the sphere, but don't otherwise give it much attention. What does Raven want me to do?\n\t\t\n\t\tIt's just a metal ball with weird lettering carved into it. I don't see anything obvious I could do with it.\n\t\t\n\t\tAs I stand there, thinking about it, I find imagery of the sphere easily worming its way into my mind's eye.\n\t\tI'm not thinking about the sphere's characteristics. Not its shape, its texture. or the runes adorning it.\n\t\t\n\t\tJust the sphere's... something. Some trait buried deep inside it.\n\t\t\n\t\tAn awareness bubbles up to my consciousness. My surroundings feel different. It's as if the atmosphere of\n\t\tthe room changed some time ago, and I'm only just now noticing.\n\t\t\n\t\tRaven nods approvingly. \"Good. You'll have an easier time so long as you keep practicing.\"\n\t\t\n\t\t*goto lbl_AnchorPass\n*label lbl_AnchorPass\n\n*page_break\n\n\"Wait, what just-\" And the feeling fades.\n\nRaven sets the water-filled pot on top of the metal disk. \"Rune magic requires preparation to make work. That anchor will\nhelp you learn a sort of magic that can be drawn at will. Eventually.\"\n\nI furrow my brows. \"Eventually?\"\n\n\"Right now I'm just teaching you brewing,\" she says. \"But it does require a touch of magic.\"\n\n\"Alright?\" I glance at the metal sphere. \"But I don't know any magic...\"\n\n\"We'll work on that. Starting now.\"\n\n*page_break\n\nA few minutes later and the pot is boiling. Somehow that rune covered disk is heating the pot, but the disk itself\ndoesn't feel hot to the touch.\n\n\"You have to draw force from will. Reality from fantasy.\" Raven pauses. \"That's the flowery version of it anyway.\nJust focus on wanting something to happen hard enough, and it'll happen.\"\n\nI'm standing in front of the boiling pot. Various herbs are scattered around it. \"And what am I supposed to think\nof?\"\n\n\"Well,\" Raven begins. \"We're making a potion to restore your vigor. So... just think healthy thoughts.\"\n\nI stare at her. \"I don't think-\"\n\nRaven swats my arm. \"Don't question it. Just try it.\"\n\nI look at the pot. With a sarcastic wave of my arm I say, \"I summon... positive energies... or whatever...\"\n\nOut of the corner of my eye, I faintly see Raven smirk. \"Okay. Terrible effort. How about we take this seriously this time?\"\n\n\"Fine,\" I respond.\n\n\"Good,\" Raven says cheerfully. \"Best of luck.\" She sits down at a nearby chair and starts reading a magazine.\n\nI tilt my head. \"...Are you not helping?\"\n\n\"Nope. I'm sure you can figure this out.\"\n\n*temp tmp_Focused false\n*temp tmp_Tasty false\n*temp tmp_Concept false\n*temp tmp_Ready false\n\n*label lbl_Brewing\n\n*choice\n\t*selectable_if (tmp_Focused = false) #Think of the sphere.\n\t\t*set tmp_Focused true\n\t\t\n\t\tI let the sphere drift back into my mind. Once again, the world shifts. Strange ideas and realizations\n\t\tcome into focus.\n\t\t\n\t\t*goto lbl_Brewing\n\t*hide_reuse #Add the herbs.\n\t\t*set tmp_Tasty true\n\t\t\n\t\t\"What are these for?\" I ask.\n\t\t\n\t\t\"Hm?\" Raven glances up from her magazine \"Oh!\" Raven chuckles. \"They add flavor.\"\n\t\t\n\t\t*goto lbl_Brewing\n\t*selectable_if (tmp_Ready = false) #Imagine I'm making a healing potion.\n\t\t\n\t\tI think about making a potion really hard. Something that will heal me.\n\t\t\n\t\tIf I drink this water, it will heal me.\n\t\t\n\t\t*if (tmp_Focused = false)\n\t\t\t\n\t\t\t...I don't think anything is happening.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t*goto lbl_Brewing\n\t\t*if (tmp_Focused = true)\n\t\t\t\n\t\t\t*if (tmp_Concept = false)\n\t\t\t\t*set tmp_Focused false\n\t\t\t\t\n\t\t\t\tI feel an ocean of possibilities open up to me inside my mind.\n\t\t\t\t\n\t\t\t\tThere's so many, it's completely overwhelming.\n\t\t\t\t\n\t\t\t\tMy altered senses fall away. My focus on the sphere is gone.\n\t\t\t\t\n\t\t\t\t...Something isn't right. I need to rethink my approach.\n\t\t\t\t\n\t\t\t\t*goto lbl_Brewing\n\t\t\t*if (tmp_Concept = true)\n\t\t\t\t*set tmp_Ready true\n\t\t\t\t\n\t\t\t\tThat concept, barely tangible, shifts. It feels different now.\n\t\t\t\t\n\t\t\t\tThere's a certain edibility to it. Like I could reach out right now and\n\t\t\t\tconsume it.\n\t\t\t\t\n\t\t\t\tI'm close. There's just one step left.\n\t\t\t\t\n\t\t\t\t*goto lbl_Brewing\n\t\t\t*comment\n\t\t\t\n\t\t\t*goto lbl_Brewing\n\t\t*comment\n\t\t\n\t\t*goto lbl_Brewing\n\t*selectable_if (tmp_Concept = false) #Think about health and vigor as a concept.\n\t\t\n\t\tHealth and vigor...\n\t\t\n\t\tBoth concepts could refer to illness. Being free from disease. But, maybe it goes\n\t\ta little further than that.\n\t\t\n\t\tIt's not just merely not being sick. It's also being... well. Feeling good and having energy.\n\t\t\n\t\t*if (tmp_Focused = false)\n\t\t\t\n\t\t\t...I don't think this is working.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t*goto lbl_Brewing\n\t\t*if (tmp_Focused = true)\n\t\t\t*set tmp_Concept true\n\t\t\t\n\t\t\tSomething bubbles up to the surface of my mind. A concept, but its tangible. It's quivering\n\t\t\tand fragile, like it might fall away at any moment.\n\t\t\t\n\t\t\t*goto lbl_Brewing\n\t\t*comment\n\t\t\n\t\t*goto lbl_Brewing\n\t#Try to infuse the boiling water with magic.\n\t\t\n\t\t*if (tmp_Focused = false)\n\t\t\t\n\t\t\tI make vague gestures at the boiling pot while tightly gripping the sphere.\n\t\t\t\n\t\t\tI don't think this is working.\n\t\t\t\n\t\t\t*goto lbl_Brewing\n\t\t*if (tmp_Concept = false)\n\t\t\t*set tmp_Focused false\n\t\t\t\n\t\t\tI think hard about enchanting the water with magic. Something in my mind opens up, and I'm\n\t\t\toverwhelmed with concepts and ideas for what that could mean.\n\t\t\t\n\t\t\tIt's so overwhelming in fact... I lose my focus!\n\t\t\t\n\t\t\t*goto lbl_Brewing\n\t\t*if (tmp_Ready = false)\n\t\t\t*set tmp_Focused false\n\t\t\t*set tmp_Concept false\n\t\t\t\n\t\t\tI maneuver the concept I'm holding in my mind. I want to put it in the boiling water, but I can't\n\t\t\tseem to make it work.\n\t\t\t\n\t\t\tMy focus shifts. The concept bleeds away.\n\t\t\t\n\t\t\tI lost it...\n\t\t\t\n\t\t\t*goto lbl_Brewing\n\t\t*if (tmp_Ready = true)\n\t\t\t\n\t\t\tSomething clicks, and I can feel my concept diffusing into the water. I know it's in there now, though the\n\t\t\twater doesn't look any different.\n\t\t\t\n\t\t\t*goto lbl_MagicForce\n\t\t*comment\n\t\t\n\t\t*goto lbl_Brewing\n*label lbl_MagicForce\n\n*page_break\n\nI glance over at Raven.\n\nRaven sits nearby, her back turned to me as she reads a magazine. \"Keep at it. You'll figure it out eventually.\"\n\nI look over her shoulder at the magazine she's reading. It's strange.\n\nI keep seeing clothing being modeled, but it looks... foreign? If that's even the right word for it.\nThe models looks pretty strange too. I'm spotting a few tails and animalistic ears in there.\n\nAlso unnatural skin tones. Like blues and reds. Deep blues and reds.\n\n'From the snowy Darkest Falls to the hot Western Jungle: All the latest fashions by Devina Earthbringer'.\n\n'Exclusive interview on pg. 24'\n\n\"Wow. Brutal last name.\"\n\nRaven flips the page. \"Keep working.\"\n\nI stretch over her, and rip the magazine out of her hands.\n\n\"I'm done,\" I say. \"Deal with it.\"\n\nRaven blinks at me, before stretching and standing up.\n\n*if (tmp_Tasty = false)\n\t\n\tShe looks at the water. \"You didn't add the herbs.\"\n\t\n\tIt felt like I did everything I needed to. \"Right... what do those do?\"\n\t\n\t\"They give the potion color and flavor,\" Raven responds.\n\t\n*comment\n\nRaven crosses her arms, appraising the water. \"I can sense magic in it. I think you pulled it off.\"\n\n\"You think?\" I ask. \"You don't know?\"\n\nRaven laughs. \"Let's just let this cool for a moment.\"\n\nShe pulls the pot off the heater and just leaves it to sit for a while. It takes a little while, but the\nwater does eventually turn lukewarm.\n\nShe fills to small glasses with the potion, before handing one of them to me. \"Cheers.\"\n\nI take a sip.\n*if (tmp_Tasty = false)\n\tIt tastes... plain.\n\t\n\tI should have added those herbs.\n*comment\n\nThere's a delayed reaction, but eventually I do feel a refreshing tingling run down my spine.\n\nI take a deeper swig. The feeling swells. It's quite pleasant actually.\n\nI stare at my own potion. \"It worked...\"\n\nRaven smiles at me. \"Good job.\"\n\nHuh. This is an interesting start. No idea how this sort of potion would help me in the other world though.\n\n*if (fDefendMyself = true)\n\t\n\t\"$!{fiName}.\" Raven's tone is suddenly serious. \"Sometimes terrible things happen. I don't want you to go\n\taround thinking like you just were.\"\n\t\n\t\"Huh? What do you mean?\"\n\t\n\t\"That you need to defend yourself,\" Raven says. \"You don't need to hurt anyone.\"\n\t\n\tI stare at her for a long time. \"Right.\"\n\t\n\tRaven leans in and briefly gives me a hug. \"Don't go looking for trouble. I need you to stay safe.\"\n\t\n*if (fDefendMyself = false)\n\t\n\t\"If you want to help people... this isn't a bad way to go about it,\" Raven says. \"You can heal people\n\twith this. And with some practice, you can do so much more.\"\n\t\n\tThere's a certain seriousness, almost reverence, to Raven's voice I'm not accustomed to. I'm not quite\n\tsure how to respond to it, so I just nod my head.\n\t\n*comment\n\n*page_break\n\n*set sklBrewing true\n*set itmPotions 3\n\nI'm not exactly exhausted as I lay down on my bed, but I am mentally drained.\n\nSo I know how to brew potions now. Truthfully, I'm more intrigued by that sphere, or 'anchor' as\nRaven called it. Raven didn't take it back.\n\nWhat else can I do with it?\n\nI don't know what I'll do tomorrow. I've trained plenty, but I could do more.\n\nOr I could give myself the day off. After school at least.\n\nI sigh as I settle into my mattress. I'll worry about it tomorrow.\n\n*page_break\n\nI spend the rest of the evening studying the sphere. I can\nuse its magic to make potions.\n\n...but maybe I can push this a little further.\n\n*if (sklFencing = true)\n\t*set style \"spellsword\"\n*if (sklArchery = true)\n\t*set style \"spellbow\"\n*comment\n\n*goto lbl_EndOfTraining\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*label lbl_EndOfTraining\n\nIt's morning.\n\nWell. I trained. Just like Joan wanted. I have no idea if its going to actually do anything though.\n\nI'll have to find Joan at school today, and figure out what she wants us to do.\n\n*page_break\n\nThe school day passes mercifully quickly. I didn't manage to catch any sign of Joan in my classes\nor in the halls. I didn't really recognize her from around school when we first met, but it doesn't look like\nwe share a single class.\n\nI did get the occasional message from her though.\n\n'Just a heads up, I already found two new locations we need to hit. I'll really need your help Saturday.' -Joan Catalan-\n\nSaturday huh? I guess that means I'll have the rest of the day to do whatever I want.\n\n*page_break\n\nI'm sitting in my last class. We still have that substitute. She's still not great at this.\n\nShe fumbles a book, and it falls to the floor with a loud THUD. Half the class jumps in their seats. The other half\nstarts snickering.\n\nIt feels like all the teachers are still going through the motions. I guess I can't blame them, things are so unstable right now...\n\nOn the plus side, people's moods remain elevated while at school. I think some of the students are actually\npaying attention in class.\n\nEveryone's actually glad to be here for once.\n\n*page_break\n\nThe class finally wraps up, and I can go.\n\nSo... a free day. I could spend it doing anything.\n\nI guess more training would be the responsible thing to do, the situation is grave after all.\nBut... it's been a while since I've really just 'hung out'.\n\n*choice\n\t#I'll text Joan, and ask her if she wants to go somewhere.\n\t\t*set fFreeDayJoan true\n\t\t\n\t\t*goto_scene 007_FreeDayWithJoan\n\t#Maybe I'll visit Adam. Not for training, just to spend time with him.\n\t\t*set fVisitAdam true\n\t\t\n\t\t*goto_scene 007_VisitingAdam\n\t#I could spend the day with Raven. The shop's closed, but she should be around.\n\t\t*set fRavensWorld true\n\t\t\n\t\t*goto_scene 007_RavensWorld\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first NUMBER chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2018-08-23 $4.99 $2.99 purchased\n*abort\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "007_freedaywithjoan": "*set joanFriend + 1\n\n\n\n\n\n\n\n\n'Hey Joan? You want to hang out later?' -You-\n\n'You mean like... dive in today?' -Joan Catalan-\n\n'No, no. Just... hang out. Have fun. I've been training for two days. I could use some time off.'\n\n'Sure. Sounds fine to me!' -Joan Catalan-\n\n*page_break\n\nWe meet up in front of the school.\n\nLooking around, I see students hesitant to leave. They've likely noticed their mood worsens as soon as\nthey head out into the city.\n\nI feel bad for taking the day off.\n\n\"Hey!\" Joan runs up to me. \"Sorry I kept you waiting!\"\n\nI shrug. \"It's no problem.\"\n\n\"Soooo, what were you hoping to do today?\" Joan asks.\n\n*temp tmp_Horror 0\n*temp tmp_Action 0\n*temp tmp_Romance 0\n\n\"We could go see a movie,\" I say.\n\n\n*if (sex = \"ma\")\n\t\n\t\"Alright,\" Joan says. \"You have anything in particular in mind?\"\n\t\n\t\"Hmm...\"\n\t\n\t*goto lbl_Movie\n*if (sex = \"fe\")\n\t*set joanFlirt + 1\n\t\n\tJoan smiles. \"A movie, huh? Sounds nice.\" There's something in Joan's eyes I can't quite catch.\n\tA strange hint of interest.\n\t\n\tI shrug. \"I haven't been out in a while, so it should be pretty nice.\"\n\t\n\tShe nods. \"Alright, what did you have in mind?\"\n\t\n\t\"Hmm...\"\n\t\n\t*goto lbl_Movie\n*comment\n\n\n\n\n\n*label lbl_Movie\n\n*choice\n\t#\"An action movie!\"\n\t\t*set tmp_Action 1\n\t\t\n\t\t\"Alright!\" Joan beams. \"That's exactly what I'm in the mood for!\"\n\t\t\n\t\t\"Not surprising,\" I said. \"You seem to have a penchant for wanting to punch things.\"\n\t\t\n\t\tJoan holds her fists up. \"Hey, I can't hold these babies back.\"\n\t\t\n\t\tWe share a short laugh.\n\t\t\n\t\t\"Also, I uh...\" Joan smiles sheepishly. \"Didn't know training with a weapon would let me summon\n\t\tone in the other world.\"\n\t\t\n\t\t\"When we dive in we bring our belongings with us though, right?\" I ask. \"Couldn't you have just\n\t\tfound a weapon?\"\n\t\t\n\t\t\"Oh yeah,\" Joan says. \"I'm sure the police would have been chill with me bringing a knife or bat\n\t\tinto their station when I was scoping it out.\"\n\t\t\n\t\t*goto lbl_MovieOfChoice\n\t#\"Horror.\"\n\t\t*set tmp_Horror 1\n\t\t\n\t\tJoan laughs. \"I think we already get plenty of that in the other world. But, hey. Works for me.\"\n\t\t\n\t\tI smile. \"Just think of it as early practice. We'll be more mentally prepared for tomorrow.\"\n\t\t\n\t\t\"God knows we'll need it,\" Joan says. \"There's so many locations we need to hit... it's gonna be bad.\"\n\t\t\n\t\tI nod. \"Well, we can worry about that tomorrow. Let's just take this day for ourselves.\"\n\t\t\n\t\t*goto lbl_MovieOfChoice\n\t#\"A romance?\"\n\t\t\n\t\t*if (sex = \"ma\")\n\t\t\t*set joanFlirtingInVain + 1\n\t\t\t\n\t\t\t\"Uh...\" Joan glances away. \"Yeah...\"\n\t\t\t\n\t\t\t\"Something wrong?\" I ask.\n\t\t\t\n\t\t\t\"No, it's just... maybe not?\" Joan looks back, smiling sheepishly. \"I just... don't think that would be a good idea.\"\n\t\t\t\n\t\t\t\"Oh.\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"Err... an action movie?\"\n\t\t\t\t\t*set tmp_Action 1\n\t\t\t\t\t\n\t\t\t\t\t\"Sure,\" Joan says. \"I'm definitely good with that.\"\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_MovieOfChoice\n\t\t\t\t#\"How about horror?\"\n\t\t\t\t\t*set tmp_Horror 1\n\t\t\t\t\t\n\t\t\t\t\tJoan nods. \"Yeah. Let's do that.\"\n\t\t\t\t\t\n\t\t\t\t\t*goto lbl_MovieOfChoice\n\t\t\t*comment\n\t\t\t\n\t\t\t*goto lbl_MovieOfChoice\n\t\t*if (sex = \"fe\")\n\t\t\t*set joanFlirt + 1\n\t\t\t*set joanRomanticMovie true\n\t\t\t*set tmp_Romance 1\n\t\t\t\n\t\t\t\"Something romantic?\" Joan giggles, her face reddening. \"I, um... wow. I wasn't expecting this.\"\n\t\t\t\n\t\t\tI tilt my head. \"Uh?\"\n\t\t\t\n\t\t\t\"Sorry.\" She smiles shyly, before glancing away. \"Ignore me. I'm just being dumb.\"\n\t\t\t\n\t\t\t*goto lbl_MovieOfChoice\n\t\t*comment\n*comment\n\n*label lbl_MovieOfChoice\n\n*page_break\n\n*set fToTheater true\n\nThe theater actually feels neutral when we arrive.\n\n\"huh...\" Joan looks around. \"I don't think any of those spheres are anywhere near here.\"\n\n\"No haze then?\" I ask.\n\n\"Doesn't look like it,\" she says. \"They keep appearing in places large numbers of people gather. I'm\nsurprised there's not one placed here.\"\n\n\"Maybe eventually there will be one,\" I say. \"You said they keep appearing.\"\n\nJoan nods. \"We'll have to keep an eye on this place.\"\n\n*page_break\n\nThis theater was actually recently built, and it shows. Everything is still so new and shiny.\n\nRed and brown carpets. Stylish lighting. Some sort of drink kiosks are set up. They actually look pretty fancy.\n\n\"We have to make our own drinks now too?\" Joan asks. \"They're already overcharging for that stuff. They could\nat least make it themselves.\"\n\nI smirk. \"I think I've fully accepted that theaters will always screw you on the concessions. There's nothing\nthey could do that would bother me by this point.\"\n\n*page_break\n\n*if (tmp_Action = 1)\n\t\n\t\"The explosions have gained SENTIENCE!\"\n\t\n\tThe entire blimp explodes in a hell-storm of fire and ash, before crashing down to the earth.\n\tThe aircraft impales itself on a skyscraper, which in turn explodes into a massive mushroom\n\tcloud, decimating the surrounding city.\n\t\n\t*goto lbl_AfterTheMovie\n*if (tmp_Horror = 1)\n\t\n\t\"Dammit! We can't detect the specimen's bio-signature anymore!\"\n\t\n\t\"What!? Why not!?\"\n\t\n\t\"It's... it's evolving, sir.\"\n\t\n\t\"My god... this means-\"\n\t\n\t*page_break\n*if (tmp_Romance = 1)\n\t\n\t\"How did I wind up in this situation...\"\n\t\n\t\"Is it really so bad?\"\n\t\n\t\"Dude, I can't handle having one woman being interested in me, but now there's six?\"\n\t\n\t\"True, it's tricky.\"\n\t\n\t\"What am I supposed to do...\"\n\t\n\t\"Just date all six of them.\"\n\t\n\t\"I just- What?\"\n\t\n\t\"What?\"\n\t\n*comment\n\n*label lbl_AfterTheMovie\n\n*page_break\n\nIt felt good to spend the day goofing off. God knows my brain and body were exhausted from\nall that training. I [i]needed[/i] some time off.\n\n\"Thanks for coming out,\" I say to Joan as we linger just outside the theater.\n\n\"Thanks for inviting me!\" She smiles. \"I had a lot of fun. And the movie was pretty good too.\"\n\n*if (tmp_Action = 1)\n\t\n\t\"I don't know...\" I sigh. \"I think maybe that movie had a few too many explosions.\"\n\t\n\t\"What!?\" Joan mock-shouts. \"That's impossible. Explosions are awesome.\"\n\t\n*comment\n\n*if (tmp_Horror = 1)\n\t\n\t\"I'll admit,\" I say. \"I didn't see that twist coming.\"\n\t\n\tJoan shrugs. \"I feel the same way, but... I just don't think it was a very good one. Cool monster though.\"\n\t\n*comment\n\n*if (tmp_Romance = 1)\n\t\n\t\"Well...\" I laugh. \"That guy had quite the dilemma.\"\n\t\n\t\"Oh, yeah...\" Joan snickers. \"Six beautiful women throwing themselves at him. And he had to choose ONE. [i]The horrors[/i]!\"\n\t\n\t\"I dunno,\" I say. \"Having to break five people's hearts you really like does seem like a bummer.\"\n\t\n\t\"Then he should of of just dated all of them,\" Joan says. \"Then he wouldn't of had to worry about it.\"\n\t\n\t\"Yeah, I'm sure that would have gone over well.\"\n\t\n\t\"Why wouldn't it?\" Joan asks. \"If everybody involved in the situation is cool with it, and everyone\n\tis being open and honest... I don't see what the problem is.\"\n\t\n\t\"I... guess that makes sense?\"\n\t\n\t*label lbl_ImportantQuestion\n\t\n\t*page_break\n*comment\n\n*page_break\n\nAs we're walking away from the theater, Joan checks her phone.\n\n\"It's getting a bit late,\" Joan says.\n\n\"Is it?\" I ask. \"It's not even sunset yet.\"\n\n\"Yeah...\" Joan smirks. \"I don't know how chill your folks are, but mine freak out every time I'm alone.\nSeriously, the city is a bit of a mess right now.\"\n\n\"Oh, right.\" Honestly, I doubt Raven would be that cool with me being out for much longer either. \"I should\nhead home too.\"\n\n*if (joanFlirt > 1)\n\t\n\t\"Well...\" Joan smiles shyly. \"I guess we'll hang out again?\"\n\t\n\tI nod. \"Of course.\"\n\t\n\t\"Awesome, awesome.\" She looks around for a moment, before suddenly moving towards me.\n\t\n\tHer movement is so quick it takes me a moment to realize she's hugging me. She breaks\n\taway before I can respond.\n\t\n\t\"Well I had fun bye I'll see you tomorrow at HQ!\" Joan shouts as she runs away.\n\t\n\t*page_break\n\t\n\tIt isn't until she's out of sight that I start laughing. \"Wow.\"\n\t\n\tThis was a good day. I'm glad I took it off.\n\t\n\tHopefully I'll be ready for what's going to happen tomorrow.\n\t\n\t*goto lbl_Goodbye\n*else\n\t\n\t\"We should hang out like this again,\" Joan says. \"Maybe after we've cleared a few of those spheres out?\"\n\t\n\t\"Sure,\" I say. \"It'll be a nice way to celebrate.\"\n\t\n\tJoan starts to walk away. \"I'll be looking forward to it! And I'll be seeing you at HQ tomorrow!\"\n\t\n\tI cross my arms. \"HQ?\"\n\t\n\t\"The warehouse!\"\n\t\n\t\"No, I... I got that,\" I say to her. \"I just think you're giving the place way too much credit.\"\n\t\n\t\"Sorry!\" Joan shouts behind her. \"Can't hear you! I'm already gone!\"\n\t\n\t*goto lbl_Goodbye\n*comment\n\n*label lbl_Goodbye\n\n*page_break\n\nI start my own trek home.\n\nThe city is still gloomy, but I enjoy the walk anyway.\n\n*page_break\n\n*comment *goto_scene 008_DivingIn\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "007_ravensworld": "*set ravenFriend + 1\n\n\n\n\n\n\n\n\nThe store is closed today, so unsurprisingly, it's completely empty.\n\nI hear something in the back. Metal clanging, the occasional thud. Raven must be working on\nsomething.\n\nI quietly walk up, not wanting to disturb her. Did she not hear me enter?\n\nI peek into her workshop through the doorway.\n\n*page_break\n\nRaven's holding... something. It looks like a green coin. For some reason she's pointing it toward the far wall.\nShe's using her other hand to dig through a basket of wooden widgets. They seem to be her work pipeline's output\npile, given they're all covered in runes.\n\nI stop peeking through the door, instead just listening.\n\nRaven says, \"We should have enough for him. I should wait for $!{fiName} before I go though.\"\n\n\"You're going all the way across town to use the other gate? You've got one right here.\" The other voice sounds\nfeminine. \"Why'd you even bother spending all that time making one for yourself if you never use it?\"\n\n\"I am using it,\" Raven growls. \"I'm talking to you through it aren't I?\"\n\n\"Yeah, and that's also a thing we haven't done in a while. Where have you been?\"\n\nRaven sighs. \"The situation is complicated. I'm sorry I just dumped everything on you like that, but-\"\n\n\"It's complicated here too! You think Windbrooke's the only place where things are messy? This side got it just\nas bad.\"\n\n\"I know, but I'm heading there now.\"\n\n\"Good. 'Cause we really need you on the defense force. I don't know how those psychos keep getting in, but nothing has\nworked to keep them out. The local force can't keep this up. Professor Gestalt needs to talk to you, he's needed to\nfor a while now.\"\n\n\"Just tell him I'll be there today.\"\n\n\"Raven-\"\n\nI hear Raven slam something now. \"Dammit, I'll just leave a note or something. I'm coming through now, I've\ngot the materials packed up.\"\n\n\"Yes! Thank you! I'll be waiting for you by the rail.\"\n\n*page_break\n\nI don't move for a long while. I hear some shuffling coming from the other side of the door for a little bit, and\nthen nothing.\n\nI'm not quite sure how to announce myself to Raven, or if I even should.\n\nI look back at the door. I could just open and close it again. Pretend I just walked in.\n\nOr I could go upstairs, pretend I was home for a while. I wouldn't even be lying.\n\n*choice\n\t#Loudly open and shut the door.\n\t\t\n\t\tI walk back to the door as quietly as I can, throw it open, and slam\n\t\tit shut.\n\t\t\n\t\tI don't hear anything from the back room.\n\t\t\n\t\t*goto lbl_PerformanceForNobody\n\t#Call to Raven from upstairs.\n\t\t\n\t\tI creep upstairs, pretend to look around, as if searching for Raven, and shout, \"Raven! Are you\n\t\there? I don't see you anywhere! I'm perplexed by this!\"\n\t\t\n\t\t*goto lbl_PerformanceForNobody\n\t#Walk into the workshop.\n\t\t\n\t\t\n\t\t\n\t\t*goto lbl_PerformanceForNobody\n*comment\n\n*label lbl_PerformanceForNobody\n\nAfter a moment of hesitation, I finally enter the workshop.\n\nIt's empty. Raven's nowhere to be seen.\n\nA note is sitting on the workbench.\n\n'Sorry, $!{fiName} something came up, and I had to go. Take care of the store while I'm gone, okay?'\n\nI raise a brow at the note. Shouldn't she have left that somewhere I'd find it more quickly?\n\nOr just sent me a message? She owns a phone.\n\nI look to the wall Raven was pointing the coin at. There's nothing special about it.\nIt looks the same as every other wall in the room. The only unique thing about it is that\nthere's nothing stacked against it.\n\nEvery other surface of the room is packed with shelves and equipment, but that one wall has\nbeen left bare.\n\nI approach it, and place my palm flat against the wall. I run my hand along its smooth surface,\nbefore giving it a few knocks.\n\nI realize at this moment I don't know the difference between a hollow wall and a normal one.\n\nActually, aren't most walls hollow? There should be a crawlspace.\n\n\"This is getting me nowhere.\"\n\n*page_break\n\nI cross my arms and think. There's no other doors that I can see, but she definitely left this room somehow.\n\nThat green coin looked important...\n\nMaybe she has another one.\n\n*label lbl_TryAgain\n\n*choice\n\t*hide_reuse #Search the nearby shelves.\n\t\t\n\t\tI dig through the shelves. Most of them have boxes and baskets filled with different items.\n\t\t\n\t\tEmpty bottles, filled bottles, widgets and things. Some of them have runes carved on them, most\n\t\tdon't.\n\t\t\n\t\tSearching through all of them takes a while, but I don't find any coins.\n\t\t\n\t\t*goto lbl_TryAgain\n\t*hide_reuse #Look over her workspace.\n\t\t\n\t\tIt's actually a straightforward set up. Two tables sit side-by-side.\n\t\t\n\t\tOne has a flat even space, with tons of sharp tools hanging above it. Raven primarily uses this space\n\t\tto carve up widgets for sale.\n\t\t\n\t\tThe second looks more intimidating.\n\t\t\n\t\tGlass beakers, tons of plants, a few different types metal rune disks to heat pots and bottles. She makes all her potions\n\t\there.\n\t\t\n\t\tThe tables themselves also have tiny shelves built into them. I start digging through those immediately.\n\t\t\n\t\t*page_break\n\t\t\n\t\tI was expecting to see tools, instead there's a stack of documents. I don't spend much time on them, but they\n\t\tlooked like some sort of accounting forms.\n\t\t\n\t\tRaven is running a business I suppose.\n\t\t\n\t\tThere are a few odd letters too, but as I'm digging at the bottom of the drawer, I feel something\n\t\tmetallic slide under my fingers.\n\t\t\n\t\tI struggle to get a grip on the smooth metal before successfully getting a nail\n\t\tunder it and easing it out.\n\t\t\n\t\t*goto lbl_FoundIt\n*comment\n\n*label lbl_FoundIt\n\n*page_break\n\nBetween my finger is a green coin. It's actually quite large for a coin, though very thin. It's surface is shiny and smooth.\nAn engraving of a very large tree atop an island is displayed on it. Tiny words reading 'Island of Yggdrasil'\nare etched at the bottom of the coin.\n\nI flip the coin around. I see the figure of an old man carrying a book.\n\n'Founded for those who pursue knowledge' is printed above the engraving.\n\n'To Those who pursue knowledge, enter freely.' is printed below it.\n\nPushing the forms and letters aside reveals several more copies of the coin.\n\nWhat are these for?\n\n*page_break\n\nI catch movement at the corner of my eye. \"Hm?\"\n\nI turn and see a cat idling in the workshop.\n\n...It's on the other side of the bare wall.\n\n*page_break\n\nSomehow I can see through it. The wall isn't transparent, it still looks totally solid to me, but I see something\non the other side anyway.\n\nIt's like my mind is somehow processing two different images simultaneously.\n\nI cautiously approach. The wall becomes harder to see. I'm still aware of it, but with every\nstep I take, I sense it less and less.\n\nThe moment I think I'm standing right in front of it, I can't see it at all.\n\nI take a moment to study the room beyond it.\n\n*page_break\n\nIt looks completely indistinguishable from Raven's workshop. Same shelves with\nwidgets, and potions, and things. Same work spaces with identical equipment.\n\nI take a step closer.\n\nThe only difference is there's a set of stairs leading to an open door. Sunlight streams through it.\n\nI take another step.\n\nAlso, there's a cat.\n\n*page_break\n\nIt's looking directly at me.\n\n*page_break\n\nI stare back.\n\n*page_break\n\nIt's ears drop, and its body language turns hostile.\n\nI look behind me, and realize I can see the wall again. I stepped completely past it at some point.\n\nA low hiss fills the air.\n\nWhen I look back, the cat is already bolting for the door.\n\nI look at the coin in my hand. I ca
