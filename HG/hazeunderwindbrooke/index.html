s down a lot after that. And then the police arrive.\n\nIn force.\n\nToby and I barely slip away. A significant number of Angeline's people escape, as do some of father Albert.\n\nEverybody else it arrested. Including my parents.\n\nThere's nowhere else to go, so I move back in with Raven. I don't know how, but her store\nbeing destroyed apparently wasn't much of a set back. She already has a new building in a couple of months.\n\nI don't hear from Toby. I wonder if he blamed me for Laura getting killed.\n\n*page_break\n\nRaven and I don't talk about what happened. She doesn't even try to ask me a single question about anything, and\nI'm thankful for that.\n\nJoan and I are still friends, but I'm sensing some distance forming. Deep down, I think maybe she's angry I\ndidn't handle that weird old guy differently.\n\nShe's probably right to be.\n\nThe haze is gone. And two extremist groups have been neutralized. I guess I should be proud of that.\n\nI can't help but wonder... was this really how things were supposed to turn out?\n\n*goto_scene Final ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "badend_angeline": "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nI cautiously step into the warehouse. The door is already open, but I can't really see anything from out here.\n\n...It is [i]really[/i] dark in here.\n\nI glance behind me. Rita and Lucas are watching me through the doorway, but they don't seem to want to come inside.\n\nI'm loving the moral support. It's almost as good as those two actually being in here with me.\n\nThe interior has been trashed. Tables are knocked over. A few are burned. Papers and random equipment\nare strewn about that place.\n\nI keep scanning around for some sign of Angeline.\n\nWhere is she?\n\n*page_break\n\nI wander around the warehouse's main space until I hear the sound of glass breaking in the basement.\n\nThankfully the lights are on down there, otherwise I wouldn't be able to see a thing.\n\n*if (f_008_NightPlans = true)\n\tMy eyes are drawn to the cells I was kept in when I first arrived.\n*if (f_008_NightPlans = false)\n\tMy eyes are drawn to some cells on the far wall.\n*comment\n\nThe cell door is open, and Angeline is laying on the cot in there. She's holding a bottle in her hand,\nand has a more randomly scattered around the bed.\n\nI notice one has shattered against the floor. It looks like it was mostly empty though.\n\nI step closer to her, but say nothing.\n\nShe takes a deep swig from one of her drinks. The last bit of fluid in the bottle drains away.\n\nShe stares at the empty bottle. And casually tosses it aside.\n\nIt shatters against the floor.\n\n*page_break\n\nI don't say anything for a long while. I just stare at her as she struggles to open another bottle.\n\nThey have caps that would require a bottle opener, so I'm not sure what she's trying to do right now...\n\nShe somehow screws the cap off with her bare hand.\n\nOh.\n\nI cough in my fist. \"Hey?\"\n\nShe doesn't say anything. The only sign she gives off that she even noticed me is freezing in place\nfor a moment, before continuing to take a swig from that bottle.\n\nI step just to the outside of the cell. I stare down at the line where the door would be\nshut at. There's no way in hell I'm crossing that threshold.\n\n\"Wanna talk about it?\" I ask.\n\n\"We've always killed people you know. For years now. Part of the reality of our situation.\"\n\nI stare at her. Well, at least she's talking to me...\n\n\"I mean, it's a fucked world. It really is.\" She takes a very large swig from the bottle. \"People\ndie all the time. People get hurt and murdered all the time for no good reason.\"\n\nHrm.\n\n\"And you know, that bothers people. It's unfortunate. That's what they always say. It's unfortunate. When\nsomeone is killed just for, you know, existing it's just so fucking unfortunate. They're sad. Really.\"\n\nI don't think she wants me to say anything right now.\n\n\"So we've killed people,\" she continues. \"I'm not ashamed of that. Hell, I'm proud of it. I've got all sorts. Murderers,\nrapists, you name it. I helped people. We helped people. But every person I ever killed deserved it. They weren't\ninnocent. They weren't well meaning. They sure as hell weren't misunderstood. And if they were, it was because\npeople were willfully misunderstanding them.\"\n\nShe takes a long swig that completely empties the bottle.\n\nShe tosses it against the wall. It shatters.\n\n\"And then things changed.\" She looks at one of her last remaining bottles, but thankfully just sets it down. \"A\ncouple of months we... I changed. I don't know why. We killed people. a lot of people.\" She pauses. \"There wasn't\nalways a good reason. And it was a lot more painful than it needed to be.\"\n\nI take step toward her. \"You...\" Should I tell her about what we saw in the otherworld?\n\n\"I already know,\" she says. \"Rita told me everything about last night.\"\n\n\"...Oh.\"\n\nAngeline sighs. \"My mind was warped by... do I even have anyone to blame here? Was it just random? Bad luck?\"\n\nIt's hard to believe that otherworld haze corrupting her was random. It was too specific, the way it targeted\nboth her and father Albert.\n\n...But I guess it's too late to worry about that now.\n\n\"Thank you.\" Angeline finally gets up and looks at me. \"You really saved me here.\" She looks like she's been\ncrying.\n\nI hesitantly nod. \"...So we're taking out father Albert then?\"\n\n\"Of course!\" Angeline springs to her feet, but immediately wobbles over into the wall. \"I'll... I might need\na day.\"\n\n\"Right.\" I nod. \"I'll tell Rita and Lucas. We can get something set up.\"\n\n*page_break\n\nWhen I head upstairs I see a small number of people have returned. They're all busy trying to reorganize everything.\n\n\"Maybe this isn't the best place to be planning anything right now...\"\n\nLucas approaches me. \"How'd it go?\"\n\n\"It... went.\"\n\nHe raises a brow at me.\n\n\"Come on. She just needs some time. Lets grab Rita and then go meet Joan. We've got someplace we can meet up at and discuss\nwhat we're going to do.\"\n\n*page_break\n\nUnlike me, Joan actually did go to school, so it's quite a while before we all meet up at the warehouse.\n\nThe inside is still pretty bare, so thankfully Lucas packed a fold out table and chairs for us to sit\naround.\n\nRita also brought a large number of files, but I don't know what those are about yet.\n\n\"So...\" Joan takes a seat, and looks at me. \"It sounds like things were pretty rough with that Angeline lady.\"\n\n\"You could say that,\" I reply. \"At least she's better now.\"\n\nRita dumps a bunch of folders and files onto the table. They scatter around.\n\n\"This is everything we've got on them,\" Rita says.\n\nI raise a brow. \"Them?\"\n\nRita opens one of the folders and slides it over to me.\n\n*if (f_008_NightPlans = false)\n\t\n\tThe compound.\n\t\n\tThe Union of Humanity.\n\t\n\tthe folder is filled with pictures of their compound.\n\t\n*if (f_008_NightPlans = true)\n\t\n\tThere's a compound shown within the picture. I see a small and cheap looking church, and various\n\tother plain, nondescript buildings. Concrete walls surround the compound on all sides.\n\t\n\t\"What am I looking at right now?\" I ask.\n\t\n\t\"The Union of Humanity's compound,\" Lucas says. \"I've been a mole in there for more than a month now. I know\n\teverything about them, and about their leader, one father Albert. Real crazy old guy.\"\n\t\n*comment\n\nLucas looks through a few files, seemingly trying to find something. Eventually, he pulls out a map, and\nlays it across the table.\n\nIt's an extremely detailed layout of the compound.\n\n\"We can't risk any of these psychos slipping away,\" Lucas says. \"This is going to take a lot of planning, but I\nthink our best bet is to take them out in one massive attack.\"\n\n\"We don't need to kill everyone,\" Rita says. \"And it'd be too risky to try. If we just take out\nthat creepy priest, we'll completely settle this. The other members are just dumb rednecks. They'll\ndrift away on their own if he dies.\"\n\n\"You haven't seen these people,\" Lucas says. \"Everything single one of them is a bastard. They kill our\nkind, and they get off on it. You wouldn't believe how excited they get at the idea of murder.\"\n\n\"Isn't that just the haze though?\" Rita asks.\n\n\"Huh?\"\n\n\"That otherworld,\" she says. \"That's what made them crazy right?\"\n\n\"Well, yeah,\" Lucas says. \"But...\"\n\nI sigh. \"But we didn't free father Albert from its influence.\"\n\n\"But it is just that priest that's been affected, right?\" Rita asks. \"Maybe killing just him will be enough.\"\n\n\"What if it isn't?\" Lucas asks.\n\n\"Then we'll come back and mop up the rest.\"\n\nLucas crosses his arms, \"And what if they kill a bunch of people between those two things happening?\"\n\n\"It's not a perfect plan,\" Rita says. \"If we go all out and try to kill all of them we might lose a lot of people. I think\nit's worth just going for the head honcho, and hoping the rest of those pricks crumble on their own.\"\n\nLucas looks like he wants to argue more, but just sighs. \"Look... let's just go over the situation first.\"\n\n\"Fine,\" Rita says.\n\n*page_break\n\nHe details quite a bit.\n\nLucas has an accurate read on their numbers, their weapons, even how they handle their watch at night and during the day.\nIf we wanted to, we could probably slip in there pretty easily and kill everyone.\n\nI'm not... entirely comfortable with that. And I can tell Joan feels the same way from how grim she looks right now.\n\nI was fine killing monsters in the other world but this is different.\n\nThese are people.\n\n*if (f_008_NightPlans = false)\n\t\n\t\"Aren't they still people though?\" I ask.\n\t\n\t\"Huh?\" Lucas stares at me.\n\t\n\t\"Lucas, this isn't like with that otherworld. These aren't monsters.\"\n\t\n\t\"I beg to differ,\" Lucas says. \"I promise you there isn't a single person there that you would ever care about.\"\n\t\n\t\"Is that a fact?\" Rita says, her eyes suddenly narrowing at him.\n\t\n\t\"...Yes?\" Lucas raises a brow at her. \"Why would-\" It looks like realization just smacked him in the face.\n\t\n\t\"Did you seriously just forget?\" Rita asks. \"Also, weren't you going to tell $!{fiName} earlier?\"\n\t\n\t\"...Yes.\"\n\t\n\t\"And did you?\"\n\t\n\tLucas stares at her.\n\t\n\t\"Of course not.\" Rita sighs, before looking at me. \"Your parents are with those psychos.\"\n\t\n\tMy parents? \"They kidnapped them!?\" Jesus, why didn't they tell me sooner?\n\t\n\t\"No,\" Lucas says. \"They just... joined. Voluntarily.\"\n\t\n\tI stare at him. \"why?\"\n\t\n\tRita says, \"Because they liked what the group represented and it's overall goals.\"\n\t\n\t\"But,\" I frown. \"They wouldn't join a group like this.\"\n\t\n\t\"$!{fiName}-\" Lucas sighs. \"We can't really spell this out any more clearly for you. They joined a group that murderers\n\tour kind... because that's what they want.\"\n\t\n\t\"I...\" That can't be right. \"I need to talk to them.\" Maybe the haze is affecting them too?\n\t\n\t\"That's not happening,\" Lucas says.\n\t\n\t\"They're my parents,\" I say. \"I can't just leave them there.\"\n\t\n\t\"$!{fiName}...\" Rita gives me a hard look. \"It's not possible.\"\n\t\n\tI look at Lucas. \"You just said you were a 'mole' right? Arrange a meeting.\"\n\t\n\t\"And then your folks will know I'm not one of them and warn everyone else.\"\n\t\n\t\"They wouldn't do that-\"\n\t\n\t\"Just set up the meeting,\" Joan says. \"We can deal with the consequences after word.\"\n\t\n\tI freeze as I stare at Joan. \"Joan-\"\n\t\n\t\"Don't get me wrong,\" she says. \"This is stupid, and a bad idea... but there's no point arguing about this.\n\tThey're your parents. You're going to try to save them from getting killed. It's just a given.\"\n\t\n\t\"Joan,\" Lucas begins. \"If he tells them, than all the information we have here will become completely\n\tuseless. They'll know they're compromised.\"\n\t\n\t\"Your talking about killing $!{fiName}'s parents,\" she says. \"If you don't cooperate and set up a meeting\n\t*if (sex = \"fe\")\n\t\tshe'll\n\t*if (sex = \"ma\")\n\t\the'll\n\tjust go anyway. On their own. Which will also tip these people off. If you set up the meeting, at least we'll have\n\tan exit strategy when things go badly.\"\n\t\n\tI frown at Joan. I am really not appreciating her overtly saying this is doomed to failure.\n\t\n\t...But Lucas and Rita seem to be warming up to the idea, so in guess I owe her my thanks.\n\t\n\t*page_break\n\t\n*if (f_008_NightPlans = true)\n\t\n\tThese are people, and-\n\t\n\tOh god.\n\t\n\tMy parents are still with them.\n\t\n\t\"What about my parents?\" I ask.\n\t\n\tLucas stares at me. \"Huh?\"\n\t\n\t\"My parents are there. What about them?\"\n\t\n\tRita and Lucas share a glance. Joan just kind of looks away.\n\t\n\t\"They were going to kill you,\" Lucas says, his tone cautious.\n\t\n\t\"Yeah, the group's dangerous,\" I respond. \"I know. That's all the more reason to get them out of there\n\tas soon as possible.\"\n\t\n\t\"$!{fiName},\" Lucas says firmly. \"You... I was there. They weren't [i]happy[/i] about you being 'executed',\n\tbut they accepted it.\"\n\t\n\t\"$!{fiName}...\" Rita is giving me this sad look. \"I know they're your parents, but they're too far gone.\n\tThey aren't willing to accept you, and they aren't going to walk away from that group.\"\n\t\n\tNone of this can be right. I don't even remember what happened after father Albert did... whatever he\n\tdid while I was at that compound. They can't know they didn't want to stop them.\n\t\n\tMaybe they do want to leave, but are worried about what could happen...\n\t\n\tThat group might not be willing to let its members leave.\n\t\n\t...Or maybe the haze has changed them.\n\t\n\t\"You're going to go after them no matter what, aren't you?\" Joan asks.\n\t\n\t\"Huh?\" I stare at her. \"What do you mean?\"\n\t\n\t\"Even if we say you shouldn't try to 'rescue' them, you're going to go anyway. Right?\" Joan sighs. \"I mean...\n\tI'm not going to pretend I don't get it. They're your parents. I'd do the same thing.\"\n\t\n\t\"We can't just march in there and set up a meeting!\" Lucas shouts. \"They'd kill-\"\n\t\n\t\"Aren't you still a mole?\" Joan asks. \"Just get them to meet us somewhere.\"\n\t\n\t\"But then they'll know I'm a mole,\" Lucas says. \"And all of this information that I've gathered will be useless!\n\tThey'll change patrol patterns, they'll be preparing for us to-\"\n\t\n\t\"I know,\" Joan says. \"But $!{fiName}'s just gonna go anyway, so you might as well set up the meeting so we\n\tcan control how this happens and have an exit strategy.\"\n\t\n\t\"We can't just give up this much of an adv-\"\n\t\n\t\"Lucas.\" I give him a hard look. \"They're my parents.\"\n\t\n\t\"I-\" Whatever Lucas was about to respond with dies in his throat.\n\t\n\t\"I can't just not try. No matter what they did.\"\n\t\n\tLucas just looks at me for a moment, before sighing. \"God. Dammit.\"\n\t\n\t*page_break\n\t\n*comment\n\nLucas doesn't waste any time setting the meeting up. In fact, Rita drives me out toward their compound\nthe very same day.\n\nWe park off the road seemingly in the middle of nowhere before traveling through the woods on foot. It isn't\nlong before we near a large wall of what looks like the compound. It's just across a large grassy field.\n\nMy dad is standing near the edge of the tree line. I make a move to rush towards him, but Rita holds me\nback.\n\n\"Approach. Carefully.\"\n\nI nod, but an enthusiastic energy wells up inside me, propelling me forward. Recognition flashes in his eyes.\n\nThere's my dad. He's still wearing those thick rimmed glasses he always wears, though\nI notice a sizable crack in the right lens.\n\nMy mom is... oddly nowhere to be seen.\n\n\"Dad?\" I look around.\n\nThere's no one else here. Also, Rita seems to be hanging back for some reason.\n\nMy dad... pales. \"Hey there.\" His tone is really strange.\n\nI've never seen his eyes this wide before. He's just staring at me.\n\n\"Dad? It's me. Is... is something wrong?\"\n\n\"No! No!\" he says quickly. \"Not at all. I just uh... is there anyone else here with you?\"\n\n\"Uh...\" I look behind me. Rita has completely fallen out of sight at some point. \"No?\"\n\n\"Oh... that's uh. That's really good.\"\n\n*page_break\n\nWe stare at each other for a really long time.\n\nThis wasn't exactly how I thought this would go.\n\n\"Dad, uh.\" Right. I need to warn him. \"These people you're with...\" How do I explain this? \"They're bad people,\nbut they're about to be taken out. Permanently. You need to bring mom here so-\"\n\n\"What?\" Dad's voice sounds grave. \"There are people coming here? Right now?\"\n\n\"...Well, no. Not yet.\" I need to keep this conversation on track. \"But they are coming. You need to get\nmom so I can get the two of you somewhere safe.\"\n\n\"Hm.\" Dad keeps looking past me, like he's trying to see something. \"You came here alone?\"\n\nMy phone buzzes in my pocket. when I look at it there's a message from Rita.\n\n'I don't want to alarm you, but Lucas just got into some trouble. Act calm, and slowly\nwalk backwards. I'll take care of the rest.' -Rita-\n\nIs she watching us?\n\nI look at dad. He really does seem like he's on the verge of having a panic attack right now.\n\nAre they forcing him to do this?\n\nI need to tell him to move back toward the tree line with me. \"Dad-\" Wait... they still have mom. \"Dad...\" what do\nI do?\n\n*if (sex = \"fe\")\n\t\"Honey.\"\n*if (sex = \"ma\")\n\t\"Son.\"\n*comment\nDad's voice nearly cracks, but he manages to compose himself. \"Listen. I've... I've heard things. It looks like you've\nfallen in with a bad crowd.\"\n\nDoes he know I'm working with that other group? Admittedly, they are a pretty rough crowd.\n\n\"We can still help you. Just come with me.\" He smiles. As nervous as he is it's oddly genuine. \"You're not one of them. You\ndon't belong there. But these people...\" he point to the compound behind. \"Why... they're some of the best people I've\never met. They care about our kind. They're fighting for human kind.\"\n\n\"But they've killed people!\" I blurt out. \"And I'm not even human anymore, so what does it even matter?\"\n\nHis smile falls immediately. \"It matters.\"\n\n\"Those people want to murder me!\" I shout. \"They're dangerous! What they're doing is wrong, you have to leave them! I\ncan take you someplace safe, and... I don't know. You could go to the police! I know the apartment is gone, but Raven-\"\n\n\"Raven.\" Dad's tone is icy. He looks away from me as his face contorts into disgust.\n\"It's that damned Raven's fault. I- we knew you shouldn't have been spending any time with her. Everything she does i-is...\"\n\n\"Raven helped me. After you guys... just disappeared.\"\n\nHe takes several steps away. \"I can't...\" He's hyperventilating now. \"I can't believe my own child is...\"\n\n\"Dad.\" My phone is buzzing in my pocket incessantly. I don't bother looking at it.\n\nA truck suddenly pulls out of the compound. Multiple people are on it. All of them are armed.\n\n\"I'll come back for you,\" I say, stepping back into the woods. \"I promise!\"\n\nI hear a gunshot ring out as I break into the woods.\n\n*page_break\n\nI don't make it more than a few steps before Rita knocks my legs out from under me and picks me up.\nShe's carrying me off very rapidly. Twigs and branches cut against my arms as we go.\n\nI keep my eyes clenched shut until we stop moving.\n\nI'm unceremoniously dropped on the ground by her only a few moments later.\n\n*if (f_008_NightPlans = true)\n\tI lie there in a very familiar daze. \"Thanks.\"\n*if (f_008_NightPlans = false)\n\tHuh. apparently she's quite strong. \"Thanks.\"\n*comment\n\n\"Your welcome.\" Rita sounds exasperated. \"Why did you take so long to bail out? I told you they were coming.\"\n\n\"I was...\" I groan as I stand up. \"...trying to help my dad.\"\n\nRita says, \"He didn't seem that interested in helping you.\"\n\n\"He'll come around,\" I look around. \"I just need to get him away from those people.\" Oh good the van's nearby. \"I just\nneed to...\" There's a lot of blood around the passenger side door.\n\nI walk over and open it.\n\nThere's some sort of beast man in the passenger seat. His body is covered in thick fur. He's got a lot\nof blood on him, but I don't think its his.\n\nHe's reclining weirdly casually.\n\nI raise a brow. \"...Lucas?\"\n\nHe just looks at me and gives the slightest nod.\n\n\"What happened?\" I ask.\n\nRita walks up next to me. \"Things went to shit. Predictably.\"\n\n\"Are you hurt?\"\n\nLucas shakes his head. I guess he can't talk while he's in that form.\n\nI nod. \"Okay.\" Lucas really put himself at risk for my sake. \"Thank you, Lucas. For everything.\"\n\n*page_break\n\nRita goes over plans with us. It eventually becomes painfully obvious Joan and I won't be involved in the actual fighting at all,\nwhich I guess it understandable.\n\nthe only things I've ever killed are weird monsters in that haze-filled world. I wouldn't be able to murder another person,\neven if they were planning to kill people themselves. And it's not like either of us are very strong in this world\nanyway\n\nLucas is adamant that the Union of Humanity will definitely continue their attack, but they're also going to be\nready for us.\n\nAs the day of the attack nears, our side gets ready to attack.\n\nAnd that's when I find myself in front of the Unity of Humanity's compound. In the dead of night. Alone.\n\nThe Scourge will murder my parents during their attack if I can't get them out of here.\n\n*page_break\n\nThe compound is surrounded on all sides by concrete walls. There's not really anything else to say about it. There are\nno signs, no flags, nothing. It's the most inconspicuous location I've ever seen. Unfortunately, there isn't really\nany high ground around the compound, so I can't see inside it at all.\n\n*if (f_008_NightPlans = false)\n\tOn the plus side, I've been here before, so I already sort of know the layout.\n*if (f_008_NightPlans = true)\n\tOn the plus side, the front gate is open. So I can get inside.\n\t\n\tI already know the layout of the compound however. We've been going over this with Rita for ages now, and there's only a few buildings.\n\tA large mess hall, a gym, a dormitory, and the church.\n\t\n*comment\n\nI take a step toward the gate. A chill runs down my spine.\n\nI can feel the haze.\n\nIt's becoming very foggy...\n\nNo.\n\nI can [i]see[/i] the haze.\n\n\"What the hell...\"\n\n*page_break\n\nA strange fog lifts up out of the ground. I can feel the haze emanating from deep below the earth. It comes out in crashing waves one after\nanother. There's no limit to it.\n\nIt's never been this thick.\n\nMy lungs burn. My arms and legs suddenly feel weak.\n\n\"Just focus on resisting it... just focus on resisting it...\" I mentally push against the haze, and I feel my strength return.\n\nThe haze is concentrated on the compound. It's so thick I can't even see past the front gate.\n\nMy grip tightens.\n\n...I'm holding my weapon.\n\nI stare down at it. It's here. Right here. In my hand.\n\nIn the real world.\n\n\"This is probably very bad...\" I run through the front gate.\n\n*page_break\n\nThere are several people all around me. They're dressed in camouflage and carrying assault rifles. They\nwere all facing the open gate.\n\nThey're all on their hands in knees. They twitch and convulse. I see multiple people vomit up some sort\nof black... substance. I see black smoke rising from their bodies as their flesh tears open. A mixture\nof blood and black ichor pours out.\n\nScreams come from somewhere further inside the compound.\n\nI need to find mom and dad. Right now.\n\n*page_break\n\nI move aimlessly. We went over what the compound looks like, but I can't remember anything now. I can't see anything\neither.\n\nAs I'm running I slam into a figure. We both fall.\n\nIt's... a man. I think.\n\nHis flesh is torn open as smoke and ichor pour out of him. His eyes are completely white. He twitches as he rises to\nhis feet.\n\nHe has an assault rifle in his hands.\n\nHe won't stop twitching.\n\nHis gun snaps up.\n\n*if (style = \"warrior\") or (style = \"spellsword\")\n\t\n\tI lunge forward.\n\t\n\tI cut off his arm with one slash.\n\t\n\tIt isn't like fighting those things in the other world. His body isn't hollow and filled with slime.\n\n\tBone and marrow hang from the edge of his arm. My blade didn't so much slice cleanly through it as it seared\n\tthrough the end of his arm. The burns don't stop his arm from bleeding profusely at all.\n\t\n*if (style = \"spellbow\")\n\tSomehow I'm faster, and I fire a single shot into his skull.\n\t\n\tThis isn't like the other world's creatures. His body isn't hollow and filled with black tar. Blood trickles down his face.\n\tI can see bits of skull exposed in the wound as the light arrow vanishes.\n*page_break\n\nHe isn't screaming in pain. He doesn't even wince.\n\nHe takes a step toward me. Then another. his movements are jagged and awful.\n\nAnd then he stops.\n\nHe doesn't move. He doesn't twitch.\n\nEventually, he falls backwards.\n\nThis isn't some monster...\n\nThis man was...\n\n*page_break Focus\n\nWhere are they? Where would they be?\n\nIt's the middle of the night. Dormitories. They're sleeping somewhere.\n\nBut where are the dorms?\n\n*page_break Think! Think!\n\nThe map... Rita showed it to me...\n\nNorth West corner.\n\nWhich way is north west?\n\nThe gate was on the left side of the map...\n\nI make a sharp left turn. It's somewhere to the left of the front gate.\n\n*page_break\n\nGunshots ring out as I sprint forward. The fog is too thick to make out anything more than the occasional silhouette around\nme. I can't even see the muzzle flash of their guns.\n\nAt least they don't seem to be shooting at [i]me[/i].\n\nI nearly run face first into a wall. It's not the concrete outer wall though. I've found a building.\n\nThe haze is getting thicker.\n\nI run around the wall until I find a set of double doors. Their both plain and made of metal.\n\nI yank on the handle, but they only budge a little. Something is holding them shut on the other side.\n\n*if (style = \"warrior\") or (style = \"spellsword\")\n\t\n\tI raise my sword up, and slash vertically between the two doors.\n\n*if (style = \"spellbow\")\n\t\n\tI let a charge of energy run into my arm. I'm still not entirely sure how this works yet...\n\t\n\tI punch forward, and the energy explodes into the door frame.\n\t\n*comment\n\nI hear the sound of something shattering as the door slams open.\nA bullet flies by and I duck out of the way just in time.\n\nI don't have time to screw around with this. If I can materialize a weapon, then I can probably do\neverything else I was able to do in the otherworld too.\n\nI take a deep breath. I've got to be fast here.\n\nAs fast as possible.\n\nFocus on it.\n\nA trembling energy creeps up my legs. I spring forward.\n\n*if (style = \"warrior\") or (style = \"spellsword\")\n\t\n\tThe haze isn't as thick inside the building. Two figures are dead ahead, both aiming their rifles at the front door.\n\tLight flashes. I sidestep one bullet. The others miss completely.\n\t\n\tI close the distance between one of them, and slice through its throat.\n\t\n\tI cut at the knee of the next one. It buckles. Barely. I take a desperate stab at its skull. The blade\n\tgoes through, I let the weapon disappear from my grasp.\n\n*if (style = \"spellbow\")\n\t\n\tI generate my bow. The two are about to shoot again. I fire an arrow at the left one's skull. It hits.\n\t\n\tThe last one fires blindly in my direction. The bullet just passes by my face.\n\t\n\tI spring forward, and the distance between us just seems to vanish. I fire an arrow close up into its face, and\n\tit falls.\n\t\n*comment\n\nI stare at their corpses.\n\nChrist... what if mom and dad are like this too?\n\nMy phone starts buzzing in my pocket, but I ignore it as I start searching the rooms.\n\n*page_break\n\nThis place is completely empty. I checked all the rooms and nobody is in here. I didn't even see any more monsters.\n\nI'm about to reach for my phone when I hear something crash upstairs, followed by a lot of swearing. I'm pretty sure\nI'm on the top floor though.\n\nIt takes some looking around, but I do eventually find a hatch that leads to the attic. When I yank it open a ladder\nfalls down and a gunshot rings out from somewhere above me.\n\nI flinch, but I'm completely fine. In fact... I don't think a bullet even passed me.\n\n\"Wait for one of those things to come up here you idiot!\"\n\n\"It opened the hatch!\"\n\n\"It's not up here yet! You're shooting thin air!\"\n\n\"How was I supposed to know!?\"\n\nI stand there, staring up at the now open attic for several seconds. \"Hello?\"\n\nI hear two gasps. \"Holy shit! They can talk.\"\n\nMy jaw clenches. I force myself to calm down before speaking up. \"I'm not one of those things!\"\n\nThere's a brief silence before I hear one of them. \"You've gotta hide! We blocked the front door, but\nthere's two of those things inside!\"\n\n\"Don't tell them to hide! They'll come up here and lead those things straight to-\"\n\n\"THEY'RE ALREADY DEAD!\" I shout. \"Alright!? It's done. You're safe.\" Well... not really. I forced\nthe front door open, so more of those things might come inside.\n\nThere's another long pause. \"Are there more outside?\"\n\n\"I don't know,\" I say. \"Probably. Can I come up? It's hard to have a conversation like this.\"\n\n\"...Fine.\"\n\n*page_break\n\nWhen I climb up the ladder I find a mostly empty attic. Several boxes are stacked in the corner, and it takes\nme a few moments to realize two men are hiding behind it.\n\nThey're both wearing camo gear. One has a pistol. The other isn't armed.\n\nThe armed one is a bit on the big side. He's got a long, not particularly well kept beard. His hands are shaking\nand he looks like he's ready to use that gun. Thankfully, he doesn't look like he's particularly hostile\nto me.\n\nHis friend is a lot lankier, and is just barely peeking over their mountain of boxes at me. \"You... you're not one\nof us.\"\n\n\"No, I'm not,\" I step forward. \"What happened?\"\n\n\"We don't know,\" the armed one says. \"Some sort of weird fog came up out of the ground... everybody started acting real funny\nfor a second... and then they turned into those things.\"\n\n\"So, you barricaded yourselves in here while that was all happening?\" I ask.\n\n\"We just tried locking the door at first, but the people we had in here with us changed too.\"\n\nI look both of them over. \"But you two didn't...\"\n\n\"No.\" the lankier one says. \"And thank god for that. I don't know why, but I guess someone must be looking out for us.\"\n\n\"No kidding,\" I say. \"You were lucky this building was basically empty, or you would of been overrun.\"\n\nThe lanky one nods. \"The others already moved out. Hopefully this... demonic magic, or whatever the hell\nit is hasn't reached them too.\"\n\nI stare at him. \"Moved out?\"\n\nThe bigger one elbows his friend. \"Be quiet. We shouldn't be talking like that in front of strangers.\"\n\n\"Excuse me a moment.\" I back away from them and check my phone... which didn't actually ever stop buzzing.\n\n*page_break\n\nIt appears I've gotten a torrent of status updates from Joan.\n\nThe first one reads:\n\n'GET BACK TO WINDBROOKE. RIGHT NOW. OTHER WORLD MONSTERS ARE ATTACKING. THEY HAVE GUNS.' -Joan-\n\nSo. Whatever affected these people here did spread to the rest. Who all moved out to attack earlier\nthan we were expecting.\n\nThis is really bad.\n\nI don't waste any time bolting out of that compound. I hate to leave, but I don't even know if my parents are here.\n\n*page_break\n\nI steal a jeep that was left in the compound. I took the bus to get as close as I could to this place, then walked\nthe rest of the way. I can't waste that much time getting back.\n\nI've never driven before, but I somehow manage to make it back to Windbrooke with... minimal damage to the jeep.\n\nPolice sirens fill the air, as does a thick haze. It's not as bad as it was at the compound however. I can actually see down\nthe street out here.\n\nThere isn't any damage done to the city as I'm driving toward the sounds of sirens. Nothing is on fire. Nobody is dead.\n\nI actually don't see anybody at all. After the rioting from a while back, I think everyone has figured out that they\nshould stay off the streets during something like this.\n\nGunshots ring out in the distance. As I'm driving along I do eventually see the first sign of trouble.\n\n*page_break\n\nAn overturned car is on the sidewalk. A massive amount of damage has been inflicted on the side of it. I think someone\nmust have driven into it at full speed.\n\nThere's a truck awkwardly parked next to it. The vehicle has a suspicious amount of damage done to the front of it. I\ndon't see the driver anywhere.\n\nI keep going, but slow just long enough for my eyes to drift over the pool of blood forming over the overturned car.\nWhoever was sitting in there isn't okay.\n\n...I need to hurry up.\n\n*page_break\n\nI drive as far as I can before I hit a police road block. Disconcertingly, there's not any officers around it. At all.\n\nThere are multiple cars backed up behind the blockade. Some of the cars have been abandoned, but a few still have people staying low\ninside them.\n\nThere are a lot of gunshots coming from somewhere not far down the road, just past that blockade.\n\nI get out of the jeep and get a leg on in that direction.\n\n*page_break\n\nThe haze is subtly thicker the further I go. The destruction increases too.\n\nPeople are dead. Buildings are burning. There's a disturbing large number of police officers that have already died.\n\nThey aren't the standard patrolmen either, these people are in full riot gear. They're carrying much heavier fire power\nthan normal.\n\nGun shots keep ringing out ahead.\n\nI find myself in front one of the city's parks. Various figures have are in front of it, with their backs turned\ntoward me. They're carrying firearms and an assortment of other weapons with them.\n\nThey don't look like the police...\n\nMy eyes strain against the fog to make out more details, until I see Joan amongst the group.\n\nShe's in her full armor. \"$!{fiName}! Finally.\" She sprints over to me. \"Things have been [i]really[/i] bad! That cult\nlaunched its attack early! And then... I don't know! Everybody started turning into monsters!\"\n\n\"Are you alright?\" I ask.\n\n\"Obviously,\" Joan says, motioning to herself. \"But a lot of other people...\"\n\n\"I saw,\" I say. \"What's going on over there?\"\n\n\"That priest is still alive,\" Joan states. \"With his people. They're all holding out in that park.\" She looks\nback at the line. \"Everybody is getting ready for the last push...\"\n\nThe rest of the people here are all from Angeline's group. Some of them loom pretty bloodied...\n\n\"Let's get moving,\" I say. \"I think we can end all of this.\"\n\n*page_break\n\nJoan and I leave the others behind. However, as we're entering the park, Joan and Lucas unexpectedly step up beside us.\n\n\"And where do you two think you're going?\" Lucas asks with a smirk.\n\n\"This is dangerous.\" I generate my weapon. \"But Joan and I can make ourselves stronger from the haze-\"\n\nLucas just chuckles. \"Trying to play hero? We're not helpless.\"\n\n\"We're not letting you wander in there alone,\" Rita says, generating a knife in her hands. \"We go in together. The four\nof us.\"\n\nThey're not going to back down. \"Heh.\" I smile. \"Well, if you're that confident... Are you ready for\nwhat's next?\"\n\n\"Of course!\" Lucas says proudly.\n\n\"Let's go kick this bastard's ass!\" Rita shouts.\n\n\"We've got this,\" Joan says. \"We're bringing this all to an end tonight.\"\n\nThe four of us march forward. I can't imagine what's coming up.\n\n*page_break\n\nGenerally speaking, the park is in much better condition than the rest of the city. Nothing is on fire, and there's no\nobvious damage. It's night, so there likely weren't many people here when this all started.\n\nThis park is a little more overgrown compared to what I'm used to. Simple paved paths wind around the park,\nwith the occasional bench to sit at. Lots of flowers beds are planted all around. There's lots of trees, so much so they're\nblocking quite a bit of vision, though I can barely make out some distant light near the center of the park through them.\n\nIt's uncomfortably quite right now. Especially since we keep seeing corpses the further in we go.\n\nSome of them are wearing mostly white uniforms, undoubtedly people from Angeline's group. I'm seeing some in camo gear too. Probably\nfrom father Albert's. I'm seeing multiple fallen officers too. It looks like almost everybody was killed by gun fire.\n\nThe only exception is father Albert's people. Some have been shot, but I'm seeing a multitude of other sorts of injuries. Some\nare burned, some are cut open. One is even frozen near solid.\n\nAngeline can use magic can't she? She must have been busy before they were forced back.\n\nI hear voices as I get closer to the center of the park.\n\n*page_break\n\nWe duck down and move through the bushes. Near the center of the park is large fountain. Father Albert angrily paces\nback and forth in front of it. He's bloodied, but he doesn't appear to be injured.\n\nHe's got a little over a dozen people, normal people, left with him. They're armed and pretty much all injured.\n\nThere's also an assortment of monsters with them. They all look like they were once his people. Bizarrely, they aren't\nattacking father Albert or his people.\n\nFather Albert is alternating between mumbling to himself or shouting at his people. \"They are... they...\" He turns\nto face his remaining men. \"We have to be strong! This is all in God's plan! He... he will show us the light that...\nthat we will use to burn! To burn! To... to...\" He collapses to his knees, openly weeping. \"What is this? Why are we...?\"\n\nHis men don't show any reaction to this. They're all just standing around, scanning for threats.\n\nHe suddenly gets back to his feet. Tears are streaming down his face, but father Albert's expression is one of fury.\n\n\"We will beat these monsters back! Humanity has been threatened for too long! We will not submit! We will not submit!\" He points\noff to the distance. \"Go! Kill them! Kill everyone!\"\n\nAll of his people, and the monsters, run off in the seemingly arbitrary direction father Albert just pointed to. The man himself is\nalone now.\n\nIf we want to end this, now is the time.\n\n*page_break\n\nWe move in quietly. We might be able to get the drop on him.\n\nThe moment we step out of the pushes he whips around to face us. \"Demons! Here! Now!\"\n\nOr not.\n\nfather Albert's fury diminishes for a moment. \"I... I don't know...\" his gaze falls on me, and his expression softens. \"You.\nYour face is... familiar...\"\n\nI generate my bow. He's not carrying a gun. I might be able to wound him from a distance. Once he's disabled\nthe police can take him in after all those creatures are cleaned up.\n\nI draw my arrow back. I can feel everyone tensing next to me.\n\n\"Your mother... father... they were good people...\"\n\n\"'Were'?\" I hesitate. \"What do you-\"\n\nFather Albert's movements are blindingly fast. He closes in on me in an instant. He's got a gorgeous silver sword in his hand,\nI didn't even see where he drew it from.\n\n\"Die demon!\" His face is contorted in fury. He stabs forward.\n\nJoan slams her shoulder against the priest, sending him sliding backwards.\n\n\"Thanks,\" I say breathlessly. That probably would have impaled me if she hadn't done that.\n\n\"Keep it together!\" Lucas shouts. \"this guy isn't a push over!\"\n\nI take a deep breath. Just focus on what's happening now. Everything else will work itself out after.\n\n*page_break\n\n\"Disgusting... disgusting... disgusting... disgusting!\" father Albert makes a lunge toward me again. His rage\nin incredible.\n\n*fake_choice\n\t#Meet him head on. I'm confident I can stop him in his tracks.\n\t\t\n\t\tI will a buzz of energy up and through my body. We meet in an instant.\n\t\t\n\t\tHis sword crashed against mine. He's old, but there's a tremendous strength within him. He's\n\t\tactually managing to push me back, inch-by-inch.\n\t\t\n\t\tThankfully Joan slips in for the assist, and cracks him across the jaw with her gauntlet.\n\t\t\n\t\tAs strong as father Albert is, he doesn't take the blow well, and is noticeably staggered from the hit.\n\t\t\n\t\tThere's a fine line of blood dripping from his mouth.\n\t\t\n\t\t\"You... I am the voice...\"\n\t\t\n\t\tLucas lunges in and beats father Albert down with a series of rugged blows. It's actually kind of\n\t\tdisturbing to watch him beat the shit out of an old man.\n\t\t\n\t\tFather Albert is beaten into the ground pretty trivially.\n\t\t\n\t#Move back. One of the others can clip him as he's going by.\n\t\t\n\t\tI leap backwards as father Albert charges in.\n\t\t\n\t\tLucas and Rita move in together.\n\t\t\n\t\tThey take turns lashing out. Lucas beats him down with savage blows, before backing off to let\n\t\tRita cut him up with her knife, before backing off to let Lucas continue.\n\t\t\n\t\tIt's kind of disturbing to watch the two of them brutalize a priest.\n\t\t\n\t\tHe's lying flat on the ground. There's quite a bit of blood on his face right now.\n\t\t\n\t\t\"I... I am... the voice... I am the voice...\"\n\t\t\n*comment\n\n\"Don't get up,\" Joan pounds her fists together.\n\nLucas gives the biggest grin I've ever seen on him. \"I think the bastard's had enough.\"\n\n\"We can get him help once everything else is cleaned up,\" I say.\n\nThe man is still mumbling to himself. \"I... I am... I am...\"\n\nJoan steps toward him. \"Will you shut the hell up?\"\n\n\"I... am...\"\n\nThere's a subtle shift in the air. I can't quite make out what it is.\n\nSomething is happening to the haze.\n\n*page_break\n\n\"I... I...\" In a sickening motion, father Albert lunges back to his feet. The movement is unnatural, and\nI can see his bones bending under his skin.\n\n\"I am...\" His flesh twists and melts around him. His voice distorts as I can his spine twisting around inside his neck. Haze\nseeps out from every pore of his skin. His arms give off the most awful cracking sound I've ever heard as they grow longer. The\nback of his shirt tears open as fleshy spindles of flesh work their way out. The bones and skin wrap around each other until\nhe's got two fleshy wings. They just keep growing larger and larger, until they dwarf his body.\n\nHe falls to his knees in a violent motion. He digs his fingers directly into the concrete walkway beneath him. His finger break\nagainst the pavement before claws force their way out, replacing his digits. His knees pop and bend as they grow longer. The\nstructure changes to look more like a beast.\n\nHis skin won't stop crawling. Somehow, despite the constant twisting and tearing his body is still undergoing, he stand up.\n\nHe's so much taller, towering over all of us. Haze and blood oozes out of him and floats away. Strands of blood wisp out of multiple\ntears in his body, but never fully disconnect. The crimson streams just float lazily in the air around him, twisting and curling\nendlessly.\n\n\"I. Am. The. Voice. Of. GOD.\" He barely sounds human. His face as contorted into something unspeakable awful.\n\n\"What the hell is happening?\" Joan is backing away from father Albert.\n\nDammit! I should have just destroyed his otherworld self...\n\nWe can't just run away. I don't even want to think of how much damage he could cause.\n\n*page_break\n\nHe's like some sort of freakish angel. Even as his flesh keeps shifting, he's standing tall as he looks over us. His\nlimbs seem far too long. There's something about the way he's carrying himself, there's a certain... smugness to it.\n\nLike he's looking down at us.\n\n\"Pathetic animals.\" His eyes rapidly dart between the three of us. \"Your struggling is pathetic. You face God's champion.\nI am blessed by the angels themselves.\" His voice is evening out somewhat, though it doesn't sound normal. There's\na certain animalistic edge to it.\n\nHe's just watching us. It looks like the ball is in our court...\n\n*fake_choice\n\t#Let's just dive straight into this. Hopefully he's not as strong as he looks.\n\t\t\n\t\tWithout saying anything, I spring forward. I briefly hear the others gasp, I guess they didn't\n\t\tthink this was the right time to attack.\n\t\t\n\t\tFather Albert's head twists to the side ever so slightly.\n\t\t\n\t\tI'm not even sure what I'm trying to do here.\n\t\t\n\t\t*fake_choice\n\t\t\t#Stab him?\n\t\t\t\t\n\t\t\t\tIt's as good an idea as any.\n\t\t\t\t\n\t\t\t\tI will a potent energy into my legs before blazing forward. Even father Albert himself\n\t\t\t\tseems to have been caught off guard by this.\n\t\t\t\t\n\t\t\t\tI run my shining weapon straight through one of his elongated legs. A sudden burst of fog erupts out, followed\n\t\t\t\tby a trail of black slime that slowly oozes down his leg.\n\t\t\t\t\n\t\t\t\tJust before I can look up to see what his reaction is I'm suddenly swept aside by a powerful blow.\n\t\t\t\t\n\t\t\t\tI roll across the ground, but manage to regain my footing instantly.\n\t\t\t\t\n\t\t\t\tI'm not sure, but I think he struck me with one of his arms. He was strong enough to brush me aside pretty easily,\n\t\t\t\tbut I'm not hurt at all.\n\t\t\t\t\n\t\t\t\tFather Albert on the other hand is wincing as he stares down at the wound.\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#I could dive in for a second stab...\n\t\t\t\t\t\t\n\t\t\t\t\t\tNo time to second guess this, I rush in and stab his other leg.\n\t\t\t\t\t\t\n\t\t\t\t\t\tMy blade digs in deep, but he immediately responds by bringing two fists down on top of me. The\n\t\t\t\t\t\tforce behind those fists is incredible. And it feels like his mutated hands are made of stone.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI'm forced down onto me knees. This hurts really bad...\n\t\t\t\t\t\t\n\t\t\t\t\t\tCome on. You can recover.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI focus. Not on making myself faster or stronger, but just on making the pain drift away.\n\t\t\t\t\t\t\n\t\t\t\t\t\tA familiar energy wells up inside me.\n\t\t\t\t\t\t\n\t\t\t\t\t\tJust let it melt away...\n\t\t\t\t\t\t\n\t\t\t\t\t\tAnd it does. The pain drifts off to someplace far away. The burning pain fades into nothingness.\n\t\t\t\t\t\tI feel a strength return to me body.\n\t\t\t\t\t\t\n\t\t\t\t\t\t...Just in time for father Albert to kick me directly in the chest.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI'm sent rolling across the ground from the blow.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto lblOne\n\t\t\t\t\t\t\n\t\t\t\t\t#I think Joan and Elrin are plotting something...\n\t\t\t\t\t\t\n\t\t\t\t\t\tFather Albert has his gaze locked on me, so I walk around him, moving away from the others.\n\t\t\t\t\t\tHopefully they have some sort of follow up planned...\n\t\t\t\t\t\t\n\t\t\t\t\t\tMy eyes drift back to his injured leg. I can still see haze rising out of it. It almost\n\t\t\t\t\t\tlooks like the wound is steaming.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThere's a flash of movement, and Joan has leapt up and punched directly into the knee on\n\t\t\t\t\t\tfather Albert's injured leg.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe blow is so hard it causes the knee to snap out of place. Splattering of black gunk\n\t\t\t\t\t\tescapes from a small tear in the flesh as more haze bellows out.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFather Albert completely buckles. He falls forward, barely catching himself with those\n\t\t\t\t\t\tweird elongated arms. He's hunched forward. His back is forming a bizarre curve as his\n\t\t\t\t\t\tdisgusting wings fan open.\n\t\t\t\t\t\t\n\t\t\t\t\t\tRita runs up his back in an instant and leaps onto his neck. She drives her blade deep into\n\t\t\t\t\t\tthe side of his neck. She drags the blade toward herself, opening a massive tear in his neck.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFor a moment father Albert just... freezes. And then, there's a slight tremor in his right arm.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn a sudden flash of movement he grabs Rita and throws her directly at me. I don't have time to\n\t\t\t\t\t\treact before both she and I are sent tumbling across the ground together.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto lblOne\n\t\t\t\t\t\t\n\t\t\t\t*comment\n\t\t\t\t\n\t\t\t#Arrow. Definitely.\n\t\t\t\t\n\t\t\t\tFather Albert is looking pretty dangerous right now, but there's still a little bit of distance\n\t\t\t\tbetween us.\n\t\t\t\t\n\t\t\t\tI take aim with my arrow. \"Let's see how he handles this...\"\n\t\t\t\t\n\t\t\t\tI fire an arrow into his torso. Haze bellows out of his wound as a black sticky substance rolls down\n\t\t\t\this chest.\n\t\t\t\t\n\t\t\t\tFather Albert himself doesn't even flinch.\n\t\t\t\t\n\t\t\t\t\"Uh...\"\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#It's impossible for me to miss a target that big at this range. I'll just fire as rapidly as I can.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI don't bother making any effort to aim. I just fire arrow after arrow as rapidly as my arms\n\t\t\t\t\t\twill let me.\n\t\t\t\t\t\t\n\t\t\t\t\t\tShining arrow after shining arrow plugs a hole into father Albert's body. That\n\t\t\t\t\t\tdisgusting ooze keeps coming out.\n\t\t\t\t\t\t\n\t\t\t\t\t\tSlowly father Albert makes his way over to me. If my arrows are hurting him, he's not\n\t\t\t\t\t\tshowing any sign of it.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe suddenly reaches forward, picks me up, raises me high into the air...\n\t\t\t\t\t\t\n\t\t\t\t\t\tAnd throws me down against the concrete.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto lblOne\n\t\t\t\t\t\t\n\t\t\t\t\t#Maybe I should just try to keep him distracted until the others do something...\n\t\t\t\t\t\t\n\t\t\t\t\t\tI circle around him, away from the others. I keep firing arrows. Every shot is hitting, but father\n\t\t\t\t\t\tAlbert isn't reacting to anything I'm throwing at him.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe starts to lumber towards me on those weirdly long legs. I keep backing away, trying to stay out\n\t\t\t\t\t\tof the range of his arms.\n\t\t\t\t\t\t\n\t\t\t\t\t\tCome on guys... do something for me...\n\t\t\t\t\t\t\n\t\t\t\t\t\tThere's a flash of movement, and Joan has leapt up and punched directly into\n\t\t\t\t\t\tfather Albert's right knee.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe blow is so hard it causes the knee to snap out of place. A splattering of black gunk\n\t\t\t\t\t\tescapes from a small tear in the flesh as more haze bellows out.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFather Albert completely buckles. He falls forward, barely catching himself with those\n\t\t\t\t\t\tweird elongated arms. He's hunched forward. His back is forming a bizarre curve as his\n\t\t\t\t\t\tdisgusting wings fan open.\n\t\t\t\t\t\t\n\t\t\t\t\t\tRita runs up his back in an instant and leaps onto his neck. She drives her blade deep into\n\t\t\t\t\t\tthe side of his neck. She drags the blade toward herself, opening a massive tear in his neck.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFor a moment father Albert just... freezes. And then, there's a slight tremor in his right arm.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn a sudden flash of movement he grabs Rita and throws her directly at me. I don't have time to\n\t\t\t\t\t\treact before both she and I are sent tumbling across the ground together.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto lblOne\n\t\t\t\t\t\t\n\t\t\t\t*comment\n\t\t\t\t\n\t\t*comment\n\t\t\n\t*if (false) #Maybe the others have an idea?\n\t\t*comment \u003cNote: Put something here later>\n*comment\n\n*label lblOne\n\nThat hurt. A lot. I'm starting to get worried here...\n\n*page_break\n\nI struggle to get back on my feet. Joan comes up and helps me get back up.\n\n\"You okay, buddy?\" she asks.\n\n\"Ugh...\"\n\n\"Don't get distracted.\" Rita groans as she gets back up. \"He's still standing.\"\n\nFather Albert towers before us.\n\n...He seems to have lost focus though.\n\n\"Laura?\" He's looking all around, like he's searching for someone. \"L-laura? Toby? Where did you two... where did you go?\" His\ntone changes. \"I don't- I don't- I don't-\" I can't see any tears, but his voice is cracking. \"Why am I-\"\n\nJoan leaps up and cracks him across the jaw. There's a light shower of black ichor that falls over the pavement.\n\nFather Albert is actually floored from the blow.\n\nHe lies motionless...\n\n*page_break\n\nHis skin is still moving around, but father Albert isn't moving or making any noise.\n\nI cautiously take a step toward him. \"Was that it-\"\n\nFather Albert suddenly howls as he staggers back to his feet. His flesh is tearing open all over his body. Haze and black ichor oozes\nout. His skin tightens around his bones until I can clearly make out his deformed skeleton underneath.\n\n\"Where are you! I need you to k-kill! K-Kill! KiLl! kILl! KiLL! kIlL! KiLl THeM aLl PleASe God WhY ArE AllOWinG ThiS AbomInATIonS ArE\nUNForgIvAble I'M SorRy It WaSN't SuPPoSeD TO HapPEn LIkE ThIs!\"\n\nIt looks like father Albert's body is still trying to morph, only now... it's not working.\n\nI see flesh covered bone burst out of his sides. They twist around and start to form little claws, but the arms suddenly give out. They\nfall to his sides as the flesh just melts off the bone. The bone itself breaks off into little flecks of brittle bone. Tears form all\nover his body.\n\nThe amount of haze pouring out of him slowly dies down, as does the flow of black ichor.\n\n\"I CaN't LeT... yOU DeMoNs... WiN...\" Father Albert is wasting away in front of us. He collapses, his bony legs completely\nincapable of handling his body. He starts dragging himself forward. Flesh is dripping off his now bony wings.\n\nDespite all of this, he does manage to drag himself face to face with us. \"YoU MUst DiE!\" He raises one of his arms up. It's trembling.\n\nJoan brings her arm back, and slams her fist directly into his face. The ground shudders from the force of the impact.\n\nFather Albert's head just... explodes.\n\nIt's not gory.\n\nThere's just a sudden burst of haze. Some black ichor oozes out of the remnants of his warped skull. And he goes still. His\nbody has finally stopped warping. Now it's melting away.\n\n\"Jesus Christ...\" I stare at his remains. \"What the hell even was this?\"\n\n\"I don't know,\" Joan says. She looks at me. \"We should of just destroyed those... whatever they were in the other world when\nwe had the chance.\"\n\nHis remains have already almost turned to dust and tar.\n\n\"I know.\"\n\n*page_break\n\nSomehow, our work isn't done here.\n\nThe rest of his cult are still out in the city. Those that are alive anyway.\n\nThe haze lessens as the night goes on. We find a lot of those monsters collapsed on the ground. They're covered\nin tears and black ichor, but... they actually seem to have returned to normal.\n\nNot all of them survived turning back though. Their wounds are always terrible. The only ones who pull through are the ones that are immediately\npatched up.\n\nQuite a few others aren't found until morning, and by then...\n\nIt's just too late.\n\n*page_break\n\nWindbrooke is uneasy once again, but this could have been far worse. Father Albert's cultists were mostly eradicated. A select\nfew survived either because they turned into monsters but were saved in time, or actually had the good sense to surrender to police.\n\nAngeline's group needs to vanish. They didn't appear in the local news, but Angeline wants to play things safe.\n\nThey let me stick around until River's treatment is finished. Honestly, after everything that happened in Windbrooke,\nI was shocked that Raven didn't match back here to make me leave.\n\nThe Scourge's HQ is abandoned. I wind up holing up in a pretty mediocre apartment with Angeline and River.\n\nI don't know where Lucas and Rita are, but Angeline assures me I can meet up with them in a few months, after\nthings have settled down.\n\n*page_break\n\nIt's been a few days now. My parents showed up in a hospital after reverting back from being turned into a pair of\nthose monsters. I haven't gotten to see them. They were with that group, so... the police are watching over\nthem until they recover.\n\nAnd then... they're probably going to prison.\n\nI don't know how to feel about that.\n\n*page_break\n\nI find myself staring at the television. It isn't on.\n\nWhat now?\n\nThe haze really does seem to be gone now. It hung in the air for a few days, but it slowly drifted away.\n\nI don't know what Raven has been up to. I'm probably better off just not knowing.\n\nI guess... I just go back to how things used to be. Go to school, come home to Raven to help\nout at the store. Whenever it gets rebuilt.\n\nThere's a knock at the door.\n\n*page_break\n\nI get up and make a move toward the door.\n\n\"That's probably her,\" Angeline calls from the other room. \"Sorry in advance.\"\n\nYou're sorry?\n\nI open the door.\n\nAnd Raven is standing there.\n\n*page_break\n\nShe looks terrible.\n\n*page_break\n\nShe's just grinning at me. \"Hi, sweetie.\"\n\nHer clothes are torn up. Half of her face is badly bruised. Dried blood coats her body.\nFrom the way she's carrying herself, I think one of her legs are hurt.\n\nI stare at her for a very long time, before slowly stepping aside so she can come in.\n\n*page_break\n\nI wait on the couch while she showers in the back. Eventually she pops back in looking noticeably\nbetter, and with a fresh set of clothes.\n\nElrin briefly steps into the room and says, \"I'll have dinner ready in ten minutes, ma'am. Feel\nfree to come eat when you two are ready.\"\n\nRaven nods as he leaves, before turning turning to me.\n\nWe just sort of awkwardly stare each other.\n\n\"...It sounds like a lot has happened?\" Raven asks.\n\n\"Yeah.\"\n\nShe just keeps staring at me. Almost expectantly.\n\nWait.\n\nI glance toward the back of the house.\n\nDid Angeline...\n\n*page_break\n\nI mean... I guess I was always going to tell Raven everything that happened, but...\n\n\"Angeline!\" I shout toward the back of the house \"You could have at least warned me!\"\n\n\"I said 'sorry in advance'!\" she calls back nonchalantly.\n\n*page_break\n\nWhen I look back at Raven she wraps me up in a hug. \"I don't know what I would have done if you got hurt...\"\n\n\"I'm fine. Everything worked out.\"\n\nShe suddenly lets go of me, and looks me dead in the eye. \"If you ever get into that sort of trouble again,\nand don't tell me about it, I swear to god... I. Will. Murder. You.\"\n\nShe's giving me a very serious look right now, but I can't help letting a startled laugh escape from me.\n\n\"I'm serious, $!{fiName}!\"\n\n\"I know! I know!\" I fail to suppress my laughter. \"Really. I do.\"\n\nShe's still giving me an intense look.\n\nI finally get my laughter under control, and take on a more serious tone. \"Seriously. I do. Things just... kind\nof got out of hand. I promise I'll come to you next time.\"\n\n\"You'd better,\" she says.\n\n*page_break\n\nI look Raven over. She's still a little banged up, but she's not in nearly as bad a condition as I had initially thought.\n\n\"So...\" She's not going to tell me anything, but I have to ask. \"What exactly happened to you?\"\n\n\"Work got complicated,\" Raven responds.\n\n\"No kidding.\" I hesitate. \"I don't suppose you're willing to elaborate on that?\"\n\n\"Nope,\" she says.\n\n*page_break And that was that\n\nWeeks pass. Raven gets a new store.\n\nShe apparently has a massive amount of money from her mysterious 'work' because she apparently isn't\nfinancially troubled at all from having to buy a whole new building.\n\nI'm trying to stay in touch with Rita and Lucas, but I can already feel distance forming.\n\nIt's easier with Joan since we got to school together, but I wonder if we'll stay in contact when we\ngraduate.\n\nI can't help but shake the feeling all of them are unhappy I worked with that old guy.\n\n*page_break And that old guy...\n\n*if (fVampireSeed = true)\n\tI'm still waiting for my vampirism to emerge. I can feel it coursing under my skin these last few days. Like\t\n\tsomethings trying to get out.\n*if (fWerewolfSeed = true)\n\tI'm still waiting to transform into a wolf. I can something inside me. I think it'll happen soon.\n*comment\n\nAnd then one night...\n\n*page_break I have a dream\n\nThere's a void around me. In front of me is that... shadowy woman.\n\nI can scarcely make out a single detail about her against the darkness around us. All I see are the glow\nof her eyes.\n\n\"Mmm.\" She's just floating there, watching me.\n\nI try to speak, but my words fail me.\n\nAre we in the other world? I feel so... disconnected.\n\nThere's no haze though.\n\n\"I suppose you did the best you could,\" she says. \"You even managed to save some people. Not everyone. But some.\"\n\nShe's so distant. Everything is. I don't think I can hold on to me connection to this world for much longer.\n\n\"Try not to have any regrets,\" she says. \"You didn't die. And neither did your friends. This could have gone\na lot worse for you all.\n\n\"I suppose this is our final goodbye. Until next time, try to take care of yourself.\"\n\n*goto_scene Final ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "badend_contact": "\n\n\n\n\n*if (location = \"Elrin\")\n\t\n\tI sleep restlessly that night.\n\t\n\tI feel so uneasy...\n\t\n\t*page_break\n\t\n\tI don't bother going to school the next day. I call Rita instead.\n\t\n\tIt's been a while since I saw Rita, and I never did call her after she gave me that number.\n\t\n\tI'm not quite sure what to say.\n\t\n\tI'm sitting at a random street in Windbrooke as I'm calling her.\n\t\n\tThe phone rings. And rings.\n\t\n\tAnd then I hit the voice mail.\n\t\n\tI consider leaving a message on it, before remembering how often I check my own. I don't\n\tthink anyone actually uses voice mail.\n\t\n\tI send her a text instead.\n\t\n\t'Hey, Rita. It's $!{fiName}. I need to get in touch with Angeline.' -You-\n\t\n\tYeah. That should work.\n\t\n\tA second after I hit send, I instantly get a call from her number.\n\t\n\t*if (f_010_RitaAndHaze = true)\n\t\t\n\t\t\"You never called me back!\" Rita shouts. \"I told you I needed to talk to you about that... haze stuff.\"\n\t\tThere's a very brief pause. \"How do you know Angeline?\"\n\t\t\n\t\t\"It's... complicated,\" I say. \"And I have a lot I need to tell her. Can you arrange a meeting?\"\n\t\t\n\t\t\"I-\" It sounds like she's talking to someone else with her. I can't make out what they're saying. \"Yes.\n\t\tBut I'll have to talk to her first. I'm gonna hang up, but please wait for my call. She needs to meet\n\t\tyou as soon as possible.\"\n\t\t\n\t*if (f_010_RitaAndHaze = false)\n\t\t\n\t\t\"How do you know Angeline?\" Rita immediately asks. \"I didn't-\"\n\t\t\n\t\t\"I promise, I will explain everything,\" I say. \"She doesn't know me, but I know her. I know she killed\n\t\tsome psycho named Mr. Barrow. I know her group...\" What did that old guy call it? \"The Scourge. Or whatever.\n\t\tI know you're planning some huge attack. I need to talk to her about it.\"\n\t\t\n\t\tThere's a long pause on the line.\n\t\t\n\t\t\"You want to meet her?\" she asks.\n\t\t\n\t\t\"Yes. Face to face. Please.\"\n\t\t\n\t\tAnother pause. She's talking to someone. I can't make out what they are saying.\n\t\t\n\t\t\"Alright, I can arrange that. I think,\" Rita says. \"I need to let you go for a moment, but please wait for\n\t\tmy call. She'll probably want to meet you as soon as possible.\"\n\t\t\n\t*comment\n\t\n\t\"Fine.\"\n\t\n\t*page_break\n\t\n\t*goto_scene BadEnd_Elrin\n\t\n*if (location = \"Scourge\")\n\t\n\tRita and Lucas agree not to explain anything to Angeline until tomorrow.\n\t\n\tWe've already been through too much today. I just want to sleep.\n\t\n\t*page_break\n\t\n\tIt's not a good sleep. I'm restless the entire night.\n\t\n\t*page_break\n\t\n\tThe next morning I make tracks to their main building, assuming I'll find Angeline there.\n\t\n\tI see a lot of people milling around outside of it. There's a certain tension in the air.\n\t\n\tI realize I wasn't awoken by the sound of people running firing drills today. In fact, looking\n\taround, I see no one is doing anything. Everybody is just staring at the main building.\n\t\n\tSomething is happening...\n\t\n\t*page_break\n\t\n\t*goto_scene BadEnd_Angeline\n\n*if (location = \"Union\")\n\t\n\tWe don't see father Albert when we return, which is fine. We've gone through too much today. I just want to sleep.\n\t\n\t*page_break\n\t\n\tIt isn't a good sleep. I'm restless the entire night.\n\t\n\tWhen the sun finally rises, I don't feel any better. The compound sounds unusually quiet.\n\t\n\t*page_break\n\t\n\tLaura and Toby are waiting for me the moment I step out of my room.\n\t\n\tThey look... scared.\n\t\n\t\"Something is wrong with father Albert,\" Laura says. \"We're keeping everyone out of the church\n\tfor now, but you need to see him.\"\n\t\n\t*goto_scene BadEnd_Albert\n\t\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "badend_elrin": "\n\n\n\n\n\n\n\n\n\nElrin drives me to a seemingly unimportant corner of Windbrooke. It's not a great neighborhood. Most\nof the store around here have been shut down.\n\nI was given no other instructions than to wait.\n\nEventually, a black van pulls up behind us. I see that same girl Rita in the passenger seat. There's\nsome other guy driving the van, but I don't recognize him.\n\nHe stays behind while Rita gets out. I step out too.\n\nSurprisingly, Elrin stays behind. I guess he's trusting me with this?\n\n*page_break\n\n\"Hey,\" Rita says, uncertainly.\n\nI just nod at her.\n\n\"I can take you to see Angeline, but...\"\n\n\"Did something happen?\" We did just destroy her double in the other world. \"Did her behavior suddenly change?\"\n\nRita hesitates. \"...Yes. What do you know?\"\n\n\"It's kind of a long story...\"\n\n\"Well then,\" she says. \"You can tell it on the way over.\" She glances past me, at Elrin. \"Is he coming too?\"\n\nI nod, before turning and motioning for Elrin to join us.\n\n\"He can just follow us in his car,\" she says, wasting no time returning to her van. \"Just keep up with us.\"\n\n*page_break\n\nWe drive to... seemingly the middle of nowhere. We're just out in the countryside.\n\nThe standard location for anything supernatural. Apparently.\n\nWe arrive at a very small cave. The road runs by it, so we all just park off the side of it.\n\nWhen we step out, Rita speaks up. \"I don't really like leaving our cars out like this, but... time\nis of the essence and all that.\"\n\nI stare at the cave entrance. \"Are we... going in there?\"\n\n\"No,\" Rita says flatly. \"We're just meeting her here.\"\n\n\"'Her'?\"\n\n\"Angeline, obviously.\"\n\n*page_break\n\nWe idle outside that cave. I keep my eyes on the road, expecting Angeline to show up any second.\n\nI jolt with surprise when she speaks up from behind me. \"You're $!{fiName}?\"\n\nI whip around and... yeah. It's her.\n\nIt's kind of surreal seeing her in person like this. \"Uh... hi?\"\n\nShe looks tired. \"Hello. Rita made me aware some time ago that you had a certain... awareness of us.\" Her eyes\nare bloodshot. And there are dark circles under them.\n\n\"Yes...\" I really hope this woman doesn't incinerate me.\n\n\"And now you want to meet me?\" she asks. \"Why?\"\n\n*if (f_010_RitaAndHaze = true)\n\t\n\tI had already told Rica about everything we were doing before... I might as well keep being straight with them.\n\t\n\tI hope they keep believing me.\n\t\n*if (f_010_RitaAndHaze = false)\n\t\n\tThe truth would sound absolutely bonkers, but I can't think of any other way to spin this situation. I just\n\tneed to tell them the truth. About everything.\n\t\n\tI just hope they believe me.\n\t\n*comment\n\n*page_break\n\nAnd so... I do tell them everything. I don't leave a single detail out.\n\n*page_break\n\n\"Hm. Amazingly, you're telling the truth,\" Angeline says. Her tone is oddly certain.\n\nThere's a lapse after that. She says nothing, but looks very troubled.\n\nI see Rita staring at the women. She looks like she wants to say something.\n\nBefore I can step in, she does.\n\n\"Let's drop the plan,\" Rita says. \"Everybody wants to.\"\n\n\"What?\" Angeline whips around. \"what do you mean?\"\n\n\"I... I don't know,\" she says. \"This morning... everybody changed. I changed. Nobody wants to go through with this anymore.\"\n\nThe effect was that dramatic? \"You've still got a way out. Take down father Albert. You can still do the right. This doesn't\nhave to be for nothing.\"\n\nAngeline doesn't say anything for a long while. She just sighs as she runs her fingers through her hair.\n\n\"I need to digest... all of this,\" she says.\n\nI frown. \"Well... You still have time I suppose.\"\n\n\"Good,\" she says. \"I'll be in touch.\" She looks at Rita. \"Father Albert has been a thorn in our\nside long enough. If he's been debilitated, or... has been debilitated, it'd be foolish for us not to seize this opportunity\nto finally take him out.\"\n\n\"...Do you know where to find him?\" I ask.\n\n\"We have a mole of sorts,\" Angeline says with a smirk. \"Rita. Tell them what we know about father Albert. His compound, his mission,\neverything.\"\n\n\"Understood,\" Rita says. \"Are you staying?\"\n\n\"No,\" Angeline starts moving toward that cave. \"I... need to think about everything.\"\n\nTheir base is underground...?\n\nRita looks at me. \"Do you two have anywhere we could talk about everything? I've got a lot of information to show you...\nit'd be nice if we had somewhere quiet to discuss things.\"\n\n\"Well... we do have an HQ. Kind of.\"\n\n*page_break\n\nUnlike me, Joan actually did go to school, so it's quite a while before we all meet up with Rita in front of the warehouse.\n\n\"This is your head quarters?\" Rita asks.\n\n\"I don't like this lady,\" Joan whispers. \"I don't trust her.\"\n\n\"Nice,\" Rita says. \"It looks just like ours.\"\n\n\"She's alright. I guess.\"\n\n\"This is really smart,\" Rita continues. \"You chose this place because people won't think there's anything special about it.\"\n\nI stare at Rita. \"...It's just a warehouse.\"\n\nJoan elbows my ribs. \"Yep. That's exactly why [i]I[/i] chose this location. You could say I'm the brains of this operation.\"\n\n\"Hmm.\" Rita jerks a thumb back towards her van. \"I've got some stuff to unload. Can you three help me.\"\n\n*page_break\n\n\"Wow,\" Rita comments. \"It sure is sparse in here.\"\n\nI forgot how empty this warehouse is. We still only have that white board and a couple of chairs.\n\nThere's not even enough chairs for everyone.\n\n\"We're looking for more furniture,\" Joan says.\n\nI give Joan a look. \"I don't think we are...\"\n\nShe glares at me. \"I'm trying to leave a good impression on our new friend here...\"\n\nElrin has been hanging back from us for a while. I'm a little surprised when he suddenly speaks up. \"I hate to interject, but\nhow exactly are you allowed to use this space?\"\n\n\"Oh.\" Joan gives him a blank stare. \"We're not.\"\n\nElrin stares at her for several moments. \"Please don't get us arrested.\"\n\n\"Okay!\" Rita says a little too loudly. \"Can we just get on with this?\"\n\n*page_break\n\nShe dumps a large number of documents onto the floor, which we all gather around.\n\n\"Are you sure you don't have a table stashed somewhere?\" Rita asks.\n\n\"Sorry,\" Joan says. \"Maybe we could try to stand some of these up against the white board?\"\n\n\"No, no... it's fine.\" Rita picks through a few folders. \"Let me just... here it is.\"\n\nShe shows several pictures of some sort of compound. It looks like it's in the woods. I can see Windbrooke's tall\nbuildings far in the distance.\n\nElrin stiffens as his eyes fall on the pictures. I don't comment on it.\n\n\"This is their compound,\" Rita says. \"It's South-West of Windbrooke.\" She finds some more photos. These ones shows men\nwearing camouflage and carrying assault rifles. \"There's some sort of backwards militia. And they [i]really[/i] don't take\nkindly to our kind.\"\n\nI sneak a glance at Elrin, who's staring at the pictures with an uncomfortable amount of intensity.\n\n\"Are you... okay?\" I ask.\n\nElrin snaps out of it. \"Yes.\" His tone is flat though.\n\nI stare at him for a moment. \"...Do you know who these people are?\"\n\n\"Ah.\" He shoots me a surprised look.\n\nIs he going to deny it? He obviously does know them.\n\n\"Yes.\" Elrin pauses for a really long time.\n\nEveryone is staring at him.\n\n\"They burned Mrs. Lilia's store to the ground.\"\n\n*page_break\n\nI stare at him. \"...These are those people?\"\n\nElrin nods.\n\n\"How do you know?\"\n\nElrin says, \"Raven's... work has brought her into contact with groups like them repeatedly.\"\n\n\"Is she trying to stop them?\" I ask.\n\n\"I don't know,\" Elrin says. \"I'm acting as a vassal for, but the particulars of her work are none of my\nconcern. It's not my place to know.\"\n\nI just sit there for a while letting that information digest.\n\nIt takes me a few moments to notice something is still off about Elrin. Like he's holding something back.\n\n\"Is there anything else?\" I ask.\n\n\"Hm?\"\n\n\"Is there anything else I need to know here?\"\n\n\"Hm.\" There's a very complicated emotion playing on Elrin's face right now. \"Yes.\"\n\nI stare at him, as he says nothing.\n\nWhen he finally does talk, it looks like it's taking everything he has just to speak. \"Your parents... are...\" His\nvoice becomes much quieter. \"With them.\"\n\n\"What do you mean?\" I ask. \"Like, they know who these people are?\"\n\n\"As in...\" Elrin hesitates. \"They are members of their organization, and are aware that their overarching goals\ninvolves harming monster kind. They joined them specifically because of these goals.\"\n\n\"That's... that can't be right.\"\n\nElrin sighs. \"Your parents... aren't fond of the supernatural. In any form. Not magic. And certainly not creatures like\nus.\"\n\n\"Raven uses magic,\" I say. \"She's been in their lives for years. She and my mother are really close.\"\n\nElrin is just giving me some look now.\n\n*page_break\n\n\"Not they aren't,\" Elrin states. \"They're relationship is strained, and has always been strained. The only reason\nyour mother let Mrs. Lilia be in your life is because she is a blood relative. If family wasn't important to her, she'd\nhave nothing to do with her.\" He pauses. \"Or you.\"\n\n\"Me?\"\n\n\"You're not human anymore,\" Elrin says. \"Perhaps your mother and father don't know that, but when they find out... they\nlikely won't be happy. And they may want you to adjust your behavior when your vampirism emerges so they can be less...\naware of it.\"\n\nI'm suddenly aware of everyone staring at me.\n\nJoan looks very concerned. Rita just looks awkward, like she knows this conversation might be a little too personal\nfor her to just be casually eavesdropping.\n\n\"I-\" Wait a minute... Elrin knew where my parents were this entire time?\n\n*page_break\n\nNo. Raven knew where my parents were this entire time.\n\n\"Why the hell didn't either of you tell me where my parents were?\" I scowl at Elrin. \"For all I knew they\nwere dead!\"\n\n\"She probably didn't know how to tell you,\" Elrin says. \"Your parents willingly joined a very dangerous group. They\nlikely knew Mrs. Lilia was going to be targeted by them. In fact, they probably are the reason that attack even happened.\"\n\n\"You can't know that,\" I respond.\n\n\"Mrs. Lilia is someone of some important in Yggdrasil, but she's fairly unknown in the rest of the world,\" Elrin explains.\n\"That group had no reason to target her out of the many many other potential victims they could have made.\"\n\n\"Dammit...\" I need to talk to them. I look at Rita. \"Where is this compound?\"\n\nRita's stare cuts into me. \"Do you want to know where the base is to plan an attack? Or are you going to do something stupid?\"\n\n\"I'm going to talk to my parents.\"\n\n\"So something stupid,\" Joan says.\n\nI glare at her. \"No.\"\n\n\"Yes,\" she says. \"What are you going to do? Warn them? They'll just tell the rest of the group. And also possibly sic the\nrest of the group on you.\"\n\n\"They wouldn't do that to me,\" I respond.\n\n\"Alright. But what if they tell the rest of the group, and they all attack you, not caring that your folks have a problem with it?\"\nI try to respond, but Joan cuts me off and keeps going. \"$!{fiName}- look, I get it. They're your parents. But this is too dangerous.\nYou're not going to be able to win them over.\"\n\n\"Joan,\" I say flatly. \"this isn't a stupid idea! They're my parents. I have to at least try.\"\n\n*page_break\n\nNobody says anything for several moments.\n\nEventually, mercifully, Rita speaks up. \"Uh... we have a guy on the inside. We could maybe work something out. Let you talk\nto your parents one on one? Away from the group?\"\n\n\"You can?\" I smile. \"So you agree with me? If I just talk to them-\"\n\n\"Whoa, whoa-\" Rita shakes her head emphatically. \"Hell no. But... like you said. These are your parents. If you want\na chance to talk them down... fine. We can arrange that. It won't work, but... I'm not going to ask you not to try.\"\n\nI pause. I really don't like how everyone's saying me trying not to get my parents murdered or arrested is a bad idea.\n\nBut she's willing to help, so I'll deal. \"Fine. Thanks.\"\n\n\"Good,\" Rita nods. \"I'll set up the meeting now.\" She looks at all the folders. \"And after this doesn't work,\nwe can adjust the plan based on the knowledge that these dicks know we're coming.\"\n\n*page_break\n\nWhen Rita said she would set up the meeting 'now', I assumed that meant she'd make a phone call and then some days\nlater I'd get to see them.\n\nSo I was rather surprised when she had me load up into her van and took me toward the direction of their compound. She\ndidn't allow Joan or Elrin to tag along on the general basis that she wanted as few people approaching their compound\nas possible.\n\nI don't know anything about 'stealth' so I guess I'll just take her word for it.\n\n*page_break\n\nWe park off the road seemingly in the middle of nowhere before traveling through the woods on foot. It isn't\nlong before we near a large wall of what looks like the compound. It's just across a large grassy field.\n\nMy dad is standing near the edge of the tree line. I make a move to rush towards him, but Rita holds me\nback.\n\n\"Approach. Carefully.\"\n\nI nod, but an enthusiastic energy wells up inside me, propelling me forward. Recognition flashes in his eyes.\n\nThere's my dad. He's still wearing those thick rimmed glasses he always wears, though\nI notice a sizable crack in the right lens.\n\nMy mom is... oddly nowhere to be seen.\n\n\"Dad?\" I look around.\n\nThere's no one else here. Also, Rita seems to be hanging back for some reason.\n\nMy dad looks... nervous. \"Hey there.\" His tone is really strange.\n\nUpon taking a closer look at him, he's not just nervous, he's an actually shaking a little.\n\n\"Dad? It's me. Is... is something wrong?\"\n\n\"No! No!\" he says quickly. \"Not at all. I just uh... is there anyone else here with you?\"\n\n\"Uh...\" I look behind me. Rita has completely fallen out of sight at some point. \"No?\"\n\n\"Oh... that's uh. That's really good.\"\n\n*page_break\n\nWe stare at each other for a really long time.\n\nThis wasn't exactly how I thought this would go.\n\n\"Dad, uh.\" Right. I need to warn him. \"These people you're with..
