\"Your welcome.\"\n\t\t\n\t\tI might actually hit him.\n\t\t\n\t\tI'm going to hit him.\n\t\t\n\t\tI take a step forward when Joan speaks up. \"That's... cool. It's cool. I'll, uh... I can call you about\n\t\tthat later today.\"\n\t\t\n\t\tJoan's not quite looking at me. But, she is smiling. A lot actually.\n\t\t\n\t\tI look at Toby. He still looks happy and proud.\n\t\t\n\t\tThat little punk is getting a stay of execution. For now.\n\t\t\n\t*comment\n\t\n*comment\n\n*page_break\n\nAs the next few hours pass, the day draws to a close. Eventually Joan has to go home. We decide to head back too.\n\nThe haze is noticeably thinner around the mall. That might only be because we destroyed the sphere here, but I'd\nlike to think it's a sign there are none left at all.\n\nMaybe the city is recovering.\n\nI can only hope things keep going this smoothly.\n\n*page_break\n\n*if (location = \"Elrin\")\n\t\n\tElrin and I are driving back to Yggdrasil.\n\t\n\tHe's tapping his fingers against the steering wheel while waiting for a light to turn green.\n\t\n\tI lean back and close my eyes.\n\t\n\tI feel something in the distance. It feels like it's deep beneath the earth. It's some sort of shuddering\n\tpower. It's building.\n\t\n\tI frown. \"Elrin, do you...\"\n\t\n\tIt explodes. A tidal wave of haze and emotions, all negative, flood by me.\n\t\n\tMy eyes snap open to see everyone on the streets around us falling to their knees. Surrounding car horns are blaring.\n\tOne car speeds off and runs directly into a wall.\n\t\n\tThe feeling passes. I can still feel the source of the wave in the distance, but only just barely.\n\t\n\tElrin is looking around in a panic. Random people on the streets are slowly getting back to their feet. Multiple\n\tpeople are exiting their cars, trying to figure out what is happening.\n\t\n\tWhatever that was seems to be over.\n\t\n\tElrin looks back at me. \"Are you okay?\"\n\t\n\tI nod. \"Whatever that was... I think I can feel it.\"\n\t\n\tElrin peers off into the distance. \"I can as well...\"\n\t\n\tMy phone buzzes in my pocket. When I look, I see a message from Joan.\n\t\n\t*page_break\n\t\n\t'DUDE SOME CRAZY STUFF JUST HAPPENED' -Joan Catalan-\n\t\n\t'You felt a surge of haze?' -You-\n\t\n\t'...Yes. I can feel it's source too.' -Joan Catalan-\n\t\n\t'Are you able to meet us right now?' -You-\n\t\n\t'It's late, but yeah. I'll make up an excuse for mom and dad later.' -Joan Catalan-\n\t\n\t*page_break\n\t\n\tWe quickly meet up with Joan and load her into the car before taking off vaguely in the direction of that pulse's source.\n\t\n*if (location = \"Scourge\")\n\t\n\tRita, Lucas, and I are driving back to the HQ.\n\t\n\tThe road we're headed down right now is pretty lonely. I don't a single other person or car on the street.\n\t\n\tLucas and Rita have been talking about something for ages. I've been completely checked out, so I have no clue what\n\tthe conversation is about.\n\t\n\tI lean back and close my eyes.\n\t\n\tI feel something in the distance. It feels like it's deep beneath the earth. It's some sort of shuddering\n\tpower. It's building.\n\t\n\tI frown. \"Hey guys, do you...\"\n\t\n\tIt explodes. A tidal wave of haze and emotions, all negative, flood by me.\n\t\n\tMy eyes snap open. Lucas loses control of the van for a moment. I feel the vehicle sliding across the ground before\n\tskidding to a stop.\n\t\n\tThe feeling passes. I can still feel the source of the wave in the distance, but only just barely.\n\t\n\tLucas is sitting completely frozen. His fingers are tightly gripping the steering wheel. Rita is looking\n\taround in a panic.\n\t\n\tWhatever that was seems to be over.\n\t\n\t\"W-what the hell was that?\" Rita sputters out.\n\t\n\t\"Was that...\" Lucas lets go of the steering wheel. \"...Was that from the other world?\"\n\t\n\tI nod. \"I think so.\" My phone buzzes in my pocket, and I check it.\n\t\n\t*page_break\n\t\n\t'DUDE SOME CRAZY STUFF JUST HAPPENED' -Joan Catalan-\n\t\n\t'You felt a surge of haze?' -You-\n\t\n\t'...Yes. I can feel it's source too.' -Joan Catalan-\n\t\n\t'Are you able to meet us right now?' -You-\n\t\n\t'It's late, but yeah. I'll make up an excuse for mom and dad later.' -Joan Catalan-\n\t\n\t*page_break\n\t\n\tI take a deep breath as I put the phone away.\n\t\n\tRita and Lucas are staring at me.\n\t\n\t\"You two ready?\" I ask.\n\t\n*if (location = \"Union\")\n\t\n\tToby, Laura, and I are driving back to the compound.\n\t\n\tWe just got away from the largest parts of the city, and are headed into the nearby countryside now.\n\t\n\tToby is humming along to some song on the radio. Laura is just staring out the window.\n\t\n\tI lean back and close my eyes.\n\t\n\tI feel something in the distance. It feels like it's deep beneath the earth. It's some sort of shuddering\n\tpower. It's building.\n\t\n\tI frown. \"Hey guys, do you...\"\n\t\n\tIt explodes. A tidal wave of haze and emotions, all negative, flood by me.\n\t\n\tMy eyes snap open. Toby slams on the brakes, but manages to gracefully guide us just off the road.\n\tLaura is looking in every direction, eyes wide.\n\t\n\tThe feeling passes. I can still feel the source of the wave in the distance, but only just barely.\n\t\n\tToby lets out a relieved sigh as he turns around to look at me. \"Are you okay?\"\n\t\n\tWhatever that was seems to be over.\n\t\n\t\"What just happened?\" Laura seems to have rapidly regained her composure.\n\t\n\t\"That came from the other world,\" Toby says. \"You can feel it too, right?\"\n\t\n\tI nod. \"Yeah.\" My phone buzzes in my pocket, and I check it.\n\t\n\t*page_break\n\t\n\t'DUDE SOME CRAZY STUFF JUST HAPPENED' -Joan Catalan-\n\t\n\t'You felt a surge of haze?' -You-\n\t\n\t'...Yes. I can feel it's source too.' -Joan Catalan-\n\t\n\t'Are you able to meet us right now?' -You-\n\t\n\t'It's late, but yeah. I'll make up an excuse for mom and dad later.' -Joan Catalan-\n\t\n\t*page_break\n\t\n\tToby turns the truck around and starts back toward the city.\n\t\n\t\"Toby?\" Laura gives him a confused look.\n\t\n\t\"We're going after it, right?\" he looks at me.\n\t\n\tI nod. \"Yeah. Let's do this.\"\n\t\n*comment\n\n*page_break\n\nThe sphere, or whatever it is, was quite far away. We ended up traveling all the way across town and\nout into the country side.\n\nThe sun has already set. It's dark out now.\n\nWe get as close to the sphere's location as we can while following the road. Eventually, however, we have to\npull over and start walking through the woods to reach it.\n\n*if (location = \"Elrin\")\n\t\n\t\"Hold on one moment,\" Elrin says, as he walks around to the trunk of the limo. \"We'll need this.\" He grabs a flashlight\n\tout of it.\n\t\n\t\"You only have one?\" I ask.\n\t\n\t\"I'm afraid so.\" He takes the lead, pointing the flashlight forward. \"Don't worry. We can sense where it is, so it\n\tshouldn't be an issue.\"\n\t\n*if (location = \"Scourge\")\n\t\n\t\"Hold up!\" Lucas calls out. He's in the back of the van for some reason. \"We'll need these.\" He exits the\n\tvan carrying four flashlights.\n\t\n\tI take one. \"Good thinking.\"\n\t\n\t\"Anyone else have a weird feeling about this?\" Rita asks. \"This whole situation feels strange.\"\n\t\n\tI shrug. \"We can't just wait on it.\"\n\t\n*if (location = \"Union\")\n\t\n\tToby suddenly steps in front of me. \"Here you are, friend.\" He shoves a flashlight into my hand.\n\t\n\tI look back behind me. Joan and Laura are standing behind us.\n\t\n\t\"You only have one?\" I ask.\n\t\n\t\"Sorry,\" Laura says. \"We weren't really expecting something like this...\"\n\t\n*comment\n\n*page_break\n\nThere's haze in the air, but it's not incredibly thick yet. If this is a sphere, it must not be very powerful yet.\n\nThat tidal wave we felt is making me nervous though...\n\nAs we move forward, it's impossible to see anything. Darkness surrounds us on all sides. There's no moon. There's\ntoo many trees and brush in front of us. The light isn't making much of a difference, other than letting us see what's directly\nin front of us.\n\n*page_break\n\nWhatever we're feeling ahead of us, it's getting stronger. There's a heavy presence in the air, but it doesn't quite feel\nlike anything we've encountered thus far.\n\nWe keep walking until we're standing right over it. I can feel it under our feet, deep underground.\n\nI look around. There's nothing out here. Trees and shrubbery surround us. The forest is strangely quiet right now. I\ndon't even hear any insects.\n\n\"Here?\" I look at the others. \"What's the point?\"\n\nJoan hums. \"Maybe... whatever this is... it's meant to be hidden? If we hadn't felt that wave earlier, we never would\nhave been anywhere near this spot, so we probably never would have sensed it.\"\n\n*if (location = \"Elrin\")\n\t\n\t\"Shall we... dive in?\" Elrin gives us a curious look.\n\t\n\tI sense it under us. This is the right spot.\n\t\n\t\"Yeah,\" Joan says. \"Let's go.\"\n\t\n*if (location = \"Scourge\")\n\t\n\t\"Well, then.\" Lucas sits down. \"Let's get going.\"\n\t\n\t\"We're going in from here?\" Rita asks.\n\t\n\t\"Of course. We can feel it under us. This is the place.\"\n\t\n*if (location = \"Union\")\n\t\n\t\"Let's get going then, friends!\" Toby plops down in the dirt.\n\t\n\t\"Right here?\" Laura asks. \"In the middle of nowhere?\"\n\t\n\tToby's right. I can sense it under our feet. It's definitely here.\n\t\n\t\"It's fine,\" I say. \"I'm sure we won't get eaten by wolves while we're under.\"\n\t\n\t\"Probably,\" Joan says.\n\t\n\tI nod. \"Probably.\"\n\t\n*comment\n\n*page_break\n\nWe sit down, take a deep breath, and let ourselves fall in.\n\nI can feel it. Pulsing energy. It's coming from somewhere deeper within. Calling to us.\n\nThe haze is thick, but... it's still better than it has been.\n\nWe're walking forward.\n\nFor once we're not in a corridor. There's wide open space all around us. Grass is grown tall, but\nthere's nothing else. It's just endless, perfectly flat grassland as far as the eye can see.\n\nThe only thing that stands out is a light in the distance.\n\n*if (location = \"Elrin\")\n\t\n\t\"This is certainly different,\" Elrin comments.\n\t\n\t\"No kidding,\" I mumble. \"I hope whatever is over there isn't too terrible.\"\n\t\n*if (location = \"Scourge\")\n\t\n\t\"This is... new,\" Rita comments.\n\t\n\t\"Nothing we can't handle,\" Lucas says.\n\t\n*if (location = \"Union\")\n\t\n\t\"This looks different,\" Toby comments, looking around.\n\t\n\tLaura frowns. \"I don't like the feel of this...\"\n\t\n*comment\n\n\"Whatever it is, I know we'll handle it.\" Joan says confidently.\n\n*page_break\n\nI hear a quiet voice coming from all around us. Just one.\n\nIt's familiar, in some way.\n\nThe world warps around. The ground twists and changes. Structures tear their way through the soil,\nforming tall walls around us. A ceiling snaps into place above us, blocking the sky.\n\n*if (location = \"Elrin\")\n\t\n\tI see the priest we saw at the hospital.\n\t\n\tI mumble, \"This guy again...?\"\n\t\n\tWe're in a church. It's not anything fancy. In fact, it might be the most basic looking\n\tone I've ever seen. Almost like it was just shambled together the best way they could.\n\t\n\tThe priest is at the far end of the room, addressing his congregation.\n\t\n\t...Who are all armed to the teeth.\n\t\n\tEverybody is wearing military-camo and carrying assault rifles.\n\t\n\t\"The day is nearly upon us,\" he says. \"We have all sacrificed a great deal to get here. You have all sacrificed\n\tto get here. Monsters infest our streets. Our homes. Our lives...\" he pauses as murmuring passes over the crowd.\n\t\"They are the greatest threat humanity currently faces. But not for much longer. When our day comes, we will bath\n\tthe streets of Windbrooke in blood. And in doing so, we will spark a global revolution. I believe in all of us, in\n\tall of you.\n\t\n\t\"This will not be easy. There will be consequences. Some of you will die. Know that you will die heroes, who saved\n\tour world.\"\n\t\n*if (location = \"Scourge\")\n\t\n\tI see the priest we saw at the hospital.\n\t*if (f_008_NightPlans = false)\n\t\tAnd at the compound Lucas and Rita rescued me from.\n\t*comment\n\t\n\tI mumble, \"This guy again...?\"\n\t\n\tWe're in a church. It's not anything fancy. In fact, it might be the most basic looking\n\tone I've ever seen. Almost like it was just shambled together the best way they could.\n\t\n\tFather Albert is at the far end of the room, addressing his congregation.\n\t\n\t...Who are all armed to the teeth.\n\t\n\tEverybody is wearing military-camo and carrying assault rifles.\n\t\n\t\"The day is nearly upon us,\" he says. \"We have all sacrificed a great deal to get here. You have all sacrificed\n\tto get here. Monsters infest our streets. Our homes. Our lives...\" he pauses as murmuring passes over the crowd.\n\t\"They are the greatest threat humanity currently faces. But not for much longer. When our day comes, we will bath\n\tthe streets of Windbrooke in blood. And in doing so, we will spark a global revolution. I believe in all of us, in\n\tall of you.\n\t\n\t\"This will not be easy. There will be consequences. Some of you will die. Know that you will die heroes, who saved\n\tour world.\"\n\t\n*if (location = \"Union\")\n\t\n\tI see father Albert.\n\t\n\tWe're in the church. It's definitely the same one as before. His congregation are the same people from around\n\tthe hospital. Most of them are still armed. I even spot my parents in the room, watching intently.\n\t\n\t\"The day is nearly upon us,\" he says. \"We have all sacrificed a great deal to get here. You have all sacrificed\n\tto get here. Monsters infest our streets. Our homes. Our lives...\" he pauses as murmuring passes over the crowd.\n\t\"They are the greatest threat humanity currently faces. But not for much longer. When our day comes, we will bath\n\tthe streets of Windbrooke in blood. And in doing so, we will spark a global revolution. I believe in all of us, in\n\tall of you.\n\t\n\t\"This will not be easy. There will be consequences. Some of you will die. Know that you will die heroes, who saved\n\tour world.\"\n\t\n*comment\n\nI feel a pulse in the distance. It washes over me like a wave of anguish.\n\nIt's terrible, and I can feel it seeping into my bones.\n\nThankfully it passes within moments.\n\n*page_break\n\n*if (location = \"Elrin\")\n\t\n\tElrin puts a hand up to his head. He's wincing. \"That is quite troubling.\"\n\t\n\t\"Whatever we're feeling?\" Joan asks. \"Or that priest guy?\"\n\t\n\t\"Both.\" Elrin chuckles. \"I don't like the way he was talking. It sounds like they're planning something.\"\n\t\n\tI nod. \"Let's hurry. We can deal with that guy later.\"\n\t\n*if (location = \"Scourge\")\n\t\n\t\"Bastard.\" Rita is staring at the priest.\n\t\n\t\"That guy just loves to hear himself talk,\" Lucas says.\n\t\n\t*if (f_008_NightPlans = true)\n\t\t\n\t\t\"...Who is that guy?\" I ask.\n\t\t\n\t\t\"That is father Albert,\" Rita says. \"He's the leader of some crappy terrorist group. You already\n\t\tsaw their 'work' at the hospital.\"\n\t\t\n\t*comment\n\t\n\t\"Come on,\" I say. \"We can deal with him later.\"\n\t\n*if (location = \"Union\")\n\t\n\tWe say [i]nothing[/i] to each other.\n\t\n*comment\n\nOur surroundings melt away. We're back in that wide open space. That light in the distance seems just a\nlittle bit closer.\n\n*if (location = \"Union\")\n\t\n\tToby and Laura are just standing there, not quite looking at anything.\n\t\n\tJoan slowly turns to look at me. I wish she was wearing her armor right now, because the very concerned\n\tlook she's boring into me is painful.\n\t\n\tSomebody has to break this silence.\n\t\n\tI cough into my fist. \"So-\"\n\t\n\t\"It wasn't always like this!\" Laura shouts.\n\t\n\tJoan and I flinch back. Toby, I notice, does now.\n\t\n\t\"Father Albert was... good! He was a good man!\" She steps closer to me until she's right up in my face. \"He\n\ttook us in when our parents died! He taught us everything we know! He... He... used to help people. All people.\"\n\t\n\tI keep my expression calm. \"Even monsters?\"\n\t\n\t\"Yes,\" she says it with such sureness, it actually catches me off guard a little. \"Something changed a year ago.\n\tHe changed. It was small at first... he didn't 'hate' monsters exactly, but he seemed more wary of them... and\n\tit just kept escalating.\"\n\t\n\tJoan says, \"until he started an extremist group.\"\n\t\n\t\"Yes.\" Laura sounds... heartbroken. \"He's our father. I owe him so much, but... he's changed. I don't know why. I'm\n\tscared to talk to him about it.\"\n\t\n\tI pause. \"Do you... think he'd hurt you?\"\n\t\n\t\"No!\" Laura says defensively. \"I mean... I don't think he would. But,\" She hesitates. \"I didn't think he'd ever plan mass\n\tmurder either. I don't know what to do.\"\n\t\n\tI glance over at Toby, who has been notably silent this entire time.\n\t\n\tSomething about his expression... it's like he's holding something back.\n\t\n\tMaybe I should try coaxing a response out of him. \"Toby-\"\n\t\n\t\"What he's doing is wrong,\" Toby suddenly says. \"Father Albert is a bad man now.\"\n\t\n\t\"Toby!\" Laura's sounds shocked. \"He is not! He took us in when-\"\n\t\n\t\"That doesn't excuse it,\" Toby firmly states. \"It doesn't. Whatever he's done for us. Whatever he [i]used[/i] to be\n\tlike... that's not the way he is now. And that's all that matters.\"\n\t\n\tNeither of them say anything to each other for a moment.\n\t\n\tI look at Joan. She stares back at me.\n\t\n\tNeither of us want to break the silence.\n\t\n\tThankfully, Toby does it for us. \"I've been talking to the police. About father Albert and... everything.\"\n\t\n\t\"You've...\" Laura stares at him. \"The police?\"\n\t\n\t\"Well, it was the police at first,\" Toby says. \"Then some nice people from the government invited me to talk to\n\tthem, and they kind of took over from there.\"\n\t\n\tOh my god.\n\t\n\tI've been seen with these people.\n\t\n\tWait...\n\t\n\t*page_break\n\t\n\tMy [i]parents[/i] have been seen with these people. They work with them...\n\t\n\t*page_break\n\t\n\t\"Uh...\" I step into the conversation. \"How serious is this?\"\n\t\n\t\"Hm?\" Toby tilts his head.\n\t\n\t\"Are they about to raid the compound? Is everybody about to be arrested?\" I ask.\n\t\n\t\"...not yet,\" Toby says. \"They want to wait until we're closer to our attack date before quickly moving in\n\tto shut us down.\"\n\t\n\tI pale. \"Christ... I need to get to my parents, and pull them-\"\n\t\n\t\"You can't,\" Toby cuts me off. \"If you tell them, they'll just tell everyone else-\"\n\t\n\t\"They're my parents!\" I shout. \"Am I supposed to just let them be arrested?\"\n\t\n\tToby nods. \"Yes.\"\n\t\n\tI stare at him, as if expecting him to continue.\n\t\n\tHe does. \"They've killed people.\"\n\t\n\t\"...What?\"\n\t\n\t\"Your parents,\" Toby says. \"They've murdered other people. Creatures. Their hands aren't clean. Not anymore than\n\tany of those other people we recruited. Father Albert hand picked people of a certain... temperament.\"\n\t\n\t\"My parents... they wouldn't have...\"\n\t\n\t\"They did,\" Toby says. \"I understand you don't have a strong line of communication with them. It's the only\n\texplanation I can think of for why you don't seem to share their hatred of monster-kind.\"\n\t\n\t\"I...\" Dammit. This is bullshit. And it's bullshit that we don't have time for it. \"I'll talk to them about this\n\twhen I get back. We need to keep walking.\"\n\t\n\tJoan puts a hand on my shoulder. \"$!{fiName}, hold on. This is a lot to-\"\n\t\n\t\"It's. Fine.\" I march forward, tugging out of her grasp. \"Let's just go.\"\n\t\n*comment\n\n*page_break\n\nAs we move forward various shapes rise out of the ground in the distance. We can't make them\nout clearly until we're closer.\n\nThey're the ruins of various small houses. It looks like they all burned down. The houses\nlook out of place in this field, at least until a road and pavement starts bleeding up through the grass.\n\nWe stop when multiple apparitions melt into existence. Their speech is garbled, and movements hard\nto follow. However, as the seconds pass, their voices and forms become clearer and clearer.\n\n*if (location = \"Elrin\")\n\t\n\tOne figure, a woman, eventually turns out to be the same woman Joan and I saw murder Mr. Barrow.\n\t\"Things are progressing well.\" She doesn't look much different from then, so I don't think we're\n\tseeing a vision from a particularly long time ago.\n\t\n\tThe other person present comes into focus. She's familiar too...\n\t\n\tI think back to when Elrin escorted me to the vampire meet up. One of the vampires there brought me\n\tfood and chatted for a bit.\n\t\n\tRita. That was her name.\n\t\n\tRita is surveying the damage. \"I guess.\"\n\t\n\t\"You guess?\" That woman asks. \"Our people performed wonderfully. Even better than I had hoped.\"\n\t\n\tRita isn't looking at her. \"Yeah.\" She's just staring at a burned down house.\n\t\n\tThat woman pauses for a moment. \"...Is something wrong?\"\n\t\n\t\"You don't think this was all a bit... much?\"\n\t\n\t\"Rita. They're humans.\"\n\t\n\t\"You mean murderers,\" Rita says. \"That is why we did this right? Because they're evil. And they hurt our kind.\"\n\t\n\tThat woman's mouth forms into a tight line. \"That's what I said.\" She approaches Rita, and gives her a hard\n\tstare. \"Is this going to be an issue? We've already come this far. If you're wanting to back out, I need\n\tto know now.\"\n\t\n\t\"I'm not backing out!\" Rita says defensively. \"But this isn't-\" She stops.\n\t\n\tBoth women stare at each other.\n\t\n\t\"It won't be an issue,\" Rita says. \"You can count on me. Whatever is necessary, I'll do it.\"\n\t\n\tThat woman smiles. \"That's what I like to hear. We're going to be very busy soon. This world is filled\n\twith injustice. And we're going to cleanse it. One person at a time.\"\n\t\n\tJoan, Elrin, and I stand in silence as our surroundings melt away.\n\t\n\t\"Her again,\" I mumble.\n\t\n\t\"You... mentioned her before, I believe?\" Elrin asks. \"You saw her murder someone?\"\n\t\n\t\"She's going to be doing a lot more than that,\" Joan says. \"Unless we do something about it.\"\n\t\n\t\"Hm.\" Elrin sighs. \"Well, we can worry about that tomorrow. We should keep moving for now.\"\n\t\n*if (location = \"Scourge\")\n\t\n\tOne figure, a woman, eventually comes into focus. It's Angeline. She doesn't look much different\n\tfrom when I last saw her, or when I saw a figment of her murder Mr. Barrow, so what we're\n\tseeing must not have happened that long ago.\n\t\n\tThe other form comes into focus. She's familiar too...\n\t\n\tRita. It's Rita.\n\t\n\tShe, well the other 'she', is surveying the damage. \"I guess.\"\n\t\n\t\"You guess?\" Angeline asks. \"Our people performed wonderfully. Even better than I had hoped.\"\n\t\n\tRita isn't looking at her. \"Yeah.\" She's just staring at a burned down house.\n\t\n\tAngeline pauses for a moment. \"...Is something wrong?\"\n\t\n\t\"You don't think this was all a bit... much?\"\n\t\n\t\"Rita. They're humans.\"\n\t\n\t\"You mean murderers,\" Rita says. \"That is why we did this right? Because they're evil. And they hurt our kind.\"\n\t\n\tAngeline's mouth forms into a tight line. \"That's what I said.\" She approaches Rita, and gives her a hard\n\tstare. \"Is this going to be an issue? We've already come this far. If you're wanting to back out, I need\n\tto know now.\"\n\t\n\t\"I'm not backing out!\" Rita says defensively. \"But this isn't-\" She stops.\n\t\n\tBoth women stare at each other.\n\t\n\t\"It won't be an issue,\" Rita says. \"You can count on me. Whatever is necessary, I'll do it.\"\n\t\n\tAngeline smiles. \"That's what I like to hear. We're going to be very busy soon. This world is filled\n\twith injustice. And we're going to cleanse it. One person at a time.\"\n\t\n\tJoan stares at Rita as our surroundings vanish.\n\t\n\tRita and Lucas don't say anything. They just stare back at us.\n\t\n\tI cough. \"So-\"\n\t\n\t\"Don't worry about it,\" Rita says. \"Let's just keep going and wrap this 'haze' crap up. Then we can all go our separate ways.\"\n\t\n\tI hesitate. \"How many people is your group planning to kill?\"\n\t\n\tRita scowls. \"I said... don't worry about it.\"\n\t\n\t\"Are you really okay with what's happening here?\"\n\t\n\tRita's glare bores into me. \"Yes.\"\n\t\n\t\"...It doesn't seem like-\"\n\t\n\tRita throws her hands up. \"What do you want me to say!\"\n\t\n\tLucas speaks up. \"That it's wrong. And we're taking things too far.\"\n\t\n\t\"Well...\" Rita raises a brow at Lucas. \"We're not going to say that-\"\n\t\n\t\"I am,\" Lucas says firmly. \"Right now. What we've been doing is wrong, and it's gone too far.\"\n\t\n\tRita stares at him. \"Lucas can I speak to you in private for a moment.\"\n\t\n\t\"If you want to say something, you can say in front of an audience.\"\n\t\n\tJoan and In give each other a look. Maybe I should say something. \"I-\"\n\t\n\t\"Alright,\" Rita huffs. \"You wanna talk? Let's talk about how many of our kind are murdered for no fucking\n\treason, and how nothing ever gets done about it. Let's talk about how the only way the people responsible\n\tfor those killings are going to face any consequences is if we do it ourselves.\"\n\t\n\t\"Alright,\" Lucas says, surprisingly calmly. \"We should find those people and take them out.\"\n\t\n\tRita shoots him an exasperated look. \"Then how is this wrong?\"\n\t\n\t\"Because,\" he says firmly. \"That's not what we're doing anymore. We used to kill people who deserved it. Now\n\twe're planning to murder random people in the streets? What good is that going to do?\"\n\t\n\t\"It-\"\n\t\n\t\"Come on.\" Lucas sighs. \"I know you feel the same way. Things have gone wrong. This isn't what our group\n\tis supposed to be about. Angeline's set us down the wrong track.\"\n\t\n\tRita almost looks like she wants to argue the point, but at the last second she deflates. \"I know... but Lucas, I've\n\tknown her for so long... she's one of the greatest women I've ever known.\"\n\t\n\tLucas nods. \"I've heard stories. A lot of people see her as a hero, and I get why. But, she's changed. It won't\n\tdo us any good to be holding out for her to regain her senses when she's plotting mass murder.\"\n\t\n\tRita sighs. \"I know... but... I owe her so much.\"\n\t\n\tNeither of them say anything for a while after that.\n\t\n\tEventually, and very tentatively, I step forward. \"We can't stay here. We can settle all this after we wrap this\n\tup.\"\n\t\n\tLucas nods. Rita doesn't say anything.\n\t\n*if (location = \"Union\")\n\t\n\tOne figure, a woman, eventually turns out to be the same woman Joan and I saw murder Mr. Barrow.\n\t\"Things are progressing well.\" She doesn't look much different from then, so I don't think we're\n\tseeing a vision from a particularly long time ago.\n\t\n\tThe other person present comes into focus. I don't recognize her at all. She's very young though. Probably\n\tnot much older than myself.\n\t\n\tThe younger woman is surveying the damage. \"I guess.\"\n\t\n\t\"You guess?\" the woman asks. \"Our people performed wonderfully. Even better than I had hoped.\"\n\t\n\tThe younger woman isn't looking at her. \"Yeah.\" She's just staring at a burned down house.\n\t\n\tThat woman, the leader I suppose, pauses for a moment. \"...Is something wrong?\"\n\t\n\t\"You don't think this was all a bit... much?\"\n\t\n\t\"Rita. They're humans.\"\n\t\n\t\"You mean murderers,\" The younger woman, Rita, says. \"That is why we did this right? Because they're evil. And they hurt our kind.\"\n\t\n\tThat woman's mouth forms into a tight line. \"That's what I said.\" She approaches Rita, and gives her a hard\n\tstare. \"Is this going to be an issue? We've already come this far. If you're wanting to back out, I need\n\tto know now.\"\n\t\n\t\"I'm not backing out!\" Rita says defensively. \"But this isn't-\" She stops.\n\t\n\tBoth women stare at each other.\n\t\n\t\"It won't be an issue,\" Rita says. \"You can count on me. Whatever is necessary, I'll do it.\"\n\t\n\tThat woman smiles. \"That's what I like to hear. We're going to be very busy soon. This world is filled\n\twith injustice. And we're going to cleanse it. One person at a time.\"\n\t\n\tWe stand in silence as our surroundings melt away.\n\t\n\t\"They keep showing up,\" Joan mumbles. \"Why?\"\n\t\n\t\"You mentioned her before. I think?\" Laura comments. \"They killed someone?\"\n\t\n\tI nod. \"We keep seeing visions of them. I don't understand why though...\"\n\t\n\t\"Do you think it's all connected?\" Joan asks.\n\t\n\tI shrug. \"Let's just keep moving. We can figure this out after.\"\n\t\n*comment\n\n*page_break\n\nThe light in the distance is much closer now. It seems to be gaining on us much faster than it should be, almost\nlike it's coming towards us...\n\n*page_break\n\nWe're in a brick hallway.\n\n\"It can't be much further right?\" Joan asks.\n\nWe've been walking. I can't quite recall for how long. \"I guess.\"\n\nIt's dead silent. It's eerie.\n\nThere's a red light at the end of the tunnel. Whatever we've been moving to. It's up ahead.\n\n*page_break\n\nWe come out into a large chamber. A set of very wide stairs is ahead of us. At the top of those\nstairs are two, fleshy columns. One is to the left. The other, to the right.\n\nThere are two figures stuck inside them. I can just barely see them through what looks like bars\nmade out of bone. They're trapped in some sort of fleshy prison.\n\nNobody says anything as we approach.\n\nAs we get closer, I can see the figures inside more clearly.\n\n*if (location = \"Elrin\")\n\t\n\tOne is the woman that murdered Mr. Barrow.\n\t\n\tThe other is that priest who's leading some sort of terrorist militia.\n\t\n*if (location = \"Scourge\")\n\t\n\t*if (f_008_NightPlans = true)\n\t\t\n\t\tOne is Angeline. The Scourge's leader.\n\t\t\n\t\tThe other is the priest we've been seeing in those visions.\n\t\t\n\t*if (f_008_NightPlans = false)\n\t\t\n\t\tOne is Angeline. The Scourge's leader.\n\t\t\n\t\tThe other is father Albert. That priest I had to be saved from.\n\t\t\n\t*comment\n\t\n*if (location = \"Union\")\n\t\n\tOne is the woman who murdered Mr. Barrow.\n\t\n\tThe other is Father Albert himself.\n\t\n*comment\n\nThe fleshy columns are fused into their bodies. They're part of them.\n\nThey look like they're in pain...\n\n*page_break\n\nJust as we reach the top of the stairs, I see a familiar old man.\n\nFrom his posture, it looks like he's been expecting us.\n\nWe come to a stop. And stare at him. The others mostly just look confused and cautious.\n\nHe doesn't take his eyes off me. \"Hello.\"\n\nI nod. \"...You're here.\"\n\n\"I take it you felt it too?\"\n\nThe others are staring at me now.\n\n\"We did.\"\n\n\"Hm. As expected.\" He looks over the two figures trapped in their fleshy cages. \"Sadly, I was already aware of this place.\"\n\n\"Is that a fact?\" I ask.\n\nJoan leans over to me. \"$!{fiName}? Who the hell is that?\"\n\n\"Some old guy.\" I walk forward to meet him.\n\n\"Do you know who these people are?\" the old man asks.\n\nI look between the two of them. \"Kind of.\"\n\n\"And you know what they're planning to do?\" he asks.\n\n\"...Barely.\"\n\n\"Well. Let me tell you a little bit more.\"\n\n*page_break\n\n*if (location = \"Elrin\")\n\t\n\tHe approaches the woman that murdered Mr. Barrow.\n\t\n\t\"Here we have one Angeline. Leader of the Scourge, a violent group aimed at massacring humans to protect their own kind. Any\n\thumans.\" He pauses \"All humans.\n\t\n\t\"Maybe you find her cause understandable?\" He gives me a curious look. \"Maybe you don't. But, that doesn't matter. What\n\tmatters... is what this place has done to her.\"\n\t\n\t\"This place?\" I look around the room, before fixating on the pillar she's fused to. \"It's affecting her?\"\n\t\n\t\"Not just her,\" he says, pointing at the priest fused to the opposite pillar. \"Both of them. Her and father Albert here.\"\n\t\n*if (location = \"Scourge\")\n\t\n\tHe approaches the Angeline.\n\t\n\t\"Here we have one Angeline. Leader of the Scourge, a violent group aimed at massacring humans to protect their own kind. Any\n\thumans.\" He pauses \"All humans.\n\t\n\t\"Maybe you find her cause understandable?\" He gives me a curious look. \"Maybe you don't. But, that doesn't matter. What\n\tmatters... is what this place has done to her.\"\n\t\n\t\"This place?\" I look around the room, before fixating on the pillar she's fused to. \"It's affecting her?\"\n\t\n\t*if (f_008_NightPlans = true)\n\t\t\"Not just her,\" he says, pointing at the priest fused to the opposite pillar. \"Both of them. Her and father Albert here.\"\n\t*if (f_008_NightPlans = false)\n\t\t\"Not just her,\" he says, pointing at father Albert fused to the opposite pillar. \"Both of them. Her and father Albert here.\"\n\t*comment\n\t\n*if (location = \"Union\")\n\t\n\tHe approaches the woman that murdered Mr. Barrow.\n\t\n\t\"Here we have one Angeline. Leader of the Scourge, a violent group aimed at massacring humans to protect their own kind. Any\n\thumans.\" He pauses \"All humans.\n\t\n\t\"Maybe you find her cause understandable?\" He gives me a curious look. \"Maybe you don't. But, that doesn't matter. What\n\tmatters... is what this place has done to her.\"\n\t\n\t\"This place?\" I look around the room, before fixating on the pillar she's fused to. \"It's affecting her?\"\n\t\n\t\"Not just her,\" he says, pointing at the priest fused to the opposite pillar. \"Both of them. Her and father Albert here.\"\n\t\n*comment\n\nStep-by-step he approaches father Albert.\n\n\"He leads the Unity of Humanity.\" the old man's face becomes very grim. \"They were once a respectable organization. Charity\nworkers of a sort. They helped people. Non violently.\" he sighs. \"That changed. And it changed at the same time Angeline's\ngroup did. Neither of these two were needlessly violent before... until a few months ago. I suspect these pillars\nhave been around for the same length of time.\"\n\nI cross my arms. \"You... suspect?\"\n\n\"I'm not clairvoyant,\" he says. \"But I can put two and two together well enough. These pillars changed them. Infected\ntheir minds with baseless hate.\"\n\n\"Right.\" I generate my weapon. \"So we just need to destroy them!\" I look to the others. \"Just follow me l-\"\n\n\"Wait!\" the old man shouts. \"It's not that simple. Destroying these... things. It won't solve anything.\"\n\nI stare at him. \"But... you just said-\"\n\n\"Listen to me...\" He angrily walks up to me. \"I know people. And do you know what I know about people? They're terrible. They'll\ndo anything just because they were told to do it. If you destroy these two here, the haze fogging over Angeline and Albert's\nminds will be cleared. But they will still continue their currently planned massacres. Maybe they'll change back to their\nold selves in a month or so. But they'll remain committed to the inflicting bloodshed, not even because they want to,\nbut because they've already dedicated so much time and energy to their current plans.\"\n\n*page_break\n\nIs that really right?\n\nSurely someone wouldn't commit mass murder just because its what they were planning to do.\n\nThen again... they've clearly already killed people.\n\nI sigh. \"Well, what are we supposed to do? If they're committed to their attacks, we might as well tear\nthese... 'things' down. It'll limit the bloodshed in the long run at least.\"\n\nHe pauses. \"There's another way.\"\n\n\"To stop the attack?\"\n\n\"Not precisely...\" he gestures toward one of the fleshy pillars. \"This place has done more than make them more violent.\nIt's muddled their senses. These two, the scourge's Angeline, the Unity's Albert. Their minds are less than what they were before.\nTheir decision making is hampered. If you were to destroy just one of these pillars... and then manipulate the remaining group\nto fight the other...\"\n\nI narrow my eyes at him. \"What... exactly... are you suggesting right now?\"\n\n\"Don't destroy both of these entities,\" he says plainly. \"Destroy just one... either father Albert, or Angeline here, and their\ncounterpart in our world will be become sharper. They'll be able to defeat the other.\"\n\n\"But...\" What about the planned massacres? \"They'll just kill a bunch of people anyway.\"\n\n\"Not necessarily,\" he says. \"If you free them from the fog this place has put on their minds, they won't want to go through\nwith their plans anymore. They still will of course... unless you give them a way out.\" He smirks. \"Perhaps by giving\nthem a chance to be a hero? To save the innocent from a deranged killer?\"\n\nI look between Angeline and father Albert.\n\n*page_break\n\nMaybe I should have a chat with my friends first...\n\n*page_break\n\n*if (location = \"Elrin\")\n\t\n\tI take a few steps back and turn around to see Elrin and Joan staring at me.\n\t\n\t\"So what are you thinking?\" I ask.\n\t\n\t\"I think this is super creepy.\" Joan looks past me at that old man. \"...And that we shouldn't trust that weirdo.\"\n\t\n\tElrin looks past me, at the old man. \"I don't know that the man is wrong about what he's saying, but...\" He sighs. \"Maybe\n\twe should bring Raven in on this?\"\n\t\n\t\"We don't have time for you to involve more people in this,\" the old man says. \"Time is running out. You need to destroy\n\tone of them now.\" He looks at Angeline. \"Preferably her, given your... non human status. I suspect father Albert\n\twouldn't take kindly to your presence.\"\n\t\n*if (location = \"Scourge\")\n\t\n\tI take a few steps back and turn around to see everyone staring at me.\n\t\n\tI cough into my fist. \"So, what do you-\"\n\t\n\t\"We're not going to help that priest bastard kill Angeline,\" Rita says, a scowl on her face.\n\t\n\t\"We weren't going to pick her to take out!\" I say defensively. \"Just... Joan?\" I look at her. \"Your thoughts.\"\n\t\n\tJoan looks past me, at the old man. \"This whole thing is creepy. And so is that old guy.\"\n\t\n\t\"Seconded,\" Lucas says.\n\t\n\t\"Very helpful,\" I mumble. \"Hell... maybe it's time to get Raven involved... this is getting pretty heavy.\"\n\t\n\t\"We don't have time for you to involve more people in this,\" the old man says. \"Time is running out. You need to destroy\n\tone of them now.\" He looks at Angeline. \"Given your current company, she'd probably be the better option.\"\n\t\n\t\"Obviously,\" Rita says.\n\t\n*if (location = \"Union\")\n\t\n\tI take a few steps back and turn around to see everyone staring at me.\n\t\n\tI cough into my fist. \"So.\"\n\t\n\t\"We're not helping those people murder Albert,\" Laura says.\n\t\n\t\"...I think that was a given,\" I comment. \"But, what do you all think?\"\n\t\n\tJoan looks past me, at the old man. \"This whole thing is creepy. And so is that old guy.\"\n\t\n\t\"I think we should destroy both of those pillars regardless,\" Toby says.\n\t\n\tI suppose the police are moving in on father Albert regardless. So his attack is going to fall flat no matter what.\n\t\n\tBut what would that mean for the plan this guy is suggesting? Maybe father Albert can avoid prison time if we get him\n\tto fight Angeline instead. We could even make him look like a hero.\n\t\n\tThis is all a bit much. \"Maybe It's time to bring Raven in on this...\"\n\t\n\t\"We don't have time for you to involve more people in this,\" the old man says. \"Time is running out. You need to destroy\n\tone of them now.\" He looks at father Albert. \"Given your current company, he's probably be the better option.\"\n\t\n*comment\n\n*page_break\n\nThis is getting heavy...\n\nDo I really trust this guy?\n\nDo I really think he's wrong about them continuing their attacks?\n\n*choice\n\t#Go through with the old guy's plan.\n\t\t\n\t\t*goto lbl_TheWrongChoice\n\t#\"I don't like this plan...\"\n\t\t\n\t\t*goto lbl_AreYouSure\n*comment\n\n*label lbl_AreYouSure\n\n\"Listen to me,\" he says. \"I understand how hard what I'm asking you to do is. It's not fair that someone as young as you\nhas been put in a position like this, but... that's where we are now. It's not right that you have to make such a serious\ndecision, but there are too many lives at stake. You have to be strong.\"\n\n*choice\n\t#Go through with the old guy's plan.\n\t\t\n\t\t*goto lbl_TheWrongChoice\n\t#\"There has to be some other way...\"\n\t\t\n\t\t*goto lbl_AreYouReallySure\n*comment\n\n*label lbl_AreYouReallySure\n\n\"I wish there was,\" he says. \"If there was some other way... I'd be telling you to work towards it. But, there just\nisn't. You have to make the hard decision here.\"\n\n*choice\n\t#Destroy Both pillars. Screw this old guy.\n\t\t*goto lbl_TheRightChoice\n*comment\n\n\n\n\n\n\n*label lbl_TheRightChoice\n\nIt doesn't take much. I've gotten a knack for how this otherworld works.\n\n*if (style = \"warrior\") or (style = \"spellbow\")\n\t\n\tI draw an arrow. \n\t\n\tThe old man steps forward. \"Wait-\"\n\t\n\tThink fast.\n\t\n\tI draw this place's energy into myself.\n\t\n\tBefore he can stop me.\n\t\n\tIf feels like my skin is trembling.\n\t\n\t\"You can't-\"\n\t\n\tIn an instant I let two arrows out. The other Angeline and Father Albert die as my shots puncture their skulls.\n\t\n*if (style = \"spellsword\")\n\t\n\tI draw my sword.\n\t\n\tThe old man steps forward. \"Wait-\"\n\t\n\tI draw power from this place into my weapon. This worked last time, might as well do it again.\n\t\n\t\"You can't-\"\n\t\n\tI take a wild couple of swings. Energy arcs forward from my blade, and slices into the other Father Albert\n\tand Angeline.\n\t\n\tThey die as their bodies are torn open.\n\t\n*page_break\n\nEverything stops.\n\nThe haze has stopped. I can feel it, but its no longer permeating the space around us like it was before.\n\nIn fact... it seems to be fading away.\n\nThat old man is just staring at me. \"Listen to me you little shit. I've spent years working and toiling. You\nare not going to ruin this for me.\"\n\nMy eyes narrow. \"And what exactly am I ruining?\"\n\nBefore he can answer, the world around us breaks. This isn't a soft transition out of the otherworld\nlike its always been. It feels like I'm shaken around like a ragdoll as everything around me violently falls\ninto the void.\n\n*goto_scene Final\n\n\n\n\n\n\n\n\n\n\n*label lbl_TheWrongChoice\n\n*set GoodEnd false\n\nHe looks visibly relieved. \"You're making the right choice.\"\n\n*if (location = \"Elrin\")\n\t\n\tHe point his arm toward Angeline. \"Father Albert would never agree to meet with you peacefully, so we'll need\n\tAngeline to return to her senses. I can tell you where to find her, after that, it's all on you to guide her down\n\tthe right path to facing father Albert.\"\n\t\n\tLights flicker around his hand. In a second they flash and Angeline's fleshy pillar is immolated.\n\t\n\tI watch in slight horror as the flesh oozes and pops. The Angeline fused to the pillar lets off a horrific scream\n\tas she's burned away.\n*if (location = \"Scourge\")\n\t\n\tHe point his arm toward Angeline. \"I'll go ahead and assume Angeline is the one you want to save.\n\tShe already trusts you, I know you can lead her down the right path on your own.\"\n\t\n\tLights flicker around his hand. In a second they flash and Angeline's fleshy pillar is immolated.\n\t\n\tI watch in slight horror as the flesh oozes and pops. The Angeline fused to the pillar lets off a horrific scream\n\tas she's burned away.\n\t\n*if (location = \"Union\")\n\t\n\tHe point his arm toward father Albert. \"I'll go ahead and assume he is the one you want to save.\n\tHe already trusts you, I know you can lead him down the right path on your own.\"\n\t\n\tLights flicker around his hand. In a second they flash and Albert's fleshy pillar is immolated.\n\t\n\tI watch in fascinated horror as the flesh oozes and pops. The father Albert fused to the pillar lets off a horrific scream\n\tas she's burned away.\n\t\n*comment\n\n\"We'll have to go our separate ways,\" the old man says. \"I trust you'll be able to handle your side of it.\"\n\n\"And where are you going?\" Joan asks.\n\n\"Someone has to find out where all this came from,\" he says. \"You handle your part, and I'll handle mine.\"\n\n*page_break\n\nThe other world doesn't fade or melt away like last time. We all have to try and leave, and when we do, we're\nback in the woods.\n\nAlone.\n\n*if (location = \"Elrin\")\n\t\n\tBefore he left, the old guy told me how to find Angeline.\n\t\n\tI don't think I need his help though.\n\t\n\tI already have an in through Rita. She gave me her number back at the vampire meet up. I'm confident I can\n\tget her to help us with this.\n\n\tAs we're headed back to the limo, Elrin speaks up. \"Are you okay with this?\"\n\t\n\t\"I'm not,\" Joan says.\n\t\n\tI sigh. \"What's done is done. We have to commit to this.\"\n\t\n\t\"If you say so...\" Joan mumbles.\n\t\n*if (location = \"Scourge\")\n\t\n\tI guess it's time to have a chat with Angeline.\n\t\n\tShe already trust me, probably, so this should be easy.\n\t\n\tAnd even if she doesn't, she definitely trusts Rita and Lucas.\n\t\n\tAs we're headed back to the van, Joan speaks up. \"I still don't trust that old dude.\"\n\t\n\t\"He was giving me some weird vibes,\" Lucas says. \"But... this seems like it's working out for the best? We're\n\tabout to take that priest bastard down a peg. And Angeline will be sane again.\" He smiles. \"All things considered... this\n\tis going pretty great for us.\"\n\t\n\t\"If you say so...\" Joan mumbles.\n\t\n*if (location = \"Union\")\n\t\n\tI guess it's time to have a chat with father Albert.\n\t\n\tthe guy is kind of intimidating, but I'll have Laura and Toby with me, so hopefully they'll help things run a little more smoothly\n\tthan I'm fearing.\n\t\n\tAs we're headed back to the truck, Joan speaks up. \"I still don't trust that old dude.\"\n\t\n\t\"I'm inclined to agree,\" Laura says, \"But at least now we can help father Albert.\"\n\t\n\t\"This is going to be tricky with the police already involved,\" I say. \"Do you think he can avoid prison time?\"\n\t\n\t\"I don't know,\" Laura says. \"We've already hurt people. If the police are already aware of that...\"\n\t\n\t\"We can cross that bridge when we get to it,\" Toby says. \"Let's just focus on saving as many people as we can.\"\n\t\n*comment\n\n*page_break\n\nNobody says anything during the drive back. Joan heads back home.\n*if (location = \"Elrin\")\n\tWe head back to Yggdrasil. I'll call Rita tomorrow, and see if I can set up a meeting with that woman, Angeline.\n*if (location = \"Scourge\")\n\tWe head back to the HQ. I just want to go to sleep for tonight. I'll talk to Angeline tomorrow.\n*if (location = \"Union\")\n\tWe head back to the compound. I just want to go to sleep for tonight. I'll talk to father Albert tomorrow.\n*comment\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "011_sub_hospital": "\n\n\n\n\n\n\n*if (location = \"Elrin\")\n\t\n\tThe next day begins normally enough. I eat breakfast with Elrin. He brings me to school.\n\t\n\tI have a mostly normal day.\n\t\n\tAnd then Joan meets up with me as school lets out so we can go deal with the hospital.\n\t\n\t*page_break\n\t\n\tWe meet Elrin in front of the school.\n\t\n\tDear lord... I have no idea what I'm going to say to him.\n\t\n\t\"Hello, there!\" He quickly approaches Joan. \"Very nice to meet you! You must be Joan, the young\n\tlady $!{fiName}'s said so much about.\"\n\t\n\tJoan nods. \"That's right.\" She casts an uncertain look my way. \"So... you're driving us?\"\n\t\n\t\"That's right!\" Elrin says. \"I'll be with the two of you wherever you go.\"\n\t\n\t\"Oh.\" Joan just gives me a questioning look. \"Isn't that... nice?\"\n\t\n\tI nod. \"Yep. So let's get moving.\"\n\t\n\t*page_break\n\t\n\t\"Just take a right here.\" I give Elrin verbal instructions on how to reach our destination without\n\tactually explaining where we're going.\n\t\n\t\"Understood...\" Elrin's demeanor is more cautious now. \"Is there any particular reason you aren't telling\n\tme where I'm driving you? I know this city quite well you know.\"\n\t\n\t\"It's... just kind of hard to explain,\" I say.\n\t\n\t\"Very hard to explain,\" Joan adds. \"But, it'll probably make sense once we get there.\"\n\t\n\tElrin pauses. \"...I certainly hope so, miss.\"\n\t\n\t*page_break\n\t\n\tWe find a place to park at the hospital. I'm not sure what our approach should be, either with Elrin,\n\tor with the hospital staff.\n\t\n\tI don't know anybody inside, so I can't just pretend to be visiting someone. Plus, hospitals are\n\tactually pretty busy. If we just decide to dive inside a supply closet somewhere, it's very likely\n\twe'll be seen.\n\t\n\t\"Now that we're here...\" Elrin is looking at both of us expectantly. \"Would either of you like to explain\n\twhat this is?\"\n\t\n\tI look at Joan. She stares back at me.\n\t\n\t\"Well... you see...\" Think! Think! There must be something I can say that sounds plausible!\n\t\n\t\"We're clearing the haze from this location,\" Joan says.\n\t\n\tI glare at her, and mouth, 'what are you saying?' \n\t\n\tShe just shrugs. \"I couldn't think of a good lie. So, you know, we might as well go with the truth.\"\n\t\n\t\"The 'haze'?\" Elrin tilts his head. \"I don't follow.\"\n\t\n\tI sigh. \"Can you honestly say you haven't felt [i]anything[/i]\n\tis off about Windbrooke lately? Like there's some sort of fog dragging everything down.\"\n\t\n\t\"I suppose,\" Elrin says. \"However, the city just went through a tragedy. It's to be expected.\"\n\t\n\t\"No.\" I lean forward. \"Focus harder on it. Really focus on it. That feeling. The way it wraps around everything.\n\tI can feel it everywhere. And I mean LITERALLY feel it. It has an actual presence.\"\n\t\n\tElrin stares at me.\n\t\n\t\"Just... humor me? Close your eyes and focus.\"\n\t\n\t\"...Very well.\" Elrin takes a deep breath, leans into his seat, and closes his eyes.\n\t\n\tJoan speaks up. \"Try to imagine falling into it.\" She looks at me. A conspiratorial gleam is in her eyes. She\n\tleans back herself, and closes her eyes, but she keeps talking. \"Don't think of anything else. Just feel the\n\thaze rising out of the ground, and try to fall into it.\"\n\t\n\tI lean back to, and close my eyes.\n\t\n\tI guess we're letting Elrin in on this.\n\t\n\t*page_break\n\t\n\t\"So what you mean to tell me is... if we destroy this sphere, all of this will disappear!?\" Elrin's still\n\tshocked. He needs to pull it together if he's going to be of any help to us.\n\t\n\tCan he even fight? This could be a problem...\n\t\n\tWell. Maybe not. We can't actually die here, so he'd just be waiting for us at the car until we cleaned\n\tup.\n\t\n\t\"You've summed it up perfectly my friend!\" Joan shouts. \"We shouldn't dally. We have justice to serve!\"\n\t\n\tElrin stares at Joan. \"Are you... that little girl?\"\n\t\n\t\"I am not-\" She sighs. \"I'm Joan. I'm just bigger while I'm in this armor.\"\n\t\n\t\"I see...\" Elrin claps his hands together. \"Well, with my martial training, I should be able\n\tto produce a weapon as well!\"\n\t\n\tI quirk a brow. \"You have combat training?\"\n\t\n\t\"Of course!\" Elrin says. \"We just went over this.\"\n\t\n\t\"We did?\" I ask.\n\t\n\tElrin pauses. And then looks around. \"...wait. When did we actually arrive down here?\"\n\t\n\t*page_break\n\t\n\t*goto lbl_Start\n*if (location = \"Union\")\n\t\n\tThe next day begins normally enough. As I'm headed out the door to go to school, Father Albert takes a moment\n\tto insist we get started on the haze today.\n\t\n\tEvidently Toby and Laura will be meeting me at my school once I'm done for the day.\n\t\n\t*page_break\n\t\n\tThis will be our first dive in together.\n\t\n\tJoan and I meet Toby and Laura in front of the school once we're cut loose.\n\t\n\tIt sounds like Toby can already feel the haze, so getting him through shouldn't be too difficult. It's\n\tLaura that I'm worried about.\n\t\n\tShe apparently can't feel it at all. That means there's at least the possibility that she won't be able to actually help us.\n\t\n\tI guess it doesn't matter. I was expecting to do this with just Joan, so worst case scenario, we'll have one more extra body.\n\t\n\t*page_break\n\t\n\t\"Hello new friend!\" Toby rushes up to Joan and hugs her.\n\t\n\tJoan stiffens from his contact and just kind of freezes in place.\n\t\n\tLaura yanks him back the second he lets go. \"Sorry about him.\"\n\t\n\t\"It's... fine...\" Joan regains her composure. \"You're Laura and Toby.\"\n\t\n\t\"That we are,\" Laura says. \"You must be Joan. From what $!{fiName}'s said, it sounds like you're\n\tthe expert on the haze.\"\n\t\n\t\"Well...\" Joan grins. \"I wouldn't call myself an [i]expert[/i] or anything. But, yeah. I'm pretty awesome.\"\n\t\n\t*page_break\n\t\n\tLaura finds us a parking spot around the back of the hospital. \"Alright. What now?\"\n\t\n\t\"Hm.\" That's a good question. I'm not sure where we could hide in there. At the mall it was easy, but\n\tany supple closet in the hospital would probably be more frequently visited. Someone would see\n\tus for sure.\n\t\n\t\"So... are we going to 'dive in' friends?\" Toby asks.\n\t\n\t\"I suppose... though we need a good spot.\"\n\t\n\t\"A spot where?\" Laura asks.\n\t\n\tI shrug. \"Just somewhere on the hospital grounds, I guess?\"\n\t\n\tLaura looks around. \"Well, we're parked in front of it. Shouldn't our truck work fine?\"\n\t\n\t\"Uh...\" I give Joan a questioning glance.\n\t\n\tShe just shrugs back. \"That might work? Though... anybody walking by might wonder what four randos\n\tare doing sleeping in front of a hospital.\"\n\t\n\t\"Fantastic,\" Toby says. \"So how do we do this?\"\n\t\n\t*page_break\n\t\n\tA minute of explaining later and we're all leaning back in our seats, eyes closed.\n\t\n\t\"Alright,\" Joan says. \"Just... try to focus on that weight that is blanketing the city. That haze that's\n\tdragging everyone down. Once you can clearly feel it, and feel where it's coming from, try to fall\n\tinto it.\"\n\t\n\t\"Just like that?\" Laura asks, oddly trying to join us.\n\t\n\t\"Pretty much...\" Joan says.\n\t\n\t\"How long will it take?\" asks Toby.\n\t\n\t\"a lot longer if you keep trying to talk,\" Joan says. \"Just let yourself fall into it. [i]Want[/i] to\n\tfall into it. All the way to the bottom.\"\n\t\n\tI take a deep breath. Just fall in. Don't think of anything else.\n\t\n\t*page_break\n\t\n\t\"So once the sphere's destroyed, everything will be fixed?\" Laura asks.\n\t\n\t\"Yeah, that pretty much sums it up,\" I say.\n\t\n\t\"Excellent,\" she says. \"I'm glad I'm able to join you.\"\n\t\n\tThat was pretty unexpected. We got Toby and Laura in. The extra manpower should help.\n\tHopefully.\n\t\n\tI don't know if either of them will be able to make weapons or not.\n\t\n\tEven if they could, they'll likely be just as weak as I am until they can learn to transform like Joan does.\n\t\n\t*page_break\n\t\n\t*goto lbl_Start\n\t\n*if (location = \"Scourge\")\n\t\n\tI'm awoken by the sound of gunfire. I rush out of my shabby, shanty town room in a panic.\n\t\n\tI stop when I see several people firing at targets in the distance.\n\t\n\tThe sun just rose...\n\t\n\t*page_break\n\t\n\tThe rest of my day at school is mundane and boring, but I do tell Joan to meet me after we're cut\n\tloose. We're clearing the haze from the hospital today.\n\t\n\tIt's time to see how Rita and Lucas do.\n\t\n\t*page_break\n\t\n\tWhen school ends, I find Lucas is standing outside their black van waiting for me. Rita is in the passenger's seat.\n\t\n\tLucas can already feel the haze, so I'm confident he'll be able to join us. I'm feeling less certain about\n\tRita.\n\t\n\tShe never said anything about being able to sense it before. That might stop her from entering it.\n\t\n\tI guess that's fine. I saw myself having to go through this with just Joan. Worst case scenario, we'll only have\n\tone extra person helping us.\n\t\n\t*page_break\n\t\n\tLucas approaches to greet us. He smiles the moment he sees Joan. \"Well, hello miss.\n\t*if (sex = \"ma\")\n\t\t$!{fiName}. You didn't tell me you had such a lovely partner.\"\n\t\t\n\t*if (sex = \"fe\")\n\t\tI see I'm graced by two beauties for this mission. I must have had some great karma on my side.\"\n\t\t\n\t*comment\n\t\n\tJoan gives him the blankest stare I've ever seen. \"Right.\" She looks at me. \"So, we're going\n\tto the-\"\n\t\n\t\"Well, hello!\" Rita suddenly gets out of the passengers seat at the sight of Joan. \"$!{fiName}! You\n\tdidn't tell me your partner was a woman!\"\n\t\n\t\"...I think I referred to her as 'she' when I told you to pick us both up?\"\n\t\n\t\"I mean you didn't say she was cute.\" Rita moves in close and takes Joan's hand. she doesn't quite\n\tshake it, she just lets her fingers linger around it for a moment. \"I must say... It's [i]very[/i] nice\n\tto meet you.\"\n\t\n\t\"Oh, uh...\" Joan blushes and giggles. \"L-likewise?\"\n\t\n\tI raise a brow at Joan.\n\t\n\tInteresting...\n\t\n\t*if (joanRomanticMovie = true)\n\t\tThough, maybe not surprising.\n\t*comment\n\t\n\t\"Alright, alright...\" Lucas says. \"C'mon. We need to act like professionals, Rita.\"\n\t\n\t\"Pfft.\" Rita rolls her eyes. \"Like you weren't flirting...\"\n\t\n\t\"I was just being a [i]gentleman[/i].\"\n\t\n\t\"Whatever,\" Rita says. \"Just drive the car, wolf boy.\"\n\t\n\t*page_break\n\t\n\tLucas drives us to the hospital and we quickly find a spot. \"So, what now?\"\n\t\n\t\"We'll need to find someplace we can dive in at without being disturbed.\" That might actually be\n\tpretty difficult.\n\t\n\tThe mall was easy. But a hospital? We could probably find a supply closet again, but someone would probably\n\tfind in no time.\n\t\n\t\"Does it matter where in the hospital?\" Rita asks.\n\t\n\tI shrug. \"I guess not. Just somewhere around here.\"\n\t\n\t\"Even outside?\" Rita asks.\n\t\n\t\"So long as it's close... that will probably work.\"\n\t\n\tRita doesn't say anything for a really long time after that. I eventually turn around, and see her sitting on the floor\n\tin the back of the van. There are no seats back there, and they don't have any equipment loaded into the van, so there's plenty\n\tof room right now.\n\t\n\tShe just pats the space next to herself while looking at me.\n\t\n\tI just stare at her for far too long before finally saying, \"Oh!\"\n\t\n\t*page_break\n\t\n\tWe all pile into the back of the van and get as comfortable as we can.\n\t\n\t\"So how does this work?\" Lucas asks.\n\t\n\t\"Well...\" Joan begins. \"Try to focus on the atmosphere of the city. Focus on that haze that's dragging everything down...\n\tand try to really feel it.\"\n\t\n\tThere's a moment of silence, with us all just sitting still with our eyes closed.\n\t\n\t\"Once you can feel it, try to fall into it. All the way down. As deep as you can go...\"\n\t\n\t*page_break\n\t\n\t\"So all we have to do is destroy the core, and that's it?\" Lucas asks.\n\t\n\t\"Yep,\" I respond. \"That's basically the gist of it.\"\n\t\n\tRita jerks a thumb behind her. \"Who's the guy in this armor.\"\n\t\n\t\"It is I! Your companion, Joan!\" She strikes a heroic pose. \"Shall we-\"\n\t\n\t\"BAHAHA!\" Rita falls to her knees with laughter. \"What? What is this? Why are you talking like that?\"\n\t\n\t\"I-\" Joan's voice falters. \"It's a whole... thing. I'll explain it later.\"\n\t\n\t\"Yeah...\" Rita is trying not to giggle. I think. \"Please do.\"\n\t\n\t*page_break\n\t\n\t*goto lbl_Start\n\t\n*comment\n\n\n\n\n\n\n\n\n\n*label lbl_SkipIntro\n\n*if (f_11_CheckpointHospital = \"start\")\n\t\n\t*goto lbl_Start\n*comment\n\n\n*label lbl_Start\n\n*set f_11_CheckpointHospital \"start\"\n\nThe otherworld, unsurprisingly, looks like the warped interior of a hospital.\n\nIt's not very clean looking.\n\nThe walls and floors are, I suppose, meant to be white, but everything is covered in a thick grime.\nEven the fluorescent lights are smeared with strange grease, dulling and dispersing their harsh\nlight.\n\nThere's an exit behind us, with a wide open, but pitch black, world behind us. I think we just stepped through it?\n\nThe hall seems to stretch on forever. The further down I look, the more the hall seems to rotate and bend\never-so-slightly out of place. Door after door line the walls. There's strange, fleshy growths blocking all the doors however.\n\n\"This place is certainly... dark,\" I mumble.\n\nJoan nods. \"These places are usually a little twisted, but I haven't seen one like this before.\"\n\n*page_break\n\nThe haze has been brewing for a while now... this might get a little dicey.\n\n*page_break\n\nWe're barely more than a few steps in when one of the doors fly open, spewing a cloud of rotten musk across the\nfloor. The cloud is thick enough to keep us from seeing through it until it clears, and when it does, I realize\nseveral bodies flew out of the room too.\n\nAt first they looked like more of those hollow-eyed things we've been fighting, but as the cloud clears, I see\nthat they look different.\n\nNot too different. They still have those awful empty eyes. Their skin has a sickly green pallor to it.\nMore disconcerting, they also have fleshy growths all over their bodies. They looks like tumors with meaty\ntendrils digging into their skin.\n\nThe tumors leak a red substance, but it doesn't look like blood. It's too shiny.\n\n*if (location = \"Elrin\")\n\t\n\tElrin takes a few steps back. \"These things are ghastly...\"\n\t\n\t\"No kidding.\" I generate a weapon. \"These ones look a little more dangerous then before.\"\n\t\n\t\"Having experience with a weapon lets you create it... right?\" Elrin looks at his hands. \"So that means-\"\n\tA flash of light appears between his hands. He's holding a long staff.\n\t\n\tI realize his weapon doesn't look like mine. My weapon looks like it's made of pure light, but\n\this actually looks like a solid object.\n\t\n\t\"I'll have these cleared right up for you,\" Elrin says.\n\t\n\tBefore I can warn him to hang back he leaps forward into a sprint, and rushes until he's surrounded by\n\tthose things.\n\t\n\tBefore I can react he releases a torrent of strikes all around him. His movements are so blindingly fast,\n\tI can't keep up with them at all. Every creature is pulped with ten seconds or so.\n\t\n\tJoan and I stand by, just staring at him.\n\t\n\t\"Interesting...\" Elrin muses. \"I think my staff has slightly more bite to it than it should. Why, I'd say their\n\tbodies were practically exploding on contact!\"\n\t\n\tI walk forward, observing those creatures melting corpses. Either they are much weaker than the last kind, or\n\tElrin is much stronger than me.\n\t\n\tOr maybe just his weapon is.\n\t\n*if (location = \"Union\")\n\t\n\tI flinch as a burst of light comes from my right.\n\t\n\tLaura is holding... some sort of sword... staff... thing.\n\t\n\tIt's like a really short spear, but the spear tip is a full sword.\n\t\n\t\"Interesting...\" Laura says. \"That wasn't difficult to do at all. Almost like an instinct.\"\n\t\n\tI realize her... weapon, doesn't look like mine. My weapon looks like it's made of pure light, but\n\thers actually looks like a solid object.\n\t\n\tI look at Toby expectantly.\n\t\n\tHe smiles and gives me a thumbs up. \"I believe in you friend!\"\n\t\n\t\"Let's see how tough these things are...\" Laura steps forward.\n\t\n\tThose creatures contort themselves to face her.\n\t\n\tShe leaps forward, and brings her spear-thingie down in a clean cut. The blade effortlessly\n\tslices through the creature's torso, bisecting it.\n\t\n\tI watch in disgusted fascination as the creature's body falls apart into two separate chunks.\n\t\n\tLaura doesn't waste any time cutting down more of them. One after the other she slices through\n\tthe small group. She works through them so quickly they barely even have time to react.\n\t\n\tHm. She seems quite a bit more effective than me...\n\t\n*if (location = \"Scourge\")\n\t\n\t\"Wow.\" Lucas grins. \"These guys sure are ugly, aren't they?\" He pounds his fists together.\n\t\n\tHe looks like he's ready for a brawl, but he's not generating any weapons. I sure hope being\n\ta werewolf makes him a bit beefier than your average man.\n\t\n\tRita doesn't seem to have the same problem, as a burst of light flashes off her left hand, and just\n\tlike that, she's holding a knife.\n\t\n\tI realize her weapon doesn't look like mine. My weapon looks like it's made of pure light, but\n\thers actually looks like a solid object.\n\t\n\t\"Let's see how this goes...\" Rita sprints forward at blinding speed. Strangely, she doesn't target the creatures\n\tin the front. Instead, she goes for those in the back. She does make quick work of them however. Her knife cuts through\n\tthem with minimal effort. I even see a few limbs get hacked off in a gory fashion.\n\t\n\tLucas charges the ones at the front. I was expecting him to transform into his werewolf state, but oddly he does\n\tnot. Instead he simply strikes and grapples with them in a violent fashion.\n\t\n\tI guess I can't complain. His unarmed strikes seem to be just as effective as Joan's. His blows crush their bodies,\n\tand he's attacking with more than just his fists. Feet, elbows, knees, he's throwing everything at them. He even\n\tpicks one up and smashes it head first into a nearby wall.\n\t\n\tThere's so much force behind the impact, he completely destroys its head.\n\t\n\tJoan nods approvingly. \"Nice. I dig it.\"\n\t\n*comment\n\n*page_break\n\nWe cautiously step over the creature corpses as we make our way inside.\n\nAs we move forward, I can feel an occasional pulse drum throughout the building. It's subtle, but it leaves\na dead feeling in my bones.\n\nIt gives me a feeling like when I looked directly at one of the spheres before. If it is one of those, it must\nhave grown very powerful by now.\n\n*page_break\n\nThe corridor comes to an end, and we see a not at all natural door. It's metal and says, 'NO ENTRY'. It\ndoesn't even look like it belongs in the hospital.\n\nI throw it open, and see a street beyond it.\n\nCars are overturned. Buildings are burning. Beat up trucks block the street both to my left and my right,\nand I see several men and women dressed in camouflage using the trucks as cover. They're peering out\nfurther into the street, but I don't see anything other than rioters far off in the distance.\n\nIn the stable space between the two lines of trucks stands a man in a priest's garb.\n\n*temp tmp_Him \"the priest\"\n\n*if (f_008_NightPlans = false)\n\t*set tmp_Him \"Father Albert\"\n\tIt's Father Albert.\n*comment\n\nHe's standing in front of several people, none of them looks human. One is a man covered in dark scales. Sharp\nhorns protrude from his head. Is he some sort of demon?\n\nThey're all on their knees.\n\nA few people in camouflaged garb are by his side. they're all carrying assault rifles. All pointed at the kneeling group.\n\nThe others kneeling don't look human either, but they're all dressed similarly. White clothes, with red armbands. They don't\nhave bandannas covering their faces, but I do see several of the sharp-fanged bandannas on the ground in front of\n${tmp_him}.\n\n\"So,\" ${tmp_Him} begins. \"It seems we've found several of these wretched things prowling these streets. Hmph. I have\nno doubt you've sown the destruction around us.\"\n\n\"Screw you, old man!\" one of them shouts. \"We didn't cause any of this!\"\n\n\"Hm.\" $!{tmp_Him} just stares the man down with absolute contempt. \"You think you can escape justice? That you are above\nconsequences for your actions? Nobody can escape the judgment of the lord...\"\n\n\"Screw this...\" the same man charges ${tmp_Him}.\n\nNone of the people surrounding ${tmp_Him} make a move. $!{tmp_Him} himself doesn't so much as flinch as the man slams\nhis shoulder directly into him.\n\n$!{tmp_Him} grabs a hold of the man's neck with one hand, and lifts him off the ground. He looks old, but he's not even\nslightly straining to lift a grown man like that. $!{tmp_Him} throws the man forward, where he collapses at his friend's\nfeet.\n\nThe other people in white uniforms stand. The one in normal clothing does not.\n\nBefore they can do anything, a hail of gunfire rings out. Every person surrounding ${tmp_Him} open fire at\nonce.\n\nThe only one left is the demonic-looking man still on his knees. He puts his shaking hands up. \"L-listen! I don't\nknow what this is, or who these people are, but I didn't have anything to do with this!\"\n\n$!{tmp_Him} shoots a look at one of the men by his side.\n\nThe man immediately produces a handgun. \"Here you are, Father Albert.\"\n\nHe accepts it, and slowly approaches the man. \"Your existence...\"\n\n\"H-hold on! Just wait dammit!\"\n\n\"Is an abomination,\" Father Albert growls. \"And we won't sit idly by while you tear our lives apart any longer.\" He\ntakes aim.\n\n\"W-wait!\"\n\nAnd with a single shot, kills the man.\n\nEverything freezes in that moment. Father Albert stands motionless with the gun still pointed forward.\nThe man he just shot it stuck falling to the ground. Even the fires in the burning building stop moving.\n\n*page_break\n\n*if (location = \"Elrin\")\n\t\n\t\"What is this?\" Elrin asks. \"Where are we?\"\n\t\n\t\"We're probably seeing something that happened in Windbrooke,\" I answer. \"I don't know who these\n\tpeople are though.\"\n\t\n\t\"That's not exactly true,\" Joan says. \"We've seen people in those white uniforms before.\"\n\t\n\t\"You have?\" Elrin asks. \"Where?\"\n\t\n\t\"The last time we dived into this otherworld,\" I say. \"We saw this same sort of... vision. They weren't\n\tbeing killed though. They were the ones murdering someone.\"\n\t\n\tSo now there's a [i]second[/i] group involved? This is too much to handle...\n\t\n\t\"So what is happening now?\" Elrin asks.\n\t\n*if (location = \"Union\")\n\t\n\tI turn to see Toby and Laura. They're both looking everywhere but at the scene in front of them.\n\t\n\t\"Everything alright?\" Do you not want to see your own group's handiwork?\n\t\n\t\"Yes,\" Laura's response is a little too stiff.\n\t\n\t\"Who are these new people!?\" Joan shouts. \"It was bad enough before, but now we're dealing with this?\"\n\t\n\tLaura and Toby freeze in place.\n\t\n\tI might as well tell her. \"They're from the Union of Humanity.\"\n\t\n\t\"Huh?\" Joan tilts her head. \"But... isn't that where these two are from? And your parents?\"\n\t\n\tI nod. \"Yeah.\"\n\t\n\tJoan just kind of [i]looks[/i] at the two of them.\n\t\n\tLaura sighs. \"Things have gotten complicated in our group...\"\n\t\n\tUnderstatement of the year, Laura.\n\t\n\tShe tilts her head as she looks past both Joan and myself. \"What is happening?\"\n\t\n*if (location = \"Scourge\")\n\t\n\t\"GOD DAMMIT!\" Lucas screams. \"Those fuckers are gonna pay for this!\"\n\t\n\tJoan flinches away from him. \"W-wha...?\"\n\t\n\tRight. I never explained to Joan who these two actually are, or what I know about the people in white uniforms.\n\t\n\tRita is seething right along with him, though she's being far less vocal about it.\n\t\n\tI suppose now is as good a time as any...\n\t\n\t\"Those people in the white uniforms are from a group calling itself 'The Scourge'.\"\n\t\n\tJoan stares at me.\n\t\n\t\"Those two are members.\"\n\t\n\tJoan looks between Lucas and Rita. \"uh... $!{fiName}? Can we talk in private for a second?\"\n\t\n\tBefore I can respond, she drags me a short distance away.\n\t\n\t\"They're with [i]them[/i]? They murdered a guy!\"\n\t\n\t\"He butchered a little girl and killed her parents.\"\n\t\n\t\"B-but, I- that's not-\" Joan rambles for a moment before regaining her composure. \"They MURDERED a guy.\"\n\tShe leans in closer and whispers, \"They're PLANNING to go on some sort of rampage...\"\n\t\n\t\"Which is why...\" I begin. \"We need to stay in contact with the group. To keep an eye on them.\"\n\t\n\t\"Hey, uh...\" Lucas waves at us, and points forward. \"Should we be worried about that?\"\n\t\n*comment\n\n\"Huh?\" I turn to look at the scene before us.\n\nEverything is melting away. All the fires, the buildings, the men with guns, Father Albert himself... it's all\ndraining into the ground. Like we're just looking at a painted picture, and someone is dumping paint thinner on\nthe canvas.\n\nAs the colors wash away, the grimy hospital is left behind. All with one peculiar exception.\n\nThe corpses of the people just murdered have been left behind. But they now have eerie tumors growing on their bodies.\n\nI take a step back. \"Damn... get ready!\"\n\n*page_break\n\nThose that died rise. They still look like the people who died. They're wearing their clothing. They have their faces...\n\nThey went down pretty easy before though. Maybe these ones are more vulnerable to harm?\n\n*if (style = \"warrior\")\n\t\n\tI take a step forward, and generate my sword. I stab into the closest creature's chest.\n\tIt's body offers quite a bit of resistance to my blade. It takes some noticeable\n\teffort for me to yank my sword out of him.\n\t\n\tThankfully it collapses to the ground immediately.\n\t\n*if (style = \"spellSword\")\n\t\n\tI take a step forward, and generate my sword. I stab into the closest creature's chest.\n\tIt's body offers quite a bit of resistance to my blade. It takes some noticeable\n\teffort for me to yank my sword out of him.\n\t\n\tThankfully it collapses to the ground immediately.\n\t\n*if (style = \"spellbow\")\n\t\n\tI generate a bow and take aim. It makes a move forward, and I let my arrow loose. It sails\n\tthrough the air and firmly plugs into the creature's chest.\n\t\n\tIt stops for a moment, before continuing forward. I fire another, and another.\n\t\n\tAnd it finally dies.\n\t\n\t...Those arrows didn't go in very deep.\n\t\n*comment\n\nThey're not weaker than before. In fact, these one's bodies seem to be much stronger.\n\n*if (location = \"Elrin\")\n\tWhich apparently means Elrin can hit [i]much[/i] harder than I can...\n*if (location = \"Union\")\n\tWhich means Laura can hit [i]much[/i] harder than I can...\n*if (location = \"Scourge\")\n\tWhich means Rita and Lucas can hit [i]much[/i] harder than I can...\n*comment\n\nFiguring that one out will be a mystery for later.\n\n*goto lbl_EditSkip\n\n\n*label lbl_EditSkip\n\n*page_break\n\n*if (location = \"Elrin\")\n\t\n\t\"Hm.\" Elrin looks over the creatures corpses. \"I must say... that was easier than I anticipated!\" He smiles\n\tas Joan and myself. \"Excellent work!\"\n\t\n\t\"Absolutely, comrade!\" Joan pats Elrin a little too hard on the back, sending him straight to the floor. \"Oh! Sorry!\n\tI'm so sorry!\"\n\t\n\tElrin uses his staff to quickly recover his footing. \"No worries little miss. I was just caught off guard is all.\"\n\tHe makes a point of coming over to check on me in case I was badly hurt.\n\t\n\tI suppose Raven did ask him to keep me out of trouble...\n\t\n\tI still don't know if he's going to tell her about all of this. I don't even know what her reaction would be, but\n\twe can't just stop fighting the haze.\n\t\n\tI'll have to come up with something.\n\n*if (location = \"Union\")\n\t\n\t\"That wasn't too difficult at all,\" Laura muses, looking over the creatures corpses. \"I hope we can keep up this\n\tmomentum.\"\n\t\n\tI eye a small cut on Laura's shoulder. It's not particularly deep, but it is noticeable. Toby walks up to her,\n\tand puts his hands on the wound.\n\t\n\t\"Hold still...\" I can't see what he's doing, but when he moves away, the cut is gone.\n\t\n\t\"Impressive...\" Joan muses out loud. \"How did you do that?\"\n\t\n\tToby smiles. \"It's a gift Father Albert helped coax out of me. He tells me very few people can do it.\" Toby\n\tlooks over at me. \"Do you need any healing friend?\"\n\t\n\tI shake my head. \"I handled... that one. I'm alright.\"\n\n*if (location = \"Scourge\")\n\t\n\t\"Whew...\" Lucas is hunched over, panting. He catches his breath quickly enough as he straightens back up. \"Nice work everyone!\"\n\t\n\tRita is just twirling that knife between her fingers. \"That was even easier than I thought it would be.\" She glances over\n\tat me. \"You okay? You looked like you were having some trouble.\"\n\t\n\tHey. \"I'm fine.\" I still took care of it pretty easily.\n\t\n*comment\n\nWe only take a slight break to pull ourselves together before moving forward again.\n\n*page_break\n\nWe move through the twisted hall. Strange fleshy growths cover the walls and ceiling. They just keep getting thicker\nthe farther in we go.\n\nA dull pulse fills the air. I think we're nearing the sphere for this location.\n\nThe lights grow dimmer as we move forward. Those growths are slowly covering starting to cover the fluorescent\nlights above us.\n\nEventually we come to a door. It's completely sealed by those strange growths. The hall also splits off to the left\nand right of it.\n\n\"Alright...\" I look the door over. \"I'm pretty sure the sphere we're looking for is on the other side of this... Anyone\nhave any ideas?\"\n\nJoan approaches the door, and pounds her fists together. \"I believe I can make short work of this... Maybe.\"\n\nWe step back as she moves forward...\n\nShe slams her armored fist against the door. The flesh mulches underneath her gauntlet, and a spray of disgusting fluid splatters\neverywhere.\n\nJoan stands frozen with her fist against the door. \"...That was disgusting.\" As she pulls her fist back, it's revealed\nshe left a sizable dent in the door.\n\nShe could probably muscle her way through. Eventually. But it wouldn't be pretty.\n\n*if (location = \"Elrin\")\n\t\n\tElrin looks between the left and right paths available to us. \"Perhaps we should split up, and see if there's\n\tan alternate entrance?\"\n\t\n*if (location = \"Union\")\n\t\n\t\"Hm.\" Laura looks down one of the side paths. \"Maybe we should check if there's another entrance around the corner?\"\n\t\n*if (location = \"Scourge\")\n\t\n\tLucas looks down one of the side paths. \"There might be another way in if we follow one of these halls. We could split\n\tup and check real quick first.\"\n\t\n\t\"Oh, yeah.\" Rita nods. \"Splitting up sounds smart. That never gets people killed.\"\n\t\n\tLucas groans. \"These creatures are easy, and it'll only take a second. Okay?\"\n\t\n*comment\n\n\"Sounds good to me,\" Joan says, standing a little too stiffly. \"I'll be here. Wishing I wasn't covered in this grime.\"\n\n*page_break\n\nI take the left path on my own. We aren't planning on going far. Just enough to see if there's a door around the corner.\n\nAs I'm walking the hall makes a right turn.\n\nThe hall continues on, and there's a man at the end of it. A normal man.\n\nHe's old. I don't think I've ever seen a build that lanky before. He's practically skin and bones. He's wearing\na very ordinary looking brown vest and bow tie.\n\n...He actually looks lind of familiar.\n\nHe's not looking my way. In fact, he's walking away from me. There's a left turn at the end of the hall, and he disappears\nbeyond it.\n\nI follow quietly.\n\n*page_break\n\nThis hallway just goes keeps going. Constantly twisting and turning.\n\nIt does eventually let out into a large room.\n\nThere's a sphere in the room. But it's torn open. Strange lights dance around inside it. The old\nman is crouched in front of the opening. He's just looking inside it, watching those buzzing lights.\n\nI don't feel that strange presence in the air coming from the sphere.\n\n\"So you followed me,\" he says casually. \"I'm surprised you'd leave your friends behind so readily given what you've\nalready encountered out here.\"\n\n\"Huh?\" I approach cautiously. \"You knew we were here?\"\n\n\"I di
