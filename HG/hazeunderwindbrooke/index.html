n probably go back so long as I keep this thing with me.\n\nLooking at the stairway leading out, I wonder if I should really be poking around. I get the sense Raven\nwouldn't appreciate it.\n\nI rub circles around the coin with my thumb.\n\n*page_break\n\n\"Yeah... I'm not missing out on this.\"\n\n*page_break\n\nThe stairway exits out into a rather pretty and stylish building.\n\nThe ceiling is made mostly from glass, with a metal frame holding individual panes together. The space is large,\nwith dozens of tables spaced across the floor. I can see a bar set on one side of the room, with a young\nwoman and man attending it.\n\nThis looks like a restaurant.\n\n\"Welcome to Lilia's, is it three?\" A waitress(?) greets a few people walking inside.\n\nNobody notices that I emerged from the back.\n\nA casual glance around doesn't reveal Raven. I cautiously approach the bar.\n\nA man tending it sets a glass in front of a customer, before noticing me. \"We don't serve minors here.\"\n\n\"Um... that's fine,\" I say. \"I just needed to know where I am.\"\n\n\"Right now, you're close to the Western coast. If you're looking for landmarks, aside from the obvious\none, the Elgard theater is just down the road.\" He's weirdly well prepared for my question. Do people ask him that a lot?\n\"Head left as soon as you head out the door. Keep going straight for a while, and you'll see it.\"\n\n\"Right. Thanks.\" I back away from the bar, and start shuffling toward the door. \"Uh... by the way? I don't suppose\nRaven's been around here has she?\"\n\nThe man stops his work and gives me a curious look. As does the woman attending the bar.\n\nI force a smile. \"Raven Lilia that is.\"\n\n\"Yeah,\" the man says slowly. \"We know who you meant. How do you know her?\"\n\nI mean, it's not like I have any reason to lie...\n\n*page_break right?\n\n\"She's my aunt,\" I say. \"I've been staying with her for a while since, uh... everything happened.\"\n\nThey both stare at me for a while.\n\nI'm getting attention from some customers too.\n\nI jerk a thumb towards the door. \"I'll just see myself out. Thanks for the assistance.\"\n\nWhen I whip around to leave, I nearly run into a bronze-skinned woman.\n\nShe's REALLY pretty. Almost painfully so.\n\nHer eyes are the brightest green. They gaze over me curiously. \"Oh my god...\" I immediately recognize her\nvoice from Raven's earlier conversation. \"Raven actually told you about Yggdrasil!? That's amazing!\"\n\nI take a step back. \"Well, actually-\"\n\nShe forcefully grips my hand. There are thick muscles under her arms. \"It's so nice to meet you, I'm\nYvonne. I'm sure Raven's told you all about me.\"\n\n\"Well... actually-\"\n\nShe suddenly drags me forward. \"You've got to come with me to meet the professor. Your aunt is waiting\nby the rail station right now.\"\n\nI pale. \"Actually-\" I futilely make an effort to wrest my hand from her. \"I'd rather not get in her-\"\n\n\"Nonsense!\" She says. \"You have to join us!\" She already looks very muscular, but somehow she's even stronger than that.\nMy efforts to free myself from her grasp are having no effect at all. \"Professor Gestalt would be really disappointed if he didn't get\nto meet you the first time you arrived.\" I don't think she's even aware that I'm trying to free myself right now.\n\nThere's nothing I can do as I'm dragged toward the doorway.\n\n*page_break\n\nThe road just outside the store is built from stone tiles. It's actually a rather odd sight. Businesses\nfill the street, and they all look strange. I see languages and symbols that I don't recognize from anywhere.\n\nStrange looking people pass us. Their clothing is odd and foreign. And many of them are clearly not human.\n\nMonorail tracks are built right into the road, a station is just across the street.\n\nYvonne doesn't so much as glance back at me as I'm hurried across the street. The station\nis pretty busy, with numerous people waiting around for the car to show up.\n\nI can see Raven staring at us. Her eyes are locked on Yvonne at first, and then drift to me.\n\nThey narrow, searching. Like she doesn't recognize me.\n\nHer head tilts ever so slightly. Recognition and confusion follow.\n\nHer eyes widen. Surprise. It's neither positive or negative. It just is.\n\nAnd then it is negative. I see her thoughts clicking into place.\n\n*page_break\n\nShe.\n\nIs.\n\nPISSED.\n\n*page_break\n\n\"Well look who decided to swing by!\" Yvonne shouts enthusiastically as we approach Raven. \"You should\nhave told me, I would have given the kid a tour around the island.\"\n\nRaven says nothing, she just stares me down with the burning fury of a thousand suns.\n\nI notice her basket of goods is nowhere to be seen. Maybe she handed them off?\n\n\"So...\" Yvonne begins. \"When did you tell ${sex}?\"\n\nRaven doesn't say anything for what feels like ages.\n\nYvonne's smile devolves into something more nervous.\n\n\"I didn't.\"\n\nYvonne looks between myself and Raven a few times before I see realization click on her features.\n\n\"Oh.\"\n\n*page_break\n\nI'm suddenly dragged back toward the restaurant we just exited from.\n\nYvonne begins rambling. \"Alright, now I [i]know[/i] it looks like you just stepped into a pocket dimension linked\nto your city, but I just gotta say... you didn't. Not. At. All. So, if you could just go back where you came\nfrom and pretend you didn't see any-\"\n\n\"Enough.\" Raven's firm voice cuts through Yvonne babbling. She stops moving immediately.\n\nWhen I look back at her, Raven looks exasperated. \"Just... just get over here.\"\n\nYvonne [i]finally[/i] lets go of my arm, and we shuffle back up to Raven.\n\nRaven sighs. \"I can't wait any longer.\" She looks at me. \"You're just going to have to come with me for now.\nWe can talk more about this later.\"\n\nShe turns and walks away. I follow.\n\n*page_break\n\nThe tram station has several benches scattered around. Most of them are taken, but we manage to stake\nout our own spot in a far corner.\n\nRaven and I haven't said a word to each other.\n\nA few minutes later and an announcement plays. \"The car will be arriving in a few moments. Please be\nready to board.\"\n\nI glance down the road, and I can see people moving away from the track as a set of tram cars pass them. They\ndon't actually move all that fast.\n\nI was expecting a sleek model, I've seen pictures of modern monorails, but these don't look like them.\n\nThe cars are all boxy and heavy-looking. The design archaic. Were they installed a long time ago?\n\n\"You know,\" Raven says. I actually flinch from her sudden voice. \"You're mom made me promise not to tell you\nabout any of this.\"\n\nI wait for her to say more, but she doesn't. I'm not sure if she wants me to say something or not.\n\nthe cars arrive.\n\n*page_break\n\nA massive number of people pour out of them, and we board shortly after. It's a bit of a struggle to push\npast so many people, but we eventually take a seat together.\n\nI hadn't been able to get a good look at the surrounding city, but as the cars pull away from the station\nand continue down the road, the buildings become more spaced out, and I can finally see into the city.\n\nI immediately notice a massive tree. And I do mean, impossibly large, stretching up toward the sky. Its\ncanopy brush under the clouds from how high up it is.\n\nI can tell some sort of building has been erected on top of it, but it's too far away to make out any details.\n\nThe canopy of the tree is surprisingly colorful. It's mostly green, but I can make out colorful patches spread\nall over it. I can't tell if the leaves have changed colors on those spots, or if some sort of plants are growing,\nbut the effect is beautiful.\n\n*page_break\n\nThe tram cars are a bit of a bumpy ride, and I lurch to the side when the road suddenly slopes up.\nI can hear the wheels grinding as the tram fights the hill.\n\nAs we go higher, I can see even more of the city.\n\nWe're on an island. I can clearly make out the border of the city. Dozens of boats linger on the water as far as\nthe eye can see.\n\nThe city itself is uneven. I see tall modern looking buildings that wouldn't be out of place in Windbrooke\nerected in the distance, beyond the massive tree. I see rural areas with strange looking houses. Their\ndesign seems completely foreign to me.\n\nThey all have chimneys, and I can see smoke pouring out of some of them even now. The area has a cozy\nfeeling compared to the rest of the island.\n\nThere's so much to take in, I can't draw my eyes away from the window.\n\nCanals. They cut through the city, gathering near the tree.\n\na very large park. Or maybe it's a garden?\n\nA harbor. Large ships wait in the docks. Tiny ones skimmer to and away from it.\n\n*page_break\n\n\"Enjoying the view?\" Yvonne is smirking when I glance at her. I get the sense\nshe's been watching me for some time.\n\n*choice\n\t#\"What is this place?\"\n\t\t\n\t\t\"Well...\" Yvonne begins. \"This place is called the Island of Yggdrasil. Most locals just call it Yggdrasil.\n\t\tThough, I imagine what you want to know is that it's a pocket dimension.\"\n\t\t\n\t\tI stare at her. A pocket dimension... is that something I've heard of?\n\t\t\n\t\tHer smirk widens. \"It's our kinds best kept secret. Though you humans have been slowly\n\t\tfiguring it out since we all came out of hiding. \"We're not on earth. This place was\n\t\tmagically constructed. It exists outside your world entirely.\"\n\t\t\n\t\tI was vaguely aware of monster-kind having some secret method of hiding their societies\n\t\tfrom humans, though I'd never figure it to be this big.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto lbl_TheView\n\t#\"I was actually.\"\n\t\t\n\t\t*goto lbl_TheView\n*comment\n\n*label lbl_TheView\n\n\"Well, take it all in,\" Yvonne says. \"Now that Raven's let you in on the whole thing-\"\n\n\"Again.\" Raven's tone is severe. \"I didn't.\"\n\nYvonne hesitates. \"...I'm hoping you'll swing around here again. Just let me know ahead of time, I'd love\nto give you a proper tour.\"\n\n\"Uh... thanks.\" I glance at Raven looking for some sort of reaction. She doesn't give one. \"I'll think\nabout it?\"\n\nI see Yvonne's expression fall ever-so-slightly at that remark. \"Good. Good.\" She glances out the window.\n\"It should just be ten minutes or so, and we'll be there.\"\n\nI tilt my head. \"Be... where, exactly?\"\n\n*page_break\n\nIt doesn't take long for me to realize we're heading closer and closer to that massive tree.\n\nWe make stops here and there along the way. People get out, people get on. But, Raven and Yvonne\nnever move.\n\nI don't speak up until the tree is towering over us, blocking out the sun. \"Are we headed up there?\"\n\nYvonne nods. \"That's right! You'll be meeting the big man himself, Professor Gestalt!\"\n\n\"He... owns this island?\" I ask.\n\nYvonne shrugs. \"Basically. It's a more complicated situation than him just being a land-baron, but he\nis in charge. He runs things around here, and people see him as this island's leader.\"\n\n\"I see...\" I'm not sure what to ask.\n\n*label lbl_Questions\n\n*choice\n\t*hide_reuse #\"Will it be alright that I sneaked in here?\"\n\t\t\n\t\tYvonne nods. \"You're Raven's family, of course it is.\"\n\t\t\n\t\t\"Are people normally allowed to come here?\"\n\t\t\n\t\t\"I mean...\" Yvonne scratches the back of her head. \"Kinda? These pocket worlds exist to help\n\t\tour people hide. We're not supposed to just be bringing people in left and right, but... this\n\t\tis one of the larger ones.\" She smiles. \"I don't know if you noticed, but it's a pretty big\n\t\tcity on this island. People are going to get in, it's expected, so the rules are pretty lax.\"\n\t\t\n\t\t*goto lbl_Questions\n\t*hide_reuse #\"How do you know Raven?\"\n\t\t\n\t\tYvonne smiles brightly as she forcibly wraps an arm around my aunt. \"Oh, we've been besties for\n\t\tthe better part of a decade.\" Raven is glowering at her. Yvonne just smiles brighter. \"We've been\n\t\tstuck at the hip ever since we first met!\"\n\t\t\n\t\tRaven's expression is unchanging. \"I actually thought you were annoying.\"\n\t\t\n\t\tYvonne just squeezes her tighter. \"Oh, Raven. Always such a grump.\" She suddenly leans closer to me. \"Don't\n\t\tbelieve her attitude, she's a total sugar plump inside.\"\n\t\t\n\t\t\"No,\" Raven says. \"I'm not.\"\n\t\t\n\t\tActually, I'm pretty sure Raven's never acted this sullen in front of me before.\n\t\tI don't say that though.\n\t\t\n\t\t*goto lbl_Questions\n\t*hide_reuse #\"Is he nice?\"\n\t\t\n\t\t\"Professor Gestalt?\" Yvonne glances away for a moment. \"Mm. Pretty much, yeah.\"\n\t\t\n\t\t\"Pretty much?\" I raise a brow.\n\t\t\n\t\tShe shrugs. \"He's not constantly sunshine and rainbows-\n\t\t\n\t\t\"Unlike some people,\" Raven mutters.\n\t\t\n\t\tYvonne elbows Raven. \"-but yeah. He's a good man. I trust him. And I'm sure you two will\n\t\tget along fine.\"\n\t\t\n\t\t*goto lbl_Questions\n\t#Just sit quietly until we arrive.\n\t\t\n\t\tWe don't step off until the tram car comes to a stop inside the base of the tree.\n\t\t\n\t\t*goto lbl_Yggdrasil\n*comment\n\n*label lbl_Yggdrasil\n\n*page_break\n\nWhen we finally arrive at the station, I've noticed there are far fewer people on board.\nMost of the other passengers got off at earlier stops.\n\nThere's not very many boarding as we step off either.\n\nThe inside of the tree is a dark tunnel. The rail tracks curve around here, with the car only able to turn back\nin the direction it just came from.\n\nThe lights don't seem to be artificial. Strange flowers grow along the walls and ceiling of the tunnel, and\nthey all give off multicolored light. The combined hues give the interior of the tree an unnatural vibe.\n\nThe station is surprisingly quiet, though I immediately notice men and women standing around. All of\nthem are armored, and heavily armed.\n\nThere's nowhere for us to go but toward a set of stairs leading to what looks like an elevator. Guards\nstand beside the stairs.\n\nTheir armor is mostly composed of Gold and black colors. The design reminds me of a bizarre cross between\nmilitary armor, and medieval gear. The guns themselves don't resemble any model I've ever seen before.\n\nAnd the faint light coming from the gun barrels doesn't exactly\nlook natural to me either. Not that I'm really a gun aficionado or anything.\n\nRaven approaches, and the guards nod before stepping aside.\n\n*page_break\n\n\"Good evening, Mrs. Lilia.\" The guard's voice sounds muffled inside his helmet.\n\nI look uneasily at him as I follow Raven through. Seriously, these guys look like the bad guys\nin a dystopian sci-fi.\n\nIf this island is secretly run by some sort of oppressive nightmare regime, at least Raven seems\nto be a big shot within it. They let her pass with barely a word exchanged, and they seem to\nassume anyone following her must be allowed in too.\n\n*page_break\n\nAn elevator arrives just as we reach the top of the steps. A small balcony is built around it.\nI note the railing looks more like cover, and half-a-dozen guards are posted on it.\n\n\"Is security normally this tight?\" I whisper, just loud enough for either Yvonne and Raven to hear.\n\nRaven shakes her head disapprovingly at me.\n\n\"Not now,\" Yvonne whispers. \"We'll talk about that later.\"\n\nThe elevator opens, and it's surprisingly sleek, given how old fashioned quite a bit of the city's\nsensibilities seem to be.\n\nWe step inside.\n\n*page_break\n\nThe interior is circular. I've never seen a cylindrical elevator before.\nSurprisingly, there's no buttons inside the elevator to press.\n\n\"How do we make it go up?\" I ask.\n\n\"We don't,\" Raven says. \"This tree is professor Gestalt's. He's the only one who controls\nanything within it.\"\n\nA second later, and the doors slide shut. I feel the elevator lift off.\n\nIt starts off slow, but the speed slowly picks up. It's not unbearable, but the force feels\nvery strong.\n\nYvonne shoots me a concerned look. \"You need a hand?\" She grabs my arm.\n\nI shake my head.\n\nThe elevator ride is a long one. It takes us at least several minutes of waiting to reach the top.\n\nWhen the doors open, I'm nearly blinded by sunlight.\n\nI blink as I stumble forward. When my vision clears, I see a home.\n\nIt's a warm space, with simple wooden flooring, and antique furniture. The\narea we're released into has a few couches centered around a coffee table. I can\nsee steamy coffee already set out on it.\n\nThree cups to be exact.\n\n\"Guess he wasn't expecting me,\" I say.\n\n\"Oh, no!\" A voice calls from further in. \"I just don't drink the stuff myself. Caffeine gives me the most terrible headaches! Can't\nhandle the stuff.\"\n\nThe far wall ahead of us is made from glass. The sun glares at us from beyond it. From what I can see, there's\na fireplace, with a cozy chair set in front of it, and several bookshelves lining the walls.\n\nBeyond the window, I can't make out much other than leaves and the sky.\n\nThere's a man in that chair right now, smoking a pipe. He's idly reading a book, which he hasn't so much as glanced up from.\n\nHe looks quite old. Gray hair, with a lengthy beard. There's a certain glow to his eyes. They're giving off a faint blue light,\nbut he otherwise looks human.\n\nI'm still staring at him before I notice Raven and Yvonne have taken seats around the coffee table.\n\n*if (sex = \"ma\")\n\t\"I'll be right with you, feel free to have a seat Mr. $!{laName}!\" he calls. \"Have some coffee. I'm told\n\tthe brewer's recipe is quite exquisite!\"\n*comment\n\n*if (sex = \"fe\")\n\t\"Please, take a seat young lady!\" he calls. \"Have some coffee. I'm told\n\tthe brewer's recipe is quite exquisite!\"\n*comment\n\nRaven jerks her head toward the couch. I take that as my cue to sit down.\n\n*page_break\n\nI take the last cup, but don't do anything with it. Gestalt doesn't make me feel uneasy, and his\nhome is lovely, but...\n\nI think that sheer pleasantness of the interaction is making me feel, well... uneasy.\n\nIt's too nice.\n\n*page_break\n\n\"Raven, it's been too long since I've seen you.\" I don't know when he joined us, but he's standing\nin front of the table now. It doesn't look like he plans to take a seat.\n\n\"Sorry, Professor,\" she says. \"I've been... preoccupied.\"\n\nGestalt's eyes flicker to me for the slightest moment, before returning to her.\n\n\"But, I'm ready now. Things are stable enough for me to start making the rounds around here again.\"\n\nGestalt nods. \"Good, good. We need your help. We've already lost dozens. Those militant jackals are as persistent\nas they are mad.\"\n\n\"Any idea how they've gotten through so many times?\" Raven asks.\n\nYvonne shakes her head. \"We're trying our best, honey. But, we've got nothing. Their attacks come from seemingly\nnowhere. And we can never respond quickly enough before they flee.\"\n\n*choice\n\t#\"So 'they' are relying on hit-and-run tactics?\"\n\t\t\n\t\tRaven gives me a VERY disapproving glance. Seen and not heard is probably what she wants right now.\n\t\t\n\t\tGestalt however, simply nods. \"I'm confident our forces could defeat them easily, but we're too spread out.\n\t\tTheir attacks never last more than a few moments.\" His expression become grim. \"Fire bombs seem to be a favored\n\t\ttactic...\"\n\t\t\n\t\tYvonne nods. \"The fire will keep doing damage long after they're gone.\"\n\t\t\n\t\t*goto lbl_MeetingOne\n\t#I'm just gonna drink this coffee.\n\t\t\n\t\tAm I really supposed to be hearing all of this?\n\t\t\n\t\t*goto lbl_MeetingOne\n*comment\n\n*label lbl_MeetingOne\n\n*page_break\n\n\"And what of things in Windbrooke?\" Gestalt asks. \"I'm aware things are tense there. Almost unnaturally so.\"\n\nRaven shrugs. \"I haven't figured it out yet. I don't think the riots are natural though. Something is... off. The\nair has felt different in Windbrooke. I can't explain it.\"\n\n\"You've been through a lot lately,\" Yvonne says. \"I think it's natural to feel the atmosphere of the city's changed.\"\n\nRaven shakes her head. \"It's more than that. The city feels like it's choking on something.\"\n\n*choice\n\t#\"That haze seems to be spreading everywhere. Clinging to everything, changing everyone.\"\n\t\t*set f_007_TheHaze true\n\t\t\n\t\tI sigh. Hopefully I can do something about that.\n\t\t\n\t\tRaven looks concerned. I guess we haven't really talked about the state of Windbrooke. It's\n\t\talways easier to distract ourselves from it, and pretend everything is fine.\n\t\t\n\t\tI can take a certain comfort from that.\n\t\t\n\t\tYvonne is glancing between me and Gestalt.\n\t\t\n\t\tI look up to see him just...\n\t\t\n\t\t*page_break\n\t\t\n\t\tStaring.\n\t\t\n\t\tHis eyes pierce into me, reading me. He looks very intrigued.\n\t\t\n\t\tAfter what feels like an eternity, he finally glances away\n\t\t\n\t\t*goto lbl_MeetingTwo\n\t#Just drinking this coffee. It's actually pretty good.\n\t\t\n\t\tI'm not supposed to be hearing all of this. Why on earth did Raven bring me up here?\n\t\t\n\t\t*page_break\n\t\t\n\t\tI could have just waited behind at the bottom floor if she felt I needed a chaperon.\n\t\t\n\t\tThose chaps with glowing rifles seemed like swell guys. They could have kept an eye on me.\n\t\t\n\t\t*goto lbl_MeetingTwo\n*comment\n\n*label lbl_MeetingTwo\n\n\"Well, we are certain of one thing,\" Gestalt says. \"These attackers are definitely based out of Windbrooke.\" He looks\nat Raven. \"I won't lie. A lot of people want you back here, but I think it's important you stay in Windbrooke for now.\"\n\n\"You want me to try to find them.\" It's not so much a question as a statement.\n\nGestalt nods. \"Correct.\"\n\n\"Alright,\" Raven stands up. \"I'm prepared to begin immediately.\"\n\n\"So you're still not going to be around?\" Yvonne asks. \"People are getting worried. And I'm running the diner alone.\"\n\n\"You've always run it alone,\" Raven says. \"I haven't worked there in years.\"\n\n\"But people like to see you there!\" Yvonne pleads. \"People like seeing you around, you makes them feel safe.\"\n\n*choice\n\t#\"Why would Raven make them feel safe?\"\n\t\t\n\t\t\"Because Raven's a badass,\" Yvonne says proudly.\n\t\t\n\t\tRaven shoots her a glare. \"Don't worry about it.\" She looks at me. \"Look $!{fiName}, I promise\n\t\tI'll explain more later, but there's a lot going on right now.\" She puts\n\t\ta hand on my shoulder. \"I just need you to bear with all this for a while, okay? Just go to\n\t\tschool, hang out with your friends, and let me take care of everything.\"\n\t\t\n\t\tI nod. I have no intention of leaving everything to her, but I nod all the same.\n\t\t\n\t\t*goto lbl_MeetingThree\n\t#Just. Drinking. Coffee.\n\t\t\n\t\tOh. I'm all out.\n\t\t\n\t\t\"We're doing what we have to,\" Raven says. \"The situation's bad.\" She looks at me. \"Look $!{fiName}, I promise\n\t\tI'll explain more later, but there's a lot going on right now.\" She puts\n\t\ta hand on my shoulder. \"I just need you to bear with all this for a while, okay? Just go to\n\t\tschool, hang out with your friends, and let me take care of everything.\"\n\t\t\n\t\tI nod. I have no intention of leaving everything to her, but I nod all the same.\n\t\t\n\t\t*goto lbl_MeetingThree\n*comment\n\n*label lbl_MeetingThree\n\n*page_break\n\nWe idle around for a while longer, finishing the coffee. Gestalt chats with the other two. He makes a surprisingly\nstrong effort to keep me in the conversation, but even just as idle chatter, I can't seem to connect to it.\n\nThis island, Yggdrasil, it's unlike anything I've experienced before. I don't understand it or the people within it.\n\nThe three of them talk about so many things I've never heard of, or have barely heard of.\n\nA werewolf pack wanting a new gate in. They have their own pocket dimension, suited to a free-roaming pack.\n\nEntrances to pocket dimensions can apparently be nested inside other pocket dimensions. I don't know what the limit is on that.\n\nA family of vampires, visiting from Windbrooke itself. They're important apparently.\n\nI wonder if I know them.\n\nDemons bringing in foreign charms and wares. The island is small, there's not much room for more business.\n\nApparently demons aren't evil?\n\n*page_break\n\nEventually, we're finally getting ready to leave. I feel bad being happy about that, Gestalt has been nothing but kind,\nbut I have a lot to process here.\n\n*if (fHumanSeed = true)\n\t\n\t*goto lbl_Skip\n*comment\n\n*if (fSecretTransformation = true)\n\t\n\t*goto lbl_Skip\n*comment\n\nThe man himself approaches me. \"Oh, before you hurry out of here. I was going to ask your aunt to give you this.\"\n\n*if (fVampireSeed = true)\n\t\n\tHe hands me a thick envelope. I open it, and a small trinket nearly falls out.\n\t\n\tIt's a necklace, with some sort of dark red crystal, and a silver chain.\n\t\n\tThe papers contain an address with a map, as well as a few documents.\n\t\n\tThe documents are about me.\n\t\n\t\"Your aunt mentioned your, ahem, condition.\" Gestalt gives a warm smile. \"So, I thought I might help\n\tyou out.\"\n\t\n\tI blink. \"I have no idea what you're talking about right now.\"\n\t\n\tHe looks confused for a moment, before pointing to the side of his neck. \"You were bitten by a vampire,\n\tweren't you?\"\n\t\n\t*page_break Oh. Right.\n\t\n\tI completely forgot about that. \"Um, thanks.\" I stare at the envelope. \"What is all of this?\"\n\t\n\tHe points to the necklace. \"That, is something you need to wear when you arrive at that address. Tomorrow night,\n\tpreferably. Those papers, you need to present to your host when you arrive.\"\n\t\n\t\"But, why? What is that place?\"\n\t\n\t\"Sometimes,\" he begins. \"Our kind need to support each other.\"\n\t\n\tI raise a brow. \"'Our' kind?\"\n\t\n\tHe chuckles. \"Of course. You are going to turn eventually. It would be wise to meet\n\ta few of your own before then. They'll help you settle in. To understand your role within this\n\tnew community.\"\n\t\n*comment\n\n*if (fWerewolfSeed = true)\n\t\n\tHe gives me a small box. I open it to find a necklace dangling from a chain. It looks like a crescent moon.\n\t\n\tA tiny note is under the necklace. It contains an address.\n\t\n\t\"Your aunt told me of your situation,\" Gestalt says. \"I felt it was only prudent to lend a hand.\"\n\t\n\t\"Uh... what are you talking about?\"\n\t\n\tHe gives me a blank stare. \"I think most people would remember getting their arm torn open by\n\ta werewolf.\"\n\t\n\t*page_break Oh. Yeah, that actually did hurt like hell.\n\t\n\tYet, somehow, I completely forgot about it. \"What's this address?\"\n\t\n\t\"Well... it's important that our kind look out for each other.\"\n\t\n\tI raise a brow. \"'Our' kind?\"\n\t\n\tHe chuckles. \"Of course. You are going to turn eventually. It would be wise to meet\n\ta few of your own before then. They'll help you settle in. To understand your role within this\n\tnew community.\"\n\t\n\tHe points to the necklace. \"Wear that tomorrow night. Go to the address on that note. You'll figure\n\tout the rest from there.\"\n\t\n*comment\n\n*page_break\n\n\n\n*label lbl_Skip\n\nSoon enough, we're headed back down the elevator.\n\nYvonne carries a lopsided grin. \"Heh... sorry if the conversation got a little heavy for you.\"\n\n\"It's alright.\" I mean, except it kinda isn't. \"Um, I think I want to head back now.\nThis was a lot to take in.\"\n\nRaven nods. \"You know how to get back on your own?\"\n\n\"I think so?\" After a moment, I catch her implication. \"You're not headed back too?\"\n\nRaven shakes her head. \"I've got to start an investigation. I'm closing the shop for a while. I'll\nneed you to hold down the fort.\"\n\n\"Right,\" I say. \"I guess I'll see you later tonight?\"\n\nShe nods. \"Hopefully. I don't know how long I'll be out.\"\n\n*page_break\n\nIt isn't long before another tram arrives, and we're headed back to that restaurant.\n\n\"Soooooo.\" Yvonne gives Raven a cautious glance. \"Will this one be swinging around here in the future?\"\n\nRaven looks between Yvonne and myself. \"I...\" She sighs. \"Your parents never wanted you to know about any\nof this.\"\n\n\"So you told me,\" I say. \"And why was that?\"\n\nRaven doesn't say anything for a long while. \"They just... your parents had a certain idea for how things should\nbe. And, they wanted to make sure you were raised right.\"\n\nOkay. I have no clue what that even means. \"I'm not following you.\"\n\n\"They were just scared. Of this sort of life, the kinds of things you can find out here.\"\nRaven runs her fingers through her hair. \"I don't even know how to explain this to you.\"\n\n\"Yeah, right,\" Yvonne mumbles. I don't know when it happened, but Yvonne's expression is much darker now.\n\nRaven glances sternly at Yvonne, before turning to me. \"They're good people, and they were just trying to protect you.\"\n\nI try not to look directly at her, but I can see something brewing in Yvonne's features.\n\n\"It's hard to explain...\"\n\n\"Well, how about I help?\" Yvonne says. There's a false cheer to Yvonne's tone. The dark undertone is unsettling.\n\"Your sister and her hubby think our kind are trash!\"\n\n\"Yvonne!\" Raven snarls at her. \"Don't-\"\n\n\"-Tell the truth?\" Yvonne's tilts her head playfully. \"About how your sister thought of us? Of me?\"\n\n\"Yvonne. Enough.\" Raven's expression darkens, there's anger bubbling under the surface.\n\n\"I still don't understand why you kept in touch with them,\" Yvonne sneers. \"I mean, they thought you were going to h-\"\n\n\"SHUT UP!\" Raven lunges at Yvonne, pinning her against the car's wall. \"That woman was my\nsister. You will not talk about her like that.\"\n\nYvonne puts her hands up in mock surrender. \"Sorry.\" Her tone suggests she is not.\n\nI stare at them.\n\nRaven is breathing through gritted teeth, but composure is slowly settling back in.\n\nYvonne is just waiting in her grasp. Not struggling. Not moving.\n\nFinally, Raven backs off and sits back down.\n\n*page_break\n\nThank god there's nobody else on the car yet.\n\nIt's a long silent trip before we're back to Lilia's. The restaurant is still quite busy.\n\n\"I've got one more stop,\" Raven says. \"Head back home, $!{fiName}.\"\n\nYvonne steps off the car, I follow.\n\n*page_break\n\nAs we're walking across the street, Yvonne finally speaks. \"Sorry.\"\n\nI'm not sure what to say.\n\n\"Your parents...\" Yvonne sighs. \"Raven and I... we have history with them. It hasn't always\nbeen positive. But, I really shouldn't have said anything like that in front of you,\" she says. \"I'm sure\nthey were perfectly nice people. To you.\"\n\n*choice\n\t#\"But not you?\"\n\t\t\n\t\tYvonne's lips press into a firm line. \"No.\"\n\t\t\n\t\t*goto lbl_Sorry\n\t#\"It's fine.\"\n\t\t\n\t\tWe don't say anything more as we approach the front door.\n\t\t\n\t\t*goto lbl_Sorry\n*comment\n\n*label lbl_Sorry\n\n*page_break\n\nI head into the back without so much as a goodbye. I still have the coin, and manage to pass back through the wall without\nany difficulty.\n\n*page_break\n\nWhat a day.\n\n*page_break\n\n*comment *goto_scene DivingIn\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "007_visitingadam": "*set adamFriend + 1\n\n\n\n\n\n\n\n\nI never took the time to appreciate it before, but I realize there's no haze out here.\n\nVisiting his place has always been inconvenient. It takes so long to get here,\nnot to mention the equally lengthy trip back. But, I'm thankful it's too far away to be affected by\nthe haze.\n\n*page_break\n\n\"$!{fiName}!\" Adam greets me at the door. \"Didn't think I'd see you back so soon. Were you already looking\nfor more practice?\"\n\nI shake my head. \"I just wanted to visit. I know it's been a while since we've really just relaxed, you know?\"\n\nHe nods. \"Sounds fine to me. Some of the boys are here too.\" Adam gestures toward the front door. \"Come in. Introduce yourself.\"\n\n*page_break\n\n*set adamMetTheBoys true\n\nAdam always has a rotating cast of 'boys'. They come and go.  Some are old hunters who only visit occasionally before\nreturning to their own roosts, others are hunters-in-training. Inevitably they either give up when the training turns\nout to be more boring than expected, or when they realize the work is terrifying.\n\nHowever, a few sometimes manage to become full-fledged hunters. They usually leave to find work elsewhere. Turns out there's not actually\nthat many hostile creatures near a large city.\n\nAdam introduces me to two men and a woman; George, Edward, and Nicki.\n\nSometimes the 'boys' include girls. Adam still calls them the 'boys'. The girls reaction to this is usually mixed.\n\n\"Er... hi.\" I do my best to put on a polite smile.\n\nThey give me some variation of 'hello'. These introductions are always awkward. I never really know what to say.\n\n\"You have good timing,\" Adam says. \"I was about to take a trip down to the creek. I've got some extra fishing\ngear, you should join us.\"\n\n\"Fishing huh?\" Well, I'm not about to ask Adam to change his plans for the day. \"Sure. Sounds... fun?\" Fishing is fun right?\n\n*page_break\n\nFishing is not fun.\n\nI stare my fishing line down.\n\n\"Still haven't caught anything?\" One of the men, Edward, asks. He took a seat beside\nme on the boat. He's got a short afro, and I've noticed a few scars running from his neck to, I presume, his torso.\n\n\"No,\" I say curtly. It's been over an hour.\n\nHis scars look deep, but his clothing prevents me from getting a good look. I could ask him about them, but...\nNo, I'm not asking a dude I just met about his mysterious scars.\n\n\"Don't worry, kiddo!\" Adam calls from the other side of the boat. \"They'll be biting for you in no time.\"\n\nI glance at Adam's rather sizable collection of fish. He's somehow already caught five.\n\nAdam draws an arrow back, and lets it loose. I can't see if it hit anything, but judging by George and Nickie's applause,\nI'm assuming he did.\n\n\"Cheater.\"\n\nEdward elbows me. \"Don't let him hear you say that,\" he says with a smirk. \"He'll make you try it.\"\n\n\"Yeah?\" I ask glumly.\n\n\"I should know,\" he says. \"'cause that's what he made ME do.\"\n\nOh.\n\n\"How'd that go?\"\n\nHe shakes his head. \"Not great. The water around here's pretty clear, but I'm not exactly a master archer...\nand the refraction makes aiming pretty much impossible. The fish are never quite where they seem to be.\"\n\n*if (sklArchery = true)\n\t\n\tI wonder if I could pull it off.\n\t\n\t*choice\n\t\t#Ask to try bow fishing.\n\t\t\t*set archeryTraining + 10\n\t\t\t\n\t\t\tI set my pole to the side, and approach Adam. \"You mind if I give it a shot?\"\n\t\t\t\n\t\t\tHe looks surprised for a moment, before beaming. \"Sure!\"\n\t\t\t\n\t\t\tHe hands the bow over the me. It's got a rather odd design. A reel is set up inside the bow itself,\n\t\t\tmaking it some kind of strange cross between a fishing pole and a bow.\n\t\t\t\n\t\t\tThe arrow itself however, does not contain a lure. Instead the arrow tips has a rather gruesome looking\n\t\t\tdesign. The tip ends in three points, like a tiny pitchfork, and the points themselves have tiny barbs\n\t\t\tjutting out.\n\t\t\t\n\t\t\t*if (sklArcheryLvl = 1)\n\t\t\t\t\n\t\t\t\tThe weight of the bow feels strange in my hands. I'm not sure how it'll effect my aim.\n\t\t\t\t\n\t\t\t\tI glance into the water.\n\t\t\t\t\n\t\t\t\tIt's clear enough to just barely see a few fish swimming near the surface. Some of them are even\n\t\t\t\tclose to the boat.\n\t\t\t\t\n\t\t\t\tI draw an arrow back. It shouldn't be too hard to hit one of the bigger ones. I think.\n\t\t\t\t\n\t\t\t\tI release the arrow.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tIt flies straight toward the fish.\n\t\t\t\t\n\t\t\t\tThe water splashes as the arrow dives downward. I see a few fish scatter away.\n\t\t\t\t\n\t\t\t\t\"I didn't hit anything...\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tI take several more shots, but can't seem to hit anything. The fish are never where they seem to be, and I\n\t\t\t\tcan't seem to adapt my aim properly.\n\t\t\t\t\n\t\t\t\tI sigh. \"I give up.\"\n\t\t\t\t\n\t\t\t\tAdam retrieves his arrow. \"Don't worry about it. You did your best, and you're still new with a bow. Give it time,\n\t\t\t\tyou'll get there.\"\n\t\t\t\t\n\t\t\t\tI try not to roll my eyes. \"Sure.\"\n\t\t\t\t\n\t\t\t\t*goto lbl_AfterFishing\n\t\t\t*else\n\t\t\t\t\n\t\t\t\tThe bow's weight feels strange in my hands, but I'm more worried about the water.\n\t\t\t\t\n\t\t\t\tI'm not going to have an easy time judging where to hit my target.\n\t\t\t\t\n\t\t\t\tThe water's clear enough that I can see a few fish swimming about. A couple are even close to the boat.\n\t\t\t\tI just hope them being closer makes the shot easier.\n\t\t\t\t\n\t\t\t\tI draw an arrow back and take aim.\n\t\t\t\t\n\t\t\t\tA large one is close to the ship. It looks like it's close to the surface too. This is probably the best chance I'll get.\n\t\t\t\t\n\t\t\t\tI release the arrow.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAnd I miss. I'm not sure by how much.\n\t\t\t\t\n\t\t\t\tThe fish darts away, as do the others, but they linger close by.\n\t\t\t\t\n\t\t\t\tI reel the arrow back and try again.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*set adamFriend + 1\n\t\t\t\t\n\t\t\t\tI spend several minutes taking shot after shot. I can't seem to adapt my aim properly. It's too difficult to tell\n\t\t\t\thow close my arrows even are to hitting them.\n\t\t\t\t\n\t\t\t\tI take a deep breath, and release one final arrow.\n\t\t\t\t\n\t\t\t\tIt takes me a moment to realize anything has happened. Though several fish dart away,\n\t\t\t\tblood drifts away from my arrow.\n\t\t\t\t\n\t\t\t\tThe fish's body twitches before going still. I reel it in. There's no struggle.\n\t\t\t\t\n\t\t\t\tAs I pull it out of the water, I realize one of the arrow's forks pierced its head.\n\t\t\t\t\n\t\t\t\tAdam pats me on the back. A little too hard actually, I nearly lose my footing.\n\t\t\t\t\n\t\t\t\t\"Excellent work!\" he cheers.\n\t\t\t\t\n\t\t\t\tThe others give a light applause.\n\t\t\t\t\n\t\t\t\tI blush under their praise. \"Thanks.\"\n\t\t\t\t\n\t\t\t\t*goto lbl_AfterFishing\n\t\t\t*comment\n\t\t\t\n\t\t\t*goto lbl_AfterFishing\n\t\t#Just keep fishing normally.\n\t\t\t\n\t\t\t*goto lbl_AfterFishing\n\t*comment\n\t\n*else\n\t\n\tI could never do that.\n\t\n\t*goto lbl_AfterFishing\n*comment\n\n*label lbl_AfterFishing\n\n*page_break\n\nIt's quite a while later when we start packing everything up.\n\n\"I always love taking a day off for something like this,\" Adam says. \"And now comes the best part... grilling them up!\"\n\nAs Adam steers the boat toward the dock, Edward glances at me. \"You sticking around? It's getting pretty late.\"\n\nI look toward the sun. It's not going to set for a little while. But, it's a long ride home.\n\nI shake my head. \"I want to make sure I get home before sundown. The city is... you know.\"\n\nHe nods. \"Yeah. I'll see you around.\"\n\nI approach Adam at the helm. \"I'll have to catch up with you guys. Once we land, I'll need to head home.\"\n\nAdam frowns. \"Oh...\"\n\nI shrug. \"I don't want to worry Raven, and you know how things are right now.\"\n\n\"Yeah,\" Adam nods. \"Hopefully things will stabilize soon. Windbrooke just hasn't been the same.\"\n\nProvided things go well with Joan, it'll be back to normal sooner than anyone realizes.\n\n*page_break\n\nI find myself waiting at the bus stop once again. It'll be a while before mine shows up. I should\nlet Raven know I'm heading back.\n\n'Just left Adam's place. I'm headed back as soon as my bus shows up.' -You-\n\nI take a deep breath. It's very quiet out here. It's nice.\n\n*page_break\n\nTen minutes pass and I realize Raven hasn't responded. She usually calls shortly after I message\nher.\n\nI don't know what's up with her aversion to texting. I'm not sure I've ever received a message from\nher, though I know she reads mine.\n\nMaybe she just likes talking on the phone. I can't imagine why.\n\nI bring her number up and call it. Did she miss my message?\n\n*page_break\n\n.\n\n*page_break\n\n..\n\n*page_break\n\n...\n\n*page_break\n\n\"This is Raven Lilia's phone. I can't pick up right now, so please leave a message.\" I don't bother to.\n\nI end the call and stare at my phone. \"Hm.\"\n\n*goto_scene 008_DivingIn\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "008_divingin": "\n\n\n\n\n\n\n\n\n*if (fRavensWorld = true)\n\t\n\tI'm lying in bed back at Raven's.\n\t\n\t*if (fSecretTransformation = false)\n\t\t\n\t\t*if (fVampireSeed = true)\n\t\t\t*set f_008_NightPlans true\n\t\t\t\n\t\t\tThe envelope Gestalt gave me is lying on a nearby desk.\n\t\t\t\n\t\t\tI'm wearing the necklace right now. I like it, the dark gem is beautiful.\n\t\t\t\n\t\t\tBut I'm thinking of not going. I still don't know how I feel about any of this.\n\t\t\tIn the back of my mind, I guess I knew. I was going to turn, I was going to become\n\t\t\ta vampire.\n\t\t\t\n\t\t\tBut, I don't think it had really hit me yet. It still hasn't, in a way.\n\t\t\t\n\t\t\tBut it will once I meet them. Vampires, a whole group of them.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tI didn't choose to turn. Do they know that?\n\t\t\t\n\t\t\tWill they ask about that?\n\t\t\t\n\t\t\tWould they think it was strange? That I didn't belong?\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tAnd I don't like that Gestalt arranged this whole thing without talking to me. I had literally\n\t\t\tnever even met the guy, and he set this up.\n\t\t\t\n\t\t\tAnd it's not like he knew I was going to stumble upon Raven's secret either. So he was just going\n\t\t\tto have Raven, or somebody, just deliver this to me and tell me where to go.\n\t\t\t\n\t\t\tIt's weird.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tI sigh.\n\t\t\t\n\t\t\tI don't have a real reason to refuse though.\n\t\t\t\n\t\t\tWell, other than to just be belligerent. Which isn't a good reason.\n\t\t\t\n\t\t\tI grab the envelope, and stick in my bag. Tomorrow, I'll dive in, and\n\t\t\tclear the haze in the morning. And at night, I'll go meet these people.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t*goto lbl_TheMorning\n\t\t*comment\n\t\t\n\t\t*if (fWerewolfSeed = true)\n\t\t\t*set f_008_NightPlans true\n\t\t\t\n\t\t\tI fiddle with the moon-necklace Gestalt gave me.\n\t\t\t\n\t\t\tI actually like the design a lot. But, the entire situation makes me feel uneasy.\n\t\t\t\n\t\t\tThat's becoming a running theme when it comes to me and Professor Gestalt.\n\t\t\t\n\t\t\tHe seems like a nice guy.\n\t\t\t\n\t\t\tHell, he was so nice he set up a meeting between myself and a group of werewolves. That\n\t\t\tshould help me get settled in before I even go through the changes.\n\t\t\t\n\t\t\tHow nice of him.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tIt would have been even nicer if he had talked to me about this first. Or anyone talked to\n\t\t\tme about if for that matter.\n\t\t\t\n\t\t\tBut, no. He handed me an address on a freaking post-it note, and basically just said, 'Get going!\n\t\t\tBest of luck!'\n\t\t\t\n\t\t\tI don't know the people I'm about to meet. I don't even know if I care about meeting other werewolves.\n\t\t\t\n\t\t\tI sit up in bed. The note is stuck to the wall.\n\t\t\t\n\t\t\tI don't have any reason not to take him up on his offer. And plenty of reason to accept it.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tI sigh. Tomorrow morning, I'll help Joan clear the haze.\n\t\t\t\n\t\t\tAnd later that night, I'll meet these people.\n\t\t\t\n\t\t\t*goto lbl_TheMorning\n\t\t*comment\n\t\t\n\t*comment\n\t\n\tI don't even know what to make of today. And it certainly didn't help that Raven is stubbornly refusing to talk\n\tabout [i]anything[/i].\n\t\n\tAnd there's just so many questions to ask.\n\t\n\t*page_break like...\n\t\n\tWhat's with the island city beyond your workshop wall?\n\t\n\tWhy is there a restaurant named after you?\n\t\n\tWho's Professor Gestalt?\n\t\n\tWhat's your relationship with him?\n\t\n\tWhy are you such a big shot in that pocket dimension?\n\t\n\tCan I visit again? (she didn't take the coin back. could be a soft yes?)\n\t\n\tWho's Yvonne?\n\t\n\tAre you two dating?\n\t\n\t*page_break\n\t\n\tThe entire situation makes my head spin. And she's not even here to talk about it.\n\t\n\tI sit up. Maybe I'm focusing on the wrong thing here.\n\t\n\tA lot happened, but none of it matters right now.\n\t\n\tThat haze is still here, choking Windbrooke. And Joan and I are going to stop it.\n\tWe've got an entire day to do it.\n\t\n\tI'll talk to Raven later.\n\t\n\tAnd if she stone walls me on this... Yvonne.\n\t\n\tYvonne seems talkative.\n\t\n\t*goto lbl_TheMorning\n*comment\n\n\nWhen I arrive at Raven's, It's eerily quiet. The lights are off, on both floors, despite it nearly\nbeing dark out.\n\n*if (fSecretTransformation = true)\n\t\n\tWhen I flick the lights on, I notice a note sitting on the counter.\n\t\n\t'Sorry, $!{fiName} something came up, and I had to go. Take care of the store while I'm gone, okay?'\n\t\n\t*page_break\n\t\n\tI lock the doors, before heading upstairs. I think I'll turn in early tonight.\n\t\n\tI've got a lot going on tomorrow.\n\t\n\t*page_break\n\t\n\t*goto lbl_TheMorning\n*comment\n\n*if (fHumanSeed = true)\n\t\n\tWhen I flick the lights on, I notice a note sitting on the counter\n\t\n\t'Sorry, $!{fiName} something came up, and I had to go. Take care of the store while I'm gone, okay?'\n\t\n\t*page_break\n\t\n\tI lock the doors, before heading upstairs. I think I'll turn in early tonight.\n\t\n\tI've got a lot going on tomorrow.\n\t\n\t*page_break\n\t\n\t*goto lbl_TheMorning\n*comment\n\nWhen I flick the lights on, I notice a package sitting on the counter. Two different notes are stuck\nunderneath it.\n\nMy name is written on both.\n\n*page_break\n\nI slip the notes out from under the package. One reads,\n'Sorry, $!{fiName} something came up, and I had to go. Take care of the store while I'm gone, okay?'\n\nI fold the note, and set it aside.\n\nI read the next. 'Hey, sorry. I actually got back home before you $!{fiName}. The package is for you. Keep what's\nin it, and go to the address tomorrow night. Thanks.'\n\n'P.S. I might not be back by tonight, so make sure to lock up before you go to bed.'\n\n*if (fVampireSeed = true)\n\t'P.P.S. You're meeting other vampires at that address. They'll help you with your upcoming changes. Sorry if that wasn't clear.'\n*if (fWerewolfSeed = true)\n\t'P.P.S. You're meeting other werewolves at that address. They'll help you with your upcoming changes. Sorry if that wasn't clear.'\n*comment\n\nI stare at the box. \"...Why didn't she just toss the first note?\"\n\n*page_break\n\n*if (fVampireSeed = true)\n\t*set f_008_NightPlans true\n\t\n\tThe package contains a thick envelope. There's a suspicious bulge in it. I open it, and dump out\n\tthe contents.\n\t\n\tThe bulge turns out to be a necklace. It's a silver chain, holding a dark red crystal.\n\t\n\tThe envelope also held a map and a few documents. The documents are about me.\n\t\n\tIn fact... they're creepily invasive.\n\t\n\tMy medical history, basic details like blood type, height, etc. Details about how and when I\n\twas bitten. Whether or not I've turned (I haven't). How much longer it's likely to be\n\tif I hadn't turned.\n\t\n\tAll it says is 'unknown'.\n\t\n\tI take out my phone, and try to call Raven.\n\t\n\t*page_break\n\t\n\t\"This is Raven Lilia's phone. I can't pick up right now, so please leave a message.\"\n\t\n\t*page_break\n\t\n\tI hang up. I'll just have to ask what this is about later.\n\t\n\tI make sure everything is locked up, before heading upstairs. I'm going to turn in early.\n\t\n\tI'll be tackling the haze with Joan tomorrow. I can worry about whatever this envelope is afterword.\n\t\n\t*page_break\n\t\n\t*goto lbl_TheMorning\n*comment\n\n*if (fWerewolfSeed = true)\n\t*set f_008_NightPlans true\n\t\n\tThe package contains... a tiny box.\n\t\n\tI open it, and find a small necklace. It's a chain with a crescent moon hanging from the end.\n\t\n\tA tiny note is stuck to the bottom of the box. An address is posted there.\n\t\n\tThere are no other instructions.\n\t\n\tI take out my phone, and call Raven.\n\t\n\t*page_break\n\t\n\t\"This is Raven Lilia's phone. I can't pick up right now, so please leave a message.\"\n\t\n\t*page_break\n\t\n\tI hang up. I'll have to ask Raven what this is all about later.\n\t\n\tI make sure everything is locked up, and head upstairs. I'm going to turn in early.\n\t\n\tI'll be tackling the haze with Joan tomorrow. I can worry about whatever this necklace is about afterword.\n\t\n\t*page_break\n\t\n\t*goto lbl_TheMorning\n*comment\n\n\n*page_break\n\n*label lbl_TheMorning\n\nThere's no school today. I get up early anyway.\n\n*if (fVampireSeed = true)\n\t\n\tMy body aches at first. My exhaustion slips away as I finish my morning routine.\n\t\n*comment\n\n*if (fWerewolfSeed = true)\n\t\n\tI feel energized. There's not an ounce of exhaustion in me.\n\tI finish my morning routine with an extra spring in my step.\n\t\n*comment\n\n*if (fHumanSeed = true)\n\t\n\tExcitement bubbles in my chest as I finish my morning routine.\n\tI'm ready for this.\n\t\n*comment\n\n*page_break\n\nRaven's not here. I'm not sure she even came home.\n*if (fRavensWorld = false)\n\tI'll have to ask her what she's been up to later.\n*comment\n\nI storm out of the shop. I've trained. Both with magic and with weapons.\nI even gave a day to myself.\n\n*if (fRavensWorld = true)\n\t\n\tThough if I was just looking to relax, I literally could not have found a worse way to spend my day.\n\t\n\tDoesn't matter...\n\t\n*comment\n\nI'm ready.\n\n*page_break\n\nFor once, I'm the one sending a message to Joan for us to meet up.\n\n'Do you want to meet at that rundown warehouse first?' -You-\n\n'Warehouse? Not sure I follow?' -Joan Catalan-\n\n'The place we first met up at.' -You-\n\n'Hm... I don't remember a \"rundown\" \"Warehouse\". I do remember us meeting at HQ.' -Joan Catalan-\n\n'I am going to hurt you.' -You-\n\n':P' -Joan-\n\n*page_break\n\nWhen I arrive at the warehouse, Joan is setting up.\n\nAt some point she brought a couple of chairs too apparently. The place is still eerily empty. There's\njust too much unused space.\n\nJoan eyes me curiously. \"Did you get any extra training in?\"\n\n*if (style = \"warrior\")\n\t\n\t\"I did.\" I have no idea if that training did anything of course. But, yeah. I did.\n\t\n\tJoan looks at me expectantly.\n\t\n\t*if (sklFencingFirst = true)\n\t\t\n\t\t\"I... might be able to create a sword now.\" I hope.\n\t\t\n\t*if (sklArcheryFirst = true)\n\t\t\n\t\t\"I... might be able to make a bow now.\" I hope.\n\t\t\n\t*comment\n\t\n*if (style = \"spellsword\") or (style = \"spellbow\")\n\t\n\t\"Sort of.\" I still have that weird ball with me. No clue if it'll be useful. \"I think I can\n\tuse a little bit of magic now.\" Maybe.\n\n*comment\n\n\"coooooool,\" Joan responds.\n\nI chuckle. \"Are we heading out?\"\n\nJoan points to the white board. \"We've still got to have a debriefing!\"\n\nThe white board has a very crudely drawn image of Skylong Mall. There's nothing else drawn or written.\n\n\"Isn't a debriefing done after a mission's over?\" I ask. \"And what's there to discuss? Haze is coming\nfrom the mall's otherworld. We need to smash it. Briefing over.\"\n\nJoan pouts. \"Well... I was going to say all of that. But, you know. Cooler.\"\n\n*page_break\n\nWe drive back down the mall, and waste no time finding that same closet. It worked fine last time, so I guess it'll\nwork fine this time.\n\nWe sit down, and go through the process.\n\nDeep breath in.\n\nDeep breath out.\n\nJust feel that haze.\n\n*page_break\n\n*goto_scene 009_SkylongMall\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "009_skylongmall": "\n\n\n\n\n\n\n\n\n\n\n\n\n\nJoan is armored up and already fighting. The mall and that haze stretch down a wide corridor before us.\nA bulk of creatures are fighting Joan.\n\nThe place looks as it did before. Twisted geometries. Floor after floor of shops ascend above us toward a single\npoint of light. The haze is noticeably thicker.\n\nThere's a single creature standing a short ways ahead of myself. Just like my last visit, it resembles an adult. And\nis wearing regular clothing. However, it's twisted body reveal it as being anything but human.\n\n\n*if (style = \"warrior\")\n\t\n\tI materialize a shining bow and my hands and fire a single arrow off. It plugs itself firmly\n\tinto that thing's skull.\n\t\n\tIt stumbles back, but doesn't fall.\n\t\n\tThese things seem tougher than before...\n\t\n\tThe bow disappears from my hands, and I rush forward generating a sword as I'm moving into a stabbing\n\tmotion. The blade appears just in time to skewer its skull.\n\t\n\tThat thankfully [i]is[/i] enough to finish it off.\n\t\n*if (style = \"spellsword\")\n\t\n\tSomething is different. The other world is different.\n\t\n\tNo...\n\t\n\tI can see it differently. I can [i]feel[/i] it differently.\n\t\n\tThere's a strange power in the air.\n\t\n\tIt lunges forward. I raise my arms up. An otherworldly air flows around\n\tmy limbs. A sheet of light appears in front of me.\n\t\n\tIts surface is messy and uneven. I can barely see through it because the inside it filled with\n\tmisshapen blobs of varying density and color.\n\t\n\tIt slams against the floating shield. Cracks form through it, and a few moments later\n\tthe barrier falls to pieces.\n\t\n\tI don't waste any time materializing a sword and lunging forward. My blade pierces its skull easily.\n\t\n\tIt crumbles to the ground.\n\t\n*if (style = \"spellbow\")\n\t\n\tSomething is different. The other world is different.\n\t\n\tNo...\n\t\n\tI can see it differently. I can [i]feel[/i] it differently.\n\t\n\tThere's a strange power in the air.\n\t\n\tIt lunges forward. I raise my arms up. An otherworldly air flows around\n\tmy limbs. My arms block its blow.\n\t\n\tI can feel an incredible weight behind its attack, but... It's nothing. My arms\n\thave an odd strength inside them right now.\n\t\n\tI shove the creature back, and its sent rolling across the ground. It tries to regain\n\tits footing as I walk up to it.\n\t\n\tI let that power flow back inside one of my arms, before cracking it across the jaw. The force\n\tof my strike is tremendous as the creature crumbles back to the floor.\n\t\n\tIt's still squirming.\n\t\n\tI generate my bow and fire a single arrow into its skull.\n\t\n*comment\n\n\n*comment -------------------------------------------------------------------------------------\n\nI breathe out a sigh of relief. I think I can pull this off.\n\nJoan stands nearby. She's surrounded by corpses.\n\nShe's having a much easier time than me...\n\n\"Excellent work my companion!\" Joan shoots me a thumbs up. \"Shall we set forth?\"\n\nI try not to laugh at her. \"Sure.\"\n\n*page_break\n\nAs we are walking, I realize something seems different this time around. Everything is still as twisted\nand strange as before, but now there's a certain malevolence to it.\n\nThe light isn't as bright. The closed up shops littering the alternate mall are locked up with chains now.\nEven the bent walls seem to have a malevolent angle to them. They're curving, almost trying to wrap over us oppressively.\n\nEverything has an unfriendly edge to it.\n\n\"Are you-\" Joan's voice hitches. \"Holding... steadfast?\"\n\n*choice\n\t#\"I'm fine.\"\n\t\t\n\t\t\"Wonderful. Shall we carry on?\"\n\t\t\n\t\t*goto lbl_HowDo\n\t#\"That one seemed a bit forced.\"\n\t\t\n\t\tJoan doesn't say anything for a moment.\n\t\t\n\t\tI give her a curious look.\n\t\t\n\t\t\"Shut up.\"\n\t\t\n\t\t*goto lbl_HowDo\n*label lbl_HowDo\n\nI smirk. \"Alright.\"\n\n*page_break\n\nA minute or so later, and we find ourselves in front of a store. Unlike the others, this one is actually open.\nThe path we've been following ends here, so I imagine it's important.\n\nThe store carries a lot of random things. I spot jewelery, a music box, chessboards, and paintings. There's\neven some random furniture for sale. Things like small desks and couches. There's a display case next\nto the cash register filled with nothing but coins.\n\nIt all looks very old.\n\n\"Is this some sort of antique store?\" I eye a door behind the cash register. There's an area behind the store front.\n\nJoan lets out a hum. \"It was on the second floor.\"\n\n\"What?\" I give her my full attention. \"This is actually in the mall?\"\n\nShe shakes her head. \"It [i]was[/i] actually in the mall. The store shut down a week ago when the owner died.\"\n\nOh. \"What happened?\"\n\n\"I don't know,\" she says. \"But, knowing this place, we'll find out soon enough.\"\n\nI'm about to ask what she means about that, before another question pops up in my mind. \"Why aren't you doing the knight voice?\"\n\n\"It gets tiring.\"\n\nI tilt my head. \"Then, why do it at all?\"\n\nJoan stares at me for a moment, before she starts looking around the store. \"We can cross that bridge when we come to it. For now,\nlet's just look around.\"\n\n\"Okay...\"\n\n*page_break\n\nThere's nothing particularly out of the ordinary about the shop. In fact, I'd go so far as to say there's [i]suspiciously[/i] nothing\nout of the ordinary about the place.\n\nThe otherworld is twisted and strange. Everything looks so odd and is built at strange angles.\n\nThis store, however... is completely normal. Nothing is out of the ordinary at all. It's as if someone sliced a chunk of our world\naway, and placed it into this one.\n\nJoan's oddly aloof. She's looking around, but not at anything in particular. It's like she's waiting for something.\n\n*page_break\n\nI flinch as a man walks past me. He rushes behind the counter, and pulls out the register's drawer.\n\nThe guy is quite old, and has a bald spot. He's a bit on the chubby side.\n\nHe looks nervous.\n\nI glance at Joan. She's just standing there, watching him.\n\nI look at him. \"Uh... sir?\"\n\nHe doesn't respond. He just grabs the money, and heads into the back, slamming the door shut behind him.\n\nJoan and I share a glance before we follow him.\n\n*page_break\n\nI pull the door open, and freeze in place.\n\nRain is pouring down in front of me. The door leads outside. Someone's house is dead ahead of us.\n\nI glance down at my feet. The doorway abruptly exits into a sidewalk. Water is leaking through.\n\nJoan nudges me forward. \"Let's take a closer look.\"\n\nI stare at her for a moment, before hesitantly stepping through.\n\n*page_break\n\nIt's night and raining. The house in front of us is dark. It's an old building, worn down by time but not in\ntotal disrepair. A cracked driveway stretches up to a carport. The lawn is overgrown.\n\nThere's solid wall surrounding us. The house's surroundings stop abruptly at it. Not unlike the shop,\nit's like someone sliced a chunk of our world and just threw it in here.\n\nOut of nowhere, a car suddenly passes us. It's tires squeal as it comes to a sudden stop. The same old\nman from before sprints out of the car and rushes to his front door.\n\nHe's hyperventilating as he struggles to put his keys in the lock.\n\nMultiple figures pass me. They're all wearing matching white coats. Their hoods are up. Red bandannas cover the bottom half of their\nfaces, and red arm bands adorn their left arms. Imagery on the cloths depict a set of jagged, monstrous teeth.\n\nThe old man gets the door open, slips through, and slams it shut behind him.\n\nThe strangers, four of them, step up to the door.\n\n\"What is this?\" I whisper.\n\n\"I believe we're seeing something that happened.\"\n\n\"Happened when?\" I ask.\n\n\"I don't know,\" Joan says.\n\nOne of them knocks on the door. \"Mr. Barrow. Open up.\" He knocks louder. \"There's no point calling the police. Your phone\nis useless now.\"\n\nOne of them breaks off from the group, and circles around to the back of the house.\n\nThe other two are noticeably hanging back. They chat.\n\nOne of them is a women. \"I don't like this...\"\n\nThe other, a man, is noticeably inhuman. \"It's fine. It'll only take a second.\" Even through his disguise I can make out scaly skin,\nand strange red eyes.\n\n\"Why are we even bothering picking off individual people like this?\" she asks.\n\nThe man shoots her a cutting glare. \"Because he's a complete bastard! He deserves it!\"\n\nShe flinches back. \"Keep your voice down... And I get that, but why do it one at a time? We've got the weapons. We've got the people.\nWhat are we waiting for? We could raze this city to the ground tonight if we wanted.\"\n\n\"We're waiting because that's what the boss said we're doing,\" he responds. \"I trust her. So should you. It won't kill us to wait a few\nweeks.\"\n\nShe sighs. \"Three weeks?\"\n\n\"That's what I heard,\" he says. \"Just three weeks... and the people of this city are gonna fucking bleed.\"\n\nShe hesitates, before turning to the house. \"Good.\"\n\n*page_break\n\nJoan and I stare at each other.\n\n\"Wait... this already happened?\" I ask.\n\nJoan nods.\n\n\"But they're saying-\"\n\nThere's a crash and a scream from inside the house. Joan and I freeze in place.\n\nA few minutes later, and the door is opened from the inside by the person who went around the side.\n\n\"He's in the back,\" he says. \"The bastards actually crying. What a bitch.\"\n\nThe strangers go inside. Joan and I follow closely behind them.\n\n*page_break\n\nWe're standing inside a very large building. It's definitely not that old man's house.\n\nThe building is one large open space. I think it might be a warehouse, though unlike our own,\nthis one is filled with beds, tables, and shelves. Maps and charts hang from the walls.\n\nIn the center of the room, that old man is tied to a chair. He's covered in blood. His face is pulped,\nbut he's alive and conscious.\n\nHe's openly weeping.\n\nDozens of people watch him. Some up close, others from the far corners of the building. They're all wearing white clothing.\nAlways with coats. Always with red cloth covering the bottom halves of their faces, and single red bands on their left arms.\n\nThere's a woman standing in front of him. She removes her hood and her red bandanna.\n\nThere's a noticeable burn scar on one of her eyes. Remarkably, the eye itself looks fine. She's middle aged,\nwith only a few touches of wrinkles on her face.\n\nShe waits. Looking over her people, before finally, slowly, turning to look at the old man.\n\nThe words come out dripping with contempt. \"Mr. Barrow.\"\n\nHe takes a gasping breath in, but otherwise doesn't speak.\n\nShe reaches into her pocket and withdraws a photo. She carefully, almost delicately, holds it up in front of him. \"Do you know\nwho this is?\"\n\n*page_break I remember we're essentially phantoms...\n\nI quickly rush up to her while the old man, Mr. Barrow, struggles to speak.\n\nI wince away from the photo the moment I see it.\n\nThe subject is a young girl. About twelve or so at the oldest. Her ears have a noticeable point to them, but she\notherwise looks human. Her hair is long and green. I have no clue what she is.\n\nShe's alive in the picture, but she's covered in blood. Her right arm is gone. There's blood still dripping from it\nin the photo. Multiple jagged cuts cover her face, to the point that I can barely make out her expression.\n\nSomething about the background looks familiar. It's just a street, and not one I actually recognize, but it does feel familiar.\n\nNight time. Buildings are burning. Cars are smashed and overturned. Figures are fighting and rioting in the background.\n\nWas this from that same night?\n\n*page_break\n\n\"I see you're having some trouble...\" A fist passes through my body. It collides with Mr. Barrow's jaw. There's an\nunsettling 'crack'.\n\nI move out of the way as that woman starts walking around him.\n\n\"You see... it's very strange that you don't remember her,\" she says. \"Because this was taken from your camera. I find\nthat rather strange Mr. Barrow. Do you normally photograph dying people?\"\n\nHe spits out some blood. I can tell he's trying to talk, but can't.\n\n\"Or perhaps,\" she continues to circle around him. \"Perhaps you wanted a memento? Something to remember the time you\nnearly killed someone? Nearly.\" She smirks. \"You see Mr. Barrow... she pulled through. And she remembered you. You\nprobably shouldn't have told her your name, yes?\"\n\nThere's a round of light laughter from the rest of her people.\n\n\"But of course you did,\" she says. \"And then we found you.\" She stands in front of him again. Slowly, she bends down to\nget a close look at him. \"I have just one question for you, Mr. Barrow. Do you think that you deserve this?\"\n\nI can see desperation in his eyes. And something else...\n\nHope. Just a flicker of it.\n\n*page_break He actually nods.\n\nI stare in disbelief as Mr. Barrow nods his head. He lets out some guttural sound that seems like he's giving an\naffirmation.\n\nThe woman backs away from him. \"Hmm...\" She closes her eyes as a thoughtful expression passes over her. \"Mr. Barrow.\"\n\nEveryone in the room freezes. They all stare, stiff and moving.\n\nShe smirks. \"Did you think feigning guilt would save you?\" She stretches her arm towards him, her palm open. \"Because...\nIt won't.\"\n\nI see it all at once. His eyes widen in fear as a ball of flame coalesces above her palm. She gently nudges it into\nthe air. It bounces off her palm, and floats upward in a nice sooth arc.\n\nIt lands on Mr. Barrow, and engulfs him in fire.\n\n*page_break\n\nHe just lets out this [i]noise[/i].\n\nSome sort of choking awful scream.\n\nEveryone cheers.\n\n*page_break\n\n\"Twenty days, boys and girls!\" She cheers as Mr. Barrow grows silent. His body still burning. \"Twenty days until Halloween.\nTwenty days until we decide to crash those humans festivities with a little... fun of our own making.\"\n\nThe lights flicker. Everything in the room stops moving. Even the fire around Mr. Barrow.\n\nEverything starts melting. The furniture, the walls, the ceiling. It all melts into the floor.\n\nEventually, we find ourselves standing alone in a large white room. There's a new door ahead of us.\n\nI stand frozen. After what feels like an eternity I glance over at Joan.\n\nShe's just staring at where Mr. Barrow was.\n\nJoan collapses to her knees. Her armor breaks apart piece-by-piece until she's just herself.\n\nI take a step toward her. \"Joan-\"\n\nShe puts a hand up, stopping me. \"I need a minute. I'm sure you do too.\"\n\nI hesitate, before nodding and giving her some space.\n\n*page_break\n\nI peek outside the new door. It's the otherworld mall again, twisted and crooked as ever.\nThere's a short hallway that leads into a larger space. Something is pulsing within that space.\n\nI see a familiar spark of red electricity. So we're nearly done.\n\nOne problem down. But, now there's another one taking its place.\n\nThose people are planning some sort of attack on Halloween night. She said twenty days from now, but that... whatever\nthat just was, already happened.\n\nWhat is today?\n\nOctober sixteenth\n\nStarting tomorrow, we've got two weeks until they enact their plan. I'm not even sure what it is, but it's not good.\n\nI peek back at Joan. She's pacing back and forth in the room. It looks like she's thinking about something.\n\nShe still needs a moment. I slip out the door.\n\n*page_break\n\nIt's unsettlingly quiet right now. All I hear are my footsteps as I approach the sphere. The large space comes\ninto focus.\n\nThe entire area is one large circle. The sphere sits perfectly in the center. Dozens of concrete pillars hug\nthe perimeter of the room. I slip behind one as I spy on the pillar.\n\nA familiar pulse starts throbbing against my head. I hear angry chatter...\n\n*page_break\n\nthe haze thickens. I can't see anything.\n\nThere's someone there. The same figure as before?\n\nIt's not any clearer.\n\nThe old man has one of the spheres in front of him. He's hammering away at it with his balled fists. Electricity\nleaps off of it with every blow.\n\n\"I don't care what the risks are... I have to do this... for her...\"\n\nA jolt of electricity leaps off and runs up the man's arm. He's noticeably hurt by it.\n\nI try to take a step forward.\n\n*page_break\n\nRed electricity leaps off of the sphere. It starts off low, but builds up more and more.\n\nI shake the haze off. I can see clearly again. The old man is gone.\n\nElectrical arcs concentrate at the top of the sphere. And slowly, bit-by-bit, something emerges...\n\nA single arm rips free.\n\nThen the other.\n\nSlowly, and cumbersomely, it drags itself out of the sphere.\n\nIt's body is plump. The overall build looks masculine. It's face...\n\n\"What?\" I move closer to get a better look.\n\nIt's face is burned. All of its exposed skin is burned.\n\nIt's face is contorted bizarrely. The bone structure is completely misshapen, with odd bumps and\nbends.\n\nIt keeps pulling itself free of the sphere. I'm immediately hit by a wave of heat.\nIt's so intense I actually have to take a few steps back.\n\nIt falls haphazardly to the ground after escaping the sphere. It plants a firm hand against the floor\nas it tries to get up.\n\nHis hand leaves a burn mark against the floor when it finally gets to his feet.\n\nI stare into those empty eye sockets. I can feel animosity bleeding out of them.\n\nThose burns... its build...\n\n\"Mr. Barrow...\" I whisper.\n\nIt takes a step forward.\n\nI speak louder. \"Mr. Barrow?\"\n\nIt stops. For a moment, I feel the heat dissipate.\n\nAs I stare into those terrible, black eyes I don't feel that hostility.\n\nThe moment of peace doesn't last. Another wave of heat crashes against me as he starts walking\ntoward me.\n\n*if (sklArchery = true)\n\t\n\tI generate my bow and take aim.\n\t\n\t*goto lbl_WeaponDraw\n*else\n\t\n\tI generate my sword and ready myself.\n\t\n\t*goto lbl_WeaponDraw\n*label lbl_WeaponDraw\n\n*page_break\n\nHe's not moving very fast. Will he not rush me?\n\nI'm already sweating from the heat. I should count my blessings. I don't know if I could handle this heat up close.\n\nI should have waited for Joan...\n\nI take a deep breath. I'll just have to handle him until she notices I left.\n\n*if (style = \"warrior\")\n\t\n\tI generate my bow and start immediately backing away. Keeping my distance is going to be important here.\n\t\n\t*page_break\n\t\n\tMercifully his movement are not particularly fast. He's just lumbering toward me.\n\t\n\tI fire a carefully aimed shot toward his chest. The arrow plunges neatly into him, and a steaming\n\tblack ooze comes out.\n\t\n\tIt looks a lot thicker than the ichor I've seen in the other creatures. I can tell its simmering.\n\t\n\tThe pain must have woken him up a bit, since this other Barrow is starting to move a bit\n\tfaster now.\n\t\n\tI quicken my backwards steps as I more rapidly fire a few arrows off.\n\t\n\tOne grazes the shoulder. He's bleeding.\n\t\n\tOne misses entirely.\n\t\n\tThe last one finds his neck. I wince as the flesh twists around the arrow, as a steady stream of burning gunk oozes out.\n\t\n\tHe suddenly lunges forward. I quickly put some distance between us.\n\t\n\t...And my back hits one of the pillars.\n\t\n\t*page_break\n\t\n\tHe's nearly on top of me. I let the bow disappear as I point my arm forward. My sword materializes in my\n\thand, and the blade itself appears inside Barrow's shoulder.\n\t\n\tHe's directly in front of me. The heat coming off of him is unbearable. It hurts to even look at him.\n\tThe skin on my face burns.\n\t\n\tStabbing him in the shoulder made him stop.\n\t\n\tAnd now he's inching forward along the blade. He stretches his arms out toward me. It's too much. I've got to break away.\n\t\n\tI let my sword disappear as I make a desperate bid to roll away from him. Somehow, even with him reaching out toward me,\n\tthat actually works, and I manage to slip away.\n\t\n\tAs I'm running away from him I look back to see him staring at the pillar. Very slowly, he looks over to where I moved\n\tand starts lumbering toward me again.\n\t\n\tI generate my bow. I just have to keep sticking him from a safe distance...\n\t\n*if (style = \"spellsword\")\n\t\n\tI generate my sword, but start backing away. That heat is terrible from here, I have no idea how bad it's\n\tgoing to feel once I get closer.\n\t\n\tI made a barrier before, what else can I do?\n\t\n\tHe's lumbering toward me. Thank god he's so slow.\n\t\n\tCome on... think. Think!\n\t\n\tHow could I attack something from a distance with magic? Dammit!\n\t\n\tI haven't had time to experiment. I don't know what I can do.\n\t\n\tCan I do anything? That's too many options!\n\t\n\t...My back hits one of the pillars.\n\t\n\tBarrows makes an unexpected lunge forward. I stab blindly toward his face.\n\tMy blade pierces his cheek. I hear cracks as the blade slides inward.\n\t\n\tThis heat is unbearable...\n\t\n\tBarrows stops for a moment, before inching forward along the blade. It's sliding\n\tdeeper and deeper into him, but he's getting closer. He reaches his arms out toward\n\tme, and I can the heat brimming off of even just his limbs.\n\t\n\tI need it to be cooler...\n\t\n\tCooler. Cold. Ice.\n\t\n\tYes! That's it!\n\t\n\tI throw my arm forward. I don't really know what I'm doing, but I let that power in the\n\tair run through my arm.\n\t\n\tI single spike of ice flies from my palm, and impales Barrows skull. He stumbles back.\n\tThe shard of ice melts away rapidly, and I quickly move away from the pillar.\n\t\n\tthat was easier to do than I thought.\n\t\n\tSomehow however, Barrows isn't dead. He just starts lumbering toward me again. He's moving\n\ta bit faster now. I suspect the pain woke him up a bit.\n\t\n\tThis is fine though. I just need to keep hurting him from a safe distance...\n\t\n*if (style = \"spellbow\")\n\t\n\tI generate my bow and start immediately backing away. Keeping my distance is going to be important here.\n\t\n\t*page_break\n\t\n\tMercifully his movement are not particularly fast. He's just lumbering toward me.\n\t\n\tI fire a carefully aimed shot toward his chest. The arrow plunges neatly into him, and a steaming\n\tblack ooze comes out.\n\t\n\tIt looks a lot thicker than the ichor I've seen in the other creatures. I can tell its simmering.\n\t\n\tThe pain must have woken him up a bit, since this other Barrow is starting to move a bit\n\tfaster now.\n\t\n\tI quicken my backwards steps as I more rapidly fire a few arrows off.\n\t\n\tOne grazes the shoulder. He's bleeding.\n\t\n\tOne misses entirely.\n\t\n\tThe last one finds his neck. I wince as the flesh twists around the arrow, as a steady stream of burning gunk oozes out.\n\t\n\tHe suddenly lunges forward. I quickly put some distance between us.\n\t\n\t...And my back hits one of the pillars.\n\t\n\t*page_break\n\t\n\tHe's nearly on top of me. I let the bow disappear as I point my arm forward.\n\t\n\tHe's directly in front of me. The heat coming off of him is unbearable. It hurts to even look at him.\n\tThe skin on my face burns.\n\t\n\tI let that tremendous power in the air flow into my arm. It concentrates at my palm. I rush forward, and\n\tdrive the palm of my hand into his face. There's a burst of air as I feel something snap just in front of\n\tmy palm.\n\t\n\tMy hand [i]burns[/i] from the heat coming off of Barrows body, but the man himself is sent sliding back several feet.\n\tHe just stands there limply after taking that blow.\n\t\n\tI slip away from the pillar.\n\t\n\tAs I'm running away from him I look back to see him staring at the pillar. Very slowly, he looks over to where I moved\n\tand starts lumbering toward me again.\n\t\n\tI generate my bow. I just have to keep sticking him from a safe distance...\n\t\n*comment\n\n\n\n*goto lbl_EditSkip\n\n\n*comment ----------------------------------------------------------------------------------------------------------------------------------\n*comment ----------------------------------------------------------------------------------------------------------------------------------\n*comment ----------------------------------------------------------------------------------------------------------------------------------\n*comment ----------------------------------------------------------------------------------------------------------------------------------\n*comment ----------------------------------------------------------------------------------------------------------------------------------\n\n*label lbl_EditSkip\n\nJoan cracks him across the jaw from out of nowhere. The force of her punch is tremendous, and Barrows\nis sent backwards, his feet grinding against the floor as he slides back.\n\nHe somehow retains his footing, but he's completely frozen.\n\nHis body explodes with electricity as his form melts into a black substance.\n\n\"What the hell was that!?\" Joan shouts. \"Why'd you run off on your own?\"\n\nI shrug. \"I was just taking a peek ahead.\"\n\n\"This is a little more than a peek,\" she says.\n\nI smile sheepishly. \"Sorry?\"\n\nJoan sighs. \"It doesn't matter.\" She marches toward the sphere. \"We can finish this thing off.\" She raises\nboth of her fists up, and brings them down together on the sphere.\n\n*label lbl_Meeting\n\n*page_break\n\nThe world shifts suddenly. I lose my sense of place.\n\nIt feels like I'm adrift. Floating higher and higher\n\n*page_break\n\nUntil something yanks me back down.\n\n*page_break\n\nI wake up lying flat on the ground. I'm not back in that closet.\n\nThe haze is gone. My surroundings... don't exist.\n\nThere's a colorful void all around me. Dark greens, and reds, and blues.\n\nI sit up. There's doesn't seem to be anything underneath me, but I feel a solid surface regardless.\n\n\"Hello...\"\n\nI look up to see the silhouette of a woman above me.\n\nShe drifts down until she's right in front of me.\n\nShe looks like a solid shadow. She has long flowing hair, and seems to be wearing a dress.\nHer solid black appearance means I can't make out any other details.\n\nI sit frozen as she reaches out, and runs her fingers down my face. \"Well, look at you...\" There's something in\nher voice I find inherently unsettling. \"I knew that girl would bring a friend eventually... but you've come so\nmuch sooner than I expected...\" It sounds strangely distant. \"And you already know how to fight...\"\n\nI finally make myself take a few steps back. \"What are you?\"\n\n\"Now, now...\" I can [i]feel[/i] her smirk in her tone. \"No need to be scared of me...\"\n\nI look around. Joan's gone.\n\n\"You want to get rid of the haze... And I want to help you...\" She chuckles. \"I've already helped your friend...\"\n\n\"You mean Joan?\" I ask. \"How?\"\n\nShe drifts closer. \"Surely you've noticed... the odd mannerisms... that armor appeared for a reason...\"\n\n\"You gave it to her?\"\n\nShe shakes her head. \"She gave it to herself... I just showed her how...\"\n\nI hesitate. I'm assuming she's offering something similar to me. But, I don't know what she is. Or what she wants.\n\n\"You have no reason to hesitate...\" She circles around me. \"You've seen the difference it makes... Joan's the only\none strong enough to fight the haze... you're weak... you need my help...\"\n\n*choice\n\t#Accept her help.\n\t\t*set f_009_ShadowsHelp true\n\t\t\n\t\t\"Good...\"\n\t\t\n\t\t*goto lbl_NoChoice\n\t#Refuse.\n\t\t*set f_009_ShadowsHelp false\n\t\t\n\t\tBefore any words even leave my mouth she suddenly sidles up to me. \"Now, now... Calm yourself...\"\n\t\t\n\t\tSomething about her presence is paralyzing.\n\t\t\n\t\t\"Just listen to what I have to say... You can do the rest on your own...\"\n\t\t
