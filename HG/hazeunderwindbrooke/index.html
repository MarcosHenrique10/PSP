<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Haze Under Windbrooke — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "hazeunderwindbrooke", "title": "The Haze Under Windbrooke", "scenes": {"001_burningcity": "\n\n\n\n\n\n\n\n\n\nThe city burns.\n\n*page_break\n\nI'm caught in the worst of it.\n\nPeople are rioting. Monsters are rioting.\n\nBarely a week ago we lived in relative peace. Now people are dead in the streets.\n\n*page_break\n\n*label lbl_DifferentInjury\n\nI'm not feeling too great.\n\n*choice\n\t#My side bleeds. I got caught in a violent clash between two mobs.\n\t\t*goto lbl_Stabbed\n\t#Blood trails down my neck. I was ambushed by a duo of vampires.\n\t\t*goto lbl_Turned\n\t#My arm carries a deep bite. A transformed werewolf bit me in a blind rage.\n\t\t*goto lbl_OnceBitten\n*comment Pick your damage. This choice will influence your starting species.\n\n\n\n*comment -------------------------------------------------------------\n\n\n*comment ---\n*label lbl_Stabbed\n\n*set fHumanSeed true\n\nI took a blade to my ribs. I don't know if my attacker was human, or if they were even aiming for me, but either way, I'm bleeding.\n\nSomehow, it doesn't hurt as much as I was expecting.\n\nIt does hurt like hell though.\n\n*page_break\n\nThis feels unreal.\n\nRioting, people murdered in the streets, that doesn't happen around here. And getting stabbed, that sure as hell doesn't happen to me.\n\nThat happens in other cities, to other people.\n\nI wince as I press my palm against the wound. Christ I haven't lost too much blood.\n\nHow much blood can a person lose?\n\nI look at the trail of blood I've left behind me.\n\nHopefully more than that much.\n\n*page_break\n\n*goto lbl_PickYourDamage\n*comment ---\n\n\n\n*comment ---\n*label lbl_Turned\n\n*set fVampireSeed true\n\nI'v heard vampires can 'boost' themselves by drinking blood. They stronger, faster.\nI hope they only wanted to escape the rioting.\n\nIt's embarrassing, but the bite felt... good. Really good.\n\nWhen they left me in the street, one of them said, \"I bet you think you're better than us. Let's see how you like it.\"\n\nHopefully that didn't really mean anything, even if it obviously did.\n\nI'm just glad the bleeding already stopped.\n\n*page_break\n\n*goto lbl_PickYourDamage\n*comment ---\n\n\n\n*comment ---\n*label lbl_OnceBitten\n\n*set fWerewolfSeed true\n\nWhen I was bitten, the wound was just a mangled mesh of flesh and blood. The pain burned greater than\nanything I had ever felt before.\n\nEven amidst all the violence, A few people dragged me to safety. But none of them could help me.\n\nWithin minutes, the bleeding slowed. The pain lessened. I somehow rose to my feet.\n\nI need a doctor, but that's impossible with the city in chaos.\n*page_break\n\n*goto lbl_PickYourDamage\n*comment ---\n\n\n*comment -------------------------------------------------------------\n\n*label lbl_PickYourDamage\n\nI've lived in Windbrooke for years. I used to know this city's many streets like the back of my hand. But now...\n\nCars are overturned. Windows are shattered. Everything is burning. People shout and scream.\n\nThere are so many bodies.\n\nI can't handle this violence. I don't know where I am anymore.\n\nA truck slams on its brakes, screeching to a halt right beside me. The front windshield is shattered, and the frame is\nriddled with bullet-holes. People are huddled in the back, most of them look injured.\n\n*if (fVampireSeed = true)\n\t\n\tA burly man with a thick beard is driving. \"Kid!\" He eyes the side of my neck. \"You're looking hurt. You trying to get\n\tout of this mess?\"\n\t\n\tI absolutely am.\n\t\n\t*goto lbl_FreeRide\n*elseif (fWerewolfSeed = true)\n\t\n\tA burly man with a thick beard is driving. \"Kid!\" He stares at the gaping wound on my arm. \"You're looking really hurt! Climb\n\tin the back with the others, I'm getting us someplace safer!\"\n\t\n\tI nod as a couple of people jump out of the back to help me get in.\n\t\n\t*goto lbl_FreeRide\n*else\n\t\n\tA burly man with a thick beard is driving. \"Kid!\" He looks at the stab wound at my side. \"That looks bad... you should come with us. I'm\n\tgetting us out of this war zone.\"\n\t\n\tI nod as a couple of people jump out of the back to help me get in.\n\t\n\t*goto lbl_FreeRide\n*comment\n\n*label lbl_FreeRide\n\n*page_break\n\n\"What's your name, kid?\"\n\n*label lbl_FirstName\n\nAs I climb into his truck, I respond,\n\n*input_text fiName\n\n\"$!{fiName}.\" Is this right?\n\n*choice\n\t#Yes.\n\t\t*goto lbl_NameChosen\n\t#No.\n\t\t*goto lbl_FirstName\n*comment\n\n*label lbl_NameChosen\n\n*page_break\n\nThe driver has no clue if there are any safe hospitals around. They'd be overcrowded anyway.\n\nHe's willing to drop us off wherever we need to go.\n\nThere's only a couple of places I can think of right now.\n\nThere's my aunt Raven. She and my mom are inseparable. She lives above a shop she owns, where she makes and sells magical objects. I\nthink some of her spells and items could treat me, and she's much closer than my actual home.\n\nI could also go to Adam Rourke. He's a close family friend, He and my dad go way back. He's a professional monster hunter. I know his\nlodge has medical supplies in it. His place is more out of the way, but at least I know I'll be safe there.\n\n*choice\n\t#I'll go to aunt Raven's place.\n\t\t*set fToRaven true\n\t\t*goto_scene 002_AuntRaven\n\t#I'll go to Rourke's lodge.\n\t\t*set fToAdam true\n\t\t*goto_scene 002_AdamRourke\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "002_adamrourke": "\n\n\n\n\n\n\n\n\nThe deafening noise of the city drifts away as we approach my stop. Things are quieter. The violence and destruction\nis far behind us.\n\nI pull out my phone. The screen is shattered, and I can't get it to turn on.\n\nI hope my parents are okay, our home is right in the middle of all that violence.\n\nIt takes a while to reach the hunters' lodge. Adam's place is on the outskirts of town, nestled beside a forested\nregion. They need the space to train safely.\n\n*page_break\n\nI give the driver a quick thanks as I get out of the truck.\n\nI have to walk for a few miles to actually reach the lodge. It's out of the way, and I wasn't willing to ask\nthe driver to take a detour, especially not with the other people that needed to be dropped off too.\n\nSome of them looked far worse off then myself.\n\n*page_break\n\n*if (fVampireSeed = true)\n\t\n\tI feel the side of my neck as I walk. The bite isn't bleeding anymore. In fact, I can't even feel the puncture marks.\n\t\n\t*goto lbl_DamageCheck\n*elseif (fWerewolfSeed = true)\n\t\n\tI glance down at my arm as I walk. The flesh is torn open, but somehow it isn't bleeding.\n\t\n\tUpon closer inspection, I realize the wound actually looks smaller then before.\n\t\n\t*goto lbl_DamageCheck\n*else\n\t\n\tI clutch my side as I walk. It hurts, but I don't feel weak or tired, so I think I'm okay.\n\t\n\t*goto lbl_DamageCheck\n*comment\n\n*label lbl_DamageCheck\n\n*page_break\n\nEventually, the lodge comes into view.\n\nIt sits by itself on a lonely street. Not a single other house or business is near it. Thick tree canopies\nstretch over the road, casting shadows across it.\n\nThe sun sets along the horizon, sending a dim orange light through the nearby foliage. I see a single\nlight on at the lodge. Hopefully that means Adam is home.\n\n*page_break\n\nThe gravel space in front of the lodge is empty. It's normally meant to be used for guests parking. It's odd to\nsee nobody here at all.\n\nEverybody is probably hiding at home, or caught out in the destruction of the city.\n\nWhen I reach the front door, I try to open it. Surprisingly, its locked. I've never seen it locked before in the\nyears that I've visited this place.\n\nI knock on the door.\n\n\"Adam!\" I call. \"It's me, $!{fiName}!\"\n\n*page_break\n\nThe door is thrown open. Adam stands beyond it.\n\nHe is a statuesque man, far taller than most, and staggeringly athletic. Various deep scars adorn his\nbody from head to toe.\n\nHe's a hunter, but not of animals. He hunts monsters. Real monsters anyway. beasts that mindlessly slaughter humans as prey.\nTheir intelligence is rarely greater than any animal.\n\nNot all hunters are like him, and thankfully, those sort aren't allowed at his lodge.\n\n*page_break\n\nHe looks happy to see me for a moment, but then his eyes drift away from my face. \"Kid... what happened?\" He grabs my shoulder, and leads\nme inside.\n\n*comment ----------------------------------------------------------------\n\n*if (fVampireSeed = true)\n\t\n\tHe looks over my neck for a moment. \"Were you bit by a vampire?\"\n\t\n\t\"Uh...\"\n\t\n\t\"Damn.\" Adam scowls. \"I don't have any anti-venom here. And there's no one to call while everything is falling apart out there.\"\n\t\n\t\"Yeah, it was two guys... I'm not sure what happened,\" I say.\n\t\n\tHe nodded. \"It's alright.\" He presses the palm of his hand against the bloodied side of my neck. \"Looks like the wound's already sealed.\n\tThere's nothing I could have done by now anyway.\"\n\t\n\t\"So,\" I start. \"I'm going to...\"\n\t\n\tHe nods. \"You'll turn. Or, rather, you already have. It'll probably be a while before you notice any changes.\" He shakes his head. \"But, let's\n\tnot worry about that right now. What's done is done.\"\n\t\n\t*goto lbl_Treatment\n*comment\n\n*if (fWerewolfSeed = true)\n\t\n\tAdam grabs my arm, carefully examining the wound. \"This looks like a bite.\"\n\t\n\tI nod, uncertain what to add to that.\n\t\n\t\"Was this a wolf?\" he asks.\n\t\n\t\"Yeah, there was fighting... I got caught in the middle of it.\"\n\t\n\t\"Has the wound changed at all?\" he asks. \"Has it gotten better very suddenly?\"\n\t\n\t\"...Kinda?\" I glance down at the bite, a sudden anxiety settling into my stomach.\n\t\n\t\"Damn.\" Adam releases my arm. \"It's pretty rare for a werewolf to turn another unintentionally, but it can happen. If\n\tthey're angry, or... scared enough.\"\n\t\n\tI look at what's left of the wound. \"Is there any way to stop it?\"\n\t\n\tAdam nods. \"Yeah, but not here. And with all that chaos in the city, there's no one I can call on. You'll turn, sooner\n\tor later.\" He puts a hand on my shoulder. \"I'm sorry this happened, I'll help you any way I can, but there's nothing to be done about stopping this.\"\n\t\n\t*goto lbl_Treatment\n*comment\n\n*if (fWerewolfSeed = false) and (fVampireSeed = false)\n\t\n\tAdam guides me to a nearby chair. \"Wait here.\"\n\t\n\tHe disappears into the back for a while, eventually emerging with a first aid kit.\n\tI wince as he rolls up my shirt enough to expose my injury.\n\t\n\t\"Hm.\" Adam examines the wound for a moment. \"Doesn't look that deep. Doesn't look like anything important was hit.\"\n\t\n\tI breath a sigh of relief.\n\t\n\tAdam gets to work sterilizing the wound, before stitching it shut. \"Take it easy for a while, I don't want you tearing that open\n\tagain.\"\n\t\n\t*goto lbl_Treatment\n*comment\n\n*comment ----------------------------------------------------------------\n\n*label lbl_Treatment\n\n*page_break\n\n\"Have you been able to call your parents?\" Adam asks.\n\nI pull out a phone with a shattered screen.\n\nSome expression passes through Adam's face. It disappears quickly. \"I'm sure they're fine.\"\n\n\"You haven't been able to call them yourself?\" I ask.\n\nHe shakes his head. \"I'm sure they just don't have their phones.\"\n\n*page_break\n\nWe settle down in a living-room like space next to the front lobby. During the day, I could usually find people idling their time\naway in here.\n\nRight now, it's just me and Adam.\n\nA newscast is playing on the screen. Reporters are covering the rioting from a safe distance.\n\nThe city is still burning. People are dead. There have been increasingly frequent clashes between humans and monsters lately, but they've never\ncome close to reaching this level of bloodshed.\n\nAt least one thousand dead. Countless injured.\n\nAdam's unsettled enough to turn the television off. I don't complain.\n\n*page_break\n\nThe sun fully sets. We pull a small meal together from his kitchen.\n\nA few bunk beds are set up near the back. I take one at random before settling down for the night.\n\nI try not to think about how Adam hasn't been able to get in touch with my parents.\n\n*goto_scene 003_Aftermath\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "002_auntraven": "\n\n\n\n\n\n\nThe deafening noise of the city drifts away. Things are quieter now. The violence and destruction\nis behind us.\n\nI pull out my phone. The screen is shattered. I can't even get it to turn on.\n\nI hope my parents are okay, our home is right in the middle of all this.\n\nFamiliar streets come into view. My aunt's store is nearby.\n\nI quickly thank the driver as I get out of the truck.\n\n*if (fVampireSeed = true)\n\t\n\tI feel the side of my neck. The bite isn't bleeding. In fact, I can't even feel the puncture marks anymore.\n\t\n\t*goto lbl_DamageCheck\n*elseif (fWerewolfSeed = true)\n\t\n\tI glance down at my arm. The flesh is torn wide open, but somehow it isn't bleeding.\n\t\n\tActually... the wound looks smaller now.\n\t\n\t*goto lbl_DamageCheck\n*else\n\t\n\tI clutch at my ribs. It hurts, but I don't feel weak or tired. I hope I'm okay.\n\t\n\t*goto lbl_DamageCheck\n*comment\n\n*label lbl_DamageCheck\n\n*page_break\n\nI stumble in front of Aunt Raven's shop.\n\nRaven Lilia's Magic Emporium is painted in colorful letters across the store's front window.\n\nI approach the front door, and pull on the handle.\n\n\"Locked...\" I really hope Raven's in there, otherwise I'm in trouble.\n\nI take a few steps back, and look up to the second floor. She lives up there, and I can see her\nbedroom window.\n\n*temp tmp_WerewolfThrow false\n*temp tmp_VampireThrow false\n*temp tmp_Shout false\n\n*temp tmp_Tries 0\n\n*label lbl_AnyoneHome\n\n*if (tmp_Tries = 2)\n\tI don't like how long I've been out here. It's making me nervous.\n\tThe street's empty, but I don't feel safe. I can still hear noises in the distance.\n*comment\n*if (tmp_Tries = 3)\n\t\n\t*page_break\n\t*goto lbl_RavenAppears\n*comment\n\n*choice\n\t*hide_reuse #I'll shout, hoping she hears me.\n\t\t*set tmp_Tries + 1\n\t\t*set tmp_Shout true\n\t\t\n\t\t\"Raven!\" I cup my hands in front of my mouth. \"Raven! It's me! $!{fiName}!\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tNo response.\n\t\t\n\t\t*goto lbl_AnyoneHome\n\t*if (tmp_Shout = true)\n\t\t*hide_reuse #I'll bang on the door while calling Raven.\n\t\t\t*set tmp_Tries + 1\n\t\t\t\n\t\t\tI loudly bang on the front door. The metal gives off a metallic clank with each strike.\n\t\t\t\n\t\t\t\"Raven! It's $!{fiName}!\" I strike the door even harder. \"I need your help!\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tI'm still getting no response.\n\t\t\t\n\t\t\t*goto lbl_AnyoneHome\n\t*hide_reuse #I'll throw a small pebble at the window.\n\t\t*set tmp_Tries + 1\n\t\t\n\t\t*if (fWerewolfSeed = true)\n\t\t\t*set tmp_WerewolfThrow true\n\t\t\t\n\t\t\tA sharp pains bites into my arm. The pebble sails in a poorly aimed arc.\n\t\t\t\n\t\t\tI threw with my bitten arm. I don't know why.\n\t\t\t\n\t\t\tThe pebble doesn't even make it to the second floor.\n\t\t\t\n\t\t\t*goto lbl_AnyoneHome\n\t\t*elseif (fVampireSeed = true)\n\t\t\t*set tmp_VampireThrow true\n\t\t\t\n\t\t\tThe pebble clinks against the glass.\n\t\t\t\n\t\t\tIt didn't actually make that much noise.\n\t\t\t\n\t\t\t*goto lbl_AnyoneHome\n\t\t*else\n\t\t\t\n\t\t\tA spike of pain tears through my side as I throw the pebble.\n\t\t\t\n\t\t\tI fall to my knees, clutching my wound. I have no clue if the pebble even hit the window.\n\t\t\t\n\t\t\tIt doesn't matter, I'm not going to try that again.\n\t\t\t\n\t\t\t*goto lbl_AnyoneHome\n\t*if (tmp_WerewolfThrow = true)\n\t\t*hide_reuse #I'll throw a pebble using my other arm.\n\t\t\t*set tmp_Tries + 1\n\t\t\t\n\t\t\tUsing my uninjured arm, I throw another pebble. Like someone who's not an idiot.\n\t\t\t\n\t\t\tUnfortunately, my dominate arm was the one that was hurt.\n\t\t\t\n\t\t\tThe pebble does reach the second floor, but it misses the window.\n\t\t\t\n\t\t\tMaybe I should try something else...\n\t\t\t\n\t\t\t*goto lbl_AnyoneHome\n\t*if (tmp_VampireThrow = true)\n\t\t*hide_reuse #I'll gather a handful of pebbles, and throw them together.\n\t\t\t*set tmp_Tries + 1\n\t\t\t\n\t\t\tAfter taking a few moments to gather a handful of pebbles, I toss them all in one throw.\n\t\t\t\n\t\t\tThey spread out before collectively clattering against the shop.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tI stare at her window.\n\t\t\t\n\t\t\tAnxiety swells inside my chest. She might not be home at all.\n\t\t\t\n\t\t\t*goto lbl_AnyoneHome\n*comment\n\n\n*label lbl_RavenAppears\n\n\"$!{fiName}?\"\n\nI whip around.\n\nAnd there she is.\n\nRaven is tall. Her gorgeous black hair is tied back in a very long braid. A basket filled with various multicolored bottles\nhangs from her arm. It looks like the stuff she sells in her shop, but they're all empty.\n\nShe quickly rushes up to me. \"What are you doing out here!?\"\n\n\"I was caught out in the middle of-\"\n\n*if (fWerewolfSeed = true)\n\t\n\tRaven grabs my arm. \"Oh my god... Come with me.\" She frantically searches for her keys.\n\t\n\t*goto lbl_TheShop\n*elseif (fVampireSeed = true)\n\t\n\tRaven gently grabs my chin, and makes me tilt my head to the side. \"Your neck... what happened?\"\n\t\n\t\"I... got attacked.\"\n\t\n\tShe immediately starts searching for her keys. \"Come on, quickly. We need to get you inside.\"\n\t\n\t*goto lbl_TheShop\n*else\n\t\n\t\"God...\" Raven stared in horror at my bleeding side. \"Did someone stab you!?\" She digs through her pockets in a frantic\n\trush to find her keys. \"Come with me. I need to look at that immediately.\"\n\t\n\t*goto lbl_TheShop\n*comment\n\n*label lbl_TheShop\n\nA bell above the door jingles as we step inside.\n\nIt's dark, and the sun is setting, but Raven doesn't bother hitting the lights.\n\nI wonder if she's scared of drawing attention to the shop.\n\nShelves are filled with colorful bottles. The bottles all contain strange looking fluids, some bubbly,\nsome thick, others nearly clear. Other shelves are filled with various widgets and things. They all\nhave strange runes drawn on them.\n\nShe also has some candy and chips being sold near the front desk. There's nothing unique about them. They can\nbe bought basically anywhere.\n\n*if (fVampireSeed = true)\n\t\n\tRaven sets her basket on the front counter, before making her way upstairs. I follow her.\n\t\n\t*goto lbl_InjuredRush\n*else\n\t\n\tRaven tosses her basket toward the front counter. The bottles inside it loudly clink together as it slides an inch from falling\n\toff the counter.\n\t\n\tShe grabs my hand, and rushes me upstairs.\n\t\n\t*goto lbl_InjuredRush\n*comment\n\n*label lbl_InjuredRush\n\n*page_break\n\nHer home above the shop doesn't take up much space. Just a cramped living room, an adjacent and equally cramped\nkitchen, a bare-bones bathroom, and two tiny bedrooms overlooking the neighboring street.\n\nThe small space probably works for her, since she lives here alone.\n\nRaven has me sit down on her couch, before she runs off to dig through a nearby closet.\n\n*page_break\n\nShe returns a moment later carrying a tiny white-and-red box in her palm, along with a bottle containing a bright blue fluid.\n\nShe shoves the bottle into my hands. \"Drink this.\" She opens the box open, revealing a set of white pins adorned with red stripes on their tops.\nI warily eye the pins' sharp tips as I drink from the bottle.\n\nIt tastes bland, but as I take a swig, it feels like there's a spark of energy running up and down my spine.\n\n*if (fVampireSeed = true)\n\t\n\tRaven gently tilts my head to the side as she checks my neck. She looks worried at first, but the expression turn\n\tcurious after a few seconds.\n\t\n\t\"I can't even make out a wound.\" She lets go of my head, and closes the pin filled box. \"What happened?\"\n\t\n\tI shrug. \"I was attacked.\"\n\t\n\t\"But... specifically,\" she says. \"How did you get hurt?\"\n\t\n\t*choice\n\t\t#I'll tell her that I was bitten by two vampires.\n\t\t\t\n\t\t\t\"I was, um... bitten.\"\n\t\t\t\n\t\t\tSomething flashes through Raven's eyes. \"'bitten'?\"\n\t\t\t\n\t\t\tI clear my throat. \"Vampires. Two of them jumped me. I don't quite remember what happened, just that they bit me\n\t\t\tand then left me alone.\"\n\t\t\t\n\t\t\tRaven runs a couple of her fingers around the bloodied part of my neck. She mumbles to herself, \"I don't see a bite. It\n\t\t\talready healed?\" She takes a few steps away, contemplating something. \"Damn. I don't have any anti-venom. And the whole\n\t\t\tcity's in chaos...\"\n\t\t\t\n\t\t\tAfter a long time she looks at me. \"Don't worry, sweetie.\" There's something odd about her tone. \"You'll be pretty much okay.\"\n\t\t\t\n\t\t\t*goto lbl_Healing\n\t\t#I'll minimize what happened. She doesn't need to know all the gory details.\n\t\t\t*set fSecretTransformation true\n\t\t\t\n\t\t\tI shrug again. \"I was caught in a... scuffle, I guess. Everybody was fighting, I got jumped by a couple of guys.\"\n\t\t\t\n\t\t\t\"Are you hurt anywhere else?\" she still looks worried.\n\t\t\t\n\t\t\tI shake my head. \"I'm alright.\"\n\t\t\t\n\t\t\t*goto lbl_Healing\n\t*comment\n\t\n\t*goto lbl_Healing\n*if (fWerewolfSeed = true)\n\t\n\tThe bite on my arm barely aches, but drinking that potion does make me feel better.\n\t\n\tRaven looks over the wound. Somehow, it's even smaller.\n\t\n\t\"Strange...\" Raven mumbles. \"It's not as bad as I thought it was...\" She glances up at me. \"How did this happen?\"\n\t\n\t*choice\n\t\t#I'll tell her a werewolf bit me.\n\t\t\t\n\t\t\t\"A werewolf, transformed, was in some sort of frenzy,\" I said. \"I got caught in the middle of it.\"\n\t\t\t\n\t\t\t\"Hold you arm out.\" Raven pulls a single white pin out. \"At least the bite is really shallow.\"\n\t\t\t\n\t\t\t\"Actually...\" I wince as she pushes a pin into the edge of the wound. \"The wound was way bigger at first.\" Surprisingly,\n\t\t\tthere's no pain. Though, seeing the point enter my skin is incredibly disconcerting.\n\t\t\t\n\t\t\tRaven freezes for a moment, before continuing to place pins. \"How do you mean bigger?\"\n\t\t\t\n\t\t\t\"I, uh... I was pretty much torn wide open.\" I chuckle nervously. \"It hurt really bad at first, and I was bleeding. But\n\t\t\tthen it stopped. The blood and the pain. And the wound has shrunk down.\"\n\t\t\t\n\t\t\tRaven stops moving for a really long time. \"Well, that's a good thing.\" Her tone sounds strained. \"One moment.\"\n\t\t\t\n\t\t\tEventually the pins are completely surrounding the bite. Raven starts mumbling something under her breath. It\n\t\t\tdoesn't sound like she's speaking English.\n\t\t\t\n\t\t\tThe pins feel warm. Eventually, the heat spreads into the wound.\n\t\t\t\n\t\t\tMy flesh knits itself closed right before my eyes.\n\t\t\t\n\t\t\t*goto lbl_Healing\n\t\t#I don't think she needs to know a werewolf nearly tore me wide open. I'll downplay what happened.\n\t\t\t*set fSecretTransformation true\n\t\t\t\n\t\t\t\"I got caught in the middle of a mob,\" I smile sheepishly. \"I'm not even really sure what happened. I just ended up\n\t\t\ttaking a hit to my arm.\"\n\t\t\t\n\t\t\t\"Hold you arm out.\" Raven pulls a single white pin out. \"At least the wound doesn't look too bad.\"\n\t\t\t\n\t\t\tI wince as she pushes a pin into the edge of the wound. Surprisingly,\n\t\t\tthere's no pain. Though, seeing the point enter my skin is still disconcerting.\n\t\t\t\n\t\t\tWhen she finishes with the pins, Raven starts mumbling something under her breath. Whatever she's saying, it doesn't sound like\n\t\t\tEnglish.\n\t\t\t\n\t\t\tThe pins feel warm. Eventually, their heat spreads into the wound.\n\t\t\t\n\t\t\tMy flesh knits itself closed right before my eyes.\n\t\t\t\n\t\t\t\"Looks good!\" Raven says, with a hint of pride.\n\t\t\t\n\t\t\t*goto lbl_Healing\n\t*comment\n\t\n\t*goto lbl_Healing\n*comment\n\n*label lbl_Healing\n\n*page_break\n\nWe watch the news for the next hour.\n\nThe city is still burning. People are dead. There have been increasingly frequent clashes between humans and monsters lately, but they've never\neven come close to reaching this level of bloodshed.\n\nAt least one thousand dead. Countless injured.\n\nWe decide to watch something else.\n\n*page_break Later that night...\n\nExhaustion creeps in.\n\nRaven hasn't been able to get in touch with my parents.\n\nI try not to think about that as I lie down in the spare bedroom for the night.\n\n*goto_scene 003_Aftermath\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "003_aftermath": "\n\n\n*temp tmp_Raven false\n\n\n\n\n\n*page_break\n\nThe majority of violence is over by the next day.\n\n*page_break\n\nThings remain tense for a few days. Anger is simmering under the surface of the city. People are angry. People\nare grieving.\n\n*page_break\n\nWhen the sun sets, people die on the streets, or in their own homes. Businesses are ransacked. Homes are burned to the ground.\n\nA curfew is given to the city. The police receive a surplus of officers.\n\n*page_break\n\nI didn't sleep well last night. Again.\n\n*if (fToRaven = true)\n\t*goto lbl_MorningRaven\n*elseif (fToAdam = true)\n\t*goto lbl_MorningAdam\n*comment\n\n\n*comment ------------------------------------------------------------\n\n*label lbl_MorningRaven\n\nI wander into Raven's living room, trying to wipe the bleariness from my eyes.\n\nRaven's cooking eggs at the stove. \"Morning.\"\n\nI nod groggily as I plop down on the couch. The news is on.\n\nIt's still not pleasant to watch.\n\n*page_break\n\nRaven joins me, carrying a spare plate.\n\n\"Hey, um... Raven?\" I begin. \"Thanks for doing all this.\"\n\nShe smiles at me. \"Hey, what's family for?\"\n\nWe still hadn't been able to get in touch with my parents. The area we live in was completely ravaged. Our apartment\nis gone, burned to the ground.\n\nWith no call from mom or dad, Raven and I are hoping they were alive in a hospital somewhere.\n\n*page_break\n\nA lot of people were hurt during the first night, so they could just be laid up somewhere.\n\nA lot of people died during that first night too.\n\n*page_break\n\nI shouldn't think about that.\n\n*page_break\n\nI haven't been to school. They're all closed while things... settle.\n\nRaven says they'll probably open again soon, but it's alright if I stay here until we hear from my parents.\n\n*page_break\n\nThe day passes. I try to help out in the store. Raven doesn't get very many customers today. She says it's normally busier.\n\nPeople haven't been going out as often.\n\nI still try to help her as best I can, even if there's not much to do. Raven has actually taught me some of the basics\nof making those magical items.\n\n*page_break\n\nIt isn't until I'm helping her close shop when a police officer approaches the front door. He looks very young.\nI wonder if he's new.\n\nHe casts a nervous look my way, before focusing on my aunt. \"Are you Mrs. Lilia?\"\n\nRaven looks apprehensive. \"Can I help you?\"\n\nThe officer looks around for a moment. \"Y-you have a sister, right?\"\n\nMy heart quickens in my chest. This is what we've been waiting for. I step up immediately. \"You're here about my parents?\"\n\n*choice\n\t#I say, \"I'm their daughter.\"\n\t\t*set sex \"fe\"\n\t\t\n\t\t*goto lbl_SexChoice\n\t#I say, \"I'm their son.\"\n\t\t*set sex \"ma\"\n\t\t\n\t\t*goto lbl_SexChoice\n*comment\n\n*label lbl_SexChoice\n\n\n*label lbl_LastNameChoice\n\n\"My name is $!{fiName}-\"\n\nI told him my last name was...\n\n*input_text laName\n\nI told him my full name was, $!{fiName} $!{laName}.\n\nIs that right?\n\n*choice\n\t#Yes.\n\t\t*goto lbl_FinalName\n\t#No.\n\t\t*goto lbl_LastNameChoice\n*comment\n\n*label lbl_FinalName\n\n\"Right,\" the officer says quickly. \"We need to speak to the two of you. Downtown.\" he hesitates. \"About your parents.\"\n\nRaven moves beside me. \"What's this about?\"\n\n\"We just need to ask a few questions. That's all.\"\n\n\"What sort of questions?\" Raven asks. \"What happened to my sister?\"\n\nHe looks between Raven and myself. \"I can't answer that here.\"\n\n*page_break\n\nI climb into Raven's car, and we follow the officer to the police station.\n\nThey take us into one of the rooms in the back. It just has a table, some chairs and a light. They set Raven and myself\nat one end, and one of their detectives sits at the opposite side.\n\nHe's an older man. His hair is graying, and he carries a grim expression.\n\n\"I don't think we've ever been properly introduced, $!{fiName}. I'm James\" The old detective eyes me before talking. \"I know Adam Rourke. Old friend.\"\n\nI don't know what to say to that, so I keep my mouth shut.\n\n\"I understand a lot has happened lately. But, I need you to get through this the best you can.\"\n\nI nod slowly.\n\n\"Good. Good.\" He leans back in his chair. \"I just need to ask a few questions.\"\n\n*set tmp_Raven true\n\n*gosub lbl_Questions\n\nI'm surprised to see Adam Rourke as I'm leaving.\n\nHe is a statuesque man, far taller than most, and staggeringly athletic. Various deep scars adorn his\nbody from head to toe. Not surprising, given his occupation as a monster hunter.\n\nHe approaches me. For a moment I think he's going to say something, but he remains silent.\n\n*choice\n\t#He taught me the basics of wielding a sword.\n\t\t*set sklFencing true\n\t\t*set sklFencingLvl + 3\n\t\t\n\t\tI'm still no expert with a blade, and I'm sure I'll never need to use one, but I'm glad I spent all that time training with Adam.\n\t\t\n\t\t*goto lbl_AltMartialTraining\n\t#He taught me how to use a bow and arrow.\n\t\t*set sklArchery true\n\t\t*set sklArcheryLvl + 3\n\t\t\n\t\tI'm still hardly a master with a bow, but I'm glad I trained with Adam.\n\t\t\n\t\t*goto lbl_AltMartialTraining\n*comment\n\n*label lbl_AltMartialTraining\n\n\"What are you doing down here?\" I ask.\n\n\"I know the detective.\" Adam gives me a weak smile. \"He let me know they were bringing you two down here.\"\n\nI wish I had gotten in touch with him while we were waiting. \"Thanks for coming down.\"\n\n*page_break\n\n*goto lbl_TimePasses\n\n*comment ------------------------------------------------------------\n\n*label lbl_MorningAdam\n\nI join Adam in his lodge's main living space. It's still completely devoid of life.\n\nOnly a couple of people have visited in the last few days. Most of the usual members are either keeping close to home\nuntil they know its safe, or are volunteering out in the city.\n\nIf it wasn't for me, I think Adam would be with them. He said he made a call to 'a close friend' to try and get word on where\nmy parents were.\n\n*page_break\n\nHe's remaining optimistic about the situation, despite how much time has passed without hearing from them.\n\nMy optimism is more guarded. It's been three days, and we still haven't heard anything.\n\nI know it's better not to think about it, but there's really only one explanation as to why they\nhaven't gotten in touch.\n\n*page_break\n\nI won't think about it.\n\n*page_break\n\nWe idle the day away in the area behind the lodge.\n\n*choice\n\t#We practice fencing. I've actually done this quite a few times here.\n\t\t*set sklFencing true\n\t\t*set sklFencingLvl + 3\n\t\t\n\t\tI'm almost good at it now. Though most of the hunters can still trounce me easily.\n\t\t\n\t\t*goto lbl_MartialTraining\n\t#We practice firing arrows at the shooting range. I've gotten pretty good over the past few years.\n\t\t*set sklArchery true\n\t\t*set sklArcheryLvl + 3\n\t\t\n\t\tI'm approaching actually being competent with a bow. But, quite a few of the hunters are way better.\n\t\t\n\t\tThe ones that don't just use guns anyway.\n\t\t\n\t\t*goto lbl_MartialTraining\n*comment\n\n*label lbl_MartialTraining\n\n*page_break\n\nA police officer approaches us an hour later. As far as I can gather, he let himself in through the front.\n\n\"James?\" Adam seems to recognize him.\n\nThe officer is fairly old, with graying hair. He's carrying a grim expression.\n\nAn unpleasant feeling worms its way into my gut.\n\nHe looks at me. \"Are you...\"\n\n*choice\n\t#\"I'm their daughter.\"\n\t\t*set sex \"fe\"\n\t\t\n\t\t*goto lbl_SexChoice2\n\t#\"I'm their son.\"\n\t\t*set sex \"ma\"\n\t\t\n\t\t*goto lbl_SexChoice2\n*comment\n\n*label lbl_SexChoice2\n\n*label lbl_LastNameChoice2\n\n\"My name is $!{fiName}-\"\n\nI tell them my last name is...\n\n*input_text laName\n\nI told him my full name was, $!{fiName} $!{laName}.\n\nIs that right?\n\n*choice\n\t#Yes.\n\t\t*goto lbl_FinalName2\n\t#No.\n\t\t*goto lbl_LastNameChoice2\n*comment\n\n*label lbl_FinalName2\n\n\"I'm going to need you to come to the station,\" the old detective says. \"We've got some questions we need answered. About your parents.\"\n\nAdam puts a hand on my shoulder. \"I'll drive you. It'll be alright.\"\n\n*page_break\n\nIt's not long before we arrive at the station. We're led into a room in the back. It has a table, some chairs, and nothing else.\n\nThe old detective takes a seat on one side of it. Adam and I sit down at the other.\n\n*gosub lbl_Questions\n\nMy aunt Raven runs up and hugs me the moment I step through the door.\n\nShe's tall, and has to bend down a little just to reach me. She has her lengthy black hair tied into a braid most days,\nbut right now its just been left wild.\n\nI hug her back.\n\nI should have called while I was at Rourke's place.\n\n*goto lbl_TimePasses\n\n*comment ------------------------------------------------------------\n\n\n*label lbl_TimePasses\n\n*page_break\n\nTime passes.\n\n*page_break\n\nI feel angry.\n\n*page_break\n\nAn announcement is made. The schools will be opening again.\n\nSchool starts again Monday. Parents are assured there will be an increased police presence on school grounds\nto keep things civil.\n\n*page_break\n\n*goto_scene 004_TheHaze\n\n\n\n\n\n\n\n*label lbl_Questions\n\n*page_break\n\n\"So, we'll just take this from the top,\" he says. \"Do you know where your parents are?\"\n\n*choice\n\t#\"No.\"\n\t\t\n\t\tThe detective nods, almost like he expected that response.\n\t\t\n\t\t*goto lbl_QuestionA\n\t#\"I tried calling them, but they never answered.\"\n\t\t\n\t\t\"So you were waiting to hear back from them?\" he asks.\n\t\t\n\t\tI nod.\n\t\t\n\t\t*goto lbl_QuestionA\n\t#\"Have you found them?\"\n\t\t\n\t\tThe detective pauses for a moment. \"No.\"\n\t\t\n\t\t*goto lbl_QuestionA\n*comment\n\n*label lbl_QuestionA\n\n*if (fToRaven = true)\n\t\"$!{fiName} has been staying with me since we didn't know what happened to them,\" Raven says. \"When you called us\n\tdown here, we had hoped you knew.\"\n*if (fToAdam = true)\n\t\"The kid's been with me since we couldn't get in touch with them,\" Adam says. \"We were kind of hoping you knew where they\n\twere.\"\n*comment\n\n\"I see...\" The detective nods. \"Sadly, we don't.\" He pauses. \"So you haven't heard from them at all? You don't know what they've\nbeen doing?\"\n\n*choice\n\t#\"We don't.\"\n\t\t\n\t\tHe sighs. \"We were afraid of that...\"\n\t\t\n\t\t*goto lbl_QuestionsB\n\t#\"What have they been doing?\"\n\t\t\n\t\tThe detective hesitates, before eventually stating, \"I can't tell you that.\"\n\t\t\n\t\t*goto lbl_QuestionsB\n*comment\n\n*label lbl_QuestionsB\n\n\"Why?\" I ask.\n\n\"The situation is complicated, and I'm not at liberty to discuss anything.\" The detective gets up. \"If you do hear from\nyour mother or father, or if you learn where they are, you need to contact us immediately.\"\n\n*if (fToRaven = true)\n\t\"Wait.\" Raven stands up. \"Did they do something?\"\n\t\n\tI give Raven a hard look. \"They wouldn't have hurt anyone.\"\n\t\n\t\"I-\" Raven glances away. \"I'm not saying they did, but if they did something illegal-\"\n\t\n\t\"I'm sorry, ma'am,\" the detective says. \"I really can't say any more than this.\"\n*if (fToAdam = true)\n\t\"James.\" Adam stands up. \"I'm asking you, as a friend, what's going on here?\"\n\t\n\tThe detective hesitates, before shaking his head. \"I can't give any details. But... it's bad. That's all I\n\tcan say.\"\n*comment\n\nThe detective opens the door.\n*if (fToRaven = true)\n\t\"We have some more questions for you,\" he says to Aunt Raven.\n\t\n\tI take the open door as a hint to leave.\n*if (fToAdam = true)\n\t\"Your aunt is waiting outside,\" he says. \"We've already questioned her at length, so you and her can leave.\" He looks\n\tat Rourke. \"I still need to have a word with him.\"\n*comment\n\n*page_break\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "004_thehaze": "\n\n\n\n\n\n\n\n\n\n\nTurns out it's needed.\n\n*page_break\n\nIt's Monday now. I'm walking through the school halls.\n\nThings are tense. People seem paranoid, but more than that... angry.\n\nI feel angry too.\n\n*page_break\n\nIt's hard to stay focused on anything in class. Not that it matters.\n\nAfter the recent chaos, the teachers are struggling to get the lesson plan back on track.\n\nIt feels like there's a haze hanging over the school. Negative emotions drip like venom from\nevery student.\n\nHalfway through the day two students get into a brawl. It's bloody.\n\nI understand how they feel.\n\n*page_break\n\nWhy did they bother opening the school back up?\n\nNobody is in the mood for this crap.\n\n*page_break\n\nIt's near the end of the day when I completely give up on class. I let my head\nrest on the desk.\n\nWe have a substitute. I think Mrs. Chandler is her name.\n\nShe's weirdly quiet about what happened to our actual teacher. Nobody prods her\nfor more information.\n\nShe's not very good. Hopefully she'll just let people have free time to 'study' soon.\n\nI close my eyes.\n\nI can still feel that haze.\n\nHanging off of every body and every object.\n\n*page_break\n\nThe air is choking.\n\n*temp tmp_Actions 0\n\n*label lbl_HazeLoop\n\n*set tmp_Actions + 1\n\n*choice\n\t*if (tmp_Actions \u003c 3)\n\t\t#I'll keep walking.\n\t\t\t\n\t\t\t*if (tmp_Actions = 1)\n\t\t\t\t\n\t\t\t\tIt's hard to keep walking forward. The thick air feels like it's wrapping around my legs.\n\t\t\t\t\n\t\t\t\t*goto lbl_HazeLoop\n\t\t\t*elseif (tmp_actions = 2)\n\t\t\t\t\n\t\t\t\tThe haze tugs and pulls at me, slowing me down, wearing me out.\n\t\t\t\t\n\t\t\t\t*goto lbl_HazeLoop\n\t\t\t*comment\n\t\t\t\n\t\t\t*goto lbl_HazeLoop\n\t*if (tmp_Actions > 2)\n\t\t#I'll wait a moment.\n\t\t\t\n\t\t\t*if (tmp_Actions = 3)\n\t\t\t\t\n\t\t\t\tMy lungs strain against the malignant air. It tastes stale and bitter.\n\t\t\t\t\n\t\t\t\t*goto lbl_HazeLoop\n\t\t\t*comment\n\t\t\t\n\t\t\t*goto lbl_Seeing\n*comment\n\n\n\n\n*label lbl_Seeing\n\nSomething gives.\n\n*page_break\n\nI look around. Where am I?\n\nThe haze clouding over me drifts away. It isn't hard to stand anymore. I can breathe again.\n\nIs this... the school?\n\n*page_break\n\nI'm standing in a hallway. Something is wrong with the walls. They're built at strange angles.\n\nLooking around, everything is built at strange angles. Lockers line the walls, but their shapes are irregular.\nTheir forms are lopsided, like they've been partially melted.\n\nA pale mist obscures my vision. I can't fully see down the hall.\n\nI hear voices echoing in and out of existence. Some calm. Some scared.\n\nMost are angry.\n\n*page_break\n\nThe angry voices are the ones I hear the clearest. They resonate through this twisted hall in a way the\nothers don't. They ring off of every surface, and carry across every space.\n\nMy head feels foggy again.\n\nI ignore the voices, and shake the haze away.\n\n*page_break\n\nThe voices fall to the background when I'm not actively listening to them.\n\nI start walking down the hall. There are spaces between each set of lockers where a door should be.\nBut there never is one. Instead, there's just bare wall.\n\nEverything twists as I move forward. The rotation of the walls, the shapes of the lockers. Nothing feels\nstable.\n\nI see a figure ahead of me.\n\n*page_break\n\nThe haze makes it hard to see him, but he looks like a student. He's wearing\na thick hoodie, and baggie jeans. The clothing is old and worn out.\n\nHis hair is a mess, with oily locks haphazardly hanging off his head.\n\nHe has his back turned to me.\n\n*choice\n\t#I'll approach quietly.\n\t\t\n\t\tI say nothing as I move closer. I keep my steps silent.\n\t\t\n\t\tSomething about his posture is odd. His stance is uneven.\n\t\t\n\t\tHe gives a sudden twitch. I let out a slight gasp.\n\t\t\n\t\t*goto lbl_FirstContact\n\t#I'll call to him.\n\t\t\n\t\t\"Hello?\" I say uncertainly.\n\t\t\n\t\t*goto lbl_FirstContact\n*comment\n\n*label lbl_FirstContact\n\nHis body contorts to face me. Nothing about the movement looks natural. His feet are still planted in\nthe direction he was facing, but his legs are bizarrely twisted. He's leaning a little too far back.\nIt's like he might fall over.\n\nHis head hangs lopsided. His hair parts just enough to make out a hollow eye socket.\n\nI see nothing inside it at all, just a black space. The sight of it cuts into my gut.\n\n*choice\n\t#I'll say something to him.\n\t\t\n\t\t\"Are you...\" My thoughts scramble. \"What are you?\"\n\t\t\n\t\t*goto lbl_Danger\n\t#Time to start backing away...\n\t\t\n\t\t*goto lbl_Danger\n*comment\n\n*label lbl_Danger\n\nHe stands unnaturally frozen. Not so much as a twitch or breath as he stares.\n\nThe haze surrounding us seems to be gathering around his body. The air is thicker.\n\n*page_break\n\nIn the blink of an eye he's rushing toward me. His joints snap and crack from the sudden movement.\nHis gait is lopsided and uneven. He raises his fist high above his head.\n\nIt snaps down at an awkward angle, moving at blazing speeds.\n\n*choice\n\t*selectable_if (sklFencing = true) #Swipe at his arm.\n\t\t\n\t\tThe blade cuts through his arm.\n\t\t\n\t\tCompletely.\n\t\t\n\t\t*page_break\n\t\t\n\t\tI stare in shock as black ichor explodes from his amputated limb.\n\t\t\n\t\tThe substance splatters against my shirt. I reel back in disgust.\n\t\t\n\t\tThankfully, the inky fluid dissolves immediately. Within a moment, it's\n\t\tgone without a trace.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe boy, or maybe I should just say 'thing', writhes on the ground. Its body keeps twitching and\n\t\tconvulsing. Eventually I stab it in the head, and it stops.\n\t\t\n\t\tIts body disintegrates into nothing within a few moments. All that's left behind is a black stain\n\t\ton the floor, and even that's disappearing.\n\t\t\n\t\tI stare.\n\t\t\n\t\t*page_break\n\t\t\n\t\tIt isn't until more than a minute later that I become aware of the weight in my hand.\n\t\t\n\t\t*page_break\n\t\t\n\t\tGripped firmly in my hand is a rapier. The material is strange, it looks like it's made out of solid light.\n\t\tFrom the right angle, I can see a multitude of colors refracting off its surface. But, it mostly leans toward being pure white.\n\t\t\n\t\t*goto lbl_Weapon\n\t*selectable_if (sklArchery = true) #Leap back and take a shot.\n\t\t*set will -1\n\t\t\n\t\tI somehow duck back just far enough to avoid being struck. His fist is moving so fast, I can feel the air rippling off of it.\n\t\t\n\t\t*page_break\n\t\t\n\t\tI assume a well practiced pose as I draw the bow string back and let an arrow loose.\n\t\t\n\t\tIt pierces his chest, sending a burst of black ichor out.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe boy, or creature, falls to its knees. Without hesitation, I send a second arrow into its skull.\n\t\t\n\t\tThere's An unsettling crack. Then it falls over.\n\t\t\n\t\tI stare as the inky fluid leaking from its body rapidly dissolves into nothing.\n\t\tEven its body starts to disintegrate as the moments pass.\n\t\t\n\t\t*page_break\n\t\t\n\t\tIt's a full minute before I realize I'm holding something in my hand.\n\t\t\n\t\t*page_break\n\t\t\n\t\tClutched between my fingers is a bow. The material is strange, it almost looks like it's made out of hard light.\n\t\tFrom the right angle, I can see a multitude of colors refracting off its surface. But, it mostly leans toward being pure white.\n\t\t\n\t\tI draw the bow back, somehow an arrow appears instantly. Unlike the bow itself, it doesn't look like it's built from solid material.\n\t\tIt's literally an arrow of light.\n\t\t\n\t\t*goto lbl_Weapon\n*comment\n\n*label lbl_Weapon\n\n*page_break\n\nI look around.\n\nWhat now?\n\nQuestions bubble in my mind.\n\nHow did I get here?\n\nHow do I get out?\n\nWhere did this weapon come from?\n\n...wait.\n\n*page_break\n\nIt's gone.\n\n*page_break\n\n*if (sklFencing = true)\n\tI'm no longer holding a sword. It's vanished.\n*comment\n\n*if (sklArchery = true)\n\tI'm no longer holding a bow. It disappeared.\n*comment\n\nI shake my head, and press forward. I don't feel safe standing around.\n\n*page_break\n\nAfter only a few seconds of walking, I can see the end of the hall.\n\nA metal door stands in my way. A sign hangs off it, with strange lettering written across it.\n\nIt doesn't look like English. In fact, it mostly just looks like an uneven blur of lines and shapes.\nI'm not convinced that it's some otherworldly language. Everything in this place looks so distorted and warped,\nit's probably not anything.\n\nI reach out, and jiggle the handle. It doesn't give an inch.\n\nI run my hand across the surface of the door. I'm not turning back.\n\nI look around, as if someone was waiting to jump out and demand to know what I'm doing.\n\nI raise a foot up, and slam it against the door as hard as I can.\n\nSomething cracks inside the lock, and the door is flung open.\n\nWith a smirk, I step through.\n\n*page_break\n\nThe room is dark. It looks like a classroom, but all the desks are stacked against the walls.\nBizarre shapes and symbols are drawn on the white board.\n\nIn the center of the room is a black sphere. It crackles with red electricity. A constant dull pulse drifts\noff it.\n\nThe haze is staggeringly thick in here. I'm having trouble breathing just standing in it.\n\nThe voices come back. They're angrier. It's hard to block out.\n\n*page_break\n\nEverything is white. There's a sea of angry nothingness all around me.\n\nA voice drifts through it.\n\n\"Anabelle. I swear on my life. I will get revenge.\"\n\nThere's something beyond the haze. A figure. He's older, and lanky.\n\nHe's working on something...\n\nIt's much. The haze is too thick. I try to see through it, even as weighs against my skull\n\n*page_break\n\nI can see it again. That sphere is pumping out all this haze.\n\n*if (sklFencing = true)\n\t\n\tI approach it.\n\t\n\tMoving closer is almost unbearable. It gives off a dull pulse that's only getting stronger. It makes me feel numb inside.\n\t\n\tThe haze thickens, choking me.\n\t\n\tI can feel my own heart beating hard in my chest. The voices surge even louder.\n\t\n\tAs I mentally push against the fog somewhere deep down, something clicks.\n\t\n\t*page_break\n\t\n\tLight surges from my hand. I'm holding the sword again.\n\t\n\tI can see the haze retreating from my form. It's not any less thick, but it's not affecting me.\n\t\n\tI can fight this.\n\t\n\tBlade raised high, I march toward the sphere.\n\t\n\t*goto lbl_TheSphere\n*comment\n\n*if (sklArchery = true)\n\t\n\tI Watch the sphere.\n\t\n\tLooking directly at it hurts. It gives off a dull pulse that's only getting stronger. It makes me feel numb inside.\n\t\n\tThe haze thickens, choking me.\n\t\n\tMy heart is beating hard inside my chest. The voices surge even louder.\n\t\n\tAs I mentally push against the fog somewhere deep down, something clicks.\n\t\n\tLight surges from my hand. I'm holding the bow again.\n\t\n\tI can see the haze retreating from my form. It's not any less thick, but it's not affecting me.\n\t\n\tI can fight this.\n\t\n\tBow ready, I take aim at the sphere.\n\t\n\t*goto lbl_TheSphere\n*comment\n\n*label lbl_TheSphere\n\n*page_break\n\nThe air around it trembles. Red lightning crackles from deep within it.\n\nMore and more, the electricity builds up. With one final surge, something emerges.\n\nA figure grotesquely twists its way out of the sphere.\n\nIt collapses haphazardly to the floor, finally disconnected from the sphere that birthed\nit.\n\n*page_break\n\nSomething in the air changes. There's a spike of tension.\n\nI feel endangered.\n\n*page_break\n\nIt, and it is most assuredly an 'it' with its pitch black form that crackles with red energy, clambers unsteadily to\nits feet.\n\nDespite its apparent lack of dexterity, and the generally uneven way it carries itself, I stay on guard. Animosity pours\nfrom its hollow eyes. The haze naturally coalesces around its body.\n\nIt stares at me. Those awful eyes hold a glimmer of red light that focus on me. Its maw hangs wide open. It\nspews a foul mist with every breath exhaled.\n\n*temp tmp_BossHP 10\n\n*if (sklFencing = true)\n\t\n\tI don't wait any longer. I assume the stance Adam drilled into me for so long, before dashing forward.\n\t\n\tIt responds in kind.\n\t\n*comment\n*if (sklArchery = true)\n\t\n\tI don't wait any longer. I pull the arrow back, before letting it fly.\n\t\n\t*set tmp_BossHP - 1\n\t\n\tAlthough the arrow plugs firmly into its chest, it doesn't even flinch.\n\t\n*comment\n\nIt's movements are shockingly fast. I barely have time to react before it takes a wide swing at me.\n\n*if (sklFencing = true)\n\t\n\tI close my eyes as I lunge forward, stabbing literally blindly.\n\t\n\tMy blade catches against something, and I open my eyes.\n\t\n\tThe blade has pierced straight through the creature's jaw. Red electricity crackles out of the open\n\twound as it stands frozen. I can see the tip of my blade on the other side of its head.\n\t\n\t...Oh. Well, that was easy.\n\t\n\tSlowly, it reaches up, and wraps its fingers around my sword. It slides the blade out of its head, before\n\trushing forward, and punching me square in the jaw.\n\t\n\tI let go of my sword as I stumble backwards.\n\t\n\tThe second I look up, it's already on me. It delivers a painful kick to my stomach. My knees give out as I start\n\tto fall.\n\t\n\tIt brings both of its fists down on top of my head, flooring me.\n\t\n\tThe room seems to be spinning...\n\t\n\t*page_break\n\t\n*if (sklArchery = true)\n\t\n\tI fire blindly at it, but the arrow misses by a mile.\n\t\n\tthese don't really take any effort to create, I can generate them pretty much instantly...\n\t\n\tI stumble backwards as I fire arrow after arrow at him.\n\t\n\tHalf miss. Half hit.\n\t\n\tIt's not affected by any of them. When it finally closes the distance it lands a series of staggering blows\n\tacross my chest and head.\n\t\n\tI stumble backwards before falling to the floor.\n\t\n\tThat really hurt...\n\t\n*comment\n\n\n\n\n*goto lbl_EditSkip\n\n\n\n\n\n\n*comment ---------------------------------------------------------------------------------------------------------------------------------------------\n*comment ---------------------------------------------------------------------------------------------------------------------------------------------\n*comment ---------------------------------------------------------------------------------------------------------------------------------------------\n*comment ---------------------------------------------------------------------------------------------------------------------------------------------\n*comment ---------------------------------------------------------------------------------------------------------------------------------------------\n\n\n\n*label lbl_EditSkip\n\n*page_break\n\nThis is going very badly.\n\n*page_break\n\n\"Need a hand?\"\n\n*page_break\n\nI glance behind me just in time to see a blue and gold blur pass by. I hear a loud crash from across the room.\n\nSeveral desks have been smashed apart, and that creature is collapsed on top of them.\n\nStanding in front of it is an armor-clad figure, covered head-to-toe in plate armor. The metal plates look like they're\nmade from gold, and the armored figure is wearing a long, flowing blue cape.\n\n\"Are you alright?\" The voice sounds off. I can hear it echoing strangely inside the golden helmet.\n\nI nod dumbly.\n\n\"Fantastic! Then let's take this fiend out together!\"\n\nIt's like a heroic knight stepped straight out of a fantasy novel.\n\n*page_break\n\nIt takes a few moments for what was said to really register. I quickly move into position behind the armored figure and\n*if (sklFencing = true)\n\tpoint my sword forward.\n*comment\n*if (sklArchery = true)\n\tready another arrow.\n*comment\n\nWe stand in unison, waiting.\n\nThe creature is still just lying on the smashed desks.\n\n*page_break\n\n...it doesn't seem to be moving at all.\n\nThere's no electricity brimming off any of its injuries either.\n\n\"Um.\" I glance at the armored figure. \"I-I think we won. Already.\"\n\nThe golden knight stands confidently.\n\nI stare at the knight in confusion.\n\n\"Excellent!\" the knight proclaims, raising an armored fist toward the heavens. \"I knew we could do it!\"\n\n*goto lbl_TeamAttack\n\n\n\n*comment -----------------------------------------------------------------------------------------------------------------------------------------------\n\n*label lbl_TeamAttack\n\n*page_break\n\nWith the fight over, the air feels different.\n\nThe haze has dissipated. Or maybe it disappeared at some point through the fight. I haven't really been\npaying attention to it.\n\nThings feel better. I feel better.\n\nThe room seems brighter somehow.\n\nThat just leaves one thing that needs to be dealt with...\n\n*goto_scene 005_Victory\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "005_victory": "\n\n\n\n\n\n\n\n\nThe sphere pulses rapidly. I can look directly at it without getting a headache now. Whatever\npower it had seems to have waned.\n\nThe golden knight makes a motion to crack their knuckles, despite wearing gauntlets.\n\nI don't actually hear a 'crack', so I'm pretty sure its just for dramatic effect.\n\n\"And now...\" The knight slowly brings a fist back. \"The finishing blow!\"\n\nSomething happens.\n\n*page_break\n\nThe sphere shatters. The world blurs and tears itself apart until nothing is left.\n\nI disappear with it.\n\n*page_break\n\n[i]A bit shaky. But you have potential.[/i]\n\n*page_break\n\n\"Um... I think you're supposed to leave now.\"\n\nI jerk up.\n\nI'm sitting at my desk. Was I sleeping at it?\n\nThe substitute teacher is staring at me. The classroom is empty.\n\n\"The, uh...\" she glances around nervously. \"The bell just rang. You can go home. Or... not.\nIf you want.\"\n\nI nod, standing up slowly. \"Right, thanks.\"\n\n*page_break\n\nI glance at myself after leaving the class. I don't look any different.\n\nI focus on my hand. I can't make the weapon appear.\n\nVarious students are still wandering the halls. The school day is over, so they're getting\nready to leave.\n\nSomething feels different.\n\n*page_break\n\n*set health maxHealth\n\nBetter even.\n\n*page_break\n\nThe tension in the school is noticeably lower than before.\n\nPeople are actually chatting in the halls. And their voices sound... friendly.\n\nThe difference is so noticeable in fact, I actually hear people idly commenting about it.\n\n*page_break\n\nRaven's store is in walking distance from school. It won't take more than fifteen\nminutes or so to get there.\n\nI wonder if I should tell her about what happened.\n\n*page_break\n\nI feel tense during the walk.\n\nI should probably say 'during the walk home', but that doesn't quite feel right.\n\nIt's not that different from what school had been like before... whatever happened.\n\nPeople on the street are noticeably tense and standoffish toward each other.\n\nI sigh. \"What happened to this city...?\"\n\n*page_break\n\nMy phone buzzes in my pocket.\n\nI pull it out, and read the message.\n\n'How was the first day back?' -Adam Rourke-\n\n*fake_choice\n\t#'Not great.'\n\t\t\n\t\t'Sorry to hear that' -Adam Rourke-\n\t\t\n\t\tI type back, 'Yeah. Things were... tense.' -You-\n\t\t\n\t#'Weird.'\n\t\t\n\t\t'How so?' -Adam Rourke-\n\t\t\n\t\tMy thumb hovers over the screen for a while, as I struggle to think\n\t\tof what to say.\n\t\t\n\t\t'I dunno. Things were really bad earlier in the day,\n\t\tbut everything was suddenly okay later.' -You-\n\t\t\n\t\t'Isn't that a good thing?' -Adam Rourke-\n\t\t\n\t\t'I guess it is.' -You-\n\t\t\n\t#'Okay. I guess.'\n\t\t\n\t\t'If you need anything, you can always stop by.' -Adam Rourke-\n\t\t\n\t\tI smile.\n\t\t\n\t\t'Thanks' -You-\n\t\t\n*comment\n\nFor the next few minutes I walk along the street, occasionally exchanging words with Adam. It takes\nmy mind off of how miserable the city around me is.\n\n*page_break\n\n\"STOP THE BUS!\" A shrill voice yells out.\n\nI look toward the street. A city bus was passing me, but suddenly slammed on its breaks.\n\nI see a figure sprinting from the back of the bus to the front. \"Sorry, sorry, sorry!\"\n\nThe bus door opens, and a girl leaps out. She looks around frantically before\nlocking eyes on me.\n\nI take a step back.\n\n\"There you are! I looked all over the school!\" She rushes over to me.\n\nThe girl is short. Very short actually. She's wearing clothes suitable for the\nschool's track team.\n\nI don't recognize her at all.\n\n\"Geez! Did you even try to find me?\"\n\nI stare at her.\n\n*choice\n\t#\"I think you have me mistaken for someone...\"\n\t\t\n\t\t\"Uh, No.\" Her tone is defensive.\n\t\t*if (sex = \"fe\")\n\t\t\t\"You're definitely the girl I saw.\"\n\t\t*if (sex = \"ma\")\n\t\t\t\"You're totally the guy I saw.\"\n\t\t*comment\n\t\t\n\t\tI tilt my head. \"Saw... when?\"\n\t\t\n\t\t\"In that... place.\" She smirks. \"I might have looked a little taller then.\"\n\t\t\n\t\t*goto lbl_Meeting\n\t#\"Who are you?\"\n\t\t\n\t\tShe crosses my arms. \"I was slightly taller when you last saw me.\"\n\t\t\n\t\t*goto lbl_Meeting\n\t#\"What?\"\n\t\t\n\t\tShe sighs. \"I'm the knight.\"\n\t\t\n\t\tI look her over. She's... quite a bit shorter than the knight.\n\t\t\n\t\t\"Yeah,\" she says. \"I was a bit taller before.\"\n\t\t\n\t\t*goto lbl_Meeting\n*comment\n\n*label lbl_Meeting\n\nShe doesn't say anything for a few moments, just staring at me expectantly.\n\nI blink. \"Oh. Wait... you were that golden knight?\"\n\nShe nods.\n\n\"It actually happened...\"\n\n\"It's nice to finally meet someone else who can enter it.\" She extends her hand.\n\nI hesitantly shake it. \"Enter what?\"\n\n\"That... place. Whatever it was.\" She frowns. \"Look, I've been doing this for less than\na couple of weeks, alright? I'm sorry I don't have a cool name for it.\"\n\n\"Right...\" I say. \"I'm not quite sure how I even did that though.\"\n\n\"Don't sweat the details.\" She pulls out her phone. \"What's your number?\"\n\nI thoughtlessly tell her it.\n\nShe quickly types it into her phone.\n\nAnd then I realize what she's doing. \"Wait, why do you need-\"\n\nMy phone buzzes in my pocket.\n\n*page_break\n\n'Add this number to your contacts under Joan Catalan, k?' -Unknown-\n\n*page_break\n\n\"I didn't say leave!\" She's running back after the bus, which is already a long ways down the road.\nShe looks over her shoulder at me. \"I'll text you the details later! Just keep your evening open, we\nneed to meet up!\"\n\nI stare at her as she steadily catches up with the bus.\n\n*page_break\n\nI receive a message on my phone a few minutes later.\n\n'If you want, we're having a sword sparring\n*if (sklFencing = false)\n\tsession. I know swords aren't exactly your thing, but I promise they're basically just like bows. Except\n\tyou use them up close.' -Adam Rourke-\n\t\n\tA second later, and there's a follow up text.\n\t\n\t'And you can stab people with them. And slash, I guess. Also, you don't need ammo.' -Adam Rourke-\n\t\n\tI start to type a message back, when I receive another one.\n\t\n\t'But, you know, otherwise basically identical.' -Adam Rourke-\n\t\n\tI wait several moments until I'm sure he's finally finished, before typing out a response.\n*if (sklFencing = true)\n\tsession.' -Adam Rourke-\n\t\n\tI type out a response.\n*comment\n\n'I won't be able to make it. Some girl wants me to meet her later.' -You-\n\n*if (sex = \"fe\")\n\t\n\t'A friend from school?' -Adam Rourke-\n\t\n\tI'm not sure we're friends exactly. I don't even know her.\n\t\n\t'I guess? We only just met today, so I'm not sure' -You-\n\t\n\t'How'd you two meet?' -Adam Rourke-\n\t\n\tMy fingers stop over the screen. What should I say?\n\t\n\t'She helped me out earlier.' -You-\n\t\n\t'With classwork?' -Adam Rourke-\n\t\n\t'Sure' -You-\n*if (sex = \"ma\")\n\t\n\t'A girl huh? Is she... interested in you?' -Adam Rourke-\n\t\n\t*fake_choice\n\t\t#'If she is, she's gonna be disappointed.'\n\t\t\t\n\t\t\t'Fair enough. Just try to let her down easy.' -Adam Rourke-\n\t\t\t\n\t\t\t'I'm not that worried about it. I highly doubt this is a romantic thing.' -You-\n\t\t\t\n\t\t\t'Is she a new friend then? It doesn't sound like you really know her at all.' -Adam Rourke-\n\t\t\t\n\t\t\t'I guess we are.' -You-\n\t\t\t\n\t\t\t'Listen, $!{fiName}... I know it's not really my place to say something like this, but... should you\n\t\t\treally be meeting someone you don't know very well? At least, right now? While the city is... the way it is?' -Adam Rourke-\n\t\t\t\n\t\t\t'She seems on the level.' -You-\n\t\t\t\n\t\t\t'You'd better hope your aunt feels the same way. Otherwise, she might not be okay with this.' -Adam Rourke-\n\t\t\t\n\t\t\tI'll cross that bridge when I get there.\n\t\t\t\n\t\t#'It's not a date.'\n\t\t\t\n\t\t\t'Hmmmmm' -Adam Rourke-\n\t\t\t\n\t\t\tI swear, I can feel him smirking through the text.\n\t\n\t\t\tI quickly shoot back a response.\n\t\t\t\n\t\t\t'It's not like that. She just asked for my number, and said to keep my evening clear.' -You-\n\t\t\t\n\t\t\tThere's a long pause before I receive another message from Adam.\n\t\t\t\n\t\t\t'Whatever you say. Have fun!' -Adam Rourke-\n\t\t\t\n\t\t\tI roll my eyes.\n\t\t\t\n\t*comment\n\t\n*comment\n\n*page_break\n\nA bell chimes as I step into Raven's store.\n\nThere's actually a few people here. They're around my age, so they probably\ncame from school.\n\nI don't recognize any of them.\n\nThey seem to be looking over a few widgets in the corner. Raven is talking to them.\n\nShe briefly waves at me, but stays focused on her customers.\n\nI give a wave as I head upstairs.\n\n*page_break\n\nI turn on the news before plopping down on Raven's couch.\n\n\"-situation in Windbrooke has not stabilized, unfortunately.\" A man in a police uniform is speaking.\nThe caption on the screen suggests he's the chief. \"There are currently talks about moving military\npersonnel into the city to maintain order if things get any worse.\"\n\nHe points to someone in the crowd. The camera angle keeps me from seeing who.\n\nA male voice speaks. \"Is there any truth to rumors about temporarily segregating the city to keep humans and monsters\naway from each other?\"\n\n\"Absolutely not,\" the chief says firmly. \"There is no chance of that happening. This city is struggling, but\nwe are struggling together. We can not, and will not, physically divide people. That is the last thing this\nsituation needs.\"\n\nMy phone buzzes.\n\n*page_break\n\n'Alright, can you meet me? I've got everything set up!' -Joan Catalan-\n\nI raise a brow.\n\n'Where are you exactly?' -You-\n\nShe sends me an address a moment later.\n\nBefore I have time to respond, Raven comes up to meet me. \"I actually had some customers today.\"\n\nShe opens the fridge, and pulls out a can of soda. \"They all seemed to be students though. Weird.\"\n\n\"Yeah.\" I put my phone away. \"So... I'm meeting someone, is that cool?\"\n\nRaven opens the soda, while giving me a curious look. \"Meeting who?\"\n\n\"Just a friend I made today,\" I shrug noncommittally.\n\nRaven plops down next to me. \"Does this 'friend' have a name?\"\n\n\"Joan, uh...\" I glance at my phone's screen. \"Catalan. I only met her today, so I don't know that much about her.\"\n\n\"I... don't know,\" Raven says. \"This city isn't safe right now. And you don't even know this girl. Why does\nshe want to meet you?\"\n\nI almost say 'I don't know', before realizing she definitely won't let me go if I say that.\n\n*choice\n\t#I'll claim she's helping me out with school.\n\t\t\n\t\t\"There was just... a problem I was having,\" I begin. \"She's helping me out at school.\"\n\t\t\n\t\t\"You mean, with classwork?\" Raven asks.\n\t\t\n\t\tI nod. \"Yeah. Basically.\"\n\t\t\n\t\tShe crosses her arms. \"I still don't like you being out right now...\"\n\t\t\n\t\t\"I know,\" I say. \"Things are really bad right now. But, I could still really use\n\t\ther help. That's all I'm saying.\"\n\t\t\n\t\tRaven bites her lip, watching me for a few moments. \"I guess...\" She sighs. \"I guess its okay. But call\n\t\tme when you meet her.\"\n\t\t\n\t\t\"Thanks.\" I stand up, getting ready to leave.\n\t\t\n\t\t\"And call me when you leave.\"\n\t\t\n\t\tI walk to the stairs. \"I will.\"\n\t\t\n\t\t\"And be back before sundown!\"\n\t\t\n\t\tI nod as I head downstairs.\n\t\t\n\t\t*if (Sex = \"ma\")\n\t\t\t\"And don't knock her up!\"\n\t\t\t\n\t\t\tI roll my eyes as I call back. \"OKAY. THANKS.\"\n\t\t*comment\n\t\t\n\t\t*goto lbl_Excuse\n\t#I'll imply I'm trying to hook up with her.\n\t\t*set fHookingUpWithJoan true\n\t\t\n\t\t\"Well, she's... cute. And things seemed to be going well between us today...\" I shrug. \"I\n\t\tjust want to see where this goes.\"\n\t\t\n\t\t*if (sex = \"fe\")\n\t\t\tSomething flashes through Raven's eyes for a moment. \"Oh, so you... Oh.\" She smiles brightly.\n\t\t\t\"Well... I'm not sure how I feel about you being out this late. But, I suppose it couldn't\n\t\t\thurt if you met up with her.\"\n\t\t\t\n\t\t\tHuh, Raven is... even more open to this idea than I was hoping.\n\t\t\t\n\t\t\t\"Just, call me when you get there?\" Raven asks. \"And be home before sundown.\"\n\t\t\t\n\t\t\tI nod. \"Sure.\"\n\t\t\t\n\t\t\t\"And use protection.\"\n\t\t\t\n\t\t\tI blanch. \"Right.\"\n\t\t\t\n\t\t\t\"I'm serious!\" She puts a hand on her hips. \"You might not be able to get pregnant, but you never know if your partner's clean until you're both tested. You have to take care of yourself!\"\n\t\t\t\n\t\t\tI move toward the stairs. \"Right, thanks. I'm gonna go now.\"\n\t\t\t\n\t\t\t\"Wait, do you need money for c-\"\n\t\t\t\n\t\t\t\"BYE!\"\n\t\t*if (sex = \"ma\")\n\t\t\tShe raises a brow. \"And you just met this girl?\"\n\t\t\t\n\t\t\tI shrug. \"Hey, I can't control when these things happen.\"\n\t\t\t\n\t\t\t\"I just-\" Raven runs her fingers through her hair. \"I know you want to be doing normal teenage things right\n\t\t\tnow, but things are still really unstable.\"\n\t\t\t\n\t\t\tI nod. \"Yeah, the city's bad. I know it's not completely safe, but...\"\n\t\t\t\n\t\t\t\"You haven't really been going out as much since they disappeared, have you?\"\n\t\t\t\n\t\t\tThat makes me feel guilty. I don't want to use what happened to mom and dad as leverage here. But,\n\t\t\tit was true. I hadn't been out at all.\n\t\t\t\n\t\t\t\"Call me when you meet her?\" Raven asks. \"And when you leave.\"\n\t\t\t\n\t\t\tI nod. Raven hugs me.\n\t\t\t\n\t\t\t\"And if you get into any trouble.\"\n\t\t\t\n\t\t\tI laugh. \"I will, I promise.\"\n\t\t\t\n\t\t\t\"Good.\" She lets go, and looks me in the eye. \"Don't. Knock. Her. Up.\"\n\t\t*comment\n\t\t\n\t\t*goto lbl_Excuse\n*comment\n\n*label lbl_Excuse\n\n*page_break\n\nI'm walking toward the address Joan gave me. If it's her home, she lives close by.\n\nSomething changes as I get closer. The tension on the street melts away.\nIt's not as sudden as it was at school. The difference here is subtle.\n\nI think back to Joan's actions and words. It didn't seem like she was out of her element at all.\n\nShe'd known exactly what she w
