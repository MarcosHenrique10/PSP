akes a disgusting squelch as she hammers her fist into the flesh.\n\nThe creature's leg does slide back slightly, but the blow wasn't nearly enough to make it topple.\n\nIt brings one of the meatier arms up, and brinks it crashing down near Joan, thankfully she\nslips away trivially enough.\n\nAnd finds her way back to my side. \"Alright... do you have any ideas?\"\n\n\"Uh...\" I'm hearing a high pitched sound fill the air.\n\n*page_break I think it's getting louder?\n\nFor the briefest of seconds, I see a flash of light. followed by a deafening explosion.\n\nI fall to the ground as I'm rocked by... something.\n\nMy ears are ringing.\n\nMy head is spinning, and I glance over at Joan. Doesn't look like she's fairing any better than me.\n\nI look forward, and see that creature's flesh burning. Something just blew it up. The figure is twitching\nand trying to stand, but it's missing most of its limbs now. The sphere wedged into its body is glowing\nvery sporadically.\n\n*page_break There's something quivering in the torso...\n\nThat old man claws his way back out. He looks pretty shaken too.\n\nI quickly start approaching him.\n\nI can end this now...\n\nHis eyes fall on me. He points a shaking hand toward me, and a large amount of haze starts gathering around him.\nThere's a flash of light, and fire roars forward.\n\nI rapidly leap to the side, and avoid getting burned.\n\nIf the haze is in the air, I guess that means he can use it too.\n\n\"Just give up!\" He barks out. \"Leave! Leave me and this damned tower alone!\"\n\nI smirk. \"Not gonna happen.\"\n\nHe pulls more haze toward himself. I dash forward.\n\nHe throws more fire out. It's sporadic and random.\n\nI avoid the worst of it at first, but its coming in from every direction. But he's almost in front of me.\n\n*if (style = \"warrior\") or (style = \"spellsword\")\n\t\n\tI slide into a low dash, just barely avoiding a wave of fire approaching my head. I generate my sword.\n\t\n\tThis attack is everything. I slide past his arm, and bury my sword into his chest.\n\t\n*if (style = \"spellbow\")\n\t\n\tI lunge forward, generate my bow, and take aim. There's a wave of fire headed straight for me.\n\t\n\tI fire an arrow. and then another, and another. Three large holes are blown through the wall\n\tof flames, dissipating them around me.\n\t\n\tAll three arrows bury themselves into his chest.\n\t\n*comment\n\nHe falls to his knees. His breathing is terrible.\n\n\"This isn't what was supposed to happen...\"\n\nI glare down at him. \"You don't say.\"\n\nHe starts to chuckle, but then starts coughing up blood. He looks up at me with a smile.\n\nBefore suddenly pointing his hand toward me. There's a spark of light across his fingers just before\nJoan steps in and cracks him across the face.\n\nHe goes limp instantly.\n\nThe air shifts. The haze starts drifting away.\n\nSilence surrounds us.\n\nEven the tower has stopped shaking.\n\n*page_break\n\nThere's a moment where, we don't really know what to do. Joan\nand I just kind of stand there, staring at the old man.\n\nThere's a pool of blood slowly surrounding him.\n\nThe haze drifts away enough that I can't materialize a weapon anymore. Neither can Joan.\n\n\"Don't move!\" A woman shouts.\n\nI turn around to see someone in some sort of pure black military garb. She's wearing a gas mask\non her face. There's a symbol of a tree of her uniform. She's pointing a rifle at us right now.\n\n*if (fRavensWorld = true)\n\t\"Are you... from Yggdrasil?\"\n*comment\n\nShe lowers her gun immediately but doesn't move.\n\nShe's not saying anything.\n\nJoan and I share a confused look.\n\n\"How did you get up here?\" she asks.\n\n\"Uh... downstairs,\" I begin. \"There's some sort of... door. It leads to the woods near Windbrooke.\"\n\nShe stares at me. \"Get your ass back there. We'll talk later.\" Something about her voice is really familiar...\n\nJoan nods quickly. \"Great let's go, $!{fiName}!\" She immediately moves for the stairs.\n\nI quietly follow behind her.\n\n*page_break\n\n*if (location = \"Elrin\")\n\t\n\tWe're back in Elrin's apartment now. Joan ended up having to go home after we finally found Elrin, so it's just me and him\n\tnow. We're eating one of his dinners.\n\t\n\t\"Raven is quite angry,\" he says.\n\t\n\t\"That was her at the top of the tower wasn't it?\" I ask.\n\t\n\tElrin nods.\n\t\n\t\"Well. That sucks.\"\n\t\n\t\"Indeed,\" he says. \"But at least the conflict is over. And you even helped Raven out with her work. Admittedly\n\tin a highly inadvertent fashion.\"\n\t\n\tThere's a knock at the door.\n\t\n\tI flinch. \"Is that her?\"\n\t\n\t\"Almost certainly,\" Elrin says.\n\t\n\tI stand up. Time to face the music I guess.\n\t\n\t*page_break\n\t\n\tWhen I open the door Raven is standing there. She's wearing the same black uniform with a tree symbol on\n\tit as before.\n\t\n\tShe looks pretty pissed.\n\t\n\t*page_break Half an hour and a lot of talking later...\n\t\n\tRaven is angrily digging through the meat on her plate as she sits across from me at the table.\n\t\n\tI finished my dinner awhile ago. I'm just waiting for her to finish venting.\n\t\n\t\"If you [i]ever[/i] do anything that stupid again, I will kill you myself!\"\n\t\n\tI nod. \"I get that.\"\n\t\n\tThere's a lull in the conversation.\n\t\n\t\"So...\" I cautiously begin. \"What happens now?\"\n\t\n\tRaven sighs. \"I'll need to find a new location for my store. You'll have to stay at Elrin's for a little while longer.\"\n\t\n\tI nod. \"You still gonna be gone doing... whatever it is you do?\"\n\t\n\t\"No, you pretty much wrapped things up,\" she says.\n\t\n\t*page_break And that was that.\n\t\n\tRaven did get another building. She couldn't get a hybrid house/shop like before though, so we have an apartment\n\tnow.\n\t\n\tActually... she may have just gotten an apartment to accommodate the fact that I'm living with her now too.\n\t\n\tElrin sticks around. He's not glued to my side anymore, but he makes a regular appearance in the store.\n\t\n\tThat priest, father Albert's 'Union of Humanity' group crumbles after their leader turns himself in to the police. It's\n\ta big news story. Their compound was filled with guns and explosives. The people there were training to attack monsters\n\tin the streets of Windbrooke.\n\t\n\tBut I already knew all this.\n\t\n\tThe priest couldn't articulate why he turned himself in. He just did.\n\t\n\tThe Scourge doesn't go through with its attack. It just vanishes completely.\n\t\n\tI never did learn where my parents were, but I think they were tied to the Union of Humanity somehow. After\n\tthat priest turned himself in, the police came around wanting to ask more questions. I couldn't help them.\n\t\n*if (location = \"Scourge\")\n\t\n\tI'm back at my crappy shanty town hut now. Joan had to go home after we finally found Lucas and Rita.\n\t\n\tAt some point Lucas appears in the doorway. \"You aunt is pissed.\"\n\t\n\tI stare at him. \"Huh?\"\n\t\n\t\"She's shouting at Angeline in front of the warehouse right now.\" He smirks. \"I think you\n\tmight be busted on keeping secrets from her.\"\n\t\n\tI chuckle. \"Damn. I'm not looking forward to getting chewed out by her.\"\n\t\n\tHe nods. \"Well, better for you to face to music now than later.\"\n\t\n\tI can faintly hear Raven shouting the moment I step outside my little hut.\n\t\n\t*page_break She really does sound pissed.\n\t\n\tHalf an hour later, and Raven and I are driving toward a hotel she booked for the next two weeks. A sort\n\tof temporary housing until she can work something more permanent out.\n\t\n\tSomehow, she's still fuming. \"-And if you ever do anything that stupid again, I swear to god $!{fiName}!\"\n\t\n\tI don't say anything for a long time. \"So what happens now? Do you need to disappear to do your work again?\"\n\t\n\tShe deflates slightly. \"No. You pretty much wrapped things up for me.\"\n\t\n\tI nod.\n\t\n\t\"I also need to find a new location for my store. You'll be staying at this hotel until I can sort that out.\"\n\t\n\t*page_break And that was that.\n\t\n\tRaven did get another building. She couldn't get a hybrid house/shop like before though, so we have an apartment\n\tnow.\n\t\n\tActually... she may have just gotten an apartment to accommodate the fact that I'm living with her now too.\n\t\n\tI still see Rita and Lucas around. Even Angeline. I don't mention that to Raven.\n\t\n\tThat priest, father Albert's 'Union of Humanity' group crumbles after their leader turns himself in to the police. It's\n\ta big news story. Their compound was filled with guns and explosives. The people there were training to attack monsters\n\tin the streets of Windbrooke.\n\t\n\tBut I already knew that.\n\t\n\tThe priest couldn't articulate why he turned himself in. He just did.\n\t\n\tThe Scourge doesn't go through with its attack. I have no idea what they're doing now, and I don't ask.\n\t\n\t*if (f_008_NightPlans = true)\n\t\tI never did learn where my parents were, but I think they were tied to the Union of Humanity somehow. After\n\t\tthat priest turned himself in, the police came around wanting to ask more questions. I couldn't help them.\n\t*comment\n\t\n\t*if (f_008_NightPlans = false)\n\t\tMy parents disappear. I have no idea where they are or what happened to them. The police come around\n\t\tto question me again, but I couldn't help them.\n\t*comment\n\t\n*if (location = \"Union\")\n\t\n\tI'm back in my tiny room at the compound, lying face down on my bed.\n\tJoan ended up having to go home after we finally found Toby and Laura.\n\t\n\tDad appears in the doorway. \"Raven is on the way.\"\n\t\n\t\"..Huh?\" I stare.\n\t\n\t\"We called her. She's coming to pick you up,\" he says.\n\t\n\tI get up. \"Why?\"\n\t\n\t\"Father Albert has decided to disband the group,\" dad says. \"He's turning himself in tomorrow.\"\n\t\n\tSo we're leaving? But then why did he call-\n\t\n\t\"Your mother and I have to disappear,\" he says. \"We did some things... some illegal things\n\twhile we were here.\"\n\t\n\t\"Well, I'm coming with you then.\"\n\t\n\t\"You can't,\" he says. \"You didn't do anything wrong. You shouldn't have to completely uproot\n\tyour life because of our decisions.\"\n\t\n\t\"But-\"\n\t\n\t\"I know this is sudden,\" he says. \"But she'll be here any minute. Come downstairs when you're ready.\"\n\t\n\t*page_break Half an hour and I'm already leaving...\n\t\n\tRaven showed up in front of the compound in a freaking limo of all things. I don't question it\n\tas I'm ushered inside.\n\t\n\tRaven and my parents are... tense as they're meeting each other again. I don't get much time to say\n\tgoodbye before we're headed off.\n\t\n\tSeveral minutes pass in absolute silence. We have a driver, so Raven is in the seat next to me.\n\t\n\t\"If you [i]ever[/i] do anything that stupid again, I will kill you.\"\n\t\n\tThat's one way to break the silence. \"I get that.\"\n\t\n\tI cautiously start talking again. \"What happens now?\"\n\t\n\tRaven sighs. \"I'll need to find a new location for my store. I'll find someplace for you to stay until then.\"\n\t\n\tI nod. \"You still gonna be gone doing... whatever it is you do?\"\n\t\n\t\"No, you pretty much wrapped things up,\" she says.\n\t\n\t*page_break And that was that.\n\t\n\tRaven did get another building. She couldn't get a hybrid house/shop like before though, so we have an apartment\n\tnow.\n\t\n\tActually... she may have just gotten an apartment to accommodate the fact that I'm living with her now too.\n\t\n\tThe Union is gone, but I see Toby and Laura around. They seemed to have stayed off the police's radar well enough\n\tto avoid going to prison.\n\t\n\tFather Albert's 'Union of Humanity' group crumbles after he turns himself in to the police. It's\n\ta big news story. Their compound was filled with guns and explosives. The people there were training to attack monsters\n\tin the streets of Windbrooke.\n\t\n\tBut I already knew all this.\n\t\n\tFather Albert didn't bother trying to explain why he suddenly turned himself in.\n\t\n\tThe Scourge doesn't go through with its attack. It just vanishes completely.\n\t\n\tI don't know where my parents are right now. I haven't even heard from them. They might just be trying to protect me though.\n\t\n*comment\n\n*page_break The days pass...\n\nI don't know what's going to happen the next. I've been through so much, but its starting to already feel like it happened\na million years ago.\n\nI'm getting settled into my normal routines again. I go to school. Hang out with Joan. Rinse and repeat.\n\nIt's weird to not constantly be under pressure anymore. But its good too. Pleasant even.\n\nI can only hope things remain this nice on into the future.\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]GAME NAME.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "choicescript_description": "Struggle to balance a normal life while you investigate strange creatures, and the malevolent fog that hangs over your city. Take on the roll of a teenager thrown into a chaotic and dangerous struggle. Learn how to fight and use magic while you try not to die to the horrific creatures luring just under the surface of your city.\n\n[i]The Haze Under Windbrooke[/i] is a 117,200 word interactive fantasy novel by Jesse Freeman, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Defeat strange creatures with magic, a sword, or your trusty bow.[n/]\n• Explore a strange other world just beneath your city.[n/]\n• Learn the secrets of the monsters living just out of humanity's sight.[n/]\n• Try to stay alive while living a normal life.\n", "choicescript_stats": "*label lbl_Refresh\n\nName: $!{fiName} $!{laName}\n\n\nGender:\n*if (Sex = \"fe\")\n\tFemale\n*if (Sex = \"ma\")\n\tMale\n*if (Sex = \"???\")\n\t???\n*comment\n\nRace: $!{race}\n\nHealth: ${health} / ${maxHealth}\n*comment\n\n*line_break\n*line_break\n\n- Skills -\n\nFencing (Lvl. ${sklFencingLvl})\n\nArchery (Lvl. ${sklArcheryLvl})", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2018-08-23 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n\n*script changeBackgroundColor(\"sepia\")\n\n*set sklFencing true\n*set sklFencingLvl 1\n*set sex \"ma\"\n*set fiName \"John\"\n*set laName \"Lark\"\n\n\n\nIt stares at me. Those awful eyes hold a glimmer of red light that focus on me. Its maw hangs wide open. It\nspews a foul mist with every breath exhaled.\n\t\nI don't wait any longer. I assume the stance Adam drilled into me for so long, before dashing forward.\n\nIt responds in kind.\n\nIt's movements are shockingly fast. I barely have time to react before it takes a wide swing at me.\n\nI close my eyes as I lunge forward, stabbing literally blindly.\n\nMy blade catches against something, and I open my eyes.\n\nThe blade has pierced straight through the creature's jaw. Red electricity crackles out of the open\nwound as it stands frozen. I can see the tip of my blade on the other side of its head.\n\n...Oh. Well, that was easy.\n\nSlowly, it reaches up, and wraps its fingers around my sword. It slides the blade out of its head, before\nrushing forward, and punching me square in the jaw.\n\nI let go of my sword as I stumble backwards.\n\nThe second I look up, it's already on me. It delivers a painful kick to my stomach. My knees give out as I start\nto fall.\n\nIt brings both of its fists down on top of my head, flooring me.\n\nThe room seems to be spinning...\n\n*fake_choice\n\t#Slash its striking arm.\n\t\t\n\t\tMy rapier digs against its arm, forcing it aside. I have to duck down to avoid getting hit in the head.\n\t\t\n\t\tRed electricity leaps off its arm along the path of the cut. A familiar black ichor drips to the ground as it takes\n\t\ta few steps back.\n\t\t\n\t#Leap to the side.\n\t\t\n\t\tI quickly scramble to the side. Its swing comes less than an inch from my face. I can feel\n\t\tair rushing by my cheek.\n\t\t\n\t\tI don't waste any time retreating to the far end of the room.\n\t\t\n*comment\n\n*script changeBackgroundColor(\"black\")\n\n\n\n\n*comment Screen shot 2\n\n*set sklFencing true\n*set sklFencingLvl 1\n*set sex \"fe\"\n*set fiName \"Tiffany\"\n*set laName \"Lilla\"\n\nIt's not long before we arrive at the station. We're led into a room in the back. It has a table, some chairs, and nothing else.\n\nThe old detective takes a seat on one side of it. Adam and I sit down at the other.\n\n\"So, we'll just take this from the top,\" he says. \"Do you know where your parents are?\"\n\n*fake_choice\n\t#\"No.\"\n\t\t\n\t\tThe detective nods, almost like he expected that response.\n\t\t\n\t#\"I tried calling them, but they never answered.\"\n\t\t\n\t\t\"So you were waiting to hear back from them?\" he asks.\n\t\t\n\t\tI nod.\n\t\t\n\t#\"Have you found them?\"\n\t\t\n\t\tThe detective pauses for a moment. \"No.\"\n\t\t\n*comment\n\n*script changeBackgroundColor(\"sepia\")\n\n\n\n*comment screen shot 3\n\n*set sklFencing true\n*set sklFencingLvl 1\n*set sex \"fe\"\n*set fiName \"Tiffany\"\n*set laName \"Lilla\"\n\n\n\n\nI risk a look back, to see what Joan is doing.\n\nAnd I realize she's an enormous distance behind me.\n\n\"Don't give up!\" She calls. \"I have only the utmost confidence in you!\"\n\n\"W-what!?\" I feel a fist connect with my jaw.\n\n*set health - 10\n\nThose things are all around me. They're all just a mesh of bodies and fists to me.\n\n*fake_choice\n\t#Stab blindly.\n\t\t\n\t\tI feel my blade puncture one of them, but I can't even make out which one before being pummeled mercilessly.\n\t\t\n\t#Try to break away.\n\t\t\n\t\tI make some blind effort to throw myself forward, but I can't push past them before a rain of fists and kicks lands across my body.\n\t\t\n*comment\n\n\n\n\n*set sklFencing true\n*set sklFencingLvl 1\n*set sex \"ma\"\n*set fiName \"John\"\n*set laName \"Lark\"\n\n\n\n\n\"STOP THE BUS!\" A shrill voice yells out.\n\nI look toward the street. A city bus was passing me, but suddenly slammed on its breaks.\n\nI see a figure sprinting from the back of the bus to the front. \"Sorry, sorry, sorry!\"\n\nThe bus door opens, and a girl leaps out. She looks around frantically before\nlocking eyes on me.\n\nI take a step back.\n\n\"There you are! I looked all over the school!\" She rushes over to me.\n\nThe girl is short. Very short actually. She's wearing clothes suitable for the\nschool's track team.\n\nI don't recognize her at all.\n\n\"Geez! Did you even try to find me?\"\n\nI stare at her.\n\n*fake_choice\n\t#\"I think you have me mistaken for someone...\"\n\t\t\n\t\t\"Uh, No.\" Her tone is defensive. \"You're totally the guy I saw.\"\n\t\t\n\t\tI tilt my head. \"Saw... when?\"\n\t\t\n\t\t\"In that... place.\" She smirks. \"I might have looked a little taller then.\"\n\t\t\n\t#\"Who are you?\"\n\t\t\n\t\tShe crosses my arms. \"I was slightly taller when you last saw me.\"\n\t\t\n\t#\"What?\"\n\t\t\n\t\tShe sighs. \"I'm the knight.\"\n\t\t\n\t\tI look her over. She's... quite a bit shorter than the knight.\n\t\t\n\t\t\"Yeah,\" she says. \"I was a bit taller before.\"\n\t\t\n\n\n*set sklArchery true\n*set sklArcheryLvl 1\n*set sex \"ma\"\n*set fiName \"John\"\n*set laName \"Lark\"\n\n\n\n\n\nI raise a brow at the locations. \"All those places have that... other place in them?\"\n\n\"I think all places has that other place in it,\" Joan says. \"But, those places have those haze making spheres.\"\n\n\"What's density mean?\" I ask.\n\n\"It's the density of the haze,\" she says. \"I've noticed the longer a sphere is left alone, the more powerful it becomes. More haze,\nmore monsters in that otherworld.\"\n\n\"Well, in that case we should go to...\"\n\n*fake_choice\n\t#\"The police department. That haze is probably crippling the police force.\"\n\t\t\n\t\t\"Yeah, that's not gonna work out,\" Joan says. \"I already went there earlier. I got\n\t\ttotally creamed. Even with your help, we wouldn't be able to do anything.\"\n\t\t\n\t\t\"So, what?\" I cross my arms. \"We're just not going to even try?\"\n\t\t\n\t\t\"We'll do something,\" Joan says. \"Eventually. After you've had some practice.\"\n\t\t\n\t\tI frown. \"I guess, but-\"\n\t\t\n\t\t\"Because, right now?\" she says. \"You totally suck.\"\n\t\t\n\t\tI stare at her for a long while. \"...Gotcha.\"\n\t\t\n\t#\"The hospital. The haze is choking already suffering victims.\"\n\t\t\n\t\t\"Yeah, that's not gonna work out,\" Joan says. \"I already went there earlier. I got\n\t\ttotally creamed. Even with your help, we wouldn't be able to do anything.\"\n\t\t\n\t\t\"So, what?\" I cross my arms. \"We're just not going to even try?\"\n\t\t\n\t\t\"We'll do something,\" Joan says. \"Eventually. After you've had some practice.\"\n\t\t\n\t\tI frown. \"I guess, but-\"\n\t\t\n\t\t\"Because, right now?\" she says. \"You totally suck.\"\n\t\t\n\t\tI stare at her for a long while. \"...Gotcha.\"\n\t\t\n\t#\"The mall. It'll be easier than the other two.\"\n\t\t\n\t\tJoan smiles. \"My thoughts exactly. Also, I got totally creamed at the other\n\t\tlocations earlier, so we wouldn't be able to help anyways.\"\n\t\t\n\t\t\"Well...\" I scratch the back of my head. \"You wouldn't be alone, you'd-\"\n\t\t\n\t\t\"Have you?\" Joan asks, looking me up and down. \"Yeah, No. You're kinda...\" She pauses\n\t\tfor a long while. \"...new.\"\n\t\t\n\t\tI nod. \"Right, I guess that makes-\"\n\t\t\n\t\t\"So you totally suck at this.\"\n\t\t\n\t\tI stare at her for a long while.\n\t\t\n\t\tShe stares back.\n\t\t\n\t\t\"Right.\"\n\t\t\n*comment\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "startup": "*title The Haze Under Windbrooke\n*author Jesse Freeman\n*scene_list\n\tstartup\n\t001_BurningCity\n\t002_AuntRaven\n\t002_AdamRourke\n\t003_Aftermath\n\t004_TheHaze\n\t005_Victory\n\t006_Training\n\t$ 007_FreeDayWithJoan\n\t$ 007_VisitingAdam\n\t$ 007_RavensWorld\n\t$ 008_DivingIn\n\t$ 009_SkylongMall\n\t$ 010_OctoberFirstDay\n\t$ 010_sub_ElrinPickup\n\t$ 010_sub_VampireNight\n\t$ 010_sub_RavenRendezvouz\n\t$ 010_sub_WerewolfNight\n\t$ 010_sub_ScourgeBase\n\t$ 010_sub_TheUnion\n\t$ 010_sub_JoiningTheUnion\n\t$ 010_sub_RescuedFromUnion\n\t$ 011_OctoberFirstWeek\n\t$ 011_sub_OpeningText\n\t$ 011_sub_AfterAction17th\n\t$ 011_sub_Hospital\n\t$ 011_sub_AfterHospital\n\t$ 011_sub_PoliceStation\n\t$ 011_sub_AfterPolice\n\t$ 011_sub_FreeDay\n\t$ Final\n\t$ BadEnd_Contact\n\t$ BadEnd_Elrin\n\t$ BadEnd_Angeline\n\t$ BadEnd_Albert\n\tsub_XPGet\n\tsub_DieRoll\n*comment\n\n\n*comment People\n\n*comment Raven Lilia - Player's aunt.\n\n*comment Adam Rourke - Family friend. Close to player's father. Professional monster hunter.\n\n*comment Joan Catalan (The Knight) - girl who attends the same school as the protagonist. Tiny and powerful. Braided red hair.\n*comment Knight form has gold armor, and a blue cape. Can only be romanced by female protagonists.\n\n*comment James ??? - Aging police officer. Friend of Adam.\n\n*comment Mrs. Chandler - Substitute teacher.\n\n*comment Professor Gestalt - Created the pocket dimension located out of Windbrooke.\n\n*comment Yvonne ?? - woman that works closely with Raven. They have an old friendship.\n\n*comment Edward - 20ish - new hunter-in-training at cabin. Afro, heavily scarred.\n\n*comment Elrin ?? - 22 - Elv-ish species - He is a vassal to Raven, ordered to watch protagonist while she is working - Very pale skin, slight green\n*comment tint - Tall and very thin - White hair tied into a braided ponytail. Can only be romanced by male protagonists.\n\n*comment Clara Remington - ?? (Appears 20-30) - An important figure at the vampire estate. A beautiful young woman. Knows Raven, though not\n*comment on a personal level. Swept back black short hair. Commonly wears high-quality makeup.\n\n*comment Rita ?? - 19 - Vampire - A punk woman who regularly visits the vampire estate. Flirtatious. Romance-able by either male or female protagonists.\n*comment Works for the scourge.\n\n*comment Lucas ?? - 20 - Werewolf - A young werewolf who works at the werewolf compound. Dark skin, bald. Works for the scourge. Can sense the haze.\n*comment Works as a plant in The Brotherhood.\n\n*comment Angeline ?? - 45 - Sorceress - A scarred woman that leads The Scourge. Has a burn over one eye, but her vision isn't effected.\n\n*comment River ?? - 12 - Elv-ish species - A very young girl attacked by Mr. Barrow. Has long green hair. Is missing her right arm. Is scarred from her assault.\n*comment is wheelchair bound from her assault.\n\n*comment ?? Barrow - 50(?) - Human - Attempted to murder River for not being a human. Old and overweight. Owns an antique store before his death.\n\n*comment Toby ?? - Human - 19 - A young member of the Unity of Humanity. Can be romanced by either male or female characters. Short blond hair, weak physique\n\n*comment Laura ?? - Human - 18 - A young nun working for Father Albert. Has been blessed by the angels.\n\n*comment Father Albert - Human - 65 - The leader and founder of the Unity of Humanity. Adopted Toby and Abigail after seeing potential in them.\n\n*comment Chief Wilter - Human - 60+? - The chief of Windbrooke's police department.\n\n*comment Divina Earthbringer - Fashion Expert\n\n*comment Annabelle ???(formerly Cohen) - Former wife of Simon Cohen. Changed her last name after disappearing on him. Mistakenly\n*comment believed to be dead by Simon. This was intentionally, as she sought to escape him.\n\n\n\n*comment Simon Cohen - Human(???) - 132 (age froze at 68) - Main antagonist.\n*comment A very lanky older man with graying hair. Has learned to manipulate the other world\n*comment after decades of research. His own mortality has been frozen.\n\n\n*comment Groups\n\n*comment The Scourge - A group of monsters that are fighting an ongoing battle against a similar human organization. Influenced by the haze to be more extremist.\n*comment They wear gray clothing, with red accents. They have bandannas that cover their mouth that depict jagged, monstrous teeth.\n\n*comment The Union of Humanity - A group of humans that are fighting an ongoing battle against a similar monster organization. Influenced by the haze to by more extremist.\n\n\n*comment Places\n\n*comment Windbrooke - Main city of story. Suffering from civil unrest and human/monster racial tensions. Plagued\n*comment by a malevolent supernatural force.\n\n*comment Raven Lilia's Magic Emporium - Raven's magical store. 2 story building. Raven's home is on top of it.\n\n*comment Hunters Lodge - Owned and operated by Adam Rourke\n\n*comment Skylong Mall - Mall within Windbrooke.\n\n*comment Isle of Yggdrasil - A pocket dimension with exits reaching out into Windbrooke, amongst other places.\n\n*comment Elgard Theater - Popular theater within ???\n\n*comment Vampire Estate - An estate set in its own pocket dimension. Acts as a meeting hub for vampires across the country.\n\n\n*comment Haze Monsters\n\n*comment Hollow - A weak creature vaguely resembling a human. Poor senses, but quite fast and strong. Staggeringly low tolerance for damage.\n\n\n\n\n*comment -- Game Planning --\n\n*comment The player dives into an otherworld at various locations around town. Completing these dungeons frees the city from the haze. The\n*comment player must prepare themselves for this dungeon before hand, clearing all available dungeons before a deadline arrives.\n\n*comment Training and Bonding - The player has a limited number of opportunities to train themselves, either with Adam Rourke for weapon skills, or\n*comment Raven Lilia for magic. The player also has opportunities to bond with their team mates and friends. When it comes to bonding, the player\n*comment will steadily unlock special scenes with their bonded team mates. They can also choose to hang out with them in a more generic fashion\n*comment when no scenes are available.\n\n*comment Entering the Dungeon - The player has multiple dungeons to choose from. Some dungeons inherently have higher difficulty to them.\n\n*comment Exploring the Dungeon - The player slowly makes their way through the dungeon, fighting monsters and making discoveries. Discoveries\n*comment involve seeing memories of events that occurred in the normal world, and bled into the otherworld. Seeing these events help the\n*comment learn more about what is happening and what to do, advancing the story.\n\n*comment On Discoveries - When players find a discovery and after viewing the associated scene, a snippet of conflict from the real world,\n*comment the characters will discuss what they've seen at their main base. These discovers give the player forewarning of upcoming threats\n*comment and give details on how to deal with them and what the deadline is.\n\n*comment On Combat - The dungeons themselves are host to strange monsters that must be overcome to complete them. Battles play out by using\n*comment a dice system to dictate combat. The player and enemies make 'effort' rolls. Whoever has the higher effort inflicts damage against\n*comment their opponent. The impressiveness of the attack is based on the difference between their effort rolls. Stronger enemies get better\n*comment dice. The player can receive bonuses to their own rolls based on skill level. If the player's health drops below 1, they'll fall and\n*comment they will be booted from the dungeon.\n\n*comment Dice Rolls - The player and enemies roll 20 sided die as effort rolls, trying to beat each other's number. A 20 results in a critical\n*comment hit, and a 1 in a stumble, which places the character in a vulnerable position.\n\n*comment Surviving the Dungeon - The player will steadily lose health as they navigate a dungeon. They can restore their health with potions\n*comment that Raven teaches them how to make via magic. Potions require spending a day brewing, but the player will refill their stock to\n*comment a maximum of 3. Drinking a potion will fully restore the player's health.\n\n*comment Completing a Dungeon - The dungeon ends when the player destroys the last haze sphere. Doing so will help the city recover, and give\n*comment the player an important discovery.\n\n*comment -- Game Planning --\n\n\n*comment -- Player Stats --\n\n\n*create fiName \"???\"\n*create laName \"???\"\n\n*create sex \"???\"\n*comment either 'fe' or 'ma' are used as strings for this variable.\n\n*create race \"human\"\n*comment\tavailable: human - vampire - werewolf -\n\n*create maxWill 10\n*create will 10\n*create passesWill 0\n*create wordWill \"\"\n\n*create maxHealth 100\n*create health 100\n\n\n*create style \"\"\n*comment can be 'warrior', 'spellsword, or spellbow.\n\n\n*comment -- Player Stats --\n\n\n\n\n*comment -- Skills --\n\n*comment the player learns skills from Adam Rourke. These involve gaining proficiency with a bow or with a sword, and are useful in battle.\n\n*create sklFencing false\n*comment If true, the player knows the basics of sword fighting.\n\n*create sklFencingFirst false\n*comment If true, the player knew how to fence first.\n\n*create sklFencingLvl 0\n*create fencingXP 0\n*create fencingTraining 0\n\n\n*create sklArchery false\n*comment If true, the player knows the basics of using a bow and arrow.\n\n*create sklArcheryFirst false\n*comment If true, the player knew how to use a bow first.\n\n*create sklArcheryLvl 0\n*create archeryXP 0\n*create archeryTraining 0\n\n*comment -- Skills --\n\n*comment -- Magic --\n\n*comment The player learns magic from Raven.\n\n*create sklBrewing false\n*comment If true, the player knows how to brew potions\n\n*create itmPotions 0\n*comment the number of potions the character is carrying\n\n*comment -- Magic --\n\n\n*comment -- Combat --\n\n*create playerCrit false\n*create playerWeapon \"\"\n*comment Can be either \"sword\" or \"bow\".\n\n*create enemyBonus 0\n*create enemyHealth 0\n*create enemyAttack 0\n*create enemyDice 0\n\n*create stateClose false\n*create stateEdge \"\"\n*comment Can be either \"player\" or \"enemy\".\n*create stateCanMelee false\n\n*comment -- Combat --\n\n\n*comment -- Meta --\n\n*create location \"\"\n*comment Used in the week file list to organize gosub commands.\n*comment can be, \"Elrin\", \"Scourge\", or \"Union\"\n\n*create m_PocketWorlds false\n*create m_KnowYggdrasil false\n\n*create m_KnowBoys false\n\n*create m_KnowElrin false\n\n*create m_KnowRica false\n*create m_KnowScourge false\n*create m_KnowRiver false\n*create m_KnowLucas false\n*create m_KnowAngeline false\n\n*create m_KnowUnion false\n*create m_KnowParents false\n*create m_KnowFather false\n\n*create m_JoanRomance false\n\n*create m_Day 17\n\n*create GoodEnd true\n\n*comment -- Meta --\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*comment -- Event Flags --\n\n*create dice 0\n*comment dice used to randomize combat slightly.\n\n*create enemy 0\n*comment use to keep track of enemy unit count.\n\n*create wound 0\n*comment use to keep track of injuries.\n\n*create random 0\n*comment Use it when you need a random number\n\n*create count 0\n*comment Use it when you need to count steps\n\n*create statCount 0\n*comment Use it in the stats screen for xp graphic generation.\n\n*create string \"\"\n*comment Use it to hold a string variable when needed.\n\n\n*comment ---\n\n\n*comment ----- GLOBAL -----\n\n*create f_global_HollowInsides false\n*comment if true, the player has seen text indicating the hollow don't have any organs or bones.\n\n*comment - alked about the haze in front of Professor Gestalt.\n\n*comment ----- SCENE 007.RAVEN -----\n\n\n*comment ---\n\n\n*comment ----- SCENE 008 -----\n\n*create f_008_NightPlans false\n*comment When true, the player has plans for the following night to meet their vampire/werewolf kin.\n\n*create f_008_Time 1\n*comment A marker for how much time has passes in the scene. REMOVED\n\n*create f_008_Skylong false\n*comment When true, the player dived into Skylong mall. REMOVED\n\n*create f_008_NatureTrail false\n*comment When true, the player dived into the nature trail. REMOVED\n\n*comment ----- SCENE 008 -----\n\n\n*comment ---\n\n\n*comment ----- SCENE 009 -----\n\n*create f_009_ShadowsHelp false\n*comment If true, the player accepted the shadow's help willingly.\n\n*comment ----- SCENE 009 -----\n\n\n*comment ---\n\n\n*comment ----- SCENE 010_SUB.VAMPIRE -----\n\n*create f_010_UnwillingVampirism false\n*comment if true, the player told Rica they didn't turn willingly.\n\n*create f_010_MyAuntRaven false\n*comment if true, Rica learned the player has an aunt named Raven Lilia.\n\n*create f_010_RitaKnowsRaven false\n*comment if true, Rica learned the player is related to Raven Lilia.\n\n*create f_010_RitaAndHaze false\n*comment if true, Rica was told the player's entire story, about the otherworld, and everything.\n\n*comment ----- SCENE 010_SUB.VAMPIRE -----\n\n\n*comment ---\n\n\n*comment ----- SCENE 010_SUB.SCOURGE -----\n\n*create f_10_Chat \"\"\n*comment Who the player chats with at the cavern rift. Can be either \"Lucas\", \"River\", or \"Angeline\"\n\n*comment ----- SCENE 010_SUB.SCOURGE -----\n\n\n*comment ---\n\n\n*comment ----- SCENE 011 -----\n\n*create f_11_TrainedAdam false\n*comment If true, the player visited Adam at least once.\n\n*create f_11_TrainingPartner \"\"\n*comment denotes who is joining the player for training. Can be, \"Joan\", \"Elrin\", \"Lucas\", \"Rita\", \"Toby\", or \"Laura\"\n\n*comment -\n\n*create f_11_UnlockedHospital true\n*comment If true, the player has unlocked the hospital as a dungeon.\n\n*create f_11_DivedHospital false\n*comment If true, the player dived into the hospital at least once.\n\n*create f_11_CheckpointHospital \"start\"\n*comment Used to create checkpoints in the hospital\n\n*create f_11_DefeatedHospital false\n*comment If true, the player is died in the hospital and needs to reattempt a section.\n\n*create f_11_AfterHospital false\n*comment If true, the player has seen the after action scene for the hospital.\n\n*comment -\n\n*create f_11_UnlockedPolice false\n*comment If true, the player has unlocked the police station as a dungeon.\n\n*create f_11_DivedPolice false\n*comment If true, the player dived into the police station at least once.\n\n*create f_11_CheckpointPolice \"start\"\n*comment Used to create checkpoints in the police station\n\n*create f_11_DefeatedPolice false\n*comment If true, the player is died in the police station and needs to reattempt a section.\n\n\n\n\n\n\n*comment ---\n\n\n\n\n\n\n*comment ----- SCENE 011 -----\n\n\n*comment ---\n\n\n*comment ----- JOAN -----\n\n*create joanFlirt 0\n*comment Number of times player entered a flirty situation with Joan.\n\n*create joanFriend 0\n*comment Friendship level for Joan.\n\n*create joanFlirtingInVain 0\n*comment Flirted with Joan while male.\n\n*create joanRomanticMovie false\n*comment if true, the player took Joan to see a romance movie.\n\n*create joanPartner true\n*comment if true, Joan is available as a partner.\n\n*create joanTrained false\n*comment if true, the player saw Joan's training scene.\n\n*comment ----- JOAN -----\n\n\n*comment ---\n\n\n*comment ----- ELRIN -----\n\n*create elrinPartner false\n*comment if true, Elrin is available as a partner.\n\n*create elrinTrained false\n*comment if true, the player saw Elrin's training scene.\n\n*comment ----- ELRIN -----\n\n\n*comment ---\n\n\n*comment ----- RITA -----\n\n*create ritaFriend 0\n*comment Friendship level for Rica.\n\n*create ritaPartner false\n*
