.\" How do I explain this? \"They're bad people,\nbut they're about to be taken out. Permanently. You need to bring mom here so-\"\n\n\"What?\" Dad's voice sounds grave. \"There are people coming here? Right now?\"\n\n\"...Well, no. Not yet.\" I need to keep this conversation on track. \"But they are coming. You need to get\nmom so I can get the two of you somewhere safe.\"\n\n\"Hm.\" Dad keeps looking past me, like he's trying to see something. \"You came here alone?\"\n\nMy phone buzzes in my pocket. when I look at it there's a message from Rita.\n\n'I don't want to alarm you, but our guy on the inside? I'm pretty sure he's fucking dead. Act calm, and slowly\nwalk backwards. I'll take care of the rest.' -Rita-\n\nAre they watching us?\n\nI look at dad. He really does seem like he's on the verge of having a panic attack right now.\n\nAre they forcing him to do this?\n\nI need to tell him to move back toward the tree line with me. \"Dad-\" Wait... they still have mom. \"Dad...\" what do\nI do?\n\n*if (sex = \"fe\")\n\t\"Honey.\"\n*if (sex = \"ma\")\n\t\"Son.\"\n*comment\nDad's voice nearly cracks, but he manages to compose himself. \"Listen. I've... I've heard things. It looks like you've\nfallen in with a bad crowd.\"\n\nDoes he know I'm working with that other group? Admittedly, they are a pretty rough crowd.\n\n\"We can still help you. Just come with me.\" He smiles. As nervous as he is it's oddly genuine. \"You're not one of them. You\ndon't belong there. But these people...\" he point to the compound behind. \"Why... they're some of the best people I've\never met. They care about our kind. They're fighting for human kind.\"\n\n\"But they've killed people!\" I blurt out. \"And I'm not even human anymore, so what does it even matter?\"\n\nHis smile falls immediately. \"What do you mean?\"\n\n\"I- huh? Oh.\" Right. I guess he doesn't know yet. \"I got bit by a vampire during the riots in Windbrooke a while\nback.\"\n\nDad looks noticeably horrified. \"B-but... that doesn't mean-\"\n\n\"I've already confirmed it,\" I say. \"I'll turn. Eventually.\" Probably any day now that I think about it.\n\n\"No, no, no...\" dad slowly backs away. \"That can't be right...\"\n\n\"Dad-\"\n\n\"It's that damned Raven's fault. I- we knew you shouldn't have been spending any time with her. Everything she does i-is...\"\n\n\"Calm down!\" I take a step forward. \"Just-\"\n\nHe takes several steps away. \"I can't...\" He's hyperventilating now. \"I can't believe...\"\n\n\"Dad.\" My phone is buzzing in my pocket incessantly. I don't bother looking at it.\n\nA truck suddenly pulls out of the compound. Multiple people are on it. All of them are armed.\n\n\"I'll come back for you,\" I say, stepping back into the woods. \"I promise!\"\n\nI hear a gunshot ring out as I break into the woods.\n\n*page_break\n\nI don't make it more than a few steps before someone knocks my legs out from under me and picks me up.\nWhoever it is is carrying me off very rapidly. Twigs and branches cut against my arms as we go.\n\nI keep my eyes clenched shut until we stop moving.\n\nI'm unceremoniously dropped on the ground by... Rita.\n\nHuh. apparently she's quite strong. \"Thanks.\"\n\n\"Your welcome.\" Rita sounds exasperated. \"Why did you take so long to bail out? That was obviously a trap.\"\n\n\"I was...\" I groan as I stand up. \"...trying to help my dad.\"\n\nRita says, \"He didn't seem that interested in helping you.\"\n\n\"He'll come around,\" I look around. \"I just need to get him away from those people.\" Oh good the truck's nearby. \"I just\nneed to...\" There's a lot of blood around the passenger side door.\n\nI walk over and open it.\n\nThere's a man in the seat. He's uh... he's pretty bloody.\n\nHe barely looks older than me. He's wearing the same sort of camouflage clothing the people from that compound were wearing, but\nhe's been shot multiple times. He's still breathing, but he doesn't look like he's awake.\n\n\"This was your mole?\" I ask.\n\nRita walks up next to me. \"Yeah. He's not human obviously, which in this case is pretty lucky. Otherwise he wouldn't\nhave even reached me out here.\"\n\n\"Is he going to make it?\"\n\n\"He's tougher than he looks,\" Rita says. \"He can heal from that. C'mon. We still need to get him back so our people\ncan patch him up properly. We also need to decide what to do from here.\"\n\nI nod. \"Right.\"\n\nWe pile back into the van and make our way back to that cave. The guy doesn't move an inch during the whole drive back.\n\n*page_break\n\nRita waits for help to show up. \"Sorry to ditch you out here, but I really need to get back in there.\"\n\n\"It's fine,\" I say. \"I'll call Elrin.\"\n\n\"Wait for my call,\" she says. \"I'll need to meet up with all of you again to discuss how we're going to stop them.\"\n\nI nod. \"I'll be waiting.\"\n\nEventually help does show up. That guy is loaded up onto some sort of carrier, and Rita leaves with them.\n\nIt isn't much longer before Elrin shows up to bring me back to his place.\n\nI need to find a way to help mom and dad. These people I'm working with might actually kill them before I can save them.\nI might need to do that part on my own.\n\n*page_break\n\nThe days pass...\n\nRita goes over plans with us. It eventually becomes painfully obvious we won't be involved in the actual fighting at all,\nwhich I guess it understandable.\n\nthe only things I've ever killed are weird monsters in that haze-filled world. I wouldn't be able to murder another person,\neven if they were planning to kill people themselves.\n\nI'm fairly certain the only reason we are involved at all is because we provided the initial information the Scourge needed\nto beat this group.\n\nAlso we saved them from becoming mass murderers. I imagine that won us a few points.\n\nRita only ever goes over the plan with us at the warehouse/HQ. She never did show us what their base looked like inside that\ncave. Maybe that's for the best.\n\nTheir mole eventually tells us that the extremist group we'll be going up against is still committed to their attack, though\nthey are expecting us to try to intervene.\n\nAs the day of the attack nears, our side gets ready to attack.\n\nAnd that's when I find myself in front of the Unity of Humanity's compound. In the dead of night. Alone.\n\nThe Scourge will murder my parents during their attack if I can't get them out of here.\n\n*page_break\n\nThe compound is surrounded on all sides by concrete walls. There's not really anything else to say about it. There are\nno signs, no flags, nothing. It's the most inconspicuous location I've ever seen. Unfortunately, there isn't really\nany high ground around the compound, so I can't see inside it at all.\n\nOn the plus side, the front gate is open. So I can get inside.\n\nI already know the layout of the compound however. We've been going over this with Rita for ages now, and there's only a few buildings.\nA large mess hall, a gym, a dormitory, and the church.\n\nI take a step toward the gate. A chill runs down my spine.\n\nI can feel the haze.\n\nMy vision become foggy. No that's not right...\n\nI can [i]see[/i] the haze.\n\n\"What the hell...\"\n\n*page_break\n\nA strange fog lifts up out of the ground. I can feel the haze emanating from deep below the earth. It comes out in crashing waves one after\nanother. There's no limit to it.\n\nIt's never been this thick.\n\nMy lungs burn. My arms and legs suddenly feel weak.\n\n\"Just focus on resisting it... just focus on resisting it...\" I mentally push against the haze, and I feel my strength return.\n\nThe haze is concentrated on the compound. It's so thick I can't even see past the front gate.\n\nMy grip tightens.\n\n...I'm holding my weapon.\n\nI stare down at it. It's here. Right here. In my hand.\n\nIn the real world.\n\n\"This is probably very bad...\" I run through the front gate.\n\n*page_break\n\nThere are several people all around me. They're dressed in camouflage and carrying assault rifles. They\nwere all facing the open gate.\n\nThey're all on their hands in knees. They twitch and convulse. I see multiple people vomit up some sort\nof black... substance. I see black smoke rising from their bodies as their flesh tears open. A mixture\nof blood and black ichor pours out.\n\nScreams come from somewhere further inside the compound.\n\nI need to find mom and dad. Right now.\n\n*page_break\n\nI move aimlessly. We went over what the compound looks like, but I can't remember anything now. I can't see anything\neither.\n\nAs I'm running I slam into a figure. We both fall.\n\nIt's... a man. I think.\n\nHis flesh is torn open as smoke and ichor pour out of him. His eyes are completely white. He twitches as he rises to\nhis feet.\n\nHe has an assault rifle in his hands.\n\nHe won't stop twitching.\n\nHis gun snaps up.\n\n*if (style = \"warrior\") or (style = \"spellsword\")\n\t\n\tI lunge forward.\n\t\n\tI cut off his arm with one slash.\n\t\n\tIt isn't like fighting those things in the other world. His body isn't hollow and filled with slime.\n\n\tBone and marrow hang from the edge of his arm. My blade didn't so much slice cleanly through it as it seared\n\tthrough the end of his arm. The burns don't stop his arm from bleeding profusely at all.\n\t\n*if (style = \"spellbow\")\n\tSomehow I'm faster, and I fire a single shot into his skull.\n\t\n\tThis isn't like the other world's creatures. His body isn't hollow and filled with black tar. Blood trickles down his face.\n\tI can see bits of skull exposed in the wound as the light arrow vanishes.\n*page_break\n\nHe isn't screaming in pain. He doesn't even wince.\n\nHe takes a step toward me. Then another. his movements are jagged and awful.\n\nAnd then he stops.\n\nHe doesn't move. He doesn't twitch.\n\nEventually, he falls backwards.\n\nThis isn't some monster...\n\nThis man was...\n\n*page_break Focus\n\nWhere are they? Where would they be?\n\nIt's the middle of the night. Dormitories. They're sleeping somewhere.\n\nBut where are the dorms?\n\n*page_break Think! Think!\n\nThe map... Rita showed it to me...\n\nNorth West corner.\n\nWhich way is north west?\n\nThe gate was on the left side of the map...\n\nI make a sharp left turn. It's somewhere to the left of the front gate.\n\n*page_break\n\nGunshots ring out as I sprint forward. The fog is too thick to make out anything more than the occasional silhouette around\nme. I can't even see the muzzle flash of their guns.\n\nAt least they don't seem to be shooting at [i]me[/i].\n\nI nearly run face first into a wall. It's not the concrete outer wall though. I've found a building.\n\nThe haze is getting thicker.\n\nI run around the wall until I find a set of double doors. Their both plain and made of metal.\n\nI yank on the handle, but they only budge a little. Something is holding them shut on the other side.\n\n*if (style = \"warrior\") or (style = \"spellsword\")\n\t\n\tI raise my sword up, and slash vertically between the two doors.\n\n*if (style = \"spellbow\")\n\t\n\tI let a charge of energy run into my arm. I'm still not entirely sure how this works yet...\n\t\n\tI punch forward, and the energy explodes into the door frame.\n\t\n*comment\n\nI hear the sound of something shattering as the door slams open.\nA bullet flies by and I duck out of the way just in time.\n\nI don't have time to screw around with this. If I can materialize a weapon, then I can probably do\neverything else I was able to do in the otherworld too.\n\nI take a deep breath. I've got to be fast here.\n\nAs fast as possible.\n\nFocus on it.\n\nA trembling energy creeps up my legs. I spring forward.\n\n*if (style = \"warrior\") or (style = \"spellsword\")\n\t\n\tThe haze isn't as thick inside the building. Two figures are dead ahead, both aiming their rifles at the front door.\n\tLight flashes. I sidestep one bullet. The others miss completely.\n\t\n\tI close the distance between one of them, and slice through its throat.\n\t\n\tI cut at the knee of the next one. It buckles. Barely. I take a desperate stab at its skull. The blade\n\tgoes through, I let the weapon disappear from my grasp.\n\n*if (style = \"spellbow\")\n\t\n\tI generate my bow. The two are about to shoot again. I fire an arrow at the left one's skull. It hits.\n\t\n\tThe last one fires blindly in my direction. The bullet just passes by my face.\n\t\n\tI spring forward, and the distance between us just seems to vanish. I fire an arrow close up into its face, and\n\tit falls.\n\t\n*comment\n\nI stare at their corpses.\n\nChrist... what if mom and dad are like this too?\n\nMy phone starts buzzing in my pocket, but I ignore it as I start searching the rooms.\n\n*page_break\n\nThis place is completely empty. I checked all the rooms and nobody is in here. I didn't even see any more monsters.\n\nI'm about to reach for my phone when I hear something crash upstairs, followed by a lot of swearing. I'm pretty sure\nI'm on the top floor though.\n\nIt takes some looking around, but I do eventually find a hatch that leads to the attic. When I yank it open a ladder\nfalls down and a gunshot rings out from somewhere above me.\n\nI flinch, but I'm completely fine. In fact... I don't think a bullet even passed me.\n\n\"Wait for one of those things to come up here you idiot!\"\n\n\"It opened the hatch!\"\n\n\"It's not up here yet! You're shooting thin air!\"\n\n\"How was I supposed to know!?\"\n\nI stand there, staring up at the now open attic for several seconds. \"Hello?\"\n\nI hear two gasps. \"Holy shit! They can talk.\"\n\nMy jaw clenches. I force myself to calm down before speaking up. \"I'm not one of those things!\"\n\nThere's a brief silence before I hear one of them. \"You've gotta hide! We blocked the front door, but\nthere's two of those things inside!\"\n\n\"Don't tell them to hide! They'll come up here and lead those things straight to-\"\n\n\"THEY'RE ALREADY DEAD!\" I shout. \"Alright!? It's done. You're safe.\" Well... not really. I forced\nthe front door open, so more of those things might come inside.\n\nThere's another long pause. \"Are there more outside?\"\n\n\"I don't know,\" I say. \"Probably. Can I come up? It's hard to have a conversation like this.\"\n\n\"...Fine.\"\n\n*page_break\n\nWhen I climb up the ladder I find a mostly empty attic. Several boxes are stacked in the corner, and it takes\nme a few moments to realize two men are hiding behind it.\n\nThey're both wearing camo gear. One has a pistol. The other isn't armed.\n\nThe armed one is a bit on the big side. He's got a long, not particularly well kept beard. His hands are shaking\nand he looks like he's ready to use that gun. Thankfully, he doesn't look like he's particularly hostile\nto me.\n\nHis friend is a lot lankier, and is just barely peeking over their mountain of boxes at me. \"You... you're not one\nof us.\"\n\n\"No, I'm not,\" I step forward. \"What happened?\"\n\n\"We don't know,\" the armed one says. \"Some sort of weird fog came up out of the ground... everybody started acting real funny\nfor a second... and then they turned into those things.\"\n\n\"So, you barricaded yourselves in here while that was all happening?\" I ask.\n\n\"We just tried locking the door at first, but the people we had in here with us changed too.\"\n\nI look both of them over. \"But you two didn't...\"\n\n\"No.\" the lankier one says. \"And thank god for that. I don't know why, but I guess someone must be looking out for us.\"\n\n\"No kidding,\" I say. \"You were lucky this building was basically empty, or you would of been overrun.\"\n\nThe lanky one nods. \"The others already moved out. Hopefully this... demonic magic, or whatever the hell\nit is hasn't reached them too.\"\n\nI stare at him. \"Moved out?\"\n\nThe bigger one elbows his friend. \"Be quiet. We shouldn't be talking like that in front of strangers.\"\n\n\"Excuse me a moment.\" I back away from them and check my phone... which didn't actually ever stop buzzing.\n\n*page_break\n\nIt appears I've gotten a torrent of status updates from Joan.\n\nThe first one reads:\n\n'GET BACK TO WINDBROOKE. RIGHT NOW. OTHER WORLD MONSTERS ARE ATTACKING. THEY HAVE GUNS.' -Joan-\n\nSo. Whatever affected these people here did spread to the rest. Who all moved out to attack earlier\nthan we were expecting.\n\nThis is really bad.\n\nI don't waste any time bolting out of that compound. I hate to leave, but I don't even know if my parents are here.\n\n*page_break\n\nI steal a jeep that was left in the compound. I took the bus to get as close as I could to this place, then walked\nthe rest of the way. I can't waste that much time getting back.\n\nI've never driven before, but I somehow manage to make it back to Windbrooke with... minimal damage to the jeep.\n\nPolice sirens fill the air, as does a thick haze. It's not as bad as it was at the compound however. I can actually see down\nthe street out here.\n\nThere isn't any damage done to the city as I'm driving toward the sounds of sirens. Nothing is on fire. Nobody is dead.\n\nI actually don't see anybody at all. After the rioting from a while back, I think everyone has figured out that they\nshould stay off the streets during something like this.\n\nGunshots ring out in the distance. As I'm driving along I do eventually see the first sign of trouble.\n\n*page_break\n\nAn overturned car is on the sidewalk. A massive amount of damage has been inflicted on the side of it. I think someone\nmust have driven into it at full speed.\n\nThere's a truck awkwardly parked next to it. The vehicle has a suspicious amount of damage done to the front of it. I\ndon't see the driver anywhere.\n\nI keep going, but slow just long enough for my eyes to drift over the pool of blood forming over the overturned car.\nWhoever was sitting in there isn't okay.\n\n...I need to hurry up.\n\n*page_break\n\nI drive as far as I can before I hit a police road block. Disconcertingly, there's not any officers around it. At all.\n\nThere are multiple cars backed up behind the blockade. Some of the cars have been abandoned, but a few still have people staying low\ninside them.\n\nThere are a lot of gunshots coming from somewhere not far down the road, just past that blockade.\n\nI get out of the jeep and get a leg on in that direction.\n\n*page_break\n\nThe haze is subtly thicker the further I go. The destruction increases too.\n\nPeople are dead. Buildings are burning. There's a disturbing large number of police officers that have already died.\n\nThey aren't the standard patrolmen either, these people are in full riot gear. They're carrying much heavier fire power\nthan normal.\n\nGun shots keep ringing out ahead.\n\nI find myself in front one of the city's parks. Various figures have are in front of it, with their backs turned\ntoward me. They're carrying firearms and an assortment of other weapons with them.\n\nThey don't look like the police...\n\nMy eyes strain against the fog to make out more details, until I see Joan amongst the group.\n\nShe's in her full armor. \"$!{fiName}! Finally.\" She sprints over to me. \"Things have been [i]really[/i] bad! That cult\nlaunched its attack early! And then... I don't know! Everybody started turning into monsters!\"\n\n\"Are you alright?\" I ask.\n\n\"Obviously,\" Joan says, motioning to herself. \"But a lot of other people...\"\n\n\"I saw,\" I say. \"What's going on over there?\"\n\n\"That priest is still alive,\" Joan states. \"With his people. They're all holding out in that park.\" She looks\nback at the line. \"Everybody is getting ready for the last push...\"\n\nThe rest of the people here are all from Angeline's group. Some of them loom pretty bloodied...\n\n\"Let's get moving,\" I say. \"I think we can end all of this.\"\n\n*page_break\n\nJoan and I leave the others behind. However, as we're entering the park, Elrin unexpectedly steps up beside me.\n\n\"You didn't think I'd let you charge off into danger all by yourself?\"\n\n\"Elrin... this is too dangerous.\" I generate my weapon. \"But Joan and I can make ourselves stronger from the haze-\"\n\nElrin makes his staff appear. \"So can I, and I'm not leaving this all up to the two of you. I made a promise to your\naunt to look after you, and I intend to honor.\"\n\nHe's not going to back down. \"Heh.\" I smile. \"Well, you definitely don't want Raven angry at you. Are you ready for\nwhat's next?\"\n\n\"Probably not,\" Elrin states plainly. \"But I'm afraid we must charge forward regardless.\"\n\n\"Hey, that's the spirit!\" Joan cheers.\n\nThe three of us march forward. I can't imagine what's coming up.\n\n*page_break\n\nGenerally speaking, the park is in much better condition than the rest of the city. Nothing is on fire, and there's no\nobvious damage. It's night, so there likely weren't many people here when this all started.\n\nThis park is a little more overgrown compared to what I'm used to. Simple paved paths wind around the park,\nwith the occasional bench to sit at. Lots of flowers beds are planted all around. There's lots of trees, so much so they're\nblocking quite a bit of vision, though I can barely make out some distant light near the center of the park through them.\n\nIt's uncomfortably quite right now. Especially since we keep seeing corpses the further in we go.\n\nSome of them are wearing mostly white uniforms, undoubtedly people from Angeline's group. I'm seeing some in camo gear too. Probably\nfrom father Albert's. I'm seeing multiple fallen officers too. It looks like almost everybody was killed by gun fire.\n\nThe only exception is father Albert's people. Some have been shot, but I'm seeing a multitude of other sorts of injuries. Some\nare burned, some are cut open. One is even frozen near solid.\n\nAngeline can use magic can't she? She must have been busy before they were forced back.\n\nI hear voices as I get closer to the center of the park.\n\n*page_break\n\nWe duck down and move through the bushes. Near the center of the park is large fountain. Father Albert angrily " I hesitate. \"What do you-\"\n\nFather Albert's movements are blindingly fast. He closes in on me in an instant. He's got a gorgeous silver sword in his hand,\nI didn't even see where he drew it from.\n\n\"Die demon!\" His face is contorted in fury. He stabs forward.\n\nJoan slams her shoulder against the priest, sending him sliding backwards.\n\n\"Thanks,\" I say breathlessly. That probably would have impaled me if she hadn't done that.\n\n\"Stay focused,\" Elrin says. \"This man isn't to be trifled with.\"\n\nI take a deep breath. Just focus on what's happening now. Everything else will work itself out after.\n\n*page_break\n\n\"Disgusting... disgusting... disgusting... disgusting!\" father Albert makes a lunge toward me again. His rage\nin incredible.\n\n*fake_choice\n\t#Meet him head on. I'm confident I can stop him in his tracks.\n\t\t\n\t\tI will a buzz of energy up and through my body. We meet in an instant.\n\t\t\n\t\tHis sword crashed against mine. He's old, but there's a tremendous strength within him. He's\n\t\tactually managing to push me back, inch-by-inch.\n\t\t\n\t\tThankfully Joan slips in for the assist, and cracks him across the jaw with her gauntlet.\n\t\t\n\t\tAs strong as father Albert is, he doesn't take the blow well, and is noticeably staggered from the hit.\n\t\t\n\t\tThere's a fine line of blood dripping from his mouth.\n\t\t\n\t\t\"You... I am the voice...\"\n\t\t\n\t\tElrin darts in and rapidly clobbers father Albert with a series of strikes. His attacks are impressively rapid and precise.\n\t\tI can't even make out where all he's hitting him, though I think it's fair to say 'all over'.\n\t\t\n\t\tThe man falls back, and collapses.\n\t\t\n\t#Move back. One of the other two can clip him as he's going by.\n\t\t\n\t\tI leap backwards as father Albert charges in.\n\t\t\n\t\tElrin and Joan beautifully move in with perfect timing to stop him.\n\t\t\n\t\tJoan crashes her gauntlet against his face, as Elrin brings his staff against the man's knees. Father Albert\n\t\tis flung back with a sickening crunch.\n\t\t\n\t\tHe's lying flat on the ground. There's quite a bit of blood on his face right now.\n\t\t\n\t\t\"I... I am... the voice... I am the voice...\"\n\t\t\n*comment\n\n\"Don't get up,\" Joan pounds her fists together.\n\nElrin lowers his guard a bit. \"He's quite injured from that.\"\n\n\"We can get him help once everything else is cleaned up,\" I say.\n\nThe man is still mumbling to himself. \"I... I am... I am...\"\n\nJoan steps toward him. \"Will you shut the hell up?\"\n\n\"I... am...\"\n\nThere's a subtle shift in the air. I can't quite make out what it is.\n\nSomething is happening to the haze.\n\n*page_break\n\n\"I... I...\" In a sickening motion, father Albert lunges back to his feet. The movement is unnatural, and\nI can see his bones bending under his skin.\n\n\"I am...\" His flesh twists and melts around him. His voice distorts as I can his spine twisting around inside his neck. Haze\nseeps out from every pore of his skin. His arms give off the most awful cracking sound I've ever heard as they grow longer. The\nback of his shirt tears open as fleshy spindles of flesh work their way out. The bones and skin wrap around each other until\nhe's got two fleshy wings. They just keep growing larger and larger, until they dwarf his body.\n\nHe falls to his knees in a violent motion. He digs his fingers directly into the concrete walkway beneath him. His finger break\nagainst the pavement before claws force their way out, replacing his digits. His knees pop and bend as they grow longer. The\nstructure changes to look more like a beast.\n\nHis skin won't stop crawling. Somehow, despite the constant twisting and tearing his body is still undergoing, he stand up.\n\nHe's so much taller, towering over all of us. Haze and blood oozes out of him and floats away. Strands of blood wisp out of multiple\ntears in his body, but never fully disconnect. The crimson streams just float lazily in the air around him, twisting and curling\nendlessly.\n\n\"I. Am. The. Voice. Of. GOD.\" He barely sounds human. His face as contorted into something unspeakable awful.\n\n\"What the hell is happening?\" Joan is backing away from father Albert.\n\nDammit! I should have just destroyed his otherworld self...\n\nWe can't just run away. I don't even want to think of how much damage he could cause.\n\n*page_break\n\nHe's like some sort of freakish angel. Even as his flesh keeps shifting, he's standing tall as he looks over us. His\nlimbs seem far too long. There's something about the way he's carrying himself, there's a certain... smugness to it.\n\nLike he's looking down at us.\n\n\"Pathetic animals.\" His eyes rapidly dart between the three of us. \"Your struggling is pathetic. You face God's champion.\nI am blessed by the angels themselves.\" His voice is evening out somewhat, though it doesn't sound normal. There's\na certain animalistic edge to it.\n\nHe's just watching us. It looks like the ball is in our court...\n\n*fake_choice\n\t#Let's just dive straight into this. Hopefully he's not as strong as he looks.\n\t\t\n\t\tWithout saying anything, I spring forward. I briefly hear the other two gasp, I guess they didn't\n\t\tthink this was the right time to attack.\n\t\t\n\t\tFather Albert's head twists to the side ever so slightly.\n\t\t\n\t\tI'm not even sure what I'm trying to do here.\n\t\t\n\t\t*fake_choice\n\t\t\t#Stab him?\n\t\t\t\t\n\t\t\t\tIt's as good an idea as any.\n\t\t\t\t\n\t\t\t\tI will a potent energy into my legs before blazing forward. Even father Albert himself\n\t\t\t\tseems to have been caught off guard by that.\n\t\t\t\t\n\t\t\t\tI run my shining weapon straight through one of his elongated legs. A sudden burst of fog erupts out, followed\n\t\t\t\tby a trail of black slime that slowly oozes down his leg.\n\t\t\t\t\n\t\t\t\tJust before I can look up to see what his reaction is I'm suddenly swept aside by a powerful blow.\n\t\t\t\t\n\t\t\t\tI roll across the ground, but manage to regain my footing instantly.\n\t\t\t\t\n\t\t\t\tI'm not sure, but I think he struck me with one of his arms. He was strong enough to brush me aside pretty easily,\n\t\t\t\tbut I'm not hurt at all.\n\t\t\t\t\n\t\t\t\tfather Albert on the other hand is wincing as he stares down at the wound.\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#I could dive in for a second stab...\n\t\t\t\t\t\t\n\t\t\t\t\t\tNo time to second guess this, I rush in and stab his other leg.\n\t\t\t\t\t\t\n\t\t\t\t\t\tMy blade digs in deep, but he immediately responds by bringing two fists down on top of me. The\n\t\t\t\t\t\tforce behind those fists is incredible. And it feels like his mutated hands are made of stone.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI'm forced down onto me knees. This hurts really bad...\n\t\t\t\t\t\t\n\t\t\t\t\t\tCome on. You can recover.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI focus. Not on making myself faster or stronger, but just on making the pain drift away.\n\t\t\t\t\t\t\n\t\t\t\t\t\tA familiar energy wells up inside me.\n\t\t\t\t\t\t\n\t\t\t\t\t\tJust let it melt away...\n\t\t\t\t\t\t\n\t\t\t\t\t\tAnd it does. The pain drifts off to someplace far away. The burning pain fades into nothingness.\n\t\t\t\t\t\tI feel a strength return to me body.\n\t\t\t\t\t\t\n\t\t\t\t\t\t...Just in time for father Albert to kick me directly in the chest.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI'm sent rolling across the ground from the blow.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto label\n\t\t\t\t\t\t\n\t\t\t\t\t#I think Joan and Elrin are plotting something...\n\t\t\t\t\t\t\n\t\t\t\t\t\tFather Albert has his gaze locked on me, so I walk around him away from the other two.\n\t\t\t\t\t\tHopefully they have some sort of follow up planned...\n\t\t\t\t\t\t\n\t\t\t\t\t\tMy eyes drift back to his injured leg. I can still see haze rising out of it. It almost\n\t\t\t\t\t\tlooks like the wound is steaming.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThere's a flash of movement, and Joan has leapt up and punched directly into the knee on\n\t\t\t\t\t\tfather Albert's injured leg.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe blow is so hard it causes the knee to snap out of place. Splattering of black gunk\n\t\t\t\t\t\tescapes from a small tear in the flesh as more haze bellows out.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFather Albert completely buckles. He falls forward, barely catching himself with those\n\t\t\t\t\t\tweird elongated arms. He's hunched forward. His back is forming a bizarre curve as his\n\t\t\t\t\t\tdisgusting wings fan open.\n\t\t\t\t\t\t\n\t\t\t\t\t\tElrin runs up his back in an instant and drives the tip of his staff into the back of father Albert's\n\t\t\t\t\t\tneck.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFor a moment father Albert just... freezes. And then, there's a slight tremor in his right arm.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn a sudden flash of movement he grabs Elrin and throws him directly at me. I don't have time to\n\t\t\t\t\t\treact before both Elrin and I are sent tumbling across the ground together.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto label\n\t\t\t\t\t\t\n\t\t\t\t*comment\n\t\t\t\t\n\t\t\t#Arrow. Definitely.\n\t\t\t\t\n\t\t\t\tFather Albert is looking pretty dangerous right now, but there's still a little bit of distance\n\t\t\t\tbetween us.\n\t\t\t\t\n\t\t\t\tI take aim with my arrow. \"Let's see how he handles this...\"\n\t\t\t\t\n\t\t\t\tI fire an arrow into his torso. Haze bellows out of his wound as a black sticky substance rolls down\n\t\t\t\this chest.\n\t\t\t\t\n\t\t\t\tFather Albert himself doesn't even flinch.\n\t\t\t\t\n\t\t\t\t\"Uh...\"\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#It's impossible for me to miss a target that big at this range. I'll just fire as rapidly as I can.\n\t\t\t\t\t\t\n\t\t\t\t\t\tI don't bother making any effort to aim. I just fire arrow after arrow as rapidly as my arms\n\t\t\t\t\t\twill let me.\n\t\t\t\t\t\t\n\t\t\t\t\t\tShining arrow after shining arrow plugs a hole into father Albert's body. That\n\t\t\t\t\t\tdisgusting ooze keeps coming out.\n\t\t\t\t\t\t\n\t\t\t\t\t\tSlowly father Albert makes his way over to me. If my arrows are hurting him, he's not\n\t\t\t\t\t\tshowing any sign of it.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe suddenly reaches forward, picks me up, raises me high into the air...\n\t\t\t\t\t\t\n\t\t\t\t\t\tAnd throws me down against the concrete.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto label\n\t\t\t\t\t\t\n\t\t\t\t\t#Maybe I should just try to keep him distracted until the others do something...\n\t\t\t\t\t\t\n\t\t\t\t\t\tI circle around him, away from Elrin and Joan. I keep firing arrows. Every shot is hitting, but father\n\t\t\t\t\t\tAlbert isn't reacting to anything I'm throwing at him.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe starts to lumber towards me on those weirdly long legs. I keep backing away, trying to stay out\n\t\t\t\t\t\tof the range of his arms.\n\t\t\t\t\t\t\n\t\t\t\t\t\tCome on guys... do something for me...\n\t\t\t\t\t\t\n\t\t\t\t\t\tThere's a flash of movement, and Joan has leapt up and punched directly into\n\t\t\t\t\t\tfather Albert's right knee.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe blow is so hard it causes the knee to snap out of place. Splattering of black gunk\n\t\t\t\t\t\tescapes from a small tear in the flesh as more haze bellows out.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFather Albert completely buckles. He falls forward, barely catching himself with those\n\t\t\t\t\t\tweird elongated arms. He's hunched forward. His back is forming a bizarre curve as his\n\t\t\t\t\t\tdisgusting wings fan open.\n\t\t\t\t\t\t\n\t\t\t\t\t\tElrin runs up his back in an instant and drives the tip of his staff into the back of father Albert's\n\t\t\t\t\t\tneck.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFor a moment father Albert just... freezes. And then, there's a slight tremor in his right arm.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn a sudden flash of movement he grabs Elrin and throws him directly at me. I don't have time to\n\t\t\t\t\t\treact before both Elrin and I are sent tumbling across the ground together.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto label\n\t\t\t\t\t\t\n\t\t\t\t*comment\n\t\t\t\t\n\t\t*comment\n\t\t\n\t#Maybe the others have an idea?\n\t\t\u003cNote: Put something here later>\n*comment\n\n*label label\n\nThat hurt. A lot. I'm starting to get worried here...\n\n*page_break\n\nI struggle to get back on my feet. Joan comes up and helps me get back up.\n\n\"You okay, buddy?\" she asks.\n\n\"Ugh...\"\n\n\"stay focused,\" Elrin says. \"He's still got a lot of fight left in him.\"\n\nFather Albert towers before us.\n\n...He seems to have lost focus though.\n\n\"Laura?\" He's looking all around, like he's searching for someone. \"L-laura? Toby? Where did you two... where did you go?\" His\ntone changes. \"I don't- I don't- I don't-\" I can't see any tears, but his voice is cracking. \"Why am I-\"\n\nJoan leaps up and cracks him across the jaw. There's a light shower of black ichor that falls over the pavement.\n\nFather Albert is actually floored from the blow.\n\nHe lies motionless...\n\n*page_break\n\nHis skin is still moving around, but father Albert isn't moving or making any noise.\n\nI cautiously take a step toward him. \"Was that it-\"\n\nFather Albert suddenly howls as he staggers back to his feet. His flesh is tearing open all over his body. Haze and black ichor oozes\nout. His skin tightens around his bones until I can clearly make out his deformed skeleton underneath.\n\n\"Where are you! I need you to k-kill! K-Kill! KiLl! kILl! KiLL! kIlL! KiLl THeM aLl PleASe God WhY ArE AllOWinG ThiS AbomInATIonS ArE\nUNForgIvAble I'M SorRy It WaSN't SuPPoSeD TO HapPEn LIkE ThIs!\"\n\nIt looks like father Albert's body is still trying to morph, only now... it's not working.\n\nI see flesh covered bone burst out of his sides. They twist around and start to form little claws, but the arms suddenly give out. They\nfall to his sides as the flesh just melts off the bone. The bone itself breaks off into little flecks of brittle bone. Tears form all\nover his body.\n\nThe amount of haze pouring out of him slowly dies down, as does the flow of black ichor.\n\n\"I CaN't LeT... yOU DeMoNs... WiN...\" Father Albert is wasting away in front of us. He collapses, his bony legs completely\nincapable of handling his body. He starts dragging himself forward. Flesh is dripping off his now bony wings.\n\nDespite all of this, he does manage to drag himself face to face with us. \"YoU MUst DiE!\" He raises one of his arms up. It's trembling.\n\nJoan brings her arm back, and slams her fist directly into his face. The ground shudders from the force of the impact.\n\nFather Albert's head just... explodes.\n\nIt's not gory.\n\nThere's just a sudden burst of haze. Some black ichor oozes out of the remnants of his warped skull. And he goes still. His\nbody has finally stopped warping, though it is melting away rapidly.\n\n\"Jesus Christ...\" I stare at his remains. \"What the hell even was this?\"\n\n\"I don't know,\" Joan says. She looks at me. \"We should of just destroyed those... whatever they were in the other world when\nwe had the chance.\"\n\nHis remains have already almost turned to dust and tar.\n\n\"I know.\"\n\n*page_break\n\nSomehow, our work isn't done here.\n\nThe rest of his cult are still out in the city. Those that are alive anyway.\n\nThe haze lessens as the night goes on. We find a lot of those monsters collapsed on the ground. They're covered\nin tears and black ichor, but... they actually seem to have returned to normal.\n\nNot all of them survived turning back though. Their wounds are always terrible. The only ones who pull through are the ones that are immediately\npatched up.\n\nQuite a few others aren't found until morning, and by then...\n\nIt's just too late.\n\n*page_break\n\nWindbrooke is uneasy once again, but this could have been far worse. Father Albert's cultists were mostly eradicated. A select\nfew survived either because they turned into monsters but were saved in time, or actually had the good sense to surrender to police.\n\nAngeline and Rita's group just vanishes. I don't even here about their involvement in the news. They successfully kept\nanyone from noticing them.\n\nI don't know where they are now.\n\n*page_break\n\nIt's been a few days. My parents showed up in a hospital after reverting back from being turned into a pair of\nthose monsters. I haven't gotten to see them. They were with that group, so... the police are watching over\nthem until they recover.\n\nAnd then... they're probably going to prison.\n\nI don't know how to feel about that.\n\n*page_break\n\nI'm sitting on Elrin's couch. They have their own television channels in this otherworld, but I cannot for the life\nof me understand any of their programming.\n\nI haven't seen nor heard from Raven in ages.\n\nElrin quietly sits down next to me. \"It's been quite a few days.\"\n\nThe person on the screen is describing some sort of product. It just looks like a mirror compact, but it costs several\nthousand... something. Their symbol for money looks like a very screwy Q.\n\n\"I think... things should return to a sense of normalcy soon,\" Elrin says. \"Just give it time.\"\n\n*page_break\n\nHopefully he'll turn out to be right.\n\n*page_break\n\nI sit there for the better part of an hour. I'm only dimly aware of what is on the screen at any given time.\n\nWhat now?\n\nThe haze really does seem to be gone now. It hung in the air for a few days, but it slowly drifted away.\n\nI don't know what Raven has been up to. I'm probably better off just not knowing.\n\nI guess... I just go back to how things used to be. Go to school, come home to Raven to help\nout at the store. Whenever it gets rebuilt.\n\nIt wouldn't hurt to learn a little more about this Isle of Yggdrasil too. Especially considering how important\nRaven seems to be around here.\n\nI hear a key in the lock.\n\n...But Elrin is somewhere in the back of the house.\n\n*page_break\n\nI stand up, and approach the door.\n\nThe lock clicks. I reach out and open it before whoever is outside can.\n\nAnd Raven is standing there.\n\n*page_break\n\nShe looks terrible.\n\n*page_break\n\nShe's just grinning at me. \"Hi, sweetie.\"\n\nHer clothes are torn up. Half of her face is badly bruised. Dried blood coats her body.\nFrom the way she's carrying herself, I think one of her legs are hurt.\n\nI stare at her for a very long time, before slowly stepping aside so she can come in.\n\n*page_break\n\nI wait on the couch while she showers in the back. Eventually she pops back in looking noticeably\nbetter, and with a fresh set of clothes.\n\nElrin briefly steps into the room and says, \"I'll have dinner ready in ten minutes, ma'am. Feel\nfree to come eat when you two are ready.\"\n\nRaven nods as he leaves, before turning turning to me.\n\nWe just sort of awkwardly stare each other.\n\n\"...It sounds like a lot has happened?\" Raven asks.\n\n\"Yeah.\"\n\nShe just keeps staring at me. Almost expectantly.\n\nWait.\n\nI look toward the kitchen. I can't see him, but I can hear Elrin still cooking.\n\nDid he tell her about everything?\n\n*page_break\n\nI mean... I guess he was always going to, but...\n\nHe could have at least given me some advance warning.\n\n*page_break\n\nWhen I look back at Raven she wraps me up in a hug. \"I don't know what I would have done if you got hurt...\"\n\n\"I'm fine. Everything worked out.\"\n\nShe suddenly lets go of me, and looks me dead in the eye. \"If you ever get into that sort of trouble again,\nand don't tell me about it, I swear to god... I. Will. Murder. You.\"\n\nShe's giving me a very serious look right now, but I can't help letting a startled laugh escape from me.\n\n\"I'm serious, $!{fiName}!\"\n\n\"I know! I know!\" I fail to suppress my laughter. \"Really. I do.\"\n\nShe's still giving me an intense look.\n\nI finally get my laughter under control, and take on a more serious tone. \"Seriously. I do. Things just... kind\nof got out of hand. I promise I'll come to you next time.\"\n\n\"You'd better,\" she says.\n\n*page_break\n\nI look Raven over. She's still a little banged up, but she's not in nearly as bad a condition as I had initially thought.\n\n\"So...\" She's not going to tell me anything, but I have to ask. \"What exactly happened to you?\"\n\n\"Work got complicated,\" Raven responds.\n\n\"No kidding.\" I hesitate. \"I don't suppose you're willing to elaborate on that?\"\n\n\"Nope,\" she says.\n\n*page_break And that was that\n\nWeeks pass. We move out of Elrin and into a new store front for Raven.\n\nShe apparently has a massive amount of money from her mysterious 'work' because she apparently isn't\nfinancially troubled at all from having to buy a whole new building.\n\nI'm trying to stay in touch with Elrin, but I can already feel distance forming.\n\nIt's easier with Joan since we got to school together, but I wonder if we'll stay in contact when we\ngraduate.\n\nI can't help but shake the feeling both of them are unhappy I worked with that old guy.\n\n*page_break And that old guy...\n\nThe haze is gone, and so is that old man. I have not seen a single hint of his presence anywhere.\n\n*if (fVampireSeed = true)\n\tI'm still waiting for my vampirism to emerge. I can feel it coursing under my skin these last few days. Like\t\n\tsomethings trying to get out.\n*if (fWerewolfSeed = true)\n\tI'm still waiting to transform into a wolf. I can something inside me. I think it'll happen soon.\n*comment\n\nAnd then one night...\n\n*page_break I have a dream\n\nThere's a void around me. In front of me is that... shadowy woman.\n\nI can scarcely make out a single detail about her against the darkness around us. All I see are the glow\nof her eyes.\n\n\"Mmm.\" She's just floating there, watching me.\n\nI try to speak, but my words fail me.\n\nAre we in the other world? I feel so... disconnected.\n\nThere's no haze though.\n\n\"I suppose you did the best you could,\" she says. \"You even managed to save some people. Not everyone. But some.\"\n\nShe's so distant. Everything is. I don't think I can hold on to me connection to this world for much longer.\n\n\"Try not to have any regrets,\" she says. \"You didn't die. And neither did your friends. This could have gone\na lot worse for you all.\n\n\"I suppose this is our final goodbye. Until next time, try to take care of yourself.\"\n\n*goto_scene Final ending\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "final": "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nMy head is spinning. We're back in the woods at least.\n\nThe haze is gone.\n\nI struggle to stand. The others seem to be having trouble getting it together too.\n\nThere's a rustle in the nearby bushes. I think something is coming toward us. I squint\nmy eyes against the darkness.\n\nA figure. Human. Kinda lanky. He's holding his arm out toward me. Something is in his hand.\nThe moonlight is gleaming off the tip of it.\n\nThere's a loud bang, and a flash of light. For a split second, I see that old man pointing a\npistol at me.\n\nThere's a sharp pain in my stomach.\n\n*page_break\n\nI fall to my knees. I look down and can see a dark spot growing on my abdomen.\n\nA firm hand grasps my hair, and forces me to look up.\n\n\"You should have taken my deal,\" the old guy says. \"You might have gotten to live.\" He\ntakes a step back, and points the gun at my head.\n\nI don't feel afraid. There's a tremble that runs up my spine. It feels like something\nis crawling under my skin, digging its way to the surface.\n\n*if (fVampireSeed = true)\n\t*set race \"vampire\"\n*if (fWerewolfSeed = true)\n\t*set race \"werewolf\"\n*comment\n\nMalice is dripping from his tone. \"Goodbye. Child.\"\n\nScrew this old bastard.\n*if (race = \"human\")\n\tSomething explodes inside my chest. It feels like raw energy is surging through my veins.\n\tIt's almost painful.\n\t\n\tHis finger starts to pull the trigger. I roll to the side with blinding speed. His bullet misses by more than a foot.\n\t\n\tI stand up. I'm not dazed anymore. In fact, I've never felt so aware of my surroundings. The soft movement\n\tof every single leaf. Insects buzzing nearby. A rat scurrying away from all the noise.\n\t\n\tI've never had such... clarity.\n\t\n\tI'm so mesmerized by what is happening that he shoots again. The bullet clips my shoulder. It hurts, but I'm okay.\n\t\n\tI sprint forward. I can't form a weapon, but I don't care. I clock him across the face. Hard.\n\t\n\tMaybe a little too hard actually. The old guy goes rolling across the ground. I'm seeing a lot of blood coming\n\tout of his mouth. He might be missing a couple of teeth right now.\n\t\n\tI hesitate to do anything else to him.\n\t\n\t*page_break\n\t\n\tI glance at the others. I'm getting a lot of stares. I don't think they fully understand what's happening right now.\n\t\n\tI look back at the old guy. And he's once again pointing a gun at me. Two shots go off.\n\t\n\tPain erupts in my shoulder. I think he missed one of his shots. I stagger forward and stomp\n\tdown on his hand. His thumb bends out of place.\n\t\n\tHe finally drops the gun, but doesn't hesitate to get back to his feet and start running. I immediately\n\tgive chase.\n\t\n\tI faintly hear the others behind me shouting.\n\t\n*if (race = \"vampire\")\n\tSomething clicks. A drowsiness I didn't know I had drifts away. There's a certain fog most people get when\n\tthey first wake up. It feels like that, but... like I've had it my whole life, and I'm just really waking\n\tup for the first time.\n\t\n\tThe night feels good. I've never been so aware of that fact until now.\n\t\n\tI look that old man in the eye. His finger twitches, he's about to pull the trigger.\n\t\n\tI step forward while leaning to the side. He fires, but just barely misses me.\n\t\n\tAn odd reflex takes over. I move in close, and break his wrist. Somehow he doesn't drop his gun, but he does stumble backwards.\n\t\n\tI look to the others. They haven't quite pulled themselves together yet. In fact, I don't think they even\n\trealizes what's happened yet.\n\t\n\tThere's an unsettling twitch in the air. I look back at the old guy just in time to see him fire two more shots\n\tat me. My shoulder burns, but I'm somehow okay.\n\t\n\tI lunge forward and sink my teeth into his arm. I tear a massive chunk of flesh out of it.\n\t\n\tChrist his blood is amazing.\n\t\n\tI back away from him in a daze. I've never tasted something that just seemed... right.\n\t\n\tMy focus returns. The old guy's gun is on the ground. He's running away in the distance. I sprint\n\tafter him.\n\t\n\tI'm faintly aware of the others shouting behind me.\n\t\n*if (race = \"werewolf\")\n\tI feel angry. The emotion burns inside me. It's feral and uncontrollable.\n\t\n\tI lunge forward, and sink my teeth into his hand. The bite goes deep, and he fires the gun. He doesn't\n\teven come close to hitting me.\n\t\n\tHe struggles in vain for a few seconds, punching the top of my head, and trying to make me let go.\n\tHis gun clatters to the floor as my teeth sink in deeper. He keeps hitting me.\n\tI roll to the side while still biting his hand. There's a wet, tearing sound, and that old screams.\n\t\n\tI completely severed his hand. I finally let it go.\n\t\n\tHe's just staring at me as he backs away. Eventually he turns and starts running. I sprint after him.\n\t\n\tI'm vaguely aware of the others shouting as I go.\n*comment\n\n*page_break\n\n*if (race = \"human\")\n\t\n\tDespite being shot multiple times, I'm surprisingly fine. I don't feel tired as I sprint\n\tafter that old guy. In fact, I'm pretty sure I'm barely even bleeding right now.\n\t\n\tI can't quite see him through the various bushes and undergrowth of the woods, but even from here I\n\tcan hear every individual footstep he makes. I can even here is haggard breathing.\n\t\n\tAnd then suddenly it all disappears. He seemed to vanish in front of a tree.\n\t\n\tI skid to a stop just before running into it.\n\t\n*if (race = \"vampire\")\n\t\n\tI'm so swift right now. Even after being shot I can't believe how fast I'm moving.\n\tA deftness fills me, and it lp for this.\n\t\n\tThen again, I don't want him getting away...\n\t\n*if (race = \"werewolf\")\n\t\n\tI lower to the ground, and sniff the trail. The smell is so strong. More than that,\n\tit's intricate. Detailed.\n\t\n*comment\n\nI hurry down the stairs. He's not getting away.\n\n*page_break\n\nThe stairs just seem to keep going. The walls creak and moan. There's noise up ahead.\nA lot of noise actually.\n\nAre those explosions?\n\nThe earth shakes around me. Dirt and dust fall from the ceiling.\n\nExplosions. Gunshots.\n\n\"What the hell is happening down there?\"\n\nThere is a single open door at the end of the staircase. A figure steps\nin front of it.\n\nHe's covered in strange black growths. His eye sockets are empty, like the creature's\nof the otherworld.\n\nHe's also carrying a rifle. He points it at me.\n\n*if (race = \"human\")\n\t\n\tI make some bid to charge his position, but wind up tripping and rolling down\n\tthe stair. I land at his feet.\n\t\n\tHe points the gun down at me. I grab the barrel of the rifle and push it aside. He\n\tfires, and a bullet goes into the floor next to me.\n\t\n*if (race = \"vampire\")\n\t\n\tI sprint forward, and try to slide down the stairs.\n\t\n\tHe fires a shot, and does miss, but my ride down to him is... slightly bumpy.\n\t\n\tHe tries to strike me in the face with his rifle, but I grab the weapon. We struggle for control of the weapon.\n\t\n*if (race = \"werewolf\")\n\t\n\tI lunge forward. He fires a shot, it grazes my shoulder, and I smash right into him. We're both\n\tsent tumbling to the ground.\n\t\n\tHe gets up surprisingly fast. I tense, ready to lunge again.\n\t\n\tSomething 'snaps' in my guy. My bones and muscles pop. The fur on my arm disappears. My claws turn\n\tto fingers.\n\t\n\tHe aims that rifle down at me while I'm trying to regain my functions.\n\t\n*comment\n\nJoan rushes in from out of nowhere and clocks him in the face. She's not suited up, and she doesn't have a gauntlet on, but\nthat guy is sent crashing to the ground instantly.\n\nJoan helps me to my feet. \"Are you alright?\"\n\nI nod. \"Yeah.\" I look back toward the stairs. \"Where's-\"\n\nLooks like Joan came alone.\n\n\"We got separated,\" Joan says. \"We need to go back.\"\n\n\"And blindly stumble through the woods trying to find them for god knows how long?\" I ask. \"No. We need to keep going.\"\n\n\"We don't even know where we are right now!\" Joan shouts.\n\n\"That old bastard just tried to murder me, and-\" God, I still don't know anything about who he is. \"And he clearly\nhad something or other to do with the haze!\"\n\nThe ground shakes again. There are gunshots in the distance.\n\nJoan looks around nervously. \"$!{fiName}, we aren't in the otherworld right now.\" She gives me a serious look. \"You\ncan't make any weapons. Neither can I.\"\n\nI hesitate. Before picking the man's rifle up. \"Here's one.\" I start toward the door. \"I might not need it. I'm stronger\nthan I've ever been. You should head back-\"\n\n\"Hell no,\" Joan grabs my arm. \"You're not going in there alone.\" She eyes the rifle. \"Do you even know how to use that?\"\n\nI look the gun over. \"Kind of?\"\n\nShe takes it from me. \"Well, I've actually fired one of these before. So.\"\n\n\"So?\" I raise a brow. \"So... you're coming with me?\"\n\nJoan gives me a hard look. \"...If you're just going in anyway. Yeah.\"\n\nI smirk. \"Well, I'm definitely still going in.\"\n\n\"Then I'm definitely still going with you.\"\n\n*page_break I guess that settles that.\n\nWhen we finally step out of the stairwell, we're in a stone brick hallway. There's absolutely\nnothing in here. No decor of any kind.\n\nThe ground shakes. A flash of light comes from a square opening in the wall. The wall has several\nof them actually. I guess they're supposed to be windows, but there's no glass.\n\nI peek out, and see that we are very high up. It's night time outside. I can see an ocean. Or maybe\nits a massive lake. The water just seems to stretch
