\n\t\t*goto lbl_NoChoice\n*comment\n\n*label lbl_NoChoice\n\n*page_break\n\n\"This place isn't entirely real... It's a mixture of ideas and feelings... You can use that... You can draw out your\nown beliefs to make something tangible...\" She grabs my hand, and lifts it up. \"You've already done it... But\nyou need to take it further... You need to become something more than human...\"\n\n\"Like a knight?\" I ask.\n\n\"If that speaks to you...\" She pauses. \"You must have imagined yourself as something heroic at some point...\nEveryone always does that... Fantasies... about saving people... being a hero...\"\n\nI mull on that. \"I'm not... sure.\"\n\n\"I don't believe that... Everybody likes to imagine they're stronger than they really are... it's humanity's\nfavorite hobby...\"\n\nI mull on that for a moment.\n\n\"You don't have to answer now...\" she says. \"In fact... Don't answer now... Give it some time... Reflect on it...\nThat girl didn't choose to take on the mantle of a knight right away...\"\n*if (fVampireSeed = true)\n\tShe reaches out, and carefully touches the side of my neck. \"I can feel something in your blood... You're changing...\n\tI believe that should guide your decision once it fully sinks in...\"\n*if (fWerewolfSeed = true)\n\tShe runs her fingers down my arms. \"I feel the beast's mark on you... It's spreading right now... Wait for the changes, they'll\n\thelp you make your decision...\"\n*comment\n\n*page_break\n\n*goto_scene 010_OctoberFirstDay\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "010_octoberfirstday": "\n\n*comment Saturday October 16th\n\n\n\n\n\nWhen I wake up, I'm back in the mall again.\n\nJoan is already standing up, studying me carefully.\n\nI sit up, and tilt my head at her. \"What?\"\n\n\"Did you...\" She trails off and looks away.\n\n\"See that shadowy woman?\" I ask. \"Yeah. It sounded like you did too. Earlier. Like before\nwe met earlier.\"\n\nJoan sighed. \"I wasn't sure if I should say anything about it. She made it sound like\nit would be better if you didn't know about her before the meeting.\"\n\n\"That's not suspicious at all.\" I stand up. \"Is the haze gone?\" There's no reason to ask, I can feel it's absence.\n\nShe hesitantly smiles. \"Yep. We did it.\"\n\n\"Good... let's get going then,\" I say.\n*if (f_008_NightPlans = true)\n\t\"I've got plans tonight.\"\n*comment\n\nJoan looks a little taken aback. \"Right... but. Aren't you bothered?\"\n\nI give her a curious glance. \"About what?\"\n\nJoan just stares at me. \"That woman... shadow thing. I didn't warn you.\"\n\n\"Joan...\" I sigh. \"There's a million things going wrong right now. I'm not worried about a talking shadow that [i]seems[/i] to be giving me some advice on getting stronger.\" I look Joan over. \"It sounded like she told you how to make that armor. Am I wrong?\"\n\nJoan shakes her head. \"I never would have guessed I could do that without her.\"\n\n\"Well, there you go.\" I turn and start walking away. \"It's fine. Probably.\"\n\n*page_break I mean... Not really.\n\nBut I'm going to let it go.\n\nJoan's unusually quiet as we're driving back to the warehouse.\n\nJust as we're pulling into the parking lot, she finally speaks up. \"What did you choose?\"\n\n\"Huh?\" I shoot her a curious look. \"You mean... like your armor?\"\n\nShe nods. \"It's all about putting on a face. That place responds to us, somehow. What did you choose?\"\n\nI think back to what that woman told me.\n\nIt's about acting like a hero? Fake it until you make it, basically.\n\nJoan acts like a knight from an old tale. I wonder what was going through her head when\nshe came up with that.\n\nMaybe she just liked the idea of being a gallant hero, dressed head-to-toe in steel plate, fighting\nevil with her own fists.\n\nI get the appeal. I really do.\n\nBut, I don't know if it's the right fit for me.\n\n\"I don't know,\" I finally say.\n\n\"No?\" We stop. \"Not even a slight idea?\"\n\nI pause. \"Not yet.\" I get out of the car. \"I'll figure it out.\"\n\nDo I really need to though?\n\nI seem to be a lot more effective already.\n\n*page_break\n\nI make my way back to Raven's shop. The place is still closed, and there's no note\nfrom her. I assume she hasn't been home yet.\n\n*if (f_008_NightPlans = true)\n\t\n\tI really want to just lie in bed, but...\n\t\n\t*if (fVampireSeed = true)\n\t\t\n\t\tI put on the necklace with the blood red crystal I was gifted. Apparently I'll be meeting a bunch of vampires tonight.\n\t\tI guess I should say 'other' vampires. Am I really one though?\n\t\t\n\t\tThere's a mirror in the bathroom. I check my teeth in front of it.\n\t\t\n\t\tThey still look completely normal. I don't really feel any different either.\n\t\t\n\t\tI sigh. The sooner I get this over with, the sooner I can go to sleep and struggle again tomorrow.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene 010_sub_ElrinPickup\n\t\t\n\t\t*gosub_scene 010_sub_VampireNight\n\t\t\n\t\t*gosub_scene 010_sub_RavenRendezvouz\n\t\t\n\t\t*goto lbl_October17th\n\t*else\n\t\t\n\t\tI put on the necklace with a crescent moon hanging from it. I guess it's time to meet a pack of werewolves. I\n\t\thope they're cool with an outsider visiting.\n\t\t\n\t\tAm I an outsider? I suppose I'll be turning into one of them, but it still doesn't feel real. And I still\n\t\tdon't feel any different.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub_scene 010_sub_ElrinPickup\n\t\t\n\t\t*gosub_scene 010_sub_WerewolfNight\n\t\t\n\t\t*gosub_scene 010_sub_ScourgeBase\n\t\t\n\t\t*goto lbl_October17th\n\t*comment\n*else\n\t\n\tA lot has happened. I can't wait to get to bed.\n\t\n\t*page_break\n\t\n\t*gosub_scene 010_sub_TheUnion\n\t\n\t*if (fHumanSeed = false)\n\t\t*gosub_scene 010_sub_RescuedFromUnion\n\t*if (fHumanSeed = true)\n\t\t*gosub_scene 010_sub_JoiningTheUnion\n\t*comment\n\t\n*comment\n\n*label lbl_October17th\n\n*if (fRavensWorld = true)\n\t*set m_PocketWorlds true\n\t*set m_KnowYggdrasil true\n*if (fVisitAdam = true)\n\t*set m_KnowBoys true\n*if (f_008_NightPlans = true)\n\t*set m_KnowElrin true\n\t*set m_PocketWorlds true\n\t*if (fVampireSeed = true)\n\t\t*set m_KnowRica true\n\t\t*set m_KnowYggdrasil true\n\t*if (fWerewolfSeed = true)\n\t\t*set m_KnowRiver true\n\t\t*set m_KnowLucas true\n\t\t*set m_KnowAngeline true\n\t\t*set m_KnowUnion true\n\t*comment\n*if (f_008_NightPlans = false)\n\t*set m_KnowUnion true\n\t*set m_KnowParents true\n\t*set m_KnowFather true\n*if (joanFlirt > 0)\n\t*set m_JoanRomance true\n*comment\n\n\n\n*comment Monday October 17th\n\n*goto_scene 011_OctoberFirstWeek\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "010_sub_elrinpickup": "\n\n\n\n\n\n\n\n\nThe address I was given isn't too far away, but I might need to check the bus schedule.\n\nI'm on my phone as I'm headed out the door. I accidentally bump into someone.\n\n...A little too hard apparently, since they're lying on the ground now.\n\nIt's a guy. Probably not much older than myself. He's tall, and [i]very[/i] thin. Almost sickly so. His skin is incredibly pale, and has\na slight green tint to it. I note his ears end in sharp points.\n\nI'm assuming he's some sort of elf... thing. I've never met one before, and I don't know what they look like. Or\nif they exist.\n\nBut, if they do exist. This guy fits the bill pretty well.\n\nHe gets back up to his feet. He dusts off his very fine brown suit. \"My apologies.\"\n\n\"I think think that should me my line,\" I say. \"I'm sorry to say, we're closed. Raven won't be back until... some\npoint in the future.\"\n\n\"Ah, I'm well aware-\" He looks me in the eye, and I notice his are a striking green. \"-oh. I can see her features in you.\"\nHe suddenly leans in way too close, and grabs my face.\n\n\"Okay... this isn't really-\"\n\n\"Amazing!\" He beams.\n*if (sex = \"ma\")\n\t\"It appears you've also adopted your father's handsome features.\"\n\t\n*if (sex = \"fe\")\n\t\"I can see Raven in you. Or perhaps that's her sister? They looked so much alike.\"\n\t\n*comment\n\nI stare at him. \"Please let go of my face.\"\n\n\"Hm?\" He casually backs off. \"My apologies.\"\n\n*if (sex = \"ma\")\n\t\n\tI rub my face as I frown at him \"Did you know my father?\"\n\t\n\tHe nods. \"That I did. Both of your parents actually, just a few years ago. It's a shame I never got to know them better. But,\n\twith their attitudes toward-\" he vaguely gestures toward himself. \"-us. It just wasn't possible. I'm sure you know what I mean.\"\n\n*if (sex = \"fe\")\n\t\n\tI rub my face as I frown at him. \"Did you know my mother?\"\n\t\n\tHe nods. \"That I did. Both of your parents actually, just a few years ago. It's a shame I never got to know them better.\n\tBut, with their attitudes toward-\" he vaguely gestures toward himself. \"-us. It just wasn't possible. I'm sure you know what I mean.\"\n\t\n*comment\n\n\"I don't actually.\" I cross my arms. \"Listen, uh... guy.\"\n\n\"Elrin.\" He gives me a pleasant smile. \"If it pleases you.\"\n\n\"Elrin,\" I repeat. \"I've got somewhere I need to be. So, uh... it's been real nice, but-\"\n\n\"Oh, of course!\" he chirps. \"The car is right over there.\" He nods vaguely behind him. \"I'll have you at the meeting in no time at all.\"\n\nAnd sure enough, parked on the curb is a dark-brown limo. There's a strange decal on the side of the car.\n\nIt depicts a massive tree growing out of an island.\n\n*if (fRavensWorld = true)\n\t\n\t\"Is this car from Yggdrasil?\"\n\t\n\tElrin's eyes go wide. \"You... know about that? I was under the impression you were kept in the dark.\n\tAt the behest of your parents.\"\n\t\n\t\"It wasn't exactly intentional,\" I say. \"But, I found out about it yesterday.\"\n\t\n\t\"I see... I wasn't informed.\"\n\t\n\tI look him over. \"So... you work for Raven?\"\n\t\n*if (fRavensWorld = false)\n\t\n\t\"I'm sorry,\" I say. \"How exactly do you know Raven?\"\n\t\n*comment\n\n\"Hm? Yes!\" He smiles. \"I act as her vassal. And, she's requested that I keep an eye on you, as she's\ngoing to be quite busy with her other work.\"\n\n*if (fRavensWorld = true)\n\t\n\t\"Right...\" I'm still not quite sure what that's about.\n\t\n\tHe walks over, and opens the door to the limo. \"Right after you...\"\n\t\n*if (fRavensWorld = false)\n\t\n\t\"Her other work?\" I raise a brow.\n\t\n\t\"No need to be concerned about it.\" He walks over to the limo, and opens the door. \"Your aunt is a professional!\n\tNow... after you.\"\n\t\n*comment\n\n*page_break\n\nThe sun is setting as we drive along.\n\nThe limo's interior is quite nice. Leather seats. Impeccably clean interior.\n\nThere's some sort of glass divider between myself and Elrin. There's a panel on it that is currently open.\nI'm not sure what it's for.\n\nI lean back and sigh.\n*if (fVampireSeed = true)\n\tI carefully grasp the red gem in my hands, and slide my thumb along its smooth exterior.\n*if (fWerewolfSeed = true)\n\tI raise the crescent moon hanging off my necklace, and look over it.\n*comment\n\nWhy couldn't Raven have been here with me for this?\n\n\"Nervous?\" he asks, never taking his eyes off the road.\n\n\"Um... I guess so.\"\n\n\"Ah, well. This is more common than you think,\" he says. \"You won't be as out of place as you're probably imagining.\"\n\n\"Right.\" I stare out the window. \"Thanks.\"\n\n*page_break\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "010_sub_joiningtheunion": "\n\n\n\n\n\n\nI feel a pulse running through my veins.\n\nIt's sheer power. More than any mortal, human or monster, could ever handle.\n\nIt flows in and out of me. Like a great river.\n\n*page_break\n\nI wake up in a daze.\n\nI'm in a tiny room with a window next to my bed. I can see most of the compound outside\nof it.\n\nThe only thing in here beside my bed is a single desk, and a chest at the foot of my bed.\n\nThe door opens.\n\nFather Albert stands beyond it. His eyes bore into me. \"My apologies. I sensed you stirring.\" He approaches my\nbedside. \"I would have preferred to let you wait, but I felt it was best to speak now. Time is waning.\"\n\nI eye him. \"Yeah?\"\n\n\"What do you remember?\"\n\n\"After you showed me your... cross?\" I wait for a nod, before continuing. \"Some sort of... being appeared.\nIt spoke to me. It looked like an angel.\"\n\n\"It was an angel,\" Father Albert says. \"You have received the blessing of our father in heaven.\"\n\nI look down at myself. \"I did?\" I don't feel any different.\n\n\"It will blossom in the next few days,\" he says. \"Did the angel speak to you? Did it ask something of you?\"\n\nIt seemed to believe I could make some sort of difference in Windbrooke.\n\nDoes it want me to keep clearing the haze?\n\nI hesitate to answer. I'm not sure how to explain any of that to this guy.\n\n*page_break\n\n\"There's... a haze. In Windbrooke.\"\n\nFather Albert's expression doesn't shift.\n\n\"It's choking the city. It makes the people there more violent.\" I keep waiting for him to react.\nHe doesn't. \"I- my friend and I, we know how to clear it from the city. We've already reduced it\nslightly.\"\n\n\"Hm.\" Father Albert nods. \"So you'll be continuing to do that then.\"\n\nI stare at him. If he finds anything I've said odd, he doesn't show it.\n\n\"I'll introduce you to Toby in the morning,\" Father Albert says. \"He's been amongst my flock for most\nof his life. He claimed some time ago to feel a 'fog' over the city. I didn't know what to make of it\nthen, but I see the lord has a purpose for him in you.\"\n\nToby... didn't I talk to a Toby at the feast earlier?\n\nHe can sense the haze as well. Maybe he can dive in too?\n\n\"Rest for now.\" Father Albert turns to leave. \"Angels can be difficult to face. I imagine you are still weary.\"\n\nHe doesn't have to ask me twice. I let myself collapse into the bed and drift to sleep.\n\n*page_break\n\nI don't know how long I've been laying here before I rise again. When I look out the window I can see the sun just\nstarting to rise in the distance.\n\nI climb out of bed. The movement isn't labored.\n\nI feel good.\n\n*page_break\n\nThere's an uncanny energy under my feet as I glide into the hall adjacent to my room. There are a few other rooms\nin this hall. I suspect they're not much larger than the one I was just sleeping in.\n\nI head downstairs and find myself in the church. There's a single woman sitting at the front bench. She's in a nun's\nhabit, but she's not wearing the head dress for it.\n\nAs I wander closer, I see it in her lap. She seems to be whispering something to herself.\n\nShe's quite young. Possibly not even my age. \"Are you even listening?\"\n\nI stop.\n\n\"I need a sign that this is in your plan. Father Albert has changed...\"\n\nI get the immediate sense this isn't something I should be listening in on.\n\nBefore she says anything else I shout, \"Hey there!\"\n\nShe flinches, before hastily grabbing her head dress and putting it back on. \"So, sorry. I was just performing my morning\np-\" she stops when she sees me. \"You're... Mr. and Mrs. $!{laName}'s child? You were blessed by the angels.\"\n\nHer eyes are impossibly blue. And they have a silvery glow to them. They look identical to Father Albert's.\n\n\"Uh... yeah.\" I'm still not sure what that means. \"I guess I was.\"\n\n\"It's very good to meet you.\" She shakes off whatever anxiety was clinging to her as she gives a graceful bow.\n\n\"Same.\" I nod. \"You work at this church?\"\n\n\"I work with Father Albert,\" she says. \"Wherever he goes, whatever he's doing, we follow.\"\n\n\"We?\" I ask.\n\n\"Toby and myself,\" she says. \"We were both taken in by Father Albert when we were younger.\"\n\n\"I see...\" Toby huh? I guess he'll be partnering with Joan and myself from here on out to tackle the fog.\nHow much can he help though? I already had some combat training and can barely do anything.\n\nI sure hope Father Albert had some of his people teach him something...\n\n\"My apologies,\" she says. \"Despite all of your... attention, I didn't catch your name.\"\n\nAttention? \"Oh! Sorry. I'm $!{fiName}.\"\n\n\"Nice to meet you, $!{fiName}.\" She smiles pleasantly. \"I'm Laura.\"\n\nI hear footsteps approach. \"Are you two friends now? Very cool!\"\n\n\"Toby.\" I turn to face him. He's just smiling. \"Looks like we're working together?\"\n\nToby quickly nods. \"Sounds about right, partner!\" The way he says 'partner' is weird. \"Shall we head off?\"\n\n\"Wait...\" I stare. \"Right now?\"\n\nLaura joins my side. \"Toby... I think you're pushing-\"\n\n\"Nonsense!\" Toby puts his hands on both my shoulder and Laura's. \"What's there to wait for?\"\n\nWell, I wanted to catch up with my parents for one...\n\n\"We'll be the three amigos!\" He's just giving my us the biggest smile I've ever seen.\n\n*page_break\n\nWait... did he say 'three' amigos?\n\n*page_break\n\n\"Uh... Toby?\" I glance at Laura. \"What do you mean 'three'?\"\n\n\"The three of us!\" He repeats, giving our shoulders a slight squeeze. \"It'll be like an adventure!\"\n\nSlowly.\n\nVery slowly.\n\nI look at Laura. \"Is he okay?\"\n\n*page_break\n\n*set location \"Union\"\n*set tobyPartner true\n*set lauraPartner true\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "010_sub_ravenrendezvouz": "\n\n\n\n\n\n\n\n\n\"Hm? Ah! There you are.\"\n\nI turn to see Elrin approaching. He's still got a bright smile plastered on his face.\n\nIs he picking me up? I was wondering when we'd leave, but I didn't think it'd be this soon.\n\n\"There was an... incident,\" he says.\n\nElrin's smiling, but I can see a hint of anxiety clawing out from behind it.\n\n\"At Mrs. Lilia's store,\" he says. \"Someone robbed it.\"\n\n*page_break\n\nWe don't waste any time leaving. However, when I climb into Elrin's car, I eventually\nrealize we aren't headed toward Raven's store.\n\n\"Where are we going?\" I ask.\n\n\"Oh. Well, I have room at my home in... a certain place. It's complicated, but I'm sure you'll-\"\n\n*if (fRavensWorld = true)\n\t\n\tI cut him off. \"Are you talking about Yggdrasil?\"\n\t\n\tHe hesitates. \"Right... I forgot you already found out about that.\" He coughs into his hand, before returning it to the wheel.\n\t\"Yes. I have a large abode you may stay at. Plenty of room. We just need to meet with Raven first.\"\n\t\n\t\"Why aren't we just going to the store?\" I ask. \"I thought they just robbed the place?\"\n\n*if (fRavensWorld = false)\n\t\n\t\"Hold on,\" I say. \"What's going on? Why would I need to stay with you?\"\n\t\n*comment\n\nElrin hesitates. \"The store was nearly destroy. Mrs. Lilia will be fine, financially. Her wealth is quite enormous\nby this point, but you can't stay in that place. And the people who attacked may come back.\"\n\n\"Attacked?\" I give the back of his head a hard stare. \"I thought you said they just robbed it?\"\n\nElrin goes quiet for a really long time. His voice wavers when he speaks up. \"It was. But the robbers, they-\"\n\n\"How bad is the damage?\"\n\nElrin pauses, before looking at me through the rear-view mirror. \"they... they firebombed the store. It's burned to ground.\"\n\nThey burned it?\n\nPeople broke in, grabbed whatever they could find, and then set fire to the store.\n\nIs that really something robbers do?\n\nThis doesn't sound right.\n\n\"Elrin.\" I keep my voice calm and measured. \"I'm sure Raven told you to keep the details light, but this involves me.\nI need to know. Were these people really robbers? Or were these people targeting the store? Targeting... Raven and me?\"\n\nElrin doesn't say anything.\n\nI wait.\n\nThe city passes us by.\n\n\"We'll be seeing Raven soon,\" he says. \"In just a few minutes.\"\n\nI roll my eyes as I settle into my seat.\n\nFine. Be that way.\n\n*page_break\n\nWe wind up in a part of Windbrooke that I am not even slightly familiar with. I recognize nothing around here.\n\nElrin pulls into a park. Raven is already standing nearby, waiting for us.\n\nI step out of the car, and Raven immediately runs up and wraps her arms around me.\n\n\"Hi Raven.\" I gently return the hug before she pulls away.\n\n\"Thank god you weren't at the store,\" she says.\n\n*choice\n\t#\"I'm glad you weren't there either.\"\n\t\t\n\t\tRaven smiles as she brushes her fingers through my hair. \"Listen, $!{fiName}. I need you to stay with my friend Elrin here. I've\n\t\tknown him for a while now, he's trustworthy.\"\n\t\t\n\t\t\"Why?\" I ask.\n\t\t\n\t\t\"...the store is gone. It's just the safest place for you right now.\"\n\t\t\n\t\t\"Safest?\" I give her a hard look. \"So those weren't just robbers? You think something like this could happen\n\t\tagain?\"\n\t\t\n\t\t*goto lbl_Rendezvous\n\t#\"Who's trying to kill us?\"\n\t\t\n\t\tRaven freezes for a moment. \"The store was only robbed...\" I see her eyes dart over to Elrin. There's\n\t\ta tint of suspicion in them.\n\t\t\n\t\t\"And they burned the store to the ground?\" I ask. \"That sounds like someone was trying to kill us.\"\n\t\t\n\t\tRaven just looks me over, like she's uncertain how to respond.\n\t\t\n\t\tI scowl. \"Will you just tell me what's going on?\"\n\t\t\n\t\t*goto lbl_Rendezvous\n*comment\n\n*label lbl_Rendezvous\n\nRaven puts a hand on my shoulder, and leans closer. \"Honey. I know you want to know more. But there's just\nso much going on right now. You're only a kid. You shouldn't have to be dealing with so much at once.\"\n\nI cross my arms, and fix her with a hard stare.\n*if (fRavensWorld = true)\n\t\"You apparently thought I couldn't handle knowing about Yggdrasil. But I was completely fine with it.\"\n\t\n\t\"That's different. I was just doing that for your parents.\" Raven gives a frustrated huff.\n*comment\n\n*if (fRavensWorld = false)\n\tRaven just sighs. \"Listen, there's a lot you don't know. About me. Unfortunately, you're now going to have\n\tto find out about it.\"\n\t\n\tI just raise a brow at her. \"Okay...\"\n*comment\n\n\"Just follow me.\"\n\n*page_break\n\nSurprisingly, Raven has Elrin and I follow her into the park.\n\n*if (fRavensWorld = true)\n\t\n\tAs we're walking along, Raven speaks up. \"Do you still have that Yggdrasil coin?\"\n\t\n\tI fish it out of my pocket, and hold it up.\n\t\n\t\"Good.\"\n\t\n*if (fRavensWorld = false)\n\t\n\tAs we're walking along, Raven hands me a green coin.\n\t\n\tIt's large for a coin and very thin. It's surface is shiny and smooth. An engraving of a very large tree atop an\n\tisland is displayed on it. Tiny words reading 'Island of Yggdrasil' are etched at the bottom of the coin.\n\t\n\tI flip the coin around, and see the figure of an old man carrying a book.\n\t\n\t'Founded for those who pursue knowledge' is printed above the engraving.\n\t\n\t'To Those who pursue knowledge, enter freely.'\n\t\n\t\"What's this?\" I ask.\n\t\n\t\"You'll need that in a moment,\" Raven says.\n\t\n*comment\n\n*page_break\n\nThe park isn't especially large. It's a chunk of green land surrounded on all sides by gray city landscape. There's\na segment of tall metal fencing closing off the perimeter.\n\nWe follow a paved path through the park until we arrive at some nondescript building near the edge of the\npark.\n\nThere's no signs outside the structure giving me any hint at to its purpose. Had I just been visiting\nthe park, I likely would have assumed I wasn't meant to be inside it.\n\nDespite this, Raven walks right inside. Followed closely behind by Elrin.\n\n*page_break I step inside...\n\nThere's nothing in here.\n\nThe building's front door leads into a tiny set of stairs that end after only a few steps.\nThere are no windows inside, so the only light is coming from the doorway. There's\nno furniture either.\n\n*if (fRavensWorld = true)\n\t\n\tRaven and Elrin pull copies of the green Yggdrasil coins out of their pockets.\n\t\n\tSo there's a portal in here too?\n\t\n*if (fRavensWorld = false)\n\t\n\tRaven and Elrin pull out coins that look identical to the one she gave me.\n\t\n\tI don't know what they're doing, but I retrieve mine from my pocket.\n\t\n*comment\n\nRaven grabs my right shoulder, and gently nudges me toward the far wall. Elrin takes a spot\non my left side, and does the same.\n\nAs we step closer to the wall, it seems to fade, and I can see a room beyond it.\n\n*if (fRavensWorld = true)\n\t\n\tSo, this works just like the one in Raven's workshop.\n\t\n*if (fRavensWorld = false)\n\t\n\tThe closer we get, the more the wall fades. Eventually I can't even tell where the\n\twall is supposed to be.\n\t\n*comment\n\nThe room beyond this one looks identical to it. There's even a tiny set of stairs leading up to\nan identical looking doorway.\n\nAt some point we cross the threshold of the wall. And those two waste no time ushering me out the door.\n\n*page_break\n\n*if (fRavensWorld = true)\n\t\n\tThe first thing I see is that giant tree. Still looking as impressive as ever.\n\t\n\tWe seem to be very far from it. I think we might be near the coast.\n\t\n\tI look to the side. \"Oh.\"\n\t\n\t*page_break\n\t\n*if (fRavensWorld = false)\n\t\n\tThere's an enormous tree far off in the distance.\n\t\n\tAnd I do mean, impossibly large, stretching up toward the sky. Its\n\tcanopy brush under the clouds from how high up it is.\n\t\n\tI can tell some sort of building has been erected on top of it, but it's too far away to make out any details.\n\t\n\tThe canopy of the tree is very colorful. It's mostly green, but I can make out colorful patches spread\n\tall over it. I can't tell if the leaves have changed colors on those spots, or if some sort of plants are growing,\n\tbut the effect is beautiful.\n\t\n\tI stare at the tree until a horn catches my attention.\n\t\n\t*page_break\n\t\n*comment\n\nThere's a sandy shore stretching by us.\n\nA boat is drifting across the water, headed toward a nearby dock.\n\n*if (fRavensWorld = false)\n\t\n\tI stare at the entire ocean. \"We don't live anywhere near the ocean.\"\n\t\n*comment\n\nElrin taps my shoulder. \"I'll show you where you'll be staying for the time being.\"\n\n*if (fRavensWorld = false)\n\t\n\t\"Woah, hold on!\" I back away from him. \"What is this?\"\n\t\n\t\"This is the Isle of Yggdrasil.\" Elrin looks at Raven, who just nods at him. He turns back to me. \"You're in a pocket world. It's just like your own\n\tworld. Only smaller. And doesn't have very many ordinary humans in it. There's quite a few of these actually.\"\n\t\n\t*if (m_PocketWorlds = true)\n\t\t\n\t\tSo this is [i]another[/i] pocket world.\n\t\t\n\t\tIt's quite large. We're surrounded by cityscape on all sides.\n\t\t\n\t*if (m_PocketWorlds = false)\n\t\tI stare at him.\n\t\t\n\t\tElrin smiles back.\n\t\t\n\t\t\"How long... have these places existed?\" I ask.\n\t\t\n\t\t\"Hm.\" Elrin looks thoughtful. \"Always?\" He nods. \"Always.\"\n\t*comment\n\t\n*comment\n\n*page_break\n\nElrin's home is built at a tall hill overlooking the island.\n\n*if (fRavensWorld = true)\n\t\n\tIt looks just as impressive as when I initially arrived here. I wanted to visit again.\n\tThis might not be a bad opportunity to take in the sights.\n\n*if (fRavensWorld = false)\n\t\n\tAs we climb higher and higher, I'm given a great view of the island.\n\t\n\tWe are indeed on an island. I can clearly make out the border of the city. Dozens of boats linger on the water as far as\n\tthe eye can see.\n\t\n\tThe city itself is uneven. Beyond the massive tree, I see tall modern looking buildings that wouldn't be out of place in Windbrooke\n\terected in the distance. I see rural areas with strange looking houses. Their\n\tdesign seems completely foreign to me.\n\t\n\tThey all have chimneys, and I can see smoke pouring out of some of them even now. The area has a cozy\n\tfeeling to it compared to the rest of the island.\n\t\n\tThere's so much to take in.\n\t\n\tCanals. They cut through the city, gathering near the tree.\n\t\n\ta very large park. Or maybe it's a garden?\n\t\n\tA harbor. Large ships wait in the docks. Tiny ones skimmer to and away from it.\n\t\n*comment\n\n*page_break\n\nElrin's home is an apartment complex. A pretty nice one actually.\n\nHis floor is very high up. The entire building is thirty floors high. His room is at the top\nfloor. It's a massive, sprawling space that takes up a fourth of the entire top floor.\n\nOddly, there's less rooms on the upper floor of the building then the lower one. I think all the rooms\non the lower parts of the building are a more reasonable size.\n\n\"Welcome to my abode,\" Elrin says with a slight bow as I step inside.\n\nWe immediately step into the living room. His couch is near white, but the\ncushions are black. There's a massive television set up on the wall. He's got\nan aquarium underneath.\n\nStrange glowing fishing swim back-and-forth in the water.\n\nAcross the room, the dark carpet changes into a tiled floor. His kitchen is fully stocked.\n\nPots and pans of varying sizes rest in a shelf next to the stove. Cooking utensils hang\nfrom the wall on the opposite side.\n\nHis whole apartment is very clean.\n\n\"I have a guest bedroom back this way,\" Elrin says.\n\nI follow him in a slight daze. I'm staying [i]here[/i]?\n\n\"I know it's not home, but I'm sure you will settle in in no time.\"\n\n\"Are you rich?\" I blurt out.\n\n\"$!{fiName}...\" Raven warns.\n\nHe doesn't miss a beat as he responds, \"Well, there's many different kinds of rich. Spiritually rich. Mentally rich. Physically-\"\n\n\"Financially,\" I say.\n\n\"Oh!\" Elrin nods. \"Yes. Yes I am.\"\n\nWhat's this guy doing working as Raven's butler?\n*if (fRavensWorld = true)\n\tIs it a status thing?\n*comment\n\n*page_break\n\nMy room, not unexpectedly, is incredibly nice. It's bigger than any I've ever had. The bed is so large three people\ncould probably sleep on it. Plus its soooo soft.\n\nThe room is well furnished, but there's not really any personal touches. But, thats fine. The somewhat generic air\nof the room helps me feel like I'm not intruding on someone else's home.\n\nRaven comes up behind me as I'm looking over the place.\n\n\"I promise you won't be stuck here for long,\" she says. \"Just until things settle down.\"\n\n\"Right,\" I nod.\n\n\"Elrin is going to be staying with you when you go to school and come home. Just to keep an eye on you.\"\n\nI keep nodding. Staying here might actually be pretty nice.\n\nWait...\n\nElrin is going to be by my side when I'm not in this pocket world?\n\n*page_break\n\n\"Woah!\" I whip around. \"Hold on there. I really don't need-\"\n\n\"Yes, you do.\" Raven speaks with absolute authority. \"You're not wandering around without someone there to look out\nfor you. Elrin is willing to do that. So he is.\"\n\nI can tell from her tone that she's not going to budge on this.\n\n\"Fine.\"\n\n*page_break\n\n*set elrinPartner true\n\nRaven, sadly, doesn't stick around for long after that. It's frustrating not having any clue what's\nreally going on.\n\nTo make matters worse, I don't have time to focus on what she's doing. The haze still needs to be dealt with.\nAnd that criminal group is out there. They'll attack on Halloween...\n\nThat's just fourteen days away. I need to do everything I can during these next two weeks to find these people and stop them.\nThe haze showed me them once. Maybe it will do it again.\n\n*page_break\n\n*set location \"Elrin\"\n\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "010_sub_rescuedfromunion": "\n\n\n\n\n\n\n\n\nMy skin feels like it's on fire.\n\nI can't see anything. My head is pounding.\n\n*page_break\n\nI feel the ground moving underneath me. It's not a smooth movement.\n\nStart.\n\nStop.\n\nAgain and again.\n\n*page_break\n\nIt stops.\n\n*page_break\n\nI don't know how much time passes before I wake up.\n\nI'm lying on a concrete floor. I groan as I force myself to sit up. The pain is gone.\n\nLooking around, I see I'm in a small, empty room. There's a set of bars preventing me from leaving.\n\nI squint at the bars, my focus hasn't quite returned to me. \"...Is this a cell?\"\n\nI shakily stand up, and drag myself to the bars. I nearly fall, but let the bars catch me.\n\nSome guy walks in front of the bars.\n\nHis head is shaved bald, and he has dark skin. He's in incredible shape. He's wearing the same\ncamouflaged clothing as everyone else in the compound.\n\n*if (sex = \"ma\")\n\tHe looks me over. \"Good. You're up.\"\n*if (sex = \"fe\")\n\t\"Hey there. Name's Lucas. I know you're probably pretty shaken, but don't worry.\n\tI'll bust you out in no time.\" He flashes me a smile. \"I promise, you're in good hands and nothing's\n\tgoing to happen to you.\"\nHis voice is very deep. He doesn't look very old though.\n\nThe guy looks to the side for a moment, and seemingly talks to the far wall. \"Hey, Rita? Are you there yet? Come break out\nthis prisoner so I can raise the alarm already. They're going to notice the cameras are off eventually.\"\n\nI hear a door open to the right of my cell.\n\n\"Yeah, yeah. I'm here.\"\n\n\"Any trouble?\" he asks.\n\n\"Hell no.\" 'Rita' sounds like a girl. Around my age maybe? \"Those drunken idiots were never going to notice me.\"\n\nA girl walks into view. I don't understand her hair.\n\nThe side of her head is shaved, with just a thin layer of fuzz on her scalp. The rest of her hair however, is just\nlong enough to reach the bottom of her neck. It's an unnaturally vibrant shade of red, though the fuzz on the\nshaved part of her head suggests it's naturally brown.\n\nShe's wearing a black denim jacket. My eyes are drawn to the large silvery buttons keeping it closed around her. She's\nwearing a gray tie with it. Just before she sat down, I noticed her wearing a black-and-white plaid skirt.\n\nShe's got some nice boots too.\n\n\"You came here like that?\" Lucas asks, nearly shouts really. \"I asked for someone stealthy. Not some chick from\na nearby rave.\"\n\n\"Oh hush.\" She looks at me, and a sudden interest strikes her eyes. \"Well, helloooo there. Who are you, cutie?\"\n\n\"Oh my god,\" Lucas says. \"Just break them out.\"\n\n*if (sex = \"fe\")\n\tShe hesitates, before looking over at me. \"Was he overly nice to you when you first saw him?\"\n\t\n\tIt takes a second for it to a click I'm even being addressed. \"Oh. Uh... normal niceness. I guess?\"\n\t\n\tShe stares at me for a moment. \"Did he lamely promise that he was going to do whatever it takes to get you\n\tout of here, and you had nothing to worry about? Or some crap like that?\"\n\t\n\t\"Uh...\" I look back and forth between them. \"I mean, sorta...\" I don't want to say 'lamely'.\n\t\n\tShe narrows her eyes at Lucas, who glares back. \"You were doing that flirty nice guy crap again weren't you?\n\tAnd you were giving me flak?\"\n*if (sex = \"ma\")\n\t\"Oh, hush,\" she says. \"You flirt with girls constantly. [i]Especially[/i] during missions.\"\n*comment\n\n\"Just get to it.\" Lucas marches toward a door on the left side of the room. \"I'll be in the hall. I'm calling for help the moment I hear that metal\ncrack, you better hurry.\"\n\n*page_break\n\nThe girl pulls something out of her pocket and inserts it into my cell's lock. \"My name's Rita, by the way.\"\n\n\"Uh... I'm $!{fiName}.\"\n\nShe nods, before moving backwards. \"Take a couple of steps back.\"\n\nI step away from the door before there's a sudden jolt from the door and breaks open. Pieces of the lock and surrounding\nmetal bars clatter against the floor.\n\nRita rushes forward and grabs my wrist. \"Time to get a leg on...\" She drags me toward the door she entered from.\n\nAs we're leaving I hear Lucas shouting for help from down the hall.\n\n*page_break\n\nThe doorway she drags me through just leads into a tiny storage space. There's no doors in here,\nbut there is a hole in the wall leading outside.\n\nIt's cut perfectly square. As if someone had carved the hole out with a laser.\n\nRita's moving incredibly fast. I can't quite keep up with her, so I keep getting dragged forward every time\nshe sprints ahead.\n\nIt's actually quite painful...\n\n*page_break\n\nWhen we step out into the yard I was expecting some sort of commotion. However, there's hardly anyone outside\nright now. There are no alarms blaring, and out of those that are out here, none of them seem to be looking for us.\n\nUntil I hear the front door of my prison get thrown open. \"They're escaping! Everybody get out here now! Run them down!\"\n\nEveryone who had just been milling around draws guns and starts looking around.\n\nRita suddenly moves closer, and holds out some sort of wooden cylinder. I can faintly smell smoke coming\nfrom inside it.\n\nA few of their flashlight's beams pass over us, though bizarrely they don't stop on us. In fact, the people\nin the yard don't show any reaction to us at all. They just keep searching.\n\nWhen the light isn't on us, Rita guides me forward. She's not running as fast this time.\n\nWe're taking it slow. Anytime their light nears us, she makes me stop, and we stand perfectly still.\n\nThis goes on for several rounds as we inch closer to the front gate. The yard is starting to fill with extra bodies\nand Rita looks a little more concerned.\n\n\"We might have to make a break for it,\" she whispers. \"This isn't going to keep working. Not on that many of them.\"\n\nWe keep moving, and no one pays us any mind, even as they search for us.\n\nAnd then Father Albert steps out.\n\n*page_break\n\nEven in the dead of night, I notice him immediately. There's a faint glow to his eyes, and his presence itself\ncuts through the darkness.\n\nHis stony eyes lock on us immediately.\n\nHe doesn't take any immediate action. He just stands there looking at us. And then, he closes his eyes.\nI can tell he's taking a deep breath.\n\n\"Time to run.\" Rita chunks the wooden cylinder at the feet of a few people nearby and drags me forward.\n\n*page_break\n\nA blue light flickers off of Father Albert. I can only see it for a brief second.\n\nThe air crackles. I feel a burning sensation on my skin.\n\nThe wooden cylinder explodes into blue flames. the men standing near it scramble away. The entire yard\nlooks at it in shock.\n\n\"No time.\" Rita suddenly wraps her arm around my torso, and just [i]takes[/i] off in a ridiculously fast sprint.\nThe world bleeds by me.\n\n*page_break\n\nI hear guns firing. Shouts fill the air. I can feel Rita's feet hammering against the ground.\n\n*page_break\n\nThe noise fades. It's just Rita running now.\n\n*page_break\n\nEventually. Finally.\n\nRita unceremoniously drops me on the ground.\n\n*page_break\n\nI have no idea where we are.\n\n*page_break\n\nI struggle to stand despite how dazed I am.\n\nWe're surrounded on all sides by forest. A short rocky wall is in front of us, with\na tiny cave inside it.\n\n\"Whew...\" Rita is breathing heavily. \"That was close. Now we just need to wait for the pickup.\"\n\nI finally get to my feet. \"Who are you people?\"\n\n\"Well, my adorable new friend...\" Rita smirks. \"We're The Scourge.\"\n\nOh god. I'm being kidnapped by a super villain group. \"Kay.\" I start backing away. \"I think I can find my\nown way home.\"\n\n\"Huh?\" Rita tilts her head, before her eyes narrow. \"Hey! It's an IRONIC thing. They call us monsters, so we chose a monstrous\nname.\"\n\n\"Sure.\" I nod quickly. \"Whatever you-\"\n\n\"They are murdering people!\" Rita points in what I assume is the direction of that compound. \"They were going to murder\nyou.\"\n\nI stare. \"What?\"\n\n\"Why did you think they put you in that cell?\" she asks.\n\n\"I-\" They imprisoned me after... whatever it was Father Albert did. \"They couldn't have... what about my parents? Where are they?\"\n\n\"Your parents?\" Rita just gives me a blank stare. \"They didn't have anyone else imprisoned.\"\n\n\"No, I mean-\" What happened back there? I can't remember. \"They were members of the group.\"\n\nRita suddenly looks uneasy. There's something in her expression, like she's choosing her next words very\ncarefully. \"You're not human, right?\"\n\n\"Huh?\"\n\n\"That's why they imprisoned you,\" she says. \"They found out you aren't human. So what are you?\"\n\n*page_break What am I?\n\nI'm human. But I was bit.\n\nMaybe I should have told Raven.\n\n*if (fVampireSeed = true)\n\t\"I was bit by a vampire,\" I say. \"But... nothing has happened yet. I'm fine.\"\n*if (fWerewolfSeed = true)\n\t\"I was bit by a werewolf,\" I say. \"But... nothing has happened yet. I'm fine.\"\n*comment\n\n\"For now,\" Rita says. \"Lucas told me that priest's cross knocked you out. It wouldn't have\ndone that if you were just a human.\"\n\nSo I really am going to change. \"I need to find a way to get back in touch with my parents.\"\n\n\"No, you don't.\" Rita moves closer. \"If your parents are with a group like that... they probably\ndon't want anything to do with you now.\"\n\nI just stare at her. \"What?\"\n\n\"Those people,\" Rita begins. \"[i]'The Union of Humanity.[/i]\" She says the name with a mocking tone. \"They murder our kind.\nThey were going to murder you. Maybe your parents didn't like that, but they probably did go along with it.\"\n\n\"That can't be true,\" I say. \"You don't know them.\"\n\n\"Maybe not,\" Rita says. \"But I know their group. I know what they're like.\"\n\n*page_break Minutes pass...\n\nWe don't say anything more to each other.\n\nI eventually hear something from inside the cave. Someone is approaching.\n\nHe's a man. He's wearing white clothing, with a red bandanna covering his face. He also has a red armband.\nThe bandanna has a pattern that looks like jagged, monstrous teeth.\n\nA chill runs down my spine.\n\nThe Scourge... they're the group that murdered Mr. Barrow.\n\nRita gently grabs my shoulder. \"C'mon. We'll get you to HQ.\"\n\nShe's not being threatening. In fact, they're probably trying to help me.\n\nThis might be a good opportunity to safely learn more about them.\n\n*page_break\n\nWe follow the man, but we have no light. The inside of the cavern is pitch black.\nThe only reason I know where I'm going is because I can hear the man in front of us\nwalking.\n\nEventually, some lights come into focus further into the cavern. The small cave's\nclaustrophobic walls widen, and the ceiling raises.\n\nThe jagged rock under my feet smooths out until it's completely flat.\n\nWe're in an artificially carved tunnel.\n\n\"You people dug this out in the countryside?\" I ask.\n\nRita shakes her head. \"We just transitioned to the pocket world our HQ is in.\"\n\n*if (fRavensWorld = true)\n\tSo it's just like Yggdrasil then.\n*if (fRavensWorld = false)\n\tI give her a blank stare.\n\t\n\t\"Oh.\" Rita eventually notices. \"Uh... a pocket world is an entirely separate world created\n\tby magic. It's much smaller than the real world, and you have to find a special entrance to reach one.\n\tOurs has multiple entrances via these tunnels, which we've connected to a bunch of caves.\"\n\t\n\tI keep staring. \"...how commons is this?\"\n\t\n\tRita smirks. \"Most non-human species live in them. It's easier to remain hidden. And safer.\"\n*comment\n\n*page_break\n\nWe eventually come to a set of heavy metal doors. They squeal as people in white clothing push them\nopen to let us in.\n\nStepping through, I see that I'm in a basement. Light streams in from above a nearby staircase.\nThere are also a few cells along the wall.\n\nThere's a woman waiting for me when I step inside.\n\nMy eyes are drawn to a burn she has over one of her eyes. But, the eye itself looks fine.\n\nShe's the woman the murdered Mr. Barrow.\n\n*page_break\n\nShe approaches me, and with a smile says, \"So this is the one you pulled out of the fire?\"\n\nRita nods. \"It was a close call. But, I pulled it off.\"\n\n\"Glad to hear it,\" she says. \"My name's Angeline.\"\n\nI hesitate before answering. \"I'm $!{fiName}.\"\n\nRita speaks up. \"She's the big boss around here. So be cool, or she'll snap at you.\"\n\nAngeline rolls her eyes. \"Oh hush. Go do something productive upstairs for a while.\"\n\n\"Yeah, yeah...\" Rita makes for the staircase. \"Let me know when you're done chatting.\"\n\n*page_break\n\nOnce we're alone Angeline starts talking. \"So... I just need to ask you a few questions.\"\n\nI nod. \"Sure.\"\n\nAngeline pulls some sort of tiny wooden case out of her pocket. She rotates some sort of dial\ninside it. A strange sensation fills the air as she turns it. It's making my skin tingle.\n\n\"So,\" she opens them again. \"What are you, precisely?\"\n\n\"I'm still human,\" I say. \"Though... I think I'm going to change. Eventually.\"\n\nAngeline nods. \"Fair enough. We can get some more details on that later. What do you know\nabout us?\"\n\nVery little really. \"Rita said your were called The Scourge.\" Brutal name. They should change that. \"You\nseem to be opposed to That Union group.\"\n\nShe nods. \"Anything else.\"\n\nI try to say no, but my words suddenly die in my throat. I can't seem to speak.\n\n\"Hm? Oh! That was a little vague,\" Angeline says. \"Sorry, I just have to do that as a precaution.\"\nShe clears her throat. \"Do you know anything important about us?\"\n\nAgain, I try to say no, but the words just die in my throat. I can feel that shift in the air. It's\nmaking the hairs on my arm stand up. My eyes are drawn to the... whatever it is she's holding.\n\nIt's doing something...\n\nAngeline tilts her head, something in her expression shifts subtly to the unfriendly. \"Have you heard of\nus before?\"\n\nMy skin feels uncomfortable. There's a certain scratchiness to it.\n\n\"It's only going to get worse if you don't talk,\" she says. \"What are you holding back right now?\"\n\n*page_break\n\nThe feeling grows worse. It's not painful, but it is unpleasant. Like an unsettling malaise\nthat's just sinking into my bones.\n\n*page_break\n\nI tried not to speak for as long as I could. \"I saw you people murder Mr. Barrow!\"\n\nThe feeling drifts away.\n\nAngeline looks stunned. \"You... saw us?\"\n\nThere's no point in holding anything back. \"In that otherworld. I saw some sort of vision of it.\"\n\n\"Other... world...?\" Something flickers in her eyes. \"What other world?\"\n\nI briefly consider trying to hold back.\n\n*page_break\n\nThat unsettling feeling washes over me, so I spill my guts. About everything.\n\n*page_break\n\nAngeline remained astonishingly silent throughout the entire thing.\n\nAfter a long time, she says, \"Could I have you follow me?\"\n\nAs we're climbing the stairs she says, \"Lucas, the man who helped you escape earlier, works for us. He's\npretending to be one of them. He told us he felt a fog had fallen over Windbrooke, changing the citizens.\"\n\nHe can feel it too? I wonder if he could dive in with us... \"Yeah?\"\n\n\"We didn't believe him obviously,\" Angeline says. \"We just thought he was crazy.\"\n\nI frown. \"Oh.\"\n\n\"But that's not what I want to talk to you about yet.\"\n\n*page_break\n\nWhen we climb the stairs, I realize... this is the warehouse they killed Mr. Barrow in, but it looks substantially different.\n\nRacks of equipment line the walls. Some of the stuff just looks like normal tools, but I'm also\nseeing a lot of weapons. The weapons range from swords and clubs to guns.\n\nMaps cover the walls. Some are of entire cities, the Windbrooke one immediately catches my eye, and\nsome are floor plans of individual homes.\n\nThere are tons of people here. At a glance, I'm guessing far more than fifty. And I'm assuming not\nevery member of this group is currently present.\n\nAngeline is literally leading a small army.\n\nShe leads me to a girl in a wheelchair.\n\n*page_break\n\nThe girl is very young, about twelve or so. She has long green hair. Her right arm is missing.\n\nMr. Barrow supposedly attacked somebody... this girl, she looks like the one from the photo.\n\n\"You're...\" I feel myself pale. \"Uh...\" I look between her and Angeline.\n\nAngeline is studying my reaction. I notice her lips curve up slightly. \"This is River. She's been staying with us... for a time\nnow.\"\n\nThe girl, River, looks surprisingly okay for how badly injured she was. She spins her wheelchair around\nto face me. \"Sup?\" In fact... I can only faintly see some scars on her face. How did she heal that quickly?\n\n\"Uh. Hi?\"\n\nRiver looks at Angeline, \"is the newbie you rescued from those assholes.\"\n\n\"River!\" Angeline warns. \"Watch your language.\"\n\nRiver rolls her eyes. \"That's what everyone else calls them around here.\"\n\nI hesitate before speaking again, \"You... healed pretty well.\"\n\n\"Huh?\" River tilts her head. \"Oh! They already told you about that?\"\n\n\"Sort of,\" I say.\n\n\"Yeah.\" River smiles. \"Angeline's been using this magic stuff on me! She says I won't even need\nthis wheelchair in a few weeks.\"\n\nI nod. \"That's really cool.\"\n\n\"You're doing extremely well, River.\" Angeline puts a hand on my shoulder and leads me away. \"Make sure you keep\ndoing those exercises.\"\n\n*page_break\n\nIt's odd how abruptly Angeline introduced me, then took me away from River. \"Why did you just introduce me to\nRiver?\"\n\nAngeline keeps me moving to a corner of the room blocked off with tarp. The tart is covering some sort\nof big cage they're using as, I guess, a makeshift room.\n\nAngeline eventually says, \"You don't feel he deserved it.\"\n\n\"Huh?\"\n\n\"Mr. Barrow,\" Angeline says. \"You see us as murderers, destroying an innocent man's life.\"\n\nThey murdered Mr. Barrow. But he wasn't an angel himself. \"I never said he was innocent.\"\n\n\"Perhaps,\" Angeline says. \"But I could feel your detachment when you told me of what you'd\nseen.\" She stops in front of a cage door leading into the tarped off section. \"It's not real\nto you. You saw a photo of a girl, and that's it. You logically know he tried to kill someone,\nbut I don't think you fully appreciate it.\"\n\nShe leads me inside the large cage.\n\n*page_break\n\nI didn't know why this section had been so thoroughly cut off from everything else until I stepped\ninside.\n\nThere are multiple bodies being kept in here. They're kept covered under white sheets, and each sit on\nmetal beds.\n\nThere's a massive metal storage unit in the space. I can feel cold air coming from it. I suspect more\ncorpses are stored within.\n\nMultiple charts cover the far wall, just above a set of short storage lockers.\nEven at a distance, I can see they detail various bodily wounds that I assume belong to these corpses.\n\n\"River was living with her mother,\" Angeline says, walking over to the lockers. \"Until the rioting\nhappened.\" She opens one of the lockers, and produces a single folder.\n\nShe hands it to me. Inside are pictures of a woman I don't recognize. Her hair is a very pale green, and her\nears have a noticeable point to them.\n\nSome of them just look like family photos. I see River in a few, though she looks much younger.\n\nSome of the photos are much bloodier. They depict her as a corpse lying on the pavement. I can barely\nrecognize her through the blood and mulched flesh.\n\n\"Mr. Barrow killed her mother too,\" I mumble, more to myself than Angeline. \"Why are you showing me this?\"\n\nAngeline asks, \"Do you feel that man didn't deserve what we did to him?\"\n\nI sense I'm being offered an out here. If I say the right things they might work with me.\n\n\"Not really,\" I say. \"He seemed like a bastard.\" He did, honestly.\n\nAngeline hesitates, studying my face carefully. \"He didn't kill River's mother.\"\n\nI stare at her. \"She... didn't die during the riots?\"\n\n\"No, she did,\" Angeline says. \"Mr Barrow just wasn't the one who personally attacked her. His allies did.\"\n\nHis allies. \"The The Union of Humanity?\"\n\nShe nods. \"The same people we just rescued you from. The same people who would have murdered you if we hadn't.\"\n\nI don't say anything for a while after that. I just look over the room.\n\n\"Who are these people?\"\n\n\"Their victims,\" Angeline says. \"Some of them belonged to our group. Many did not.\"\n\nI don't say anything.\n\nAngeline eventually speaks up. \"I have an interest in that 'haze' you spoke of.\"\n\n\"Yeah?\"\n\n\"You remember Lucas?\"\n\nI nod. The guy who saved me. He works for them I guess.\n\n\"I want you to work with him,\" she says. \"He can feel that fog as well. The fact that you saw our operations here\nin the fog is deeply disturbing. And, I'll admit, the haze seems to pose a significant threat to the public as well.\nWill you do this?\"\n\n*page_break\n\nWorking with Lucas? These people seem dangerous.\n\nBut we could use the extra help.\n\nIt's not like I'm getting out of here if I say 'no' regardless.\n\n*page_break\n\n\"If you're willing to help,\" I say. \"I'll be happy to work with him.\"\n\n*page_break\n\n*set location \"Scourge\"\n*set lucasPartner true\n*set ritaPartner true\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "010_sub_scourgebase": "\n\n\n\n\n\n\n\n\nWe leave the werewolf compound.\n\n...With me having not gotten to actually socialize with a single werewolf.\n\nBut we don't follow a single path or trail. They just lead me through the woods.\n\nSurprisingly they bring River with them. There's too many shrubs and uneven terrain for her to follow\non her own, so Lucas carries her wheelchair with her sitting in it.\n\nOnce again, he doesn't seem to be straining to handle her weight at all.\n\n*page_break\n\nIt's incredibly dark out here, but Angeline generates some sort of wisp of light that follows us\naround.\n\nIt floats around is, slowly circling and drifting up and down.\n\nIt's not long until we come a cross a cave built into a short cliff.\n\n*page_break\n\nLucas sets River back down, though the terrain isn't really any better over here either.\n\nWe idle around, not doing anything in particular.\n\nMaybe I should make some idle chatter...\n\n*choice\n\t#Chat with Lucas. He seems to be on my side.\n\t\t*set f_10_Chat \"Lucas\"\n\t\t\n\t\t\"How long have you sensed the haze?\" I ask.\n\t\t\n\t\tLucas shrugs. \"I can't remember the first time I felt it. It's like it was always hanging around\n\t\tin the back of my mind. It just took me a while to notice it.\" He looks thoughtful for a moment.\n\t\t\"But... I think the feeling started after the riots. Or maybe even before.\"\n\t\t\n\t\tHe's definitely talking about the same haze then. \"It comes from some sort of sphere. There's a\n\t\tbunch of them. If we destroy them, the haze weakens.\"\n\t\t\n\t\t\"Spheres?\" Lucas crosses his arms. \"It feels stronger at certain places...\"\n\t\t\n\t\t*goto lbl_Chat\n\t#Talk to River. She's probably the only one who wouldn't kill me.\n\t\t*set f_10_Chat \"River\"\n\t\t\n\t\t\"You've healed very quickly.\" I don't know if her injuries are really okay to talk about. What she\n\t\twent through was probably incredibly terrible. I don't know what else to say though.\n\t\t\n\t\t\"Angeline has been healing me!\" River chirps. \"It's soooo cool.\"\n\t\t\n\t\t\"Yeah?\" I smile, and I can see Angeline trying not to let a proud smirk show. \"Well, that's very...\" Angeline's\n\t\t'been' healing her. \"...is she still having to heal you?\"\n\t\t\n\t\tRiver nods. \"Yeah, but she says I won't need this dumb wheelchair in a few weeks. So that's cool.\"\n\t\t\n\t\t*goto lbl_Chat\n\t#Speak to Angeline. She's probably the most likely to kill me.\n\t\t*set f_10_Chat \"Angeline\"\n\t\t\n\t\t\"So.\" I stare at Angeline.\n\t\t\n\t\tShe stares back.\n\t\t\n\t\tGood talk.\n\t\t\n\t\t*goto lbl_Chat\n*comment\n\n*label lbl_Chat\n\nI hear an echo from within the cavern. I can't make it out at first, but as it draws closer, I realize it sounds\ndistinctly like footsteps on stone.\n\nI squint against the darkness of the cavern, but can't make out anything.\n\nA sudden light shines in my eyes, and I wince away.\n\n\"Angeline?\" An unfamiliar voice calls. \"Did something happen?\"\n\nShe glances my way. \"You could say that.\"\n\nA man in white clothes steps out of the cavern. He's wearing a red bandanna and arm band.\n\nAngeline briefly converses with him before he guides us into the cave. The man himself\ndoes not use a light, but Angeline has the wisp follow us regardless. Lucas is forced to carry River again.\n\nAs we walk through the cavern, the entrance getting further and further behind us, I ask, \"Aren't your arms getting tired.\"\n\nLucas just smiles. \"Not even a little.\"\n\n*page_break\n\nEventually I see a light in the distance. Multiples of them in fact.\n\nThey're lights. Electric ones, installed into the tunnel's ceiling.\n\nThe cave that we stepped into looked natural, but the floor just evened out under my feet. It's so flat and smooth\nnow, Lucas is able to put River down.\n\nSomeone carved this tunnel through the rock.\n\n\"Welcome to HQ,\" Lucas says. \"We've got secret tunnels that let us into this pocket world all over the place!\" Lucas looks\nquite proud of this fact.\n\nAngeline glares at him. \"Lucas...\"\n\nHe shrugs. \"What? They'll be on our side when everything is said and done. And then we can go tackle that haze-\"\n\n\"Stop talking,\" she says through gritted teeth.\n\nThese folks are really bad at kidnapping people.\n\n*if (fRavensWorld = false)\n\tWe only take a few more steps before the words 'pocket worlds' sink in.\n\t\n\tI look at Lucas. \"Pocket world?\"\n\t\n\tHe nods, but doesn't even look my way.\n\t\n\tI keep staring.\n\t\n\tHe eventually feels my silences and glances over. \"Huh? Oh... yeah. You know... those little hidden worlds that can be made with magic.\n\tOur base is in one.\"\n\t\n\tI keep staring at him.\n\t\n\tHe stares back. \"Have you... have you seriously never heard of that? You were just in one. And now you're in another one.\"\n\t\n\t\"I was!? And I am!?\"\n\t\n\tHe stares at me. \"Seriously...?\"\n\t\n\t\"How many of these 'little worlds' are there!?\"\n\t\n\t\"Like, I dunno... thousands? Probably more?\" Lucas eventually shrugs.\n*comment\n\n*page_break\n\nThe tunnel ends at a large set of metal doors. The doors look like they were built to withstand a nuke from how huge and heavy\nthey look.\n\nThe metal screams as the doors are forced open from the other side. Slowly, inch by inch they part.\n\nI spot a couple of more people in familiar white clothing. They have to work in teams of four to push both doors\nopen. Two for each one.\n\nAn empty room lies beyond them. the only thing I see in it is a staircase leading up. The room is dark, but I see plenty\nof light streaming in from above.\n\nI don't get to see what's up there, however.\n\nBecause, although I couldn't see it from behind the doorway, there is a couple of cells built into the wall of what\nI'm guessing is their HQ's basement.\n\nAnd that's where I get thrown into.\n\n*page_break\n\n*if (sex = \"ma\")\n\t\"No worries!\" Lucas calls from over his shoulder as he and the others head upstairs. \"You'll be fine! Just\n\tlet me sweet talk them a bit, you'll be out in no time!\"\n*if (sex = \"fe\")\n\tLucas stands at the door to my cell as the others head upstairs. \"Hey... uh. Sorry about this. But don't you\n\tworry! I'll talk them out of keeping you here in no time.\" He flashes me a smile. \"I know they'll be interested\n\tin what you have to say about the fog.\"\n*comment\n\nComforting!\n\n*page_break\n\nI'm left alone.\n\nWhat now?\n\n*page_break\n\nThere's a single bed in the cell, and absolutely nothing else.\n\nI lie down on it, and pull out my phone.\n\nUnsurprisingly, there's no reception.\n\n*page_break\n\nThis isn't a safe situation to be in, but... Lucas is on my side, right?\n\nThey seem to at least have an awareness of the haze in Windbrooke. They might\nhear me out about that.\n\nThen again, these are possibly not people I want on my side.\n\nThey killed Mr. Barrow. They murdered a guy.\n\nGranted he wasn't exactly an angel of humanity himself.\n\n*page_break\n\nIt isn't long before Angeline makes a return. She's alone this time.\n\nI feel that same pressure in the air that I did when we first started talking\nback at the compound.\n\nShe's holding that device from before.\n\nShe opens the cell door, and steps inside. I sit up on my bed.\n\nI'm surprised when she takes a seat next to me.\n\n\"Sorry about...\" Angeline vaguely gestures around herself. \"All of this.\"\n\nI raise a brow at her. What is with this lady and getting so close?\n\nI guess it's supposed to come off as 'warm'. \"Sure.\"\n\nShe leans back a bit, and crosses her legs. \"I need you to start from the beginning.\"\n\n\"Hm?\"\n\nShe stares at me. There's an intensity to her gaze. \"This... 'haze'. I need you to tell me everything about it.\nWhen you first felt it. What this 'otherworld' is. Everything.\"\n\n*page_break\n\nAnd I do.\n\nI tell her absolutely everything.\n\n*page_break\n\nShe doesn't say anything as I speak with her, except to occasionally ask for clarification.\n\nWhen I'm finished she's just sitting quietly.\n\n\"I need to show you something,\" she says finally.\n\nMy visit to the dungeon is thankfully cut short as I'm brought upstairs.\n\n*page_break\n\nWe're in that same warehouse I saw them kill Mr. Barrow at, but it looks substantially different.\n\nRacks of equipment line the walls. Some of the stuff just looks like normal tools, but I'm also\nseeing a lot of weapons. The weapons range from swords and clubs to guns.\n\nMaps cover the walls. Some are of entire cities, the Windbrooke one immediately catches my eye.\n\nThere are tons of people here. At a glance, I'm guessing far more than fifty. And I'm assuming not\nevery member of this group is currently present.\n\nAngeline is literally leading a small army.\n\nI'm in trouble...\n\n*page_break\n\nWe don't linger for long. Angeline leads me to a corner of the warehouse that's blocked\noff with heavy tarps. I can tell the cloth is hanging over some sort of big cage.\n\nThere's a small opening in the tarp, with a door made up of steel bars exposed. Through\nthe door, I can see they've combined a large cage and the tarp to make a make-shift room.\n\nIt isn't apparent why they went so far to block off this space from the rest of the warehouse\nuntil I'm led inside.\n\nThere are multiple bodies being kept in here. They're kept covered under white sheets, and each sit on\nmetal beds.\n\nThere's a massive metal storage unit in the space. I can feel cold air coming from it. I suspect more\ncorpses are stored within.\n\nMultiple charts cover the far wall, just above a set of short storage lockers.\nEven at a distance, I can see they detail various bodily wounds that I assume belong to these corpses.\n\n*page_break\n\n\"River was living with her mother,\" Angeline says, walking over to the lockers. \"Until the rioting\nhappened.\" She opens one of the lockers, and produces a single folder.\n\nShe hands it to me. Inside are pictures of a woman I don't recognize. Her hair is a very pale green, and her\nears have a noticeable point to them.\n\nSome of them just look like family photos. I see River in a few, though she looks much younger.\n\nSome of the photos are much bloodier. They depict her as a corpse lying on the pavement. I can barely\nrecognize her through the blood and mulched flesh.\n\nSo her mother died too.\n\n\"Mr. Barrow killed her mother too,\" I mumble, more to myself than Angeline. \"Why are you showing me this?\"\n\nAngeline asks, \"Do you feel that man didn't deserve what we did to him?\"\n\nI sense I'm being offered an out here. If I say the right things I might not get put back in\nthat cell.\n\n\"Not really,\" I say. \"He seemed like a bastard.\" He did, honestly.\n\nAngeline hesitates, studying my face carefully. \"He didn't kill River's mother.\"\n\nI stare at her. \"She... didn't die during the riots?\"\n\n\"No, she did,\" Angeline says. \"Mr Barrow just wasn't the one who personally attacked her. His allies did.\"\n\nHis allies? \"And who are they?\"\n\n\"Have you heard of The Union of Humanity?\" she asks.\n\n\"I haven't.\" Though, based on the context of this situation, I'm assuming it's some sort of supremacist group.\n\nAngeline pulls a photo out of her pocket and hands it me.\n\nIt shows some sort of compound. Numerous people in camouflage are walking around carrying rifles and\nassault rifles. It looks very militaristic.\n\nI ask, \"Is this an army base somewhere...?\"\n\nAngeline shakes her head. \"They aren't with the army. And that's only out in the countryside near Windbrooke.\"\n\nI stare at the photo. \"Who are these people?\"\n\n\"This is the Union of Humanity,\" Angeline says. \"Dozens of their members took to the streets during the earliest\nparts of the rioting. They attacked. They massacred our kind.\"\n\nI look around the room. \"These people...\"\n\n\"Murdered,\" Angeline says. \"By them.\"\n\n\"We could use your help,\" she says. \"This... haze, whatever it is... It's important.\"\n\nI imagine Lucas has been drilling them on that point. \"You want me to keep investigating it?\"\n\nShe nods. \"With Lucas at your side.\"\n\nWell... seeing as my alternative is going back in that cell. I might as well play ball.\n\n\"Alright,\" I say. \"I'll join you.\"\n\n*page_break\n\n*set location \"Scourge\"\n\n*return\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "010_sub_theunion": "\n\n\n\n\n\n\n\n\nThere's a knock at the door.\n\nIf I were upstairs, I would have just pretended I didn't hear it, but I'm standing in the middle\nof the store floor, and the man at the door is looking at me right now.\n\nHe's dressed in camouflage, and I can see a few more people behind him in a heavy-looking truck. They're illegally parked on\nthe curb.\n\nI squint at the vehicle as I approach the front door. It kinda looks like there are armor plates reinforcing the\nsides of it?\n\nVery odd.\n\n*page_break\n\nWhen I open the door, the guy is just kind of staring at me. He's middle-aged, and has a big, bushy beard.\n\nHe looks... surprised? I have no idea why.\n\n\"Can I help you, sir?\" I ask.\n\n\"Uh...\" he looks back at the other men behind him. They're just giving him confused stares. He looks back at me.\n\nI raise a brow.\n\n\"Are you... $!{finame}? $!{laName}?\"\n\nI nod.\n\n\"Give me one second,\" he says, quickly retreating back to his friends.\n\nI stand in the door way, holding it open as he has an animated conversation with his friends. They eventually\ngrab a large radio from the truck and start talking to someone.\n\nMaybe I should just lock the door and go upstairs.\n\n*page_break\n\nEventually, he walks back over to me. \"Um. We need you to come with us.\"\n\nOkay. I'm locking the door and going to bed.\n\n\"Your parents are waiting for you,\" he says. \"Right now.\"\n\nI stare at him. \"What?\"\n\n\"We have a compound just out of town,\" he says. \"Your parents have been with us since the attacks on\nWindbrooke. They couldn't find you.\"\n\n\"I... was just here. With my aunt,\" I say.\n\nHe shrugs. \"I'm sure they can explain it to you when we get there.\"\n\n*page_break\n\nI load into the back of their armored vehicle with a few other men before leaving. They have a lot\nof odd items in their truck.\n\nBottles of booze. Crowbars and rope. Rags too.\n\nThis may have been a mistake...\n\n*page_break\n\nWe drive for a long time. We keep going until we're out of Windbrooke and headed into the nearby countryside.\n\nThe smooth paved road we ride along eventually gives way to bumpy dirt. The truck kicks up a cloud of dirt behind\nit.\n\nThe sun is just barely clinging to the horizon. The trees cast dark shadows across the path we're following.\n\nIn the distance, concrete walls come into focus. the dirt trail leads to a large open gate.\n\nWe pass through it and I see the walls surround some sort of compound. There are a few large buildings, but most\nof the space is made up of training courses. It looks like something I would have seen in a military movie.\n\nThere are people milling around outside. all of them are dressed in the same camouflaged uniforms as the\nmen I currently ride with.\n\nThey bring their truck to a stop in front of a small church near the back of the compound, and step out.\n\nI follow them.\n\n*page_break\n\nAll the buildings in this compound are gray and otherwise featureless. The only thing that made the church stand out\nis multiple crosses nailed to the front wall, and several graves at both of its sides.\n\nThe door is already open when I enter it.\n\nMultiple rows of benches stretch from the back to the front of the building. I haven't been to, or seen, very\nmany churches in my life, but this is definitely the smallest I've ever come across.\n\nI don't see anybody inside the building, except for a familiar looking couple sitting at the front of the church.\n\nI immediately rush over to them.\n\nThe man stands as I approach. He's still wearing those thick rimmed glasses he always wears, though\nI notice a sizable crack in the right lens.\n\nA mixture of disbelief and relief washes over his features the moment our eyes meet.\n\n\"Dad!\" I skid to a stop in front of him. \"You're alright!\"\n\n\"Thank god!\" He clasps my shoulder. \"We thought... We're so glad they found you.\"\n\nMom rises. I can see a hint of excitement running under her features, but like always, she carries herself\nmore stoically than dad does.\n\n\"Honey...\" She walks and gives me a brief hug. I return it more forcefully. \"I'm so glad to see that you're safe.\"\n\nI let go of her, still smiling \"I was with Raven.\n*if (fToAdam = true)\n\tWell- with Adam actually. At first. then I started staying with her.\"\n\t\n\tShe nods. \"I see... I suppose we should have known she'd strong-arm you into staying with her.\"\n*if (fToAdam = false)\n\t\"\n\t\n\t\"I see...\" Dad says. \"I guess we should have seen that coming. What about Adam?\"\n\t\n\t\"Huh?\" I tilt my head. \"Oh. He's fine. I've actually visited him a few times already.\"\n*comment\n\nI look around the tiny church. \"What is this place...?\"\n\n\"Oh!\" My mother clasps her hands together. \"This is father Albert's church. We're inside one of The Union's\ncompounds. Your father and I are a bit over the hill to join the others-\"\n\n\"I'm not that old yet,\" my father cuts in. \"I could handle it.\"\n\nMom hesitates. \"...I'm sure you could dear. but you still aren't going to.\" She looks back to me. \"But we've been\nvolunteering with them since the attacks in Windbrooke.\"\n\n\"What do they do exactly?\" I ask.\n\nA voice calls from the back of the church. \"We fight back.\" A man enters from somewhere in the back.\nHe's quite old. His hair is short and pure white. But, his presence is not weak for it. He's tall,\nand though he doesn't possess any sort of significant physique, there's something commanding about his presence.\n\nHis voice is deep, his gaze is piercing. He wears the clothes of a priest.\n\nHe watches me carefully.\n\nThere's something about his eyes...\n\nThey are such a bright blue, and there's almost a... glow to them. It's silvery.\n\n*page_break\n\nHe looks me over.\n*if (fVampireSeed = true)\n\t\"Hmph.\"\n*if (fWerewolfSeed = true)\n\t\"Hmph.\"\n*if (fHumanSeed = true)\n\t\"We'll see.\"\n*comment\n\nI stare back at him. Then, shift my gaze to my parents.\n\nThey're just smiling at him.\n\nMy father approaches first. \"Please, father Albert. Thank the men responsible for finding our child for us.\" He\ngives a weak bow to the man. \"I can't begin to describe how thankful we are to them.\"\n\n\"I'm sure you'll have the chance to thank them yourself,\" the priest says. \"I've recalled all our soldiers for the night.\nWe'll be having quite the feast.\"\n\nMy father gives him a confused. \"Oh? Did something happen?\"\n\nThe priest looks at me again. \"I'll give the announcement tonight at dinner. Your child will be attending.\"\n\nMy father nods excitedly. \"Of course!\" I don't think he quite caught that he was receiving instructions, not a request.\n\n*page_break\n\nThis guy is bone-chilling to be around.\n\n*page_break\n\nOut of all the buildings in this compound, one is noticeably larger than the others. Music is pouring out from its walls the\nmoment I leave the church. Everyone who had been idling outside is making their way towards it.\n\nMy mother and father are by my side as we approach. Father Albert hangs behind us.\n\nI can feel his eyes on the back of my head.\n\n*page_break\n\nThe large building is in fact, just one massive room. There's a kitchen, but it's not actually separated from\nthe dining space by any sort of walls. Instead all of their equipment merely sits in the center of the room.\n\nThe tables are all large, and can seat dozens of people each. The music is coming from a band set up on a stage\nin the far corner of the room.\n\nEveryone is talking, and seem to be in high spirits.\n\nTo the right of the band, on an even higher but much smaller stage, is a podium. Father Albert makes his way up to\nit.\n\nEven before he reaches it, the room falls quiet.\n\n*page_break\n\n\"This is so exciting,\" someone excitedly whispers into my ear. \"I heard rumors he's had another vision.\"\n\nWhen I look to the side, I see a very boyish young man smiling at me. He's got the most perfect golden hair\nI've ever seen. It hangs around his face in lengthy bangs.\n\n\"Hiya. I'm Toby.\" He pats me on the shoulder. The motion is... kind of awkward. I think he's aware of it from the\nway he's just stiffly standing there. \"I, uh... I got to know your parents after they joined us. I'm glad they found you again.\"\n\n\"Yeah?\" I just nod. \"Well, I'm $!{fiName}.\"\n\n\"Oh! I, uh- I know!\" He nods. \"your parents told me. They showed me pictures of you.\"\n\nOkay...\n\nI turn to look at Father Albert as he steps behind the podium. The band stops playing.\n\nThe room is dead silent now.\n\n\"My people... my children...\" His voice carries over the room with power and authority. \"I have been shown another\nvision. The day of reckoning is coming. And it is coming sooner than we feared.\"\n\nThe room remains silent. He has everyone's absolute attention.\n\n\"We must continue to prepare ourselves. We must be stronger,\" he continues. \"These demons have armed themselves. They\nwill come for us. they will come for our neighbors, our friends, our children... everyone.\"\n\nHe looks over the crowd, before his eyes fall on me. \"But first... we have someone new here. Someone who has been\nliving in the presence of one of these demons.\"\n\nA chill runs up my spine. This isn't right.\n\nThis group isn't right.\n\n*page_break\n\nI need to get out of here.\n\n*page_break\n\nHe points a single finger at me. \"Child, come here.\"\n\nI hesitate, glancing around at all the eyes on me.\n\nSlowly, I approach him.\n\nHe has something behind the podium. It's a rather large cross. It's made out of some sort of metal, looks like silver.\nThere's a very tiny slot carved out of the metal.\n\nThe slot holds some sort of glassy blue object. Maybe a crystal?\n\nI walk up to the stage, and continue on to his podium.\n\nHe holds the cross out, pointing at me like he's warding off a vampire.\n*if (fVampireSeed = true)\n\tYeah... I should probably keep that bite to myself.\n*comment\n\n\"Come closer child,\" he says. \"Look into the light.\"\n\nI squint at the crystal embedded in the cross.\n\n*page_break\n\nThere does seem to be a light coming from it...\n\n*page_break\n\nIt's so bright.\n\n*page_break\n\nMy legs feel like jelly...\n\nThere's a crispness to the air. It's simultaneously refreshing and difficult to take in.\n\nI can't see anything around me. There's so much light.\n*if (fHumanSeed = false)\n\tIt burns slightly.\n*comment\n\nI struggle to keep standing.\n\nI squint ahead. Despite the blinding light, something looms ahead...\n\nIt's getting closer.\n\n*page_break\n\nThere's a thousand wings, and a thousand arms. It towers over me at unbelievable heights. Each feather\nshines heavenly radiance. It looks down on me with all those eyes, but no faces.\n\nI don't know how to describe it's body. It's massive and formless. It's a cluster of limbs, but their\nnot chaotic and disorganized. There's a pattern to it's form. It pleasing and terrifying to look at\nsimultaneously.\n\nIt's presence is indescribable. It's very shape and figure weigh down on me like a million pounds of\nstone.\n\nIt takes every ounce of willpower I have not to collapse to the ground and vomit.\n\nI can't look away from it. Even as its radiance burns against my skin and eyes.\n\nIt speaks to me. I hear no voice and no words, but I know what it means to say regardless.\n\n*page_break\n\n[i]Child... you have found yourself amongst the union then?[/i]\n\n[i]Troubling.[/i]\n\n[i]Did you hide your marks? You've lost an opportunity.[/i]\n\n*if (fHumanSeed = false)\n\t[i]Ah. You did hide them. No need for concern. You will be given a second chance.[/i]\n\t\n\t[i]Trust him when he appears. You will make it out of this alive.[/i]\n*if (fHumanSeed = true)\n\t[i]No... You were not given The Wolf's blessing, nor the blood of the fallen?[/i]\n\t\n\t[i]Troubling. Very troubling.[/i]\n*comment\n\n*page_break\n\n[i]You have seen him. The priest and his flock.[/i]\n\n[i]He accepted our blessing long ago.[/i]\n*if (fHumanSeed = true)\n\t[i]You are only human. So you will need to as well.[/i]\n*comment\n\n[i]There is another. She is one of the magic. She is amongst the creatures.[/i]\n\n[i]The sorceress wields her gifts to protect her people. Just as the priest wields his for his own flock.[/i]\n\n[i]Their vision has been clouded by a terrible fog. You've seen through it already. Your mind is clear.[/i]\n\n*page_break\n\nI think I'm going to pass out soon. But its still going.\n\nI can barely understand it...\n\n*page_break\n\n[i]You have a chance to make a difference here. You can stop the streets of your home from being filled with blood.[/i]\n\n*if (fHumanSeed = false)\n\t[i]You already have the power inside you. It's clawing to the surface even now.[/i]\n\t\n\t[i]Be brave. You will make it out of this alive.[/i]\n*if (fHumanSeed = true)\n\t[i]But you are not strong enough. Not yet. You will not survive without more power.[/i]\n\t\n\t[i]Take the blessing of the heavens. Its power will grow inside you.[/i]\n\t\n\tA single shining feather carries downward from it to me. It digs into my chest and settles there, but it doesn't hurt.\n\t\n\tI do however, feel a tremendous force coming from it. My body trembles under the weight of it all.\n\t\n*comment\n\n*page_break\n\n*return\n", "010_sub_vampirenight": "\n\n\n\n\n\n\n\nThe drive doesn't take very long. We stop at a... building.\n\nI stare at it from the car. It could be some sort of office building, but there's no\nsigns up telling me what sort of place it is. It's a few stories tall, and all the windows\nare thickly tinted. It's just a painfully nondescript building.\n\nThe parking lot has no other cars in it.\n\n\"Here we are,\" Elrin says. \"Just follow me, and we'll arrive in no time.\" He pauses. \"Do you have the necklace?\"\n\nIt's still around my neck. I hold the gem up wordlessly.\n\n\"Right. Of course.\" He steps toward the building. \"Good thinking! You can't lose it if you wear it.\"\n\n\"Sure.\" I nod and step out. \"We're meeting them in there?\"\n\n\"Sort of...\"\n\n*page_break\n\nThe front door is unlocked. A security guard is sitting behind a desk. He briefly glances at Elrin,\nthen me, then my necklace.\n\nHe waves us through.\n\nElrin just shoots the man a nod and a smile before continuing through a door. I keep moving more hesitantly.\n\n*page_break\n\nThis building has nothing in it. The front desk is the only decor I've seen.\n\nThe security checkpoint lets out into an empty hallway.\n\nThere are no doors beside the one we just stepped through.\n\nElrin grabs my shoulder, and guides me forward.\n\nI eye the blank wall straight ahead.\n\n*if (fRavensWorld = true)\n\t\n\tIs this like Raven's workshop
