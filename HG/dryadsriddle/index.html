that, ${Name}?” Lucas asks you.\n\n“Fairies don’t make those mushroom rings, it’s dryads,” you repeat yourself.\n\nLucas and Sophie give you a very strange look, like you’ve completely lost your mind. “${Name}, what are you talking about?” Sophie asks you.\n\nYou pause for a moment to think about it. “... You know, I have no idea,” you’re forced to admit.\n\n“You’re being weird,” Lucas tells you. “Come on, let’s go and get ice cream already!”\n\n“Yeah!” cheers Sophie, and the two of them start to head towards Lucas’s house once again.\n\n*page_break\n*if Beans > 10\n  *goto No_Treasure\n*if Beans \u003c= 10\n  *goto Treasure\n\n*label No_Treasure\n\nGetting back to your feet, you pause when you think you hear a faint voice behind you. “Goodbye ${Name},” it almost sounds like, but of course when you turn around there is nothing there except the old tree.\n\n“Strange,” you mutter to yourself. “I could’ve sworn...” Deciding to forget about it, you shrug your shoulders and chase after Lucas and Sophie... Meanwhile, up in the tree, a faint, flickering light is chasing around an agitated squirrel.\n\n*goto ending\n\n*label Treasure\n*achieve treasure\n*if ((Hints = 0) and (Beans = 0))\n  *achieve master\n\nGetting back to your feet, you pause when you think you hear a faint voice behind you. “Look in the circle,” it almost sounds like, but of course when you turn around there is nothing there except the old tree.\n\n“Strange,” you mutter to yourself. “I could’ve sworn...” You’re almost about to dismiss the voice as your imagination, but you look down at the broken toadstool circle out of nothing but childish curiosity. When you look though, you are surprised to see a faint glimmer of something metal sticking out of the ground. Getting to your knees, you dig around the metal and discover it to be some kind of golden coloured handle, though whatever the handle is attached to is too heavy to simply pull out of the ground.\n\n“Hey Lucas, Sophie, come here!” you call your friend and your sister back, and at the excitement in your voice they both come rushing. “I found something,” you say, showing them the handle. “Here, what do you think this is?”\n\nLucas gets on his knees to take a closer look. “Don’t know,” he admits. “Looks like one of them handles like you’d get on an old toy box. Or maybe a chest of draws or something?”\n\n“It’s the treasure!” Sophie declares suddenly. “Grandma was right ${Name}, you found the fairy treasure!”\n\n“Don’t be stupid, there’s no such thing,” Lucas scolds your sister. “Looks interesting though. Come on, I’ve got a bucket and spade back home. We can dig it up!” And all three of you are more than happy with that suggestion.\n\n*page_break\n\nAnd so you spend the next few hours using sandcastle building tools to dig up an old box. As more and more of the box gets revealed, it starts to look increasingly like some kind of old fashioned treasure chest.\n\n“I told you, it’s the fairy treasure!” Sophie insists.\n\n“No way, it must be a pirate’s chest!” suggests Lucas.\n\nEither way the three of you are equally excited when you finally pull the box out of the ground and throw open the lid to reveal... “Gold?” you ask, wide eyed and shocked as you watch the light flickering off the coins in the treasure chest. “Are those real gold coins?”\n\n“Even better!” Sophie cheers as she picks up one of the coins, peeling away the golden surface to reveal a far more precious treasure beneath. “Chocolate coins!”\n\nLuckily all three of you are still young enough to appreciate that chocolate is far superior to gold in every way. You sit happily under the tree, stuffing your faces with chocolate coins until you’re almost sick. Once the three of you can eat no more, you carry the chest with the remaining coins back to your house to enjoy another day.\n\n\n*page_break\n\nOut of earshot and out of sight, a flickering light hovers next to an old tree where three friends carved their names. “Wow, that sure was nice of you to fill the treasure chest with chocolate coins instead of real ones,” the light says.\n\n“Of course,” replies the tree. “There’s precious little joy that real gold can bring. Give a child real gold and the whole world will try to take it away from them. Give them chocolate gold and their faces light up like it’s Christmas come early.”\n\n“What’s a Christmas?” asks the little light.\n\n“You know that one day a year when Old Saint Nick takes all those presents into the human world and comes back with a life-time supply of mince pies and carrots?” asks the tree.\n\n“Oh, I love mince pie and carrot day!” the light cheers. “Sometimes if I’m lucky he gives me a glass of eggnog too.”\n\n“Yes, like you really need the sugar,” groans the tree.\n\nAnd so these two creatures of myth and magic chatter away in a circle of broken mushrooms, alive forever in one’s child’s imagination.\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]The Dryad's Riddle.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "funfair": "*temp Riddle_Coin\n*temp Coin_Hint 0\n*temp Coin_Bean 0\n*temp Riddle_Teapot\n*temp Teapot_Hint 0\n*temp Teapot_Bean 0\n*temp Riddle_One\n*temp One_Hint 0\n*temp One_Bean 0\n*temp Riddle_Hole\n*temp Hole_Hint 0\n*temp Hole_Bean 0\n*temp Riddle_Sponge\n*temp Sponge_Hint 0\n*temp Sponge_Bean 0\n*temp Animal_Hint 0\n*temp Animal_Bean 0\n*temp Riddle_Ace\n*temp Ace_Hint 0\n*temp Ace_Bean 0\n*temp Riddle_Sweets\n*temp Sweets_Hint 0\n*temp Sweets_Bean 0\n*temp Riddle_Chess\n*temp Chess_Hint 0\n*temp Chess_Bean 0\n*temp Goldfish_Hint 0\n*temp Goldfish_Bean 0\n\nYou have to run as fast as your feet can carry you to keep up with Luna as she flies full speed towards the entertainment. “Yey! Mr Chuckle’s Super Happy Carnival of Fun and Awesomeness!” the little wisp cries with joy. “I’m going to look at the animals and win a yeti bear and eat banoffee berries and go on all the rides till I’m sick... And then go on them again!”\n\nEventually you make it to the great, inflatable arch where all kinds of mythical creatures from the tallest giant to the tiniest pixie are all queuing up to get inside. Unfortunately you’re forced to push through a few people to catch up with Luna, who was much too excited to wait for you.\n\n“Oh there you are!” Luna declares when you arrive, as if she was wondering where you’d gone. “This is going to be so much fun! ... You’ve got the money right?”\n\n“Uh... Money?” you mumble nervously as you rummage through your pockets.\n\n“Yes, of course! You need to pay to get in,” Luna states, matter-of-factly. “Wait, humans don’t go to the carnival for free, do you? You’re so lucky!”\n\n“No, no, we have to pay,” you correct her, turning your pockets inside out and confirming to yourself that they’re well and truly empty. “I just wasn’t expecting to go to the carnival today.”\n\n“Silly ${Name}, you should always expect to go to the carnival!” Luna tells you pitifully, as if this were information that even the most dimwitted child should know. “It’s best to expect good things to happen all the time, that way you’ll be ready for them when they do happen!.”\n\n“Good advice,” you tell Luna. “But it doesn’t change the fact that I don’t have any money.”\n\n*page_break\n\n“No money, huh? I can help you with that,” a new voice enters the conversation, and you look straight in front of you to see a young, rather short boy with dark hair, long pointed ears and a scattering of freckles across the bridge of his nose. “Pleased to meet you human. My name’s Thistle, and I can give you the money to get in, if you give me something first.”\n\n“Thanks, but what do I have to give you?” you ask the boy.\n\n“An answer,” he tells you. “Answers might not be worth much in the human world, but they’re very valuable here, so I’ll give you a special riddle and if you give me the answer, I’ll give you the answer. Make sense?”\n\nYou think about that for a second,“Not really, but I’ll give it a try.”\n\n“Great!” Thistle says. “So answer me this;\n\nWhat has a head and a tail, but no legs, arms or body?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Coin\n    *if (\"$!!{Riddle_Coin}\" = \"COIN\") or (choice_randomtest)\n      *goto Coin\n    *if (\"$!!{Riddle_Coin}\" = \"PENNY\")\n      *goto Coin\n    *else\n      *goto Coin_Incorrect\n  #Ask Luna for a hint.\n    *if Coin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coin\n  #Eat a magic bean.\n    *if Coin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coin\n\n*label Hint_Coin\n*set Coin_Hint 1\n\n“Heads or tails...” Luna mutters to herself. “Sorry, I mean heads and tails. A head and a tail but no body, arms or legs... Wow, I’ve never heard of an animal like that before, but it must be really flat. Maybe it’s not an animal at all. Animals aren’t the only things with heads and tails after all. A table has a head, but it doesn’t have a tail... And a kite has a tail, but it doesn’t have a head. We need to think of something with both.”\n\nWhat has a head and a tail, but no legs, arms or body?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Coin\n    *if (\"$!!{Riddle_Coin}\" = \"COIN\") or (choice_randomtest)\n      *goto Coin\n    *if (\"$!!{Riddle_Coin}\" = \"PENNY\")\n      *goto Coin\n    *else\n      *goto Coin_Incorrect\n  #Eat a magic bean.\n    *if Coin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coin\n\n*label Bean_Coin\n*set Coin_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Coin.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Coin\n    *if (\"$!!{Riddle_Coin}\" = \"COIN\") or (choice_randomtest)\n      *goto Coin\n    *if (\"$!!{Riddle_Coin}\" = \"PENNY\")\n      *goto Coin\n    *else\n      *goto Coin_Incorrect\n\n*label Coin_Incorrect\n\n“No, no, no, you got it all wrong,” Thistle tells you sulkily. “Think about it real hard;\n\nWhat has a head and a tail, but no legs, arms or body?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Coin\n    *if (\"$!!{Riddle_Coin}\" = \"COIN\") or (choice_randomtest)\n      *goto Coin\n    *if (\"$!!{Riddle_Coin}\" = \"PENNY\")\n      *goto Coin\n    *else\n      *goto Coin_Incorrect\n  #Ask Luna for a hint.\n    *if Coin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coin\n  #Eat a magic bean.\n    *if Coin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coin\n\n*label Coin\n\n“You got it!” Thistle congratulates you. “You gave me the answer and the answer is a coin! One side has a head, the other has a tail, but no body, arms or legs in-between. And since you gave me a coin, I’ll give you a coin. Here!” he says and tosses something shiny through the air. You catch it, but looking down you only see a small fragment of a coin, as if the actual coin had been cut into several pieces.\n\n“Hey wait, this isn’t a proper coin! What am I supposed to do with this?” you call after Thistle, but by now he’s already paid his entrance fee and disappeared into the hustle and bustle of the carnival. You are now at the front of the queue being loomed over by a terrifying looking clown with a huge frown painted on his face. The clown is collecting entrance fees and you are very unsure how you’re going to explain to him that you don’t have any money. Luckily the situation resolves itself when the clown speaks to you.\n“Welcome to Mr Chuckle’s Super Happy Carnival of Fun and Awesomeness,” he says in a very gloomy and unenthusiastic voice. “That’ll be one piece of eight please.”\n\nLooking down at the silver coin fragment in your hand, you can only assume that it is actually one eighth of a coin, or literally a ‘piece of eight.’ You hand it over to the clown who accepts it as your entrance fee and you and Luna are allowed to pass through.\n\n“Hurray!” cheers Luna. “Can we go on one of the rides now? Please, please pretty please?”\n\n“Yeah, sure,” you tell Luna, but suddenly become unsure of the idea when you see what kind of rides this particular carnival has to offer.\n\nYou see Thistle jump on the ghost train, but it looks like it has real ghosts floating around it, which makes you question how safe the ride might be. There is a ride labelled “Hell-tour Skelter” which appears to be a long, spiral slide descending into a great, flaming pit from which horrific screams of pain and torture can be heard. The roller coaster appears to be a giant drinks coaster rolling on it’s side, causing all kinds of destruction wherever it goes. The waltzer consists of a stage on which several couples are dancing around in circles, and the carousel is just a fairy called Carol who is trying to sell stuff. She offers you some popcorn on the cob. You decline.\n\n*page_break\n\n“Awh, what about the teacups?” Luna suggests, “I love the teacups!”\n\nYou have a look at the circle of giant cups with a large teapot in the middle and decide it’s probably the closest thing to a genuine carnival ride that you’re going to find in this place, so you agree. Just as you are about to get on the ride, another gloomy looking clown stops you. “That’ll be one piece of eight please,” he says, holding out his hand.\n\n“Ah... See, I kind of spent my last piece of eight to get in,” you tell the clown.\n\n“That is very unfortunate,” the clown says in a mopey voice. \"I suppose you will have to pay in answers then.”\n\n“Oh sorry, I forgot,” Luna says before whispering in your ear, “I don’t suppose you’ve got any more answers, do you?” It really seems like answering riddles is a form of currency in this world.\n\n“What am I supposed to answer?” you ask the clown.\n\n“Just a simple question;\n\nWhat starts with a T, ends in a T and has T in it?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Teapot\n    *if (\"$!!{Riddle_Teapot}\" = \"TEAPOT\") or (choice_randomtest)\n      *goto Teapot\n    *else\n      *goto Teapot_Incorrect\n  #Ask Luna for a hint.\n    *if Teapot_Hint = 0\n      *set Hints + 1\n    *goto Hint_Teapot\n  #Eat a magic bean.\n    *if Teapot_Bean = 0\n      *set Beans + 1\n    *goto Bean_Teapot\n\n*label Hint_Teapot\n*set Teapot_Hint 1\n\n“Hmm... T...” Luna thinks out loud. “T, T, T... Tea starts with a T. And there are lots of things that have tea in them. There’s cups and bags and mugs and pots... But it has to start with a T and end with a T. What do you think?”\n\nWhat starts with a T, ends in a T and has T in it?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Teapot\n    *if (\"$!!{Riddle_Teapot}\" = \"TEAPOT\") or (choice_randomtest)\n      *goto Teapot\n    *else\n      *goto Teapot_Incorrect\n  #Eat a magic bean.\n    *if Teapot_Bean = 0\n      *set Beans + 1\n    *goto Bean_Teapot\n\n*label Bean_Teapot\n*set Teapot_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Teapot.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Teapot\n    *if (\"$!!{Riddle_Teapot}\" = \"TEAPOT\") or (choice_randomtest)\n      *goto Teapot\n    *else\n      *goto Teapot_Incorrect\n\n*label Teapot_Incorrect\n\nThe gloomy clown shakes his head. “No, I’m sorry if I didn’t explain myself clearly. You can’t just give me any answer to get on the ride, it has to be the right answer;\n\nWhat starts with a T, ends in a T and has T in it?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Teapot\n    *if (\"$!!{Riddle_Teapot}\" = \"TEAPOT\") or (choice_randomtest)\n      *goto Teapot\n    *else\n      *goto Teapot_Incorrect\n  #Ask Luna for a hint.\n    *if Teapot_Hint = 0\n      *set Hints + 1\n    *goto Hint_Teapot\n  #Eat a magic bean.\n    *if Teapot_Bean = 0\n      *set Beans + 1\n    *goto Bean_Teapot\n\n*label Teapot\n\nThe clown takes a step to the side. “Answer accepted. A teapot starts with a T, ends with a T and it has tea in it. That answer earns you one piece of eight,” he says, putting another coin fragment in your hand. “Now, the ride will be one piece of eight please.” And so Luna takes the coin out of your hand again and gives it back to the clown.\n\nWith that, you follow Luna onto the ride, who looks like she’s about to burst with excitement. “Thank you for choosing the teacups at Mr Chuckle’s Super Happy Carnival of Fun and Awesomeness. Enjoy the ride,” the clown says in the most depressing tone you think you’ve ever heard. “Please remain seated and keep your hands and arms inside the teacup at all times, milk and sugar are on the left.”\n\n“Huh?” you ask as you sit yourself in one of the giant teacups. At first you’re not sure if you heard the clown right, but when you turn to your left, you see that there are indeed several jugs of milk along with a stacks upon stacks of sugar cubes.\n\n“Yey! I’m having three sugars with mine!” Luna cheers, flying over to the sugar cubes, carrying them one at a time over to your teacup and dropping them inside. “Ready!”\n\n“Uh... Luna?” you lower your voice as the wisp flies into the teacup beside you. “What’s going on? Why are you putting sugar in the cup?”\n\n“Oh, I’m sorry ${Name}, did you want milk as well?” Luna asks. “I’m afraid it’s too late, the ride’s already started, but we can add some after they pour the tea.”\n\n*page_break\n\n“Tea?” you ask, suddenly extremely worried.\n\n“Well of course! Isn’t that what teacups are for?” she points out, as if this should all be completely obvious to you. “Oh look, the teapot’s tipping!”\n\n“Oh no,” you mutter, looking up to see the giant spout of the teapot slowly lowering towards you. Crying out with terror, you leap from the teacup just in time.\n\n“Wee!” cheers Luna before a fountain of boiling hot tea descends upon her, filling the cup and burying the wisp with it. For the finale, a huge giant picks up the tea-cup and places it on top of the ‘roller-coaster’... Well, at least it wont leave a stain.\n\n“Luna!” you gasp, hurrying to the edge of the teacup to make sure she’s all right. Luckily she emerges from the teacup, spitting out a mouthful of tea without seeming disturbed in the slightest.\n\n“Again, again! Let’s go again!” the wisp squeals with joy before opening her eyes and seeing you standing over her. “Oh ${Name}, what are you doing there? Didn’t you like the ride?”\n\n“Not exactly,” you tell her, starting to get quite fed up with this crazy dream world. “This isn’t how I remember the teacup ride from when I was little.”\n\n“How does the teacup ride work in the human world?” asks Luna.\n\n“Well... They just sort of spin around really fast,” you tell her.\n\n“Really?” Luna asks, sounding quite surprised. “What’s the point in that? Just spinning a teacup round and round with no tea in it? Don’t you get thirsty? You humans are really strange.” And with that, Luna flies out of the cup, shaking hot tea off herself and you both move on.\n\n*page_break\n\nAs you explore the carnival, you come across a series of carnival games where you can win prizes. You see several mythical creatures armed with pirate hooks chasing some unfortunate waterfowl around the carnival, which you can only assume is the dream realm’s very real interpretation of Hook a Duck. Meanwhile, over at the Coconut Shy, there is only a line of empty coconut stands and a frustrated clown unable to coax the timid coconuts out of their box. “Happens every year,” the clown complains to you. “I keep telling them we should get a Coconut Confident, but nobody listens to me.”\n\nEventually you come across a prize booth, which seems to contain all kinds of weird and wonderful prizes but one in particular grabs your eye. A small, clear bag filled with water and a little fish swimming inside, only this is a very special fish. It is a pure golden colour, not yellow or orange like most goldfish but actual shining gold, so bright that it reflects light from every scale.\n\n“The fish are cute aren’t they? I like the dream-catchers better though,” you hear a female voice and look down to see a short young girl with large, round glasses and messy brown hair tied in pigtails. “Hi, I’m Bramble,” the girl introduces herself.\n\n“${Name},” you give your name in return. “Is that a real goldfish?” you ask the girl.\n\n“Oh yes, solid gold in fact,” she tells you. “I was actually wondering if you could help me. One of the clowns said he’d give me a prize if I answered a riddle for him, but I couldn’t get it right. I’ll give you a piece of eight if you can solve it for me.”\n\n“I’ll give it a shot,” you tell the girl. “What’s the riddle?”\n\n“Let’s see if I remember...” Brambles mutters. “It was something like this;\n\nThose are newborn baby goldfish in those bags. Let’s say you won one and took it home. Now those fish take three months until they’re mature and ready to have babies. When they’re grown up, the fish can give birth once a month and whenever they give birth, they always have ten babies. Knowing all of this and assuming none of the goldfish die, how many goldfish would you have after a year?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_One\n    *if (Riddle_One = \"1\") or (choice_randomtest)\n      *goto One\n    *else\n      *goto One_Incorrect\n  #Ask Luna for a hint.\n    *if One_Hint = 0\n      *set Hints + 1\n    *goto Hint_One\n  #Eat a magic bean.\n    *if One_Bean = 0\n      *set Beans + 1\n    *goto Bean_One\n\n*label Hint_One\n*set One_Hint 1\n\nLuna flutters back and forth as she tries to find an answer to the question. “So three months to grow up, then the fish has ten babies, then the next month she has ten more babies, then the next she has ten more... But then the first baby fish will be grown up, so they’ll all have ten babies, so that makes... Awh, I was never good with numbers in school! Let’s try again... You start with a fish... Just one fish... ${Name}, how many fish do you need to make a baby fish?”\n\nThose are newborn baby goldfish in those bags. Let’s say you won one and took it home. Now those fish take three months until they’re mature and ready to have babies. When they’re grown up, the fish can give birth once a month and whenever they give birth, they always have ten babies. Knowing all of this and assuming none of the goldfish die, how many goldfish would you have after a year?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_One\n    *if (Riddle_One = \"1\") or (choice_randomtest)\n      *goto One\n    *else\n      *goto One_Incorrect\n  #Eat a magic bean.\n    *if One_Bean = 0\n      *set Beans + 1\n    *goto Bean_One\n\n*label Bean_One\n*set One_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]1.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_One\n    *if (Riddle_One = \"1\") or (choice_randomtest)\n      *goto One\n    *else\n      *goto One_Incorrect\n\n*label One_Incorrect\n\nBramble shakes her head. “No, I guessed that already and the clown said I was wrong. Try again.\n\nThose are newborn baby goldfish in those bags. Let’s say you won one and took it home. Now those fish take three months until they’re mature and ready to have babies. When they’re grown up, the fish can give birth once a month and whenever they give birth, they always have ten babies. Knowing all of this and assuming none of the goldfish die, how many goldfish would you have after a year?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_One\n    *if (Riddle_One = \"1\") or (choice_randomtest)\n      *goto One\n    *else\n      *goto One_Incorrect\n  #Ask Luna for a hint.\n    *if One_Hint = 0\n      *set Hints + 1\n    *goto Hint_One\n  #Eat a magic bean.\n    *if One_Bean = 0\n      *set Beans + 1\n    *goto Bean_One\n\n*label One\n\n“One...” Bramble mutters quietly, thinking about it for a moment before suddenly smiling. “Of course, one! You need at least two fish for them to breed, so it doesn’t matter how long you wait, there’ll still only be one! That was the answer I needed, I can go and get a prize with that, thank you! Here, you’ve earned it,” Bramble says, giving you a piece of eight before running over to one of the gloomy clowns to claim her prize.\n\n“Hey ${Name}, do you want to try and win a prize?” Luna asks you. “You’re getting really good at this whole riddle thing.”\n\n“Sure, why not?” you tell her, not really sure what else to do while you’re here. “How many pieces of eight do I need to get a prize?”\n\n“That depends what you want,” she tells you. “For five pieces of eight you can get a dream-catcher, those are pretty. For a whole eight you could get a voodoo doll or a yeti bear, those are really cute! For ten pieces of eight you can get the Funfair Fungus, or for two eights you can get...”\n\n“Woah, woah!” you interrupt the wisp. “Did you say Funfair Fungus?”\n\n“Yep, for ten pieces of eight,” Luna says, nodding her head.\n\n“And fungus is another word for mushroom, right?”\n\n“Yeah!” she says happily, though it takes a few more seconds before she finally realizes what you’re getting at. “Oh! You’re supposed to be collecting mushrooms, aren’t you.”\n\n“Yes I am,” you say, quite pleased that you now know what you’re looking for. “And I already have one piece of eight, so I only need nine more to win it!”\n\n*page_break\n\n“Then let’s find some!” Luna says excitedly. “Oh, but first can we go bobbing for toffee apples? The toffee’s super hard to bite your teeth into when you’re bobbing, but once you win one, they’re really delicious!”\n\n“Oh, all right,” you reluctantly agree, following Luna to a large, wooden barrel filled with water and several toffee apples that are floating on the surface. Unfortunately for Luna, somebody else is already playing. After waiting a few moments, a strange child emerges from the water with a toffee apple in it’s mouth. The creature has leaf-like wings and short, red hair in a literal pixie cut. Honestly, you can’t quite tell whether it’s a boy or a girl.\n\nThe child mumbles something with the apple still in it’s mouth, of which of course you can’t understand a word. After realizing this, they spit out the apple to talk to you properly. “Don’t mind me, there’s plenty of apples to go around!” the child tells you in a voice which is unfortunately androgynous, so you still can’t tell whether they’re a boy or a girl. “... Now where did I leave mine?” they ask themselves before fishing around in the water to try and find it.\n\n“Do you want us to help you look for it?” you ask the creature, more for your own benefit than for theirs, after all you don’t really want to win a half-eaten apple.\n\n“I’m not sure,” they reply, “maybe... If you can answer this riddle for me.”\n\nAnother riddle. Somehow answering riddles seems to solve every problem you come across in this world. Sitting down cross legged in front of you, the creature introduces itself. “I’m Robin by the way, and there’s a piece of eight in it for you if you get this riddle right;\n\nI am empty as air, I weigh nothing, but if you put me in a barrel, I make it lighter. What am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Hole\n    *if (\"$!!{Riddle_Hole}\" = \"HOLE\") or (choice_randomtest)\n      *goto Hole\n    *else\n      *goto Hole_Incorrect\n  #Ask Luna for a hint.\n    *if Hole_Hint = 0\n      *set Hints + 1\n    *goto Hint_Hole\n  #Eat a magic bean.\n    *if Hole_Bean = 0\n      *set Beans + 1\n    *goto Bean_Hole\n\n*label Hint_Hole\n*set Hole_Hint 1\n\nLuna seems quite confused when she thinks about the riddle. “This riddle is all strange. Usually if you put something in a barrel, that’d make it heavier. The barrel would only be lighter if you took something out. You know, like all the water... Maybe there’s something you could put in a barrel that would make the water come out?”\n\nI am empty as air, I weigh nothing, but if you put me in a barrel, I make it lighter. What am I?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Hole\n    *if (\"$!!{Riddle_Hole}\" = \"HOLE\") or (choice_randomtest)\n      *goto Hole\n    *else\n      *goto Hole_Incorrect\n  #Eat a magic bean.\n    *if Hole_Bean = 0\n      *set Beans + 1\n    *goto Bean_Hole\n\n*label Bean_Hole\n*set Hole_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Hole.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Hole\n    *if (\"$!!{Riddle_Hole}\" = \"HOLE\") or (choice_randomtest)\n      *goto Hole\n    *else\n      *goto Hole_Incorrect\n\n*label Hole_Incorrect\n\nRobin shakes their head. “Nope, that’s all wrong. Try again, we need to think of a way to make the barrel lighter, so I can find my toffee apple!\n\nI am empty as air, I weigh nothing, but if you put me in a barrel, I make it lighter. What am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Hole\n    *if (\"$!!{Riddle_Hole}\" = \"HOLE\") or (choice_randomtest)\n      *goto Hole\n    *else\n      *goto Hole_Incorrect\n  #Ask Luna for a hint.\n    *if Hole_Hint = 0\n      *set Hints + 1\n    *goto Hint_Hole\n  #Eat a magic bean.\n    *if Hole_Bean = 0\n      *set Beans + 1\n    *goto Bean_Hole\n\n*label Hole\n\n“That’s right, a hole!” Robin congratulates you before pulling some kind of corkscrew out of their pocket and jabbing it in the barrel. The water slowly drains until only the toffee apples are left, and Robin reaches in to grab the one with a very clear set of teeth-marks in it. “Found it!” they cheer, taking a big bite out of the sugar-coated fruit. They then reach into their pockets, pulling out a piece of eight and tossing it to you. With that, Robin walks over to the most dismal looking clown you’ve seen so far, probably because the poor thing has his arms and head strapped in a rather uncomfortable looking set of stocks. “And on the subject of holes, I’ve got another riddle,” says Robin.\n\n“I’m on dry land, I’m full of holes, yet I’m full of water. What am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Sponge\n    *if (\"$!!{Riddle_Sponge}\" = \"SPONGE\") or (choice_randomtest)\n      *goto Sponge\n    *else\n      *goto Sponge_Incorrect\n  #Ask Luna for a hint.\n    *if Sponge_Hint = 0\n      *set Hints + 1\n    *goto Hint_Sponge\n  #Eat a magic bean.\n    *if Sponge_Bean = 0\n      *set Beans + 1\n    *goto Bean_Sponge\n\n*label Hint_Sponge\n*set Sponge_Hint 1\n\nLuna contemplates the riddle in her scatterbrained little way. “Hmm... But when Robin put a hole in the barrel, it made the water come out. Water always falls out of holes... But maybe these holes are different? Maybe these holes soak up the water instead?”\n\nI’m on dry land, I’m full of holes, yet I’m full of water. What am I?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Sponge\n    *if (\"$!!{Riddle_Sponge}\" = \"SPONGE\") or (choice_randomtest)\n      *goto Sponge\n    *else\n      *goto Sponge_Incorrect\n  #Eat a magic bean.\n    *if Sponge_Bean = 0\n      *set Beans + 1\n    *goto Bean_Sponge\n\n*label Bean_Sponge\n*set Sponge_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Sponge.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Sponge\n    *if (\"$!!{Riddle_Sponge}\" = \"SPONGE\") or (choice_randomtest)\n      *goto Sponge\n    *else\n      *goto Sponge_Incorrect\n\n*label Sponge_Incorrect\n\nRobin shakes his (or her) head. “Nope, give it another try. It’s real easy when you think about it;\n\nI’m on dry land, I’m full of holes, yet I’m full of water. What am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Sponge\n    *if (\"$!!{Riddle_Sponge}\" = \"SPONGE\") or (choice_randomtest)\n      *goto Sponge\n    *else\n      *goto Sponge_Incorrect\n  #Ask Luna for a hint.\n    *if Sponge_Hint = 0\n      *set Hints + 1\n    *goto Hint_Sponge\n  #Eat a magic bean.\n    *if Sponge_Bean = 0\n      *set Beans + 1\n    *goto Bean_Sponge\n\n*label Sponge\n\n“Right again, it’s a sponge!” and with that, Robin sticks their hand in a bucket of water, pulling out a soaking wet sponge and throwing it directly into the poor clown’s face. “Got him!” The child cheers, mischievously. “Here you go human, another piece of eight for you.” Robin says, throwing another coin fragment your way and rushing over to pick up the sponge, dunking it in water and preparing to hurl it at the clown again. Luckily for the clown, Robin gets suddenly distracted by Luna.\n\n“Oh ${Name}, look, look! It’s the animals!” the wisp squeals with joy and flies over to what looks to be some kind of petting zoo with various animals wondering around. As you follow Luna, you realize that these must been the only normal creatures you’ve seen since entering this strange world. Dogs and cats and lambs and rabbits, animals that you’d expect to see in your world. Luna on the other hand thinks they’re the most incredible things she’s ever laid her eyes on. “Wow! Look, ${Name}, look! It’s a hornless unicorn! I used to read stories about them but I didn’t think they were real!”\n\nLooking to where Luna is pointing, you can’t help but chuckle. “Luna, that’s just a horse.” you tell her.\n\n“Wow, is that what you call it?” Luna asks, fascinated. “I forgot, you’re from the human world, so you must see all these non-magic animals all the time. You’re so lucky!” Luna then proceeds to flutter around the petting zoo, pointing out all the incredible animals she finds along the way. “Look, there’s a faun with a ram’s head and a cockatrice with the body of a chicken, a land sea-serpent and a phoenix that’s had it’s fire put out...”\n\nThe animals are just a goat, a rooster, a snake and a regular bird, but you don’t bother correcting the wisp any more since you don’t want to spoil her fun. And so, she carries on flying around the carnival, looking for more regular, everyday animals to gawk at.\n\n*page_break\n\n“Cool!” you hear Robin gasp as he (or she) hops the fence into the petting zoo. “That cactus-cat doesn’t have any spines! Hey human kid, is it safe to touch them?”\n\n“Yeah, go ahead,” you tell the child, who proceeds to pet the kitten with complete fascination.\n\n“Awh, look in the river here!” Luna beckons you over. “There’s loads and loads of mermaids with fish-heads and... Oh my gosh, I can’t believe it, it’s a Loch-Ness-Otter! You know most people think they don’t exist, that they’re a hoax, or just a regular monster that’s really small and somebody mistook it for an otter, but look, they’re real!”\n\n“Yeah, they’re pretty impressive,” you mumble, not wanting to dampen the wisp’s enthusiasm.\n\n“Oh dear,” you hear one of the solemn clowns mumbling to himself as he sits by the river. “These things always happen to me. Couldn’t get somebody else to do it, had to be poor old Droopy. Oh dear.”\n\n“What’s wrong?” Luna asks as she flutters over to Droopy the clown. “Aren’t you happy that you get to play with all these awesome animals?”\n\n“Not really,” Droopy moans. “You see, they’ve given me the job of getting some of the animals and food to the other side of the river, but I can’t do it.”\n\n“Why not?” you ask.\n\n*page_break\n\nSighing, Droopy the clown gets to his feet and picks up one of the baby animals. “You see this here? It’s a very rare creature indeed. A manticore with the head of a chimera and the tail of a sphinx.”\n\n“That’s a lion cub,” you tell him.\n\n“Oh, you human children don’t appreciate anything,” the clown complains. “Anyway, you see that creature hopping about? The jackalope with no antlers?”\n\n“You mean the rabbit?” you ask.\n\n“Whatever you want to call it,” Droopy grumbles. “Well you see, I have to get these two creatures to the other side of the river, along with a bucket of non-golden apples to feed the animals later. Here’s the problem though, the little row boat only has enough room for me to take one thing at a time.”\n\n“Why’s that a problem?” Luna asks.\n\n“Well, these animals are very tame. They’re good as gold when I’m around, wouldn’t even think of causing any mischief, but the second my back’s turned, that antlerless jackalope, or rabbit if you like, would eat the whole bucket of non-golden apples. Then again, that’s only if the little lion thing doesn’t gobble up the rabbit first. So here’s the problem in a nutshell;\n\nI need to get the lion, the rabbit and the apples across the river.\n*line_break\nThe boat can only carry me and one other thing at a time.\n*line_break\nIf I leave the lion alone with the rabbit, the lion will eat the rabbit.\n*line_break\nIf I leave the rabbit alone with the apples, the rabbit will eat the apples.\n\nHow do I get all three things safely across the river without anything getting eaten?\"\n\n*choice\n  #Solve the riddle.\n    *goto Animal_Riddle\n  #Ask Luna for a hint.\n    *if Animal_Hint = 0\n      *set Hints + 1\n    *goto Hint_Animal\n  #Eat a magic bean.\n    *if Animal_Bean = 0\n      *set Beans + 1\n    *goto Bean_Animal\n\n*label Hint_Animal\n*set Animal_Hint 1\n\n“Well the first bit’s easy,” says Luna. “You can’t leave the lion alone with the rabbit, or the lion will eat the rabbit, and you can’t leave the rabbit alone with the apples or the rabbit will eat the apples. What you can do is leave the lion alone with the apples, so you’ll have to take the rabbit across the river first. After that it gets tricky. It doesn’t matter what you take across the river second, something will get eaten. If you take the lion second, it’ll eat the rabbit when you go back to get the apples. If you take the apples second, the rabbit will eat the apples when you go back to get the lion. Either way, you have to leave something alone with the rabbit... Or do you?”\n\nDroopy needs to get the lion, the rabbit and the apples across the river.\n*line_break\nThe boat can only carry Droopy and one other thing at a time.\n*line_break\nIf Droopy leaves the lion alone with the rabbit, the lion will eat the rabbit.\n*line_break\nIf Droopy leaves the rabbit alone with the apples, the rabbit will eat the apples.\n\nHow does Droopy get all three things safely across the river without anything getting eaten?\n\n*choice\n  #Solve the riddle.\n    *goto Animal_Riddle\n  #Eat a magic bean.\n    *if Animal_Bean = 0\n      *set Beans + 1\n    *goto Bean_Animal\n\n*label Bean_Animal\n*set Animal_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]First Droopy must take the rabbit to the other side of the river.[/b]\n*line_break\n[b]Then Droopy must row back to your side of the river by himself.[/b]\n*line_break\n[b]Then Droopy can take the lion or the apples to the other side of the river.[/b]\n*line_break\n[b]Then Droopy must take the rabbit back to your side of the river.[/b]\n*line_break\n[b]Then Droopy must take either the lion or the apples to the other side of the river.[/b]\n*line_break\n[b]Then Droopy must row back to your side of the river on his own.[/b]\n*line_break\n[b]Then Droopy must take the rabbit back to the other side of the river and he is done.[/b]\n\n*choice\n  #Solve the riddle.\n    *goto Animal_Riddle\n\n*label Animal_Riddle\n\n“What should I take across the river first?” asks Droopy.\n\n*choice\n  #Tell him to take the lion first.\n    *goto Rabbit_Eat_Apples\n  #Tell him to take the rabbit first.\n    *goto D_R_One_L_A_Two\n  #Tell him to take the apples first.\n    *goto Lion_Eat_Rabbit\n\n*label Rabbit_Eat_Apples\n\nDroopy shakes his head. “No, I can’t do that!” he objects. “I told you, the antlerless-jackalope will eat all the non-golden apples if I leave them alone together. Let’s start over from the beginning.\n\n*choice\n  #Solve the riddle.\n    *goto Animal_Riddle\n  #Ask Luna for a hint.\n    *if Animal_Hint = 0\n      *set Hints + 1\n    *goto Hint_Animal\n  #Eat a magic bean.\n    *if Animal_Bean = 0\n      *set Beans + 1\n    *goto Bean_Animal\n\n*label Lion_Eat_Rabbit\n\nDroopy shakes his head. “No, I can’t do that!” he objects. “I told you, the manticore-chimera-sphinx will eat the antlerless-jackalope if I leave them alone together. Let’s start over from the beginning.\n\n*choice\n  #Solve the riddle.\n    *goto Animal_Riddle\n  #Ask Luna for a hint.\n    *if Animal_Hint = 0\n      *set Hints + 1\n    *goto Hint_Animal\n  #Eat a magic bean.\n    *if Animal_Bean = 0\n      *set Beans + 1\n    *goto Bean_Animal\n\n*label D_R_One_L_A_Two\n\nDroopy rows his boat to the other side of the river. Now Droopy is on the other side of the river with the rabbit, whilst the lion and the apples are on your side of the river.\n\n“Okay, what should I do now?” calls Droopy.\n\n*choice\n  #Tell him to row back on his own.\n    *goto R_One_D_L_A_Two\n  #Tell him to row back with the rabbit.\n    *goto One_D_L_R_A_Two\n\n*label One_D_L_R_A_Two\n\nDroopy rows his boat back to your side of the river. Now Droopy is on your side of the river with the lion, the rabbit and the apples. Nothing is on the other side of the river.\n\n“So, what should I do now?” asks Droopy.\n\n*choice\n  #Tell him to take the lion across.\n    *goto Rabbit_Eat_Apples\n  #Tell him to take the rabbit across.\n    *goto D_R_One_L_A_Two\n  #Tell him to take the apples across.\n    *goto Lion_Eat_Rabbit\n\n*label R_One_D_L_A_Two\n\nDroopy rows his boat back to your side of the river. Now Droopy is on your side of the river with the lion and the apples, whilst the rabbit is on the other side of the river.\n\n“So, what should I do now?” asks Droopy.\n\n*choice\n  #Tell him to row back on his own.\n    *goto D_R_One_L_A_Two\n  #Tell him to take the lion across.\n    *goto D_L_R_One_A_Two\n  #Tell him to take the apples across.\n    *goto D_R_A_One_L_Two\n\n*label D_L_R_One_A_Two\n\nDroopy rows his boat to the other side of the river. Now Droopy is on the other side of the river with the lion and the rabbit, whilst the apples are on your side of the river.\n\n“Okay, what should I do now?” calls Droopy.\n\n*choice\n  #Tell him to row back on his own.\n    *goto Lion_Eat_Rabbit\n  #Tell him to row back with the lion.\n    *goto R_One_D_L_A_Two\n  #Tell him to row back with the rabbit.\n    *goto L_One_D_R_A_Two\n\n*label D_R_A_One_L_Two\n\nDroopy rows his boat to the other side of the river. Now Droopy is on the other side of the river with the rabbit and the apples, whilst the lion is on your side of the river.\n\n“Okay, what should I do now?” calls Droopy.\n\n*choice\n  #Tell him to row back on his own.\n    *goto Rabbit_Eat_Apples\n  #Tell him to row back with the rabbit.\n    *goto A_One_D_L_R_Two\n  #Tell him to row back with the apples.\n    *goto R_One_D_L_A_Two\n\n*label L_One_D_R_A_Two\n\nDroopy rows his boat back to your side of the river. Now Droopy is on your side of the river with the rabbit and the apples, whilst the lion is on the other side of the river.\n\n“So, what should I do now?” asks Droopy.\n\n*choice\n  #Tell him to row back on his own.\n    *goto Rabbit_Eat_Apples\n  #Tell him to take the rabbit across.\n    *goto D_L_R_One_A_Two\n  #Tell him to take the apples across.\n    *goto D_L_A_One_R_Two\n\n*label A_One_D_L_R_Two\n\nDroopy rows his boat back to your side of the river. Now Droopy is on your side of the river with the lion and the rabbit, whilst the apples are on the other side of the river.\n\n“So, what should I do now?” asks Droopy.\n\n*choice\n  #Tell him to row back on his own.\n    *goto Lion_Eat_Rabbit\n  #Tell him to take the lion across.\n    *goto D_L_A_One_R_Two\n  #Tell him to take the rabbit across.\n    *goto D_R_A_One_L_Two\n\n*label D_L_A_One_R_Two\n\nDroopy rows his boat to the other side of the river. Now Droopy is on the other side of the river with the lion and the apples, whilst the rabbit is on your side of the river.\n\n“Okay, what should I do now?” calls Droopy.\n\n*choice\n  #Tell him to row back on his own.\n    *goto L_A_One_D_R_Two\n  #Tell him to row back with the lion.\n    *goto A_One_D_L_R_Two\n  #Tell him to row back with the apples.\n    *goto L_One_D_R_A_Two\n\n*label L_A_One_D_R_Two\n\nDroopy rows his boat back to your side of the river. Now Droopy is on your side of the river with the rabbit, whilst the lion and the apples are on the other side of the river.\n\n“So, what should I do now?” asks Droopy.\n\n*choice\n  #Tell him to row back on his own.\n    *goto D_L_A_One_R_Two\n  #Tell him to take the rabbit across.\n    *goto Animals\n\n*label Animals\n\nDroopy rows his boat across the river one more time and finds that finally, the lion, the rabbit and the apples are all on the far side of the river. “I’ve done it,” Droopy mopes. “Oh joy, of joys, I finally have all three things across the river. Thank you human child. Oh happy day, how completely ecstatic I am,” he says, though his voice sounds just as gloomy as it ever did. “Well done ${Boy_Girl}, here, take this piece of eight as a reward.” Droopy then takes the piece of eight out of his pocket and Luna flies over the river to fetch it for you.\n\n“That’s four,” you tell Luna as she drops the coin fragment in your hand. “So we only need six more pieces of eight. Come on, let’s go find some more riddles to solve.”\n\n“But I want to play fetch with the one-headed dog!” Luna complains.\n\n“Later,” you tell her and head out of the petting zoo. As you walk through the carnival you come across a group of children sitting on the grass playing dice and card games. You notice one little winged boy with white hair and two horns protruding from his head who is sitting all by himself. Eventually the boy notices you and calls out.\n\n“Hey you, human ${Boy_Girl}!” the child calls to you. “What’s your name?”\n\n“${Name},” you tell him.\n\n“Hi there ${Name}. I’m Swift, and do I have an offer for you!” the boy says excitedly, “Couldn’t find a better offer, you’ll never get such a great offer again. Boy, oh boy, were you lucky to find me so that I could offer you this amazing opportunity. Opportunity of a lifetime! Why you couldn’t...”\n\n“No thanks,” you tell the boy. You might just be a child, but even you’re old enough to know that when somebody tries that hard to make an offer sound appealing, it’s got to be a scam.\n\n*page_break\n\n“Hey wait!” Swift objects, “You haven’t even heard my offer yet! How many pieces of eight do you have so far kid?”\n\n“Four,” you tell him.\n\n“Well, how would you like to double that right now?” he asks.\n\nWell that stops you in your tracks. Having eight pieces of eight would get you a lot closer to winning the Funfair Fungus, but somehow you doubt it’s that simple. “What’s the catch?” you ask Swift.\n\n“Here’s the deal,” he says, twiddling his fingers, “I ask you a riddle, just one riddle. If you get it right, I’ll double your winnings and you walk away with eight pieces of eight. You can guess as many times as you like, but if you give up, I get all four of your pieces of eight. Deal?”\n\nYou think about this for a second, but before you have time to consider whether it’s worth the risk, Luna answers for you. “Deal!” she cries happily, looking very pleased with herself.\n\n“Wonderful!” the boy says, clapping his hands together. “So, here’s your riddle;\n\nKings and Queens are high rulers and have a lot of power,\n*line_break\nSome say the jester's useless and has no place in the tower.\n*line_break\nEven without Jill by his side, Jack still has far to fall,\n*line_break\nBut I ask you, who is the commoner that outranks them all?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Ace\n    *if (\"$!!{Riddle_Ace}\" = \"ACE\") or (choice_randomtest)\n      *goto Ace\n    *else\n      *goto Ace_Incorrect\n  #Ask Luna for a hint.\n    *if Ace_Hint = 0\n      *set Hints + 1\n    *goto Hint_Ace\n  #Eat a magic bean.\n    *if Ace_Bean = 0\n      *set Beans + 1\n    *goto Bean_Ace\n\n*label Hint_Ace\n*set Ace_Hint 1\n\nLuna lowers her head and looks quite guilty. “I’m sorry,” she tells you. “When he asked if you wanted to ‘deal’ I thought he was talking about dealing cards. I’m a good dealer!” she says proudly. “I know eight different kinds of shuffle! Well anyway, let’s focus on the riddle. Talking about cards won’t help, will it?”\n\nKings and Queens are high rulers and have a lot of power,\n*line_break\nSome say the jester’s useless and has no place in the tower.\n*line_break\nEven without Jill by his side, Jack still has far to fall,\n*line_break\nBut I ask you, who is the commoner that outranks them all?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Ace\n    *if (\"$!!{Riddle_Ace}\" = \"ACE\") or (choice_randomtest)\n      *goto Ace\n    *else\n      *goto Ace_Incorrect\n  #Eat a magic bean.\n    *if Ace_Bean = 0\n      *set Beans + 1\n    *goto Bean_Ace\n\n*label Bean_Ace\n*set Ace_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Ace.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Ace\n    *if (\"$!!{Riddle_Ace}\" = \"ACE\") or (choice_randomtest)\n      *goto Ace\n    *else\n      *goto Ace_Incorrect\n\n*label Ace_Incorrect\n\n“Nope, you got it wrong!” Swift says, grinning from ear to ear. “Do you want to guess again or do you give up? I hear those pieces of eight calling my name!”\n\nKings and Queens are high rulers and have a lot of power,\n*line_break\nSome say the jester’s useless and has no place in the tower.\n*line_break\nEven without Jill by his side, Jack still has far to fall,\n*line_break\nBut I ask you, who is the commoner that outranks them all?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Ace\n    *if (\"$!!{Riddle_Ace}\" = \"ACE\") or (choice_randomtest)\n      *goto Ace\n    *else\n      *goto Ace_Incorrect\n  #Ask Luna for a hint.\n    *if Ace_Hint = 0\n      *set Hints + 1\n    *goto Hint_Ace\n  #Eat a magic bean.\n    *if Ace_Bean = 0\n      *set Beans + 1\n    *goto Bean_Ace\n\n*label Ace\n\nSwift takes a deck of cards from his pocket and starts to shuffle them. “Absolutely right!” he declares before taking a card from the top of the pile and revealing it to be the ace of spades. “In cards, we use Ace instead of a one... But while it might be the lowest number in the deck, when you play it in a card game, it outranks even the King and Queen. And as promised...” With an empty hand, Swift reaches behind your ear, but when he pulls it back he reveals four more pieces of eight in his palm. “You’ve earned every last one,” he tells you. “Spend them well.” And with that, Swift goes back to shuffling his deck and trying to call over other people to cheat out of their hard earned coins.\n\nPutting together all your winnings, you now have eight pieces of eight in total. “Wow! That’s a whole eight!” Luna says excitedly. “That’s loads of money! Can we buy some sweets now? Can we please?”\n\n“We’re supposed to be saving up for the Funfair Fungus,” you remind Luna, but she’s already started to fly towards the food carts. Before she can get there though, she crashes into a fair haired young girl with butterfly wings and what looks like a large acorn as a hat.\n\n*page_break\n\n“Ouch,” grumbles Luna, rubbing a small bump on her head. “Sorry, I was after sweets,” she explains to the girl.\n\n“Oh, that’s okay,” the girl says happily. “I just bought a big, big bag of sweets! You can have one of mine if you like.” And with that, the girl holds out the bag, offering it to Luna.\n\n“Wow, thank you!” Luna cheers, flying head first into the brown, paper bag and emerging with a multicoloured sweet that’s almost as big as she is.\n\n“Yeah, thanks,” you tell the girl, very grateful that you don’t have to use up any of your pieces of eight to buy sweets. “I’m ${Name}. The little wisp covered in sugar is Luna.”\n\n“I’m Maple,” the girl tells you. “I’ve been saving up my pieces of eight all day so that I could buy the biggest bag of sweets at the carnival! I actually have one piece of eight left over. You can have it if you answer this riddle for me.”\n\n“Well that’s lucky, ‘cos I could really use another piece of eight. What’s the riddle?” you ask.\n\n“Well, today I bought a bag of mixed sweets from a great big ogre in a little sweet shop. Even for an ogre he was huge! He must have been 10 feet tall and 5 feet wide. From that information alone I need you to tell me, what did the ogre weigh?” asks Maple.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Sweets\n    *if (\"$!!{Riddle_Sweets}\" = \"SWEETS\") or (choice_randomtest)\n      *goto Sweets\n    *else\n      *goto Sweets_Incorrect\n  #Ask Luna for a hint.\n    *if Sweets_Hint = 0\n      *set Hints + 1\n    *goto Hint_Sweets\n  #Eat a magic bean.\n    *if Sweets_Bean = 0\n      *set Beans + 1\n    *goto Bean_Sweets\n\n*label Hint_Sweets\n*set Sweets_Hint 1\n\nLuna finishes off her sweet and then thinks about the question for a moment. “Oh dear,” she mumbles, “I don’t know. I mean there’s really no way of telling how much somebody weighs just by their measurements... But then again, I suppose Maple didn’t ask how much the ogre weighed, did she? She only asked what he weighed.”\n\nToday Maple bought a bag of mixed sweets from a great big ogre in a little sweet shop. Even for an ogre he was huge! He must have been 10 feet tall and 5 feet wide. From that information alone, Maple wants to know, what did the ogre weigh?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Sweets\n    *if (\"$!!{Riddle_Sweets}\" = \"SWEETS\") or (choice_randomtest)\n      *goto Sweets\n    *else\n      *goto Sweets_Incorrect\n  #Eat a magic bean.\n    *if Sweets_Bean = 0\n      *set Beans + 1\n    *goto Bean_Sweets\n\n*label Bean_Sweets\n*set Sweets_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Sweets.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Sweets\n    *if (\"$!!{Riddle_Sweets}\" = \"SWEETS\") or (choice_randomtest)\n      *goto Sweets\n    *else\n      *goto Sweets_Incorrect\n\n*label Sweets_Incorrect\n\n“Nuh-uh, all wrong,” Maple tells you, tossing another sweet into her mouth and munching on it before she resumes talking. “Let’s try it again;\n\nToday I bought a bag of mixed sweets from a great big ogre in a little sweet shop. Even for an ogre he was huge! He must have been 10 feet tall and 5 feet wide. From that information alone, I need you to tell me, what did the ogre weigh?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Sweets\n    *if (\"$!!{Riddle_Sweets}\" = \"SWEETS\") or (choice_randomtest)\n      *goto Sweets\n    *else\n      *goto Sweets_Incorrect\n  #Ask Luna for a hint.\n    *if Sweets_Hint = 0\n      *set Hints + 1\n    *goto Hint_Sweets\n  #Eat a magic bean.\n    *if Sweets_Bean = 0\n      *set Beans + 1\n    *goto Bean_Sweets\n\n*label Sweets\n\n“There you go!” Maple congratulates you. “Of course he weighed sweets. When you work at a sweet shop, you need to weigh the sweets before you sell them to find out how much they cost. Well anyway, here you go, a piece of eight!” Maple says before tossing the fragment of coin your way.\n\nYou catch the piece of eight in mid air. “Thanks Maple,” you tell the girl. “Come on Luna, we only need one more.”\n\n“One more?” you hear a very old, very croaky voice speaking to you. Turning around, you see another clown, though this one looks very different from the others. The first thing that separates him from the others is that he is extremely old. In fact he looks older than any human being you have ever seen. His make up is all cracked and flaking where his skin is so wrinkled and though he has a frowning face like the rest of the clowns, you do not think this is because he’s sad or gloomy. It looks more like a happy face was originally painted on the clown, but over time his face became so wrinkled that the skin around his mouth drooped downwards to form a frown. The clown has enormous eyebrows and white, curly hair on the sides of his head, though he’s completely bald on top. He is hunched over and leaning on a crooked staff which is topped with what looks like some sort of clown hat, pointed at the top, brightly coloured and adorned with pom-poms and a large, yellow flower. “One more, did you say?” the clown repeats itself, “One more of what, may I ask.”\n\n“Piece of eight,” you reply. “I need one more to win a prize.”\n\n*page_break\n\n“Oh, I see,” mutters the old clown. “Well, so happens, I just happen to have a piece of eight right here in my pocket, young ${Man_Lady}. It’s all yours, if you think you’re smart enough to win it from me.”\n\n“Yey!” cheers Luna as she hovers in front of the old clown’s face. “You’re a nice old man! I like you, even though you smell like steamed cabbage.”\n\n“I’m guessing you’ve got a riddle for me?” you ask the old clown. “Well ask away, I’m ready.”\n\n“Oh, you youngsters today are always in such a hurry. Don’t know why you feel the need to rush everything, you’ve got all the time in the world. Me on the other hand, I don’t know if I’ll be here long enough to finish this conversation. Now pay attention, you hear? I might keel over any second now, so you’ll want to get this right;\n\nOne day, a king was walking across a chequered field when he came across an enemy knight. The king and the knight did battle until the knight was vanquished. The king banished the knight from the realm, never to return. Seeing this, the enemy queen, clad in white, marched forward to confront the king. For the sake of her knight’s honour, she blocked the king’s path and he could move no more. The king said to me, 'Life is a game my friend, and we are but players.' But my question to you human child... If that king was a player, what was the game?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Chess\n    *if (\"$!!{Riddle_Chess}\" = \"CHESS\") or (choice_randomtest)\n      *goto Chess\n    *else\n      *goto Chess_Incorrect\n  #Ask Luna for a hint.\n    *if Chess_Hint = 0\n      *set Hints + 1\n    *goto Hint_Chess\n  #Eat a magic bean.\n    *if Chess_Bean = 0\n      *set Beans + 1\n    *goto Bean_Chess\n\n*label Hint_Chess\n*set Chess_Hint 1\n\nLuna thinks about the riddle for a second. “Well, if that king thinks life is a game, then it must be a very strange one. I can’t think of many games with kings and knights and queens on a chequered field... Can you?”\n\nOne day, a king was walking across a chequered field when he came across an enemy knight. The king and the knight did battle until the knight was vanquished. The king banished the knight from the realm, never to return. Seeing this, the enemy queen, clad in white, marched forward to confront the king. For the sake of her knight’s honour, she blocked the king’s path and he could move no more. The king said to the clown, 'Life is a game my friend, and we are but players.' Now the clown wants to know, if that king was a player, what was the game?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Chess\n    *if (\"$!!{Riddle_Chess}\" = \"CHESS\") or (choice_randomtest)\n      *goto Chess\n    *else\n      *goto Chess_Incorrect\n  #Eat a magic bean.\n    *if Chess_Bean = 0\n      *set Beans + 1\n    *goto Bean_Chess\n\n*label Bean_Chess\n*set Chess_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Chess.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Chess\n    *if (\"$!!{Riddle_Chess}\" = \"Chess\") or (choice_randomtest)\n      *goto Chess\n    *else\n      *goto Chess_Incorrect\n\n*label Chess_Incorrect\n\nThe old clown looks confused. “What ${Boy_Girl}?” he grumbles. “What on earth are you talking about?”\n\n“Isn’t that the answer?” you ask him.\n\n“What? No it’s not,” he tells you, sounding quite frustrated. “I’m sure it’s not. That doesn’t sound right at all. Did you even listen to my riddle young ${Man_Lady}? The riddles goes like this;\n\nOne day, a king was walking across a chequered field when he came across an enemy knight. The king and the knight did battle until the knight was vanquished. The king banished the knight from the realm, never to return. Seeing this, the enemy queen, clad in white, marched forward to confront the king. For the sake of her knight’s honour, she blocked the king’s path and he could move no more. The king said to me, 'Life is a game my friend, and we are but players.' But my question to you human child... If that king was a player, what was the game?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Chess\n    *if (\"$!!{Riddle_Chess}\" = \"CHESS\") or (choice_randomtest)\n      *goto Chess\n    *else\n      *goto Chess_Incorrect\n  #Ask Luna for a hint.\n    *if Chess_Hint = 0\n      *set Hints + 1\n    *goto Hint_Chess\n  #Eat a magic bean.\n    *if Chess_Bean = 0\n      *set Beans + 1\n    *goto Bean_Chess\n\n*label Chess\n\n“Huh?” the old clown grumbles. “What’s that ${Boy_Girl}?”\n\n“Chess,” you repeat yourself.\n\n“Chess?” he asks, looking completely baffled. “What in the world is that?”\n\n“It’s the answer to the riddle,” you tell him. “The king was part of a chess set. He moved across the chequered chess board to take a rival knight, but then the queen moved forward and put the king in checkmate, so he couldn’t move any more. So, the game was chess.”\n\n“Was it?” asks the clown as if he never knew the answer to the riddle in the first place. “You kids and your newfangled board-games. In my day we all had to play with unusually shaped rocks, and we liked it! Still, I suppose you solved my riddle... Here you are, I promised you a piece of pie didn’t I?” the clown asks, taking a rather ominous looking foam pie from his giant, baggy pockets.\n\n“No, no, eight!” you correct him, shielding your face. “You promised me a piece of eight.”\n\n“Oh, did I? Doesn’t sound like something I would promise. Children these days, you always want more money, doesn’t matter how much we give you, it’s never enough,” the old man grumbles to himself as he rummages through his pockets, pulling out a piece of eight and handing it to you.\n\n“Well, this’ll be enough for me,” you tell the clown. “I only need ten pieces of eight to buy the Funfair Fungus.”\n\n*page_break\n\n“Funfair Fungus?” the man asks “Is that so? And who told you that, might I ask?”\n\n“I did!” declares Luna, fluttering in front of the old clown’s face. “I remember being at this carnival when I was just a wisp of a wisp, and I remember it cost 10 pieces of eight to buy the Funfair Fungus.”\n\n“Yes, well things have changed since then,” says the clown. “See, there’s only one Funfair Fungus left in this whole carnival, and I have it right here.” he says, gesturing to his walking staff. Now that you look at it again, the stick looks almost like a long stem, whilst what you assumed was a clown hat is actually the mushroom itself, with the pompoms making up the spots that you would find on certain kinds of mushroom or toadstool.\n\n“Oh dear...” you say to yourself. “You see, the thing is, I really need that mushroom to get home.”\n\n“And I need the mushroom to walk,” the old man tells you. “You can’t tell me how much this staff is worth young ${Man_Lady}. I own this carnival and everything in it. Only I get to decide who’s worthy of the Funfair Fungus.”\n\n“Oh my gosh!” Luna gasps. “You’re really him! The actual Chuckles the clown!”\n\n“The one and only,” Chuckles says, sounding quite pleased at being recognized. “So, you want this poor, old man’s walking stick, do you ${Boy_Girl}? Well how do I know you deserve it? In my day, if you wanted something, you needed to earn it first.”\n\n*page_break\n\n“But I did earn it!” you object, holding out all the coin fragments. “I won ten pieces of eight. I answered a whole bunch of riddles to get these.”\n\n“Yes, but how hard were those riddles?” he asks. “Youngsters these days, I could ask them why a raven’s like a writing desk and half of them wouldn’t know the answer. No, if you want my beloved walking stick, you’ll have to prove you’re worthy of it. What we need is a test. Something that only the brightest child could... Ah, I have it!” the old clown announces. “Tell me ${Boy_Girl}, have you ever heard of the goldfish riddle?”\n\n“It sounds familiar,” you tell him.\n\n“Well I’d wager you’ve never heard it told like this... Children!” Chuckles calls, and puts two fingers between his lips to release a loud and piercing whistle that can be heard throughout the whole carnival.\n\nAt the sound of the whistle, the five children you met at the carnival today come running, first, at the front of the line stands Thistle. Next to Thistle, on his right, is Maple. On Maple’s right is Robin and on Robin’s right is Swift. Finally, at the end of the line on Swift’s right, stands Bramble.\n\n“There you all are,” says Chuckles, smiling as the children all fall into place. “Right human, are you ready for your riddle?”\n\n“Ready as I’ll ever be,” you tell him.\n\n“All right,” the old clown says, clapping his hands together, “Here we go...”\n\n*page_break\n*goto Goldfish_Riddle\n\n*label Goldfish_Riddle\n\n“Now these five children are frequent visitors to my carnival,” says Chuckles the clown. “From left to right, their names are Thistle, Maple, Robin, Swift and Bramble, and I can tell you this about them:\n\nEach child is from a different species.\n*line_break\nEach child has a different favourite ride at the carnival.\n*line_break\nEach child has a favourite non-magical animal they come to see.\n*line_break\nEach child has a different favourite food they always eat at the carnival.\n*line_break\nAnd each child has won a different prize.\n\nNow I will tell you the children’s species, favourite rides, non-magical animal, food and the prizes they won, but not in any particular order.\n\nThe children’s species are as follows; Pixie, Imp, Sprite, Gnome and Hobgoblin.\n*line_break\nTheir favourite rides are as follows; Carousel, Roller Coaster, Ghost Train, Helter Skelter and the Waltzer.\n*line_break\nTheir favourite animals are as follows; Hornless Unicorn, Miniature Giant-Rat, One-Headed Dog, Spineless Cactus-Cat and the Loch-Ness Otter.\n*line_break\nTheir favourite foods are as follows; Rainbow Icecream, Fairy-Dust Floss, Chicken Nougat, Popcorn on the Cob and Honeydewcomb.\n*line_break\nAnd the prizes they all won are as follows; Cupid’s Bow, Yeti Bear, Voodoo Doll, Dream-Catcher and a 24 Karat Goldfish.\n\nIn order to help you solve this riddle, I can tell you only 15 facts.\n\n1. The Sprite loves the roller coaster.\n*line_break\n2. The Gnome won the yeti bear.\n*line_break\n3. The child who likes the waltzer loves the hornless unicorn.\n*line_break\n4. The Imp is next to and on the left of the Gnome.\n*line_break\n5. The Imp liked the one-headed dog.\n*line_break\n6. The child who eats honeydewcomb won a cupid’s bow.\n*line_break\n7. The Hobgoblin eats popcorn on the cob.\n*line_break\n8. Robin liked the spineless cactus-cat best.\n*line_break\n9. Thistle’s favourite ride is the ghost train.\n*line_break\n10. The child who eats fairy-dust floss is standing next to the child that won a voodoo doll.\n*line_break\n11. The child who won a dream-catcher is standing next to the child who eats popcorn on the cob.\n*line_break\n12. The child that eats rainbow icecream liked the Loch-ness otter best.\n*line_break\n13. The child who liked the helter skelter eats chicken-nougat.\n*line_break\n14. The child who liked the ghost train is standing next to the pixie.\n*line_break\n15. The child who eats fairy-dust floss is standing next to the child who liked the miniature giant-rat.\n\nSo now, with all of the information I’ve just given you, can you tell me... Which child won the 24 karat goldfish?”\n\n*choice\n  #Solve the riddle.\n    *goto Goldfish_Answer\n  #Ask Luna for a hint.\n    *if Goldfish_Hint = 0\n      *set Hints + 1\n    *goto Hint_Goldfish\n  #Eat a magic bean.\n    *if Goldfish_Bean = 0\n      *set Beans + 1\n    *goto Bean_Goldfish\n\n*label Goldfish_Answer\n\nSo, which child has the 24 karat goldfish?\n\n*choice\n  #Thistle.\n    *goto Goldfish_Incorrect\n  #Maple.\n    *goto Goldfish_Incorrect\n  #Robin.\n    *goto Goldfish_Incorrect\n  #Swift.\n    *goto Goldfish\n  #Bramble.\n    *goto Goldfish_Incorrect\n\n*label Hint_Goldfish\n*set Goldfish_Hint 1\n\n“Oh dear, this riddle’s really, really hard!” exclaims Luna. “Maybe if we set up a chart like this...” Fluttering away, Luna returns with a short, pointed stick which she uses to draw a chart in the dirt, with the names of all the children going across the top of the chart and the six different attributes going down the side.\n\n“Here, we go, this should be really useful! Now, there’s not a lot we can fill in right now... But we know that Thistle likes the ghost train,” she says, writing ‘Ghost Train’ in the box for Thistle’s favourite ride. “And we know that Robin’s favourite animal was the spineless cactus-cat.” She writes ‘Spineless Cactus-Cat’ in the box for Robin’s favourite animal.\n\n“Well that’s a start,” Luna says to herself. “Now what else can we figure out from the list of facts?”\n\n*image Chart.png\n\n1. The Sprite loves the roller coaster.\n*line_break\n2. The Gnome won the yeti bear.\n*line_break\n3. The child who likes the waltzer loves the hornless unicorn.\n*line_break\n4. The Imp is next to and on the left of the Gnome.\n*line_break\n5. The Imp liked the one-headed dog.\n*line_break\n6. The child who eats honeydewcomb won a cupid’s bow.\n*line_break\n7. The Hobgoblin eats popcorn on the cob.\n*line_break\n8. Robin liked the spineless cactus-cat best.\n*line_break\n9. Thistle’s favourite ride is the ghost train.\n*line_break\n10. The child who eats fairy-dust floss is standing next to the child that won a voodoo doll.\n*line_break\n11. The child who won a dream-catcher is standing next to the child who eats popcorn on the cob.\n*line_break\n12. The child that eats rainbow icecream liked the Loch-ness otter best.\n*line_break\n13. The child who liked the helter skelter eats chicken-nougat.\n*line_break\n14. The child who liked the ghost train is standing next to the pixie.\n*line_break\n15. The child who eats fairy-dust floss is standing next to the child who liked the miniature giant-rat.\n\nWhich child won the 24 karat goldfish?\n\n*choice\n  #Solve the riddle.\n    *goto Goldfish_Answer\n  #Eat a magic bean.\n    *if Goldfish_Bean = 0\n      *set Beans + 1\n    *goto Bean_Goldfish\n\n*label Bean_Goldfish\n*set Goldfish_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Swift.[/b]\n\n*choice\n  #Solve the riddle.\n    *goto Goldfish_Answer\n\n*label Goldfish_Incorrect\n\n“What?” Chuckles asks before shaking his head with disappointment. “Oh no, no, no, you’ve gotten that completely wrong. Why not start over from the beginning and see if you can solve it this time?”\n\n*page_break\n*goto Goldfish_Riddle\n\n*label Goldfish\n*achieve ringmaster\n*set Mushrooms + 1\n*set Funfair_Fungus 1\n\n*image Funfair_Fungus.png\n\n“Swift has the goldfish!” you announce, sounding quite sure of yourself.\n\nThe Imp gives you a devilish grin and, with the tip of his forked tail, pulls out a little clear bag containing the solid gold fish. “Good job human kid,” Swift congratulates you. “Had to con some poor troll out of every piece of eight he had to win this little beauty.”\n\n“Well done ${Name}!” Maple cheers.\n\n“We knew you could do it,” adds Bramble.\n\n“Yeah, yeah, lucky guess,” Thistle mutters.\n\n“Can I get back to throwing wet sponges at the clowns now?” asks Robin.\n\n“Yes, yes, off you all go,” Chuckles grumbles, waving his hand dismissively and the children all scatter to get back to whatever they were doing before. “Well young ${Man_Lady}, I suppose you must be a lot smarter than I gave you credit for,” the old clown says as he hobbles over to you. “You truly are worthy to carry the Funfair Fungus after all. Well here it is, as promised,” Chuckles says as he holds the prize to you. “I honestly don’t think anybody could deserve it more.”\n\n*page_break\n\n“Thank you,” you tell the clown, as you reach out to take the staff. “But... What about you?” you say, hesitating. “Will you be able to walk without it?”\n\n“I don’t know,” Chuckles says, “let’s see.” Tossing the Funfair Fungus to you, the old, decrepit clown stands up straight and stretches first one leg and then the other. “You know, my legs feel absolutely fine!” Chuckles tells you and then proceeds to dance a little jig on the spot. “Never better in fact! You know what child, I think it’s fair to say there’s nothing wrong with my legs at all.”\n\n“But if you could walk fine all along, then why were you using the Funfair Fungus as a walking stick in the first place?” you ask.\n\n“Hmm...” Chuckles thinks about this for a moment before laughing to himself. “You know what?” he asks. “I can’t quite remember.” And with that, the old clown does three backwards somersaults in a row before cartwheeling on his way.\n\n“... Well, that was fun!” Luna says happily to herself.\n\n“And I’m one step closer to getting home,” you add.\n\n“Can we get more sweets now?”\n\n“No!” You tell the wisp firmly before you and Luna leave the funfair in search of more mushrooms.\n\n*page_break\n*goto_scene Map", "haunted_house": "*temp Riddle_Nothing\n*temp Nothing_Hint 0\n*temp Nothing_Bean 0\n*temp Rosie_Hint 0\n*temp Rosie_Bean 0\n*temp Riddle_Glove\n*temp Glove_Hint 0\n*temp Glove_Bean 0\n*temp Riddle_Fivehundred\n*temp Fivehundred_Hint 0\n*temp Fivehundred_Bean 0\n*temp Riddle_Fire\n*temp Fire_Hint 0\n*temp Fire_Bean 0\n*temp Riddle_S\n*temp S_Hint 0\n*temp S_Bean 0\n*temp Riddle_Shadow\n*temp Shadow_Hint 0\n*temp Shadow_Bean 0\n*temp Riddle_Strange\n*temp Strange_Hint 0\n*temp Strange_Bean 0\n*temp Riddle_Snowman\n*temp Snowman_Hint 0\n*temp Snowman_Bean 0\n*temp Coffin_Hint 0\n*temp Coffin_Bean 0\n\nFeeling very uneasy, you follow Luna through the forest to an extremely uninviting building. An old mansion made of dark wooden planks with boarded up windows and slates crumbling off the roof. There is a large garden filled with gnarled trees and shrivelled shrubs and weeds. In front of it all, a rusty iron gate is blocking your way, chained shut and with a sign hanging over the gate with the words, ‘KEEP OUT’ scratched across it in block capitals, with a few exclamation marks thrown on the end for dramatic emphasis.\n\n“You’re sure this is a good idea?” you ask Luna.\n\n“Nope!” she replies happily. “Oh look at all the birdies!” Luna then declares, pointing at a collection of birds gathered on the roof of the building, black like ravens but shaped more like hawks or kestrels or some other small bird of prey. “Aren’t they pretty? I wonder if they’ll have any nests with little chicks inside. I want to see!” And without a second of hesitation, Luna flies off to pester the poor animals.\n\n“Luna!” you call after her, but the wisp is too distracted to hear you.\n\nWell, it seems you have no choice. Throwing caution to the wind, you climb over the cold iron gate. Once on the other side, you have to weave your way through thorns and nettles as you walk along a worn cobblestone path that leads toward the haunted house. About half way there though, you come across a small shed with a thatched roof that looks like it’s falling to pieces. Looking inside, you can make out what looks like a makeshift bed, an old wood oven and several cans and packets of assorted types of food scattered on the floor. “Hmm, looks like someone lives here,” you mutter to yourself.\n\n“Does it now?” you hear a voice behind you and quickly turn around to see one of the most frightening looking beings you have ever laid eyes upon. “Well I’ll have you know somebody does live here ${Boy_Girl}, and you are trespassing in my house!” The old man is terrifying close up, blind in one eye with deep set wrinkles all over his face, missing teeth and a long white beard that reaches to the ground. He is wearing a dark purple cape that is heavily faded and so stained and caked with dirt, it looks like it hasn’t been washed in a hundred years.\n\n*page_break\n\nBacking away from the old man, you trip over one of his discarded cans and fall flat on your back. “And see, now you’re messing up my home!” he yells in frustration, presumably talking about the assorted empty food containers that you’ve scattered in your fall. “Everything was right in it’s proper place and now you’ve ruined it! I’ll never find anything!”\n\nJust then you hear the most horrifying shriek and Luna quickly flies through the door to hide in one of your pockets. “Bad idea!” she admits as she cowers away. “Very, very bad idea. Those birds do not like people playing with their chicks.”\n\n“Chicks or not, you’d best keep your distance,” the old man warns you. “Those there are devil birds. Heralds of death they are. You see a devil bird around, it means somebody’s not long for this world. So clear off, both of you, before the grim reaper comes calling for you!”\n\n“But we can't leave!” you object. “There’s a rare mushroom somewhere in this house. I need to find it.”\n\n“Ah, so it’s the Possessed Portobello you seek?” the old man asks. “Well if I were you I’d give it up for a lost cause and turn back. No dried up old mushroom is worth venturing into that house.”\n\n“We can't go back now!” you insist. “I came here from the human world and I need that mushroom to get back home. If I don’t find it, I might never see my friends and family again!”\n\n*page_break\n\nThe old man is silent for a moment before letting out an irritated groan. “Kids these days, they don’t listen to nobody. Been a gardener here the best part of my life, and nothing I do seems to keep you lot out.”\n\n“You’re a gardener?” you ask, sounding quite shocked. “Uh... I’m sorry, it’s just that this place doesn’t look very... Well, you know... Gardened.”\n\n“Of course it doesn’t,” the old man says crossly. “How else would I keep people out?” Leaning forward, the old man cups a wilted rosebud in his hand, then taking a pair of shears from his pocket, he snips the bud off. Entering the shed, the man holds the shrivelled old flower up to you. He then holds his other hand over the rose and it miraculously comes back to life before your very eyes. The colour returns to the petals and the dead flower blooms once more.\n\n“Years ago, when I was in my prime, this garden was paradise on earth. Beautiful flowers blossomed all year round, pure, clean water flowed through the fountains, all kinds of adorable creatures made this garden there home. And me, I was Cornelius the Caretaker, the greatest wizard gardener to ever grace this village.” Suddenly, the wizard breaths a heavy sigh of regret, and crushing the rose in his hands, the bud instantly wilts away and dies once more. “But that was before the tragedy. The old house isn’t safe any more, so now I make the garden as terrifying as possible, to scare children like you away.”\n\nWell that was a depressing story if ever you heard one. Taking a deep breath, you get back to your feet and stand your ground. “Listen, I understand you’re only trying to help, but I need to get back home. I’m not leaving without that mushroom.”\n\n“Oh dear,” sighs Cornelius. “I see you’ve made up your mind. Well, it looks like we’ve come to a stalemate. I won’t let you in and you refuse to leave, so here’s what I suggest, I will pose to you a riddle. Answer true, that’ll show me that you might just be smart enough to survive in that accursed house, and I’ll let you by. Answer false, and you take your little glowing friend and never come back.”\n\nYou
