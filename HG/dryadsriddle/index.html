an who buys it doesn’t need it. The man that needs it doesn’t know it.\n*line_break\n6. When you take the whole away, some is still left.\n*line_break\n7. The more of me you take, the more you leave behind.\n*line_break\n8. What gets wet while drying?\n\nThat’s a lot of riddles, but the only answer you really need is the word going down the middle.\n\n*image Crossword.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Manifest\n    *if (\"$!!{Riddle_Manifest}\" = \"MANIFEST\") or (choice_randomtest)\n      *goto Manifest\n    *else\n      *goto Manifest_Incorrect\n  #Ask Luna for a hint.\n    *if Manifest_Hint = 0\n      *set Hints + 1\n    *goto Hint_Manifest\n  #Eat a magic bean.\n    *if Manifest_Bean = 0\n      *set Beans + 1\n    *goto Bean_Manifest\n\n*label Manifest\n*achieve pet\n*set Mushrooms + 1\n*set Toadstool_Trophy 1\n\n*image Completed_Crossword.png\n\nHeading back to Mr Stonehoof’s classroom, you knock on the door and hand him the paper. “I finished the crossword Mr Stonehoof,” you tell him.\n\n“Oh really?” he asks. “Well don’t feel too bad if you didn’t do so well. None of the other students got it right,” he says, glancing over the paper. The centaur pauses for a moment before going wide-eyed in surprise. “Well by the Boogeyman’s beard, you’ve done it ${Name}!” he exclaims. “Yes, yes, the answers are all here!\n\n‘Until I am measured I am not known, but how you will miss me when I have flown.’ That’s time of course.\n*line_break\n‘I can travel around the world, yet I always stay stuck in a corner.’ That’s a stamp.\n*line_break\n‘What belongs to you, but others use it more than you do?’ Your name.\n*line_break\n‘If you name me you will break me.’ Silence.\n*line_break\n‘The man that makes it doesn’t want it. The man who buys it doesn’t need it. The man that needs it doesn’t know it.’ That would be a coffin.\n*line_break\n‘When you take the whole away, some is still left.’ This of course refers to the word wholesome.\n*line_break\n‘The more of me you take, the more you leave behind.’ Footsteps.\n*line_break\nAnd finally, ‘What gets wet while drying?’ A towel of course!\n\n*page_break\n\n*image Toadstool_Trophy.png\n\nInsert all of these answers into the crossword and the letters going through the centre make up the word ‘Manifest’. I must say I am extremely impressed, young ${Name},” Mr Stonehoof tells you, reaching into his desk and retrieving a large, silver trophy in the shape of a mushroom and handing it over to you. “Congratulations ${Name}, you have won the Toadstool Trophy. I must say, you’re easily one of the brightest students I’ve ever had, and you’ve only been attending this school for a day.”\n\n“Hey, what about me?” Luna objects, sounding a little jealous. “I came to this school too and my glow can get as bright as 40 watts! That’s way brighter than any human can shine.”\n\nMr Stonehoof then seems to take notice of the wisp for the first time. “Oh yes, I remember you. Luna, wasn’t it? In fact weren’t you overdue on several pieces of homework the last time I saw you?”\n\n“Oh wow, look at the time!” Luna declares quickly changing the subject. “Sorry, but we got to go. Come on ${Name}, we’re going to be late for... You know... The thing! The thing we need to do... In the place... Yes... The place that isn’t here... Bye!” And with that, the wisp flies off before you have time to object.\n\n“Uh... Thank you very much Mr Stonehoof,” you tell the centaur, then quickly chase after Luna before you lose sight of her entirely.\n\n*page_break\n*goto_scene Map", "choicescript_description": "Cryptic riddles and perplexing puzzles await you as you solve the Dryad's Riddle. In a world where wit and wisdom are worth more than silver and gold, you must embark on an adventure of a lifetime. Test your mind to it’s limits and escape the land of dreams.\n\n[i]The Dryad's Riddle[/i] is a 70,000 word interactive fantasy novel by Avery Moore, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Choose your own name and play as a man or woman.[n/]\n• Explore a world of fantasy and meet a collection of weird and wonderful characters.[n/]\n• Use special hints and cheats whenever you get stuck.[n/]\n• Over 50 riddles and puzzles to be solved.[n/]\n• Three different endings to be discovered depending on how you play.\n\n", "choicescript_stats": "*label Stats\n\n[b]Name:[/b] ${Name}\n\n[b]Gender:[/b] ${Gender}\n\n*if Know_Mushrooms = 1\n  [b]Mushrooms Found:[/b] ${Mushrooms}\n\n\n*if Know_Hints = 1\n  [b]Hints Used:[/b] ${Hints}\n\n*if Know_Beans = 1\n  [b]Magic Beans Used:[/b] ${Beans}\n\n*if Know_Hints = 1\n  *temp title \"Luna\"\n  *if ((Hints >= 0) and (Hints \u003c= 5))\n    *set title \"Luna's light is shining bright.\"\n  *if ((Hints >= 6) and (Hints \u003c= 10))\n    *set title \"Luna’s light is a little dimmer than when you first met her.\"\n  *if ((Hints >= 11) and (Hints \u003c= 19))\n    *set title \"Luna’s light is beginning to fade.\"\n  *if Hints >= 20\n    *set title \"Luna’s light is so faint, you can barely see her.\"\n  [b]Luna's Status:[/b] ${title}\n\n*if Know_Hints = 1\n  *image Luna.png\n\n*choice\n  #Rules.\n    *goto Rules\n  *if (Willow_Riddle = 1) #Willow's Riddle.\n    *goto Riddle\n\n*label Rules\n\n1. Whenever you need to type an answer, the answer will be either a single word or number with no gaps. For example, if you are asked a riddle and you think that 'Mountain' is the answer, you need to type ‘Mountain’, not ‘A mountain’ or ‘The mountain’. The same applies to letters, so if you believe the answer to a riddle is ‘The letter X’, simply write ‘X’ instead.\n\n2. If the answer is a number, it must be written as a number, so if you think the answer is 367, you must type ‘367’ not ‘Three hundred and sixty seven’.\n\n3. The answers must not include punctuation marks of any kind. No full stops, exclamation marks, question marks, quotation marks, commas or anything else that isn’t either a letter or a number.\n\n4. Not all riddles will require you to type the answer. Some may be multiple choice and some require you to perform a series of tasks in a certain order. If you have no idea how to answer a question, try anyway and you might find that a typed answer isn’t required after all.\n\n*page_break\n*goto Stats\n\n*label Riddle\n\nThis is the riddle that Willow gave you at the beginning of your quest:\n\nFear not to make mistakes or to waste our time,\n*line_break\nFor to err is human and being human is no crime.\n\nThe light will help to guide your path in times that you need aid,\n*line_break\nBut with each use you’ll see the light will slowly start to fade.\n*line_break\nTwenty times and you will see the strain is too much to bare,\n*line_break\nAnd it won't be in any state to guide you anywhere.\n\nNow magic is a useful tool when you might feel stuck,\n*line_break\nBut I warn you first that more than ten will find you out of luck.\n*line_break\nFor this is not a worthy tool for the brave and wise and clever,\n*line_break\nAnd only those who prove there worth will find the precious treasure.\n\n*page_break\n*goto Stats", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]The Rest of the Game[/b]\n  \n  Unlock the Funfair, School, Church, Museum, and including the thrilling conclusion to be found in the Clearing!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]The Rest of the Game[/b]\n  \n  You've paid to unlock the Funfair, School, Church, Museum, and the thrilling conclusion to be found in the Clearing!\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "screenshots": "\n*script window.animateEnabled = false;\n\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Name \"David\"\n*set Gender \"Male\"\n*set Willow_Riddle 0\n*set Know_Beans 0\n*set Know_Hints 0\n*set Know_Mushrooms 0\n*set Mushrooms 0\n*set Beans 0\n*set Hints 0\n\nTurning around, you see that there is indeed a hollow in the old tree and you approach it to get a better look. Reaching into the hollow, you can feel your fingers brushing against something, so you scoop it up in your hand and pull it out of the tree. Opening your palm, you discover a small piece of parchment, rolled up into a tiny scroll. You unravel in to discover what looks like a riddle written inside.\n\n“What has a bark but no bite,\n*line_break\nAnd a trunk but no tusks?”\n\n*fake_choice\n\t#Solve the riddle.\n\t#I can't figure it out!\n\n*script changeBackgroundColor(\"black\")\n*set Name \"Anna\"\n*set Gender \"Female\"\n*set Willow_Riddle 1\n*set Know_Beans 1\n*set Know_Hints 1\n*set Know_Mushrooms 1\n*set Mushrooms 3\n*set Beans 6\n*set Hints 14\n\nI need to get the lion, the rabbit and the apples across the river.\n*line_break\nThe boat can only carry me and one other thing at a time.\n*line_break\nIf I leave the lion alone with the rabbit, the lion will eat the rabbit.\n*line_break\nIf I leave the rabbit alone with the apples, the rabbit will eat the apples.\n\nHow do I get all three things safely across the river without anything getting eaten?\"\n\n*fake_choice\n\t#Tell him to take the lion first.\n\t#Tell him to take the rabbit first.\n\t#Tell him to take the apples first.\n\n*script changeBackgroundColor(\"sepia\")\n*set Name \"Jack\"\n*set Gender \"Male\"\n*set Willow_Riddle 1\n*set Know_Beans 1\n*set Know_Hints 1\n*set Know_Mushrooms 1\n*set Mushrooms 1\n*set Beans 2\n*set Hints 5\n\nYou consider the old man’s offer for a moment. “I really don’t like this, but I guess I don’t have any choice. Deal.”\n\n“Very good,” says Old Cornelius, “then here is my riddle;\n\nWhat does man love more than life,\n*line_break\nFear more than death or mortal strife.\n*line_break\nWhat the poor have and the rich require,\n*line_break\nAnd what contented men desire.\n*line_break\nWhat the miser spends and the spendthrift saves,\n*line_break\nAnd all men carry to their graves?”\n\n*fake_choice\n\t#Solve the riddle.\n\t#Ask for a hint.\n\n*set Name \"Chloe\"\n*set Gender \"Female\"\n*set Willow_Riddle 1\n*set Know_Beans 1\n*set Know_Hints 1\n*set Know_Mushrooms 1\n*set Mushrooms 2\n*set Beans 3\n*set Hints 8\n\n“Only one of us if lying,” says Shaun.\n*line_break\n“That’s not true, two of us are lying!” says Shawn.\n*line_break\n“Don’t listen to them, there’s three of us that are lying,” says Shane.\n*line_break\n“We’re all lying, every last one of us,” says Shamus.\n\n“Well now you’ve heard all their stories, tell me ${Name}, how many of the boys are actually lying?” asks Father O’Reilly.\n\n*fake_choice\n\t#Solve the riddle.\n\t#Ask for a hint.\n\n*if choice_is_ios_app\n\t*finish\n\n*set Name \"Harry\"\n*set Gender \"Male\"\n*set Willow_Riddle 1\n*set Know_Beans 1\n*set Know_Hints 1\n*set Know_Mushrooms 1\n*set Mushrooms 4\n*set Beans 6\n*set Hints 19\n\n“Prove it then!” the minotaur dares you as he sits himself down by your side. “Here’s a riddle that no dummy could solve;\n\nI know a word of letters three. Add two, and fewer there will be!”\n\n*fake_choice\n\t#Solve the riddle.\n\t#Ask for a hint.", "startup": "*title The Dryad's Riddle\n*author Avery Moore\n*scene_list\n  startup\n  Introduction\n  Map\n  Haunted_House\n  $ Clearing\n  $ Church\n  $ Funfair\n  $ Museum\n  $ School\n\n*create Name \"Unknown\"\n*create Gender \"Unknown\"\n*create Boy_Girl \"Unknown\"\n*create He_She \"Unknown\"\n*create Him_Her \"Unknown\"\n*create His_Hers \"Unknown\"\n*create His_Her \"Unknown\"\n*create Mr_Miss \"Unknown\"\n*create Man_Lady \"Unknown\"\n*create Laddie_Lassie \"Unknown\"\n*create Willow_Riddle 0\n*create Know_Beans 0\n*create Know_Hints 0\n*create Know_Mushrooms 0\n*create Mushrooms 0\n*create Possessed_Portobello 0\n*create Sacred_Shiitake 0\n*create Funfair_Fungus 0\n*create Toadstool_Trophy 0\n*create Mushroom_Medallion 0\n*create Beans 0\n*create Hints 0\n\n*achievement rookie visible 50 Riddle Rookie\n  Solve your first riddle.\n  Solved your first riddle.\n*achievement ringmaster visible 50 Ringmaster\n  Find the Funfair Fungus.\n  Found the Funfair Fungus.\n*achievement relic visible 50 Holy Relic\n  Find the Sacred Shiitake.\n  Found the Sacred Shiitake.\n*achievement whisperer visible 50 Ghost Whisperer\n  Find the Possessed Portobello.\n  Found the Possessed Portobello.\n*achievement pet visible 50 Teacher's Pet\n  Find the Toadstool Trophy.\n  Found the Toadstool Trophy.\n*achievement critic visible 50 Art Critic\n  Find the Mushroom Medallion.\n  Found the Mushroom Medallion.\n*achievement home visible 50 There's No Place Like Home\n  Make it back to the mortal world.\n  Made it back to the mortal world.\n*achievement treasure visible 50 Treasure Hunter\n  Find the secret treasure.\n  Found the secret treasure.\n*achievement master visible 100 Riddle Master\n  Complete the game without using any hints or magic beans.\n  Completed the game without using any hints or magic beans.\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Cryptic riddles and perplexing puzzles await you as you solve the Dryad's Riddle. In a world where wit and wisdom are worth more than silver and gold, you must embark on an adventure of a lifetime. Test your mind to it’s limits and escape the land of dreams.\n\n  [i]The Dryad's Riddle[/i] is a 70,000 word interactive fantasy novel by Avery Moore, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  • Choose your own name and play as a man or woman.[n/]\n  • Explore a world of fantasy and meet a collection of weird and wonderful characters.[n/]\n  • Use special hints and cheats whenever you get stuck.[n/]\n  • Over 50 riddles and puzzles to be solved.[n/]\n  • Three different endings to be discovered depending on how you play.\n\n\n  *if choice_prerelease\n    [i]You can play the one chapter of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n    *choice\n      #Sign up to be notified when the game is available.\n        *subscribe {\"now\": true}\n        *restart\n      #Play the first chapter now for free.\n        *goto purchased\n\n  [i]You can play the first one chapter of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase_discount adfree 2017-08-25 $3.99 $2.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\nA not so long time ago, in a place quite nearby actually, a young child heard of a legend. A legend of a mythical creature that could only be summoned by the brightest minds and sharpest of wit. Once summoned, the creature would reward those they deemed worthy with treasure beyond their wildest dreams!\n\nYou of course are this young child, and you are about to embark on a journey. A journey that will test your mind to it’s very limits with riddles and puzzles that will have you scratching your head in confusion from the start, and ripping your hair out in frustration before this is over.\n\nIf you fear you do not have the brains to complete this quest, turn back now, for your journey is about to begin...\n\n*finish\n"}};
