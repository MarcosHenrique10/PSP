the archway begin to break apart and withdraw into either side of the wall. “You did it again ${Name}!” Mimic cheers with enthusiasm. “You figured out that the numbers on the plaque just represented letters. Number 1 being the letter A, 2 being B and so on until number 26 is Z. Knowing that, the numbers ‘10-21-19-20 19-1-25 “15-16-5-14”.’ become, ‘Just say “open”.’ So, of course, as soon as you said the word “open”, the doors did so. Come on now, we’ve got more art to admire!” That said, Mimic leads you into yet another room.\n\nThis particular room is long and narrow. It contains rather unique artwork in that all the art consists of a series of images. On one wall there is one long series of paintings that show the growth of a centaur child from birth to old age. On the opposite wall is another series of paintings that shows the cycle of the moon from new to full and back again. At the end of the corridor is a much shorter series of paintings, though this one makes considerably less sense than the others.\n\n*page_break\n\n“Let me guess, this is another riddle?” you ask Mimic.\n\n“Of course!”${He_She} tells you. “One painting in the sequence is missing.”\n\nThe images on the wall are as follows, a cup of tea, a sheep, a missing space where clearly another painting should be, two sheep, a box of eggs, a question mark and a speech bubble.\n\nYou can make no sense of these images at all. “I think we might be here awhile,” you warn Luna.\n\n“Don’t doubt yourself ${Name}!” the wisp encourages you. “I’m sure you can figure out which letter is missing.”\n\n“Letter?” you ask, even more confused.\n\n“Well yes, obviously,” says Mimic. “Can’t you tell the missing painting is a letter?”\n\nWhat letter should fill the empty space?\n\n*image Paintings.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_V\n    *if (\"$!!{Riddle_V}\" = \"V\") or (choice_randomtest)\n      *goto V\n    *else\n      *goto V_Incorrect\n  #Ask Luna for a hint.\n    *if V_Hint = 0\n      *set Hints + 1\n    *goto Hint_V\n  #Eat a magic bean.\n    *if V_Bean = 0\n      *set Beans + 1\n    *goto Bean_V\n\n*label Hint_V\n*set V_Hint 1\n\n“Well I’ve figured it out,” Luna tells you confidently. “You just have to understand what all the paintings on the wall are, then you’ll find the missing letter.”\n\nYou take a look at the paintings once more. “Well the first painting’s a cup of tea. Then there’s a sheep.”\n\n“That’s a ewe,” Luna tells you.\n\n“All right, a ewe,” you agree. “Then a blank space, then two ewes, then a box of eggs, a question mark and a speech bubble.”\n\n“The question mark represents a question,” says Luna. “Like who, what, when, where or why. And a speech bubble is used to show what somebody said.”\n\n“I still don’t get it,” you tell Luna.\n\n“It’s very simple. Tea, ewe, empty space, double ewe, eggs, why, said. Do you understand now?” she asks.\n\nWhat letter should fill the empty space?\n\n*image Paintings.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_V\n    *if (\"$!!{Riddle_V}\" = \"V\") or (choice_randomtest)\n      *goto V\n    *else\n      *goto V_Incorrect\n  #Eat a magic bean.\n    *if V_Bean = 0\n      *set Beans + 1\n    *goto Bean_V\n\n*label Bean_V\n*set V_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]V.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_V\n    *if (\"$!!{Riddle_V}\" = \"V\") or (choice_randomtest)\n      *goto V\n    *else\n      *goto V_Incorrect\n\n*label V_Incorrect\n\nMimic actually slaps ${His_Her} hand against ${His_Her} face when ${He_She} hears your answer. “No! Do you really not get it? It’s so obvious! And there I was thinking you understood my art!”\n\n“Sorry,” you mutter to the frustrated artist. “Can I try again?”\n\n“Oh, why not?” asks Mimic. “We’re stuck here till you get it right anyway.”\n\nThe images on the wall are as follows, a cup of tea, a sheep, a missing space where clearly another painting should be, two sheep, a box of eggs, a question mark and a speech bubble.\n\nWhat letter should fill the empty space?\n\n*image Paintings.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_V\n    *if (\"$!!{Riddle_V}\" = \"V\") or (choice_randomtest)\n      *goto V\n    *else\n      *goto V_Incorrect\n  #Ask Luna for a hint.\n    *if V_Hint = 0\n      *set Hints + 1\n    *goto Hint_V\n  #Eat a magic bean.\n    *if V_Bean = 0\n      *set Beans + 1\n    *goto Bean_V\n\n*label V\n\n*image Paintings_Complete.png\n\n“V?” you ask, and quickly have to take a step to the side as a trap door opens up beneath you, revealing a hidden staircase.\n\n“Very good ${Name},” Mimic tells you. “You worked out the sequence of letters. The tea was T. The sheep, or ewe to be specific, was U. The two ewes together were W. The eggs were X. The question mark was Y and the speech bubble was Z. So, of course, the space between the U and the W had to be a V. Well, down the stairs you go,” the doppelganger instructs you, and so you start to descend the stairs revealed by the trap door. “Mind your step, I hear they’re slippery.”\n\n“They seem fine to me,” you reassure Mimic, but are proven completely wrong when, out of nowhere, the stairs tilt to the side, forming a slide instead of a staircase. You let out a yell as you quickly fall and land rather gracelessly on the ground below you.\n\n“You all right ${Name}?” asks Luna as she floats to your side.\n\n“Oh, I’m fine. The hard, stone floor broke my fall,” you mumble sarcastically, rubbing your lower back as you get to your feet.\n\n*page_break\n\nA quick scan of the room shows it to be by far the most pointless you’ve seen yet. The walls and floor are completely white and for the most part, so are the paintings. One painting is merely a handful of different coloured squares. One just looks like somebody took a tin of red paint and threw it on the canvas. One is simply a small, black dot in the centre of a white canvas and the final painting contains nothing at all. It’s just completely blank.\n\n“Beautiful, isn’t it?” you hear a voice behind you, but when you turn around you can’t see anyone.\n\n“Who’s there?” you ask.\n\n“I am,” the voice replies. This time the voice seems to be coming from right in front of you, but there’s definitely no one there.\n\n“I can’t see you,” you tell the voice.\n\n“I’d be surprised if you could,” says the voice in return. “I’m an invisible man.”\n\n“Hi there Mr Invisible! I’m Luna!” your wisp friend introduces herself. “I had an invisible friend once. She was nice. Real good at hide and seek!”\n\n*page_break\n\n“Listen, we’re kind of lost in here,” you explain. “Do you know how I can get to the Mushroom Medallion?”\n\n“Can’t say I do,” the invisible man replies. “I just come here to admire the work. That one there in front of you... I have to say it’s the most inspired piece of art I’ve ever had the pleasure to behold. It speaks volumes to me!”\n\n“Really?” you ask, very surprised since the painting in front of you is the empty canvas. “Doesn’t say much to me. It’s blank.”\n\n“It might seem that way to the untrained eye,” the invisible man tells you. “Take a closer look ${Boy_Girl}. I’m sure you’ll understand.”\n\nYou take a very close look at the pure, white canvas.\n\nWhat does the painting say to you?\n\n*image Glockenspiel.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Glockenspiel\n    *if (\"$!!{Riddle_Glockenspiel}\" = \"GLOCKENSPIEL\") or (choice_randomtest)\n      *goto Glockenspiel\n    *else\n      *goto Glockenspiel_Incorrect\n  #Ask Luna for a hint.\n    *if Glockenspiel_Hint = 0\n      *set Hints + 1\n    *goto Hint_Glockenspiel\n  #Eat a magic bean.\n    *if Glockenspiel_Bean = 0\n      *set Beans + 1\n    *goto Bean_Glockenspiel\n\n*label Hint_Glockenspiel\n*set Glockenspiel_Hint 1\n\n“I like it!” says Luna.\n\n“Luna, it’s completely blank,” you object.\n\n“It’s not blank!” she insists. “You just can’t see the paint very well. It’s not very clear... Maybe the artist shouldn’t have used paint that was the same colour as the canvas?”\n\n“Well that’s just great,” you groan in frustration. “How can I see anything when the paint and the canvas are the exact same colour?”\n\n“Yeah, I see your problem,” Luna says thoughtfully. “Maybe you could try looking at it from a different angle? I’m sure the colours of the paint and canvas are ever so slightly different.”\n\nWhat does the painting say to you?\n\n*image Glockenspiel.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Glockenspiel\n    *if (\"$!!{Riddle_Glockenspiel}\" = \"GLOCKENSPIEL\") or (choice_randomtest)\n      *goto Glockenspiel\n    *else\n      *goto Glockenspiel_Incorrect\n  #Eat a magic bean.\n    *if Glockenspiel_Bean = 0\n      *set Beans + 1\n    *goto Bean_Glockenspiel\n\n*label Bean_Glockenspiel\n*set Glockenspiel_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Glockenspiel.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Glockenspiel\n    *if (\"$!!{Riddle_Glockenspiel}\" = \"GLOCKENSPIEL\") or (choice_randomtest)\n      *goto Glockenspiel\n    *else\n      *goto Glockenspiel_Incorrect\n\n*label Glockenspiel_Incorrect\n\n“I’m not surprised that your mind isn’t open enough to appreciate the subtle genius of this masterpiece. Most people don’t,” the invisible man complains.\n\n“Honestly, I’m trying, but I really, really don’t see anything,” you explain.\n\n“Try again,” he tells you. “Look really closely. You’ll find something there if you just keep looking.”\n\nYou take another look at the pure, white canvas.\n\nWhat does the painting say to you?\n\n*image Glockenspiel.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Glockenspiel\n    *if (\"$!!{Riddle_Glockenspiel}\" = \"GLOCKENSPIEL\") or (choice_randomtest)\n      *goto Glockenspiel\n    *else\n      *goto Glockenspiel_Incorrect\n  #Ask Luna for a hint.\n    *if Glockenspiel_Hint = 0\n      *set Hints + 1\n    *goto Hint_Glockenspiel\n  #Eat a magic bean.\n    *if Glockenspiel_Bean = 0\n      *set Beans + 1\n    *goto Bean_Glockenspiel\n\n*label Glockenspiel\n\nYou say the answer aloud, really unsure if that could possibly be right. As soon as you mutter the word though, the painting swings forward and reveals another hidden door.\n\n“Really? Glockenspiel?” you ask, surprised it actually worked. “That seems like a really random word to paint with white paint on a blank canvas.”\n\n“My uncle played the glockenspiel!” Luna declares.\n\n“That’s nice Luna,” you tell her.\n\n“Well done little human child,” the invisible man declares. “It’s good to see someone else who appreciates art as much as I do.”\n\n“Yeah, well done ${Name}, you’re nearly done!” you hear Mimic cheer.\n\n“Mimic?” you ask as you look around the room. “Where are you?”\n\n“Silly human. I’m a doppelganger!” Mimic tells you, suddenly appearing out of nowhere and transforming back into your likeness. “I can take on any form I like... So I just transformed into the invisible man and pretended I wasn’t here.”\n\n“What was the point in that?” you ask.\n\n“To mess with you!” ${He_She} declares proudly. “Come on, let’s go.”\n\nYou’re used to the strange behaviour of this world’s inhabitants by now, so you just shrug your shoulders and follow.\n\n*page_break\n\n“Come on ${Name}, you should be excited. There’s only one more door you need to go through to reach the Mushroom Medallion!” announces Mimic.\n\n“Really?” you ask, suddenly a lot more enthusiastic. “That’s great!” But the room that Mimic leads you into is a circular room with five doors, each with a guard blocking your way. “Uh... Which one?”\n\n“Well that’s for you to figure out,” says Mimic. “But I should introduce you to the guards. Aren’t they great? These guys have come from all across Europe to protect our Mushroom Medallion.” First of all, Mimic gestures to a stocky built man holding a large axe. He is about 4 feet, 5 inches with red hair and a long, braided beard. “This here is Angus. He’s a dwarf of course,” Mimic tells you. $!{He_She} then gestures to a tall, ghostly woman dressed all in white. “And this is Caroline, she’s what is known as a dame blanche.” Besides the dame blanche is a goblin-like creature with a large nose and long, pointed ears. “Next to Caroline is Hans. He’s a kobold. And that’s Maria next to him,” Mimic tells you, pointing to a dark haired woman dressed all in black with a pointed hat, very similar to depictions you’ve seen of witches. “She’s a bruja. And finally on the end there is little Monaciello,” ${He_She} says, directing your attention to a very small, gnome-sized man who is rather plump in stature and dressed like a medieval monk.\n\n“Nice to meet you all!” Luna yells politely.\n\n“What am I supposed to do now?” you ask Mimic.\n\n“Simple. Just figure out which door you’re meant to go through,” ${He_She} tells you.\n\n*page_break\n\n“Okay...” you mutter, really not sure where to start. Without knowing what else to do, you take a step towards the door being guarded by Angus the dwarf. Unfortunately he takes exception to this and swings his axe at you, only missing you by an inch. “Back off ${Laddie_Lassie}!” he yells in a heavy Scottish accent. “One more step and I’ll chop that pretty wee head of yours clean off!”\n\n“Yikes,” you mumble under your breath, turning back to Mimic. “He doesn’t seem very friendly.”\n\n“Yeah, they can be quite protective of their doors,” the doppelganger admits. “They are guards after all. But don’t worry, I’m sure one of them will let you through.”\n\nAs you circle the room, each of the guards speaks to you in turn.\n\n“Éloigne-toi de ma porte, humain. Il n'y a rien pour vous ici,” says Caroline the dame blanche.\n\n“Nehmen Sie einen weiteren Schritt und ich werde Sie in Stücke kratzen!” yells Hans the kobold.\n\n“Acércate a mí y te echaré un terrible conjuro,” Maria the bruja tells you.\n\n“Vieni dentro umana, il fungo è attraverso questa porta!” declares Monaciello.\n\nSo now, which guard will you approach?\n\n*choice\n  #Solve the riddle.\n    *goto Door\n  #Ask Luna for a hint.\n    *if Door_Hint = 0\n      *set Hints + 1\n    *goto Hint_Door\n  #Eat a magic bean.\n    *if Door_Bean = 0\n      *set Beans + 1\n    *goto Bean_Door\n\n*label Door\n\nWhich of the guards shall you approach?\n\n*choice\n  #Angus the dwarf.\n    *goto Angus\n  #Caroline the dame blanche.\n    *goto Caroline\n  #Hans the kobold.\n    *goto Hans\n  #Maria the bruja.\n    *goto Maria\n  #Little Monaciello.\n    *goto Monaciello\n\n*label Hint_Door\n*set Door_Hint 1\n\n“You know, it’s times like this I wish I paid attention in French class,” Luna tells you.\n\n“Are they speaking French?” you ask Luna.\n\n“I’m not sure,” she admits. “I think they might all be speaking different languages.”\n\n“But how do I know what language they’re speaking?” you ask.\n\n“Well I suppose you’d have to find out where they come from,” she suggests. “I think the dwarf might be from Scotland.”\n\n“Yeah, I guessed that,” you tell her.\n\n“So, you just need to find out what country all the others come from, then you’ll know what language they speak!” she tells you happily.\n\n“But what then?” you ask.\n\n“Then... I don’t know,” she admits defeat. “It would be helpful if you have some way to translate what they said.”\n\nAs you circle the room, each of the guards speaks to you in turn.\n\n“Back off ${Laddie_Lassie}! One more step and I’ll chop that pretty wee head of yours clean off!” threatens Angus the dwarf.\n\n“Éloigne-toi de ma porte, humain. Il n'y a rien pour vous ici,” says Caroline the dame blanche.\n\n“Nehmen Sie einen weiteren Schritt und ich werde Sie in Stücke kratzen!” yells Hans the kobold.\n\n“Acércate a mí y te echaré un terrible conjuro,” Maria the bruja tells you.\n\n“Vieni dentro umana, il fungo è attraverso questa porta!” declares Monaciello.\n\nSo now, which guard will you approach?\n\n*choice\n  #Solve the riddle.\n    *goto Door\n  #Eat a magic bean.\n    *if Door_Bean = 0\n      *set Beans + 1\n    *goto Bean_Door\n\n*label Bean_Door\n*set Door_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Go through Monaciello’s door.[/b]\n\n*choice\n  #Solve the riddle.\n    *goto Door\n\n*label Angus\n\nYou take a step towards the door that Angus if guarding. As promised, he swings his axe at you once more, this time causing you to duck to avoid getting cleaved in half. “Okay, bad idea!” you admit as you back away.\n\n“Maybe you should try a different door?” Mimic suggests.\n\nAs you circle the room, each of the guards speaks to you in turn.\n\n“Back off ${Laddie_Lassie}! One more step and I’ll chop that pretty wee head of yours clean off!” threatens Angus the dwarf.\n\n“Éloigne-toi de ma porte, humain. Il n'y a rien pour vous ici,” says Caroline the dame blanche.\n\n“Nehmen Sie einen weiteren Schritt und ich werde Sie in Stücke kratzen!” yells Hans the kobold.\n\n“Acércate a mí y te echaré un terrible conjuro,” Maria the bruja tells you.\n\n“Vieni dentro umana, il fungo è attraverso questa porta!” declares Monaciello.\n\nSo now, which guard will you approach?\n\n*choice\n  #Solve the riddle.\n    *goto Door\n  #Ask Luna for a hint.\n    *if Door_Hint = 0\n      *set Hints + 1\n    *goto Hint_Door\n  #Eat a magic bean.\n    *if Door_Bean = 0\n      *set Beans + 1\n    *goto Bean_Door\n\n*label Caroline\n\nYou walk towards the door that is guarded by Caroline the dame blanche. Once you are directly in front of her though, the woman’s face transforms into a terrifying visage with sunken cheeks, hollow eyes and a wide, black chasm of a mouth with sharp, pointed teeth. She leans forward so that her face is less than an inch in front of yours and let’s out the most horrifying, ear-piecing scream you could imagine. With a yelp of horror, you stumble backwards and cover your ears. Once the ghostly figure is satisfied that you are far enough away, she retakes her original form, though the painful ringing in your ears still persists.\n\n“I don’t think that was the right door,” Luna tells you.\n\n“No kidding,” you grumble frustratedly before resuming your search once again.\n\nAs you circle the room, each of the guards speaks to you in turn.\n\n“Back off ${Laddie_Lassie}! One more step and I’ll chop that pretty wee head of yours clean off!” threatens Angus the dwarf.\n\n“Éloigne-toi de ma porte, humain. Il n'y a rien pour vous ici,” says Caroline the dame blanche.\n\n“Nehmen Sie einen weiteren Schritt und ich werde Sie in Stücke kratzen!” yells Hans the kobold.\n\n“Acércate a mí y te echaré un terrible conjuro,” Maria the bruja tells you.\n\n“Vieni dentro umana, il fungo è attraverso questa porta!” declares Monaciello.\n\nSo now, which guard will you approach?\n\n*choice\n  #Solve the riddle.\n    *goto Door\n  #Ask Luna for a hint.\n    *if Door_Hint = 0\n      *set Hints + 1\n    *goto Hint_Door\n  #Eat a magic bean.\n    *if Door_Bean = 0\n      *set Beans + 1\n    *goto Bean_Door\n\n*label Hans\n\nYou start to walk towards the door guarded by Hans the kobold, but as soon as your hand touches the doorknob, the little creature viciously attacks you, pouncing on your leg and biting and scratching you, forcing you to back away. “Hey, get off!” you yell, frantically shaking the kobold off your leg. Once you manage to shake him free, he returns to his post at the door, fixing you with a threatening glare that warns you not to approach him again.\n\n“Ouch!” Luna says sympathetically as she looks over your scratched up leg. “That’s going to hurt tomorrow.”\n\n“It hurts right now,” you assure her.\n\n“Maybe you should be a little more careful with the next door you pick?” Mimic suggests.\n\nAs you circle the room, each of the guards speaks to you in turn.\n\n“Back off ${Laddie_Lassie}! One more step and I’ll chop that pretty wee head of yours clean off!” threatens Angus the dwarf.\n\n“Éloigne-toi de ma porte, humain. Il n'y a rien pour vous ici,” says Caroline the dame blanche.\n\n“Nehmen Sie einen weiteren Schritt und ich werde Sie in Stücke kratzen!” yells Hans the kobold.\n\n“Acércate a mí y te echaré un terrible conjuro,” Maria the bruja tells you.\n\n“Vieni dentro umana, il fungo è attraverso questa porta!” declares Monaciello.\n\nSo now, which guard will you approach?\n\n*choice\n  #Solve the riddle.\n    *goto Door\n  #Ask Luna for a hint.\n    *if Door_Hint = 0\n      *set Hints + 1\n    *goto Hint_Door\n  #Eat a magic bean.\n    *if Door_Bean = 0\n      *set Beans + 1\n    *goto Bean_Door\n\n*label Maria\n\nAs you walk towards Maria, you are literally stopped in your tracks when the bruja pulls some sort of wand from her pocket and waves it at you, freezing you to the spot. “... Well this is just perfect,” you mutter sarcastically under your breath.\n\n“Oh, don’t you worry yourself too much,” says Mimic. “The spell should wear off in a minute or two. In the mean time you could try thinking a little harder about which door you should try to open next.”\n\nAs you wait for the spell to wear off, you look around the room, and each of the guards speaks to you in turn.\n\n“Back off ${Laddie_Lassie}! One more step and I’ll chop that pretty wee head of yours clean off!” threatens Angus the dwarf.\n\n“Éloigne-toi de ma porte, humain. Il n'y a rien pour vous ici,” says Caroline the dame blanche.\n\n“Nehmen Sie einen weiteren Schritt und ich werde Sie in Stücke kratzen!” yells Hans the kobold.\n\n“Acércate a mí y te echaré un terrible conjuro,” Maria the bruja tells you.\n\n“Vieni dentro umana, il fungo è attraverso questa porta!” declares Monaciello.\n\nSo now, which guard will you approach?\n\n*choice\n  #Solve the riddle.\n    *goto Door\n  #Ask Luna for a hint.\n    *if Door_Hint = 0\n      *set Hints + 1\n    *goto Hint_Door\n  #Eat a magic bean.\n    *if Door_Bean = 0\n      *set Beans + 1\n    *goto Bean_Door\n\n*label Monaciello\n*achieve critic\n*set Mushrooms + 1\n*set Mushroom_Medallion 1\n\nAs you approach the door, Monaciello not only allows you to pass but he actually opens the door for you.\n\n“Good work again ${Name}!” Mimic says proudly. “You solved the last riddle! Of course each of the five guards were speaking the language of their country of origin. The dwarf comes from Old English mythology, and so was speaking English. That much was easy to understand.\n\nThe dame blanche is a spirit from French mythology. ‘Éloigne-toi de ma porte, humain. Il n'y a rien pour vous ici,’ is French for, ;Get away from my door, human. There's nothing for you here.’\n\nThe kobold is a creature from German mythology, and ‘Nehmen Sie einen weiteren Schritt und ich werde Sie in Stücke kratzen!’ translates to, ‘Take another step and I will scratch you into pieces!’\n\nBruja is a Spanish word for witch. ‘Acércate a mí y te echaré un terrible conjuro,’ means, ‘Approach me and I will cast a terrible spell on you.’\n\nAnd of course our good friend little Monaciello is a traditional tale from Naples in Italy. ‘Vieni dentro umana, il fungo è attraverso questa porta!’ is Italian for, ‘Come on in human, the mushroom is through this door!’\n\n*page_break\n\n*image Mushroom_Medallion.png\n\nAnd so you’ve solved the final riddle and as promised, you have earned the Mushroom Medallion!” With that, Mimic opens wide the door, revealing a small room in which there is nothing save a single pedestal on which stands an ancient bronze pendant in the form of a giant mushroom, engraved with celtic patterns and hanging from a long chain.\n\n“The Mushroom Medallion!” Luna squeals with joy as she flies over to it. “It’s so shiny.”\n\n“Finally!” Mimic says with a sigh of relief, approaching the pedestal and putting the chain of the medallion around ${His_Her} neck. “Well it was a lot of work solving all those riddles, but I think it was worth it for this, right Luna?”\n\n“Uh... What are you doing?” you ask, raising an eyebrow in confusion. “I’m the one who solved all the riddles. The mushroom’s mine.”\n\n“Oh, you can stop joking around now Mimic.” Luna tells you. “It’s been fun, but it’s time for us to go now.”\n\n“Yeah, come on Luna, let’s go find some more mushrooms,” says Mimic as ${He_She} starts to walk away.\n\n“Hey, wait! I earned that mushroom! Give it back!” you call after Mimic, chasing ${Him_Her} and Luna out of the museum. Annoyingly, you’re forced to follow them around for awhile trying to convince Luna that you are in fact yourself... Until eventually Mimic gets bored of the act, hands you the Mushroom Medallion and heads back to the museum.\n\n*page_break\n*goto_scene Map", "school": "*temp Riddle_P\n*temp P_Hint 0\n*temp P_Bean 0\n*temp Riddle_Katie\n*temp Katie_Hint 0\n*temp Katie_Bean 0\n*temp Riddle_E\n*temp E_Hint 0\n*temp E_Bean 0\n*temp Riddle_Three\n*temp Three_Hint 0\n*temp Three_Bean 0\n*temp Riddle_Thirty\n*temp Thirty_Hint 0\n*temp Thirty_Bean 0\n*temp Riddle_T\n*temp T_Hint 0\n*temp T_Bean 0\n*temp Riddle_Few\n*temp Few_Hint 0\n*temp Few_Bean 0\n*temp Riddle_Pink\n*temp Pink_Hint 0\n*temp Pink_Bean 0\n*temp Riddle_Bookkeeper\n*temp Bookkeeper_Hint 0\n*temp Bookkeeper_Bean 0\n*temp Riddle_Manifest\n*temp Manifest_Hint 0\n*temp Manifest_Bean 0\n\nLuna guides you through the winding streets towards the village’s only school building. “I’m so excited to see my old school!” Luna declares as she flutters around your head. “I had so much fun here! They taught me to fly and glow and balance a spoon on my nose and fold origami dinosaurs and pull a cloth off a table without anything breaking... You know, the important stuff!”\n\nEventually you approach an old stone building with ivy climbing up the walls and a large bell tower at it’s peak. Children of every mythical race you can imagine are all playing in the school yard. For awhile you just stand there and are entertained with sights of two young gnome girls using a basilisk as a skipping rope and a dwarf teacher yelling very angrily at one of the troll children to put him down right now or the troll will be in detention till the end of the school year.\n\n*page_break\n\n“Hmm, is this a human ${Boy_Girl} I see before me?” you hear a voice speak up behind you and turn to see an elderly centaur with a braided grey beard and barely any hair left on his head looking down on you. “Why, I haven’t seen a human in years. Get here through Willow’s portal did you? Well good luck getting back is all I can say. The last human who made it here was bumbling his way around the village for about a month and I don’t even know what happened to him after that.”\n\nThis news does not fill you with a great deal of confidence. Luckily the school bell rings at that moment, distracting you from pondering what unfortunate fate might have befallen the poor man. “Ah, class is about to start,” announces the centaur. “Well, since you’re here, I suppose you should come along with me. I’m Mr Stonehoof, professor of English here at the Academy of Mythical Creatures. I trust you speak English? If not, we do have a very friendly tentacle monster teaching a Japanese class right now.”\n\n“No, no, English is fine!” you quickly assure him.\n\n“Then follow me.” With that, Mr Stonehoof leads you into the school and through a series of winding corridors until you finally reach a classroom full of young mythical beings about your own age, all talking and playing amongst themselves and throwing paper phoenix’s around, one of which hits a harpy girl in the back of the head and immediately catches fire, causing her to scream in panic until she manages to pat it out.\n\n*page_break\n\n“All right, settle down children, settle down,” Mr Stonehoof says, causing all his students to rush to their seats. “Now in case any of you haven’t noticed, we have a new student with us today.” The centaur introduces you as he ushers you to the front of the class. “What was your name, ${Boy_Girl}?”\n\n“Uhh... ${Name} sir,” you reply.\n\n“${Name}... ${Name}. Strange names you humans have,” the old centaur mutters before addressing the class once more. “Well ${Name} here has joined us all the way from the human world, so I want you all to be on your best behaviour. And nobody tease the poor creature if ${He_She} turns out to be a complete moron, most humans usually are.”\n\nThis causes a faint chuckle across the classroom as you take the only empty seat in the class while Luna hovers around beside you, sticking her tongue out at any children laughing at your expense.\n\n*page_break\n\n“All right everyone, let’s start with a quick revision exercise,” Mr Stonehoof declares, “The alphabet! Does everybody here know the alphabet?”\n\n“Yes Mr Stonehoof,” you hear the other students drone in unison.\n\n“Oh! Me, me, me!” Luna calls out excitedly, waving her hand in the air. “This is going to be so easy,” she then whispers to you.\n\n“Well lets see how much you remember. Fern, can you tell me the first letter in the alphabet?” Mr Stonehoof asks, directing his question to a young gnome near the back of the class.\n\n“A sir,” the boy answers, and Mr Stonehoof nods his approval.\n\n“Very good boy. Now Ivy, what is the second letter in the alphabet?” the teacher asks a sprite girl sitting on your left.\n\nThe girl takes a moment to think before giving an answer. “Is it L sir?”\n\nYou have to hold back a snicker when you hear the girl’s answer, but to your surprise, Mr Stonehoof seems quite happy with it. “Yes, L. Well done, smart girl,” this leaves you looking baffled until the centaur turns his attention to you. “Now ${Name}, do you know the third letter in the alphabet?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_P\n    *if (\"$!!{Riddle_P}\" = \"P\") or (choice_randomtest)\n      *goto P\n    *else\n      *goto P_Incorrect\n  #Ask Luna for a hint.\n    *if P_Hint = 0\n      *set Hints + 1\n    *goto Hint_P\n  #Eat a magic bean.\n    *if P_Bean = 0\n      *set Beans + 1\n    *goto Bean_P\n\n*label Hint_P\n*set P_Hint 1\n\n“You should pay more attention,” Luna scolds you. “Remember, the teacher didn’t ask, ‘What’s the third letter OF the alphabet?’ He asked, ‘What’s the third letter IN the alphabet?’ So think about it. A, L, ...”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_P\n    *if (\"$!!{Riddle_P}\" = \"P\") or (choice_randomtest)\n      *goto P\n    *else\n      *goto P_Incorrect\n  #Eat a magic bean.\n    *if P_Bean = 0\n      *set Beans + 1\n    *goto Bean_P\n\n*label Bean_P\n*set P_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]P.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_P\n    *if (\"$!!{Riddle_P}\" = \"P\") or (choice_randomtest)\n      *goto P\n    *else\n      *goto P_Incorrect\n\n*label P_Incorrect\n\nMr Stonehoof shakes his head. “No dear ${Boy_Girl}, I don’t think you were listening.\n\nThe first letter in the alphabet is A. The second is L. What is the third letter in the alphabet?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_P\n    *if (\"$!!{Riddle_P}\" = \"P\") or (choice_randomtest)\n      *goto P\n    *else\n      *goto P_Incorrect\n  #Ask Luna for a hint.\n    *if P_Hint = 0\n      *set Hints + 1\n    *goto Hint_P\n  #Eat a magic bean.\n    *if P_Bean = 0\n      *set Beans + 1\n    *goto Bean_P\n\n*label P\n\nMr Stonehoof claps his hands together at your answer. “Yes, very well done human. The third letter of the word ‘Alphabet’ is P. You’d be shocked how many humans get that wrong. It’s refreshing to see an intelligent young mortal like you that can think outside the box. So now we know that you know the alphabet, let’s find out how well you speak alphabet.”\n\nYou stare at your centaur teacher in utter confusion. “I don’t understand what you mean sir.”\n\n“The language,” Mr Stonehoof says as if that should explain everything. When you do not respond he seems surprised. “... You know, alphabet language? Letters, numbers? Please tell me they at least teach you basic alphabet in those human schools?” You shake your head at this, causing Mr Stonehoof to sigh and rub his temples in frustration. “All right, not to worry, it’s the easiest language to learn, I’m sure you’ll pick it up soon enough. You just need a demonstration.” With that, your teacher’s eyes scan the classroom until they settle on two fawn children, one male and one female, sitting next to each other. “Elsie, Juan, you both speak fluent alphabet, don’t you? Well come up to the front, I want you both to have a conversation and ${Mr_Miss} ${Name} here can translate.”\n\nWhile the faun children move to stand in front of the class, Mr Stonehoof explains what he expects you to do. “Now you listen carefully to everything that Elsie and Juan say. Repeat everything out loud if you have trouble understanding it. Once they’ve finished, I’ll ask you a question to see how much you understand.”\n\n*page_break\n\nWith that brief explanation out of the way, the two fauns begin their conversation and surely enough, the both actually start communicating with the alphabet.\n\n“L O L C,” says Juan.\n\n“I M A P 2 C U 1,” says Elsie.\n\n“R U O K 2 D?” asks Juan.\n\n“S I M, 10 Q,” replies Elsie. “A 1, U C N D 2 D?” she asks.\n\n“N D S L 2 D. Y?” Juan asks.\n\n“K T Z N D S A Q T!” Elsie says excitedly with a little giggle.\n\n“N D Z E S 2 B C 2 C K T,” Juan tells her.\n\n“O, O K. 10 Q 1,” Elsie says regretfully, and with that the two fauns both return to their seats.\n\n“All right, I hope you paid close attention,” Mr Stonehoof tells you. “Now remember, this is a translation, so I’d like you to answer the question in English rather than in alphabet, do you understand?” You nod your head, but you doubt you’ll understand the actual question itself. “Very good, now answer me this human. According to what Elsie and Juan just said... Which of their classmates has a crush on a boy called Andy?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Katie\n    *if (\"$!!{Riddle_Katie}\" = \"KATIE\") or (choice_randomtest)\n      *goto Katie\n    *if (\"$!!{Riddle_Katie}\" = \"KATY\")\n      *goto Katie\n    *else\n      *goto Katie_Incorrect\n  #Ask Luna for a hint.\n    *if Katie_Hint = 0\n      *set Hints + 1\n    *goto Hint_Katie\n  #Eat a magic bean.\n    *if Katie_Bean = 0\n      *set Beans + 1\n    *goto Bean_Katie\n\n*label Hint_Katie\n*set Katie_Hint 1\n\n“Oh don’t worry, I was really good at alphabet in school, U C?” Luna declares excitedly. “I’m sure you’ll pick it up real quick. Now remember what Mr Stonehoof said, if you’re having trouble understanding what they said, just repeat it out loud.\n\nFirst Juan said, ‘L O L C.’\n\nThen Elsie said, ‘I M A P 2 C U 1.’\n\nJuan asked, ‘R U O K 2 D?’ ... You understand?”\n\nYou’re still just as confused as before, but Luna won’t give up on you that easily. “Come on, you can do this!” she encourages you. “Let’s go over it one more time.\n\nFirst Juan said, ‘Hello Elsie.’\n\nThen Elsie said, ‘I am happy to see you Juan.’\n\nJuan asked, ‘Are you okay today?’”\n\n“Hang on,” you pause Luna, “I can understand you this time!”\n\n“There, you see, I told you you’d pick it up!” Luna says excitedly. “Try the rest on your own and see if you can figure it out.\n\n“L O L C,” said Juan.\n\n“I M A P 2 C U 1,” said Elsie.\n\n“R U O K 2 D?” asked Juan.\n\n“S I M, 10 Q,” replied Elsie. “A 1, U C N D 2 D?” She asked.\n\n“N D S L 2 D. Y?” Juan asked.\n\n“K T Z N D S A Q T!” Elsie said excitedly with a little giggle.\n\n“N D Z E S 2 B C 2 C K T,” Juan told her.\n\n“O, O K. 10 Q 1,” Elsie said regretfully, and with that the two fauns both returned to their seats.\n\nAccording to what Elsie and Juan just said... Which of their classmates has a crush on a boy called Andy?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Katie\n    *if (\"$!!{Riddle_Katie}\" = \"KATIE\") or (choice_randomtest)\n      *goto Katie\n    *if (\"$!!{Riddle_Katie}\" = \"KATY\")\n      *goto Katie\n    *else\n      *goto Katie_Incorrect\n  #Eat a magic bean.\n    *if Katie_Bean = 0\n      *set Beans + 1\n    *goto Bean_Katie\n\n*label Bean_Katie\n*set Katie_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Katie.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Katie\n    *if (\"$!!{Riddle_Katie}\" = \"KATIE\") or (choice_randomtest)\n      *goto Katie\n    *if (\"$!!{Riddle_Katie}\" = \"KATY\")\n      *goto Katie\n    *else\n      *goto Katie_Incorrect\n\n*label Katie_Incorrect\n\nMr Stonehoof shakes his head. “Oh dear, I’d forgotten how slow humans are,” he says with a heavy sigh. “All right, Elsie, Juan, can you repeat the conversation again please?”\n\nThe two fauns look rather annoyed about this, but make their way to the front of the class to repeat the conversation anyway.\n\n“L O L C,” says Juan.\n\n“I M A P 2 C U 1,” says Elsie.\n\n“R U O K 2 D?” asks Juan.\n\n“S I M, 10 Q,” replies Elsie. “A 1, U C N D 2 D?” She asks.\n\n“N D S L 2 D. Y?” Juan asks.\n\n“K T Z N D S A Q T!” Elsie says excitedly with a little giggle.\n\n“N D Z E S 2 B C 2 C K T,” Juan tells her.\n\n“O, O K. 10 Q 1,” Elsie says regretfully, and once more the two fauns both return to their seats.\n\n“Now try again, and remember to answer in English, not in alphabet,” Mr Stonehoof encourages you. “Which of their classmates has a crush on a boy called Andy?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Katie\n    *if (\"$!!{Riddle_Katie}\" = \"KATIE\") or (choice_randomtest)\n      *goto Katie\n    *if (\"$!!{Riddle_Katie}\" = \"KATY\")\n      *goto Katie\n    *else\n      *goto Katie_Incorrect\n  #Ask Luna for a hint.\n    *if Katie_Hint = 0\n      *set Hints + 1\n    *goto Hint_Katie\n  #Eat a magic bean.\n    *if Katie_Bean = 0\n      *set Beans + 1\n    *goto Bean_Katie\n\n*label Katie\n\nMr Stonehoof nods his head in approval. “Very good human. Very, very good. I’m impressed how quickly you picked up the language, then again it is an extremely easy language to learn. It is after all simply the English language spoken in the form of letters and numbers. Now I think a full translation is in order before we move on, to make sure you understood the whole thing.\n\n‘L O L C,’ said Juan, of course meaning, ‘Hello Elsie.’\n\n‘I M A P 2 C U 1,’ said Elsie, ‘I am happy to see you Juan.’\n\n‘R U O K 2 D?’ asked Juan, meaning, ‘Are you okay today?’\n\n‘S I M, 10 Q,’ or, ‘Yes I am thank you,’ replied Elsie.\n\nThen she asked, ‘A 1, U C N D 2 D?’ meaning, ‘Hey Juan, You see Andy today?’\n\nJuan said, ‘N D S L 2 D. Y?’ which means, ‘Andy is ill today. Why?’\n\nThen Elsie announced that, ‘K T Z N D S A Q T!’ or, ‘Katie said Andy is a cutie!’\n\n‘N D Z E S 2 B C 2 C K T,’ said Juan, meaning, ‘Andy said he is too busy to see Katie.’\n\nDisappointed, Elsie said, ‘O, O K. 10 Q 1,’ which of course means, ‘Oh, okay. Thank you Juan.’ And the conversation ended there.\n\n*page_break\n\nSo, from that we can all understand that little Katie the jackalope is quite taken with Andy the wolpertinger. Unfortunately he’s clearly not interested, so poor Katie will have to find somebody else to pass love notes to under the desk. Sorry dear, better luck next time.”\n\nWith that, the whole classroom erupts with laughter as they start to torment a poor rabbit-like creature with antelope horns who is hiding her head in shame. “Katie and Andy sitting in a tree, K-I-S-S-I-N-G! First comes love, then comes marriage, then comes a baby in a...”\n\nThe children’s chanting is cut short when Mr Stonehoof interrupts them. “Now children, do not be so ridiculous! You should all know better!” he objects, quite crossly. “... Jackalopes breed like mad. There would be at least twelve babies in that carriage.”\n\nWith this, the children all mutter their agreement and modify the song to put twelve babies in the baby carriage until little Katie loses her temper and, with her extremely sharp teeth, latches on to the tail of a manticore boy that was tormenting her. The manticore then proceeds to run around the classroom, waving his tail around frantically and wailing in pain as he tries to shake the jackalope off.\n\nMr Stonehoof sighs and shakes his head. “Leo, what have I told you about provoking jackalopes? Their teeth are razor sharp you know, I’m surprised she hasn’t bitten your tail clean off. Go on, to the nurse with you.” That said, the poor manticore heads out of the classroom sobbing quietly to himself with Katie still attached to his tail.\n\n*page_break\n\n“Now, with that out of the way, I think we have time for one more exercise before your next class.” Saying that, the old centaur moves to pick up a piece of chalk and starts to write away on a large chalk board. “I’m going to write down a paragraph for you, and I want you all to figure out what’s special about it.”\n\nMr Stonehoof then proceeds to write the following paragraph down on the chalkboard:\n\nFirst you should know that this is a most unusual paragraph. How quickly can you find out what is so unusual about it? It looks so ordinary, you would think nothing was wrong with it, and in fact, nothing is wrong with it. It is unusual though, but why? Look at it, study it, think about it, and you may find out. This is not a trick, in truth it is actually straightforward. Try to work it out on your own and soon it will dawn on you. What is missing from this paragraph? Good luck. I know you can do it.\n\nOnce he has finished writing, Mr Stonehoof gives you all a couple of minutes to try and solve the puzzle. “All right, who’s figured it out yet?” he asks, to which most of the students raise their hands. Unfortunately, being the only human student that Mr Stonehoof has taught in a long time, he only seems concerned with your answer. “We’ll give ${Name} a try again, shall we?” And all the other students groan in annoyance and put their hands down. “Well ${Boy_Girl}, do you see anything unusual about the paragraph? Have a close look. Read it over as many times as you like until you have an answer.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_E\n    *if (\"$!!{Riddle_E}\" = \"E\") or (choice_randomtest)\n      *goto E\n    *else\n      *goto E_Incorrect\n  #Ask Luna for a hint.\n    *if E_Hint = 0\n      *set Hints + 1\n    *goto Hint_E\n  #Eat a magic bean.\n    *if E_Bean = 0\n      *set Beans + 1\n    *goto Bean_E\n\n*label Hint_E\n*set E_Hint 1\n\nLuna studies the paragraph for awhile but unfortunately she looks just as puzzled as you are. “I’m not sure,” she admits, “but Mr Stonehoof has been teaching us about the alphabet all lesson. Maybe the answer is something to do with the alphabet? A letter perhaps? A letter you’d usually see in a paragraph so long. Let’s look at it again,” she suggests and you both turn back to the chalkboard.\n\nFirst you should know that this is a most unusual paragraph. How quickly can you find out what is so unusual about it? It looks so ordinary, you would think nothing was wrong with it, and in fact, nothing is wrong with it. It is unusual though, but why? Look at it, study it, think about it, and you may find out. This is not a trick, in truth it is actually straightforward. Try to work it out on your own and soon it will dawn on you. What is missing from this paragraph? Good luck. I know you can do it.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_E\n    *if (\"$!!{Riddle_E}\" = \"E\") or (choice_randomtest)\n      *goto E\n    *else\n      *goto E_Incorrect\n  #Eat a magic bean.\n    *if E_Bean = 0\n      *set Beans + 1\n    *goto Bean_E\n\n*label Bean_E\n*set E_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]E.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_E\n    *if (\"$!!{Riddle_E}\" = \"E\") or (choice_randomtest)\n      *goto E\n    *else\n      *goto E_Incorrect\n\n*label E_Incorrect\n\n“Oh dear, and you were doing so well,” Mr Stonehoof grumbles to himself. “No child, that’s not the right answer. Have another look. Go on, look carefully, I’m sure you can get this. I have faith in you, I really do. You do seem ever so lightly less of a drooling simpleton than your average human.”\n\nAssuming that was intended as a compliment, you look back to the chalkboard and read the paragraph again, trying to find the right answer.\n\nFirst you should know that this is a most unusual paragraph. How quickly can you find out what is so unusual about it? It looks so ordinary, you would think nothing was wrong with it, and in fact, nothing is wrong with it. It is unusual though, but why? Look at it, study it, think about it, and you may find out. This is not a trick, in truth it is actually straightforward. Try to work it out on your own and soon it will dawn on you. What is missing from this paragraph? Good luck. I know you can do it.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_E\n    *if (\"$!!{Riddle_E}\" = \"E\") or (choice_randomtest)\n      *goto E\n    *else\n      *goto E_Incorrect\n  #Ask Luna for a hint.\n    *if E_Hint = 0\n      *set Hints + 1\n    *goto Hint_E\n  #Eat a magic bean.\n    *if E_Bean = 0\n      *set Beans + 1\n    *goto Bean_E\n\n*label E\n\nWhen once again you produce the right answer, Mr Stonehoof gives a little chuckle of surprise. “Well ${Boy_Girl}, you’ve done it again, and I must say I’m impressed. Most humans cannot think outside their tiny boxes of sense and logic, but you can see things the way we do. Very well done indeed.” Shortly after this is said, you hear the school bell ringing once more. “Ah, is that the time already? Well off you go children. Come on, off you go. It’s time for maths class.”\n\nRight now the rest of your classmates are all getting up to leave, and not knowing where to go, you simply follow the rest of them, trying your best not to get trodden underfoot by any trolls, golems or giants. Eventually your class comes to a stop and all seem to be staring intently at a tiny door at the bottom of the wall, far too small for you to fit through. This is explained when a pixie woman comes to open it.\n\n“Ah, there you all are. I was wondering what was keeping you. Well, come on children, everybody come on in!” your new teacher announces, opening the door wide. Some of the smaller, fairy related creatures manage to fit through the door, along with a few mythical rodents and insects, but the rest of you just have to sit there in the corridor and observe the lesson through the open doorway. Even Luna flies inside, presumably forgetting that she’s supposed to be helping you.\n\n“Oh, you must be the new ${Boy_Girl},” your teacher says as she flutters out of the door to introduce herself. “I’m Miss Merryweather. Very pleased to meet you.” Your teacher then extends her hand towards you, presumably asking for a handshake, but your hands are so large in comparison to hers that when you awkwardly offer her your hand, she can only take hold of your smallest finger and, with what seems to be all her strength, very faintly shakes it up and down.\n\n*page_break\n\n“All right class, I hope you’ve all done your homework on telling time. Now let’s pick up where we left off last lesson. We’ll start with a few quick additions and subtractions,” Miss Merryweather says as she flutters back into her classroom so that you can only see her through the tiny door, between the shoulders of several other students too big to fit in the room. “Now, everyone together, what is 1 + 1?”\n\n“2!” your classmates all answer in unison.\n\n“Very good. And what is 5 - 2?” Miss Merryweather asks.\n\n“3!” the students all reply.\n\nMiss Merryweather nods her head. “And what is 3 + 4.”\n\n“7,” you reply along with the rest of the students. Well at least this lesson is simple enough. That is, until you get to the next question.\n\n“What is 9 + 7?” Miss Merryweather asks.\n\nYou are about to answer 16, but stop yourself when you hear the rest of the students calling out, “4!”\n\n“Very good children,” Miss Merryweather assures them. “Now what is 1 - 1?”\n\n“12!” your classmates reply.\n\n“And what is 6 - 8?” the teacher asks.\n\n“10!” is the unanimous answer.\n\nRight now you’re completely lost and not even trying to answer the questions along with the other students. Unfortunately, the little pixie notices this. “Human ${Boy_Girl}, I don’t hear you answering,” she scolds you. “Everyone quite down, let’s let our friend answer this next question on ${His_Her} own. Now tell me dear, what is 10 + 5?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Three\n    *if (\"$!!{Riddle_Three}\" = \"3\") or (choice_randomtest)\n      *goto Three\n    *else\n      *goto Three_Incorrect\n  #Ask Luna for a hint.\n    *if Three_Hint = 0\n      *set Hints + 1\n    *goto Hint_Three\n  #Eat a magic bean.\n    *if Three_Bean = 0\n      *set Beans + 1\n    *goto Bean_Three\n\n*label Hint_Three\n*set Three_Hint 1\n\n“Oh don’t worry, this one’s very simple,” Luna reassure you as she comes over to the tiny classroom door so you can see her. “You just need to think about the answers.\n\n1 + 1 = 2.\n*line_break\n5 - 2 = 3.\n*line_break\n3 + 4 = 7.\n\nThat all sounds right, doesn’t it? But on the other hand...\n\n9 + 7 = 4.\n*line_break\n1 - 1 = 12.\n*line_break\n6 - 8 = 10.\n\nNow that you know all that, the question should be easy!” Luna tells you. “And if you’re still finding the lesson a bit tricky, remember, Miss Merryweather gave everybody all homework about telling time, and she said she wanted to pick up where they left off last lesson... So, that means today’s lesson probably has something to do with telling time.”\n\nWhat is 10 + 5?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Three\n    *if (\"$!!{Riddle_Three}\" = \"3\") or (choice_randomtest)\n      *goto Three\n    *else\n      *goto Three_Incorrect\n  #Eat a magic bean.\n    *if Three_Bean = 0\n      *set Beans + 1\n    *goto Bean_Three\n\n*label Bean_Three\n*set Three_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]3.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Three\n    *if (\"$!!{Riddle_Three}\" = \"3\") or (choice_randomtest)\n      *goto Three\n    *else\n      *goto Three_Incorrect\n\n*label Three_Incorrect\n\nMiss Merryweather gives you rather sympathetic look, then talks to you slowly, suggesting she thinks you’re a very simple-minded child. “No dear, let’s try that again. Remember:\n\n1 + 1 = 2.\n*line_break\n5 - 2 = 3.\n*line_break\n3 + 4 = 7.\n*line_break\n9 + 7 = 4.\n*line_break\n1 - 1 = 12.\n*line_break\n6 - 8 = 10.\n\nSo now that you know all that, what is 10 + 5?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Three\n    *if (\"$!!{Riddle_Three}\" = \"3\") or (choice_randomtest)\n      *goto Three\n    *else\n      *goto Three_Incorrect\n  #Ask Luna for a hint.\n    *if Three_Hint = 0\n      *set Hints + 1\n    *goto Hint_Three\n  #Eat a magic bean.\n    *if Three_Bean = 0\n      *set Beans + 1\n    *goto Bean_Three\n\n*label Three\n\n“That’s right, 3!” Miss Merryweather announces with a smile, looking quite pleased with you. “You are a bright ${Boy_Girl}. Your human school must’ve already taught you how to tell time. Of course, if it’s 10 o’clock and you add 5 hours, that’s 3 o’clock. Now let’s try a number pattern. I’ll write a series of numbers down on the board, and you see if you can tell me what’s the next number in the pattern.”\n\nThe pixie struggles to lift the chalk, which is almost as large as she is, but eventually she’s in the air and writing on the board. These are the numbers she writes:\n\n31, 28/29, 31, 30, 31, _\n\n“All right, hands up if you can guess the next number in the sequence.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Thirty\n    *if (\"$!!{Riddle_Thirty}\" = \"30\") or (choice_randomtest)\n      *goto Thirty\n    *else\n      *goto Thirty_Incorrect\n  #Ask Luna for a hint.\n    *if Thirty_Hint = 0\n      *set Hints + 1\n    *goto Hint_Thirty\n  #Eat a magic bean.\n    *if Thirty_Bean = 0\n      *set Beans + 1\n    *goto Bean_Thirty\n\n*label Hint_Thirty\n*set Thirty_Hint 1\n\nLuna studies the pattern for a bit. “I’m not really sure,” she admits. “But Miss Merryweather is teaching about telling time today, so maybe this has something to do with time too. I don’t think it has anything to do with hours on a clock, but there are other types of time. There’s seconds, minutes, days, weeks, months, years... Maybe it’s something to do with one of those.”\n\nTaking this into account, you look at the numbers again and try to guess the missing number in the sequence.\n\n31, 28/29, 31, 30, 31, _\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Thirty\n    *if (\"$!!{Riddle_Thirty}\" = \"30\") or (choice_randomtest)\n      *goto Thirty\n    *else\n      *goto Thirty_Incorrect\n  #Eat a magic bean.\n    *if Thirty_Bean = 0\n      *set Beans + 1\n    *goto Bean_Thirty\n\n*label Bean_Thirty\n*set Thirty_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]30.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Thirty\n    *if (\"$!!{Riddle_Thirty}\" = \"30\") or (choice_randomtest)\n      *goto Thirty\n    *else\n      *goto Thirty_Incorrect\n\n*label Thirty_Incorrect\n\nMiss Merryweather shakes her head, “No, no, that’s not right dear. Have another go. Look at the numbers and try to figure out the next number in the sequence.”\n\n31, 28/29, 31, 30, 31, _\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Thirty\n    *if (\"$!!{Riddle_Thirty}\" = \"30\") or (choice_randomtest)\n      *goto Thirty\n    *else\n      *goto Thirty_Incorrect\n  #Ask Luna for a hint.\n    *if Thirty_Hint = 0\n      *set Hints + 1\n    *goto Hint_Thirty\n  #Eat a magic bean.\n    *if Thirty_Bean = 0\n      *set Beans + 1\n    *goto Bean_Thirty\n\n*label Thirty\n\n“Right again!” Miss Merryweather says cheerfully. “Of course you understand, the numbers are the days of the months in the year. 31 in January, 28 or 29 in February, 31 in March, 30 in April, 31 in May, and they are all followed by 30 days in June. You’re doing very well human. Let’s try one more sequence, shall we?”\n\nWith that, your maths teacher erases the numbers she had written on the board and replaces them with a series of letters.\n\nO T T F F S S E N _\n\n“Now, who here knows, what is the next letter in the sequence?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_T\n    *if (\"$!!{Riddle_T}\" = \"T\") or (choice_randomtest)\n      *goto T\n    *else\n      *goto T_Incorrect\n  #Ask Luna for a hint.\n    *if T_Hint = 0\n      *set Hints + 1\n    *goto Hint_T\n  #Eat a magic bean.\n    *if T_Bean = 0\n      *set Beans + 1\n    *goto Bean_T\n\n*label Hint_T\n*set T_Hint 1\n\n“Well this doesn’t look right,” Luna says, sounding quite confused. “This is supposed to be a maths class. The questions should all be numbers, not letters! Why aren’t there numbers on the board?” After grumpily muttering this to herself, Luna takes a look at the question again and seems to come to some kind of realization. “Hmm... Maybe there are numbers on the board after all.”\n\nO T T F F S S E N _\n\nWhat is the next letter in the sequence?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_T\n    *if (\"$!!{Riddle_T}\" = \"T\") or (choice_randomtest)\n      *goto T\n    *else\n      *goto T_Incorrect\n  #Eat a magic bean.\n    *if T_Bean = 0\n      *set Beans + 1\n    *goto Bean_T\n\n*label Bean_T\n*set T_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]T.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_T\n    *if (\"$!!{Riddle_T}\" = \"T\") or (choice_randomtest)\n      *goto T\n    *else\n      *goto T_Incorrect\n\n*label T_Incorrect\n\n“Oh dear, we’re going to be here awhile aren’t we?” Miss Merryweather mutters to herself. “I’m sure you can do better dear, it’s a very simple maths question. Try again. Think about it very hard and tell me, what’s the next letter in the sequence.”\n\nO T T F F S S E N _\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_T\n    *if (\"$!!{Riddle_T}\" = \"T\") or (choice_randomtest)\n      *goto T\n    *else\n      *goto T_Incorrect\n  #Ask Luna for a hint.\n    *if T_Hint = 0\n      *set Hints + 1\n    *goto Hint_T\n  #Eat a magic bean.\n    *if T_Bean = 0\n      *set Beans + 1\n    *goto Bean_T\n\n*label T\n\nMiss Merryweather claps her hands excitedly together when you answer the question. “Yes, yes, T!” she cheers happily. “You figured out that the letters were numbers all by yourself! Of course the O is for One, T for Two, the next T for Three, F for Four and so on, until at the end you have T for Ten.”\n\nJust then, you hear the school bell ring once more, signifying that the lesson is over. “All right everyone, off to lunch with you all! Have fun!” Mrs Honeysuckle dismisses you all.\n\n“Wow, all this riddle solving is hard work,” Luna tells you. “I think we’ve earned a nice, big lunch. Come on!” she says before guiding you to the school canteen.\n\nOnce you get there though, you suddenly feel considerably less hungry. While you’re more used to seeing sandwiches, crisps and fruit as lunchtime snacks, the menu at this school contains a far less appetising selection. Your choices include a tray full of grass, a basket full of raw fish, and what appears to be an assortment of live insects, very popular with the phoenixes and griffins. In the end you only take a glass of water and a bowl of assorted nuts and berries. Sitting down, you sort through your meagre lunch, nervously tasting the few that you actually think might be edible and passing the rest to Luna, who seems happy to eat anything regardless of whether it might be poisonous or not.\n\n*page_break\n\n“You’re the human ${Boy_Girl}, aren’t you?” you hear a rather ominous voice and turn to see a tall boy with the tail and horns of a bull looming over you.\n\n\"Awh, a minotaur!\" Luna declares with excitement. \"Must be a Greek exchange student.\"\n\n“Heard you’re supposed to be really smart,” the boy says with an angry scowl.\n\n“Oh he is,” says Elsie the fawn as she takes a seat opposite you.\n\n“He answered all of Mr Stonehoof’s questions, and Mrs Honeysuckle’s too,” Juan adds as he takes up a seat next to her.\n\nThe minotaur scoffs quite cruelly at this. “You’re pulling my tail. No way a human could be smart. My Dad says their brains are all mushy from sense and logic and rules and stuff.”\n\n“$!{His_Her} brain’s not mushy!” Luna objects on your behalf. “${Name} is a special human. $!{He_She} knows how to think outside the box!”\n\n“What box?” asks the minotaur.\n\n“I don’t know,” Luna admits. “Mr Stonehoof said something about it. I think most humans keep their brains in boxes... So they don’t lose them I guess.”\n\n“Wow!” Elsie exclaims in surprise, sounding quite impressed.\n\n“I never would’ve thought of that,” said Juan. “Humans must be smarter than I thought if they take such good care of their brains.”\n\n*page_break\n\n“No way!” insists the minotaur. “I bet ${He_She}’s not so smart.”\n\n“$!{He_She} is!” Luna yells, quite frustrated by now.\n\n“Prove it then!” the minotaur dares you as he sits himself down by your side. “Here’s a riddle that no dummy could solve;\n\nI know a word of letters three. Add two, and fewer there will be!”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Few\n    *if (\"$!!{Riddle_Few}\" = \"FEW\") or (choice_randomtest)\n      *goto Few\n    *else\n      *goto Few_Incorrect\n  #Ask Luna for a hint.\n    *if Few_Hint = 0\n      *set Hints + 1\n    *goto Hint_Few\n  #Eat a magic bean.\n    *if Few_Bean = 0\n      *set Beans + 1\n    *goto Bean_Few\n\n*label Hint_Few\n*set Few_Hint 1\n\n“So it’s a word with three letters. You add two letters and you get fewer... That’s not possible is it?” Luna asks. “I mean if you add something there should be more, not less. So you can’t add two letters and get fewer... Unless he’s talking about the word fewer. A three letter word where, if you add two more letters, you’ll get the word fewer... Now what word could that be?”\n\nI know a word of letters three. Add two and fewer there will be.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Few\n    *if (\"$!!{Riddle_Few}\" = \"FEW\") or (choice_randomtest)\n      *goto Few\n    *else\n      *goto Few_Incorrect\n  #Eat a magic bean.\n    *if Few_Bean = 0\n      *set Beans + 1\n    *goto Bean_Few\n\n*label Bean_Few\n*set Few_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Few.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Few\n    *if (\"$!!{Riddle_Few}\" = \"FEW\") or (choice_randomtest)\n      *goto Few\n    *else\n      *goto Few_Incorrect\n\n*label Few_Incorrect\n\nWhen you give your answer, the minotaur simply laughs in your face. “See, I told you ${He_She} was stupid!” he says to the fauns.\n\n“No ${He_She}’s not!” Luna snaps angrily, she then turns to you and lowers her voice. “Come on, I know you can do it. Try again.”\n\nI know a word of letters three. Add two, and fewer there will be.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Few\n    *if (\"$!!{Riddle_Few}\" = \"FEW\") or (choice_randomtest)\n      *goto Few\n    *else\n      *goto Few_Incorrect\n  #Ask Luna for a hint.\n    *if Few_Hint = 0\n      *set Hints + 1\n    *goto Hint_Few\n  #Eat a magic bean.\n    *if Few_Bean = 0\n      *set Beans + 1\n    *goto Bean_Few\n\n*label Few\n\nThe minotaur leans his elbows on the table and looks very sulky. “Yeah, that’s right,” he begrudgingly admits. “Few is a three letter word and if you add E and R, you get the word fewer. Sorry for calling you stupid I guess. You’re not so dumb after all.”\n\nThe bell rings once more and your classmates all get up out of their seats. “Come on then!” Elsie the faun calls to you. “You don’t want to be late for our first ever tech class!”\n\nYou’re quite surprised to hear that they would still have tech class in a fantasy school. You wouldn’t have even thought they’d have computers. When you arrive at your next classroom though, you find that you were absolutely right. There are no computers at all. What you have instead is a cardboard box with a big black square coloured in the middle to look like a screen. In front of this, you have what looks like a cereal box with numbers and letters drawn on, to make it look like a keyboard. You sit down in front of this childish invention with absolutely no idea what you’re expected to do with it.\n\n“Good afternoon class!” You hear your newest teacher say, but when you turn to see him, you’re in for quite a shock! What you see before you is a short, green creature with big black eyes, and a long, pointed head.\n\n“No way,” you mutter under your breath. “Is that an alien?”\n\n*page_break\n\n“It’s nice to meet you all, I’m your new tech teacher. I’d introduce myself, but I’m afraid that speaking my name in my own language would cause all of your eardrums to burst. Now I’m sure you children must all be very excited for this class. Of course, all your other teachers are creatures of ancient mythology, still stuck in the dark ages of magic and mystery. But I’m here to change all that!” your teacher says rather proudly. “As a creature of science-fiction, I felt it my duty to study the art of human science, and as you can see, I have faithfully recreated a modern miracle of human technology!”\n\n“Wow!” the other humans all gasp in wonder as they stare intently at their cardboard computers.\n\n“What does it do?” asks a little elven girl.\n\n“Haven’t the foggiest,” your teacher replies. “But humans seem to enjoy pressing those buttons a lot,” he says, pointing to the cardboard keyboards. “Now, I have a very simple exercise for you all. Using the buttons on these machines, I’d like you all to write something about yourself. Just something simple. Say for instance, your name, how old you are and your favourite colour. Do you think you can all do that?”\n\n“Yes sir!” the other students reply enthusiastically and start pushing down at the letters on their cereal boxes and getting very frustrated when they don’t seem to do anything. In the end they all give up and just write down their assignments on paper. You do the same.\n\n*page_break\n\n“Very good children, very good,” your teacher says as he starts collecting your work in. “Oh dear, this doesn’t look right,” he comments as he takes the paper from a young cyclops. “Grom, you really need to get your eye tested, I can’t make sense of this at all.”\n\nSpotting you for the first time, the alien approaches, holding out the piece of paper. “Oh good, a human. You’ll know how these human contraptions work. Here, take a look at this paper and try to figure out what Grom is saying. I can’t make heads or tails of it. What does he say his favourite colour is?”\n\nYou have a look at the paper, but whatever Grom has written is impossible to read. For starters, the cyclops blurred vision means that he hasn’t actually written on the lines of the paper, instead he’s written above the lines and slightly to the left. That aside, the strange jumble of letters and numbers he’s written do not make any sense at all.\n\nY3oo9 j6 hqj3 8w T49jk * qj 53h 63q4w 9oe qhe j6 rqf974853 d9o974 8w 08hil\n\nNot a thing about this makes sense, but somehow from all this mess, you have to figure out what Grom’s favourite colour is.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Pink\n    *if (\"$!!{Riddle_Pink}\" = \"PINK\") or (choice_randomtest)\n      *goto Pink\n    *else\n      *goto Pink_Incorrect\n  #Ask Luna for a hint.\n    *if Pink_Hint = 0\n      *set Hints + 1\n    *goto Hint_Pink\n  #Eat a magic bean.\n    *if Pink_Bean = 0\n      *set Beans + 1\n    *goto Bean_Pink\n\n*label Hint_Pink\n*set Pink_Hint 1\n\nLuna flutters over your shoulder to look at the paper. “Well that doesn’t look like any language I’ve ever seen,” she comments. “But I suppose poor Grom’s eyesight isn’t so good, and this his first time using one of your human computers. Maybe he just pushed the wrong buttons by mistake.”\n\nThat idea makes no sense considering Grom wrote the assignment on paper and didn’t use the cardboard computer at all. Still, you suppose it makes no less sense than anything else in this crazy, magical world.\n\nYou look at the paper again and try to find out Grom’s favourite colour.\n\nY3oo9 j6 hqj3 8w T49jk * qj 53h 63q4w 9oe qhe j6 rqf974853 d9o974 8w 08hil\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Pink\n    *if (\"$!!{Riddle_Pink}\" = \"PINK\") or (choice_randomtest)\n      *goto Pink\n    *else\n      *goto Pink_Incorrect\n  #Eat a magic bean.\n    *if Pink_Bean = 0\n      *set Beans + 1\n    *goto Bean_Pink\n\n*label Bean_Pink\n*set Pink_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Pink.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Pink\n    *if (\"$!!{Riddle_Pink}\" = \"PINK\") or (choice_randomtest)\n      *goto Pink\n    *else\n      *goto Pink_Incorrect\n\n*label Pink_Incorrect\n\nThe alien looks at the paper again. “Hmm, I don’t think that’s right. Are you sure? Look again, I think you’ll find Grom’s favourite colour is something else.”\n\nY3oo9 j6 hqj3 8w T49jk * qj 53h 63q4w 9oe qhe j6 rqf974853 d9o974 8w 08hil\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Pink\n    *if (\"$!!{Riddle_Pink}\" = \"PINK\") or (choice_randomtest)\n      *goto Pink\n    *else\n      *goto Pink_Incorrect\n  #Ask Luna for a hint.\n    *if Pink_Hint = 0\n      *set Hints + 1\n    *goto Hint_Pink\n  #Eat a magic bean.\n    *if Pink_Bean = 0\n      *set Beans + 1\n    *goto Bean_Pink\n\n*label Pink\n\nThe alien looks once more at the paper before seeming to realize something. “Ah! I see now. Where poor Grom’s vision isn’t quite right, he’s been accidentally pressing the wrong buttons on the keyboard. All the buttons he’s pressed are above and slightly left of the keys he meant to press, so if he meant to type A, he would instead have typed Q and so forth.” With this information, your teacher compares the piece of paper to the keyboard. “So now we know all this, ‘Y3oo9 j6 hqj3 8w T49jk * qj 53h 63q4w 9oe qhe j6 rqf974853 d9o974 8w 08hil’ becomes, ‘Hello my name is Grom, I am ten years old and my favourite colour is pink.’ Is that right Grom?”\n\nThe cyclops nods his head. “Pink is pretty,” he replies.\n\n“It certainly is,” says your teacher. Once more, the school bell rings, signifying the end of that particularly short lesson. “All right everyone, time to go home!” the alien calls out, which gets Luna very excited.\n\n“Yey, home time!” she cheers happily. “Can we go to the park and swing on the monkey bars on the way home? Please, please please!” she begs you.\n\n“Wait, no, we can’t go home now,” you insist. “I haven’t found the mushroom yet.”\n\n“Now remember everybody, this is the last day you can enter Mr Stonehoof’s crossword competition, so if you want a chance to win the Toadstool Trophy, you’ll need to hand in your entries today,” says the alien.\n\n*page_break\n\n“Wait, Toadstool Trophy?” you ask the teacher, suddenly feeling far more optimistic about your chances of leaving here with an enchanted mushroom. “How do I enter?”\n\n\"Well, you’d have to go and get the crossword from the library, then you fill it in and give it to Mr Stonehoof,” the alien tells you.\n\n“Thank you!” you call to the teacher before turning back to Luna. “Where’s the library?”\n\n“This way!” she declares happily and starts to fly off, forcing you to run at full speed just to catch up with her. As you run, Luna leads you through the corridors and right out of the building.\n\n“Hey wait!” you call after Luna, assuming she got distracted by something shiny and forgot where she was going. “You’re going the wrong way, this is the garden!”\n\n“Right way!” she insists and carries on flying. Eventually she stops next to a large, flowing water fountain. “Here we are!”\n\nYou raise your eyebrow, assuming the wisp has made some kind of mistake. “Luna, I don’t think this is...” but your sentence is cut short when you notice two things on the fountain’s edge. Firstly there is a sign reading, ‘Library. Ring bell for bookkeeper,’ and besides that is a little bell, which of course you ring.\n\nAlmost as soon as your hand hits the bell, a blue haired mermaid appears from the fountain and peers at you through a pair of old fashioned spectacles. “Can I help you?” she asks.\n\n*page_break\n\nYou hesitate before finally asking, “Is this really the library? Where are all the books?” The mermaid just looks at you like you’re an idiot and with her finger, points down towards the bottom of the fountain “What, under the water?” you ask. “Don’t they all get wet?”\n\n“Naturally,” she tells you. “When you take them on land, don’t they all get dry?”\n\n“That doesn’t make any sense!” you insist.\n\n“You humans, always trying to make sense of everything,” she mutters, shaking her head. “Now, is there anything I can help you with?”\n\n“Yes actually,” you tell her, “I need the crossword for Mr Stonehoof’s competition.”\n\n“Are you sure you’re smart enough to enter?” the mermaid asks sceptically. “You’ll have to prove it before I give you the crossword.”\n\n“How?” you ask, but it doesn’t take a second before you realize the answer. “Let me guess... Another riddle?”\n\n“Well done,” she says sarcastically. “But don’t worry, I think you’ll like this one. There’s no mystery or double meanings or trick answers, just a little of your plain, simple, human logic. So tell me... What is the only word in the English language that has three pairs of letters back to back?”\n\n“Three pairs?” you ask, sure that you can’t think of any.\n\n“Yes, three pairs all back to back. Say for example, if ‘Quizzllee’ was a word, that would have three pairs of letters back to back. The Z, the L and the E... But don’t even think of giving that as an answer, it’s not a word at all. I want a real word in the English language that has three pairs of letters back to back.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Bookkeeper\n    *if (\"$!!{Riddle_Bookkeeper}\" = \"BOOKKEEPER\") or (choice_randomtest)\n      *goto Bookkeeper\n    *else\n      *goto Bookkeeper_Incorrect\n  #Ask Luna for a hint.\n    *if Bookkeeper_Hint = 0\n      *set Hints + 1\n    *goto Hint_Bookkeeper\n  #Eat a magic bean.\n    *if Bookkeeper_Bean = 0\n      *set Beans + 1\n    *goto Bean_Bookkeeper\n\n*label Hint_Bookkeeper\n*set Bookkeeper_Hint 1\n\nLuna gives a heavy sigh, sitting herself down on the sign saying, ‘Library. Ring bell for bookkeeper.’\n\n“Give me a moment, it’ll come to me,” Luna insists, concentrating so hard, she looks like she’s about to burst. “Awh, I can’t think of anything!” she complains, sounding very frustrated with herself. “And you know, I swear I’ve seen a word that had three pairs of letters back to back. In fact I think I saw it quite recently... Oh dear, I just can’t remember... A word in the English language that has three pairs of letters back to back,” the wisp repeats to herself, and goes back to thinking again.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Bookkeeper\n    *if (\"$!!{Riddle_Bookkeeper}\" = \"BOOKKEEPER\") or (choice_randomtest)\n      *goto Bookkeeper\n    *else\n      *goto Bookkeeper_Incorrect\n  #Eat a magic bean.\n    *if Bookkeeper_Bean = 0\n      *set Beans + 1\n    *goto Bean_Bookkeeper\n\n*label Bean_Bookkeeper\n*set Bookkeeper_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Bookkeeper.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Bookkeeper\n    *if (\"$!!{Riddle_Bookkeeper}\" = \"BOOKKEEPER\") or (choice_randomtest)\n      *goto Bookkeeper\n    *else\n      *goto Bookkeeper_Incorrect\n\n*label Bookkeeper_Incorrect\n\nThe bookkeeper shakes her head. “No, no, that’s not right at all,” she tells you. “Try again, a word in the English language that has three pairs of letters back to back.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Bookkeeper\n    *if (\"$!!{Riddle_Bookkeeper}\" = \"BOOKKEEPER\") or (choice_randomtest)\n      *goto Bookkeeper\n    *else\n      *goto Bookkeeper_Incorrect\n  #Ask Luna for a hint.\n    *if Bookkeeper_Hint = 0\n      *set Hints + 1\n    *goto Hint_Bookkeeper\n  #Eat a magic bean.\n    *if Bookkeeper_Bean = 0\n      *set Beans + 1\n    *goto Bean_Bookkeeper\n\n*label Bookkeeper\n\n“Very clever human,” the mermaid tells you. “The answer is in fact me, bookkeeper, the only English word with three pairs of letters back to back.”\n\n“No it’s not!” Luna objects. “What about bookkeepers?”\n\n“Or bookkeeping?” you add.\n\n“Don’t get smart with me young ${Man_Lady},” the mermaid tells you crossly.\n\n“But you told ${Him_Her} to be smart,” Luna retorts.\n\n“Oh very well,” the bookkeeper grumbles to herself and swims down into the depths of the fountain before returning with a very soggy piece of paper. “There you go, and good luck with the competition.”\n\nYou take the paper and, looking at it, find a series of empty white boxes reaching horizontally and one vertical line of blue boxes going down the middle. Beneath this diagram is what appears to be a collection of riddles.\n\n*page_break\n\n“Hmm...” mumbles Luna, looking over your shoulder. “Looks like you’re supposed to fill in all the riddles one by one, going from side to side, then when you’re finished, the word going down the middle in the blue boxes must be the answer.”\n\nThe riddles are as follows:\n\n1. Until I am measured I am not known, but how you will miss me when I have flown.\n*line_break\n2. I can travel around the world, yet I always stay stuck in a corner.\n*line_break\n3. What belongs to you, but others use it more than you do?\n*line_break\n4. If you name me you will break me.\n*line_break\n5. The man that makes it doesn’t want it. The man who buys it doesn’t need it. The man that needs it doesn’t know it.\n*line_break\n6. When you take the whole away, some is still left.\n*line_break\n7. The more of me you take, the more you leave behind.\n*line_break\n8. What gets wet while drying?\n\nThat’s a lot of riddles, but the only answer you really need is the word going down the middle.\n\n*image Crossword.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Manifest\n    *if (\"$!!{Riddle_Manifest}\" = \"MANIFEST\") or (choice_randomtest)\n      *goto Manifest\n    *else\n      *goto Manifest_Incorrect\n  #Ask Luna for a hint.\n    *if Manifest_Hint = 0\n      *set Hints + 1\n    *goto Hint_Manifest\n  #Eat a magic bean.\n    *if Manifest_Bean = 0\n      *set Beans + 1\n    *goto Bean_Manifest\n\n*label Hint_Manifest\n*set Manifest_Hint 1\n\nLuna shakes her head. “I don’t think I can help you with this one,” she admits sadly. “You need to find the answers to all the different riddles and fill them in until you’ve got a word going down through the blue boxes in the middle. But don’t worry, if you really put your mind to it, I’m sure the answer will make itself manifest. Let’s look at the riddles again.”\n\n1. Until I am measured I am not known, but how you will miss me when I have flown.\n*line_break\n2. I can travel around the world, yet I always stay stuck in a corner.\n*line_break\n3. What belongs to you, but others use it more than you do?\n*line_break\n4. If you name me you will break me.\n*line_break\n5. The man that makes it doesn’t want it. The man who buys it doesn’t need it. The man that needs it doesn’t know it.\n*line_break\n6. When you take the whole away, some is still left.\n*line_break\n7. The more of me you take, the more you leave behind.\n*line_break\n8. What gets wet while drying?\n\nThat’s a lot of riddles, but the only answer you really need is the word going down the middle.\n\n*image Crossword.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Manifest\n    *if (\"$!!{Riddle_Manifest}\" = \"MANIFEST\") or (choice_randomtest)\n      *goto Manifest\n    *else\n      *goto Manifest_Incorrect\n  #Eat a magic bean.\n    *if Manifest_Bean = 0\n      *set Beans + 1\n    *goto Bean_Manifest\n\n*label Bean_Manifest\n*set Manifest_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Manifest.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Manifest\n    *if (\"$!!{Riddle_Manifest}\" = \"MANIFEST\") or (choice_randomtest)\n      *goto Manifest\n    *else\n      *goto Manifest_Incorrect\n\n*label Manifest_Incorrect\n\nLuna looks at your answer and shakes her head. “I don’t think that’s right,” she tells you. “Try again.”\n\n1. Until I am measured I am not known, but how you will miss me when I have flown.\n*line_break\n2. I can travel around the world, yet I always stay stuck in a corner.\n*line_break\n3. What belongs to you, but others use it more than you do?\n*line_break\n4. If you name me you will break me.\n*line_break\n5. The man that makes it doesn’t want it. The m
