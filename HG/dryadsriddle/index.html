<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Dryad's Riddle — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>

      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "dryadsriddle", "title": "The Dryad's Riddle", "scenes": {"church": "*temp Riddle_Zero\n*temp Zero_Hint 0\n*temp Zero_Bean 0\n*temp Riddle_Match\n*temp Match_Hint 0\n*temp Match_Bean 0\n*temp Riddle_River\n*temp River_Hint 0\n*temp River_Bean 0\n*temp Riddle_Everest\n*temp Everest_Hint 0\n*temp Everest_Bean 0\n*temp Riddle_Three\n*temp Three_Hint 0\n*temp Three_Bean 0\n*temp Riddle_Clock\n*temp Clock_Hint 0\n*temp Clock_Bean 0\n*temp Chair_Hint 0\n*temp Chair_Bean 0\n*temp Riddle_Piano\n*temp Piano_Hint 0\n*temp Piano_Bean 0\n*temp Riddle_Nun\n*temp Nun_Hint 0\n*temp Nun_Bean 0\n*temp Verse_Hint 0\n*temp Verse_Bean 0\n\nA thought occurs to you as Luna leads you up the hill towards the church. “You know, I’m actually surprised you have a church here,” you tell Luna. “I mean it’s strange that you guys have the same religions that we have in the human world.”\n\n“Religi-what-now?” Luna asks you.\n\n“You know... Religion?” you remind her. “What they teach you about in church?”\n\n“Oh you mean where the people all sing songs and kneel a lot and listen to the man reading the big book?” asks Luna. “Yeah, we haven’t had that for long. See, this man from your world came here a few years ago and he started talking about the big man in the sky. At first we all thought he meant the man in the moon, but then he told us that praying to the moon is something called blasphemy... I think that’s a kind of sandwich. Anyway, he thought it was very, very important that we all learn about the man in the sky, so he built that big church on the hill and decided to stay here so he could read people the story where the man with the beard helps lots of people and the women are all called Mary. The priest man says he has to stay here because he needs to share his message with the people of our world... But Willow thinks he just wasn’t smart enough to get back through the portal.”\n\nAs you draw closer, you can see that the church is a rather modest, stone building with a single tower that looks like something from a medieval castle. Each of the building’s windows are intricate stained glass designs and the church has a large garden where several small children of varies mythical races are playing together in harmony.\n\n“This place seems nice,” you say as you push open the small, wooden gate in the white picket fence that surrounds the church. But the truth is, you’d rather be back in the old, abandoned church, playing hide and seek with Lucas and Sophie.\n\n*page_break\n\nAt that moment a tall man dressed all in black with a white collar and curly red hair sees you enter the church and walks over to speak to you. “Bless you my child, and top of the morning to ye. My name is Father O'Reilly McLoughlin Fitzpatrick and I welcome you to my humble church. But by sweet Mary, I haven’t seen another human soul in donkey’s years. ‘Tis a sight for sore eyes, to be sure, to be sure!”\n\n“Uhh... To be sure,” you mumble in reply, quite pleased to see another human being yourself, however eccentric he might be. “I was wondering if you could help me. You see, Willow, the dryad that lives in the clearing...”\n\n“Oh, Williow sent ye?” the priest exclaims. “The sainted tree sprite herself. Yes, t’was she that brought me here to my blessed congregation. ‘Tis the Lord’s work she does, I tell ye. Clearly sweet Jesus must’ve made known to her how much I was needed in this poor pagan world, and so here she brought me to spread the word of God.”\n\n“I don’t think so,” Luna disagrees. “Willow said she brought you here because you tried to chop off one of her branches to build a whiskey rack. Poor thing still gets an ache in her right arm if she tries to lift it too high.”\n\n*page_break\n\n“Either way,” you take control of the conversation once more, “Willow sent me to collect some mushrooms and Luna thinks there’s one here in your church.”\n\n“Ah, I see!” Father O’Reilly exclaims. “So it’s the Sacred Shiitake you’re after then? Well, it’s here, kept it safe for many a year, I have. But what makes you think you are deserving of such a holy relic?”\n\n“Um... I don’t know,” you reply nervously, “I just really need it.”\n\n“Well need it you may, but you’ll have to prove your worth to me first before I place the holy mushroom in your care,” the priest tells you.\n\n“Prove my worth? Okay, so how do I do that?” you ask.\n\n“Well you can start by answering a riddle for me,” says Father O’Reilly.\n\n“A riddle?” you ask, surprised. “But you’re human. Why do you want to test me with riddles like the magic creatures do?”\n\n“Live among these folk long enough and their ways will start to rub off on you,” Father O’Reilly explains as he reaches into his pocket and pulls out a bible, holding it towards you both. “Now tell me, how well do you two know the holy scripture?” asks Father O’Reilly.\n\n“Never tried reading it,” Luna tells him. “I figured the scripture thing must be really hard to read with all those holes in it.”\n\n“Well let’s see if your friend knows the word of God any better,” the priest suggests. “I have another riddle for you my ${Boy_Girl}, to test if you are worthy of our most holy of mushrooms. Now listen closely my child;\n\nMany think they know the story of the great flood, but I direct ye to Genesis Chapter 7 and I ask you, how many of each animal did Moses take with him on the ark?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Zero\n    *if (Riddle_Zero = \"0\") or (choice_randomtest)\n      *goto Zero\n    *else\n      *goto Zero_Incorrect\n  #Ask Luna for a hint.\n    *if Zero_Hint = 0\n      *set Hints + 1\n    *goto Hint_Zero\n  #Eat a magic bean.\n    *if Zero_Bean = 0\n      *set Beans + 1\n    *goto Bean_Zero\n\n*label Hint_Zero\n*set Zero_Hint 1\n\n“Now remember, this is a number riddle, so you have to put a number as your answer,” Luna tells you. “Now just let me have a look,” she insists as she flies over to Father O'Reilly and starts flicking through the pages of the bible. “Hey, this book doesn’t have any holes in it at all!” she complains, but gets back to the point when she finds the right page. \n\n“Ahh, here it is,” Luna says, giving out a short cough before she starts reading. “Genesis Chapter 7. The Lord then said to Noah, ‘Go into the ark, you and your whole family, because I have found you righteous in this generation. Take with you seven pairs of every kind of clean animal, a male and it’s mate, and one pair of every kind of unclean animal, a male and its mate, and also seven pairs of every kind of bird, male and female, to keep their various kinds alive throughout the earth.’ So that’s fourteen of the clean animals that Noah took with him, and two of all the dirty ones... Wait a second... I don’t remember Father O’Reilly mentioning anybody called Noah. Maybe I heard him wrong?”\n\nFather O’Reilly directs you to Genesis Chapter 7 and he wants to know, how many of each animal did Moses take with him on the ark?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Zero\n    *if (Riddle_Zero = \"0\") or (choice_randomtest)\n      *goto Zero\n    *else\n      *goto Zero_Incorrect\n  #Eat a magic bean.\n    *if Zero_Bean = 0\n      *set Beans + 1\n    *goto Bean_Zero\n\n*label Bean_Zero\n*set Zero_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]0.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Zero\n    *if (Riddle_Zero = \"0\") or (choice_randomtest)\n      *goto Zero\n    *else\n      *goto Zero_Incorrect\n\n*label Zero_Incorrect\n\nFather O'Reilly McLoughlin Fitzpatrick looks horrified and quickly uses his right hand to draw the sign of the cross over himself. “Oh sweet Mary, no, no, no! Come to your senses child, you must know better than that! Answer again, and by God, try to get it right this time.\n\nI direct ye to Genesis Chapter 7 and I ask you, how many of each animal did Moses take with him on the ark?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Zero\n    *if (Riddle_Zero = \"0\") or (choice_randomtest)\n      *goto Zero\n    *else\n      *goto Zero_Incorrect\n  #Ask Luna for a hint.\n    *if Zero_Hint = 0\n      *set Hints + 1\n    *goto Hint_Zero\n  #Eat a magic bean.\n    *if Zero_Bean = 0\n      *set Beans + 1\n    *goto Bean_Zero\n\n*label Zero\n\nSmiling, Father O’Reilly claps a hand down on your shoulder. “Lord bless you child, you were paying attention. Indeed, Moses didn’t take any animals with him onto the ark. T’was Noah who built the ark, not Moses. You’d be surprised how many people get caught out by that one.\n\nWell I’m glad we understand one another dear ${Boy_Girl}, please, please come on inside, no point staying out in the cold now, is there?” the priest asks as he leads you into the building. Upon entering though, you feel that standing outside might have been preferable, as it is far colder inside than it was out.\n\n“Well by the Holy Ghost, this won’t do at all,” Father O’Reilly complains, directing his attention to a tall, elderly looking nun with long, dishevelled white hair sitting alone in the corner on the cold, stone floor. “Sister Aibell, I thought I asked you to light a fire. It won’t do much good to bring folk into our congregation if they’re going to freeze to death as soon as they walk through the doors.”\n\nWith that, the old nun lets out a terrifying, high pitched shriek that causes you to cover your ears. “Banshee,” Luna whispers in explanation once the wailing finally comes to an end. “They do that a lot. Sometimes they can even make your eardrums burst! It hurts.”\n\n*page_break\n\n“Oh forgive me dear Father, forgive me!” the Banshee cries. “I have been trying to light the fire all morning long, I have! All morning long, but I cannot do it, I say! Oh dear Father, please give me answers in my time of need, I just don’t know what to do!”\n\n“Calm down Sister,” Father O’Reilly says in a reassuring tone, “Tell me what vexes ye and God willing, the Lord will make known how this problem can be solved.”\n\n“Oh Father, look!” says Sister Aibell, holding up a single match with her long, spidery fingers. “There is only one match left, but three things that must be lit, and I do not know which to light first!”\n\n“Wait sister,” Father O’Reilly interrupts the nun, “there is a child here come seeking the Sacred Shiitake, and I have asked that ${He_She} first prove ${His_Her} worth. Direct your problem to ${Him_Her}, I pray, and see if ${He_She} can solve your dilemma.”\n\nThe banshee seems to notice you for the first time then, and a rather disturbing smile creeps across her face. Licking her lips, sister Aibell crawls across the floor until she is at your feet. “Dear, sweet child, you’ll help this poor old soul, won’t ye? Solve me this riddle if you please, and old Aibell will be ever so grateful.”\n\n“I’ll try,” you say, rather nervously, “what’s the problem?”\n\n“Well you see dear ${Boy_Girl}, I have here this single, solitary match in my possession,” Sister Aibell explains. “But there are three things need be lit, you see! A candle, a fireplace and the great church oven. So tell me child, what must I light first?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Match\n    *if (\"$!!{Riddle_Match}\" = \"MATCH\") or (choice_randomtest)\n      *goto Match\n    *else\n      *goto Match_Incorrect\n  #Ask Luna for a hint.\n    *if Match_Hint = 0\n      *set Hints + 1\n    *goto Hint_Match\n  #Eat a magic bean.\n    *if Match_Bean = 0\n      *set Beans + 1\n    *goto Bean_Match\n\n*label Hint_Match\n*set Match_Hint 1\n\nLuna thinks about the question for a second. “Well if it was me, I’d light the candle first, and then use the candle to light the fireplace and the oven... But wait... I think there’s something else you need to light before the candle.”\n\nSister Aibell has a single match in her possession, but there are three hinks about that for a moment and then suddenly looks a good deal happier. “Oh yes, of course! I can’t very well light anything else unless I light the match first, can I? Thank you child, you’ve been a great help to this poor, old soul,” she tells you as she lights the match and then proceeds to light the candle and the fireplace.\n\n“You mean you were sitting here in the cold all morning because you couldn’t figure out that you had to light the match first?” you ask, completely baffled.\n\n“Now don’t ye be mocking our dear Sister Aibell,” the priest scolds you. “That riddle’s trickier than you’d think. Most folks say it’s the candle needs lighting first, but have ye ever tried lighting a candle without a match, child? Not an easy feat I tell ye. Not an easy feat at all.”\n\n“Oh deary me,” Sister Aibell mutters to herself, “I must say it’s a struggle to light this old oven. Sweet ${Boy_Girl},” the banshee says, beckoning you over with a long, pointed finger. “Will ye come to poor, old Aibell’s aid once more? Take this stick from the fire place and light the oven for me... But you have to get inside the oven to light it. Yes, all the way inside, right to the back. And don’t ye worry yourself, I promise you’ll be perfectly deliciou... Safe! Yes, that’s what I meant, perfectly safe,” she says, licking her lips once more.\n\n“I’ll help!” Luna naively offers as she flutters towards the oven. “Can we bake cookies?”\n\nLuckily, before you have time to object, the priest ushers you away once more. “Sorry Aibell, but you’ll just have to light the oven by yourself. I’m giving this ${Boy_Girl} a tour of the church, don’t you see? Come along now.”\n\n*page_break\n\nFather O’Reilly then leads you and Luna into the main church hall. Despite being relatively small in size, the building is beautifully designed. Great Gothic style arches connect the pillars that hold the building up, the walls are white, decorated with solid gold engravings and rows of pews are all carved and decorated with the most intricate patterns and details. At the head of it all, a solid gold eagle lectern stands, holding the bible for the priest to read. Most impressive of all are the magnificent stained glass windows that illuminate the room with lights of all different colours.\n\n“Pretty!” Luna observes as she admires the various works of glass art.\n\n“Oh, to be sure,” Father O’Reilly agrees. “Only took me a year to build this place. Not that I didn’t have help of course, the locals were all so kind. Giants broke down the rocks and put the building together, practically everything wooden in this building was carved by gnomes, and even a dragon donated some of his gold to build the lectern up there... Well the spriggans said the dragon donated the treasure, and why would they lie?” he asks, optimistically. “And then there’s the windows. Made them myself I did, with the help of my old friend the Sandman to provide the sand, and a phoenix to heat the glass of course… But by sweet Mary ${Boy_Girl} I clean forgot to ask your name,” Father O’Reilly realizes.\n\n“${Name},” you tell him.\n\n“And I’m Luna!” adds the wisp.\n\n“Well ${Name} and Luna, tell me, what do you think of these here windows?” asks Father O’Reilly. “There’s Holy Mother Mary, and over here David and Goliath, and in this window you’ll see Moses parting the red sea. That reminds me of another riddle in fact, if you care to test your mind again.”\n\n“Okay, let’s hear it,” you tell him.\n\n“To be sure, to be sure,” says Father O’Reilly. “Now listen closely;\n\nWhat can run but never walks, often murmurs, never talks, has a mouth but never eats, has a bed but never sleeps?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_River\n    *if (\"$!!{Riddle_River}\" = \"RIVER\") or (choice_randomtest)\n      *goto River\n    *else\n      *goto River_Incorrect\n  #Ask Luna for a hint.\n    *if River_Hint = 0\n      *set Hints + 1\n    *goto Hint_River\n  #Eat a magic bean.\n    *if e middle of the churchyard.\n“Stop that this instant!” Father O’Reilly demands and the boys all immediately stop fighting and stand up straight, lowering their heads in shame as the priest approaches them. “Why Shaun, Shawn, Shane and Shamus, you all ought to be ashamed of yourselves. Now whatever caused the four of ye to be brawling on the floor like a pack of wild animals?”\n\n*page_break\n\n“He’s a liar!” yells Shaun, pointing to Shawn.\n\n“No, he’s a liar!” Shawn shouts, pointing back to Shaun.\n\n“No, they’re both liars!” Shane insists.\n\n“No, we’re all liars!” objects Shamus.\n\n“I want to shout too!” yells Luna.\n\n“Boys, boys, one at a time.” Father O’Reilly says calmly. “Here ${Name}, lets see if you can settle this. Hear out each of the boys and try to sort the liars from the honest.”\n\n“Uh... Okay,” you say a little reluctantly, not really comfortable dealing with this family feud, but you can only try your best. “Okay, so what happened?” you ask the boys, and they each proceed to answer one at a time;\n\n“Only one of us if lying,” says Shaun.\n*line_break\n“That’s not true, two of us are lying!” says Shawn.\n*line_break\n“Don’t listen to them, there’s three of us that are lying,” says Shane.\n*line_break\n“We’re all lying, every last one of us,” says Shamus.\n\n“Well now you’ve heard all their stories, tell me ${Name}, how many of the boys are actually lying?” asks Father O’Reilly.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Three\n    *if (Riddle_Three = \"3\") or (choice_randomtest)\n      *goto Three\n    *else\n      *goto Three_Incorrect\n  #Ask Luna for a hint.\n    *if Three_Hint = 0\n      *set Hints + 1\n    *goto Hint_Three\n  #Eat a magic bean.\n    *if Three_Bean = 0\n      *set Beans + 1\n    *goto Bean_Three\n\n*label Hint_Three\n*set Three_Hint 1\n\nLuna looks at each of the boys in turn. “Oh dear... Maybe only one of them is lying? But that means the other three would be telling the truth... But the other three are all saying different things, so that can’t be right. Maybe they’re all lying? But if they’re all lying then that means the one that said they were all lying was telling the truth... So that can’t be right either... Oh dear, this is making my brain hurt. See if you can figure it out on your own.”\n\n“Only one of us if lying,” says Shaun.\n*line_break\n“That’s not true, two of us are lying!” says Shawn.\n*line_break\n“Don’t listen to them, there’s three of us that are lying,” says Shane.\n*line_break\n“We’re all lying, every last one of us,” says Shamus.\n\n“Well now you’ve heard all their stories, tell me ${Name}, how many of the boys are actually lying?” asks Father O’Reilly.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Three\n    *if (Riddle_Three = \"3\") or (choice_randomtest)\n      *goto Three\n    *else\n      *goto Three_Incorrect\n  #Eat a magic bean.\n    *if Three_Bean = 0\n      *set Beans + 1\n    *goto Bean_Three\n\n*label Bean_Three\n*set Three_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]3.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Three\n    *if (Riddle_Three = \"3\") or (choice_randomtest)\n      *goto Three\n    *else\n      *goto Three_Incorrect\n\n*label Three_Incorrect\n\nFather O’Reilly looks at the boys and shakes his head. “I don’t think you’ve gotten that quite right ${Name}. Do try again, we don’t want to go punishing the wrong child now, do we?”\n\n“Only one of us if lying,” says Shaun.\n*line_break\n“That’s not true, two of us are lying!” says Shawn.\n*line_break\n“Don’t listen to them, there’s three of us that are lying,” says Shane.\n*line_break\n“We’re all lying, every last one of us,” says Shamus.\n\n“Well now you’ve heard all their stories, tell me ${Name}, how many of the boys are actually lying?” asks Father O’Reilly.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Three\n    *if (Riddle_Three = \"3\") or (choice_randomtest)\n      *goto Three\n    *else\n      *goto Three_Incorrect\n  #Ask Luna for a hint.\n    *if Three_Hint = 0\n      *set Hints + 1\n    *goto Hint_Three\n  #Eat a magic bean.\n    *if Three_Bean = 0\n      *set Beans + 1\n    *goto Bean_Three\n\n*label Three\n\nFather O’Reilly nods his head in approval. “Well done ${Name}, yes, three of the boys were lying. Only Shane here was telling the truth. Good lad Shane. As for the rest of ye, you should all be ashamed of yourselves! No sweet potato pie for a week!”\n\nThe three boys that lied all give very disappointed sighs hearing this. “Now, now, enough of that. Go on, off to choir practice, all of you,” Father O’Reilly tells the boys, and with that they all head inside without another word. “Ah, they’re all good lads really,” Father O’Reilly reassures you. “But now the four brothers have gone inside, I have a story for you about three brothers. Not a holy story this one, but it’s important to test the mind, don’t ye think? Listen to my tale if you will, and see if ye can figure it out for yourself;\n\nThree brothers share a family sport, a non-stop marathon,\n*line_break\nThe oldest one is fat and short and trudges slowly on.\n*line_break\nThe middle brother’s tall and slim and keeps a steady pace,\n*line_break\nThe youngest runs just like the wind, speeding through the race.\n*line_break\n“He runs in circles, round and round,” the other brothers say,\n*line_break\n“But while in speed he’s number one, he’s second, in a way.”\n\nNow I ask ye ${Name}, where can these three brothers be found?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Clock\n    *if (\"$!!{Riddle_Clock}\" = \"CLOCK\") or (choice_randomtest)\n      *goto Clock\n    *if (\"$!!{Riddle_Clock}\" = \"WATCH\")\n      *goto Clock\n    *else\n      *goto Clock_Incorrect\n  #Ask Luna for a hint.\n    *if Clock_Hint = 0\n      *set Hints + 1\n    *goto Hint_Clock\n  #Eat a magic bean.\n    *if Clock_Bean = 0\n      *set Beans + 1\n    *goto Bean_Clock\n\n*label Hint_Clock\n*set Clock_Hint 1\n\n“It’s pretty simple when you think about it,” Luna tells you with a smile. “They run in circles, so whatever he’s talking about needs to be round. So what can you think of that’s round and has three different things all going in circles at different speeds? And remember, the fastest one is ‘second’ in a way.”\n\nThree brothers share a family sport, a non-stop marathon,\n*line_break\nThe oldest one is fat and short and trudges slowly on.\n*line_break\nThe middle brother’s tall and slim and keeps a steady pace,\n*line_break\nThe youngest runs just like the wind, speeding through the race.\n*line_break\n“He runs in circles, round and round,” the other brothers say,\n*line_break\n“But while in speed he’s number one, he’s second, in a way.”\n\nWhere can these three brothers be found?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Clock\n    *if (\"$!!{Riddle_Clock}\" = \"CLOCK\") or (choice_randomtest)\n      *goto Clock\n    *if (\"$!!{Riddle_Clock}\" = \"WATCH\")\n      *goto Clock\n    *else\n      *goto Clock_Incorrect\n  #Eat a magic bean.\n    *if Clock_Bean = 0\n      *set Beans + 1\n    *goto Bean_Clock\n\n*label Bean_Clock\n*set Clock_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Clock.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Clock\n    *if (\"$!!{Riddle_Clock}\" = \"CLOCK\") or (choice_randomtest)\n      *goto Clock\n    *if (\"$!!{Riddle_Clock}\" = \"WATCH\")\n      *goto Clock\n    *else\n      *goto Clock_Incorrect\n\n*label Clock_Incorrect\n\nFather O’Reilly shakes his head. “That’s not the right answer I’m afraid. Try again ${Name} and quick about it, the clock’s ticking.\n\nThree brothers share a family sport, a non-stop marathon,\n*line_break\nThe oldest one is fat and short and trudges slowly on.\n*line_break\nThe middle brother’s tall and slim and keeps a steady pace,\n*line_break\nThe youngest runs just like the wind, speeding through the race.\n*line_break\n“He runs in circles, round and round,” the other brothers say,\n*line_break\n“But while in speed he’s number one, he’s second, in a way.”\n\nNow I ask ye ${Name}, where can these three brothers be found?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Clock\n    *if (\"$!!{Riddle_Clock}\" = \"CLOCK\") or (choice_randomtest)\n      *goto Clock\n    *if (\"$!!{Riddle_Clock}\" = \"WATCH\")\n      *goto Clock\n    *else\n      *goto Clock_Incorrect\n  #Ask Luna for a hint.\n    *if Clock_Hint = 0\n      *set Hints + 1\n    *goto Hint_Clock\n  #Eat a magic bean.\n    *if Clock_Bean = 0\n      *set Beans + 1\n    *goto Bean_Clock\n\n*label Clock\n\n“There you have it ${Name}, a clock!” Father O’Reilly tells you. “Or a watch of course. Three hands forever running round the clock at different speeds and the fastest one is ‘second in a way’ because of course, it measures seconds.” Almost as if on cue, you hear the great church clock chime, announcing midday to all the congregation.\n\n“Ah, 12 o’clock!” the priest says happily. “Time for our afternoon prayer meeting. Come along,” Father O’Reilly beckons you as he leads you back into the church. The priest then takes you to a small room with six nuns inside, all of different mythical races. Sister Aibell the banshee is accompanied by an elf, a dwarf, a harpy, a satyr and a fairy, all wearing habits of black and white. \n\n“Awh, a costume party! I want to dress up too!” Luna declares, sounding very excited. “Funny that they all came as penguins.”\n\nUnfortunately, it doesn’t look like anybody at this ‘party’ is having any fun. Instead of sitting quietly in prayer, the nuns are all bickering worse than the four brothers whose feud you solved earlier.\n\n*page_break\n\n“Oh no, not again,” Father O’Reilly says with a groan, shaking his head in annoyance. “Deep-seated traditions are hard to break,” he explains. “I am trying to teach the Sisters that we are all equal in the eyes of the Lord, but their races have feuded against one another for generations, and I’m afraid they haven’t quite broken the old habits yet.” Turning away from you, the priest addresses the nuns. “Sisters, Sisters, no need to quarrel so. You are all children of God. You should be coming together in prayer, not squabbling like school children. Now sister Aibell, whatever is the trouble?”\n\n“I’m not sitting next to her!” the banshee insists, pointing to the harpy.\n\n“Well I’m not sitting next to her!” yells the harpy, pointing to the elf.\n\n“And I’m not sitting next to her!” says the elf, pointing to the faun.\n\n“Yes, yes, I know!” Father O’Reilly says, raising his hands to quiet the Sisters before they all go back to bickering again. “${Name}, perhaps you can help me with this little dilemma as well. He says, beckoning you over and gesturing to the six nuns;\n\n“Now here we have six Sisters, all standing from tallest to shortest:\n*line_break\nSister Aibell, the banshee.\n*line_break\nSister Hawk, a harpy.\n*line_break\nSister Silver, an elven maid.\n*line_break\nSister Capricorn, a satyr.\n*line_break\nSister Strongaxe, a dwarf\n*line_break\nAnd Sister Goodfellow, a little fairy.\n\nIn our prayer meeting, the Sisters are to sit in a circle. Unfortunately none of these ladies will sit next to the Sister directly taller than them or the Sister directly shorter than them. Also Sister Silver and Sister Strongaxe won’t sit together. Elves and dwarves never did quite see eye to eye. Now, let’s take these six chairs and label them 1 to 6 going clockwise. Sister Aibell, if you’ll be so kind as to sit in chair number 1.” At Father Aibell’s request, the banshee goes and sits herself down in the first chair. “Now that you have somewhere to start, can you arrange a seating plan that’ll make all the sisters happy?”\n\n*image Nuns.png\n\n*if choice_ t\n\n*label Chairs\n\n*image Nuns_One.png\n*image Nuns_Two.png\n\nFather O’Reilly claps his hands together in relief. “Yes, that’ll do perfectly! Well done ${Name}. Of all the seating arrangements you could've chosen, there were only two that would've made all the Sisters happy and you found one! None of the Sisters are sitting next to somebody they feud with. Now finally the prayer meeting can begin.”\n\n“It would’ve started ten minutes ago if Sister Strongaxe hadn’t tried to steal my seat,” Sister Silver complains under her breath.\n\n“That seat doesn’t belong to you, you know!” Sister Strongaxe retorts, and once again the six nuns all start squabbling amongst themselves, causing Father O’Reilly to put a hand on his head in frustration.\n\n*page_break\n\n“I think perhaps we should leave them to it, don’t you?” Father O’Reilly asks. “Come along ${Name}, there’s something I’d like you to see.”\n\nLeaving the bickering nuns behind you, you and Luna follow Father O’Reilly back into the main church building which is now filled with various mythical birds such as phoenixes, griffins and sirins, all forming a beautiful chirping chorus. “Quite impressive aren’t they?” asks the priest. “I doubt any church in history could boast a choir like this. Still I fear something is missing… Ah, I have it!” he suddenly declares. “And I believe another riddle is in order. Answer me this riddle if you can, ${Name};\n\nI have many keys, yet I have no locks. What am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Piano\n    *if (\"$!!{Riddle_Piano}\" = \"PIANO\") or (choice_randomtest)\n      *goto Piano\n    *if (\"$!!{Riddle_Piano}\" = \"ORGAN\")\n      *goto Piano\n    *else\n      *goto Piano_Incorrect\n  #Ask Luna for a hint.\n    *if Piano_Hint = 0\n      *set Hints + 1\n    *goto Hint_Piano\n  #Eat a magic bean.\n    *if Piano_Bean = 0\n      *set Beans + 1\n    *goto Bean_Piano\n\n*label Hint_Piano\n*set Piano_Hint 1\n\n“Well keys aren’t always used to unlock things,” Luna points out. “There are different types of keys you know.”\n\n“Good point!” you agree with a smile. “Like the keys on a typewriter or a computer keyboard.”\n\n“I don’t know what those things are,” Luna tells you. “But would they help to make a choir sound better. Father O’Reilly said something was missing… Maybe something to do with singing or music, perhaps?”\n\nI have many keys, yet I have no locks. What am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Piano\n    *if (\"$!!{Riddle_Piano}\" = \"PIANO\") or (choice_randomtest)\n      *goto Piano\n    *if (\"$!!{Riddle_Piano}\" = \"ORGAN\")\n      *goto Piano\n    *else\n      *goto Piano_Incorrect\n  #Eat a magic bean.\n    *if Piano_Bean = 0\n      *set Beans + 1\n    *goto Bean_Piano\n\n*label Bean_Piano\n*set Piano_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Piano.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Piano\n    *if (\"$!!{Riddle_Piano}\" = \"PIANO\") or (choice_randomtest)\n      *goto Piano\n    *if (\"$!!{Riddle_Piano}\" = \"ORGAN\")\n      *goto Piano\n    *else\n      *goto Piano_Incorrect\n\n*label Piano_Incorrect\n\nFather O’Reilly thinks about your answer for a moment. “An interesting guess I suppose, but not the answer I was looking for, I’m afraid,” he tells you. “Please do try again;\n\nI have many keys, yet I have no locks. What am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Piano\n    *if (\"$!!{Riddle_Piano}\" = \"PIANO\") or (choice_randomtest)\n      *goto Piano\n    *if (\"$!!{Riddle_Piano}\" = \"ORGAN\")\n      *goto Piano\n    *else\n      *goto Piano_Incorrect\n  #Ask Luna for a hint.\n    *if Piano_Hint = 0\n      *set Hints + 1\n    *goto Hint_Piano\n  #Eat a magic bean.\n    *if Piano_Bean = 0\n      *set Beans + 1\n    *goto Bean_Piano\n\n*label Piano\n\n“Of course my child!” Father O’Reilly exclaims. “What this choir needs is a piano! A great church organ to compliment their beautiful singing. I shall set to work making one immediately! Oh, but I am forgetting myself. You have been a great help to me this day my fine ${Boy_Girl}. Proven your worth if ever a worthy child there was. What’s say I take ye to that Sacred Shiitake now?”\n\n“That would be great!” you say, very relieved. “I’ll be one step closer to getting home.”\n\n“Well I’m sure we’ll all be sad to see ye go. Don’t suppose you’d consider staying? I’d be mighty glad to have a bright child like you in my congregation.” says Father O’Reilly.\n\n“Thanks, but no thanks,” you decline the priest’s offer. The thought of never seeing your friends and family again aside, you imagine if you stayed here much longer, Sister Aibell would be serving you up for dinner before the end of the week.\n\n“Crying shame,” says Father O’Reilly, “but I suppose it can’t be helped. Well, follow me then ${Name}, and I’ll show you where our most holy mushroom is kept.”\n\n*page_break\n\nFollowing Father O’Reilly to the back of the church, you all stop when you come to a heavily locked door guarded by what appears to be a large troll with a great, wooden club in his hand.\n\n“Uhh... What small human do here?” the troll asks Father O’Reilly, pointing a huge, fat finger right in your face. “You want Og smash it in face?”\n\n“Oh bless me Brother, no need for that I’m sure.” the priest comes to your defence.\n\n“That would make a big mess!” Luna adds. “I hear humans are really squishy.”\n\n“Apologies on his behalf young ${Name},” says Father O’Reilly. “This is Brother Og. He’s been guarding the Sacred Shiitake for years now. Brother Og, this here is ${Name}. ${He_She}’s come here to take the Sacred Shiitake.”\n\n“You give mushroom away?” asks Og.\n\n“Why of course Brother Og,” the priest tells him. “What are we here for if not to help those in need, after all?”\n\n“What Og guard now?” the troll asks, looking quite grumpy about the whole situation.\n\n“Hmm... I hadn’t thought of that. But don’t you worry yourself Brother. We can’t very well have a guard that’s not guarding anything, can we? I’ll take a stroll this very afternoon and see if I can’t find ye a nice four leafed clover to guard, how’s that?” Father O’Reilly suggests.\n\n“That good,” says Brother Og.\n\n*page_break\n\n“You know, this all reminds me of a tale I heard awhile back. Have a listen if ye will ${Name}, and see what you make of it;\n\nThere was once a troll much like Og here, guarding a vault filled with treasure he was. A thief walked up to the troll, but the guard stood his ground and declared, “None shall pass!” The next day, the thief returned and tried to break in under cover of darkness, but the troll caught him and chased him away yelling, “None shall pass!” Finally, the thief returned wearing a strange costume. Approaching the troll, he said to him, “Here I am, now stand aside. You said you’d let me pass.” The troll thought about this for a second and said, “I did say that didn’t I? Well, I s’pose I’ll have to let you in then.” And with that, the thief enters the vault and leaves unharmed with all the treasure. Now, after hearing this story can you tell me, what was the thief disguised as?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Nun\n    *if (\"$!!{Riddle_Nun}\" = \"NUN\") or (choice_randomtest)\n      *goto Nun\n    *else\n      *goto Nun_Incorrect\n  #Ask Luna for a hint.\n    *if Nun_Hint = 0\n      *set Hints + 1\n    *goto Hint_Nun\n  #Eat a magic bean.\n    *if Nun_Bean = 0\n      *set Beans + 1\n    *goto Bean_Nun\n\n*label Hint_Nun\n*set Nun_Hint 1\n\n“That’s strange,” Luna says as she ponders the riddle. “The troll said “None shall pass” but he let the thief pass when he was in disguise. I suppose that means the thief must have been “none” but that doesn’t make any sense... You know, now I think of it, I heard Father O’Reilly calling one of the Sisters a “none” before. What does that mean?”\n\nThere was once a troll guarding a vault filled with treasure. A thief walked up to the troll, but the guard stood his ground and declared, “None shall pass!” The next day, the thief returned and tried to break in under cover of darkness, but the troll caught him and chased him away yelling, “None shall pass!” Finally, the thief returned wearing a strange costume. Approaching the troll, he said to him, “Here I am, now stand aside. You said you’d let me pass.” The troll thought about this for a second and said, “I did say that didn’t I? Well, I s’pose I’ll have to let you in then.” And with that, the thief enters the vault and leaves unharmed with all the treasure. What was the thief disguised as?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Nun\n    *if (\"$!!{Riddle_Nun}\" = \"NUN\") or (choice_randomtest)\n      *goto Nun\n    *else\n      *goto Nun_Incorrect\n  #Eat a magic bean.\n    *if Nun_Bean = 0\n      *set Beans + 1\n    *goto Bean_Nun\n\n*label Bean_Nun\n*set Nun_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Nun.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Nun\n    *if (\"$!!{Riddle_Nun}\" = \"NUN\") or (choice_randomtest)\n      *goto Nun\n    *else\n      *goto Nun_Incorrect\n\n*label Nun_Incorrect\n\n“No, that’s not the answer,” Father O’Reilly tells you. “Think about what the troll said, it’s actually really simple.”\n\nThere was once a troll guarding a vault filled with treasure. A thief walked up to the troll, but the guard stood his ground and declared, “None shall pass!” The next day, the thief returned and tried to break in under cover of darkness, but the troll caught him and chased him away yelling, “None shall pass!” Finally, the thief returned wearing a strange costume. Approaching the troll, he said to him, “Here I am, now stand aside. You said you’d let me pass.” The troll thought about this for a second and said, “I did say that didn’t I? Well, I s’pose I’ll have to let you in then.” And with that, the thief enters the vault and leaves unharmed with all the treasure. What was the thief disguised as?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Nun\n    *if (\"$!!{Riddle_Nun}\" = \"NUN\") or (choice_randomtest)\n      *goto Nun\n    *else\n      *goto Nun_Incorrect\n  #Ask Luna for a hint.\n    *if Nun_Hint = 0\n      *set Hints + 1\n    *goto Hint_Nun\n  #Eat a magic bean.\n    *if Nun_Bean = 0\n      *set Beans + 1\n    *goto Bean_Nun\n\n*label Nun\n\nFather O’Reilly laughs at your answer. “That’s right ${Name}, he was dressed as a nun. After all, the troll did say, “Nun shall pass,” so not wanting to go back on his word, he let the thief through.” As Father O’Reilly explains this, he unlocks the door that Og was guarding and opens it, revealing nothing but pure darkness ahead of you. Taking a lantern from the wall, the priest hands it to you. You walk into the room with Luna, but you soon realize that Father O’Reilly isn’t following. “I’m afraid that this is where I must leave you ${Name},” the priest tells you. “There is one more task you must complete to prove yourself worthy of our most holy relic, and you must preform this task alone. Good luck my child. I pray you have the Sacred Shiitake in your hands when I see you next.” And with that, the priest closes the door behind him, leaving you and Luna alone in the dark.\n\n*page_break\n\n“That’s not good,” you mutter to Luna.\n\n“Oh, don’t worry ${Name}, I’m sure we can figure this out all by ourselves... Hey, what’s that?” the wisp asks.\n\nLuna flutters away and you follow her, noticing a faint, golden glow coming from a crack in the wall. Being far smaller than you, Luna takes it upon herself to squeeze through the gap to get a better look. “It’s the mushroom!” you hear her call before she flies back through the hole to excitedly squeal in your face. “It’s the Sacred Shiitake! It’s right there!” she yells, pointing.\n\nGetting down on your knees, you take a peek through the crack in the wall. Sure enough, what you see is a glowing, gold creation embedded with jewels. It looks almost like an ancient chalice, except instead of there being a cup at the top of the golden stem, there is what looks like a large, golden mushroom with the jewels used to create little spots across it’s surface. “That’s it!” you say excitedly. “But how am I supposed to get it?”\n\n“I’ll get it for you!” Luna volunteers, flying back through the crack in the wall again, but soon realizes that while she might be small enough to fit through the gap, the great, golden mushroom isn’t. “I don’t think this is going to work,” the wisp admits defeat as she flies back to your side.\n\n“There must be some way to get the mushroom out,” you insist, stubbornly.\n\n“Oh definitely!” agrees Luna, “And it’s here somewhere, in this room. Come on, let’s explore!” the wisp suggests.\n\n*page_break\n\nYou walk around the cold, dark room with your lantern held high to light your way. Luna, illuminated by her own light, flutters off in another direction. Eventually you come across a large, stone table, on which sits a bucket of water and an old clay jar. “Hey, I’ve found something,” you tell Luna.\n\n“Me too!” she calls over to you. “There’s two books over here!”\n\n“What kind of books?” you ask.\n\n“Well, one’s that Holey Bible that Father O’Reilly keeps talking about, and the other one’s just a notebook,” she tells you.\n\n“What does the notebook say?” you ask her.\n\n“Let’s see...” Luna mumbles as she takes a second to read. “I think it’s a list of Father O’Reilly’s appointments for the next few days,” she tells you. “I’ll read them out to you;\n\nOn the first day, Father O’Reilly is meeting a man called John at 2:07.\n*line_break\nOn the second day, he’s meeting someone called Mark at 9:41.\n*line_break\nOn the third day he’s meeting a man called James at 4:08.\n*line_break\nOn the fourth day he’s meeting a man called Joshua at 3:15.\n*line_break\nAnd on the fifth day he’s meeting a man called Luke at 8:24.”\n\n*if choice_randomtest\n  *goto Final_Action\n*choice\n  #Solve the riddle.\n    *goto Action_One\n  #Ask Luna for a hint.\n    *if Verse_Hint = 0\n      *set Hints + 1\n    *goto Hint_Verse\n  #Eat a magic bean.\n    *if Verse_Bean = 0\n      *set Beans + 1\n    *goto Bean_Verse\n\n*label Hint_Verse\n*set Verse_Hint 1\n\n“I wonder why the notebook and the bible were put next to each other,” Luna thinks out loud. “Do you think the notes might have something to do with the holey book?”\n\n“Could be,” you tell her.\n\n“Is there any way to find out?” she asks.\n\n“Well back home I’d just look it up on the internet,” you tell her.\n\n“The what-net?” Luna asks you.\n\n“You wouldn’t have heard of it,” you assure her. “It’s something we have back in the human world.”\n\n“Oh,” mumbles Luna. “It’s a shame you don’t have any nets here.”\n\n“Yeah, real shame,” you agree.\n\nOn the first day, Father O’Reilly is meeting a man called John at 2:07.\n*line_break\nOn the second day, he’s meeting someone called Mark at 9:41.\n*line_break\nOn the third day he’s meeting a man called James at 4:08.\n*line_break\nOn the fourth day he’s meeting a man called Joshua at 3:15.\n*line_break\nAnd on the fifth day he’s meeting a man called Luke at 8:24.\n\n*choice\n  #Solve the riddle.\n    *goto Action_One\n  #Eat a magic bean.\n    *if Verse_Bean = 0\n      *set Beans + 1\n    *goto Bean_Verse\n\n*label Bean_Verse\n*set Verse_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]First, fill the jar with water.[/b]\n*line_break\n[b]Second, drink some water.[/b]\n*line_break\n[b]Third, wash your hands.[/b]\n*line_break\n[b]Fourth, wash your feet.[/b]\n*line_break\n[b]Fifth, yell at the water.[/b]\n\n*choice\n  #Solve the riddle.\n    *goto Action_One\n\n*label Action_One\n\nOn the first day, Father O’Reilly is meeting a man called John at 2:07.\n*line_break\nOn the second day, he’s meeting someone called Mark at 9:41.\n*line_break\nOn the third day he’s meeting a man called James at 4:08.\n*line_break\nOn the fourth day he’s meeting a man called Joshua at 3:15.\n*line_break\nAnd on the fifth day he’s meeting a man called Luke at 8:24.\n\nSo far you haven’t done anything. You look at the bucket and the jar on the table. What do you think you should do first?\n\n*choice\n  #Have a drink.\n    *goto Wrong_Action\n  #Wash your face.\n    *goto Wrong_Action\n  #Wash your hands.\n    *goto Wrong_Action\n  #Wash your feet.\n    *goto Wrong_Action\n  #Fill the jar with water.\n    *goto Action_Two\n\n*label Wrong_Action\n\nYou perform the task and suddenly the gap in the wall hiding the Sacred Shiitake slams shut, erasing it from view completely.\n\n“What happened?” you ask Luna.\n\n“I’m not sure, but I think you did something wrong,” she tells you. “Maybe you should start from the beginning and try again.\n\nOn the first day, Father O’Reilly is meeting a man called John at 2:07.\n*line_break\nOn the second day, he’s meeting someone called Mark at 9:41.\n*line_break\nOn the third day he’s meeting a man called James at 4:08.\n*line_break\nOn the fourth day he’s meeting a man called Joshua at 3:15.\n*line_break\nAnd on the fifth day he’s meeting a man called Luke at 8:24.\n\n*choice\n  #Solve the riddle.\n    *goto Action_One\n  #Ask Luna for a hint.\n    *if Verse_Hint = 0\n      *set Hints + 1\n    *goto Hint_Verse\n  #Eat a magic bean.\n    *if Verse_Bean = 0\n      *set Beans + 1\n    *goto Bean_Verse\n\n*label Action_Two\n\nYou fill the jar up with water and hear a loud rumbling in the wall behind you. Turning around, you see that the small crack in the wall hiding the Sacred Shiitake has gotten ever so slightly wider.\n\n“It’s working! Do you think the mushroom will fit through the gap in the wall now?” you ask Luna.\n\n“No, it’s still too small,” she tells you. “Try something else.”\n\nOn the first day, Father O’Reilly is meeting a man called John at 2:07.\n*line_break\nOn the second day, he’s meeting someone called Mark at 9:41.\n*line_break\nOn the third day he’s meeting a man called James at 4:08.\n*line_break\nOn the fourth day he’s meeting a man called Joshua at 3:15.\n*line_break\nAnd on the fifth day he’s meeting a man called Luke at 8:24.\n\nSo far you have filled the jar with water. You look at the bucket and the jar on the table. What do you think you should do next?\n\n*choice\n  #Have a drink.\n    *goto Action_Three\n  #Wash your face.\n    *goto Wrong_Action\n  #Wash your hands.\n    *goto Wrong_Action\n  #Wash your feet.\n    *goto Wrong_Action\n  #Pour the water from the jar back into the bucket.\n    *goto Wrong_Action\n\n*label Action_Three\n\nYou drink from the jar of water and once more the gap in the wall widens.\n\n“Wow, I have no idea how you’re doing that, but you’re doing a great job, keep it up!” Luna tells you.\n\nOn the first day, Father O’Reilly is meeting a man called John at 2:07.\n*line_break\nOn the second day, he’s meeting someone called Mark at 9:41.\n*line_break\nOn the third day he’s meeting a man called James at 4:08.\n*line_break\nOn the fourth day he’s meeting a man called Joshua at 3:15.\n*line_break\nAnd on the fifth day he’s meeting a man called Luke at 8:24.\n\nSo far you have filled the jar with water and drunk from the jar. You look at the bucket and the jar on the table. What do you think you should do next?\n\n*choice\n  #Wash your face.\n    *goto Wrong_Action\n  #Wash your hands.\n    *goto Action_Four\n  #Wash your feet.\n    *goto Wrong_Action\n  #Pour the water from the jar back into the bucket.\n    *goto Wrong_Action\n  #Pour the water over your head.\n    *goto Wrong_Action\n\n*label Action_Four\n\nYou wash your hands in the water and the gap in the wall opens even more.\n\n“I think the gap’s nearly big enough for the mushroom to fit through!” Luna squeals excitedly. “Do it again, do it again!”\n\nOn the first day, Father O’Reilly is meeting a man called John at 2:07.\n*line_break\nOn the second day, he’s meeting someone called Mark at 9:41.\n*line_break\nOn the third day he’s meeting a man called James at 4:08.\n*line_break\nOn the fourth day he’s meeting a man called Joshua at 3:15.\n*line_break\nAnd on the fifth day he’s meeting a man called Luke at 8:24.\n\nSo far you have filled the jar with water, drunk from the jar and washed your hands. You look at the bucket and the jar on the table. What do you think you should do next?\n\n*choice\n  #Wash your face.\n    *goto Wrong_Action\n  #Wash your feet.\n    *goto Action_Five\n  #Pour the water from the jar back into the bucket.\n    *goto Wrong_Action\n  #Pout the water over your head.\n    *goto Wrong_Action\n  #Pour the water onto the floor.\n    *goto Wrong_Action\n\n*label Action_Five\n\nYou splash some of the water on your feet and the gap in the wall opens even wider. \n\n“You’re nearly there!” Luna encourages you. “Do that one more time and I think the mushroom will fit through the gap!”\n\nOn the first day, Father O’Reilly is meeting a man called John at 2:07.\n*line_break\nOn the second day, he’s meeting someone called Mark at 9:41.\n*line_break\nOn the third day he’s meeting a man called James at 4:08.\n*line_break\nOn the fourth day he’s meeting a man called Joshua at 3:15.\n*line_break\nAnd on the fifth day he’s meeting a man called Luke at 8:24.\n\nSo far you have filled the jar with water, drunk from the jar, washed your hands and washed your feet. You look at the bucket and the jar on the table. What do you think you should do next?\n\n*choice\n  #Wash your face.\n    *goto Wrong_Action\n  #Pour the water from the jar back into the bucket.\n    *goto Wrong_Action\n  #Pour the water over your head.\n    *goto Wrong_Action\n  #Pour the water onto the floor.\n    *goto Wrong_Action\n  #Yell at the water.\n    *goto Final_Action\n\n*label Final_Action\n*achieve relic\n*set Mushrooms + 1\n*set Sacred_Shiitake 1\n\n*image Sacred_Shiitake.png\n\nWell, this feels very strange but you get yourself as riled up as you can and give the jar of water a very angry glare. “You... Bad, bad water!” you rebuke it. “You start behaving right now or I’ll... Give you a stern warning and wag my finger at you! Then you’ll be sorry!” The water itself doesn’t do anything noticeably different, but you suddenly hear a loud creaking sound and turn to see that the gap in the wall is completely opened.\n\n“Hurray!” squeals Luna, and she flies through the gap to retrieve the Sacred Shiitake. Unfortunately, she’s not quite strong enough to lift it. Luckily, the gap in the wall is easily large enough for you to fit your arm through, and so you simply pick the mushroom up yourself.\n\n“Congratulations my child!” you hear Father O’Reilly behind you, and turn to see him standing in the open doorway. “You managed to solve the final riddle! Of course, the appointments in my little diary were all actually verses from the book of God.\n\nJohn 2:7, Jesus said to the servants, “Fill the jars with water”; so they filled them to the brim.\n*line_break\nMark 9:41, For whoever gives you a cup of water to drink because of your name as followers of Christ, truly I say to you, he will not lose his reward.\n*line_break\nJames 4:8, Draw near to God and He will draw near to you. Cleanse your hands, you sinners; and purify your hearts, you double-minded.\n*line_break\nJoshua 3:15, Now the Jordan is at flood stage all during harvest. Yet as soon as the priests who carried the ark reached the Jordan and their feet touched the water’s edge.\n*line_break\nAnd finally, Luke 8:24, The disciples went and woke him, saying, “Master, Master, we’re going to drown!” He got up and rebuked the wind and the raging waters; the storm subsided, and all was calm.\n\n*page_break\n\nAnd so you solved the final riddle, all by yourself to be sure! I’m so proud of you my child, I never doubted you for a second.”\n\n“Good to know,” you tell the strange old priest with a smile, feeling rather proud yourself.\n\n“And now we’re one step closer to getting you back home!” Luna announces happily.\n\n“Why don’t you come back too?” you ask Father O’Reilly. “I’m sure the portal has enough room for both of us.”\n\n“Well that’s very kind of ye child, but no,” Father O’Reilly refuses. “For I am sorely needed here, to spread the word of God to my blessed congregation.”\n\n“But you must miss your home back in Ireland,” you insist.\n\nAt that statement, the priest raises an eyebrow, looking rather confused. “By the sweet beard of Lord Jesus Christ Himself ${Boy_Girl}, what in God’s name led ye to believe I was Irish?”\n\n“Uh...” you mumble nervously. “No reason.”\n\n“But if your travels ever take you anywhere near my beautiful home in Tokyo, please tell my friends and family that Father O’Reilly said Kon'nichiwa,” he says.\n\n“I’ll be sure to do that,” you assure the priest.\n\n“Sayōnara!” Luna bids Father O’Reilly farewell with a traditional Japanese bow, and the two of you are on your way.\n\n*page_break\n*goto_scene Map", "clearing": "*temp Riddle_Luna\n*temp Luna_Hint 0\n*temp Luna_Bean 0\n\n*if Mushrooms \u003c 5\n  *goto Mushrooms_Incomplete\n*else\n  *goto Mushrooms\n\n*label Mushrooms_Incomplete\n\nYou return to the clearing where Willow is waiting for you. “Back so soon?” asks the dryad. “How many enchanted mushrooms have you found?”\n\n“${Mushrooms},” you tell her.\n\n“Well then, you’d better go and find some more,” she tells you.\n\n*page_break\n*goto_scene Map\n\n*label Mushrooms\n\nYou return to the clearing where Willow is waiting for you. “Back so soon?” asks the dryad. “How many enchanted mushrooms have you found?”\n\n“We found them all!” you tell her proudly.\n\n“Wonderful!” Willow declares as she claps her branched hands together. “Well, don’t just stand there ${Boy_Girl}, you’re wasting nobody’s time but your own. Go and fix my portal.”\n\nAnd so you set about arranging the five mushrooms in a circle, the Funfair Fungus, the Sacred Shiitake, the Toadstool Trophy, the Mushroom Medallion and the Possessed Portobello. Unfortunately, even after all of the mushrooms are in place, there appears to be a rather obvious gap.\n\n“Well, this is embarrassing,” Willow says as she looks over the new portal. “I count five mushrooms in that circle, but I specifically remember telling you that you needed six.”\n\n“But there aren’t any more,” you object. “I went to all the places that Luna told me and I found all the mushrooms there. I don’t know where else to look.”\n\n*page_break\n\nWillow just shakes her head in disappointment. “Poor, closed-minded human. Have you really learned nothing in the time you’ve spent here?” Willow asks. “The first, most obvious thing I’d expect you to learn from this world is that things are not always as they seem.”\n\n“I know that,” you assure the dryad. “But I don’t see how that helps.”\n\nWillow thinks about this for a moment until finally a smile twists her lips. “Perhaps it would be easier for you if I posed you the solution in the form of a riddle,” she offers.\n\n“If you wish to see your friends and waken from this dream,\n*line_break\nYou first must learn that things here are not always as they seem.\n*line_break\nSo take the final step into the world that you belong,\n*line_break\nThe last mushroom is with you and it has been all along.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Luna\n    *if (\"$!!{Riddle_Luna}\" = \"LUNA\") or (choice_randomtest)\n      *goto Luna\n    *else\n      *goto Luna_Incorrect\n  #Ask Luna for a hint.\n    *if Luna_Hint = 0\n      *set Hints + 1\n    *goto Hint_Luna\n  #Eat a magic bean.\n    *if Luna_Bean = 0\n      *set Beans + 1\n    *goto Bean_Luna\n\n*label Hint_Luna\n*set Luna_Hint 1\n\n*image Luna.png\n\nLuna only shrugs her shoulders in response. “Don’t look at me. I don’t see anything else that looks like a mushroom. Do you?”\n\nIf you wish to see your friends and waken from this dream,\n*line_break\nYou first must learn that things here are not always as they seem.\n*line_break\nSo take the final step into the world that you belong,\n*line_break\nThe last mushroom is with you and it has been all along.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Luna\n    *if (\"$!!{Riddle_Luna}\" = \"LUNA\") or (choice_randomtest)\n      *goto Luna\n    *else\n      *goto Luna_Incorrect\n  #Eat a magic bean.\n    *if Luna_Bean = 0\n      *set Beans + 1\n    *goto Bean_Luna\n\n*label Bean_Luna\n*set Luna_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Luna.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Luna\n    *if (\"$!!{Riddle_Luna}\" = \"LUNA\") or (choice_randomtest)\n      *goto Luna\n    *else\n      *goto Luna_Incorrect\n\n*label Luna_Incorrect\n\nWillow just shakes her head when she hears your answer. “I’m surprised that after all this time you still don’t see... But do not give up child, try again. Solve this one last riddle and you can go back home.”\n\nIf you wish to see your friends and waken from this dream,\n*line_break\nYou first must learn that things here are not always as they seem.\n*line_break\nSo take the final step into the world that you belong,\n*line_break\nThe last mushroom is with you and it has been all along.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Luna\n    *if (\"$!!{Riddle_Luna}\" = \"LUNA\") or (choice_randomtest)\n      *goto Luna\n    *else\n      *goto Luna_Incorrect\n  #Ask Luna for a hint.\n    *if Luna_Hint = 0\n      *set Hints + 1\n    *goto Hint_Luna\n  #Eat a magic bean.\n    *if Luna_Bean = 0\n      *set Beans + 1\n    *goto Bean_Luna\n\n*label Luna\n\n“Luna!” you gasp when you suddenly realize how much your little glowing wisp friend resembles some sort of fungus. “Luna’s the last mushroom!”\n\n“I’m a mushroom?” asks Luna, sounding very confused.\n\n“Yes dear, you’re a mushroom,” Willow tells her. “Did you forget?\"\n\n“But I thought Luna was a will-o’-the-wisp,” you object. “How can she be a mushroom too? That doesn’t make any sense.”\n\n“This is the land of dreams, child,” Willow reminds you. “A thing does not need to make sense to be so.”\n\n“This is comfy!” Luna declares as she nestles herself in the grass between the Possessed Portobello and the Funfair Fungus. “I think I’m going to like being a mushroom.”\n\n“That’s good Luna,” you tell her as you look down on the completed circle. “Wow... I guess this is goodbye,” you say, a little sad to be leaving after everything you’ve gone through in this weird and wonderful world.\n\n“Not quite,” Willow stops you. “There is still one more riddle for you to solve.”\n\n“What’s that?” you ask her.\n\n“My own,” she reminds you, once more reciting the riddle that she gave you at the very beginning of your journey.\n\n*page_break\n\n“Fear not to make mistakes or to waste our time,\n*line_break\nFor to err is human and being human is no crime.\n\nThe light will help to guide your path in times that you need aid,\n*line_break\nBut with each use you’ll see the light will slowly start to fade.\n*line_break\nTwenty times and you will see the strain is too much to bare,\n*line_break\nAnd it won't be in any state to guide you anywhere.\n\nNow magic is a useful tool when you might feel stuck,\n*line_break\nBut I warn you first that more than ten will find you out of luck.\n*line_break\nFor this is not a worthy tool for the brave and wise and clever,\n*line_break\nAnd only those who prove there worth will find the precious treasure.\n\nSo now ${Name}, do you understand?”\n\n\"I didn’t when I first came here,” you admit, “but I think I do now.”\n\n“Then explain it,” Willow tells you.\n\n*page_break\n\nPerhaps the time you have spent in this world has given you a better understanding of the land of dreams. Perhaps you’ve just solved so many riddles that this one seems easy by comparison. Either way, you understand completely. “The first part means that it doesn’t matter here if you answer a riddle wrong. You can always try again until you get it right, and you won’t get punished for it.”\n\n“Just so,” Willow confirms. “After all, the only true failure is in giving up. A saying that both our worlds have in common, I believe.”\n\n“Our world has lots of great sayings!” Luna announces. “Like, “Never eat your Uncle Stan’s pet phoenix unless you want to burn your tongue,” that one’s useful.”\n\n“Very good advice,” you tell Luna. “So I guess the second part of the riddle was about Luna. She was the light that guided my path because she always offered me advice when I couldn’t solve a riddle... But I guess your riddle was a warning not to ask her for help too many times, or her light would fade and she wouldn’t be able to help me any more.”\n\n“Exactly right,” Willow says, looking rather proud of you. “And the final part?”\n\n“Well it says magic’s a useful tool when you’re stuck, so it must be talking about the magic beans,” you explain. “But it’s warning me not to use too many because I need to prove my worth to find treasure... So my grandma was right?” you ask, a little excited. “Is there really treasure?”\n\n“You’ll just have to see,” Willow taunts you, holding out her hand. “But first I think you should give me back those magic beans I leant you.”\n\nWith no further use for them, you reach into your pocket for the bag of magic beans and hand them back to the dryad. “Now let’s see how many you used,” she says as she quickly rummages through the bag. “Hmm... ${Beans},” \n*if Beans > 10 \n  she says, looking quite disappointed. “Pity.”\n*if Beans \u003c= 10 \n  she says, sounding quite pleased with you. “It’s looking hopeful.”\n\n*page_break\n\n“Does ${Name} have to go now?” Luna asks, for once looking quiet upset.\n\n“Yeah, I guess I do. Lucas and Sophie will be waiting for me,” Looking from Luna to Willow and back again, you have to admit you feel a little sad to be leaving yourself. “Thanks for everything,” you tell them both. “I mean I guess you’re the ones that got me stuck here in the first place... But you helped me get back in the end, and that’s what matters, right?”\n\n“I’m glad you see it that way,” Willow tells you with a smile.\n\n“I’m going to miss you ${Name}!” Luna cries, as she wipes tears away from her eyes.\n\n“Will I ever see you again?” you ask them both.\n\n“I’m sure you will,” Willow reassures you. “We are but creatures of imagination after all. All you have to do is close your eyes, and we will be waiting for you in the land of dreams.”\n\n“Okay,” you whisper, taking a deep breath as you approach the mushroom ring. “I’m ready now.”\n\n“Farewell child,” Willow says, placing a comforting, branched hand on your shoulder. “And good luck.”\n\nAnd with that, you jump into the portal...\n\n*page_break\n*if Hints > 20\n  *goto Bad_Ending\n*if Hints \u003c= 20\n  *goto Good_Ending\n\n\n*label Bad_Ending\n\n... A few seconds pass and it’s becoming quite clear that nothing is happening. “What’s wrong?” you ask Willow. “Am I supposed to do something? Do I have to solve another riddle?”\n\n“I’m trying as hard as I can!” Luna cries out, squeezing her tiny fists as her very faint glow grows ever so slightly lighter and darker until finally it almost goes out all together. “It’s no use, I can’t do it!” she says sadly.\n\nWillow shakes her head and breaths a heavy sigh at your distress. “I’m sorry child, but I did warn you.\n\nThe light will help to guide your path in times that you need aid,\n*line_break\nBut with each use you’ll see the light will slowly start to fade.\n*line_break\nTwenty times and you will see the strain is too much to bare,\n*line_break\nAnd it won't be in any state to guide you anywhere.\n\nAnd poor Luna is looking ever so faint. How many ties did you ask her for help on your travels?”\n\n“Uhh... ${Hints},” you admit.\n\n“${Hints}?” Willow asks, looking horrified. “I told you, the limit is 20! How do you expect the poor wisp to transport you back to your world when she’s already used up all her energy helping you solve your riddles?”\n\n*page_break\n\n“Well I didn’t know asking her for help would put her glow out!” you object. “If you’d wanted me to know that, you could’ve just told me outright instead of giving me that silly riddle.”\n\n“Silly riddle?” Willow repeats, raising an eyebrow at you as if you’d just said the most idiotic thing she’s ever heard. “My dear ${Boy_Girl}, I’m not sure how you failed to notice, but everything here is a ‘silly riddle’. You can’t have a conversation with anybody in this world without being posed a ‘silly riddle’. If you weren’t bright enough to solve it then that’s your own fault, not mine.”\n\n“But then how do I get home?” you ask, getting more and more frustrated. “If the portal doesn’t work then I’m stuck here!”\n\n“We could always find another portal,” Luna suggests, getting bored of sitting in the mushroom circle and flying onto your shoulder.\n\n“I suppose,” Willow murmurs, though doesn’t sound particularly optimistic about the idea. “My brother Oakley is in the next village to the north. I imagine he’ll have a portal of his own.”\n\n*page_break\n\n“Great!” you say enthusiastically. “How far is the village?”\n\n“It’s not far!” Luna tells you with a beaming smile. “We just have to go through nightmare forest, across the rocky, rapid river, then it’s just a quick climb over the volcano of doom and we should be there by morning!”\n\n“... I don’t suppose I have any other options?” you ask, nervously.\n\n“Oh come on ${Name}, it’ll be fun!” Luna encourages you as she starts to guide you on your new quest.\n\n“Good luck human!” Willow calls after you as you leave. “Don’t worry, the volcano of doom isn’t nearly as dangerous as it sounds. But watch out for the Leviathan in the rocky, rapid river. He can get rather peckish this time of year.”\n\n“Thanks for the warning!” you call back, feeling less optimistic about this journey with every step you take.\n\n“Don’t look so sad ${Name}, it means you get to spend more time with me! We can even do some more riddles along the way!” Luna suggests cheerfully, not even considering the idea that you might be sick of riddles by now. “I just thought of a great riddle about mushrooms... Why did the mushroom go to the party?”\n\n“Luna, that’s not a riddle, that’s a joke,” you tell her as you follow the wisp on your next adventure. “It’s not even a good joke. It’s one of those terrible jokes you get every year in a cheap Christmas cracker.”\n\n“Because he was a fungi!” she tells you.\n\n*goto ending\n\n*label Good_Ending\n*achieve home\n\n... “${Name}?” you hear a familiar voice speaking your name. “Hey ${Name}, wake up!”\n\n“We’ve been looking all over for you!” you hear another, slightly more masculine voice. “Have you really been here this whole time?”\n\nSlowly you open your eyes to see your sister Sophie and your best friend Lucas standing over you. “Huh?” you ask, suddenly feeling confused. “What happened?”\n\n“We went to get ice cream but then we realized you weren’t there and we had to come back to look for you,” Sophie explains. “You must’ve fallen asleep.”\n\n“Yeah and we’ve been looking for you for nearly half an hour!” Lucas complains. “Have a nice nap?”\n\n*page_break\n\nYou think about it for a moment, but find the more you think the more confused you get. “I don’t remember,” you admit. “You know, I don’t really remember anything. We were playing hide and seek and then... Are you sure I was only gone for half an hour? It feels way longer than that.”\n\n“Oh no ${Name}, you squashed the fairy ring!” Sophie whines, and as you stand up you can see that you must have taken a nap in the middle of the mushroom circle and crushed them all in the process.\n\n“Oh no!” Lucas declares, sarcastically. “Now how will you ever find the fairy’s treasure?”\n\n“Dryad’s,” you find yourself thinking out loud.\n\n“What’s
