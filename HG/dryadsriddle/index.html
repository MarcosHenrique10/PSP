if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Rosie_Coffin\n\nYou open the tiny coffin door and are absolutely terrified to discover that, instead of the Possessed Portobello, Rosie the living doll is sleeping inside the coffin with her butcher’s knife still clenched in her hands. As quietly as you possibly can, you close the coffin lid once more before the homicidal doll wakes up.\n\n“That was close,” you whisper to Luna, breathing a sigh of relief.\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Bones_Coffin\n\nYou open the coffin door, but instead of the Possessed Portobello, you only see Bones the skeleton, who looks quite annoyed at being disturbed. “You again?” he asks irritably. “Listen kid, I’m grateful you opened the cell and all, but didn’t your mother ever tell you not to disturb the dead? It’s very disrespectful!”\n\n“Sorry! Wrong coffin,” you explain before closing the lid once more. “Looks like I guessed wrong.”\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “You’re lucky it was just the skeleton in there. The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Drow_Coffin\n\nYou open the coffin door, but instead of the Possessed Portobello, you find one of the svartálfar brothers inside, either Slicer or Dicer. You can’t quite tell which. Suddenly opening his eyes, the black elf gives a smirk when he sees you. “Still here kid?” he asks. “You lost in this big, bad house? Or is there someone you need... You know... Taking care of? Me and my brother would be happy to help you out, but I should let you know, our services don’t come cheap.”\n\n“No, I’m fine,” you assure him, closing the coffin once more. “Looks like I guessed wrong.”\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “You’re lucky it was just one of the brothers in there. The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Grimm_Coffin\n\nYou open the coffin door, but instead of the Possessed Portobello, you are quite worried to find Grimm the reaper inside. “Ah, ${Name} wasn’t it? Good to see you again. You know, I never did find the poor soul those devil birds were singing for. Are you absolutely sure it wasn’t you?”\n\n“Yes! Very, very sure! Sorry to wake you,” you insist before slamming the coffin lid back down. “That was close,” you whisper to Luna, breathing a sigh of relief.\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Vipera_Coffin\n\nYou start to open the coffin door when you hear a faint rattling noise, followed by hissing as two snake heads emerge from inside the coffin. It seems that, rather than finding the Possessed Portobello, you have in fact found the coffin in which Vipera the gorgon is resting. Knowing you’re dead if she opens her eyes, you very slowly close the coffin lid, careful not to bother the snakes as you do so.\n\n“That was close,” you whisper to Luna, breathing a sigh of relief.\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Hollow_Coffin\n\nYou open the coffin door, but instead of the Possessed Portobello, you find Hollow the butler with his head tucked under his arm. The light hits his eyes and they shoot open, turning to you with a rather irritated glare. “You again?” he asks grumpily. “Any particular reason you see fit to wake me at this hour?”\n\n“Sorry, wrong coffin!” you apologise before shutting the coffin lid again. “Looks like I guessed wrong.”\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “You’re lucky it was just the headless man in there. The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Possessed_Portobello\n*achieve whisperer\n*set Mushrooms + 1\n*set Possessed_Portobello 1\n\n*image Possessed_Portobello.png\n\nHolding your breath, you slowly open the coffin door, afraid that a misguided guess might cause you to unleash some terrifying monster intent on draining your blood or turning you to stone or eating you alive. Much to your relief though, the open coffin reveals a white fungus decorated with a sugar skull face like something you’d see on the day of the dead.\n\n“The Possessed Portobello!” Luna cheers with glee.\n\n“Finally,” you mutter as you pick up the mushroom. “Now lets get out of here before we get attacked by a horde of zombies or something.”\n\nUnfortunately, your encounters with the supernatural are not quite over yet. You suddenly hear a haunting wail that echoes throughout the house and sends a shiver running down your spine. The cries draw nearer and nearer until a ghostly man, clothes soaked through with water and covered in pond weeds flies through the door. At first you are terrified, but you soon realize that this ghost is no stranger.\n\n“... Wait,” you mutter as you take a step closer. “... Cornelius the Caretaker?”\n\n*page_break\n\n“You still here ${Boy_Girl}?” the spirit of the old wizard asks as he tries to shake some of the weeds and algee from his ghostly form. “Ah, I see you found that mushroom, good. Now clear off while you still can, and mind the old well on your way out. Slipped in trying to feed the monster. Nearly took my arm off this time, she did.”\n\n“Ah...” you say awkwardly as you glance over the poor, deceased gardener. “Real sorry to hear that.”\n\n“Well that explains what all those devil birds were doing on the roof,” Luna announces, rather tactlessly.\n\n“Eh?” grumbles the old wizard. “What you mean by that, little wisp?”\n\n“Well, uh...” you mutter, not really sure how to break the news to him. “I hate to tell you this but... You don’t quite look yourself, you know?”\n\n“What are you talking about? I’ve never felt better in my life!” Cornelius says, sounding quite offended. “My back’s stopped aching, my neck doesn’t crick when I turn it any more. Even the old pain in my shoulder’s gone too, look!” and the wizard lifts his arm as high as it will go to demonstrate. When he lowers it back though, he pauses, realizing that his arm is considerably more transparent than it used to be.\n\n“Ah!” the ghost cries out in shock, looking down and noticing for the first time that he can see the floor through his feet. “I’m dead? No, I can’t be!” he wails with despair. “Who’s going to protect the house when I’m gone?”\n\n*page_break\n\n“Cornelius?” you hear a voice whisper and turn around to see the visage of Charlotte, emerging from the coffin where she rested. “Can it truly be?” she asks as she floats towards the spirit of the old man. “After all these years, you have finally returned to me!”\n\n“Charlotte?” the old man asks, sounding rather confused. “Is it really you?”\n\n“Wait...” you ask, looking back and forth between the two. “You mean... Him?” \n\n“I have been waiting for you my love!” Charlotte declares as she takes Cornelius’s ghostly hands in hers. “I stood at the alter till I wasted away, but you never came. Where were you?”\n\n“I remember!” the old man declares suddenly. “We were getting married, I remember it now! We’d been planning the wedding for months. Then on the morning of the wedding the flower girl lost her bouquet, so I went to pick some forget-me-so... And you know what, I can’t remember what happened after that. I think I went for a walk and didn’t quite know where I was going... And I vaguely remember stumbling into a nest of angry roc chicks. Not sure how I got out of that one. Then I moved into a cave full of gnomes and I think they gave me a medal at some point, though I can’t for the life of me remember what for... And somehow I ended up joining a travelling circus for awhile, but then I remembered I hadn’t seen you in months and you must be missing me... So I came back home, but when I returned you were gone. The house was completely abandoned, except that now it was haunted by a lady in a wedding dress that wept all through the night... I’m so sorry Charlotte, it was going to be the most wonderful day of our lives, I didn’t mean to forget.”\n\n“Oh my love!” Charlotte cries out as she throws her arms around him. “It is I that should apologise. I should have known you would never abandon me. It was those stupid flowers that made you forget, but none of it matters now that we’re finally together again! Please, promise you’ll never leave me. Promise that we’ll be together forever!”\n\n“I promise,” the old wizard says as he finally wraps his bride in his arms. “I will stay by your side until the end of time.” And with that promise, the visage of the two ghosts slowly fades away, as they vanish into whatever world is waiting for them on the other side.\n\n“Awh! That’s sweet!” Luna declares happily.\n\n“That was strange...” you mutter to yourself. “But I’m glad Charlotte finally got her happy ending. Now lets hurry up and get out of here before anybody else tries to kill us.”\n\n*page_break\n*gosub trial_end\n*goto_scene Map\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first chapter is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2017-08-25 $3.99 $2.99 purchased\n*abort\n", "introduction": "*temp Riddle_Tree\n*temp Riddle_Moon\n\n“Found you!” your friend Lucas declares as he pokes his head round the corner, finding your hiding place beneath a crumbling archway of the abandoned church on top of the hill.\n\n“No fair, Sophie told you where I was!” you say accusingly, pointing at your sister who was trying to steal your hiding place only a minute ago and who you clearly saw leading Lucas up the hill, straight towards you.\n\n“I’m bored of this game anyway,” Sophie tells you. “Let’s play something else.”\n\n“Like what?” you ask.\n\n“I’ll race you both down the hill!” Lucas announces as he sits himself on the ground. “Last one to the bottom is a little girl!” he challenges you both before he starts rolling down through the long, green grass.\n\n*choice\n  #I’m no little girl! I’ll make it to the bottom of the hill before either of them.\n    *set Gender \"Male\"\n    *set Boy_Girl \"boy\"\n    *set He_She \"he\"\n    *set Him_Her \"him\"\n    *set His_Hers \"his\"\n    *set His_Her \"his\"\n    *set Mr_Miss \"Mr\"\n    *set Man_Lady \"man\"\n    *set Laddie_Lassie \"laddie\"\n    *goto Boy\n  #I might be a girl but I'm still the fastest. I’ll beat them to the bottom, easy!\n    *set Gender \"Female\"\n    *set Boy_Girl \"girl\"\n    *set He_She \"she\"\n    *set Him_Her \"her\"\n    *set His_Hers \"hers\"\n    *set His_Her \"her\"\n    *set Mr_Miss \"Miss\"\n    *set Man_Lady \"lady\"\n    *set Laddie_Lassie \"lassie\"\n    *goto Girl\n\n*label Boy\n\nEver the competitive one, you practically throw yourself down the hill, rolling as fast as you can until you overtake Lucas and beat both him and Sophie to the bottom.\n\n“I win!” you cry out, victorious. Unfortunately, you are so dizzy from the experience that you can barely stand.\n\n“Oh look, it’s the tree!” Lucas tells you, picking himself up and directing your attention to a large, ancient tree, both coated in and surrounded by a bed of autumn leaves.\n\n“Is that the one we carved our names in last year?” asks Sophie. “Let’s see if they’re still there!”\n\nThe three of you gather round to inspect the tree and sure enough your names are all clearly visible, carved one after another in the tree bark. First Lucas, then Sophie, and finally your own name.\n\n*choice\n  #Jacob.\n    *set Name \"Jacob\"\n    *goto Fairy-ring\n  #Tyler.\n    *set Name \"Tyler\"\n    *goto Fairy-ring\n  #Chris.\n    *set Name \"Chris\"\n    *goto Fairy-ring\n  #Daniel.\n    *set Name \"Daniel\"\n    *goto Fairy-ring\n  #Andrew.\n    *set Name \"Andrew\"\n    *goto Fairy-ring\n  #None of these are my name.\n    Then what is your name?\n    *input_text Name\n    *goto Fairy-ring\n\n*label Girl\n\nEver the competitive one, you practically throw yourself down the hill, rolling as fast as you can until you overtake Lucas and beat both him and Freya to the bottom.\n\n“I win!” you cry out, victorious. Unfortunately, you are so dizzy from the experience that you can barely stand.\n\n“Oh look, it’s the tree!” Lucas tells you, picking himself up and directing your attention to a large, ancient tree, both coated in and surrounded by a bed of autumn leaves.\n\n“Is that the one we carved our names in last year?” asks Sophie. “Let’s see if they’re still there!”\n\nThe three of you gather round to inspect the tree and sure enough your names are all clearly visible, carved one after another in the tree bark. First Lucas, then Sophie, and finally your own name.\n\n*choice\n  #Olivia.\n    *set Name \"Olivia\"\n    *goto Fairy-ring\n  #Emily.\n    *set Name \"Emily\"\n    *goto Fairy-ring\n  #Chloe.\n    *set Name \"Chloe\"\n    *goto Fairy-ring\n  #Isabelle.\n    *set Name \"Isabelle\"\n    *goto Fairy-ring\n  #Hannah.\n    *set Name \"Hannah\"\n    *goto Fairy-ring\n  #None of these are my name.\n    Then what is your name?\n    *input_text Name\n    *goto Fairy-ring\n\n*label Fairy-ring\n\n$!{Name}, right underneath the names of your best friend and your sister. The three of you are practically inseparable in day to day life, so it’s fitting that your names should all be together in the bark of the old tree.\n\n“Hey look, the fairies are back!” Sophie cheers and you and Lucas quickly head over to her to see what she’s talking about.\n\n“Oh, will you stop with the fairies?” Lucas complains. “You talk about them every time you see a toadstool.”\n\n“They’re not toadstools, they’re mushrooms!” Sophie corrects him, folding her arms and looking quite sulky. “And it’s not just one, it’s a ring of them. Grandma told me the mushrooms only grow where the fairies stand, and they grow in circles like that because the fairies dance around in circles. If you step into the circle, you’ll be able to see and hear the fairies, but you can’t stay there too long or they’ll take you away to be a slave in the fairy kingdom, and no one will ever see you again.”\n\n“Not if you’re smart,” you remind Sophie. You don’t believe in all your grandma’s old fairy stories, but you still remember them better than your sister does. “Grandma told me that if you’re smart enough to outwit the fairies, you can escape from the fairy ring and the fairies will be so impressed that they’ll reward you with treasure better than any you could imagine!”\n\n“Well why don’t you jump in the circle then?” Lucas dares you both.\n\n“No way!” Sophie refuses. “I’m not letting the fairies take me away.”\n\n“Why? Are you scared you’re too dumb to get out?” Lucas teases.\n\n“Oh stop arguing,” you scold them both. “There’s no such thing as fairies anyway, look I’ll show you.” And with that, you jump into the centre of the fairy ring.\n\n*page_break\n\nA few seconds pass and nothing happens. No treasure appears, no fairies come to take you away, nothing.\n\n“Maybe it only works at night?” Sophie meekly suggests.\n\n“Don’t be stupid.” Lucas tells your sister, starting to walk away.\n\n“I’m not stupid!” Sophie yells as she chases after him. “Everyone knows that fairies don’t come out in the day, otherwise everybody would see them.”\n\n“I don’t want to talk about fairies any more,” Lucas says firmly, sounding rather bored of the whole thing. “Lets go back to my house and have ice cream.”\n\n“Okay!” declares Sophie, so easy to placate with the promise of sugary things.\n\nYou are about to follow, when suddenly you hear a very faint sound. It is barely more than a whisper and you almost dismiss it as your imagination, but you swear you heard a voice saying, “Look inside the hollow.”\n\nTurning around, you see that there is indeed a hollow in the old tree and you approach it to get a better look. Reaching into the hollow, you can feel your fingers brushing against something, so you scoop it up in your hand and pull it out of the tree. Opening your palm, you discover a small piece of parchment, rolled up into a tiny scroll. You unravel in to discover what looks like a riddle written inside.\n\n“What has a bark but no bite,\n*line_break\nAnd a trunk but no tusks?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Tree\n    *if (\"$!!{Riddle_Tree}\" = \"TREE\") or (choice_randomtest)\n      *goto Tree\n    *if (\"$!!{Riddle_Tree}\" = \"A TREE\")\n      *goto Tree\n    *if (\"$!!{Riddle_Tree}\" = \"THE TREE\")\n      *goto Tree\n    *else\n      *goto Tree_Incorrect\n  #I can't figure it out!\n    *goto Tree_Answer\n\n*label Tree_Incorrect\n\nYou give your answer and you feel like you can hear the faint voice whispering once more. “That’s not right,” you hear it say. “Try again.”\n\n“What has a bark but no bite,\n*line_break\nAnd a trunk but no tusks?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Tree\n    *if (\"$!!{Riddle_Tree}\" = \"TREE\") or (choice_randomtest)\n      *goto Tree\n    *if (\"$!!{Riddle_Tree}\" = \"A TREE\")\n      *goto Tree\n    *if (\"$!!{Riddle_Tree}\" = \"THE TREE\")\n      *goto Tree\n    *else\n      *goto Tree_Incorrect\n  #I can't figure it out!\n    *goto Tree_Answer\n\n*label Tree_Answer\n\nYou think you can hear the voice again, but this time it only says one word.\n\n[b]\"Tree.\"[b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Tree\n    *if (\"$!!{Riddle_Tree}\" = \"TREE\") or (choice_randomtest)\n      *goto Tree\n    *if (\"$!!{Riddle_Tree}\" = \"A TREE\")\n      *goto Tree\n    *if (\"$!!{Riddle_Tree}\" = \"THE TREE\")\n      *goto Tree\n    *else\n      *goto Tree_Incorrect\n\n*label Tree\n*achieve rookie\n\n“Tree,” you say out loud. You were really only talking to yourself, but unfortunately for you, somebody else heard. Suddenly your surroundings start to look a little fuzzy. You think that maybe you should sit down for awhile, but it soon becomes clear that this is far more serious that a simple dizzy spell. Everything is a blur and your entire world is spinning around you, trapping you inside the fairy ring. Eventually though, this bizarre experience passes. The spinning slowly ceases and the world seems to go back to normal.\n\n“What the heck was that?” you ask yourself, completely bewildered and frankly terrified by the whole experience. “Lucas, Sophie! How old were those cheese strips we ate earlier?” you call out, but turning around you see that neither your friend nor your sister are anywhere in sight. In fact the world isn’t how you remember it at all. The hill is behind you like it always was, but the crumbling remains of the ancient church are not crumbling remains at all. A new church building stands in it’s place, tall and proud without so much as a smudge on the stained glass windows.\n\n“Ah, it’s been a long time since one of your kind entered my domain,” you hear a soft, feminine voice speaking behind you. “You solved my little riddle I see. Quite impressive for one so young.”\n*page_break\n\n*image Willow.png\n\nIn that moment, you are practically frozen to the spot. Where did the voice come from? There wasn’t anyone behind you a second ago. Ever so slowly you turn around, thinking that a stranger must’ve been hiding behind the tree. But to your shock, you discover it is the tree itself that spoke. Two slits in the tree’s bark open wide, revealing a pair of green eyes looking straight at you. With a yelp of shock, you stumble backwards, tripping over yourself and crushing several mushrooms as you do so.\n\nWith a groan, the eyes move slightly forward, causing an almost human face to appear in the bark of the tree. Autumn leaves make up the creature’s hair, curling vines become her eyelashes and with a shift of her branches, two arms are formed at her sides with long, pointed twigs for fingers. “Well that was foolish,” the tree says to you. “How do you expect to return home now that you’ve destroyed my portal?”\n\nFor a few seconds, you can only stare at the tree-woman in silence before you finally work up the courage to open your mouth once more. “Ar... Are you a fairy?” you ask.\n\nThe creature scoffs at your question, seeming to take offence at the idea. “Fairy? Child, do I look like a fairy to you? Oh why do I even ask, no doubt you’ve never even seen one in your life. But no ${Boy_Girl}, I am not a fairy. No doubt those attention seeking pests have been taking credit for my portals. It doesn’t surprise me. I bet you human children still think it’s the fairies that come and collect your baby teeth from under your pillows, don’t you? Just as well I suppose. I doubt you’d sleep so well if you knew it was really Tommy Rawhead, come collecting children’s bones. Years ago, the teeth were left as some kind of sacrifice to old Tommy. He takes the teeth and in return, he leaves the rest of the children’s bones intact... But of course the fairies latched onto this story, started following Tommy Rawhead around and slipping coins under the pillows. Now everyone’s forgotten all about poor Tom. They think the fairies take the teeth and use them to build some sort of castle. Ridiculous! As if the fairies could stand to live in a castle made of children’s teeth. It’d be revolting, you human children never brush.”\n\n*page_break\n\n“Then what are you?” you ask the tree.\n\nAt that, she smiles, looking rather proudly down on you. “I ${Boy_Girl}, am a dryad. You have heard of us I hope? Forest nymphs, spirits of the trees. You may call me Willow if you wish. But no need to introduce yourself to me ${Name}, I know very well who you are.”\n\n“Wait, how do you know my name?” you ask, slowly starting to feel braver and getting back to your feet once more.\n\n“Such a foolish question, and there I was thinking you’d be bright after you solved my riddle. I know your name ${Boy_Girl}, because you were one of the three beastly children kind enough to carve your names into my bark back in the human world,” Willow tells you, folding her branch arms and looking rather bitter about it. “Your little gesture of friendship gave me a headache for a month I’ll have you know.”\n\n“Ah...” you mumble, feeling quite guilty. “Sorry about that.”\n\n“Oh, no matter,” the dryad says, waving her branched hand dismissively. “After all, I’d say in this case the punishment far outweighs the crime, since it doesn’t look like you’ll be seeing those little friends of yours any time soon... Not for the rest of your natural life at least.”\n\n*page_break\n\n“What are you talking about?” you ask Willow, not at all liking where this conversation is going. “What’s happened to Lucas and Sophie? Where are they?”\n\n“Absolutely nothing has happened to your friends,” Willow tells you. “And I imagine they are right where you left them. It is you that is lost I’m afraid, though I’m surprised you haven’t noticed that already.”\n\nPausing for a moment, you take in your surroundings once more. “You know, I think I have,” you admit. “But what is this place? It seems the same but some things are... Different.”\n\n“An alternate reality, almost?” Willow suggests. “I would imagine so. This is the realm of dreams my dear, and while they might extend beyond the reaches of your own imagination, what are mortal dreams based on if not reality?”\n\n*page_break\n\nLooking around, you must admit that while everything seems very real, it is all slightly distorted. The hills are too tall, the flowers have too many petals, the tweeting of the birds sounds more like the music of wind chimes, and was the sky always that shade of pink? Now you think of it, you’re not sure you can even see the sky. Your senses are all mixed up. It’s almost as if you can hear the colours and see the sounds. “... I don’t feel myself at all,” you say, starting to feel very concerned.\n\n“No?” asks Willow. “Well perhaps you are not yourself. Maybe you’re somebody else entirely. How would you know?”\n\n“I wouldn’t,” you admit, all your thoughts a jumble. Did what Willow say even make any sense? You really can’t tell what makes sense and what doesn’t any more. Does sense even exist? You don’t know and you don’t like it. “Why did you bring me here?” you ask Willow in frustration. “Why can’t you send me back?”\n\n“Don’t you lay the blame on me child,” Willow scolds you. “You brought yourself here. It was you that entered the portal and answered the riddle which was the key to our world. It certainly wasn’t my plan to keep you here, but as you so carelessly crushed all my mushrooms, the portal is broken, I’m afraid that leaves you stuck. There’s not a lot I can do about it I’m afraid.”\n\n*page_break\n\n“But I can’t stay here!” you object. “My friend and my sister are waiting for me... And my parents will throw a fit if I’m not back in time for dinner... And my dog Buster...”\n\n“Yes, yes, you have a lot to go back home for,” Willow interrupts, looking slightly frustrated by this whole ordeal. “But I’m afraid there’s precious few methods to send a mortal from our world back to yours, and fewer still that would get you there in one piece. No, I’m afraid the portal is the only safe bet I can think of, and you’d have to replace all the mushrooms to get it working again.”\n\n“Then I’ll do that!” you tell the dryad. “I’ll just get some more mushrooms and build the portal again. They can’t be that hard to find.”\n\n“Oh can’t they?” Willow asks, in a challenging voice that suggests to you that they certainly can be that hard to find after all. “I’m afraid that any fungi powerful enough to fuel a portal like mine are incredibly rare indeed. Why, in this whole village I can only think of six.”\n\n“Well that’s a start,” you say, optimistically. “Tell me where they are and I’ll go get them.”\n\n*page_break\n\n“Are you sure?” asks Willow. “I fear the task will be far more difficult than you think child. You are not the only one who wants the mushrooms you see, and to win them, you will have to pay. But things are done very differently in our world than they are in yours. Here, wit and wisdom are valued far more than gold or silver. That is why a riddle was the key to opening my portal. There will be far more riddles ahead for you. Puzzles and posers that’ll test your mind to it’s limits. I’m sorry ${Name}, but I fear this quest is too much to ask for a child like you.”\n\n“But I have to try!” you insist. “It’s the only way to get back home.”\n\n“Very well,” the dryad reluctantly agrees. “It that case, I must at least prepare you by explaining to you the rules of our world...”\n\n*page_break\n\n“Now listen carefully because these rules are very important,” Willow tells you firmly.\n\n“First, whenever you are required to write an answer, the answer will be only a single word or number with no gaps. For example, if I ask you a riddle and you believe that mountain is the answer, you must only write ‘Mountain’, not ‘A mountain’ or ‘The mountain’. The same applies to letters, so if you believe the answer to a riddle is ‘The letter X’, simply write ‘X’ instead.”\n\n“That seems like a very strange rule,” you tell Willow.\n\n“Well get used to it, because there’s several more of them,” she replies.\n\n“Second, if the answer is a number, it must be written as a number, so if you believe the answer is 367, you must write ‘367’ and not ‘Three hundred and sixty seven’.\n\nThird, no punctuation marks of any kind should be included in your answers. No full stops, exclamation marks, question marks, quotation marks, commas or anything like that.\n\nAnd finally, not all riddles will require a written answer. Some may be multiple choice and some require a series of tasks you must perform. So, if you have no idea how to answer a question, try anyway and you may find that a written answer isn’t needed after all.”\n\n[b]The rules can be found in your stats page.[/b]\n\n*page_break\n\n“I do hope you paid attention, because I’m not repeating all of that again,” Willow tells you.\n\n“I’ll remember,” you assure her. “So where are these mushrooms then? How do I get them?”\n\n“Well you are eager to get started, aren’t you?” Willow asks with a smirk. “But I wouldn’t be so quick to go off wondering on your own my ${Boy_Girl}. This is the land of dreams after all, and you know nothing of our world and our ways. You will need a guide I think, and as I am rooted to the ground I’m afraid I can be of little help to you in that department. But fear not young ${Name}, for I have something I believe may be of use to you. That is, if you can prove yourself worthy of it. I have a test for you child, another riddle. Solve it and you will be one step closer to getting back home.”\n\n“And if I answer wrong?” you ask the dryad.\n\nAt that, Willow fixes you with a wicked smile. “If you answer wrong my dear, I will crush your fragile human bones and eat you alive!” A look of terror comes over your face, but Willow only laughs at your expression. “Oh come ${Boy_Girl}, what do you take me for? If you answer wrong then you can guess again until you get it right. Don’t expect me to give you any clues to hurry you up though. Living as the spirit of a tree will teach you patience if nothing else.”\n\n“Okay,” you say, extremely relived. “So what’s the riddle?”\n\nWillow takes a breath a begins to recite a poem.\n\n“At night I come to guide your path,\n*line_break\nAlways whole but sometimes half.\n*line_break\nAlways old but sometimes new,\n*line_break\nNever sad but sometimes blue.\n*line_break\nNever empty, sometimes full,\n*line_break\nNever pushing, always pull.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Moon\n    *if (\"$!!{Riddle_Moon}\" = \"MOON\") or (choice_randomtest)\n      *goto Moon\n    *else\n      *goto Moon_Incorrect\n  #I can't figure it out!\n    *goto Moon_Answer\n\n*label Moon_Incorrect\n\nYou give the dryad your answer but she only shakes her head. “I’m afraid that’s not the answer I was looking for ${Name}, but keep trying, I’m sure you’ll get it eventually.\n\nAt night I come to guide your path,\n*line_break\nAlways whole but sometimes half.\n*line_break\nAlways old but sometimes new,\n*line_break\nNever sad but sometimes blue.\n*line_break\nNever empty, sometimes full,\n*line_break\nNever pushing, always pull.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Moon\n    *if (\"$!!{Riddle_Moon}\" = \"MOON\") or (choice_randomtest)\n      *goto Moon\n    *else\n      *goto Moon_Incorrect\n  #I can't figure it out!\n    *goto Moon_Answer\n\n*label Moon_Answer\n*set Know_Hints 1\n*set Know_Beans 1\n*set Know_Mushrooms 1\n\n\"I really can't figure this one out,” you tell the dryad.\n\nWillow looks quite disappointed but gives you the answer anyway. “Moon child, the answer is the moon. Oh, and speaking of the moon...” With her long, branched fingers, Willow reaches into the tree hollow where you found the first riddle. Pulling her hand out once more, the dryad opens her palm, revealing a tiny, white light inside. “Wake up my pet,” Willow says softly. “We have a visitor.”\n\nA high pitched, squeaky yawn comes from the little light in Willow’s hand and suddenly the thing starts to levitate. “Oh, hello Willow,” the light says, very quickly. “I had another dream about the mortal world! There were children and they were playing hide and seek and then they rolled down a hill and one of them jumped in the mushroom circle, so I told ${Him_Her} where the riddle was and ${He_She} solved it all by ${Him_Her}self! But then ${He_She} disappeared in the portal and I couldn’t talk to ${Him_Her} any more. But it was okay because after that I saw a squirrel and I chased it all the way to...”\n\n“Yes Luna, I know,” Willow interrupts the tiny creature and gestures to you. “Your human arrived just a few moments ago.”\n\n*page_break\n*goto Luna\n\n*label Moon\n*set Know_Hints 1\n*set Know_Beans 1\n*set Know_Mushrooms 1\n\n“Moon?” you ask, and the dryad smiles in return.\n\n“There you are ${Boy_Girl}, I knew you were a bright one. Oh, and speaking of bright things...” With her long, branched fingers, Willow reaches into the tree hollow where you found the first riddle. Pulling her hand out once more, the dryad opens her palm, revealing a tiny, white light inside. “Wake up my pet,” Willow says softly. “We have a visitor.”\n\nA high pitched, squeaky yawn comes from the little light in Willow’s hand and suddenly the thing starts to levitate. “Oh, hello Willow,” the light says, very quickly. “I had another dream about the mortal world! There were children and they were playing hide and seek and then they rolled down a hill and one of them jumped in the mushroom circle, so I told ${Him_Her} where the riddle was and ${He_She} solved it all by ${Him_Her}self! But then ${He_She} disappeared in the portal and I couldn’t talk to ${Him_Her} any more. But it was okay because after that I saw a squirrel and I chased it all the way to...”\n\n“Yes Luna, I know,” Willow interrupts the tiny creature and gestures to you. “Your human arrived just a few moments ago.”\n\n*page_break\n*goto Luna\n\n*label Luna\n\n*image Luna.png\n\nThe light turns around and upon seeing you, lets out the most piercing squeal of excitement you’ve ever heard. “A human!” she cries before flying over to you and fluttering around, less than an inch away from your face. “Willow, it’s here! It’s really here! My first human! I never brought one here before! Hello there little human thing.”\n\n“Uh... Hello?” you mumble, slightly overwhelmed by the creature’s excitement.\n\n“${Name}, this is Luna,” Willow introduces the pair of you to each other. “And no, before you ask, she’s not a fairy either. Our little friend here is a will-o’-the wisp. In your world I believe they are regarded as mischievous spirits set on leading humans off the beaten track until they are completely lost. True in some regards I suppose. In actual fact, wisps are the light between our worlds. They lead you mortals to the doors in your realm, like my own portal, that lead to the world of dreams. Now that you’re here though, she will hopefully aid you in finding your way rather than getting you more lost than you already are... Luna,” she tells the wisp, “I want you to help this human. They have very clumsily destroyed my portal and I’ll need the six enchanted mushrooms to fix it.”\n\n“Yey!” Luna cheers, clearly far more enthusiastic about this mission than you are. “I get to play with the human!”\n\n“Yes, yes, you get to play with the human,” Willow says irritably. “Just try to bring it back in one piece if it’s not too much to ask.”\n\n*page_break\n\n“This is going to be so much fun!” Luna tells you. “Don’t worry, I’ll be really, really helpful. I know where all the mushrooms are and I can show you the way and I’m so good at solving riddles, so I can help you if you find one too tricky! But you have to stay close and not lose me because sometimes I forget what I’m supposed to be doing and I get very easily distrac... Oh look, a butterfly.” \n\nLuna starts to follow the butterfly and is only dissuaded when Willow grabs the wisp between two fingers, stopping her in her tracks. “I’m sure the two of you will get along splendidly,” Willow tells you, though she doesn’t sound too sure of it herself. “And trust me, Luna isn’t quiet as dim as she might seem. If you ever find yourself struggling to solve a riddle, you can ask Luna for help. She won’t be able to answer the question for you, but she can give you a clue that might help.”\n\n“But what if I can’t solve a riddle even when I have the clue?” you ask.\n\n*page_break\n\nWillow lets out a sigh before reaching into the hollow of the tree once more and pulling out a small leather pouch, tied with string. “I really do not like parting with these I’ll have you know. There’s nothing I detest more than a cheater... But I suppose you are very young and I cannot expect perfection from you. Here, child.” And with that, Willow reluctantly hands over the pouch to you. “This pouch my dear, is filled with magic beans.”\n\n“Magic beans?” you repeat. “Like in Jack and the Beanstalk?”\n\n“Who and the what?” Willow asks, baffled.\n\n“Oh, it’s an old story from my world,” you explain. “A boy called Jack plants a magic bean, and it grows into a beanstalk so tall that it reaches all the way up into the sky. Then Jack climbs it and it leads to a castle in the clouds where there’s a giant and a goose that lays golden eggs and a harp that plays itself and... You know, magic stuff.”\n\nWillow only laughs at your explanation. “Magic beans growing a giant beanstalk that leads to a castle in the clouds? Why I’ve never heard anything so ridiculous in all my life! I mean how would that castle stay in the sky? What’s to stop it from simply falling through the air and crashing down on poor Jack’s head? Even the idea of a giant beanstalk makes no sense. A beanstalk can only get so tall before it collapses under it’s own weight.”\n\n“Then what do your magic beans do?” you ask Willow.\n\n“It’s simple, eat one of these and you will instantly know the answer to any riddle you are having trouble solving,” she tells you.\n\n“But that doesn’t make any sense either,” you insist.\n\n“It makes more sense than your castle in the clouds,” Willow mocks you. “But before you eat a single bean, there is one very important word of advice I must give you.”\n\n“What’s that?” you ask.\n\nBut the advice that Willow gives you seems only to be another riddle...\n\n*page_break\n*set Willow_Riddle 1\n\n“Fear not to make mistakes or to waste our time,\n*line_break\nFor to err is human and being human is no crime.\n\nThe light will help to guide your path in times that you need aid,\n*line_break\nBut with each use you’ll see the light will slowly start to fade.\n*line_break\nTwenty times and you will see the strain is too much to bare,\n*line_break\nAnd it won't be in any state to guide you anywhere.\n\nNow magic is a useful tool when you might feel stuck,\n*line_break\nBut I warn you first that more than ten will find you out of luck.\n*line_break\nFor this is not a worthy tool for the brave and wise and clever,\n*line_break\nAnd only those who prove there worth will find the precious treasure.”\n\n[b]Willow’s riddle can now be found in your stats page.[/b]\n\n*page_break\n\n“You understand?” Willow asks you after reciting her riddle.\n\n“I really don’t,” you reply.\n\n“Wonderful!” Willow announces. “Then you’re ready to begin. Now remember, find all six of the enchanted mushrooms and then bring them back here. Once you have them all, I will help you to recreate the portal and send you back home to your family. Good luck, and please try not to get hurt... Or eaten... Or buried alive or decapitated, or transformed into any kind of inanimate object. You never know really, the locals can be very unpredictable.”\n\n“Once a sprite turned me into a toothbrush!” Luna declares happily. “Took me weeks before I changed back and sometimes I still feel the urge to wash my hair in minty paste.”\n\n“That’s so reassuring to know,” you mumble sarcastically. “So, where should we go first?” you ask Luna.\n\n“Well I know one of the mushrooms is in that old church on top of the hill. Then there’s one that’s been in the school for years. I think there’s one in the museum too, and I’ve heard there might even be one in the old, haunted house in the middle of nightmare forest... Oh, oh! I nearly forgot! There’s a mushroom at Mr Chuckle’s Super Happy Carnival of Fun and Awesomeness! Can we go there first? Can we please?” Luna begs... Well that sounds slightly more appealing than the haunted house in nightmare forest, but the decision is yours.\n\n*finish", "map": "*label Main_Map\n\n*image Map.png\n\nWhere do you want to go?\n\n*check_purchase adfree\n*choice\n  *selectable_if (choice_purchased_adfree) #The Funfair\n    *if Funfair_Fungus = 0\n      *goto_scene Funfair\n    *else\n      *goto Taken\n  *selectable_if (choice_purchased_adfree) #The School\n    *if Toadstool_Trophy = 0\n      *goto_scene School\n    *else\n      *goto Taken\n  *selectable_if (choice_purchased_adfree) #The Church\n    *if Sacred_Shiitake = 0\n      *goto_scene Church\n    *else\n      *goto Taken\n  *selectable_if (choice_purchased_adfree) #The Museum\n    *if Mushroom_Medallion = 0\n      *goto_scene Museum\n    *else\n      *goto Taken\n  #The Haunted House\n    *if Possessed_Portobello = 0\n      *goto_scene Haunted_House\n    *else\n      *goto Taken\n  *selectable_if (choice_purchased_adfree) #The Clearing\n    *goto_scene Clearing\n\n*label Taken\n\n\"But you already found the mushroom there!\" Luna tells you. \"Let's go somewhere else.\"\n\n*page_break\n*goto Main_Map", "museum": "*temp Riddle_Seven\n*temp Seven_Hint 0\n*temp Seven_Bean 0\n*temp Riddle_Mirror \n*temp Mirror_Hint 0\n*temp Mirror_Bean 0\n*temp Riddle_Vase\n*temp Vase_Hint 0\n*temp Vase_Bean 0\n*temp Riddle_Golems\n*temp Golems_Hint 0\n*temp Golems_Bean 0\n*temp Riddle_Hello\n*temp Hello_Hint 0\n*temp Hello_Bean 0\n*temp Riddle_Parachute\n*temp Parachute_Hint 0\n*temp Parachute_Bean 0\n*temp Riddle_Open\n*temp Open_Hint 0\n*temp Open_Bean 0\n*temp Riddle_V\n*temp V_Hint 0\n*temp V_Bean 0\n*temp Riddle_Glockenspiel\n*temp Glockenspiel_Hint 0\n*temp Glockenspiel_Bean 0\n*temp Door_Hint 0\n*temp Door_Bean 0\n\nThe museum Luna leads you to is a stunning building, very Graeco-Roman in it’s design, with great marble pillars supporting the entrance. The entire building is covered with the most intricate engravings and two large podiums stand outside the museum with a pair of white griffins perched on them. What stands out about these griffins though is that, unlike the rest of the building, the creatures are not carved from marble. They are very much alive.\n\n“Greetings to you human child,” one griffin greets you.\n\n“And to your glowing friend,” says the other. “Welcome to the Museum of Mystery. Feel free to explore at your leisure, if you can open the door that is.”\n\n“Uh... Thank you,” you say to the griffins, approaching the huge stone door and pushing against it with all your might. Unfortunately the door does not budge an inch. “How do I open it?” you ask.\n\n*page_break\n\n“Do you see the pattern of rectangular stone buttons protruding from the door?” asks the griffin on the right. “This pattern is the key. There are twenty eight of these buttons on the door in total, and you must push as many buttons as you need until it is open.”\n\n“But how will I know which buttons to press?” you ask.\n\n“It must be open,” the griffin on the left replies.\n\nThis of course doesn’t answer your question at all. You look back to the pattern on the door and think about what to do for a second. “I guess I could try different combinations until I find the right one,” you say to yourself.\n\n“Do you humans just have a compulsive need to overcomplicate things?” one of the griffins ask you. “Look at the puzzle again and try to figure out;\n\nHow many buttons in the pattern do you need to push until it is open?”\n\n*image Open.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Seven\n    *if (\"$!!{Riddle_Seven}\" = \"7\") or (choice_randomtest)\n      *goto Seven\n    *if (\"$!!{Riddle_Seven}\" = \"21\")\n      *goto Seven\n    *else\n      *goto Seven_Incorrect\n  #Ask Luna for a hint.\n    *if Seven_Hint = 0\n      *set Hints + 1\n    *goto Hint_Seven\n  #Eat a magic bean.\n    *if Seven_Bean = 0\n      *set Beans + 1\n    *goto Bean_Seven\n\n*label Hint_Seven\n*set Seven_Hint 1\n\n“Oh come on ${Name}, this one’s easy!” Luna tells you. “Isn’t it obvious how to make it open?”\n\n“No, the doors won’t budge,” you tell Luna.\n\n“I’m not talking about the doors, I’m talking about the pattern,” Luna tells you. “Once the pattern is ‘OPEN’, that’s when the doors will open!”\n\nHow many buttons in the pattern do you need to push until it is open?\n\n*image Open.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Seven\n    *if (\"$!!{Riddle_Seven}\" = \"7\") or (choice_randomtest)\n      *goto Seven\n    *if (\"$!!{Riddle_Seven}\" = \"21\")\n      *goto Seven\n    *else\n      *goto Seven_Incorrect\n  #Eat a magic bean.\n    *if Seven_Bean = 0\n      *set Beans + 1\n    *goto Bean_Seven\n\n*label Bean_Seven\n*set Seven_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]7.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Seven\n    *if (\"$!!{Riddle_Seven}\" = \"7\") or (choice_randomtest)\n      *goto Seven\n    *if (\"$!!{Riddle_Seven}\" = \"21\")\n      *goto Seven\n    *else\n      *goto Seven_Incorrect\n\n*label Seven_Incorrect\n\nYou push some of the buttons and after a few seconds you hear a load rumbling noise coming from the door. The door doesn’t open, but the buttons that you pressed are suddenly pushed back out, changing the pattern back to the way it was before.\n\n“You’re not listening to us human,” one of the griffins says crossly. “We told you, it needs to be open.”\n\nHow many buttons in the pattern do you need to push until it is open?\n\n*image Open.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Seven\n    *if (\"$!!{Riddle_Seven}\" = \"7\") or (choice_randomtest)\n      *goto Seven\n    *if (\"$!!{Riddle_Seven}\" = \"21\")\n      *goto Seven\n    *else\n      *goto Seven_Incorrect\n  #Ask Luna for a hint.\n    *if Seven_Hint = 0\n      *set Hints + 1\n    *goto Hint_Seven\n  #Eat a magic bean.\n    *if Seven_Bean = 0\n      *set Beans + 1\n    *goto Bean_Seven\n\n*label Seven\n\n*image Open_Complete.png\n\n“Ah, I got it!” you say proudly, then push in all of the right buttons until the remaining buttons on the wall spell out the word ‘OPEN’. Sure enough, once all the correct buttons are pushed, a loud clanking sound of turning cogs come from the building and the door springs open.\n\n“Well done human,” says the griffin on your left. “You realized you need to spell out the word ‘OPEN’, and to do that you needed to press the line in the centre of the first box, the two lines in the bottom right corner of the second box, the two lines on the right of the third box and the top and bottom lines on the last box, making seven in total.”\n\n“Or, if you wanted to make an inverted version, you’d have had to press twenty one,” adds the griffin on your right. “Go on now human, in you go.”\n\n*page_break\n\n“Thanks for the help!” you tell the griffins, before you and Luna enter the museum. Once inside, you are surrounded by some of the most bizarre works of art you have ever seen. A painting of a man with an inside-out head, a sculpture of a melting duck and a particularly pretentious turnip with the words ‘This is art’ scribbled across it, just to name a few.\n\n“This must be really strange for you ${Name},” Luna says as you explore. “I bet you don’t have any art as weird and freaky as this in the human world.”\n\n“Actually, it’s all pretty much the same,” you reassure her.\n\n“Hey look, I found a riddle!” Luna calls to you.\n\nRushing over to where the wisp is floating, you find a large canvas with a short poem written on it. The poem reads as follows;\n\nYou can hate me, break me me, make me crack, but if you give me a smile, I’ll always smile back.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Mirror\n    *if (\"$!!{Riddle_Mirror}\" = \"MIRROR\") or (choice_randomtest)\n      *goto Mirror\n    *else\n      *goto Mirror_Incorrect\n  #Ask Luna for a hint.\n    *if Mirror_Hint = 0\n      *set Hints + 1\n    *goto Hint_Mirror\n  #Eat a magic bean.\n    *if Mirror_Bean = 0\n      *set Beans + 1\n    *goto Bean_Mirror\n\n*label Hint_Mirror\n*set Mirror_Hint 1\n\n“Well that’s strange,” Luna says to herself. “People wouldn’t usually smile at somebody who was that mean to them. Maybe it’s not a person. In fact, it probably isn’t anything alive at all. It could be an object.”\n\n“But if it’s an object, it wouldn’t have a smile,” you point out.\n\n“Some objects have smiles!” Luna insists. “Like toys and dolls and pictures of happy people.”\n\n“But those things would smile all the time,” you point out. “The poem says that if you smile, it’ll smile back.”\n\n“Oh yeah…” Says Luna, thinking to herself for a moment. “Maybe it’s something that copies you?”\n\nYou can hate me, break me me, make me crack, but if you give me a smile, I’ll always smile back.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Mirror\n    *if (\"$!!{Riddle_Mirror}\" = \"MIRROR\") or (choice_randomtest)\n      *goto Mirror\n    *else\n      *goto Mirror_Incorrect\n  #Eat a magic bean.\n    *if Mirror_Bean = 0\n      *set Beans + 1\n    *goto Bean_Mirror\n\n*label Bean_Mirror\n*set Mirror_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Mirror.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Mirror\n    *if (\"$!!{Riddle_Mirror}\" = \"MIRROR\") or (choice_randomtest)\n      *goto Mirror\n    *else\n      *goto Mirror_Incorrect\n\n*label Mirror_Incorrect\n\nYou give your answer but it is followed with silence. Nobody appears to help you, no trap doors open, nothing at all. “… Isn’t something supposed to happen?”\n\n“Oh definitely!” Luna assures you. “You must’ve just gotten the answer wrong.”\n\nYou can hate me, break me me, make me crack, but if you give me a smile, I’ll always smile back.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Mirror\n    *if (\"$!!{Riddle_Mirror}\" = \"MIRROR\") or (choice_randomtest)\n      *goto Mirror\n    *else\n      *goto Mirror_Incorrect\n  #Ask Luna for a hint.\n    *if Mirror_Hint = 0\n      *set Hints + 1\n    *goto Hint_Mirror\n  #Eat a magic bean.\n    *if Mirror_Bean = 0\n      *set Beans + 1\n    *goto Bean_Mirror\n\n*label Mirror\n\n“Mirror,” you say out loud. A person can dislike their own reflection, and the glass can easily be broken, but if you smile at a mirror, it will always return the smile without fail. As soon as you answer the riddle, the canvas with the poem written on it is raised up, revealing a large mirror behind it.\n\n“Yey, you got it right!” cheers Luna.\n\n“Yeah, but I don’t see how this helps me,” you complain. “All that did was put a mirror in front of us. We’re still stuck in this room with no idea what to do next.”\n\n“I’ll go look for clues!” Luna says, fluttering away to explore the room.\n\nTaking a closer look at the mirror, you notice a smudge on the surface and lean forward to rub it off. You are extremely surprised though when instead of touching glass, your hand connects with another hand. That being the hand of your reflection.\n\n“Woh!” you yelp in shock, immediately pulling your hand away. In return, your reflection raises their hand to point at you as they burst into hysterical laughter. “Ha ha, you fell for it!” the person in the mirror teases you. “You humans are so gullible!”\n\n“Oh ${Name}, I didn’t know you had a twin!” Luna gasps with excitement, fluttering over to introduce herself to your extremely unusual reflection. “Hi, I’m Luna!”\n\nYour reflection suddenly starts to change, shrinking and taking on a yellow, glowing hue until it is completely identical to your wisp friend. It then flies out of the mirror saying, “No, I’m Luna!”\n\n*page_break\n\n“Oh, I see! It’s a doppelganger!” Luna declares cheerfully.\n\n“Naturally,” the doppelganger replies before transforming back to your shape again. “Welcome to my museum kid. My name’s Mimic. I’ll show you around if you like.”\n\n“Uh... Thanks. I’m ${Name},” you say nervously, slightly disturbed by talking to someone that looks exactly the same as you. “Actually, I was wondering if you could help me. I’m looking for an enchanted mushroom. Luna said you’ve got one here somewhere.”\n\n“Ah, the Mushroom Medallion!” says Mimic. “Yeah, we’ve had that here since the museum opened. It’s the oldest antique we have. Definitely the most valuable. That mushroom’s absolutely priceless.”\n\n“Oh...” you mumble, suddenly less optimistic about your chances of leaving here with said mushroom. “Well... Can I have it?”\n\n“That depends,” Mimic tells you. “You’ll have to find it first. That means you’ll need to solve all the riddles and open all the secret doors to get to it.” With that, Mimic takes you by the hand and shows you a large painting on the wall. “Here’s the first door!” ${He_She} tells you cheerfully. “This is one of my many masterpieces.”\n\n*page_break\n\n“Awh, that’s sweet!” says Luna, swooning as she admires the painting. “The man and the lady are all in love!”\n\nMimic has a rather grumpy scowl on ${His_Her} face when ${He_She} turns to Luna. “Are you completely blind?” ${He_She} asks. “There’s so much more to this painting than just a man and a lady in love!”\n\n“Is there?” Luna asks. “All I see is a man on the left and a lady on the right, and they’re going to kiss.”\n\nMimic rolls ${His_Her} eyes and folds ${His_Her} arms in annoyance. “Nobody understands my work,” ${He_She} complains. “What about you ${Name}? What do you see in the painting?”\n\n*image Vase.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Vase\n    *if (\"$!!{Riddle_Vase}\" = \"VASE\") or (choice_randomtest)\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"GOBLET\")\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"CHALICE\")\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"CANDLESTICK\")\n      *goto Vase\n    *else\n      *goto Vase_Incorrect\n  #Ask Luna for a hint.\n    *if Vase_Hint = 0\n      *set Hints + 1\n    *goto Hint_Vase\n  #Eat a magic bean.\n    *if Vase_Bean = 0\n      *set Beans + 1\n    *goto Bean_Vase\n\n*label Hint_Vase\n*set Vase_Hint 1\n\nLuna looks at the painting for awhile and then shakes her head. “It’s no good. I still see a man and a woman that are about to kiss,” she tells you. “But... Maybe I’m looking at the wrong bit? I see a man on the left and a lady on the right. Maybe I’m supposed to be looking in the middle?”\n\nWhat do you see in the painting?\n\n*image Vase.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Vase\n    *if (\"$!!{Riddle_Vase}\" = \"VASE\") or (choice_randomtest)\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"GOBLET\")\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"CHALICE\")\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"CANDLESTICK\")\n      *goto Vase\n    *else\n      *goto Vase_Incorrect\n  #Eat a magic bean.\n    *if Vase_Bean = 0\n      *set Beans + 1\n    *goto Bean_Vase\n\n*label Bean_Vase\n*set Vase_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Vase.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Vase\n    *if (\"$!!{Riddle_Vase}\" = \"VASE\") or (choice_randomtest)\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"GOBLET\")\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"CHALICE\")\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"CANDLESTICK\")\n      *goto Vase\n    *else\n      *goto Vase_Incorrect\n\n*label Vase_Incorrect\n\n“No, no, no, no!” Mimic yells, stamping ${His_Her} foot in a sulk. “Nobody understands my art!”\n\n“Hey, calm down!” you tell the doppelganger. “Let me try again. I’ll look closer this time.”\n\nWhat do you see in the painting?\n\n*image Vase.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Vase\n    *if (\"$!!{Riddle_Vase}\" = \"VASE\") or (choice_randomtest)\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"GOBLET\")\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"CHALICE\")\n      *goto Vase\n    *if (\"$!!{Riddle_Vase}\" = \"CANDLESTICK\")\n      *goto Vase\n    *else\n      *goto Vase_Incorrect\n  #Ask Luna for a hint.\n    *if Vase_Hint = 0\n      *set Hints + 1\n    *goto Hint_Vase\n  #Eat a magic bean.\n    *if Vase_Bean = 0\n      *set Beans + 1\n    *goto Bean_Vase\n\n*label Vase\n\n*image Vase_Outline.png\n\nAs soon as you give your answer, the painting you were just looking at swings forward and reveals a hidden passageway. “Congratulations!” Mimic tells you, clapping a hand on your shoulder in encouragement. “All you need to do is ignore the man and the woman leaning in for a smooch, and you can clearly see the silhouette of a vase in the middle! Or I guess it could be a goblet or a chalice or a candlestick. Those would work too. Good work ${Name}, now on to the next room!” your doppelganger declares, holding out an arm towards the open passageway to beckon you through. “On you go, I’ll be right behind you!”\n\n*page_break\n\nOnce you and Luna enter the passageway however, the door-painting slams shut behind you, leaving the doppelganger on the other side. “Mimic!” you call out to ${Him_Her}, but there’s no reply.\n\n“Oh well, I’m sure we can find the mushroom without ${Him_Her},” Luna reassures you. “Come on ${Name}!” And with that, Luna leads you down the passageway into a room full of statues.\n\nThe statues are all made of stone and resemble some kind of troll or ogre. Looking around the room you have to admire the attention to detail in all these sculptures. “Wow, these statues look almost real,” you tell Luna.\n\n“Almost real ${He_She} says!” one of the statues replies, sounding quite insulted. “Well, what do you think of that, Flint?”\n\n“Not much Slate,” replies another, and suddenly all the statues turn to look down on you, revealing themselves not to be statues at all.\n\n“Oh look, golems!” Luna says cheerfully.\n\n“Yes, golems,” replies Slate. “Maybe you’d be so kind as to explain that to your little human friend. Statues indeed? I’ve never been so offended in my life!”\n\n“Uh... Sorry,” you mutter nervously. “I’ve never seen a golem before. I’ve got to say, you’re all really impressive!” you tell the great, stone giants in a feeble attempt to make up for the previous insult.\n\n*page_break\n\nLuckily the compliment works like a charm. “Well, I suppose we are rather impressive, aren’t we?” asks Flint.\n\n“Oh, of course!” boasts Slate. “Absolute marvels to look upon, and we make the best sculptors too. Not many people know that.”\n\n“Really?” asks Luna excitedly. “What do you sculpt?”\n\n“Well, I’ve been working on this for awhile now,” Flint says, holding up a large, sculpted slab of rock. “What do you think?”\n\n“I like it!” cheers Luna. “... What is it?”\n\n“What, you can’t tell?” asks Flint. “It should be obvious!”\n\n“Well it doesn’t look like anything I’ve ever seen,” replies Luna.\n\n“Well then let the human have a go!” Flint demands. “Come on ${Boy_Girl}, what do you see on the rock?\n\n*image Golems.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Golems\n    *if (\"$!!{Riddle_Golems}\" = \"GOLEMS\") or (choice_randomtest)\n      *goto Golems\n    *else\n      *goto Golems_Incorrect\n  #Ask Luna for a hint.\n    *if Golems_Hint = 0\n      *set Hints + 1\n    *goto Hint_Golems\n  #Eat a magic bean.\n    *if Golems_Bean = 0\n      *set Beans + 1\n    *goto Bean_Golems\n\n*label Hint_Golems\n*set Golems_Hint 1\n\nLuna stares at the rock for awhile. “Nope, I still can’t figure out what it is,” she tells you.\n\n“What’s wrong with you wisp?” asks Slate. “Can’t you read?”\n\n“Oh, it’s a word!” Luna declares. “Well knowing that should make things a lot easier.”\n\nWhat word is written in the rock?\n\n*image Golems.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Golems\n    *if (\"$!!{Riddle_Golems}\" = \"GOLEMS\") or (choice_randomtest)\n      *goto Golems\n    *else\n      *goto Golems_Incorrect\n  #Eat a magic bean.\n    *if Golems_Bean = 0\n      *set Beans + 1\n    *goto Bean_Golems\n\n*label Bean_Golems\n*set Golems_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Golems.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Golems\n    *if (\"$!!{Riddle_Golems}\" = \"GOLEMS\") or (choice_randomtest)\n      *goto Golems\n    *else\n      *goto Golems_Incorrect\n\n*label Golems_Incorrect\n\nFlint looks very angry at your response. “Stupid human!” he yells. “I should smash this rock right over your head. Who cares? It’s useless anyway!”\n\n“No, don’t smash it!” Slate objects. “It’s a beautiful sculpture. And I’m sure the human was just joking, weren’t you?”\n\n“Uh... Yeah, definitely!” you insist, not keen on the idea of getting your head crushed under a giant rock. “It was just a joke... Haha?”\n\n“Then what do you really see?” asks Flint.\n\nWhat do you see in the rock?\n\n*image Golems.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Golems\n    *if (\"$!!{Riddle_Golems}\" = \"GOLEMS\") or (choice_randomtest)\n      *goto Golems\n    *else\n      *goto Golems_Incorrect\n  #Ask Luna for a hint.\n    *if Golems_Hint = 0\n      *set Hints + 1\n    *goto Hint_Golems\n  #Eat a magic bean.\n    *if Golems_Bean = 0\n      *set Beans + 1\n    *goto Bean_Golems\n\n*label Golems\n\n*image Golems_Split.png\n\nWith your answer, a huge smile appears on Flint’s face. “There, see, the human gets it!” he says, looking rather pleased with himself. “It’s a carving of the word ‘Golems’. Inverted of course. I was planning on hanging it over our little exhibition so that we won’t get mistaken for statues any more.”\n\n*page_break\n\n“Oh, let me show them mine!” Slate says, holding up another sculpted rock.\n\n“Yey, I can read this one!” Luna cheers. “... But what are the numbers for?”\n\n“Numbers?” asks Slate. “What numbers?”\n\n“Oh, that scatterbrained wisp doesn’t understand art at all,” Flint complains. “You understand, don’t you human?”\n\n“Yeah human!” says Slate, enthusiastically. “What does it say on my rock?”\n\n*image 07734.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Hello\n    *if (\"$!!{Riddle_Hello}\" = \"HELLO\") or (choice_randomtest)\n      *goto Hello\n    *else\n      *goto Hello_Incorrect\n  #Ask Luna for a hint.\n    *if Hello_Hint = 0\n      *set Hints + 1\n    *goto Hint_Hello\n  #Eat a magic bean.\n    *if Hello_Bean = 0\n      *set Beans + 1\n    *goto Bean_Hello\n\n*label Hint_Hello\n*set Hello_Hint 1\n\nLuna takes another look at the rock and shakes her head. “It’s no use, I can only see numbers,” she tells you. “0, 7, 7, 3 and 4.”\n\n“Let me look at that!” says Flint, leaning in and taking a closer look at the carving. He then bursts into a fit of laughter.\n\n“What’s so funny?” you ask, causing Flint to lean forward and whisper to you.\n\n“Well it’s no wonder your friend can’t read it,” Flint tells you. “Slate’s holding the rock upside down.”\n\nWhat does it say on the rock?\n\n*image 07734.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Hello\n    *if (\"$!!{Riddle_Hello}\" = \"HELLO\") or (choice_randomtest)\n      *goto Hello\n    *else\n      *goto Hello_Incorrect\n  #Eat a magic bean.\n    *if Hello_Bean = 0\n      *set Beans + 1\n    *goto Bean_Hello\n\n*label Bean_Hello\n*set Hello_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Hello.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Hello\n    *if (\"$!!{Riddle_Hello}\" = \"HELLO\") or (choice_randomtest)\n      *goto Hello\n    *else\n      *goto Hello_Incorrect\n\n*label Hello_Incorrect\n\nSlate looks very frustrated with your answer. “Flint, they’re making fun of me!” she complains.\n\n“Now you two better start taking my friend’s art more seriously,” Flint warns you, slamming one of his great, stone hands into his palm in a very clear threat. “I hope you’ll give her a proper answer this time.”\n\nWhat does it say on the rock?\n\n*image 07734.png\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Hello\n    *if (\"$!!{Riddle_Hello}\" = \"HELLO\") or (choice_randomtest)\n      *goto Hello\n    *else\n      *goto Hello_Incorrect\n  #Ask Luna for a hint.\n    *if Hello_Hint = 0\n      *set Hints + 1\n    *goto Hint_Hello\n  #Eat a magic bean.\n    *if Hello_Bean = 0\n      *set Beans + 1\n    *goto Bean_Hello\n\n*label Hello\n\n*image Hello.png\n\n“There, you see! Of course it says ‘Hello’, I can’t see why it took you so long to...” Trailing off, Slate looks down at her rock and realizes why you couldn’t make sense of it at first. “Oh, I see!” she says, flipping the rock over and transforming the number ‘07734’ into the word ‘Hello’.\n\n*page_break\n\n“Ah, now I see it!” says Luna. “It makes loads more sense this way up.”\n\n“Well, I’m glad you appreciate our art, young human,” says Flint. “But what are you doing here anyway?”\n\n“We’re looking for the Mushroom Medallion!” Luna says on your behalf.\n\n“Ah, I see!” says Slate. “Well you’ll need to get past old Onyx then. Hey, Onyx!” Slate calls, after which you hear a loud rumbling noise coming from the walls. Shortly after a large chunk of the wall actually breaks away from the rest and turns around, revealing another golem.\n\n“What did you wake me for?” Onyx complains. “You need your beauty sleep when you get to my age.”\n\n“This human ${Boy_Girl} wants to get to the Mushroom Medallion,” Flint explains.\n\n“That so?” asks Onyx. “Well on you go then, it’s through this way.” And with that, the golem takes a step to the side, revealing another passageway.\n\n“Thank you!” Luna calls out, and the two of you head down the passageway into the next room.\n\n*page_break\n\nAt the end of the passageway you find a large room, where you must admit that the art is definitely the closest you’ve seen to normal since you’ve entered this museum. The art works all contain mythological creatures rather than humans but the paintings are still very life-like as well as incredibly detailed. The first painting you come across is of two identical elven women sitting by a pool.\n\n“Pretty!” Luna declares as she admires the painting.\n\n“Pretty indeed,” one of the elven women replies. Turning towards you, the elf actually jumps out of the painting and quickly transforms into your likeness once more. “One of my early works,” Mimic explains. “I’m still very proud of it though.”\n\n“How did you get ahead of us?” you ask the doppelganger.\n\n“How did you get behind me? Surely that’s the more reasonable question,” Mimic retorts. “But that’s not important. I have more artwork to show you. Come along!” ${He_She} demands as ${He_She} leads you through the gallery.\n\n*page_break\n\nAs you follow the doppleganger, you soon realize that the art in this room is not quite as normal as it first appeared. Whilst admiring a beautiful painting of a white stag grazing in a field, you are surprised when a pack of wild hell-hounds suddenly emerge from the distance and chase the stag right out of the canvas.\n\n“Uh... Are these paintings supposed to move?” you ask Mimic.\n\n“Well of course!” ${He_She} says. “Why shouldn’t they? Art imitates life after all, and have you ever seen somebody stand eternally still in real life? Never eating or sleeping or ageing? Of course not! That would be silly! A painting’s got to move or it wouldn’t be realistic.”\n\n“I guess that makes sense,” you are forced to agree. You’re not sure it does really, but then things stopped making sense for you as soon as you entered this world. There’s no reason why these paintings should be an exception.\n\n*page_break\n\nAs you inspect all the artworks and the walking, talking lifeforms within, you notice one lone figure in a painting that is completely still. The painting is of a man who appears to be human, lying face down in the snow. “Hey, this man’s not moving,” you point out to Mimic.\n\nThe doppelganger walks over to inspect the painting and nods ${His_Her} head in agreement. “Well of course he’s not moving,” Mimic tells you. “That poor guy’s dead.”\n\n“Dead?” you ask, surprised. “That’s a really depressing thing to paint a picture of.”\n\n“Isn’t it just?” ask Mimic. “But I think it’s necessary. This painting has a story to tell, and a riddle to be solved.”\n\n“A riddle, huh?” you ask. “What’s that?”\n\nMimic has a huge smile on ${His_Her} face and seems more than happy to tell you. “Well this is another one of my greatest masterpieces. I’ve based it in your own human world, just as some of your more imaginative artists will use our world for inspiration. Anyway, the riddle is as follows;\n\nThere is a man laying face down in a field covered in snow, dead. There is no snow on the body, so it must not have been snowing since he died. Yet there are no footprints in the snow whatsoever. The only clue we have to the cause of the man’s death is a large backpack he has on his back. All I can tell you is that the contents of the backpack will provide the explanation for the man’s death.\n\nSo I ask you human... What is in the backpack?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Parachute\n    *if (\"$!!{Riddle_Parachute}\" = \"PARACHUTE\") or (choice_randomtest)\n      *goto Parachute\n    *else\n      *goto Parachute_Incorrect\n  #Ask Luna for a hint.\n    *if Parachute_Hint = 0\n      *set Hints + 1\n    *goto Hint_Parachute\n  #Eat a magic bean.\n    *if Parachute_Bean = 0\n      *set Beans + 1\n    *goto Bean_Parachute\n\n*label Hint_Parachute\n*set Parachute_Hint 1\n\nLuna studies the painting for a moment. “Well he can’t have been killed by someone else because there aren’t any footprints in the snow... Wait a minute! Even the man’s footprints aren’t in the snow. So how did he get there? He couldn’t have walked... Maybe he flew? Oh, I forgot, you humans can’t fly... Can you?”\n\nThere is a man laying face down in a field covered in snow, dead. There is no snow on the body, so it must not have been snowing since he died. Yet there are no footprints in the snow whatsoever. The only clue you have to the cause of the man’s death is a large backpack he has on his back. The contents of the backpack will provide the explanation for the man’s death.\n\nWhat is in the backpack?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Parachute\n    *if (\"$!!{Riddle_Parachute}\" = \"PARACHUTE\") or (choice_randomtest)\n      *goto Parachute\n    *else\n      *goto Parachute_Incorrect\n  #Eat a magic bean.\n    *if Parachute_Bean = 0\n      *set Beans + 1\n    *goto Bean_Parachute\n\n*label Bean_Parachute\n*set Parachute_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Parachute.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Parachute\n    *if (\"$!!{Riddle_Parachute}\" = \"PARACHUTE\") or (choice_randomtest)\n      *goto Parachute\n    *else\n      *goto Parachute_Incorrect\n\n*label Parachute_Incorrect\n\nMimic shakes ${His_Her} head. “No, no, you need to look closer. The most important thing to notice in the painting is not the backpack itself, it’s the footprints... Or rather the lack of footprints! There are none at all, not even belonging to the man himself. Don’t you think a person would normally leave a trail of footprints behind them when walking through a field of snow? Let me explain the riddle again;\n\nThere is a man laying face down in a field covered in snow, dead. There is no snow on the body, so it must not have been snowing since he died. Yet there are no footprints in the snow whatsoever. The only clue we have to the cause of the man’s death is a large backpack he has on his back. All I can tell you is that the contents of the backpack will provide the explanation for the man’s death.\n\nSo I ask you human... What is in the backpack?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Parachute\n    *if (\"$!!{Riddle_Parachute}\" = \"PARACHUTE\") or (choice_randomtest)\n      *goto Parachute\n    *else\n      *goto Parachute_Incorrect\n  #Ask Luna for a hint.\n    *if Parachute_Hint = 0\n      *set Hints + 1\n    *goto Hint_Parachute\n  #Eat a magic bean.\n    *if Parachute_Bean = 0\n      *set Beans + 1\n    *goto Bean_Parachute\n\n*label Parachute\n\n“You’re brilliant!” Mimic cheers in appreciation. “Very clever human. Of course, the fact that there’s no footprints in the snow means the man couldn’t have walked there, and since humans can’t fly, he must’ve fallen. Now since he’s in a field, there’s nowhere for the man to have fallen from except straight out of the sky, and how did he get there? In one of your strange, human flying contraptions of course! But what human would’ve jumped from such a height without some sort of safety precaution? So of course, this unfortunate human was what you call ‘skydiving’ and inside his backpack, there was in fact a parachute. Unfortunately the man had trouble releasing the parachute, and landed splat in the field, hence why the contents of the backpack provided an explanation for his death.”\n\nYou feel rather proud of yourself for solving another riddle, but are curious when nothing happens as a result of said riddle being solved. “... Isn’t there some kind of secret door behind the painting or something?” you ask Mimic.\n\n“Huh? Oh no, that was just for fun!” Mimic cheerfully informs you. “The next door’s this way!” ${He_She} says as ${He_She} leads you through the gallery. You roll your eyes in frustration but follow the doppelganger anyway.\n\n*page_break\n\nYou pass by several more moving paintings on your way. One painting contains a large group of fae creatures, eating a feast of nuts and berries. One painting depicts a fierce battle between a red and a blue dragon, one breathing fire and the other breathing ice. One painting literally demands your attention as it portrays a group of beautiful sirins singing on a rocky island, luring you towards them. Luckily instead of crashing into the rocks to your death like an unfortunate sailor, you simply walk head first into the painting, leaving a nasty bump on your nose and causing all the sirens to laugh at your expense. You cover your ears and move on.\n\n“Here we are!” Mimic finally declares, as you arrive at a particularly empty wall. No artwork is hanging here, there is only an archway blocked up with bricks and a plaque over the arch with a series of numbers on it.\n\n“What am I supposed to do now?” you ask Mimic.\n\n“Well that’s easy!” ${He_She} replies. “Just read the sign over the arch, solve the riddle and you can go through.”\n\n“But there’s no riddle on the sign!” you object. “There’s just a bunch of numbers.”\n\n“Oh you poor, simple mortal,” Mimic says, putting a hand on your shoulder. “Haven’t you realized by now that things in our world are not always as they seem? Just take a proper look at the sign, will you? I’m sure you can figure it out.”\n\nThe numbers are as follows;\n\n10-21-19-20 19-1-25 “15-16-5-14”.\n\nWhat is the answer to the riddle?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Open\n    *if (\"$!!{Riddle_Open}\" = \"OPEN\") or (choice_randomtest)\n      *goto Open\n    *else\n      *goto Open_Incorrect\n  #Ask Luna for a hint.\n    *if Open_Hint = 0\n      *set Hints + 1\n    *goto Hint_Open\n  #Eat a magic bean.\n    *if Open_Bean = 0\n      *set Beans + 1\n    *goto Bean_Open\n\n*label Hint_Open\n*set Open_Hint 1\n\n“Oh this is the easiest riddle I’ve seen so far!” Luna says happily. “You just need to read the word after all.”\n\n“But there aren’t any words!” you insist. “All I see on the plaque is numbers.”\n\n“Oh, I’m sorry ${Name}, did they not teach you to read numbers in the human world?” Luna asks. “Well it’s all very simple really. The numbers represent letters is all.”\n\n“But how do I know which number represents which letter?” you ask.\n\n“Well that’s the easiest part,” says Luna. “What order do the letters come in the alphabet?”\n\nThe numbers are as follows;\n\n10-21-19-20 19-1-25 “15-16-5-14”.\n\nWhat is the answer to the riddle?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Open\n    *if (\"$!!{Riddle_Open}\" = \"OPEN\") or (choice_randomtest)\n      *goto Open\n    *else\n      *goto Open_Incorrect\n  #Eat a magic bean.\n    *if Open_Bean = 0\n      *set Beans + 1\n    *goto Bean_Open\n\n*label Bean_Open\n*set Open_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Open.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Open\n    *if (\"$!!{Riddle_Open}\" = \"OPEN\") or (choice_randomtest)\n      *goto Open\n    *else\n      *goto Open_Incorrect\n\n*label Open_Incorrect\n\nMimic shakes ${His_Her} head in disappointment. “I can see you’re not getting this at all. Let me help you out. You see that number 1 in the middle there? Between the 19 and the 25? ... Well that 1 is an A,” ${He_She} tells you. “I’m sure you can figure out the rest for yourself.”\n\nThe numbers are as follows;\n\n10-21-19-20 19-1-25 “15-16-5-14”.\n\nWhat is the answer to the riddle?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Open\n    *if (\"$!!{Riddle_Open}\" = \"OPEN\") or (choice_randomtest)\n      *goto Open\n    *else\n      *goto Open_Incorrect\n  #Ask Luna for a hint.\n    *if Open_Hint = 0\n      *set Hints + 1\n    *goto Hint_Open\n  #Eat a magic bean.\n    *if Open_Bean = 0\n      *set Beans + 1\n    *goto Bean_Open\n\n*label Open\n\nAs soon as you give your answer, the bricks that block up
