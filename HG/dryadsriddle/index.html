 consider the old man’s offer for a moment. “I really don’t like this, but I guess I don’t have any choice. Deal.”\n\n“Very good,” says Old Cornelius, “then here is my riddle;\n\nWhat does man love more than life,\n*line_break\nFear more than death or mortal strife.\n*line_break\nWhat the poor have and the rich require,\n*line_break\nAnd what contented men desire.\n*line_break\nWhat the miser spends and the spendthrift saves,\n*line_break\nAnd all men carry to their graves?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Nothing\n    *if (\"$!!{Riddle_Nothing}\" = \"NOTHING\") or (choice_randomtest)\n      *goto Nothing\n    *else\n      *goto Nothing_Incorrect\n  #Ask Luna for a hint.\n    *if Nothing_Hint = 0\n      *set Hints + 1\n    *goto Hint_Nothing\n  #Eat a magic bean.\n    *if Nothing_Bean = 0\n      *set Beans + 1\n    *goto Bean_Nothing\n\n*label Hint_Nothing\n*set Nothing_Hint 1\n\n“Oh, that’s easy!” Luna answers with a proud smile on her face.\n\n“Really?” you ask. “I’m can’t think of anything.”\n\n“Exactly!” Luna says, as if this should make perfect sense. “If you can’t find an answer, then there probably is no answer.”\n\n“I don’t understand,” you tell the wisp.\n\n“Okay,” says Luna. “What can you think of that works as an answer for everything the man just said?”\n\n“Nothing,” you insist.\n\n“Well, there you have it then,” Luna states happily, and leaves the conversation at that.\n\nWhat does man love more than life,\n*line_break\nFear more than death or mortal strife.\n*line_break\nWhat the poor have, the rich require,\n*line_break\nAnd what contented men desire.\n*line_break\nWhat the miser spends and the spendthrift saves,\n*line_break\nAnd all men carry to their graves?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Nothing\n    *if (\"$!!{Riddle_Nothing}\" = \"NOTHING\") or (choice_randomtest)\n      *goto Nothing\n    *else\n      *goto Nothing_Incorrect\n  #Eat a magic bean.\n    *if Nothing_Bean = 0\n      *set Beans + 1\n    *goto Bean_Nothing\n\n*label Bean_Nothing\n*set Nothing_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Nothing.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Nothing\n    *if (\"$!!{Riddle_Nothing}\" = \"NOTHING\") or (choice_randomtest)\n      *goto Nothing\n    *else\n      *goto Nothing_Incorrect\n\n*label Nothing_Incorrect\n\n“Ha, you got it wrong!” Cornelius states, seeming quite pleased with himself. “Well ${Boy_Girl}, we had a deal, come on, out, out, out!”\n\n“Awh, that’s not fair!” Luna says stubbornly. “${Name}’s just warming up. Give ${Him_Her} another go. I swear, ${He_She}’s really smart!”\n\n“Oh fine,” Cornelius says grumpily. “One more try.”\n\nWhat does man love more than life,\n*line_break\nFear more than death or mortal strife.\n*line_break\nWhat the poor have and the rich require,\n*line_break\nAnd what contented men desire.\n*line_break\nWhat the miser spends and the spendthrift saves,\n*line_break\nAnd all men carry to their graves?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Nothing\n    *if (\"$!!{Riddle_Nothing}\" = \"NOTHING\") or (choice_randomtest)\n      *goto Nothing\n    *else\n      *goto Nothing_Incorrect\n  #Ask Luna for a hint.\n    *if Nothing_Hint = 0\n      *set Hints + 1\n    *goto Hint_Nothing\n  #Eat a magic bean.\n    *if Nothing_Bean = 0\n      *set Beans + 1\n    *goto Bean_Nothing\n\n*label Nothing\n\nCornelius breaths a heavy sigh. “Yes, that’s right kid, nothing. Well, I suppose a deal’s a deal. Still, make sure you watch yourself in there, it’s a very dangerous place. The house is haunted for starters, but trust me, ghosts will be the least of your worries in there. A terrible tragedy occurred in that house many years ago and it hasn’t been safe since.”\n\n“What tragedy?” you ask the wizard.\n\nHe thinks about that for a moment before admitting, “You know, I can’t quite remember. Must’ve spent too much time pruning the forget-me-so.”\n\n“Forget-me-so?” you ask, confused.\n\n“You’ve heard of a forget-me-not, haven’t you?” he asks. “Well forget-me-so are the opposite. Spend too much time around those plants, and you’ll just clean forget your own name. Bane of my life those flowers. I start off with a clear plan for the day, then I walk past them and forget everything... Oh and that reminds me, I forgot to feed the monster in the well.”\n\n“You keep a monster in the well?” you ask, not sure why anyone would think that was a good idea.\n\n“Awh, what kind?” asks Luna. “Is it fluffy? Can I pet it?”\n\n“I wouldn’t touch that thing unless I wanted to lose a hand, little Miss,” the old man advises Luna. “Still, it’s howls are pretty good for scaring folks off. Not you though it seems. Well, I suppose I’d best leave you to it then. Have fun you two.”\n\n“Thanks,” you say with a hint of sarcasm. “Not sure how much fun someone can have exploring a haunted house.”\n\n*page_break\n\n“The house is haunted?” the old man asks.\n\n“That’s what you told me,” you remind him.\n\n“Did I? Oh yes, I suppose I did. Sorry about that ${Boy_Girl}, I must’ve forgot. It’s the forget-me-so, you see. Did I tell you about those?” he asks, shaking his head in confusion. “Now what was I doing again?”\n\n“Feeding the monster in the well,” Luna declares happily.\n\n“There’s a monster in the well?” asks old Cornelius. “Now how on earth did that get there?” And with that, the old wizard walks away into the garden, grumbling to himself.\n\n“Remind me to stay away from forget-me-so,” you tell Luna.\n\n“Okay!” she declares. “... But what if I forget?”\n\n“Never mind,” you mumble before leaving the half broken-down shed and making your way to the haunted house. “Guess we’re going in,” you say nervously.\n\n“Yep!” squeaks Luna, sounding much more excited than you. “You know I always wanted to meet a ghost. If we find one, can we ask it how come ghosts can float through walls, but they don’t fall through the floorboards all the time?”\n\n“Sure Luna,” you say calmly, trying to hide how anxious you are as you approach the disturbing old building.\n\n*page_break\n\nFinally reaching the door, you see a worn, brass knocker in the shape of a lion’s head. Grabbing it, you pull with all your strength, but to no avail. “It’s locked,” you tell Luna.\n\n“Oh... Well we should try knocking then,” she says, struggling to lift the heavy knocker herself and then slamming it down against the door. “Hello!” the wisp calls out. “Anybody in?”\n\n“Luna, I don’t think that...” you begin to speak, but are cut short when the door unexpectedly opens, revealing a tall, dark-haired man on the other side.\n\n“Can I help you?” the man asks, leaving you speechless for a second.\n\n“Uh... Sorry, I didn’t think anybody lived here,” you admit.\n\n“I’m not sure that ‘living’ is the correct term, my ${Boy_Girl},” the man says, suddenly taking his head in his hands and clean removing it from his shoulders. The man then lowers his head, to hold it under his right arm. Still, the head continues to speak, even though it is completely detached from the man’s body. “But there are a few that reside here, whether you can call it living or not. Now, what can I do for you?”\n\nYou are stunned to silence for awhile, so Luna (who for some reason appears undaunted by the sudden removal of the man’s head) takes it upon herself to answer for you. “We’re looking for a mushroom!” she declares.\n\n“Mushroom?” the headless man asks. “Well I’m not sure about that, but there’s a lovely mushroom soup on the stove that must be just about ready by now. Please do come in.” And with that, the man opens the door wide to admit you and Luna. He then leads you through a long, dark corridor into a large kitchen, coated with dust and cobwebs, with vases of wilted flowers on the table, along with dishes of what appears to be completely rotten food. “My friends!” the man calls out. “We have guests!”\n\n*page_break\n\nThe headless man then steps to the side, and you see three other figures all sitting around the head of the table. Firstly, there is an incredibly hairy man with pointed teeth and long sharp nails, who has a habit of scratching behind his ear. Second, there is a small girl with rosy cheeks, fair hair that falls about her head in perfect ringlets and skin as pale as porcelain, making her look more like a doll than a human being. Finally, there is a tall man with a bolt in his neck and stitches all over his body. His skin tone changes wherever the stitches meet, making it look like he is crafted from parts of various other people that have been crudely sewn together.\n\n“Company!” cries the little doll girl with glee. “Oh how marvellous! You will stay for tea, wont you?” she asks.\n\n“Oh yes, do stay,” insists the hairy man, smiling to expose his fangs. “As I’m sure you can imagine, we haven’t had guests here for a long...” the man’s words trail off when he is overcome by a sudden urge to lift up his head up and howl.\n\n“Sorry ‘bout him,” grumbles the patched man in a very low, deep voice. “Him do dat sometime.”\n\n“So, can I offer you anything?” asks the headless man, as he walks over to the end of the table to join his friends. “Something to eat, or drink perhaps?”\n\n*page_break\n\n“I wouldn’t get too comfortable if I were you,” suddenly a new voice enters the conversation. It is a very faint and feminine voice, and you look around the room frantically, trying to figure out where the voice came from. This is all made clear though, when a ghostly visage of a beautiful young woman in a white, lace dress comes floating through the wall beside you. “One of them plans to murder you,” the ghost whispers in your ear. “They have a blade specially sharpened for when guests like you show up. I don’t think they’ve had red meat in a long time.”\n\n“That’s the most preposterous thing I’ve ever heard!” the headless man objects. “Don’t listen to her!”\n\n“No, don’t listen to me,” advices the ghost. “Listen to them. Listen to all of them, very carefully. Your life may depend on it. Here is the problem you see, and it is for you alone to solve;\n\nAs you see there are four suspects in this case. Hollow the headless man, Fang the werewolf, Rosie the living doll and Frank the man-made man. One of these people is planning to murder you. The other three will not harm you, but that doesn’t mean you can trust them. Three people at the table are lying. Only one of them is telling the truth. Listen to what they say, and then tell me which one is the killer,” the ghost tells you.\n\n“The werewolf is planning to kill you,” says Hollow the headless man.\n*line_break\n“No, it’s Frank over there that’s the killer,” says Fang, gesturing to the stitched up man.\n*line_break\n“I won’t harm a hair on your head, I swear,” says Rosie the little doll girl.\n*line_break\n“Dat werewolf lying,” says Frank.\n\n*choice\n  #Solve the riddle.\n    *goto Riddle_Rosie\n  #Ask Luna for a hint.\n    *if Rosie_Hint = 0\n      *set Hints + 1\n    *goto Hint_Rosie\n  #Eat a magic bean.\n    *if Rosie_Bean = 0\n      *set Beans + 1\n    *goto Bean_Rosie\n\n*label Hint_Rosie\n*set Rosie_Hint 1\n\nLuna looks a little nervous as her eyes dart back and forth between the four people at the table. “Oh dear, I don’t want to get eaten... Okay, let me think. Only one of them is trying to kill you and only one of them is telling the truth. So, let’s say the headless man is telling the truth. He says it’s the werewolf that’s the killer. Now, the werewolf says it’s Frank who wants to kill you, that must be a lie... But then the doll girl said she won’t kill you, and if the werewolf is the killer, that must be the truth. And Frank said the werewolf was lying, and if he is the killer, that must be true too! So... So we know it’s definitely not the headless man that’s telling the truth. I think we need to figure out which one’s telling the truth first, before we can figure out who the killer is!”\n\n“As you see there are four suspects in this case,” says the ghost. “Hollow the headless man, Fang the werewolf, Rosie the living doll and Frank the man-made man. One of these people is planning to murder you. The other three will not harm you, but that doesn’t mean you can trust them. Three people at the table are lying. Only one of them is telling the truth. Listen to what they say, and then tell me, which one is the killer,” the ghost tells you.\n\n“The werewolf is planning to kill you,” says Hollow the headless man.\n*line_break\n“No, it’s Frank over there that’s the killer,” says Fang, gesturing to the stitched up man.\n*line_break\n“I won’t harm a hair on your head, I swear,” says Rosie the little doll girl.\n*line_break\n“Dat werewolf lying,” says Frank.\n\n*choice\n  #Solve the riddle.\n    *goto Riddle_Rosie\n  #Eat a magic bean.\n    *if Rosie_Bean = 0\n      *set Beans + 1\n    *goto Bean_Rosie\n\n\n*label Bean_Rosie\n*set Rosie_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Rosie is the killer.[/b]\n\n*choice\n  #Solve the riddle.\n    *goto Riddle_Rosie\n\n*label Riddle_Rosie\n\n“Who do you think is planning to kill you?” asks the ghost.\n\n*choice\n  #Hollow the headless man.\n    *goto Rosie_Incorrect\n  #Fang the werewolf.\n    *goto Rosie_Incorrect\n  #Rosie the doll girl.\n    *goto Rosie\n  #Frank the man-made man.\n    *goto Rosie_Incorrect\n\n*label Rosie_Incorrect\n\n“Yey, the riddle’s solved!” cheers Luna. “Does that mean we can have tea now?”\n\n“I wouldn’t settle down quite yet,” warns the ghostly woman. “I’m afraid you’ve chosen incorrectly. The killer is still sitting at that table, waiting for an opportunity to pounce. Guess again child, before they make you their next victim.”\n\n“As you see there are four suspects in this case,” says the ghost. “Hollow the headless man, Fang the werewolf, Rosie the living doll and Frank the man-made man. One of these people is planning to murder you. The other three will not harm you, but that doesn’t mean you can trust them. Three people at the table are lying. Only one of them is telling the truth. Listen to what they say, and then tell me, which one is the killer,” the ghost tells you.\n\n“The werewolf is planning to kill you,” says Hollow the headless man.\n*line_break\n“No, it’s Frank over there that’s the killer,” says Fang, gesturing to the stitched up man.\n*line_break\n“I won’t harm a hair on your head, I swear,” says Rosie the little doll girl.\n*line_break\n“Dat werewolf lying,” says Frank.\n\n*choice\n  #Solve the riddle.\n    *goto Riddle_Rosie\n  #Ask Luna for a hint.\n    *if Rosie_Hint = 0\n      *set Hints + 1\n    *goto Hint_Rosie\n  #Eat a magic bean.\n    *if Rosie_Bean = 0\n      *set Beans + 1\n    *goto Bean_Rosie\n\n*label Rosie\n\nThe little doll girl tilts her head to the side and gives you an innocent smile. “Why surely you must be mistaken. You can’t seriously believe that little old me could mean you any harm?” Seeing that you’re not convinced, Rosie jumps onto the table and pulls a butcher’s knife from inside what remains of a turkey carcass on the table. She then charges, with wide, crazed eyes set on you. Luckily she is stopped when Frank, the man-made man picks the doll up by the back of her collar.\n\n“Why Miss Rosie, you ought be shame of you self,” the gentle giant berates her. “Is no nice to stab guest with knife. I put you in toy box until you learn lesson.”\n\n“No, no, not the toy box! Please, I’ll be good, I swear!” the doll girl cries out as Frank carries her away. The werewolf and the headless man look mildly disappointed and eventually get up to leave, presumably annoyed that you won’t be on the menu tonight.\n\n*page_break\n\n“Well, now that, that unpleasant business is out of the way, welcome to my home,” the ghost greets you and Luna. “I am Charlotte, the lady of the house, and have been for... How many years is it now?” she asks herself. “You know, it’s been so long, I can’t quite recall. And your names are?”\n\n“${Name},” you introduce yourself, “and the wisp is Luna.”\n\n“What happened to you?” Luna asks, tactlessly. “Did that nasty doll get you too?”\n\n“Oh no dear,” the ghost reassures you. “No, my passing was altogether more painful. Now I am frozen forever in what was to be my wedding dress. For hours I stood there at the altar, waiting for my love to come. I stood there when the guests started to grow frustrated and leave, I stood there long after the priest was gone, I stood there even when the flowers it my bouquet started to wilt in my hands. There I stood waiting, day after day, until I finally died of a broken heart. Even now, I am waiting. I shall remain here in this house until finally my true love returns to me.”\n\n“I’m sorry,” you tell the ghost bride. “That’s a really sad story.”\n\n“It is,” she agrees, “but there is no reason that your story should also be a sad one. No need to tell me your tale child, I already know. You’re here for the mushroom aren’t you? The Possessed Portobello. Well you are not the first to come in search of it, but I do hope you are the last. I’m afraid things did not fair so well for the others.”\n\n“Oh dear,” you mutter to yourself. “Don’t suppose there’s any advice you can give me?”\n\n“Don’t die,” the ghost bride advices. “That aside, keep your wits about you. It takes a sharp mind to escape from this house in one piece. In fact, I’d like to test that mind if I may, see how bright you are before I allow you to venture further.”\n\n“Okay, go ahead,” you tell Charlotte.\n\n“Very well, then here is my riddle to you;\n\nWhat has four fingers and a thumb, but no flesh, blood or bones?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Glove\n    *if (\"$!!{Riddle_Glove}\" = \"GLOVE\") or (choice_randomtest)\n      *goto Glove\n    *else\n      *goto Glove_Incorrect\n  #Ask Luna for a hint.\n    *if Glove_Hint = 0\n      *set Hints + 1\n    *goto Hint_Glove\n  #Eat a magic bean.\n    *if Glove_Bean = 0\n      *set Beans + 1\n    *goto Bean_Glove\n\n*label Hint_Glove\n*set Glove_Hint 1\n\n“Well a hand has four fingers and a thumb!” Luna declares proudly. “... Oh, but I suppose a hand has flesh, blood and bones as well, doesn’t it? Maybe it’s something to do with a hand though. Something that’s shaped like a hand perhaps? Maybe even something you might put a hand inside?”\n\nWhat has four fingers and a thumb, but no flesh, blood or bones?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Glove\n    *if (\"$!!{Riddle_Glove}\" = \"GLOVE\") or (choice_randomtest)\n      *goto Glove\n    *else\n      *goto Glove_Incorrect\n  #Eat a magic bean.\n    *if Glove_Bean = 0\n      *set Beans + 1\n    *goto Bean_Glove\n\n*label Bean_Glove\n*set Glove_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Glove.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Glove\n    *if (\"$!!{Riddle_Glove}\" = \"GLOVE\") or (choice_randomtest)\n      *goto Glove\n    *else\n      *goto Glove_Incorrect\n\n*label Glove_Incorrect\nThe ghost bride shakes her head. “No, I’m afraid that’s not right, my dear. I must insist that you give me a correct answer before I allow you to continue your search for the Possessed Portobello.\n\nWhat has four fingers and a thumb, but no flesh, blood or bones?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Glove\n    *if (\"$!!{Riddle_Glove}\" = \"GLOVE\") or (choice_randomtest)\n      *goto Glove\n    *else\n      *goto Glove_Incorrect\n  #Ask Luna for a hint.\n    *if Glove_Hint = 0\n      *set Hints + 1\n    *goto Hint_Glove\n  #Eat a magic bean.\n    *if Glove_Bean = 0\n      *set Beans + 1\n    *goto Bean_Glove\n\n*label Glove\n\n“Yes, very good,” Charlotte says with a smile. “Perhaps you’re bright enough to survive in this place after all. Follow me then, I will lead you to the Possessed Portobello myself.” And with that, you follow the ghost as she floats away, right up until she fades through another wall.\n\n“Ah...” you mumble to Luna, putting your hand against the wall. “This might be a problem.”\n\n“How do we get to the other side?” Luna asks herself. “I don’t see a door anywhere, just a dusty old bookshelf. Oh, look! Handsome and the Hag!” she says, gesturing to one of the books. “This was my favourite book when I was just a wisp of a wisp. I want to read it!” Unfortunately, this book is not quite what it seems. When Luna pulls it from the shelf, this opens a trap door beneath you that sends you sliding and screaming to the floor below.\n\n“Owh,” you grumble when you finally hit the bottom. “Please be careful what you touch in here Luna!” you yell up to the wisp.\n\nAll around you is pure darkness until Luna finally flutters down to faintly illuminate the room with her glow. “Sorry ${Name}!” she says to you. “But how was I supposed to know about the trap door? They should really put a warning sign on that bookshelf. Somebody could’ve gotten hurt.”\n\n“I think that’s the point Luna,” you tell her before slowly exploring the room. As the wisp flutters around, you can see a variety of disturbing objects. A creaky old rocking chair, an old wine rack, absolutely coated in spider’s webs and even a few broken bottles on the floor. “Looks like somebody’s been at the wine in here,” you say to yourself.\n\n*page_break\n\n“Well what else are you supposed to drink when you hide out in a wine cellar?” you hear a voice say, and turning around you see a pair of eyes appear from the darkness, causing you to stumble backwards in shock. “Not exactly my drink of choice ${Boy_Girl}, but you got to make do with what you got, ain’t that right Slicer?”\n\n“Too true Dicer,” another voice comes from the corner, with another pair of eyes appearing from pure darkness. “Been down here far too long, we have. Not had a job in days. What’s say we waste this one, just for fun?”\n\nThe two figures move forward and it becomes clear why you couldn’t see them in the darkness. Their skin is pure, ebony black, though you can see now that their hair is pale white. The two have long, pointed ears, and when they stand side by side you can see the two are completely identical.\n\nBefore you can object, Charlotte floats through the wall behind you to join the conversation. “Ah, I see you’ve met the svartálfar twins,” the ghost bride comments.\n\n“Svartálfar?” you repeat, struggling to pronounce the word.\n\n“Dark hearted beasts from ancient mythology,” Charlotte explains. “In your language I believe it literally translates to ‘black elves’.” Turning to the two brothers, the ghost now addresses them instead of you. “Slicer, Dicer... Playing nicely I assume?”\n\n“Oh, of course Ma’am!” insists Slicer.\n\n“Don’t we always?” asks Dicer.\n\n“Very good,” groans Charlotte, not sounding convinced. She then turns to direct her attention back to you. “These two are the most infamous assassins our realm has ever seen. They hide out here between jobs, since even if somebody figured out they were here, nobody in their right might would ever risk entering this house.”\n\n“Except this little brat,” one of the brothers says, clapping his hand on your shoulder. “What’s say we have some fun with ${Him_Her} before we send the ${Boy_Girl} on ${His_Her} merry way?”\n\n“Oh, very well,” Charlotte says, irritably folding her arms, “but do make it quick.”\n\n*page_break\n\nWith wicked grins spread across their faces, the two brothers crouch down so that their eyes are level with yours. “Now, listen up sunshine,” one of the brother’s says. “I’ve got a little poser for you. If you get it right, we let you go without a scratch.”\n\n“And if I get it wrong?” you ask.\n\n“Well, we’ll just have to wait and see, won’t we?” says the other brother. “Now hush up and listen;\n\n“Last week, me and my brother Slicer here were hired to assassinate 10 men,” says Dicer.\n\n“Those men were all spread out over the realm, you see, so we decided to split up and kill half each,” says Slicer.\n\n“Now me, Dicer that is, it took me exactly two days to find each victim,” says Dicer.\n\n“Whereas me, Slicer, it took me five days each to find my victims,” says Slicer.\n\n“Now, we both got paid 100 gold pieces each for every man we killed,” Dicer tells you, “So, knowing all of that, can you tell me, how many gold pieces did my brother Slicer earn once the job was done?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Fivehundred\n    *if (Riddle_Fivehundred = \"500\") or (choice_randomtest)\n      *goto Fivehundred\n    *else\n      *goto Fivehundred_Incorrect\n  #Ask Luna for a hint.\n    *if Fivehundred_Hint = 0\n      *set Hints + 1\n    *goto Hint_Fivehundred\n  #Eat a magic bean.\n    *if Fivehundred_Bean = 0\n      *set Beans + 1\n    *goto Bean_Fivehundred\n\n*label Hint_Fivehundred\n*set Fivehundred_Hint 1\n\nLuna considers the question for a moment. “Well, there’s ten men altogether, and Dicer only takes two days to find each man, but Slicer takes five. So after fifteen days, Dicer would’ve found seven men and Slicer would’ve only found three men... And they get 100 gold for each person they kill so... 300! Slicer would’ve made 300 gold... But wait... What was it they said at the beginning? Something about splitting up. I forgot about that part.”\n\n“Last week, me and my brother Slicer here were hired to assassinate 10 men,” says Dicer.\n\n“Those men were all spread out over the realm, you see, so we decided to split up and kill half each,” says Slicer.\n\n“Now me, Dicer that is, it took me exactly two days to find each victim,” says Dicer.\n\n“Whereas me, Slicer, it took me five days each to find my victims,” says Slicer.\n\n“Now, we both got paid 100 gold pieces each for every man we killed,” Dicer tells you, “So, knowing all of that, can you tell me, how many gold pieces did my brother Slicer earn once the job was done?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Fivehundred\n    *if (Riddle_Fivehundred = \"500\") or (choice_randomtest)\n      *goto Fivehundred\n    *else\n      *goto Fivehundred_Incorrect\n  #Eat a magic bean.\n    *if Fivehundred_Bean = 0\n      *set Beans + 1\n    *goto Bean_Fivehundred\n\n*label Bean_Fivehundred\n*set Fivehundred_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]500.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Fivehundred\n    *if (Riddle_Fivehundred = \"500\") or (choice_randomtest)\n      *goto Fivehundred\n    *else\n      *goto Fivehundred_Incorrect\n\n*label Fivehundred_Incorrect\n\nThe two brothers are grinning from ear to ear when you answer the question. “Little mite got it wrong,” Dicer says happily.\n\n“How do you think we should punish ${Him_Her}?” asks Slicer.\n\n“Maybe tar and feather ${Him_Her}?” Dicer suggests.\n\n“Or shove ${Him_Her} in the stocks for a few hours?” says Slicer.\n\n“Or cut all ${His_Her} little fingers off one by one,” Dicer says, pulling a sharp knife from his pocket.\n\n“Now, now boys,” Charlotte says calmly. “I told you to play nice. Give the ${Boy_Girl} another chance. ${He_She}’s only a child after all.”\n\n“Oh fine!” Slicer says, sounding quite annoyed. “Well, better guess again kid, we’re getting impatient.”\n\n“Last week, me and my brother Slicer here were hired to assassinate 10 men,” says Dicer.\n\n“Those men were all spread out over the realm, you see, so we decided to split up and kill half each,” says Slicer.\n\n“Now me, Dicer that is, it took me exactly two days to find each victim,” says Dicer.\n\n“Whereas me, Slicer, it took me five days each to find my victims,” says Slicer.\n\n“Now, we both got paid 100 gold pieces each for every man we killed,” Dicer tells you, “So, knowing all of that, can you tell me, how many gold pieces did my brother Slicer earn once the job was done?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Fivehundred\n    *if (Riddle_Fivehundred = \"500\") or (choice_randomtest)\n      *goto Fivehundred\n    *else\n      *goto Fivehundred_Incorrect\n  #Ask Luna for a hint.\n    *if Fivehundred_Hint = 0\n      *set Hints + 1\n    *goto Hint_Fivehundred\n  #Eat a magic bean.\n    *if Fivehundred_Bean = 0\n      *set Beans + 1\n    *goto Bean_Fivehundred\n\n*label Fivehundred\n\nThe svartálfar brothers both roll their eyes, looking quite disappointed. “Yes, that’s right,” Dicer says reluctantly.\n\n“Doesn’t matter how long it took us to find our victims,” adds Slicer. “If we both agreed to kill half each, we’ll both end up with 500 gold, 100 for each kill.”\n\n“A nice try boys,” Charlotte tells the brothers, “But the ${Boy_Girl} won fair and square. Now, if you’ll excuse us,” the ghost bids the brothers farewell as she drifts through the air, her candle illuminating a large, spiral staircase leading upward. “Are you coming ${Name}?” she asks. “Or would you prefer to keep the brothers company awhile longer?”\n\n“Coming!” you call quickly after her, running to catch up with the ghost as she begins to drift up the stairs. “Thanks for getting me out of that,” you tell Charlotte. “I thought I was dead for sure.”\n\n“Oh, don’t worry about those boys, they’re harmless really,” the ghost attempts to reassure you. “Unless of course you have a price on your head. I don’t suppose you’ve upset any members of the unicorn mafia?”\n\n“Not that I know of,” you tell her.\n\n“Very good,” she says as she guides you further up the stairs. “Now be careful, we have bats upstairs. You don’t want to wake them.”\n\nLooking up, you can see that she’s right. Several bats are hanging upside down from the rafters. “It’s okay, I’ll be quiet,” you assure her.\n\n“Bats? Where?” squeaks Luna. You point up towards the rafters, causing the wisp to squeal with glee. “Oh, they’re so cute!”\n\n*page_break\n\nHearing this, one of the bats eyes shoot open and you’re sure you can see an almost human smile curving it’s animal lips. Releasing it’s grip and spreading it’s wings, the bat starts to float down and suddenly begins to transform, it’s wings becoming a long, black cape, it’s fur dissolving into human flesh, but it’s pointed white teeth remain the same.\n\n“Vhat is zis appetising smell in ze air?” the vampire asks as his eyes search the room until finally falling on you. “Vhy my sveet Charlotte, you have brought me a snack. So very kind of you. A little on ze scrawny side, perhaps, but a nice surprise none ze less.”\n\n“You can stop drooling Vlad, the ${Boy_Girl}’s not for eating,” Charlotte scolds him. “Now if you’ll excuse us, I’m taking ${Name} here to the mushroom.”\n\n“Ze Possessed Portobello?” Vlad asks. “Vhy, zat frightening fungus has been in your family for generations. You really think zis human deserves such a precious heirloom?”\n\n“That’s for me to decide,” the ghost says firmly. “Now, go get some rest while the sun’s still up.”\n\n“Oh, you vomen have such soft, veeping hearts, but I am not so easily svayed,” Vlad says as he steps out in front of you, leaning forward so that his eyes are level with yours. “Now, I am afraid I must have vords with you child. Come closer, I von’t bite... Not yet anyvay. So, you have come here to take ze lady’s greatest treasure avay? Vell, I am nothing if not a gentleman, so I must insist you prove your vorth to me before I allow you to take another step.”\n\n“You’re going to ask me a riddle, aren’t you?” you ask, getting quite used to the routine by now.\n\n“Vell, aren’t you ze bright von?” the vampire says sarcastically. “Now shut up and pay attention;\n\nI am not alive, yet I grow. I have no lungs, yet I need air. I have no mouth, yet I can drown. Vhat am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Fire\n    *if (\"$!!{Riddle_Fire}\" = \"FIRE\") or (choice_randomtest)\n      *goto Fire\n    *else\n      *goto Fire_Incorrect\n  #Ask Luna for a hint.\n    *if Fire_Hint = 0\n      *set Hints + 1\n    *goto Hint_Fire\n  #Eat a magic bean.\n    *if Fire_Bean = 0\n      *set Beans + 1\n    *goto Bean_Fire\n\n*label Hint_Fire\n*set Fire_Hint 1\n\n“Oh dear, this bat-person does look quite hungry. I probably shouldn’t have woken him up, should I?” Luna asks, to which you only scowl in response. “Okay, so, the riddle... Something that dies when it drinks. I’ve heard that witches melt when you throw water on them, but I think that’s just a rumour... Can you think of anything else that dies when you throw water on it?”\n\nI am not alive, yet I grow. I have no lungs, yet I need air. I have no mouth, yet I can drown. What am I?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Fire\n    *if (\"$!!{Riddle_Fire}\" = \"FIRE\") or (choice_randomtest)\n      *goto Fire\n    *else\n      *goto Fire_Incorrect\n  #Eat a magic bean.\n    *if Fire_Bean = 0\n      *set Beans + 1\n    *goto Bean_Fire\n\n*label Bean_Fire\n*set Fire_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Fire.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Fire\n    *if (\"$!!{Riddle_Fire}\" = \"FIRE\") or (choice_randomtest)\n      *goto Fire\n    *else\n      *goto Fire_Incorrect\n\n*label Fire_Incorrect\n\nVlad lets out a cruel, mocking laugh when he hears your answer. “Vell at least you tried child, but I’m afraid zat is not ze answer I vas looking for. And since I refuse to let you pass vithout a correct answer, I suppose you vill have to stay here... Say, you vouldn’t happen to know your blood type by any chance?”\n\n“Hey, hold on!” you object, backing away from the vampire, “I didn’t understand the riddle properly. Your accent must’ve confused me. Let me try again.”\n\n“Oh very vell,” Vlad says reluctantly, “but listen closely zis time;\n\nI am not alive, yet I grow. I have no lungs, yet I need air. I have no mouth, yet I can drown. Vhat am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Fire\n    *if (\"$!!{Riddle_Fire}\" = \"FIRE\") or (choice_randomtest)\n      *goto Fire\n    *else\n      *goto Fire_Incorrect\n  #Ask Luna for a hint.\n    *if Fire_Hint = 0\n      *set Hints + 1\n    *goto Hint_Fire\n  #Eat a magic bean.\n    *if Fire_Bean = 0\n      *set Beans + 1\n    *goto Bean_Fire\n\n*label Fire\n\nThe vampire shrugs his shoulders and takes a step to the side, extending his arm to usher you past. “Vell done my friend, I have been bested. Yes indeed, fire is ze answer I vas looking for. A fire needs sustenance to grow and spread, but vater vill stop ze flame in it’s tracks. And now human, I must bid you farevell,” Vlad says before transforming back into his bat form and flying away.\n\n“Good work ${Name},” Charlotte tells you. “Come along now, no time to waste... Well, not for you anyway. I have nothing but time,” she says as she guides you down a long, eerie passageway. “I honestly cannot tell you how many years I’ve been dead, but I do remember how important time seemed when I was living. Allow just a little time to pass you by and you simply fade away, like this man here.” The ghost then lifts a finger and gestures inside a small room with iron bars bolting the doorway. Inside, you see what little remains of another unfortunate soul foolish enough to enter this house. He is nothing but bones now, with one skeletal hand grasping desperately at the iron bars that separated him from his escape. “But I’m sure you won’t end up like that,” Charlotte assures you. “Now follow me, the mushroom is this way.” And with that, Charlotte leads you to the end of the passageway and floats through a door, leaving you on the other side.\n\nYou approach the door and fiddle with the doorknob but to no avail. “It’s locked,” you tell Luna.\n\n“Oh don’t worry ${Name}, I can fit through the keyhole!” the wisp tells you happily, fluttering through the small hole in the door and leaving you in the darkness.\n\n“Yeah, that’s great for you, what about me?” you call after her.\n\n“Oh yeah,” Luna mutters as she flies back to your side. “We should probably find a key... Oh look, there’s one!” Luna declares with a huge smile on her face.\n\n*page_break\n\nYou are not so happy though, when you see where the wisp is pointing. The key is in the hand of the skeleton behind the bars. Taking a deep breath to steel your nerves, you drop to your knees and attempt to pry the key from the corpse’s undead hand. You are instantly stopped though, when the skeleton’s head suddenly jerks upward to look you directly in the eye. The hand holding the key claps shut and the other hand takes a firm grip of your arm.\n\n“What are you doing?” the skeleton snaps. “Trying to steal my key are you? Dirty, rotten thief! The key’s mine I tell you, mine!”\n\n“Oh good, you’re awake!” Luna chirps happily, the reanimation of a corpse not being nearly disturbing enough to rob her of her sunny disposition. “Excuse me sir, I don’t suppose we could borrow that key for a moment, could we?”\n\n“No, it’s mine!” the skeleton yells at you both. “I need this key! I need it to escape!”\n\nYou are shocked to silence for a few seconds, but after you regain your courage, you point out, “But how can you escape now? I’m not sure if you’ve noticed but... You’re not exactly in one piece any more.”\n\n“That’s not the point!” the skeleton insists. “I answered five riddles to get to this key, I earned it! It belongs to me!”\n\n“Well I’ve answered riddles too!” you insist. “And I need that key to get through the door.”\n\n*page_break\n\nThe skeleton is silent for a moment as he considers your argument. Eventually he releases his grip on your arm and takes hold of the iron bars once more. “Well, I suppose you did make it this far. Very well ${Boy_Girl}, I’ll tell you what, there’s a riddle carved into the wall of this room. If I could’ve solved it, the iron bars would’ve been lifted and I’d have been free to carry on my quest, but even after all these years trapped in this cell, poor old Bones could never solve the blasted thing.”\n\n“Bones?” you ask, raising an eyebrow. “Your name is Bones?”\n\n“Yeah, what of it?” Bones asks.\n\n“So you were called Bones before you were a skeleton?” you ask him.\n\n“Yeah, ironic that isn’t it?” he says irritably. “Here’s the deal, solve the riddle, release me from this cursed cell, and I’ll give you the key.”\n\n“Well I’ll give it a try,” you tell the skeleton. “What’s the riddle?”\n\nAnd so Bones turns to the wall and reads out his riddle to you;\n\n“It’s true I bring serenity,\n*line_break\nAnd hang around the stars.\n*line_break\nBut yet I live in misery,\n*line_break\nYou’ll find me behind bars.\n*line_break\nWith thieves and villains I consort,\n*line_break\nIn prison I’ll be found.\n*line_break\nBut I would never go to court,\n*line_break\nUnless there’s more than one around.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_S\n    *if (\"$!!{Riddle_S}\" = \"S\") or (choice_randomtest)\n      *goto S\n    *else\n      *goto S_Incorrect\n  #Ask Luna for a hint.\n    *if S_Hint = 0\n      *set Hints + 1\n    *goto Hint_S\n  #Eat a magic bean.\n    *if S_Bean = 0\n      *set Beans + 1\n    *goto Bean_S\n\n*label Hint_S\n*set S_Hint 1\n\n“Let’s see...” mumbles Luna. “Brings serenity, around stars, behind bars... You know, it’s the ending that I’m finding tricky. ‘I would never go to court, unless there’s more than one around.’ ... So whatever this riddle is talking about, you wont find it in court, but you’ll find it in courts. So, serenity, stars, misery, bars, thieves, villains, prison and courts. What do all those words have in common?”\n\nIt’s true I bring serenity,\n*line_break\nAnd hang around the stars.\n*line_break\nBut yet I live in misery,\n*line_break\nYou’ll find me behind bars.\n*line_break\nWith thieves and villains I consort,\n*line_break\nIn prison I’ll be found.\n*line_break\nBut I would never go to court,\n*line_break\nUnless there’s more than one around.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_S\n    *if (\"$!!{Riddle_S}\" = \"S\") or (choice_randomtest)\n      *goto S\n    *else\n      *goto S_Incorrect\n  #Eat a magic bean.\n    *if S_Bean = 0\n      *set Beans + 1\n    *goto Bean_S\n\n*label Bean_S\n*set S_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]S.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_S\n    *if (\"$!!{Riddle_S}\" = \"S\") or (choice_randomtest)\n      *goto S\n    *else\n      *goto S_Incorrect\n\n*label S_Incorrect\n\nThe skeleton shakes it’s skull, rattling as it does so. “No, no, I’ve already tried that answer and it didn’t work. Try again!”\n\nIt’s true I bring serenity,\n*line_break\nAnd hang around the stars.\n*line_break\nBut yet I live in misery,\n*line_break\nYou’ll find me behind bars.\n*line_break\nWith thieves and villains I consort,\n*line_break\nIn prison I’ll be found.\n*line_break\nBut I would never go to court,\n*line_break\nUnless there’s more than one around.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_S\n    *if (\"$!!{Riddle_S}\" = \"S\") or (choice_randomtest)\n      *goto S\n    *else\n      *goto S_Incorrect\n  #Ask Luna for a hint.\n    *if S_Hint = 0\n      *set Hints + 1\n    *goto Hint_S\n  #Eat a magic bean.\n    *if S_Bean = 0\n      *set Beans + 1\n    *goto Bean_S\n\n*label S\n\nAs soon as you give your answer, the iron bars of the cell are raised, releasing Bones from his prison. “That’s it? I’m free? Finally, I’m free!” he cries with joy. Unfortunately his joints are a little stiff and the hand that he had grasped around the iron bars does not release in time, so his hand is snapped clean from it’s wrist. Once it hits the ceiling, the hand is dislodged and falls straight onto the poor skeleton’s skull. “Ouch,” he grumbles, taking his hand back and trying to reattach it to his wrist. “Well you should certainly be proud of yourself kid. After all these years I’ve spent trying to escape, you solved that riddle in barely any time at all. Why didn’t I think of it? It begins the word serenity, it’s on either side of stars, at the end of bars and you’ll find it in courts but not in court. The letter S! Who would’ve thought it would be so simple? Well, here’s your key kid, you’ve earned it,” the skeletal figure says, extending the key towards you and surrendering it to your care. “You two go on ahead now. I think I’ll just stay here awhile and... Try to put myself back together,” he says as he struggles to reattach his hand.\n\n“Thanks Bones,” you say as you head towards the door. You insert the key and with one simple turn, the lock springs open.\n\n“Yey!” squeaks Luna. “It must’ve been a skeleton key,” she says with a childish grin, which soon turns to sulky disappointment when you refuse to laugh. “It was funny!” she tells you. You still don’t laugh.\n\nYou open the door and find Charlotte waiting for you on the other side. “Ah, there you are,” she says looking quite serious. “${Name}, I think we better have a little talk. You see, there’s an old friend of mine come to see you... I don’t suppose you’ve been feeling ill at all recently?”\n\n“No, why?” you ask, but your question is answered when Charlotte floats to the side, revealing a tall, thin figure, cloaked entirely in black and holding a long scythe in one hand.\n\n“... Oh dear,” mumbles Luna.\n\n*page_break\n\nThe figure floats over to you, it’s face entirely masked in darkness. “Ah, there you are!” the reaper says, putting a hand firmly on your shoulder. “I’ve been looking all over the house for you. Pleased to finally meet you, my name is Grimm, and I’ll be your guide to the afterlife. Now come along human, we need to get going, lots of collections to make today.”\n\n“Wait, I’m not dead!” you object, shrugging Grimm’s hand off your shoulder and backing away a few paces.\n\n“Really?” the reaper asks, taking a closer look at you. “Are you sure? The devil birds have cried their call of death. Somebody in this house has passed on to the next world, and there’s not many living souls left here for me to collect.”\n\n“Very, very sure!” you insist. “I feel just fine. Definitely no dead people here.”\n\n“$!{He_She}’s right sir!” Luna backs you up. “${Name} here is fit as a fiddle, healthy as a horse, lively as an... Alive thing.”\n\n“Really?” Grimm asks, still not sounding convinced. “Well I’ll tell you what ${Boy_Girl}, let’s give you a little test. If you pass, I’ll take your word that you haven’t quite shuffled off your mortal coil yet. If you fail though, you stop stalling and come to the afterlife with me. Now, here’s my riddle for you...”\n\n“Why would answering a riddle make me any more or less dead?” you ask, really not understanding the logic of this world.\n\n“Well if you’d prefer to just skip the riddle and go straight to the part where I sail you down the River Styx?” Grimm offers.\n\n“I’ll take the riddle please,” you say meekly.\n\n“Very well,” says the reaper.\n\n“Each morning I appear to lie at your feet,\n*line_break\nAnd follow you throughout the day down each and every street,\n*line_break\nAll day I will chase you no matter how fast you run,\n*line_break\nAnd yet I nearly perish in the light of midday sun.\n*line_break\nWhat am I?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Shadow\n    *if (\"$!!{Riddle_Shadow}\" = \"SHADOW\") or (choice_randomtest)\n      *goto Shadow\n    *else\n      *goto Shadow_Incorrect\n  #Ask Luna for a hint.\n    *if Shadow_Hint = 0\n      *set Hints + 1\n    *goto Hint_Shadow\n  #Eat a magic bean.\n    *if Shadow_Bean = 0\n      *set Beans + 1\n    *goto Bean_Shadow\n\n*label Hint_Shadow\n*set Shadow_Hint 1\n\n“Well I’ve never seen anybody shadowing me all day,” Luna insists. “You think people would notice something like that.”\n\nEach morning I appear to lie at your feet,\n*line_break\nAnd follow you throughout the day down each and every street,\n*line_break\nAll day I will chase you no matter how fast you run,\n*line_break\nAnd yet I nearly perish in the light of midday sun.\n*line_break\nWhat am I?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Shadow\n    *if (\"$!!{Riddle_Shadow}\" = \"SHADOW\") or (choice_randomtest)\n      *goto Shadow\n    *else\n      *goto Shadow_Incorrect\n  #Eat a magic bean.\n    *if Shadow_Bean = 0\n      *set Beans + 1\n    *goto Bean_Shadow\n\n*label Bean_Shadow\n*set Shadow_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Shadow.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Shadow\n    *if (\"$!!{Riddle_Shadow}\" = \"SHADOW\") or (choice_randomtest)\n      *goto Shadow\n    *else\n      *goto Shadow_Incorrect\n\n*label Shadow_Incorrect\n\n“Sorry my fragile mortal, but I’m afraid that’s not the answer,” Grimm says, grabbing your hand. “Now come along, stop making such a fuss and don’t give me any of that ‘But I’m too young to die’ malarkey. We all have to go sometime.”\n\n“No, that’s not what I meant!” you insist. “You rushed me. Let me try again!”\n\n“Oh very well,” the Reaper says reluctantly. “But don’t take too long, do you have any idea how many mayflies I have to clear up at this time of year?”\n\nEach morning I appear to lie at your feet,\n*line_break\nAnd follow you throughout the day down each and every street,\n*line_break\nAll day I will chase you no matter how fast you run,\n*line_break\nAnd yet I nearly perish in the light of midday sun.\n*line_break\nWhat am I?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Shadow\n    *if (\"$!!{Riddle_Shadow}\" = \"SHADOW\") or (choice_randomtest)\n      *goto Shadow\n    *else\n      *goto Shadow_Incorrect\n  #Ask Luna for a hint.\n    *if Shadow_Hint = 0\n      *set Hints + 1\n    *goto Hint_Shadow\n  #Eat a magic bean.\n    *if Shadow_Bean = 0\n      *set Beans + 1\n    *goto Bean_Shadow\n\n*label Shadow\n\nThe reaper gives a groan of irritation. “Yes child, I was of course referring to your shadow. It follows you around all day, but can barely be seen at midday when the sun is shining directly above you. Well, I suppose I’ll let you off this time. But if you’re not dead then someone else is. Guess I should start searching,” he says as he drifts off down the corridor you just came from.\n\nCharlotte is quiet for a moment as she sceptically looks you up and down. “Are you absolutely sure you’re not dead? You do look a little pale.”\n\n“Honestly, I feel fine,” you insist, “Can we go now, please?”\n\n“Oh, very well,” Charlotte says as she guides your path once more. “But I warn you, you may not like it where we’re going,” she says, leading you to a doorway, through which you can see only your own reflection from several different angles. “To reach the Possessed Portobello, you need to go through the hall of mirrors.”\n\n“Like a maze?” you ask. “That doesn’t sound so bad.”\n\n“On it’s own it isn’t,” Charlotte agrees, “but there is a terrible beast trapped in this maze. Vipera, the viper-haired gorgon. Be very careful as you explore, for if your eyes make contact with hers, you shall be turned instantly to stone,” the ghost warns you before drifting into the maze, through the first mirror and out of sight.\n\n“... Well this just gets better and better,” you mumble under your breath.\n\n“Don’t worry ${Name}!” Luna says cheerfully. “You can just close your eyes and I’ll tell you where to go. That way you’ll never see the gorgon!”\n\n“I have a very bad feeling about this,” you tell Luna, but you go along with her plan anyway.\n\n*page_break\n\n“Okay, forward,” Luna guides you. “Forward... Now left a little bit... Little bit more... Not that much. Okay, forward... Forward... Tehe, you’re standing next to one of those funny wobbly mirrors. It makes your head look all squishy!”\n\n“Luna, the maze!” you remind her.\n\n“Oh yeah,” she mumbles. “Okay, so now we go right... Now forward... Oh careful, watch out for the...”\n\n“Ow!” you yelp, not hearing Luna’s warning in time and rather painfully stubbing your toe. “What was that?”\n\n“Sorry ${Name},” the wisp apologises. “You need to watch out for the statues.”\n\n“Statues? What statues?” you ask, and unable to contain your curiosity any more, you open your eyes to see the face of a terrified man staring back at you, his final expression frozen forever in stone. “Yah!” you yelp in horror, backing away from the stone figure. Unfortunately your steps lead you to something far more dangerous. You suddenly collide with another living creature and a hand with long, sharp nails rests itself on your shoulder.\n\n“My, my, what have we here?” you hear a soft, feminine voice whisper in your ear. “It’s been so long since I’ve had a mortal to play with.”\n\n“Oh dear,” you mutter, your hands quickly moving to cover your eyes. “I’m not looking!” you declare suddenly. “If I can’t see you, I won’t get turned to stone.”\n\n“But how will you avoid me?” Vipera asks as she moves slowly around you. “You can’t keep your eyes shut forever, and when you open them, there I’ll be, standing right in front of you.”\n\n*page_break\n\n“Oh, look at the pretty snakes in her hair!” you hear Luna saying happily. “All green and black and blue. Such nice colours!”\n\n“Luna, why haven’t you turned to stone?” you ask the wisp.\n\n“Hmm...” she mumbles, thinking about it for awhile before finally answering, “I don’t know!”\n\n“Your friend does not see with mortal eyes child, my powers are wasted on her,” Vipera explains. “But you on the other hand... You will make a fine statue to add to my collection.”\n\n“I’d really rather not,” you tell the gorgon flatly.\n\n“All right my friend, I’ll make you a deal,” Vipera suggests. “I’m sure you’ve learned by now how fond of riddles we are in this world. Well it so happens, I have one right here, just for you. Answer the riddle correctly and I’ll guide you out of this maze. Fail, and you’re stuck here with me to become part of my beautiful gallery.” Putting a hand on each of your shoulders, the gorgon pushes you forward, round a few corners until finally coming to a halt. “Here we are,” she tells you. “The riddle is written on the wall right in front of you. Just open your eyes and you’ll see.”\n\n“Oh no, I’m not falling for that,” you tell her stubbornly.\n\n“Don’t worry ${Name}, I’ll read it for you!” Luna says, and proceeds to speak the riddle out loud;\n\n“Sense and logic have no place in this curious rhyme,\n*line_break\nThough the answer’s clear to see and has been all the time.\n*line_break\nRead me forwards, read me backwards, read me any way you want,\n*line_break\nAn answer’s hiding somewhere if you take the time to hunt.\n*line_break\nNot clear to see at first perhaps, but a suggestion if I may,\n*line_break\nGive up reading as you’ve been taught and try another way,\n*line_break\nEnough said, the poem’s read, I need an answer today.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Strange\n    *if (\"$!!{Riddle_Strange}\" = \"STRANGE\") or (choice_randomtest)\n      *goto Strange\n    *else\n      *goto Strange_Incorrect\n  #Ask Luna for a hint.\n    *if Strange_Hint = 0\n      *set Hints + 1\n    *goto Hint_Strange\n  #Eat a magic bean.\n    *if Strange_Bean = 0\n      *set Beans + 1\n    *goto Bean_Strange\n\n*label Hint_Strange\n*set Strange_Hint 1\n\n“I’ve definitely never heard this riddle before. It doesn’t make any sense to me,” Luna tells you. “And why does it have that seventh line at the end? It doesn’t seem like it needs it. I tried reading it forwards and backwards, but I can’t see an answer... Still, it does say to try looking at it another way. I’ll just turn my head upside down,” Luna tells you. “Nope, doesn’t make any sense this way up. Maybe if I tilt my head to the left a little... No, no I’ve turned my head all the way around and I still can’t... Oh wait! ${Name}, I think I’ve found it! I can see an answer this way!”\n\nSense and logic have no place in this curious rhyme,\n*line_break\nThough the answer’s clear to see and has been all the time.\n*line_break\nRead me forwards, read me backwards, read me any way you want,\n*line_break\nAn answer’s hiding somewhere if you take the time to hunt.\n*line_break\nNot clear to see at first perhaps, but a suggestion if I may,\n*line_break\nGive up reading as you’ve been taught and try another way,\n*line_break\nEnough said, the poem’s read, I need an answer today.\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Strange\n    *if (\"$!!{Riddle_Strange}\" = \"STRANGE\") or (choice_randomtest)\n      *goto Strange\n    *else\n      *goto Strange_Incorrect\n  #Eat a magic bean.\n    *if Strange_Bean = 0\n      *set Beans + 1\n    *goto Bean_Strange\n\n*label Bean_Strange\n*set Strange_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Strange.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Strange\n    *if (\"$!!{Riddle_Strange}\" = \"STRANGE\") or (choice_randomtest)\n      *goto Strange\n    *else\n      *goto Strange_Incorrect\n\n*label Strange_Incorrect\n\nOnce you speak the answer, you can feel the gorgon’s nails digging into your shoulders. “Oh dear my pet, I’m afraid it looks like you’re stuck with me. But there’s no need to fret so, after all, you will be trapped forever in a state of eternal youth. That doesn’t sound so bad now, does it?”\n\n“Wait, that’s not fair!” you object. “I can’t even see the riddle. Maybe Luna read it wrong. Let her read it again.”\n\n“Oh very well,” the gorgon says crossly, and allows Luna to repeat the poem.\n\n“Sense and logic have no place in this curious rhyme,\n*line_break\nThough the answer’s clear to see and has been all the time.\n*line_break\nRead me forwards, read me backwards, read me any way you want,\n*line_break\nAn answer’s hiding somewhere if you take the time to hunt.\n*line_break\nNot clear to see at first perhaps, but a suggestion if I may,\n*line_break\nGive up reading as you’ve been taught and try another way,\n*line_break\nEnough said, the poem’s read, I need an answer today.”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Strange\n    *if (\"$!!{Riddle_Strange}\" = \"STRANGE\") or (choice_randomtest)\n      *goto Strange\n    *else\n      *goto Strange_Incorrect\n  #Ask Luna for a hint.\n    *if Strange_Hint = 0\n      *set Hints + 1\n    *goto Hint_Strange\n  #Eat a magic bean.\n    *if Strange_Bean = 0\n      *set Beans + 1\n    *goto Bean_Strange\n\n*label Strange\n\nYou can hear a faint sigh of disappointment from Vipera. “All right human, you managed to solve my little test. The riddle might not make any sense when you read it left to right, but read it from top to bottom and the first letters of each sentence will spell out the word ‘Strange’. Well I suppose I should lead you out of this maze,” the gorgon says, taking you by the hand and pulling you forwards while you keep your eyes covered with your other hand. “We’d best hurry though, or we’ll be late for the funeral.”\n\n“Funeral?” you ask, confused, but shortly after you come to a halt and Vipera gives you a little shove forward. Finally working up the courage to open your eyes, you are greeted by a rather depressing sight. All the unusual inhabitants of this house are all seated on a collection of old, dusty chairs coated with cobwebs. Grimm the Reaper, Vlad the vampire, the two svartálfar brothers, the headless man, the werewolf, the little doll girl and Frank the man-made man have all gathered together to pay their respects to a lost one. Even Bones the skeleton has managed to drag himself here, though half of his bones are scattered on the floor, rather than on the chair and he is desperately trying to reattach them. In the centre of the room is a long, wooden coffin and standing behind that is Charlotte. Now that you’ve arrived, she begins speaking.\n\n“Ladies, gentlemen... Inanimate objects, we are gathered today to say goodbye to a dearly beloved friend Jack,” the ghost begins. “His life was tragically brief, but in his short time with us, he brought so much joy and happiness.”\n\n*page_break\n\nBeside you, you can hear Luna quietly sobbing to herself, despite the fact she has no idea who this funeral is for.\n\nLifting her head, Charlotte notices you standing there and extends her hand towards you. “Ah, ${Name}. Won’t you join us in bidding farewell do our dearly departed friend?”\n\nTaking a deep breath to steel your nerves, you slowly approach the coffin. Once you can see inside though, you are more confused than afraid. Instead of a body or bones or any other undead creature, in the coffin you see only a carrot along with two lumps of coal. “Uhh... Charlotte, I think you’re missing a body,” you point out, as sensitively as possible.\n\n“Well of course we are, the body is long gone,” Charlotte says as if this much should be obvious. “But I see you do not understand. Fret not child, I will explain to you as best I can;\n\nSweet Jack was dear to all of us, he had the purest soul,\n*line_break\nBut now all that is left is him is a carrot and some coal.\n*line_break\nIn just a few short days, nature did his life destroy,\n*line_break\nBut in his brief time with us, dear Jack brought us so much joy.\n*line_break\nHe left behind no children and he never took a wife,\n*line_break\nLittle remains of Jack in death, but what was he in his life?”\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Snowman\n    *if (\"$!!{Riddle_Snowman}\" = \"SNOWMAN\") or (choice_randomtest)\n      *goto Snowman\n    *else\n      *goto Snowman_Incorrect\n  #Ask Luna for a hint.\n    *if Snowman_Hint = 0\n      *set Hints + 1\n    *goto Hint_Snowman\n  #Eat a magic bean.\n    *if Snowman_Bean = 0\n      *set Beans + 1\n    *goto Bean_Snowman\n\n*label Hint_Snowman\n*set Snowman_Hint 1\n\nLuna continues to cry, resting her tiny head on your shoulder and drying her eyes on your shirt. “Oh the poor, poor thing. It just isn’t fair. They have such short lives. I mean you bring them into the world, you get to play with them for a day or two... Maybe a week if it’s really cold, and then you look outside one the morning and they’re gone, with just carrots and coal and maybe an old scarf to show that they ever existed.” This is the only explanation you get from Luna though, as she goes right back to crying again.\n\nSweet Jack was dear to all of us, he had the purest soul,\n*line_break\nBut now all that is left is him is a carrot and some coal.\n*line_break\nIn just a few short days, nature did his life destroy,\n*line_break\nBut in his brief time with us, dear Jack brought us so much joy.\n*line_break\nHe left behind no children and he never took a wife,\n*line_break\nLittle remains of Jack in death, but what was he in his life?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Snowman\n    *if (\"$!!{Riddle_Snowman}\" = \"SNOWMAN\") or (choice_randomtest)\n      *goto Snowman\n    *else\n      *goto Snowman_Incorrect\n  #Eat a magic bean.\n    *if Snowman_Bean = 0\n      *set Beans + 1\n    *goto Bean_Snowman\n\n*label Bean_Snowman\n*set Snowman_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]Snowman.[/b]\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Snowman\n    *if (\"$!!{Riddle_Snowman}\" = \"SNOWMAN\") or (choice_randomtest)\n      *goto Snowman\n    *else\n      *goto Snowman_Incorrect\n\n*label Snowman_Incorrect\n\nAt your answer, all the funeral attendants let out a gasp of horror. Even Luna looks shocked. “Why ${Name}, you should be ashamed of yourself!” Charlotte says, folding her arms very sternly in disappointment. “I would’ve expected better from you than to make jokes like that about the dead!”\n\n“I’m sorry, I didn’t understand the riddle!” you say in your defence. “Please let me try again.”\n\nSweet Jack was dear to all of us, he had the purest soul,\n*line_break\nBut now all that is left is him is a carrot and some coal.\n*line_break\nIn just a few short days, nature did his life destroy,\n*line_break\nBut in his brief time with us, dear Jack brought us so much joy.\n*line_break\nHe left behind no children and he never took a wife,\n*line_break\nLittle remains of Jack in death, but what was he in his life?\n\n*choice\n  #Solve the riddle.\n    What is the answer?\n    *input_text Riddle_Snowman\n    *if (\"$!!{Riddle_Snowman}\" = \"SNOWMAN\") or (choice_randomtest)\n      *goto Snowman\n    *else\n      *goto Snowman_Incorrect\n  #Ask Luna for a hint.\n    *if Snowman_Hint = 0\n      *set Hints + 1\n    *goto Hint_Snowman\n  #Eat a magic bean.\n    *if Snowman_Bean = 0\n      *set Beans + 1\n    *goto Bean_Snowman\n\n*label Snowman\n\nCharlotte bows her head solemnly. “Yes ${Name}, indeed. Jack Frost was a humble snowman. He was with us for only three days before he melted away, leaving behind only the carrot that was his nose and the two lumps of coal that were his eyes. But even in this time of sorrow, there is joy, for one day it will snow again and the carrot and coal that were once Jack’s will be used to create a new snowman, and from his death shall spring new life.\n\nI thank you all for coming but it is getting late and I fear it is time to retire.” At Charlotte’s words, all the creatures in the room begin to rise from their seats and exit through a door to the left of them. Bones takes up the rear as one of his legs has become unattached, so he is forced to hop on one leg and use the other as a walking stick.\n\n\n“Well, it seems now your journey is coming to an end young ${Name}, and I fear I must leave you to face the final trial yourself,” the ghost tells you, sounding slightly concerned.\n\n“What is the final trial?” you ask, and, gesturing for you to follow, Charlotte leads you into the room that all the other occupants of the house just entered. Strangely, you can see none of the others there once you’re inside. All you can see is more coffins. Twelve coffins altogether, six lined up against one side of the wall and six lined up against the opposite, all with numbers on them from one to twelve, like the numbers you would find on a house door.\n\n“This room is where all the occupants of this house come together to rest,” Charlotte explains. “There are eleven of us now that sleep in these dismal beds of death. The remaining coffin is the resting place of the Possessed Portobello.”\n\n*page_break\n\n“So the mushroom is in one of these coffins?” Luna asks excitedly, fluttering over to the nearest one.\n\n“Yes, but I would not open just any of these coffins if I were you,” Charlotte warns you. “Remember, there are some in this house that wish you harm, and I will not be here to protect you. But fear not, there are clues in this room, clues that will help to show you which coffin the Possessed Portobello is hidden in. You see that plaque?” Charlotte asks, lifting her hand and pointing to a large, wooden plaque nailed to the wall. “On that plaque, you will find a list of those who rest in these coffins. This will aid you in your mission, and I’m afraid that is all the aid I can give you,” Charlotte says, floating towards the third coffin on the left that is labelled with a 3. “Farewell ${Name},” she says fondly as she turns back to you. “I truly hope you do not meet your fate in this house as I did.” And with that, she enters the coffin, leaving you to solve the final riddle on your own.\n\nNow, you must figure out for yourself, which coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Coffin\n\nWhich coffin do you want to open?\n\n*choice\n  #Coffin 1.\n    *goto Vlad_Coffin\n  #Coffin 2.\n    *goto Frank_Coffin\n  #Coffin 3.\n    *goto Charlotte_Coffin\n  #Coffin 4.\n    *goto Fang_Coffin\n  #Coffin 5.\n    *goto Possessed_Portobello\n  #Coffin 6.\n    *goto Rosie_Coffin\n  #Coffin 7.\n    *goto Bones_Coffin\n  #Coffin 8.\n    *goto Drow_Coffin\n  #Coffin 9.\n    *goto Drow_Coffin\n  #Coffin 10.\n    *goto Grimm_Coffin\n  #Coffin 11.\n    *goto Vipera_Coffin\n  #Coffin 12.\n    *goto Hollow_Coffin\n\n*label Hint_Coffin\n*set Coffin_Hint 1\n\n“Hmm... This is tricky...” Luna mumbles to herself. “I know, let’s draw a picture! I like pictures!” she declares happily before drawing an image in the dust on the ground. The image is simply the 12 coffins and their locations in the room. “Now, we don’t know where the mushroom is yet... But we know Charlotte is in Coffin 3!” And with that, Luna writes Charlotte’s name over Coffin 3. “So, the mushroom is definitely not in Coffin 3. Now all we need to do is figure out who’s sleeping in all the other coffins, then whatever coffin is left over must have the mushroom inside! I’m not sure who’s sleeping in the other coffins though... Let’s look for clues!”\n\nWhich coffin contains the Possessed Portobello?\n\n*image Floor.png\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Bean_Coffin\n*set Coffin_Bean 1\n\nYou eat a magic bean and instantly know the answer to the riddle.\n\n[b]The Possessed Portobello is in Coffin 5.[/b]\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n\n*label Explore\n\nWhat do you want to do?\n\n*choice\n  #Read the plaque.\n    *goto Plaque\n  #Inspect coffin 1.\n    *goto Coffin_1\n  #Inspect coffin 2.\n    *goto Coffin_2\n  #Inspect coffin 3.\n    *goto Coffin_3\n  #Inspect coffin 4.\n    *goto Coffin_4\n  #Inspect coffin 5.\n    *goto Coffin_5\n  #Inspect coffin 6.\n    *goto Coffin_6\n  #Inspect coffin 7.\n    *goto Coffin_7\n  #Inspect coffin 8.\n    *goto Coffin_8\n  #Inspect coffin 9.\n    *goto Coffin_9\n  #Inspect coffin 10.\n    *goto Coffin_10\n  #Inspect coffin 11.\n    *goto Coffin_11\n  #Inspect coffin 12.\n    *goto Coffin_12\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Plaque\n\nYou approach the plaque on the wall, and reading it, you find that it contains a list of the names and species of the house’s inhabitants that are currently inside the coffins, though with no clue whatsoever as to who is inside which coffin. The list is as follows;\n\nCharlotte (Ghost bride)\n*line_break\nHollow (Headless man)\n*line_break\nFang (Werewolf)\n*line_break\nRosie (Living doll)\n*line_break\nFrank (Man-made man)\n*line_break\nSlicer (Svartálfar assassin)\n*line_break\nDicer (Svartálfar assassin)\n*line_break\nVlad (Vampire)\n*line_break\nBones (Skeleton)\n*line_break\nGrimm (Reaper)\n*line_break\nVipera (Gorgon)\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_1\n\nYou take a look at Coffin 1 and see that there is a note pinned to it.\n\n*choice\n  #Read the note.\n    *goto Note\n  #Go back.\n    *goto Explore\n\n*label Coffin_2\n\nYou take a look at Coffin 2. It looks just like the other coffins, but you can hear a loud snoring sound coming from inside. Presumably the Possessed Portobello is not in here.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_3\n\nYou take a look at Coffin 3. This is the coffin that Charlotte went inside earlier, so you know the Possessed Portobello isn’t here.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_4\n\nYou take a look at Coffin 4 but you don’t notice anything unusual about it. It looks more or less the same as the other coffins.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_5\n\nYou take a look at Coffin 5 but you don’t notice anything unusual about it. It looks more or less the same as the other coffins.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_6\n\nYou take a look at Coffin 6 and it sticks out like a sore thumb. The other coffins are all more or less the same size, large enough to fit an adult human of at least 6 foot tall. This coffin on the other hand is tiny, ridiculously tiny even. You’d guess it was about a foot tall, too small for even a child to fit inside.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_7\n\nYou take a look at Coffin 7, and while it appears more or less the same as all the other coffins, you do notice a couple of tiny bones on the floor next to it.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_8\n\nYou take a look at Coffin 8 but you don’t notice anything unusual about it. It looks more or less the same as the other coffins.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_9\n\nYou take a look at Coffin 9 but you don’t notice anything unusual about it. It looks more or less the same as the other coffins.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_10\n\nYou take a look at Coffin 10 and while it looks the same as the other coffins, you do notice a book sitting on top of it.\n\n*choice\n  #Read the book.\n    *goto Book\n  #Go back.\n    *goto Explore\n\n*label Coffin_11\n\nYou take a look at Coffin 11 but you don’t notice anything unusual about it. It looks more or less the same as the other coffins.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Coffin_12\n\nYou take a look at Coffin 12 but you don’t notice anything unusual about it. It looks more or less the same as the other coffins.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Note\n\nThe note reads as follows;\n\nDear Vlad,\n\nIf it’s not too much trouble I was wondering if you’d mind switching coffins with me. I know it’s a strange request but I’m sure you can understand why.\n\nAs you know, Hollow has been infatuated with Charlotte for some time and was very persistent with his advances. However, she has made it clear to him on several occasions that she is still awaiting the return of her lover who abandoned her at the altar and has eyes for no other man.\n\nUnfortunately, since then, his attentions have turned to me. It was flattering at first, but now I must confess that I find it extremely irritating. His unwanted affection would be a lot easier to handle if Hollow was not sleeping in the coffin next to mine.\n\nPersonally, I believe we would be doing each other a favour. Since Hollow sleeps at the opposite end of the room to you, switching coffins would mean that I would be sleeping as far away from him as possible. That said, I understand that our friend in the coffin beside you keeps you up all night with his snoring, and so exchanging coffins would also help you to get some well needed rest.\n\nPlease do consider it,\n\nVipera\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Book\n\nYou open the book which appears to be some sort of journal. Throwing aside any respect for undead privacy, you read the most recent entry;\n\nGuiding the souls of the dead from one life to the next is very tiring work, and I am glad to have found a rather secluded house, seldom visited by mortals due to the undead that dwell within. A ghost woman by the name of Charlotte is the lady of the house, and she has kindly offered to let me use this house as a place of rest, provided of course that I make no attempt to usher her immortal soul into the afterlife.\n\nThere are quite a few unusual inhabitants of this house, a headless man by the name of Hollow, who makes a nuisance of himself with his constant unwanted advances upon the ladies that reside here, a one foot tall, living doll named Rosie who frankly even I find disturbing, and a very interesting creature known only as Frank who seems to be a man constructed from the body parts of various other men. He is mostly a silent creature by day, though he makes up for this with his terrible snoring throughout the night.\n\nIt is not only undead creatures that reside here though. Slicer and Dicer are two svartálfar brothers who are both quite alive and seem to use this house as a safe haven between jobs. I am not sure what their line of work is, but there always seem to be souls nearby to collect whenever they leave. Interesting, that. They are not much for conversation though. For the most part, they only seem to converse with each other. They eat together, work together, and of course their coffins are side by side when they sleep.\n\nThere is also a skeleton aptly names Bones who always seems to be losing parts of himself, a very vain gorgon by the name of Vipera and finally a werewolf named Fang who for the most part does not bother me, except of course for nights when there is a full moon. Then he makes it impossible to get any rest with his endless howling, which is particularly frustrating since he sleeps in the coffin directly opposite mine.\n\n*choice\n  #Go back.\n    *goto Explore\n\n*label Vlad_Coffin\n\nYou open the coffin door and are quite worried to discover that, rather than finding the Possessed Portobello, you have opened Vlad the vampire’s coffin. Not only that but you have woken him up as well. “Ah, ${Name}. So good to see you again,” he says. “I must say, I vas hoping you vould stay. I am feeling rather peckish zis evening and I vouldn’t say no to a midnight snack... And since our friend Charlotte is not here to object...”\n\n“Uh... Yes, midnight snack...” you say nervously as you back away. “See uh... The thing is, it actually isn’t quite midnight yet. Not for a few hours yet I think. How about I come back later?”\n\n“Oh very vell,” Vlad grumbles. “But don’t be late.” He says as he closes the coffin door once more. The vampire might not be pleased when midnight comes and you don’t show up, but hopefully you’ll be back in your own world by then, and far out of Vlad’s reach.\n\n“That was close,” you whisper to Luna, breathing a sigh of relief.\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Frank_Coffin\n\nYou open the coffin door, but instead of the Possessed Portobello, you find Frank, the stitched up man in the coffin, snoring rather loudly.\n\n“Awh, sleeping like a baby!” Luna announces.\n\n“Yeah, we probably shouldn’t wake him,” you whisper, slowly closing the coffin lid. “Well, I guess the Possessed Portobello’s not in there,” you say, disappointed.\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “Frank was a nice monster. The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Charlotte_Coffin\n\nYou open the coffin door and see Charlotte laying inside. The ghost opens her eyes and turns towards you. “Why do you disturb me ${Name}?” she asks. “Even the souls of the dead must rest sometimes.”\n\n“I need your help Charlotte!” you insist. “I can’t figure out where the Possessed Portobello is!”\n\n“I’m sorry ${Name}, but this is the way things are in our world,” Charlotte tells you. “I have helped you this far, but this final task you must solve alone. Otherwise, you would not be worthy of the reward. I only guided you here because I believe you are wise and brave enough to find the Portobello without my help. I truly hope I was right about you. Now please let me rest, and dream of the day my true love will finally return to me.”\n\nSince it’s clear that Charlotte is not going to help you any more, you close the coffin lid and endeavour to find the mushroom by yourself.\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *if Coffin_Hint = 0\n      *set Hints + 1\n    *goto Hint_Coffin\n  #Eat a magic bean.\n    *if Coffin_Bean = 0\n      *set Beans + 1\n    *goto Bean_Coffin\n\n*label Fang_Coffin\n\nYou open the coffin door, but instead of the Possessed Portobello, you find Fang, the werewolf that was planning on having you as his main course when you first entered this madhouse. You are about to close the coffin lid again when his eyes shoot open. “Still here ${Boy_Girl}?” the werewolf asks, licking his lips. “This isn’t a safe place for children like you, you know. Why, on a full moon I’d devour a little morsel like you in two mouthfuls.”\n\n“Uh... I’m sure you would,” you say nervously. “But unfortunately it’s not a full moon, so... Goodnight!” And with that, you slam the coffin lid back down. “That was close,” you whisper to Luna, breathing a sigh of relief.\n\n“Yeah, maybe we should look for more clues before we open another coffin,” Luna suggests. “The next person might eat you.”\n\nWhich coffin contains the Possessed Portobello?\n\n*choice\n  #Search the room.\n    *goto Explore\n  #Solve the riddle.\n    *goto Coffin\n  #Ask Luna for a hint.\n    *
