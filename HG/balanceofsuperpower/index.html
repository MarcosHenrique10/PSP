\n        \n        You see several other students, including a very tall skinny girl, whose arms are almost as long as her entire body. Perhaps the tall ceiling is meant to accommodate students like her?\n        \n        You decide to get something to eat. Currently, you are craving something..\n        *choice\n            #..sweet!\n                *set extroverted +5\n                *set feeling +5\n                *achieve diet\n                You get a sweet jackdragon fruit salad and pancakes with butterbee honey.\n                \n                You feel that your outlook on life became sunnier! Yummy!\n                *page_break\n                *goto nextclass\n            #..spicy!\n                *set extroverted +5\n                *set feeling -5\n                *achieve diet\n                You get a very spicy burger with potato chips and pickle paste.\n                \n                You feel tougher and more determined! Yummy!\n                *page_break\n                *goto nextclass\n            #..salty!\n                *set extroverted -5\n                *set feeling -5\n                *achieve diet\n                You get a salty red herring with some mashed potatoes and peas.\n                \n                You feel smarter and more shrewd! Yummy!\n                *page_break\n                *goto nextclass\n            #..savory!\n                *set extroverted -5\n                *set feeling +5\n                *achieve diet\n                You get a ramen noodle bowl with savory lotus spices.\n                \n                You feel gentler and more compassionate! Umami!\n                *page_break\n                *goto nextclass\n    #Go to the park.\n        You go to the large expanse of green, surrounded by the four dorm buildings. In the center of the park is a square, decorated with marble statues of various superheroes, most of whom you don't recognize. \n        \n        On one side of the square is a statue of Theodore Roosevelt, for whom the island is named after. Opposite to him, on the other side, stands the largest statue, with the word \"Sage\" inscribed on it. This is probably the hero the academy is named after.\n        \n        You look at Sage, who looks noble and determined, looking into the distance knowingly.\n        *page_break\n        *goto nextclass\n    #Go to the gym.\n        The gym is a large building that looks like a hockey stadium without the ice. The roof is see-through. The bleachers are separated from the court by thick glass walls that reach all the way to the ceiling.\n        \n        Near the gym building, in the gap between it and the neighboring infirmary, you notice a tall tree. It is much taller than the other trees you have seen on the island. The plaque underneath it reads: \n        \n        [b]The Tree of Resilience — the sole tree on Theodore Roosevelt Island that has survived the attack on the District of Columbia by a supervillian group known as the Harbingers of Doom on June 6th, 2066[b]\n        \n        Looking at this tree fills you with a strong sense of determination.\n        *page_break\n        *goto nextclass\n    #Just wander around and explore.\n        You wander around the school premises for a while, before eventually stumbling upon a clearing at the southern end of the island, from which you can clearly view the Potomac river and some of the iconic Washington D.C. landmarks like the Lincoln Memorial and the Washington Monument.\n        \n        You get closer to the southern edge of the clearing and notice a large rectangular rock, which upon closer inspection reveals itself to be a tombstone. The words on the tombstone read: \n        \n        [b]In loving memory of Irene Thompson (1997-2049) and Ethan Allen (2000-2049)[b]\n        \n        You take in the scenery for a few minutes, then head back towards the academy when the time comes for your next class.\n        *page_break\n        *goto nextclass\n*label nextclass\nMister Murdock greets you with a simple nod when you enter the classroom as he prepares the holographic screen in the front of the auditorium. You take your seat and look around the room. Seems like you were the last one to come in.\n\n\"Since the very first appearances of augmented humans, their relations with regular humans have been complicated to say the least,\" Mister Murdock begins without a warning, \"To this day, augmented do not enjoy the same rights as regular humans in a number of countries. Among regular humans like me and half of you, there is a sizable chunk of people who fear and detest augmented individuals, to the point where active anti-augmented groups exist in every state in this nation,\" he looks grimly at the classroom, looking directly at you for a second.\n\n\"However, regular humans are not the only ones who can hold extreme views on this matter,\" he adds and turns back to the holographic screen on the wall and presses a button.\n*page_break\nThe screen turns on and starts playing something that looks like a newsreel. The footage plays a news segment from a couple of days ago. You see a helicopter footage of toppled buildings in the middle of a big city. The footage switches to an image of a reporter in front of the rubble. You notice a giant graffiti behind her saying \"Homo Supereoris\" in big red letters. \n\nThe news anchor continues, \"…the attack on the European Union headquarters here in Brussels has left dozens of people dead and hundreds more injured. The perpetrators are believed to be members of the augmented supremacist group 'Übermensch'. The leader of the group is believed to be Adrien Bernard who calls himself 'Resonance'…\"\n\nMister Murdock presses another button on the screen and it switches to an image of a white male in his thirties, with various data like his name and nationality displayed next to it.\n\n\"He is a former truck driver from France, has the ability to generate powerful seismic waves that can cause earthquakes. He can even destabilize a person's heartbeat so much it kills them. People like Resonance believe that augmented individuals are superior to other humans,\" Mister Murdock turns to face the classroom again, \"I am telling you all of this, because this is the world you would have to work and live in. This incident is not the first instance of an augmented supremacist attack, but it is the most devastating so far. Whether you are augmented or not, these issues will affect your daily life,\" he finishes the speech, leaving the room in heavy silence.\n\n\"Heh, doesn't seem that bad to me!\" you hear a condescending voice coming from the back of the classroom.\n*page_break\nYou turn to see Madison — the girl you saw yesterday, who can create explosions out of her hands. She leisurely rests on her desk, with her feet on the table and her hands behind her head.\n\n\"Where are you going with this, miss Reed?\" Murdock asks with a menacing tone.\n\n\"Exactly what I said; the normies should get used to being dominated by those stronger than them, it's only natural,\" she responds snarkly.\n\nMister Murdock frowns at the statement, \"I will see you at the principal's office after the class. At the moment, you may keep your comments to yourself,\" he says in a chilling tone, then continues the lecture.\n\nMadison just shrugs, but does not say anything else.\n*page_break Hours later...\nAfter all the heavy dose of knowledge and drama you have received today, you decide to head back to your dorm room as soon as you get that opportunity.\n\nOverall, it seems that most of the curriculum is similar to that of a normal college, but there are several augmented-related subjects as well. So far, all of your classes have been the same as for the regular human students, but this will likely change very soon.\n\nYou will need to get a good night's rest tonight, because tomorrow you have to be in tip-top condition for the big event. Tomorrow is the day when you will finally join the Superhero Program!\n*finish", "chance": "*temp felixlove false\nIt's nice to be back home! Quito looks gorgeous despite the cloudy weather. Felix seems to like it too, though you had to help him adjust to the high altitude at first.\n\nThe flight went surprisingly well, as well. Felix mentioned that he had to be put to sleep to be brought to the academy due to his unpredictable powers, so it was nice for him to get to see what flying actually looks like for the first time in his life.\n*page_break\nWhen you arrive to the city, your first course of action is to visit your childhood home. Your parents' house is in the northern part of the city and you reach it with relative ease.\n\nYour parents are their usual selves — kind and somewhat embarrassing. They show your childhood photos and videos to Felix, who studies them with great interest. \n\nAfter catching up with your parents, you invite Felix to your room, which looks just the way you left it.\n*fake_choice\n    #It is filled with posters and figurines of famous heroes.\n        *if competitive >=5\n            *set competitive -5\n    #It is filled with various medals and prizes you have won.\n        *if competitive \u003c= 95\n            *set competitive +5\nYou and your parents invite Felix to stay for the night, and he sleeps on a sofa bed in your room. You spend most of the night discussing your plans for tomorrow while Felix shares his first impressions of Quito.\n\n\"Your parents are really cool,\" he says, \"My childhood was nothing like yours, I spent most of the time with my parents at hospitals being studied by various doctors and scientists, trying to figure out what's going on with me and how to control my powers.\"\n*fake_choice\n    #\"Oof, that sounds rough,\" you say.\n        *if extroverted \u003c= 98\n            *set extroverted +2\n        *if feeling \u003c= 98\n            *set feeling +2\n    #\"Wow, that really sucks,\" you say.\n        *if extroverted \u003c= 98\n            *set extroverted +2\n        *if feeling >= 2\n            *set feeling -2\n        *if felix \u003c=95\n            *set felix +5\n    #\"That's terrible, but they didn't really have a choice,\" you say.\n        *if extroverted >= 2\n            *set extroverted -2\n        *if feeling >= 2\n            *set feeling -2\n    #\"I can't even imagine what you had to go through. I'm so sorry,\" you say.\n        *if extroverted >= 2\n            *set extroverted -2\n        *if feeling \u003c= 98\n            *set feeling +2\n\"It was.. a strange experience. Before I got powers, I remember my parents taking me to amusement parks and shops and restaurants. I think we even traveled to Copenhagen once,\" he ruminates, \"But after I discovered my powers, everything changed.\"\n\nYou remain silent, processing his words as he continues, \"You know, I hated my powers for so long, but after what happened that night, when the Ubermensch attacked, I realized I can actually use them for good. I wonder if it's even possible for me to become a superhero?\" he says.\n\n\"Well, it's worth a shot,\" you say and add, \"But you have to come up with your superheroic name first!\"\n\nFelix turns to you and grins, \"Yeah, I guess I do,\"\n*page_break\nThe next day, you decide to introduce Felix to the city of Quito and its various landmarks. You consider your options; you can probably visit a few major places before Teleferico, which has the best views of the city.\n*hide_reuse\n*label quitosploration\n*choice\n    #Ciudad Mitad del Mundo — the place dedicated to the Equator, which passes here.\n        You walk around, surrounded by other tourists, and even take a picture of Felix standing at the Equator with his legs positioned in separate hemispheres.\n        \n        \"You know, I've been wondering if your powers are somehow..\" Felix starts, but you stop him.\n        \n        \"I thought about it too, but it's probably just a coincidence,\" you say firmly. The possible connection between your powers and your proximity to the Equator has crossed your mind before, but seemed too far-fetched to be true.\n        \n        \"Yeah, sounds like something a crappy writer would come up with!\" Felix jokes.\n        *goto quitosploration\n    #Basílica del Voto Nacional — the largest neo-Gothic church in the Americas.\n        You and Felix take in its monumental architecture, opulent decor and beautiful stained glass windows.\n        \n        \"Technically, the church has never been officially completed,\" you explain to Felix, \"Some people believe that if it is ever finished, the world would end.\" \n        \n        Felix gives you a look of surprise, \"Well, let's hope they never finish it then!\" he jokes.\n        *goto quitosploration\n    #Quito's Old Town — one of the best preserved on the continent.\n        You take Felix to La Ronda — the most beautiful street in the Old Town, lined with colorful buildings, cafés and quirky shops.\n        \n        \"Most people don't know, but Quito was actually the first place in the world to be declared a World Heritage Site,\" you declare with pride.\n        \n        \"Really? I didn't know that either!\" Felix admits and looks around, admiring the architecture.\n        *goto quitosploration\n    #Plaza Grande — the main pedestrian hub of the city.\n        You walk around the large square, enjoying the sights like the Ecuadoran Presidential Palace and Quito City Hall among others.\n        \n        You treat Felix to some local food from one of the street vendors and listen to various street musicians performing.\n        \n        At one point, Felix even joins one of the musicians and plays in a duet with him. Judging by Felix's expression, he is having a great time.\n        *goto quitosploration\n    #Let's head to Teleferico.\n        *goto teleferico\n*label teleferico\nAfter that, you decide to hit the main attraction — Teleferico, which is a sky tram that ascends along the slope of the Pichincha Volcano. \n\nThe ride is stunning; the views of the city are spectacular and the beautiful rolling green hills are even better. You remember visiting it yourself a long time ago with your parents, but it is a completely different feeling when you are the one sharing this with someone.\n\nFelix is practically stuck to the window as he takes in the views. You don't need to be augmented to know that he is having a good time.\n*page_break\nWhen you reach the stop, you walk to the nearest vista and overlook the city below. The Sun is close to setting, amplifying the gorgeous view.\n\n\"Thank you for bringing me here, Rio,\" Felix turns to you, \"Not just this place, but everything. I never thought I'd be able to do these kinds of things. It's all thanks to you not giving up on me and giving me a chance,\" he says and hugs you.\n*choice\n    #I return the gesture and confess my feelings.\n        *set felixlove true\n        *if felix \u003c=90\n            *set felix +10\n        \"You don't need to thank me. I did it because I love you,\" you say. \n        \n        Felix looks at you, surprised, and smiles, \"I feel the same way.\"\n        \n        You stand there, together, for a few minutes, enjoying the moment.\n        \n        Suddenly…\n        \n        You hear a deafening sound. A sound you have heard before.\n        *page_break An eruption.\n        *goto cotopaxibang\n    #I return the gesture with a friendly hug.\n        *if felix \u003c=90\n            *set felix +10\n        You share a friendly hug for a moment and continue chatting, enjoying the scenery.\n        \n        Suddenly…\n        \n        You hear a deafening sound. A sound you have heard before.\n        *page_break An eruption.\n        *goto cotopaxibang\n*label cotopaxibang\nLuckily for you, it is not the volcano you are standing on, otherwise you would already be dead. No, it's Cotopaxi — a volcano some fifty kilometers away from the city. \n\nThe giant pillar of smoke gushes out of it, slowly making its way in your direction. You realize that many people are in extreme danger, including your parents! \n*choice\n    *selectable_if (selfish >= 50) #I run to my parents' house! They need my help!\n        You make your way down the slope and eventually reach the city. By this point, the whole city of Quito is in a state of panic. People are running from the oncoming cloud of ash and falling rocks.\n        \n        You run in the same direction, towards the northern part of the city.\n        *page_break\n        You remember this feeling. You were ten at the time. A powerful earthquake rocked Quito. Your parents were very worried, but you felt calm. Despite all the shakiness, you were able to function perfectly fine, as if nothing was happening. While things were falling all over the house, your room remained perfectly still.\n        \n        That's when you realized you are augmented.\n        *page_break\n        *goto quakehouse\n    *selectable_if (selfish \u003c= 50) #I run to the areas most affected, the people there need our help!\n        You make your way down the slope and eventually reach the city. By this point, the whole city of Quito is in a state of panic. People are running from the oncoming cloud of ash and falling rocks.\n        \n        You run in the opposite direction, towards the southern part of the city.\n        *page_break\n        You remember this feeling. You were ten at the time. A powerful earthquake rocked Quito. Your parents were very worried, but you felt calm. Despite all the shakiness, you were able to function perfectly fine, as if nothing was happening. While things were falling all over the house, your room remained perfectly still.\n        \n        That's when you realized you are augmented.\n        *page_break\n        *goto quakesome\n*label quakehouse\nYou ruminate on that as you reach your parents' house, which looks relatively normal except for all the ash now covering its roof.\n\nYou and Felix get inside and find your parents on their phones, apparently they were trying to contact you. You breathe a sigh of relief.\n\n\"You know, last time big eruption happen was sixty years ago!\" your dad says in broken English.\n\n\"My grandparents remember it, it was in the summer and they were on a hike on Pichincha,\" your mother adds.\n\n\"You know, Felix,\" your dad turns to him, \"When Rio was born, there was huge earthquake! But then it stop! I think Rio did it!\" he says, proudly.\n\nOh boy, here come some more embarrassing parent stories. You sigh.\n*page_break\n*goto endofquito\n*label quakesome\nYou run towards a high-rise building which looks like it's about to fall. Without thinking, you push it with your hands and focus your powers, balancing the building at a precarious angle, an act which requires an astounding amount of concentration from you. Felix, meanwhile, starts getting everybody out of the building.\n\nAfter several grueling minutes, he screams that everything is clear, you stop your powers and fall to the ground, the building slowly falling on top of you.\n\nSuddenly, Felix runs in front of you and points his arm at the building, unleashing his power. As risky as it is, it pays off. Kinda. The building turns into a giant mass of butter which spills out on the ground, washing you both away in the process. \n\nYou and Felix spit out the butter, which turns out to be extremely salty, and share a good, exhausted laugh. Some people start clapping while others look horrified that their apartments were just turned into butter.\n*page_break\n*goto endofquito\n*label endofquito\nAfter several weeks of dealing with the aftermath of the eruption, the city starts slowly getting back to normal, in no small part thanks to your and Felix's efforts. You spent a lot of time helping people around the city, but now the time to go back to the academy has finally come.\n\nYou say goodbyes to your parents, who wish you the best of luck, and get on a plane headed to Washington. \n*page_break\n*achieve felix\nDuring the flight, Felix turns to you, \"You know, I thought about what my heroic name should be. I think I got it,\" he says.\n\n\"What is it?\" you ask.\n\nHe smiles and simply says, \"Chance.\"\n\n[b]Ending 4: Chance[b]\n*page_break\n*goto_scene finalscreen", "choicescript_description": "Washington D.C., 2075. You are a superpowered person at an academy for augmented people like you, but mastering your powers and making friends is hard, let alone when villains are about to strike.\n\nBalance of Superpower is a 67,000-word interactive sci-fi romance novel by Rustem Khafizov. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nYou are Rio Ramirez — a non-binary person with the power of perfect balance, but do those powers extend to balancing school, love, and villain-fighting adventures? Will you date a girl whose body is made of an indestructible substance, or a guy whose powers randomize everything around him? Each route you choose leads to a different, unique adventure: will you go to the Moon, or chase a superpowered serial killer?\n\n• Play as Rio Ramirez, a non-binary superpowered person.\n• Determine their personality! Will they be extroverted and emotional or introverted and stoic?\n• Raise your heroic stats. Will you be a hero who values stealth, a skilled fighter or a hero who offers support to their allies?\n• Befriend or date one of the eight other students.\n• Ten unique endings, including a secret one.\n• A deep, carefully-crafted world of superpowered individuals with lots of lore.\n\nCan you bring balance to the world on the brink of a civil war?", "choicescript_stats": "*if enterrio > 0\n    Name: Rio Ramirez\n    *stat_chart\n        text Moniker\n        \n    [b]Personality[/b]\n    *stat_chart\n        opposed_pair Extroverted\n            Introverted\n        opposed_pair Feeling\n            Thinking\n        opposed_pair Selfish\n            Selfless\n        opposed_pair Competitive\n            Cooperative\n        opposed_pair Bellicist\n            Pacifist\n    [b]Skills[/b]\n    *stat_chart\n        opposed_pair Offense\n            Defense\n        opposed_pair Flashy\n            Stealthy\n        opposed_pair Tank\n            Support\n    [b]Relationships[/b]\n    *stat_chart\n        percent Oliver\n        percent April \n        percent Catie \n        percent Felix\n        percent Lex\n        percent North\n        percent Estelle\n        percent Jun\n*if enterrio > 1\n    *goto info\n    *label info\n    *choice\n        #Sage Academy Staff\n            *label aca\n            *choice \n                #Dove\n                    Evelyn Allen aka Dove \n                    *line_break\n                    \n                    Dove is the principal of the Sage Academy and is one of the most famous heroes in the world. \n                    *line_break\n                    \n                    Dove is a Mixed augmented with the abilities to fly, heal and soothe the emotions of others, preventing them from committing violence or acting aggressively. Due to her healing abilities, she is also in charge of the academy’s infirmary.\n                    *line_break\n                    \n                    Dove is a true pacifist who wants to teach the students to control their augmentations and integrate them into the human society.\n                    *goto aca\n                #Hawk\n                    Brenda Thompson aka Hawk\n                    *line_break\n                    \n                    Hawk is the co-principal and the head of the Superhero Program at the Sage Academy. \n                    *line_break\n                    \n                    Hawk is Dove's twin sister and is a Mixed augmented with the ability to fly, super strength, endurance and a powerful intimidating aura. \n                    *line_break\n                    \n                    Hawk is considered to be one of the strongest heroes in the world, possibly stronger than even Calamity herself.\n                    *goto aca\n                #Tim Murdock\n                    Tim Murdock\n                    *line_break\n                    \n                    Murdock teaches Augmented Civics at the Sage Academy.\n                    *line_break \n                    \n                    Murdock is a regular human, though he is proficient in martial arts, marksmanship and stealth, as well as various advanced technology and hacking.\n                    *line_break\n                    \n                    Murdock is a former FBI agent and is one of the original members of The Patriots. He never had a moniker, but some refer to him as “G-man”.\n                    *goto aca\n                #Nonpareille\n                    AIX2K55M1 aka Nonpareille\n                    *line_break\n                    \n                    Nonpareille is the head of the Science course at the Sage Academy.\n                    *line_break\n                    \n                    Nonpareille is an android with hyper-advanced artificial intelligence, full autonomy and sapience.\n                    *line_break\n                    \n                    Nonpareille is renowned for its gracefulness and its appreciation of art and aesthetic beauty.\n                    *goto aca\n                #Catalyst\n                    Greg Foster aka Catalyst\n                    *line_break\n                    \n                    Catalyst teaches Augmented Education at the Sage Academy.\n                    *line_break\n                    \n                    Catalyst is an Interpersonal augmented with the ability to amplify the augmentations of others. Even regular humans can feel those effects and be invigorated by them.\n                    *line_break\n                    \n                    Catalyst is a prominent superhero and is one of the original members of The Patriots.\n                    *goto aca\n                #Professor Evans\n                    Robert Evans\n                    *line_break\n                    \n                    Professor Evans teaches Augmented History at the Sage Academy.\n                    *line_break\n                    \n                    Professor Evans is an Environmental augmented with the ability to create powerful shockwaves. \n                    *line_break\n                    \n                    Professor Evans never wanted to pursue a superheroic career and chose to focus on studying history and other subjects.\n                    *goto aca\n        *if enterrio > 2 \n            #Augmented Power Types\n                *label pow\n                *choice \n                    #Enhanced \n                        Enhanced individuals are those whose powers are most similar to regular humans. They possess one or several traits in which they are superior to regular humans i.e. super strength, durability or enhanced vision. \n                    \n                        It is not uncommon for them to not realize they are augmented, due to their powers often being mistaken for natural talent or training. Enhanced individuals are often the most celebrated and popular of the augmented community, due to their relatability to regular humans. \n                    \n                        Notable examples: Calamity, Fury Fist, Hop\n                        *goto pow\n                    #Corporal\n                        Corporal abilities are a form of mutation, which alters the augmented person’s body in some fashion, like changing their body structure into a different type of matter or growing additional body parts.\n                    \n                        A common subdivision of this type of powers are animalistic powers. These powers grant one abilities similar to one or more types of animals. People with Corporal type of power are the most likely to be treated poorly by society, because of their often inhuman appearance.\n                    \n                        Notable examples: Alley Cat, Shard, Titan\n                        *goto pow\n                    #Interpersonal\n                        Interpersonal powers allow augmented individuals to affect other people in various ways, usually having something to do with that person’s emotions or thoughts. Telepathy is a classic example of an Interpersonal power.\n                        \n                        These powers can range from incredibly powerful abilities like mind-control to something fairly indistinguishable, like being able to understand other languages without learning them. Similarly to Enhanced powers, some augmented people might not realise they have Interpersonal superpowers, though that happens less often.\n                        \n                        Notable examples: Catalyst, Beastress, Dogma\n                        *goto pow\n                    #Environmental\n                        Environmental abilities are fairly powerful and allow their users to change and alter the environment around them, and even the reality itself in some fashion.\n                        \n                        It is a broad category, encompassing such diverse abilities as blasting projectiles out of one's hands to altering the flow of time, to teleporting objects or people from one location to another.\n                        \n                        Notable examples: Transit, Revenant, Sunyata\n                        *goto pow\n                    #Elemental \n                        Elemental abilities allow the user to control a particular type of matter, like air or plastic. They can shape it and use it in various ways, but their abilities are restricted to only one, rarely more, element. \n        \n                        Unlike the Environmental abilities, which can often affect any type of matter, but only in one or two specific ways, Elemental powers allow its user to control one type of matter in multitude of ways.\n        \n                        Notable examples: Wildfire, Groundwork, Ap\n                        *goto pow\n                    #Dynamic \n                        Dynamic powers are fairly rare. These are augmented individuals whose powers are able to change depending on the situation. These powers manifest when the user encounters certain environments or other augmented individuals. \n        \n                        People with this type of powers are the only augmented who can change their powers if certain conditions are met. \n        \n                        Notable examples: RNG, Plethora, Suncatcher\n                        *goto pow\n                    #Mixed\n                        Mixed powers are by far the rarest type of all the power types. Like the name suggests, these powers are a mix of other power types, usually two, but sometimes even three or more. \n        \n                        Mixed powers are often displayed by augmented people whose parents are augmented themselves, though it is not always the case.\n        \n                        Notable examples: Dove, Hawk, Vermilion Dragon\n                        *goto pow\n            *if enterrio > 3\n                #Major Superheroic Teams\n                    *label natteams\n                    *choice\n                        #The Patriots.\n                            Name: The Patriots\n                            *line_break\n                            Headquarters: Washington D.C., USA\n                            *line_break\n                            Members: 9\n                            *line_break\n                            Founded: 2054\n                            *line_break\n                            Leader: Calamity\n                            \n                            The Patriots were the first national superheroic team in the world. The first member and the leader of the team is Calamity. The team's roster has changed throughout the years, nearly a half of the original 13 members died during the supervillian attack of 2066. The most recent recruit is RNG.\n                            *goto natteams\n                        #The European League.\n                            Name: The European League\n                            *line_break\n                            Headquarters: Brussels, Belgium\n                            *line_break\n                            Members: 40\n                            *line_break\n                            Founded: 2060\n                            *line_break\n                            Leader: Groundwork\n                            \n                            The superheroic team of the European Union consists of 40 members, one from each EU state. The roster of this team changes from mission to mission, depending on the most suitable powersets. Some members are more prevalent than others. Some countries picked their best heroes to be a part of the League, whereas others picked heroes that didn't make it into their main superheroic teams.\n                            *goto natteams\n                        #The Five Stars.\n                            Name: The Five Stars\n                            *line_break\n                            Headquarters: Beijing, China\n                            *line_break\n                            Members: 5\n                            *line_break\n                            Founded: 2055\n                            *line_break\n                            Leader: Vermilion Dragon\n                            \n                            The five members of the team represent the five different parts of China, including the disputed regions like Taiwan and Xinjiang.\n                            *goto natteams\n                        #The Guardians of India.\n                            Name: The Guardians of India\n                            *line_break\n                            Headquarters: New Delhi, India\n                            *line_break\n                            Members: 7\n                            *line_break\n                            Founded: 2064\n                            *line_break\n                            Leader: Plethora\n                            \n                            Colloquially known as \"Shaptam\", or \"seven\", the members of the team represent the seven main ethnic groups in the country.\n                            *goto natteams\n                        #The African Defense Unit.\n                            Name: The African Defense Unit\n                            *line_break\n                            Headquarters: Lagos, Nigeria\n                            *line_break\n                            Members: 6\n                            *line_break\n                            Founded: 2068\n                            *line_break\n                            Leader: Rotates each year between the six members, currently Suncatcher.\n                            \n                            Despite the name, only a handful of countries is represented in this team: Nigeria, Egypt, South Africa, Ethiopia, Djibouti and the East African Federation.\n                            *goto natteams\n                        #The Three Bogatyrs.\n                            Name: The Three Bogatyrs\n                            *line_break\n                            Headquarters: Moscow, Russia\n                            *line_break\n                            Members: 3\n                            *line_break\n                            Founded: 2062\n                            *line_break\n                            Leader: Titan\n                            \n                            Named after the folk tale about the three mighty heroes, this team stands out in that it is made up entirely of Corporal augmented.\n                            *goto natteams\n                *if enterrio > 4 \n                    #Sage Academy Students\n                        *label stu\n                        *choice\n                            #Oliver\n                                Oliver Clarke aka Bleeding Heart\n                                *line_break\n                                \n                                June 26th, Liverpool, England\n                                *line_break\n                                \n                                Augmentation: Mixed powers of manipulation over blood and the ability to heal various injuries with it.\n                                *goto stu\n                            #April\n                                April Kelly aka ${moniker2}\n                                *line_break\n                                \n                                April 24th, Alice Springs, Australia\n                                *line_break\n                                \n                                Augmentation: Corporal ability which makes her body extremely tough and able to block and reflect most kinds of damage.\n                                *goto stu\n                            #Catie\n                                Catie Fox aka Spotlight\n                                *line_break\n                                \n                                July 31st, New York City, New York, USA\n                                *line_break\n                                \n                                Augmentation: Interpersonal ability of extreme charisma and persuasion; a lighter version of mind control.\n                                *goto stu\n                            #Felix\n                                Felix Nissen\n                                *line_break\n                                \n                                March 14th, Vejle, Denmark\n                                *line_break\n                                \n                                Augmentation: Environmental power with unpredictable effects. It often results in changes to physical objects around him into various substances.\n                                *goto stu\n                            #Lex\n                                Lex Tyler\n                                *line_break\n                                \n                                November 4th, Alexandria, District of Columbia, USA\n                                *line_break\n                                \n                                Augmentation: None.\n                                *goto stu\n                            #North\n                                North White aka North\n                                *line_break\n                                \n                                January 8th, Resolute, Nunavut, Canada\n                                *line_break\n                                \n                                Augmentation: Elemental powers of cryokinesis — control over ice and snow.\n                                *goto stu\n                            #Estelle\n                                Estelle Zola\n                                *line_break\n                                \n                                February 17th, Mingala, Central African Republic\n                                *line_break\n                                \n                                Augmentation: Enhanced powers of extreme mechanical and engineering skills.\n                                *goto stu\n                            #Jun\n                                Jun Ying aka Counter\n                                *line_break\n                                \n                                March 21st, Datong, China\n                                *line_break\n                                \n                                Augmentation: Dynamic power which allows him to adapt to the augmentations of others. His abilities are usually directly opposed to the abilities of his opponent.\n                                *goto stu\n                    *if enterrio > 5\n                        #The Patriots Members\n                            *label thepats\n                            *choice\n                                #Calamity\n                                    Jane Jackson aka Calamity\n                                    \n                                    Augmentation: Enhanced physical strength and durability. Calamity is believed to be the strongest hero in the world in terms of raw physical strength.\n                                    \n                                    Originally a farmer from Oklahoma, she became famous after saving Oklahoma City from the most devastating tornado in the state's history. She was then invited to become the first member of America's national superheroic team \"The Patriots\". After two decades of service, Calamity is considered to be America’s most popular hero and one of the most famous superheroes in the world.\n                                    *goto thepats\n                                #Tim Murdock\n                                    Tim Murdock\n                                    \n                                    Augmentation: None, though he is proficient in martial arts, marksmanship, stealth, as well as various advanced technology and hacking.\n                                    \n                                    Tim Murdock is a former FBI agent and is one of the original founders of \"The Patriots\". He personally invited Calamity and several other prominent heroes to form this superheroic unit.\n                                    *goto thepats\n                                #Wildfire\n                                    Antonio Garcia aka Wildfire\n                                    \n                                    Augmentation: Elemental powers of pyrokinesis — control over fire and lava. \n                                    \n                                    Wildfire started his career as an actor before being offered a spot with \"The Patriots\". He agreed, but never gave up on his acting career and has starred in several blockbusters while still being a prominent superhero.\n                                    *goto thepats\n                                #Nonpareille\n                                    AIX2K55M1 aka Nonpareille\n                                    \n                                    Augmentation: None. Nonpareille is an android with hyper-advanced artificial intelligence, full autonomy and sapience.\n                                    \n                                    Nonpareille is the result of an experiment aimed to create the most advanced AI in the world. Thanks to her help during \"The Singularity Incident\" of 2055, in which she helped \"The Patriots\" defeat her clone AIX2K55M2 (also known as Singularity), she was offered to join the team and has been an integral member of the group ever since.\n                                    *goto thepats\n                                #Transit \n                                    Tracy Rice aka Transit\n                                    \n                                    Augmentation: Environmental powers of teleportation. Transit can teleport objects and people with a touch.\n                                    \n                                    Tracy Rice used her augmented powers primarily for leisurely traveling, but after witnessing the destruction caused by \"The Singularity Incident\" of 2055, she decided to use her talents for good and offered \"The Patriots\" her help, which the team gladly accepted.\n                                    *goto thepats\n                                #Catalyst\n                                    Greg Foster aka Catalyst\n                                    \n                                    Augmentation: Interpersonal ability to amplify the augmentations of others. Even regular humans can feel those effects and be invigorated by them.\n                                    \n                                    Greg Foster spent years leading a normal life in Cleveland, Ohio, unaware of his augmented abilities. He discovered his powers by accident when trying to help Calamity during her fight with a supervillain known as \"Maw\". Greg was offered to join the team and became one of the most irreplaceable members of \"The Patriots\".\n                                    *goto thepats\n                                #Link\n                                    Robert Peck aka Link\n                                    \n                                    Augmentation: Mixed powers which allow him to transfer energy between electronics and plants. This energy can be used for healing, hacking or enhancement of properties of electronic or organic items. \n                                    \n                                    Formerly a barista, Link became a prominent hero in Seattle, Washington before being offered a spot with \"The Patriots\" as the team needed a skilled healer after losing Dryad and other members of the team during the horrific \"Harbingers of Doom\" attack of 2066.\n                                    *goto thepats\n                                #Alley Cat\n                                    Carlos Chan aka Alley Cat\n                                    \n                                    Augmentation: Corporal ability which grants him feline appearance, agility and night vision.\n                                    \n                                    Alley Cat was one of the most prominent heroes in New York City, especially after defeating a powerful villain known as \"Black Tom\". Recognizing his accomplishments, \"The Patriots\" offered him to join them as the team needed new members after the devastating \"Harbingers of Doom\" attack of 2066.\n                                    *goto thepats\n                                #RNG\n                                    Nira Hannaford aka RNG\n                                    \n                                    Augmentation: Dynamic powers which are random in nature and change each time she is conscious. They range from mild and inconsequential to extremely powerful and devastating abilities.\n                                    \n                                    Originally from Tallahassee, Florida, Nira attempted to become a professional superhero in her state many times, but her powers were deemed to be too unreliable for her to be given a license. \"The Patriots\" offered her to join them instead, seeing her abilities as a powerful wild card which can stump any supervillain.\n                                    *goto thepats", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "counterbalance": "*temp lovejun false\nYou and Jun are crouching in the thick bushes overlooking an open field where several augmented are already duking it out. \n\nThis is the \"Iron Will Contest\" — an extremely popular game show in China where augmented contenders fight for a prize. To make the matters worse, half of the contenders are convicted criminals fighting for the right to be free. Unsurprisingly, the contest is held in a remote area in the western part of the country.\n\nThe rough terrain makes you feel nostalgic for the comfy beds of that Beijing hotel you and Jun were sent to upon your arrival, which you then were forced to leave promptly early the next day as you and some other contenders were put on a bullet train headed west. The trip, surprisingly, didn't take long and before you knew it you were already in the middle of, what could be best described as, a warzone.\n*page_break\nTogether, you and Jun have already managed to defeat several opponents who were unlucky enough to encounter you or dumb enough to think they can take you on.\n*fake_choice\n    #You still have shivers from fighting an augmented who looked like a giant cockroach.\n    #You were running from a flying guy who was chasing you, but he was, luckily, taken out by an energy beam from another contestant.\n    #You helped Jun heal an injury from fighting some crazy augmented with sharp metallic claws.\n    #The toughest of all was an augmented who looked like a huge panda. Thankfully, with the help of Jun, you managed to defeat her.\n*page_break\nNow that the field has been narrowed down quite a bit to only a handful of fighters remaining, most of whom are pretty strong, you and Jun are planning your strategy.\n\n\"So, how do you think we should approach this?\" Jun asks you with a genuine interest.\n\nYou have proven to be the better tactician of the two of you and Jun has been relying on your input wholeheartedly.\n*choice\n    *selectable_if (offense >=50) #\"No pain, no gain. We go in, we fight, we win!\" you say confidently.\n        \"That's what I like to hear!\" he smiles.\n        \n        On a count of three (which you both ignore as you jump in too early) you storm out of your hiding spot and attack the distracted combatants.\n        \n        You hit and knock out the closest contender to you, who is some guy with four arms, before he can even react, whereas Jun takes on the biggest, baddest looking fighter in the field. His body is made of some kind of gemstone, possibly diamond.\n        \n        Jun's hands turn into some kind of sharp weapons and he starts slicing at the gemstone goliath. Jun's attacks are vicious, but even they only seem to be leaving little more than scratches.\n        *page_break\n        You and even the other combatants are distracted as you watch these two fight. Their battle turned into a contest of toughness and speed. The gemstone hulk is attempting to hit Jun with slow, powerful hits, but Jun is too quick and easily dodges. At the same time, Jun's attacks aren't doing too much. They are leaving cuts and scratches on the fighter's armor, but not much else. It's not even clear whether this augmented can feel pain at all. This is truly a battle of attrition.\n        \n        Without even thinking, you run towards the Corporal and perform the most amazing attack of your life. Each step and each of your movements are carefully calculated to gain as much momentum as possible. In addition, your balancing powers inform you where to strike for maximum damage.\n        \n        With a single punch, the diamond Corporal is sent flying, knocking out two other combatants in the process. Even with your powers, the momentum of your attack is too strong and it sends you tumbling forward.\n        \n        \"Whoa,\" Jun whistles as he helps you get back to your feet, \"Not bad, Rio. Teach me that attack later, OK?\" \n        *page_break\n        *goto thebigboss\n    *selectable_if (offense \u003c=50) #\"We should wait out until they defeat each other. Divide and conquer, and all that,\" you say.\n        \"Fair enough,\" Jun says as he lays down to rest on the grass, his arms behind his head.\n        \n        You wait, while the other fighters continue to pummel each other. Most of them are pretty strong, but thankfully it does not take long until there is only a few left standing.\n        \n        You glance at Jun and notice a look of pure shock on his face. He then suddenly jumps back up on his feet and attacks someone behind you. You turn around and see Jun kicking another Jun. \n        \n        Wait, there's two of them?\n        *page_break\n        You notice now that there is something off about the Jun who was behind you. He looks the same, but he doesn't look at you the same way. His eyes have a cold, menacing look to them. The two Counters start fighting, both skilled in martial arts as they use elaborate offensive moves.\n        \n        \"Heh, I always knew I was the only one who can beat me,\" \"the first\" Jun says with a smirk.\n        \n        \"The second\" Jun doesn't respond and launches another attack, but this time, it's aimed at you. \n        \n        \"Your\" Jun jumps in front of you and is struck down by a powerful kick. This, however, gives you the opportunity to get to the \"other\" Jun and punch him in the temple, knocking him out cold. \n        \n        \"I could've done it myself, but thanks,\" the \"good\" Jun says jokingly as you help him get up.\n        \n        You see the body of the \"evil\" Jun change and turn into some woman you don't recognize.\n        \n        \"Just as I thought, it's Mimic,\" Jun comments, \"She can copy the appearance and augmentations of others. She was Vermilion Dragon's arch enemy. Mimic committed crimes and tried to frame her for them a few years ago,\" he explains.\n        \n        You take another look at the unconscious Mimic before heading back towards the field. Your time to strike has come.\n        *page_break\n        *goto thebigboss\n*label thebigboss\nCompared to this, the rest of the battles are far easier. You double body slam a contender who shoots lasers, outsmart an augmented who freezes people in place with a glance and unleash a coordinated beatdown on a giant green-skinned guy.\n\nEventually, you and Jun manage to remain the only competitors left standing, which means…\n\n\"You know the rules, Rio, there can be only one,\" Jun says with a hint of sadness in his voice, \"Let the best fighter win,\" he bows to you in the proper martial arts fashion.\n\nYou knew this was coming, but managed to ignore this thought as the idea of you making it this far seemed unlikely. But now you cannot ignore it. This is it. One of you will be the winner, but the question is — who?\n*choice\n    *selectable_if (competitive >=50) #Best friend or not, I did not come this far to lose. I beat him.\n        You fight to the end, Jun's abilities adapt to yours, making you feel dizzy, but after dealing with Resonance, you're not as stumped by it.\n        \n        You dodge Jun's attacks as you look for the perfect opportunity, which does eventually come as Jun, winded after unleashing a series of unsuccessful attacks on you, takes a moment to rest, which you manage to capitalize on and finish him with a powerful roundhouse kick. He tries to get up, but is too exhausted to do so. The battle is over.\n        \n        You did it! You won the Iron Will Contest!\n        *page_break\n        *goto loveorcounter\n    *selectable_if (competitive \u003c=50) #It has been Jun's dream to win this contest, I let him have it.\n        You fight passionately, providing Jun with a decent amount of challenge, as anything less would be an insult, but eventually you let him deliver a powerful knockout blow which sends you flying backwards. \n        \n        You don't have to pretend that you can't get up, you are genuinely exhausted. The battle is over.\n        \n        Jun raises his hands to the air triumphantly. He did it! He won the Iron Will Contest!\n        *page_break\n        *goto loveorcounter\n*label loveorcounter\nAfter the ending ceremony, held in a bright TV studio filled with crowds of reporters and fans, you and Jun are relaxing back in your hotel room provided by the network.\n\nYou chat, sharing your favorite moments of the tournament, \"That was fun,\" Jun laughs, \"Remember that guy who was throwing boomerangs? What a goofball!\" he then looks at you seriously, \"I'm so glad you agreed to join me on this. To tell you the truth, I don't think I would've made it this far alone,\" he says.\n*choice\n    #Kiss him.\n        *set lovejun true\n        You felt it for a while now and now you finally let your feelings show, but before you can do that, Jun kisses you first.\n        \n        \"What, you thought you can sneak up on me?\" he jokes and kisses you again. You have never seen him this happy before.\n        *page_break\n        *goto endofcounter\n    #Give him a friendly hug.\n        Jun is surprised, but returns the gesture. You have never seen him this happy before.\n        *page_break\n        *goto endofcounter\n*label endofcounter\n*achieve jun\n*if (lovejun = true) \n    The next day, you and Jun take a plane back to the academy. You are officially superheroes now and officially a couple. You're not sure which one excites you more.\n    \n    And as tough as the Iron Will Contest was, you get the sense that the hardest battles are still ahead of you. Yet, you feel prepared to take them on. After all, now you have someone to fight for.\n    \n    \n*if (lovejun = false)\n    The next day, you and Jun take a plane back to the academy. You are officially superheroes now, and as tough as the Iron Will Contest was, you will likely be faced with even greater challenges from now on.\n    \n    And though the hardest battles are still ahead of you, you feel prepared to take them on. After all, such is the path of a true warrior.\n    \n    \n[b]Ending 8: Counterbalance[b]\n*page_break\n*goto_scene finalscreen", "darkestnight": "[b]Chapter 8: The Darkest Night[b]\n\nYou are wondering what the Christmas celebration at the academy will be like in a few days. At the moment, however, you are sitting with the other students, both from the hero program and the other courses, in the spacious assembly hall of the academy after a sudden late announcement from Nonpareille urged you all to gather here as quickly as possible.\n\nDove and Hawk enter the stage. The former speaks, \"Our deepest apologies for forcing you to assemble here at this hour, but there are some concerning events happening all around the city tonight. For the safety of every student, we made a decision that it would be better for you if you stay together.\" \n\n\"So don't complain that you're not in your beds right now, got it?\" Hawk adds, \"Me and Eve will be making sure that the city is protected. Thankfully, we have the other teachers to keep an eye on you,\" she looks at the teachers sitting in the front row. Most of them are present while Nonpareille and Mister Murdock are missing.\n\n\"You got it, Brenda! They are safe with me!\" Catalyst smiles broadly and gives her a thumbs up, somehow even more cheerful than usual.\n*page_break\n\"What's going on?\" Sami asks with a concerned look on his face. You hear worried murmuring of your fellow students all around you.\n\nYou decide to find out what's happening and read live news reports on your phone about coordinated attacks being perpetrated by augmented supremacists. These attacks seem to be occurring all throughout the country, including the District of Columbia itself. That guy, Resonance, whom you remember learning about a few months ago, is believed to be involved.\n\nYou click on one of the news articles and watch a live footage from a helicopter hovering over Arlington, just a few minutes away from where you are. You see someone standing at the top of the Jefferson Tower — the highest skyscraper in the District. It is a young woman who seems to be shouting something. When you are just about to turn the volume on to hear her, you realize you don't need to, as you can hear her perfectly fine from here. Her booming voice is that loud…\n*page_break\n\"LISTEN HERE, YOU HUMAN SCUM!!! THIS IS THE BIRTH OF A NEW ERA, THE ERA OF \"ÜBERMENSCH\"!!! WE ARE STRONGER THAN YOU, SMARTER THAN YOU AND BETTER THAN YOU!!! WE WILL FIND AND EXTERMINATE EVERY SINGLE ONE OF YOU!!! THE WORLD BELONGS TO US NOW!!!\" she proclaims triumphantly. You have never heard a voice this loud before despite how far away she is.\n\nBefore you can even fully process her words, she jumps off the tower only to be caught mid-air by an augmented who looks like a giant moth. The tower starts crumbling behind her as if it is being demolished. You hope there were no people inside…\n*page_break\nYour viewing is rudely interrupted as the wall of the main hall of the Academy suddenly explodes, rubble and dust filling the room. Before you can properly react to what's going on, several intimidating-looking people rush into the room through the huge opening in the wall. \n\nThey are led by a girl you quickly recognize — Madison. She dons the same black outfit as them, with the large \"Ü\" embroidered on it.\n\n\"Long time no see! I hope you didn’t miss me too much!\" she smirks, looking at the frightened students.\n\nAssessing the threat, you see your fellow hero program coursemates quickly reacting to the attack and rushing to defend the academy.\n*fake_choice\n    #Misty uses her mist-generating powers to obscure the crowd of students  running to safety and confuse the attackers.\n    #Dino lets out a deafening roar and jumps into the crowd of villains, throwing them around with his powerful attacks.\n    #Meme creates a dozen of clones who jump right into the mob and manage to take out a few attackers, before being destroyed by their cohorts.\n    #Even Professor Evans gets into the fray. He uses his augmented ability to create powerful seismic waves, keeping the attackers from reaching the escaping students.\nBut what about you? What is your strategy?\n*choice\n    #I charge at them directly. They will regret messing with us.\n        *if offense \u003c= 90\n            *set offense +10\n        *if jun \u003c= 95\n            *set jun +5\n        You and Jun dash forward, confronting the attackers head-on. He is faced with a villain who looks like a giant mantis and has sharp blade-like appendages on their arms. Jun dodges a few attacks before his skin turns into a solid-looking armor. The villain's next attack hits him, but doesn't do any damage. \n        \n        You, on the other hand, are faced with a villain who shoots some kind of beam at you, which you dodge by sliding underneath it. You than kick his legs, forcing him to fall while simultaneously delivering a powerful uppercut to his jaw, which knocks him out.\n        \n       Jun, meanwhile, uses his armored body to pummel the mantis-looking villain with punches, then he attempts to finish them off with a dropkick, but realizes that his body is too heavy to jump, so he just headbutts them instead, knocking the mantis out.\n       \n       You give Jun a thumbs up, which he accepts with a nod, but this celebration is short-lived as he gets blasted with an explosion from Madison, which sends him flying into the wall. You can only hope his armor protected him.\n       *page_break\n       *goto thankunext\n    #We have to stop more of them from getting into the hall, I focus on defense.\n        *if offense >= 10\n            *set offense -10\n        *if north \u003c= 95\n            *set north +5\n        You follow North, who turns to the other students and shouts, \"Run to safety! Hurry up!\" than focuses on creating an ice wall that will separate the attackers from the students. Your job will be to protect North while he does it.\n        \n        One of the attackers, whose legs are bent backwards, jumps extremely high, leaping over the ice wall and onto a wall of the hall room, from which he then jumps towards North, preparing to attack. \n        \n        Thankfully, your defense training allows you to intercept him mid-air by grabbing his clothes, and, using the inertia of his jump you send him flying into the wall, knocking him out. \n        \n        \"I appreciate it,\" North gives you a thankful smile. However, your celebration is short-lived as the ice wall is blasted through with an explosion from Madison, who looks at you two with murderous intent.\n        *page_break\n        *goto thankunext\n    #I will distract the attackers, giving more students the opportunity to escape.\n        *if flashy \u003c= 90\n            *set flashy +10\n        *if catie \u003c= 95\n            *set catie +5\n        Before you can do anything, you see Catie striding towards the attackers with a selfie stick while filming herself. \n        \n        \"Hey there, foxies! We've got an emergency situation here, but no worries, yours truly will handle it!\" she smiles to the camera than turns to the confused attackers.\n        \n        \"Alright, guys, stop doing your evil stuff and surrender already!\" she says, commandingly.\n        \n        Some attackers actually follow her orders and lie down on the ground with their hands behind their backs, while others.. not so much.\n        \n        Thankfully, you are quick on your feet and shout, \"Change of plans, guys! Resonance said to get back to the base!\" you state as if you are a part of their group.\n        \n        This gives the advancing attackers a pause, which is just enough time for Catie to tell the surrendering villains to attack their cronies, creating a huge fist fight between the two groups.\n        \n        You and Catie share a celebratory look, but a sudden powerful explosion throws you, Catie and even the fighting attackers at the nearest wall. When you get back on your feet you see her…\n        \n        It's Madison.\n        *page_break\n        *goto thankunext\n    #I stay hidden and focus on targeting the most dangerous attackers.\n        *if flashy >= 10\n            *set flashy -10\n        *if lex \u003c= 95\n            *set lex +5\n        You and Lex hide behind chairs and stealthily move through the hall towards your chosen targets. You focus on the villain who is shooting lasers out of her eyes in an attempt to collapse the ceiling. You sneak behind her and hit her on the back of the head with a precise attack, incapacitating her.\n        \n        You look around to see how Lex is doing, but can't even find her. Out of the corner of your eye, you see one of the attackers, who was just about to grab one of the escaping students, get knocked out with a powerful kick from Lex.\n        \n        \"You! You're the b**ch I've been looking for!\" you hear Madison's threatening voice and see her striding towards Lex. \n        *page_break\n        *goto thankunext\n    #I focus on protecting the escaping students by any means necessary.\n        *if tank \u003c= 90\n            *set tank +10\n        *if april \u003c= 95\n            *set april +5\n        You and April stand side by side, serving as a barrier between the attackers and the retreating students. One of the attackers runs right towards you and picks up speed the closer he gets. You notice he is a human/moose hybrid with giant antlers protruding from his head.\n        \n        \"I'll take this one, make sure the others are safe!\" April says, uncharacteristically sternly, and steps in front of you. When the moose-man lunges at her, she grabs his antlers and stops him in a manner akin to that of a sumo wrestler.\n        \n        Meanwhile, you notice another attacker, whose body is covered in spikes, trying to run past you. You don't have enough time to intercept her properly so, without thinking, you jump right into her, knocking her out mid-run like a tackling football player. The spikes really hurt though!\n        \n        When you get up, you see that April is still busy keeping the moose guy in place. Just when you were about to help her, a huge explosion throws both her and her opponent at the nearest wall. You turn to see who did it, even though you already know the answer.\n        \n        It's Madison.\n        *page_break\n        *goto thankunext\n    #I focus on healing those who were injured and helping them escape.\n        *if tank >= 10\n            *set tank -10\n        *if oliver \u003c= 95\n            *set oliver +5\n        You and Oliver usher the non-hero program students to safety, then focus on helping those who have been knocked out by the explosion get on their feet.\n        \n        You notice one student lying right next to one of the attackers, who looks like a humanoid crab and is currently distracted by the battle. You sneak closer, ending up right behind them and start healing the student who has a head wound from the explosion. You use your powers while checking whether the attacker notices you, so far they're busy. \n        \n        The student comes to as you feel your own condition worsening. That is the nature of your healing: you gain some, you lose some. The crab-like augmented turns towards you and emits a high-pitched wail, then tries to grab you with their pincers. You dodge them and help the student run away, but the attacker manages to cut you with another attack as you run. \n        \n        You successfully escape to a safer distance and examine your back, you have a large scratch that is now bleeding. Thankfully, Oliver runs to you and uses his powers to close the wound. You feel much better, but not for long, as another explosion sends a shockwave around the room. You turn to see who is responsible for it, even though you already know the answer.\n        \n        It's Madison.\n        *page_break\n        *goto thankunext\n*label thankunext\nNow you are faced with Madison. She is by far the most dangerous attacker here and she has a look of pure bloodlust in her eyes. She must be stopped.\n\n*if (gotexploded = true)\n    The memory of the explosion that day flashes before your eyes. You certainly have some scores to settle with her.\n    \n    \nBut how do you want to approach this? Do you work with the others or fight her on your own?\n*choice \n    *selectable_if (competitive >= 50) #I'll take her down myself.\n        *achieve lone\n        *if competitive \u003c= 90\n            *set competitive +10\n        *goto madloner\n    *selectable_if (competitive \u003c= 50) #I'll work with the others to stop her.\n        *achieve team\n        *if competitive >= 10\n            *set competitive -10\n            *if oliver \u003c= 95\n                *set oliver +5\n            *if april \u003c= 95\n                *set april +5\n            *if catie \u003c= 95\n                *set catie +5\n            *if lex \u003c= 95\n                *set lex +5\n            *if north \u003c= 95\n                *set north +5\n            *if jun \u003c= 95\n                *set jun +5\n        *goto madteamwork\n*label madloner\nBefore anyone can even attempt to stop you, you dash forward, preparing for an attack. \n\nMadison looks at you with a devilish grin, \"Wanna be the first one to die, huh?\" she gloats, pointing her arms at you as she creates another explosion.\n\nWithout even thinking, you focus your powers on the blast and, without fully understanding how, you manage to reroute the shockwave back towards Madison. The shockwave throws her far back and smashes her into the wall before she falls to the ground.\n*page_break\n*if oliver \u003c= 95\n    *set oliver +5\n*if april \u003c= 95\n    *set april +5\n*if catie \u003c= 95\n    *set catie +5\n*if lex \u003c= 95\n    *set lex +5\n*if north \u003c= 95\n    *set north +5\n*if jun \u003c= 95\n    *set jun +5\n\"Whoa!\" Jun gives you a clap of approval.\n\n\"How did you do that?!\" April adds, stunned.\n\n\"Nice work, Rio!\" Catie praises you.\n\n\"Impressive,\" Lex adds impassively.\n\n\"Reckless, but brave,\" North gives you thumbs up. \n\n\"I hate to say this, but she had it coming,\" Oliver adds sheepishly.\n\nMeanwhile, Madison slowly attempts to get back up, but is too dizzy to do so. You and your friends surround her, prepared for another attack.\n\nMadison starts laughing maniacally, \"You morons! You fell for it!\" she looks at your confused looks, \"We're just a distraction! Say goodbye to your normie friends!\" she cackles.\n\nIt instantly hits you; the other students are in danger.\n*page_break\n*goto truechaos\n*label madteamwork\nHawk's training pays off and, without uttering a single word, you and the others share knowing looks and nods and know exactly what to do. You, Lex and Catie distract Madison by serving as decoys. Meanwhile, North takes a position behind one of the chairs, Oliver close nearby. \n\nMadison chases after you, Lex and Catie as you lead her towards the ambush. When Madison stops just short of the ambush spot, Jun pushes her there with a powerful jump kick. She stumbles, and is immediately apprehended by April, who jumps on her and restrains her, while Oliver and North both focus their powers on her. Oliver paralyzes Madison while North encases her body in ice, leaving her completely restrained except for her head. Catie hops next to her and takes a selfie with her, giving Madison bunny ears for the picture.\n\nMadison starts laughing, \"You morons! You fell for it!\" she looks at your confused looks, \"We're just a distraction! Say goodbye to your normie friends!\" she cackles.\n\nIt instantly hits you; the other students are in danger.\n*page_break\n*goto truechaos\n*label truechaos\nYou quickly reach the gym where your Augmented Education class usually takes place and where the students were led to safety.\n\nYou find the students huddled on one side of the gym with a group of attackers on the other, led by Catalyst. No, someone who [i]looks[/i] like Catalyst. You notice his appearance changing into that of a smug-looking bald man with blue skin. \n\nIn the middle of the gym stands Felix, who is shielding the students as he looks at the attackers defiantly. Before you can attempt to stop him, he activates his power.\n*page_break \nThe whole room starts shifting and turning. Thankfully, the students are far enough from Felix to be out of his power's reach. The attackers, however…\n\nThe floor under some of them turns into nougat which they fall into and get stuck in. Others are not so lucky, as some are assaulted by a swarm of locusts which appeared out of nowhere, while others are crushed under a giant rubber duck which they attempt to push off of themselves, but are not strong enough to do so.\n\nThough the attackers seem to be incapacitated now, the room keeps changing in random ways. Felix notices you and gives you a worried look, \"I can’t turn it off!\" he shouts.\n*choice\n    *selectable_if (felix >=55) #I convince him to calm down.\n        *if felix \u003c= 85\n            *set felix +15\n        \"You can control it, Felix! Just try to remember our training! Think of the room as a part of you!\" you shout.\n        \n        Felix hesitates, but then nods in agreement and closes his eyes. After a few moments, the random effects start slowing down until they seize completely. Felix falls to the ground, exhausted. \n        \n        The attackers remain incapacitated as the students restrain them with various gym equipment.\n        *page_break\n        *goto feelthequake\n    #\"We have to stop him!\" you shout to the others.\n        North nods in agreement and shoots a large iceball at Felix's head, knocking him out. The random effects seize and the room is now silent.\n        \n        You and Oliver rush to Felix, healing his injuries.\n        \n        The attackers remain incapacitated as the students restrain them with various gym equipment.\n        *page_break\n        *goto feelthequake\n*label feelthequake\nWith the crisis at the academy averted, you take a sigh of relief, however your respite is brief as the ground underneath you starts violently shaking. The quakes are so powerful they knock most of the students off their feet. You, however, manage to stand firm thanks to your abilities. \n\n\"It's Resonance,\" Lex comments, looking towards the downtown. Some of the buildings there are starting to collapse due to the powerful seismic activity.\n\n\"We gotta stop him!\" Jun barks and runs off alone. North calls out to stop him, but to no avail.\n\n\"We should go too,\" Catie says. You nod and leave the gym with the others. Oliver, being the most skilled healer among you, stays with the injured.\n*page_break\nAs you run, you witness the sheer chaos that has overtaken the city. There are toppled buildings, bridges and burning cars as far as you can see. You can even hear screams in the distance. \n\n\"We have to help them!\" April shouts.\n\n\"We need to stop Resonance first!\" North responds.\n\n\"What's that?\" Catie points at the sky.\n\nYou look up and see that augmented who looks like a giant humanoid moth. Before you can react, he swoops down and grabs you, taking you high up the sky. You try to struggle, but cannot free yourself. Your friends on the ground are desperately trying to help you as they become smaller and smaller the more you ascend.\n*page_break\n*if estelle \u003c= 90\n    *set estelle +10\nOut of nowhere, Estelle, dressed in her trademark purple spacesuit, flies directly into the mothman and punches him in the face. He releases his grip on you and you start falling, rapidly moving towards the ground. \n\nBefore it’s too late, Estelle grabs you mid-air and smiles, \"Need a lift?\" Tightly holding you, she flies with an astounding speed away from the villain, who tries to catch up to you, but quickly gives up.\n\n\"We need to stop Resonance!\" you shout, realizing that she is taking you back to safety.\n\n\"I presume it’s that guy in the middle of Arlington causing earthquakes, correct?\" Estelle asks, making a swift turn towards the downtown.\n\n\"Yup.\"\n\n\"Got it. Hang on, it’s gonna be a bumpy ride.\"\n*page_break\nEstelle flies directly downwards, picking up even more speed in the process. You zip by crumbling skyscrapers and cars looking like moving lights below you. \n\nSoon, you can see Resonance standing in the middle of a square with the unconscious Catalyst next to him. It hits you, he is using Catalyst's power to enhance the earthquake!\n\n\"Can you distract him for a while? I’ll bring the others,\" Estelle asks.\n\n\"I’ll try,\" you promise.\n\nWith that, Estelle releases you and you land right in front of Resonance, startling him, which gives you an opportunity to attack.\n\nWhat do you say?\n*fake_choice\n    #\"Surprise! What's shaking?\" you joke and punch him.\n        *set extroverted +2\n        *set feeling +2\n    #\"Here's your balanced breakfast!\" you shout and punch him.\n        *set extroverted +2\n        *set feeling -2\n    #You say nothing and just punch him.\n        *set extroverted -2\n        *set feeling -2\n    #\"Sorry, hope this resonates with you!\" you say and punch him.\n        *set extroverted -2\n        *set feeling +2\nYour attack throws Resonance off his balance and he plops on the ground. You then place your hand on the concrete and focus all of your power, attempting to stop the earthquake.\n*page_break\nThe earth itself is out of balance, and you don't know if you can fix it.\n\nBut then…\n\nYou recall the day you got your powers. There was a powerful earthquake in Quito, but you weren't affected by it. Despite your whole house intensely shaking, your room remained untouched.\n\nYou recall that feeling and expand it, focusing all of your power in the process. Suddenly, the earthquake stops.\n*page_break\n\"Huh, it’s nice to see someone with similar powers. Would’ve been interesting to see how much stronger the earthquake can get if we’re both on it,\" Resonance comments, wiping the blood off his lip.\n\n\"You've lost, Resonance. Stop this madness!\" you shout.\n\n\"Why are you trying to protect them? They despise us. They are terrified of anybody who’s different from them. They don’t deserve your help,\" Resonance says, sounding genuinely confused by your actions. \"Why not join Ubermensch? Just imagine what you can do with powers like that. What [i]we[/i] can do!\" Resonance smiles and offers you a handshake.\n*choice\n    #\"You're wrong! You are the ones who don't deserve my help,\" you say defia
