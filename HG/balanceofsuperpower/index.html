<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Balance of Superpower — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "balanceofsuperpower", "title": "Balance of Superpower", "scenes": {"aprilmay": "*temp Aprilkiss false\nYou have never been in a city so crowded before and you probably never will. This is Mumbai, India — the most populous city in the world with nearly sixty million inhabitants. Trying to locate a specific person here is harder than searching for a proverbial needle in a haystack.\n\nThankfully, you're not alone. \n\n\"Over there! I can feel him. He is in that building!\" Vidya, or \"Pundit\", a member of the Indian superheroic team \"Shaptam\", points at a high-rise building a few blocks away. Her ability allows her to sense augmented people and even know what their powers are. \n\n\"Thank you, Vidya!\" April says. You can tell she is very excited to be on a real heroic mission, she is not even bothered by the dirty looks she receives from passers-by.\n\nYou think to yourself just how bizarre this whole situation is compared to where you were just a few days ago.\n*page_break\nDove called you or. more accurately, she called April, whom you were accompanying. She told you about an important mission regarding an augmented in India, who has the ability to block the powers of other augmented. His ability is not as effective against Corporal augmented, which is why April is perfect for the mission, if she chooses to accept it.\n\nDespite all of the crazy events that happened recently, April was very excited to go on a real superheroic mission. It was also pretty obvious that she was glad to be able to use her Corporal talents.\n\nTransit helped you quickly get to Mumbai, where you met several members of \"The Guardians of India\", or \"Shaptam\", as they are commonly referred to.\n*fake_choice\n    #Plethora — a Dynamic augmented who has the ability to turn into various animals by touching them or a part of their body. She has various fangs, feathers and claws adorning her outfit.\n    #Ap — an Elemental augmented with the ability to control water. He is dressed in a pristine, expensive-looking suit.\n    #Fakir — an Environmental augmented with the ability to create forcefields. His outfit is a mix of a traditional yogi outfit and a modern superheroic jumpsuit.\n    #Pundit — an Interpersonal augmented who can locate people and determine what their augmentations are if they are augmented. She is dressed in a traditional Indian sari.\nOne thing you notice right away is that none of them are Corporal augmented, this is probably why April's presence is so crucial. Not to mention her toughness.\n\nThough you expected to work with the Indian heroes, only one of them was allowed to join you, since her powers were deemed irreplaceable for the mission. Apparently, the rest of the team had other matters to attend to. After what happened in D.C., the augmented supremacist attacks became a relatively common occurrence even in other countries.\n\nYou continue contemplating this as you walk closer to the building and, once you are within a few meters of it, something unusual happens..\n\nYou lose balance.\n*page_break\nThankfully, April was there to catch you. Otherwise you would've probably fallen hard on the concrete sidewalk. \n\n\"I cannot sense him anymore,\" your guide comments, \"We are close.\"\n\nYou try to walk on your own, but it is surprisingly hard for you to keep the balance. You never realized just how much you rely on your powers before. April helps you continue moving forward.\n\nYou enter the premises, which turn out to be an abandoned office building, and search through its various rooms, until you eventually find a locked door. After trying to open it via conventional means, you resort to using force, which is to say April takes a running start and breaks the door open.\n\nInside, you find an empty windowless room with a small TV and a simple futon on the floor. Then you notice the boy.\n*page_break\nHe is sitting in the corner; a teenage boy dressed in a gray hoodie. He looks up at you, his eyes filled with a mix of fear and apathy.\n\n\"You are Aadi, right?\" April says. \n\nBefore you have a chance to say anything yourself, the boy responds, \"They will be back soon. They will catch you too,\" he states.\n\n\"Who are 'they'?\" April asks.\n\n\"Bad people. They grabbed me and put me here. They said I was evil because I have powers. They want to kill everyone with powers.\"\n\n\"Anti-augmented gang,\" Vidya chimes in, \"We should go before they return.\"\n\n\"Come, let's go, buddy!\" April says and helps Aadi get up. He is reluctant, but does not object. You leave the room together and head for the exit.\n\nBut it's too late.\n*page_break\nSix guys armed with various melee weapons are blocking your way to the exit, some even have firearms.\n\nOne shouts something at you in Hindi. \"They say we should surrender and give the boy back,\" Vidya translates.\n\nApril gives you a look, and you know what the plan is.\n*choice\n    *selectable_if (tank \u003c= 50) #She uses her proficiency in tanking to provide cover, while I and Vidya help Aadi get out safely.\n        You and Vidya cover Aadi with your bodies and lead him to another exit in the back of the building. The gang starts shooting, but April blocks the bullets with her own body. You know it's gonna be painful for her, but she will be okay, you hope.\n        \n        You help Vidya and Aadi get out of the back entrance, then tell her to take Aadi to safety while you get April.\n        \n        When you get back, April is still standing. Some of the gang members gave up shooting and are now trying to hit her with more conventional weapons. It's not very effective.\n        \n        \n        *goto uberarrives\n    *selectable_if (tank >= 50) #Though my powers are disabled, my training allows me to effectively use the cover to help April.\n        You signal Vidya and Aadi to run as you pick up the metal door that April busted through. The gang starts shooting, and you use it as a shield, providing cover for Vidya and Aadi to escape through the back door.\n        \n        April helps you out by blocking the bullets with her own body. You can see it's painful for her, but she will be okay, you hope.\n        \n        The gang members quickly realize that their bullets aren't doing much, so they run towards you with more conventional weapons.\n        \n        \n        *goto uberarrives\n*label uberarrives\nYou are now surrounded by the armed gang members and, while trying to look for a way out, something unexpected happens..\n\nThe situation gets worse. \n*page_break\nA surreal sight — an oval-shaped piece of another room appears out of thin air. You then realize that it is not a piece of another building, but rather a portal to it, out of which three people come out. You recognize some of them.\n\nThe \"Ubermensch\".\n\nOne is that loud-mouthed girl who shouted threats from the top of Jefferson Tower. Her moniker is \"Din\", you recall. Another is a guy with crazy hair and an even crazier look in his eyes. He's the one who creates portals and his moniker is Wormhole. The third is a huge Corporal augmented who looks like a humanoid hippo.\n\nThe anti-augmented gang starts shooting at them, which prompts Din to use her high-pitched scream. You close your ears lest they be damaged. The glass in the few windows that have it breaks as the gang members drop their weapons to cover their ears.\n\nYou are, quite literally, between a rock and a hard place. The Ubermensch members are on one side, the gang members on the other. It looks like this is it. You and April share a concerned look.\n*choice \n    #\"This may be the end, but I'm glad I met you,\" you say and kiss her.\n        *set aprilkiss true\n        *if april \u003c=90\n            *set april +10\n        You give her a quick kiss. April gives you a surprised look, then grabs you and kisses you back. Hard. \n        \n        Din whistles, \"Okay, love birds, get a room, or should I say, a grave?\" she laughs.\n        *page_break Suddenly...\n        *goto shaptamenters \n    #\"This may be the end, but I'm glad I met you,\" you say and give April a friendly hug.\n        *if april \u003c=90\n            *set april +10\n        You hug April and she hugs you back, so hard you almost feel like you'll suffocate.\n        \n        \"So adorable, I might cry. Or not,\" Din gloats and prepares for another scream.\n        *page_break Suddenly...\n        *goto shaptamenters\n*label shaptamenters\nA wall behind the gang members bursts open and a huge African elephant storms in, the gang members freak out and try to shoot at it, but the elephant transforms into a young woman for a split second, then into a Siberian tiger, who jumps on the attackers and slashes their weapons away. It's Plethora!\n\n\"What the..\" Wormhole says, right before a huge flood of water swoops him and his cronies and washes them out of the room. Ap enters, carefully brushing his impeccable suit with a small handkerchief.\n\nFakir arrives as well and creates a forcefield around the gang members, restraining them. His force fields look like orange-tinted glass.\n\n\"Is Aadi okay?\" April asks, still shocked. \n\n\"He's with Pundit, she is escorting him out of the city,\" Plethora explains, leaving her tiger form, \"It isn't safe for him here.\"\n\n\"I tried to incapacitate them, but the fanatics teleported away,\" Ap calmly says, referring to the Ubermensch members.\n\n\"It's fine, they didn't get what they wanted, that's all that matters,\" Plethora reassures him.\n\nYou and April, still hugging each other, share a look of relief. \n*page_break\n*achieve april\nThe Mumbai police force arrives and the gang members get arrested. Aadi will be safe as he is with The Guardians of India now. \n\n*if aprilkiss = true\n    You and April return to the academy, your mission accomplished. You are officially superheroes now and officially a couple. You're not sure which one excites you more.\n    \n    You can sense that the hardest battles are still ahead, but you feel prepared to take them on. After all, now you have someone to fight for.\n    \n    \n*if aprilkiss = false\n    You and April return to the academy, your mission accomplished. You are officially superheroes now. Your dream has come true! \n    \n    However, you can sense that the hardest battles are still ahead, but now you feel prepared to take them on. After all, this is what heroes are for.\n    \n    \n[b]Ending 2: April May[b]\n*page_break\n*goto_scene finalscreen", "balancing": "[b]Chapter 4: Balancing Act[b]\n\n*if (gotexploded = false)\n    You wake up to a familiar, slightly metallic voice of Nonpareille. You check the time, there is still more than an hour before the lecture.\n\n    \"Isn't this a little too early?\" you object.\n\n    'I don't know what you're talking about, darling. I'm here to tell you that the principal wants you at her office as soon as possible.\"\n\n    Whoa! The principal wants to talk to you? Is it about what happened yesterday with Madison?\n\n    \"Okay, I'm coming,\" you say, and before Nonpareille disappears from the screen, shout \"Wait! Where's the principal's office again?\"\n    *page_break\n    The office looks somewhat old-fashioned, like the kind you'd see in the early 2030's. Dove is sitting behind the large wooden desk while you take a seat in front of it.\n\n    \"Good morning, Rio. I wish we could meet in happier circumstances, but sadly we need to discuss something serious regarding your fellow student.\"\n\n    You gulp. So it is about Madison? Why would Dove talk about it with you? Nobody could have seen you were there. Right?\n\n    \"Well, even though he is your fellow student, you have not actually met him yet, no one has.\"\n\n    An absentee student? Why would she talk about that with you?\n\n    \"Being augmented comes with a lot of challenges. Not only that, the challenges we face are often unique to us and us only. Learning to control one's abilities takes talent and hard work, but in some cases even that is not enough.\"\n    *page_break\n    \"One of my students, Felix, has struggled to control his abilities his entire life. I persuaded his parents to let him attend the academy, but due to the nature of his powers I cannot let him attend classes with everyone else. Not until he can control his power better, that is. This is where I need you to help me, Rio. Your abilities have the potential to subdue Felix’s innate unrelenting power to a manageable level.\"\n\n    \"My powers are unlikely to help in this case,\" you begin, \"I can only find balance of various objects, that’s about it.\"\n    \n    \"No one truly knows the true limits of augmented abilities. With practice and experience, one can increase them to unprecedented levels. In your case, your balancing abilities are likely the most elementary application of your powers. I believe you have the ability to affect all types of environments, including the powers of others.\"\n    \n    Is that true? Can you really do all of that?\n    *choice \n        #\"I understand the gravity of the situation, but what's in it for me?\"\n            *if selfish \u003c= 95\n                *set selfish +5 \n            \"You are right, of course, and I will make sure that this is worth your time. You will receive double the allowance of other students.\"\n            \n            \"Okay, what do I need to do?\" you ask.\n            \n            \"I need you to meet Felix on weekends. The location will likely change each week. I will send you a message with the details. You will begin tomorrow.\"\n            \n            With that, your conversation seems to be over. You realise your first class is about to begin and leave.\n            *page_break\n            *goto cata\n        #\"Helping people in need is why I want to become a hero in the first place. I'll do it.\"\n            *if selfish >= 5\n                *set selfish -5\n            \"Thank you. I will make sure that this is worth your time. You will receive double the allowance of other students.\n            \n            \"Okay, what do I need to do?\" you ask.\n            \n            \"I need you to meet Felix on weekends. The location will likely change each week. I will send you a message with the details. You will begin tomorrow.\"\n            \n            With that, your conversation seems to end and you realise your first class is about to begin.\n            *page_break\n            *goto cata\n*if (gotexploded = true)\n    *achieve boom\n    You wake up in a brightly lit room with various medical equipment around you. Must be the infirmary.\n    \n    \"Are you feeling better?\" you hear the calming voice you recognize from the opening ceremony. It's Dove. She looks down at you with a face full of sorrow.\n    \n    \"Yes,\" you answer honestly, though you feel extremely exhausted, but a quick look at your body proves that at least all of your limbs are still attached to you.\n    \n    \"I know what happened. Kyle, the boy you saved, was here as well, not too long ago. His wounds have been healed and he is back in his room now.\"\n    \n    \"What about?..\" you struggle to speak, you feel extremely sleepy.\n    \n    \"Madison? She has been apprehended and is detained in the city,\" Dove lets out a heavy sigh, \"All of this was my fault. I insisted that Madison should be allowed to study at this academy. Her family despised her for being augmented, so she never truly had a place she could call home. I was hoping…\"\n    \n    Dove pauses for a moment, deep in thought, \"She will be expelled tomorrow. Other students cannot be put in danger,\" she said more to herself, than to you.\n    *choice\n        #Dove is right; Madison is too dangerous.\n            *if selfish \u003c= 95\n                *set selfish +5\n            \"For now, you need to rest. Your body has been completely healed, but it is better to make sure there are no complications. If you need anything, my assistant will be here to help.\"\n            \n            Dove opens the door and a guy with crimson red hair from earlier comes in. \"This is Oliver, I believe you have met at the hero program entrance exam. I.. should have been there to prevent what happened..\"\n            \n            \"We've been over this, ma'am. Your sister's training is intense, but effective. And I feel much better now,\" Oliver states in his heavy English accent.\n            \n            Indeed, he doesn't have the cuts and bruises from before. \n            \n            \"And yet I cannot let that happen again,\" she turns to you, \"Rio, would you forgive me for asking you a favor in this situation? I need to talk to you tomorrow. Could you come to my office in the morning?\"\n            \n            You nod before you can even process her request. Why can't she talk to you now instead of tomorrow? Is it about Madison?\n            \n            \"Thank you and goodnight,\" she gives you a nod of approval and leaves.\n            \n            Oliver turns to you, \"I will be in the main room if you need anything. There is a button next to you, just press it and I'll be here,\" he waves you goodbye and leaves as well.\n            *choice \n                #Time to finally get some rest. \n                    You press the switch to your left and turn off the lights. After all of the excitement and craziness of today you just want to get some sleep.\n                    \n                    Before you fall asleep, you wonder what will happen to Madison and what does Dove want to talk about.\n                    *page_break\n                    *goto mornin\n                #I want to talk to Oliver.\n                    *set oliver +5\n                    You press the button and Oliver arrives shortly.\n                    \n                    \"Is everything alright?\" he asks concernedly.\n                    \n                    You feel a little guilty for calling him for no reason. \n                    \n                    \"I'm fine. I just wanted to talk to you,\" you admit.\n                    \n                    Oliver raises his eyebrows, but walks to you and sits on the chair next to your bed.\n                    \n                    \"Is it about what happened today at the trials? Or.. my background?\" he asks apprehensively.\n                    *disable_reuse\n                    *label startofoli\n                    *choice \n                        #I ask about the trials.\n                            *set oliver +1\n                            \"If you're wondering how I'm able to speak to you when my jaw was looking like it might fall off earlier today, that's because of Dove. She can heal almost anything, except for death. Actually, probably even that too.\"\n                            \n                            He looks at his face in the mirror on the wall, \"To tell you the truth, I'm surprised I managed to pass at all. I'm not exactly a brawler type. I guess me and you both got lucky?\"\n                            \n                           He looks at your bed and corrects himself, \"Sorry, I didn't mean it like that. You've been through a lot today, and you absolutely deserve to be on the hero program.\"\n                           *goto startofoli\n                        #I ask about his background.\n                            *set oliver +1\n                            Oliver gives you a pained smile, \"That's the question on everyone's mind. My mother, Elizabeth, is better known as Bloody Mary — a psychotic murderer who kills people just for fun.\" \n                            \n                            He looks at you, expecting some kind of reaction, then continues, \"I want nothing to do with her. We may have the same blood and the power to wield it, but how we decide to use it couldn't be more different.\"\n                           *goto startofoli\n                        #I ask about his internship.\n                            *set oliver +1\n                            \"I think this is where my powers are most useful. You might have noticed before, but I use my blood manipulation abilities primarily for healing. Dare I say, I'm good at it, though nowhere near Dove's level, of course.\" \n                            \n                            He looks at you for a moment, than continues, \"Dove was an inspiration for me. I hated my powers for a long time, but I realized that I can use them for good. That's why I want to be a superhero. And what could be better than working alongside your role model?\"\n                           *goto startofoli\n                        #I ask about him.\n                            *set oliver +2\n                            \"I'm flattered, though there isn't much to say. The only things interesting about me are my powers and my mother issues,\" he chuckles.\n                            \n                            \"Do you have any hobbies?\" you ask.\n                            \n                            \"It's not exactly a hobby, but since I wasn't sure if I'll make it into the hero program, I've been studying medicine to become a doctor. A sort of plan B, if you will.\"\n                            \n                            He looks at his phone, \"It's getting pretty late and you need to get enough rest,\" he comments and gets up from the chair, \"It's been a pleasure talking to you, Rio. I hope we will work together when we become superheroes,\" he gives you a warm smile and leaves.\n                            \n                            You press the switch to your left and turn off the lights.\n                           *page_break\n                           *goto mornin\n        #Perhaps there is some hope left for her?\n            *if selfish >= 5\n                *set selfish -5\n            \"Is it necessary? To expel her?\"\n            \n            Dove looks at you with a sad expression.\n            \n            \"You are very kind, Rio. However, you are not aware of the whole situation. You.. you should have been killed in that explosion…\"\n            \n            What?..\n            \n            \"When I got to you, you were barely alive in the middle of a large crater. Most students would have been dead in those circumstances.\"\n            \n            \"What do you mean?\"\n            \n            \"I do not know for certain, but I think your powers were the reason you survived. Augmented have been known to display increased powers in a life-or-death situation. Perhaps you managed to make your body tougher or somehow reduced the force of the explosion.\"\n            \n            She pauses, letting this revelation sink in.\n            *page_break\n            \"Regardless, Madison has to go. We cannot risk the lives of other students even if she could be redeemed. For now, you need to rest. Your body has been completely healed, but it is better to make sure there are no complications. If you need anything, my assistant will be here to help.\"\n            \n            Dove opens the door and a guy with crimson red hair from earlier comes in. \"This is Oliver, I believe you have met at the hero program entrance exam. I.. should have been there to prevent what happened..\"\n            \n            \"We've been over this, ma'am. Your sister's training is intense, but effective. And I feel much better now,\" Oliver states in his heavy English accent.\n            \n            Indeed, he doesn't have the cuts and bruises from before. \n            \n            \"And yet I cannot let that happen again,\" she turns to you, \"Rio, would you forgive me for asking you a favor in this situation? I need to talk to you tomorrow. Could you come to my office in the morning?\"\n            \n            You nod before you can even process her request. Why can't she talk to you now instead of tomorrow? Is it about Madison?\n            \n            \"Thank you and goodnight,\" she gives you a nod of approval and leaves.\n            \n            Oliver turns to you, \"I will be in the main room if you need anything. There is a button next to you, just press it and I'll be here,\" he waves you goodbye and leaves as well.\n            *choice \n                #Time to finally get some rest. \n                    You press the switch to your left and turn off the lights. After all of the excitement and craziness of today you just want to get some sleep.\n                    \n                    Before you fall asleep, you wonder what will happen to Madison and what does Dove want to talk about.\n                    *page_break\n                    *goto mornin\n                #I want to talk to Oliver.\n                    *set oliver +5\n                    You press the button and Oliver arrives shortly.\n                    \n                    \"Is everything alright?\"\n                    \n                    You feel a little guilty for calling him for no reason. \n                    \n                    \"I'm fine. I just wanted to talk to you,\" you admit.\n                    \n                    Oliver raises his eyebrows, but walks to you and sits on the chair next to your bed.\n                    \n                    \"Is it about what happened today at the trials? Or.. my background?\" he asks apprehensively.\n                    *disable_reuse\n                    *label olistart\n                    *choice \n                        #I ask about the trials.\n                            *set oliver +1\n                            \"If you're wondering how I'm able to speak to you when my jaw was looking like it might fall off earlier today, that's because of Dove. She can heal almost anything, except for death. Actually, probably even that too.\"\n                            \n                           He looks at his face in the mirror on the wall, \"To tell you the truth, I'm surprised I managed to pass at all. I'm not exactly a brawler type. I guess me and you both got lucky?\"\n                            \n                           He looks at your bed and corrects himself, \"Sorry, I didn't mean it like that. You've been through a lot today, and you absolutely deserve to be on the hero program.\"\n                          *goto olistart\n                        #I ask about his background.\n                            *set oliver +1\n                            Oliver gives you a pained smile, \"That's the question on everyone's mind. My mother, Elizabeth, is better known as Bloody Mary — a psychotic murderer who kills people just for fun.\" \n                            \n                            He looks at you, expecting some kind of reaction, then continues, \"I want nothing to do with her. We may have the same blood and the power to wield it, but how we decide to use it couldn't be more different.\"\n                          *goto olistart\n                        #I ask about his internship.\n                            *set oliver +1\n                            \"I think this is where my powers are most useful. You might have noticed before, but I use my blood manipulation abilities primarily for healing. Dare I say I'm good at it, though nowhere near Dove's level, of course.\" \n                            \n                            \"Dove was an inspiration to me. I hated my powers for a long time, but I realized that I can use them for good. That's why I want to be a superhero. And what could be better than working alongside your role model?\"\n                          *goto olistart\n                        #I ask about him.\n                            *set oliver +2\n                            \"I'm flattered, though there isn't much to say. The only things interesting about me are my powers and my mother issues,\" he chuckles.\n                            \n                            \"Do you have any hobbies?\" you ask.\n                            \n                            \"It's not exactly a hobby, but since I wasn't sure if I'll make it into the hero program, I've been studying medicine to become a doctor. A sort of plan B, if you will.\"\n                            \n                            He looks at his phone, \"It's getting pretty late and you need to get enough rest,\" he comments and gets up from the chair, \"It's been a pleasure talking to you, Rio. I hope we will work together when we become superheroes,\" he gives you a warm smile and leaves.\n                            \n                            You press the switch to your left and turn off the lights.\n                          *page_break\n                          *goto mornin\n*label mornin \nThe next morning you feel completely rested. You leave the infirmary and make your way to the principal's office. It looks somewhat old-fashioned, like the kind you'd see in the early 2030's. Dove is sitting behind the large wooden desk while you take a seat in front of it.\n\n\"Good morning, Rio. I am glad you agreed to help me. I wish I did not have to burden you with my problems, but the matter is indeed urgent.\"\n\n\"What is it?\" you ask.\n\n\"One of my students, Felix, has struggled to control his augmented abilities his entire life. I persuaded his parents to let him attend the academy, but due to the nature of his powers I cannot let him attend classes with everyone else. Not until he can control his power better, that is. This is where I need you to help me, Rio. Your abilities have the potential to subdue Felix’s innate unrelenting power to a manageable level.\"\n\nIs this what she was talking about yesterday? Can you really do all of that?\n*choice \n        #\"I understand the gravity of the situation, but what's in it for me?\"\n            *if selfish \u003c= 95\n                *set selfish +5 \n            \"You are right, of course, and I will make sure that this is worth your time. You will receive double the allowance of other students.\"\n            \n            \"Okay, what do I need to do?\" you ask.\n            \n            \"I need you to meet Felix on weekends. The location will likely change each week. I will send you a message with the details. You will begin tomorrow.\"\n            \n            With that, your conversation seems to be over. You realise your first class is about to begin and leave.\n            *page_break\n            *goto cata\n        #\"Helping people in need is why I want to become a hero in the first place. I'll do it.\"\n            *if selfish >= 5\n                *set selfish -5\n            \"Thank you. I will make sure that this is worth your time. You will receive double the allowance of other students.\"\n            \n            \"Okay, what do I need to do?\" you ask.\n            \n            \"I need you to meet Felix on weekends. The location will likely change each week. I will send you a message with the details. You will begin tomorrow.\"\n            \n            With that, your conversation seems to end and you realise your first class is about to begin.\n            *page_break\n            *goto cata    \n*label cata\n*if (gotexploded = false)\n    During the Civics class you notice that Madison is absent. As if reading your thoughts, Mister Murdock mentions that Madison has been expelled from the academy as of this morning.\n    \n    I guess it's understandable, considering what she did, but what do you think?\n    *fake_choice\n        #Good riddance. She brought it upon herself.\n            *if competitive \u003c= 95\n                *set competitive +5\n        #Despite what she did, expulsion seems too harsh. Maybe there was a better way?\n            *if competitive >= 5\n                *set competitive -5\n*if (gotexploded = true)\n    Just as you expected, Madison is absent. Mister Murdock confirms your suspicions when he announces that Madison has been expelled.\n    \n    \nMost of the classes today were the same as in the days prior, except for one — the Augmented Education, or, as some other students refer to it, the Augmented P.E.\n\nYou and your augmented classmates assemble at a regular-looking gym with a basketball hoop and various athletic equipments stacked on the floor and against the walls.\n\nThe teacher is none other than Catalyst, who is known as the friendliest member of The Patriots.\n\n\"Hi, everyone! How is everybody doing today?\" he greets you cheerfully. The students' response is uneven, some are excited while others aren't thrilled. \"Most people know me as Catalyst, but you can just call me Greg. I'm from Cleveland, Ohio.\"\n\nCatalyst.. er.. Greg explains that augmented powers can be increased with training. His abilities allow him to amplify the powers of augmented around him. \n\n\"I'll show you how this works. Let's start with..\" he looks at the tablet in his hand, \"Rio Ramirez. Come over here!\" he calls out to you in a friendly tone.\n*page_break\nYou walk up to him. \"So, it says your ability is finding balance in things, is that correct?\"\n\nYou nod. \n\n\"Awesome! Let's see how you can improve your abilities,\" he says and starts to concentrate. His body begins to shine with a faint glow, then he offers you a handshake, his hand emanating a powerful aura. \n\nAs soon as you grasp his hand, you feel an immense surge of power rush through your body. You can feel the air, the sound, the floor under your feet. You know that you can shape it, mold it, change its properties. You can make your body stronger, lighter or faster. You can cause the room to shake or even slow the passage of time.\n\nHowever, you also understand that any change, even a minuscule one, comes at a cost: if you make your body stronger, your mind might suffer. If you make the room colder, the heat will have to go somewhere, possibly hurting you or someone else in the process.\n\n\"Okay, take it easy, pal. Just try to relax and focus your power on something minor, like balancing these mats!\" Greg says and points at the training equipment on the floor.\n*choice\n    #Make them tougher.\n        You affect the physical properties of the mats to the point where they have become as hard as a rock. However, you feel your own body getting weaker. Greg notices it too and catches you before you fall.\n        \n        \"Okay, that's probably good enough for the first time,\" he turns off his power and you start feeling better, \"Alright, who wants to go next?\"\n        \n        \n        *goto powerdonezo\n    #Make them softer.\n        You affect the physical properties of the mats to the point where they have almost turned into liquid and ooze on the floor. However, you feel your own body getting heavier, the floorboards underneath you start to creak, straining under enormous pressure.\n        \n        \"Okay, that's probably good enough for the first time,\" Greg turns off his power and you instantly feel better, \"Alright, who wants to go next?\"\n        \n        \n        *goto powerdonezo\n*label powerdonezo\nAfter you are finished with the demonstration, another student takes your place, and than another. You are not paying attention, however, as you are too focused on reflecting on this new experience. \n\nDove was right; you can do so much more than just finding balance in things, you can alter the reality itself!\n*page_break The next day.\nYou get to the designated location where you are supposed to meet up with Felix. Turns out it is an empty classroom near the back of the academy's main building.\n\nYou don't see any other students on your way, likely due to the lack of classes on the weekends and the late hour. You can see the sun setting in the distance.\n\nWhen you get to the classroom, you see Felix, or at least you assume that's him, sitting on the chair in the back of the room, staring at the table in front of him. He has a long dirty blond hair and faint mustache and beard. His eyes are pale blue and lifeless. He acknowledges your presence with a slight nod.\n*fake_choice\n    #\"Hi!\"\n        *set extroverted +2\n        *set feeling +2\n    #\"Hi.\"\n        *set extroverted +2\n        *set feeling -2\n        *set felix +5\n    #\"Hi...\"\n        *set extroverted -2\n        *set feeling -2\n    #\"Hi?\"\n        *set extroverted -2\n        *set feeling +2\nFelix doesn't really respond at first, but then he finally speaks, \"You're a good person, but Dove shouldn't have forced you to help me. I don't want you to get hurt,\" he says in an emotionless, but genuine tone.\n\n\"What is your power exactly?\" you ask.\n\n\"I wish I knew for sure, it's some weird environmental thing, or whatever it's called. It's easier to show than to explain, but you should step way back.\"\n\nYou suppose that showing is better than telling, so you do as he says and back away to the screen on the wall. Felix looks at you for a moment, than starts to mumble something to himself and bobbing his head to some rhythm, than he closes his eyes and…\n*page_break Chaos...\nYou have never seen anything like this before. The environment, no, the reality itself around Felix has been transformed in random ways: one of the chairs turned into a chair-shaped cotton candy, another into a bunch of wire, the wall behind Felix now looks like a mish-mash of various geometrical shapes made out of different materials like various fabrics, gemstones and even some organic material like cheese and orange. There was even a blue bird that appeared out of nowhere and immediately flew out of the open window.\n\nThe pen that was lying in front of Felix turned into some kind of worm that is now squirming on what used to be the table, but is now a table-shaped piece of shiny copper. \n\nThe air itself is now filled with various smells too, from pleasant ones like flowers, to something unidentifiable, but gross, to downright disgusting ones like the smell of dirty socks.\n\nYou feel like your whole sense of reality is lost and now you are in some kind of weird simulation.\n\n\"What the.. \" you utter.\n\n\"You know, this is not as bad as it usually is,\" he looks around the room, \"Maybe you are a positive influence indeed,\" Felix says with a weak smile. \n*page_break\nYou try to say something, but the words don't come to you and Felix continues, \"I'm really sorry that you had to witness this, but if you can actually help me, I promise I will be eternally grateful. My powers aren't as destructive when I use them intentionally, the problem is that they often activate on their own, especially when I sleep,\" he admits with a painful guilt in his voice.\n\nYou take a sit on one of the normal chairs closest to Felix while he's playing with the worm that was a pen just moments ago.\n*choice\n    #\"You know, that was actually kinda fun!\"\n        *set extroverted +2\n        *set feeling +2\n        Felix looks taken aback, but then gives you a light smile.\n        \n        \n        *goto focuspocus\n    #\"What the actual fuck?!\"\n        *set extroverted +2\n        *set feeling -2\n        *set felix +5\n        Felix lets out a light chuckle, \"Yup, pretty much my thoughts exactly. Welcome to my world!\"\n        \n        \n        *goto focuspocus\n    #\"Your powers are so fascinating! How do they work?\"\n        *set extroverted -2\n        *set feeling -2\n        \"That's the million dollar question,\" he smiles and sighs, \"From what I understand, it is some weird randomizing effect that I cannot control no matter how hard I try.\"\n        \n        \n        *goto focuspocus\n    #\"That was... something else. How are you feeling?\"\n        *set extroverted -2\n        *set feeling +2\n        \"I'm used to it by now,\" he begins, \"Well, that's not quite accurate. More like I'm numb to it at this point.\"\n        \n        \n        *goto focuspocus\n*label focuspocus\n*set felix +10\nYou try to focus your power on Felix and you feel as if you are trying to tame a tornado. However, as impossible as it seems, you can feel a slight calming aura emanating from you.\n\nFelix tries to use a fraction of his power again and the random effects it brings are as strong and as bizarre as before, but you notice that the worm Felix was playing with remained unchanged. Felix notices it too and has a genuine smile.\n\n\"Well, I guess it's some progress, huh?\" he says with sincere joy in his voice.\n*page_break The next day.\nOn Monday morning, you and the other hero program students assemble in the stadium building again. Hawk awaits you inside.\n\nShe begins by ordering everyone to introduce themselves by their heroic names. Some pick really dramatic monikers, while others choose something funny, like that one girl who called herself \"Meme\".\n\n\"I thought about it, but really my actual name fits pretty well,\" said North when his turn came around. \n\nCatie giggles, \"Wow, creative!\"\n\n\"What about you?\" Hawk turns to Catie. \n\nCatie has a big grin, clearly she has been waiting for this exact moment, \"I’m the great and lovable 'Spotlight'!\" she proclaims with a twirl. Despite the cheesiness, you can't help but clap approvingly with the other students.\n\nJun picks \"Counter\" while April sticks to the moniker you've suggested to her — \"${moniker2}\".\n\nWhen Oliver’s turn comes around, he picks “Bleeding Heart”. Hawk smirks and shakes her head, then turns to the next student.\n\n\"Just 'Lex' is fine,\" Lex states in her trademark monotone manner.\n\n\"Okay, lame. What about you, Ramirez?\" Hawk turns to you.\n\nWell, this is the moment you have been preparing for for the last few days. You thought about this a lot during the weekend and you have finally made up your mind.\n*choice \n    #Balance.\n        *set moniker \"Balance\"\n        This one seems perfect. Hopefully, it’s not taken.\n        \n        \n        *goto othermonikers\n    #Equilibrium.\n        *set moniker \"Equilibrium\"\n        It does have a nice ring to it! You're not using firearms though.\n        \n        \n        *goto othermonikers\n    #Harmony.\n        *set moniker \"Harmony\"\n        Is it too vague? You hope not.\n        \n        \n        *goto othermonikers\n    #Equator.\n        *set moniker \"Equator\"\n        Might be a tad too kitschy, but it fits you.\n        \n        \n        *goto othermonikers\n    #How about...\n        *label monikerchoice\n        *input_text  moniker\n        Your superheroic name is ${moniker}?\n        *choice \n            #Yes!\n                *goto othermonikers\n            #No! Go back!\n                *goto monikerchoice \n*label othermonikers\nNow that you all have your heroic names, the real training begins. Hawk's methods are harsh, but useful. She keeps coming up with tough challenges, designed specifically for each student based on their weaknesses. For instance, she forces North to use his powers more offensively, which he isn't very fond of.\n\nShe walks up to you after you have finished doing five hundred push-ups, \"${moniker}, you've got a decent jack-of-all-trades thing going, but you need to find something to specialize in.\" \n\nYou consider what kind of superhero you want to be:\n*line_break\nA hero who takes down villains?\n*line_break\nA hero who protects the innocents?\n*line_break\nA hero who is lauded and celebrated?\n*line_break\nA hero who lurks in the shadows and attacks unexpectedly?\n*line_break\nA hero who sacrifices themselves to protect people and their team?\n*line_break\nA hero who focuses on providing support to the team rather than fighting?\n\nContemplating that, you realize that you have fellow hero program students who can help you on your chosen path. \n*choice\n    #I practice offense with Jun.\n        *set Jun +20\n        *if offense \u003c= 80\n            *set Offense +20\n        Jun is a rough, but fair teacher. He scolds you when you mess up and scolds you some more when you do well, but you can tell that he is impressed.\n        \n        You have several sparring matches with him, each of which he wins handily and offers you constructive critiques of your offensive tactics. \n        \n        Although you feel well-prepared for going on the offensive now, the same cannot be said about your defensive capabilities. But hey, they say the best defense is a good offense, right?\n        *page_break\n        *goto endofbalancing\n    #I practice defense with North.\n        *set North +20\n        *if offense >= 20\n            *set Offense -20\n        Though you cannot create ice walls out of thin air like North, you can use your balancing powers to strengthen existing barriers, including North's own ice barricades. You have a good synergy together.\n        \n        Obviously, being focused on defense makes you less prepared for when you have to go on the offensive.\n        *page_break\n        *goto endofbalancing\n    #I practice some flashy moves with Catie.\n        *set Catie +20\n        *if flashy \u003c= 80\n            *set flashy +20\n        Though Catie is clearly more interested in showing off to you than teaching you anything, you still manage to learn a few things and have fun at the same time. You feel more confident being at the center of attention now.\n        \n        Unsurprisingly, being in the spotlight makes it harder to conceal yourself, thus your stealthy techniques suffer.\n        *page_break\n        *goto endofbalancing\n    #I practice some stealthy techniques with Lex.\n        *set Lex +20\n        *if flashy >= 20\n            *set flashy -20\n        Lex is a girl of a few words, but whenever she does speak, it is usually something extremely useful. \n        \n        Thanks to her guidance, you feel much more capable of using stealthy techniques and combat maneuvers.\n        \n        That said, constantly hiding in the shadows makes you worse at drawing attention to yourself when that is needed.\n        *page_break\n        *goto endofbalancing\n    #I practice withstanding damage with April.\n        *set April +20\n        *set tank +20\n        April is thrilled to have you as her practice partner, though she does not enjoy having to fight you.\n        \n        Thanks to your abilities, you can make your body tougher, and even though you cannot compare to April's indestructible powers, you still manage to become fairly tough and capable of protecting those in need.\n        \n        Of course, focusing on taking damage means you cannot focus on helping someone who is already hurt, making your abilities to heal less effective.\n        *page_break\n        *goto endofbalancing\n    #I practice healing abilities with Oliver.\n        *set Oliver +20\n        *set tank -20        \n        Your power allows you to mitigate pain and heal smaller wounds, and even though you cannot really compare to Oliver's talents, you make for a great assistant.\n        \n        Oliver is a kind and understanding mentor. He appreciates you being interested in helping people as opposed to fighting.\n        \n        However, focusing on supporting others requires you to make sure that you remain unharmed, which means you have to focus on avoiding head-on confrontations, making you less prepared for them.\n        *page_break\n        *goto endofbalancing\n*label endofbalancing\n*set oliver +10\n*set april +10\n*set catie +10\n*set lex +10 \n*set north +10 \n*set estelle +10 \n*set jun +10 \n*set Felix +10\n*set enterrio 5\n[i]The information about the other Sage Academy students has been added to your Stats Screen![/i]\n\nAnd so it begins. You spend the next two weeks of your new life at Sage Academy focused on your studies and your hero training. The physical demand is truly grueling, to the point where some students even decided to drop out of the hero program entirely. Thankfully, you managed to eventually get used to it and can even notice some actual results after weeks of molding yourself into a particular heroic role. You also got to know your coursemates pretty well and consider them to be your friends now.\n\nAside from your own training, you meet up with Felix every weekend at various safe locations and help him improve control over his powers. Though difficult at first, his ability to control his power is getting better, but it's a slow process. You have managed to help him focus his abilities on a specific area, rather than all around him. Dove praises you for your hard work.\n*finish", "balanres": "[b]Chapter 2: Balance and Resonance[b]\n\nThe next morning, you are woken up by a strange metallic voice coming from your computer. The screen displays the face of Nonpareille — the hyper-intelligent robot and a member of The Patriots, who also happens to be your science teacher.\n\nShe greets you in her cheerful voice with a twinge of… French accent?\n\n“Good morning, Mx. Ramirez. I hope you will join us on my first lecture in thirty minutes.”\n*choice \n    #\"Yes, miss.. Pareille?\" \n        \"Just Nonpareille will suffice, darling,\" she corrects you, \"Not to mention, I don't have a gender. That is something only you humans obsess over.\"\n        \n        Does that mean she… it.. is non-binary? Well, guess that means you have something in common.\n        \n        \"Okay, thank you, Nonpareille,\" you say, deciding not to pursue the matter further.\n        \n        \"You are welcome, darling.\"\n        \n        Nonpareille smiles at you and the screen turns off. You do your morning preparations and head out.\n        *page_break\n        *goto snore\n    #\"Isn't this a violation of my privacy?\"\n        \"My consciousness is uploaded to the academy's main server. and thus to every computer which uses it. You can turn off your internet connection if that is an issue, otherwise you'd have to manage,\" she states nonchalantly.\n        \n        Well, this is unsettling. You think about the good old days when people used to enjoy more privacy, like at the beginning of the century. At least that's what you've heard.\n        \n        \"I assume your silence means 'no', correct?\" Nonpareille adds playfully.\n        \n        \"Yeah, thank you. I'll be heading out now,\" you say and get out of your bed.\n        \n        Nonpareille smiles at you and the screen turns off. You do your morning preparations and head out.\n        *page_break\n        *goto snore\n*label snore\n*temp helpest false\nHeading out, you hear a faint snoring sound coming from the room next door. Estelle, your next door neighbor, must still be asleep. \n\nHow has she not been woken up by Nonpareille yet? Is she not connected to the network or is she just that much of a heavy sleeper?\n\nShould you knock on her door and try to wake her up?\n*choice\n    #Yes, I don't want her to get in trouble for skipping classes.\n        *set estelle +10\n        *set selfish -5\n        *set helpest true\n        You knock on the door, but nothing happens. You try again, louder this time, and it seems to work. The snoring stops and after about a minute, Estelle appears before you, dressed in purple pajamas with cartoonish stars and spaceships on them.\n        \n        \"You need something?\" she asks, while rubbing her tired eyes.\n        \n        \"The classes start soon, are you coming?\" You say, trying to ignore her goofy pajamas.\n        \n        Estelle looks at her smartphone, \"Oh, you're right! I'd better head out now,\" she exits her room and starts walking towards the stairs.\n        \n        \"Wait, you're not going out like that, are you?\" you implore, pointing at her outfit. She is still wearing slippers, too!\n        \n        Estelle takes a look at her get-up, then turns to you, \"Yeah, you're probably right.\" Then she briskly returns to her room.\n        \n        You shake your head and go downstairs towards the dorm's exit. That girl is one heck of an air-head!\n        *page_break\n        *goto midd\n    #Nah, it's not my problem.\n        *set selfish +5 \n        You ignore the snoring and walk downstairs towards the exit from the dormitory.\n        \n        \n        *goto midd \n*label midd\nAll of the augmented students at the academy have been separated into three groups, based on their proficiency level, each group with their own unique studying schedule. Based on the result of your placement test, you have landed somewhere in the middle, which means you are in the \"Intermediate\" group and your first class for today is Science.\n\nWhen you get to the classroom, you see a lot of familiar faces from yesterday, including Sami and the girl with explosive powers, whose name is Madison, as you now know. \n\nThe rest of the students are unfamiliar to you, likely because they are regular humans and thus did not have to introduce themselves in front of everybody at the opening ceremony.\n\nYou take the nearest available seat and prepare for the lesson.\n*page_break\nYou are not exactly a science type, but your first class at the academy is truly something special, though not so much because of the subject matter, but rather because of the teacher who presents it.\n\nNonpareille is indeed a fascinating.. person? Machine? It is considered to be the most advanced AI in existence, yet its demeanor and mannerisms are surprisingly human. \n\n\"Welcome, darlings!\" Nonpareille curtseys in a ballerina-like fashion. Its movements are graceful and light, a far cry from what one might imagine an android's movements to be like.\n\n\"My name is Nonpareille, though let's be honest, you all know who I am already!\" it adds with a light chuckle, \"I will be your science course teacher this semester! We've got quite a lot to cover today, so let's get to it, shall we?\"\n\nThe class is quite interesting, Nonpareille goes into details about the most recent scientific breakthroughs, including the recent discoveries on humanity's sole moon colony — Artemis.\n\n*if (helpest = true)\n    You can see starry-eyed Estelle practically glow with excitement as she pays close attention to the class, hanging on Nonpareille's every word.\n*page_break\nNext up on your schedule is the \"History of Augmented Humans\" class. \n\nYou get to the classroom and take the available seat next to the augmented girl from yesterday, the one whose body is made of some strange yellow substance. As soon as you sit down, the girl in question turns to you and gives you a big, friendly smile, then greets you with a noticeable Australian accent.\n\n\"Hello there! My name is April. Your name is Rio, right? I've seen your performance yesterday, it was really impressive! What is your power exactly? Is it like super agility or something? Oh, I wish I could do something like that too! Don't get me wrong, my powers allow me to do a lot of things too, but it would be so fun to have something like super reflexes as well! Could you imagine? I mean, well, you probably can…\"\n\nApril bombards you with so many questions, you couldn't get a word in edgewise. You can almost feel your brain begin to shut down after this barrage of sentences.\n\n\"Oh, I know! How about we practice our powers together? You can teach me how to improve my agility! I can probably help you learn something too! Do you have anything in mind?\" April looks at you expectantly.\n\nJust as you were about to respond, you hear the teacher enter the classroom. April instantly seizes her interrogation and quiets down.\n*page_break\nThe teacher is not a famous hero, at least not someone you recognize. Rather, he is an elderly black gentleman with a slight Southern accent, who looks like just about what you would expect a college professor to look like. According to your smartphone, his name is Robert Evans.\n\nProfessor Evans starts the lecture by talking about how augmented individuals have appeared throughout history, though there were considerably fewer of them in the past. \n\n\"There are several theories as to why the instances of augmented humans have increased in the past century. Some believe it is a result of human migration and globalisation, others suggest that rapid climate change has contributed to this. However, to this day no one knows for sure.\"\n*page_break\nHe then asks the class to name all of the augmented power types. One of the students raises her hand. It is a girl you don't recognize, which means she is likely a regular human.\n\n\"Yes, Miss Tyler?\"\n\n\"There are seven types of augmented humans. From most common to rarest, these types are: Enhanced, Corporal, Interpersonal, Environmental, Elemental, Dynamic and Mixed,\" she recites the types in an impassive, monotonous tone. You'd think she was the actual android instead of Nonpareille.\n\n\"Excellent, Miss Tyler!\" Professor Evans beams, \"For those of you who are not familiar with the seven power types, please look at the screens in front of you. You can read about each type in detail.\"\n\nYou look at the holographic screen in front of you. It lists the seven power types from the most widespread to rarest.\n*hide_reuse\n*label start\n*choice \n    #I read about the Enhanced power type.\n        Enhanced individuals are those whose powers are most similar to regular humans. They possess one or several traits in which they are superior to regular humans i.e. super strength, durability or enhanced vision.\n        \n        It is not uncommon for them to not realize they are augmented due to their powers often being mistaken for natural talent or training. Enhanced individuals are often the most celebrated and popular of the augmented community, due to their relatability to regular humans.\n        \n        Notable examples: Calamity, Fury Fist, Hop\n        *goto start\n   #I read about the Corporal power type.\n       Corporal abilities are a form of mutation, which alters the augmented person’s body in some fashion, like changing their body structure into a different type of matter or growing additional body parts.\n       \n       A common subdivision of this type of powers are animalistic powers. These powers grant one abilities similar to one or more types of animals. People with Corporal type of power are the most likely to be treated poorly by society, because of their often inhuman appearance.\n       \n       Notable examples: Alley Cat, Shard, Titan\n       *goto start\n   #I read about the Interpersonal power type.\n       Interpersonal powers allow augmented individuals to affect other people in various ways, usually having something to do with that person’s emotions or thoughts. Telepathy is a classic example of an Interpersonal power.\n       \n       These powers can range from incredibly powerful abilities like mind-control to something fairly indistinguishable, like being able to understand other languages without learning them. Similarly to Enhanced powers, some augmented people might not realise they have Interpersonal superpowers, though that happens less often.\n       \n       Notable examples: Catalyst, Beastress, Dogma\n       *goto start\n   #I read about the Environmental power type.\n       Environmental abilities are fairly powerful and allow their users to change and alter the environment around them, and even the reality itself, in some fashion.\n       \n       It is a broad category, encompassing such diverse abilities as blasting projectiles out of one's hands to altering the flow of time, to teleporting objects or people from one location to another.\n       \n       Notable examples: Transit, Revenant, Sunyata\n       *goto start\n   #I read about the Elemental power type.\n       Elemental abilities allow their users to control a particular type of matter like air or plastic. They can shape it and use it in various ways, but their abilities are restricted to only one, rarely more, element.\n       \n       Unlike the Environmental abilities, which can often affect any type of matter, but only in one or two specific ways, Elemental powers allow their users to control one type of matter in multitude of ways.\n       \n       Notable examples: Wildfire, Groundwork, Ap\n       *goto start \n   #I read about the Dynamic power type.\n       Dynamic powers are fairly rare. These are augmented individuals whose powers are able to change depending on the situation. These powers manifest when the user encounters certain environments or other augmented individuals.\n       \n       People with this type of powers are the only augmented who can change their powers if certain conditions are met.\n       \n       Notable examples: RNG, Plethora, Suncatcher\n       *goto start \n   #I read about the Mixed type — my power type.\n        Mixed powers are by far the rarest among the power types. Like the name suggests, these powers are a mix of other power types, usually two, but sometimes even three or more. \n        \n        Mixed powers are usually displayed by augmented people whose parents are both augmented themselves, though it is not always the case.\n        \n        Notable examples: Dove, Hawk, Vermilion Dragon\n        *page_break\n        *goto mixdo\n*label mixdo\nYou knew that your powers were rare, but not this rare. It is especially impressive considering that both of your parents are regular humans.\n\nYou have heard that Mixed augmented are extremely sought after. They often make for good team leaders or powerful allies. You wonder if this gives you a better chance at making it as a professional superhero.\n\nThat being said, which aspect of your powers is the most fascinating to you?\n*fake_choice\n    #My Enhanced sense of balance. Like a cat, I always know how to keep myself standing upright, even in the most precarious of circumstances.\n    #My Environmental abilities allow me to find balance of any object and even alter their properties in small ways, like making a cold environment warmer or making a rough surface smoother.\n    #My Interpersonal abilities give me a kind of \"sixth sense\" when it comes to other people. I can tell what a person is like just by being around them and I subconsciously adapt to their expectations of me.\nYour musings are interrupted when Professor Evans speaks again, \"To better illustrate the different power types, let's look at the powers of the two founders of this academy.\" \n\nYour holographic screen switches to the images of Dove and Hawk as Professor Evans continues, \"As you can see, Dove and Hawk are classified as Mixed augmented. They both display three types of powers each, two of those belong to the same type, whereas the third one is unique to each of them,\" Professor Evans looks at the students, who have finished looking at their screens and are now paying close attention to his words.\n\n\"The first of the two shared powers is Corporal power, which is to say, their wings, was inherited from their mother Owl. The second power is Interpersonal in nature and was inherited from their father Empath. Both of those powers are weaker than their parents' powers due to being virtually split between the two sisters. Lastly, both of them developed their own powers. Hawk gained Enhanced powers of super strength and toughness, whereas Dove's healing abilities fall into..\" he pauses and looks at you, \"Could you tell us what power type they belong to, Mx. Ramirez?\"\n*choice\n    #Interpersonal?\n        \"An interesting guess, but not quite an accurate one. Her healing powers are Environmental in nature. Though it may be tempting to describe them as Interpersonal, the difference is that Dove's healing originates from her, as opposed to another person's body, which allows her to heal even the most serious injuries. There are even confirmed cases of her resurrecting people who were recently deceased,\" he explains.\n        \n        \n        *goto answerthis\n    #Environmental?\n        *achieve powertype\n        \"Correct! Good job, Mx. Ramirez. Her healing powers are a prime example of an Environmental power. Though it may be tempting to describe them as Interpersonal, the difference is that Dove's healing originates from her, as opposed to another person's body, which allows her to heal even the most serious injuries. There are even confirmed cases of her resurrecting people who were recently deceased,\" he explains.\n        \n        \n        *goto answerthis\n    #Enhanced?\n        \"Not quite. I mentioned that they both developed unique powers, remember? Hawk's are Enhanced and Dove's are Environmental. Though it may be tempting to describe them as Interpersonal, the difference is that Dove's healing originates from her as opposed to another person's body, which allows her to heal even the most serious injuries. There are even confirmed cases of her resurrecting people who were recently deceased,\" he explains.\n        \n        \n        *goto answerthis\n    #Mixed?\n        Professor Evans looks a little confused for a second, \"Well. their powers overall are Mixed in nature, indeed, but Dove's healing powers, in particular, are Environmental. Though it may be tempting to describe them as Interpersonal, the difference is that Dove's healing originates from her as opposed to another person's body, which allows her to heal even the most serious injuries. There are even confirmed cases of her resurrecting people who were recently deceased,\" he explains.\n        \n        \n        *goto answerthis\n*label answerthis\nSeveral students gasp at that revelation as Professor Evans addresses the classroom, \"Does anybody have any questions about the power types?\"\n\nOne of the students raises his hand. You don't recognize him.\n\n\"Yes, Mister Price?\"\n\n\"Professor, is it true that Corporal augmented are the most likely to become supervillains?\" the student asks.\n\nProfessor Evans frowns at the question, but composes himself, \"As it is stated in the data on your screens, people with Corporal powers are more likely to be easily identified as augmented, due to their often unique appearances. This can lead to resentment and discrimination, which in turn can lead Corporal augmented to become alienated from society and fall into criminal activity,\" he answers with a sigh. \n\nYou inadvertently look at your Corporal neighbor. April looks noticeably less lively than before. She stares at her desk with a sullen expression.\n*choice \n    #You try to comfort her.\n        *set april +5\n        *set selfish -5\n        April turns to you with a warm smile, \"Thank you. I'm fine, really. Don't worry about it.\"\n        \n        After this interaction she seems to cheer up a bit, though you can tell that something is bothering her deeply.\n        \n        The remainder of the lecture is uneventful, but you do learn a few more things about the power types.\n        *page_break\n        *goto break\n    #You leave her be.\n        *set selfish +5\n        You give her some space, and after a few minutes she seems to be feeling better again. Although you can tell that something is bothering her still.\n        \n        The remainder of the lecture is uneventful, but you do learn a few more things about the power types.\n        *page_break\n        *goto break\n*label break\n*set enterrio 3\n[i]The information about the seven augmented power types has been added to your Stats Screen![/i]\n\nAfter the \"History of Augmented Humans\" class, you have some time for a short break before your next class which is \"Augmented Civics\".\n\nWhat would you like to do?\n*choice\n    #Go to the cafeteria.\n        You go to the dining area of the academy. It is a large circular building at the center of the island with an open ceiling, which upon closer inspection reveals itself to be covered with glass. The area is filled with various eateries, making it look like a food court in a mall. The food stalls are operated by machines and robots.
