ntly.\n        *goto balres\n    *if (selfish >= 90) #\"You're right, I don't want to risk my life for them anymore. I'll join you,\" you say.\n        *goto_scene discord\n*label balres\n\"Alright, than you'll die like the rest of them!\" Resonance spits and attempts to grab you, but you dodge and defend yourself.\n\nYou're not a bad martial artist, but you're just not prepared to fight someone whose powers are so similar, yet so different from your own. \n\nResonance manages to destabilize you enough to knock you down and jump on top of you, putting his hand on your chest. Before you can fight back, you can feel your heart beating with enormous intensity. It feels like it could explode at any moment.\n*page_break\n*if (oliver >= 60)\n    *if oliver \u003c= 90\n        *set oliver +10\n    Right when Resonance is about to finish the job, he is suddenly paralyzed with a confused look on his face. His body is then pulled back, like he is a puppet on the strings. You turn to see Oliver, righteous anger in his eyes. \n    \n    \"Leave them alone, you monster!\" he spits.\n    \n    \n    *goto cavalryhere\n*if (april >= 60)\n    *if april \u003c= 90\n        *set april +10\n    Right when Resonance is about to finish the job, he is suddenly struck by April, who body slams him at full speed, sending him flying backwards. \n    \n    She then runs to you with a worried look on her face, \"Are you okay? Sorry for leaving you alone, Rio! Show me where it hurts! I'll bring Oliver, I'm sure he can help you!\"\n    \n    \n    *goto cavalryhere\n*if (catie >= 60)\n    *if catie \u003c= 90\n        *set catie +10\n    Right when Resonance is about to finish the job, you hear a familiar voice, \"Sorry to steal the spotlight, Rio..\" and as Resonance looks up towards the sound he is promptly kicked in the face, sending him tumbling backwards. \n    \n    \"..but that's kind of my thing!\" Catie winks at you slyly and tries to help you get up, but you are too weak to stand.\n    \n    \n    *goto cavalryhere\n*if (felix >= 60)\n    *if felix \u003c= 90\n        *set felix +10\n    Right when Resonance is about to finish the job, he is suddenly struck with a giant keyboard that breaks into multiple pieces upon impact, keys scattering everywhere. \n    \n    \"Sheesh, what a creep,\" Felix looks at him disapprovingly, then turns to you, \"Hey, look! I managed to conjure up a weapon! Well, if you can call it that..\" he jokes sheepishly.\n    \n    \n    *goto cavalryhere\n*if (lex >= 60)\n    *if lex \u003c= 90\n        *set lex +10\n    Right when Resonance is about to finish the job, he is grabbed from behind and tossed away from you. It's Lex! She calmly walks up to you and looks you over. \n    \n    \"Are you injured?\" she asks. You want to shake your head, but cannot bring yourself to lie to her.\n    \n    \"I understand,\" she says succinctly.\n    \n    \n    *goto cavalryhere\n*if (north >= 60)\n    *if north \u003c= 90\n        *set north +10\n    Right when Resonance is about to finish the job, he is suddenly struck by a giant ice boulder, sending him flying backwards. You turn to see North with his arm raised, ready for another shot. \n    \n    \"Surrender. Now,\" he orders, his voice as cold as ice.\n    \n    \n    *goto cavalryhere\n*if (estelle >= 60)\n    *if estelle \u003c= 90\n        *set estelle +10\n    Right when Resonance is about to finish the job, he is suddenly struck by something that looked like a missile, but was actually Estelle flying into him at full speed. \n    \n    She lands nearby and turns to you with a smile, \"Sorry, Rio. I couldn't leave you hanging.\"\n    \n    \n    *goto cavalryhere\n*if (jun >= 60)\n    *if jun \u003c= 90\n        *set jun +10\n    Right when Resonance is about to finish the job, he is suddenly struck with a forceful punch and sent flying. It's Jun, and he has a look of pure anger on his face.\n    \n    \"Touch them again and I will end you, you hear me?!\" he fires.\n    \n    \n    *goto cavalryhere\n*else\n    Your eyes start to close on their own as you begin to lose consciousness, but right when Resonance is about to finish the job, he is suddenly struck by something and sent flying backwards.\n    \n    \n    *goto cavalryhere\n*label cavalryhere\nYou look around and see that all of your friends have arrived: Oliver, April, Catie, Felix, Lex, North, Estelle and Jun now all stand side-by-side and ready to fight, here to help you.\n\nResonance, seeing that he is at a disadvantage, puts his hand to unconscious Catalyst's chest, \"One move and I make his heart explode like a papier-mache!\" he screams.\n\nSuddenly, something that looks like a portal opens up and several more attackers appear, including the giant woman made of solid rock, who you remember seeing at the prison — Stonewall. \n\nYour friends prepare for a fight as Resonance starts laughing hysterically.\n*page_break Then they arrive...\nThe Patriots. Side by side, the team of American heroes is walking towards you. \n\nCalamity, who walks in the middle, flanked by her fellow heroes.\n*line_break\nWildfire, his body aflame, ready to fight. \n*line_break\nRNG, who is psyching herself up with some calisthenics.\n*line_break\nAlley Cat, spinning his trademark staff. \n*line_break\nLink, who assesses all of the destruction with a concerned look. \n*line_break\nNonpareille, her movements graceful and light as a feather.\n*line_break\nTim Murdock, talking to someone on his ear piece.\n*line_break\nTransit, who just teleported him here and looks at you sympathetically.\n\nStonewall runs at them as Calamity grabs one of the toppled light poles lying nearby and strikes her like a baseball batter, sending her into the Potomac river. The other attackers are quickly dealt with by the other heroes, though some of them manage to escape through the portal. \n\nResonance attempts to use Catalyst as leverage, but the latter comes to his senses in time to stop him with a powerful hook. Catalyst gets up on his feet, rubbing his eyes, \"Sorry, pal, but you really earned that one,\" he says, apologetically. His fellow Patriots welcome him with open arms.\n\nYou try to keep following their battle with the remaining Ubermensch members, but you feel too dizzy and your eyes close on their own.\n*page_break\nYou have a vision of an angel, who turns out to be Dove descending towards you. She puts her arm on your chest and you start feeling better, your condition improving rapidly.\n\n\"Thank you,\" you say, coming back to your senses.\n\nDove gives you a simple nod, looking concerned. \n\nYou see Hawk flying above. She is fighting the moth augmented, or rather, she fought him, since now he is falling towards the ground after a single punch from her. Hawk then flies towards you and lands on one knee with her fist smashing into the ground.\n*page_break\nAfter the battle is over and most of the attackers, including Resonance, are apprehended, you see Calamity walk up to Dove and give her a loving kiss. \n\nHawk whistles at them, \"Get a room, you two!\"\n\nJun walks up to them and interrupts their intimate moment by challenging Calamity to a duel, which she declines, \"A fun proposition, but I reckon you should get your heroic license first, sugar,\" she says, attempting to be nice. \n\nJun rolls his eyes and leaves, grumbling something under his breath as Hawk laughs at his antics.\n*page_break\nAt the break of dawn, you can assess the full extent of the destruction: Arlington is pretty much unrecognizable, as dozens of buildings were toppled in the earthquake. Even some bridges crumbled due to the intense seismic activity. \n\nYou get a sense of relief knowing that, miraculously, nobody died, though many ended up needing medical help, but thanks to Dove and the city's medical workers' efforts, their recovery will likely be a matter of time.\n\nOf course, the event made huge news and was all that people were talking about the next day. The other augmented supremacist attacks around the country were stopped as well, though with less rosy outcomes.\n*finish", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "discord": "*if selfish \u003c= 90\n    *set selfish + 10\n\"A wise choice,\" Resonance nods. \n\nTogether, you focus your powers and the earthquake becomes even stronger than before, destroying all of the buildings around you.\n\nYou notice the other students running towards you when Resonance grabs you and says, \"Let's go, we've done what we came for.\"\n\nAs he says it, a portal appears out of nowhere and a guy with crazy hair and a crazier look in his eyes walks out of it and gives you an approving nod. Resonance leads you into the portal and you leave. Your life at the academy is over.\n*page_break\nThe portal leads you to a safehouse somewhere outside the city. There, you meet some of the other members of the group, including Din, the girl with the powerful vocal cords and Stonewall, a giant woman made of solid rock.\n\n\"Come here, ${moniker}, she wants to see you,\" Stonewall says.\n\nWithout being told who \"she\" is, you are led into a spacious luxurious room with fancy couches and carpets. \n\nThe doors close behind you and you stand there in an empty room for a few seconds, before it is suddenly filled with bright, white light. You shield your eyes and can barely see a figure appear out of nowhere. \n*page_break \nShe is a tall woman with an athletic build and long, flowing red hair. Her body floats a few inches above the ground and is covered in clothes that look like they are made of solid light. She looks like some kind of Roman deity or something like that and you can feel an extremely powerful aura emanating from her.\n\n\"Good evening, Rio. I heard some interesting things about you. It is a pleasure to have you on my side,\" her voice is calm and powerful and it sounds like it is coming from around the entire room.\n\n\"Who are you?\" you ask.\n\n\"You may call me 'Goddess'. I am the creator of 'Übermensch' and your master.\"\n*hide_reuse\n*label godessstart\n*choice \n    #\"Why should I listen to you?\" \n        \"Because I am the most powerful being this universe has ever seen,\" she says, without a hint of doubt in her voice.\n        *goto godessstart\n    #\"Why not just get rid of Calamity and the others?\"\n        \"I don't want them to die. I want them to take their rightful place as my loyal servants. They have been brainwashed by humans and think that they owe them something. I simply want to liberate them.\"\n        *goto godessstart\n    #\"What about humans, can't you just kill them all?\"\n        \"Humans are scum, but they are useful. I want them to know their place and serve their superiors.\"\n        *goto godessstart\n    #\"And what about you?\"\n        \"Me? I will take my rightful place as the leader of this new society.\"\n        *goto godessstart\n    #\"Why would someone with presumably limitless power need me?\"\n        \"Most people do not have free will; they are prisoners of circumstances, but you.. You have the power to choose your own destiny. More than anyone I have ever seen, possibly even more than me,\" she laughs, \"Your abilities can change the course of events, like how you decided to join me. One day you might even be able to determine the fate of the world. Well, unless you decide to stand against me in which case you will be squashed like a bug, of course.\"\n        *page_break\n        *achieve discord\n        *goto discordis\n*label discordis\n\"I have some big plans for the near future, hope you like fireworks,\" she smiles with the most condescending smile you have ever seen.\n\nThe world will never be the same.\n\n[b]Ending 0: Discord[b]\n*page_break\n*goto_scene finalscreen", "epilogues": "[b]Chapter 9: Epilogues[b]\n\nAfter the disturbing events of yesterday, Dove announces that Sage Academy will be closed until February due to the necessary repairs and security concerns, effectively prolonging your winter holidays by a few weeks.\n\nYou consider your options:\n*choice\n    *selectable_if (Oliver >= 70) #I join Oliver in his undertaking to confront his mother.\n        *goto_scene firstblood\n    *selectable_if (April >= 70) #I join April on her important mission from Dove herself.\n        *goto_scene aprilmay\n    *selectable_if (Catie >= 70) #I join Catie on her quest for fortune and glory.\n        *goto_scene foxinthehenhouse\n    *selectable_if (Felix >= 70) #Felix joins me on my visit back home.\n        *goto_scene chance\n    *selectable_if (Lex >= 70) #I join Lex in her pursuit to find out the truth about \"Ubermensch\".\n        *goto_scene lexrex\n    *selectable_if (North >= 70) #I join North to solve some international dispute in the Arctic.\n        *goto_scene northward\n    *selectable_if (Estelle >= 70) #I join Estelle in her otherworldly antics.\n        *goto_scene overthemoon\n    *selectable_if (Jun >= 70) #I join Jun to achieve his goal of becoming even stronger.\n        *goto_scene counterbalance\n    #I decide to remain at the academy for the holidays.\n        *goto_scene trueambivalence", "fieldtrip": "[b]Chapter 5: Field Trip[b]\n\n\"Surprise!\" you are startled by April's sudden exclamation as she presents you a small gift box with a little bow on it.\n\n\"What?\" you ask, confused. You notice the other students in the Augmented History classroom looking in your direction curiously.\n\n\"You don't know?! It's your birthday, silly!\" she giggles, \"Wait, did I mess up? Today is your birthday, right? September 23rd?\" she looks at you, concerned.\n*choice \n    #\"You're right, I completely forgot! Thanks!\" you smile and accept the present.\n        *set extroverted +2\n        *set feeling +2\n        *goto bbday\n    #\"Of course I know! But thanks for the present!\" you respond and accept the present.\n        *set extroverted +2\n        *set feeling -2\n        *goto bbday \n    #\"I knew that, I just didn't expect anyone else to know,\" you explain and accept the present.\n        *set extroverted -2\n        *set feeling -2\n        *set april +5\n        *goto bbday \n    #\"Thank you, April. You really didn't have to,\" you say and reluctantly accept the present.\n        *set extroverted -2\n        *set feeling +2\n        *goto bbday\n*label bbday\nWow, these past two weeks zipped by so quickly! You have heard about time flying when you are enjoying yourself, but apparently it flies when you are hard at work as well. You turned twenty and didn't even notice!\n\n\"Oh, thank goodness! I was worried I ruined the surprise,\" April adds with a sigh of relief.\n\n\"How did you know it was my birthday, anyway?\" you ask, now wondering if April is stalking you or something.\n\n\"It's written on your profile in the academy's data. Have you not seen it yet?\" April explains.\n\nYou have seen it, but you didn't pay attention to the birth dates of students being included. \n\n\"So, are you going to open it? I mean, you don't have to, of course…\" she mumbles. \n\nYou look at the gift box you still hold in your hands and start unwrapping it.\n*if offense >= 80\n    *if offense \u003c= 95\n        *set offense +5\n    You get a pair of good training gloves, perfect for your offense training!\n    *page_break\n    *goto fieldtripbegins\n*if offense \u003c= 20\n    *if offense >= 5\n        *set offense -5\n    You get some neat protective gear, perfect for blocking damage!\n    *page_break\n    *goto fieldtripbegins\n*if flashy >= 70\n    *if flashy \u003c= 95\n        *set flashy +5\n    You get a brightly-colored cape, perfect for being noticed!\n    *page_break\n    *goto fieldtripbegins\n*if flashy \u003c= 30\n    *if flashy >= 5\n        *set flashy -5 \n    You get a simple dark trenchcoat, perfect for subterfuge!\n    *page_break\n    *goto fieldtripbegins\n*if tank >= 70 \n    *set tank +5\n    You get a sturdy helmet, perfect for withstanding powerful attacks!\n    *page_break\n    *goto fieldtripbegins\n*if tank \u003c= 30 \n    *set tank -5\n    You get a small first aid kit with all of the essential tools in it, perfect for helping someone out during a battle!\n    *page_break\n    *goto fieldtripbegins\n*page_break\n*label fieldtripbegins\nThe next morning, you and the other students assemble at the gym. You notice a woman dressed in superheroic fashion standing beside Hawk. You recognize her as Transit — a member of The Patriots with the ability to teleport herself anywhere in the world.\n\n\"I'm sure you know who she is, so let's cut to the chase,\" Hawk begins, \"You're gonna need to get some real-life experience of working in the field,\" she turns to Transit, inviting her to continue. \n\nTransit steps forward. Her outfit resembles that of an avid hiker, with pouches and various bags adorning her uniform. She looks at the students and smiles, \"Hey, everyone! How are you doing today? Are you excited for the adventures that await you?\" \n\nThe students respond with cheers and greetings, some more reluctantly than others, while Transit continues, \"Me and four other members of The Patriots will be your instructors for today!\" \n\nYou hear excited whispers around you. \"You will be split into five teams each with one of us as your team leader,\" Transit adds.\n\n\"The teams are based on the power level I assigned to each of you,\" Hawk steps forward, \"The strongest kid will be paired with the weakest kid to avoid imbalance, as fun as that would be,\" she smirks, \"You can read about the team leaders on your phones if you don't know them yet.\"\n\nYou look at your smartphone with the descriptions of the five team leaders popping up.\n*fake_choice\n    #Wildfire. The world-famous augmented movie star and the literal firepower of The Patriots.\n    #Transit. The irreplaceable member of The Patriots, whose teleportation abilities allow the team to quickly get to any place they are needed.\n    #Alley Cat. The most prominent superhero of New York City, whose extreme agility and speed are second to none.\n    #Link. The environmentally-conscious pacifist from the Pacific Northwest, whose healing abilities keep The Patriots alive and able to fight.\n    #RNG. The newest recruit of the team who is truly a wild card. \n\"Who wrote this? Sounds like a cheesy advertisement,\" Jun grumbles.\n\n\"First up, Ying and Tyler!\" Hawk shouts. Unsurprisingly, Jun is at the top of the class. Lex is the lowest, which is understandable considering she doesn't have any superpowers.\n\nThe process of splitting the 38 other students into five teams takes some time. Your turn doesn't come up and before you know it, you are the only one left unassigned. \n\n\"Well, seems like you're the last one, kid,\" Hawk says, looking at you. You await her directions, but she just looks at the tablet in her hand. \"Hm, looks like we've got an even amount in each team. Alright, just pick whichever team you like.\"\n\nWell, guess there are some perks to being mediocre! You have the option to pick the team you like, unlike the other students.\n*choice\n    #I pick the RNG team with Jun and Lex in it.\n        *goto BrainvsBrawn\n    #I pick the Wildfire team with North in it.\n        *goto NorthandSouth\n    #I pick the Link team with Oliver in it.\n        *goto Link\n    #I pick the Alley Cat team with April in it.\n        *goto thefirstbaddie\n    #I pick the Transit team with Catie in it.\n        *goto catiespast\n*label BrainvsBrawn\nYou join Jun, Lex and the others as you watch Transit teleport the other groups to their respective destinations. \n\nHer power is incredible! She creates something like a force field around herself and the closely-packed students around her, and they vanish into thin air.\n\nFinally, your team's turn comes up and Transit appears in front of you, startling you and the others. Whatever you expected teleportation to feel like, it wasn't that, because you didn't feel anything at all. Before you could even blink, you are already in a different place.\n*page_break\nYou are in a spacious brightly-lit office room. You soon notice a young woman sitting on a couch in front of a huge TV screen, playing what looks like some kind of old video game. \n\nShe doesn't seem to notice you at first, before one of the other students asks, \"Um, Miss RNG?\"\n\nShe faces you with a surprised expression, \"Oh, hi there! You're the students from that.. whatchamacallit academy, right?\"\n\nYou and the other students nod.\n\n\"Yeah, sorry, I must have lost the track of time. Well, this is my office, feel right at home!\" she says nonchalantly and continues to play her game.\n\n\"Shouldn't we be doing some crime-fighting?\" Jun asks. \n\n\"Weeel, it's pretty quiet out here. The most action you see is some old guys fighting over golf scores and the like. If something serious happens, I usually get an emergency alarm, but let's hope that doesn't happen, ok?\"\n\nWelp, seems like you don't have much of a choice. What would you like to do?\n*choice\n    #Look out the window.\n        You see a pristine white beach and azure ocean. In the distance, you notice giant concrete barriers in the water. \n        \n        \"Ugh, why did it have to be Miami? The sun is way too bright,\" you hear a deadpan voice of a guy dressed in gothic fashion next to you.\n        \n        You hang around some more before you hear it…\n        \n        *page_break The alarm.\n        *goto dutycalls\n    #Watch RNG play her video game.\n        You watch her play some very old game about a blue spiky creature running around and collecting yellow donuts. You don't understand it, but RNG seems to be really into it.\n        \n        \"Wow, how did you get a score this high?! Are you a speed runner or something?\" excitedly asks the girl next to you. You remember that she has a funny heroic name, but can't recall what it is.\n        \n        \"Well, I played this a lot when I was a kid,\" RNG admits with a hint of pride in her voice.\n         \n        You hang around some more before you hear it…\n        \n        *page_break The alarm.\n        *goto dutycalls\n    #Chat with the other students.\n        Jun is too grumpy while Lex is too quiet, so you end up listening to a conversation between two other students.\n        \n        \"Yeah, your name is a bit weird, maybe you should change it,\" the girl says.\n        \n        \"Look, I like it and I don't wanna go for something basic,\" the guy objects.\n        \n        \"Well, you do you, I just think it's not gonna stick.\"\n        \n        \"Said the girl who named herself 'Marauder'! What does that have to do with your powers?\"\n        \n        \"Hey, at least it's memorable! And it sounds cool!\"\n        \n        They go like that for a while, before you hear it…\n        \n        *page_break The alarm.\n        *goto dutycalls\n*label dutycalls\nThe alarm sounds like a weird mix of a siren and a racing car. You could swear you've heard it in an old movie or something like that.\n\n\"Yup, just my luck,\" says RNG, defeatedly turning off her game, \"Alright guys, looks like we have a classic bank robbery situation. Let's head out!\"\n\nSome students cheer, while others are worried. Lex is expressionless, as usual. You follow RNG's lead and promptly leave the building.\n*page_break\nAfter about a 15-minute run under the scorching sun (RNG said it's good for heroes to stay fit) you get to what looks like an average office building, if not for the \"Bank of Miami\" written on it in big bold letters.\n\n\"Sooo, it says one of you guys has x-ray vision, is that true?\" RNG asks, looking at her smartphone.\n\nSome guy, whose name you don't remember, raises his hand, \"Yup, the name's Diaphane!\"\n\n\"Sure, tell me what you can see inside. How many robbers are there? Any hostages?\"\n\n\"Diaphane\" is eager to help. He takes off his sunglasses and glares at the building intensely for a few seconds. You notice that his eyes have a beautiful glow to them.\n\nHe turns back to RNG, \"I see about fifteen people armed with assault rifles and wearing masks. As for hostages, I think there is about twenty or so.\" \n\n\"Okay, this is it, guys. Stand back, I might need some space. I usually do,\" RNG warms herself up, psyching herself for the upcoming use of her power. You and the other students move a few meters away from her and wait in quiet tension. \n\nAt first, nothing happens, but then…\n*page_break Poof!\nIn a split second, RNG's entire body turns into a human-shaped mass of confetti which immediately scatters all over the ground in a spectacular fashion. \n\nShe's gone. The floor is now covered in what used to be her. Everyone is silent for a moment.\n\n\"Ew, I got a piece of her on my shoe!\" shouts the girl whose moniker is Meme, you remember.\n\n\"Is she dead?\" another student asks.\n\n\"Her powers are unpredictable in nature. It will likely take her time to learn to control them,\" Lex states impassively.\n\n\"So what are we supposed to do then?\" the x-ray guy asks.\n\n\"Don't you get it? We need to take the matter into our own hands,\" Jun points out, \"I suggest we attack the robbers directly. They won't expect us. We'll knock them out before it's too late.\" \n\nLex shakes her head, \"No. It will put the hostages in too much danger. A stealthy approach would be better.\" \n\n\"Nonsense, the hostages will be dead already. We need a direct approach,\" Jun objects, \"Who made you the leader, anyway?\"\n\n\"No one, the same could be said about you. Others should vote,\" Lex looks at you and the other students, expectantly.\n*page_break\nAfter a few moments of raising hands and contemplation, three students side with Jun while three others side with Lex, tying the vote. \n\nJun and Lex turn to you. Your decision will be the deciding one. \n*choice \n    #I agree with Jun.\n        *set Jun +10\n        *if offense \u003c= 90\n            *set offense +10\n        You can almost feel Lex rolling her eyes, even though her expression is unchanged. Jun gives you an approving look, then starts rallying the students behind him. \n        \n        Meanwhile, Lex walks up to the piles of confetti that were RNG and starts scooping them up into a single pile.\n        \n        After sizing up each of the students, Jun picks Meme to lead a crowd assault on the robbers. Her powers will provide a cover for the others to attack, since her clones just poof out of existence when severely damaged, leaving the original unharmed.\n        *goto memetastic\n    #I agree with Lex.\n        *set Lex +10\n        *if flashy >= 10\n            *set flashy -10\n        Lex gives you a subtle nod, whereas Jun shakes his head in disappointment.\n        \n        \"I'll do it alone, then,\" he says and turns around to leave, but is stopped by Lex's hand.\n        \n        \"You will alert them, stay with RNG if you don't want to be stealthy,\" she objects.\n        \n        \"You think you can stop me? I'll do it the best way — my way,\" Jun snarls back.\n        \n        \"I will have to stop you then,\" Lex responds coldly.\n        \n        Jun pushes her hand away while Lex grabs his arm and swiftly throws him over her body and onto the ground. The impact must have been really hard, as Jun falls unconscious. \n        \n        Lex looks at the shocked students and calmly says, \"He'll wake up in a few minutes, nothing serious.\"\n        \n        \"Number one power level, huh?\" the x-ray guy comments, looking at the unconscious Counter.\n        *page_break\n        *goto darkestdark\n*label darkestdark\nLex looks at the other students and walks up to the guy dressed in all black, \"You're Noir, right? Your power is umbrakinesis, correct?\"\n\n\"I prefer to call it 'shadow-weaving', but yeah, that's me,\" Noir says impassively, though you can hear a hint of pride in his voice.\n\n\"I'll need you to use your powers to distract the intruders and give us a cover.\"\n\n\"They won't see what hit them, literally,\" he smirks.\n*page_break\nAfter some strategic planning, you follow Lex and sneak closer to the bank's entrance. Following Lex's command, Noir unleashes his power, filling the entire main hall of the bank with pitch-black darkness, confusing the attackers. Lex swiftly, but silently enters the darkness.\n\n\"Hey, who turned the lights off?!\" shouts one of the robbers. \n\nBefore anyone can respond, you hear a body hit the floor. \n\n\"What was that?\" another robber screams, bewildered.\n\nAnother body falls. \n*choice \n    #I focus on taking out the bad guys as well.\n        *if bellicist \u003c= 95\n            *set bellicist +5\n        You are not as stealthy as Lex, and the darkness makes it harder, but you manage to locate and take down a few robbers, sometimes by sheer luck.\n        \n        One by one, all of the attackers are taken down, Noir turns off his powers and you start leading the hostages away.\n        \n        Jun wakes up too and, either does not remember what happened, or pretends not to.\n        *page_break\n        *goto baddiesretaliate\n    #I focus on saving the hostages. \n        *if bellicist >= 5\n            *set bellicist -5\n        Under the cover of darkness, you manage to get to the hostages relatively easily, aside from that one moment when you brushed against one of the attacker's legs. Thankfully, he was taken down by Lex almost immediately.\n        \n        The hostages were scared, but followed you without much hesitation, though leading a group of people in the dark isn't exactly easy.\n        \n        One by one, all of the hostages are saved and the attackers are taken down. Noir turns off his powers and you feel a sense of relief.\n        \n        Jun wakes up too and, either does not remember what happened, or pretends not to.\n        *page_break\n        *goto baddiesretaliate\n*label memetastic\nIndeed, Meme does a great job! Her clones run into the bank in a strange fashion and overwhelm the robbers completely. They try to shoot her clones, but all that their bullets manage to do is poof them out of existence. This gives you and the others the perfect opening to strike!\n*choice\n    #I focus on taking out the bad guys!\n        *set bellicist +5\n        You run to the nearest baddie and use your sense of balance to deliver a powerful body slam, which sends the robber flying into the wall. \n        \n        Then, you take out another one with a skillful kick that knocks the guy off his balance, forcing him to plop on the floor and be tackled by one of the other students.\n        *page_break\n        *goto baddiesretaliate\n    #I focus on saving the hostages.\n        *set bellicist -5\n        While others are taking out the robbers, you manage to sneak by a few armed criminals and start leading the hostages to safety. Some of them are too shocked to move, while others are in such panic that you have to stop them from running into the midst of the battle.\n        \n        Eventually, you manage to lead them all to safety with the help of Lex and some other students. \n        *page_break\n        *goto baddiesretaliate\n*label baddiesretaliate\nAfter a while, the hostages are saved and the bad guys are captured. Your celebration is cut short, however, as another wave of armed criminals storms the building. \n\nYou and the other students are cornered, and though your chances look bleak, you prepare to fight.\n\nSuddenly, the giant flood of confetti erupts into the room, swooping the new attackers who are too stunned to react and washes them away from you. After the attackers are incapacitated, the wave of confetti starts taking a humanoid form and turns into RNG. \n*page_break\n\"Hoo boy, took me a while to figure this confetti thing out!\" she says and wipes her forehead. \n\n\"How are you, guys? Is anybody hurt?\" RNG looks at all of you than looks at the captured bank robbers, \"Well, you did a pretty good job, though you shouldn't have attempted to do this all by yourselves. But, I guess I never said you're not allowed to help, so not bad, guys,\" she smiles.\n*page_break\nThe police of Miami arrives shortly and starts escorting the handcuffed bank robbers out of the building.\n\nFeeling like a true hero, you feel a bit disappointed when Transit arrives to pick you up earlier than planned. However, the concerned look on her face tells you that there is a good reason. Something is wrong.\n*page_break\n*achieve bvb\n*goto endoftrip\n*label NorthandSouth\n*temp northhero false\nYou join North and the others as you watch Transit teleport other groups to their respective destinations. \n\nHer power is incredible! She creates something like a force field around herself and the closely-packed students around her, and they vanish into thin air.\n\nFinally, your team's turn comes up and Transit appears in front of you, startling you and the others. Whatever you expected teleportation to feel like, it wasn't that, because you didn't feel anything at all. Before you could even blink, you are already in a different place.\n*page_break\nYou feel a warm ocean breeze on your face and, looking around, you see a tropical paradise: palm trees, sandy beaches and picturesque mountains. \n\nYou hear excited oohs and aahs from the other students, all of whom look really happy. All, except for one. North looks somewhat concerned.\n\n\"Welcome to Hawa'ii!\" you hear a jolly voice behind you.\n*page_break\nYou never even imagined that you will get to meet Antonio Garcia, whose movies you grew up with, in person. He looks just like he does in the movies; handsome and suave with a contagious smile on his face.\n\nHe walks up to you, followed by a small crowd of reporters and cameramen. Wildfire turns to face the reporters and speaks, \"These wonderful young heroes are the future we, The Patriots, fight for every day. When the time comes for us to retire, these bright students will take our place.\" \n\nSeveral people clap as a number of reporters starts bombarding him with questions, Wildfire doesn't flinch and starts effortlessly responding to five reporters at the same time.\n\nSome of the cameramen start filming you and the other students. How do you feel about being followed by cameras everywhere?\n*choice \n    #If you have it, flaunt it! I enjoy the chance to demonstrate my skills.\n        *if flashy \u003c= 95\n            *set flashy +5\n        You subtly shuffle closer to the cameras and even wink at one of them.\n        \n        \n        *goto wildfiretrain\n    #I hate it. I hide from the cameras as much as possible.\n        *if flashy >= 5\n            *set flashy -5\n        You stay far away from the reporters and avoid the cameras at any opportunity.\n        \n        \n        *goto wildfiretrain\n*label wildfiretrain\nWildfire leads you and the others to an open field, where you start practicing your abilities with his help. Though he likes to show off for the cameras, he does actually have an impressive control over his abilities and is able to easily fend off the attacks of several students at once. \n\nAfter a few minutes, North leaves his seat and walks up to Wildfire, \"Excuse me, sir. I understand that we need to practice our abilities, but shouldn't we make sure that there aren't any people who may need our help?\" he asks.\n\nWildfire smiles and taps him on the shoulder, causing a puff of steam to appear. \"Excited to get a chance to shine? I understand, but thankfully Hawaii is the safest place in the country. No need to worry,\" he says and winks at the cameras.\n\n\"I see, wouldn't it be better for us to travel somewhere where we may be needed?\" North politely objects.\n\nWildfire sighs, \"I'm sure there are enough heroes around to take care of any issue that may arise. Right now you should just take this opportunity to show off your skills and learn a thing or two from me, don't you think?\"\n\nNorth frowns, but nods in agreement before returning to his spot as Wildfire faces the rest of the students again.\n*page_break\n\"Okay, with that out of the way, who wants to perform something more… impressive for our audience?\" he asks.\n\nOne of the students raises her hand. It's Windbreaker. She was the girl who manipulated air with break dancing moves. Wildfire beckons her to speak.\n\n\"Soo, I've always wanted to try this thing, you know, mixing fire with my wind powers. That would be, like, an actual fire tornado! Firenado? That would be totally dope,\" she says.\n\n\"I like the way you think,\" Wildfire praises her, \"And I would imagine our audience would love to see something so spectacular, isn't that right?\" he looks at the reporters who give him enthusiastic nods. \n\nNorth raises his hand again. Wildfire sighs, \"What is it, mister White?\" he asks, barely masking his annoyance.\n\n\"Sir, I believe it could be too dangerous to perform something like this.\"\n\n\"Don't worry. It's gonna be fine, you're with me, remember?\" Wildfire responds dismissively.\n\nNorth quiets down and lets out an exhausted sigh. You notice that he is sweating profusely.\n*choice \n    #I ask him if he is okay. \n        *if selfish >= 5\n            *set selfish -5 \n        *set North +5\n        \"I'm.. fine. I just don't do well in the heat, as you might imagine,\" he says and gives you a pained smile.\n        \n        \n        *goto firenado\n    #I leave him be.\n        *if selfish \u003c= 95\n            *set selfish +5\n        *goto firenado\n*label firenado\nWildfire and Windbreaker walk to the middle of an open field and start performing their techniques. Windbreaker uses elaborate break-dancing moves to create a powerful gust of wind that turns into a small tornado, whereas Wildfire focuses his fiery powers and pours an immense amount of flames into it, turning the tornado bright orange, and eventually, into a blazing twisting column of fire.\n\nThe students applause and cheer at this impressive display, the reporters are excitedly recording everything. However, when Windbreaker and Wildfire attempt to tame the beast, it doesn't work.\n\n\"Drat, the wind and fire are mixed to the point where I can't control the flames,\" Wildfire mutters. \n*page_break Oh boy...\nThe fire tornado starts moving towards the reporters, some of whom run away in panic, while others keep excitedly filming and reporting the incident. \n\nThe students are panicking too, some run as far away from the fire as possible, whereas others stay and try to stop it. North, being one of them, runs towards the fire and tries to use his powers, but is evidently too weak due to the heat. The freezing rays he emits only slightly affect the tornado.\n\nWhat do you do?\n*choice \n    #I tell Wildfire and Windbreaker to combine their powers even more.\n        *if flashy \u003c= 95\n            *set flashy +5\n        They look at you with confusion, but decide to listen.\n        \n        As counter-intuitive as that may be, combining their powers together even more leads to such intense heat that the entire whirlwind of fire turns into a smooth pillar of glass! \n        \n        \"Wow, not bad, kid,\" Wildfire smiles at you, \ nderstanding smile.\n\nYou follow your classmates and introduce yourself. The kids start bombarding all of you with questions. Two of them walk up to you and ask, \"Who is the strongest hero? Hawk or Calamity?\"\n*choice\n    #Calamity.\n        The first kid frowns, whereas the other nods excitedly.\n        \n        \n        *goto catiespastsis\n    #Hawk.\n        The first kid nods approvingly, whereas the other looks doubtful.\n        \n        \n        *goto catiespastsis\n    #Me!\n        *if competitive \u003c= 95\n            *set competitive +5\n        The first kid frowns, whereas the other looks shocked. He actually believed you!\n        \n        \n        *goto catiespastsis\n*label catiespastsis\nYour other coursemates seem to be getting along with the kids quite well. The tall, slender girl, whose moniker is Willow, you think, is letting kids hang on to her extremely long arms like they are branches of a tree. \n\nAnother one of your classmates, Flourish, a posh guy whose body is made of plants, was not thrilled by the idea of interacting with the kids, but found a way to distract them by making a colorful bouquet of flowers for them to play with.\n\nEven Catie is having a good time. She catches your surprised look and responds, \"I grew up in an orphanage too. It wasn't pretty, but it was home and I miss it sometimes.\"\n*choice \n    #You ask about her past.\n        *set catie +10\n        Catie gives you a suspicious look, but then sighs and looks in the distance, \"My childhood was really messed up. I'm not gonna go into details, but let's just say I know what it's like to not have a roof over your head.\"  \n        \n        She pats one of the kids on the head, \"Anyway, it's all in the past now. I have a lot of things I want to do, so there's no point in feeling bad for myself,\" she pauses, \"Hey, can you take a picture of me with the kids? It'll make for a great post!\" she smiles and gives you her phone.\n        \n        You're a bit surprised, but fulfill her request without much thought. You're not sure whether it's the result of her powers or that you just like her. Probably both.\n        \n        \"Nice, I reached five million followers!\" Catie beams and starts vigorously typing something. You decide not to interrupt her.\n        *page_break\n        *goto morehays\n    #You decide not to bring up her past.\n        Catie continues to play with the kids and you leave her be. You join Transit, who is surrounded by a crowd of kids, answering their questions.\n        \n        \"Can you take us to see Japan?\" one of the kids asks.\n        \n        \"I would love to, but I can't teleport willy-nilly, There are very strict rules about it. I must tell where and when I'm going to go to and some places I'm not allowed to go to at all,\" Transit explains.\n        \n        \"But why?\" another kid asks, tears forming in his eyes.\n        \n        \"Oh, don't be upset! It's just for everyone's safety. Since I can teleport anywhere in the world, important people realized that that could be used to do evil things.\"\n        \n        \"What evil things?\" the kid from earlier implores. \n        \n        \"Well, what if I decide to teleport into a bank's vault and steal all the money? Or teleport into the White House and attack the President?\" Transit says. \n        \n        The kids let out understanding aahs and nod their heads in agreement.\n        *page_break\n        *goto morehays\n*label morehays\nAfter playing with and answering some more questions from the kids, you notice Transit's concerned expression as she looks at her smartphone. \n\nShe turns to you and the other students, \"There seems to be an emergency with the other group. I'll be back soon.\"\n\nWith that, she disappears into thin air. You and the other students share concerned looks. \n\nTransit reappears after a while and tells you that you have to leave earlier than planned. Judging by the serious look on her face, something bad had happened.\n*page_break\n*achieve kansas\n*goto endoftrip\n*label endoftrip\n*if metmane = false\n    Upon arrival, you see April's group being bombarded with questions from the other students. She and the others in her group describe a supervillian with prehensile hair who attacked them in the middle of New York City. \n    \n    Guess that's what you get when trying to become a superhero — dealing with all kinds of crazy super-powered creeps.\n*if metmane = true\n    Upon arrival, you and the others are immediately bombarded with questions from other students like, \"Are you okay?\", \"Did anyone die?\", \"Did you really take down a supervillian?!\", \"Did Alley Cat do anything cat-like?\" and other important inquiries.\n    \n    You feel pretty stressed out after all that happened, so you find an opening in the conversation and leave.\n*page_break\n*set enterrio 6\n[i]The information about each of the members of the Patriots has been added to your Stats Screen![/i]\n\nYou reflect on what an eventful day this was as you get back to your dorm room and wonder if there will be more field trips like this in the future. Either way, all you want to do right now is to get some well-earned rest.\n*finish One month later...", "finalscreen": "*check_achievements\n*if (((((((((choice_achieved_oliver and choice_achieved_april) and choice_achieved_catie) and choice_achieved_felix) and choice_achieved_lex) and choice_achieved_north) and choice_achieved_estelle) and choice_achieved_jun) and choice_achieved_neutral) and choice_achieved_discord)\n    *achieve allendings\n\n[b]The End![b]\n\nOf part one that is. Tune in next time to the exciting sequel — \"Balance of Superpower: Tricentennial\"! Coming soon to a screen near you!\n\nIn the mean time, you can vote in the poll to decide which one of the side characters in this game will become a best friend/love interest in the next game. Enjoy!\n\n*link https://linkto.run/p/09R1OX7O Vote Here!\n\nI would also like to say thanks to everyone who inspired and supported me, especially to Almira / miralumos for the awesome cover art for the game!\n\nAnd of course, big thanks to you, the reader, for playing it! ^_^\n\n*page_break End\nWe hope you've enjoyed playing [i]Balance of Superpower.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "firstblood": "*temp oliverlove false\nThe next day, someone knocks on the door of your dorm room. You open it and find Oliver, with a grave look on his face. \n\nYou invite him in and he starts nervously pacing around the room, then turns to you, \"My mother contacted me,\" is all he says.\n*hide_reuse\n*label redxmasconvo\n*choice\n    #\"What did she say?\"\n        \"She said she will be waiting for me in Prague on Christmas Day. We need to go now if we want to make it,\" Oliver explains.\n        *goto redxmasconvo\n    #\"Did you tell anybody else?\"\n        \"I told Dove. She contacted the European League. They will clear the city and set up an ambush,\" he says.\n        *goto redxmasconvo \n    #\"What about you?\" \n        \"I will go there. I have to. She will not show up otherwise. She is definitely planning something horrible, so we must stop her before she hurts any more people,\" he says with determination in his voice.\n        *goto redxmasconvo\n    #\"Can I join you?\"\n        Oliver looks at you for a few seconds, \"It is extremely dangerous, but I have to say that I will feel better if I'm not alone.\"\n        \n        \"Then I will accompany you,\" you say.\n        \n        \"Thank you, Rio. You are the best,\" Oliver hugs you. \n        *page_break\n        *goto canijoinyou    \n*label canijoinyou\nYou and Oliver spend the time preparing for the mission and discussing your strategy until the Christmas Day arrives.\n\nThanks to Transit, you get to Prague with relative ease. The center of the city, with its beautiful gothic architecture, is completely empty. The locals and tourists have been evacuated from the premises. \n\nYou meet the heroes who will provide you cover, you recognize them from your class on the EU team. \n*fake_choice\n    #Apex — the Mixed augmented from Belgium who has the ability to fly, as well as super strength and toughness. \n    #Shard — the Corporal augmented from Greece, whose entire body is made of glass.\n    #Ossein — the Corporal augmented from Portugal. She looks like a walking human skeleton.\nUnsurprisingly, most of them were chosen because their bodies do not have blood in them. As for Apex, his ability to fly should keep him at a safe distance.\n\n\"Good afternoon, kids. Get to your posts and be ready for anything,\" Apex barely acknowledges your presence, \"I'll be flying overhead and monitoring the situation. Also, where the hell is Bohemia?\" he looks around, frustrated.\n\n\"She left on her own and didn't say where,\" Ossein says. Her voice sounds surprisingly normal for someone without visible vocal cords.\n\n\"Typical,\" Apex shakes his head, \"Well, she'll be useless anyway, so let's begin,\" he says and flies into the sky with immense speed. You cough up the dust from his sudden exit.\n\n\"Sorry, I'd like to say he's not always like that, but he pretty much is,\" Ossein comforts you. You are certain you would see a sympathetic look in her eyes if she had them.\n*page_break\nYou and Oliver take your positions in the middle of the Old Town Square — Prague's historic heart, and nervously wait for Bloody Mary's arrival. You can hardly see Apex flying high above you, easily mistakable for a bird. Ossein and Shard hid nearby; one inside of a nearby house, the other on top of a roof across the street.\n\nMinutes go by in quiet tension. Oliver looks focused and determined. You want to speak to him, but feel like this will only make it harder for him.\n\nSome more time passes, and then you see her approaching. One color comes to mind…\n*page_break Blood red.\nHer outfit is a long trench coat and a wide-brimmed hat. All blood red. You can only hope it is just a color. You cannot see her face except for her mouth covered with red lipstick and a menacing smile.\n\n\"My little Oliver, I'm so glad to see you! Have you missed your mommy?\" she speaks with a posh accent, \"Oh my, you made a friend! How delightful!\" she turns to you. Her eyes are as red as her coat and they look like the eyes of a true killer.\n\n\"Elizabeth, you have hurt enough people. Please surrender now. They can help you,\" Oliver says, trying to be compassionate, though you can hear resentment in his voice.\n\n\"What happened? Can't even call me 'mum' anymore? Kids these days!\" Bloody Mary laughs, \"That hospital was so wretched! I very much enjoyed painting its walls with the blood of those quacks,\" she gloats.\n\nYou see Oliver's fist close in anger, his expression becoming harsher, \"Then you leave us no choice,\" he says coldly.\n\n\"I hoped you'd say that,\" she smirks. \n\nHe raises his hand and Shard with Ossein follow the signal. Ossein jumps in first and runs towards Bloody Mary, while Shard takes his position at the roof and starts throwing glass projectiles, distracting her.\n\n\"My my, we have guests!\" she says and effortlessly dodges most of the shards. When Ossein comes within striking distance, Bloody Mary uses her powers to swoop Ossein away with a wave of blood. You have no idea where she got it from. According to your briefing, she cannot create blood out of thin air.\n*page_break\nOssein gets flushed away down the street and Bloody Mary starts walking towards you.\n\n\"Stand back! She can't get ya if you stay about 50 meters away from her!\" you hear a rough female voice with a noticeable Eastern European accent behind you.\n\nYou turn around and see a woman dressed in an all-black Gothic fashion, standing on a roof of a small building. Her outfit includes belts with various small bottles strapped to them. She takes a big chug from what looks like a beer bottle, wipes her mouth and then throws it at Bloody Mary, who gracefully steps back, dodging it. The bottle hits the area a few meters away from her and instantly creates a wall of fire which starts spreading around the square, separating you and Oliver from Bloody Mary.\n\nYou recognize the woman. It's Bohemia — the hero of Czechia. Her Environmental power allows her to turn any liquids into substances with various effects, depending on the liquid used. Evidently, she can turn beer into a potent explosive.\n*page_break\nMeanwhile, Shard jumps off the roof and engages Bloody Mary in a hand-to-hand battle. She dodges most of his attacks, though he does manage to cut her arm with his sword-like arms. She uses a blood attack again and you notice that she has a bunch of blood packs hidden in her outfit. \n\nAfter a short battle, Bloody Mary manages to overpower Shard, pinning him on the ground, then attempts to cut his head off with his own arms.\n\n\"We gotta stop her!\" Oliver shouts and runs towards her, before you can even try to stop him.\n*choice\n    *selectable_if (tank >= 50) #I run into Bloody Mary, pushing her away from Shard.\n        You body slam Bloody Mary, which forces her to step back. She recovers quickly and raises her arm towards you.\n        \n        \n        *goto gotparal   \n    *selectable_if (tank \u003c= 50) #I run to Shard and pull him away while Oliver deals with Bloody Mary.\n        Oliver manages to distract Bloody Mary by using his powers to take her blood packs away from her, while you pull Shard to safety. However, before you could get to a safe distance away from her, you can feel her powers' grip on you.\n        \n        \n        *goto gotparal\n*label gotparal\nYou cannot move and you feel the blood in your veins getting stiffer, it is an extremely uncomfortable feeling.\n\n\"No, leave them alone!\" Oliver shouts.\n\n\"Now, now, Oliver. Stop with your antics or your friend will get hurt,\" she laughs, wagging her finger at him.\n\nYou can barely move your eyes, but you see the expression of pure rage on Oliver's face. You have never seen him like this before. He raises his hand towards Bloody Mary and you suddenly feel her grip on your blood weaken.\n\nInstead, now Bloody Mary is the one who seems paralyzed. She has a mix of horror and excitement on her face, \"Ooh, so that's what it feels like!\" she smiles, \"Oh, I can't even reverse your grip. I’m so proud of you!\"\" she looks at Oliver with a twisted version of motherly pride on her face.\n\nYou can feel that you are in full control of your body again and you turn to Oliver. He, however, looks as mad as before. \n\n\"You don't deserve to be saved,\" he utters, \"I will stop you, for good.\"\n*choice\n    *selectable_if (bellicist \u003c= 50) #\"No! Don't do it!\" you shout.\n        *if oliver \u003c=90\n            *set oliver +10\n        \"What's the point?\" Oliver looks at you, his voice as cold as ice, \"If we capture her she'll just escape again and hurt even more people!\"\n        \n        \"That's not what you believe, Oliver. You're not like her. Murder is not the solution,\" you state.\n        \n        \"Our powers are the same. The best I can do is to use them to stop people like her,\" Oliver says.\n        \n        \"They are not the same! Look at her arm! She got cut by Shard's attack and didn't heal it, because she can't!\" you reason. \n        \n        Oliver looks puzzled, but notices it too. The blood from the earlier fight is still dripping down Bloody Mary's arm.\n        \n        \"You are different. You have the power to heal, you can do better and be better. Don't stoop to her level,\" you argue.\n        \n        Oliver's expressions softens. He keeps Bloody Mary paralyzed, but does not attempt to hurt her anymore.\n        \n        Apex suddenly descends from the air and puts handcuffs on her, then puffs up his chest, \"Good work, everyone! Mission accomplished!\"\n        *page_break\n        *goto bohemiahealing\n    *selectable_if (bellicist >= 50) #You don't stop him. She deserves to die.\n        *achieve carnage\n        Bloody Mary cackles madly as her body explodes, blood splashing everywhere. You have never seen this much blood before and you hope you will never see anything like this again. You feel sick.\n        \n        Oliver bursts into tears. You want to confront him, but cannot bring yourself to move. Your body still feels woozy after being paralyzed, but you're comforted by one thought: Bloody Mary is gone. For good.\n        *page_break\n        *goto bohemiahealing\n*label bohemiahealing\n\"Hey you,\" you hear Bohemia's voice behind you, \"Catch this, it'll help ya!\" she throws a milk bottle to you. It's filled with some strange pink liquid. You take a sip and instantly feel better. You drink some more and feel your pain going away completely and your wounds healing.\n\nOliver is still shocked after all that happened, you sit next to him and put a hand on his shoulder sympathetically. \n\n\"You know, my dad raised me after I ran away from my mum. He is very supportive, but I have always wanted to know what it's like to have a kind, loving mother,\" he says.\n*choice\n    #\"I can't promise the mother part, but can guarantee kind and loving,\" you say and kiss him on the cheek.\n        *set oliverlove true\n        *if oliver \u003c=90\n            *set oliver +10\n        Oliver is a bit surprised, but returns the gesture.\n        \n        \"Thank you,\" he smiles, wiping his tears, \"For everything.\"\n        \n        \n        *goto firstblood\n    #\"Well, I can promise true friendship,\" you say and give him a hug.\n        *if oliver \u003c=90\n            *set oliver +10\n        Oliver is a bit surprised, but returns the gesture.\n        \n        \"Thank you,\" he smiles, wiping his tears, \"For everything.\"\n        \n        \n        *goto firstblood\n*label firstblood\n*achieve oliver\nWhen the area is deemed accessible again and the reporters arrive, Apex takes all the credit for stopping Bloody Mary, despite not doing anything, but you don't particularly care.\n\n*if oliverlove = true\n    You and Oliver rendezvous with Transit and get teleported back to the academy. You are relieved to be done with this mission, but you can sense that an important battle is coming in the near future. \n    \n    You feel prepared to take it on, however. After all, now you have someone to fight for.\n    \n    \n*if oliverlove = false\n    You and Oliver rendezvous with Transit and get teleported back to the academy. You are relieved to be done with this mission, but you can sense that an important battle is coming in the near future.\n    \n    You feel prepared to take it on, however. After all, such is the path of a true superhero.\n    \n    \n[b]Ending 1: First Blood[b]\n*page_break\n*goto_scene finalscreen", "foxinthehenhouse": "*temp catielove false\nEven in the dead of winter Los Angeles looks like a summer paradise: it's sunny, warm and filled with palm trees and beachgoers. You can see the silhouette of the Hyperion Tower — the tallest skyscraper in the city, in the distance.\n\n\"Okay, I've got a list of seven agencies we need to visit today. Don't worry, we'll have at least a fifteen minute break to get lunch and five minutes to go to the restroom. That should be enough, right?\" Catie asks, nonchalantly.\n*page_break Oh boy.\nYou follow Catie all around the city and its many suburbs, visiting various talent agencies, movie producers and TV-show directors, but all reject her for various reasons:\n*fake_choice\n    #One wasn't looking for augmented actors at the moment. \n    #Another was concerned about the bad publicity associated with the rise of augmented supremacism. \n    #One guy said that Catie needs to get her heroic license first.\n    #Some talent agent said that her powers are creepy. \n    #A producer lady said that Catie's augmentation is not very interesting.\n    #A TV-show director said that he is looking for a male lead.\nOn your seventh interview, the agent turns Catie down, but then looks at you and offers you a role in some soap opera, because they apparently find you to be a perfect protagonist for some romantic series where the main hero has several characters vying for their attention.\n\nBefore you can even process this offer, Catie grabs you and storms out of the office.\n\n\"Ugh! What is going on!!! I knew it's not gonna be easy, but come on!\" she shouts at the skies in frustration, then adds, \"I need a drink.\"\n*page_break\nYou get into a bar which Catie picked and grab some drinks. The bar seems to be popular with regular humans and augmented alike. There is even an augmented who looks like a horse man sipping on a drink next to you.\n\nYou have never seen Catie drink before, but apparently she can hold her alcohol, as she finishes several shots in quick succession and doesn't at all seem fazed by it.\n\n\"I just don't get it,\" she begins, \"Why am I not good enough? I've spent years preparing for this! Even then, back on the streets, I knew I could be someone.\"\n*hide_reuse\n*label catieconfesses\n*choice\n    #\"Do you drink often?\" you joke.\n        \"Not really, but I tried a bunch of things back when I was homeless in NYC. I guess that's one perk of zero supervision — you can do whatever you want!\" she laughs with pain in her voice.\n        *goto catieconfesses\n    #\"What about your parents?\" you ask.\n        Catie gives you a sad grin, \"What about them? Who knows! I've never met them! Maybe they got offed by some psycho or maybe they just didn't want me. Hell, I didn't even have a name, I had to come up with my own!\" she pours herself another shot, \"Even if they're alive, I don't want to see them. They're not worth it.\"\n        *goto catieconfesses\n    #\"You mentioned you grew up in an orphanage?\" you inquire.\n        \"That was later. For the first couple of years, I was absolutely alone. My powers helped getting money and food out of people and that was something to get by, but then I got caught and put in jail, then they sent me to the orphanage,\" Catie explains, tears starting to form in her eyes.\n        *goto catieconfesses\n    #\"Why did you decide to become a superhero?\" you wonder. \n        \"I saw them a lot on TV; I loved the way they were loved and celebrated by everyone. I remember imagining myself as a beloved fighter for justice and all that stuff. It's kinda silly when you think about it; my powers are more fit for a villain, and not like a main one, but more like a B-lister or something,\" she explains, starting to slur her words a bit.\n        *goto catieconfesses\n    #\"Okay, that's probably enough drinking for the day,\" you suggest.\n        \"Hey, the night is just beginning! Loosen up! You're in the biggest, beautifulest mess of a city in the country!\" Catie yells, raising her arms to the ceiling.\n        \n        \n        *goto catiebemindcontrolling\n*label catiebemindcontrolling\nYou attempt to object, but suddenly find yourself unable to. \n*fake_choice\n    #You're right, Catie.\n    #Good idea, Catie.\n    #Yes, Catie.\n    #Of course, Catie.\n\"That's the spirit!\" Catie slaps you on the shoulder, not noticing your predicament, \"Hey, how about we hit the dance floor?\" she suggests, pointing at a club on the other side of the street.\n\nAgain, the words come to you before you can even process the request.\n*fake_choice\n    #Good idea, Catie.\n    #Yes, Catie.\n    #Of course, Catie.\n    #You're right, Catie.\n\"Alright, let's go!\" Catie grabs your hand and leads you to the night club. \n\nAs soon as you enter the club, Catie takes the center stage at the dance floor, shoving some people aside in the process. You join her.\n*choice\n    *selectable_if (flashy >=50) #I dance my heart out.\n        You perform the hardest moves with extreme precision, even Catie is impressed and she gives you approving claps.\n        \n        \n        *goto trashwild\n    *selectable_if (flashy \u003c=50) #I dance, but try not to stand out too much.\n        You dance like most people around you, without bringing too much attention to yourself. Catie, on the other hand, is having the time of her life. You can't even tell that she's drunk, that's how skillful she is.\n        \n        \n        *goto trashwild\n*label trashwild\nAfter dancing for a good thirty minutes, Catie suddenly grabs you by your shoulders, \"I got an idea! Let's go!' she leads you out of the club and into the parking lot, \"Okay, we need to find a car!\" she says and looks around.\n\nShe spots a lonely old motorcycle, runs to it and starts fidgeting with it. Despite being drunk, she manages to expertly rewire it in a way that allows her to start it without a key.\n\n\"Get in, Rio! We're gonna have some real fun!\" she beckons. \n\nDespite the clear violation of the law, you are unable to object.\n*fake_choice\n    #Yes, Catie.\n    #Of course, Catie.\n    #You're right, Catie.\n    #Good idea, Catie.\nWhat follows next is a wild ride through the city, which ends in front of a luxurious mansion at the top of the mountain overlooking LA. You're pretty sure you've seen it somewhere before.\n\n\"This is Wildfire's crib,\" Catie explains, \"I've dreamed of having a house like this! Why does he have it? What did he ever do to earn this?\" she rants.\n*page_break\nYou sneak inside the mansion (which was surprisingly easy), where Catie starts running around different rooms, gasping at the sheer opulence of this estate. You are glad no one is home.\n\nWhen you reach the garage, filled with various expensive sportscars, Catie's excitement transforms into anger. \n\n\"Why does he need so many cars? The dude can fly! What an absolute a-hole,\" she grumbles.\n\nShe grabs a wrench from the tool box and starts smashing the nearest car. As much as you want to stop her, you can't.\n*page_break\nCatie goes at it for a while, smashing several cars in the process. When her anger subsides, she suddenly has a look of clarity on her face.\n\n\"We should probably go,\" she says.\n    \nYou leave the mansion and make your way to the motel you're staying at, dumping the motorcycle in the process.\n\nAs soon as you get back to your rooms, Catie plops on her bed and falls asleep. You leave her be and go to your room.\n*page_break\nThe next day, you are compelled to get to Catie as soon as you wake up. She greets you with a look of someone badly hungover.\n\n\"Hi.. Are you feeling alright?\" she asks sheepishly.\n*fake_choice\n    #Of course, Catie.\n    #You're right, Catie.\n    #Good idea, Catie.\n    #Yes, Catie.\n\"No, Rio, don't. Tell me what you really think,\" she looks at you, worried.\n\nYou attempt to answer her honestly, but the words just don't come to you.\n*hide_reuse\n*label catiedemons\n*choice \n    #\"Of course. Anything for you, Catie.\"\n        \"No, stop! This is not you!\" she pleads.\n        *goto catiedemons \n    #\"I will be whatever you want me to be, Catie.\"\n        \"I'm so sorry, Rio! Why can't I turn this of?!\" she yells.\n        *goto catiedemons \n    #\"I'll do whatever you say, Catie.\"\n        \"No no no!\" she screams.\n        *goto catiedemons\n    #\"What would you like me to do, Catie?\"\n        \"NOOO!\" she shouts on top of her lungs.\n        *goto catieconfronted\n*label catieconfronted\nShe runs out of the room and you suddenly feel like you have just woken up from a dream. \n\nIt takes another few seconds for you to understand what happened. You cautiously follow Catie and find her curled into a ball in the corner. She looks at you with tears in her eyes. \n\n\"Rio?' she utters.\n*fake_choice \n    #\"Hey, that's me, I promise!\" you try to cheer her up.\n        *if extroverted \u003c= 98\n            *set extroverted +2\n        *if feeling \u003c= 98\n            *set feeling +2\n    #\"That was pretty messed up what just happened!\" you admit.\n        *if extroverted \u003c= 98\n            *set extroverted +2\n        *if feeling >= 2\n            *set feeling -2\n    #\"It's the real me. I know it,\" you explain.\n        *if extroverted >= 2\n            *set extroverted -2\n        *if feeling >= 2\n            *set feeling -2\n        *if catie \u003c= 95\n            *set catie +5\n    #\"It's not your fault. I'm fine, really,\" you say sympathetically.\n        *if extroverted >= 2\n            *set extroverted -2\n        *if feeling \u003c= 98\n            *set feeling +2\n        *if catie \u003c= 95\n            *set catie +5\n\"This never happened to me before,\" she starts, \"Or maybe it did and I just didn't care? All I ever wanted was for people to like me, I never really cared whether it was due to my powers or not. I didn't care if I [i]made[/i] people like me.\"\n*choice\n    #\"I love you and it has nothing to do with your powers,\" you confess.\n        *set catielove true\n        *if catie \u003c=90\n            *set catie +10\n        *goto catielove\n    #\"You're my best friend and your powers have nothing to do with it,\" you say.\n        *if catie \u003c=90\n            *set catie +10\n        *goto catiefriends\n*label catielove\nCatie turns to you with a sad expression, \"Why? I don't deserve it.\"\n\n\"That's not true. I love you for who you are, that's all that matters,\" you say.\n\n\"Thank you,\" she walks up to you and hugs you.\n\nYou stay like that for a while.\n*page_break\n*goto endofprimadonna\n*label catiefriends\nYou walk up to her and give her a warm hug. \n\n\"Why?\" she asks, \"I'm a terrible friend.\"\n\n\"That's not true. I like you for who you are, that's all that matters,\" you say.\n\nYou stay like that for a while.\n*page_break\n*goto endofprimadonna\n*label endofprimadonna\n*achieve catie\n*if catielove = true \n    You spend the flight back to Washington talking about your future plans, now that you are officially superheroes and officially a couple. You're not sure which one excites you more.\n    \n    You can sense that the hardest battles are still ahead, but you feel prepared to take them on. After all, now you have someone to fight for.\n    \n    \n*if catielove = false\n    You spend the flight back to Washington talking about your future plans. Now that you are officially superheroes, you will be faced with new, greater challenges.\n    \n    You can sense that the hardest battles are still ahead, but you feel prepared to take them on. After all, now you have a loyal friend by your side.\n    \n    \n[b]Ending 3: Fox in the Henhouse[b]\n*page_break\n*goto_scene finalscreen", "groundzero": "[b]By the late twenty first century, one out of every ten thousand people on Earth is born with superpowers. These people are referred to as \"augmented\". Each nation dealt with the appearance of augmented humans differently. Some countries embraced these people, even worshipped them, whereas others shunned them and discriminated against them.[b]\n\n[b]The United States, as well as many other countries, decided to recruit augmented people for their own superhuman teams, and even opened schools and universities for people with special abilities. Not everyone decided to become a hero or a villain, however. Many augmented chose to live normal lives, some even going as far as concealing their abilities entirely.[b]\n\n[b]The augmentations themselves vary greatly from person to person and are generally connected to one’s identity or background. These powers are often tied to a particular emotion or experience and can be controlled and even strengthened with practice and hard work. To this day, it is unknown whether there is a limit to how much a person can develop one's augmentation.[b]\n\n*page_break September 3rd, 2075...\n\n*set enterrio 1\n[b]Chapter 1: Ground Zero[b]\n\nYou are sitting on the window seat of a futuristic high-speed train, overlooking the skyline of Washington D.C. The weather is clear and sunny, almost as if it is still the middle of summer, rather then the early fall. It is especially fascinating for you, because until a few hours ago, you have never been to the United States of America.\n\nHow do you feel about being in the good ol' U.S. of A. for the first time?\n*fake_choice\n    #I’m excited! I’ve seen this country in movies so many times, especially the District of Columbia!\n        *set extroverted +5\n        *set feeling +5\n    #I feel determined. This is a great opportunity for personal growth for me. I’ll do my best!\n        *set extroverted +5 \n        *set feeling -5\n    #I don’t really care either way. I’m here to become a superhero first and foremost. Doesn’t really matter what country I’m in.\n        *set extroverted -5 \n        *set feeling -5 \n    #I’m anxious. This is my first time being alone in a foreign country all by myself! I hope I’ll fit in... \n        *set extroverted -5 \n        *set feeling +5 \nLooking at all of the sleek skyscrapers and pristine looking streets, it is hard to imagine that this city was almost entirely destroyed in a major supervillain attack less than ten years ago. If not for the efforts of many superheroes, especially The Patriots — the national superheroic team of the United States, the city and the world as a whole would likely not have survived at all.\n\nNot that you remember too much about that event. You were only ten when it happened, and though it affected you too, the memories of it feel more like a dream at this point. You wonder if you will ever have to deal with something like that when you become a superhero. \n\nSpeaking of which, what is it that makes you want to be a superhero?\n*fake_choice\n    #I want to help people. Isn’t that what heroes are for?\n        *set selfish -5\n    #I want to help people and be recognized for my accomplishments.\n        *set selfish +5\n    #Not only do I want to be a hero, I want to be the best in the world!\n        *set Competitive +5\n    #I always dreamed of being a part of a legendary heroic team like The Patriots.\n        *set Competitive -5\nYour musings are interrupted when someone addresses you, “Hey, buddy! Do you mind if I sit here?” \n\nYou turn to see a young Middle Eastern looking guy, likely the same age as you. Must be another student. The train has plenty of empty seats, so he probably just wants to talk.\n*fake_choice \n    #“Of course, go ahead!” you say with a friendly smile.\n        *set extroverted +2 \n        *set feeling +2\n    #“Yes, but only because you said 'please',” you say with a teasing grin.\n        *set extroverted +2 \n        *set feeling -2\n    #“Sure,” you say in a deadpan manner.\n        *set extroverted -2\n        *set feeling -2\n    #“Um.. Okay,” you say a bit apprehensively.\n        *set extroverted -2 \n        *set feeling +2\n“Thanks,” he smiles and takes a seat beside you, “I’m Sami. What’s your name?”\n\n“Rio. Rio Ramirez,” you introduce yourself.\n\n“Nice to meet you, Rio. Where are you from?”\n\n“Quito.”\n\n“Ah, Ecuador? ¡Qué lugar tan encantador! Me encantaría visitar algún día,” to your surprise, Sami spoke perfect Spanish.\n\n“¿Hablas quechua?” he asks whether you can speak Quechua, a language once common in Ecuador, but is largely extinct by this point.\n\n“Un poco.”\n\nSami says something in Quechua, but you can only understand a handful of words, you suggest him to switch back to Spanish and you continue talking in your native tongue.\n*page_break A few minutes later...\nTurns out Sami is from Iran and is, in fact, another future student of the Sage Academy — the academy for augmented and regular humans alike. Unlike you, Sami is not an aspiring superhero and is more interested in diplomacy. It is unusual for any institution to have superheroic programs at all, let alone offer alternatives like scientific or diplomatic courses.\n\nHe tells you that his special ability grants him superhuman memory, thus he was able to learn more than 300 different languages.\n*page_break Suddenly...\nYour conversation is interrupted when you hear other passengers marvel at something outside. You look through your window and see a girl in a strange spacesuit-looking purple outfit, flying beside the train. \n\nThe girl looks at you and the other astonished passengers and waves with a friendly smile, she then speeds up and flies ahead past the train, towards the academy complex in the distance.\n\n“Whoa! Is she another student?\" Sami exclaims with a grin, \"This academy must be amazing!”\n*page_break Well, this is your life now...\n*temp est false\nUpon arrival to the eponymous \"Sage Station\" — the closest to the academy, you and Sami follow the flow of the students over the bridge that leads to the island the academy is built upon. The crowd is quite diverse, you can tell that the academy accepts all kinds of students, including the non-augmented ones as well. In fact, from what you have read, regular humans comprise about a half of the student body. Well, at least that means less competition for you.\n\nThe Sage Academy, built on Theodore Roosevelt Island in the middle of the Potomac River, is a sprawling complex of several large buildings built in accordance to the most contemporary architectural standards. Well, as far as you can tell, that is.\n*page_break\nAfter going through the registration procedures, you receive a key card to your room at the West Dorm. It is located in the north of the island, about ten minutes away from the main building.\n\nYou see the four large dormitories, surrounding a sprawling square, and walk towards the one on the left. The dorms themselves look pristine and brand-new. When you get to your room and unlock the advanced-looking lock screen with the key card, you are surprised to see just how massive the room is. It's almost like a small apartment!\n\nYou leave your suitcase on the floor. Now, you have about an hour before you need to head out for the opening ceremony. What would you like to do?\n*disable_reuse\n*label start\n*choice \n    #I want to read the Academy pamphlet again.\n        You read about the founders of the academy — the superheroic sisters Evelyn Allen and Brenda Thompson, also known as Dove and Hawk, respectively. After the horrific supervillain attack nine years ago, they wanted to give the future generations hope and security.\n        \n        They opened the first public academy in the nation that accepts both augmented and regular students — the Sage Academy. It was built on the remains of Theodore Roosevelt Island in Washington D.C.\n        \n        You read the whole pamphlet and place it on your desk. Looks like you have quite a bit of time left, would you like to do something else?\n        *goto start\n    #Look into the mirror and make myself look more presentable for the ceremony.\n        You see a young gray-haired person with bronze skin looking back at you with their hazel eyes. \n        \n        You take a comb from your suitcase and try to make your hair look more presentable, the long flight from Ecuador didn't do your appearance any favors.\n        \n        After about five minutes of struggle, you look noticeably better. Job well done! You still have a decent amount of time left, what are you going to do next?\n        *goto start\n    #I might as well start unpacking my stuff since I have the time.\n        You open your suitcase and take out your belongings. You put your touchscreen computer on the desk near the window of the room, then start to hang up your clothes in the spacious closet by the bed.\n        \n        While you were engrossed in your activity, you hear a loud thumping sound. You listen closer. It sounds like it is coming from behind the wall, likely from the other room.\n        *choice \n                #Investigate it!\n                    *goto estelle\n                #Ignore it!\n                    Whatever that sound is, it's prob
