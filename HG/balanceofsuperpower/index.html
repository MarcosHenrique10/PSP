ere are some merits to self-expression, but I'm not sure I follow you, Rio.\"\n        \n        \n        *goto endofween\n    #\"Both have their pros and cons. It's impossible to compare the two,\" you take a neutral stance.\n        *if competitive >= 5\n            *set competitive -5\n        Felix shrugs while Estelle gives you a puzzled look, \"Yeah, but that goes without saying, doesn't it?\" she points out.\n        \n        \n        *goto endofween\n*label samigloria\nYou spot Sami and Gloria Garcia — Wildfire's daughter and the girl who ran away from her battle with you during the hero program trials. They seem to be discussing something about the reunification of Ireland.\n\n\"Oh hey, Rio! Your costume is great!\" Sami compliments you. His own costume looks pretty good too; he really pulled off the trademark flannel and beanie look of Link.\n\nGloria waves you too, \"Nice seeing you again Rio. I'm glad we're not forced to fight again,\" she jokes.\n\n\"Wait, what?\" Sami is shocked, \"I want to know, but I also don't want to know at the same time.\" \n\n\"It was a hero program thing. Hawk forced everyone to fight, the winner passes while the loser doesn't,\" Gloria explains.\n\n\"Oh, sounds awful! My condolences.\"\n\n\"I mean, I didn't want to be a superhero. It was just something my parents wanted. I actually ran away from the fight,\" she admits, \"I'm glad you made it Rio, you'll make a great hero, I know it!\" she smiles.\n\nYou join them and discuss your homework and the end-of-semester exams together.\n*page_break\n*goto endofween\n*label endofween\nAfter chatting with your friends, you continue enjoying the party. You spend a good few hours having a good time and, after the party is over, return to your dorm room. \n*finish", "lexrex": "*temp lexlove false\nYou and Lex are sitting in front of her computer at her aunt's place, staring at a cryptic chat window. Lex managed to track down some elusive hacker named \"spider\", who apparently knows a lot about the \"Ubermensch Project\".\n\nAs you ruminate about this, the chat screen comes to life with a simple message from \"spider\" that reads, \"i have the info. you'll need to come to tokyo and meet me.\"\n\nYou look at Lex, who is expressionless as she stares directly at the screen for a few seconds, before typing back.\n\nL3X: Why?\n\nspider: i can only talk about this in person. the net isn't safe\n\nLex turns to you, \"Seems suspicious, but if they have the information, it might be worth the risk. You shouldn't put yourself in danger, however.\"\n*choice\n    #\"I trust \"spider\", so we should go,\" you say.\n        Lex considers your words, than nods in approval.\n        \n        \n        *goto tokyotickets\n    #\"I don't trust them, but we don't have a choice. We need to get to the bottom of this,\" you say.\n        Lex considers your words, than nods in approval.\n        \n        \n        *goto tokyotickets\n*label tokyotickets\nYou wonder how you're going to get to Tokyo when your allowance clearly wouldn’t cover it as Lex types back, echoing your thoughts.\n\nL3X:  How do we get to Tokyo?\n\nspider: that's on me. you''ll get the tickets shortly\n\nSeconds after you've finished reading this, you both get messages on your phones informing you of your reserved first class flights to Tokyo tomorrow.\n\nYou look at each other, even the usually inscrutable Lex looks surprised.\n*fake_choice\n    #\"Well, that's convenient!\" you joke.\n        *if extroverted \u003c= 98\n            *set extroverted +2\n        *if feeling \u003c= 98\n            *set feeling +2\n        *if lex \u003c= 95\n            *set lex +5\n    #\"I have a bad feeling about this,\" you say.\n        *if extroverted \u003c= 98\n            *set extroverted +2\n        *if feeling >= 2\n            *set feeling -2\n    #\"Whoa,\" you utter. \n        *if extroverted >= 2\n            *set extroverted -2\n        *if feeling >= 2\n            *set feeling -2\n    #\"Okay.. This is kinda terrifying,\" you admit.\n        *if extroverted >= 2\n            *set extroverted -2\n        *if feeling \u003c= 98\n            *set feeling +2\n*page_break 6757 miles later...\nAfter getting through multiple trains, cultural faux pas and the language barrier, you manage to get to the meeting spot \"spider\" sent you. \n\nIt looks like a simple high-rise building, though you don't see any lights despite the late hour. \"spider\" sends you another message that simply reads, \"upstairs\".\n*page_break Several flights of stairs later...\nYou get to the last floor of the building and see several doors in front of you. The whole building is dark with no lights in sight. Another message prompts you to open the door of the apartment number \"8\". You enter and find a tiny Japanese-style apartment with no one inside. \n\nSuddenly, a hatch drops open from the ceiling and a simple roped ladder descends to you. You probably wouldn't have noticed a hatch if it didn't open by itself, as it blended in smoothly with the ceiling.\n\nYou give Lex a curious look. She doesn't look back and starts climbing up the ladder. You follow suit.\n*page_break\nThis secret attic is a bizarre sight indeed. You see a lanky man sitting in front of the wall entirely covered in computer monitors. They display security camera footage from various locations, news anchors reporting in different languages and a bunch of message boards and livestreams.\n\nThe man turns to you. He looks young with a thick, disheveled black hair and dark bags under his eyes, which are black and a bit lifeless, though they are filled with curiosity. He is dressed in a simple white shirt and dark pants. He is barefoot and you could have sworn he just typed something with his feet on one of the many keyboards scattered around the floor a few seconds ago.\n*page_break\nHe looks at both of you, but doesn't say anything. Unusually for her, Lex breaks the ice.\n\n\"What do you know about the 'Ubermensch Project?'\" she gets straight to the point.\n\nHe looks at her, than at you, before beginning to speak. His voice is hoarse as if he hadn't spoken in months, \"It was a secret government project in which the US government was experimenting on augmented criminals and using them to create their own artificial augmented human. The idea was to discover the limits of augmented abilities and use that knowledge to create the most powerful augmented being,\" he states, without a trace of accent.\n\nLex waits for a few moments for him to continue. He doesn't, so she asks, \"What does it have to do with the augmented supremacists?\"\n\n\"The experiments were successful, but the test subject was so powerful that she destroyed them all and escaped, then founded 'Ubermensch'. She calls herself 'Goddess' and allegedly has the power to do virtually anything,\" he explains.\n*hide_reuse\n*label spiderquestions\n*choice \n    #\"Why is she doing this?\"\n        \"She wants to enact a new world order. One in which augmented are at the top of the food chain,\" Spider explains.\n        *goto spiderquestions\n    #\"Where do her followers come from?\"\n        \"She has a huge following on the deep web, that's how they recruit most of their foot soldiers. The idea of a paradise for augmented is nothing new, but it still appeals to many,\" Spider says.\n        *goto spiderquestions\n    #\"How do we stop her?\"\n        \"Frankly, I don't know. The only thing I can say is that she doesn't seem to be as powerful as she claims to be, otherwise I would've been dead already,\" Spider suggests.\n        *goto spiderquestions    \n    #\"Can you tell us more about yourself?\"\n        \"I can share some things. I'm an augmented too, though my power is not as fancy as yours. I do not sleep, which is pretty useful when you're surfing the net all the time,\" he lets out a small chuckle.\n        *goto spiderquestions \n    #\"Do you always go barefoot?\"\n        \"No comment,\" he says curtly.\n        *goto spiderquestions \n    #I'm done with questions.\n        *goto byespider\n*label byespider\nOnce Lex and you exhaust all of the questions you have had, you decide that it is time to go.\n\nSpider waves you goodbye and when you're about to leave he adds, \"By the way, say 'Hi' to Brenda for me. Tell her I still support the cause!\" \n\nIt takes you a few moments to remember that Brenda is Hawk's real name. Does Spider know her?\n*page_break\nAfter leaving Spider's den, you two walk back to your hotel through the quiet streets of the Setagaya Ward of Tokyo, when Lex suddenly stops you.\n\n\"We're being followed,\" she says and scans the area.\n*choice\n    *selectable_if (flashy >= 50) #\"Let's dash ahead! If we're fast enough, they'll lose us!\" you say.\n        Lex nods and you sprint down the street together. \n        \n        However, you soon notice someone standing in the middle of the road ahead of you. She looks like a humanoid fox dressed in a traditional geisha outfit. At first, you think she's just a quirky local, but then she throws something at you.\n        \n        Lex pulls you to the side and you narrowly avoid getting sliced with a giant metallic fan, though it does cut your shoulder a little. The fan flies back to the fox lady like a boomerang and she starts slowly moving towards you. You notice that the fan has a \"Ü\" symbol on it.\n        \n        You prepare for a fight, before Lex speaks, \"There's another one. Behind.\"\n        \n        You turn back and see a strange shadowy creature, whose glowing red eyes are their only human-like feature.\n        *page_break\n        *goto troopers\n    *selectable_if (flashy \u003c= 50) #\"Let's hide, they won't find us,\" you say.\n        Lex nods and you quickly dash into one of the nearest narrow alleys and hide behind one of the vending machines.\n        \n        At first, everything is quiet and you wonder if Lex was just being paranoid, but then you hear the clacking sound of something wooden moving down the street, almost like a horse's footsteps.\n        \n        You try to peer at it from your hiding spot, but all you can see is a shadow of the lamppost. The shadow starts to move.\n        \n        It turns into a humanoid silhouette, with red glowing eyes being its only human-like feature. Before you can comprehend what's happening, it lunges at you. \n        \n        Lex pulls you away and the creature misses you, though it manages to cut your shoulder a little with its shadowy tentacle-like arms. You and Lex run back to the street, but are faced with another threat, standing on the other side of the street. \n        \n        She looks like a humanoid fox dressed in a traditional geisha outfit. Her expression is unreadable, yet somehow menacing. She holds a giant metallic fan with a \"Ü\" on it. Somehow, you get a sense that she is the more dangerous one of the two.\n        *page_break\n        *goto troopers\n*label troopers\nYou realize that you are blocked from either end of the street. You and Lex stand back to back, ready to fight.\n\nSuddenly…\n\nJust when the shadow augmented was about to strike, it is hit with a bright ray of light. It shrieks and instantly shifts into the closest shadow, only its red eyes being visible.\n\nYou look towards the origin of the lightbeam and see five people dressed in colorful outfits posing dramatically. \n*fake_choice\n    #The green one is a young boy with green hair and equally green outfit. \n    #The yellow one is a good-looking blonde woman who radiates bright yellow light.\n    #The red one is an intimidating-looking guy with a huge pompadour and lots of tattoos, covering his entire torso.\n    #The blue one is a giant robot armed with various weaponry.\n    #The pink one is a young girl dressed in a pink ballerina outfit with a wand in her hand.\n\"ブスな化け物だな, てめぇ！\" the tattooed guy shouts, then touches one of his tattoos, which looks like a shuriken, and it materializes in his hand! He then throws it right at the fox lady, who blocks it with her fan. Meanwhile, the green kid runs towards her.\n\n\"Matcha Boy, wait!\" the girl in the yellow outfit shouts in perfect English.\n\nMatcha Boy doesn't respond and jumps into the geisha, shouting an the top of his lungs, \"Matcha Boy Punch!!!\" as he turns into a large green car that smashes into her, sending her flying into the wall and falling unconscious.\n\nThe green car then turns back into Matcha Boy, who puffs out his chest. The shadow creature tries to strike him from behind, but is blasted by another, brighter beam of light from the blonde woman.\n\nThe blue robot uses its jet pack as it flies towards the shadow augmented and puts some kind of device on it that subdues it. The robot then does the same to the unconscious geisha. \n\n\"Who are they?\" you wonder out loud, taking in the whole scene.\n\n\"I've read about them, they call themselves the 'Tokyo Troopers',\" Lex explains. She gives you her smartphone with the Tokyo Troopers' info on it.\n*fake_choice\n    #Matcha Boy — a Corporal augmented with the ability to turn into any inanimate object. However, he cannot move when in that form.\n    #Sunflower — an Elemental augmented with the ability to generate beams of light.\n    #Komadori — a Mixed augmented who can turn objects into tattoos on his body and vice versa.\n    #Charge — an Environmental augmented whose body constantly produces electronic energy, allowing him to pilot an advanced mecha-suit called \"Aobushi\".\n    #Placebo — an Interpersonal augmented who can make people heal faster with a touch.\nAs you look at it, you hear someone address you in broken English. It's Placebo.\n\n\"Let me help! I am magical healer!\" she proclaims and curtsies.\n\nYou nod, not fully understanding what she said, and she smiles, then yells, \"Pura Pura Purasebo!\" as she performs a pirouette and a few dramatic motions with her wand, then boops you on the nose with her finger. Suddenly, you start feeling better, the wound on your shoulder closing.\n\n\"Wow, thanks!\" you say. She winks at you and smiles, then returns to her team.\n\nWith that, the Tokyo Troopers perform another dramatic pose together, then run off, presumably to help someone else in need.\n*page_break\nAfter all the craziness, you and Lex are relaxing at a quirky cat cafe in the middle of the Meguro Ward of Tokyo. You play with the kitties as you sip on some cute-looking drinks. \n\n\"Thanks for helping me with this investigation,\" Lex says, gratefully, \"I don't know if I would've been able to do it alone.\"\n*choice \n    #\"Lex, I will always help you, because.. The thing is.. I love you,\" you confess your feelings.\n        *set lexlove true\n        *if lex \u003c= 90\n            *set lex +10\n        Lex's expression doesn't change and she simply says, \"I feel the same.\"\n        \n        \"Does that mean.. we're a couple?\" you ask, hopingly.\n        \n        \"Yeah, I guess it does,\" she says and you see a subtle smile appear on her face.\n        \n        You've never felt happier.\n        *page_break\n        *goto endoflex      \n    #\"You're my best friend and I will always help you,\" you say.\n        *if lex \u003c= 90\n            *set lex +10\n        \"Thank you, Rio,\" she says, \"You are my best friend too. Well, technically, my only friend,\" she says, and you see a subtle smile appear on her face. \n        *page_break\n        *goto endoflex\n*label endoflex\n*achieve lex\n*if lexlove = true \n    You spend the flight back to Washington talking about your future plans, now that you are officially superheroes, and officially a couple. You're not sure which one excites you more.\n    \n    You can sense that the hardest battles are still ahead, but you feel prepared to take them on. After all, now you have someone to fight for.\n    \n    \n*if lexlove = false\n    You spend the flight back to Washington talking about your future plans. Now that you are officially superheroes, you will be faced with new, greater challenges.\n    \n    You can sense that the hardest battles are still ahead, but you feel prepared to take them on. After all, you have a loyal friend by your side.\n    \n    \n[b]Ending 5: Lex Rex[b]\n*page_break\n*goto_scene finalscreen", "northward": "*temp northlove false\nThe overwhelming darkness and the unbearable cold are staggering. If this isn't some kind of definition of Hell, it should be. \n\nNorth, meanwhile, is feeling quite energetic, even a bit flighty. Calamity, who is accompanying you on this mission, seems to be feeling fine as well. You, on the other hand, are covered in thick layers of protective gear, with the blue UN helmet on your head, yet you are still freezing.\n\nNot to mention, you are not even supposed to be here.\n*page_break\nYou and North joined Calamity on her mission provided by the United Nations. Apparently, there is some serious dispute involving Canada, Norway and Russia over their territory in the Arctic.\n\nYou were sent to Svalbard, Norway, as representatives of the United Nations to mediate the negotiations between the three sides and monitor the situation. You are not entirely sure how you and North were allowed to join. Maybe Calamity put out a good word for you.\n\nAfter standing in the freezing cold for a good few hours, you finally see them approaching, \"The Three Bogatyrs\".\n*page_break\nThe trio looks intimidating; two are wearing militaristic-looking protective gear with the Russian flags on them, while the third one does not seem to need it, since his body is literally made of solid ice. One of the two who does is a massive bear/human hybrid. His protective gear can barely stay on his massive physique.\n\nYou remember reading about them and their powers.\n*fake_choice\n    #Titan — a Corporal augmented who has the ability to grow up to fifty meters in size. He is the leader of the group.\n    #Kholod — a Corporal augmented whose entire body is made of hey are allowed to defend themselves, aren't they?\" Titan claims.\n\n\"Doesn't mean you can just turn this place into a Russian military base,\" White Tiger chimes in.\n\n\"What are you doing here anyway, kitten? Don't you have enough polar bears in Canada?\" Titan jibes.\n\n\"We have a research facility here and don't much appreciate it being next to an active military base,\" White Tiger responds, coldly.\n*page_break It continues on..\n\"Ugh, the whole world is in chaos right now and we are here bickering over some dirt. We shouldn't be fighting each other!\" Freyja shouts to the skies, frustrated.\n\n\"You say that, but you're still here,\" Titan comments.\n\n\"I'm here for my country, not for myself,\" she explains. \n\n\"I can say the same,\" Titan shrugs.\n\n\"Then why did you bring your friends? One of you would suffice,\" White Tiger points out.\n\n\"Just a precaution,\" Titan smirks. \n*page_break It continues some more...\nYou were almost about to fall asleep when the situation suddenly sours. \n\n\"Well, if you're not going to listen, you leave us no choice,\" Freyja proclaims and pulls her sword out from the ground.\n\n\"Not gonna lie, I was hoping for this outcome,\" Titan says and cracks his knuckles. His companions preparing for a fight.\n\n\"Now hold on a minute! No need to get feisty!\" Calamity interjects, blocking their way.\n\n\"Sorry, Jane, the time for talks is over,\" White Tiger tells her with a look of both sympathetic understanding and determination to fight.\n\n\"Well, I'll have to stop ya then,\" Calamity sighs and throws her blue UN stetson on the ground.\n*page_break Oh boy…\nYou're still trying to comprehend how the situation escalated so quickly as The Bear lets out a deafening roar and Titan starts growing to an enormous size. Calamity and the others engage in battle with them, which looks pretty spectacular, if not disturbing, seeing as these are all superheroes fighting each other.\n*fake_choice\n    #White Tiger wrestles with Th u follow her inside.\n\nInside, the ship looks bright and minimalistic, but also cluttered at the same time. Estelle presses some buttons on the many touchscreen panels in the front as you strap yourself to the seat next to her.\n\n\"This is going to be so exciting! I even managed to get a permission to enter from Artemis!\" she says. \n\nYou wonder if you should ask whether she was planning to dock the ship without permission, but decide against it.\n\n\"Alright, all set! Let's do this!\" she exclaims as she presses a big purple button.\n*page_break \nThe ship starts rapidly ascending, like a hyper-fast elevator. Whether it is your powers or some helpful life support system, you feel relatively fine.\n\nBut it gets worse…\n\nWhen you rise above the clouds, Estelle presses another button and the ship starts moving even faster, this time pointed forward. \n\nYou start feeling sleepy and your eyes start closing by themselves as you see the stars getting brighter and brighter, the blackness of space getting darker and darker.\n*page_break You pass out.\n\"Alright, wake up, sleepy head! We're almost here!\" you hear Estelle's voice and rub your eyes. \n\nWhat you see is nothing short of stunning, it is the surface of the Moon, so close you can see the many craters dotting its face.\n\n\"I wanted to wake you up earlier, but decided it would be better if it's a bit of a surprise,\" she says, \"Plus, the trip was kinda boring, it took a couple of hours, I was listening to a science podcast the whole time,\" she explains.\n\nThough you hear her, you're too engrossed by the sight to respond. You can now make out Artemis, which looks like a huge pearly white complex with multiple domed structures and landing pads.\n\nAfter a few minutes, you reach the colony and Estelle lands the ship.\n*page_break\nAfter leaving the ship, you are welcomed by a smiling guide who shows you around the city. \n\nOn the inside, Artemis is a stunning, futuristic place, equipped with all the latest kes the stage and addresses the audience, \"Hey everyone, my name is Javed Khan and I am the head of the engineering department here at Artemis, hope you're having a good time,\" he greets you.\n\n\"He's the guy responsible for developing the Earth-like gravity on Artemis,\" Estelle whispers.\n\nJaved continues, \"You know, Artemis is a truly special place. I grew up in Pakistan, and being augmented made it really hard for me. It's one of those countries where being augmented is basically illegal. A lot of people here have had that experience,\" he turns to his fellow scientists, most of whom are noticeably augmented.\n\nHe proceeds, \"Artemis is different. Here, the augmented not only feel comfortable, but make up the majority of the population. That's why I believe Artemis can become a place for us, a place where we don't have to fear anybody,\" he says and the audience starts clapping.\n\nThe digital clock on the wall starts counting down until midnight, as he continues, \"Of course, achieving this kind of utopia isn't easy and will require some hard decisions to be made, such as this one,\" he says, and when the clock strikes midnight, ushering in the new year, presses a button on his tablet.\n\nSuddenly, all exits to the restaurant shut down with thick metallic doors. Estelle and you share a worried look.\n*page_break\n\"Don't worry, everyone, this is just for having leverage during the negotiations. You will be returned to Earth safely once Artemis is declared an independent state for augmented individuals,\" he proclaims calmly.\n\nThe restaurant guests start panicking, but the other scientists and waiters signal them they'd better stay where they are.\n\n\"Let it be the beginning of a new age — the age of hope for all augmented! Let Artemis become a place for all augmented of the world. No more oppression, no more hiding our powers,\" he raises a glass and drinks to it, his fellow scientists follow suit.\n\nEstelle turns to you and whispers, \"Okay, this is pretty disturbing, but I have a plan. I've studied the blueprints of Artemis, there should be a ventilation shaft in the kitchen, there's no way it's closed off, so we should be able to get to the ship and escape.\"\n\n\"What about the others?\" you ask.\n\n\"You heard the guy, they're not gonna hurt the hostages, and look, I'm not a hero, I'm a scientist, and this is way over our heads.\"\n*choice\n    *selectable_if (selfish \u003c= 50) #\"I can't just leave them, I'll stay and try to stop this,\" you say.\n        *if estelle \u003c= 90\n            *set estelle +10\n        Estelle sighs, \"You really are a hero, huh? Guess I shouldn't be surprised. Okay, I'll help you. I can't let you get hurt after I brought you here in the first place,\" she whispers.\n        \n        You lean closer and start discussing your strategy.\n        *page_break\n        *goto spacehero\n    *selectable_if (selfish >= 50) #\"Fine, let's go,\" you agree.\n        *if estelle \u003c= 90\n            *set estelle +10\n        \"Alright, we need to find a way to get to the kitchen without being noticed,\" she whispers.\n        \n        \n        *goto spaceescape\n*label spacehero\nYou stand up from your table and look defiantly at Javed, who notices you.\n\n\"This is madness!\" you shout, \"Stop this at once or I'll have to use force!\"\n\n\"I'm afraid I have to decline, my friend. This is too important for all of us,\" he responds.\n\nA waiter tries to grab you, but you dodge him and run towards Javed, preparing for an attack. He raises his hand towards you as you get closer and you suddenly feel like your body is ten times heavier, you fall to the floor and are unable to get up.\n\n\"Look, I admire what you're doing,\" Javed says calmly, \"You truly are a hero, but you are fighting for the wrong side. We are not trying to hurt anyone, we just want freedom,\" he says.\n\nJaved's power is control over gravity, which allowed him to greatly increase gravity in the area around you. You can barely move, but are still able to talk.\n*hide_reuse\n*label gravstart\n*choice\n    #\"Why do you want to get rid of regular humans?\"\n        \"Well, let me preface it with this; I don't hate regular humans. I just don't believe that it is possible for regular humans and augmented to live in peace. I've seen it all myself, and isn't Hawk one of your teachers? She agrees with me, she was leading a separatist movement in her prime,\" he calmly explains.\n        *goto gravstart\n    #\"Why Artemis?\"\n        \"Well, we have spent the better portions of our lives here. It's our home. I also believe that regular humans will never want to share a piece of their planet with us, but the Moon? That's a bit too far. I imagine a lot of people would be okay with the idea of the Moon belonging to augmented, we make up most of the population here anyway,\" he explains.\n        *goto gravstart\n    #\"Why now?\"\n        \"That's a very poignant question,\" he genuinely compliments you, \"Artemis has just reached complete self-sustainability. It's quite exciting, actually. It took us years to develop this system,\" he says with pride. \n        *goto gravstart\n    #I've heard enough.\n        *goto estellethebelle  \n*label estellethebelle\nJaved turns back to his tablet and looks at it, his expression becomes concerned. Another scientist walks up to him and whispers something.\n\n\"What?.. \" he looks back at her, \"How did that happen?\"\n\nSuddenly, the doors to the restaurant start opening again and you hear a familiar voice over the speakers. \n\n\"Hey, everybody! This is Estelle Zola, speaking to you from Artemis's security control room. I'm in charge of the life support systems now, so you'd better free Rio and others or things will get ugly. Also, I have already informed the authorities of what's happened here and I am in full control of the security robots, so you should probably surrender right now or I'll have to use them. Plus, I can open that giant wind h. Unfortunately, the part of her body you thought was flesh turned out to also be metal and you scream in pain as you grab your wrist.\n        \n        The woman turns to you with a confused look, then, realizing what you did, points her arm at you, shooting some kind of laser. Thankfully, Estelle pushes you out of the way and the woman misses.\n        \n        You assess the situation, but before you can do anything, Estelle grabs a screwdriver from the tool box nearby and jumps behind the woman.\n        \n        Estelle inserts the screwdriver somewhere on the woman's back, and she suddenly stops moving, now only able to move her head.\n        \n        \"Okay, okay! I give up!\" the woman shouts with a Southern accent.\n        *page_break\n        You thank Estelle for saving you and you both get inside the ship, setting it up for take off. \n        \n        Before you leave, you move the body of the mechanical woman to a safe room next to the garage, which she profusely thanks you for.\n        \n        That done, you open the doors to the outside and fly away, leaving Artemis for good.\n        *page_break\n        *goto loneflight\n    *selectable_if (bellicist \u003c= 50) #\"Let's try to reason with her, she doesn't seem like a bad person.\"\n        Estelle hesitates, but nods in agreement. You tell her to stay hidden, in case of trouble, as you calmly leave your cover and walk up to the mechanical woman.\n        \n        \"Huh? Who's there?\" she says in a Southern accent, and turns to you.\n        \n        \"Hi! I'm Rio, nice to meet you!\" you say, trying to be polite.\n        \n        \"What? You shouldn't be here! I gotta call Javed,\" she says and looks at her arm, which has a touchscreen tablet attached to it.\n        \n        \"Whoa! Is that a seventh generation cybernetics I see?!\" Estelle pops out, with a genuine curiosity in her voice. \n        \n        The woman turns to her and smiles, \"Yup, you can't get this stuff anywhere on Earth yet. Some of it are my own add-ons, as a matter of fact,\" she states proudly.\n        *page_break\n        Estelle and the mechanical woman, whose name is Audrey, by the way, talk about technology for a while. Eventually, Estelle explains your predicament to Audrey and she blushes.\n        \n        \"Yeah, it's a bit embarassin', actually. I'm not really big on the whole separatism thang, but I just didn't want to stand in their way, either,\" she admits, \"I guess we can pretend you managed to beat me and fly away, what y'all think?\"\n        \n        You and Estelle excitedly nod and Audrey helps you set up the ship for take off. Before you leave, she gives you a friendly wave.\n        *page_break\n        *goto loneflight\n*label superestelle\n\"You know, this whole superhero thing isn't so bad. I'm considering a double major,\" she turns to you and winks.\n\n\"So, what's your moniker going to be then?\" you ask.\n\n\"Well, I have something in mind, but what do you think?\"\n*fake_choice\n    #Cassiopeia\n    #Purple Smart\n    #Rocket Woman\n    #Estelle The Builder\n*achieve estelle\n\"Okay, wow, those are so bad!\" she laughs, \"Sorry, I made up my mind already. The name's 'Lodestar'.\"\n\nWith that, you and Estelle continue your journey back to Earth. The troubles there are brewing and you can sense an important battle coming.\n\nOne thing you know for sure is that you will never forget your journey to Artemis. And, somehow, you get the feeling you will be back.\n\n[b]Ending 7: Over The Moon[b]\n*page_break\n*goto_scene finalscreen\n*label loneflight\n*achieve estelle\nYou and Estelle fly in silence, wondering what will happen to Artemis now that it has been overtaken by augmented separatists. Will they succeed? Will their rebellion be crushed? \n\nThese kinds of questions will be even more relevant when you get back to Earth as the troubles there are brewing and you can sense an important battle coming ahead.\n\nOne thing you know for sure is that you will never forget your journey to Artemis. And, somehow, you get the feeling you will be back.\n\n[b]Ending 7: Over The Moon[b]\n*page_break\n*goto_scene finalscreen", "screenshots": "*set enterrio 1\n*set moniker \"???\"\n*set Extroverted 50\n*set Feeling 50\n*set Selfish 50\n*set Competitive 50\n*set Bellicist 50\n*set Offense 50\n*set Flashy 50 \n*set Tank 50\n*set Oliver 0\n*set April 0 \n*set Catie 0 \n*set Felix 0\n*set Lex 0\n*set North 0\n*set Estelle 0\n*set Jun 0\nLooking at all of the sleek skyscrapers and pristine looking streets, it’s hard to imagine that this city was almost entirely destroyed in a major supervillain attack less than ten years ago. If not for the efforts of many superheroes, especially The Patriots — the national superheroic team of the United States — the city and the world as a whole would likely not have survived at all. \n\nYou wonder if you’ll ever have to deal with something like that when you become a superhero. Speaking of which, what is it that makes you want to be a superhero?\n*fake_choice\n    #I want to help people. Isn’t that what heroes are for?\n    #I want to help people and be recognized for my accomplishments.\n    #Not only do I want to be a hero, I want to be the best in the world!\n    #I always dreamed of being a part of a legendary heroic team like The Patriots.\n*set moniker \"Hero Sandwich\"\n*set Extroverted 60\n*set Feeling 30\n*set Selfish 20\n*set Competitive 70\n*set Bellicist 50\n*set Offense 30\n*set Flashy 60\n*set Tank 50\n*set Oliver 5\n*set April 10 \n*set Catie 20\n*set Felix 50\n*set Lex 30\n*set North 5\n*set Estelle 40\n*set Jun 40\nYou've heard that Mixed augmented are extremely sought after. They often make for good team leaders or powerful allies. You wonder if this gives you a better chance at making it as a professional superhero?\n\nThat being said, which aspect of your powers is the most fascinating to you?\n*fake_choice\n    #My Enhanced sense of balance. Like a cat, I always know how to keep myself standing upright, even in the most precarious of circumstances.\n    #My Environmental abilities allow me to find balance of any object and even alter their properties in small ways, like making a cold environment warmer or making a rough surface smoother.\n    #My Interpersonal abilities give me a kind of \"sixth sense\" when it comes to other people. I can tell what a person is like just by being around them and I subconsciously adapt to their expectations of me.\n*page_break\n*set moniker \"Inevitable\"\n*set Extroverted 10\n*set Feeling 20\n*set Selfish 80\n*set Competitive 50\n*set Bellicist 50\n*set Offense 10\n*set Flashy 30 \n*set Tank 70\n*set Oliver 20\n*set April 40 \n*set Catie 50 \n*set Felix 0\n*set Lex 30\n*set North 25 \n*set Estelle 10\n*set Jun 5\n\"The teams are based on the power level I assigned to each of you,\" Hawk steps forward, \"The strongest kid will be paired with the weakest kid to avoid imbalance, as fun as that would be,\" she smirks, \"You can read about the team leaders on your phones if you don't know them yet.\"\n\nYou look at your smartphone with the descriptions of the five team leaders popping up.\n*fake_choice\n    #Wildfire. The world-famous augmented movie star and the literal firepower of The Patriots.\n    #Transit. The irreplaceable member of The Patriots, whose teleportation abilities allow the team to quickly get to any place they are needed.\n    #Alley Cat. The most prominent superhero of New York City, whose extreme agility and speed are second to none.\n    #Link. The environmentally-conscious pacifist from the Pacific Northwest, whose healing abilities keep The Patriots alive and able to fight.\n    #RNG. The newest recruit on the team who is truly a wild card. \n*page_break\n*set moniker \"Balance\"\n*set Extroverted 20\n*set Feeling 80\n*set Selfish 30\n*set Competitive 70\n*set Bellicist 50\n*set Offense 50 \n*set Flashy 80 \n*set Tank 40\n*set Oliver 5\n*set April 0 \n*set Catie 30 \n*set Felix 0\n*set Lex 10\n*set North 20 \n*set Estelle 0\n*set Jun 0\nAssessing the threat, you see your fellow hero program coursemates defending the academy. But what about you? What is your strategy?\n*fake_choice\n    #I charge at them directly. They'll regret messing with us.\n    #We have to stop more of them from getting into the hall, I focus on defense.\n    #I'll distract the attackers, giving the students an opportunity to escape,\n    #I stay hidden and focus on targeting the most dangerous attackers.\n    #I focus on protecting the escaping students by any means necessary.\n    #I focus on healing those who were injured and helping them escape.\n*page_break\n*set moniker \"Harmony\"\n*set Extroverted 80\n*set Feeling 50\n*set Selfish 70\n*set Competitive 10\n*set Bellicist 20\n*set Offense 30 \n*set Flashy 50 \n*set Tank 10\n*set Oliver 40\n*set April 20\n*set Catie 10\n*set Felix 40\n*set Lex 50\n*set North 80\n*set Estelle 5\n*set Jun 10\nAfter the troubling events of yesterday, you consider your options.\n*fake_choice\n    *selectable_if (Oliver >= 70) #I join Oliver on his quest to confront his mother.\n    *selectable_if (April >= 70) #I join April on her important mission from Dove herself.\n    *selectable_if (Catie >= 70) #I join Catie on her quest for fortune and glory.\n    *selectable_if (Felix >= 70) #Felix joins me on my visit back home.\n    *selectable_if (Lex >= 70) #I join Lex on her pursuit to find out the truth about \"Ubermensch\".\n    *selectable_if (North >= 70) #I join North to solve some international dispute in the Arctic.\n    *selectable_if (Estelle >= 70) #I join Estelle on her otherworldly antics.\n    *selectable_if (Jun >= 70) #I join Jun to achieve his goal of becoming even stronger.\n    #I decide to remain at the academy for the holidays.", "startup": "*title Balance of Superpower\n*author Rustem Khafizov\n\n*scene_list\n    startup\n    groundzero\n    balanres\n    hawkand\n    $ balancing\n    $ fieldtrip\n    $ jailbreak\n    $ trialrun\n    $ darkestnight\n    $ epilogues\n    $ discord\n    $ firstblood\n    $ aprilmay\n    $ foxinthehenhouse\n    $ chance\n    $ lexrex\n    $ northward\n    $ overthemoon\n    $ counterbalance\n    $ trueambivalence\n    finalscreen\n\n\n*achievement friends visible 10 Making Friends \n    Get into a fight on your first day.\n*achievement powertype visible 10 Power Type Master \n    Get a power type question right.\n*achievement diet visible 10 Balanced Diet \n    Eat some delicious food!\n*achievement oz visible 10 I See What You Did There! \n    Suggest a “clever” moniker to your friend.\n*achievement boom visible 10 Kaboom!  \n    Get exploded.\n*achievement bvb visible 10 Random And Counter \n    Join RNG’s team.\n*achievement fire visible 10 Friendly Fire \n    Join Wildfire’s team.\n*achievement link visible 10 Bonding Experience\n    Join Link’s team.\n*achievement mane visible 10 Mane Character  \n    Join Alley Cat’s team.\n*achievement kansas visible 10 Home, Sweet Home\n    Join Transit’s team.\n*achievement social visible 25 Social Butterfly  \n    Speak to someone else at the party.\n*achievement books visible 25 Hit The Books  \n    Put studying above all else.\n*achievement lone visible 25 Lone Wolf  \n    Defeat a villain all on your own.\n*achievement team visible 25 Team, Work!  \n    Defeat a villain with your friends. \n*achievement carnage visible 25 Carnage \n    Stop a vicious killer. For good.\n*achievement artemis visible 25 Not On My Watch \n    Save Artemis.\n*achievement oliver visible 50 First Blood \n    See Oliver’s ending.\n*achievement april visible 50 April May \n    See April’s ending.\n*achievement catie visible 50 Fox In The Henhouse \n    See Catie’s ending.\n*achievement felix visible 50 Chance \n    See Felix’s ending.\n*achievement lex visible 50 Lex Rex \n    See Lex’s ending.\n*achievement north visible 50 Northward \n    See North’s ending.\n*achievement estelle visible 50 Over The Moon \n    See Estelle’s ending.\n*achievement jun visible 50 Counterbalance \n    See Jun’s ending.\n*achievement neutral visible 50 True Ambivalence \n    See the neutral ending.\n*achievement discord visible 100 Discord \n    See the secret ending.\n*achievement allendings visible 100 Balance Of Probabilities\n    See all endings.\n\n*create enterrio 0\n*create gotexploded false\n*create foughtjun false\n*create metmane false\n*create moniker \"???\"\n*create moniker2 \"???\"\n*create Extroverted 50\n*create Feeling 50\n*create Selfish 50\n*create Competitive 50\n*create Bellicist 50\n*create Offense 50 \n*create Flashy 50 \n*create Tank 50\n*create Oliver 0\n*create April 0 \n*create Catie 0 \n*create Felix 0\n*create Lex 0 \n*create North 0 \n*create Estelle 0\n*create Jun 0 \n\n*if choice_is_omnibus_app\n    *comment skip description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Washington D.C., 2075. You are a superpowered person at an academy for augmented people like you, but mastering your powers and making friends is hard, let alone when villains are about to strike.\n\n    Balance of Superpower is a 67,000-word interactive sci-fi romance novel by Rustem Khafizov. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n    You are Rio Ramirez — a non-binary person with the power of perfect balance, but do those powers extend to balancing school, love, and villain-fighting adventures? Will you date a girl whose body is made of an indestructible substance, or a guy whose powers randomize everything around him? Each route you choose leads to a different, unique adventure: will you go to the Moon, or chase a superpowered serial killer?\n    \n    • Play as Rio Ramirez, a non-binary superpowered person.\n    • Determine their personality! Will they be extroverted and emotional or introverted and stoic?\n    • Raise your heroic stats. Will you be a hero who values stealth, a skilled fighter or a hero who offers support to their allies?\n    • Befriend or date one of the eight other students.\n    • Ten unique endings, including a secret one.\n    • A deep, carefully-crafted world of superpowered individuals with lots of lore.\n    \n    Can you bring balance to the world on the brink of a civil war?\n\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first four chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first four chapters now for free.\n                *goto purchased\n\n    [i]You can play the first four chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2020-08-27 $3.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n\n*label purchased\n", "trialrun": "[b]Chapter 7: Trial Run[b]\n\n*temp dummyrio true\nAfter what happened at the prison, the teachers decided to call off any future field trips for the semester due to safety concerns. \n\nAs it turned out, the system malfunction was caused by a sophisticated cyber-attack by the members of the augmented supremacist group \"Ubermensch\". \n\nNo prisoners escaped except for one — Stonewall, who was the inmate with the body made of extremely durable stone. Apparently, she was a member of the group before she was arrested a few months ago.\n*page_break\nThus, you spend the majority of November focused on your studies, both academic and superheroic in nature.\n\nIt's not all studying, however, and you do get some free time. Perhaps this could be a good opportunity to get to know one of your friends better?\n\nApril is, apparently, busy due to her family visiting her.\n*choice\n    #Oliver\n        *set oliver +20\n        *goto oliverdate\n    #Catie\n        *set catie +20\n        *goto catiedate\n    #Felix \n        *set felix +20\n        *goto felixdate\n    #Lex \n        *set lex +20\n        *goto lexdate\n    #North \n        *set north +20\n        *goto northdate\n    #Estelle\n        *set estelle +20\n        *goto estelledate\n    #Jun\n        *set jun +20\n        *goto jundate\n    #Nobody, I focus on my studies instead.\n        *if selfish \u003c= 80\n            *set selfish +20\n        *set dummyrio false\n        *achieve books\n        You spend the entire month of November deeply focused on your studies. You learn a lot about science, history, civics and many other subjects. \n        \n        Learning is actually quite fun, though you do feel a bit lonely at times.\n        *page_break\n        *goto examis\n*label oliverdate\nYou catch a bit of a cold and get sent to the infirmary to meet with Dove. You wait for your appointment with her as you find yourself sitting next to Oliver in the waiting room.\n\n\"I come here every once in a while to donate blood,\" he explains, \"My body can produce blood faster than a regular human's. Plus, I'm a universal donor,\" he chuckles. \n*fake_choice\n    #\"Wow, that's pretty cool!\" you say.\n        *set extroverted +2\n        *set feeling +2\n    #\"I'll remember that in case Hawk decides to train us harsher,\" you joke.\n        *set extroverted +2\n        *set feeling -2\n        *set oliver +5\n    #\"You can help a lot of people that way,\" you point out.\n        *set extroverted -2\n        *set feeling -2\n        *set oliver +5\n    #\"That's very noble of you, Oliver,\" you praise him.\n        *set extroverted -2\n        *set feeling +2\n\"That's the least I can do,\" he says, \"You know, my mother was the one who taught me how to use my powers, only she wanted me to use them to kill. I remember her bringing small animals for me to practice on. I still have nightmares about that,\" he sighs.\n\nYou don't know how to process this, Oliver notices your reaction.\n\n\"Sorry, I shouldn't have brought this up. It's just that I've read the news about her recently. Several people have already been killed by my mother after she escaped that mental hospital,\" he laments, \"They are still trying to catch her. It's awful.\"\n*page_break\nYou spend time chatting with Oliver some more before Dove finally calls you in. She quickly fixes you up with her powers and you feel perfectly healthy again. \n\nYou leave the infirmary and make your way back to your dorm room. It was nice to spend some time with your friend, but now you have a lot of studying to look forward to.\n*page_break\n*goto examis\n*label catiedate\nYou see Catie in the dining hall sitting at the table and talking to another girl whom you haven't seen before. \n\n\"And then I was like 'As if! Those equations are soooo last century! Nobody takes that theory seriously anymore. Get a life!'\" the girl says.\n\n\"Okay, Stacy, I don't know what you're talking about, so will you be free tomorrow or not?\" Catie interjects. \n\n\"Sorry, Cat, I've got a lot of work to do, being the top student isn't easy, you know.\" \n\n\"Fine, what am I gonna do with this ticket then?\" Catie wonders out loud, then notices you, \"Hey, Rio! Do you wanna go see a movie together?\" \n*fake_choice\n    #\"Sure, that sounds awesome!\" you say.\n        *set extroverted +2\n        *set feeling +2\n    #\"A free movie ticket? Nice!\" you say.\n        *set extroverted +2\n        *set feeling -2\n    #\"Sure, I've got nothing else going on,\" you say.\n        *set extroverted -2\n        *set feeling -2\n        *set catie +5\n    #\"Thank you, Catie. That's really nice of you,\" you say.\n        *set extroverted -2\n        *set feeling +2\n        *set catie +5\n\"Great, here you go,\" she hands you the ticket, \"See you tomorrow!\"\n\nThe next day you meet Catie at the movie theater in downtown Arlington and take your seats. The theater is somewhat old-fashioned, one of those where you have to wear 3D glasses. The movie you're watching is \"The Patriots 2: The Singularity Incident\" and is a sequel to last year's film made in celebration of The Patriots' two decades of operation. \n\nIn this one, the team consists of five original members: Calamity, Tim Murdock, Wildfire, Sorceress, as well as Nonpareille, who joins the team in order to battle her evil clone known as Singularity, whose diabolical plan was to start an AI uprising against humanity. Seeing Sorceress before she went astray gives you a strange feeling, especially after meeting her in person. Of course, she is played by an actress (who actually looks a lot like her), only Wildfire plays himself.\n*page_break\nAfter the movie, you and Catie take a self-driving taxi to the academy and discuss what you just saw. \"The lead actress wasn't very good, I thought. I could've done a better job in my sleep,\" Catie begins, \"You know, I've always wanted to be a hero and an actress at the same time, someone like Wildfire, who was really good in this, by the way. I'm actually going to LA to audition for some roles during the holiday break,\" she brags.\n\nAfter reaching the academy, you say goodbye to Catie and make your way back to your dorm room. It was nice to spend some time with your friend, but now you have a lot of studying to look forward to.\n*page_break\n*goto examis\n*label felixdate\nYou find Felix at the academy's East Park by the Potomac river, overlooking Georgetown. He is practicing playing a guitar. You decide not to bother him, but step on a twig, making noise, and he notices you.\n\n\"Hey, Rio? How's it going?\" he greets you, \"You can join me, it's no problem,\" he invites you to sit next to him. \n\nYou join him at the bench and take in the scenery, \"So you play guitar?\" you break the ice. \n\n\"Yeah, it helps me clear my head. Things have been improving, but I still feel a bit lonely at times,\" he says, and noticing your curious look, continues \"A lot of people seem to avoid me, which I don't blame them for. I'd avoid me too if I could,\" he explains.\n*fake_choice\n    #\"That's a shame, but I'm sure they just need some time to get to know you better!\" you reason.\n        *set extroverted +2\n        *set feeling +2\n    #\"Don't worry about them, they're idiots,\" you say firmly.\n        *set extroverted +2\n        *set feeling -2\n        *set felix +5\n    #\"I'm not much of a people's person either,\" you admit.\n        *set extroverted -2\n        *set feeling -2\n    #\"That sounds awful, Felix. Maybe we should speak to Dove?\" you suggest.\n        *set extroverted -2\n        *set feeling +2\n\"It's not so bad, really. I used to be much lonelier, I was afraid to hurt someone with my powers, I even tried to..\" he pauses, \"I thought about ending it all many times, I even tried. Twice. But it only made things worse,\" he sighs, \"I'm glad I'm here now. I wonder if I'll be able to join the hero program the next semester?\"\n\n\"With you, anything is possible,\" you say.\n\nFelix chuckles at your joke, \"I suppose you're right,\" he starts packing his guitar, \"Well, it's nice to spend some time together without you trying to teach me not to accidentally conjure up a black hole for once. I'll see you around, Rio.\"\n*page_break\nYou say goodbye to Felix and make your way back to your dorm room. It was nice to spend some time with your friend, but now you have a lot of studying to look forward to.\n*page_break\n*goto examis\n*label lexdate\nWhen November 4th comes around, you remember that this is Lex's birthday. You buy something to gift her and find her heading towards the Sage Station.\n\n\"Happy Birthday!\" you say and present her with the gift.\n\n\"Thanks,\" she says and accepts it.\n\n\"Are you going somewhere?\" you ask, noticing her small suitcase.\n\n\"Yes, I usually spend my birthday with my aunt and uncle in Baltimore,\" she explains, \"You can come too if you want.\"\n*fake_choice\n    #\"Wow, thanks for inviting me! I'm in!\" you agree.\n        *set extroverted +2\n        *set feeling +2\n        *set lex +5\n    #\"Whoa, that's a bit sudden! Should I be worried?\" you joke.\n        *set extroverted +2\n        *set feeling -2\n    #\"Sure, I got nothing else going on,\" you admit.\n        *set extroverted -2\n        *set feeling -2\n    #\"That's a bit unexpected, but it would be nice to meet your relatives,\" you say.\n        *set extroverted -2\n        *set feeling +2\n\"They always tell me to make friends. They will be happy to see I'm not alone,\" she explains in her usual deadpan manner.\n\nYou didn't expect this turn of events, but decide to join her. You get to the Union Station via the subway and board the train together.\n\nThe high-speed train ride only takes about fifteen minutes and you soon arrive to the city. You notice how varied the architecture is: there are modern skyscrapers right next to centuries-old houses. That said, the city feels somewhat empty, a lot of the houses are decrepit and abandoned. Sadly, Baltimore gets a bad rep since Raven — the founder of The Harbingers of Doom, is from here.\n*page_break\nLex's aunt and uncle welcome you with open arms and invite you to the dinner table, filled with various treats, especially various kinds of seafood.\n\n'So, are you originally from Baltimore?\" you ask. \n\nHer relatives stay silent while Lex answers, \"D.C., originally, but I moved here when my parents died in the attack nine years ago. I have been living with Julia and Craig ever since.\"\n\n\"My apologies,\" you say.\n\n\"It has been a while. I have accepted it, and thanks to my aunt and uncle's training I was able to join the hero program,\" she explains.\n\nYou look at her relatives and realize that they both look quite athletic.\n\n\"We've been serving in the police department for decades. You learn a few moves in that time,\" explains her aunt, Julia.\n\n\"I am so glad Lex has finally made a friend! She's been a loner when she was in high school,\" says her uncle, Craig, excitedly.\n\n\"There wasn't anybody worth befriending,\" Lex states. \n\nWell, that is a compliment, right?\n*page_break\nAfter the dinner is finished, you say goodbye to Lex and her relatives and make your way back to the academy. It was nice to spend some time with your friend, but now you have a lot of studying to look forward to.\n*page_break\n*goto examis\n*label northdate\nYou decide to visit the National Mall, enjoying many of its famous landmarks. Some of them had to be rebuilt due to being destroyed or severely damaged in the Harbingers of Doom attack. Most of the damage was caused by Warcry — the invincible Icelandic juggernaut, who was slain thanks to Hawk and Sage's combined efforts.\n\nSpeaking of the attack, you notice North standing next to the monument dedicated to that tragic day. It looks like a giant black diamond with a huge scar-like fissure on it. The surface of the diamond is filled with names, thousands of them. Taking a quick glance, you even see some familiar ones. \n\n\"I remember where I was that day,\" North speaks, noticing you beside him, \"It happened shortly after I discovered my powers. I was nine. I used them carelessly and hurt my grandfather. He lost his arm because of me,\" North pauses, \"I remember sitting at the hospital with my parents, we were visiting him, then the news arrived.\" \n*fake_choice\n    #\"It wasn't your fault. You were just a kid!\" you reassure him.\n        *set extroverted +2\n        *set feeling +2\n        *set north +5\n    #\"What you did was awful, but you're not the same person anymore,\" you argue.\n        *set extroverted +2\n        *set feeling -2\n        *set north +5\n    #\"You didn't have a full control over your powers yet, you were too young,\" you reason.\n        *set extroverted -2\n        *set feeling -2\n    #\"I'm so sorry, North. It must have been horrible to go through,\" you console him.\n        *set extroverted -2\n        *set feeling +2\n\"I was young, but I had a power I should have been more responsible with, but I failed,\" he says with a heavy heart, \"You know, my grandfather wasn't even mad at me. He said 'Your augmentation is a blessing, don't be ashamed of it and use it to help people!'\" you see a tear flowing down North's face, it freezes half-way through.\n\nHe puts his hand on the monument, \"From that day on I vowed to learn to properly control my power and to use it only for the benefit of others. I don't want to allow tragedies like this to happen again.\"\n\n\"That's a noble reason to be a hero,\" you say.\n\n\"It is the only just one. Sadly, many heroes do it for questionable reasons and most only focus on their cities or their countries. I would prefer to work for something like the United Nations peacekeepers if I get the chance. They help people regardless of where they're from,\" he states.\n*page_break\nAfter your conversation is over, you leave the National Mall and head back to the academy. It was nice to spend some time with your friend, but now you have a lot of studying to look forward to.\n*page_break\n*goto examis\n*label estelledate\nYou knock on Estelle's door and realize that it's not locked. You find Estelle leaning over her desk, deeply focused on several touchscreens in front of her. You accidentally step on something metallic and Estelle jolts with a yelp. \n\n\"Whoa, hi Rio!\" she greets you, \"I'm just working on my.. project,\" she says, than thinks for a second, \"Hey, do you wanna check it out?\"\n\nWithout knowing how to react, you simply nod.\n*page_break\nWhen you get to the science lab (which you've only been to once as part of Nonpareille's class) you are amazed at what you see.\n\n\"Ta-da!\" Estelle does a dramatic gesture in front of what looks like some half-completed flying saucer.\n\n\"I know it's a bit unfinished, but I'm making progress. Just gotta figure out some calculations,\" she explains, \"I want to visit Artemis. It's been my dream since I was a kid.\" \n*fake_choice\n    #\"That's awesome!\" you say encouragingly.\n        *set extroverted +2\n        *set feeling +2\n        *set Estelle +5\n    #\"You want to get to the Moon on this?\" you say sceptically.\n        *set extroverted +2\n        *set feeling -2\n    #\"Why not just find someone else to take you. Aren't there regular flights?\" you say inquisitively.\n        *set extroverted -2\n        *set feeling -2\n    #\"Whoa, that's... pretty ambitious. Are you sure it's safe?\" you say concernedly.\n        *set extroverted -2\n        *set feeling +2\n        *set Estelle +5\n\"I always wanted to build my own ship and travel to space,\" she explains, \"I'm making sure that the ship is safe and operable. In fact..\" she pauses and looks at you, \"There might even be a room for another person.\" \n\nThe idea of going to space is amazing, but you're not sure how feasible that is. At the same time, you know that if there is anyone who can figure it out, it would be Estelle.\n*page_break\nAfter that, you leave Estelle working on her project and head back to your dorm. It was nice to spend some time with your friend, but now you have a lot of studying to look forward to.\n*page_break\n*goto examis\n*label jundate\nAfter your Augmented Education class, you realize that you forgot your phone at the gym and you return to pick it up.\n\nWhen you get there you find Jun, still vigorously training even after everyone else has left.\n*fake_choice \n    #\"Wow, you must really like working out!\" you comment.\n        *set extroverted +2\n        *set feeling +2\n    #\"Preparing for a fight, big guy?\" you jibe.\n        *set extroverted +2\n        *set feeling -2\n    #\"That's some commendable dedication,\" you say.\n        *set extroverted -2\n        *set feeling -2\n    #\"It's okay to take a break every once in a while, you know,\" you suggest.\n        *set extroverted -2\n        *set feeling +2\n        *set jun +5\nJun doesn't respond and turns his back to you, you notice that he has some kind of bar code-looking thing on his nape.\n\n\"What's that?\" you ask, without thinking.\n\n\"You don't have those in Ecuador, huh?\" he starts, \"In China, all augmented have to get an identification chip so that we can be easily located and identified,\" he points at the bar code, \"We also get ranked based on our powers and combat skills. If you're at the top, you get a lot of perks.\" \n\n\"Is that why you train?\" you ask.\n\n\"To some extent. I do want to be the strongest, but increasing my rating is pretty important too. That's why I'm going to the IWC next month,\" he explains, and seeing your puzzled look, elaborates \"That's the 'Iron Will Contest'. It's a combat tournament in China where augmented of all kinds fight each other for a prize. Makes for good TV.\"\n\nJun looks at your reaction, then adds, \"You know, you can join the contest too if you want. It would be interesting to see what we can do together.\"\n\n\"I'll think about it,\" you say. \n*page_break\nWith that, your conversation seems to be over. You find your phone and leave Jun to his training, making your way back to your dorm room. It was nice to spend some time with your friend, but now you have a lot of studying to look forward to.\n*page_break\n*goto examis\n*label examis\nYou spend the next few weeks cramming for the finals, as November zips by and December arrives. The time for the final exams of the semester is finally here. \n\nYou feel pretty confident after all the studying you have done. Your first exam is on Augmented History. \n\nYou focus on the touchscreen in front of you and answer questions that appear on the screen. You breeze through most of them, but one question in particular has you puzzled. \n\n[b]Three out of the four members of \"The Harbingers of Doom\" died during their attack on Washington D.C. on June 6th, 2066. One was captured and is now held at the \"Wake Island\" hypersecure containment facility. Who is it?[b]\n\n*if dummyrio = false \n    However, all the late night studying you did pays off and you know exactly what the correct answer is.\n*fake_choice\n    *selectable_if (dummyrio = true) #[b]Warcry[b] — a Corporal augmented whose powers grant him extreme strength and invincibility.\n    *selectable_if (dummyrio = true) #[b]Malady[b] — an Environmental augmented whose powers produce an extremely contagious and lethal virus.\n    *selectable_if (dummyrio = true) #[b]Singularity[b] — an advanced AI who has the ability to control all kinds of technology and electronics.\n    #[b]Raven[b] — a Mixed augmented whose powers produce an aura of decay and death to all living organisms near him.\nNext up, the Civics exam. Mister Murdock gives everyone a stern look. He doesn't say anything, but you can tell that whoever cheats will deeply regret it.\n\nYou look at your screen and encounter a question that gives you a pause.\n\n[b]What legal status do augmented humans have in the majority of countries around the world?[b]\n\n*if dummyrio = false \n    Again, your dedication to your academic pursuits makes the answer extremely obvious.\n*fake_choice\n    *selectable_if (dummyrio = true) #[b]Augmented[b] enjoy more rights compared to regular humans in most countries.\n    *selectable_if (dummyrio = true) #[b]Augmented[b] have equal rights to regular humans in most countries.\n    #[b]Augmented[b] have fewer rights than regular humans in most countries.\n    *selectable_if (dummyrio = true) #[b]Being[b] augmented is illegal in most countries.\nThe Science exam is a bit different from the others as it does not rely on quizzes at all. Instead, you are asked to write a short essay about a scientific breakthrough that you find to be significant.\n\nWhich topic do you choose?\n*fake_choice\n    #I write about the founding of Artemis — humanity's own colony on the Moon, in 2029. It has grown tremendously in the past forty years and is now a fully-functioning city.\n    #I write about the Oklahoma City Tornado of 2050. Though not exactly science-related, this event made Calamity a famous hero, ultimately kickstarting the creation of national superheroic teams all across the globe.\n    #I write about \"The Singularity Incident\" of 2055. Sure, that AI uprising led to technological regress as humanity chose to stick to gadgets of years prior instead of more sophisticated technology, but she was the most advanced AI in the world and a clone of Nonpareille.\n    #I write about the discovery of basic forms of life on Europa — Jupiter's moon, in 2069. This is by far the greatest scientific breakthrough in recent time!\nNow, with all of the exams for your academic classes finished, you are finally ready to take on the main test — the Hero Program's final exam of the year!\n*page_break\nYou find yourself in a huge hangar-like space, but instead of aircraft, it is filled with a maze of walls as far as the eye can see. \n\n\"Welcome to The Patriots' secret underground training facility!\" Transit announces, \"It doesn't always look like this, but we made sure to do something special for you.\"\n\n\"Listen up, kids!\" Hawk steps forward, \"I'm only gonna say this once; your task is to get to the end of the labyrinth by any means necessary. All of your skills will be tested. You can work with the others or go at it alone. I don't care, just make it to the end,\" she finishes and crosses her arms.\n\n\"Good luck, everyone! I'll be back to pick you up when you're done,\" Transit waves you goodbye and disappears.\n\nThe other students start entering the labyrinth and you decide to follow suit. You are faced with several possible entrances, which one do you pick
