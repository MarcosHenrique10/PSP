        \n        *goto anotherfork\n    #I hide behind the cars and make my way to the exit.\n        *if flashy >= 10\n            *set flashy -10\n        You duck behind the nearest car, avoiding the shots. Turns out the robots are shooting paintballs as you can see the spot where you just stood being covered with colorful paint.\n        \n        The robots stop shooting and stay motionless; they lost you. You stealthily make your way behind the cars, staying out of the robots' line of sight and leave the room.\n        \n        \n        *goto anotherfork\n*label supchallenge\nYou walk into a room where you find another student, Noir —  the goth, darkness-generating guy, who is assessing the challenge ahead deep in thought.\n\nThere is a pit in the middle of the room with a white cube (which has a heart symbol on it for some reason) lying in it. There is a large turret on the ceiling pointing directly at it.\n\nYou see the exit on the opposite side of the room, but the door is closed. There is a square-shaped indent next to it.\n\nNoir turns to you, \"I hate this,\" is all he says in a deadpan manner.\n\nSeems like you will need to get the white cube out of the pit and into the indent, but as soon as you get into the pit, the turret will likely start shooting. One of you will have to distract it. What do you do?\n*choice\n    #I tell Noir to get the cube while I distract the turret.\n        *if tank \u003c= 90\n            *set tank +10\n        You jump into the pit, and just as you expected, the turret starts shooting at you. You run around the pit, dodging the paintballs while Noir calmly descends into the pit, picks up the cube, looks at it for a few seconds, then idly makes his way to the exit and inserts it into the indent.\n        \n        Immediately, the turret stops shooting and the exit door opens. Noir bids you goodbye and leaves. You dust off some of the paint you got splattered with and leave the room as well.\n        \n        \n        *goto anotherfork\n    #I'll get the cube while Noir distracts the turret.\n        *if tank >= 10\n            *set tank -10\n        Noir sighs and jumps into the pit. The turret starts shooting at him and he dodges the paintballs halfheartedly. You jump in as well, run to the cube, grab it, then scale the wall of the pit, getting to the exit in just a few seconds.\n        \n        You insert the cube into the indent and the turret immediately stops shooting. You help Noir get out of the pit while the exit door slowly opens. Noir thanks you reluctantly and starts brushing off some of the paint that got on his black trenchcoat.\n        \n        You leave him to it as you exit the room.\n        \n        \n        *goto anotherfork\n*label anotherfork\nAfter a while, you find another fork in the road with three possible paths. Which one do you choose?\n*choice\n    #I take the path that goes upstairs.\n        *goto selfchallenge\n    #I take the path that leads into a hallway.\n        *goto compchallenge\n    #I take the path that goes downstairs.\n        *goto cistchallenge\n*label selfchallenge\nYou go upstairs and enter a room, on the other side of which you see Windbreaker, the punk girl who can control air, trapped inside of what looks like a big cylinder made of glass. \n\nSuddenly, the walls come out of the ground around you and trap you in an identical glass cylinder. A panel pops out from the ground with two buttons and a description on it.\n\n[b]Press red and you will be free, but the other stays. \n*line_break\nPress green and the other will be free, but you stay.\n*line_break\nIf both press green, both are free. \n*line_break\nIf both press red, both stay.[b]\n\nYou see Windbreaker trying to speak to you, a similar panel next to her, but the glass is clearly soundproof, so you cannot hear her.\n\nDo you trust her enough to risk failing the exam?\n*choice\n    #I press the red button.\n        *if selfish \u003c= 90\n            *set selfish +10\n        Your cylinder retracts into the floor, while Windbreaker remains trapped. You can see her sagging to the floor, totally bummed out.\n        \n        You ignore her and leave the room.\n        *page_break\n        *goto finalchallenge\n    #I press the green button.\n        *if selfish >= 10\n            *set selfish -10\n        Thankfully, both cylinders retract. Windbreaker, now free, walks up to you and gives you a fist bump.\n        \n        \"Nice, dude! I, like, knew I can trust you!\" she smiles.\n        \n        You then walk towards the exit together.\n        *page_break\n        *goto finalchallenge\n*label compchallenge\nYou go down the long hallway and end up in an area that looks like some kind of escape room. It is filled with various strange objects, puzzles and riddles on the walls. \n\nYou see Dino, the guy who looks like a human and dinosaur hybrid, trying to figure out some puzzle on the wall. You can work with him or solve the puzzle on your own. What do you do?\n*choice\n    #It's better to stick together; I offer Dino my help.\n        *if competitive >= 10\n            *set competitive -10\n        You reach out to him and he gladly accepts your help, \"I'm not much of a puzzle-solving type, I'm more into heavy-hittin',\" he admits.\n        \n        It takes you some time, but together you successfully figure out the puzzles and find a key that unlocks the exit. You continue into the next room.\n        *page_break\n        *goto finalchallenge\n    #Every person for themselves; I focus on solving the puzzle alone.\n        *if competitive \u003c= 90\n            *set competitive +10\n        You leave Dino trying to crack the puzzle alone and start analyzing the room. \n        \n        Eventually, you manage to locate the hidden switch that opens a secret door. You slide in before Dino notices and proceed to the next room. \n        *page_break\n        *goto finalchallenge  \n*label cistchallenge\nYou go downstairs and enter a room in the middle of which you see a huge flock of tiny duck-like robots. The exit is on the other side, right behind them. Getting to it will certainly result in you stepping on some of the robots.\n\nYou also realize you're not alone.\n\n\"Hurting the ducklings we must not,\n*line_break\nThere is a pathway for us to do that,\"\n*line_break\nsays Misty, the girl with a power to create mists, who is standing on a narrow passageway, hugging the wall. She is slowly inching towards the exit. You realize it will take much longer to get to it this way.\n*choice\n    #I run through the ducklings. They're just robots anyway.\n        *if bellicist \u003c= 90\n            *set bellicist +10\n        You run right through the robotic ducklings, crushing about a dozen of them in the process. \n        \n        You ignore Misty's bemoaning and leave the room.\n        *page_break\n        *goto finalchallenge\n    #I take the slower path.\n        *if bellicist >= 10\n            *set bellicist -10\n        You follow Misty's example and hug the wall on the opposite side from her, slowly moving towards the exit.\n        \n        Misty reaches the exit first and thanks you for your kindness before leaving. \n        \n        Eventually, you reach the door too and exit the room, leaving no robot ducklings harmed.\n        *page_break\n        *goto finalchallenge\n*label finalchallenge\nYou end up in a giant, ceiling-less room the size of a football field. You see all of the other hero program students entering the room from various entrances. The giant exit gate with the holographic word \"Finish\" on it is about a hundred meters away from you. You notice that the floor is divided into conspicuous square tiles. You have a bad feeling about them.\n\nThough there was no mention of a racing aspect to the test, a lot of students, especially Jun, immediately run to the exit. You and the others follow suit.\n\nSome of the tiles lit up when people step on them, causing various obstacles to appear. One student falls into a pit, another is blocked in a square-shaped cage and so on. When you consider stopping for a moment, the walls of the room start slowly closing in, and several turrets pop out of them, shooting paintballs at everyone. \n\nEveryone seems to be struggling to get to the exit, including your hero program friends. You can probably help one of them, or you can focus on making it out alone. How do you decide to approach this?\n*choice\n    #I help Oliver.\n        *set oliver +10\n        Oliver is faced with a huge robot who tries to catch him with a big net. Oliver dodges his attacks, but doesn't fight back. You run to him and use your powers to push the robot off its feet and it plops on its back, now unable to get up. Oliver thanks you and you both run to the exit.\n        \n        You go through some more obstacles and make it out of the room together.\n        \n        \n        *goto endoftheexam\n    #I help April.\n        *set april +10\n        April is helping another student get out of a cage, but can't quite lift it. With the help of your powers, you manage to find the cage's center of gravity and, with April's help, overturn it, freeing the student who proceeds to thank you profusely.\n        \n        You go through some more obstacles and make it out of the room together.\n        \n        \n        *goto endoftheexam\n    #I help Catie.\n        *set catie +10\n        You catch up to Catie, who is confidently running in the middle of the room, barely paying attention to the dangers around her. You point toward a safer route for her to take and she follows your advice. \n        \n        You go through some more obstacles and make it out of the room together.\n        \n        \n        *goto endoftheexam\n    #I help Lex.\n        *set lex +10\n        Lex is hiding behind a square pillar, hesitant to move forward. You encourage her to continue by providing some cover for her as you run.\n        \n        You go through some more obstacles and make it out of the room together.\n        \n        \n        *goto endoftheexam\n    #I help North.\n        *set north +10\n        North uses his powers to freeze the turrets on the wall and you help him by smashing them to pieces. North thanks you for your help and you run toward the exit.\n        \n        You go through some more obstacles and make it out of the room together.\n        \n        \n        *goto endoftheexam\n    #I help Jun.\n        *set jun +10\n        Jun is stuck at the bottom of a square pit, and though he is reluctant at first, he eventually accepts your help and you pull him out.\n        \n        You go through some more obstacles and make it out of the room together.\n        \n        \n        *goto endoftheexam\n    #I focus on reaching the end by myself.\n        *if selfish \u003c= 90\n            *set selfish +10\n        You are faced with various obstacles and challenges, but you mange to get through them with a mix of skill, determination and just plain luck.\n        \n        You are one of the first ones to reach the exit and cross the finish line.\n        \n        \n        *goto endoftheexam\n*label endoftheexam\nYou are faced with Hawk who gives you a slow clap, \"Not bad, kid. Just remember that this is nothing compared to a real battle, but you did well.\" \n\nAfter the other students get out as well, though you notice that some didn't make it, Hawk proclaims the final test of the year to be over. \n\nLooks like you have successfully passed the trial. Congrats!\n*page_break\nNow that your first semester at Sage Academy is officially over, you are excited for the upcoming holiday break and your first Christmas in America. \n\nDespite the dark and gloomy time of the year, the future looks bright and hopeful.\n*finish Alas...", "trueambivalence": "You decide to spend the holidays at the academy and witness the renovations it undergoes first-hand. One major change is the security cameras being installed everywhere. \n\nNot only that, apparently a lot of students left the academy, some out of their own volition while others were forced to leave by their parents. Someone mentioned that half of the student body left, including a large portion of the hero program students.\n*page_break\nYou were not the only one who decided to stay, however. Many of your fellow coursemates and other students are staying at the academy for the holidays. When there are no classes or training and not much else to do, socializing is one of the ways to pass the time. \n\nWho do you want to hang out with?\n*hide_reuse\n*label futureloves\n*choice\n    #Sami. Even though he's not on the Hero Program, he was my first acquaintance at the academy and we became close friends.\n        You hang out in Sami's dorm room at the academy's South Dorm. \n        \n        You ask him about his studies (which is one of his favorite topics) and he says, \"Diplomacy is probably one of the most relevant fields today. Superheroic diplomacy, however, is a whole another subject. Honestly, after what happened, I've realized that joining the hero program may not be such a bad idea. I'm seriously considering it. Maybe I'll even be able to join the United Nations peacekeepers. That's a heroic team made up of augmented from various countries and its roster changes every year…\"\n        \n        You and Sami continue on discussing superheroic diplomacy and augmented politics.\n        *goto futureloves\n    #Gloria. She inadvertently helped me join the Hero Program and we've become friends, though her natural shyness can be hard to deal with sometimes.\n        You find Gloria at a quiet corner of the academy's East Park and strike up a conversation.\n        \n        When you ask her what her academic plans are, she says, \"I've been focusing a lot on the arts, especially writing. It's weird, really. I've never really wanted to be a hero, but I'm not so sure after what happened. In any case, I would love to write a book or a video game about them,\" she looks at you with a smile, \"Hey, maybe I should include you in one of my stories! What do you think?\"\n        \n        You continue like this for a while, sharing your own plans for the upcoming semester.\n        *goto futureloves\n    #Dino, the dinosaur guy, likes to work out and shows you how to improve your physique.\n        You exercise together at the academy gym. Dino finishes bench pressing gigantic weights and checks up on how you're doing.\n        \n        You struggle, to say the least. \n        \n        \"Hey, take it easy, buddy! No need to be rough, you gotta develop the strength first! Don't rush it!\" he says as he pats you on the back.\n        \n        You decide not to tell him that part of the reason you struggled was because you were distracted by his impressive muscles and you continue to work out together.\n        *goto futureloves\n    #Windbreaker, the girl who can control air with her break dancing skills, is really chill and fun to hang out with.\n        You and Windbreaker are relaxing at the southern part of the island, overlooking the Potomac river. The view is beautiful, but you shiver due to December winds.\n        \n        \"Yeah, it's a bit chilly, but not as bad as it gets up in Concord,\" she comments, noticing your predicament.\n        \n        \"Where's that?\" you ask.\n        \n        \"New Hampshire. Lots of dope nature, but it's sooo boring to live in,\" she laments.\n        \n        \"You know, I never actually learned your name,\" you admit to her, deciding to change the subject.\n        \n        \"Oh, I usually don't mention it. It's kinda weird,\" she says.\n        \n        \"What is it?\"\n        \n        \"Amethyst. My dad was a huge fan of some old cartoon. It's, like, really embarrassing. Just call me Amy,\" she says.\n        \n        You continue chatting, sharing your plans for the upcoming semester.\n        *goto futureloves\n    #Noir, the goth guy with the ability to control darkness, is pretty cool.\n        You find Noir at the cafeteria, fervently typing something on his tablet.\n        \n        He notices you and says, \"Oh hi, Ron, was it? I'm writing lyrics for my album. The attack the other day gave me a lot of inspiration.\"\n        \n        \"It's Rio,\" you correct him, \"Do you play music?\" you ask.\n        \n        \"Not yet, but I'll learn soon enough. I already have a name for my band, it's called 'Alice and Midnight',\" he declares with pride, somehow still managing to sound disinterested.\n        \n        \"That's cool! Who else is in your band?\" you ask.\n        \n        Noir looks at you for a moment, than quickly starts typing something on his tablet mumbling \"I knew I forgot something...\"\n        \n        You decide not to bother him any longer.\n        *goto futureloves\n    #Misty, the rhyming, mist-controlling oddball is never boring to be around.\n        You find Misty reading a book at the academy library. Even though most studying materials are digital, there are still some paper-back options too.\n        \n        Misty notices you and smiles, \n        *line_break\n        \"Thank you, my Rio,\n        *line_break\n        You're as brave as a leo. \n        *line_break\n        You and your friends,\n        *line_break\n        Came to academy's defense.\n        *line_break\n        Standing proud and tall,\n        *line_break\n        You've saved us all,\"\n        *line_break\n        She recites, looking at you with awe.\n        \n        \"Thank you, Misty!\" you say sheepishly.\n        \n        \"I often daydream,\n        *line_break\n        Of us being on the same team.\n        *line_break\n        Doing good deeds, \n        *line_break\n        And serving the public's needs.\"\n        \n        \"I'm sure that might happen next semester,\" you say.\n        \n        Misty smiles and nods, then returns to her book. You decide to leave her be.\n        *goto futureloves\n    #Flourish, though he may be a bit snobby, he certainly does have a good taste in things.\n        You find Flourish at a greenhouse in the academy's Central Park, which has a beautiful garden in it. He looks at the flowers with a concerned expression.\n        \n        He notices your presence and speaks with a posh accent, \"The flowers are distraught. They expect a terrible threat to befall us. There is a certain sorrowful beauty to them, don't you think?\" \n        \n        You're not sure how to respond, and he adds, \"Nevermind, it is unfair of me to expect you to understand the subtle nature of such a delicate being. My apologies,\" he says, his voice not sounding all that apologetic. \n        \n        You decide not to press the issue and leave him be.\n        *goto futureloves\n    #Meme, the girl who can clone herself, is probably the funniest person you've ever met.\n        You walk into the gym's stadium, where your Hero Program classes took place, and see dozens of Meme's clones doing various activities. One is doing push-ups, the other is running around the court while another is fervently reading a book.\n        \n        You notice one that looks out of place; she seems to be sleeping on the bleachers. You walk up to her and she wakes up, startled. Suddenly, the other clones poof out of existence.\n        \n        \"What?\" she looks at you, then around the gym, \"Oh, man! Now I gotta create them all again!\"        \n        \n        \"Oh, sorry,\" you apologize.\n        \n        \"It's okay. They help me do tasks. I receive memory from each clone after they poof. Helps with homework and stuff, though it takes time to convince them to do anything! Why are they so lazy?!\" she complaints. You decide not to answer.\n        *goto futureloves\n    #I'm done talking to the students.\n        *goto badnews\n*label badnews\nBeside the other students, you get a chance to and you decide not to bother him any more.\n        *goto teachtalk\n    #I'm done talking to the teachers.\n        *goto realbadnews\n*label realbadnews\nThroughout the next few weeks, you hear various troubling news from around the world.\n*fake_choice\n    #There have been more isolated attacks by the augmented supremacists all over the world.\n        *goto theendisnine\n    #There was some kind of diplomatic standoff in the Arctic between Canada, Norway and Russia.\n        *goto theendisnine\n    #A group of augmented separatists briefly took over the Moon colony Artemis.\n        *goto theendisnine\n    #The anti-augmented sentiment grew to unprecedented levels, to the point where a presidential candidate with such views is leading in the polls.\n        *goto theendisnine\n*label theendisnine\nMost troubling of all, you get the news from Ecuador; there was a volcanic eruption near your hometown of Quito. Your parents contacted you and said they are okay, but your house is now covered in volcanic ash.\n*page_break\nOne day, you are invited to the principal's office, where you find Dove and Hawk sitting and drinking some tea together. Well, Dove is drinking tea while Hawk is sipping on some black coffee, to be exact.\n\n\"Hey, ${moniker}, how are you doing?\" Hawk asks. \n\n\"Good, you wanted to see me?\" you say, turning to Dove.\n\nDove finishes sipping on her jasmine tea and faces you, \"Yes, I was wondering about how you are handling everything, Rio. If there is anything we can do to help, just ask.\"\n\n\"Hey! Speak for yourself!\" Hawk shouts.\n\nDove raises an eyebrow at her, \"So you say you do not want to help a student in need, Brenda?\" she says with a hint of cheekiness. You've never seen her so emotive before.\n\n\"Well I didn't say that! Just messing with you, it's too easy,\" Hawk responds.\n\n\"I guess I have some questions, if you don't mind,\" you say.\n\n\"Depends on the question,\" Hawk starts, \"but we can probably tell you most things, though we might have to kill you afterwards,\" she adds, jokingly.\n\nDove rolls her eyes and turns to you, \"Please, ask away,\" she says.\n*hide_reuse\n*label dovehawktalk\n*choice\n    #\"What's the deal with all the cameras?\"\n        \"Getting straight to the point, huh? I like it!\" Hawk says, then adds, \"It's some new regulation we have to abide by.\" \n        \n        \"I understand your concerns, but this is meant to ensure the safety of every student at the academy,\" Dove explains.\n        *goto dovehawktalk\n    #\"Is it a problem that so many students left?\"\n        \"It is, but it's something for us to worry about,\" Hawk answers. \n        \n        \"Many students left, because I failed to keep the academy safe for them, but I promise that it will be a safer place for everyone, including the many new students joining the academy next semester,\" Dove explains.\n        \n        \"This girl!\" Hawk points at Dove, \"She takes everything so personally, even though it's not her fault some fanatics decided to start a civil war,\" she faces Dove, \"Just because you were born a few minutes earlier, doesn't mean you have to take everything upon yourself, Eve!\" \n        \n        \"I am the principal, Brenda. The safety of the students is my responsibility, no matter the circumstances,\" Dove says coldly.\n        *goto dovehawktalk\n    #\"Will the Ubermensch attack again?\"\n         \"It.. is possible,\" Dove admits, \"but we are prepared to protect the students if that happens.\"\n         \n         \"If they decide to show up again, they'll get their behinds kicked even more than the last time!\" Hawk adds, \"I'll make sure to increase the training regimen for the next semester, so that you guys are prepared for a real fight.\"\n         *goto dovehawktalk \n    #\"Do you always argue like this?\"\n         Dove and Hawk look at each other, than laugh. You've never seen Dove laugh before, it sounds nice.\n         \n         \"Pretty much!\" H
