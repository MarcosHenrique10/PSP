ably not your business, better just leave it be. The strange noise continues, but it's not loud enough to be too distracting. You finish unpacking and prepare to leave for the ceremony.\n                    *line_break\n                    *goto leaveroom\n    #I'm just gonna crash on the bed and try to get some rest before the event.\n        You set a quick alarm on your smartphone and plop down on the large bed, without bothering to take off your gray hoodie. At least you took off your shoes first.\n        \n        You are awaken by some strange noise, and it does not sound like your alarm clock. Rather, it is a faint thumping sound which seems to be coming from behind the wall, likely from the other room.\n        *choice \n                #Investigate it!\n                  *goto estelle  \n                #Ignore it!\n                    Whatever that sound is, it is not worth waking up for. You still have a half-hour before you need to head out, so you might as well get some more rest. You cover your ears with a pillow and drift off back to sleep.\n                    *line_break\n                    *goto leaveroom    \n*label estelle \nYou leave your room and walk up to the door next to your room. The noise is louder here, it sounds almost like a construction work is underway. Perhaps the room isn't finished yet?\n\nYou knock on the door and the noise suddenly stops. You can hear someone walking towards it and when it opens you see the girl from earlier, still wearing her strange outfit which makes her look like a mix between an astronaut and a motorcyclist. Without her helmet, you can see that she is a young black girl likely the same age as you or perhaps slightly younger. Her hair is dyed into a deep shade of purple.\n\nYour examination of her unusual outfit is interrupted when she asks, \"Hello?\" Can I help you?\" Her voice is friendly, but it is obvious by its tone she is surprised to see a stranger knock on her door. She has a slight accent that you can't identify.\n\nDoes she not realise the noise can be heard from the outside?\n*fake_choice \n        #\"Hi! I'm your next door neighbor. I heard a noise coming from your room. Are you alright?\"\n            *set extroverted +2 \n            *set feeling +2 \n            *set Estelle +5\n        #\"You're making a ruckus. You do know there are other people around, right?\"\n            *set extroverted +2\n            *set feeling -2\n        #\"There was a noise coming from your room, what are you doing?\"\n            *set extroverted -2 \n            *set feeling -2 \n        #\"Sorry, I just heard a loud noise coming from your room. Do you need help?\"\n            *set extroverted -2 \n            *set feeling +2 \n            *set Estelle +5\n*set est true\n\"Noise?\" the girl looks confused, she looks back towards the inside of her room. You get a glimpse of various mechanical-looking equipment strewn about the floor. The girl faces you again.\n\n\"Oh, that? Sorry, I was unpacking my tools, didn't consider it would be loud enough to bother anyone,\" she looks at you for a moment, \"I still have a few things to set up, so sorry for the inconvience. My name is Estelle, by the way.\"\n\n\"Rio,\" you introduce yourself.\n\n\"Nice to meet you, Rio. Well, I'll see ya around,\" she says, about to close the door.\n*choice \n    #\"Wait, maybe I can help?\"\n        *set selfish -5 \n        *set estelle +10\n        *goto weirdscience\n    #\"Okay, bye!\"\n        *set selfish +5\n        *goto leaveroom\n*label weirdscience \nEstelle sizes you up for a moment, \"Okay, be my guest,\" she opens the door, inviting you in and you walk inside her room.\n\nYou have never seen a bigger mess in your whole life. There is various scientific equipment lying all over the place. The desk and the bed are barely recognizable under all the piles of mechanical tools and various pieces of electronics. It looks more like a room of a mad scientist than that of a college student. For a second, you consider fleeing this forsaken place, but decide against it.\n\n\"Yeah, I expected this reaction,\" she says while trying to stifle a laughter, \"I'm here for the science course, as you can probably tell. This is some of the equipment I brought from home.\"\n\nSome? How much equipment does this girl have?! Maybe you should have escaped after all…\n\n\"Let's begin, shall we?\" Estelle suggests nonchalantly.\n*page_break Thirty minutes later...\nYour muscles ache and your back hurts. Who would have thought that engineering equipment could be so heavy? Even your powers didn't help too much, though they were useful when you two were setting up some of the more delicate contraptions.\n\nThe work isn't even done yet, but you had to leave, lest you be late for the opening ceremony. Estelle said she will soon be heading out as well.\n\nNot wanting to be late, you leave the dormitory complex and walk towards the main hall of the academy.\n*page_break\n*goto powerass\n*label leaveroom\nWhen the metaphorical clock strikes twelve, you are already prepared to head out. Not wanting to be late, you leave your dorm complex and walk towards the main hall of the academy.\n*page_break\n*goto powerass\n*label powerass\nYou and all of the other students are gathered in the huge assembly hall with a large amphitheater in the back. You recognize some of the teachers, including the principal — the hero known as Dove, who is sitting near the stage. Her sister Hawk beside her.\n\nDespite being twins, they could not be more different. Dove is slender and ethereal, whereas her sister has the complexion of a bodybuilder, her big muscles looking like they could burst through her leather jacket at any moment.\n\nYou look around and notice Sami, who waves at you from one of the front rows. He points at the empty seat to his left. There are plenty of available seats elsewhere, as well.\n*fake_choice\n    #I'll sit next to Sami.\n        Sami greets you in perfect Spanish and you chat for a few minutes, sharing your first impressions of the academy.\n        \n        \n    #I'll sit somewhere else.\n        You find a seat next to a guy whose entire body seems to be made of plants, with flowers of various colors adorning his head like a flower garland. He is dressed in an expensive-looking suit and has an air of nobility to him. He scoffs at you taking a seat next to him, but doesn't voice his objection further and focuses his gaze on the stage.\n        \n        \nShortly after, Dove herself enters the stage. She looks like an angel or some other celestial creature from myths and legends. She has large white wings behind her back, long white hair and pale blue-colored eyes. \n\nDove overlooks the students and begins, \"Welcome, everyone! My name is Evelyn Allen, but you might have heard my other name — Dove, I am the principal and co-founder of this academy. We here at the Sage Academy are glad to have such a promising gathering of bright young students attend our school!\"\n\nShe gives off an awe-inspiring presence, yet you feel at peace somehow. All your worries and anxieties seem to be disappearing. Is that one of her superpowers?\n\nDove introduces the other teachers, some of whom you recognize as members of The Patriots. One of them, the former FBI agent and the only non-augmented member of the team, steps forward.\n*page_break\n\"Greetings, everyone. My name is Tim Murdock. I’m a proud member of The Patriots and your future Civics teacher. As you may already know, this academy accepts both regular and augmented students. This makes Sage Academy truly unique among its competitors. However, it comes at a cost. To insure the safety and security of our non-augmented students, we require complete transparency about your powers.”\n\nYou can hear muffled whispers from the crowd of students around you.\n\nTim continues, “You will introduce yourselves one by one and demonstrate your abilities to everyone. This information is used to determine your power proficiency level. It also helps to show to the regular students, who comprise about a half of the student body, that they have nothing to be afraid of.” \n\nAudible gasps can be heard from some of the augmented students around you, including the one beside you.\n\nSo you have to demonstrate your powers in front of everyone? How do you feel about such a prospect? \n*fake_choice \n    #It doesn't sound so bad. Besides, it could be a good way to get to know everybody!\n        *set extroverted +5\n        *set feeling +5\n    #Bring it on! I'm gonna show everyone what I'm made of!\n        *set extroverted +5\n        *set feeling -5\n    #I'm not thrilled. They treat us like circus clowns.\n        *set extroverted -5\n        *set feeling -5\n    #I'm terrified. Talking in front of a crowd is bad enough, let alone demonstrating my abilities!\n        *set extroverted -5\n        *set feeling +5\nAnd so, one by one, the augmented students enter the stage and introduce themselves, then they demonstrate their special abilities.\n\nThe students at this academy are truly outstanding! You see a wide array of powersets — wind powers, laser beams and cloning, among others. There was even a guy who looks like a human/dinosaur hybrid!\n\nThat said, whose performance impressed you the most?\n*fake_choice\n    #The guy with cryokinetic powers was really cool! Not only did he display an impressive control over his power, but he even created various beautiful sculptures made of ice!\n        *set north +5\n    #The girl whose body is made of some weird yellow material that is, apparently, extremely durable. Most people were impressed, but some, especially the non-augmented students, were a little freaked out.\n        *set April +5\n    #The guy who cut his arm a little to cause bleeding, only to then manipulate his own blood and force it to speed up the healing process, completely closing the wound.\n        *set Oliver +5 \n    #The girl whose powers granted her overwhelming charisma and how she charmed the entire room. You even wondered if this was love at first sight at first! She also clearly enjoyed being on the stage the most.\n        *set Catie +5 \n\"Rio Ramirez?\" Tim Murdock announces your name, bringing you back to reality.\n\nWell, it's your time to shine! You leave your seat, walk up the stage and face the crowd.\n\nThis is it. How do you want to approach this? \n*choice\n    #Let's do something flashy! They will definitely remember me!\n        *set flashy +5\n        \"I'm Rio. I'm from Ecuador and my superpower is…\" you suddenly dash forward and jump into the crowd, causing surprised gasps. You land on the back of an empty chair in the front row, standing on your tippy toes, yet not causing the chair to move at all, as if you are weightless. \n        \n        \"..perfect balance!\" you raise your hands triumphantly. The audience looks impressed and many people are clapping.\n       \n        You finish your performance by jumping back onto the stage and doing a handstand, by balancing your entire body on your index finger, after which you get back on your feet and bow to the crowd before exiting the stage. \n        \n        Even Tim Murdock is taken aback, but recovers his bearings and announces the next student.\n        *page_break\n        *goto counter\n    #Just do something basic. I'd rather not stand out too much.\n        *set flashy -5\n        \"I'm Rio. I'm from Ecuador. My superpower is my sense of balance. I can also find balance of various objects,\" you take one of the empty chairs from the front row and walk back to the center of the stage.\n        \n        You then throw the chair directly above you. The chair flies into the air and spins a few times before landing right on your index finger, balancing on one of its legs.\n        \n        You then use your other hand and start spinning the chair in place. Even though it looks precarious, the chair's spinning is perfectly still, as if it is bolted to your finger.\n        \n        The audience seems impressed, though some of them seem confused about your powers. You place the chair back where it was and leave the stage while Mr. Murdock announces the next student.\n        *page_break\n        *goto counter\n*label counter\nThe next student enters the stage with a confident stride. He is an East Asian guy, dressed in an all-black outfit. His hair is jet-black with red highlights. He walks up to the edge of the stage and faces the crowd with a confident grin.\n\n\"My name is Jun Ying. Make sure to remember this name, because I'm the strongest augmented in this academy, and soon I will become the strongest superhero in the world!\" he proclaims.\n\nThe audience reaction is mixed, with most being taken aback, while some others giggle at this strange introduction.\n\n\"If you don't believe me, I'll show you. But, instead of a simple demonstration, how about we make it more interesting? I challenge all of you to a sparring match. Right here, right now!\"\n\nA murmur arises from the audience. You see Dove looking concerned. She turns to her sister and they start arguing about something.\n\n\"Any volunteers?\" Jun asks impatiently.\n*choice \n    #Sounds interesting. I'm not gonna turn down a challenge. I get up the stage.\n        *set bellicist +5\n        *set Competitive +5\n        *set jun +10\n        *achieve friends\n        *goto battol\n    #I'm not a fan of pointless violence. I'm not interested.\n        *set bellicist -5 \n        *set Competitive -5\n        *goto maddie\n*label battol\n*set foughtjun true\nYou walk up the stage to Jun's apparent delight.\n\n\"Glad to see there are people with some guts at this school!\" he comments, \"Just a heads up — my power allows me to counter the superpowers of others.\"\n\nYou see Dove about to step in, but being held back by her sister. Hawk looks at you with a smirk and gives you a thumbs up.\n\n\"So, shall we begin?\" says Jun, who have already assumed a battle stance.\n\nWhat's your strategy?\n*choice \n    #Attack first, ask questions later. If he adapts to my abilities, than it would be better to finish this quickly.\n        *set offense +5\n        Thanks to your power, you are able to shift your body's center of gravity and momentum in a way that significantly increases the power of your physical attacks.\n        \n        You rush towards Jun, who just stands in place with his fists up. When you are about to use your deadly punch, you suddenly completely lose your balance and tumble faceforward into Jun, who sidesteps out of your way, letting you hit the floor with a thud. \n        \n        You attempt to get up, but feel way too dizzy to do so.\n        *page_break\n        *goto junwin\n    #Let's play defense for now. I don't know what he can do yet, so I'd better be cautious.\n        *set offense -5\n        Your superpower allows you to keep an unwaveringly solid stance, which makes you virtually impossible to knock down.\n        \n        Jun looks at you and starts casually walking towards you. You keep your guard up and prepare for an attack, but instead he just walks up to you and lightly pushes you with the palm of his hand. \n        \n        Suddenly, you feel dizzy and cannot even stand on your feet properly. You fall back on the ground, unable to keep your balance. You attempt to get back, but it's no use.\n        *page_break\n        *goto junwin\n    #Let's put on a good show! If I'm lucky, he'll be too confused to attack effectively.\n        *set flashy +5\n        You can perform various acrobatic moves and maneuvers akin to a professional gymnast thanks to your powers. \n        \n        You circle around Jun, while throwing in some unpredictable jumps and a few pirouettes, hoping to bait him into attacking you. \n        \n        However, Jun just stands there, motionless. He's not even looking at you. When you attempt to get closer, you feel dizzy and are suddenly thrown off balance. You try to use your powers, but that just makes things worse and you drop to the ground.\n        \n        You attempt to get up, but feel too dizzy to do so.\n        *page_break\n        *goto junwin\n    #I'm gonna hold back and wait for an opening, then end this with a single precise attack.\n        *set flashy -5\n        You know where everybody's center of gravity is and, with a single precise touch, you should be able to push Jun's body off balance and knock him off his feet.\n        \n        Jun sizes you up for a moment, than rushes towards you. You dodge his attack, but something seems strange, like you were suddenly drunk or dizzy. Jetlag, perhaps? \n        \n        You dodge another attack and see the opening you were looking for. You manage to perform your sophisticated attack on him, but nothing happens. Jun seizes the moment and pushes you with the palm of his hand, causing you to somehow lose your balance and tumble backwards. \n        \n        You attempt to get back up, but are unable to do so due to the feeling of vertigo that has overtaken you.\n        *page_break\n        *goto junwin\n*label junwin\nJun walks up to your sprawled body. \"Not bad, but you need to work on your strategy,\" he says, then turns back towards the crowd, \"Who's next?\" \n\n\"We don't have all day, mister Ying,\" you hear Tim Murdock say, \"Unless you have other hidden powers, I advise you to get back to your seat.\"\n\nJun shrugs and exits the stage. Dove flies up to you and checks your physical condition. Despite the fall and dizziness, you feel perfectly fine now.\n\nDove helps you get up and you leave the stage to return to your seat.\n*page_break\n*goto chapterfinale\n*label maddie\nYou decide to remain seated and shortly after you see an intimidating-looking girl striding confidently towards the stage. She has a short blond hair and is dressed in a punk fashion, popular decades ago.\n\n\"Glad to see there are people with some guts at this school!\" Jun comments.\n\n\"Heh, I won't pass a chance to put some pip-squeak in his place!\" the girl declares with a slight Southern twang.\n\nYou see Dove about to stand up and step in, before being stopped by her sister Hawk. Hawk looks at the two combatants and smirks.\n\n\"We'll see about that,\" Jun frowns, \"And just so you know, my power allows me to counter the superpowers of others.\"\n\n\"Whatever, tough guy, try to counter..\" she puts her hands in front of her, \"…this!\" \n\nA huge explosive force unleashes out of the girl's hands and engulfs her opponent, sending a shock wave throughout the room.\n*page_break\nWhen the dust settles, Jun is still standing in the same position he was before, completely unharmed. The girl looks surprised. Jun attempts to move toward her, but is suddenly stuck due to his left leg falling through the stage's floor as if he was a ghost. \n\nThe girl doesn't seem to react to it and rushes towards him with her hands prepared for another blast. She is stopped however, when Dove swiftly flies in front of her.\n\n\"Enough!\" she yells. \n\nThe girl looks at Jun who meets her eyes with a smirk. She is about to create another explosion when her hand is suddenly grabbed by Hawk, who got there in a flash.\n\n\"I wouldn't do it, unless you want to lose this arm, kid.\"\n*page_break\nYou see the frustration on the girl's face, she loosens her arm and walks off the stage.\n\nJun seems to have figured out how to turn off his ghost-like powers and managed to get back on his feet.\n\n\"We should try this again some time!\" he shouts to the explosive girl and is promptly slapped on the back of his head by Hawk.\n\n\"Shut it, tough guy.\" \n*page_break\n*label chapterfinale\nThe remainder of the ceremony goes without any major accidents. The augmented students kept introducing themselves and their impressive powers. You have never seen so many augmented people in one place.\n\n*if (est = false)\n    There were also people you have already met like Sami or the flying spacesuit girl, whose name is Estelle, you found out.\n*if (est = true) \n    There were also people you have already met like Sami and Estelle.\nEstelle was actually late to the ceremony. When her name was announced, she was nowhere to be seen, until she suddenly flew through the assembly hall's entrance, dressed in her spacesuit, and landed right on the stage. Judging by the audience's astonished reaction, she made a grand entrance.\n*page_break\n*set enterrio 2\n[i]Now you can read the information about all of the teachers and staff at the academy! Throughout the game, other important lore bits and trivia will be available. You can access them from your Stats Screen.[/i]\n\nWow, that was exhausting! The ceremony took more than three hours to complete, and with the jetlag still giving you a mild headache, now you want nothing more than to go back to your dorm room and get some well-deserved rest.\n*finish", "hawkand": "[b]Chapter 3: Between Hawk and Buzzard[b]\n\nThe day of the beginning of the Superhero Program has finally come! This is your first definitive step on becoming a real superhero. You wake up way earlier than necessary, get dressed and leave your dorm room.\n\nWhen you get to the large gym complex, you see a lot of other students who have already assembled inside. The huge stadium-like building has an interior reminiscent to that of a hockey stadium, but without the ice. The main area of the stadium is surrounded by bleachers, separated from the center by giant walls made of very thick glass. Bullet-proof, perhaps?\n*page_break\n\"Can I take a selfie with you?\" you hear a voice from a group of students, surrounding a girl who looks anxious about being the center of attention. \n\n\"Um.. Okay, sure,\" the girl answers meekly.\n\n\"It's so wonderful that you follow your father's footsteps! Did you choose your heroic name already? Can you tell us? Please?\" April joins the conversation.\n\n\"Well.. I haven't picked one yet..\" the girl answers sheepishly.\n\n\"Wow, I can't believe the daughter of Antonio Garcia himself is my schoolmate!\" the selfie girl chimes in again. You recognize her as the girl with the charming powers from the opening ceremony. She has a fiery red hair, green eyes, and is dressed according to the latest fashion trends.\n\nWait, did she just say Antonio Garcia? Wasn't that the name of the actor from that famous \"Hot Pursuit\" franchise? Wait, isn't he also a member of The Patriots? Surely, he can't be…\n\n\"'Hot Pursuit 5' is my favorite one! I practically grew up on your dad's movies!\" somebody shouts.\n*fake_choice \n    #Autograph! Now! You practically jump through the crowd to get it.\n        *set selfish +5\n    #As much as I'd like it, she really doesn't seem to enjoy the spotlight.\n        *set selfish -5\nThe girl, overwhelmed by all of the attention, looks like she is about to faint. Luckily for her, Hawk lands in front of the crowd of students.\n\n\"Are you done dawdling, kids? We don't have all day, get to your seats!\" she barks.\n\nThe students disperse from the girl and she breathes a sigh of relief. You decide not to anger the ferocious teacher and walk to the bleachers.\n*page_break\nLooking at her now, you notice that Hawk and Dove are indeed twins after all, though aside from their similar facial features almost everything else about them is different. Hawk's short hair and wings are dark shade of auburn unlike Dove's which are snow-white. Her eyes are also deep yellow as opposed to Dove's pale blue.\n\n\"Alright, kiddies. Let's skip the pleasantries and get right to it!\" Hawk shouts, snapping you out of your thoughts, \"So you all think you've got what it takes to be superheroes?\" she looks at all of the students assembled on the bleachers. They are pensive, unsure as to whether they are supposed to respond or not.\n\n\"You look more like a bunch of wimps to me,\" she smirks. \"Do you think being a hero is easy? Do you even know what it's like to fight a real supervillain? Saving innocent lives? Do you honestly think you've got what it takes?\" She says in a voice even more intense than before. You feel a wave of intimidation rush through you. Part of you really wants to just call it quits right now.\n*choice\n    #\"Yes, I do!\" you shout.\n        *set Competitive +5\n        Hawk looks it at you with a mix of confusion and curiosity.\n        \n        \"Who are you again?\" she turns back to the others, \"Well, if you greenhorns want to risk your lives so badly; we're gonna have ourselves a little trial.\"\n        \n        \n        *goto baka\n    #\"Yes, we do!\" you shout.\n        *set Competitive -5\n        A dead silence follows, then other voices start shouting as well, echoing your statement. \n        \n        Hawk looks genuinely surprised, a subtle smile appears on her face for a brief moment, \"Good, you'll need that confidence for what comes next.\"\n        \n        \n        *goto baka\n    #I'm not gonna shout anything. I'll see what happens.\n        \"I do!\" you recognize the voice of the guy from yesterday. Jun, was it?\n    \n        Hawk looks at him and lets out a snide laugh, \"Oh, I remember you! You're the little snot who thinks he's the toughest kid on the block, right?\" she looks at Jun, who glares back at her defiantly.\n    \n        \"Well, don't worry. I've got something interesting prepared for you. All of you, in fact,\" a devilish smile crosses her face.\n        \n        \n        *goto baka\n*label baka\nShe walks to the center of the stadium and turns around, \"I will split you into pairs and you will fight each other until you manage to knock out or otherwise incapacitate your opponent. The winner gets to join the hero program, the loser goes home.\"\n        \nGasps of horror and worried looks spread through the crowd around you.\n        \nIs she for real? Would you really have to pack your bags if you lose?\n*fake_choice\n    #Sounds horrible! The students shouldn't have to fight each other to become superheroes.\n        *set bellicist -5\n    #Sounds fair to me. If you can't hold your own against another student, you won't be able to fight off a supervillain.\n        *set bellicist +5\n\"First up, Kelly and Morris. Get down here!\"\n\nApril leaves her seat and joins the teacher. \n\n\"Miss.. Hawk? Do we really have to fight each other to pass?\" April looks at Hawk and pleads, \"Maybe there is a different way to test us? I understand that we need to be able to fend for ourselves, but do we rally need to kick people out? I get that..\"\n\n\"Are you done?\" Hawk asks impatiently, \"You've heard what I said, didn't you? You fight or you get lost. The door is that way,\" she points at the door in the back of the gym.\n\nApril sulks, but doesn't move. Her opponent takes the spot opposite to her and takes a battle stance. He is a beefy guy, whose muscles rival those of Hawk herself, who leaves the two combatants and joins you and the others on the bleachers.\n\n\"Fight!\" she barks.\n*page_break\nApril just stands there with a sheepish smile, unmoving, as her opponent strikes her several times with his massive arms, seemingly hurting himself more than her. \n\n\"Sorry, my body is very durable, but your attacks are very strong, too! Don't give up!\" she says, genuinely trying to reassure him.\n\nHer opponent's frustration is obvious and he starts punching harder, but to no avail. Angry, he backs away and takes a running start, putting all of his strength into his attack. He runs into April at full speed and bounces off of her, falling hard on the floor.\n\n\"Okay, enough of this. Kelly passes! Next up, Williams and Fox!\" Hawk announces.\n\n\"You did great! I'm sure you'll pass next time!\" April reassures her opponent, helping him get back up. He doesn't respond and just sulks and gets back to his seat.\n*page_break\nThe next \"battle\" ends before it could even properly begin. \n\nThe selfie girl just looks at her opponent and asks, \"Would you please let me win?\"\n\n\"Okay! I give up!\" the girl she is supposed to fight eagerly replies.\n\n\"Another victory for Catie Fox!\" the selfie girl performs a theatrical bow to the crowd, \"Was there ever any doubt?\" \n\nHawk frowns, but grants her victory. The other students clap and you feel the urge to follow suit.\n\nWhat do you think of this display?\n*fake_choice \n    #Boooring! I wanted to see some actual fighting!\n        *set bellicist +5\n    #Well, at least nobody got hurt!\n        *set bellicist -5\n    #Her powers are pretty awesome! I wish I could do something like that!\n        *set catie +5 \n    #Her powers are quite terrifying! I'm glad I wasn't her opponent.\n\"Well that was a snore-fest!\" Hawk gripes, \"Let's do something more exiting now. Ying, White, you're next!\"\n\nJun and a guy with snow-white long hair enter the stadium. You recognize him as the cryokinesis user from the ceremony.\n\nJun is eager to begin, his body adapts to his opponent's chilly aura and starts emitting fire and his hands are now ablaze. His opponent calmly walks up to him and offers him a handshake.\n\n\"Nice to meet you. I'm North. Let's do our best, okay?\" he offers a friendly greeting. Jun is surprised, but returns the gesture.\n\nHawk places a hand on her face, \"Okay, enough pleasantries! Just get to the fighting already!\" \n\nThe two opponents return to their spots and begin the battle.\n*page_break\nWhat comes next is nothing short of epic. The two duke it out, flames and ice flying everywhere as the combatants themselves fight throughout the entire stadium. Even the thick glass wall is all covered in ice now. Well, now it definitely looks more like a hockey stadium…\n\nWhile following the battle, you notice Dove overlooking the action from the commentator's booth high up near the ceiling.\n\nYou begin to understand why you were forced to fight two at a time; not only is it safer for everybody, but you also get an opportunity to learn from others' techniques.\n\nSpeaking of which…\n*fake_choice \n    #Jun's relentless offense gives me a few ideas.\n        *set offense +5\n    #North's immaculate defense is quite inspiring.\n        *set offense -5\nThe battle of ice and fire continues until both of them finally collapse on the floor, exhausted. Hawk flies up to check on them, Dove joins her shortly.\n\n\"Huh, seems like we've got our very first draw! I guess they both lose then!\" Hawk laughs. \n\nDove gives her a dirty look. Hawk sighs, \"You know that I'm joking, right? They both pass,\" Hawk shakes her head.\n\nDove takes the two unconscious fighters and flies through the opening in the roof.\n\nHawk looks at the remaining students, \"Okay, let's not waste any more time. Next up, Garcia and Ramirez!\"\n*page_break It's your turn…\nYou are placed against the shy girl from earlier. You get in the middle of the stadium, still covered with ice walls and burnt floorboards. Your opponent looks like she would rather be anywhere else than here. You can tell she doesn't want to fight. That said, you don't have much of a choice.\n\nHow are you going to approach this?\n*choice \n    #I go on the offense, better finish this off quickly.\n        *set offense +5\n        *if (foughtjun = false)\n            Thanks to your power, you are able to shift your body's center of gravity and momentum in a way that significantly increases the power of your physical attacks.\n            \n            \n            *goto gloriaruns\n        *goto gloriaruns\n    #I take a defensive stance, I don't know what she is capable of yet.\n        *set offense -5\n        *if (foughtjun = false)\n            Your superpower allows you to keep an unwaveringly solid stance, which makes you virtually impossible to knock down.\n            \n            \n            *goto gloriaruns\n        *goto gloriaruns\n    #I will confuse her with my erratic movements, rendering her attacks ineffective.\n        *set flashy +5\n        *if (foughtjun = false)\n            You can perform various acrobatic moves and maneuvers akin to a professional gymnast thanks to your powers. \n            \n            \n            *goto gloriaruns\n        *goto gloriaruns\n    #I will hold back and wait for an opening, then end this with a single precise attack.\n        *set flashy -5\n        *if (foughtjun = false)\n            You know where everybody's center of gravity is, and with a single precise touch, you can push your opponent's body off balance and knock her off her feet.\n            \n            \n            *goto gloriaruns\n        *goto gloriaruns\n*label gloriaruns\nBefore you can do anything, however, the girl vanishes into thin air without a trace.\n\nIs she invisible? Did she teleport, perhaps? You prepare to defend yourself, expecting an attack from any direction, but nothing happens.\n\nAfter a few seconds, the door to the gym suddenly opens and closes, though there is nobody entering or leaving. At least not anybody you can see. \n\nDid she just run away?! The rest of the students are as bewildered as you are. Hawk regains her composure the fastest and declares, \"Well, I guess it's a win for Ramirez, then.\"\n\nYou did it! You made it into the Hero Program! Even though it feels a little anticlimactic. Why did that girl run away, anyway?\n*choice\n    *selectable_if (selfish \u003c=40) #I run after her. Something isn't right here.\n        *set selfish -5\n        You run towards the exit. Hawk doesn't try to stop you and you hear the names of the next combatants being announced before you exit the gym. You look around, trying to locate the girl, which could be extra hard if she's still invisible. \n        \n        After some searching, you spot her cyan coat. She is sitting on a bench in the academy's square park, lined with marble statues of superheroes, most of whom you don't recognize. \n        \n        You walk up to her and she turns to you.\n        *choice\n            #\"Hey, is something the matter? You can tell me. I won't snitch, I promise!\" you say, trying to cheer her up.\n                *set extroverted +2\n                *set feeling +2\n                *goto thetalk\n            #\"What's wrong with you? What was that back there?!\" you demand irritatedly.\n                *set extroverted +2\n                *set feeling -2\n                *goto thetalk\n            #\"You lost. Why did you run away?\" you ask directly.\n                *set extroverted -2\n                *set feeling -2\n                *goto thetalk\n            #\"Um.. Sorry, did I do something wrong?\" you ask apologetically.\n                *set extroverted -2\n                *set feeling +2\n                *goto thetalk\n    #It's not my problem. I made it, that's all that matters.\n        *set selfish +5\n        *goto notalk\n*label notalk\nYou get back to your seat, reveling in the fact that you are one of the winners today.\n\n\"Next up, Reed and Tyler!\" Hawk announces. Those names sound kinda familiar, don't they?\n\nIndeed, you recognize the two combatants. The first is the girl with the monotonous voice from the history class. The other is the girl with the power to create explosions named Madison. \n\n\"You're not augmented, right?\" Madison asks. The girl gives her an expressionless nod.\n\n\"Ooh, I'm going to enjoy this then!\" Madison laughs to herself. \n\nShe then points her hand at the girl and blasts a huge explosion at her. The girl manages to dodge and take cover behind one of the ice walls left standing from another fight. Without a second thought, Madison creates another blast, obliterating the ice wall completely, but the girl manages to escape again and hide behind another obstacle.\n*page_break\nIt continues on like this for a while. Madison blasts yet another ice wall while her opponent skillfully dodges and hides behind the next one.\n\n\"Stop running and fight, you twerp!\" Madison roars, her movements becoming noticeably slower and more exhausted.\n\nMadison rages and storms towards a larger wall, where the girl is hiding, and explodes it with a huge blast. The monotonous girl uses this opportunity to get closer to Madison and performs a perfect takedown move, pinning Madison to the ground, with her hands locked behind her back. It takes a second for Madison to process what happened and try to wrestle out of the girl's grip.\n\n\"Don't move. I will have to break your arms otherwise,\" the girl states dispassionately.\n\n\"You b..!\" Madison tries to shout but is silenced by the floor.\n\nHawk flies down to them, \"Not bad! Especially for an ordinary human! What's your name. kid?\"\n\n\"Lex,\" the girl answers curtly. She releases Madison who seems understandably devastated by the loss.\n\n\"Better luck next time, kiddo,\" Hawk taps her on the shoulder. Madison ignores her and storms out of the gym.\n*line_break\n*goto battolchoice\n*label thetalk\n\"I.. I didn't want to become a hero. I just.. My parents. They really wanted me to join the hero program, so I just thought..\" she pauses, trying to compose herself, \"I didn't want to disappoint them, but it was just too much for me.\"\n                \nYou stand there dumbfounded. So she just wanted to appease her parents?\n                \n\"I'm fine, really. I'm glad it's over. It would've been worse if I got into the program,\" she gives you a forced smile, \"You should probably head back, miss Hawk might get angry. Well.. angrier than before.\"\n*page_break                \nWith that, you return to the gym, where the next two combatants are already going at it. You recognize both of them. The first is the girl with the monotonous voice from the history class. The second.. well.. even if you didn't see her you'd recognize her explosive powers.\n\n\"Stop running and fight, you twerp!\" Madison roars. Her opponent swiftly avoids her explosions and hides behind the ice walls left from the other fight.\n\nMadison rages and storms towards a larger wall, where the girl is hiding, and explodes it with a huge blast. The monotonous girl uses this opportunity to get closer to Madison and performs a perfect martial arts move, pinning Madison to the ground, with her hands locked behind her back. It takes a second for Madison to process what happened, before she tries to wrestle out of the girl's grip.\n\n\"Don't move. I will have to break your arms otherwise,\" the girl states dispassionately.\n\n\"You b..!\" Madison tries to shout but is silenced by the floor.\n\nHawk flies down to them and whistles, \"Not bad for a regular human! What's your name. kid?\"\n\n\"Lex,\" the girl answers curtly. She releases Madison who seems devastated by the loss.\n\n\"Better luck next time, kiddo,\" Hawk taps her on the shoulder. Madison ignores her and storms out of the gym, pushing you out of the way when she gets through the door. \n\nYou get back to your seat and watch as the remaining battles unfold.\n*goto battolchoice\n*label battolchoice\nAside from Lex, there were other regular human contenders, but none of them managed to defeat their augmented opponents. \n\nOther augmented students were quite impressive as well. Which of them stood out to you the most?\n*fake_choice \n    #The punk girl who was air bending with break-dancing moves!\n    #The guy whose body is made of plants defeated his opponent in a theatrically dramatic fashion.\n    #The girl who filled the entire stadium with mist and spoke in rhyme.\n    #The girl who created a bunch of clones of herself and unleashed a ninja-style beatdown on her opponent.\nFinally, it looks like everyone has had their turn. Well, almost everyone.\n\n\"Clarke, seems like you're the last one, so you're gonna fight against me,\" Hawk announces and enters the stadium.\n\nThe guy with crimson red hair joins her. \n\n\"So you can manipulate blood, correct?\" Hawk asks.\n\nThe guy nods.\n\n\"Are you related to Bloody Mary?\"\n\n\"Yes, she is my mother,\" the guy answers grimly. He has an English accent.\n\nBloody Mary? Wasn't that the name of a notorious supervillain? You hear audible gasps from the remaining students, all but confirming your suspicion.\n\n\"This should be interesting then. Let's begin, shall we?\" saying that, Hawk instantly flies towards the guy, covering the distance between them in less than a second. He attempts to dodge her attack, but is nevertheless sent flying backwards by it.\n*page_break\nYou think that the fight is already over, but the guy manages to get back on his feet. He is covered in bruises and scratches from the impact. He closes his eyes and concentrates, his wounds start to disappear. \n\nBefore he is completely healed, Hawk charges him again. This time, she grabs him and throws him into the wall. He hits it with a loud crack.\n\nHe manages to get up again, his arm hanging limply like it's dislocated. He again concentrates and forces his arm back in its place.\n\nAnother attack. Hawk grabs him and flies upwards towards the roof and throws him back down. The guy falls a good thirty feet before he hits the floor. He lies there motionless. \n*page_break  This is brutal...\nMiraculously, the guy isn't dead and starts to slowly get back up again. Hawk lands next to him.\n\n\"So, are you going to attack me today or should I just keep throwing you around?\" \n\nThe guy gets back on his feet, his face covered in blood. He turns to Hawk, \"I’m sorry, but I want to become a hero not to harm people, but to help them.\"\n\n\"Really? Didn’t your mother teach you a few things?\"\n\n\"She did, and I refuse to be like her,\" he says firmly.\n\nHawk looks at him incredulously, \"Even if it means letting an enemy kill you?\" She grabs him by the shoulder and pulls him closer to her face, \"Listen, kid, if you’re not willing to go all-out to stop a bad guy from killing you or someone else, you might as well quit right now. I’m feeling generous today, so I’m not gonna kick you out of the program, but you’d better take it seriously next time, got it?\"\n\nThe guy turns his eyes away from her, \"Yes..\" \n\nHawk lets out a heavy sigh, \"Another bleeding heart.. You’re so much like her, it's insufferable!\" She looks at his bloody clothes and shoos him away, \"Now go get yourself cleaned up!\"  \n*page_break\nShe turns towards the few of you still on the bleachers, \"Alright, the show is over, kiddies. You can go to your classes or whatever else you've got going on. I'll see you on Monday. Same time, same place.\" \n\nShe pauses for a second, \"And make sure to come up with your superheroic names, too. I'm not gonna bother remembering all of your full names!\" With that, she flies through the opening in the roof of the stadium and disappears. \n\nWow, you have actually made it! And did she say something about superheroic names? Anyway, what do you make of Hawk — Sage Academy's co-principal and the head of the Superhero Program?\n*fake_choice \n    #Teacher of the year she is not.\n        *set bellicist -5\n    #Favorite teacher hands down!\n        *set bellicist +5\n    #I'm just glad to make it out in one piece.\n        *set selfish +5\n    #I just hope nobody got seriously injured.\n        *set selfish -5 \nAfter all of this excitement, you are glad to go back to something more sedentary. Case in point, History class.\n\nProfessor Evans talks about the emergence of the first national superheroic teams in the 2050's and 60's, with \"The Patriots\" being the first in the world. \n\nHe also tells you about the other prominent heroic teams from around the world. Many nations have their own national teams, but only a handful of them function on an international level.\n\nWhich team do you want to read about?\n*hide_reuse\n*label teamstart\n*choice\n    #The Patriots.\n        Name: The Patriots\n        *line_break\n        Headquarters: Washington D.C., USA\n        *line_break\n        Members: 9\n        *line_break\n        Founded: 2054\n        *line_break\n        Leader: Calamity\n        \n        The Patriots were the first national superheroic team in the world. The first member and the leader of the team is Calamity. The team's roster has changed throughout the years, nearly a half of the original 13 members died during the supervillian attack of 2066. The most recent recruit is RNG.\n        *goto teamstart\n    #The European League.\n        Name: The European League\n        *line_break\n        Headquarters: Brussels, Belgium\n        *line_break\n        Members: 40\n        *line_break\n        Founded: 2060\n        *line_break\n        Leader: Groundwork\n        \n        The superheroic team of the European Union consists of 40 members, one from each EU state. The roster of this team changes from mission to mission, depending on the most suitable powersets. Some members are more prevalent than others. Some countries picked their best heroes to be a part of the League, whereas others picked heroes that didn't make it into their main superheroic teams.\n        *goto teamstart\n    #The Five Stars.\n        Name: The Five Stars\n        *line_break\n        Headquarters: Beijing, China\n        *line_break\n        Members: 5\n        *line_break\n        Founded: 2055\n        *line_break\n        Leader: Vermilion Dragon\n        \n        The five members of the team represent different parts of China, including the disputed regions like Taiwan and Xinjiang.\n        *goto teamstart                \n    #The Guardians of India.\n        Name: The Guardians of India\n        *line_break\n        Headquarters: New Delhi, India\n        *line_break\n        Members: 7\n        *line_break\n        Founded: 2064\n        *line_break\n        Leader: Plethora\n        \n        Colloquially known as \"Shaptam\", or \"seven\", the members of the team represent the seven main ethnic groups in the country.\n        *goto teamstart\n    #The African Defense Unit.\n        Name: The African Defense Unit\n        *line_break\n        Headquarters: Lagos, Nigeria\n        *line_break\n        Members: 6\n        *line_break\n        Founded: 2068\n        *line_break\n        Leader: Rotates each year between the six members, currently Suncatcher.\n        \n        Despite the name, only a handful of countries are represented in this team: Nigeria, Egypt, South Africa, Ethiopia, Djibouti and the East African Federation.\n        *goto teamstart\n    #The Three Bogatyrs.\n        Name: The Three Bogatyrs\n        *line_break\n        Headquarters: Moscow, Russia\n        *line_break\n        Members: 3\n        *line_break\n        Founded: 2062\n        *line_break\n        Leader: Titan\n        \n        Named after the folk tale about three mighty heroes, this team stands out in that it is made up entirely of Corporal augmented.\n        *goto teamstart\n    #I'm done reading.\n        *goto continue \n*label continue\n*set enterrio 4\n[i]The information about the major superheroic teams has been added to your Stats Screen![/i]\n\n\"Hey, Rio,\" April calls out to you when the class is over, \"Did you pick your heroic name yet? Let me guess..\"\n\n\"No, I haven't decided yet,\" you quickly respond, preventing her from going on another one of her rants.\n\n\"Oh, really? Me neither. I'm not really sure what to pick. Do you have any suggestions?\"\n*fake_choice\n    #Goldie.\n        *set moniker2 \"Goldie\"\n        *goto happyappy\n    #April Fool.\n        *set moniker2 \"April Fool\"\n        *goto happyappy\n    #Yellow Loud.\n        *set moniker2 \"Yellow Loud\"\n        *goto happyappy\n    #Oz.\n        *set moniker2 \"Oz\"\n        *achieve oz\n        *goto ozappy\n    #Something else…\n        *input_text moniker2\n        *goto happyappy\n*label ozappy\n*set april +5\n\"Ooh, I like that one! It's like a reference to me being from Australia, but also Oz as in 'The Wizard of Oz' and that whole yellow brick road thing.. Yeah, that's really good, Rio! Thank you!\" she rambles excitedly.\n\nWell, guess she likes it at least. Professor Evans walks in and you focus on the upcoming class.\n*page_break\n*goto badday\n*label happyappy\n*set april +5\n\"Thank you so much!\" April says, filled with joy.\n\nWell, hopefully you picked something good. Professor Evans walks in and you focus on the upcoming class.\n*page_break\n*label badday\nWith all of the classes done for today, you are walking towards your dorm building when you suddenly hear…\n\n\"I'm sorry, okay? Stop! Please!\" the screams are followed by what sounds like a punch and a sound of something heavy hitting the floor.\n\nYou walk towards the sound and end up behind one of the studying halls where you find Madison standing over a student you don't recognize who is cowering on the floor.\n\n\"Trash like you should know his place!\" she kicks the guy in the stomach.\n*choice\n    #Intervene.\n        *gosub trial_end\n        *set selfish -5\n        You walk towards them. \n        \n        \"You're just a stupid normie! Why would I want to be friends with your kind?!\" Madison snarls and prepares for another kick. \n        *fake_choice \n            #\"Madison, stop! How could you do this to him?!\"\n                *set extroverted +2\n                *set feeling +2\n                *goto badend\n            #\"Hey, leave him alone, you jerk!\"\n                *set extroverted +2\n                *set feeling -2\n                *goto badend\n            #\"Get away from him. Now.\"\n                *set extroverted -2\n                *set feeling -2\n                *goto badend\n            #\"Stop it, please! Why are you doing this?!\"\n                *set extroverted -2\n                *set feeling +2\n                *goto badend\n    #Leave.\n        *gosub trial_end\n        *set selfish +5\n        You leave before Madison notices you. Who knows why she was beating another student, maybe he deserved it? \n        \n        In any case, Madison is pliments your work, informing you that Felix is now ready to join the other students. You have completed your end of the bargain and now you do not have to meet with him on the weekends, though he will join your academic level so that you can help him if necessary.\n\nBeing finally allowed to attend classes with the other students made him quite happy, though the same cannot be said about the other students, a large portion of whom was wary of his presence.\n\nThankfully, there were people like April and Sami who were always friendly and accommodating to him, though in April's case, she herself is a bit of an outcast.\n*page_break\n\"So, who are you going to be for Halloween? Or is it a secret?\" April addresses the question to Felix, but seems to be asking everyone else at the cafeteria table, which includes you and Sami.\n\n\"I haven't really thought about it,\" Felix answers somewhat detachedly.\n\n\"Well, I think I might pull off Link, I like his philosophy,\" Sami comments.\n\n\"It will be great, I promise! I actually volunteered to help decorating the place, though I do need some help. Are you guys interested?\" April asks, excitedly.\n\n\"Sorry, April, I have to finish my essay on the break-up of the United Kingdom in the 2020s,\" Sami explains.\n\n\"Yeah, I have a lot of homework, too. I almost regret having to attend classes now,\" Felix jokes. \n\n\"What about you, Rio? Can you help me, please?\" April asks you, doing her best puppy dog eyes.\n*choice\n    #I agree to help, I want to spend more time with April.\n        *set April +20\n        *goto aprildate\n    #I decline, I have other matters to attend to.\n        \"It's alright, I understand,\" April says with a smile.\n        \n        \"You said you needed help with the Halloween decorations?\" you almost jump when Lex seemingly appears out of nowhere. She really is stealthy.\n        \n        \"Yes! Will you help me?\" April asks excitedly.\n        \n        Lex nods with a determined look in her eyes.\n        \n        This whole conversation made you wonder what it would be like to celebrate Halloween in America for the first time.\n        *page_break October 31st\n        *goto crowprison\n*label aprildate\nYou and April meet after the classes at the main hall of the academy and start decorating it with various pumpkins, black cats, bats and other quintessential Halloween decor while chatting.\n\n\"I've always loved Halloween, it's so exiting! Everyone gets to express themselves and not be judged for it,\" April comments while setting up a poster on the wall.\n\n\"Is that why you like it?\" you ask, while placing a skeleton on one of the chairs.\n\n\"I guess. I'm used to receiving weird looks from people. Being Corporal puts you in a strange position, even other augmented treat you differently,\" April admits.\n*fake_choice\n    #\"I'm so sorry April. Personally, I think you're awesome!\" you say, trying to cheer you up.\n        *set extroverted +2\n        *set feeling +2\n    #\"Those people are morons. Don't listen to them!\" you say passionately.\n        *set extroverted +2\n        *set feeling -2\n    #\"Don't pay attention to them, they're not worth it,\" you say calmly.\n        *set extroverted -2\n        *set feeling -2\n        *set April +5\n    #\"I'm really sorry to hear that, April. It's terrible how cruel people can be sometimes,\" you say sympathetically.\n        *set extroverted -2\n        *set feeling +2\n\"You know, it's weird. Corporal come in many forms, some have bodies that are extremely different from regular humans, while others are almost indistinguishable from them. Yet they're all called Corporal and put in the same category, but Enhanced are put in a separate one, even though their powers are also related to the body, I don't really get it.\"\n\nYou contemplate her words as you continue setting up the decorations. You wonder what it would be like to celebrate Halloween in America for the first time.\n*page_break October 31st\n*goto crowprison\n*label crowprison\nWhatever scenario you had in mind, visiting a heavily-guarded prison for supervillians was probably not one of them.\n\nYou ruminate on that as Mister Murdock, your teacher for today, continues his lecture, \"This is the 'Blackfoot Facility' — the second most secure supervillain prison in the nation, second only to the hyper-secure 'Wake Island' compound in the Western Pacific. Right now we are in a classified location in Montana, which is why miss Rice was kind enough to get us here.\" \n\nIndeed, the journey was quick thanks to Transit. You wonder how long it would have taken to get here via conventional means.\n*page_break\n\"The supervillains held here are dangerous, but not on the planetary or national level,\"  Mister Murdock continues.\n\nAs you and the other hero program students listen to Mister Murdock, you look around the prison. It feels like you are inside of a submarine as the entire place seems really narrow and claustrophobic, with no access to natural light. The walls are made of some sturdy-looking black metal. You can even see some of the cells. They look like they belong on a spaceship, with futuristic interiors and red forcefields which separate them from you. Combined with the walls, the whole place has a daunting black and red look to it. \n\nSome inmates stare intently right at you while others ignore your presence completely. Which cell catches your attention?\n*fake_choice\n    #I look at the cell of some guy who makes origami out of dollar bills and seems to manifest new bills out of thin air whenever he likes.\n        \"Wow, wish I had his power!\" Catie comments, watching the inmate create a new one hundred dollar bill.\n        \n        \"You'll probably end up in jail too in that case,\" North adds coldly.\n        \n        \"Only if I get caught,\" Catie responds with a sly wink. North doesn't return the gesture.\n        *page_break\n        *goto sorcie\n    #I look at the cell with a huge augmented whose body is made of solid stone. They are sitting quietly in the corner of the cell, almost like a statue.\n        \"Hmm, wonder what type of weapon can pierce this armor,\" Jun comments, deep in thought.\n        \n        You notice April staring at the inmate intently with a mix of concern and sympathy on her face.\n        *page_break\n        *goto sorcie \n    #I look at the cell where the inmate is lying on the bed and having violent convulsions in their sleep.\n        \"This is so inhumane. This prison is designed to keep these people in a constant state of despair,\" Oliver comments.\n        \n        \"Even so, they have to be isolated from society. They are too dangerous,\" Lex states dispassionately.\n        \n        Oliver gives her a look of pity, but doesn't respond.\n        *page_break\n        *goto sorcie \n*label sorcie\nYou follow mister Murdock and pass by another cell. Inside, there is a man with a strange helmet, which covers his entire face except for his eyes, which have a menacing look to them. You have a feeling that you have seen him before, but cannot recall where.\n\nYou join the others as they walk by another cell. Through the red forcefield you see a bright room with a woman floating in the air in a meditative pose. Various objects float around her: books, eating utensils and even the plastic chair. \n\n\"it's Sorceress! From The Patriots!\" another student points at her.\n*page_break\nThe woman opens her eyes and looks at you with a mix of curiosity ans smugness, \"Glad they haven't purged me from the history books yet,\" Sorceress says with a light smile, than turns to your teacher, \"Recruiting them while they're young, aren't you, Tim?\"\n\nMister Murdock looks at her with an annoyed expression while Sorceress faces the other students, \"I used to be just like you, wanted to do good for the world, believed that catching supervillains was a way to help.\"\n\n\"Certainly better than becoming one,\" Lex responds coldly. \n\n\"I'm not a villain, I want to stop evil more than anyone else here does,\" Sorceress says with a hint of frustration, \"And I have the courage to know what needs to be done,\" she looks around her cell, \"This.. this is a waste of space. Villains must be eliminated for the world to be safer, keeping them here will only contain them temporarily while others like them run amok.\"\n\n\"Believing that you have the right to kill people makes you as bad as anybody else here, miss Sheridan,\" Mister Murdock says sharply.\n\n\"Why so formal? We were friends, weren't we?\" she asks mockingly.\n\n\"We were, before you decided to betray us and go rogue.\"\n\n\"I never betrayed you. I was committed to our mission to stop evil. You were the ones who were too cowardly to do what's necessary,\" she says with venom in her voice.\n\n\"What you did [i]was[/i] evil. You were just too blinded by revenge to notice,\" Murdock rebukes. For the first time ever you hear him speak with so much emotion in his voice.\n\nSorceress is about to respond, but suddenly..\n*page_break Darkness...\nThe red emergency lights switch on and a loud siren starts blaring throughout the prison. \n\nMister Murdock looks around with a concerned look on his face, \"Something is wrong, let's go!\" he barks and points you and the other students towards the exit. \n\nAs you approach the exit, the red forcefields on all of the cells suddenly switch off. The villains are now free to get out! The hallway leading towards the exit suddenly gets blocked by thick emergency gates. You are trapped. Not only that, half of your classmates were ahead of you and are now on the other side of the gate. You can hear them knocking on it desperately.\n*page_break\nYou hear panicked murmur from the remaining students around you. Mister Murdock presses a hands-free device on his ear and says, \"Transit, we've got a code orange here. Get here as soon as you can and bring backup,\" he signals you and the other students to get behind him.\n\nYou see some inmates walking out of their cells with curious looks. Some look ecstatic, while most look confused and worried.\n\n\"Well, well, well. Seems like I've got some old friends visiting,\" says a menacing voice behind you.\n*page_break\n*if metmane = false\n    It's Mane. The supervillian who attacked your classmates a few weeks ago! The restraining helmet he was wearing before now lies on the floor beside him.\n\n*if metmane = true\n    It's Mane. The villain you encountered on your field trip to NYC! He looks even more menacing than he did that day. The restraining helmet he was wearing before now lies on the floor beside him.\n\nMister Murdock stands in front of you with a futuristic gun in his hands. Mane raises his tentacle-like hair, about to attack.\n\nSuddenly, his body is thrown with incredible force into the wall to his right. Behind him, you see Sorceress. She floats in the air with various objects swirling around her like a small tornado. She looks furiously at Mane who is slumped on the floor, barely conscious.\n\n\"Scum like you must die,\" Sorceress spits out the words and launches a bunch of chairs at him with her telekinetic powers.\n\nBefore you can even react, April jumps in front of Mane and blocks all of the projectiles with her body. She seems unharmed, but her expression shows that it was not painless.\n\n\"What are you doing, girl?! He is not worth it!\" Sorceress screams, devastated by what happened.\n\n\"He's bad, but I don't want him to die and as someone who wants to be a hero, I can't let you hurt him!\"\n*choice\n    #I join April and stand with her, protecting Mane.\n        *set tank +10\n        *set april +5\n        You run to April and take a defensive stance in front of Mane, prepared for another attack. April gives you a look of appreciation.\n        \n        Sorceress looks at you both with disgust, \"People like you is why villains are running amok. You let them walk all over you because of your fairytale morals,\" she says coldly.\n        \n        \n        *goto sorciemad\n    #I check up on Mane to make sure he is not dying.\n        *set tank -10\n        *set april +5\n        You run to Mane, who is still lying on the floor motionless. You notice he has a bloody wound on his head and you start healing it with your powers. April gives you a look of appreciation.\n        \n        Sorceress looks at you both with disgust, \"People like you is why villains are running amok. You let them walk all over you because of your fairytale morals,\" she says coldly.\n        \n        \n        *goto sorciemad\n    #I stand where I am. I don't want to protect a supervillian.\n        *if selfish \u003c= 95\n            *set selfish +5\n        Sorceress looks at April with disgust, \"People like you is why villains are running amok. You let them walk all over you because of your fairytale morals,\" she says coldly.\n        \n        \n        *goto sorciemad\n*label sorciemad \nThe objects around her falter for a second, before starting to swirl with new intensity. The look in her eyes tells you that she's not going to hold back even if it means hurting a student.\n\n\"Drop your weapons or I'll shoot, Tara!\" you hear Murdock say. His voice is ice cold, with no trace of pity in it.\n\n\"Oh, now you call me by my name, huh? We both know that I can stop the bullet, Tim. I'd prefer not to hurt you if it can be avoided. I'm here for [i]them[/i],\" she looks at the inmates peering out of their cells behind you. \n\nSuddenly, the blocked exit gate is smashed through and in comes Calamity with a knocked out inmate on her shoulder. Transit and the other students, unharmed, behind her.\n*page_break\nCalamity looks just like she does on TV — tall, muscular and dressed in an outfit that mixes a classic superheroic look with a cowgirl get-up. \n\nShe gives you and the other students a friendly smile and greets you in her thick Southern accent, \"Howdy, y'all! Everybody feeling okay?\" She then looks at Sorceress and her expression changes to that of sadness and pity.\n\n\"Hello, darling. I missed you so very much!\" Sorceress says mockingly.\n\n\"Tara, we've done this song and dance enough. You know how this is gonna go. Just leave the kids alone and go back to your cell.\"\n\n\"Oh, we've done a LOT of things together, Jane. But you prefer girls with wings these days, don't you?\"\n\nCalamity lets out a sigh and puts the knocked out inmate in Transit's hands, cracks her joints and strides toward Sorceress before tuning to you, \"Okay, kids. Play time is over, go back to school. The adults need some time to talk.\"\n\nYou and the other students get through the busted door and join Transit, who starts teleporting everybody out. Before you disappear, you see Calamity engaged in a vicious battle with Sorceress, debris and telekinetic projectiles flying everywhere.\n*page_break Later that day.\nThough the memories of what just occurred haunt you, the Halloween party at the academy provides some necessary distraction. \n\nThe party looks quite elaborate — there is a dance floor, lots of food and is that Nonpareille as the DJ?!\n\nMany students are dressed in colorful costumes, some original while others based on characters from movies, games and other forms of popular media. Somewhat ironically, the wackiest costumes are mostly worn by non-augmented students.\n\nYou are especially impressed with…\n*hide_reuse\n*label costumestart\n*choice\n    #Oliver dressed as a vampire.\n        He is even sipping on a red-colored drink from a champagne glass, adding to the look. \n        \n        Hopefully, it's just berry punch.\n        *goto costumestart\n    #April dressed in a yellow square-shaped outfit.\n        You're pretty sure it's based on the titular character from an old cartoon.\n        \n        April seems to be genuinely enjoying herself despite all the craziness that occurred earlier today.\n        *goto costumestart\n    #Catie dressed as Cleopatra in an elaborate ancient Egyptian attire.\n        Catie uses this opportunity to wear something risque. Well, more risque than usual, that is. Not only that, she managed to convince a bunch of students to wear mummy costumes and carry her around on a litter with an elaborate throne on it!\n        \n        Fittingly for Catie, everyone notices her flashy entrance.\n        *goto costumestart\n    #Felix dressed as some musician.\n        It's some rock star from the end of the last century you don't remember the name of.\n        \n        You can tell that being in a group of so many people makes Felix excited and concerned in equal measure.\n        *goto costumestart\n    #Lex dressed as a witch.\n        Seeing Lex at a party is surprising enough on its own, not to mention her costume looking extremely intricate and well-made. She clearly put a lot of effort into it.\n        \n        She seems to be enjoying the Halloween aesthetics so much, you decide not to disturb her.\n        *goto costumestart\n    #North dressed as a snowman.\n        He is dressed in a bulky, cheesy snowman outfit which makes it hard for him to walk.\n        \n        Clearly, he has a kind of self-deprecating sense of humor.\n        *goto costumestart\n    #Estelle dressed as an alien. \n        Appropriately for her, she picked a stereotypical green alien outfit.\n        \n        Also typical for her, she made a functioning chair-sized flying saucer which she is floating on.\n        *goto costumestart\n    #Jun dressed as.. himself?\n        When you ask him about it, he just looks at you as if you asked him why the sky is blue, and says, \"People dress as someone they want to be. I want to be myself.\" \n        \n        He takes in the scene of the party and shakes his head, \"This whole thing is a waste of time. I'm outta here.\"\n        \n        Before you can even attempt to stop him, he storms off. \n        *goto costumestart\n    #I look at my own costume in a mirror.\n        *goto riocostume\n*label riocostume\nBy the way, what costume are you wearing?\n*choice\n    #Just something basic. I don't want to stand out too much.\n        *if flashy >= 5\n            *set flashy -5\n        You dressed as a character from an obscure movie series from the 2020s. Someone's parents might recognize you, but most people here are too young to get the reference.\n        *goto threeduos\n    #I'm wearing an elaborate costume. I will stand out for sure!\n        *if flashy \u003c= 95\n            *set flashy +5\n        You dressed as a character from a hugely popular recent show. You notice knowing looks and approving nods from the other attendees. \n        *goto threeduos\n*label threeduos\nYou walk around and see a few people you recognize. North and Oliver are sitting at the couch in a corner and seem to be discussing something. \n\nNot far from them, you see Catie descending from her throne with the help of her mummy servants to get some punch. April approaches Catie and seems to be telling her something. \n\nOn the other side of the room, near the exit, the unlikely duo of Felix and Estelle seem to be arguing about something. Who do you join?\n*choice \n    #I join North and Oliver.\n        *goto noliver\n    #I join Catie and April. \n        *goto aprilcat\n    #I join Estelle and Felix.\n        *goto festelle\n    #I'll see who else is around.\n        *achieve social\n        *goto samigloria\n*label noliver\nYou walk towards the guys who are engaged in a passionate discussion.\n\n\"Oliver, I truly respect your convictions and dedication to pacifism, but there may come a time when you will have to use your powers to harm someone in order to save lives,\" North objects with a genuine concern.\n\n\"I understand your perspective,\" Oliver calmly responds, \"but I do not believe that harming someone is the only way to save people. There is always another way, and unfortunately, a lot of people in our profession tend to assume that there isn't.\"\n\n\"It's true that some use violence out of convenience, because they don't want to bother putting the effort into finding a better solution, but it's also obvious that you're not the type of person who would do that,\" North comments.\n\n\"Yes, but I have to stay true to my principles,\" Oliver states.\n\nYou were about to join them, but seeing how passionate their discussion is, you decide to wait.\n*page_break\n\"But what if your principles are flawed? How can you know that your ideals haven't made you too rigid and extreme?\" North argues.\n\n\"And what's your suggestion?\"  \n\n\"I think it's important to trust the opinions of others. They will tell you if you go astray.\" \n\n\"People can be corrupted, and the popular opinion is often not the best indication of what is good or moral.\"\n\n\"True, but that's still the morals of multiple people over the morals of one,\" North states. \n\nOliver wants to respond, but notices you and greets you, \"Hey, Rio! Nice to see you! Great costume, by the way.\"\n\n\"Rio, you probably heard what we were discussing, would you share your perspective with us?\" North addresses you too.\n*choice \n    #\"Though people can be flawed, their opinions is how we can understand whether our behavior is moral,\" you agree with North.\n        *set North +5\n        *set Oliver -5\n        \"Thank you, Rio,\" North gives you a warm smile, \"It's encouraging to see that other people understand the responsibility of being a hero.\"\n        \n        \n        *goto endofween\n    #\"You gotta follow your heart above all else. If your heart is in the right place, it won't lead you astray,\" you agree with Oliver.\n        *set Oliver +5\n        *set North -5\n        \"Thanks, Rio,\" Oliver smiles, \"I'm glad you believe in the importance of principles. We can't just follow what other people say.\"\n        \n        \n        *goto endofween\n    #\"It's really both. Considering both the public opinion and your own principles is required to make the right call,\" you take a neutral stance.\n        *if competitive >= 5\n            *set competitive -5\n        They think your words through for a few seconds, then go back to their discussion. You decide to leave them be.\n        \n        \n        *goto endofween\n*label aprilcat\n\"Hey, Catie, isn't that stretcher thing a bit too heavy for those guys? I feel pretty bad for them,\" April inquires sheepishly.\n\n\"No worries, they volunteered themselves, I swear!\" Catie responds half-jokingly.\n\n\"Yeah, but doesn't your power literally compel people to help you?\" \n\n\"Kinda, but it really only amplifies the positive feelings of others. They would only agree to this if they already liked me, so no harm done, right?\" Catie answers, clearly not seeing the problem.\n\n\"Still, it's a bit cruel, maybe you should ask them to stop?\" \n\nCatie does a subtle eye roll and notices you standing nearby, \"Hey, I'm sure Rio agrees it's not that big of a deal. Right, Rio?\" she looks at you expectantly.\n*choice\n    #\"It's not Catie's fault they are willing to do this for her,\" you side with Catie.\n        *set Catie +5\n        *set April -5\n        *if selfish \u003c= 95\n            *set selfish +5\n        Catie looks pleased, while April sulks and gives the group of guys dressed in mummy outfits a look of pure pity.\n        \n        \n        *goto endofween\n    #\"Catie, you should know better than forcing them to do this,\" you side with April.\n        *set April +5\n        *set Catie -5\n        *if selfish >= 5\n            *set selfish -5\n        \"Pfft, whatever,\" Catie rolls her eyes again and waves the group of mummy guys to stop what they're doing. April gives you an encouraging smile.\n        \n        \n        *goto endofween\n    #\"They seem to be having a good time, so I think we can let it slide this time, April,\" you take a neutral stance.\n        *if competitive >= 5\n
