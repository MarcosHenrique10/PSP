ral\n\n*label funeral\n\n*page_break\n\nSo in comes the day of the professor's funeral. You recognize your fellow classmates Rick and Nancy who went to the professor's house, and Karol who met him at the university. The four of you greet each other warmly and recognize the passing of not only the professor but also of both Veronica and Damian. You feel as if you have very little of any information to go off of in order to fight back against Blaine, but you wish you had. As if you had made the wish on a monkey's paw, your wish is about to be granted in a way that makes you question whether or not it's even worth it.\n\nAs soon as the thought of wanting that information crossed your mind as if on cue, you hear a lot of commotion coming from the entrance of the funeral home. You decide to ignore it, figuring its best to instead pay your respects to the professor, but very quickly the noise gets louder, and you recognize the sound of gunfire. \"Oh no,\" you think to yourself, wondering who would be so disrespectful as to shoot up a funeral. Nancy, Rick and Karol are all preparing to battle whoever comes through that door as you once again notice thugs dressed the same as the ones who shot up the university classroom that one day that got this all started. What do you do to battle against the first wave?\n\n*choice\n  #A simple blast spell. I'm not playing any games here, we have to clean this up as quickly as possible.\n    *if blast > 54\n      You incinerate a few of the thugs coming in, cleaning them up before they become a threat. I don't have time for these games.\n      *set blast +1\n      *set mana -10\n      *goto fight_2\n    You are unable to do enough damage in a single blast to clear them out, and they begin to shoot you. Luckily, Rick is able to finish them off before they deal much damage to you.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto fight_2\n  #A transform spell. I'm going to minimize their threat.\n    *if transform > 54\n      You successfully turn one of them into a rat, and they scurry out before they're able to deal any damage to anyone.\n      *set transform +1\n      *set mana -10\n      *goto fight_2\n    You attempt to transform one of them into a rat, but he gets off a few shots at you before you do so. Luckily, he does transform before he deals much damage to you.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto fight_2\n  #A summon spell. I'm going to have something else take them out.\n    *if summon > 54\n      You're able to summon a dog into attacking them and scaring some of the thugs away causing mass confusion and holding them off for a few seconds while you teammates permanently take them out.\n      *set summon +1\n      *set mana -10\n      *goto fight_2\n    You summon a dog into attacking them, but you're not skilled enough at summoning to have the dog realistically scare them enough before they begin attacking you.     Luckily, they are forced away by your allies before doing any real damage.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto fight_2\n  #I counter charm one of them and have him fight for our side. We need numbers at this point.\n    *if charm > 54\n      You're able to take control of one of them, as he turns around and begins to attack his allies. They quickly beat him down, but the damage and stalling that he performed for you was adequate for the moment.\n      *set charm +1\n      *set mana -10\n      *goto fight_2\n    It takes a few seconds to successfully charm to the thug, and a few shots are taken at you before you are able to successfully fight back. Then the thug turns around,       having finally been taken control by you, and is finally shot down, causing only a brief distraction.\n    *set charm +1\n    *set mana -10\n    *set health -10\n    *goto fight_2\n\n*label fight_2\n\n*page_break\n\nYou now have a firefight on your hands, in the middle of a funeral no different. No need to let the irony stick to you, as a second wave of enemies is heading towards you right now, and you have to react quickly. This wave is identical to the last one, so how do you handle this one?\n\n*choice\n  #A basic blast spell. We don't have the time to be creative or careful.\n    *if blast > 54\n      You freeze some of the thugs coming in, killing the entire group before they become a threat to your or the others.\n      *set blast +1\n      *set mana -10\n      *goto fight_3\n    You are unable to do enough damage with your ice attack, and those who initially survive are able to shoot at you before you are able to freeze them in place.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n  #A transform spell. If they're too weak and scared, they won't be a threat to anyone.\n    *if transform > 54\n      You successfully turn one of them into a snake, and they scare the rest of the thugs in the group, distracting them long enough for you to take them out.\n      *set transform +1\n      *set mana -10\n      *goto fight_3\n    You attempt to transform one of them into a snake, but before you do, he and his friends take some shots at you, dealing noticeable damage.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n  #A summon spell. Outnumbering them might still be possible.\n    *if summon > 54\n      You're able to summon a wolf into attacking the group. Those who aren't distracted end up scared and begin to retreat, causing confusion in their ranks, giving your allies enough time to finish them off.\n      *set summon +1\n      *set mana -10\n      *goto fight_3\n    You summon a wolf into attacking the group, but it's not able to scare or distract them enough to stop them from shooting at you before your allies save you.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n  #I use a charm spell on one of them to turn him to our side.\n    *if charm > 54\n      You're able to take control of one of them, and he starts to attack his old allies, taking a few of them down before they do the same back to him.\n      *set charm +1\n      *set mana -10\n      *goto fight_3\n    It takes a few seconds to successfully charm to the thug, and he figures out what you're doing to him. He takes a few shots at you before you turn him, dealing damage to you. After you finally take control of his he starts to attack his old allies, taking a few of them down before they do the same back to him.\n    *set charm +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n\n*label fight_3\n\nYou begin to look around, now with some adrenaline flowing from being in a life or death situation. All those who are not sorcerers, including the friends and family of the professor, as well as the employees of the funeral home, are all either dead, have already left or are evacuating. You're not quite sure how this will be seen by either the media or the public. How do you feel about that?\n\n*fake_choice\n  #Excited. It's a chance to get the public on our side and expose Blaine.\n    Briefly, you consider how you can turn this attack into something you could use to gain public support in taking down Blaine. Public opinion should be strongly against anyone who shoots up a funeral.\n  #Worried. The government might impose more limits on sorcerers if people find out about this.\n    You're not sure how to public could respond. Given the panicky nature of the general public, this could come back and bite you. You were seen using magic to kill people.\n  #Don't care. Kind of in a life or death situation here that needs my undivided attention.\n    Understandable. You'll cross the bridge of public opinion when you come to it, but its best to focus on the here and now. Your life could depend on it.\n\n*page_break\n\nYou pant slightly heavily from having used a couple of spells and see that Nancy, Rick and Karol are also all in relatively good health, but starting to lose some mana. You continue to hear the sound of gunfire outside, but not as loudly. You then hear the familiar sound of spell usage and wonder who it is. You've already killed Steve, and Blaine wouldn't be dumb enough to actually go out in the field. He has to have sided with someone else. Clearly, Blaine has either mind controlled someone or he has agreed to some kind of deal with somebody. As you wonder who it could be that allied themselves with Blaine, you recognize a meek sounding male's voice yelling the name of aggressive spells. \n\n\"That sounds like Lee!\" Karol states. Nancy nods as Rick lets out a soft \"mhmm,\" while you process what you just heard. After a second, you remember Lee. Firstly, you do recognize that voice as his, and then you begin to think back to who exactly Lee was. Lee would often kiss up to Blaine, giving him praise when Blaine did his usual bragging to everyone else about all his feats, even the ones that nobody else believed. Lee was someone who, Like Blaine, would spend a lot of his time practising charm magic, so you imagine that a lot of his spells were similar to Blaine's except not as strong. \n\nAs soon as you're done thinking as if on cue, the doors bust open. Not only does an additional wave of enemies break through the ranks, but behind them, you can both hear and see Lee, barking orders. You decide its best to defer your attention either to the bunch of goons or to Lee himself. In the mixture, you can see that the goons are clearly under the influence of a charm spell, but Lee is in his right mind. You feel that together the four of you can easily take on both Lee and his minions, but to ensure it, you decide to help your three allies regardless. Which battle do you partake in?\n\n*choice\n  #I choose to fight Lee. He's not exactly strong, and taking him out will cause all of those he's mind-controlled to no longer be under his control.\n    Makes sense. Defeating the leader will ensure the others are taken down.\n    *goto fight_Lee\n  #I fight the minions. Lee isn't a threat on his own.\n    Makes sense. Dealing the others will leave Lee defenceless.\n    *goto fight_minions\n  #I wait and see who my teammates are fighting, then make my choice.\n    Makes sense. You can make a more informed decision. You do take some damage in the beginning of the fight, however.\n    *set health -5\n    *goto wait\n    \n\n*label wait\n\nAs the battle continues, you see Rick and Nancy are fighting the minions, but Karol is fighting Lee. How do you respond?\n*choice\n  #Help Rick and Nancy. That can help us defeat the minions quickly.\n    Okay, you're ensuring a quick victory on one side by overwhelming the opponent.\n    *goto fight_minions\n  #Help Karol. I'm not risking having her lose to Lee.\n    Okay, you're choosing to stop Karol from losing her life against Lee.\n    *goto fight_Lee\n\n*label fight_Lee\n\nYou notice that both Lee and Karol are using a blast spell against each other. The two blasts meet in mid-air, hitting each other and cancelling each other out. You see that Karol really could use your help, but you're not sure what to do. You have the opportunity to blindside Lee right now with whatever it is you choose to do, however.\n*choice\n  #Use a spell to charm one of the other minions into fighting Lee. This also slightly helps Rick and Nancy.\n    *if charm > 54\n      You successfully take control of one of the minions, and it shoots Lee. As he tries to take control of it back, Karol hits him with a blast spell.\n      *set charm +1\n      *set mana -10\n      *goto fight_Lee2\n    You are unable to take control of the minion. Lee, however, notices your attempt and redirects his blast spell towards you. This gives Karol the opportunity to hit him with her blast spell, damaging him.\n    *set charm +1\n    *set mana -10\n    *set health -10\n    *goto fight_Lee2\n  #Use a spell to charm Lee into standing still for a few seconds. Let Karol get a hit him.\n    *if charm > 54\n      You successfully get Lee to stand there and take a hit from Karol.\n      *set charm +1\n      *set mana -10\n      *goto fight_Lee2\n    Lee notices you attempt to take control of his mind, and he blasts you. This gives Karol the opportunity to hit him with her blast spell, damaging him.\n    *set charm +1\n    *set mana -10\n    *set health -10\n    *goto fight_Lee2\n  #Blast Lee. If Karol and Lee have evenly matched blast spells, your blast spells are clearly superior to both of them.\n    *if blast > 54\n      You blindside Lee with a strong elemental blast. He makes a last-ditch attempt to stop it but is easily mowed over by your raw power.\n      *set blast +1\n      *set mana -10\n      *goto fight_Lee2\n    Your blast is seen and countered by Lee, who cancels it out with his spell. However, it was enough of a distraction to cause Lee to turn his back to Karol, who hits him with her own blast spell.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto fight_Lee2\n  #Transform Karol into something stronger. Give her an assist.\n    *if transform > 54\n      You successfully turn Karol into a Tiger. She then jumps directly over Lee's blast spell, pouncing on him and pinning him.\n      *set transform +1\n      *set mana -10\n      *goto fight_Lee2\n    You are unable to transform Karol quickly enough, and Lee turns his attention to you, blasting you with a spell. However, afterwards, Karol is finally transformed,     into a tiger, and jumps on Lee.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto fight_Lee2\n  #Summon something to help Karol. Make it a 3 vs. 1\n    *if summon > 54\n      You successfully summon a bear on top of Lee, and it mauls him, pinning him to the ground.\n      *set summon +1\n      *set mana -10\n      *goto fight_Lee2\n    As you attempt to summon a bear, Lee interrupts you by blasting you with one of his spells. You take some damage, but he had just opened himself up to an attack from     Karol, who takes advantage.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto fight_Lee2\n \n\n\n*label fight_Lee2\n\n*page_break\n\nAfter seeing the damage that Lee took from that attack, you realize that he is already on the ropes. \"Wow,\" you think to yourself \"I knew that Lee was pretty weak in a straight fight, but this is a little bit ridiculous,\" you think as Lee is already bleeding, holding his arm and slightly limping. You don't question it, however, as it goes in your favour. Given how easily you're winning, you decide to put the pedal to the metal and finish this here and now. What kind of spell do you use to finish him off?\n\n*choice\n  #A blast spell. No need to do anything fancy. Just incapacitate him on the spot.\n    *if blast > 54\n      You're skilled enough with blast magic to be able to control a full-powered blast and directly incapacitate Lee. He lies unconscious on the ground while you and the others are still standing.\n      *set mana -10\n      *set blast +1\n      *goto finish_minions\n    You seem a little too rushed and your skill with blast magic isn't at the point where you can control it perfectly. You easily knock Lee out, but also knock yourself back very hard, taking some moderate damage. Best be careful next time.\n    *set mana -10\n    *set blast +1\n    *set health -10\n    *goto finish_minions\n  #A summon spell. On the off chance he gets out, I'll be able to see everything from afar.\n    *if summon > 54\n      You're skilled enough with summon magic to be able to properly summon a komodo dragon that whips its tail hard enough to knock Lee out. You're able to recall it before it begins attacking others. \n      *set mana -10\n      *set summon +1\n      *goto finish_minions\n    You summon a komodo dragon that whips its tail hard enough to knock Lee out. However, you don't have the skill to recall it before it begins to attack you.         Luckily, Karol is able to transform it into a mouse and finish it off, saving you from further damage.\n    *set mana -10\n    *set summon +1\n    *set health -10\n    *goto finish_minions\n  #A charm spell. It might allow me to begin the interrogation early.\n    *if charm > 54\n      You successfully penetrate Lee's mind and force him to be subject to Karol's attack. She takes advantage of the opportunity to hit him with a simple blast spell,       knocking him out.\n      *set mana -10\n      *set charm +1\n      *goto finish_minions\n    You attempt to get into Lee's head but instead simply act as a distraction. He blasts you, and although you take damage, Karol still has the chance to use her own spell to damage him. She takes advantage of the opportunity to hit him with a simple blast spell, knocking him out.\n    *set mana -10\n    *set charm +1\n    *set health -10\n    *goto finish_minions\n  #A transform spell. Make him even more powerless.\n    *if transform > 54\n      You successfully transform him into a mouse, which Karol readily steps on, injuring him enough. You transform him back, and he is completely incapacitated.\n      *set mana -10\n      *set transform +1\n      *goto finish_minions\n    You attempt to transform him into a mouse but are unable to do so before he blasts you. After you receive the blast, you realize that your efforts were eventually successful, and Karol has stepped on him, injuring him. You de transform him, and he returns to his human form barely conscious.\n    *set mana -10\n    *set transform +1\n    *set health -10\n    *goto finish_minions\n\n\n*label fight_minions\n\nYou see that both Rick and Nancy are fighting against the group of minions. Although you feel as if two sorcerers would probably be able to take them without loss, you know that with a third, you've almost certainly created an auto-win scenario. Despite the fact that the odds are well on your side, you figure that given the seriousness of this situation, it's best that you don't underestimate your opponent at any time. Figuring it's down to business at this point, what do you do in order to turn the fight in your favour?\n\n*choice\n  #Use a charm spell on one of the minions in order to turn one of them to your side and have them attack non-lethally.\n    *if charm > 54\n      You take full control of one of the minions, who turns around and begins knocking out others. This old allies then proceed to take him out. At least the guys he knocked out will live once the mind control is over.\n      *set charm +1\n      *set mana -10\n      *goto fight_minions2\n    You attempt to take full control of a minion but are too weak to do so. He turns towards you and shoots, damaging you.\n    *set charm +1\n    *set mana -10\n    *set health -10\n    *goto fight_minions2\n  #Use a blast spell against the group to take them out quickly.\n    *if blast > 54\n      You incinerate a group of minions, taking out a whole bunch at once. It pains you that you're actually killing them, but the alternative is for you to be killed.\n      *set blast +1\n      *set mana -10\n      *goto fight_minions2\n    You attempt to create a fireball but lack the blast magic strength. A few members of the group of goons are able to get out of the way and attack you with their guns.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto fight_minions2\n  #Use a transform spell to turn yourself into something stronger.\n    *if transform > 54\n      You turn yourself into a hippo and charge in quickly, turning several of the minions aside in order to spread them out and damage several of them.\n      *set transform +1\n      *set mana -10\n      *goto fight_minions2\n    You attempt to turn yourself into a hippo, but aren't skilled enough to get it done fast enough. You're shot before making the transformation, dealing some damage.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto fight_minions2\n  #Use a summon spell to create something else. More numbers on our side is always good.\n    *if summon > 54\n      You create a Wolf that successfully take out a few of the attackers before the attacks remove it from existence. \n      *set summon +1\n      *set mana -10\n      *goto fight_minions2\n    You are unable to create a wolf quick enough. Some of the attackers recognize your attempt to summon a creature, and shoot you, giving you a slight injury.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto fight_minions2\n\n*label fight_minions2\n\n*choice\n  #Use a charm spell on one of the minions in order to turn one of them to your side and have them attack non-lethally.\n    *if charm > 54\n      You take full control of one of the minions, who turns around and begins knocking out others. This old allies then proceed to take him out. At least the guys he knocked out will live once the mind control is over.\n      *set charm +1\n      *set mana -10\n      *goto finish_lee\n    You attempt to take full control of a minion but are too weak to do so. He turns towards you and shoots, damaging you.\n    *set charm +1\n    *set mana -10\n    *set health -10\n    *goto finish_lee\n  #Use a blast spell against the group to take them out quickly.\n    *if blast > 54\n      You incinerate a group of minions, taking out a whole bunch at once. It pains you that you're actually killing them, but the alternative is for you to be killed.\n      *set blast +1\n      *set mana -10\n      *goto finish_lee\n    You attempt to create a fireball but lack the blast magic strength. A few members of the group of goons are able to get out of the way and attack you with their guns.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto finish_lee\n  #Use a transform spell to turn yourself into something stronger.\n    *if transform > 54\n      You turn yourself into a hippo and charge in quickly, turning several of the minions aside in order to spread them out and damage several of them.\n      *set transform +1\n      *set mana -10\n      *goto finish_lee\n    You attempt to turn yourself into a hippo, but aren't skilled enough to get it done fast enough. You're shot before making the transformation, dealing some damage.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto finish_lee\n  #Use a summon spell to create something else. More numbers on our side is always good.\n    *if summon > 54\n      You create a Wolf that successfully take out a few of the attackers before the attacks remove it from existence. \n      *set summon +1\n      *set mana -10\n      *goto finish_lee\n    You are unable to create a wolf quick enough. Some of the attackers recognize your attempt to summon a creature, and shoot you, giving you a slight injury.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto finish_lee\n  #Attempt to reason with them.\n    You attempt to explain that you'd rather they just surrender, but soon realize that charm magic is too powerful, as you leave yourself open for an attack. At least you attempted to solve things peacefully.\n    *set social +2\n    *set health -10\n    *goto finish_lee\n\n\n\n*label finish_minions\n\nWith Lee unconscious on the ground, you notice the attackers who came in are no longer attacking people. They drop their weapons and raise their arms, while Rick and Nancy don't seem to see them, as they are preparing attacks. What do you do?\n*choice\n  #I alert Nancy and Rick to the fact that these people have snapped out of it. These people are innocent.\n    *if social > 54\n      You're socially well off enough to be able to alert Rick and Nancy of the innocence of the mind-controlled minions. They surrender and you ask them what's going on. They don't recognize Blaine's name but rat out Lee as having manipulated them. Even after the others use magic to attempt to gain any information from them,       none of them can give you insights as to Blaine's plans.\n      *goto after_fight\n    You are unable to stop the two of them from unknowingly killing the minions. Afterwards, they hear your panicked reaction, and after you explain to them what just happened they feel horrible.\n    *goto after_fight\n  #I let it play out. Best to not get involved.\n    Nancy and Rick blast away the now in control of their own bodies again invaders. You're not quite sure how to process it or whether or not these people were innocent, but have to move on regardless.    \n    *goto after_fight\n  #Finish them off myself. I thirst for blood!\n    Your attack easily finishes off the minions who have now been boxed in. You feel slightly vindicated at the moment, but as what you really did begins to sink in,       you start to have regrets.\n    *goto after_fight\n\n*label finish_lee\n\nAfter seeing that the minions have been neutralized, you turn your attention to the fight between Karol and Lee. It appears that Karol has the advantage, but you're not willing to take any risks. How do you finish off Lee?\n\n*choice\n  #A blast spell. No need to do anything fancy. Just incapacitate him on the spot.\n    *if blast > 54\n      You're skilled enough with blast magic to be able to control a full-powered blast and directly incapacitate Lee. He lies unconscious on the ground while you and the others are still standing.\n      *set mana -10\n      *set blast +1\n      *goto after_fight\n    You seem a little too rushed and your skill with blast magic isn't at the point where you can control it perfectly. You easily knock Lee out, but also knock yourself back very hard, taking some moderate damage. Best be careful next time.\n    *set mana -10\n    *set blast +1\n    *set health -10\n    *goto after_fight\n  #A summon spell. On the off chance he gets out, I'll be able to see everything from afar.\n    *if summon > 54\n      You're skilled enough with summon magic to be able to properly summon a komodo dragon that whips its tail hard enough to knock Lee out. You're able to recall it before it begins attacking others. \n      *set mana -10\n      *set summon +1\n      *goto after_fight\n    You summon a komodo dragon that whips its tail hard enough to knock Lee out. However, you don't have the skill to recall it before it begins to attack you.         Luckily, Karol is able to transform it into a mouse and finish it off, saving you from further damage.\n    *set mana -10\n    *set summon +1\n    *set health -10\n    *goto after_fight\n  #A charm spell. It might allow me to begin the interrogation early.\n    *if charm > 54\n      You successfully penetrate Lee's mind and force him to be subject to Karol's attack. She takes advantage of the opportunity to hit him with a simple blast spell,       knocking him out.\n      *set mana -10\n      *set charm +1\n      *goto after_fight\n    You attempt to get into Lee's head but instead simply act as a distraction. He blasts you, and although you take damage, Karol still has the chance to use her own spell to damage him. She takes advantage of the opportunity to hit him with a simple blast spell, knocking him out.\n    *set mana -10\n    *set charm +1\n    *set health -10\n    *goto after_fight\n  #A transform spell. Make him even more powerless.\n    *if transform > 54\n      You successfully transform him into a mouse, which Karol readily steps on, injuring him enough. You transform him back, and he is completely incapacitated.\n      *set mana -10\n      *set transform +1\n      *goto after_fight\n    You attempt to transform him into a mouse but are unable to do so before he blasts you. After you receive the blast, you realize that your efforts were eventually successful, and Karol has stepped on him, injuring him. You de transform him, and he returns to his human form barely conscious.\n    *set mana -10\n    *set transform +1\n    *set health -10\n    *goto after_fight\n\n*label after_fight\n\n*page_break\n\nWith Lee knocked out, the funeral home empty, everyone else cleared out, and the hall ruined the four of you seem to be stranded and unsure of what to do. After the four of you get together and start to pick everything back up. The four of you are able to take Lee's knocked out body out of the funeral home and successfully interrogate him afterwards. Do you spare Lee's life afterwards?\n*fake_choice\n  #Yes. I'm not a machine who kills everything.\n    Very merciful of you. Perhaps its best you keep your humanity.\n  #No. He willingly betrayed us.\n    Very well. He could escape, so best you tie up the loose end.\n\nYou move on with the information he has given you. The four of you now know more about Blaine's plans and how to properly defeat him.\n\n*goto_scene chapter4", "ending_karol": "*set mana 100\n*set health 100\n\n*page_break\n\nAfterwords and Karol look around, seeing the damage to the castle. You walk back, seeing the bodies of Rick and Nancy on the way. Barely strong enough to get them out, you travel back to the university, the closest place you had to a 'base' for the sorcerers. The next day, you see that the media is beginning to catch on, and you come to the conclusion that somehow Blaine had used magic in order to hide the damage done. As reporters go over to you and Karol, the two of you are able to summarize the events of the past few days and are able to avoid making yourselves seem like murders, having claimed self defence. \n\nA large amount of global controversy begins, wondering how to integrate sorcerers into society. You see headlines showing \"${name} and Karol, saviours or villains?\", with the media having a lot of hype about how you two have the potential to take over the world. You and Karol attend several meetings and interrogations to ensure that you are not global threats. You are made leader of a private league of sorcerers, who are no longer required to stay separate from society but are instead allowed in, without the need to hide who you are. You agree, however to certain restrictions: such as being forced to stay out of politics and global conflicts. \n\nSorcerers from around the world begin to come to the academy, which would be lead by you on the property of the university. You have taken the role that the professor once held with Karol as your assistant. You are now in charge of a revolutionary idea where there is no longer a stigma of being a sorcerer, and in exchange, sorcerers use their powers to make the world a better place. As challenges await you, you will see what challenges await you in this new world order. Statues of the professor, as well as Nancy, Rick, Veronica and Damian, are erected on the property, with Steve, Lee and Blaine seen for the villains that they were.\n\nPlease be aware that there are multiple endings in the game. Feel free to play again and see the other ways the game can end.\n\n*achieve survivor\n*achieve storybook\n\n*goto_scene ending\n", "ending_no_karol": "*page_break\n\nAfter Karol leaves this world, you make several vain attempts to save her, but to no avail. You are unable to get all the bodies out of there in time. The next day, the media is swarming you with questions. You're unable to determine why the media suddenly noticed all of the damage now when there was damage being done throughout the past few days, but assume that somehow Blaine was magically hiding it. You are barely able to explain the events of the past few days without making yourself look like a murderer.\n\nYou are seen as a hero to some, and a villain to others. However, when your story is proven correct, you regain the trust of the public, with there being a long, drawn-out debate of how to progress with the existence of sorcerers. You agree to lead a new publicly seen culture of sorcerers, who must not interfere in global conflicts or politics. You now take the role of the professor but instead are publicly seen and known of, with statues of Karol, the professor, Rick, Nancy, Veronica and Damian built around the sorcerer's 'base' of operations on university property with Steve, Lee and Blaine seen for the villains that they were. As challenges await you, you will see what challenges await you in this new world order. \n\nPlease be aware that there are multiple endings in the game. Feel free to play again and see the other ways the game can end.\n\n*achieve survivor\n*achieve solesurvivor\n\n*goto_scene ending", "livespy": "*set health 100\n*set mana 100\n\nYou've had the time to interrogate Steve yourself, using a combination of physical threats, knowledge magic, charm magic, and your social skills. \n\nYou find out via said interrogation, among other things, that an attack is planned for the professor's funeral. You also find out that the attack is to be lead by\nanother sorcerer, one named Lee, who was constantly someone who would be a copy-cat of Blaine, often acting as a 'side-kick' or 'lackey' for many of Blaine's antics.\n\nAfter some digging in Steve's mind, you find out the location of Lee, and that he has used charm spells on some ordinary civilians, armed them and is set to attack. At first, you're unsure of where Lee would have learned how to use charm spells in such a powerful way, but quickly determine that most likely Blaine had taught him how to do it. Realizing that you have to move quickly in order to get Lee before he somehow finds out about the fact that you're on to him.\n\nFinding out from your interrogation of Steve that Lee has some guards surrounding his place, you realize that its best to sneak in. You know for a fact that you can take Lee in one-on-one combat, but not if he has more powerful guards backing him up. You realize that its best to catch him off guard, so you decide to use your magic to sneak in somehow. \n\nYou get to Lee's place on your own that night, hoping to get in under the cover of darkness. As you do so, you notice a pair of guards blocking the front door. Knowing that you should easily be able to get through without harming them, you think of some harmless ways of getting around them. What do you decide to do?\n*choice\n  #Use a charm spell to trick them into thinking I belong there. That way, they just let me in. Simple and effective.\n    These guards are relatively easily swayed, and simply let you in after using a single spell.\n    *set mana -10\n    *set charm +1\n    *goto Lee\n  #Use an illusion spell to turn invisible and sneak by them.\n    You easily slip by the guards without them even noticing you. They thought they heard something, but owe it up to small nocturnal creatures.\n    *set mana -10\n    *set illusion +1\n    *goto Lee\n  #Use a summon spell to create some kind of a distraction.\n    You create a bunch of rabbits on the grass, and both guards go up to them to pet them. You sneak by as they do so.\n    *set mana -10\n    *set illusion +1\n    *goto Lee\n\n*label Lee\n\nRemembering Steve's instructions, you find Lee's room and open the door quietly. Although you do your best to not be detected, Lee hears you and wakes up. He immediately throws a blast spell at you. It's not as powerful as most, but still able to deliver some pain. How do you react?\n*choice\n  #I attempt to dodge it. No need to waste mana on this.\n    *if fitness > 50\n      You easily dodge the attack\n      *set fitness +1\n      *goto Lee_2\n    You take the full brunt of the attack\n    *set fitness +1\n    *set health -10\n    *goto Lee_2\n  #I attempt to block it to minimize damage. No need to waste any kind of energy on something nearly harmless.\n    You partially block the attack, and only get hit for some of the damage.\n    *set fitness +1\n    *set health -5\n    *goto Lee_2\n  #I use a more powerful blast. It'll overpower his.\n    Your fireball rips through his and hits him at partial power\n    *set mana -10\n    *set blast +1\n    *goto Lee_2\n\n*label Lee_2\n\nThe look on Lee's face is absolutely priceless, and you can tell you have him on the ropes. You knew he was going to be easy to defeat, but you never imagined it would be THIS easy. You were expecting Lee to have at least given you a challenge. Or maybe Blaine thought Lee was expendable and would quickly outlive his usage. It doesn't matter, there's nothing in Lee's eyes to make you think he's mind-controlled. You're free to finish him off as Lee joined the bad guys on his own free will. How do you do so?\n\n*choice\n  #Blast magic. Quick and painless.\n    With a telekinetic blast, you send him headfirst into a wall, snapping his neck and killing him on the spot.\n    *set mana -10\n    *set blast +1\n    *goto After_lee\n  #I summon something to kill him.\n    You summon a blade and drive it into his heart, killing him instantly.\n    *set mana -10\n    *set summon +1\n    *goto After_lee\n\n*label After_lee\n\nYou stare there at Lee's dead body, wondering if there's any way to not look like a home invader. How do you feel about the fact that you broke into someone's house and killed them?\n\n*fake_choice\n  #A high. It felt awesome and Lee deserved it.\n    Interesting, but I do bet you liked it.\n  #Pretty bad now that I let it sink in.\n    Yeah, no kidding. You committed a crime that would put a normal person to jail for life.\n\n*page_break\n\nAs you escape, you see that the guards have left. It's at that point you remember that since Lee is no longer alive, they are no longer being controlled by his charm magic. You remember that this could be useful in the future. How do you feel about the escaped guards?\n\n*fake_choice\n  #At least I spared the innocent people\n    True. They deserved to live, and good on you for being merciful when entering.\n  #I was bloodthirsty\n    You realize you're headed down a dark path, but aren't sure how to process it.\n\nOver the next few days, you have some spare time. You go about your day doing normal things like going to work and somehow don't have any incidents related to Blaine sending people after you. You feel this is strange and despite your suspicions, you feel relieved about not being attacked. In addition to interrogating Steve, how do you spend your time?\n\n*choice\n  #Socializing\n    You realize you're getting more socially adept but on some level feel like you're wasting your time.\n    *set social +1\n    *goto funeral\n  #Studying\n    You feel a boost to your intelligence but on some level feel like you're wasting your time.\n    *set brains +1\n    *goto funeral\n  #Lifting\n    You feel yourself getting stronger but on some level feel like you're wasting your time.\n    *set brains +1\n    *goto funeral\n\n*label funeral\n\nA few days later, you attend the professor's funeral. Somehow, no attacks took place during that time. When you reach there, you know to look for Rick, Karol and Nancy. Nancy waves you over, and you go over. \n\nYou walk over and notice that just like you, the other three are all dressed in a notably formal way one would expect at a funeral. You walk your way over there, set to go over and discuss your findings. How do you present your findings from your interrogation of Steve?\n\n*choice\n  #I dive right in. This is a life or death scenario for all of us and we can't afford to waste any time.\n    You immediately begin to state any information on the information you were able to rip out of Steve. The others look uncomfortable but you realize this was the smart thing to do.\n    *set brains +2\n    *goto description\n  #I give long grievances about the prof and let the others all say their bit fully. This is a funeral and respects are fully needed.\n    The four of you all give condolences to each other and say your words about not only the professor but Damian and Veronica as well. It feels like you're delaying but you all feel a sense of closure.\n    *set social +2\n    *goto description\n  #I keep respects brief and then get into details to strike between the best of both worlds.\n    You all briefly pay your respects to the professor and briefly mention Damian and Veronica. All important points were hit, and you still got to the details relatively quickly.\n    *set social +1\n    *set brains +1\n    *goto description\n\n*label description\n\n*page_break\n\nAs you switch the topic to being about how you interrogated Steve, you feel the other three are hanging on your every word.\n\n\n\"From what I was able to gather,\" you begin, \"Blaine seems to have a portion of local law enforcement in his captivity with heavy use of charm magic. He is currently using this at its maximum potential. This means that if we release someone from the spell, he can either take them back or replace them if he finds someone. However, he can not extend the spell to reach more people than it already does.\"\n\n\"So killing them means they'll be replaced?\" Nancy asks. You're not sure how to answer this. \n\nYou figure its best to just say 'yes', and to continue with the details. As you continue, you say more about where you found out where Blaine is hiding as well as any weaknesses in the layout of the local castle.\n\n\"As you would expect, Blaine himself spends 100% of his time in the throne room. I'm not sure if he plans on leaving to do something eventually, but as of now, for the foreseeable future, that is where he'll be. For that reason, that should be our final goal, and we should attack it as directly as possible, and cut off any possible escape routes.\" The other three are paused, looking at you as if they are expecting you to keep talking. \n\n\"Now, most of the so-called guards are wearing riot gear similar to that of large SWAT teams, making them a little bit tougher than the thugs we face at the university, and it's now down to just the four of us.\"\n\n\"How much tougher?\" Rick asked.\n\n*page_break\n\n\"I don't know, but we can assume its enough for concern and not enough to automatically grant Blaine the win,\" you reply.\n\n*page_break\n\nThere's a bit of a pause, and Rick grunts and nods his head wordlessly.\n\n*page_break\n\nAfter you give the time and location that the attack is supposed to take place at, the four of you continue on with the progress of the funeral and then head your separate ways.\n\n*goto_scene chapter4", "payment": "*gosub trial_end\n\n*if (Chapter_3 = \"LiveSpy\")\n  *goto_scene LiveSpy\n\n*elseif (Chapter_3 = \"DeadSpy\")\n  *goto_scene DeadSpy\n\n*else \n  *goto_scene Spymissed\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2020-09-03 $3.99 $2.99 purchased\n*abort", "save_karol": "Realizing you can't take Blaine alone, and letting the elixer float by you, you reach down to save Karol. She grabs your hands, and you pull her up, somewhat straining yourself. You then turn around, turning to Blaine with Karol beside you. \"Thanks,\" she says. \"I thought you'd go for the elixer. I know you have some bad blood with Blaine, and didn't think you'd be able to resist the chance to teach him a lesson yourself.\" How do you respond?\n\n*choice\n  #I'd never let someone like you drop. Your life is important to me.\n    \"Wow, thanks. I'm glad I mean that much to you, but are you sure saving me was the right choice?\" she asks. Before you can respond, you are interrupted.\n    *set social +1\n    *goto Taunt\n  #Of course, I'd resist. I need you right now.\n    \"I'll make sure to make it worth your while to act like that,\" she says, before turning her attention to Blaine.\n    *set brains +1\n    *goto Taunt\n  #Seriously? You really thought that low of me?\n    \"I'll save you the snark of joking about how now I wish you had let me drop,\" she said back. You don't appreciate her tone, but realize you had kind of asked for it with your defensive statement.\n    *goto Taunt\n\n\n*label Taunt\n\n\"Too scared to take me on yourself? I wouldn't have expected you to ${name}, however, you two should both be thankful for your own incompetence. Had any of you been a threat to me, I would have killed you when you were vulnerable.\" You're getting sick of Blaine's empty threats and insults but can tell that right now you're finally going to get your chance to finish him once and for all. \"Now if you two peasants would be so kind as to leave your current location. Step across the following line so that magic can be used in our final battle. Wouldn't quite be suiting otherwise.\" You look for the line he mentioned and quickly find it under his foot. For a second, you consider, given yours and Karol's lack of mana, you might be better off fighting him in a purely physical battle, but the Blaine pushes a button near him, and the floor under you and her starts to shake and fall. You and Karol both easily run across the pit, making it to the other side of the line, and able to cast spells.\n\n*page_break\n\nBlaine attempts to use a charm spell in order to take control of both you and Karol but is unable to take control of you so easily. You feel magic briefly course through your body but leave easily. You see Karol quickly shake and shiver as if something similar had happened to her, but she is also unaffected. It's at that point that you make a realization: you won't be able to use charm or transform spells against Blaine. They were useful against weaker sorcerers such as Steve and Lee, but you, Karol and Blaine are strong enough, that your high skill in magic lets you resist these techniques.\n\nIt's now your chance to attack. You realize that although you swore off of killing innocents, Blaine is no innocent, so you have no problem with making an aggressive or damaging spell against him, especially since he's creating a blast spell against you. What kind of attack do you make against Blaine? \n\n*temp Blaine\n\n*set Blaine 20\n\n*temp Karol\n\n*set Karol 5 \n\n*choice\n  #A blast spell. I have no reason to hold back against Blaine.\n    *if blast > 60\n      Your blast of fire sears through Blaine, seeming to send him on fire. He screams in pain, damaging him visibly. This is going to be a long fight, but at least you're off to a good start.\n      *set Blaine -2\n      *set mana -10\n      *set blast +1\n      *goto fight_2\n    Your blast of fire hits Blaine, but he seems to shake it off relatively easily. You notice some burn marks, but he seems mostly unharmed. This fight is going to be     tough\n    *set Blaine -1\n    *set mana -10\n    *set blast +1\n    *goto fight_2\n  #A summon spell. I can make this into a 3 on 1.\n    *if summon > 60\n      You summon a jaguar that jumps over the top of Blaine, damaging him quite a lot before he is able to squirm away from it, damaging him quite noticeably. This is going to be a long fight, but at least you're off to a good start.\n      *set Blaine -2\n      *set mana -10\n      *set summon +1\n      *goto fight_2\n    The jaguar that you summon jumps onto Blaine, but only damages him a little bit before it fades due to your lack of ability to maintain the spell. This fight is        going to be tough\n    *set Blaine -1\n    *set mana -10\n    *set summon +1\n    *goto fight_2\n  #A physical attack. I want to conserve my mana\n    *if fitness > 65\n      You successfully run up and punch Blaine in the face, multiple times before your final punch sends him falling backwards. This is going to be a long fight, but at least you're off to a good start. \n      *set Blaine -2\n      *set fitness +1\n      *goto fight_2\n    You run over and punch him, but he's easily able to block your hits after the first few, none of which were that powerful. This fight is going to be tough.\n    *set Blaine -1\n    *set fitness +1\n    *goto fight_2\n\n*label fight_2\n\nAfter taking your attack, Blaine responds in exactly the way you were expecting. He attacks back, shooting lightning at you. You have enough time to prepare a defence. You can either attempt to dodge it using your fitness, block it to reduce the damage you take or use your own blast spell to block it entirely, using some of your own mana. What do you decide to do?\n\n*choice\n  #Dodge. I can do it.\n    *if fitness > 60\n      You successfully dodge, taking no damage at all.\n      *set fitness +1\n      *goto fight_3\n    You're not fast enough to dodge and take the full brunt of the attack.\n    *set fitness +1\n    *set health -10\n    *goto fight_3\n  #Block. Let's reduce what I take.\n    You feel yourself getting stronger and fast by practising your block, and due to said block, you also reduce the damage you take.\n    *set fitness +1\n    *set health -5\n    *goto fight_3\n  #Counter. I'm not taking any damage no matter what.\n    You meet his blast with yours, spending mana, but completely avoiding being hit.\n    *set mana -10\n    *set blast +1\n    *goto fight_3\n\n*label fight_3\n\n*if health \u003c= 0 \n  The Blast that Blaine hit you with begins to consume you. With Blaine being so much more powerful than Karol, she won't be able to overtake him, so he would defeat her, not that you'd know that anyway. As you fade out of consciousness for the last time, you see Blaine smile in an extremely vivid way.\n  *goto_scene death\n\n*else\n  *goto fight_3_1\n*label fight_3_1\n\nAfter Blaine's attack, you realize that now you're starting to get in over your head, as even just seeing the blast that Blaine unleashed showed he was indeed about equal in power to you, but in your weakened state, he would have the advantage in a one on one. As you briefly wonder what would have happened had you taken the elixer, you see that Karol has summoned a buffalo that is currently charging as Blaine, who attempts to move out of the way. Blaine is partially successful, being able to avoid a direct hit, but is unable to completely get out of the way. Karol uses this as an opportunity to unleash an illusion spell. Suddenly, Blaine is attacked by the illusion of a swarm Asian Giant Hornets and their powerful stings. This seems to catch Blaine off guard, as he is unable to tell that this is an illusion, and you see him taking damage during the fake attack. You realize that you can indeed use illusion spells to damage Blaine. However, as this is happening, he attacks Karol by summoning a charging triceratops, but in his state, he's open to an attack. What do you do?\n\n*set Blaine -1\n\n*choice\n  #Attack Blaine with a blast spell. Hey, if it ain't broke...\n    *if blast > 60\n      You hit Blaine with a powerful blast of ice. He easily breaks out, but with notable frostbite. \n      *set Blaine -2\n      *set mana -10\n      *set blast +1\n      *goto fight_4\n    You hit Blaine with a blast of ice, but it's not strong enough to do much damage. As he gets out, he isn't very damaged and is barely even shivering.\n    *set Blaine -1\n    *set mana -10\n    *set blast +1\n    *goto fight_4\n  #Summon an animal to attack Blaine. Keep the damage coming.\n    *if summon > 60\n      You summon a large albatross, which flies into a position to peck Blaine repeatedly before ramming into him. You notice that he is damaged by a fair amount. \n      *set Blaine -2\n      *set mana -10\n      *set summon +1\n      *goto fight_4\n    You summon a large albatross but aren't able to keep it sustained for long enough to do anything more than a couple of pecks, doing only minimal damage to Blaine.\n    *set Blaine -1\n    *set mana -10\n    *set summon +1\n    *goto fight_4\n  #Cast an illusion spell to damage Blaine. Might as well see if it works for me, to.\n    *if illusion > 60\n      \"Not another swarm!\" you hear Blaine say as you summon yet more illusions of Giant Hornets to deal damage to him via fake stings. You're not sure how this works,       but you'll take it.\n      *set Blaine -2\n      *set mana -10\n      *set illusion +1\n      *goto fight_4\n    The illusions of giant hornets that you make only temporarily fool him, and he only takes a minor amount of damage before noticing that they're fake.\n    *set Blaine -1\n    *set mana -10\n    *set illusion +1\n    *goto fight_4\n  #Save Karol from the triceratops. I can't afford to lose her at this point.\n    You run over to Karol and grab her, moving both yourself and her out of the way. Blaine uses the lack of a follow-up hit regain his composure, but as you were able to save both yourself and Karol from damage, you feel you came out ahead in these past few seconds. \"Thanks,\" Karol quickly stated to you. She briefly pats you on the shoulder, and the two of you turn back to face Blaine, who is now back on his feet.\n    \"Saving her again, aren't you?\" Blaine states about you and Karol. \"Brave and selfless, but foolish.\" Neither of you gives into the taunt, as you stand there unresponsive.\n    *goto fight_5\n\n\n*label fight_4\nAs this happens, you see Karol being run over by the charging triceratops. You're worried as you hear he grunt and yell in pain, but the Triceratops isn't sustained for long. Karol gets up afterwards, but you can tell by her additional wounds that she is notably hurt. \n*set Karol -1\n*goto fight_5\n\n*label fight_5\n\nYou and Karol glance at each other to see how well you're doing.\n\n*if health >= 80\n  \"You look great, looks like you could almost do this without me here. Keep it up,\" Karol says to you. As you smirk at her, she finishes with \"hey, I said almost.\"\n  *goto fight_6\n*elseif health >=60\n  \"Looks like you're keeping up with this pretty well,\" Karol says after looking at you. \"I think we can do this, just keep going.\"\n  \"Gotcha,\" you say, hoping to keep your composure.\n  *goto fight_6\n*elseif health >=40\n  \"Are you going to be okay?\" Karol asks, noting the damage you've received.\n  \"Yeah,\" you say hoping to remain optimistic. \"You?\"\n  \"I think so,\" she says\n  *goto fight_6\n*elseif health >=20\n  \"You need to tag out for a second? I can handle this,\" Karol offers\n  \"No thanks,\" you respond, knowing that she separately you're no match for Blaine. \"We both need to be here for this fight.\"\n  *goto fight_6\n*else \n  \"You look like you're about to die,\" Karol updates you. \n  \"I know,\" you respond, knowing that you're on death's door. \"we have to push through though. Otherwise, he'll win.\"\n  *goto fight_6\n\n*label fight_6\n\n\"Look at you two, concerned for each other like that. Your corpses are going to look so cute together. I'll do you a favour when I win, I'll bury you two beside each other.\" How do you respond to this?\n\n*fake_choice\n  #\"Don't bother thinking about that. We're not getting buried.\"\n    Blaine laughs, and you can tell its time to stop talking and start getting serious.\n  #\"Thanks, but you're getting buried near Steve and Lee.\"\n    \"Oh, you took them out. That's...inconvenient. Offer retracted,\" he says as you can tell its time to stop talking and start getting serious.\n  #I scream profanities back at him.\n    Blaine seems shocked at your anger, but you can tell by his silence its time to stop talking and start getting serious.\n  #I say nothing. No need to give in emotionally.\n    When he also doesn't respond you can tell its time to stop talking and start getting serious.\n\nYou now have the chance to attack Blaine. How do you do this?\n*choice\n  #I use a blast spell. Sheer damage can be the key here.\n    *if blast > 60\n      You knock him back with telekinesis, sending him back far enough to hit the wall.\n      *set blast +1\n      *set mana -10\n      *set Blaine -2\n      *goto fight_7\n    You hit him with a weak telekinetic blast, only dealing him minimal damage.\n    *set blast +1\n    *set mana -10\n    *set Blaine -1\n    *goto fight_7\n  #I summon something powerful. Let's take him down.\n    *if summon > 60\n      You summon a wolf that bites his leg extremely hard, causing him to scream in pain.\n      *set summon +1\n      *set mana -10\n      *set Blaine -2\n      *goto fight_7\n    You summon a wolf that bites his leg, but not as hard as you were hoping for, only causing a minor amount of damage.\n    *set summon +1\n    *set mana -10\n    *set Blaine -1\n    *goto fight_7    \n  #I use an illusion spell to damage him. Not sure how it works, but not going to knock it.\n    *if illusion > 60\n      You create an illusion of a swarm of spiders, crawling all over his face. He screams, taking damage as if a whole bunch of spiders were actually biting him.\n      *set illusion +1\n      *set mana -10\n      *set Blaine -2\n      *goto fight_7\n    You create an illusion of a swarm of spiders, crawling all over his face. He screams briefly, only taking some damage before seeing that its just an illusion,\n    *set illusion +1\n    *set mana -10\n    *set Blaine -1\n    *goto fight_7   \n  #I use a physical attack. Let's save some mana.\n    *if fitness > 65\n      You kick Blaine in the face several times, knocking him down.\n      *set fitness +1\n      *set Blaine -2\n      *goto fight_7\n    You kick Blaine in the face a couple of times, but he blocks your third attempt, preventing major injuries.\n    *set fitness +1\n    *set Blaine -1\n    *goto fight_7  \n*label fight_7\n\n*if mana >= 80\n  \"Keep doing this,\" Karol says, \"looks like you can still cast plenty of spells before resting!\"\n  *goto fight_7_1\n*elseif mana >= 60\n  \"Looks like you can still cast a fair amount of spells before resting!\" Karol screams to you.\n  *goto fight_7_1\n*elseif mana >= 40\n  \"Keep an eye on how many spells you cast, I don't know how many more you can use,\" Karol reminds you.\n  *goto fight_7_1\n*elseif mana >= 20\n  \"Remember to not spam spells, you might run out of juice,\" Karol says, alerting you of your low mana.\n  *goto fight_7_1\n*elseif mana > 0\n  \"Don't use spells too often, you might run out of mana sooner than you think,\" Karol says, as you feel your mana lowering.\n  *goto fight_7_1\n*else\n  \"Don't use spells too often, you might run out of mana sooner than you think,\" Karol says, as you feel yourself run out of mana entirely.\n  *goto fight_7_1\n\n*label fight_7_1\n\"Thanks, I know,\" you reply to Karol, looking back at her to see in a damaged but still very functional shape. Blaine however now makes a counter-attack, with red clearly in his eyes. He takes a shot at you, summoning a rhino to charge directly at you. You have to figure out how to avoid getting hit by this very scary beast. How do you plan on doing this? \n\n*choice\n  #Summon my own Rhino to counter it.\n    *if mana > 0\n      *if summon > 60\n        You rhino is powerful enough to block Blaine's, preventing it from getting anywhere near you.\n        *set summon +1\n        *set mana -10\n        *goto fight_8\n      Your rhino is too weak, and it gets stomped by Blaine's. Blaine's rhino also runs over you, making you feel an intense amount of pain.\n      *set summon +1\n      *set mana -10\n      *set health -10\n      *goto fight_8\n    *goto no_mana_rhino\n  #Hit the rhino with a blast spell.\n    *if mana > 0\n      *if blast > 60\n        You obliterate the rhino was a ball of fire, engulfing it never to be seen again.\n        *set blast +1\n        *set mana -10\n        *goto fight_8  \n      Your blast is not powerful enough to obliterate the rhino, and it charges though, dealing damage to you.     \n      *set summon +1\n      *set mana -10\n      *set health -10\n      *goto fight_8\n    *goto no_mana_rhino \n  #Dodge the rhino.\n    *if fitness > 65\n      You're fast enough to be able to successfully dodge the rhino before it disappears into oblivion.\n      *set fitness +1\n      *goto fight_8\n    You're not fast enough to be able to dodge the rhino and during its short time in our world. After it hits you, you're sent flying back.\n    *set fitness +1\n    *set health -10\n    *goto fight_8\n  #Attempt to figure out how to mount the rhino.\n    *if brains > 65\n      You're smart enough to be able to mount the rhino and jump over it until Blaine calls it back.\n      *set brains +1\n      *goto fight_8\n    You're not smart enough to be able to successfully mount the rhino, and it still runs you over, hitting you hard enough to do some damage before it disappears.\n    *set brains +1\n    *set health -10\n    *goto fight_8\n\n*label no_mana_rhino\n\nYou are unable to cast spells as you're out of mana. Given that, how do you deal with the rhino charging at you right now?\n\n*choice\n  #Dodge the rhino.\n    *if fitness > 65\n      You're fast enough to be able to successfully dodge the rhino before it disappears into oblivion.\n      *set fitness +1\n      *goto fight_8\n    You're not fast enough to be able to dodge the rhino and during its short time in our world. After it hits you, you're sent flying back.\n    *set fitness +1\n    *set health -10\n    *goto fight_8\n  #Attempt to figure out how to mount the rhino.\n    *if brains > 65\n      You're smart enough to be able to mount the rhino and jump over it until Blaine calls it back.\n      *set brains +1\n      *goto fight_8\n    You're not smart enough to be able to successfully mount the rhino, and it still runs you over, hitting you hard enough to do some damage before it disappears.\n    *set brains +1\n    *set health -10\n    *goto fight_8\n\n*label fight_8\n\n*if health \u003c= 0\n\n  As you are flung into the air by the rhino, you feel as if you are being taken for your 'last ride'. You can recognize Karol screaming \"noooooo!\" As you are involuntary flying across the room, barely able to move. You can tell that your crash into the ground is coming up, and that there's nothing you can do to prevent your fate. As you hit the ground with a loud 'thud', everything goes black. Although you have no way of knowing this, Karol will be killed by Blaine, who will take over the world now without you to stop it.\n  *goto_scene death\n\n*else \n  *goto fight_8_survive\n\n*label fight_8_survive\n\n\nStarting to see that the fight is high paced, you doubt that there will be another 'stop' to the action. Blaine seems to have figured out that you and Karol are not pushing overs. As this thought occurs to you, you notice that Karol is attacking Blaine in hand-to-hand combat. You notice that you have the chance to transform her into something stronger, at the cost of some of your own mana. Do you do this?\n\n*choice\n  #Yes, this is too good of an opportunity.\n    *if mana > 0\n      *if transform > 60\n        You turn Karol into a giant elephant a transformation strong enough to deal a ridiculous amount of damage to Blaine.\n        *set Blaine -3\n        *set mana -10\n        *set transform +1\n        *goto fight_9      \n      You turn Karol into an elephant, but it only marginally increases her ability to damage Blaine.\n      *set Blaine -2\n      *set mana -10\n      *set transform +1\n      *goto fight_9\n    You are unable to transform her due to your lack of mana.\n    *set Blaine -1\n    *goto fight_9\n  #No, I need to have my mana.\n    You watch Karol beat Blaine up, but due to her doing it herself, the damage is minimal.\n    *set Blaine -1\n    *goto fight_9\n\n*label fight_9    \n\nAfter being beaten up by Karol, Blaine blasts her off of him using telekinesis, and she hits the ceiling. The two of them both blast each other, and when the two blasts meet, they create a large explosion, damaging all three of you. \n\n*set health -5\n*set Blaine -1\n*set Karol -2\n\n*if health > 80\n  The damage you've been dealt so far is very minor, and you know you can fight through this.\n  *goto karol_health\n*elseif health > 60\n  You've received a decent amount of damage, but still, feel extremely healthy.\n  *goto karol_health\n*elseif health > 40\n  You're about halfway to death, and considering you didn't take the elixer, this might actually be a good thing.\n  *goto karol_health\n*elseif health > 20\n  You realize that you're holding on for now, but aren't sure how long you can take continued damage.\n  *goto karol_health\n*elseif health > 0\n  You're on death's door and you know it.\n  *goto karol_health\n*else\n  You can tell that that explosion you just took is your last. As you pass out for the last time in your life, you feel the chance to defeat Blaine slip through your fingers. You don't know it, but after you pass, Karol will pass as well, allowing Blaine to take over the world.\n  *goto_scene death\n\n*label karol_health\n\nYou look around you and are able to check on the health of both Karol and Blaine to get an idea on how the fight is going.\n\n*if karol = 5\n  Karol seems to be undamaged and in great health.\n  *goto Blaine_health\n*if karol = 4\n  Karol seems to be almost completely undamaged and in great health.\n  *goto Blaine_health\n*if karol = 3\n  Karol seems to be in relatively good health and still has a fair amount of 'gas' left so to say.\n  *goto Blaine_health\n*if karol = 2\n  Karol seems to be badly damaged. You're not sure how much longer she can hold out.\n  *goto Blaine_health\n*if karol = 1\n  Karol is on death's door, and almost certain to die at this point.\n  *goto Blaine_health\n\n*label Blaine_health\n\n*if Blaine >= 15\n  Blaine so far only has minor wounds and is holding up quite well.\n  *goto fight_10\n*elseif Blaine >= 12\n  Blaine has several minor wounds, and you can tell your attacks are starting to have an effect on him.\n  *goto fight_10\n*elseif Blaine >= 9\n  Blaine is starting to look pretty damaged, and you can tall your attacks are really taking him down.\n  *goto fight_10\n*elseif Blaine >= 6\n  Blaine is pretty heavily damaged. If you keep this up, you can probably win.\n  *goto fight_10\n*elseif Blaine >= 3\n  Blaine is pretty close to dying. You can smell blood in the water so to say.\n  *goto fight_10\n*else \n  Blaine is on death's door. He's pretty close to being finished off.\n  *goto fight_10\n\n*label fight_10\n\nKnowing that your mana won't last forever, you begin to look around yourself of a weapon. Or, at least something that can be used as an improvised one. Literally, anything will do. Blaine is on the ground, and this is your chance to get some free damage on him. You note that this being a castle museum's throne room, there's going to be representations of medieval weapons. You see around you a boomerang and a sword. You have briefly practised using a boomerang, and know that it takes some brains to throw it properly. You recognize the sword as something that's easier to wield and will do damage based on your strength. They're on opposite ends of the room, and Blaine will be up soon. What's your choice?\n\n*choice\n  #The boomerang. I think I'm smart enough to use it.\n    *goto boomerang\n  #The sword. I'm jacked enough to do serious damage.\n    *goto sword\n\n*label boomerang\n*if brains > 60 \n  You run over to the boomerang and throw it directly at Blaine. It hits him hard as he gets up, and returns to you. Good job, you got him.\n  *set Blaine - 2\n  *goto fight_11\nYou run over to the boomerang and throw it directly at Blaine. It barely scratches him for only minor damage, and bounces off the wall, landing a few feet away from you. Could have been better, I guess.\n*set Blaine - 1\n*goto fight_11\n\n*label sword\n*if fitness > 60\n  You run over to the sword and stab Blaine, and he's only barely able to barely avoid a stab to a vital area. You're still able to cause him to bleed, however.\n  *set Blaine - 2\n  *goto fight_11\nYou run over to the sword and stab Blaine, and he almost completely dodges the sword, as you barely scratch him.\n*set Blaine - 1\n*goto fight_11\n\n*label fight_11\n\nAs you're exposed, Blaine hits you with a minor blast spell as he gets up, dealing some damage to you.\n\n*set health -5\n\n*page_break\n\n*if health > 1\n  *goto fight_12\n  \n*else\n  Although the blast was very small, you a strange feeling of the lights being knocked out of you. Such a weak blast shouldn't have hurt you very badly, but as you were already so close to death that this effectively acted as a coup de grace. The world goes black, and you realize this is the end for you. You have no way of knowing it, but Karol will also fall to Blaine. He will eventually take over the world now with you and Karol out of the way. \n*goto_scene death\n*label fight_12\n\nWhile Blaine is looking at you, Karol blindsides him from behind, having summoned a tiger which jumped on him. Karol moves beside you, ready for a follow-up attack. Before Karol gets there, however, you're able to make a follow-up attack with your weapon, dealing even more damage to Blaine. After this, Blaine blows the tiger off of him, and Karol attacks him with a blast spell. You can make a second follow up attack. You take a second to survey the situation with your mana and Blaine's health.\n\n*set Blaine -3\n\n*if Blaine >= 10\n  Blaine's clearly been damaged, but you're nowhere near being able to finish him at the point.\n  *goto mana_check\n*elseif Blaine >= 7\n  Blaine's more than halfway dead, but this move still can't even come close to finishing him.\n  *goto mana_check\n*elseif Blaine >= 4\n  Blaine's close to dead. This exact move might not finish him, but it can come close.\n  *goto mana_check\n*elseif Blaine >=2\n  A perfect move here could finish him.\n  *goto mana_check\n*else\n  You could finish Blaine off easily here.\n  *goto mana_check\n\n*label mana_check\n\n*if mana >= 60\n  You still have plenty of mana, especially considering how long this fight has been, and your trip through the castle.\n  *goto tiger\n*elseif mana >= 40\n  You think you have enough mana left for the rest of this fight as long as you don't spam it for everything.\n  *goto tiger\n*elseif mana >=20\n  If you're careful, you should be able to make your mana last the rest of the battle.\n  *goto tiger\n*elseif mana > 0\n  You have very little mana left. Make it count.\n  *goto tiger\n*else\n  You have no mana left. You have to be resourceful in your attempts to deal damage.\n  *goto tiger\n\n*label tiger\n\n*if mana > 0\n  *choice\n    #Another hit with my weapon. I'm not using my mana up.\n      You bash Blaine with a weapon, doing noticeable damage.\n      *set Blaine -1\n      *goto weapon_block\n    #A blast spell. Simple and effective. Plus, Blaine is pinned.\n      He reals in pain from a combination of the tiger and your electrical shock.\n      *set Blaine -2\n      *set mana - 10\n      *set blast +1\n      *goto weapon_block\n    #Transform the tiger into something bigger. Crush him under its weight.\n      You turn the tiger into an elephant, and its foot is on top of Blaine, pushing down on his chest.\n      *set Blaine -2\n      *set mana - 10\n      *set transform +1\n      *goto weapon_block\n    #Summon another creature to double team him.\n      You summon a second tiger, which joins in taking down of Blaine.\n      *set Blaine -2\n      *set mana - 10\n      *set summon +1\n      *goto weapon_block\n*else\n  Since you are aware of the fact that you're out of mana, you don't bother attempting to cast a spell. You bash Blaine with a weapon, doing noticeable damage.\n  *set Blaine -1\n  *goto weapon_block\n\n*label weapon_block\n\nAfter putting everything into an extremely powerful blast spell removing all summoned threats around of him, you can see he's been beaten up pretty bad. Due to the fatigue involved in taking so much damage, and casting such a strong spell, he is significantly weaker than when you last checked. He's now able to blast both you and Karol, but only with relatively weak spells. He divides one spell of electricity, shooting at both of you. You can use your weapon to block one of the attacks. Do you use it to protect yourself, or Karol.\n\n*choice\n  #I use the weapon to protect myself. I should be able to finish off Blaine after this.\n    *set karol -1\n    *goto Karol_hit\n  #I protect Karol. Keeping the 2 on 1 going is paramount to winning this fight.\n    *goto self_hit\n\n*label Karol_hit\n\nAs you use your weapon to block the attack that was launched at you, Karol is hit. She is knocked back by the attack.\n\n*if Karol >= 2\n  She seems to be fine, at least for now.\n  *goto fight_13\n*elseif Karol = 1\n  She lives, but due to having taken a lot of damage earlier, the attack does take her to death's door.\n  *goto fight_13\n*else\n  After Karol is knocked down, she doesn't get back up. You can tell that she is done for good. In another moment, you would have taken the time to mourn, but there's no time now.\n  *goto fight_13\n\n*label self_hit\nYou use your weapon to protect Karol, but the electricity shoots through your body. The attack doesn't seem as damaging as others, but it's still not something you can shrug off.\n*set health -5\n*if health \u003c= 0\n  It's even worse than that, you were already so weak that such a hit was able to finish you off. You have no way of knowing this, but after you pass from this, Blaine will also be able to defeat Karol. Despite having taken heavy permanent damage, he will still be able to take over the world.\n  *goto_scene death\n*goto fight_13\n  \n*label fight_13\n\nAs the weapon flies out of your hand, blocking the attack, you notice that you, Karol and Blaine are all quite winded. It's at the point where no matter who is targeted, simply getting off an attack and hitting an opponent will be easy.\n\n*if Blaine > 10\n  You don't quite understand how Blaine is so resilient, but he hasn't been damaged nearly as much as you had previously thought.\n  *goto fight_14\n*elseif Blaine > 7\n  Blaine is clearly holding up better than you expected, despite heavy damage.\n  *goto fight_14\n*elseif Blaine > 4\n  Blaine is holding on, but you're doing a good job of wearing him down.\n  *goto fight_14\n*else\n  Blaine you have Blaine on death's door, and could finish him off very soon.\n  *goto fight_14\n\n*label fight_14\n\nExhausted as you are, you realize you can't pass on the opportunity.\n\n*if mana > 0\n  *choice\n    #I blast Blaine with a large fireball, I want to end this here and now.\n      *if blast > 60\n        Your blast magic is strong enough to roast Blaine, damaging him even further.\n        *set mana -10\n        *set Blaine -2\n        *set blast +1\n        *goto fight_15\n      Your blast of magic deals some damage to Blaine but isn't as effective as it should be.\n      *set mana -10\n      *set Blaine -1\n      *set blast +1\n      *goto fight_15\n    #I summon a creature to deliver a large blow to Blaine.\n      *if summon > 60\n        You summon a bison that charges at him, trampling him.\n        *set mana -10\n        *set Blaine -2\n        *set summon +1\n        *goto fight_15\n      You summon a bison that charges at him. Blaine is able to somewhat dodge it, only taking the original charge but he avoids being trampled.\n      *set mana -10\n      *set Blaine -1\n      *set summon +1\n      *goto fight_15 \n    #I use an illusion, to make him envision his own bleeding eyes\n      *if illusion > 60\n        You're not sure how it works, but Blaine screams in pain, and you can tell he is approaching his death.\n        *set mana -10\n        *set Blaine -2\n        *set illusion +1\n        *goto fight_15\n      You make him reel in pain, but it doesn't look like you're doing any real damage to him.\n      *set mana -10\n      *set Blaine -1\n      *set illusion +1\n      *goto fight_15 \n    #I use my bare hands. Gotta save mana.\n      *if fitness > 65\n        You beat him down better than you thought was even possible, and he becomes a mere pulp of a man.\n        *set Blaine -2\n        *set fitness +1\n        *goto fight_15\n      You land some punches, but do very little 'real' damage to him.\n      *set Blaine -1\n      *set fitness +1\n      *goto fight_15 \n  As you are out of mana, you attempt to beat up Blaine with your bare hands.\n    *if fitness > 65\n      You beat him down better than you thought was even possible, and he becomes a mere pulp of a man.\n      *set Blaine -2\n      *set fitness +1\n      *goto fight_15\n    You land some punches, but do very little 'real' damage to him.\n    *set Blaine -1\n    *set fitness +1\n    *goto fight_15\n\n*label fight_15\n\n*if Blaine \u003c= 0\n  As Blaine falls to the ground, motionless, at first you can't believe it. You kick him in the face a few times thinking you need to keep him down, but as he doesn't flinch, you know you've won.\n  *if Karol > 0\n    Karol gets up, seeing what you've done and throws her arms around you. Surprised by this, you turn to her as she smiles and says 'we did it'\n    *goto_scene Ending_Karol\n  *else\n    You look at Karol's corpse, kneel down and say 'your sacrifice was not in vain'.\n    *goto_scene Ending_No_Karol\n\n*if Karol > 0\n  After Blaine has taken some damage from that, he attempts to brush it off when Karol comes in, blasting him with ice.\n  *set Blaine -1\n  *if Blaine \u003c= 0\n    Wrapped up in ice, Blaine is unable to move. At first, you think its due to the ice freezing him in place. Then, afterwards, you realize that even his limbs that aren't encased in ice are motionless. After hitting him a few times to ensure that there's nothing left, you come to the realization that you've won after you are able to process this, Karol throws her arms around you. Surprised by this, you turn to her as she smiles and says 'we did it'.\n    *goto_scene Ending_Karol\n  *else \n    Wrapped in ice, Blaine takes a few seconds before he uses yet another blast spell, this one being fire, to melt the ice. You're able to notice that this did deal significant damage to him, but as he barely stands on his feet, he's ready for a counter-attack. \n    *goto fight_16\n*else\n  After Blaine has taken some damage from that, he attempts to brush it off. He faces you, ready for a counter-attack.\n  *goto fight_16\n\n*label fight_16\n\nTo wonder just how much damage this guy can take. As you take a second to absorb the shock of his survival, he summons a coyote to attack you. You're kind of surprised that a coyote is the strongest thing he's able to summon, but in his weakened state, it makes sense. It bites you once quickly, causing some damage.\n\n*set health -5\n\n*if health \u003c= 0\n  The bite makes you scream in pain, as your now fragile body is finished off by the bite. The world goes black, and never comes back.\n  *if Karol >= Blaine\n    You have no way of knowing this, but Blaine is weakened enough that only moments after you die, Karol is able to finish him off. You don't live to see it, be the world that you fought to preserve is maintained. Karol will lobby for a statue of you, as well as ones of the professor, Rick, Nancy, Damian and Veronica to be placed around as those who helped protect the world.\n    *goto_scene death\n  *elseif Karol > 0\n    You have no way of knowing this, but Blaine is still strong enough to take down Karol, and then take over the world in his image. Your sacrifice was for nothing.\n    *goto_scene death\n  *else\n    With nobody left in his way, Blaine is still strong enough to take over the world. Your sacrifice was for nothing.\n    *goto_scene death\n\nYou recover from the hit and now have a chance to fight back. What little Blaine had left seemed to be dedicated to creating the coyote, as he drops to the ground, struggling to stay conscious. His undefended state means you'll likely be able to deal much more damage now than you would under normal conditions. You notice that a spell here pushed to its max would increase this damage even further, but at the cost of some of your own health. Be absolutely sure you want to do this, otherwise, it could kill you.\n\n*if mana > 0\n  Do you push the spell?\n  *choice\n    #Yes, this is too good a chance to pass up.\n      *goto push\n    #No, it's too risky.\n      *goto no_p
