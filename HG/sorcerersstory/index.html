ush\n\n*else\n  Sadly, you can't even use a spell due to not having any mana left. Maybe you should have saved it.\n  *goto cant_push\n\n*label push\n\nWhat kind of spell do you push?\n*choice\n  #A blast spell. Time to finish this off the old fashioned way.\n    *if blast > 60\n      You engulf him in an extreme amount of flames, dousing him into what appears to be an excruciating amount of pain as he screams to the high heavens\n      *set mana -10\n      *set health -5\n      *set blast +1\n      *set Blaine -4\n      *goto after_push\n    You engulf him in plenty of flames, but feel like someone more skilled with blast magic would have done more.\n    *set mana -10\n    *set health -5\n    *set blast +1\n    *set Blaine -3\n    *goto after_push\n  #A summon spell. I can create something that could finish him.\n    *if summon > 60\n      You create a T-Rex, which seems to be able to kill him on its own. You smile, seeing it bite him once before it disappears.\n      *set mana -10\n      *set health -5\n      *set summon +1\n      *set Blaine -4\n      *goto after_push\n    You create a T-rex, which bites him once but doesn't hold onto him as long as you'd like before its time runs out.\n    *set mana -10\n    *set health -5\n    *set summon +1\n    *set Blaine -3\n    *goto after_push\n  #An illusion spell. I don't understand how they work, but if since they do might as well use them.\n    *if illusion > 60\n      You make Blaine see visions of horrifying otherworldly creatures surrounding his with their tendrils. Had it not been for the situation, I'd be wondering what was wrong with you.\n      *set mana -10\n      *set health -5\n      *set summon +1\n      *set Blaine -4\n      *goto after_push\n    You make Blaine see visions of otherworldly horrifying creatures. You don't understand why this is a thing and feel you could have done better, but it still damages him.\n    *set mana -10\n    *set health -5\n    *set illusion +1\n    *set Blaine -3\n    *goto after_push\n  #A transform spell. I can at least use this one on myself.\n    *if transform > 60\n      You turn yourself into a raptor, and run at Blaine, ripping what's left of him to shreds.\n      *set mana -10\n      *set health -5\n      *set transform +1\n      *set Blaine -4\n      *goto after_push \n    You turn yourself into a raptor but are only able to sustain it long enough to deal moderate damage.\n    *set mana -10\n    *set health -5\n    *set transform +1\n    *set Blaine -3\n    *goto after_push \n\n*label no_push\n\nYou choose not to, and instead don't want to hurt yourself more.\n\n*choice\n  #I use a blast spell to blow him away.\n    *if blast > 60\n      You attempt to kill him with a blast of fire and deal a lot of damage.\n      *set mana -10\n      *set blast +1\n      *set Blaine -3\n      *goto after_push \n    You burn him with fire. The fire could have been stronger, but there's no point in worrying about it now.\n    *set mana -10\n    *set blast +1\n    *set Blaine -2\n    *goto after_push\n  #I use a summon spell to create something strong.\n    *if summon > 60\n      You create a bull that charges at him, running him over for great damage.\n      *set mana -10\n      *set summon +1\n      *set Blaine -3\n      *goto after_push \n    You create a bull that charges at him, starting to run him over before it disappears.\n    *set mana -10\n    *set summon +1\n    *set Blaine -2\n    *goto after_push\n  #I use an illusion spell to make him think he's dying.\n    *if illusion > 60\n      You create an illusion spell that confuses him, in your attempt to make him think he's dead.\n      *set mana -10\n      *set illusion +1\n      *set Blaine -3\n      *goto after_push \n    You create an illusion spell that temporarily confuses him into thinking he's dead before he snaps out of it. Hopefully what you did was enough. \n    *set mana -10\n    *set illusion +1\n    *set Blaine -2\n    *goto after_push   \n  #I use a transform spell on myself.\n    *if transform > 60\n      You turn into a gorilla and beat the hell out of Blaine.\n      *set mana -10\n      *set transform +1\n      *set Blaine -3\n      *goto after_push \n    You turn into a gorilla and begin to beat him up, but the damage you do is minimal before you transform back.\n    *set mana -10\n    *set transform +1\n    *set Blaine -2\n    *goto after_push\n\n*label cant_push \n\nYou, however, can beat the hell out of him.\n*if fitness > 65\n  You successfully do so, doing more damage since he's exposed and tired.\n  *set Blaine -3\n  *goto after_push\n*else\n  You are able to beat him up somewhat.\n  *set Blaine -2\n  *goto after_push\n\n*label after_push\n\n*if health > 0  \n  *if Blaine > 0\n    You have no clue how, but all three of you are still alive, albeit barely.\n    *goto fight_16\n  *else\n    Your attack finishes him off, and you are able to save the day. You turn to Karol, and the two of you decide its time to rebuild everything. With almost no energy left, you two decide to walk out. Statues of the professor, Rick, Nancy, Veronica and Damian will all be built-in memorial to them.\n    *goto_scene Ending_Karol\n*else\n  *if Blaine > 0\n    You notice that you're beginning to black out and that your attempt to push the spell has backfired. Just as Blaine is too distracted by your passing from sheer body stress. In your last moment, you see a ray of energy that you can only assume came to pierce Blaine's heart. You can now eternally rest easy, knowing that your sacrifice meant something.\n    *goto_scene death\n  *else\n    As you begin to slip into what you know to be eternal blackness, you can see Blaine also falling down. You can now eternally rest easy, knowing that your sacrifice meant something.\n    *goto_scene death\n\n*fight_16\n\nAs you wonder how it is that Blaine is still alive, you watch a beam of what you believe to be energy strike through his heart, but after a split second, you determine it to actually be lightning. Turning around, you see that the beam came from Karol, who is exhausted and falls over. After checking to ensure that Blaine is really dead, you go over to Karol, to see if she's okay.\n\n*set Karol -1\n\n*if Karol > 0\n  You grab Karol just as she falls. \"I'm going to be okay. Thanks for saving me earlier.\"\n  \"Your welcome\", you say, solemnly.\n  \"Just give me a second to rest, and I'll be up,\" she manages to get out, this time with a little bit more energy. Stand by her side for a few moments just in case she doesn't get better. She does, and after several minutes, you two walkout.\n  *goto_scene Ending_Karol\n\n*else\n  You grab Karol just as she falls. \"It's too late for me.\"\n  \"No, I can save you,\" you respond\n  \"No, you can't. We did it though, we finished him. I can die happy. Now go, show the world the truth. Rebuild everything that was lost..\" she says, as she slips from this world. \n  *goto_scene Ending_No_Karol", "spymissed": "As time passes, you feel as if catching Steve early would have easily saved the lives of not only the professor but also Damian and Veronica. How much guilt do you feel having to cope for the next few days?\n\n*fake_choice\n  #A lot. I could have saved them.\n    Understandable. There's a lot of things you can do in order to prevent others from dying, though.\n  #A decent amount. I know I'll probably get over it after the funeral, but it still eats at me for now.\n    Closure is important. Best you accept this as part of the grieving process and focus on what is to come.\n  #Hardly. I don't know if there's anything I could have done.\n    Best not to let it eat at you too much. There's some stuff you have to do.\n  #None. I probably would have died anyway.\n    Best you don't think about your mortality too much. At least this way, you can prevent others from dying.\n\n*page_break\n\nIt's still a few days before the funeral. Besides reviewing your time around Steve and Blaine, which doesn't do much and living your life, such as going to work you still have some time on your hands. What do you do during your spare time?\n\n*choice\n  #Socializing\n    You realize you're getting more socially adept but on some level feel like you're wasting your time.\n    *set social +1\n    *goto funeral\n  #Studying\n    You feel a boost to your intelligence but on some level feel like you're wasting your time.\n    *set brains +1\n    *goto funeral\n  #Lifting\n    You feel yourself getting stronger but on some level feel like you're wasting your time.\n    *set fitness +1\n    *goto funeral\n\n*label funeral\n\nAs you go to the funeral, you meet up with Karol, who has already round up both Rick and Nancy. It's now just the four of you: everyone else is either dead, injured in the original attack on the university or has dropped out not believing Steve and Blaine would find them.\n\n\"I can't believe we missed him,\" you hear Nancy saying to Rick with her head down, on the verge of tears. \"We saw him questioning the professor for so much information, but we didn't catch on to the fact that he was a spy. How did we miss that? We could have saved them.\"\n\nYou see out of your peripheral vision that Karol is biting her lip as if she's not sure what to say. Rick paused, not sure what to say before taking a deep breathe and replying \"I know. I'm not sure if there's anything we could have done, though. Steve wasn't there attacking, so even if we caught him, I don't know if it would have saved his life.\"\n\nThere's a brief pause as the three all see you have now finished your approach. \"Hello, ${name},\" Karol says to you, while Rick nods solemnly. Nancy face stuffed in her hands from crying peeks out at you but doesn't respond before going back to being unable to hold back tears. How do you handle the situation?\n\n*choice\n  #I back up Rick in supporting Nancy. She seems pretty upset.\n    *if social > 54\n      You have the social graces to be able to console Nancy, and she seems to calm down after you do so. Looks like you're better at socializing than you thought.\n      *set social +2\n      *goto attack\n    You don't quite have the social graces to console Nancy, and she doesn't respond to your kind words. Luckily, Karol and Rick are able to do so and give you a         better idea of what to say next time.\n    *set social +2\n    *goto attack\n  #I greet Karol. She seems to be putting forward the most work in greeting me.\n    Karol seems receptive to your greeting, and eventually, Rick is able to calm down Nancy, although not before her face is covered in tears. You see that both Rick and     Karol have also shed a tear or two each, but are simply better at not letting it consume them.\n    *set social +1\n    *set brains +1\n    *goto attack\n  #I get right into the conversation. No time to waste, information here is life or death.\n    You're not quite sure how well this could have gone. The others seem a little shocked at your willingness to jump into the conversation but are at least on their toes.\n    *set brains +2\n    *goto attack\n  #I let the situation play out. I don't know what to say and feel like I'd just be interrupting.\n    After you simply nod back, Rick and Karol continue to console Nancy, who slowly starts to feel better, allowing you to start getting in a conversation about the topic at hand.\n    *set brains +1\n    *set social +1\n    *goto attack\n\n*label attack\n\n*page_break\n\nAs the three of you begin to discuss what little information you have. As the four of you exchange what little information you have, you realize just how little all of you have on Blaine, and how you'd do almost anything for more info.\n\nAs soon as the thought of wanting that information crossed your mind as if on cue, you hear a lot of commotion coming from the entrance of the funeral home. You decide to ignore it, figuring its best to instead pay your respects to the professor, but very quickly the noise gets louder, and you recognize the sound of gunfire. \"Oh no,\" you think to yourself, wondering who would be so disrespectful as to shoot up a funeral. Nancy, Rick and Karol are all preparing to battle whoever comes through that door as you once again notice thugs dressed the same as the ones who shot up the university classroom that one day that got this all started. What do you do to battle against the first wave?\n\n*choice\n  #A simple blast spell. I'm not playing any games here, we have to clean this up as quickly as possible.\n    *if blast > 54\n      You incinerate a few of the thugs coming in, cleaning them up before they become a threat. I don't have time for these games.\n      *set blast +1\n      *set mana -10\n      *goto fight_2\n    You are unable to do enough damage in a single blast to clear them out, and they begin to shoot you. Luckily, Rick is able to finish them off before they deal much damage to you.\n    *set blast +1\n    *set mana -10\n    *goto fight_2\n  #A transform spell. I'm going to minimize their threat.\n    *if transform > 54\n      You successfully turn one of them into a rat, and they scurry out before they're able to deal any damage to anyone.\n      *set transform +1\n      *set mana -10\n      *goto fight_2\n    You attempt to transform one of them into a rat, but he gets off a few shots at you before you do so. Luckily, he does transform before he deals much damage to you.\n    *set transform +1\n    *set mana -10\n    *goto fight_2\n  #A summon spell. I'm going to have something else take them out.\n    *if summon > 54\n      You're able to summon a dog into attacking them and scaring some of the thugs away causing mass confusion and holding them off for a few seconds while your teammates permanently take them out.\n      *set summon +1\n      *set mana -10\n      *goto fight_2\n    You summon a dog into attacking them, but you're not skilled enough at summoning to have the dog realistically scare them enough before they begin attacking you.     Luckily, they are forced away by your allies before doing any real damage.\n    *set summon +1\n    *set mana -10\n    *goto fight_2\n  #I counter charm one of them and have him fight for our side. We need numbers at this point.\n    *if charm > 54\n      You're able to take control of one of them, as he turns around and begins to attack his allies. They quickly beat him down, but the damage and stalling that he performed for you was adequate for the moment.\n      *set charm +1\n      *set mana -10\n      *goto fight_2\n    It takes a few second to successfully charm to thug, and a few shots are taken at you before you are able to successfully fight back. Then the thug turns around,       having finally been taken control by you, and is finally shot down, causing only a brief distraction.\n    *set charm +1\n    *set mana -10\n    *goto fight_2\n\n*label fight_2\n\n*page_break\n\nYou hear outside two men screaming at each other. One of them you recognize as Steve's, but the other one you can't seem to place. After a few screams, you recognize it as seeming slightly 'soft' and can hear it as the voice of one of the other sorcerers you studied alongside, but can't quite pick out who it is.\n\n\"Is that second voice...Lee?\" Karol asks over everyone. You recognize it is, in fact, Lee, as Nancy gasps and Rick mutters an \"mhmmm\" in agreement. \"Of course Lee would side with Blaine. He was always his little lackey,\" Karol continued. You're not sure what to say. You do recognize Lee as someone who would always kiss up to Blaine, and listen to his ridiculous stories. The sheer number of times you thought Lee would do almost anything for Blaine is something you had lost count of months ago, but you never in your right mind thought that it would escalate to the point of wanting to actually hurt and kill innocents over.\n\n\"We need a plan,\" Rick says, as the voices come closer. \"I think there are only a few other soldiers, and anyone of us can handle them.\"\n\n\"I'll take out Lee,\" Karol said enthusiastically.\n\n\"I'll take out Steve,\" Nancy followed up.\n\n\"Guess that leaves me to take out their mind-controlled minions,\" Rick said, before turning towards you. \"Okay ${name}, you can guarantee a quick victory in almost any of these fights. Which will it be?\" As the sounds of yelling and some light gunfire and footsteps grow near, you realize you only have a couple of seconds to decide where your attention should be directed. What do you do?\n\n*choice\n  #I help Karol take out Lee. That should be a very quick victory.\n    You determine that Karol could use some help in taking out Lee as quickly as possible.\n    *goto fight_Lee\n  #I help Nancy take out Steve. That's the battle that should be hardest, and I don't want to lose her.\n    You choose to take out the main threat and best fighter first while protecting one of yours.\n    *goto fight_Steve\n  #I help Rick with the goons. Get the sheer numbers on our side.\n    You can easily take out some of these guys and then quickly fight someone else.\n    *goto fight_Minions\n\n*label fight_Lee\n\nYou notice that both Lee and Karol are using a blast spell against each other. The two blasts meet in mid-air, hitting each other and cancelling each other out. You see that Karol really could use your help, but you're not sure what to do. You have the opportunity to blindside Lee right now with whatever it is you choose to do, however.\n*choice\n  #Use a spell to charm one of the other minions into fighting Lee. This also slightly helps Rick and Nancy.\n    *if charm > 54\n      You successfully take control of one of the minions, and it shoots Lee. As he tries to take control of it back, Karol hits him with a blast spell.\n      *set charm +1\n      *set mana -10\n      *goto fight_Lee2\n    You are unable to take control of the minion. Lee, however, notices your attempt and redirects his blast spell towards you. This gives Karol the opportunity to hit him with her blast spell, damaging him.\n    *set charm +1\n    *set mana -10\n    *goto fight_Lee2\n  #Use a spell to charm Lee into standing still for a few seconds. Let Karol get a hit him.\n    *if charm > 54\n      You successfully get Lee to stand there and take a hit from Karol.\n      *set charm +1\n      *set mana -10\n      *goto fight_Lee2\n    Lee notices you attempt to take control of his mind, and he blasts you. This gives Karol the opportunity to hit him with her blast spell, damaging him.\n    *set charm +1\n    *set mana -10\n    *goto fight_Lee2\n  #Blast Lee. If Karol and Lee have evenly matched blast spells, your blast spells are clearly superior to both of them.\n    *if blast > 54\n      You blindside Lee with a strong elemental blast. He makes a last-ditch attempt to stop it but is easily mowed over by your raw power.\n      *set blast +1\n      *set mana -10\n      *goto fight_Lee2\n    Your blast is seen and countered by Lee, who cancels it out with his spell. However, it was enough of a distraction to cause Lee to turn his back to Karol, who hits him with her own blast spell.\n    *set blast +1\n    *set mana -10\n    *goto fight_Lee2\n  #Transfrom Karol into something stronger. Give her an assist.\n    *if transform > 54\n      You successfully turn Karol into a Tiger. She then jumps directly over Lee's blast spell, pouncing on him and pinning him.\n      *set transform +1\n      *set mana -10\n      *goto fight_Lee2\n    You are unable to transform Karol quickly enough, and Lee turns his attention to you, blasting you with a spell. However, afterwards, Karol is finally transformed,     into a tiger, and jumps on Lee.\n    *set transform +1\n    *set mana -10\n    *goto fight_Lee2\n  #Summon something to help Karol. Make it a 3 vs. 1\n    *if summon > 54\n      You successfully summon a bear on top of Lee, and it mauls him, pinning him to the ground.\n      *set summon +1\n      *set mana -10\n      *goto fight_Lee2\n    As you attempt to summon a bear, Lee interrupts you by blasting you with one of his spells. You take some damage, but he had just opened himself up to an attack from     Karol, who takes advantage.\n    *set summon +1\n    *set mana -10\n    *goto fight_Lee2\n \n\n\n*label fight_Lee2\n\n*page_break\n\nAfter seeing the damage that Lee took from that attack, you realize that he is already on the ropes. \"Wow,\" you think to yourself \"I knew that Lee was pretty weak in a straight fight, but this is a little bit ridiculous,\" you think as Lee is already bleeding, holding his arm and slightly limping. You don't question it, however, as it goes in your favour. Given how easily you're winning, you decide to put the pedal to the metal and finish this here and now. What kind of spell do you use to finish him off?\n\n*choice\n  #A blast spell. No need to do anything fancy. Just incapacitate him on the spot.\n    *if blast > 54\n      You're skilled enough with blast magic to be able to control a full-powered blast and directly incapacitate Lee. He lies unconscious on the ground while you and the others are still standing.\n      *set mana -10\n      *set blast +1\n      *goto after_Lee\n    You seem a little too rushed and your skill with blast magic isn't at the point where you can control it perfectly. You easily knock Lee out, but also knock yourself back very hard, taking some moderate damage. Best be careful next time.\n    *set mana -10\n    *set blast +1\n    *set health -10\n    *goto after_Lee\n  #A summon spell. On the off chance he gets out, I'll be able to see everything from afar.\n    *if summon > 54\n      You're skilled enough with summon magic to be able to properly summon a komodo dragon that whips it tail hard enough to knock Lee out. You're able to recall it before it begins attacking others. \n      *set mana -10\n      *set summon +1\n      *goto after_Lee\n    You summon a komodo dragon that whips its tail hard enough to knock Lee out. However, you don't have the skill to recall it before it begins to attack you.             Luckily, Karol is able to transform it into a mouse and finish it off, saving you from further damage.\n    *set mana -10\n    *set summon +1\n    *set health -10\n    *goto after_Lee\n  #A charm spell. It might allow me to begin the interrogation early.\n    *if charm > 54\n      You successfully penetrate Lee's mind and force him to be subject to Karol's attack. She takes advantage of the opportunity to hit him with a simple blast spell,       knocking him out.\n      *set mana -10\n      *set charm +1\n      *goto after_Lee\n    You attempt to get into Lee's head but instead simply act as a distraction. He blasts you, and although you take damage, Karol still has the chance to use her own spell to damage him. She takes advantage of the opportunity to hit him with a simple blast spell, knocking him out.\n    *set mana -10\n    *set charm +1\n    *set health -10\n    *goto after_Lee\n  #A transform spell. Make him even more powerless.\n    *if transform > 54\n      You successfully transform him into a mouse, which Karol readily steps on, injuring him enough. You transform him back, and he is completely incapacitated.\n      *set mana -10\n      *set transform +1\n      *goto after_Lee\n    You attempt to transform him into a mouse but are unable to do so before he blasts you. After you receive the blast, you realize that your efforts were eventually successful, and Karol has stepped on him, injuring him. You de transform him, and he returns to his human form barely conscious.\n    *set mana -10\n    *set transform +1\n    *set health -10\n    *goto after_Lee\n\n*label after_Lee\n\nYou see Lee fall to the ground, unconscious. You turn around to see that the minions, no longer under mind control, are surrendering. Rick, clearly aware of the change in the status quo, chooses to stop attacking said minions and accepts their surrender. Steve, seeing that the situation has now turned into a 4 vs.1 is completely overwhelmed and surrenders immediately. \n\n*goto after_fight \n\n*label fight_Steve\n\nNot sure if you want more so to protect Nancy or takedown Steve, you realize that this fight isn't exactly going to be easy. In fact, its probably going to be the hardest of the three, but you decide to go through with it anyway. Steve summons a lion to attack Nancy, and she is unable to fight back right away. How do you proceed in your fight against Steve?\n\n*choice\n  #I attack him with a blast spell to hurt him initially.\n    *if blast > 54\n      You attack Steve with a mighty blast sending him back.\n      *set blast +1\n      *set mana -10\n      *goto Steve2\n    Your blast is not powerful enough to harm him. He does feel it however and attack you back.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto Steve2\n  #I summon a creature to attack him.\n    *if summon > 54\n      You create a panther that leaps across the room and pounces on Steve, temporarily pinning him to the ground, and incapacitating him for a few seconds.\n      *set summon +1\n      *set mana-10\n      *goto Steve2\n    You create a panther, but can't make it strong enough to Pin Steve down before he attacks you. The panther eventually does, but Steve's attack still hits you for some damage.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto Steve2\n  #I transform Nancy into something stronger.\n    *if transform > 54\n      You turn Nancy into a tiger and she jumps over Steve's blast attack, jumping on him and pinning him to the ground.\n      *set transform +1\n      *set mana-10\n      *goto Steve2\n    You turn Nancy into a tiger but are not able to do so fast enough to stop Steve from hitting you with a blast spell before Nancy jumps on him.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto Steve2\n  #I attack him physically. Not everything has to be done via magic.\n    *if fitness > 59\n      You quickly run up to Steve and punch him in the jaw.\n      *set fitness +1\n      *goto Steve2\n    You are unable to reach Steve before he hits you with a blast spell.\n    *set fitness +1\n    *set health -10\n    *goto Steve2\n\n*label Steve2\n\nYou're about to decide what to do next but then suddenly a large blast spell comes hurling directly from behind you, hitting Steve like a truck. Its Rick, who sniped him out after defeating the minions. You turn to see that Karol is fighting Lee 1 vs.1, but Lee immediately surrenders seeing both Steve and the minions incapacitated.\n\n*goto after_fight\n\n*label fight_Minions\n\nRick sees you look in his direction and nods. \"We have this easily,\" he says, ready to attack. The second they break through the door, he sends a blast knocking out a bunch of them, giving you the opportunity to finish them off quickly. How do you attempt this?\n\n*choice\n  #Use a charm spell on one of the minions in order to turn one of them to your side and have them attack non-lethally.\n    *if charm > 54\n      You take full control of one of the minions, who turns around and begins knocking out others. This old allies then proceed to take him out. At least the guys he knocked out will live once the mind control is over.\n      *set charm +1\n      *set mana -10\n      *goto fight_minions2\n    You attempt to take full control of a minion but are too weak to do so. He turns towards you and shoots, damaging you.\n    *set charm +1\n    *set mana -10\n    *set health -10\n    *goto fight_minions2\n  #Use a blast spell against the group to take them out quickly.\n    *if blast > 54\n      You incinerate a group of minions, taking out a whole bunch at once. It pains you that you're actually killing them, but the alternative is for you to be killed.\n      *set blast +1\n      *set mana -10\n      *goto fight_minions2\n    You attempt to create a fireball but lack the blast magic strength. A few members of the group of goons is able to get out of the way and attack you with their guns.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto fight_minions2\n  #Use a transform spell to turn yourself into something stronger.\n    *if transform > 54\n      You turn yourself into a hippo and charge in quickly, turning several of the minions aside in order to spread them out and damage several of them.\n      *set transform +1\n      *set mana -10\n      *goto fight_minions2\n    You attempt to turn yourself into a hippo, but aren't skilled enough to get it done fast enough. You're shot before making the transformation, dealing some damage.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto fight_minions2\n  #Use a summon spell to create something else. More numbers on our side is always good.\n    *if summon > 54\n      You create a Wolf that successfully take out a few of the attackers before the attacks remove it from existence. \n      *set summon +1\n      *set mana -10\n      *goto fight_minions2\n    You are unable to create a wolf quick enough. Some of the attackers recognize your attempt to summon a creature, and shoot you, giving you a slight injury.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto fight_minions2\n\n*label fight_minions2\n\nNow, you see that the minions have been finished off. You see that Karol is successfully fighting off Lee, but Nancy is struggling against Steve. \"I'll help Nancy,\" Rick says. After seeing that both battles are probably won already, you have the chance to intervene in one. What do you do?\n\n*choice\n  #Finish off Lee. Easy prey.\n    *goto post_minions1\n  #Help against Steve.\n    *goto post_minions2\n\n*label post_minions1\n\nKarol has Lee's full attention, and the two have widdled each other down pretty good. You realize that you have a great chance to finish off Lee right here and now. How do you do so?\n\n*choice\n  #A blast spell. No need to do anything fancy. Just incapacitate him on the spot.\n    *if blast > 54\n      You're skilled enough with blast magic to be able to control a full-powered blast and directly incapacitate Lee. He lies unconscious on the ground while you and the others are still standing.\n      *set mana -10\n      *set blast +1\n      *goto after_Lee2\n    You seem a little too rushed and your skill with blast magic isn't at the point where you can control it perfectly. You easily knock Lee out, but also knock yourself back very hard, taking some moderate damage. Best be careful next time.\n    *set mana -10\n    *set blast +1\n    *set health -10\n    *goto after_Lee2\n  #A summon spell. On the off chance he gets out, I'll be able to see everything from afar.\n    *if summon > 54\n      You're skilled enough with summon magic to be able to properly summon a komodo dragon that whips it tail hard enough to knock Lee out. You're able to recall it before it begins attacking others. \n      *set mana -10\n      *set summon +1\n      *goto after_Lee2\n    You summon a komodo dragon that whips its tail hard enough to knock Lee out. However, you don't have the skill to recall it before it begins to attack you.             Luckily, Karol is able to transform it into a mouse and finish it off, saving you from further damage.\n    *set mana -10\n    *set summon +1\n    *set health -10\n    *goto after_Lee2\n  #A charm spell. It might allow me to begin the interrogation early.\n    *if charm > 54\n      You successfully penetrate Lee's mind and force him to be subject to Karol's attack. She takes advantage of the opportunity to hit him with a simple blast spell,       knocking him out.\n      *set mana -10\n      *set charm +1\n      *goto after_Lee2\n    You attempt to get into Lee's head but instead simply act as a distraction. He blasts you, and although you take damage, Karol still has the chance to use her own spell to damage him. She takes advantage of the opportunity to hit him with a simple blast spell, knocking him out.\n    *set mana -10\n    *set charm +1\n    *set health -10\n    *goto after_Lee2\n  #A transform spell. Make him even more powerless.\n    *if transform > 54\n      You successfully transform him into a mouse, which Karol readily steps on, injuring him enough. You transform him back, and he is completely incapacitated.\n      *set mana -10\n      *set transform +1\n      *goto after_Lee2\n    You attempt to transform him into a mouse but are unable to do so before he blasts you. After you receive the blast, you realize that your efforts were eventually successful, and Karol has stepped on him, injuring him. You de transform him, and he returns to his human form barely conscious.\n    *set mana -10\n    *set transform +1\n    *set health -10\n    *goto after_Lee2\n\n*label after_Lee2\n\n\"Thanks,\" Karol says to you. I don't know whether or not I would have been able to take him completely myself. \"Now, time to finish the job, she says, turning towards the battle between Nancy and Steve, which Rick has now joined. Following suit, you turn to Rick and Nancy to see that Rick has completely blindsided Steve, knocking him out as well. \"Or, not. They seem to have it handled.\" She says, letting herself smile, which you note she hasn't done much lately.\n\n*goto after_fight\n\n*label post_minions2\n\nAs you decide to help Nancy and Rick with Steve, you realize you have some options to fight him. How do you do so?\n\n*choice\n  #I attack him with a blast spell to hurt him initially.\n    *if blast > 54\n      You attack Steve with a mighty blast sending him back.\n      *set blast +1\n      *set mana -10\n      *goto post_minions3\n    Your blast is not powerful enough to harm him. He does feel it however and attack you back.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto post_minions3\n  #I summon a creature to attack him.\n    *if summon > 54\n      You create a panther that leaps across the room and pounces on Steve, temporarily pinning him to the ground, and incapacitating him for a few seconds.\n      *set summon +1\n      *set mana -10\n      *goto post_minions3\n    You create a panther, but can't make it strong enough to Pin Steve down before he attacks you. The panther eventually does, but Steve's attack still hits you for some damage.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto post_minions3\n  #I transform Nancy into something stronger.\n    *if transform > 54\n      You turn Nancy into a tiger and she jumps over Steve's blast attack, jumping on him and pinning him to the ground.\n      *set transform +1\n      *set mana -10\n      *goto post_minions3\n    You turn Nancy into a tiger but are not able to do so fast enough to stop Steve from hitting you with a blast spell before Nancy jumps on him.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto post_minions3\n  #I attack him physically. Not everything has to be done via magic.\n    *if fitness > 59\n      You quickly run up to Steve and punch him in the jaw.\n      *set fitness +1\n      *goto post_minions3\n    You are unable to reach Steve before he hits you with a blast spell.\n    *set fitness +1\n    *set health -10\n    *goto post_minions3\n\n*label post_minions3\n\nYou see Rick attack, Steve, following up your attack with his own. Unable to block it, Steve is knocked out, and Lee surrenders his fight with Karol, knowing he wouldn't be able to handle a 4 vs. 1 as Nancy is getting back up.\n\n*goto after_fight\n\n\n*label after_fight\n\n\nAfter having neutralized both Lee and Steve, you leave the funeral home and the four of you all leave together in order to interrogate the two traitors that Blaine had been able to recruit. You gain all the information you need from them.\n\n\n*page_break\n\n*goto_scene chapter4\n", "ch1": "\nYou stand there in an almost empty room, inside a massive building. \nBy day, this place is a university, home to some of the best and\nbrightest in this city. However, on nights like tonight, it is used\nsecretly to house those with a great gift. \n\nA small number of people, less than 1 in 100,000,000 are given the\ngift of pure magic at birth, with most not even aware they were given\nit. However, with magic currently seen as a threat to public safety,\nyou and the others must hide your magical abilities, honing them only\nin this university under the dark of night. \n\nYou must keep your identity a secret. That is why you spend 40 hours a week\nworking as a...whatever it is you do.\n\n*choice\n  #Customer service worker\n    Yes, you have great charm dealing with people all day. Without spells, you appear to work magic with people.\n    *set Social %+20\n    *goto activity\n  #Web developer\n    So, you're smart and use your brilliance to create and manage your company's website. Without spells, you appear to work magic with computers.\n    *set Brains %+20\n    *goto activity\n  #Physical Labourer\n    You use your great might to move around heavy objects all day. Without spells,\n    you appear to work your magic with heavy objects.\n    *set Fitness %+20\n    \n*label activity\n\n*page_break\nEven a sorcerer has a life outside of work though, right? Yes, you do.\nWhat do you do in your spare time?\n*choice\n  #Party\n    You love having fun, and you make everything more fun for the people around you.\n    *set Social %+10\n    *goto gender\n  #Read\n    You love a good book and can absorb knowledge like a spounge. You're the only one here to realize I misspelt sponge.\n    *set Brains %+10\n    *goto gender\n  #Work out\n    Speed or Strength? Who cares, you have both! Your body looks great as well.\n    *set Fitness %+10\n\n*label gender\n\n*page_break\nAnd you are a...\n*choice\n  #Man\n    *set gender \"Male\"\n    *goto insert_name\n  #Woman  \n    *set gender \"Female\"\n    *goto insert_name\n  #Non-binary\n    *set gender \"Non-binary\"\n\n*label insert_name\n\n\n\nYour name is\n*input_text name\n\n\nYes, ${name} the ${gender} sorcerer is indeed very powerful.\nEvery sorcerer is able to specialize in one area of magic. What school of magic\nare you best at? Keep in mind you know spells from every school of magic, but you start off stronger in a specific sort of magic.\n\n*choice\n  #Charm\n    You specialize in casting spells that neutralize and pacify enemies\n    and guards in order get what you want from them. You can also stop\n    a fight before it starts, often finding non-violent ways to get\n    by enemies.\n    *set Charm %+20\n    *goto practice\n  #Blast\n    Fire, telekinetic blasts, what have you. You have a special affinity\n    for blasting people and objects with force and elemental blasts for\n    violent effects.\n    *set Blast %+20\n    *goto practice\n  #Illusion\n    You can make things look like they're there. Or, you can make things\n    invisible. This school is very versatile, so keep your imagination\n    open when casting these spells\n    *set Illusion %+20\n    *goto practice\n  #Summon\n    You can summon creatures to do your bidding. From fighting your battles\n    to doing mundane tasks for you, your creatures can perform a variety\n    of tasks for you.\n    *set Summon %+20\n    *goto practice\n  #Transform\n    You can transform yourself or others into different things...temporarily.\n    Strengthen yourself and your allies or weaken or enemies. \n    *set Transform %+20\n    *goto practice\n  #Knowledge\n    Learn the layout and contents of a room before you walk in. Know friend from foe. Being prepared with no prep time is great.\n    *set Knowledge %+20\n\n*label practice\n\n*page_break\n\nHowever, how great you are at something from birth isn't everything.\nHard work can improve your skill are something. As you attend your magic\nclass in the university, you focus on improving a certain school of magic.\n\n*choice\n  #Charm\n    You learn how to better take over people's minds. You search for\n    a peaceful negotiation...where you get everything you want without\n    giving anything else up.\n    *set Charm %+10\n    *goto invasion\n  #Blast\n    You want to learn more about how to overpower your opponent with sheer\n    power. Simple, but effective. A dead opponent can't come back and\n    tattle on you later.\n    *set Blast %+10\n    *goto invasion\n  #Illusion\n    You like the dual aspect of making things look like they've either\n    appeared or disappeared. Your love the creativity of this power\n    and plan to use it whenever possible. \n    *set Illusion %+10\n    *goto invasion\n  #Summon\n    You practice bringing creatures into place. One day all this work\n    will mean you can outsource everything you'll want to do in the\n    real world.    \n    *set Summon %+10\n    *goto invasion\n  #Transform\n    You practice transforming desks into other objects, and then back.\n    *set Transform %+10\n    *goto invasion\n  #Knowledge\n    You start learning trivial matters...magically.\n    *set Knowledge %+10\n\n*label invasion\n\n*page_break\n\nAs you practice casting spells, you hear an explosion coming from downstairs.\nYou look at the professor, who explains that he thinks that someone has found\nyour society and is breaking in. Other students begin to scream in terror, now\nterrified and attempting to use their spells to solve the problem. \n\nSome of the illusion specialists turn invisible, transformation specialists try\nto change the contents of the room, and knowledge specialists try to see who's breaking in. One of the knowledge specialists who succeeds states the location\nof the break-in, stating also that those breaking in don't seem to be part of\nthe government's usual team of specialists who come after sorcerers. These invaders have military training, running in with assault rifles, and mowing\ndown the select few sorcerers on the bottom floor without any trouble.\n\nThe instructor yells to the others to stop running and stand up. The sorcerer\nwho used a spell to keep an eye on the invaders is keeping everyone updated on\ntheir location, informing every that they seemed to be making a B-Line towards\nyour current room as if they knew where all of you are. You and the other sorcerers\nstart preparing your spells. What are you planning on doing?\n\n*choice\n  #Use a charm spell to turn one of the invaders against the others\n    The door breaks down and the invaders run in, spraying the place with bullets. \n    You pick one out and waving your hand out and making the proper gesture, try to take control of their mind. Their face contorts, letting you know its working.\n    \n    Turning your hands in a circle, you turn him around, forcing him to spray is former comrades with bullets, until they are forced to fire back, the final invader alive finishes off your sock puppet. Another sorcerer hits the surviving invader with a \n    blast of lightning.  \n    *set mana -10\n    *set charm +1\n    *goto after_fight \n\n  #Use a blast spell to hurt or kill invaders \n    The door breaks down and the invaders run in, spraying the place with bullets.\n    Sticking you hand out as if signalling stop, you spit out a ball of fire,\n    setting several invaders ablaze. Their screams or pain and terror would have been the most terrifying thing you've heard had they not been violent criminals.\n    *set mana -10\n    *set blast +1\n    *goto after_fight \n\n  #Summon an animal to fight against the invaders\n    The door breaks down and the invaders run in, spraying the place with bullets.\n    You raise a hand up as you summon a bear into the world, jumping on a group of the invaders. Many choose to change their target to the bear in self-defence.\n\n    The bear is eventually shot down, with only two Invaders left. One of sprayed\n    by another sorcerer's shot of lightning, while the other tries to escape has a\n    chair thrown his head, 1 shot killing him.\n    *set mana -10\n    *set summon +1\n    *goto after_fight \n\n  #Use a transform spell to turn one of the invaders into something harmless\n    The door breaks down and the invaders run in, spraying the place with bullets.\n    You clench a fist, reducing one of the invaders into an ant. Another invader steps on the ant, unaware that it's his old ally. The scream of the ant sounds human, both in pitch and volume. This causes all the invaders to lose their minds distracting them. As chaos ensues on their side, your allies shot all sorts of spells in a matter of a second. The next second, the invaders appear as a pile of corpses.\n    *set mana -10\n    *set transform +1\n    *goto after_fight \n\n*label after_fight\n\n*page_break\n\nYou look around to see most other sorcerers are able to make it out without \nsignificant damage, and some, like you, were left unscathed. Out of the two\ndozen sorcerers, only 1 had been killed, with 3 having huge injuries such as\nbroken limbs and about half of the rest had injuries that would heal within a\nday, with the rest being unharmed, including you and the professor.\n\n\"The rest of class has been cancelled\", said the prof, who immediately tends to the wounded. You notice one of your classmates dialling 911. You're not sure\nhow the wounds those have sustained will be explained to the emergency workers, \nbut have no doubt that the prof does have a plan for if you have to explain injuries. \n\"We will be evacuating in 5 minutes, as soon as all the wounded are accounted for\"\n\nYou notice a few of your classmates had already left before hearing that\ninstruction, with others tending to their classmates. Noticing social groups\ntending to stay together (those with friends who were wounded are tending to\nthem) you see very little you can do. You only have enough time to do one\nthing, though. If you choose to intervene at all.\n\n\n*choice\n  #Leave now. There is little I can do and I need to rest before going to work.\n    Not sure of how, or even if you can help, you leave, wanting to stay out of the way. You feel bad about if you could have helped, and what you could have done, but right now you have to focus on making sure this doesn't harm your personal life.\n    *goto next_day\n  #Tend to one of the wounded. Maybe I can help.\n    You look around, seeing your 3 wounded comrades. \n    One of them is someone who you vaguely recognize, with a broken arm. He is also bleeding from his mouth. You've had some small talk with him before,\n    but can't bring yourself have any specific memories of him.\n\n    The second is one appears to have had her head hit by a couple of bullets shot from the invaders' guns. You've practised alongside her a lot and generally think of her as someone who you enjoy spending time with. However, she appears to have not always returned the kindness. She hasn't been mean to you, just slightly dismissive. For example, she usually says 'we could use your idea'\n    when you present ideas, but always changes the subject whenever you go into details. You're not sure if this is personal.\n\n    The third appears to have broken a leg. You've had a bit of an ongoing rivalry with him in the past few months, often trying to out-compete each other with your spells. He seems to demean you in private, but stand up for you in group environments, similar to how a twin sibling would. You, however, don't feel the closeness that you would with twins.\n    *Choice\n      #My acquaintance with the broken arm\n        You see two others tending to his wounds. He's breathing heavily but doesn't appear strained. One of the others helping him wipes away his blood, and you can see no new blood coming out to replace it. Maybe it's not as bad as it first looked.\n\n        \"Are you okay?\" you ask him\n\n        \"Better...than you think,\" he says, slowly, struggling to properly articulate.\n\n        \"He was hit in the jaw and the arm by stray bullets,\" says the sorcerer who cleaned up the blood. \"Painful, but since he wasn't hit in the skull or head,\n        it's not fatal.\"\n\n        \"We could sure use your help in making sure he doesn't get worse\", said the other helping sorcerer, who was slowly helping up the wounded. She stuck out her arm, reaching for his good one to help him up. \"Can you support his back as I lift him?\" she asked.\n\n        \"Of course\", you say, moving behind him, applying leverage. \n\n        The three of you help him out, carrying him. You feel and good moral feeling and a little more charming afterwards.\n        *set social +1\n        *goto next_day\n        \n      #My teammate who was shot in the head\n        Three other sorcerers are helping her out, which isn't surprising given her condition.\n        She moans in pain, holding her head. \n\n        \"How many fingers am I holding up? Honey?\" A man, who you recognize as her boyfriend\n        or husband (you never bothered to find out) asks her, as he holds up two fingers.\n\n        \"Two\" she answers.\n\n        \"Okay, good, you can see,\" he responds.\n\n        The two others helping her, see you coming over to help. \"Hold off for now\", says the first one, who holds her hand out to stop you. \"We want to make sure they have room\"\n        The other one nods her approval, but says nothing, seeing you comply with the request of the first woman.\n\n        You are about to open your mouth to ask something when the injured woman's significant other calls over. \"She's fine, I could use a hand, though.\"\n        The three of you glance at each other, and all of you surround the two without a word.\n        \"Help me pull her up.\" You and the others do so.\n        *set social +1\n        *goto next_day\n      #My rival with a broken leg\n        Your rival appears to have only 1 other person attending to his wounds, with said helper using a burst spell to levitate a table off of your rival's leg. \n\n        \"You okay?\" you ask him, ignoring the other assist. You lean over and kneel down.\n\n        \"Yeah, you mind helping?\" \n        You initially don't like his tone, but he gently slaps you on the shoulder as he often had,\n        as a sign of comradery and joking around.\n\n        \"Guess you're fine\", you say offering him your hand and lifting him up.\n\n        \"Careful there lovebirds,\" says the other sorcerer helping. You recognize her as someone\n        who was constantly watching your rivalry, thinking it was entertaining. \n\n        \"Oh, I'm fine. Thanks for the help though. We all know this guy couldn't have done it.\"\n        The three of you pause and laugh. After a heavy silence, you all look around, seeing the damage to those around you. You exchange sombre looks, and all head home.\n        *set social +2\n        *goto next_day\n \n  #Ensure that there are no more coming. I don't want us to be taken by surprise.\n    You use a knowledge spell and sweep over the area. You find no hostile life forms.\n    *set mana -10\n    *set knowledge +1\n    What do you do with the new information?\n    *choice\n      #Publicly declare it. Everyone should know.\n        You state in a loud, but not screaming voice, that you sense no life forms. You \n        hear a few sighs of relief, and see some of the others leaving.\n\n        \"Thanks\", the prof says, quickly turning back to his work. \n\n        \"Great, einstien\", one of the other sorcerers walks up to you. \"You got all that power, but we all do. Do you have anything else to back it up? You'd be useless without it. Besides, we all knew that.\"\n\n        How do you respond?\n        *choice\n          #Ignore him. This isn't worth fighting over, especially after an attack.\n            He continues to pester you. How do you respond with his continued verbal assaults?\n            *choice\n              #Fight back with the logic of your decision. He'll understand it was just a precaution\n                *if brains > 50 \n                  He backs down, seeming embarrassed that he didn't think of that.\n                  *set brains +1\n                  *goto next_day\n                He gets upset with you, as your logic sounds dumb.\n                *goto next_day\n              #Try and talk your way out of it. He's just stressed and will calm down if you're not hostile.\n                *if social > 50\n                  He seems to calm down and is convinced you're doing your best\n                  *set social +1\n                  *goto next_day\n                You awkwardly gesture your way through an explanation, and he doesn't buy your attempt to\n                explain anything.\n                *goto next_day\n              #Challenge him to a fight. How dare he speak to you like that!\n                *if fitness > 50\n                  You both agree to not use magic, and you land a solid uppercut on his chin.\n                  *set fitness +1\n                  *goto next_day\n                You both agree to not use magic, and he stomps you.\n                *goto next_day\n\n          #Fight back with the logic of your decision. He'll understand it was just a precaution\n            *if brains > 50 \n              He backs down, seeming embarrassed that he didn't think of that.\n              *set brains +1\n              *goto next_day\n            He gets upset with you, as your logic sounds dumb.\n            *goto next_day\n          #Try and talk your way out of it. He's just stressed and will calm down if you're not hostile.\n            *if social > 50\n              He seems to calm down and is convinced you're doing your best\n              *set social +1\n              *goto next_day\n            You awkwardly gesture your way through an explanation, and he doesn't buy your attempt to\n            explain anything.\n            *goto next_day\n          #Challenge him to a fight. How dare he speak to you like that!\n            *if fitness > 50\n              You both agree to not use magic, and you land a solid uppercut on his chin.\n              *set fitness +1\n              *goto next_day\n            You both agree to not use magic, and he stomps you.\n            *goto next_day\n        \n      #Tell nobody, they're all too busy and I would only distract them.\n        You look out at those leaving and are relieved that they won't be ambushed. You decide to leave with them,\n        avoiding the off chance that a new threat would arrive to take you out.\n        *goto next_day\n      #Tell the Prof. He's in charge.\n        You walk over the prof, and he sees you coming.\n\n        \"Hello ${name}, do you have something to tell me?\n\n        \"Yes\", you respond, and you pause to inform him that you cast a spell to see if there were any other threats, and I didn't find any. We should be safe.\n\n        \"Well...I already did that, but thanks,\" he says. \"You can never be too careful.\n        Plus, its good to have confirmation.\"\n        *set social +1\n        *goto next_day\n\n  #Ask the professor is there's anything you can do. He knows more than anyone else. \n    You walk over the prof, and he sees you coming.\n    \"Hello ${name}, do you have something to tell me?   \n\n    You reply \"No, I have something to ask you. Is there anything I can do to help?\"\n\n    \"Not at the moment. Everything seems to be taken care of.\"\n\n    You thank him and leave.\n    *set social +1 \n    *goto next_day\n  #Inspect the bodies.\n    You walk over to the bodies of the invaders. Looks like you weren't the only one to think of this. You walk over to another sorcerer pulling back masks of the invaders.\n\n    \"I don't see any pattern with the race of sex of the attackers,\" he turns around and says to you with any prompting. \"And they're not carrying any religious or \n    political markers.\"\n\n    Another sorcerer chimes in \"I just used a knowledge spell to probe their final thoughts,\"\n    an advanced knowledge specialist says after she removes her hand from the head of an attacker. \"They're not government agents after one either. Their thoughts were of\n    revenge, not a mission.\"\n\n    You notice a pause and have a chance to speak. You have a few questions in your head.\n    *choice\n      #Ask if they can think of anyone who would want revenge on us.\n        \"I don't know\", says the first sorcerer. We haven't wronged anybody and the only ones\n        with any reason to be mad at us are those who we kicked ou...\"\n        The two sorcerers look at each other. \"BLAINE!\" They exclaim. You begin to remember Blaine.\n        He was one of the most powerful sorcerers in the order, who was kicked out for being too ambitious. By too ambitious, its clearly meant he was murdering those who ranked above him in order to gain power.\n\n        \"Yeah, that makes a lot of sense,\" you say. \"I hope it's not him, given his power.\"\n        *goto next_day\n      #Ask if they want revenge on an individual or the group as a whole.\n        \"Probably the group as a whole,\" the second sorcerer states. \"If they had only wanted revenge\n        on one of us, they likely would have been more careful to try and catch that person alone.\"\n        You sigh heavily, fearing a second attack coming soon.\n        *goto next_day\n      #Ask if she knows where they attacked from.\n        \"No, sorry\", she says.\n        You grow scared, not knowing if there's a second attack coming or not.\n        *goto next_day\n      #Say nothing. You don't want to derail their conversation.\n        You find out very little from their conversation\n        *goto next_day\n    *goto next_day\n*label next_day\n\n*page_break\n\nYou sleep that night, restoring your mana back to full.\n*set mana 100\n\n*page_break\nAfter a shoddy night's rest, you are awakened by your phone ringing. You recognize the custom\nring tone. Its the professor calling you. How do you answer it?\n\n*choice\n  #I walk over and answer like a normal person\n    You walk over to the phone, saving your mana for more important things.\n    *set fitness +1\n    *goto phone_call\n  #I use a blast spell to telekinetically bring me the phone\n    You reach out with your hand and levitate the phone towards you.\n    *set blast +1\n    *set mana -10\n    *goto phone_call\n  #I summon a creature to bring me the phone.\n    You clench your fist, summoning a bird you picks up your phone and brings it to you.\n    *set summon +1\n    *set mana -10\n\n*label phone_call\n\n*page_break\n\n\"Hello, ${name}. How are you this morning?\"\n\nNot knowing how to respond, given the situation, you respond with \"Well, you know...\"\n\nThe professor chuckles briefly, with his laughter immediately dying. You bite your\nlip in anticipation of some bad news.\n\n\"It's Blaine.\" The Professor said over the phone. \"Blaine is responsible for the attack.\"\nYou immediately remember who Blaine is: a sorcerer kicked out of the order for killing\nthose who outranked him. You remember he had a particular disdain for you. He was also\ntop of the class at one point.\n\n*page_break\n\nAs you take a second to remember Blaine, you sigh to yourself. You remember that he was, in fact, at one point, the most powerful sorcerer in the order. You could tell this, not just from the fact that his charm spells could control more than one person at a time, but the fact that he won nine out of the ten sorcerer battles that ensued during his time there. You won the other. You're not sure if that particular thing was what got him to single you out, but it remains a possibility. Blaine always tried to prove he was better, not just than other learning sorcerers, but also those teaching, such as the professor. His random killing of higher up sorcerers seemed to prove to you that he was completely insane, so you also think that his hatred of you might have just been irrational as well.\n\nThe professor continued \"Apparently, Blaine was able to use charm spells to mind control\nmilitary troops from around the world.\"\n\nHow do you feel about killing mind-controlled military troops?\n\n*fake_choice\n  #Disgusting. Those people were innocent\n    Of course. You killed people who were powerless to convince Blaine and didn't even believe in his cause. You are haunted by the fact you never tried to solve it peacefully.\n  #Great. Anything to reduce Blaine's army\n    You didn't know any of them. You knew Blaine. Unfortunate, but it had to happen.\n  # It's complicated but still bad.\n    You feel a twisted feeling in your gut, but convince yourself that you had no choice.\n    it was either them or you, and you had no way of knowing.\n\n*page_break\n\nThe Professor pauses, allowing you to take a minute allowing that bone-chilling fact to sink in, as your feelings settle. \"Now, I hope that this shows you the scale of\nhis power.\"\n\n\"Yes,\" you state, remembering that usually charm spells only work on a single target.\n\n\"I mean, that was his speciality, but it does give scale to his power. There has never\nbeen someone else who can do that. I don't know if he's grown even close to as strong\nwith spells from the other school of magic.\"\n\n\"I don't either,\" said the prof.\n\nIt then occurs to you to use a knowledge spell to see if you can find out. Do you do this?\n*choice\n  #Yes, it could be useful.\n    You attempt to use a knowledge spell, but pick up only small traces of information that confirm\n    what the professor said is true.\n    *set knowledge +1\n    *set mana -10\n    *goto phone_2\n  #No, I don't think that'll work.\n    You figure that such a powerful spell won't be possible, and decide to save your mana.\n    *goto phone_2\n  #I ask if the professor has done it.\n    \"Yes, I have,\" he says. \"You can try if you want, but I don't think it'll do anything.\n    Do you do it?\n    *choice\n      #Yes, it could be useful.\n        You attempt to use a knowledge spell, but pick up only small traces of information that confirm\n        what the professor said is true.\n        *set knowledge +1\n        *set mana -10\n        *goto phone_2\n      #No, I don't think that'll work.\n        You figure that such a powerful spell won't be possible, and decide to save your mana.\n        *goto phone_2\n\n*label phone_2\n\n*page_break\n\n\"So, what do we do?\" you ask.\n\n\"There's only one thing we can do,\" replied to prof. We fight back.\n\nYou're taken aback by this.\n \n\"Are you sure?\" you say.\n\n\"Yes, I'm planning to hold 3 meetings. One at my place, one at the university and one at the local coffee house.\nYou only have to attend one in order to know the plan. Which works best for you?\"\n\nYou're a bit weirded out by having the prof ask you to his place, but it sounds safe.\n\nYou think the University may be vulnerable, as its already been attacked. But then again, Blaine wouldn't\nthink you'd be dumb enough to go there again.\n\nYou know for a fact Blaine won't attack you in broad daylight but are unsure of how to discuss sorcerer stuff\nwhile in public.\n\nYou're aware of the dangers of attacking Blaine, and are tempted to skip out entirely.\n\n*choice\n  #Meet the prof at his place\n    You agree to meet the prof at his house\n    *goto_scene house\n  #Meet the prof at the university\n    You agree to meet the prof at the university\n    *goto_scene university\n  #Meet the prof at the coffee shop\n    You agree to meet the prof at the coffee shop\n    *goto_scene Coffee\n  #Skip it, not going\n    You politely tell the prof you're out of this one and continue with your day\n    *goto_scene ignore", "chapter4": "The next day you, Rick, Nancy and Karol all leave on your way to the historical castle that Blaine was staying in. The information that you got from the interrogation included the layout of Blaine's guards. Rick, repeating himself for what you count to have been the fifth time reviews it again.\n\n*set health 100\n*set mana 100\n\n\"So, there's a couple of snipers on the roof, with a third troop, this one with an assault rifle, hiding in the bushes.\"\n\n\"Yes Rick, thank you,\" Karol says in an exasperated voice, sick of how often Rick has been doing nothing but repeating the location of enemies.\n\n\"After that, there's the guards outside the doors of the entrance,...\"\n\n\"Yes we know,\" Nancy said in a tone resembling Karol's.\n\nThe conversation continued with Rick having memorized the location of the two snipers on the roof, the trooper in the bushes, the guards at the door, the several in the hallways as well as inside several rooms. Most of them, you knew you could take relatively easily. Rick had, however, made everyone aware of the rejuvenation potions that Blaine possessed. \n\nA big part of your plan was giving each of you four one of those potions in order to refresh yourselves before having made it to the fight against Blaine. The purpose of the troops was to whittle you down, and the potions would reverse that effect. However, Blaine kept the potions under heavy guard, so it was highly important that you sneak in undetected before getting them. Why Blaine kept them out in the open was beyond you. You assumed it was a combination of his own arrogance that nobody would ever find them, and for the convenience if he ever needed then, but you can't think of why he'd need them if he was just in his castle the whole time. Also, the fact that they were kept in the throne room, where he personally was backed this up. But just on an open table. Something didn't seem quite right.\n\nThe four of you decided to park the car you were driving about a block away, knowing that there was a chance he'd recognize your car and know that there was an attack coming. The four of you also were wearing dark hoodies in order to hide your faces from a distance. Walking towards the castle, you realize that there were plenty of signs indicating that it had been closed, most likely put there by Blaine and his mind-controlled troops in order to stop any suspicious activity. \n\nAs you arrive, you recognize you are coming up on the area where the first sniper would initially be able to spot you.\n\n\"We should turn invisible and sneak by them so they can't see us,\" Rick says.\n\n\"I think its better that we transform into tiny creatures so they can't tell it's us,\" Nancy replies.\n\n\"I'd rather just be as quiet as possible, and use the terrain to help us. We have to save our magic for when we actually fight Blaine,\" Karol said. \n\nAll three of them look to you as if implying that they're giving you the deciding vote. What do you do?\n\n*choice\n  #Turn invisible with illusion magic. Best to not be seen.\n    *if illusion > 55\n      The four of you are able to successfully sneak by the sights of the first sniper, getting out of his eyesight before the magic wears off.\n      *set illusion +1\n      *set mana -10\n      *goto sniper_2\n    The invisibility wears off mere moments before you get out of eyesight of the sniper, and he tags you in the back of the leg. Karol silently casts a knowledge spell and discovers they can't tell for sure if someone's there, but the guards are now keeping a stronger eye out.\n    *set illusion +1\n    *set mana -10\n    *set health -10\n    *goto sniper_2\n  #Transform yourselves into small creatures. Invisible things can still be heard. Even if they find you as small creatures,    you'll be ignored.\n    *if  transform > 55\n      The four of you are able to successfully transform yourselves into squirrels and run out of range of the first sniper without appearing suspicious to any of the snipers.\n      *set transform +1\n      *set mana -10\n      *goto sniper_2\n    You transform into a group of squirrels and run across the range of the first sniper. However, right before you find cover, your transformation time runs out,          and you are seen and shot. Karol silently casts a knowledge spell and discovers they can't tell for sure if someone's there, but the guards are now keeping a           stronger eye out.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto sniper_2\n  #Sneak by. Save magic for the final fight.\n    *if fitness > 60\n      Your agility and flexibility are enough that you can sneak by hiding behind trees and walls successfully without alerting any of the snipers before you get out of their line of sight.\n      *set fitness +1\n      *goto sniper_2\n    You attempt to sneak by, but are unable to hide well enough to avoid being seen at the last second. The sniper sees your foot as you hide behind a wall and take cover and shoots it. Karol silently casts a knowledge spell and discovers they can't tell for sure if someone's there, but the guards are now keeping a         stronger eye out.\n    *set fitness +1\n    *set health -10\n    *goto sniper_2\n\n*label sniper_2\n\nThe group of you are then able to successfully able to move another football field's worth of distance before coming across where the second sniper would be able to see you. Your heart is still pounding from the first encounter with a sniper, as you now realize that raw power will in fact not win the day for you. Instead, you will have to rely on stealth, as powering your way through anyone will immediately alert several others to your location. You grab your chest and feel your heart beating at over 100 beats per minute.\n\n\"Yeah, it's scary,\" Karol whispered to you. \"We're all scared, but we have to power through this. We can end Blaine's reign of terror on our society today. We have no choice but to do this now.\" She swallowed at the end of her speech, with both Rick and Nancy nodding, having started when she said 'we're all scared'. \n\nRick motioned towards the location of the second sniper. \"Same again, or different?\" He asked, looking to you. Both Nancy and Karol were also looking at you. It's in that moment that you realize, these three consider you to be the one in charge. Regardless of the fact that they've seen you're scared and hesitant, they view you as being the one in charge. How do you feel about being in charge during the final confrontation against Blaine?\n\n*fake_choice\n  #Great. I always wanted to be high in the ranks.\n    You enjoy the thrill of being in charge. Just be careful not to let it get to your head.\n  #Scared. I'm afraid that some mistake that I make will cause us to lose.\n    Careful. Think before you make each move and you'll likely be fine, though.\n  #Nervous. Leadership is new to me.\n    Remember, its best to keep everything as under control as possible.\n  #A combination of all three.\n    Yeah, it's complicated. Best not to over-think your emotions, though.\n\n*page_break\n\nRegardless of how you feel, its time to make a decision about the second sniper. You note that this situation is quite similar to the first, so you decide to keep in mind your decision and the result of the last time. What's your idea to get by this one?\n\n*choice\n  #Turn invisible with illusion magic. If they can't see us, they can't shoot us.\n    *if illusion > 55\n      The sniper doesn't see any of you, as your invisibility lasts the entire time.\n      *set illusion +1\n      *set mana -10\n      *goto assault\n    Mere moments before you get to safety, you become visible again and are tagged by the sniper. You don't see of the enemies change position, but the shot did heavy damage to you.\n    *set illusion +1\n    *set mana -10\n    *set health -10\n    *goto assault\n  #Transform everyone into small creatures. Even if they see and hear us, they won't think anything of a group of rodents.\n    *if  transform > 55\n      The four of you are able to successfully transform yourselves into chipmunks. You're not sure if you're seen, but you know you're not shot at.\n      *set transform +1\n      *set mana -10\n      *goto assault\n    You transform into a group of chipmunks. At the last moment, you transform back into a human, and you feel a bullet graze your foot. It hurts, and you feel that if you had been able to stay transformed, you wouldn't have been thought of as suspicious.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto assault\n  #Sneak by. I'm capable of being quiet enough.\n    *if fitness > 60\n      You're stealth enough to stay out of sight due to your highly athletic body. Luckily none of the guards were particularly paying attention to you.\n      *set fitness +1\n      *goto assault\n    You attempt to sneak by, but are unable to hide well enough to be completely undetected. You are only shot at once, and its right by the end. You look around and see no movement, but your foot is bleeding after taking a bullet from a sniper.\n    stronger eye out.\n    *set fitness +1\n    *set health -10\n    *goto assault\n\n*label assault\n\nAfter getting by the snipers, you realize you're about to go right by the bush with the guard using an assault rifle, who's ready to burst out at any moment. This one might require slightly different ideas. Knowing that attacking him will alert everyone since this area is so out in the open, you decide its basically necessary to sneak by. You see him pointing away from you, but there's very little room behind him to sneak by. You have to get the entire group across safely. What do you do?\n\n*choice\n  #Use illusion magic to create a sound in order to distract him so I can more easily sneak by.\n    *if illusion > 55\n      You successfully create a loud, repeating sound of a series of cars honking, and its loud enough to distract him from your comparatively quite sneaking.\n      *set illusion +1\n      *set mana -10\n      *goto entrance\n    The car horn sounds you create aren't loud and annoying enough to distract him, and he hears you attempting to sneak by, he turns around, spraying bullets. You got out of the line of sight before he could see you, but one of the bullets still grazes you for some damage. He can't confirm anyone is there, but the noise of his gun alerts others to the possibility of someone being there.\n    *set illusion +1\n    *set mana -10\n    *goto entrance\n  #Sneak by while still depending on my flexibility and agility to stay quite.\n    *if fitness > 60\n      You are quite enough to not alert the guard to your presence. You should remember this, as saving your mana for more difficult things might be a good idea. \n      *set fitness +1\n      *goto entrance\n    Just as you get out of his line of sight, he jumps, thinking he's heard you he can't see you but when he sprays gunfire, but one of the bullets still grazes you for some damage. He can't confirm anyone is there, but the noise of his gun alerts others to the possibility of someone being there.\n    *set fitness +1\n    *set health -10\n    *goto entrance\n  #Have everyone transform into mice and just walk by. We can easily fit and are fast enough.\n    *if transform > 55\n      The group of you is easily able to sneak by. You aren't unseen but you are underestimated.\n      *set transform +1\n      *set mana -10\n      *goto entrance\n    Just as you get out of his line of sight, you turn back into a human. Not sure of what he's seen, he decides to shoot and hits you with one of the bullets from his spray. He can't confirm anyone is there, but the noise of his gun alerts others to the possibility of someone being there.\n    *set fitness +1\n    *set health -10\n    *goto entrance    \n\n*label entrance\n\n*page_break\n\nYou're now around almost all of the guards that were outside, and it's just the two guards at the doors left. Realizing that since there's a pair of them, you need to be more stealthy and can't just sneak by, you look for other, alternative options. Blast spells are still out of the question because so many other enemies would be instantly alerted to your presence, so you have to be more subtle. You recognize, however, that summoning spells can work here if applied properly, especially with the ledges and gardens near the guards. What do you decide to do in order to bypass the two of them in a more sneaky way?\n\n*choice\n  #Have everyone turn invisible. If we're quiet enough, we can still sneak by since they're on either side of the door. \n    *if illusion > 60\n      The two guards look at each other a couple of times as if they're unsure of if something is happening. Unseen and unheard, you quickly and silently pass through them. They give no indication of having heard you.\n      *set illusion +1\n      *set mana -10\n      *goto inside\n    As you attempt to sneak by, your illusion spell isn't quite strong enough to fully hide you. The two guards then discover you and begin shooting.\n    *set illusion +1\n    *set mana -10\n    *set health -10\n    *goto stop_entrance\n  #Summon a large snake near the top of the ledge and let it come down. It might cause them to panic.\n    *if summon > 60\n      The guards panic when they see the snake, which begins to attack them. It wraps around one of them, and you successfully direct it away from the door. The other one leaves his post to help his ally, giving you and the others an opportunity to sneak by.\n      *set summon +1\n      *set mana -10\n      *goto inside\n    You create a snake which doesn't startle the two guards and isn't strong enough to constrict either of them. While easily fighting it off, the guards notice you attempting to sneak in.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto stop_entrance\n  #Transform into tiny insects. We might not be seen at all.\n    *if transform > 60\n      The four of you all turn into flies and easily get by the two guards without them noticing anything strange about you.\n      *set transform +1\n      *set mana -10\n      *goto inside\n    The four of you transform into insects, but you are unable to mask all suspicion. One of the guards is able to detect you are actually a person and swats at you,       knocking you back into human form and hurting you.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto stop_entrance\n\n*label stop_entrance\n  \nYou see that now the rest of the guards outside have been alerted to your presence.\n\n\"Seriously?\" Rick asks you, having picked up on the fact that it was you who dropped the ball on this one.\n\n\"We don't have time for this now, Rick!\" Nancy replies before you're able to defend yourself from Rick's accusation. That, however, wasn't what you were focused on defending yourself from. You notice that the two guards from before are now coming at you, and you can quickly wipe them out with a single blast spell. Karol is quickly moving towards the door, saying its time for you to finish off the immediate threat before she shuts the door to prevent the snipers and assault troop from getting inside. What kind of blast do you use?\n\n*fake_choice\n  #Lightning\n    Lightning shoots out from your fingertips at sends high voltage shocks through the attackers, killing them instantly.\n  #Fire\n    You create a fireball, instantly incinerating the thugs immediately before they enter the door.\n  #Ice\n    You are able to freeze the thugs in place. You aren't sure if they will survive this, but at the moment, you don't exactly care very much.\n  #Telekinesis\n    You send the thugs back several feet and they land hard on their backs, hitting the ground with a loud thud.\n\n*set blast +1\n*set mana -10\n\nKarol closes the doors immediately after you finish your attack, and afterwards moves a lever, which you immediately are able to recognize as the lock, which you learned from being the interrogation. Rick and Nancy both let go a sigh of relief. \"What are you two so relieved about?\" Karol said turning her attention to them \"I know it was ${name} who screwed by but at least ${name} did something about it. You two just stood there yelling!\"\n\n\"I uh, was expecting everyone to get by and was...ummm.. caught off guard,\" Rick said, struggling to get out a sentence properly. \"Plus, I needed to save my mana.\" He said that second part with a bit more confidence but based on his first excu
