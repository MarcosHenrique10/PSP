se, you still don't feel like giving him the full benefit of the doubt.\n\n\"I just knew the two of you had it,\" Nancy followed up. You don't buy her explanation either, but feel as if she's at least attempting to be nice about it.\n\n*label inside\n\n*page_break\n\nNow that you're inside, you realize that now is the time to start looking around for Blaine. The four of you huddle together and begin whispering a plan to yourselves.\n\n\"Okay, so as Rick said, several times, Blaine's in the throne room,\" Karol said, with her voice notably kept down.\n\n\"The question is, where is the throne room?\" Nancy asked.\n\n\"Easy,\" Rick said, \"That door right there is the first one we go through, then we continue down that hallway and up the flight of stairs.\" \n\n\"Look who's as useful as he always says he is,\" Nancy said, stroking Rick's chin as Rick winked at her. You and Karol look at each other odd, unsure if there's something more than meets the eye going on between those two. Karol rolls her eyes. To break the silence, you state that its best to go now.\n\nAs the four of you walk to the door, you notice that there's a control panel beside it. \n\n\"I remember that,\" Rick said, referring to the control panel. \"There's apparently a code you have to put in, but I'm not sure what it is. Also, it shocks the user for putting in an incorrect code.\" He pauses before yelling \"Not it.\"\n\nImmediately afterwards, Nancy and Karol both repeat \"not it,\" and all three of them look at you. Completely bewildered that it has come to this borderline childish way of deciding was how such a major decision was made. \n\nYou pause, before saying \"seriously?\" as the others all nod in tandem. You then approach the console on the side of the door and begin to look for clues as to what the code might be.\n\nYou see the 3X3 panel with the numbers 1-9 listed. It occurs to you that you might be able to see how dusty the numbers are to see which ones have been pressed the most. Noticing this, you discover that 1,7 and 8 have been pushed the most, and you try to think of what the combination might be.\n\n*page_break\n\n*if brains > 61\n  Due to your high brains, you are able to determine immediately that the answer is 1,7,8 due it spelling 1st. Predictable Blaine. Since you never took any shocks, you take zero damage.\n  *goto dodge\n*elseif brains > 56\n  Due to your moderately high brains, after a couple of attempts, you determine the answer to be 1,7,8 due it spelling 1st. Predictable Blaine. You only take a   minor amount of damage due to having only experienced a couple of shocks.\n  *set health -5\n  *goto dodge\n*else \n  Due to your low brains, you are unable to determine the combination is 1,7,8 by sheer luck. You're not even sure why that's the combination. You take a fair amount of damage due to taking repeated shocks.\n  *set health -10\n  *goto dodge\n\n*label dodge\n\nAfter you open the door, the four of you gather back together and head into the next room. As you place your foot down, you hear something above you. \"Look out!\" you hear Rick yell. Everyone else moves out of the way right away. You attempt to jump out of the way and...\n\n*page_break\n\n*if fitness > 61\n  Due to your high fitness, you are quickly able to get out of the way of the moving blade before it touches you. You take no damage and wipe some sweat from your brow, relieved at the close call.\n  *goto after_dodge\n*elseif fitness > 56\n  Due to your moderate fitness, you get out of the way of the blade, as it only barely skims your leg. You take minimal damage and wipe away a lot of sweat from your brow, relieved at the extremely closer call.\n  *set health -5\n  *goto after_dodge\n*else\n  Due to your low level of fitness, you are hit by the tail end of the blade, as it hits your leg before you are mere seconds away from it being chopped off. You take a fair amount of damage, and wipe away a huge amount of sweat from your brow, seeing how close you came to losing a limb.\n  *set health -10\n  *goto after_dodge\n\n*label after_dodge\n\nIf you thought your heart was racing before, its definitely pumping a lot harder now. A near brush with death has proven itself to be quite the way to show you just how serious the situation is. What you don't realize, however, is that it's about to get much more serious than you expected. You continue walking down the hallway, with Nancy out in front. Suddenly, as she's about to reach the staircase, you notice something moving on the floor beneath you, something that isn't there normally when the museum is open. \n\nAs she takes a step onto some mis coloured floor.. \n\n*page_break\n\n...a massive spike raises below her, skewering her like a shish kabob. She lets forth a great scream, but you can't tell whether it's of the pain or shock. However, she stops, seemingly mid-scream as the giant spike reaches the ceiling. Her body is sprawled out, her chest in the middle of the spike as she lies there, now horizontal, motionless and silent. Your jaw drops as you struggle for air. Your difficulty breathing, you realize isn't due to physical choking, you're being sent into a form of shock from seeing such a horrific action happen before your eyes.\n\n\"Nancy, No!\" You hear Karol blurt out.\n\nHer reaction, however, was not nearly as noticeable as Rick's. He screamed \"NOOOOOOOOOOOOOO!\" at the top of his lungs, dropping down to his knees as he shoots several elemental blasts at the spike in what you can only describe as a fit of absolute, unmanageable rage. His face is bloodshot red, with his eyes seemed about to pop out of his head, and veins appearing over his forehead. In moments, he widdles the spike down, until it breaks in half, with the top of it, containing Nancy's body, falling to the ground. He runs over to her body, desperately in what you can only see as a vain attempt to bring her back.\n\n\"Nancy, Nancy, speak to me, please. Nancy, I'm here.\" Rick keeps talking, with tears now rushing down his face. You now notice that you have a single tear coming out of one of your eyes, and Karol is down on one knee, grabbing her heart silently as if in mourning. \"Nancy, you're going to be okay, I'm going to get you out of there,\" Rick continues to plead, mostly to himself. He attempts to pull her off the top of the spike but to no avail. It's at this point that he finally seems to have accepted what has happened. He goes down on both knees and bawls his eyes out, seeing what's become of Nancy. You find it hard to watch. It all makes sense now. Rick and Nancy went to the prof's house together, they were at the funeral together, and they even had that flirtatious moment a few seconds ago that both you and Karol had witnessed. Now, under all of this, it seems to have sunk in that yes, they were together, and that's why Rick is taking this even harder than you or Karol. \n\n*page_break\n\nAfter the three of you take a moment in order to mourn Nancy, you feel an uncomfortable realization. As you feel the grim reality check if Nancy's death, you realize how many of the ordinary soldiers you've killed. These 'soldiers' never even made the choice to become soldiers, they were ordinary people, some of which were in law enforcement, who were mind-controlled by either Blaine, Steve or Lee. Yet, these people had families and friends, colleagues and jobs, and didn't deserve their deaths. Sure, you technically knew this, but the kill or be killed mentality of your current situation meant the adrenaline rush and opportunity to end the conflict with Blaine. You feel like a bit of a hypocrite grieving the idea of death after having killed so many innocents without a second thought, and aren't sure how to manage it.\nWhat do you do?\n\n*fake_choice\n  #I bring up to the others the idea of also having a moment of silence for the innocents caught in the crossfire. \n    Karol is accepting of this, but Rick seems a little bit hesitant. Knowing his situation, however, you find it difficult to blame him for his reaction though, so you let him vent.\n  #I keep the mourning to myself for now. No need to interrupt those who are morning.\n    You silently contemplate the moral decision of your choice to counter attack right away and think of all those who you may have killed.\n\nRegardless of your choice of action, you silently declare to yourself that you will never take the life of another innocent. After a few more moments of silence, the three of you look around and are briefly thankful that you were somehow not attacked during your moments of respect for both Nancy, and the others who have passed on during the fight. Rick closes Nancy's eyes, as is often done to one who has passed on with their eyes still open. You walk around what's left of the spike, feeling uncomfortable passing by Nancy's corpse, but knowing you must move on to defeat Blaine. \n\nAs you walk up the stairs, now much more cautiously than before, looking for anything that's remotely different than what you would generally see when the castle is open in its role as a museum. Seeing none, you decide it's safe to move forward. However, when you get to the top of the stairs, Rick stops you and Karol. \n\n\"Hold on,\" he says. You and Karol both look at each other and nod knowing that Rick is going to mention that there are some 'enemies' in a room nearby, and what he says later confirms that. \"There are some enemies in the second room to the left,\" he says, finishing his thought. When thinking about how to bypass these guards, you realize that passing through as small animals likely won't work, because the little critters aren't generally seen inside. You also remember your oath to not take another life of someone who had been mind-controlled.\n\n*choice\n  #I use a blast spell to mess up stuff in the room, causing a distraction.\n    *if blast > 56\n      You take down one of the lights on the ceiling, causing the two guards in the room to crowd around it. The three of you sneak by while this is happening.\n      *set mana -10\n      *set blast +1\n      *goto Rick_Death\n    You take down one of the lights on the ceiling causing one of the lights in the room to crowd around it. The three of you attempt to sneak by while this is happening, but one of the guards sees you and attacks. Luckily, Rick transforms both guards into dogs while Karol uses blast magic to close the door.\n    *set mana -10\n    *set blast +1\n    *set health -10\n    *goto Rick_Death\n  #I use illusion magic to turn us invisible. Can't go wrong with that.\n    *if illusion > 56\n      You successfully are invisible for the entire sneaking time, and the guards don't even notice anything.\n      *set mana -10\n      *set illusion +1\n      *goto Rick_Death\n    You are unable to keep the three of you invisible long enough to pass by the guarded room as one of the guards sees you and attacks. Luckily, Rick transforms both guards into dogs while Karol uses blast magic to close the door.\n    *set mana -10\n    *set illusion +1\n    *set health -10\n    *goto Rick_Death\n  #I sneak by normally. Gotta save mana.\n    *if fitness > 61\n      You're dexterous enough to be able to sneak by the guarded room without being noticed by the guards who are keeping a somewhat good watch over the hallway.\n      *set fitness +1\n      *goto Rick_Death\n    You're not sneaky enough to get by, and one of the guards sees you and shoots. Luckily, Rick transforms both guards into dogs while Karol uses blast magic to close the door.\n    *set fitness +1\n    *set health -10\n    *goto Rick_Death\n  #I use summon magic to create a distraction. It worked outside, it'll work inside.\n    *if summon > 56\n      You successfully turn the two guards into dogs and close the door before the guards are able to do anything to catch you. As a result, you are able to sneak by without getting attacked or set off any alarms.\n      *set mana -10\n      *set summon +1\n      *goto Rick_Death\n    You transform one of the guards into a dog but are unable to do so to the other one. The one that hadn't been transformed shoots at you, but luckily, Rick turns him into a dog and Karol closes the door before they're able to further damage you or escape the room.\n    *set mana -10\n    *set summon +1\n    *set health -10\n    *goto Rick_Death\n\n*label Rick_Death\n\nAfter you've successfully gotten by the guards, you look to Rick for knowledge on what comes next in the castle. \"We're almost there,\" he said, still keeping his voice down. \"He's on the next floor, but luckily we've gotten by most of the obstacles that are planted for us.\"\n\n\"By obstacles,\" Karol started, \"do you mean more people to get by, or are you talking about traps? Because we will be handling the two of them differently.\"\n\n\"I mean both,\" Rick replied, not missing a beat with his answer. \"There's only one left of each.\"\n\n\"Thank god,\" you catch yourself saying under your breathe. Both Karol and Rick look at you as you say this, letting you know they heard you. You're slightly confused as to why they think its a big deal, but when Rick continues, you realize that it wasn't. \"The guards are at the end of that hall right there, they should be easy to get by. The trap, however, is the difficult part. You need to pass through a series of obstacles in a zone where magic simply doesn't work.\" You remember hearing about this during the interrogation and notice that you had somehow tuned this out. How do you feel about this?\n\n*fake_choice\n  #Foolish. I should have been paying attention.\n    You realize that this is kind of on you at the moment. Luckily, Rick is here, though.\n  #Not at all bad. That's what Rick is here for.\n    Yeah, lucky he's survived this far, though.\n\n\"What do you mean magic doesn't work?\" Karol asked. \"Wouldn't Blaine want magic to work around this while place since he lives here now?\"\n\n\"I mean that no matter what, you can't cast spells in that area. Blaine put it there specifically because he knew that more sorcerers were the only ones who could reasonably expect pass through all of the obstacles he's set beforehand, so he decided to make a place where magic wouldn't work, knowing that we've become too dependent on our powers in life or death situations.\"\n\nYou let that sink in for a second, knowing that in fact, no, you likely wouldn't have made it by all the earlier places without being your magical abilities. However, at the moment, that's neither here nor there, as its time to focus on what's ahead.\n\n\"Now, afterwards, there are multiple elixers of healing, which will make it so that we will both heal all of the damage we've received today, as well as all of the mana that we've used.\" You feel a little bit awkward at his wording. You know that those were the terms that the professor used when addressing the class, but hearing them used in this particular context makes it feel like you're living in a video game.\n\nYou look around and notice the guards at the end of the hall seem to be alert to the fact that you're there. One of them begins to aim their guns at Rick. \"Look out!\" you yell, seemingly alerting Rick to the fact that they're there. He, however, was unable to get out of the way, as the guards took their shots, hitting him in the back, knocking him over. You realize that you must now fight back, but are unsure of how you can do so without killing the mind-controlled guards. Within seconds, a couple of ideas come to mind. How do you do this?\n\n*choice\n  #Transform them into something harmless until you're out of danger.\n    *if transform > 55\n      You turn them into birds and open a nearby window. Karol is able to scare them, and they fly out the window.\n      *set transform +1\n      *set mana -10\n      *goto Rick_Death2\n    You attempt to transform them into birds, but it takes them a few seconds to turn, during which time they take shots at you, hurting you. After you do turn them into harmless birds, Karol chases them out the window.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto Rick_Death2\n  #Use a blast spell to use telekinesis take their weapons, leaving them unable to attack.\n    *if blast > 55\n      You remove the guns from their hands, and Karol opens a window that you throw the guns out of. The two guards surrender upon the completion of this act.\n      *set blast +1\n      *set mana -10\n      *goto Rick_Death2\n    As you attempt to steal their weapons, they're able to get off a couple of shots, hitting you. You are, however, eventually able to take their weapons, and         Karol opens a window for you to throw them out of. They surrender right away.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto Rick_Death2\n  #Create horrifying illusions, causing them to run away.\n    *if illusion > 55\n      You create the horrifying picture of mythical creatures, so scary that the fear the creature generates overcomes the strength to the mind control, causing the guards to run.\n      *set illusion +1\n      *set mana -10\n      *goto Rick_Death2\n    You create scary illusions, but the fear they generate isn't strong enough to overpower the effects of mind control, and the two guards now start to shoot at you.     After a while, Karol decides to also create illusions, which when combined with yours, are able to get the guards to retreat.\n    *set illusion +1\n    *set mana -10\n    *set health -10\n    *goto Rick_Death2\n  #Summon something horrifying, causing them to run away.\n    *if summon > 55\n      You summon a loud lion, but instead of having it jump at the guards, you have it roar. You are skilled enough with summon magic to make the guards flee right away.\n      *set summon +1\n      *set mana -10\n      *goto Rick_Death2\n    You summon a loud lion, but instead of having it jump at the guards, you have it roar. You are not skilled enough with summon magic to make the guards flee right away, and they begin to shoot at you. It isn't until the lion roars multiple times that the guards choose to scramble away.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto Rick_Death2\n\n*label Rick_Death2\n\nAfter the battle, you begin to take a look at the wounds that have been inflicted on Rick. It is at this point where you notice the large weak point in the sorcery magic: the is no healing magic. As it turns out, Rick was hit by more bullets than you thought and is clearly mortally wounded. Not wanting to leave him for dead, you insist on carrying Rick to join you. \n\nIt is at this point that Rick chimes in \"Don't, I'll only slow you down. I'm not strong enough.\" You and Karol attempt to carry him for a few feet, but after that takes several minutes, and you and feel Rick moving less and less, you realise what you're doing is not going to help anything. \"I'm...coming...Nancy..,\" you hear him slowly say. Suddenly, he goes limp in your arms and stops moving and talking entirely.\n\nKarol seems to notice this as well, as she stops carrying Rick, and softly places him down on the floor, placing her hand over where she would normally hear a heartbeat. After a few seconds, she shakes her head, which was now hanging down. Tears slowly start to go down both yours and Karol's faces, similar to how you two did after Nancy's passing. You and Karol both take a knee, and spend a minute paying your respects, this time to Rick. Karol closes Rick's eyes similar to what Rick did for Nancy, and the two of you move on.\n\n*page_break\n\nYou see what you can tell is the final obstacle that Rick had mentioned. You can see a path to what you can identify as to where Blaine would be. On the way there, there's what you can identify as a swinging pendulum you have to dodge while going 'through', letters on the floor that obviously act as some sort of 'combination' you have to step on and a strangely coloured floor that you obviously have to jump over.\n\nKarol can clearly see it as well. \"It's like something from a treasure hunt movie,\" she says. It's at that moment, you notice a wall-mounted camera and a speaker right below it.   \n\n\"So someone did make it this far. Good for you,\" you recognize Blaine's voice coming through the speaker.\n\n\"Blaine, what are you doing this for?\" Karol asked. You figure Blaine isn't dumb enough to give her a straight answer. You even recognize this as the potential set-up for what would normally be a trope in movies and TV where a villain get so arrogant that they spill the beans, and tell the heroes how to defeat them as a way of taunting them. However, upon noticing yourself thinking of the word 'arrogant' begin to realize that this is exactly the kind of glaring weakness the Blaine would have. Well, that, and whatever he's about to say.\n \n*page_break\n\n\"I'm so glad you asked,\" Blaine started, in a smug and condescending voice. \"As you can see, I am the king here and you're the ones responsible for the deaths of all the law enforcement here. I have called several government agencies, stating the names of all of the officers and civilians who you've killed. You're the ones getting in trouble here.\"\n\n\"But you were the ones mind-controlling them!\" Karol yelled back.\n\n\"Yes, mind control,\" Blaine responded as if he was expecting that response. \"I'm sure that one has a history of holding up in court.\" He almost laughs at his own remark, and you admit that explaining the paranormal in court will not be an ordinary everyday thing. Whether its because you die here, go to jail, or are part of the greatest revelation and court case in the history of the world, your life as you know it is over.\n\nYou begin to open your mouth, ready to say something about how you can easily prove sorcery powers, but Karol stops you. \"We have to get to him soon. We don't want to get into another situation where we're fighting innocents. Even if you can correctly come to counter his arguments, it won't do anything other than give you a temporary ego boost.\n\nSeeing that she's right, you settle back in and start walking the given path, seeing that all other places are blocked off. You walk in, seeing if you can get by the swinging pendulum. Karol goes through first, having figured out when to time her run to the other side. \n\nAs it's your turn to run through, you see that you have no choice but to follow her through. You attempt to time your move through and realize that you'll need a good level of fitness to go through. You go through and...\n\n*if fitness > 63\n  You dive through, knowing that you're fit enough to make it through. You're fit enough to get by the pendulum without a problem, having gotten through easily.\n  *goto combo\n*elseif fitness > 57\n  You dive through, having the pendulum nick your foot, dealing only a minor amount of damage. Your decent level of fitness allowed you to pass through almost unharmed.\n  *set health -5\n  *goto combo\n*else\n  Due to your low level of fitness, you jump a split second too slow and are hit like a truck. Somehow, you get to the other side.\n  *set health -10\n  *goto combo\n\n*label combo\n\n*if health \u003c=0 \n  Your body hits the ground, barely able to move. You catch yourself bleeding out, and say to Karol \"I think that got me.\"\n  \"Oh no,\" Karol says. \"Not you, to ${name}!\" As you begin to slip out of consciousness, your sight becomes blurry and your hearing distorted. You can barely see and hear Karol's vain attempt to save you. You have no way of knowing it, but Karol is not powerful enough to defeat Blaine, and she will as well be killed. Blaine, now as the only remaining sorcerer, will become the world's most powerful being, using charm spells to slowly take over the world, creating a cult dedicated entirely to himself, and ensuring every one of his needs is fulfilled.\n  *goto_scene death\n*else\n  \"Thank god you made it,\" Karol says. You think you're going to have to decipher the clues to the puzzle of the stepping stones, but then look around and see that in fact there are no clues. Karol attempts to cast a knowledge spell to gain information but then fails. \n\n  \"I forgot,\" she says, \"spells don't work here.\"\n\n  \"Right,\" you say to yourself, remembering what Rick said earlier. The thought of Rick somewhat bothers you in this situation, but you continue to mentally push through it, turning your focus back to the letters on the floor. You look at what the stones say and recognize that you can step on them in the right order to have them spell out 'Blaine'. \n\n  \"Maybe Blaine made his name the letters you have to step on,\" you say. Looking around, Karol takes a second, as if seeing whether or not it's possible to spell         'Blaine' using these letters. She says its possible, and after she steps on the B...\n  *goto jump\n\n*label jump\n\n*page_break   \n\n...and is absolutely fine. She continues, stepping on the L, the A and so forth, completing her journey to the other side of the block of letters. You follow along and finally reach the point where its time to jump across a strangely coloured floor. You see one elixer on the other side as if Blaine was leaving it there to taunt you. You and Karol both jump across, you make it, with Karol almost making it. It feels as if for a second that she fell, but then she has grabbed the ledge. Unable to pull herself up quickly enough, you can see if you don't help her, she will fall to her death since magic is shut down in this area, stopping you from being able to levitate her.\n\nThen you hear a laugh behind you. Its Blaine, holding the elixer. \"Not that you'd win either way, but I'll give you a choice. You can either catch this elixer and heal yourself for a 1-vs-1 with me, OR you can save her and have a tired out 2-vs-1.\" Thinking to yourself of a way to do both, you realize that there's no way to possibly save Karol and get the elixer. Saving her will mean you and her, both in your weakened state will live to be able to fight Blaine at his full power, and her a chance to survive the encounter. Catching the elixer gives you the chance to take Blaine on with your full mana and health. Choose wisely.\n\n*choice\n  #I save Karol. I've lost enough friends, I have to save my last one.\n    *goto_scene Save_Karol\n  #I catch the elixer. We're both so weak that our only hope is for me to go to full power.\n    *goto_scene 1v1", "choicescript_description": "Take control of a sorcerer in an urban fantasy adventure that adds magic into the present day. Use your magic to fight against an evil sorcerer who is breaking several treaties by using his magic in order to gain world domination. Feel the rush of magic flowing through you as you fight against armed guards and other sorcerers as you breakthrough from your humble private life in an attempt to save the world from your evil rival.\n\nA sorcerer's Story is a 53,000 word interactive novel created by Chris Viola where your choices control the story. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nWill you save the world, die trying, or join up with the villain to gain a share of the pie? Along the way, you will get the chance to:\n\n• Play as a male, female or non-binary.[n/]\n• Use a variety of spells, including illusions, fireballs, summoning a variety of creatures, transformation, mind control and knowledge related magic.[n/] \n• Pick a speciality and develop all forms of magic by using them.[n/]\n• Battle with and against those with similar spells, as well as groups of ordinary humans.[n/]\n• Pick a job and one of several hobbies in your personal life, gaining competencies by using physical, mental and social skills.[n/]\n• Control your character's emotional response to several situations, further immersing you in the story.[n/]\n• Play over and over, revealing many different middle acts and endings.[n/]", "choicescript_stats": "Here are your skills. They can complete tasks for you without the need of using mana.\n\n*stat_chart\n  text gender\n  text Name\n  percent Social\n  percent Brains\n  percent Fitness\n\nWatch your health. If it goes to 0% you lose\n*stat_chart\n  percent Health\n\nUse mana to cast spells\n*stat_chart\n  percent Mana\n\nSpells Known\n*stat_chart\n  percent Charm\n  percent Blast\n  percent Illusion\n  percent Summon\n  percent Transform\n  percent Knowledge\n\n\n  \n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 3 through 10, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 3 through 10[/b]\n  \n  You've paid to unlock chapters 3 through 10.\n", "death": "\n\n*page_break\n\nYou have died. Sadly, despite sorcery powers unmatched by any mortal human, you were not strong enough to survive an encounter with Blaine.\n\nHowever, several endings are avaliable. Feel free to play again and unlock an ending where you live.\n\n*achieve sacrifice\n\n*goto_scene ending\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Sorcerer's Story.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "evil_ending": "*page_break\n\nWith the world crumbling around you, knowing you could have done something, you feel like you should have. Instead, you picked personal power, and on the outside, it seems great. You're one of the few who Blaine seems to have any real respect for, and you have a life of luxury, with only having to hunt down the odd innocent who acts defiantly.\n\n*achieve survivor\n*achieve evil\n\n*goto_scene ending \n", "house": "\nThe Prof gives you the location of his place and you head over there.\n\n*page_break\n\nUpon arrival, you noticed that three of your sorcery classmates are also there.\nThis doesn't surprise you, as you didn't think it would just be you and the professor. How do you feel about the confirmation that there are others?\n\n*fake_choice\n  #Relieved. \n    You're glad that you have others backing you up.\n  #Worried. \n    You know that more allies were probably brought because of how powerful the\n    enemy is.\n  #Indifferent.\n    It doesn't change your emotional state.\n  #Excited.\n    Finally, a chance to work with others in the field.\n  #Unphased.\n    You're sure this is almost certainly a precautionary measure.\n\n*page_break\n\nAfter you take a second to read the room, the professor nods and begins to speak.\n\"Hello, Rick, Nancy, Steve and ${name}. I suppose you all remember why we are all\nhere today.\"\nYou hear some soft murmurs of confirmation from the others before he continues to speak.\n\"Now, I have scheduled to other meetings with other sorcerers. This should mean that we'll\nbe getting reinforcements. However, you all know the vast power we're dealing with.\n\"Has anyone else died?\" Nancy asked.\n\"No, there are no fatalities since last night. However, anyone hospitalized won't be joining\nus and others have decided to chance it by just living their lives, hope Blaine won't notice \nthem.\"\nYou feel kind of spooked, knowing that you had also considered such an action. However, this is not\na concern that you currently have. \n\nRight now, your main focus is to get back at Blaine. But why?\n\n*fake_choice\n  #Personal Revenge\n    You and Blaine always had a rivalry. Now its time to see who's best\n  #Survival\n    You feel if you don't bring the fight to him, he'll bring the fight to you. Simply put. You're in it to survive.\n  #Revenge For Last Night\n    His attack on your friends and colleagues angers you greatly.\n  #Being dragged into it\n    You feel the need to because the others are doing so. You really couldn't care less\n\nThis time, Steve asks a question. \"So when are we attacking?\"\n\n\"Tomorrow\", the Prof responds\n\n\"What time?\"\n\n\"3 pm\"\n\n\"Where from?\"\n\n\"We'll meet in the tower, room 1139.\"\n\nSteve continues to ask questions for several minutes, and you begin to grow suspicious, \nwondering if there's more than some insight as to his own tactics that he's looking for.\n\n*choice\n  #I cast a knowledge spell to find out his motifs.\n    *if knowledge > 50\n      You notice he his putting up a magical barrier protecting his thoughts, but your skill with knowledge spells breaks through it. You gain insight into his thoughts, discovering his true intentions as a spy, and reveal it to the others.\n      *set knowledge +1\n      *set mana -10\n      *goto spy_found\n    You gain no knowledge of what he's doing and are unable to grasp his intentions. You can, however,\n    confirm he is masking his intentions to knowledge spells, but yours are too weak to get by his barriers.\n    *set knowledge +1\n    *set mana -10\n    *goto spy_missed\n  #I ask him his motifs.\n    *if social > 50\n      He angrily barks back at you, but you're able to make him slip up and speak of his work spying on Blaine's behalf.\n      *set social +1\n      *goto spy_found\n    He angrily barks back at you. You can tell he's defensive about something for a reason.\n    *set social +1\n    *goto spy_missed\n  #I talk with the others to see if they have any ideas.\n    Nancy says she agrees with the fact that he seems a little bit too eager to get information. Rick in the meantime wants to get more direct and cast a knowledge spell himself. However, before he is able to do so, Steve blasts him with a powerful fireball.\n    \"How dare he intrude on my private thoughts!?!\"\n    \"You're a spy!\" Rick yells back. Steve blasts fire at him once again, however, this time Rick is aware of the incoming attack and blasts a fire spell of his own to match. You and Nancy both run away, and you can see the prof also removing himself from the situation.\n    \"Traitor!\" Nancy yells, summoning a powerful elephant behind Steve. \n    Steve, not being one to miss an opportunity, stops blasting fire and left, directly towards the professor, allowing Rick's fire to hit Nancy's elephant, causing it serious damage. The professor transforms one of his tables into a lion, which leaps at Steve,\n    who uses a charm spell to take control of it, sending it back towards the professor. \n    Realizing he's no longer being watched, Rick launches a telekinetic blast at Steve, sending him back towards the elephant.\n    Noticing the professor on the back foot against the lion he created, while Rick and Nancy are fighting Steve, what do you do.\n    *choice\n      #I help the professor. It's vital we save his life from the lion. We need him for the big fight. Rick and Nancy can work together to take down Steve.\n        *goto help_prof\n      #I help Rick and Nancy fight Steve. We need to capture him otherwise he can relay all the information to Blaine.\n        *goto help_sorcerers      \n\n*label spy_missed\n\n\n\n\"What the hell?\" He screams at you. \"You got a problem with me?\"\n\n\"No, just double-checking everything,\" you say. \n\nYou then pretend to investigate Rick and Nancy in order help sell the lie. As you pretend to interrogate Rick, \nyou wink at Nancy in order to indicate that she should attempt to find out more about Steve. Rick, who's clearly\ncaught on to what you're doing, is playing along and intentionally pretending to dodge questions to stall for\ntime. \n\nNancy then turns to the two of you, and then immediately to Steve, who's finally caught on to the fact that she's\nbeen using a knowledge spell in order to dig for more information. What Steve didn't see, however, was the professor\nalso using a knowledge spell. After Nancy's jaw drops, Steve reacts by blasting her with a shot of fire, while the\nprofessor, equally shocked, yells \"Steve's a spy! He's working with Blaine\"\n\n*goto spy_found\n    \n*label spy_found\n\n\"Traitor!\" Nancy yells, summoning a powerful elephant behind Steve. \nSteve, not being one to miss an opportunity, stops blasting fire and left, directly towards the professor, allowing Rick's fire\nto hit Nancy's elephant, causing it serious damage. The professor transforms one of his tables into a lion, which leaps at Steve,\nwho uses a charm spell to take control of it, sending it back towards the professor. \nRealizing he's no longer being watched, Rick launches a telekinetic blast at Steve, sending him back towards the elephant.\nNoticing the professor on the back foot against the lion he created, while Rick and Nancy are fighting Steve, what do you do.\n*choice\n  #I help the professor. It's vital we save his life from the lion. We need him for the big fight. Rick and Nancy can work together to take down Steve.\n    *goto help_prof\n  #I help Rick and Nancy fight Steve. We need to capture him otherwise he can relay all the information to Blaine.\n    *goto help_sorcerers \n\n*label help_prof\n\n*page_break\n\nHow do you plan on helping him?\n*choice\n  #I'll transform the lion into something weaker.\n    *if transform > 50\n      You are powerful enough to transform the lion back into the table it once was. Strange how everything goes back to it once was.\n      You then look towards the other fight. Steve is being crushed by two elephants, the second of which you assume was summoned by Rick. The Prof, now free to do as he pleases, blasts Steve with ice, freezing him to the ground.\n      The four of you then surround Steve, who is being trampled. Both elephants are called off. Steve is clearly frozen in place and beaten up. The Prof then arrests him with handcuffs. You then ask Rick and Nancy why they called off the elephants.\n      \"We need him alive,\" Nancy said. He might be able to give us valuable information we need to be able to defeat\n      Blaine. \n      \"Yes,\" you chime in. \"But if we don't take him out now, he might escape.\"\n      What do you do?\n      *set transform +1\n      *set mana -10\n      *choice\n        #Listen to Nancy and Rick. They're right.\n          You decide to spare Steve. The four of you will begin to interrogate him immediately.\n          *goto Spy_Alive\n        #Kill Steve. He's too dangerous to be left alive.   \n          Are raise your arms in a drastic way, ready to cast a large spell. Nancy, Rick and the prof all cry out in protest, but you blast Steve with additional ice until he freezes over completely. You keep doing so despite the protest by the others, and all of you can tell when Steve's body temperature goes down so low that his heart stops. \n          *set blast +1\n          *set mana -10  \n          *goto Spy_Dead\n    You attempt to turn the lion back into a table, but you're unable to do so. It turns around to attack you, as it was likely alerted to your presence by you casting your spell. It pounces and you are unable to dodge. As it lands on you and smacks you with its paws, the professor turns it back into a table. You step back up, damaged, but alive.   \n    You turn around to see two elephants stomping on Steve, the second of which you assume was summoned by Rick. He surrenders and both elephants are called back.\n    *set health -10\n    *set transform +1\n    *set mana -10\n    *goto Spy_Alive\n  #I'll charm the lion back into attacking Steve.\n    *if charm > 50\n      You're able to use this spell, as the lion appears shocked, turning back around and attacking Steve again. It joins in the two elephants (the second one you assume was summoned by Rick) in attacking Steve. When Steve is little more than a bloody pulp.\n      All thee animals are then called back, and you're ready to kill Steve. Nancy and Rick protest stating that you need to spare him in order to get information from him.\n      *set charm +1\n      *set mana -10\n      *choice\n        #Listen to N re after a large explosion which was preceded by several armed men walking into the shop. Each of them was wearing this emblem.\" She paused as she held up an emblem identical to the ones that were worn by the ones invading the university earlier. \n\nYou gasp in your seat, unsure of if anyone you know was killed. You think you know the answer, keep watching the story, but deep down you know its only an attempt to hold on to hope. \n\n\"As expected, there is an extremely high death toll, and the following names are among them.\" She continued with a list of names, and you recognize not only the name of the professor but also those of two of your classmates, Veronica and Damian. Do you regret not going?\n\n*fake_choice\n  #Yes. I could have saved them.\n    You feel partially responsible for their deaths.\n  #No, I probably would have died, to.\n    Understandable. No need to an additional death\n\nAs you look for classmates to talk with, you are contacted by one named Karol, who says she met the professor at the university after he met with you at his place and immediately before he went to the coffee shop. She says that she will meet up with you, Rick and Nancy at the professor's funeral to determine what to do next.\n\n*set Chapter_3 \"DeadSpy\"\n\n*goto_scene Payment\n\n*label Info_Gathered\n\nYou gain access to Steve's information, and now have some great Intel on what Blaine has planned for everyone.\n\n*page_break\n\nLater that day, you turn on your TV to watch the news and hear of a story about a coffee shop exploding. A mental red flag is raised, and you realize that the professor was going to meet with some students there and that you were offered a spot there to. You watch intently as the station cuts to a live report, with a young reporter giving the story in a suitably sombre tone.\n\n\"This is Alice Bryant live on the scene at Hugh's Coffee Shop. There are several dead here after a large explosion which was preceded by several armed men walking into the t's very calming and you feel like you're building up some intelligence\n    *set brains +1\n    *goto morning\n\n*label morning\n\n*page_break\n  \n\nYou wake up the next morning feeling as if you spent last night in the best possible way.  After an average day at work, you head back home, seeing that your choice seems to be working, as nothing has happened, either to you or anyone of the other sorcerers. At this point, you see on the news that the coffee shop where the professor wanted to meet you at has been destroyed. You recognize the professor's name as being among the dead, as well as two of your old classmates, Damian and Veronica. The coffee shop is destroyed, and many of the other dead are seen to be dressed similarly to the thugs who invaded the university the day before and are instantly able to make the connection. Laying low is no longer an option. How do you feel about your decision to lay low?\n\n*fake_choice\n  #Terrible. I feel I could have saved the others.\n    The guilt weighs on you, and you feel compelled to do something to redeem yourself.\n  #Terrible, but I wouldn't have met at the coffee shop, so I don't know if I could have done anything.\n    You feel bad, but feel like you wouldn't have been able to do anything from the professor's house or the university.\n  #Smart, I dodged a bullet.\n    The worst is over with. Your decision not to be at the coffee shop could have saved your life.\n\nAs you take the time to process this feeling, you decide its time to join the fight once again. Not only to protect yourself but also to avenge your fallen friends as well as protect your remaining allies. You wonder who you should call and look through your list of contacts. You realize that you can't contact Damian, Veronica or the professor. You attempt to call as many people as you can, and finally, find out who it is that you can contact. You keep going through your contact, calling them one by one until a classmate named Karol answers your call. How do you begin the conversation?\n\n*choice\n  #Ask how she is. Make her comfortable with you before getting into heavy life-altering conversations.\n    You feel as if you've done the socially graceful thing, and now Karol is comfortable talking to you.\n    *set social +1\n    *goto Karol\n  #Get right to the point. This is a critical issue and there's no time to waste.\n    You off-set her somewhat, but she realizes the reason you got so direct and the importance of getting to the point.\n    *set brains +1\n    *goto Karol\n\n\n*label Karol\n\n*page_break\n\nPartway through the conversation with her, you and her exchange information. She has seen the news report and agrees that action must be taken. She also mentions that she met with the professor at the university just a few hours before the professor died at the coffee shop. She gives you a rundown of all the information that she knows:\n\nThe professor met with Nancy, Rick and Steve earlier at his place. There was some suspicion around Steve, but the professor dropped it quickly. Since the attack was similar to the attack on the university before, Karol was still thinking that Steve was at least partially responsible for the attack. She says that she will call you when she has more information, and if you find out anything else you should do the same. She says that she will also contact Rick and Nancy and that the four of you will meet up at the professor's funeral. You agree and set the phone down. Knowing that you have some information, you thank her and let her go for the night.\n\n*page_break\n\nThat night, as you're in bed, you hear something outside your window. You get up to look outside and when you do so, you see a blast coming from the other side of it.\nImmediately recognizing it as a sorcery blast, you recognize you must do something about this quickly, otherwise, this is going to hurt. A lot. How do you plan on responding?\n\n*choice\n  #I attempt to dodge it physically. I know a fight is coming, and need to save mana.\n    *if fitness > 59\n      You're fast enough to be able to dodge the attack. You move out of the way from behind the window to beside it as the blast comes into your room.\n      *set fitness +1\n      *goto fight\n    You're too slow to be able to dodge it. You're knocked back and take some damage.\n    *set fitness +1\n    *set health -10\n    *goto fight\n  #I blast it back with another blast spell. Meet fire with fire.\n    *if blast > 54\n      Your skill with blast magic is powerful enough to counteract such as blast, meeting it in mid-air. The two blasts explode when they impact each other.\n      *set mana -10\n      *set blast +1\n      *goto fight\n    Your skill with blast magic isn't strong enough to stop the other blast. It destroys your blast and hits you in its follow-through.\n    *set mana -10\n    *set blast +1\n    *set health -10\n    *goto fight\n\n*label fight\n\n*page_break\n\nYou realize that this is indeed the start of a fight. With your window smashed, you see someone float up through. You recognize it as Steve, the classmate that Karol was thinking was partially responsible for the deaths of Damian, Veronica and the professor. You can see a smile on his face, he's pleased with himself. You realize you must have made some sort of face showing suspicion as he begins to speak.\n\n\"Yes, ${name} I can tell you've heard. It was me...in a way.\" At this point, you really don't care, as his killing of the others is just insult to injury. As this point, you're just ready to fight for your life. You realize that he's come here with the intent of killing you, and you're not going to solve this diplomatically. You see him also break out of his speech before he starts monologuing, and instead is ready to take you out. You realize there's not much time to respond. How do you do so?\n\n*choice\n  #I blast him with some of my blast magic. Easy solution.\n    *if blast > 54\n      Your skill with blast magic is good enough to send him flying back, reeling from the damage. He slams into a wall and is noticeably hurt.\n      *set blast +1\n      *set mana -10\n      *goto fight_2\n    Your skill with blast magic isn't quite enough, as he's able to dodge your attack. He counters with his own blast, which hits you very hard.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto fight_2\n  #I summon something to attack him. I need help.\n    *if summon > 54\n      You summon a swarm of killer bees that sting the hell out of him. He's overwhelmed and obviously hurt by the experience.\n      *set summon +1\n      *set mana -10\n      *goto fight_2\n    The swarm of killer bees you summon isn't strong enough to throw Steve off of his game, and he blasts you with some elemental magic, which hits you very hard.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto fight_2\n  #I transform myself into something stronger. I'll take him down with brute force myself. \n    *if transform > 54\n      You turn yourself into a tiger and pounce on Steve. You're powerful enough to noticeably wound him before he escapes.\n      *set transform +1\n      *set mana -10\n      *goto fight_2\n    You turn yourself into a tiger and pounce of Steve. You're not powerful enough to wound him, and when he escapes, he attacks you with blast magic, dealing plenty of damage to you.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto fight_2\n  #I punch him. Not everything needs magic, and we're in close quarters.\n    *if fitness > 59\n      You are able to get in a series of solid strikes before he begins to block them. He's visibly damaged, like a boxer who's been punched one too many times.\n      *set fitness +1\n      *goto fight_2\n    You are unable to land a hit before he blasts you with an elemental ball. You can feel the damage on yourself.\n    *set fitness +1\n    *set health -10\n    *goto fight_2\n\n*label fight_2\n\n*page_break\n\nYou realize that this fight is getting serious. You were already pretty sure that this was going to be the case, but now you know for a fact that there's no going back. After a few more blasts are exchanged back and forth, you realize that something more creative than blast magic will have to do for the next part of the fight. Each of you is simply blasting the other with generic attacks, and your attack and his always seem to clash in mid-air, cancelling each other out. Plus, it's destroying your room. You look around for other ways to use your magic and catch him off guard. What's your decision?\n\n*choice\n  #I bring the light down on him, using a transform spell to make it really heavy.\n    *if transform > 54\n      You are able to successfully transform your light into a speak, impaling him. He is now exposed and ready for the kill.\n      *set transform +1\n      *set mana -10\n      *goto fight_3\n    You accidentally transform your light into a car, and it lands on both of you, dealing high damage to you both. You are just barely able to move it off of you before he moves it off of him.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n  #I still use blast magic, but use it for telekinesis, throwing my bookshelf into him.\n    *if blast > 54\n      The bookshelf knocks him to the ground, and he is blindsided when you hit him in the head. \n      *set blast +1\n      *set mana -10\n      *goto fight_3\n    You accidentally split the bookshelf in half, and the two halves hit each of you two respectively. You are able to get up before he does, however.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n  #I summon something below him.\n    *if summon > 54\n      You're able to use a snake to pop out from underground, wrap itself around his legs and trip him. Your next blast then hits him.\n      *set summon +1\n      *set mana -10\n      *goto fight_3\n    You attempt to summon something, but make the ground shake below you, dealing damage to both of you and causing you both to fall. You are able to get up before he does, however.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n\n*label fight_3\n\n*page_break.\n\nAfter you walk over to Steve and look over him, you notice that you now have the opportunity to kill him. You could do this, and get the catharsis, as well as stop him from becoming a threat anymore, but it prevents you from learning more about him and Blaine's plan. You realize that this will play a major role in the coming times, but aren't sure which is best.\n\n*choice\n  #Kill him. I'm not taking the chance of him escaping\n    You easily deliver the killing blow. You regret that you won't be able to get any information from him, but it's too late for that now.\n    *set Chapter_3 \"DeadSpy\"\n    *goto_scene Payment\n  #Interrogate him. I need that information\n    You capture him and wrap him up to stop him from escaping. You will interrogate him with help from the others.\n    *set Chapter_3 \"LiveSpy\"\n    *goto_scene Payment", "screenshots": "*comment first ss\n\n*set mana 70\n*set health 80\n*set social 52\n*set fitness 56\n*set brains 63\n*set charm 52\n*set Blast 61\n*set Illusion 51\n*set Summon 50\n*set Transform 56\n*set Knowledge 53\n*set name \"George\"\n*set gender \"Male\"\n\nThat night, as you're in bed, you hear something outside your window. You get up to look outside and when you do so, you see a blast coming from the other side of it.\nImmediately recognizing it as a sorcery blast, you recognize you must do something about this quickly, otherwise this is going to hurt. A lot. How do you plan on responding.\n\n*fake_choice\n  #I attempt to dodge it physically. I know a fight is coming, and need to save mana.\n  #I blast it back with another blast spell. Meet fire with fire.\n\n\n*comment 2nd ss\n\n*set mana 70\n*set health 80\n*set social 56\n*set fitness 62\n*set brains 52\n*set charm 51\n*set Blast 50\n*set Illusion 51\n*set Summon 60\n*set Transform 50\n*set Knowledge 57\n*set name \"Lisa\"\n*set gender \"Female\"\n\n\nAs you practice casting spells, you hear an explosion coming from downstairs.\nYou look at the professor, who explains that he thinks that someone has found\nyour society and is breaking in. Other students begin to scream in terror, now\nterrified and attempting to use their spells to solve the problem. \n\nSome of the illusion specialists turn invisible, transformation specialist try\nto change the contents of the room, and knowledge specialist try to see who's \nbreaking in. One of the knowledge specialists who succeeds states the location\nof the break in, stating also that those breaking in don't seem to be part of\nthe governement's usual team of specialists who come after sorcerers. These \ninvaders have military training, running in with assault rilfes, and mowing\ndown the select few sorcerers on the bottom floor without any trouble.\n\nThe instructor yells to the others to stop running and stand up. The sorcerer\nwho used a spell to keep an eye on the invaders is keeping everyone updated on\ntheir location, informing every that they seemed to be making a B-Line towards\nyour current room, as if they knew where all of you are. You and the other sorcerers\nstart preparing your spells. What are you planning on doing?\n\n*fake_choice\n  #Use a charm spell to turn one of the invaders against the others\n  #Use a blast spell to hurt or kill invaders \n  #Summon an animal to fight against the invaders\n  #Use a transform spell to turn one of the invaders into somethig harmless\n\n*comment 3rd ss\n\n*set mana 80\n*set health 70\n*set social 58\n*set fitness 63\n*set brains 55\n*set charm 52\n*set Blast 55\n*set Illusion 51\n*set Summon 60\n*set Transform 52\n*set Knowledge 57\n*set name \"Milly\"\n*set gender \"Female\"\n\nAfter getting by the snipers, you realize you're about to go right by the bush with the guard using an assault rifle, who's ready to burst out at any moment. This one might require slightly different ideas. Knowing that attacking him will alert everyone since this area is so out in the open, you decide its basically necessary to sneak by. You see him pointing away from you, but there's very little room behind him to sneak by. You have to get the entire group across safely. What do you do?\n\n*fake_choice\n  #Use illusion magic to create a sound in order to distract him so I can more easily sneak by.\n  #Sneak by while still depending on my flexibility and agility to stay quite.\n  #Have everyone transform into mice and just walk by. We can easily fit and are fast enough.\n\n\n*comment 4th ss\n\n*set mana 40\n*set health 30\n*set social 59\n*set fitness 63\n*set brains 56\n*set charm 52\n*set Blast 57\n*set Illusion 51\n*set Summon 60\n*set Transform 53\n*set Knowledge 57\n*set name \"Michael\"\n*set gender \"Male\"\n\nKnowing that your mana won't last forever, you begin to look around yourself of a weapon. Or, at least something that can be used as an improvised one. Literally anything will do. Blaine is on the ground, and this is your chance to get some free damage on him. You note that this being a castle museum's throne room, there's going to be representations of medieval weapons. You see around you a boomerang and a sword. You have briefly practiced using a boomerang, and know that it takes some brains to throw it properly. You recognize the sword as something that's easier to wield, and will do damage based on your strength. They're on opposite ends of the room, and Blaine will be up soon. What's your choice?\n\n*fake_choice\n  #The boomerang. I think I'm smart enough to use it.\n  #The sword. I'm jacked enough to do serious damage.\n\n*comment 5th ss\n\n\n*set mana 30\n*set health 40\n*set social 57\n*set fitness 64\n*set brains 57\n*set charm 53\n*set Blast 56\n*set Illusion 53\n*set Summon 61\n*set Transform 53\n*set Knowledge 57\n*set name \"Jeff\"\n*set gender \"Male\"\n\nAfter Blaine's attack, you realize that now you're starting to get in over your head, as even just seeing the blast that Blaine unleashed showed he was indeed about equal in power to you, but in your weakened state, he would have the advantage in a one on one. As you briefly wonder what would have happened had you taken the elixer, you see that Karol has summoned a buffalo that is currently charging as Blaine, who attempts to move out of the way. Blaine is partially successful, being able to avoid a direct hit, but is unable to completely get out of the way. Karol uses this as an opportunity to unleash an illusion spell. Suddenly, Blaine is attacked by the illusion of a swarm Asian Giant Hornets and their powerful stings. This seems to catch Blaine off guard, as he is unable to tell that this is an illusion, and you see him taking damage during the fake attack. You realize that you can indeed use illusion spells to damage Blaine. However, as this is happening, he attacks Karol by summoning a charging triceratops, but in his state, he's open to an attack. What do you do?\n\n*fake_choice\n  #Attack Blaine with a blast spell. Hey, if it ain't broke...\n  #Summon an animal to attack Blaine. Keep the damage coming.\n  #Cast an illusion spell to damage Blaine. Might as well see if it works for me, to.\n  #Save Karol from the triceratops. I can't afford to lose her at this point.\n\n\n", "startup": "\n*title Sorcerer's Story\n*author Chris Viola\n*scene_list\n  startup\n  ch1\n  house\n  university\n  Coffee\n  ignore\n  Payment\n  $ DeadSpy\n  $ LiveSpy\n  $ Spymissed\n  $ chapter4\n  $ 1v1\n  $ Save_Karol\n  $ 1v1_victory\n  $ Ending_Karol\n  $ Ending_No_Karol\n  $ evil_ending\n  $ death\n  ending\n\n\n*create Social 50\n*create Mana 100\n*create Brains 50\n*create Fitness 50\n*create Health 100\n*create Charm 50\n*create Blast 50\n*create Illusion 50\n*create Summon 50\n*create Transform 50\n*create Knowledge 50\n*create name \"Unknown\"\n*create gender \"Unknown\"\n*create chapter_3 \"Unknown\"\n\n\n*achievement survivor visible 50 Survivor\n  Survive the game\n\n*achievement evil visible 50 Evil\n  Get the evil ending\n\n*achievement solesurvivor visible 50 Sole Survivor\n  Be the only sorcerer alive when Blaine is defeated\n\n*achievement storybook visible 100 Storybook Ending\n  Get the canon ending (the one where Karol survives)\n\n*achievement sacrifice visible 50 Sacrifice\n  Get an ending where you die\n\n\n*if choice_is_omnibus_app\n    *comment skip description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n      Take control of a sorcerer in an urban fantasy adventure that adds magic into the present day. Use your magic to fight against an evil sorcerer who is breaking several treaties by using his magic in order to gain world domination. Feel the rush of magic flowing through you as you fight against armed guards and other sorcerers as you break through from your humble private life in an attempt to save the world from your evil rival.\n\n      A sorcerer's Story is a 53,000 word interactive novel created by Chris Viola where your choices control the story. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n      Will you save the world, die trying, or join up with the villain to gain a share of the pie? Along the way, you will get the chance to:\n      • Play as  male, female or non-binary.[n/]\n      • Use a variety of spells, including illusions, fireballs, summoning a variety of creatures, transformation, mind control and knowledge related magic.[n/] \n      • Pick a specialty and develop all forms of magic by using them.[n/]\n      • Battle with and against those with similar spells, as well as groups of ordinary humans.[n/]\n      • Pick a job and one of several hobbies in your personal life, gaining competencies by using physical, mental and social skills.[n/]\n      • Control your character's emotional response to several situations, further immersing you in the story.[n/]\n      • Play over and over, revealing many different middle acts and endings.[n/]\n\n      *if choice_prerelease and not(choice_is_ios_app)\n          [i]You can play the first two chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n          *choice\n              #Sign up to be notified when the game is available.\n                  *subscribe {\"now\": true}\n                  *restart\n              #Play the first two chapters now for free.\n                  *goto purchased\n\n      [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n      *if choice_is_advertising_supported\n          [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n      *purchase_discount adfree 2020-09-03 $3.99 $2.99 purchased\n      *if choice_is_advertising_supported\n        *page_break_advertisement\n      *if not(choice_is_advertising_supported)\n        *page_break Play Now for Free\n\n\n*label purchased\n\n\n\n", "university": "The professor gives you the room number for the university and you go there later that day.\n\n*page_break\n\nAs you approach the University, you notice that very little damage has been done to the outside.\nSomehow, the construction crew had already fixed it. It's not until you get inside and see a sign\nseeing that room 221 has been closed down. You remember room 221 as the one where the attack happened,\nso that makes sense. You then remember room 345 was the one that the professor told you to meet in.\nYou attempt to go there as quickly as possible, immediately going to the 3rd floor. It feels weird to be\nin a during the day, but you brought a binder and confidently walk with a good stride, so people seem to\nthink you belong. After getting to the third floor, you realize you have no idea where to go. What do you do?\n\n\n*choice\n  #I ask someone. It's what anyone would do and it won't blow my cover as a sorcerer.\n    You find someone who knows where that is. It also ended up helping you hone your social skills slightly, due to you having to pretend you have a class there.\n    *set social +2\n    *goto classroom\n  #I look for patterns in how the rooms are numbered. It shouldn't be that hard to figure out.\n    After a few minutes of searching, you find a sign pointing to the room. A good way to increase your pattern recognition skills.\n    *set brains +2\n    *goto classroom\n  #I cast a knowledge spell from a bathroom stall. It should be private enough to block anyone from figuring out what I'm doing.\n    You quietly slink away to the bathroom, where you cast a knowledge spell after its empty.\n    *set knowledge +2\n    *set mana -10\n    *goto classroom\n\n*label classroom\n\n*page_break\n\n\"Hello, ${name}. Glad you made it,\" said the professor, who also joined by another student. \"You are Karol\nare familiar with each other, correct?\"\n\nYou nod, having seen her in class a few times. You however never really had any conversations with much depth\nwith her. You don't remember having particularly positive or negative emotions towards her. How do you greet her?\n\n*fake_choice\n  #I briefly nod and say 'hi'\n    She does the same thing back, and the two of you quickly indicate to the prof that you're ready to learn from the professor.\n  #I wave to get it over with\n    With no enthusiasm, she waves and after a brief silence, the prof breaks it by starting to info dump what he brought you here to talk about. You feel somewhat uncomfortable about the interaction.\n  #I engage in small talk for a few minutes to increase comfort levels\n    The two of you are briefly caught up. You find out that she's just as scared as you are, and is also just putting on a brave face.\n    You both feel slightly better knowing that our feelings are at least justified and normal.\n\n\"Now that you're re-antiquated, let's begin with what we all came here for. As both of you know, we were attacked yesterday by Blaine's\nforces. Regardless of how you feel about your reaction to it, the possibility remains that he will make additional attacks later. He\ncould have one planned right now. I've already met with Steve, Rick and Nancy at my place.\"\n\n\"Something about Steve doesn't seem right,\" Karol stated. You remember Karol and Steve didn't like each other, but this statement by\nKarol didn't seem to be egotistical or agenda-driven. You feel as if she may be on to something.\n\n\"He did seem a little bit out of place during our meet, but we need all the forces we can get,\" the prof said, pausing as if he was\nlegitimately concerned about what Karol said. \n\n\"However, I have decided to keep an eye on him during our counter-attack.\"\n\nYou are about to open your mouth to ask about the said counter-attack, but the prof continues talking. Luckily, what he said was the answer\nto your question anyway. \n\n\"We are meeting again tomorrow for our great counter-attack,\" stated the professor, who then followed up his statement with a time and\nlocation.\n\nThe professor then states that he knows Blaine is hidden in a nearby castle that was once a local tourist attraction/museum. He took it by force from the employees and used charm spells on any of the cops that came in to take it back. You're wondering how the media never mentioned\nthe closure of the nearby castle museum, but figure you're not going to question it. You may, however, have a question.\n\n*choice\n  #What are we going to do? Just storm the place and take it back by force? \n    \"That is one of the possibilities,\" the professor says. He then outlines a basic idea of where he expects people to be, where you'd encounter the least resistance and Blaine's location. Upon hearing that Blaine would most likely be in the throne room, Carol lets out a chuckle while also rolling her eyes. \"Of course,\" you say. \"Just like always, Blaine puts himself above everyone.\n    *goto after_questions\n  #Are we getting any help?\n    \"There will be more of us there. The three of us will be joined by Rick, Nancy and Steve.\" Karol once again voices concern when Steve is mentioned by name, but the prof cleanly dismisses it. He then continues saying that he will later meet with another group in a coffee shop.\n    A few others are planning on being there, but he doesn't know how many will show up. You're somewhat worried about this task force sounding rather small, but it doesn't feel like that big of a deal.\n    *goto after_questions\n  #I have no questions. The prof is probably just going to answer them anyway.\n    After a brief pause, you figure that anything you ask would be answered regardless. That's what's been happening all day anyway, so why bet against the streak at this point?\n    *goto after_questions\n\n*label after_questions\n  \nThe professor continues to talk, giving more details about how you will defeat Blaine. Most of it, however, is just fluff about how you're going to\nwin with motivational phrases added in. You begin to wonder if there's an actual plan in place, or if the professor is just making this up\nas he goes or is underestimating this deadly opponent.\n\n*choice\n  #I question him. It sounds important to call this out.\n    A smart thing to do. The professor adds in more detail as to what it is that he plans in order to neutralize many of the police officers and mentions that Blaine isn't as great in a straight fight, which is the reason he seems to outsource all combat-related activities.\n    *set brains +1\n    *goto flashback\n  #I let it go. No point in creating an incident.\n    Graceful of you. The prof continues to say what he intended to say uninterrupted and gives a very emotional speech. You feel like you've done the socially aware thing, and remember the importance of letting them speak their part.\n    *set social +1\n    *goto flashback\n\n\n*label flashback\n\nAfter you leave what you jokingly call a 'class', you have flashbacks of Blaine. You attempt to hone in on his skill set, and mentally practice how\nto counter everything that he threw at you. You remember that in a straight fight he'd do the most straightforward thing possible, continue attacking\nhis opponent with blast spells until they were knocked down. Do you have any ideas on what it is that you need to practice when you get home\nin order to be prepared for the fight against Blaine?\n*choice\n  #I fight fire with fire and try to overpower his blasts with mine.\n    You have a fun day blasting targets away as you slightly increase your ability to use blast spells. Maybe you can overpower him.\n    *set blast +2\n    *goto flashback2\n  #I think I should make illusionary copies of myself so he spends more energy attacking my copies than I used to make them. \n    You increase your ability to make illusionary copies of everything and everybody. This is a pretty versatile trick that you can use outside of combat as well.\n    *set illusion +2\n    *goto flashback2\n  #I try to dodge his attacks. No need to waste mana. Let him burn himself out early.\n    You get slightly quicker. Having things that don't require magic is useful, isn't it?\n    *set fitness +2\n    *goto flashback2\n  #I do my best to summon something strong enough to take him down. Try to outlast him.\n    The beasts you summon are now stronger than they once were. This may have other applications that you weren't aware of earlier\n    *set summon +2\n    *goto flashback2\n    \n\n*label flashback2\n\nYou can't help but continue having memories of Blaine. You remember that during class, he would always answer questions, and would often 'correct'\nthe professor, even if the professor was right. When presenting information, he would also often make it all about himself, giving himself far\nmore credit than he deserved. His stories, both related to his sorcery and to his personal life were always exaggerated and everyone knew it.\nA few of your classmates, including Karol, would always leave class when he started talking because they knew how long he would promote his own\n'image'. Those who spent lots of time with him would often look to move where they were sitting. In short, he was arrogant, annoying, and everyone\nknew it. \n\nYou figure that you can't practice too much. It's already near the end of the day, and you'll be recouping your mana and health anyway. At this point,\nmight as well improve your spell casting. You're sure as hell going to need it. Which sort of spell do you want to get better at casting?\n\n*choice\n  #Charm\n    You become better at charming people with magic. In a sense, you become more like Blaine\n    *set charm +1\n    *goto day_after\n  #Blast\n    You improve your capabilities with blasting spells. Boring, but effective for killing Blaine\n    *set blast +1\n    *goto day_after\n  #Illusion\n    You improve your capabilities with illusion spells. Better able to fool people now, aren't you?\n    *set illusion +1\n    *goto day_after\n  #Summon\n    You can now summon more powerful beasts. Good in and out of combat.\n    *set summon +1\n    *goto day_after\n  #Transform\n    You learn how to transform your allies into more powerful being. And opponents into weaker beings. Useful.\n    *set transform +1\n    *goto day_after\n  #Knowledge\n    You are better at acquiring knowledge of what's around you. Useful for before you commit a major action.\n    *set knowledge +1\n    *goto day_after\n\n*label day_after\n\nAfter a full day of practising, you better hone several of your abilities. That night you have a dream that seems similar to what might\nhappen during the attack. You see Blaine on top of the corpses of a few of your classmates, in this throne room. You are beaten and\nbattered, seemingly moments away from death. As you attempt to get back up, Blaine attacks you again, with you barely dodging it.\n\n\"Impressive,\" he states \"that you've been able to last this long. Or, it would be if I didn't leave you for last on purpose. Yes,\nthat's right ${name}, I've been waiting for this for a long time. You on the ground, praying for your life. With me up here\nunwilling to give it to you. I wanted you to see your friends die, and you won't even have the dignity of death by magic.\"\nHe then pulls out a knife and stabs you in the neck.\n\nNext thing you know, you're in your bed in a cold sweat. \n\n\"It was just a dream,\" you tell yourself, now more aware of what you saw. You process it and see that you do indeed fear that Blaine is\nnot only more powerful than you but more powerful than everyone else put together. Looking at it objectively, you put yourself in the mindset\nthat this is unlikely, but the weight of the possibility is still unsettling.\n\n*fake_choice\n  #I feel it's unlikely. He can't be that strong\n    Of course it's unlikely. It would be ridiculous for him to be able to take all of you at once.\n  #I'm scared of him\n    Of course, you are. You don't know if what you saw is real, so you're choosing not to underestimate your opponent.\n\n*page_break\n\nThe next day, you turn on your TV to watch the news and hear of a story about a coffee shop exploding. A mental red flag is raised, and you realize that the professor was going to meet with some students there and that you were offered a spot there to. You watch intently as the station cuts to a live report, with a young reporter giving the story in a suitably sombre tone.\n\n\"This is Alice Bryant live on the scene at Hugh's Coffee Shop. There are several dead here after a large explosion which was proceeded by several armed men walking into the shop. Each of them was wearing this emblem.\" She paused as she held up an emblem identical to the ones that were worn by the ones invading the university earlier. \n\nYou gasp in your seat, unsure of if anyone you know was killed. You think you know the answer, keep watching the story, but deep down you know its only an attempt to hold on to hope. \n\n\"As expected, there is an extremely high death toll, and the following names are among them.\" She continued with a list of names, and you recognize not only the name of the professor but also those of two of your classmates, Veronica and Damian. Do you regret not going?\n\n*fake_choice\n  #Yes. I could have saved them.\n    You feel partially responsible for their deaths.\n  #No, I probably would have died, to.\n    Understandable. No need to an additional death\n\nKarol then contacts you, asking if you've seen the report. After stating that you have, she tells you that she will meet with you, as well as Rick and Nancy at the professor's funeral.\n\n*set Chapter_3 \"Spymissed\"\n*goto_scene Payment"}};
